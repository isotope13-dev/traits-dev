# Hash-algorithm name keywords in script source. Neutral crypto capability —
# md5/sha256 appear ubiquitously (checksums, ETags, cache keys, integrity
# checks). Relocated from objectives/discovery/system/fingerprint where a bare
# hash-name reference mislabeled every benign hashing call as system
# fingerprinting; the fingerprint composite references these cross-tier
# alongside system-identifier sources to express that intent.
defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: baseline
traits:
  - id: sha256-keyword
    desc: sha256 hash algorithm
    conf: 0.6
    if:
      type: string_literal
      word: sha256
  - id: md5-keyword
    desc: md5 hash algorithm
    conf: 0.5
    if:
      type: string_literal
      word: md5
    unless:
      - id: metadata/file/text/catalog::vscode-php-global-functions-catalog
