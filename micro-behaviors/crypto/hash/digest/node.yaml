# Node.js hash-digest capabilities. `createHash('sha256')` is a neutral hashing
# call (base58check, content-addressing, integrity checks all use it); it was
# relocated here from objectives/command-and-control/dropper/execution/integrity
# so its identity matches its matcher. Dropper/integrity intent lives in the
# composites that reference it cross-tier.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
traits:
  - id: node-createhash-sha256-call
    desc: Node.js createHash('sha256') call
    conf: 0.88
    if:
      type: text
      regex: 'createHash\)\(["'']sha256["'']\)|createHash\(["'']sha256["'']\)'
