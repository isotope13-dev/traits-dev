defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  mbc: C0029
traits:
  - id: node-createhmac
    desc: Node.js HMAC construction
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      exact: createHmac
  - id: node-timing-safe-equal
    desc: Constant-time buffer comparison
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: call
      exact: timingSafeEqual

  # Bundled JavaScript can exceed the bounded AST parser's state budget. Keep
  # a precise source-text fallback for the same complete calls.
  - id: node-createhmac-text-call
    desc: Node.js HMAC call in source text
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\bcreateHmac\s*\)?\s*\('

  - id: node-timing-safe-equal-text-call
    desc: Node.js constant-time comparison call
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\btimingSafeEqual\s*\)?\s*\('
