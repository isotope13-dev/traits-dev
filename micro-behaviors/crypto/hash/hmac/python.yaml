defaults:
  platforms:
    - unix
    - windows
  for:
    - python
    - pyc
traits:
  - id: hmac-new
    desc: Python hmac.new operation
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: hmac.new
  - id: hmac-digest
    desc: Python hmac.digest one-shot operation
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: hmac.digest
  - id: hmac-compare-digest
    desc: 'hmac compare digest'
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: hmac.compare_digest
