defaults:
  platforms:
    - unix
    - windows
  for:
    - python
    - pyc
traits:
  - id: hmac-new
    desc: Python hmac.new operation
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: hmac.new
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: hmac-digest
    desc: Python hmac.digest one-shot operation
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: hmac.digest
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: hmac-compare-digest
    desc: Uses hmac.compare_digest for secure comparison
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: hmac.compare_digest
