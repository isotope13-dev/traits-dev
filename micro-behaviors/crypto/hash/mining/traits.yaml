defaults:
  platforms: [unix, windows]
  for: [scripts, python, javascript, typescript, pe, elf, macho]
  conf: 0.8

# Mining and proof-of-work implementation indicators are capabilities. They do
# not establish that a host's resources are being hijacked; the cryptojacking
# objective composites add pool and execution context separately.
traits:
  - id: miner-after-crypto-term
    desc: Cryptocurrency term precedes miner
    crit: notable
    if:
      type: text
      regex: '(?i)\b(crypto|coin|monero|stratum)\b.{0,80}\bminer\b'
  - id: miner-before-crypto-term
    desc: Miner precedes cryptocurrency term
    crit: notable
    if:
      type: text
      regex: '(?i)\bminer\b.{0,80}\b(crypto|coin|monero|stratum)\b'
  - id: miner-title
    desc: Miner term with cryptocurrency context
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '(?i)\bMiner\b.{0,40}\bcrypto\b'
  - id: miner-upper
    desc: MINER string (uppercase)
    crit: notable
    conf: 0.6
    if:
      type: text
      word: MINER
  - id: mining-lower
    desc: mining string (lowercase)
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: mining
  - id: mining-title
    desc: Mining string (title case)
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: Mining
  - id: mining-upper
    desc: MINING string (uppercase)
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: MINING
  - id: cryptonight-str
    desc: CryptoNight proof-of-work algorithm reference
    crit: notable
    conf: 0.7
    if:
      type: text
      word: cryptonight
    unless:
      - type: text
        regex: '(?is)bad_patterns\s*=\s*re\.compile\([\s\S]{0,400}process_iter'
  - id: cryptonight-title
    desc: CryptoNight proof-of-work algorithm (title case)
    crit: notable
    conf: 0.75
    if:
      type: text
      word: CryptoNight
    unless:
      - type: text
        regex: '(?is)bad_patterns\s*=\s*re\.compile\([\s\S]{0,400}process_iter'
  - id: cryptonight-upper
    desc: CRYPTONIGHT proof-of-work algorithm (uppercase)
    crit: notable
    conf: 0.75
    if:
      type: text
      word: CRYPTONIGHT
    unless:
      - type: text
        regex: '(?is)bad_patterns\s*=\s*re\.compile\([\s\S]{0,400}process_iter'
  - id: randomx
    desc: RandomX proof-of-work algorithm reference
    crit: notable
    conf: 0.75
    if:
      type: text
      word: RandomX
  - id: cn-variant
    desc: CryptoNight algorithm variant prefix
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: cn/
  - id: cn-v7
    desc: CryptoNight v7 algorithm reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: cryptonight(_v7|-monerov7)
  - id: cn-v8
    desc: CryptoNight v8 algorithm reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: cryptonight(_v8|-monerov8)
  - id: cn-msr
    desc: CryptoNight MSR variant reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: c[rn]/msr
  - id: cn-r
    desc: CryptoNight R variant reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: cryptonight(_r|/r)
  - id: cn-conceal
    desc: CryptoNight Conceal variant reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: c[rn]/conceal

composite_rules:
  - id: miner-keyword
    desc: Miner terms in cryptocurrency context
    crit: notable
    any:
      - id: miner-after-crypto-term
      - id: miner-before-crypto-term
      - id: miner-title
      - id: miner-upper
  - id: cryptonight-keyword
    desc: CryptoNight keyword variants
    crit: notable
    any:
      - id: cryptonight-str
      - id: cryptonight-title
      - id: cryptonight-upper
  - id: cn-variants
    desc: CryptoNight algorithm variants
    crit: notable
    any:
      - id: cn-variant
      - id: cn-v7
      - id: cn-v8
      - id: cn-msr
      - id: cn-r
      - id: cn-conceal
      - id: cryptonight-keyword
  - id: mining-keyword
    desc: Mining keyword variants
    crit: notable
    any:
      - id: mining-lower
      - id: mining-title
      - id: mining-upper
