defaults:
  platforms: [windows, unix]
  for: [shell, javascript, typescript]
  crit: notable

traits:
  - id: actual-hash-variable
    desc: Stores computed actualHash variable
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: symbol
      exact: actualHash
  - id: downloaded-artifact-sha256-compare
    desc: Compares downloaded artifact SHA-256
    conf: 0.94
    for: [shell]
    if:
      type: text
      regex: 'expected=\$\(awk[\s\S]{0,180}actual=\$\(sha256[\s\S]{0,180}\$expected'
  - id: downloaded-artifact-sha256-helper-compare
    desc: Compares artifact SHA-256 with helper
    conf: 0.93
    for: [shell]
    if:
      type: text
      regex: 'expected=[\s\S]{0,400}sha256sums\.txt[\s\S]{0,200}actual=[\s\S]{0,100}sha256_of'
