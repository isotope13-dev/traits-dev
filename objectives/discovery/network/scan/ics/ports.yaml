# ICS/OT Network Discovery and Protocol Scanning
# Detects scanning for ICS protocol ports and multi-protocol recon.
# Atomic protocol traits live in micro-behaviors/communications/<protocol>/.
# ATT&CK: T1046 (Network Service Discovery)
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  attack: T1046
  crit: notable
  conf: 0.85

traits:
  # --- ICS device type keywords (discovery context) ---
  - id: plc-keyword
    desc: PLC device keyword reference
    crit: component
    conf: 0.75
    if:
      type: text
      word: PLC
    not:
      - substr: powerline
      - substr: GPLC

  - id: scada-keyword
    desc: SCADA system keyword reference
    crit: component
    conf: 0.75
    if:
      type: text
      word: SCADA

  - id: hmi-keyword
    desc: HMI device keyword reference
    crit: component
    conf: 0.7
    if:
      type: text
      word: HMI

  - id: rtu-keyword
    desc: RTU device keyword reference
    crit: component
    conf: 0.7
    if:
      type: text
      word: RTU
    not:
      - substr: UART
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename

composite_rules:
  - id: ics-device-keywords
    desc: ICS device type keyword cluster
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: objectives/discovery/network/scan/ics::hmi-keyword
      - id: objectives/discovery/network/scan/ics::plc-keyword
      - id: objectives/discovery/network/scan/ics::rtu-keyword
      - id: objectives/discovery/network/scan/ics::scada-keyword

  - id: ics-protocol-reference
    desc: Any ICS/OT protocol reference
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/communications/modbus::protocol-usage
      - id: micro-behaviors/communications/dnp3::protocol-usage
      - id: micro-behaviors/communications/s7::protocol-usage
      - id: micro-behaviors/communications/bacnet::keyword
      - id: micro-behaviors/communications/opcua::keyword
      - id: micro-behaviors/communications/profinet::keyword
      - id: micro-behaviors/communications/ethernet-ip::keyword

  - id: multi-ics-protocol-scan
    desc: References multiple ICS protocols
    crit: suspicious
    conf: 0.92
    needs: 3
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    any:
      - id: micro-behaviors/communications/modbus::protocol-usage
      - id: micro-behaviors/communications/dnp3::protocol-usage
      - id: micro-behaviors/communications/s7::protocol-usage
      - id: micro-behaviors/communications/bacnet::keyword
      - id: micro-behaviors/communications/opcua::keyword
      - id: micro-behaviors/communications/profinet::keyword
      - id: micro-behaviors/communications/ethernet-ip::keyword
    all:
      - id: ics-port-scan

  - id: ics-port-scan
    desc: Scanning for ICS protocol ports
    crit: suspicious
    conf: 0.92
    needs: 2
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    any:
      - id: micro-behaviors/communications/modbus::port-502
      - id: micro-behaviors/communications/dnp3::port-20000
      - id: micro-behaviors/communications/s7::port-102
      - id: micro-behaviors/communications/s7::s7-port-102

  - id: ics-network-recon
    desc: ICS network recon with protocol proof
    crit: suspicious
    conf: 0.95
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    all:
      - id: ics-port-scan
    any:
      - id: micro-behaviors/communications/modbus::protocol-usage
      - id: micro-behaviors/communications/dnp3::protocol-usage
      - id: micro-behaviors/communications/s7::protocol-usage
