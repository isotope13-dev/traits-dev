# Lightweight internal-network port scanner targeting Windows services.
# SHADOW-EARTH-053's DomainMachines.exe (~28 KB) enumerates domain
# computers via LDAP then probes the canonical Windows-service port set:
# SMB (139,445), web (80,443,8080,8443), RDP (3389), WinRM (5985,5986),
# MySQL (3306), MS-SQL (1433), Kerberos (88). The combination of LDAP
# enumeration + this exact port set is rare in benign tooling.
defaults:
  platforms: [windows, unix]
  for: [pe, dll, csharp]
  attack: T1046
  mbc: E1046
traits:
  - id: ldap-search-api
    desc: LDAP search API usage
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: '^ldap_search(_s[tw]?|_ext[ws]?)?$'
  - id: dotnet-directory-searcher
    desc: DirectorySearcher API usage
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bDirectorySearcher\b|System\.DirectoryServices'
composite_rules:
  - id: domain-multi-service-port-sweep
    desc: Internal multi-service port sweep (Windows + DB + Kerberos)
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/communications/socket/port::multi-service-port-set
      - id: micro-behaviors/communications/socket/connect/
  - id: ldap-and-port-sweep
    desc: LDAP enumeration with multi-port sweep
    crit: hostile
    conf: 0.96
    any:
      - id: ldap-search-api
      - id: dotnet-directory-searcher
    all:
      - id: domain-multi-service-port-sweep
