# Lightweight internal-network port scanner targeting Windows services.
# SHADOW-EARTH-053's DomainMachines.exe (~28 KB) enumerates domain
# computers via LDAP then probes the canonical Windows-service port set:
# SMB (139,445), web (80,443,8080,8443), RDP (3389), WinRM (5985,5986),
# MySQL (3306), MS-SQL (1433), Kerberos (88). The combination of LDAP
# enumeration + this exact port set is rare in benign tooling.
defaults:
  platforms: [windows, unix]
  for: [pe, dll, csharp]
  attack: T1046
  mbc: E1046
traits:
  - id: smb-port-pair
    desc: SMB port pair (139,445)
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\b139\b[^\n]{0,40}\b445\b|\b445\b[^\n]{0,40}\b139\b'
  - id: winrm-port-pair
    desc: WinRM port pair (5985,5986)
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b5985\b[^\n]{0,40}\b5986\b|\b5986\b[^\n]{0,40}\b5985\b'
  - id: rdp-port
    desc: RDP port 3389
    crit: component
    conf: 0.7
    if:
      type: text
      word: '3389'
  - id: kerberos-port
    desc: Kerberos port 88
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '(?i)(kerberos|krb5).{0,30}\b88\b|\b88\b.{0,30}(kerberos|krb5)'
  - id: mssql-port
    desc: MS-SQL port 1433
    crit: component
    conf: 0.7
    if:
      type: text
      word: '1433'
  - id: mysql-port
    desc: MySQL port 3306
    crit: component
    conf: 0.7
    if:
      type: text
      word: '3306'
  - id: ldap-search-api
    desc: LDAP search API usage
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: '^ldap_search(_s[tw]?|_ext[ws]?)?$'
  - id: dotnet-directory-searcher
    desc: DirectorySearcher API usage
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bDirectorySearcher\b|System\.DirectoryServices'
composite_rules:
  - id: domain-multi-service-port-sweep
    desc: Internal multi-service port sweep (Windows + DB + Kerberos)
    crit: suspicious
    conf: 0.93
    needs: 4
    any:
      - id: smb-port-pair
      - id: winrm-port-pair
      - id: rdp-port
      - id: kerberos-port
      - id: mssql-port
      - id: mysql-port
  - id: ldap-and-port-sweep
    desc: LDAP enumeration with multi-port sweep
    crit: hostile
    conf: 0.96
    any:
      - id: ldap-search-api
      - id: dotnet-directory-searcher
    all:
      - id: domain-multi-service-port-sweep
