# Obfuscated bulk domain-scan orchestrator (toolkit entry point).
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. This is the top-level runner that drives the whole
# scan/harvest/verify pipeline: it reads a target-domain file, fans work across a
# bounded worker pool under per-domain time budgets, tracks a bulk fault state,
# and bundles the scan output/summary. These identifiers are attack-context-
# specific fragments of that toolkit; convicts only when several co-occur inside
# obfuscator.io-obfuscated code (T1595 active scanning of victim infrastructure).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1595
  mbc: E1595

traits:
  - id: scan-redirect-domain-file
    desc: scanRedirectDomainFile target-list scanner
    crit: component
    conf: 0.8
    if:
      type: text
      substr: scanRedirectDomainFile
  - id: scan-process-summary
    desc: scanProcessSummary bulk-scan summarizer
    crit: component
    conf: 0.8
    if:
      type: text
      substr: scanProcessSummary
  - id: close-output-bundle
    desc: closeOutputBundle scan-output bundler
    crit: component
    conf: 0.8
    if:
      type: text
      substr: closeOutputBundle
  - id: bulk-fault-state
    desc: BULK_FAULT_STATE bulk-run fault tracker
    crit: component
    conf: 0.8
    if:
      type: text
      substr: BULK_FAULT_STATE
  - id: scan-task-success
    desc: scanTaskSuccess per-target scan result
    crit: component
    conf: 0.8
    if:
      type: text
      substr: scanTaskSuccess

composite_rules:
  # Require the distinctive target-domain-file reader; the scan-progress atoms
  # (scanProcessSummary/scanTaskSuccess/…) are shared by every scan engine, so
  # anchoring on them alone mislabels sibling engines (verifiers, debouncers).
  - id: bulk-scan-orchestrator-api
    desc: Private bulk domain-scan orchestrator API
    crit: suspicious
    conf: 0.9
    all:
      - id: scan-redirect-domain-file
    any:
      - id: scan-process-summary
      - id: close-output-bundle
      - id: bulk-fault-state
      - id: scan-task-success
  - id: obfuscated-bulk-scan-orchestrator
    desc: Obfuscated bulk domain-scan orchestrator entry point
    crit: hostile
    conf: 0.95
    all:
      - id: bulk-scan-orchestrator-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
