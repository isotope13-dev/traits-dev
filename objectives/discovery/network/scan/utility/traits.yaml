defaults:
  for: [scripts, binaries]
  attack: T1046
  platforms:
    - unix
traits:
  - id: masscan-cmd
    desc: masscan network scanner command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \bmasscan\s+[0-9./]+
    not:
      - substr: .TH "MASSCAN"
      - substr: Fast scan of the Internet
      - substr: masscan <ip addresses/ranges>
  - id: masscan-rate
    desc: masscan with rate option
    crit: suspicious
    unless:
      - id: well-known/tool/offensive/pentestkit/
    conf: 0.85
    if:
      type: text
      regex: masscan\s+.{0,64}--?rate\s+[0-9]+
  - id: masscan-output
    desc: masscan output file pattern
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: masscan\s+.{0,64}-oL\s+
  - id: zgrab-cmd
    desc: zgrab banner grabber command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \bzgrab\s+
  - id: zgrab-senders
    desc: zgrab with concurrent senders
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: zgrab\s+.{0,64}--senders\s+[0-9]+
  - id: zgrab-http
    desc: zgrab HTTP probing
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: zgrab\s+.{0,64}--http=
  - id: pnscan-cmd
    desc: pnscan parallel network scanner
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \bpnscan\s+
  - id: pnscan-response
    desc: pnscan response pattern match
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: pnscan\s+.{0,64}-R\s+[0-9a-fA-F ]+
  - id: docker-api-port-scanner
    desc: Docker API port (2375) with scanner keywords
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (scan|masscan|zgrab|nmap).{0,64}2375
  - id: docker-api-port-direct
    desc: Docker API port (2375) with docker keyword
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 2375.{0,32}docker|docker.{0,32}2375
composite_rules:
  - id: go-recon-portscan-manifest
    desc: Go recon portscan manifest
    crit: suspicious
    conf: 0.9
    for: [go.mod]
    all:
      - id: metadata/import/package::direct-port-scanner-dependency
    any:
      - id: metadata/import/package::direct-host-info-dependency
      - id: metadata/import/package::direct-binary-reader-dependency
    needs: 2
  - id: docker-api-port
    desc: Docker API port reference
    crit: suspicious
    conf: 0.85
    attack: T1595.001
    any:
      - id: docker-api-port-scanner
      - id: docker-api-port-direct
  - id: masscan
    desc: masscan network scanner execution
    crit: suspicious
    conf: 0.9
    any:
      - id: masscan-cmd
      - id: masscan-rate
      - id: masscan-output
  - id: zgrab
    desc: zgrab banner grabber execution
    crit: suspicious
    conf: 0.9
    any:
      - id: zgrab-cmd
      - id: zgrab-senders
      - id: zgrab-http
  - id: pnscan
    desc: pnscan network scanner execution
    crit: suspicious
    conf: 0.9
    any:
      - id: pnscan-cmd
      - id: pnscan-response
  - id: docker-api-scan
    desc: Docker API exploitation scanning
    crit: hostile
    conf: 0.95
    attack: T1595.001
    all:
      - id: docker-api-port
      - id: micro-behaviors/communications/http/url/path::http-api-version-path
      - id: zgrab-senders
    any:
      - id: masscan-cmd
      - id: zgrab-cmd
      - id: pnscan-cmd
