# Obfuscated multi-source vulnerability scanner.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. This module scans target infrastructure for
# weaknesses across several sources — live website probing, leaked-data lookups,
# Shodan records, and its own SMTP probes — normalizes and severity-ranks the
# hits into vulnerability findings, and deep-probes promising targets. These
# identifiers are attack-context-specific fragments of that toolkit; convicts
# only when several co-occur inside obfuscator.io-obfuscated code (T1595.002
# active vulnerability scanning of victim infrastructure).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1595.002
  mbc: E1595

traits:
  - id: analyze-website-vulnerabilities
    desc: analyzeWebsiteVulnerabilities web scanner
    crit: component
    conf: 0.8
    if:
      type: text
      substr: analyzeWebsiteVulnerabilities
  - id: analyze-shodan-vulnerabilities
    desc: analyzeShodanVulnerabilities Shodan scanner
    crit: component
    conf: 0.8
    if:
      type: text
      substr: analyzeShodanVulnerabilities
  - id: analyze-webleak-vulnerabilities
    desc: analyzeWebLeakVulnerabilities leak scanner
    crit: component
    conf: 0.8
    if:
      type: text
      substr: analyzeWebLeakVulnerabilities
  - id: analyze-probe-vulnerabilities
    desc: analyzeProbeVulnerabilities probe scanner
    crit: component
    conf: 0.8
    if:
      type: text
      substr: analyzeProbeVulnerabilities
  - id: deep-vuln-probe
    desc: deepVulnProbe targeted deep vuln probe
    crit: component
    conf: 0.8
    if:
      type: text
      substr: deepVulnProbe

composite_rules:
  - id: multi-source-vuln-scan-api
    desc: Private multi-source vulnerability-scan API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: analyze-website-vulnerabilities
      - id: analyze-shodan-vulnerabilities
      - id: analyze-webleak-vulnerabilities
      - id: analyze-probe-vulnerabilities
      - id: deep-vuln-probe
  - id: obfuscated-multi-source-vuln-scanner
    desc: Obfuscated multi-source vulnerability scanner
    crit: hostile
    conf: 0.95
    all:
      - id: multi-source-vuln-scan-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
