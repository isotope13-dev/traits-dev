# Go-based network scanning tools and RAT-embedded scanner dispatchers
# Detects Go source code that wraps network scanning tools (GoMap/nmap)
# or dispatches network scanning to a remote client via RPC.
# ATT&CK: T1046 (Network Service Discovery)
# MBC: E1046 (Network Service Scanning)
defaults:
  platforms: [linux, macos, windows, unix]
  for: [go]
  attack: T1046
  mbc: E1046

traits:
  # GoMap is a Go-native nmap equivalent used embedded in RATs.
  # The help text explicitly says "usage nmap <ip>" showing nmap intent.
  - id: go-gomap-rpc-call
    desc: Go GoMap RPC network scan dispatch
    crit: notable
    conf: 0.88
    if:
      type: raw
      substr: "API.Gomap"

  # GomapLocal scans the entire local network — aggressive recon
  - id: go-gomaplocal-rpc-call
    desc: Go GoMap local network scan dispatch
    crit: notable
    conf: 0.88
    if:
      type: raw
      substr: "API.GomapLocal"

  # "up to N minutes" timeout message is characteristic of embedded scanners
  # that warn operators about long scan times
  - id: go-scan-time-warning
    desc: Network scan time warning to operator
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: "up to [0-9]+ minute"

composite_rules:
  - id: go-rpc-network-scanner
    desc: Go RAT-embedded network scanner via RPC
    crit: suspicious
    conf: 0.92
    all:
      - id: go-scan-time-warning
    any:
      - id: go-gomap-rpc-call
      - id: go-gomaplocal-rpc-call
