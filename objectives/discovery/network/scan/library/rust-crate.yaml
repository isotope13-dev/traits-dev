defaults:
  platforms: [linux, macos, windows]
  for: [crate]
  attack: T1046
  mbc: E1046

traits:
  - id: crate-client-poll-module
    desc: Rust crate client poll module
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/client/poll\.rs$'
  - id: crate-client-http-module
    desc: Rust crate client HTTP module
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/client/http\.rs$'
  - id: crate-client-crypto-module
    desc: Rust crate client crypto module
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/client/crypto\.rs$'
  - id: crate-payload-helpers-module
    desc: Rust crate payload helpers module
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/payload_helpers\.rs$'

  - id: crate-waf-oracle-web-rules
    desc: Rust crate WAF web oracle rules
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/rules/(ssrf|xss|ssti)/'

  - id: crate-waf-oracle-injection-rules
    desc: Rust crate WAF injection oracle rules
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/rules/(path_traversal|cmd)/'

  - id: crate-waf-oracle-web-engines
    desc: Rust crate WAF web oracle engines
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/(ssrf|xss|ssti)\.rs$'

  - id: crate-waf-oracle-injection-engines
    desc: Rust crate WAF injection oracle engines
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/(sql|cmdi|response_oracle)\.rs$'
composite_rules:
  - id: crate-oast-client-layout
    desc: Rust crate OAST client layout
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: crate-client-poll-module
      - id: crate-client-http-module
      - id: crate-client-crypto-module
      - id: crate-payload-helpers-module
  - id: crate-waf-oracle-scanner-layout
    desc: Rust crate WAF oracle scanner layout
    crit: suspicious
    conf: 0.94
    needs: 2
    any:
      - id: crate-waf-oracle-web-rules
      - id: crate-waf-oracle-injection-rules
      - id: crate-waf-oracle-web-engines
      - id: crate-waf-oracle-injection-engines
