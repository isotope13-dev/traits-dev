defaults:
  platforms: [linux, macos, windows]
  for: [crate]
  attack: T1046
  mbc: E1046

traits:
  - id: crate-oast-client-layout
    desc: Rust crate OAST client layout
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/(client/(poll|http|crypto)|payload_helpers)\.rs$'

  - id: crate-waf-oracle-web-rules
    desc: Rust crate WAF web oracle rules
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/rules/(ssrf|xss|ssti)/'

  - id: crate-waf-oracle-injection-rules
    desc: Rust crate WAF injection oracle rules
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/rules/(path_traversal|cmd)/'

  - id: crate-waf-oracle-web-engines
    desc: Rust crate WAF web oracle engines
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/(ssrf|xss|ssti)\.rs$'

  - id: crate-waf-oracle-injection-engines
    desc: Rust crate WAF injection oracle engines
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/(sql|cmdi|response_oracle)\.rs$'
