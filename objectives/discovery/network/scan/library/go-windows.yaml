defaults:
  platforms: [windows]
  for: [pe]
  attack: T1046

traits:
  - id: go-automotive-interface-scanner
    desc: Go automotive interface scanner
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'vin_scanner\.(GetAvailableInterfaces|scan(ENET|ICOM|DOIP)Devices)\b'

  - id: go-vin-packet-scanner
    desc: Go VIN packet scanner
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(vin_scanner\.)?extractVINFromAnyPacket\b|main\.startVinScan\b'
