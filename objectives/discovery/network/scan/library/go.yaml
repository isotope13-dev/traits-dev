defaults:
  platforms: [windows, linux, macos]
  for: [go]
  mbc: E1046
  attack: T1046

traits:
  - id: anvie-port-scanner-import
    desc: anvie port-scanner import
    crit: suspicious
    conf: 0.94
    if:
      type: symbol
      kind: import
      exact: github.com/anvie/port-scanner

  - id: anvie-port-scanner-package-binary
    desc: anvie port-scanner package reference
    crit: suspicious
    conf: 0.92
    for: [binaries]
    platforms: [unix, windows]
    if:
      type: text
      substr: github.com/anvie/port-scanner

  - id: go-new-portscanner-call
    desc: Go port scanner constructor
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: portscanner.NewPortScanner

  - id: go-get-opened-port-call
    desc: Go opened-port scan call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)GetOpenedPort$'

composite_rules:
  - id: go-portscanner-range-probe
    desc: Go portscanner range probe
    crit: suspicious
    conf: 0.95
    near_lines: 32
    all:
      - id: anvie-port-scanner-import
      - id: go-new-portscanner-call
      - id: go-get-opened-port-call
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
