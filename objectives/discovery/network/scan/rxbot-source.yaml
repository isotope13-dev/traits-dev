defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  for: [binaries, scripts, source, manifests, documents, media, data]
  size_max: 2097152

traits:
  - id: family-banner
    desc: RxBot source tree banner
    crit: suspicious
    conf: 0.98
    attack: T1583.005
    if:
      type: string
      substr: "rxBot0.6.6d-priv+stable-CoKeHeAd"

  - id: advscan-module
    desc: RxBot advscan module path
    crit: suspicious
    conf: 0.98
    attack: T1046
    if:
      type: string
      substr: "advscan.cpp"

  - id: advscan-header
    desc: RxBot advscan header path
    crit: suspicious
    conf: 0.95
    attack: T1046
    if:
      type: string
      substr: "advscan.h"

  - id: aliaslog-module
    desc: RxBot aliaslog module path
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "aliaslog.cpp"

  - id: hardcoded-endpoint
    desc: Hardcoded RxBot network endpoint
    crit: suspicious
    conf: 0.9
    attack: T1071
    if:
      type: string
      exact: "202.154.180.20:5100"

  - id: rar-v4-header
    desc: RAR v4 archive header
    crit: baseline
    conf: 0.99
    if:
      type: hex
      pattern: "52 61 72 21 1A 07 00"
      offset: 0

composite_rules:
  - id: rxbot-advscan-source-archive
    desc: RxBot advscan source archive
    crit: suspicious
    conf: 0.99
    all:
      - id: rar-v4-header
      - id: family-banner
      - id: advscan-module
      - id: advscan-header

  - id: rxbot-advscan-exploit-scanner
    desc: RxBot multithreaded exploit scanner
    crit: hostile
    conf: 0.99
    attack: T1046
    mbc: B0040
    all:
      - id: rxbot-advscan-source-archive
      - id: hardcoded-endpoint

  - id: rxbot-payload-delivery-source
    desc: RxBot self-propagating payload delivery
    crit: hostile
    conf: 0.96
    attack: T1105
    mbc: B0020
    all:
      - id: rxbot-advscan-source-archive
      - id: aliaslog-module
