defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  attack: T1046
traits:
  - id: redis-kube-ports
    desc: Redis Kubernetes port pair
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\b(6379|6443)\b'
    count_min: 2
  - id: ray-mongo-ports
    desc: Ray MongoDB port pair
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\b(8265|27017)\b'
    count_min: 2
  - id: commoncrawl-host-source
    desc: Common Crawl host source
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'Common\s*Crawl|commoncrawl|data\.commoncrawl\.org'
  - id: parquet-host-column
    desc: Parquet hostname column
    crit: component
    conf: 0.88
    if:
      type: text
      substr: url_host_name
  - id: cloud-range-public-providers
    desc: Cloud provider brand name fragment
    crit: component
    conf: 0.4
    count_min: 3
    unless:
      - id: well-known/app/crunr
      - id: well-known/tool/detection/sast::python-secret-rule-catalog
    if:
      type: text
      regex: '\b(AWS|Azure|Cloudflare|Fastly)\b'
  - id: cloud-range-google-providers
    desc: Google Cloud range providers
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b(Google Cloud|GCP|Cloudfront)\b'
composite_rules:
  - id: docker-port-pair
    desc: Docker management port pair
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/os/container/runtime::docker-api-port-2375
      - id: micro-behaviors/os/container/runtime::docker-api-port-2376
  - id: cloud-management-port-cluster
    desc: Cloud management service port cluster
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: docker-port-pair
      - id: redis-kube-ports
      - id: ray-mongo-ports
  - id: commoncrawl-parquet-host-source
    desc: Common Crawl parquet host source
    crit: suspicious
    conf: 0.94
    all:
      - id: commoncrawl-host-source
      - id: parquet-host-column
  - id: cloud-range-provider-catalog
    desc: Cloud provider range catalog
    crit: component
    conf: 0.86
    any:
      - id: cloud-range-public-providers
      - id: cloud-range-google-providers
    needs: 2
  - id: exposed-cloud-service-scanner
    desc: Exposed cloud service scanner
    crit: suspicious
    conf: 0.94
    all:
      - id: cloud-management-port-cluster
    any:
      - id: commoncrawl-parquet-host-source
      - id: cloud-range-provider-catalog
      - id: objectives/lateral-movement/exploit/scanner::scanner-context
    unless:
    - id: micro-behaviors/process/create/shell/host/
    - id: well-known/tool/detection/sast/
    - id: metadata/library/data::pulumi-python-provider-generated
