defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: dns-amplification-scanner
    desc: Detects DNS amplification scanning tools (manual header + raw sockets)
    crit: hostile
    all:
      - id: "micro-behaviors/communications/dns/struct::dns-header-struct-def"
      - id: "micro-behaviors/communications/dns/struct::dns-header-rd-field"
      - id: micro-behaviors/communications/dns/client
      - id: "micro-behaviors/communications/socket/raw::raw-socket-creation-regex"
  - id: dns-amplification-scanner-weak
    desc: Detects potential DNS scanning behavior (recursion flags + scanning loop)
    crit: notable
    all:
      - id: micro-behaviors/communications/dns/client
    any:
      - id: "micro-behaviors/communications/socket/send::sendto-struct-usage"
      - id: "micro-behaviors/communications/socket/raw::raw-socket-creation-regex"
