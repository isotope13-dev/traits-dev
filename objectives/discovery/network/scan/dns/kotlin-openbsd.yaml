defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1046

traits:
  - id: kotlin-zone-transfer-label
    desc: Kotlin zone transfer label
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Attempting DNS zone transfer

  - id: kotlin-target-dns-port-connect
    desc: Kotlin target DNS port connect
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: InetSocketAddress(target, 53)

composite_rules:
  - id: kotlin-openbsd-dns-zone-probe
    desc: Kotlin OpenBSD DNS zone probe
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-zone-transfer-label
      - id: kotlin-target-dns-port-connect

