defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]
  mbc: E1046
  attack: T1046

traits:
  - id: banner-then-grab-symbol-text
    desc: Banner grab symbol text
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)(^|[./])banner.{0,12}grab([^A-Za-z0-9_]|$)'

  - id: grab-then-banner-symbol-text
    desc: Grab banner symbol text
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)(^|[./])grab.{0,12}banner([^A-Za-z0-9_]|$)'

composite_rules:
  - id: banner-grab-symbol-binary
    desc: Banner grab symbol binary
    crit: notable
    conf: 0.86
    any:
      - id: banner-then-grab-symbol-text
      - id: grab-then-banner-symbol-text

  - id: go-tcp-banner-grab-binary
    desc: Go TCP banner grab binary
    crit: suspicious
    conf: 0.94
    all:
      - id: banner-grab-symbol-binary
      - id: micro-behaviors/communications/socket/connect::go-net-dialtimeout-text
      - id: micro-behaviors/communications/socket/options::go-set-read-deadline-text
    unless:
      - id: well-known/tool/detection/
