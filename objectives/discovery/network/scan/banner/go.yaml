defaults:
  platforms: [windows, linux, macos]
  for: [go]
  mbc: E1046
  attack: T1046

traits:
  - id: go-banner-grab-function-name
    desc: Go banner grab function name
    crit: notable
    conf: 0.82
    if:
      type: symbol
      kind: function
      regex: '(?i)(banner.{0,12}grab|grab.{0,12}banner)'

composite_rules:
  - id: go-tcp-banner-read-probe
    desc: Go TCP banner read probe
    crit: suspicious
    conf: 0.9
    near_lines: 24
    all:
      - id: micro-behaviors/communications/socket/connect::dial-timeout-tcp
      - id: micro-behaviors/communications/socket/options::go-set-read-deadline-call
      - id: micro-behaviors/communications/socket/receive::go-socket-read-call
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
      - id: metadata/package/testing/presence/harness::test-directory-path
      - id: micro-behaviors/communications/ip/literal::localhost-source

  - id: go-tcp-banner-grab-probe
    desc: Go TCP banner grab probe
    crit: suspicious
    conf: 0.94
    near_lines: 30
    all:
      - id: go-tcp-banner-read-probe
    any:
      - id: go-banner-grab-function-name
      - id: micro-behaviors/communications/ip/literal::loopback-ipv4-source
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
      - id: metadata/package/testing/presence/harness::test-directory-path
      - id: micro-behaviors/communications/ip/literal::localhost-source
