# Obfuscated concurrent SMTP service prober/scanner.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. The scanning engine survives with a distinctive,
# un-encrypted private API that opens raw TCP/TLS sockets to candidate mail
# hosts, reads the SMTP greeting (distinguishing SMTP from non-SMTP banners),
# issues EHLO, and probes implicit-TLS / plain+STARTTLS upgrade paths across a
# worker pool. These identifiers are attack-context-specific fragments of that
# toolkit; convicts only when several co-occur inside obfuscator.io-obfuscated
# code (T1046 network-service discovery of mail servers).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1046
  mbc: E1046

traits:
  - id: probe-implicit-tls
    desc: probeImplicitTls SMTP implicit-TLS prober
    crit: component
    conf: 0.8
    if:
      type: text
      substr: probeImplicitTls
  - id: probe-plain-starttls
    desc: probePlainStartTls SMTP STARTTLS prober
    crit: component
    conf: 0.8
    if:
      type: text
      substr: probePlainStartTls
  - id: try-starttls-upgrade
    desc: tryStartTlsUpgrade STARTTLS upgrade probe
    crit: component
    conf: 0.8
    if:
      type: text
      substr: tryStartTlsUpgrade
  - id: is-smtp-greeting
    desc: isSmtpGreeting SMTP banner classifier
    crit: component
    conf: 0.8
    if:
      type: text
      substr: isSmtpGreeting
  - id: is-non-smtp-greeting
    desc: isNonSmtpGreeting non-SMTP banner filter
    crit: component
    conf: 0.8
    if:
      type: text
      substr: isNonSmtpGreeting
  - id: read-smtp-response
    desc: readSmtpResponse SMTP reply reader
    crit: component
    conf: 0.8
    if:
      type: text
      substr: readSmtpResponse

composite_rules:
  - id: smtp-service-probe-api
    desc: Private concurrent SMTP service-probe API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: probe-implicit-tls
      - id: probe-plain-starttls
      - id: try-starttls-upgrade
      - id: is-smtp-greeting
      - id: is-non-smtp-greeting
      - id: read-smtp-response
  - id: obfuscated-smtp-service-prober
    desc: Obfuscated concurrent SMTP service prober/scanner
    crit: hostile
    conf: 0.95
    all:
      - id: smtp-service-probe-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
