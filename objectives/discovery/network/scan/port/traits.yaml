defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1046
  mbc: E1046
traits:
  - id: ip-format
    desc: IP address format string (scanning
    crit: component
    conf: 0.6
    for:
      - python
      - javascript
    if:
      type: string_literal
      substr: '%d.%d.%d.%d'
  - id: target-ip
    desc: Target IP (case variants)
    crit: notable
    conf: 0.5
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: (Target|target)[_\s]?[Ii][Pp]
  - id: target-ip-camel
    desc: targetIP camelCase
    crit: notable
    conf: 0.5
    for:
      - python
      - javascript
    if:
      type: string_literal
      substr: targetIP
  - id: random-target-word
    desc: Random target (case variants)
    crit: notable
    conf: 0.6
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: (Random|random)[_\s]?[Tt]arget
  - id: random-ip
    desc: Random IP (case variants)
    crit: notable
    conf: 0.6
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: (Random|random)[_\s]?IP
  - id: getrandip
    desc: getrandip function
    crit: notable
    conf: 0.6
    for:
      - python
      - javascript
    if:
      type: string_literal
      substr: getrandip
  - id: portscan-word
    desc: PortScan keyword
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: \b[Pp]ort[Ss]can\b
  - id: scan-port
    desc: scan port keyword
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: scan[_\s]?[Pp]ort
  - id: port-scan
    desc: port scan keyword
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: '[Pp]ort[_\s]?[Ss]can'
  - id: banner-grab
    desc: Banner grab keyword
    crit: notable
    conf: 0.5
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: '[Bb]anner[_\s]?[Gg]rab'
  - id: target-host
    desc: target host keyword
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    # Identifier form only (target_host / targetHost), not the prose "target host".
    if:
      type: string_literal
      regex: '\b(target_host|targetHost)\b'
  - id: target-port
    desc: target port keyword
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    # Identifier form only (target_port / targetPort), not the prose "target port".
    if:
      type: string_literal
      regex: target_?port
      case_insensitive: true
    not:
      - substr: targetPort
      - substr: newForward.targetPort
      - substr: fw.targetPort
      - substr: Add a port forward
      - substr: SOCKS proxy
  - id: target-range
    desc: target range keyword
    crit: component
    conf: 0.5
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: \btarget[_\s]+range\b
      case_insensitive: true
  - id: target-list
    desc: target list keyword
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    # Identifier form only (target_list / targetList). "target list" as an
    # English phrase (e.g. "Appends tasks to target list") is prose, not a symbol.
    if:
      type: string_literal
      regex: '\btarget(_list|List)\b'
  - id: target-addr-dup
    desc: target addr keyword
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    # Identifier form only (target_addr / targetAddr), not the prose "target addr".
    if:
      type: string_literal
      regex: target_?addr
      case_insensitive: true
    not:
      - substr: targetAddr
      - substr: newForward.targetAddress
      - substr: fw.targetAddress
      - substr: Add a port forward
      - substr: SOCKS proxy
  - id: scan-target
    desc: scan target keyword
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    # Identifier form only (scan_target / scanTarget). A space-separated phrase
    # ("recursive scan target" in a docstring) is prose, not a scanner symbol.
    if:
      type: string_literal
      regex: scan_?target
      case_insensitive: true
  - id: brute-force-ref
    desc: Brute force attack reference
    crit: component
    conf: 0.85
    attack: T1110
    count_min: 3
    if:
      type: string_literal
      regex: '[Bb]rute[_\-\s]?[Ff]orce'
    unless:
      - id: well-known/lib/zxcvbn::zxcvbn-ranked-dictionaries
  - id: weak-pass-admin123-upper
    desc: Weak password Admin123
    crit: notable
    conf: 0.5
    attack: T1110.001
    for:
      - python
      - javascript
    if:
      type: string_literal
      substr: Admin123
  - id: weak-pass-passw0rd
    desc: Weak password Passw0rd
    crit: notable
    conf: 0.7
    attack: T1110.001
    for:
      - python
      - javascript
    if:
      type: string_literal
      substr: Passw0rd
  - id: root-the-phrase
    desc: Root the phrase (hacker slang)
    crit: notable
    conf: 0.6
    attack: T1068
    for:
      - python
      - javascript
    if:
      type: string_literal
      substr: 'root the '
  - id: r00t-leet
    desc: r00t leetspeak
    crit: notable
    conf: 0.6
    attack: T1068
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: r00t[^a-zA-Z]
  - id: sym-socket
    desc: socket function symbol
    crit: component
    conf: 0.4
    for:
      - python
      - javascript
    if:
      type: symbol
      regex: ^_?socket$
  - id: probing-keyword
    desc: Probing keyword (explicit scanning intent)
    crit: component
    conf: 0.75
    if:
      type: text
      regex: \b[Pp]robing\b
    not:
      - substr: transport
      - substr: Transport
    unless:
      - id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: port-number-ftp
    desc: FTP port number (21)
    crit: component
    conf: 0.6
    unless:
      - id: metadata/file/text/catalog::uproc-tools-catalog
      - id: metadata/file/text/catalog::vscode-php-global-functions-catalog
    if:
      type: text
      regex: (?i)(ftp|port|connect).{0,20}[:\s]21\b
  - id: port-number-ssh
    desc: SSH port number (22)
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)ssh.{0,20}[:\\s]22\b
  - id: port-number-http
    desc: HTTP port number (80)
    crit: component
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: text
      regex: (?i)\b(http|port|web|connect)\b.{0,20}[:\s]80\b
    not:
      - substr: port of 80
      - substr: WebProxy(
      - substr: webproxy(
      - substr: '? 443 : 80'
      - regex: (?i)https?://[A-Za-z0-9._%-]+(:[^/\s@]+)?(:80\b|/.*:80\b)
  - id: port-number-https-1
    desc: HTTPS port (443) variants (https/port/ssl)
    crit: component
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/file/text/catalog::uproc-tools-catalog
    if:
      type: text
      regex: (?i)\b(https|port|ssl)\b.{0,20}[:\s]443\b
    not:
      - substr: '? 443 : 80'
      - substr: port = this.ssl ? 443
      - substr: https://example.com:443
  - id: port-number-https-2
    desc: HTTPS port (443) variants (tls/connect)
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (?i)\b(tls|connect)\b.{0,20}[:\s]443\b
    not:
      - substr: '? 443 : 80'
  - id: cidr-literal
    desc: CIDR network range literal
    crit: component
    conf: 0.6
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: \b\d+\.\d+\.\d+\.\d+/\d+\b
    not:
      - substr: pg_hba.conf
      - substr: trust
  - id: rpc-enum-pmap
    desc: RPC portmapper enumeration function
    crit: notable
    conf: 0.95
    for:
      - python
      - javascript
    if:
      type: symbol
      regex: ^_?pmap_(getmaps|clnt_call|getport)$
  - id: probe-word-core-prefix
    desc: Generic probe keyword (network probe)
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bnetwork[_\-\s]?probe\b
      case_insensitive: true
    unless:
      - id: metadata/package/fields/vendor::bitdefender-ecnet-telemetry
  - id: probe-word-core-suffix-1
    desc: Generic probe keyword (probe port/host/target)
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bprobe[_\-\s]?(port|host|target)\b
      case_insensitive: true
    unless:
      - id: metadata/binary/section/content::freebsd-kernel-image
      - id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: probe-word-core-suffix-2
    desc: Generic probe keyword (probe scan/packet)
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bprobe[_\-\s]?(scan|packet)\b
      case_insensitive: true
    unless:
      - id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: probe-word-proto
    desc: Protocol probe keyword
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: \b(tcp|udp|icmp)[_\-\s]?probe\b
      case_insensitive: true
composite_rules:
  - id: port-number-https
    desc: HTTPS port number (443)
    crit: component
    conf: 0.6
    any:
      - id: port-number-https-1
      - id: port-number-https-2
  - id: scan-context-keywords
    desc: Scan context keyword cluster
    crit: notable
    conf: 0.6
    any:
      - id: port-ref
      - id: probe-ref
      - id: target-ref
  - id: cidr-range
    desc: CIDR range used in scan context
    crit: notable
    conf: 0.6
    all:
      - id: cidr-literal
      - id: scan-context-keywords
  - id: probe-word-core
    desc: Generic probe keyword
    crit: notable
    conf: 0.4
    any:
      - id: probe-word-core-prefix
      - id: probe-word-core-suffix-1
      - id: probe-word-core-suffix-2
  - id: target-ip-ref
    desc: References target IP concept
    crit: notable
    conf: 0.75
    for:
      - python
      - javascript
    any:
      - id: target-ip
      - id: target-ip-camel
  - id: random-target
    desc: Random target/IP generation
    crit: notable
    conf: 0.8
    for:
      - python
      - javascript
    any:
      - id: random-target-word
      - id: random-ip
      - id: getrandip
  - id: port-ref
    desc: Port scanning terminology
    crit: notable
    conf: 0.5
    for:
      - python
      - javascript
    any:
      - id: portscan-word
      - id: scan-port
      - id: port-scan
  - id: probe-ref
    desc: Network probing terminology
    crit: notable
    conf: 0.6
    for:
      - python
      - javascript
    any:
      - id: probe-word
      - id: banner-grab
  - id: probe-word
    desc: Probe keyword
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    any:
      - id: probe-word-core
      - id: probe-word-proto
  - id: target-ref
    desc: Scan target terminology
    crit: notable
    conf: 0.6
    for:
      - python
      - javascript
    any:
      - id: target-host
      - id: target-port
      - id: target-range
      - id: target-list
      - id: objectives/discovery/network/scan/port::target-addr-dup
      - id: scan-target
  - id: weak-pass-admin123
    desc: Weak password admin123
    crit: notable
    conf: 0.7
    attack: T1110.001
    for:
      - python
      - javascript
    any:
      - id: weak-pass-admin123-upper
      - id: objectives/lateral-movement/brute-force/password::admin123
  - id: weak-pass-qwerty-variants
    desc: Weak password qwerty variants
    crit: notable
    conf: 0.7
    attack: T1110.001
    for:
      - python
      - javascript
    any:
      - id: objectives/lateral-movement/brute-force/password::qwerty123-script
      - id: objectives/lateral-movement/brute-force/password::qwerty-script
    downgrade:
      any:
        - id: micro-behaviors/dylib/library/family::graphics-lib-marker
        - id: micro-behaviors/dylib/library/family::x11-ref
  - id: root-exploit-ref
    desc: Root exploitation terminology (leetspeak/hacker slang)
    crit: notable
    conf: 0.85
    attack: T1068
    for:
      - python
      - javascript
    any:
      - id: root-the-phrase
      - id: r00t-leet
  - id: sym-hostname-resolve
    desc: Hostname resolution function symbols
    crit: notable
    conf: 0.6
    for:
      - python
      - javascript
    any:
      - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
      - id: micro-behaviors/communications/ip/resolve::resolve-getaddrinfo
  - id: sym-socket-connect
    desc: Socket connection function symbols
    crit: notable
    conf: 0.6
    for:
      - python
      - javascript
    any:
      - id: sym-socket
      - id: micro-behaviors/communications/socket/connect::connect-symbol
      - id: micro-behaviors/communications/socket/connect::_connect-symbol
      - id: micro-behaviors/communications/socket/connect::socket-connect-call
  - id: sym-connect
    desc: connect function symbol
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
    any:
      - id: micro-behaviors/communications/socket/connect/
  - id: service-port
    desc: Common service port numbers
    crit: notable
    conf: 0.6
    for:
      - python
      - javascript
    any:
      - id: port-number-ftp
      - id: port-number-ssh
      - id: port-number-http
      - id: port-number-https
  - id: probing-with-ports
    desc: Probing script with service ports
    crit: suspicious
    conf: 0.8
    for:
      - shell
    size_max: 100000
    all:
      - id: probing-keyword
      - id: service-port
