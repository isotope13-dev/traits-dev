defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
  attack: T1046
  mbc: E1046
traits:
- id: ip-format
  desc: IP address format string (scanning
  crit: component
  conf: 0.6
  for:
  - python
  - javascript
  if:
    type: string_literal
    substr: '%d.%d.%d.%d'
- id: target-ip
  desc: target_ip identifier used for scanning
  crit: notable
  conf: 0.5
  for:
  - python
  - javascript
  if:
    type: symbol
    kind: identifier
    exact: target_ip
- id: target-ip-camel
  desc: targetIP identifier used for scanning
  crit: notable
  conf: 0.5
  for:
  - python
  - javascript
  if:
    type: symbol
    kind: identifier
    exact: targetIP
- id: random-target-word
  desc: Random target (case variants)
  crit: notable
  conf: 0.6
  for:
  - python
  - javascript
  if:
    type: string_literal
    regex: (Random|random)[_\s]?[Tt]arget
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: random-ip
  desc: Random IP (case variants)
  crit: notable
  conf: 0.6
  for:
  - python
  - javascript
  if:
    type: string_literal
    regex: (Random|random)[_\s]?IP
- id: getrandip
  desc: getrandip function
  crit: notable
  conf: 0.6
  for:
  - python
  - javascript
  if:
    type: string_literal
    substr: getrandip
- id: portscan-word
  desc: PortScan keyword
  crit: notable
  conf: 0.4
  for:
  - python
  - javascript
  if:
    type: string_literal
    regex: \b[Pp]ort[Ss]can\b
- id: scan-port
  desc: scan port keyword
  crit: notable
  conf: 0.4
  for:
  - python
  - javascript
  if:
    type: string_literal
    regex: scan[_\s]?[Pp]ort
- id: port-scan
  desc: Port-scan keyword
  crit: component
  conf: 0.4
  for:
  - python
  - javascript
  if:
    type: string_literal
    regex: '\b[Pp]ort[_\s]?[Ss]can\b'
- id: banner-grab
  desc: Banner grab keyword
  crit: notable
  conf: 0.5
  for:
  - python
  - javascript
  if:
    type: string_literal
    regex: '[Bb]anner[_\s]?[Gg]rab'
- id: target-port
  desc: target port keyword
  crit: notable
  conf: 0.4
  for:
  - python
  - javascript
    # Identifier form only (target_port / targetPort), not the prose "target port".
  if:
    type: string_literal
    regex: target_?port
    case_insensitive: true
  not:
  - substr: targetPort
  - substr: newForward.targetPort
  - substr: fw.targetPort
  - substr: Add a port forward
  - substr: SOCKS proxy
- id: target-range
  desc: target range keyword
  crit: component
  conf: 0.5
  for:
  - python
  - javascript
  if:
    type: string_literal
    regex: \btarget[_\s]+range\b
    case_insensitive: true
- id: target-addr-dup
  desc: Network-scan target address identifier
  crit: notable
  conf: 0.4
  for:
  - python
  - javascript
    # Identifier form only (target_addr / targetAddr), not the prose "target addr".
  if:
    type: string_literal
    regex: '\btarget_?addr\b'
    case_insensitive: true
  not:
  - substr: targetAddr
  - substr: newForward.targetAddress
  - substr: fw.targetAddress
  - substr: Add a port forward
  - substr: SOCKS proxy
- id: scan-target
  desc: scan target keyword
  crit: notable
  conf: 0.4
  for:
  - python
  - javascript
    # Identifier form only (scan_target / scanTarget). A space-separated phrase
    # ("recursive scan target" in a docstring) is prose, not a scanner symbol.
  if:
    type: string_literal
    regex: scan_?target
    case_insensitive: true
- id: brute-force-ref
  desc: Brute force attack reference
  crit: component
  conf: 0.85
  attack: T1110
  count_min: 3
  if:
    type: string_literal
    regex: '[Bb]rute[_\-\s]?[Ff]orce'
  unless:
  - id: well-known/lib/zxcvbn::zxcvbn-ranked-dictionaries
- id: r00t-leet
  desc: r00t leetspeak
  crit: notable
  conf: 0.6
  attack: T1068
  for:
  - python
  - javascript
  if:
    type: string_literal
    regex: r00t[^a-zA-Z]
- id: probing-keyword
  desc: Probing keyword (explicit scanning intent)
  crit: component
  conf: 0.75
  if:
    type: text
    regex: \b[Pp]robing\b
  not:
  - substr: transport
  - substr: Transport
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: cidr-literal
  desc: CIDR network range literal
  crit: component
  conf: 0.6
  for:
  - python
  - javascript
  if:
    type: string_literal
    regex: \b\d+\.\d+\.\d+\.\d+/\d+\b
  not:
  - substr: pg_hba.conf
  - substr: trust
- id: rpc-enum-pmap
  desc: RPC portmapper enumeration function
  crit: notable
  conf: 0.95
  for:
  - python
  - javascript
  if:
    type: symbol
    regex: ^_?pmap_(getmaps|clnt_call|getport)$
- id: probe-word-core-prefix
  desc: Network-probe keyword fragment
  crit: component
  conf: 0.6
  if:
    type: text
    regex: \bnetwork[_\-\s]?probe\b
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
  - id: well-known/app/k9x-satan::source-tree
- id: probe-word-core-suffix-1
  desc: Probe port/host/target keyword fragment
  crit: component
  conf: 0.6
  if:
    type: text
    regex: \bprobe[_\-\s]?(port|host|target)\b
    case_insensitive: true
  unless:
  - id: metadata/vendor/identity/
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/k9x-satan::source-tree
- id: probe-word-core-suffix-2
  desc: Probe scan/packet keyword fragment
  crit: component
  conf: 0.6
  if:
    type: text
    regex: \bprobe[_\-\s]?(scan|packet)\b
    case_insensitive: true
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/k9x-satan::source-tree
- id: target-host--target-host
  desc: target_host identifier fragment
  crit: component
  conf: 0.4
  for:
  - python
  - javascript
    # Identifier form only (target_host / targetHost), not the prose "target host".
  if:
    type: string_literal
    word: target_host
- id: target-host--targethost
  desc: targetHost identifier fragment
  crit: component
  conf: 0.4
  for:
  - python
  - javascript
    # Identifier form only (target_host / targetHost), not the prose "target host".
  if:
    type: string_literal
    word: targetHost
composite_rules:
- id: target-host
  desc: target host keyword
  crit: notable
  conf: 0.4
  for:
  - python
  - javascript
    # Identifier form only (target_host / targetHost), not the prose "target host".
  all:
  - id: target-host-identifier
  any:
  - id: port-ref
  - id: probe-ref
  - id: target-port
  - id: target-range
  - id: scan-target
- id: target-host-identifier
  desc: Target-host identifier fragments
  crit: component
  conf: 0.4
  for:
  - python
  - javascript
  any:
  - id: target-host--target-host
  - id: target-host--targethost
- id: scan-context-keywords
  desc: Scan-context keyword fragment cluster
  crit: component
  conf: 0.6
  any:
  - id: port-ref
  - id: probe-ref
  - id: target-ref
- id: cidr-range
  desc: CIDR range combined with port-scan target terms
  crit: notable
  conf: 0.6
  all:
  - id: cidr-literal
  - id: port-ref
  - id: target-ref
- id: probe-word-core
  desc: Generic probe keyword fragment
  crit: component
  conf: 0.4
  any:
  - id: probe-word-core-prefix
  - id: probe-word-core-suffix-1
  - id: probe-word-core-suffix-2
- id: target-ip-ref
  desc: References target IP concept
  crit: notable
  conf: 0.75
  for:
  - python
  - javascript
  any:
  - id: target-ip
  - id: target-ip-camel
- id: random-target
  desc: Random target/IP generation
  crit: notable
  conf: 0.8
  for:
  - python
  - javascript
  any:
  - id: random-target-word
  - id: random-ip
  - id: getrandip
- id: port-ref
  desc: Port scanning terminology
  crit: component
  conf: 0.5
  for:
  - python
  - javascript
  any:
  - id: portscan-word
  - id: scan-port
  - id: port-scan
- id: probe-ref
  desc: Network-probing terminology fragment
  crit: component
  conf: 0.6
  for:
  - python
  - javascript
  any:
  - id: probe-word-core
  - id: banner-grab
- id: target-ref
  desc: Network-scan target terminology
  crit: component
  conf: 0.6
  for:
  - python
  - javascript
  any:
  - id: target-host
  - id: target-port
  - id: target-range
  - id: objectives/discovery/network/scan/port::target-addr-dup
  - id: scan-target
- id: weak-pass-admin123
  desc: Weak password admin123
  crit: notable
  conf: 0.7
  attack: T1110.001
  for:
  - python
  - javascript
  any:
  - id: objectives/lateral-movement/brute-force/password::weak-pass-admin123-upper
  - id: objectives/lateral-movement/brute-force/password::admin123
- id: weak-pass-qwerty-variants
  desc: Weak password qwerty variants
  crit: notable
  conf: 0.7
  attack: T1110.001
  for:
  - python
  - javascript
  any:
  - id: objectives/lateral-movement/brute-force/password::qwerty123-script
  - id: objectives/lateral-movement/brute-force/password::qwerty-script
  unless:
  - id: well-known/lib/web-ui-vendors::redoc-library
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family/
    - id: micro-behaviors/dylib/library/family::x11-ref
- id: sym-hostname-resolve
  desc: Hostname resolution function symbols
  crit: notable
  conf: 0.6
  for:
  - python
  - javascript
  any:
  - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
  - id: micro-behaviors/communications/ip/resolve::resolve-getaddrinfo
- id: probing-with-ports
  desc: Probing script with service ports
  crit: suspicious
  conf: 0.8
  for:
  - shell
  size_max: 100000
  all:
  - id: probing-keyword
  - id: micro-behaviors/communications/ip/endpoint::common-service-port
