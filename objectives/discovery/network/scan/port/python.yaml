defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1046

traits:
  - id: python-low-port-range
    desc: Python enumerates a low port range
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\bports\s*=\s*range\(\s*(0|1)\s*,\s*[1-9]\d{2,4}\s*\)'

  - id: python-nmap-portscanner-call
    desc: Python invokes the nmap PortScanner API
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: 'cast().PortScanner'

  - id: python-service-port-table
    desc: Common service port table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bCOMMON_PORTS\s*:\s*dict\s*\[\s*int\s*,\s*tuple\b'

composite_rules:
  - id: python-concurrent-port-range-scan
    desc: Concurrent Python TCP port-range scan
    crit: notable
    conf: 0.96
    all:
      - id: python-low-port-range
      - id: micro-behaviors/communications/socket/connect::socket-connect-ex-method-short
      - id: micro-behaviors/process/create/workers::worker-pool

  - id: python-service-port-scan
    desc: Python probes common service ports
    crit: notable
    conf: 0.95
    all:
      - id: python-service-port-table
    any:
      - id: python-nmap-portscanner-call
      - id: micro-behaviors/communications/socket/tcp::asyncio-open-connection-call
