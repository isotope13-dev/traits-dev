defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1046

traits:
  - id: python-low-port-range
    desc: Python enumerates a low port range
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\bports\s*=\s*range\(\s*(0|1)\s*,\s*[1-9]\d{2,4}\s*\)'

composite_rules:
  - id: python-concurrent-port-range-scan
    desc: Concurrent Python TCP port-range scan
    crit: notable
    conf: 0.96
    all:
      - id: python-low-port-range
      - id: micro-behaviors/communications/socket/connect::socket-connect-ex-method-short
      - id: micro-behaviors/process/create/workers::worker-pool
