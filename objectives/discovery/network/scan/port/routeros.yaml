defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, javascript]
  attack: T1046

traits:
  - id: routeros-ping-sweep-loop
    desc: RouterOS ping sweep loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: ':for\s+\w+\s+from=1\s+to=254[\s\S]{0,520}/ping'

  - id: routeros-winbox-probe
    desc: RouterOS WinBox probe
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(/tool fetch[\s\S]{0,180}:8291|port=8291|\bWinBox\b)'

  - id: routeros-api-probe
    desc: RouterOS API service probe
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/tool fetch[\s\S]{0,180}/api/|port=8728|port=8729)'

composite_rules:
  - id: routeros-api-winbox-scan
    desc: RouterOS API WinBox scan
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-ping-sweep-loop
    any:
      - id: routeros-winbox-probe
      - id: routeros-api-probe
