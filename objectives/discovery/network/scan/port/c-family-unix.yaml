defaults:
  platforms: [qnx, unix]
  for: [c, cpp, objc]
  attack: T1046

traits:
  - id: c-common-service-port-array
    desc: C common service port array
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'int\s+\w*ports\s*\[\]\s*=\s*\{[^\n}]{0,120}\b22\b[^\n}]{0,120}\b80\b[^\n}]{0,120}\b443\b'

  - id: c-port-array-connect-loop
    desc: C loop connects across port array
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'for\s*\([\s\S]{0,160}sizeof\s*\(\s*\w*ports\s*\)[\s\S]{0,500}connect\s*\('

  - id: c-timed-tcp-connect-probe
    desc: C timed TCP connect probe
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'setsockopt\s*\([\s\S]{0,220}SO_SNDTIMEO[\s\S]{0,260}SO_RCVTIMEO[\s\S]{0,500}connect\s*\('

composite_rules:
  - id: c-targeted-port-probe
    desc: C targeted port scan probe
    crit: hostile
    conf: 0.98
    all:
      - id: c-common-service-port-array
      - id: c-port-array-connect-loop
      - id: c-timed-tcp-connect-probe
