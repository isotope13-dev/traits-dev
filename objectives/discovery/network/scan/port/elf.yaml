defaults:
  platforms: [linux]
  for: [elf]
  attack: T1046
  mbc: E1046
traits:
  - id: ip-port-format-string
    desc: IPv4 port status format
    crit: component
    conf: 0.82
    if:
      type: text
      exact: "%d.%d.%d.%d:%d"
  - id: connection-status-messages
    desc: Connection scan status strings
    crit: component
    conf: 0.86
    count_min: 2
    if:
      type: text
      regex: '(Connection refused|Connection timed out|Established \()'
    unless:
      - type: trait
        id: metadata/file/extension::linux-kernel-package-artifact-basename
composite_rules:
  - id: epoll-nonblocking-connect-scan
    desc: Epoll nonblocking connect scanner
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/event/kernel/epoll::epoll-usage
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/communications/ip/parse::inet-addr-symbol
      - id: micro-behaviors/fs/file/handle::fcntl
    any:
      - id: ip-port-format-string
      - id: connection-status-messages
      - id: micro-behaviors/communications/socket/options::options-get
    needs: 2
    unless:
      - id: micro-behaviors/dylib/library/libc::is-libc-binary
      - id: micro-behaviors/dylib/library/family::system-lib-marker
