defaults:
  platforms: [unix]
  attack: T1046
  mbc: E1046
  for: [shell]
traits:
- id: xargs-network-loop
  desc: xargs executing command per line
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: cat\s+\S+\s*\|\s*xargs\s+[^\n]{0,120}-l[^\n]{0,120}\.
- id: xargs-call-script
  desc: xargs executing local script
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: xargs\s+[^\n]{0,120}\./\.[a-z_]+
- id: pipe-loop-pattern
  desc: Pipe to xargs for iteration
  # Component feeding xargs-dotfile-loop. Piping to xargs is neutral iteration,
  # not a standalone port-scan signal. Match genuine per-line/replace xargs
  # flags (-L1, -I{}, -n 1) preceded by whitespace, so the long flags --null
  # and --no-run-if-empty (e.g. `find -print0 | xargs --null rmdir`) no longer
  # match via the old `-[a-z]*l` (which matched the "-null" tail of --null).
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\s*xargs\s+[^\n]{0,80}\s-[LlIin][0-9 {]
- id: script-loops-ips-while
  desc: Script while-loop over IPs
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: while\s+read\s+(ip|host|target|addr)
- id: script-loops-ips-for--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: 'for\s+(ip|target|addr)\s+in'
  count_max: 1019910
- id: script-loops-ips-for--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: 'for\s+host\s+in\s+([0-9]|\$\(\s*(cat|seq|printf))'
  count_max: 1019911
# A bare /.word reference appears in every shell rc (PATH setup, data dirs like
# autojump's ~/.autojump). It is only a scan signal paired with the xargs network
# loop, so this is a component feeding xargs-dotfile-loop, not a standalone
# notable finding under the port-scan node.
- id: dotfiles-in-script
  desc: References hidden scripts
  crit: component
  conf: 0.85
  size_max: 5000
  if:
    type: text
    regex: \./\.\w+|/\.\w+\s
  unless:
  - type: text
    substr: library
      # Exclude common build artifact dotdirs.
  - type: text
    regex: '/\.(libs|git)\b'
      # Exclude common dotfile configs that are not hidden helper scripts.
  - type: text
    regex: '/\.(bazelrc|bashrc|zshrc|profile)\b'
  - type: text
    regex: '/\.(npmrc|yarnrc|curlrc|wgetrc)\b'
      # Exclude SSH home-directory paths; these are dot-directories, not hidden helper scripts.
  - type: text
    regex: '/\.ssh(\b|/)'
  - type: text
    regex: '/\.pki(\b|/)'
- id: script-probes-port-common
  desc: Probes common ports (21/22/23/25)
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '(^|\s)-p\s*2[1235]\b'
- id: script-probes-port-web
  desc: Probes web ports (53/80/443)
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '(-p|--port[= ])\s*(53|80|443)\b'
- id: script-probes-port-mail
  desc: Probes mail/rpc ports (110/139/143)
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '(-p|--port[= ])\s*1(10|39|43)\b'
- id: script-probes-port-other
  desc: Probes other ports (445/3306/3389)
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '(-p|--port[= ])\s*(445|3306|3389)\b'
composite_rules:
- id: script-loops-ips
  desc: Script loops over IP addresses
  crit: notable
  conf: 0.8
  any:
  - id: script-loops-ips-while
  - id: script-loops-ips-for
- id: script-probes-port
  desc: Shell script probes specific port
  crit: notable
  conf: 0.6
  any:
  - id: script-probes-port-common
  - id: script-probes-port-web
  - id: script-probes-port-mail
  - id: script-probes-port-other
- id: xargs-dotfile-loop
  desc: xargs looping with hidden script calls
  crit: suspicious
  conf: 0.9
  all:
  - id: xargs-network-loop
  - id: dotfiles-in-script
  - id: pipe-loop-pattern
- id: script-loops-ips-for
  desc: Script for-loop over IPs
  crit: notable
  conf: 0.75
  any:
  - id: script-loops-ips-for--rx-1
  - id: script-loops-ips-for--rx-2
