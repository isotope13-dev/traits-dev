defaults:
  attack: T1046
  platforms:
  - linux
  - macos
  - windows
  - unix
  - android
  - ios
  for: [scripts, binaries]
composite_rules:
- id: generic-scanner
  desc: Generic network scanning tool
  crit: suspicious
  conf: 0.85
  mbc: E1046
  all:
  - id: sym-hostname-resolve
  - id: sym-socket-connect
  needs: 2
  any:
  - id: ip-format
  - id: port-ref
  - id: probe-ref
  - id: target-ref
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family/
    - id: micro-behaviors/dylib/library/family/
    - id: micro-behaviors/dylib/library/family/
    - id: micro-behaviors/communications/socket/connect/
    - id: micro-behaviors/ui/help/
    - id: metadata/signed/platform::apple
    - id: micro-behaviors/communications/dns/cli::dig
- id: root-scanner
  desc: Root exploitation scanner
  crit: suspicious
  conf: 0.9
  mbc: E1046
  all:
  - id: root-exploit-ref
  any:
  - id: target-ip-ref
  - id: random-target
- id: random-ip-scanner
  desc: Random IP address scanning
  crit: notable
  conf: 0.8
  all:
  - id: random-target
  any:
  - id: sym-socket-connect
  - id: ip-format
- id: nmap-scan-automation
  desc: Automated service port scanning
  crit: suspicious
  conf: 0.85
  mbc: E1046
  all:
  - id: port-ref
  any:
  - id: cidr-range
  - id: service-port
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: metadata/package/quality/false-positives::benign-app-fp-context
  # Cloud-security-product SDKs (e.g. CWP) expose port-scan-detection fields
  # (portScan, Port 80) and doc-example CIDRs (1.1.1.0/24) in their API models.
  - id: well-known/tool/detection/security-scanner::cloud-sdk-api-model
- id: rpc-service-enum
  desc: RPC service enumeration scanner
  crit: suspicious
  conf: 0.9
  mbc: E1046
  all:
  - id: micro-behaviors/communications/socket/rpc::portmapper-client-api
  - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
  downgrade:
    any:
    - id: rpc-service-enum-cond-1--inline-19957
- id: rpc-statd-service-enum
  desc: rpc.statd service enumeration scanner
  crit: suspicious
  conf: 0.96
  mbc: E1046
  for:
  - c
  - elf
  all:
  - id: micro-behaviors/communications/socket/rpc::statd-portmapper-enum
  - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
  any:
  - id: micro-behaviors/time/schedule/timeout/bound::alarm-timeout-handler
  - id: micro-behaviors/communications/ip/parse::inet-addr-symbol
traits:
- id: rpc-service-enum-cond-1--inline-19957
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [unix]
  for: [elf, so]
  if:
    type: basename
    regex: ^lib[^\/]{0,50}\.so(\.[0-9]{1,4}){0,3}$
  unless:
  - id: well-known/app/drivers/
  # Any lib*.so basename matches here; a Go-built shared object is not an
  # rpc-enumeration scanner, so exclude Go binaries (ELF/PE marker — the .so is
  # an ELF, which go-runtime-marker's Mach-O scope would miss).
  - id: metadata/lang/compiler/systems::go-binary
  count_max: 1019958
