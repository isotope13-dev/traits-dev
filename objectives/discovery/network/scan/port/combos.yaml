defaults:
  attack: T1046
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: random-ip-docs-context
    desc: Random IP docs wording
    crit: baseline
    conf: 0.2
    if:
      type: text
      substr: random IP belonging to this country is generated.
composite_rules:
  - id: generic-scanner
    desc: Generic network scanning tool
    crit: suspicious
    conf: 0.85
    mbc: E1046
    all:
      - id: sym-hostname-resolve
      - id: sym-socket-connect
    needs: 2
    any:
      - id: ip-format
      - id: port-ref
      - id: probe-ref
      - id: target-ref
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::debugger-tool-marker
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: micro-behaviors/dylib/library::network-lib-marker
        - id: micro-behaviors/communications/socket/connect::connect
        - id: metadata/package::has-help
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/communications/dns/tools::dig
  - id: root-scanner
    desc: Root exploitation scanner
    crit: suspicious
    conf: 0.9
    mbc: E1046
    all:
      - id: root-exploit-ref
    any:
      - id: target-ip-ref
      - id: random-target
  - id: random-ip-scanner
    desc: Random IP address scanning
    crit: suspicious
    conf: 0.8
    all:
      - id: random-target
    any:
      - id: sym-socket-connect
      - id: ip-format
    unless:
      - id: random-ip-docs-context
  - id: nmap-scan-automation
    desc: Automated nmap network scanning
    crit: suspicious
    conf: 0.85
    mbc: E1046
    all:
      - id: well-known/tools/offensive/frameworks::nmap-ref
      - id: port-ref
    any:
      - id: cidr-range
      - id: service-port
  - id: rpc-service-enum
    desc: RPC service enumeration scanner
    crit: suspicious
    conf: 0.9
    mbc: E1046
    all:
      - id: micro-behaviors/communications/socket/rpc::portmapper-client-api
      - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
    downgrade:
      any:
        - id: micro-behaviors/fs/path/extension::so
        - type: basename
          regex: ^lib[^\/]*\.so(\.[0-9]+)*$
  - id: rpc-statd-service-enum
    desc: rpc.statd service enumeration scanner
    crit: suspicious
    conf: 0.96
    mbc: E1046
    for:
      - c
      - elf
    all:
      - id: micro-behaviors/communications/socket/rpc::statd-portmapper-enum
      - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
    any:
      - id: micro-behaviors/time/schedule/timeout::alarm-timeout-handler
      - id: micro-behaviors/communications/ip/parse::inet-addr-symbol
