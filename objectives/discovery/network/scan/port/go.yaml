defaults:
  platforms: [windows, linux, macos]
  mbc: E1046
  attack: T1046
traits:
  - id: gomap-import
    desc: JustinTimperio gomap port scanning library
    crit: notable
    conf: 0.95
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: '(^|/)JustinTimperio/gomap($|/)'
  - id: gomap-string
    desc: JustinTimperio gomap scanner library in binary
    crit: notable
    conf: 0.9
    for: [go, elf, macho, pe]
    if:
      type: text
      regex: JustinTimperio/gomap|gomap\.Scan
  - id: go-nmap-import
    desc: go-nmap library import
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: '(^|/)go-nmap(/|$)'
  - id: nmap-go-import
    desc: nmap Go library import
    crit: notable
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: '(^|/)nmap(/|$)'
    unless:
      - id: metadata/lang/source::generated-code-do-not-edit-text
      - id: metadata/package/testing/presence/harness/
  - id: tcp-connect-scan
    desc: TCP connect scanning
    crit: notable
    conf: 0.75
    for:
      - go
    count_min: 5
    unless:
      - id: metadata/package/testing/harness/unit/
      - id: metadata/package/testing/presence/harness::go-test-file
    if:
      id: micro-behaviors/communications/socket/connect::dial-timeout-tcp
  - id: common-ports-array
    desc: Common port array for scanning
    crit: notable
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      word: commonPorts
composite_rules:
  - id: scanner-library
    desc: Port scanning library
    crit: notable
    conf: 0.9
    any:
      - id: gomap-import
      - id: gomap-string
      - id: go-nmap-import
      - id: nmap-go-import
  - id: scan-operations
    desc: Port scanning operations
    crit: notable
    conf: 0.8
    any:
      - id: tcp-connect-scan
      - id: common-ports-array
      - id: micro-behaviors/process/create/direct::exec-command-context
  - id: network-scanner
    desc: Network port scanner
    crit: notable
    conf: 0.9
    all:
      - id: scanner-library
      - id: scan-operations
  - id: local-network-recon
    desc: Local network reconnaissance
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/os/network/interface::net-interfaces
      - id: micro-behaviors/communications/ip/parse::net-parsecidr
      - id: scan-operations
