defaults:
  platforms: [windows]
  for: [batch]
traits:
  - id: batch-printer-ip-config
    desc: Batch reads local IP configuration
    crit: component
    conf: 0.96
    if:
      type: text
      substr: Get-NetIPConfiguration
  - id: batch-printer-range-loop
    desc: Batch iterates a 254-host address range
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 1..254
  - id: batch-printer-connect-attempt
    desc: Batch attempts asynchronous TCP connections
    crit: component
    conf: 0.95
    if:
      type: text
      substr: BeginConnect
  - id: batch-printer-port-marker
    desc: Batch targets printer TCP port 9100
    crit: component
    conf: 0.96
    if:
      type: text
      substr: "9100"
composite_rules:
  - id: batch-printer-sweep-driver-dropper
    desc: Batch scans printer ports and executes a downloaded payload via rundll32
    crit: hostile
    conf: 0.99
    attack: T1046,T1105,T1218.011
    all:
      - id: batch-printer-port-sweep
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
      - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
      - id: micro-behaviors/process/create/shell/lang::powershell-invocation
      - id: micro-behaviors/process/create/shell/script-host::rundll32-exec-with-args
  - id: batch-printer-port-sweep
    desc: Batch sweeps a subnet for printer TCP ports
    crit: suspicious
    conf: 0.96
    all:
      - id: batch-printer-ip-config
      - id: batch-printer-range-loop
      - id: batch-printer-connect-attempt
      - id: batch-printer-port-marker
    near_bytes: 4096
