defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1046

traits:
  - id: kotlin-common-port-list
    desc: Kotlin common service port list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: listOf(21, 22, 23, 25, 53, 80

  - id: kotlin-socket-port-connect
    desc: Kotlin socket port connect
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: socket.connect(InetSocketAddress(target, port)

  - id: kotlin-port-open-output
    desc: Kotlin reports open ports
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: "Port $port: OPEN"

composite_rules:
  - id: kotlin-openbsd-port-scan
    desc: Kotlin OpenBSD port scan
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-common-port-list
      - id: kotlin-socket-port-connect
      - id: kotlin-port-open-output
