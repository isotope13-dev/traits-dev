# C source port scanning patterns
# Focused on TCP connect-scan implementations that sweep host ranges with
# non-blocking sockets and explicit connection-state bookkeeping.
defaults:
  platforms: [unix, android, ios]
  for: [c]
  attack: T1046
  mbc: E1046
traits:
  - id: socket-pool-limit
    desc: Fixed parallel socket pool
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "#define\\s+MAX_SOCKETS\\s+[1-9][0-9]{1,3}"
  - id: ipv4-range-format
    desc: IPv4 block sweep string format
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: "sprintf\\s*\\([^\\n]{0,120}\"%s\\.%d\\.%d\""
  - id: connecting-state-machine
    desc: Socket state machine bookkeeping
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: "S_CONNECTING|connlist\\[.{0,16}\\]\\.status"
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
composite_rules:
  - id: parallel-host-sweep-source
    desc: Parallel TCP host port sweep
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/communications/socket/connect-state::nonblocking-fcntl-source
      - id: ipv4-range-format
      - id: connecting-state-machine
    any:
      - id: micro-behaviors/communications/socket/connect-state
      - id: socket-pool-limit
      - id: micro-behaviors/communications/socket/create::tcp-connect-socket-source
