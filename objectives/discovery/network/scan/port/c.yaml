# C source port scanning patterns
# Focused on TCP connect-scan implementations that sweep host ranges with
# non-blocking sockets and explicit connection-state bookkeeping.
defaults:
  platforms: [linux, unix, macos, android, ios]
  for: [c]
  attack: T1046
  mbc: E1046
traits:
  - id: socket-pool-limit
    desc: Fixed parallel socket pool
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "#define\\s+MAX_SOCKETS\\s+[1-9][0-9]{1,3}"
  - id: nonblocking-fcntl
    desc: Nonblocking socket configuration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "fcntl\\s*\\([^\\n]{0,120}F_SETFL\\s*,\\s*O_NONBLOCK\\s*\\)"
  - id: ipv4-range-format
    desc: IPv4 block sweep string format
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: "sprintf\\s*\\([^\\n]{0,120}\"%s\\.%d\\.%d\""
  - id: connecting-state-machine
    desc: Socket state machine bookkeeping
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: "S_CONNECTING|connlist\\[.{0,16}\\]\\.status"
  - id: errno-eisconn
    desc: EISCONN success handling
    crit: notable
    conf: 0.8
    if:
      type: text
      word: EISCONN
  - id: errno-ealready
    desc: EALREADY async connect state
    crit: notable
    conf: 0.8
    if:
      type: text
      word: EALREADY
  - id: errno-einprogress
    desc: EINPROGRESS async connect state
    crit: component
    conf: 0.8
    if:
      type: text
      word: EINPROGRESS
  - id: tcp-connect-call-source
    desc: TCP connect scan call
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: "socket\\s*\\(\\s*AF_INET\\s*,\\s*SOCK_STREAM\\s*,\\s*0\\s*\\)"
composite_rules:
  - id: parallel-host-sweep-source
    desc: Parallel TCP host port sweep
    crit: suspicious
    conf: 0.93
    all:
      - id: nonblocking-fcntl
      - id: ipv4-range-format
      - id: connecting-state-machine
    any:
      - id: errno-eisconn
      - id: errno-ealready
      - id: errno-einprogress
      - id: socket-pool-limit
      - id: tcp-connect-call-source
