defaults:
  platforms: [routeros, appliance, unix]
  for: [c, cpp, objc, rust, go, elf]
  attack: T1046

traits:
  - id: routeros-api-port-literal
    desc: RouterOS API port literal
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(:8728\b|port=8728\b|TARGET_PORT\s*=\s*8728)'

  - id: routeros-system-recon-command
    desc: RouterOS system recon command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(^|[[:space:]"=:])/system/(identity|resource)/print\b'

  - id: routeros-ip-recon-command
    desc: RouterOS IP recon command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(^|[[:space:]"=:])/ip/(route|firewall)\b'

  - id: routeros-interface-print-command
    desc: RouterOS interface print command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(^|[[:space:]"=:])/interface/(print|list|monitor-traffic)\b'

  - id: routeros-interface-media-command
    desc: RouterOS ethernet or wireless command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(^|[[:space:]"=:])/interface/(ethernet|wireless)\b'

  - id: routeros-bridge-operation
    desc: RouterOS bridge operation command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/interface/bridge/(print|add|remove|set)\b'

  - id: routeros-vlan-operation
    desc: RouterOS VLAN operation command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/interface/vlan/(print|add|remove|set)\b'

  - id: routeros-interface-mode-command
    desc: RouterOS bonding or set command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(^|[[:space:]"=:])/interface/(bonding|set)\b'

  - id: routeros-interface-state-command
    desc: RouterOS interface enable/disable command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(^|[[:space:]"=:])/interface/(enable|disable)\b'

composite_rules:
  - id: routeros-interface-link-command
    desc: RouterOS bridge or VLAN operation command
    crit: suspicious
    conf: 0.92
    any:
      - id: routeros-bridge-operation
      - id: routeros-vlan-operation

  - id: routeros-interface-type-command
    desc: RouterOS interface type command
    crit: suspicious
    conf: 0.92
    any:
      - id: routeros-interface-media-command
      - id: routeros-interface-link-command

  - id: routeros-interface-control-command
    desc: RouterOS interface control command
    crit: suspicious
    conf: 0.92
    any:
      - id: routeros-interface-mode-command
      - id: routeros-interface-state-command

  - id: routeros-api-stealth-probe
    desc: RouterOS API stealth probe
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/connect::connect-symbol
      - id: objectives/evasion/masquerade/process/rename::routeros-process-name-masquerade
    any:
      - id: routeros-api-port-literal
      - id: routeros-system-recon-command
      - id: routeros-ip-recon-command
      - id: routeros-interface-print-command
      - id: routeros-interface-type-command
      - id: routeros-interface-control-command
