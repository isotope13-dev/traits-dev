# IP Address and Geolocation Lookup
# Detects usage of services that return the public IP or location of the host
# Often used for reconnaissance or to decide whether to execute payload
# ATT&CK: T1592 (Gather Victim Host Information)

defaults:
  crit: notable
  conf: 0.85
  for: [all]

traits:
  # NOTE: Core IP lookup services now defined in micro-behaviors/communications/http/ip-discovery/
  # These traits reference them for backward compatibility

  - id: ident-me
    desc: ident.me IP lookup
    if:
      type: string
      substr: "ident.me"

  - id: whatismyip-akamai
    desc: whatismyip.akamai.com IP lookup
    if:
      type: string
      substr: "whatismyip.akamai.com"

  - id: ipify-org
    desc: api.ipify.org IP lookup
    if:
      type: string
      substr: "ipify.org"

  - id: curlmyip-org
    desc: curlmyip.org IP lookup
    if:
      type: string
      substr: "curlmyip.org"

  - id: db-ip-com
    desc: db-ip.com geolocation lookup
    if:
      type: string
      substr: "db-ip.com"

  - id: geoplugin-com
    desc: geoplugin.com geolocation lookup
    if:
      type: string
      substr: "geoplugin.com"

  # === IP loggers / tracking (legacy / common) ===
  - id: iplogger-keyword
    desc: iplogger keyword reference
    if:
      type: string
      substr: "iplogger"

  - id: iplogger-base64
    desc: iplogger.org (base64 encoded)
    if:
      type: encoded
      encoding: base64
      substr: "iplogger.org"

  - id: iplogger-xor
    desc: iplogger.org (XOR encoded)
    if:
      type: encoded
      encoding: xor
      substr: "iplogger.org"

composite_rules:
  - id: ip-lookup-service
    desc: Any public IP lookup service
    any:
      - id: micro-behaviors/communications/http/ip-discovery
      - id: ident-me
      - id: whatismyip-akamai
      - id: ipify-org
      - id: curlmyip-org

  - id: geo-lookup-service
    desc: Any public geolocation lookup service
    any:
      - id: objectives/discovery/host/geo::ipapi-co
      - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
      - id: objectives/discovery/host/geo::freegeoip-app
      - id: db-ip-com
      - id: geoplugin-com
      - id: micro-behaviors/communications/http/ip-discovery::ip-api-com

  - id: iplogger-encoded
    desc: iplogger.org (encoded)
    crit: notable
    any:
      - id: iplogger-base64
      - id: iplogger-xor

  - id: tracking-service-lookup
    desc: IP lookup via tracking/logging service
    crit: suspicious
    any:
      - id: objectives/discovery/network/ip-tracker/
      - id: iplogger-keyword
      - id: iplogger-encoded

  - id: external-recon-service
    desc: Contacts external service for IP/geo reconnaissance
    any:
      - id: ip-lookup-service
      - id: geo-lookup-service
      - id: tracking-service-lookup
