defaults:
  platforms: [unix, windows]
  for: [shell]
  attack: T1595.002

traits:
  - id: git-config-path-wordlist
    desc: Git config path wordlist
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/lib/pyaigis/
      - id: well-known/tool/offensive/decepticon::package-tree-member
    if:
      type: text
      regex: '(^|/)\.git/config\b'

  - id: database-backup-path-wordlist
    desc: Database backup path wordlist
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/lib/pyaigis/
      - id: well-known/tool/offensive/decepticon::package-tree-member
    if:
      type: text
      regex: '(backup|dump)\.sql'

composite_rules:
  - id: env-path-wordlist
    desc: Environment-file paths used as HTTP probe candidates
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/path/config/environment::env-file-path
      - id: micro-behaviors/communications/http/download/cli::curl-variable-path-segment
    scope: file

  - id: sensitive-web-path-wordlist
    desc: Sensitive web path wordlist
    crit: suspicious
    conf: 0.94
    any:
      - id: env-path-wordlist
      - id: git-config-path-wordlist
      - id: database-backup-path-wordlist

  - id: sensitive-path-http-probing
    desc: Automated probing for sensitive web paths
    crit: hostile
    conf: 0.98
    all:
      - id: sensitive-web-path-wordlist
      - id: micro-behaviors/communications/http/download/cli::curl-variable-path-segment
    scope: file
