defaults:
  platforms: [unix, windows]
  for: [shell, text]
  attack: T1595.002

traits:
  - id: git-config-path-wordlist
    desc: Git config path wordlist
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/lib/pyaigis/
      - id: well-known/tool/offensive/decepticon::package-tree-member
    if:
      type: text
      regex: '(^|/)\.git/config\b'

  - id: server-config-path-wordlist
    desc: Server credential path wordlist
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/lib/pyaigis/
      - id: well-known/tool/offensive/decepticon::package-tree-member
    if:
      type: text
      regex: '(^|/)(wp-config(\.php)?|id_rsa)($|[./\s])'

  - id: database-backup-path-wordlist
    desc: Database backup path wordlist
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/lib/pyaigis/
      - id: well-known/tool/offensive/decepticon::package-tree-member
    if:
      type: text
      regex: '(backup|dump)\.sql'

  - id: variable-based-http-path-probe
    desc: Curl probes variable URL path
    crit: suspicious
    conf: 0.9
    unless:
      - id: well-known/lib/pyaigis/
    if:
      type: text
      regex: '\bcurl\b[^\n]{0,160}\$[A-Za-z_][A-Za-z0-9_]*[/-]\$[A-Za-z_][A-Za-z0-9_]*'
      case_insensitive: true
    not:
      # A variable destination such as "$tmp_dir/$asset" is staging, not
      # network reconnaissance. Cover short option bundles and long-option
      # equals forms without excluding ordinary URL path text.
      - regex: '(?i)\s(?:-[A-Za-z]*o|--output(?:=|\s)|--remote-name(?:=|\s))'

composite_rules:
  - id: env-path-wordlist
    desc: Environment-file paths used as HTTP probe candidates
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/path/config/environment::env-file-path
      - id: variable-based-http-path-probe
    scope: file

  - id: sensitive-web-path-wordlist
    desc: Sensitive web path wordlist
    crit: suspicious
    conf: 0.94
    any:
      - id: env-path-wordlist
      - id: git-config-path-wordlist
      - id: server-config-path-wordlist
      - id: database-backup-path-wordlist

  - id: sensitive-path-http-probing
    desc: Automated probing for sensitive web paths
    crit: hostile
    conf: 0.98
    all:
      - id: sensitive-web-path-wordlist
      - id: variable-based-http-path-probe
    scope: file
