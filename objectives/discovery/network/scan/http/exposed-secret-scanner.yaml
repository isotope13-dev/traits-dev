# Obfuscated exposed-secret / leaked-backup endpoint scanner.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. This module hunts victim web infrastructure for
# exposed sensitive data: it probes candidate endpoints (`checkLeakEndpoint`),
# flags sensitive leak paths and URLs (`.env`, config, backups, source, git),
# classifies hits into leak buckets (exposed_env / config_leak / source_leak),
# and extracts + verifies the leaked entries for harvesting. These identifiers
# are attack-context-specific fragments of that toolkit; convicts only when
# several co-occur inside obfuscator.io-obfuscated code (T1595 active scanning
# for exposed secrets).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1595
  mbc: E1595

traits:
  - id: check-leak-endpoint
    desc: checkLeakEndpoint exposed-file endpoint probe
    crit: component
    conf: 0.8
    if:
      type: text
      substr: checkLeakEndpoint
  - id: is-sensitive-leak-path
    desc: isSensitiveLeakPath sensitive-path detector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: isSensitiveLeakPath
  - id: is-leak-url
    desc: isLeakUrl leaked-resource URL filter
    crit: component
    conf: 0.8
    if:
      type: text
      substr: isLeakUrl
  - id: verify-leak-entries
    desc: verifyLeakEntries exposed-secret verifier
    crit: component
    conf: 0.8
    if:
      type: text
      substr: verifyLeakEntries
  - id: extract-leak-entries
    desc: extractLeakEntries exposed-secret extractor
    crit: component
    conf: 0.8
    if:
      type: text
      substr: extractLeakEntries

composite_rules:
  - id: exposed-secret-scan-api
    desc: Private exposed-secret / leak endpoint-scan API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: check-leak-endpoint
      - id: is-sensitive-leak-path
      - id: is-leak-url
      - id: verify-leak-entries
      - id: extract-leak-entries
  - id: obfuscated-exposed-secret-scanner
    desc: Obfuscated exposed-secret / leaked-backup endpoint scanner
    crit: hostile
    conf: 0.95
    all:
      - id: exposed-secret-scan-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
