defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1046

traits:
  - id: kotlin-http-path-list
    desc: Kotlin HTTP admin path list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: listOf("/", "/admin", "/login"

  - id: kotlin-http-url-open
    desc: Kotlin opens HTTP URLs
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: URL("http://$target$path")

  - id: kotlin-http-body-preview
    desc: Kotlin previews HTTP body
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: Body preview

composite_rules:
  - id: kotlin-openbsd-http-path-scan
    desc: Kotlin OpenBSD HTTP path scan
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-http-path-list
      - id: kotlin-http-url-open
      - id: kotlin-http-body-preview

