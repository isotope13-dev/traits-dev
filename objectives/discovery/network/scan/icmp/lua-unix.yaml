defaults:
  platforms: [routeros, appliance, unix]
  for: [lua]
  attack: T1018

traits:
  - id: lua-ip-addr-subnet-enum
    desc: Lua enumerates local subnets
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ip addr show.{0,140}grep .inet '

  - id: lua-ping-sweep-loop
    desc: Lua ping sweep loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'for _, target in ipairs\(targets\) do[\s\S]{0,160}ping -c 1'

  - id: lua-live-hosts-list
    desc: Lua live host result list
    crit: component
    conf: 0.86
    if:
      type: text
      substr: live_hosts

composite_rules:
  - id: lua-icmp-network-sweep
    desc: Lua ICMP network sweep
    crit: hostile
    conf: 0.97
    all:
      - id: lua-ip-addr-subnet-enum
      - id: lua-ping-sweep-loop
      - id: lua-live-hosts-list
