defaults:
  platforms: [freebsd, unix]
  for: [objc]
  attack: T1046

traits:
  - id: objc-raw-icmp-socket
    desc: ObjC raw ICMP socket creation
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'socket\s*\(\s*AF_INET\s*,\s*SOCK_RAW\s*,\s*IPPROTO_ICMP'

  - id: objc-subnet-icmp-sweep-loop
    desc: ObjC subnet ICMP sweep loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'for\s*\(.{0,80}network \+ 1[\s\S]{0,180}icmp_ping'

composite_rules:
  - id: objc-freebsd-icmp-subnet-sweep
    desc: ObjC FreeBSD ICMP subnet sweep
    crit: hostile
    conf: 0.98
    all:
      - id: objc-raw-icmp-socket
      - id: objc-subnet-icmp-sweep-loop
