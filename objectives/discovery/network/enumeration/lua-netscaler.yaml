defaults:
  platforms: [netscaler, appliance, unix]
  for: [lua]
  attack: T1046

traits:
  - id: lua-nitro-config-enum
    desc: Lua NITRO config enum
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/nitro/v1/config/(vserver|service|servicegroup|lbmonitor)'

  - id: lua-nitro-security-enum
    desc: Lua NITRO security enum
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/nitro/v1/config/(sslcert|nsuser|fwglobalpolicy)'

  - id: lua-netscaler-identity-api
    desc: Lua NetScaler identity API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ns\.(hostname|getip|getbuild|getversion)\(\)'

composite_rules:
  - id: lua-netscaler-nitro-enumeration
    desc: Lua NetScaler NITRO enumeration
    crit: hostile
    conf: 0.98
    all:
      - id: lua-nitro-config-enum
      - id: lua-nitro-security-enum
    any:
      - id: lua-netscaler-identity-api
