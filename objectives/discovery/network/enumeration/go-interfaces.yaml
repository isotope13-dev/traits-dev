defaults:
  platforms: [windows, unix]
  mbc: E1016
  attack: T1016
traits:
  - id: ipnet-contains
    desc: IPNet.Contains() call
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: text
      regex: '\bip[Nn]et\.Contains\('
  - id: scan-subnet-func
    desc: Subnet scanning routine
    crit: suspicious
    conf: 0.8
    for: [go, scripts, binaries]
    if:
      type: text
      word: scanSubnet
  - id: scan-network-func
    desc: Network scanning routine
    crit: suspicious
    conf: 0.8
    for: [go, scripts, binaries]
    if:
      type: text
      word: ScanNetwork
    unless:
      - id: metadata/library/win32-bindings::win32more-generated-bindings
composite_rules:
  - id: interface-enumeration
    desc: Network interface enumeration
    crit: notable
    conf: 0.8
    for:
      - go
    any:
      - id: micro-behaviors/os/network/interface::net-interfaces
      - id: micro-behaviors/os/network/interface::net-interfaceaddrs
  - id: cidr-membership-check
    desc: CIDR membership check
    crit: notable
    conf: 0.75
    for:
      - go
    any:
      - id: ipnet-contains
      - id: micro-behaviors/communications/ip/parse::net-parsecidr
  - id: local-network-recon-comp
    desc: Local network reconnaissance with subnet scan
    crit: suspicious
    conf: 0.9
    for:
      - go
    all:
      - id: interface-enumeration
      - id: cidr-membership-check
    any:
      - id: scan-subnet-func
      - id: scan-network-func
    unless:
      - id: metadata/library/win32-bindings::win32more-generated-bindings
