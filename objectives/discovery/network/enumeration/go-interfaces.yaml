defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  mbc: E1016
  attack: T1016
traits:
  - id: net-interfaces
    desc: net.Interfaces() enumeration
    crit: notable
    conf: 0.75
    for:
      - go
    if:
      type: ast
      kind: call
      exact: net.Interfaces
  - id: net-interfaceaddrs
    desc: net.InterfaceAddrs() call
    crit: notable
    conf: 0.75
    for:
      - go
    if:
      type: ast
      kind: call
      exact: net.InterfaceAddrs
  - id: ipnet-contains
    desc: IPNet.Contains() call
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: raw
      regex: '\bip[Nn]et\.Contains\('
  - id: local-ip-192
    desc: 192.168.x.x local range
    crit: notable
    conf: 0.7
    for:
      - go
    if:
      type: string_value
      substr: 192.168.
    unless:
      - id: metadata/package/testing/presence::go-test-file
      - type: basename
        regex: (^|[\\/]).*_test\.go$
  - id: local-ip-10
    desc: 10.x.x.x local range
    crit: notable
    conf: 0.65
    for:
      - go
    if:
      type: string_value
      regex: \b10\.\d{1,3}\.\d{1,3}\.\d{1,3}\b
    unless:
      - id: metadata/package/testing/presence::go-test-file
      - type: basename
        regex: (^|[\\/]).*_test\.go$
  - id: scan-subnet-func
    desc: scanSubnet function
    crit: suspicious
    conf: 0.8
    for:
      - go
      - elf
      - macho
      - pe
    if:
      type: string_value
      word: scanSubnet
  - id: scan-network-func
    desc: ScanNetwork function
    crit: suspicious
    conf: 0.8
    for:
      - go
      - elf
      - macho
      - pe
    if:
      type: string_value
      word: ScanNetwork
composite_rules:
  - id: interface-enumeration
    desc: Network interface enumeration
    crit: notable
    conf: 0.8
    for:
      - go
    any:
      - id: net-interfaces
      - id: net-interfaceaddrs
  - id: local-ip-detection
    desc: Local IP range detection
    crit: notable
    conf: 0.7
    for:
      - go
    any:
      - id: local-ip-192
      - id: local-ip-10
  - id: cidr-membership-check
    desc: CIDR membership check
    crit: notable
    conf: 0.75
    for:
      - go
    any:
      - id: ipnet-contains
      - id: objectives/discovery/network/scan/port::cidr-parse
  - id: local-network-recon-comp
    desc: Local network reconnaissance
    crit: suspicious
    conf: 0.9
    for:
      - go
    all:
      - id: interface-enumeration
      - id: cidr-membership-check
