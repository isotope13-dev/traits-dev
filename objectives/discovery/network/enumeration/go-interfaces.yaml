defaults:
  platforms: [windows, unix]
  mbc: E1016
  attack: T1016
traits:
  - id: net-interfaces
    desc: net.Interfaces() enumeration
    crit: notable
    conf: 0.75
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: net.Interfaces
  - id: net-interfaceaddrs
    desc: net.InterfaceAddrs() call
    crit: notable
    conf: 0.75
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: net.InterfaceAddrs
  - id: ipnet-contains
    desc: IPNet.Contains() call
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: text
      regex: '\bip[Nn]et\.Contains\('
  - id: scan-subnet-func
    desc: scanSubnet function
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      word: scanSubnet
  - id: scan-network-func
    desc: ScanNetwork function
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      word: ScanNetwork
composite_rules:
  - id: interface-enumeration
    desc: Network interface enumeration
    crit: notable
    conf: 0.8
    for:
      - go
    any:
      - id: net-interfaces
      - id: net-interfaceaddrs
  - id: cidr-membership-check
    desc: CIDR membership check
    crit: notable
    conf: 0.75
    for:
      - go
    any:
      - id: ipnet-contains
      - id: objectives/discovery/network/scan/port::cidr-parse
  - id: local-network-recon-comp
    desc: Local network reconnaissance
    crit: suspicious
    conf: 0.9
    for:
      - go
    all:
      - id: interface-enumeration
      - id: cidr-membership-check
    any:
      - id: micro-behaviors/communications/ip/literal::private-ipv4-192-go
      - id: micro-behaviors/communications/ip/literal::private-ipv4-10-go
      - id: scan-subnet-func
      - id: scan-network-func
