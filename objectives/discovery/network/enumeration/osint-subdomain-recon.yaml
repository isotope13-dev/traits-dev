# Obfuscated OSINT passive-DNS subdomain/URL recon collector.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. The reconnaissance module survives with a
# distinctive, un-encrypted private API that queries open threat-intel / passive-
# DNS sources (AlienVault OTX and peers) for a target domain, harvests URLs and
# subdomains from the responses, and caches them to feed the toolkit's scanner
# and mailer. These identifiers are attack-context-specific fragments of that
# toolkit; convicts only when several co-occur inside obfuscator.io-obfuscated
# code (legitimate subdomain-recon utilities ship unobfuscated and open-source).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1596
  mbc: E1596

traits:
  - id: collect-otx-endpoint
    desc: Queries AlienVault OTX passive-DNS source
    crit: component
    conf: 0.8
    if:
      type: text
      substr: collectOtxEndpoint
  - id: add-discovered-url
    desc: Accumulates discovered target URLs
    crit: component
    conf: 0.8
    if:
      type: text
      substr: addDiscoveredUrl
  - id: source-collectors
    desc: OSINT source-collector registry
    crit: component
    conf: 0.8
    if:
      type: text
      substr: SOURCE_COLLECTORS
  - id: pick-urls-from-text
    desc: Scrapes URLs from source responses
    crit: component
    conf: 0.8
    if:
      type: text
      substr: pickUrlsFromText
  - id: hash-passive-source-key
    desc: Keys a passive-DNS source cache entry
    crit: component
    conf: 0.8
    if:
      type: text
      substr: hashPassiveSourceKey

composite_rules:
  - id: osint-source-collector-api
    desc: Private OSINT passive-DNS URL-discovery API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: collect-otx-endpoint
      - id: add-discovered-url
      - id: source-collectors
      - id: pick-urls-from-text
      - id: hash-passive-source-key
  - id: obfuscated-osint-subdomain-recon
    desc: Obfuscated OSINT passive-DNS subdomain/URL recon collector
    crit: hostile
    conf: 0.95
    all:
      - id: osint-source-collector-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
