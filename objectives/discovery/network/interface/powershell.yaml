defaults:
  platforms: [windows, unix]
  for: [powershell]
  attack: T1016
composite_rules:
  - id: powershell-network-recon
    desc: PowerShell script gathering network configuration and performing scans
    crit: hostile
    conf: 0.95
    needs: 3
    any:
      - id: micro-behaviors/os/network/interface::powershell-get-netipaddress
      - id: micro-behaviors/os/network/dns::resolve-dns-name
      - id: micro-behaviors/communications/http/client/library::invoke-webrequest
      - id: micro-behaviors/communications/socket/connect::tcp-client-connect
