defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  attack: T1016
traits:
  - id: ipv4-family-literal
    desc: IPv4 family literal check
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: IPv4
  - id: internal-interface-filter
    desc: Internal interface exclusion check
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '!\s*.{0,24}\.internal\b'
  - id: returns-interface-address
    desc: Returns chosen interface address
    # `return <expr>.address` is a generic property return, not on its own a
    # recon objective (per taxonomy: a single generic pattern is a composite
    # fragment, not a standalone objective). It only carries network-recon
    # meaning inside local-ip-from-networkinterfaces, which also requires
    # networkInterfaces()/IPv4/internal-filter — so it is a component.
    crit: component
    conf: 0.86
    not:
      - regex: 'return\s+this\.address\s*[;,}]'
      - substr: Address.simpleGroup(
    unless:
      - type: text
        substr: _srv.address()
    if:
      type: text
      # Require .address at an expression terminator (;, ',', }) so a returned
      # member access (return iface.address;) matches but an .address used as a
      # call argument does not — e.g. exceljs `return x.find(this.address)`.
      regex: 'return\s+[\w.$\[\]]{1,40}\.address\s*[;,}]'
composite_rules:
  - id: local-ip-from-networkinterfaces
    desc: Local IP discovery from interfaces
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/os/network/interface::node-network-interfaces-call
      - id: ipv4-family-literal
      - id: internal-interface-filter
      - id: returns-interface-address
