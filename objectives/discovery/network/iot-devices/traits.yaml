defaults:
  attack: T1046
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: hi3511-dvr-soc
    desc: Hi3511 DVR targeting
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: stm_hi3511_dvr
  - id: hi3511-chipset-app
    desc: Hi3511 chipset app
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: app/hi3511
  - id: gm-dvr-identifier
    desc: gmDVR identifier
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: gmDVR
  - id: hikvision-firmware-targeting
    desc: Hikvision DVR firmware
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: dvr_main _8182T
  - id: anko-dvr-sample
    desc: Anko DVR app targeting
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ankosample _8182T
  - id: davinci-cctv-targeting
    desc: DaVinci CCTV platform
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: home/Davinci
  - id: kylin-nvr-targeting
    desc: Kylin DVR/NVR platform
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: var/Kylin
  - id: dvr-gui-path
    desc: DVR GUI application path
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: mnt/mtd/app/gui
  - id: adb-scanner-module-symbol
    desc: ADB scanner module symbol
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: adb_scanner.c
  - id: gpon-scanner-module-symbol
    desc: GPON scanner module symbols
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'gpon(80|443|8080)_scanner'
  - id: dlink-scanner-module-symbol
    desc: D-Link scanner module symbols
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: dlinkscanner_
  - id: jaws-scanner-module-symbol
    desc: JAWS scanner module symbols
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: jaws_scanner_
composite_rules:
  - id: hi3511-specific-targeting
    desc: Hi3511 DVR targeting
    crit: suspicious
    conf: 0.95
    any:
      - id: hi3511-dvr-soc
      - id: hi3511-chipset-app
  - id: generic-dvr-targeting
    desc: Generic DVR platform targeting
    crit: suspicious
    conf: 0.9
    any:
      - id: gm-dvr-identifier
      - id: hikvision-firmware-targeting
      - id: davinci-cctv-targeting
      - id: kylin-nvr-targeting
  - id: dvr-specific-targeting
    desc: Specific DVR platform targeting
    crit: suspicious
    conf: 0.93
    mbc: B0041
    any:
      - id: hi3511-specific-targeting
      - id: generic-dvr-targeting
  - id: iot-exploit-scanner-module-set
    desc: IoT exploit scanner module set
    crit: suspicious
    conf: 0.96
    any:
      - id: adb-scanner-module-symbol
      - id: gpon-scanner-module-symbol
      - id: dlink-scanner-module-symbol
      - id: jaws-scanner-module-symbol
    needs: 2
