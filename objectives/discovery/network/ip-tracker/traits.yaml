defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: suspicious
  conf: 0.85
  for: [scripts, binaries]
traits:
  - id: iplogger
    desc: iplogger.org tracking service
    if:
      type: text
      regex: \biplogger\.(org|com|net)\b
    unless:
      - type: text
        regex: \biplogger\.(org|com|net)\b
        section: .rsrc
  - id: grabify
    desc: grabify.link tracking service
    if:
      type: text
      regex: \bgrabify\.(link|org)\b
    unless:
      - type: text
        regex: \bgrabify\.(link|org)\b
        section: .rsrc
  - id: blasze
    desc: blasze.com tracking service
    if:
      type: text
      regex: blasze\.(com|tk)\b
  - id: canarytokens
    desc: canarytokens.com tracking service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?canarytokens\.(com|org)\b
    not:
      - substr: trufflesecurity.com/canaries
  - id: 2no-co
    desc: 2no.co tracking service
    if:
      type: text
      regex: 2no\.co\b
  - id: yip-su
    desc: yip.su tracking service
    if:
      type: text
      regex: \byip\.su\b
    unless:
      - type: text
        regex: \byip\.su\b
        section: .rsrc
  - id: opentracker
    desc: opentracker.org tracking service
    if:
      type: text
      regex: opentracker\.org\b
