defaults:
  platforms: [windows, unix]
  crit: suspicious
  conf: 0.85
  for: [source, ruby]
traits:
  - id: iplogger
    desc: iplogger.org tracking service
    if:
      type: text
      regex: \biplogger\.(org|com|net)\b
    unless:
      - type: text
        regex: \biplogger\.(org|com|net)\b
        section: .rsrc
      - id: well-known/app/browser-extension::adblock-extension-bundle
      - id: well-known/app/browser-extension::adblock-marker-easylist
      - id: well-known/app/browser-extension::adblock-marker-ublock
      - id: metadata/file/format::adblock-filter-list
  - id: grabify
    desc: grabify.link tracking service
    if:
      type: text
      regex: \bgrabify\.(link|org)\b
    unless:
      - type: text
        regex: \bgrabify\.(link|org)\b
        section: .rsrc
  - id: blasze
    desc: blasze.com tracking service
    if:
      type: text
      regex: blasze\.(com|tk)\b
  - id: canarytokens
    desc: CanaryTokens callback URL
    if:
      type: text
      regex: https?://([a-z0-9-]+\.)?canarytokens\.(com|org)\b
    not:
      - substr: This is an AWS canary token generated at canarytokens.org
      - substr: off brand AWS Canary inspired by canarytokens.org
  - id: 2no-co
    desc: 2no.co tracking service
    if:
      type: text
      regex: 2no\.co\b
  - id: yip-su
    desc: yip.su tracking service
    if:
      type: text
      regex: \byip\.su\b
    unless:
      - type: text
        regex: \byip\.su\b
        section: .rsrc
  - id: opentracker
    desc: opentracker.org tracking service
    if:
      type: text
      regex: opentracker\.org\b
  - id: mhzmhz-cloud-analytics
    desc: cloud.mhzmhz.rs analytics tracker
    if:
      type: text
      regex: \banalytics-[0-9a-f-]{36}\.cloud\.mhzmhz\.rs\b
