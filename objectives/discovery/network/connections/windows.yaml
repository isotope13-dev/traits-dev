# Network Connection Discovery - Windows API
# Detects programmatic enumeration of active network connections
defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: connection-discovery
    desc: Network connection discovery via API
    crit: suspicious
    conf: 0.85
    attack: T1049
    all:
      - id: micro-behaviors/os/sysinfo/network::get-tcp-table
      - id: micro-behaviors/os/sysinfo/network::get-udp-table
    downgrade:
      any:
        - id: metadata/binary/installer/
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/package::bitdefender-ecnet-telemetry
        - id: metadata/signed/certificate::bitdefender-brand-text
    unless:
      - id: metadata/library/runtime::cygwin-runtime
