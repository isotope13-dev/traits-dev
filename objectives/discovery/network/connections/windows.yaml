# Network Connection Discovery - Windows API
# Detects programmatic enumeration of active network connections
defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: connection-discovery
    desc: Network connection discovery via API
    crit: notable
    conf: 0.85
    attack: T1049
    all:
      - id: micro-behaviors/os/network/connections::get-tcp-table
      - id: micro-behaviors/os/network/connections::get-udp-table
    downgrade:
      any:
        - id: metadata/binary/installer/
        - id: metadata/binary/vendor::microsoft-corp-marker
    unless:
      - id: metadata/package/fields/vendor::bitdefender-ctc-module
