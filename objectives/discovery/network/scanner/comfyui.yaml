defaults:
  platforms: [windows, unix]
  for: [shell, python]
  crit: suspicious
  conf: 0.9
  attack: T1595

traits:
  - id: comfyui-port-8188
    desc: ComfyUI default port reference
    crit: notable
    if:
      type: string_literal
      substr: ':8188'
    unless:
      - id: well-known/app/calvyn-code
  - id: comfyui-keyword
    desc: ComfyUI keyword
    crit: component
    if:
      type: string_literal
      word: 'comfyui'
  - id: comfyui-object-info
    desc: ComfyUI object_info endpoint
    crit: notable
    if:
      type: string_literal
      substr: '/object_info'
  - id: python-json-load-sys-stdin
    desc: Python parsing JSON from stdin
    if:
      type: text
      regex: json\.load\(sys\.stdin\).{0,80}/object_info

composite_rules:
  - id: comfyui-hostile-scanner
    desc: ComfyUI hostile mass scanner
    crit: hostile
    conf: 0.98
    all:
      - id: comfyui-object-info
      - id: python-json-load-sys-stdin
  - id: comfyui-scanner
    desc: ComfyUI object-info service probe
    crit: hostile
    conf: 0.95
    all:
      - id: comfyui-keyword
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: comfyui-object-info
    near_bytes: 256
