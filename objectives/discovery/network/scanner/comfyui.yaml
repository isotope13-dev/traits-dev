defaults:
  platforms: [linux, macos, windows]
  for: [shell, python]
  crit: suspicious
  conf: 0.9
  attack: T1595

traits:
  - id: comfyui-port-8188
    desc: ComfyUI default port reference
    if:
      type: string_value
      regex: ':8188'
  - id: comfyui-keyword
    desc: ComfyUI keyword
    if:
      type: string_value
      word: 'comfyui'
  - id: comfyui-object-info
    desc: ComfyUI object_info endpoint
    if:
      type: string_value
      substr: '/object_info'
  - id: python-json-load-sys-stdin
    desc: Python parsing JSON from stdin
    if:
      type: raw
      substr: 'json.load(sys.stdin)'

composite_rules:
  - id: comfyui-hostile-scanner
    desc: ComfyUI hostile mass scanner
    crit: hostile
    conf: 0.98
    all:
      - id: comfyui-object-info
      - id: python-json-load-sys-stdin
  - id: comfyui-scanner
    desc: ComfyUI vulnerability/service scanner
    crit: hostile
    conf: 0.95
    all:
      - id: comfyui-keyword
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
    any:
      - id: comfyui-port-8188
      - id: comfyui-object-info
