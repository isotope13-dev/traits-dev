defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.8
  attack: T1046

traits:
  - id: curl-pipe-python
    desc: curl output piped to python
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'curl\s+[^|]{0,50}\|\s*python3?'
    unless:
      - type: text
        substr: install.python-poetry.org
      - type: text
        regex: '\|\s*python3?\s+-m\s+json\.tool'
      - type: text
        regex: '\|\s*python3?\s+-c\s+["''][^"'']{0,140}json\.load\(sys\.stdin\)'

composite_rules:
  - id: hostile-mass-scan-exec
    desc: Mass execution scanner with python payload delivery
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/spawn::xargs-bash-c
      - id: curl-pipe-python
  - id: hostile-curl-pipe-python
    desc: curl output piped directly to python (hostile context)
    crit: hostile
    conf: 0.98
    all:
      - id: curl-pipe-python
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
