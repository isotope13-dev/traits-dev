defaults:
  platforms: [unix]
  for: [shell]
  crit: notable
  conf: 0.8
  attack: T1046

traits:
  - id: xargs-bash-c
    desc: xargs executing bash -c
    if:
      type: text
      regex: 'xargs.{0,50}bash\s+-c'
  - id: curl-pipe-python
    desc: curl output piped to python
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'curl\s+[^|]{0,50}\|\s*python3?'

composite_rules:
  - id: hostile-mass-scan-exec
    desc: Mass execution scanner with python payload delivery
    crit: hostile
    conf: 0.95
    all:
      - id: xargs-bash-c
      - id: curl-pipe-python
  - id: hostile-curl-pipe-python
    desc: curl output piped directly to python (hostile context)
    crit: hostile
    conf: 0.98
    all:
      - id: curl-pipe-python
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
