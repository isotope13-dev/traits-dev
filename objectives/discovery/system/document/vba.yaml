defaults:
  for: [vbs]
  platforms: [windows]
  crit: notable
  attack: "T1082"
  conf: 0.88
traits: []
composite_rules:
- id: vba-system-fingerprint
  desc: VBA system fingerprinting via WMI
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/os/wmi/query::getobject-winmgmts
  any:
  - id: micro-behaviors/os/wmi/query::win32-operatingsystem
  - id: micro-behaviors/os/wmi/query::win32-computersystem
  - id: objectives/discovery/host/security::antivirusproduct-query
  needs: 2
- id: vba-environment-recon
  desc: VBA environment variable enumeration
  crit: suspicious
  conf: 0.93
  all:
  - id: micro-behaviors/os/env/vars::environ-function
  - id: micro-behaviors/os/env/vars::computername-lookup
  any:
  - id: micro-behaviors/os/env/vars::username-lookup
  - id: micro-behaviors/os/env/vars::userprofile-lookup
