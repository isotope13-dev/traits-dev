defaults:
  platforms: [windows]
  for: [batch]
  attack: T1082
  mbc: B0012

traits:
  - id: wmic-html-profile-output
    desc: WMIC writes HTML system profile
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)wmic\s+\w+.{0,80}/format:'
    count_min: 4

  - id: wmic-htable-format-search
    desc: Finds WMIC htable formatter
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)dir\s+/s\s+/b\s+%WINDIR%\\system32\\\*htable\.xsl'

composite_rules:
  - id: batch-wmic-host-inventory
    desc: Batch WMIC host inventory
    crit: suspicious
    conf: 0.96
    all:
      - id: wmic-html-profile-output
      - id: wmic-htable-format-search
