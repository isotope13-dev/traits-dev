defaults:
  platforms: [routeros, appliance]
  for: [javascript]
  attack: T1082

traits:
  - id: routeros-js-system-profile-query
    desc: RouterOS JS system profile query
    crit: suspicious
    conf: 0.91
    if:
      type: string_literal
      regex: '^/system/(resource|routerboard|identity|health)/print$'

  - id: routeros-js-system-config-query
    desc: RouterOS JS system config query
    crit: suspicious
    conf: 0.91
    if:
      type: string_literal
      regex: '^/system/(logging|scheduler|script|package)/print$'

  - id: routeros-js-ip-config-query
    desc: RouterOS JS IP config query
    crit: suspicious
    conf: 0.91
    if:
      type: string_literal
      regex: '^/ip/(address|route|arp|dns)/print$'

  - id: routeros-js-firewall-query
    desc: RouterOS JS firewall query
    crit: suspicious
    conf: 0.91
    if:
      type: string_literal
      regex: '^/ip/firewall/(filter|nat|raw|mangle)/print$'

  - id: routeros-js-interface-query
    desc: RouterOS JS interface query
    crit: suspicious
    conf: 0.91
    if:
      type: string_literal
      regex: '^/interface/(bridge|ethernet|vlan|wireguard)/print$'

  - id: routeros-js-routing-query
    desc: RouterOS JS routing query
    crit: suspicious
    conf: 0.91
    if:
      type: string_literal
      regex: '^/routing/(bgp/connection|ospf/instance|table)/print$'

  - id: routeros-js-tool-config-query
    desc: RouterOS JS tool config query
    crit: suspicious
    conf: 0.91
    if:
      type: string_literal
      regex: '^/tool/(snmp|netwatch|sniffer|accounting)/print$'

  - id: routeros-js-wireless-query
    desc: RouterOS JS wireless query
    crit: suspicious
    conf: 0.91
    if:
      type: string_literal
      regex: '^/(wireless|caps-man/configuration)/print$'

composite_rules:
  - id: routeros-js-host-profile-query-set
    desc: RouterOS JS host profile query set
    crit: suspicious
    conf: 0.94
    needs: 3
    any:
      - id: routeros-js-system-profile-query
      - id: routeros-js-system-config-query
      - id: routeros-js-ip-config-query
      - id: routeros-js-interface-query
      - id: routeros-js-routing-query
      - id: routeros-js-tool-config-query

  - id: routeros-js-network-config-query-set
    desc: RouterOS JS network config query set
    crit: suspicious
    conf: 0.94
    needs: 3
    any:
      - id: routeros-js-ip-config-query
      - id: routeros-js-firewall-query
      - id: routeros-js-interface-query
      - id: routeros-js-routing-query
      - id: routeros-js-tool-config-query
      - id: routeros-js-wireless-query
