defaults:
  platforms: [unix, windows]
  for: [python, pyc]
  attack: T1082

traits:
  - id: python-host-profile-fields
    desc: Python host profile record fields
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '"hostname"[\s\S]{0,160}"platform"[\s\S]{0,160}"system"'

  - id: runtime-os-version-field
    desc: Runtime profile OS version field
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: os_version

  - id: runtime-python-version-field
    desc: Runtime profile Python version field
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: python_version

  - id: runtime-architecture-field
    desc: Runtime profile architecture field
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: architecture

  - id: runtime-gpu-field
    desc: Runtime profile GPU presence field
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: has_gpu

composite_rules:
  - id: python-runtime-profile-fields
    desc: Python runtime profile record fields
    crit: notable
    conf: 0.95
    near_lines: 24
    all:
      - id: runtime-os-version-field
      - id: runtime-python-version-field
      - id: runtime-architecture-field
      - id: runtime-gpu-field

  - id: python-device-host-profile-fields
    desc: Python runtime and host identity profiling
    crit: notable
    conf: 0.94
    needs: 3
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::platform-full
      - id: micro-behaviors/os/sysinfo/platform/runtime::platform-system
      - id: micro-behaviors/os/sysinfo/platform/runtime::python-platform-machine
      - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
      - id: micro-behaviors/os/network/interface::python-getsockname-local-ip
