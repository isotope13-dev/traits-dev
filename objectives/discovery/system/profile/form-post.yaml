defaults:
  platforms: [windows, linux, macos]
  for: [scripts, csharp, text]

traits:
  - id: host-profile-process-field
    desc: '"process list" phrase'
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "process list"

  - id: host-profile-software-field
    desc: '"software list" phrase'
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "software list"

  - id: host-profile-locale-field
    desc: '"locale" word — composite-only fragment'
    crit: component
    conf: 0.4
    if:
      type: text
      substr: "locale"
    unless:
      - id: metadata/file/text/format::i18n-locale-file

  - id: compact-system-profile-post-body
    desc: Compact system profile POST body
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: "a=<MAC address>&b=<hostname>"

composite_rules:
  - id: host-process-software-locale-form
    desc: Host process software locale profile form
    crit: suspicious
    conf: 0.9
    near_lines: 40
    all:
      - id: micro-behaviors/os/sysinfo/hostname::hostname-field-token
      - id: host-profile-process-field
      - id: host-profile-software-field
      - id: host-profile-locale-field
