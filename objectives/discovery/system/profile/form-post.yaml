defaults:
  platforms: [windows, linux, macos]
  for: [scripts, csharp, text]

traits:
  - id: host-profile-hostname-field
    desc: Hostname profile field
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "hostname"

  - id: host-profile-process-field
    desc: Process list profile field
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "process list"

  - id: host-profile-software-field
    desc: Software list profile field
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "software list"

  - id: host-profile-locale-field
    desc: Locale profile field
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "locale"

  - id: compact-system-profile-post-body
    desc: Compact system profile POST body
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: "a=<MAC address>&b=<hostname>"

composite_rules:
  - id: host-process-software-locale-form
    desc: Host process software locale form
    crit: suspicious
    conf: 0.9
    all:
      - id: host-profile-hostname-field
      - id: host-profile-process-field
      - id: host-profile-software-field
      - id: host-profile-locale-field
