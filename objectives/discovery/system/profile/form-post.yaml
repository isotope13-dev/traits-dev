defaults:
  platforms: [windows, linux, macos]
  for: [scripts, csharp, text]

traits:
  - id: host-profile-process-field
    desc: '"process list" phrase'
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "process list"

  - id: host-profile-software-field
    desc: '"software list" phrase'
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "software list"

  - id: host-profile-locale-field
    desc: Locale or language profile field
    crit: component
    conf: 0.4
    if:
      type: text
      regex: '(?i)\b(locale|language|lang)\b\s*[:=]'
    unless:
      - id: metadata/file/format/

  - id: compact-system-profile-post-body
    desc: Compact system profile POST body
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: "a=<MAC address>&b=<hostname>"

composite_rules:
  - id: host-process-software-locale-form
    desc: Host process software locale profile form
    crit: suspicious
    conf: 0.9
    near_lines: 40
    all:
      - id: metadata/file/string/identity::hostname-field-token
      - id: host-profile-process-field
      - id: host-profile-software-field
      - id: host-profile-locale-field
