defaults:
  platforms: [unix]
  for: [go, elf, macho]
  attack: T1082

traits:
  - id: go-system-fingerprint-section
    desc: Go system fingerprint section
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "=== SYSTEM FINGERPRINT ==="

  - id: go-host-profile-command-set
    desc: Go Unix host profile commands
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: '/usr/bin/(ps|netstat|df)([^A-Za-z0-9._/-]|$)'
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - type: path
        basename: true
        exact: busybox_versions.go
      - type: basename
        exact: apko
