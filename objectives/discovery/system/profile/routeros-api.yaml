defaults:
  platforms: [routeros, appliance]
  for: [python, pyc]
  attack: T1082

traits:
  - id: routeros-api-system-profile-query
    desc: RouterOS API system profile query
    crit: notable
    conf: 0.91
    if:
      type: text
      regex: '/system/(resource|identity|routerboard|package)/print'

  - id: routeros-api-network-profile-query
    desc: RouterOS API network profile query
    crit: notable
    conf: 0.91
    if:
      type: text
      regex: '/ip/(address|route|arp|dns)/print'

  - id: routeros-api-interface-query
    desc: RouterOS API interface query
    crit: notable
    conf: 0.91
    if:
      type: text
      regex: '/interface(/(bridge|vlan|wireless))?/print'

  - id: routeros-api-firewall-query
    desc: RouterOS API firewall query
    crit: notable
    conf: 0.91
    if:
      type: text
      regex: '/ip/firewall/(filter|nat|connection)/print'

  - id: routeros-api-host-profile-call
    desc: RouterOS API host profile call
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'api\.path\([''"]/system[''"],\s*[''"](identity|resource|routerboard)'

composite_rules:
  - id: routeros-api-host-profile-query-set
    desc: RouterOS API host profile queries
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: routeros-api-system-profile-query
      - id: routeros-api-network-profile-query
      - id: routeros-api-interface-query
      - id: routeros-api-firewall-query
      - id: routeros-api-host-profile-call
