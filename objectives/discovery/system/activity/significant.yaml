defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: significant-recon
    desc: Significant system reconnaissance activity
    crit: suspicious
    needs: 2
    any:
      - id: objectives/discovery/system/fingerprint/hardware::js-sysinfo-multi
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
      - id: objectives/supply-chain/npm/behavior::npm-victim-exfil
    unless:
      - id: metadata/library/
      - id: metadata/dev/testing/
