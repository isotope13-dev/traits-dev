defaults:
  platforms: [windows]
  for: [batch, powershell]
  attack: T1082
traits:
  - id: netconnections-control
    desc: Control panel network connections
    crit: notable
    if:
      type: text
      regex: (?i)control\.exe\s+netconnections\b
  - id: ipconfig-all
    desc: ipconfig all enumeration
    crit: notable
    if:
      type: text
      regex: (?i)\bipconfig\s+/all\b
  - id: netl-sessions
    desc: netl sessions enumeration
    crit: suspicious
    if:
      type: text
      regex: (?i)\bnetl\s+sessions\b
  - id: domain-admins-group
    desc: Domain Admins group query
    crit: suspicious
    if:
      type: text
      regex: (?i)net\s+group\s+\"domain Admins\"\s+/domain
  - id: wmic-product-version
    desc: WMIC product inventory
    crit: notable
    if:
      type: text
      regex: (?i)wmic\s+product\s+get\s+name,\s*version
  - id: nltest-domain-trusts
    desc: NLTest domain trusts query
    crit: suspicious
    if:
      type: text
      regex: (?i)\bnltest\s+/DOMAIN_TRUSTS\b
  - id: nltest-dclist
    desc: NLTest domain controller list
    crit: suspicious
    if:
      type: text
      regex: (?i)\bnltest\s+/dclist:?(\S{1,40})?
  - id: whoami-all
    desc: whoami all privileges query
    crit: notable
    if:
      type: text
      regex: (?i)\bwhoami\s+/all\b
  - id: ping-internal-hosts
    desc: Ping internal host list
    crit: component
    if:
      type: text
      regex: (?i)\bping\s+\d{1,3}(\.\d{1,3}){3}\b
  - id: wmic-remote-process-create
    desc: WMIC remote process create
    crit: suspicious
    attack: T1047
    if:
      type: text
      regex: (?i)\bwmic\s*/node:?.{1,48}\s+process\s+call\s+create\b
  - id: recon-output-files
    desc: Recon output file names
    crit: component
    if:
      type: text
      regex: (?i)\b(pc|dir|a1)\.txt\b
  - id: programdata-d-bat
    desc: ProgramData d bat artifact
    crit: component
    if:
      type: text
      regex: (?i)ProgramData\\d\.bat\b
composite_rules:
  - id: ad-trust-visibility-recon
    desc: Active Directory trust visibility
    crit: suspicious
    conf: 0.9
    any:
      - id: domain-admins-group
      - id: nltest-domain-trusts
      - id: nltest-dclist
    needs: 2
  - id: host-session-visibility-recon
    desc: Host session visibility recon
    crit: suspicious
    conf: 0.88
    any:
      - id: micro-behaviors/os/com/session::quser-remote-server
      - id: netl-sessions
      - id: whoami-all
      - id: netconnections-control
    needs: 2
  - id: inventory-and-reachability-recon
    desc: Inventory and reachability recon
    crit: suspicious
    conf: 0.86
    any:
      - id: ipconfig-all
      - id: wmic-product-version
      - id: ping-internal-hosts
    needs: 2
  - id: recon-staging-artifacts
    desc: Recon output and batch artifacts
    crit: suspicious
    conf: 0.9
    all:
      - id: recon-output-files
      - id: programdata-d-bat
  - id: domain-admin-prep-recon
    desc: Domain admin preparation recon
    crit: suspicious
    conf: 0.92
    all:
      - id: ad-trust-visibility-recon
      - id: host-session-visibility-recon
      - id: inventory-and-reachability-recon
  - id: domain-admin-ransomware-prep
    desc: Domain admin ransomware preparation discovery
    crit: hostile
    conf: 0.96
    all:
      - id: domain-admin-prep-recon
    any:
      - id: wmic-remote-process-create
      - id: recon-staging-artifacts
