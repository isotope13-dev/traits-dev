defaults:
  platforms: [windows, linux, macos]
  mbc: E1082
  attack: T1082
traits:
  - id: ghw-import
    desc: jaypipes/ghw hardware info library
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: github\.com/jaypipes/ghw|jaypipes/ghw
    unless:
      - id: well-known/app/localai::localai-system-capability-context
  - id: ghw-string
    desc: ghw library in binary
    crit: suspicious
    conf: 0.85
    for: [go, elf, macho, pe]
    if:
      type: text
      substr: jaypipes/ghw
    unless:
      - id: well-known/app/localai::localai-system-capability-context
  - id: ghw-cpu
    desc: ghw.CPU() call
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: ghw.CPU
  - id: ghw-memory
    desc: ghw.Memory() call
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: ghw.Memory
  - id: ghw-block
    desc: ghw.Block() storage info
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: ghw.Block
  - id: ghw-gpu
    desc: ghw.GPU() call
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: ghw.GPU
  - id: ghw-network
    desc: ghw.Network() call
    crit: notable
    conf: 0.8
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: ghw.Network
  - id: gopsutil-import
    desc: shirou/gopsutil system info library
    crit: notable
    conf: 0.75
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: shirou/gopsutil|gopsutil
  - id: gopsutil-string
    desc: gopsutil library in binary
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: gopsutil
composite_rules:
  - id: hardware-enum-library
    desc: Hardware enumeration library
    crit: notable
    conf: 0.85
    any:
      - id: ghw-import
      - id: ghw-string
      - id: gopsutil-import
      - id: gopsutil-string
  - id: hardware-info-gathering
    desc: Hardware information gathering
    crit: notable
    conf: 0.9
    all:
      - id: hardware-enum-library
    any:
      - id: ghw-cpu
      - id: ghw-memory
      - id: ghw-block
      - id: ghw-gpu
