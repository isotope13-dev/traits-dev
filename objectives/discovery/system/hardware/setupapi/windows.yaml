# Windows hardware device enumeration via SetupAPI
# Malware uses SetupAPI to enumerate hardware devices for
# system profiling, targeting, and anti-analysis.
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1082
composite_rules:
  - id: setupapi-hardware-discovery
    desc: Hardware device enumeration via SetupAPI
    crit: notable
    conf: 0.88
    all:
      - id: micro-behaviors/os/sysinfo/hardware::setupapi-device-enumeration
    any:
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
      - id: micro-behaviors/fs/device::query-dos-device-w
      - id: micro-behaviors/os/sysinfo/disk::freespace
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
