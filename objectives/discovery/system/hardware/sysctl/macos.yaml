defaults:
  platforms:
  - macos
  for:
  - scripts
  - macho
  attack: T1082
  mbc: E1082
traits:
- id: system-info-collector-output--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell]
  if:
    type: text
    regex: 'echo\s+"?(SYSTEM_INFO|HOST_INFO)='
  count_max: 1018445
- id: system-info-collector-output--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell]
  if:
    type: text
    regex: 'echo\s+"?(HARDWARE_INFO|HOST_OS)='
  count_max: 1018446
- id: system-info-collector-output--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell]
  if:
    type: text
    regex: 'echo\s+"?(HOST_ARCH|CPU_MODEL)='
  count_max: 1018447
- id: system-info-collector-output--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell]
  if:
    type: text
    regex: 'echo\s+"?(CPU_VENDOR)='
  count_max: 1018448
- id: sysctl-hw-model-dup
  desc: Query hardware model via sysctl
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: sysctl\s+-n\s+hw\.model
- id: sysctl-cpu-brand-dup
  desc: Query CPU brand string via sysctl
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: sysctl\s+-n\s+machdep\.cpu\.brand_string
- id: sw-vers-product
  desc: Query macOS version via sw_vers
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: sw_vers\s+--?productVersion
    case_insensitive: true
- id: ioreg-screen-lock
  desc: Check screen lock status via ioreg
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: CGSSessionScreenIsLocked
  downgrade:
    any:
    - id: metadata/binary/vendor::system-component
    - id: metadata/signed/platform::apple
composite_rules:
- id: system-profiling-comp
  desc: Comprehensive macOS system profiling
  crit: suspicious
  conf: 0.9
  needs: 2
  any:
  - id: objectives/discovery/system/hardware/sysctl::sysctl-hw-model-dup
  - id: objectives/discovery/system/hardware/sysctl::sysctl-cpu-brand-dup
  - id: sw-vers-product
  unless:
  - id: well-known/app/context
  - id: well-known/app/quickemu
  - id: system-info-collector-output
- id: system-info-collector-output
  desc: System-info collector echoes structured fields
  crit: component
  conf: 0.9
  for: [shell]
  any:
  - id: system-info-collector-output--rx-1
  - id: system-info-collector-output--rx-2
  - id: system-info-collector-output--rx-3
  - id: system-info-collector-output--rx-4
