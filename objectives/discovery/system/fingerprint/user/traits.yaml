# User Information Fingerprinting
# ATT&CK: T1033 (System Owner/User Discovery)
# NOTE: All neutral user query functions moved to micro-behaviors/process/user/ and micro-behaviors/os/env/
defaults:
  platforms: [unix, windows]
  attack: "T1033"
traits:
  - id: whoami-then-pwd
    desc: whoami followed by pwd command
    crit: notable
    conf: 0.86
    for: [shell, python]
    if:
      type: text
      regex: '\bwhoami(\.exe)?\b\s*[;&|]+\s*(/bin/)?pwd\b'
  - id: pwd-then-whoami
    desc: pwd followed by whoami command
    crit: notable
    conf: 0.86
    for: [shell, python]
    if:
      type: text
      regex: '\b(/bin/)?pwd\b\s*[;&|]+\s*whoami(\.exe)?\b'
  - id: node-host-user-query-pair
    desc: Node queries hostname and username
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'hostname\(\).{0,120}userInfo\(\)\.username|userInfo\(\)\.username.{0,120}hostname\(\)'
composite_rules:
  - id: whoami-pwd-pair
    desc: whoami and pwd reconnaissance chain
    crit: suspicious
    conf: 0.86
    for: [shell, python]
    unless:
      - id: well-known/app/calvyn-code
      - id: well-known/app/anthropic-claude-code
      - id: well-known/app/2b-agent
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
      - id: well-known/app/cfengine::source-file-marker
    any:
      - id: whoami-then-pwd
      - id: pwd-then-whoami
  - id: user-home-env-pair
    desc: USER and HOME environment queries
    crit: notable
    conf: 0.65
    all:
      - id: micro-behaviors/os/env/access::getenv-user
      - id: micro-behaviors/os/env/access::getenv-home
  # User info composite
  - id: user-info
    desc: User information fingerprinting
    crit: notable
    conf: 0.7
    any:
      - id: whoami-pwd-pair
      - id: micro-behaviors/process/user/query::host-user-pwd-chain
      - id: micro-behaviors/process/user/query::whoami-cmd
      - id: micro-behaviors/fs/path/config/accounts::account-files
      - id: user-home-env-pair
    unless:
      - id: well-known/app/drivers/
