# User Information Fingerprinting
# ATT&CK: T1033 (System Owner/User Discovery)
# NOTE: All neutral user query functions moved to micro-behaviors/process/user/ and micro-behaviors/os/env/
defaults:
  platforms: [unix, windows]
  attack: "T1033"
traits:
  - id: whoami-pwd-pair
    desc: whoami and pwd reconnaissance chain
    crit: suspicious
    conf: 0.86
    for: [shell, python]
    if:
      type: text
      regex: \bwhoami\b[^'"]{0,80}\bpwd\b|\bpwd\b[^'"]{0,80}\bwhoami\b
    unless:
      - id: well-known/app/calvyn-code
      - id: well-known/app/anthropic-claude-code
      - id: well-known/app/2b-agent
composite_rules:
  - id: user-home-env-pair
    desc: USER and HOME environment queries
    crit: notable
    conf: 0.65
    all:
      - id: micro-behaviors/os/env/access::getenv-user
      - id: micro-behaviors/os/env/access::getenv-home
  # User info composite
  - id: user-info
    desc: User information fingerprinting
    crit: notable
    conf: 0.7
    any:
      - id: whoami-pwd-pair
      - id: micro-behaviors/process/user/query::host-user-pwd-chain
      - id: micro-behaviors/process/user/query::whoami-cmd
      - id: micro-behaviors/fs/path/config/accounts::account-files
      - id: user-home-env-pair
    unless:
      - id: well-known/app/drivers/
