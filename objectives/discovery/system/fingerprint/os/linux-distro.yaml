defaults:
  platforms:
    - unix
    - windows
  crit: notable
  attack: T1082
  mbc: B0012
  for: [scripts, binaries]
traits:
  - id: os-release-open
    desc: Open os-release file
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: open\(.{0,15}os-release|/rgp/bf-eryrnfr
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: distro-debian-check
    desc: Debian distro check
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: ID=debian|ID_LIKE=debian
  - id: distro-fedora-check
    desc: Fedora distro check
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: ID=fedora|ID_LIKE=fedora
  - id: distro-ubuntu-check
    desc: Ubuntu distro check
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: ID=ubuntu
  # "debian"/"fedora" within 15 chars of "exec" is a weak co-occurrence common
  # in legitimate Debian/Fedora packaging (debian/rules, dh_exec,
  # execute_after_*). It is a building block for the linux-distro-fingerprint
  # composite (needs: 2 distro signals), not a standalone suspicious indicator.
  - id: debian-specific-exec
    desc: Debian-specific execution
    crit: component
    conf: 0.8
    if:
      type: text
      regex: debian.{0,15}exec|exec.{0,15}debian
  - id: fedora-specific-exec
    desc: Fedora-specific execution
    crit: component
    conf: 0.8
    if:
      type: text
      regex: fedora.{0,15}exec|exec.{0,15}fedora
  - id: apt-package-manager
    desc: apt package manager reference
    crit: notable
    conf: 0.5
    if:
      type: text
      exact: apt
composite_rules:
  - id: linux-distro-identification
    desc: Linux distro identification
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/fs/path/os::os-release-path
      - id: os-release-open
  - id: distro-specific-targeting
    desc: Distro-specific OS checks
    crit: notable
    conf: 0.75
    for:
      - python
      - shell
    any:
      - id: distro-debian-check
      - id: distro-fedora-check
      - id: distro-ubuntu-check
    all:
      - id: linux-distro-identification
  - id: adaptive-linux-malware
    desc: Adaptive Linux malware
    crit: suspicious
    conf: 0.9
    platforms:
      - linux
    needs: 2
    any:
      - id: debian-specific-exec
      - id: fedora-specific-exec
      - id: distro-debian-check
      - id: distro-fedora-check
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/library/python-stdlib/
