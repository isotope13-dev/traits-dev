defaults:
  platforms:
    - unix
    - windows
  crit: notable
  attack: T1082
  mbc: B0012
  for: [scripts, binaries]
traits:
  - id: os-check-windows
    desc: "\"Windows\" string literal"
    crit: baseline
    conf: 0.4
    if:
      type: string_literal
      substr: Windows
    unless:
      - id: metadata/file/text/catalog::vscode-php-global-functions-catalog
      - id: metadata/lang/source::windows-generated-def-table
      - type: text
        substr: on Windows ensure PowerShell is available
  - id: os-check-linux
    desc: Linux platform detection marker
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: Linux
    unless:
      - id: metadata/lang/source::windows-generated-def-table
  - id: os-check-darwin
    desc: Darwin/macOS detection string
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      substr: Darwin
    unless:
      - id: metadata/lang/source::windows-generated-def-table
  - id: os-conditional-exec
    desc: OS conditional execution
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: if.{0,10}osn.{0,5}==.{0,5}0|if.{0,10}check_os.{0,5}==
  - id: multi-os-commands
    desc: Multi-OS command variants
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: (ipconfig|ifconfig).{0,30}(tasklist|ps)
  - id: windows-ipconfig
    desc: Windows ipconfig command
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      substr: ipconfig
composite_rules:
  - id: platform-profiling
    desc: System platform profiling
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::platform-system
      - id: micro-behaviors/os/sysinfo/platform/runtime::platform-node
      - id: micro-behaviors/os/sysinfo/platform/runtime::platform-full
  - id: multi-os-targeting
    desc: Multi-OS targeting behavior
    crit: suspicious
    conf: 0.85
    for:
      - python
      - javascript
    needs: 2
    any:
      - id: os-check-windows
      - id: os-check-linux
      - id: os-check-darwin
    all:
      - id: os-conditional-exec
  - id: cross-platform-malware
    desc: Cross-platform malware capability
    crit: hostile
    conf: 0.9
    all:
      - id: platform-profiling
      - id: multi-os-targeting
      - id: multi-os-commands
