defaults:
  platforms:
    - unix
    - windows
    - macos
  crit: notable
  attack: T1082
  mbc: B0012
  for:
    - python
    - javascript
    - shell
traits:
  - id: os-check-windows
    desc: Windows OS detection string
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: Windows
  - id: os-check-linux
    desc: Linux OS detection string
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: Linux
  - id: os-check-darwin
    desc: Darwin/macOS detection string
    crit: baseline
    conf: 0.6
    if:
      type: string_value
      substr: Darwin
  - id: os-conditional-exec
    desc: OS conditional execution
    crit: suspicious
    conf: 0.75
    if:
      type: string_value
      regex: if.{0,10}osn.{0,5}==.{0,5}0|if.{0,10}check_os.{0,5}==
  - id: multi-os-commands
    desc: Multi-OS command variants
    crit: suspicious
    conf: 0.75
    if:
      type: string_value
      regex: (ipconfig|ifconfig).{0,30}(tasklist|ps)
  - id: windows-ipconfig
    desc: Windows ipconfig command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      substr: ipconfig
composite_rules:
  - id: platform-profiling
    desc: System platform profiling
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/platform::platform-system
      - id: micro-behaviors/os/sysinfo/platform::platform-node
      - id: micro-behaviors/os/sysinfo/platform::platform-full
  - id: multi-os-targeting
    desc: Multi-OS targeting behavior
    crit: suspicious
    conf: 0.85
    for:
      - python
      - javascript
    needs: 2
    any:
      - id: os-check-windows
      - id: os-check-linux
      - id: os-check-darwin
    all:
      - id: os-conditional-exec
  - id: cross-platform-malware
    desc: Cross-platform malware capability
    crit: hostile
    conf: 0.9
    platforms:
      - unix
      - windows
    all:
      - id: platform-profiling
      - id: multi-os-targeting
      - id: multi-os-commands
