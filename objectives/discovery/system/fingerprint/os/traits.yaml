# Operating System Information Collection
# ATT&CK: T1082 (System Information Discovery)
# NOTE: All neutral OS path/command references moved to micro-behaviors/fs/path/os/
defaults:
  platforms: [unix, windows, macos]
  attack: "T1082"
traits:
composite_rules:
  # OS info composite
  - id: os-info
    desc: Operating system fingerprinting
    crit: notable
    conf: 0.7
    unless:
      - id: well-known/lib/electron::electron-chromium-runtime-strong
    any:
      - id: micro-behaviors/fs/path/os/
