defaults:
  for: [pe]
  platforms: [windows]
  attack: T1082

traits:
  - id: user-service-path
    desc: UserService endpoint path string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /UserService
  - id: getusers-operation
    desc: GetUsers SOAP operation marker
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: IUserService/GetUsers

composite_rules:
  - id: dotnet-network-identity-fingerprint
    desc: .NET MAC fingerprinting over WCF
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/os/network/interface::dotnet-network-interface-recon
      - id: micro-behaviors/communications/ipc/wcf::dotnet-wcf-http-binding
    any:
      - id: micro-behaviors/os/sysinfo/network::dotnet-mac-address-enumeration
      - id: micro-behaviors/communications/ipc/wcf::dotnet-wcf-generated-soap-client
      - id: getusers-operation
      - id: user-service-path
    needs: 1
