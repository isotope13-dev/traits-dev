defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1082
traits:
  - id: network-interface-enumeration-dotnet
    desc: .NET network interface enumeration
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 'NetworkInterface.GetAllNetworkInterfaces()'
  - id: machine-name-read
    desc: Reads machine name
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'Environment.MachineName'
  - id: memory-profile-read
    desc: Reads host memory profile
    crit: notable
    conf: 0.94
    count_min: 4
    if:
      type: text
      regex: 'MyProject\.Computer\.Info\.(Total|Available)(Physical|Virtual)Memory'
composite_rules:
  - id: host-fingerprint-panel
    desc: Host and network fingerprinting panel
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: network-interface-enumeration-dotnet
      - id: machine-name-read
      - id: memory-profile-read
      - id: objectives/discovery/network/scan/external::ip-lookup-service
