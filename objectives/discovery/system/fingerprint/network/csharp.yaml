defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1082
traits:
  - id: memory-profile-read
    desc: Reads host memory profile
    crit: notable
    conf: 0.94
    count_min: 4
    if:
      type: text
      regex: 'MyProject\.Computer\.Info\.(Total|Available)(Physical|Virtual)Memory'
composite_rules:
  - id: host-fingerprint-panel
    desc: Host and network fingerprinting panel
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/network::dotnet-network-interface-enumeration
      - id: micro-behaviors/os/sysinfo/hostname::dotnet-machine-name-read
      - id: memory-profile-read
      - id: objectives/discovery/system/fingerprint/network::ip-lookup-service
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
