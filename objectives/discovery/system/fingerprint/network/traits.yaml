defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  attack: T1082
traits:
  - id: hwaddr
    desc: HWaddr MAC prefix
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: HWaddr
  - id: ether-prefix
    desc: '"ether " MAC prefix'
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: ether\s+[0-9a-fA-F]{2}[:-][0-9a-fA-F]{2}[:-][0-9a-fA-F]{2}
  - id: siocgifhwaddr
    desc: SIOCGIFHWADDR ioctl
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: SIOCGIFHWADDR
composite_rules:
  - id: network-interfaces
    desc: Network interface fingerprinting (MAC address)
    crit: notable
    conf: 0.75
    any:
      - id: objectives/discovery/network/interface::ifconfig-comp
      - id: hwaddr
      - id: ether-prefix
      - id: micro-behaviors/communications/socket::getifaddrs-symbol
      - id: siocgifhwaddr
