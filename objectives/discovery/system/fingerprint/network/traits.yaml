defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1082
traits:
  - id: hwaddr
    desc: HWaddr MAC prefix
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: HWaddr
  - id: ether-prefix
    desc: '"ether " MAC prefix'
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: ether\s+[0-9a-fA-F]{2}[:-][0-9a-fA-F]{2}[:-][0-9a-fA-F]{2}
  - id: siocgifhwaddr
    desc: "MAC address query ioctl (fingerprint)"
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: SIOCGIFHWADDR
composite_rules:
  - id: network-interfaces
    desc: Network interface fingerprinting (MAC address)
    crit: notable
    conf: 0.75
    any:
      - id: objectives/discovery/network/interface
      - id: hwaddr
      - id: ether-prefix
      - id: micro-behaviors/communications/socket/interface::getifaddrs-symbol
      - id: siocgifhwaddr
