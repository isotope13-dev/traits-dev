defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1082
composite_rules:
  - id: network-interfaces
    desc: Enumerates network interfaces or hardware addresses
    crit: notable
    conf: 0.75
    unless:
      - id: well-known/lib/electron::electron-chromium-runtime-strong
    any:
      - id: objectives/discovery/network/interface
      - id: micro-behaviors/os/sysinfo/network::ifconfig-hwaddr-field
      - id: micro-behaviors/os/sysinfo/network::ether-mac-address-field
      - id: micro-behaviors/communications/socket/interface::getifaddrs-symbol
      - id: micro-behaviors/os/sysinfo/network::siocgifhwaddr-ioctl
