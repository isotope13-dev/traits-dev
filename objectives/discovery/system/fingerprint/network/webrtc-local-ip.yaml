defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1016
traits:
- id: webrtc-empty-ice-servers
  desc: WebRTC peer connection without ICE servers
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'iceServers\s*:\s*\[\s*\]'
- id: webrtc-datachannel-call
  desc: WebRTC data channel creation
  crit: component
  conf: 0.9
  if:
    type: symbol
    regex: '(^|\.)(createDataChannel)$'
- id: webrtc-icecandidate-handler
  desc: WebRTC ICE candidate handler
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "onicecandidate"
- id: local-ip-list-symbol
  desc: Local IP list symbol
  crit: component
  conf: 0.85
  if:
    type: symbol
    regex: '(^|\.)(localIpList)$'
- id: webrtc-peerconnection-call--rtcpeerconnection
  desc: WebRTC peer connection (RTCPeerConnection)
  crit: component
  conf: 0.9
  if:
    type: text
    word: RTCPeerConnection
- id: webrtc-peerconnection-call--mozrtcpeerconnection
  desc: WebRTC peer connection (mozRTCPeerConnection)
  crit: component
  conf: 0.9
  if:
    type: text
    word: mozRTCPeerConnection
- id: webrtc-peerconnection-call--webkitrtcpeerconnection
  desc: WebRTC peer connection (webkitRTCPeerConnection)
  crit: component
  conf: 0.9
  if:
    type: text
    word: webkitRTCPeerConnection
composite_rules:
- id: webrtc-peerconnection-call
  desc: WebRTC peer connection creation
  crit: component
  conf: 0.9
  any:
  - id: webrtc-peerconnection-call--rtcpeerconnection
  - id: webrtc-peerconnection-call--mozrtcpeerconnection
  - id: webrtc-peerconnection-call--webkitrtcpeerconnection
- id: webrtc-local-ip-discovery
  desc: WebRTC local IP discovery
  crit: notable
  conf: 0.94
  all:
  - id: webrtc-peerconnection-call
  - id: webrtc-datachannel-call
  - id: webrtc-icecandidate-handler
  any:
  - id: webrtc-empty-ice-servers
  - id: local-ip-list-symbol
