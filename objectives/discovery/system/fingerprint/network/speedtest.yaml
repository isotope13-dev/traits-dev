defaults:
  platforms: [linux, unix, android]
  for: [elf, shell, c, cpp]
  attack: T1046
composite_rules:
  - id: speedtest-bandwidth-profiling
    desc: Profiles host bandwidth with Speedtest endpoints
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/benchmark/speedtest::speedtest
      - id: micro-behaviors/communications/benchmark/speedtest::ookla-config-endpoint
      - id: micro-behaviors/communications/benchmark/speedtest::ookla-server-list-endpoint
    any:
      - id: micro-behaviors/communications/benchmark/speedtest::large-speedtest-upload
      - id: micro-behaviors/communications/http/post::post-request-line
