defaults:
  attack: T1082
  platforms: [unix, windows, macos]
composite_rules:
  - id: ps-env-fingerprint
    desc: Helper for env var fingerprinting
    crit: notable
    all:
      - id: micro-behaviors/os/env/vars/access::env-computername
      - id: micro-behaviors/os/env/vars/access::env-username
  - id: ps-os-fingerprint
    desc: Helper for OS fingerprinting
    crit: notable
    all:
      - id: micro-behaviors/os/wmi/query::query-os-info
      - id: micro-behaviors/os/sysinfo/platform/version::os-version
  - id: system-fingerprint-bundle
    desc: "Collects extensive system information (fingerprinting)"
    crit: notable
    conf: 0.9
    all:
      - id: objectives/discovery/system/fingerprint/bundle::ps-env-fingerprint
      - id: objectives/discovery/system/fingerprint/bundle::ps-os-fingerprint
      - id: micro-behaviors/os/wmi/query::query-antivirus
  # Full system fingerprinting
  - id: full-system
    desc: Comprehensive system fingerprinting
    crit: notable
    conf: 0.85
    unless:
      - id: well-known/lib/electron::electron-chromium-runtime-strong
    needs: 3
    any:
      - id: objectives/discovery/system/fingerprint/machine-id::machine-id-collection
      - id: objectives/discovery/system/fingerprint/hardware::cpu-info
      - id: objectives/discovery/system/fingerprint/network::network-interfaces
      - id: objectives/discovery/system/fingerprint/disk::fp-disk-serial
      - id: objectives/discovery/system/fingerprint/os::os-info
  # Compact binary with full system fingerprinting (more suspicious)
  - id: full-system-compact
    desc: Compact binary system fingerprinting
    crit: suspicious
    conf: 0.9
    size_max: 500000
    unless:
      - id: metadata/package/files/dependency::os-image-root-file-path
    needs: 3
    any:
      - id: objectives/discovery/system/fingerprint/machine-id::machine-id-collection
      - id: objectives/discovery/system/fingerprint/hardware::cpu-info
      - id: objectives/discovery/system/fingerprint/network::network-interfaces
      - id: objectives/discovery/system/fingerprint/disk::fp-disk-serial
      - id: objectives/discovery/system/fingerprint/os::os-info
