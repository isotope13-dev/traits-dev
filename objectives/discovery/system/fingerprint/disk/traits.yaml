defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  attack: T1082
traits:
  - id: device-serial
    desc: /device/serial path
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: /device/serial
  - id: hdio-get-identity
    desc: HDIO_GET_IDENTITY ioctl
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: HDIO_GET_IDENTITY
  - id: hdparm-cmd
    desc: hdparm -i command
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: hdparm -i
  - id: serial-short
    desc: serial_short udev field
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: serial_short
  - id: id-serial
    desc: ID_SERIAL udev field
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: ID_SERIAL
composite_rules:
  - id: fp-disk-serial
    desc: Disk serial number fingerprinting
    crit: notable
    conf: 0.75
    needs: 2
    any:
      - id: micro-behaviors/fs/disk/paths::sys-block
      - id: device-serial
      - id: hdio-get-identity
      - id: hdparm-cmd
      - id: micro-behaviors/fs/disk/paths::lsblk-cmd
      - id: micro-behaviors/fs/device/blkid::blkid
      - id: serial-short
      - id: id-serial
