defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1082
traits:
  - id: device-serial
    desc: /device/serial path
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: /device/serial
    unless:
      - id: well-known/lib/electron::electron-chromium-runtime-strong
  - id: hdparm-cmd
    desc: hdparm -i command
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: hdparm -i
  - id: serial-short
    desc: serial_short udev field
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: serial_short
  - id: id-serial
    desc: ID_SERIAL udev field
    crit: notable
    conf: 0.6
    if:
      type: text
      word: ID_SERIAL
  - id: wmic-disk-serial-command
    desc: Windows disk serial command execution
    crit: notable
    conf: 0.84
    platforms: [windows]
    for: [scripts]
    if:
      type: text
      regex: '(?i)\bwmic\s+diskdrive\s+get\s+serialnumber\b'
  - id: lsblk-name-serial-command
    desc: Linux disk serial command execution
    crit: notable
    conf: 0.82
    platforms: [linux]
    for: [scripts]
    if:
      type: text
      regex: '\blsblk\s+-o\s+NAME,SERIAL\b'
composite_rules:
  - id: fp-disk-serial
    desc: Disk serial number fingerprinting
    crit: notable
    conf: 0.75
    any:
      - id: objectives/discovery/system/fingerprint/disk::device-serial
      - id: micro-behaviors/hardware/block/device::disk-identity-ioctl
      - id: objectives/discovery/system/fingerprint/disk::hdparm-cmd
      - id: objectives/discovery/system/fingerprint/disk::id-serial
      - id: objectives/discovery/system/fingerprint/disk::lsblk-name-serial-command
      - id: objectives/discovery/system/fingerprint/disk::serial-short
      - id: objectives/discovery/system/fingerprint/disk::wmic-disk-serial-command
