defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: root-dir-enumeration
    desc: Iterates over root directories (C:, D:, /, /home) to list files
    crit: hostile
    all:
      - id: micro-behaviors/fs/enumerate/directory::root-paths-array
    any:
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
      - id: micro-behaviors/fs/enumerate/directory::node-readdir-sync-call
    unless:
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-brush
      - id: metadata/library/runtime/
      - id: metadata/package/testing/harness/runtime::node-common-require
