defaults:
  platforms: [windows]
  for: [c, cpp]
  attack: T1082

traits:
  - id: physicaldrive-format-source
    desc: PhysicalDrive enumeration source
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: PhysicalDrive
  - id: ata-pass-through-identify-source
    desc: ATA pass-through identify command source
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: IOCTL_ATA_PASS_THROUGH
  - id: identify-device-data-source
    desc: IDENTIFY_DEVICE_DATA parsing source
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: IDENTIFY_DEVICE_DATA
  - id: disk-serial-model-dump-source
    desc: Disk serial and model dump source
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: SerialNumber

composite_rules:
  - id: ata-disk-identify-fingerprint-source
    desc: ATA disk identity fingerprinting source
    crit: suspicious
    conf: 0.94
    all:
      - id: physicaldrive-format-source
      - id: ata-pass-through-identify-source
      - id: identify-device-data-source
      - id: disk-serial-model-dump-source
    any:
      - id: micro-behaviors/fs/file/handle::device-io-control-win
      - id: micro-behaviors/fs/file/open::createfile-api
  - id: raw-ata-pass-through-ioctl-source
    desc: Raw ATA pass-through IOCTL source
    crit: suspicious
    conf: 0.92
    all:
      - id: physicaldrive-format-source
      - id: ata-pass-through-identify-source
    any:
      - id: micro-behaviors/fs/file/handle::device-io-control-win
      - id: micro-behaviors/fs/file/open::createfile-api
