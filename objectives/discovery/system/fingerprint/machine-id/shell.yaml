defaults:
  platforms: [unix, macos]
  for: [scripts]
  crit: notable
  conf: 0.8
  attack: T1082

traits:
  - id: hostname-symbol
    desc: Hostname command in script
    crit: component
    if:
      type: symbol
      exact: 'hostname'
  - id: cksum-symbol
    desc: cksum command in script
    crit: component
    if:
      type: symbol
      exact: 'cksum'
  - id: cut-symbol
    desc: cut command in script
    crit: component
    if:
      type: symbol
      exact: 'cut'
  - id: hostname-seed-hex
    desc: Hostname-derived hex seed generation
    if:
      type: text
      regex: "printf.{0,50}%08x.{0,50}cksum"

composite_rules:
  - id: hostname-cksum-fingerprint
    desc: Unique machine ID from hostname and cksum
    crit: notable
    all:
      - id: hostname-symbol
      - id: cksum-symbol
      - id: cut-symbol
