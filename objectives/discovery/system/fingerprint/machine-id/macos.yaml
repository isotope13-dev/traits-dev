defaults:
  platforms:
  - macos
  for:
  - macho
  attack: T1082
  mbc: B0001.009
traits:
- id: ioplatformuuid
  desc: References macOS hardware UUID value
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: IOPlatformUUID
  unless:
  - id: well-known/app/securew2-joinnow::recognized-securew2-joinnow
- id: iokit-registry-entry
  desc: Accesses macOS device driver registry
  crit: notable
  conf: 0.75
  if:
    type: symbol
    substr: IORegistryEntryFromPath
  unless:
  - id: well-known/lib/sogen/
- id: ioplatformserialnum
  desc: References Mac hardware serial number
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: IOPlatformSerialNumber
- id: macos-command-hardware-serial
  desc: Collects macOS hardware serial command
  crit: notable
  conf: 0.9
  for: [scripts]
  if:
    type: text
    regex: 'ioreg\s+-(l|k)[^\n]{0,100}IOPlatformSerialNumber'
  downgrade:
    any:
    - id: metadata/signed/platform::apple
composite_rules:
- id: iokit-registry
  desc: IOKit registry access for hardware
  crit: notable
  conf: 0.8
  all:
  - id: iokit-registry-entry
  any:
  - id: micro-behaviors/hardware/iokit/registry::registry-property-read
  - id: micro-behaviors/hardware/iokit/registry::service-matching
- id: macos-hardware-uuid
  desc: Collects macOS hardware UUID
  crit: notable
  conf: 0.9
  all:
  - id: ioplatformuuid
  - id: iokit-registry-entry
  any:
  - id: micro-behaviors/hardware/iokit/registry::registry-property-read
  - id: ioplatformserialnum
  downgrade:
    any:
    - id: metadata/signed/platform::apple
    - id: metadata/binary/vendor/
- id: macos-command-hardware-uuid
  desc: Collects macOS hardware UUID via ioreg
  crit: notable
  conf: 0.9
  all:
  - id: micro-behaviors/os/sysinfo/machine-id::macos-ioreg-platform-uuid-command
  - id: micro-behaviors/process/create/system::go-os-exec-pclntab
  downgrade:
    any:
    - id: metadata/signed/platform::apple
- id: hardware-fingerprint-macos
  desc: macOS hardware fingerprinting (UUID +
  crit: suspicious
  conf: 0.9
  all:
  - id: ioplatformuuid
  - id: ioplatformserialnum
  any:
  - id: iokit-registry-entry
  - id: micro-behaviors/hardware/iokit/registry::registry-property-read
  downgrade:
    any:
    - id: metadata/signed/platform::apple
  unless:
    - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
- id: macos-command-host-fingerprint
  desc: macOS command-based host fingerprinting
  crit: suspicious
  conf: 0.92
  all:
  - id: macos-command-hardware-uuid
  any:
  - id: micro-behaviors/os/sysinfo/cpu::sysctl-cpu-brand-string
  - id: micro-behaviors/hardware/iokit/registry::ioreg-vendor-query
  - id: objectives/discovery/system/fingerprint/network::external-recon-service
  downgrade:
    any:
    - id: metadata/signed/platform::apple
    - id: metadata/binary/vendor/
