# Machine ID Collection
# ATT&CK: T1082 (System Information Discovery)
# NOTE: Neutral machine-id strings moved to micro-behaviors/os/machine-id/
# NOTE: Kept here: specific file paths (fp-dbus-machine-id, fp-etc-machine-id, product-uuid-path) have notable suspicion for device tracking
# NOTE: MachineGuid kept here - Windows registry key for device tracking
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
  attack: "T1082"
traits:
  # === Machine ID micro-behaviors ===
  # NOTE: Specific paths kept here - used for device tracking
  - id: fp-dbus-machine-id
    desc: dbus machine-id path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "/var/lib/dbus/machine-id"
  - id: fp-etc-machine-id
    desc: /etc/machine-id path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "/etc/machine-id"
  - id: machineguid
    desc: MachineGuid registry key
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "MachineGuid"
  - id: product-uuid-path
    desc: DMI product_uuid path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "/sys/class/dmi/id/product_uuid"
  # === Hardware UUID micro-behaviors ===
  - id: generate-hwid
    desc: GenerateHardwareId function
    crit: notable
    conf: 0.65
    if:
      type: string_value
      substr: "GenerateHardwareId"
  - id: get-hwid
    desc: GetHardwareId function
    crit: notable
    conf: 0.65
    if:
      type: string_value
      substr: "GetHardwareId"
  - id: hardware-id-string
    desc: hardware_id string
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: "(?i)hardware_id"
  - id: hwid-string
    desc: hwid string
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: "(?i)\\bhwid\\b"
    not:
      - substr: "Failed to"
        # Removed fingerprint-string duplicate - use micro-behaviors/os/sysinfo/machine-id::fingerprint-string
composite_rules:
  # Machine ID composite
  - id: machine-id-collection
    desc: Machine ID collection for victim tracking
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: fp-dbus-machine-id
      - id: fp-etc-machine-id
      - id: micro-behaviors/os/sysinfo/machine-id::machine-id-string
      - id: machineguid
      - id: micro-behaviors/os/sysinfo/machine-id::machineid-camel
      - id: product-uuid-path
      - id: micro-behaviors/os/sysinfo/machine-id::product-uuid-string
  # Hardware UUID composite
  - id: hardware-uuid
    desc: Hardware-based UUID generation
    crit: suspicious
    conf: 0.8
    needs: 2
    any:
      - id: generate-hwid
      - id: get-hwid
      - id: hardware-id-string
      - id: hwid-string
      - id: micro-behaviors/os/sysinfo/machine-id::fingerprint-string
  # Windows host fingerprint beacon: MachineGuid + physical drive + HTTP
  - id: win-fingerprint-beacon
    desc: Windows host fingerprint collection with HTTP
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    all:
      - id: machineguid
      - id: micro-behaviors/communications/http/get::internet-open
    any:
      - id: objectives/impact/system/directory::physical-drive-unc
      - id: objectives/discovery/host/security::uac-policy-query
      - id: micro-behaviors/os/compat/wow64::is-wow64-process
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  # Hostname composite
  - id: hostname
    desc: Hostname collection for identification
    crit: notable
    conf: 0.7
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/hostname::gethostname
      - id: micro-behaviors/os/sysinfo/machine-id::etc-hostname
      - id: micro-behaviors/os/env/vars/system-info::hostname-var
      - id: micro-behaviors/os/sysinfo/hostname::getfqdn
