defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
  attack: T1082
traits: []
composite_rules:
- id: hardware-id-helper
  desc: Hardware ID helper strings
  crit: component
  conf: 0.7
  any:
  - id: micro-behaviors/os/sysinfo/machine-id::generate-hwid
  - id: micro-behaviors/os/sysinfo/machine-id::get-hwid
  - id: micro-behaviors/os/sysinfo/machine-id::hardware-id-string
- id: hardware-id-source
  desc: Hardware identifier source
  crit: component
  conf: 0.7
  any:
  - id: micro-behaviors/os/sysinfo/machine-id
- id: machine-id-collection
  desc: Machine ID collection indicators
  crit: notable
  conf: 0.8
  needs: 2
  any:
  - id: micro-behaviors/os/sysinfo/machine-id::machineguid
  - id: micro-behaviors/os/sysinfo/machine-id::etc-machine-id-path
  - id: micro-behaviors/os/sysinfo/machine-id::product-uuid-path
  downgrade:
    any:
    - id: metadata/library/data::rust-keyring-secret-service
  unless:
  - id: well-known/lib/electron::electron-chromium-runtime-strong
- id: hardware-uuid
  desc: Hardware-based UUID generation
  crit: notable
  conf: 0.8
  all:
  - id: hardware-id-helper
  - id: hardware-id-source
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft-corporation
- id: win-fingerprint-beacon
  desc: Windows host fingerprint collection with HTTP
  crit: suspicious
  conf: 0.9
  platforms:
  - windows
  all:
  - id: micro-behaviors/os/sysinfo/machine-id::machineguid
  - id: micro-behaviors/communications/http/get::internet-open
  any:
  - id: objectives/impact/system/directory::physical-drive-unc
  - id: objectives/discovery/host/security::uac-policy-query
  downgrade:
    any:
    - id: metadata/signed/platform/
