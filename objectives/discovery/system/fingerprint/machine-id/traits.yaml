defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
  attack: T1082
traits:
- id: fp-dbus-machine-id
  desc: dbus machine-id path
  crit: component
  conf: 0.7
  if:
    type: text
    substr: /var/lib/dbus/machine-id
- id: fp-etc-machine-id
  desc: /etc/machine-id path
  crit: component
  conf: 0.7
  if:
    type: text
    substr: /etc/machine-id
- id: machineguid
  desc: MachineGuid registry key
  crit: component
  conf: 0.7
  if:
    type: text
    word: MachineGuid
  unless:
  - type: text
    exact: VMware Tools
- id: cryptography-machineguid-path
  desc: Windows MachineGuid registry path
  crit: component
  conf: 0.86
  platforms: [windows]
  if:
    type: text
    substr: SOFTWARE\Microsoft\Cryptography\MachineGuid
- id: microsoft-mrt-guid-path
  desc: Microsoft MRT GUID registry path
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    substr: SOFTWARE\Microsoft\RemovalTools\MRT\GUID
- id: ps-productid-registry-read--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: HKLM[:\\][^\n"']{0,8}SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion[^\n]{0,200}ProductID
    case_insensitive: true
  count_max: 1018070
- id: ps-productid-registry-read--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: ProductID[^\n]{0,200}HKLM[:\\][^\n"']{0,8}SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion
    case_insensitive: true
  count_max: 1018071
- id: product-uuid-path
  desc: DMI product_uuid path
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: /sys/class/dmi/id/product_uuid
composite_rules:
- id: hardware-id-helper
  desc: Hardware ID helper strings
  crit: component
  conf: 0.7
  any:
  - id: micro-behaviors/os/sysinfo/machine-id
- id: hardware-id-source
  desc: Hardware identifier source
  crit: component
  conf: 0.7
  any:
  - id: machineguid
  - id: cryptography-machineguid-path
  - id: microsoft-mrt-guid-path
  - id: product-uuid-path
  - id: micro-behaviors/os/sysinfo/machine-id::product-uuid-string
  - id: micro-behaviors/os/sysinfo/machine-id::fingerprint-string
- id: machine-id-collection
  desc: Machine ID collection indicators
  crit: notable
  conf: 0.8
  needs: 2
  any:
  - id: fp-dbus-machine-id
  - id: fp-etc-machine-id
  - id: micro-behaviors/os/sysinfo/machine-id::machine-id-string
  - id: machineguid
  - id: cryptography-machineguid-path
  - id: microsoft-mrt-guid-path
  - id: micro-behaviors/os/sysinfo/machine-id::machineid-camel
  - id: product-uuid-path
  - id: micro-behaviors/os/sysinfo/machine-id::product-uuid-string
  downgrade:
    any:
    - id: metadata/library/data::rust-keyring-secret-service
- id: hardware-uuid
  desc: Hardware-based UUID generation
  crit: notable
  conf: 0.8
  all:
  - id: hardware-id-helper
  - id: hardware-id-source
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft-corporation
- id: win-fingerprint-beacon
  desc: Windows host fingerprint collection with HTTP
  crit: suspicious
  conf: 0.9
  platforms:
  - windows
  all:
  - id: machineguid
  - id: micro-behaviors/communications/http/get::internet-open
  any:
  - id: objectives/impact/system/directory::physical-drive-unc
  - id: objectives/discovery/host/security::uac-policy-query
  downgrade:
    any:
    - id: metadata/signed/platform/
- id: ps-productid-registry-read
  desc: PowerShell reads Windows ProductID registry
  crit: notable
  conf: 0.85
  for: [powershell]
  platforms: [windows]
  any:
  - id: ps-productid-registry-read--rx-1
  - id: ps-productid-registry-read--rx-2
