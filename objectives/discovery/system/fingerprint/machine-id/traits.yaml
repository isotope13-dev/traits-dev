defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1082
traits:
  - id: fp-dbus-machine-id
    desc: dbus machine-id path
    crit: component
    conf: 0.7
    if:
      type: text
      substr: /var/lib/dbus/machine-id
  - id: fp-etc-machine-id
    desc: /etc/machine-id path
    crit: component
    conf: 0.7
    if:
      type: text
      substr: /etc/machine-id
  - id: machineguid
    desc: MachineGuid registry key
    crit: component
    conf: 0.7
    if:
      type: text
      word: MachineGuid
    unless:
      - type: text
        exact: VMware Tools
  - id: ps-productid-registry-read
    desc: PowerShell reads Windows ProductID registry
    crit: notable
    conf: 0.85
    platforms: [windows]
    for: [powershell]
    if:
      type: text
      regex: HKLM[:\\][^\n"']{0,8}SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion[^\n]{0,200}ProductID|ProductID[^\n]{0,200}HKLM[:\\][^\n"']{0,8}SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion
      case_insensitive: true
  - id: product-uuid-path
    desc: DMI product_uuid path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /sys/class/dmi/id/product_uuid
  - id: generate-hwid
    desc: GenerateHardwareId function
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: GenerateHardwareId
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: get-hwid
    desc: GetHardwareId function
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: GetHardwareId
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: hardware-id-string
    desc: hardware_id string
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)\bhardware_id\b
    not:
      - substr: V4_Driver_Hardware_IDs
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: hwid-string
    desc: hwid string
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)\bhwid\b
    not:
      - substr: Failed to
    unless:
      - id: metadata/signed/platform::microsoft
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
composite_rules:
  - id: hardware-id-helper
    desc: Hardware ID helper strings
    crit: component
    conf: 0.7
    any:
      - id: generate-hwid
      - id: get-hwid
      - id: hardware-id-string
      - id: hwid-string
  - id: hardware-id-source
    desc: Hardware identifier source
    crit: component
    conf: 0.7
    any:
      - id: machineguid
      - id: product-uuid-path
      - id: micro-behaviors/os/sysinfo/machine-id::product-uuid-string
      - id: micro-behaviors/os/sysinfo/machine-id::fingerprint-string
  - id: machine-id-collection
    desc: Machine ID collection for victim tracking
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: fp-dbus-machine-id
      - id: fp-etc-machine-id
      - id: micro-behaviors/os/sysinfo/machine-id::machine-id-string
      - id: machineguid
      - id: micro-behaviors/os/sysinfo/machine-id::machineid-camel
      - id: product-uuid-path
      - id: micro-behaviors/os/sysinfo/machine-id::product-uuid-string
  - id: hardware-uuid
    desc: Hardware-based UUID generation
    crit: notable
    conf: 0.8
    all:
      - id: hardware-id-helper
      - id: hardware-id-source
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: win-fingerprint-beacon
    desc: Windows host fingerprint collection with HTTP
    crit: suspicious
    conf: 0.9
    platforms:
      - windows
    all:
      - id: machineguid
      - id: micro-behaviors/communications/http/get::internet-open
    any:
      - id: objectives/impact/system/directory::physical-drive-unc
      - id: objectives/discovery/host/security::uac-policy-query
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
