defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1082"
traits:
  - id: fingerprintjs-load
    desc: FingerprintJS browser probe
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: FingerprintJS.load

  - id: encoded-browser-profile-fields
    desc: Encoded browser profile fields
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'btoa\((JSON\.stringify\()?get(VideoCardInfo|Languages|ScreenInfo)\('

composite_rules:
  - id: browser-fingerprint-bundle
    desc: Collects multiple browser environment fields for fingerprinting
    crit: notable
    conf: 0.9
    # UA, platform, and localStorage are common compatibility/state APIs.
    # Require a visual, timezone, and graphics fingerprint together.
    all:
      - id: micro-behaviors/os/sysinfo/platform/browser::browser-screen-dimensions-read
      - id: micro-behaviors/os/sysinfo/platform/browser::browser-timezone-read
      - id: micro-behaviors/os/sysinfo/platform/browser::browser-webgl-renderer-read
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: well-known/app/pinokio::pinokio-client-runtime
      - id: well-known/lib/web-ui-vendors::mobile-browser-detection-helper
      # Any recognized JS bundle / minified asset: vendored libraries naturally
      # read navigator/platform/localStorage, so the co-occurrence is a bundling
      # artifact, not fingerprinting intent. Subsumes js-large-module-bundle.
      - id: metadata/library/structure/
      - id: well-known/lib/ably::ably-js-library

  - id: hybrid-env-profiling
    desc: Detects and profiles hybrid environments (Electron/NW.js)
    crit: notable
    conf: 0.95
    any:
      - id: micro-behaviors/os/sysinfo/platform/browser::electron-renderer-detect
      - id: micro-behaviors/os/sysinfo/platform/browser::nwjs-detect

  - id: browser-encoded-fingerprint-profile
    desc: Encoded browser fingerprint profile
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: fingerprintjs-load
      - id: micro-behaviors/hardware/input/event::browser-deviceorientation-listener
      - id: encoded-browser-profile-fields

  - id: browser-recon-persistence
    desc: Browser environment profiling with storage persistence
    crit: notable
    conf: 0.95
    all:
      - id: browser-fingerprint-bundle
      - id: micro-behaviors/data/db/web-storage::browser-storage-persistence
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: well-known/lib/web-ui-vendors::mobile-browser-detection-helper
      - id: metadata/library/runtime::acquire-vscode-api
      - id: micro-behaviors/process/interpreter/vm/

  - id: hybrid-env-recon-persistence
    desc: Hybrid environment (Electron/NW.js) profiling with persistence
    crit: suspicious
    conf: 0.98
    all:
      - id: hybrid-env-profiling
      - id: micro-behaviors/data/db/web-storage::browser-storage-persistence
      - id: browser-fingerprint-bundle
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
