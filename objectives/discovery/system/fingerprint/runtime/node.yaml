defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: node-os-platform
    desc: Platform detection via os module
    crit: notable
    conf: 0.75
    attack: T1082
    if:
      type: ast
      kind: call
      exact: os.platform
  - id: os-arch
    desc: Architecture detection via os module
    crit: notable
    conf: 0.75
    attack: T1082
    if:
      type: ast
      kind: call
      exact: os.arch
  - id: os-release-call
    desc: OS release version collection
    crit: notable
    conf: 0.75
    attack: T1082
    if:
      type: ast
      kind: call
      exact: os.release
  - id: node-os-userInfo
    desc: User information collection
    crit: suspicious
    conf: 0.85
    attack: T1033
    if:
      type: ast
      kind: call
      exact: os.userInfo
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: definitelytyped-os-test-path
      - id: typescript-os-api-test
  - id: os-cpus
    desc: CPU information collection
    crit: notable
    conf: 0.7
    attack: T1082
    if:
      type: ast
      kind: call
      exact: os.cpus
  - id: os-totalmem
    desc: Total memory collection
    crit: notable
    conf: 0.7
    attack: T1082
    if:
      type: ast
      kind: call
      exact: os.totalmem
  - id: os-networkInterfaces
    desc: Network interface enumeration
    crit: suspicious
    conf: 0.85
    attack: T1016
    if:
      type: ast
      kind: call
      exact: os.networkInterfaces
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: definitelytyped-os-test-path
      - id: typescript-os-api-test
  - id: mac-keyword-lower
    desc: mac keyword (lowercase)
    crit: component
    conf: 0.6
    count_min: 4
    if:
      type: string_literal
      word: mac
    unless:
      - id: metadata/file/text/format::i18n-locale-file
  - id: mac-keyword-upper
    desc: MAC keyword (uppercase)
    crit: component
    conf: 0.6
    count_min: 2
    if:
      type: string_literal
      word: MAC
    unless:
      - id: metadata/file/text/format::i18n-locale-file
  - id: mac-address-regex
    desc: MAC address regex pattern
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: '[0-9a-fA-F]{2}(:[0-9a-fA-F]{2}){5}'
  - id: internal-filter-keyword
    desc: internal network interface filter keyword
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: internal.{0,30}(IPv[46]|family)|networkInterfaces.{0,200}internal
  - id: createhash-call
    desc: crypto.createHash call
    crit: component
    conf: 0.55
    if:
      type: string_literal
      substr: createHash
  - id: sha256-keyword
    desc: sha256 hash algorithm
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      word: sha256
  - id: md5-keyword
    desc: md5 hash algorithm
    crit: baseline
    conf: 0.5
    if:
      type: string_literal
      word: md5
    unless:
      - id: metadata/file/text/catalog::vscode-php-global-functions-catalog
  - id: userinfo-keyword
    desc: userInfo keyword
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      word: userInfo
  - id: networkinterfaces-keyword
    desc: networkInterfaces keyword for host profiling
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: "networkInterfaces"
  - id: get-process-cmd
    desc: PowerShell Get-Process
    crit: notable
    conf: 0.7
    mbc: E1592
    attack: T1057
    if:
      type: string_literal
      substr: "Get-Process"
    unless:
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-brush
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::is-test
  - id: powershell-systeminfo-json
    desc: PowerShell systeminfo JSON profiling
    crit: notable
    conf: 0.92
    attack: T1082
    if:
      type: text
      regex: 'systeminfo(\\x20|\s)+/FO(\\x20|\s)+CSV'
  - id: net1-session-admin-probe
    desc: net1 session admin probe
    crit: suspicious
    conf: 0.9
    attack: T1069.001
    if:
      type: text
      substr: net1 session
  - id: windows-runas-profile-field
    desc: Windows runas profile field
    crit: component
    conf: 0.7
    if:
      type: text
      regex: 'version_build.{0,80}runas.{0,80}type_file'
  - id: process-env-keys-entries
    desc: process.env keys/entries enumeration
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: Object\.(keys|entries)\s*\(\s*process\.env\s*\)
  - id: process-env-json-stringify
    desc: process.env serialized as JSON
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: JSON\.stringify\s*\(\s*process\.env\s*\)
  - id: ts-os-userinfo-buffer-test
    desc: TypeScript os.userInfo buffer type test
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: "const b: os.UserInfo<Buffer> = os.userInfo({ encoding: 'buffer' });"
  - id: ts-os-networkinterfaces-type-test
    desc: TypeScript os.networkInterfaces type test
    crit: baseline
    conf: 0.98
    if:
      type: text
      substr: 'let result: { [index: string]: os.NetworkInterfaceInfo[] };'
composite_rules:
  - id: process-env-serialization
    desc: process.env serialization call
    crit: notable
    conf: 0.75
    any:
      - id: process-env-keys-entries
      - id: process-env-json-stringify
  - id: node-windows-host-privilege-profile
    desc: Node Windows host privilege profile
    crit: suspicious
    conf: 0.93
    attack: T1082
    all:
      - id: powershell-systeminfo-json
    any:
      - id: net1-session-admin-probe
      - id: windows-runas-profile-field
      - id: metadata/import/builtin::require-child-process-any
      - id: micro-behaviors/process/create/spawn::windowshide-obfuscated-true
  - id: mac-keyword-variants
    desc: MAC keyword variants
    any:
      - id: mac-keyword-lower
      - id: mac-keyword-upper
    crit: notable
  - id: mac-patterns
    desc: MAC address patterns
    any:
      - id: mac-keyword-variants
      - id: mac-address-regex
      - id: internal-filter-keyword
    crit: component
  - id: hash-algorithms
    desc: Hash algorithm keywords
    any:
      - id: sha256-keyword
      - id: md5-keyword
    crit: baseline
  - id: system-id-sources
    desc: System identification sources
    any:
      - id: micro-behaviors/os/sysinfo/
      - id: userinfo-keyword
      - id: networkinterfaces-keyword
    crit: component
  - id: object-serialization
    desc: Object serialization methods
    any:
      - id: micro-behaviors/data/serialize/json::json-stringify-call
      - id: micro-behaviors/data/serialize/json::object-keys-call
      - id: micro-behaviors/data/serialize/json::object-entries-call
    crit: baseline
  - id: typescript-os-api-test
    desc: TypeScript os module API type test
    crit: baseline
    conf: 0.98
    all:
      - id: ts-os-userinfo-buffer-test
      - id: ts-os-networkinterfaces-type-test
  - id: definitelytyped-os-test-path
    desc: DefinitelyTyped os test source path
    crit: baseline
    conf: 0.98
    all:
      - id: metadata/package/testing/presence/harness::definitelytyped-package-path
      - id: metadata/package/testing/presence/harness::definitelytyped-test-directory-source-path
  - id: all-os-methods
    desc: All os module methods
    any:
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: node-os-platform
      - id: os-arch
      - id: os-release-call
      - id: node-os-userInfo
      - id: os-cpus
      - id: os-totalmem
      - id: os-networkInterfaces
    crit: notable
  - id: mac-address
    desc: MAC address extraction pattern
    crit: suspicious
    conf: 0.9
    mbc: E1592
    attack: T1016
    all:
      - id: os-networkInterfaces
      - id: mac-patterns
  - id: machine-id-generation
    desc: Machine unique identifier generation
    crit: notable
    conf: 0.85
    mbc: E1592
    attack: T1082
    all:
      - id: createhash-call
      - id: hash-algorithms
    any:
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: node-os-userInfo
      - id: os-networkInterfaces
      - id: mac-patterns
  - id: full-fingerprint
    desc: Comprehensive system fingerprinting (multiple vectors)
    crit: suspicious
    conf: 0.9
    mbc: E1592
    attack: T1082
    needs: 4
    any:
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: node-os-platform
      - id: os-arch
      - id: os-release-call
      - id: node-os-userInfo
      - id: os-cpus
      - id: os-totalmem
      - id: os-networkInterfaces
      - id: objectives/discovery/system/hardware/display::display-resolution-discovery
      - id: objectives/discovery/system/locale/
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: definitelytyped-os-test-path
      - id: typescript-os-api-test
  - id: process-env-dump
    desc: Environment variable enumeration
    crit: notable
    conf: 0.85
    mbc: E1592
    attack: T1082
    all:
      - id: micro-behaviors/os/env/access::javascript
      - id: process-env-serialization
  - id: process-list
    desc: Running process enumeration
    crit: suspicious
    conf: 0.9
    mbc: E1592
    attack: T1057
    any:
      - id: micro-behaviors/process/enumerate/shell::tasklist
      - id: micro-behaviors/process/enumerate/shell::ps-aux
      - id: micro-behaviors/process/enumerate/shell::ps-ef
      - id: get-process-cmd
    unless:
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-brush
