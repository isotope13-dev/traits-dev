defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: os-totalmem
    desc: Total memory collection
    crit: notable
    conf: 0.7
    attack: T1082
    if:
      type: symbol
      kind: call
      exact: os.totalmem
  - id: mac-keyword-lower
    desc: Repeats lowercase "mac" in string literals
    crit: component
    conf: 0.6
    count_min: 4
    if:
      type: string_literal
      word: mac
    unless:
      - id: metadata/file/format/
      - id: metadata/library/structure::js-distribution-output-path
  - id: mac-keyword-upper
    desc: MAC keyword (uppercase)
    crit: component
    conf: 0.6
    count_min: 2
    if:
      type: string_literal
      word: MAC
    unless:
      - id: metadata/file/format/
      - id: metadata/library/structure::js-distribution-output-path
  - id: mac-address-regex
    desc: MAC address regex pattern
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: '[0-9a-fA-F]{2}(:[0-9a-fA-F]{2}){5}'
  - id: internal-filter-keyword
    desc: internal network interface filter keyword
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: internal.{0,30}(IPv[46]|family)|networkInterfaces.{0,200}internal
# sha256-keyword / md5-keyword relocated to
# micro-behaviors/crypto/hash/digest::{sha256-keyword,md5-keyword} — a bare
# hash-name reference is a neutral crypto capability, not fingerprinting. The
# Hashing is a neutral capability; host-identifier intent is modeled by the
# machine-id composite under micro-behaviors/os/sysinfo/machine-id.
  - id: get-process-cmd
    desc: PowerShell Get-Process
    crit: notable
    conf: 0.7
    mbc: E1592
    attack: T1057
    if:
      type: string_literal
      substr: "Get-Process"
    unless:
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-brush
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
  - id: powershell-systeminfo-json
    desc: PowerShell systeminfo JSON profiling
    crit: notable
    conf: 0.92
    attack: T1082
    if:
      type: text
      regex: 'systeminfo(\\x20|\s)+/FO(\\x20|\s)+CSV'
  - id: node-wmic-lastbootuptime
    desc: Node WMIC boot-time query
    crit: notable
    conf: 0.86
    platforms: [windows]
    if:
      type: text
      regex: '(?i)\bwmic\s+os\s+get\s+lastbootuptime\b'
  - id: node-net-users-command
    desc: Node net users command
    crit: notable
    conf: 0.86
    platforms: [windows]
    if:
      type: text
      regex: '(?i)(^|[^/.\w])net\s+users\b'
  - id: node-ipconfig-all-command
    desc: Node ipconfig all command
    crit: notable
    conf: 0.86
    platforms: [windows]
    if:
      type: text
      regex: '(?i)(^|[^/.\w])ipconfig\s+/all\b'
  - id: net1-session-admin-probe
    desc: net1 session admin probe
    crit: suspicious
    conf: 0.9
    attack: T1069.001
    if:
      type: text
      substr: net1 session
  - id: windows-runas-profile-field
    desc: Windows runas profile field
    crit: component
    conf: 0.7
    if:
      type: text
      regex: 'version_build.{0,80}runas.{0,80}type_file'
  - id: node-container-identity-command
    desc: Node collects container identity by shell
    crit: notable
    conf: 0.95
    attack: T1082,T1033
    if:
      type: text
      regex: '(?is)\b(whoami|id)\b.{0,120}/proc/1/cgroup'
composite_rules:
  - id: node-container-host-profile
    desc: Node executes a container and user identity profile command
    crit: hostile
    conf: 0.99
    attack: T1082,T1033
    mbc: E1082
    all:
      - id: micro-behaviors/process/create/shell/bridge::execSync-call
      - id: node-container-identity-command
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
    any:
      - id: micro-behaviors/os/sysinfo/hostname::node-os-alias-hostname-call
      - id: micro-behaviors/process/user/query::node-os-alias-userinfo-call
      - id: objectives/discovery/system/fingerprint/user::node-host-user-query-pair
  - id: node-windows-host-privilege-profile
    desc: Node Windows host privilege profile
    crit: suspicious
    conf: 0.93
    attack: T1082
    all:
      - id: powershell-systeminfo-json
    any:
      - id: net1-session-admin-probe
      - id: windows-runas-profile-field
      - id: metadata/import/builtin::require-child-process
      - id: micro-behaviors/process/create/spawn::windowshide-obfuscated-true
  - id: mac-keyword-variants
    desc: MAC keyword variants
    any:
      - id: mac-keyword-lower
      - id: mac-keyword-upper
  - id: mac-patterns
    desc: MAC address patterns
    any:
      - id: mac-keyword-variants
      - id: mac-address-regex
      - id: internal-filter-keyword
    crit: component
  - id: system-id-sources
    desc: System identification sources
    any:
      - id: micro-behaviors/os/sysinfo/
      - id: metadata/file/string/identity::userinfo-token
      - id: micro-behaviors/os/network/interface::node-network-interfaces-reference
    crit: component
  - id: typescript-os-api-test
    desc: TypeScript os module API type test
    crit: baseline
    conf: 0.98
    all:
      - id: metadata/package/testing/presence/fixture::ts-os-userinfo-buffer-test
      - id: metadata/package/testing/presence/fixture::ts-os-networkinterfaces-type-test
  - id: definitelytyped-os-test-path
    desc: DefinitelyTyped os test source path
    crit: baseline
    conf: 0.98
    all:
      - id: metadata/package/testing/presence/harness::definitelytyped-package-path
      - id: metadata/package/testing/presence/harness::definitelytyped-test-directory-source-path
  - id: full-fingerprint
    desc: Comprehensive system fingerprinting (multiple vectors)
    crit: suspicious
    conf: 0.9
    mbc: E1592
    attack: T1082
    needs: 4
    any:
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::os-platform-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::os-arch-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::os-release-call
      - id: micro-behaviors/process/user/query::os-userinfo-call
      - id: micro-behaviors/os/sysinfo/cpu::node-cpu-information-query
      - id: os-totalmem
      - id: micro-behaviors/os/network/interface::node-network-interfaces-call
      - id: objectives/discovery/system/hardware/display::display-resolution-discovery
      - id: objectives/discovery/system/locale/
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: objectives/discovery/system/fingerprint/runtime/
      - id: objectives/discovery/system/fingerprint/runtime/
      - id: metadata/library/structure/
  - id: process-env-dump
    desc: Serializes the Node.js environment as JSON
    crit: notable
    conf: 0.85
    mbc: E1592
    attack: T1082
    all:
      - id: micro-behaviors/os/env/access::javascript
      - id: micro-behaviors/data/serialize/json::process-env-json-stringify
  - id: node-windows-cli-inventory
    desc: Node Windows CLI inventory
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    needs: 3
    any:
      - id: objectives/discovery/system/fingerprint/runtime::hostname-dup
      - id: node-wmic-lastbootuptime
      - id: node-net-users-command
      - id: node-ipconfig-all-command
      - id: micro-behaviors/process/enumerate/shell::tasklist
      - id: micro-behaviors/os/env/vars/access::js-object-keys-env
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
