# System Information Discovery - JavaScript/Node.js
# GuardDog-inspired: Detects system information gathering
# ATT&CK: T1082 (System Information Discovery)
# MBC: B0012 (Operating System Discovery)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1082"
  mbc: "B0012"
  crit: notable
composite_rules:
  # GuardDog: System information discovery
  - id: js-system-info-discovery
    desc: System information discovery (JS)
    crit: notable
    conf: 0.85
    needs: 3
    any:
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: micro-behaviors/process/user/query::os-userinfo-call
      - id: micro-behaviors/os/sysinfo/cpu::node-cpu-information-query
      - id: objectives/discovery/system/fingerprint/runtime::os-totalmem
      - id: micro-behaviors/os/network/interface::node-network-interfaces-call
