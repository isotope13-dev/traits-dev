# System Information Discovery - JavaScript/Node.js
# GuardDog-inspired: Detects system information gathering
# ATT&CK: T1082 (System Information Discovery)
# MBC: B0012 (Operating System Discovery)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1082"
  mbc: "B0012"
  crit: notable
traits:
  # GuardDog: os.hostname() - system hostname
  - id: js-os-hostname
    desc: os.hostname() system hostname
    conf: 0.80
    if:
      type: symbol
      kind: call
      exact: os.hostname
  # GuardDog: os.userInfo() - user information
  - id: js-os-userinfo
    desc: os.userInfo() user information
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: os.userInfo
  # os.arch() - CPU architecture
  - id: js-os-arch
    desc: os.arch() CPU architecture
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: os.arch
  # os.type() - OS type
  - id: js-os-type
    desc: os.type() OS type
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: os.type
composite_rules:
  # GuardDog: System information discovery
  - id: js-system-info-discovery
    desc: System information discovery (JS)
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: js-os-hostname
      - id: js-os-userinfo
      - id: objectives/discovery/system/fingerprint/hardware::node-os-platform
      - id: js-os-arch
      - id: js-os-type
      - id: os-release-call
