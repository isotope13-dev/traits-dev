# System Information Discovery - Python
# Detects Python scripts enumerating Windows/Unix system info via shell commands
# ATT&CK: T1082 (System Information Discovery)
# MBC: B0012 (Operating System Discovery)
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1082"
  mbc: "B0012"
  crit: notable

traits:
  # Windows built-in: dumps OS, hardware, network, hotfixes, memory
  - id: popen-net-user
    desc: Windows net user/localgroup command string
    conf: 0.85
    if:
      type: string_literal
      regex: "^net (user|localgroup|accounts)$"

composite_rules:
  # os.popen + Windows recon command = system discovery
  - id: python-win-cmd-recon
    desc: Windows system recon command via Python popen
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/create/subprocess::os-popen-ast
    any:
      - id: micro-behaviors/os/sysinfo/process::systeminfo-token
      - id: popen-net-user
