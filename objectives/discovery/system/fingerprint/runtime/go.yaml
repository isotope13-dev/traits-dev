defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [go, elf, pe, macho]
  attack: T1082
  mbc: B0012
  crit: notable
traits:
  - id: go-os-hostname
    desc: os.Hostname() system hostname
    conf: 0.85
    if:
      type: symbol
      exact: os.Hostname
  - id: go-os-getwd
    desc: os.Getwd() current directory
    crit: baseline
    conf: 0.75
    if:
      type: symbol
      exact: os.Getwd
  - id: runtime-goos-dup
    desc: runtime.GOOS operating system
    conf: 0.8
    if:
      type: symbol
      exact: runtime.GOOS
  - id: runtime-goarch-dup
    desc: runtime.GOARCH architecture
    conf: 0.8
    if:
      type: symbol
      exact: runtime.GOARCH
composite_rules:
  - id: go-system-info-discovery
    desc: System information discovery (Go)
    crit: notable
    conf: 0.85
    all:
      - id: go-os-hostname
    any:
      - id: objectives/discovery/system/fingerprint/runtime::runtime-goos-dup
      - id: objectives/discovery/system/fingerprint/runtime::runtime-goarch-dup
