defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [go, elf, pe, macho]
  attack: T1082
  mbc: B0012
composite_rules:
  - id: go-system-info-discovery
    desc: System information discovery (Go)
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::runtime-goos
      - id: micro-behaviors/os/sysinfo/platform/runtime::runtime-goarch
