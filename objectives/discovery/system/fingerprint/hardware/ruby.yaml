defaults:
  for: [ruby]
  platforms: [unix, windows]

composite_rules:
  - id: ruby-system-fingerprinting
    desc: Ruby system identity fingerprinting
    crit: notable
    conf: 0.86
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/hostname::ruby-socket-gethostname
      - id: micro-behaviors/os/sysinfo/platform/runtime::ruby-platform-const
      - id: micro-behaviors/process/user/query::ruby-etc-user-lookup
