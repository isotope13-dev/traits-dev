# Rust Windows reconnaissance / telemetry agent fingerprints.
# Recon-and-exec agents (mining managers, botnet beacons, payload
# loaders) commonly bundle Rust crates for full host inventory + GPU
# fingerprint + IP geolocation while shipping no VERSIONINFO and no
# Authenticode signature.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1082
  mbc: B0029
traits:
  - id: ip-geo-fieldset-cstring
    desc: Concatenated IP-geo JSON field set
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: iplatitudelongituderegionquerylatloncity

  - id: userd-cargo-build-path
    desc: Userd .cargo registry build path
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: \Users\Userd\.cargo\registry

composite_rules:
  - id: rust-recon-agent-nvml-geo
    desc: Rust recon agent with NVML and IP geolocation
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/lib/crate::reqwest-crate
      - id: micro-behaviors/hardware/display/screen::nvml-symbol-cluster
      - id: ip-geo-fieldset-cstring
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/trust-level::signer-evidence-present
