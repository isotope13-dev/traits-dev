defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: node-platform
    desc: Collects operating system platform
    crit: notable
    conf: 0.9
    attack: T1082
    if:
      id: micro-behaviors/os/sysinfo/platform/runtime::os-platform-call
  - id: node-arch
    desc: Collects CPU architecture
    crit: notable
    conf: 0.9
    attack: T1082
    count_min: 1
    if:
      id: objectives/discovery/system/fingerprint/hardware::os-arch-call
  - id: node-release
    desc: Collects OS release/version
    crit: notable
    conf: 0.9
    attack: T1082
    unless:
      - type: text
        substr: WIN_BUILD_CONPTY_SUPPORTED
      - type: text
        substr: osVersion = (/(
      - type: text
        substr: osRelease = os.release().split('.')
      - id: metadata/library/structure::js-webpack-bundle
      - id: objectives/discovery/system/fingerprint/hardware/
    if:
      id: objectives/discovery/system/fingerprint/runtime::os-release-call
  - id: node-network
    for: [text]
    desc: Enumerates network interfaces
    crit: notable
    conf: 0.85
    attack: T1016
    count_min: 1
    if:
      type: string_literal
      exact: __cleave_missing_os_networkinterfaces_call__
  - id: node-dns-getservers
    desc: Enumerates local DNS resolver configuration
    crit: notable
    conf: 0.85
    attack: T1016
    if:
      type: symbol
      exact: dns.getServers
  - id: os-module-o-alias
    desc: os module assigned to o
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "o=require('os')"
  - id: o-hostname-call
    desc: o.hostname() call
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: o.hostname
  - id: o-userinfo-call
    desc: o.userInfo() call
    crit: component
    conf: 0.78
    if:
      type: symbol
      exact: o.userInfo
  - id: o-platform-call
    desc: o.platform() call
    crit: component
    conf: 0.74
    if:
      type: symbol
      exact: o.platform
  - id: o-arch-call
    desc: o.arch() call
    crit: component
    conf: 0.74
    if:
      type: symbol
      exact: o.arch
  - id: node-sandbox-exec
    desc: Sandbox exec command selector
    crit: baseline
    conf: 0.75
    if:
      type: text
      word: sandbox-exec
  - id: si-cpu-call
    desc: "systeminformation si.cpu fingerprint"
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: text
      substr: "si.cpu("
  - id: si-baseboard-call
    desc: 'si baseboard call'
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: text
      substr: "si.baseboard("
  - id: si-disk-layout-call
    desc: 'si disk layout call'
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: text
      substr: "si.diskLayout("
  - id: si-system-call
    desc: "systeminformation si.system fingerprint"
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: text
      substr: "si.system("
composite_rules:
  - id: node-test-artifact
    desc: Node test artifact context
    crit: component
    any:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/lang/scripted::dts-declaration-file
  - id: node-comp
    desc: Node.js collects multiple host/user profile fields
    crit: suspicious
    conf: 0.85
    attack: T1082
    needs: 3
    any:
      - id: micro-behaviors/process/user/query::os-userinfo-call
      - id: node-network
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: node-platform
    unless:
      - id: objectives/discovery/system/fingerprint/hardware/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/lang/scripted::dts-declaration-file
  - id: node-data-aggregation
    desc: Aggregates system data into object
    crit: notable
    conf: 0.9
    attack: T1082
    size_max: 100000
    needs: 4
    any:
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: micro-behaviors/process/user/query::os-userinfo-call
      - id: node-platform
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-cwd-call
      - id: node-network
      - id: node-dns-getservers
    unless:
      - id: metadata/library/structure::js-webpack-bundle
      - id: well-known/app/gemini-cli/
  - id: node-short-os-alias-host-user
    desc: Short os alias collects host/user
    crit: notable
    conf: 0.9
    attack: T1082
    all:
      - id: os-module-o-alias
      - id: o-hostname-call
      - id: o-userinfo-call
  - id: node-short-os-alias-profile
    desc: Short os alias profiles system
    crit: notable
    conf: 0.88
    attack: T1082
    all:
      - id: os-module-o-alias
    any:
      - id: o-hostname-call
      - id: o-userinfo-call
      - id: o-platform-call
      - id: o-arch-call
    needs: 3
