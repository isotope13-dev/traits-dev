defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: node-hostname
    desc: Collects system hostname
    crit: notable
    conf: 0.9
    attack: T1082
    if:
      type: symbol
      exact: os.hostname
  - id: node-homedir
    desc: Collects user home directory path
    crit: notable
    conf: 0.85
    attack: T1082
    count_min: 1
    if:
      id: objectives/discovery/system::js-os-homedir
  - id: node-userinfo
    desc: Collects user account information
    crit: notable
    conf: 0.85
    attack: T1033
    if:
      type: symbol
      exact: os.userInfo
  - id: node-platform
    desc: Collects operating system platform
    crit: baseline
    conf: 0.9
    attack: T1082
    if:
      id: objectives/discovery/system/fingerprint/hardware::os-platform-call-dup
  - id: node-arch
    desc: Collects CPU architecture
    crit: notable
    conf: 0.9
    attack: T1082
    count_min: 1
    if:
      id: objectives/discovery/system/fingerprint/hardware::os-arch-call
  - id: node-release
    desc: Collects OS release/version
    crit: notable
    conf: 0.9
    attack: T1082
    unless:
      - type: text
        substr: WIN_BUILD_CONPTY_SUPPORTED
      - type: text
        substr: osVersion = (/(
      - type: text
        substr: osRelease = os.release().split('.')
      - id: metadata/library/structure::js-webpack-bundle
      - id: node-test-artifact
    if:
      id: micro-behaviors/os/sysinfo/platform::os-release-call
  - id: node-cwd
    desc: Collects current working directory
    crit: notable
    conf: 0.8
    attack: T1083
    unless:
      - type: text
        substr: path.resolve(process.cwd(), '.env')
      - type: text
        substr: "cwd: { default: () => process.cwd() }"
      - type: text
        substr: "opt.cwd || process.cwd()"
      - type: text
        substr: 'require(path.join(process.cwd(), "package.json"))'
      - type: text
        substr: getWorkingDirectoryFromPty
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness::is-test
    not:
      - substr: native-process-working-directory.node
    if:
      id: micro-behaviors/os/sysinfo/platform::process-cwd-call
  - id: node-dirname
    desc: Collects script directory path
    crit: baseline
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-fixtures
    if:
      type: text
      substr: __dirname
  - id: node-network
    desc: Enumerates network interfaces
    crit: notable
    conf: 0.85
    attack: T1016
    count_min: 1
    if:
      id: objectives/discovery/system/fingerprint/hardware::os-networkinterfaces-call
  - id: node-dns-getservers
    desc: Enumerates local DNS resolver configuration
    crit: notable
    conf: 0.85
    attack: T1016
    if:
      type: symbol
      exact: dns.getServers
  - id: os-module-o-alias
    desc: os module assigned to o
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "o=require('os')"
  - id: o-hostname-call
    desc: o.hostname() call
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: o.hostname
  - id: o-userinfo-call
    desc: o.userInfo() call
    crit: component
    conf: 0.78
    if:
      type: symbol
      exact: o.userInfo
  - id: o-platform-call
    desc: o.platform() call
    crit: component
    conf: 0.74
    if:
      type: symbol
      exact: o.platform
  - id: o-arch-call
    desc: o.arch() call
    crit: component
    conf: 0.74
    if:
      type: symbol
      exact: o.arch
  - id: node-sandbox-exec
    desc: Sandbox exec command selector
    crit: baseline
    conf: 0.75
    if:
      type: text
      word: sandbox-exec
  - id: si-cpu-call
    desc: systeminformation si.cpu() hardware fingerprinting
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: text
      substr: "si.cpu("
  - id: si-baseboard-call
    desc: systeminformation si.baseboard() motherboard fingerprinting
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: text
      substr: "si.baseboard("
  - id: si-disk-layout-call
    desc: systeminformation si.diskLayout() disk hardware fingerprinting
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: text
      substr: "si.diskLayout("
  - id: si-system-call
    desc: systeminformation si.system() system info collection
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: text
      substr: "si.system("
composite_rules:
  - id: node-test-artifact
    desc: Node test artifact context
    crit: component
    any:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
  - id: node-comp
    desc: Extensive system profiling (user, net,
    crit: suspicious
    conf: 0.85
    attack: T1082
    needs: 3
    any:
      - id: node-userinfo
      - id: node-network
      - id: node-hostname
      - id: node-homedir
      - id: node-platform
  - id: node-data-aggregation
    desc: Aggregates system data into object
    crit: notable
    conf: 0.9
    attack: T1082
    size_max: 100000
    needs: 4
    any:
      - id: node-hostname
      - id: node-homedir
      - id: node-userinfo
      - id: node-platform
      - id: node-cwd
      - id: node-network
      - id: node-dns-getservers
    unless:
      - id: metadata/library/structure::js-webpack-bundle
      - id: objectives/supply-chain/trojanized/application/benign::benign-gemini-sandbox-context
  - id: node-short-os-alias-host-user
    desc: Short os alias collects host/user
    crit: notable
    conf: 0.9
    attack: T1082
    all:
      - id: os-module-o-alias
      - id: o-hostname-call
      - id: o-userinfo-call
  - id: node-short-os-alias-profile
    desc: Short os alias profiles system
    crit: notable
    conf: 0.88
    attack: T1082
    all:
      - id: os-module-o-alias
    any:
      - id: o-hostname-call
      - id: o-userinfo-call
      - id: o-platform-call
      - id: o-arch-call
    needs: 3
