defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: node-hostname
    desc: Collects system hostname
    crit: notable
    conf: 0.9
    attack: T1082
    if:
      type: symbol
      exact: os.hostname
  - id: node-homedir
    desc: Collects user home directory path
    crit: notable
    conf: 0.85
    attack: T1082
    count_min: 1
    if:
      id: objectives/discovery/system::js-os-homedir
  - id: node-userinfo
    desc: Collects user account information
    crit: notable
    conf: 0.85
    attack: T1033
    if:
      type: symbol
      exact: os.userInfo
  - id: node-platform
    desc: Collects operating system platform
    crit: notable
    conf: 0.9
    attack: T1082
    if:
      id: objectives/discovery/system/fingerprint/hardware::os-platform-call-dup
  - id: node-arch
    desc: Collects CPU architecture
    crit: notable
    conf: 0.9
    attack: T1082
    count_min: 1
    if:
      id: objectives/discovery/system/fingerprint/hardware::os-arch-call
  - id: node-release
    desc: Collects OS release/version
    crit: notable
    conf: 0.9
    attack: T1082
    if:
      id: micro-behaviors/os/sysinfo/platform::os-release-call
  - id: node-cwd
    desc: Collects current working directory
    crit: notable
    conf: 0.8
    attack: T1083
    if:
      id: micro-behaviors/os/sysinfo/platform::process-cwd-call
  - id: node-dirname
    desc: Collects script directory path
    crit: notable
    conf: 0.75
    if:
      type: raw
      substr: __dirname
  - id: node-network
    desc: Enumerates network interfaces
    crit: notable
    conf: 0.85
    attack: T1016
    count_min: 1
    if:
      id: objectives/discovery/system/fingerprint/hardware::os-networkinterfaces-call
  - id: node-dns-getservers
    desc: Enumerates local DNS resolver configuration
    crit: notable
    conf: 0.85
    attack: T1016
    if:
      type: symbol
      exact: dns.getServers
  - id: si-cpu-call
    desc: systeminformation si.cpu() hardware fingerprinting
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: raw
      substr: "si.cpu("
  - id: si-baseboard-call
    desc: systeminformation si.baseboard() motherboard fingerprinting
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: raw
      substr: "si.baseboard("
  - id: si-disk-layout-call
    desc: systeminformation si.diskLayout() disk hardware fingerprinting
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: raw
      substr: "si.diskLayout("
  - id: si-system-call
    desc: systeminformation si.system() system info collection
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: raw
      substr: "si.system("
composite_rules:
  - id: node-comp
    desc: Extensive system profiling (user, net,
    crit: suspicious
    conf: 0.85
    attack: T1082
    needs: 3
    any:
      - id: node-userinfo
      - id: node-network
      - id: node-hostname
      - id: node-platform
  - id: node-data-aggregation
    desc: Aggregates system data into object
    crit: suspicious
    conf: 0.9
    attack: T1082
    needs: 3
    any:
      - id: node-hostname
      - id: node-homedir
      - id: node-userinfo
      - id: node-platform
      - id: node-cwd
      - id: node-network
      - id: node-dns-getservers
