defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  attack: T1082
traits:
  - id: product-serial
    desc: product_serial DMI field
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: product_serial
  - id: board-serial
    desc: board_serial DMI field
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: board_serial
composite_rules:
  - id: dmi-fields
    desc: DMI/SMBIOS fields
    crit: notable
    conf: 0.5
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/hardware/
      - id: product-serial
      - id: board-serial
  - id: dmi-smbios
    desc: DMI/SMBIOS hardware information collection
    crit: notable
    conf: 0.75
    any:
      - id: dmi-fields
      - id: micro-behaviors/os/sysinfo/hardware::dmidecode
  - id: cpu-fields
    desc: CPU info fields
    crit: notable
    conf: 0.4
    any:
      - id: micro-behaviors/os/sysinfo/hardware::cpu-model-name
      - id: micro-behaviors/os/sysinfo/hardware::cpu-family
      - id: micro-behaviors/os/sysinfo/hardware::cpu-cores
  - id: cpu-info
    desc: CPU information fingerprinting
    crit: notable
    conf: 0.4
    any:
      - id: cpu-proc-cpuinfo
      - id: micro-behaviors/os/sysinfo/hardware::lscpu-cmd
  - id: cpu-proc-cpuinfo
    desc: /proc/cpuinfo with fields
    crit: notable
    conf: 0.4
    all:
      - id: micro-behaviors/fs/proc/system::system-cpuinfo
      - id: cpu-fields
