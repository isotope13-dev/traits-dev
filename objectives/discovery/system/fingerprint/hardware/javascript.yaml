defaults:
  platforms: [windows, unix]
  for: [binaries, scripts, source]
  attack: T1082
traits:
  - id: os-platform-call-dup
    desc: os.platform() call
    crit: component
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: os.platform
  - id: os-arch-call
    desc: os.arch() call
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    unless:
      - type: text
        substr: "windowsArch = os.arch()"
      - type: text
        substr: "Using os.arch():"
      - id: metadata/library/structure::js-large-module-bundle
    if:
      type: symbol
      exact: os.arch
  - id: os-type-call
    desc: os.type() call
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: os.type
    unless:
      - type: text
        substr: createOscillator()
  - id: os-cpus-call
    desc: os.cpus() call
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: os.cpus
  - id: os-totalmem-call
    desc: os.totalmem() call
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: os.totalmem
  - id: os-networkinterfaces-call
    desc: os.networkInterfaces() call
    crit: notable
    conf: 0.75
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: os.networkInterfaces
  - id: os-homedir-call
    desc: os.homedir() call
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    unless:
      - type: text
        substr: const homeDirectory = os.homedir();
      - type: text
        substr: path.join(os.homedir(), envPath.slice(1))
      - type: text
        substr: path.join(os.homedir(), '.npm')
      - type: text
        substr: path.join(os.homedir(), '.npmrc')
      - type: text
        substr: reportedCWD = os.homedir() + reportedCWD.substring(1)
    if:
      type: symbol
      exact: os.homedir
  - id: os-tmpdir-call
    desc: os.tmpdir() call
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: os.tmpdir
  - id: process-version-access
    desc: process.version access
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: process.version
  - id: process-platform-content
    desc: process.platform in content
    crit: component
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: process.platform
  - id: process-arch-content
    desc: process.arch in content
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: symbol
      exact: process.arch
  - id: process-versions-content
    desc: process.versions in content
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: process.versions
  - id: js-os-networkinterfaces-to-hex
    desc: Hex-encodes network interfaces for exfiltration
    crit: suspicious
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: os\.networkInterfaces\(\)[\s\S]{0,500}toHex
composite_rules:
  - id: js-profiling
    desc: Aggregates system info for profiling
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    needs: 3
    any:
      - id: objectives/discovery/system/fingerprint/hardware::os-platform-call-dup
      - id: os-arch-call
      - id: os-cpus-call
      - id: os-totalmem-call
      - id: os-networkinterfaces-call
      - id: os-homedir-call
      - id: micro-behaviors/os/sysinfo/platform::process-cwd-call
      - id: process-version-access
  - id: js-sysinfo-multi
    desc: Multiple system info function calls
    crit: notable
    conf: 0.75
    for:
      - javascript
      - typescript
    needs: 4
    any:
      - id: objectives/discovery/system/fingerprint/hardware::os-platform-call-dup
      - id: os-arch-call
      - id: os-cpus-call
      - id: os-totalmem-call
      - id: os-networkinterfaces-call
      - id: os-homedir-call
      - id: micro-behaviors/os/sysinfo/platform::process-cwd-call
      - id: process-version-access
  - id: js-victim-id
    desc: Victim identification (host + user)
    crit: notable
    conf: 0.85
    for:
      - javascript
      - typescript
    needs: 2
    any:
      - id: os-platform-call-dup
      - id: os-arch-call
      - id: os-networkinterfaces-call
      - id: os-cpus-call
      - id: os-totalmem-call
      - id: os-homedir-call
      - id: objectives/discovery/system/fingerprint/hardware::node-userinfo
      - id: objectives/discovery/system/fingerprint/hardware::node-dns-getservers
  - id: js-profiling-exfil
    desc: JavaScript system profiling with exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1082
    attack: T1020
    for:
      - javascript
    all:
      - id: js-sysinfo-multi
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/data/serialize/json::json-stringify-call
  - id: process-fingerprint-any
    desc: Process object fingerprint property
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    any:
      - id: process-platform-content
      - id: process-arch-content
      - id: process-versions-content
      - id: process-version-access
  - id: process-fingerprint-multi
    desc: Multiple process fingerprint properties
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    needs: 3
    any:
      - id: process-platform-content
      - id: process-arch-content
      - id: process-versions-content
      - id: micro-behaviors/process/info::check-argv
      - id: process-version-access
  - id: system-fingerprint-exfil
    desc: System fingerprinting with HTTP POST exfil
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    for:
      - javascript
    all:
      - id: js-victim-id
      - id: process-fingerprint-multi
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/data/serialize/json::json-stringify-call
  - id: js-basic-recon-indicator
    desc: Basic host recon indicator
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/os/sysinfo/
      - id: micro-behaviors/os/sysinfo/
      - id: os-homedir-call
  - id: js-hex-encoding-indicator
    desc: Hex encoding indicator
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/data/encode/hex::buffer-hex
      - id: micro-behaviors/data/encode/hex::buffer-hex
  - id: js-encoded-recon-beacon
    desc: Encoded basic system reconnaissance beacon
    crit: hostile
    conf: 0.9
    mbc: E1082
    for:
      - javascript
      - typescript
    near_bytes: 2048
    all:
      - id: js-basic-recon-indicator
      - id: js-hex-encoding-indicator
      - id: micro-behaviors/data/serialize/json::json-stringify-call
