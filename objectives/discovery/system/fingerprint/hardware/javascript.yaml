defaults:
  platforms: [windows, unix]
  for: [binaries, scripts, source]
  attack: T1082
traits:
  - id: node-os-platform
    desc: Platform detection via os module
    crit: notable
    conf: 0.75
    for: [javascript, typescript]
    if:
      type: symbol
      kind: call
      exact: os.platform
  - id: os-arch-call
    desc: os.arch() call
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    unless:
      - type: text
        substr: "windowsArch = os.arch()"
      - type: text
        substr: "Using os.arch():"
      - id: metadata/library/structure::js-large-module-bundle
    if:
      id: micro-behaviors/os/sysinfo/platform/runtime::os-arch-call
  - id: os-type-call
    desc: os.type() call
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: os.type
    unless:
      - type: text
        substr: createOscillator()
  - id: process-arch-content
    desc: process.arch in content
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    unless:
      - id: metadata/package/testing/harness/runtime/
    if:
      type: symbol
      exact: process.arch
  - id: process-versions-content
    desc: process.versions in content
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: process.versions
  - id: js-os-networkinterfaces-to-hex
    desc: "Hex-encodes network interfaces exfiltration"
    crit: suspicious
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: os\.networkInterfaces\(\)[\s\S]{0,500}toHex
composite_rules:
  - id: js-profiling
    desc: Aggregates system info for profiling
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    needs: 3
    any:
      - id: node-os-platform
      - id: os-arch-call
      - id: objectives/discovery/system/fingerprint/runtime::os-cpus
      - id: objectives/discovery/system/fingerprint/runtime::os-totalmem
      - id: objectives/discovery/system/fingerprint/runtime::os-networkInterfaces
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-cwd-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-version-access
  - id: js-sysinfo-multi
    desc: Multiple system info function calls
    crit: notable
    conf: 0.75
    for:
      - javascript
      - typescript
    needs: 4
    any:
      - id: node-os-platform
      - id: os-arch-call
      - id: objectives/discovery/system/fingerprint/runtime::os-cpus
      - id: objectives/discovery/system/fingerprint/runtime::os-totalmem
      - id: objectives/discovery/system/fingerprint/runtime::os-networkInterfaces
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-cwd-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-version-access
  - id: js-victim-id
    desc: Victim identification (host + user)
    crit: notable
    conf: 0.85
    for:
      - javascript
      - typescript
    needs: 2
    any:
      - id: node-os-platform
      - id: os-arch-call
      - id: objectives/discovery/system/fingerprint/runtime::os-networkInterfaces
      - id: objectives/discovery/system/fingerprint/runtime::os-cpus
      - id: objectives/discovery/system/fingerprint/runtime::os-totalmem
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: micro-behaviors/process/user/query::os-userinfo-call
      - id: objectives/discovery/system/fingerprint/hardware::node-dns-getservers
  - id: js-profiling-exfil
    desc: JavaScript system profiling with exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1082
    attack: T1020
    for:
      - javascript
    all:
      - id: js-sysinfo-multi
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/data/serialize/json::json-stringify-call
    unless:
      - id: metadata/library/structure/
      - id: metadata/library/github-actions/
  - id: process-fingerprint-any
    desc: Process object fingerprint property
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-platform-content
      - id: process-arch-content
      - id: process-versions-content
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-version-access
  - id: process-fingerprint-multi
    desc: Multiple process fingerprint properties
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    needs: 3
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-platform-content
      - id: process-arch-content
      - id: process-versions-content
      - id: micro-behaviors/process/info/commandline::check-argv
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-version-access
  - id: system-fingerprint-exfil
    desc: System fingerprinting with HTTP POST exfil
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    for:
      - javascript
    all:
      - id: js-victim-id
      - id: process-fingerprint-multi
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/data/serialize/json::json-stringify-call
    unless:
      - id: metadata/library/structure/
  - id: js-basic-recon-indicator
    desc: Basic host recon indicator
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/os/sysinfo/
      - id: micro-behaviors/process/user/query::os-homedir-call
  - id: js-recon-beacon-sink
    desc: JavaScript recon outbound sink
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/communications/dns/lookup/resolver::node-dns-lookup
      - id: micro-behaviors/communications/http/request/client::request-write-call
      - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
  - id: js-encoded-recon-beacon
    desc: Encoded basic system reconnaissance beacon
    crit: hostile
    conf: 0.9
    mbc: E1082
    for:
      - javascript
      - typescript
    near_bytes: 2048
    all:
      - id: js-basic-recon-indicator
      - id: micro-behaviors/data/encode/hex::buffer-hex
      - id: micro-behaviors/data/serialize/json::json-stringify-call
      - id: js-recon-beacon-sink
    unless:
      - id: well-known/lib/node-edge/
