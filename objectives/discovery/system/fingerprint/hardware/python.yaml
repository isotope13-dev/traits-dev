defaults:
  platforms: [windows, unix]
  for:
    - python
  mbc: E1082
  attack: T1082
  crit: notable
traits:
  - id: python-platform-system
    desc: Profiles the host operating system
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: .system()
  - id: python-platform-machine
    desc: Identifies the host CPU architecture
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: .machine()
  - id: python-platform-node
    desc: Retrieves the system hostname
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: .node()
  - id: python-platform-full
    desc: Retrieves the full system platform string
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: .platform()
  - id: python-platform-uname
    desc: Collects comprehensive system hardware and
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: .uname()
  - id: python-getpass-user
    desc: Identifies the current logged-in user
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: .getuser()
    unless:
      - type: text
        substr: ActivityStream
      # CLI prompt display is user-interface behavior, not host fingerprinting.
      - type: text
        regex: 'getpass\.getuser\(\)[\s\S]{0,120}\bprompt\s*\('
  - id: gethostname-call
    desc: Calls socket.gethostname()
    crit: notable
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: .gethostname()
  - id: getmac-module
    desc: getmac module for MAC address
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: getmac
  - id: uuid-getnode
    desc: uuid.getnode() for MAC address
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: uuid.getnode()
  - id: os-uname-content
    desc: os.uname() system info call
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: os\.uname\s*\(
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: python-username
    desc: Gets current system username
    crit: notable
    conf: 0.85
    any:
      - id: python-getpass-user
      - id: micro-behaviors/process/user/query::os-getlogin-python
  - id: python-mac-discovery
    desc: Collects hardware MAC addresses for
    crit: notable
    conf: 0.8
    any:
      - id: getmac-module
      - id: objectives/discovery/network/interface
      - id: uuid-getnode
  - id: python-sysinfo-multi
    desc: Collects multiple system information items
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: python-platform-system
      - id: python-platform-machine
      - id: python-platform-node
      - id: python-platform-full
      - id: python-platform-uname
      - id: os-uname-content
      - id: python-getpass-user
      - id: gethostname-call
      - id: micro-behaviors/os/network/interface::python-getsockname-local-ip
      - id: micro-behaviors/process/user/query::os-getlogin-python
      - id: micro-behaviors/os/privilege/check::os-getuid-admin
      - id: micro-behaviors/os/privilege/check::ctypes-is-admin
  - id: python-machine-fingerprint-hash
    desc: Hashes system identity fields into a machine fingerprint
    crit: notable
    conf: 0.92
    near_lines: 30
    all:
      - id: python-sysinfo-multi
      - id: micro-behaviors/crypto/hash/digest::python-sha256-hexdigest
  - id: python-enumeration
    desc: Performs intensive system enumeration (multiple
    crit: notable
    conf: 0.95
    near_lines: 80
    needs: 3
    any:
      - id: python-platform-system
      - id: python-mac-discovery
      - id: python-username
      - id: micro-behaviors/communications/http/request/
