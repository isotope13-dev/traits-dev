# Windows CPU registry fingerprinting
# Malware reads CPU model from registry for system profiling
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1082
traits:
  - id: central-processor-reg
    desc: CPU registry key enumeration path
    crit: component
    conf: 0.85
    if:
      type: text
      substr: CentralProcessor\0
  - id: processor-name-string
    desc: CPU model name registry value
    crit: component
    conf: 0.85
    if:
      type: text
      exact: ProcessorNameString
composite_rules:
  - id: wmi-host-profile-queries
    desc: COM-backed WMI host profile queries
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/os/com/invoke::wmi-com-proxy-setup
    needs: 2
    any:
      - id: micro-behaviors/os/wmi/query
    unless:
      - id: well-known/lib/wmi::wmi-win32-provider-versioninfo
      - id: well-known/lib/wine::wine-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree

  - id: packed-privileged-hardware-fingerprint
    desc: Packed elevated PE fingerprints hardware devices
    crit: suspicious
    conf: 0.96
    attack: T1082,T1027,T1548.002
    all:
      - id: objectives/anti-static/pack/entropy::privileged-high-entropy-pe
      - id: micro-behaviors/os/sysinfo/hardware::setupdi-get-class-devs-w
      - id: micro-behaviors/os/sysinfo/hardware::cm-locate-devnode-w
      - id: micro-behaviors/os/sysinfo/hardware::hid-manufacturer-string
  - id: cpu-registry-fingerprint
    desc: CPU fingerprinting via Windows registry
    crit: notable
    conf: 0.88
    all:
      - id: central-processor-reg
      - id: processor-name-string
      - id: micro-behaviors/os/registry/access::registry-read-api-chain
    unless:
      - id: metadata/binary/installer/sfx/
      - id: metadata/binary/installer/sfx/
      - id: well-known/app/cvte-crashrpt/
