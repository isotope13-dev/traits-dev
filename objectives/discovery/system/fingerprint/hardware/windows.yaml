# Windows CPU registry fingerprinting
# Malware reads CPU model from registry for system profiling
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1082
traits:
  - id: central-processor-reg
    desc: CPU registry key enumeration path
    crit: component
    conf: 0.85
    if:
      type: text
      substr: CentralProcessor\0
  - id: processor-name-string
    desc: CPU model name registry value
    crit: component
    conf: 0.85
    if:
      type: text
      exact: ProcessorNameString
composite_rules:
  - id: cpu-registry-fingerprint
    desc: CPU fingerprinting via Windows registry
    crit: notable
    conf: 0.88
    all:
      - id: central-processor-reg
      - id: processor-name-string
      - id: micro-behaviors/os/registry/access::registry-read-api-chain
    unless:
      - id: metadata/binary/installer/sfx::7zip-sfx-installer
      - id: metadata/binary/installer/sfx::7zip-sfx-runtime
      - id: well-known/app/cvte-crashrpt::cvte-crashrpt-strong-pin
