defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
  attack: T1016
traits:
  - id: networkinterfaces-call-raw
    desc: networkInterfaces() call
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: networkInterfaces()
  - id: ipv4-family-literal
    desc: IPv4 family literal check
    crit: notable
    conf: 0.8
    if:
      type: string_value
      exact: IPv4
  - id: internal-interface-filter
    desc: Internal interface exclusion check
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: '!\s*.{0,24}\.internal\b'
  - id: returns-interface-address
    desc: Returns chosen interface address
    crit: notable
    conf: 0.86
    if:
      type: raw
      regex: return\s+.{0,32}\.address
composite_rules:
  - id: local-ip-from-networkinterfaces
    desc: Local IP discovery from interfaces
    crit: suspicious
    conf: 0.96
    all:
      - id: networkinterfaces-call-raw
      - id: ipv4-family-literal
      - id: internal-interface-filter
      - id: returns-interface-address
