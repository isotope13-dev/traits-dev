defaults:
  platforms: [windows]
  for: [pe]
  attack: T1082

traits:
  - id: encoded-windows-recon-command-chain
    desc: Encoded Windows recon command chain
    crit: component
    conf: 0.99
    if:
      type: text
      exact: 
  - id: encoded-flash-log-path
    desc: Encoded Windows flash log path
    crit: component
    conf: 0.98
    if:
      type: text
      exact: AKnL9Pb9A/z08MvzAvrvywX7/vD3vfv8BJ8=

composite_rules:
  - id: encoded-windows-recon-to-log
    desc: Encoded Windows system recon to log
    crit: suspicious
    conf: 0.99
    all:
      - id: encoded-windows-recon-command-chain
      - id: encoded-flash-log-path
      - id: micro-behaviors/process/create/spawn::create-process-a
    any:
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::base64-arithmetic-xor-decoder
      - id: micro-behaviors/os/sysinfo/platform/locale::get-version-ex
