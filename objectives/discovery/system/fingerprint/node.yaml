defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: node-os-platform
    desc: Platform detection via os module
    crit: notable
    conf: 0.75
    attack: T1082
    if:
      type: ast
      kind: call
      exact: os.platform
  - id: os-arch
    desc: Architecture detection via os module
    crit: notable
    conf: 0.75
    attack: T1082
    if:
      type: ast
      kind: call
      exact: os.arch
  - id: os-release-call
    desc: OS release version collection
    crit: notable
    conf: 0.75
    attack: T1082
    if:
      type: ast
      kind: call
      exact: os.release
  - id: node-os-userInfo
    desc: User information collection
    crit: suspicious
    conf: 0.85
    attack: T1033
    if:
      type: ast
      kind: call
      exact: os.userInfo
  - id: os-cpus
    desc: CPU information collection
    crit: notable
    conf: 0.7
    attack: T1082
    if:
      type: ast
      kind: call
      exact: os.cpus
  - id: os-totalmem
    desc: Total memory collection
    crit: notable
    conf: 0.7
    attack: T1082
    if:
      type: ast
      kind: call
      exact: os.totalmem
  - id: os-networkInterfaces
    desc: Network interface enumeration
    crit: suspicious
    conf: 0.85
    attack: T1016
    if:
      type: ast
      kind: call
      exact: os.networkInterfaces
  - id: mac-keyword-lower
    desc: mac keyword (lowercase)
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: mac
  - id: mac-keyword-upper
    desc: MAC keyword (uppercase)
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: MAC
  - id: mac-address-regex
    desc: MAC address regex pattern
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: '[0-9a-fA-F]{2}(:[0-9a-fA-F]{2}){5}'
  - id: internal-filter-keyword
    desc: internal network interface filter keyword
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: internal.{0,30}(IPv[46]|family|address)|networkInterfaces.{0,200}internal
  - id: createhash-call
    desc: crypto.createHash call
    crit: component
    conf: 0.55
    if:
      type: string_literal
      substr: createHash
  - id: sha256-keyword
    desc: sha256 hash algorithm
    crit: baseline
    conf: 0.6
    if:
      type: string_literal
      word: sha256
  - id: md5-keyword
    desc: md5 hash algorithm
    crit: baseline
    conf: 0.5
    if:
      type: string_literal
      word: md5
  - id: userinfo-keyword
    desc: userInfo keyword
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      word: userInfo
  - id: networkinterfaces-keyword
    desc: networkInterfaces keyword
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: "networkInterfaces"
  - id: get-process-cmd
    desc: PowerShell Get-Process
    crit: notable
    conf: 0.7
    mbc: E1592
    attack: T1057
    if:
      type: string_literal
      substr: "Get-Process"
    unless:
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-brush
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
  - id: process-env-keys-entries
    desc: process.env keys/entries enumeration
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: Object\.(keys|entries)\s*\(\s*process\.env\s*\)
  - id: process-env-json-stringify
    desc: process.env serialized as JSON
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: JSON\.stringify\s*\(\s*process\.env\s*\)
composite_rules:
  - id: process-env-serialization
    desc: process.env serialization call
    crit: notable
    conf: 0.75
    any:
      - id: process-env-keys-entries
      - id: process-env-json-stringify
  - id: mac-keyword-variants
    desc: MAC keyword variants
    any:
      - id: mac-keyword-lower
      - id: mac-keyword-upper
    crit: notable
  - id: mac-patterns
    desc: MAC address patterns
    any:
      - id: mac-keyword-variants
      - id: mac-address-regex
      - id: internal-filter-keyword
    crit: notable
  - id: hash-algorithms
    desc: Hash algorithm keywords
    any:
      - id: sha256-keyword
      - id: md5-keyword
    crit: baseline
  - id: system-id-sources
    desc: System identification sources
    any:
      - id: micro-behaviors/os/sysinfo/
      - id: userinfo-keyword
      - id: networkinterfaces-keyword
    crit: notable
  - id: object-serialization
    desc: Object serialization methods
    any:
      - id: micro-behaviors/data/serialize/json::json-stringify-call
      - id: micro-behaviors/data/serialize/json::object-keys-call
      - id: micro-behaviors/data/serialize/json::object-entries-call
    crit: baseline
  - id: all-os-methods
    desc: All os module methods
    any:
      - id: micro-behaviors/os/env/vars/cicd::os-hostname-call
      - id: node-os-platform
      - id: os-arch
      - id: os-release-call
      - id: node-os-userInfo
      - id: os-cpus
      - id: os-totalmem
      - id: os-networkInterfaces
    crit: notable
  - id: mac-address
    desc: MAC address extraction pattern
    crit: suspicious
    conf: 0.9
    mbc: E1592
    attack: T1016
    all:
      - id: os-networkInterfaces
      - id: mac-patterns
  - id: machine-id-generation
    desc: Machine unique identifier generation
    crit: notable
    conf: 0.85
    mbc: E1592
    attack: T1082
    all:
      - id: createhash-call
      - id: hash-algorithms
    any:
      - id: micro-behaviors/os/env/vars/cicd::os-hostname-call
      - id: node-os-userInfo
      - id: os-networkInterfaces
      - id: mac-patterns
  - id: full-fingerprint
    desc: Comprehensive system fingerprinting (multiple vectors)
    crit: suspicious
    conf: 0.9
    mbc: E1592
    attack: T1082
    needs: 4
    any:
      - id: micro-behaviors/os/env/vars/cicd::os-hostname-call
      - id: node-os-platform
      - id: os-arch
      - id: os-release-call
      - id: node-os-userInfo
      - id: os-cpus
      - id: os-totalmem
      - id: os-networkInterfaces
      - id: objectives/discovery/system/hardware/display::display-resolution-discovery
      - id: objectives/discovery/system/locale/
  - id: process-env-dump
    desc: Environment variable enumeration
    crit: notable
    conf: 0.85
    mbc: E1592
    attack: T1082
    all:
      - id: micro-behaviors/os/env/access::javascript
      - id: process-env-serialization
  - id: process-list
    desc: Running process enumeration
    crit: suspicious
    conf: 0.9
    mbc: E1592
    attack: T1057
    any:
      - id: micro-behaviors/process/enumerate/shell::tasklist
      - id: micro-behaviors/process/enumerate/shell::ps-aux
      - id: micro-behaviors/process/enumerate/shell::ps-ef
      - id: get-process-cmd
    unless:
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-brush
