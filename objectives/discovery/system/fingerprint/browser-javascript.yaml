defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1082"
composite_rules:
  - id: browser-fingerprint-bundle
    desc: Collects multiple browser environment fields for fingerprinting
    crit: notable
    conf: 0.9
    needs: 3
    any:
      - id: micro-behaviors/os/sysinfo/platform
      - id: micro-behaviors/communications/http/cookies::navigator-useragent-read
      - id: micro-behaviors/communications/http/cookies::browser-storage-access
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker

  - id: hybrid-env-profiling
    desc: Detects and profiles hybrid environments (Electron/NW.js)
    crit: notable
    conf: 0.95
    any:
      - id: micro-behaviors/os/sysinfo/platform::electron-renderer-detect
      - id: micro-behaviors/os/sysinfo/platform::nwjs-detect

  - id: browser-recon-persistence
    desc: Browser environment profiling with storage persistence
    crit: hostile
    conf: 0.95
    all:
      - id: browser-fingerprint-bundle
      - id: micro-behaviors/communications/http/cookies::browser-storage-persistence
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker

  - id: hybrid-env-recon-persistence
    desc: Hybrid environment (Electron/NW.js) profiling with persistence
    crit: hostile
    conf: 0.98
    all:
      - id: hybrid-env-profiling
      - id: micro-behaviors/communications/http/cookies::browser-storage-persistence
      - id: browser-fingerprint-bundle
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
