defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1082"
composite_rules:
  - id: browser-fingerprint-bundle
    desc: Collects multiple browser environment fields for fingerprinting
    crit: suspicious
    conf: 0.9
    needs: 3
    any:
      - id: micro-behaviors/os/sysinfo/platform::browser-screen-dimensions-read
      - id: micro-behaviors/os/sysinfo/platform::navigator-cookie-enabled-read
      - id: micro-behaviors/os/sysinfo/platform::browser-timezone-read
      - id: micro-behaviors/communications/http/cookies::navigator-useragent-read
