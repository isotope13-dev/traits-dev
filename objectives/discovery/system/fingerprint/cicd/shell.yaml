# CI/CD Runner Fingerprinting - Shell
# Detects CI/CD runner fingerprinting in shell scripts
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [linux, unix, macos, android, ios]
  for: [shell]
  crit: suspicious
  conf: 0.85
composite_rules:
  - id: shell-runner-fingerprinting
    desc: Shell accesses CI/CD runner environment while fingerprinting the host
    attack: "T1082"
    unless:
      - id: metadata/build/github-actions::github-actions-sudo-preserve-env
      - id: micro-behaviors/os/service/legitimate::installer-script
    any:
      - id: micro-behaviors/os/env/vars/cicd/
