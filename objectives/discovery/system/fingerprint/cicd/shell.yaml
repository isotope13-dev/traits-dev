# CI/CD Runner Fingerprinting - Shell
# Detects CI/CD runner fingerprinting in shell scripts
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [linux, unix, macos, android, ios]
  for: [shell]
  crit: suspicious
  conf: 0.85
composite_rules:
  - id: shell-runner-fingerprinting
    desc: CI/CD runner fingerprinting in shell
    attack: "T1082"
    any:
      - id: micro-behaviors/os/env/vars/cicd/
