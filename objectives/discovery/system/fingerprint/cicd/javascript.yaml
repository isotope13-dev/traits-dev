# CI/CD Runner Fingerprinting - JavaScript
# Detects CI/CD runner fingerprinting via process.env in npm packages
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
  crit: suspicious
  conf: 0.85
composite_rules:
  - id: js-runner-fingerprinting
    desc: CI/CD runner fingerprinting via process.env
    attack: "T1082"
    needs: 2
    any:
      - id: micro-behaviors/os/env/vars/cicd::process-env-runner-name
      - id: micro-behaviors/os/env/vars/cicd::process-env-runner-os
      - id: micro-behaviors/os/env/vars/cicd::process-env-github-actions
      - id: micro-behaviors/os/env/vars/cicd::process-env-bracket-runner
      - id: micro-behaviors/os/env/vars/cicd::process-env-bracket-github
