# CI/CD Runner Fingerprinting - Ruby
# Detects CI/CD runner fingerprinting via ENV in Ruby gems
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [ruby]
  crit: suspicious
  conf: 0.85
composite_rules:
  - id: ruby-runner-fingerprinting
    desc: CI/CD runner fingerprinting via ENV
    attack: "T1082"
    any:
      - id: micro-behaviors/os/env/vars/cicd/
    unless:
      - id: micro-behaviors/os/sysinfo/hostname::ruby-socket-gethostname
      - id: micro-behaviors/process/user/query::ruby-etc-user-lookup
      - id: micro-behaviors/os/env/vars/cicd/
