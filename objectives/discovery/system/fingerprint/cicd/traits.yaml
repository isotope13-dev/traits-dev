defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.85
composite_rules:
  - id: runner-fingerprinting
    desc: CI/CD runner fingerprinting via env vars
    attack: T1082
    any:
      - id: micro-behaviors/os/env/vars/cicd/
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/scripted::dot-spec-filename
