defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.85
composite_rules:
  - id: runner-fingerprinting
    desc: CI/CD runner fingerprinting via env vars
    attack: T1082
    any:
      - id: micro-behaviors/os/env/vars/cicd/
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/scripted::dot-spec-filename
      - id: well-known/app/kilocode::kilo-code-js-bundle
      - id: well-known/app/kilocode::kilo-code-native-runtime
      - id: metadata/library/structure::vscode-large-minified-extension-bundle
      - id: metadata/library/structure::js-large-minified-dist-bundle
