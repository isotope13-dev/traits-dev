# CI/CD Runner Fingerprinting - Composite Detection
# Detects CI/CD runner fingerprinting via environment variables
# ATT&CK: T1082 (System Information Discovery)
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.85
composite_rules:
  - id: runner-fingerprinting
    desc: CI/CD runner fingerprinting via env vars
    attack: "T1082"
    needs: 2
    any:
      - id: micro-behaviors/os/env/vars/cicd::runner-name
      - id: micro-behaviors/os/env/vars/cicd::runner-os
      - id: micro-behaviors/os/env/vars/cicd::runner-arch
      - id: micro-behaviors/os/env/vars/cicd::runner-temp
