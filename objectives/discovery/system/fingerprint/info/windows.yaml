# Win32 System Profiling
# Composite: multiple system info APIs indicate host fingerprinting for C2 beacon
defaults:
  for: [pe]
  platforms: [windows]
  attack: "T1082"
composite_rules:
  - id: win32-system-profiling
    desc: Win32 host profiling via multiple APIs
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/os/sysinfo/
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
    needs: 2
  # Deep recon: 4+ distinct info categories = comprehensive fingerprinting
  - id: win32-deep-recon
    desc: Deep Windows system reconnaissance
    crit: suspicious
    conf: 0.9
    needs: 4
    any:
      - id: micro-behaviors/os/sysinfo/
      - id: micro-behaviors/os/sysinfo/network/
      - id: micro-behaviors/process/enumerate/psapi/
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
  - id: host-identity-fingerprint-cluster
    desc: Host identity profiling via name and volume
    crit: suspicious
    conf: 0.91
    all:
      - id: micro-behaviors/os/sysinfo/hostname::get-computer-name
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
    any:
      - id: objectives/discovery/account/lookup::sid-account-resolution
      - id: objectives/discovery/system/locale::windows-locale-fingerprint
      - id: micro-behaviors/communications/http/client::winhttp-downloader-flow
      - id: micro-behaviors/os/privilege/manifest::highest-available
    needs: 2
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/signed/platform::microsoft
