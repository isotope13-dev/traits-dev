# Win32 System Profiling
# Composite: multiple system info APIs indicate host fingerprinting for C2 beacon
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1082"
traits:
  - id: native-host-resource-fields
    desc: Native RAM resource field
    crit: component
    conf: 0.85
    if:
      type: text
      word: ram_total
  - id: native-host-runtime-fields
    desc: Native computer identity field
    crit: component
    conf: 0.85
    if:
      type: text
      word: computer
  - id: native-host-display-fields
    desc: Native display size field
    crit: component
    conf: 0.85
    if:
      type: text
      word: screen_w

composite_rules:
  - id: native-host-profile-schema
    desc: Native Windows host-profile schema
    crit: suspicious
    conf: 0.94
    all:
      - id: native-host-resource-fields
      - id: native-host-runtime-fields
      - id: native-host-display-fields

  - id: win32-deep-recon-recognized-marker
    desc: Recognized Win32 system profiling marker
    crit: component
    conf: 0.9
    any:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: well-known/app/dlink-wlan::dlink-wlan-application
      - id: well-known/lib/mozilla-nspr::nspr-library
      - id: well-known/app/belkin-local-backup::belkin-local-backup
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/binary/installer/database::wix-bootstrapper-manifest
      - id: metadata/library/qt
      - id: well-known/lib/gnu-libintl::gnu-libintl-library
      - id: well-known/tool/sysadmin/infozip
      - id: well-known/app/protected-benign-pe/
      - id: well-known/tool/detection/watchmen::watchmen-cli-context
      - id: well-known/tool/sysadmin/winrar::winrar-component
      - id: well-known/app/fastfetch::fastfetch-windows-component
      - id: well-known/lib/sharp-libvips/

  - id: win32-system-profiling
    desc: Win32 host profiling via multiple APIs
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/os/sysinfo/
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
    needs: 2
    unless:
      - id: objectives/discovery/system/fingerprint/info/
      - id: well-known/app/reg-devshell::developer-shell-application
  # Deep recon: 4+ distinct info categories = comprehensive fingerprinting
  - id: win32-deep-recon
    desc: Deep Windows system reconnaissance
    crit: suspicious
    conf: 0.9
    needs: 4
    any:
      - id: micro-behaviors/os/sysinfo/hardware/
      - id: micro-behaviors/os/sysinfo/platform/locale::locale-environment-fingerprint
      - id: micro-behaviors/os/network/interface/
      - id: micro-behaviors/process/enumerate/psapi::psapi-process-scan
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
    downgrade:
      any:
        - id: objectives/discovery/system/fingerprint/info/
        - id: metadata/library/automation/
        - id: well-known/app/ventoy/
        - id: well-known/tool/reverse-engineering/frida/
        - id: well-known/app/qbittorrent/
    unless:
      - id: objectives/discovery/system/fingerprint/info/
      - id: well-known/app/reg-devshell::developer-shell-application
  - id: inno-installer-host-profiling
    desc: Inno installer profiles host storage
    crit: notable
    conf: 0.92
    all:
      - id: metadata/binary/installer/script::inno-setup
    needs: 4
    any:
      - id: micro-behaviors/os/sysinfo/platform/locale::get-version-ex
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
      - id: micro-behaviors/fs/enumerate/volume::get-disk-free-space
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
