defaults:
  platforms: [windows, unix]
  for:
    - php
  mbc: E1082
  attack: T1082
traits:
  - id: php-os-constant
    desc: Accesses PHP_OS constant (OS detection)
    crit: notable
    conf: 0.7
    if:
      type: text
      word: PHP_OS
  - id: php-version-constant
    desc: References PHP_VERSION constant
    crit: baseline
    conf: 0.5
    if:
      type: text
      word: PHP_VERSION
  - id: php-sapi-name
    desc: Gets PHP SAPI name
    crit: notable
    conf: 0.6
    if:
      type: tree-sitter
      kind: call
      exact: php_sapi_name
  - id: php-uname-call
    desc: Gets OS information via php_uname()
    crit: notable
    conf: 0.75
    if:
      type: tree-sitter
      kind: call
      exact: php_uname
  - id: php-uname-symbol
    desc: php_uname symbol present
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: php_uname
  - id: getcwd-symbol
    desc: getcwd symbol present
    # PHP CLI bootstrap (Composer autoload, Symfony Console, Laravel Artisan)
    # routinely resolves the working directory for config discovery — the
    # call is still notable as inventory, but in a recognized framework or
    # Composer-managed namespaced context it's plumbing rather than recon.
    # Downgrade keeps the evidence visible while letting shell-shape recon
    # stand out. The `\nnamespace [A-Z]` check broadens the framework
    # detection to any Composer-organized PHP file (per-file analysis can't
    # otherwise see a sibling composer.json).
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: getcwd
    downgrade:
      any:
        - id: metadata/library/web-frameworks::symfony-context
        - id: metadata/library/web-frameworks::laravel-context
        - id: metadata/library/web-frameworks::wordpress-context
        - id: metadata/package/testing/harness/unit::phpunit-test-context
        - type: text
          regex: '^namespace\s+[A-Z]'
  - id: phpinfo-call
    desc: Dumps PHP configuration via phpinfo()
    crit: notable
    conf: 0.7
    if:
      type: tree-sitter
      kind: call
      exact: phpinfo
  - id: rendered-phpinfo-dump
    desc: Rendered PHP configuration disclosure page
    crit: notable
    conf: 0.9
    for: [php, html]
    if:
      type: text
      regex: '<title>PHP .{0,80} - phpinfo\(\)</title>'
  - id: phpversion-call
    desc: Gets PHP version
    crit: notable
    conf: 0.5
    if:
      type: tree-sitter
      kind: call
      exact: phpversion
  - id: getcwd-call
    desc: Gets current working directory
    crit: notable
    conf: 0.6
    if:
      type: tree-sitter
      kind: call
      exact: getcwd
  - id: dirname-call-dup
    desc: Gets directory name
    crit: notable
    conf: 0.4
    if:
      type: tree-sitter
      kind: call
      exact: dirname
  - id: realpath-call
    desc: Resolves real path
    crit: notable
    conf: 0.4
    if:
      type: tree-sitter
      kind: call
      exact: realpath
  - id: server-software-access
    desc: Accesses SERVER_SOFTWARE variable
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \$_SERVER\s*\[['"]SERVER_SOFTWARE['"]\]
    unless:
      - id: rendered-phpinfo-dump
  - id: server-name-access
    desc: Accesses SERVER_NAME variable
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \$_SERVER\s*\[['"]SERVER_NAME['"]\]
    unless:
      - id: rendered-phpinfo-dump
  - id: document-root-access
    desc: Accesses DOCUMENT_ROOT variable
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \$_SERVER\s*\[['"]DOCUMENT_ROOT['"]\]
    unless:
      - id: rendered-phpinfo-dump
  - id: getenv-call
    desc: Gets environment variable
    crit: notable
    conf: 0.5
    if:
      type: tree-sitter
      kind: call
      exact: getenv
  - id: getenv-path
    desc: Gets PATH environment variable
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: getenv\s*\(['"]PATH['"]\)
  - id: getenv-home-dup
    desc: Gets HOME environment variable
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: getenv\s*\(['"]HOME['"]\)
  - id: disk-free-space
    desc: Checks disk free space
    crit: notable
    conf: 0.6
    if:
      type: tree-sitter
      kind: call
      exact: disk_free_space
  - id: disk-total-space
    desc: Checks total disk space
    crit: notable
    conf: 0.6
    if:
      type: tree-sitter
      kind: call
      exact: disk_total_space
  - id: memory-get-usage
    desc: Gets memory usage
    crit: notable
    conf: 0.5
    if:
      type: tree-sitter
      kind: call
      exact: memory_get_usage
  - id: get-current-user
    desc: Gets current PHP process user
    crit: notable
    conf: 0.7
    if:
      type: tree-sitter
      kind: call
      exact: get_current_user
  - id: getmyuid-call
    desc: Gets PHP script UID
    crit: notable
    conf: 0.7
    if:
      type: tree-sitter
      kind: call
      exact: getmyuid
  - id: getmygid-call
    desc: Gets PHP script GID
    crit: notable
    conf: 0.7
    if:
      type: tree-sitter
      kind: call
      exact: getmygid
  - id: posix-getpwuid
    desc: Gets user info by UID
    crit: notable
    conf: 0.7
    if:
      type: tree-sitter
      kind: call
      exact: posix_getpwuid
  - id: posix-geteuid
    desc: Gets effective UID of current process
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: posix_geteuid
  - id: gethostname-call
    desc: Gets server hostname
    # gethostname() in framework code typically labels logs / health-check
    # endpoints / heartbeats — observability, not host discovery — but the
    # call is still real behavior worth inventorying. Downgrade in framework
    # or Composer-namespaced contexts; the same lookup remains notable in
    # bare procedural PHP (typical webshell shape).
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: gethostname
    downgrade:
      any:
        - id: metadata/library/web-frameworks::symfony-context
        - id: metadata/library/web-frameworks::laravel-context
        - id: metadata/library/web-frameworks::wordpress-context
        - id: metadata/package/testing/harness/unit::phpunit-test-context
        - type: text
          regex: '^namespace\s+[A-Z]'
composite_rules:
  - id: system-fingerprint-comp
    desc: System fingerprinting pattern
    crit: suspicious
    conf: 0.8
    any:
      - id: php-os-constant
      - id: php-uname-call
      - id: getcwd-call
      - id: server-software-access
  - id: webshell-recon
    desc: Webshell reconnaissance pattern
    crit: suspicious
    conf: 0.85
    all:
      - id: getcwd-call
    any:
      - id: php-os-constant
      - id: server-software-access
      - id: get-current-user
