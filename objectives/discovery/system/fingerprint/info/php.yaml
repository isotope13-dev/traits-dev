defaults:
  platforms: [windows, unix]
  for:
    - php
  mbc: E1082
  attack: T1082
traits:
  - id: php-sapi-name
    desc: Gets PHP SAPI name
    crit: notable
    conf: 0.6
    if:
      type: symbol
      kind: call
      exact: php_sapi_name
  # getcwd relocated to micro-behaviors/fs/directory/cwd::php-getcwd —
  # querying the working directory is neutral filesystem plumbing, not
  # reconnaissance. The fingerprint/webshell intent lives in the composites
  # below, which reference that atom cross-tier.
  - id: rendered-phpinfo-dump
    desc: Rendered PHP configuration disclosure page
    crit: notable
    conf: 0.9
    for: [php, html]
    if:
      type: text
      regex: '<title>PHP .{0,80} - phpinfo\(\)</title>'
  - id: server-name-access
    desc: Accesses SERVER_NAME variable
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \$_SERVER\s*\[['"]SERVER_NAME['"]\]
    unless:
      - id: rendered-phpinfo-dump
  - id: getenv-path
    desc: Gets PATH environment variable
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: getenv\s*\(['"]PATH['"]\)
  - id: getenv-home-dup
    desc: Gets HOME environment variable
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: getenv\s*\(['"]HOME['"]\)
  - id: getmyuid-call
    desc: Gets PHP script UID
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: getmyuid
  - id: getmygid-call
    desc: Gets PHP script GID
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: getmygid
  - id: posix-getpwuid
    desc: Gets user info by UID
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: posix_getpwuid
  - id: posix-geteuid
    desc: Gets effective UID of current process
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: posix_geteuid
composite_rules:
  - id: system-fingerprint-comp
    desc: System fingerprinting pattern
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::php-os-constant
      - id: micro-behaviors/os/sysinfo/platform/runtime::php-uname-call
      - id: micro-behaviors/fs/directory/cwd::php-getcwd
      - id: micro-behaviors/os/sysinfo/platform/runtime::server-software-access
    needs: 2
  - id: webshell-recon
    desc: Webshell reconnaissance pattern
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/command-and-control/backdoor/webshell/exec::php-shell-functional
    any:
      - id: micro-behaviors/fs/directory/cwd::php-getcwd
      - id: micro-behaviors/os/sysinfo/platform/runtime::php-os-constant
      - id: micro-behaviors/os/sysinfo/platform/runtime::server-software-access
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: well-known/lib/php-codesniffer::php-codesniffer-library
      - id: micro-behaviors/os/user/account::php-get-current-user
      - id: metadata/package/testing/harness/unit/
      # Packed PHP archive (phar) stub — recon tokens here are not a webshell.
      - id: well-known/app/wordpress-plugins/
      - id: metadata/file/magic/identity::php-archive
      - id: well-known/app/civicrm/
