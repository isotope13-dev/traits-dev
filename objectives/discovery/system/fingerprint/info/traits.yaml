defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  attack: T1082
traits:
  - id: lanip-label
    desc: 'LanIP: label string'
    crit: component
    conf: 0.7
    if:
      type: text
      substr: 'LanIP:'
  - id: gateway-label
    desc: 'GateWay: label string'
    crit: component
    conf: 0.7
    if:
      type: text
      substr: 'GateWay:'
  - id: osinfo-label
    desc: 'OSInfo: label string'
    crit: component
    conf: 0.7
    if:
      type: text
      substr: 'OSInfo:'
  - id: machinename-label
    desc: 'MachineName: label string'
    crit: component
    conf: 0.7
    if:
      type: text
      substr: 'MachineName:'
  - id: domainname-label
    desc: 'DomainName: label string'
    crit: component
    conf: 0.7
    if:
      type: text
      substr: 'DomainName:'
  - id: userame-label-typo
    desc: 'Userame: label string (typo variant)'
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: 'Userame:'
  - id: osbits-label
    desc: 'OSBits: label string'
    crit: component
    conf: 0.7
    if:
      type: text
      substr: 'OSBits:'
  - id: processbits-label
    desc: 'Process Bits: label string'
    crit: component
    conf: 0.7
    if:
      type: text
      substr: 'Process Bits:'
composite_rules:
  - id: host_info_strings
    desc: Detailed system information gathering strings
    crit: suspicious
    conf: 0.8
    needs: 3
    any:
      - id: lanip-label
      - id: gateway-label
      - id: osinfo-label
      - id: machinename-label
      - id: domainname-label
      - id: userame-label-typo
      - id: osbits-label
      - id: processbits-label
