defaults:
  platforms: [windows, unix]
  for: [class, jar, zip]
  attack: T1082
traits:
  - id: java-systeminfo-field
    desc: Java systeminfo field marker
    crit: component
    conf: 0.78
    if:
      type: raw
      substr: systeminfo
  - id: java-host-domain-fields
    desc: Java host domain fields
    crit: component
    conf: 0.78
    if:
      type: raw
      regex: 'hostname.{0,120}domain|domain.{0,120}hostname'
  - id: java-user-runas-fields
    desc: Java user privilege fields
    crit: component
    conf: 0.78
    if:
      type: raw
      regex: 'username.{0,120}runas|runas.{0,120}username'
  - id: java-os-version-fields
    desc: Java OS version fields
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: 'version_os.{0,120}version_build|versionBuild.{0,120}versionOs'
  - id: java-json-object
    desc: Java JSON object construction
    crit: component
    conf: 0.72
    if:
      type: raw
      substr: org/json/JSONObject
  - id: java-system-property-roster
    desc: Java collects system properties
    crit: component
    conf: 0.86
    for: [java]
    count_min: 4
    if:
      type: text
      substr: System.getProperty(
  - id: java-network-interface-enum
    desc: Java enumerates network interfaces
    crit: component
    conf: 0.9
    for: [java]
    if:
      type: text
      substr: NetworkInterface.getNetworkInterfaces
  - id: java-bsd-sysctl-roster
    desc: Java queries BSD sysctl keys
    crit: component
    conf: 0.88
    for: [java]
    count_min: 3
    if:
      type: text
      substr: "sysctl"
  - id: java-process-list-command
    desc: Java runs process list command
    crit: component
    conf: 0.86
    for: [java]
    if:
      type: text
      substr: 'new ProcessBuilder("ps", "aux")'
  - id: java-network-state-command
    desc: Java runs netstat command
    crit: component
    conf: 0.86
    for: [java]
    if:
      type: text
      substr: 'new ProcessBuilder("netstat", "-an")'
composite_rules:
  - id: java-host-identity-json
    desc: Java host identity JSON collection
    crit: suspicious
    conf: 0.9
    all:
      - id: java-systeminfo-field
      - id: java-json-object
    any:
      - id: java-host-domain-fields
      - id: java-user-runas-fields
      - id: java-os-version-fields
    needs: 2
  - id: java-broad-host-fingerprint-source
    desc: Java broad host fingerprint collection
    crit: suspicious
    conf: 0.94
    for: [java]
    all:
      - id: java-system-property-roster
      - id: java-network-interface-enum
    needs: 2
    any:
      - id: java-bsd-sysctl-roster
      - id: java-process-list-command
      - id: java-network-state-command
