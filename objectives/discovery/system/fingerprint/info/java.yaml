defaults:
  platforms: [windows, unix]
  for: [class]
  attack: T1082
traits:
  - id: java-systeminfo-field
    desc: Java systeminfo field marker
    crit: component
    conf: 0.78
    if:
      type: raw
      substr: systeminfo
  - id: java-hostname-field
    desc: Java hostname field marker
    crit: component
    conf: 0.72
    if:
      type: raw
      substr: hostname
  - id: java-domain-field
    desc: Java domain field marker
    crit: component
    conf: 0.7
    if:
      type: raw
      substr: domain
  - id: java-username-field
    desc: Java username field marker
    crit: component
    conf: 0.7
    if:
      type: raw
      substr: username
  - id: java-json-object
    desc: Java JSON object construction
    crit: component
    conf: 0.72
    if:
      type: raw
      substr: org/json/JSONObject
composite_rules:
  - id: java-host-identity-json
    desc: Java host identity JSON collection
    crit: suspicious
    conf: 0.9
    all:
      - id: java-systeminfo-field
      - id: java-json-object
    any:
      - id: java-hostname-field
      - id: java-domain-field
      - id: java-username-field
    needs: 2
