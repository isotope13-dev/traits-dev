defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
  size_min: 8000
  size_max: 50000
  attack: T1082

traits:
  - id: exec-uname-a
    desc: Executes uname system profile
    crit: notable
    conf: 0.94
    if:
      type: raw
      substr: 'exec("uname -a")'

  - id: suid-alias
    desc: Enumerates SUID executables
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: 'find / -type f -perm -04000 -ls'

  - id: sgid-alias
    desc: Enumerates SGID executables
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: 'find / -type f -perm -02000 -ls'

  - id: config-hunt-alias
    desc: Hunts config.inc.php files
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: 'find / -type f -name config.inc.php'

  - id: writable-search-alias
    desc: Enumerates world writable paths
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: 'find / -perm -2 -ls'

composite_rules:
  - id: inline-host-recon
    desc: Inline host fingerprint triad
    crit: suspicious
    conf: 0.96
    all:
      - id: exec-uname-a
      - id: micro-behaviors/process/create/shell/webshell::exec-id-output
      - id: micro-behaviors/process/create/shell/webshell::exec-pwd-output

  - id: privilege-surface-enumeration
    desc: Privilege and config surface enumeration
    crit: suspicious
    conf: 0.97
    any:
      - id: suid-alias
      - id: sgid-alias
      - id: config-hunt-alias
      - id: writable-search-alias
    needs: 3
