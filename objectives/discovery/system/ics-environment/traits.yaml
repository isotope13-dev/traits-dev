# ICS/OT Environment Discovery
# Detects fingerprinting of industrial control system environments:
# process names, directories, config files associated with SCADA/ICS/OT.
# Covers water treatment, power grid, gas/pipeline, and safety systems.
# ATT&CK: T1057 (Process Discovery), T1083 (File and Directory Discovery)
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  crit: suspicious
  conf: 0.9

traits:
  # --- ICS Process Name Checks ---
  - id: ics-process-plc
    desc: PLC controller process name reference
    conf: 0.92
    if:
      type: text
      regex: (?i)\b(DesalPLC|WaterPLC|OsmosisPLC|ROController)\b

  - id: ics-process-scada-generic
    desc: Generic SCADA/ICS process name reference
    conf: 0.88
    if:
      type: text
      regex: \b((?i:ScadaBR|WinCC|FactoryTalk|Wonderware\s+InTouch|AVEVA\s+InTouch)|iFIX)\b

  - id: ics-process-water-treatment
    desc: Water treatment process name reference
    conf: 0.92
    if:
      type: text
      regex: (?i)\b(ChlorineCtrl|ChlorineDose|WaterTreat|BrineControl|SalinityCtrl)\b

  - id: ics-process-reverse-osmosis
    desc: Reverse osmosis process name reference
    conf: 0.92
    if:
      type: text
      regex: (?i)\b(ReverseOsmosis|RO[-_]?(Pump|Filter|Membrane)|SeaWaterRO|SchneiderRO|DamRO[-_]?(Controller|Service|Process)|DesalFlow[-_]?(Controller|Service|Process))\b

  - id: ics-process-power-grid
    desc: Power grid control process name reference
    conf: 0.92
    if:
      type: text
      regex: (?i)\b(GridController|LoadDispatch|BreakerCtrl|FrequencyCtrl|SubstationMgr|PowerSCADA)\b

  - id: ics-process-gas-pipeline
    desc: Gas/pipeline control process name reference
    conf: 0.92
    if:
      type: text
      regex: (?i)\b(PipelineCtrl|CompressorCtrl|GasFlowCtrl|PressureMonitor|GasLeakDetect)\b

  - id: ics-vendor-process
    desc: ICS vendor software process reference
    conf: 0.88
    if:
      type: text
      regex: (?i)\b(RSLogix|TIA\s*Portal|Citect|Wonderware|GE\s*Proficy)\b.{0,40}(\.exe\b|service\b|process\b|Program Files|ProgramFiles)

  # --- ICS Directory Checks ---
  - id: ics-dir-schneider
    desc: Schneider Electric ICS directory
    conf: 0.92
    if:
      type: text
      regex: (?i)Schneider\s*Electric.{0,30}(Desal|Unity|SoMachine|EcoStruxure)

  - id: ics-dir-siemens
    desc: Siemens ICS software directory
    conf: 0.92
    if:
      type: text
      regex: (?i)\b(Program Files|ProgramFiles|C:\\|/opt/|/usr/local/).{0,80}Siemens.{0,30}(WinCC|Step\s*7|TIA|SIMATIC)|Siemens.{0,30}(WinCC|Step\s*7|TIA|SIMATIC).{0,80}\b(Program Files|ProgramFiles|C:\\|/opt/|/usr/local/)
    unless:
      - id: metadata/file/text::nmap-http-fingerprints-catalog

  - id: ics-dir-rockwell
    desc: Rockwell Automation software directory
    conf: 0.92
    if:
      type: text
      regex: (?i)Rockwell.{0,30}(RSLogix|FactoryTalk|Studio\s*5000)

  - id: ics-dir-water-treatment
    desc: Water treatment software directory
    conf: 0.92
    if:
      type: text
      regex: (?i)(Program Files|ProgramFiles).{0,20}(Desalination|Water\s*Treatment|RO\s*Systems|Hydro\s*Systems|Aqua\s*Solutions|DesalTech|IDE\s*Technologies)

  - id: ics-dir-generic
    desc: Generic ICS/SCADA software directory
    conf: 0.88
    if:
      type: text
      regex: (?i)(Program Files|ProgramFiles).{0,20}(SCADA|PLC|HMI|InTouch|iFIX|Citect|Wonderware)

  - id: ics-dir-safety-system
    desc: Safety system software directory
    conf: 0.92
    if:
      type: text
      regex: (?i)(Program Files|ProgramFiles).{0,20}(Triconex|SafetyNet|HIMA|Yokogawa|ProSafe)

  # --- ICS Configuration File Checks ---
  - id: ics-config-desal
    desc: Desalination/RO configuration file path
    conf: 0.95
    if:
      type: text
      regex: (?i)(DesalConfig|ROConfig|DesalSettings|RO_PumpSettings)\.(ini|conf|cfg|xml)

  - id: ics-config-water
    desc: Water treatment configuration file path
    conf: 0.95
    if:
      type: text
      regex: (?i)(WaterTreatment|ChlorineControl|SalinityControl)\.(ini|dat|conf|cfg|xml)

  - id: ics-config-generic
    desc: Generic ICS/SCADA configuration file
    conf: 0.88
    if:
      type: text
      regex: (?i)(plc_config|scada_config|hmi_config|ics_config)\.(ini|conf|cfg|xml|json)

  - id: ics-config-power
    desc: Power grid configuration file path
    conf: 0.95
    if:
      type: text
      regex: (?i)(GridConfig|SubstationConfig|BreakerSettings|LoadProfile)\.(ini|conf|cfg|xml)

  - id: ics-config-safety
    desc: Safety system configuration file path
    conf: 0.95
    if:
      type: text
      regex: (?i)(SafetyConfig|SIS[-_]?Config|TripPoint|EmergencyShutdown)\.(ini|conf|cfg|xml|dat)

  # --- ICS Register/Variable Names (Water) ---
  - id: ics-register-chlorine
    desc: Chlorine dosing register/variable
    conf: 0.95
    if:
      type: text
      regex: (?i)Chlorine[-_]?(Dose|Flow|Pump|Valve|Level)

  - id: ics-register-pressure
    desc: Industrial pressure register/variable
    conf: 0.85
    if:
      type: text
      regex: (?i)\b(RO[-_]?Pressure|Tank[-_]?Pressure|Pipe[-_]?Pressure)\b

  - id: ics-register-turbine
    desc: Turbine speed register/variable
    conf: 0.88
    if:
      type: text
      regex: (?i)Turbine[-_]?Speed

  - id: ics-register-flow-rate
    desc: Industrial flow rate register/variable
    conf: 0.82
    if:
      type: text
      regex: (?i)\b(RO[-_]?FlowRate|Brine[-_]?FlowRate|RO[-_]?Pump[-_]?Speed|Brine[-_]?Pump[-_]?Speed|(?:RO|Brine|Chlorine|Desal|Water)[-_]?Valve[-_]?(Open|Close))\b

  # --- ICS Register/Variable Names (Power Grid) ---
  - id: ics-register-frequency
    desc: Grid frequency register/variable
    conf: 0.90
    if:
      type: text
      regex: (?i)\b(Grid[-_]?Frequency|Hz[-_]?Setpoint)\b

  - id: ics-register-breaker
    desc: Circuit breaker register/variable
    conf: 0.90
    if:
      type: text
      regex: (?i:\bBreaker[-_]?(Status|Trip|Close|Open)\b)|\bCB[-_]?(Open|Close|Status)\b

  - id: ics-register-load
    desc: Electrical load register/variable
    conf: 0.88
    if:
      type: text
      regex: \b(Load[-_]?Shed|MW[-_]?Setpoint|Generator[-_]?Output|Active[-_]?Power[-_]?(Setpoint|Reading|Register|Value|MW|KW))\b

  # --- Safety Instrumented System (SIS) ---
  - id: ics-sis-keyword
    desc: Safety instrumented system keyword
    conf: 0.90
    if:
      type: text
      regex: (?i)\b(Triconex|SIS[-_]?Controller|ProSafe[-_]?RS)\b

  - id: ics-sis-trip-point
    desc: SIS trip point or safety logic reference
    conf: 0.88
    if:
      type: text
      regex: (?i)\b(SIS|Safety|ESD)[-_]?(Trip[-_]?Point|Logic|Valve|Trigger|Activate)\b

composite_rules:
  - id: ics-process-discovery
    desc: ICS/OT process name discovery
    crit: suspicious
    conf: 0.92
    attack: T1057
    needs: 2
    any:
      - id: ics-process-plc
      - id: ics-process-scada-generic
      - id: ics-process-water-treatment
      - id: ics-process-reverse-osmosis
      - id: ics-process-power-grid
      - id: ics-process-gas-pipeline
      - id: ics-vendor-process

  - id: ics-directory-discovery
    desc: ICS/OT software directory probing
    crit: suspicious
    conf: 0.92
    attack: T1083
    needs: 2
    any:
      - id: ics-dir-schneider
      - id: ics-dir-siemens
      - id: ics-dir-rockwell
      - id: ics-dir-water-treatment
      - id: ics-dir-generic
      - id: ics-dir-safety-system

  - id: ics-config-discovery
    desc: ICS/OT configuration file probing
    crit: suspicious
    conf: 0.92
    attack: T1083
    any:
      - id: ics-config-desal
      - id: ics-config-water
      - id: ics-config-generic
      - id: ics-config-power
      - id: ics-config-safety

  - id: ics-environment-fingerprint
    desc: ICS/OT environment fingerprinting
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: ics-process-discovery
      - id: ics-directory-discovery
      - id: ics-config-discovery
      - id: objectives/discovery/network/scan::ics-device-keywords
      - id: objectives/discovery/network/scan::ics-protocol-reference

  - id: water-treatment-targeting
    desc: Water treatment system targeting
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: ics-process-water-treatment
      - id: ics-process-reverse-osmosis
      - id: ics-dir-water-treatment
      - id: ics-config-desal
      - id: ics-config-water
      - id: ics-register-chlorine

  - id: power-grid-targeting
    desc: Power grid system targeting
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: ics-process-power-grid
      - id: ics-config-power
      - id: ics-register-frequency
      - id: ics-register-breaker
      - id: ics-register-load

  - id: safety-system-targeting
    desc: Safety instrumented system targeting
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: ics-dir-safety-system
      - id: ics-config-safety
      - id: ics-sis-keyword
      - id: ics-sis-trip-point
