defaults:
  for:
  - binaries
  - scripts
  platforms:
  - windows
  - linux
  crit: suspicious
  conf: 0.9
composite_rules:
- id: ics-environment-fingerprint
  desc: ICS/OT environment fingerprinting
  crit: suspicious
  conf: 0.95
  all:
  - id: ics-environment-strong-signal
  any:
  - id: objectives/discovery/system/ics-environment/process::ics-process-discovery
  - id: objectives/discovery/system/ics-environment/directory::ics-directory-discovery
  - id: objectives/discovery/system/ics-environment/config::ics-config-discovery
  - id: objectives/discovery/network/scan/ics::ics-device-keywords
  - id: objectives/discovery/network/scan/ics::ics-protocol-reference
- id: ics-environment-strong-signal
  desc: Strong ICS environment fingerprint signal
  crit: component
  conf: 0.9
  any:
  - id: objectives/discovery/system/ics-environment/process::ics-process-discovery
  - id: objectives/discovery/system/ics-environment/directory::ics-directory-discovery
  - id: objectives/discovery/system/ics-environment/config::ics-config-discovery
- id: water-treatment-targeting
  desc: Water treatment system targeting
  crit: suspicious
  conf: 0.96
  needs: 2
  any:
  - id: objectives/discovery/system/ics-environment/process::ics-process-water-treatment
  - id: objectives/discovery/system/ics-environment/process::ics-process-reverse-osmosis
  - id: objectives/discovery/system/ics-environment/directory::ics-dir-water-treatment
  - id: objectives/discovery/system/ics-environment/config::ics-config-desal
  - id: objectives/discovery/system/ics-environment/config::ics-config-water
  - id: objectives/discovery/system/ics-environment/register::ics-register-chlorine
- id: power-grid-targeting
  desc: Power grid system targeting
  crit: suspicious
  conf: 0.96
  needs: 2
  any:
  - id: objectives/discovery/system/ics-environment/process::ics-process-power-grid
  - id: objectives/discovery/system/ics-environment/config::ics-config-power
  - id: objectives/discovery/system/ics-environment/register::ics-register-frequency
  - id: objectives/discovery/system/ics-environment/register::ics-register-breaker
  - id: objectives/discovery/system/ics-environment/register::ics-register-load
- id: safety-system-targeting
  desc: Safety instrumented system targeting
  crit: suspicious
  conf: 0.96
  needs: 2
  any:
  - id: objectives/discovery/system/ics-environment/directory::ics-dir-safety-system
  - id: objectives/discovery/system/ics-environment/config::ics-config-safety
  - id: objectives/discovery/system/ics-environment/safety::ics-sis-keyword
  - id: objectives/discovery/system/ics-environment/safety::ics-sis-trip-point
