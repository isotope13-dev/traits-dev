# ICS/OT Environment Discovery
# Detects fingerprinting of industrial control system environments:
# process names, directories, config files associated with SCADA/ICS/OT.
# Covers water treatment, power grid, gas/pipeline, and safety systems.
# ATT&CK: T1057 (Process Discovery), T1083 (File and Directory Discovery)
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  crit: suspicious
  conf: 0.9

traits:
  # --- ICS Process Name Checks ---
- id: ics-process-plc
  desc: PLC controller process name reference
  conf: 0.92
  if:
    type: text
    regex: (?i)\b(DesalPLC|WaterPLC|OsmosisPLC|ROController)\b

- id: ics-process-scada-generic--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: \b((?i:ScadaBR|WinCC)|iFIX)\b

- id: ics-process-scada-generic--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: \b((?i:FactoryTalk|Wonderware\s+InTouch)|iFIX)\b

- id: ics-process-scada-generic--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: \b((?i:AVEVA\s+InTouch)|iFIX)\b

- id: ics-process-water-treatment--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (?i)\b(ChlorineCtrl|ChlorineDose)\b

- id: ics-process-water-treatment--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (?i)\b(WaterTreat|BrineControl)\b

- id: ics-process-water-treatment--rx-6
