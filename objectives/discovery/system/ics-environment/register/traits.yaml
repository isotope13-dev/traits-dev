defaults:
  for:
  - binaries
  - scripts
  platforms:
  - windows
  - linux
  crit: suspicious
  conf: 0.9
traits:
- id: ics-register-chlorine--rx-69
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: (?i)Chlorine[-_]?(Dose|Flow)
  count_max: 1016758
- id: ics-register-chlorine--rx-70
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: (?i)Chlorine[-_]?(Pump|Valve)
  count_max: 1016759
- id: ics-register-chlorine--rx-71
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: (?i)Chlorine[-_]?(Level)
  count_max: 1016760
- id: ics-pressure-name
  desc: Pressure variable name marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)\b(RO[-_]?Pressure|Tank[-_]?Pressure|Pipe[-_]?Pressure)\b
- id: ics-scada-marker
  desc: SCADA protocol marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)\bscada\b
- id: ics-plc-register-marker
  desc: PLC register or address marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)\bplc[-_ ](register|address|tag)\b
- id: ics-register-turbine
  desc: Turbine speed register/variable
  conf: 0.88
  if:
    type: text
    regex: (?i)Turbine[-_]?Speed
- id: ics-register-flow-rate--rx-72
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: Chlorine
    case_insensitive: true
  count_max: 1016763
- id: ics-register-flow-rate--rx-73
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: FlowRate
    case_insensitive: true
  count_max: 1016764
- id: ics-register-flow-rate--rx-74
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: Brine
    case_insensitive: true
  count_max: 1016765
- id: ics-register-flow-rate--rx-75
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: Close Brine
    case_insensitive: true
  count_max: 1016766
- id: ics-register-flow-rate--rx-76
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    substr: Desal
    case_insensitive: true
  count_max: 1016767
- id: ics-register-breaker--rx-80
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i:\bBreaker[-_]?(Status|Trip|Close|Open)\b)
  count_max: 1016772
- id: ics-register-breaker--rx-81
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \bCB[-_]?(Open|Close|Status)\b
  count_max: 1016773
- id: ics-register-load--rx-82
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: \b(Load[-_]?Shed|MW[-_]?Setpoint)\b
  count_max: 1016774
- id: ics-register-load--rx-83
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: \b(Generator[-_]?Output|Active[-_]?Power[-_]?(Setpoint|Reading))\b
  count_max: 1016775
- id: ics-register-load--rx-85
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: \b(Generator[-_]?Output|Active[-_]?Power[-_]?(Register|Value))\b
  count_max: 1016777
- id: ics-register-load--rx-87
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: \b(Generator[-_]?Output|Active[-_]?Power[-_]?(MW|KW))\b
  count_max: 1016779
composite_rules:
- id: ics-register-pressure
  desc: Industrial pressure register context
  conf: 0.85
  near_lines: 12
  all:
  - id: ics-pressure-name
  any:
  - id: micro-behaviors/communications/modbus::keyword
  - id: ics-scada-marker
  - id: ics-plc-register-marker
- id: ics-register-chlorine
  desc: Chlorine dosing register/variable
  crit: baseline
  conf: 0.95
  any:
  - id: ics-register-chlorine--rx-69
  - id: ics-register-chlorine--rx-70
  - id: ics-register-chlorine--rx-71
- id: ics-register-flow-rate
  desc: Industrial flow rate register/variable
  crit: baseline
  conf: 0.82
  any:
  - id: ics-register-flow-rate--rx-72
  - id: ics-register-flow-rate--rx-73
  - id: ics-register-flow-rate--rx-74
  - id: ics-register-flow-rate--rx-75
  - id: ics-register-flow-rate--rx-76
- id: ics-register-breaker
  desc: Circuit breaker register/variable
  crit: baseline
  conf: 0.9
  any:
  - id: ics-register-breaker--rx-80
  - id: ics-register-breaker--rx-81
- id: ics-register-load
  desc: Electrical load register/variable
  crit: baseline
  conf: 0.88
  any:
  - id: ics-register-load--rx-82
  - id: ics-register-load--rx-83
  - id: objectives/discovery/system/ics-environment/register::ics-register-load--rx-82
  - id: ics-register-load--rx-85
  - id: objectives/discovery/system/ics-environment/register::ics-register-load--rx-82
  - id: ics-register-load--rx-87
