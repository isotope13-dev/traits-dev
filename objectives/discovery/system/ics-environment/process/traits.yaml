defaults:
  for:
  - binaries
  - scripts
  platforms:
  - windows
  - linux
  crit: suspicious
  conf: 0.9
traits:
- id: ics-process-plc
  desc: PLC controller process name reference
  conf: 0.92
  if:
    type: text
    regex: "(?i)\\b(DesalPLC|WaterPLC|OsmosisPLC|ROController)\\b"
- id: ics-process-scada-generic--rx-1
