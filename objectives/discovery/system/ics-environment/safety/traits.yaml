defaults:
  for:
  - binaries
  - scripts
  platforms:
  - windows
  - linux
  crit: suspicious
  conf: 0.9
traits:
- id: ics-sis-keyword
  desc: Safety instrumented system keyword
  conf: 0.9
  if:
    type: text
    regex: "(?i)\\b(Triconex|SIS[-_]?Controller|ProSafe[-_]?RS)\\b"
  unless:
    - id: metadata/file/profile/identity::generated-attack-map-context
    - id: well-known/app/wireshark/
    - id: metadata/package/quality/source::security-tracker-cve-leaf
- id: ics-sis-trip-point--rx-88
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: "(?i)\\b(SIS|Safety|ESD)[-_]?(Trip[-_]?Point|Logic)\\b"
  count_max: 1016781
- id: ics-sis-trip-point--rx-89
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: "(?i)\\b(SIS|Safety|ESD)[-_]?(Valve|Trigger)\\b"
  count_max: 1016782
- id: ics-sis-trip-point--rx-90
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: "(?i)\\b(SIS|Safety|ESD)[-_]?(Activate)\\b"
  count_max: 1016783
composite_rules:
- id: ics-sis-trip-point
  desc: SIS trip point or safety logic reference
  crit: baseline
  conf: 0.88
  any:
  - id: ics-sis-trip-point--rx-88
  - id: ics-sis-trip-point--rx-89
  - id: ics-sis-trip-point--rx-90
