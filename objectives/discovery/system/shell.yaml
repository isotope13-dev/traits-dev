defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: hostname-dup
    desc: Shell hostname command execution
    crit: notable
    conf: 0.8
    attack: T1082
    if:
      type: raw
      regex: exec(Sync)?\(['"]hostname['"]
  - id: uname-dup
    desc: Shell uname command execution
    crit: notable
    conf: 0.75
    attack: T1082
    if:
      type: raw
      regex: exec(Sync)?\(['"]uname['"]
  - id: pwd-dup
    desc: Shell pwd command execution
    crit: notable
    conf: 0.7
    attack: T1083
    if:
      type: raw
      regex: exec(Sync)?\(['"]pwd['"]
composite_rules:
  - id: system-profiling
    desc: System profiling command combination
    crit: suspicious
    conf: 0.9
    attack: T1082
    all:
      - id: objectives/discovery/system::hostname-dup
      - id: objectives/discovery/system::uname-dup
