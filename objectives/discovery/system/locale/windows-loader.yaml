defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1082"
  mbc: "E1082"
composite_rules:
  - id: locale-and-environment-profiling-windows-loader
    desc: Profile locale environment and launch context
    crit: notable
    conf: 0.93
    all:
      - id: micro-behaviors/os/sysinfo/platform::locale-environment-fingerprint
      - id: micro-behaviors/process/info/commandline::get-command-line
    any:
      - id: micro-behaviors/process/info/thread::get-current-thread-id
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/ffmpeg::ffmpeg-lib-marker
