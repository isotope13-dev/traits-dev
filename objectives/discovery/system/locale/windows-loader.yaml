defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1082"
  mbc: "E1082"
composite_rules:
  - id: locale-and-environment-profiling-windows-loader
    desc: Profile locale environment and launch context
    crit: baseline
    conf: 0.93
    all:
      - id: micro-behaviors/os/sysinfo/platform/locale::locale-fingerprinting-imports
      - id: micro-behaviors/os/env/access::environment-block-enumeration
    any:
      - id: micro-behaviors/process/info/commandline::get-command-line
      - id: micro-behaviors/process/info/thread::get-current-thread-id
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: well-known/app/cvte-crashrpt::cvte-crashrpt-strong-pin
