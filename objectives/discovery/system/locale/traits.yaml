defaults:
  platforms: [windows, unix]
  for: [javascript, python, ruby, shell]
  attack: T1082
  mbc: E1082
traits:
  - id: applescript-user-locale
    desc: AppleScript user locale query
    crit: notable
    conf: 0.86
    platforms: [macos]
    for: [applescript]
    if:
      type: text
      substr: user locale of (get system info)
composite_rules:
  - id: locale-cisco-signed-context
    desc: Cisco signed locale-query context
    crit: exception
    any:
      - id: metadata/signed/developer::cisco-systems
      - id: metadata/signed/leaf::cisco-systems-inc.
  - id: windows-locale-fingerprint
    desc: Imports APIs that query multiple Windows locale settings
    crit: notable
    conf: 0.9
    for: [pe]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/sysinfo/platform/locale::get-locale-info
      - id: micro-behaviors/os/sysinfo/platform/locale::get-user-default-lcid
    any:
      - id: micro-behaviors/os/sysinfo/platform/locale::enum-system-locales
      - id: micro-behaviors/os/env/access::environment-block-enumeration
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: well-known/lib/ffmpeg/
        - id: locale-cisco-signed-context
        - id: well-known/app/telegram::telegram-desktop-signed-client-context
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: well-known/app/cvte-crashrpt/
      - id: well-known/tool/dual-use/screenconnect::screenconnect-family
      - id: well-known/app/drivers::nvidia-windows-nvapi-context
  - id: locale-and-environment-profiling
    desc: Combines Windows locale queries with time and process context
    crit: notable
    conf: 0.9
    for: [pe]
    platforms: [windows]
    all:
      - id: windows-locale-fingerprint
      - id: micro-behaviors/time/query::get-system-time-as-filetime
    any:
      - id: micro-behaviors/os/env/access::environment-block-enumeration
      - id: micro-behaviors/process/info/commandline::get-command-line
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: well-known/lib/ffmpeg/
        - id: locale-cisco-signed-context
        - id: well-known/app/telegram::telegram-desktop-signed-client-context
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: well-known/app/cvte-crashrpt/
      - id: well-known/tool/dual-use/screenconnect::screenconnect-family
      - id: well-known/app/drivers::nvidia-windows-nvapi-context
