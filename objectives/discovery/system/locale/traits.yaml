defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - python
    - ruby
    - shell
  attack: T1082
  mbc: E1082
traits:
  - id: js-locale-discovery
    desc: Discover JavaScript environment locale
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: resolvedOptions\(\)\.locale|Intl\.DateTimeFormat
  - id: js-locale-symbol
    desc: JavaScript locale symbol access
    crit: notable
    conf: 0.9
    if:
      type: symbol
      substr: DateTimeFormat.resolvedOptions
  - id: env-locale-discovery
    desc: Discover locale via environment variables
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: \b(LANG|LC_ALL|LC_MESSAGES)\b
composite_rules:
  - id: windows-locale-fingerprint
    desc: Windows locale fingerprinting imports
    crit: notable
    conf: 0.9
    for:
      - pe
      - dll
    platforms:
      - windows
    all:
      - id: micro-behaviors/os/sysinfo/platform::get-locale-info
      - id: micro-behaviors/os/sysinfo/platform::get-user-default-lcid
    any:
      - id: micro-behaviors/os/sysinfo/platform::enum-system-locales
      - id: micro-behaviors/os/env/access::environment-block-enumeration
  - id: locale-and-environment-profiling
    desc: Locale and environment profiling cluster
    crit: suspicious
    conf: 0.9
    for:
      - pe
      - dll
    platforms:
      - windows
    all:
      - id: windows-locale-fingerprint
      - id: micro-behaviors/time/query::get-system-time-as-filetime
    any:
      - id: micro-behaviors/os/env/access::environment-block-enumeration
      - id: micro-behaviors/process/info/commandline::get-command-line
