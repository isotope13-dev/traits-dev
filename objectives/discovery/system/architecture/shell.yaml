defaults:
  platforms: [unix, android, ios]
  for: [shell]
traits:
- id: multi-arch-build-helper-context--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(BUILDARCH|TARGETARCH)\b'
  count_max: 1016492
- id: multi-arch-build-helper-context--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(CROSS_COMPILE|QEMU_ARCH)\b'
  count_max: 1016493
- id: multi-arch-build-helper-context--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(qemu-(user|system)-static)\b'
  count_max: 1016494
composite_rules:
- id: shell-multi-arch-array
  desc: "Multiple architecture strings (botnet array)"
  crit: suspicious
  conf: 0.85
  mbc: "Discovery"
  attack: "T1082"
  all:
  - id: micro-behaviors/os/sysinfo/platform::multi-arch-target
  - id: micro-behaviors/os/env/vars/cicd::sh-uname-fingerprint
  unless:
  - id: metadata/build/openra::openra-system-library-helper
  - id: objectives/discovery/system/architecture::config-guess-basename
  - id: objectives/discovery/system/architecture::config-sub-basename
  - id: multi-arch-build-helper-context
- id: multi-arch-build-helper-context
  desc: Multi-arch build/cross-compile helper marker
  crit: component
  conf: 0.9
  any:
  - id: multi-arch-build-helper-context--rx-1
  - id: multi-arch-build-helper-context--rx-2
  - id: multi-arch-build-helper-context--rx-3
