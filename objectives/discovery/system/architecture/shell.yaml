defaults:
  platforms: [unix, android, ios]
  for: [shell]
traits:
- id: multi-arch-build-helper-context--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(CROSS_COMPILE|QEMU_ARCH)\b'
  count_max: 1016493
- id: multi-arch-build-helper-context--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(qemu-(user|system)-static)\b'
  count_max: 1016494
- id: multi-arch-appimage-build-context
  desc: Multi-arch AppImage build helper
  crit: component
  conf: 0.9
  if:
    type: text
    substr: AppImage
- id: multi-arch-release-marker
  desc: Release package installer marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(RELEASE_PKG|release package)\b'
- id: buildarch-targetarch--buildarch
  desc: Regex component marker (BUILDARCH)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILDARCH
- id: buildarch-targetarch--targetarch
  desc: Regex component marker (TARGETARCH)
  crit: component
  conf: 0.9
  if:
    type: text
    word: TARGETARCH
- id: build-arm--build-arm
  desc: Regex component marker (BUILD_ARM)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILD_ARM
- id: build-arm--build-arm64
  desc: Regex component marker (BUILD_ARM64)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILD_ARM64
- id: build-arm--build-aarch64
  desc: Regex component marker (BUILD_AARCH64)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILD_AARCH64
- id: build-x86--build-x86
  desc: Regex component marker (BUILD_X86)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILD_X86
- id: build-x86--build-x86-64
  desc: Regex component marker (BUILD_X86_64)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILD_X86_64
- id: build-ppc--build-ppc
  desc: Regex component marker (BUILD_PPC)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILD_PPC
- id: build-ppc--build-ppc64
  desc: Regex component marker (BUILD_PPC64)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILD_PPC64
- id: build-other-arch--build-mips
  desc: Regex component marker (BUILD_MIPS)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILD_MIPS
- id: build-other-arch--build-sh4
  desc: Regex component marker (BUILD_SH4)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILD_SH4
- id: build-other-arch--build-arc
  desc: Regex component marker (BUILD_ARC)
  crit: component
  conf: 0.9
  if:
    type: text
    word: BUILD_ARC
composite_rules:
- id: buildarch-targetarch
  desc: Regex component marker
  crit: component
  conf: 0.9
  any:
  - id: buildarch-targetarch--buildarch
  - id: buildarch-targetarch--targetarch
- id: build-arm
  desc: Regex component marker
  crit: component
  conf: 0.9
  any:
  - id: build-arm--build-arm
  - id: build-arm--build-arm64
  - id: build-arm--build-aarch64
- id: build-x86
  desc: Regex component marker
  crit: component
  conf: 0.9
  any:
  - id: build-x86--build-x86
  - id: build-x86--build-x86-64
- id: build-ppc
  desc: Regex component marker
  crit: component
  conf: 0.9
  any:
  - id: build-ppc--build-ppc
  - id: build-ppc--build-ppc64
- id: build-other-arch
  desc: Regex component marker
  crit: component
  conf: 0.9
  any:
  - id: build-other-arch--build-mips
  - id: build-other-arch--build-sh4
  - id: build-other-arch--build-arc
- id: shell-multi-arch-array
  desc: "Multiple architecture strings in runtime shell logic"
  crit: suspicious
  conf: 0.85
  mbc: "Discovery"
  attack: "T1082"
  all:
  - id: micro-behaviors/os/sysinfo/platform/arch::multi-arch-target
  - id: micro-behaviors/os/sysinfo/platform/arch::sh-uname-fingerprint
  unless:
  - id: metadata/build/openra::openra-system-library-helper
  - id: objectives/discovery/system/architecture::config-guess-basename
  - id: objectives/discovery/system/architecture::config-sub-basename
  - id: multi-arch-build-helper-context
  - id: multi-arch-release-installer-context
- id: multi-arch-build-helper-context
  desc: Multi-arch build/cross-compile helper marker
  crit: component
  conf: 0.9
  any:
  - id: buildarch-targetarch
  - id: build-arm
  - id: build-x86
  - id: build-ppc
  - id: build-other-arch
  - id: multi-arch-build-helper-context--rx-2
  - id: multi-arch-build-helper-context--rx-3
  - id: multi-arch-appimage-build-context
- id: multi-arch-release-installer-context
  desc: Multi-arch release installer marker
  crit: component
  conf: 0.9
  all:
  - id: multi-arch-release-marker
  - id: micro-behaviors/data/archive/extension::tar-gz-or-zip-text
