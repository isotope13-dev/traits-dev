defaults:
  platforms: [linux, unix, macos, android, ios]
composite_rules:
  - id: shell-multi-arch-array
    desc: "Multiple architecture strings (botnet array)"
    crit: suspicious
    conf: 0.85
    for: [shell]
    mbc: "Discovery"
    attack: "T1082"
    all:
      - id: micro-behaviors/os/sysinfo/platform::multi-arch-target
      - id: micro-behaviors/os/env/vars/cicd::sh-uname-fingerprint
    unless:
      - id: metadata/build/openra::openra-system-library-helper
      - id: objectives/discovery/system/architecture::config-guess-basename
      - id: objectives/discovery/system/architecture::config-sub-basename
