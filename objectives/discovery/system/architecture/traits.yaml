defaults:
  platforms: [unix, android, ios]
  for: [shell]
traits:
  - id: config-guess-basename
    desc: GNU config.guess helper script
    crit: baseline
    if:
      type: path
      basename: true
      exact: config.guess
  - id: config-sub-basename
    desc: GNU config.sub helper script
    crit: baseline
    if:
      type: path
      basename: true
      exact: config.sub
