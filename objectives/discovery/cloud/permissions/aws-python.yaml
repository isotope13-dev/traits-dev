defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1087

traits:
  - id: aws-iam-bruteforce-tests-table
    desc: AWS IAM brute-force tests table
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: BRUTEFORCE_TESTS
  - id: aws-permission-bruteforce-loop
    desc: AWS permission brute-force loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: enumerate_using_bruteforce
  - id: aws-permission-check-function
    desc: AWS permission check function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: check_one_permission
  - id: aws-describe-list-bruteforce-log
    desc: AWS describe/list brute-force log
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Attempting common-service describe / list brute force
  - id: boto3-client-supplied-credentials
    desc: boto3 client uses supplied credentials
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'boto3\.client\s*\([\s\S]{0,500}aws_access_key_id\s*='
  - id: aws-account-authorization-details
    desc: AWS account authorization detail call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: get_account_authorization_details

composite_rules:
  - id: aws-iam-permission-bruteforcer
    desc: AWS IAM permission brute-forcer
    crit: suspicious
    conf: 0.97
    all:
      - id: aws-iam-bruteforce-tests-table
      - id: aws-permission-bruteforce-loop
      - id: boto3-client-supplied-credentials
    any:
      - id: aws-permission-check-function
      - id: aws-describe-list-bruteforce-log
    needs: 1
    scope: archive
  - id: aws-iam-account-permission-enumerator
    desc: AWS IAM account permission enumerator
    crit: suspicious
    conf: 0.96
    all:
      - id: boto3-client-supplied-credentials
      - id: aws-account-authorization-details
    any:
      - id: micro-behaviors/communications/http/services/aws-iam::boto3-iam-client
      - id: micro-behaviors/communications/http/services/aws-iam::sts-get-caller-identity
    needs: 1
    scope: file
