defaults:
  platforms: [unix]
  for: [c, elf]
  attack: T1526

traits:
  - id: c-aws-metadata-probe
    desc: C probes AWS metadata
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 169.254.169.254/latest/meta-data

  - id: c-gcp-metadata-probe
    desc: C probes GCP metadata
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: metadata.google.internal
    unless:
      - id: well-known/tool/development/ipsw
      - id: well-known/tool/sysadmin/kubernetes/minikube
      - id: well-known/app/kilocode::kilo-code-native-runtime

  - id: c-cloud-metadata-buffer
    desc: C buffers cloud metadata
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "[cloud-discovery]"

composite_rules:
  - id: c-multi-cloud-metadata-recon
    desc: C multi-cloud metadata recon
    crit: hostile
    conf: 0.98
    all:
      - id: c-aws-metadata-probe
      - id: c-gcp-metadata-probe
      - id: c-cloud-metadata-buffer
