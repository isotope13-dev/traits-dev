defaults:
  platforms: [unix]
  for: [c, elf]
  attack: T1526

traits:
  - id: c-cloud-metadata-buffer
    desc: Cloud-discovery marker string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "[cloud-discovery]"

composite_rules:
  - id: c-multi-cloud-metadata-recon
    desc: C multi-cloud metadata recon
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/file/string/cloud::aws-metadata-endpoint
      - id: metadata/file/string/cloud::gcp-metadata-endpoint
      - id: c-cloud-metadata-buffer
