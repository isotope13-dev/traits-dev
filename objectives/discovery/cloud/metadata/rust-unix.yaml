defaults:
  platforms: [unix]
  for: [rust, elf]
  attack: T1580

traits:
  - id: rust-aws-metadata-enum
    desc: Rust AWS metadata enum
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /latest/meta-data/instance-id
    unless:
      - id: well-known/tool/sysadmin/unix-benign::openbsd-cloud-agent
      - type: basename
        exact: cloud-agent

  - id: rust-gcp-metadata-enum
    desc: Rust GCP metadata enum
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /computeMetadata/v1/project/project-id

  - id: rust-azure-metadata-enum
    desc: Rust Azure metadata enum
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /metadata/instance?api-version=

composite_rules:
  - id: rust-multi-cloud-metadata-sweep
    desc: Rust multi-cloud metadata sweep
    crit: hostile
    conf: 0.98
    any:
      - id: rust-aws-metadata-enum
      - id: rust-gcp-metadata-enum
      - id: rust-azure-metadata-enum
    needs: 2
