defaults:
  platforms: [windows, unix]
  for: [swift]
  attack: T1552.005

traits:
  - id: swift-aws-imds-iam-query
    desc: Swift AWS IMDS IAM query
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 169.254.169.254/latest/meta-data/iam/security-credentials/

  - id: swift-gcp-metadata-query
    desc: Swift GCP metadata query
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'metadata\.google\.internal/computeMetadata[\s\S]{0,400}Metadata-Flavor'

  - id: swift-azure-metadata-query
    desc: Swift Azure metadata query
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '169\.254\.169\.254/metadata/instance/compute[\s\S]{0,420}forHTTPHeaderField: "Metadata"'

composite_rules:
  - id: swift-cloud-metadata-harvest
    desc: Swift cloud metadata harvest
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: swift-aws-imds-iam-query
      - id: swift-gcp-metadata-query
      - id: swift-azure-metadata-query
