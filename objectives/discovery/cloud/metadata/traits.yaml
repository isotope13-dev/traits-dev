defaults:
  attack: T1552.005
  platforms: [windows, unix]
  for: [go, python, javascript, java, class, jar, pe, elf]
traits:
  - id: aws-metadata-token
    desc: AWS EC2 metadata token header
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: X-aws-ec2-metadata-token
    downgrade:
      any:
        - id: objectives/discovery/cloud/metadata/
  - id: aws-metadata-endpoint
    desc: AWS EC2 metadata endpoint
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 169\.254\.169\.254/(latest/meta-data|metadata/instance)
    unless:
      - id: metadata/package/testing/
      - id: well-known/app/vscode-marketplace::m365-agents-toolkit-vsix
    downgrade:
      any:
        - id: objectives/discovery/cloud/metadata/
  - id: aws-imds-v2
    desc: AWS IMDSv2 token TTL header
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: X-aws-ec2-metadata-token-ttl-seconds
    downgrade:
      any:
        - id: objectives/discovery/cloud/metadata/
  - id: aws-iam-credentials
    desc: AWS IAM credentials metadata path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /latest/meta-data/iam/security-credentials
    downgrade:
      any:
        - id: objectives/discovery/cloud/metadata/
        - id: metadata/library/data::aws-sdk-dotnet-core
        - id: metadata/binary/metrics/size::massive-executable
  - id: aws-user-data
    desc: AWS EC2 user-data endpoint
    crit: suspicious
    conf: 0.85
    entropy_max: 7.8
    if:
      type: text
      regex: '(https?://)?169\.254\.169\.254/latest/user-data/?\b'
    unless:
      - type: text
        substr: github.com/aws/aws-sdk-go
      - type: text
        substr: github.com/aws/aws-sdk-go-v2/
      - type: text
        substr: github.com/aws/smithy-go
    downgrade:
      any:
        - id: objectives/discovery/cloud/metadata/
        - id: metadata/binary/metrics/size::massive-executable
  - id: gcp-metadata-flavor
    desc: GCP metadata flavor header
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Metadata-Flavor
  - id: gcp-access-token
    desc: GCP service account access token
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /computeMetadata/v1/instance/service-accounts/default/token
    downgrade:
      any:
        - id: objectives/discovery/cloud/metadata/
        - id: objectives/discovery/cloud/metadata/
  - id: gcp-service-accounts-path
    desc: GCP service accounts metadata path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /computeMetadata/v1/instance/service-accounts
  - id: gcp-service-account-email
    desc: "GCP default service account email meta path"
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: /computeMetadata/v1/instance/service-accounts/default/email
    downgrade:
      any:
        - id: objectives/discovery/cloud/metadata/
        - id: objectives/discovery/cloud/metadata/
        - id: objectives/credential-access/cloud/token/files::gcp-default-credentials
  - id: azure-metadata-endpoint
    desc: Azure IMDS endpoint
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: 169.254.169.254/metadata/instance
    downgrade:
      any:
        - id: objectives/discovery/cloud/metadata/
        - id: metadata/library/runtime::msal-namespace
        - id: metadata/library/runtime::azure-identity-namespace
  - id: azure-metadata-header-dup
    desc: Azure metadata header
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Metadata:true
    unless:
      - id: metadata/library/structure::dart-flutter-js-bundle
      - id: well-known/app/aks-engine/
  - id: azure-identity-token
    desc: Azure managed identity token endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /metadata/identity/oauth2/token
    downgrade:
      any:
        - id: objectives/discovery/cloud/metadata/
        - id: metadata/library/runtime::msal-namespace
        - id: metadata/library/runtime::azure-identity-namespace
  - id: ssrf-cloud-metadata-block-comment
    desc: SSRF cloud metadata block comment
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: Block link-local and cloud metadata addresses to prevent SSRF
  - id: blocked-hosts-symbol
    desc: Blocked hosts set symbol
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)blocked[_-]?host(name)?s?\b'
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: zig-packed-cloud-request-ids
    desc: Zig packed cloud request IDs
    crit: component
    conf: 0.9
    platforms: [unix]
    for: [zig]
    count_min: 3
    if:
      type: symbol
      kind: identifier
      regex: '^PACKED_GET_[A-Z_]+$'
  - id: zig-cloud-metadata-probe-func
    desc: Zig cloud metadata probe func
    crit: suspicious
    conf: 0.92
    platforms: [unix]
    for: [zig]
    if:
      type: text
      regex: '\bfn\s+probeCloudMetadata\s*\('
  - id: zig-cloud-response-logs
    desc: Zig cloud metadata response logs
    crit: component
    conf: 0.9
    platforms: [unix]
    for: [zig]
    count_min: 3
    if:
      type: literal
      regex: '^(cloud (meta|identity)|gcp meta|azure meta) response'
composite_rules:
  - id: go-cloud-sdk-context
    desc: Go cloud SDK context
    crit: baseline
    conf: 0.95
    any:
      - id: metadata/library/data::aws-go-sdk
      - id: metadata/library/data::aws-go-sdk-v2
      - id: metadata/library/data::smithy-go-sdk
      - id: metadata/library/data::gcp-go-sdk
      - id: metadata/library/data::azure-go-sdk
  - id: metadata-harvesting
    desc: Cloud metadata harvesting
    crit: suspicious
    conf: 0.9
    mbc: B0046
    any:
      - id: aws-metadata-endpoint
      - id: objectives/credential-access/cloud/token/files::gcp-metadata-host
      - id: gcp-service-account-email
      - id: azure-metadata-endpoint
    unless:
      - id: metadata/package/testing/
    downgrade:
      any:
        - id: objectives/discovery/cloud/metadata/
  - id: zig-packed-cloud-metadata-sweep
    desc: Zig packed cloud metadata sweep
    crit: hostile
    conf: 0.98
    platforms: [unix]
    for: [zig]
    all:
      - id: zig-packed-cloud-request-ids
      - id: zig-cloud-metadata-probe-func
      - id: zig-cloud-response-logs
      - id: objectives/anti-static/obfuscation/encoding/xor::zig-runtime-xor-packed-arrays
    any:
      - id: micro-behaviors/communications/socket/connect::zig-tcp-connect-host
      - id: cloud-metadata-access
  - id: cloud-metadata-benign-context
    desc: Cloud SDK or identity library context
    crit: baseline
    conf: 0.95
    any:
      - id: go-cloud-sdk-context
      - id: well-known/lib/aws-sdk-ruby
      - id: metadata/library/data::botocore-lib
      - id: metadata/library/data::rust-cloud-object-store-sdk
      - id: metadata/library/runtime::msal-namespace
      - id: metadata/library/runtime::azure-identity-namespace
      - id: ssrf-metadata-blocklist-context
  - id: ssrf-metadata-blocklist-context
    desc: SSRF metadata blocklist context
    crit: baseline
    conf: 0.94
    any:
      - id: ssrf-cloud-metadata-block-comment
      - id: blocked-hosts-symbol
  - id: gcp-oauth-client-context
    desc: GCP OAuth client library context
    crit: baseline
    conf: 0.92
    all:
      - id: objectives/credential-access/cloud/token/files::gcp-default-credentials
      - id: micro-behaviors/communications/http/oauth::oauth-protocol-reference
      - id: micro-behaviors/communications/http/oauth::refresh-token
