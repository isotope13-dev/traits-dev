defaults:
  attack: T1552.005
  platforms:
  - linux
  - macos
  - windows
  - unix
  - android
  - ios
  for:
  - scripts
  - binaries
traits:
- id: aws-go-sdk
  desc: AWS Go SDK marker
  crit: baseline
  conf: 0.95
  if:
    type: raw
    substr: github.com/aws/aws-sdk-go
- id: smithy-go-sdk
  desc: Smithy Go marker
  crit: baseline
  conf: 0.95
  if:
    type: raw
    substr: github.com/aws/smithy-go
- id: gcp-go-sdk
  desc: GCP Go SDK marker
  crit: baseline
  conf: 0.95
  if:
    type: raw
    substr: cloud.google.com/go/
- id: azure-go-sdk
  desc: Azure Go SDK marker
  crit: baseline
  conf: 0.95
  if:
    type: raw
    substr: github.com/Azure/azure-sdk-for-go/
- id: aws-metadata-token
  desc: AWS EC2 metadata token header
  crit: suspicious
  conf: 0.9
  if:
    type: string_value
    substr: X-aws-ec2-metadata-token
  downgrade:
    any:
    - id: go-cloud-sdk-context
- id: aws-metadata-endpoint
  desc: AWS EC2 metadata endpoint
  crit: notable
  conf: 0.85
  if:
    type: string_value
    regex: 169\.254\.169\.254/(latest/meta-data|metadata/instance)
  unless:
  - id: metadata/package::has-tests
  - type: basename
    regex: \.map$
  downgrade:
    any:
    - id: cloud-sdk-libraries
- id: aws-imds-v2
  desc: AWS IMDSv2 token TTL header
  crit: suspicious
  conf: 0.9
  if:
    type: string_value
    substr: X-aws-ec2-metadata-token-ttl-seconds
  downgrade:
    any:
    - id: go-cloud-sdk-context
- id: aws-iam-credentials
  desc: AWS IAM credentials metadata path
  crit: suspicious
  conf: 0.9
  if:
    type: string_value
    substr: /latest/meta-data/iam/security-credentials
  downgrade:
    any:
    - id: cloud-sdk-libraries
- id: aws-user-data
  desc: AWS EC2 user-data endpoint
  crit: suspicious
  conf: 0.85
  if:
    type: string_value
    substr: /latest/user-data
  downgrade:
    any:
    - id: metadata/binary/metrics::massive-executable
- id: gcp-metadata-flavor
  desc: GCP metadata flavor header
  crit: notable
  conf: 0.9
  if:
    type: string_value
    substr: Metadata-Flavor
- id: gcp-access-token
  desc: GCP service account access token
  crit: suspicious
  conf: 0.9
  if:
    type: string_value
    substr: /computeMetadata/v1/instance/service-accounts/default/token
- id: gcp-service-accounts-path
  desc: GCP service accounts metadata path
  crit: notable
  conf: 0.9
  if:
    type: string_value
    substr: /computeMetadata/v1/instance/service-accounts
- id: azure-metadata-endpoint
  desc: Azure IMDS endpoint
  crit: notable
  conf: 0.85
  if:
    type: string_value
    substr: 169.254.169.254/metadata/instance
  unless:
  - type: basename
    regex: \.map$
  downgrade:
    any:
    - id: go-cloud-sdk-context
    - id: metadata/library/runtime::msal-namespace
    - id: metadata/library/runtime::azure-identity-namespace
- id: azure-metadata-header-dup
  desc: Azure metadata header
  crit: suspicious
  conf: 0.9
  if:
    type: string_value
    substr: Metadata:true
- id: azure-identity-token
  desc: Azure managed identity token endpoint
  crit: suspicious
  conf: 0.9
  if:
    type: string_value
    substr: /metadata/identity/oauth2/token
  downgrade:
    any:
    - id: go-cloud-sdk-context
    - id: metadata/library/runtime::msal-namespace
    - id: metadata/library/runtime::azure-identity-namespace
composite_rules:
- id: go-cloud-sdk-context
  desc: Go cloud SDK context
  crit: baseline
  conf: 0.95
  any:
  - id: aws-go-sdk
  - id: smithy-go-sdk
  - id: gcp-go-sdk
  - id: azure-go-sdk
- id: metadata-harvesting
  desc: Cloud metadata harvesting
  crit: suspicious
  conf: 0.9
  mbc: B0046
  any:
  - id: aws-metadata-endpoint
  - id: objectives/credential-access/cloud/token::gcp-metadata-host
  - id: azure-metadata-endpoint
  unless:
  - id: metadata/package::has-tests
  downgrade:
    any:
    - id: cloud-sdk-libraries
- id: cloud-sdk-libraries
  desc: Common cloud SDK libraries
  crit: baseline
  conf: 0.95
  any:
  - id: go-cloud-sdk-context
  - id: metadata/library/data::aws-sdk-ruby
  - id: metadata/library/data::aws-sdk-ruby-constants
  - id: metadata/library/data::botocore-lib
  - id: metadata/library/runtime::msal-namespace
  - id: metadata/library/runtime::azure-identity-namespace
