defaults:
  platforms: [unix]
  for: [go, elf]
  attack: T1526

traits:
  - id: go-aws-metadata-endpoints
    desc: Go AWS metadata endpoints
    crit: suspicious
    conf: 0.94
    unless:
      - type: text
        substr: TryDiscoverPublicIP
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit/
      - id: well-known/app/olares::cli-source-tree
    if:
      type: text
      substr: http://169.254.169.254/latest/meta-data/

  - id: go-gcp-metadata-header
    desc: Go GCP metadata header
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'metadata\.google\.internal[\s\S]{0,360}Metadata-Flavor'
    unless:
      - id: well-known/app/kilocode::kilo-code-native-runtime

  - id: go-azure-metadata-header
    desc: Go Azure metadata header
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'metadata/instance\?api-version[\s\S]{0,420}Metadata", "true"'
    unless:
      - id: well-known/app/aks-engine/

  - id: go-postdata-cloud-tags
    desc: Go posts cloud tags
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'postData\(client, target, "cloud_(aws|gcp|azure)"'

composite_rules:
  - id: go-multi-cloud-metadata-exfil
    desc: Go multi-cloud metadata exfil
    crit: hostile
    conf: 0.98
    all:
      - id: go-aws-metadata-endpoints
      - id: go-gcp-metadata-header
      - id: go-azure-metadata-header
      - id: go-postdata-cloud-tags
