# Cloud metadata access aggregator. Combines provider-specific atoms
# (AWS IMDS, GCP metadata) into a single feature for malware-family
# composites that want "this binary touches a cloud metadata endpoint"
# as one piece of evidence.
defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
composite_rules:
  - id: cloud-metadata-access
    desc: Cloud metadata endpoint reference
    # The provider atoms are string/endpoint references.  Without a request
    # or response operation they are incomplete evidence of metadata access.
    crit: component
    conf: 0.85
    any:
      - id: metadata/file/string/cloud::aws-metadata-endpoint
      - id: metadata/file/string/cloud::gcp-metadata-endpoint
      - id: metadata/file/string/cloud::azure-managed-identity-token-path
    unless:
      - id: metadata/package/testing/harness/benchmark::adversarial-benchmark-corpus
