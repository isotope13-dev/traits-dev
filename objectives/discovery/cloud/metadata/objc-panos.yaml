defaults:
  platforms: [panos, appliance, unix]
  for: [objc]
  attack: T1526

traits:
  - id: objc-panos-gcp-metadata-token
    desc: ObjC PAN-OS GCP metadata token
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /computeMetadata/v1/instance/service-accounts/default/token

  - id: objc-panos-aws-iam-metadata
    desc: ObjC PAN-OS AWS IAM metadata
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /latest/meta-data/iam/security-credentials/

  - id: objc-panos-azure-msi-token
    desc: ObjC PAN-OS Azure MSI token
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /metadata/identity/oauth2/token

composite_rules:
  - id: objc-panos-multi-cloud-metadata
    desc: ObjC PAN-OS cloud metadata
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-gcp-metadata-token
      - id: objc-panos-aws-iam-metadata
      - id: objc-panos-azure-msi-token
