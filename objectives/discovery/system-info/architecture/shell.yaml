defaults:
  platforms: [linux, unix, macos, android, ios]
composite_rules:
  - id: shell-multi-arch-array
    desc: "Multiple architecture strings (botnet array)"
    crit: suspicious
    conf: 0.85
    for: [shell]
    mbc: "Discovery"
    attack: "T1082"
    all:
      - id: micro-behaviors/os/info/architecture::multi-arch-target
      - id: micro-behaviors/os/env/vars/cicd::sh-uname-fingerprint
