# Window-based Process Discovery
# Enumerating windows to discover running processes
# ATT&CK: T1010 (Application Window Discovery)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1010"
composite_rules:
  - id: window-process-discovery
    desc: Process discovery via window enumeration
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/ui/window/manage/enumerate::get-window-thread-process-id
      - id: micro-behaviors/ui/window/manage/control::get-window-text
    any:
      - id: micro-behaviors/ui/window/manage/enumerate::enum-windows
      - id: micro-behaviors/ui/window/manage/enumerate::enum-child-windows-import
    unless:
      - id: metadata/binary/framework::vb6-runtime-library
      - id: objectives/collection/keylog/capture::p-user-proxy-dll
      - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/lang/compiler/managed/
