defaults:
  platforms: [freebsd, unix]
  for: [swift]
  attack: T1057

composite_rules:
  - id: swift-process-inventory
    desc: Swift enumerates process inventory
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/enumerate/proc::proc-status-path-reference
      - id: micro-behaviors/process/enumerate/ps::ps-command-path-reference
