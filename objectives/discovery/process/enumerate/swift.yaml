defaults:
  platforms: [freebsd, unix]
  for: [swift]
  attack: T1057

traits:
  - id: swift-proc-status-walk
    desc: Swift walks proc status files
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/proc[\s\S]{0,180}/status'

  - id: swift-ps-process-fallback
    desc: Swift uses ps process fallback
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /bin/ps

composite_rules:
  - id: swift-process-inventory
    desc: Swift enumerates process inventory
    crit: hostile
    conf: 0.98
    all:
      - id: swift-proc-status-walk
      - id: swift-ps-process-fallback
