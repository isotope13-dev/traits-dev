defaults:
  platforms: [unix, windows, appliance]
  for: [typescript, javascript]
  attack: T1057

composite_rules:
  - id: ts-proc-pid-walk
    desc: TS walks proc pid entries
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/fs/proc/info/listing::javascript-proc-directory-read
      - id: micro-behaviors/fs/proc/info/path::process-arbitrary
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: well-known/app/codeam-cli::codeam-cli-benign-remote-agent

  - id: ts-process-inventory
    desc: TS process inventory
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/enumerate/shell::ps-list-command
      - id: ts-proc-pid-walk
    any:
      - id: micro-behaviors/process/info/current::node-process-ppid-access
      - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
