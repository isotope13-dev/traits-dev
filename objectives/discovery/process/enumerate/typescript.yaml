defaults:
  platforms: [unix, windows, appliance]
  for: [typescript, javascript]
  attack: T1057

traits:
  - id: ts-proc-readdir
    desc: TS reads proc directory
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'readdirSync\(["'']/proc["'']\)'

  - id: ts-proc-pid-status-path
    desc: TS reads proc pid status
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/proc/\$\{.{1,40}\}/(stat|cmdline|statm)'

  - id: ts-process-parent-id-field
    desc: TS process parent id field
    crit: suspicious
    conf: 0.86
    unless:
      - id: metadata/library/structure/
    if:
      type: text
      word: ppid

composite_rules:
  - id: ts-proc-pid-walk
    desc: TS walks proc pid entries
    crit: suspicious
    conf: 0.93
    any:
      - id: ts-proc-readdir
      - id: ts-proc-pid-status-path

  - id: ts-process-inventory
    desc: TS process inventory
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/enumerate/shell::ps-list-command
      - id: ts-proc-pid-walk
    any:
      - id: ts-process-parent-id-field
      - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
