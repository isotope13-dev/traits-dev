defaults:
  platforms: [ios]
  for: [csharp]
  attack: T1057

traits:
  - id: dotnet-ios-proc-listpids
    desc: .NET iOS proc_listpids import
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: proc_listpids

  - id: dotnet-ios-proc-pidpath
    desc: .NET iOS proc_pidpath import
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: proc_pidpath

composite_rules:
  - id: dotnet-ios-process-enumeration
    desc: .NET iOS process enumeration
    crit: hostile
    conf: 0.97
    all:
      - id: dotnet-ios-proc-listpids
      - id: dotnet-ios-proc-pidpath
