# Anchor-DLL targeting — discovering injection targets by which loaded
# module they have, rather than by process name or PID.
#
# An "anchor DLL" is a module the attacker knows is loaded inside the
# desired victim process (e.g. user32.dll inside any GUI process,
# wininet.dll inside browsers, msvbvm60.dll inside legacy VB6 apps).
# The injector enumerates processes via Toolhelp32, then for each one
# walks its module list and matches on module name. This is more
# resilient than name-based targeting (PIDs change, processes are
# renamed) and more covert (one helper function call instead of a
# list of explicit target process names that defenders can grep for).
#
# Reference: DAEMON Tools piyu.exe / CodeInj exposes this as
# `TryFindFirstProcessIdWithModule(dllName, out pid)`.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1057"

traits:
  - id: try-find-process-with-module
    desc: TryFindFirstProcessIdWithModule helper name
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: TryFindFirstProcessIdWithModule

  - id: find-process-loading-module
    desc: FindProcessLoadingModule helper name
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: FindProcessLoadingModule

  - id: process-has-module-helper
    desc: ProcessHasModule per-process module check
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: ProcessHasModule

  - id: anchor-dll-no-process-loads-error
    desc: No-process-loads anchor-DLL error string
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: "no process loads module"



composite_rules:
  - id: anchor-dll-module-enumeration
    desc: Anchor-DLL targeting via module enumeration
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/process/enumerate/snapshot::module32-first
      - id: micro-behaviors/process/enumerate/snapshot::module32-next
    any:
      - id: try-find-process-with-module
      - id: find-process-loading-module
      - id: process-has-module-helper
      - id: anchor-dll-no-process-loads-error
