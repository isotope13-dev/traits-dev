# Process Discovery for Targeting
# Detection of process enumeration combined with process access
# Indicates intent to discover and target specific processes
# ATT&CK: T1057 (Process Discovery), T1562.001 (Impair Defenses)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1057"
  mbc: "E1057"
composite_rules:
  - id: toolhelp-enumeration-benign-context
    desc: Benign ToolHelp enumeration context
    crit: component
    conf: 0.85
    any:
      - id: metadata/vendor/hex-rays::ida-pin-tracer-plugin
      - id: metadata/vendor/armnf::marker
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics::many-exports-200
      - id: objectives/discovery/host/browser::browser-selection-ui-resource
      - id: metadata/vendor/psutil::windows-extension
      - id: metadata/binary/installer::known-benign-installer
      - id: well-known/tools/reverse-engineering::ollydbg-executable-marker
      - id: metadata/vendor/microsoft::wmi-win32-provider-versioninfo

  - id: process-enumeration-with-access
    desc: Process enumeration combined with process access
    crit: notable
    conf: 0.88
    all:
      - id: micro-behaviors/process/enumerate/psapi::enum-processes
      - id: micro-behaviors/process/create/spawn::open-process
    unless:
      - type: trait
        id: metadata/signed/platform::microsoft
      - type: trait
        id: metadata/binary/metrics::many-exports-200
      - type: trait
        id: metadata/vendor/psutil::windows-extension

  - id: toolhelp-enumeration-with-access
    desc: ToolHelp snapshot enumeration with process access
    crit: notable
    conf: 0.90
    all:
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
      - id: micro-behaviors/process/create/spawn::open-process
    unless:
      - id: toolhelp-enumeration-benign-context

  - id: process-reconnaissance-pattern
    desc: Process reconnaissance for targeting
    crit: notable
    conf: 0.92
    any:
      - id: process-enumeration-with-access
      - id: toolhelp-enumeration-with-access
      - id: micro-behaviors/process/enumerate/psapi::psapi-process-scan
    unless:
      - id: metadata/signed/platform::microsoft
    needs: 2
