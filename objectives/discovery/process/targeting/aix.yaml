defaults:
  platforms: [unix, macos]
  for: [c, cpp, elf, zig, swift]
  attack: T1057
composite_rules:
  - id: aix-process-recon
    desc: Probes system for AIX processes
    crit: hostile
    conf: 0.95
    any:
      - id: micro-behaviors/process/enumerate/shell::getpids
      - id: micro-behaviors/process/enumerate/shell::proc-psinfo
      - id: micro-behaviors/process/enumerate/shell::kvm-getprocs
