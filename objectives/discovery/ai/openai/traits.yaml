defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  # === OpenAI atomic indicators ===
  - id: azure-ai-openai
    desc: Azure.AI.OpenAI library reference
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: "Azure.AI.OpenAI"
  - id: openai-ref
    desc: OpenAI reference
    crit: component
    conf: 0.6
    if:
      type: string_value
      substr: "OpenAI"
composite_rules:
  # OpenAI client composite
  - id: client-comp
    desc: Integration with OpenAI/Azure AI libraries
    crit: component
    conf: 0.8
    any:
      - id: azure-ai-openai
      - id: openai-ref
