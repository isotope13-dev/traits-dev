defaults:
  platforms: [unix]
  for: [python]
  attack: T1082
composite_rules:
  - id: python-extensive-recon
    desc: Python script gathering extensive system and network information
    crit: hostile
    conf: 0.95
    needs: 4
    any:
      - id: micro-behaviors/process/enumerate/shell
      - id: micro-behaviors/os/sysinfo/platform/kernel::uname
      - id: micro-behaviors/os/network/interface::ifconfig-a
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
