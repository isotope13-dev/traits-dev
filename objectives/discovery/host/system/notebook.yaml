# Notebook and Interactive Environment Discovery
# Detects harvesting of environment-specific metadata in notebooks (Colab, Jupyter, etc)
# ATT&CK: T1082 (System Information Discovery)
defaults:
  for: [python]
  crit: notable
  attack: "T1082"
traits:
  - id: colab-project-id
    desc: Harvesting Colab Project ID
    if:
      type: raw
      regex: "(?i)project_id"
    # Often seen in variable names or dictionary keys for exfiltration
    conf: 0.6
  - id: colab-version-id
    desc: Harvesting Colab Version ID
    if:
      type: raw
      regex: "(?i)version_id"
    conf: 0.6
composite_rules:
  - id: notebook-metadata-harvest
    desc: General notebook metadata harvesting pattern
    crit: suspicious
    all:
      - id: objectives/execution/interpreter/runtime/colab::register-callback
    any:
      - id: colab-project-id
      - id: colab-version-id
