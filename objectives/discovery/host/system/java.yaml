defaults:
  platforms: [unix, windows]
  for: [java, class, kotlin]
  attack: T1082
composite_rules:
  - id: java-extensive-recon
    desc: Java script gathering system and network information
    crit: hostile
    conf: 0.95
    needs: 3
    any:
      - id: micro-behaviors/os/env/access::java-system-getproperty
      - id: micro-behaviors/os/env/access::java-system-getenv
      - id: micro-behaviors/process/create/shell/invoke::java-process-builder
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
