defaults:
  platforms: [unix, windows]
  for: [java, class, kotlin]
  attack: T1082
composite_rules:
  # Reading system properties + environment + spawning a process is ordinary
  # Java desktop/server behavior (e.g. jadx's DesktopEntryUtils). The
  # discriminator for hostile recon is targeting a credential file, so require
  # the /etc/passwd leg plus at least two generic enumeration capabilities.
  - id: java-extensive-recon
    desc: Java host recon with passwd access
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
    needs: 2
    any:
      - id: micro-behaviors/os/env/access::java-system-getproperty
      - id: micro-behaviors/os/env/access::java-system-getenv
      - id: micro-behaviors/process/create/shell/spawn::java-process-builder
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: jvm-bytecode-sensitive-host-recon
    desc: JVM account-file host recon
    crit: hostile
    conf: 0.95
    for: [class, jar, zip]
    all:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-bytecode
      - id: micro-behaviors/os/privilege/paths::etc-shadow-bytecode
    any:
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode-symbol
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
    needs: 1
