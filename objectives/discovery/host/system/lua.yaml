defaults:
  platforms: [unix]
  for: [lua]
  attack: T1082
composite_rules:
  - id: lua-system-recon
    desc: Lua script gathering extensive system information
    crit: hostile
    conf: 0.95
    needs: 3
    any:
      - id: micro-behaviors/process/create/shell/invoke::lua-io-popen
      - id: micro-behaviors/process/enumerate/shell::ps-ef
      - id: micro-behaviors/process/user/query::whoami-cmd
      - id: micro-behaviors/os/sysinfo/platform/kernel::uname
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
