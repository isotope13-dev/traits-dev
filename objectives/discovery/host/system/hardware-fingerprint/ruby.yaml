defaults:
  for:
    - ruby
  platforms:
    - all
traits:
  - id: env-bracket-access-dup
    desc: ENV bracket access
    crit: notable
    conf: 0.6
    if:
      type: string
      exact: ENV[
  - id: env-fetch
    desc: ENV.fetch method
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: ENV.{0,50}fetch
  - id: process-pid
    desc: Process.pid method
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: Process.{0,50}pid
  - id: process-ppid
    desc: Process.ppid method
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: Process.{0,50}ppid
  - id: process-uid
    desc: Process.uid method
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: Process.{0,50}uid
  - id: process-gid
    desc: Process.gid method
    crit: notable
    conf: 0.6
    if:
      type: symbol
      regex: Process.{0,50}gid
composite_rules:
  - id: ruby-env-read
    desc: Read environment variables
    crit: notable
    conf: 0.75
    any:
      - id: objectives/discovery/host/system/hardware-fingerprint::env-bracket-access-dup
      - id: env-fetch
  - id: ruby-process-info
    desc: Process information access
    crit: notable
    conf: 0.75
    any:
      - id: process-pid
      - id: process-ppid
      - id: process-uid
      - id: process-gid
