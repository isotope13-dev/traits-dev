  - id: js-os-networkinterfaces-to-hex
    desc: Hex-encodes network interfaces for exfiltration
    crit: suspicious
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: raw
      regex: os\.networkInterfaces\(\)[\s\S]{0,500}toHex
composite_rules:
  - id: js-profiling
    desc: Aggregates system info for profiling
    crit: suspicious
    conf: 0.95
    for:
      - javascript
      - typescript
    all:
      - id: objectives/discovery/host/system/hardware-fingerprint::os-hostname-call-dup
      - id: objectives/discovery/host/system/hardware-fingerprint::os-userinfo-call-dup
      - id: objectives/discovery/host/system/hardware-fingerprint::os-platform-call-dup
  - id: js-sysinfo-multi
    desc: Multiple system info function calls
    crit: notable
    conf: 0.75
    for:
      - javascript
      - typescript
    needs: 4
    any:
      - id: objectives/discovery/host/system/hardware-fingerprint::os-hostname-call-dup
      - id: objectives/discovery/host/system/hardware-fingerprint::os-userinfo-call-dup
      - id: os-homedir-call
      - id: os-networkinterfaces-call
      - id: objectives/discovery/host/system/hardware-fingerprint::os-platform-call-dup
      - id: os-arch-call
      - id: os-cpus-call
      - id: os-totalmem-call
      - id: process-cwd-call
  - id: js-victim-id
    desc: Victim identification (host + user)
    crit: notable
    conf: 0.85
    for:
      - javascript
      - typescript
    all:
      - id: objectives/discovery/host/system/hardware-fingerprint::os-hostname-call-dup
      - id: objectives/discovery/host/system/hardware-fingerprint::os-userinfo-call-dup
  - id: js-profiling-exfil
    desc: JavaScript system profiling with exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1082
    attack: T1020
    for:
      - javascript
    all:
      - id: js-sysinfo-multi
      - id: micro-behaviors/communications/http/post::post
      - id: objectives/discovery/host/fingerprint::json-stringify-call
  - id: process-fingerprint-any
    desc: Process object fingerprint property
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    any:
      - id: process-platform-content
      - id: process-arch-content
      - id: process-versions-content
      - id: process-version-access
  - id: process-fingerprint-multi
    desc: Multiple process fingerprint properties
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    needs: 2
    any:
      - id: process-platform-content
      - id: process-arch-content
      - id: process-versions-content
      - id: process-argv-content
      - id: process-version-access
  - id: system-fingerprint-exfil
    desc: System fingerprinting with HTTP POST exfil
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    for:
      - javascript
    all:
      - id: js-victim-id
      - id: process-fingerprint-multi
      - id: micro-behaviors/communications/http/post::post
      - id: objectives/discovery/host/fingerprint::json-stringify-call
  - id: js-basic-recon-indicator
    desc: Basic host recon indicator
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: objectives/discovery/host/system/hardware-fingerprint::os-hostname-call-dup
      - id: objectives/discovery/host/system/hardware-fingerprint::os-userinfo-call-dup
      - id: os-homedir-call
  - id: js-hex-encoding-indicator
    desc: Hex encoding indicator
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/data/encode/hex::buffer-to-hex
      - id: micro-behaviors/data/encode/hex::buffer-hex
  - id: js-encoded-recon-beacon
    desc: Encoded basic system reconnaissance beacon
    crit: hostile
    conf: 0.9
    mbc: E1082
    attack: T1082
    for:
      - javascript
      - typescript
    all:
      - id: js-basic-recon-indicator
      - id: js-hex-encoding-indicator
      - id: objectives/discovery/host/fingerprint::json-stringify-call
