defaults:
  for:
    - all
  attack: T1082
traits:
  - id: os-hostname-call-dup
    desc: os.hostname() call
    crit: notable
    conf: 0.75
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: os.hostname
  - id: os-userinfo-call-dup
    desc: os.userInfo() call
