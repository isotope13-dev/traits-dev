# Generic shell-based host discovery composites — system info, process,
# and network enumeration via standard Unix tools (whoami, uname, ps,
# printenv, etc.). Not tied to a specific package ecosystem.
defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
composite_rules:
  - id: network-discovery
    desc: Shell command performs network discovery
    conf: 0.6
    crit: notable
    attack: T1016
    any:
      - id: objectives/discovery/network/interface::exec-ifconfig
      - id: objectives/discovery/network/interface::exec-ip-addr
      - id: objectives/discovery/network/interface::exec-ip-a
      - id: objectives/discovery/network/connections::connection-discovery
  - id: sys-info-discovery
    desc: Shell command performs system information discovery
    conf: 0.6
    crit: notable
    attack: T1082
    unless:
      - id: metadata/package/testing/harness/runtime/
    any:
      - id: micro-behaviors/process/user/query::whoami-cmd
      - id: micro-behaviors/fs/path/os::uname-a-cmd
      - id: objectives/discovery/host/system::network-discovery
      - id: micro-behaviors/process/enumerate/shell::ps-aux
      - id: micro-behaviors/process/enumerate/shell::ps-ef
      - id: micro-behaviors/process/enumerate/shell::tasklist
      - id: micro-behaviors/os/env/vars/access::printenv
      - id: micro-behaviors/process/user/query::id-cmd
      - id: micro-behaviors/os/env/vars/access::env-cmd
  - id: broad-host-recon-script
    desc: Broad host reconnaissance via shell commands
    crit: suspicious
    conf: 0.9
    attack: T1082
    unless:
      - id: well-known/tool/offensive/pentestkit/
      - id: metadata/library/syntaxhighlighter/
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-brush
      - id: objectives/supply-chain/trojanized/app/debug-probe/
      - id: well-known/app/cfengine::source-file-marker
    needs: 4
    any:
      - id: objectives/discovery/host/system::sysctl-hw-model
      - id: objectives/discovery/system/hardware/sysctl::sw-vers-product
      - id: micro-behaviors/os/network/interface::ifconfig
      - id: micro-behaviors/os/network/status::netstat
      - id: micro-behaviors/process/enumerate/shell::ps-aux
      - id: micro-behaviors/os/sysinfo/hostname::hostname-cmd
      - id: micro-behaviors/process/user/query::whoami-cmd
      - id: micro-behaviors/os/env/vars/access::env-cmd-bare
