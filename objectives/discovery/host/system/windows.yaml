defaults:
  platforms: [windows]
  for: [pe]
  attack: T1082

composite_rules:
  - id: windows-stealer-recon
    desc: Victim system profiling cluster (stealer)
    crit: suspicious
    conf: 0.90
    needs: 3
    any:
      - id: micro-behaviors/os/sysinfo/platform::get-version-ex
      - id: micro-behaviors/os/sysinfo/hardware::get-memory-status
      - id: micro-behaviors/os/sysinfo/hardware::get-disk-space
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
      - id: micro-behaviors/os/sysinfo/hostname::get-user-name
      - id: micro-behaviors/os/sysinfo/hostname::get-computer-name
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
