defaults:
  platforms: [windows]
  for: [pe]
  attack: T1082

composite_rules:
  - id: windows-stealer-recon-known-benign
    desc: Known benign Windows system profiling context
    crit: component
    conf: 0.95
    any:
      - id: metadata/signed/developer::oracle-america
      - id: metadata/signed/developer::roblox-corporation
      - id: metadata/signed/developer::broadcom-inc
      - id: well-known/tool/development/adb::adb-exe-basename
      - id: well-known/app/imagemagick::magick-native-dll-basename
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/signed/developer::bitdefender-srl
      - id: metadata/signed/developer::iobit-co.
      - id: metadata/signed/developer::win.rar-gmbh
      - id: metadata/signed/developer::valve-corp.
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/binary/installer/script::nsis

  - id: windows-stealer-recon
    for: [source]
    desc: Victim system profiling cluster (stealer)
    crit: suspicious
    conf: 0.90
    needs: 4
    any:
      - id: micro-behaviors/os/sysinfo/platform/locale::get-version-ex
      - id: micro-behaviors/os/sysinfo/hardware::get-memory-status
      - id: micro-behaviors/os/sysinfo/hardware::get-disk-space
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
      - id: micro-behaviors/os/sysinfo/hostname::get-user-name
      - id: micro-behaviors/os/sysinfo/hostname::get-computer-name
    unless:
      - id: objectives/discovery/host/system::windows-stealer-recon-known-benign

  - id: windows-binary-stealer-recon
    for: [pe, dll]
    desc: Windows binary victim profiling cluster
    crit: suspicious
    conf: 0.94
    needs: 4
    any:
      - id: micro-behaviors/os/sysinfo/hardware::get-disk-space
      - id: micro-behaviors/os/sysinfo/hostname::get-user-name
      - id: micro-behaviors/os/sysinfo/platform/locale::enum-system-locales
      - id: micro-behaviors/time/query::get-timezone-information
      - id: objectives/discovery/host/geo::geo-api
    unless:
      - id: objectives/discovery/host/system::windows-stealer-recon-known-benign
      - id: metadata/signed/platform::microsoft
      - id: well-known/app/qbittorrent::qbittorrent-official-binary
