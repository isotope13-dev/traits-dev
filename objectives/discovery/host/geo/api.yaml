# Discovery - Geolocation and IP Intelligence
# Detects victim geolocation/profiling via IP lookup APIs
# ATT&CK: T1016 (System Network Configuration Discovery)
defaults:
  for: [all]
traits:
  # === IP Geolocation APIs ===
  - id: api-db-ip
    desc: api.db-ip.com endpoint
    crit: notable
    conf: 0.7
    attack: "T1016"
    if:
      type: string
      substr: "api.db-ip.com"
  - id: db-ip-v2
    desc: db-ip.com/v2 endpoint
    crit: notable
    conf: 0.7
    attack: "T1016"
    if:
      type: string
      substr: "db-ip.com/v2"
      # ip-api.com defined in objectives/discovery/network/scan::ip-api-com
  - id: ipapi-co
    desc: ipapi.co geolocation API
    crit: notable
    conf: 0.8
    attack: "T1016"
    if:
      type: string
      substr: "ipapi.co"
      # NOTE: api.ipify.org now defined in micro-behaviors/communications/http/ip-discovery::ipify-api
  - id: ipgeolocation-api
    desc: ipgeolocation.io API
    crit: suspicious
    conf: 0.85
    attack: "T1016"
    if:
      type: string
      substr: "ipgeolocation.io"
  - id: geoip-maxmind
    desc: geoip.maxmind.com endpoint
    crit: notable
    conf: 0.6
    attack: "T1016"
    if:
      type: string
      substr: "geoip.maxmind.com"
  - id: maxmind-geoip
    desc: maxmind.com/geoip endpoint
    crit: notable
    conf: 0.6
    attack: "T1016"
    if:
      type: string
      substr: "maxmind.com/geoip"
  - id: freegeoip-app
    desc: freegeoip.app domain
    crit: notable
    conf: 0.7
    attack: "T1016"
    if:
      type: string
      substr: "freegeoip.app"
  - id: freegeoip-net
    desc: freegeoip.net domain
    crit: notable
    conf: 0.7
    attack: "T1016"
    if:
      type: string
      substr: "freegeoip.net"
  - id: freegeoip-io
    desc: freegeoip.io domain
    crit: notable
    conf: 0.7
    attack: "T1016"
    if:
      type: string
      substr: "freegeoip.io"
      # NOTE: Generic IP lookup services (checkip.amazonaws.com, icanhazip.com, ifconfig.me, etc.)
      # are defined in discovery/network/scan/ip-lookup.yaml
      # Use discovery/network/scan directory reference for IP lookup detection
  - id: country-code-camel
    # === Response Fields (JSON parsing) ===

    desc: countryCode field (camelCase)
    crit: notable
    conf: 0.5
    attack: "T1016"
    if:
      type: string
      word: "countryCode"
  - id: country-code-snake
    desc: country_code field (snake_case)
    crit: notable
    conf: 0.5
    attack: "T1016"
    if:
      type: string
      word: "country_code"
  - id: country-name
    desc: country_name field (geo profiling)
    crit: notable
    conf: 0.5
    attack: "T1016"
    if:
      type: string
      word: "country_name"
  - id: ip-address-camel
    desc: ipAddress field (camelCase)
    crit: notable
    conf: 0.4
    attack: "T1016"
    if:
      type: string
      word: "ipAddress"
  - id: ip-json-field
    desc: '"ip" JSON field'
    crit: notable
    conf: 0.4
    attack: "T1016"
    if:
      type: string
      exact: '"ip":'
  - id: city-field
    desc: City JSON field (geo profiling)
    crit: notable
    conf: 0.5
    attack: "T1016"
    if:
      type: string
      substr: '"city":'
  - id: region-field
    desc: Region JSON field (geo profiling)
    crit: notable
    conf: 0.5
    attack: "T1016"
    if:
      type: string
      substr: '"region":'
  - id: freegeoip-generic
    desc: freegeoip reference (generic)
    crit: notable
    conf: 0.7
    attack: "T1016"
    if:
      type: string
      substr: "freegeoip"
composite_rules:
  # DB-IP API composite
  - id: db-ip-api
    desc: db-ip.com geolocation API
    crit: suspicious
    conf: 0.85
    attack: "T1016"
    any:
      - id: api-db-ip
      - id: db-ip-v2
        # ipify API composite
  - id: ipify-api-comp
    desc: ipify.org IP address API
    crit: notable
    conf: 0.8
    attack: "T1016"
    any:
      - id: objectives/discovery/host/geo::ipify-api
      - id: objectives/discovery/network/scan::ipify-org
        # MaxMind API composite
  - id: maxmind-api
    desc: MaxMind GeoIP API
    crit: notable
    conf: 0.7
    attack: "T1016"
    any:
      - id: geoip-maxmind
      - id: maxmind-geoip
        # freegeoip API composite
  - id: freegeoip-api
    desc: freegeoip geolocation API usage
    crit: suspicious
    conf: 0.85
    attack: "T1016"
    any:
      - id: freegeoip-app
      - id: freegeoip-net
      - id: freegeoip-io
        # Country code field composite
  - id: country-code-field
    desc: Country code JSON field (geo
    crit: notable
    conf: 0.6
    attack: "T1016"
    any:
      - id: country-code-camel
      - id: country-code-snake
        # IP address field composite
  - id: ip-address-field
    desc: IP address JSON field (geo
    crit: notable
    conf: 0.5
    attack: "T1016"
    any:
      - id: ip-address-camel
      - id: micro-behaviors/os/network/interface::socket-ip-address-single
      - id: ip-json-field
        # Geo API composite (any one of these APIs)
  - id: geo-api
    desc: Geolocation API endpoint
    crit: notable
    conf: 0.7
    attack: "T1016"
    any:
      - id: db-ip-api
      - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
      - id: micro-behaviors/communications/http/ip-discovery::ip-api-com
      - id: ipapi-co
      - id: ipgeolocation-api
      - id: freegeoip-api
      - id: freegeoip-generic
      - id: ipify-api
        # Geo response field composite (any one of these fields)
  - id: geo-response-field
    desc: Geolocation response field
    crit: notable
    conf: 0.5
    attack: "T1016"
    any:
      - id: country-code-field
      - id: country-name
      - id: ip-address-field
      - id: city-field
      - id: region-field
  - id: victim-profiling
    desc: Victim geolocation profiling via IP
    crit: suspicious
    conf: 0.9
    attack: "T1016"
    all:
      - id: geo-api
      - id: geo-response-field
  - id: multimodal-ip-profiling
    desc: Multimodal IP profiling (server + browser side)
    crit: hostile
    all:
      - id: objectives/discovery/host/geo::victim-profiling
      - id: micro-behaviors/communications/download/curl::fetch-call
