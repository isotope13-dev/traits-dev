defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: api-db-ip
    desc: api.db-ip.com endpoint
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: api.db-ip.com
  - id: db-ip-v2
    desc: db-ip.com/v2 endpoint
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: db-ip.com/v2
  - id: ipapi-co
    desc: ipapi.co geolocation API
    crit: notable
    conf: 0.8
    attack: T1016
    if:
      type: text
      substr: ipapi.co
  - id: ipgeolocation-api
    desc: ipgeolocation.io API
    crit: suspicious
    conf: 0.85
    attack: T1016
    if:
      type: text
      substr: ipgeolocation.io
  - id: geoip-maxmind
    desc: geoip.maxmind.com endpoint
    crit: notable
    conf: 0.6
    attack: T1016
    if:
      type: text
      substr: geoip.maxmind.com
  - id: maxmind-geoip
    desc: maxmind.com/geoip endpoint
    crit: notable
    conf: 0.6
    attack: T1016
    if:
      type: text
      substr: maxmind.com/geoip
  - id: freegeoip-app
    desc: freegeoip.app domain
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: freegeoip.app
  - id: freegeoip-net
    desc: freegeoip.net domain
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: freegeoip.net
  - id: freegeoip-io
    desc: freegeoip.io domain
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: freegeoip.io
  - id: country-code-camel
    desc: countryCode field (camelCase)
    crit: component
    conf: 0.5
    attack: T1016
    if:
      type: text
      word: countryCode
  - id: country-code-snake
    desc: country_code field (snake_case)
    crit: component
    conf: 0.5
    attack: T1016
    if:
      type: text
      word: country_code
  - id: country-name
    desc: country_name field (geo profiling)
    crit: notable
    conf: 0.5
    attack: T1016
    if:
      type: text
      word: country_name
  - id: ip-address-camel
    desc: ipAddress field (camelCase)
    crit: notable
    conf: 0.4
    attack: T1016
    if:
      type: text
      word: ipAddress
  - id: ip-json-field
    desc: '"ip" JSON field'
    crit: notable
    conf: 0.4
    attack: T1016
    if:
      type: text
      exact: '"ip":'
  - id: city-field
    desc: City JSON field (geo profiling)
    crit: notable
    conf: 0.5
    attack: T1016
    if:
      type: text
      substr: '"city":'
  - id: region-field
    desc: Region JSON field (geo profiling)
    crit: notable
    conf: 0.5
    attack: T1016
    if:
      type: text
      substr: '"region":'
  - id: freegeoip-generic
    desc: freegeoip reference (generic)
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: freegeoip
composite_rules:
  - id: db-ip-api
    desc: db-ip.com geolocation API
    crit: suspicious
    conf: 0.85
    attack: T1016
    any:
      - id: api-db-ip
      - id: db-ip-v2
  - id: ipify-api-comp
    desc: ipify.org IP address API
    crit: notable
    conf: 0.8
    attack: T1016
    any:
      - id: objectives/discovery/host/geo::ipify-api
      - id: objectives/discovery/network/scan::ipify-org
  - id: maxmind-api
    desc: MaxMind GeoIP API
    crit: notable
    conf: 0.7
    attack: T1016
    any:
      - id: geoip-maxmind
      - id: maxmind-geoip
  - id: freegeoip-api
    desc: freegeoip geolocation API usage
    crit: suspicious
    conf: 0.85
    attack: T1016
    any:
      - id: freegeoip-app
      - id: freegeoip-net
      - id: freegeoip-io
  - id: country-code-field
    desc: Country code JSON field (geo
    crit: notable
    conf: 0.6
    attack: T1016
    any:
      - id: country-code-camel
      - id: country-code-snake
  - id: ip-address-field
    desc: IP address JSON field (geo
    crit: notable
    conf: 0.5
    attack: T1016
    any:
      - id: ip-address-camel
      - id: ip-json-field
  - id: geo-api
    desc: Geolocation API endpoint
    crit: notable
    conf: 0.7
    attack: T1016
    any:
      - id: db-ip-api
      - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
      - id: micro-behaviors/communications/http/ip-discovery::ip-api-com
      - id: ipapi-co
      - id: ipgeolocation-api
      - id: freegeoip-api
      - id: freegeoip-generic
      - id: ipify-api
  - id: geo-response-field
    desc: Geolocation response field
    crit: notable
    conf: 0.5
    attack: T1016
    any:
      - id: country-code-field
      - id: country-name
      - id: ip-address-field
      - id: city-field
      - id: region-field
  - id: victim-profiling
    desc: Victim geolocation profiling via IP
    crit: notable
    conf: 0.85
    attack: T1016
    all:
      - id: geo-api
      - id: geo-response-field
  - id: multimodal-ip-profiling
    desc: Multimodal IP profiling (server + browser side)
    crit: hostile
    all:
      - id: objectives/discovery/host/geo::victim-profiling
      - id: micro-behaviors/communications/http/download/curl::fetch-call
