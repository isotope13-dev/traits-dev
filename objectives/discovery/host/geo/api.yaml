defaults:
  platforms: [windows, unix]
  for: [python, javascript, powershell, pe, elf, rust]
traits:
  - id: api-db-ip
    desc: api.db-ip.com endpoint
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: api.db-ip.com
  - id: db-ip-v2
    desc: db-ip.com/v2 endpoint
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: db-ip.com/v2
  # A bare public geo-API host reference is a dual-use capability marker (weather
  # widgets, CDNs, VPNs showing your location, and privacy blocklists all name
  # these hosts). Kept notable, consistent with the maxmind/ipify/freegeoip-generic
  # siblings; the `victim-profiling` composite (endpoint + response-field parsing)
  # carries the actual host-profiling intent.
  - id: ipgeolocation-api
    desc: ipgeolocation.io API
    crit: notable
    conf: 0.85
    attack: T1016
    for: [python, javascript, powershell]
    if:
      type: text
      substr: ipgeolocation.io
  - id: geoip-maxmind
    desc: geoip.maxmind.com endpoint
    crit: notable
    conf: 0.6
    attack: T1016
    if:
      type: text
      substr: geoip.maxmind.com
  - id: maxmind-geoip
    desc: maxmind.com/geoip endpoint
    crit: notable
    conf: 0.6
    attack: T1016
    if:
      type: text
      substr: maxmind.com/geoip
  - id: freegeoip-app
    desc: freegeoip.app domain
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: freegeoip.app
    unless:
      - id: metadata/package/quality/
  - id: freegeoip-net
    desc: freegeoip.net domain
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: freegeoip.net
  - id: freegeoip-io
    desc: freegeoip.io domain
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: freegeoip.io
  # ip-address-camel / ip-json-field relocated to
  # micro-behaviors/communications/ip/parse (neutral IP-data field references);
  # a bare ipAddress/"ip": field is not geo profiling. Referenced cross-directory
  # by the ip-address-field composite below.
  - id: city-field
    desc: City JSON field (geo profiling)
    crit: component
    conf: 0.5
    attack: T1016
    if:
      type: text
      substr: '"city":'
  - id: region-field
    desc: Region JSON field (geo profiling)
    crit: component
    conf: 0.5
    attack: T1016
    if:
      type: text
      substr: '"region":'
  - id: query-field
    desc: query field (IP geolocation)
    crit: component
    conf: 0.6
    attack: T1016
    for: [rust]
    if:
      type: string_literal
      exact: query
  - id: city-literal
    desc: city field string literal
    crit: component
    conf: 0.55
    attack: T1016
    for: [rust]
    if:
      type: string_literal
      exact: city
  - id: country-literal
    desc: country field string literal
    crit: component
    conf: 0.55
    attack: T1016
    for: [rust]
    if:
      type: string_literal
      exact: country
  - id: regionname-literal
    desc: regionName field string literal
    crit: component
    conf: 0.65
    attack: T1016
    for: [rust]
    if:
      type: string_literal
      exact: regionName
  - id: freegeoip-generic
    desc: freegeoip reference (generic)
    crit: notable
    conf: 0.7
    attack: T1016
    if:
      type: text
      substr: freegeoip
composite_rules:
  - id: db-ip-api
    desc: db-ip.com geolocation API
    crit: notable
    conf: 0.85
    attack: T1016
    any:
      - id: api-db-ip
      - id: db-ip-v2
  - id: ipify-api-comp
    desc: ipify.org IP address API
    crit: notable
    conf: 0.8
    attack: T1016
    any:
      - id: objectives/discovery/host/geo::ipify-api
      - id: micro-behaviors/communications/http/ip-discovery::ipify-api
  - id: maxmind-api
    desc: MaxMind GeoIP API
    crit: notable
    conf: 0.7
    attack: T1016
    any:
      - id: geoip-maxmind
      - id: maxmind-geoip
      - id: micro-behaviors/communications/http/ip-discovery::maxmind-locate-my-ip
  - id: freegeoip-api
    desc: freegeoip geolocation API usage
    crit: suspicious
    conf: 0.85
    attack: T1016
    any:
      - id: freegeoip-app
      - id: freegeoip-net
      - id: freegeoip-io
  - id: country-code-field
    desc: Country code geolocation field
    crit: component
    conf: 0.6
    attack: T1016
    any:
      - id: micro-behaviors/data/serialize/json::country-code-camel
      - id: micro-behaviors/data/serialize/json::country-code-snake
  - id: ip-address-field
    desc: IP address data field
    crit: component
    conf: 0.5
    attack: T1016
    any:
      - id: micro-behaviors/communications/ip/parse::ip-address-camel
      - id: micro-behaviors/communications/ip/parse::ip-json-field
  - id: geo-api
    desc: Geolocation API endpoint
    crit: notable
    conf: 0.7
    attack: T1016
    any:
      - id: db-ip-api
      - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
      - id: micro-behaviors/communications/http/ip-discovery::ip-api-com
      - id: micro-behaviors/communications/http/ip-discovery::ipapi-co
      - id: ipgeolocation-api
      - id: freegeoip-api
      - id: freegeoip-generic
      - id: ipify-api
  - id: geo-response-field
    desc: Geolocation response field markers
    crit: notable
    conf: 0.5
    attack: T1016
    all:
      - id: geo-api
    any:
      - id: country-code-field
      - id: micro-behaviors/data/serialize/json::country-name
      - id: ip-address-field
      - id: city-field
      - id: region-field
  - id: ip-api-response-fields
    desc: ip-api response field markers
    crit: notable
    conf: 0.82
    attack: T1016
    for: [rust]
    all:
      - id: query-field
      - id: city-literal
      - id: country-literal
      - id: regionname-literal
  - id: victim-profiling
    desc: IP geolocation lookup via API
    crit: notable
    conf: 0.85
    attack: T1016
    all:
      - id: geo-api
    any:
      - id: geo-response-field
      - id: ip-api-response-fields
  - id: multimodal-ip-profiling
    desc: Multimodal IP profiling (server + browser side)
    crit: hostile
    all:
      - id: objectives/discovery/host/geo::victim-profiling
      - id: micro-behaviors/communications/http/download/curl::fetch-call
