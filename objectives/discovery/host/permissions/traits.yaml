defaults:
  attack: T1069
  platforms:
    - unix
    - android
    - ios
traits:
  - id: capsh
    desc: Linux capability shell
    crit: notable
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      substr: capsh
  - id: cap-get-proc
    desc: Get process capabilities
    crit: notable
    conf: 0.75
    for:
      - elf
    if:
      type: symbol
      exact: cap_get_proc
  - id: cap-set-proc
    desc: Set process capabilities
    crit: notable
    conf: 0.75
    for:
      - elf
    if:
      type: symbol
      exact: cap_set_proc
  - id: sudo-l
    desc: Sudo permission listing
    crit: suspicious
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      regex: sudo\s+-l
composite_rules:
  - id: cap-api
    desc: Linux capability API usage
    crit: notable
    conf: 0.7
    for:
      - elf
    any:
      - id: cap-get-proc
      - id: cap-set-proc
      - id: micro-behaviors/os/security/capabilities::cap-get-file
      - id: micro-behaviors/os/security/capabilities::cap-set-file
  - id: linux-caps-via-capsh
    desc: Linux capabilities via capsh
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    all:
      - id: capsh
      - id: micro-behaviors/fs/proc/info::process-self-status
  - id: linux-caps-via-api
    desc: Linux capabilities via API
    crit: suspicious
    conf: 0.85
    for:
      - elf
    all:
      - id: cap-get-proc
      - id: cap-set-proc
    downgrade:
      any:
        - id: micro-behaviors/communications/icmp/ping::ping
  - id: linux-caps-enum
    desc: Linux capabilities enumeration
    crit: suspicious
    conf: 0.9
    mbc: B0046
    for:
      - elf
      - shell
    any:
      - id: linux-caps-via-capsh
      - id: linux-caps-via-api
    downgrade:
      any:
        - id: micro-behaviors/communications/icmp/ping::ping
  - id: uid-gid-gathering
    desc: User/group ID gathering
    crit: notable
    conf: 0.7
    for:
      - elf
      - macho
    needs: 3
    any:
      - id: micro-behaviors/os/privilege/query::getgid
      - id: micro-behaviors/os/privilege/query::getegid
      - id: micro-behaviors/os/privilege/query::geteuid
      - id: micro-behaviors/os/group/lookup::getgroups
    unless:
      # Daemons and privilege-dropping binaries routinely call getuid/getgid
      # family — this is security best practice, not discovery.
      - id: metadata/signed/platform::apple
      - id: micro-behaviors/process/identity/setuid::setuid-dup
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::video-lib-marker
        - id: micro-behaviors/dylib/library::graphics-lib-marker
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: micro-behaviors/dylib/library::x11-ipc-lib-marker
        - id: metadata/signed/developer
