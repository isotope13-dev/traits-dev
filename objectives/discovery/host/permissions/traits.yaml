defaults:
  attack: T1069
  platforms:
    - unix
    - android
    - ios
traits:
  - id: capsh
    desc: Linux capability shell
    crit: notable
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      substr: capsh
  - id: sudo-l
    desc: Sudo permission listing
    crit: suspicious
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      regex: sudo\s+-l
composite_rules:
  - id: linux-caps-via-capsh
    desc: Linux capabilities via capsh
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    all:
      - id: capsh
      - id: micro-behaviors/fs/proc/info/path::process-self-status
  - id: linux-caps-enum
    desc: Linux capability inspection
    crit: notable
    conf: 0.85
    mbc: B0046
    for:
      - elf
      - shell
    any:
      - id: linux-caps-via-capsh
    downgrade:
      any:
        - id: micro-behaviors/communications/icmp/ping::ping
  - id: uid-gid-gathering
    desc: User/group ID gathering
    crit: notable
    conf: 0.7
    for:
      - elf
      - macho
    needs: 3
    any:
      - id: micro-behaviors/os/privilege/query::getgid
      - id: micro-behaviors/os/privilege/query::getegid
      - id: micro-behaviors/os/privilege/query::geteuid
      - id: micro-behaviors/os/group/lookup::getgroups
    unless:
      # Daemons and privilege-dropping binaries routinely call getuid/getgid
      # family — this is security best practice, not discovery.
      - id: metadata/signed/platform::apple
      - id: micro-behaviors/process/identity/setuid/
      - id: well-known/app/drivers/
    downgrade:
      any:
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
        - id: metadata/signed/developer
