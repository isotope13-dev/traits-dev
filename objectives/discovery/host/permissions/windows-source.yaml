defaults:
  attack: T1069
  mbc: B0046
  platforms: [windows, unix]
  for: [rust]
traits:
  - id: whoami-string
    desc: whoami command string literal
    crit: component
    conf: 0.72
    if:
      type: text
      word: whoami
  - id: priv-arg
    desc: /priv command argument
    crit: component
    conf: 0.8
    if:
      type: text
      substr: /priv
  - id: integrity-low-label
    desc: Low Integrity status label
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Normal User *b_(Low Integrity)_b*
  - id: integrity-medium-label
    desc: Medium Integrity status label
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Administrator *b_(Medium Integrity)_b*
  - id: integrity-high-label
    desc: High Integrity status label
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Administrator *b_(High Integrity)_b*
  - id: integrity-system-label
    desc: SYSTEM integrity status label
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "*b_ NT AUHTORITY/SYSTEM _b*"
composite_rules:
  - id: whoami-priv-enum
    desc: whoami privilege enumeration
    crit: notable
    conf: 0.92
    all:
      - id: whoami-string
      - id: priv-arg
  - id: windows-integrity-level-mapping
    desc: Windows integrity level mapping
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: integrity-low-label
      - id: integrity-medium-label
      - id: integrity-high-label
      - id: integrity-system-label
  - id: windows-privilege-surface-enum
    desc: Windows privilege surface enumeration
    crit: suspicious
    conf: 0.96
    all:
      - id: whoami-priv-enum
      - id: windows-integrity-level-mapping
