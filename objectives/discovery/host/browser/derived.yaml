defaults:
  platforms:
    - unix
    - windows
    - macos
  crit: notable
  conf: 1.0
  for: [scripts, binaries]
traits:
  - id: inline__search-engine-id__any_1
    desc: Derived string condition
    if:
      type: string_value
      exact: SearchProvider
  - id: inline__search-engine-id__any_2
    desc: Derived string condition
    if:
      type: string_value
      word: SearchEngine
    not:
      - substr: EnableLUA
  - id: inline__search-engine-id__any_3
    desc: Derived string condition
    if:
      type: string_value
      regex: '[dD]efaultSearch(Engine|Provider|URL)'
  - id: inline__search-engine-id__any_3_1
    desc: Derived string condition
    if:
      type: string_value
      regex: '[dD]efaultSearch(Keyword|Homepage|HomePage)'
  - id: inline__search-engine-id__any_4
    desc: Derived string condition
    if:
      type: string_value
      regex: searchProvider
  - id: inline__search-engine-id__any_5
    desc: Derived string condition
    if:
      type: string_value
      regex: searchEngine
