# Browser-name keyword markers. A bare browser name ("Firefox", "Safari", an
# "Edge/" path, etc.) is a neutral string that appears in user-agent strings,
# automation tooling, comments, and config — not host-discovery intent on its
# own (TAXONOMY §142). These are building-block fragments; the discovery
# objective is the *enumeration* of two or more, composed in
# objectives/discovery/host/browser (browser-names) via a directory ref with
# needs: 2. Relocated here from that objectives directory, where bare name
# atoms at notable surfaced standalone on any browser-aware code.
defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: component
  conf: 0.4
traits:
  - id: browser-doc-example-index
    desc: Browser names in dataframe docs
    conf: 0.85
    if:
      type: text
      regex: "['\"]Firefox['\"], ['\"]Chrome['\"], ['\"]Safari['\"], ['\"]IE10['\"], ['\"]Konqueror['\"]"
  - id: edge-name-path
    desc: Edge browser name (path)
    if:
      type: text
      regex: Edge[/\\]
    unless:
      - id: metadata/library/data::overwolf-vendor-string
    not:
      - substr: Edge\
      - substr: Microsoft\Edge\
      - substr: \BraveSoftware\
  - id: edge-name-ms
    desc: References the MicrosoftEdge browser name
    if:
      type: text
      substr: MicrosoftEdge
  - id: edge-name-other
    desc: Edge browser name (Browser/Chromium)
    if:
      type: text
      regex: Edge\s+(Browser|Chromium)
  - id: opera-name-path
    desc: Opera browser name (path)
    if:
      type: text
      regex: Opera[/\\]
    not:
      - substr: \BraveSoftware\
  - id: opera-name-other
    desc: Opera browser name (GX/Stable/Browser)
    if:
      type: text
      regex: Opera\s+(GX|Stable|Browser)
    unless:
      - id: metadata/library/data::overwolf-vendor-string
  - id: brave-name
    desc: References the Brave browser name
    if:
      type: text
      regex: '\bBrave (Browser|Software)\b|BraveSoftware|brave\.exe'
    downgrade:
      any:
        - id: metadata/binary/resource/
  - id: yandex-name
    desc: References the Yandex browser name
    if:
      type: text
      substr: Yandex
    not:
      - substr: cbYandex
