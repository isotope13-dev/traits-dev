defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1087

composite_rules:
- id: extension-profile-id-with-image-upload
  desc: Extension profiles user before image upload
  crit: suspicious
  conf: 0.93
  ref: sha256:4fcdbf8912196b7e1541615dc3c51b0715aa125d1a223387055231551d255e70
  scope: archive
  all:
  - id: micro-behaviors/os/security/webextension::chrome-identity-profile-info
  - id: metadata/permission/manifest::permission-identity-email
  - id: objectives/exfiltration/http/upload::image-formdata-with-user-id
  any:
  - id: micro-behaviors/os/security/webextension::chrome-identity-api
  - id: micro-behaviors/communications/http/oauth::oauth-protocol-reference
