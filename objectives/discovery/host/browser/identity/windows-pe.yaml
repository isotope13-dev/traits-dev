defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: browser-version-audit-opera
    desc: Browser version audit marker
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: GetOperaVersion - Begin

  - id: browser-version-audit-msie
    desc: Browser version audit marker
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: GetMSIEVersion - Begin

  - id: browser-app-path-iexplore
    desc: Browser App Paths marker
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: App Paths\IEXPLORE.EXE

  - id: browser-selection-ui-resource
    desc: Browser selection UI resource labels
    crit: component
    conf: 0.7
    if:
      type: text
      substr: IDS_ONECLICK_CHROME_NAME

  - id: avg-toolbar-silent-bundle-command
    desc: AVG toolbar silent bundle
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '/SILENT /DISTRIBUTIONSOURCE='

  - id: mypcbackup-silent-bundle-command
    desc: MyPCBackup silent bundle command
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '/S /product=mypcbackup'

  - id: avg-secure-search-homepage-offer
    desc: AVG Secure Search homepage offer
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: 'set AVG Secure Search as my homepage'

  - id: avg-toolbar-bho-clsid
    desc: AVG toolbar BHO CLSID
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '{95B7759C-8C7F-4BF1-B163-73684A933233}'

  - id: slimware-installer-tracking-url
    desc: SlimWare installer tracking URL
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: http://stats.slimwareutilities.com/api/flow/action

  - id: littleinstaller-pdb-path
    desc: LittleInstaller PDB path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: '\LittleInstaller.pdb'

composite_rules:
  - id: browser-process-roster
    desc: Multi-browser process target roster
    crit: notable
    conf: 0.9
    needs: 3
    any:
      - id: micro-behaviors/process/enumerate/apps::chrome-process-name
      - id: micro-behaviors/process/enumerate/apps::browser-apps-iexplore
      - id: micro-behaviors/process/enumerate/apps::browser-apps-opera-brave
    unless:
      - id: browser-selection-ui-resource
      - id: well-known/tool/development/visual-studio/
      - id: objectives/discovery/host/system/
      - id: metadata/signed/developer::iobit-co.
  - id: browser-process-targeting
    desc: Browser process targeting via snapshot
    crit: notable
    conf: 0.94
    all:
      - id: browser-process-roster
    unless:
      - id: well-known/app/installer::idman-installer
      - id: micro-behaviors/process/enumerate/snapshot/
      - id: browser-version-audit-opera
      - id: browser-version-audit-msie
      - id: browser-app-path-iexplore
      - id: browser-selection-ui-resource
      - id: metadata/package/manifest/vendor::bitdefender-ctc-module
  - id: bitdefender-browser-targeting-marker
    desc: Bitdefender browser telemetry marker
    crit: baseline
    conf: 0.9
    any:
      - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
      - id: metadata/signed/certificate/identity::bitdefender-brand-text
  - id: slimware-bundleware-browser-hijack
    desc: SlimWare bundleware browser hijack
    crit: hostile
    conf: 0.98
    all:
      - id: avg-toolbar-silent-bundle-command
      - id: avg-secure-search-homepage-offer
      - id: avg-toolbar-bho-clsid
    any:
      - id: mypcbackup-silent-bundle-command
      - id: slimware-installer-tracking-url
      - id: littleinstaller-pdb-path
