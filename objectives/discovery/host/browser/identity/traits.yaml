defaults:
  platforms:
  - unix
  - windows
  for: [scripts, pe, elf, macho]
traits:
- id: chrome-install-registry
  desc: References Chrome installation registration data
  crit: component
  conf: 0.92
  attack: T1518
  platforms: [windows]
  for: [pe, dll]
  if:
    type: text
    regex: 'Google Chrome( Beta)?|StartMenuInternet\\Google Chrome'
- id: edge-install-registry
  desc: References Edge installation registration data
  crit: component
  conf: 0.92
  attack: T1518
  platforms: [windows]
  for: [pe, dll]
  if:
    type: text
    regex: 'Microsoft Edge|StartMenuInternet\\Microsoft Edge'
- id: brave-install-registry
  desc: Brave install registry targeting
  crit: component
  conf: 0.92
  attack: T1518
  platforms: [windows]
  for: [pe, dll]
  if:
    type: text
    regex: 'BraveSoftware Brave-Browser|StartMenuInternet\\Brave'
- id: avast-browser-install-registry
  desc: References Avast Secure Browser registration
  crit: component
  conf: 0.92
  attack: T1518
  platforms: [windows]
  for: [pe, dll]
  if:
    type: text
    regex: 'Avast Secure Browser|StartMenuInternet\\Avast Secure Browser'
- id: history-file-path
  desc: Browser history file path
  crit: notable
  conf: 0.5
  attack: T1217
  if:
    type: text
    regex: (User Data|Default|Profile)[/\\]History$
- id: history-file-db
  desc: Browser history database reference
  crit: notable
  conf: 0.5
  attack: T1217
  if:
    type: text
    regex: '[/\\]History\.db\b|history\.sqlite\b'
- id: places-sqlite
  desc: References Firefox places.sqlite database
  crit: component
  conf: 0.7
  attack: T1217
  if:
    type: text
    substr: places.sqlite
- id: bookmarks-word
  desc: Browser bookmarks API member reference
  crit: component
  conf: 0.4
  attack: T1217
  if:
    type: text
    regex: '\b(chrome|browser)\.bookmarks\.[A-Za-z_]'
  downgrade:
    any:
    - id: micro-behaviors/process/create/shell/hg/
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: bookmarks-plist
  desc: Bookmarks.plist file
  crit: notable
  conf: 0.6
  attack: T1217
  if:
    type: text
    substr: Bookmarks.plist
- id: extensions-hash-path
  desc: Extensions path with hash
  crit: notable
  conf: 0.6
  attack: T1217
  if:
    type: text
    regex: /Extensions/[a-z]{32}
- id: chrome-extensions-path
  desc: Chrome Extensions path
  crit: notable
  conf: 0.6
  attack: T1217
  if:
    type: text
    regex: /Google/Chrome/.{0,50}Extensions
- id: browser-support-extensions
  desc: BrowserSupport Extensions path
  crit: notable
  conf: 0.6
  attack: T1217
  if:
    type: text
    substr: /BrowserSupport/Extensions
- id: safari-plist
  desc: Safari preferences plist file
  crit: notable
  conf: 0.7
  attack: T1217
  if:
    type: text
    substr: com.apple.Safari.plist
- id: safari-history-db
  desc: Safari history database
  crit: notable
  conf: 0.7
  attack: T1217
  if:
    type: text
    regex: 'Safari[/\\].{0,80}History'
- id: opera-stable
  desc: Opera Stable profile data path
  crit: notable
  conf: 0.6
  attack: T1217
  if:
    type: text
    regex: '(?i)Opera[ /\\]+Stable[ /\\]+(History|Cookies|Login Data)'
  unless:
  - id: metadata/library/data::overwolf-vendor-string
- id: chrome-history-cond-0--inline-21033
  desc: Chrome basename marker
  crit: component
  conf: 0.85
  for: [javascript, python, pe]
  if:
    type: path
    basename: true
    substr: chrome
  count_max: 1021034
- id: chrome-history-cond-1--inline-21034
  desc: Chromium basename marker
  crit: component
  conf: 0.85
  for: [javascript, python, pe]
  if:
    type: path
    basename: true
    substr: chromium
  count_max: 1021035
- id: firefox-history-cond-0--inline-21036
  desc: Firefox basename marker
  crit: component
  conf: 0.85
  for: [javascript, python, pe]
  if:
    type: path
    basename: true
    substr: firefox
  count_max: 1021037
- id: safari-history-cond-0--inline-21038
  desc: Safari basename marker
  crit: component
  conf: 0.85
  for: [javascript, python, pe]
  if:
    type: path
    basename: true
    substr: Safari
  count_max: 1021039
- id: edge-history-cond-0--inline-21040
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [javascript, python, pe]
  if:
    type: path
    basename: true
    substr: edge
  count_max: 1021041
- id: edge-history-cond-1--inline-21041
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [javascript, python, pe]
  if:
    type: path
    basename: true
    substr: msedge
  count_max: 1021042
- id: bookmarks-cond-0--inline-21043
  desc: Brave basename marker
  crit: component
  conf: 0.8
  for: [javascript, python, pe]
  if:
    type: path
    basename: true
    substr: brave
  count_max: 1021048
- id: chromium-profile-subdirectory-reference
  desc: Chromium profile subdirectory reference
  crit: notable
  conf: 0.85
  attack: T1217
  if:
    type: text
    regex: Profile [0-9].{0,50}Local Extension|Default.{0,50}Profile [0-9]
composite_rules:
- id: history-file
  desc: History file reference
  crit: notable
  conf: 0.5
  attack: T1217
  any:
  - id: history-file-path
  - id: history-file-db
- id: edge-name
  desc: References the Microsoft Edge browser name
  crit: component
  conf: 0.4
  attack: T1217
  any:
  - id: objectives/discovery/host/browser/keywords::edge-name-path
  - id: objectives/discovery/host/browser/keywords::edge-name-ms
  - id: objectives/discovery/host/browser/keywords::edge-name-other
- id: opera-name
  desc: Opera browser name
  crit: component
  conf: 0.4
  attack: T1217
  any:
  - id: objectives/discovery/host/browser/keywords::opera-name-path
  - id: objectives/discovery/host/browser/keywords::opera-name-other
- id: browser-names
  desc: Multiple browser name markers
  # Browser engines and UI libraries routinely mention several browsers while
  # testing feature support.  Host discovery requires a data-access composite;
  # keep this multi-name atom as a reusable component.
  crit: component
  conf: 0.5
  attack: T1217
  unless:
  - id: metadata/package/testing/
  - id: objectives/discovery/host/browser/keywords::browser-doc-example-index
  - id: well-known/lib/greensock::greensock-tweenmax-suite-banner
  # 2+ distinct browser-name keywords = enumeration intent. The directory ref
  # counts distinct matched member atoms toward needs:, so this fires only when
  # two or more different browser names appear (a lone name is benign).
  needs: 2
  any:
  - id: metadata/file/string/identity::chrome-browser-name-literal
  - id: metadata/file/string/identity::firefox-browser-name-literal
  - id: metadata/file/string/identity::safari-browser-name-literal
- id: alternate-browser-names
  desc: References at least two alternative browser names
  crit: component
  conf: 0.5
  attack: T1217
  needs: 2
  any:
  - id: objectives/discovery/host/browser/keywords::brave-name
  - id: objectives/discovery/host/browser/keywords::yandex-name
- id: browser-data-files
  desc: Browser data file references
  crit: notable
  conf: 0.7
  attack: T1217
  any:
  - id: history-file
  - id: micro-behaviors/fs/path/sensitive/browser::browser-cookies-file-path
  - id: micro-behaviors/fs/path/sensitive/browser::login-data
  - id: places-sqlite
- id: chrome-history
  desc: Chrome browser data reference
  crit: notable
  conf: 0.85
  attack: T1217
  all:
  - id: metadata/file/string/identity::chrome-browser-name-literal
  any:
  - id: history-file
  - id: micro-behaviors/fs/path/sensitive/browser::browser-cookies-file-path
  - id: micro-behaviors/fs/path/sensitive/browser::login-data
  downgrade:
    any:
    - id: chrome-history-cond-0--inline-21033
    - id: chrome-history-cond-1--inline-21034
- id: firefox-history
  desc: Firefox browser data reference
  crit: notable
  conf: 0.85
  attack: T1217
  any:
  - id: places-sqlite
  - id: objectives/credential-access/browser/chromium::chromium-cookie-sql
  - id: objectives/credential-access/browser/firefox::logins
  downgrade:
    any:
    - id: firefox-history-cond-0--inline-21036
- id: safari-history
  desc: Safari browser data reference
  crit: suspicious
  conf: 0.85
  attack: T1217
  all:
  - id: metadata/file/string/identity::safari-browser-name-literal
  any:
  - id: safari-history-db
  - id: safari-plist
  - id: micro-behaviors/fs/path/sensitive/browser::browser-cookies-file-path
  downgrade:
    any:
    - id: safari-history-cond-0--inline-21038
    - id: objectives/discovery/host/browser/identity/
- id: edge-history
  desc: References Microsoft Edge and a browser data path
  crit: notable
  conf: 0.85
  attack: T1217
  all:
  - id: edge-name
  any:
  - id: history-file
  - id: micro-behaviors/fs/path/sensitive/browser::browser-cookies-file-path
  downgrade:
    any:
    - id: edge-history-cond-0--inline-21040
    - id: edge-history-cond-1--inline-21041
- id: bookmarks
  desc: Browser bookmarks access
  crit: notable
  conf: 0.8
  attack: T1217
  any:
  - id: bookmarks-word
  - id: bookmarks-plist
  downgrade:
    any:
    - id: chrome-history-cond-0--inline-21033
    - id: chrome-history-cond-1--inline-21034
    - id: firefox-history-cond-0--inline-21036
    - id: safari-history-cond-0--inline-21038
    - id: bookmarks-cond-0--inline-21043
    - id: micro-behaviors/process/create/shell/hg/
- id: local-storage
  desc: Browser local storage access
  crit: notable
  conf: 0.8
  attack: T1217
  any:
  - id: micro-behaviors/fs/path/sensitive/browser::local-storage-ref
  - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
- id: extensions
  desc: Browser extensions access
  crit: suspicious
  conf: 0.8
  attack: T1217
  # A bare chrome-extension:// scheme reference (now
  # micro-behaviors/communications/url/scheme::chrome-extension-scheme) is not
  # enumeration — enumeration reads the extensions directory / on-disk paths.
  any:
  - id: extensions-hash-path
  - id: chrome-extensions-path
  - id: browser-support-extensions
  downgrade:
    any:
    - id: chrome-history-cond-0--inline-21033
    - id: chrome-history-cond-1--inline-21034
    - id: firefox-history-cond-0--inline-21036
    - id: bookmarks-cond-0--inline-21043
- id: opera
  desc: Opera browser data
  crit: notable
  conf: 0.85
  attack: T1217
  all:
  - id: opera-name
  - id: opera-stable
- id: browser-settings-hijack
  desc: Browser search engine or homepage hijacking
  crit: suspicious
  conf: 0.85
  attack: T1217
  all:
  - id: search-engine-id
  any:
  - id: safari-settings-write
  - id: browser-settings-write
  downgrade:
    any:
    - id: safari-history-cond-0--inline-21038
    - id: chrome-history-cond-0--inline-21033
    - id: firefox-history-cond-0--inline-21036
  unless:
  - id: well-known/lib/electron/
- id: multi-browser-enum
  desc: Multiple browser data access
  crit: notable
  conf: 0.9
  attack: T1217
  mbc: B0046
  all:
  - id: browser-names
  - id: browser-data-files
- id: multi-browser-profile-targeting
  desc: Targets profile data for 3+ browsers
  crit: notable
  conf: 0.9
  attack: T1555.003
  unless:
  - id: well-known/app/mozilla::firefox-chrome-migration-utils-module
  - id: well-known/app/mozilla::firefox-chrome-profile-migrator-module
  all:
  - id: browser-data-files
  # 3+ distinct browser-name keywords (directory ref counts distinct member
  # matches toward needs:).
  needs: 3
  any:
  - id: metadata/file/string/identity::chrome-browser-name-literal
  - id: metadata/file/string/identity::firefox-browser-name-literal
  - id: metadata/file/string/identity::safari-browser-name-literal
- id: windows-browser-install-locator
  desc: Locates installed Chromium-family browsers
  crit: notable
  conf: 0.95
  attack: T1518
  platforms: [windows]
  for: [pe, dll]
  needs: 3
  any:
  - id: chrome-install-registry
  - id: edge-install-registry
  - id: brave-install-registry
  - id: avast-browser-install-registry
- id: safari-settings-write
  desc: Safari settings file write
  crit: component
  conf: 0.8
  all:
  - id: safari-plist
  any:
  - id: micro-behaviors/fs/file/write/direct::write
  - id: micro-behaviors/fs/watch/fswatch::fseventstream
- id: browser-settings-write
  desc: Browser settings file write
  crit: component
  conf: 0.8
  all:
  - id: browser-data-files
  any:
  - id: micro-behaviors/fs/file/write/direct::write
  - id: micro-behaviors/fs/watch/fswatch::fseventstream
- id: search-engine-id
  desc: Browser search engine identifier reference
  crit: notable
  conf: 0.7
  attack: T1217
  not:
  - substr: web_search
  - substr: WebSearch
  - SearchProviderSearchGuide
  - defaultSearchBase
  - DefaultSearchBase
  any:
  - id: objectives/discovery/host/browser/identity::inline__search-engine-id__any_1
  - id: objectives/discovery/host/browser/identity::inline__search-engine-id__any_2
  - id: objectives/discovery/host/browser/identity::inline__search-engine-id__any_3
  - id: objectives/discovery/host/browser/identity::inline__search-engine-id__any_3_1
  - id: objectives/discovery/host/browser/identity::inline__search-engine-id__any_4
  - id: objectives/discovery/host/browser/identity::inline__search-engine-id__any_5
