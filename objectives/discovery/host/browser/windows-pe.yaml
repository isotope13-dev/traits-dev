defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: browser-version-audit-opera
    desc: Browser version audit context
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: GetOperaVersion - Begin

  - id: browser-version-audit-msie
    desc: Browser version audit context
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: GetMSIEVersion - Begin

  - id: browser-app-path-iexplore
    desc: Browser App Paths context
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: App Paths\IEXPLORE.EXE

composite_rules:
  - id: browser-process-roster
    desc: Multi-browser process target roster
    crit: notable
    conf: 0.9
    needs: 3
    any:
      - id: micro-behaviors/process/enumerate/apps::browser-apps-chrome-firefox
      - id: micro-behaviors/process/enumerate/apps::browser-apps-iexplore
      - id: micro-behaviors/process/enumerate/apps::browser-apps-opera-brave
  - id: browser-process-targeting
    desc: Browser process targeting via snapshot
    crit: suspicious
    conf: 0.94
    all:
      - id: browser-process-roster
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
    unless:
      - id: browser-version-audit-opera
      - id: browser-version-audit-msie
      - id: browser-app-path-iexplore
      - id: metadata/package::bitdefender-ctc-module
    downgrade:
      any:
        - id: metadata/package::bitdefender-ecnet-telemetry
        - id: metadata/signed/certificate::bitdefender-brand-text
