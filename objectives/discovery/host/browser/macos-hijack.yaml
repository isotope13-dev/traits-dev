defaults:
  platforms: [macos]
  for: [macho, objc, swift, shell, applescript]
  attack: T1217
traits:
  - id: chrome-preferences-file
    desc: Chrome Preferences settings file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: Google/Chrome/.{0,80}/Preferences\b
  - id: firefox-prefs-file
    desc: Firefox prefs.js settings file
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: Firefox/Profiles/.{0,120}/prefs\.js\b|[/\\]prefs\.js\b
  - id: safari-webservices-settings
    desc: Safari preferred web services key
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: NSPreferredWebServices
  - id: safari-defaults-read-plist
    desc: Safari defaults plist read
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: defaults read com.apple.safari
  - id: safari-defaults-read-webservices
    desc: Safari global web services read
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: defaults read -g NSPreferredWebServices
  - id: browser-homepage-key
    desc: Browser homepage settings key
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: browser\.startup\.homepage|HomePage|Homepage(Location)?|kHomePage
  - id: default-search-provider-key
    desc: DefaultSearchProvider browser key
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: DefaultSearchProvider(Name|Enabled|SearchURL)
  - id: default-search-engine-name
    desc: browser.search.defaultenginename key
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: browser.search.defaultenginename
  - id: browser-startup-urls-key
    desc: Browser startup URL settings key
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: StartupURLs|RestoreOnStartupURLs|browser\.startup\.page
  - id: sudo-user-defaults-read
    desc: Reads browser settings as user
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: sudo\s+-u\s+\S+\s+defaults\s+read
  - id: browser-settings-log
    desc: Browser hijack activity log path
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: Desktop/Application.log
composite_rules:
  - id: browser-settings-files
    desc: Browser settings files across major browsers
    crit: notable
    conf: 0.88
    needs: 2
    any:
      - id: chrome-preferences-file
      - id: firefox-prefs-file
      - id: objectives/discovery/host/browser::safari-plist
      - id: safari-webservices-settings
  - id: browser-settings-keys
    desc: Browser homepage and search settings keys
    crit: notable
    conf: 0.88
    needs: 2
    any:
      - id: browser-homepage-key
      - id: default-search-provider-key
      - id: default-search-engine-name
      - id: objectives/discovery/host/browser::search-engine-id
      - id: safari-webservices-settings
      - id: browser-startup-urls-key
  - id: macos-browser-settings-hijack
    desc: macOS browser settings hijack indicators
    crit: suspicious
    conf: 0.92
    all:
      - id: browser-settings-files
      - id: browser-settings-keys
    any:
      - id: safari-defaults-read-plist
      - id: safari-defaults-read-webservices
      - id: sudo-user-defaults-read
      - id: browser-settings-log
      - id: objectives/discovery/host/browser::browser-names
