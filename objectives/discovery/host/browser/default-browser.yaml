defaults:
  platforms: [windows]
  for: [pe]
  attack: T1518

traits:
  - id: default-browser-registry-probe-bin
    desc: Default-browser HKCR shell open command probe
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'http\\shell\\open\\command'
      section: rdata
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer

  - id: niche-browser-amigo
    desc: amigo.exe niche browser target
    crit: component
    conf: 0.95
    if:
      type: text
      word: amigo.exe

  - id: niche-browser-amaya
    desc: amaya.exe niche browser target
    crit: component
    conf: 0.95
    if:
      type: text
      word: amaya.exe

  - id: niche-browser-arora
    desc: arora.exe niche browser target
    crit: component
    conf: 0.95
    if:
      type: text
      word: arora.exe

  - id: niche-browser-avant
    desc: avant.exe niche browser target
    crit: component
    conf: 0.95
    if:
      type: text
      word: avant.exe

  - id: niche-browser-xchrome
    desc: xchrome.exe niche browser target
    crit: component
    conf: 0.95
    if:
      type: text
      word: xchrome.exe

composite_rules:
  - id: niche-russian-banker-browser-roster
    desc: Niche Russian banker browser target roster
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: niche-browser-amigo
      - id: niche-browser-amaya
      - id: niche-browser-arora
      - id: niche-browser-avant
      - id: niche-browser-xchrome

  - id: russian-banker-pattern
    desc: Russian banker browser-hijack pattern
    crit: hostile
    conf: 0.93
    all:
      - id: niche-russian-banker-browser-roster
      - id: default-browser-registry-probe-bin
      - id: objectives/evasion/self-delete/file/batch::batch-ping-delay-delete
    any:
      - id: micro-behaviors/communications/http/get::http-send-request
      - id: micro-behaviors/communications/http/get::internet-connect
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
