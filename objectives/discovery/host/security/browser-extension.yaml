# Browser extensions that inspect the installed add-on set specifically to
# identify security or privacy tooling. Generic management API use remains a
# neutral browser-extension capability; the purpose-specific action name is
# what establishes security-tool discovery here.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.94

traits:
  - id: identify-installed-ad-blockers
    desc: Identifies installed ad-blocking extensions
    if:
      type: literal
      kind: string
      exact: getAdblockingAddons
