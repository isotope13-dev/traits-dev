defaults:
  platforms:
    - windows
  attack: T1518.001
traits:
  - id: antivirusproduct-query
    desc: WMI antivirus enumeration
    crit: suspicious
    conf: 0.93
    for:
      - vbs
    if:
      type: string_literal
      regex: (?i)AntiVirusProduct
  - id: wql-antivirusproduct-query-pe
    desc: Embedded WQL AntiVirusProduct query
    crit: suspicious
    conf: 0.95
    for: [pe]
    if:
      type: text
      regex: 'SELECT\s+\*\s+FROM\s+AntiVirusProduct'
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/binary/vendor::is-microsoft-named
        - id: well-known/app/crayens::crayens-installer
        - id: well-known/app/crayens::crayens-product-versioninfo
        - id: metadata/signed/leaf::crayens
  - id: securitycenter2-namespace-pe
    desc: Embedded ROOT\SecurityCenter2 namespace
    crit: notable
    conf: 0.9
    for: [pe]
    if:
      type: text
      regex: 'ROOT\\SecurityCenter2?'
composite_rules:
  - id: wmi-av-detection
    desc: WMI-based antivirus detection
    crit: notable
    conf: 0.9
    for:
      - powershell
      - batch
    all:
      - id: micro-behaviors/os/wmi/query::query-antivirus
    any:
      - id: micro-behaviors/os/wmi/query::wmi-object-cmdlet
      - id: micro-behaviors/os/wmi/query::cim-instance-cmdlet
      - id: micro-behaviors/os/wmi/query::query-security-center
  - id: pe-wmi-av-enumeration
    desc: PE binary enumerates AV via WMI
    crit: suspicious
    conf: 0.95
    for: [pe]
    all:
      - id: wql-antivirusproduct-query-pe
      - id: micro-behaviors/os/com/invoke::wmi-com-proxy-setup
    any:
      - id: securitycenter2-namespace-pe
