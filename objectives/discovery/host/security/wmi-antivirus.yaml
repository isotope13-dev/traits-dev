defaults:
  platforms:
    - windows
  attack: T1518.001
traits:
  - id: antivirusproduct-query
    desc: WMI antivirus enumeration
    crit: suspicious
    conf: 0.93
    for:
      - vbs
    if:
      type: string_value
      regex: (?i)AntiVirusProduct
composite_rules:
  - id: wmi-av-detection
    desc: WMI-based antivirus detection
    crit: suspicious
    conf: 0.9
    for:
      - powershell
      - batch
    all:
      - id: micro-behaviors/os/wmi/query::query-antivirus
    any:
      - id: micro-behaviors/os/wmi/query::wmi-object-cmdlet
      - id: micro-behaviors/os/wmi/query::cim-instance-cmdlet
      - id: micro-behaviors/os/wmi/query::query-security-center
