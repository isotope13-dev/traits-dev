defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: uac-policy-query
    desc: UAC EnableLUA policy registry query
    crit: notable
    conf: 0.85
    attack: T1082
    if:
      type: text
      substr: EnableLUA
    unless:
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/binary/installer/script::nsis
      - type: basename
        regex: '^Uninstall .+\.exe$'
