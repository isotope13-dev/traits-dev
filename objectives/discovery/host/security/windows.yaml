defaults:
  for:
    - pe
    - dll
    - powershell
  platforms:
    - windows
  attack: T1082
traits:
  - id: uac-policy-query
    desc: UAC EnableLUA policy registry query
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: EnableLUA

  - id: defender-operational-log
    desc: Defender operational event log
    crit: component
    conf: 0.86
    for:
      - powershell
    if:
      type: text
      substr: Microsoft-Windows-Windows Defender/Operational

  - id: defender-eventid-5007
    desc: Defender config-change event ID
    crit: component
    conf: 0.84
    for:
      - powershell
    if:
      type: text
      regex: '(?i)\b(EventID|Id)\s*[=:]\s*5007\b'

  - id: get-winevent-command
    desc: PowerShell Get-WinEvent command
    crit: component
    conf: 0.82
    for:
      - powershell
    if:
      type: text
      regex: '(?i)\bGet-WinEvent\b'

  - id: defender-exclusion-registry-message-parser
    desc: Defender exclusion message parser
    crit: notable
    conf: 0.88
    for:
      - powershell
    if:
      type: text
      regex: 'Exclusions\\\\(Paths|Extensions|Processes)\\\\\[\^\\s\]\+'

composite_rules:
  - id: defender-exclusion-eventlog-query
    desc: Defender exclusion event-log query
    crit: notable
    conf: 0.9
    for:
      - powershell
    near_lines: 20
    all:
      - id: defender-operational-log
      - id: defender-eventid-5007
      - id: get-winevent-command
