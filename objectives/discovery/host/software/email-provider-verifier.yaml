# Obfuscated bulk email-domain provider verifier.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. This driver validates harvested target domains at
# scale: it resolves MX, fingerprints the hosting mail provider (`checkMicrosoftLike`
# detects Microsoft 365 tenants), runs an HTTP verifier through the toolkit's
# rotating proxies, and streams the confirmed/typed domains to a live results
# log for the mailer to target. These identifiers are attack-context-specific
# fragments of that toolkit; convicts only when several co-occur inside
# obfuscator.io-obfuscated code (T1518 provider/software discovery).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1518
  mbc: E1518

traits:
  - id: verify-domain-provider
    desc: verifyDomainProvider mail-provider fingerprint
    crit: component
    conf: 0.8
    if:
      type: text
      substr: verifyDomainProvider
  - id: check-microsoft-like
    desc: checkMicrosoftLike M365 tenant detector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: checkMicrosoftLike
  - id: run-http-verifier
    desc: runHttpVerifier bulk HTTP domain verifier
    crit: component
    conf: 0.8
    if:
      type: text
      substr: runHttpVerifier
  - id: reset-mx-resolver
    desc: resetMxResolver bulk MX resolver
    crit: component
    conf: 0.8
    if:
      type: text
      substr: resetMxResolver
  - id: fatal-verifier-error
    desc: fatalVerifierError verifier control flow
    crit: component
    conf: 0.8
    if:
      type: text
      substr: fatalVerifierError

composite_rules:
  - id: email-provider-verify-api
    desc: Private bulk email-domain provider-verify API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: verify-domain-provider
      - id: check-microsoft-like
      - id: run-http-verifier
      - id: reset-mx-resolver
      - id: fatal-verifier-error
  - id: obfuscated-email-provider-verifier
    desc: Obfuscated bulk email-domain provider verifier
    crit: hostile
    conf: 0.95
    all:
      - id: email-provider-verify-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
