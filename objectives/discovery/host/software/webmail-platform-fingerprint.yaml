# Obfuscated webmail-platform fingerprinting / domain-intel prober.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. This module actively probes target domains to
# fingerprint which webmail platform hosts them — Zimbra, Roundcube, SmarterMail,
# or Microsoft 365 / OWA — by gathering domain intel, ranking candidate hosts,
# resolving M365 federation, and preferring the OWA login URL, so the toolkit can
# route the right credential attack per target. These identifiers are attack-
# context-specific fragments of that toolkit; convicts only when several co-occur
# inside obfuscator.io-obfuscated code (T1518 provider/software discovery).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1518
  mbc: E1518

traits:
  - id: gather-domain-intel
    desc: gatherDomainIntel target-domain profiler
    crit: component
    conf: 0.8
    if:
      type: text
      substr: gatherDomainIntel
  - id: rank-hosts-for-platform
    desc: rankHostsForPlatform candidate-host ranker
    crit: component
    conf: 0.8
    if:
      type: text
      substr: rankHostsForPlatform
  - id: prefer-owa-login-url
    desc: preferOwaLoginUrl OWA endpoint selector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: preferOwaLoginUrl
  - id: is-cloud-o365-url
    desc: isCloudO365Url Microsoft 365 detector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: isCloudO365Url
  - id: federation-domain-cache
    desc: federationDomainCache M365 federation cache
    crit: component
    conf: 0.8
    if:
      type: text
      substr: federationDomainCache

composite_rules:
  - id: webmail-platform-fingerprint-api
    desc: Private webmail-platform fingerprinting API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: gather-domain-intel
      - id: rank-hosts-for-platform
      - id: prefer-owa-login-url
      - id: is-cloud-o365-url
      - id: federation-domain-cache
  - id: obfuscated-webmail-platform-fingerprint
    desc: Obfuscated webmail-platform fingerprinting prober
    crit: hostile
    conf: 0.95
    all:
      - id: webmail-platform-fingerprint-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
