defaults:
  platforms:
    - unix
    - windows
  for:
    - c
    - elf
traits:
  - id: arch-macro-detection-1
    desc: Architecture detection macros (x86/arm)
    crit: notable
    conf: 0.8
    for:
      - c
    if:
      type: text
      regex: '#ifdef\s+__(x86_64|arm|i386)__'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/lang/source::linux-kernel-source-tree-path
  - id: arch-macro-detection-2
    desc: Architecture detection macros (aarch64)
    crit: notable
    conf: 0.8
    for:
      - c
    if:
      type: text
      regex: '#ifdef\s+__(aarch64)__'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/lang/source::linux-kernel-source-tree-path
  - id: arch-const-mapping-1
    desc: 'Multi-architecture numeric constant mapping'
    crit: notable
    conf: 0.85
    for:
      - c
    count_min: 2
    if:
      type: text
      regex: '#elif\s+__(x86_64|arm|i386)__'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: arch-const-mapping-2
    desc: 'Multi-architecture numeric constant mapping'
    crit: notable
    conf: 0.85
    for:
      - c
    count_min: 2
    if:
      type: text
      regex: '#elif\s+__(aarch64)__'
  - id: arch-aware-lib-filter-1
    desc: Architecture-aware library filtering (x86/arm)
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: text
      regex: strstr\s*\(\s*[^,]{1,120}d_name\s*,\s*"(x86_64|arm|i386)"\s*\)
  - id: arch-aware-lib-filter-2
    desc: 'Architecture-aware library filtering'
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: text
      regex: strstr\s*\(\s*[^,]{1,120}d_name\s*,\s*"(aarch64|linux)"\s*\)
  - id: resolve-library-fn-1
    desc: "Library resolver func name (resolve/search)"
    crit: notable
    conf: 0.75
    for:
      - c
    if:
      type: text
      regex: (?i)\b(resolve|search)[_-]?(lib(rary)?|so|shared)\b
  - id: resolve-library-fn-2
    desc: Library resolver function name (find/lookup)
    crit: notable
    conf: 0.75
    for:
      - c
    if:
      type: text
      regex: (?i)\b(find|lookup)[_-]?(lib(rary)?|so|shared)\b
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: global-search-library-fn
    desc: Global library search function
    crit: notable
    conf: 0.8
    for:
      - c
    if:
      type: text
      regex: (?i)\bglobal[_-]?search[_-]?lib(rary)?\b
  - id: spotlight-app-query
    desc: Spotlight query for applications
    crit: suspicious
    conf: 0.9
    attack: T1518
    platforms:
      - macos
    for:
      - macho
    if:
      type: text
      regex: kMDItemKind\s*==\s*'Application'
  - id: mdquery-create
    desc: MDQuery API usage
    crit: notable
    conf: 0.7
    attack: T1518
    platforms:
      - macos
    for:
      - macho
    if:
      type: text
      substr: MDQueryCreate
  - id: mdfind-bundle-id-query
    desc: Spotlight bundle identifier query
    crit: notable
    conf: 0.86
    attack: T1518
    platforms:
      - macos
    for:
      - macho
      - shell
      - applescript
    if:
      type: text
      substr: mdfind kMDItemCFBundleIdentifier
composite_rules:
  - id: arch-macro-detection
    desc: Architecture detection macros
    crit: notable
    conf: 0.8
    any:
      - id: arch-macro-detection-1
      - id: arch-macro-detection-2
  - id: arch-const-mapping
    desc: Multi-architecture numeric constant mapping
    crit: notable
    conf: 0.85
    any:
      - id: arch-const-mapping-1
      - id: arch-const-mapping-2
  - id: arch-aware-lib-filter
    desc: Architecture-aware library filtering
    crit: suspicious
    conf: 0.9
    any:
      - id: arch-aware-lib-filter-1
      - id: arch-aware-lib-filter-2
  - id: resolve-library-fn
    desc: Library resolver function name
    crit: notable
    conf: 0.75
    any:
      - id: resolve-library-fn-1
      - id: resolve-library-fn-2
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: spotlight-app-enum
    desc: Spotlight application enumeration
    crit: suspicious
    conf: 0.9
    attack: T1518
    platforms:
      - macos
    for:
      - macho
    all:
      - id: mdquery-create
      - id: spotlight-app-query
  - id: lib-path-enum
    desc: Library path enumeration
    crit: notable
    conf: 0.7
    mbc: E1083
    attack: T1518
    needs: 3
    any:
      - id: micro-behaviors/fs/path/library::lib-path
      - id: micro-behaviors/fs/path/library::usr-lib-path
      - id: micro-behaviors/fs/path/library::usr-local-lib-path
  - id: arch-detection
    desc: Architecture detection strings
    crit: notable
    conf: 0.5
    any:
      - id: micro-behaviors/os/sysinfo/platform/arch/
      - id: micro-behaviors/os/sysinfo/platform/string/
  - id: ssl-lib-targets
    desc: SSL/TLS library search targets
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/dylib/library/ssl/
  - id: lib-resolver-fn
    desc: Library resolver function patterns
    crit: notable
    conf: 0.75
    any:
      - id: resolve-library-fn
      - id: global-search-library-fn
  - id: lib-search-infra
    desc: Library search infrastructure
    crit: notable
    conf: 0.8
    mbc: E1083
    attack: T1518
    all:
      - id: lib-path-enum
    any:
      - id: arch-detection
      - id: lib-resolver-fn
      - id: micro-behaviors/fs/directory/readdir::readdir
  - id: ssl-lib-discovery
    desc: SSL library discovery
    crit: suspicious
    conf: 0.85
    mbc: E1083
    attack: T1557
    all:
      - id: lib-path-enum
      - id: ssl-lib-targets
  - id: arch-aware-lib-resolver
    desc: Architecture-aware library resolver interface
    crit: suspicious
    conf: 0.85
    mbc: E1083
    attack: T1518
    all:
      - id: lib-resolver-fn
    any:
      - id: arch-const-mapping
      - id: arch-macro-detection
  - id: manual-library-resolver
    desc: Manual recursive library resolver
    crit: suspicious
    conf: 0.95
    mbc: E1083
    attack: T1518
    all:
      - id: lib-search-infra
    any:
      - id: arch-aware-lib-filter
      - id: arch-macro-detection
