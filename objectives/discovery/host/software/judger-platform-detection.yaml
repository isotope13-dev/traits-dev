# Obfuscated "judger" webmail-platform detection scan engine.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. This is the "judger" driver that runs the toolkit's
# platform-detection engine over target domains — fingerprinting the mail
# provider (fetches a Microsoft skeleton, resolves federation), bucketing and
# streaming the classified live results, and hiding its output folder. These
# identifiers are attack-context-specific fragments of that toolkit; convicts
# only when several co-occur inside obfuscator.io-obfuscated code (T1518
# provider/software discovery of victim mail infrastructure).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1518
  mbc: E1518

traits:
  - id: run-judger
    desc: runJudger platform-detection driver
    crit: component
    conf: 0.8
    if:
      type: text
      substr: runJudger
  - id: get-judger-scan-icon
    desc: getJudgerScanIcon judger scan UI hook
    crit: component
    conf: 0.8
    if:
      type: text
      substr: getJudgerScanIcon
  - id: hide-judger-folder
    desc: hideJudgerFolder output-folder concealment
    crit: component
    conf: 0.8
    if:
      type: text
      substr: hideJudgerFolder
  - id: stream-bucket-writer
    desc: StreamBucketWriter bucketed live-result writer
    crit: component
    conf: 0.8
    if:
      type: text
      substr: StreamBucketWriter
  - id: fetched-ms-skeleton
    desc: FETCHED_MSKELETON Microsoft login skeleton
    crit: component
    conf: 0.8
    if:
      type: text
      substr: FETCHED_MSKELETON

composite_rules:
  - id: judger-platform-detection-api
    desc: Private judger platform-detection engine API
    crit: suspicious
    conf: 0.9
    all:
      - id: run-judger
    any:
      - id: get-judger-scan-icon
      - id: hide-judger-folder
      - id: stream-bucket-writer
      - id: fetched-ms-skeleton
  - id: obfuscated-judger-platform-detection
    desc: Obfuscated judger webmail-platform detection engine
    crit: hostile
    conf: 0.95
    all:
      - id: judger-platform-detection-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
