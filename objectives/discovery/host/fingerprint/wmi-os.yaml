defaults:
  platforms: [windows]
  for: [binaries]
  crit: suspicious

traits:
  - id: win32-os-string
    desc: Win32_OperatingSystem WMI class string
    crit: component
    if:
      type: text
      exact: "SELECT * FROM Win32_OperatingSystem"

  - id: hardware-info-string
    desc: Hardware information string
    crit: component
    if:
      type: text
      exact: "Hardware information:"

  - id: number-of-processors-string
    desc: Number of processors query string
    crit: component
    if:
      type: text
      exact: "Number of processors: %u"

composite_rules:
  - id: hardware-info-wmi-os
    desc: Gathers hardware info and Win32_OperatingSystem via WMI
    all:
      - id: micro-behaviors/data/db/sql::sql-select
      - id: win32-os-string
      - id: hardware-info-string
      - id: number-of-processors-string
