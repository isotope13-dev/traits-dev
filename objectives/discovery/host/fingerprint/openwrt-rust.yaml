defaults:
  platforms: [openwrt]
  for: [rust]
  attack: T1082

traits:
  - id: rust-openwrt-network-inventory
    desc: Rust OpenWrt network inventory
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'ubus call network\.interface dump|ip (addr|route) show'
  - id: rust-openwrt-service-inventory
    desc: Rust OpenWrt service inventory
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'list_procd|/etc/rc\.d/|opkg list-installed'
  - id: rust-proc-process-cmdline-scan
    desc: Rust proc cmdline process scan
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '/proc/\{\}/cmdline|read_dir\s*\(\s*"/proc"'

composite_rules:
  - id: openwrt-rust-host-inventory
    desc: OpenWrt Rust host inventory
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: rust-openwrt-network-inventory
      - id: rust-openwrt-service-inventory
      - id: rust-proc-process-cmdline-scan
