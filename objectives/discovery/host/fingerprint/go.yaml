# Host profiling APIs embedded in opaque Go Windows binaries.  The individual
# API names are capabilities; the composite requires several independent
# discovery sources and an opaque Go build identity before raising severity.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 262144

traits:
  - id: go-process-module-enumeration-api
    desc: Go PE embeds process enumeration APIs
    crit: notable
    conf: 0.9
    attack: T1057
    if:
      type: symbol
      kind: function
      regex: '(^|[./])Process32FirstW$'

  - id: go-host-identity-api
    desc: Go PE embeds host identity APIs
    crit: notable
    conf: 0.9
    attack: T1016,T1082
    if:
      type: symbol
      kind: function
      regex: '(^|[./])GetAdaptersInfo$'

  - id: go-account-service-enumeration-api
    desc: Go PE embeds account or service APIs
    crit: notable
    conf: 0.9
    attack: T1007,T1087
    if:
      type: symbol
      kind: function
      regex: '(^|[./])NetUserGetInfo$'

  - id: go-registry-enumeration-api
    desc: Go PE embeds registry enumeration APIs
    crit: notable
    conf: 0.9
    attack: T1012
    if:
      type: symbol
      kind: function
      regex: '(^|[./])RegEnumKeyExW$'

  - id: go-token-privilege-api
    desc: Token privilege adjustment API
    crit: notable
    conf: 0.9
    attack: T1134.001
    if:
      type: symbol
      kind: function
      regex: '(^|[./])AdjustTokenPrivileges$'

composite_rules:
  - id: go-multi-source-host-recon
    desc: Opaque Go PE bundles host, process, account, and registry recon APIs
    crit: suspicious
    conf: 0.95
    attack: T1012,T1016,T1057,T1082,T1087
    all:
      - id: metadata/lang/compiler/systems::go-binary-comp
    any:
      - id: go-process-module-enumeration-api
      - id: go-host-identity-api
      - id: go-account-service-enumeration-api
      - id: go-registry-enumeration-api
      - id: go-token-privilege-api
    needs: 3

  - id: go-opaque-host-recon-loader
    desc: Opaque Go PE combines host reconnaissance with token privilege access
    crit: hostile
    conf: 0.97
    attack: T1012,T1016,T1057,T1082,T1087,T1134.001
    all:
      - id: go-multi-source-host-recon
      - id: go-token-privilege-api
      - id: objectives/anti-static/obfuscation/obfuscator/garble::go-pe-opaque-identity-loader
