    kind: call
    exact: os.totalmem
- id: os-networkInterfaces
  desc: Network interface enumeration
  crit: suspicious
  conf: 0.85
  attack: T1016
  for:
  - javascript
  - typescript
  if:
    type: ast
    kind: call
    exact: os.networkInterfaces
- id: mac-keyword-lower
  desc: mac keyword (lowercase)
  crit: notable
  conf: 0.6
  for:
  - javascript
  - typescript
  if:
    type: string
    word: mac
- id: mac-keyword-upper
  desc: MAC keyword (uppercase)
  crit: notable
  conf: 0.6
  for:
  - javascript
  - typescript
  if:
    type: string
    word: MAC
- id: mac-address-regex
  desc: MAC address regex pattern
  crit: notable
  conf: 0.7
  for:
  - javascript
  - typescript
  if:
    type: string
    regex: '[0-9a-fA-F]{2}(:[0-9a-fA-F]{2}){5}'
- id: internal-filter-keyword
  desc: internal network interface filter keyword
  crit: notable
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: string
    regex: 'internal.{0,30}(IPv[46]|family|address)|networkInterfaces.{0,200}internal'
- id: createhash-call
  desc: crypto.createHash call
  crit: notable
  conf: 0.6
  for:
  - javascript
  - typescript
  if:
    type: string
    substr: createHash
- id: sha256-keyword
  desc: sha256 hash algorithm
  crit: notable
  conf: 0.6
  for:
  - javascript
  - typescript
  if:
    type: string
    word: sha256
- id: md5-keyword
  desc: md5 hash algorithm
  crit: notable
  conf: 0.6
  for:
  - javascript
  - typescript
  if:
    type: string
    word: md5
- id: userinfo-keyword
  desc: userInfo keyword
  crit: notable
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: string
    word: userInfo
- id: networkinterfaces-keyword
  desc: networkInterfaces keyword
  crit: notable
  conf: 0.6
  for:
  - javascript
  - typescript
  if:
    type: string
    word: networkInterfaces
- id: json-stringify-call
  desc: JSON.stringify call
  crit: notable
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: ast
    kind: call
    exact: JSON.stringify
- id: object-keys-call
  desc: Object.keys call
  crit: notable
  conf: 0.5
  for:
  - javascript
  - typescript
  count_min: 3
  if:
    type: string
    substr: Object.keys
- id: object-entries-call
  desc: Object.entries call
  crit: notable
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: string
    substr: Object.entries
- id: get-process-cmd
  desc: PowerShell Get-Process
  crit: notable
  conf: 0.7
  mbc: E1592
  attack: T1057
  for:
  - javascript
  - typescript
  if:
    type: string
    substr: Get-Process
  unless:
  - id: metadata/library/syntaxhighlighter::syntaxhighlighter-brush
- id: process-env-keys-entries
  desc: process.env keys/entries enumeration
  crit: notable
  conf: 0.75
  for:
  - javascript
  - typescript
  if:
    type: string
    regex: Object\.(keys|entries)\s*\(\s*process\.env\s*\)
- id: process-env-json-stringify
  desc: process.env serialized as JSON
  crit: notable
  conf: 0.75
  for:
  - javascript
  - typescript
  if:
    type: string
    regex: JSON\.stringify\s*\(\s*process\.env\s*\)
composite_rules:
- id: process-env-serialization
  desc: process.env serialization call
  crit: notable
  conf: 0.75
  for:
  - javascript
  - typescript
  any:
  - id: process-env-keys-entries
  - id: process-env-json-stringify
- id: mac-keyword-variants
  desc: MAC keyword variants
  for:
  - javascript
  - typescript
  any:
  - id: mac-keyword-lower
  - id: mac-keyword-upper
  crit: notable
- id: mac-patterns
  desc: MAC address patterns
