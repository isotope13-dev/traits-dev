traits:
- id: node-os-hostname
  desc: Hostname collection via os module
  crit: notable
  conf: 0.8
  attack: T1082
  for:
  - javascript
  - typescript
  if:
    type: ast
    kind: call
    exact: os.hostname
- id: node-os-platform
  desc: Platform detection via os module
  crit: notable
  conf: 0.75
  attack: T1082
  for:
  - javascript
  - typescript
  if:
    type: ast
    kind: call
    exact: os.platform
- id: os-arch
  desc: Architecture detection via os module
  crit: notable
