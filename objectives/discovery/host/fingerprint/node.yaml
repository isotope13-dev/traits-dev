  any:
  - id: node-os-hostname
  - id: node-os-platform
  - id: os-arch
  - id: os-release-call
  - id: node-os-userInfo
  - id: os-cpus
  - id: os-totalmem
  - id: os-networkInterfaces
  - id: objectives/discovery/system/hardware/display::display-resolution-discovery
  - id: objectives/discovery/system/locale
- id: process-env-dump
  desc: Full environment variable dump
  crit: suspicious
  conf: 0.85
  mbc: E1592
  attack: T1082
  for:
  - javascript
  - typescript
  all:
  - id: micro-behaviors/os/env/access::javascript
  - id: process-env-serialization
- id: process-list
  desc: Running process enumeration
  crit: suspicious
  conf: 0.9
  mbc: E1592
