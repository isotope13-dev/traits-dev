  for:
  - javascript
  - typescript
  any:
  - id: micro-behaviors/process/enumerate/shell::tasklist
  - id: micro-behaviors/process/enumerate/shell::ps-aux
  - id: micro-behaviors/process/enumerate/shell::ps-ef
