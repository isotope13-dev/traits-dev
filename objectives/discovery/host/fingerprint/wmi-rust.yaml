defaults:
  platforms: [windows]
  for: [rust]
  attack: "T1082"

traits:
  - id: buildnumber-field
    desc: WMI BuildNumber result field
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: BuildNumber
  - id: osarchitecture-field
    desc: WMI OSArchitecture result field
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: OSArchitecture
  - id: freespace-field
    desc: WMI FreeSpace result field
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: FreeSpace
  - id: version-field
    desc: WMI Version result field
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: Version
  - id: localaccount-field
    desc: WMI LocalAccount result field
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: LocalAccount
  - id: domain-field
    desc: WMI Domain result field
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: Domain
  - id: macaddress-field
    desc: WMI MACAddress result field
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: MACAddress
  - id: netenabled-field
    desc: WMI NetEnabled result field
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: NetEnabled
  - id: camera-keyword
    desc: Camera peripheral keyword
    crit: component
    conf: 0.88
    if:
      type: string_literal
      exact: camera
  - id: webcam-keyword
    desc: Webcam peripheral keyword
    crit: component
    conf: 0.88
    if:
      type: string_literal
      exact: webcam
  - id: microphone-keyword
    desc: Microphone peripheral keyword
    crit: component
    conf: 0.88
    if:
      type: string_literal
      exact: microphone
  - id: keyboard-keyword
    desc: Keyboard peripheral keyword
    crit: component
    conf: 0.88
    if:
      type: string_literal
      exact: keyboard
  - id: mouse-keyword
    desc: Mouse peripheral keyword
    crit: component
    conf: 0.88
    if:
      type: string_literal
      exact: mouse

composite_rules:
  - id: peripheral-keywords
    desc: Peripheral category keywords in WMI
    crit: component
    conf: 0.94
    needs: 2
    any:
      - id: camera-keyword
      - id: webcam-keyword
      - id: microphone-keyword
      - id: keyboard-keyword
      - id: mouse-keyword

  - id: wmi-os-profile
    desc: Profiles Windows OS via WMI
    crit: notable
    conf: 0.93
    all:
      - id: micro-behaviors/os/wmi/query::query-os-info
      - id: buildnumber-field
      - id: osarchitecture-field

  - id: wmi-drive-capacity-profile
    desc: Profiles drive capacity via WMI
    crit: notable
    conf: 0.94
    all:
      - id: micro-behaviors/os/wmi/query::query-logical-disks
      - id: freespace-field

  - id: wmi-installed-software-inventory
    desc: Inventories installed software via WMI
    crit: suspicious
    conf: 0.95
    attack: "T1518"
    all:
      - id: micro-behaviors/os/wmi/query::query-installed-software
      - id: version-field

  - id: wmi-user-account-inventory
    desc: Enumerates local user accounts via WMI
    crit: suspicious
    conf: 0.95
    attack: "T1087"
    all:
      - id: micro-behaviors/os/wmi/query::query-user-accounts
      - id: localaccount-field
      - id: domain-field

  - id: wmi-network-adapter-inventory
    desc: Enumerates network adapters via WMI
    crit: suspicious
    conf: 0.95
    attack: "T1016"
    all:
      - id: micro-behaviors/os/wmi/query::query-network-adapters
      - id: macaddress-field
      - id: netenabled-field

  - id: wmi-peripheral-inventory
    desc: Inventories peripherals via WMI
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/os/wmi/query::query-pnp-devices
      - id: peripheral-keywords

  - id: wmi-host-fingerprint-suite
    desc: Multi-surface host fingerprinting via WMI
    crit: suspicious
    conf: 0.97
    needs: 4
    any:
      - id: wmi-os-profile
      - id: wmi-drive-capacity-profile
      - id: wmi-installed-software-inventory
      - id: wmi-user-account-inventory
      - id: wmi-network-adapter-inventory
      - id: wmi-peripheral-inventory
