# Browser-extension install fingerprinting paired with session-cookie harvest.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1082

composite_rules:
  - id: extension-fingerprint-with-session-cookie-harvest
    desc: Extension fingerprints installs while harvesting session cookies
    crit: hostile
    conf: 0.97
    attack: T1082,T1539
    scope: archive
    for: [crx, zip, archives]
    all:
      - id: objectives/credential-access/browser/extension::browser-fingerprint-payload
      - id: micro-behaviors/communications/http/cookies::linkedin-session-cookie-name
      - id: metadata/permission/cookie::permission-cookies
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
