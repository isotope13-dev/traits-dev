defaults:
  platforms: [aix, unix]
  for: [c, cpp, elf]
  attack: T1082
composite_rules:
  - id: aix-host-fingerprinting
    desc: AIX system fingerprinting and data collection
    crit: hostile
    conf: 0.96
    needs: 5
    any:
      - id: micro-behaviors/process/enumerate/shell::kvm-getprocs
      - id: micro-behaviors/process/enumerate/shell::aix-security-passwd
      - id: micro-behaviors/os/sysinfo/platform/kernel::uname
      - id: micro-behaviors/process/user/query::getpwuid
      - id: micro-behaviors/communications/socket/connect::connect-symbol
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
