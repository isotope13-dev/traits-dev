defaults:
  platforms: [unix]
  for: [shell]
  attack: T1046
traits:
- id: debug-endpoint-probe
  desc: "Probes /debug endpoint information disclosure"
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: '(curl|wget|fetch).{0,80}/debug\b|https?://[^\s''"]{1,100}/debug\b'
  unless:
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: config-endpoint-probe
  desc: Probes /config endpoint via HTTP
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: (curl|wget|fetch).{0,80}/config\b
- id: env-endpoint-probe
  desc: Probes /env or /vars endpoint via HTTP
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: (curl|wget|fetch).{0,80}/(env|vars)\b
- id: grep-token-secret
  desc: Greps for token or secret keywords
  crit: component
  conf: 0.8
  attack: T1552
  if:
    type: text
    regex: grep.{0,30}(token|secret|apikey)
- id: grep-password-credential
  desc: Greps for password or credential keywords
  crit: component
  conf: 0.8
  attack: T1552
  if:
    type: text
    regex: grep.{0,30}(password|credential)
- id: notebook-stack-config-targets
  desc: Deployment scheduler config target
  crit: component
  conf: 0.88
  attack: T1552.001
  if:
    type: text
    regex: docker-compose\.yml|celerybeat-schedule
- id: git-credential-helper-check
  desc: Git credential helper check
  crit: component
  conf: 0.86
  if:
    type: text
    substr: '$HOME/.git-credentials'
composite_rules:
- id: credential-keyword-grep
  desc: Searches output for credential keywords
  crit: notable
  conf: 0.85
  attack: T1552
  any:
  - id: grep-token-secret
  - id: grep-password-credential
  unless:
  - id: git-credential-helper-check
- id: endpoint-credential-recon
  desc: Probes endpoints and searches for credentials
  crit: notable
  conf: 0.9
  attack: T1552
  all:
  - id: credential-keyword-grep
  any:
  - id: debug-endpoint-probe
  - id: config-endpoint-probe
