# Application Targeting Attempt
# Detects attempts to locate or target specific applications
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
composite_rules:
  - id: app-targeting-attempt
    desc: "Mention of specific sensitive applications (browsers, office)"
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/process/enumerate/apps::browser-apps
      - id: micro-behaviors/process/enumerate/apps::office-apps
