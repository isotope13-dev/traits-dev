defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
composite_rules:
  - id: app-targeting-attempt
    desc: Mention of specific sensitive applications (browsers, office)
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/process/enumerate/apps::browser-apps
      - id: micro-behaviors/process/enumerate/apps::office-apps
