defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
composite_rules:
  - id: app-targeting-attempt
    desc: Sensitive application targeting strings
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/process/enumerate/apps::browser-apps
      - id: micro-behaviors/process/enumerate/apps::office-apps
