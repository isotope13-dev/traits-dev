defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
traits:
  - id: npm-config-discovery
    desc: Shell command accesses NPM configuration
    conf: 0.8
    crit: suspicious
    attack: T1082
    for: [shell, batch]
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: text
      substr: npm config list
