# Electron renderer-bridge enumeration.
#
# Post-exploitation frameworks targeting Electron apps frequently probe the
# renderer's global object for IPC bridges and native APIs that the app
# author exposed via contextBridge. The canonical probe is a Runtime.evaluate
# of JS like:
#
#   JSON.stringify(Object.getOwnPropertyNames(window)
#       .filter(n => /electron|ipc|bridge|native|api|host|client|desktop|shell/i.test(n))
#       .sort())
#
# The literal lexicon `electron|ipc|bridge|native|api|host|client|desktop|shell`
# embedded as a regex inside a string is a strong tell: Electron apps
# themselves don't enumerate their own bridges with heuristic name regexes —
# only attacker/operator tooling does.
#
# This trait fires on source code (or strings inside binaries) that embed
# this lexicon AS DATA (a regex literal in a string, not normal code that
# happens to mention these words).
defaults:
  platforms: [windows, unix]
  for: [pe, dll, csharp, go, javascript, typescript, python]
  attack: T1057
  mbc: E1057
traits:
  - id: electron-bridge-lexicon-regex
    desc: Electron bridge-name regex enumeration
    crit: suspicious
    conf: 0.95
    if:
      # Match the canonical lexicon embedded as a regex alternation. In
      # practice the published Glasshouse template and its forks use this
      # ordering verbatim. Reorderings/subsets are intentionally NOT covered
      # — the strict form is the one with attribution value, and a fuzzier
      # variant would balloon false positives on benign Electron source.
      type: text
      regex: 'electron\|ipc\|bridge\|native\|api\|host\|client\|desktop\|shell'
