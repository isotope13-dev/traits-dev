defaults:
  platforms: [linux, macos, windows, unix]
  for: [shell]
  attack: T1046
traits:
  - id: debug-endpoint-probe
    desc: Probes /debug endpoint for information disclosure
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: /debug
  - id: config-endpoint-probe
    desc: Probes /config or /env endpoint
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: /(config|env|vars)\b
  - id: grep-token-secret
    desc: Greps for token or secret keywords
    crit: notable
    conf: 0.8
    attack: T1552
    if:
      type: raw
      regex: grep.{0,30}(token|secret|apikey)
  - id: grep-password-credential
    desc: Greps for password or credential keywords
    crit: notable
    conf: 0.8
    attack: T1552
    if:
      type: raw
      regex: grep.{0,30}(password|credential)
composite_rules:
  - id: credential-keyword-grep
    desc: Searches output for credential keywords
    crit: suspicious
    conf: 0.85
    attack: T1552
    any:
      - id: grep-token-secret
      - id: grep-password-credential
  - id: endpoint-credential-recon
    desc: Probes endpoints and searches for credentials
    crit: suspicious
    conf: 0.9
    attack: T1552
    all:
      - id: credential-keyword-grep
    any:
      - id: debug-endpoint-probe
      - id: config-endpoint-probe
    needs: 1
