defaults:
  platforms: [ios, unix]
  for: [zig]
  attack: T1057

traits:
  - id: zig-ios-kern-proc-all
    desc: Zig iOS KERN_PROC_ALL enum
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: KERN_PROC_ALL

  - id: zig-ios-kinfo-proc-list
    desc: Zig iOS kinfo_proc list
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: struct_kinfo_proc

composite_rules:
  - id: zig-ios-process-enumeration
    desc: Zig iOS process enumeration
    crit: hostile
    conf: 0.97
    all:
      - id: zig-ios-kern-proc-all
      - id: zig-ios-kinfo-proc-list
