defaults:
  platforms: [windows]
  for: [pe]
  attack: T1057

traits:
  - id: ahk-winmgmts-moniker
    desc: AutoHotkey winmgmts COM moniker
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: 'wmi := ComObjGet("winmgmts:")'

  - id: ahk-win32-process-query
    desc: AutoHotkey Win32_Process WMI query
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: 'query := wmi.ExecQuery("Select * from Win32_Process")'

  - id: ahk-process-name-collector
    desc: AutoHotkey process name collection
    crit: component
    conf: 0.92
    if:
      type: text
      exact: "processName := process.Name"

  - id: ahk-process-list-append
    desc: AutoHotkey process list append
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "processList .= processName"

composite_rules:
  - id: ahk-wmi-process-inventory
    desc: AutoHotkey WMI process inventory
    crit: suspicious
    conf: 0.97
    all:
      - id: ahk-winmgmts-moniker
      - id: ahk-win32-process-query
    any:
      - id: ahk-process-name-collector
      - id: ahk-process-list-append
    needs: 1
