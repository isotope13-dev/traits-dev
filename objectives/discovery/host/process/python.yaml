defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: psutil-enum
    desc: Enumerates running processes via psutil
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: psutil\.process_iter\(
  - id: wireshark-proc
    desc: Wireshark process name
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      substr: Wireshark
  - id: vbox-proc
    desc: VirtualBox process name
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      exact: vbox
composite_rules:
  - id: tasklist-shell
    desc: Enumerates processes via shell command
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/package/testing/presence/harness/
    any:
      - id: micro-behaviors/process/enumerate/shell::tasklist
      - id: micro-behaviors/process/enumerate/shell::pgrep-cmd
      - id: micro-behaviors/process/enumerate/shell::ps-ef
  - id: analysis-tool-names
    desc: References analysis/debugging tool process names
    crit: notable
    conf: 0.8
    all:
      - id: psutil-enum
      - id: analysis-tool-name
  - id: analysis-tool-name
    desc: References a known analysis-tool process
    crit: component
    conf: 0.8
    any:
      - id: wireshark-proc
      - id: vbox-proc
      - id: objectives/anti-analysis/vm-detect/vendor::vendor-vmware
      - id: charles-proc
      - id: objectives/anti-analysis/sandbox-detect/tool-references::fiddler
  - id: charles-proc
    desc: Checks for Charles proxy among processes
    crit: notable
    conf: 0.85
    all:
      - id: psutil-enum
      - id: micro-behaviors/process/enumerate/apps::charles-process-name
  - id: anti-analysis-recon
    desc: Process-based anti-analysis/recon (psutil + sensitive
    crit: suspicious
    conf: 0.9
    all:
      - id: psutil-enum
      - id: analysis-tool-names
