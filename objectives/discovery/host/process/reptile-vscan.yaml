defaults:
  attack: T1057
  for:
    - c
    - cpp
  platforms:
    - windows
traits:
  - id: iroffer-marker
    desc: IROffer process scan marker
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: irofferx
  - id: servu-marker
    desc: Serv-U process scan marker
    crit: component
    conf: 0.95
    if:
      type: text
      regex: Serv-U|serv-u
  - id: firedaemon-marker
    desc: FireDaemon process scan marker
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: \bfiredaemon(09|16)?\b
  - id: mirc-marker
    desc: mIRC process scan marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: \bmirc(591|603|32)?\b
    unless:
    - id: well-known/lib/wine::wine-source-tree
    - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: found-servu-output
    desc: Serv-U discovery output format
    crit: suspicious
    conf: 0.96
    if:
      type: string_literal
      exact: 'Found Serv-U: %s:%d'
  - id: vscan-header-include
    desc: VSCAN definition header include
    crit: suspicious
    conf: 0.92
    if:
      type: string_literal
      exact: vscandef.h
composite_rules:
  - id: reptile-vscan-service-hunting
    desc: Reptile VSCAN service hunting
    crit: suspicious
    conf: 0.98
    needs: 3
    any:
      - id: iroffer-marker
      - id: servu-marker
      - id: firedaemon-marker
      - id: mirc-marker
      - id: found-servu-output
      - id: vscan-header-include
