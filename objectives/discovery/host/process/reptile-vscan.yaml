defaults:
  attack: "T1057"
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: iroffer-marker
    desc: IROffer process scan marker
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      exact: "irofferx"
  - id: servu-marker
    desc: Serv-U process scan marker
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'Serv-U|serv-u'
  - id: firedaemon-marker
    desc: FireDaemon process scan marker
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'firedaemon(09|16)?'
  - id: mirc-marker
    desc: mIRC process scan marker
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: '\bmirc(591|603|32)?\b'
  - id: found-servu-output
    desc: Serv-U discovery output format
    crit: suspicious
    conf: 0.96
    if:
      type: string_value
      exact: "Found Serv-U: %s:%d"
  - id: vscan-header-include
    desc: VSCAN definition header include
    crit: suspicious
    conf: 0.92
    if:
      type: string_value
      exact: "vscandef.h"
composite_rules:
  - id: reptile-vscan-service-hunting
    desc: Reptile VSCAN service hunting
    crit: suspicious
    conf: 0.98
    needs: 3
    any:
      - id: iroffer-marker
      - id: servu-marker
      - id: firedaemon-marker
      - id: mirc-marker
      - id: found-servu-output
      - id: vscan-header-include
