defaults:
  platforms: [windows]
  for: [rust]
  attack: "T1057"

traits:
  - id: processid-field
    desc: WMI ProcessId result field
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: ProcessId

composite_rules:
  - id: wmi-process-enumeration
    desc: Enumerates running processes via WMI
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/wmi/query::query-process-list
      - id: processid-field
