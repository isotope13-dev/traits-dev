# Hidden PowerShell CIM host survey used by remote agents before reporting
# inventory over C2. Atoms alone are automation-adjacent; the hostile
# composite requires the bypass launcher plus multi-class CIM queries.
defaults:
  platforms: [windows]
  for: [pe, dll, powershell]
  attack: T1082

traits:
  - id: cim-operating-system-query
    desc: Win32_OperatingSystem CIM query
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Get-CimInstance Win32_OperatingSystem

  - id: cim-computer-system-query
    desc: Win32_ComputerSystem CIM query
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Get-CimInstance Win32_ComputerSystem

  - id: cim-computer-system-product-query
    desc: Win32_ComputerSystemProduct CIM query
    crit: component
    conf: 0.92
    if:
      type: text
      substr: Get-CimInstance Win32_ComputerSystemProduct

  - id: uninstall-display-name-enum
    desc: Installed software DisplayName enumeration
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'Where-Object\s*\{\s*\$_\.DisplayName\s*\}'

composite_rules:
  - id: hidden-powershell-cim-host-inventory
    desc: Hidden PowerShell CIM host and software inventory
    crit: hostile
    conf: 0.96
    attack: T1082,T1059.001
    all:
      - id: cim-operating-system-query
      - id: cim-computer-system-query
      - id: cim-computer-system-product-query
      - id: uninstall-display-name-enum
    any:
      - id: objectives/execution/interpreter/powershell::hidden-bypass-file-command
      - id: objectives/execution/interpreter/powershell::hidden-bypass-file-command-noprofile
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
