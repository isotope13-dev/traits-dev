defaults:
  platforms: [windows]
  for: [powershell, batch, pe, dll, scripts]
  attack: T1087
  mbc: E1087

traits:
  - id: terminalservices-rdp-operational-log
    desc: TerminalServices RDP operational log
    crit: component
    conf: 0.86
    if:
      type: text
      exact: Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational

  - id: encoded-terminalservices-rdp-log
    desc: Encoded TerminalServices RDP log
    crit: component
    conf: 0.82
    if:
      type: encoded
      exact: Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational

  - id: get-winevent-filterhashtable
    desc: Get-WinEvent FilterHashtable query
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '(?i)\bGet-WinEvent\b.{0,120}\b-FilterHashtable\b'

  - id: encoded-get-winevent-filterhashtable
    desc: Encoded Get-WinEvent query
    crit: component
    conf: 0.75
    if:
      type: encoded
      regex: '(?i)\bGet-WinEvent\b.{0,120}\b-FilterHashtable\b'

  - id: rdp-success-event-1149
    desc: RDP success event ID
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '(?i)\b(Id|EventID)\s*[=:]\s*1149\b'

  - id: encoded-rdp-success-event-1149
    desc: Encoded RDP success event ID
    crit: component
    conf: 0.8
    if:
      type: encoded
      regex: '(?i)\b(Id|EventID)\s*[=:]\s*1149\b'

  - id: rdp-event-history-format
    desc: RDP event history formatting
    crit: component
    conf: 0.72
    if:
      type: text
      regex: '(?i)Sort-Object\s+TimeCreated.{0,80}(Format-List|Select-Object\s+-First)'

composite_rules:
  - id: rdp-session-history-query
    desc: RDP session history query
    crit: suspicious
    conf: 0.9
    near_lines: 20
    all:
      - id: terminalservices-rdp-operational-log
      - id: get-winevent-filterhashtable
      - id: rdp-success-event-1149
    any:
      - id: rdp-event-history-format
      - id: encoded-rdp-success-event-1149

  - id: encoded-rdp-session-history-query
    desc: Encoded RDP session history query
    crit: suspicious
    conf: 0.88
    near_lines: 20
    all:
      - id: encoded-terminalservices-rdp-log
      - id: encoded-get-winevent-filterhashtable
      - id: encoded-rdp-success-event-1149
