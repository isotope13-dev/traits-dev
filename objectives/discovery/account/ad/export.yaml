# csvde.exe (Active Directory CSV exporter) used as a LOLBin for
# domain reconnaissance. Legitimate Windows utility for exporting AD
# objects to CSV; common in attacker workflows for offline analysis
# of users, groups, and computers. SHADOW-EARTH-053 invokes it from
# w3wp.exe via a web shell.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell]
  attack: T1087.002
  mbc: E1087
traits:
  - id: csvde-cmd
    desc: csvde.exe AD export command
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bcsvde(\.exe)?\b[^\n]{0,200}-f\s+'
      case_insensitive: true
  - id: nltest-dclist
    desc: nltest /dclist domain controller discovery
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'nltest[^\n]{0,40}/dclist'
      case_insensitive: true
  - id: powerview-getdomainuser
    desc: PowerView Get-DomainUser cmdlet
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Get-DomainUser\b|Get-NetUser\b'
composite_rules:
  - id: ad-recon-lolbins
    desc: Active Directory reconnaissance via LOLBins
    crit: suspicious
    conf: 0.93
    needs: 2
    any:
      - id: csvde-cmd
      - id: nltest-dclist
      - id: powerview-getdomainuser
