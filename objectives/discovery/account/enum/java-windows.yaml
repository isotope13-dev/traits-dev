defaults:
  platforms: [windows]
  for: [java, class, java_class, jar]
  attack: T1087

traits:
  - id: java-net-user-account-enum
    desc: Java net user account enum
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'net user( /domain)?[\s\S]{0,220}wmic useraccount'

  - id: java-admin-group-enum
    desc: Java admin group enum
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: net localgroup administrators

  - id: jvm-net-user-account-enum
    desc: JVM net user account enum
    crit: suspicious
    conf: 0.93
    for: [class, java_class, jar]
    if:
      type: text
      regex: 'net user[\s\S]{0,180}wmic useraccount'

  - id: jvm-net-user-string
    desc: JVM class contains net user command bytes
    crit: suspicious
    conf: 0.91
    # Raw hex matching over compressed archives is unsafe: arbitrary package
    # bytes can contain this sequence.  Nested JVM class files are analyzed
    # independently, so keep the byte signature scoped to class artifacts.
    for: [class]
    if:
      type: hex
      pattern: 6E 65 74 20 75 73 65 72

  - id: jvm-wmic-useraccount-string
    desc: JVM class contains wmic command bytes
    crit: suspicious
    conf: 0.91
    for: [class]
    if:
      type: hex
      pattern: 77 6D 69 63 20 75 73 65 72 61 63 63 6F 75 6E 74

  - id: jvm-admin-group-string
    desc: JVM class contains admin group command bytes
    crit: suspicious
    conf: 0.9
    for: [class]
    if:
      type: hex
      pattern: 6E 65 74 20 6C 6F 63 61 6C 67 72 6F 75 70 20 61 64 6D 69 6E 69 73 74 72 61 74 6F 72 73

composite_rules:
  - id: java-windows-account-inventory
    desc: Java Windows account inventory
    crit: suspicious
    conf: 0.97
    all:
      - id: java-net-user-account-enum
      - id: java-admin-group-enum

  - id: jvm-windows-account-inventory
    desc: JVM Windows account inventory
    crit: suspicious
    conf: 0.97
    for: [class]
    all:
      - id: jvm-net-user-string
      - id: jvm-wmic-useraccount-string
      - id: jvm-admin-group-string
