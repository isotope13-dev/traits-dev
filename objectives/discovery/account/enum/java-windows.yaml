defaults:
  platforms: [windows]
  for: [java, class, java_class, jar]
  attack: T1087

traits:
  - id: java-net-user-account-enum
    desc: Java net user account enum
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'net user( /domain)?[\s\S]{0,220}wmic useraccount'

  - id: java-admin-group-enum
    desc: Java admin group enum
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: net localgroup administrators

  - id: jvm-net-user-account-enum
    desc: JVM net user account enum
    crit: suspicious
    conf: 0.93
    for: [class, java_class, jar]
    if:
      type: text
      regex: 'net user[\s\S]{0,180}wmic useraccount'

composite_rules:
  - id: java-windows-account-inventory
    desc: Java Windows account inventory
    crit: suspicious
    conf: 0.97
    all:
      - id: java-net-user-account-enum
      - id: java-admin-group-enum

  - id: jvm-windows-account-inventory
    desc: JVM Windows account inventory
    crit: suspicious
    conf: 0.97
    for: [class, java_class, jar]
    all:
      - id: jvm-net-user-account-enum
      - id: java-admin-group-enum
