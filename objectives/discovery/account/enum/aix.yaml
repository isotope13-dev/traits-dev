defaults:
  platforms: [aix]
  for: [elf, c, cpp]
  attack: T1033
composite_rules:
  - id: aix-account-recon
    desc: AIX user account reconnaissance
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: micro-behaviors/process/user/query::getpwuid
      - id: micro-behaviors/os/privilege/query::geteuid
      - id: micro-behaviors/os/privilege/query::getuid
