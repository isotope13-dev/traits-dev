defaults:
  platforms: [aix]
  for: [elf, c, cpp]
  attack: T1033
composite_rules:
  - id: aix-account-recon
    desc: AIX user account reconnaissance
    crit: hostile
    conf: 0.95
    # Anchor on the AIX-specific account database (/etc/security/passwd). The
    # uid-query syscalls below are universal POSIX and fire on virtually every
    # Unix/ELF binary, so without an AIX-specific anchor this matched generic
    # Linux/Android libraries (e.g. koreader). Require real AIX account access.
    all:
      - id: micro-behaviors/fs/path/config/system::etc-security-passwd
    needs: 2
    any:
      - id: micro-behaviors/process/user/query::getpwuid
      - id: micro-behaviors/os/privilege/query::geteuid
      - id: micro-behaviors/os/privilege/query::getuid
