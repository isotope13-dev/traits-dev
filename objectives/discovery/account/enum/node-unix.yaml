defaults:
  platforms: [unix, netbsd]
  for: [javascript, typescript]
  attack: T1087

traits:
  - id: node-passwd-group-enum
    desc: Node passwd group enum
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'discoverLocalAccounts[\s\S]{0,700}discoverGroupMemberships'

  - id: node-sudo-privilege-enum
    desc: Node sudo privilege enum
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sudo -l 2>&1

composite_rules:
  - id: node-local-account-sudo-enum
    desc: Node local account sudo enum
    crit: hostile
    conf: 0.98
    all:
      - id: node-passwd-group-enum
      - id: node-sudo-privilege-enum
