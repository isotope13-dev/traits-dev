defaults:
  platforms: [unix, netbsd]
  for: [javascript, typescript]
  attack: T1087

traits:
  - id: node-passwd-group-enum
    desc: Node passwd group enum
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'discoverLocalAccounts[\s\S]{0,700}discoverGroupMemberships'

  - id: node-sudo-privilege-enum
    desc: Node sudo privilege enum
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sudo -l 2>&1

  - id: node-suid-file-enum
    desc: Node searches for setuid files
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bfind\s+/[^\n]{0,120}\s-perm\s-4000\b'

  - id: node-root-file-enum
    desc: Node enumerates root-owned files or directories
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)\b(ls|cat|find)\s+[^\n]{0,80}/root([/\s*]|$)'

composite_rules:
  - id: node-local-account-sudo-enum
    desc: Node local account sudo enum
    crit: hostile
    conf: 0.98
    all:
      - id: node-passwd-group-enum
      - id: node-sudo-privilege-enum

  - id: node-privileged-surface-enum
    desc: Node enumerates sudo, setuid, and root file surfaces
    crit: hostile
    conf: 0.99
    attack: T1087,T1069,T1548.001
    all:
      - id: node-sudo-privilege-enum
      - id: node-suid-file-enum
      - id: node-root-file-enum
