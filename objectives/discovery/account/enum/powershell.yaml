defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1087

traits:
  - id: ps-service-account-query
    desc: PowerShell service account query
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: 'Win32_Service[\s\S]{0,260}StartName'
    unless:
      - id: well-known/app/sql-server-dsc::benign-module-context
      - id: well-known/app/sql-server-dsc::module-path-identity
      - id: well-known/app/sql-server-dsc::module-name-identity

  - id: ps-domain-user-fallback
    desc: PowerShell domain user fallback
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Get-ADUser[\s\S]{0,260}net user /domain'

composite_rules:
  - id: ps-account-session-inventory
    desc: PowerShell account and session inventory
    crit: notable
    conf: 0.98
    all:
      - id: micro-behaviors/os/user/account::powershell-win32-useraccount-query
      - id: micro-behaviors/os/user/account::powershell-logon-session-query
    any:
      - id: ps-service-account-query
      - id: ps-domain-user-fallback
