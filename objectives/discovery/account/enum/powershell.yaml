defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1087

traits:
  - id: ps-win32-useraccount-query
    desc: PowerShell Win32 user query
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: Win32_UserAccount

  - id: ps-logon-session-query
    desc: PowerShell logon session query
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: Win32_LogonSession

  - id: ps-service-account-query
    desc: PowerShell service account query
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: 'Win32_Service[\s\S]{0,260}StartName'

  - id: ps-domain-user-fallback
    desc: PowerShell domain user fallback
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Get-ADUser[\s\S]{0,260}net user /domain'

composite_rules:
  - id: ps-account-session-inventory
    desc: PowerShell account inventory
    crit: hostile
    conf: 0.98
    all:
      - id: ps-win32-useraccount-query
      - id: ps-logon-session-query
    any:
      - id: ps-service-account-query
      - id: ps-domain-user-fallback
