# Obfuscated bulk email-deliverability "debounce" verification engine.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. This engine validates harvested target email
# addresses at scale: it classifies each address's deliverability, debounces
# (de-dupes/settles) the verdicts into ordered result buckets, and streams the
# confirmed live addresses — driving the underlying SMTP/MX/O365 checks through
# the toolkit's rotating proxies. These identifiers are attack-context-specific
# fragments of that toolkit; convicts only when several co-occur inside
# obfuscator.io-obfuscated code (T1589.002 gather victim email addresses).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1589.002
  mbc: E1589

traits:
  - id: debounce-buckets
    desc: DEBOUNCE_BUCKETS deliverability result buckets
    crit: component
    conf: 0.8
    if:
      type: text
      substr: DEBOUNCE_BUCKETS
  - id: run-debounce-async
    desc: runDebounceAsync verification-run driver
    crit: component
    conf: 0.8
    if:
      type: text
      substr: runDebounceAsync
  - id: get-debounce-scan-icon
    desc: getDebounceScanIcon debounce scan UI hook
    crit: component
    conf: 0.8
    if:
      type: text
      substr: getDebounceScanIcon
  - id: bucket-order
    desc: BUCKET_ORDER deliverability bucket ranking
    crit: component
    conf: 0.75
    if:
      type: text
      substr: BUCKET_ORDER

composite_rules:
  - id: email-debounce-verify-api
    desc: Private email-deliverability debounce-verify API
    crit: suspicious
    conf: 0.9
    all:
      - id: debounce-buckets
    any:
      - id: run-debounce-async
      - id: get-debounce-scan-icon
      - id: bucket-order
  - id: obfuscated-email-debounce-verifier
    desc: Obfuscated bulk email-deliverability debounce verifier
    crit: hostile
    conf: 0.95
    all:
      - id: email-debounce-verify-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
