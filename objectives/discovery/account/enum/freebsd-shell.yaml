defaults:
  platforms: [freebsd, unix]
  for: [shell]
  attack: T1087.001

traits:
  - id: shell-privileged-group-grep
    desc: Shell checks privileged groups
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'grep\s+-E\s+["'']?\^\(wheel\|sudo\|operator\):'

  - id: shell-active-session-commands
    desc: Shell enumerates active sessions
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(^|\n)\s*who\s+2>/dev/null[\s\S]{0,90}\n\s*w\s+2>/dev/null'

  - id: shell-password-status-loop
    desc: Shell checks password hash status
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'password=(has_hash|locked|empty)'

composite_rules:
  - id: shell-passwd-group-enum
    desc: Shell enumerates passwd and group files
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/config/groups::etc-group
    unless:
      - id: well-known/app/aks-engine/
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: well-known/lib/benign-runtime-bundles::php-runtime-package
      - id: well-known/app/kpango-dotfiles::kpango-dotfiles-source-path
      - id: metadata/package/files/system-package::debian-account-maintainer-tool
      - id: metadata/package/files/system-package::dpkg-maintainer-script

  - id: shell-freebsd-account-recon
    desc: Shell FreeBSD account reconnaissance
    crit: suspicious
    conf: 0.94
    all:
      - id: shell-passwd-group-enum
    any:
      - id: shell-privileged-group-grep
      - id: shell-active-session-commands
      - id: shell-password-status-loop
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
    needs: 2
