defaults:
  for: [pe]
  platforms: [windows]
  attack: T1087
traits:
  - id: lsa-enumerate-logon-sessions
    desc: Enumerate Windows logon sessions
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: LsaEnumerateLogonSessions
  - id: lsa-get-logon-session-data
    desc: Read Windows logon session data
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: LsaGetLogonSessionData
  - id: wts-query-session-information
    desc: Query terminal session metadata
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: WTSQuerySessionInformationW
  - id: sid-string-conversion
    desc: Convert SID to string form
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: ConvertSidToStringSidW
    unless:
      - id: metadata/vendor/bitdefender::version-resource-product
  - id: powerview-ps1-header
    desc: PowerView PowerSploit script header
    crit: component
    conf: 0.99
    for: [powershell]
    if:
      type: text
      substr: "PowerSploit File: PowerView.ps1"
  - id: domain-trust-enum-api
    desc: Enumerate Active Directory trusts
    crit: notable
    conf: 0.96
    for: [powershell]
    if:
      type: text
      substr: DsEnumerateDomainTrusts
  - id: net-session-enum-api
    desc: Enumerate remote SMB sessions
    crit: notable
    conf: 0.95
    for: [powershell]
    if:
      type: text
      substr: NetSessionEnum
  - id: net-loggedon-user-enum-api
    desc: Enumerate remote logged-on users
    crit: notable
    conf: 0.95
    for: [powershell]
    if:
      type: text
      substr: NetWkstaUserEnum
  - id: net-share-enum-api
    desc: Enumerate remote file shares
    crit: notable
    conf: 0.95
    for: [powershell]
    if:
      type: text
      substr: NetShareEnum
  - id: service-control-manager-admin-check
    desc: Probe remote SCM admin access
    crit: suspicious
    conf: 0.96
    for: [powershell]
    if:
      type: text
      substr: OpenSCManagerW
  - id: logon-user-api
    desc: Log on with supplied credentials
    crit: notable
    conf: 0.93
    for: [powershell]
    if:
      type: text
      substr: LogonUser
  - id: impersonate-logged-on-user-api
    desc: Impersonate alternate logon token
    crit: suspicious
    conf: 0.95
    for: [powershell]
    if:
      type: text
      substr: ImpersonateLoggedOnUser
  - id: revert-to-self-api
    desc: Revert alternate logon token
    crit: notable
    conf: 0.92
    for: [powershell]
    if:
      type: text
      substr: RevertToSelf
  - id: domain-user-location-hunter
    desc: Hunt user locations across domain
    crit: suspicious
    conf: 0.97
    for: [powershell]
    if:
      type: text
      substr: Find-DomainUserLocation
  - id: domain-share-file-hunter
    desc: Hunt interesting domain share files
    crit: suspicious
    conf: 0.97
    for: [powershell]
    if:
      type: text
      substr: Find-InterestingDomainShareFile
composite_rules:
  - id: sid-account-resolution
    desc: Resolve Windows accounts and SID strings
    crit: suspicious
    conf: 0.94
    all:
      - id: sid-string-conversion
      - id: micro-behaviors/os/user/lookup::lookup-account-name
  - id: interactive-session-account-enumeration
    desc: Enumerate interactive session accounts
    crit: suspicious
    conf: 0.94
    unless:
      - id: micro-behaviors/process/create/spawn::create-process-as-user
      - id: micro-behaviors/os/env/access::create-environment-block
    all:
      - id: lsa-enumerate-logon-sessions
      - id: wts-query-session-information
    any:
      - id: lsa-get-logon-session-data
      - id: sid-string-conversion
      - id: micro-behaviors/os/privilege/token::get-token-information
      - id: micro-behaviors/os/privilege/token::open-process-token
  - id: powerview-domain-recon-cluster
    desc: PowerView domain recon capability cluster
    crit: suspicious
    conf: 0.98
    for: [powershell]
    all:
      - id: powerview-ps1-header
    any:
      - id: domain-trust-enum-api
      - id: net-session-enum-api
      - id: net-loggedon-user-enum-api
      - id: net-share-enum-api
      - id: domain-user-location-hunter
      - id: domain-share-file-hunter
    needs: 3
  - id: alternate-credential-domain-enumeration
    desc: Alternate credential domain enumeration cluster
    crit: suspicious
    conf: 0.97
    for: [powershell]
    all:
      - id: logon-user-api
      - id: impersonate-logged-on-user-api
      - id: revert-to-self-api
    any:
      - id: net-session-enum-api
      - id: net-loggedon-user-enum-api
      - id: net-share-enum-api
      - id: service-control-manager-admin-check
      - id: micro-behaviors/os/service/remote::wnet-add-connection2-source
    needs: 2
