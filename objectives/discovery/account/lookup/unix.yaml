# Account Discovery via ID Resolution
# Detects patterns of resolving user/group IDs that may indicate account enumeration
# MBC: E1083 (File and Directory Discovery)
# ATT&CK: T1083, T1087
#
# User lookup traits: use micro-behaviors/os/user/lookup (canonical)
# Group lookup traits: use micro-behaviors/os/group/lookup (canonical)
defaults:
  for: [elf, macho, so, dylib, c]
  mbc: E1083
  attack: T1083
composite_rules:
  - id: account-name-resolution
    desc: Enumerate account names from IDs
    crit: notable
    conf: 0.85
    mbc: E1083
    attack: T1087
    any:
      - id: micro-behaviors/os/user/lookup
      - id: micro-behaviors/os/group/lookup
