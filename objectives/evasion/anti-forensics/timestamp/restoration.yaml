traits:
  - id: os-utime-restoration
    desc: Restoration of file timestamps using os.utime()
    crit: suspicious
    conf: 0.85
    attack: T1070.006
    for: [python]
    if:
      type: ast
      kind: call
      exact: os.utime
composite_rules:
  - id: timestamp-preservation
    desc: Preserving file timestamps after modification
    crit: suspicious
    conf: 0.9
    attack: T1070.006
    for: [python]
    all:
      - id: os-utime-restoration
      - id: objectives/execution/remote-command/protocol::generic-dup
