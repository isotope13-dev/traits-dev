defaults:
  platforms: [unix]
  for: [python, ruby, binaries, scripts]
  crit: notable
  conf: 0.8
  attack: T1620

traits:
  - id: memfd_create-syscall-number
    desc: memfd_create syscall number (319 or 279)
    if:
      type: text
      regex: '\b(319|279)\b'
  - id: ctypes-cdll-libc
    desc: ctypes loading libc
    if:
      type: text
      regex: 'ctypes\.CDLL\(.{0,50}libc.{0,50}\)'
  - id: ruby-fiddle-libc
    desc: Ruby Fiddle loading libc
    if:
      type: raw
      regex: 'Fiddle\.dlopen\(.{0,50}libc.{0,50}\)'

composite_rules:
  - id: script-memfd-create-hostile
    desc: Script-based memfd_create fileless execution
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/evasion/fileless/memory::libc-syscall
    any:
      - id: ctypes-cdll-libc
      - id: ruby-fiddle-libc
      - id: memfd_create-syscall-number
