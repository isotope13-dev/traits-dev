defaults:
  platforms:
    - unix
    - windows
  attack: T1620
traits:
  - id: memfd-create-fn
    desc: memfd_create function call
    crit: suspicious
    conf: 0.6
    for:
      - shell
      - python
    if:
      type: string_literal
      substr: memfd_create
  - id: memfd-create-call
    desc: memfd_create call in C
    crit: suspicious
    conf: 0.7
    for:
      - c
    if:
      type: ast
      kind: call
      exact: memfd_create
  - id: sys-memfd-create
    desc: SYS_memfd_create constant
    crit: suspicious
    conf: 0.6
    for: [scripts, pe, macho]
    if:
      type: string_literal
      substr: SYS_memfd_create
  - id: sys-memfd-create-source
    desc: SYS_memfd_create syscall source
    crit: suspicious
    conf: 0.86
    for: [c, cpp, rust, go]
    if:
      type: text
      substr: SYS_memfd_create
  - id: syscall-319
    desc: memfd_create syscall number 319
    crit: suspicious
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: text
      regex: syscall\s*\(\s*319
  - id: mfd-cloexec
    desc: MFD_CLOEXEC flag
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: MFD_CLOEXEC
  - id: libc-syscall
    desc: libc.syscall call
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: libc.syscall
  - id: proc-self-fd-dup
    desc: /proc/self/fd path
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      substr: /proc/self/fd
    unless:
      - type: basename
        exact: chrome-sandbox
      - type: basename
        exact: tabby
      - type: text
        substr: gnulib/import/chdir-long.c
      - id: well-known/tool/reverse-engineering/windows-debugger::gdbserver-debugger-server
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/structure::js-large-minified-bundle
  - id: proc-self-fd-dup-slash
    desc: /proc/self/fd/ path
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: /proc/self/fd/
  - id: proc-self-exe-source
    desc: Reads own executable via procfs
    crit: notable
    conf: 0.86
    for: [c, cpp, rust, go, elf]
    unless:
      - id: well-known/tool/development/gnat
      - id: well-known/app/fuel-sway::release-path
      - type: basename
        regex: 'FuelLabs-sway|[\\/]forc-binaries[\\/]'
    downgrade:
      any:
        - id: objectives/anti-static/pack/detect::upx-packer-string
        - id: metadata/lang/compiler/systems::rust-binary
        - id: well-known/app/fuel-sway::release-path
    if:
      type: text
      substr: /proc/self/exe
  - id: unlink-argv0-source
    desc: Deletes argv0 executable path
    crit: suspicious
    conf: 0.86
    for: [c, cpp, elf]
    if:
      type: text
      regex: '\bunlink\s*\(\s*argv\s*\[\s*0\s*\]\s*\)'
  - id: execveat-call
    desc: execveat file descriptor execution
    crit: suspicious
    conf: 0.9
    for: [c, cpp, rust, go, elf]
    if:
      type: text
      regex: '\bexecveat\s*\(|\bsyscall\s*\(\s*(SYS_execveat|322)\b'
    unless:
      - id: well-known/lib/glibc
  - id: memfd-reexec-guard
    desc: memfd re-execution guard variable
    crit: suspicious
    conf: 0.86
    for: [c, cpp, rust, go, elf]
    if:
      type: text
      # Short env-var style guard (2-8 uppercase chars). Excludes the
      # common Linux kernel pattern `_MFD_<CHIPNAME>_<FILENAME>_H__`
      # (include guards for Multi-Function Device drivers), which are
      # long and always end in _H_ or _H__.
      regex: '(^|[^A-Z0-9_])_(MFD|MEMFD)_[A-Z0-9]{2,8}([^A-Z0-9_]|$)'
  - id: clears-memfd-cloexec
    desc: Clears close-on-exec on memfd
    crit: suspicious
    conf: 0.86
    for: [c, cpp, rust, go, elf]
    if:
      type: text
      regex: 'F_SETFD[\\s\\S]{0,120}(0|FD_CLOEXEC)_MALICIOUS'
  - id: os-exec
    desc: os.exec Python call
    crit: suspicious
    conf: 0.5
    for:
      - python
    downgrade:
      any:
        - id: well-known/tool/development/debugpy
        - type: basename
          regex: '(?i)(debugpy|pydevd)'
    unless:
      - id: well-known/app/crunr::crunr-demo-marker
    if:
      type: string_literal
      substr: os.exec
  - id: subprocess-mod
    desc: subprocess module
    crit: component
    conf: 0.3
    for:
      - python
    if:
      type: string_literal
      substr: subprocess
  - id: ctypes-mod
    desc: ctypes module
    crit: component
    conf: 0.4
    for:
      - python
    if:
      type: string_literal
      substr: ctypes
  - id: ctypes-cdll-dup
    desc: CDLL ctypes class
    crit: component
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      exact: CDLL
  - id: dot-syscall
    desc: Node syscall binding invocation marker
    crit: suspicious
    conf: 0.5
    for:
      - python
    if:
      type: text
      substr: .syscall(
  - id: requests-get-dup
    desc: requests.get HTTP call
    crit: notable
    conf: 0.4
    for:
      - python
    if:
      type: string_literal
      regex: requests\.get\s*\(
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
  - id: urllib-mod
    desc: urllib2 module
    crit: component
    conf: 0.3
    for:
      - python
    if:
      type: string_literal
      word: urllib2
  - id: http-client-dup
    desc: http.client module
    crit: component
    conf: 0.3
    for:
      - python
    if:
      type: string_literal
      substr: http.client
  - id: dot-content
    desc: .content response attribute
    crit: component
    conf: 0.3
    for:
      - python
    if:
      type: text
      regex: \b(resp|response)\.content\b|requests\.(get|post).{0,30}\.content\b
  - id: os-write
    desc: os.write function
    crit: notable
    conf: 0.4
    for:
      - python
    if:
      type: text
      substr: os.write(
  - id: write-fd
    desc: write(fd call
    crit: component
    conf: 0.4
    for:
      - c
    if:
      type: text
      regex: '\bwrite\s*\(\s*fd\s*,'
  - id: os-lseek
    desc: os.lseek function
    crit: component
    conf: 0.4
    for:
      - python
    if:
      type: text
      substr: os.lseek(
  - id: seek-set
    desc: SEEK_SET constant
    crit: component
    conf: 0.3
    for:
      - python
      - c
    unless:
      - id: metadata/lang/source::windows-generated-def-path
    if:
      type: string_literal
      substr: SEEK_SET
  - id: shm-open
    desc: shm_open function
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: shm_open
  - id: dev-shm-dup
    desc: Shared memory filesystem path reference
    crit: notable
    conf: 0.5
    for: [scripts, binaries]
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
    if:
      type: string_literal
      substr: /dev/shm
composite_rules:
  - id: execve-fn
    desc: execve function call alias
    crit: suspicious
    conf: 0.4
    for: [scripts, binaries]
    any:
      - id: micro-behaviors/process/create/execv::c-execve
      - id: micro-behaviors/process/create/execv::c-exec-variants
  - id: exec-function-comp
    desc: Execution function calls
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    any:
      - id: os-exec
      - id: subprocess-mod
  - id: http-download-python
    desc: Python HTTP download libraries for
    crit: suspicious
    conf: 0.8
    attack: T1105
    for:
      - python
    any:
      - id: objectives/evasion/fileless/memory::requests-get-dup
      - id: urllib-mod
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen
      - id: objectives/evasion/fileless/memory::http-client-dup
      - id: dot-content
  - id: fd-write-raw
    desc: Writes data to file descriptor
    crit: suspicious
    conf: 0.8
    for:
      - python
      - c
    any:
      - id: os-write
      - id: write-fd
  - id: memfd-create-comp
    desc: Creates anonymous memory-backed file (memfd_create
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries, c, cpp, rust, go, elf]
    any:
      - id: memfd-create-fn
      - id: memfd-create-call
      - id: sys-memfd-create
      - id: sys-memfd-create-source
  - id: proc-fd-path
    desc: References /proc/self/fd path
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries, c, cpp, rust, go, elf]
    any:
      - id: objectives/evasion/fileless/memory::proc-self-fd-dup
      - id: objectives/evasion/fileless/memory::proc-self-fd-dup-slash
  - id: memfd-reexec-target
    desc: Executes from memfd file descriptor
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries, c, cpp, rust, go, elf]
    any:
      - id: execveat-call
      - id: proc-fd-path
  - id: memfd-reexec-cleanup
    desc: Cleans artifacts before memfd reexec
    crit: suspicious
    conf: 0.92
    for: [c, cpp, rust, go, elf]
    any:
      - id: clears-memfd-cloexec
      - id: memfd-reexec-guard
      - id: unlink-argv0-source
      - id: micro-behaviors/fs/file/delete::unlink
  - id: proc-fd-exec
    desc: Executes binary from /proc/self/fd (fileless
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    all:
      - id: proc-fd-path
      - id: exec-function
  - id: memfd-self-reexec
    desc: Re-executes itself from anonymous memory
    crit: hostile
    conf: 0.98
    attack: "T1620, T1070.004"
    for: [c, cpp, rust, go, elf]
    all:
      - id: memfd-create-comp
      - id: proc-self-exe-source
      - id: memfd-reexec-target
      - id: memfd-reexec-cleanup
  - id: ctypes-syscall
    desc: Direct syscall invocation via ctypes
    crit: suspicious
    conf: 0.9
    attack: T1106
    for:
      - python
    all:
      - id: ctypes-mod
      - id: dot-syscall
      - id: objectives/evasion/fileless/memory::ctypes-cdll-dup
  - id: fd-write
    desc: Writes binary data to file
    crit: notable
    conf: 0.8
    for:
      - python
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
    all:
      - id: os-write
    any:
      - id: os-lseek
      - id: seek-set
  - id: download-memfd-exec
    desc: Downloads binary and executes via
    crit: suspicious
    conf: 0.98
    for: [scripts, binaries]
    all:
      - id: http-download-python
      - id: memfd-create
    any:
      - id: exec-function
      - id: fd-write-raw
  - id: shm-exec
    desc: Uses shared memory for fileless
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    all:
      - id: shm-open
    any:
      - id: objectives/evasion/fileless/memory::dev-shm-dup
      - id: micro-behaviors/mem/alloc/executable::mmap-symbol
      - id: execve-fn
