defaults:
  platforms:
    - unix
    - windows
  attack: T1620
traits:
  - id: memfd-create-fn
    desc: memfd_create function call
    crit: suspicious
    conf: 0.6
    for:
      - shell
      - python
    if:
      type: string_literal
      substr: memfd_create
  - id: memfd-create-call
    desc: memfd_create call in C
    crit: suspicious
    conf: 0.7
    for:
      - c
    if:
      type: ast
      kind: call
      exact: memfd_create
  - id: sys-memfd-create
    desc: SYS_memfd_create constant
    crit: suspicious
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: SYS_memfd_create
  - id: syscall-319
    desc: memfd_create syscall number 319
    crit: suspicious
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: text
      regex: syscall\s*\(\s*319
  - id: mfd-cloexec
    desc: MFD_CLOEXEC flag
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: MFD_CLOEXEC
  - id: libc-syscall
    desc: libc.syscall call
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: libc.syscall
  - id: proc-self-fd-dup
    desc: /proc/self/fd path
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      substr: /proc/self/fd
    unless:
      - type: basename
        exact: chrome-sandbox
      - type: basename
        exact: tabby
      - type: text
        substr: gnulib/import/chdir-long.c
      - id: well-known/tool/reverse-engineering::gdbserver-debugger-server
  - id: proc-self-fd-dup-slash
    desc: /proc/self/fd/ path
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: /proc/self/fd/
  - id: os-exec
    desc: os.exec Python call
    crit: suspicious
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      substr: os.exec
  - id: subprocess-mod
    desc: subprocess module
    crit: component
    conf: 0.3
    for:
      - python
    if:
      type: string_literal
      substr: subprocess
  - id: ctypes-mod
    desc: ctypes module
    crit: component
    conf: 0.4
    for:
      - python
    if:
      type: string_literal
      substr: ctypes
  - id: ctypes-cdll-dup
    desc: CDLL ctypes class
    crit: component
    conf: 0.5
    for:
      - python
    if:
      type: string_literal
      exact: CDLL
  - id: dot-syscall
    desc: Node syscall binding invocation marker
    crit: suspicious
    conf: 0.5
    for:
      - python
    if:
      type: text
      substr: .syscall(
  - id: requests-get-dup
    desc: requests.get HTTP call
    crit: suspicious
    conf: 0.4
    for:
      - python
    if:
      type: string_literal
      regex: requests\.get\s*\(
    unless:
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/scripted::pytest
  - id: urllib-mod
    desc: urllib2 module
    crit: component
    conf: 0.3
    for:
      - python
    if:
      type: string_literal
      word: urllib2
  - id: http-client-dup
    desc: http.client module
    crit: component
    conf: 0.3
    for:
      - python
    if:
      type: string_literal
      substr: http.client
  - id: dot-content
    desc: .content response attribute
    crit: component
    conf: 0.3
    for:
      - python
    if:
      type: text
      regex: \b(resp|response)\.content\b|requests\.(get|post).{0,30}\.content\b
  - id: os-write
    desc: os.write function
    crit: notable
    conf: 0.4
    for:
      - python
    if:
      type: text
      substr: os.write(
  - id: write-fd
    desc: write(fd call
    crit: component
    conf: 0.4
    for:
      - c
    if:
      type: text
      regex: '\bwrite\s*\(\s*fd\s*,'
  - id: os-lseek
    desc: os.lseek function
    crit: suspicious
    conf: 0.4
    for:
      - python
    if:
      type: text
      substr: os.lseek(
  - id: seek-set
    desc: SEEK_SET constant
    crit: component
    conf: 0.3
    for:
      - python
      - c
    unless:
      - id: metadata/lang/source::windows-generated-def-path
    if:
      type: string_literal
      substr: SEEK_SET
  - id: shm-open
    desc: shm_open function
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: shm_open
  - id: dev-shm-dup
    desc: Shared memory filesystem path reference
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
    if:
      type: string_literal
      substr: /dev/shm
composite_rules:
  - id: execve-fn
    desc: execve function call alias
    crit: suspicious
    conf: 0.4
    for: [scripts, binaries]
    any:
      - id: micro-behaviors/process/create/execv::c-execve
      - id: micro-behaviors/process/create/execv::c-exec-variants
  - id: exec-function-comp
    desc: Execution function calls
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    any:
      - id: os-exec
      - id: subprocess-mod
  - id: http-download-python
    desc: Python HTTP download libraries for
    crit: suspicious
    conf: 0.8
    attack: T1105
    for:
      - python
    any:
      - id: objectives/evasion/fileless/memory::requests-get-dup
      - id: urllib-mod
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen
      - id: objectives/evasion/fileless/memory::http-client-dup
      - id: dot-content
  - id: fd-write-raw
    desc: Writes data to file descriptor
    crit: suspicious
    conf: 0.8
    for:
      - python
      - c
    any:
      - id: os-write
      - id: write-fd
  - id: memfd-create-comp
    desc: Creates anonymous memory-backed file (memfd_create
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    any:
      - id: memfd-create-fn
      - id: memfd-create-call
      - id: sys-memfd-create
  - id: proc-fd-path
    desc: References /proc/self/fd path
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    any:
      - id: objectives/evasion/fileless/memory::proc-self-fd-dup
      - id: objectives/evasion/fileless/memory::proc-self-fd-dup-slash
  - id: proc-fd-exec
    desc: Executes binary from /proc/self/fd (fileless
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    all:
      - id: proc-fd-path
      - id: exec-function
  - id: ctypes-syscall
    desc: Direct syscall invocation via ctypes
    crit: suspicious
    conf: 0.9
    attack: T1106
    for:
      - python
    all:
      - id: ctypes-mod
      - id: dot-syscall
      - id: objectives/evasion/fileless/memory::ctypes-cdll-dup
  - id: fd-write
    desc: Writes binary data to file
    crit: suspicious
    conf: 0.8
    for:
      - python
    all:
      - id: os-write
    any:
      - id: os-lseek
      - id: seek-set
  - id: download-memfd-exec
    desc: Downloads binary and executes via
    crit: suspicious
    conf: 0.98
    for: [scripts, binaries]
    all:
      - id: http-download-python
      - id: memfd-create
    any:
      - id: exec-function
      - id: fd-write-raw
  - id: shm-exec
    desc: Uses shared memory for fileless
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    all:
      - id: shm-open
    any:
      - id: objectives/evasion/fileless/memory::dev-shm-dup
      - id: micro-behaviors/mem/alloc/executable::mmap-symbol
      - id: execve-fn
