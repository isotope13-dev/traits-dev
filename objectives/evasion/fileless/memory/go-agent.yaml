defaults:
  platforms: [linux, windows]
  for: [elf, pe]
  attack: T1059,T1620,T1105
  mbc: B0022

composite_rules:
  - id: go-agent-fileless-remote-exec
    desc: Go agent remotely executes fileless payloads
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/backdoor/rat/multi::dispatcher-loop
      - id: objectives/command-and-control/backdoor/rat/multi::dispatcher-exec-handler
      - id: objectives/command-and-control/backdoor/rat/multi::fileless-exec-handler
      - id: micro-behaviors/mem/anonymous/create::memfd-create-go
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab

  - id: go-agent-windows-fileless-remote-exec
    desc: Go agent remotely executes a fileless payload on Windows
    crit: hostile
    conf: 0.99
    platforms: [windows]
    for: [pe]
    all:
      - id: objectives/command-and-control/backdoor/rat/multi::dispatcher-loop
      - id: objectives/command-and-control/backdoor/rat/multi::dispatcher-exec-handler
      - id: objectives/command-and-control/backdoor/rat/multi::fileless-exec-handler
    any:
      - id: objectives/evasion/fileless/memory::remote-injection
      - id: micro-behaviors/mem/create/fileless::nt-section-map-exec-primitives
