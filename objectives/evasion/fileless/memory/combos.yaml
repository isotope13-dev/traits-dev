traits:
  - id: open-process-sym
    desc: OpenProcess/NtOpenProcess symbol
    crit: component
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: symbol
      regex: ^(OpenProcess|NtOpenProcess)$
  - id: alloc-memory-sym
    desc: VirtualAllocEx/NtAllocateVirtualMemory symbol
    crit: component
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: symbol
      regex: ^(VirtualAllocEx|NtAllocateVirtualMemory)$
  - id: write-memory-sym
    desc: WriteProcessMemory/NtWriteVirtualMemory symbol
    crit: component
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: symbol
      regex: ^(WriteProcessMemory|NtWriteVirtualMemory)$
  - id: protect-memory-sym
    desc: VirtualProtectEx/NtProtectVirtualMemory symbol
    crit: component
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: symbol
      regex: ^(VirtualProtectEx|NtProtectVirtualMemory)$
  - id: create-thread-sym
    desc: Remote thread creation symbol
    crit: component
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: symbol
      regex: ^(CreateRemoteThread(Ex)?|NtCreateThreadEx|RtlCreateUserThread)$
  - id: fexecve-symbol
    desc: Linux fexecve symbol reference (fileless execution)
    crit: notable
    conf: 0.9
    platforms:
      - linux
    for:
      - elf
    if:
      type: symbol
      regex: ^_?fexecve$
  - id: python-encode-call
    desc: Python encode method call
    crit: notable
    conf: 0.8
    platforms:
      - windows
      - linux
      - macos
    for:
      - python
    if:
      type: ast
      kind: call
      exact: encode
  - id: python-b64decode-call
    desc: Python base64 decode call
    crit: notable
    conf: 0.8
    platforms:
      - windows
      - linux
      - macos
    for:
      - python
    if:
      type: ast
      kind: call
      exact: b64decode
  - id: system-informer-marker
    desc: System Informer product marker
    crit: component
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      substr: System Informer
composite_rules:
  - id: alloc-or-protect
    desc: Memory allocation or protection change
    crit: component
    platforms:
      - windows
    for:
      - pe
      - dll
    any:
      - id: alloc-memory-sym
      - id: protect-memory-sym
  - id: remote-injection
    desc: Remote process memory manipulation
    crit: suspicious
    conf: 0.9
    attack: T1055
    platforms:
      - windows
    for:
      - pe
      - dll
    all:
      - id: open-process-sym
      - id: write-memory-sym
      - id: alloc-or-protect
      - id: create-thread-sym
    unless:
      - id: metadata/binary/metrics::many-exports
      - id: system-informer-marker
    downgrade:
      any:
        - type: text
          substr: Valve Corp.
  - id: linux-memfd
    desc: Fileless execution via anonymous memory
    crit: suspicious
    conf: 0.9
    attack: T1055
    mbc: B0033
    platforms:
      - linux
    for:
      - elf
    all:
      - id: objectives/evasion/fileless/memory::memfd-create
    any:
      - id: fexecve-symbol
      - id: micro-behaviors/process/create/execv::c-execve
      - id: micro-behaviors/mem/protect/modify::mprotect-symbol
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::shell-interpreter
  - id: python-shellcode
    desc: Python shellcode injection via VirtualProtect
    crit: suspicious
    conf: 0.95
    attack: T1055
    mbc: B0033
    platforms:
      - windows
    for:
      - python
    all:
      - id: micro-behaviors/mem/protect/modify::virtualprotect-ctypes
    any:
      - id: python-encode-call
      - id: python-b64decode-call
