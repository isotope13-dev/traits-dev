defaults:
  platforms: [windows]
  for: [binaries]

traits:
  - id: transacted-self-read-loader
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: objectives/evasion/masquerade/cert::objectives/evasion/fileless/memory::transacted-self-read-loader
  - id: exec-function
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      exact: __cleave_missing_exec_function__
  - id: memfd-create
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      exact: __cleave_missing_memfd_create__
