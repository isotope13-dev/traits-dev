defaults:
  for: [pe]
  platforms: [windows]
  attack: T1055
  mbc: B0033
composite_rules:
  - id: encrypted-rwx-thread-loader
    desc: Encrypted payload in RWX thread buffer
    crit: hostile
    conf: 0.99
    attack: T1027,T1055,T1620
    for: [pe, dll]
    all:
      - id: micro-behaviors/mem/alloc/executable::virtualalloc-rwx-commit-resolved-x64
      - id: micro-behaviors/process/thread/create::create-thread-buffer-resolved-x64
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-data-section
      - id: micro-behaviors/crypto/symmetric/aes/constant::aes-sbox-bytes-pe-rdata
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/

  - id: fiber-rwx-decoder-loader
    desc: RWX buffer dispatched through a fiber
    crit: hostile
    conf: 0.98
    for: [pe, dll]
    all:
      - id: micro-behaviors/mem/alloc/executable::virtualalloc-rwx-commit-x86-stack
      - id: micro-behaviors/process/thread/lifecycle::create-fiber
      - id: micro-behaviors/process/thread/lifecycle::switch-to-fiber
  - id: rwx-decoder-buffer-staging
    desc: RWX buffer staged by native decoder
    crit: hostile
    conf: 0.94
    for: [pe, dll]
    all:
      - id: micro-behaviors/data/encode/xor::xor-byte-decoder-loop
      - id: metadata/binary/anomaly/format::pe-section-overlap
      - id: micro-behaviors/mem/alloc/executable::virtualalloc-rwx-commit-x86-direct
    any:
      - id: metadata/binary/resource::executable-rsrc-section
      - id: metadata/hardening/memory::wx-section
  - id: encoded-self-loader
    desc: Self-reading encoded payload memory loader
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/anti-static/obfuscation/payload/section::m-padded-shellcode-rdata
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: micro-behaviors/crypto/symmetric/stream::rc4-bytecode
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/anti-static/obfuscation/payload/self-read::pe-overlay-self-extractor
      - id: metadata/binary/layout::medium-overlay-size
      - id: metadata/binary/layout::has-overlay
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform/
  - id: raw-file-bytes-as-wait-callback
    desc: File bytes made executable via wait callback
    crit: hostile
    conf: 0.98
    attack: T1027.007,T1620
    size_max: 65536
    all:
      - id: objectives/anti-static/obfuscation/native-api-hash::djb2-native-ntdll-hash-profile
      - id: micro-behaviors/os/api-resolution/hash-based::peb-ldr-list-access-x86
      - id: objectives/anti-static/obfuscation/native-api-hash::ntcreatefile-djb2-hash
      - id: objectives/anti-static/obfuscation/native-api-hash::ntqueryinformationfile-djb2-hash
      - id: objectives/anti-static/obfuscation/native-api-hash::ntreadfile-djb2-hash
      - id: objectives/anti-static/obfuscation/native-api-hash::ntclose-djb2-hash
      - id: objectives/anti-static/obfuscation/native-api-hash::ntprotectvirtualmemory-djb2-hash
      - id: objectives/anti-static/obfuscation/native-api-hash::rtlregisterwait-djb2-hash
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/

  - id: x86-virtualprotectex-data-dispatch
    desc: x86 in-process data buffer made RWX and called indirectly
    crit: hostile
    conf: 0.98
    attack: T1620
    all:
      - id: micro-behaviors/mem/protect/modify::virtualprotectex-rwx-call-x86
      - id: micro-behaviors/data/control-flow/dispatch::x86-global-pointer-indirect-call
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
