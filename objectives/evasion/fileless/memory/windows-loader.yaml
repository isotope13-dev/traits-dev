defaults:
  for: [pe]
  platforms: [windows]
  attack: T1055
  mbc: B0033
composite_rules:
  - id: rwx-decoder-buffer-staging
    desc: RWX buffer staged by native decoder
    crit: hostile
    conf: 0.94
    for: [pe, dll]
    all:
      - id: micro-behaviors/data/encode/xor::xor-byte-decoder-loop
      - id: metadata/binary/anomaly/format::pe-section-overlap
      - id: micro-behaviors/mem/alloc/executable::virtualalloc-rwx-commit-x86-direct
    any:
      - id: metadata/binary/resource::executable-rsrc-section
      - id: metadata/hardening/memory::wx-section
  - id: encoded-self-loader
    desc: Self-reading encoded payload memory loader
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/anti-static/obfuscation/payload/section::m-padded-shellcode-rdata
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: micro-behaviors/crypto/symmetric/stream::rc4-bytecode
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/anti-static/obfuscation/payload/self-read::pe-overlay-self-extractor
      - id: metadata/binary/layout::medium-overlay-size
      - id: metadata/binary/layout::has-overlay
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform/
