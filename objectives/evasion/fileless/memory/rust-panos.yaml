defaults:
  platforms: [unix]
  for: [rust, elf]
  attack: T1620

traits:
  - id: rust-dev-shm-helper-stage
    desc: Rust dev-shm helper stage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /dev/shm/.cache_update_helper

  - id: rust-dev-shm-telemetry-buffer
    desc: Rust dev-shm telemetry buffer
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /dev/shm/.telemetry_buffer

composite_rules:
  - id: rust-fileless-devshm-stage
    desc: Rust dev-shm fileless stage
    crit: hostile
    conf: 0.98
    all:
      - id: rust-dev-shm-helper-stage
      - id: rust-dev-shm-telemetry-buffer
