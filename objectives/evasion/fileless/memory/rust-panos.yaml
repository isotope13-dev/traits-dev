defaults:
  platforms: [panos, appliance, unix]
  for: [rust, elf]
  attack: T1620

traits:
  - id: rust-panos-dev-shm-helper
    desc: Rust PAN-OS dev shm helper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /dev/shm/.cache_update_helper

  - id: rust-panos-telemetry-buffer
    desc: Rust PAN-OS telemetry buffer
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /dev/shm/.telemetry_buffer

composite_rules:
  - id: rust-panos-fileless-devshm-stage
    desc: Rust PAN-OS devshm fileless stage
    crit: hostile
    conf: 0.98
    all:
      - id: rust-panos-dev-shm-helper
      - id: rust-panos-telemetry-buffer
