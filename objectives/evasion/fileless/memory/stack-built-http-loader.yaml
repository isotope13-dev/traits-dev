defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1105,T1620
composite_rules:
  - id: stack-built-http-buffer-execution
    desc: HTTP payload buffer made executable and started
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/url/build::stack-built-https-url-x64
      - id: micro-behaviors/mem/alloc/executable::virtualalloc-readwrite-commit-resolved-x64
      - id: micro-behaviors/mem/protect/modify::virtualprotect-executable-resolved-x64
      - id: micro-behaviors/process/thread/create::create-thread-buffer-resolved-x64-stack-args
