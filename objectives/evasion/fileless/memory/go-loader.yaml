defaults:
  platforms:
    - unix
  for:
    - elf
traits:
  - id: runmemfd-symbol
    desc: Go runMemfd function name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: main.runMemfd
  - id: memfdcreate-symbol
    desc: Go memfdCreate function name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: main.memfdCreate
  - id: proc-self-fd-format
    desc: proc self fd format string
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: /proc/self/fd/%d
    unless:
      - id: well-known/app/drivers::nvidia-linux-driver-component
composite_rules:
  - id: go-memfd-loader
    desc: Go memfd staging loader
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/evasion/fileless/memory::proc-self-fd-dup
    needs: 2
    any:
      - id: runmemfd-symbol
      - id: memfdcreate-symbol
      - id: proc-self-fd-format
  - id: disguised-go-memfd-loader
    desc: Go memfd loader with masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: go-memfd-loader
      - id: objectives/evasion/masquerade/process/name::fake-system-process
    any:
      - id: metadata/binary/section/metrics::go-large-noptrdata
      - id: metadata/lang/compiler/systems::go-elf-rich-runtime-metadata
