defaults:
  platforms: [unix]
  for: [python, ruby, binaries, scripts]
  crit: notable
  conf: 0.8
  attack: T1620

traits:
- id: ctypes-cdll-libc
  desc: ctypes loading libc
  if:
    type: text
    regex: 'ctypes\.CDLL\(.{0,50}libc.{0,50}\)'
- id: ruby-fiddle-libc
  desc: Ruby Fiddle loading libc
  if:
    type: text
    regex: 'Fiddle\.dlopen\(.{0,50}libc.{0,50}\)'

- id: memfd_create-syscall-number--319
  desc: memfd_create Linux syscall number (319)
  crit: component
  for: [elf, python, ruby, shell]
  if:
    type: text
    word: '319'
- id: memfd_create-syscall-number--279
  desc: memfd_create Linux syscall number (279)
  crit: component
  for: [elf, python, ruby, shell]
  if:
    type: text
    word: '279'
composite_rules:
- id: memfd_create-syscall-number
  desc: memfd_create Linux syscall number (319 / 279)
  crit: component
  for: [elf, python, ruby, shell]
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  any:
  - id: memfd_create-syscall-number--319
  - id: memfd_create-syscall-number--279
- id: script-memfd-create-hostile
  desc: Script-based memfd_create fileless execution
  crit: hostile
  conf: 0.95
  all:
  - id: objectives/evasion/fileless/memory::libc-syscall
  any:
  - id: ctypes-cdll-libc
  - id: ruby-fiddle-libc
  - id: memfd_create-syscall-number
