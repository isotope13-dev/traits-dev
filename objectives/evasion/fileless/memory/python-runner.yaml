# Python memory runners
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: python-shellcode-runner
    desc: Python script executes shellcode in memory via ctypes
    crit: hostile
    conf: 0.95
    for: [python]
    attack: "T1055"
    all:
      - id: objectives/evasion/process/injection::python-virtualprotect-rwx
      - id: objectives/evasion/process/injection::python-cfunctype-cast
