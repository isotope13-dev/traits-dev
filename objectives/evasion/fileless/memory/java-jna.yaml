defaults:
  attack: "T1620"
  for: [binaries, source, scripts, manifests, documents, media, data]
  platforms: [linux, macos, windows, unix, android, ios]

traits:
  - id: jna-native-bridge-types
    desc: Java JNA native bridge types
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: com/sun/jna/(Pointer|Function|Native)

  - id: getfunction-ref
    desc: getFunction string reference
    crit: component
    conf: 0.95
    if:
      type: raw
      exact: getFunction

  - id: invokevoid-ref
    desc: invokeVoid string reference
    crit: component
    conf: 0.95
    if:
      type: raw
      exact: invokeVoid

  - id: shellcode-resource-staging
    desc: Embedded shellcode resource staging
    crit: suspicious
    conf: 0.96
    attack: "T1027"
    count_min: 3
    if:
      type: raw
      regex: getResourceAsStream|Client\.png|shellcode

  - id: xordecrypt-ref
    desc: xorDecrypt string reference
    crit: component
    conf: 0.95
    if:
      type: raw
      exact: xorDecrypt

  - id: encrypted-shellcode-ref
    desc: encryptedShellcode string reference
    crit: component
    conf: 0.95
    if:
      type: raw
      exact: encryptedShellcode

  - id: decrypted-ref
    desc: decrypted string reference
    crit: component
    conf: 0.9
    if:
      type: text
      word: decrypted
    not:
      - substr: id-cmc-decryptedPOP

  - id: consolewindowclass-ref
    desc: ConsoleWindowClass reference
    crit: component
    conf: 0.95
    if:
      type: raw
      exact: ConsoleWindowClass

  - id: findwindowa-ref
    desc: FindWindowA string reference
    crit: component
    conf: 0.95
    if:
      type: raw
      exact: FindWindowA

composite_rules:
  - id: jna-winapi-exec-bridge
    desc: JNA WinAPI execution bridge
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: getfunction-ref
      - id: invokevoid-ref
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-free
      - id: jna-native-bridge-types

  - id: xor-shellcode-loader
    desc: XOR shellcode decrypt routine
    crit: suspicious
    conf: 0.96
    attack: "T1140"
    all:
      - id: xordecrypt-ref
      - id: encrypted-shellcode-ref
    any:
      - id: decrypted-ref
      - id: shellcode-resource-staging

  - id: console-hide-primitives
    desc: Console hide WinAPI primitives
    crit: suspicious
    conf: 0.95
    attack: "T1564"
    all:
      - id: consolewindowclass-ref
      - id: findwindowa-ref

  - id: java-jna-memory-loader
    desc: Java JNA memory shellcode loader
    crit: hostile
    conf: 0.99
    all:
      - id: jna-native-bridge-types
      - id: jna-winapi-exec-bridge
      - id: shellcode-resource-staging
      - id: xor-shellcode-loader

  - id: java-jna-memory-loader-stealth
    desc: Java JNA shellcode loader stealth
    crit: hostile
    conf: 0.99
    all:
      - id: java-jna-memory-loader
      - id: console-hide-primitives
