defaults:
  platforms: [windows, unix]
  attack: "T1620"
  for: [java, class]

traits:
  - id: jna-native-bridge-types
    desc: Java JNA native bridge types
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: com/sun/jna/(Pointer|Function|Native)

  - id: jna-win32-stdcall-bridge
    desc: JNA Win32 stdcall bridge types
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: com/sun/jna/win32/(StdCallLibrary|W32APIOptions)

  - id: getfunction-ref
    desc: getFunction string reference
    crit: component
    conf: 0.95
    if:
      type: text
      word: getFunction

  - id: invokevoid-ref
    desc: invokeVoid string reference
    crit: component
    conf: 0.95
    if:
      type: text
      word: invokeVoid

  - id: shellcode-resource-staging
    desc: Embedded shellcode resource staging
    crit: suspicious
    conf: 0.96
    attack: "T1027"
    if:
      type: text
      regex: Client\.png|shellcode|loadShellcode

  - id: xordecrypt-ref
    desc: xorDecrypt string reference
    crit: component
    conf: 0.95
    if:
      type: text
      word: xorDecrypt

  - id: xor-shellcode-key
    desc: Hardcoded XOR shellcode key
    crit: suspicious
    conf: 0.98
    attack: "T1140"
    if:
      type: text
      exact: M3u&Zp@9f#W1q!Xs7J^uLk2$

  - id: encrypted-shellcode-ref
    desc: encryptedShellcode string reference
    crit: component
    conf: 0.95
    if:
      type: text
      word: encryptedShellcode

  - id: decrypted-ref
    desc: decrypted string reference
    crit: component
    conf: 0.9
    if:
      type: text
      word: decrypted
    not:
      - substr: id-cmc-decryptedPOP

  - id: consolewindowclass-ref
    desc: ConsoleWindowClass reference
    crit: component
    conf: 0.95
    if:
      type: text
      word: ConsoleWindowClass

  - id: findwindowa-ref
    desc: FindWindowA string reference
    crit: component
    conf: 0.95
    if:
      type: text
      word: FindWindowA

  - id: showwindow-ref
    desc: ShowWindow string reference
    crit: component
    conf: 0.95
    if:
      type: text
      word: ShowWindow

  - id: sw-hide-ref
    desc: SW_HIDE string reference
    crit: component
    conf: 0.95
    if:
      type: text
      word: SW_HIDE

  - id: archive-loader-layout
    desc: Shellcode runner archive layout
    crit: suspicious
    conf: 0.98
    for: [jar, zip]
    count_min: 3
    if:
      type: text
      regex: ShellcodeRunner\.class|ShellcodeData\.class|Client\.png

  - id: archive-jna-core-classes
    desc: Bundled JNA core class archive paths
    crit: component
    conf: 0.96
    for: [jar, zip]
    count_min: 2
    if:
      type: text
      regex: com/sun/jna/(Native|Pointer|Function)\.class

  - id: archive-jna-win32-dispatch
    desc: Bundled JNA Win32 dispatch paths
    crit: component
    conf: 0.98
    for: [jar, zip]
    count_min: 2
    if:
      type: text
      regex: jna/win32-(x86|x86-64)/jnidispatch\.dll

  - id: archive-xordecrypt-ref
    desc: xorDecrypt archive string reference
    crit: component
    conf: 0.95
    for: [jar, zip]
    if:
      type: text
      exact: xorDecrypt

composite_rules:
  - id: jna-rwx-allocation-primitives
    desc: JNA RWX allocation primitives
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-java-ref
      - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite-java-ref
      - id: micro-behaviors/mem/alloc/executable::mem-commit-java-ref
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-free-java-ref
      - id: jna-native-bridge-types

  - id: jna-winapi-exec-bridge
    desc: JNA WinAPI execution bridge
    crit: suspicious
    conf: 0.97
    all:
      - id: jna-rwx-allocation-primitives
      - id: getfunction-ref
      - id: invokevoid-ref
    any:
      - id: encrypted-shellcode-ref
      - id: jna-native-bridge-types

  - id: xor-shellcode-loader
    desc: XOR shellcode decrypt routine
    crit: suspicious
    conf: 0.96
    attack: "T1140"
    all:
      - id: xordecrypt-ref
      - id: encrypted-shellcode-ref
    any:
      - id: xor-shellcode-key
      - id: shellcode-resource-staging
      - id: decrypted-ref

  - id: console-hide-primitives
    desc: Console hide WinAPI primitives
    crit: suspicious
    conf: 0.95
    attack: "T1564"
    all:
      - id: consolewindowclass-ref
      - id: findwindowa-ref
      - id: showwindow-ref
      - id: sw-hide-ref

  - id: java-jna-shellcode-runner
    desc: Java JNA shellcode runner
    crit: hostile
    conf: 0.99
    all:
      - id: jna-native-bridge-types
      - id: jna-winapi-exec-bridge
      - id: xor-shellcode-loader
    any:
      - id: console-hide-primitives
      - id: xor-shellcode-key

  - id: java-jna-memory-loader
    desc: Java JNA memory shellcode loader
    crit: hostile
    conf: 0.99
    all:
      - id: java-jna-shellcode-runner
    any:
      - id: shellcode-resource-staging
      - id: jna-win32-stdcall-bridge

  - id: java-jna-memory-loader-stealth
    desc: Java JNA shellcode loader stealth
    crit: hostile
    conf: 0.99
    all:
      - id: console-hide-primitives
      - id: java-jna-shellcode-runner

  - id: java-jna-archive-loader
    desc: Java JNA shellcode loader archive
    crit: hostile
    conf: 0.99
    for: [jar, zip]
    all:
      - id: archive-loader-layout
      - id: archive-jna-core-classes
      - id: archive-jna-win32-dispatch
    any:
      - id: archive-xordecrypt-ref
      - id: shellcode-resource-staging
