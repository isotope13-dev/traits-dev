defaults:
  attack: T1055
  platforms:
    - windows
  for:
    - java
    - class

traits:
  - id: jna-pointer
    desc: Java JNA pointer bridge
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: com/sun/jna/Pointer

  - id: jna-function
    desc: Java JNA function bridge
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: com/sun/jna/Function

  - id: jna-getfunction
    desc: JNA getFunction invocation
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      substr: getFunction

  - id: jna-invokevoid
    desc: JNA invokeVoid execution
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      substr: invokeVoid

  - id: virtualalloc-api
    desc: VirtualAlloc API string
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      substr: VirtualAlloc

  - id: rwx-page
    desc: RWX page protection flag
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      substr: PAGE_EXECUTE_READWRITE

  - id: mem-commit
    desc: MEM_COMMIT allocation flag
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      substr: MEM_COMMIT

  - id: resource-stream
    desc: Resource stream loading
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: raw
      substr: getResourceAsStream

  - id: payload-png-resource
    desc: PNG payload resource name
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: raw
      substr: Client.png

  - id: load-shellcode-name
    desc: Shellcode loader method name
    crit: suspicious
    conf: 0.88
    attack: T1027
    if:
      type: raw
      substr: loadShellcode

  - id: xor-decrypt
    desc: XOR decrypt routine name
    crit: suspicious
    conf: 0.9
    attack: T1140
    if:
      type: raw
      substr: xorDecrypt

  - id: encrypted-shellcode-name
    desc: Encrypted shellcode buffer name
    crit: suspicious
    conf: 0.88
    attack: T1140
    if:
      type: raw
      substr: encryptedShellcode

  - id: console-window-class
    desc: Console window class name
    crit: suspicious
    conf: 0.92
    attack: T1564
    if:
      type: raw
      substr: ConsoleWindowClass

  - id: showwindow-api
    desc: ShowWindow API string
    crit: suspicious
    conf: 0.88
    attack: T1564
    if:
      type: raw
      substr: ShowWindow

  - id: findwindow-api
    desc: FindWindowA API string
    crit: suspicious
    conf: 0.88
    attack: T1564
    if:
      type: raw
      substr: FindWindowA

  - id: sw-hide-flag
    desc: SW_HIDE window flag
    crit: suspicious
    conf: 0.88
    attack: T1564
    if:
      type: raw
      substr: SW_HIDE

composite_rules:
  - id: java-jna-memory-loader
    desc: Java JNA memory shellcode loader
    crit: hostile
    conf: 0.99
    attack: T1620
    all:
      - id: jna-pointer
      - id: jna-function
      - id: jna-getfunction
      - id: jna-invokevoid
      - id: virtualalloc-api
      - id: rwx-page
      - id: mem-commit
      - id: xor-decrypt
    any:
      - id: resource-stream
      - id: payload-png-resource
      - id: load-shellcode-name
    needs: 2

  - id: java-jna-memory-loader-stealth
    desc: Java JNA shellcode loader hides console
    crit: hostile
    conf: 0.99
    attack: T1564
    all:
      - id: java-jna-memory-loader
    any:
      - id: console-window-class
      - id: showwindow-api
      - id: findwindow-api
      - id: sw-hide-flag
    needs: 3
