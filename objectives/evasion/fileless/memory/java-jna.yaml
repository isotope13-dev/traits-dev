defaults:
  attack: T1055
  platforms: [windows]

traits:
  - id: jna-virtualalloc-bridge
    desc: Java JNA VirtualAlloc bridge
    crit: suspicious
    conf: 0.97
    for: [java, class]
    if:
      type: yara
      source: |
        rule java_jna_virtualalloc_bridge {
          strings:
            $a = "org/example/ShellcodeRunner" ascii
            $b = "com/sun/jna/Pointer" ascii
            $c = "com/sun/jna/Function" ascii
            $d = "VirtualAlloc" ascii
            $e = "VirtualFree" ascii
          condition:
            all of them
        }

  - id: staged-shellcode-resource
    desc: Embedded shellcode resource staging
    crit: suspicious
    conf: 0.96
    attack: T1027
    for: [java, class]
    if:
      type: yara
      source: |
        rule java_staged_shellcode_resource {
          strings:
            $a = "org/example/ShellcodeData" ascii
            $b = "loadShellcode" ascii
            $c = "getResourceAsStream" ascii
            $d = "Client.png" ascii
          condition:
            all of them
        }

  - id: xor-shellcode-loader
    desc: XOR decrypts embedded shellcode
    crit: suspicious
    conf: 0.95
    attack: T1140
    for: [java, class]
    if:
      type: yara
      source: |
        rule java_xor_shellcode_loader {
          strings:
            $a = "xorDecrypt" ascii
            $b = "encryptedShellcode" ascii
            $c = "decrypted" ascii
            $d = "shellcode" ascii
          condition:
            all of them
        }

  - id: hidden-console-shellcode
    desc: Hides console before shellcode run
    crit: suspicious
    conf: 0.96
    attack: T1564
    for: [java, class]
    if:
      type: yara
      source: |
        rule java_hidden_console_shellcode {
          strings:
            $a = "hideConsole" ascii
            $b = "ConsoleWindowClass" ascii
            $c = "FindWindowA" ascii
            $d = "ShowWindow" ascii
            $e = "SW_HIDE" ascii
          condition:
            all of them
        }

  - id: rwx-shellcode-primitives
    desc: RWX shellcode allocation primitives
    crit: suspicious
    conf: 0.94
    for: [java, class]
    if:
      type: yara
      source: |
        rule java_rwx_shellcode_primitives {
          strings:
            $a = "MEM_COMMIT" ascii
            $b = "PAGE_EXECUTE_READWRITE" ascii
            $c = "runShellcode" ascii
            $d = "shellFunction" ascii
          condition:
            all of them
        }

composite_rules:
  - id: java-jna-memory-loader
    desc: Java JNA memory shellcode loader
    crit: hostile
    conf: 0.99
    attack: T1620
    all:
      - id: jna-virtualalloc-bridge
      - id: staged-shellcode-resource
      - id: xor-shellcode-loader
      - id: rwx-shellcode-primitives

  - id: java-jna-memory-loader-stealth
    desc: Java JNA shellcode loader hides console
    crit: hostile
    conf: 0.99
    attack: T1564
    all:
      - id: java-jna-memory-loader
      - id: hidden-console-shellcode
