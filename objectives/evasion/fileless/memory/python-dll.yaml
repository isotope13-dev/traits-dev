# A user-writable embedded-DLL loader is suspicious by itself.  Combined with
# embedded PE observations, it is a high-confidence staged loader pattern.
defaults:
  platforms: [windows]
  for: [python]
  attack: T1055.001

composite_rules:
  - id: python-embedded-appdata-dll-loader
    desc: Python writes and loads embedded APPDATA DLL
    crit: hostile
    conf: 0.98
    scope: file
    all:
      - id: micro-behaviors/fs/file/write/direct::python-writes-dll-under-appdata
      - id: micro-behaviors/process/create/load/local::python-ctypes-windll-load
      - id: micro-behaviors/data/embedded/payload/array::python-references-embedded-pe-module
