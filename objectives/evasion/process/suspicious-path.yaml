# Suspicious Execution Paths
# Detects binaries executed from atypical user directories.
# ATT&CK: T1564 (Hide Artifacts)
defaults:
  platforms: [windows]
  for: [pe, source, scripts]
traits:
- id: exe-in-media-folder--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Saved Games
    case_insensitive: true
  count_max: 1016530
- id: exe-in-media-folder--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: USERPROFILE
    case_insensitive: true
  count_max: 1016531
- id: exe-in-media-folder--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Contacts
    case_insensitive: true
  count_max: 1016532
- id: exe-in-media-folder--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Pictures
    case_insensitive: true
  count_max: 1016533
- id: exe-in-media-folder--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Videos
    case_insensitive: true
  count_max: 1016534
- id: exe-in-media-folder--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Links
    case_insensitive: true
  count_max: 1016535
- id: exe-in-media-folder--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Music
    case_insensitive: true
  count_max: 1016536
- id: exe-in-media-folder--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Users
    case_insensitive: true
  count_max: 1016537
- id: deep-download-exec
  desc: Binary in deep Downloads subdirectory
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: '(?i)(?:Downloads\\[A-Za-z0-9]{1,2}\\[^\\]{1,64}\.exe)'

composite_rules:
- id: user-path-evasion-execution
  desc: Binary execution from atypical user directory
  crit: suspicious
  conf: 0.95
  any:
  - id: exe-in-media-folder
  - id: objectives/evasion/masquerade/file/suspicious-path::exe-in-public-folder
  - id: deep-download-exec
- id: exe-in-media-folder
  desc: Binary in media-related user folder
  crit: suspicious
  conf: 0.9
  any:
  - id: exe-in-media-folder--rx-1
  - id: exe-in-media-folder--rx-2
  - id: exe-in-media-folder--rx-3
  - id: exe-in-media-folder--rx-4
  - id: exe-in-media-folder--rx-5
  - id: exe-in-media-folder--rx-6
  - id: exe-in-media-folder--rx-7
  - id: exe-in-media-folder--rx-8
