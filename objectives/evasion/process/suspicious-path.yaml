# Suspicious Execution Paths
# Detects binaries executed from atypical user directories.
# ATT&CK: T1564 (Hide Artifacts)
defaults:
  platforms: [windows]
  for: [pe, source, scripts]
traits:
  - id: exe-in-media-folder
    desc: Binary in media-related user folder
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)(?:Users\\[^\\]{1,64}\\ |%USERPROFILE%\\)(?:Pictures|Music|Videos|Saved Games|Contacts|Links)\\[^\\]{1,64}\.exe'

  - id: deep-download-exec
    desc: Binary in deep Downloads subdirectory
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)(?:Downloads\\[A-Za-z0-9]{1,2}\\[^\\]{1,64}\.exe)'

composite_rules:
  - id: user-path-evasion-execution
    desc: Binary execution from atypical user directory
    crit: suspicious
    conf: 0.95
    any:
      - id: exe-in-media-folder
      - id: objectives/evasion/masquerade/file/suspicious-path::exe-in-public-folder
      - id: deep-download-exec
