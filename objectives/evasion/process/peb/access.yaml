defaults:
  platforms: [windows]
traits:
  - id: evasive-peb-access-x64
    desc: "Indirect PEB lookup via register GS:[reg]"
    crit: suspicious
    for: [pe]
    if:
      type: hex
      section: text
      # e.g., mov r9d, 0x60 ; mov rax, qword ptr gs:[r9]
      # Require the x64 high-register immediate load prefix to avoid random byte collisions.
      pattern: "41 B? 60 00 00 00 65 4? 8B ??"
    downgrade:
      any:
        - id: well-known/app/startallback::startallback-basename
        - id: well-known/app/startallback::darkmagic-basename
