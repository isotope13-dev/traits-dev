# Mach-O code signature with library-validation explicitly disabled.
# Library validation is the macOS feature that prevents a signed
# process from loading dylibs signed by a different team-id (or
# unsigned dylibs entirely).
#
# Disabling it via `com.apple.security.cs.disable-library-validation`
# entitlement is legitimate for some dev tools (Xcode, debuggers,
# instrumentation frameworks). Combined with adhoc signing it
# becomes suspicious — the binary is loading arbitrary unsigned
# libraries and is itself unsigned, a classic dylib-loader pattern.
defaults:
  platforms: [macos]
  for: [macho]
  conf: 0.9
  attack: T1574.006
traits:
  - id: macho-disable-library-validation
    desc: Library validation explicitly disabled
    crit: notable
    if:
      type: value
      path: macho.code_signature.entitlements["com.apple.security.cs.disable-library-validation"]
      exact: "true"
composite_rules:
  - id: adhoc-with-library-validation-disabled
    desc: Adhoc-signed plus library validation off
    crit: notable
    all:
      - id: macho-disable-library-validation
      - id: metadata/signed/trust-level::adhoc
    unless:
      - id: metadata/binary/framework/
      - id: well-known/lib/jvm/
      - id: well-known/lib/jvm::runtime-spawn-helper-basename
