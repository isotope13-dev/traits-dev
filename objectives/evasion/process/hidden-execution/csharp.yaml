# Hidden WinForms execution from C# source
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1564"
traits:
  - id: zero-opacity-window
    desc: Window opacity set to zero
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: '\bOpacity\s*=\s*0(\.0)?\b'
  - id: no-taskbar-window
    desc: Window removed from taskbar
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '\bShowInTaskbar\s*=\s*false\b'
  - id: no-window-icon
    desc: Window icon disabled
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: '\bShowIcon\s*=\s*false\b'
composite_rules:
  - id: hidden-winforms-window
    desc: Hidden WinForms user interface
    crit: suspicious
    conf: 0.96
    all:
      - id: zero-opacity-window
      - id: no-taskbar-window
      - id: no-window-icon
