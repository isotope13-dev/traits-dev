defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  attack: T1574
  mbc: F0015
traits:
- id: inline-hook-function-name
  desc: InlineHook helper function reference
  crit: suspicious
  conf: 0.85
  if:
    type: text
    word: InlineHook
- id: write-process-instruction-source
  desc: Inline hook patches first instructions
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: 'memcpy\s*\([^,]{1,40},\s*(real|orig|original)_[A-Za-z0-9_]{2,40}\s*,\s*\d+\s*\)'
- id: detour-helper-name--detourattach
  desc: Detour-style hook helper name (DetourAttach)
  crit: notable
  conf: 0.7
  if:
    type: text
    word: DetourAttach
- id: detour-helper-name--detourtrampoline
  desc: Detour-style hook helper name (DetourTrampoline)
  crit: notable
  conf: 0.7
  if:
    type: text
    word: DetourTrampoline
- id: detour-helper-name--set-hook
  desc: Detour-style hook helper name (set_hook)
  crit: notable
  conf: 0.7
  if:
    type: text
    word: set_hook
- id: detour-helper-name--install-hook
  desc: Detour-style hook helper name (install_hook)
  crit: notable
  conf: 0.7
  if:
    type: text
    word: install_hook
composite_rules:
- id: detour-helper-name
  desc: Detour-style hook helper name
  crit: notable
  conf: 0.7
  any:
  - id: detour-helper-name--detourattach
  - id: detour-helper-name--detourtrampoline
  - id: detour-helper-name--set-hook
  - id: detour-helper-name--install-hook
- id: inline-trampoline-hook
  desc: In-process inline-trampoline API hooking
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/mem/protect/modify::mprotect-import
  any:
  - id: inline-hook-function-name
  - id: detour-helper-name
  - id: write-process-instruction-source
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/binary/framework/
  - id: well-known/lib/benign-runtime-bundles/
