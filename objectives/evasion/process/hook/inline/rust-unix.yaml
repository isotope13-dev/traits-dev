defaults:
  platforms: [unix, appliance]
  for: [rust, elf]
  attack: T1055

traits:
  - id: rust-mprotect-hook-patch
    desc: mprotect then copies bytes to patch code
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'mprotect[\s\S]{0,220}copy_nonoverlapping'

  - id: rust-mprotect-rwx-call
    desc: mprotect making memory RWX
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'mprotect[\s\S]{0,220}PROT_READ \| PROT_WRITE \| PROT_EXEC'

  - id: rust-libc-mprotect-call
    desc: libc::mprotect to change page perms
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: libc::mprotect

  - id: rust-copy-before-mprotect
    desc: Copies bytes then mprotect
    crit: component
    conf: 0.91
    if:
      type: text
      regex: 'copy_nonoverlapping\s*\([\s\S]{0,260}libc::mprotect'

  - id: rust-mprotect-before-copy
    desc: mprotect then copies bytes into page
    crit: component
    conf: 0.91
    if:
      type: text
      regex: 'libc::mprotect[\s\S]{0,260}copy_nonoverlapping\s*\('

  - id: rust-signal-handler-hijack
    desc: Installs sigaction handler for SEGV/TERM/INT
    crit: suspicious
    conf: 0.92
    if:
      type: text
      # Require the sigaction( SIG... call form (handler installation) rather than
      # bare "sigaction ... SIG" prose. Error-message strings such as
      # "sigaction SIGTERM failed" / "sigaction SIGINT failed" emitted by benign
      # signal-forwarding tools (e.g. unshare) lack the parenthesised call.
      regex: 'sigaction\s*\(\s*SIG(SEGV|TERM|INT)'
    unless:
      - id: metadata/package/files/system-package::os-package-manager-library

composite_rules:
  - id: rust-hook-byte-copy
    desc: Rust hook byte copy
    crit: suspicious
    conf: 0.91
    any:
      - id: rust-copy-before-mprotect
      - id: rust-mprotect-before-copy

  - id: rust-inline-hook-hijack
    desc: Rust inline hook hijack
    crit: hostile
    conf: 0.98
    all:
      - id: rust-libc-mprotect-call
      - id: rust-hook-byte-copy
      - id: rust-signal-handler-hijack
