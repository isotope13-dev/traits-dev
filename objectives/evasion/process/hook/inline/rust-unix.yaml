defaults:
  platforms: [unix, appliance]
  for: [rust, elf]
  attack: T1055

traits:
  - id: rust-mprotect-hook-patch
    desc: Rust mprotect hook patch
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'mprotect[\s\S]{0,220}copy_nonoverlapping'

  - id: rust-mprotect-rwx-call
    desc: Rust mprotect RWX call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'mprotect[\s\S]{0,220}PROT_READ \| PROT_WRITE \| PROT_EXEC'

  - id: rust-libc-mprotect-call
    desc: Rust libc mprotect call
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: libc::mprotect

  - id: rust-hook-byte-copy
    desc: Rust hook byte copy
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: copy_nonoverlapping

  - id: rust-signal-handler-hijack
    desc: Rust signal handler hijack
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'sigaction[\s\S]{0,220}SIG(SEGV|TERM|INT)'

composite_rules:
  - id: rust-inline-hook-hijack
    desc: Rust inline hook hijack
    crit: hostile
    conf: 0.98
    all:
      - id: rust-libc-mprotect-call
      - id: rust-hook-byte-copy
      - id: rust-signal-handler-hijack
