defaults:
  platforms: [unix, appliance]
  for: [c, cpp, objc, elf]
  attack: T1055

traits:
  - id: native-sigaction-flow-hijack
    desc: Native sigaction flow hijack
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'sigaction\(SIG[A-Z0-9]+[\s\S]{0,260}SA_SIGINFO'

  # Signal-handler install (sigaction source call) and the SA_SIGINFO flag are
  # neutral capabilities — relocated to micro-behaviors/os/signal/handler and
  # referenced cross-directory by the composite below.
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: native-mprotect-code-page-rwx
    desc: Native mprotect code page RWX
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'mprotect\(page[\s\S]{0,180}PROT_READ \| PROT_WRITE \| PROT_EXEC'

  - id: native-tcb-context-hijack
    desc: Native TCB context hijack
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'TCBL[\s\S]{0,360}context\.pc'

composite_rules:
  - id: native-inline-flow-hijack
    desc: Native inline flow hijack
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/signal/handler::sigaction-source-call
      - id: micro-behaviors/os/signal/handler::sa-siginfo-flag
      - id: native-mprotect-code-page-rwx
      - id: native-tcb-context-hijack
