# Console Output Hijacking - JavaScript
# Detects overriding console.log/warn/error to suppress output
# Used by OtterCookie and other Node.js malware to hide activity
# ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
defaults:
  platforms: [windows, unix]
  for:
  - javascript
  - typescript
  attack: T1562.001
  crit: suspicious
traits:
- id: console-log-reassign--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.log\s*=\s*(function|\(\))'
  count_max: 1016402
- id: console-log-reassign--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.log\s*=\s*(=>)'
  count_max: 1016403
- id: console-log-reassign--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(window\.)?console\.log\s*=\s*(function|\(\)|=>)'
  count_max: 1016404
- id: console-warn-reassign--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.warn\s*=\s*(function|\(\))'
  count_max: 1016405
- id: console-warn-reassign--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.warn\s*=\s*(=>)'
  count_max: 1016406
- id: console-warn-reassign--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(window\.)?console\.warn\s*=\s*(function|\(\)|=>)'
  count_max: 1016407
- id: console-error-reassign--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.error\s*=\s*(function|\(\))'
  count_max: 1016408
- id: console-error-reassign--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.error\s*=\s*(=>)'
  count_max: 1016409
- id: console-error-reassign--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(window\.)?console\.error\s*=\s*(function|\(\)|=>)'
  count_max: 1016410
- id: console-log-noop
  desc: console.log set to no-op
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.|window\.)?console\.log\s*=\s*\(\)\s*=>\s*\{\s*\}'
  unless:
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
- id: console-warn-noop
  desc: console.warn set to no-op
  crit: suspicious
  conf: 0.85
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.|window\.)?console\.warn\s*=\s*\(\)\s*=>\s*\{\s*\}'
- id: console-error-noop
  desc: console.error set to no-op
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.|window\.)?console\.error\s*=\s*\(\)\s*=>\s*\{\s*\}'
- id: console-object-replace
  desc: Global console object assignment
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(^|[;,{])\s*window\.console\s*=\s*\{[\s\S]{0,120}log\s*:'
  not:
  - substr: without console.
  - substr: window.ace=window
  - substr: postMessage({type:"log",data:msgs})
  unless:
  - id: well-known/tool/development/firebug::firefox-devtools-extension
  - type: basename
    regex: ^firebugx?\.js$
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: metadata/library/runtime::acquire-vscode-api
  - id: metadata/library/structure::js-vite-rollup-vendor-chunk
- id: console-prototype-modify
  desc: Console prototype modification
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: Console\.prototype\.(log|warn|error)\s*=
  unless:
  - type: text
    regex: Console\.prototype\.name\s*=\s*['"]console['"]
  - type: basename
    regex: \.component\.(pug|vue|svelte)$
- id: console-log-reassign-cond-0--inline-16415
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: \w+\.apply\(console,\s*args\)
  count_max: 1016416
- id: console-log-reassign-cond-1--inline-16416
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: process\.(stdout|stderr)\.write\s*\(
  count_max: 1016417
- id: console-warn-reassign-cond-0--inline-16418
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: \w+\.apply\(console,\s*args\)
  count_max: 1016419
- id: console-warn-reassign-cond-1--inline-16419
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: process\.(stdout|stderr)\.write\s*\(
  count_max: 1016420
- id: console-error-reassign-cond-0--inline-16421
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: \w+\.apply\(console,\s*args\)
  count_max: 1016422
- id: console-error-reassign-cond-1--inline-16422
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: process\.(stdout|stderr)\.write\s*\(
  count_max: 1016423
composite_rules:
- id: console-method-suppression
  desc: Console output method suppression
  crit: suspicious
  conf: 0.85
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  any:
  - id: console-log-noop
  - id: console-warn-noop
  - id: console-error-noop
  - id: console-object-replace
  - id: console-prototype-modify
- id: console-multi-suppress
  desc: Multiple console methods suppressed
  crit: suspicious
  conf: 0.9
  needs: 2
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  any:
  - id: console-log-reassign
  - id: console-warn-reassign
  - id: console-error-reassign
  - id: console-log-noop
  - id: console-warn-noop
  - id: console-error-noop
  - id: console-object-replace
- id: console-log-reassign
  desc: console.log reassignment
  crit: suspicious
  conf: 0.75
  any:
  - id: console-log-reassign--rx-1
  - id: console-log-reassign--rx-2
  - id: console-log-reassign--rx-3
  unless:
  - id: console-log-reassign-cond-0--inline-16415
  - id: console-log-reassign-cond-1--inline-16416
- id: console-warn-reassign
