# Intent composites for JavaScript console output manipulation.
# The individual assignments live in micro-behaviors/process/hook/console:
# they are neutral capabilities; intent is inferred only when multiple
# console methods are altered in the same file.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1562.001

composite_rules:
- id: console-method-suppression
  desc: Multiple JavaScript console methods suppressed
  crit: suspicious
  conf: 0.9
  needs: 2
  any:
  - id: micro-behaviors/process/hook/console/assignment
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/harness/
  - id: metadata/package/testing/scripted/
  - id: metadata/library/structure/
  - id: metadata/library/console::js-console-forwarder-context
