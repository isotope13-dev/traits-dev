# Console Output Hijacking - JavaScript
# Detects overriding console.log/warn/error to suppress output
# Used by OtterCookie and other Node.js malware to hide activity
# ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
defaults:
  platforms: [windows, unix]
  for:
  - javascript
  - typescript
  attack: T1562.001
  crit: suspicious
traits:
- id: console-log-reassign--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.log\s*=\s*(function|\(\))'
- id: console-log-reassign--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.log\s*=\s*(=>)'
- id: console-log-reassign--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(window\.)?console\.log\s*=\s*(function|\(\)|=>)'
- id: console-warn-reassign--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.warn\s*=\s*(function|\(\))'
- id: console-warn-reassign--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.warn\s*=\s*(=>)'
- id: console-warn-reassign--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(^|[;{}\n])\s*(window\.)?console\.warn\s*=\s*(function|\(\)|=>)'
- id: console-error-reassign--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.75
  not:
  - substr: without console.
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.error\s*=\s*(function|\(\))'
- id: console-error-reassign--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.75
  not:
  - substr: without console.
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.)?console\.error\s*=\s*(=>)'
- id: console-error-reassign--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.75
  not:
  - substr: without console.
  if:
    type: text
    regex: '(^|[;{}\n])\s*(window\.)?console\.error\s*=\s*(function|\(\)|=>)'
- id: console-log-noop
  desc: console.log set to no-op
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.|window\.)?console\.log\s*=\s*\(\)\s*=>\s*\{\s*\}'
  unless:
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
- id: console-warn-noop
  desc: console.warn set to no-op
  crit: suspicious
  conf: 0.85
  unless:
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.|window\.)?console\.warn\s*=\s*\(\)\s*=>\s*\{\s*\}'
- id: console-error-noop
  desc: console.error set to no-op
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '(^|[;{}\n])\s*(globalThis\.|global\.|window\.)?console\.error\s*=\s*\(\)\s*=>\s*\{\s*\}'
- id: console-object-replace
  desc: Global console object assignment
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (^|[;,{])\s*(global|globalThis|window)\.console\s*=
  not:
  - substr: without console.
  - substr: window.console||(window.console=function()
  - substr: window.ace=window
  - substr: postMessage({type:"log",data:msgs})
  - substr: window.console.error=window.console.warn=window.console.log=
- id: console-prototype-modify
  desc: Console prototype modification
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: Console\.prototype\.\w+\s*=
  unless:
  - type: text
    regex: Console\.prototype\.name\s*=\s*['"]console['"]
  - type: basename
    regex: \.component\.(pug|vue|svelte)$
composite_rules:
- id: console-method-suppression
  desc: Console output method suppression
  crit: suspicious
  conf: 0.85
  unless:
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  any:
  - id: console-log-noop
  - id: console-warn-noop
  - id: console-error-noop
  - id: console-object-replace
  - id: console-prototype-modify
- id: console-multi-suppress
  desc: Multiple console methods suppressed
  crit: suspicious
  conf: 0.9
  needs: 2
  unless:
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  any:
  - id: console-log-reassign
  - id: console-warn-reassign
  - id: console-error-reassign
  - id: console-log-noop
  - id: console-warn-noop
  - id: console-error-noop
  - id: console-object-replace
- id: console-log-reassign
  desc: console.log reassignment
  crit: suspicious
  conf: 0.75
  any:
  - id: console-log-reassign--rx-1
  - id: console-log-reassign--rx-2
  - id: console-log-reassign--rx-3
  needs: 1
  unless:
  - type: text
    regex: \w+\.apply\(console,\s*args\)
  - type: text
    regex: process\.(stdout|stderr)\.write\s*\(
- id: console-warn-reassign
  desc: console.warn reassignment
  crit: suspicious
  conf: 0.75
  any:
  - id: console-warn-reassign--rx-4
  - id: console-warn-reassign--rx-5
  - id: console-warn-reassign--rx-6
  needs: 1
  unless:
  - type: text
    regex: \w+\.apply\(console,\s*args\)
  - type: text
    regex: process\.(stdout|stderr)\.write\s*\(
- id: console-error-reassign
  desc: console.error reassignment
  crit: suspicious
  conf: 0.75
  any:
  - id: console-error-reassign--rx-7
  - id: console-error-reassign--rx-8
  - id: console-error-reassign--rx-9
  needs: 1
  unless:
  - type: text
    regex: \w+\.apply\(console,\s*args\)
  - type: text
    regex: process\.(stdout|stderr)\.write\s*\(
  not:
  - substr: without console.
