defaults:
  platforms:
    - windows
    - unix
  for:
    - pe
    - dll
traits:
  - id: dotnet-clrjit-dll-string
    desc: CLR JIT library string reference
    crit: component
    conf: 0.84
    if:
      type: text
      exact: clrjit.dll
  - id: dotnet-libclrjit-string
    desc: libclrjit string reference
    crit: component
    conf: 0.82
    if:
      type: text
      exact: libclrjit
  - id: dotnet-getjit-token
    desc: CLR getJit token reference
    crit: component
    conf: 0.9
    if:
      type: text
      exact: getJit
composite_rules:
  - id: dotnet-clrjit-hook-loader
    desc: .NET loader targets CLR JIT runtime
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-clrjit-dll-string
    any:
      - id: dotnet-libclrjit-string
      - id: dotnet-getjit-token
      - id: objectives/evasion/process/injection/toolkit::dotnet-split-winapi-injection-loader
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: dotnet-obfuscated-clrjit-injection-loader
    desc: Obfuscated .NET CLR JIT injection loader
    crit: hostile
    conf: 0.97
    attack: T1055
    all:
      - id: dotnet-clrjit-hook-loader
      - id: objectives/evasion/process/injection/toolkit::dotnet-split-winapi-injection-loader
      - id: objectives/anti-static/obfuscation/obfuscator/managed::dotnet-reactor-obfuscator
    any:
      - id: objectives/command-and-control/dropper/staging/embedded::managed-resource-reflection-loader
      - id: objectives/command-and-control/dropper/staging/embedded::dotnet-aes-resource-dropper
      - id: objectives/command-and-control/dropper/staging/encrypted::dotnet-hex-chunk-reassembly
      - id: metadata/binary/anomaly/provenance::pe-far-future-timestamp
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: dotnet-clrjit-staged-injection-loader
    desc: .NET CLR JIT staged injection loader
    crit: hostile
    conf: 0.97
    attack: T1055
    all:
      - id: dotnet-clrjit-hook-loader
      - id: objectives/evasion/process/injection/toolkit::dotnet-split-winapi-injection-loader
    needs: 2
    any:
      - id: objectives/command-and-control/dropper/staging/embedded::managed-resource-reflection-loader
      - id: objectives/command-and-control/dropper/staging/embedded::dotnet-aes-resource-dropper
      - id: objectives/command-and-control/dropper/staging/encrypted::dotnet-hex-chunk-reassembly
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: objectives/anti-static/obfuscation/reflection/invoke::delegate-execution-chain
    unless:
      - id: metadata/signed/platform::microsoft-windows
