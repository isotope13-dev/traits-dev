# Inline Sandbox / Payload Monitoring
defaults:
  platforms: [windows]
  for: [binaries]

composite_rules:
  - id: inline-payload-monitor
    desc: Loader acting as inline sandbox to monitor payload activity
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/telemetry/logging/payload-monitor::payload-tag
    any:
      - id: micro-behaviors/os/telemetry/logging/payload-monitor::payload-network-log
      - id: micro-behaviors/os/telemetry/logging/payload-monitor::payload-process-log
      - id: micro-behaviors/os/telemetry/logging/payload-monitor::payload-reg-log
    needs: 1
