# Shared-memory handoff used by an elevated injection stub.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055

traits:
  - id: elevated-inject-info-marker
    desc: Elevated injection handoff marker
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: ElevatedInjectInfo

composite_rules:
  - id: elevated-shared-memory-injection-handoff
    desc: Elevated injection uses shared-memory IPC handoff
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/ipc/file-mapping::open-file-mapping-w
      - id: micro-behaviors/fs/memory/mmap::map-view-of-file
      - id: micro-behaviors/communications/ipc/pipe::duplicate-handle
      - id: micro-behaviors/process/sync/event::set-event
      - id: elevated-inject-info-marker
