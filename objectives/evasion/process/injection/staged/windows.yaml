defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: native-win32-process-query
    desc: Native Win32_Process WMI query
    crit: notable
    conf: 0.92
    attack: T1047
    mbc: E1043
    if:
      type: text
      exact: SELECT * FROM Win32_Process
  - id: avast-uninstall-key
    desc: Avast uninstall registry probe
    crit: suspicious
    conf: 0.94
    attack: T1518.001
    if:
      type: text
      regex: (?i)uninstall\\avast
composite_rules:
  - id: resource-staged-hollowing-dropper
    desc: Resource-staged hollowing dropper
    crit: hostile
    conf: 0.98
    attack: T1055.012
    mbc: E1055.012
    all:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: objectives/evasion/process/injection/hollowing::unmap-section-apis
      - id: micro-behaviors/process/inject/runtime::read-process-memory
      - id: objectives/evasion/process/injection/hollowing::memory-write-apis
      - id: objectives/evasion/process/injection/hollowing::get-thread-context
      - id: objectives/evasion/process/injection/hollowing::resume-thread
      - id: metadata/binary/resource::oversized-rsrc
      - id: micro-behaviors/data/embedded/payload::sizeof-resource
    any:
      - id: objectives/evasion/process/injection/hollowing::set-thread-context
      - id: native-win32-process-query
      - id: avast-uninstall-key
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::diagnostics-hub
        - id: well-known/tools/reverse-engineering::ida-debugger-server
        - id: well-known/tools/reverse-engineering::scylla-unpacker
  - id: openas-resource-memory-injector
    desc: OpenAs resource dropper with memory injection
    crit: hostile
    conf: 0.97
    attack: T1055
    mbc: B0033
    all:
      - id: objectives/command-and-control/dropper/staging/embedded::pe-resource-openas-temp-exec
      - id: micro-behaviors/process/create/spawn::open-process
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime::read-process-memory
    any:
      - id: objectives/discovery/process/targeting::toolhelp-enumeration-with-access
      - id: objectives/evasion/process/injection/memory::process-inject-api
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::diagnostics-hub
        - id: well-known/tools/reverse-engineering::ida-debugger-server
        - id: well-known/tools/reverse-engineering::scylla-unpacker
  - id: stealth-direct-syscall-staged-loader
    desc: Direct-syscall staged PE loader
    crit: hostile
    conf: 0.99
    attack: T1055
    all:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: micro-behaviors/os/syscall/raw::syscall-ret-gadget
      - id: objectives/anti-static/obfuscation/binary-metrics::import-count-under-80
      - id: metadata/binary/section/metrics::high-entropy-rdata-section
      - id: metadata/binary/section/metrics::rdata-ratio-over-2pt5x
    any:
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
      - id: objectives/evasion/masquerade/version-resource::low-import-pe-without-heavy-rsrc
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft-windows
