defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  attack: T1620
traits:
- id: mz-signature-check
  desc: MZ DOS signature validation string
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: MZ signature
  not:
  - substr: VID.DLL mapping doesn't start with MZ signature
- id: nt-headers-parse
  desc: NT headers parsing reference
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: NT (headers|offset)
- id: oep-reference
  desc: Original entry point resolution
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: (?i)(original\\s+entry\\s+point|\\bOEP\\s+RVA\\b|\\bOEP\\s+offset\\b)
- id: payload-thread-str
  desc: Payload thread execution reference
  crit: component
  conf: 0.9
  if:
    type: text
    substr: payload thread
    case_insensitive: true
- id: pe-arch-detect
  desc: PE architecture detection string
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: Detected x(86|64) payload
- id: go-shellcode-struct
  desc: Go shellcode struct declaration
  crit: component
  conf: 0.9
  for: [go]
  if:
    type: text
    regex: 'var\s+code\s*=\s*Shellcode\s*\{'
- id: go-dll-handle-slot
  desc: Go shellcode DLL handle patch slot
  crit: component
  conf: 0.94
  for: [go]
  if:
    type: text
    regex: '0xb9,\s*0x41,\s*0x41,\s*0x41,\s*(0x)?41'
- id: go-dllmain-attach-arg
  desc: Go shellcode DLL_PROCESS_ATTACH argument
  crit: component
  conf: 0.94
  for: [go]
  if:
    type: text
    regex: '0xba,\s*0x01,\s*0x00,\s*0x00,\s*0x00'
- id: go-entrypoint-slot
  desc: Go shellcode entrypoint patch slot
  crit: component
  conf: 0.94
  for: [go]
  if:
    type: text
    regex: '0xb8,\s*0x41,\s*0x41,\s*0x41,\s*0x41'
- id: go-dllmain-call-offsets
  desc: Go shellcode handle and entrypoint offsets
  crit: component
  conf: 0.95
  for: [go]
  if:
    type: text
    regex: 'HandleOffset:\s*7,\s*EntryPointOffset:\s*25,'
- id: go-stack-align-stub
  desc: Go x86 stack alignment shellcode
  crit: suspicious
  conf: 0.93
  for: [go]
  if:
    type: text
    regex: '0x83,\s*0xe4,\s*0xf0,\s*//\s*and'
composite_rules:
- id: reflective-payload-thread-context
  desc: Reflective payload thread context
  crit: suspicious
  conf: 0.9
  all:
  - id: payload-thread-str
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  any:
  - id: mz-signature-check
  - id: nt-headers-parse
  - id: oep-reference
  - id: pe-arch-detect
- id: go-manualmap-dll-entry-trampoline
  desc: Go manual-mapped DLL entry trampoline
  crit: suspicious
  conf: 0.98
  mbc: B0032
  for: [go]
  all:
  - id: go-shellcode-struct
  - id: go-dll-handle-slot
  - id: go-dllmain-attach-arg
  - id: go-entrypoint-slot
  - id: go-dllmain-call-offsets
  - id: go-stack-align-stub
- id: native-loader-api-combo
  desc: Native PE loader API combination
  crit: suspicious
  conf: 0.88
  all:
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/dylib/load/runtime::load-library-a
  - id: micro-behaviors/dylib/lookup::get-proc-address
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/os/module/load::free-library
  - id: objectives/anti-analysis/debugger-detect/check::bad-read-ptr
  needs: 2
  unless:
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/binary/metrics/threshold::many-imports-50
  - id: metadata/binary/installer/script::nsis-system-plugin
