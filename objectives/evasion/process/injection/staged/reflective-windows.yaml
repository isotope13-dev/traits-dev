defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  attack: T1620
traits:
- id: mz-signature-check
  desc: MZ DOS signature validation string
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: MZ signature
  not:
  - substr: VID.DLL mapping doesn't start with MZ signature
- id: nt-headers-parse
  desc: NT headers parsing reference
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: '\b(IMAGE_NT_HEADERS(32|64)?|NT_HEADERS(32|64)?)\b'
  unless:
    - type: value
      path: pe.subsystem
      exact: efi_application
- id: oep-reference
  desc: Original entry point resolution
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: (?i)(original\\s+entry\\s+point|\\bOEP\\s+RVA\\b|\\bOEP\\s+offset\\b)
- id: payload-thread-str
  desc: Payload thread execution reference
  crit: component
  conf: 0.9
  if:
    type: text
    substr: payload thread
    case_insensitive: true
- id: pe-arch-detect
  desc: PE architecture detection string
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: Detected x(86|64) payload
- id: go-shellcode-struct
  desc: Go shellcode struct declaration
  crit: component
  conf: 0.9
  for: [go]
  if:
    type: text
    regex: 'var\s+code\s*=\s*Shellcode\s*\{'
- id: go-dll-handle-slot
  desc: Go shellcode DLL handle patch slot
  crit: component
  conf: 0.94
  for: [go]
  if:
    type: text
    regex: '0xb9,\s*0x41,\s*0x41,\s*0x41,\s*(0x)?41'
- id: go-dllmain-attach-arg
  desc: Go shellcode DLL_PROCESS_ATTACH argument
  crit: component
  conf: 0.94
  for: [go]
  if:
    type: text
    regex: '0xba,\s*0x01,\s*0x00,\s*0x00,\s*0x00'
- id: go-entrypoint-slot
  desc: Go shellcode entrypoint patch slot
  crit: component
  conf: 0.94
  for: [go]
  if:
    type: text
    regex: '0xb8,\s*0x41,\s*0x41,\s*0x41,\s*0x41'
- id: go-dllmain-call-offsets
  desc: Go shellcode handle and entrypoint offsets
  crit: component
  conf: 0.95
  for: [go]
  if:
    type: text
    regex: 'HandleOffset:\s*7,\s*EntryPointOffset:\s*25,'
- id: go-stack-align-stub
  desc: Go x86 stack alignment shellcode
  crit: suspicious
  conf: 0.93
  for: [go]
  if:
    type: text
    regex: '0x83,\s*0xe4,\s*0xf0,\s*//\s*and'
- id: go-remote-thread-wrapper
  desc: Go CreateRemoteThread wrapper
  crit: notable
  conf: 0.95
  for: [go]
  if:
    type: text
    regex: 'NewProc\("CreateRemoteThread"\)|func\s+CreateRemoteThread\s*\('
- id: go-virtualallocex-wrapper
  desc: Go VirtualAllocEx wrapper
  crit: notable
  conf: 0.95
  for: [go]
  if:
    type: text
    regex: 'NewProc\("VirtualAllocEx"\)|func\s+VirtualAllocEx\s*\('
- id: go-writeprocessmemory-wrapper
  desc: Go WriteProcessMemory wrapper
  crit: notable
  conf: 0.95
  for: [go]
  if:
    type: text
    regex: 'NewProc\("WriteProcessMemory"\)|func\s+WriteProcessMemory\s*\('
- id: go-procaddress-ordinal-wrapper
  desc: Go GetProcAddress ordinal wrapper
  crit: component
  conf: 0.9
  for: [go]
  if:
    type: text
    regex: 'GetProcAddressByOrdinal|NewProc\("GetProcAddress"\)'
- id: go-dll-shim-output-generator
  desc: Go DLL shim output generator
  crit: notable
  conf: 0.9
  for: [go]
  if:
    type: text
    substr: AddRenamedFunction
- id: go-dll-shim-template-name
  desc: Go DLL shim template name
  crit: component
  conf: 0.9
  for: [go]
  if:
    type: text
    regex: '(dynamic|static)-shim\.cpp\.template'
- id: go-def-lib-output-functions
  desc: Go DEF output function
  crit: component
  conf: 0.9
  for: [go]
  if:
    type: text
    substr: GetDefFileName
- id: go-mingw-dlltool-lib-generation
  desc: Go invokes mingw dlltool for import library
  crit: notable
  conf: 0.9
  for: [go]
  if:
    type: text
    regex: 'exec\.Command\("x86_64-w64-mingw32-dlltool"[\s\S]{0,300}"-d"[\s\S]{0,300}"-l"'
- id: go-dll-shim-artifact-names
  desc: Go DLL proxy shim artifact names
  crit: component
  conf: 0.9
  for: [go]
  if:
    type: text
    regex: 'Get(CppCode|HdrCode|CompileScript|Lib)FileName'
  count_min: 3
composite_rules:
- id: reflective-payload-thread-marker
  desc: Reflective payload thread marker
  crit: suspicious
  conf: 0.9
  all:
  - id: payload-thread-str
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  any:
  - id: mz-signature-check
  - id: nt-headers-parse
  - id: oep-reference
  - id: pe-arch-detect
- id: go-manualmap-dll-entry-trampoline
  desc: Go manual-mapped DLL entry trampoline
  crit: suspicious
  conf: 0.98
  mbc: B0032
  for: [go]
  all:
  - id: go-shellcode-struct
  - id: go-dll-handle-slot
  - id: go-dllmain-attach-arg
  - id: go-entrypoint-slot
  - id: go-dllmain-call-offsets
  - id: go-stack-align-stub
- id: go-remote-thread-manualmap-wrapper
  desc: Go remote-thread manual map wrappers
  crit: suspicious
  conf: 0.94
  mbc: F0003
  attack: T1055
  for: [go]
  all:
  - id: go-remote-thread-wrapper
  - id: go-virtualallocex-wrapper
  - id: go-writeprocessmemory-wrapper
  any:
  - id: go-procaddress-ordinal-wrapper
  - id: micro-behaviors/data/source/dynamic/reflect::go-unsafe-package-import
- id: go-process-injection-api-triad
  desc: Go process injection API triad
  crit: suspicious
  conf: 0.95
  mbc: F0003
  attack: T1055
  for: [go]
  all:
  - id: go-remote-thread-wrapper
  - id: go-virtualallocex-wrapper
  - id: go-writeprocessmemory-wrapper
- id: go-dll-proxy-shim-generator
  desc: Go DLL proxy shim generator
  crit: suspicious
  conf: 0.9
  mbc: F0003
  attack: T1574.001
  for: [go]
  all:
  - id: go-dll-shim-output-generator
  - id: go-dll-shim-template-name
  - id: go-mingw-dlltool-lib-generation
  any:
  - id: micro-behaviors/process/create/direct::exec-command
  - id: micro-behaviors/fs/file/create::os-create
  - id: go-def-lib-output-functions
- id: go-dll-proxy-build-artifacts
  desc: Go DLL proxy build artifact generator
  crit: suspicious
  conf: 0.9
  mbc: F0003
  attack: T1574.001
  for: [go]
  all:
  - id: go-dll-shim-artifact-names
  - id: go-def-lib-output-functions
  - id: go-mingw-dlltool-lib-generation
- id: native-loader-api-combo
  desc: Native PE loader API combination
  crit: suspicious
  conf: 0.88
  all:
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/dylib/load/runtime::load-library-a
  - id: micro-behaviors/dylib/lookup::get-proc-address
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/os/module/load::free-library
  - id: objectives/anti-analysis/debugger-detect/check::bad-read-ptr
  needs: 2
  unless:
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/binary/metrics/threshold::many-imports-50
  - id: metadata/binary/installer/script::nsis-system-plugin
- id: inline-pe-rwx-loader
  desc: Inline PE parser with RWX loader behavior
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/fs/file/pe-inspect::inline-pe-signature-check
  - id: objectives/evasion/process/injection/memory::rwx-allocation
  unless:
  - id: metadata/library/msys2-runtime::msys2-runtime
  - id: well-known/tool/development/git-for-windows::mingit-getprocaddr-helper
  - id: metadata/signed/platform/
  - id: metadata/binary/framework::dotnet-metadata
  # MinGW's pseudo-relocation runtime inline-checks its own PE headers and
  # calls VirtualProtect to apply relocations -- benign C runtime, not a loader.
  - id: metadata/lang/compiler/native::mingw-pseudo-reloc-runtime
- id: inline-pe-process-injection-loader
  desc: Inline PE parser with process injection APIs
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/fs/file/pe-inspect::inline-pe-signature-check
  - id: objectives/evasion/process/injection/memory::rwx-allocation
  any:
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
  needs: 1
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework::dotnet-metadata
- id: overlay-inline-pe-rwx-loader
  desc: Overlay-staged inline PE RWX loader
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/fs/file/pe-inspect::inline-pe-signature-check
  - id: objectives/evasion/process/injection/memory::rwx-allocation
  - id: metadata/binary/layout::low-overlay-entropy
  - id: micro-behaviors/os/sysinfo/hostname::get-computer-name
  any:
  - id: metadata/lang/compiler/native::mingw-runtime-marker
  - id: micro-behaviors/os/module/load::get-proc-address-import
  needs: 1
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework::dotnet-metadata
- id: go-rsrc-hollowing-loader
  desc: Go hollowing loader from encrypted resource
  crit: hostile
  conf: 0.96
  attack: T1055.012
  mbc: E1055.012
  all:
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: metadata/signed/trust-level::unsigned-pe-executable
  - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
  - id: objectives/evasion/process/injection/hollowing::nt-unmap-section
  - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
  - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
  - id: micro-behaviors/process/info/thread::resume-thread-dup
  any:
  - id: micro-behaviors/os/module/load::get-proc-address-import
  - id: micro-behaviors/dylib/load/runtime::load-library-w
  needs: 1
  unless:
  - id: metadata/signed/platform/
  - id: well-known/tool/development/visual-studio::diagnostics-hub
  - id: well-known/tool/reverse-engineering/ida-debugger::ida-debugger-server
  - id: well-known/tool/reverse-engineering/scylla/
