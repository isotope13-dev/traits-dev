defaults:
  platforms: [windows]
  for: [csharp]
traits:
  - id: self-location-target
    desc: Self executable path targeting
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: Assembly.GetExecutingAssembly().Location
  - id: runpe-type-key
    desc: RunPE type resource key
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      substr: 'GetString("eNNBm")'
  - id: inject-method-key
    desc: Inject method resource key
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      substr: 'GetString("OLFX")'
  - id: appdata-drop-path
    desc: AppData executable drop path
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      substr: SpecialDirectories.CurrentUserApplicationData + "\\\\ybGE.exe"
composite_rules:
  - id: runpe-self-hollowing
    desc: RunPE self hollowing loader
    crit: suspicious
    conf: 0.97
    attack: T1055.012
    mbc: E1055.012
    all:
      - id: self-location-target
      - id: runpe-type-key
      - id: inject-method-key
    any:
      - id: appdata-drop-path
      - id: objectives/command-and-control/dropper/execution/loader::encrypted-resource-loader
