defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - ipa
traits:
  - id: cydia-substrate-dylib
    desc: Cydia Substrate dylib
    crit: suspicious
    conf: 0.95
    attack: T1546
    if:
      type: string_value
      exact: libsubstrate.dylib
  - id: substrate-function-hook
    desc: MobileSubstrate framework
    crit: suspicious
    conf: 0.9
    attack: T1546
    if:
      type: string_value
      substr: MobileSubstrate
  - id: substrate-hook-symbol
    desc: MSHookFunction symbol
    crit: suspicious
    conf: 0.9
    attack: T1546
    if:
      type: string_value
      substr: MSHookFunction
  - id: cycript-dylib
    desc: Cycript runtime dylib
    crit: suspicious
    conf: 0.95
    attack: T1546
    if:
      type: string_value
      exact: libcycript.dylib
  - id: reveal-server-framework
    desc: RevealServer framework
    crit: suspicious
    conf: 0.85
    attack: T1564
    if:
      type: string_value
      substr: RevealServer
  - id: cbinjection-framework
    desc: CBInjection framework
    crit: suspicious
    conf: 0.8
    attack: T1546
    if:
      type: string_value
      substr: CBInjection
composite_rules:
  - id: cydia-substrate-detected
    desc: Cydia Substrate detected
    crit: suspicious
    conf: 0.95
    attack: T1546
    any:
      - id: cydia-substrate-dylib
      - id: substrate-function-hook
      - id: substrate-hook-symbol
      - id: cycript-dylib
  - id: runtime-code-injection
    desc: iOS runtime code injection
    crit: notable
    conf: 0.7
    any:
      - id: cydia-substrate-detected
      - id: reveal-server-framework
      - id: cbinjection-framework
