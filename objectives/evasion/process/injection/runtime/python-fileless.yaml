# Python ctypes memory stager indicators
defaults:
  platforms: [windows, unix]
  attack: T1055
  for: [python]
traits:
  - id: python-virtualprotect-rwx
    desc: Allocate RWX memory via VirtualProtect
    crit: suspicious
    if:
      type: text
      regex: '(?s)VirtualProtect\s*\(.{0,200}?(0x40|64)\s*,'
