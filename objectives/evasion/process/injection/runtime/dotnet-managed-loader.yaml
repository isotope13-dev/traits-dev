# Managed process-injection loaders may reconstruct Win32 API names in CIL
# byte arrays, leaving only the resolver and process-module metadata visible
# to static string extraction.
defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: dotnet-managed-process-injection-loader
    desc: .NET loader resolves native delegates while inspecting and terminating processes
    crit: hostile
    conf: 0.98
    attack: T1055
    mbc: E1055
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/os/api-resolution/dynamic::managed-process-module-reference
      - id: micro-behaviors/os/api-resolution/dynamic::managed-module-collection-reference
      - id: micro-behaviors/os/api-resolution/dynamic::managed-module-base-address
      - id: micro-behaviors/os/api-resolution/dynamic::managed-function-pointer-delegate
      - id: micro-behaviors/process/terminate/kill::dotnet-kill-member-reference
    unless:
      - id: metadata/signed/platform/
