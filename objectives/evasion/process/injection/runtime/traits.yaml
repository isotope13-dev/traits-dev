# Code Injection
# Process injection and shellcode execution

defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]

traits:
  # === Memory Manipulation for Code Execution ===
  # These traits reference micro-behaviors and add downgrade/unless rules for context
  - id: write-process-memory
    desc: Write memory to target process
    crit: notable
    conf: 0.95
    attack: "T1055"
    mbc: "C0032"
    if:
      id: micro-behaviors/process/injection/hollowing::write-process-memory
    downgrade:
      any:
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/vendor/valve::valve-corp-binary

  - id: read-process-memory
    desc: Read memory from target process
    crit: notable
    conf: 0.95
    attack: "T1005"
    if:
      type: symbol
      exact: "ReadProcessMemory"
    downgrade:
      any:
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/vendor/valve::valve-corp-binary

  - id: create-remote-thread
    desc: Create thread in target process
    crit: notable
    conf: 0.98
    attack: "T1055.001"
    mbc: "B0013"
    if:
      type: string
      exact: "CreateRemoteThread"
    downgrade:
      any:
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/vendor/valve::valve-corp-binary


  - id: queue-user-apc
    desc: Queue APC to thread
    crit: notable
    conf: 0.95
    attack: "T1055.004"
    mbc: "B0018"
    if:
      type: symbol
      exact: "QueueUserAPC"

  - id: set-thread-context
    desc: Modify thread context/registers
    crit: notable
    conf: 0.95
    attack: "T1055"
    if:
      id: micro-behaviors/process/injection/hollowing::set-thread-context
    # API set forwarding stubs export these symbols as forwarders,
    # not as actual injection implementations.
    downgrade:
      any:
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/vendor/valve::valve-corp-binary
    unless:
      - type: basename
        regex: '\.pyd$'

  - id: get-thread-context
    desc: Read thread context/registers
    crit: notable
    conf: 0.90
    attack: "T1005"
    if:
      id: micro-behaviors/process/injection/hollowing::get-thread-context
    # API set forwarding stubs export these symbols as forwarders,
    # not as actual injection implementations.
    downgrade:
      any:
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/vendor/valve::valve-corp-binary
    unless:
      - type: basename
        regex: '\.pyd$'

  - id: suspend-thread
    desc: Suspend thread execution
    crit: notable
    conf: 0.90
    attack: "T1055"
    if:
      type: symbol
      exact: "SuspendThread"
    downgrade:
      any:
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/vendor/valve::valve-corp-binary
    unless:
      - type: basename
        regex: '\.pyd$'

  - id: resume-thread
    desc: Resume thread execution
    crit: notable
    conf: 0.90
    attack: "T1055"
    if:
      id: micro-behaviors/process/injection/hollowing::resume-thread
    unless:
      - type: metrics
        field: binary.import_count
        min: 80
    downgrade:
      any:
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/vendor/valve::valve-corp-binary

composite_rules:
  - id: create-remote-thread-ex
    desc: Extended remote thread creation
    crit: notable
    conf: 0.98
    attack: "T1055.001"
    all:
      - id: micro-behaviors/mem/exec/fileless::create-thread-sym
    unless:
      - type: string
        substr: "OpenMP Runtime"
