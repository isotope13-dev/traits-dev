defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: write-process-memory-dup
    desc: Write memory to target process
    crit: notable
    conf: 0.95
    attack: T1055
    mbc: C0032
    if:
      id: objectives/evasion/process/injection::write-process-memory-dup
    downgrade:
      any:
        - id: metadata/package::common-fp-context
        - id: well-known/tools/reverse-engineering::ollydbg-plugin-export
  - id: read-process-memory
    desc: Read memory from target process
    crit: notable
    conf: 0.95
    attack: T1005
    if:
      type: text
      word: ReadProcessMemory
    downgrade:
      any:
        - id: metadata/package::common-fp-context
        - id: well-known/tools/reverse-engineering::lordpe-tool
  - id: create-remote-thread-dup
    desc: Create thread in target process
    crit: notable
    conf: 0.98
    attack: T1055.001
    mbc: B0013
    if:
      type: symbol
      exact: CreateRemoteThread
    downgrade:
      any:
        - id: metadata/package::common-fp-context
        - id: well-known/tools/reverse-engineering::lordpe-tool
  - id: queue-user-apc
    desc: Queue APC to thread
    crit: notable
    conf: 0.95
    attack: T1055.004
    mbc: B0018
    if:
      type: symbol
      exact: QueueUserAPC
    downgrade:
      any:
        - id: metadata/package::common-fp-context
        - id: well-known/tools/reverse-engineering::lordpe-tool
  - id: set-thread-context-dup
    desc: Modify thread context/registers
    crit: notable
    conf: 0.95
    attack: T1055
    if:
      id: objectives/evasion/process/injection::set-thread-context
    downgrade:
      any:
        - id: metadata/package::common-fp-context
    unless:
      - type: basename
        regex: \.pyd$
  - id: get-thread-context-dup
    desc: Read thread context/registers
    crit: notable
    conf: 0.9
    attack: T1005
    if:
      id: objectives/evasion/process/injection::get-thread-context
    downgrade:
      any:
        - id: metadata/package::common-fp-context
    unless:
      - type: basename
        regex: \.pyd$
  - id: suspend-thread
    desc: Suspend thread execution
    crit: notable
    conf: 0.9
    attack: T1055
    if:
      type: symbol
      exact: SuspendThread
    downgrade:
      any:
        - id: metadata/package::common-fp-context
    unless:
      - type: basename
        regex: \.pyd$
  - id: resume-thread-dup
    desc: Resume thread execution
    crit: notable
    conf: 0.9
    attack: T1055
    if:
      id: objectives/evasion/process/injection::resume-thread
    unless:
      - type: basename
        regex: \.pyd$
      - type: metrics
        field: binary.import_count
        min: 80
    downgrade:
      any:
        - id: metadata/package::common-fp-context
composite_rules:
  - id: create-remote-thread-ex
    desc: Extended remote thread creation
    crit: notable
    conf: 0.98
    attack: T1055.001
    all:
      - id: objectives/evasion/fileless/memory::create-thread-sym
    unless:
      - id: metadata/library/runtime::openmp-runtime
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
