# Code Injection
# Process injection and shellcode execution
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Memory Manipulation for Code Execution ===
  # These traits reference micro-behaviors and add downgrade/unless rules for context
  - id: write-process-memory-dup
    desc: Write memory to target process
    crit: notable
    conf: 0.95
    attack: "T1055"
    mbc: "C0032"
    if:
      id: objectives/evasion/process/injection::write-process-memory-dup
    downgrade:
      any:
        - type: string
          substr: "madExcept"
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/lang/compiler::delphi
        - id: metadata/vendor/valve::valve-corp-binary
        - id: metadata/purpose/debug-tool::ollydbg-plugin-export
    unless:
      - type: string
        substr: "madExcept"
      - id: metadata/lang/compiler::delphi
  - id: read-process-memory
    desc: Read memory from target process
    crit: notable
    conf: 0.95
    attack: "T1005"
    if:
      type: raw
      word: "ReadProcessMemory"
    downgrade:
      any:
        - type: string
          substr: "madExcept"
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/lang/compiler::delphi
        - id: metadata/purpose/debug-tool::lordpe-tool
        - id: metadata/vendor/valve::valve-corp-binary
    unless:
      - type: string
        substr: "madExcept"
      - id: metadata/lang/compiler::delphi
  - id: create-remote-thread-dup
    desc: Create thread in target process
    crit: notable
    conf: 0.98
    attack: "T1055.001"
    mbc: "B0013"
    if:
      type: symbol
      exact: "CreateRemoteThread"
    downgrade:
      any:
        - type: string
          substr: "madExcept"
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/lang/compiler::delphi
        - id: metadata/purpose/debug-tool::lordpe-tool
        - id: metadata/vendor/valve::valve-corp-binary
    unless:
      - type: string
        substr: "madExcept"
      - id: metadata/lang/compiler::delphi
  - id: queue-user-apc
    desc: Queue APC to thread
    crit: notable
    conf: 0.95
    attack: "T1055.004"
    mbc: "B0018"
    if:
      type: symbol
      exact: "QueueUserAPC"
  - id: set-thread-context-dup
    desc: Modify thread context/registers
    crit: notable
    conf: 0.95
    attack: "T1055"
    if:
      id: objectives/evasion/process/injection::set-thread-context
      # API set forwarding stubs export these symbols as forwarders,
      # not as actual injection implementations.
    downgrade:
      any:
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/vendor/valve::valve-corp-binary
    unless:
      - type: basename
        regex: '\.pyd$'
  - id: get-thread-context-dup
    desc: Read thread context/registers
    crit: notable
    conf: 0.90
    attack: "T1005"
    if:
      id: objectives/evasion/process/injection::get-thread-context
      # API set forwarding stubs export these symbols as forwarders,
      # not as actual injection implementations.
    downgrade:
      any:
        - type: string
          substr: "madExcept"
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/lang/compiler::delphi
        - id: metadata/vendor/valve::valve-corp-binary
    unless:
      - type: string
        substr: "madExcept"
      - id: metadata/lang/compiler::delphi
      - type: basename
        regex: '\.pyd$'
  - id: suspend-thread
    desc: Suspend thread execution
    crit: notable
    conf: 0.90
    attack: "T1055"
    if:
      type: symbol
      exact: "SuspendThread"
    downgrade:
      any:
        - type: string
          substr: "madExcept"
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/lang/compiler::delphi
        - id: metadata/vendor/valve::valve-corp-binary
    unless:
      - type: string
        substr: "madExcept"
      - id: metadata/lang/compiler::delphi
      - type: basename
        regex: '\.pyd$'
  - id: resume-thread-dup
    desc: Resume thread execution
    crit: notable
    conf: 0.90
    attack: "T1055"
    if:
      id: objectives/evasion/process/injection::resume-thread
    unless:
      - type: string
        substr: "madExcept"
      - id: metadata/lang/compiler::delphi
      - type: metrics
        field: binary.import_count
        min: 80
    downgrade:
      any:
        - type: string
          substr: "madExcept"
        - type: string
          substr: "ApiSet Stub DLL"
        - id: metadata/lang/compiler::delphi
        - id: metadata/vendor/valve::valve-corp-binary
composite_rules:
  - id: create-remote-thread-ex
    desc: Extended remote thread creation
    crit: notable
    conf: 0.98
    attack: "T1055.001"
    all:
      - id: objectives/execution/fileless/memory::create-thread-sym
    unless:
      - type: string
        substr: "OpenMP Runtime"
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
