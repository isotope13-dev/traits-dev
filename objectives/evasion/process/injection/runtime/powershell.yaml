defaults:
  for: [powershell, batch]
  platforms: [windows]
  attack: T1055
  mbc: B0033

traits:
  - id: ps-openprocess-api
    desc: OpenProcess API name in script
    crit: suspicious
    conf: 0.88
    if:
      type: text
      word: OpenProcess
  - id: ps-virtualallocex-api
    desc: VirtualAllocEx API name in script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: VirtualAllocEx
  - id: ps-createremotethread-api
    desc: CreateRemoteThread API name in script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      word: CreateRemoteThread
  - id: ps-virtualprotectex-api
    desc: VirtualProtectEx API name in script
    crit: suspicious
    conf: 0.88
    if:
      type: text
      word: VirtualProtectEx
  - id: ps-kernel32-dllimport-token
    desc: kernel32 DLL import marker
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '(?i)DllImport.{0,120}kernel32\.dll'
  - id: ps-targets-explorer
    desc: Targets explorer process for injection
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(?i)Get-Process\s+-Name\s+explorer\b'

composite_rules:
  - id: ps-kernel32-dllimport
    desc: kernel32 injection API import
    crit: suspicious
    conf: 0.88
    near_lines: 80
    all:
      - id: ps-kernel32-dllimport-token
    any:
      - id: ps-openprocess-api
      - id: ps-virtualallocex-api
      - id: ps-virtualprotectex-api
      - id: ps-createremotethread-api
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: powershell-remote-thread-injector
    desc: PowerShell remote thread injector
    crit: hostile
    conf: 0.98
    all:
      - id: ps-openprocess-api
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: ps-createremotethread-api
    any:
      - id: ps-virtualallocex-api
      - id: ps-virtualprotectex-api
      - id: ps-kernel32-dllimport
      - id: metadata/lang/scripted::add-type-definition
    needs: 2
  - id: encrypted-powershell-remote-injector
    desc: Encrypted PowerShell process injector
    crit: hostile
    conf: 0.99
    all:
      - id: powershell-remote-thread-injector
      - id: objectives/command-and-control/dropper/staging/encrypted::ps-aes-inline-payload
    any:
      - id: ps-targets-explorer
      - id: micro-behaviors/process/sync/mutex::global-mutex-single-instance-script
      - id: micro-behaviors/data/encode/base64::from-base64-string
    needs: 2
