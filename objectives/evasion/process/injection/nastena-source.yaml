defaults:
  platforms: [windows]
  for: [source]
traits:
  - id: write-process-memory-source
    desc: WriteProcessMemory reference in source
    crit: notable
    conf: 0.94
    if:
      type: raw
      word: WriteProcessMemory
  - id: set-windows-hook-ex-source
    desc: SetWindowsHookEx reference in source
    crit: notable
    conf: 0.96
    if:
      type: raw
      word: SetWindowsHookEx
  - id: enum-process-modules-source
    desc: EnumProcessModules reference in source
    crit: notable
    conf: 0.9
    if:
      type: raw
      word: EnumProcessModules
  - id: toolhelp-module-walk-cluster-source
    desc: Toolhelp snapshot module walk cluster in source
    crit: notable
    conf: 0.93
    if:
      type: raw
      regex: CreateToolhelp32Snapshot.{0,64}Module32First
  - id: module-walk-followup-source
    desc: Module32First followed by Module32Next in source
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: Module32First.{0,64}Module32Next
  - id: shell-tray-wnd-source
    desc: Explorer shell window targeting in source
    crit: notable
    conf: 0.92
    if:
      type: raw
      word: Shell_TrayWnd
composite_rules:
  - id: dual-path-module-walk-source
    desc: Supports both PSAPI and Toolhelp module walking in source
    crit: suspicious
    conf: 0.95
    all:
      - id: enum-process-modules-source
      - id: toolhelp-module-walk-cluster-source
      - id: module-walk-followup-source
  - id: hook-based-remote-injection-source
    desc: Hook-based remote process injection in source
    crit: hostile
    conf: 0.99
    all:
      - id: write-process-memory-source
      - id: set-windows-hook-ex-source
    any:
      - id: enum-process-modules-source
      - id: shell-tray-wnd-source
