composite_rules:
  - id: pe-injection
    desc: "Process injection using CreateProcess and thread manipulation"
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    for: [pe]
    all:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
    unless:
      - id: metadata/binary/linking/api-set::api-set-forwarder-dll
      - id: metadata/binary/vendor/
      - id: metadata/binary/metrics/threshold::many-exports-1000
      - id: well-known/tool/sysadmin/conemu/
