defaults:
  platforms: [windows]
  for: [python]
  crit: suspicious
  attack: T1055.001
  mbc: F0003
traits:
  - id: getattr-write-process-memory
    desc: getattr('WriteProcessMemory') obfuscation
    conf: 0.97
    if:
      type: text
      regex: getattr\([^)]{0,120}['"]WriteProcessMemory['"]\s*\)
  - id: getattr-create-remote-thread
    desc: getattr('CreateRemoteThread') obfuscation
    conf: 0.97
    if:
      type: text
      regex: getattr\([^)]{0,120}['"]CreateRemoteThread['"]\s*\)
composite_rules:
  - id: dll-injection-comp
    desc: Python remote-DLL injection API chain
    crit: hostile
    conf: 0.95
    needs: 3
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex-python-source
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-source
      - id: micro-behaviors/process/inject/dll::create-remote-thread-python-source
  - id: obfuscated-injection
    desc: Obfuscated DLL injection
    crit: hostile
    conf: 0.97
    any:
      - id: getattr-write-process-memory
      - id: getattr-create-remote-thread
