# Game-Process-Targeted DLL Injection Detection
# Detects the full chain: process enumeration → game process discovery →
# DLL injection via CreateRemoteThread + LoadLibraryA.
# This is the classic game-cheat overlay injection pattern.
# ATT&CK: T1055.001 (Dynamic-link Library Injection)
defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  # Full game-cheat injection chain: Toolhelp enumeration + game process target
  # + classic DLL injection via CreateRemoteThread + LoadLibraryA resolution
  - id: game-process-dll-injection-chain
    desc: DLL injection chain targeting a game process
    crit: hostile
    conf: 0.93
    attack: T1055.001
    mbc: B0033
    all:
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
      - id: micro-behaviors/process/inject/runtime::create-remote-thread-dup
      - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/signed/developer::valve-corp.
