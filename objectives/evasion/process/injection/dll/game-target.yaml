# Game-Process-Targeted DLL Injection Detection
# Detects the full chain: process enumeration → game process discovery →
# DLL injection via CreateRemoteThread + LoadLibraryA.
# This is the classic game-cheat overlay injection pattern.
# ATT&CK: T1055.001 (Dynamic-link Library Injection)
defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  # Toolhelp enumeration plus classic remote-thread injection APIs. This does
  # not by itself prove a game target; target-specific traits should escalate.
  - id: game-process-dll-injection-chain
    desc: DLL injection API chain with process enumeration
    crit: suspicious
    conf: 0.9
    attack: T1055.001
    mbc: B0033
    all:
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
      - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/signed/developer::valve-corp.
        - id: well-known/game/mod::game-mod-embedded-dll
    unless:
      - id: well-known/lib/wine::wine-runtime-component
      - id: well-known/tool/sysadmin/console::ansicon-console-hook-component
      - id: metadata/binary/metrics/threshold::many-exports-1000
