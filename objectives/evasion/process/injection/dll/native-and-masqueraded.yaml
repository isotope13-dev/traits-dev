# Hostile remote-thread injection variants on compiled Windows PEs that the
# suspicious-tier injection composites don't elevate on their own: the same
# injection primitives become hostile when the binary forges a Microsoft
# identity, or when injection runs through the injection-specific native
# RtlCreateUserThread API.
defaults:
  platforms: [windows]
  for: [pe, dll]
  mbc: E1055
composite_rules:
  # A binary whose version resource forges a Microsoft identity (a contradiction
  # vs its real signing/identity) AND performs the VirtualAllocEx +
  # WriteProcessMemory + CreateRemoteThread injection trinity is a masqueraded
  # injector — legitimate Microsoft tools are signed and don't forge identity.
  - id: masqueraded-microsoft-remote-injector
    desc: Identity-forging binary performs remote-thread injection
    crit: hostile
    conf: 0.96
    attack: T1055.001
    all:
      - id: objectives/evasion/masquerade/version-resource/contradiction::microsoft-company-versioninfo-kv
      - id: objectives/evasion/process/injection/dll::injection-trinity-text
  # RtlCreateUserThread is an undocumented ntdll routine used almost exclusively
  # for cross-process injection (the native equivalent of CreateRemoteThread).
  # Paired with a remote allocation and a remote write it is native code
  # injection.
  - id: native-rtl-user-thread-injection
    desc: Native cross-process injection via RtlCreateUserThread
    crit: hostile
    conf: 0.95
    attack: T1055.003
    all:
      - id: micro-behaviors/process/inject/runtime/call::native-remote-thread-create
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    any:
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-source
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-binary
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::windows-system-implementer-dll
