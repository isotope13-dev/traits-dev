# Remote LoadLibrary DLL Injection
# Detects the "DLL injection via remote LoadLibrary" pattern where malware
# allocates memory in a target process, writes a DLL path, and launches
# CreateRemoteThread with LoadLibraryA as the start address.
# MBC: B0033 (Process Injection)
# ATT&CK: T1055.001 (Dynamic-link Library Injection)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1055.001"
  mbc: "B0033"
composite_rules:
  - id: remote-loadlibrary-injection
    desc: DLL injection via remote LoadLibrary call
    crit: hostile
    conf: 0.94
    for: [pe, dll, c, cpp]
    all:
      - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    any:
      - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
      - id: micro-behaviors/dylib/load/runtime::load-library-w
      - id: micro-behaviors/dylib/load/source::load-library-source
    unless:
      - id: well-known/game/mod/
      - id: well-known/tool/offensive/mimikatz/
      - id: well-known/lib/electron/
      - id: metadata/lang/source::wine-compat-source
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/installer/family/
        - id: well-known/tool/sysadmin/sandboxie/
        - id: well-known/tool/reverse-engineering/x64dbg/
  - id: remote-loadlibrary-injection-source
    desc: Source code for remote LoadLibrary injection
    crit: suspicious
    conf: 0.95
    for: [c, cpp]
    all:
      - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    any:
      - id: micro-behaviors/dylib/load/source::load-library-a-source
      - id: micro-behaviors/dylib/load/runtime::load-library-w
    unless:
      - id: well-known/lib/easyhook/
      - id: metadata/lang/source::wine-compat-source
