# Remote LoadLibrary DLL Injection
# Detects the "DLL injection via remote LoadLibrary" pattern where malware
# allocates memory in a target process, writes a DLL path, and launches
# CreateRemoteThread with LoadLibraryA as the start address.
# MBC: B0033 (Process Injection)
# ATT&CK: T1055.001 (Dynamic-link Library Injection)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1055.001"
  mbc: "B0033"
composite_rules:
  - id: remote-loadlibrary-injection
    desc: DLL injection via remote LoadLibrary call
    crit: hostile
    conf: 0.94
    all:
      - id: micro-behaviors/process/inject/dll::create-remote-thread
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
    unless:
      - id: well-known/lib/wine::wine-runtime-component
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: well-known/game/mod::game-mod-embedded-dll
      - id: well-known/tool/offensive/mimikatz::mimikatz
      - id: well-known/tool/reverse-engineering/x64dbg::titanengine-library
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/installer/family::known-benign-installer
        - id: well-known/tool/sysadmin/sandboxie::signed-sandboxie-component
