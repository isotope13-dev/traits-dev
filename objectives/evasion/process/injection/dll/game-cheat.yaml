# Game Cheat Process Injection Detection
# Detects game cheats that enumerate processes, find the target game,
# open it, read memory, and inject code or overlay.
# This is the classic game-cheat injection pattern.
# ATT&CK: T1055 (Process Injection)
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1055"
  mbc: "B0033"
traits:
  - id: game-target-unity
    desc: Unity game target module
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)(UnityPlayer\.dll|GameAssembly\.dll)'
  - id: game-target-mainstream-exe
    desc: Mainstream game target executable
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)(RobloxPlayerBeta|FortniteClient|gta5\.exe)'
  - id: game-target-source-engine
    desc: Source-engine game module target
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)(csgo\.exe|hl2\.exe)'
composite_rules:
  - id: game-cheat-process-injection
    desc: Game cheat with process injection into target game
    crit: hostile
    conf: 0.93
    all:
      - id: game-cheat-enumeration-marker
      - id: game-cheat-open-process-marker
      - id: game-cheat-target-marker
    any:
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
    needs: 1
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: objectives/evasion/process/injection/dll/
    downgrade:
      all:
        - id: metadata/signed/developer::valve-corp.
        - id: metadata/signed/developer::johannes-schindelin
        - id: metadata/signed/certificate/identity::pe-signature-verified

  - id: game-cheat-memory-read
    desc: Game cheat reading game process memory
    crit: suspicious
    conf: 0.90
    all:
      - id: game-cheat-enumeration-marker
      - id: game-cheat-target-marker
      - id: micro-behaviors/process/inject/runtime/call::read-process-memory
      - id: game-cheat-open-process-marker
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
    needs: 1
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: well-known/game/mod/
      - id: well-known/game/mod/
      - id: well-known/tool/dual-use/pvz-tools/
      - id: objectives/evasion/process/injection/dll/
  - id: game-cheat-enumeration-marker
    desc: Toolhelp-based game process enumeration
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
      - id: micro-behaviors/process/enumerate/snapshot::comprehensive-toolhelp-strings
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-module-enumeration-string
  - id: game-cheat-open-process-marker
    desc: OpenProcess handle acquisition marker
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/spawn::open-process
      - id: micro-behaviors/process/create/spawn::open-process
  - id: game-cheat-target-marker
    desc: Game target process/module marker
    crit: component
    conf: 0.86
    any:
      - id: game-target-unity
      - id: game-target-mainstream-exe
      - id: game-target-source-engine
  - id: non-cheat-process-memory-tool-marker
    desc: Recognized process memory tool marker
    crit: notable
    conf: 0.9
    any:
      - id: well-known/lib/wine::wine-runtime-component
      - id: well-known/tool/sysadmin/disk-utility::winhex-xways
      - id: metadata/lang/compiled::autoit-binary
      - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-release-component
      - id: well-known/tool/reverse-engineering/scylla::scylla-unpacker
