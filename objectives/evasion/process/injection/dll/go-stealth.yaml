# A Go launcher that allocates and writes another process's memory, then
# starts LoadLibraryW through remote-thread APIs, is DLL injection. Requiring
# the complete chain avoids flagging isolated API wrappers.
defaults:
  platforms: [windows]
  for: [go]
  attack: T1055.001
  mbc: F0003

composite_rules:
  - id: go-stealth-dll-injection
    desc: Go stealth DLL injection chain
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/evasion/process/injection/staged::go-process-injection-api-triad
      - id: micro-behaviors/process/inject/runtime/call::go-ntcreatethreadex-wrapper
      - id: micro-behaviors/process/inject/runtime/call::go-loadlibraryw-wrapper
      - id: micro-behaviors/process/create/flags::create-suspended-flag-reference
