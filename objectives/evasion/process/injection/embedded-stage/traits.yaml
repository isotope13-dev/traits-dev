# Process hollowing implemented in an embedded PowerShell stage of a batch file.
defaults:
  platforms: [windows]
  mbc: "B0007"
  attack: "T1055.012"
  for: [batch]

traits:
  - id: embedded-process-hollowing-routine
    desc: Embedded PowerShell process hollowing routine
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      encoding: base64
      substr: Invoke-ProcessHollowing
  - id: encoded-suspended-process-creation
    desc: Encoded suspended-process creation API
    crit: notable
    conf: 0.92
    if:
      type: encoded
      encoding: base64
      substr: CreateProcessA
  - id: encoded-remote-memory-allocation
    desc: Encoded remote executable memory allocation
    crit: suspicious
    conf: 0.94
    if:
      type: encoded
      encoding: base64
      substr: VirtualAllocEx
  - id: encoded-thread-context-read-api
    desc: Encoded remote thread context read
    crit: suspicious
    conf: 0.94
    if:
      type: encoded
      encoding: base64
      substr: GetThreadContext
  - id: encoded-thread-context-write-api
    desc: Encoded remote thread context write
    crit: suspicious
    conf: 0.94
    if:
      type: encoded
      encoding: base64
      substr: SetThreadContext
  - id: encoded-resumed-hollowed-thread
    desc: Encoded resumed hollowed thread
    crit: suspicious
    conf: 0.94
    if:
      type: encoded
      encoding: base64
      substr: ResumeThread

composite_rules:
  - id: embedded-powershell-process-hollowing
    desc: Batch embeds PowerShell process hollowing
    crit: hostile
    conf: 0.99
    all:
      - id: embedded-process-hollowing-routine
      - id: encoded-suspended-process-creation
      - id: encoded-remote-memory-allocation
      - id: encoded-thread-context-read-api
      - id: encoded-thread-context-write-api
      - id: encoded-resumed-hollowed-thread
