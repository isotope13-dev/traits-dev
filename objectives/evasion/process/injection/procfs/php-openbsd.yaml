defaults:
  platforms: [openbsd, bsd, unix]
  for: [php]
  attack: T1055.008

traits:
  - id: php-openbsd-proc-mem-path
    desc: PHP OpenBSD proc mem path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "/proc/{$pid}/mem"

  - id: php-proc-mem-shellcode-write
    desc: PHP proc mem shellcode write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: shellcode[\s\S]{0,220}fwrite\(\$fd,\s*\$shellcode

composite_rules:
  - id: php-openbsd-procfs-injection
    desc: PHP OpenBSD procfs injection
    crit: hostile
    conf: 0.98
    all:
      - id: php-openbsd-proc-mem-path
      - id: php-proc-mem-shellcode-write
