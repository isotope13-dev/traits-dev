defaults:
  platforms: [esxi, unix]
  for: [perl]
  attack: T1055

traits:
  - id: perl-proc-pid-mem-write
    desc: Perl writes proc pid mem
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc/\$[A-Za-z_]\w*/mem[\s\S]{0,220}open\([^,\n]{0,80},\s*[''"]\+<'

  - id: perl-proc-pid-maps-read
    desc: Perl reads proc pid maps
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '/proc/\$[A-Za-z_]\w*/maps'

  - id: perl-ld-preload-environ-write
    desc: Perl writes LD_PRELOAD environ
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'LD_PRELOAD=[^\n]{1,120}\\0[\s\S]{0,220}/proc/\$[A-Za-z_]\w*/environ'

  - id: perl-proc-pid-environ-path
    desc: Perl proc pid environ path
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '/proc/\$[A-Za-z_]\w*/environ'

composite_rules:
  - id: perl-procfs-process-injection
    desc: Perl procfs process injection
    crit: hostile
    conf: 0.98
    all:
      - id: perl-proc-pid-mem-write
      - id: perl-proc-pid-maps-read
  - id: perl-ld-preload-env-injection
    desc: Perl LD_PRELOAD env injection
    crit: hostile
    conf: 0.98
    all:
      - id: perl-ld-preload-environ-write
      - id: perl-proc-pid-environ-path
