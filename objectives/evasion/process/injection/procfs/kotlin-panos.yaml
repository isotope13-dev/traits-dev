defaults:
  platforms: [panos, appliance, unix]
  for: [kotlin, class, elf, c]
  attack: T1055.008

traits:
  - id: kotlin-proc-mem-inject-call
    desc: Kotlin proc mem inject call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: inject_via_proc_mem

  - id: kotlin-native-inject-process
    desc: Kotlin native inject process
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: inject_process
    unless:
      - id: well-known/app/obs-studio

composite_rules:
  - id: kotlin-panos-procfs-injection
    desc: Kotlin PAN-OS procfs injection
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/proc/info/memory::c-procfs-mem-template
      - id: kotlin-proc-mem-inject-call

  - id: kotlin-panos-native-ptrace-injection
    desc: Kotlin PAN-OS native ptrace inject
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-native-inject-process
      - id: kotlin-proc-mem-inject-call
      - id: micro-behaviors/os/syscall/invoke::ptrace-import
