defaults:
  platforms: [netscaler, appliance, unix]
  for: [scripts, binaries, go, java, kotlin, csharp, swift]
  attack: T1055

traits:
  - id: netscaler-proc-environ-ldpreload
    desc: NetScaler proc environ LD_PRELOAD
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '/proc/.{1,80}/environ[\s\S]{0,180}LD_PRELOAD=/tmp/\.malicious\.so'

  - id: netscaler-ldpreload-malicious-so
    desc: NetScaler LD_PRELOAD malicious so
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: LD_PRELOAD=/tmp/.malicious.so

  - id: netscaler-proc-mem-pid-path
    desc: NetScaler proc PID mem path
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '/proc/\d{1,10}/mem([^a-z/]|$)'

  - id: netscaler-proc-mem-format-path
    desc: NetScaler proc format mem path
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '/proc/%(d|i|ld)/mem([^a-z/]|$)'

  - id: netscaler-proc-mem-var-path
    desc: NetScaler proc var mem path
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '/proc/\$\w{1,40}/mem([^a-z/]|$)'

  - id: netscaler-proc-mem-symbol-path
    desc: NetScaler proc symbolic mem path
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '/proc/(PID|getpid\(\))/mem([^a-z/]|$)'

  - id: netscaler-x64-shellcode-prefix
    desc: NetScaler x64 shellcode prefix
    crit: suspicious
    conf: 0.96
    for: [binaries, shell, python, perl, ruby, go, java, kotlin, csharp, swift]
    if:
      type: text
      substr: "\\x48\\x31"
    unless:
      - id: well-known/app/olares::cli-source-tree
      - id: well-known/app/gns3::gns3-gui-package-member

  - id: netscaler-nsconfig-lua-path
    desc: NetScaler Lua script path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'find /nsconfig -name .{0,40}\*\.lua'

  - id: netscaler-lua-inject-token
    desc: NetScaler Lua injection token
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(dostring|wget -qO-)[\s\S]{0,120}backdoor\.sh'

composite_rules:
  - id: netscaler-proc-mem-path
    desc: NetScaler proc mem path
    crit: suspicious
    conf: 0.98
    any:
      - id: netscaler-proc-mem-pid-path
      - id: micro-behaviors/fs/proc/info/memory::proc-self-mem-path
      - id: netscaler-proc-mem-format-path
      - id: netscaler-proc-mem-var-path
      - id: netscaler-proc-mem-symbol-path
    unless:
      - id: micro-behaviors/process/debug/tool-markers::gdb-debugger-text-marker
      - id: micro-behaviors/process/debug/tool-markers::lldb-ptrace-text-marker

  - id: netscaler-proc-environ-injection
    desc: NetScaler proc environ injection
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-proc-environ-ldpreload
      - id: netscaler-ldpreload-malicious-so

  - id: netscaler-proc-mem-injection
    desc: NetScaler proc mem injection
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-proc-mem-path
      - id: netscaler-x64-shellcode-prefix

  - id: netscaler-lua-script-injection
    desc: NetScaler Lua script injection
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-nsconfig-lua-path
      - id: netscaler-lua-inject-token
