defaults:
  platforms: [unix]
  for: [php]
  attack: T1055.008

traits:
  - id: php-proc-pid-mem-write
    desc: PHP writes proc pid mem
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc/\{\$[A-Za-z_]\w*\}/mem[\s\S]{0,220}fopen\(\$memPath,\s*[''"]w'

  - id: php-compile-ptrace-injector
    desc: PHP compiles ptrace injector
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'gcc -o [\s\S]{0,160}inject\.c[\s\S]{0,220}\.injector'

  - id: php-injector-command-run
    desc: PHP runs injector command
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'injectCmd[\s\S]{0,220}INJECTED'

composite_rules:
  - id: php-procfs-process-injection
    desc: PHP procfs process injection
    crit: hostile
    conf: 0.98
    any:
      - id: php-proc-pid-mem-write
      - id: php-compile-ptrace-injector
    needs: 1
    all:
      - id: php-injector-command-run
