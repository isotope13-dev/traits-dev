defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1055.012
  mbc: E1055.012
traits:
  - id: create-process-string
    desc: CreateProcess API string reference
    crit: component
    conf: 0.8
    if:
      type: text
      substr: CreateProcess
  - id: create-process-suspended
    desc: CREATE_SUSPENDED process flag
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: CREATE_SUSPENDED
  - id: create-process-flags
    desc: CreateProcess with suspended flag (0x4)
    crit: notable
    conf: 0.65
    count_min: 2
    size_max: 2097152
    if:
      type: hex
      section: text
      pattern: 6a 04
  - id: nt-unmap-section
    desc: NtUnmapViewOfSection call
    crit: component
    conf: 0.85
    if:
      type: text
      substr: NtUnmapViewOfSection
  - id: zw-unmap-section
    desc: ZwUnmapViewOfSection call
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ZwUnmapViewOfSection
  - id: write-process-memory-dup
    desc: WriteProcessMemory call
    crit: notable
    conf: 0.7
    if:
      type: text
      word: WriteProcessMemory
    downgrade:
      any:
        - type: text
          substr: madExcept
        - id: metadata/lang/compiler/managed::delphi
        - id: well-known/tools/reverse-engineering::ollydbg-plugin-export
        - id: metadata/signed/platform::microsoft
    unless:
      - type: text
        substr: madExcept
      - id: metadata/lang/compiler/managed::delphi
  - id: get-thread-context
    desc: GetThreadContext call
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: GetThreadContext
    downgrade:
      any:
        - type: text
          substr: madExcept
        - id: metadata/lang/compiler/managed::delphi
        - type: metrics
          field: binary.import_count
          min: 80
    unless:
      - type: text
        substr: madExcept
      - id: metadata/lang/compiler/managed::delphi
      - type: basename
        regex: \.pyd$
  - id: set-thread-context
    desc: SetThreadContext call
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: SetThreadContext
    downgrade:
      any:
        - type: metrics
          field: binary.import_count
          min: 80
        - type: metrics
          field: binary.function_count
          min: 1000
    unless:
      - type: basename
        regex: \.pyd$
      - type: basename
        substr: Microsoft
        case_insensitive: true
  - id: nt-get-context
    desc: NtGetContextThread call
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: NtGetContextThread
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: nt-set-context
    desc: NtSetContextThread call
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: NtSetContextThread
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: resume-thread
    desc: ResumeThread call
    crit: notable
    conf: 0.6
    if:
      type: text
      word: ResumeThread
    downgrade:
      any:
        - type: text
          substr: madExcept
        - id: metadata/lang/compiler/managed::delphi
        - type: metrics
          field: binary.import_count
          min: 80
    unless:
      - type: text
        substr: madExcept
      - id: metadata/lang/compiler/managed::delphi
      - type: basename
        regex: \.pyd$
  - id: zw-query-information-process
    desc: ZwQueryInformationProcess for PEB access
    crit: notable
    conf: 0.8
    if:
      type: text
      word: ZwQueryInformationProcess
    unless:
      - id: metadata/binary/resource::kernel-driver-idata
    downgrade:
      any:
        - id: well-known/tools/reverse-engineering::ollydbg-plugin-export
  - id: hollowing-entrypoint-overwrite
    desc: Debug string indicating entrypoint overwrite
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: entrypoint with payload
  - id: hollowing-suspended-state-msg
    desc: Debug string indicating suspended process creation
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: suspended state with PID
  - id: image-base-relocation
    desc: IMAGE_BASE_RELOCATION parsing
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: IMAGE_BASE_RELOCATION
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - type: metrics
          field: binary.function_count
          min: 1000
  - id: svchost-target
    desc: svchost.exe target path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)system32[/\\]+svchost\.exe
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
  - id: dllhost-target
    desc: dllhost.exe target path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)system32[/\\]+dllhost\.exe
  - id: mstsc-target
    desc: mstsc.exe target path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)system32[/\\]+mstsc\.exe
  - id: rundll32-target
    desc: rundll32.exe target path
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)system32[/\\]+rundll32\.exe
  - id: calc-target
    desc: calc.exe decoy target
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: calc.exe
  - id: notepad-target
    desc: notepad.exe decoy target
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: notepad.exe
  - id: iexplore-target
    desc: iexplore.exe decoy target
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: iexplore.exe
composite_rules:
  - id: unmap-section-apis
    desc: Section unmapping APIs
    crit: component
    conf: 0.85
    any:
      - id: nt-unmap-section
      - id: zw-unmap-section
  - id: decoy-process-hollowing-targets
    desc: Hollowing targets benign Windows apps
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/evasion/process/injection/memory::process-inject-api
      - id: resume-thread
      - id: create-process-string
    any:
      - id: calc-target
      - id: notepad-target
      - id: iexplore-target
    needs: 2
  - id: memory-write-apis
    desc: Process memory writing APIs
    any:
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
  - id: thread-context-apis
    desc: Thread context manipulation APIs
    any:
      - id: get-thread-context
      - id: set-thread-context
      - id: nt-get-context
      - id: nt-set-context
  - id: hollow-targets
    desc: Common process hollowing targets
    crit: notable
    conf: 0.75
    any:
      - id: svchost-target
      - id: dllhost-target
      - id: mstsc-target
      - id: rundll32-target
  - id: ppid-spoofing-attributes
    desc: Parent PID spoofing process attributes
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/spawn::update-proc-thread-attribute
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::diagnostics-hub
    unless:
      - id: metadata/library/runtime::cygwin-runtime
      - id: metadata/binary/installer/script::nsis
  - id: hollowing-primitives
    desc: Process hollowing API primitives
    crit: suspicious
    conf: 0.9
    all:
      - id: create-process-suspended
      - id: unmap-section-apis
      - id: memory-write-apis
      - id: thread-context-apis
  - id: context-hollowing-chain
    desc: CreateProcess with thread context hollowing
    crit: suspicious
    conf: 0.95
    all:
      - id: create-process-string
      - id: thread-context-apis
      - id: resume-thread
      - id: objectives/evasion/process/injection::flush-instruction-cache-windows
    any:
      - id: create-process-suspended
      - id: create-process-flags
      - id: objectives/evasion/process/injection/runtime::suspend-thread
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::diagnostics-hub
        - id: well-known/tools/reverse-engineering::ida-debugger-server
        - id: well-known/tools/reverse-engineering::scylla-unpacker
    unless:
      - id: metadata/binary/metrics::many-imports
  - id: mstsc-ppid-loader
    desc: mstsc sacrificial process with PPID spoofing
    crit: suspicious
    conf: 0.96
    all:
      - id: mstsc-target
      - id: ppid-spoofing-attributes
    any:
      - id: objectives/evasion/process/injection/runtime::read-process-memory
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/dylib/lookup::get-proc-address
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
  - id: dotnet-process-hollowing
    desc: .NET process hollowing via P/Invoke
    crit: hostile
    conf: 0.95
    all:
      - id: create-process-string
      - id: create-process-suspended
      - id: write-process-memory-dup
      - id: resume-thread
    any:
      - id: svchost-target
      - id: dllhost-target
      - id: rundll32-target
      - id: hollowing-entrypoint-overwrite
      - id: hollowing-suspended-state-msg
      - id: zw-query-information-process
    needs: 1
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
  - id: process-hollowing-alloc-write-context
    desc: Process hollowing via alloc, write, context swap
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: write-process-memory-dup
      - id: get-thread-context
      - id: set-thread-context
      - id: resume-thread
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::diagnostics-hub
        - id: well-known/tools/reverse-engineering::ida-debugger-server
        - id: metadata/binary/metrics::many-imports
    unless:
      - id: metadata/binary/metrics::many-exports
  - id: java-proxy-hollowing-loader
    desc: Java proxy DLL with hollowing chain
    crit: suspicious
    conf: 0.97
    all:
      - id: context-hollowing-chain
      - id: metadata/binary/framework::java-launcher-proxy-exports
    any:
      - id: micro-behaviors/os/module/load::get-module-filename-dup
      - id: micro-behaviors/dylib/load::load-library-ex-w
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: objectives/anti-static/obfuscation/imports::randomized-dll-name-pair
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::diagnostics-hub
