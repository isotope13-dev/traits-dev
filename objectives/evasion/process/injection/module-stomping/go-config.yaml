# Module stomping configuration in Go source code.
# Detects config fields that specify a target module path for
# in-memory execution via module stomping (overwriting a loaded
# module's memory with malicious code). Used by emp3r0r and
# similar implants to execute code without creating new processes.
# ATT&CK: T1055.013 (Process Injection: Module Stomping)
defaults:
  platforms: [linux, macos, windows]
  for: [go]
  attack: T1055.013
  mbc: B0032

traits:
  - id: module-stomp-path-config
    desc: Module stomping target path configuration field
    crit: suspicious
    conf: 0.88
    if:
      type: text
      word: ModulePath

  - id: module-stomp-stager-flag
    desc: Stager-launched module stomping indicator
    crit: suspicious
    conf: 0.88
    if:
      type: text
      word: IsRunByStager

composite_rules:
  - id: module-stomping-config
    desc: Module stomping execution configuration
    crit: suspicious
    conf: 0.9
    all:
      - id: module-stomp-path-config
    any:
      - id: module-stomp-stager-flag
