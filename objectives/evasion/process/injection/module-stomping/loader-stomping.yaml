# Module stomping combined with in-memory loader behavior.
# Detects when a binary references mscoree.dll (a known module stomping
# target) alongside .NET error strings and loader APIs, indicating
# the binary may use module stomping to hide its execution.
# ATT&CK: T1055.013 (Process Injection: Module Stomping)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055.013
  mbc: B0032
composite_rules:
  - id: loader-module-stomping
    desc: In-memory loader with module stomping indicators
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/evasion/process/injection/toolkit::module-stomping-target
      - id: objectives/command-and-control/backdoor/loader/native-reflect::in-memory-pe-loader-with-decryption
    any:
      - id: micro-behaviors/process/inject/runtime/clr::corexitprocess-string
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-assembly
