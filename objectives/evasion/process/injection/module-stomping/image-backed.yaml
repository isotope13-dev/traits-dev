defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055.013
composite_rules:
- id: image-backed-shellcode-injection
  desc: Image-backed shellcode injection (module stomping)
  crit: hostile
  conf: 0.96
  arch: [x86-64]
  size_max: 5242880
  all:
  - id: objectives/evasion/process/injection/toolkit::obscure-system-dll-target
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  any:
  - id: objectives/anti-static/obfuscation/imports::mz-magic-check
  - id: objectives/anti-static/obfuscation/imports::pe-signature-check
  - id: objectives/anti-static/obfuscation/imports::pe-header-walk-x64
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/binary/installer/sfx::winrar-sfx
  - id: metadata/binary/installer::known-benign-installer
