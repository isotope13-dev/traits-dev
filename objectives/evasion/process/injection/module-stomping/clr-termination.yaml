# Module stomping with CLR termination indicators.
# Detects when a binary references mscoree.dll (a known module stomping
# target) alongside CorExitProcess, indicating the binary may use module
# stomping to hijack the .NET CLR loader for execution.
# ATT&CK: T1055.013 (Process Injection: Module Stomping)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055.013
  mbc: B0032

composite_rules:
  - id: module-stomping-clr-termination
    desc: Module stomping with CLR termination indicators
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/evasion/process/injection/toolkit::module-stomping-target
      - id: micro-behaviors/process/inject/runtime/clr::corexitprocess-string
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: objectives/evasion/process/injection/module-stomping::msvc-crt-full-linkage
    downgrade:
      any:
        - id: metadata/signed/certificate/identity::pe-signature-verified
