defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: corexitprocess-stomping
    desc: CorExitProcess with module-stomping target
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/process/inject/runtime/clr::corexitprocess-string
      - id: objectives/evasion/process/injection/toolkit::module-stomping-target
    any:
      - id: objectives/evasion/process/injection/memory::process-inject-api
      - id: objectives/evasion/process/injection/toolkit::module-stomp-v2-str
    unless:
      - id: metadata/build/compiler::msvc-crt-strerror-diagnostic
      - id: objectives/evasion/process/injection/module-stomping/
      - id: well-known/tool/sysadmin/sandboxie/
      - id: metadata/binary/installer/sfx/
    downgrade:
      any:
        - id: well-known/game/mod/
