# Go DLL Thread Manipulation
# Go binaries compiled as c-shared DLLs with thread context manipulation
# are strongly associated with malware (Sliver, custom loaders, implants).
# The Go runtime does use SuspendThread/GetThreadContext internally for
# goroutine scheduling, but combined with c-shared buildmode and trimpath
# this pattern is overwhelmingly malicious.
defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: go-cshared-thread-hijack
    desc: Go DLL with thread context manipulation
    crit: suspicious
    conf: 0.85
    attack: "T1055.003"
    all:
      - id: metadata/lang/go-build::go-cshared-dll
    any:
      - id: objectives/evasion/process/injection/runtime::suspend-thread
      - id: objectives/evasion/process/injection/runtime::get-thread-context-dup
      - id: objectives/evasion/process/injection/runtime::set-thread-context-dup
    needs: 2
