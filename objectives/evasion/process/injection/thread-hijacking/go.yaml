# Go process injection via thread context manipulation.
# Go binaries that combine WriteProcessMemory with thread context manipulation
# (SetThreadContext, GetThreadContext, ResumeThread) are performing process
# injection. The Go runtime uses thread context APIs internally for goroutine
# scheduling, but combined with WriteProcessMemory this indicates injection.
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1055.003
composite_rules:
  - id: go-thread-hijack-injection
    desc: Go binary with thread hijacking injection
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
    any:
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
    needs: 1
    unless:
      - id: well-known/tool/reverse-engineering/windows-debugger::gdbserver-debugger-server
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker
