defaults:
  for:
  - pe
  platforms:
  - windows
  attack: T1055.003
composite_rules:
- id: no-import-thread-hijack-loader
  desc: No-import thread hijack loader
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/anti-static/obfuscation/payload/section::zero-import-dependency-pe
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-text
  - id: micro-behaviors/process/inject/runtime/call::set-thread-context-text
  any:
  - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
  - id: micro-behaviors/process/inject/runtime/call::get-thread-context-text
  - id: micro-behaviors/process/info/thread::resume-thread
  - id: micro-behaviors/process/create/launch::create-process-api-name
  - id: objectives/evasion/masquerade/process/name::explorer-name
  - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
  - id: objectives/anti-static/obfuscation/binary-structure::int3-padding-text
  needs: 3
  unless:
  - id: metadata/signed/platform/
  - id: metadata/lang/compiled/
  - id: metadata/binary/framework/

- id: anti-debugging-thread-context-loader
  desc: Packed PE combines debugger detection with thread-context execution control
  crit: hostile
  conf: 0.98
  attack: T1055.003,T1027,T1622
  all:
  - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
  - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
  - id: micro-behaviors/process/info/thread::resume-thread-dup
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: objectives/anti-static/pack/runtime::unpacking-api-pattern
  - id: objectives/anti-static/obfuscation/payload/section::large-high-entropy-gfx-section
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: well-known/tool/reverse-engineering/
  - id: well-known/tool/development/
  - id: well-known/app/dism-plus-plus::dism-plus-plus-main-context
  - id: well-known/app/dism-plus-plus::dism-plus-plus-plugin-context

- id: malformed-thread-context-loader
  desc: Malformed packed PE controls thread context and memory protection
  crit: hostile
  conf: 0.96
  for: [pe, dll]
  attack: T1027,T1055.003
  all:
  - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
  - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: metadata/binary/metrics/structural::malformed-pe-structure
  - id: objectives/anti-static/pack/section-anomaly::oversized-reloc-masking

- id: anti-debug-thread-hijack-memory-loader
  desc: Unsigned PE combines anti-debugging, thread hijacking, and executable memory
  crit: hostile
  conf: 0.98
  attack: T1055.003,T1027,T1622
  all:
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
  - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
  - id: micro-behaviors/process/info/thread::resume-thread-dup
  - id: micro-behaviors/mem/protect/modify::virtual-memory-allocation-protection-api-pair
  unless:
  - id: metadata/signed/leaf::microsoft-corporation
  - id: well-known/app/oneget::oneget-detours-dns-shim-context
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: well-known/tool/reverse-engineering/
  - id: well-known/tool/development/
  - id: well-known/app/dism-plus-plus::dism-plus-plus-main-context
  - id: well-known/app/dism-plus-plus::dism-plus-plus-plugin-context
