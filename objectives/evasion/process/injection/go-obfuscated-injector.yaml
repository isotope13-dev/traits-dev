defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: go-obfuscated-thread-injector
    desc: Go binary with obfuscation and thread injection
    crit: hostile
    conf: 0.92
    attack: T1055.003
    all:
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: micro-behaviors/process/inject/runtime::suspend-thread
      - id: micro-behaviors/process/inject/runtime::resume-thread-dup
    any:
      - id: objectives/anti-static/obfuscation/name-mangling::go-embedded-compiler-ir
      - id: objectives/anti-static/obfuscation/name-mangling::go-concatenated-word-types
      - id: objectives/anti-static/obfuscation/name-mangling::go-instruction-opcode-types
      - id: objectives/anti-static/obfuscation/tools/garble::garble-obfuscated-go
