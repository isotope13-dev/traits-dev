# AutoIt runtimes expose process-injection APIs for process automation, but
# when the image also elevates and stages via WinInet the injection cluster is
# an intentional hostile loader, not a generic script helper.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1055
  mbc: B0033

composite_rules:
  - id: autoit-remote-memory-injector
    desc: AutoIt binary with remote process memory injection APIs
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: objectives/evasion/process/injection/memory::process-inject-api
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
      - id: well-known/tool/reverse-engineering/
