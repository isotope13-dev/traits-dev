defaults:
  platforms: [unix, windows, macos]
# Suspicious Native Execution Patterns
# Detects suspicious code execution patterns in native binaries
# ATT&CK: T1059 (Command and Scripting Interpreter)
# NOTE: Removed items that belong elsewhere:
# - cobalt-strike → well-known/malware/rat/cobalt-strike/
# - metasploit → well-known/tools/offensive/
# - cryptominer → objectives/impact/cryptojacking/miner/
# - process-status-check (debugger detection) → objectives/anti-analysis/debugger-detect/check/
# - process-inspection (injection) → objectives/evasion/process/injection/
# - network-capable → micro-behaviors/communications/socket/
traits:
  # === Shellcode pattern atomic indicators ===
  # Linux execve /bin/sh stub (x86: xor eax,eax; push eax; push "//sh")
  - id: shellcode-linux-x86
    desc: Linux x86 execve /bin/sh shellcode
    crit: component
    attack: "T1055.001"
    for: [elf, macho]
    if:
      type: hex
      section: ".text"
      pattern: "31 C0 50 68 2F 2F 73 68"
  # Linux execve /bin/sh stub (x64: push 0x3b; pop rax; cdq; movabs rbx,"/bin/sh")
  - id: shellcode-linux-x64
    desc: Linux x64 execve /bin/sh shellcode
    crit: component
    attack: "T1055.001"
    for: [elf, macho]
    if:
      type: hex
      section: ".text"
      pattern: "6A 3B 58 99 48 BB 2F 62 69 6E 2F 73 68"
  # Windows shellcode stub (cld; call $+0x87)
  - id: shellcode-windows-stub
    desc: Windows shellcode stub
    crit: component
    attack: "T1055.001"
    for: [pe, dll]
    if:
      type: hex
      section: ".text"
      pattern: "FC E8 82 00 00 00"
  # PAGE_EXECUTE constant
  - id: page-execute-str
    # Removed virtualalloc-str duplicate - use micro-behaviors/mem/protect/modify::virtual-alloc

    desc: PAGE_EXECUTE string
    crit: component
    for: [pe, dll]
    if:
      type: string_value
      substr: "PAGE_EXECUTE"
composite_rules:
  # === Shellcode composites ===
  - id: shellcode-linux-any
    desc: Linux shellcode patterns
    crit: component
    for: [elf, macho]
    any:
      - id: shellcode-linux-x86
      - id: shellcode-linux-x64
  - id: virtualalloc-with-execute
    desc: VirtualAlloc with PAGE_EXECUTE
    crit: component
    for: [pe, dll]
    all:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: page-execute-str
  - id: shellcode
    desc: Native binary with shellcode patterns
    crit: suspicious
    conf: 0.9
    attack: "T1055.001"
    for: [pe, dll, elf, macho]
    any:
      - id: shellcode-linux-any
      - id: shellcode-windows-stub
      - id: virtualalloc-with-execute
    downgrade:
      all: # Downgrade if it's a PE/DLL file and contains python code marker
        - id: metadata/format/downgrades/lang::python-encoded-downgrade
  # Fiber Local Storage (FLS) usage patterns
  - id: fiber-local-storage-ops
    desc: Fiber-based thread local storage
    crit: component
    conf: 0.75
    platforms: [windows]
    for: [pe, dll]
    attack: "T1129"
    needs: 2
    any:
      - id: micro-behaviors/process/tls/fiber::fls-alloc
      - id: micro-behaviors/process/tls/fiber::fls-get-value
      - id: micro-behaviors/process/tls/fiber::fls-set-value
  - id: thread-pool-fiber-scheduling
    desc: Thread pool with fiber-based scheduling
    crit: notable
    conf: 0.8
    platforms: [windows]
    for: [pe, dll]
    attack: "T1129"
    size_max: 500000
    all:
      - id: fiber-local-storage-ops
      - id: micro-behaviors/process/thread/create
    unless:
      - id: metadata/format::many-imports
      - id: metadata/lang/compiler::ms-visual
  - id: fiber-dispatch-framework
    desc: Fiber-based dispatch and scheduling framework
    crit: notable
    conf: 0.85
    platforms: [windows]
    for: [pe, dll]
    attack: "T1129"
    size_max: 500000
    all:
      - id: thread-pool-fiber-scheduling
      - id: micro-behaviors/process/create/
    unless:
      - id: metadata/format::many-imports
      - id: metadata/lang/compiler::ms-visual
  # System callback execution patterns (stealthy shellcode triggers)
  - id: callback-execution
    desc: Shellcode execution via system callback
    crit: suspicious
    conf: 0.85
    mbc: "B0001.032"
    attack: "T1055"
    for: [pe, dll]
    any:
      - id: micro-behaviors/os/callback/enum
      - id: micro-behaviors/os/callback/dda
