defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055

composite_rules:
  - id: sqlite-proxy-ntapi-injection-loader
    desc: SQLite proxy uses Native API injection
    crit: hostile
    conf: 0.98
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    all:
      - id: metadata/binary/symbols/exports::sqlite-api-with-private-wrapper-exports
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
      - id: micro-behaviors/os/syscall/raw::nt-protect-ssn
      - id: micro-behaviors/os/syscall/raw::nt-allocate-ssn
    any:
      - id: metadata/binary/layout::pe-multiple-tls-callbacks
      - id: metadata/binary/layout::overlay-dominates-80pct
    unless:
      - id: well-known/lib/sqlite/
      - id: metadata/signed/platform/
