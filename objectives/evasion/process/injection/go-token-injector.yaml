defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: go-token-stealth-injector
    desc: Garble-obfuscated Go injector using user token manipulation
    crit: hostile
    conf: 0.95
    attack: T1134.002
    all:
      - id: objectives/anti-static/obfuscation/tools/garble::garble-obfuscated-go
      - id: micro-behaviors/process/create/spawn::create-process-as-user
    any:
      - id: objectives/evasion/process/injection/runtime::set-thread-context-dup
      - id: objectives/evasion/process/injection/runtime::suspend-thread
      - id: objectives/evasion/process/injection/runtime::resume-thread-dup
  - id: go-service-mimicry-loader
    desc: Garble-obfuscated Go loader mimicking system service components
    crit: hostile
    conf: 0.97
    attack: T1574.002
    all:
      - id: objectives/anti-static/obfuscation/tools/garble::garble-obfuscated-go
      - id: objectives/evasion/masquerade::svchost-global-mimicry
    any:
      - id: objectives/evasion/masquerade::suspicious-moka-dll
      - id: objectives/command-and-control/backdoor/reflective-load::custom-pe-loader
