# Process Injection Toolkit Detection
# Detects binaries with comprehensive injection capabilities that don't match
# specific injection patterns (e.g., Pool Party ALPC, early bird, etc.)
# ATT&CK: T1055 (Process Injection)
composite_rules:
  # Pool Party variant: ALPC worker factory injection
  - id: pool-party-alpc
    desc: Pool Party ALPC worker factory injection
    crit: hostile
    conf: 0.95
    attack: "T1055"
    for: [pe, dll]
    all:
      - id: micro-behaviors/communications/ipc/alpc::alpc-worker-injection
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
    none:
      - id: metadata/format::many-imports
      - id: metadata/format::many-exports
  # Generic injection toolkit: WriteProcessMemory + VirtualAllocEx + anti-debug
  # + process enumeration/kill + self-deletion or raw syscalls
  - id: evasive-process-injector
    desc: Evasive process injection toolkit
    crit: hostile
    conf: 0.93
    attack: "T1055"
    for: [pe, dll]
    all:
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: objectives/evasion/security-product-targeting/enumerate::process-enumeration-terminate
    any:
      - id: objectives/anti-analysis/self-modify/runtime::active
      - id: objectives/anti-analysis/debugger-detect/check
      - id: micro-behaviors/os/syscall/raw
    needs: 1
    none:
      - id: metadata/format::many-imports
      - id: metadata/format::many-exports
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
