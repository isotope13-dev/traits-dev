defaults:
  platforms: [windows]
  for: ["pe", "dll"]
traits:
  - id: detours-section-marker
    desc: Microsoft Detours section marker
    crit: component
    conf: 0.9
    if:
      type: section
      substr: ".detourc"
  - id: go-stdio-pipe-profile
    desc: Go stdio pipe profile
    crit: component
    conf: 0.8
    if:
      type: text
      exact: StdoutPipe
composite_rules:
  - id: benign-thread-context-runtime
    desc: Benign thread context runtime
    crit: component
    conf: 0.9
    any:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
  - id: thread-execution-hijacking
    desc: Manipulate thread execution context (Hijacking)
    crit: hostile
    conf: 0.90
    attack: "T1055.003"
    all:
      - id: micro-behaviors/process/inject/runtime::suspend-thread
      - id: micro-behaviors/process/inject/runtime::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime::set-thread-context-dup
      - id: micro-behaviors/process/inject/runtime::resume-thread-dup
    unless:
      - type: trait
        id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
      - type: trait
        id: metadata/binary/metrics::many-exports
      # Go's runtime uses all four thread-context primitives (SuspendThread,
      # Get/SetThreadContext, ResumeThread) for GC stop-the-world and goroutine
      # preemption — the composite cannot distinguish that from deliberate
      # injection in Go binaries. Other injection signals (e.g. VirtualAllocEx
      # + WriteProcessMemory + CreateRemoteThread) are needed for Go malware.
      - type: trait
        id: benign-thread-context-runtime
      - type: trait
        id: go-stdio-pipe-profile
    downgrade:
      any:
        - id: well-known/game/steam::valve-corp-binary
        - id: metadata/binary/symbols::ollydbg-plugin-export
        # Microsoft Detours uses SuspendThread/Get/SetThreadContext/ResumeThread
        # for legitimate API hooking
        - id: detours-section-marker
