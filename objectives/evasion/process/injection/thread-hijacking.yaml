defaults:
  platforms: [windows]
composite_rules:
  - id: thread-execution-hijacking
    desc: Manipulate thread execution context (Hijacking)
    crit: hostile
    conf: 0.90
    attack: "T1055.003"
    for: ["pe", "dll"]
    all:
      - id: objectives/evasion/process/injection/runtime::suspend-thread
      - id: objectives/evasion/process/injection/runtime::get-thread-context-dup
      - id: objectives/evasion/process/injection/runtime::set-thread-context-dup
      - id: objectives/evasion/process/injection/runtime::resume-thread-dup
    none:
      - id: metadata/binary/metrics::many-exports
    downgrade:
      any:
        - id: metadata/lang::go-runtime-marker
        - id: metadata/vendor/valve::valve-corp-binary
        - id: well-known/tools/reverse-engineering::ollydbg-plugin-export
        # Microsoft Detours uses SuspendThread/Get/SetThreadContext/ResumeThread
        # for legitimate API hooking
        - type: section
          substr: ".detourc"
