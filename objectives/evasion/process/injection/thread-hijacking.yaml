defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1055.003"
composite_rules:
  - id: thread-execution-hijacking
    desc: Manipulate thread execution context (Hijacking)
    crit: suspicious
    conf: 0.90
    all:
      - id: objectives/evasion/process/injection/runtime::suspend-thread
      - id: objectives/evasion/process/injection/runtime::get-thread-context-dup
      - id: objectives/evasion/process/injection/runtime::set-thread-context-dup
      - id: objectives/evasion/process/injection/runtime::resume-thread-dup
    any:
      - id: objectives/evasion/process/injection::create-process-suspended
      - id: objectives/evasion/process/injection::write-process-memory-dup
      - id: objectives/evasion/fileless/memory::alloc-or-protect
    needs: 1
    unless:
      - id: objectives/anti-static/obfuscation/binary-metrics::ape-binary-marker
      - id: metadata/binary/metrics::many-exports
    downgrade:
      any:
        - id: metadata/lang/compiled::go-runtime-marker
        - id: metadata/lang/compiler/systems::go-src-path-windows
        - id: metadata/vendor/valve::valve-corp-binary
        - id: well-known/tools/reverse-engineering::ollydbg-plugin-export
        # Microsoft Detours uses SuspendThread/Get/SetThreadContext/ResumeThread
        # for legitimate API hooking
        - type: section
          substr: ".detourc"
  - id: syscall-hijack-wininet-loader
    desc: Thread hijack loader with WinInet C2
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/evasion/process/injection/runtime::suspend-thread
      - id: objectives/evasion/process/injection/runtime::get-thread-context-dup
      - id: objectives/evasion/process/injection/runtime::set-thread-context-dup
      - id: micro-behaviors/os/syscall/raw::syswhispers3-direct-syscall-wrapper
    any:
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: micro-behaviors/communications/http/get::ansi-wininet-session-stack
      - id: micro-behaviors/communications/http/get::wininet-dynamic-load
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
