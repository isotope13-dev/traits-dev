defaults:
  for: [csharp]
  platforms: [windows]
  crit: suspicious
  conf: 0.85

traits:
  - id: b64-createprocess
    desc: Base64 CreateProcessA
    if:
      type: string_value
      exact: "Q3JlYXRlUHJvY2Vzc0E="
  - id: b64-virtualalloc
    desc: Base64 VirtualAllocEx
    if:
      type: string_value
      exact: "VmlydHVhbEFsbG9jRXg="
  - id: b64-writeprocess
    desc: Base64 WriteProcessMemory
    if:
      type: string_value
      exact: "V3JpdGVQcm9jZXNzTWVtb3J5"
  - id: b64-unmapview
    desc: Base64 ZwUnmapViewOfSection
    if:
      type: string_value
      exact: "WndVbm1hcFZpZXdPZlNlY3Rpb24="

composite_rules:
  - id: csharp-base64-runpe
    desc: C# Base64 encoded Process Hollowing APIs
    attack: T1055.012
    mbc: B0009.014
    crit: suspicious
    conf: 0.95
    any:
      - id: b64-createprocess
      - id: b64-virtualalloc
      - id: b64-writeprocess
      - id: b64-unmapview