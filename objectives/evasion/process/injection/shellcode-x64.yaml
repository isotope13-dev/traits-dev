defaults:
  platforms:
    - unix
    - android
    - windows
  for: [elf, macho, pe]
  crit: notable
  conf: 0.8
traits:
  - id: jmp-rsi
    desc: jmp rsi instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: ff e6
  - id: jmp-rax
    desc: jmp rax instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: ff e0
  - id: call-rax
    desc: call rax instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: ff d0
  - id: call-rsi
    desc: call rsi instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: ff d6
  - id: jmp-rcx
    desc: jmp rcx instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: ff e1
  - id: call-rcx
    desc: call rcx instruction
    size_max: 8192
    if:
      type: hex
      section: text
      pattern: ff d1
composite_rules:
  - id: register-transfer
    desc: Jump/call to register (shellcode execution)
    crit: notable
    conf: 0.8
    any:
      - id: jmp-rsi
      - id: jmp-rax
      - id: call-rax
      - id: call-rsi
      - id: jmp-rcx
      - id: call-rcx
