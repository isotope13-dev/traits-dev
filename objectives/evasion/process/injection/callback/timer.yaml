# Timer-Based Indirect Code Execution (Windows)
# ATT&CK: T1055 (Process Injection via timer callbacks)
# Malware uses CreateTimerQueueTimer to execute shellcode indirectly,
# avoiding direct calls to injected code that would be caught by hooks
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1055"
composite_rules:
  - id: timer-callback-execution
    desc: Timer callback with memory allocation (indirect execution)
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/time/schedule/callback/create::create-timer-queue-timer-sym
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/evasion/fileless/memory::alloc-or-protect
    unless:
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/binary/metrics/structural::many-exports
      - id: metadata/lang/compiler/native::ms-visual
  - id: timer-callback-shellcode
    desc: Timer callback shellcode execution
    crit: hostile
    conf: 0.92
    all:
      - id: micro-behaviors/time/schedule/callback/create::create-timer-queue-timer-sym
      - id: objectives/anti-static/obfuscation/imports::manual-getprocaddress
      - id: objectives/evasion/fileless/memory::alloc-or-protect
    unless:
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/binary/metrics/structural::many-exports
      - id: metadata/lang/compiler/native::ms-visual
