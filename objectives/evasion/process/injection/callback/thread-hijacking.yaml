defaults:
  platforms: [windows]
  for: ["pe", "dll"]
traits:
- id: detours-section-marker
  desc: Microsoft Detours section marker
  crit: notable
  conf: 0.9
  if:
    type: section
    substr: ".detourc"
  unless:
  - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
composite_rules:
- id: recognized-thread-marker-runtime
  desc: Recognized thread marker runtime
  crit: notable
  conf: 0.9
  any:
  - id: metadata/lang/compiled::go-runtime-marker
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
  - id: well-known/tool/reverse-engineering/scyllahide::reverse-engineering-tool
  - id: micro-behaviors/process/create/shell/lang::stdout-pipe
  - id: detours-section-marker
  - id: objectives/evasion/process/injection/memory::memory-module-usage
- id: thread-execution-hijacking
  desc: Manipulate thread execution marker (Hijacking)
  crit: suspicious
  conf: 0.88
  attack: "T1055.003"
  all:
  - id: micro-behaviors/process/inject/runtime/call::suspend-thread
  - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
  - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
  - id: micro-behaviors/process/info/thread::resume-thread-dup
  unless:
  - id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
  - id: metadata/binary/metrics/structural::many-exports
  - id: objectives/evasion/process/injection/callback/
  - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
  downgrade:
    any:
    - id: well-known/game/steam/
    - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
- id: packed-tls-thread-context-loader
  desc: Packed TLS thread-context loader
  crit: hostile
  conf: 0.99
  attack: "T1027.002,T1055.003,T1622"
  all:
  - id: metadata/binary/layout::pe-multiple-tls-callbacks
  - id: metadata/binary/section/metrics::random-exec-payload-section
  - id: metadata/file/encoded::pe-dense-data-base64-like-blobs
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
  - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
  - id: micro-behaviors/process/info/thread::resume-thread-dup
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/framework/
  - id: well-known/tool/reverse-engineering/
