defaults:
  for:
    - csharp
  platforms:
    - windows
  crit: suspicious
  conf: 0.85
traits:
  - id: b64-createprocess
    desc: Base64 CreateProcessA
    if:
      type: string_literal
      exact: Q3JlYXRlUHJvY2Vzc0E=
  - id: b64-virtualalloc
    desc: Base64 VirtualAllocEx
    if:
      type: string_literal
      exact: VmlydHVhbEFsbG9jRXg=
  - id: b64-writeprocess
    desc: Base64 WriteProcessMemory
    if:
      type: string_literal
      exact: V3JpdGVQcm9jZXNzTWVtb3J5
  - id: b64-unmapview
    desc: Base64 ZwUnmapViewOfSection
    if:
      type: string_literal
      exact: WndVbm1hcFZpZXdPZlNlY3Rpb24=

  - id: csharp-nt-unmap-view
    desc: C# Nt unmap view import
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: NtUnmapViewOfSection

  - id: csharp-nt-write-memory
    desc: C# Nt write memory import
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: NtWriteVirtualMemory

  - id: csharp-nt-set-marker
    desc: C# Nt set thread marker
    crit: suspicious
    conf: 0.88
    if:
      type: symbol
      exact: NtSetContextThread

  - id: csharp-nt-resume-thread
    desc: C# Nt resume thread
    crit: suspicious
    conf: 0.86
    if:
      type: symbol
      exact: NtResumeThread
  - id: csharp-nt-memory-delegate-names
    desc: C# Nt memory delegates
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '\b(NtUnmapViewOfSection|NtAllocateVirtualMemory|NtWriteVirtualMemory)Delegate\b'
  - id: csharp-nt-thread-delegate-names
    desc: C# Nt thread marker delegates
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '\b(NtSetContextThread|NtGetContextThread|NtResumeThread)Delegate\b'

  - id: csharp-createprocess-delegate
    desc: C# CreateProcess delegate declaration
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: CreateProcessDelegate

  - id: csharp-suspended-process-start
    desc: C# suspended process start
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: CREATE_SUSPENDED
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-ansible-core-package

  - id: csharp-image-dos-signature
    desc: C# PE DOS signature
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: IMAGE_DOS_SIGNATURE

  - id: csharp-image-nt-signature
    desc: C# PE NT signature
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: IMAGE_NT_SIGNATURE

  - id: csharp-parent-process-spoof
    desc: C# parent process spoofing
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: PROC_THREAD_ATTRIBUTE_PARENT_PROCESS
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-ansible-core-package
  - id: csharp-dynamic-api-delegate-resolver
    desc: C# dynamic API delegate resolver
    crit: suspicious
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '(^|\.)GetDelegateForFunctionPointer$'
    unless:
      - id: well-known/app/windows-desktop-tools::playnite-source-file
      - type: path
        regex: '(^|[\\/])Robust\.Client[\\/]Graphics[\\/]Clyde[\\/]Windowing[\\/]SDL2Api\.cs$'
      - id: well-known/app/oneget::oneget-msi-source-context
      - id: well-known/game/mod::bedrockboot-memory-module-context

  - id: csharp-update-proc-thread-attr
    desc: C# updates proc attribute
    crit: suspicious
    conf: 0.88
    if:
      type: symbol
      exact: UpdateProcThreadAttribute
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-ansible-core-package

  - id: csharp-create-file-mapping
    desc: C# creates file mapping
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: CreateFileMapping

  - id: csharp-map-view-of-file
    desc: C# maps view of file
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: MapViewOfFile

composite_rules:
  - id: csharp-base64-runpe
    desc: C# Base64 encoded Process Hollowing APIs
    attack: T1055.012
    mbc: B0009.014
    crit: suspicious
    conf: 0.95
    any:
      - id: b64-createprocess
      - id: b64-virtualalloc
      - id: b64-writeprocess
      - id: b64-unmapview

  - id: csharp-nt-process-hollowing
    desc: C# Nt process hollowing
    attack: T1055.012
    mbc: B0009.014
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-nt-unmap-view
      - id: csharp-nt-write-memory
      - id: csharp-nt-set-marker
      - id: csharp-nt-resume-thread
      - id: csharp-suspended-process-start
      - id: csharp-image-dos-signature
      - id: csharp-image-nt-signature

  - id: csharp-ppid-mapped-memory-exec
    desc: C# PPID mapped memory exec
    attack: T1055
    mbc: B0033
    crit: hostile
    conf: 0.96
    all:
      - id: csharp-parent-process-spoof
      - id: csharp-update-proc-thread-attr
      - id: csharp-create-file-mapping
      - id: csharp-map-view-of-file
      - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite
    any:
      - id: micro-behaviors/communications/http/client/managed::downloaddata
      - id: micro-behaviors/process/create/flags::create-no-window
