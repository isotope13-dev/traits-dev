# A downloader that validates an embedded PE and redirects another process's
# thread is a process-hollowing loader. These are all capability facts; the
# hostile conclusion comes from their combination.
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1055.012
  mbc: E1055.012

composite_rules:
  - id: wininet-runpe-process-hollowing
    desc: WinInet RunPE process-hollowing loader
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/get::dynamic-wininet-api-set--internetopenurla
      - id: micro-behaviors/data/embedded/payload/header::inline-mz-magic-check
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-signature-check
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
