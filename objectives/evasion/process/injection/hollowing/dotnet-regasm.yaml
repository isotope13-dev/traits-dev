defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1055.012
  mbc: E1055.012
traits:
- id: regasm-hollowing-target
  desc: RegAsm.exe as hollowing host process
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)\bRegAsm(\.exe)?\b'
- id: dotnet-loader-metadata
  desc: .NET loader metadata strings
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(_CorExeMain|#Strings)'
- id: fiber-loader-marker
  desc: Fiber loader marker
  crit: component
  conf: 0.84
  if:
    type: text
    word: Fiber
- id: csharp-zwunmap-reference
  desc: Unmaps host image to free address space
  crit: suspicious
  conf: 0.9
  for: [csharp]
  if:
    type: symbol
    exact: ZwUnmapViewOfSection
- id: csharp-thread-context-references
  desc: Resumes hollowed thread to run payload
  crit: component
  conf: 0.88
  for: [csharp]
  if:
    type: symbol
    exact: ResumeThread
- id: csharp-get-thread-context-reference
  desc: Reads thread context for entrypoint pivot
  crit: component
  conf: 0.9
  for: [csharp]
  if:
    type: symbol
    exact: GetThreadContext
- id: csharp-set-thread-context-reference
  desc: Redirects thread to payload entrypoint
  crit: component
  conf: 0.9
  for: [csharp]
  if:
    type: symbol
    exact: SetThreadContext
composite_rules:
- id: dotnet-regasm-hollowing-loader
  desc: .NET RegAsm process hollowing loader
  crit: hostile
  conf: 0.97
  all:
  - id: regasm-hollowing-target
  - id: objectives/evasion/process/injection/hollowing::unmap-section-apis
  - id: objectives/evasion/process/injection/hollowing::memory-write-apis
  - id: objectives/evasion/process/injection/hollowing::thread-context-apis
  any:
  - id: dotnet-loader-metadata
  - id: fiber-loader-marker
  - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
- id: csharp-regasm-hollowing-source
  desc: C# RegAsm process hollowing source
  crit: hostile
  conf: 0.97
  for: [csharp]
  all:
  - id: regasm-hollowing-target
  - id: csharp-zwunmap-reference
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: csharp-thread-context-references
  any:
  - id: csharp-get-thread-context-reference
  - id: csharp-set-thread-context-reference
  - id: fiber-loader-marker
  - id: dotnet-loader-metadata
