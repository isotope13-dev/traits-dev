defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1055.012
  mbc: E1055.012
traits:
  - id: nt-unmap-section-vb6
    desc: Unmaps host image for hollowing (VB6)
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: NtUnmapViewOfSection
    unless:
      - id: metadata/package/quality/recognized-contexts-extra::hashed-text-record
  - id: image-base-rebase-vb6
    desc: VB6 remote image base rewrite
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: ByVal Ctx.Ebx + 8, Pinh.OptionalHeader.ImageBase
  - id: entrypoint-pivot-vb6
    desc: VB6 remote entrypoint pivot
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: Ctx.Eax = Pinh.OptionalHeader.ImageBase
  - id: dynamic-api-thunk-vb6
    desc: VB6 dynamic API thunk dispatcher
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: lMod = GetProcAddress(LoadLibraryA(sLib), sMod)
composite_rules:
  - id: suspended-hollowing-primitives-vb6
    desc: VB6 suspended process hollowing primitives
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/process/create/spawn::create-process-vb6
      - id: micro-behaviors/process/create/flags::create-suspended-vb6
      - id: nt-unmap-section-vb6
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex-vb6
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: thread-context-hollowing-vb6
    desc: VB6 thread context hollowing chain
    crit: hostile
    conf: 0.98
    all:
      - id: suspended-hollowing-primitives-vb6
      - id: micro-behaviors/process/info/thread::get-thread-context-vb6
      - id: micro-behaviors/process/info/thread::set-thread-context-vb6
      - id: micro-behaviors/process/info/thread::resume-thread-vb6
    any:
      - id: image-base-rebase-vb6
      - id: entrypoint-pivot-vb6
  - id: concealed-hollowing-loader-vb6
    desc: VB6 concealed process hollowing loader
    crit: hostile
    conf: 0.97
    all:
      - id: thread-context-hollowing-vb6
      - id: dynamic-api-thunk-vb6
