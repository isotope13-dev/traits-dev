# Unmap-based RunPE process hollowing on compiled Windows PEs.
#
# The generic `hollowing-primitives` / `context-hollowing-chain` composites
# (windows.yaml) require GetThreadContext / SetThreadContext, so the
# image-base-rewrite RunPE variant — create a process, unmap its mapped image
# with Nt/ZwUnmapViewOfSection, and overwrite it via WriteProcessMemory, no
# thread-context manipulation — only reached `suspicious`. Unmapping another
# process's section image and writing a replacement into it is process
# hollowing; no legitimate software does this, so the combination is hostile.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055.012
  mbc: B0009.014
composite_rules:
  - id: unmap-runpe-hollowing
    desc: Unmap-based RunPE process hollowing
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/evasion/process/injection/hollowing::zw-unmap-section
      - id: micro-behaviors/process/create/shell/guard::create-process-string
    any:
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-source
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-binary
    unless:
      - id: metadata/signed/platform/
