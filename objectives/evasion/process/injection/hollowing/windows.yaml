defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1055.012
  mbc: E1055.012
traits:
  - id: create-process-suspended
    desc: Spawns process suspended for hollowing
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: CREATE_SUSPENDED
  - id: create-process-flags
    desc: CreateProcess with suspended flag (0x4)
    crit: suspicious
    conf: 0.65
    count_min: 2
    size_max: 2097152
    if:
      type: hex
      section: text
      pattern: 6a 04
  - id: nt-unmap-section
    desc: Unmaps host image to clear address space
    crit: component
    conf: 0.92
    if:
      type: hex
      section: rdata
      pattern: 4E 74 55 6E 6D 61 70 56 69 65 77 4F 66 53 65 63 74 69 6F 6E
  - id: zw-unmap-section
    desc: Unmaps host image (native unmap variant)
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ZwUnmapViewOfSection
  - id: get-thread-context
    desc: Reads thread registers for entrypoint pivot
    crit: component
    conf: 0.7
    if:
      type: symbol
      exact: GetThreadContext
    unless:
      - id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
      - type: text
        substr: madExcept
      - id: metadata/lang/compiler/managed::delphi
      - type: basename
        regex: \.pyd$
      - id: metadata/binary/metrics/threshold::many-exports-200
      - type: text
        substr: unixAhomChamKawiLisuMiaoModiNewa
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: nt-get-context
    desc: Reads thread context (native variant)
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: NtGetContextThread
    unless:
      - id: well-known/game/steam/
      - id: well-known/game/steam/
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics/threshold::many-exports-200
        - id: well-known/tool/sysadmin/systeminformer::systeminformer-product
  - id: nt-set-context
    desc: Redirects thread to payload (native variant)
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: NtSetContextThread
    unless:
      - id: well-known/game/steam/
      - id: well-known/game/steam/
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics/threshold::many-exports-200
  - id: hollowing-entrypoint-overwrite
    desc: Debug string indicating entrypoint overwrite
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: entrypoint with payload
  - id: hollowing-suspended-state-msg
    desc: "Debug indicating suspended process creation"
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: suspended state with PID
  - id: image-base-relocation
    desc: IMAGE_BASE_RELOCATION parsing
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: IMAGE_BASE_RELOCATION
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - type: metrics
          field: functions.count
          min: 1000
  - id: svchost-target
    desc: svchost.exe target path
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)system32[/\\]+svchost\.exe
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
  - id: dllhost-target
    desc: dllhost.exe target path
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)system32[/\\]+dllhost\.exe
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
  - id: mstsc-target
    desc: mstsc.exe target path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)system32[/\\]+mstsc\.exe
  - id: rundll32-target
    desc: rundll32.exe target path
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)system32[/\\]+rundll32\.exe
  - id: rev-createprocessa
    desc: Reversed CreateProcessA API string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: AssecorPetaerC
  - id: rev-writeprocessmemory
    desc: Reversed WriteProcessMemory API string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: yromeMssecorPetirW
  - id: rev-getthreadcontext
    desc: Reversed GetThreadContext API string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: txetnoCdaerhTteG
  - id: rev-setthreadcontext
    desc: Reversed SetThreadContext API string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: txetnoCdaerhTteS
  - id: rev-ntresumethread
    desc: Reversed NtResumeThread API string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: daerhTemuseRtN
  - id: rev-loadlibrary
    desc: Reversed LoadLibrary API string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: yrarbiLdaoL
  - id: rev-loadlibraryw
    desc: Reversed LoadLibraryW API string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: WyrarbiLdaoL
  - id: rev-getprocaddress
    desc: Reversed GetProcAddress API string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: sserddAcorPteG
composite_rules:
  - id: dotnet-reversed-dynamic-api-resolution
    desc: .NET reversed dynamic API resolution
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: rev-getprocaddress
    any:
      - id: rev-loadlibrary
      - id: rev-loadlibraryw
  - id: dotnet-reversed-runpe-hollowing
    desc: .NET reversed RunPE process hollowing
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: rev-createprocessa
      - id: rev-writeprocessmemory
      - id: rev-getthreadcontext
      - id: rev-setthreadcontext
    any:
      - id: rev-ntresumethread
      - id: dotnet-reversed-dynamic-api-resolution
  - id: thread-context-benign-profile
    desc: Thread context common benign profile
    crit: component
    conf: 0.7
    any:
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/lang/compiled::go-runtime-marker
  - id: unmap-section-apis
    desc: Section unmapping APIs
    crit: component
    conf: 0.85
    any:
      - id: nt-unmap-section
      - id: zw-unmap-section
  - id: memory-write-apis
    desc: Process memory writing APIs
    any:
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
  - id: thread-context-apis
    desc: Thread context manipulation APIs
    any:
      - id: get-thread-context
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: nt-get-context
      - id: nt-set-context
  - id: hollow-targets
    desc: Common process hollowing targets
    crit: notable
    conf: 0.75
    any:
      - id: svchost-target
      - id: dllhost-target
      - id: mstsc-target
      - id: rundll32-target
  - id: ppid-spoofing-attributes
    desc: Parent PID spoofing process attributes
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/spawn::proc-thread-attribute-list
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: well-known/tool/development/visual-studio::diagnostics-hub
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-200
  - id: hollowing-primitives
    desc: Process hollowing API primitives
    crit: suspicious
    conf: 0.9
    all:
      - id: create-process-suspended
      - id: unmap-section-apis
      - id: memory-write-apis
      - id: thread-context-apis
  - id: context-hollowing-chain
    desc: CreateProcess with thread context hollowing
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/guard::create-process-string
      - id: thread-context-apis
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
      - id: micro-behaviors/mem/sync/cache
    any:
      - id: create-process-suspended
      - id: create-process-flags
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: well-known/tool/development/visual-studio::diagnostics-hub
    unless:
      - id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: well-known/tool/reverse-engineering/scyllahide::reverse-engineering-tool
  - id: packed-overlay-hollowing-loader
    desc: Packed overlay process hollowing loader
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: metadata/binary/section/names::upx-section
      - id: metadata/binary/layout::overlay-dominates-third
      - id: objectives/anti-static/obfuscation/string/broken-api::missing-vowel-ntunmapview
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics/threshold::many-exports-200
  - id: packed-autoit-runpe-primitives
    desc: Packed AutoIt RunPE primitive cluster
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics/section-names::packed-autoit-upx-rwx-wrapper
      - id: micro-behaviors/process/create/spawn::create-process-as-user
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::read-process-memory
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
    any:
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
      - id: objectives/anti-analysis/debugger-detect/check::anti-debug-api-pair
      - id: micro-behaviors/fs/memory/mmap::win32-file-mapping
    needs: 1
    unless:
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: well-known/tool/reverse-engineering/scylla::scylla-unpacker
  - id: mstsc-ppid-loader
    desc: mstsc sacrificial process with PPID spoofing
    crit: suspicious
    conf: 0.96
    all:
      - id: mstsc-target
      - id: ppid-spoofing-attributes
    any:
      - id: micro-behaviors/process/inject/runtime/call::read-process-memory
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/dylib/lookup::get-proc-address
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
  - id: dotnet-process-hollowing
    desc: .NET process hollowing via P/Invoke
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/guard::create-process-string
      - id: create-process-suspended
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
    any:
      - id: svchost-target
      - id: dllhost-target
      - id: rundll32-target
      - id: hollowing-entrypoint-overwrite
      - id: hollowing-suspended-state-msg
      - id: micro-behaviors/process/info/query::zw-query-information-process
    needs: 1
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
  - id: process-hollowing-alloc-write-context
    desc: Process hollowing via alloc, write, context swap
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex-name
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-source
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: well-known/tool/development/visual-studio::diagnostics-hub
        - id: well-known/tool/reverse-engineering/ida-debugger::ida-debugger-server
        - id: metadata/binary/metrics/structural::many-imports
    unless:
      - id: metadata/binary/metrics/structural::many-exports
  - id: resource-backed-process-hollowing-loader
    desc: Resource-backed process hollowing loader
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
      - id: metadata/binary/resource::resource-heavy-rsrc
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: get-thread-context
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::is-microsoft-named
        - id: metadata/binary/metrics/structural::many-imports
    unless:
      - id: metadata/binary/metrics/structural::many-exports
  - id: java-proxy-hollowing-loader
    desc: Java proxy DLL with hollowing chain
    crit: suspicious
    conf: 0.97
    all:
      - id: context-hollowing-chain
      - id: metadata/binary/framework::java-launcher-proxy-exports
    any:
      - id: micro-behaviors/os/module/load::get-module-filename-dup
      - id: micro-behaviors/dylib/load/runtime::load-library-ex-w
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: objectives/anti-static/obfuscation/imports::randomized-dll-name-pair
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: well-known/tool/development/visual-studio::diagnostics-hub
