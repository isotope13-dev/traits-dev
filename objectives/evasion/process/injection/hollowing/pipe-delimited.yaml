defaults:
  for: [pe]
  platforms: [windows]
  attack: T1055.012
  mbc: E1055.012
traits:
  - id: pipe-delimited-hollowing-setup
    desc: Pipe-delimited hollowing setup APIs
    crit: component
    conf: 0.96
    if:
      type: text
      substr: CreateProcessA|TerminateProcess|NtUnmapViewOfSection|VirtualAllocEx

  - id: pipe-delimited-thread-context
    desc: Pipe-delimited thread context APIs
    crit: component
    conf: 0.96
    if:
      type: text
      substr: NtWriteVirtualMemory|NtGetContextThread|NtSetContextThread|NtResumeThread

  - id: iexplore-hollowing-target
    desc: Internet Explorer hollowing target
    crit: component
    conf: 0.92
    if:
      type: text
      substr: \Internet Explorer\iexplore.exe

composite_rules:
  - id: pipe-delimited-nt-hollowing-cluster
    desc: Pipe-delimited NT process hollowing cluster
    crit: hostile
    conf: 0.97
    all:
      - id: pipe-delimited-hollowing-setup
      - id: pipe-delimited-thread-context
      - id: iexplore-hollowing-target
    any:
      - id: objectives/evasion/process/injection/hollowing::nt-unmap-section
      - id: micro-behaviors/process/inject/runtime::nt-write-virtual-memory
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex-name
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics::many-imports
