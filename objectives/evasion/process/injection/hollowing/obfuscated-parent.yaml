defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: obfuscated-parent-process-injection
    desc: Obfuscated parent-spoofed process injection
    crit: hostile
    conf: 0.98
    attack: T1055.012,T1027.002
    all:
      - id: objectives/evasion/process/injection/hollowing::ppid-spoofing-attributes
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-createprocess-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-virtual-protect-api
