defaults:
  platforms: [windows]
  for: [pe]
  attack: T1055.012
  mbc: E1055.012

traits:
  - id: lacks-substantial-data
    desc: Lacks substantial data section
    crit: component
    if:
      type: metrics
      field: binary.data_to_file_ratio
      max: 0.05

  - id: lacks-substantial-resources
    desc: Lacks substantial resources
    crit: component
    if:
      type: metrics
      field: binary.rsrc_to_file_ratio
      max: 0.05

composite_rules:
  - id: mingw-runpe-import-cluster
    desc: MinGW RunPE loader import cluster lacking resources/data
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/compiler/native::mingw-built-pe
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
      - id: lacks-substantial-data
      - id: lacks-substantial-resources
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/windows-debugger/
