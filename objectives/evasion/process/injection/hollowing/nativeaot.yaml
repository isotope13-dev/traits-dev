# NativeAOT payload loaders retain type names in native metadata even though
# their P/Invoke names and managed method bodies are no longer exposed as IL.
# RunPE plus syscall and embedded-data types, tied to a generated high-entropy
# payload section, is a high-precision process-hollowing loader profile.
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1055.012
  mbc: B0007

traits:
  - id: runpe-type-name
    desc: RunPE process-hollowing type name
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: RunPE
      section: .rdata

  - id: syscall-type-name
    desc: Syscall implementation type name
    crit: component
    conf: 0.85
    if:
      type: text
      exact: Syscall
      section: .rdata

  - id: embedded-data-type-name
    desc: EmbeddedData payload-access type name
    crit: component
    conf: 0.85
    if:
      type: text
      exact: EmbeddedData
      section: .rdata

  - id: nativeaot-inline-runpe-injection-service
    desc: Inline RunPE injection service type
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(InlineRunpeInjectionService|IRunpeInjectionService)\b'
      section: .rdata

  - id: nativeaot-appdata-persistence-installer
    desc: AppData persistence installer type
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bAppDataPersistenceInstaller\b|\bIPersistenceInstaller\b'
      section: .rdata

composite_rules:
  - id: nativeaot-runpe-type-cluster
    desc: NativeAOT RunPE, syscall, and embedded-data type cluster
    crit: component
    conf: 0.95
    all:
      - id: runpe-type-name
      - id: syscall-type-name
      - id: embedded-data-type-name

  - id: nativeaot-embedded-runpe-loader
    desc: NativeAOT RunPE loader with an opaque embedded stage
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/lang/compiler/aot::nativeaot-runtime-markers
      - id: nativeaot-runpe-type-cluster
      - id: objectives/anti-static/obfuscation/payload/section::large-high-entropy-gfx-section
      - id: objectives/anti-static/obfuscation/payload/section::nativeaot-gfx-embedded-section-descriptor
      - id: micro-behaviors/process/inject/runtime/thread-context::thread-context-apis-3of4
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/

  - id: nativeaot-inline-runpe-loader
    desc: NativeAOT inline RunPE loader with executable-memory injection
    crit: hostile
    conf: 0.99
    attack: T1055.012,T1620
    all:
      - id: metadata/lang/compiler/aot::nativeaot-runtime-markers
      - id: nativeaot-inline-runpe-injection-service
      - id: objectives/evasion/process/injection/shellcode::w-xor-x-injection-x64
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
