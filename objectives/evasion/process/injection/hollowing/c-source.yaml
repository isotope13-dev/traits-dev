defaults:
  platforms: [windows]
  for: [c, cpp]
  attack: T1055.012
  mbc: E1055.012

traits:
  - id: nt-unmap-view-of-section-c
    desc: NtUnmapViewOfSection API in C source
    crit: component
    conf: 0.95
    if:
      type: text
      word: "NtUnmapViewOfSection"

  - id: virtual-alloc-ex-rwx-c
    desc: VirtualAllocEx with RWX protection in C source
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'VirtualAllocEx[^\n]{0,200}PAGE_EXECUTE_READWRITE'

  - id: image-base-peb-rewrite-c
    desc: PEB ImageBaseAddress rewrite hint
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'Ebx\s*\+\s*8|Rdx\s*\+\s*0?x?10'

composite_rules:
  - id: c-source-process-hollowing
    desc: Process hollowing pattern in C source
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/flags::create-suspended-source
      - id: micro-behaviors/process/info/thread::get-thread-context
      - id: micro-behaviors/process/info/thread::set-thread-context
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-source
    any:
      - id: nt-unmap-view-of-section-c
      - id: virtual-alloc-ex-rwx-c
      - id: image-base-peb-rewrite-c

  - id: c-source-rwx-cross-process
    desc: Cross-process RWX allocation in C source
    crit: suspicious
    conf: 0.93
    all:
      - id: virtual-alloc-ex-rwx-c
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-source
    unless:
      - id: well-known/tool/sysadmin/chroot-win::chroot-windows-component
