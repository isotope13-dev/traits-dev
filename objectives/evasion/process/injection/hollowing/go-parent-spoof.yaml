defaults:
  platforms: [windows]
  for: [go]
  crit: suspicious
  conf: 0.9

traits:
  - id: go-parent-process-attribute
    desc: Go parent process spoofing attribute
    if:
      type: text
      substr: PROC_THREAD_ATTRIBUTE_PARENT_PROCESS

  - id: go-update-proc-thread-attribute
    desc: Go updates process thread attributes
    if:
      type: text
      substr: UpdateProcThreadAttribute
    unless:
      - type: text
        substr: "Windows system calls."

  - id: go-startupinfoex-createprocess
    desc: Go creates process with extended startup info
    if:
      type: text
      regex: 'STARTUPINFOEX[A-Z]?[\s\S]{0,500}(EXTENDED_STARTUPINFO_PRESENT|CreateProcessA)'

  - id: go-parent-explorer-selection
    desc: Go selects explorer as parent process
    conf: 0.84
    if:
      type: text
      regex: 'explorer\.exe[\s\S]{0,500}(Parent|Process|CreateProcess|UpdateProcThreadAttribute)'
      case_insensitive: true

composite_rules:
  - id: go-parent-pid-spoof-createprocess
    desc: Go parent PID spoofed CreateProcess
    crit: hostile
    conf: 0.98
    all:
      - id: go-parent-process-attribute
      - id: go-update-proc-thread-attribute
      - id: go-startupinfoex-createprocess
    any:
      - id: go-parent-explorer-selection
