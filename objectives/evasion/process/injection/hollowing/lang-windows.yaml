# Process Hollowing Indicators
# Detects common targets and namespaces used for process hollowing
# MBC: B0007 (Process Injection)
# ATT&CK: T1055.012 (Process Hollowing)
defaults:
  platforms: [windows]
  mbc: "B0007"
  attack: "T1055.012"
  for: [pe, dll, powershell, csharp]
traits:
  - id: hollowing-target-common
    desc: Reference to common process hollowing targets (common)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)(Aspnet_compiler|cvtres|vbc)\.exe'
    unless:
      - id: well-known/app/microsoft-csharp-compiler::microsoft-csharp-compiler-bundle
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
  - id: hollowing-target-admin
    desc: Reference to admin-related process hollowing targets
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)(csc|regasm|regsvcs)\.exe'
    unless:
      - id: well-known/app/microsoft-csharp-compiler::microsoft-csharp-compiler-bundle
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
  - id: hollowing-method-namespace
    desc: Potential process hollowing namespace
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: ProcessHollowing
