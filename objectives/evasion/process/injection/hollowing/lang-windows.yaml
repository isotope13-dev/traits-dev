# Process Hollowing Indicators
# Detects explicit process-hollowing namespace references.
# MBC: B0007 (Process Injection)
# ATT&CK: T1055.012 (Process Hollowing)
defaults:
  platforms: [windows]
  mbc: "B0007"
  attack: "T1055.012"
  for: [pe, dll, powershell, csharp]
traits:
  - id: hollowing-method-namespace
    desc: Potential process hollowing namespace
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: ProcessHollowing
