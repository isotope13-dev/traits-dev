defaults:
  for: [pe]
  platforms: [windows]
  attack: T1055.012
  mbc: E1055.012

traits:
  - id: pe-header-probe-routine
    desc: PE header probe hollowing routine
    crit: component
    conf: 0.99
    if:
      type: hex
      section: UPX0
      pattern: "4D 5A 74 03 33 C0 C3 8B 41 3C 03 C1 81 38 50 45 00 00"

composite_rules:
  - id: pe-header-probe-resume-hollowing
    desc: PE header probe with thread resume
    crit: hostile
    conf: 0.98
    all:
      - id: pe-header-probe-routine
      - id: micro-behaviors/process/info/thread::resume-thread-dup
    any:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/mem/sync/cache::flush-instruction-cache
