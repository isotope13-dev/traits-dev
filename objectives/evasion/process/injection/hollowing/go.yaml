# Go process hollowing through dynamically named Windows API wrappers.
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1055.012
  mbc: E1055.012

traits:
  - id: go-hollowing-routine-marker
    desc: Go PE hollowing routine marker
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)\b(Hollow(Payload|Process)|RunPEFromLocal|writeRemoteFromLocal)\b'

composite_rules:
  - id: go-process-hollowing-api-chain
    desc: Go process hollowing API chain
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: micro-behaviors/process/inject/runtime/call::go-write-process-memory-wrapper
      - id: micro-behaviors/process/inject/runtime/call::go-get-thread-context-wrapper
      - id: micro-behaviors/process/inject/runtime/call::go-set-thread-context-wrapper
      - id: micro-behaviors/process/inject/runtime/call::go-unmap-view-wrapper
    any:
      - id: go-hollowing-routine-marker
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
  - id: go-hollowing-encrypted-loader-chain
    desc: PE hollowing with encrypted payload and thread hijack
    crit: hostile
    conf: 0.99
    all:
      - id: go-hollowing-routine-marker
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/info/thread::resume-thread-dup
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: metadata/binary/section/metrics::large-high-entropy-readonly-section
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
