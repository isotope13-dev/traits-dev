# Windows installer payloads that combine debugger control with remote-process
# memory modification.  The OLE/MSI text view is used because these APIs may
# belong to an embedded DLL rather than to the installer database itself.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.92
  attack: "T1055"

traits:
  - id: debug-active-process-stop-text
    desc: DebugActiveProcessStop API in installer payload
    crit: notable
    conf: 0.96
    if:
      type: symbol
      exact: DebugActiveProcessStop

  - id: nt-remove-process-debug-text
    desc: NtRemoveProcessDebug API in installer payload
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: NtRemoveProcessDebug

  - id: dbg-ui-debug-object-text
    desc: DbgUiSetThreadDebugObject API in payload
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: DbgUiSetThreadDebugObject

composite_rules:
  - id: debugger-control-api-cluster
    desc: Debugger attach and detach API cluster
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: micro-behaviors/process/debug/event::wait-for-debug-event
      - id: debug-active-process-stop-text
      - id: nt-remove-process-debug-text
      - id: dbg-ui-debug-object-text

  - id: remote-process-memory-api-cluster
    desc: Remote-process memory API cluster
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-free-ex

  - id: debugger-controlled-remote-process-loader
    desc: Installer embeds a debugger-controlled remote-process loader
    crit: hostile
    conf: 0.99
    attack: "T1055,T1622"
    all:
      - id: debugger-control-api-cluster
      - id: remote-process-memory-api-cluster
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import

  - id: debugger-loader-with-shell-staging
    desc: Installer embeds debugger control and remote memory APIs with shell staging
    crit: hostile
    conf: 0.98
    attack: "T1055,T1059.001"
    all:
      - id: debugger-control-api-cluster
      - id: remote-process-memory-api-cluster
      - id: micro-behaviors/process/create/spawn::create-process-a
    any:
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/process/create/spawn::create-process-w
