# Windows PE/DLL code that combines debugger control with remote-process memory
# modification.  The text view is used because these APIs may belong to an
# embedded DLL rather than to the outer executable.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: component
  conf: 0.92
  attack: "T1055"

composite_rules:
  - id: frida-windows-instrumentation-context
    desc: Recognized Frida Windows instrumentation context
    crit: exception
    conf: 1.0
    any:
      - id: well-known/tool/reverse-engineering/frida::frida-portal-windows-pe
      - id: well-known/tool/reverse-engineering/frida::frida-qml-windows-pe

  - id: debugger-control-api-cluster
    desc: Debugger attach and detach API cluster
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: micro-behaviors/process/debug/event::wait-for-debug-event
      - id: micro-behaviors/process/debug/control::debug-active-process-stop-api
      - id: micro-behaviors/process/debug/control::nt-remove-process-debug-api
      - id: micro-behaviors/process/debug/control::dbg-ui-set-debug-object-api

  - id: remote-process-memory-api-cluster
    desc: Two or more remote-process memory APIs
    crit: notable
    conf: 0.96
    needs: 2
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-free-ex

  - id: debugger-controlled-remote-process-loader
    desc: Debugger-controlled remote-process loader
    crit: hostile
    conf: 0.99
    attack: "T1055,T1622"
    all:
      - id: debugger-control-api-cluster
      - id: remote-process-memory-api-cluster
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
    unless:
      - id: frida-windows-instrumentation-context

  - id: debugger-loader-with-shell-staging
    desc: Debugger control with remote memory and process launch
    crit: hostile
    conf: 0.98
    attack: "T1055,T1059.001"
    all:
      - id: debugger-control-api-cluster
      - id: remote-process-memory-api-cluster
      - id: micro-behaviors/process/create/spawn::create-process-a
    any:
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/process/create/spawn::create-process-w
    unless:
      - id: frida-windows-instrumentation-context
