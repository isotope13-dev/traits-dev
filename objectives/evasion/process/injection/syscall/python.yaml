# Python source that wraps the NT process and virtual-memory syscalls used for
# cross-process memory manipulation.  The atomic syscall observations remain
# neutral in micro-behaviors; this combination infers injection capability.
defaults:
  platforms: [windows]
  for: [python]
  attack: T1055

composite_rules:
  - id: python-nt-cross-process-memory-manipulation
    desc: Python NT syscall cross-process memory manipulation
    crit: hostile
    conf: 0.98
    scope: file
    all:
      - id: micro-behaviors/os/syscall/raw::python-nt-open-process-wrapper
      - id: micro-behaviors/os/syscall/raw::python-nt-read-virtual-memory-wrapper
      - id: micro-behaviors/os/syscall/raw::python-nt-write-virtual-memory-wrapper
      - id: micro-behaviors/os/syscall/raw::python-nt-allocate-virtual-memory-wrapper
      - id: micro-behaviors/os/syscall/raw::python-nt-protect-virtual-memory-wrapper
