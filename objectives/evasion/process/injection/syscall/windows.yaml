# Raw syscall-based process injection on Windows.
# Detects NT memory/thread primitives when referenced as strings staged for
# dynamic resolution, indicating cross-process memory manipulation without
# going through the hooked kernel32 APIs.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055
composite_rules:
  - id: xll-native-nt-remote-thread-injector
    desc: Excel XLL resolves NT APIs for remote-thread injection
    crit: hostile
    conf: 0.99
    mbc: B0033
    all:
      - id: micro-behaviors/process/create/macro/office::xll-auto-open
      - id: micro-behaviors/os/syscall/raw::nt-open-process-ssn
      - id: micro-behaviors/os/syscall/raw::nt-allocate-ssn
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
      - id: micro-behaviors/os/syscall/raw::nt-create-thread-ssn
      - id: micro-behaviors/process/enumerate/snapshot::dynamic-toolhelp-process-traversal
      - id: micro-behaviors/os/module/load::get-proc-address-import
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: well-known/tool/reverse-engineering/
  - id: wow64-cross-arch-remote-injector
    desc: WoW64 cross-architecture remote memory injector
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/compat/wow64::ntwow64-query-information-process64
      - id: micro-behaviors/os/compat/wow64::ntwow64-write-virtual-memory64
      - id: micro-behaviors/process/inject/dll::create-remote-thread
  - id: syscall-injection-trinity
    desc: Raw syscall process injection trinity
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/os/syscall/raw::nt-allocate-ssn
      - id: micro-behaviors/os/syscall/raw::nt-protect-ssn
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/metrics/structural::many-exports
        - id: metadata/binary/metrics/structural::many-imports
    unless:
      - id: metadata/binary/vendor::windows-system-implementer-dll
      - id: well-known/lib/wine/
  - id: syscall-injection-with-thread-creation
    desc: Raw syscall injection with remote thread creation
    crit: hostile
    conf: 0.94
    all:
      - id: micro-behaviors/os/syscall/raw::nt-allocate-ssn
      - id: micro-behaviors/os/syscall/raw::nt-protect-ssn
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
    any:
      - id: micro-behaviors/os/syscall/raw::nt-create-thread-ssn
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/metrics/structural::many-exports
        - id: metadata/binary/metrics/structural::many-imports
    unless:
      - id: metadata/binary/vendor::windows-system-implementer-dll
      - id: well-known/lib/wine/
  - id: syscall-injection-with-evasion
    desc: Raw syscall injection combined with security product evasion
    crit: hostile
    conf: 0.95
    all:
      - id: syscall-injection-trinity
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/metrics/structural::many-exports
        - id: metadata/binary/metrics/structural::many-imports
    unless:
      - id: metadata/binary/vendor::windows-system-implementer-dll
      - id: well-known/lib/wine/
