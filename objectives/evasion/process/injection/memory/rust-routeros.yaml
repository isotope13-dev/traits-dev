defaults:
  platforms: [routeros, appliance, unix]
  for: [rust, elf]
  attack: T1055

traits:
  - id: rust-proc-mem-write-path
    desc: Rust proc mem write path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc/(\{.{0,80}\}|self|[0-9]{1,8})/(task/[^/]{1,32}/)?mem\b'
    # Debuggers (gdb, lldb) legitimately read /proc/<pid>/mem. Suppress on their
    # distinctive identity strings, and downgrade on documented/licensed tools.
    unless:
      - type: text
        substr: GNU gdb
      - type: text
        substr: LLDB_DEBUGSERVER_PATH
      - type: text
        substr: org.gnu.gdb.
    downgrade:
      any:
        - id: micro-behaviors/ui/help/

  - id: rust-proc-maps-wx-scan
    desc: Rust proc maps WX scan
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '/proc/\{?\}?/?\{?\}?/maps[\s\S]{0,260}(r-xp|perms\.contains)'

  - id: rust-proc-fd-stdin-write
    desc: Rust proc fd stdin write
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/proc/(\{.{0,80}\}|[0-9]{1,8})/fd/0\b'

  - id: rust-rxp-mapping-marker
    desc: Rust executable map marker
    crit: component
    conf: 0.86
    if:
      type: text
      substr: r-xp

  - id: rust-ptrace-scope-disable
    desc: YAMA ptrace_scope sysctl path reference
    # Referencing the YAMA sysctl path is neutral — debuggers, profilers and
    # sandboxes all read it, and the kernel docs name it. The evasion is a write
    # that sets it to 0; a bare path reference is a component building block. The
    # injection composite below pairs it with a /proc/<pid>/mem write for intent.
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /proc/sys/kernel/yama/ptrace_scope
    unless:
      - type: text
        substr: GNU gdb
      - type: text
        substr: LLDB_DEBUGSERVER_PATH
      - type: text
        substr: org.gnu.gdb.

composite_rules:
  - id: rust-procfs-memory-injection
    desc: Rust procfs memory injection
    crit: hostile
    conf: 0.98
    all:
      - id: rust-proc-mem-write-path
    any:
      - id: rust-proc-maps-wx-scan
      - id: rust-proc-fd-stdin-write
      - id: rust-rxp-mapping-marker
    needs: 1

  - id: rust-procfs-ptrace-injection
    desc: Rust procfs ptrace injection
    crit: hostile
    conf: 0.98
    all:
      - id: rust-proc-mem-write-path
      - id: rust-ptrace-scope-disable
    any:
      - id: rust-proc-maps-wx-scan
      - id: rust-rxp-mapping-marker
    needs: 1
