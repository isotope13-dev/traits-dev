defaults:
  platforms: [android, unix, ios]
  for: [c, cpp]
  attack: T1055

traits:
  - id: android-ptrace-pid-one
    desc: Android ptrace PID one target
    crit: component
    conf: 0.9
    platforms: [android]
    if:
      type: text
      regex: 'PID 1|,\s*1\s*,\s*NULL'

composite_rules:
  - id: android-init-ptrace-attach
    desc: Android init ptrace attach
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/attach/debugger::ptrace-attach-call
    any:
      - id: android-ptrace-pid-one
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
