defaults:
  platforms: [android, unix, ios]
  for: [c, cpp]
  attack: T1055

traits:
  - id: source-ptrace-attach
    desc: ptrace attach source
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'ptrace\s*\(\s*PTRACE_ATTACH'
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: well-known/lib/benign-runtime-bundles::node-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path

  - id: android-ptrace-pid-one
    desc: Android ptrace PID one target
    crit: component
    conf: 0.9
    platforms: [android]
    if:
      type: text
      regex: 'PID 1|,\s*1\s*,\s*NULL'

composite_rules:
  - id: android-init-ptrace-attach
    desc: Android init ptrace attach
    crit: hostile
    conf: 0.98
    all:
      - id: source-ptrace-attach
    any:
      - id: android-ptrace-pid-one
