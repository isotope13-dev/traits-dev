defaults:
  platforms: [android]
  for: [c, cpp]
  attack: T1055

traits:
  - id: android-ptrace-attach-source
    desc: Android ptrace attach source
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'ptrace\s*\(\s*PTRACE_ATTACH'

  - id: android-ptrace-pid-one
    desc: Android ptrace PID one target
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'PID 1|,\s*1\s*,\s*NULL'

composite_rules:
  - id: android-init-ptrace-attach
    desc: Android init ptrace attach
    crit: hostile
    conf: 0.98
    all:
      - id: android-ptrace-attach-source
    any:
      - id: android-ptrace-pid-one
