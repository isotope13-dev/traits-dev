defaults:
  for:
    - pe
    - dll
    - c
    - cpp
  platforms:
    - windows
  attack: T1620
  mbc: E1620
traits:
  - id: memory-load-library
    desc: Loads DLL from memory (fileless)
    crit: component
    conf: 0.9
    if:
      type: text
      substr: MemoryLoadLibrary
    downgrade:
      any:
        - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
    unless:
      - id: metadata/library/memory-module::memory-module-source
  - id: memory-get-proc-address
    desc: Resolves export from in-memory module
    crit: component
    conf: 0.85
    if:
      type: text
      substr: MemoryGetProcAddress
    unless:
      - id: metadata/library/memory-module::memory-module-source
  - id: memory-free-library
    desc: Frees in-memory loaded module
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: MemoryFreeLibrary
  - id: hmemorymodule-type
    desc: MemoryModule handle type (fileless loader)
    crit: component
    conf: 0.9
    if:
      type: text
      substr: HMEMORYMODULE
    unless:
      - id: metadata/library/memory-module::memory-module-source
  - id: memory-call-entry-point
    desc: Calls entrypoint of in-memory module
    crit: component
    conf: 0.9
    if:
      type: text
      substr: MemoryCallEntryPoint
    unless:
      - id: metadata/library/memory-module::memory-module-source
  - id: custom-load-library-func
    desc: Custom loader callback for memory module
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: CustomLoadLibraryFunc
  - id: copy-sections-fn
    desc: Copies PE sections into memory layout
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: CopySections
composite_rules:
  - id: memory-module-usage
    desc: MemoryModule library usage
    crit: suspicious
    conf: 0.95
    any:
      - id: memory-load-library
      - id: memory-get-proc-address
      - id: hmemorymodule-type
      - id: memory-call-entry-point
