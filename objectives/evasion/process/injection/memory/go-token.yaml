defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: go-token-stealth-injector
    desc: Garble-obfuscated Go injector using user token manipulation
    crit: hostile
    conf: 0.95
    attack: T1134.002
    all:
      - id: objectives/anti-static/obfuscation/obfuscator/garble::garble-obfuscated-go
      - id: micro-behaviors/process/create/spawn::create-process-as-user
    any:
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
      - id: micro-behaviors/process/info/thread::resume-thread-dup
  - id: go-service-mimicry-loader
    desc: Garble-obfuscated Go loader mimicking system service components
    crit: hostile
    conf: 0.97
    attack: T1574.002
    all:
      - id: objectives/anti-static/obfuscation/obfuscator/garble::garble-obfuscated-go
      - id: objectives/evasion/masquerade/service::svchost-global-mimicry
    any:
      - id: objectives/evasion/masquerade/service::suspicious-moka-dll
      - id: objectives/command-and-control/backdoor/loader/native-reflect::custom-pe-loader
