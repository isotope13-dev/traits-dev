# Source-level process memory injection patterns
# Detects C/C++ source code implementing process memory injection techniques
# ATT&CK: T1055.009 (Proc Memory), T1055.012 (Process Hollowing)
defaults:
  for: [c, cpp]
  platforms: [unix]
  attack: T1055.009
  mbc: B0033
traits:
- id: code-cave-reference
  desc: Code cave technique reference in source
  crit: suspicious
  conf: 0.9
  if:
    type: string_literal
    substr: "code cave"
    case_insensitive: true
- id: shellcode-write-string
  desc: Shellcode writing error/debug strings
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    substr: "writing shellcode"
    case_insensitive: true
- id: got-overwrite-string
  desc: GOT section overwrite reference
  crit: suspicious
  conf: 0.9
  attack: T1055
  if:
    type: string_literal
    substr: "writing at GOT"
- id: mem-fd-variable
  desc: Process memory file descriptor variable
  crit: notable
  conf: 0.8
  count_min: 3
  if:
    type: text
    word: "mem_fd"
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: cave-addr-variable
  desc: Code cave address variable in source
  crit: component
  conf: 0.85
  if:
    type: text
    word: "cave_addr"
- id: got-addr-variable
  desc: GOT address variable for hijacking
  crit: component
  conf: 0.85
  if:
    type: text
    word: "got_addr"
- id: got-address-field
  desc: GOT address field in source
  crit: component
  conf: 0.85
  if:
    type: text
    word: "got_address"
- id: got-offset-field
  desc: GOT offset field in source
  crit: component
  conf: 0.85
  if:
    type: text
    word: "got_offset"
- id: relro-state-flag
  desc: RELRO state tracking field
  crit: suspicious
  conf: 0.88
  if:
    type: text
    word: "relro_active"
- id: dlopen-addr-inject
  desc: dlopen address for shellcode injection
  crit: suspicious
  conf: 0.85
  attack: T1055
  if:
    type: text
    word: "dlopen_addr"
- id: syscall-addr-inject
  desc: Syscall address for shellcode injection
  crit: suspicious
  conf: 0.85
  attack: T1106
  if:
    type: text
    word: "syscall_addr"
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-spdx-source-context
- id: syscall-address-field
  desc: Syscall target address field
  crit: suspicious
  conf: 0.86
  attack: T1106
  if:
    type: text
    word: "syscall_address"
  unless:
  - id: well-known/lib/wine::wine-source-tree
  - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
- id: stack-return-address-field
  desc: Stack return address field
  crit: suspicious
  conf: 0.88
  attack: T1055
  if:
    type: text
    word: "process_stack_return_address"
- id: libc-dlopen-mode-field
  desc: dlopen mode address field
  crit: suspicious
  conf: 0.9
  attack: T1055
  if:
    type: text
    word: "libc_dlopen_mode_address"
composite_rules:
- id: got-address-offset-fields
  desc: GOT address and offset fields
  crit: suspicious
  conf: 0.9
  all:
  - id: got-address-field
  - id: got-offset-field
  - id: relro-state-flag
- id: code-cave-shellcode-injector
  desc: Code cave shellcode injection toolkit
  crit: hostile
  conf: 0.95
  all:
  - id: mem-fd-variable
  any:
  - id: code-cave-reference
  - id: shellcode-write-string
  - id: got-overwrite-string
  - id: cave-addr-variable
  - id: dlopen-addr-inject
  - id: syscall-addr-inject
  needs: 2
- id: got-hijack-injection
  desc: GOT hijacking with shellcode injection
  crit: hostile
  conf: 0.95
  attack: T1055
  all:
  - id: got-overwrite-string
  - id: shellcode-write-string
  any:
  - id: got-addr-variable
- id: proc-mem-injection-source
  desc: Process memory injection source code
  crit: suspicious
  conf: 0.85
  any:
  - id: code-cave-reference
  - id: shellcode-write-string
  - id: got-overwrite-string
  - id: mem-fd-variable
  needs: 2
- id: got-relro-hijack-telemetry
  desc: GOT and RELRO hijack telemetry
  crit: suspicious
  conf: 0.94
  attack: T1055
  all:
  - id: got-address-field
  - id: got-offset-field
  - id: relro-state-flag
  any:
  - id: stack-return-address-field
  - id: libc-dlopen-mode-field
  - id: syscall-address-field
  needs: 2
