defaults:
  platforms: [windows]
  for: [pe]
  attack: T1055.003
composite_rules:
  - id: go-obfuscated-thread-injector
    desc: Go binary with obfuscation and thread injection
    crit: hostile
    conf: 0.92
    all:
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
    any:
      - id: objectives/anti-static/obfuscation/name-mangling/type-names
      - id: objectives/anti-static/obfuscation/tools/garble::garble-obfuscated-go

  - id: go-lazyproc-thread-injection
    desc: Go LazyProc dispatch with thread context manipulation
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/api-resolution/manual::go-syscall-dynamic-api-dispatch
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer
      - id: metadata/binary/installer/family/
      - id: metadata/lang/compiler/aot::huge-runtime-function-count
      - id: micro-behaviors/communications/http/server/listener::listenandserve-call
      - id: micro-behaviors/os/service/control/
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
  - id: go-lazyproc-thread-hijack-loader
    desc: Go LazyProc thread hijack loader
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/os/api-resolution/manual::go-syscall-dynamic-api-dispatch
      - id: micro-behaviors/process/inject/runtime/thread-context::thread-context-apis-3of4
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/process/thread/create::create-thread
      - id: metadata/binary/symbols/imports::pe-single-import-dll
    any:
      - id: objectives/anti-static/obfuscation/name-mangling/type-names
      - id: metadata/binary/section/metrics::inflated-data-section
      - id: metadata/binary/resource::no-resources
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: micro-behaviors/communications/http/server/listener::listenandserve-call
      - id: micro-behaviors/os/service/control/
  - id: go-opaque-thread-context-loader
    desc: Opaque Go thread-context memory loader
    crit: hostile
    conf: 0.96
    attack: T1620
    all:
      - id: metadata/lang/compiler/systems::go-buildinfo
      - id: micro-behaviors/os/api-resolution/manual::go-syscall-dynamic-api-dispatch
      - id: micro-behaviors/process/inject/runtime/thread-context::thread-context-apis-3of4
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/process/thread/create::create-thread
      - id: objectives/anti-static/obfuscation/payload/section::oversized-rdata-section
    any:
      - id: metadata/lang/compiler/systems::go-opaque-module-path
      - id: metadata/lang/compiler/systems::go-opaque-build-path
    needs: 1
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: micro-behaviors/communications/http/server/listener::listenandserve-call
      - id: micro-behaviors/os/service/control/
  - id: go-update-thread-context-loader
    desc: Go Update.exe thread-context execution loader
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
      - id: objectives/command-and-control/dropper/delivery/github::update-exe-string
    any:
      - id: micro-behaviors/process/inject/runtime/thread-context::thread-context-apis-3of4
      - id: micro-behaviors/process/inject/runtime/thread-context::thread-context-apis-2of4
      - id: micro-behaviors/dylib/load/runtime::load-library-w
    needs: 1
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
