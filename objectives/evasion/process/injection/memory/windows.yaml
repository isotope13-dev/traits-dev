# Process Injection Detection - Windows
# MBC: B0033 (Process Injection)
# ATT&CK: T1055
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
# nt-write-virtual-memory removed - use micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-a instead
composite_rules:
  # process-inject-api: composite referencing canonical injection/memory traits
  # CreateRemoteThread: objectives/evasion/process/injection/runtime::create-remote-thread-dup (canonical)
  # WriteProcessMemory: objectives/evasion/process/injection/runtime::write-process-memory-dup (canonical)
  # VirtualAllocEx: micro-behaviors/mem/protect/modify::virtual-alloc-ex (canonical)
  - id: process-inject-api
    desc: Process injection via Windows API
    crit: suspicious
    conf: 0.66
    mbc: "B0033"
    attack: "T1055"
    needs: 2
    any:
      - id: objectives/evasion/process/injection/runtime::create-remote-thread-dup
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-a
    downgrade:
      any:
        - id: metadata/purpose/browser-sandbox::chromium-helper
        - id: metadata/purpose/debug-tool::debug-event-loop
        - id: metadata/purpose/debug-tool::human-oep-finder
        - id: metadata/purpose/virtualization::subsystem-controller
