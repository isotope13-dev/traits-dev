# Process Injection Detection - Windows
# MBC: B0033 (Process Injection)
# ATT&CK: T1055
defaults:
  for: [pe, dll]
  platforms: [windows]
# nt-write-virtual-memory removed - use micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-a instead
composite_rules:
  - id: kernel-gui-process-inline-patch
    desc: Kernel driver prepares an inline patch for a GUI process module
    crit: hostile
    conf: 0.99
    attack: "T1055"
    all:
      - id: micro-behaviors/os/kernel/module::native-kernel-api-context
      - id: micro-behaviors/process/attach/address-space::attach-process-address-space
      - id: micro-behaviors/process/attach/address-space::detach-process-address-space
      - id: micro-behaviors/process/attach/address-space::lookup-process-by-id
      - id: micro-behaviors/process/attach/address-space::compiled-explorer-process-target
      - id: micro-behaviors/mem/protect/modify::compiled-gui-module-target
      - id: micro-behaviors/mem/protect/modify::compiled-inline-patch-bytes
    unless:
      - id: well-known/tool/reverse-engineering/

  - id: game-targeted-process-injection
    desc: Game-targeted process injection with cheat controls
    crit: hostile
    conf: 0.98
    attack: T1055
    all:
      - id: well-known/game/cheat::emulator-game-target
      - id: well-known/game/cheat::cheat-control-set
    any:
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
  - id: resource-backed-remote-thread-injector
    desc: Embedded resource-backed remote-thread injector
    crit: hostile
    conf: 0.98
    attack: T1055,T1027.009
    all:
      - id: micro-behaviors/process/inject/dll::create-remote-thread
      - id: micro-behaviors/process/create/spawn::open-process
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/

  - id: geta-oep-helper-marker
    desc: Named-event + shared-section IPC handshake (injector/unpacker loader stub)
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/process/sync/event::open-event
      - id: micro-behaviors/communications/ipc/file-mapping::open-file-mapping-w
      - id: micro-behaviors/process/sync/event::set-event
  - id: process-inject-api-recognized-marker
    desc: Recognized process injector marker
    crit: notable
    conf: 0.95
    any:
      - id: objectives/evasion/process/injection/toolkit::legitimate-process-injector
      - id: well-known/game/mod::game-mod-embedded-dll
      - id: well-known/game/steam/
      - id: well-known/tool/sysadmin/chroot-win::chroot-windows-component
      - id: well-known/lib/easyhook::easyhook-library
      - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-release-component
      - id: well-known/tool/reverse-engineering/scylla::scylla-unpacker
  # process-inject-api: composite referencing canonical injection/memory traits
  # CreateRemoteThread: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup (canonical)
  # WriteProcessMemory: micro-behaviors/process/inject/runtime/call::write-process-memory-dup (canonical)
  # VirtualAllocEx: micro-behaviors/mem/protect/modify::virtual-alloc-ex (canonical)
  - id: process-inject-remote-allocation
    desc: Remote-process memory allocation API
    crit: component
    conf: 0.8
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-a
  - id: process-inject-remote-action
    desc: Remote-process memory write or thread-creation API
    crit: component
    conf: 0.85
    any:
      - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: process-inject-api
    desc: Combines remote allocation with a remote write or thread creation
    crit: suspicious
    conf: 0.66
    mbc: "B0033"
    attack: "T1055"
    all:
      - id: process-inject-remote-allocation
      - id: process-inject-remote-action
    downgrade:
      any:
        - id: objectives/evasion/process/injection/memory/
    unless:
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: metadata/binary/symbols/plugin/
      # Only suppress for authentic .NET images — not string-table hits like
      # mscoree.dll in AutoIt/interpreter runtimes (metadata/binary/framework::).
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::clr-runtime-header
      - id: metadata/binary/framework::dotnet-runtime
      - id: metadata/signed/leaf::google-inc
  - id: enumeration-and-impersonation-assisted-injection
    desc: Remote process injection with process targeting and token impersonation
    crit: hostile
    conf: 0.99
    mbc: "B0033"
    attack: "T1055,T1057,T1134.001"
    all:
      - id: process-inject-api
      - id: micro-behaviors/process/enumerate/snapshot::dynamic-toolhelp-process-traversal
      - id: micro-behaviors/os/privilege/token::dynamic-process-token-impersonation
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/leaf::microsoft-corporation
      - id: well-known/tool/reverse-engineering/
      - id: well-known/tool/sysadmin/
  - id: packed-remote-memory-injector
    desc: Packed PE combines process-memory writing with remote thread execution
    crit: hostile
    conf: 0.98
    mbc: "B0033"
    attack: "T1055,T1027"
    all:
      - id: micro-behaviors/process/create/spawn::open-process
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/info/thread::resume-thread-dup
    any:
      - id: objectives/anti-static/pack/detect::upx-marker
      - id: metadata/hardening/memory::extreme-wx-section-count-10
      - id: objectives/anti-static/pack/section-anomaly::large-low-entropy-rwx-section
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
  - id: remote-process-thread-context-loader
    desc: Remote process loader that writes memory and redirects a thread context
    crit: hostile
    conf: 0.97
    mbc: "B0033"
    attack: "T1055"
    all:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/info/thread::resume-thread-dup
    any:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/spawn::open-process
    unless:
      - id: well-known/app/oneget::oneget-detours-dns-shim-context
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
      - id: well-known/tool/development/debugpy
      # ConEmu injects its hook DLL into console child processes via the same
      # alloc+WriteProcessMemory+Set/GetThreadContext+ResumeThread primitive.
      # Gate on the authentic ConEmu signer marker (Maksim Moisiuk Authenticode),
      # not the filename markers, so a spoofed ConEmuHk.dll can't self-suppress.
      - id: well-known/tool/sysadmin/conemu::conemu-setup-signature
  - id: importless-thread-context-loader
    desc: Importless loader redirects a created thread through remote memory
    crit: hostile
    conf: 0.98
    mbc: "B0033"
    attack: "T1055.003"
    all:
      - id: metadata/binary/metrics/structural::no-imports
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex-text
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-text
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-text
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-text
      - id: micro-behaviors/process/info/thread::resume-thread
      - id: micro-behaviors/process/create/launch::create-process-api-name
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: well-known/tool/reverse-engineering/
  - id: process-inject-api-source
    desc: Process injection via Windows API in source
    crit: suspicious
    conf: 0.72
    mbc: "B0033"
    attack: "T1055"
    for: [c, cpp, csharp, rust]
    needs: 3
    any:
      - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-a
    unless:
      - id: well-known/lib/wine::wine-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
  - id: rust-remote-thread-shellcode-injection
    desc: Rust remote thread shellcode injection
    crit: hostile
    conf: 0.98
    for: [rust]
    all:
      - id: micro-behaviors/process/create/spawn::open-process
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
      - id: micro-behaviors/process/create/flags::create-suspended-flag-reference
  - id: nativeaot-service-injection-dll
    desc: NativeAOT service injection DLL
    crit: hostile
    conf: 0.95
    mbc: "B0033"
    attack: "T1055"
    all:
      - id: metadata/lang/compiler/aot::system-private-corelib
      - id: metadata/lang/compiler/aot::managed-executable-section
      - id: metadata/binary/metrics/pe-details::pe-dll-characteristics
      - id: micro-behaviors/os/service/control::service-admin-import-cluster
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::read-process-memory
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::low-entropy-overlay-inflation
      - id: metadata/binary/layout::pe-checksum-mismatch
      - id: metadata/binary/metrics/anomaly::suspicious-import-combo-marker
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: well-known/tool/reverse-engineering/
