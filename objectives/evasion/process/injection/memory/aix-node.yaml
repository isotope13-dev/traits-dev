defaults:
  platforms: [aix, unix]
  for: [javascript, typescript]
  attack: T1055
traits:
  - id: aix-proc-as-write-path
    desc: AIX proc address-space write path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/proc/\$\{.{1,40}\}/as'
  - id: aix-ptrace-inject-helper
    desc: AIX ptrace injection helper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: PT_WRITE_I
  - id: aix-inject-command-env
    desc: AIX injected command environment
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: __INJECT_CMD=
  - id: aix-ptrace-attach-marker
    desc: AIX ptrace attach marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: PT_ATTACH
  - id: node-stop-cont-target-process
    desc: Node stops and resumes target process
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'kill -STOP \$\{.{1,40}\}[\s\S]{0,320}kill -CONT \$\{.{1,40}\}'
composite_rules:
  - id: aix-node-procfs-ptrace-injection
    desc: AIX Node procfs ptrace injection
    crit: hostile
    conf: 0.98
    all:
      - id: aix-proc-as-write-path
      - id: aix-ptrace-inject-helper
    any:
      - id: node-stop-cont-target-process
      - id: aix-inject-command-env
      - id: aix-ptrace-attach-marker
    needs: 1
