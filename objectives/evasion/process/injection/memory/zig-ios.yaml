defaults:
  platforms: [ios, unix]
  for: [zig]
  attack: T1055

traits:
  - id: zig-ios-ptrace-attach-pid1
    desc: Zig iOS ptrace attach PID 1
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ptrace\(c\.PTRACE_ATTACH,\s*1'

  - id: zig-ios-ptrace-routine
    desc: Zig iOS ptrace attach routine
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: attemptPtraceAttach

composite_rules:
  - id: zig-ios-init-ptrace-attach
    desc: Zig iOS init ptrace attach
    crit: hostile
    conf: 0.97
    all:
      - id: zig-ios-ptrace-attach-pid1
      - id: zig-ios-ptrace-routine
