defaults:
  platforms: [windows]
  for: [pe]
  attack: T1055
  mbc: B0033

composite_rules:
  - id: taskhostw-ntapi-injection
    desc: taskhostw.exe NTAPI process injection
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/discovery/process/targeting::taskhostw-target
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-a
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-process-op
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: well-known/tool/sysadmin/systeminformer
