defaults:
  for:
    - elf
  platforms:
    - linux
traits:
  - id: ptrace-attach
    desc: PTRACE_ATTACH for process injection
    crit: suspicious
    conf: 0.75
    mbc: B0033
    attack: T1055
    if:
      type: text
      substr: PTRACE_ATTACH
    # legitimate debuggers (gdb/lldb) embed the constant in diagnostic
    # strings; exclude on their distinctive internal identity markers
    unless:
      - type: text
        substr: org.gnu.gdb.
      - type: text
        substr: GNU gdb
      - type: text
        substr: LLDB_DEBUGSERVER_PATH
    # Documented CLI tools (debuggers, tracers) ship usage/help + rich strings;
    # a bare injector implant does not. Downgrade the standalone constant there.
    downgrade:
      any:
        - id: micro-behaviors/ui/help/
  - id: ptrace-poketext
    desc: PTRACE_POKETEXT for code injection
    crit: suspicious
    conf: 0.85
    mbc: B0033
    attack: T1055
    if:
      type: text
      substr: PTRACE_POKETEXT
    # legitimate debuggers (gdb/lldb) embed the constant in diagnostic
    # strings; exclude on their distinctive internal identity markers
    unless:
      - type: text
        substr: org.gnu.gdb.
      - type: text
        substr: GNU gdb
      - type: text
        substr: LLDB_DEBUGSERVER_PATH
    downgrade:
      any:
        - id: micro-behaviors/ui/help/
  - id: ptrace-attach-source
    desc: ptrace(PTRACE_ATTACH) to control process
    crit: component
    conf: 0.85
    mbc: B0033
    attack: T1055
    for: [c, cpp, rust, go]
    if:
      type: text
      regex: '\bptrace\s*\(\s*PTRACE_ATTACH\b'
    unless:
      - id: well-known/lib/benign-runtime-bundles::node-source-tree
  - id: proc-pid-mem-format-source
    desc: Builds /proc/PID/mem path to write memory
    crit: component
    conf: 0.86
    mbc: B0033
    attack: T1055
    for: [c, cpp, rust, go]
    if:
      type: text
      regex: '/proc/%[A-Za-z0-9._-]{0,12}/mem|/proc/%[a-z][^"'']{0,24}/mem|/proc/\{\}[^"'']{0,16}/mem'
  - id: ptrace-pokedata-source
    desc: ptrace POKE writes into target memory
    crit: suspicious
    conf: 0.88
    mbc: B0033
    attack: T1055
    for: [c, cpp, rust, go]
    if:
      type: text
      regex: '\bptrace\s*\(\s*PTRACE_POKE(TEXT|DATA|USER)\b'
    unless:
      - id: metadata/lang/source/
      # nix/libc/rustix doc-comments illustrate ptrace(PTRACE_POKEDATA, ...)
      - id: well-known/lib/rust-system-bindings::rust-syscall-binding-crate
      - id: well-known/lib/benign-runtime-bundles::node-source-tree
      - id: well-known/app/sudo::source-tree
  - id: proc-pid-mem-open-write-source
    desc: Opens /proc/PID/mem for writing
    crit: component
    conf: 0.86
    mbc: B0033
    attack: T1055.008
    for: [c, cpp, rust, go]
    if:
      type: text
      regex: '/proc/%[a-z][^"'']{0,24}/mem'
    unless:
      - id: metadata/lang/source/
  - id: proc-pid-mem-write-api-source
    desc: pwrite into /proc/PID/mem
    crit: component
    conf: 0.86
    mbc: B0033
    attack: T1055.008
    for: [c, cpp, rust, go]
    if:
      type: text
      regex: 'pwrite\s*\([^;\n]{0,120}/proc/%'
    unless:
      - id: metadata/lang/source/
  - id: process-vm-writev-source
    desc: process_vm_writev to write remote memory
    crit: suspicious
    conf: 0.86
    mbc: B0033
    attack: T1055
    for: [c, cpp, rust, go]
    if:
      type: symbol
      exact: process_vm_writev
    unless:
      - id: well-known/lib/hpc
      - id: well-known/app/sudo::source-tree
      - type: text
        substr: getpid()
  - id: process-vm-writev
    desc: process_vm_writev for memory injection
    crit: suspicious
    conf: 0.85
    mbc: B0033
    attack: T1055
    size_max: 2097152
    if:
      type: symbol
      regex: process_vm_writev
    unless:
      - id: micro-behaviors/dylib/library/libc/
      - id: micro-behaviors/dylib/library/family/
  - id: syscall-ptrace-attach
    desc: Go ptrace attach to control process
    crit: suspicious
    conf: 0.75
    for:
      - elf
      - go
    if:
      type: symbol
      exact: syscall.PtraceAttach
  - id: syscall-ptrace-cont
    desc: Go ptrace resume of traced process
    crit: suspicious
    conf: 0.75
    for:
      - elf
      - go
    if:
      type: symbol
      exact: syscall.PtraceCont
  - id: proc-mem-glob
    desc: /proc/*/mem path for process memory injection
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - go
    if:
      type: text
      substr: /proc/*/mem
composite_rules:
  - id: process-inject-ptrace
    desc: Process injection via ptrace
    crit: suspicious
    conf: 0.66
    mbc: B0033
    attack: T1055
    any:
      - type: trait
        id: ptrace-attach
      - type: trait
        id: ptrace-poketext
      - type: trait
        id: ptrace-attach-source
      - type: trait
        id: process-vm-writev
      - type: trait
        id: process-vm-writev-source
  - id: proc-mem-ptrace-injection
    desc: Process memory injection via procfs
    crit: hostile
    conf: 0.98
    mbc: B0033
    attack: T1055.008
    for: [c, cpp, rust, go, elf]
    all:
      - type: trait
        id: proc-pid-mem-format-source
      - type: trait
        id: proc-pid-mem-write-source
    any:
      - type: trait
        id: ptrace-pokedata-source
      - type: trait
        id: process-vm-writev-source
    unless:
      - id: metadata/lang/source/
  - id: proc-pid-mem-write-source
    desc: /proc pid memory write source
    crit: suspicious
    conf: 0.9
    mbc: B0033
    attack: T1055.008
    for: [c, cpp, rust, go]
    all:
      - type: trait
        id: proc-pid-mem-format-source
      - type: trait
        id: proc-pid-mem-open-write-source
      - type: trait
        id: proc-pid-mem-write-api-source
    unless:
      - id: metadata/lang/source/
  - id: go-ptrace-inject
    desc: Go process injection via syscall.Ptrace
    crit: suspicious
    conf: 0.85
    mbc: B0033
    attack: T1055.008
    for:
      - elf
      - go
    any:
      - type: trait
        id: syscall-ptrace-attach
      - type: trait
        id: syscall-ptrace-cont
      - type: trait
        id: proc-mem-glob
