defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055

composite_rules:
  - id: oep-helper-executable-memory-injection
    desc: OEP helper with remote process executable-memory manipulation
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/evasion/process/injection/memory::geta-oep-helper-marker
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/create/spawn::open-process
      - id: micro-behaviors/process/info/thread::open-thread
