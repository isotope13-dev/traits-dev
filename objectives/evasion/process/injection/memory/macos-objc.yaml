defaults:
  platforms: [macos]
  for: [objc, macho]
  attack: T1055

traits:
  - id: mach-task-injection-calls
    desc: Mach task injection calls
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'task_for_pid[\s\S]{0,900}mach_vm_write[\s\S]{0,900}thread_create_running'

  - id: objc-shellcode-thread-launch
    desc: ObjC shellcode thread launch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'mach_vm_allocate[\s\S]{0,1000}thread_create_running'

composite_rules:
  - id: macos-mach-thread-injection
    desc: macOS Mach thread injection
    crit: hostile
    conf: 0.97
    all:
      - id: mach-task-injection-calls
    any:
      - id: objc-shellcode-thread-launch
      - id: objectives/command-and-control/reverse-shell/dup::reverse-shell-shell
