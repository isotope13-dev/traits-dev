defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1055
  mbc: B0033

traits:
  - id: csharp-winexec-procaddress
    desc: C# resolves WinExec address
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'GetProcAddress.{0,120}"WinExec"'

  - id: csharp-shellcode-buffer
    desc: C# shellcode byte buffer
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'byte\[\]\s+shellcode\s*='

  - id: csharp-injector-service-components
    desc: C# process injector service wiring
    crit: suspicious
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '\b(ProcessInjector|ShellcodeLoader|InjectorService|ProcessHelper)\b'
    unless:
      - type: path
        regex: '(^|[\\/])tests[\\/]CacheCompat[\\/]CommonCache\.Test\.Common[\\/]ProcessUtils\.cs$'

  - id: csharp-shellcode-pid-flow
    desc: C# shellcode path and PID flow
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "app.Run(pid, shellcodePath)"

  - id: csharp-load-and-inject-shellcode
    desc: C# loads and injects shellcode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ".Inject(pid, shellcode)"

  - id: csharp-shellcode-loader-call
    desc: C# shellcode loader call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "LoadExternalFile(shellcodePath)"

  - id: csharp-resolve-shellcode-path
    desc: C# resolves shellcode path
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "ResolveShellcodePath"

  - id: csharp-validate-target-pid
    desc: C# validates target PID
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "ReadAndValidatePid"

composite_rules:
  - id: csharp-remote-thread-shellcode-injection
    desc: C# remote-thread shellcode injection
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/evasion/process/injection/memory::process-inject-api-source
      - id: csharp-winexec-procaddress
      - id: csharp-shellcode-buffer
      - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite

  - id: csharp-source-shellcode-process-injector
    desc: C# source shellcode process injector
    crit: hostile
    conf: 0.97
    all:
      - id: csharp-injector-service-components
      - id: csharp-resolve-shellcode-path
      - id: csharp-validate-target-pid
      - id: csharp-shellcode-pid-flow

  - id: csharp-service-loads-and-injects-shellcode
    desc: C# service loads shellcode into PID
    crit: hostile
    conf: 0.97
    all:
      - id: csharp-injector-service-components
      - id: csharp-shellcode-loader-call
      - id: csharp-load-and-inject-shellcode
