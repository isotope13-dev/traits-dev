# Go Memory Injection Capabilities
# ATT&CK: T1055 (Process Injection)
defaults:
  for: [macho, elf]
  platforms: [macos, linux]
  attack: "T1055"
traits:
  - id: inject-mac-path
    desc: Go inject_mac package reference
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: "/inject_mac/inject\\.go"
  - id: inject-function
    desc: Go Inject function for memory injection
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: "inject_mac\\.Inject"
composite_rules:
  # Go websocket downloader with memory injection
  - id: go-websocket-inject
    desc: Go downloader with websocket C2 and memory injection
    crit: hostile
    conf: 1.0
    for: [go, elf, macho]
    all:
      - id: micro-behaviors/communications/websocket/library::gorilla-websocket
      - id: inject-mac-path
      - id: inject-function
      - id: micro-behaviors/crypto/symmetric/stream::rc4-decode-function
  # Go downloader with memory injection (relaxed)
  - id: go-injection-downloader
    desc: Go downloader with memory injection capability
    crit: hostile
    conf: 0.95
    for: [go, elf, macho]
    all:
      - id: inject-function
      - id: micro-behaviors/communications/websocket/library::gorilla-websocket
