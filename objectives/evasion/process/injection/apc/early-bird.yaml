defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055.004
  mbc: B0018
traits:
  - id: charmap-injection-target
    desc: charmap.exe path (atypical injection target)
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '\\System32\\charmap\.exe'
  - id: notepad-injection-target
    desc: notepad.exe path (atypical injection target)
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\\System32\\notepad\.exe'
  - id: calc-injection-target
    desc: calc.exe path (atypical injection target)
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\\System32\\calc\.exe'
  - id: rundll32-injection-target
    desc: rundll32.exe path (atypical injection target)
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\\System32\\rundll32\.exe'
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
composite_rules:
  - id: early-bird-apc-injection
    desc: Early Bird APC injection IAT cluster
    crit: hostile
    conf: 0.96
    size_max: 5242880
    all:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::queue-user-apc
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
      - id: objectives/evasion/masquerade/dll/name::api-ms-win-dll-basename
      - id: metadata/binary/vendor::microsoft-corp-marker
    downgrade:
      any:
        - id: metadata/binary/metrics/threshold::many-imports-50
  - id: apc-injection-system32-target
    desc: APC injection targeting an atypical System32 process
    crit: hostile
    conf: 0.96
    size_max: 5242880
    all:
      - id: early-bird-apc-injection
    any:
      - id: objectives/evasion/process/injection/apc
    unless:
      - id: metadata/binary/framework::dotnet-metadata
