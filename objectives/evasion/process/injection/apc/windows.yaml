defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055.004
  mbc: B0018
composite_rules:
  - id: apc-dll-injection
    desc: APC-based cross-process injection primitives
    crit: hostile
    conf: 0.96
    for: [pe, dll, c, cpp]
    all:
      - id: micro-behaviors/process/inject/runtime/call::queue-user-apc
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex-dup
    any:
      - id: micro-behaviors/dylib/load/runtime::load-library-w
      - id: micro-behaviors/dylib/load/source::load-library-source
      - id: micro-behaviors/process/info/thread::open-thread
      - id: micro-behaviors/process/info/thread::open-thread-source
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-thread-enumeration-string
    needs: 2
    unless:
      - id: well-known/game/mod/
      - id: objectives/evasion/process/injection/toolkit/
      - id: well-known/tool/offensive/mimikatz/
      - id: metadata/binary/vendor/
