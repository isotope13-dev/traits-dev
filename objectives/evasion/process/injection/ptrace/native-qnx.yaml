defaults:
  platforms: [qnx, unix]
  for: [c, cpp, elf]
  attack: T1055

traits:
  - id: qnx-native-ptrace-attach
    desc: QNX PT_ATTACH constant reference
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: PT_ATTACH
    unless:
      - id: well-known/tool/reverse-engineering/radare2/
      - id: well-known/lib/benign-runtime-bundles::php-source-tree

  - id: qnx-native-ptrace-write
    desc: QNX PT_WRITE_D constant reference
    crit: suspicious
    conf: 0.94
    if:
      type: text
      word: PT_WRITE_D

  - id: qnx-native-injected-marker
    desc: QNX native injected marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: echo injected_marker > /tmp/.injected

composite_rules:
  # The /proc/<pid>/cmdline path itself is a neutral process-introspection
  # capability — relocated to micro-behaviors/fs/proc/info/cmdline and referenced
  # cross-directory here. Targeting intent comes from the ptrace primitives.
  - id: qnx-native-proc-cmdline-target
    desc: QNX native proc cmdline target
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/fs/proc/info/cmdline::native-proc-pid-cmdline-path
    any:
      - id: qnx-native-ptrace-attach
      - id: qnx-native-ptrace-write
      - id: qnx-native-injected-marker
    unless:
      - id: well-known/tool/reverse-engineering/radare2/

  - id: qnx-native-ptrace-attach-write-constants
    desc: QNX ptrace attach/write constants
    crit: suspicious
    conf: 0.98
    all:
      - id: qnx-native-ptrace-attach
      - id: qnx-native-ptrace-write
    unless:
      - id: well-known/tool/reverse-engineering/radare2::libr-debug-header
      - id: well-known/tool/reverse-engineering/radare2::libr-sflib-debug-header

  - id: qnx-native-marker-process-inject
    desc: QNX native marker process inject
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-injected-marker
      - id: qnx-native-proc-cmdline-target
