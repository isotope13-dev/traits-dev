defaults:
  platforms: [qnx, unix]
  for: [c, cpp, elf]
  attack: T1055

traits:
  - id: qnx-native-ptrace-attach
    desc: QNX native ptrace attach
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: PT_ATTACH

  - id: qnx-native-ptrace-write
    desc: QNX native ptrace write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      word: PT_WRITE_D

  - id: qnx-native-injected-marker
    desc: QNX native injected marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: echo injected_marker > /tmp/.injected

  - id: qnx-proc-cmdline-format
    desc: QNX proc cmdline format
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /proc/%d/cmdline

composite_rules:
  - id: qnx-native-proc-cmdline-target
    desc: QNX native proc cmdline target
    crit: suspicious
    conf: 0.92
    all:
      - id: qnx-proc-cmdline-format
    any:
      - id: qnx-native-ptrace-attach
      - id: qnx-native-ptrace-write
      - id: qnx-native-injected-marker

  - id: qnx-native-ptrace-process-inject
    desc: QNX native ptrace process inject
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-ptrace-attach
      - id: qnx-native-ptrace-write

  - id: qnx-native-marker-process-inject
    desc: QNX native marker process inject
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-injected-marker
      - id: qnx-native-proc-cmdline-target
