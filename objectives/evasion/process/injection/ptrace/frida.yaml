defaults:
  platforms: [linux, android]
  for: [elf]
  attack: T1055.008

composite_rules:
  - id: frida-ptrace-process-injection
    desc: Frida ptrace process-memory injection
    crit: suspicious
    conf: 0.99
    mbc: B0033
    all:
      - id: micro-behaviors/os/syscall/invoke::ptrace-import
      - id: micro-behaviors/process/inject/memory::ptrace-pokedata-request-constant
      - id: well-known/tool/reverse-engineering/frida::frida-linux-helper-library-injection
    any:
      - id: well-known/tool/reverse-engineering/frida::frida-inject-native
      - id: well-known/tool/reverse-engineering/frida::frida-server-native
