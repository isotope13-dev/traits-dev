defaults:
  platforms: [panos, appliance, unix]
  for: [go, elf, c]
  attack: T1055

traits:
  - id: go-panos-ptrace-attach
    desc: Go PAN-OS ptrace attach
    crit: suspicious
    conf: 0.94
    for: [go]
    if:
      type: text
      regex: 'syscall\.SYS_PTRACE[^;\n]{0,120}syscall\.PTRACE_ATTACH'

  - id: go-panos-ptrace-inject-name
    desc: Go PAN-OS ptrace inject name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: ptraceInject

composite_rules:
  - id: go-panos-ptrace-injection
    desc: Go PAN-OS ptrace injection
    crit: hostile
    conf: 0.98
    all:
      - id: go-panos-ptrace-attach
      - id: go-panos-ptrace-inject-name
