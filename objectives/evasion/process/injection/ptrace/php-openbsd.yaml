defaults:
  platforms: [openbsd, bsd, unix]
  for: [php]
  attack: T1055

traits:
  - id: php-ptrace-injection-function
    desc: PHP ptrace injection function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: attempt_ptrace_injection

  - id: php-ptrace-target-probe
    desc: PHP ptrace target probe
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: proc_open[\s\S]{0,180}kill -0 \{\$pid\}

composite_rules:
  - id: php-openbsd-ptrace-injection
    desc: PHP OpenBSD ptrace injection
    crit: hostile
    conf: 0.98
    all:
      - id: php-ptrace-injection-function
      - id: php-ptrace-target-probe
