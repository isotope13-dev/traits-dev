# Atom Bombing Injection Technique
# Detects alternative process injection via Windows atom table
# ATT&CK: T1055.001 (Process Injection: Dynamic-link Library Injection)
defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: addatoma-api
    desc: AddAtomA API atom table access
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: "AddAtomA"
    mbc: "C0041"
  - id: getatomnama-api
    desc: GetAtomNameA API for atom retrieval
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: "GetAtomNameA"
    mbc: "C0041"
  - id: findatoma-api
    desc: FindAtomA API atom table lookup
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: "FindAtomA"
    mbc: "C0041"
  - id: globalgetatomname-api
    desc: GlobalGetAtomName API
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: "GlobalGetAtomName"
composite_rules:
  - id: atom-bombing-triple
    desc: Full atom-table API triad (Add/Find/GetAtomName)
    crit: suspicious
    conf: 0.9
    attack: "T1055.001"
    mbc: "C0041"
    all:
      - id: addatoma-api
      - id: findatoma-api
      - id: getatomnama-api
    any:
      - id: micro-behaviors/process/inject/runtime/call::queue-user-apc
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/inject/dll::create-remote-thread
      - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite
    # All three atom APIs together is rare in benign software;
    # typically indicates atom-bombing IPC or atom-table marker.
    # Must also show injection capability to distinguish from
    # legitimate atom table usage (e.g. archivers, IPC tools).
    unless:
      - id: metadata/binary/metrics/structural::many-exports

  - id: atom-bombing-capable
    desc: Atom bombing injection capability
    crit: suspicious
    conf: 0.85
    attack: "T1055.001"
    mbc: "C0041"
    all:
      - id: addatoma-api
      - id: getatomnama-api
    any:
      - id: micro-behaviors/process/inject/runtime/call::queue-user-apc
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: globalgetatomname-api
    unless:
      - id: metadata/binary/metrics/structural::many-exports
