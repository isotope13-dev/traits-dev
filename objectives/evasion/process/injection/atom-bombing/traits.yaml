# Atom APIs are neutral IPC. Atom bombing requires them together with a
# process-injection primitive, so only that combination is an objective.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1055.001
  mbc: C0041

composite_rules:
  - id: atom-bombing-with-apc
    desc: Global atom-table transfer with APC injection
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/ipc/message::global-atom-table-readback
      - id: micro-behaviors/process/inject/runtime/call::queue-user-apc

  - id: atom-bombing-capable
    desc: Atom-table process-injection capability
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/communications/ipc/message::global-atom-table-readback
    any:
      - id: micro-behaviors/process/inject/runtime/call::queue-user-apc
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
    needs: 1
