# Atom Bombing Injection Technique
# Detects alternative process injection via Windows atom table
# ATT&CK: T1055.001 (Process Injection: Dynamic-link Library Injection)
defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: addatoma-api
    desc: AddAtomA API atom table access
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: "AddAtomA"
    mbc: "C0041"
  - id: getatomnama-api
    desc: GetAtomNameA API for atom retrieval
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: "GetAtomNameA"
    mbc: "C0041"
  - id: globalgetatomname-api
    desc: GlobalGetAtomName API
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: "GlobalGetAtomName"
composite_rules:
  - id: atom-bombing-capable
    desc: Atom bombing injection capability
    crit: suspicious
    conf: 0.85
    attack: "T1055.001"
    mbc: "C0041"
    all:
      - id: addatoma-api
      - id: getatomnama-api
    any:
      - id: micro-behaviors/process/inject/runtime::queue-user-apc
      - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime::set-thread-context-dup
      - id: globalgetatomname-api
    unless:
      - id: metadata/binary/metrics::many-exports
