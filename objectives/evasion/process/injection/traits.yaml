# Process Injection Patterns
# Composite rules for code injection into other processes
composite_rules:
  # === Remote Thread Injection ===
  - id: remote-thread-pattern
    desc: Remote thread creation for injection
    crit: hostile
    conf: 0.95
    attack: "T1055.001"
    for: ["pe", "dll"]
    all:
      - id: objectives/evasion/process/injection/runtime::create-remote-thread-dup
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
    none:
      - id: metadata/format::many-exports
      - id: metadata/format::many-imports
    downgrade:
      any:
        - id: metadata/vendor/microsoft::diagnostics-hub
    unless:
      - id: metadata/vendor/jetbrains::jetbrains-company-string
      - id: metadata/purpose/debug-tool::scylla-unpacker
  # === Suspended Process Injection ===
  - id: suspended-process-inject
    desc: Suspend process and modify context
    crit: suspicious
    conf: 0.90
    attack: "T1055"
    for: ["pe", "dll"]
    all:
      - id: objectives/evasion/process/injection/runtime::suspend-thread
      - id: objectives/evasion/process/injection/runtime::get-thread-context-dup
      - id: objectives/evasion/process/injection/runtime::set-thread-context-dup
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
    none:
      - id: metadata/format::many-exports
      - id: metadata/format::many-imports
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/lang::go-runtime-marker
        - id: metadata/vendor/valve::valve-corp-binary
        - id: metadata/purpose/debug-tool::ollydbg-plugin-export
        - id: metadata/purpose/debug-tool::debug-event-loop
        - id: metadata/purpose/debug-tool::ida-debugger-server
  # === APC Queue Injection ===
  - id: apc-injection
    desc: Asynchronous procedure call injection
    crit: hostile
    conf: 0.95
    attack: "T1055.004"
    for: ["pe", "dll"]
    all:
      - id: objectives/evasion/process/injection/runtime::queue-user-apc
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
    none:
      - id: metadata/format::many-exports
      - id: metadata/format::many-imports
    downgrade:
      any:
        - id: metadata/vendor/valve::valve-corp-binary
  # === Process Hollowing Pattern ===
  - id: process-hollowing
    desc: Suspend + memory write + context modify
    crit: suspicious
    conf: 0.90
    attack: "T1055.012"
    for: ["pe", "dll"]
    all:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: objectives/evasion/process/injection/runtime::suspend-thread
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
      - id: objectives/evasion/process/injection/runtime::set-thread-context-dup
    none:
      - id: metadata/format::many-exports
      - id: metadata/format::many-imports
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/vendor/valve::valve-corp-binary
        - id: metadata/purpose/debug-tool::debug-event-loop
        - id: metadata/purpose/debug-tool::ida-debugger-server
  # === Shared Library Injection ===
  - id: dll-injection
    desc: DLL injection into process
    crit: hostile
    conf: 0.90
    attack: "T1055.001"
    for: ["pe", "dll"]
    all:
      - id: objectives/evasion/process/injection/runtime::create-remote-thread-dup
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
      - id: micro-behaviors/dylib/load::load-library-a
    none:
      - id: metadata/format::many-exports
    downgrade:
      any:
        - id: metadata/vendor/valve::valve-corp-binary
    unless:
      - id: metadata/vendor/jetbrains::jetbrains-company-string
      - id: metadata/purpose/debug-tool::scylla-unpacker
  # === Process Hollowing via Context Hijack ===
  # Variant without explicit SuspendThread/WriteProcessMemory imports:
  # CreateProcessW (with CREATE_SUSPENDED) + thread context manipulation
  # + FlushInstructionCache (post-write) + ResumeThread
  - id: process-hollowing-context-hijack
    desc: Process hollowing via thread context manipulation
    crit: suspicious
    conf: 0.90
    attack: "T1055.012"
    for: ["pe"]
    all:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/process/injection/hollowing::get-thread-context
      - id: micro-behaviors/process/injection/hollowing::set-thread-context
      - id: micro-behaviors/mem/execute/rwx::flush-instruction-cache
      - id: micro-behaviors/process/injection/hollowing::resume-thread
    none:
      - id: metadata/format::many-exports
      - id: metadata/format::many-imports
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/vendor/valve::valve-corp-binary
        - id: metadata/purpose/debug-tool::debug-event-loop
        - id: metadata/purpose/debug-tool::ida-debugger-server
  # === Complete Injection Framework ===
  - id: full-injection-capability
    desc: Complete process injection toolkit
    crit: suspicious
    conf: 0.85
    attack: "T1055"
    for: ["pe", "dll"]
    any:
      - id: remote-thread-pattern
      - id: suspended-process-inject
      - id: apc-injection
    none:
      - id: metadata/format::many-exports
    downgrade:
      any:
        - id: metadata/lang::go-runtime-marker
        - id: metadata/vendor/valve::valve-corp-binary
  # === Local / Callback Injection ===
  - id: hostile-callback-execution
    desc: Potential self-injecting shellcode via callback
    crit: hostile
    conf: 0.95
    mbc: "B0001.032"
    attack: "T1055"
    for: [pe, dll]
    all:
      - id: objectives/execution/native/runtime::callback-execution
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/mem/alloc/heap::heap-alloc
    unless:
      - id: metadata/format::many-imports
