defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
  size_max: 52428800
traits:
  - id: asm-delta-offset
    desc: Assembly delta offset calculation or IP retrieval
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: call\s+\S+\s+(\S+:)?\s+pop\s+(e[abcd]x|e[sd]i|e[bc]p)
    unless:
      - type: raw
        regex: call\s+aligne\s+pop\s+ecx
  - id: asm-sub-reg-label
    desc: Assembly subtraction of label from register
    crit: component
    if:
      type: raw
      regex: sub\s+(e[abcd]x|e[sd]i|e[bc]p),\s*[a-zA-Z0-9_$]+
  - id: sihost32-stager
    desc: /sihost32 suspended stager marker
    crit: component
    conf: 0.95
    for:
      - pe
    platforms:
      - windows
    if:
      type: trait
      id: micro-behaviors/process/create/hidden::sihost32-arg

  - id: module-stomping-target
    desc: Legitimate DLL name associated with module stomping
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "(chakra|mshtml|edgehtml|mscoree)\\.dll"
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/resource::resource-only-dll

  - id: dotnet-function-pointer-delegate
    desc: .NET unmanaged function pointer delegate
    crit: component
    conf: 0.85
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: GetDelegateForFunctionPointer

  - id: split-virtual-api-fragment
    desc: Split Virtual API fragment
    crit: component
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: "Virtual "

  - id: split-alloc-api-fragment
    desc: Split Alloc API fragment
    crit: component
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: Alloc

  - id: split-write-api-fragment
    desc: Split Write API fragment
    crit: component
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: "Write "

  - id: split-memory-api-fragment
    desc: Split Memory API fragment
    crit: component
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: Memory

  - id: split-protect-api-fragment
    desc: Split Protect API fragment
    crit: component
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: Protect

  - id: split-open-process-fragment
    desc: Split OpenProcess API fragment
    crit: component
    conf: 0.75
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: "Open "

  - id: split-kernel-api-fragment
    desc: Split kernel32 API fragment
    crit: component
    conf: 0.75
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: "kernel "

composite_rules:
  - id: unsigned-module-stomping-target
    desc: Unsigned binary contains DLL name associated with module stomping
    crit: component
    conf: 0.9
    all:
      - id: objectives/evasion/process/injection::module-stomping-target
      - id: metadata/signed::unsigned
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/resource::resource-only-dll

  - id: hostile-module-stomping-payload
    desc: Suspiciously small unsigned payload references module-stomping DLL names
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/evasion/process/injection::unsigned-module-stomping-target
      - id: metadata/binary/metrics::tiny-pe

  - id: managed-injection-stub
    desc: Managed code injection stub (MVP boilerplate + no functions)
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/binary/framework::managed-boilerplate-attributes
      - id: metadata/binary/metrics::no-functions
      - id: metadata/binary/metrics::tiny-dotnet

  - id: dotnet-split-winapi-injection-loader
    desc: .NET split WinAPI injection loader
    crit: suspicious
    conf: 0.92
    attack: T1055
    platforms:
      - windows
    for:
      - pe
      - dll
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-function-pointer-delegate
      - id: split-virtual-api-fragment
      - id: split-alloc-api-fragment
      - id: split-write-api-fragment
      - id: split-memory-api-fragment
      - id: split-protect-api-fragment
    any:
      - id: split-open-process-fragment
      - id: split-kernel-api-fragment
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
    unless:
      - id: metadata/signed/platform::microsoft-windows

  - id: fibers-execution
    desc: Fibers-based execution (stealth thread alternative)
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/process/thread/lifecycle::create-fiber
      - id: micro-behaviors/process/thread/lifecycle::switch-to-fiber
  - id: remote-thread-pattern
    desc: Remote thread creation for injection
    crit: notable
    conf: 0.95
    attack: T1055.001
    for:
      - pe
    all:
      - id: micro-behaviors/process/inject/runtime::create-remote-thread-dup
      - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
    unless:
      - id: metadata/binary/metrics::many-exports
      - id: metadata/binary/metrics::many-imports
      - id: metadata/vendor/jetbrains::jetbrains-company-string
      - id: well-known/tools/reverse-engineering::scylla-unpacker
    downgrade:
      any:
        - id: metadata/vendor/microsoft::diagnostics-hub
        - id: well-known/tools/reverse-engineering::human-oep-finder
        - id: well-known/tools/reverse-engineering::get-oep-export
  - id: process-hollowing-context-hijack
    desc: Process hollowing via thread context manipulation
    crit: suspicious
    conf: 0.9
    attack: T1055.012
    for:
      - pe
    all:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: objectives/evasion/process/injection/hollowing::get-thread-context
      - id: objectives/evasion/process/injection/hollowing::set-thread-context
      - id: objectives/evasion/process/injection::flush-instruction-cache-windows
      - id: objectives/evasion/process/injection/hollowing::resume-thread
    unless:
      - id: metadata/binary/metrics::many-exports
      - id: metadata/binary/metrics::many-imports
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/vendor/valve::valve-corp-binary
        - id: well-known/tools/reverse-engineering::debug-event-loop
        - id: well-known/tools/reverse-engineering::ida-debugger-server
  - id: asm-delta-offset-classic
    conf: 0.95
    crit: suspicious
    desc: Classic assembly delta offset with subtraction
    all:
      - id: objectives/evasion/process/injection::asm-delta-offset
      - id: objectives/evasion/process/injection::asm-sub-reg-label
  - id: delayed-sihost-loader
    desc: Delayed /sihost32 launcher staging
    crit: suspicious
    conf: 0.93
    attack: T1055
    for:
      - pe
    platforms:
      - windows
    all:
      - id: sihost32-stager
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/time/timing/delay::sleep-dup
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: direct-syscall-sihost-loader
    desc: Direct-syscall /sihost32 injection loader
    crit: hostile
    conf: 0.98
    attack: T1055
    for:
      - pe
    platforms:
      - windows
    all:
      - id: sihost32-stager
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: micro-behaviors/os/syscall/raw::syscall-ret-gadget
      - id: metadata/binary/section/metrics::high-entropy-rdata-section
      - id: metadata/binary/section/metrics::rdata-ratio-over-2pt5x
    unless:
      - id: metadata/signed/platform::microsoft-windows

  - id: module-stomping
    desc: Possible module stomping API cluster
    crit: hostile
    conf: 0.95
    attack: T1055.001
    all:
      - id: module-stomping-target
      - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
      - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
    any:
      - id: micro-behaviors/process/inject/runtime::create-remote-thread-dup
      - id: micro-behaviors/process/inject/runtime::queue-user-apc
      - id: micro-behaviors/process/inject/runtime::set-thread-context-dup
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/vendor/sandboxie::sandboxie-component
      - id: well-known/tools/reverse-engineering::ida-debugger-server
      - id: well-known/tools/reverse-engineering::debug-event-loop
    downgrade:
      any:
        - id: metadata/signed/developer/
        - id: metadata/lang/compiler/aot::native-runtime-large-file
