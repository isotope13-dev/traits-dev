composite_rules:
  - id: pe-injection
    desc: "Process injection using CreateProcess and thread manipulation"
    crit: hostile
    conf: 1
    platforms: [windows]
    for: [pe]
    all:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime::set-thread-context-dup
      - id: micro-behaviors/process/inject/runtime::resume-thread-dup
