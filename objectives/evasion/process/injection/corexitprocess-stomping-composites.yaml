defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: msvc-crt-strerror-string
    desc: MSVC C++ runtime strerror diagnostic string
    crit: component
    conf: 0.99
    if:
      type: text
      substr: "Visual C++ CRT: Not enough memory to complete call to strerror"
composite_rules:
  - id: msvc-crt-full-linkage
    desc: Standard MSVC CRT linkage (rich header + many imports)
    crit: component
    conf: 0.95
    all:
      - id: metadata/binary/resource::rich-header-present
      - id: metadata/binary/metrics::many-imports
  - id: corexitprocess-stomping
    desc: CorExitProcess with module-stomping target
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/process/inject/runtime::corexitprocess-string
      - id: objectives/evasion/process/injection::module-stomping-target
    any:
      - id: objectives/evasion/process/injection/memory::process-inject-api
      - id: objectives/evasion/process/injection::module-stomp-v2-str
    unless:
      - id: msvc-crt-strerror-string
      - id: objectives/evasion/process/injection::msvc-crt-full-linkage
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
      - id: metadata/binary/installer/sfx::winrar-sfx
