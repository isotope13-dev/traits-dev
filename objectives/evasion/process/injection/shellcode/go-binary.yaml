defaults:
  platforms: [unix]
  for: [elf, macho]
  attack: T1055
  mbc: B0033

composite_rules:
  - id: go-binary-rx-page-protection
    desc: Go binary makes page executable
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/mem/protect/modify::go-binary-syscall-mprotect-text
      - id: micro-behaviors/mem/protect/modify::go-binary-syscall-getpagesize-text
    unless:
      - id: well-known/tool/detection/
