# Obfuscated Shellcode Injection — PE binaries with shellcode injection
# capabilities combined with string obfuscation, indicating an implant
# rather than a legitimate utility.
# ATT&CK: T1055 (Process Injection) + T1027 (Obfuscated Files or Information)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1055"
  mbc: "B0033"

composite_rules:
  - id: benign-obfuscated-shellcode-context
    desc: Benign signed, framework, or known app context
    crit: baseline
    conf: 0.9
    any:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-assembly
      - id: well-known/lib/electron::electron-app-runtime
      - id: well-known/lib/videolan::media-codec-lib
      - id: well-known/lib/videolan::vlc-known-plugin-dll-name
      - id: metadata/signed/leaf::brave-software-inc.
      - id: well-known/app/mcu-ai-debug::helper-binary
      - id: metadata/signed/developer::johannes-schindelin
      - id: rust-native-export-library-context

  - id: rust-native-export-library-context
    desc: Rust native library with many exports
    crit: baseline
    conf: 0.9
    all:
      - id: metadata/lang/compiler/systems::rust-binary
      - id: metadata/binary/metrics/structural::many-exports
      - id: metadata/lang/compiler/aot::native-runtime-large-file

  # Shellcode injection + string obfuscation = hostile implant profile.
  # Legitimate compression/utility libraries do not combine W^X injection
  # with stack-string obfuscation.
  - id: obfuscated-shellcode-injection
    desc: Shellcode injection with string obfuscation
    crit: hostile
    conf: 0.93
    all:
      - id: objectives/evasion/process/injection/shellcode::w-xor-x-injection-x64
      - id: objectives/anti-static/obfuscation/string/anomaly::many-stack-strings
    any:
      - id: objectives/anti-analysis/self-modify/runtime::xor-loop-pattern
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: micro-behaviors/process/thread/create::create-thread
    unless:
      - id: objectives/evasion/process/injection/shellcode/

  # Shellcode injection in a Node-API native addon (supply-chain context).
  # A compression utility should not need W^X memory transitions.
  - id: node-addon-shellcode-injection
    desc: Node-API addon with shellcode injection capability
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/binary/framework::node-api-addon-export
      - id: objectives/evasion/process/injection/shellcode::w-xor-x-injection-x64
    any:
      - id: objectives/anti-static/obfuscation/string/anomaly::many-stack-strings
      - id: objectives/anti-analysis/self-modify/runtime::xor-loop-pattern
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    unless:
      - id: metadata/signed/platform/
      - id: well-known/lib/electron/
      - id: well-known/lib/skia/
    downgrade:
      all:
        - id: metadata/signed/developer::johannes-schindelin
