defaults:
  for: [data]
  platforms: [linux, macos, windows]
  attack: T1055
traits:
  - id: raw-bin-sh-null
    desc: Raw data contains null-terminated /bin/sh
    crit: notable
    conf: 0.82
    platforms: [linux, macos]
    size_max: 4096
    if:
      type: hex
      pattern: "2F 62 69 6E 2F 73 68 00"
  - id: raw-shell-c-argument
    desc: Raw data contains shell -c argument bytes
    crit: suspicious
    conf: 0.78
    platforms: [linux, macos]
    size_max: 4096
    if:
      type: hex
      pattern: "66 68 2D 63"
  - id: raw-linux-x64-execve-syscall
    desc: Raw Linux x64 execve syscall
    crit: suspicious
    conf: 0.86
    platforms: [linux]
    size_max: 4096
    if:
      type: hex
      pattern: "6A 3B 58 0F 05"
  - id: raw-linux-x64-execve-binsh
    desc: Raw Linux execve shell bytes
    crit: suspicious
    conf: 0.9
    platforms: [linux]
    size_max: 4096
    if:
      type: hex
      pattern: "6A 3B 58 ?? 48 BB 2F 62 69 6E 2F 73 68 00"
  - id: raw-linux-x64-socket-tcp
    desc: Raw Linux x64 TCP socket
    crit: suspicious
    conf: 0.88
    platforms: [linux]
    size_max: 4096
    if:
      type: hex
      pattern: "6A 29 58 ?? 6A 02 5F 6A 01 5E 0F 05"
  - id: raw-linux-x64-connect-syscall
    desc: Raw Linux x64 connect syscall
    crit: suspicious
    conf: 0.86
    platforms: [linux]
    size_max: 4096
    if:
      type: hex
      pattern: "6A 2A 58 0F 05"
  - id: raw-linux-x64-dup2-loop
    desc: Raw Linux x64 dup2 loop
    crit: suspicious
    conf: 0.88
    platforms: [linux]
    size_max: 4096
    if:
      type: hex
      pattern: "6A 03 5E 48 FF CE 6A 21 58 0F 05 75"
  - id: raw-linux-x64-inline-sockaddr
    desc: Raw Linux inline sockaddr
    crit: suspicious
    conf: 0.86
    platforms: [linux]
    size_max: 4096
    if:
      type: hex
      pattern: "48 B9 02 00 ?? ?? ?? ?? ?? ?? 51 48 89 E6"
  - id: raw-x64-register-save-prologue
    desc: Raw x64 register save prologue
    crit: notable
    conf: 0.78
    size_max: 4096
    if:
      type: hex
      pattern: "50 51 52 56 57 41 53"
  - id: raw-linux-x64-stdout-write-stub
    desc: Raw Linux stdout write stub
    crit: suspicious
    conf: 0.84
    platforms: [linux]
    size_max: 4096
    if:
      type: hex
      pattern: "48 31 C0 48 83 C0 01 48 89 C7 48 8D 35 ?? ?? ?? ?? 48 31 D2 B2 ?? 0F 05"
  - id: raw-x64-placeholder-jump-rbx
    desc: Raw x64 placeholder jumpback
    crit: suspicious
    conf: 0.9
    size_max: 4096
    if:
      type: hex
      pattern: "48 BB AA AA AA AA AA AA AA AA FF E3"
  - id: raw-x64-register-restore-jumpback
    desc: Raw x64 restore jumpback stub
    crit: suspicious
    conf: 0.88
    size_max: 4096
    if:
      type: hex
      pattern: "41 5B 5F 5E 5A 59 58 48 BB ?? ?? ?? ?? ?? ?? ?? ?? FF E3"
  - id: raw-self-labeled-virus
    desc: Raw self-labeled virus text
    crit: suspicious
    conf: 0.84
    size_max: 4096
    if:
      type: raw
      substr: "virus"
  - id: raw-x64-stack-align-loader-stub
    desc: Raw x64 stack-align loader stub
    crit: suspicious
    conf: 0.88
    platforms: [windows]
    if:
      type: hex
      pattern: "56 48 89 E6 48 83 E4 F0 48 83 EC 20 E8"
      offset: 0
  - id: raw-x64-alloc-call-stub
    desc: Raw data contains x64 allocation call stub
    crit: suspicious
    conf: 0.82
    platforms: [windows]
    size_max: 262144
    if:
      type: hex
      pattern: "C7 44 24 28 04 00 00 00 C7 44 24 20 00 10 00 00"
  - id: raw-shellcode-api-hash-immediates
    desc: Raw shellcode API hash cluster
    crit: suspicious
    conf: 0.82
    platforms: [windows]
    size_max: 262144
    if:
      type: hex
      pattern: "B9 53 17 E6 70 49 89 C6 E8 ?? ?? ?? ?? BA 43 6A 45 9E"

composite_rules:
  - id: raw-linux-x64-exec-command-shellcode
    desc: Raw Linux x64 exec command shellcode
    crit: suspicious
    conf: 0.9
    platforms: [linux]
    all:
      - id: raw-linux-x64-execve-syscall
    any:
      - id: raw-bin-sh-null
      - id: raw-shell-c-argument
      - id: raw-linux-x64-execve-binsh
  - id: raw-linux-x64-reverse-shell-syscalls
    desc: Raw Linux reverse shell syscalls
    crit: hostile
    conf: 0.94
    platforms: [linux]
    all:
      - id: raw-linux-x64-socket-tcp
      - id: raw-linux-x64-connect-syscall
      - id: raw-linux-x64-dup2-loop
      - id: raw-linux-x64-execve-binsh
    near_bytes: 256
  - id: raw-linux-x64-reverse-shell-sockaddr
    desc: Raw Linux inline reverse shell
    crit: hostile
    conf: 0.93
    platforms: [linux]
    all:
      - id: raw-linux-x64-inline-sockaddr
      - id: raw-linux-x64-connect-syscall
      - id: raw-linux-x64-execve-binsh
    near_bytes: 256
  - id: raw-linux-x64-reverse-shell-fd-rebind
    desc: Raw Linux shell FD rebind
    crit: hostile
    conf: 0.93
    platforms: [linux]
    all:
      - id: raw-linux-x64-socket-tcp
      - id: raw-linux-x64-dup2-loop
      - id: raw-linux-x64-execve-binsh
    near_bytes: 256
  - id: raw-linux-x64-parasite-write-jump
    desc: Raw Linux parasite write jump
    crit: hostile
    conf: 0.92
    platforms: [linux]
    all:
      - id: raw-x64-register-save-prologue
      - id: raw-linux-x64-stdout-write-stub
      - id: raw-x64-placeholder-jump-rbx
    near_bytes: 256
  - id: raw-linux-x64-virus-parasite-jump
    desc: Raw Linux virus parasite jump
    crit: hostile
    conf: 0.92
    platforms: [linux]
    all:
      - id: raw-self-labeled-virus
      - id: raw-linux-x64-stdout-write-stub
      - id: raw-x64-placeholder-jump-rbx
    near_bytes: 256
  - id: raw-x64-parasite-register-jumpback
    desc: Raw x64 parasite jumpback stub
    crit: hostile
    conf: 0.9
    all:
      - id: raw-x64-register-save-prologue
      - id: raw-x64-register-restore-jumpback
    near_bytes: 256
  - id: raw-windows-pe-loader-shellcode
    desc: Raw Windows PE loader shellcode
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    all:
      - id: raw-x64-stack-align-loader-stub
      - id: metadata/binary/layout::data-file-pe-dos-stub
    any:
      - id: raw-x64-alloc-call-stub
      - id: raw-shellcode-api-hash-immediates
      - id: metadata/binary/layout::data-file-pe-section-name
