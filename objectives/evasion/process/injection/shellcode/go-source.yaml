defaults:
  platforms: [unix]
  for: [go]
  attack: T1055
  mbc: B0033
traits:
  - id: go-unsafe-func-pointer-exec
    desc: Go unsafe function pointer execution
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\*\s*\(\s*\*func\s*\(\s*\)\s*\)\s*\(\s*unsafe\.Pointer'
    unless:
      - id: well-known/tool/development/go-toolchain::go-toolchain-distribution
composite_rules:
  - id: go-unix-local-shellcode-exec-source
    desc: Go source executes bytes from RX memory
    crit: hostile
    conf: 0.97
    near_lines: 20
    all:
      - id: micro-behaviors/mem/protect/modify::go-syscall-mprotect
      - id: micro-behaviors/mem/protect/modify::go-syscall-prot-exec
      - id: go-unsafe-func-pointer-exec
