defaults:
  attack: T1055
  mbc: B0004
  platforms:
    - unix
    - windows
traits:
  - id: shellcode-execution-status
    desc: Shellcode execution status logging
    crit: suspicious
    conf: 0.92
    for: [binaries, scripts]
    if:
      type: text
      substr: shellcode finished
composite_rules:
  - id: evasive-shellcode-loader
    desc: Evasive shellcode loading via indirect PEB and custom VirtualProtect resolution
    crit: hostile
    all:
      - id: objectives/evasion/process/peb::evasive-peb-access-x64
    any:
      - id: objectives/evasion/anti-av/api-hashing::virtualprotect-suffix-resolution
      - id: objectives/evasion/anti-av/api-hashing::wide-string-uppercase-mask
      - id: objectives/evasion/anti-av/api-hashing::api-hash-kernel32-192299a5
  - id: ntdll-remap-shellcode-runner
    desc: NTDLL remap plus shellcode execution workflow
    crit: hostile
    conf: 0.94
    all:
      - id: micro-behaviors/fs/memory/mmap::ntdll-image-remap-cluster
      - id: shellcode-execution-status
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
    any:
      - id: objectives/anti-analysis/timing/evasion::timing-anti-debug
      - id: objectives/anti-analysis/debugger-detect/check::debugger-api
