defaults:
  platforms: [windows]
  for: [pe]
  size_min: 65536
  size_max: 262144
  attack: T1055
  mbc: C0041

traits:
  - id: virtual-alloc-string
    desc: VirtualAlloc string import marker
    crit: component
    conf: 0.9
    if:
      type: text
      exact: VirtualAlloc
    unless:
      - id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
      - id: metadata/binary/symbols::total-commander-packer-plugin
      - id: metadata/binary/symbols::ollydbg-plugin-export
      - id: metadata/binary/layout::svk-packed-section

  - id: oversized-decoded-string
    desc: Small PE with oversized decoded string
    crit: component
    conf: 0.92
    if:
      type: metrics
      field: binary.max_string_length
      min: 50000

  - id: sparse-wide-string-loader-count
    desc: Sparse loader with many wide strings
    crit: baseline
    conf: 0.88
    if:
      type: metrics
      field: binary.wide_string_count
      min: 60

composite_rules:
  - id: vb6-virtual-alloc-loader-profile
    desc: VB6 VirtualAlloc loader profile
    crit: suspicious
    conf: 0.9
    all:
      - id: virtual-alloc-string
      - id: metadata/binary/framework::vb6-application-framework
