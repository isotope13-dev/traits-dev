defaults:
  platforms: [windows]
  for: [pe]
  size_min: 65536
  size_max: 262144
  attack: T1055
  mbc: C0041

traits:
  - id: oversized-decoded-string
    desc: Small PE with oversized decoded string
    crit: suspicious
    conf: 0.92
    if:
      type: metrics
      field: binary.max_string_length
      min: 50000

  - id: sparse-wide-string-loader
    desc: Sparse loader with many wide strings
    crit: suspicious
    conf: 0.88
    if:
      type: metrics
      field: binary.wide_string_count
      min: 60

composite_rules:
  - id: vb6-dispatch-memory-writer
    desc: VB6 dispatch loader writes process memory
    crit: hostile
    conf: 0.995
    all:
      - id: metadata/binary/framework::vb6-runtime-entry
      - id: micro-behaviors/dylib/lookup::vb6-dll-function-call
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: metadata/binary/metrics::few-sections
      - id: metadata/binary/metrics::no-functions
    any:
      - id: metadata/binary/framework::vb6-application-framework
      - id: oversized-decoded-string
      - id: sparse-wide-string-loader
    needs: 2
