defaults:
  platforms: [windows]
  for: [pe]
  size_min: 65536
  size_max: 262144
  attack: T1055
  mbc: C0041

traits:
  - id: oversized-decoded-string
    desc: Small PE with oversized decoded string
    crit: component
    conf: 0.92
    if:
      type: metrics
      field: binary.max_string_length
      min: 50000

  - id: wide-string-count-60
    desc: Wide string count over sixty
    crit: component
    conf: 0.88
    if:
      type: metrics
      field: binary.wide_string_count
      min: 60

composite_rules:
  - id: sparse-wide-string-loader-count
    desc: Sparse loader with many wide strings
    crit: component
    conf: 0.88
    all:
      - type: trait
        id: wide-string-count-60
      - type: trait
        id: metadata/binary/framework::vb6-application-framework
  - id: vb6-virtual-alloc-loader-profile
    desc: VB6 VirtualAlloc loader profile
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-string
      - id: metadata/binary/framework::vb6-application-framework
