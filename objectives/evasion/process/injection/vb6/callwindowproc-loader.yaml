defaults:
  platforms: [windows]
  for: [pe]
  size_min: 65536
  size_max: 524288
  attack: T1055
  mbc: C0041

composite_rules:
  - id: vb6-callwindowproc-rwx-loader
    desc: VB6 CallWindowProc RWX loader
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/binary/framework::vb6-application-framework
      - id: micro-behaviors/dylib/lookup::vb6-dll-function-call
      - id: micro-behaviors/ui/window/manage/control::call-window-proc
      - id: metadata/hardening/memory::three-plus-wx-sections
    any:
      - id: metadata/binary/resource::executable-rsrc-section
      - id: metadata/binary/section/metrics::random-rwx-cavity-section
      - id: objectives/anti-static/obfuscation/imports::vb6-pcode-concealed-runtime-profile
      - id: micro-behaviors/data/string::vb6-runtime-string-decoding
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
