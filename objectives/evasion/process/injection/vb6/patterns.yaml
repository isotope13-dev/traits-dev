# VB6-Based Process Injection Detection
# Visual Basic 6 compiled malware with process injection capabilities
# Combines VB6 runtime markers with process discovery and manipulation APIs
# ATT&CK: T1055 (Process Injection), T1055.004 (Process Hollowing)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1055"
  mbc: "C0041"
composite_rules:
- id: vb6-process-injection-pattern
  desc: VB6 process injection pattern
  crit: suspicious
  conf: 0.92
  all:
  - id: metadata/binary/framework::vb6-application-framework
  - id: micro-behaviors/process/create/spawn::open-process
  any:
  - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/process/terminate/kill::terminate-process
  unless:
  - id: metadata/signed/platform/
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: micro-behaviors/process/create/vb6::vb6-process-injection-pattern-cond-1--inline-17571
- id: vb6-process-injection-variant
  desc: VB6 process injection variant with enumeration
  crit: suspicious
  conf: 0.88
  all:
  - id: metadata/binary/framework::vb6-application-framework
  - id: micro-behaviors/process/create/spawn::open-process
  any:
  - id: micro-behaviors/process/enumerate/psapi::enum-processes
  - id: micro-behaviors/process/enumerate/snapshot::process32-first
  - id: micro-behaviors/process/enumerate/snapshot::process32-next
  unless:
  - id: metadata/signed/platform/

- id: vb6-dllfunctioncall-api-dispatcher
  desc: VB6 DllFunctionCall API dispatcher with suspicious context
  crit: suspicious
  conf: 0.88
  all:
  - id: micro-behaviors/dylib/lookup::vb6-dll-function-call
  any:
  - id: micro-behaviors/communications/socket/create
  - id: micro-behaviors/process/create/spawn::open-process
  - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
  unless:
  - id: metadata/signed/platform/

- id: vb6-c2-infrastructure-pattern
  desc: VB6 malware with C2 infrastructure
  crit: suspicious
  conf: 0.88
  all:
  - id: metadata/binary/framework::vb6-application-framework
  - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
  any:
  - id: micro-behaviors/communications/socket/create
  - id: micro-behaviors/communications/http/client/xmlhttp::http-client-any
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-open
  unless:
  - id: metadata/signed/platform/
