defaults:
  platforms:
    - unix
    - windows
  for: [binaries, scripts]
traits:
  - id: asm-manual-import-export-dir
    conf: 0.9
    crit: suspicious
    desc: Manual import parsing marker IMAGE_EXPORT_DIRECTORY
    for:
      - c
      - cpp
    if:
      type: text
      regex: \bIMAGE_EXPORT_DIRECTORY\b.{0,120}\bAddressOfNames\b
    unless:
      - type: text
        word: ExportTable
    downgrade:
      any:
        - type: string_literal
          word: IMAGE_FILE_MACHINE_I386
        - type: metrics
          field: binary.export_count
          min: 100
        - id: well-known/tools/reverse-engineering::ollydbg-executable-marker
  - id: asm-manual-import-addr-names
    conf: 0.9
    crit: suspicious
    desc: Manual import parsing marker AddressOfNames
    for:
      - c
      - cpp
    if:
      type: text
      regex: \bAddressOfNames\b.{0,120}\bAddressOfFunctions\b
    unless:
      - type: text
        word: ExportTable
    downgrade:
      any:
        - type: string_literal
          word: IMAGE_FILE_MACHINE_I386
        - type: metrics
          field: binary.export_count
          min: 100
        - id: metadata/binary/symbols::ollydbg-plugin-export
  - id: asm-manual-import-addr-ordinals
    conf: 0.9
    crit: suspicious
    desc: Manual import parsing marker AddressOfOrdinals
    if:
      type: text
      word: AddressOfOrdinals
    downgrade:
      any:
        - type: text
          word: IMAGE_FILE_MACHINE_I386
  - id: asm-export-table-rva-offset
    conf: 0.9
    crit: suspicious
    desc: Export table RVA parsed by offset
    if:
      type: raw
      regex: mov\s+esi,\s*\[eax\+78h\]
  - id: asm-export-base-adjust
    conf: 0.88
    crit: component
    desc: Export RVA adjusted to base
    if:
      type: raw
      regex: add\s+esi,\s*\[ebp\+MZAddy\]
  - id: asm-export-slot-atable
    conf: 0.85
    crit: component
    desc: AddressOfFunctions slot label
    if:
      type: text
      word: ATableVA
  - id: asm-export-slot-ntable
    conf: 0.85
    crit: component
    desc: AddressOfNames slot label
    if:
      type: text
      word: NTableVA
  - id: asm-export-slot-otable
    conf: 0.85
    crit: component
    desc: AddressOfOrdinals slot label
    if:
      type: text
      word: OTableVA
  - id: asm-export-name-scan
    conf: 0.9
    crit: suspicious
    desc: Manual export name comparison loop
    if:
      type: raw
      regex: rep\s+cmpsb
  - id: asm-export-ordinal-load
    conf: 0.85
    crit: component
    desc: Loads ordinal table entries
    if:
      type: text
      word: lodsw
composite_rules:
  - id: asm-export-table-slots
    conf: 0.9
    crit: suspicious
    desc: Stores export table addresses
    needs: 2
    any:
      - id: asm-export-slot-atable
      - id: asm-export-slot-ntable
      - id: asm-export-slot-otable
  - id: asm-export-ordinal-lookup
    conf: 0.88
    crit: suspicious
    desc: Manual export ordinal lookup
    all:
      - id: asm-export-slot-otable
      - id: asm-export-ordinal-load
  - id: asm-manual-import-parsing
    conf: 0.9
    crit: suspicious
    desc: Manually parses Export Table (often shellcode/malware)
    needs: 2
    any:
      - id: asm-manual-import-export-dir
      - id: asm-manual-import-addr-names
      - id: asm-manual-import-addr-ordinals
    downgrade:
      any:
        - id: micro-behaviors/fs/file/section::pe-viewer-machine-types
        - type: text
          word: ExportTable
        - type: metrics
          field: binary.export_count
          min: 100
        - id: metadata/binary/symbols::ollydbg-plugin-export
  - id: asm-manual-import-offset-parsing
    conf: 0.93
    crit: suspicious
    desc: Manual export parsing via PE offsets
    all:
      - id: asm-export-table-rva-offset
      - id: asm-export-base-adjust
    any:
      - id: asm-export-table-slots
      - id: asm-export-name-scan
      - id: asm-export-ordinal-lookup
