# Reflective PE Loading - Windows
# Detects in-memory PE loading techniques (MemoryLoadLibrary, manual mapping)
# ATT&CK: T1620 (Reflective Code Loading)
# MBC: B0032 (Obfuscated Files or Information)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1620"
traits:
  # memory-load-library: use canonical version from process/create/load/memory-module
  # (removed to avoid duplicate pattern)
  - id: pe-signature-check-asm
    desc: Inline MZ and PE validation
    crit: suspicious
    conf: 0.9
    size_max: 1048576
    if:
      type: hex
      section: ".text"
      pattern: "66 81 38 4D 5A [0-32] 81 3? 50 45 00 00"
    unless:
      - id: metadata/format::many-imports
  - id: mz-signature-check
    desc: MZ DOS signature validation string
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: 'MZ signature'
  - id: nt-headers-parse
    desc: NT headers parsing reference
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: 'NT (headers|offset)'
  - id: oep-reference
    desc: Original entry point resolution
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)(original\\s+entry\\s+point|\\bOEP\\s+RVA\\b|\\bOEP\\s+offset\\b)'
  - id: payload-thread-str
    desc: Payload thread execution reference
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: 'payload thread'
      case_insensitive: true
  - id: pe-arch-detect
    desc: PE architecture detection string
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: 'Detected x(86|64) payload'
  - id: native-loader-api-combo
    desc: Native PE loader API combination
    crit: suspicious
    conf: 0.88
    if:
      type: import_combination
      required:
        - "^VirtualAlloc$"
        - "^LoadLibraryA$"
        - "^GetProcAddress$"
      suspicious:
        - "^VirtualProtect$"
        - "^FreeLibrary$"
        - "^IsBadReadPtr$"
      min_suspicious: 2
      max_total: 50
    unless:
      - id: metadata/format::many-imports
