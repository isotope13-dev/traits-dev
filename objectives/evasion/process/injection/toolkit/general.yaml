defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
  size_max: 52428800
traits:
  - id: asm-delta-offset
    desc: "Assembly delta offset/IP retrieval"
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: call\s+\S+\s+(\S+:)?\s+pop\s+(e[abcd]x|e[sd]i|e[bc]p)
    unless:
      - type: raw
        regex: call\s+aligne\s+pop\s+ecx
  - id: asm-sub-reg-label
    desc: Assembly subtraction of label from register
    crit: component
    if:
      type: text
      regex: sub\s+(e[abcd]x|e[sd]i|e[bc]p),\s*[a-zA-Z0-9_$]+
  - id: module-stomp-v2-str
    desc: Module stomp v2 string indicator
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "=== MODULE STOMP v2 (SEC_IMAGE) ==="

  - id: sihost32-stager
    desc: /sihost32 suspended stager marker
    crit: component
    conf: 0.95
    for:
      - pe
    platforms:
      - windows
    if:
      type: string_literal
      exact: __cleave_missing_sihost32_arg__

  - id: module-stomping-target
    desc: 'DLL name associated with module stomping'
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(chakra|mshtml|edgehtml|mscoree)\\.dll'
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: obscure-system-dll-target
    desc: Obscure system DLL favored for module stomping
    crit: component
    conf: 0.92
    if:
      type: text
      regex: "(clbcatq|wow64log|ualapi|msdtcprx)\\.dll"
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/binary/resource::resource-only-dll
      - id: well-known/app/graphics::ncapture-binary

  - id: dotnet-function-pointer-delegate
    desc: .NET unmanaged function pointer delegate
    crit: component
    conf: 0.85
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: GetDelegateForFunctionPointer

  - id: split-virtual-api-fragment
    desc: Split Virtual API fragment
    crit: component
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: "Virtual "

  - id: split-alloc-api-fragment
    desc: Split Alloc API fragment
    crit: component
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: Alloc

  - id: split-write-api-fragment
    desc: Split Write API fragment
    crit: component
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: "Write "

  - id: split-memory-api-fragment
    desc: Split Memory API fragment
    crit: component
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: Memory

  - id: split-protect-api-fragment
    desc: Split Protect API fragment
    crit: component
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: Protect

  - id: split-open-process-fragment
    desc: Split OpenProcess API fragment
    crit: component
    conf: 0.75
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: "Open "

  - id: split-kernel-api-fragment
    desc: Split kernel32 API fragment
    crit: component
    conf: 0.75
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      exact: "kernel "

composite_rules:
  - id: legitimate-process-injector
    desc: Legitimate tool that routinely injects code
    crit: baseline
    conf: 0.9
    any:
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
      - id: well-known/tool/reverse-engineering/ida-debugger::ida-debugger-server
      - id: well-known/tool/reverse-engineering/windows-debugger::debug-event-loop
      - id: well-known/tool/reverse-engineering/scyllahide::scyllahide-plugin
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: well-known/tool/sysadmin/jvm::jdk-attach-library
      - id: well-known/tool/browser::chromium-helper
      - id: well-known/tool/sysadmin/virtualization::subsystem-controller
      - id: well-known/lib/easyhook::easyhook-library
      - id: well-known/game/mod::game-mod-embedded-dll
      - id: well-known/tool/dual-use/pvz-tools::pvz-tools-game-trainer

  - id: module-stomping-v2
    desc: Process injection via module stomping (v2)
    crit: hostile
    conf: 0.99
    all:
      - id: module-stomp-v2-str
      - id: module-stomping-target
    any:
      - id: micro-behaviors/os/telemetry/logging/payload-monitor::stomp-tag
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    unless:
      - id: metadata/signed/platform::microsoft

  - id: unsigned-module-stomping-target
    desc: Unsigned binary contains DLL name associated with module stomping
    crit: component
    conf: 0.9
    all:
      - id: objectives/evasion/process/injection/toolkit::module-stomping-target
      - id: metadata/signed/trust-level::unsigned
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/resource::resource-only-dll

  - id: hostile-module-stomping-payload
    desc: Suspiciously small unsigned payload references module-stomping DLL names
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/evasion/process/injection/toolkit::unsigned-module-stomping-target
      - id: metadata/binary/metrics/size::tiny-pe
      - id: objectives/evasion/process/injection/memory::process-inject-api

  - id: managed-injection-stub
    desc: Managed code injection stub (MVP boilerplate + no functions)
    crit: suspicious
    conf: 0.92
    unless:
      - id: metadata/binary/resource::managed-resource-stub
    all:
      - id: metadata/binary/framework::managed-boilerplate-attributes
      - id: metadata/binary/metrics/structural::no-functions
      - id: metadata/binary/metrics/size::tiny-dotnet

  - id: dotnet-split-winapi-injection-loader
    desc: .NET split WinAPI injection loader
    crit: suspicious
    conf: 0.92
    attack: T1055
    platforms:
      - windows
    for:
      - pe
      - dll
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-function-pointer-delegate
      - id: split-virtual-api-fragment
      - id: split-alloc-api-fragment
      - id: split-write-api-fragment
      - id: split-memory-api-fragment
      - id: split-protect-api-fragment
    any:
      - id: split-open-process-fragment
      - id: split-kernel-api-fragment
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
    unless:
      - id: metadata/signed/platform::microsoft-windows

  - id: dotnet-encrypted-resource-winapi-injection-loader
    desc: .NET encrypted resource WinAPI injection loader
    crit: hostile
    conf: 0.97
    attack: T1055
    mbc: E1055
    platforms:
      - windows
    for:
      - pe
      - dll
    all:
      - id: objectives/evasion/process/injection/toolkit::dotnet-split-winapi-injection-loader
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: metadata/binary/symbols/imports::single-import-raw
    any:
      - id: micro-behaviors/communications/http/client/managed::dotnet-http-client-with-aes
      - id: objectives/anti-static/obfuscation/reflection/invoke::delegate-execution-chain
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-resource-resolver-loader
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource::resource-only-dll

  - id: fibers-execution
    desc: Fibers-based execution (stealth thread alternative)
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/thread/lifecycle::create-fiber
      - id: micro-behaviors/process/thread/lifecycle::switch-to-fiber
    unless:
      - id: metadata/binary/vendor::windows-system-implementer-dll
      - id: micro-behaviors/os/event/library/tokio::tokio-crate-path
      - id: micro-behaviors/os/event/library/tokio::tokio-runtime-thread-name
      # OpenSSL's async job framework schedules work on Windows fibers.
      - id: well-known/lib/openssl::openssl-cryptogams
    downgrade:
      any:
        - id: well-known/lib/mozilla-nspr::nspr-library
        - id: micro-behaviors/os/event/library/tokio::tokio-crate-path
        - id: micro-behaviors/os/event/library/tokio::tokio-runtime-thread-name

  - id: remote-thread-pattern
    desc: Remote thread creation for injection
    crit: suspicious
    conf: 0.95
    attack: T1055.001
    for:
      - pe
    all:
      - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
    unless:
      - id: legitimate-injector-patterns
    downgrade:
      any:
        - id: well-known/tool/development/visual-studio::diagnostics-hub
        - id: well-known/tool/reverse-engineering/oep-finder::human-oep-finder
        - id: well-known/tool/reverse-engineering/oep-finder::get-oep-export

  - id: legitimate-injector-patterns
    desc: Patterns associated with legitimate injectors to reduce FPs
    crit: component
    conf: 1.0
    any:
      - id: metadata/binary/metrics/structural::many-exports
      - id: metadata/binary/metrics/structural::many-imports
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: well-known/tool/reverse-engineering/scylla::scylla-unpacker
      - id: well-known/game/mod::game-mod-embedded-dll

  - id: process-hollowing-context-hijack
    desc: Process hollowing via thread context manipulation
    crit: suspicious
    conf: 0.9
    attack: T1055.012
    for:
      - pe
    all:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: objectives/evasion/process/injection/hollowing::get-thread-context
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/mem/sync/cache
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
    unless:
      - id: metadata/binary/metrics/structural::many-exports
      - id: metadata/binary/metrics/structural::many-imports
      - id: well-known/game/steam/
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: well-known/game/steam/
        - id: well-known/tool/reverse-engineering/windows-debugger::debug-event-loop
        - id: well-known/tool/reverse-engineering/ida-debugger::ida-debugger-server

  - id: asm-delta-offset-classic
    conf: 0.95
    crit: suspicious
    desc: Classic assembly delta offset with subtraction
    all:
      - id: objectives/evasion/process/injection/toolkit::asm-delta-offset
      - id: objectives/evasion/process/injection/toolkit::asm-sub-reg-label

  - id: delayed-sihost-loader
    desc: Delayed /sihost32 launcher staging
    crit: suspicious
    conf: 0.93
    attack: T1055
    for:
      - pe
    platforms:
      - windows
    all:
      - id: sihost32-stager
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/time/timing/delay::sleep-dup
    unless:
      - id: metadata/signed/platform::microsoft-windows

  - id: direct-syscall-sihost-loader
    desc: Direct-syscall /sihost32 injection loader
    crit: hostile
    conf: 0.98
    attack: T1055
    for:
      - pe
    platforms:
      - windows
    all:
      - id: sihost32-stager
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: micro-behaviors/os/syscall/raw::syscall-ret-gadget
      - id: metadata/binary/section/metrics::high-entropy-rdata-section
      - id: metadata/binary/section/metrics::rdata-ratio-over-2pt5x
    unless:
      - id: metadata/signed/platform::microsoft-windows

  - id: cross-process-injector-runtime-dll-target
    desc: Cross-process injector references runtime DLL injection target
    crit: suspicious
    conf: 0.92
    attack: T1055
    all:
      - id: module-stomping-target
      - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
    any:
      - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
      - id: micro-behaviors/process/inject/runtime/call::queue-user-apc
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/signed/developer::valve-corp.
      - id: metadata/binary/symbols/plugin::debugger-plugin-export
      - id: legitimate-process-injector
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: well-known/tool/browser::chromium-browser-main

  - id: suspend-resume-memory-injection
    desc: Process injection via thread suspend/resume and memory manipulation
    crit: suspicious
    conf: 0.88
    attack: T1055
    for:
      - pe
    platforms:
      - windows
    all:
      - id: micro-behaviors/process/inject/runtime/call::suspend-thread
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/create/spawn::open-process
    unless:
      - id: metadata/binary/metrics/structural::many-exports
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-pe-symtab
