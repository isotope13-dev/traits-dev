defaults:
  platforms: [windows]
  for: [python]
  crit: suspicious
  conf: 0.95
  attack: T1055.001
  mbc: F0003

traits:
  - id: python-injectdll-helper
    desc: Python helper dedicated to remote DLL injection
    if:
      type: function
      exact: InjectDLL

composite_rules:
  - id: python-dll-injection-toolkit
    desc: Python remote-DLL injection helper with process-memory APIs
    crit: hostile
    conf: 0.98
    needs: 2
    all:
      - id: python-injectdll-helper
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex-python-source
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-source
      - id: micro-behaviors/process/inject/dll::create-remote-thread-python-source
