# Process Injection Toolkit Detection
# Detects binaries with comprehensive injection capabilities that don't match
# specific injection patterns (e.g., Pool Party ALPC, early bird, etc.)
# ATT&CK: T1055 (Process Injection)
defaults:
  attack: T1055
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  # Pool Party variant: ALPC worker factory injection
- id: pool-party-alpc
  desc: Pool Party ALPC worker factory injection
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/ipc/alpc::alpc-worker-injection
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  unless:
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/binary/metrics/structural::many-exports
  # Generic injection toolkit: WriteProcessMemory + VirtualAllocEx + anti-debug
  # + process enumeration/kill + self-deletion or raw syscalls
- id: evasive-process-injector
  desc: Evasive process injection toolkit
  crit: hostile
  conf: 0.93
  all:
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
  - id: objectives/impact/degrade/edr/enumerate::process-enumeration-terminate
  any:
  - id: objectives/anti-analysis/self-modify/runtime::active
  - id: objectives/anti-analysis/debugger-detect/check/
  - id: micro-behaviors/os/syscall/raw/
  unless:
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/binary/metrics/structural::many-exports
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: metadata/signed/platform::microsoft
- id: steam-registry-remote-injector
  desc: Steam registry hijack remote injector
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
  any:
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/process/info/commandline::get-command-line
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
  unless:
  - id: well-known/tool/reverse-engineering/scyllahide::reverse-engineering-tool
  - id: well-known/tool/browser::chromium-browser-main
  - id: well-known/tool/offensive/mimikatz::mimikatz
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: metadata/signed/platform::microsoft
  # RAT/stealer injection toolkit: OpenProcess + VirtualAllocEx + ReadProcessMemory
  # + window enumeration (EnumChildWindows) — typical of process memory scraping
- id: rat-process-scraping-toolkit
  desc: RAT process memory scraping toolkit
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/process/create/spawn::open-process
  - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
  - id: micro-behaviors/process/inject/runtime/call::read-process-memory
  any:
  - id: micro-behaviors/ui/window/manage/enumerate::enum-child-windows-import
  - id: objectives/collection/clipboard/capture::clipboard-context
  - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-c2-ip-port
  needs: 2
  unless:
  - id: metadata/binary/vendor::is-microsoft-named
  - id: metadata/signed/platform::microsoft
  - id: metadata/lang/compiled::autoit-compiled-script
  - id: well-known/tool/offensive/mimikatz::mimikatz
