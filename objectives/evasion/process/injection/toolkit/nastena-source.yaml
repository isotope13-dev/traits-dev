defaults:
  platforms: [windows]
  for: [source]
traits:
  - id: set-windows-hook-ex-source
    desc: SetWindowsHookEx reference in source
    crit: suspicious
    conf: 0.96
    downgrade:
      any:
        - type: text
          regex: GetCurrentThreadId\(\)
    if:
      type: text
      word: SetWindowsHookEx
    unless:
      - type: text
        regex: 'WINAPI\s+SetWindowsHookEx'
      - type: text
        regex: '#define\s+SetWindowsHookEx'
      - type: text
        regex: 'NTAPI\s+SetWindowsHookEx'
      - type: basename
        regex: '(?i)\.(h|hh|hpp|hxx)$'
      - id: metadata/lang/source::wine-compat-source
      - id: metadata/lang/source::windows-compat-api-source
  - id: enum-process-modules-source
    desc: EnumProcessModules reference in source
    crit: component
    conf: 0.9
    downgrade:
      any:
        - id: metadata/lang/source::wine-compat-source
        - type: basename
          regex: '(?i)(debugpy|pydevd|py_win_helpers\.hpp)'
        - type: basename
          regex: '(?i)^killall(\.c)?$'
            # Windows killall utility legitimately enumerates process modules
            # to identify processes by name for termination.
    if:
      type: text
      word: EnumProcessModules
    unless:
      - type: basename
        regex: '(?i)\.(h|hh|hpp|hxx)$'
  - id: toolhelp-module-walk-cluster-source
    desc: Toolhelp snapshot module walk cluster in source
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: CreateToolhelp32Snapshot.{0,64}Module32First
  - id: module-walk-followup-source
    desc: Module32First followed by Module32Next in source
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Module32First.{0,64}Module32Next
  - id: shell-tray-wnd-source
    desc: Explorer shell window targeting in source
    crit: suspicious
    conf: 0.92
    if:
      type: text
      word: Shell_TrayWnd
    unless:
      - id: metadata/lang/source::wine-compat-source
      - id: metadata/lang/source::windows-compat-api-source
composite_rules:
  - id: dual-path-module-walk-source
    desc: Supports both PSAPI and Toolhelp module walking in source
    crit: suspicious
    conf: 0.95
    all:
      - id: enum-process-modules-source
      - id: toolhelp-module-walk-cluster-source
      - id: module-walk-followup-source
  - id: hook-based-remote-injection-source
    desc: Hook-based remote process injection in source
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: set-windows-hook-ex-source
    any:
      - id: enum-process-modules-source
      - id: shell-tray-wnd-source
