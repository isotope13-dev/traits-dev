# Call Stack / Return Address Spoofing
# Detects techniques to manipulate return addresses on the stack
# to evade EDR call stack inspection and hide true callers
# Common in modern malware (Cobalt Strike, custom loaders)
defaults:
  attack: T1055
  for: ["c", "cpp", "pe", "dll"]
  platforms: ["windows"]
traits:
  - id: spoof-call-macro
    desc: Call stack spoof macro usage
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "SPOOF_CALL"
  - id: spoof-func-macro
    desc: Stack spoof function macro
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "SPOOF_FUNC"
  - id: return-address-zero
    desc: Return address zeroing pattern
    crit: suspicious
    conf: 0.85
    count_min: 2
    if:
      type: raw
      substr: "_ReturnAddress"
    unless:
      - id: objectives/anti-static/obfuscation/binary-metrics::ape-binary-marker
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - type: metrics
          field: binary.function_count
          min: 1000
  - id: stack-spoof-include
    desc: Stack spoofing header include
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "Spoof.h"
composite_rules:
  - id: callstack-spoofing
    desc: Call stack spoofing framework
    crit: suspicious
    conf: 0.9
    any:
      - id: spoof-call-macro
      - id: spoof-func-macro
      - id: return-address-zero
      - id: stack-spoof-include
    needs: 2
