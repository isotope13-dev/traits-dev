# Call Stack / Return Address Spoofing
# Detects techniques to manipulate return addresses on the stack
# to evade EDR call stack inspection and hide true callers
# Common in modern malware (Cobalt Strike, custom loaders)
defaults:
  attack: T1055
  for: ["c", "cpp", "pe", "dll"]
  platforms: ["windows"]
traits:
  - id: spoof-call-macro
    desc: Call stack spoof macro usage
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: "SPOOF_CALL"
  - id: spoof-func-macro
    desc: Stack spoof function macro
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: "SPOOF_FUNC"
  - id: return-address-zero
    desc: Return address clearing write
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: '\*\(uintptr_t\*\).{1,40}=\s*0'
  - id: stack-spoof-include
    desc: Stack spoofing header include
    crit: component
    conf: 0.8
    if:
      type: raw
      substr: "Spoof.h"
  - id: spoof-call-lower
    desc: spoof_call dispatcher invocation
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: 'spoof_call\s*\('
  - id: spoof-arg-lower
    desc: spoof_arg argument-laundering call
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: 'spoof_arg\s*\('
  - id: spoof-h-lower-include
    desc: spoof.h header include
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: '#\s*include\s+"spoof\.h"'
  - id: function-call-struct-decl
    desc: FUNCTION_CALL spoof descriptor struct
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: 'FUNCTION_CALL\s+call\s*=\s*\{\s*0\s*\}'
  - id: bof-dfr-kernel32-import
    desc: BOF DFR KERNEL32$ import naming
    crit: component
    conf: 0.95
    if:
      type: raw
      regex: 'DECLSPEC_IMPORT.{0,200}KERNEL32\$\w'
  - id: bof-dfr-ntdll-import
    desc: BOF DFR NTDLL$ import naming
    crit: component
    conf: 0.95
    if:
      type: raw
      regex: 'DECLSPEC_IMPORT.{0,200}NTDLL\$\w'
  - id: bof-dfr-wininet-import
    desc: BOF DFR WININET$ import naming
    crit: component
    conf: 0.95
    if:
      type: raw
      regex: 'DECLSPEC_IMPORT.{0,200}WININET\$\w'
  - id: nt-continue-rtl-capture
    desc: NtContinue with RtlCaptureContext spoof
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'NtContinue[\s\S]{0,400}RtlCaptureContext|RtlCaptureContext[\s\S]{0,400}NtContinue'
composite_rules:
  - id: return-address-zeroing
    desc: Clearing return address on stack
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/anti-static/obfuscation/control-flow/stack::addressofreturnaddress
      - id: return-address-zero
  - id: callstack-spoofing
    desc: Call stack spoofing framework
    crit: suspicious
    conf: 0.9
    any:
      - id: spoof-call-macro
      - id: spoof-func-macro
      - id: return-address-zeroing
      - id: stack-spoof-include
      - id: spoof-call-lower
      - id: spoof-arg-lower
      - id: spoof-h-lower-include
    needs: 2

  - id: bof-dfr-import-naming
    desc: Cobalt-Strike BOF dynamic function resolution
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: bof-dfr-kernel32-import
      - id: bof-dfr-ntdll-import
      - id: bof-dfr-wininet-import

  - id: bof-dfr-callstack-spoof-loader
    desc: BOF DFR loader with call-stack spoofing
    crit: hostile
    conf: 0.97
    all:
      - id: callstack-spoofing
      - id: bof-dfr-import-naming
      - id: function-call-struct-decl
