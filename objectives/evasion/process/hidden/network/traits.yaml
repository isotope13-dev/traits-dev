defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: hide-port-msg
    desc: '"Hiding network port" message'
    crit: notable
    conf: 0.8
    attack: T1564
    if:
      type: text
      regex: Hiding (TCP|UDP)v[46] port
  - id: unhide-port-msg
    desc: '"Unhiding network port" message'
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: Unhiding (TCP|UDP)v[46] port
