defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: hide-pid-msg
    desc: '"Hiding PID" message'
    crit: suspicious
    conf: 0.8
    attack: T1564
    if:
      type: text
      substr: Hiding PID
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: unhide-pid-msg
    desc: '"Unhiding PID" message'
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: Unhiding PID
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
