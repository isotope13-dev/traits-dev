defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: hide-pid-msg
    desc: '"Hiding PID" message'
    crit: notable
    conf: 0.8
    attack: T1564
    if:
      type: text
      substr: Hiding PID
  - id: unhide-pid-msg
    desc: '"Unhiding PID" message'
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Unhiding PID
