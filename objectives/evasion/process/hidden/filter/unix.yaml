# Process List Filtering Wrappers
# Detects wrappers that hide processes by filtering command output
# ATT&CK: T1564 (Hide Artifacts)
defaults:
  for: [shell]
  platforms: [linux, unix, macos, android, ios]
  attack: "T1564"
  mbc: "F0005"
traits:
  - id: hidden-ps-backup-path
    desc: Hidden /bin/.ps backup path
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      exact: "originalps=/bin/.ps"
  - id: filterword-variable
    desc: Configurable process filter word
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: 'filterword="[^"]{1,32}"'
  - id: ps-grep-filter-pipeline
    desc: Filters ps output with grep -v
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      exact: "$originalps $1 $2 $3 $4| $grep -v $filterword > $tempfile"
  - id: fixed-ps-arg-passthrough
    desc: Fixed four-argument ps passthrough
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: "$1 $2 $3 $4"
  - id: hidden-temp-touch
    desc: Touches hidden ps temp file
    crit: notable
    conf: 0.75
    if:
      type: raw
      exact: "touch $tempfile"
  - id: original-ps-exec-check
    desc: Checks hidden ps backup executable
    crit: baseline
    conf: 0.75
    if:
      type: raw
      exact: "if [ ! -x $originalps ]; then"
  - id: hidden-temp-write-check
    desc: Checks hidden temp path writable
    crit: baseline
    conf: 0.75
    if:
      type: raw
      exact: "if [ ! -w $tempfile ]; then"
  - id: temp-linecount
    desc: Counts filtered temp file lines
    crit: notable
    conf: 0.9
    if:
      type: raw
      exact: "numlines=`cat $tempfile|wc -l`"
  - id: linecount-minus-two
    desc: Subtracts two from line count
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      exact: "numlines=`expr $numlines - 2`"
  - id: head-truncate-output
    desc: Truncates filtered ps output
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      exact: "head -n $numlines $tempfile"
  - id: hidden-temp-delete
    desc: Deletes hidden ps temp file
    crit: notable
    conf: 0.85
    attack: "T1070.004"
    mbc: "C0047"
    if:
      type: raw
      exact: "rm -rf $tempfile"
composite_rules:
  - id: ps-output-truncation
    desc: Truncates filtered ps output lines
    crit: suspicious
    conf: 0.93
    all:
      - id: temp-linecount
      - id: linecount-minus-two
      - id: head-truncate-output
