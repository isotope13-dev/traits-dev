# Hidden WinForms execution from C# source
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1564"
composite_rules:
  - id: hidden-winforms-window
    desc: Hidden WinForms user interface
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/ui/window/manage/visibility::zero-opacity-window
      - id: micro-behaviors/ui/window/manage/visibility::no-taskbar-window
      - id: micro-behaviors/ui/window/manage/visibility::no-window-icon
