# Hidden Process Execution - PowerShell
# ATT&CK: T1564.003 (Hide Artifacts: Hidden Window)
defaults:
  platforms: [unix, windows]
  for: [powershell, batch, shell]
  attack: "T1564.003"
traits:
- id: ps-hidden-window
  desc: Hidden window execution
  crit: suspicious
  conf: 0.85
  size_min: 1
  if:
    type: text
    regex: "-[Ww](indow)?[Ss](tyle)?\\s+[Hh]idden"
    case_insensitive: true
- id: ps-hidden-window-short
  desc: Hidden window short flag
  crit: suspicious
  conf: 0.9
  size_min: 1
  if:
    type: text
    regex: "(^|\\s)-w\\s+h(idden)?\\b"
    case_insensitive: true
- id: ps-user32-showwindowasync-dllimport--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: DllImport\("user32\.dll"\)[^\n]{0,80}ShowWindowAsync
    case_insensitive: true
- id: ps-user32-showwindowasync-dllimport--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: ShowWindowAsync[^\n]{0,120}user32\.dll
    case_insensitive: true
- id: ps-user32-showwindow-dllimport
  desc: Dynamic user32!ShowWindow DllImport
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: DllImport.{0,160}Show.{0,40}Windo.{0,20}w
    case_insensitive: true
- id: ps-console-hide-mainwindow--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: ShowWindowAsync\s*\([^\n\)]{0,80}MainWindowHandle
    case_insensitive: true
- id: ps-console-hide-mainwindow--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: MainWindowHandle[^\n]{0,120}ShowWindowAsync
    case_insensitive: true
- id: ps-showwindow-hide-mainwindow
  desc: ShowWindow hides MainWindowHandle
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: ShowWindow\s*\([^)]{0,120}MainWindowHandle[^)]{0,40},\s*0\s*\)
    case_insensitive: true
composite_rules:
- id: ps-user32-showwindowasync-dllimport
  desc: Dynamic user32!ShowWindowAsync DllImport
  crit: suspicious
  conf: 0.9
  any:
  - id: ps-user32-showwindowasync-dllimport--rx-1
  - id: ps-user32-showwindowasync-dllimport--rx-2
  needs: 1
- id: ps-console-hide-mainwindow
  desc: ShowWindowAsync on current-process MainWindowHandle
  crit: suspicious
  conf: 0.88
  any:
  - id: ps-console-hide-mainwindow--rx-3
  - id: ps-console-hide-mainwindow--rx-4
  needs: 1
