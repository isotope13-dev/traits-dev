# Hidden Process Execution - PowerShell
# ATT&CK: T1564.003 (Hide Artifacts: Hidden Window)
defaults:
  platforms: [unix, windows]
  for: [powershell, batch, shell]
  attack: "T1564.003"
traits:
  - id: ps-hidden-window
    desc: Hidden window execution
    crit: notable
    conf: 0.85
    size_min: 1
    if:
      type: text
      regex: "-[Ww](indow)?[Ss](tyle)?\\s+[Hh]idden"
      case_insensitive: true
  - id: ps-hidden-window-short
    desc: Hidden window short flag
    crit: notable
    conf: 0.9
    size_min: 1
    if:
      type: text
      regex: "(^|\\s)-w\\s+h(idden)?\\b"
      case_insensitive: true
  - id: ps-user32-showwindowasync-dllimport
    desc: Dynamic user32!ShowWindowAsync DllImport
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: DllImport\("user32\.dll"\)[^\n]{0,80}ShowWindowAsync|ShowWindowAsync[^\n]{0,120}user32\.dll
      case_insensitive: true
  - id: ps-console-hide-mainwindow
    desc: ShowWindowAsync on current-process MainWindowHandle
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: ShowWindowAsync\s*\([^\n\)]{0,80}MainWindowHandle|MainWindowHandle[^\n]{0,120}ShowWindowAsync
      case_insensitive: true
