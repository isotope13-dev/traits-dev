# Hidden Process Execution - PowerShell
# ATT&CK: T1564.003 (Hide Artifacts: Hidden Window)
defaults:
  platforms: [unix, windows]
  for: [powershell, batch, shell]
  attack: "T1564.003"
traits:
- id: ps-user32-showwindowasync-dllimport--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: DllImport\("user32\.dll"\)[^\n]{0,80}ShowWindowAsync
    case_insensitive: true
  count_max: 1019600
- id: ps-user32-showwindowasync-dllimport--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: ShowWindowAsync[^\n]{0,120}user32\.dll
    case_insensitive: true
  count_max: 1019601
- id: ps-user32-showwindow-dllimport
  desc: Dynamic user32!ShowWindow DllImport
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: DllImport.{0,160}Show.{0,40}Windo.{0,20}w
    case_insensitive: true
- id: ps-console-hide-mainwindow--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: ShowWindowAsync\s*\([^\n\)]{0,80}MainWindowHandle
    case_insensitive: true
  count_max: 1019603
- id: ps-console-hide-mainwindow--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: MainWindowHandle[^\n]{0,120}ShowWindowAsync
    case_insensitive: true
  count_max: 1019604
- id: ps-showwindow-hide-mainwindow
  desc: ShowWindow hides MainWindowHandle
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: ShowWindow\s*\([^)]{0,120}MainWindowHandle[^)]{0,40},\s*0\s*\)
    case_insensitive: true
composite_rules:
- id: insecure-curl-hidden-executable-stage
  desc: Insecure curl stages an executable for hidden launch
  crit: hostile
  conf: 0.99
  attack: T1105,T1564.003
  near_lines: 4
  all:
  - id: micro-behaviors/communications/http/download/curl::curl-insecure
  - id: micro-behaviors/communications/http/download/curl::curl-output-file
  - id: micro-behaviors/process/create/start-process::start-process-call
  - id: micro-behaviors/process/create/hidden::start-process-windowstyle-hidden
  any:
  - id: micro-behaviors/fs/path/location::programdata-executable-path
  - id: micro-behaviors/fs/path/location::programdata-env-executable-path
  - id: micro-behaviors/fs/path/location::programdata-powershell-executable-path
- id: ps-user32-showwindowasync-dllimport
  desc: Dynamic user32!ShowWindowAsync DllImport
  crit: suspicious
  conf: 0.9
  any:
  - id: ps-user32-showwindowasync-dllimport--rx-1
  - id: ps-user32-showwindowasync-dllimport--rx-2
- id: ps-console-hide-mainwindow
  desc: ShowWindowAsync on current-process MainWindowHandle
  crit: suspicious
  conf: 0.88
  any:
  - id: ps-console-hide-mainwindow--rx-3
  - id: ps-console-hide-mainwindow--rx-4
