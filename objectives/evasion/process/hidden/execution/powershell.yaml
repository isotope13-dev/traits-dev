# Hidden Process Execution - PowerShell
# ATT&CK: T1564.003 (Hide Artifacts: Hidden Window)
defaults:
  platforms: [unix, windows]
  for: [powershell, batch, shell]
  attack: "T1564.003"
traits:
- id: ps-hidden-window
  desc: Hidden window execution
  crit: suspicious
  conf: 0.85
  size_min: 1
  if:
    type: text
    regex: "(?mi)^\\s*[^#\\r\\n].{0,240}-[Ww](indow)?[Ss](tyle)?\\s+[Hh]idden\\b"
    case_insensitive: true
  not:
  - regex: '(?i)#\s*Start-Process\b[^\r\n]{0,240}-WindowStyle\s+Hidden'
  - regex: '(?i)\bDo\s+NOT\s+use\s+-WindowStyle\s+Hidden\b'
  unless:
  - type: basename
    regex: '^xray_no_window\.ps1$'
  - type: text
    substr: '@kagdaci/repo-switcher'
  - id: well-known/app/calvyn-code
  - type: text
    substr: TITLE OPEN RYZEN MASTER MAXIMIZED
  - type: text
    substr: TITLE OPEN WINDOWS WSL HERE
  - id: well-known/tool/sysadmin/kubernetes/bootstrap::kubernetes-windows-gce-ssh-installer-context
  - type: text
    substr: PowerShell App Deployment Toolkit
  - type: text
    substr: AppDeployToolkitMain.ps1
  - type: text
    regex: '(?i)Docker Desktop|Get-Process\s+-Name\s+"Docker Desktop"'
- id: ps-hidden-window-short
  desc: Hidden window short flag
  crit: suspicious
  conf: 0.9
  size_min: 1
  if:
    type: text
    regex: "(?mi)^\\s*[^#\\r\\n].{0,240}(^|\\s)-w\\s+h(idden)?\\b"
    case_insensitive: true
  not:
  - regex: '(?i)#\s*Start-Process\b[^\r\n]{0,240}-w\s+h(idden)?\b'
  unless:
  - type: text
    substr: TITLE OPEN WINDOWS WSL HERE
  - id: well-known/tool/sysadmin/kubernetes/bootstrap::kubernetes-windows-gce-ssh-installer-context
- id: ps-user32-showwindowasync-dllimport--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: DllImport\("user32\.dll"\)[^\n]{0,80}ShowWindowAsync
    case_insensitive: true
  count_max: 1019600
- id: ps-user32-showwindowasync-dllimport--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: ShowWindowAsync[^\n]{0,120}user32\.dll
    case_insensitive: true
  count_max: 1019601
- id: ps-user32-showwindow-dllimport
  desc: Dynamic user32!ShowWindow DllImport
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: DllImport.{0,160}Show.{0,40}Windo.{0,20}w
    case_insensitive: true
- id: ps-console-hide-mainwindow--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: ShowWindowAsync\s*\([^\n\)]{0,80}MainWindowHandle
    case_insensitive: true
  count_max: 1019603
- id: ps-console-hide-mainwindow--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: MainWindowHandle[^\n]{0,120}ShowWindowAsync
    case_insensitive: true
  count_max: 1019604
- id: ps-showwindow-hide-mainwindow
  desc: ShowWindow hides MainWindowHandle
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: ShowWindow\s*\([^)]{0,120}MainWindowHandle[^)]{0,40},\s*0\s*\)
    case_insensitive: true
composite_rules:
- id: ps-user32-showwindowasync-dllimport
  desc: Dynamic user32!ShowWindowAsync DllImport
  crit: suspicious
  conf: 0.9
  any:
  - id: ps-user32-showwindowasync-dllimport--rx-1
  - id: ps-user32-showwindowasync-dllimport--rx-2
- id: ps-console-hide-mainwindow
  desc: ShowWindowAsync on current-process MainWindowHandle
  crit: suspicious
  conf: 0.88
  any:
  - id: ps-console-hide-mainwindow--rx-3
  - id: ps-console-hide-mainwindow--rx-4
