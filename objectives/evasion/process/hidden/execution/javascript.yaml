# Hidden Process Execution - JavaScript
# GuardDog-inspired: Detects use of options to hide process execution
# ATT&CK: T1564 (Hide Artifacts)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  - id: hidden-hta-encoded-loader
    desc: Hidden HTA decodes and evaluates a script
    crit: hostile
    conf: 0.99
    attack: "T1027,T1059.007,T1140,T1564.003"
    for: [javascript, html, vbs]
    all:
      - id: objectives/anti-static/obfuscation/payload/jscript::js-hta-application-element
      - id: objectives/command-and-control/dropper/execution/download-exec::hidden-hta-window
      - id: objectives/command-and-control/dropper/execution/download-exec::hta-hex-xor-string-decoder
      - id: micro-behaviors/data/encode/base64::large-string-assignment
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-text

  # GuardDog: Silent process execution
  - id: detached-hidden-process-execution
    desc: Detached Node.js child process with its Windows console hidden
    crit: suspicious
    conf: 0.85
    attack: "T1564"
    all:
      - id: micro-behaviors/process/create/flags::detached-process
      - id: micro-behaviors/process/create/spawn::windowshide-option
    downgrade:
      # Legitimate use in background tasks
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
    unless:
      - id: well-known/app/qwen-code::qwen-code-bundle-text
