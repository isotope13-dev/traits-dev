defaults:
  platforms: [windows]
  for: [batch]
  attack: "T1564.003"
traits:
- id: nircmd-elevatecmd-exec-hide
  desc: NirCmd hidden elevated command execution
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: (?i)\bnircmd(\.exe)?\s+elevatecmd\s+exec\s+hide\b
- id: repeated-nircmd-hidden-elevation
  desc: Repeated NirCmd hidden elevated execution
  crit: suspicious
  conf: 0.98
  count_min: 3
  if:
    type: text
    regex: (?i)\bnircmd(\.exe)?\s+elevatecmd\s+exec\s+hide\b
- id: powershell-downloads-nircmd
  desc: PowerShell downloads NirCmd helper
  crit: suspicious
  conf: 0.94
  attack: T1105
  if:
    type: text
    regex: (?i)powershell[^\r\n]{0,160}Invoke-WebRequest[^\r\n]{0,220}-OutFile\s+nircmd\.exe\b
composite_rules:
- id: batch-hidden-self-relaunch
  desc: Batch hidden self relaunch
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/process/create/hidden::start-minimized-self
  any:
  - id: micro-behaviors/time/sleep/interval::batch-silent-timeout-delay
  - id: micro-behaviors/os/console/io::windows-stdout-to-nul
  - id: micro-behaviors/os/console/io::stderr-redirect
- id: batch-powershell-hidden-self-relaunch
  desc: Batch PowerShell hidden self relaunch
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/process/create/start-process::batch-start-process-self-arg
  - id: micro-behaviors/process/create/hidden::powershell-windowstyle-hidden
- id: batch-downloaded-nircmd-hidden-elevation
  desc: Batch downloaded NirCmd hidden elevation
  crit: hostile
  conf: 0.98
  all:
  - id: powershell-downloads-nircmd
  - id: repeated-nircmd-hidden-elevation
  any:
  - id: objectives/command-and-control/dropper/scriptblock::batch-powershell-call
  - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
