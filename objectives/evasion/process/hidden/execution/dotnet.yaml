defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: use-shell-execute
    desc: Process shell execute configuration
    crit: component
    conf: 0.78
    if:
      type: text
      exact: set_UseShellExecute
composite_rules:
  - id: dotnet-hidden-process-launch
    desc: .NET hidden process launch setup
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/process/create/hidden::dotnet-create-no-window
      - id: micro-behaviors/process/create/spawn::process-token-dotnet
    any:
      - id: use-shell-execute
      - id: micro-behaviors/process/create/spawn::diagnostics-namespace-dotnet
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-tokenized
    unless:
      - id: metadata/package/quality/false-positives::hydradragon-launcher-marker
    downgrade:
      any:
        - id: metadata/signed/leaf::microsoft-corporation
        - id: metadata/signed/leaf::apowersoft-ltd
        - id: metadata/package/quality/false-positives::default-os-browser-web-ui
        - id: metadata/package/quality/false-positives::open-browser-async
        - id: micro-behaviors/ui/help/
        - id: metadata/package/quality/profile/
