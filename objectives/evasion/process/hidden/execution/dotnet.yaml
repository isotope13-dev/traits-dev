defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: dotnet-hidden-process-launch
    desc: .NET hidden process launch setup
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/process/create/hidden::dotnet-create-no-window
      - id: micro-behaviors/process/create/spawn::process-token-dotnet
    any:
      - id: micro-behaviors/process/create/spawn::use-shell-execute-property
      - id: micro-behaviors/process/create/spawn::diagnostics-namespace-dotnet
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-tokenized
    unless:
      - id: metadata/package/quality/false-positives::hydradragon-launcher-marker
    downgrade:
      any:
        - id: metadata/signed/leaf::microsoft-corporation
        - id: metadata/signed/leaf::apowersoft-ltd
        - id: metadata/package/quality/false-positives::default-os-browser-web-ui
        - id: metadata/package/quality/false-positives::open-browser-async
        - id: micro-behaviors/ui/help/
        - id: metadata/package/quality/profile/

  - id: dotnet-obfuscated-process-interference
    desc: Obfuscated .NET process inspection and hidden execution
    crit: hostile
    conf: 0.98
    attack: T1057,T1562.001,T1059,T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/process/enumerate/managed::get-processes-by-name
      - id: micro-behaviors/process/terminate/kill::dotnet-terminate-process-reference
      - id: micro-behaviors/process/create/hidden::dotnet-create-no-window
      - id: micro-behaviors/process/create/spawn::dotnet-redirected-stdio
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-decryptor
