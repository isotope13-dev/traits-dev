defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: create-no-window
    desc: Hidden process window suppression
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "CreateNoWindow"
    not:
      - substr: "CreateNoWindow = false,"
  - id: use-shell-execute
    desc: Process shell execute configuration
    crit: component
    conf: 0.78
    if:
      type: text
      exact: set_UseShellExecute
composite_rules:
  - id: dotnet-hidden-process-launch
    desc: .NET hidden process launch setup
    crit: suspicious
    conf: 0.92
    all:
      - id: create-no-window
      - id: micro-behaviors/process/create/spawn::process-token-dotnet
    any:
      - id: use-shell-execute
      - id: micro-behaviors/process/create/spawn::diagnostics-namespace-dotnet
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-tokenized
    downgrade:
      any:
        - type: text
          substr: DefaultOsBrowserWebUi
        - type: text
          substr: OpenBrowserAsync
        - type: text
          substr: CoreWebView2
        - type: text
          substr: \Microsoft\Edge\User Data\Default
        - id: metadata/package::has-help
        - id: metadata/package::versioned
