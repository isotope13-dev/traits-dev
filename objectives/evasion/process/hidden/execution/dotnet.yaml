defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: use-shell-execute
    desc: Process shell execute configuration
    crit: component
    conf: 0.78
    if:
      type: text
      exact: set_UseShellExecute
  - id: hydradragon-launcher-marker
    desc: HydraDragon launcher product marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: HydraDragonAntivirusLauncher
  - id: default-os-browser-web-ui
    desc: Default OS browser Web UI marker
    crit: component
    conf: 0.85
    if:
      type: text
      substr: DefaultOsBrowserWebUi
  - id: open-browser-async
    desc: Browser async opener marker
    crit: component
    conf: 0.85
    if:
      type: text
      substr: OpenBrowserAsync
composite_rules:
  - id: dotnet-hidden-process-launch
    desc: .NET hidden process launch setup
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/process/create/hidden::dotnet-create-no-window
      - id: micro-behaviors/process/create/spawn::process-token-dotnet
    any:
      - id: use-shell-execute
      - id: micro-behaviors/process/create/spawn::diagnostics-namespace-dotnet
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-tokenized
    unless:
      - id: hydradragon-launcher-marker
    downgrade:
      any:
        - id: default-os-browser-web-ui
        - id: open-browser-async
        - id: metadata/package::has-help
        - id: metadata/package::versioned
