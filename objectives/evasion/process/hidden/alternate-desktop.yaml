# Alternate Desktop Window Control
# Creating and controlling alternate desktops to hide process execution
# ATT&CK: E1564 (Hide Artifacts)
defaults:
  for: [pe, dll]
  platforms: [windows]
composite_rules:
  - id: alternate-desktop-window-control
    desc: Alternate desktop window control
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/ui/window/manage::create-desktop-import
      - id: micro-behaviors/ui/window/manage::desktop-window-enumeration
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/format::many-exports
        - id: metadata/quality/versioning::pe-version-resource
