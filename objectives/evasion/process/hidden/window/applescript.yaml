defaults:
  platforms: [macos]
  for: [applescript]
traits:
  - id: padding-hidden-code
    desc: Hidden code via excess blank lines
    crit: suspicious
    conf: 0.9
    count_min: 500
    if:
      type: text
      regex: '^\s*$'
  - id: curl-osascript-pipe
    desc: Memory-only AppleScript download and execution
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'curl.{0,100}\|\s*osascript'
  - id: mac-cur-user-agent
    desc: Unique campaign User-Agent (mac-cur)
    crit: suspicious
    conf: 1.0
    if:
      type: text
      regex: 'mac-cur[1-5]'
  - id: password-dialog
    desc: AppleScript password prompt dialog
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'display dialog.{0,50}with title.{0,50}password'
  - id: tcc-db-path
    desc: TCC.db privacy permission store path
    crit: suspicious
    if:
      type: text
      substr: '/Library/Application Support/com.apple.TCC/TCC.db'
  - id: sqlite-insert
    desc: SQLite INSERT to add a row
    crit: suspicious
    if:
      type: text
      substr: 'INSERT INTO'
  - id: sqlite3-cmd
    desc: sqlite3 CLI to edit local databases
    crit: suspicious
    if:
      type: text
      substr: 'sqlite3'
composite_rules:
  - id: tcc-db-manipulation
    desc: TCC database modification via sqlite3
    crit: hostile
    attack: T1548.003
    all:
      - id: sqlite3-cmd
      - id: tcc-db-path
      - id: sqlite-insert
