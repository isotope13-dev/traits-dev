# Hiding windows belonging to another process is an evasion behavior.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1564.003

composite_rules:
  - id: dotnet-hides-launched-process-windows
    desc: .NET hides windows belonging to launched process
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/ui/window/manage/visibility::hide-all-windows-for-process-token
      - id: micro-behaviors/ui/window/manage/visibility::sw-hide-token
      - id: micro-behaviors/ui/window/manage/visibility::enum-windows-token
      - id: micro-behaviors/ui/window/manage/visibility::window-process-id-token
      - id: micro-behaviors/process/create/launch::create-process-api-name

  - id: unsigned-rar-hidden-stage
    desc: Unsigned RAR-staged process with hidden windows
    crit: hostile
    conf: 0.99
    attack: T1027.009,T1564.003
    all:
      - id: dotnet-hides-launched-process-windows
      - id: micro-behaviors/data/embedded/payload/archive::rar-magic
      - id: metadata/build/manifest::pe-requires-admin
      - id: metadata/signed/trust-level::unsigned
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/script/
