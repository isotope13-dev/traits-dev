# Hidden process creation - Windows C/C++ source
defaults:
  for: [c, cpp, csharp]
  platforms: [windows]
  attack: T1564
traits:
  - id: register-service-process
    desc: RegisterServiceProcess task hiding
    crit: suspicious
    conf: 0.98
    if:
      type: text
      word: "RegisterServiceProcess"
    unless:
      - id: well-known/lib/wine::wine-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
      - id: well-known/app/apache-httpd::source-tree
composite_rules:
  - id: hidden-process-create
    desc: Create process with hidden window
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/process/create/flags::sw-hide-token
      - id: micro-behaviors/process/create/spawn::create-process-source
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: dynamic-task-manager-hide
    desc: Dynamic task manager hiding
    crit: suspicious
    conf: 0.97
    all:
      - id: register-service-process
      - id: micro-behaviors/dylib/load/source::load-library-source
      - id: micro-behaviors/dylib/lookup::get-proc-address-source
