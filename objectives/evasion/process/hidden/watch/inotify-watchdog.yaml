defaults:
  platforms: [linux]
  for: [binaries]
  attack: T1547
  mbc: F0011
traits:
  - id: inotify-respawn-message
    desc: Diagnostic message about respawning watch
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '\b(re-?install|respawn|restored)\b[^\n]{0,40}\b(watch|inotify)\b'
  - id: inotify-target-system-path
    desc: Inotify watch on /etc/ld.so.preload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'inotify_add_watch[^\n]{0,80}/etc/ld\.so\.preload'
composite_rules:
  - id: tamper-resistant-watchdog
    desc: inotify watch on system-modification path
    crit: hostile
    conf: 0.95
    # The all+any structure requires inotify_add_watch AND a sibling
    # signal (an explicit ld.so.preload watch path or a respawn
    # diagnostic). Pairing inotify with /etc/ld.so.preload alone is
    # not proof of tamper-resistance, but it's a strong cluster.
    all:
      - id: micro-behaviors/fs/watch/inotify::inotify-add-watch
    any:
      - id: inotify-respawn-message
      - id: inotify-target-system-path
      - id: objectives/evasion/hijack-execution-flow/preload::ld-so-preload-path
