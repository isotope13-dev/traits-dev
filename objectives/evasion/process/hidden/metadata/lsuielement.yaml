# macOS UI Manifest Signals
# Detects Info.plist keys that control UI visibility and behavior
defaults:
  platforms: [macos]
  for: [plist]
composite_rules:
  - id: hidden-app-suspicious-metadata
    desc: Dockless app bundle with malformed Apple metadata
    crit: suspicious
    conf: 0.93
    needs: 3
    any:
      - id: metadata/binary/bundle::lsuielement-background-agent
      - id: metadata/binary/bundle::generic-bundle-signature
      - id: metadata/binary/bundle::ios-key-in-macos-plist
      - id: metadata/binary/bundle::short-prefix
