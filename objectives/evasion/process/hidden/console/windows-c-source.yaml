# Console window hiding in C/C++ source
# Detects ShowWindow + FindWindow("ConsoleWindowClass") technique
# used to hide the console window of a malware process
defaults:
  platforms: [windows]
  for: [c, cpp]
  attack: T1564.003
  mbc: F0005

traits:
  # FindWindow with ConsoleWindowClass
  - id: findwindow-console-class
    desc: References the Windows console window class
    crit: notable
    conf: 0.85
    if:
      type: text
      word: "ConsoleWindowClass"

  # ShowWindow call (generic, paired with FindWindow for specificity)
  - id: showwindow-call-source
    desc: ShowWindow API call in source
    crit: baseline
    conf: 0.8
    if:
      type: text
      word: "ShowWindow"

composite_rules:
  # Hide console window via FindWindow + ShowWindow
  - id: hide-console-window
    desc: Hides console window
    crit: suspicious
    conf: 0.93
    all:
      - id: findwindow-console-class
      - id: showwindow-call-source
