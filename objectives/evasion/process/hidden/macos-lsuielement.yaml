# macOS UI Manifest Signals
# Detects Info.plist keys that control UI visibility and behavior
defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: lsuielement-true
    desc: LSUIElement true (dockless agent app)
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: "LSUIElement"
      exact: "true"

composite_rules:
  - id: hidden-app-suspicious-metadata
    desc: Dockless app bundle with malformed Apple metadata
    crit: suspicious
    conf: 0.93
    needs: 3
    any:
      - id: lsuielement-true
      - id: metadata/vendor/apple::generic-bundle-signature
      - id: metadata/vendor/apple::ios-key-in-macos-plist
      - id: metadata/vendor/apple::short-prefix
