# Hidden process creation - Windows C/C++ source
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1564
traits:
  - id: sw-hide-flag
    desc: SW_HIDE window show flag
    crit: component
    conf: 0.85
    if:
      type: text
      word: "SW_HIDE"
  - id: register-service-process
    desc: RegisterServiceProcess task hiding
    crit: suspicious
    conf: 0.98
    if:
      type: text
      word: "RegisterServiceProcess"
composite_rules:
  - id: hidden-process-create
    desc: Create process with hidden window
    crit: notable
    conf: 0.9
    all:
      - id: sw-hide-flag
      - id: micro-behaviors/process/create/spawn::create-process-source
  - id: dynamic-task-manager-hide
    desc: Dynamic task manager hiding
    crit: suspicious
    conf: 0.97
    all:
      - id: register-service-process
      - id: micro-behaviors/dylib/load::load-library-source
      - id: micro-behaviors/dylib/lookup::get-proc-address-source
