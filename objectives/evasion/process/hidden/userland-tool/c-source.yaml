defaults:
  platforms: [unix]
  for: [c, cpp]

traits:
- id: c-netstat-hide-lists
  desc: C netstat hide lists
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'INPORT\[MAXHIDE\]|OUTPORT\[MAXHIDE\]'

- id: c-netstat-skip-hidden-port
  desc: C skips hidden ports
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'if (isoutport(tp->tcpConnLocalPort))'

- id: c-netstat-skip-hidden-peer
  desc: C skips hidden peers
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'if (isinport(tp->tcpConnRemPort))'

- id: c-ps-hide-process-arrays
  desc: C ps hide arrays
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'hpro\[MAXHIDE\]|htty\[MAXHIDE\]'

- id: c-procfs-process-enumeration
  desc: C enumerates procfs
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: 'while (dentp = readdir(dirp))'

- id: c-procfs-psinfo-ioctl
  desc: C reads proc psinfo
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'ioctl(procfd, PIOCPSINFO'

- id: c-trojan-find-hide-comment
  desc: C find hides paths
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: 'a file you wish to hide'

composite_rules:
- id: c-netstat-connection-hiding
  desc: C netstat connection hiding
  crit: hostile
  conf: 0.97
  all:
  - id: c-netstat-hide-lists
  - id: c-netstat-skip-hidden-port
  - id: c-netstat-skip-hidden-peer

- id: c-ps-procfs-entry-hiding
  desc: C ps procfs entry hiding
  crit: hostile
  conf: 0.96
  all:
  - id: c-ps-hide-process-arrays
  - id: c-procfs-process-enumeration
  - id: c-procfs-psinfo-ioctl

- id: c-userland-tool-hiding-pack
  desc: C userland hiding tool pack
  crit: hostile
  conf: 0.97
  any:
  - id: c-netstat-connection-hiding
  - id: c-ps-procfs-entry-hiding
  - id: c-trojan-find-hide-comment
  needs: 2
