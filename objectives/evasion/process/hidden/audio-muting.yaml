# Audio Muting - Silence system before noisy operations
# ATT&CK: T1564 (Hide Artifacts)
defaults:
  platforms: [macos]
  for: [macho, shell]
  attack: "T1564"
traits:
  - id: volume-mute
    desc: Mutes system volume via AppleScript
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: "set volume output muted true"
  - id: volume-unmute
    desc: Unmutes system volume via AppleScript
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: "set volume output muted false"
composite_rules:
  - id: stealth-mute-unmute
    desc: Mutes then unmutes volume (stealth operation)
    crit: suspicious
    conf: 0.9
    all:
      - id: volume-mute
      - id: volume-unmute
