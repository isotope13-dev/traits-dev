defaults:
  platforms: [linux]
  for: [c, cpp, elf]
  attack: T1564
  mbc: F0005
  crit: component
  conf: 0.9
traits:
  - id: command-env-hide-help
    desc: Hides command arguments and environment
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: Hide command options and clear the environment
  - id: zap-child-process-help
    desc: Zaps child process command lines
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Zap all child processes as well
  - id: no-zap-env-option
    desc: Option disables process environment zapping
    crit: component
    conf: 0.88
    if:
      type: text
      substr: Do not zap the environment variables
  - id: ptrace-getregset-prstatus
    desc: ptrace reads process register set
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'PTRACE_GETREGSET.{0,80}NT_PRSTATUS'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/binary/linking/runtime/
  - id: ptrace-setregset-prstatus
    desc: ptrace writes process register set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'PTRACE_SETREGSET.{0,80}NT_PRSTATUS'
    unless:
      - id: well-known/lib/wine::wine-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
      - id: well-known/app/sudo::source-tree
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-spdx-source-context
  - id: ptrace-pokedata-write
    desc: PTRACE_POKEDATA constant reference
    crit: notable
    conf: 0.9
    # Notable (not suspicious) standalone: PTRACE_POKEDATA also appears in
    # general process injectors (verbose status messages, debugger tooling).
    # The hostile argv/env-hide intent comes from the parent composites
    # in this file (ptrace-process-argument-hider, elf-auxv-stack-process-hide)
    # that pair this with auxv rewrites and stack-region zeroing.
    if:
      type: text
      substr: PTRACE_POKEDATA
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-buildinfo
      - id: metadata/lang/source::linux-kernel-source-tree-path
  - id: ptrace-fork-exec-trace
    desc: ptrace traces fork and exec
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'PTRACE_O_TRACEFORK.{0,160}PTRACE_O_TRACEEXEC'
  - id: auxv-entry-rewrite-markers
    desc: Auxiliary vector entry marker strings
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: 'AT_(RANDOM|EXECFN|PLATFORM|BASE_PLATFORM)'
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-buildinfo
      - id: well-known/tool/reverse-engineering/gdb::gdb-debugger-context
  - id: stack-argv-region-zero
    desc: Zeroes relocated argv stack region
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'memset\(&stack.{0,80}arg_min'
  - id: stack-env-region-zero
    desc: Zeroes relocated process environment region
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'memset\(&stack.{0,80}env_min'
  - id: self-argv-env-zero-loop
    desc: Zeroes own argv and environment
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'memset\((argv|envp)\s*\[\s*i\s*\]'
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
  - id: proc-pid-max-read
    desc: Reads kernel maximum PID value
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: /proc/sys/kernel/pid_max
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/tool/development/profiler
      - id: well-known/tool/sysadmin/stress-ng::stress-ng
  - id: pid-fast-forward-status
    desc: Fast-forwards Linux process ID allocation
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Fast forwarding to PID
  - id: clone-vm-pid-grind-source
    desc: clone VM PID grinding loop
    crit: notable
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      regex: 'clone\(.{0,120}CLONE_VM'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
composite_rules:
  - id: ptrace-process-argument-hider
    desc: ptrace hides process argv and env
    crit: hostile
    conf: 0.98
    all:
      - id: command-env-hide-help
    needs: 2
    any:
      - id: micro-behaviors/os/syscall/invoke::ptrace-import
      - id: ptrace-getregset-prstatus
      - id: ptrace-setregset-prstatus
      - id: ptrace-pokedata-write
      - id: ptrace-fork-exec-trace
      - id: auxv-entry-rewrite-markers
      - id: zap-child-process-help
      - id: no-zap-env-option
  - id: elf-auxv-stack-process-hide
    desc: ELF auxv stack process hiding
    crit: hostile
    conf: 0.98
    all:
      - id: auxv-entry-rewrite-markers
      - id: stack-argv-region-zero
      - id: stack-env-region-zero
    any:
      - id: ptrace-setregset-prstatus
      - id: ptrace-pokedata-write
      - id: ptrace-fork-exec-trace
  - id: arbitrary-pid-fast-forward
    desc: Performs arbitrary PID allocation grinding
    crit: suspicious
    conf: 0.94
    all:
      - id: proc-pid-max-read
    any:
      - id: pid-fast-forward-status
      - id: clone-vm-pid-grind-source
    unless:
      - id: well-known/tool/development/profiler
