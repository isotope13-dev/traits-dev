defaults:
  platforms: [unix]
  for: [c, cpp]
  attack: "T1574,T1036,T1059.004"
composite_rules:
  - id: daemonized-argv-exec-backdoor
    desc: Daemonized argv exec backdoor wrapper
    crit: hostile
    conf: 0.97
    mbc: B0022
    all:
      - id: micro-behaviors/process/create/execv::c-execve-argv-target
      - id: micro-behaviors/process/fork/clone::c-fork-call
      - id: micro-behaviors/process/create/setsid::c-setsid-call
      - id: objectives/command-and-control/backdoor/shell/socket::rawtcp-command-backdoor
    any:
      - id: objectives/privilege-escalation/elevation-control/sudo::c-sudo-self-reexec
      - id: micro-behaviors/fs/lock/flock::flock
