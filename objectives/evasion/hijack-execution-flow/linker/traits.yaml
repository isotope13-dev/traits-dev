defaults:
  for:
    - elf
  platforms:
    - linux
    - unix
  attack: T1574.006
  mbc: F0015
traits:
  - id: ld-so-usage-text
    desc: Contains ld.so usage text (is dynamic linker)
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: helper program for shared library
  - id: dl-allocate-tls
    desc: Dynamic linker TLS allocation internal
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: _dl_allocate_tls
  - id: dl-rtld-di-serinfo
    desc: Dynamic linker rtld_di_serinfo internal
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: _dl_rtld_di_serinfo
  - id: standard-linker-name-ld-so
    desc: Standard ld.so basename
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: ^ld\.so(\.[0-9]{1,3})?$
  - id: standard-linker-name-versioned
    desc: Versioned dynamic linker basename
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: ^ld-[0-9]{1,2}\.[0-9]{1,3}\.so$
  - id: standard-linker-name-linux
    desc: ld-linux dynamic linker basename
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: ^ld-linux[^/]{0,32}\.so(\.[0-9]{1,3})?$
  - id: standard-linker-name-musl
    desc: musl dynamic linker basename
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: ^ld-musl-[^/]{1,32}\.so(\.[0-9]{1,3})?$
  - id: standard-linker-name-elf-so
    desc: ld.elf_so dynamic linker basename
    crit: component
    conf: 0.9
    if:
      type: basename
      exact: ld.elf_so
  - id: var-profile-path
    desc: Non-standard /var/profile path reference
    crit: notable
    conf: 0.75
    for:
      - elf
      - shell
    if:
      type: string_value
      substr: /var/profile
    unless:
      - id: dynamic-linker-binary
composite_rules:
  - id: standard-linker-name-core
    desc: Common standard dynamic linker names
    crit: component
    conf: 0.9
    any:
      - id: standard-linker-name-ld-so
      - id: standard-linker-name-versioned
      - id: standard-linker-name-linux
  - id: standard-linker-name-alt
    desc: Alternate standard dynamic linker names
    crit: component
    conf: 0.9
    any:
      - id: standard-linker-name-musl
      - id: standard-linker-name-elf-so
  - id: standard-linker-name
    desc: Standard dynamic linker filename
    crit: component
    conf: 0.9
    any:
      - id: standard-linker-name-core
      - id: standard-linker-name-alt
  - id: dynamic-linker-binary
    desc: Binary is a dynamic linker (ld.so internals)
    crit: notable
    conf: 0.85
    all:
      - id: ld-so-usage-text
    any:
      - id: objectives/command-and-control/backdoor/binary::rtld-global-ref
      - id: dl-allocate-tls
      - id: dl-rtld-di-serinfo
    downgrade:
      any:
        - id: standard-linker-name
  - id: modified-dynamic-linker
    desc: Modified/renamed dynamic linker (rootkit)
    crit: suspicious
    conf: 0.9
    all:
      - id: dynamic-linker-binary
      - id: metadata/binary::binary-format-checked
    unless:
      - id: standard-linker-name
  - id: standard-dynamic-linker
    desc: Standard dynamic linker binary
    crit: baseline
    conf: 0.95
    all:
      - id: dynamic-linker-binary
      - id: standard-linker-name
