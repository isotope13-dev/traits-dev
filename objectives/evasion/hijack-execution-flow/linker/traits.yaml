# Modified Dynamic Linker Detection
# Detects binaries that ARE modified/backdoored dynamic linkers (ld.so)
# ATT&CK: T1574.006 (Dynamic Linker Hijacking)
# MBC: F0015 (Hijack Execution Flow)
defaults:
  for: [elf]
  platforms: [linux, unix]
  attack: T1574.006
  mbc: F0015
traits:
  - id: ld-so-usage-text
    desc: Contains ld.so usage text (is dynamic linker)
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "helper program for shared library"
  - id: dl-allocate-tls
    desc: Dynamic linker TLS allocation internal
    crit: component
    conf: 0.8
    if:
      type: string
      substr: _dl_allocate_tls
  - id: dl-rtld-di-serinfo
    desc: Dynamic linker rtld_di_serinfo internal
    crit: component
    conf: 0.85
    if:
      type: string
      substr: _dl_rtld_di_serinfo
  - id: standard-linker-name
    desc: Standard dynamic linker filename
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: '^ld([-.]linux|[-.]so|\.elf_so|-musl-)'
  - id: var-profile-path
    desc: Non-standard /var/profile path reference
    crit: notable
    conf: 0.75
    for: [elf, shell]
    if:
      type: string
      substr: /var/profile
composite_rules:
  - id: dynamic-linker-binary
    desc: Binary is a dynamic linker (ld.so internals)
    crit: notable
    conf: 0.85
    all:
      - id: ld-so-usage-text
    any:
      - id: objectives/command-and-control/backdoor/binary::rtld-global-ref
      - id: dl-allocate-tls
      - id: dl-rtld-di-serinfo
    downgrade:
      any:
        - id: standard-linker-name
  - id: modified-dynamic-linker
    desc: Modified/renamed dynamic linker (rootkit)
    crit: suspicious
    conf: 0.9
    all:
      - id: dynamic-linker-binary
      - id: metadata/hardening::stripped-binary
    none:
      - id: standard-linker-name
