# Indirect Function (IFUNC) Hijacking Detection
# Detects patterns where IFUNC resolvers are used for suspicious purposes.
# ATT&CK: T1195.002 (Supply Chain Compromise: Compromise Software Supply Chain)
# MBC: B0025 (Compromise Software Supply Chain)
defaults:
  platforms: [linux, unix, android]
  for: [elf]
  attack: "T1195.002"
  mbc: "B0025"
composite_rules:
  # === Unexpected Library Context ===
  - id: ifunc-in-utility-lib
    desc: IFUNC resolver in non-standard utility library
    crit: notable
    conf: 0.7
    all:
      - id: metadata/binary/linking/runtime::ifunc
    unless:
      - id: micro-behaviors/dylib/library/libc::is-libc-binary
      - id: micro-behaviors/dylib/library/libc::glibc-versioned-librt
      - id: micro-behaviors/dylib/library/libc::glibc-versioned-libmvec
      - id: metadata/lang/compiled::go-runtime-marker
      - id: objectives/evasion/hijack-execution-flow/linker::standard-dynamic-linker
      - id: micro-behaviors/dylib/library/family::system-lib-marker
  # === Sensitive Target Functions ===
  - id: ifunc-security-resolver
    desc: IFUNC resolver for security-sensitive function
    crit: suspicious
    conf: 0.8
    all:
      - id: metadata/binary/linking/runtime::ifunc
    any:
      - id: micro-behaviors/os/pam/auth::pam-authenticate
      - id: micro-behaviors/crypto/asymmetric/rsa::rsa-public-decrypt
  # === Resolver Side Effects ===
  - id: ifunc-with-env-check
    desc: IFUNC resolver combined with environment checks
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/binary/linking/runtime::ifunc
      - id: metadata/lang/scripted::env-access
    unless:
      - id: micro-behaviors/dylib/library/family::system-lib-marker
  - id: ifunc-with-process-discovery
    desc: IFUNC resolver combined with process discovery
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/binary/linking/runtime::ifunc
      - id: micro-behaviors/process/identity/query
    unless:
      - id: micro-behaviors/dylib/library/libc::is-libc-binary
      - id: micro-behaviors/dylib/library/libc::glibc-versioned-librt
      - id: micro-behaviors/dylib/library/libc::glibc-versioned-libmvec
      - id: objectives/evasion/hijack-execution-flow/linker::standard-dynamic-linker
      - id: micro-behaviors/dylib/library/family::system-lib-marker
  # === Dynamic-loader resolution (xz pattern) ===
  # liblzma 5.6.0 added an IFUNC resolver and an explicit __tls_get_addr
  # import from ld-linux. The pairing is precise on its own: glibc
  # *provides* __tls_get_addr (export), not imports it, and almost no
  # utility library has cause to consume the loader's TLS resolver
  # directly. No system-lib unless: clause needed.
  - id: ifunc-with-tls-resolver-import
    desc: IFUNC + __tls_get_addr import + direct loader bind
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/linking/runtime::ifunc
      - id: metadata/binary/linking/runtime::imports-tls-get-addr
      - id: metadata/binary/linking/runtime::library-loader-dep
    unless:
      - id: micro-behaviors/dylib/library/libc::is-libc-binary
      - id: objectives/evasion/hijack-execution-flow/linker::standard-dynamic-linker
      - id: micro-behaviors/dylib/library/family::system-lib-marker
