defaults:
  platforms: [macos]
  for: [objc, macho]
  attack: T1574.006

traits:
  - id: install-name-tool-dylib-add
    desc: install_name_tool dylib add
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'install_name_tool[\s\S]{0,120}(-add_dylib|-change)'

  - id: malicious-dylib-constructor
    desc: Dylib constructor payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '__attribute__\s*\(\s*\(\s*constructor\s*\)\s*\)[\s\S]{0,1000}/dev/tcp/'

composite_rules:
  - id: macos-dylib-load-hijack
    desc: macOS dylib load hijack
    crit: hostile
    conf: 0.97
    all:
      - id: install-name-tool-dylib-add
    any:
      - id: malicious-dylib-constructor
      - id: objectives/evasion/process/injection/memory::macos-mach-thread-injection

