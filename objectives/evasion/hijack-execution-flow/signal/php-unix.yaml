defaults:
  platforms: [unix, appliance]
  for: [php]
  attack: T1546

traits:
  - id: php-signal-handler-hijack
    desc: PHP signal handler hijack
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'pcntl_signal\(SIGTERM[\s\S]{0,180}hijack_signal_handler'

  - id: php-signal-spawns-persist-shell
    desc: PHP signal spawns persist shell
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'proc_open\(''/bin/sh /tmp/\.vx_persist\.sh'''

composite_rules:
  - id: php-signal-persistence-hijack
    desc: PHP signal persistence hijack
    crit: hostile
    conf: 0.98
    all:
      - id: php-signal-handler-hijack
      - id: php-signal-spawns-persist-shell
