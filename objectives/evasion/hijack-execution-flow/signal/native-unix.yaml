defaults:
  platforms: [unix, appliance]
  for: [c, cpp, objc, elf]
  attack: T1546

traits:
  - id: native-sigaction-flow-hijack
    desc: Native sigaction flow hijack
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'sigaction\(SIG[A-Z0-9_]+[\s\S]{0,260}sa_sigaction'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/lib/hpc
      - type: path
        regex: '(^|[\\/])(mpich-[^\\/]*|ucx|libfabric)([\\/]|$)'
      - type: text
        substr: rdma/opx
      - type: text
        substr: SIGBUS_old_action
      - type: text
        substr: SIGSEGV_old_action

  - id: native-forged-task-control
    desc: Native forged task control
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'fakeTCB[\s\S]{0,260}entryPt'

composite_rules:
  - id: native-signal-task-flow-hijack
    desc: Native signal task flow hijack
    crit: hostile
    conf: 0.98
    all:
      - id: native-sigaction-flow-hijack
      - id: native-forged-task-control
