defaults:
  platforms: [unix, appliance]
  for: [rust, elf]
  attack: T1546

traits:
  - id: rust-signal-hijack-handlers
    desc: Rust signal hijack handlers
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'hijacked_sigterm[\s\S]{0,260}SIGTERM'

  - id: rust-atexit-respawn-hook
    desc: Rust atexit respawn hook
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'register_exit_hook[\s\S]{0,260}current_exe'

composite_rules:
  - id: rust-signal-function-hijack
    desc: Rust signal function hijack
    crit: hostile
    conf: 0.98
    all:
      - id: rust-signal-hijack-handlers
      - id: objectives/evasion/process/hook/inline::rust-hook-byte-copy
      - id: rust-atexit-respawn-hook
