defaults:
  platforms: [openbsd, bsd, unix]
  for: [lua, shell]
  attack: T1059

traits:
  - id: lua-shell-polyglot-exec
    desc: Lua shell polyglot exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: '"exec" "lua" "$0" "$@"'

  - id: lua-hidden-decoded-payload
    desc: Lua hidden decoded payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: cleave_key_2024

composite_rules:
  - id: lua-shell-polyglot-loader
    desc: Lua shell polyglot loader
    crit: hostile
    conf: 0.98
    all:
      - id: lua-shell-polyglot-exec
      - id: lua-hidden-decoded-payload

