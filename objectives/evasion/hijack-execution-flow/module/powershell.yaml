defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1574

traits:
  - id: psmodulepath-user-prepend
    desc: PowerShell PSModulePath prepend
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'SetEnvironmentVariable\(''PSModulePath''[\s\S]{0,260}\$fakeModuleDir;'

  - id: fake-microsoft-management-module
    desc: Fake Microsoft management module
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Microsoft.PowerShell.Management.psm1

  - id: powershell-global-function-hook
    desc: PowerShell global function hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'function Global:Get-Process[\s\S]{0,900}function Global:Start-Process'

  - id: powershell-export-hooked-members
    desc: PowerShell exports hooked members
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Export-ModuleMember[\s\S]{0,120}Get-Process[\s\S]{0,120}Start-Process'

composite_rules:
  - id: powershell-module-path-hijack
    desc: PowerShell module path hijack
    crit: hostile
    conf: 0.98
    all:
      - id: psmodulepath-user-prepend
      - id: fake-microsoft-management-module
      - id: powershell-global-function-hook
      - id: powershell-export-hooked-members
