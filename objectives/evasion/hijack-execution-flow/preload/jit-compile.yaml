defaults:
  platforms: [linux]
  for: [binaries]
  attack: T1574.006
  mbc: F0015
traits:
  - id: gcc-shared-fpic-victim-build
    desc: Compiles shared object on the victim
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\bgcc\b[^\n]{0,160}-shared[^\n]{0,160}-fPIC'
  - id: gcc-shared-output-system-lib
    desc: Compiles .so into system library path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bgcc\b[^\n]{0,260}-o\s+/usr/(lib|local/lib)/[A-Za-z0-9._-]{1,80}\.so'
  - id: embedded-c-source-gnu-source
    desc: Embedded C source _GNU_SOURCE define
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '#define\s+_GNU_SOURCE\b'
  - id: embedded-c-source-include-header
    desc: Embedded C source #include header
    crit: component
    conf: 0.5
    if:
      type: text
      regex: '#include\s+<(stdio|stdlib|dlfcn)\.h>'
  - id: jit-source-tempfile
    desc: Dropped temporary C source file path
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '/tmp/\.[A-Za-z0-9._-]{0,40}(src|hide_src|preload|ld)_[A-Za-z0-9_*-]{4,48}'
  - id: ai-agent-module-path
    desc: AI agent module path
    crit: notable
    conf: 0.98
    for: [elf, macho]
    if:
      type: path
      regex: 'modules[\\/]ai-agent[\\/]ai-agent$'
composite_rules:
  - id: embedded-c-source-marker
    desc: Embedded C source code in binary
    crit: suspicious
    conf: 0.85
    all:
      - id: embedded-c-source-gnu-source
      - id: embedded-c-source-include-header
    near_bytes: 256
  - id: jit-compile-rootkit-on-victim
    desc: Implant JIT-compiles rootkit/.so on
    crit: hostile
    conf: 0.96
    all:
      - id: embedded-c-source-marker
    any:
      - id: gcc-shared-fpic-victim-build
      - id: gcc-shared-output-system-lib
      - id: jit-source-tempfile
    unless:
      - id: ai-agent-module-path
