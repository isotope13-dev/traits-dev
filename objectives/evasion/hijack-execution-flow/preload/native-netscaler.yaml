defaults:
  platforms: [netscaler, appliance, unix]
  for: [c, elf]
  attack: T1574.006

traits:
  - id: native-ldpreload-setenv
    desc: Native LD_PRELOAD setenv
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'setenv\("LD_PRELOAD"[\s\S]{0,80}/tmp/\.libinject\.so'

  - id: native-path-hidden-bin
    desc: Native PATH hidden bin
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.bin:%s

  - id: native-hidden-bin-mkdir
    desc: Native hidden bin mkdir
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: mkdir("/tmp/.bin"

composite_rules:
  - id: native-ldpreload-path-hijack
    desc: Native LD_PRELOAD path hijack
    crit: hostile
    conf: 0.98
    all:
      - id: native-ldpreload-setenv
      - id: native-path-hidden-bin
      - id: native-hidden-bin-mkdir
