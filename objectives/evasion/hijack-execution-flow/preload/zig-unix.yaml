defaults:
  platforms: [unix]
  for: [zig, elf]
  attack: T1574.006

traits:
  - id: zig-rtld-next-hooks
    desc: Zig RTLD_NEXT hooks
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'c\.RTLD_NEXT[\s\S]{0,220}dlsym'

  - id: zig-exported-libc-hooks
    desc: Zig exports libc hooks
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'export fn openat[\s\S]{0,900}export fn socket[\s\S]{0,900}export fn connect'

  - id: zig-preload-wrapper-bashrc
    desc: Zig writes LD_PRELOAD wrapper
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: export LD_PRELOAD

composite_rules:
  - id: zig-ld-preload-hook-library
    desc: Zig LD_PRELOAD hook library
    crit: hostile
    conf: 0.98
    all:
      - id: zig-rtld-next-hooks
      - id: zig-exported-libc-hooks

  - id: zig-ld-preload-persistence
    desc: Zig LD_PRELOAD persistence
    crit: hostile
    conf: 0.98
    all:
      - id: zig-preload-wrapper-bashrc
      - id: zig-ld-preload-hook-library
