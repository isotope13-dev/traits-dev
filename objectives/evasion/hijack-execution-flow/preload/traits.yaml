defaults:
  platforms:
    - unix
    - android
    - ios
traits:
  - id: ld-preload-env
    desc: LD_PRELOAD environment variable
    crit: suspicious
    attack: T1547.015
    conf: 0.85
    for:
      - shell
    if:
      id: micro-behaviors/os/linker/env::ld-preload
    downgrade:
      any:
        - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
  - id: dlopen-call
    desc: dlopen dynamic loading call
    crit: notable
    conf: 0.5
    for:
      - shell
    if:
      type: string_literal
      substr: dlopen
    attack: T1574.006
    unless:
      - id: metadata/build/autotools::autoconf-generated-script
      - id: well-known/lib/xml2
      - id: well-known/lib/xslt
  - id: glibc-tunables
    desc: GLIBC_TUNABLES environment variable
    crit: notable
    conf: 0.85
    for:
      - elf
      - shell
    if:
      type: text
      word: GLIBC_TUNABLES
    attack: T1547.015
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: objectives/evasion/hijack-execution-flow/linker/
      - type: path
        basename: true
        exact: ldconfig
      - id: well-known/lib/glibc
      - id: metadata/binary/linking/static/
      - id: well-known/tool/development/qemu
  - id: function-interception
    desc: Function interception markers
    crit: suspicious
    conf: 0.6
    for:
      - elf
      - shell
    if:
      type: text
      regex: (dlsym\(RTLD_NEXT|__libc_dlsym|__libc_dlopen_mode)
    attack: T1547.015
    unless:
      - id: micro-behaviors/dylib/library/libc/
      - id: well-known/tool/reverse-engineering/frida/
      - id: micro-behaviors/dylib/library/libc::glibc-versioned-libc
      - id: micro-behaviors/dylib/library/libc::glibc-versioned-librt
      - id: objectives/evasion/hijack-execution-flow/linker/
      - id: micro-behaviors/dylib/library/family/
  - id: libc-preload-env
    desc: LD_PRELOAD references libc
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - shell
    if:
      type: text
      regex: LD_PRELOAD\s*=\s*[^\s]{0,120}libc(\.so|-)
    unless:
      - id: well-known/lib/bytedance::npth-crash-dumper-context
  - id: libc-preload-file
    desc: ld.so.preload references libc
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - shell
    if:
      type: text
      regex: ld\.so\.preload[^\n]{0,80}libc(\.so|-)
    unless:
      - id: well-known/lib/bytedance::npth-crash-dumper-context
composite_rules:
  - id: dlopen-dlsym-pattern
    desc: dlopen+dlsym dynamic loading pair
    crit: suspicious
    conf: 0.7
    for:
      - elf
      - shell
    attack: T1574.006
    all:
      - id: dlopen-call
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
  - id: ld-environment-hijacking
    desc: LD environment variable hijacking
    crit: suspicious
    conf: 0.85
    for:
      - shell
    attack: T1547.015
    needs: 2
    any:
      - id: ld-preload-env
      - id: micro-behaviors/os/linker/env::ld-audit
      - id: micro-behaviors/os/linker/env::ld-debug
    not:
      - substr: The setuid sandbox is not running as root.
    downgrade:
      any:
        - id: metadata/binary/linking/static/
  - id: dynamic-function-interception
    desc: Dynamic function interception
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    attack: T1547.015
    needs: 2
    any:
      - id: objectives/evasion/kernel-hide/userspace::dlsym-rtld-next-pattern
      - id: dlopen-dlsym-pattern
      - id: function-interception
  - id: dynamic-linker-hijacking
    desc: Complete dynamic linker hijacking
    crit: suspicious
    conf: 0.9
    for:
      - elf
      - shell
    attack: T1547.015
    mbc: E1104
    needs: 2
    any:
      - id: micro-behaviors/dylib/lookup::dlfcn-hook-symbol
      - id: ld-environment-hijacking
      - id: dynamic-function-interception
  - id: libc-preload
    desc: Preload libc library
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - shell
    any:
      - id: libc-preload-env
      - id: libc-preload-file
