defaults:
  platforms: [netbsd, unix]
  for: [c, cpp, objc, elf]
  attack: T1574.006

traits:
  - id: native-rtld-next-hook-source
    desc: Native RTLD_NEXT hook source
    crit: suspicious
    conf: 0.94
    if:
      type: text
      # Require the hooked symbol name itself — bare `open` otherwise
      # matches inside `fopen`/`fopen64` string arguments.
      regex: 'dlsym\s*\(\s*RTLD_NEXT\s*,\s*["''](getpwnam|open)["'']'
    unless:
      - type: basename
        exact: sshd_test_pw.c
      - type: text
        substr: '//go:build ignore'
      - id: well-known/app/drivers/
      - id: well-known/lib/uid-wrapper::uid-wrapper-source
      - id: well-known/app/linuxulator-steam-utils/

  - id: native-ld-preload-profile-hook
    desc: Native LD_PRELOAD profile hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/profile\.d[\s\S]{0,320}LD_PRELOAD'

  - id: native-ldconf-hook-path
    desc: Native ld.so hook path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/ld.so.conf.d/hook.conf

composite_rules:
  - id: native-ld-preload-hook-install
    desc: Native LD_PRELOAD hook install
    crit: hostile
    conf: 0.98
    all:
      - id: native-rtld-next-hook-source
    any:
      - id: native-ld-preload-profile-hook
      - id: native-ldconf-hook-path
      - id: micro-behaviors/os/linker/env::ld-preload-export
