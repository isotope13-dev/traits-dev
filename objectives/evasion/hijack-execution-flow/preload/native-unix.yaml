defaults:
  platforms: [netbsd, unix]
  for: [c, cpp, elf]
  attack: T1574.006

traits:
  - id: native-rtld-next-hook-source
    desc: Native RTLD_NEXT hook source
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'dlsym\(RTLD_NEXT[\s\S]{0,260}(getpwnam|open)'

  - id: native-ld-preload-profile-hook
    desc: Native LD_PRELOAD profile hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/profile\.d[\s\S]{0,320}LD_PRELOAD'

  - id: native-ldconf-hook-path
    desc: Native ld.so hook path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/ld.so.conf.d/hook.conf

composite_rules:
  - id: native-ld-preload-hook-install
    desc: Native LD_PRELOAD hook install
    crit: hostile
    conf: 0.98
    all:
      - id: native-rtld-next-hook-source
      - id: native-ld-preload-profile-hook
    any:
      - id: native-ldconf-hook-path
