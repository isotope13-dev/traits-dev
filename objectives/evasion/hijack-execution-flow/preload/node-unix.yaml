defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1574.006

traits:
  - id: node-rtld-next-hook-source
    desc: Node writes RTLD_NEXT hook
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'dlsym\(RTLD_NEXT[\s\S]{0,260}(execve|open|setuid)'

  - id: node-ldpreload-profile-write
    desc: Node LD_PRELOAD profile write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'LD_PRELOAD[\s\S]{0,180}(/etc/default/init|/etc/profile)'

  - id: node-ldpreload-wrapper
    desc: Node LD_PRELOAD wrapper
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'export LD_PRELOAD="\$\{?libPath\}?"[\s\S]{0,120}exec "\$\{?backupPath\}?"'

composite_rules:
  - id: node-ldpreload-flow-hijack
    desc: Node LD_PRELOAD flow hijack
    crit: hostile
    conf: 0.98
    all:
      - id: node-rtld-next-hook-source
    any:
      - id: node-ldpreload-profile-write
      - id: node-ldpreload-wrapper
