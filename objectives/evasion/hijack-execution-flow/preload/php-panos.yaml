defaults:
  platforms: [panos, appliance, unix]
  for: [php]
  attack: T1574.006

traits:
  - id: php-panos-ld-preload-wrapper
    desc: PHP PAN-OS LD_PRELOAD wrapper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: export LD_PRELOAD

  - id: php-panos-hook-so-path
    desc: PHP PAN-OS hook so path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: libpanos_hook.so

composite_rules:
  - id: php-panos-ld-preload-hijack
    desc: PHP PAN-OS LD_PRELOAD hijack
    crit: hostile
    conf: 0.98
    all:
      - id: php-panos-ld-preload-wrapper
      - id: php-panos-hook-so-path
