defaults:
  platforms: [netscaler, appliance, unix]
  for: [swift]
  attack: T1574.006

traits:
  - id: swift-ld-preload-path
    desc: Swift ld.so.preload path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/ld.so.preload

  - id: swift-netscaler-hook-so
    desc: Swift NetScaler hook so
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.netscaler_hook.so

  - id: swift-glibc-preload-write
    desc: Swift Glibc preload write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Glibc\.open\(preloadPath[\s\S]{0,220}Glibc\.write'

composite_rules:
  - id: swift-ld-preload-hijack
    desc: Swift LD_PRELOAD hijack
    crit: hostile
    conf: 0.98
    all:
      - id: swift-ld-preload-path
      - id: swift-netscaler-hook-so
    any:
      - id: swift-glibc-preload-write
