defaults:
  platforms: [unix, netbsd]
  for: [rust, elf]
  attack: T1574.006

traits:
  - id: rust-ld-preload-hook-path
    desc: Rust LD_PRELOAD hook path
    crit: suspicious
    conf: 0.94
    for: [elf]
    if:
      type: hex
      section: .rodata..Lanon.9c9c55e1fbc96921dfca14b07bf74aee.75
      pattern: 2f 74 6d 70 2f 6c 69 62 65 6e 76 70 72 6f 62 65 5f 68 6f 6f 6b 2e 73 6f

  - id: rust-envprobe-hijack-marker
    desc: Rust envprobe hijack marker
    crit: suspicious
    conf: 0.94
    for: [elf]
    if:
      type: hex
      section: .rodata..Lanon.9c9c55e1fbc96921dfca14b07bf74aee.77
      pattern: 45 4e 56 50 52 4f 42 45 5f 48 49 4a 41 43 4b 45 44 3d 31

composite_rules:
  - id: rust-ld-preload-env-hijack
    desc: Rust LD_PRELOAD env hijack
    crit: hostile
    conf: 0.98
    all:
      - id: rust-ld-preload-hook-path
      - id: rust-envprobe-hijack-marker
    any:
      - id: micro-behaviors/os/linker/env::ld-preload
