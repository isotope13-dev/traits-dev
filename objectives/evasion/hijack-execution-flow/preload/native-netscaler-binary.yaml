defaults:
  platforms: [netscaler, appliance, unix]
  for: [elf]
  attack: T1574.006

traits:
  - id: native-libinject-path
    desc: Native libinject path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.libinject.so

composite_rules:
  - id: native-netscaler-preload-tasking
    desc: Native NetScaler preload tasking
    crit: hostile
    conf: 0.98
    all:
      - id: native-libinject-path
      - id: micro-behaviors/os/linker/env::ld-preload
    any:
      - id: objectives/command-and-control/backdoor/tasking/socket::native-netscaler-cmd-token
