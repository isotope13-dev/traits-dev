defaults:
  platforms: [linux]
  for: [binaries, scripts]
  attack: T1574.006
traits:
  - id: ld-so-preload-path
    desc: /etc/ld.so.preload path reference
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: /etc/ld.so.preload
    unless:
      - type: basename
        regex: '^(ld\.so|ldconfig|ldd)(\.\d+)?$'
      - id: micro-behaviors/dylib/library/libc/
      - id: objectives/evasion/hijack-execution-flow/linker/
  - id: ld-so-preload-write-message
    desc: ld.so.preload write status message
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(added to|installed at|Failed to write|Cannot write)[^\n]{0,80}/etc/ld\.so\.preload'
composite_rules:
  - id: system-ld-preload-write
    desc: Binary writes to /etc/ld.so.preload
    crit: hostile
    conf: 0.95
    mbc: F0015
    all:
      - id: ld-so-preload-path
    any:
      - id: ld-so-preload-write-message
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/write/direct::write
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-datadog-agent-binary
      - id: metadata/package/metrics::datadog-word
      - id: well-known/lib/jvm::runtime-library-basename
