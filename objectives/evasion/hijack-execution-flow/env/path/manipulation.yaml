# PATH Environment Variable Manipulation
# ATT&CK: T1574.007 (Hijack Execution Flow: Path Interception)
# Detects modification of PATH for persistence or hijacking
defaults:
  platforms: [unix, windows, macos]
  crit: suspicious
  conf: 0.9
  attack: "T1574.007"
composite_rules:
  - id: path-modification
    desc: PATH variable modification
    crit: notable
    # Requires both PATH reference AND setenv/putenv
    all:
      - id: micro-behaviors/os/env/vars/access::path-var
    any:
      - id: micro-behaviors/os/env/vars/access::setenv
      - id: micro-behaviors/os/env/vars/access::putenv
      - id: micro-behaviors/os/env/vars/access::powershell-path-assignment
    unless:
      - id: micro-behaviors/ui/help/
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: micro-behaviors/dylib/library/app
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/data/db/postgresql/
  - id: path-modification-prepend-tmp
    desc: PATH prepends /tmp
    crit: suspicious
    all:
      - id: path-modification
      - id: micro-behaviors/os/env/vars/access::path-prepend-tmp
