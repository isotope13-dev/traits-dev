defaults:
  platforms: [unix]
  for: [scripts]
  attack: T1574.007

traits:
  - id: powershell-unix-wrapper-command-names
    desc: PowerShell writes Unix command wrapper names
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(/|\$[A-Za-z0-9_]*BinDir/)(ls|wget|curl)["'']'
  - id: powershell-unix-wrapper-exec-passthrough
    desc: PowerShell Unix wrapper passthrough
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'exec /(bin|usr/bin)/(ls|wget|curl)\s'

composite_rules:
  - id: powershell-unix-path-wrapper-hijack
    desc: PowerShell Unix PATH command wrapper hijack
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/evasion/hijack-execution-flow/env/path::path-modification-prepend-tmp
      - id: micro-behaviors/fs/write/file/direct::set-content
      - id: powershell-unix-wrapper-command-names
      - id: powershell-unix-wrapper-exec-passthrough
