defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: env-path-assignment
    desc: PATH environment variable assignment
    crit: suspicious
    conf: 0.9
    attack: T1574.007
    mbc: E1574.007
    if:
      type: ast
      kind: assignment
      exact: env.PATH
  - id: path-prepending-pattern
    desc: PATH prepending with concatenation
    crit: suspicious
    conf: 0.95
    attack: T1574.007
    if:
      type: ast
      query: "((assignment_expression\n  left: (member_expression\n    object: (identifier) @obj\n    property: (property_identifier) @prop)\n  right: (binary_expression\n    left: (_)\n    right: (member_expression\n      property: (property_identifier) @path_prop)))\n (#eq? @prop \"PATH\")\n (#eq? @path_prop \"PATH\"))\n"
  - id: env-localappdata
    desc: Windows LOCALAPPDATA directory access
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: attribute
      exact: process.env.LOCALAPPDATA
  - id: env-appdata-dup
    desc: Windows APPDATA directory access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: process.env.APPDATA
  - id: env-userprofile
    desc: Windows USERPROFILE directory access
    crit: notable
    conf: 0.5
    if:
      type: symbol
      regex: process\.env\.USERPROFILE
  - id: appdata-string
    desc: AppData directory reference
    crit: notable
    conf: 0.4
    if:
      type: string_literal
      word: AppData
  - id: localappdata-string
    desc: Local AppData reference
    crit: notable
    conf: 0.4
    if:
      type: string_literal
      substr: LocalAppData
  - id: suspicious-python-version
    desc: Non-standard Python version format
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: Python\d{4,}
  - id: windows-path-backslash
    desc: Hardcoded Windows path separators
    crit: notable
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: string_literal
        substr: WOW6432Node\\Cygwin\\setup
    if:
      type: string_literal
      regex: '[A-Za-z]+\\\\[A-Za-z]+\\\\[A-Za-z]+'
composite_rules:
  - id: path-hijacking-ast
    desc: PATH environment variable prepending
    crit: suspicious
    conf: 0.85
    attack: T1574.007
    mbc: E1574.007
    all:
      - id: path-prepending-pattern
      - id: windows-path-backslash
      - id: env-localappdata
  - id: path-hijacking-prepend
    desc: PATH prepending for command hijacking
    crit: suspicious
    conf: 0.85
    attack: T1574.007
    all:
      - id: env-path-assignment
      - id: windows-path-backslash
  - id: suspicious-python-path-setup
    desc: Suspicious Python path configuration
    crit: suspicious
    conf: 0.85
    attack: T1574.007
    all:
      - id: suspicious-python-version
      - id: windows-path-backslash
    any:
      - id: env-localappdata
      - id: appdata-string
  - id: windows-appdata-path
    desc: Windows AppData path construction
    crit: notable
    conf: 0.7
    all:
      - id: appdata-string
      - id: localappdata-string
    any:
      - id: env-localappdata
      - id: objectives/discovery/system/fingerprint/hardware::os-homedir-call
