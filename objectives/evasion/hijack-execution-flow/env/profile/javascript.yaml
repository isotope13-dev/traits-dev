defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: env-path-assignment
    desc: PATH environment variable assignment
    crit: component
    conf: 0.9
    attack: T1574.007
    mbc: E1574.007
    if:
      type: symbol
      kind: bind
      exact: env.PATH
  - id: path-prepending-pattern
    desc: PATH prepending with concatenation
    crit: suspicious
    conf: 0.95
    attack: T1574.007
    if:
      type: tree-sitter
      query: "((assignment_expression\n  left: (member_expression\n    object: (identifier) @obj\n    property: (property_identifier) @prop)\n  right: (binary_expression\n    left: (_)\n    right: (member_expression\n      property: (property_identifier) @path_prop)))\n (#eq? @prop \"PATH\")\n (#eq? @path_prop \"PATH\"))\n"
  - id: env-localappdata
    desc: Windows LOCALAPPDATA environment variable access
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: member
      exact: process.env.LOCALAPPDATA
  - id: env-appdata-dup
    desc: Windows APPDATA directory access
    crit: suspicious
    conf: 0.6
    if:
      type: string_literal
      substr: process.env.APPDATA
  # A bare read of process.env.USERPROFILE just resolves the Windows home dir
  # (the cross-platform companion to os.homedir()/$HOME) — ubiquitous benign
  # code. Neutral `notable`; the hijack signal is USERPROFILE paired with a
  # PATH-prepend / profile-write, expressed by the composites that use this leg.
  - id: env-userprofile
    desc: Windows USERPROFILE directory access
    crit: notable
    conf: 0.5
    if:
      type: symbol
      regex: process\.env\.USERPROFILE
  - id: appdata-string
    desc: AppData directory reference
    crit: component
    conf: 0.4
    if:
      type: string_literal
      word: AppData
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
  - id: localappdata-string
    desc: Local AppData reference
    crit: component
    conf: 0.4
    if:
      type: string_literal
      substr: LocalAppData
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
  - id: suspicious-python-version
    desc: Non-standard Python version format
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: Python\d{4,}
  - id: windows-path-backslash
    desc: Hardcoded Windows path separators
    crit: component
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - type: string_literal
        substr: WOW6432Node\\Cygwin\\setup
      - type: text
        substr: export async function fetchPwshHistory
    if:
      type: string_literal
      regex: '[A-Za-z]+\\\\[A-Za-z]+\\\\[A-Za-z]+'
    not:
      - substr: Software\\Microsoft\\Windows
      - substr: Community\\Common7\\Tools\\VsDevCmd.bat
      - substr: Microsoft\\Windows\\PowerShell\\PSReadLine
composite_rules:
  - id: path-hijacking-ast
    desc: PATH environment variable prepending
    crit: suspicious
    conf: 0.85
    attack: T1574.007
    mbc: E1574.007
    all:
      - id: path-prepending-pattern
      - id: windows-path-backslash
      - id: env-localappdata
  - id: path-hijacking-prepend
    desc: PATH prepending for command hijacking
    crit: suspicious
    conf: 0.85
    attack: T1574.007
    all:
      - id: env-path-assignment
      - id: windows-path-backslash
  - id: suspicious-python-path-setup
    desc: Suspicious Python path configuration
    crit: suspicious
    conf: 0.85
    attack: T1574.007
    all:
      - id: suspicious-python-version
      - id: windows-path-backslash
    any:
      - id: env-localappdata
      - id: appdata-string
  - id: windows-appdata-path
    desc: Windows AppData path construction
    crit: suspicious
    conf: 0.7
    all:
      - id: appdata-string
      - id: localappdata-string
    any:
      - id: env-localappdata
      - id: micro-behaviors/process/user/query::os-homedir-call
