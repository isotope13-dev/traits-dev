defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: ld-library-path-manipulation
    desc: LD_LIBRARY_PATH environment variable set
    crit: suspicious
    conf: 0.85
    for:
      - elf
    if:
      type: text
      regex: (?:export\s+)?LD_LIBRARY_PATH=[^\s]{1,64}
    not:
      - substr: "OPENSSL_REGRESSION"
      - substr: "shlib_wrap.sh"
      - regex: LD_LIBRARY_PATH.{0,32}/usr/java/packages/lib:/usr/lib64:/lib64
      - substr: LD_LIBRARY_PATH=%s:%s/lib:%s/../lib
    downgrade:
      any:
        - type: basename
          regex: ^ld(\.elf_so|[-.]linux|-musl-|\.so)
        - type: basename
          regex: (?i)^Makefile
        - type: basename
          regex: (?i)^configure
        - type: basename
          regex: \.(SH|sh\.in|cmake)$
        - type: raw
          regex: 'sudo\s+-u\s+.{0,80}--preserve-env'
        - type: raw
          regex: 'LD_LIBRARY_PATH=\$\{?LD_LIBRARY_PATH\}?'
        - id: metadata/binary/metrics::massive-executable
    attack: T1574.006
composite_rules:
  - id: ld-audit-hook
    desc: LD_AUDIT dynamic linker hook
    crit: notable
    conf: 0.7
    attack: T1574.006
    all:
      - id: micro-behaviors/os/linker/env::ld-audit
    unless:
      - id: metadata/binary/linking::static-linked-heuristic
    downgrade:
      all:
        - type: symbol
          exact: la_version
      any:
        - type: symbol
          exact: la_objopen
        - type: symbol
          exact: la_symbind64
  - id: ld-preload-injection
    desc: LD_PRELOAD library injection setup
    crit: notable
    conf: 0.7
    attack: T1574.006
    all:
      - id: micro-behaviors/os/linker/env::ld-preload
    unless:
      - id: metadata/binary/linking::static-linked-heuristic
    downgrade:
      any:
        - id: metadata/package/testing/presence::gnu-coreutils-test
        - type: basename
          regex: ^ld(\.elf_so|[-.]linux|-musl-|\.so)
        - type: text
          regex: librumphijack\.so
  - id: dynamic-linker-manipulation
    desc: Dynamic linker environment setup
    crit: suspicious
    conf: 0.88
    attack: T1574.006
    all:
      - id: ld-library-path-manipulation
    any:
      - id: ld-audit-hook
      - id: ld-preload-injection
    downgrade:
      any:
        - type: basename
          regex: ^ld(\.elf_so|[-.]linux|-musl-|\.so)
        - id: metadata/binary/linking::static-linked-heuristic
  - id: env-variable-evasion-chain
    desc: Multiple evasion environment variables
    crit: hostile
    conf: 0.92
    attack: T1562.003
    mbc: E1014
    all:
      - id: objectives/evasion/indicator-removal/history::history-evasion-setup
      - id: micro-behaviors/os/env/vars::path-prepend-tmp
      - id: dynamic-linker-manipulation
