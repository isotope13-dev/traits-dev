defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, shell]
  attack: T1574
traits:
  - id: newrelic-license-env
    desc: New Relic license env
    crit: notable
    conf: 0.9
    if:
      type: text
      word: NEW_RELIC_LICENSE_KEY
    unless:
      - id: well-known/tool/detection/redaction::sensitive-data-scanner
  - id: newrelic-node-options-context-b
    desc: Loads New Relic via Node require option
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(--require[= ]|-r\s+)newrelic\b'
composite_rules:
  - id: newrelic-node-options-context-a
    desc: New Relic NODE_OPTIONS marker A
    crit: notable
    conf: 0.9
    any:
      - id: newrelic-license-env
      - id: micro-behaviors/communications/http/services/analytics::newrelic-service-reference
  - id: newrelic-node-options-marker
    desc: New Relic NODE_OPTIONS preload marker
    crit: notable
    conf: 0.9
    near_bytes: 240
    all:
      - id: newrelic-node-options-context-a
      - id: newrelic-node-options-context-b
  - id: node-options-require-preload
    desc: NODE_OPTIONS require preload setup
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/env/vars/access::node-options-env
      - id: micro-behaviors/process/interpreter/node::require-preload-option
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: objectives/evasion/hijack-execution-flow/env/node-options/
    downgrade:
      any:
        - id: metadata/library/structure::js-large-module-bundle

  - id: node-options-temp-preload
    desc: NODE_OPTIONS preloads temp JavaScript
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/env/vars/access::node-options-env
      - id: micro-behaviors/process/interpreter/node::require-preload-option
      - id: objectives/command-and-control/dropper/execution/network-stage::temp-js
