defaults:
  platforms: [unix]
  for: [shell]
  attack: T1574.006

traits:
  - id: shell-profile-hook-install
    desc: Shell profile hook install
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'source[^\n>]{0,120}>>[^\n]{0,40}\.(bash_profile|zprofile|zshrc|profile)\b'

  - id: shell-path-wrapper-sudo
    desc: Shell PATH sudo wrapper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'export PATH=[^;\n]{0,120}\$PATH[\s\S]{0,260}SUDO_INTERCEPT'

composite_rules:
  - id: shell-macos-dyld-profile-hijack
    desc: Shell macOS DYLD profile hijack
    crit: hostile
    conf: 0.98
    all:
      - id: shell-profile-hook-install
    any:
      - id: objectives/evasion/hijack-execution-flow/env/preload::dyld-insert-libraries-string
      - id: objectives/persistence/system/surface/paths::dyld-lsenvironment-injection--rx-22
      - id: shell-path-wrapper-sudo
