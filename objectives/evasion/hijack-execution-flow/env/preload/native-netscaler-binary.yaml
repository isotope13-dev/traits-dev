defaults:
  platforms: [netscaler, appliance, unix]
  for: [elf]
  attack: T1574.007

traits:
  - id: native-hidden-bin-dir
    desc: Native hidden bin dir
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.bin

  - id: native-c2-phase-token
    desc: Native C2 phase token
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "[PHASE] C2 Communication"

composite_rules:
  - id: native-netscaler-path-hijack
    desc: Native NetScaler PATH hijack
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/evasion/hijack-execution-flow/preload::native-path-hidden-bin
      - id: native-c2-phase-token
    any:
      - id: objectives/command-and-control/backdoor/tasking/socket::native-netscaler-cmd-token
      - id: native-hidden-bin-dir
