defaults:
  platforms: [netscaler, appliance, unix]
  for: [swift]
  attack: T1574.007

traits:
  - id: swift-path-hijack-dir
    desc: Swift PATH hijack dir
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.netscaler_bin

  - id: swift-setenv-path-hijack
    desc: Swift setenv PATH hijack
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Glibc\.setenv\("PATH", maliciousPath, 1\)'

  - id: swift-fake-ssh-wrapper
    desc: Swift fake SSH wrapper
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: SSH_HIJACK

composite_rules:
  - id: swift-path-command-hijack
    desc: Swift PATH command hijack
    crit: hostile
    conf: 0.98
    all:
      - id: swift-path-hijack-dir
      - id: swift-setenv-path-hijack
    any:
      - id: swift-fake-ssh-wrapper
