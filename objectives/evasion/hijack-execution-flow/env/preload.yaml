defaults:
  platforms:
    - unix
    - linux
    - macos
  crit: suspicious
  conf: 0.75
  attack: T1574.006
traits:
  - id: dyld-insert-libraries-string
    desc: DYLD_INSERT_LIBRARIES environment variable reference
    crit: notable
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
    if:
      type: string_literal
      exact: DYLD_INSERT_LIBRARIES
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  # Mach-O variant: embedded `__TEXT,__info_plist` carries an
  # LSEnvironment dict that sets DYLD_INSERT_LIBRARIES.  This is a
  # persistence/library-injection primitive declared at bundle level
  # so the OS itself sets the env var on every launch — far more
  # aggressive than a one-shot shell wrapper.
  - id: macho-info-plist-dyld-insert
    desc: Embedded Info.plist sets DYLD_INSERT_LIBRARIES
    crit: suspicious
    platforms: [macos]
    for: [macho]
    if:
      type: kv
      path: macho.info_plist.LSEnvironment.DYLD_INSERT_LIBRARIES
      exists: true
composite_rules:
  - id: ld-hijack-env
    desc: Dynamic linker hijacking via environment
    crit: suspicious
    conf: 0.8
    mbc: F0015
    any:
      - id: micro-behaviors/os/linker/env::ld-preload
      - id: micro-behaviors/os/linker/env::ld-audit
    downgrade:
      any:
        - id: well-known/tool/sysadmin/coreutils::stdbuf-tool
