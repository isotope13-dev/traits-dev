# Library Injection via Environment Variables
# Detects references to LD_PRELOAD and DYLD_INSERT_LIBRARIES
# ATT&CK: T1574.006 (Hijack Execution Flow: Dynamic Linker Hijacking)
defaults:
  platforms: [unix, linux, macos]
  crit: suspicious
  conf: 0.75
  attack: "T1574.006"
traits:
  - id: dyld-insert-libraries-string
    desc: DYLD_INSERT_LIBRARIES environment variable reference
    crit: notable
    platforms: [macos]
    for: [shell, python, javascript]
    if:
      type: string
      exact: "DYLD_INSERT_LIBRARIES"
    downgrade:
      any:
        - id: metadata/signed/platform::apple
composite_rules:
  - id: ld-hijack-env
    desc: Dynamic linker hijacking via environment
    crit: suspicious
    conf: 0.8
    mbc: "F0015"
    any:
      - id: micro-behaviors/os/linker/env::ld-preload
      - id: micro-behaviors/os/linker/env::ld-audit
    downgrade:
      any:
        - id: well-known/tools/sysadmin/coreutils::stdbuf-tool
