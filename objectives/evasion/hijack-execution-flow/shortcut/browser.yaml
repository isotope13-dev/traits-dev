defaults:
  platforms: [windows]
  for: [powershell, vbs, batch, pe, dll]
  attack: T1574
traits:
  - id: shortcut-target-wscript
    desc: Shortcut target set to WScript
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: (?i)\.TargetPath\s*=\s*["']?wscript\.exe
  - id: shortcut-browser-icon-preserved
    desc: Browser shortcut icon preserved
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: (?i)\.IconLocation\s*=.{0,80}(chromePath|chrome|msedge|Google Chrome)
  - id: shortcut-vbs-argument
    desc: Shortcut points to VBS payload
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (?i)\.Arguments\s*=.{0,80}(VBS_PATH|\.vbs)
  - id: vbs-payload-path-variable
    desc: VBS payload path variable
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (?i)\$VBS_PATH\s*=.{0,120}\.vbs
  - id: shortcut-backup-extension
    desc: Shortcut backup before hijack
    crit: notable
    conf: 0.78
    if:
      type: raw
      regex: (?i)\.lnk.{0,80}(\.bak|backup)
  - id: vbs-shell-execute-runas
    desc: VBS ShellExecute runas elevation
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: (?i)ShellExecute.{0,120}powershell\.exe.{0,160}runas
composite_rules:
  - id: browser-shortcut-uac-hijack
    desc: Browser shortcut UAC hijack
    crit: hostile
    conf: 0.98
    all:
      - id: shortcut-target-wscript
      - id: shortcut-browser-icon-preserved
      - id: shortcut-vbs-argument
      - id: vbs-payload-path-variable
    any:
      - id: vbs-shell-execute-runas
      - id: shortcut-backup-extension
