# Native Windows DLL proxy / side-loading launchers
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1574.002"
  mbc: "F0015"
composite_rules:
  - id: system-directory-proxy-launcher
    desc: DLL builds system path and launches target
    crit: hostile
    conf: 0.93
    all:
      - id: micro-behaviors/process/create/exec::winexec
      - id: micro-behaviors/fs/path/construct::construct-system-path
    any:
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
      - id: metadata/binary/metrics::minimal-exports
      - id: micro-behaviors/os/env/access::get-environment-strings
    needs: 2
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: trojanized-libvlc-proxy
    desc: Trojanized VLC proxy DLL with injection
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/symbols::vlc-export-compileby
      - id: metadata/binary/symbols::vlc-export-internalinit
      - id: metadata/binary/symbols::vlc-export-internalcleanup
      - id: metadata/binary/symbols::vlc-export-input-start
      - id: micro-behaviors/process/inject/runtime::queue-user-apc
      - id: micro-behaviors/communications/socket/init::wsa-startup
      - id: micro-behaviors/fs/traversal/drives::get-logical-drives
    unless:
      - id: metadata/binary/symbols::basename-libvlc-dll
