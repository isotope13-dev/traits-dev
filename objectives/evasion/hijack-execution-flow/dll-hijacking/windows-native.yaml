# Native Windows DLL proxy / side-loading launchers
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1574.002"
  mbc: "F0015"
composite_rules:
  - id: tiny-dll-winexec-proxy
    desc: Tiny DLL WinExec proxy launcher
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/metrics/pe-details::pe-dll-characteristics
      - id: micro-behaviors/process/create/exec::winexec
      - id: metadata/binary/metrics/size::tiny-pe
      - id: metadata/binary/metrics/structural::minimal-exports
      - id: metadata/signed/trust-level::unsigned-pe-executable
    any:
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
      - id: metadata/binary/resource::small-pe-no-resources
    needs: 2
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::is-microsoft-named
  - id: systemdir-winexec-mutex-proxy
    desc: System directory WinExec mutex proxy
    crit: suspicious
    conf: 0.91
    all:
      - id: metadata/binary/metrics/pe-details::pe-dll-characteristics
      - id: micro-behaviors/process/create/exec::winexec
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
    any:
      - id: metadata/binary/metrics/structural::minimal-exports
      - id: metadata/binary/resource::small-pe-no-resources
      - id: micro-behaviors/fs/path/construct::sprintf-format-api
    needs: 2
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
  - id: minimal-export-system-launcher
    desc: Minimal export system launcher DLL
    crit: suspicious
    conf: 0.89
    all:
      - id: metadata/binary/metrics/pe-details::pe-dll-characteristics
      - id: metadata/binary/metrics/structural::minimal-exports
      - id: micro-behaviors/process/create/exec::winexec
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
      - id: metadata/binary/resource::small-pe-no-resources
    any:
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
      - id: micro-behaviors/os/env/access::get-environment-strings
      - id: metadata/binary/metrics/structural::few-functions
    needs: 2
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
  - id: system-directory-proxy-launcher
    desc: DLL builds system path and launches target
    crit: hostile
    conf: 0.93
    all:
      - id: metadata/binary/metrics/pe-details::pe-dll-characteristics
      - id: micro-behaviors/process/create/exec::winexec
      - id: micro-behaviors/fs/path/construct::construct-system-path
    any:
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
      - id: metadata/binary/metrics/structural::minimal-exports
      - id: micro-behaviors/os/env/access::get-environment-strings
    needs: 2
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::is-microsoft-named
  - id: tiny-systemdir-dll-proxy-launcher
    desc: Tiny system-directory DLL proxy launcher
    crit: hostile
    conf: 0.94
    all:
      - id: tiny-dll-winexec-proxy
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
    any:
      - id: metadata/binary/resource::small-pe-no-resources
      - id: metadata/binary/metrics/structural::high-import-density
      - id: metadata/binary/metrics/structural::few-functions
    needs: 2
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
  - id: mutex-gated-system-command-dll
    desc: Mutex gated system command DLL
    crit: hostile
    conf: 0.95
    all:
      - id: systemdir-winexec-mutex-proxy
      - id: metadata/binary/metrics/structural::minimal-exports
      - id: metadata/binary/resource::small-pe-no-resources
    any:
      - id: metadata/binary/metrics/size::tiny-pe
      - id: metadata/binary/metrics/structural::high-import-density
      - id: micro-behaviors/os/env/access::get-environment-strings
    needs: 2
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
  - id: sparse-dll-system-launch-chain
    desc: Sparse DLL system launch chain
    crit: hostile
    conf: 0.93
    all:
      - id: minimal-export-system-launcher
      - id: metadata/binary/metrics/structural::few-functions
      - id: metadata/binary/metrics/structural::high-import-density
    any:
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
      - id: micro-behaviors/os/env/access::get-environment-strings
      - id: metadata/signed/trust-level::unsigned-pe-executable
    needs: 2
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
  - id: trojanized-libvlc-proxy
    desc: Trojanized VLC proxy DLL with injection
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/symbols/exports::vlc-export-compileby
      - id: metadata/binary/symbols/exports::vlc-export-internalinit
      - id: metadata/binary/symbols/exports::vlc-export-internalcleanup
      - id: metadata/binary/symbols/exports::vlc-export-input-start
      - id: micro-behaviors/process/inject/runtime/call::queue-user-apc
      - id: micro-behaviors/communications/socket/init::wsa-startup
      - id: micro-behaviors/fs/traversal/drives::get-logical-drives
    unless:
      - id: metadata/binary/symbols/exports::basename-libvlc-dll
