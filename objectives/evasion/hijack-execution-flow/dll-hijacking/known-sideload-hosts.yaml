# Legitimate signed executables and DLLs known to be abused as DLL
# sideloading hosts across multiple Chinese APT groups (APT41, Earth
# Alux, SHADOW-EARTH-053/054, Mustang Panda, Winnti). The presence of
# these specific binary names in non-default install paths or staging
# directories is a strong sideloading indicator regardless of family.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1574.002
  mbc: B0034
  size_min: 1024
  size_max: 500000000
traits:
  - id: gamehook-exe
    desc: GameHook.exe (OBS sideload host)
    crit: suspicious
    conf: 0.85
    if:
      type: path
      basename: true
      exact: GameHook.exe
      case_insensitive: true
  - id: imecmnt-exe
    desc: imecmnt.exe (Microsoft IME host)
    crit: suspicious
    conf: 0.8
    if:
      type: path
      basename: true
      exact: imecmnt.exe
      case_insensitive: true
  - id: xreport-exe
    desc: xReport.exe (Mainline sideload host)
    crit: suspicious
    conf: 0.9
    if:
      type: path
      basename: true
      exact: xReport.exe
      case_insensitive: true
  - id: lumanager-exe
    desc: LUManager.EXE (Samsung sideload host)
    crit: suspicious
    conf: 0.9
    if:
      type: path
      basename: true
      exact: LUManager.EXE
      case_insensitive: true
  - id: graphics-hook-filter32-dll
    desc: graphics-hook-filter32.dll (OBS sideload pair)
    crit: suspicious
    conf: 0.9
    if:
      type: path
      basename: true
      exact: graphics-hook-filter32.dll
      case_insensitive: true
  - id: imjp14k-dll
    desc: imjp14k.dll (IME sideload pair)
    crit: suspicious
    conf: 0.9
    if:
      type: path
      basename: true
      exact: imjp14k.dll
      case_insensitive: true
  - id: nvcontainer-renamed
    desc: nvcontainer.exe sideload rename target
    crit: suspicious
    conf: 0.7
    if:
      type: path
      basename: true
      exact: nvcontainer.exe
      case_insensitive: true
  - id: osppsvc-renamed
    desc: osppsvc.exe sideload rename target
    crit: suspicious
    conf: 0.7
    if:
      type: path
      basename: true
      exact: osppsvc.exe
      case_insensitive: true
  - id: ravcpl64-renamed
    desc: RAVCpl64.exe sideload rename target
    crit: suspicious
    conf: 0.75
    if:
      type: path
      basename: true
      exact: RAVCpl64.exe
      case_insensitive: true
  - id: cisco-collab-host
    desc: 'CiscoCollabHost.exe'
    crit: suspicious
    conf: 0.9
    if:
      type: path
      basename: true
      exact: CiscoCollabHost.exe
      case_insensitive: true
  - id: cisco-collab-host-pdb
    desc: 'CiscoCollabHost PDB path (sideload host ID)'
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])CiscoCollabHost\.pdb$'
composite_rules:
  - id: known-sideload-host-binary
    desc: Binary matches known APT sideload host
    crit: suspicious
    conf: 0.92
    any:
      - id: gamehook-exe
      - id: imecmnt-exe
      - id: xreport-exe
      - id: lumanager-exe
      - id: graphics-hook-filter32-dll
      - id: imjp14k-dll
      - id: nvcontainer-renamed
      - id: osppsvc-renamed
      - id: ravcpl64-renamed
      - id: cisco-collab-host
      - id: cisco-collab-host-pdb
