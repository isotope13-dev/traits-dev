defaults:
  platforms: [windows]
  for: [pe]
  attack: T1574.002
  mbc: F0015

traits:
  - id: runtime-dll-backup-name
    desc: Visual C++ runtime DLL backup name
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bvcruntime\d*(_\d+)?_backup(_[a-z0-9{}.-]{0,50})?\.dll\b'

composite_rules:
  - id: privileged-runtime-dll-replacement
    desc: Elevated installer bypasses PowerShell policy while replacing a runtime DLL
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/evasion/security-bypass/policy/execution::bypass-execution-policy
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: runtime-dll-backup-name
