# Detects sideload/hijack-DLL stubs produced by builder kits: unsigned PE DLLs
# with builder-style randomized PDB paths, hidden-API resolution tricks, and
# module-stomping target references. Companion to existing
# `objectives/evasion/process/injection::unsigned-module-stomping-target`
# (component) — promotes the combination to actionable suspicious/hostile.
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1574.002
  mbc: E1574.002
composite_rules:
  - id: builder-stub-pdb-unsigned-dll
    desc: Unsigned DLL with builder-style randomized PDB path
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/debug::pdb-multi-numeric-path
      - id: metadata/signed::unsigned
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/platform::microsoft

  - id: builder-stub-hijack-dll
    desc: Builder-stub sideload DLL (random PDB, module-stomp target, hidden API)
    crit: hostile
    conf: 0.95
    all:
      - id: builder-stub-pdb-unsigned-dll
    needs: 2
    any:
      - id: objectives/evasion/process/injection::module-stomping-target
      - id: objectives/anti-static/obfuscation/imports::hidden-advapi32-rtlgenrandom-resolution
      - id: metadata/binary/layout::pe-checksum-mismatch
      - id: objectives/anti-static/obfuscation/imports::pe-api-hashing-indicator-single
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/platform::microsoft
