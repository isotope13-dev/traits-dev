defaults:
  platforms: [windows]
  for: [oledoc]
  crit: hostile
  conf: 0.98
composite_rules:
  - id: sideload-exe2msi-winrar-sfx-sideload
    desc: exe2msi MSI with a WinRAR SFX archive that drops sideloadable DLLs
    all:
      - id: metadata/binary/installer/database::exe2msi-wrapper-package
      - id: metadata/binary/installer/database::embedded-winrar-sfx-package
      - id: objectives/command-and-control/dropper/execution/installer::msi-sideload-target-pair
