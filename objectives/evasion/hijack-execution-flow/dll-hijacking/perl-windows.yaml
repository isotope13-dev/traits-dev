defaults:
  platforms: [windows, unix]
  for: [perl]
  attack: T1574.002

traits:
  - id: perl-wininet-dll-target
    desc: Perl references wininet DLL
    crit: component
    conf: 0.86
    if:
      type: text
      substr: wininet.dll

  - id: perl-embedded-pe-dll-bytes
    desc: Perl embeds PE DLL bytes
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "pack\\('H\\*'[,\\s\\S]{0,80}'5A4D'"

  - id: perl-updatehelper-programdata
    desc: Perl ProgramData UpdateHelper path
    crit: component
    conf: 0.86
    if:
      type: text
      regex: "ProgramData[\\s\\S]{0,80}UpdateHelper"

composite_rules:
  - id: perl-programdata-dll-hijack
    desc: Perl ProgramData DLL hijack
    crit: hostile
    conf: 0.98
    all:
      - id: perl-wininet-dll-target
      - id: perl-embedded-pe-dll-bytes
      - id: perl-updatehelper-programdata
      - id: micro-behaviors/os/registry/keys::currentversion-run-perl-escaped
