defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1574.002
  mbc: F0015
composite_rules:
  - id: hnetcfg-proxy-dll-loader
    desc: hnetcfg proxy DLL loader
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/symbols::hnetcfg-firewall-export-surface
      - id: micro-behaviors/dylib/load::load-library-w
      - id: micro-behaviors/os/module/load::get-proc-address-import
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/crypto/library::crypt-decrypt
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: hnetcfg-encrypted-sideload-loader
    desc: hnetcfg encrypted sideload loader
    crit: hostile
    conf: 0.99
    all:
      - id: hnetcfg-proxy-dll-loader
      - id: micro-behaviors/crypto/library::crypt-acquire-context
      - id: micro-behaviors/crypto/library::crypt-import-key
      - id: micro-behaviors/crypto/library::crypt-decrypt
      - id: micro-behaviors/fs/file/read::read-file
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/thread/create::create-thread
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
