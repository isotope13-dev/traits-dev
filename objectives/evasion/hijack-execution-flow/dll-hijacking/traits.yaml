defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: proxy-execution-pattern
    desc: System binary proxy execution reference
    for:
      - python
      - javascript
      - typescript
    crit: notable
    conf: 0.92
    attack: T1218
    if:
      id: objectives/execution/lolbin/os::windows-lolbin
  - id: js-library-write
    desc: JavaScript writes DLL or SO file
    for:
      - javascript
      - typescript
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.(writeFile|writeFileSync|createWriteStream)\s*\([^)\n]{0,200}\.(dll|so)\b'
  - id: python-library-write
    desc: Python writes DLL, SO or dylib
    for:
      - python
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(open|Path)\s*\([^)\n]{0,240}\.(dll|so|dylib)\b[^)\n]{0,80}["'']w[b]?["'']'
  - id: python-side-load-subprocess
    desc: Python subprocess references EXE and DLL
    for:
      - python
    crit: suspicious
    conf: 0.92
    size_max: 20000
    if:
      type: text
      regex: 'subprocess\.(run|Popen|call)\(.{0,240}\.exe\b.{0,240}\.(dll|so)\b'
  - id: python-side-load-os-system
    desc: Python os.system references EXE and DLL
    for:
      - python
    crit: suspicious
    conf: 0.92
    size_max: 20000
    if:
      type: text
      regex: 'os\.system\(.{0,240}\.exe\b.{0,240}\.(dll|so)\b'
  - id: wine-drive-path
    desc: Wine drive_c path reference
    crit: component
    for: [python, javascript, typescript]
    if:
      type: string_literal
      regex: \.wine/drive_c
  - id: js-extension-classifier-dll
    desc: JavaScript file-extension classifier for DLL labels
    for:
      - javascript
      - typescript
    crit: component
    conf: 0.7
    if:
      type: text
      substr: 'if (/\\.dll$/i.test(filename))'
  - id: js-post-install-filename
    desc: JavaScript post-install filename
    for:
      - javascript
      - typescript
    crit: component
    conf: 0.7
    if:
      type: basename
      exact: post-install.js
composite_rules:
  - id: js-dll-injection
    desc: DLL injection via native APIs (JS)
    for:
      - javascript
      - typescript
    crit: suspicious
    conf: 0.95
    attack: T1055.001
    mbc: F0003
    any:
      - id: micro-behaviors/process/inject/dll::write-process-memory
      - id: micro-behaviors/process/inject/dll::create-remote-thread
      - id: micro-behaviors/process/inject/dll::load-library-a-dup
  - id: python-dll-injection
    desc: DLL injection via process manipulation (Python)
    for:
      - python
    crit: suspicious
    conf: 0.95
    attack: T1055.001
    mbc: F0003
    any:
      - id: objectives/evasion/process/injection/dll::dll-injection
      - id: objectives/evasion/process/injection/dll::obfuscated-injection
  - id: js-dll-side-loading
    desc: DLL side-loading pattern (JS)
    crit: suspicious
    conf: 0.95
    attack: T1574.002
    mbc: F0015
    for:
      - javascript
      - typescript
    size_max: 10000
    all:
      - id: micro-behaviors/fs/path/extension::exe-dup
    any:
      - id: micro-behaviors/fs/path/extension::dll-dup
      - id: micro-behaviors/fs/path/extension::so
    unless:
      - id: objectives/supply-chain/install-hook/scripts::postinstall-js-filename
      - id: js-extension-classifier-dll
      - id: js-post-install-filename
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/
        - id: metadata/package/versioning::pe-version-resource
  - id: js-ld-preload-hijacking
    desc: LD_PRELOAD dynamic linker hijacking (JS)
    crit: hostile
    conf: 0.95
    attack: T1574.006
    for:
      - javascript
      - typescript
    all:
      - id: objectives/evasion/hijack-execution-flow/preload::ld-preload-env
    downgrade:
      any:
        - id: metadata/package::has-tests
  - id: js-phantom-dll
    desc: Write DLL/SO then execute binary (JS)
    crit: hostile
    conf: 0.95
    attack: T1574.002
    for:
      - javascript
      - typescript
    all:
      - id: js-library-write
      - id: micro-behaviors/process/create/shell/lang::child-process-exec
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/
  - id: js-dll-hijacking
    desc: Comprehensive DLL hijacking (JS)
    crit: hostile
    conf: 0.95
    for:
      - javascript
      - typescript
    any:
      - id: js-dll-side-loading
      - id: js-ld-preload-hijacking
      - id: proxy-execution-pattern
      - id: js-dll-injection
      - id: js-phantom-dll
  - id: python-dll-side-loading
    desc: DLL side-loading pattern (Python)
    crit: hostile
    conf: 0.95
    attack: T1574.002
    mbc: F0015
    for:
      - python
    any:
      - id: python-side-load-subprocess
      - id: python-side-load-os-system
    unless:
      - id: wine-drive-path
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/
  - id: python-ld-preload-hijacking
    desc: LD_PRELOAD dynamic linker hijacking (Python)
    crit: hostile
    conf: 0.95
    attack: T1574.006
    for:
      - python
    all:
      - id: objectives/evasion/hijack-execution-flow/preload::ld-preload-env
    downgrade:
      any:
        - id: metadata/package::has-tests
  - id: python-phantom-dll
    desc: Write DLL/SO then execute binary (Python)
    crit: hostile
    conf: 0.95
    attack: T1574.002
    for:
      - python
    all:
      - id: python-library-write
      - id: micro-behaviors/process/create/subprocess::process-execution
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/
  - id: python-dll-hijacking
    desc: Comprehensive DLL hijacking (Python)
    crit: hostile
    conf: 0.95
    for:
      - python
    any:
      - id: python-dll-side-loading
      - id: python-ld-preload-hijacking
      - id: proxy-execution-pattern
      - id: python-dll-injection
      - id: python-phantom-dll
