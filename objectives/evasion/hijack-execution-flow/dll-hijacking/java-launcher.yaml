defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1574.002"
  mbc: "F0015"
composite_rules:
- id: java-launcher-proxy-dll
  desc: Java launcher proxy DLL side-loading
  crit: suspicious
  conf: 0.96
  all:
  - id: metadata/binary/framework::java-launcher-proxy-exports
  # Requires at least one dynamic-loading API — the malicious proxy
  # must find and call into the real JVM at runtime. The legitimate
  # jar.exe/java.exe is statically linked to jli.dll and imports
  # none of these; an impostor must dynamically resolve them.
  any:
  - id: micro-behaviors/os/module/load::get-module-filename-dup
  - id: micro-behaviors/dylib/load/runtime::load-library-ex-w
  - id: micro-behaviors/dylib/lookup::get-proc-address
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/binary/vendor::is-microsoft-named
