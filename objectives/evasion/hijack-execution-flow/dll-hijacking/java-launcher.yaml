defaults:
  for: [pe]
  platforms: [windows]
  attack: "T1574.002"
  mbc: "F0015"
composite_rules:
  - id: java-launcher-proxy-dll
    desc: Java launcher proxy DLL side-loading
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/binary/framework::java-launcher-proxy-exports
    any:
      - id: micro-behaviors/os/module/load::get-module-filename-dup
      - id: micro-behaviors/dylib/load::load-library-ex-w
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: metadata/binary/framework::java-launcher-proxy-exe
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: java-launcher-padded-jvm-carrier
    desc: Java launcher padded JVM carrier
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/framework::java-launcher-runtime-loader
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::large-data-section
      - id: objectives/anti-static/obfuscation/payload/section::low-entropy-data-padding-carrier
      - id: objectives/anti-static/obfuscation/payload/section::extreme-dominant-section
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: metadata/binary/layout::pe-checksum-zeroed
      - id: objectives/evasion/indicator-removal/timestamps::export-timestamp-maxval
    needs: 3
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
