defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1574.002"
  mbc: "F0015"
composite_rules:
  - id: java-launcher-proxy-dll
    desc: Java launcher proxy DLL side-loading
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/format/pe::java-launcher-proxy-exports
    any:
      - id: objectives/execution/module/load::get-module-filename-dup
      - id: micro-behaviors/dylib/load::load-library-ex-w
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: metadata/format/pe::java-launcher-proxy-exe
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
