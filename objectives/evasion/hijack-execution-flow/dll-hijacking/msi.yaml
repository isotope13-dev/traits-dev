defaults:
  platforms: [windows]
  for: [oledoc]

composite_rules:
  - id: adobe-msi-mscorsvc-sideload-bundle
    desc: Adobe MSI bundles an obfuscated mscorsvc sideload DLL
    crit: hostile
    conf: 0.99
    attack: T1574.002,T1036.005
    all:
      - id: metadata/file/profile/identity::msi-runtime-file-table-pair
      - id: objectives/command-and-control/dropper/sideload::sideload-target-mscorsvc
      - id: metadata/file/profile/identity::msi-runtime-launch-action
      - id: metadata/binary/installer/runtime::msi-adobe-acrobat-branding
      - id: metadata/package/files/msi::msi-wix-toolset-branding
