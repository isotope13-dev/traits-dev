defaults:
  platforms: [unix]
  for: [javascript]
  attack: T1574

traits:
  - id: node-module-load-hook
    desc: Node module load hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Module._load

  - id: node-hidden-module-inject
    desc: Node hidden module inject
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: NODE_OPTIONS

  - id: node-ld-preload-env-inject
    desc: Node LD_PRELOAD env inject
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: LD_PRELOAD

composite_rules:
  - id: node-module-loader-hijack
    desc: Node module loader hijack
    crit: hostile
    conf: 0.98
    all:
      - id: node-module-load-hook
      - id: node-hidden-module-inject
      - id: node-ld-preload-env-inject
