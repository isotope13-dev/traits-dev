defaults:
  platforms: [unix]
  for: [javascript]
  attack: T1574

traits:
  - id: node-module-load-hook
    desc: Node module load hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Module._load
    unless:
      - id: node-runtime-require-guard-context

  - id: node-hidden-module-inject
    desc: Node hidden module inject
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: NODE_OPTIONS
    unless:
      - id: well-known/tool/development/yarn::yarn-cli-bundle-marker

  - id: node-ld-preload-env-inject
    desc: Node LD_PRELOAD env inject
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: LD_PRELOAD

  - id: node-runtime-require-guard-context
    desc: Node runtime require guard context
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'forbiddenStartupRequires|Forbidden startup runtime require|Runtime dependency guard'

composite_rules:
  - id: node-module-loader-hijack
    desc: Node module loader hijack
    crit: hostile
    conf: 0.98
    all:
      - id: node-module-load-hook
      - id: node-hidden-module-inject
      - id: node-ld-preload-env-inject
