defaults:
  platforms: [unix]
  for: [javascript]
  attack: T1574

traits:
  - id: node-hidden-module-inject
    desc: Node hidden module inject
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: NODE_OPTIONS
    unless:
      - id: well-known/tool/development/yarn::yarn-cli-bundle-marker

  - id: node-ld-preload-env-inject
    desc: Node LD_PRELOAD env inject
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: LD_PRELOAD
    unless:
      - id: well-known/app/vscode-marketplace::bwat-dev-vsix
      - id: well-known/app/vscode-marketplace::bwat-dev-member-path
      - id: well-known/app/qwen-code::qwen-code-bundle-text
      - id: well-known/lib/aws-sdk-js/

  - id: node-runtime-require-guard-marker
    desc: Node runtime require guard marker
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'forbiddenStartupRequires|Forbidden startup runtime require|Runtime dependency guard'

composite_rules:
  - id: node-module-polyfill-stub-context
    desc: Node module polyfill stub
    crit: exception
    near_lines: 80
    all:
      - id: metadata/library/structure::node-module-empty-object
      - id: metadata/library/structure::node-module-load-local-stub
      - id: metadata/library/structure::node-module-default-export

  - id: node-module-loader-hijack
    desc: Node module loader hijack
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/hook/interception::node-module-load-hook
      - id: node-hidden-module-inject
      - id: node-ld-preload-env-inject
    unless:
      - id: node-module-polyfill-stub-context
      - id: node-runtime-require-guard-marker
      - id: well-known/app/tabby/
      - id: well-known/tool/development/yarn::yarn-cli-bundle-marker
      - id: well-known/app/windows-desktop-tools::hyper-plugin-loader
      - id: metadata/package/testing/presence/harness::spec-test-filename
