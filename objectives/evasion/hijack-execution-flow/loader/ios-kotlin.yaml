defaults:
  platforms: [ios]
  for: [kotlin]
  attack: T1574

traits:
  - id: kotlin-ios-signal-handler-hijack
    desc: Kotlin iOS signal handler hijack
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'signal\s*\(\s*SIGSEGV[\s\S]{0,80}SIG_IGN'

  - id: kotlin-ios-ldpreload-intercept
    desc: Kotlin iOS LD_PRELOAD intercept config
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'INTERCEPT=open,close,read,write|ld_intercept\.conf'

composite_rules:
  - id: kotlin-ios-execution-flow-hijack
    desc: Kotlin iOS execution flow hijack
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-ios-signal-handler-hijack
      - id: kotlin-ios-ldpreload-intercept
