defaults:
  platforms: [unix, windows]
  for: [java, class, jar]
  attack: T1574

traits:
  - id: java-security-manager-hook
    desc: Java SecurityManager hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'new SecurityManager\(\)[\s\S]{0,420}check(Read|Connect)'

  - id: java-system-stream-reflection
    desc: Java System stream reflection
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'System\.class\.getDeclaredField\("out"\)[\s\S]{0,260}setAccessible\(true\)'

  - id: java-attach-api-reflection
    desc: Java Attach API reflection
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'com\.sun\.tools\.attach\.VirtualMachine[\s\S]{0,260}getMethod\("attach"'

composite_rules:
  - id: java-runtime-flow-hijack
    desc: Java runtime flow hijack
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: micro-behaviors/process/interpreter/runtime/jvm::java-custom-classloader-load
      - id: java-security-manager-hook
      - id: java-system-stream-reflection
      - id: java-attach-api-reflection
