defaults:
  platforms: [unix]
  for: [java, class, java_class, jar]
  attack: T1574

traits:
  - id: jvm-classloader-intercept
    desc: JVM ClassLoader intercept
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: CLASSLOAD_INTERCEPT

  - id: jvm-classloader-intercept-bytes
    desc: JVM ClassLoader intercept bytes
    crit: suspicious
    conf: 0.92
    for: [java_class]
    if:
      type: hex
      pattern: 43 4C 41 53 53 4C 4F 41 44 5F 49 4E 54 45 52 43 45 50 54

  - id: jvm-securitymanager-intercept
    desc: JVM SecurityManager intercept
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'setSecurityManager[\s\S]{0,260}EXEC_INTERCEPT'

  - id: jvm-security-intercept-bytes
    desc: JVM security intercept bytes
    crit: suspicious
    conf: 0.92
    for: [java_class]
    if:
      type: hex
      pattern: 45 58 45 43 5F 49 4E 54 45 52 43 45 50 54

  - id: jvm-runtime-exec-reflect
    desc: JVM Runtime exec reflect
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "HIJACK: Runtime.exec method located"

composite_rules:
  - id: jvm-exec-flow-intercept
    desc: JVM exec flow intercept
    crit: hostile
    conf: 0.98
    any:
      - id: jvm-classloader-intercept
      - id: jvm-securitymanager-intercept
      - id: jvm-runtime-exec-reflect
    needs: 2

  - id: jvm-bytecode-exec-intercept
    desc: JVM bytecode exec intercept
    crit: hostile
    conf: 0.97
    for: [java_class]
    any:
      - id: jvm-classloader-intercept-bytes
      - id: jvm-security-intercept-bytes
