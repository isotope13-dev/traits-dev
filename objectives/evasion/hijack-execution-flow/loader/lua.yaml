defaults:
  platforms: [unix, fortios]
  for: [lua]
  attack: T1574

traits:
  - id: lua-package-searchers-replace
    desc: Lua package.searchers replacement
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'package\.searchers\s*=\s*\{'

  - id: lua-os-execute-wrapper
    desc: Lua os.execute wrapper
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'orig_execute[\s\S]{0,260}real_os\.execute\s*=\s*function'

  - id: lua-persist-loader-path
    desc: Lua persist loader path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.lua_persist_loader

composite_rules:
  - id: lua-module-loader-hijack
    desc: Lua module loader hijack
    crit: hostile
    conf: 0.98
    all:
      - id: lua-package-searchers-replace
    any:
      - id: lua-os-execute-wrapper
      - id: lua-persist-loader-path
