defaults:
  attack: T1070.003
  platforms: [linux, unix, android, macos, ios]
traits:
  - id: history-clear-shell-cmd
    desc: Clear shell history files
    crit: suspicious
    conf: 0.8
    for: [elf, shell]
    if:
      type: string_value
      regex: \.ksh_history
  - id: history-clear-env-var
    desc: Clear shell history via env var
    crit: suspicious
    conf: 0.8
    for: [elf, shell]
    if:
      id: micro-behaviors/os/env/vars::histfile-dev-null
  - id: sed-deletion-pattern
    desc: sed command for pattern deletion
    crit: suspicious
    conf: 0.8
    for: [elf, shell]
    if:
      type: string_value
      regex: (sed\s+-i\s+['"][^'"]{0,120}/d['"]|sed\s+-i\s+['"]s/[^/]{1,120}//g?['"])
  - id: deleted-process-cleanup
    desc: Cleanup deleted process references
    crit: suspicious
    conf: 0.85
    for: [elf, shell]
    if:
      type: string_value
      regex: grep\s+deleted.{0,80}/proc
  - id: pkill-signal-9
    desc: pkill with kill -9 signal
    crit: notable
    conf: 0.8
    for: [elf, shell]
    if:
      type: string_value
      regex: (killall -9|kill\s+-9)
  - id: find-delete-pattern
    desc: find with delete operation
    crit: suspicious
    conf: 0.8
    for: [elf, shell]
    if:
      type: string_value
      regex: ((^|\s)find\s+.{0,50}-exec\s+rm|(^|\s)find\s+.{0,50}-delete\b)
    unless:
      - type: raw
        substr: gcc
      - type: raw
        substr: gcov
  - id: cron-removal
    desc: Cron job removal
    crit: suspicious
    conf: 0.85
    for: [elf, shell]
    if:
      type: string_value
      regex: (rm -f /etc/cron|crontab -r)
  - id: systemd-cleanup
    desc: Systemd service removal
    crit: suspicious
    conf: 0.85
    for: [elf, shell]
    if:
      type: string_value
      substr: "rm -f /etc/systemd/system/"
  - id: syslog-truncate
    desc: System log truncation
    crit: suspicious
    conf: 0.8
    for: [elf, shell]
    if:
      type: string_value
      regex: (> /var/log/|cat /dev/null > /var/log/|truncate -s 0|>/var/log/[a-z]+\.log)
  - id: wtmp-utmp-clear
    desc: wtmp/utmp login log clearing
    crit: suspicious
    conf: 0.85
    for: [shell]
    if:
      type: string_value
      regex: (/var/log/utmp|/var/run/utmp)
  - id: history-clear-shell
    desc: Clear shell history
    crit: suspicious
    conf: 0.8
    for: [elf, shell]
    if:
      type: string_value
      regex: rm -f ~/\.bash_history|cat /dev/null > ~/\.bash_history
composite_rules:
  - id: history-cleanup
    desc: Shell history cleanup
    crit: suspicious
    conf: 0.8
    for: [elf, shell]
    needs: 2
    any:
      - id: history-clear-shell
      - id: history-clear-shell-cmd
      - id: history-clear-env-var
  - id: process-cleanup
    desc: Process trace cleanup
    crit: suspicious
    conf: 0.85
    for: [elf, shell]
    needs: 2
    any:
      - id: deleted-process-cleanup
      - id: pkill-signal-9
      - id: find-delete-pattern
  - id: persistence-cleanup
    desc: Persistence mechanism cleanup
    crit: suspicious
    conf: 0.85
    for: [elf, shell]
    needs: 2
    any:
      - id: cron-removal
      - id: systemd-cleanup
  - id: log-cleanup
    desc: System log cleanup
    crit: suspicious
    conf: 0.85
    for: [elf, shell]
    needs: 2
    any:
      - id: syslog-truncate
      - id: wtmp-utmp-clear
  - id: comprehensive-evidence-removal
    desc: Comprehensive evidence removal pattern
    crit: hostile
    conf: 0.9
    for: [elf, shell]
    mbc: E1006
    needs: 3
    any:
      - id: history-cleanup
      - id: process-cleanup
      - id: persistence-cleanup
      - id: log-cleanup
