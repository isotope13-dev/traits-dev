defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1562

traits:
  - id: unix-sensitive-unlock-targets
    desc: Unix sensitive unlock target list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,180}/etc/passwd[\s\S]{0,180}/etc/sudoers'
  - id: unix-unlock-permission-calls
    desc: Unix chmod flock chown unlock calls
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bchmod\b[\s\S]{0,700}\bflock\b[\s\S]{0,700}\bchown\b'
  - id: unix-chmod-unlock-symbol
    desc: Unix chmod unlock symbol
    crit: component
    conf: 0.86
    if:
      type: text
      substr: chmod
    unless:
      - id: well-known/app/drivers::nvidia-linux-driver-component
      - id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: unix-flock-unlock-symbol
    desc: Unix flock unlock symbol
    crit: component
    conf: 0.86
    if:
      type: text
      substr: flock
    unless:
      - id: well-known/app/drivers::nvidia-linux-driver-component
      - id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: unix-chown-unlock-symbol
    desc: Unix chown unlock symbol
    crit: component
    conf: 0.86
    if:
      type: text
      substr: chown
    unless:
      - id: well-known/app/drivers::nvidia-linux-driver-component
      - id: metadata/file/extension::linux-kernel-package-artifact-basename
composite_rules:
  - id: unix-sensitive-path-unlock-targets
    desc: Unix sensitive unlock targets
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/config/privesc::etc-sudoers
  - id: unix-unlock-symbol-cluster
    desc: Unix unlock syscall cluster
    crit: component
    conf: 0.9
    all:
      - id: unix-chmod-unlock-symbol
      - id: unix-flock-unlock-symbol
      - id: unix-chown-unlock-symbol
    unless:
      - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: unix-sensitive-file-unlock
    desc: Unix sensitive file unlock
    crit: hostile
    conf: 0.98
    all:
      - id: unix-sensitive-path-unlock-targets
      - id: unix-unlock-permission-calls
  - id: unix-sensitive-file-unlock-binary
    desc: Unix binary sensitive file unlock
    crit: hostile
    conf: 0.96
    for: [elf]
    all:
      - id: unix-sensitive-path-unlock-targets
      - id: unix-unlock-symbol-cluster
      - id: micro-behaviors/os/service/config::sshd-config-path
