defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1562

traits:
  - id: node-chflags-nouchg
    desc: Node chflags nouchg
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: chflags nouchg

  - id: node-chmod-user-rw
    desc: Node chmod user rw
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: chmod u+rw

  - id: node-xattr-clear
    desc: Node executes xattr clear
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: execSync(`xattr -c

composite_rules:
  - id: node-macos-file-unlock
    desc: Node macOS file unlock
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: node-chflags-nouchg
      - id: node-chmod-user-rw
      - id: node-xattr-clear
