defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
  attack: T1565.001
  mbc: F0004
traits:
- id: windows-hosts-filestream-create
  desc: Creates FileStream for hosts file overwrite
  crit: suspicious
  conf: 0.93
  platforms:
  - windows
  for:
  - csharp
  if:
    type: text
    regex: 'new\s+FileStream\s*\(\s*this\.dirho\s*,\s*FileMode\.Create\s*\)'
- id: windows-hosts-webrequest-create
  desc: Builds WebRequest for hosts payload
  crit: suspicious
  conf: 0.9
  platforms:
  - windows
  for:
  - csharp
  if:
    type: text
    regex: 'WebRequest\.Create\s*\(\s*this\.verurl\(\)\s*\)'
- id: hidden-hosts-refresh-counter
  desc: Timer counter triggers hosts refresh interval
  crit: component
  conf: 0.9
  platforms:
  - windows
  for:
  - csharp
  if:
    type: text
    regex: 'this\.@int\s*==\s*3600'
- id: hidden-hosts-refresh-call
  desc: Timer tick calls hosts refresh function
  crit: component
  conf: 0.88
  platforms:
  - windows
  for:
  - csharp
  if:
    type: text
    regex: 'Timer1_Tick[\s\S]{0,220}this\.downhost\s*\('
- id: windows-hosts-template-path
  desc: Windows hosts path format string
  crit: suspicious
  conf: 0.85
  platforms:
  - windows
  if:
    type: text
    regex: (?i)%s\\drivers\\etc\\hosts
- id: windows-hosts-backup-template
  desc: Hosts backup template reference
  crit: suspicious
  conf: 0.85
  platforms:
  - windows
  if:
    type: text
    regex: (?i)%s\\hosts\.sam
- id: av-update-domain-a
  desc: AV update domain (Kaspersky/Avast/AVG)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)(update|download)\.(kaspersky|avast|avg)\.
- id: av-update-domain-b
  desc: AV update domain (Bitdefender/ESET/Sophos)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)(update|download)\.(bitdefender|eset|sophos)\.
- id: av-update-domain-c
  desc: AV update domain (McAfee/Norton/Symantec)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)(update|download)\.(mcafee|norton|symantec)\.
- id: microsoft-security-domain
  desc: Microsoft security domain string
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)(windowsupdate|smartscreen|wdcp)\.microsoft\.com
- id: microsoft-telemetry-domain
  desc: Microsoft telemetry domain string
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (?i)(telemetry|diagnostics|crashpad\.telemetry)\.microsoft\.com
- id: google-security-domain
  desc: Google security update domain
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (?i)(safebrowsing|clientservices|update|reporting)\.googleapis\.com
- id: escan-security-domain--rx-1
  desc: download.escanav.com (eScan update host)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "download[.-]escanav"
    case_insensitive: true
  count_max: 1023013
- id: escan-security-domain--rx-2
  desc: esupdate (eScan update host)
  crit: component
  conf: 0.85
  # Token match so the eScan update hostname matches but mid-word substrings
  # ("LicensesUpdated", "ServicesUpdate") no longer false-positive.
  if:
    type: text
    word: esupdate
    case_insensitive: true
  count_max: 1023014
- id: escan-security-domain--rx-3
  desc: escanav (eScan core domain)
  crit: component
  conf: 0.85
  if:
    type: text
    substr: escanav
    case_insensitive: true
  count_max: 1023015
- id: escan-security-domain--rx-4
  desc: patch.escanav (eScan patch host)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "patch[.-]escanav"
    case_insensitive: true
  count_max: 1023016
- id: escan-security-domain--rx-5
  desc: live.escanav (eScan live host)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "live[.-]escanav"
    case_insensitive: true
  count_max: 1023017
- id: escan-security-domain--rx-6
  desc: mwti (MicroWorld eScan parent)
  crit: component
  conf: 0.85
  if:
    type: text
    word: mwti
  count_max: 1023018
- id: localhost-redirect-pattern
  desc: Localhost IP with domain redirect pattern
  crit: notable
  conf: 0.85
  size_min: 1200
  count_min: 3
  if:
    type: text
    regex: 127\.0\.0\.1\s+\S+\.(com|net|org)
  not:
  - substr: sample HOSTS file used by Microsoft TCP/IP for Windows.
  - substr: '#-iris-'
  - substr: '/Windows/system32/drivers/etc/hosts, on Linux: /etc/hosts'
- id: null-redirect-pattern
  desc: Null IP redirect pattern (0.0.0.0)
  crit: notable
  conf: 0.85
  size_min: 1200
  count_min: 3
  if:
    type: text
    regex: 0\.0\.0\.0\s+\S+\.(com|net|org)
  not:
  - substr: sample HOSTS file used by Microsoft TCP/IP for Windows.
  - substr: '#-iris-'
  - substr: '/Windows/system32/drivers/etc/hosts, on Linux: /etc/hosts'
- id: hosts-managed-sentinel-line
  desc: Hosts managed sentinel lines
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: (?i)^#\s+(BEGIN|END)\s+[A-Za-z0-9_-]{0,30}
  not:
  - regex: (?i)^#\s+(BEGIN|END)\s+(MARKER|AUTO-GENERATED\b)
  unless:
  - id: metadata/package/testing/presence/harness/
  - id: well-known/app/maester/
- id: hosts-adblock-token
  desc: Hosts adblock marker token
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)(ADBLOCK|ADAWAY|ADWARE)\b
- id: hosts-block-token
  desc: Hosts blocklist marker token
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)(HOSTS[- ]?BLOCK|HOSTSBLOCK|BLOCKLIST)\b
- id: hosts-security-block-token
  desc: Hosts security block token
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)(MALWARE|AV[- ]?BLOCK|SECURITY[- ]?BLOCK)\b
- id: hosts-stevenblack-token
  desc: Hosts StevenBlack marker token
  crit: component
  conf: 0.9
  if:
    type: text
    word: STEVENBLACK
    case_insensitive: true
- id: hosts-null-route-comment
  desc: Explicit 0.0.0.0 null-route comment
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (?i)^#[^\n]{0,120}null[- ]route
  unless:
  - id: well-known/app/wazuh/
  - id: metadata/package/testing/presence/harness::test-directory-path
- id: hosts-null-route-target-comment
  desc: 'Redirect target: 0.0.0.0 comment'
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (?i)^#[^\n]{0,120}redirect\s+target\s*:\s*0\.0\.0\.0
- id: hosts-av-null-route-a
  desc: 'hosts av null route a'
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 0\.0\.0\.0\s+\S+\.(malwarebytes|kaspersky)\.
    case_insensitive: true
- id: hosts-av-null-route-b
  desc: "ESET/McAfee/Symantec hosts null-route"
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 0\.0\.0\.0\s+\S+\.(eset|mcafee|symantec|norton)\.
    case_insensitive: true
- id: hosts-av-null-route-c
  desc: 'hosts av null route c'
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 0\.0\.0\.0\s+\S+\.(bitdefender|sophos|avg|avast)\.
    case_insensitive: true
- id: hosts-av-null-route-d
  desc: 'hosts av null route d'
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 0\.0\.0\.0\s+\S+\.(kaspersky-labs|trendmicro|f-secure)\.
    case_insensitive: true
- id: hosts-escan-null-route
  desc: 0.0.0.0 null-route targeting eScan updates
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 0\.0\.0\.0\s+\S*\b(escanav|mwti)\.com\b
    case_insensitive: true
- id: av-hosts-block-manage-token
  desc: AV-hosts-block management token
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (?i)-AvHostsBlock(Apply|Revert)\b
- id: juniper-security-domain
  desc: Juniper security domain string
  crit: component
  conf: 0.9
  platforms: [junos, appliance, unix]
  for: [c, elf]
  if:
    type: text
    regex: '(security|updates|support|telemetry)\.juniper\.net'
- id: juniper-security-domain-set
  desc: Juniper security domain set
  crit: suspicious
  conf: 0.94
  platforms: [junos, appliance, unix]
  for: [c, elf]
  if:
    type: text
    regex: 'security\.juniper\.net[\s\S]{0,80}updates\.juniper\.net'
- id: juniper-security-host
  desc: Juniper security host
  crit: component
  conf: 0.9
  platforms: [junos, appliance, unix]
  for: [c, elf]
  if:
    type: text
    substr: security.juniper.net
- id: juniper-updates-host
  desc: Juniper updates host
  crit: component
  conf: 0.9
  platforms: [junos, appliance, unix]
  for: [c, elf]
  if:
    type: text
    substr: updates.juniper.net
- id: juniper-telemetry-host
  desc: Juniper telemetry host
  crit: component
  conf: 0.9
  platforms: [junos, appliance, unix]
  for: [c, elf]
  if:
    type: text
    substr: telemetry.juniper.net
- id: juniper-hosts-redirects
  desc: Juniper domains redirected in hosts
  crit: suspicious
  conf: 0.95
  platforms: [junos, appliance, unix]
  for: [c, elf]
  count_min: 3
  if:
    type: text
    regex: '127\.0\.0\.1[\t ]+[A-Za-z0-9.-]+\.juniper\.net'
- id: source-hosts-file-macro
  desc: Source hosts file macro
  crit: suspicious
  conf: 0.9
  for: [c]
  if:
    type: text
    regex: 'HOSTS_FILE\s+"/etc/hosts"'
- id: native-hosts-replace-flow
  desc: Native hosts temp replace flow
  crit: suspicious
  conf: 0.9
  for: [c, elf]
  if:
    type: text
    regex: '/etc/hosts[\s\S]{0,700}\.tmp[\s\S]{0,700}rename'
- id: native-hosts-backup-replace
  desc: Native hosts backup replace flow
  crit: suspicious
  conf: 0.9
  for: [c, elf]
  if:
    type: text
    regex: '\.bak[\s\S]{0,900}/etc/hosts'
- id: source-hosts-rename-call
  desc: Source hosts rename call
  crit: suspicious
  conf: 0.92
  for: [c]
  if:
    type: text
    substr: rename(tmp_path, HOSTS_FILE)
- id: zig-packed-hosts-path
  desc: Zig packed hosts path
  crit: component
  conf: 0.9
  platforms: [unix]
  for: [zig]
  if:
    type: symbol
    kind: identifier
    exact: PACKED_HOSTS_PATH
- id: zig-hosts-create-write-flow
  desc: Zig hosts create write flow
  crit: suspicious
  conf: 0.92
  platforms: [unix]
  for: [zig]
  if:
    type: text
    regex: 'createFile\(hosts_path[\s\S]{0,260}writeAll\(new_content\.items\)'
- id: loopback-security-sinkholes
  desc: Loopback security sinkholes
  crit: suspicious
  conf: 0.92
  platforms: [unix]
  for: [source]
  count_min: 4
  if:
    type: literal
    regex: '^127\.0\.0\.1\s+[A-Za-z0-9.-]*(antimalware|security|telemetry|abuse)'

composite_rules:
- id: junos-security-domain-targets
  desc: Junos security domain targets
  crit: suspicious
  conf: 0.96
  platforms: [junos, appliance, unix]
  for: [c, elf]
  any:
  - id: juniper-hosts-redirects
  - id: juniper-security-domain-set
  - id: juniper-security-domain-cluster
- id: juniper-security-domain-cluster
  desc: Juniper security domain cluster
  crit: suspicious
  conf: 0.95
  platforms: [junos, appliance, unix]
  for: [c, elf]
  all:
  - id: juniper-security-host
  - id: juniper-updates-host
  - id: juniper-telemetry-host
- id: native-hosts-replacement
  desc: Native hosts replacement flow
  crit: suspicious
  conf: 0.94
  for: [c, elf]
  # Requires at least one hosts-specific rewrite flow (each sub-trait already
  # co-locates /etc/hosts with a temp/backup/rename/macro). The bare `rename`
  # symbol and a lone `/etc/hosts` reference can no longer satisfy this rule on
  # their own, which avoids firing on glibc/Go binaries that merely call
  # rename(2) and mention /etc/hosts (dirmngr, micro, git-lfs, zig).
  any:
  - id: native-hosts-replace-flow
  - id: source-hosts-rename-call
  - id: source-hosts-file-macro
  - id: native-hosts-backup-replace
- id: zig-hosts-security-sinkhole
  desc: Zig hosts security sinkhole
  crit: hostile
  conf: 0.98
  platforms: [unix]
  for: [zig]
  all:
  - id: zig-packed-hosts-path
  - id: zig-hosts-create-write-flow
  - id: loopback-security-sinkholes
- id: hosts-managed-block-marker
  desc: Managed hosts block sentinel
  crit: suspicious
  conf: 0.9
  # Require an actual hosts-file reference. Without it, generic "# BEGIN/END"
  # comment blocks plus the word BLOCK fire on unrelated binaries (git, named,
  # glilypond) that carry sentinel-style comments and the word "block".
  all:
  - id: hosts-managed-sentinel-line
  - id: hosts-file-path
  any:
  - id: hosts-adblock-token
  - id: hosts-block-token
  - id: hosts-security-block-token
  - id: hosts-stevenblack-token
  not:
  - regex: (?i)^#\s+(BEGIN|END)\s+(MARKER|AUTO-GENERATED\b)
  unless:
  - id: metadata/package/testing/presence/harness/
  - id: well-known/app/maester/
- id: junos-security-hosts-block
  desc: Junos security hosts blocking
  crit: hostile
  conf: 0.98
  platforms: [junos, appliance, unix]
  for: [c, elf]
  all:
  - id: junos-security-domain-targets
  - id: native-hosts-replacement
  any:
  - id: juniper-security-domain
  - id: micro-behaviors/fs/path/config/system::config-hosts
- id: hosts-hijacker-messenger-masquerade
  desc: Hosts hijacker mimics Windows Live Messenger
  crit: hostile
  conf: 0.97
  platforms: [windows]
  for: [pe]
  all:
  - id: windows-hosts-overwrite-download
  - id: objectives/evasion/masquerade/identity/mimicry::windows-live-messenger-masquerade
  any:
  - id: objectives/evasion/security-bypass/policy/uac::disable-uac-policy-set
  - id: objectives/impact/degrade/system/recovery::disable-system-restore
  - id: objectives/persistence/login/self-install/copy::system32-messenger-self-install
  needs: 2
- id: windows-hosts-download-loop
  desc: HTTP response writes hosts payload
  crit: suspicious
  conf: 0.92
  platforms:
  - windows
  for:
  - csharp
  all:
  - id: windows-hosts-webrequest-create
  - id: windows-hosts-filestream-create
  any:
  - id: micro-behaviors/data/control-flow/loop::infinite-loop-header
  - id: micro-behaviors/os/registry/manipulate::set-value
- id: hosts-file-path
  desc: Hosts file path reference
  crit: notable
  conf: 0.7
  any:
  - id: micro-behaviors/fs/path/config/system::windows-hosts-file
  - id: windows-hosts-template-path
  - id: windows-hosts-backup-template
  - id: micro-behaviors/fs/path/config/system::config-hosts
- id: av-update-domain
  desc: AV/EDR update domain reference
  crit: component
  conf: 0.85
  any:
  - id: av-update-domain-a
  - id: av-update-domain-b
  - id: av-update-domain-c
- id: threat-intel-domain
  desc: Threat intelligence service domain
  crit: component
  conf: 0.8
  any:
  - id: well-known/tool/detection/threat-intel::virustotal
  - id: objectives/anti-analysis/sandbox-detect/tool-references::any-run
- id: security-domain
  desc: Security-related domain reference
  crit: component
  conf: 0.8
  any:
  - id: av-update-domain
  - id: microsoft-security-domain
  - id: microsoft-telemetry-domain
  - id: google-security-domain
  - id: escan-security-domain
  - id: threat-intel-domain
- id: hosts-av-blocking
  desc: Hosts file modification to block AV domains
  crit: hostile
  conf: 0.95
  all:
  - id: hosts-file-path
  - id: security-domain
  any:
  - id: bulk-domain-blocking
  - id: windows-hosts-tamper-api
- id: hosts-security-domain-replacement
  desc: Hosts replacement blocks security domains
  crit: hostile
  conf: 0.97
  all:
  - id: hosts-file-path
  - id: security-domain
  - id: native-hosts-replacement
- id: openwrt-hosts-update-blocking
  desc: OpenWrt hosts blocks update domains
  crit: hostile
  conf: 0.96
  platforms: [openwrt]
  for: [java, class]
  all:
    - id: micro-behaviors/fs/path/config/system::config-hosts-bytecode
    - id: metadata/file/policy/config/services::localhost-redirect-bytecode
    - id: micro-behaviors/fs/path/config/system::hidden-hosts-backup-bytecode
    - id: metadata/file/policy/config/services::openwrt-update-domain-bytecode
- id: hosts-av-null-route
  desc: 0.0.0.0 null-route targeting AV vendor
  crit: suspicious
  conf: 0.93
  any:
  - id: hosts-av-null-route-a
  - id: hosts-av-null-route-b
  - id: hosts-av-null-route-c
  - id: hosts-av-null-route-d
  - id: hosts-escan-null-route
- id: hosts-managed-av-block
  desc: Scripted managed block for AV domains in hosts
  crit: hostile
  conf: 0.97
  all:
  - id: hosts-file-path
  - id: hosts-av-null-route
  any:
  - id: hosts-managed-block-marker
  - id: hosts-null-route-comment
  - id: hosts-null-route-target-comment
  - id: av-hosts-block-manage-token
- id: hosts-security-null-route-write
  desc: Writes hosts null-route for security updates
  crit: hostile
  conf: 0.97
  all:
  - id: hosts-file-path
  - id: hosts-av-null-route
  any:
  - id: micro-behaviors/fs/write/file/direct::batch-append-redirect
  - id: windows-hosts-tamper-api
- id: bulk-domain-blocking
  desc: Bulk domain blocking via hosts file
  crit: suspicious
  conf: 0.9
  any:
  - id: localhost-redirect-pattern
  - id: null-redirect-pattern
- id: windows-hosts-tamper-api
  desc: Hosts tamper with file APIs
  crit: suspicious
  conf: 0.9
  platforms:
  - windows
  all:
  - id: hosts-file-path
  needs: 2
  any:
  - id: micro-behaviors/fs/file/attributes::set-file-attributes-a
  - id: micro-behaviors/fs/file/delete::deletefile-a
  - id: micro-behaviors/fs/file/copy::copyfile-a
  - id: windows-hosts-filestream-create
  unless:
  - id: metadata/signed/developer::adobe-inc.
- id: windows-hosts-overwrite-download
  desc: Remote download overwrites hosts
  crit: hostile
  conf: 0.98
  platforms:
  - windows
  for:
  - csharp
  all:
  - id: hosts-file-path
  - id: windows-hosts-webrequest-create
  - id: windows-hosts-filestream-create
- id: windows-hosts-timer-refresh
  desc: Timer refreshes downloaded hosts
  crit: suspicious
  conf: 0.95
  platforms:
  - windows
  for:
  - csharp
  all:
  - id: metadata/lang/compiler/source::winforms-timer-source
  - id: micro-behaviors/fs/path/config/system::windows-hosts-file
  any:
  - id: hidden-hosts-refresh-counter
  - id: hidden-hosts-refresh-call
- id: escan-security-domain
  desc: eScan security update domain
  crit: component
  conf: 0.85
  any:
  - id: escan-security-domain--rx-1
  - id: escan-security-domain--rx-2
  - id: escan-security-domain--rx-3
  - id: escan-security-domain--rx-4
  - id: escan-security-domain--rx-5
  - id: escan-security-domain--rx-6
