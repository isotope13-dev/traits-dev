defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
  attack: T1565.001
  mbc: F0004
traits:
- id: windows-hosts-path
  desc: Windows hosts file path reference
  crit: suspicious
  conf: 0.7
  platforms:
  - windows
  if:
    type: text
    regex: (?i)\\system32\\drivers\\etc\\hosts
- id: windows-hosts-filestream-create
  desc: Creates FileStream for hosts file overwrite
  crit: suspicious
  conf: 0.93
  platforms:
  - windows
  for:
  - csharp
  if:
    type: text
    regex: 'new\s+FileStream\s*\(\s*this\.dirho\s*,\s*FileMode\.Create\s*\)'
- id: windows-hosts-webrequest-create
  desc: Builds WebRequest for hosts payload
  crit: suspicious
  conf: 0.9
  platforms:
  - windows
  for:
  - csharp
  if:
    type: text
    regex: 'WebRequest\.Create\s*\(\s*this\.verurl\(\)\s*\)'
- id: hidden-hosts-refresh-counter
  desc: Timer counter triggers hosts refresh interval
  crit: component
  conf: 0.9
  platforms:
  - windows
  for:
  - csharp
  if:
    type: text
    regex: 'this\.@int\s*==\s*3600'
- id: hidden-hosts-refresh-call
  desc: Timer tick calls hosts refresh function
  crit: component
  conf: 0.88
  platforms:
  - windows
  for:
  - csharp
  if:
    type: text
    regex: 'Timer1_Tick[\s\S]{0,220}this\.downhost\s*\('
- id: windows-hosts-template-path
  desc: Windows hosts path format string
  crit: suspicious
  conf: 0.85
  platforms:
  - windows
  if:
    type: raw
    regex: (?i)%s\\drivers\\etc\\hosts
- id: windows-hosts-backup-template
  desc: Hosts backup template reference
  crit: suspicious
  conf: 0.85
  platforms:
  - windows
  if:
    type: raw
    regex: (?i)%s\\hosts\.sam
- id: av-update-domain-a
  desc: AV update domain (Kaspersky/Avast/AVG)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)(update|download)\.(kaspersky|avast|avg)\.
- id: av-update-domain-b
  desc: AV update domain (Bitdefender/ESET/Sophos)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)(update|download)\.(bitdefender|eset|sophos)\.
- id: av-update-domain-c
  desc: AV update domain (McAfee/Norton/Symantec)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)(update|download)\.(mcafee|norton|symantec)\.
- id: microsoft-security-domain
  desc: Microsoft security domain string
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)(windowsupdate|smartscreen|wdcp)\.microsoft\.com
- id: escan-security-domain--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: download
    case_insensitive: true
- id: escan-security-domain--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: esupdate
    case_insensitive: true
- id: escan-security-domain--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: escanav
    case_insensitive: true
- id: escan-security-domain--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: patch
    case_insensitive: true
- id: escan-security-domain--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: live
    case_insensitive: true
- id: escan-security-domain--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: mwti
    case_insensitive: true
- id: virustotal-domain
  desc: VirusTotal domain reference
  crit: component
  conf: 0.8
  if:
    type: text
    substr: virustotal.com
- id: localhost-redirect-pattern
  desc: Localhost IP with domain redirect pattern
  crit: suspicious
  conf: 0.85
  size_min: 1200
  count_min: 3
  if:
    type: raw
    regex: 127\.0\.0\.1\s+\S+\.(com|net|org)
  not:
  - substr: sample HOSTS file used by Microsoft TCP/IP for Windows.
  - substr: '#-iris-'
  - substr: '/Windows/system32/drivers/etc/hosts, on Linux: /etc/hosts'
- id: null-redirect-pattern
  desc: Null IP redirect pattern (0.0.0.0)
  crit: suspicious
  conf: 0.85
  size_min: 1200
  count_min: 3
  if:
    type: raw
    regex: 0\.0\.0\.0\s+\S+\.(com|net|org)
  not:
  - substr: sample HOSTS file used by Microsoft TCP/IP for Windows.
  - substr: '#-iris-'
  - substr: '/Windows/system32/drivers/etc/hosts, on Linux: /etc/hosts'
- id: hosts-managed-block-marker
  desc: Managed-block sentinel comment in hosts
  crit: suspicious
  conf: 0.9
  if:
    type: raw
    regex: ^#\s+(BEGIN|END)\s+[A-Za-z0-9_-]{3,40}\b
  count_min: 2
- id: hosts-null-route-comment
  desc: Explicit 0.0.0.0 null-route comment
  crit: suspicious
  conf: 0.85
  if:
    type: raw
    regex: (?i)^#[^\n]{0,120}null[- ]route
- id: hosts-null-route-target-comment
  desc: 'Redirect target: 0.0.0.0 comment'
  crit: suspicious
  conf: 0.85
  if:
    type: raw
    regex: (?i)^#[^\n]{0,120}redirect\s+target\s*:\s*0\.0\.0\.0
- id: hosts-av-null-route-a
  desc: 0.0.0.0 null-route targeting Malwarebytes/Kaspersky
  crit: suspicious
  conf: 0.93
  if:
    type: raw
    regex: 0\.0\.0\.0\s+\S+\.(malwarebytes|kaspersky)\.
    case_insensitive: true
- id: hosts-av-null-route-b
  desc: 0.0.0.0 null-route targeting ESET/McAfee/Symantec
  crit: suspicious
  conf: 0.93
  if:
    type: raw
    regex: 0\.0\.0\.0\s+\S+\.(eset|mcafee|symantec|norton)\.
    case_insensitive: true
- id: hosts-av-null-route-c
  desc: 0.0.0.0 null-route targeting Bitdefender/Sophos/AVG/Avast
  crit: suspicious
  conf: 0.93
  if:
    type: raw
    regex: 0\.0\.0\.0\s+\S+\.(bitdefender|sophos|avg|avast)\.
    case_insensitive: true
- id: hosts-av-null-route-d
  desc: 0.0.0.0 null-route targeting kaspersky-labs/TrendMicro/F-Secure
  crit: suspicious
  conf: 0.93
  if:
    type: raw
    regex: 0\.0\.0\.0\s+\S+\.(kaspersky-labs|trendmicro|f-secure)\.
    case_insensitive: true
- id: hosts-escan-null-route
  desc: 0.0.0.0 null-route targeting eScan updates
  crit: suspicious
  conf: 0.94
  if:
    type: raw
    regex: 0\.0\.0\.0\s+\S*\b(escanav|mwti)\.com\b
    case_insensitive: true
- id: av-hosts-block-manage-token
  desc: AV-hosts-block management token
  crit: suspicious
  conf: 0.9
  if:
    type: raw
    regex: (?i)-AvHostsBlock(Apply|Revert)\b
composite_rules:
- id: windows-hosts-download-loop
  desc: Downloads and writes hosts payload from HTTP response stream
  crit: suspicious
  conf: 0.92
  platforms:
  - windows
  for:
  - csharp
  all:
  - id: windows-hosts-webrequest-create
  - id: windows-hosts-filestream-create
  any:
  - id: micro-behaviors/data/control-flow/loop::infinite-loop-header
  - id: micro-behaviors/os/registry/manipulate::set-value
- id: hosts-file-path
  desc: Hosts file path reference
  crit: suspicious
  conf: 0.7
  any:
  - id: windows-hosts-path
  - id: windows-hosts-template-path
  - id: windows-hosts-backup-template
  - id: micro-behaviors/fs/path/config::config-hosts
- id: av-update-domain
  desc: AV/EDR update domain reference
  crit: component
  conf: 0.85
  any:
  - id: av-update-domain-a
  - id: av-update-domain-b
  - id: av-update-domain-c
- id: threat-intel-domain
  desc: Threat intelligence service domain
  crit: component
  conf: 0.8
  any:
  - id: virustotal-domain
  - id: objectives/anti-analysis/sandbox-detect/heuristics::any-run
- id: security-domain
  desc: Security-related domain reference
  crit: component
  conf: 0.8
  any:
  - id: av-update-domain
  - id: microsoft-security-domain
  - id: escan-security-domain
  - id: threat-intel-domain
- id: hosts-av-blocking
  desc: Hosts file modification to block AV domains
  crit: hostile
  conf: 0.95
  all:
  - id: hosts-file-path
  - id: security-domain
  any:
  - id: bulk-domain-blocking
  - id: windows-hosts-tamper-api
- id: hosts-av-null-route
  desc: 0.0.0.0 null-route targeting AV vendor
  crit: suspicious
  conf: 0.93
  any:
  - id: hosts-av-null-route-a
  - id: hosts-av-null-route-b
  - id: hosts-av-null-route-c
  - id: hosts-av-null-route-d
  - id: hosts-escan-null-route
- id: hosts-managed-av-block
  desc: Scripted managed block for AV domains in hosts
  crit: hostile
  conf: 0.97
  all:
  - id: hosts-file-path
  - id: hosts-av-null-route
  any:
  - id: hosts-managed-block-marker
  - id: hosts-null-route-comment
  - id: hosts-null-route-target-comment
  - id: av-hosts-block-manage-token
- id: hosts-security-null-route-write
  desc: Writes hosts null-route for security updates
  crit: hostile
  conf: 0.97
  all:
  - id: hosts-file-path
  - id: hosts-av-null-route
  any:
  - id: micro-behaviors/fs/write/file::batch-append-redirect
  - id: windows-hosts-tamper-api
- id: bulk-domain-blocking
  desc: Bulk domain blocking via hosts file
  crit: suspicious
  conf: 0.9
  any:
  - id: localhost-redirect-pattern
  - id: null-redirect-pattern
- id: windows-hosts-tamper-api
  desc: Hosts tamper with file APIs
  crit: suspicious
  conf: 0.9
  platforms:
  - windows
  all:
  - id: hosts-file-path
  needs: 2
  any:
  - id: micro-behaviors/fs/file/attributes::set-file-attributes-a
  - id: micro-behaviors/fs/file/delete::deletefile-a
  - id: micro-behaviors/fs/file/copy::copyfile-a
  - id: windows-hosts-filestream-create
  unless:
  - id: metadata/signed/developer::adobe-inc.
- id: windows-hosts-overwrite-download
  desc: Downloads remote data and overwrites the Windows hosts file
  crit: hostile
  conf: 0.98
  platforms:
  - windows
  for:
  - csharp
  all:
  - id: hosts-file-path
  - id: windows-hosts-webrequest-create
  - id: windows-hosts-filestream-create
- id: windows-hosts-timer-refresh
  desc: Periodically refreshes downloaded hosts file via WinForms timer
  crit: suspicious
  conf: 0.95
  platforms:
  - windows
  for:
  - csharp
  all:
  - id: metadata/lang/compiler/source::winforms-timer-source
  - id: windows-hosts-path
  any:
  - id: hidden-hosts-refresh-counter
  - id: hidden-hosts-refresh-call
- id: escan-security-domain
  desc: eScan security update domain
  crit: component
  conf: 0.85
  any:
  - id: escan-security-domain--rx-1
  - id: escan-security-domain--rx-2
  - id: escan-security-domain--rx-3
  - id: escan-security-domain--rx-4
  - id: escan-security-domain--rx-5
  - id: escan-security-domain--rx-6
  needs: 1
