defaults:
  platforms: [openbsd, bsd, unix]
  for: [python]
  attack: T1562.001

traits:
  - id: python-openbsd-security-hosts
    desc: Python OpenBSD security hosts
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: security\.openbsd\.org[\s\S]{0,160}mirror\.openbsd\.org

  - id: python-hosts-localhost-redirect
    desc: Python hosts localhost redirect
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "127.0.0.1 security.openbsd.org"

composite_rules:
  - id: python-openbsd-security-hosts-block
    desc: Python blocks OpenBSD security
    crit: hostile
    conf: 0.98
    all:
      - id: python-openbsd-security-hosts
      - id: python-hosts-localhost-redirect
