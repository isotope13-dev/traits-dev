# Delayed file deletion after agent launch
# Detects setTimeout-based delayed cleanup of dropped binaries and configs.
# Common in droppers that launch an agent then erase disk artifacts.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1070.004
  mbc: F0007
composite_rules:
  - id: delayed-agent-cleanup
    desc: Delayed deletion of dropped agent binary and config
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/command-and-control/dropper/execution/network-stage::unlink-call
    any:
      - id: micro-behaviors/fs/write/file/npm-masquerade::write-binary-as-npm
      - id: well-known/app/nezha::nezha-v1-config-template
  - id: delayed-self-erase-after-launch
    desc: Self-erase after agent launch (setTimeout + unlink chain)
    crit: hostile
    conf: 0.95
    all:
      - id: delayed-agent-cleanup
      - id: micro-behaviors/process/daemonize/detach::setsid-command
    any:
      - id: micro-behaviors/fs/write/file/npm-masquerade::exec-local-npm-binary
      - id: well-known/app/nezha::nezha-v0-stealth-flags
