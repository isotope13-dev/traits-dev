defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: script-self-delete
    desc: Script self-deletion pattern (SCRIPT_FILENAME +
    crit: suspicious
    conf: 0.95
    mbc: F0006
    attack: T1070.004
    for:
      - php
    if:
      type: raw
      regex: unlink\s*\(\s*\$_SERVER\s*\[\s*['"]SCRIPT_FILENAME['"]\s*\]
