defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1070.004
traits:
- id: ping-zero-del-self-delete
  desc: Self-delete via ping 0 delay and del
  crit: suspicious
  conf: 0.95
  platforms: [windows]
  if:
    type: text
    regex: 'ping\s+0\s*&\s*del\b'
- id: command-com-del-self-delete
  desc: Self-delete via COMMAND.COM DEL command
  crit: suspicious
  conf: 0.92
  platforms: [windows]
  if:
    type: text
    exact: 'COMMAND.COM /C DEL %s'
composite_rules:
- id: ping-self-delete
  desc: Ping delay pattern used by self-delete routines
  crit: notable
  conf: 0.95
  any:
  - id: ping-zero-del-self-delete
  - id: command-com-del-self-delete
  unless:
  # Redis and other network protocols use "PING" as a keepalive command —
  # not a shell ping. Exclude files that contain Redis/database client
  # protocol markers where PING is a protocol verb, not a shell command.
  - id: objectives/evasion/self-delete/file/delay/
  - id: micro-behaviors/communications/ip/services::memcache-word
  - id: micro-behaviors/communications/ip/services::redis-ping-protocol
  - id: micro-behaviors/communications/http/websocket::ping-pong-json
  - id: micro-behaviors/communications/http/websocket::ping-pong-pair
