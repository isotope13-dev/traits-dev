defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1070.004
traits:
- id: ping-self-delete--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(?i)\bping(\.exe)?\b.{0,80}127\.0\.0\.1|127\.0\.0\.1.{0,80}\bping(\.exe)?\b'
  count_max: 1023142
- id: ping-self-delete--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(?i)(^|[^A-Za-z])ping(\.exe)?([^A-Za-z]|$)'
  count_max: 1023143
- id: ping-zero-del-self-delete
  desc: Self-delete via ping 0 delay and del
  crit: suspicious
  conf: 0.95
  platforms: [windows]
  if:
    type: raw
    regex: 'ping\s+0\s*&\s*del\b'
- id: command-com-del-self-delete
  desc: Self-delete via COMMAND.COM DEL command
  crit: suspicious
  conf: 0.92
  platforms: [windows]
  if:
    type: text
    exact: 'COMMAND.COM /C DEL %s'
  # Redis client/protocol indicators — used to suppress self-delete-ping
  # composite when "PING" appears as a Redis keepalive verb, not a shell
  # ping. Decomposed per-pattern so each atom is short and ML-trainable.
- id: protocol-redis-resp-frame
  desc: Redis RESP-framed PING command
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "*1\r\n$4\r\nPING\r\n"
- id: protocol-redis-require
  desc: require('redis') call
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'require\(["'']redis["'']\)'
- id: protocol-redis-new
  desc: new Redis() constructor
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '\bnew\s+Redis\b'
- id: protocol-redis-port-6379
  desc: Redis default port (6379) in createClient
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'createClient\s*\(\s*\{[^}]{0,200}6379'
- id: protocol-ping-memcache
  desc: Memcache ping protocol marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)memcache'
- id: protocol-ping-pong-json
  desc: PONG response data marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '"PONG"\s*[,\])]'
- id: protocol-ping-pong-pair
  desc: PING/PONG protocol marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)PING.{0,120}PONG|PONG.{0,120}PING'
composite_rules:
- id: protocol-ping-redis
  desc: Redis client/protocol marker
  crit: component
  conf: 0.85
  any:
  - id: protocol-redis-resp-frame
  - id: protocol-redis-require
  - id: protocol-redis-new
  - id: protocol-redis-port-6379
- id: ping-self-delete
  desc: Ping delay pattern used by self-delete routines
  crit: notable
  conf: 0.95
  all:
  - id: ping-self-delete--rx-1
  - id: ping-self-delete--rx-2
  unless:
  # Redis and other network protocols use "PING" as a keepalive command —
  # not a shell ping. Exclude files that contain Redis/database client
  # protocol markers where PING is a protocol verb, not a shell command.
  - id: protocol-ping-redis
  - id: protocol-ping-memcache
  - id: protocol-ping-pong-json
  - id: protocol-ping-pong-pair
