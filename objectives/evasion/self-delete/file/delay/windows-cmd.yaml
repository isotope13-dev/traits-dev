defaults:
  platforms: [windows]
  for: [binaries, scripts]
  attack: T1070.004

traits:
  - id: cmd-ping-localhost-del-self-delete
    desc: Cmd ping delay self delete
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '(?i)cmd(\.exe)?\s+/c\s+ping\s+127\.0\.0\.1\s+-n\s+6\s*>\s*nul\s*&&\s*del\s+/f\s+/q'
