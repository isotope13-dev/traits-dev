defaults:
  platforms: [windows, unix, android]
  for: [class, jar, apk]
  attack: T1070.004
  mbc: F0007
traits:
  - id: gradle-wrapper-jar-basename
    desc: Gradle wrapper JAR basename
    crit: notable
    conf: 0.95
    for: [jar]
    if:
      type: basename
      exact: gradle-wrapper.jar
  - id: archive-contains-gradle-wrapper-jar
    desc: Archive contains Gradle wrapper JAR
    crit: notable
    conf: 0.95
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)gradle-wrapper\.jar$'
composite_rules:
  - id: java-bytecode-delayed-file-delete
    desc: Java bytecode delayed file deletion
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/fs/delete/file::java-file-delete-bytecode
      - id: micro-behaviors/process/control/wait::java-process-waitfor-bytecode
      - id: micro-behaviors/time/sleep/interval::java-thread-sleep-bytecode
    any:
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode
    unless:
      - id: gradle-wrapper-jar-basename
      - id: archive-contains-gradle-wrapper-jar
