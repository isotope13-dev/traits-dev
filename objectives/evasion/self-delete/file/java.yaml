defaults:
  platforms: [windows, unix]
  for: [class]
  attack: T1070.004
  mbc: F0007
traits:
  - id: java-own-jar-path
    desc: Java own JAR path lookup
    crit: component
    conf: 0.82
    if:
      type: raw
      substr: getProtectionDomain
  - id: java-code-source-location
    desc: Java code source location
    crit: component
    conf: 0.78
    if:
      type: raw
      substr: getCodeSource
  - id: java-jar-extension
    desc: Java JAR extension string
    crit: component
    conf: 0.72
    if:
      type: raw
      substr: .jar
  - id: java-shutdown-hook
    desc: Java shutdown hook registration
    crit: component
    conf: 0.8
    if:
      type: raw
      substr: addShutdownHook
  - id: java-minute-schedule-format
    desc: Java minute schedule formatting
    crit: component
    conf: 0.74
    if:
      type: raw
      substr: plusMinutes
composite_rules:
  - id: java-own-jar-delayed-cleanup
    desc: Java own JAR delayed cleanup
    crit: suspicious
    conf: 0.9
    all:
      - id: java-own-jar-path
      - id: java-code-source-location
      - id: java-jar-extension
      - id: java-shutdown-hook
    any:
      - id: java-minute-schedule-format
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
