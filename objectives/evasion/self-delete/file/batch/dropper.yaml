# Self-Deletion via Dropped Batch File
# Detects the pattern of creating a batch file to delete the malware executable,
# commonly dropped to %TEMP% with names like delete.bat, cleanup.bat, etc.
# ATT&CK: T1070.004 (Indicator Removal: File Deletion)
defaults:
  for: [pe, csharp]
  platforms: [windows]
  attack: T1070.004
  mbc: F0007

traits:
- id: temp-delete-bat
  desc: Creates delete.bat in temp directory
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: (?i)(TEMP|Temp|tmp).{0,30}delete\.bat

- id: temp-cleanup-bat--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.90
  if:
    type: text
    regex: (?i)(TEMP|Temp|tmp).{0,30}(cleanup|remove)\.bat

  count_max: 1023123
- id: temp-cleanup-bat--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.90
  if:
    type: text
    regex: (?i)(TEMP|Temp|tmp).{0,30}(uninstall|destroy)\.bat

  count_max: 1023124
- id: batch-ping-delay-delete
  desc: Batch with ping delay before deletion
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: (?i)ping\s+.{0,20}-n\s+\d+.{0,40}del\b

- id: batch-timeout-delete
  desc: Batch with timeout before deletion
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: (?i)timeout\s+/t\s+\d+.{0,40}del\b

- id: write-then-start-bat
  desc: Writes and executes batch file for cleanup
  crit: suspicious
  conf: 0.90
  if:
    type: text
    regex: (?i)(WriteAllText|StreamWriter|File\.Write).{0,60}\.bat

composite_rules:
- id: batch-self-delete-dropper
  desc: Creates batch file for delayed self-deletion
  crit: suspicious
  conf: 0.94
  any:
  - id: temp-delete-bat
  - id: temp-cleanup-bat
  - id: batch-ping-delay-delete
  - id: batch-timeout-delete
  - id: write-then-start-bat
  needs: 2
- id: temp-cleanup-bat
  desc: Creates cleanup batch in temp directory
  crit: suspicious
  conf: 0.90
  any:
  - id: temp-cleanup-bat--rx-1
  - id: temp-cleanup-bat--rx-2
