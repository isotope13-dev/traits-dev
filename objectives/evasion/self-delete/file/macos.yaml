defaults:
  platforms:
    - macos
  for:
    - macho
    - shell
  attack: T1070.004
  mbc: F0007
traits:
  - id: delayed-rm-rf
    desc: Delayed self-deletion via sleep+rm
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: sleep\s+\d+;\s*rm\s+-rf
  - id: open-bash-args
    desc: Spawns bash via open command
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: open\s+-a\s+/bin/bash\s+--args
composite_rules:
  - id: delayed-self-delete
    desc: Delayed self-deletion via spawned bash
    crit: suspicious
    conf: 0.95
    all:
      - id: open-bash-args
      - id: delayed-rm-rf
