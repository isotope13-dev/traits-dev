defaults:
  for:
    - powershell
    - batch
  mbc: F0007
  attack: T1070.004
  platforms:
    - windows
traits:
  - id: self-delete-windows
    desc: Self-deleting via DeleteFile
    crit: suspicious
    conf: 0.66
    if:
      type: raw
      substr: DeleteFile(argv[0])
  - id: vbs-file-delete
    desc: Delete VBS files
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: del\s.{0,50}\.vbs|Remove-Item.{0,50}\.vbs|DeleteFile.{0,50}\.vbs
      case_insensitive: true
    not:
      - regex: (?i)getadmin\.vbs
  - id: script-file-delete-del
    desc: Delete script files using del
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: del\s.{0,50}\.(ps1|bat|cmd|vbs)
      case_insensitive: true
  - id: script-file-delete-remove-item
    desc: Delete script files using Remove-Item
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: Remove-Item.{0,50}\.(ps1|bat|cmd|vbs)
      case_insensitive: true
  - id: multi-vbs-delete
    desc: Multiple VBS file deletions
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: string_value
      regex: del.{0,50}\.vbs|Remove-Item.{0,50}\.vbs
      case_insensitive: true
  - id: timeout-del-self
    desc: Self-deletion via delayed cmd.exe del command
    crit: suspicious
    conf: 0.92
    if:
      type: string_value
      regex: timeout\s+\d+\s*&\s*del\s+/f
composite_rules:
  - id: script-file-delete
    desc: Delete script files
    crit: notable
    conf: 0.75
    any:
      - id: script-file-delete-del
      - id: script-file-delete-remove-item
  - id: comspec-shortpath-self-delete
    desc: Launches COMSPEC to delete own short path
    crit: suspicious
    conf: 0.95
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/os/env/vars::comspec-env-var
      - id: micro-behaviors/fs/path/check::get-short-path-name
      - id: micro-behaviors/process/create/system::shell-execute-ex-a
    any:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/os/module/load::get-module-filename-ansi
  - id: module-path-delete
    desc: Resolve own path then delete file
    crit: notable
    conf: 0.82
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/fs/file/delete::delete-win
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics::many-imports
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
  - id: padded-imports-self-delete
    desc: Self-delete with inflated import table (evasion via padding)
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    all:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/fs/file/delete::delete-win
      - id: metadata/binary/anomaly::low-function-count-marker
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/anomaly::import-table-padding
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: module-path-rename-delete
    desc: Rename and delete own module path
    crit: suspicious
    conf: 0.9
    for:
      - pe
      - dll
    all:
      - id: module-path-delete
      - id: micro-behaviors/fs/file/rename::rename-base
    unless:
      - id: metadata/binary/metrics::many-imports
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
