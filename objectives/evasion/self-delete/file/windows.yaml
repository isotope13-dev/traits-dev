defaults:
  for:
    - powershell
    - batch
  mbc: F0007
  attack: T1070.004
  platforms:
    - windows
traits:
  - id: electron-enable-logging-marker
    desc: Electron runtime logging marker
    crit: baseline
    conf: 0.7
    for:
      - pe
    if:
      type: text
      substr: "ELECTRON_ENABLE_LOGGING"
  - id: self-delete-windows
    desc: Self-deleting via DeleteFile
    crit: suspicious
    conf: 0.66
    if:
      type: text
      substr: DeleteFile(argv[0])
  - id: vbs-file-delete
    desc: Delete VBS files
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: del\s.{0,50}\.vbs|Remove-Item.{0,50}\.vbs|DeleteFile.{0,50}\.vbs
      case_insensitive: true
    not:
      - regex: (?i)getadmin\.vbs
  - id: script-file-delete-del
    desc: Delete script files using del
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: del\s.{0,50}\.(ps1|bat|cmd|vbs)
      case_insensitive: true
  - id: script-file-delete-remove-item
    desc: Delete script files using Remove-Item
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: Remove-Item.{0,50}\.(ps1|bat|cmd|vbs)
      case_insensitive: true
  - id: multi-vbs-delete
    desc: Multiple VBS file deletions
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: del.{0,50}\.vbs|Remove-Item.{0,50}\.vbs
      case_insensitive: true
  - id: timeout-del-self
    desc: Self-deletion via delayed cmd.exe del command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: timeout\s+\d+\s*&\s*del\s+/f
  - id: slash-c-del-fragment
    desc: cmd /c del argument fragment
    crit: notable
    conf: 0.82
    for:
      - pe
    if:
      type: text
      regex: /c\s+del\b
  - id: movefile-delay-until-reboot
    desc: MOVEFILE_DELAY_UNTIL_REBOOT flag reference
    crit: component
    conf: 0.8
    for: [scripts, binaries, c, cpp]
    if:
      type: text
      substr: MOVEFILE_DELAY_UNTIL_REBOOT
composite_rules:
  - id: script-file-delete
    desc: Delete script files
    crit: notable
    conf: 0.75
    any:
      - id: script-file-delete-del
      - id: script-file-delete-remove-item
  - id: comspec-shortpath-self-delete
    desc: Launches COMSPEC to delete own short path
    crit: suspicious
    conf: 0.95
    for:
      - pe
    all:
      - id: micro-behaviors/os/env/vars::comspec-env-var
      - id: micro-behaviors/fs/path/check::get-short-path-name
      - id: micro-behaviors/process/create/system::shell-execute-ex-a
    any:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/os/module/load::get-module-filename-ansi
  - id: comspec-del-self-delete
    desc: COMSPEC deletion command pattern
    crit: suspicious
    conf: 0.9
    for:
      - pe
    all:
      - id: micro-behaviors/os/env/vars::comspec-env-var
      - id: slash-c-del-fragment
    any:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/fs/path/check::get-short-path-name
  - id: module-path-delete
    desc: Resolve own path then delete file
    crit: notable
    conf: 0.82
    for:
      - pe
    all:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/fs/file/delete::delete-win
    unless:
      - id: electron-enable-logging-marker
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics::many-imports
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
  - id: padded-imports-self-delete
    desc: Self-delete with inflated import table (evasion via padding)
    crit: suspicious
    conf: 0.9
    for: [pe]
    all:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/fs/file/delete::delete-win
      - id: metadata/binary/metrics::low-function-count-marker
      - id: metadata/binary/metrics::many-imports
      - id: objectives/anti-static/obfuscation/payload::import-table-padding
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: movefile-reboot-self-delete
    desc: Self-delete via MoveFileEx DELAY_UNTIL_REBOOT (deferred cleanup)
    crit: suspicious
    conf: 0.9
    for:
      - pe
    all:
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: movefile-delay-until-reboot
      - id: micro-behaviors/process/info/current::get-module-filename
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: movefile-module-cleanup
    desc: MoveFileEx with own-path delete chain
    crit: suspicious
    conf: 0.92
    for:
      - pe
    all:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/fs/file/delete::delete-win
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: movefile-delay-until-reboot
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: elevated-wrapper-movefile-cleanup
    desc: Elevated wrapper with MoveFileEx cleanup
    crit: suspicious
    conf: 0.94
    for:
      - pe
    all:
      - id: movefile-module-cleanup
      - id: micro-behaviors/os/privilege/manifest::highest-available
    any:
      - id: micro-behaviors/communications/http/client::winhttp-downloader-flow
      - id: metadata/binary/resource::resource-heavy-low-code-wrapper
      - id: objectives/discovery/account/lookup::sid-account-resolution
      - id: objectives/discovery/system/locale::windows-locale-fingerprint
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: module-path-rename-delete
    desc: Rename and delete own module path
    crit: suspicious
    conf: 0.9
    for:
      - pe
    all:
      - id: module-path-delete
      - id: micro-behaviors/fs/file/rename::rename-base
    unless:
      - id: metadata/binary/metrics::many-imports
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
