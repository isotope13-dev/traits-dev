# Self-Deletion Detection - Windows
# MBC: F0007 (Self Deletion)
# ATT&CK: T1070.004
defaults:
  for: [all]
  mbc: "F0007"
  attack: "T1070.004"
  platforms: [windows]
traits:
  - id: self-delete-windows
    desc: Self-deleting via DeleteFile
    crit: suspicious
    conf: 0.66
    if:
      type: string
      substr: "DeleteFile(argv[0])"
  # VBS file deletion (dropper cleanup)
  - id: vbs-file-delete
    desc: Delete VBS files
    crit: suspicious
    conf: 0.85
    for: [all]
    if:
      type: string
      regex: "del\\s.{0,50}\\.vbs|Remove-Item.{0,50}\\.vbs|DeleteFile.{0,50}\\.vbs"
      case_insensitive: true
  # Script file deletion (generic)
  - id: script-file-delete-del
    desc: Delete script files using del
    crit: notable
    conf: 0.75
    for: [all]
    if:
      type: string
      regex: "del\\s.{0,50}\\.(ps1|bat|cmd|vbs)"
      case_insensitive: true
  - id: script-file-delete-remove-item
    desc: Delete script files using Remove-Item
    crit: notable
    conf: 0.75
    for: [all]
    if:
      type: string
      regex: "Remove-Item.{0,50}\\.(ps1|bat|cmd|vbs)"
      case_insensitive: true
  # Multiple VBS deletions (dropper cleanup pattern)
  - id: multi-vbs-delete
    desc: Multiple VBS file deletions
    crit: suspicious
    conf: 0.9
    for: [all]
    count_min: 2
    if:
      type: string
      regex: "del.{0,50}\\.vbs|Remove-Item.{0,50}\\.vbs"
      case_insensitive: true
composite_rules:
  - id: script-file-delete
    desc: Delete script files
    crit: notable
    conf: 0.75
    for: [all]
    any:
      - id: script-file-delete-del
      - id: script-file-delete-remove-item
  - id: comspec-shortpath-self-delete
    desc: Launches COMSPEC to delete own short path
    crit: suspicious
    conf: 0.95
    for: [pe, dll]
    all:
      - id: micro-behaviors/os/env/vars::comspec-env-var
      - id: micro-behaviors/fs/path/check::get-short-path-name
      - id: micro-behaviors/process/create/shell::shell-execute-ex-a
    any:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: objectives/execution/module/load::get-module-filename-ansi
  - id: module-path-delete
    desc: Resolve own path then delete file
    crit: notable
    conf: 0.82
    for: [pe, dll]
    all:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/fs/file/delete::delete-win
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/format::many-imports
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
  - id: module-path-rename-delete
    desc: Rename and delete own module path
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    all:
      - id: module-path-delete
      - id: micro-behaviors/fs/file/rename::rename-c-runtime
    none:
      - id: metadata/format::many-imports
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
