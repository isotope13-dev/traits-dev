defaults:
  attack: T1070.004
  mbc: F0007
  platforms: [linux, unix, macos, android, ios, windows]
  for: [shell]
traits:
  - id: rm-dollar-zero
    desc: rm $0 self-deletion
    crit: suspicious
    conf: 0.8
    size_max: 5000
    if:
      type: string
      regex: (^|\s|;)rm\s+\$0\b
    unless:
      - type: raw
        substr: docutils
      - type: raw
        substr: math2html
  - id: rm-dollar-zero-quoted
    desc: rm "$0" self-deletion (quoted)
    crit: suspicious
    conf: 0.8
    size_max: 5000
    if:
      type: string
      regex: (^|\s|;)rm\s+"\$0"\b
    unless:
      - type: raw
        substr: docutils
      - type: raw
        substr: math2html
  - id: shred-dollar-zero
    desc: shred $0 self-deletion
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: shred\s+(-[a-z]+\s+)?["']?\$0["']?
  - id: rm-install-artifacts
    desc: Delete installer/setup artifacts
    crit: suspicious
    conf: 0.75
    if:
      type: raw
      regex: (?i)\brm\s+(-[rf]{1,4}\s+){1,4}(\.?install|setup)\b
  - id: rm-tar-artifacts
    desc: Delete tar installer artifacts
    crit: suspicious
    conf: 0.72
    if:
      type: raw
      regex: (?i)\brm\s+(-[rf]{1,4}\s+){1,4}\.?[a-z0-9._-]+\.tar(\.[a-z0-9]+)?\b
  - id: rm-zip-artifacts
    desc: Delete zip installer artifacts
    crit: suspicious
    conf: 0.72
    if:
      type: raw
      regex: (?i)\brm\s+(-[rf]{1,4}\s+){1,4}\.?[a-z0-9._-]+\.zip\b
composite_rules:
  - id: self-delete-shell
    desc: Self-deleting shell script
    crit: suspicious
    conf: 0.66
    any:
      - id: rm-dollar-zero
      - id: rm-dollar-zero-quoted
      - id: shred-dollar-zero
      - id: rm-install-artifacts
      - id: rm-tar-artifacts
      - id: rm-zip-artifacts
