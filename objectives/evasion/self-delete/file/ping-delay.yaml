defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1070.004
traits:
- id: ping-self-delete--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    substr: 127.0.0.1
- id: ping-self-delete--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    case_insensitive: true
    substr: ping
- id: ping-zero-del-self-delete
  desc: Self-delete via ping 0 delay and del
  crit: suspicious
  conf: 0.95
  platforms: [windows]
  if:
    type: raw
    regex: 'ping\s+0\s*&\s*del\b'
- id: command-com-del-self-delete
  desc: Self-delete via COMMAND.COM DEL command
  crit: suspicious
  conf: 0.92
  platforms: [windows]
  if:
    type: text
    exact: 'COMMAND.COM /C DEL %s'
composite_rules:
- id: ping-self-delete
  desc: Self-delete via ping delay loop
  crit: suspicious
  conf: 0.95
  any:
  - id: ping-self-delete--rx-1
  - id: ping-self-delete--rx-2
  needs: 1
