defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1070.004
traits:
  - id: ping-self-delete
    desc: Self-delete via ping delay loop
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: ping\s+127\.0\.0\.1
      case_insensitive: true
  - id: ping-zero-del-self-delete
    desc: Self-delete via ping 0 delay and del
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    if:
      type: raw
      regex: 'ping\s+0\s*&\s*del\b'
