defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: ping-self-delete
    desc: Self-delete via ping delay loop
    crit: notable
    conf: 0.95
    attack: T1070.004
    if:
      type: string_value
      regex: ping\s+127\.0\.0\.1
      case_insensitive: true
