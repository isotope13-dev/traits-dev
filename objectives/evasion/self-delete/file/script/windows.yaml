defaults:
  for:
    - powershell
    - batch
  mbc: F0007
  attack: T1070.004
  platforms:
    - windows
traits:
  - id: self-delete-windows
    desc: Self-deleting via DeleteFile
    crit: suspicious
    conf: 0.66
    if:
      type: text
      substr: DeleteFile(argv[0])
  - id: vbs-file-delete
    desc: Delete VBS files
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: del\s.{0,50}\.vbs|Remove-Item.{0,50}\.vbs|DeleteFile.{0,50}\.vbs
      case_insensitive: true
    not:
      - regex: (?i)getadmin\.vbs
  - id: script-file-delete-del
    desc: Delete script files using del
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: del\s.{0,50}\.(ps1|bat|cmd|vbs)
      case_insensitive: true
  - id: script-file-delete-remove-item
    desc: Delete script files using Remove-Item
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: Remove-Item.{0,50}\.(ps1|bat|cmd|vbs)
      case_insensitive: true
  - id: multi-vbs-delete
    desc: Multiple VBS file deletions
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: string_literal
      regex: del.{0,50}\.vbs|Remove-Item.{0,50}\.vbs
      case_insensitive: true
  - id: timeout-del-self
    desc: Self-deletion via delayed cmd.exe del command
    crit: suspicious
    conf: 0.92
    if:
      type: string_literal
      regex: timeout\s+\d+\s*&\s*del\s+/f
  - id: slash-c-del-fragment
    desc: cmd /c del argument fragment
    crit: suspicious
    conf: 0.82
    for:
      - pe
    if:
      type: text
      regex: /c\s+del\b
  - id: movefile-delay-until-reboot
    desc: MOVEFILE_DELAY_UNTIL_REBOOT flag reference
    crit: component
    conf: 0.8
    for: [scripts, binaries, c, cpp]
    if:
      type: text
      substr: MOVEFILE_DELAY_UNTIL_REBOOT
composite_rules:
  - id: script-file-delete
    desc: Delete script files
    crit: suspicious
    conf: 0.75
    any:
      - id: script-file-delete-del
      - id: script-file-delete-remove-item
  - id: comspec-shortpath-self-delete
    desc: Launches COMSPEC to delete own short path
    crit: suspicious
    conf: 0.95
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/os/env/vars/access::comspec-env-var
      - id: micro-behaviors/fs/path/check::get-short-path-name
      - id: micro-behaviors/process/create/system::shell-execute-ex-a
    any:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/os/module/load::get-module-filename-ansi
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
        - id: metadata/signed/platform::microsoft
  - id: comspec-createprocess-self-delete
    desc: COMSPEC CreateProcess self-delete
    crit: suspicious
    conf: 0.94
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/os/env/vars/access::comspec-env-var
      - id: slash-c-del-fragment
      - id: micro-behaviors/fs/path/check::get-short-path-name
      - id: micro-behaviors/process/create/spawn::create-process-a
    any:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/os/module/load::get-module-filename-ansi
  - id: module-path-delete
    desc: Resolve own path then delete file
    crit: suspicious
    conf: 0.82
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/fs/file/delete::delete-win
    unless:
      - id: metadata/binary/installer/plugin::known-nsis-plugin-basename
      - id: well-known/app/swifttunnel_vpn::swifttunnel
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/binary/vendor::is-microsoft-named
        - id: metadata/signed/platform::microsoft
  - id: padded-imports-self-delete
    desc: Self-delete with inflated import table (evasion via padding)
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    all:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/fs/file/delete::delete-win
      - id: metadata/binary/anomaly/format::low-function-count-marker
      - id: metadata/binary/metrics/structural::many-imports
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/vendor::is-microsoft-named
        - id: metadata/binary/installer/family::known-benign-installer
        - id: well-known/lib/electron::electron-app-runtime
        - id: well-known/lib/electron::nodejs-webstorage-marker
  - id: module-path-rename-delete
    desc: Rename and delete own module path
    crit: suspicious
    conf: 0.9
    for:
      - pe
      - dll
    all:
      - id: module-path-delete
      - id: micro-behaviors/fs/file/rename::rename-base
    unless:
      - id: metadata/binary/metrics/structural::many-imports
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/vendor::is-microsoft-named
        - id: metadata/signed/platform::microsoft
