# JScript Self-Deletion
# Detects scripts that delete themselves after execution or during startup
defaults:
  platforms: [windows, unix]
  crit: suspicious
  conf: 0.8
  for: [javascript]
traits:
  - id: js-self-deletion-pattern
    desc: "Self-deletion via ScriptFullName"
    mbc: "B0006" # Self-Deletion
    attack: "T1070.004"
    if:
      type: text
      # Matches DeleteFile(ScriptFullName)
      regex: '\.DeleteFile\s*\([^)]{0,120}ScriptFullName[^)]{0,120}\)'
  - id: js-filesystem-file-check
    desc: FileSystemObject checks file existence
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]{0,40}\s*\.\s*FileExists\s*\('
    unless:
      - id: metadata/package/files/dependency::vendored-source-path
  - id: js-filesystem-delete-file
    desc: FileSystemObject deletes a file
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]{0,40}\s*\.\s*DeleteFile\s*\('
composite_rules:
  - id: js-conditional-file-cleanup
    desc: Conditional FileSystemObject cleanup
    crit: suspicious
    conf: 0.9
    mbc: "B0006"
    attack: "T1070.004"
    all:
      - id: js-filesystem-file-check
      - id: js-filesystem-delete-file
    near_bytes: 700
  - id: hta-decoded-loader-with-file-cleanup
    desc: HTA loader deletes a file after execution
    crit: hostile
    conf: 0.99
    attack: "T1027,T1059.007,T1070.004,T1140"
    for: [javascript, html, vbs]
    all:
      - id: objectives/anti-static/obfuscation/payload/jscript::js-hta-application-element
      - id: objectives/command-and-control/dropper/execution/download-exec::hta-hex-xor-string-decoder
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-text
      - id: js-conditional-file-cleanup
