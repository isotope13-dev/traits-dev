defaults:
  attack: T1070.004
  mbc: F0007
  platforms: [linux]
  for: [elf]
traits:
  - id: del-sh-path
    desc: Hidden delete script path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '%s/\.del_.{1,10}\.sh'
  - id: rm-f-cmd
    desc: rm -f command string
    crit: component
    conf: 0.5
    if:
      type: text
      substr: "rm -f"
composite_rules:
  - id: go-self-destruct-sh
    desc: Drops a hidden shell script to delete self
    crit: suspicious
    conf: 0.9
    all:
      - id: del-sh-path
      - id: rm-f-cmd
