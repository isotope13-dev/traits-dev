defaults:
  attack: T1070.004
  mbc: F0007
  platforms: [linux]
  for: [elf]
traits:
  - id: go-self-destruct-path
    desc: Hidden deletion script path
    crit: component
    if:
      type: text
      regex: '/tmp/\.del_.*\.sh'
  - id: go-self-destruct-rm
    desc: Self-deletion command
    crit: component
    if:
      type: text
      substr: "rm -f"
composite_rules:
  - id: go-self-destruct-sh
    desc: Drops a hidden shell script to delete self
    crit: suspicious
    conf: 0.9
    all:
      - id: go-self-destruct-path
      - id: go-self-destruct-rm
