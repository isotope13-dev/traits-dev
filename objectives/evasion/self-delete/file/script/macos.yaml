defaults:
  platforms:
    - macos
  for:
    - macho
    - shell
    - applescript
  attack: T1070.004
  mbc: F0007
traits:
  - id: delayed-rm-rf
    desc: Delayed self-deletion via sleep+rm
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: sleep\s+\d+;\s*rm\s+-rf
  - id: open-bash-args
    desc: Spawns bash via open command
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: open\s+-a\s+/bin/bash\s+--args
  - id: applescript-rm-tempfile
    desc: AppleScript removes staged file
    crit: suspicious
    conf: 0.92
    for: [applescript]
    if:
      type: text
      regex: 'do shell script\s+"rm "\s*&\s*TempFile'
  - id: applescript-rm-hidden-tmp
    desc: AppleScript removes hidden temp stage
    crit: suspicious
    conf: 0.94
    for: [applescript]
    if:
      type: text
      regex: 'do shell script\s+"rm\s+-f\s+/tmp/\.[A-Za-z0-9._-]+'
composite_rules:
  - id: delayed-self-delete
    desc: Delayed self-deletion via spawned bash
    crit: suspicious
    conf: 0.95
    all:
      - id: open-bash-args
      - id: delayed-rm-rf
