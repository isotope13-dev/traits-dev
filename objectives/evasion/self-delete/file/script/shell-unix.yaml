defaults:
  platforms: [unix]
  for: [shell]
  attack: T1070.004

traits:
  - id: shell-trap-self-delete
    desc: Shell trap self-delete
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: trap self_delete

  - id: shell-readlink-self-rm
    desc: Shell readlink self rm
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'readlink -f "\$0"[\s\S]{0,160}rm -f "\$\{?self_path\}?"'

  - id: shell-history-clear-cleanup
    desc: Shell history cleanup
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'HISTFILE[\s\S]{0,160}history -c'

composite_rules:
  - id: shell-trap-self-delete-cleanup
    desc: Shell trap self-delete cleanup
    crit: hostile
    conf: 0.98
    all:
      - id: shell-trap-self-delete
      - id: shell-readlink-self-rm
      - id: shell-history-clear-cleanup
