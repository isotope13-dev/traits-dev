# Self-Deletion Detection - Unix
# MBC: F0007 (Self Deletion)
# ATT&CK: T1070.004
defaults:
  attack: T1070.004
  mbc: F0007
  platforms: [unix, android, ios]
  for: [binaries]
traits:
  - id: self-delete-unlink
    desc: Self-deleting via unlink
    crit: suspicious
    conf: 0.66
    if:
      type: text
      substr: "unlink(argv[0])"
  - id: tmp-hidden-devnull-context
    desc: Hidden temp path redirected to /dev/null
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '(/tmp/\.[^\s]{1,96}.{0,80}/dev/null)|(/dev/null.{0,80}/tmp/\.[^\s]{1,96})'
  - id: native-rm-self-command
    desc: Native rm self command
    crit: suspicious
    conf: 0.94
    platforms: [unix]
    for: [c, cpp, objc, elf, macho]
    if:
      type: text
      substr: "rm -f '%s'"
composite_rules:
  - id: mirai-style-self-delete
    desc: Memory-only execution pattern
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/fs/proc/info/path::process-self-exe # Reads /proc/self/exe
    any:
      - id: self-delete-unlink # Explicit unlink
      - id: tmp-hidden-devnull-context
  - id: native-proc-rm-self-delete
    desc: Native proc self-delete
    crit: hostile
    conf: 0.98
    platforms: [unix]
    for: [c, cpp, objc, elf, macho]
    all:
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
      - id: native-rm-self-command
