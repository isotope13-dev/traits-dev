defaults:
  platforms: [windows]
  for: [vbs]

composite_rules:
  - id: vbs-downloader-self-delete
    desc: VBScript downloader deletes its source after payload execution
    crit: hostile
    conf: 0.99
    attack: T1070.004,T1105,T1059.005
    mbc: B0006
    all:
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-http-stream-save-run-dropper
      - id: micro-behaviors/fs/delete/file::fso-delete-scriptfullname
