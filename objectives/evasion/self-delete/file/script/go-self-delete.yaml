defaults:
  attack: T1070.004
  mbc: F0007
  platforms: [linux]
  for: [elf]
traits:
  - id: go-self-destruct-path
    desc: Hidden deletion script path
    crit: component
    if:
      type: text
      regex: '%s/\.del_.{1,10}\.sh'
  - id: go-self-destruct-msg
    desc: Self-destruct wait message (Chinese)
    crit: component
    conf: 0.95
    if:
      type: hex
      section: rodata
      pattern: E7 AD 89 E5 BE 85 E5 8E 9F E8 BF 9B E7 A8 8B E9 80 80 E5 87 BA
composite_rules:
  - id: go-self-destruct-sh
    desc: Drops a hidden shell script to delete self
    crit: notable
    conf: 0.9
    any:
      - id: objectives/evasion/self-delete/file/script::go-self-destruct-path
      - id: objectives/evasion/self-delete/file/script::go-self-destruct-msg
