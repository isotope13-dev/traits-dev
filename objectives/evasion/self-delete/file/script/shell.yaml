defaults:
  attack: T1070.004
  mbc: F0007
  platforms:
    - unix
    - windows
  for:
    - shell
traits:
  - id: rm-dollar-zero
    desc: rm $0 self-deletion
    crit: suspicious
    conf: 0.8
    size_max: 5000
    if:
      type: string_literal
      regex: (^|\s|;)rm\s+\$0\b
    unless:
      - type: text
        substr: docutils
      - type: text
        substr: math2html
  - id: rm-dollar-zero-quoted
    desc: rm "$0" self-deletion (quoted)
    crit: suspicious
    conf: 0.8
    size_max: 5000
    if:
      type: string_literal
      regex: (^|\s|;)rm\s+"\$0"\b
    unless:
      - type: text
        substr: docutils
      - type: text
        substr: math2html
  - id: shred-dollar-zero
    desc: shred $0 self-deletion
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: shred\s+(-[a-z]+\s+)?["']?\$0["']?
composite_rules:
  - id: self-delete-shell
    desc: Self-deleting shell script
    crit: suspicious
    conf: 0.66
    any:
      - id: rm-dollar-zero
      - id: rm-dollar-zero-quoted
      - id: shred-dollar-zero
