defaults:
  attack: T1070.004
  mbc: F0007
  platforms:
    - unix
    - windows
  for:
    - shell
traits:
  - id: rm-artifact-install-word
    desc: Delete install artifact keyword
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)\brm\s+.{0,64}(install|setup).{0,32}\.tar\b
  - id: rm-artifact-update-word
    desc: Delete update artifact keyword
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)\brm\s+.{0,64}(update|payload|package).{0,32}\.tar\b
  - id: rm-artifact-tar-suffix
    desc: Delete tarball artifact suffix
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)\brm\s+(-[rf]{1,4}\s+){1,4}\.?[a-z0-9._-]+\.tar(\.[a-z0-9]+)?\b
  - id: rm-dollar-zero
    desc: rm $0 self-deletion
    crit: suspicious
    conf: 0.8
    size_max: 5000
    if:
      type: string_literal
      regex: (^|\s|;)rm\s+\$0\b
    unless:
      - type: text
        substr: docutils
      - type: text
        substr: math2html
  - id: rm-dollar-zero-quoted
    desc: rm "$0" self-deletion (quoted)
    crit: suspicious
    conf: 0.8
    size_max: 5000
    if:
      type: string_literal
      regex: (^|\s|;)rm\s+"\$0"\b
    unless:
      - type: text
        substr: docutils
      - type: text
        substr: math2html
  - id: shred-dollar-zero
    desc: shred $0 self-deletion
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: shred\s+(-[a-z]+\s+)?["']?\$0["']?
  - id: rm-install-artifacts
    desc: Delete installer/setup artifacts
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: (?i)\brm\s+(-[rf]{1,4}\s+){1,4}\.?(install|setup)\.[A-Za-z0-9]+\b
  - id: rm-zip-artifacts
    desc: Delete zip installer artifacts
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: (?i)\brm\s+(-[rf]{1,4}\s+){1,4}\.?[a-z0-9._-]+\.zip\b
composite_rules:
  - id: rm-tar-artifacts
    desc: Delete tar installer artifacts
    crit: suspicious
    conf: 0.72
    unless:
      - id: well-known/app/ventoy/
    all:
      - id: rm-artifact-tar-suffix
    any:
      - id: rm-artifact-install-word
      - id: rm-artifact-update-word
  - id: self-delete-shell
    desc: Self-deleting shell script
    crit: suspicious
    conf: 0.66
    any:
      - id: rm-dollar-zero
      - id: rm-dollar-zero-quoted
      - id: shred-dollar-zero
      - id: rm-install-artifacts
      - id: rm-tar-artifacts
      - id: rm-zip-artifacts
