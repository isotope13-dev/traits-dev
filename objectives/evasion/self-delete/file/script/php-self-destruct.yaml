defaults:
  platforms: [windows, unix]
traits:
  - id: script-self-delete
    desc: "Script self-deletion (SCRIPT_FILENAME +"
    crit: suspicious
    conf: 0.95
    mbc: F0006
    attack: T1070.004
    for:
      - php
    if:
      type: text
      regex: unlink\s*\(\s*\$_SERVER\s*\[\s*['"]SCRIPT_FILENAME['"]\s*\]
