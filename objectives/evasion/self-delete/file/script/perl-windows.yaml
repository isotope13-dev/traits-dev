defaults:
  platforms: [windows, unix]
  for: [perl]
  attack: T1070.004

traits:
  - id: perl-self-delete-batch-name
    desc: Perl self-delete batch name
    crit: component
    conf: 0.88
    if:
      type: text
      substr: _self_delete.bat

  - id: perl-del-fq-current-batch
    desc: Perl deletes current batch file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'del /f /q "%~f0"'

  - id: perl-delayed-delete-loop
    desc: Perl delayed delete loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'timeout /t 2[\s\S]{0,260}del /f /q'

  - id: perl-minimized-cmd-delete-launch
    desc: Perl minimized cmd delete launch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'cmd.exe /c start /min cmd.exe /c'

composite_rules:
  - id: perl-delayed-batch-self-delete
    desc: Perl delayed batch self-delete
    crit: hostile
    conf: 0.98
    all:
      - id: perl-self-delete-batch-name
      - id: perl-del-fq-current-batch
      - id: perl-delayed-delete-loop
      - id: perl-minimized-cmd-delete-launch
