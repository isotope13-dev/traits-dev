# Node.js Self-Deletion and Manifest Swap
# Detects Node.js scripts that delete themselves and swap package manifests
# Used by axios hijack (plain-crypto-js) and similar supply chain attacks
# ATT&CK: T1070.004 (Indicator Removal: File Deletion)
defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  attack: T1070.004
  mbc: F0007
traits:
  - id: unlink-filename
    desc: Self-delete via fs.unlink(__filename)
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)unlink(Sync)?$'
      arg:
        kind: identifier
        name: __filename
  - id: rm-filename
    desc: Self-delete via fs.rm(__filename)
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)rm(Sync)?$'
      arg:
        kind: identifier
        name: __filename
  - id: obfuscated-rm-filename
    desc: Obfuscated self-delete function
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'function\s+removeme\(\).{0,120}__filename'
  - id: unlink-package-json
    desc: Deletes package.json after execution
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (fs\.unlink|unlinkSync)\s*\(\s*"package\.json"
  - id: rename-package-md
    desc: Renames package.md to package.json
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (fs\.rename|renameSync)\s*\(\s*"package\.md"
  - id: empty-unlink-callback
    desc: Self-delete via fs.unlink(__filename)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: fs\.unlink\s*\(\s*__filename\s*,\s*\(\)\s*=>\s*\{\s*\}\s*\)
composite_rules:
  - id: node-self-delete
    desc: Node.js script self-deletion
    crit: suspicious
    conf: 0.9
    any:
      - id: unlink-filename
      - id: rm-filename
      - id: obfuscated-rm-filename
  - id: manifest-swap
    desc: Package manifest swap after execution
    crit: suspicious
    conf: 0.95
    all:
      - id: unlink-package-json
    any:
      - id: rename-package-md
  - id: dropper-self-cleanup
    desc: Dropper self-cleanup with manifest swap
    crit: hostile
    conf: 0.95
    all:
      - id: node-self-delete
      - id: manifest-swap
