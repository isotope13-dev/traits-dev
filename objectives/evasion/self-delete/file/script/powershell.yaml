defaults:
  platforms:
    - unix
    - windows
  for:
    - powershell
    - batch
  mbc: F0007
  attack: T1070.004
traits:
  - id: remove-item
    desc: Remove-Item cmdlet
    crit: component
    conf: 0.6
    for:
      - powershell
    if:
      type: string_literal
      regex: Remove-Item|\bdel\b|\bri\b
      case_insensitive: true
  - id: remove-ps1
    desc: Remove PowerShell script
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: Remove-Item.{0,50}\.ps1
      case_insensitive: true
    not:
      - substr: install-opentofu.ps1
  - id: remove-self-ref
    desc: Remove self-reference script
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: Remove-Item.{0,50}\$PS(ScriptRoot|CommandPath)
      case_insensitive: true
    unless:
      - id: metadata/file/profile/identity::ansible-python-package-path
composite_rules:
  - id: self-delete-powershell
    desc: Self-deleting PowerShell
    crit: suspicious
    conf: 0.75
    any:
      - id: remove-ps1
      - id: remove-self-ref
