# Self-Deletion Detection - Unix
# MBC: F0007 (Self Deletion)
# ATT&CK: T1070.004
defaults:
  attack: T1070.004
  mbc: F0007
  platforms: [linux, unix, macos, android, ios]
  for: [binaries]
traits:
  - id: self-delete-unlink
    desc: Self-deleting via unlink
    crit: suspicious
    conf: 0.66
    if:
      type: raw
      substr: "unlink(argv[0])"
composite_rules:
  - id: tmp-hidden-devnull-context
    desc: Hidden temp file with daemonization marker
    crit: component
    conf: 0.7
    all:
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
      - id: micro-behaviors/fs/path/device::dev-null
  - id: mirai-style-self-delete
    desc: Memory-only execution pattern
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/fs/proc/info::process-self-exe # Reads /proc/self/exe
    any:
      - id: self-delete-unlink # Explicit unlink
      - id: tmp-hidden-devnull-context
