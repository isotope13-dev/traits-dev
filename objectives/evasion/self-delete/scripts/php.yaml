defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  attack: T1070.004
traits:
  - id: self-script-path-ref
    desc: Reference to the running script's own path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '__FILE__|\$_SERVER\[[''"]SCRIPT_FILENAME|\$argv\[\s*0\s*\]|realpath\s*\(\s*__FILE__'
  - id: php-test-or-fixture-path
    desc: PHP test, spec, or fixture path
    crit: notable
    conf: 0.9
    if:
      type: path
      regex: '(^|[\\/])(test|tests|spec|fixtures?)([\\/]|$)'
composite_rules:
  - id: php-recursive-delete
    desc: PHP recursive self-delete
    crit: suspicious
    all:
      - id: micro-behaviors/fs/enumerate/directory::php-scandir
      - id: micro-behaviors/fs/delete/directory::php-rmdir
      - id: micro-behaviors/fs/delete/file::php-unlink
      # Self-deletion targets the running script (__FILE__/SCRIPT_FILENAME/argv0).
      # Without this, scandir+rmdir+unlink is just directory cleanup (lifecycle
      # plumbing in tests, build commands, cache clearers) — a neutral fs
      # capability, not evasion/self-delete.
      - id: self-script-path-ref
    unless:
      - id: metadata/package/testing/harness/unit/
      - id: metadata/library/web-frameworks/
      - id: metadata/file/magic/identity::php-archive
      - id: well-known/app/wordpress-plugins::known-wordpress-plugin
  - id: php-staged-self-destruct
    desc: PHP staged self-destruct
    crit: hostile
    conf: 0.97
    all:
      - id: self-script-path-ref
      - id: micro-behaviors/fs/delete/file::php-unlink
      - id: micro-behaviors/fs/delete/directory::php-rmdir
    any:
      - id: micro-behaviors/fs/path/location::hidden-dir-literal
      - id: micro-behaviors/fs/temp/directory::sys-get-temp-dir
    unless:
      - id: well-known/app/egroupware/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: php-test-or-fixture-path
      - id: objectives/evasion/self-delete/scripts/
  - id: php-staged-self-destruct-benign-app-context
    desc: PHP app cleanup context
    crit: notable
    conf: 0.95
    any:
      - id: well-known/app/egroupware::egroupware-vfs-helper
      - id: well-known/app/egroupware::egroupware-filemanager-cli
      - id: well-known/app/civicrm::civicrm-upgrade-form
      - id: well-known/app/phpolygon
