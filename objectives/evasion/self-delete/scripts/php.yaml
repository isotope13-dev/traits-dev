defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  attack: T1070.004
composite_rules:
  - id: php-recursive-delete
    desc: Recursive directory cleanup in PHP
    crit: suspicious
    all:
      - id: micro-behaviors/fs/enumerate/directory::php-scandir
      - id: micro-behaviors/fs/delete/directory::php-rmdir
      - id: micro-behaviors/fs/delete/file::php-unlink
    # PHPUnit teardown routinely calls scandir+rmdir+unlink to clean fixture
    # directories. That's lifecycle plumbing, not anti-forensics — don't flag
    # the same primitive cluster as evasion when it sits inside a test class.
    unless:
      - id: metadata/package/testing/harness/unit::phpunit-test-context
