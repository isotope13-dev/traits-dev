defaults:
  platforms: [unix, netbsd, windows]
  for: [powershell]
  attack: T1070.004

traits:
  - id: ps-chararray-remove-item-self
    desc: PS chararray self removal
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: selfRemovalCmd

composite_rules:
  - id: ps-obfuscated-self-removal
    desc: PS obfuscated self removal
    crit: hostile
    conf: 0.98
    all:
      - id: ps-chararray-remove-item-self
      - id: micro-behaviors/data/source/syntax/typecast::char-array-cast
