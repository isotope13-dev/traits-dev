defaults:
  platforms: [windows]
  for: [c, cpp, pe]
  attack: T1070.004
  mbc: F0007

traits:
  - id: filetime-day-interval
    desc: FILETIME day interval constant
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "864000000000"

  - id: stale-heartbeat-check
    desc: Stale heartbeat comparison logic
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: (?i)(heartbeat|last[_ ]?checkin|filetime).{0,80}(864000000000|day count)

  - id: reg-delete-value-wide
    desc: Registry blob wipe API
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      exact: RegDeleteValueW
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/binary/metrics::many-exports-200
      - type: text
        substr: Software\Microsoft\Advanced INF Setup

  - id: self-temp-move
    desc: Self move into temp path
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: \b(GetTempPath[AW2]?|GetTempFileName[AW]?)\b.{0,80}\bMoveFile(Ex)?[AW]?\b
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-comp

  - id: se-security-privilege
    desc: SeSecurityPrivilege token name
    crit: suspicious
    conf: 0.92
    for: [c, cpp]
    if:
      type: text
      substr: SeSecurityPrivilege

  - id: se-takeownership-privilege
    desc: SeTakeOwnershipPrivilege token name
    crit: suspicious
    conf: 0.92
    for: [c, cpp]
    if:
      type: text
      substr: SeTakeOwnershipPrivilege

  - id: se-restore-privilege
    desc: SeRestorePrivilege token name
    crit: suspicious
    conf: 0.92
    for: [c, cpp]
    if:
      type: text
      substr: SeRestorePrivilege
    unless:
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component

composite_rules:
  - id: stale-contact-self-delete
    desc: Stale contact self-delete chain
    crit: suspicious
    conf: 0.97
    all:
      - id: stale-heartbeat-check
      - id: reg-delete-value-wide
      - id: objectives/evasion/self-delete/file::movefile-delay-until-reboot
    any:
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: self-temp-move
    needs: 1

  - id: token-privilege-setup-src
    desc: Token privilege setup in source
    crit: suspicious
    conf: 0.95
    for: [c, cpp]
    all:
      - id: micro-behaviors/os/privilege/token::open-process-token
      - id: micro-behaviors/os/privilege/token::lookup-privilege-value
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
    unless:
      - id: metadata/binary/installer/script::inno-setup
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component

  - id: privileged-cleanup-self-delete
    desc: Privileged cleanup self-delete chain
    crit: hostile
    conf: 0.99
    all:
      - id: stale-contact-self-delete
      - id: token-privilege-setup-src
    any:
      - id: se-restore-privilege
      - id: se-security-privilege
      - id: se-takeownership-privilege
    needs: 2
