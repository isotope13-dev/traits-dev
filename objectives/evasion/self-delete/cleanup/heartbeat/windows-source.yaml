defaults:
  platforms: [windows]
  for: [c, cpp, pe]
  attack: T1070.004
  mbc: F0007

traits:
- id: filetime-day-interval
  desc: FILETIME day interval constant
  crit: notable
  conf: 0.92
  if:
    type: text
    word: "864000000000"

- id: stale-heartbeat-check
  desc: Stale heartbeat comparison logic
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: (?i)(heartbeat|last[_ ]?checkin|filetime).{0,80}(864000000000|day count)

- id: advanced-inf-setup-regpath
  desc: Advanced INF Setup registry path reference
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: Software\Microsoft\Advanced INF Setup

- id: self-temp-move
  desc: Self move into temp path
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: \b(GetTempPath[AW2]?|GetTempFileName[AW]?)\b.{0,80}\bMoveFile(Ex)?[AW]?\b
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems/

- id: se-security-privilege
  desc: SeSecurityPrivilege token name
  crit: suspicious
  conf: 0.92
  for: [c, cpp]
  if:
    type: string_literal
    substr: SeSecurityPrivilege
  unless:
  - id: well-known/app/samba::samba-source-tree
  - id: well-known/app/wazuh/
  - type: text
    substr: SE_SECURITY_NAME
  - type: text
    regex: '\bLUID\s+SeSecurityPrivilege\b'
  - type: text
    regex: '\{\s*SeSecurityPrivilege\s*,'
  - type: text
    substr: SeExports->SeSecurityPrivilege
  - type: text
    substr: SepExports.SeSecurityPrivilege
  - id: metadata/lang/source/

- id: se-takeownership-privilege
  desc: SeTakeOwnershipPrivilege token name
  crit: suspicious
  conf: 0.92
  for: [c, cpp]
  if:
    type: string_literal
    substr: SeTakeOwnershipPrivilege
  unless:
  - id: well-known/app/samba::samba-source-tree
  - type: text
    substr: SE_TAKE_OWNERSHIP_NAME
  - type: text
    regex: '\bLUID\s+SeTakeOwnershipPrivilege\b'
  - type: text
    regex: '\{\s*SeTakeOwnershipPrivilege\s*,'
  - type: text
    substr: SeExports->SeTakeOwnershipPrivilege
  - type: text
    substr: SepExports.SeTakeOwnershipPrivilege
  - id: metadata/lang/source/

- id: se-restore-privilege
  desc: SeRestorePrivilege token name
  crit: suspicious
  conf: 0.92
  for: [c, cpp]
  if:
    type: string_literal
    substr: SeRestorePrivilege
  not:
  - substr: 'u"SeRestorePrivilege"'
  unless:
  - id: well-known/app/samba::samba-source-tree
  - type: text
    regex: SE_RESTORE_NAME|SeExports->SeRestorePrivilege|SepExports\.SeRestorePrivilege
  - type: text
    regex: '\bLUID\s+SeRestorePrivilege\b'
  - type: text
    regex: '\{\s*SeRestorePrivilege\s*,'
  - id: metadata/lang/source/
  - id: well-known/tool/sysadmin/sandboxie/
  - type: text
    substr: PyModuleDef

- id: windows-symlink-privilege-source
  desc: Windows symlink privilege setup
  crit: notable
  conf: 0.9
  for: [c, cpp]
  if:
    type: text
    substr: SeCreateSymbolicLinkPrivilege

composite_rules:
- id: stale-contact-self-delete
  desc: Stale contact self-delete chain
  crit: suspicious
  conf: 0.97
  all:
  - id: stale-heartbeat-check
  - id: micro-behaviors/os/registry/manipulate::reg-delete-value-w-symbol
  - id: objectives/evasion/self-delete/file/script::movefile-delay-until-reboot
  any:
  - id: micro-behaviors/fs/file/move::move-file-ex
  - id: self-temp-move
- id: privileged-token-setup-with-stale-cleanup
  desc: Token privilege setup paired with stale self-cleanup
  crit: suspicious
  conf: 0.95
  for: [c, cpp]
  all:
  - id: stale-contact-self-delete
  - id: micro-behaviors/os/privilege/token::open-process-token
  - id: micro-behaviors/os/privilege/token::lookup-privilege-value
  - id: micro-behaviors/os/privilege/token::adjust-token-privileges
  unless:
  - id: metadata/package/testing/presence/harness::git-tests-directory
  - id: metadata/binary/installer/script/
  - id: well-known/tool/sysadmin/sandboxie/
  - id: metadata/lang/source/
  - id: metadata/lang/source/
  - id: metadata/package/testing/presence/harness::c-source-test-directory
  - id: micro-behaviors/os/event/shutdown::register-application-restart
  - id: windows-symlink-privilege-source

- id: privileged-cleanup-self-delete
  desc: Privileged cleanup self-delete chain
  crit: hostile
  conf: 0.99
  all:
  - id: stale-contact-self-delete
  - id: privileged-token-setup-with-stale-cleanup
  any:
  - id: se-restore-privilege
  - id: se-security-privilege
  - id: se-takeownership-privilege
  needs: 2
