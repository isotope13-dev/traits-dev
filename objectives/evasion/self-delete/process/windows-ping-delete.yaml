defaults:
  platforms: [windows]
  for: [pe, dll, csharp, batch]
  attack: T1070.004
  mbc: F0007
traits:
  - id: windows-ping-delay-delete-fragment
    desc: Ping delay delete fragment
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)ping\s+(1\.1\.1\.1|127\.0\.0\.1).{0,40}>\s*Nul\s*&\s*Del'
  - id: windows-cmd-ping-delete
    desc: cmd ping delete command
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(?i)/c\s+ping\s+(1\.1\.1\.1|127\.0\.0\.1).{0,60}&\s*Del'
  - id: dotnet-file-move-api
    desc: .NET file move API
    crit: component
    conf: 0.68
    if:
      type: text
      word: MoveFile
  - id: melted-filename-accessor
    desc: Melted filename accessor
    crit: component
    conf: 0.92
    count_min: 1
    if:
      type: text
      regex: '[gs]et_MeltedFileName'
composite_rules:
  - id: windows-ping-delete-command
    desc: Windows delayed self-delete command
    crit: component
    conf: 0.95
    any:
      - id: windows-ping-delay-delete-fragment
      - id: windows-cmd-ping-delete
    all:
      - id: micro-behaviors/process/create/exec::cmd-exe-reference
    unless:
      - id: metadata/binary/installer/
      - id: metadata/signed/platform/
  - id: dotnet-melt-delete-workflow
    desc: .NET melt self-delete workflow
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/process/create/exec::cmd-exe-reference
      - id: windows-ping-delay-delete-fragment
    any:
      - id: micro-behaviors/fs/delete/file::dotnet-file-delete-api
      - id: dotnet-file-move-api
      - id: melted-filename-accessor
    needs: 2
    unless:
      - id: metadata/binary/installer/
