defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1070.004
  mbc: F0007

traits:
  - id: vb6-runner-bat-writer
    desc: VB6 writes runner batch file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Open\s+Environ\s*\(\s*["'']systemroot["'']\s*\)\s*&\s*["'']\\runner\.bat["'']\s+For\s+Output'

  - id: vb6-self-delete-bat-line
    desc: VB6 emits self-delete command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'Print\s+#\d+,\s*["'']Del\s+["''].{0,80}App\.Path.{0,80}App\.EXEName.{0,40}\.exe'

  - id: vb6-hidden-runner-bat-shell
    desc: VB6 runs batch hidden
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'Shell\s+Environ\s*\(\s*["'']systemroot["'']\s*\)\s*&\s*["'']\\runner\.bat["'']\s*,\s*vbHide'

composite_rules:
  - id: vb6-batch-melt-self-delete
    desc: VB6 batch melt self-delete
    crit: hostile
    conf: 0.98
    all:
      - id: vb6-runner-bat-writer
      - id: vb6-self-delete-bat-line
      - id: vb6-hidden-runner-bat-shell
