defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1070.004"
traits:
  - id: source-filldelete
    desc: Filldelete dropped source executable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'nircmdc\.exe\s+filldelete\s+"'
composite_rules:
  - id: nircmd-self-delete
    desc: NirCmd-assisted self deletion
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/vb-shell::current-directory-delete
      - id: micro-behaviors/process/create/vb-shell::nircmd-waitprocess-filldelete
  - id: aggressive-nircmd-evidence-removal
    desc: Aggressive NirCmd evidence removal
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/vb-shell::nircmd-waitprocess-filldelete
      - id: source-filldelete
      - id: micro-behaviors/process/create/vb-shell::nircmd-temp-exe-delete
