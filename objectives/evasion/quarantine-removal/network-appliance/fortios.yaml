defaults:
  platforms: [fortios]
  for: [javascript, typescript, php]
  attack: T1562.001
  mbc: OB0006

traits:
  - id: fortios-monitor-quarantine-api
    desc: FortiOS monitor quarantine API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/monitor/(email|webfilter|antivirus)/quarantine'
  - id: fortios-cmdb-quarantine-api
    desc: FortiOS CMDB quarantine API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/cmdb/system/(email|webfilter|antivirus|fabric)/quarantine'
  - id: fortios-exec-quarantine-api
    desc: FortiOS exec quarantine API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/pm/exec/[A-Za-z0-9_-]{0,48}quarantine'
  - id: fortios-analyzer-quarantine-api
    desc: FortiOS analyzer quarantine API
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/analyzer/[a-z]{1,32}/quarantine'
  - id: fortios-quarantine-delete
    desc: FortiOS quarantine delete request
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(apiRequest|fortios_request)\(\s*["'']DELETE["''][^\n)]{0,240}quarantine'
  - id: fortios-quarantine-disable
    desc: FortiOS quarantine disable setting
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(quarantine(-addr|-file|-enabled)?|auto-quarantine)["'']?\s*[:=]\s*["'']disable'
  - id: fortios-quarantine-delete-all
    desc: FortiOS quarantine delete-all
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/monitor/(email|webfilter|antivirus)/quarantine/delete-all'

composite_rules:
  - id: fortios-quarantine-api
    desc: FortiOS quarantine API
    crit: suspicious
    conf: 0.94
    any:
      - id: fortios-monitor-quarantine-api
      - id: fortios-cmdb-quarantine-api
      - id: fortios-exec-quarantine-api
      - id: fortios-analyzer-quarantine-api

  - id: fortios-quarantine-removal
    desc: FortiOS quarantine removal workflow
    crit: hostile
    conf: 0.98
    all:
      - id: fortios-quarantine-api
    any:
      - id: fortios-quarantine-delete
      - id: fortios-quarantine-disable
      - id: fortios-quarantine-delete-all
