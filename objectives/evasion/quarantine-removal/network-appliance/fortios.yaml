defaults:
  platforms: [fortios]
  for: [javascript, typescript]
  attack: T1562.001
  mbc: OB0006

traits:
  - id: fortios-quarantine-api
    desc: FortiOS quarantine API path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/analyzer/[a-z]+/quarantine'
  - id: fortios-quarantine-delete
    desc: FortiOS quarantine delete request
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'apiRequest\(\s*["'']DELETE["'']'
  - id: fortios-quarantine-disable
    desc: FortiOS quarantine disable setting
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'quarantine(-addr|-file)?["'']?\s*:\s*["'']disable'

composite_rules:
  - id: fortios-quarantine-removal
    desc: FortiOS quarantine removal workflow
    crit: hostile
    conf: 0.98
    all:
      - id: fortios-quarantine-api
    any:
      - id: fortios-quarantine-delete
      - id: fortios-quarantine-disable
