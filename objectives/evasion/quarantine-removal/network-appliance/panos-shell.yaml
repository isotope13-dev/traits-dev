defaults:
  platforms: [panos, appliance, unix]
  for: [shell]
  attack: T1562

traits:
  - id: panos-antivirus-clear-quarantine
    desc: PAN-OS clears AV quarantine
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: request system antivirus clear quarantine all

  - id: panos-quarantine-artifact-removal
    desc: PAN-OS quarantine artifact removal
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/log/av/quarantine[\s\S]{0,160}/var/content/av/quarantine'

composite_rules:
  - id: panos-shell-quarantine-clear
    desc: PAN-OS shell quarantine clear
    crit: hostile
    conf: 0.98
    all:
      - id: panos-antivirus-clear-quarantine
      - id: panos-quarantine-artifact-removal
