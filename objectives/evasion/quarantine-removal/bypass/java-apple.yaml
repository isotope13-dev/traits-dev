defaults:
  platforms: [ios, macos]
  for: [java, class]
  attack: T1562.001

traits:
  - id: java-xattr-quarantine-delete
    desc: Java xattr quarantine delete
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'xattr.{0,80}-d.{0,80}com\.apple\.quarantine'

  - id: java-strip-quarantine-helper
    desc: Java stripQuarantine helper
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: stripQuarantine

  - id: java-quarantine-attr-string
    desc: Java quarantine attribute string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: com.apple.quarantine

  - id: jvm-quarantine-attr-const
    desc: JVM quarantine attribute const
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 63 6F 6D 2E 61 70 70 6C 65 2E 71 75 61 72 61 6E 74 69 6E 65

  - id: jvm-strip-quarantine-const
    desc: JVM stripQuarantine const
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 73 74 72 69 70 51 75 61 72 61 6E 74 69 6E 65

composite_rules:
  - id: java-apple-quarantine-removal
    desc: Java Apple quarantine removal
    crit: hostile
    conf: 0.98
    any:
      - id: java-xattr-quarantine-delete
    all:
      - id: java-strip-quarantine-helper
      - id: java-quarantine-attr-string

  - id: jvm-apple-quarantine-removal
    desc: JVM Apple quarantine removal
    crit: hostile
    conf: 0.97
    all:
      - id: jvm-quarantine-attr-const
      - id: jvm-strip-quarantine-const
