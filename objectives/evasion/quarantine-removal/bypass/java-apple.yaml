defaults:
  platforms: [ios, macos]
  for: [java, class]
  attack: T1562.001

traits:
composite_rules:
  - id: java-apple-quarantine-removal
    desc: Java Apple quarantine removal
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/attributes/xattr::java-quarantine-xattr-command
      - id: micro-behaviors/fs/attributes/xattr::java-strip-quarantine-helper
      - id: micro-behaviors/fs/attributes/xattr::java-quarantine-attribute-reference

  - id: jvm-apple-quarantine-removal
    desc: JVM Apple quarantine removal
    crit: hostile
    conf: 0.97
    for: [class]
    all:
      - id: micro-behaviors/fs/attributes/xattr::jvm-quarantine-attribute-constant
      - id: micro-behaviors/fs/attributes/xattr::jvm-strip-quarantine-constant
