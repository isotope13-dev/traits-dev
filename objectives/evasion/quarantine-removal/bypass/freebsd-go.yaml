defaults:
  platforms: [freebsd, unix]
  for: [go, elf]
  attack: T1562.001

traits:
  - id: go-freebsd-chflags-call
    desc: Go calls FreeBSD Chflags
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: syscall.Chflags

  - id: go-freebsd-flagged-files-scan
    desc: Go scans FreeBSD file flags
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: flagged=%d cleared=%d

composite_rules:
  - id: go-freebsd-file-flag-removal
    desc: Go removes FreeBSD file flags
    crit: hostile
    conf: 0.98
    all:
      - id: go-freebsd-chflags-call
      - id: go-freebsd-flagged-files-scan

