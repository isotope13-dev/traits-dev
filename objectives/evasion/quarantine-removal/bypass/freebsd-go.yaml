defaults:
  platforms: [freebsd, unix]
  for: [go, elf]
  attack: T1562.001

traits:
  - id: go-freebsd-flagged-files-scan
    desc: FreeBSD file-flag status format string
    crit: component
    conf: 0.92
    if:
      type: literal
      kind: string
      exact: '"flagged=%d cleared=%d"'

composite_rules:
  - id: go-freebsd-file-flag-removal
    desc: Go removes FreeBSD file flags
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/attributes/chflags::go-syscall-chflags-call
      - id: go-freebsd-flagged-files-scan
