defaults:
  platforms: [unix]
  for: [objc, elf]
  attack: T1562.001

traits:
  - id: objc-removexattr-quarantine
    desc: ObjC removes quarantine xattrs
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'com\.apple\.quarantine[\s\S]{0,520}removexattr'

  - id: objc-home-tmp-xattr-walk
    desc: ObjC walks home and tmp xattrs
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'stripDir:home[\s\S]{0,300}opendir\("/tmp"\)'

composite_rules:
  - id: objc-recursive-quarantine-removal
    desc: ObjC recursive xattr removal
    crit: hostile
    conf: 0.97
    all:
      - id: objc-removexattr-quarantine
      - id: objc-home-tmp-xattr-walk
