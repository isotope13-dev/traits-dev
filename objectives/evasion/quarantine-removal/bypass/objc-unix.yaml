defaults:
  platforms: [unix]
  for: [objc, elf]
  attack: T1562.001

traits:
  - id: objc-home-tmp-xattr-walk
    desc: ObjC walks home and tmp xattrs
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'stripDir:home[\s\S]{0,300}opendir\("/tmp"\)'

composite_rules:
  - id: objc-recursive-quarantine-removal
    desc: Objective-C recursive quarantine removal
    crit: hostile
    conf: 0.97
    all:
      # The xattr call is a neutral capability.  Hostile intent requires the
      # separate attack-specific signal for walking home and temporary paths.
      - id: micro-behaviors/fs/attributes/xattr::xattr-remove-removexattr
      - id: objc-home-tmp-xattr-walk
