defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1562.001

traits:
  - id: rust-xattr-quarantine-delete
    desc: References macOS quarantine xattr label
    crit: notable
    conf: 0.94
    for: [rust]
    if:
      type: text
      substr: com.apple.quarantine
    unless:
      - type: text
        regex: 'setup-seeds\.tar\.zst|ensure_seeds_extracted'
      - type: text
        substr: Some IDEs refuse to read quarantined files
      - id: metadata/binary/framework/
      # macOS app self-update/install: ditto-copies its own .app bundle into
      # /Applications, then clears quarantine on that bundle (admin-prompted).
      # Benign self-install, not a Gatekeeper bypass on a dropped payload.
      - type: text
        regex: 'ditto[^\n]{0,200}com\.apple\.quarantine'

  - id: rust-xattr-command
    desc: Runs the macOS xattr command
    crit: notable
    conf: 0.94
    for: [rust]
    if:
      type: tree-sitter
      language: rust
      kind: call
      regex: '(Command::new|process::Command::new)\s*\(\s*["'']xattr["'']'
    unless:
      - type: text
        regex: 'setup-seeds\.tar\.zst|ensure_seeds_extracted'
      - type: text
        substr: Some IDEs refuse to read quarantined files
      - id: well-known/app/drivers/
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename

composite_rules:
  - id: rust-macos-quarantine-removal
    desc: Rust macOS quarantine removal
    crit: hostile
    conf: 0.98
    all:
      - id: rust-xattr-quarantine-delete
      - id: rust-xattr-command
