defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1562.001

traits:
  - id: rust-xattr-quarantine-delete
    desc: Rust xattr quarantine delete
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: com.apple.quarantine
    unless:
      - type: text
        regex: 'setup-seeds\.tar\.zst|ensure_seeds_extracted'
      - type: text
        substr: Some IDEs refuse to read quarantined files
      - id: metadata/binary/framework::macos-updater-helper-name

  - id: rust-xattr-command
    desc: Rust xattr command
    crit: component
    conf: 0.94
    if:
      type: text
      substr: xattr
    unless:
      - type: text
        regex: 'setup-seeds\.tar\.zst|ensure_seeds_extracted'
      - type: text
        substr: Some IDEs refuse to read quarantined files
      - id: well-known/app/drivers::nvidia-linux-driver-component
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename

composite_rules:
  - id: rust-macos-quarantine-removal
    desc: Rust macOS quarantine removal
    crit: hostile
    conf: 0.98
    all:
      - id: rust-xattr-quarantine-delete
      - id: rust-xattr-command
