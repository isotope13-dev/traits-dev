defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1562.001

traits:
  - id: rust-xattr-quarantine-delete
    desc: Rust xattr quarantine delete
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: com.apple.quarantine

  - id: rust-xattr-command
    desc: Rust xattr command
    crit: component
    conf: 0.94
    if:
      type: text
      substr: xattr

composite_rules:
  - id: rust-macos-quarantine-removal
    desc: Rust macOS quarantine removal
    crit: hostile
    conf: 0.98
    all:
      - id: rust-xattr-quarantine-delete
      - id: rust-xattr-command
