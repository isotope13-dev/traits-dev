defaults:
  platforms: [ios]
  for: [lua]
  attack: T1553.001

traits:
  - id: lua-xattr-quarantine-delete
    desc: Lua deletes quarantine xattr
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'xattr -d com\.apple\.quarantine'

  - id: lua-mobile-substrate-quarantine
    desc: Lua targets substrate quarantine
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /Library/MobileSubstrate/DynamicLibraries

composite_rules:
  - id: lua-ios-quarantine-removal
    desc: Lua iOS quarantine removal
    crit: hostile
    conf: 0.98
    all:
      - id: lua-xattr-quarantine-delete
      - id: lua-mobile-substrate-quarantine
