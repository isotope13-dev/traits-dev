defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: xattr-quarantine-remove
    desc: xattr removes quarantine attribute
    crit: notable
    conf: 0.9
    mbc: B0047
    attack: T1562.001
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    if:
      type: text
      regex: '[fx]?xattr\s+.*?-(r?d|d?r|delete|--delete).*?com\.apple\.quarantine'
    unless:
      - id: metadata/binary/framework::electron-framework-binary
      - type: text
        regex: 'electron/js2c/|process\._linkedBinding\("electron_'
      - type: text
        substr: "/YOUR_PATH/ChatGPT.app"
      - type: text
        substr: find analysis -exec /usr/bin/xattr -d com.apple.quarantine
      - type: text
        regex: '(?m)^\s*#.*xattr\s+.*com\.apple\.quarantine'
      - id: objectives/evasion/quarantine-removal/bypass/
      - id: well-known/app/localai/
  - id: xattr-clear-all
    desc: xattr clears all extended attributes
    crit: suspicious
    conf: 0.8
    mbc: B0047
    platforms:
      - macos
    if:
      type: text
      regex: '[fx]?xattr\s+-c\b'
  - id: python-xattr-quarantine-argv
    desc: Python argv removes quarantine attribute
    crit: suspicious
    conf: 0.95
    mbc: B0047
    attack: T1562.001
    platforms:
      - macos
    for:
      - python
    if:
      type: text
      regex: '["'']xattr["''].{0,40}["'']-d["''].{0,80}com\.apple\.quarantine'
    unless:
      - id: metadata/binary/framework::electron-framework-binary
      - type: text
        regex: 'electron/js2c/|process\._linkedBinding\("electron_'
      - type: text
        substr: "/YOUR_PATH/ChatGPT.app"
      - type: text
        substr: find analysis -exec /usr/bin/xattr -d com.apple.quarantine
      - id: objectives/evasion/quarantine-removal/bypass/
  - id: node-xattr-quarantine-argv
    desc: Node spawn removes quarantine attribute
    crit: suspicious
    conf: 0.92
    mbc: B0047
    attack: T1562.001
    platforms:
      - macos
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: 'spawn\(\s*["'']xattr["''][\s\S]{0,160}com\.apple\.quarantine'
    unless:
      - id: metadata/binary/framework::electron-framework-binary
      - type: text
        regex: 'electron/js2c/|process\._linkedBinding\("electron_'
      - id: objectives/evasion/quarantine-removal/bypass/
      - id: objectives/command-and-control/dropper/execution/script-dropper/
composite_rules:
  - id: macos-quarantine-repair-context
    desc: Legitimate macOS quarantine repair workflow
    crit: baseline
    any:
      - id: micro-behaviors/os/service/legitimate::macos-quarantine-repair-installer
      - id: micro-behaviors/os/service/legitimate::macos-local-build-quarantine-repair-installer
      - id: micro-behaviors/os/service/legitimate::macos-local-pyinstaller-quarantine-repair
  - id: curl-chmod-xattr-tmp
    desc: Download to /tmp, clear quarantine, and execute (hostile)
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: micro-behaviors/fs/path/temp::unix-temp
      - id: xattr-clear-all
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
      - id: micro-behaviors/process/create/shell/spawn::shell-tmp-execution
