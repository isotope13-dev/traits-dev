defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
  attack: T1562.001
traits:
  - id: xattr-quarantine-remove
    desc: xattr removes quarantine attribute
    crit: suspicious
    conf: 0.9
    mbc: B0047
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    if:
      type: string_value
      regex: '[fx]?xattr\s+.*?(-d|delete|--delete).*?com\.apple\.quarantine'
  - id: xattr-clear-all
    desc: xattr clears all extended attributes
    crit: suspicious
    conf: 0.8
    mbc: B0047
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    if:
      type: string_value
      regex: '[fx]?xattr\s+-c\b'
composite_rules:
  - id: curl-chmod-xattr-tmp
    desc: Download to /tmp, clear quarantine, and execute (hostile)
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: micro-behaviors/fs/path/temp::unix-temp
      - id: xattr-clear-all
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
      - id: micro-behaviors/process/create/shell::shell-tmp-execution
