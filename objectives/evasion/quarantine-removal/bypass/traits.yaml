defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: xattr-quarantine-remove
    desc: xattr removes quarantine attribute
    crit: suspicious
    conf: 0.9
    mbc: B0047
    attack: T1562.001
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    if:
      type: string_value
      regex: '[fx]?xattr\s+.*?(-d|delete|--delete).*?com\.apple\.quarantine'
