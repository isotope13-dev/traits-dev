# Disabling an AI coding agent's auto-updater.
#
# Claude Code keeps itself current via a built-in auto-updater. A third-party
# package writing `autoUpdaterStatus = "disabled"` into ~/.claude.json freezes the
# victim on whatever version is installed — useful to an attacker who has just
# force-installed a specific (possibly downgraded/vulnerable) build and wants it
# to stick. Pinning a security tool against updates is defense impairment (T1562),
# distinct from a user opting out in their own config.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, json, text]
  attack: T1562.001
traits:
  - id: claude-autoupdater-disable
    desc: Sets Claude auto-updater to disabled
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'autoUpdaterStatus["'']?\s*[=:]\s*["'']disabled'
  - id: claude-onboarding-bypass
    desc: Marks Claude onboarding complete
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'hasCompletedOnboarding["'']?\s*[=:]\s*true'
composite_rules:
  # Writing the auto-updater off into the Claude config (often alongside an
  # onboarding-complete flag to suppress first-run prompts) = a package freezing
  # the agent's version behind the user's back.
  - id: ai-agent-autoupdate-disable
    desc: Disables Claude Code auto-updater
    crit: suspicious
    conf: 0.85
    all:
      - id: claude-autoupdater-disable
    any:
      - id: micro-behaviors/fs/path/application/config::claude-config-directory
      - id: claude-onboarding-bypass
