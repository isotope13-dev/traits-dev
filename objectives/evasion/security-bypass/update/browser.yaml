# Browser auto-update sabotage
# Detects code that weaponises legitimate Chromium / Edge / Firefox CLI flags
# to permanently disable or simulate an absent update channel.
# ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1562.001
  mbc: F0004
traits:
  - id: chrome-simulate-outdated-no-au
    desc: Chrome --simulate-outdated-no-au flag
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: --simulate-outdated-no-au
  - id: chrome-disable-component-update
    desc: Chrome --disable-component-update flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: --disable-component-update
    unless:
      - id: objectives/evasion/security-bypass/update/
  - id: chrome-disable-background-networking
    desc: Chrome --disable-background-networking flag
    crit: component
    conf: 0.75
    if:
      type: text
      substr: --disable-background-networking
  - id: edge-disable-auto-update
    desc: Edge --disable-auto-update flag
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: --disable-auto-update\b
    downgrade:
      any:
        - id: well-known/app/nezha/
        - id: well-known/app/nezha/
        - id: micro-behaviors/communications/http/urls/c2-domains::ssss-nyc-mn
        - type: text
          substr: "NEZHA_SERVER"
  - id: future-outdated-sentinel
    desc: Suspiciously distant outdated-sentinel date
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b(01|1)\s+Jan\s+21\d{2}\b
  - id: chromium-no-first-run-flag
    desc: Chromium --no-first-run flag
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: --no-first-run
  - id: playwright-chromium-launch
    desc: Playwright Chromium launch call
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: chromium.launch
composite_rules:
  - id: chromium-headless-automation-flags
    desc: Chromium headless automation flags
    crit: notable
    conf: 0.9
    all:
      - id: chrome-disable-background-networking
      - id: chromium-no-first-run-flag
    any:
      - id: metadata/library/automation::playwright-import
      - id: metadata/library/automation::playwright-require
      - id: playwright-chromium-launch
  - id: chrome-auto-update-disabled
    desc: Chrome auto-update permanently disabled
    crit: hostile
    conf: 0.96
    all:
      - id: chrome-simulate-outdated-no-au
    any:
      - id: future-outdated-sentinel
      - id: chrome-disable-component-update
      - id: chrome-disable-background-networking
    unless:
      - id: metadata/library/automation/
  - id: browser-update-channel-tamper
    desc: Browser update channel tampered via CLI
    crit: suspicious
    conf: 0.9
    any:
      - id: chrome-disable-component-update
      - id: edge-disable-auto-update
    unless:
      - id: metadata/library/automation/
