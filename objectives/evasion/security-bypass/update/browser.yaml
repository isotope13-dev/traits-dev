# Browser auto-update sabotage
# Detects code that weaponises legitimate Chromium / Edge / Firefox CLI flags
# to permanently disable or simulate an absent update channel.
# ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1562.001
  mbc: F0004
traits:
  - id: future-outdated-sentinel
    desc: Suspiciously distant outdated-sentinel date
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b(01|1)\s+Jan\s+21\d{2}\b
composite_rules:
  - id: chromium-headless-automation-flags
    desc: Chromium headless automation flags
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/process/create/flags::chrome-disable-background-networking-flag
      - id: micro-behaviors/process/create/flags::chromium-no-first-run-flag
    any:
      - id: metadata/library/automation::playwright-import
      - id: metadata/library/automation::playwright-require
      - id: metadata/library/automation::playwright-python-chromium-launch
  - id: chrome-auto-update-disabled
    desc: Chrome auto-update suppression flags
    crit: notable
    conf: 0.96
    all:
      - id: micro-behaviors/process/create/flags::chrome-simulate-outdated-no-au-flag
    any:
      - id: future-outdated-sentinel
      - id: micro-behaviors/process/create/flags::chrome-disable-component-update-flag
      - id: micro-behaviors/process/create/flags::chrome-disable-background-networking-flag
    unless:
      - id: metadata/library/automation/
  - id: browser-update-channel-tamper
    desc: Browser update channel tampered via CLI
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/flags::chrome-disable-component-update-flag
    unless:
      - id: metadata/library/automation/

  - id: edge-update-channel-tamper
    desc: Edge auto-update disabled via CLI
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/create/flags::edge-disable-auto-update-flag
    unless:
      - id: metadata/library/automation/
    downgrade:
      any:
        - id: well-known/app/nezha/
        - id: micro-behaviors/communications/http/urls/c2-domains::ssss-nyc-mn
        - type: text
          substr: "NEZHA_SERVER"
