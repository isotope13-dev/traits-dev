defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: provider-challenge-retry-controls
    desc: Configures provider challenge retries
    crit: notable
    conf: 0.97
    count_min: 2
    if:
      type: text
      regex: '(?i)(applyAntiBlockPreset|rotateProxyOnChallenge|softRetryBlocks|challengeRetries)'

composite_rules:
  - id: proxy-rotated-provider-anti-bot-harvest
    desc: Proxy-rotated provider harvesting with anti-block and challenge retries
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/collection/email-harvest::provider-email-harvest
      - id: micro-behaviors/communications/http/proxy::rotating-http-proxy-pool
      - id: provider-challenge-retry-controls
      - id: objectives/supply-chain/hidden-payload/runtime::obfuscator-io-toolkit-bundle
