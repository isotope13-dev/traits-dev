defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, binaries]

traits:
  - id: camoufox-browser-runtime
    desc: Imports the Camoufox anti-detect browser runtime
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: symbol
      kind: import
      exact: camoufox.async_api
  - id: browserforge-fingerprint-generation
    desc: Generates browser fingerprints with BrowserForge
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: symbol
      kind: call
      exact: FingerprintGenerator
  - id: humanized-browser-scroll
    desc: Simulates human scrolling in browser automation
    crit: notable
    conf: 0.94
    for: [python]
    if:
      type: symbol
      kind: call
      exact: human_scroll

  - id: cloudflare-bypasser-api
    desc: Cloudflare challenge bypass API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CloudflareBypasser
  - id: cloudflare-challenge-frame
    desc: Cloudflare challenge frame automation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: challenges.cloudflare.com
  - id: turnstile-coordinate-solver
    desc: Turnstile challenge coordinate solver
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: get_turnstile_coordinates
  - id: stealth-browser-api
    desc: Stealth browser automation API
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: StealthBrowser
  - id: browser-fingerprint-platform-flag
    desc: Browser fingerprint platform launch flag
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: --fingerprint-platform=
  - id: browser-fingerprint-locale-flag
    desc: Browser fingerprint locale launch flag
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: --fingerprint-locale=
  - id: antibot-evasion-description
    desc: Package description claims anti-bot evasion
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      substr: anti-bot evasion
      case_insensitive: true
  - id: anti-detect-description
    desc: Package description claims anti-detect
    crit: notable
    conf: 0.92
    for: [pkginfo]
    if:
      type: text
      regex: '\banti[- ]?detect\b|antidetect'
      case_insensitive: true
  - id: antibot-description
    desc: Package metadata claims anti-bot capability
    crit: notable
    conf: 0.9
    for: [pkginfo, package.json]
    if:
      type: text
      regex: '\b(antibot|anti[- ]bot|bot-detection)\b'
      case_insensitive: true
  - id: multi-vendor-antibot-solvers
    desc: Package lists multiple anti-bot solver vendors
    crit: notable
    conf: 0.95
    for: [pkginfo, package.json, python, javascript, go]
    if:
      type: text
      regex: 'PerimeterX.{0,180}hCaptcha.{0,180}DataDome.{0,180}Incapsula'
      case_insensitive: true
  - id: captcha-bypass-description
    desc: Package description claims captcha bypass
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: 'captcha[- ]?bypass'
      case_insensitive: true
  - id: browser-tls-impersonation-description
    desc: Browser TLS impersonation claim
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      substr: browser-grade TLS impersonation
      case_insensitive: true
  - id: captcha-solver-description
    desc: Package describes captcha solver
    crit: notable
    conf: 0.92
    for: [pkginfo, python]
    if:
      type: text
      substr: captcha solver
      case_insensitive: true
  - id: automatic-captcha-solving
    desc: Package describes automatic captcha solving
    crit: notable
    conf: 0.92
    for: [pkginfo, python]
    if:
      type: text
      substr: automatic captcha solving
      case_insensitive: true
  - id: stealth-browser-session-description
    desc: Package describes stealth browser sessions
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\bstealth\s+browser\s+sessions?\b'
  - id: browser-proxy-automation-description
    desc: Package describes browser proxy automation
    crit: notable
    conf: 0.88
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\bbrowser\s+sessions?\b.{0,120}\bproxies\b|\bproxies\b.{0,120}\bbrowser\s+sessions?\b'
  - id: captcha-provider-list
    desc: Package lists multiple captcha providers
    crit: suspicious
    conf: 0.9
    for: [pkginfo, python]
    if:
      type: text
      regex: 'reCAPTCHA v2[\s\S]{0,180}hCaptcha[\s\S]{0,180}FunCaptcha'
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
  # "fingerprint spoofing" is a dual-use claim: anti-bot evasion tools AND
  # privacy/anti-tracking extensions both spoof the fingerprint. Kept notable
  # (a capability claim, like the sibling claim-atoms above); the anti-bot
  # intent is carried by composites that also require an antibot-evasion-claim
  # or code-based webdriver masking.
  - id: browser-fingerprint-spoofing
    desc: Browser fingerprint spoofing claim
    crit: notable
    conf: 0.92
    for: [pkginfo, python, javascript]
    if:
      type: text
      substr: fingerprint spoofing
      case_insensitive: true
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::mithwire-package-identity-context
      - id: metadata/package/quality/false-positives::mithwire-benign-automation-context
  - id: custom-browser-fingerprints
    desc: Custom browser fingerprints claim
    crit: suspicious
    conf: 0.92
    for: [pkginfo, python, javascript]
    if:
      type: text
      substr: customisable browser fingerprints
      case_insensitive: true
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::mithwire-benign-automation-context
  - id: navigator-webdriver-code
    desc: Navigator webdriver masking code
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'Object\.defineProperty\s*\(\s*navigator\s*,\s*["\x27]webdriver["\x27]'
    unless:
      - id: well-known/app/ibb8::ibb8-browser-extension-context
      - id: well-known/app/quantomate::quantomate-browser-extension-context
      - id: well-known/app/quantomate::quantomate-cdp-runtime-context
  - id: navigator-webdriver-script-string
    desc: Navigator webdriver masking script string
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: literal
      kind: string
      regex: 'Object\.defineProperty\s*\(\s*navigator\s*,\s*["\x27]webdriver["\x27]'
  - id: navigator-webdriver-getter-override
    desc: Navigator webdriver getter masking
    crit: suspicious
    conf: 0.9
    for: [pkginfo, python, javascript]
    if:
      type: text
      regex: 'navigator\.__defineGetter__\s*\(\s*["\x27]webdriver["\x27]'
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
  - id: navigator-webdriver-delete
    desc: Navigator webdriver property deletion
    crit: suspicious
    conf: 0.88
    for: [pkginfo, python, javascript]
    if:
      type: text
      substr: delete navigator.webdriver
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
  - id: webrtc-ip-leak-blocked
    desc: WebRTC IP leak blocking
    crit: suspicious
    conf: 0.88
    for: [pkginfo, python, javascript]
    if:
      type: text
      substr: WebRTC IP leak blocked
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context

  - id: captcha-solver-api-endpoint
    desc: CAPTCHA solver service endpoint
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: 'https://[A-Za-z0-9.-]*captcha[A-Za-z0-9.-]*'

  - id: captcha-task-creation-call
    desc: Creates external CAPTCHA solver task
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: literal
      kind: string
      substr: createTask

  - id: captcha-task-result-poll
    desc: Polls external CAPTCHA solver result
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: getTaskResult

  - id: captcha-image-submission-message
    desc: Sends CAPTCHA images to extension worker
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)sendChrome\.X\s*\(\s*["'']imgs["'']|runtime\.sendMessage\s*\(\s*\[\s*["'']imgs["'']'

  - id: traceless-captcha-verification
    desc: Browser traceless CAPTCHA verification
    crit: suspicious
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: startTracelessVerification

  - id: chromium-automation-controlled-suppression
    desc: Chromium hides AutomationControlled marker
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: literal
      kind: string
      exact: --disable-blink-features=AutomationControlled
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::wet-mcp-browser-automation-context
      - id: metadata/package/quality/false-positives::wet-mcp-interact-browser-context
      - id: well-known/app/harbor::harbor-framework-context
      - id: metadata/package/quality/false-positives::warn-scraper-benign-automation-context

  - id: browser-automation-artifact-cleanup
    desc: Deletes browser automation globals
    crit: suspicious
    conf: 0.95
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?i)delete\s+window\.(callPhantom|_phantom|__nightmare|_selenium)'

  - id: browser-automation-marker-cleanup
    desc: Removes browser automation marker globals
    crit: suspicious
    conf: 0.95
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?i)startsWith\(["''](__webdriver_|__selenium_|__fxdriver_|cdc_)'

  - id: navigator-webdriver-alias-mask
    desc: Masks webdriver property through navigator alias
    crit: suspicious
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?is)defineProperty\(\s*\w+\s*,\s*["'']webdriver["''][\s\S]{0,120}undefined'
    unless:
      - id: well-known/app/ibb8::ibb8-browser-extension-context
      - id: well-known/app/quantomate::quantomate-browser-extension-context
      - id: well-known/app/quantomate::quantomate-cdp-runtime-context

  - id: browser-screen-dimensions-spoof
    desc: Overrides browser screen dimensions
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: literal
      kind: string
      regex: '(?is)\bscreen\s*,\s*["'']height["'']'

  - id: browser-canvas-export-patch
    desc: Patches browser canvas export APIs
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)HTMLCanvasElement\.prototype[\s\S]{0,400}toDataURL'

  - id: browser-webgl-renderer-override
    desc: Overrides WebGL renderer identity
    crit: notable
    conf: 0.92
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)UNMASKED_VENDOR_WEBGL[\s\S]{0,100}UNMASKED_RENDERER_WEBGL'

  - id: browser-geolocation-api-suppression
    desc: Suppresses browser geolocation API
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator\s*,\s*["'']geolocation["'']'

  - id: browser-webrtc-api-neutralization
    desc: Neutralizes browser WebRTC APIs
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty[\s\S]{0,1000}RTCPeerConnection'

  - id: navigator-user-agent-override
    desc: Overrides browser user-agent identity
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator\s*,\s*["'']userAgent["'']'

  - id: navigator-platform-override
    desc: Overrides browser platform identity
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator\s*,\s*["'']platform["'']'

  - id: navigator-hardware-concurrency-spoof
    desc: Spoofs navigator hardware concurrency
    crit: notable
    conf: 0.94
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator.{0,80}hardwareConcurrency'

  - id: navigator-device-memory-spoof
    desc: Spoofs navigator device memory
    crit: notable
    conf: 0.94
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator.{0,80}deviceMemory'

  - id: navigator-touch-points-spoof
    desc: Spoofs navigator touch points
    crit: suspicious
    conf: 0.94
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator.{0,80}maxTouchPoints'

  - id: browser-webgl-parameter-spoof
    desc: Spoofs WebGL vendor or renderer parameters
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?is)getParameter\s*=\s*function[\s\S]{0,180}(37445|37446)'

  - id: browser-session-aging-script
    desc: Simulates aged browser session history
    crit: suspicious
    conf: 0.95
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)SESSION_AGE[\s\S]{0,900}history\.pushState[\s\S]{0,900}localStorage\.setItem'

  - id: browser-session-cookie-claim
    desc: Package metadata claims browser session cookies
    crit: suspicious
    conf: 0.96
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\bsession cookies\b'
  - id: stored-login-credentials-claim
    desc: Package claims stored login credentials
    crit: suspicious
    conf: 0.96
    for: [pkginfo, python]
    if:
      type: text
      regex: '(?i)\bstored credentials\b'
  - id: login-gated-browser-claim
    desc: Package targets login-gated browser flows
    crit: suspicious
    conf: 0.96
    for: [pkginfo, python]
    if:
      type: text
      regex: '(?i)\blogin-gated\b'
  - id: persistent-browser-profile-claim
    desc: Package claims persistent browser profiles
    crit: suspicious
    conf: 0.96
    for: [pkginfo, python]
    if:
      type: text
      regex: '(?i)\bpersistent\s+(browser\s+)?profiles?\b'
  - id: account-hopping-session-claim
    desc: Package claims account hopping
    crit: suspicious
    conf: 0.96
    for: [pkginfo, python]
    if:
      type: text
      regex: '(?i)\baccount[- ]hopping\b'

composite_rules:
  - id: camoufox-fingerprint-humanization-bypass
    desc: Anti-detect browser fingerprint and humanization workflow
    crit: hostile
    conf: 0.98
    for: [python]
    scope: outer
    all:
      - id: camoufox-browser-runtime
      - id: browserforge-fingerprint-generation
      - id: humanized-browser-scroll

  - id: navigator-hardware-and-memory-spoof
    desc: Spoofs navigator hardware and device memory
    crit: suspicious
    conf: 0.94
    all:
      - id: navigator-hardware-concurrency-spoof
      - id: navigator-device-memory-spoof
  - id: navigator-webdriver-override
    desc: Navigator webdriver property masking
    crit: suspicious
    conf: 0.9
    any:
      - id: navigator-webdriver-code
      - id: navigator-webdriver-script-string
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::warn-scraper-benign-automation-context
      - id: metadata/package/quality/false-positives::mithwire-benign-automation-context
      - id: well-known/app/ibb8::ibb8-browser-extension-context
  - id: document-visibility-state-spoof
    desc: Browser automation hides page visibility state
    crit: hostile
    conf: 0.96
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/ui/window/manage/visibility::document-visibility-state-override
      - id: micro-behaviors/ui/window/manage/visibility::document-hidden-state-override
      - id: micro-behaviors/ui/window/manage/visibility::visibilitychange-propagation-suppression
  - id: antibot-evasion-claim
    desc: Package claims anti-bot evasion
    crit: notable
    conf: 0.9
    for: [pkginfo, package.json, python, javascript, go]
    any:
      - id: antibot-evasion-description
      - id: anti-detect-description
      - id: antibot-description
      - id: captcha-bypass-description
      - id: browser-tls-impersonation-description
  - id: browser-captcha-solving-capability
    desc: Browser captcha solving capability
    crit: notable
    conf: 0.92
    any:
      - id: captcha-solver-description
      - id: automatic-captcha-solving
      - id: captcha-provider-list
  - id: stealth-fingerprint-spoofing-browser
    desc: Stealth browser fingerprint spoofing
    crit: suspicious
    conf: 0.92
    any:
      - id: browser-fingerprint-spoofing
      - id: custom-browser-fingerprints
      - id: navigator-webdriver-override
      - id: navigator-webdriver-getter-override
      - id: navigator-webdriver-delete
      - id: webrtc-ip-leak-blocked
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::warn-scraper-benign-automation-context
      - id: metadata/package/quality/false-positives::mithwire-benign-automation-context
      - id: well-known/app/ibb8::ibb8-browser-extension-context
  - id: stealth-humanized-browser-input
    desc: Browser automation masks detection while simulating human input
    crit: suspicious
    conf: 0.96
    for: [python, javascript, typescript]
    all:
      - id: navigator-webdriver-override
      - id: micro-behaviors/ui/window/manage/dom::playwright-humanized-input-helper
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::warn-scraper-benign-automation-context

  - id: stealth-browser-antibot-bypass
    desc: Stealth browser anti-bot bypass
    crit: hostile
    conf: 0.98
    for: [python]
    all:
      - id: chromium-automation-controlled-suppression
      - id: navigator-webdriver-override
      - id: micro-behaviors/ui/window/manage/dom::playwright-humanized-input-helper
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::warn-scraper-benign-automation-context

  - id: stealth-playwright-antibot-bypass
    desc: Stealth Playwright anti-bot bypass
    crit: hostile
    conf: 0.98
    for: [python]
    all:
      - id: chromium-automation-controlled-suppression
      - id: navigator-webdriver-override
      - id: metadata/library/automation::playwright-python-chromium-launch
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::warn-scraper-benign-automation-context

  - id: cloudflare-challenge-bypass-automation
    desc: Cloudflare challenge bypass automation
    crit: suspicious
    conf: 0.96
    all:
      - id: cloudflare-bypasser-api
    any:
      - id: cloudflare-challenge-frame
      - id: turnstile-coordinate-solver
  - id: stealth-browser-antibot-automation
    desc: Stealth browser anti-bot automation
    crit: suspicious
    conf: 0.94
    all:
      - id: antibot-evasion-claim
    any:
      - id: browser-fingerprint-platform-flag
      - id: browser-fingerprint-locale-flag
      - id: browser-captcha-solving-capability
      - id: stealth-fingerprint-spoofing-browser
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::browser-use-automation-context
      - id: metadata/package/quality/false-positives::browser-use-library-source-context
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::mithwire-package-identity-context
      - id: metadata/package/quality/false-positives::mithwire-benign-automation-context
      - id: metadata/package/quality/false-positives::warn-scraper-benign-automation-context

  - id: anti-detect-credentialed-browser-automation
    desc: Anti-detect credentialed sessions
    crit: hostile
    conf: 0.98
    attack: T1185,T1539
    for: [pkginfo, python]
    all:
      - id: antibot-evasion-claim
      - id: browser-fingerprint-spoofing
    any:
      - id: browser-session-cookie-claim
      - id: stored-login-credentials-claim
      - id: login-gated-browser-claim
      - id: persistent-browser-profile-claim

  - id: anti-detect-account-hopping-automation
    desc: Anti-detect account hopping
    crit: hostile
    conf: 0.98
    attack: T1185,T1539
    for: [pkginfo, python]
    all:
      - id: antibot-evasion-claim
      - id: browser-fingerprint-spoofing
      - id: account-hopping-session-claim
    any:
      - id: browser-session-cookie-claim
      - id: stored-login-credentials-claim
      - id: persistent-browser-profile-claim

  - id: js-stealth-browser-antibot-bypass
    desc: JavaScript browser stealth masks automation and fingerprints
    crit: hostile
    conf: 0.98
    attack: T1497.001
    for: [javascript, typescript]
    all:
      - id: navigator-webdriver-alias-mask
      - id: browser-automation-marker-cleanup
    any:
      - id: browser-canvas-export-patch
      - id: navigator-touch-points-spoof
      - id: browser-webgl-parameter-spoof
    unless:
      - id: well-known/app/ibb8::ibb8-browser-extension-context
      - id: well-known/app/quantomate::quantomate-browser-extension-context
      - id: well-known/app/quantomate::quantomate-cdp-runtime-context

  - id: javascript-captcha-bypass-flow
    desc: JavaScript automates external CAPTCHA bypass
    crit: hostile
    conf: 0.98
    for: [javascript, typescript]
    all:
      - id: captcha-solver-api-endpoint
      - id: captcha-task-creation-call
      - id: captcha-task-result-poll
  - id: multi-vendor-antibot-solving
    desc: Multi-vendor anti-bot solving capability
    crit: suspicious
    conf: 0.96
    for: [pkginfo, package.json, python, javascript, go]
    all:
      - id: antibot-evasion-claim
      - id: multi-vendor-antibot-solvers
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context

  - id: remote-captcha-solving-extension
    desc: Extension submits CAPTCHA images to remote solver
    crit: hostile
    conf: 0.98
    for: [javascript, typescript, chrome-manifest, crx]
    scope: archive
    all:
      - id: captcha-solver-api-endpoint
      - id: captcha-image-submission-message
      - id: navigator-webdriver-override

  - id: stealth-captcha-verification
    desc: Stealth browser CAPTCHA token generation
    crit: hostile
    conf: 0.99
