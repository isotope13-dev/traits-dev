defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, binaries]

traits:
  - id: python-captcha-image-reader
    desc: Runs local CAPTCHA image recognition
    crit: notable
    conf: 0.9
    for: [python, pe, dll]
    if:
      type: text
      regex: '\bread_captcha\s*\('
  - id: camoufox-browser-runtime
    desc: Imports the Camoufox anti-detect browser runtime
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: symbol
      kind: import
      exact: camoufox.async_api
  - id: browserforge-fingerprint-generation
    desc: Generates browser fingerprints with BrowserForge
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: symbol
      kind: call
      exact: FingerprintGenerator
  - id: humanized-browser-scroll
    desc: Simulates human scrolling in browser automation
    crit: notable
    conf: 0.94
    for: [python]
    if:
      type: symbol
      kind: call
      exact: human_scroll

  - id: cloudflare-bypasser-api
    desc: Cloudflare challenge bypass API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CloudflareBypasser
  - id: cloudflare-challenge-frame
    desc: Cloudflare challenge frame automation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: challenges.cloudflare.com
  - id: recaptcha-challenge-automation
    desc: Automates reCAPTCHA challenge controls
    crit: suspicious
    conf: 0.95
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)(recaptcha|g-recaptcha).{0,240}(frame_locator|locator)'
    unless:
      - id: metadata/package/quality/false-positives-mcp-stealth-chrome::benign-automation-context
      - id: metadata/package/quality/false-positives-mcp-stealth-chrome::source-tree-path
  - id: hcaptcha-challenge-automation
    desc: Automates hCaptcha challenge controls
    crit: suspicious
    conf: 0.95
    for: [python, javascript, typescript]
    if:
      # Require Playwright/automation locators — bare "hCaptcha" near
      # addEventListener("click") is ordinary captcha UI (e.g. PayPal ngrlCaptcha).
      type: text
      regex: '(?is)hcaptcha.{0,240}(frame_locator|(page|frame|this)\.locator\s*\()'
  - id: turnstile-coordinate-solver
    desc: Turnstile challenge coordinate solver
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: get_turnstile_coordinates
  - id: stealth-browser-api
    desc: Stealth browser automation API
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: StealthBrowser
  - id: browser-fingerprint-platform-flag
    desc: Browser fingerprint platform launch flag
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: --fingerprint-platform=
  - id: browser-fingerprint-locale-flag
    desc: Browser fingerprint locale launch flag
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: --fingerprint-locale=
  - id: antibot-evasion-description
    desc: Package description claims anti-bot evasion
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      substr: anti-bot evasion
      case_insensitive: true
  - id: anti-detect-description
    desc: Package description claims anti-detect
    crit: notable
    conf: 0.92
    for: [pkginfo]
    if:
      type: text
      regex: '\banti[- ]?detect(ion)?\b|antidetect(ion)?'
      case_insensitive: true
  - id: anti-detection-fingerprint-claim
    desc: Anti-detection fingerprint browser claim
    crit: notable
    conf: 0.94
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\banti[- ]?detect(ion)?\b[\s\S]{0,100}\bfingerprint\b'
      case_insensitive: true
  - id: antibot-description
    desc: Package metadata claims anti-bot capability
    crit: notable
    conf: 0.9
    for: [pkginfo, package.json]
    if:
      type: text
      regex: '\b(antibot|anti[- ]bot|bot-detection)\b'
      case_insensitive: true
  - id: multi-vendor-antibot-solvers
    desc: Package lists multiple anti-bot solver vendors
    crit: notable
    conf: 0.95
    for: [pkginfo, package.json, python, javascript, go]
    if:
      type: text
      regex: 'PerimeterX.{0,180}hCaptcha.{0,180}DataDome.{0,180}Incapsula'
      case_insensitive: true
  - id: captcha-bypass-description
    desc: Package description claims captcha bypass
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: 'captcha[- ]?bypass'
      case_insensitive: true
  - id: browser-tls-impersonation-description
    desc: Browser TLS impersonation claim
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      substr: browser-grade TLS impersonation
      case_insensitive: true
  - id: captcha-solver-description
    desc: Package describes captcha solver
    crit: notable
    conf: 0.92
    for: [pkginfo, python]
    if:
      type: text
      substr: captcha solver
      case_insensitive: true
  - id: automatic-captcha-solving
    desc: Package describes automatic captcha solving
    crit: notable
    conf: 0.92
    for: [pkginfo, python]
    if:
      type: text
      substr: automatic captcha solving
      case_insensitive: true
  - id: stealth-browser-session-description
    desc: Package describes stealth browser sessions
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\bstealth\s+browser\s+sessions?\b'
  - id: browser-proxy-automation-description
    desc: Package describes browser proxy automation
    crit: notable
    conf: 0.88
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\bbrowser\s+sessions?\b.{0,120}\bproxies\b|\bproxies\b.{0,120}\bbrowser\s+sessions?\b'
  - id: captcha-provider-list
    desc: Package lists multiple captcha providers
    crit: suspicious
    conf: 0.9
    for: [pkginfo, python]
    if:
      type: text
      regex: 'reCAPTCHA v2[\s\S]{0,180}hCaptcha[\s\S]{0,180}FunCaptcha'
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
  # "fingerprint spoofing" is a dual-use claim: anti-bot evasion tools AND
  # privacy/anti-tracking extensions both spoof the fingerprint. Kept notable
  # (a capability claim, like the sibling claim-atoms above); the anti-bot
  # intent is carried by composites that also require an antibot-evasion-claim
  # or code-based webdriver masking.
  - id: browser-fingerprint-spoofing
    desc: Browser fingerprint spoofing claim
    crit: notable
    conf: 0.92
    for: [pkginfo, python, javascript]
    if:
      type: text
      regex: '(?i)\bfingerprint.{0,40}(spoof|patch|modified)'
      case_insensitive: true
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::mithwire-package-identity-context
      - id: metadata/package/quality/false-positives::mithwire-benign-automation-context
  - id: custom-browser-fingerprints
    desc: Custom browser fingerprints claim
    crit: suspicious
    conf: 0.92
    for: [pkginfo, python, javascript]
    if:
      type: text
      substr: customisable browser fingerprints
      case_insensitive: true
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::mithwire-benign-automation-context
  - id: navigator-webdriver-code
    desc: Navigator webdriver masking code
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      # Match an executable Object.defineProperty call.  Text matching also
      # sees commented-out anti-bot examples in scraper source files.
      type: tree-sitter
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (identifier) @obj
            property: (property_identifier) @method)
          arguments: (arguments
            (identifier) @target
            (string (string_fragment) @property)
            (_))
          (#eq? @obj "Object")
          (#eq? @method "defineProperty")
          (#eq? @target "navigator")
          (#eq? @property "webdriver"))
    unless:
      - id: well-known/app/ibb8::ibb8-browser-extension-context
      - id: well-known/app/quantomate::quantomate-browser-extension-context
      - id: well-known/app/quantomate::quantomate-cdp-runtime-context
      - id: metadata/package/testing/presence/harness::test-spec-path-benign-context
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/quality/source::wavexis-package-identity-context
      - id: well-known/app/trakt-to-letterboxd::selenium-source-context
      - id: well-known/app/ethan-agent::ethan-agent-xiaohongshu-stealth
  - id: navigator-webdriver-code-typescript
    desc: TypeScript navigator webdriver masking code
    crit: suspicious
    conf: 0.9
    for: [typescript]
    if:
      type: tree-sitter
      language: typescript
      query: |
        (call_expression
          function: (member_expression
            object: (identifier) @obj
            property: (property_identifier) @method)
          arguments: (arguments
            (identifier) @target
            (string (string_fragment) @property)
            (_))
          (#eq? @obj "Object")
          (#eq? @method "defineProperty")
          (#eq? @target "navigator")
          (#eq? @property "webdriver"))
    unless:
      - id: well-known/app/ibb8::ibb8-browser-extension-context
      - id: well-known/app/quantomate::quantomate-browser-extension-context
      - id: well-known/app/quantomate::quantomate-cdp-runtime-context
      - id: metadata/package/testing/presence/harness::test-spec-path-benign-context
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/quality/source::wavexis-package-identity-context
      - id: well-known/app/trakt-to-letterboxd::selenium-source-context
      - id: well-known/app/ethan-agent::ethan-agent-xiaohongshu-stealth
  - id: navigator-webdriver-prototype-delete
    desc: Deletes navigator prototype webdriver
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: delete Object.getPrototypeOf(navigator).webdriver
    not:
      - regex: '(?is)(?=.*vidsrc)(?=.*m3u8)(?=.*playwright)'
    unless:
      - id: well-known/app/cinnamon::vidsrc-playwright-scraper-context
      - id: well-known/app/cinnamon::vidsrc-scraper-source
      - id: metadata/library/automation::google-flow-browser-auth-client
  - id: navigator-webdriver-getter-override
    desc: Navigator webdriver getter masking
    crit: suspicious
    conf: 0.9
    for: [pkginfo, python, javascript]
    if:
      type: text
      regex: 'navigator\.__defineGetter__\s*\(\s*["\x27]webdriver["\x27]'
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
  - id: navigator-webdriver-delete
    desc: Navigator webdriver property deletion
    crit: suspicious
    conf: 0.88
    for: [pkginfo, python, javascript]
    if:
      type: text
      substr: delete navigator.webdriver
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
  - id: webrtc-ip-leak-blocked
    desc: WebRTC IP leak blocking
    crit: suspicious
    conf: 0.88
    for: [pkginfo, python, javascript]
    if:
      type: text
      substr: WebRTC IP leak blocked
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context

  - id: captcha-solver-api-endpoint
    desc: CAPTCHA solver service endpoint
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: 'https://[A-Za-z0-9.-]*captcha[A-Za-z0-9.-]*'

  - id: captcha-task-creation-call
    desc: Creates external CAPTCHA solver task
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)captcha.{0,160}createTask|createTask.{0,160}captcha'

  - id: captcha-task-result-poll
    desc: Polls external CAPTCHA solver result
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)captcha.{0,160}getTaskResult|getTaskResult.{0,160}captcha'

  - id: image-captcha-task-marker
    desc: Image CAPTCHA solver task marker
    crit: component
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: ImageToTextTask

  - id: captcha-client-key-marker
    desc: CAPTCHA solver client key field
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)captcha.{0,160}clientKey|clientKey.{0,160}captcha'

  - id: captcha-task-status-marker
    desc: CAPTCHA solver processing status check
    crit: component
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)captcha.{0,120}status.{0,40}(processing|ready)'

  - id: captcha-task-id-marker
    desc: CAPTCHA solver task identifier field
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)captcha.{0,160}taskId|taskId.{0,160}captcha'

  - id: captcha-image-submission-message
    desc: Sends CAPTCHA images to extension worker
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)sendChrome\.X\s*\(\s*["'']imgs["'']|runtime\.sendMessage\s*\(\s*\[\s*["'']imgs["'']'

  - id: traceless-captcha-verification
    desc: Browser traceless CAPTCHA verification
    crit: suspicious
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: startTracelessVerification

  - id: chromium-automation-controlled-suppression
    desc: Chromium hides AutomationControlled marker
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: literal
      kind: string
      exact: --disable-blink-features=AutomationControlled
    unless:
      - id: metadata/package/quality/false-positives::crawlo-benign-automation-context
      - id: metadata/package/quality/false-positives::wet-mcp-browser-automation-context
      - id: metadata/package/quality/false-positives::wet-mcp-interact-browser-context
      - id: well-known/app/harbor::harbor-framework-context
      - id: metadata/package/quality/false-positives::warn-scraper-benign-automation-context

  - id: browser-automation-artifact-cleanup
    desc: Deletes browser automation globals
    crit: suspicious
    conf: 0.95
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?i)delete\s+window\.(callPhantom|_phantom|__nightmare|_selenium)'

  - id: browser-automation-marker-cleanup
    desc: Removes browser automation marker globals
    crit: suspicious
    conf: 0.95
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?i)startsWith\(["''](__webdriver_|__selenium_|__fxdriver_|cdc_)'

  - id: navigator-webdriver-alias-mask
    desc: Masks webdriver property through navigator alias
    crit: suspicious
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?is)defineProperty\(\s*\w+\s*,\s*["'']webdriver["''][\s\S]{0,120}undefined'
    # Only the ALIASED form (webdriver masked on a stored navigator reference).
    # The direct `defineProperty(navigator, "webdriver", …)` form is already
    # owned by navigator-webdriver-code; excluding it here prevents both atoms
    # double-counting the single, ordinary anti-detect line every captcha solver
    # and stealth-automation library ships.
    not:
      - regex: 'defineProperty\(\s*navigator\s*,'
    unless:
      - id: well-known/app/ibb8::ibb8-browser-extension-context
      - id: well-known/app/quantomate::quantomate-browser-extension-context
      - id: well-known/app/quantomate::quantomate-cdp-runtime-context

  - id: browser-screen-dimensions-spoof
    desc: Overrides browser screen dimensions
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: literal
      kind: string
      regex: '(?is)\bscreen\s*,\s*["'']height["'']'

  - id: browser-canvas-export-patch
    desc: Patches browser canvas export APIs
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: 'HTMLCanvasElement\.prototype\.toDataURL\s*='
  - id: browser-canvas-export-define-property
    desc: Defines browser canvas export API
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: 'defineProperty\(HTMLCanvasElement\.prototype,"toDataURL"'

  - id: browser-webgl-renderer-override
    desc: Overrides WebGL renderer identity
    crit: notable
    conf: 0.92
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)UNMASKED_VENDOR_WEBGL[\s\S]{0,100}UNMASKED_RENDERER_WEBGL'

  - id: browser-geolocation-api-suppression
    desc: Suppresses browser geolocation API
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator\s*,\s*["'']geolocation["'']'

  - id: browser-global-webrtc-constructor-override
    desc: Defines global RTCPeerConnection property
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: 'Object\.defineProperty\s*\(\s*window\s*,\s*["'']RTCPeerConnection["'']'

  - id: browser-self-webrtc-constructor-override
    desc: Defines self RTCPeerConnection property
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: text
      regex: 'Object\.defineProperty\s*\(\s*(self|globalThis)\s*,\s*["'']RTCPeerConnection["'']'

  - id: navigator-hardware-concurrency-spoof
    desc: Spoofs navigator hardware concurrency
    crit: notable
    conf: 0.94
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator.{0,80}hardwareConcurrency'

  - id: navigator-device-memory-spoof
    desc: Spoofs navigator device memory
    crit: notable
    conf: 0.94
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator.{0,80}deviceMemory'

  - id: navigator-touch-points-spoof
    desc: Spoofs navigator touch points
    crit: suspicious
    conf: 0.94
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)Object\.defineProperty\(navigator.{0,80}maxTouchPoints'

  - id: browser-webgl-parameter-spoof
    desc: Spoofs WebGL vendor or renderer parameters
    crit: notable
    conf: 0.94
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)getParameter\s*=\s*function[\s\S]{0,180}(37445|37446)'

  - id: browser-session-aging-script
    desc: Simulates aged browser session history
    crit: suspicious
    conf: 0.95
    for: [python, javascript, typescript]
    if:
      type: text
      regex: '(?is)SESSION_AGE[\s\S]{0,900}history\.pushState[\s\S]{0,900}localStorage\.setItem'

  - id: browser-session-cookie-claim
    desc: Package metadata mentions session cookies
    # Session-cookie support is a useful, dual-use capability claim.  It is
    # evidence for the anti-detect composites below, but is not suspicious by
    # itself: authenticated scrapers and browser-test tools document it too.
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\bsession cookies\b'
  - id: stored-credentials-mention
    desc: Package metadata mentions stored credentials
    crit: notable
    conf: 0.96
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\bstored credentials\b'
  - id: login-gated-browser-claim
    desc: Package mentions a login-gated browser flow
    # A login-gated viewer or service is not anti-bot behavior by itself;
    # anti-detect composites add fingerprinting and evasion evidence.
    crit: notable
    conf: 0.96
    for: [pkginfo, python]
    if:
      type: text
      regex: '(?i)\blogin-gated\b'
    unless:
      - id: metadata/package/quality/false-positives-mcp-stealth-chrome::benign-automation-context
      - id: metadata/package/quality/false-positives-mcp-stealth-chrome::package-name
      - id: metadata/package/quality/false-positives-mcp-stealth-chrome::source-tree-path
  - id: persistent-browser-profile-claim
    desc: Package claims persistent browser profiles
    crit: suspicious
    conf: 0.96
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\bpersistent\s+(browser\s+)?profiles?\b'
    unless:
      - id: well-known/tool/detection/hol-guard::hol-guard-runtime-detector-context
  - id: humanized-browser-input-claim
    desc: Package claims humanized browser input
    crit: notable
    conf: 0.92
    for: [pkginfo, python]
    if:
      type: text
      regex: '(?i)humanize=True|human-like (mouse|keyboard|scroll)'
  - id: account-hopping-session-claim
    desc: Package claims account hopping
    crit: suspicious
    conf: 0.96
    for: [pkginfo, python]
    if:
      type: text
      regex: '(?i)\baccount[- ]hopping\b'

  - id: multi-account-matrix-claim
    desc: Package claims multi-account operation
    crit: notable
    conf: 0.94
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\b(multi[- ]account|account matrix|many accounts|multiple accounts)\b'


# ── Search-engine bot-block interstitial evasion ────────────────────────────
# A scraper that drives real Google searches eventually trips the "unusual
# traffic from your computer network" interstitial (google.com/sorry/...).
# Tooling that registers a content script *on that block page* to capture the
# interrupted `continue=` URL, reload until the block lifts, or wipe the
# origin's stored bot-tracking state is deliberately engineering around an
# anti-abuse control rather than backing off.
  - id: search-bot-interstitial-content-script
    desc: Content script targets Google bot-block page
    crit: notable
    conf: 0.92
    for: [chrome-manifest]
    if:
      type: value
      path: 'content_scripts[*].matches'
      regex: 'google\.[a-z.]{2,7}/sorry'

composite_rules:
  - id: browser-webrtc-api-neutralization
    desc: Overrides global WebRTC constructor
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    any:
      - id: browser-global-webrtc-constructor-override
      - id: browser-self-webrtc-constructor-override

  - id: anti-detection-fingerprint-browser-claim
    desc: Package claims anti-detection fingerprinting
    crit: notable
    conf: 0.93
    for: [pkginfo]
    all:
      - id: anti-detect-description
      - id: anti-detection-fingerprint-claim

  - id: covert-proctoring-evasion-overlay
    desc: Hidden overlay masks browser automation and screen capture
    crit: hostile
    conf: 0.99
    for: [javascript, typescript]
    platforms: [windows]
    attack: T1622
    all:
      - id: navigator-webdriver-override
      - id: micro-behaviors/ui/window/manage/control::window-anti-capture-affinity
      - id: micro-behaviors/ui/window/manage/visibility::document-hidden-state-override
    any:
      - id: navigator-device-memory-spoof
      - id: micro-behaviors/ui/window/manage/visibility::document-visibility-state-override
  - id: camoufox-fingerprint-humanization-bypass
    desc: Anti-detect browser fingerprint and humanization workflow
    crit: hostile
    conf: 0.98
    for: [python]
    scope: outer
    all:
      - id: camoufox-browser-runtime
      - id: browserforge-fingerprint-generation
      - id: humanized-browser-scroll

  - id: navigator-hardware-and-memory-spoof
    desc: Spoofs navigator hardware and device memory
    crit: suspicious
