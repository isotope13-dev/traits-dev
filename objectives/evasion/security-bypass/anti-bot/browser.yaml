defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, binaries]

traits:
  - id: cloudflare-bypasser-api
    desc: Cloudflare challenge bypass API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CloudflareBypasser
  - id: cloudflare-challenge-frame
    desc: Cloudflare challenge frame automation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: challenges.cloudflare.com
  - id: turnstile-coordinate-solver
    desc: Turnstile challenge coordinate solver
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: get_turnstile_coordinates
  - id: stealth-browser-api
    desc: Stealth browser automation API
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: StealthBrowser
  - id: browser-fingerprint-platform-flag
    desc: Browser fingerprint platform launch flag
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: --fingerprint-platform=
  - id: browser-fingerprint-locale-flag
    desc: Browser fingerprint locale launch flag
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: --fingerprint-locale=
  - id: antibot-evasion-description
    desc: Package description claims anti-bot evasion
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: '(?i)\banti-bot evasion\b'

composite_rules:
  - id: cloudflare-challenge-bypass-automation
    desc: Cloudflare challenge bypass automation
    crit: suspicious
    conf: 0.96
    all:
      - id: cloudflare-bypasser-api
    any:
      - id: cloudflare-challenge-frame
      - id: turnstile-coordinate-solver
  - id: stealth-browser-antibot-automation
    desc: Stealth browser anti-bot automation
    crit: suspicious
    conf: 0.94
    all:
      - id: stealth-browser-api
    any:
      - id: browser-fingerprint-platform-flag
      - id: browser-fingerprint-locale-flag
      - id: antibot-evasion-description
