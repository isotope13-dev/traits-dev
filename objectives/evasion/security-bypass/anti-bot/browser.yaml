      - id: micro-behaviors/data/db/web-storage::browsing-data-origin-scoped-clear

  # A registration/login bot that pipes the site's own CAPTCHA image to a paid
  # solving service, then types credentials and clicks submit, has automated
  # away the exact control the site uses to require a human. Solver endpoint
  # alone stays notable (research and accessibility tooling calls these APIs);
  # the hostile verdict needs the solved challenge wired into an autofill and
  # submit chain.
  - id: captcha-solver-credential-autofill-bot
    desc: Solver-backed credential autofill and submit
    crit: hostile
    conf: 0.96
    attack: T1497
    for: [javascript, chrome-manifest, crx, xpi]
    scope: archive
    all:
      # captcha-solver-api-endpoint alone matches any host with "captcha" in
      # its name — including hCaptcha's own widget CDN, which ordinary sites
      # embed. Requiring solver-task creation is what separates outsourcing a
      # challenge to a paid solver from merely displaying one.
      - id: captcha-solver-api-endpoint
      - id: captcha-task-creation
      - id: micro-behaviors/ui/window/form-input::browser-sensitive-field-automation
      - id: micro-behaviors/ui/window/form-input::browser-submit-button-click
