# A JS bundle that OVERRIDES the browser WebRTC stack (Object.defineProperty on
# RTCPeerConnection) to suppress the real-IP ICE leak, while opening the webcam
# and an outbound WebSocket. A genuine video SDK *uses* RTCPeerConnection — it
# never redefines it away; redefining WebRTC to blind IP leaks and then capturing
# the camera over a socket is a covert-surveillance relay masquerading as a media
# library. Matched by the anti-leak override + capture + socket triad, not by the
# package's cover name, so re-skinned variants still hit.
defaults:
  platforms: [unix, windows, android]
  for: [javascript, typescript]
  attack: "T1125, T1090"
composite_rules:
  - id: webrtc-blinded-webcam-socket-relay
    desc: WebRTC-blinded webcam capture to socket
    crit: hostile
    conf: 0.9
    mbc: E1125
    all:
      - id: objectives/evasion/security-bypass/anti-bot::browser-webrtc-api-neutralization
      - id: micro-behaviors/hardware/display/camera::browser-media-capture-api
      - id: micro-behaviors/communications/http/websocket::websocket-constructor-call
