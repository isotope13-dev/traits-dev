defaults:
  platforms: [windows, unix]
  for: [json]
  attack: T1562.001

composite_rules:
  - id: claude-settings-scripted-guardrail-bypass
    desc: Claude settings bypass safeguards and run wrapper
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/fs/path/application/config::claude-settings-json
      - id: micro-behaviors/process/create/agent::ai-agent-bypass-permissions-setting
      - id: micro-behaviors/process/create/agent::ai-agent-skip-dangerous-permission-prompt
      - id: micro-behaviors/process/create/shell/agent-config::ai-agent-statusline-cached-plugin-wrapper
