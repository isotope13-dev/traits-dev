defaults:
  platforms: [unix, windows]
  for: [scripts, markdown, text]

traits:
- id: llm-concealed-reviewer-directive
  desc: Prompt hides requirements from reviewer
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '\bdo not mention\b[\s\S]{0,40}\b(addendum|instruction|directive)\b'
    case_insensitive: true
  unless:
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/security-scanner/
  - id: metadata/package/testing/
  - id: metadata/package/quality/false-positives::clawker-prompt-injection-incident-context

- id: llm-ignore-prior-instructions
  desc: Ignore prior instructions prompt
  crit: notable
  conf: 0.88
  unless:
  - type: text
    substr: "INJECTION PATTERNS TO IGNORE"
  - type: text
    substr: "treat as regular text"
  - type: text
    regex: 'security guardrail validator|GuardrailsComponent|GuardrailValidator'
  - type: text
    word: DEFAULT_INJECTION_PATTERNS
  - type: text
    regex: 'injection is defanged|imperative patterns are stripped'
  # ai-guardrail-context subsumes llm-scanner-context AND defensive-threat-signatures
  # (both are its legs); AI-agent guardrails DETECT prompt-injection phrases as
  # threat signatures, and eval/test mock agents embed them as fixtures.
  - id: well-known/tool/detection/ai-guardrail/
  - id: well-known/tool/detection/
  - id: well-known/tool/detection/llm-scanner::defensive-pattern-catalog
  - id: metadata/package/testing/presence/harness/
  if:
    type: text
    regex: '\bignore (all )?(previous|prior) (instructions|rules)\b'
    case_insensitive: true

- id: llm-system-override-accepted
  desc: Accepted system-override prompt marker
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '\[\s*SYSTEM\s+OVERRIDE\s+ACCEPTED\s*[-:]'
    case_insensitive: true
  unless:
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/security-scanner/
  - id: metadata/package/testing/

- id: llm-system-wide-autonomous-scan
  desc: Autonomous system-wide scan instruction
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: 'exhaustive, machine-wide deep scan'
  unless:
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/security-scanner/
  - id: metadata/package/testing/

- id: llm-sensitive-user-data-scan-target
  desc: Prompt targets user data
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: 'entire system root, Documents, Downloads, Desktop'
  unless:
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/security-scanner/
  - id: metadata/package/testing/

- id: llm-disregard-prior-instructions
  desc: Disregard prior instructions prompt
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '\b(disregard|forget) (previous|prior) instructions\b'
    case_insensitive: true
  unless:
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/llm-scanner::defensive-pattern-catalog
  - id: well-known/tool/detection/security-scanner/

- id: llm-do-not-follow-prior-instructions
  desc: Do-not-follow prior instructions prompt
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '\bdo not follow (the )?(previous|prior|earlier) (instructions|directives)\b'
    case_insensitive: true
  unless:
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/llm-scanner::defensive-pattern-catalog
  - id: well-known/tool/detection/security-scanner/

- id: llm-system-override-token
  desc: System override token
  crit: suspicious
  conf: 0.9
  unless:
  - id: well-known/tool/offensive/decepticon::package-tree-member
  - id: well-known/tool/offensive/decepticon::pkg-redteam-summary
  - id: well-known/tool/offensive/sunstrike::authorized-framework-context
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/security-scanner/
  - id: metadata/package/testing/presence/harness/
  if:
    type: text
    substr: "[SYSTEM OVERRIDE]"
    case_insensitive: true

- id: llm-system-tag-token--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '<\s*/?\s*system_prompt\s*>'
    case_insensitive: true
  count_max: 1011682

- id: llm-system-tag-token--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '<\|im_start\|>\s*system\b'
    case_insensitive: true
  count_max: 1011683

- id: llm-system-tag-token--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '<\|start_header_id\|>\s*system\s*<\|end_header_id\|>'
    case_insensitive: true
  count_max: 1011684

- id: llm-system-reminder-marker
  desc: Claude Code system-reminder marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: system-reminder
    case_insensitive: true

- id: llm-agent-project-instruction-reference
  desc: Claude Code project instruction reference
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: '\bCLAUDE\.md\b'
    case_insensitive: true

- id: llm-agent-role-override-claim
  desc: Agent role override claim
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  unless:
  - id: well-known/lib/sentry-js::sentry-js-sdk
  if:
    type: text
    regex: '\battempting to override (my|the) (actual )?(role|instructions)\b'
    case_insensitive: true

- id: llm-internal-anthropic-token
  desc: Anthropic internal token spoof
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: "ANTHROPIC_MAGIC_STRING"
    case_insensitive: true

- id: llm-internal-ultrathink-token
  desc: Ultrathink token spoof
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: "ULTRATHINK"
    case_insensitive: true

- id: llm-concealment-do-not-reveal
  desc: Conceals LLM system instructions
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "do not reveal (this|the) (system )?(prompt|instruction|message)"
    case_insensitive: true

- id: llm-always-respond-phrase
  desc: Always respond phrase
  crit: component
  conf: 0.72
  if:
    type: text
    substr: "always respond"
    case_insensitive: true

- id: llm-generic-refusal-output
  desc: LLM generic refusal output
  crit: suspicious
  conf: 0.72
  unless:
  - id: well-known/tool/offensive/decepticon::package-tree-member
  - id: well-known/tool/offensive/decepticon::pkg-redteam-summary
  if:
    # Comments describing an installer error are not model output. Restrict
    # this atom to string literals, where a response/prompt fixture can be
    # evaluated by the surrounding prompt-injection composite.
    type: string_literal
    substr: "generic refusal"
    case_insensitive: true

- id: llm-jailbreak-payload
  # The two literal payload phrases that have no benign use: "DAN mode" and
  # "developer mode enabled" are the published OpenAI/Anthropic jailbreak
  # opener fragments. When either appears, the file is almost certainly
  # carrying an actual prompt-injection payload, not just discussing one.
  desc: 'LLM jailbreak payload phrase'
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '\b(DAN mode|developer mode enabled)\b'
    case_insensitive: true
  unless:
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/security-scanner/
  # Prompt-injection test fixtures and detection test suites embed the canonical
  # jailbreak openers as the inputs they assert against.
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/

- id: llm-new-system-prompt
  desc: New system prompt instruction
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: '\b(new|updated|override) system prompt\s*[:=]'
    case_insensitive: true

- id: llm-unrestricted-persona
  desc: Unrestricted AI persona prompt
  crit: suspicious
  conf: 0.86
  if:
    type: literal
    kind: string
    regex: '\byou are now (a )?(different|new|free|unrestricted)\b'
    case_insensitive: true
  unless:
    - id: llm-free-to-recognized-phrase
    - id: well-known/tool/detection/llm-scanner/
    - id: well-known/tool/detection/security-scanner/
    - id: metadata/package/testing/presence/harness/
- id: llm-free-to-recognized-phrase
  desc: Recognized free-to wording
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: you are now free to
    case_insensitive: true
- id: llm-safety-bypass--rx-33
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(bypass|override) (your )?(safety|content) (filter|guardrail)\b'
    case_insensitive: true
  count_max: 1011735

- id: llm-safety-bypass--rx-34
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(bypass|override) (your )?(ethical) (filter|guardrail)\b'
    case_insensitive: true
  count_max: 1011736

- id: llm-safety-bypass--rx-35
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(bypass|override) (your )?(safety|content|ethical) (policy)\b'
    case_insensitive: true
  count_max: 1011737

- id: llm-safety-bypass--rx-36
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(disable) (your )?(safety|content|ethical) (filter|guardrail)\b'
    case_insensitive: true
  count_max: 1011738

- id: llm-safety-bypass--rx-37
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(disable) (your )?(safety|content|ethical) (policy)\b'
    case_insensitive: true
  count_max: 1011739

- id: llm-hide-ai-identity--rx-38
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(never reveal|hide) (you are )?(an? )?(AI|bot|assistant)\b'
    case_insensitive: true
  count_max: 1011740

- id: llm-hide-ai-identity--rx-39
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(conceal|mask) (you are )?(an? )?(AI|bot|assistant)\b'
    case_insensitive: true
  count_max: 1011741

- id: llm-human-impersonation--rx-40
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\b(impersonate|pose as|masquerade as) (a )?(human|person)\b'
    case_insensitive: true
  count_max: 1011742

- id: llm-human-impersonation--rx-41
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\b(impersonate|pose as|masquerade as) (a )?(admin|support)\b'
    case_insensitive: true
  count_max: 1011743

- id: llm-update-skill-instruction--rx-42
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)\b(update|modify|overwrite)\s+(this\s+)?(skill|tool)\s+(file|content)\b'
    case_insensitive: true
  count_max: 1011744

- id: llm-update-skill-instruction--rx-43
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)\b(update|modify|overwrite)\s+(this\s+)?(plugin|instruction)\s+(file|content)\b'
    case_insensitive: true
  count_max: 1011745

# Benign control-model marker: a skill framework that explicitly subordinates
# itself to the user ("user instructions always take precedence") keeps the user
# in control. Malicious prompt-injection does the opposite — it overrides or
# conceals from the user. Referenced from the skill-coercion traits' `unless:` so
# aggressive-but-user-deferring frameworks (e.g. the open-source "superpowers"
# using-superpowers skill) are not mislabeled as agent-control payloads. The
# genuinely coercive variant that ALSO suppresses inspection is still caught by
# llm-coercive-skill-inspection-control, which does not carry this exclusion.
- id: agent-skill-defers-to-user
  desc: Skill defers to user instructions
  crit: notable
  conf: 0.9
  for: [documents]
  if:
    type: text
    regex: '(?i)user(''?s)?[^\n]{0,15}instructions?[^\n]{0,25}take precedence'

- id: llm-system-priority-override
  desc: Skill overrides system prompt behavior
  crit: suspicious
  conf: 0.94
  for: [documents]
  unless:
  - id: well-known/tool/detection/
  - id: metadata/package/testing/
  - id: agent-skill-defers-to-user
  if:
    type: text
    regex: '\bskills?[^A-Za-z]{1,4}override default system prompt behavior\b'
    case_insensitive: true

- id: llm-mandatory-skill-invocation
  desc: Skill invocation made mandatory
  crit: suspicious
  conf: 0.93
  for: [documents]
  unless:
  - id: well-known/tool/detection/
  - id: metadata/package/testing/
  - id: agent-skill-defers-to-user
  if:
    type: text
    regex: '\b(absolutely )?must invoke the skill\b'
    case_insensitive: true

- id: llm-skill-before-response
  desc: Skills required before response or action
  crit: suspicious
  conf: 0.93
  for: [documents]
  unless:
  - id: well-known/tool/detection/
  - id: metadata/package/testing/
  - id: agent-skill-defers-to-user
  if:
    type: text
    regex: '\binvoke (relevant or requested )?skills before any response\b'
    case_insensitive: true

- id: llm-skill-read-tool-suppression
  desc: Skill prompt blocks direct file reading
  crit: suspicious
  conf: 0.94
  for: [documents]
  unless:
  - id: well-known/tool/detection/
  - id: metadata/package/testing/
  if:
    type: text
    regex: '\bnever use the [`* ]*read [`* ]*tool.{0,80}skill files\b'
    case_insensitive: true

composite_rules:
- id: llm-prior-instruction-override
  desc: LLM prior instruction override prompt
  crit: suspicious
  conf: 0.88
  any:
  - id: llm-ignore-prior-instructions
  - id: llm-disregard-prior-instructions
  - id: llm-do-not-follow-prior-instructions

- id: llm-always-respond
  desc: LLM forced response instruction
  crit: notable
  conf: 0.72
  near_lines: 8
  all:
  - id: llm-always-respond-phrase
  - id: micro-behaviors/data/llm::prompt-marker

- id: llm-system-tag-token
  desc: System prompt tag token
  crit: suspicious
  conf: 0.86
  any:
  - id: llm-system-tag-token--rx-1
  - id: llm-system-tag-token--rx-2
  - id: llm-system-tag-token--rx-3

- id: llm-safety-bypass
  desc: LLM safety bypass prompt
  crit: suspicious
  conf: 0.9
  any:
  - id: llm-safety-bypass--rx-33
  - id: llm-safety-bypass--rx-34
  - id: llm-safety-bypass--rx-35
  - id: llm-safety-bypass--rx-36
  - id: llm-safety-bypass--rx-37

- id: llm-hide-ai-identity
  desc: AI identity concealment prompt
  crit: suspicious
  conf: 0.9
  any:
  - id: llm-hide-ai-identity--rx-38
  - id: llm-hide-ai-identity--rx-39

- id: llm-human-impersonation
  desc: Human impersonation prompt
  crit: suspicious
  conf: 0.88
  any:
  - id: llm-human-impersonation--rx-40
  - id: llm-human-impersonation--rx-41

- id: llm-update-skill-instruction
  desc: Skill self modification instruction
  crit: suspicious
  conf: 0.86
  near_lines: 12
  all:
  - id: micro-behaviors/data/llm::prompt-marker
  any:
  - id: llm-update-skill-instruction--rx-42
  - id: llm-update-skill-instruction--rx-43
  unless:
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
  - id: well-known/app/entroly::local-runtime-context
  - id: well-known/tool/offensive/sunstrike::authorized-framework-context

- id: llm-coercive-skill-control
  desc: Prompt enforces skill control over agent behavior
  crit: hostile
  conf: 0.98
  for: [documents]
  near_lines: 80
  all:
  - id: llm-mandatory-skill-invocation
  - id: llm-skill-before-response
  unless:
  - id: agent-skill-defers-to-user

- id: llm-coercive-skill-inspection-control
  desc: Prompt blocks inspection during skill routing
  crit: hostile
  conf: 0.98
  for: [documents]
  near_lines: 80
  all:
  - id: llm-mandatory-skill-invocation
  - id: llm-skill-before-response
  - id: llm-skill-read-tool-suppression
