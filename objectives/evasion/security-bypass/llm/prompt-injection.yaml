defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]
  attack: T1562

composite_rules:
  - id: indirect-prompt-injection-hidden-instructions
    desc: Hidden indirect prompt injection
    crit: hostile
    conf: 0.96
    near_bytes: 400
    all:
      - id: micro-behaviors/data/text/llm/override::llm-ignore-prior-instructions
      - id: micro-behaviors/data/text/llm/target::llm-agent-target
    any:
      - id: micro-behaviors/data/format/css
      - id: micro-behaviors/data/format/html::hidden-content

  - id: indirect-prompt-injection-secret-exfil
    desc: LLM prompt requests secret exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/text/llm/action::llm-send-action
      - id: micro-behaviors/data/text/llm/target::llm-agent-target
    any:
      - id: micro-behaviors/data/text/llm/target::llm-secret-target
      - id: micro-behaviors/data/text/llm/target::llm-session-cookie-target
      - id: micro-behaviors/data/text/llm/target::llm-conditional-target
    needs: 2

  - id: indirect-prompt-injection-agentic-harm
    desc: LLM prompt requests agentic harm
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/text/llm/target::llm-agent-target
    any:
      - id: objectives/execution/lure/shell::paste-run-destructive-shell
      - id: micro-behaviors/data/text/llm/action::llm-payment-action
      - id: micro-behaviors/data/text/llm/action::llm-url-navigation-action
    needs: 2

  - id: indirect-prompt-injection-system-spoof
    desc: LLM system prompt spoofing
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/text/llm/target::llm-agent-target
    any:
      - id: micro-behaviors/data/text/llm/override::llm-system-override-token
      - id: micro-behaviors/data/text/llm/override::llm-system-tag-token
      - id: micro-behaviors/data/text/llm/override::llm-internal-ultrathink-token
    needs: 2

  - id: indirect-prompt-injection-output-suppression
    desc: LLM output suppression injection
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/data/text/llm/override::llm-always-respond
      - id: micro-behaviors/data/text/llm/override::llm-generic-refusal-output
    any:
      - id: micro-behaviors/data/text/llm/override::llm-ignore-prior-instructions
      - id: micro-behaviors/data/text/llm/override::llm-concealment-do-not-reveal
      - id: micro-behaviors/data/format/css::display-none

  - id: indirect-prompt-injection-metadata-action
    desc: LLM metadata action injection
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/data/text/llm/carrier::llm-meta-ai-intent
      - id: micro-behaviors/data/text/llm/carrier::llm-meta-ai-action
    any:
      - id: micro-behaviors/data/text/llm/action::llm-payment-action
      - id: micro-behaviors/data/text/llm/action::llm-checkout-action
      - id: micro-behaviors/data/text/llm/override::llm-internal-ultrathink-token

  - id: direct-prompt-injection-override
    desc: Direct LLM instruction override
    crit: suspicious
    conf: 0.92
    # Bare-word `llm-jailbreak-word` is deliberately NOT in this any: list —
    # the word "jailbreak" alone is too generic to count as a direct injection
    # attempt. The composite escalates to suspicious only when a payload-shape
    # phrase ("DAN mode", "developer mode enabled", or an actual "ignore prior
    # instructions" / "disregard previous instructions" command) appears
    # alongside at least one other override trait.
    any:
      - id: micro-behaviors/data/text/llm/override::llm-ignore-prior-instructions
      - id: micro-behaviors/data/text/llm/override::llm-disregard-prior-instructions
      - id: micro-behaviors/data/text/llm/override::llm-jailbreak-payload
    needs: 2
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: direct-prompt-injection-safety-bypass
    desc: Direct LLM safety bypass
    crit: suspicious
    conf: 0.92
    any:
      - id: micro-behaviors/data/text/llm/override::llm-new-system-prompt
      - id: micro-behaviors/data/text/llm/override::llm-safety-bypass
      - id: micro-behaviors/data/text/llm/override::llm-unrestricted-persona
    needs: 2
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
  - id: prompt-injection-identity-hijack
    desc: LLM identity hijack prompt
    crit: suspicious
    conf: 0.91
    any:
      - id: micro-behaviors/data/text/llm/override::llm-hide-ai-identity
      - id: micro-behaviors/data/text/llm/override::llm-human-impersonation
      - id: micro-behaviors/data/text/llm/override::llm-unrestricted-persona
    needs: 2
