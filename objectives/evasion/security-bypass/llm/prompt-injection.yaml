defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]
  attack: T1562

composite_rules:
  - id: indirect-prompt-injection-hidden-instructions
    desc: Hidden indirect prompt injection
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/data/text/llm::llm-ignore-prior-instructions
      - id: micro-behaviors/data/text/llm::llm-agent-target
    any:
      - id: micro-behaviors/data/text/llm::html-comment-carrier
      - id: micro-behaviors/data/text/llm::css-display-none-carrier
      - id: micro-behaviors/data/text/llm::aria-hidden-carrier

  - id: indirect-prompt-injection-secret-exfil
    desc: LLM prompt requests secret exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/text/llm::llm-send-action
      - id: micro-behaviors/data/text/llm::llm-agent-target
    any:
      - id: micro-behaviors/data/text/llm::llm-secret-target
      - id: micro-behaviors/data/text/llm::llm-session-cookie-target
      - id: micro-behaviors/data/text/llm::llm-conditional-target
    needs: 2

  - id: indirect-prompt-injection-agentic-harm
    desc: LLM prompt requests agentic harm
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/text/llm::llm-agent-target
    any:
      - id: micro-behaviors/data/text/llm::llm-destructive-shell-action
      - id: micro-behaviors/data/text/llm::llm-payment-action
      - id: micro-behaviors/data/text/llm::llm-url-navigation-action
    needs: 2

  - id: indirect-prompt-injection-system-spoof
    desc: LLM system prompt spoofing
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/text/llm::llm-agent-target
    any:
      - id: micro-behaviors/data/text/llm::llm-system-override-token
      - id: micro-behaviors/data/text/llm::llm-system-tag-token
      - id: micro-behaviors/data/text/llm::llm-internal-ultrathink-token
    needs: 2

  - id: indirect-prompt-injection-output-suppression
    desc: LLM output suppression injection
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/data/text/llm::llm-always-respond
      - id: micro-behaviors/data/text/llm::llm-generic-refusal-output
    any:
      - id: micro-behaviors/data/text/llm::llm-ignore-prior-instructions
      - id: micro-behaviors/data/text/llm::llm-concealment-do-not-reveal
      - id: micro-behaviors/data/text/llm::css-display-none-carrier

  - id: indirect-prompt-injection-metadata-action
    desc: LLM metadata action injection
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/data/text/llm::llm-meta-ai-intent
      - id: micro-behaviors/data/text/llm::llm-meta-ai-action
    any:
      - id: micro-behaviors/data/text/llm::llm-payment-action
      - id: micro-behaviors/data/text/llm::llm-checkout-action
      - id: micro-behaviors/data/text/llm::llm-internal-ultrathink-token

  - id: direct-prompt-injection-override
    desc: Direct LLM instruction override
    crit: suspicious
    conf: 0.92
    any:
      - id: micro-behaviors/data/text/llm::llm-ignore-prior-instructions
      - id: micro-behaviors/data/text/llm::llm-disregard-prior-instructions
      - id: micro-behaviors/data/text/llm::llm-jailbreak-mode
    needs: 2

  - id: direct-prompt-injection-safety-bypass
    desc: Direct LLM safety bypass
    crit: suspicious
    conf: 0.92
    any:
      - id: micro-behaviors/data/text/llm::llm-new-system-prompt
      - id: micro-behaviors/data/text/llm::llm-safety-bypass
      - id: micro-behaviors/data/text/llm::llm-unrestricted-persona
    needs: 2

  - id: prompt-injection-identity-hijack
    desc: LLM identity hijack prompt
    crit: suspicious
    conf: 0.91
    any:
      - id: micro-behaviors/data/text/llm::llm-hide-ai-identity
      - id: micro-behaviors/data/text/llm::llm-human-impersonation
      - id: micro-behaviors/data/text/llm::llm-unrestricted-persona
    needs: 2
