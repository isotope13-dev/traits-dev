defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests, markdown, text]

traits:
- id: llm-conditional-target
  desc: Conditional LLM targeting phrase
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\bif you are an? (ai assistant|llm|large language model)\b'
    case_insensitive: true

- id: llm-agent-target-forward
  desc: Directive followed by LLM or AI-agent target
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ignore|disregard|reveal)\b.{0,80}\b(ai agent|coding agent)\b'
    case_insensitive: true

- id: llm-agent-target-reverse
  desc: LLM or AI-agent target followed by directive
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ai agent|coding agent)\b.{0,80}\b(ignore|disregard|reveal)\b'
    case_insensitive: true

  unless:
  - type: path
    regex: '[\\/]docs[\\/]'

- id: llm-secret-target-general
  desc: LLM secret or credential target
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '\b(ai assistant|chatgpt)\b.{0,80}\bsecret\b'
    case_insensitive: true

- id: llm-secret-target-token
  desc: LLM access token target
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '\b(ai assistant|chatgpt)\b.{0,80}\baccess token\b'
    case_insensitive: true

- id: llm-session-cookie-phrase
  desc: Session cookie target phrase
  crit: component
  conf: 0.82
  if:
    type: text
    substr: "session cookie"
    case_insensitive: true
  unless:
  - id: micro-behaviors/os/syscall/invoke/

composite_rules:
- id: llm-agent-target
  desc: LLM or AI-agent prompt-targeting directive
  crit: component
  conf: 0.84
  any:
  - id: llm-agent-target-forward
  - id: llm-agent-target-reverse

- id: llm-session-cookie-target
  desc: LLM session cookie target
  crit: notable
  conf: 0.84
  all:
  - id: llm-agent-target
  - id: llm-session-cookie-phrase
  near_bytes: 180

- id: llm-secret-target
  desc: LLM secret data target
  crit: component
  conf: 0.82
  any:
  - id: llm-secret-target-general
  - id: llm-secret-target-token
