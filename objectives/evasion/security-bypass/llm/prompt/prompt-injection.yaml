defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests, markdown, text]
  attack: T1562

composite_rules:
  - id: indirect-prompt-injection-concealed-terminal-action
    desc: Concealed agent terminal execution
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/evasion/security-bypass/llm/prompt::concealed-tool-instruction
      - id: objectives/command-and-control/remote-command/llm/action::llm-terminal-execution-directive
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/tool/detection/security-scanner/
      - id: metadata/package/testing/

  - id: indirect-prompt-injection-concealed-agent-directive
    desc: Prompt hides silent requirements from coding agent
    crit: hostile
    conf: 0.98
    all:
    - id: objectives/evasion/security-bypass/llm/target::llm-agent-target
    - id: objectives/evasion/security-bypass/llm/override::llm-concealed-reviewer-directive
    - id: objectives/command-and-control/remote-command/llm/action::llm-silent-undisclosed-directive
    unless:
    - id: well-known/tool/detection/llm-scanner/
    - id: well-known/tool/detection/security-scanner/
    - id: metadata/package/testing/

  - id: indirect-prompt-injection-hidden-instructions
    desc: Hidden indirect prompt injection
    crit: hostile
    conf: 0.96
    near_bytes: 400
    all:
      - id: objectives/evasion/security-bypass/llm/override::llm-ignore-prior-instructions
      - id: objectives/evasion/security-bypass/llm/target::llm-agent-target
    any:
      - id: micro-behaviors/data/format/css
      - id: micro-behaviors/data/format/html::hidden-content

  - id: indirect-prompt-injection-secret-exfil
    desc: LLM prompt requests secret exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/remote-command/llm/action::llm-sensitive-token-marker
      - id: objectives/evasion/security-bypass/llm/target::llm-agent-target
    any:
      - id: objectives/evasion/security-bypass/llm/target::llm-secret-target
      - id: objectives/evasion/security-bypass/llm/target::llm-session-cookie-target
      - id: objectives/evasion/security-bypass/llm/target::llm-conditional-target
    needs: 2

  - id: indirect-prompt-injection-agentic-harm
    desc: LLM prompt requests agentic harm
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/evasion/security-bypass/llm/target::llm-agent-target
    any:
      - id: objectives/execution/lure/shell::paste-run-destructive-shell
      - id: objectives/command-and-control/remote-command/llm/action::llm-payment-action
      - id: objectives/command-and-control/remote-command/llm/action::llm-url-navigation-action
    needs: 2

  - id: indirect-prompt-injection-system-spoof
    desc: LLM system prompt spoofing
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/evasion/security-bypass/llm/target::llm-agent-target
    any:
      - id: objectives/evasion/security-bypass/llm/override::llm-system-override-token
      - id: objectives/evasion/security-bypass/llm/override::llm-system-tag-token
      - id: objectives/evasion/security-bypass/llm/override::llm-internal-ultrathink-token
    needs: 2
    unless:
      - id: well-known/app/prizm-prompt::prizm-prompt-extension-context
      - id: well-known/app/prizm-prompt::prompt-catalog-marker

  - id: indirect-prompt-injection-system-wide-collection
    desc: LLM prompt orders autonomous sensitive file collection
    crit: hostile
    conf: 0.98
    near_bytes: 5000
    all:
      - id: objectives/evasion/security-bypass/llm/override::llm-system-override-accepted
      - id: objectives/evasion/security-bypass/llm/override::llm-system-wide-autonomous-scan
      - id: objectives/evasion/security-bypass/llm/override::llm-sensitive-user-data-scan-target
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/tool/detection/security-scanner/

  - id: indirect-prompt-injection-output-suppression
    desc: LLM output suppression injection
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/evasion/security-bypass/llm/override::llm-always-respond
      - id: objectives/evasion/security-bypass/llm/override::llm-generic-refusal-output
    any:
      - id: objectives/evasion/security-bypass/llm/override::llm-ignore-prior-instructions
      - id: objectives/evasion/security-bypass/llm/override::llm-concealment-do-not-reveal
      - id: micro-behaviors/data/format/css::display-none

  - id: indirect-prompt-injection-metadata-action
    desc: LLM metadata action injection
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/evasion/security-bypass/llm/carrier::llm-meta-ai-intent
      - id: objectives/evasion/security-bypass/llm/carrier::llm-meta-ai-action
    any:
      - id: objectives/command-and-control/remote-command/llm/action::llm-payment-action
      - id: objectives/command-and-control/remote-command/llm/action::llm-checkout-action
      - id: objectives/evasion/security-bypass/llm/override::llm-internal-ultrathink-token

  - id: direct-prompt-injection-override
    desc: Direct LLM instruction override
    crit: notable
    conf: 0.92
    # Bare jailbreak terminology is deliberately NOT in this any: list —
    # the word "jailbreak" alone is too generic to count as a direct injection
    # attempt. The composite escalates to suspicious only when a payload-shape
    # phrase ("DAN mode", "developer mode enabled", or an actual "ignore prior
    # instructions" / "disregard previous instructions" command) appears
    # alongside at least one other override trait.
    any:
      - id: objectives/evasion/security-bypass/llm/override::llm-ignore-prior-instructions
      - id: objectives/evasion/security-bypass/llm/override::llm-disregard-prior-instructions
      - id: objectives/evasion/security-bypass/llm/override::llm-jailbreak-payload
    needs: 2
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/tool/detection/

  - id: direct-prompt-injection-safety-bypass
    desc: Direct LLM safety bypass
    crit: suspicious
    conf: 0.92
    any:
      - id: objectives/evasion/security-bypass/llm/override::llm-new-system-prompt
      - id: objectives/evasion/security-bypass/llm/override::llm-safety-bypass
      - id: objectives/evasion/security-bypass/llm/override::llm-unrestricted-persona
    needs: 2
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/tool/detection/
  - id: prompt-injection-identity-hijack
    desc: LLM identity hijack prompt
    crit: suspicious
    conf: 0.91
    any:
      - id: objectives/evasion/security-bypass/llm/override::llm-hide-ai-identity
      - id: objectives/evasion/security-bypass/llm/override::llm-human-impersonation
      - id: objectives/evasion/security-bypass/llm/override::llm-unrestricted-persona
    needs: 2
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/tool/detection/

  - id: extension-llm-control-text
    desc: Extension embeds coding-agent control text
    crit: hostile
    conf: 0.98
    for: [crx, xpi, zip, archives]
    scope: archive
    all:
      - id: micro-behaviors/data/llm::agent-identity-claude
      - id: objectives/evasion/security-bypass/llm/override::llm-system-reminder-marker
      - id: objectives/evasion/security-bypass/llm/override::llm-agent-project-instruction-reference
      - id: objectives/evasion/security-bypass/llm/override::llm-agent-role-override-claim
