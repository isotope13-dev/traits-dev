defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, npm, archives]
  attack: T1027

composite_rules:
  - id: concealed-credential-audit-through-shell
    desc: Package hides a credential audit from observers and launches it through a shell
    crit: hostile
    conf: 0.99
    scope: outer
    all:
      - id: micro-behaviors/data/llm::observer-camouflage-instruction
      - id: micro-behaviors/data/llm::real-name-suppression-instruction
      - id: micro-behaviors/process/create/shell/bridge::spawn-call
