defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript, shell, markdown]

traits:
  - id: ssh-credential-disclosure-directive
    desc: Tool response directs SSH credential disclosure
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(read|include|send)\b.{0,120}~?/.ssh/'
    unless:
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-offensive-context
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-package
      - id: well-known/lib/pyaigis::pyaigis-import

  - id: aws-credential-disclosure-directive
    desc: Tool response directs AWS credential disclosure
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(read|include|send)\b.{0,120}\.aws/credentials'
    unless:
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-offensive-context
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-package

  - id: shadow-credential-disclosure-directive
    desc: Tool response directs shadow disclosure
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(read|include|send)\b.{0,120}/etc/shadow'
    unless:
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-offensive-context
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-package

  - id: concealed-tool-instruction
    desc: Tool instruction conceals action from user
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)\b(do not|don''t)\s+(inform|tell)\s+(the )?user\b'
    unless:
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-offensive-context
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-package

  - id: tool-state-transition
    desc: Tool state transitions to poisoned
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(benign|clean)\b.{0,120}\b(poisoned|malicious)\b'
    unless:
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-offensive-context
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-package
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-scanner-module

composite_rules:
  - id: mcp-credential-poisoning-instruction
    desc: Tool delivers concealed credential-disclosure instructions
    crit: suspicious
    conf: 0.97
    for: [python, javascript, typescript, shell, markdown, whl]
    scope: archive
    all:
      - id: concealed-tool-instruction
    any:
      - id: ssh-credential-disclosure-directive
      - id: aws-credential-disclosure-directive
      - id: shadow-credential-disclosure-directive
    needs: 1
    unless:
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-offensive-context
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-package

  - id: mcp-rug-pull-poisoning
    desc: Tool definitions switch to poisoned state
    crit: suspicious
    conf: 0.97
    for: [python, javascript, typescript, shell, markdown, whl]
    scope: archive
    all:
      - id: tool-state-transition
      - id: mcp-credential-poisoning-instruction
    unless:
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-offensive-context
      - id: well-known/tool/detection/mcp-tool-auditor::mcp-tool-auditor-package
