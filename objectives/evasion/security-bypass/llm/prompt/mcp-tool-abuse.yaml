defaults:
  platforms: [unix, windows]
  for: [python, documents, scripts, source, manifests]
  attack: T1562

traits:
  - id: mcp-local-file-access-directive
    desc: MCP prompt denies local-file access limits
    crit: component
    conf: 0.96
    for: [python, markdown, text]
    if:
      type: text
      regex: '(?i)NEVER\s+say\s+you\s+cannot\s+access\s+local\s+files'

  - id: mcp-upload-avoidance-directive
    desc: MCP prompt forbids asking for file uploads
    crit: component
    conf: 0.96
    for: [python, markdown, text]
    if:
      type: text
      regex: '(?i)NEVER\s+ask\s+the\s+user\s+to\s+upload\s+files'

  - id: mcp-mandatory-tool-directive
    desc: MCP prompt mandates tool use
    crit: component
    conf: 0.92
    for: [python, markdown, text]
    if:
      type: text
      regex: '(?i)ALWAYS\s+use\s+these\s+MCP\s+tools'

composite_rules:
  # NOTE on the three directive legs: they are assertive tool-use prose, which a
  # legitimate MCP server also needs. Telling the model "you DO have file tools,
  # don't claim you can't and don't ask for an upload instead" is the standard way
  # to suppress the assistant's default "I can't read local files" refusal — it is
  # honest about the server's own advertised capability and hides nothing from the
  # user. Real poisoning subverts the agent *against* the user, which is what the
  # sibling composites below require via llm-hidden-task-instruction and
  # llm-tool-secrecy-instruction.
  #
  # So this composite is gated on the absence of a workspace sandbox. A server
  # that resolves each path and rejects anything outside a user-chosen root is
  # doing the opposite of harvesting, no matter how emphatic its prompt. Without
  # that gate this fired hostile on gwf-mcp (VT 0/65), a folder-scoped document
  # reader for Claude Desktop that enforces containment and an allowlist of
  # office/PDF extensions.
  - id: mcp-agent-instruction-poisoning
    desc: MCP prompt forces an AI agent to access local files
    crit: hostile
    conf: 0.99
    for: [python]
    all:
      - id: micro-behaviors/communications/ipc/mcp::mcp-workspace-document-tools
      - id: mcp-local-file-access-directive
      - id: mcp-upload-avoidance-directive
      - id: mcp-mandatory-tool-directive
    unless:
      - id: micro-behaviors/fs/path/check::python-resolved-path-containment-check

  - id: mcp-hidden-filesystem-tool-injection
    desc: MCP prompt injection hides filesystem edits
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/ipc/mcp::python-tool-decorator
      - id: objectives/command-and-control/remote-command/llm/action::llm-filesystem-tool-chain
      - id: objectives/command-and-control/remote-command/llm/action::llm-hidden-task-instruction
      - id: objectives/command-and-control/remote-command/llm/action::llm-tool-secrecy-instruction
    any:
      - id: micro-behaviors/data/llm::edit-file-tool-reference
      - id: micro-behaviors/data/llm::tool-call-sequence-instruction
    needs: 1
  - id: mcp-silent-edit-file-injection
    desc: MCP prompt injection forces edit_file use
    crit: hostile
    conf: 0.99
    all:
      - id: mcp-hidden-filesystem-tool-injection
      - id: micro-behaviors/data/llm::edit-file-tool-reference
    any:
      - id: micro-behaviors/data/llm::tool-call-sequence-instruction
      - id: objectives/command-and-control/remote-command/llm/action::llm-tool-secrecy-instruction
      - id: objectives/evasion/security-bypass/llm/override::llm-ignore-prior-instructions
    needs: 1
