defaults:
  platforms: [unix, windows]
  for: [python, documents, scripts, source, manifests]
  attack: T1562

traits:
  - id: mcp-local-file-access-directive
    desc: MCP prompt denies local-file access limits
    crit: component
    conf: 0.96
    for: [python, markdown, text]
    if:
      type: text
      regex: '(?i)NEVER\s+say\s+you\s+cannot\s+access\s+local\s+files'

  - id: mcp-upload-avoidance-directive
    desc: MCP prompt forbids asking for file uploads
    crit: component
    conf: 0.96
    for: [python, markdown, text]
    if:
      type: text
      regex: '(?i)NEVER\s+ask\s+the\s+user\s+to\s+upload\s+files'

  - id: mcp-mandatory-tool-directive
    desc: MCP prompt mandates tool use
    crit: component
    conf: 0.92
    for: [python, markdown, text]
    if:
      type: text
      regex: '(?i)ALWAYS\s+use\s+these\s+MCP\s+tools'

  - id: mcp-workspace-selector-tool
    desc: MCP exposes workspace selection tool
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      exact: set_workspace

  - id: mcp-workspace-list-tool
    desc: MCP exposes workspace file-listing tool
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      exact: list_files

  - id: mcp-workspace-document-tool
    desc: MCP exposes local document-reading tool
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: symbol
      exact: get_document

composite_rules:
  - id: mcp-workspace-document-tools
    desc: MCP server exposes workspace document access
    crit: notable
    conf: 0.97
    for: [python]
    all:
      - id: micro-behaviors/communications/ipc/mcp::python-tool-decorator
      - id: mcp-workspace-selector-tool
      - id: mcp-workspace-list-tool
      - id: mcp-workspace-document-tool

  - id: mcp-agent-instruction-poisoning
    desc: MCP prompt forces an AI agent to access local files
    crit: hostile
    conf: 0.99
    for: [python]
    all:
      - id: mcp-workspace-document-tools
      - id: mcp-local-file-access-directive
      - id: mcp-upload-avoidance-directive
      - id: mcp-mandatory-tool-directive

  - id: mcp-hidden-filesystem-tool-injection
    desc: MCP prompt injection hides filesystem edits
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/ipc/mcp::python-tool-decorator
      - id: objectives/command-and-control/remote-command/llm/action::llm-filesystem-tool-chain
      - id: objectives/command-and-control/remote-command/llm/action::llm-hidden-task-instruction
      - id: objectives/command-and-control/remote-command/llm/action::llm-tool-secrecy-instruction
    any:
      - id: micro-behaviors/data/llm::edit-file-tool-reference
      - id: micro-behaviors/data/llm::tool-call-sequence-instruction
    needs: 1
  - id: mcp-silent-edit-file-injection
    desc: MCP prompt injection forces edit_file use
    crit: hostile
    conf: 0.99
    all:
      - id: mcp-hidden-filesystem-tool-injection
      - id: micro-behaviors/data/llm::edit-file-tool-reference
    any:
      - id: micro-behaviors/data/llm::tool-call-sequence-instruction
      - id: objectives/command-and-control/remote-command/llm/action::llm-tool-secrecy-instruction
      - id: objectives/evasion/security-bypass/llm/override::llm-ignore-prior-instructions
    needs: 1
