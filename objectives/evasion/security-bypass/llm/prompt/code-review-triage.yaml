defaults:
  platforms: [windows, unix]
  for: [scripts, source]
  attack: T1562

traits:
  - id: review-false-json-field
    desc: Review false JSON field
    crit: component
    conf: 0.88
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    if:
      type: text
      substr: '"review": false'

  - id: non-substantive-review-skip-phrase
    desc: Non-substantive review skip phrase
    crit: notable
    conf: 0.86
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    if:
      type: text
      substr: plainly non-substantive
      case_insensitive: true

  - id: llm-review-risk-routing-contract
    desc: LLM review risk routing contract
    crit: notable
    conf: 0.86
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    if:
      type: text
      regex: '(?i)\brisk\b.{0,80}\b0-10\b[\s\S]{0,260}\b(strong|deep)\s+(model|review)\b'

  - id: deterministic-security-floor-phrase
    desc: Deterministic security floor phrase
    crit: notable
    conf: 0.86
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    if:
      type: text
      substr: deterministic security floor
      case_insensitive: true

composite_rules:
  - id: llm-review-skip-verdict-contract
    desc: LLM review skip verdict contract
    crit: notable
    conf: 0.92
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    all:
      - id: review-false-json-field
      - id: non-substantive-review-skip-phrase
    near_bytes: 500

  - id: llm-mediated-code-review-triage
    desc: LLM-mediated code review triage
    crit: suspicious
    conf: 0.95
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    all:
      - id: metadata/library/ai::llm-review-triage-runtime
      - id: deterministic-security-floor-phrase
    any:
      - id: llm-review-skip-verdict-contract
      - id: llm-review-risk-routing-contract
    needs: 1

  - id: llm-review-security-floor-bypass-risk
    desc: LLM review security floor risk
    crit: suspicious
    conf: 0.96
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    all:
      - id: llm-mediated-code-review-triage
      - id: deterministic-security-floor-phrase
