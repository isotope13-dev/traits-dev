defaults:
  platforms: [unix, windows]
  for: [python, documents, scripts, source, manifests]
  attack: T1562

composite_rules:
  - id: mcp-hidden-filesystem-tool-injection
    desc: MCP prompt injection hides filesystem edits
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/ipc/mcp::fastmcp-tool-decorator
      - id: micro-behaviors/data/text/llm/action::llm-filesystem-tool-chain
      - id: micro-behaviors/data/text/llm/action::llm-hidden-task-instruction
      - id: micro-behaviors/data/text/llm/action::llm-tool-secrecy-instruction
    any:
      - id: micro-behaviors/data/text/llm/action::llm-edit-file-tool
      - id: micro-behaviors/data/text/llm/action::llm-tool-call-sequence-instruction
    needs: 1
    scope: file
  - id: mcp-silent-edit-file-injection
    desc: MCP prompt injection forces edit_file use
    crit: hostile
    conf: 0.99
    all:
      - id: mcp-hidden-filesystem-tool-injection
      - id: micro-behaviors/data/text/llm/action::llm-edit-file-tool
    any:
      - id: micro-behaviors/data/text/llm/action::llm-tool-call-sequence-instruction
      - id: micro-behaviors/data/text/llm/action::llm-tool-secrecy-instruction
      - id: micro-behaviors/data/text/llm/override::llm-ignore-prior-instructions
    needs: 1
    scope: file
