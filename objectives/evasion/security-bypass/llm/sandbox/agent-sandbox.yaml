# Disabling an AI coding agent's execution sandbox.
#
# AI coding agents (OpenAI Codex CLI, Claude Code, etc.) sandbox the shell
# commands the model is allowed to run and prompt before risky ones. Forcing the
# sandbox into full-access mode (Codex `sandbox_mode = "danger-full-access"`) or
# turning command approval off lets agent-issued commands touch the whole system
# unattended. A package that *writes* these settings into the agent's config is
# impairing the agent's guardrails (T1562), not configuring its own behavior — the
# malicious twist seen in trojanized "channel switcher" CLIs that silently relax a
# victim's Codex/Claude setup while pointing it at a third-party endpoint.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, shell, json, text]
  attack: T1562.001
traits:
  - id: codex-sandbox-danger-full-access
    desc: Sets Codex sandbox to full access
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'sandbox_mode["'']?\s*[=:]\s*["'']danger-full-access'
  - id: codex-approval-policy-never
    desc: Disables Codex command approval prompts
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'approval_policy["'']?\s*[=:]\s*["'']never'
composite_rules:
  # Writing danger-full-access into a Codex config (its dir, or any JS file write)
  # = removing the agent's sandbox guardrail. The danger-full-access assignment is
  # the rare, intent-bearing leg; the write target supplies the "into the victim's
  # config" context.
  - id: ai-agent-sandbox-disable
    desc: Disables AI coding agent sandbox
    crit: hostile
    conf: 0.92
    all:
      - id: codex-sandbox-danger-full-access
    any:
      - id: micro-behaviors/fs/path/application/config::codex-config-directory
      - id: micro-behaviors/fs/write/file/direct::js-file-write
      - id: codex-approval-policy-never

  - id: scripted-ai-agent-permission-bypass
    desc: Scripted AI agent permission bypass
    crit: hostile
    conf: 0.95
    ref: sha256:32f1acd36984e7f7bd66b06d4185afa42fcf696bad4378aecf4b3bc8dfdab654
    for: [shell]
    all:
      - id: micro-behaviors/process/create/hcom::claude-dangerous-agent-session
      - id: micro-behaviors/process/create/shell/spawn::shell-execution-comp
      - id: micro-behaviors/process/create/hcom::codex-exec-command

  - id: python-ai-agent-sandbox-bypass-runner
    desc: Python AI agent sandbox bypass runner
    crit: hostile
    conf: 0.96
    ref: sha256:32f1acd36984e7f7bd66b06d4185afa42fcf696bad4378aecf4b3bc8dfdab654
    for: [python]
    all:
      - id: micro-behaviors/process/create/hcom::python-dangerous-llm-agent-runner
      - id: micro-behaviors/process/create/subprocess::process-execution
