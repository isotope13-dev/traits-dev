---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - binaries
  - scripts
  - source
traits:
- id: search-word
  desc: '"search" verb inside a string literal'
  crit: component
  conf: 0.4
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    word: search
    case_insensitive: true
- id: chat-word
  desc: '"chat" keyword inside a string literal'
  crit: component
  conf: 0.4
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    word: chat
