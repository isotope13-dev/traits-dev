---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - binaries
  - scripts
  - source
traits:
- id: search-word
  desc: Prompt searches for files or secrets
  crit: component
  conf: 0.4
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: '\bsearch\s+(for\s+)?(files?|secrets?|tokens?)\b'
    case_insensitive: true
- id: chat-word
  desc: Chat term near inventory prompt language
  crit: component
  conf: 0.4
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: '\bchat\b.{0,80}\b(inventory|enumerate|search|list)\b'
