defaults:
  for: [binaries, c]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: setrlimit
    desc: Set resource limits for process
    crit: notable
    mbc: F0004
    attack: T1562.001
    conf: 0.6
    if:
      type: symbol
      regex: setrlimit
    platforms:
      - unix
      - linux
      - macos
