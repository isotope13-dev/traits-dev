# Ad-Hoc Code Signing of Dropped Payloads
# Detects codesign --force --deep --sign - used to re-sign malware dropped to temp paths,
# bypassing Gatekeeper's signature requirement on Apple Silicon and recent macOS.
# ATT&CK: T1553.001 (Subvert Trust Controls: Code Signing)
# MBC: F0004 (Bypass)
defaults:
  platforms:
    - macos
  for: [scripts, binaries]
  attack: T1553.001
  mbc: F0004
traits:
  - id: codesign-force-adhoc
    desc: Ad-hoc codesign of dropped payload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: codesign\s+--force.{0,30}--sign\s+-[\s"]
composite_rules:
  - id: macos-quarantine-clear-adhoc-launch
    desc: Clears macOS quarantine metadata, re-signs, and launches app bundle
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/attributes/xattr::xattr-clear
      - id: codesign-force-adhoc
      - id: micro-behaviors/process/create/launch::open-command
  - id: macos-staged-app-quarantine-bypass
    desc: macOS staged app quarantine bypass before launch
    crit: hostile
    conf: 0.97
    all:
      - id: macos-quarantine-clear-adhoc-launch
    any:
      - id: objectives/execution/lure/video-meeting::meeting-app-archive-lure
      - id: micro-behaviors/data/archive/extract/zip::unzip-extraction
    needs: 1
