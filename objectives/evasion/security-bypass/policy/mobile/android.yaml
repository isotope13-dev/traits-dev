defaults:
  platforms: [android]
  for: [java, kotlin, npm, zip, tar]

composite_rules:
  - id: android-battery-optimization-exemption-prompt
    desc: Android battery optimization exemption prompt
    crit: suspicious
    conf: 0.94
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    all:
      - id: micro-behaviors/os/privilege/check::android-battery-optimization-status
      - id: micro-behaviors/os/privilege/check::android-request-ignore-battery-action
      - id: micro-behaviors/os/message/intent::android-start-activity
    unless:
      - id: metadata/package/quality/source::kopuz-android-media-activity
      - id: metadata/package/quality/source::kopuz-android-activity-leaf
      - id: well-known/lib/react-native-noti-sdk::source-notification-context
      - id: well-known/lib/react-native-noti-sdk::archive-notification-context
      - id: well-known/lib/react-native-noti-sdk/

  - id: android-rich-notification-battery-bypass
    desc: Android rich notification battery bypass
    crit: suspicious
    conf: 0.95
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    scope: archive
    for: [npm, zip, tar]
    all:
      - id: micro-behaviors/ui/window/notify/message::android-rich-notification-actions
      - id: android-battery-optimization-exemption-prompt
    unless:
      - id: well-known/lib/react-native-noti-sdk::archive-notification-context
      - id: well-known/lib/react-native-noti-sdk/
