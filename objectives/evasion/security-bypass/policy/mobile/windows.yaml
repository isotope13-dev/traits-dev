defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1048576
  size_max: 67108864

traits:
  - id: provisioning-device-owner-download
    desc: Android device-owner download provisioning
    crit: component
    conf: 0.99
    if:
      type: text
      exact: android.app.extra.PROVISIONING_DEVICE_ADMIN_PACKAGE_DOWNLOAD_LOCATION

  - id: gsmwiki-provisioning-apk
    desc: gsmwiki provisioning APK URL
    crit: component
    conf: 0.99
    if:
      type: text
      regex: 'https://gsmwiki\.com/files/(adb|mdm996|app-testing)\.apk'

  - id: remove-mdm-lock-label
    desc: Remove MDM lock action label
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: Remove MDM Lock

composite_rules:
  - id: android-mdm-bypass-provisioning
    desc: Android MDM bypass provisioning workflow
    crit: suspicious
    conf: 0.99
    all:
      - id: provisioning-device-owner-download
      - id: gsmwiki-provisioning-apk
    any:
      - id: remove-mdm-lock-label
      - id: objectives/impact/wipe/disk/format::remove-mdm-format-userdata
    needs: 1
