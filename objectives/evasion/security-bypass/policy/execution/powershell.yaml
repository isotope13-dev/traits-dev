defaults:
  platforms: [windows, unix]
  for: [powershell, batch, shell, pe, dll]
  attack: T1059.001
  mbc: E1027
traits:
  - id: bypass-execution-policy
    desc: PowerShell execution policy bypass flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '-e[px]\s+bypass\b|-executionpolicy\s+bypass\b'
      case_insensitive: true
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - type: text
        substr: Set-ExecutionPolicy Bypass -Scope Process -Force
      - type: text
        substr: ChocolateyProcessAsAdmin
      - type: text
        substr: Start-ChocolateyProcessAsAdmin
      - id: well-known/app/protected-benign-pe/
