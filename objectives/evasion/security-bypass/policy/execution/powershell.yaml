defaults:
  platforms: [windows, unix]
  for: [powershell, batch, shell, pe, dll]
  attack: T1059.001
  mbc: E1027
traits:
  - id: bypass-execution-policy
    desc: PowerShell execution policy bypass flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '^[ \t]*[^#\r\n].{0,200}(-e[px]\s+bypass\b|-executionpolicy\s+bypass\b)'
      case_insensitive: true
    unless:
      - type: basename
        regex: '^xray_no_window\.(cmd|ps1)$'
      - id: executionpolicy-known-installer-marker
      - id: well-known/tool/reverse-engineering/radare2/
      - id: metadata/file/profile/identity::ansible-python-package-path
      - id: well-known/tool/sysadmin/cdp::cdp-project-switcher
      - id: metadata/package/quality/false-positives::intune-remediation-script
      - id: well-known/tool/sysadmin/kubernetes/bootstrap::kubernetes-windows-gce-script
  - id: executionpolicy-hermes-agent-installer-marker
    desc: Hermes agent GitHub installer marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: raw.githubusercontent.com/NousResearch/hermes-agent
  - id: executionpolicy-set-scope-process
    desc: Set-ExecutionPolicy process-scope marker
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Set-ExecutionPolicy Bypass -Scope Process -Force
  - id: executionpolicy-dp0-file
    desc: Batch-local PowerShell file marker
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: '-File "%~dp0'
      case_insensitive: true
  - id: executionpolicy-jbang-wrapper
    desc: JBang PowerShell wrapper marker
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'jbang\.ps1\s+(version|jdk\s+install)'
  - id: executionpolicy-package-manager-wrapper
    desc: Package manager PowerShell wrapper marker
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)(Start-)?ChocolateyProcessAsAdmin|scoop uninstall -p scoop'
  - id: executionpolicy-chocolatey-install
    desc: Chocolatey install execution-policy marker
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: community.chocolatey.org/install.ps1
  - id: executionpolicy-chocolatey-legacy-install
    desc: Legacy Chocolatey execution-policy marker
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: chocolatey.org/install.ps1
  - id: executionpolicy-build-wrapper
    desc: Build wrapper execution-policy marker
    crit: notable
    conf: 0.82
    for: [batch]
    if:
      type: text
      regex: '(?i)(%~dp0|%~dp0eng\\|%~dp0eng/)build\.ps1|rustup target add'
  - id: executionpolicy-sysadmin-template
    desc: SysAdmin template execution-policy marker
    crit: notable
    conf: 0.82
    for: [batch]
    if:
      type: text
      substr: ':PSDownload <URL> <FileLocation>'
  - id: executionpolicy-hardware-tweak-marker
    desc: Hardware tweak execution-policy marker
    crit: notable
    conf: 0.82
    for: [batch]
    if:
      type: text
      regex: '(?i)MSPower_DeviceEnable|Media\.SoundPlayer|EdgeRemover'
  - id: executionpolicy-msys2-shell-wrapper
    desc: MSYS2 installer shell wrapper marker
    crit: notable
    conf: 0.86
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)msys2_shell\.cmd.{0,200}(-ExecutionPolicy\s+Bypass|pacman\s+-Syuu)'
  - id: executionpolicy-gocross-wrapper
    desc: Go cross tool wrapper marker
    crit: notable
    conf: 0.84
    for: [batch, shell]
    if:
      type: text
      substr: gocross
  - id: executionpolicy-local-script-wrapper
    desc: Local PowerShell script wrapper marker
    crit: notable
    conf: 0.82
    for: [powershell, batch, shell]
    if:
      type: text
      regex: '(?i)-ExecutionPolicy\s+Bypass\s+-File\s+scripts[/\\]'
composite_rules:
  - id: policy-bypassing-runtime-replacement
    desc: Admin .NET installer bypasses policy and replaces runtime DLL
    crit: hostile
    conf: 0.96
    for: [pe]
    all:
      - id: bypass-execution-policy
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: objectives/evasion/hijack-execution-flow/dll-hijacking::runtime-dll-backup-name
      - id: micro-behaviors/process/create/spawn::process-token-dotnet
  - id: executionpolicy-known-installer-marker
    desc: Known installer execution-policy marker
    crit: notable
    conf: 0.85
    any:
      - id: executionpolicy-set-scope-process
      - id: executionpolicy-dp0-file
      - id: executionpolicy-jbang-wrapper
      - id: executionpolicy-package-manager-wrapper
      - id: executionpolicy-chocolatey-install
      - id: executionpolicy-chocolatey-legacy-install
      - id: executionpolicy-build-wrapper
      - id: executionpolicy-sysadmin-template
      - id: executionpolicy-hardware-tweak-marker
      - id: executionpolicy-msys2-shell-wrapper
      - id: executionpolicy-gocross-wrapper
      - id: executionpolicy-hermes-agent-installer-marker
      - id: executionpolicy-local-script-wrapper
      - id: micro-behaviors/fs/path/config/app::vm-config-iso-configuration-context
