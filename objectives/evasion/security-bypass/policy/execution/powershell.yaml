defaults:
  platforms: [windows, unix]
  for: [powershell, batch, shell, pe, dll]
  attack: T1059.001
  mbc: E1027
traits:
  - id: bypass-execution-policy
    desc: PowerShell execution policy bypass flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '^[ \t]*[^#\r\n].{0,200}(-e[px]\s+bypass\b|-executionpolicy\s+bypass\b)'
      case_insensitive: true
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework/
      - id: executionpolicy-known-installer-context
      - id: executionpolicy-hermes-agent-installer-context
      - id: well-known/app/protected-benign-pe/
      - id: metadata/file/string/identity/
      - id: well-known/app/openai-codex/
  - id: executionpolicy-hermes-agent-installer-context
    desc: Hermes agent GitHub installer context
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: raw.githubusercontent.com/NousResearch/hermes-agent
  - id: executionpolicy-set-scope-process
    desc: Set-ExecutionPolicy process-scope context
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Set-ExecutionPolicy Bypass -Scope Process -Force
  - id: executionpolicy-dp0-file
    desc: Batch-local PowerShell file context
    crit: component
    conf: 0.8
    if:
      type: text
      substr: '-File "%~dp0\'
      case_insensitive: true
  - id: executionpolicy-jbang-wrapper
    desc: JBang PowerShell wrapper context
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'jbang\.ps1\s+(version|jdk\s+install)'
  - id: executionpolicy-package-manager-wrapper
    desc: Package manager PowerShell wrapper context
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)(Start-)?ChocolateyProcessAsAdmin|scoop uninstall -p scoop'
  - id: executionpolicy-chocolatey-install
    desc: Chocolatey install execution-policy context
    crit: component
    conf: 0.84
    if:
      type: text
      substr: community.chocolatey.org/install.ps1
  - id: executionpolicy-chocolatey-legacy-install
    desc: Legacy Chocolatey execution-policy context
    crit: component
    conf: 0.84
    if:
      type: text
      substr: chocolatey.org/install.ps1
  - id: executionpolicy-build-wrapper
    desc: Build wrapper execution-policy context
    crit: component
    conf: 0.82
    for: [batch]
    if:
      type: text
      regex: '(?i)(%~dp0|%~dp0eng\\|%~dp0eng/)build\.ps1|rustup target add'
  - id: executionpolicy-sysadmin-template
    desc: SysAdmin template execution-policy context
    crit: component
    conf: 0.82
    for: [batch]
    if:
      type: text
      substr: ':PSDownload <URL> <FileLocation>'
  - id: executionpolicy-hardware-tweak-context
    desc: Hardware tweak execution-policy context
    crit: component
    conf: 0.82
    for: [batch]
    if:
      type: text
      regex: '(?i)MSPower_DeviceEnable|Media\.SoundPlayer|EdgeRemover'
  - id: executionpolicy-msys2-shell-wrapper
    desc: MSYS2 installer shell wrapper context
    crit: component
    conf: 0.86
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)msys2_shell\.cmd.{0,200}(-ExecutionPolicy\s+Bypass|pacman\s+-Syuu)'
composite_rules:
  - id: executionpolicy-known-installer-context
    desc: Known installer execution-policy context
    crit: component
    conf: 0.85
    any:
      - id: executionpolicy-set-scope-process
      - id: executionpolicy-dp0-file
      - id: executionpolicy-jbang-wrapper
      - id: executionpolicy-package-manager-wrapper
      - id: executionpolicy-chocolatey-install
      - id: executionpolicy-chocolatey-legacy-install
      - id: executionpolicy-build-wrapper
      - id: executionpolicy-sysadmin-template
      - id: executionpolicy-hardware-tweak-context
      - id: executionpolicy-msys2-shell-wrapper
      - id: micro-behaviors/fs/path/config/app::vm-config-iso-configuration-context
