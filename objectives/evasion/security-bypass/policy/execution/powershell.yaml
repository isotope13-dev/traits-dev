defaults:
  platforms: [windows]
  for: [powershell, batch, pe, dll]
  attack: T1059.001
  mbc: E1027
traits:
  - id: bypass-execution-policy
    desc: PowerShell execution policy bypass flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '-ExecutionPolicy\s+Bypass\b|-ep\s+bypass\b'
      case_insensitive: true
    unless:
      - id: well-known/app/protected-benign-pe/
