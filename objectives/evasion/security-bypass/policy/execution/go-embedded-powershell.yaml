defaults:
  platforms: [windows]
  for: [go]
  attack: T1059.001
  mbc: E1027
traits:
  - id: go-embedded-executionpolicy-bypass
    desc: Go embeds PowerShell execution-policy bypass
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: '-ExecutionPolicy Bypass'
  - id: go-embedded-hidden-startprocess
    desc: Go embeds hidden PowerShell process start
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "Start-Process -FilePath 'powershell'"
      case_insensitive: true
composite_rules:
  - id: go-hidden-powershell-policy-bypass
    desc: Go source hides PowerShell execution-policy bypass
    crit: hostile
    conf: 0.97
    all:
      - id: go-embedded-executionpolicy-bypass
      - id: go-embedded-hidden-startprocess
      - id: micro-behaviors/process/create/direct::exec-command
    unless:
      - id: metadata/package/testing/harness/runtime/
