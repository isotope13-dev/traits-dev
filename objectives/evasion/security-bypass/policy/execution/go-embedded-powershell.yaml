defaults:
  platforms: [windows]
  for: [go]
  attack: T1059.001
  mbc: E1027
composite_rules:
  - id: go-hidden-powershell-policy-bypass
    desc: Go source hides PowerShell execution-policy bypass
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/process/create/direct::go-powershell-command
      - id: micro-behaviors/process/create/flags::powershell-policy-bypass-flag
      - id: micro-behaviors/process/create/start-process::go-powershell-start-process
      - id: micro-behaviors/process/create/hidden::go-powershell-windowstyle-hidden
    unless:
      - id: metadata/package/testing/harness/runtime/
