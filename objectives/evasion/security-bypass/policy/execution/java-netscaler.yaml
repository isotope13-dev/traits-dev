defaults:
  platforms: [netscaler, appliance, unix]
  for: [java, class, jar]
  attack: T1562

traits:
  - id: java-allpermission-policy-grant
    desc: Java policy grants AllPermission
    crit: suspicious
    conf: 0.94
    for: [java]
    if:
      type: text
      regex: '(?i)\bpermission\s+java\.security\.AllPermission\s*;'

  - id: java-certpath-disable-weaken
    desc: Java certpath disable weaken
    crit: suspicious
    conf: 0.92
    for: [java]
    if:
      type: text
      substr: jdk.certpath.disabledAlgorithms=

  - id: jvm-security-manager-bytecode
    desc: JVM security manager bytecode
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: text
      regex: 'java\.security\.manager'

  - id: jvm-allpermission-bytecode
    desc: JVM AllPermission bytecode
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: text
      regex: 'java\.security\.AllPermission'

  - id: jvm-certpath-bytecode
    desc: JVM certpath bytecode
    crit: suspicious
    conf: 0.92
    for: [class, jar]
    if:
      type: text
      regex: 'jdk\.certpath\.disabledAlgorithms'

composite_rules:
  - id: java-security-policy-bypass
    desc: Java security policy bypass
    crit: hostile
    conf: 0.98
    for: [java]
    all:
      - id: micro-behaviors/os/security/policy::java-security-manager-null-call
      - id: java-allpermission-policy-grant
    any:
      - id: java-certpath-disable-weaken

  - id: jvm-security-policy-bypass
    desc: JVM security policy bypass
    crit: hostile
    conf: 0.97
    for: [class, jar]
    all:
      - id: jvm-security-manager-bytecode
      - id: jvm-allpermission-bytecode
    any:
      - id: jvm-certpath-bytecode
