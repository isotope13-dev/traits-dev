defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: suspicious
  conf: 0.9
  attack: T1562
  mbc: E1562

traits:
  - id: acl-prefilter-disabled-backfill
    desc: ACL prefilter disabled backfill
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    count_min: 2
    if:
      type: text
      regex: '\b(ACL_PREFILTER_ENABLED|acl_hash|ACL pre-filter|pre-filter)\b'

composite_rules:
  - id: admin-vector-acl-prefilter-bypass
    desc: Admin vector ACL prefilter bypass
    crit: hostile
    conf: 0.97
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    all:
      - id: micro-behaviors/communications/http/endpoints::admin-payload-backfill-endpoint
      - id: micro-behaviors/data/db/vector::qdrant-default-payload-backfill
      - id: acl-prefilter-disabled-backfill
