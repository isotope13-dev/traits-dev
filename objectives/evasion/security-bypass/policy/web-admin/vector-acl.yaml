defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: suspicious
  conf: 0.9
  attack: T1562
  mbc: E1562

traits:
  - id: acl-prefilter-disabled-setting
    desc: Configuration disables the ACL prefilter
    if:
      type: text
      regex: '["'']?acl_prefilter_enabled["'']?\s*:\s*False\b'

  - id: acl-prefilter-setting-reference
    desc: References the ACL prefilter setting
    if:
      type: literal
      kind: string
      substr: ACL_PREFILTER_ENABLED

composite_rules:
  - id: admin-vector-acl-prefilter-bypass
    desc: Admin vector ACL prefilter bypass
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/endpoints::admin-payload-backfill-endpoint
      - id: micro-behaviors/data/db/vector::qdrant-default-payload-backfill
      - id: acl-prefilter-setting-reference
