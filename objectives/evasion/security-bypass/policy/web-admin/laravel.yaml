defaults:
  platforms: [unix, windows]
  for: [php]
  crit: notable
  conf: 0.86

traits:
- id: traffic-admin-prefix
  desc: Traffic admin route prefix
  crit: component
  if:
    type: text
    regex: "['\"]admin/traffic['\"]"

- id: route-middleware-web-array
  desc: Web-only route middleware array
  crit: component
  if:
    type: text
    regex: "route_middleware['\"]\\s*=>\\s*\\[\\s*['\"]web['\"]\\s*\\]"

- id: traffic-analytics-web-config
  desc: Traffic analytics web middleware default
  crit: component
  if:
    type: text
    regex: "traffic-analytics\\.route_middleware['\"].{0,60}\\[\\s*['\"]web['\"]"

- id: traffic-log-clear-route
  desc: Traffic log clear route
  crit: component
  if:
    type: text
    regex: "traffic-logs/clear|clearLogs"

composite_rules:
- id: web-only-route-middleware
  desc: Laravel route middleware defaults to web only
  crit: component
  conf: 0.9
  any:
  - id: route-middleware-web-array
  - id: traffic-analytics-web-config

- id: traffic-admin-web-only
  desc: Traffic admin routes use web middleware only
  crit: notable
  conf: 0.9
  all:
  - id: traffic-admin-prefix
  - id: web-only-route-middleware
  any:
  - id: traffic-log-clear-route
  - id: micro-behaviors/data/format/csv/http-telemetry::http-telemetry-csv-export
