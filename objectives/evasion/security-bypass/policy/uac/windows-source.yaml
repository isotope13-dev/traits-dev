defaults:
  for: [csharp, python]
  platforms: [windows]
  attack: "T1112"
traits:
- id: system-policy-path
  desc: Windows UAC policy registry path
  crit: suspicious
  conf: 0.88
  if:
    type: string_literal
    exact: HKEY_Local_Machine\\Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\System
- id: system-policy-path-python
  desc: Windows UAC policy registry path
  crit: suspicious
  conf: 0.9
  for: [python]
  if:
    type: text
    substr: SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
- id: enablelua-name
  desc: UAC EnableLUA registry value
  crit: suspicious
  conf: 0.92
  if:
    type: string_literal
    exact: EnableLUA
- id: consentprompt-name
  desc: UAC prompt behavior registry value
  crit: suspicious
  conf: 0.92
  if:
    type: string_literal
    exact: ConsentPromptBehaviorAdmin
- id: enablelua-set-zero-python
  desc: Python disables UAC EnableLUA
  crit: suspicious
  conf: 0.96
  for: [python]
  if:
    type: text
    regex: 'SetValueEx.{0,80}"EnableLUA".{0,80}REG_DWORD,\s*0\)'
- id: consentprompt-set-zero-python
  desc: Python disables UAC prompts
  crit: suspicious
  conf: 0.96
  for: [python]
  if:
    type: text
    regex: 'SetValueEx.{0,80}"ConsentPromptBehaviorAdmin".{0,80}REG_DWORD,\s*0\)'
- id: installer-detect-name
  desc: Installer detection registry value
  crit: suspicious
  conf: 0.9
  if:
    type: string_literal
    exact: EnableInstallerDetection
- id: low-risk-file-types
  desc: LowRiskFileTypes policy value
  crit: suspicious
  conf: 0.9
  if:
    type: string_literal
    exact: LowRiskFileTypes
- id: allow-insecure-guest-auth
  desc: Allows insecure guest SMB authentication
  crit: suspicious
  conf: 0.9
  if:
    type: string_literal
    exact: AllowInsecureGuestAuth
composite_rules:
- id: disable-uac-policy-set
  desc: Disables UAC-related registry protections
  crit: hostile
  conf: 0.98
  all:
  - id: system-policy-path
  - id: micro-behaviors/os/registry/manipulate::set-value
  any:
  - id: enablelua-name
  - id: consentprompt-name
  - id: installer-detect-name
  needs: 2
- id: python-disable-uac-policy-set
  desc: Python disables UAC registry protections
  crit: hostile
  conf: 0.98
  all:
  - id: system-policy-path-python
  - id: micro-behaviors/os/registry/manipulate::winreg-setvalue
  any:
  - id: enablelua-set-zero-python
  - id: consentprompt-set-zero-python
