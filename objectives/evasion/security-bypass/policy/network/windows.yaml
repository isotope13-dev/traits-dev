defaults:
  platforms: [windows]
  for: [batch, powershell, scripts]
  attack: "T1562"
traits:
  - id: enable-smb1-protocol
    desc: Enables SMB1 protocol
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: Enable-WindowsOptionalFeature.{0,120}SMB1Protocol
      case_insensitive: true
  - id: lsa-anonymous-loosen
    desc: Loosens LSA anonymous access
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: EveryoneIncludesAnonymous.{0,80}/d\s+1|RestrictAnonymous.{0,80}/d\s+0
      case_insensitive: true
composite_rules:
  - id: smb-anonymous-weaken
    desc: SMB anonymous access weakened
    crit: suspicious
    conf: 0.94
    all:
      - id: enable-smb1-protocol
      - id: lsa-anonymous-loosen
