defaults:
  platforms: [netscaler, appliance, unix]
  for: [elf, binaries]
  attack: T1190

traits:
  - id: native-netscaler-auth-header
    desc: Native NetScaler auth header
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "X-Authenticated: true"

  - id: native-smuggling-chunked
    desc: Native smuggling chunked
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "Transfer-Encoding: chunked"

  - id: native-nsconfig-build-path
    desc: Native nsconfig build path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /nsconfig/build?view=build

composite_rules:
  - id: native-netscaler-auth-bypass
    desc: Native NetScaler auth bypass
    crit: hostile
    conf: 0.98
    all:
      - id: native-netscaler-auth-header
      - id: native-smuggling-chunked
    any:
      - id: native-nsconfig-build-path
