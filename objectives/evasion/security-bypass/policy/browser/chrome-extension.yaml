defaults:
  platforms: [windows, unix]
  for: [scripts, javascript, typescript, chrome-manifest, binaries]
  attack: "T1562"
traits:
  - id: llm-exam-coach-prompt
    desc: LLM exam coach system prompt
    crit: suspicious
    conf: 0.94
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    for: [javascript, typescript]
    if:
      type: text
      substr: exam coach

  - id: llm-correct-choices-field
    desc: LLM correct choices field
    crit: suspicious
    conf: 0.94
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    for: [javascript, typescript]
    if:
      type: text
      substr: correct_choices

  - id: llm-exam-multiselect-answer-prompt
    desc: LLM prompt requests multiselect answers
    crit: suspicious
    conf: 0.96
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    for: [javascript, typescript]
    if:
      type: text
      substr: MULTI-SELECT; return ALL correct options

  - id: llm-eliminate-rules-field
    desc: LLM eliminate rules field
    crit: suspicious
    conf: 0.94
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    for: [javascript, typescript]
    if:
      type: text
      substr: eliminate_rules

  - id: llm-bad-phrases-field
    desc: LLM bad phrases field
    crit: suspicious
    conf: 0.94
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    for: [javascript, typescript]
    if:
      type: text
      substr: bad_phrases

  - id: llm-correct-reason-field
    desc: LLM correct reason field
    crit: suspicious
    conf: 0.94
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    for: [javascript, typescript]
    if:
      type: text
      substr: correct_reason

composite_rules:
  - id: encrypted-main-world-extension-injection
    desc: Browser extension injects encrypted code into page main world
    crit: hostile
    conf: 0.96
    for: [javascript, typescript]
    attack: T1059.007
    all:
      - id: micro-behaviors/process/inject/webextension::chrome-scripting-execute
      - id: micro-behaviors/process/inject/webextension::chrome-scripting-main-world
      - id: objectives/command-and-control/dropper/execution/browser::encoded-stage-url-construction
      - id: objectives/command-and-control/dropper/execution/browser::dom-script-content-sink
      - id: micro-behaviors/data/encode/xor::js-xor-decoder-ast
    unless:
      - id: well-known/lib/web-ui-vendors/
      - id: metadata/build/bundler/

  - id: chrome-extension-cors-header-bypass
    desc: Chrome extension rewrites CORS and request-origin headers (security bypass)
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/headers::dnr-cors-origin-rewrite
      - id: micro-behaviors/communications/http/headers::dnr-referer-origin-spoof
    any:
      - id: micro-behaviors/communications/http/headers::dnr-additional-security-header-modification

  - id: broad-host-page-network-proxy
    desc: Broad-host extension proxies and rewrites page network traffic
    crit: hostile
    conf: 0.98
    for: [crx, xpi, zip]
    scope: archive
    all:
      - id: metadata/permission/manifest::is-chrome-manifest
      - id: metadata/permission/host::broad-host-access
      - id: micro-behaviors/process/inject/webextension::extension-page-script-injection
      - id: micro-behaviors/process/hook/xhr::globalthis-fetch-wrapper
      - id: micro-behaviors/process/hook/xhr::globalthis-xhr-wrapper
      - id: micro-behaviors/communications/http/headers::dnr-cors-permissive-response

  - id: llm-exam-answer-json-prompt
    desc: LLM prompt requests exam answers
    crit: suspicious
    conf: 0.97
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    for: [javascript, typescript]
    all:
      - id: llm-exam-coach-prompt
      - id: llm-correct-choices-field
      - id: micro-behaviors/data/llm::json-only-response-instruction

  - id: llm-exam-choice-rationale-prompt
    desc: LLM prompt requests choice rationales
    crit: suspicious
    conf: 0.96
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    for: [javascript, typescript]
    any:
      - id: llm-eliminate-rules-field
      - id: llm-bad-phrases-field
      - id: llm-correct-reason-field
    needs: 2

  - id: ai-exam-answer-generation
    desc: AI generates online exam answers
    crit: hostile
    conf: 0.98
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/communications/http/endpoints::endpoint
      - id: llm-exam-answer-json-prompt
    any:
      - id: llm-exam-multiselect-answer-prompt
      - id: llm-exam-choice-rationale-prompt
    needs: 1

  - id: browser-extension-ai-quiz-policy-bypass
    desc: Browser extension assists online quiz answers
    crit: hostile
    conf: 0.97
    ref: sha256:c55a00c3436fb99b6e5542ceda74ce6154d6535818ee039ba3fa901db17f7d94
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/ui/window/manage/dom::quiz-answer-assistance-state
    any:
      - id: llm-exam-choice-rationale-prompt
      - id: llm-exam-answer-json-prompt
      - id: micro-behaviors/ui/window/manage/dom::quiz-check-answer-hook
    needs: 1
