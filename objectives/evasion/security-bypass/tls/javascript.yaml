defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1553.004
traits:
- id: electron-ignore-certificate-errors
  desc: Electron ignores certificate errors
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'app\.commandLine\.appendSwitch\s*\(\s*[''"]ignore-certificate-errors[''"]'
  unless:
  - type: basename
    regex: '(^|[-_.])(test|spec)\.[cm]?[jt]sx?$'
  - id: well-known/app/mastergo::mastergo-application-context
  - id: well-known/app/codewhale::codewhale-application-context

  # `https.Agent({ rejectUnauthorized: false })` — explicit agent bypass
- id: https-agent-reject-unauthorized
  desc: https.Agent rejectUnauthorized false
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'new\s+https\.Agent\s*\(\s*\{[^}\n]{0,200}rejectUnauthorized\s*:\s*false'
  unless:
  - type: basename
    regex: '(^|[-_.])(test|spec)\.[cm]?[jt]sx?$'
  - id: metadata/package/testing/
  - id: well-known/app/node-red-hik-media-buffer::hik-media-buffer-context

  # Generic `rejectUnauthorized: false` in any options object — covers
  # axios, got, node-fetch, request (legacy), superagent, etc. Notable
  # rather than suspicious because it's widespread in dev tooling and
  # internal scripts; the library-specific traits below escalate when
  # combined with single-line bypass shapes typical of malware.
  # `!1` is the minifier-emitted form of `false` (esbuild/terser/rollup), so
  # the bypass stays visible in shipped bundles, which is how most npm
  # packages are published.
- id: reject-unauthorized-false-generic
  desc: Disables TLS verification via rejectUnauthorized
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '\brejectUnauthorized\s*:\s*(false|!1)\b'
  unless:
  - type: basename
    regex: '(^|[-_.])(test|spec)\.[cm]?[jt]sx?$'
  - id: metadata/package/testing/

- id: reject-unauthorized-false-native
  desc: Native embedded source disables TLS checks
  crit: notable
  conf: 0.95
  for: [pe, dll]
  if:
    type: text
    regex: 'headers[\s\S]{0,240}rejectUnauthorized\s*:\s*false'

  # axios specifically: `axios.<method>(url, { httpsAgent: ... })` with
  # bypass config. Keep this even though the generic above catches it,
  # because composite consumers may want the library-specific atom.
- id: axios-https-agent-bypass--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'axios\.(get|post)\s*\([^\n]{0,400}rejectUnauthorized\s*:\s*false'

  # got: `got(url, { https: { rejectUnauthorized: false } })`
  count_max: 1030588
- id: axios-https-agent-bypass--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'axios\.(put|delete)\s*\([^\n]{0,400}rejectUnauthorized\s*:\s*false'

  # got: `got(url, { https: { rejectUnauthorized: false } })`
  count_max: 1030589
- id: axios-https-agent-bypass--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'axios\.(head|patch)\s*\([^\n]{0,400}rejectUnauthorized\s*:\s*false'

  # got: `got(url, { https: { rejectUnauthorized: false } })`
  count_max: 1030590
- id: axios-https-agent-bypass--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'axios\.(request)\s*\([^\n]{0,400}rejectUnauthorized\s*:\s*false'

  # got: `got(url, { https: { rejectUnauthorized: false } })`
  count_max: 1030591
- id: got-rejectunauthorized-false
  desc: got TLS bypass via https option
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'got\s*\([^\n]{0,400}https\s*:\s*\{[^}\n]{0,200}rejectUnauthorized\s*:\s*false'

  # node-fetch + custom Agent (less common but valid). The bypass intent comes
  # from the TLS-verification-disabling legs (rejectUnauthorized:false), NOT
  # from the mere presence of the node-fetch library or its default User-Agent
  # string ("node-fetch/1.0 (+https://github.com/bitinn/node-fetch)"), which
  # ships in countless benign bundles. --rx-7 only marks node-fetch presence.
- id: node-fetch-agent-bypass--rx-6
  desc: node-fetch passed a custom https.Agent
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'node-fetch[\s\S]{0,200}new\s+https?\.Agent|new\s+https?\.Agent[\s\S]{0,200}node-fetch'
  count_max: 1030594
- id: node-fetch-agent-bypass--rx-7
  desc: node-fetch library marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: node-fetch
  count_max: 1030595
- id: check-server-identity-bypass--rx-8
  desc: checkServerIdentity callback marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: checkServerIdentity
  count_max: 1030596
- id: check-server-identity-arrow-empty
  desc: checkServerIdentity arrow returns empty
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'checkServerIdentity\s*[:=]\s*\(.{0,80}\)\s*=>\s*(undefined|null|void\s+0)\b'
  unless:
  - id: well-known/lib/mongodb::mongodb-tls-option-parser
  - id: well-known/lib/mongodb/
  - id: metadata/lang/scripted::dts-declaration-file
  - id: well-known/app/opensearch::security-dashboards-plugin-path
  - id: well-known/app/lightdash::lightdash-redshift-tls-context
  - id: well-known/app/cloudflare::source-map-containers-client-path
- id: check-server-identity-return-empty
  desc: checkServerIdentity returns empty
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'checkServerIdentity\s*[:=]\s*function[^}]{0,180}\breturn\s+(undefined|null|void\s+0)\s*;'
  unless:
  - id: well-known/lib/mysql2::mysql2-tls-connection
  - id: metadata/lang/scripted::dts-declaration-file
  - id: well-known/app/opensearch::security-dashboards-plugin-path
composite_rules:
- id: js-tls-validation-bypass
  desc: JS TLS validation disabled (any form)
  crit: suspicious
  conf: 0.93
  any:
  - id: electron-ignore-certificate-errors
  - id: https-agent-reject-unauthorized
  - id: axios-https-agent-bypass
  - id: got-rejectunauthorized-false
  - id: node-fetch-agent-bypass
  - id: check-server-identity-bypass
  unless:
  - id: well-known/app/mastergo::mastergo-application-context
  - id: well-known/app/codewhale::codewhale-application-context

  # SNI/host-decouple: tls.connect specifies a `servername` while
  # connecting to a different destination — same intent as the Python
  # manual-socket-wrap composite. Pair with hardcoded IP for hostile.
- id: js-tls-sni-host-decouple
  desc: TLS SNI decoupled from destination
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/tls::tls-connect-servername
  - id: micro-behaviors/communications/ip/literal::external-ipv4-script
  downgrade:
    any:
    - id: metadata/package/testing/harness/runtime/
    - id: metadata/package/testing/presence/harness/

  # TLS bypass + hardcoded IP target — JS equivalent of the Python
  # tls-bypass-ip-target hostile composite.
- id: js-tls-bypass-ip-target
  desc: TLS validation off with hardcoded IP target
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/communications/ip/literal::external-ipv4-script
  any:
  - id: js-tls-validation-bypass
  - id: micro-behaviors/communications/socket/ssl::node-tls-verification-env-disable
  downgrade:
    any:
    - id: metadata/package/testing/harness/runtime/
    - id: metadata/package/testing/presence/harness/
- id: axios-https-agent-bypass
  desc: axios using TLS-bypass httpsAgent
  crit: suspicious
  conf: 0.94
  any:
  - id: axios-https-agent-bypass--rx-1
  - id: axios-https-agent-bypass--rx-2
  - id: axios-https-agent-bypass--rx-3
  - id: axios-https-agent-bypass--rx-4
- id: node-fetch-agent-bypass
  desc: node-fetch with TLS-bypass agent
  crit: suspicious
  conf: 0.92
  # node-fetch presence (--rx-7) is required but never sufficient: must be
  # paired with genuine TLS-verification-disabling evidence (rejectUnauthorized
  # :false, or a custom https.Agent co-located with node-fetch). This rejects
  # the benign node-fetch default User-Agent string and library-presence FPs.
  all:
  - id: node-fetch-agent-bypass--rx-7
  any:
  - id: objectives/evasion/security-bypass/tls::reject-unauthorized-false-generic
  - id: node-fetch-agent-bypass--rx-6
  unless:
  - id: metadata/library/github-actions/
  - id: metadata/package/files/dependency::node-modules-path
  - id: well-known/tool/development/socket-cli::socket-dev-cli-bundle
  - id: well-known/tool/development/socket-cli::socket-dev-cli-vendored-path
- id: check-server-identity-bypass
  desc: checkServerIdentity callback disables TLS hostname validation
  crit: suspicious
  conf: 0.92
  near_bytes: 512
  all:
  - id: check-server-identity-bypass--rx-8
  any:
  - id: check-server-identity-arrow-empty
  - id: check-server-identity-return-empty
  unless:
  - id: metadata/library/data::postgresql-libpq-tls-client
  - id: metadata/package/testing/
  - id: metadata/library/structure/
  - id: metadata/package/files/dependency::node-modules-path
  - id: well-known/lib/mongodb/
  - id: well-known/app/opensearch::security-dashboards-plugin-path
  - id: well-known/app/cloudflare::source-map-containers-client-path
  - id: well-known/app/lightdash::lightdash-redshift-tls-context
