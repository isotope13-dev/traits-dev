defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: node-tls-reject-disabled
    desc: Node.js TLS certificate verification disabled
    crit: suspicious
    conf: 0.95
    attack: T1553.004
    if:
      type: text
      regex: NODE_TLS_REJECT_UNAUTHORIZED['"]?\]\s*=\s*['"]0['"]
    unless:
      - type: basename
        regex: '(^|[-_.])(test|spec)\.[cm]?[jt]sx?$'
