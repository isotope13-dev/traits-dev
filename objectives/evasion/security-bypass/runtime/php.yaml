defaults:
  platforms: [windows, unix]
  for:
  - php
  mbc: B0032
  attack: T1562.001
traits:
- id: ini-get-disable-functions
  desc: Reads disable_functions setting
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(?i)ini_get\s*\(\s*[''"]disable_functions'
- id: ini-get-open-basedir
  desc: Reads open_basedir setting
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(?i)ini_get\s*\(\s*[''"]open_basedir'
- id: ini-get-safe-mode
  desc: Reads safe_mode setting
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(?i)ini_get\s*\(\s*[''"]safe_mode'
- id: putenv-ld-preload
  desc: Sets LD_PRELOAD environment variable
  crit: suspicious
  conf: 0.95
  attack: T1574.006
  if:
    type: text
    regex: putenv\s*\(['"]LD_PRELOAD
- id: fake-googlebot-detect
  desc: Detects spoofed Googlebot instances
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(?i)Fake GoogleBot detected'
- id: function-exists-exec--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'function_exists\s*\(\s*[''"](exec|system)'
  count_max: 1030465
- id: function-exists-exec--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'function_exists\s*\(\s*[''"](passthru|shell_exec)'
  count_max: 1030466
- id: function-exists-exec--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'function_exists\s*\(\s*[''"](proc_open)'
  count_max: 1030467
- id: wp-role-targeting
  desc: Targets WordPress administrators
  crit: component
  if:
    type: text
    regex: 'current_user_can\s*\(\s*[''"]manage_options[''"]\)'
  unless:
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
- id: wp-is-admin-check
  desc: Checks if in WordPress admin context
  crit: component
  if:
    type: symbol
    exact: is_admin
  unless:
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
composite_rules:
- id: security-restriction-probe
  desc: Reads multiple PHP security restrictions
  crit: component
  conf: 0.8
  needs: 2
  any:
  - id: ini-get-disable-functions
  - id: ini-get-open-basedir
  - id: ini-get-safe-mode
- id: googlebot-interceptor-cloaking
  desc: Intercepts Googlebot and cloaks malicious content
  crit: hostile
  all:
  - id: objectives/anti-analysis/browser-detect::crawler-identification
  - id: micro-behaviors/communications/ip/parse::ip-bitwise-cidr-check
  - id: micro-behaviors/communications/http/download/curl::curl-cmd
- id: disable-functions-bypass
  desc: Attempts to bypass disable_functions
  crit: suspicious
  conf: 0.95
  all:
  - id: putenv-ld-preload
  - id: micro-behaviors/communications/email/send/mail-func::mail-call
- id: wp-malicious-targeting
  desc: Malicious WordPress dashboard targeting
  crit: suspicious
  all:
  - id: wp-role-targeting
  - id: wp-is-admin-check
  any:
  - id: security-restriction-probe
  - id: disable-functions-bypass
  - id: function-exists-exec
  unless:
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
- id: function-exists-exec
  desc: Checks if exec functions exist
  crit: notable
  conf: 1.0
  any:
  - id: function-exists-exec--rx-1
  - id: function-exists-exec--rx-2
  - id: function-exists-exec--rx-3
