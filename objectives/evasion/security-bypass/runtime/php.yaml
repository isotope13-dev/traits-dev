defaults:
  platforms: [windows, unix]
  for:
  - php
  mbc: B0032
  attack: T1562.001
traits:
- id: putenv-ld-preload
  desc: Sets LD_PRELOAD environment variable
  crit: suspicious
  conf: 0.95
  attack: T1574.006
  if:
    type: text
    regex: putenv\s*\(['"]LD_PRELOAD
- id: fake-googlebot-detect
  desc: Detects spoofed Googlebot instances
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(?i)Fake GoogleBot detected'
composite_rules:
- id: security-restriction-probe
  desc: Reads multiple PHP security restrictions
  crit: suspicious
  conf: 0.8
  needs: 2
  any:
  - id: micro-behaviors/os/security/runtime-restrictions
  unless:
  - id: well-known/app/wordpress-plugins::known-wordpress-plugin
  - id: well-known/app/wordpress-plugins::loginwp-plugin-context
  - id: well-known/app/wordpress-plugins::wordpress-plugin-path-loginwp
  - id: well-known/app/wordpress-plugins::wordpress-plugin-path-seraphinite-accelerator
- id: googlebot-interceptor-cloaking
  desc: Intercepts Googlebot and cloaks malicious content
  crit: hostile
  all:
  - id: micro-behaviors/communications/http/user-agent::bot-user-agent-detection
  - id: micro-behaviors/communications/ip/parse::ip-bitwise-cidr-check
  - id: micro-behaviors/communications/http/download/curl::curl-cmd
- id: disable-functions-bypass
  desc: Attempts to bypass disable_functions
  crit: suspicious
  conf: 0.95
  all:
  - id: putenv-ld-preload
  - id: micro-behaviors/communications/email/send/mail-func::mail-call
- id: wp-malicious-targeting
  desc: Malicious WordPress dashboard targeting
  crit: suspicious
  all:
  - id: micro-behaviors/os/security/runtime::wordpress-admin-capability-check
  - id: micro-behaviors/os/security/runtime::wordpress-admin-context-check
  any:
  - id: security-restriction-probe
  - id: disable-functions-bypass
  - id: micro-behaviors/process/create/exec::php-execution-function-availability
  unless:
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  - id: well-known/app/wordpress-plugins::known-wordpress-plugin
  - id: well-known/app/wordpress-plugins::wordpress-plugin-path-seraphinite-accelerator
