# Bulk account-signup abuse: defeating the "one real person, one account"
# control that consumer services rely on.
#
# The shape is a single stored identity profile — real name, bank card, bank
# branch, account, password, withdrawal PIN, phone, email, birthday — held as
# one delimited record and fanned out by index into the registration-form
# selectors of many *different* target sites, then submitted automatically.
# The fan-out is the tell: a password manager or autofill helper fills the
# form in front of it, it does not carry one profile across dozens of unrelated
# site schemas and press submit. Paired with promo/bonus farming this is the
# engine behind multi-accounting fraud.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1656

traits:
  - id: indexed-profile-field-fill-fanout
    desc: Fills many fields from one profile array
    crit: notable
    conf: 0.92
    count_min: 12
    if:
      type: text
      regex: 'querySelector\([^)]{0,80}\),\s*data\[\d'

composite_rules:
  - id: multi-site-signup-profile-autofill
    desc: Bulk signup autofill from identity profile
    crit: hostile
    conf: 0.95
    for: [javascript, chrome-manifest, crx, xpi]
    scope: archive
    all:
      - id: indexed-profile-field-fill-fanout
      - id: micro-behaviors/ui/window/form-input::browser-submit-button-click
      - id: micro-behaviors/os/security/webextension::broad-scripting-host-authority
