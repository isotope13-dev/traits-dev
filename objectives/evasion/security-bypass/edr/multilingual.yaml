# Non-English AV/EDR-evasion slang. 免杀 ("avoid killing") is the Chinese scene
# term for making a payload undetected by antivirus — a FUD/crypter marker that
# is essentially exclusive to offensive tooling and underground services.
defaults:
  platforms: [unix, windows, android]
  for: [scripts, source, binaries, documents]
  crit: notable
  conf: 0.85
  attack: T1027
traits:
  - id: cn-av-evasion-term
    desc: Chinese AV-evasion/FUD slang (免杀)
    if:
      type: text
      substr: 免杀
