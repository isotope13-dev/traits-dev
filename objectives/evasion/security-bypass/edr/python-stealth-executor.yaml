defaults:
  for: [python]
  platforms: [linux]
  crit: component
  conf: 0.9
  size_max: 300000

traits:
  - id: stealth-executor-class
    desc: Python stealth executor class
    if:
      type: text
      exact: "class StealthExecutor:"

  - id: stealth-config-use-memfd
    desc: Stealth config enables memfd
    if:
      type: text
      exact: "use_memfd: bool = True"

  - id: stealth-config-process-masquerade
    desc: Stealth config enables masquerade
    if:
      type: text
      exact: "use_process_masquerade: bool = True"

  - id: stealth-config-evade-logging
    desc: Stealth config enables log evasion
    if:
      type: text
      exact: "evade_logging: bool = True"

  - id: edr-siem-evasion-claim
    desc: Claims EDR SIEM evasion
    crit: suspicious
    conf: 0.95
    attack: T1562
    if:
      type: text
      regex: '(?i)evade\s+SIEM[\s\S]{0,120}\bEDR\b|\bEDR\b[\s\S]{0,120}security monitoring'

  - id: command-obfuscator-class
    desc: Command obfuscator class
    if:
      type: text
      exact: "class CommandObfuscator:"

  - id: shell-base64-decoder-wrapper
    desc: Base64 shell decoder wrapper
    if:
      type: text
      exact: "base64 -d | sh"

  - id: stealth-history-env-sanitizer
    desc: Sanitizes shell history environment
    if:
      type: text
      regex: "clean_env\\['HISTFILE'\\]\\s*=\\s*'/dev/null'[\\s\\S]{0,160}clean_env\\['HISTSIZE'\\]\\s*=\\s*'0'"

  - id: stealth-shell-history-prelude
    desc: Shell prelude unsets history
    crit: suspicious
    conf: 0.9
    attack: T1070.003
    platforms: [linux, macos]
    if:
      type: text
      exact: "unset HISTFILE HISTSIZE HISTFILESIZE SAVEHIST PROMPT_COMMAND"

  - id: stealth-shell-histfile-devnull
    desc: Shell prelude redirects history
    crit: suspicious
    conf: 0.9
    attack: T1070.003
    platforms: [linux, macos]
    if:
      type: text
      exact: "export HISTFILE=/dev/null"

  - id: memfd-executor-class
    desc: Python memfd executor class
    if:
      type: text
      exact: "class MemfdExecutor:"

  - id: python-libc-memfd-create
    desc: Python libc memfd_create call
    crit: suspicious
    conf: 0.92
    attack: T1620
    if:
      type: text
      regex: 'libc\.memfd_create\s*\('

  - id: memfd-procfd-subprocess-exec
    desc: Executes memfd through procfd
    crit: suspicious
    conf: 0.95
    attack: T1620
    if:
      type: text
      regex: '/proc/self/fd/\{fd\}[\s\S]{0,400}subprocess\.run'

  - id: process-masquerader-class
    desc: Process masquerader class
    if:
      type: text
      exact: "class ProcessMasquerader:"

  - id: python-prctl-set-name
    desc: Python prctl process rename
    crit: suspicious
    conf: 0.92
    attack: T1036
    if:
      type: text
      regex: 'libc\.prctl\s*\(\s*PR_SET_NAME'

  # Absolute sshd path alone is common when starting the real daemon (CI VM
  # bootstrap, ansible, etc.). Standalone suspicious atom uses names rarely
  # seen outside process-rename disguise lists; the hostile composite may also
  # use micro-behaviors/os/service/remote::sshd-path as a target-name leg.
  - id: system-process-masquerade-list
    desc: Windows or kernel process masquerade names
    crit: suspicious
    conf: 0.9
    attack: T1036
    if:
      type: text
      regex: 'svchost\.exe|lsass\.exe|\[kworker/0:0\]'
    unless:
      - id: well-known/tool/offensive/sic-security/
      - id: well-known/app/openssh/
      - type: text
        substr: threat_hunting_assistant
      - id: metadata/file/profile/identity::ansible-python-package-path
      - type: text
        substr: SYSTEM_CRITICAL_NAMES

      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: anti-forensics-class
    desc: Anti-forensics helper class
    if:
      type: text
      exact: "class AntiForensics:"

  - id: secure-delete-overwrite-remove
    desc: Overwrites then removes files
    crit: suspicious
    conf: 0.9
    attack: T1070.004
    if:
      type: text
      regex: 'os\.urandom\s*\(\s*size\s*\)[\s\S]{0,220}os\.remove\s*\(\s*path\s*\)'

  - id: cleanup-script-clears-history-temp-cache
    desc: Cleanup script clears history
    crit: suspicious
    conf: 0.95
    attack: T1070
    platforms: [linux, macos]
    if:
      type: text
      exact: "history -c"

  - id: cleanup-script-removes-shell-history
    desc: Cleanup script removes histories
    crit: suspicious
    conf: 0.95
    attack: T1070.003
    platforms: [linux, macos]
    if:
      type: text
      exact: "rm -f ~/.bash_history ~/.zsh_history"

  - id: cleanup-script-removes-temp-files
    desc: Cleanup script removes temp files
    crit: suspicious
    conf: 0.9
    attack: T1070.004
    platforms: [linux, macos]
    if:
      type: text
      exact: "rm -rf /tmp/tmp.* /var/tmp/tmp.*"

  - id: cleanup-script-removes-user-cache
    desc: Cleanup script removes user cache
    crit: suspicious
    conf: 0.9
    attack: T1070.004
    platforms: [linux, macos]
    if:
      type: text
      exact: "rm -rf ~/.cache/*"

composite_rules:
  - id: stealth-config-evasion-defaults
    desc: Stealth defaults enable multiple evasions
    crit: suspicious
    conf: 0.95
    attack: T1562
    scope: leaf
    near_bytes: 1200
    all:
      - id: stealth-config-use-memfd
      - id: stealth-config-process-masquerade
      - id: stealth-config-evade-logging

  - id: stealth-shell-history-prelude-chain
    desc: Shell prelude disables command history
    crit: suspicious
    conf: 0.95
    attack: T1070.003
    platforms: [linux, macos]
    scope: leaf
    near_bytes: 240
    all:
      - id: stealth-shell-history-prelude
      - id: stealth-shell-histfile-devnull

  - id: cleanup-script-clears-history-temp-cache-chain
    desc: Cleanup script clears host artifacts
    crit: suspicious
    conf: 0.97
    attack: T1070
    platforms: [linux, macos]
    scope: leaf
    near_bytes: 1200
    all:
      - id: cleanup-script-clears-history-temp-cache
      - id: cleanup-script-removes-shell-history
      - id: cleanup-script-removes-temp-files
      - id: cleanup-script-removes-user-cache

  - id: python-stealth-executor-suite
    desc: Python command executor with multiple EDR evasion features
    crit: hostile
    conf: 0.99
    attack: T1562
    scope: leaf
    near_bytes: 65536
    all:
      - id: stealth-executor-class
      - id: edr-siem-evasion-claim
    needs: 2
    any:
      - id: stealth-config-evasion-defaults
      - id: command-obfuscator-class
      - id: memfd-executor-class

  - id: python-memfd-stealth-shell-executor
    desc: Python stealth shell executes through memfd
    crit: hostile
    conf: 0.99
    attack: T1620
    scope: leaf
    near_bytes: 65536
    all:
      - id: stealth-executor-class
      - id: memfd-executor-class
      - id: python-libc-memfd-create
      - id: memfd-procfd-subprocess-exec
      - id: stealth-history-env-sanitizer

  - id: process-masquerade-target-name
    desc: Process masquerade target name present
    crit: component
    any:
      - id: system-process-masquerade-list
      - id: micro-behaviors/os/service/remote::sshd-path

  - id: python-process-masquerading-stealth-executor
    desc: Python stealth shell masquerades as system process
    crit: hostile
    conf: 0.98
    attack: T1036
    scope: leaf
    near_bytes: 65536
    all:
      - id: stealth-executor-class
      - id: process-masquerader-class
      - id: python-prctl-set-name
      - id: process-masquerade-target-name
    any:
      - id: stealth-history-env-sanitizer
      - id: command-obfuscator-class

  - id: python-antiforensics-stealth-executor
    desc: Python stealth executor includes anti-forensics cleanup
    crit: hostile
    conf: 0.98
    attack: T1070
    scope: leaf
    near_bytes: 65536
    all:
      - id: stealth-executor-class
      - id: anti-forensics-class
      - id: secure-delete-overwrite-remove
      - id: cleanup-script-clears-history-temp-cache-chain
    any:
      - id: stealth-shell-history-prelude-chain
      - id: stealth-history-env-sanitizer

  - id: python-obfuscated-stealth-command-executor
    desc: Python stealth executor obfuscates shell commands
    crit: hostile
    conf: 0.97
    attack: T1027
    scope: leaf
    near_bytes: 65536
    all:
      - id: stealth-executor-class
      - id: command-obfuscator-class
      - id: shell-base64-decoder-wrapper
      - id: stealth-shell-history-prelude-chain
    any:
      - id: edr-siem-evasion-claim
      - id: stealth-config-evasion-defaults
