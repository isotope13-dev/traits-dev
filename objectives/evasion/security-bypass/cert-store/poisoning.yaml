# Certificate-store poisoning detection for PE binaries
# Detects the combination of cert-self-signing + cert-store-manipulation
# APIs that indicate a binary can plant rogue CAs or forge Authenticode chains.
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.95
traits:
  - id: cert-create-self-sign
    desc: Runtime self-signed certificate generation API
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: CertCreateSelfSignCertificate
  - id: crypt-msg-decode
    desc: Parse PKCS#7 messages via CryptoAPI
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: CryptMsgOpenToDecode
  - id: cert-unregister-physical-store
    desc: Unregister physical cert store via API
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: CertUnregisterPhysicalStore
composite_rules:
  - id: cert-store-poisoning
    desc: Certificate-store poisoning capability
    crit: hostile
    conf: 0.95
    mbc: E1027
    attack: T1556.004
    all:
      - id: cert-create-self-sign
      - id: micro-behaviors/crypto/certificate/install::cert-add-to-store
    any:
      - id: micro-behaviors/crypto/library/encoding::crypt-string-to-binary-w
      - id: crypt-msg-decode
      - id: cert-unregister-physical-store
    needs: 2
    unless:
      - id: metadata/signed/certificate/identity::pe-signature-verified
      - id: metadata/binary/vendor::windows-system-implementer-dll
  - id: cert-store-manipulation-surface
    desc: Aggressive cert-store manipulation API surface
    crit: hostile
    conf: 0.92
    mbc: E1027
    attack: T1556.004
    all:
      - id: cert-create-self-sign
      - id: micro-behaviors/crypto/certificate/install::cert-add-to-store
      - id: cert-unregister-physical-store
    any:
      - id: micro-behaviors/crypto/library/encoding::crypt-string-to-binary-w
      - id: crypt-msg-decode
    needs: 2
    unless:
      - id: metadata/signed/certificate/identity::pe-signature-verified
      - id: metadata/binary/vendor::windows-system-implementer-dll
