# Malicious File System Patterns
# Detects patterns of file creation followed by execution
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  # === Temp directory atomic indicators ===
  - id: tempfile-ref
    desc: "Reference to tempfile module"
    crit: baseline
    conf: 0.7
    if:
      type: string
      substr: "tempfile"
  - id: environ-tmp
    desc: "Reference to TMP environment variable"
    crit: baseline
    conf: 0.7
    if:
      type: string
      regex: 'environ\[[''"]TMP'
composite_rules:
  # Temp directory reference composite
  # NOTE: "tmp" string is too generic - appears in Go runtime and many
  # legitimate programs. Downgraded to baseline.
  - id: temp-dir-reference
    desc: "Reference to a temporary directory"
    crit: baseline
    conf: 0.4
    any:
      - id: micro-behaviors/data/text/keywords::tmp
      - id: tempfile-ref
      - id: environ-tmp
  - id: execute-temp-file
    desc: "Creates and executes a file"
    crit: suspicious
    conf: 0.95
    near_lines: 50
    all:
      - id: objectives/execution/remote-command/protocol::generic-dup
      - id: micro-behaviors/process/create/subprocess::run-content
      - id: temp-dir-reference
