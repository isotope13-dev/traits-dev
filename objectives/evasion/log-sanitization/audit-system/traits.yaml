# Audit System Blinding and Sanitization
# Detects interception and removal of Linux audit records
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [c, elf]
traits:
  # === Audit System Functions ===
  - id: audit-log-start
    desc: audit_log_start kernel function
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: "audit_log_start"
  - id: netlink-unicast
    desc: netlink_unicast kernel function
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: "netlink_unicast"
  - id: netlink-audit-constant
    desc: NETLINK_AUDIT constant
    crit: notable
    conf: 0.75
    if:
      type: string
      substr: "NETLINK_AUDIT"
  # === Audit Log Field Patterns ===
  - id: pid-equals
    desc: "pid= audit log field"
    crit: notable
    conf: 0.6
    if:
      type: string
      exact: "pid="
  - id: ino-equals
    desc: "ino= audit log field"
    crit: notable
    conf: 0.6
    if:
      type: string
      exact: "ino="
composite_rules:
  - id: audit-functions
    desc: Audit system functions
    any:
      - {id: audit-log-start}
      - {id: netlink-unicast}
      - {id: netlink-audit-constant}
    crit: notable
  - id: audit-fields
    desc: Audit log field patterns
    any:
      - {id: pid-equals}
      - {id: ino-equals}
    crit: notable
  - id: audit-blinding
    desc: Intercepts and drops Linux Auditing
    crit: suspicious
    conf: 0.95
    attack: "T1562.001"
    all:
      - {id: audit-functions}
      - {id: audit-fields}
