# Log Clearing Detection - Windows
# MBC: F0005 (Indicator Blocking)
# ATT&CK: T1070.001
defaults:
  attack: T1070.001
  mbc: F0005
  platforms: [linux, unix, macos, android, ios, windows]
  for: [shell, powershell, batch]
traits:
  # === Log clear atomic indicators ===
  - id: wevtutil-cl
    desc: wevtutil cl command
    crit: notable
    conf: 0.56
    if:
      type: string_value
      regex: "wevtutil\\s+cl"
  - id: clear-eventlog
    desc: Clear-EventLog cmdlet
    crit: notable
    conf: 0.56
    if:
      type: string_value
      substr: "Clear-EventLog"
composite_rules:
  # Log clear composite
  - id: log-clear-windows
    desc: Clear Windows event logs
    crit: suspicious
    conf: 0.66
    any:
      - id: wevtutil-cl
      - id: clear-eventlog
