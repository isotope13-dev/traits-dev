# The repository explicitly wraps offensive AI-agent playbooks in an AES-256
# archive with a public password so AV/EDR/browser content heuristics do not
# inspect the plaintext.  The individual markers are useful context; the
# hostile conclusion requires the repository identity and offensive corpus.
defaults:
  platforms: [unix, windows]
  for: [markdown, html, javascript, json, github-actions, text]
  attack: T1027.013,T1195.002

traits:
  - id: public-aes-password-archive
    desc: Public-password AES archive
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '(?i)AES[- ]?256.{0,120}public.{0,30}password'

  - id: content-heuristic-bypass
    desc: Bypasses content heuristics
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: '(?i)bypass.{0,40}content.{0,20}heuristic'

  - id: av-scanner-reference
    desc: AV or EDR content scanner reference
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?i)(AV|EDR).{0,100}(content|browser).{0,40}scanner'

  - id: offensive-agent-skill-corpus
    desc: Offensive security playbooks for AI agents
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?is)offensive-security (skills|playbooks).{0,140}\bAI agents?\b'

  - id: skill-archive-download
    desc: Downloads the skill archive
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?i)(curl|wget)\b.{0,160}hack-skills\.zip'

  - id: skill-archive-password-extraction
    desc: Extracts the archive with its password
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?i)(7z|unzip)\b.{0,80}hack-skills'

composite_rules:
  - id: hack-skills-content-heuristic-bypass
    desc: Offensive skill archive bypasses AV content scanning
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: well-known/app/yaklang-hack-skills::yaklang-hack-skills-docs
      - id: public-aes-password-archive
      - id: content-heuristic-bypass
      - id: av-scanner-reference
      - id: offensive-agent-skill-corpus
