# Go uTLS TLS Fingerprint Spoofing
# Detects use of github.com/refraction-networking/utls, a Go library that
# impersonates browser TLS ClientHello fingerprints to evade network detection.
# Used by proxies, censorship-circumvention tools, and malware to avoid
# fingerprinting by IDS/NGFW/threat intelligence systems.
# ATT&CK: T1071.001 (Application Layer Protocol: Web Protocols)
defaults:
  platforms: [linux, unix, android, windows, macos, ios]
  for: [elf, pe, macho, dll]
  attack: "T1071.001"
traits:
  - id: utls-import
    desc: uTLS fingerprint-spoofing library import
    crit: suspicious
    conf: 0.95
    if:
      type: string
      substr: "github.com/refraction-networking/utls"
  - id: utls-conn-state
    desc: uTLS internal connection state type
    crit: component
    conf: 0.85
    if:
      type: string
      substr: "utlsConnExtraFields"
  - id: utls-build-error
    desc: uTLS ClientHello build error message
    crit: component
    conf: 0.9
    if:
      type: string
      substr: "client hello has already been built by utls"
  - id: utls-handshake-type
    desc: uTLS internal handshake message type
    crit: component
    conf: 0.8
    if:
      type: string
      substr: "utlsHandshakeMessageType"
composite_rules:
  - id: go-utls-fingerprint-spoofing
    desc: Go binary uses uTLS for TLS fingerprint evasion
    crit: suspicious
    conf: 0.95
    attack: "T1071.001"
    any:
      - id: utls-import
      - id: utls-conn-state
      - id: utls-build-error
      - id: utls-handshake-type
    needs: 2
