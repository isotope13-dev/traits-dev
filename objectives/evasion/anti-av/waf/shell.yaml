defaults:
  platforms: [unix, windows]
  for: [shell]

traits:
  - id: waf-bypass-header-spoofing
    desc: Web application firewall bypass header spoofing
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'X-WAF-Bypass|\b(curl|wget)\b[^\n]{0,120}\b(X-Forwarded-For|CF-Connecting-IP)\b'
      case_insensitive: true

  - id: tor-circuit-rotation-command
    desc: Tor circuit rotation command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'SIGNAL\s+NEWNYM|TOR_CIRCUITS'
      case_insensitive: true

composite_rules:
  - id: waf-evasion-through-tor-rotation
    desc: WAF evasion with rotating Tor circuits
    crit: hostile
    conf: 0.98
    all:
      - id: waf-bypass-header-spoofing
      - id: tor-circuit-rotation-command
      - id: micro-behaviors/communications/proxy/socks::shell-socks5-proxy-variable
