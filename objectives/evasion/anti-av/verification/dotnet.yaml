defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1562.001
traits:
  - id: skip-verification
    desc: ".NET SecurityPermission SkipVerification req"
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: SkipVerification
    unless:
      - type: text
        substr: System.Security.Permissions.SecurityPermissionAttribute,
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::mscorlib
        - id: metadata/library/data::aws-sdk-dotnet-core
  - id: disable-defender-version-comments
    desc: Version comments disable Defender
    crit: suspicious
    conf: 0.99
    for: [pe]
    if:
      type: value
      path: pe.version.comments
      exact: Disable defender and antivirus softwares
