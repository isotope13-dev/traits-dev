defaults:
  platforms:
    - windows
    - unix
    - macos
  for: [source, scripts, binaries]
traits:
  - id: resident-virii
    desc: Resident virus terminology
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: (?i)resident vir(us|ii|i)
  - id: virus-library-comment
    desc: Virus library usage comment
    crit: suspicious
    conf: 0.90
    if:
      type: raw
      regex: (?i)include it in a virus
  - id: anti-anti-tunneling
    desc: Anti-anti-tunneling technique comment
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: anti-tunneling
composite_rules:
  - id: int21h-tunneler-source
    desc: DOS INT 21h tunneler source code
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/msdos/interrupt::list-of-lists
      - id: micro-behaviors/os/msdos/interrupt::tunneler-keyword
    any:
      - id: micro-behaviors/os/msdos/interrupt::trap-flag-hide
      - id: micro-behaviors/os/msdos/interrupt::tunneled-int21-result
      - id: micro-behaviors/os/msdos/interrupt::mcb-boundary-var
  - id: opcode-disasm-engine
    desc: x86 opcode disassembly engine source
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/os/msdos/interrupt::x86-opcode-table
    any:
      - id: micro-behaviors/os/msdos/interrupt::tunneler-keyword
      - id: micro-behaviors/os/msdos/interrupt::trap-flag-hide
