# EICAR antivirus-test-string manipulation. The standard EICAR string is
# detected by every AV; malware authors and PoCs embed it reversed (or
# otherwise mangled) so their dev files don't trip AV during testing. A
# reversed/mangled EICAR is a generic evasion-testing marker, not specific to
# any one family.
defaults:
  platforms: [windows, unix]
  for: [pe, c, cpp, scripts, binaries]
  size_min: 64
  size_max: 50000000
traits:
  - id: reversed-eicar-string
    desc: Reversed EICAR antivirus test string
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'ELIF-TSET-SURIVITNA-DRADNATS-RACIE'
