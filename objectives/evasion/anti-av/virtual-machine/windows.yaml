defaults:
  platforms: [windows]
  for: [batch, powershell]
  attack: T1562
traits:
  - id: qemu-portable-path
    desc: Portable QEMU launch path
    crit: component
    if:
      type: text
      regex: (?i)(ProgramData|Users\\Public|Temp)\\[A-Za-z0-9_.-]{1,48}\\[A-Za-z0-9_.-]{2,24}(\.exe)?
composite_rules:
  - id: qemu-hidden-display
    desc: Hidden VM display suppression
    crit: component
    any:
      - id: objectives/command-and-control/backdoor/control/vm::qemu-headless-args
      - id: objectives/command-and-control/backdoor/control/vm::qemu-display-none-flag
  - id: qemu-sidecar-network
    desc: Sidecar VM network attachment
    crit: component
    any:
      - id: objectives/command-and-control/backdoor/control/vm::qemu-sidecar-networking
      - id: micro-behaviors/os/virtualization/hypervisor::hostfwd-guest-forward
  - id: qemu-sidecar-storage
    desc: Sidecar VM guest disk
    crit: component
    any:
      - id: objectives/command-and-control/backdoor/control/vm::qemu-sidecar-disk
      - id: objectives/command-and-control/backdoor/control/vm::qemu-hda-image
  - id: portable-headless-qemu-vm
    desc: Portable headless QEMU virtual machine
    crit: suspicious
    conf: 0.92
    all:
      - id: qemu-hidden-display
      - id: qemu-sidecar-storage
    any:
      - id: objectives/command-and-control/backdoor/control/vm::qemu-system-binary
      - id: qemu-portable-path
  - id: portable-vm-edr-evasion
    desc: Portable headless VM for EDR evasion
    crit: hostile
    conf: 0.95
    all:
      - id: portable-headless-qemu-vm
      - id: qemu-sidecar-network
    any:
      - id: objectives/command-and-control/backdoor/control/vm::qemu-cpu-max-flag
      - id: micro-behaviors/os/virtualization/hypervisor::hostfwd-guest-forward
