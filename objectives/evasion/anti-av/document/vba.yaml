defaults:
  for: [vbs]
  platforms: [windows]
  crit: suspicious
  attack: "T1562.001"
  conf: 0.92
traits:
  - id: vba-disable-macro-security
    desc: VBA disables macro security settings
    conf: 0.96
    if:
      type: text
      regex: '(?i)(AccessVBOM|VBAWarnings)\s*=\s*[0-9]'
  - id: vba-trust-access-setting
    desc: VBA Trust Access to VBA project
    conf: 0.95
    if:
      type: text
      regex: '(?i)AccessVBOM\s*=\s*1'
  - id: vba-disable-protected-view
    desc: VBA disables Protected View
    conf: 0.95
    if:
      type: text
      regex: '(?i)DisableAttachments(InPV|OpenFromNetwork|Protection)\s*=\s*[0-9]'
composite_rules:
  - id: vba-security-bypass
    desc: VBA macro security bypass attempt
    crit: hostile
    conf: 0.98
    any:
      - id: vba-trust-access-setting
      - id: vba-disable-protected-view
