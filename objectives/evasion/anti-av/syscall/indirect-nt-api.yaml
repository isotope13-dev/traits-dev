# Indirect NT API Self-Injection
# Detects the pattern of passing NtCurrentProcess handle (0xFFFFFFFFFFFFFFFF / -1) to
# dynamically-resolved NT API functions for self-process memory manipulation
# ATT&CK: T1055.012 (Process Injection: Process Hollowing)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1055.012"
  mbc: "F0004"
traits:
composite_rules:
  - id: recognized-indirect-nt-api-marker
    desc: Recognized indirect NT API marker
    crit: notable
    conf: 0.85
    any:
      - id: well-known/tool/browser::chromium-helper
      - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
      - id: metadata/binary/vendor::microsoft-corp-marker-rdata
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiled::go-runtime-marker
      - id: micro-behaviors/os/event/library/tokio::tokio-crate-path
      - id: micro-behaviors/data/db/postgresql::rust-sqlx-postgres-client
  - id: indirect-nt-api-self-injection
    desc: "Self-process injection via indirect NT API calls"
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/os/syscall/invoke::all-ones-handle-constant
      - id: micro-behaviors/os/syscall/invoke::ntdll-import
    any:
      # A generic ntdll import and a handle-shaped constant are common in
      # compiled runtimes. Require an actual NT memory primitive before
      # describing self-injection.
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-a
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-b
      - id: objectives/evasion/fileless/memory::alloc-memory-sym
      - id: objectives/evasion/fileless/memory::write-memory-sym
      - id: objectives/evasion/fileless/memory::protect-memory-sym
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
      - id: micro-behaviors/os/event/library/tokio::tokio-crate-path
      - id: micro-behaviors/data/db/postgresql/
  - id: concealed-endpoint-self-injection-loader
    desc: Concealed payload with hardcoded endpoint and self-process injection
    crit: hostile
    conf: 0.97
    attack: T1027,T1055.012,T1071
    all:
      - id: indirect-nt-api-self-injection
      - id: objectives/command-and-control/infrastructure/ip-port::external-ipv4-port-rdata-large
      - id: metadata/file/metrics::low-entropy-binary-with-dense-region
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::low-entropy-overlay-inflation
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
