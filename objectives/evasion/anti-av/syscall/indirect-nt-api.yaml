# Indirect NT API Self-Injection
# Detects the pattern of passing NtCurrentProcess handle (0xFFFFFFFFFFFFFFFF / -1) to
# dynamically-resolved NT API functions for self-process memory manipulation
# ATT&CK: T1055.012 (Process Injection: Process Hollowing)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1055.012"
  mbc: "F0004"
traits:
  - id: nt-current-process-handle
    desc: "NtCurrentProcess handle (-1) for NT API call"
    crit: component
    conf: 0.8
    arch: [x86-64]
    count_min: 2
    if:
      type: hex
      section: ".text"
      pattern: "48 C7 C1 FF FF FF FF"
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab
composite_rules:
  - id: benign-indirect-nt-api-context
    desc: Benign indirect NT API context
    crit: component
    conf: 0.85
    any:
      - id: well-known/tool/browser::chromium-helper
      - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
      - id: metadata/binary/vendor::microsoft-corp-marker-rdata
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiled::go-runtime-marker
      - id: micro-behaviors/os/event/library/tokio::tokio-crate-path
      - id: micro-behaviors/data/db/conn/postgresql::rust-sqlx-postgres-client
  - id: indirect-nt-api-self-injection
    desc: "Self-process injection via indirect NT API calls"
    crit: suspicious
    conf: 0.88
    all:
      - id: nt-current-process-handle
      - id: micro-behaviors/os/syscall/invoke::ntdll-import
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/evasion/fileless/memory::alloc-memory-sym
    unless:
      - id: micro-behaviors/os/event/library/tokio::tokio-crate-path
      - id: micro-behaviors/data/db/conn/postgresql::rust-sqlx-postgres-client
    downgrade:
      any:
        - id: benign-indirect-nt-api-context
