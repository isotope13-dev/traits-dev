defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1562.001
  mbc: F0004
composite_rules:
- id: indirect-syscall-gate
  desc: Indirect syscall via stub validation
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/os/syscall/raw::ssn-stub-validation
  any:
  - id: micro-behaviors/os/syscall/raw::syscall-ret-gadget
  - id: objectives/evasion/anti-av/syscall::syscall-x64-instruction
  - id: micro-behaviors/os/syscall/raw::mov-eax-syscall
  unless:
  - id: metadata/binary/framework::bsjb-marker
  downgrade:
    any:
    - id: well-known/tool/browser::chromium-helper
    - id: metadata/binary/resource::kernel-driver-init
    - id: metadata/binary/resource::kernel-driver-idata
    - id: micro-behaviors/os/syscall/raw::direct-syscall-pattern-cond-0--inline-7330
    - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
