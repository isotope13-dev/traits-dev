defaults:
  for: [pe, dll]
  platforms: [windows]

composite_rules:
  - id: anti-debug-persistence-dropper
    desc: Anti-debugging ntdll activity paired with Run-key persistence
    crit: hostile
    conf: 0.99
    attack: T1497,T1547.001,T1562.001
    all:
      - id: ntdll-privilege-delay-handle-cluster
      - id: objectives/anti-analysis/timing/evasion::nt-delay-with-debug-check
      - id: objectives/persistence/login/registry/autostart::run-key
      - id: micro-behaviors/process/create/spawn::create-process-w
  - id: ntdll-privilege-delay-handle-cluster
    desc: Direct ntdll privilege delay handle APIs
    crit: suspicious
    conf: 0.93
    attack: T1562.001
    all:
      - id: micro-behaviors/os/syscall/invoke::ntdll-import
      - id: micro-behaviors/os/privilege/token::rtl-adjust-privilege
      - id: micro-behaviors/time/timing/delay::nt-delay-execution
      - id: micro-behaviors/process/inject/handle::nt-close
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/binary/metrics/threshold::many-exports-100
