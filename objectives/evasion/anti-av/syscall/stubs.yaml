defaults:
  platforms:
    - linux
    - macos
    - windows
  attack: T1106
  mbc: B0009
  for: [elf, macho, pe]
traits:
  - id: syscall-x64-instruction
    desc: Direct syscall instruction (x64)
    crit: suspicious
    conf: 0.8
    platforms:
      - linux
      - windows
    for:
      - pe
      - elf
    count_min: 8
    per_kb_min: 0.03
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 0F 05
    unless:
      - id: metadata/binary/framework::dotnet-metadata
  - id: windows-direct-syscall-x64
    desc: Windows direct syscall (mov r10 rcx; syscall)
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    for: [pe, dll]
    arch: [x86-64]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 49 89 CA 0F 05
    unless:
      - id: metadata/binary/linking/runtime::ape-binary-marker
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
      - id: metadata/binary/linking/runtime::cosmopolitan-marker
  - id: int-80-instruction
    desc: Direct int 0x80 syscall (x86)
    crit: suspicious
    conf: 0.85
    platforms:
      - linux
    for:
      - elf
    count_min: 2
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: CD 80
  - id: sysenter-instruction
    desc: Direct sysenter syscall
    crit: suspicious
    conf: 0.8
    platforms:
      - linux
      - windows
    for:
      - pe
      - elf
    count_min: 5
    per_kb_min: 0.03
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 0F 34
  - id: svc-macos-arm64
    desc: Direct SVC syscall stub (macOS ARM64)
    crit: suspicious
    conf: 0.65
    platforms:
      - macos
    for:
      - macho
    count_min: 6
    if:
      type: hex
      section: text
      pattern: 01 10 00 D4
    unless:
      - id: metadata/lang/compiler/systems::go-version-string
      - id: metadata/signed/platform::apple
  - id: svc-linux-arm64
    desc: Direct SVC syscall (Linux ARM64)
    crit: notable
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/lang/compiler/systems::go-version-string
    conf: 0.85
    platforms:
      - linux
    for:
      - elf
    count_min: 8
    per_kb_min: 0.03
    if:
      type: hex
      section: text
      pattern: 01 00 00 D4
  - id: elf-et-dyn
    desc: ELF ET_DYN binary type
    crit: component
    conf: 0.95
    platforms:
      - linux
    for:
      - elf
    if:
      type: metrics
      field: elf.e_type
      min: 1
      max: 1
  - id: linux-vdso-string
    desc: linux-vdso shared object string
    crit: component
    conf: 0.95
    platforms:
      - linux
    for:
      - elf
    if:
      type: text
      substr: linux-vdso.so.1
  - id: linux-vdso-symbol
    desc: __vdso exported symbol string
    crit: component
    conf: 0.95
    platforms:
      - linux
    for:
      - elf
    if:
      type: text
      regex: __vdso_[a-z_]+
  - id: syscall-with-number
    desc: Syscall with immediate number
    crit: component
    conf: 0.9
    platforms:
      - linux
      - windows
    for:
      - pe
      - elf
    size_max: 10485760
    count_min: 2
    per_kb_min: 0.002
    if:
      type: hex
      section: text
      pattern: B8 ?? ?? ?? ?? 0F 05
    unless:
      - type: raw
        substr: __APE1
      - id: metadata/lang/compiler/systems::go-version-string
      - id: metadata/lang/compiled::go-runtime-marker
      - id: linux-vdso-binary
      - id: objectives/evasion/hijack-execution-flow/linker::ld-so-usage-text
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
  - id: windows-x64-syscall-stub
    desc: Windows x64 syscall stub pattern
    crit: suspicious
    conf: 0.95
    platforms:
      - windows
    for:
      - pe
    if:
      type: hex
      section: text
      pattern: 4C 8B D1 B8 ?? ?? ?? 00 0F 05
    unless:
      - id: metadata/signed/platform::microsoft
  - id: windows-x64-xor-return-syscall-stub
    desc: Windows x64 XOR-return syscall stub
    crit: suspicious
    conf: 0.95
    platforms:
      - windows
    for:
      - pe
    arch:
      - x86-64
    if:
      type: hex
      section: .text
      pattern: 8B 05 ?? ?? ?? ?? 41 5A 4D 33 D7 41 52 4C 8B D1 0F 05 41 5A 4D 33 D7 41 FF E2
  - id: nt-create-user-process-ref
    desc: NtCreateUserProcess string reference
    crit: component
    conf: 0.9
    platforms:
      - windows
    for:
      - pe
    if:
      type: text
      exact: NtCreateUserProcess
  - id: nt-open-process-token-ref
    desc: NtOpenProcessToken string reference
    crit: component
    conf: 0.9
    platforms:
      - windows
    for:
      - pe
    if:
      type: text
      exact: NtOpenProcessToken
  - id: nt-adjust-privileges-token-ref
    desc: NtAdjustPrivilegesToken string reference
    crit: component
    conf: 0.9
    platforms:
      - windows
    for:
      - pe
    if:
      type: text
      exact: NtAdjustPrivilegesToken
  - id: sedebug-privilege-ref
    desc: SeDebugPrivilege string reference
    crit: component
    conf: 0.9
    platforms:
      - windows
    for:
      - pe
    if:
      type: text
      exact: SeDebugPrivilege
  - id: create-target-process-status
    desc: Create target process status
    crit: component
    conf: 0.9
    platforms:
      - windows
    for:
      - pe
    if:
      type: text
      exact: CreateTargetProcess successfully.
  - id: dense-syscalls
    desc: High density of syscall instructions
    crit: suspicious
    conf: 0.85
    per_kb_min: 5.0
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 0F 05
composite_rules:
  - id: linux-vdso-binary
    desc: Linux VDSO shared object stub
    crit: component
    conf: 0.95
    all:
      - id: elf-et-dyn
    any:
      - id: linux-vdso-string
      - id: linux-vdso-symbol
  - id: syscall-evasion-linux-x86
    desc: Direct syscall usage (EDR/hook evasion)
    crit: hostile
    conf: 0.95
    attack: T1562.001
    for:
      - elf
    platforms:
      - linux
    needs: 2
    unless:
      - id: metadata/lang/scripted::sbcl-runtime
      - id: metadata/binary/metrics/threshold::many-sections-20
    any:
      - id: syscall-x64-instruction
      - id: int-80-instruction
      - id: sysenter-instruction
      - id: syscall-with-number
      - id: dense-syscalls
  - id: syscall-evasion-linux-arm64
    desc: Direct syscall usage (EDR/hook evasion)
    crit: hostile
    conf: 0.95
    attack: T1562.001
    for:
      - elf
    platforms:
      - linux
    needs: 2
    unless:
      - id: metadata/lang/scripted::is-sbcl
    any:
      - id: svc-linux-arm64
      - id: dense-syscalls
  - id: syscall-evasion-macos-arm64
    desc: Direct syscall usage (EDR/hook evasion)
    crit: hostile
    conf: 0.95
    attack: T1562.001
    for:
      - macho
    platforms:
      - macos
    all:
      - id: dense-syscalls
    any:
      - id: svc-macos-arm64
    unless:
      - id: metadata/lang/scripted::is-sbcl
      - id: metadata/signed/platform::apple
  - id: windows-direct-syscalls
    desc: Windows direct syscalls (EDR bypass)
    crit: hostile
    conf: 0.98
    attack: T1562.001
    for:
      - pe
    platforms:
      - windows
    all:
      - id: windows-x64-syscall-stub
    any:
      - id: dense-syscalls
      - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
  - id: syscall-evasion-windows
    desc: Direct syscall usage (EDR/hook evasion)
    crit: hostile
    conf: 0.95
    attack: T1562.001
    for:
      - pe
    platforms:
      - windows
    needs: 2
    any:
      - id: syscall-x64-instruction
      - id: sysenter-instruction
      - id: syscall-with-number
      - id: windows-x64-syscall-stub
      - id: dense-syscalls
    unless:
      - id: metadata/signed/platform::microsoft
  - id: windows-syscall-privileged-process-create
    desc: Direct syscall privileged process creation
    crit: hostile
    conf: 0.96
    attack: T1562.001
    for:
      - pe
    platforms:
      - windows
    all:
      - id: windows-x64-xor-return-syscall-stub
      - id: nt-create-user-process-ref
      - id: nt-open-process-token-ref
      - id: nt-adjust-privileges-token-ref
      - id: sedebug-privilege-ref
    any:
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: create-target-process-status
