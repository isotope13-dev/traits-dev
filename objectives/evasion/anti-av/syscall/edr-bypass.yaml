defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1562.001
composite_rules:
  - id: direct-syscall-with-hash-resolution
    desc: Direct syscalls with hash-resolved Nt API constants (HellsGate-style)
    crit: hostile
    conf: 0.96
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: objectives/evasion/anti-av/syscall::windows-direct-syscall-x64
    needs: 1
    any:
      - id: objectives/anti-static/obfuscation/imports::nt-allocate-vm-additive-hash
      - id: objectives/anti-static/obfuscation/imports::nt-protect-vm-additive-hash
      - id: objectives/anti-static/obfuscation/imports::nt-create-thread-ex-additive-hash
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: direct-syscall-shellcode-loader
    desc: Shellcode loader using direct syscalls to bypass userland hooks
    crit: hostile
    conf: 0.96
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: objectives/evasion/anti-av/syscall::windows-direct-syscall-x64
      - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: indirect-syscall-shellcode-loader
    desc: Shellcode loader resolving ntdll syscalls without inline syscall instruction
    crit: hostile
    conf: 0.94
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
    needs: 1
    any:
      - id: objectives/anti-static/obfuscation/imports::nt-allocate-vm-additive-hash
      - id: objectives/anti-static/obfuscation/imports::nt-protect-vm-additive-hash
      - id: objectives/anti-static/obfuscation/imports::nt-create-thread-ex-additive-hash
    unless:
      - id: objectives/evasion/anti-av/syscall::windows-direct-syscall-x64
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
