defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1562.001
  mbc: F0004

traits:
  - id: protected-process-targeting-reference
    desc: Protected-process control reference
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)\b(protected\s+process|process\s+protection|ObRegisterCallbacks)\b'

  - id: callback-registration-reference
    desc: Process-callback bypass reference
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: ObRegisterCallbacks

  - id: security-product-targeting-reference
    desc: Security-product targeting reference
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b(antivirus|anti-malware)\b'

  # These are method-name markers from a driver-backed security-process
  # controller.  Each name is only a fragment; the hostile judgments below
  # require them alongside device I/O, token manipulation, and binary-shape or
  # endpoint evidence.
  - id: antivirus-process-enumeration-routine
    desc: Antivirus-process enumeration routine name
    crit: component
    conf: 0.92
    if:
      type: text
      substr: GetAntivirusProcesses

  - id: driver-install-and-start-routine
    desc: Driver install-and-start routine name
    crit: component
    conf: 0.88
    if:
      type: text
      substr: InstallAndStart

  - id: driver-stop-and-delete-routine
    desc: Driver stop-and-delete routine name
    crit: component
    conf: 0.88
    if:
      type: text
      substr: StopAndDelete

  - id: driver-payload-retrieval-routine
    desc: Driver payload retrieval routine name
    crit: component
    conf: 0.86
    if:
      type: text
      substr: GetPayload

composite_rules:
  - id: protected-process-driver-termination
    desc: Driver-backed termination of protected processes
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/persistence/system/service/install::service-install-and-start
      - id: micro-behaviors/fs/file/handle::device-io-control-win
      - id: micro-behaviors/process/terminate/kill::kernel-terminate-process-reference
    any:
      - id: protected-process-targeting-reference
      - id: callback-registration-reference
      - id: security-product-targeting-reference

  - id: driver-backed-antivirus-process-control
    desc: Driver-backed antivirus process control
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/file/handle::device-io-control-win
      - id: antivirus-process-enumeration-routine
      - id: metadata/binary/layout::low-entropy-large-overlay
    any:
      - id: driver-install-and-start-routine
      - id: driver-stop-and-delete-routine
      - id: driver-payload-retrieval-routine
    needs: 2
