defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1562.001
  mbc: B0005

traits:
  - id: kernel-notification-callbacks
    desc: Kernel notification callback symbols
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '(?i)\bPsSet(CreateProcess|CreateThread|LoadImage)NotifyRoutine\b'
    count_min: 2

  - id: kernel-driver-tooling
    desc: Kernel driver tooling references
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)\b(NTIOLib[A-Za-z0-9]+|PROCEXP\d*|GLCK)\b|C:\\Windows\\System32\\ntoskrnl\.exe'
    count_min: 2

composite_rules:
  - id: encoded-kernel-edr-tampering
    desc: Encoded kernel-assisted EDR tampering
    crit: hostile
    conf: 0.99
    all:
      - id: kernel-notification-callbacks
      - id: kernel-driver-tooling
      - id: objectives/impact/degrade/edr/teardown::encoded-security-process-target-list

  - id: kernel-assisted-persistent-tampering
    desc: Kernel-assisted persistent security tampering
    crit: hostile
    conf: 0.99
    all:
      - id: kernel-driver-tooling
      - id: objectives/persistence/login/startup/registry::encoded-run-key-persistence
