defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
traits:
  - id: minimal-pe-resources
    desc: Few PE resource entries (no DIALOG/MENU/STRINGTABLE)
    crit: component
    conf: 0.8
    size_max: 5242880
    if:
      type: metrics
      field: pe.resource_count
      max: 5
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab
composite_rules:
  - id: gui-message-pump-cluster
    desc: Full Win32 GUI message-pump import cluster
    crit: component
    conf: 0.9
    size_max: 5242880
    all:
      - id: micro-behaviors/ui/window/manage::register-class
      - id: micro-behaviors/ui/window/manage::create-window-ex
      - id: micro-behaviors/os/message/queue::get-message-w
    needs: 1
    any:
      - id: micro-behaviors/ui/window/manage::dispatch-message
      - id: micro-behaviors/ui/window/manage::def-window-proc
      - id: micro-behaviors/ui/window/manage::post-quit-message
  - id: decoy-gui-shellcode-loader
    desc: Shellcode loader with decoy GUI message-pump (no real GUI resources)
    crit: hostile
    conf: 0.93
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: gui-message-pump-cluster
      - id: minimal-pe-resources
    needs: 1
    any:
      - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
      - id: objectives/evasion/process/injection/shellcode::executable-heap-shellcode-loader
      - id: objectives/anti-static/obfuscation/imports::pe-walk-hash-resolver-x64
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
