# Anti-AV Manifest Padding
# Malware authors embed fake text in PE manifests to confuse AV heuristic engines
# that scan XML manifest content for suspicious patterns.
defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: antivirus-dummy-text
    desc: Anti-AV dummy text in PE manifest resource
    crit: suspicious
    conf: 0.97
    attack: T1027
    if:
      type: text
      regex: '[Dd]ummy text.{0,30}(antivirus|anti.?virus|AV)'
