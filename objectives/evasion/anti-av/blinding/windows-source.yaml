defaults:
  platforms: [windows]
  for: [source]
traits:
  - id: avp32-target-source
    desc: Targets avp32.exe in source
    crit: suspicious
    conf: 0.88
    if:
      type: text
      exact: avp32.exe
  - id: drweb32w-target-source
    desc: Targets drweb32w.exe in source
    crit: suspicious
    conf: 0.88
    if:
      type: text
      exact: drweb32w.exe
  - id: spidernt-target-source
    desc: Targets spidernt.exe in source
    crit: suspicious
    conf: 0.88
    if:
      type: text
      exact: spidernt.exe
  - id: avltmain-target-source
    desc: Targets avltmain.exe in source
    crit: suspicious
    conf: 0.88
    if:
      type: text
      exact: avltmain.exe
  - id: pavproxy-target-source
    desc: Targets pavproxy.exe in source
    crit: suspicious
    conf: 0.88
    if:
      type: text
      exact: pavproxy.exe
composite_rules:
  - id: hardcoded-av-exclusion-list-source
    desc: Hardcoded AV filename exclusion list in source
    crit: suspicious
    conf: 0.98
    needs: 4
    any:
      - id: avp32-target-source
      - id: drweb32w-target-source
      - id: spidernt-target-source
      - id: avltmain-target-source
      - id: pavproxy-target-source
