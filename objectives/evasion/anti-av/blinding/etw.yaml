# ETW Blinding Detection
# ATT&CK: T1562.006 (Indicator Removal: ETW Blinding)
defaults:
  platforms: [windows]
  for: [binaries, pe, dll]

traits:
  - id: etw-patch-str
    desc: ETW patching string indicator
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "Patching EtwEventWrite"

  - id: etw-patch-xor-ret
    desc: ETW patch bytes (xor eax,eax; ret)
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "0x33 0xC0 0xC3"

  - id: etw-event-write-symbol
    desc: EtwEventWrite symbol reference
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: EtwEventWrite

  - id: nttraceevent-api-reference
    desc: NtTraceEvent telemetry API reference
    crit: component
    conf: 0.95
    for: [pe, dll]
    if:
      type: text
      word: NtTraceEvent

  - id: nttraceevent-noop-patch
    desc: x86 NtTraceEvent no-op patch
    crit: suspicious
    conf: 0.99
    attack: T1562.006
    for: [pe, dll]
    arch: [x86]
    if:
      type: hex
      section: .text
      pattern: 'C7 03 48 33 C0 C3'

composite_rules:
  - id: etw-blinding-patch
    desc: Disables ETW by patching EtwEventWrite
    crit: hostile
    conf: 0.98
    all:
      - id: etw-patch-str
    any:
      - id: etw-patch-xor-ret
      - id: etw-event-write-symbol
    unless:
      - id: metadata/signed/platform/

  - id: nttraceevent-blinding-patch
    desc: Dynamically resolves and disables NtTraceEvent telemetry
    crit: hostile
    conf: 0.99
    attack: T1562.006
    mbc: B0030
    for: [pe, dll]
    all:
      - id: nttraceevent-api-reference
      - id: nttraceevent-noop-patch
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/mem/protect/modify::virtual-protect

  - id: module-enumeration-with-nttraceevent-blinding
    desc: Module enumeration paired with NtTraceEvent telemetry blinding
    crit: hostile
    conf: 0.98
    attack: T1057,T1562.006
    mbc: B0030
    for: [pe, dll]
    all:
      - id: nttraceevent-blinding-patch
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-module-enumeration
