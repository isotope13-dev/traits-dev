# ETW Blinding Detection
# ATT&CK: T1562.006 (Indicator Removal: ETW Blinding)
defaults:
  platforms: [windows]
  for: [binaries]

traits:
  - id: etw-patch-str
    desc: ETW patching string indicator
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "Patching EtwEventWrite"

  - id: etw-patch-xor-ret
    desc: ETW patch bytes (xor eax,eax; ret)
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "0x33 0xC0 0xC3"

  - id: etw-event-write-symbol
    desc: EtwEventWrite symbol reference
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: EtwEventWrite

composite_rules:
  - id: etw-blinding-patch
    desc: Disables ETW by patching EtwEventWrite
    crit: hostile
    conf: 0.98
    all:
      - id: etw-patch-str
    any:
      - id: etw-patch-xor-ret
      - id: etw-event-write-symbol
    unless:
      - id: metadata/signed/platform/
