defaults:
  platforms: [windows]
  for: [pe, go]
  attack: T1562.001

traits:
  - id: go-amsi-scanbuffer-name
    desc: Go AMSI patch helper
    crit: component
    conf: 0.92
    if:
      type: symbol
      exact: main.getAmsiScanBufferName

  - id: go-etw-eventwrite-name
    desc: Go ETW patch helper
    crit: component
    conf: 0.92
    if:
      type: symbol
      exact: main.getEtwEventWriteName

  - id: go-minidumpwritedump-patch
    desc: Go MiniDump patch helper
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: main.patchMiniDumpWriteDump

  - id: go-minidumpwritedump-name
    desc: Go MiniDump name helper
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: main.getMiniDumpWriteDumpName

composite_rules:
  - id: go-telemetry-blinding-patches
    desc: Patches AMSI ETW and MiniDump
    crit: hostile
    conf: 0.98
    needs: 3
    any:
      - id: go-amsi-scanbuffer-name
      - id: go-etw-eventwrite-name
      - id: go-minidumpwritedump-patch
      - id: go-minidumpwritedump-name
    unless:
      - id: metadata/signed/platform/

