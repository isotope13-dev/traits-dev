defaults:
  attack: T1562.001
  platforms:
    - unix
    - android
traits:
  - id: lkrg-bypass-module-obj
    desc: Build includes LKRG bypass module
    crit: component
    conf: 0.98
    for: [c, cpp, shell, makefile]
    if:
      type: text
      substr: modules/lkrg_bypass.o
  - id: p-check-integrity
    desc: Targets LKRG p_check_integrity check
    crit: suspicious
    conf: 1.0
    for:
      - c
    if:
      type: string_literal
      substr: p_check_integrity
  - id: p-dump-task-f
    desc: Targets LKRG p_dump_task_f routine
    crit: suspicious
    conf: 1.0
    for:
      - c
    if:
      type: string_literal
      substr: p_dump_task_f
  - id: p-cmp-credential-access
    desc: Targets LKRG credential-check routine
    crit: suspicious
    conf: 1.0
    for:
      - c
    if:
      type: string_literal
      substr: p_cmp_credential-access
  - id: p-cmp-tasks
    desc: Targets LKRG task-comparison routine
    crit: suspicious
    conf: 1.0
    for:
      - c
    if:
      type: string_literal
      substr: p_cmp_tasks
  - id: ed-task-add
    desc: Targets LKRG ed_task_add routine
    crit: suspicious
    conf: 1.0
    for:
      - c
    if:
      type: string_literal
      substr: ed_task_add
  - id: p-exploit-detection-init
    desc: Targets LKRG exploit-detection init
    crit: suspicious
    conf: 1.0
    for:
      - c
    if:
      type: string_literal
      substr: p_exploit_detection_init
  - id: validate-sp
    desc: validate_sp stack pointer check
    crit: component
    conf: 0.85
    for:
      - c
    if:
      type: text
      regex: (?i)validate_sp
  - id: enforce-pcfi
    desc: Targets enforce_pcfi kernel CFI
    crit: suspicious
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: text
      regex: (?i)enforce_pcfi
  - id: exploit-detection
    desc: Targets kernel exploit_detection
    crit: suspicious
    conf: 0.9
    for:
      - c
      - elf
    if:
      type: text
      regex: (?i)exploit_detection
  - id: bypass-selinux
    desc: bypass_selinux disables SELinux at runtime
    crit: suspicious
    conf: 0.95
    for:
      - c
      - elf
    if:
      type: text
      regex: (?i)bypass_selinux
  - id: hook-security-logic
    desc: Structural detection of hooking kernel
    crit: suspicious
    conf: 0.95
    for:
      - c
    if:
      type: text
      regex: HOOK(.{0,50}integrity|.{0,50}exploit|.{0,50}pcfi)
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-spdx-source-context
  - id: check-integrity
    desc: Targets kernel check_integrity routine
    crit: suspicious
    conf: 0.85
    for:
      - c
      - elf
    if:
      type: text
      regex: (?i)(^|[^A-Za-z0-9_])p_check_integrity([^A-Za-z0-9_]|$)|lkrg.{0,80}check_integrity
composite_rules:
  - id: lkrg
    desc: Targets Linux Kernel Runtime Guard
    crit: suspicious
    conf: 1.0
    for:
      - c
    any:
      - id: p-check-integrity
      - id: p-dump-task-f
      - id: p-cmp-credential-access
      - id: p-cmp-tasks
      - id: ed-task-add
      - id: p-exploit-detection-init
  - id: kernel-integrity
    desc: Targets kernel integrity or exploit
    crit: suspicious
    conf: 0.9
    for:
      - c
      - elf
    any:
      - id: check-integrity
      - id: validate-sp
      - id: enforce-pcfi
      - id: exploit-detection
      - id: bypass-selinux
  - id: security-software-blinding
    desc: Security software blinding detected
    crit: suspicious
    conf: 0.95
    for:
      - c
    needs: 2
    any:
      - id: lkrg
      - id: hook-security-logic
      - id: kernel-integrity
  - id: lkm-lkrg-bypass-build
    desc: Kernel module build targets LKRG
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/os/kernel/module::linux-kbuild-module-build
      - id: lkrg-bypass-module-obj
