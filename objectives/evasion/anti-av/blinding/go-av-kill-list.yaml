defaults:
  platforms: [windows]
  for: [go]
traits:
  - id: avpcc-target
    desc: Targets avpcc.exe
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: 'avpcc.exe'

  - id: avpm-target
    desc: Targets avpm.exe
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: 'avpm.exe'

  - id: bdmcon-target
    desc: Targets bdmcon.exe
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: 'bdmcon.exe'

composite_rules:
  - id: go-av-process-list
    desc: Hardcoded list of AV processes to kill
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/evasion/anti-av/blinding::avpcc-target
      - id: objectives/evasion/anti-av/blinding::avpm-target
      - id: objectives/evasion/anti-av/blinding::bdmcon-target
