defaults:
  for:
  - c
  - cpp
  platforms:
  - windows
  attack: T1027.007
composite_rules:
- id: export-parsing
  desc: PE export table parsing
  crit: suspicious
  conf: 0.8
  for:
  - pe
  - dll
  needs: 2
  any:
  - id: objectives/evasion/process/injection/memory::asm-manual-import-export-dir
  - id: objectives/evasion/process/injection/memory::asm-manual-import-addr-names
  - id: micro-behaviors/os/api-resolution/hash-based::address-of-name-ordinals
  downgrade:
    any:
    - id: micro-behaviors/os/api-resolution/manual::export-table-label
    - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
    - id: metadata/binary/framework::dotnet-metadata
    - id: micro-behaviors/fs/file/section::pe-viewer-header-labels
- id: manual-winapi-resolution
  desc: Manual Windows API resolution
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/os/api-resolution/manual::peb-module-walk
  - id: micro-behaviors/os/api-resolution/manual::manual-export-resolution
  unless:
  - id: well-known/lib/wine::wine-source-tree
  - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
- id: encrypted-manual-api-resolver-with-anti-analysis
  desc: Encrypted native payload paired with PEB API resolution and debugger detection
  crit: hostile
  conf: 0.99
  for:
  - pe
  - dll
  attack: T1027.007,T1140,T1622
  all:
  - id: micro-behaviors/os/api-resolution/manual::x64-peb-loader-list-walk-inline
  - id: micro-behaviors/os/api-resolution/manual::x64-pe-export-directory-walk-inline-rex
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
