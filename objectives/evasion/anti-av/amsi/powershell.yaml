defaults:
  for: [powershell]
  platforms: [windows]
  attack: T1562.001
  mbc: E1562

traits:
  - id: amsi-dll-char-concat
    desc: AMSI DLL character concat
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '"a"\s*\+\s*"m"\s*\+\s*"s"\s*\+\s*"i"\s*\+\s*"\.dll"'
      case_insensitive: true
  - id: amsi-open-session-concat
    desc: AmsiOpenSession string concat
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '"A"\s*\+\s*"msi"\s*\+\s*"Ope"\s*\+\s*"nS"\s*\+\s*"es"'
      case_insensitive: true
  - id: virtualprotect-fragment
    desc: VirtualProtect API string fragment
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: VirtualProtec
  - id: marshal-copy-method-call
    desc: Marshal Copy method call
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)(Marshal|\$marshalClass)::Copy\('

composite_rules:
  - id: amsi-open-session-memory-patch
    desc: Obfuscated PowerShell memory patch
    crit: hostile
    conf: 0.98
    all:
      - id: virtualprotect-fragment
      - id: marshal-copy-method-call
      - id: objectives/anti-static/obfuscation/string::single-char-concat-pattern
      - id: objectives/execution/interpreter/eval/invoke::add-type-variable
      - id: objectives/evasion/anti-av/platform::ntdll-dll-str
