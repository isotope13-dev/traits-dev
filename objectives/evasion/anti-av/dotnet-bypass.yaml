defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1562.001
traits:
  - id: skip-verification
    desc: .NET SecurityPermission SkipVerification request
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      exact: SkipVerification
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::mscorlib
        - id: metadata/library/data::aws-sdk-dotnet-core
        - id: metadata/signed/platform::microsoft-code-signing-pca-2011
        - id: metadata/signed/platform::.net
