defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1562.001
traits:
  - id: skip-verification-token
    desc: SkipVerification permission token
    crit: component
    conf: 0.95
    if:
      type: text
      exact: SkipVerification
  - id: security-permission-attribute
    desc: SecurityPermissionAttribute token
    crit: component
    conf: 0.95
    if:
      type: text
      exact: SecurityPermissionAttribute
  - id: unverifiable-code-attribute
    desc: UnverifiableCodeAttribute token
    crit: component
    conf: 0.95
    if:
      type: text
      exact: UnverifiableCodeAttribute
  - id: request-action-token
    desc: Security request action token
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Request(Minimum|Optional|Refuse)
  - id: security-action-request-token
    desc: SecurityAction request token
    crit: component
    conf: 0.92
    if:
      type: text
      regex: SecurityAction\.(RequestMinimum|RequestOptional|RequestRefuse)
composite_rules:
  - id: native-runtime-security-metadata
    desc: Large native runtime security metadata
    crit: component
    conf: 0.9
    all:
      - id: metadata/lang/compiler/aot::native-runtime-large-file
      - id: metadata/lang/compiler/managed::mscorlib
  - id: skip-verification
    desc: .NET SecurityPermission SkipVerification request
    crit: suspicious
    conf: 0.9
    all:
      - id: skip-verification-token
      - id: security-permission-attribute
    any:
      - id: request-action-token
      - id: security-action-request-token
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::mscorlib
        - id: metadata/signed/platform::microsoft-code-signing-pca-2011
        - id: metadata/signed/platform::.net
    unless:
      - id: native-runtime-security-metadata
  - id: unverifiable-skip-verification
    desc: Unverifiable .NET skip verification request
    crit: suspicious
    conf: 0.92
    all:
      - id: skip-verification-token
      - id: unverifiable-code-attribute
    any:
      - id: request-action-token
      - id: security-action-request-token
    unless:
      - id: native-runtime-security-metadata
