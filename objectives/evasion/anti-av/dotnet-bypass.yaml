defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1562.001
traits:
  - id: skip-verification
    desc: .NET SecurityPermission SkipVerification request
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: SkipVerification
    unless:
      - type: text
        exact: >-
          System.Security.Permissions.SecurityPermissionAttribute,
          System.Runtime.Extensions, Version=4.2.2.0, Culture=neutral,
          PublicKeyToken=b03f5f7f11d50a3a
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::mscorlib
        - id: metadata/library/data::aws-sdk-dotnet-core
