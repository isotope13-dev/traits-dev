# EDR unhooking via raw disk access.
# The combination of a raw disk reader (to bypass filesystem hooks) and a PE
# parser (to parse DLLs from raw bytes) is a well-known pattern for reading
# clean copies of ntdll.dll or kernel32.dll directly from disk to overwrite
# user-land EDR hooks.
# See: github.com/awgh/rawreader + github.com/Binject/debug/pe
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1562.001
composite_rules:
  - id: raw-disk-edr-unhook
    desc: EDR unhooking via raw disk DLL reading
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/disk/raw::rawreader-library
      - id: micro-behaviors/data/format/pe-parser::binject-pe-parser
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: well-known/tool/reverse-engineering/scyllahide::reverse-engineering-tool
