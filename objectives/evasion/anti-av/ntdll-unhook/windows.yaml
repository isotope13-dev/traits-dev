# ntdll Patching / Unhooking Patterns
# Detects techniques to patch ntdll functions to evade detection
# ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1562.001"
traits:
  # ZwQueryVirtualMemory patching (hide memory regions)
  - id: zw-query-virtual-memory
    desc: ZwQueryVirtualMemory function reference
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "ZwQueryVirtualMemory"
  # NtManageHotPatch (disable hot patching)
  - id: nt-manage-hot-patch
    # nt-query-virtual-memory: use symbol in syscall/invoke for cross-type matching
    # Keep this for string context (ntdll patching) while invoke uses symbol

    desc: NtManageHotPatch function reference
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: "NtManageHotPatch"
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/signed/platform::microsoft
        - id: micro-behaviors/os/service/export::win-service-export
  # STATUS_NOT_SUPPORTED return patching
  - id: status-not-supported
    desc: STATUS_NOT_SUPPORTED constant
    crit: notable
    conf: 0.6
    if:
      type: hex
      section: ".text"
      pattern: "bb 01 00 00 c0"
    unless:
      - type: raw
        regex: "BSJB"
  # Common unhooking patterns
  - id: ntdll-unhook-str
    desc: ntdll unhook string indicator
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: "(?i)(unhook|patch).?ntdll"
  - id: fresh-ntdll-str
    desc: Fresh ntdll copy indicator
    crit: component
    conf: 0.85
    if:
      type: string_value
      regex: "(?i)fresh.?ntdll"
  # KnownDlls reference (for getting clean ntdll)
  - id: knowndlls-path
    desc: KnownDlls object path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: "\\KnownDlls\\"
  # ntdll.dll.txt (disk copy technique)
  - id: ntdll-disk-copy
    desc: ntdll disk copy path
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: "(?i)ntdll\\.dll\\.(txt|bak|old|copy)"
  # VirtualProtect on ntdll
  - id: ntdll-text-section
    desc: ntdll .text section reference
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: "ntdll.{0,30}\\.text"
composite_rules:
  - id: ntdll-unhook-indicator
    desc: ntdll unhook string indicators
    crit: component
    any:
      - id: ntdll-unhook-str
      - id: fresh-ntdll-str
  - id: query-memory-functions
    desc: Virtual memory query functions
    any:
      - id: zw-query-virtual-memory
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-b
  - id: knowndlls-text-combo
    desc: KnownDlls with .text section access
    all:
      - id: knowndlls-path
      - id: ntdll-text-section
  - id: ntdll-evasion-context
    desc: ntdll evasion context signals
    crit: component
    any:
      - id: knowndlls-text-combo
      - id: query-memory-functions
      - id: ntdll-disk-copy
  - id: ntdll-evasion
    desc: ntdll patching/unhooking technique
    crit: suspicious
    conf: 0.9
    all:
      - id: ntdll-unhook-indicator
      - id: ntdll-evasion-context
