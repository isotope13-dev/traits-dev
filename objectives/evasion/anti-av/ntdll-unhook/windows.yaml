defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1562.001
traits:
  - id: nt-manage-hot-patch
    desc: NtManageHotPatch function reference
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: NtManageHotPatch
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: metadata/signed/platform/
        - id: micro-behaviors/os/service/export::win-service-export
  - id: status-not-supported
    desc: STATUS_NOT_SUPPORTED constant
    crit: notable
    conf: 0.6
    if:
      type: hex
      section: .text
      pattern: bb 01 00 00 c0
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/resource::kernel-driver-idata
      - id: metadata/signed/platform/
  - id: ntdll-unhook-str
    desc: ntdll unhook string indicator
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)(unhook|patch).?ntdll
  - id: fresh-ntdll-str
    desc: Fresh ntdll copy indicator
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (?i)fresh.?ntdll
  - id: knowndlls-path
    desc: KnownDlls object path
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: "(?i)\\\\KnownDlls\\\\|KnownDlls"
    downgrade:
      any:
        - id: well-known/tool/sysadmin/sysinternals/
        - id: well-known/tool/sysadmin/systeminformer::systeminformer-product
    unless:
      - id: metadata/binary/vendor/
      - id: well-known/tool/sysadmin/sysinternals/
  - id: ntdll-disk-copy
    desc: ntdll disk copy path
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)ntdll\.dll\.(txt|bak|old|copy)
  - id: ntdll-text-section
    desc: ntdll .text section reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: ntdll.{0,30}\.text
composite_rules:
  - id: ntdll-unhook-indicator
    desc: ntdll unhook string indicators
    crit: component
    any:
      - id: ntdll-unhook-str
      - id: fresh-ntdll-str
  - id: query-memory-functions
    desc: Virtual memory query functions
    any:
      - id: micro-behaviors/mem/query/virtual::zw-query-virtual-memory
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-b
  - id: knowndlls-text-combo
    desc: KnownDlls with .text section access
    all:
      - id: knowndlls-path
      - id: ntdll-text-section
  - id: ntdll-evasion-context
    desc: ntdll evasion context signals
    crit: component
    any:
      - id: knowndlls-text-combo
      - id: query-memory-functions
      - id: ntdll-disk-copy
  - id: ntdll-evasion
    desc: ntdll patching/unhooking technique
    crit: suspicious
    conf: 0.9
    all:
      - id: ntdll-unhook-indicator
      - id: ntdll-evasion-context

  - id: shadow-ntdll-variant-b
    desc: Shadow ntdll unhooking (Variant B)
    crit: hostile
    conf: 0.98
    all:
      - id: knowndlls-path
      - id: micro-behaviors/os/api-resolution/manual::shadow-ntdll-redirection
    any:
      - id: micro-behaviors/os/api-resolution/manual::shadow-ntdll-indicator
      - id: ntdll-unhook-indicator
