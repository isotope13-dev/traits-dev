# Programmatic quarantine attribute removal in compiled binaries
# Detects Mach-O binaries that remove com.apple.quarantine via removexattr
# ATT&CK: T1553.001 (Gatekeeper Bypass)
defaults:
  platforms: [macos]
  for: [macho]
  attack: T1553.001
traits:
  - id: electron-runtime-js2c-context
    desc: Electron runtime JavaScript context
    crit: component
    conf: 0.98
    if:
      type: text
      regex: 'electron/js2c/|process\._linkedBinding\("electron_'
  - id: squirrel-updater-text-marker
    desc: Squirrel updater text marker
    crit: component
    conf: 0.98
    if:
      type: text
      regex: 'com\.github\.Squirrel|com\.googlecode\.ShipIt|ShipIt'
composite_rules:
  - id: squirrel-updater-helper
    desc: Squirrel updater helper binary
    crit: component
    conf: 0.98
    all:
      - id: metadata/binary/framework::macos-updater-helper-name--shipit
      - id: squirrel-updater-text-marker
  - id: programmatic-quarantine-removal
    desc: Programmatic quarantine attribute removal
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/fs/attributes/xattr::xattr-remove-removexattr
      - id: metadata/binary/bundle::quarantine
    unless:
      - id: electron-runtime-js2c-context
      - id: squirrel-updater-helper
    downgrade:
      any:
        - id: metadata/binary/framework::macos-updater-helper
        - id: metadata/binary/framework::macos-updater-helper-name
