defaults:
  platforms: [android]
  for: [apk, zip]
  crit: component
  conf: 0.9
  attack: "T1629"

traits:
  - id: accessibility-manager-service-reflection
    crit: notable
    desc: Accessibility manager service reflection
    if:
      type: text
      substr: "android.view.accessibility.IAccessibilityManager"

  - id: accessibility-service-uids-field
    desc: Accessibility service UIDs field
    conf: 0.92
    if:
      type: text
      substr: "mAccessibilityServiceUids"

  - id: enabled-accessibility-services-provider
    desc: Enabled accessibility services provider
    conf: 0.9
    if:
      type: text
      substr: "enabled_accessibility_services"

  - id: proc-uid-accessibility-path
    desc: Proc UID accessibility path
    conf: 0.92
    if:
      type: text
      substr: "/proc/uid_"

composite_rules:
  - id: android-accessibility-state-evasion
    desc: Android accessibility state evasion
    crit: hostile
    conf: 0.98
    all:
      - id: accessibility-manager-service-reflection
      - id: accessibility-service-uids-field
      - id: enabled-accessibility-services-provider
    any:
      - id: proc-uid-accessibility-path
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-service-config
