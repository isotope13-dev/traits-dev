# Programmatic quarantine attribute removal in compiled binaries
# Detects Mach-O binaries that remove com.apple.quarantine via removexattr
# ATT&CK: T1553.001 (Gatekeeper Bypass)
defaults:
  platforms: [macos]
  for: [macho]
  attack: T1553.001
composite_rules:
  - id: programmatic-quarantine-removal
    desc: Programmatic quarantine attribute removal
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/fs/attributes/xattr::xattr-remove-removexattr
      - id: metadata/vendor/apple::quarantine
    unless:
      - id: metadata/binary/framework::electron-framework-binary
      - id: metadata/binary/framework::shipit-binary
