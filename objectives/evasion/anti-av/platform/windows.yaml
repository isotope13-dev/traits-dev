defaults:
  attack: T1562.001
  for:
    - pe
    - powershell
    - batch
    - vbs
  platforms:
    - windows
traits:
  - id: defender-exclusion-cmdlet
    desc: Embedded Defender exclusion cmdlet
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: \bAdd-MpPreference\b.{0,64}-Exclusion(Path|Extension|Process)\b
      case_insensitive: true
  - id: defender-add-exclusion
    desc: Add Windows Defender exclusion
    crit: notable
    conf: 0.95
    for:
      - batch
      - powershell
    if:
      type: text
      regex: Add-MpPreference\s+.{0,50}-Exclusion
      case_insensitive: true
  - id: defender-exclusion-path
    desc: Windows Defender path exclusion
    crit: notable
    conf: 0.95
    for:
      - batch
      - powershell
    if:
      type: text
      substr: -ExclusionPath
      case_insensitive: true
  - id: defender-exclusion-extension
    desc: Windows Defender extension exclusion
    crit: notable
    conf: 0.9
    for:
      - batch
      - powershell
    if:
      type: text
      substr: -ExclusionExtension
      case_insensitive: true
  - id: defender-exclusion-process
    desc: Windows Defender process exclusion
    crit: notable
    conf: 0.9
    for:
      - batch
      - powershell
    if:
      type: text
      substr: -ExclusionProcess
      case_insensitive: true
  - id: defender-disable-realtime
    desc: Disable Windows Defender realtime
    crit: suspicious
    conf: 0.95
    for:
      - batch
      - powershell
    if:
      type: text
      regex: Set-MpPreference\s+.{0,50}-DisableRealtimeMonitoring\s+\$?true
      case_insensitive: true
  - id: defender-disable-behavior
    desc: Disable behavior monitoring
    crit: suspicious
    conf: 0.95
    for:
      - batch
      - powershell
    if:
      type: text
      regex: Set-MpPreference\s+.{0,50}-DisableBehaviorMonitoring\s+\$?true
      case_insensitive: true
  - id: defender-disable-ioav
    desc: Disable IOAV protection
    crit: suspicious
    conf: 0.9
    for:
      - batch
      - powershell
    if:
      type: text
      regex: Set-MpPreference\s+.{0,50}-DisableIOAVProtection\s+\$?true
      case_insensitive: true
  - id: defender-drive-exclusion
    desc: Exclude entire drive from Defender
    crit: suspicious
    conf: 0.95
    for:
      - batch
      - powershell
    if:
      type: text
      regex: -ExclusionPath\s+["']?[A-Za-z]:\\?["']?
      case_insensitive: true
  - id: amsi-bypass-init-flag
    desc: AMSI initialization bypass
    crit: suspicious
    conf: 0.9
    for:
      - powershell
      - batch
    if:
      type: text
      exact: amsiInitFailed
      case_insensitive: true
  - id: amsi-bypass-init-scan-buffer
    desc: AMSI initialization bypass
    crit: suspicious
    conf: 0.9
    for:
      - powershell
      - batch
    if:
      type: text
      exact: AmsiScanBuffer
      case_insensitive: true
  - id: amsi-dll-reference
    desc: AMSI DLL reference
    crit: suspicious
    conf: 0.9
    for:
      - powershell
      - batch
    if:
      type: text
      exact: amsi.dll
      case_insensitive: true
  - id: amsi-dll-reference-encoded
    desc: AMSI DLL reference in decoded blob
    crit: suspicious
    conf: 0.94
    for:
      - powershell
    if:
      type: encoded
      substr: amsi.dll
      case_insensitive: true
  - id: amsi-scanbuffer-concat
    desc: AmsiScanBuffer string concat
    crit: suspicious
    conf: 0.94
    for:
      - powershell
    if:
      type: text
      regex: '(?i)"Am"\s*\+\s*"si"\s*\+\s*"Scan"\s*\+\s*"Buffer"'
  - id: amsi-scanbuffer-concat-encoded
    desc: AmsiScanBuffer concat in decoded blob
    crit: suspicious
    conf: 0.97
    for:
      - powershell
    if:
      type: encoded
      regex: '(?i)"Am"\s*\+\s*"si"\s*\+\s*"Scan"\s*\+\s*"Buffer"'
  - id: rtlmovememory-entrypoint
    desc: RtlMoveMemory entry point
    crit: suspicious
    conf: 0.88
    for:
      - powershell
    if:
      type: text
      exact: 'EntryPoint = "RtlMoveMemory"'
  - id: rtlmovememory-entrypoint-encoded
    desc: RtlMoveMemory entry point in decoded blob
    crit: suspicious
    conf: 0.94
    for:
      - powershell
    if:
      type: encoded
      substr: 'EntryPoint = "RtlMoveMemory"'
  - id: virtualprotect-word
    desc: VirtualProtect API reference
    crit: notable
    conf: 0.8
    for:
      - powershell
    if:
      type: text
      word: VirtualProtect
  - id: virtualprotect-word-encoded
    desc: VirtualProtect in decoded blob
    crit: suspicious
    conf: 0.92
    for:
      - powershell
    if:
      type: encoded
      word: VirtualProtect
  - id: movememory-word
    desc: MoveMemory API reference
    crit: notable
    conf: 0.8
    for:
      - powershell
    if:
      type: text
      word: MoveMemory
  - id: movememory-word-encoded
    desc: MoveMemory in decoded blob
    crit: suspicious
    conf: 0.92
    for:
      - powershell
    if:
      type: encoded
      word: MoveMemory
  - id: marshal-copy-word
    desc: Marshal.Copy API reference
    crit: notable
    conf: 0.8
    for:
      - powershell
    if:
      type: text
      word: Marshal.Copy
  - id: marshal-copy-word-encoded
    desc: Marshal.Copy in decoded blob
    crit: suspicious
    conf: 0.92
    for:
      - powershell
    if:
      type: encoded
      word: Marshal.Copy
  - id: amsi-bypass-init-scan-buffer-encoded
    desc: AmsiScanBuffer in decoded blob
    crit: suspicious
    conf: 0.94
    for:
      - powershell
    if:
      type: encoded
      word: AmsiScanBuffer
      case_insensitive: true
  - id: amsi-bypass-reflection
    desc: AMSI bypass via reflection
    crit: suspicious
    conf: 0.9
    for:
      - powershell
    if:
      type: text
      regex: \[Ref\]\.Assembly\.GetType.{0,50}amsi
      case_insensitive: true
  - id: amsi-bypass-reflection-loop
    desc: AMSI bypass via GetTypes() loop
    crit: suspicious
    conf: 0.9
    for:
      - powershell
    if:
      type: text
      regex: \[Ref\]\.Assembly\.GetTypes\(\)[\s\S]{0,400}AmsiUtils
      case_insensitive: true
  - id: amsi-bypass-amsiutils-setvalue
    desc: AmsiUtils field SetValue bypass
    crit: suspicious
    conf: 0.93
    for:
      - powershell
    if:
      type: text
      regex: AmsiUtils[\s\S]{0,400}\.SetValue\(|SetValue\([^\n]{0,200}amsiInitFailed
      case_insensitive: true
  - id: amsi-init-failed-substr
    desc: amsiInitFailed field reference
    crit: suspicious
    conf: 0.9
    for:
      - powershell
      - batch
    if:
      type: text
      substr: amsiInitFailed
      case_insensitive: true
  - id: start-process-runas
    desc: UAC bypass via Start-Process RunAs
    crit: suspicious
    conf: 0.9
    for:
      - batch
      - powershell
    if:
      type: text
      regex: Start-Process\s+.{0,50}-Verb\s+RunAs
      case_insensitive: true
  - id: malwarebytes-stop-service
    desc: Malwarebytes stopservice flag
    crit: suspicious
    conf: 0.95
    for:
      - batch
      - powershell
    if:
      type: text
      regex: malwarebytes.{0,50}--stopservice|--stopservice.{0,50}malwarebytes
      case_insensitive: true
  - id: malwarebytes-assistant
    desc: Malwarebytes assistant executable
    crit: notable
    conf: 0.6
    for:
      - batch
      - powershell
    if:
      type: string_literal
      substr: malwarebytes_assistant
      case_insensitive: true
  - id: disable-windows-defender-service
    desc: Stop Windows Defender service
    crit: suspicious
    conf: 0.9
    for:
      - batch
      - powershell
    if:
      type: text
      regex: (sc|net)\s+\w+.{0,50}(WinDefend|WdNisSvc|SecurityHealthService)
      case_insensitive: true
  - id: tasklist-av-check-a
    desc: Tasklist checks common AV set A
    crit: notable
    conf: 0.8
    for:
      - batch
    if:
      type: text
      regex: tasklist.{0,50}(Malwarebytes|avast|avg|norton)
      case_insensitive: true
  - id: tasklist-av-check-b
    desc: Tasklist checks common AV set B
    crit: notable
    conf: 0.8
    for:
      - batch
    if:
      type: text
      regex: tasklist.{0,50}(mcafee|kaspersky|defender)
      case_insensitive: true
composite_rules:
  - id: defender-exclusion
    desc: Windows Defender exclusion bypass
    crit: notable
    conf: 0.95
    any:
      - id: defender-exclusion-cmdlet
      - id: defender-add-exclusion
      - id: defender-exclusion-path
      - id: defender-exclusion-extension
      - id: defender-exclusion-process
      - id: defender-drive-exclusion
  - id: defender-disable
    desc: Windows Defender disabled
    crit: suspicious
    conf: 0.95
    for:
      - batch
      - powershell
    any:
      - id: defender-disable-realtime
      - id: defender-disable-behavior
      - id: defender-disable-ioav
      - id: disable-windows-defender-service
  - id: amsi-bypass
    desc: AMSI bypass detected
    crit: suspicious
    conf: 0.9
    for:
      - batch
      - powershell
    any:
      - id: amsi-bypass-init
      - id: amsi-bypass-reflection
      - id: amsi-bypass-reflection-loop
      - id: amsi-bypass-amsiutils-setvalue
      - id: amsi-init-failed-substr
      - id: amsi-memory-patch-bypass
      - id: amsi-memory-patch-bypass-encoded
  - id: uac-bypass-comp
    desc: Windows UAC bypass or elevation request
    crit: suspicious
    conf: 0.95
    attack: T1548.002
    any:
      - id: start-process-runas
      - id: objectives/privilege-escalation/elevation-control/uac-bypass::uac-bypass-compact-layer
  - id: tasklist-av-check
    desc: Tasklist checking for AV processes
    crit: notable
    conf: 0.8
    for:
      - batch
    any:
      - id: tasklist-av-check-a
      - id: tasklist-av-check-b
  - id: windows-bypass
    desc: Windows security bypass detected
    crit: suspicious
    conf: 0.95
    for:
      - batch
      - powershell
    any:
      - id: defender-exclusion
      - id: defender-disable
      - id: amsi-bypass
      - id: malwarebytes-stop-service
      - id: uac-bypass
      - id: tasklist-av-check
  - id: amsi-bypass-init
    desc: AMSI initialization bypass
    crit: suspicious
    conf: 0.9
    for:
      - powershell
      - batch
    any:
      - id: amsi-bypass-init-flag
      - id: amsi-bypass-init-scan-buffer
  - id: amsi-memory-patch-bypass
    desc: AMSI scan buffer memory patch
    crit: suspicious
    conf: 0.97
    for:
      - powershell
    all:
      - id: amsi-dll-reference
      - id: rtlmovememory-entrypoint
      - id: virtualprotect-word
      - id: movememory-word
      - id: marshal-copy-word
    any:
      - id: amsi-bypass-init-scan-buffer
      - id: amsi-scanbuffer-concat
  - id: amsi-memory-patch-bypass-encoded
    desc: AMSI scan buffer patch in blob
    crit: suspicious
    conf: 0.98
    for:
      - powershell
    all:
      - id: amsi-dll-reference-encoded
      - id: rtlmovememory-entrypoint-encoded
      - id: virtualprotect-word-encoded
      - id: movememory-word-encoded
      - id: marshal-copy-word-encoded
    any:
      - id: amsi-bypass-init-scan-buffer-encoded
      - id: amsi-scanbuffer-concat-encoded
