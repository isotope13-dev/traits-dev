# Obfuscated JavaScript that constructs a Windows Defender exclusion.
# The individual fragments are suspicious; the complete command is an anti-AV
# objective.
defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1562.001

traits:
  - id: charcode-defender-cmdlet
    desc: Add-MpPreference charcode sequence
    crit: suspicious
    conf: 0.98
    if:
      type: text
      # Stable numeric representation of Add-MpPreference in JScript.
      substr: '65,100,100,45,77,112,80,114,101,102,101,114,101,110,99,101'

  - id: charcode-defender-path
    desc: ExclusionPath charcode sequence
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '69,120,99,108,117,115,105,111,110,80,97,116,104'

  - id: fragmented-defender-exclusion-command
    desc: Fragmented Add-MpPreference exclusion command
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: buildAddExclusionScript

  - id: defender-command-name-fragment
    desc: Fragmented Add-MpPreference name
    crit: component
    conf: 0.96
    if:
      type: text
      substr: Add-M

  - id: defender-exclusion-argument-fragment
    desc: Fragmented Defender exclusion argument
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(?i)Exclu.{0,80}(Path|Process|Extension)'

composite_rules:
  - id: javascript-hidden-encoded-defender-exclusion
    desc: Hidden JScript executes encoded Defender exclusion
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001,T1059.007,T1562.001,T1564.003
    all:
      - id: charcode-defender-cmdlet
      - id: charcode-defender-path
      - id: micro-behaviors/process/create/shell/wsh::wsh-run-hidden-window-text
    near_bytes: 1024

  - id: javascript-defender-exclusion-builder
    desc: JavaScript builds Defender exclusion command
    crit: hostile
    conf: 0.99
    all:
      - id: fragmented-defender-exclusion-command
      - id: defender-command-name-fragment
      - id: defender-exclusion-argument-fragment
