# Obfuscated JavaScript that constructs a Windows Defender exclusion.
# The individual fragments are suspicious; the complete command is an anti-AV
# objective.
defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1562.001

traits:
  - id: fragmented-defender-exclusion-command
    desc: Fragmented Add-MpPreference exclusion command
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: buildAddExclusionScript

  - id: defender-command-name-fragment
    desc: Fragmented Add-MpPreference name
    crit: component
    conf: 0.96
    if:
      type: text
      substr: Add-M

  - id: defender-exclusion-argument-fragment
    desc: Fragmented Defender exclusion argument
    crit: component
    conf: 0.96
    if:
      type: text
      substr: Exclu

composite_rules:
  - id: javascript-defender-exclusion-builder
    desc: JavaScript builds Defender exclusion command
    crit: hostile
    conf: 0.99
    all:
      - id: fragmented-defender-exclusion-command
      - id: defender-command-name-fragment
      - id: defender-exclusion-argument-fragment
