defaults:
  attack: T1562.001
  for:
  - pe
  - powershell
  - batch
  - vbs
  platforms:
  - windows
traits:
- id: defender-exclusion-cmdlet
  desc: Embedded Defender exclusion cmdlet
  crit: suspicious
  conf: 0.98
  if:
    type: text
    regex: \bAdd-MpPreference\b.{0,64}-Exclusion(Path|Extension|Process)\b
    case_insensitive: true
- id: defender-exclusion-cmdlet-raw
  desc: Embedded Defender exclusion cmdlet
  crit: suspicious
  conf: 0.96
  for: [data, pe, batch, powershell, javascript]
  if:
    type: text
    regex: '(?i)\bAdd-MpPreference\b.{0,96}-Exclusion(Path|Extension|Process)\b'
- id: defender-add-mppreference-hex
  desc: Hex encoded Defender exclusion cmdlet
  crit: suspicious
  conf: 0.95
  for: [data, pe, batch, powershell, javascript]
  if:
    type: text
    substr: "4164642d4d70507265666572656e6365"
- id: defender-add-exclusion
  desc: Add Windows Defender exclusion
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: Add-MpPreference\s+.{0,50}-Exclusion
    case_insensitive: true
- id: defender-exclusion-path
  desc: Windows Defender path exclusion
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    substr: -ExclusionPath
    case_insensitive: true
- id: defender-exclusionpath-raw
  desc: Windows Defender path exclusion
  crit: suspicious
  conf: 0.9
  for: [data, pe, batch, powershell, javascript]
  if:
    type: text
    substr: -ExclusionPath
- id: defender-exclusion-telegram-downloads
  desc: Defender excludes Telegram download folder
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: (?i)(Downloads\\Telegram Desktop|Telegram Desktop)
- id: defender-programdata-stage-path
  desc: ProgramData staged payload directory reference
  crit: component
  conf: 0.88
  unless:
  - id: well-known/lib/openssl::openssl-cryptogams
  if:
    type: text
    regex: (?i)(%ALLUSERSPROFILE%|C:\\ProgramData)(\\[A-Za-z0-9_. -]{3,96}){1,3}
- id: defender-add-mppreference-concat
  desc: Fragmented Add-MpPreference command
  crit: component
  conf: 0.95
  for:
  - powershell
  if:
    type: text
    substr: "'A'+'d'+'d'+'-M'+'p'+'P'+'r'"
- id: defender-exclusionpath-concat
  desc: Fragmented Defender exclusion path
  crit: component
  conf: 0.94
  for:
  - powershell
  if:
    type: text
    substr: "'-'+'E'+'x'+'c'+'l'+'u'+'s'+'i'"
- id: defender-exclusion-extension
  desc: Windows Defender extension exclusion
  crit: suspicious
  conf: 0.9
  for:
  - batch
  - powershell
  if:
    type: text
    substr: -ExclusionExtension
    case_insensitive: true
- id: defender-exclusion-process
  desc: Windows Defender process exclusion
  crit: suspicious
  conf: 0.9
  for:
  - batch
  - powershell
  if:
    type: text
    substr: -ExclusionProcess
    case_insensitive: true
- id: defender-disable-realtime
  desc: Disable Windows Defender realtime
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: Set-MpPreference\s+.{0,50}-DisableRealtimeMonitoring\s+\$?true
    case_insensitive: true
- id: defender-disable-realtime-reg
  desc: Defender realtime disabled by registry
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: 'reg\s+add.{0,120}DisableRealtimeMonitoring.{0,80}/d\s+1'
    case_insensitive: true
- id: defender-disable-antispyware-reg
  desc: Defender AntiSpyware disabled by registry
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: 'reg\s+add.{0,120}DisableAntiSpyware.{0,80}/d\s+1'
    case_insensitive: true
- id: defender-disable-behavior
  desc: Disable behavior monitoring
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: Set-MpPreference\s+.{0,50}-DisableBehaviorMonitoring\s+\$?true
    case_insensitive: true
- id: defender-disable-ioav
  desc: Disable IOAV protection
  crit: suspicious
  conf: 0.9
  for:
  - batch
  - powershell
  if:
    type: text
    regex: Set-MpPreference\s+.{0,50}-DisableIOAVProtection\s+\$?true
    case_insensitive: true
- id: defender-disable-archive-scan
  desc: Disable Defender archive scanning
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: Set-MpPreference\s+.{0,80}-DisableArchiveScanning\s+\$?true
    case_insensitive: true
- id: defender-disable-script-scan
  desc: Disable Defender script scanning
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: Set-MpPreference\s+.{0,80}-DisableScriptScanning\s+\$?true
    case_insensitive: true
- id: defender-controlled-folder-off
  desc: Disable Controlled Folder Access
  crit: suspicious
  conf: 0.94
  for:
  - powershell
  if:
    type: text
    regex: Set-MpPreference\s+.{0,80}-EnableControlledFolderAccess\s+['"]?Disabled['"]?
    case_insensitive: true
- id: defender-memory-integrity-off
  desc: Disable Memory Integrity
  crit: suspicious
  conf: 0.94
  for:
  - powershell
  if:
    type: text
    regex: Set-MpPreference\s+.{0,80}-EnableMemoryIntegrity\s+\$?false
    case_insensitive: true
- id: defender-service-name-set
  desc: Defender service name set
  crit: suspicious
  conf: 0.92
  for:
  - powershell
  if:
    type: text
    regex: 'WinDefend[\s\S]{0,160}WdNisSvc[\s\S]{0,160}(Sense|SecurityHealthService)'
    case_insensitive: true
- id: powershell-disable-service-loop
  desc: PowerShell disables services loop
  crit: suspicious
  conf: 0.9
  for:
  - powershell
  if:
    type: text
    regex: 'Stop-Service[\s\S]{0,240}Set-Service[\s\S]{0,160}StartupType\s+Disabled'
    case_insensitive: true
- id: defender-drive-exclusion
  desc: Exclude entire drive from Defender
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: -ExclusionPath\s+["']?[A-Za-z]:\\?["']?(\s|;|$)
    case_insensitive: true
- id: windows-script-amsi-disable-registry
  desc: Disable Windows Script AMSI
  crit: suspicious
  conf: 0.98
  for:
  - batch
  - powershell
  - vbs
  - oledoc
  - ole
  if:
    type: text
    regex: Windows Script\\Settings.{0,120}AmsiEnable.{0,120}Value\s+0
    case_insensitive: true
- id: amsi-bypass-init-flag
  desc: AMSI initialization bypass
  crit: suspicious
  conf: 0.9
  for:
  - powershell
  - batch
  if:
    type: text
    word: amsiInitFailed
    case_insensitive: true
- id: amsi-bypass-init-scan-buffer
  desc: AMSI initialization bypass
  crit: suspicious
  conf: 0.9
  for:
  - powershell
  - batch
  if:
    type: text
    word: AmsiScanBuffer
    case_insensitive: true
- id: amsi-dll-reference
  desc: AMSI DLL reference
  crit: suspicious
  conf: 0.9
  for:
  - powershell
  - batch
  if:
    type: text
    word: amsi.dll
    case_insensitive: true
- id: amsi-dll-reference-encoded
  desc: AMSI DLL reference in decoded blob
  crit: suspicious
  conf: 0.94
  for:
  - powershell
  if:
    type: encoded
    substr: amsi.dll
    case_insensitive: true
- id: amsi-scanbuffer-concat
  desc: AmsiScanBuffer string concat
  crit: suspicious
  conf: 0.94
  for:
  - powershell
  if:
    type: text
    regex: '(?i)"Am"\s*\+\s*"si"\s*\+\s*"Scan"\s*\+\s*"Buffer"'
- id: amsi-scanbuffer-concat-encoded
  desc: AmsiScanBuffer concat in decoded blob
  crit: suspicious
  conf: 0.97
  for:
  - powershell
  if:
    type: encoded
    regex: '(?i)"Am"\s*\+\s*"si"\s*\+\s*"Scan"\s*\+\s*"Buffer"'
- id: rtlmovememory-entrypoint
  desc: RtlMoveMemory entry point
  crit: suspicious
  conf: 0.88
  for:
  - powershell
  if:
    type: text
    exact: 'EntryPoint = "RtlMoveMemory"'
- id: rtlmovememory-entrypoint-encoded
  desc: RtlMoveMemory entry point in decoded blob
  crit: suspicious
  conf: 0.94
  for:
  - powershell
  if:
    type: encoded
    substr: 'EntryPoint = "RtlMoveMemory"'
- id: virtualprotect-word
  desc: VirtualProtect API reference
  crit: suspicious
  conf: 0.8
  for:
  - powershell
  if:
    type: text
    word: VirtualProtect
- id: virtualprotect-word-encoded
  desc: VirtualProtect in decoded blob
  crit: suspicious
  conf: 0.92
  for:
  - powershell
  if:
    type: encoded
    word: VirtualProtect
- id: movememory-word
  desc: MoveMemory API reference
  crit: suspicious
  conf: 0.8
  for:
  - powershell
  if:
    type: text
    word: MoveMemory
- id: movememory-word-encoded
  desc: MoveMemory in decoded blob
  crit: suspicious
  conf: 0.92
  for:
  - powershell
  if:
    type: encoded
    word: MoveMemory
- id: marshal-copy-word
  desc: Marshal.Copy API reference
  crit: suspicious
  conf: 0.8
  for:
  - powershell
  if:
    type: text
    word: Marshal.Copy
- id: marshal-copy-word-encoded
  desc: Marshal.Copy in decoded blob
  crit: suspicious
  conf: 0.92
  for:
  - powershell
  if:
    type: encoded
    word: Marshal.Copy
- id: amsi-bypass-init-scan-buffer-encoded
  desc: AmsiScanBuffer in decoded blob
  crit: suspicious
  conf: 0.94
  for:
  - powershell
  if:
    type: encoded
    word: AmsiScanBuffer
    case_insensitive: true
- id: amsi-bypass-reflection
  desc: AMSI bypass via reflection
  crit: suspicious
  conf: 0.9
  for:
  - powershell
  if:
    type: text
    regex: \[Ref\]\.Assembly\.GetType.{0,50}amsi
    case_insensitive: true
- id: amsi-bypass-reflection-loop
  desc: AMSI bypass via GetTypes() loop
  crit: suspicious
  conf: 0.9
  for:
  - powershell
  if:
    type: text
    regex: \[Ref\]\.Assembly\.GetTypes\(\)[\s\S]{0,400}AmsiUtils
    case_insensitive: true
- id: amsi-bypass-amsiutils-setvalue
  desc: AmsiUtils field SetValue bypass
  crit: suspicious
  conf: 0.93
  for:
  - powershell
  if:
    type: text
    regex: AmsiUtils[\s\S]{0,400}\.SetValue\(|SetValue\([^\n]{0,200}amsiInitFailed
    case_insensitive: true
- id: start-process-runas
  desc: PowerShell Start-Process elevation
  crit: notable
  conf: 0.9
  attack: T1548.002
  for:
  - batch
  - powershell
  if:
    type: text
    regex: Start-Process\s+.{0,50}-Verb\s+RunAs
    case_insensitive: true
- id: malwarebytes-stop-service
  desc: Malwarebytes stopservice flag
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: malwarebytes.{0,50}--stopservice|--stopservice.{0,50}malwarebytes
    case_insensitive: true
- id: malwarebytes-assistant
  desc: Malwarebytes assistant executable
  crit: suspicious
  conf: 0.6
  for:
  - batch
  - powershell
  if:
    type: string_literal
    substr: malwarebytes_assistant
    case_insensitive: true
- id: disable-windows-defender-service
  desc: Stop Windows Defender service
  crit: suspicious
  conf: 0.9
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (sc|net)\s+\w+.{0,50}(WinDefend|WdNisSvc|SecurityHealthService)
    case_insensitive: true

- id: amsi-memory-patch-hex-bytes
  desc: "AMSI scan buffer memory patch bytes"
  crit: component
  conf: 0.98
  for: [pe]
  if:
    type: hex
      # b8 57 00 07 80 : mov eax, 0x80070057
      # c3             : ret
    pattern: "b8 57 00 07 80 c3"
    section: .text

- id: etw-blinding-patch-bytes
  desc: ETW event write blinding patch bytes
  crit: component
  conf: 0.95
  for: [pe]
  if:
    type: hex
      # 48 33 c0 : xor rax, rax
      # c3       : ret
    pattern: "48 33 c0 c3"
    section: .text
  unless:
    - id: well-known/app/drivers::ngx-dll-basename

- id: etw-event-write-str
  desc: EtwEventWrite string reference
  crit: component
  if:
    type: text
    substr: "EtwEventWrite"

- id: ntdll-dll-str
  desc: ntdll.dll string reference
  crit: component
  if:
    type: text
    substr: "ntdll.dll"
  unless:
  - id: metadata/lang/compiler/systems::go-pe-symtab

- id: tasklist-av-check-a
  desc: Tasklist checks common AV set A
  crit: suspicious
  conf: 0.8
  for:
  - batch
  if:
    type: text
    regex: tasklist.{0,50}(Malwarebytes|avast|avg|norton)
    case_insensitive: true
- id: tasklist-av-check-b
  desc: Tasklist checks common AV set B
  crit: suspicious
  conf: 0.8
  for:
  - batch
  if:
    type: text
    regex: tasklist.{0,50}(mcafee|kaspersky|defender)
    case_insensitive: true
- id: av-process-name-list--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  for:
  - batch
  - powershell
  - vbs
  if:
    type: text
    regex: \b(AvastUI|AvastSvc)(\.exe)?\b
    case_insensitive: true
  count_max: 1027205
- id: av-process-name-list--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  for:
  - batch
  - powershell
  - vbs
  if:
    type: text
    regex: \b(avgui|AVGSvc)(\.exe)?\b
    case_insensitive: true
  count_max: 1027206
- id: av-process-name-list--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  for:
  - batch
  - powershell
  - vbs
  if:
    type: text
    regex: \b(MsMpEng|NisSrv)(\.exe)?\b
    case_insensitive: true
  count_max: 1027207
- id: av-process-name-list--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  for:
  - batch
  - powershell
  - vbs
  if:
    type: text
    regex: \b(MBAMService|kavtray)(\.exe)?\b
    case_insensitive: true
  count_max: 1027208
- id: av-process-name-list--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.85
  for:
  - batch
  - powershell
  - vbs
  if:
    type: text
    regex: \b(McShield|McTray)(\.exe)?\b
    case_insensitive: true
  count_max: 1027209
- id: tasklist-imagename-filter
  desc: Tasklist filters by IMAGENAME (process check)
  crit: notable
  conf: 0.75
  for:
  - batch
  if:
    type: text
    regex: tasklist\s+/FI\s+["']?IMAGENAME\s+eq\s+
    case_insensitive: true
composite_rules:
- id: defender-registry-disable
  desc: Defender disabled through registry
  crit: hostile
  conf: 0.98
  all:
  - id: defender-disable-realtime-reg
  - id: defender-disable-antispyware-reg
- id: defender-multi-feature-disable
  desc: Defender multi-feature disable
  crit: hostile
  conf: 0.98
  needs: 3
  any:
  - id: defender-disable-realtime
  - id: defender-disable-behavior
  - id: defender-disable-ioav
  - id: defender-disable-archive-scan
  - id: defender-disable-script-scan
  - id: defender-controlled-folder-off
  - id: defender-memory-integrity-off
- id: defender-service-disable-loop
  desc: Defender service disable loop
  crit: hostile
  conf: 0.97
  all:
  - id: defender-service-name-set
  - id: powershell-disable-service-loop
- id: defender-exclusion
  desc: Windows Defender exclusion bypass
  crit: suspicious
  conf: 0.95
  any:
  - id: defender-exclusion-cmdlet
  - id: defender-exclusion-cmdlet-raw
  - id: defender-add-mppreference-hex
  - id: defender-add-exclusion
  - id: defender-exclusion-path
  - id: defender-exclusionpath-raw
  - id: defender-exclusion-extension
  - id: defender-exclusion-process
  - id: defender-drive-exclusion
  - id: defender-add-mppreference-concat
  - id: defender-exclusionpath-concat
- id: defender-hidden-powershell-temp-exclusion
  desc: Hidden PowerShell Defender exclusion
  crit: hostile
  conf: 0.97
  for: [data, pe, batch, powershell, javascript]
  all:
  - id: defender-add-mppreference-hex
  - id: defender-exclusionpath-raw
  - id: micro-behaviors/process/create/hidden::encodedcommand-flag-raw
  - id: micro-behaviors/os/privilege/check::net-session-admin-check-hex
- id: defender-temp-exclusion-via-obfuscated-iex
  desc: Obfuscated Defender temp exclusion
  crit: hostile
  conf: 0.97
  for:
  - powershell
  all:
  - id: defender-add-mppreference-concat
  - id: defender-exclusionpath-concat
  - id: micro-behaviors/os/env/vars/access::env-temp-dup
  - id: objectives/execution/interpreter/eval/invoke::iex-backtick-obfuscated
- id: ransomware-prep-blinding
  desc: Ransomware prep blinding chain
  crit: hostile
  conf: 0.96
  all:
  - id: defender-disable
  - id: defender-exclusion
  any:
  - id: objectives/impact/degrade/firewall::windows-firewall-profile-disable
  - id: objectives/evasion/security-bypass/policy/network::smb-anonymous-weaken
- id: defender-excludes-telegram-stage
  desc: Defender excludes Telegram and stage
  crit: hostile
  conf: 0.98
  all:
  - id: defender-exclusion-cmdlet
  - id: defender-exclusion-telegram-downloads
  - id: defender-programdata-stage-path
- id: defender-disable
  desc: Windows Defender disabled
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  any:
  - id: defender-disable-realtime
  - id: defender-disable-behavior
  - id: defender-disable-ioav
  - id: defender-disable-archive-scan
  - id: defender-disable-script-scan
  - id: defender-controlled-folder-off
  - id: defender-memory-integrity-off
  - id: disable-windows-defender-service
- id: amsi-bypass
  desc: AMSI bypass detected
  crit: suspicious
  conf: 0.9
  for:
  - batch
  - powershell
  any:
  - id: amsi-bypass-init
  - id: amsi-bypass-reflection
  - id: amsi-bypass-reflection-loop
  - id: amsi-bypass-amsiutils-setvalue
  - id: amsi-bypass-init-flag
  - id: amsi-memory-patch-bypass
  - id: amsi-memory-patch-bypass-encoded
  - id: objectives/evasion/anti-av/amsi::amsi-open-session-memory-patch

- id: amsi-memory-patch-hostile
  desc: AMSI scan buffer memory patch (hostile intent)
  crit: hostile
  conf: 0.98
  all:
  - id: amsi-memory-patch-hex-bytes
  any:
  - id: amsi-dll-reference
  - id: amsi-bypass-init-scan-buffer

- id: etw-blinding-hostile
  desc: ETW telemetry blinding patch
  crit: hostile
  conf: 0.95
  all:
  - id: etw-blinding-patch-bytes
  - id: etw-event-write-str
  any:
  - id: ntdll-dll-str
  unless:
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: metadata/binary/linking/api-set::api-set-core-cluster
  - id: metadata/signed/platform::microsoft
  - id: metadata/signed/leaf::microsoft-corporation


- id: uac-bypass-comp
  desc: Windows UAC bypass technique
  crit: suspicious
  conf: 0.95
  attack: T1548.002
  any:
  - id: objectives/privilege-escalation/elevation-control/uac-bypass/env::uac-bypass-compact-layer
  - id: objectives/privilege-escalation/elevation-control/uac-bypass/com::cmstplua-uac-bypass
- id: tasklist-av-imagename-loop
  desc: Batch enumerates AV processes via tasklist /FI loop
  crit: suspicious
  conf: 0.95
  attack: T1518.001
  mbc: B0013
  for:
  - batch
  all:
  - id: av-process-name-list
  - id: tasklist-imagename-filter
  near_lines: 8
- id: tasklist-av-check
  desc: Tasklist checking for AV processes
  crit: suspicious
  conf: 0.85
  for:
  - batch
  any:
  - id: tasklist-av-check-a
  - id: tasklist-av-check-b
  - id: tasklist-av-imagename-loop
- id: windows-bypass
  desc: Windows security bypass detected
  crit: suspicious
  conf: 0.95
  for:
  - batch
  - powershell
  any:
  - id: defender-exclusion
  - id: defender-excludes-telegram-stage
  - id: defender-disable
  - id: amsi-bypass
  - id: malwarebytes-stop-service
  - id: uac-bypass-comp
  - id: tasklist-av-check

- id: bypass
  desc: Aggregated Windows security bypass
  crit: suspicious
  conf: 0.9
  any:
  - id: windows-bypass
  - id: amsi-memory-patch-hostile
  - id: etw-blinding-hostile
  - id: ransomware-prep-blinding
  - id: defender-excludes-telegram-stage



- id: amsi-bypass-init
  desc: AMSI initialization bypass
  crit: suspicious
  conf: 0.9
  for:
  - powershell
  - batch
  any:
  - id: amsi-bypass-init-flag
  - id: amsi-bypass-init-scan-buffer
- id: amsi-memory-patch-bypass
  desc: AMSI scan buffer memory patch
  crit: suspicious
  conf: 0.97
  for:
  - powershell
  all:
  - id: amsi-dll-reference
  - id: rtlmovememory-entrypoint
  - id: virtualprotect-word
  - id: movememory-word
  - id: marshal-copy-word
  any:
  - id: amsi-bypass-init-scan-buffer
  - id: amsi-scanbuffer-concat
- id: amsi-memory-patch-bypass-encoded
  desc: AMSI scan buffer patch in blob
  crit: suspicious
  conf: 0.98
  for:
  - powershell
  all:
  - id: amsi-dll-reference-encoded
  - id: rtlmovememory-entrypoint-encoded
  - id: virtualprotect-word-encoded
  - id: movememory-word-encoded
  - id: marshal-copy-word-encoded
  any:
  - id: amsi-bypass-init-scan-buffer-encoded
  - id: amsi-scanbuffer-concat-encoded
- id: veh-hardware-breakpoint-evasion
  desc: Evasion via Vectored Exception Handler and hardware breakpoints
  crit: hostile
  conf: 0.95
  all:
