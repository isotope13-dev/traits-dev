traits:
- id: defender-add-mppreference-hex
  desc: Hex encoded Defender exclusion cmdlet
  crit: suspicious
  conf: 0.95
  for: [data, pe, batch, powershell, javascript]
  if:
    type: text
    substr: "4164642d4d70507265666572656e6365"
- id: defender-exclusion-cmdlet-python
  desc: Python builds Defender exclusion cmdlet
  crit: suspicious
  conf: 0.95
  for: [python]
  ref: sha256:ecf20a98afad77070e569863859939ea86c29941d53d602825da71ac7fd437a9
  unless:
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  if:
    type: text
    regex: '\b(Add|Remove)-MpPreference\b[\s\S]{0,120}-Exclusion(Path|Extension|Process)\b'
    case_insensitive: true
- id: add-mppreference-literal-python
  desc: Python Add-MpPreference literal
  crit: component
  conf: 0.94
  for: [python]
  ref: sha256:ecf20a98afad77070e569863859939ea86c29941d53d602825da71ac7fd437a9
  if:
    type: literal
    exact: Add-MpPreference
- id: remove-mppreference-literal-python
  desc: Python Remove-MpPreference literal
  crit: component
  conf: 0.94
  for: [python]
  ref: sha256:ecf20a98afad77070e569863859939ea86c29941d53d602825da71ac7fd437a9
  if:
    type: literal
    exact: Remove-MpPreference
- id: exclusionpath-literal-python
  desc: Python ExclusionPath literal
  crit: component
  conf: 0.94
  for: [python]
  ref: sha256:ecf20a98afad77070e569863859939ea86c29941d53d602825da71ac7fd437a9
  if:
    type: text
    substr: -ExclusionPath
- id: defender-exclusion-telegram-downloads
  desc: Telegram Desktop download path reference
  crit: component
  conf: 0.95
  if:
    type: text
    regex: (?i)(Downloads\\Telegram Desktop|Telegram Desktop)
- id: defender-programdata-stage-path
