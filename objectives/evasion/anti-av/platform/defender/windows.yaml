- id: defender-exclusion-with-remote-eval
  desc: Defender exclusion before remote eval
  crit: hostile
  conf: 0.98
  attack: T1562.001,T1059.001
  mbc: B0030
  ref: sha256:4c666890a558a284ac2f14950f096f255f622b9b4e32771d17f4667d63d2847d
  all:
  - id: micro-behaviors/os/security/defender::defender-exclusion-command
  - id: objectives/command-and-control/dropper/execution/fileless::embedded-powershell-irm-iex
# Native binary that plants broad Defender path exclusions (LocalAppData/Temp/
# ProgramFiles/ProgramData) and then continues into remote staging or trust
# policy degradation. The exclusion command alone is notable; the pairing is
# the hostile prep stage.
- id: defender-exclusion-with-ci-policy-disable
