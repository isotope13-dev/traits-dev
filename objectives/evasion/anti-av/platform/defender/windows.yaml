- id: amsi-memory-patch-hex-bytes
  desc: "AMSI patch return-error stub bytes"
  crit: component
  conf: 0.98
  for: [pe]
  if:
    type: hex
      # b8 57 00 07 80 : mov eax, 0x80070057
      # c3             : ret
    pattern: "b8 57 00 07 80 c3"
    section: .text

- id: etw-blinding-patch-bytes
  # `xor rax,rax; ret` is a return-zero stub emitted in nearly every PE, so on
  # its own it is not an ETW patch — it only carries that meaning inside the
  # etw-defender-patch composite (alongside the EtwEventWrite/ntdll strings).
  # Component, not notable: a true composite fragment with no standalone signal.
  desc: Return-zero stub bytes (xor rax,rax; ret)
  crit: component
  conf: 0.95
  for: [pe]
  if:
    type: hex
      # 48 33 c0 : xor rax, rax
      # c3       : ret
    pattern: "48 33 c0 c3"
    section: .text
  unless:
    - id: well-known/app/drivers::ngx-dll-basename
    - id: well-known/tool/sysadmin/ripgrep/

- id: etw-event-write-str
  desc: EtwEventWrite string reference
  # Notable (the composite anchor): a literal EtwEventWrite reference is the
  # ETW-specific signal that gives meaning to the otherwise-ubiquitous
  # return-zero patch stub (etw-blinding-patch-bytes, a component).
  crit: notable
  if:
    type: text
    substr: "EtwEventWrite"

- id: ntdll-dll-str
  desc: ntdll.dll string reference
  crit: component
  if:
    type: text
    substr: "ntdll.dll"
  unless:
  - id: metadata/lang/compiler/systems::go-pe-symtab

