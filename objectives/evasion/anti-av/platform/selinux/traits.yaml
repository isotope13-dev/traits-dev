defaults:
  attack: T1562.001
  platforms:
    - linux
traits:
  - id: setxattr-command
    desc: setxattr command reference
    crit: suspicious
    conf: 0.65
    for:
      - shell
    if:
      type: string_literal
      word: setxattr
  - id: unconfined-u-label
    desc: unconfined_u SELinux user
    crit: component
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      substr: 'unconfined_u:'
  - id: unconfined-r-label
    desc: unconfined_r SELinux role
    crit: component
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      substr: 'unconfined_r:'
  - id: unconfined-t-label
    desc: unconfined_t SELinux type
    crit: component
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      regex: 'unconfined_t(:|\b\s*[,;])'
  - id: object-r-label
    desc: object_r SELinux role
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: 'object_r:'
  - id: setenforce-command
    desc: setenforce command
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: string_literal
      word: setenforce
  - id: kotlin-setenforce-zero
    desc: Kotlin setenforce zero command
    crit: suspicious
    conf: 0.9
    platforms: [android]
    for: [kotlin]
    if:
      type: text
      substr: "setenforce 0"
  - id: getenforce-command
    desc: getenforce command
    crit: suspicious
    conf: 0.75
    for:
      - shell
    if:
      type: string_literal
      word: getenforce
  - id: selinux-enforce-sysfs
    desc: /sys/fs/selinux/enforce path
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      substr: /sys/fs/selinux/enforce
  - id: selinux-enforce-legacy
    desc: /selinux/enforce legacy path
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      substr: /selinux/enforce
  - id: permissive-keyword
    # Component-only — bare "permissive" appears in unrelated contexts (license
    # phrasing, CORS, package metadata). selinux-permissive-config catches
    # the SELinux-specific SELINUX=permissive form.
    desc: '"permissive" keyword'
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      word: permissive
  - id: load-policy-command
    desc: load_policy command
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: string_literal
      word: load_policy
  - id: semodule-command
    desc: semodule command
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: string_literal
      word: semodule
  - id: selinux-config-dir
    desc: /etc/selinux directory
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: /etc/selinux
  - id: chcon-command
    desc: chcon command changes security context
    crit: suspicious
    conf: 0.75
    for:
      - shell
    if:
      type: string_literal
      word: chcon
  - id: restorecon-command
    desc: restorecon command
    crit: suspicious
    conf: 0.7
    for:
      - shell
    unless:
      - id: metadata/package/tooling::ssh-copy-id-utility
    if:
      type: string_literal
      word: restorecon
  - id: selinux-equals-zero
    desc: selinux=0 kernel parameter
    crit: suspicious
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      substr: selinux=0
  - id: enforcing-equals-zero
    desc: enforcing=0 kernel parameter
    crit: suspicious
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      substr: enforcing=0
  - id: selinux-disabled-config
    desc: SELINUX=disabled config
    crit: suspicious
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      substr: SELINUX=disabled
  - id: selinux-permissive-config
    desc: SELINUX=permissive config
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: string_literal
      substr: SELINUX=permissive
  - id: selinux-state-symbol
    desc: selinux_state kernel structure
    crit: suspicious
    conf: 0.75
    for:
      - c
      - elf
    if:
      type: symbol
      exact: selinux_state
  - id: enforcing-keyword
    desc: enforcing keyword
    crit: component
    conf: 0.6
    for:
      - shell
    if:
      type: string_literal
      word: enforcing
  - id: fake-enforce-identifier
    desc: fake_enforce identifier
    crit: suspicious
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: text
      substr: fake_enforce
  - id: sel-read-enforce-symbol
    desc: sel_read_enforce function
    crit: suspicious
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: symbol
      exact: sel_read_enforce
  - id: sel-write-enforce-symbol
    desc: sel_write_enforce function
    crit: suspicious
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: symbol
      exact: sel_write_enforce
  - id: policy-file-pattern-core
    desc: SELinux policy path marker
    crit: notable
    conf: 0.65
    for: [scripts, binaries]
    if:
      type: text
      substr: /selinux/policy
  - id: policy-file-pattern-ext-a
    desc: SELinux policy extension set A
    crit: suspicious
    conf: 0.65
    for: [scripts, binaries]
    if:
      type: text
      regex: policy\.(3[0-9]|pp|te)$
  - id: policy-file-pattern-ext-b
    desc: SELinux policy extension set B
    crit: suspicious
    conf: 0.65
    for: [scripts, binaries]
    if:
      type: text
      regex: policy\.(fc|if)$
composite_rules:
  - id: unconfined-labels
    desc: Unconfined SELinux context labels
    for: [scripts, binaries]
    any:
      - id: unconfined-u-label
      - id: unconfined-r-label
      - id: unconfined-t-label
    crit: suspicious
  - id: enforcement-commands
    desc: SELinux enforcement commands
    for: [scripts, binaries]
    any:
      - id: setenforce-command
      - id: getenforce-command
      - id: selinux-enforce-sysfs
      - id: selinux-enforce-legacy
      - id: permissive-keyword
    crit: suspicious
  - id: policy-commands
    desc: SELinux policy manipulation commands
    for:
      - shell
    any:
      - id: load-policy-command
      - id: semodule-command
      - id: chcon-command
      - id: restorecon-command
    crit: suspicious
  - id: policy-files
    desc: SELinux policy file references
    for: [scripts, binaries]
    any:
      - id: selinux-config-dir
      - id: policy-file-pattern
    crit: suspicious
  - id: policy-file-pattern
    desc: SELinux policy binary file
    crit: suspicious
    conf: 0.65
    for: [scripts, binaries]
    any:
      - id: policy-file-pattern-core
      - id: policy-file-pattern-ext-a
      - id: policy-file-pattern-ext-b
  - id: kernel-parameters
    desc: SELinux kernel boot parameters
    for:
      - shell
    any:
      - id: selinux-equals-zero
      - id: enforcing-equals-zero
      - id: selinux-disabled-config
      - id: selinux-permissive-config
    crit: suspicious
  - id: sel-enforce-symbols
    desc: SELinux enforcement symbols
    for:
      - c
      - elf
    all:
      - id: sel-read-enforce-symbol
      - id: sel-write-enforce-symbol
    crit: suspicious
  - id: xattr-manipulation
    desc: SELinux extended attribute manipulation
    crit: suspicious
    conf: 0.75
    for: [shell, elf, so]
    all:
      - id: micro-behaviors/fs/attributes/xattr::security-selinux-xattr
    any:
      - id: micro-behaviors/fs/attributes/xattr::setxattr-func
      - id: setxattr-command
  - id: unconfined-context
    desc: SELinux unconfined context assignment
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    any:
      - id: unconfined-labels
      - id: object-r-label
    downgrade:
      any:
        - id: metadata/package/testing/presence/platform_suites::coreutils-test-functions
  - id: policy-manipulation
    desc: SELinux policy load or manipulation
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    any:
      - id: policy-commands
      - id: policy-files
    downgrade:
      any:
        - id: micro-behaviors/dylib/library/family::debugger-tool-marker
        - id: metadata/package/testing/presence/platform_suites::coreutils-test-functions
        - id: metadata/build/autotools
  - id: selinux-state-enforcing
    desc: SELinux state with enforcing keyword
    for:
      - c
      - elf
    all:
      - id: selinux-state-symbol
      - id: enforcing-keyword
    crit: suspicious
  - id: fake-enforce-selinux
    desc: Fake enforce with SELinux state
    for:
      - c
      - elf
    all:
      - id: fake-enforce-identifier
      - id: selinux-state-symbol
    crit: suspicious
  - id: runtime-patch
    desc: Direct kernel memory manipulation of
    crit: suspicious
    conf: 0.95
    for:
      - c
      - elf
    any:
      - id: selinux-state-enforcing
      - id: sel-enforce-symbols
      - id: fake-enforce-selinux
  - id: bypass-comp
    desc: SELinux bypass detected
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    needs: 2
    any:
      - id: xattr-manipulation
      - id: unconfined-context
      - id: enforcement-commands
      - id: kernel-parameters
      - id: runtime-patch
