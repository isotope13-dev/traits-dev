defaults:
  attack: T1562.001
  platforms:
    - linux
traits:
  - id: setxattr-command
    desc: Sets file xattr (SELinux relabel)
    crit: suspicious
    conf: 0.65
    for:
      - shell
    if:
      type: string_literal
      word: setxattr
  - id: unconfined-u-label
    desc: unconfined_u SELinux user context
    crit: component
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      substr: 'unconfined_u:'
  - id: unconfined-r-label
    desc: unconfined_r SELinux role context
    crit: component
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      substr: 'unconfined_r:'
  - id: unconfined-t-label
    desc: unconfined_t SELinux domain context
    crit: component
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      regex: 'unconfined_t(:|\b\s*[,;])'
  - id: object-r-label
    desc: object_r SELinux file role context
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: 'object_r:'
  - id: setenforce-command
    desc: setenforce toggles SELinux enforce mode
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: string_literal
      word: setenforce
  - id: kotlin-setenforce-zero
    desc: Kotlin setenforce zero command
    crit: suspicious
    conf: 0.9
    platforms: [android]
    for: [kotlin]
    if:
      type: text
      substr: "setenforce 0"
  - id: getenforce-command
    desc: getenforce reads SELinux enforce state
    crit: suspicious
    conf: 0.75
    for:
      - shell
    if:
      type: string_literal
      word: getenforce
  - id: selinux-status-meter
    # Read-only system monitors (htop's SELinuxMeter) reference the enforce
    # path purely to DISPLAY SELinux state, not to disable enforcement.
    desc: SELinux status meter (read-only monitor)
    crit: baseline
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      regex: SELinux\s?Meter
  - id: selinux-enforce-sysfs
    desc: Writes SELinux enforce toggle via sysfs
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    unless:
      - id: selinux-status-meter
    if:
      type: text
      substr: /sys/fs/selinux/enforce
  - id: selinux-enforce-legacy
    desc: Legacy SELinux enforce toggle path
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    unless:
      - id: selinux-status-meter
    if:
      type: text
      substr: /selinux/enforce
  - id: permissive-keyword
    # Component-only — bare "permissive" appears in unrelated contexts (license
    # phrasing, CORS, package metadata). selinux-permissive-config catches
    # the SELinux-specific SELINUX=permissive form.
    desc: "SELinux permissive-mode reference"
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      word: permissive
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: load-policy-command
    desc: Loads a custom SELinux policy
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: string_literal
      word: load_policy
  - id: semodule-command
    desc: Manages SELinux policy modules
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: string_literal
      word: semodule
  - id: selinux-config-dir
    desc: /etc/selinux policy config directory
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: /etc/selinux
  - id: chcon-command
    desc: chcon command changes security context
    crit: suspicious
    conf: 0.75
    for:
      - shell
    if:
      type: string_literal
      word: chcon
  - id: restorecon-command
    desc: Restores SELinux file contexts
    crit: suspicious
    conf: 0.7
    for:
      - shell
    unless:
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
    if:
      type: string_literal
      word: restorecon
  - id: selinux-equals-zero
    desc: selinux=0 boot param disables SELinux
    crit: suspicious
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      substr: selinux=0
  - id: enforcing-equals-zero
    desc: enforcing=0 boot param, SELinux permissive
    crit: suspicious
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      substr: enforcing=0
  - id: selinux-disabled-config
    desc: Disables SELinux in config file
    crit: suspicious
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      substr: SELINUX=disabled
  - id: selinux-permissive-config
    desc: Sets SELinux permissive in config
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: string_literal
      substr: SELINUX=permissive
  - id: selinux-state-symbol
    desc: selinux_state struct, runtime-patch target
    crit: suspicious
    conf: 0.75
    for:
      - c
      - elf
    if:
      type: symbol
      exact: selinux_state
  - id: enforcing-keyword
    desc: enforcing keyword
    crit: component
    conf: 0.6
    for:
      - shell
    if:
      type: string_literal
      word: enforcing
  - id: fake-enforce-identifier
    desc: fake_enforce spoofs SELinux enforcing
    crit: suspicious
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: text
      substr: fake_enforce
  - id: sel-read-enforce-symbol
    desc: sel_read_enforce kernel enforce reader
    crit: suspicious
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: symbol
      exact: sel_read_enforce
  - id: sel-write-enforce-symbol
    desc: Patches sel_write_enforce to disable SELinux
    crit: suspicious
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: symbol
      exact: sel_write_enforce
  - id: policy-file-pattern-core
    desc: SELinux policy path marker
    crit: notable
    conf: 0.65
    for: [scripts, binaries]
    if:
      type: text
      substr: /selinux/policy
  - id: policy-file-pattern-ext-a
    desc: SELinux policy extension set A
    crit: suspicious
    conf: 0.65
    for: [scripts, binaries]
    if:
      type: text
      regex: policy\.(3[0-9]|pp|te)$
  - id: policy-file-pattern-ext-b
    desc: SELinux policy extension set B
    crit: suspicious
    conf: 0.65
    for: [scripts, binaries]
    if:
      type: text
      regex: policy\.(fc|if)$
  - id: tar-selinux-archive-marker
    # GNU tar stores the SELinux context in POSIX extended headers under the
    # "RHT.security.selinux" keyword when archiving/extracting with --selinux.
    # That prefix is unique to the archive format and is benign restore logic,
    # not anti-AV xattr tampering.
    desc: GNU tar SELinux archive-header keyword
    crit: baseline
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      substr: RHT.security.selinux
composite_rules:
  - id: unconfined-labels
    desc: Unconfined SELinux context labels
    for: [scripts, binaries]
    any:
      - id: unconfined-u-label
      - id: unconfined-r-label
      - id: unconfined-t-label
    crit: suspicious
  - id: enforcement-commands
    desc: SELinux enforcement commands
    for: [scripts, binaries]
    any:
      - id: setenforce-command
      - id: getenforce-command
      - id: selinux-enforce-sysfs
      - id: selinux-enforce-legacy
      - id: permissive-keyword
    crit: suspicious
    unless:
      - id: well-known/app/kilocode::kilo-code-native-runtime
      - id: well-known/tool/reverse-engineering/frida/
  - id: policy-commands
    desc: SELinux policy manipulation commands
    for:
      - shell
    any:
      - id: load-policy-command
      - id: semodule-command
      - id: chcon-command
      - id: restorecon-command
    crit: suspicious
  - id: policy-files
    desc: SELinux policy file references
    for: [scripts, binaries]
    any:
      - id: selinux-config-dir
      - id: policy-file-pattern
    crit: suspicious
    unless:
      - id: well-known/tool/reverse-engineering/rizin::rz-test-usage
      - id: well-known/tool/reverse-engineering/frida/
  - id: policy-file-pattern
    desc: SELinux policy binary file
    crit: suspicious
    conf: 0.65
    for: [scripts, binaries]
    any:
      - id: policy-file-pattern-core
      - id: policy-file-pattern-ext-a
      - id: policy-file-pattern-ext-b
    unless:
      - id: well-known/tool/reverse-engineering/frida/
  - id: kernel-parameters
    desc: SELinux kernel boot parameters
    for:
      - shell
    any:
      - id: selinux-equals-zero
      - id: enforcing-equals-zero
      - id: selinux-disabled-config
      - id: selinux-permissive-config
    crit: suspicious
  - id: sel-enforce-symbols
    desc: SELinux enforcement symbols
    for:
      - c
      - elf
    all:
      - id: sel-read-enforce-symbol
      - id: sel-write-enforce-symbol
    crit: suspicious
  - id: xattr-manipulation
    desc: SELinux extended attribute manipulation
    crit: suspicious
    conf: 0.75
    for: [shell, elf, so]
    unless:
      - id: tar-selinux-archive-marker
      - id: well-known/tool/reverse-engineering/rizin::rz-test-usage
      - id: well-known/tool/reverse-engineering/frida/
    all:
      - id: micro-behaviors/fs/attributes/xattr::security-selinux-xattr
    any:
      - id: micro-behaviors/fs/attributes/xattr::setxattr-func
      - id: setxattr-command
  - id: unconfined-context
    desc: SELinux unconfined context assignment
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    any:
      - id: unconfined-labels
      - id: object-r-label
    unless:
      - id: well-known/tool/reverse-engineering/frida/
    downgrade:
      any:
        - id: metadata/package/testing/presence/platform_suites/
        - id: well-known/tool/reverse-engineering/rizin::rz-test-usage
  - id: policy-manipulation
    desc: SELinux policy load or manipulation
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    any:
      - id: policy-commands
      - id: policy-files
    downgrade:
      any:
        - id: micro-behaviors/dylib/library/family/
        - id: metadata/package/testing/presence/platform_suites/
        - id: metadata/build/autotools
  - id: selinux-state-enforcing
    desc: SELinux state with enforcing keyword
    for:
      - c
      - elf
    all:
      - id: selinux-state-symbol
      - id: enforcing-keyword
    crit: suspicious
  - id: fake-enforce-selinux
    desc: Fake enforce with SELinux state
    for:
      - c
      - elf
    all:
      - id: fake-enforce-identifier
      - id: selinux-state-symbol
    crit: suspicious
  - id: runtime-patch
    desc: Runtime kernel patch to disable SELinux
    crit: suspicious
    conf: 0.95
    for:
      - c
      - elf
    any:
      - id: selinux-state-enforcing
      - id: sel-enforce-symbols
      - id: fake-enforce-selinux
  - id: bypass-comp
    desc: SELinux bypass detected
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    needs: 2
    any:
      - id: xattr-manipulation
      - id: unconfined-context
      - id: enforcement-commands
      - id: kernel-parameters
      - id: runtime-patch
    unless:
      - id: well-known/tool/reverse-engineering/rizin::rz-test-usage
      - id: well-known/tool/reverse-engineering/frida/
