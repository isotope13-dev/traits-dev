defaults:
  platforms: [unix]
  crit: suspicious
  attack: T1562.001
  for: [shell]
traits:
  - id: sysctl-nmi-watchdog-disable
    desc: Disables NMI watchdog with sysctl
    conf: 0.85
    if:
      type: text
      regex: '(?m)^\s*sysctl\s+(-w\s+)?kernel\.nmi_watchdog\s*=\s*0'
  - id: echo-nmi-watchdog-disable
    desc: Disables NMI watchdog by writing zero
    conf: 0.85
    if:
      type: text
      regex: '(?m)^\s*echo\s+0\s*>\s*.{0,50}nmi_watchdog'
  - id: aliyun-agent-kill
    desc: Kills Aliyun security agent
    conf: 0.95
    if:
      type: text
      regex: '(?i)\b(pkill|kill)\b.{0,20}\baliyun\b'
  - id: aliyun-agent-uninstall
    desc: Uninstalls Aliyun security agent
    conf: 0.9
    if:
      type: text
      regex: '(?i)\baegis\b.{0,20}\buninstall\b'
  - id: aliyun-agent-stop
    desc: Stops Aliyun security agent
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bsystemctl\s+stop\s+aliyun\b'
  - id: qcloud-agent-uninstall
    desc: Uninstalls QCloud security agent
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bqcloud\b.{0,30}\buninstall\b'
  - id: aegis-agent-uninstall
    desc: Uninstalls Aegis security agent
    conf: 0.9
    if:
      type: text
      regex: '(?i)\baegis\b.{0,30}\buninstall\b'
  - id: yunjing-agent-uninstall
    desc: Uninstalls YunJing security agent
    conf: 0.9
    if:
      type: text
      regex: '(?i)\byunjing\b.{0,30}\buninstall\b'
composite_rules:
  - id: nmi-watchdog-disable
    desc: NMI watchdog disable (crash detection)
    crit: suspicious
    conf: 0.85
    any:
      - id: sysctl-nmi-watchdog-disable
      - id: echo-nmi-watchdog-disable
  - id: aliyun-agent-disable
    desc: Disables Aliyun security agent
    crit: suspicious
    conf: 0.95
    any:
      - id: aliyun-agent-kill
      - id: aliyun-agent-uninstall
      - id: aliyun-agent-stop
  - id: cloud-agent-uninstall
    desc: Uninstalls cloud security agent
    crit: suspicious
    conf: 0.9
    any:
      - id: qcloud-agent-uninstall
      - id: aegis-agent-uninstall
      - id: yunjing-agent-uninstall
  - id: multi-agent-disable
    desc: Multiple monitoring agents disabled
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: objectives/evasion/anti-av/platform/agent::aliyun-agent-disable
      - id: objectives/evasion/anti-av/platform/agent::cloud-agent-uninstall
      - id: objectives/evasion/anti-av/platform/agent::nmi-watchdog-disable
