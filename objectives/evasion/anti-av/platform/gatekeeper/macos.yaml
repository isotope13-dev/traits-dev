defaults:
  platforms: [macos]
  for: [scripts, binaries]
  attack: T1553.001
traits:
  - id: xattr-clear-before-exec
    desc: xattr -c followed by chmod/execute
    crit: suspicious
    conf: 0.9
    for:
      - shell
    if:
      type: text
      regex: xattr\s+-c\s+[^&\n]{1,120}&&[^&\n]{0,120}(chmod|\.\/)
  - id: macos-add-trusted-cert
    desc: macOS trusted certificate command
    crit: notable
    conf: 0.95
    attack: T1553.004
    for:
      - scripts
    if:
      type: text
      regex: security\s+add-trusted-cert
    unless:
      - id: metadata/signed/developer::progress-software-corporation
      - type: text
        substr: "Caddy Local CA Trust"
  - id: macos-set-web-proxy
    desc: macOS web proxy command
    crit: notable
    conf: 0.9
    attack: T1090
    if:
      type: raw
      regex: networksetup\s+-set(secure)?webproxy
  - id: curl-xattr-chmod-chain
    desc: curl+xattr+chmod execution chain
    crit: suspicious
    conf: 0.95
    for:
      - shell
    if:
      type: text
      regex: curl.{0,100}xattr.{0,100}chmod.{0,100}\./
composite_rules:
  - id: pgrep-av-product-loop
    desc: Shell enumerates macOS AV products via pgrep / ps
    crit: suspicious
    conf: 0.94
    attack: T1518.001
    mbc: B0013
    for: [shell, applescript]
    all:
      - id: objectives/discovery/host/security::security-software-discovery-macos
      - id: micro-behaviors/process/enumerate/shell
    near_lines: 8
  - id: gatekeeper-bypass
    desc: macOS Gatekeeper bypass via xattr
    crit: suspicious
    conf: 0.9
    for:
      - shell
    all:
      - id: micro-behaviors/fs/attributes/xattr::xattr-clear
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
  - id: dropper-gatekeeper-bypass
    desc: Download and execute with Gatekeeper bypass (hostile)
    crit: hostile
    conf: 0.95
    for:
      - shell
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: micro-behaviors/fs/attributes/xattr::xattr-clear
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
      - id: micro-behaviors/process/create/script/file::shell-script-relative-execution
  - id: tmpdir-gatekeeper-download-exec
    desc: TMPDIR download execution clears quarantine
    crit: hostile
    conf: 0.98
    for: [shell]
    all:
      - id: objectives/command-and-control/dropper/delivery/download-execute::tmpdir-curl-download-exec
      - id: xattr-clear-before-exec
  - id: clickfix-payload-delivery
    desc: ClickFix-style download, unquarantine, and execute in /tmp (hostile)
    crit: hostile
    conf: 0.98
    for: [shell]
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: micro-behaviors/fs/path/temp::unix-temp
      - id: micro-behaviors/fs/attributes/xattr::xattr-clear
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
      - id: micro-behaviors/process/create/shell/invoke::shell-tmp-execution
