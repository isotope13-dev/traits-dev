defaults:
  platforms: [windows]
  for: [class, jar, zip]
  attack: "T1562.001"
traits:
  - id: av-keyword-output-scan
    desc: Scans process output for AV terms
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '(?s)virus.{0,120}threat.{0,120}malware.{0,120}blocked'
  - id: defender-quarantine-scan
    desc: Scans output for Defender quarantine
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '(?s)quarantine.{0,120}defender'
composite_rules:
  - id: java-payload-av-telemetry
    desc: Java payload antivirus telemetry
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
      - id: av-keyword-output-scan
    any:
      - id: defender-quarantine-scan
      - id: micro-behaviors/communications/http/webhook::discord-webhook-path-raw
    needs: 1
