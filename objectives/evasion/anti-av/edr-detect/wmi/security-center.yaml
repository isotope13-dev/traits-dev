defaults:
  for:
    - pe
    - dll
    - csharp
  crit: component
  conf: 0.9
  mbc: B0013
  platforms:
    - windows
traits:
  - id: renamed-wmic-binary
    desc: Renamed WMIC binary execution
    crit: suspicious
    conf: 0.96
    for: [batch, powershell, pe, dll, csharp]
    if:
      type: text
      regex: '(?i)wmic\.exe\.bak'
  - id: security-center2-namespace
    desc: WMI SecurityCenter2 namespace
    for: [batch, powershell, pe, dll, csharp]
    if:
      type: text
      regex: root[/\\]SecurityCenter2
      case_insensitive: true
  - id: antivirus-product-class
    desc: WMI AntivirusProduct class query
    for: [batch, powershell, pe, dll, csharp]
    if:
      type: text
      substr: AntivirusProduct
  - id: firewall-product-class
    desc: WMI FirewallProduct class query
    for: [batch, powershell, pe, dll, csharp]
    if:
      type: text
      substr: FirewallProduct
  - id: antispyware-product-class
    desc: WMI AntiSpywareProduct class query
    for: [batch, powershell, pe, dll, csharp]
    if:
      type: text
      substr: AntiSpywareProduct
  - id: antispyware-instanceguid-query
    desc: AntiSpywareProduct instanceGuid lookup
    crit: notable
    if:
      type: text
      substr: SELECT instanceGuid, __PATH FROM AntiSpywareProduct
  - id: display-name-field
    desc: Security product displayName field
    crit: baseline
    if:
      type: text
      substr: displayName
composite_rules:
  - id: security-product-enumeration
    desc: Security product enumeration via WMI
    crit: suspicious
    conf: 0.95
    attack: T1518.001
    all:
      - id: security-center2-namespace
    any:
      - id: antivirus-product-class
      - id: firewall-product-class
      - id: antispyware-product-class
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/binary/vendor::is-microsoft-named
      - id: antispyware-instanceguid-query
  - id: renamed-wmic-security-enumeration
    desc: Renamed WMIC security enumeration
    crit: hostile
    conf: 0.98
    attack: "T1518.001, T1036"
    for: [batch, powershell, pe, dll, csharp]
    all:
      - id: renamed-wmic-binary
      - id: security-center2-namespace
    any:
      - id: antivirus-product-class
      - id: firewall-product-class
      - id: antispyware-product-class
