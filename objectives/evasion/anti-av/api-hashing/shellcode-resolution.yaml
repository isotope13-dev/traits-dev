defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: api-hash-kernel32-192299a5
    desc: 'KERNEL32.DLL shellcode hash (0x192299a5)'
    crit: suspicious
    if:
      type: hex
      section: '.text'
      pattern: 'a5 99 22 19'
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor/
        - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: virtualprotect-suffix-resolution
    desc: "Resolve VirtualProtect via 'ect\0' suffix"
    crit: suspicious
    if:
      type: hex
      section: '.text'
      pattern: '81 ?? 65 63 74 00 83 ?? 00'
  - id: wide-string-uppercase-mask
    desc: 'Wide string case-insensitive hashing trick'
    crit: suspicious
    if:
      type: hex
      section: '.text'
      pattern: '81 ?? df 00 df 00'
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/lang/compiler/managed::mscorlib
