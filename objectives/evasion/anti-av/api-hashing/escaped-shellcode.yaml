# Import concealment inside a shellcode blob that has been emitted into
# source/script text as "\xNN" escapes.
#
# The sibling shellcode-resolution.yaml covers the same objective for PE files.
# A shellcode blob living in a script has no import table, no section table and
# no API name strings, so none of the PE-oriented rules can see it — yet the
# evasion is identical and, in this container, more complete: neither an AV
# import scan nor a reader skimming the file learns which APIs it calls.
#
# Precision comes from requiring the payload container (escaped byte rows) plus
# BOTH halves of the resolver: the TEB self-reference that opens the PEB walk
# and the multiply-by-31 name-hash fold that identifies exports without naming
# them. Each is a fixed multi-byte x86 idiom that does not collide by chance in
# a large blob, and legitimate escaped data (keys, test vectors, compressed
# resources) contains neither.
defaults:
  platforms: [windows]
  for: [c, cpp, python, powershell, ruby, php, javascript]
  attack: T1027.002
  mbc: F0004
composite_rules:
  - id: escaped-x86-apihash-shellcode
    desc: Escaped x86 shellcode resolves APIs by hash
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/embedded/payload/array::quoted-byte-escape-rows
      - id: micro-behaviors/os/api-resolution/hash-based::escaped-x86-teb-self-ref
      - id: micro-behaviors/os/api-resolution/hash-based::escaped-x86-api-name-hash-fold
    # A curated offensive payload library is reference data an operator reads,
    # not an attack staged for delivery — still worth surfacing, one level down.
    downgrade:
      any:
        - id: well-known/tool/offensive/payload-corpus::payloadsallthethings-reference
