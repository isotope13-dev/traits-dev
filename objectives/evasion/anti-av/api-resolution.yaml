defaults:
  for:
    - c
    - cpp
  platforms:
    - windows
  attack: T1027.007
composite_rules:
  - id: export-parsing
    desc: PE export table parsing
    crit: notable
    conf: 0.8
    for:
      - pe
      - dll
    needs: 2
    any:
      - id: objectives/evasion/process/injection::asm-manual-import-export-dir
      - id: objectives/evasion/process/injection::asm-manual-import-addr-names
      - id: micro-behaviors/os/api-resolution/hash-based::address-of-name-ordinals
    downgrade:
      any:
        - type: text
          word: ExportTable
        - id: metadata/binary/symbols::ollydbg-plugin-export
        - id: metadata/binary/framework::dotnet-metadata
        - id: micro-behaviors/fs/file/section::pe-viewer-header-labels
  - id: manual-winapi-resolution
    desc: Manual Windows API resolution
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/api-resolution/manual::peb-module-walk
      - id: micro-behaviors/os/api-resolution/manual::manual-export-resolution
