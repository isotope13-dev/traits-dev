# Manual Windows API Resolution
# Combines PEB module walk + export directory parsing to resolve APIs
# without using GetProcAddress - a common AV evasion technique
# ATT&CK: T1027.007 (Dynamic API Resolution)
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1027.007
composite_rules:
  - id: manual-winapi-resolution
    desc: Manual Windows API resolution
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/api-resolution/manual::peb-module-walk
      - id: micro-behaviors/os/api-resolution/manual::manual-export-resolution
