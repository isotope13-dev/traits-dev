defaults:
  for: [pe, dll]
  platforms: [windows]
composite_rules:
  - id: imagehlp-api-unhook
    desc: imagehlp symbol resolution with memory remapping (API unhooking)
    crit: suspicious
    conf: 0.9
    attack: T1562.001
    all:
      - id: micro-behaviors/process/debug/symbol::imagehlp-symbol-enumeration
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/dylib/load/runtime::load-library-a
    unless:



      - id: metadata/signed/platform/
      - id: well-known/lib/electron::v8-isolate-marker
      - id: metadata/signed/developer::opera-norway-as
      - id: metadata/signed/developer::nvidia-corporation
      - id: metadata/signed/developer::google-llc
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/family/
  - id: imagehlp-reloc-strip
    desc: RemoveRelocations with symbol enumeration (anti-analysis)
    crit: suspicious
    conf: 0.93
    attack: T1027
    all:
      - id: micro-behaviors/process/debug/symbol::remove-relocations
      - id: micro-behaviors/process/debug/symbol::imagehlp-symbol-enumeration
    unless:
      - id: metadata/signed/platform/
      - id: well-known/lib/wine/
      - id: well-known/lib/microsoft-imagehlp/
