defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: pdfium-ref
    desc: PDFium library marker
    crit: component
    if:
      type: text
      case_insensitive: true
      substr: pdfium

  - id: electron-linkedbinding-ref
    desc: Electron runtime linkedBinding marker
    crit: component
    if:
      type: text
      substr: process._linkedBinding("electron_

composite_rules:
  - id: imagehlp-active-symbol-resolution
    desc: imagehlp active symbol resolution
    crit: component
    conf: 0.88
    any:
      - id: micro-behaviors/process/debug/symbol::sym-from-addr
      - id: micro-behaviors/process/debug/symbol::sym-load-module
      - id: micro-behaviors/process/debug/symbol::sym-find-file-in-path

  - id: imagehlp-api-unhook
    desc: imagehlp symbol resolution with memory remapping (API unhooking)
    crit: suspicious
    conf: 0.9
    attack: T1562.001
    all:
      - id: objectives/evasion/anti-av/imagehlp::imagehlp-active-symbol-resolution
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/dylib/load::load-library-a
    needs: 1
    unless:
      - id: objectives/evasion/anti-av/imagehlp::pdfium-ref
      - id: objectives/evasion/anti-av/imagehlp::electron-linkedbinding-ref
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/developer::valve-corp.
      - id: metadata/binary/installer::known-benign-installer

  - id: imagehlp-reloc-strip
    desc: RemoveRelocations with symbol enumeration (anti-analysis)
    crit: suspicious
    conf: 0.93
    attack: T1027
    all:
      - id: micro-behaviors/process/debug/symbol::remove-relocations
      - id: micro-behaviors/process/debug/symbol::imagehlp-symbol-enumeration
    unless:
      - id: metadata/signed/platform::microsoft
