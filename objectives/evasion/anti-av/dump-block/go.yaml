# Anti-dump behavior in a Go loader is an evasion objective, not a generic
# Go-runtime property. The marker is combined with the hollowing chain before
# it is escalated to hostile.
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1562

traits:
  - id: go-anti-dump-marker
    desc: Go anti-dump routine marker
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: anti-dump
  - id: go-minidump-patch-marker
    desc: Go MiniDump patch routine marker
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: patchMiniDump
  - id: go-external-process-block-marker
    desc: Go external-process access block marker
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: denyExternalProcessAccess

composite_rules:
  - id: go-anti-dump-routine-marker
    desc: Go anti-dump or external-process access block
    crit: suspicious
    conf: 0.95
    any:
      - id: go-anti-dump-marker
      - id: go-minidump-patch-marker
      - id: go-external-process-block-marker
  - id: go-anti-dump-hollowing-loader
    desc: Go process hollowing loader with anti-dump defenses
    crit: hostile
    conf: 0.99
    all:
      - id: go-anti-dump-routine-marker
      - id: objectives/evasion/process/injection/hollowing::go-process-hollowing-api-chain
      - id: metadata/lang/go-build::go-cshared-dll
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
