# Firewall Disable/Evasion Detection
# ATT&CK: T1562.004 (Impair Defenses: Disable or Modify System Firewall)
# Detects firewall disabling and rule manipulation
defaults:
  crit: suspicious
  attack: "T1562.004"
  for: [shell, python, ruby, perl]
  platforms: [linux, unix]
traits:
  # === iptables Policy Changes ===
  - id: iptables-policy-accept
    desc: iptables policy set to ACCEPT
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'iptables\s+(-P|--policy)\s+(INPUT|OUTPUT)\s+ACCEPT'
  - id: ip6tables-policy-accept
    desc: ip6tables policy set to ACCEPT
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'ip6tables\s+(-P|--policy)\s+(INPUT|OUTPUT)\s+ACCEPT'
  # === UFW Disable ===
  - id: ufw-disable
    desc: UFW firewall disabled
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'ufw\s+disable'
  # === firewalld Disable ===
  - id: firewalld-stop
    desc: firewalld service stopped
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: 'systemctl\s+(stop|disable)\s+firewalld'
  # === nftables Flush ===
  - id: nft-flush
    desc: nftables flush ruleset
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: 'nft\s+flush\s+ruleset'
  # === Windows Firewall ===
  - id: netsh-firewall-off
    desc: Windows firewall disabled via netsh
    crit: suspicious
    conf: 0.95
    for: [batch, powershell]
    platforms: [windows]
    if:
      type: string
      regex: 'netsh.{0,50}firewall.{0,30}(off|disable)'
composite_rules:
  # === iptables Policy Accept ===
  - id: iptables-policy-accept-any
    desc: iptables policy set to ACCEPT
    crit: suspicious
    conf: 0.95
    any:
      - id: iptables-policy-accept
      - id: ip6tables-policy-accept
  # === Any Firewall Disabled ===
  - id: firewall-disabled
    desc: System firewall disabled
    crit: hostile
    conf: 0.95
    mbc: "F0004"
    any:
      - id: iptables-policy-accept
      - id: ip6tables-policy-accept
      - id: ufw-disable
      - id: firewalld-stop
      - id: nft-flush
      - id: netsh-firewall-off
  # === Firewall Rules Cleared ===
  - id: firewall-rules-cleared
    desc: Firewall rules flushed/cleared
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/os/firewall/iptables::iptables-flush-flag
      - id: micro-behaviors/os/firewall/iptables::iptables-delete-chain-flag
      - id: nft-flush
