# Timestomping Detection - Windows
# Behavioral composites for timestamp manipulation in evasion context
# MBC: F0006 (Timestomp)
# ATT&CK: T1070.006
#
# Note: Atomic Windows API traits moved to fs/file/timestamp/windows.yaml
# This file contains only behavioral composites

defaults:
  for: [pe, dll]
  mbc: "F0006"
  attack: "T1070.006"

composite_rules:
  - id: timestomp-with-file-copy
    desc: File timestamp modification with file operations
    crit: suspicious
    conf: 0.85
    size_max: 500000
    all:
      - id: micro-behaviors/fs/sync/fsync::set-file-time
      - id: micro-behaviors/fs/enumerate/directory::find-first-file
      - id: micro-behaviors/process/info/current::get-module-filename
    any:
      - id: micro-behaviors/io/console/output::write-file
      - id: micro-behaviors/fs/file/operations::file-create-win
