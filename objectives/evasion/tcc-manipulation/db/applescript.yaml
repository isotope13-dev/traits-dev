defaults:
  platforms:
    - macos
  for:
    - applescript
    - macho
  attack: T1555
traits:
  - id: tcc-permission-db-read
    desc: Reads the macOS TCC permission database
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: getPermDB
  - id: tcc-permission-db-write
    desc: Writes the macOS TCC permission database
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: setPermDB
  - id: tcc-permission-mass-update
    desc: Applies a bulk macOS TCC permission update
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: pmSetAll
  - id: tcc-db-alias
    desc: TCC.db file reference via AppleScript alias
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: com\.apple\.TCC.{0,20}as\s+alias|/TCC\.db.{0,20}as\s+alias
  - id: tccclickjack-string
    desc: TccClickJack tooling reference
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: TccClickJack
composite_rules:
  - id: applescript-tcc-permission-db-modification
    desc: AppleScript reads, modifies, and reapplies macOS TCC permissions
    crit: hostile
    conf: 0.99
    all:
      - id: tcc-permission-db-read
      - id: tcc-permission-db-write
      - id: tcc-permission-mass-update
