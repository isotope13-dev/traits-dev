defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1556

traits:
  - id: ruby-tcc-db-path
    desc: Ruby TCC.db path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: com.apple.TCC", "TCC.db

  - id: ruby-tcc-access-insert
    desc: Ruby TCC access insert
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: INSERT OR REPLACE INTO access

  - id: ruby-tcc-service-list
    desc: Ruby TCC service list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: kTCCServiceScreenCapture

composite_rules:
  - id: ruby-macos-tcc-db-manipulation
    desc: Ruby macOS TCC manipulation
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-tcc-db-path
      - id: ruby-tcc-access-insert
      - id: ruby-tcc-service-list
