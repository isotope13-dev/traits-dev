defaults:
  platforms: [panos, appliance, unix]
  for: [objc, macho]
  attack: T1548

traits:
  - id: objc-panos-tcc-db-path
    desc: ObjC PAN-OS TCC db path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Application Support/com.apple.TCC/TCC.db

  - id: objc-panos-tcc-access-insert
    desc: ObjC PAN-OS TCC access insert
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: INSERT OR REPLACE INTO access
    unless:
      - id: well-known/app/macos-benign/

composite_rules:
  - id: objc-panos-tcc-database-write
    desc: ObjC PAN-OS TCC database write
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-tcc-db-path
      - id: objc-panos-tcc-access-insert
