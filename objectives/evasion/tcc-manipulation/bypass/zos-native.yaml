defaults:
  platforms: [zos]
  for: [c, cpp, elf]
  attack: T1562

traits:
  - id: zos-tcc-override-file
    desc: z/OS TCC override file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/tcc_override.dat

  - id: zos-access-check-bypass
    desc: z/OS access check bypass
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ACCESS_CHECK_BYPASS=1

  - id: zos-racroute-override
    desc: z/OS RACROUTE override
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: RACROUTE_OVERRIDE=1

  - id: zos-audit-suppress
    desc: z/OS audit suppress flag
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: AUDIT_SUPPRESS=1

composite_rules:
  - id: zos-tcc-access-bypass
    desc: z/OS TCC access bypass
    crit: hostile
    conf: 0.98
    all:
      - id: zos-tcc-override-file
    needs: 2
    any:
      - id: zos-access-check-bypass
      - id: zos-racroute-override
      - id: zos-audit-suppress
