defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: ccutil-reset-appleevents
    desc: tccutil reset AppleEvents (TCC database wipe)
    crit: suspicious
    conf: 0.95
    mbc: B0047
    attack: T1070,T1562.001
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    if:
      type: text
      regex: (^|[;&|`$({\r\n])\s*(tcc|cc)util\s+reset\s+AppleEvents\b
      case_insensitive: true
    unless:
      - id: metadata/build/make/
      - id: well-known/app/nix-darwin::nix-darwin-source-context
      - id: well-known/app/securew2-joinnow::recognized-securew2-joinnow
  - id: ccutil-reset-generic
    desc: "tccutil reset command"
    crit: suspicious
    conf: 0.9
    mbc: B0047
    attack: T1070,T1562.001
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    if:
      type: text
      regex: (^|[;&|`$({\r\n])\s*(tccutil|ccutil)\s+reset\b
      case_insensitive: true
    unless:
      - id: metadata/build/make/
      - id: well-known/app/nix-darwin::nix-darwin-source-context
      - id: well-known/app/securew2-joinnow::recognized-securew2-joinnow
  - id: tcc-delete-command
    desc: TCC database deletion or modification
    crit: suspicious
    conf: 0.85
    attack: T1070,T1562.001
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    if:
      type: text
      regex: (^|[;&|`$({\r\n])\s*tccutil\s+reset\b|rm\s+.{0,50}tcc\.db
      case_insensitive: true
    unless:
      - id: metadata/build/make/
      - id: well-known/app/nix-darwin::nix-darwin-source-context
      - id: well-known/app/securew2-joinnow::recognized-securew2-joinnow
composite_rules:
  - id: tcc-bypass
    desc: macOS TCC database evasion
    crit: suspicious
    conf: 0.95
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    any:
      - id: ccutil-reset-appleevents
      - id: tcc-delete-command
    unless:
      - id: metadata/build/make/
      - id: well-known/app/nix-darwin::nix-darwin-source-context
      - id: well-known/app/securew2-joinnow::recognized-securew2-joinnow
