defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: ccutil-reset-appleevents
    desc: tccutil reset AppleEvents (TCC database wipe)
    crit: suspicious
    conf: 0.95
    mbc: B0047
    attack: T1070,T1562.001
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    if:
      type: text
      regex: (tcc|cc)util\s+reset\s+AppleEvents
      case_insensitive: true
  - id: ccutil-reset-generic
    desc: ccutil reset command (TCC database manipulation)
    crit: suspicious
    conf: 0.9
    mbc: B0047
    attack: T1070,T1562.001
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    if:
      type: text
      word: ccutil
  - id: tcc-delete-command
    desc: TCC database deletion or modification
    crit: suspicious
    conf: 0.85
    attack: T1070,T1562.001
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    if:
      type: text
      regex: tccutil\s+reset|rm\s+.{0,50}tcc\.db
      case_insensitive: true
composite_rules:
  - id: tcc-bypass
    desc: macOS TCC database evasion
    crit: suspicious
    conf: 0.95
    platforms:
      - macos
    for:
      - shell
      - python
      - javascript
      - macho
    any:
      - id: ccutil-reset-appleevents
      - id: tcc-delete-command
