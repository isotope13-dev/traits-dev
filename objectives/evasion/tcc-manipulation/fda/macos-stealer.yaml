# Full Disk Access (FDA / TCC) gating used by macOS stealers before
# harvesting browser DBs and Documents under TCC-protected paths.
defaults:
  platforms: [macos]
  for: [macho]
  attack: "T1548"
  mbc: "B0028"

traits:
  - id: waiting-for-full-disk-access
    desc: Waits for Full Disk Access grant
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: Waiting for Full Disk Access

  - id: no-fda-cli-flag
    desc: Full Disk Access skip CLI flag
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)--no-fda\b'

  - id: skip-tcc-protected-flag
    desc: Skips TCC-protected paths during collection
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: skipTCCProtected

composite_rules:
  - id: macos-fda-gated-browser-theft
    desc: FDA-gated browser credential theft
    crit: hostile
    conf: 0.99
    attack: "T1548,T1555.003"
    all:
      - id: waiting-for-full-disk-access
      - id: objectives/credential-access/browser/multi-target::collect-browser-data-routine
    any:
      - id: no-fda-cli-flag
      - id: skip-tcc-protected-flag
      - id: micro-behaviors/ui/window/form-input::macos-secure-text-field-control
