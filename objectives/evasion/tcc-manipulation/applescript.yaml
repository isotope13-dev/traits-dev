defaults:
  platforms:
    - macos
  for:
    - applescript
    - macho
  attack: T1555
traits:
  - id: tcc-db-alias
    desc: TCC.db file reference via AppleScript alias
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: com\.apple\.TCC.{0,20}as\s+alias|/TCC\.db.{0,20}as\s+alias
  - id: tcc-path-ref
    desc: com.apple.TCC directory path reference
    crit: notable
    conf: 0.8
    for: [applescript, macho, shell, scripts]
    if:
      type: text
      regex: com\.apple\.TCC[/"]
  - id: tccclickjack-string
    desc: TccClickJack tooling reference
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: TccClickJack
composite_rules:
  - id: tcc-finder-db-replace
    desc: TCC database replacement via Finder AppleEvents (TCC bypass)
    crit: hostile
    conf: 0.97
    attack: T1548
    all:
      - id: objectives/collection/file-copy/finder::duplicate-file
    any:
      - id: tcc-db-alias
      - id: tcc-path-ref
