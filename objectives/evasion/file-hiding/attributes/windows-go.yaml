defaults:
  for: [go, pe]
  platforms: [windows]
  attack: T1564.001
composite_rules:
  - id: go-hide-file-attributes
    desc: Go file hiding via hidden attribute
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/fs/file/attributes::set-file-attributes-go
      - id: micro-behaviors/fs/file/attributes::go-hidden-file-attribute-constant
  - id: go-hide-system-file-attributes
    desc: Go file hiding via hidden and system attributes
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/fs/file/attributes::set-file-attributes-go
      - id: micro-behaviors/fs/file/attributes::go-system-file-attribute-constant
