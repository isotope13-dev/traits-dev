defaults:
  for: [go, pe]
  platforms: [windows]
  attack: T1564.001
traits:
  - id: file-attribute-hidden-go
    desc: Go hidden file attribute flag
    crit: component
    conf: 0.86
    if:
      type: text
      word: "FILE_ATTRIBUTE_HIDDEN"
  - id: file-attribute-system-go
    desc: Go system file attribute flag
    crit: component
    conf: 0.84
    if:
      type: text
      word: "FILE_ATTRIBUTE_SYSTEM"
composite_rules:
  - id: go-hide-file-attributes
    desc: Go file hiding via hidden attribute
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/fs/file/attributes::set-file-attributes-go
      - id: file-attribute-hidden-go
  - id: go-hide-system-file-attributes
    desc: Go file hiding via hidden and system attributes
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/fs/file/attributes::set-file-attributes-go
      - id: file-attribute-system-go
