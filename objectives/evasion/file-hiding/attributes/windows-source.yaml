# File hiding via attributes - Windows C/C++ source
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1564.001
traits:
  - id: set-file-attributes-source
    desc: SetFileAttributes API in source
    crit: baseline
    conf: 0.88
    if:
      type: symbol
      exact: "SetFileAttributes"
  - id: file-attribute-hidden-source
    desc: FILE_ATTRIBUTE_HIDDEN flag in source
    crit: notable
    conf: 0.88
    if:
      type: raw
      word: "FILE_ATTRIBUTE_HIDDEN"
composite_rules:
  - id: hide-file-attributes
    desc: Hide file via FILE_ATTRIBUTE_HIDDEN
    crit: notable
    conf: 0.9
    all:
      - id: set-file-attributes-source
      - id: file-attribute-hidden-source
