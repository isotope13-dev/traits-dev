defaults:
  platforms: [openbsd, bsd, unix]
  for: [lua]
  attack: T1564.001

traits:
  - id: lua-chflags-hidden
    desc: Lua uses chflags hidden
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: chflags hidden

  - id: lua-chflags-schg
    desc: Lua uses chflags schg
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: chflags schg

composite_rules:
  - id: lua-openbsd-chflags-file-hiding
    desc: Lua OpenBSD chflags file hiding
    crit: hostile
    conf: 0.98
    all:
      - id: lua-chflags-hidden
      - id: lua-chflags-schg

