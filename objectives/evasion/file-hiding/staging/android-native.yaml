defaults:
  platforms: [android]
  for: [elf]
  attack: "T1564.001"
  mbc: "F0005"

composite_rules:
  - id: android-hidden-local-tmp-loader-stage
    desc: Android hidden local tmp loader stage
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/temp::android-hidden-local-tmp-dotfile
      - id: objectives/command-and-control/dropper/delivery/native-stage::native-stage-new-format
      - id: objectives/command-and-control/dropper/delivery/native-stage::app-process-launch-name
    any:
      - id: micro-behaviors/communications/http/get::manual-http10-dynamic-get
      - id: micro-behaviors/fs/path/temp::android-local-tmp-path
