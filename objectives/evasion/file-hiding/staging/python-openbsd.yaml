defaults:
  platforms: [openbsd, bsd, unix]
  for: [python, pyc]
  attack: T1564.001

traits:
  - id: python-openbsd-hidden-var-cache
    desc: Python hidden var cache
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /var/.X11-unix/.cache

  - id: python-openbsd-hidden-x11-lock
    desc: Python hidden X11 lock
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.X11-lock-

composite_rules:
  - id: python-openbsd-hidden-staging
    desc: Python hidden staging files
    crit: hostile
    conf: 0.98
    all:
      - id: python-openbsd-hidden-var-cache
      - id: python-openbsd-hidden-x11-lock
