defaults:
  platforms:
    - unix
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.9
traits:
  - id: suspicious-hidden-log
    desc: Hidden log file under /var/log
    if:
      type: text
      regex: /var/log/\.[a-z]{3,12}\b
  - id: suspicious-tmp-log
    desc: Python write under /var/tmp
    for: [python, pyc]
    if:
      type: symbol
      kind: call
      regex: '^(open|os\.open|write_file|pathlib\.Path\.write_text)$'
      arg:
        kind: string
        regex: '/var/tmp/[A-Za-z0-9._-]{3,40}\.(log|txt|l)\b'
