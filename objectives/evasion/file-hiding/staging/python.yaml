# Hidden Staging Directory Creation
# Detects creation of hidden staging directories for malware
# ATT&CK: T1564.001 (Hidden Files and Directories)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: python-home-hidden-staging
    desc: Creates hidden staging directory in user home
    crit: suspicious
    conf: 0.95
    for: [python]
    mbc: "E1564"
    attack: "T1564.001"
    all:
      - id: objectives/evasion/file-hiding/system-path::home-hidden-dir-exec
      - id: micro-behaviors/process/create/subprocess::process-execution
    unless:
      - id: well-known/app/calvyn-code
      - id: metadata/package/testing/
      - id: well-known/app/yolo-jail::python-source-marker
