# Hidden-Path Process Execution
# Detects process execution adjacent to an absolute hidden home path.
# ATT&CK: T1564.001 (Hidden Files and Directories)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: python-hidden-home-path-execution
    desc: Hidden home path used near process execution
    crit: suspicious
    conf: 0.95
    for: [python]
    mbc: "E1564"
    attack: "T1564.001"
    all:
      - id: micro-behaviors/fs/path/location::absolute-home-hidden-path
      - id: micro-behaviors/process/create/subprocess::process-execution
    near_lines: 8
    unless:
      - id: well-known/app/calvyn-code
      - id: metadata/package/testing/
      - id: well-known/app/yolo-jail::python-source-marker
