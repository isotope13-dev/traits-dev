defaults:
  platforms: [solaris, unix]
  for: [swift]
  attack: T1564

traits:
  - id: swift-solaris-hidden-attr
    desc: Swift Solaris hidden attr
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: user.hidden

  - id: swift-proc-fd-unlink-hide
    desc: Swift proc fd unlink hide
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /proc/\(getpid())/fd/\(fd)

  - id: swift-hidden-dotfile-set
    desc: Swift hidden dotfile set
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.svc_payload\.dat[\s\S]{0,180}\.module_state\.tmp'

composite_rules:
  - id: swift-solaris-file-hiding
    desc: Swift Solaris file hiding
    crit: hostile
    conf: 0.98
    all:
      - id: swift-solaris-hidden-attr
      - id: swift-hidden-dotfile-set
    any:
      - id: swift-proc-fd-unlink-hide
