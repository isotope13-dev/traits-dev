defaults:
  platforms: [unix]
  for: [python]
  attack: T1564.001
  mbc: F0005

composite_rules:
  - id: python-hidden-redundant-persistence
    desc: Python restores hidden copies across persistent services
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/fs/file/copy::python-copy-destination-list
      - id: micro-behaviors/fs/path/location::hidden-dir-literal
      - id: micro-behaviors/fs/file/stat::path-exists
      - id: micro-behaviors/fs/file/open::binary-write-mode
      - id: micro-behaviors/os/service/control::python-launchctl-argv
      - id: micro-behaviors/os/autorun/scheduled::crontab-install-command
