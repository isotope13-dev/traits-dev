defaults:
  for: [go]
  platforms: [windows]
  attack: T1564.004
  crit: suspicious
  conf: 0.9

traits:
  - id: go-ads-read-write-api
    desc: Go alternate data stream read/write API tests
    if:
      type: text
      regex: 'Write\(path,\s*".{1,40}"[\s\S]{0,180}Read\(path,\s*".{1,40}"'

  - id: go-ads-list-delete-api
    desc: Go alternate data stream list/delete API tests
    if:
      type: text
      regex: 'List\(path\)[\s\S]{0,260}Delete\(path,\s*".{1,40}"'

  - id: go-ads-hidden-payload-string
    desc: Go alternate data stream hidden payload
    if:
      type: string_literal
      exact: secret ADS payload

  - id: go-ads-directory-stream-test
    desc: Go directory alternate data stream test
    if:
      type: string_literal
      exact: directory ADS payload

  - id: go-undeletable-file-api
    desc: Go undeletable file API
    if:
      type: text
      word: CreateUndeletable

  - id: go-undeletable-read-api
    desc: Go undeletable file read API
    if:
      type: text
      word: ReadUndeletable

  - id: go-reserved-name-trick-comment
    desc: Go reserved-name trailing dots trick
    if:
      type: string_literal
      exact: path should use reserved name trick

composite_rules:
  - id: go-alternate-data-stream-hiding
    desc: Go alternate data stream hiding tests
    crit: suspicious
    conf: 0.95
    all:
      - id: go-ads-read-write-api
    any:
      - id: go-ads-list-delete-api
      - id: go-ads-hidden-payload-string
      - id: go-ads-directory-stream-test

  - id: go-undeletable-reserved-name-hiding
    desc: Go reserved-name undeletable file hiding
    crit: hostile
    conf: 0.96
    all:
      - id: go-undeletable-file-api
      - id: go-undeletable-read-api
      - id: go-reserved-name-trick-comment
