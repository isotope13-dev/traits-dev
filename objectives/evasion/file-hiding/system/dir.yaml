defaults:
  crit: suspicious
  conf: 0.8
  attack: T1564.001
  platforms:
    - linux
    - unix
    - macos
traits:
  - id: hidden-file-system-dir
    desc: Hidden file in system directory
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      regex: ^/(var|usr)/.{0,200}\/\.[^/]{1,50}$
    not:
      - substr: /var/db/
    unless:
      - type: raw
        substr: /../
      - type: raw
        substr: /./
      - type: raw
        substr: /cargo/registry/
      - type: raw
        substr: /rustc-
