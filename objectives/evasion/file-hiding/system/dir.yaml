defaults:
  crit: suspicious
  conf: 0.8
  attack: T1564.001
  platforms:
    - unix
traits:
  - id: hidden-file-system-dir
    desc: Hidden file in system directory
    for: [scripts, binaries]
    if:
      type: text
      regex: ^/(var|usr)/.{0,200}\/\.[^/]{1,50}$
    not:
      - /var/run/.heim_org.h5l.kcm-socket
      - substr: /var/tmp/.fsrlast_xfs
      - substr: /usr/bin/.sysless
      - substr: /var/db/
    unless:
      - type: raw
        substr: /../
      - type: raw
        substr: /./
      - type: text
        substr: /cargo/registry/
      - type: text
        substr: /rustc-
    downgrade:
      any:
        - id: metadata/signed/platform::apple
