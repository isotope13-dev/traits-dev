defaults:
  platforms:
    - windows
  for:
    - csharp
  attack: T1564.001
traits:
  - id: hidefile-method-token
    desc: HideFile staging method token
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: text
      word: HideFile
  - id: self-copy-to-random-dir
    desc: "Copies current module into a discovered dir"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: System.IO.File.Copy(Program.me.FullyQualifiedName
  - id: quarantine-filename-prefix
    desc: Quarantine filename prefix
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Program.decrypt("aW1wZWRv")
composite_rules:
  - id: hidden-self-staging-and-jpg-quarantine
    desc: Hidden self-staging with JPG quarantine behavior
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/fs/file/attributes::hidden-attribute-usage
      - id: self-copy-to-random-dir
      - id: micro-behaviors/fs/path/media::jpg-file-pattern-source
    any:
      - id: quarantine-filename-prefix
  - id: hidden-github-stage-dropper
    desc: Hides downloaded GitHub stage on disk
    crit: hostile
    conf: 0.97
    for: [pe]
    all:
      - id: hidefile-method-token
      - id: objectives/command-and-control/dropper/delivery/download-execute::dotnet-github-httpclient-download-exec
    any:
      - id: objectives/evasion/masquerade/process/name::svchost-name
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
