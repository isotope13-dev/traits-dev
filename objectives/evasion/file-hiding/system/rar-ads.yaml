defaults:
  platforms: [windows]

composite_rules:
  - id: rar-ads-parent-traversal
    desc: RAR member hides payload in ADS traversal
    crit: suspicious
    conf: 0.96
    attack: T1564.004
    all:
      - id: metadata/file/magic/identity::rar-v5
      - id: micro-behaviors/data/archive/rar::ads-parent-traversal
      - id: micro-behaviors/data/archive/rar::repeated-ads-parent-traversal
