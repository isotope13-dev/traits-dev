defaults:
  for: [pe]
  platforms: [windows]
  attack: T1564.001
traits: []
composite_rules:
  - id: hide-file-ext-registry-tamper
    desc: Hides file extensions via registry tamper
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/file/policy/identity::explorer-advanced-path-any
      - id: metadata/file/policy/identity::hide-file-ext-value-any
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
  - id: explorer-visibility-suppression
    desc: Suppresses Explorer file visibility controls
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/policy/identity::explorer-advanced-path-any
      - id: metadata/file/policy/identity::hide-file-ext-value-any
      - id: metadata/file/policy/identity::hidden-files-value-any
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
    any:
      - id: metadata/file/policy/identity::explorer-cabinet-state-path-any
