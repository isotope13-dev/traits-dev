defaults:
  for: [pe]
  platforms: [windows]
  attack: T1564.001
traits:
  - id: explorer-advanced-path
    desc: Explorer Advanced registry path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      exact: SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced
  - id: explorer-cabinet-state-path
    desc: Explorer CabinetState registry path
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\CabinetState
  - id: hide-file-ext-value
    desc: Hide file extension value
    crit: suspicious
    conf: 0.94
    if:
      type: text
      exact: HideFileExt
  - id: hidden-files-value
    desc: Hidden files visibility value
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: Hidden
composite_rules:
  - id: explorer-visibility-suppression
    desc: Suppresses Explorer file visibility controls
    crit: hostile
    conf: 0.98
    all:
      - id: explorer-advanced-path
      - id: hide-file-ext-value
      - id: hidden-files-value
    any:
      - id: explorer-cabinet-state-path
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
