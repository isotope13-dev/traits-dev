defaults:
  for: [pe]
  platforms: [windows]
  attack: T1564.001
traits:
  - id: reg-file-import-marker
    desc: Windows .reg file import format marker
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: "Windows Registry Editor Version 5.00"
composite_rules:
  - id: hide-file-ext-registry-tamper
    desc: Hides file extensions via registry tamper
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/file/text/policy::explorer-advanced-path
      - id: metadata/file/text/policy::hide-file-ext-value
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
  - id: explorer-visibility-suppression
    desc: Suppresses Explorer file visibility controls
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/text/policy::explorer-advanced-path
      - id: metadata/file/text/policy::hide-file-ext-value
      - id: metadata/file/text/policy::hidden-files-value
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
    any:
      - id: metadata/file/text/policy::explorer-cabinet-state-path
