defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1564.001
  mbc: B0034

traits:
  - id: python-obfuscated-directory-shell-command
    desc: Indexed shell after directory creation
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'os\.makedirs\(\w+\)[\s\S]{0,120}os\.system\(\w+\[\d+\](\+\w+\[\d+\]){2,}'

  - id: python-obfuscated-key-file
    desc: Generated key written with indexed path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'generate_key\(\)[\s\S]{0,240}open\([\s\S]{0,100},\w+\[\d+\]\+\w+\[\d+\]\)'

composite_rules:
  - id: python-obfuscated-fernet-secret-storage
    desc: Obfuscated Fernet key storage via shell
    crit: hostile
    conf: 0.99
    attack: T1564.001,T1027
    mbc: B0034,C0027
    all:
      - id: python-obfuscated-directory-shell-command
      - id: python-obfuscated-key-file
      - id: micro-behaviors/crypto/symmetric/fernet::encrypt
      - id: micro-behaviors/crypto/symmetric/fernet::decrypt
