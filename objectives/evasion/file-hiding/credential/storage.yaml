defaults:
  crit: suspicious
  attack: T1564.001
  for: [scripts, binaries]
  platforms:
    - unix
traits:
  - id: hidden-nano-file
    desc: Hidden file in /usr/share/nano/
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: /usr/share/nano/\..{1,30}
  - id: hidden-usr-local-file
    desc: Python opens hidden /usr/local file
    crit: notable
    conf: 0.8
    for: [python]
    if:
      type: tree-sitter
      kind: call
      regex: '\b(open|Path)\s*\([^)]{0,120}/usr/local/\.[A-Za-z0-9_-]{1,32}'
    not:
      - regex: \.rpm\.lock
      - regex: \.build-id
      - substr: "/.*"
      - substr: /usr/local/share/fonts/.fonts
      - substr: /usr/local/share/fish ~/.config/fish
    unless:
    - id: micro-behaviors/process/interpreter/vm/
    - id: well-known/tool/detection/sast/
  - id: tmp-hidden-lock
    desc: Hidden lock file in /tmp
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: /tmp/\..{1,24}\.(lock|lck|pid)$
  - id: var-tmp-hidden-dup
    desc: Hidden file in /var/tmp
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: /var/tmp/\..{1,30}
    not:
      - substr: /var/tmp/.fsrlast_xfs
      - substr: /var/tmp/.virtual.chain.tmp
      - substr: /var/tmp/.virtual.lan.tmp
  - id: dot-lock-file
    desc: Suspicious .lock file
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: /usr/(share|lib)/.{1,30}/\.lock$
  - id: dot-config-file
    desc: Suspicious .config file in system dir
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: /usr/(share|lib)/.{1,30}/\.config$
composite_rules:
  - id: hidden-credential-storage
    desc: Credentials stored in hidden location
    crit: hostile
    conf: 0.9
    any:
      - id: hidden-nano-file
      - id: dot-lock-file
  - id: suspicious-hidden-paths
    desc: Suspicious hidden files in system directories
    crit: notable
    conf: 0.85
    any:
      - id: hidden-usr-local-file
      - id: tmp-hidden-lock
      - id: objectives/evasion/file-hiding/credential::var-tmp-hidden-dup
