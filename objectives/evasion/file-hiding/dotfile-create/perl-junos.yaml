defaults:
  platforms: [junos, appliance, unix]
  for: [perl]
  attack: T1564.001
  mbc: F0005

traits:
  - id: perl-junos-hidden-stash
    desc: Perl Junos hidden stash path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '/var/tmp/\.juniper_svc_cache|/var/log/\.juniper_svc\.log'

  - id: perl-dotfile-chmod-lock
    desc: Perl locks hidden dotfile
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'chmod\s+0000[\s\S]{0,100}\.[A-Za-z0-9_./-]+'

  - id: perl-extattr-stealth
    desc: Perl sets stealth extattr
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'extattr\s+set\s+file\s+user\.stealth'

  - id: perl-backdates-hidden-file
    desc: Perl backdates hidden files
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'utime\s+[^\n]{0,120}\$STASH_(FILE|DIR)'

composite_rules:
  - id: perl-junos-hidden-stash-evasion
    desc: Perl Junos hidden stash evasion
    crit: hostile
    conf: 0.98
    all:
      - id: perl-junos-hidden-stash
    needs: 2
    any:
      - id: perl-dotfile-chmod-lock
      - id: perl-extattr-stealth
      - id: perl-backdates-hidden-file
