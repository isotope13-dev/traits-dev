defaults:
  platforms: [unix, appliance]
  for: [shell]
  attack: T1564.001

traits:
  - id: shell-hidden-vx-cache-dir
    desc: Shell hidden cache directory
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(/tmp/\.(vx|cloud|wind)[A-Za-z0-9_.-]*|/tmp/\.vx_cache)'

  - id: shell-dev-null-mask-link
    desc: Shell dev null mask link
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ln -sf /dev/null[\s\S]{0,120}/tmp/\.'

  - id: shell-hidden-cache-chmod-zero
    desc: Shell hidden cache chmod zero
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'chmod 000 "\$.{0,80}(staging|cache).{0,80}"'

composite_rules:
  - id: shell-hidden-cache-masking
    desc: Shell hidden cache masking
    crit: hostile
    conf: 0.98
    all:
      - id: shell-hidden-vx-cache-dir
    any:
      - id: shell-dev-null-mask-link
      - id: shell-hidden-cache-chmod-zero
