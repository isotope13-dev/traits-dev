# Hidden File Detection Traits
# Detects creation of hidden dotfiles often used to hide malware
# ATT&CK: T1564.001 (Hide Artifacts: Hidden Files and Directories)
defaults:
  attack: T1564.001
  mbc: F0005
  platforms: [unix, android, ios]
  for: [shell, python, javascript, elf]
traits:
  # === Hidden file write atomic indicators ===
- id: curl-o-hidden
  desc: curl -O to hidden dotfile
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: "curl\\s+-o\\s+\\.[^\\s/]{1,120}"
- id: compiler-output-hidden-dotfile
  desc: Compiler output targets hidden dotfile
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: '-o\\s+\\.[a-zA-Z0-9._-]+'
- id: hidden-staging-file--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(touch|mktemp)[^\n]{0,120}(/dev/shm/|/tmp/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021061
- id: hidden-staging-file--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(touch|mktemp)[^\n]{0,120}(/var/tmp/|/dev/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021062
- id: hidden-staging-file--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(touch|mktemp)[^\n]{0,120}(/run/|/mnt/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021063
- id: hidden-staging-file--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(open|fopen)[^\n]{0,120}(/dev/shm/|/tmp/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021064
- id: hidden-staging-file--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(open|fopen)[^\n]{0,120}(/var/tmp/|/dev/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021065
- id: hidden-staging-file--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(open|fopen)[^\n]{0,120}(/run/|/mnt/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021066
- id: hidden-staging-file--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(creat|write)[^\n]{0,120}(/dev/shm/|/tmp/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021067
- id: hidden-staging-file--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(creat|write)[^\n]{0,120}(/var/tmp/|/dev/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021068
- id: hidden-staging-file--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(creat|write)[^\n]{0,120}(/run/|/mnt/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021069
- id: hidden-staging-file--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(chmod|curl\s+-o)[^\n]{0,120}(/dev/shm/|/tmp/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021070
- id: hidden-staging-file--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(chmod|curl\s+-o)[^\n]{0,120}(/var/tmp/|/dev/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021071
- id: hidden-staging-file--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(chmod|curl\s+-o)[^\n]{0,120}(/run/|/mnt/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021072
- id: hidden-staging-file--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(wget\s+-O|>\s*)[^\n]{0,120}(/dev/shm/|/tmp/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021073
- id: hidden-staging-file--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(wget\s+-O|>\s*)[^\n]{0,120}(/var/tmp/|/dev/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021074
- id: hidden-staging-file--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(wget\s+-O|>\s*)[^\n]{0,120}(/run/|/mnt/)\.[a-zA-Z0-9][a-zA-Z0-9._-]{2,120}\b'
  count_max: 1021075
- id: hidden-cache-install
  desc: Dot-hidden cache payload path
  crit: suspicious
  conf: 0.85
  for: [go, elf]
  if:
    type: text
    regex: \.cache/\.[a-z][a-z0-9_-]{2,32}(/|$)|\.local/share/\.[a-z][a-z0-9_-]{2,32}(/|$)
  not:
  - substr: .cache/fish/completions
  - substr: .cache/fish/generated
  - substr: .cache/etc/headscale
  - substr: .cache/rust/aarch
  - substr: .local/share/.cache
- id: native-hidden-dotfile-token
  # A whitespace-led `.ident` matches C99 designated initializers ({.x=, .width=})
  # and member access far more often than a hidden filename, so the token must be
  # quote-introduced and look like a path: an opening quote, a leading dot, and a
  # closing quote or path separator. Referencing a hidden dotfile path is a
  # notable capability (countless benign apps embed ".config"/".cache" paths); the
  # hostile intent comes from the staging composite below, not this atom alone.
  desc: Quoted hidden-dotfile path literal
  crit: notable
  conf: 0.9
  for: [c, cpp, objc]
  if:
    type: text
    regex: '["'']\.[A-Za-z0-9_][A-Za-z0-9_.-]{2,80}(/|["''])'
- id: native-file-hiding-status
  desc: Native file hiding status field
  crit: suspicious
  conf: 0.94
  for: [c, cpp, objc, elf]
  if:
    type: text
    substr: file_hiding=intercept
composite_rules:
- id: native-hidden-dotfile-staging
  desc: Native hidden dotfile staging
  crit: hostile
  conf: 0.97
  all:
  - id: native-hidden-dotfile-token
  - id: native-file-hiding-status
  - id: micro-behaviors/fs/file/write/direct::write
- id: hidden-staging-file
  desc: Hidden file in staging directory
  crit: suspicious
  conf: 0.9
  any:
  - id: hidden-staging-file--rx-1
  - id: hidden-staging-file--rx-2
  - id: hidden-staging-file--rx-3
  - id: hidden-staging-file--rx-4
  - id: hidden-staging-file--rx-5
  - id: hidden-staging-file--rx-6
  - id: hidden-staging-file--rx-7
  - id: hidden-staging-file--rx-8
  - id: hidden-staging-file--rx-9
  - id: hidden-staging-file--rx-10
  - id: hidden-staging-file--rx-11
  - id: hidden-staging-file--rx-12
  - id: hidden-staging-file--rx-13
  - id: hidden-staging-file--rx-14
  - id: hidden-staging-file--rx-15
  unless:
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
  not:
  - substr: 'd.statSync("/run/.containerenv'
      # Openly-named project temp directories (e.g. /tmp/.netdata-foo,
      # /tmp/.X11-unix) — the leading dot is filesystem convention, not
      # concealment, when the project name is part of the path.
  - regex: '/(tmp|var/tmp|run|dev/shm)/\.(netdata|X11|ICE|Test|cache|gnupg|config)[a-zA-Z0-9._-]*'
