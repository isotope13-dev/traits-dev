defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: hide-file-msg
    desc: '"Hiding file/dir" message'
    crit: notable
    conf: 0.8
    mbc: F0005
    attack: T1564.001
    if:
      type: text
      substr: Hiding file/dir
  - id: unhide-file-msg
    desc: '"Unhiding file/dir" message'
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Unhiding file/dir
