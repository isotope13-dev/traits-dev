defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: hide-file-msg
    desc: '"Hiding file/dir" message'
    crit: notable
    conf: 0.8
    mbc: F0005
    attack: T1564.001
    if:
      type: string_value
      regex: Hiding file/dir
  - id: unhide-file-msg
    desc: '"Unhiding file/dir" message'
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: Unhiding file/dir
