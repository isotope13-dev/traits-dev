defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
  attack: T1564.001
  mbc: F0005
traits:
  - id: usr-bin-hidden-dir
    desc: Hidden directory in /usr/bin
    crit: suspicious
    conf: 0.95
    for:
      - binaries
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: raw
      regex: /usr/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: usr-bin-hidden-exec
    desc: Executes from hidden /usr/bin dir
    crit: suspicious
    conf: 0.95
    for:
      - shell
    if:
      type: symbol
      regex: ^/usr/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: bin-hidden-dir
    desc: Hidden directory in /bin
    crit: suspicious
    conf: 0.95
    for:
      - binaries
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: raw
      regex: /bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: bin-hidden-exec
    desc: Executes from hidden /bin dir
    crit: suspicious
    conf: 0.95
    for:
      - shell
    if:
      type: symbol
      regex: ^/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: sbin-hidden-dir
    desc: Hidden directory in /sbin
    crit: suspicious
    conf: 0.95
    for:
      - binaries
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: raw
      regex: /sbin/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: sbin-hidden-exec
    desc: Executes from hidden /sbin dir
    crit: suspicious
    conf: 0.95
    for:
      - shell
    if:
      type: symbol
      regex: ^/sbin/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: usr-sbin-hidden-dir
    desc: Hidden directory in /usr/sbin
    crit: suspicious
    conf: 0.95
    for:
      - binaries
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: raw
      regex: /usr/sbin/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: usr-sbin-hidden-exec
    desc: Executes from hidden /usr/sbin dir
    crit: suspicious
    conf: 0.95
    for:
      - shell
    if:
      type: symbol
      regex: ^/usr/sbin/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: usr-local-bin-hidden-dir
    desc: Hidden directory in /usr/local/bin
    crit: suspicious
    conf: 0.95
    for:
      - binaries
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: raw
      regex: /usr/local/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: usr-local-bin-hidden-exec
    desc: Executes from hidden /usr/local/bin dir
    crit: suspicious
    conf: 0.95
    for:
      - shell
    if:
      type: symbol
      regex: ^/usr/local/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: opt-hidden-dir
    desc: Hidden directory in /opt
    crit: suspicious
    conf: 0.9
    for:
      - binaries
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: raw
      regex: /opt/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: opt-hidden-exec
    desc: Executes from hidden /opt dir
    crit: suspicious
    conf: 0.9
    for:
      - shell
    if:
      type: symbol
      regex: ^/opt/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: lib-hidden-dir
    desc: Hidden directory in /lib
    crit: suspicious
    conf: 0.95
    for:
      - binaries
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: raw
      regex: /(usr/)?lib(64)?/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: lib-hidden-exec
    desc: Executes from hidden library dir
    crit: suspicious
    conf: 0.95
    for:
      - shell
    if:
      type: symbol
      regex: ^/(usr/)?lib(64)?/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: home-hidden-dir-exec
    desc: Hidden directory in /home
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: /home/\w+/\.[A-Za-z0-9][A-Za-z0-9_-]*/
    not:
      - regex: /home/\w+/\.(local|config|cache|cargo|rustup|npm|nvm|pyenv|rbenv|go|gradle|m2|vscode|docker|ssh|wasmer)/
      - regex: /home/\w+/\.virtualenvs/
      - substr: /home/linuxbrew/.linuxbrew/
  - id: var-www-hidden-dir
    desc: Hidden directory in /var/www
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: /var/www/\.[A-Za-z0-9][A-Za-z0-9_-]*/
  - id: tmp-hidden-dir
    desc: Hidden directory in /tmp
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: /tmp/\.[A-Za-z0-9][A-Za-z0-9_-]*/
    not:
      - substr: /tmp/.snap/
      - substr: /tmp/.ICE-unix
      - substr: /tmp/.X11-unix
      - substr: /tmp/.XIM-unix
    downgrade:
      any:
        - type: raw
          substr: /tmp/.X11-unix/
        - type: basename
          exact: ssh
        - type: basename
          exact: sshd
        - type: basename
          exact: Xorg
        - type: basename
          exact: xterm
composite_rules:
  - id: hidden-system-binary-path
    desc: Hidden directory in system binary path (backdoor)
    crit: suspicious
    conf: 0.95
    any:
      - id: usr-bin-hidden-dir
      - id: bin-hidden-dir
      - id: sbin-hidden-dir
      - id: usr-sbin-hidden-dir
      - id: usr-local-bin-hidden-dir
      - id: opt-hidden-dir
      - id: lib-hidden-dir
  - id: hidden-system-binary-exec
    desc: Executes from hidden system path
    crit: suspicious
    conf: 0.95
    any:
      - id: usr-bin-hidden-exec
      - id: bin-hidden-exec
      - id: sbin-hidden-exec
      - id: usr-sbin-hidden-exec
      - id: usr-local-bin-hidden-exec
      - id: opt-hidden-exec
      - id: lib-hidden-exec
  - id: hidden-user-path
    desc: Hidden directory in user-writable path
    crit: suspicious
    conf: 0.9
    any:
      - id: home-hidden-dir-exec
      - id: var-www-hidden-dir
      - id: tmp-hidden-dir
