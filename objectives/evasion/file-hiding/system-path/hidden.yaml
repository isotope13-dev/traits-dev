# Hidden Binary in System Path
# Detects execution from hidden directories in system binary paths
# This is a classic backdoor persistence technique - hiding malware in trusted paths
# ATT&CK: T1564.001 (Hide Artifacts: Hidden Files and Directories)
# ATT&CK: T1547.001 (Boot or Logon Autostart Execution)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
  attack: "T1564.001"
  mbc: "F0005"
traits:
  # Hidden directory in /usr/bin - classic backdoor staging
  - id: usr-bin-hidden-dir
    desc: Hidden directory in /usr/bin
    crit: suspicious
    conf: 0.95
    for: [python, javascript, powershell, pe, elf]
    if:
      type: raw
      regex: '/usr/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  - id: usr-bin-hidden-exec
    desc: Executes from hidden /usr/bin dir
    crit: suspicious
    conf: 0.95
    for: [shell]
    if:
      type: symbol
      regex: '^/usr/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  # Hidden directory in /bin
  - id: bin-hidden-dir
    desc: Hidden directory in /bin
    crit: suspicious
    conf: 0.95
    for: [python, javascript, powershell, pe, elf]
    if:
      type: raw
      regex: '/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  - id: bin-hidden-exec
    desc: Executes from hidden /bin dir
    crit: suspicious
    conf: 0.95
    for: [shell]
    if:
      type: symbol
      regex: '^/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  # Hidden directory in /sbin
  - id: sbin-hidden-dir
    desc: Hidden directory in /sbin
    crit: suspicious
    conf: 0.95
    for: [python, javascript, powershell, pe, elf]
    if:
      type: raw
      regex: '/sbin/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  - id: sbin-hidden-exec
    desc: Executes from hidden /sbin dir
    crit: suspicious
    conf: 0.95
    for: [shell]
    if:
      type: symbol
      regex: '^/sbin/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  # Hidden directory in /usr/sbin
  - id: usr-sbin-hidden-dir
    desc: Hidden directory in /usr/sbin
    crit: suspicious
    conf: 0.95
    for: [python, javascript, powershell, pe, elf]
    if:
      type: raw
      regex: '/usr/sbin/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  - id: usr-sbin-hidden-exec
    desc: Executes from hidden /usr/sbin dir
    crit: suspicious
    conf: 0.95
    for: [shell]
    if:
      type: symbol
      regex: '^/usr/sbin/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  # Hidden directory in /usr/local/bin
  - id: usr-local-bin-hidden-dir
    desc: Hidden directory in /usr/local/bin
    crit: suspicious
    conf: 0.95
    for: [python, javascript, powershell, pe, elf]
    if:
      type: raw
      regex: '/usr/local/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  - id: usr-local-bin-hidden-exec
    desc: Executes from hidden /usr/local/bin dir
    crit: suspicious
    conf: 0.95
    for: [shell]
    if:
      type: symbol
      regex: '^/usr/local/bin/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  # Hidden directory in /opt
  - id: opt-hidden-dir
    desc: Hidden directory in /opt
    crit: suspicious
    conf: 0.9
    for: [python, javascript, powershell, pe, elf]
    if:
      type: raw
      regex: '/opt/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  - id: opt-hidden-exec
    desc: Executes from hidden /opt dir
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: symbol
      regex: '^/opt/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  # Hidden directory in /lib or /usr/lib - library hijacking
  - id: lib-hidden-dir
    desc: Hidden directory in /lib
    crit: suspicious
    conf: 0.95
    for: [python, javascript, powershell, pe, elf]
    if:
      type: raw
      regex: '/(usr/)?lib(64)?/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  - id: lib-hidden-exec
    desc: Executes from hidden library dir
    crit: suspicious
    conf: 0.95
    for: [shell]
    if:
      type: symbol
      regex: '^/(usr/)?lib(64)?/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  # Hidden directory in user home - classic backdoor staging (e.g., /home/www/.Xl1/kde)
  # ATT&CK: T1564.001 (Hide Artifacts: Hidden Files and Directories)
  - id: home-hidden-dir-exec
    desc: Hidden directory in /home
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '/home/\w+/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
    not:
      # Common XDG user directories are normal and appear in package docs.
      - regex: '/home/\w+/\.(local|config|cache)/'
  # Hidden directory in web server paths - common webshell staging
  - id: var-www-hidden-dir
    desc: Hidden directory in /var/www
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '/var/www/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
  # Hidden directory in /tmp - temporary malware staging
  - id: tmp-hidden-dir
    desc: Hidden directory in /tmp
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: '/tmp/\.[A-Za-z0-9][A-Za-z0-9_-]*/'
    downgrade:
      any:
        - type: raw
          substr: "/tmp/.X11-unix/"
        - type: basename
          exact: "ssh"
        - type: basename
          exact: "sshd"
        - type: basename
          exact: "Xorg"
        - type: basename
          exact: "xterm"
composite_rules:
  # Any hidden directory in system binary paths
  - id: hidden-system-binary-path
    desc: Hidden directory in system binary path (backdoor)
    crit: suspicious
    conf: 0.95
    any:
      - id: usr-bin-hidden-dir
      - id: bin-hidden-dir
      - id: sbin-hidden-dir
      - id: usr-sbin-hidden-dir
      - id: usr-local-bin-hidden-dir
      - id: opt-hidden-dir
      - id: lib-hidden-dir
  - id: hidden-system-binary-exec
    desc: Executes from hidden system path
    crit: suspicious
    conf: 0.95
    any:
      - id: usr-bin-hidden-exec
      - id: bin-hidden-exec
      - id: sbin-hidden-exec
      - id: usr-sbin-hidden-exec
      - id: usr-local-bin-hidden-exec
      - id: opt-hidden-exec
      - id: lib-hidden-exec
  # Hidden directory in user-writable paths (home, www, tmp)
  - id: hidden-user-path
    desc: Hidden directory in user-writable path
    crit: suspicious
    conf: 0.9
    any:
      - id: home-hidden-dir-exec
      - id: var-www-hidden-dir
      - id: tmp-hidden-dir
