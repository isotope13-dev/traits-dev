defaults:
  platforms: [windows, unix]
  for: [scripts, shell, python, javascript, pe, elf]
  attack: T1564.001
  mbc: F0005
traits:
  - id: hidden-sbin-reference
    # Scope is the system administration binary dirs (/sbin, /usr/sbin), matching
    # this trait's name and description. The matcher previously also covered
    # /bin and /usr/bin (`s?bin`), which fired on ordinary project tool-cache dirs
    # such as Composer's PHPUnit bridge (`.../bin/.phpunit/...`). Hidden dotfiles in
    # a plain bin/ are a different, far noisier signal and do not belong under
    # "sbin" — add a dedicated trait if that coverage is needed.
    desc: Hidden sbin path
    crit: suspicious
    conf: 0.95
    if:
      type: literal
      kind: string
      regex: '(^|[\s"'':;,=])/(usr/)?sbin/\.\w[\w-]{2,}'
    not:
      - substr: jruby
    downgrade:
      any:
        - id: metadata/binary/provenance/
    unless:
      - id: well-known/tool/sysadmin/alpine-packages/
  - id: hidden-local-system-bin-reference
    desc: Hidden local system binary path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(^|[\s"'':;,=])/usr/local/(bin|libexec)/\.\w[\w-]{2,}'
    not:
      - substr: /usr/bin/.sysless
      - substr: /bin/.dev_mode
      - regex: Fake[A-Za-z0-9_/.-]*/bin/\.exists
      - substr: jruby
    downgrade:
      any:
        - id: metadata/binary/provenance/
    unless:
      - id: well-known/tool/sysadmin/alpine-packages/
      - id: metadata/file/profile/identity::hidden-atomic-update-staging-path
      - type: basename
        exact: scanner
  - id: hidden-opt-lib-reference
    desc: Hidden opt/lib path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(^|[\s"'':;,=])(/opt|/(usr/)?lib(64)?)/\.\w[\w-]{2,}([/\s"'':;,]|$)'
    not:
      - substr: /.aarch
      - substr: /.x86_64
      - substr: /.arm64
      - substr: /.riscv
    unless:
      - id: metadata/file/magic/identity::php-archive
      - id: metadata/library/structure::js-known-bundler-output
      - id: well-known/lib/wine/
      - id: well-known/app/community-scripts-proxmoxve::bitmagnet-installer-context
      - id: metadata/package/files/system-package::os-package-manager-library
    downgrade:
      any:
        - id: metadata/binary/provenance/
  - id: var-www-hidden-dir
    desc: Hidden directory in /var/www
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: /var/www/\.[A-Za-z0-9][A-Za-z0-9_-]*/
    not:
      - substr: /var/www/.cache/
      - substr: /var/www/.git/
      - substr: /var/www/.htaccess
      - substr: /var/www/.well-known/
  - id: tmp-hidden-dir
    desc: Hidden directory in /tmp
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/package/files/dependency::python-type-stub-path
      - id: metadata/package/testing/presence/harness/
      - type: path
        regex: 'etc[\\/]conda[\\/]test-files[\\/]'
    if:
      type: text
      regex: /tmp/\.[A-Za-z0-9][A-Za-z0-9_-]*/
    not:
      - substr: /tmp/.snap/
      - substr: /tmp/.cache/
      - substr: /tmp/.ICE-unix
      - substr: /tmp/.X11-unix
      - substr: /tmp/.XIM-unix
      - substr: /tmp/.spider/
      - substr: /tmp/.spider/db
    downgrade:
      any:
        - type: text
          substr: /tmp/.X11-unix/
        - type: basename
          exact: ssh
        - type: basename
          exact: sshd
        - type: basename
          exact: Xorg
        - type: basename
          exact: xterm
composite_rules:
  - id: hidden-system-bin-reference
    desc: Hidden system binary path
    crit: suspicious
    conf: 0.95
    any:
      - id: hidden-sbin-reference
      - id: hidden-local-system-bin-reference
  - id: hidden-user-path
    desc: Hidden directory in user-writable path
    crit: notable
    conf: 0.9
    any:
      - id: var-www-hidden-dir
      - id: tmp-hidden-dir
