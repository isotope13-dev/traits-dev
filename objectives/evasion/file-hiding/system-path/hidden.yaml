defaults:
  platforms: [windows, unix]
  for: [scripts, shell, python, javascript, pe, elf]
  attack: T1564.001
  mbc: F0005
traits:
  - id: hidden-system-bin-reference
    desc: Hidden system binary path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: /((usr/)?s?bin|usr/local/bin|usr/local/libexec)/\.[A-Za-z0-9][A-Za-z0-9_-]{2,}
    not:
      - substr: /usr/bin/.sysless
      - substr: /bin/.dev_mode
      - regex: Fake[A-Za-z0-9_/.-]*/bin/\.exists
      - substr: jruby
    downgrade:
      any:
        - id: metadata/binary/provenance::netbsd-base-system-artifact
  - id: hidden-opt-lib-reference
    desc: Hidden opt/lib path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (/opt|/(usr/)?lib(64)?)/\.[A-Za-z0-9][A-Za-z0-9_-]*
    not:
      - substr: /.aarch
      - substr: /.x86_64
      - substr: /.arm64
      - substr: /.riscv
    downgrade:
      any:
        - id: metadata/binary/provenance::netbsd-base-system-artifact
  - id: home-hidden-dir-exec
    desc: Hidden directory in /home
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: /home/\w+/\.[A-Za-z0-9][A-Za-z0-9_-]*/
    not:
      - substr: .contrarian-config
      - substr: /home/foo/.trash/
      - substr: XDG_CONFIG_HOME
      - regex: /home/\w+/\.[A-Za-z0-9][A-Za-z0-9_-]*/containers/auth\.json
      - regex: /home/\w+/\.(local|config|cache|cargo|rustup|npm|nvm|pyenv|rbenv|go|gradle|m2|vscode|docker|ssh|wasmer|pki|mitmproxy|openclaw)/
      - regex: /home/\w+/\.rvm/
      - regex: /home/\w+/\.virtualenvs/
      - substr: /home/linuxbrew/.linuxbrew/
  - id: var-www-hidden-dir
    desc: Hidden directory in /var/www
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: /var/www/\.[A-Za-z0-9][A-Za-z0-9_-]*/
    not:
      - substr: /var/www/.cache/
      - substr: /var/www/.git/
      - substr: /var/www/.htaccess
      - substr: /var/www/.well-known/
  - id: tmp-hidden-dir
    desc: Hidden directory in /tmp
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: /tmp/\.[A-Za-z0-9][A-Za-z0-9_-]*/
    not:
      - substr: /tmp/.snap/
      - substr: /tmp/.ICE-unix
      - substr: /tmp/.X11-unix
      - substr: /tmp/.XIM-unix
      - substr: /tmp/.spider/
      - substr: /tmp/.spider/db
    downgrade:
      any:
        - type: text
          substr: /tmp/.X11-unix/
        - type: basename
          exact: ssh
        - type: basename
          exact: sshd
        - type: basename
          exact: Xorg
        - type: basename
          exact: xterm
composite_rules:
  - id: hidden-system-binary-path
    desc: Hidden directory in system binary path (backdoor)
    crit: suspicious
    conf: 0.95
    any:
      - id: hidden-system-bin-reference
      - id: hidden-opt-lib-reference
  - id: hidden-user-path
    desc: Hidden directory in user-writable path
    crit: suspicious
    conf: 0.9
    any:
      - id: home-hidden-dir-exec
      - id: var-www-hidden-dir
      - id: tmp-hidden-dir
