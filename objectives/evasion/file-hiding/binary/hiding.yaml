defaults:
  crit: suspicious
  attack: T1564.001
  for:
  - elf
  - shell
  platforms:
  - unix
traits:
- id: binary-in-include
  desc: Binary or suspicious file in /usr/include
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: /usr/include/.{1,50}\.(sh|py|bin)
- id: header-like-in-include
  desc: Suspicious .h file path (not a header)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: ^/usr/include/[a-z]{5,}\.h$
  not:
  - regex: stdio
  - regex: stdlib
  - regex: string
  - regex: time
  - regex: math
  - regex: signal
  - regex: errno
  - regex: fcntl
  - regex: unistd
  - regex: stdint
  - regex: inttypes
- id: sdfwex-path
  desc: Known malicious sdfwex hidden path
  crit: suspicious
  conf: 1.0
  if:
    type: text
    substr: sdfwex
- id: hidden-tmp-binary
  desc: Hidden executable in /tmp
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: /tmp/\.[a-z]{2,10}$
  not:
  - substr: /tmp/.superset
  unless:
  - id: well-known/lib/wine::wine-source-tree
  - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
  - id: well-known/tool/sysadmin/alpine-packages/
  - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
- id: mid-tmp-path
  desc: /tmp/mid path (common dropper location)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: /tmp/midd?$
- id: hidden-run-file
  desc: Hidden file in /run or /var/run
  crit: notable
  conf: 0.8
    # The dot must begin a real dotfile name, not a `.`/`..` path segment: the
    # char after the dot must not be a slash, dot, or space. This rejects
    # path-padding idioms like watchman's `/run/./././watchman` (current-dir
    # no-ops used to length-match a patched rpath), which are not hidden files.
  if:
    type: text
    regex: '/(var/)?run/\.[^/.\s][^\s]{0,29}'
  not:
  - /var/run/.heim_org.h5l.kcm-socket
  - /run/.containerenv
  - /var/run/.tdnf-instance-lockfile
- id: hidden-dev-file
  desc: Hidden file in /dev
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: /dev/\.[A-Za-z0-9._-]{1,30}\b
  unless:
  - type: text
    regex: /dev/\.null\b
  - type: text
    substr: /dev/./
  - type: text
    regex: /dev/\.tmp\.md
  - type: text
    substr: /dev/.udev
  - type: text
    substr: /dev/.devfsd
  - type: text
    regex: /dev/\.buildkit_.*
  - id: metadata/package/files/wheel-sdist::python-wheel-vendored-shlib-dir
  - id: metadata/package/files/system-package::os-bundled-native-library
composite_rules:
- id: binary-hiding
  desc: Binary hidden in unusual system location
  crit: hostile
  conf: 0.9
  any:
  - id: binary-in-include
  - id: sdfwex-path
  - id: hidden-dev-file
- id: dropper-temp-paths
  desc: Common dropper temporary paths
  crit: suspicious
  conf: 0.85
  any:
  - id: hidden-tmp-binary
  - id: hidden-tmp-binary
  - id: mid-tmp-path
- id: hidden-persistence
  desc: Hidden persistence indicators
  crit: suspicious
  conf: 0.85
  needs: 2
  any:
  - id: binary-in-include
  - id: sdfwex-path
  - id: hidden-tmp-binary
  - id: hidden-run-file
- id: hidden-writable-download-exec
  desc: Hidden writable path stages downloaded executable
  crit: hostile
  conf: 0.97
  attack: T1564.001,T1105,T1059.004
  all:
  - id: micro-behaviors/fs/path/location::hidden-writable-path
  - id: objectives/command-and-control/dropper/delivery/fetch-exec::raw-ip-download-command
  - id: micro-behaviors/fs/chmod/executable/dangerous::shell-777
  - id: micro-behaviors/process/create/local-exec::local-execution
  near_bytes: 900
