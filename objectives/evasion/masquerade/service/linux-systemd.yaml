# Systemd / desktop-session service names that masquerade as legitimate
# Linux session components (Xsession, GNOME, GDM, dbus, ssh-agent, etc.).
# Attackers register payloads as `Xsession.service`, `XsessionAuthDaemon`,
# or similar so a casual `systemctl --user` listing shows what looks like
# part of the standard X11 session machinery.
defaults:
  platforms: [unix]
  for: [scripts, source, elf]
  attack: T1036.005
  mbc: F0008
traits:
  - id: xsession-service-name
    desc: Xsession service name reference
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bXsession[A-Za-z0-9_]*(\.service|Daemon)\b'
  - id: gnome-shell-helper-name
    desc: gnome-shell helper service name
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bgnome-shell-(?:helper|service|daemon)[A-Za-z0-9_-]{0,30}\.service\b'
  - id: dbus-session-mimic
    desc: dbus-session masquerade name
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bdbus-(?:helper|service|launch-helper|session-helper)[A-Za-z0-9_-]{0,30}\.service\b'
  - id: gdm-greeter-mimic
    desc: gdm-greeter masquerade service
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bgdm-(?:helper|greeter|service)[A-Za-z0-9_-]{0,30}\.service\b'
composite_rules:
  - id: linux-session-service-masquerade
    desc: Service name masquerading as Linux session
    crit: suspicious
    conf: 0.92
    any:
      - id: xsession-service-name
      - id: gnome-shell-helper-name
      - id: dbus-session-mimic
      - id: gdm-greeter-mimic
