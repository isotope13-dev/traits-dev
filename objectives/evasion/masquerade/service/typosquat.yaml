# Service Typosquatting
# Detects minor variations of security service names
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  - id: defender-typosquat
    desc: Typosquatted Windows Defender service name
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: 'WindowsDefender[A-Z0-9]\b'
      not:
        - exact: "WindowsDefender.exe"
