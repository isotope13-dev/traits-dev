# Windows service name typosquat masquerading
# Detects binaries that embed misspelled Windows service names to blend in
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.004
  mbc: F0004
traits:
- id: svchost-typosquat-path
  desc: Typosquatted svchost.exe drop path
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: \scvhost.exe
- id: svchost-misspell-schost
  desc: Typosquatted svchost name (schost)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: \schost.exe
- id: svchost-misspell-svhost
  desc: Typosquatted svchost name (svhost)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: \svhost.exe
- id: service-host-process-label
  desc: Fake Service Host Process description
  crit: component
  conf: 0.85
  if:
    type: text
    exact: Service Host Process
# Fake Windows telemetry/diagnostics services used as persistence cover for
# installers that also plant Defender exclusions and remote-download stages.
- id: windows-telemetry-service-name
  desc: Fake Windows telemetry service name
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(?i)\bWinTelemetry(Svc|Service)\b|Windows Telemetry Service'
- id: windows-telemetry-service-desc
  desc: Fake Windows telemetry service description
  crit: component
  conf: 0.88
  if:
    type: text
    substr: Provides system telemetry and diagnostics
composite_rules:
- id: svchost-masquerade-persistence
  desc: Svchost masquerade with Run key persistence
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/os/registry/keys::windows-registry-run-access
  any:
  - id: svchost-typosquat-path
  - id: svchost-misspell-schost
  - id: svchost-misspell-svhost
  - id: service-host-process-label
- id: svchost-masquerade-network
  desc: Svchost masquerade with network activity
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/socket/init::wsa-startup
  any:
  - id: svchost-typosquat-path
  - id: svchost-misspell-schost
  - id: svchost-misspell-svhost
- id: windows-telemetry-service-masquerade
  desc: Fake telemetry service with security blinding
  crit: hostile
  conf: 0.95
  attack: T1036.004,T1562.001
  all:
  - id: windows-telemetry-service-name
  - id: micro-behaviors/os/service/control::service-dispatch-triad
  any:
  - id: micro-behaviors/os/security/defender::defender-exclusion-command
  - id: objectives/impact/degrade/windows-policy::ci-verified-reputable-policy-disable
  - id: windows-telemetry-service-desc
