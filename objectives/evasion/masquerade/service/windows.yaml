# Windows service name typosquat masquerading
# Detects binaries that embed misspelled Windows service names to blend in
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.004
  mbc: F0004
traits:
  - id: svchost-typosquat-path
    desc: Typosquatted svchost.exe drop path
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: \\scvhost\.exe
  - id: svchost-misspell-schost
    desc: Typosquatted svchost name (schost)
    crit: suspicious
    conf: 0.92
    if:
      type: string_value
      regex: \\schost\.exe
  - id: svchost-misspell-svhost
    desc: Typosquatted svchost name (svhost)
    crit: suspicious
    conf: 0.92
    if:
      type: string_value
      regex: \\svhost\.exe
  - id: service-host-process-label
    desc: Fake Service Host Process description
    crit: component
    conf: 0.85
    if:
      type: string_value
      exact: Service Host Process
composite_rules:
  - id: svchost-masquerade-persistence
    desc: Svchost masquerade with Run key persistence
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/persistence/login/startup/registry::windows-registry-run-access
    any:
      - id: svchost-typosquat-path
      - id: svchost-misspell-schost
      - id: svchost-misspell-svhost
      - id: service-host-process-label
    needs: 1
  - id: svchost-masquerade-network
    desc: Svchost masquerade with network activity
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/socket/init::wsa-startup
    any:
      - id: svchost-typosquat-path
      - id: svchost-misspell-schost
      - id: svchost-misspell-svhost
    needs: 1
