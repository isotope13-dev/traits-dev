defaults:
  platforms: [windows]
  for: [scripts, binaries, csharp]
  attack: T1036

traits:
  - id: winsat-service-masquerade
    desc: Masquerades as WinSAT service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\bWinSATSvc(\.exe)?\b|Windows System Assessment Tool service'
  - id: winsat-programdata-path
    desc: WinSAT ProgramData payload path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)ProgramData\\Microsoft\\Windows\\WinSAT\\[^''"\r\n]{1,80}\.exe'
  - id: winsat-commonprogramdata-path
    desc: WinSAT CommonProgramData payload path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)%CommonProgramData%\\Microsoft\\Windows\\WinSAT\\[^''"\r\n]{1,80}\.exe'

composite_rules:
  - id: winsat-programdata-drop-path
    desc: Drops payload under WinSAT path
    crit: suspicious
    conf: 0.92
    any:
      - id: winsat-programdata-path
      - id: winsat-commonprogramdata-path
  - id: winsat-companion-payload-masquerade
    desc: WinSAT companion payload masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: winsat-service-masquerade
      - id: winsat-programdata-drop-path
    any:
      - id: objectives/command-and-control/channel/discord::discord-chunked-payload-restore
      - id: objectives/persistence/system/service/install::safeboot-network-service-key
      - id: objectives/persistence/login/registry/run-key/
