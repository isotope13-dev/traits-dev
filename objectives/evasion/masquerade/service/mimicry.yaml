defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: svchost-global-mimicry
    desc: "svchost service global mimicry"
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      regex: 'SvcHost(Push|Pop)?ServiceGlobals'
  - id: suspicious-moka-dll
    desc: Reference to suspicious moka.dll
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "moka.dll"
  - id: suspicious-garbage-export
    desc: Randomized or high-entropy export name
    crit: suspicious
    conf: 0.8
    size_max: 52428800
    count_max: 5
    if:
      type: symbol
      regex: '^[A-Z][a-z0-9]{12,24}$'
    unless:
      - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
      - id: metadata/binary/symbols/exports::itanium-mangled-export-no-underscore
