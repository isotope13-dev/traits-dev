defaults:
  attack: T1036.005
  for:
    - pe
  platforms:
    - windows
traits:
  - id: jjs-original-filename-string
    desc: jjs.exe original filename string
    crit: component
    conf: 0.97
    if:
      type: text
      exact: jjs.exe
      section: .rsrc
composite_rules:
  - id: oracle-jjs-version-resource
    desc: Oracle jjs version resource identity
    crit: component
    conf: 0.98
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-companyname-field
      - id: metadata/package/versioning::pe-filedescription-field
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: micro-behaviors/data/text/keywords/vendor::java-platform-se-binary-resource
      - id: micro-behaviors/data/text/keywords/vendor::oracle-corporation-string
      - id: jjs-original-filename-string
  - id: trojanized-jjs-loader
    desc: Trojanized jjs host with loader shellcode
    crit: hostile
    conf: 0.995
    all:
      - id: oracle-jjs-version-resource
      - id: metadata/binary/section/metrics::large-reloc-section
      - id: objectives/anti-static/pack/section-anomaly::reloc-dominates-image
      - id: objectives/evasion/anti-av/api-hashing::wide-string-uppercase-mask
