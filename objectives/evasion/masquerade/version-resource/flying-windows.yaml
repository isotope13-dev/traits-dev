defaults:
  attack: T1036.005
  for: [pe]
  platforms: [windows]
traits:
  - id: flying-windows-title
    desc: Version resource claims Flying Windows
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Flying Windows
      section: .rsrc
  - id: manhunter-pcl-company
    desc: Version resource claims ManHunter / PCL
    crit: component
    conf: 0.95
    if:
      type: text
      substr: ManHunter / PCL
      section: .rsrc
  - id: flyingwindows-original-filename
    desc: Original filename claims flyingwindows.exe
    crit: component
    conf: 0.97
    if:
      type: text
      exact: flyingwindows.exe
      section: .rsrc
composite_rules:
  - id: flying-windows-packed-masquerade
    desc: Packed .NET binary mimics Flying Windows
    crit: suspicious
    conf: 0.98
    all:
      - id: flying-windows-title
      - id: manhunter-pcl-company
      - id: flyingwindows-original-filename
      - id: metadata/binary/framework::dotnet-assembly
    any:
      - id: metadata/binary/section/metrics::elevated-text-entropy-section
      - id: objectives/anti-static/obfuscation/binary-metrics::dotnet-randomized-symbols
      - id: objectives/command-and-control/dropper/execution/loader::dotnet-packed-resource-stub
    needs: 2
