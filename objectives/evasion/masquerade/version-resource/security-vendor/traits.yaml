defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  attack: T1036
traits:
- id: ioooiok-marker
  desc: IOOOIOOK junk marker string
  crit: component
  conf: 0.95
  if:
    type: text
    exact: IOOOIOOKIOOOIOOKIOOOIOOKINU
- id: removal-tool-text
  desc: Security vendor removal tool text
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)removal too?l?
    section: .rsrc
- id: symantec-site-text
  desc: Symantec website resource text
  crit: component
  conf: 0.88
  if:
    type: text
    substr: http://www.symantec.com
    section: .rsrc
- id: gdata-companyname
  desc: G Data Software AG company name
  crit: component
  conf: 0.9
  if:
    type: text
    substr: G Data Software AG
- id: avira-cert-embedded
  desc: Avira GmbH certificate embedded in PE
  crit: component
  conf: 0.85
  if:
    type: text
    substr: Avira GmbH
- id: antimalware-service-description
  desc: Antimalware service executable FileDescription
  crit: suspicious
  conf: 0.95
  attack: T1036.005
  if:
    type: text
    exact: Antimalware service executable
- id: malwarebytes-filedesc-typo
  desc: 'malwarebytes filedesc typo'
  crit: suspicious
  conf: 0.95
  attack: T1036.005
  if:
    type: text
    exact: Malwarebytes Anti-Malwar Pro
    section: .rsrc
- id: malwarebytes-corporation-versioninfo
  desc: 'malwarebytes corporation versioninfo'
  crit: component
  conf: 0.85
  if:
    type: text
    exact: Malwarebytes Corporation
    section: .rsrc
- id: mbam-double-extension-masquerade
  desc: 'mbam double extension masquerade'
  crit: suspicious
  conf: 0.97
  attack: T1036.005
  if:
    type: text
    exact: MBAM.exe.exe
    section: .rsrc
  unless:
  - id: metadata/signed/platform::microsoft
composite_rules:
- id: security-vendor-version-resource-decoy
  desc: Fake security vendor version resource
  crit: suspicious
  conf: 0.92
  all:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/signed/certificate::verisign-symantec-timestamp-chain
  - id: metadata/signed/certificate::bitdefender-brand-text
  any:
  - id: metadata/signed/certificate::verisign-logo-url
  - id: objectives/anti-static/obfuscation/string/junking::repeated-padding-marker
  - id: ioooiok-marker
- id: security-vendor-removal-tool-decoy
  desc: Fake security vendor cleanup tool identity
  crit: suspicious
  conf: 0.94
  all:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/signed/certificate::verisign-symantec-timestamp-chain
  - id: removal-tool-text
  any:
  - id: symantec-site-text
  - id: metadata/signed/certificate::symantec-corporation-cert
- id: gdata-avira-contradiction
  desc: G Data company name with Avira certificate
  crit: suspicious
  conf: 0.92
  all:
  - id: gdata-companyname
  - id: avira-cert-embedded
- id: fake-antimalware-binary
  desc: Unsigned binary masquerades as Microsoft Antimalware service
  crit: suspicious
  conf: 0.96
  attack: T1036.005
  all:
  - id: antimalware-service-description
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  unless:
  - id: metadata/signed/platform::microsoft
- id: malwarebytes-masquerade-typo
  desc: Unsigned binary masquerades as Malwarebytes with typo'd file description
  crit: suspicious
  conf: 0.97
  attack: T1036.005
  all:
  - id: malwarebytes-filedesc-typo
  - id: malwarebytes-corporation-versioninfo
  unless:
  - id: metadata/signed/platform::microsoft
