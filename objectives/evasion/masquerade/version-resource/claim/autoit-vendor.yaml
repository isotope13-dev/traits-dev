# Compiled AutoIt images that wear third-party vendor version resources.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

composite_rules:
  - id: autoit-centrify-version-masquerade
    desc: AutoIt binary masquerading as Centrify Management Services
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: well-known/app/delinea::centrify-management-services-description
      - id: well-known/app/delinea::centrify-management-services-company
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
      - id: metadata/signed/certificate/identity::pe-signature-verified
