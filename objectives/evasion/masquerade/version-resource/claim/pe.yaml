composite_rules:
- id: asus-getdeviceversion-version-resource
  desc: ASUS GetDeviceVersion version resource
  crit: component
  conf: 0.98
  all:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/package/versioning::pe-companyname-field
  - id: metadata/package/versioning::pe-filedescription-field
  - id: asus-company-name
  - id: getdeviceversion-description
  any:
  - id: getdevic-internal-name
  - id: metadata/package/versioning::pe-internalname-field
- id: asus-lightingservice-version-resource
  desc: ASUS Lighting Service version resource
  crit: component
  conf: 0.99
  all:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/package/versioning::pe-companyname-field
  - id: metadata/package/versioning::pe-filedescription-field
  - id: asustek-computer-inc-company-name
  - id: aura-lighting-service-description
  any:
  - id: lightingservice-original-filename
  - id: metadata/package/versioning::pe-originalfilename-field
  - id: metadata/package/versioning::pe-internalname-field
- id: low-import-pe-without-heavy-rsrc
  desc: Low-import PE without dominant resources
  crit: component
  conf: 0.82
  all:
  - id: objectives/anti-static/obfuscation/binary-metrics/imports::max-50-imports
  unless:
  - id: metadata/binary/resource::resource-heavy-rsrc
      # Go/Rust Windows binaries link their runtime statically and ship
      # without a version resource — matching this shape is the norm, not
      # masquerade intent. The `unsigned-microsoft-masquerade` composite
      # that consumes this component additionally requires Microsoft-Corp
      # versioninfo, so this suppression doesn't affect the composite's
      # actual masquerade conclusion for Go malware.
  - id: metadata/lang/compiled/
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: metadata/lang/compiler/systems/
- id: fake-windows-update-service-versioninfo
  desc: Fake Windows update service version info
  crit: suspicious
  conf: 0.97
  all:
  - id: metadata/package/versioning::pe-version-resource
  - id: windows-component-update-service
  - id: windows-software-foundation
  - id: winupdate-internal-name
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::microsoft-corporation
- id: self-signed-mojibake-surveillance-pe
  desc: Self-signed mojibake surveillance PE
  crit: hostile
  conf: 0.98
  ref: sha256:f3e35b270f7b8aba8f24e4a97711e33d3ae748a5ad994c098513acfe7a9e4dc0
  all:
  - id: mojibake-cyrillic-company-name
  - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
  - id: metadata/signed/certificate/identity::pe-signature-verified-kv
  any:
  - id: objectives/collection/keylog/hook::windows-hook-clipboard-screen-surveillance
  - id: objectives/collection/screenshot/capture::gdi-capture-clipboard-hook-surveillance
  - id: objectives/collection/clipboard/capture::windows-clipboard-screen-hook-surveillance
  unless:
  - id: metadata/signed/platform/
- id: clock-utility-masquerade
  desc: PE masquerades as Clock utility
  crit: suspicious
  conf: 0.92
  all:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/package/versioning::pe-originalfilename-field
  - id: objectives/evasion/masquerade/version-resource/claim::clock-microsoft-product
  - id: objectives/evasion/masquerade/version-resource/claim::clock-original-filename
- id: winword-original-filename
  desc: Claims WINWORD.exe as original filename
  crit: component
  conf: 0.9
  all:
  - id: metadata/package/versioning::pe-originalfilename-field
  - id: winword-exe-string
  near_bytes: 256
- id: fake-winword-version-resource
  desc: Unsigned PE claims WinWord version identity
  crit: suspicious
  conf: 0.97
  all:
  - id: objectives/evasion/masquerade/version-resource/claim::microsoft-office-word-string
  - id: objectives/evasion/masquerade/version-resource/claim::winword-internal-name-string
  - id: winword-exe-string
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::microsoft-corporation
- id: fake-microsoft-office-binary
  desc: PE masquerades as Microsoft Office in version metadata
  crit: suspicious
  conf: 0.88
  size_max: 800000
  any:
  - id: fake-winword-version-resource
  - id: winword-original-filename
  - id: office-product-claim
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::microsoft-corporation
- id: unsigned-office-installer-office-exe
  desc: Unsigned PE masquerades as Office installer
  crit: suspicious
  conf: 0.97
  all:
  - id: office-installer-file-description
  - id: office-exe-original-filename
  - id: office-exe-internal-name
  - id: metadata/signed/trust-level::unsigned
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::microsoft-corporation
- id: fake-winrar-version-resource
  desc: Unsigned PE claims WinRAR version identity
  crit: suspicious
  conf: 0.96
  all:
  - id: alexander-roshal-author
  any:
  - id: winrar-archiver-filedesc
  - id: winrar-original-filename
  # Genuine WinRAR is Authenticode-signed by win.rar GmbH; a masquerading PE can
  # copy the version strings but cannot reproduce the vendor certificate. The
  # previous developer/win-rar-gmbh id was never emitted by the engine, so this
  # never suppressed real WinRAR modules.
  unless:
  - id: metadata/signed/platform/
  - id: well-known/tool/sysadmin/winrar::winrar-authenticode-publisher
- id: unsigned-microsoft-masquerade
  desc: Unsigned PE claims Microsoft Corporation in version resource
  crit: suspicious
  conf: 0.88
  all:
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: low-import-pe-without-heavy-rsrc
  unless:
  - id: metadata/binary/symbols/compat::zero-import-count
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor::is-microsoft-named
  - id: metadata/binary/metrics/threshold::dotnet-binary
  - id: metadata/binary/framework/
  - id: well-known/lib/wine/
  - id: well-known/tool/reverse-engineering/scyllahide/
- id: unsigned-microsoft-masquerade-packed
  desc: Packed PE claims Microsoft Corporation in version resource
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::binary-packed
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor::is-microsoft-named
- id: unsigned-asus-lightingservice-masquerade
  desc: Unsigned PE masquerades as ASUS Lighting Service
  crit: suspicious
  conf: 0.98
  all:
  - id: asus-lightingservice-version-resource
  - id: metadata/signed/trust-level::unsigned-pe-executable
  any:
  - id: low-import-pe-without-heavy-rsrc
  - id: objectives/anti-static/obfuscation/binary-metrics/imports::max-30-imports
  unless:
  - id: metadata/signed/platform
  - id: metadata/signed/developer
- id: tiny-vb6-microsoft-masquerade
  desc: Tiny packed VB6 claims Microsoft
  crit: suspicious
  conf: 0.96
  all:
  - id: microsoft-company-name-short
  - id: metadata/binary/framework::vb6-application-framework
  - id: objectives/anti-static/pack/detect::tiny-upx-vb6-executable
  any:
  - id: metadata/package/versioning::pe-originalfilename-field
  - id: metadata/package/versioning::pe-version-resource
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor::is-microsoft-named
- id: packed-rider-loader-masquerade
  desc: Packed Rider-branded zero-import loader
  crit: hostile
  conf: 0.97
