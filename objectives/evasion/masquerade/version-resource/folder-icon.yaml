# Folder Icon Masquerade
# PE binary disguised as a Windows folder via version resource metadata
# Classic social engineering technique used by USB worms and file infectors
# ATT&CK: T1036.005 (Match Legitimate Name or Location)
defaults:
  attack: T1036.005
  for: [pe]
  platforms: [windows]
traits:
  - id: file-folder-original-filename
    desc: OriginalFilename is "FILE FOLDER.exe"
    crit: component
    conf: 0.95
    if:
      type: string
      substr: "FILE FOLDER.exe"
  - id: file-folder-internal-name
    desc: InternalName is "FILE FOLDER"
    crit: component
    conf: 0.9
    if:
      type: string
      exact: "FILE FOLDER"
  - id: file-folder-product-name
    desc: ProductName claims "File Folder"
    crit: component
    conf: 0.9
    if:
      type: string
      exact: "File Folder"
composite_rules:
  - id: folder-icon-masquerade
    desc: PE masquerades as folder via version resource
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/quality/versioning::pe-originalfilename-field
    any:
      - id: file-folder-original-filename
      - id: file-folder-internal-name
      - id: file-folder-product-name
  - id: vb6-folder-worm
    desc: VB6 folder-icon worm with fake Microsoft claim
    crit: hostile
    conf: 0.95
    all:
      - id: folder-icon-masquerade
      - id: metadata/format/pe::vb6-runtime-dll
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
