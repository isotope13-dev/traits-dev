defaults:
  attack: T1036.005
  platforms: [windows]
  for: [pe]

traits:
  - id: steinberg-company-versioninfo
    desc: Steinberg company version identity
    crit: component
    conf: 0.95
    ref: sha256:2ed770b87cbe9c96c4265e4e104732dd002e32560ab0d938f44bdb838226c507
    if:
      type: value
      path: pe.version.company
      exact: Steinberg Media Technologies GmbH
  - id: elicenser-control-product-versioninfo
    desc: eLicenser Control product identity
    crit: component
    conf: 0.95
    ref: sha256:2ed770b87cbe9c96c4265e4e104732dd002e32560ab0d938f44bdb838226c507
    if:
      type: value
      path: pe.version.product_name
      exact: eLicenser Control
  - id: synsopos-original-filename-versioninfo
    desc: SYNSOPOS original filename identity
    crit: component
    conf: 0.95
    ref: sha256:2ed770b87cbe9c96c4265e4e104732dd002e32560ab0d938f44bdb838226c507
    if:
      type: value
      path: pe.version.original_filename
      exact: SYNSOPOS.exe
  - id: protected-object-server-versioninfo
    desc: Protected Object Server identity
    crit: component
    conf: 0.93
    ref: sha256:2ed770b87cbe9c96c4265e4e104732dd002e32560ab0d938f44bdb838226c507
    if:
      type: value
      path: pe.version.description
      exact: Protected Object Server

composite_rules:
  - id: steinberg-elicenser-version-identity
    desc: Steinberg eLicenser version identity
    crit: suspicious
    conf: 0.97
    ref: sha256:2ed770b87cbe9c96c4265e4e104732dd002e32560ab0d938f44bdb838226c507
    all:
      - id: steinberg-company-versioninfo
      - id: elicenser-control-product-versioninfo
      - id: synsopos-original-filename-versioninfo
    any:
      - id: protected-object-server-versioninfo
      - id: metadata/package/versioning::pe-version-resource
