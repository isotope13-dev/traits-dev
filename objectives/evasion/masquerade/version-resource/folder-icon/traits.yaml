defaults:
  attack: T1036.005
  for:
    - pe
  platforms:
    - windows
traits:
  - id: file-folder-original-filename
    desc: OriginalFilename is "FILE FOLDER.exe"
    crit: component
    conf: 0.95
    if:
      type: text
      substr: FILE FOLDER.exe
      section: .rsrc
  - id: file-folder-internal-name
    desc: InternalName is "FILE FOLDER"
    crit: component
    conf: 0.9
    if:
      type: text
      exact: FILE FOLDER
      section: .rsrc
  - id: file-folder-product-name
    desc: ProductName claims "File Folder"
    crit: component
    conf: 0.9
    if:
      type: text
      exact: File Folder
      section: .rsrc
composite_rules:
  - id: folder-icon-masquerade
    desc: PE masquerades as folder via version resource
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/package/versioning::pe-originalfilename-field
    any:
      - id: objectives/evasion/masquerade/version-resource/folder-icon::file-folder-internal-name
      - id: objectives/evasion/masquerade/version-resource/folder-icon::file-folder-original-filename
      - id: objectives/evasion/masquerade/version-resource/folder-icon::file-folder-product-name
  - id: vb6-folder-worm
    desc: VB6 folder-icon worm with fake Microsoft claim
    crit: hostile
    conf: 0.95
    all:
      - id: folder-icon-masquerade
      - id: metadata/binary/framework::vb6-runtime-dll
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
