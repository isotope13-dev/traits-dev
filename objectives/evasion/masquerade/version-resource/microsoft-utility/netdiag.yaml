defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: network-diagnostic-tool-description
    desc: Network Diagnostic Tool description
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Network Diagnostic Tool
      section: .rsrc
  - id: microsoft-network-diagnostics-product
    desc: Microsoft Network Diagnostics product claim
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Microsoft Network Diagnostics
      section: .rsrc
  - id: netdiag-exe-original-filename
    desc: netdiag.exe original filename
    crit: component
    conf: 0.95
    if:
      type: text
      exact: netdiag.exe
      section: .rsrc
composite_rules:
  - id: signed-netdiag-masquerade
    desc: Signed PE masquerades as Microsoft Network Diagnostics utility
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: network-diagnostic-tool-description
      - id: microsoft-network-diagnostics-product
      - id: netdiag-exe-original-filename
      - id: metadata/signed/platform::microsoft
