defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: microsoft-system-configuration-product
    desc: Microsoft System Configuration product claim
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Microsoft System Configuration
      section: .rsrc
  - id: syscfg-exe-original-filename
    desc: syscfg.exe original filename (fake msconfig)
    crit: component
    conf: 0.98
    if:
      type: text
      exact: syscfg.exe
      section: .rsrc
composite_rules:
  - id: signed-msconfig-masquerade
    desc: Signed PE masquerades as Microsoft System Configuration utility
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: objectives/evasion/masquerade/version-resource::system-configuration-utility
      - id: microsoft-system-configuration-product
      - id: syscfg-exe-original-filename
      - id: metadata/signed/platform::microsoft
