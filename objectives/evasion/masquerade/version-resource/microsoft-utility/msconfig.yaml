defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: windows-system-configuration-utility-description
    desc: Windows System Configuration utility description
    crit: component
    conf: 0.97
    if:
      type: kv
      path: pe.version_info.file_description
      exact: Windows System Configuration Utility
  - id: sysconfig-exe-original-filename
    desc: sysconfig.exe original filename claim
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version_info.original_filename
      exact: sysconfig.exe
  - id: sysconfig-internal-name
    desc: sysconfig internal name claim
    crit: component
    conf: 0.96
    if:
      type: kv
      path: pe.version_info.internal_name
      exact: sysconfig
composite_rules:
  - id: unsigned-sysconfig-masquerade
    desc: Unsigned PE masquerades as Windows System Configuration utility
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/signed/trust-level::unsigned-pe-executable
      - id: windows-system-configuration-utility-description
      - id: sysconfig-exe-original-filename
      - id: sysconfig-internal-name
