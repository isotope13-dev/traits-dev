defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: windows-security-health-service-description
    desc: Windows Security Health Service description
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Windows Security Health Service
      section: .rsrc
  - id: microsoft-windows-security-product
    desc: Microsoft Windows Security product claim
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Microsoft Windows Security
      section: .rsrc
  - id: sechealth-exe-original-filename
    desc: sechealth.exe original filename
    crit: component
    conf: 0.95
    if:
      type: text
      exact: sechealth.exe
      section: .rsrc
composite_rules:
  - id: signed-sechealth-masquerade
    desc: Signed PE masquerades as Microsoft Windows Security
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: windows-security-health-service-description
      - id: microsoft-windows-security-product
      - id: sechealth-exe-original-filename
      - id: metadata/signed/platform::microsoft
