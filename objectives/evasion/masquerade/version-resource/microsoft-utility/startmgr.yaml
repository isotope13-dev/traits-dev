defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: startup-manager-description
    desc: Startup Manager description
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Startup Manager
      section: .rsrc
  - id: microsoft-startup-optimization-product
    desc: Microsoft Startup Optimization product claim
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Microsoft Startup Optimization
      section: .rsrc
  - id: startmgr-exe-original-filename
    desc: startmgr.exe original filename
    crit: component
    conf: 0.94
    if:
      type: text
      exact: startmgr.exe
      section: .rsrc
composite_rules:
  - id: signed-startmgr-masquerade
    desc: Signed PE masquerades as Microsoft Startup Optimization
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: startup-manager-description
      - id: microsoft-startup-optimization-product
      - id: startmgr-exe-original-filename
      - id: metadata/signed/platform::microsoft
