defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: registry-maintenance-tool-description
    desc: Registry Maintenance Tool description
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Registry Maintenance Tool
      section: .rsrc
  - id: microsoft-registry-utilities-product
    desc: Microsoft Registry Utilities product claim
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Microsoft Registry Utilities
      section: .rsrc
  - id: regmaint-exe-original-filename
    desc: regmaint.exe original filename (fake reg.exe)
    crit: component
    conf: 0.96
    if:
      type: text
      exact: regmaint.exe
      section: .rsrc
composite_rules:
  - id: signed-regmaint-masquerade
    desc: Signed PE masquerades as Microsoft Registry Utilities
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: registry-maintenance-tool-description
      - id: microsoft-registry-utilities-product
      - id: regmaint-exe-original-filename
      - id: metadata/signed/platform::microsoft
