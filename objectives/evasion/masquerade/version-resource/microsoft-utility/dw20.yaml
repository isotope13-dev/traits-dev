defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004
traits:
  - id: dw20-original-filename
    desc: dw20.exe original filename
    crit: component
    conf: 0.97
    if:
      type: kv
      path: pe.version_info.original_filename
      regex: '^dw20\.exe$'
      case_insensitive: true

  - id: dw20-internal-name
    desc: dw20 internal name
    crit: component
    conf: 0.97
    if:
      type: kv
      path: pe.version_info.internal_name
      regex: '^dw20$'
      case_insensitive: true

  - id: dw20-microsoft-office-product
    desc: Microsoft Office product claim
    crit: component
    conf: 0.9
    if:
      type: kv
      path: pe.version_info.product_name
      exact: Microsoft Office

  - id: dw20-cui-subsystem
    desc: Console subsystem on dw20 claim
    crit: component
    conf: 0.97
    if:
      type: metrics
      field: pe.subsystem
      min: 3
      max: 3

composite_rules:
  - id: dw20-watson-masquerade
    desc: PE masquerading as Microsoft Watson dw20.exe
    crit: hostile
    conf: 0.97
    all:
      - id: dw20-original-filename
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: dw20-cui-subsystem
      - id: objectives/evasion/indicator-removal/timestamps::header-timestamp-pre-2000
      - id: objectives/evasion/indicator-removal/timestamps::header-timestamp-pre-2025
      - id: dw20-microsoft-office-product
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
