defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004
traits:
  - id: dw20-original-filename
    desc: dw20.exe original filename
    crit: component
    conf: 0.97
    if:
      type: value
      path: pe.version.original_filename
      regex: '^dw20\.exe$'
      case_insensitive: true

  - id: dw20-internal-name
    desc: dw20 internal name
    crit: component
    conf: 0.97
    if:
      type: value
      path: pe.version.internal_name
      regex: '^dw20$'
      case_insensitive: true

  - id: dw20-microsoft-office-product
    desc: Microsoft Office product claim
    crit: component
    conf: 0.9
    if:
      type: value
      path: pe.version.product_name
      exact: Microsoft Office

  - id: dw20-cui-subsystem
    desc: Console subsystem on dw20 claim
    crit: component
    conf: 0.97
    if:
      type: metrics
      field: pe.subsystem
      min: 3
      max: 3

  - id: dw20-microsoft-company
    desc: Microsoft Corporation company in version info
    crit: component
    conf: 0.9
    if:
      type: value
      path: pe.version.company
      regex: '^Microsoft Corp'

  - id: dw20-host-unsigned
    desc: PE has no Authenticode signature
    crit: component
    conf: 0.97
    if:
      type: metrics
      field: pe.cert_table_size
      max: 0
    unless:
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv

composite_rules:
  - id: dw20-watson-masquerade
    desc: PE masquerading as Microsoft Watson dw20.exe
    crit: hostile
    conf: 0.97
    all:
      - id: dw20-original-filename
      - id: dw20-microsoft-company
      - id: dw20-host-unsigned
    any:
      - id: dw20-cui-subsystem
      - id: objectives/evasion/indicator-removal/timestamps::header-timestamp-pre-2000
      - id: dw20-microsoft-office-product
    needs: 2
