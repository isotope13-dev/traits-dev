defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: hardware-detection-utility-description
    desc: Hardware Detection Utility description
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Hardware Detection Utility
      section: .rsrc
  - id: microsoft-hardware-diagnostics-product
    desc: Microsoft Hardware Diagnostics product claim
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Microsoft Hardware Diagnostics
      section: .rsrc
  - id: hwdetect-exe-original-filename
    desc: hwdetect.exe original filename
    crit: component
    conf: 0.94
    if:
      type: text
      exact: hwdetect.exe
      section: .rsrc
composite_rules:
  - id: signed-hwdetect-masquerade
    desc: Signed PE masquerades as Microsoft Hardware Diagnostics
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: hardware-detection-utility-description
      - id: microsoft-hardware-diagnostics-product
      - id: hwdetect-exe-original-filename
      - id: metadata/signed/platform::microsoft
