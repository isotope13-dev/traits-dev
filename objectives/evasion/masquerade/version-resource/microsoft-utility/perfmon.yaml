defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: performance-monitor-service-description
    desc: Performance Monitor Service description
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Performance Monitor Service
      section: .rsrc
  - id: microsoft-performance-monitor-product
    desc: Microsoft Performance Monitor product claim
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Microsoft Performance Monitor
      section: .rsrc
  - id: perfmon-exe-original-filename
    desc: perfmon.exe original filename
    crit: component
    conf: 0.92
    if:
      type: text
      exact: perfmon.exe
      section: .rsrc
composite_rules:
  - id: signed-perfmon-masquerade
    desc: Signed PE masquerades as Microsoft Performance Monitor
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: performance-monitor-service-description
      - id: microsoft-performance-monitor-product
      - id: perfmon-exe-original-filename
      - id: metadata/signed/platform::microsoft
