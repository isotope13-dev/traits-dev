defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: task-scheduler-engine-description
    desc: Task Scheduler Engine description
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Task Scheduler Engine
      section: .rsrc
  - id: microsoft-task-scheduler-product
    desc: Microsoft Task Scheduler product claim
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Microsoft Task Scheduler
      section: .rsrc
  - id: taskeng-exe-original-filename
    desc: taskeng.exe original filename
    crit: component
    conf: 0.92
    if:
      type: text
      exact: taskeng.exe
      section: .rsrc
composite_rules:
  - id: signed-taskeng-masquerade
    desc: Signed PE masquerades as Microsoft Task Scheduler engine
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: task-scheduler-engine-description
      - id: microsoft-task-scheduler-product
      - id: taskeng-exe-original-filename
      - id: metadata/signed/platform::microsoft
