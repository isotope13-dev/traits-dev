defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: display-settings-manager-description
    desc: Display Settings Manager description
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Display Settings Manager
      section: .rsrc
  - id: microsoft-display-settings-product
    desc: Microsoft Display Settings product claim
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Microsoft Display Settings
      section: .rsrc
composite_rules:
  - id: signed-display-settings-masquerade
    desc: Signed PE masquerades as Microsoft Display Settings utility
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: display-settings-manager-description
      - id: microsoft-display-settings-product
      - id: metadata/signed/platform::microsoft
