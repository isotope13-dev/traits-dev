defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: dll-cache-manager-description
    desc: DLL Cache Manager description
    crit: component
    conf: 0.95
    if:
      type: text
      exact: DLL Cache Manager
      section: .rsrc
  - id: microsoft-component-services-product
    desc: Microsoft Component Services product claim
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Microsoft Component Services
      section: .rsrc
  - id: dllcache-exe-original-filename
    desc: dllcache.exe original filename
    crit: component
    conf: 0.95
    if:
      type: text
      exact: dllcache.exe
      section: .rsrc
composite_rules:
  - id: signed-dllcache-masquerade
    desc: Signed PE masquerades as Microsoft Component Services
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: dll-cache-manager-description
      - id: microsoft-component-services-product
      - id: dllcache-exe-original-filename
      - id: metadata/signed/platform::microsoft
