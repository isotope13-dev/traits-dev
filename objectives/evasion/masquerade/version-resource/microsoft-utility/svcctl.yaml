defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: windows-service-controller-description
    desc: Windows Service Controller description
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Windows Service Controller
      section: .rsrc
  - id: microsoft-service-management-product
    desc: Microsoft Service Management product claim
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Microsoft Service Management
      section: .rsrc
  - id: svcctl-exe-original-filename
    desc: svcctl.exe original filename (fake services.exe)
    crit: component
    conf: 0.96
    if:
      type: text
      exact: svcctl.exe
      section: .rsrc
composite_rules:
  - id: signed-svcctl-masquerade
    desc: Signed PE masquerades as Microsoft Service Management utility
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: windows-service-controller-description
      - id: microsoft-service-management-product
      - id: svcctl-exe-original-filename
      - id: metadata/signed/platform::microsoft
