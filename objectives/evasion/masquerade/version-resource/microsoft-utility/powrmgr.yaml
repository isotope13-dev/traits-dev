defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: power-management-service-description
    desc: Power Management Service description
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Power Management Service
      section: .rsrc
  - id: microsoft-power-management-product
    desc: Microsoft Power Management product claim
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Microsoft Power Management
      section: .rsrc
  - id: powrmgr-exe-original-filename
    desc: powrmgr.exe original filename
    crit: component
    conf: 0.94
    if:
      type: text
      exact: powrmgr.exe
      section: .rsrc
composite_rules:
  - id: signed-powrmgr-masquerade
    desc: Signed PE masquerades as Microsoft Power Management
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: power-management-service-description
      - id: microsoft-power-management-product
      - id: powrmgr-exe-original-filename
      - id: metadata/signed/platform::microsoft
