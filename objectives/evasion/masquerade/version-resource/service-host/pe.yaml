defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: host-process-service-description
    desc: Host Process for Windows Services
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Host Process for Windows Services
      section: .rsrc
  - id: service-host-file-description
    desc: Generic Host Process description
    crit: component
    conf: 0.96
    if:
      type: text
      regex: Generic Host Process for Win32 Services\.?
      section: .rsrc
  - id: svchost-original-filename
    desc: svchost.exe original filename string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: svchost.exe
      section: .rsrc
  - id: svchost-internal-name
    desc: svchost internal name string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: svchost
      section: .rsrc

composite_rules:
  - id: unsigned-service-host-version-resource
    desc: Unsigned PE masquerades as service host
    crit: suspicious
    conf: 0.96
    size_max: 600000
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
    any:
      - id: objectives/evasion/masquerade/version-resource/service-host
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
  - id: trojanized-svchost-reloc-loader
    desc: Trojanized svchost with encrypted reloc loader
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/evasion/masquerade/version-resource/service-host::unsigned-service-host-version-resource
      - id: metadata/binary/section/metrics::dominant-encrypted-reloc-service-layout
    any:
      - id: micro-behaviors/os/service/control::service-dispatch-triad
      - id: micro-behaviors/os/service/host::service-dll-value-name
      - id: objectives/evasion/anti-av/api-hashing::wide-string-uppercase-mask
    needs: 2
