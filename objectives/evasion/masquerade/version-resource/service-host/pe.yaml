defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: service-host-file-description
    desc: Generic Host Process description
    crit: component
    conf: 0.96
    if:
      type: text
      regex: Generic Host Process for Win32 Services\.?
      section: .rsrc
  - id: svchost-original-filename
    desc: svchost.exe original filename string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: svchost.exe
      section: .rsrc
  - id: svchost-internal-name
    desc: svchost internal name string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: svchost
      section: .rsrc

composite_rules:
  - id: unsigned-service-host-version-resource
    desc: Unsigned PE masquerades as service host
    crit: suspicious
    conf: 0.96
    size_max: 600000
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: objectives/evasion/masquerade/version-resource/service-host::service-host-file-description
    any:
      - id: objectives/evasion/masquerade/version-resource/service-host::svchost-original-filename
      - id: objectives/evasion/masquerade/version-resource/service-host::svchost-internal-name
    unless:
      - id: metadata/signed/platform::microsoft
