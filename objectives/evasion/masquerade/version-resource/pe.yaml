defaults:
  attack: T1036.005
  for:
    - pe
  platforms:
    - windows
traits:
  - id: todo-company-name-placeholder
    desc: Unfilled TODO company name in version resource
    crit: component
    conf: 0.97
    if:
      type: text
      substr: "TODO: <Company name>"
      section: .rsrc
  - id: todo-product-name-placeholder
    desc: Unfilled TODO product name in version resource
    crit: component
    conf: 0.97
    if:
      type: text
      substr: "TODO: <Product name>"
      section: .rsrc
  - id: placeholder-assembly-identity
    desc: Placeholder assembly identity in resources
    crit: suspicious
    conf: 0.93
    if:
      type: text
      exact: name="CompanyName.ProductName.YourApp"
      section: .rsrc
  - id: chrome-updater-file-description
    desc: Chrome_Updater FileDescription masquerade
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Chrome_Updater
      section: .rsrc
  - id: random-lowercase-exe-name
    desc: Consonant-heavy lowercase executable name
    crit: component
    conf: 0.86
    if:
      type: text
      regex: ^[b-df-hj-np-tv-z]{8,16}\.exe$
      section: .rsrc
  - id: clock-microsoft-product
    desc: Clock Microsoft product claim
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Clock Microsoft
      section: .rsrc
  - id: clock-original-filename
    desc: Clock.EXE original filename
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Clock.EXE
      section: .rsrc
  - id: winword-exe-string
    desc: WINWORD.EXE version string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: winword.exe
      case_insensitive: true
      section: .rsrc
  - id: office-product-claim
    desc: Claims to be Microsoft Office product
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Microsoft Office (20|system)
      case_insensitive: true
      section: .rsrc
  - id: defender-typosquat-product
    desc: Typoed Windows Defender product
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Windwos Defender
      section: .rsrc
  - id: qwe-original-filename
    desc: qwe.exe original filename string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: qwe.exe
      section: .rsrc
  - id: onedrive-exe-string
    desc: OneDrive.exe name in binary
    crit: component
    conf: 0.95
    if:
      type: text
      exact: OneDrive.exe
  - id: jusched-exe-string
    desc: jusched.exe name in binary
    crit: component
    conf: 0.95
    if:
      type: text
      exact: jusched.exe
  - id: svcutil-original-filename
    desc: svcutil.exe original filename string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: svcutil.exe
      section: .rsrc
  - id: system-configuration-utility
    desc: System Configuration Utility version string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: System Configuration Utility
      section: .rsrc
  - id: system-configuration-tool
    desc: System Configuration Tool product string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: System Configuration Tool
      section: .rsrc
  - id: stub-guid-string
    desc: '''stub'' with GUID pattern in version resource'
    crit: component
    conf: 0.9
    if:
      type: text
      regex: stub_[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
      case_insensitive: true
      section: .rsrc
  - id: system-applet-product-claim
    desc: System Applet product claim
    crit: component
    conf: 0.95
    if:
      type: text
      exact: System Applet
      section: .rsrc
  - id: system-applet-copyright
    desc: System Applet copyright string
    crit: component
    conf: 0.92
    if:
      type: text
      substr: Copyright (C) 2013 System Applet
      section: .rsrc
  - id: python-launcher-string
    desc: Python Launcher version string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Python Launcher
      section: .rsrc
  - id: python-software-foundation-string
    desc: Python Software Foundation string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Python Software Foundation
      section: .rsrc
  - id: py-original-filename-string
    desc: py.exe original filename string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: py.exe
      section: .rsrc
  - id: windows-component-update-service
    desc: Windows Component Update service claim
    crit: component
    conf: 0.96
    if:
      type: text
      exact: Windows Component Update Service
      section: .rsrc
  - id: windows-software-foundation
    desc: Windows Software Foundation claim
    crit: component
    conf: 0.96
    if:
      type: text
      exact: Windows Software Foundation
      section: .rsrc
  - id: winupdate-internal-name
    desc: WinUpdate internal name string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: WinUpdate
      section: .rsrc
  - id: ncstudio-product-string
    desc: NcStudio product identity string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: NcStudio
      section: .rsrc
  - id: ncstudio-original-filename
    desc: NcStudio executable filename string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: NcStudio.exe
      section: .rsrc
  - id: pcimc-6a-product-string
    desc: PCIMC-6A product identity string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: PCIMC-6A
      section: .rsrc
  - id: application-frame-host-description
    desc: Application Frame Host description
    crit: component
    conf: 0.98
    if:
      type: text
      exact: Application Frame Host
      section: .rsrc
  - id: applicationframehost-original-filename
    desc: ApplicationFrameHost executable claim
    crit: component
    conf: 0.98
    if:
      type: text
      exact: ApplicationFrameHost.exe
      section: .rsrc
  - id: microsoft-windows-systemutility-manifest
    desc: Microsoft.Windows.SystemUtility manifest
    crit: component
    conf: 0.97
    if:
      type: text
      substr: Microsoft.Windows.SystemUtility
      section: .rsrc
  - id: scom-2007-product
    desc: SCOM 2007 product claim
    crit: component
    conf: 0.98
    if:
      type: text
      exact: System Center Operations Manager 2007
      section: .rsrc
  - id: momagentinstaller-filename
    desc: MOMAgent installer filename
    crit: component
    conf: 0.98
    if:
      type: text
      exact: MOMAgentInstaller.exe
      section: .rsrc
  - id: momagentinstaller-description
    desc: MOMAgent installer description
    crit: component
    conf: 0.97
    if:
      type: text
      exact: MOMAgentInstaller Module
      section: .rsrc
  - id: google-llc-company-string
    desc: Google LLC company string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: Google LLC
      section: .rsrc
  - id: google-company-string
    desc: Google company string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: google
      section: .rsrc
  - id: chrome-exe-version-string
    desc: chrome.exe version string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: chrome.exe
      section: .rsrc
  - id: pdf-exe-version-string
    desc: pdf.exe version string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: pdf.exe
      section: .rsrc
  - id: google-chrome-product-string
    desc: Google Chrome product string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: Google Chrome
      section: .rsrc
  - id: vmware-inc-company-string
    desc: VMware Inc company string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: VMware, Inc.
      section: .rsrc
  - id: vmware-player-description
    desc: VMware Player file description
    crit: component
    conf: 0.98
    if:
      type: text
      exact: VMware Player
      section: .rsrc
  - id: vmplayer-original-filename
    desc: vmplayer.exe original filename
    crit: component
    conf: 0.99
    if:
      type: text
      exact: vmplayer.exe
      section: .rsrc
  - id: vmware-workstation-product
    desc: VMware Workstation product string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: VMware Workstation
      section: .rsrc
  - id: notification-helper-original-filename
    desc: notification_helper.exe original filename string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: notification_helper.exe
      section: .rsrc
  - id: notification-helper-internal-name
    desc: notification_helper_exe internal name string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: notification_helper_exe
      section: .rsrc
  - id: notification-helper-pdb
    desc: notification_helper.exe PDB path
    crit: component
    conf: 0.96
    if:
      type: text
      exact: notification_helper.exe.pdb
  - id: getmac-original-filename
    desc: GetMac.exe original filename string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: GetMac.exe
      section: .rsrc
  - id: getmac-file-description
    desc: GetMac utility file description
    crit: component
    conf: 0.99
    if:
      type: text
      exact: Displays NIC MAC information
      section: .rsrc
  - id: getmac-product-string
    desc: Windows operating system product string
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Microsoft® Windows® Operating System
      section: .rsrc
  - id: office-source-engine-string
    desc: Office Source Engine version string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: Office Source Engine
      section: .rsrc
  - id: ose-original-filename
    desc: ose.exe original filename string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: ose.exe
      section: .rsrc
  - id: ose-internal-name
    desc: ose internal name string
    crit: component
    conf: 0.96
    if:
      type: text
      exact: ose
      section: .rsrc
composite_rules:
  - id: low-import-pe-without-heavy-rsrc
    desc: Low-import PE without dominant resources
    crit: baseline
    conf: 0.82
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::max-50-imports
    unless:
      - id: metadata/binary/resource::resource-heavy-rsrc
  - id: fake-windows-update-service-versioninfo
    desc: Fake Windows update service version info
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: windows-component-update-service
      - id: windows-software-foundation
      - id: winupdate-internal-name
    unless:
      - id: metadata/signed/platform::microsoft
  - id: clock-utility-masquerade
    desc: PE masquerades as Clock utility
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: objectives/evasion/masquerade/version-resource::clock-microsoft-product
      - id: objectives/evasion/masquerade/version-resource::clock-original-filename
  - id: winword-original-filename
    desc: Claims WINWORD.exe as original filename
    crit: component
    conf: 0.9
    all:
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: winword-exe-string
    near_bytes: 256
  - id: fake-microsoft-office-binary
    desc: PE masquerades as Microsoft Office in version metadata
    crit: suspicious
    conf: 0.85
    size_max: 800000
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
    any:
      - id: winword-original-filename
      - id: office-product-claim
  - id: unsigned-microsoft-masquerade
    desc: Unsigned PE claims Microsoft Corporation in version resource
    crit: suspicious
    conf: 0.88
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: low-import-pe-without-heavy-rsrc
    unless:
      - id: metadata/binary/symbols::zero-import-count
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/metrics::dotnet-binary
      - id: metadata/binary/framework::dotnet-metadata
      - id: objectives/anti-static/obfuscation/binary-metrics::sharpod-plugin-string
  - id: unsigned-microsoft-masquerade-packed
    desc: Packed PE claims Microsoft Corporation in version resource
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: objectives/anti-static/obfuscation/binary-metrics::binary-packed
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
  - id: packed-rider-loader-masquerade
    desc: Packed Rider-branded zero-import loader
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/vendor/jetbrains::rider-version-identity
      - id: metadata/binary/symbols::zero-import-raw
      - id: objectives/anti-static/obfuscation/binary-metrics::high-overall-entropy
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::very-high-entropy
      - id: objectives/command-and-control/dropper::high-entropy-binary
      - id: objectives/anti-static/obfuscation/binary-metrics::max-25-imports
    unless:
      - id: metadata/vendor/jetbrains::signed-jetbrains-binary
      - id: metadata/signed/platform
      - id: metadata/signed/developer
  - id: defender-typosquat-version-resource
    desc: Packed typoed Defender version resource
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: defender-typosquat-product
      - id: qwe-original-filename
    any:
      - id: metadata/package/versioning::pe-version-resource
    near_bytes: 384
  - id: stub-guid-internal-name
    desc: InternalName contains 'stub' with GUID
    crit: notable
    conf: 0.9
    all:
      - id: objectives/evasion/masquerade/version-resource::stub-guid-string
    any:
      - id: metadata/package/versioning::pe-version-resource
  - id: system-process-name-masquerade
    desc: PE contains well-known system process name
    crit: notable
    conf: 0.88
    all:
      - id: metadata/package/versioning::pe-originalfilename-field
    any:
      - id: onedrive-exe-string
      - id: jusched-exe-string
    unless:
      - id: metadata/signed/platform::microsoft
  - id: svcutil-system-config-masquerade
    desc: Unsigned PE masquerades as Microsoft svcutil system utility
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: svcutil-original-filename
    any:
      - id: system-configuration-utility
      - id: system-configuration-tool
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
  - id: ncstudio-controller-masquerade
    desc: Trojanized NcStudio controller identity
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: ncstudio-product-string
      - id: ncstudio-original-filename
      - id: pcimc-6a-product-string
    any:
      - id: objectives/anti-static/pack::reloc-rwx-encrypted-payload
      - id: objectives/anti-static/obfuscation/payload::unusual-alignment-pe
    needs: 1
  - id: randomized-version-identity
    desc: Randomized version resource identity
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/package/versioning::pe-productname-field
    any:
      - id: random-lowercase-exe-name
      - id: metadata/binary/debug::pdb-random-basename
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: file-falcon-system-applet-masquerade
    desc: File Falcon System Applet masquerade
    crit: suspicious
    conf: 0.97
    size_max: 400000
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-companyname-field
      - id: metadata/package/versioning::pe-productname-field
      - id: system-applet-product-claim
      - id: metadata/signed/developer::file-falcon
    any:
      - id: system-applet-copyright
      - id: micro-behaviors/os/privilege/manifest::highest-available
      - id: objectives/anti-static/obfuscation/binary-metrics::repeated-padding-marker
      - id: metadata/binary/layout::overlay-size-metrics
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: python-launcher-version-resource
    desc: Python Launcher version resource identity
    crit: component
    conf: 0.97
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-companyname-field
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: python-launcher-string
      - id: python-software-foundation-string
      - id: py-original-filename-string
  - id: scom-installer-masquerade
    desc: Unsigned SCOM installer masquerade
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: scom-2007-product
      - id: momagentinstaller-filename
    any:
      - id: momagentinstaller-description
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
      - id: metadata/hardening::nx-disabled
      - id: metadata/binary::binary-format-checked
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: google-chrome-notification-helper-versioninfo
    desc: Chrome notification helper version resource
    crit: component
    conf: 0.99
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-companyname-field
      - id: metadata/package/versioning::pe-productname-field
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: google-llc-company-string
      - id: google-chrome-product-string
      - id: notification-helper-original-filename
  - id: contradictory-browser-pdf-versioninfo
    desc: Contradictory browser PDF version identity
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-companyname-field
      - id: metadata/package/versioning::pe-productname-field
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: google-company-string
      - id: chrome-exe-version-string
      - id: pdf-exe-version-string
    unless:
      - id: metadata/signed/platform::microsoft
  - id: vmware-player-version-resource
    desc: VMware Player version resource identity
    crit: component
    conf: 0.99
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-companyname-field
      - id: metadata/package/versioning::pe-productname-field
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: vmware-inc-company-string
      - id: vmware-player-description
      - id: vmplayer-original-filename
      - id: vmware-workstation-product
  - id: unsigned-google-chrome-reloc-carrier
    desc: Unsigned Chrome host with encrypted reloc
    crit: suspicious
    conf: 0.99
    all:
      - id: google-chrome-notification-helper-versioninfo
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-reloc-payload-carrier
    any:
      - id: notification-helper-internal-name
      - id: notification-helper-pdb
    needs: 1
  - id: unfilled-template-version-resource
    desc: Version resource with unfilled TODO placeholders
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/versioning::pe-version-resource
    any:
      - id: todo-company-name-placeholder
      - id: todo-product-name-placeholder
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: chrome-updater-dropper-masquerade
    desc: Dropper masquerading as Chrome Updater with unfilled metadata
    crit: suspicious
    conf: 0.97
    all:
      - id: chrome-updater-file-description
      - id: metadata/package/versioning::pe-version-resource
    any:
      - id: todo-company-name-placeholder
      - id: todo-product-name-placeholder
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: getmac-version-resource
    desc: GetMac version resource identity
    crit: component
    conf: 0.99
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: getmac-original-filename
      - id: getmac-file-description
      - id: getmac-product-string
  - id: office-source-engine-version-resource
    desc: Office Source Engine version resource
    crit: component
    conf: 0.99
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-companyname-field
      - id: metadata/package/versioning::pe-productname-field
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/package/versioning::pe-internalname-field
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: office-source-engine-string
      - id: ose-original-filename
      - id: ose-internal-name
  - id: unsigned-office-source-engine-masquerade
    desc: Unsigned Office Source Engine masquerade
    crit: suspicious
    conf: 0.99
    all:
      - id: office-source-engine-version-resource
    any:
      - id: metadata/binary/debug::office-source-engine-pdb
      - id: micro-behaviors/os/service/control::service-dispatch-triad
      - id: objectives/anti-static/pack::rwx-reloc-service-loader
      - id: objectives/anti-static/pack::reloc-self-reading-loader
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
  - id: unsigned-vmware-player-masquerade
    desc: Unsigned VMware Player masquerade
    crit: suspicious
    conf: 0.98
    size_max: 200000
    all:
      - id: vmware-player-version-resource
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::repeated-padding-marker
      - id: metadata/binary/metrics::no-functions
      - id: metadata/binary/metrics::many-imports
    needs: 1
  - id: unsigned-getmac-masquerade
    desc: Unsigned PE masquerades as GetMac utility
    crit: suspicious
    conf: 0.98
    all:
      - id: getmac-version-resource
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::binary-packed
      - id: objectives/anti-static/pack/detect::upx-section
      - id: metadata/hardening/memory::wx-section
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
  - id: signed-applicationframehost-masquerade
    desc: Signed PE masquerades as ApplicationFrameHost
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-originalfilename-field
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: application-frame-host-description
      - id: applicationframehost-original-filename
      - id: microsoft-windows-systemutility-manifest
      - id: metadata/signed/platform::microsoft
    unless:
      - id: objectives/evasion/masquerade/version-resource/applicationframehost::basename
  - id: signed-basic-loader-masquerade
    desc: Signed basic_loader AppFrameHost trojan
    crit: hostile
    conf: 0.99
    all:
      - id: signed-applicationframehost-masquerade
      - id: metadata/binary/debug::basic-loader-pdb
