defaults:
  attack: T1036.005
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: clock-microsoft-product
    desc: Clock Microsoft product claim
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: Clock Microsoft
      section: .rsrc
  - id: clock-original-filename
    desc: Clock.EXE original filename
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: Clock.EXE
      section: .rsrc
  - id: winword-exe-string
    desc: WINWORD.EXE version string
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: winword.exe
      case_insensitive: true
      section: .rsrc
  - id: office-product-claim
    desc: Claims to be Microsoft Office product
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: Microsoft Office (20|system)
      case_insensitive: true
      section: .rsrc
  - id: defender-typosquat-product
    desc: Typoed Windows Defender product
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: Windwos Defender
      section: .rsrc
  - id: qwe-original-filename
    desc: qwe.exe original filename string
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: qwe.exe
      section: .rsrc
  - id: onedrive-exe-string
    desc: OneDrive.exe name in binary
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: OneDrive.exe
  - id: jusched-exe-string
    desc: jusched.exe name in binary
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: jusched.exe
  - id: stub-guid-string
    desc: '''stub'' with GUID pattern in version resource'
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: stub_[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
      case_insensitive: true
      section: .rsrc
composite_rules:
  - id: clock-utility-masquerade
    desc: PE masquerades as Clock utility
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/quality/versioning::pe-version-resource
      - id: metadata/quality/versioning::pe-originalfilename-field
      - id: objectives/evasion/masquerade/version-resource::clock-microsoft-product
      - id: objectives/evasion/masquerade/version-resource::clock-original-filename
  - id: winword-original-filename
    desc: Claims WINWORD.exe as original filename
    crit: component
    conf: 0.9
    all:
      - id: metadata/quality/versioning::pe-originalfilename-field
      - id: winword-exe-string
    near_bytes: 256
  - id: fake-microsoft-office-binary
    desc: PE masquerades as Microsoft Office in version metadata
    crit: suspicious
    conf: 0.85
    size_max: 800000
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
    any:
      - id: winword-original-filename
      - id: office-product-claim
  - id: unsigned-microsoft-masquerade
    desc: Unsigned PE claims Microsoft Corporation in version resource
    crit: suspicious
    conf: 0.88
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: objectives/anti-static/obfuscation/binary-metrics::max-50-imports
    none:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
      - id: metadata/format::many-imports
    unless:
      - type: metrics
        field: pe.is_dotnet
        min: 1
  - id: unsigned-microsoft-masquerade-packed
    desc: Packed PE claims Microsoft Corporation in version resource
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: objectives/anti-static/obfuscation/binary-metrics::binary-packed
    none:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
  - id: defender-typosquat-version-resource
    desc: Packed typoed Defender version resource
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/quality/versioning::pe-originalfilename-field
      - id: defender-typosquat-product
      - id: qwe-original-filename
    any:
      - id: metadata/quality/versioning::pe-version-resource
    near_bytes: 384
  - id: stub-guid-internal-name
    desc: InternalName contains 'stub' with GUID
    crit: notable
    conf: 0.9
    all:
      - id: objectives/evasion/masquerade/version-resource::stub-guid-string
    any:
      - id: metadata/quality/versioning::pe-version-resource
  - id: system-process-name-masquerade
    desc: PE contains well-known system process name
    crit: notable
    conf: 0.88
    all:
      - id: metadata/quality/versioning::pe-originalfilename-field
    any:
      - id: onedrive-exe-string
      - id: jusched-exe-string
    none:
      - id: metadata/signed/platform::microsoft
