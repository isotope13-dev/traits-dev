# PE Version Resource Masquerading
# Detects PE binaries claiming to be Microsoft products
# ATT&CK: T1036.005 (Match Legitimate Name or Location)
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: microsoft-corp-versioninfo
    desc: Claims Microsoft Corp in version resource
    crit: component
    conf: 0.9
    attack: "T1036.005"
    if:
      type: string
      regex: "Microsoft Corp(oration)?\\.?"
      case_insensitive: true
      section: .rsrc
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
  - id: originalfilename-label
    desc: OriginalFilename field label
    crit: component
    conf: 0.9
    attack: "T1036.005"
    if:
      type: string
      substr: "OriginalFilename"
      section: .rsrc
  - id: winword-exe-string
    desc: WINWORD.EXE version string
    crit: component
    conf: 0.9
    attack: "T1036.005"
    if:
      type: string
      substr: "winword.exe"
      case_insensitive: true
      section: .rsrc
  - id: office-product-claim
    desc: Claims to be Microsoft Office product
    crit: component
    conf: 0.9
    attack: "T1036.005"
    if:
      type: string
      regex: "Microsoft Office (20|system)"
      case_insensitive: true
      section: .rsrc
composite_rules:
  - id: winword-original-filename
    desc: Claims WINWORD.exe as original filename
    crit: component
    conf: 0.9
    attack: "T1036.005"
    all:
      - id: originalfilename-label
      - id: winword-exe-string
    near_bytes: 256
  - id: fake-microsoft-office-binary
    desc: PE masquerades as Microsoft Office in version metadata
    crit: suspicious
    conf: 0.85
    attack: "T1036.005"
    size_max: 800000
    all:
      - id: microsoft-corp-versioninfo
    any:
      - id: winword-original-filename
      - id: office-product-claim
  - id: unsigned-microsoft-masquerade
    desc: Unsigned PE claims Microsoft Corporation in version resource
    crit: suspicious
    conf: 0.88
    attack: "T1036.005"
    all:
      - id: microsoft-corp-versioninfo
      - id: objectives/anti-static/obfuscation/binary-metrics::max-50-imports
    none:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
      - id: metadata/format::many-imports
  - id: unsigned-microsoft-masquerade-packed
    desc: Packed PE claims Microsoft Corporation in version resource
    crit: suspicious
    conf: 0.9
    attack: "T1036.005"
    all:
      - id: microsoft-corp-versioninfo
      - id: metadata/format::no-functions
    none:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
