defaults:
  attack: T1036.005
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: random-lowercase-exe-name
    desc: Random lowercase executable name
    crit: component
    conf: 0.86
    if:
      type: string_value
      regex: ^[a-z]{8,16}\.exe$
      section: .rsrc
  - id: clock-microsoft-product
    desc: Clock Microsoft product claim
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: Clock Microsoft
      section: .rsrc
  - id: clock-original-filename
    desc: Clock.EXE original filename
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: Clock.EXE
      section: .rsrc
  - id: winword-exe-string
    desc: WINWORD.EXE version string
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: winword.exe
      case_insensitive: true
      section: .rsrc
  - id: office-product-claim
    desc: Claims to be Microsoft Office product
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: Microsoft Office (20|system)
      case_insensitive: true
      section: .rsrc
  - id: defender-typosquat-product
    desc: Typoed Windows Defender product
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: Windwos Defender
      section: .rsrc
  - id: qwe-original-filename
    desc: qwe.exe original filename string
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: qwe.exe
      section: .rsrc
  - id: onedrive-exe-string
    desc: OneDrive.exe name in binary
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: OneDrive.exe
  - id: jusched-exe-string
    desc: jusched.exe name in binary
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: jusched.exe
  - id: svcutil-original-filename
    desc: svcutil.exe original filename string
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: svcutil.exe
      section: .rsrc
  - id: system-configuration-utility
    desc: System Configuration Utility version string
    crit: component
    conf: 0.94
    if:
      type: string_value
      exact: System Configuration Utility
      section: .rsrc
  - id: system-configuration-tool
    desc: System Configuration Tool product string
    crit: component
    conf: 0.94
    if:
      type: string_value
      exact: System Configuration Tool
      section: .rsrc
  - id: stub-guid-string
    desc: '''stub'' with GUID pattern in version resource'
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: stub_[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
      case_insensitive: true
      section: .rsrc
  - id: system-applet-product-claim
    desc: System Applet product claim
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: System Applet
      section: .rsrc
  - id: system-applet-copyright
    desc: System Applet copyright string
    crit: component
    conf: 0.92
    if:
      type: string_value
      substr: Copyright (C) 2013 System Applet
      section: .rsrc
composite_rules:
  - id: clock-utility-masquerade
    desc: PE masquerades as Clock utility
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/quality/versioning::pe-version-resource
      - id: metadata/quality/versioning::pe-originalfilename-field
      - id: objectives/evasion/masquerade/version-resource::clock-microsoft-product
      - id: objectives/evasion/masquerade/version-resource::clock-original-filename
  - id: winword-original-filename
    desc: Claims WINWORD.exe as original filename
    crit: component
    conf: 0.9
    all:
      - id: metadata/quality/versioning::pe-originalfilename-field
      - id: winword-exe-string
    near_bytes: 256
  - id: fake-microsoft-office-binary
    desc: PE masquerades as Microsoft Office in version metadata
    crit: suspicious
    conf: 0.85
    size_max: 800000
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
    any:
      - id: winword-original-filename
      - id: office-product-claim
  - id: unsigned-microsoft-masquerade
    desc: Unsigned PE claims Microsoft Corporation in version resource
    crit: suspicious
    conf: 0.88
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: objectives/anti-static/obfuscation/binary-metrics::max-50-imports
    none:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
      - id: metadata/format::many-imports
    unless:
      - type: metrics
        field: pe.is_dotnet
        min: 1
  - id: unsigned-microsoft-masquerade-packed
    desc: Packed PE claims Microsoft Corporation in version resource
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: objectives/anti-static/obfuscation/binary-metrics::binary-packed
    none:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
  - id: defender-typosquat-version-resource
    desc: Packed typoed Defender version resource
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/quality/versioning::pe-originalfilename-field
      - id: defender-typosquat-product
      - id: qwe-original-filename
    any:
      - id: metadata/quality/versioning::pe-version-resource
    near_bytes: 384
  - id: stub-guid-internal-name
    desc: InternalName contains 'stub' with GUID
    crit: notable
    conf: 0.9
    all:
      - id: objectives/evasion/masquerade/version-resource::stub-guid-string
    any:
      - id: metadata/quality/versioning::pe-version-resource
  - id: system-process-name-masquerade
    desc: PE contains well-known system process name
    crit: notable
    conf: 0.88
    all:
      - id: metadata/quality/versioning::pe-originalfilename-field
    any:
      - id: onedrive-exe-string
      - id: jusched-exe-string
    none:
      - id: metadata/signed/platform::microsoft
  - id: svcutil-system-config-masquerade
    desc: Unsigned PE masquerades as Microsoft svcutil system utility
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/quality/versioning::pe-version-resource
      - id: metadata/quality/versioning::pe-originalfilename-field
      - id: svcutil-original-filename
    any:
      - id: system-configuration-utility
      - id: system-configuration-tool
    none:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
  - id: randomized-version-identity
    desc: Randomized version resource identity
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/quality/versioning::pe-version-resource
      - id: metadata/quality/versioning::pe-originalfilename-field
      - id: metadata/quality/versioning::pe-productname-field
    any:
      - id: random-lowercase-exe-name
      - id: metadata/binary/debug-info::pdb-random-basename
    needs: 2
    none:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: file-falcon-system-applet-masquerade
    desc: File Falcon System Applet masquerade
    crit: suspicious
    conf: 0.97
    size_max: 400000
    all:
      - id: metadata/quality/versioning::pe-version-resource
      - id: metadata/quality/versioning::pe-companyname-field
      - id: metadata/quality/versioning::pe-productname-field
      - id: system-applet-product-claim
      - id: metadata/signed/developer::file-falcon
    any:
      - id: system-applet-copyright
      - id: micro-behaviors/os/privilege/manifest::highest-available
      - id: objectives/anti-static/obfuscation/binary-metrics::repeated-padding-marker
      - id: metadata/format/pe::overlay-size-metrics
    needs: 2
    none:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
