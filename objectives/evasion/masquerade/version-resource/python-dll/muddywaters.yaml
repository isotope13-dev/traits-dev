defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: hostile
  conf: 0.9
traits:
  - id: muddywaters-python-dll-basename
    desc: CPython DLL basename
    crit: component
    if:
      type: basename
      regex: '(?i)^python[0-9]*\.dll$'
composite_rules:
  - id: spoofed-metadata-conflict
    desc: Trusted vendor metadata but high-entropy code/data (potential spoofing)
    any:
      - id: metadata/binary/section/metrics::high-entropy-resource-small-dll
      - id: metadata/binary/section/metrics::oversized-rdata-ratio
    unless:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-meipass
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: muddywaters-python-dll-basename
      - id: metadata/binary/anomaly/format::vcruntime-dll-basename
      - id: metadata/binary/anomaly/format::libcrypto-dll-basename
      - id: metadata/binary/anomaly/format::libssl-dll-basename
