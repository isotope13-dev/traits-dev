defaults:
  attack: T1036.005
  for: [pe]
  platforms: [windows]

traits:
- id: rpc-locator-assembly-name
  desc: RPC Locator assembly identity
  crit: component
  conf: 0.98
  if:
    type: text
    exact: name="Microsoft-Windows-RPC-Locator"
    section: .rsrc
- id: rpc-locator-service-description
  desc: RPC Locator service description
  crit: component
  conf: 0.98
  if:
    type: text
    exact: <description>RPC Locator Service</description>
    section: .rsrc
- id: rpc-locator-file-description
  desc: Rpc Locator file description
  crit: component
  conf: 0.97
  if:
    type: text
    exact: Rpc Locator
    section: .rsrc
- id: locator-original-filename
  desc: locator.exe original filename string
  crit: component
  conf: 0.97
  if:
    type: text
    exact: locator.exe
    section: .rsrc

composite_rules:
- id: rpc-locator-version-resource
  desc: RPC Locator version resource identity
  crit: notable
  conf: 0.99
  all:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: rpc-locator-assembly-name
  - id: rpc-locator-service-description
  - id: rpc-locator-file-description
  - id: locator-original-filename
- id: unsigned-rpc-locator-reloc-loader
  desc: Unsigned RPC Locator packed loader
  crit: suspicious
  conf: 0.99
  all:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: rpc-locator-assembly-name
  - id: rpc-locator-service-description
  - id: rpc-locator-file-description
  - id: locator-original-filename
  - id: objectives/anti-static/pack/section-anomaly::reloc-readonly-encrypted-payload
  - id: micro-behaviors/os/service/control::service-dispatch-triad
  any:
  - id: objectives/anti-static/pack/section-anomaly::readonly-reloc-service-apihash-loader
  - id: objectives/evasion/anti-av/api-hashing::wide-string-uppercase-mask
  - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
  unless:
  - id: metadata/signed/platform/
