defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  size_min: 1000
  size_max: 10000000
composite_rules:
  - id: office-kms-client-lure
    desc: Contains strings related to KMS activation of Microsoft Office
    crit: notable
    conf: 0.8
    any:
      - id: office-kms-client-lure-string-1
      - id: office-kms-client-lure-string-2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
traits:
  - id: office-kms-client-lure-string-1
    desc: KMS client lure string
    crit: component
    if:
      type: string_value
      substr: KMS client
      section: .rsrc
  - id: office-kms-client-lure-string-2
    desc: Office KMS client lure string
    crit: component
    if:
      type: string_value
      regex: Office.{0,30}KMS|KMS.{0,30}Office
      case_insensitive: true
      section: .rsrc
