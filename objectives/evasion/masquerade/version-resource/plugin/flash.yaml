defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

traits:
  - id: macromedia-flash-company-claim
    desc: Macromedia company version claim
    crit: component
    conf: 0.95
    ref: sha256:68fa7c436e293739e98bb04034db6d6a3e40a9b9991de5d147368fb696044499
    if:
      type: value
      path: pe.version.company
      exact: Macromedia, Inc.

  - id: shockwave-flash-product-claim
    desc: Shockwave Flash product claim
    crit: component
    conf: 0.95
    ref: sha256:68fa7c436e293739e98bb04034db6d6a3e40a9b9991de5d147368fb696044499
    if:
      type: value
      path: pe.version.product_name
      exact: Shockwave Flash

  - id: flash-plugin-original-filename
    desc: Flash plugin original filename
    crit: component
    conf: 0.95
    ref: sha256:68fa7c436e293739e98bb04034db6d6a3e40a9b9991de5d147368fb696044499
    if:
      type: value
      path: pe.version.original_filename
      exact: npswf32.dll

  - id: flash-plugin-internal-name
    desc: Flash plugin internal name
    crit: component
    conf: 0.95
    ref: sha256:68fa7c436e293739e98bb04034db6d6a3e40a9b9991de5d147368fb696044499
    if:
      type: value
      path: pe.version.internal_name
      exact: Macromedia Flash Player 6.0

composite_rules:
  - id: flash-plugin-version-identity
    desc: Flash plugin VERSIONINFO identity
    crit: component
    conf: 0.96
    ref: sha256:68fa7c436e293739e98bb04034db6d6a3e40a9b9991de5d147368fb696044499
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: macromedia-flash-company-claim
      - id: shockwave-flash-product-claim
      - id: flash-plugin-original-filename
    any:
      - id: flash-plugin-internal-name

  - id: flash-plugin-infector-masquerade
    desc: Infector masquerades as Flash plugin
    crit: hostile
    conf: 0.97
    ref: sha256:68fa7c436e293739e98bb04034db6d6a3e40a9b9991de5d147368fb696044499
    all:
      - id: flash-plugin-version-identity
      - id: objectives/impact/infect/binary/rewrite::legacy-win32-file-infector-scaffold
      - id: metadata/binary/layout::pe-entry-debug-section
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor::adobe-installer-context
