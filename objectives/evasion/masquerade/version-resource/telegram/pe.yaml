defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1036.005
traits:
  - id: telegram-fz-llc-company
    desc: Telegram FZ-LLC company claim
    crit: component
    conf: 0.98
    if:
      type: text
      exact: Telegram FZ-LLC
      section: .rsrc
  - id: telegram-desktop-description
    desc: Telegram Desktop file description
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Telegram Desktop
      section: .rsrc
  - id: telegram-desktop-version
    desc: Telegram Desktop 6.3.6.0 version
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 6.3.6.0
      section: .rsrc
composite_rules:
  - id: telegram-desktop-version-resource
    desc: Telegram Desktop version resource identity
    crit: component
    conf: 0.99
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/package/versioning::pe-companyname-field
      - id: metadata/package/versioning::pe-filedescription-field
      - id: metadata/package/versioning::pe-productname-field
      - id: objectives/evasion/masquerade/version-resource/telegram::telegram-fz-llc-company
      - id: objectives/evasion/masquerade/version-resource/telegram::telegram-desktop-description
      - id: objectives/evasion/masquerade/version-resource/telegram::telegram-desktop-version
