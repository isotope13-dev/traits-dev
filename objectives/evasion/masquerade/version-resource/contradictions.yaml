# Version Resource Contradictions
# Different companies in CompanyName vs LegalCopyright indicate fabricated metadata
# ATT&CK: T1036.005 (Match Legitimate Name or Location)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1036.005
traits:
  - id: cisco-copyright
    desc: Cisco Systems copyright string
    crit: component
    conf: 0.9
    if:
      type: string
      substr: "Cisco Systems"
      section: .rsrc
  - id: adobe-copyright
    desc: Adobe copyright string
    crit: component
    conf: 0.9
    if:
      type: string
      regex: "Adobe (Systems|Inc)"
      section: .rsrc
composite_rules:
  - id: microsoft-cisco-contradiction
    desc: Claims Microsoft company with Cisco copyright
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: cisco-copyright
  - id: microsoft-adobe-contradiction
    desc: Claims Microsoft company with Adobe copyright
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: adobe-copyright
