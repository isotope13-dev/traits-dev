defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1036.005
traits:
  - id: cisco-copyright
    desc: Cisco Systems copyright string
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: Cisco Systems
      section: .rsrc
  - id: adobe-copyright
    desc: Adobe copyright string
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: Adobe (Systems|Inc)
      section: .rsrc
  - id: adobe-postscript-resource
    desc: Adobe PostScript resource marker
    crit: component
    conf: 0.95
    if:
      type: string_value
      regex: "%%!PS-Adobe-|Pscript_WinNT_|CIDSystemInfo"
      section: .rsrc
  - id: adobe-registry-resource
    desc: Adobe Registry resource marker
    crit: component
    conf: 0.95
    if:
      type: string_value
      substr: /Registry(Adobe)
      section: .rsrc
  - id: adobe-font-encoding
    desc: Adobe font encoding reference
    crit: component
    conf: 0.95
    if:
      type: string_value
      substr: adobe-standard-encoding
  - id: adobe-pdb-path
    desc: Adobe product in PDB debug path
    crit: component
    conf: 0.88
    if:
      type: string_value
      regex: Adobe(ARM|Acrobat|Reader).{0,50}\.pdb
  - id: macromedia-company
    desc: Macromedia company string in resource
    crit: component
    conf: 0.92
    if:
      type: string_value
      exact: Macromedia, Inc.
      section: .rsrc
  - id: flash-player-product
    desc: Flash Player product claim
    crit: component
    conf: 0.92
    if:
      type: string_value
      regex: Shockwave Flash|Macromedia Flash Player
      section: .rsrc
  - id: npswf32-original-filename
    desc: npswf32 Flash plugin filename claim
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: npswf32.dll
      section: .rsrc
composite_rules:
  - id: microsoft-cisco-contradiction
    desc: Claims Microsoft company with Cisco copyright
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: cisco-copyright
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
        - type: metrics
          field: binary.string_count
          min: 10000
  - id: microsoft-adobe-contradiction
    desc: Claims Microsoft company with Adobe copyright
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: adobe-copyright
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
        - id: adobe-postscript-resource
        - id: adobe-registry-resource
        - id: adobe-font-encoding
  - id: unsigned-adobe-masquerade
    desc: Unsigned binary masquerading as Adobe product
    crit: suspicious
    conf: 0.9
    all:
      - id: adobe-copyright
    any:
      - id: adobe-pdb-path
      - id: metadata/binary/debug::pdb-nonstandard-drive
    unless:
      - id: metadata/signed/platform::microsoft
  - id: unsigned-flash-plugin-masquerade
    desc: Unsigned binary posing as Flash plugin
    crit: suspicious
    conf: 0.95
    all:
      - id: macromedia-company
      - id: flash-player-product
      - id: npswf32-original-filename
    any:
      - id: metadata/binary/anomaly::timestamp-anomaly
      - id: metadata/binary/anomaly::invalid-console-api-import
