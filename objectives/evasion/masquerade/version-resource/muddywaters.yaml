defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: hostile
  conf: 0.9
composite_rules:
  - id: spoofed-metadata-conflict
    desc: Trusted vendor metadata but high-entropy code/data (potential spoofing)
    all:
      - id: metadata/vendor/sife::sife-software
    any:
      - id: metadata/binary/section::high-entropy-resource-small-dll
      - id: metadata/binary/section::oversized-rdata-ratio
