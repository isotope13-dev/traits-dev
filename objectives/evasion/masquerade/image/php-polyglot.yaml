defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [jpeg]
  attack: T1027
composite_rules:
  - id: embedded-php-loader
    desc: JPEG masquerading as PHP loader
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/data/embedded/payload::embedded-php-open-tag
      - id: micro-behaviors/crypto/symmetric/aes::openssl-decrypt-call
  - id: html-php-decoy
    desc: JPEG with HTML and PHP decoy
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/data/embedded/payload::embedded-php-open-tag
      - id: micro-behaviors/data/embedded/payload::embedded-html-doctype
