defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

traits:
- id: cracked-software-claim
  desc: PE claims cracked software
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: pe.version.description
    regex: '(?i)\b(crack|keygen|warez)\b'

composite_rules:
- id: cracked-encrypted-bndl-loader
  desc: Cracked-software claim on encrypted loader
  crit: hostile
  conf: 0.98
  attack: "T1036.005,T1027,T1105"
  all:
  - id: cracked-software-claim
  - id: objectives/command-and-control/dropper/staging/encrypted::chacha-bndl-temp-exe-dropper
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
