# LNK files masquerading as documents via double extension.
# Filenames like Spisok.xlsx.lnk, Invoice.pdf.lnk, Report.docx.lnk
# rely on Windows Explorer hiding the .lnk extension by default —
# the user sees a "Spisok.xlsx" icon and clicks expecting Excel.
# Native Windows shortcuts to Office documents are .lnk files in
# Recent/Pinned that point at .xlsx by absolute path; what makes
# document.<office>.lnk distinctive as malware is the BASENAME
# embedding the source extension, not the link's target.
defaults:
  platforms: [windows]
  for: [lnk]
  attack: T1036.007
  mbc: F0008
traits:
  - id: lnk-name-xlsx-double
    desc: LNK named *.xlsx.lnk
    crit: suspicious
    conf: 0.95
    if:
      type: basename
      regex: '(?i)\.xlsx?\.lnk$'
  - id: lnk-name-docx-double
    desc: LNK named *.docx.lnk
    crit: suspicious
    conf: 0.95
    if:
      type: basename
      regex: '(?i)\.docx?\.lnk$'
  - id: lnk-name-pdf-double
    desc: LNK named *.pdf.lnk
    crit: suspicious
    conf: 0.97
    if:
      type: basename
      regex: '(?i)\.pdf\.lnk$'
  - id: lnk-name-pptx-double
    desc: LNK named *.pptx.lnk
    crit: suspicious
    conf: 0.95
    if:
      type: basename
      regex: '(?i)\.pptx?\.lnk$'
  - id: lnk-name-zip-rar-double
    desc: LNK named *.zip/rar.lnk
    crit: suspicious
    conf: 0.95
    if:
      type: basename
      regex: '(?i)\.(zip|rar|7z)\.lnk$'
  - id: lnk-name-tar-gz-double
    desc: LNK named *.tar/tgz/gz.lnk
    crit: suspicious
    conf: 0.95
    if:
      type: basename
      regex: '(?i)\.(tar|tgz|gz)\.lnk$'
  - id: lnk-name-jpg-png-double
    desc: LNK named *.jpg/png.lnk
    crit: suspicious
    conf: 0.93
    if:
      type: basename
      regex: '(?i)\.(jpg|jpeg|png)\.lnk$'
  - id: lnk-name-gif-bmp-double
    desc: LNK named *.gif/bmp.lnk
    crit: suspicious
    conf: 0.93
    if:
      type: basename
      regex: '(?i)\.(gif|bmp)\.lnk$'
composite_rules:
  - id: document-extension-lnk-masquerade
    desc: LNK masquerading as document/archive
    crit: hostile
    conf: 0.95
    any:
      - id: lnk-name-xlsx-double
      - id: lnk-name-docx-double
      - id: lnk-name-pdf-double
      - id: lnk-name-pptx-double
      - id: lnk-name-zip-rar-double
      - id: lnk-name-tar-gz-double
      - id: lnk-name-jpg-png-double
      - id: lnk-name-gif-bmp-double
