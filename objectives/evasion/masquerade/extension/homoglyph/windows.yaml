defaults:
  platforms: [windows]
  for: [data, 7z]
  attack: T1036.007
traits:
  - id: doc-extension-cyrillic-c
    desc: Document extension uses Cyrillic c
    crit: suspicious
    conf: 0.96
    if:
      type: basename
      regex: '(?i)\.do\x{0441}$'
  - id: exe-extension-cyrillic-e
    desc: Executable extension uses Cyrillic e
    crit: suspicious
    conf: 0.96
    for: [pe]
    if:
      type: basename
      regex: '(?i)\.ex\x{0435}$'
  - id: docx-extension-cyrillic-x
    desc: Document extension uses Cyrillic x
    crit: suspicious
    conf: 0.94
    for: [data, 7z, ooxml]
    if:
      type: basename
      regex: '(?i)\.doc\x{0445}$'
  - id: xlsx-extension-cyrillic-x
    desc: Spreadsheet extension uses Cyrillic x
    crit: suspicious
    conf: 0.94
    for: [data, 7z, ooxml]
    if:
      type: basename
      regex: '(?i)\.xls\x{0445}$'
composite_rules: []
