# PE32/PE32+ binaries with text/document filename extensions (.txt,
# .doc, .log, .dat). The MZ magic at offset 0 plus a non-PE filename
# is masquerade — the file ships in a zip alongside an LNK or script
# that invokes it via "cmd /c name.txt" so the OS executes it anyway.
# Image-extension and PDF-extension masquerades live in the sibling
# extension-mismatch/ directory.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.008
  mbc: F0008
traits:
  - id: pe-named-as-txt
    desc: PE binary with .txt extension
    crit: suspicious
    conf: 0.97
    if:
      type: basename
      regex: '(?i)\.txt$'
  - id: pe-named-as-doc
    desc: PE binary with .doc/.docx extension
    crit: suspicious
    conf: 0.97
    if:
      type: basename
      regex: '(?i)\.docx?$'
  - id: pe-named-as-log
    desc: PE binary with .log/.dat extension
    crit: suspicious
    conf: 0.95
    if:
      type: basename
      regex: '(?i)\.(log|dat)$'
    unless:
      - id: objectives/anti-static/obfuscation/payload/loader::native-clr-benign-context
