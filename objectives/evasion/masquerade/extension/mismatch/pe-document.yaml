# PE32/PE32+ binaries with text/document filename extensions (.txt,
# .doc, .log, .dat). The MZ magic at offset 0 plus a non-PE filename
# is masquerade — the file ships in a zip alongside an LNK or script
# that invokes it via "cmd /c name.txt" so the OS executes it anyway.
# Image-extension and PDF-extension masquerades live in the sibling
# extension-mismatch/ directory.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.008
  mbc: F0008
traits:
  - id: pe-named-as-source
    desc: PE binary disguised with a source-file extension
    crit: suspicious
    conf: 0.97
    if:
      type: path
      basename: true
      regex: '(?i)\.(c(pp)?|h(pp)?|go|rs|js|m?js|ts|py|pl|pm|rb|php|ps1|sh)$'
  - id: pe-named-as-txt
    desc: PE binary with .txt extension
    crit: suspicious
    conf: 0.97
    if:
      type: path
      basename: true
      regex: '(?i)\.txt$'
  - id: pe-named-as-doc
    desc: PE binary with .doc/.docx extension
    crit: suspicious
    conf: 0.97
    if:
      type: path
      basename: true
      regex: '(?i)\.docx?$'
  - id: pe-named-as-log
    desc: PE binary with .log/.dat extension
    crit: suspicious
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)\.(log|dat)$'
    unless:
      - id: objectives/anti-static/obfuscation/payload/loader/
      - id: well-known/game/steam/
    downgrade:
      any:
        - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
composite_rules:
  - id: source-disguised-rwx-loader
    desc: Source-named PE with decoded-code execution
    crit: hostile
    conf: 0.99
    attack: T1036.008,T1027,T1620
    all:
      - id: pe-named-as-source
      - id: objectives/anti-static/obfuscation/binary-structure::rwx-lookup-decoded-code
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/tool/reverse-engineering/
