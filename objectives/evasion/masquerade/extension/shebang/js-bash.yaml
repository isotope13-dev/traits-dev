# JavaScript files (.js extension) carrying a bash/sh shebang as their
# first bytes. Legitimate JS files never start with #!/bin/bash —
# Node-shebang JS files use #!/usr/bin/env node. The bash shebang on
# a .js file is purpose-built to confuse static analysers (cleave's
# own file-type detector is fooled into Shell mode). Used by
# obfuscator-rotated npm-supply-chain droppers (xmrdropper et al).
defaults:
  platforms: [unix, windows]
  for: [shell, javascript]
  attack: T1036.008
  mbc: F0008
traits:
  # A JavaScript source file is a masquerade candidate only when the shell
  # interpreter directive is the file's first bytes. Shell snippets embedded
  # in JavaScript strings (for example, generated Git hooks) are not file
  # shebangs and must not enter this objective.
  - id: js-source-with-shell-shebang
    desc: JavaScript source starts with shell shebang
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: raw
      offset: 0
      regex: '^#!\\s*((/usr)?/bin/(ba)?sh|/usr/bin/env\\s+(ba)?sh)(\\s|$)'

composite_rules:
  - id: js-with-bash-shebang
    desc: .js file masquerading as bash script
    crit: hostile
    conf: 0.97
    # The .js extension precondition is referenced from its canonical
    # neutral location at metadata/lang/source::js-ts-source-basename
    # (matches .js/.mjs/.cjs/.ts/.jsx/.tsx) rather than duplicated here.
    all:
      - id: js-source-with-shell-shebang
      - id: metadata/lang/scripted::js-require-binding
    unless:
      - id: well-known/lib/nextjs::package-member-context
      - id: metadata/package/testing/presence/harness::test-spec-path-benign-context
