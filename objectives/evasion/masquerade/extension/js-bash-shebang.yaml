# JavaScript files (.js extension) carrying a bash/sh shebang as their
# first bytes. Legitimate JS files never start with #!/bin/bash —
# Node-shebang JS files use #!/usr/bin/env node. The bash shebang on
# a .js file is purpose-built to confuse static analysers (cleave's
# own file-type detector is fooled into Shell mode). Used by
# obfuscator-rotated npm-supply-chain droppers (xmrdropper et al).
defaults:
  platforms: [unix, windows]
  for: [shell, javascript]
  attack: T1036.008
  mbc: F0008
traits:
  - id: js-extension-name
    desc: Filename has .js extension
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '\.js$'
  - id: bash-shebang-first-line
    desc: File starts with bash/sh shebang
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '^#!/(usr/)?bin/(ba)?sh'
  - id: js-syntax-marker
    desc: JS-syntax marker (var/const/require)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\b(const|let|var)\s+[A-Za-z_$][\w$]{0,40}\s*=\s*require\s*\('
composite_rules:
  - id: js-with-bash-shebang
    desc: .js file masquerading as bash script
    crit: hostile
    conf: 0.97
    all:
      - id: js-extension-name
      - id: bash-shebang-first-line
      - id: js-syntax-marker
