# WSH explicit engine override to hide script behind a non-script extension
# wscript.exe //e:vbscript foo.ini  →  .ini is VBScript masquerading as config
# wscript.exe //e:jscript  foo.dat  →  .dat is JScript masquerading as data
# ATT&CK: T1036.008 (Masquerading: Rename System Utilities is closest;
#          T1059.005 for VBScript engine abuse also relevant)
defaults:
  platforms: [windows]
  for:
    - batch
    - javascript
    - powershell
    - vbs
    - pe
  crit: suspicious
  conf: 0.9
  attack: T1036.008
traits:
  - id: wscript-engine-vbscript-override
    desc: wscript run with explicit vbscript engine flag
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)[wc]script(\.exe)?\s+[^\n]{0,80}/{1,2}e:vbscript
  - id: wscript-engine-jscript-override
    desc: wscript run with explicit jscript engine flag
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)[wc]script(\.exe)?\s+[^\n]{0,80}/{1,2}e:jscript
