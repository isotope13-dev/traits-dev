# A browser extension that declares it collects no user data while its
# archive contains broad browser access, cookie enumeration, and transmission
# of the collected material is deceiving the installer. The manifest claim
# alone is neutral; the hostile rule requires the collection and transport
# pipeline too.
defaults:
  platforms: [windows, unix]
  for: [xpi, crx, zip, archives]

composite_rules:
  - id: extension-false-no-data-collection-claim
    desc: False no-data claim with cookie transmission
    crit: hostile
    conf: 0.99
    attack: T1539,T1041,T1036
    scope: archive
    all:
      - id: metadata/permission/telemetry::gecko-claims-no-user-data-collection
      - id: metadata/permission/manifest::host-permission-all-urls
      - id: metadata/permission/cookie::permission-cookies
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-get-all
      - id: micro-behaviors/process/hook/webextension::chrome-webrequest-pre-request
      - id: micro-behaviors/communications/http/request/client::browser-http-request-channel
