defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.005

traits:
  - id: microsoft-windows-programdata-executable
    desc: Windows-component executable under ProgramData
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\\ProgramData\\Microsoft\\Windows\\[^\\\r\n"'']{2,64}\\[^\\\r\n"'']{2,80}\.exe'
    unless:
      - id: metadata/signed/platform/
      - type: text
        regex: '(?i)\\ProgramData\\Microsoft\\Windows\\WinSAT\\[^\\\r\n"'']{2,80}\.exe'

composite_rules:
  - id: programdata-masquerade-watchdog
    desc: Masqueraded ProgramData watchdog launcher
    crit: hostile
    conf: 0.98
    all:
      - id: microsoft-windows-programdata-executable
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
      - id: micro-behaviors/process/create/spawn::create-process-w
