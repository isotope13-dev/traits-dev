defaults:
  platforms: [windows]
  mbc: T1036
  attack: T1036
composite_rules:
  - id: dotnet-java-spoof
    desc: ".NET executable masquerading as Java binary"
    crit: hostile
    conf: 0.95
    for: [pe]
    all:
      - id: metadata/binary/framework::mscoree-name
    any:
      - id: micro-behaviors/data/text/keywords::java-platform-string
      - id: micro-behaviors/data/text/keywords::oracle-america-string
  - id: dotnet-source-java-spoof
    desc: ".NET source masquerading as Java binary"
    crit: suspicious
    conf: 0.90
    for: [csharp]
    any:
      - id: micro-behaviors/data/text/keywords::java-platform-string
      - id: micro-behaviors/data/text/keywords::oracle-america-string
