defaults:
  platforms: [windows]
composite_rules:
  - id: dotnet-directory-name-exe-launch
    desc: .NET launcher with directory-like .exe name
    crit: suspicious
    conf: 0.93
    attack: T1036.005
    for: [pe]
    all:
      - id: metadata/binary/framework::mscoree-name
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-tokenized
      - id: micro-behaviors/process/create/spawn::startup-path-dotnet
      - id: micro-behaviors/fs/path/location::path-directory-name-exe
