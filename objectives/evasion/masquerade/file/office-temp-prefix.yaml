# System/app-artifact masquerade via `tempfile.mkstemp(prefix=...)` (or
# `NamedTemporaryFile(prefix=...)`). When a non-system process names its
# scratch file to look like an OS, Office, browser, installer, or DB temp
# artifact, it is borrowing that identity to:
#   - slip past AV/EDR exclusion lists that whitelist the artifact pattern
#   - blend into forensic timelines as "expected" leftover
# Each prefix below is a known artifact pattern with no legitimate reason
# to appear inside a scripted dropper.
defaults:
  platforms: [windows]
  for: [scripts, source, batch, powershell]
  attack: T1036.005
  mbc: F0004
traits:
  # === Microsoft Office artifacts ===
  # Regex matches both `prefix="~DF"` (Python kw-arg) and
  # `prefix: "~DF"` / `prefix: '~DF'` (JS object property).
  - id: tempfile-prefix-df
    desc: Office ~DF temp file prefix masquerade
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']~DF["'']'
  - id: tempfile-prefix-office-lock
    desc: Office ~$ lock-file prefix masquerade
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']~\$["'']'
  - id: tempfile-prefix-word-recovery
    desc: Word ~WRD recovery file prefix masquerade
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']~WR[DL]["'']'
  - id: tempfile-prefix-powerpoint
    desc: PowerPoint ~PPT temp prefix masquerade
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']~PPT["'']'

  # === Browser / Chromium / crash artifacts ===
  - id: tempfile-prefix-crashpad
    desc: Crashpad crash-handler prefix masquerade
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']Crashpad-?["'']'
  - id: tempfile-prefix-chrome-installer
    desc: Chrome installer prefix masquerade
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']chrome_(installer_)?["'']'
  - id: tempfile-prefix-firefox
    desc: Firefox temp prefix masquerade
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']MozUpdate-?["'']'

  # === SQLite WAL / journal patterns (whitelisted by many AV) ===
  - id: tempfile-prefix-etilqs
    desc: SQLite etilqs_ WAL-journal prefix masquerade
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']etilqs_["'']'

  # === Installer / system update artifacts ===
  - id: tempfile-prefix-installer-log
    desc: Installer log prefix masquerade
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']installer\.log["'']'
  - id: tempfile-prefix-msi-temp
    desc: MSI installer temp prefix masquerade
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']MSI[A-Z0-9]{0,4}["'']'
  - id: tempfile-prefix-cabinet
    desc: Windows cabinet ~SC prefix masquerade
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: '\bprefix\s*[=:]\s*["'']~SC["'']'

  # === Constructed name forms (string built up before write) ===
  - id: office-temp-name-construct
    desc: Office-style temp filename constructed in code
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '["'']~(DF|\$|WR[DL]|PPT)[A-Fa-f0-9]{0,8}["''](?:\s*[+%]|\.format|\s*\))'
  - id: etilqs-name-construct
    desc: etilqs_ filename constructed in code
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '["'']etilqs_["''](?:\s*[+%]|\.format|\s*\))'

composite_rules:
  # Aggregator: any artifact-prefix masquerade fires this. Composites in
  # objectives/command-and-control/dropper/staging/ should reference this.
  - id: artifact-prefix-masquerade
    desc: Tempfile prefix mimics OS/app artifact
    crit: suspicious
    conf: 0.94
    any:
      - id: tempfile-prefix-df
      - id: tempfile-prefix-office-lock
      - id: tempfile-prefix-word-recovery
      - id: tempfile-prefix-powerpoint
      - id: tempfile-prefix-crashpad
      - id: tempfile-prefix-chrome-installer
      - id: tempfile-prefix-firefox
      - id: tempfile-prefix-etilqs
      - id: tempfile-prefix-installer-log
      - id: tempfile-prefix-msi-temp
      - id: tempfile-prefix-cabinet
      - id: office-temp-name-construct
      - id: etilqs-name-construct
