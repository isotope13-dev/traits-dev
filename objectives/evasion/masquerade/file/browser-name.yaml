defaults:
  attack: T1036
  platforms: [windows]
  for: [batch, powershell]
traits:
  - id: chromium-browser-exe-name
    desc: Chromium browser executable
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)\b(chrome|msedge|brave|opera)\.exe\b
  - id: firefox-exe-name
    desc: Firefox executable filename
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)\bfirefox\.exe\b
composite_rules:
  - id: browser-exe-name
    desc: Browser executable filename
    crit: notable
    conf: 0.7
    any:
      - id: chromium-browser-exe-name
      - id: firefox-exe-name
  - id: browser-launch-name
    desc: Launches browser named executable
    crit: suspicious
    conf: 0.9
    all:
      - id: browser-exe-name
      - id: objectives/command-and-control/dropper/execution/batch::start-exe
  - id: browser-download-masquerade
    desc: Browser named payload masquerade
    crit: suspicious
    conf: 0.94
    all:
      - id: browser-exe-name
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
    any:
      - id: objectives/command-and-control/dropper/execution/batch::curl-remote-exe
      - id: browser-launch-name
