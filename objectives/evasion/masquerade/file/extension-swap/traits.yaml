# Extension-swap rename pattern: write to a `.tmp` (or other allowed
# extension), then rename to `.exe`/`.dll`/`.scr`. This bypasses AV/EDR
# write-time scanners that filter by extension.
#
# Distinct from existing `evasion/masquerade/identity::os-rename-call`
# (which is the rename atom). This one is the SPECIFIC shape:
# extension-substring-replace → rename to executable extension.
defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript]
  attack: T1036.005
  mbc: F0004
traits:
  # `target = path[:-4] + ".exe"` (Python) or `path.slice(0, -4) + ".exe"` (JS)
  # — slice off old extension, append exec extension.
- id: extension-slice-call-to-exe
  desc: slice() appends executable extension
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.slice\s*\(\s*0\s*,\s*-\d+\s*\)\s*\+\s*["'']\.(exe|dll|scr)["'']'
- id: extension-slice-call-to-exe-alt
  desc: slice() appends alternate executable extension
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.slice\s*\(\s*0\s*,\s*-\d+\s*\)\s*\+\s*["'']\.(com|cpl|pif)["'']'
- id: extension-index-slice-to-exe
  desc: Index slice appends executable extension
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\[[^\]\r\n]{0,80}:-\d+\]\s*\+\s*["'']\.(exe|dll|scr)["'']'
- id: extension-index-slice-to-exe-alt
  desc: Index slice appends alternate executable
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\[[^\]\r\n]{0,80}:-\d+\]\s*\+\s*["'']\.(com|cpl|pif)["'']'
- id: extension-replace-call-to-exe--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.replace\s*\(\s*["'']\.[a-z0-9]{2,5}["'']\s*,\s*["'']\.(exe|dll)["'']\s*\)'
  count_max: 1028275
- id: extension-replace-call-to-exe--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.replace\s*\(\s*["'']\.[a-z0-9]{2,5}["'']\s*,\s*["'']\.(scr|com)["'']\s*\)'
  count_max: 1028276
- id: extension-replace-call-to-exe--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.replace\s*\(\s*["'']\.[a-z0-9]{2,5}["'']\s*,\s*["'']\.(cpl|pif)["'']\s*\)'
  count_max: 1028277
- id: jsonl-data-file
  desc: JSONL data file
  crit: notable
  if:
    type: path
    basename: true
    regex: '\.jsonl$'
- id: marker-delimited-pif-extension
  desc: Punctuation-split PIF extension
  crit: suspicious
  conf: 0.97
  platforms: [windows]
  for: [javascript, vbs]
  if:
    type: text
    regex: '(?i)\.p[^a-z0-9\r\n]{2,12}i[^a-z0-9\r\n]{2,12}f'

composite_rules:
- id: extension-slice-replace-to-exe
  desc: Slice-replace extension before rename
  crit: suspicious
  conf: 0.94
  any:
  - id: extension-slice-call-to-exe
  - id: extension-slice-call-to-exe-alt
  - id: extension-index-slice-to-exe
  - id: extension-index-slice-to-exe-alt
- id: extension-swap-rename-execute
  desc: Extension-swap rename then execute
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/fs/file/rename
  any:
  - id: extension-slice-replace-to-exe
  - id: extension-replace-call-to-exe
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness/
  unless:
  - id: jsonl-data-file
- id: extension-replace-call-to-exe
  desc: replace() call swapping extension to .exe
  crit: suspicious
  conf: 0.94
  any:
  - id: extension-replace-call-to-exe--rx-2
  - id: extension-replace-call-to-exe--rx-3
  - id: extension-replace-call-to-exe--rx-4
- id: obfuscated-pif-drop-and-launch
  desc: Obfuscated WSH script drops and launches a punctuation-concealed PIF executable
  crit: hostile
  conf: 0.98
  attack: T1036,T1059.007
  all:
  - id: marker-delimited-pif-extension
  - id: micro-behaviors/fs/write/file/stream::savetofile-method-token
  - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-bracket
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling-with-string-table-rotation
