# YAML Frontmatter in Code Files
# Detects files with YAML frontmatter (---) that masquerade as code
# Common in AI skill/tool injection attacks where markdown is disguised
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, shell]
traits:
  - id: yaml-frontmatter-in-code
    desc: YAML frontmatter in non-markdown file
    crit: notable
    conf: 0.7
    attack: T1036
    unless:
      - type: basename
        regex: '(^|[\\/])(_index|README)\.md\.gotmpl$'
      - type: basename
        regex: '\.(md|mdx|astro|mdc)$'
      - id: metadata/package/testing/presence/fixture::snapshot-file
    if:
      type: text
      offset_range: [0, 256]
      regex: '\A---\n[a-z_]+:'
