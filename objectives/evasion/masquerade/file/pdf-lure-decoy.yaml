# PDF lure decoy: malware harvests a user's existing PDF and opens it via the
# default handler so the victim sees a familiar document while the script runs
# in the background (typically followed by self-delete).
defaults:
  attack: T1036
traits:
  - id: pdf-search-userprofile
    desc: Recursive PDF search in user Downloads/Documents
    crit: suspicious
    conf: 0.92
    mbc: B0007
    platforms: [windows]
    for: [batch, powershell, vbs]
    if:
      type: text
      regex: (?i)for\s+/r\s+["']?%USERPROFILE%\\(Downloads|Documents)["']?\s+%%[a-z]\s+in\s*\(\s*\*\.pdf\s*\)
  - id: shell-open-variable-arg
    desc: start "" "<var>" shell-open default handler call
    crit: suspicious
    conf: 0.8
    platforms: [windows]
    for: [batch, powershell, vbs]
    if:
      type: text
      regex: (?i)\bstart\s+""\s+["']?[!%][A-Za-z_][A-Za-z0-9_]{0,40}[!%]["']?
  - id: pdf-search-home-posix
    desc: PDF search in home Downloads/Documents (find/locate)
    crit: suspicious
    conf: 0.9
    mbc: B0007
    platforms: [macos, linux]
    for: [shell, applescript]
    if:
      type: text
      regex: (?i)\b(find|mdfind|locate)\s+(["']?(\$HOME|~|/Users/[^/\s"']{1,64})[/\\](Downloads|Documents)["']?|["']?(\$HOME|~)["']?)\s.{0,80}\*?\.pdf
  - id: open-pdf-default-handler-posix
    desc: macOS `open` on PDF
    crit: suspicious
    conf: 0.8
    platforms: [macos]
    for: [shell, applescript]
    if:
      type: text
      regex: (?im)\bopen\s+(-a\s+\S+\s+)?["']?(\$\{?[A-Za-z_][A-Za-z0-9_]{0,40}\}?|[^\r\n"']{1,200}\.pdf)
composite_rules:
  - id: pdf-lure-decoy-execution
    desc: Harvests a user PDF and launches it as decoy
    crit: hostile
    conf: 0.95
    attack: T1036.005
    mbc: B0007
    platforms: [windows]
    for: [batch, powershell, vbs]
    all:
      - id: pdf-search-userprofile
      - id: shell-open-variable-arg
  - id: pdf-lure-decoy-execution-posix
    desc: PDF lure decoy (find then `open`)
    crit: hostile
    conf: 0.94
    attack: T1036.005
    mbc: B0007
    platforms: [macos]
    for: [shell, applescript]
    all:
      - id: pdf-search-home-posix
      - id: open-pdf-default-handler-posix
    near_lines: 50
  - id: pdf-decoy-with-hidden-relaunch
    desc: PDF decoy paired with hidden self-relaunch
    crit: hostile
    conf: 0.97
    attack: T1036.005
    mbc: B0007
    platforms: [windows]
    for: [batch, powershell, vbs]
    all:
      - id: pdf-lure-decoy-execution
      - id: objectives/evasion/process/hidden/execution::batch-powershell-hidden-self-relaunch
