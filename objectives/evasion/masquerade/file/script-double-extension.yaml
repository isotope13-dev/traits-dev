defaults:
  platforms: [windows]
  for: [batch, powershell, javascript, vbs, lnk, html]
traits:
  - id: pdf-double-extension-bat
    desc: PDF double extension BAT name
    crit: suspicious
    conf: 0.92
    if:
      type: basename
      regex: '(?i)\.pdf\.bat$'
  - id: pdf-double-extension-cmd
    desc: PDF double extension CMD name
    crit: suspicious
    conf: 0.92
    if:
      type: basename
      regex: '(?i)\.pdf\.cmd$'
  - id: pdf-double-extension-ps1
    desc: PDF double extension PS1 name
    crit: suspicious
    conf: 0.92
    if:
      type: basename
      regex: '(?i)\.pdf\.ps1$'
  - id: pdf-double-extension-vbs
    desc: PDF double extension VBS name
    crit: suspicious
    conf: 0.92
    if:
      type: basename
      regex: '(?i)\.pdf\.vbs$'
  - id: pdf-double-extension-lnk
    desc: PDF double extension LNK name
    crit: suspicious
    conf: 0.92
    if:
      type: basename
      regex: '(?i)\.pdf\.lnk$'
composite_rules:
  - id: pdf-double-extension-script
    desc: PDF double extension script name
    crit: suspicious
    conf: 0.92
    any:
      - id: pdf-double-extension-bat
      - id: pdf-double-extension-cmd
      - id: pdf-double-extension-ps1
      - id: pdf-double-extension-vbs
      - id: pdf-double-extension-lnk
