# Extension-swap rename pattern: write to a `.tmp` (or other allowed
# extension), then rename to `.exe`/`.dll`/`.scr`. This bypasses AV/EDR
# write-time scanners that filter by extension.
#
# Distinct from existing `evasion/masquerade/identity::os-rename-call`
# (which is the rename atom). This one is the SPECIFIC shape:
# extension-substring-replace → rename to executable extension.
defaults:
  platforms: [windows, unix]
  for: [python, javascript, typescript]
  attack: T1036.005
  mbc: F0004
traits:
  # `target = path[:-4] + ".exe"` (Python) or `path.slice(0, -4) + ".exe"` (JS)
  # — slice off old extension, append exec extension.
- id: extension-slice-replace-to-exe--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: slice
- id: extension-replace-call-to-exe--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.replace\s*\(\s*["'']\.[a-z0-9]{2,5}["'']\s*,\s*["'']\.(exe|dll)["'']\s*\)'
- id: extension-replace-call-to-exe--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.replace\s*\(\s*["'']\.[a-z0-9]{2,5}["'']\s*,\s*["'']\.(scr|com)["'']\s*\)'
- id: extension-replace-call-to-exe--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.replace\s*\(\s*["'']\.[a-z0-9]{2,5}["'']\s*,\s*["'']\.(cpl|pif)["'']\s*\)'
- id: jsonl-data-file
  desc: JSONL data file
  crit: component
  if:
    type: basename
    regex: '\.jsonl$'

composite_rules:
- id: extension-swap-rename-execute
  desc: Extension-swap rename then execute
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/fs/file/rename
  any:
  - id: extension-slice-replace-to-exe
  - id: extension-replace-call-to-exe
  downgrade:
    any:
    - id: metadata/package/testing/presence::python-test-file
    - id: metadata/package/testing/presence::test-directory
  unless:
  - id: jsonl-data-file
- id: extension-slice-replace-to-exe
  desc: Slice-replace extension to .exe before rename
  crit: suspicious
  conf: 0.94
  any:
  - id: extension-slice-replace-to-exe--rx-1
  needs: 1
- id: extension-replace-call-to-exe
  desc: replace() call swapping extension to .exe
  crit: suspicious
  conf: 0.94
  any:
  - id: extension-replace-call-to-exe--rx-2
  - id: extension-replace-call-to-exe--rx-3
  - id: extension-replace-call-to-exe--rx-4
  needs: 1
