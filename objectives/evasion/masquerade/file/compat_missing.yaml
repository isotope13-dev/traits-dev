defaults:
  platforms: [windows]
  for: [scripts, manifests]

traits:
  - id: image-double-extension-lnk
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: objectives/execution/lnk/dropper/remcos::objectives/evasion/masquerade/file::image-double-extension-lnk
  - id: pdf-double-extension-ps1
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: objectives/command-and-control/dropper/staging/encrypted::objectives/evasion/masquerade/file::pdf-double-extension-ps1
  - id: pe-masquerading-as-image
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      exact: __cleave_missing_pe_masquerading_as_image__
