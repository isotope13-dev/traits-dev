defaults:
  platforms: [linux]
  for: [scripts]
  attack: T1036.005
traits:
  - id: x11-lock-format-string
    desc: X11 display lockfile path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/tmp/\.X[a-zA-Z0-9%]{1,16}-lock'
    unless:
      - type: basename
        regex: '^(Xorg|Xvfb|Xwayland)(\.\d+)?$'
      - type: basename
        regex: '^(xinit|startx)(\.\d+)?$'
      - type: path
        regex: '(^|[\\/])docker-entrypoint\.sh$'
  - id: flock-lock-ex-nb-source
    desc: Non-blocking exclusive flock acquisition
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'flock\s*\([^,]{0,40},\s*LOCK_EX\s*\|\s*LOCK_NB'
composite_rules:
  - id: x11-lock-mutex-masquerade
    desc: Single-instance mutex masquerades as
    crit: hostile
    conf: 0.95
    all:
      - id: x11-lock-format-string
    any:
      - id: flock-lock-ex-nb-source
      - id: micro-behaviors/fs/lock/flock::flock
