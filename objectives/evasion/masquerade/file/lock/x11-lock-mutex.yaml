defaults:
  platforms: [linux]
  for: [scripts]
  attack: T1036.005
traits:
  - id: x11-lock-format-string
    desc: X11 display lockfile path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/tmp/\.X[a-zA-Z0-9%]{1,16}-lock'
    unless:
      - type: basename
        regex: '^(Xorg|Xvfb|Xwayland)(\.\d+)?$'
      - type: basename
        regex: '^(xinit|startx)(\.\d+)?$'
      - type: path
        regex: '(^|[\\/])docker-entrypoint\.sh$'
composite_rules:
  - id: x11-lock-mutex-masquerade
    desc: Single-instance mutex masquerades as
    crit: hostile
    conf: 0.95
    all:
      - id: x11-lock-format-string
    any:
      - id: micro-behaviors/fs/lock/flock::flock-exclusive-nonblocking
      - id: micro-behaviors/fs/lock/flock::flock
