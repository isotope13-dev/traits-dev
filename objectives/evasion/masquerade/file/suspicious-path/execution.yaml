# Suspicious Execution Paths
# Detects binaries executed from atypical user directories (evasion).
# ATT&CK: T1564 (Hide Artifacts)
defaults:
  platforms: [windows]
  for: [pe, scripts, c, cpp, go]
traits:
- id: exe-in-media-folder--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)[\\/]Saved Games[\\/].{1,120}\.exe\b'
    case_insensitive: true
  count_max: 1028390
- id: exe-in-media-folder--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)[\\/]Contacts[\\/].{1,120}\.exe\b'
    case_insensitive: true
  count_max: 1028392
- id: exe-in-media-folder--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)[\\/]Pictures[\\/].{1,120}\.exe\b'
    case_insensitive: true
  count_max: 1028393
- id: exe-in-media-folder--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)[\\/]Videos[\\/].{1,120}\.exe\b'
    case_insensitive: true
  count_max: 1028394
- id: exe-in-media-folder--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)[\\/]Links[\\/].{1,120}\.exe\b'
    case_insensitive: true
  count_max: 1028395
- id: exe-in-media-folder--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)[\\/]Music[\\/].{1,120}\.exe\b'
    case_insensitive: true
  count_max: 1028396
- id: exe-in-public-folder
  desc: Binary in Public user folder
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(?i)(Users\\Public\\|%PUBLIC%\\).{0,50}\.exe'

- id: deep-download-exec
  desc: Binary in deep/atypical Downloads subdirectory
  crit: suspicious
  conf: 0.8
  if:
    type: text
      # Matches subfolders like C:\Users\user\Downloads\ab\file.exe
    regex: '(?i)(Downloads\\[A-Za-z0-9]{1,2}\\.{1,120}\.exe)'

composite_rules:
- id: user-path-evasion-execution
  desc: Binary execution from atypical user directory (potential evasion)
  crit: suspicious
  conf: 0.95
  any:
  - id: exe-in-media-folder
  - id: exe-in-public-folder
  - id: deep-download-exec
- id: exe-in-media-folder
  desc: Binary in media-related user folder
  crit: suspicious
  conf: 0.9
  any:
  - id: exe-in-media-folder--rx-1
  - id: exe-in-media-folder--rx-3
  - id: exe-in-media-folder--rx-4
  - id: exe-in-media-folder--rx-5
  - id: exe-in-media-folder--rx-6
  - id: exe-in-media-folder--rx-7
