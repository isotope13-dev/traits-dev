defaults:
  attack: T1036
  platforms:
    - windows
    - linux
    - macos
    - unix
    - android
    - ios
  for: [binaries, scripts]
traits:
  - id: wav-payload-url
    desc: URL path ends in WAV file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: https?://.{0,200}\.wav(\?.{0,80})?$
      case_insensitive: true
