defaults:
  platforms:
    - windows
  for: [binaries, scripts, source]
traits:
  - id: project-documents-js-lure
    desc: Project documents JS lure name
    crit: suspicious
    conf: 0.99
    for: [scripts, binaries]
    if:
      type: raw
      section: .text
      regex: (?i)Project Documents \(Drawings, Specifications,BOQ, P\.O\)\.JS
  - id: archive-image-decoy-header
    desc: Image decoy entry near archive header
    crit: suspicious
    conf: 0.9
    for: [rar]
    if:
      type: raw
      regex: (?i)[A-Za-z0-9_& -]{12,}\.(png|jpe?g|gif|bmp)
      offset_range:
        - 0
        - 512
  - id: archive-script-tail-entry-cmd-js
    desc: CMD or JS payload near archive tail
    crit: suspicious
    conf: 0.94
    for: [rar]
    if:
      type: raw
      regex: (?i)[A-Za-z0-9_& -]{12,}\.(cmd|bat|js|jse)
      offset_range:
        - -256
        - null
  - id: archive-script-tail-entry-vbs
    desc: VBS payload near archive tail
    crit: suspicious
    conf: 0.94
    for: [rar]
    if:
      type: raw
      regex: (?i)[A-Za-z0-9_& -]{12,}\.(vbs|vbe)
      offset_range:
        - -256
        - null
  - id: rar-basename
    desc: RAR archive filename
    crit: component
    conf: 1.0
    for: [rar]
    if:
      type: basename
      regex: (?i)\.rar$
composite_rules:
  - id: project-documents-js-rar-lure
    desc: Document-themed JavaScript lure delivered in RAR archive
    crit: hostile
    conf: 0.99
    for: [scripts, binaries]
    attack: T1036.003
    all:
      - id: metadata/file/magic::rar-v5
      - id: project-documents-js-lure
  - id: rar-image-script-tail-lure
    desc: RAR image lure with tail script payload
    crit: hostile
    conf: 0.98
    for: [rar]
    attack: T1036.003
    all:
      - id: rar-basename
      - id: archive-image-decoy-header
    any:
      - id: archive-script-tail-entry-cmd-js
      - id: archive-script-tail-entry-vbs
