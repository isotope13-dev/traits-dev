defaults:
  platforms:
    - windows
  for: [binaries, scripts, source]
traits:
  - id: project-documents-js-lure
    desc: Project documents JS lure name
    crit: suspicious
    conf: 0.99
    for: [scripts, binaries]
    if:
      type: raw
      section: .text
      regex: (?i)Project Documents \(Drawings, Specifications,BOQ, P\.O\)\.JS
  - id: archive-image-decoy-header
    desc: Image decoy entry near archive header
    crit: suspicious
    conf: 0.9
    for: [data]
    if:
      type: yara
      source: |
        rule archive_image_decoy_header {
          strings:
            $img = /[A-Za-z0-9_& -]{12,}\.(png|jpe?g|gif|bmp)/ ascii nocase
          condition:
            for any i in (1..#img) : (@img[i] < 512)
        }
  - id: archive-script-tail-entry
    desc: Script payload entry near archive tail
    crit: suspicious
    conf: 0.94
    for: [data]
    if:
      type: yara
      source: |
        rule archive_script_tail_entry {
          strings:
            $tail = /[A-Za-z0-9_& -]{12,}\.(cmd|bat|js|jse|vbs|vbe)/ ascii nocase
          condition:
            for any i in (1..#tail) : (@tail[i] > filesize - 256)
        }
composite_rules:
  - id: project-documents-js-rar-lure
    desc: Document-themed JavaScript lure delivered in RAR archive
    crit: hostile
    conf: 0.99
    for: [scripts, binaries]
    attack: T1036.003
    all:
      - id: metadata/file/magic::rar-v5
      - id: project-documents-js-lure
  - id: rar-image-script-tail-lure
    desc: RAR image lure with tail script payload
    crit: hostile
    conf: 0.98
    for: [data]
    attack: T1036.003
    all:
      - id: archive-image-decoy-header
      - id: archive-script-tail-entry
    any:
      - id: metadata/file/magic::rar-v4
      - id: metadata/file/magic::rar-v5
    needs: 1
