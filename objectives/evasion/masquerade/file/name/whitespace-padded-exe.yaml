# Filename masquerade via trailing whitespace before the .exe extension
# (e.g. "invoice.exe "). Generic Windows technique used to obscure the real
# extension in a UI or evade exact-name allow/deny lists; not specific to any
# one malware family.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036
traits:
  - id: trailing-whitespace-exe
    desc: Trailing whitespace before .exe extension
    crit: notable
    conf: 0.8
    if:
      type: path
      basename: true
      regex: '[\p{Zs} ]+\.exe$'
