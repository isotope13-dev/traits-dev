defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: T1036

traits:
  - id: system-process-name-binary-copy-call
    desc: JavaScript copies a binary file
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(copyFileSync|copyFile)\s*\('
composite_rules:
  - id: system-process-name-binary-copy
    desc: Copies a binary under a system process name
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/file/string/process-name::windows-system-process-name-reference
      - id: system-process-name-binary-copy-call
    near_lines: 100
  - id: randomized-detached-watchdog
    desc: Hidden child respawns after random delays
    crit: suspicious
    conf: 0.97
    # Require the spawn-hide options and a timer whose delay uses Math.random
    # to co-occur in one local span. This excludes unrelated random IDs and
    # detached helpers in ordinary Node.js drivers and package bundles.
    near_lines: 80
    all:
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::windowshide-option
      - id: micro-behaviors/time/schedule/delay::settimeout-random-delay
    unless:
      - id: well-known/tool/development/pnpm::official-pnpm-package-archive
  - id: disguised-randomized-detached-watchdog
    desc: Disguised hidden watchdog respawns a child
    crit: hostile
    conf: 0.99
    attack: T1036,T1053
    all:
      - id: metadata/file/string/process-name::windows-system-process-name-reference
      - id: system-process-name-binary-copy
      - id: randomized-detached-watchdog
