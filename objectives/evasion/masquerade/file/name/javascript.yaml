defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: T1036

traits:
  - id: system-process-name-masquerade
    desc: JavaScript uses a system process filename
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\b(SearchFilterHost|SearchProtocolHost|RuntimeBroker|svchost)\.exe\b'
  - id: system-process-name-binary-copy-call
    desc: JavaScript copies a binary file
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(copyFileSync|copyFile)\s*\('
  - id: randomized-respawn-delay
    desc: JavaScript randomizes a respawn delay
    crit: component
    conf: 0.9
    if:
      type: text
      word: Math.random

composite_rules:
  - id: system-process-name-binary-copy
    desc: Copies a binary under a system process name
    crit: suspicious
    conf: 0.98
    all:
      - id: system-process-name-masquerade
      - id: system-process-name-binary-copy-call
    near_lines: 100
  - id: randomized-detached-watchdog
    desc: Hidden child respawns after random delays
    crit: suspicious
    conf: 0.97
    # Require the spawn-hide options and Math.random delay to co-occur in one
    # local span. Large package-manager bundles (e.g. pnpm) contain unrelated
    # detached/windowsHide helpers and Math.random uses thousands of lines apart.
    near_lines: 80
    all:
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::windowshide-option
      - id: randomized-respawn-delay
    unless:
      - id: well-known/tool/development/pnpm::official-pnpm-package-archive
  - id: disguised-randomized-detached-watchdog
    desc: Disguised hidden watchdog respawns a child
    crit: hostile
    conf: 0.99
    attack: T1036,T1053
    all:
      - id: system-process-name-masquerade
      - id: system-process-name-binary-copy
      - id: randomized-detached-watchdog
