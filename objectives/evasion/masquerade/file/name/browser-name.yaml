defaults:
  attack: T1036
  platforms: [windows]
  for: [batch, powershell]
traits:
  - id: firefox-exe-name-powershell
    desc: Firefox executable filename in PowerShell
    crit: notable
    conf: 0.6
    for: [powershell]
    if:
      id: micro-behaviors/process/enumerate/apps::browser-apps-firefox-exe
  - id: firefox-exe-name-batch
    desc: Firefox executable filename in batch
    crit: notable
    conf: 0.6
    for: [batch]
    if:
      type: text
      regex: (?i)\bfirefox\.exe\b
composite_rules:
  - id: browser-launch-name
    desc: Launches browser named executable
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/enumerate/apps::chrome-process-name
      - id: objectives/evasion/masquerade/file/name::firefox-exe-name-batch
      - id: objectives/evasion/masquerade/file/name::firefox-exe-name-powershell
      - id: objectives/evasion/masquerade/file/name::trailing-whitespace-exe
      - id: objectives/command-and-control/dropper/execution/batch::start-exe
    downgrade:
      any:
        - id: well-known/tool/development/batch-scripts::everythingportable-launcher-path
  - id: browser-download-masquerade
    desc: Browser named payload masquerade
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/process/enumerate/apps::chrome-process-name
      - id: objectives/evasion/masquerade/file/name::firefox-exe-name-batch
      - id: objectives/evasion/masquerade/file/name::firefox-exe-name-powershell
      - id: objectives/evasion/masquerade/file/name::trailing-whitespace-exe
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
    any:
      - id: objectives/command-and-control/dropper/execution/batch::curl-remote-exe
      - id: browser-launch-name
    downgrade:
      any:
        - id: well-known/tool/development/batch-scripts::everythingportable-launcher-path
