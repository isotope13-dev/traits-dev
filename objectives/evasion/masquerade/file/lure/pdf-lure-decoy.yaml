# PDF lure decoy: malware harvests a user's existing PDF and opens it via the
# default handler so the victim sees a familiar document while the script runs
# in the background (typically followed by self-delete).
defaults:
  attack: T1036
traits:
- id: pdf-search-userprofile--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  for: [batch, powershell, vbs]
  platforms: [windows]
  if:
    type: text
    substr: '*.pdf'
    case_insensitive: true
  count_max: 1028417
- id: pdf-search-home-posix--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell, applescript]
  platforms: [macos, linux]
  unless:
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  if:
    type: text
    substr: Documents
    case_insensitive: true
  count_max: 1028419
- id: pdf-search-home-posix--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell, applescript]
  platforms: [macos, linux]
  unless:
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  if:
    type: text
    substr: Downloads
    case_insensitive: true
  count_max: 1028420
- id: pdf-search-home-posix--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell, applescript]
  platforms: [macos, linux]
  unless:
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  if:
    type: text
    substr: mdfind
    case_insensitive: true
  count_max: 1028422
- id: pdf-search-home-posix--rx-9
  desc: find command token
  crit: component
  conf: 0.9
  for: [shell, applescript]
  platforms: [macos, linux]
  unless:
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  if:
    type: text
    regex: '\bfind\s+["''$~/]'
- id: pdf-search-home-posix--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell, applescript]
  platforms: [macos, linux]
  unless:
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  if:
    type: text
    regex: '(?i)(\*|\\.)pdf\b'
- id: open-pdf-default-handler-posix
  desc: macOS `open` on PDF
  crit: suspicious
  conf: 0.8
  for: [shell, applescript]
  platforms: [macos]
  unless:
  - id: well-known/tool/sysadmin/k9s
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  if:
    type: text
    regex: '\bopen\s+["'']?[^;&|\n]{0,160}\.pdf\b'
composite_rules:
- id: pdf-lure-decoy-execution
  desc: Harvests a user PDF and launches it as decoy
  crit: hostile
  conf: 0.95
  attack: T1036.005
  mbc: B0007
  platforms: [windows]
  for: [batch, powershell, vbs]
  all:
  - id: pdf-search-userprofile
  - id: micro-behaviors/process/create/launch::windows-start-variable-target
- id: pdf-lure-decoy-execution-posix
  desc: PDF lure decoy (find then `open`)
  crit: hostile
  conf: 0.94
  attack: T1036.005
  mbc: B0007
  platforms: [macos]
  for: [shell, applescript]
  all:
  - id: pdf-search-home-posix
  - id: open-pdf-default-handler-posix
  unless:
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  near_lines: 50
- id: pdf-decoy-with-hidden-relaunch
  desc: PDF decoy paired with hidden self-relaunch
  crit: hostile
  conf: 0.97
  attack: T1036.005
  mbc: B0007
  platforms: [windows]
  for: [batch, powershell, vbs]
  all:
  - id: pdf-lure-decoy-execution
  - id: objectives/evasion/process/hidden/execution::batch-powershell-hidden-self-relaunch
- id: pdf-search-userprofile
  desc: Recursive PDF search in user Downloads/Documents
  crit: suspicious
  conf: 0.92
  mbc: B0007
  for: [batch, powershell, vbs]
  platforms: [windows]
  all:
  - id: micro-behaviors/os/env/vars/user-paths::userprofile-var
  - id: pdf-search-userprofile--rx-4
  any:
  - id: objectives/evasion/masquerade/file/lure::pdf-search-home-posix--rx-5
  - id: objectives/evasion/masquerade/file/lure::pdf-search-home-posix--rx-6
- id: pdf-search-home-posix
  desc: PDF search in home Downloads/Documents (find/locate)
  crit: suspicious
  conf: 0.9
  mbc: B0007
  for: [shell, applescript]
  platforms: [macos, linux]
  unless:
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  all:
  - id: pdf-search-home-posix--rx-11
  - id: pdf-search-home-posix-command
  any:
  - id: pdf-search-home-posix--rx-5
  - id: pdf-search-home-posix--rx-6
  - id: micro-behaviors/os/env/vars/access::dollar-home
  - id: objectives/exfiltration/cloud/sync-tool::bulk-sensitive-server-data-path--rx-8
- id: pdf-search-home-posix-command
  desc: POSIX file-search command
  crit: component
  conf: 0.9
  for: [shell, applescript]
  platforms: [macos, linux]
  unless:
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  any:
  - id: pdf-search-home-posix--rx-8
  - id: pdf-search-home-posix--rx-9
  - id: micro-behaviors/fs/search::locate-token
  - id: micro-behaviors/fs/directory/traverse::find-type-file
- id: lnk-pdf-viewer-install-decoy
  desc: LNK opens PDF beside quiet MSI install
  crit: hostile
  conf: 0.99
  attack: T1036.005,T1218.007
  platforms: [windows]
  for: [lnk]
  all:
  - id: micro-behaviors/communications/http/url/path::lnk-remote-pdf-url
  - id: micro-behaviors/process/create/exec::lnk-msiexec-quiet-install
