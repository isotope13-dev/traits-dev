# PDF lure decoy: malware harvests a user's existing PDF and opens it via the
# default handler so the victim sees a familiar document while the script runs
# in the background (typically followed by self-delete).
defaults:
  attack: T1036
traits:
- id: pdf-search-userprofile--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  for: [batch, powershell, vbs]
  platforms: [windows]
  if:
    type: text
    substr: Documents
    case_insensitive: true
  count_max: 1028415
- id: pdf-search-userprofile--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  for: [batch, powershell, vbs]
  platforms: [windows]
  if:
    type: text
    substr: Downloads
    case_insensitive: true
  count_max: 1028416
- id: pdf-search-userprofile--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  for: [batch, powershell, vbs]
  platforms: [windows]
  if:
    type: text
    substr: '*.pdf'
    case_insensitive: true
  count_max: 1028417
- id: shell-open-variable-arg
  desc: start "" "<var>" shell-open default handler call
  crit: notable
  conf: 0.8
  platforms: [windows]
  for: [batch, powershell, vbs]
  if:
    type: text
    regex: (?i)\bstart\s+""\s+["']?[!%][A-Za-z_][A-Za-z0-9_]{0,40}[!%]["']?
- id: pdf-search-home-posix--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell, applescript]
  platforms: [macos, linux]
  if:
    type: text
    substr: Documents
    case_insensitive: true
  count_max: 1028419
- id: pdf-search-home-posix--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell, applescript]
  platforms: [macos, linux]
  if:
    type: text
    substr: Downloads
    case_insensitive: true
  count_max: 1028420
- id: pdf-search-home-posix--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell, applescript]
  platforms: [macos, linux]
  if:
    type: text
    substr: mdfind
    case_insensitive: true
  count_max: 1028422
- id: pdf-search-home-posix--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [shell, applescript]
  platforms: [macos, linux]
  if:
    type: text
    substr: Users
    case_insensitive: true
  count_max: 1028424
- id: open-pdf-default-handler-posix
  desc: macOS `open` on PDF
  crit: suspicious
  conf: 0.8
  for: [shell, applescript]
  platforms: [macos]
  unless:
  - id: well-known/tool/sysadmin/k9s
  if:
    type: text
    regex: '\bopen\s+["'']?[^;&|\n]{0,160}\.pdf\b'
composite_rules:
- id: pdf-lure-decoy-execution
  desc: Harvests a user PDF and launches it as decoy
  crit: hostile
  conf: 0.95
  attack: T1036.005
  mbc: B0007
  platforms: [windows]
  for: [batch, powershell, vbs]
  all:
  - id: pdf-search-userprofile
  - id: shell-open-variable-arg
- id: pdf-lure-decoy-execution-posix
  desc: PDF lure decoy (find then `open`)
  crit: hostile
  conf: 0.94
  attack: T1036.005
  mbc: B0007
  platforms: [macos]
  for: [shell, applescript]
  all:
  - id: pdf-search-home-posix
  - id: open-pdf-default-handler-posix
  near_lines: 50
- id: pdf-decoy-with-hidden-relaunch
  desc: PDF decoy paired with hidden self-relaunch
  crit: hostile
  conf: 0.97
  attack: T1036.005
  mbc: B0007
  platforms: [windows]
  for: [batch, powershell, vbs]
  all:
  - id: pdf-lure-decoy-execution
  - id: objectives/evasion/process/hidden/execution::batch-powershell-hidden-self-relaunch
- id: pdf-search-userprofile
  desc: Recursive PDF search in user Downloads/Documents
  crit: suspicious
  conf: 0.92
  mbc: B0007
  for: [batch, powershell, vbs]
  platforms: [windows]
  any:
  - id: micro-behaviors/os/env/vars/user-info::userprofile-var
  - id: pdf-search-userprofile--rx-2
  - id: pdf-search-userprofile--rx-3
  - id: pdf-search-userprofile--rx-4
- id: pdf-search-home-posix
  desc: PDF search in home Downloads/Documents (find/locate)
  crit: suspicious
  conf: 0.9
  mbc: B0007
  for: [shell, applescript]
  platforms: [macos, linux]
  any:
  - id: pdf-search-home-posix--rx-5
  - id: pdf-search-home-posix--rx-6
  - id: micro-behaviors/fs/search::locate-token
  - id: pdf-search-home-posix--rx-8
  - id: micro-behaviors/os/env/vars/access::dollar-home
  - id: pdf-search-home-posix--rx-10
