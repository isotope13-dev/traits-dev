defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

traits:
- id: payment-receipt-exe-lure
  desc: Payment receipt executable lure
  crit: suspicious
  conf: 0.94
  if:
    type: path
    basename: true
    regex: (?i)\b(justificante|comprobante)\s+de\s+pago\.exe$
- id: proof-of-payment-exe-lure
  desc: Proof of payment executable lure
  crit: suspicious
  conf: 0.92
  if:
    type: path
    basename: true
    regex: '(?i)\bproof\s+of\s+payment\b.*\.exe$'
- id: purchase-order-exe-lure
  desc: Purchase order executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\bpurchase\s+order\b.*\.exe$'
- id: purchase-order-number-exe-lure
  desc: Purchase order number executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\b(e-)?po[-_ ]?[0-9][A-Z0-9-]{2,}.*\.exe$'
- id: remittance-exe-lure
  desc: Remittance executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\b(remittance|swift)\b.*\.exe$'
- id: transfer-document-exe-lure
  desc: Transfer document executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\btransfer(encia)?\b.*\.exe$'
