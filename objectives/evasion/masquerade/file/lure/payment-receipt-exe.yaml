defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

traits:
- id: payment-receipt-exe-lure
  desc: Payment receipt executable lure
  crit: suspicious
  conf: 0.94
  if:
    type: path
    basename: true
    regex: (?i)\b(justificante|comprobante)\s+de\s+pago\.exe$
- id: payment-details-exe-lure
  desc: Payment details executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\bpayment[-_ ]+details(\b|[-_]).*\.exe$'
- id: payment-invoice-exe-lure
  desc: Payment invoice executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\bpayment[-_ ]*invoice\b.*\.exe$'
- id: proof-of-payment-exe-lure
  desc: Proof of payment executable lure
  crit: suspicious
  conf: 0.92
  if:
    type: path
    basename: true
    regex: '(?i)\bproof\s+of\s+payment\b.*\.exe$'
- id: purchase-order-exe-lure
  desc: Purchase order executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\b(purchase[-_ ]+order|orden\s+de\s+compra)\b.*\.exe$'
- id: order-exe-lure
  desc: Order executable lure
  crit: suspicious
  conf: 0.88
  if:
    type: path
    basename: true
    regex: '(?i)\b(new[-_ ]+)?(order|ordine)\b.*\.(exe|com|pif)$'
- id: quote-exe-lure
  desc: Quote executable lure
  crit: suspicious
  conf: 0.88
  if:
    type: path
    basename: true
    regex: '(?i)\bquote\b.*\.exe$'
- id: rfq-exe-lure
  desc: RFQ executable lure
  crit: suspicious
  conf: 0.88
  if:
    type: path
    basename: true
    regex: '(?i)\brfq\b.*\.(exe|pif)$'
- id: payment-advice-exe-lure
  desc: Payment advice executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\b(payment[-_ ]+advice|scan[-_0-9 ]+payment)\b.*\.exe$'
- id: price-inquiry-exe-lure
  desc: Price inquiry executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\bprice[-_ ]+inquiry\b.*\.exe$'
- id: q88-exe-lure
  desc: Q88 vessel document executable lure
  crit: suspicious
  conf: 0.86
  if:
    type: path
    basename: true
    regex: '(?i)\bq88\b.*\.exe$'
- id: purchase-order-number-exe-lure
  desc: Purchase order number executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\b(e-)?po[-_ #]{0,3}[0-9][\w #().-]{2,60}\.exe$'
- id: abbreviated-po-exe-lure
  desc: Abbreviated purchase-order executable lure
  crit: suspicious
  conf: 0.88
  if:
    type: path
    basename: true
    regex: '(?i)^pob?[-_ ]+[A-Z0-9][A-Z0-9_ -]{0,40}\.exe$'
  unless:
  - id: well-known/lib/wine/
- id: remittance-exe-lure
  desc: Remittance executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\b(remittance|swift)\b.*\.exe$'
- id: bank-swift-exe-lure
  desc: Bank SWIFT executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\b(MT103|bankasi|ziraat|swift)\b.*\.exe$'
- id: account-statement-exe-lure
  desc: Account statement executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\b(statement|account)[-_ ]+(of[-_ ]+)?account\b.*\.exe$'
- id: shipping-awb-exe-lure
  desc: Shipping AWB executable lure
  crit: suspicious
  conf: 0.88
  if:
    type: path
    basename: true
    regex: '(?i)\b(DHL|AWB)\b.*\.exe$'
- id: inquiry-pdf-exe-lure
  desc: Inquiry PDF executable lure
  crit: suspicious
  conf: 0.88
  if:
    type: path
    basename: true
    regex: '(?i)\binquiry[-_ ]*pdf\b.*\.exe$'
- id: transfer-document-exe-lure
  desc: Transfer document executable lure
  crit: suspicious
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '(?i)\btransfer(encia)?\b.*\.exe$'

composite_rules:
- id: payment-document-exe-lure
  desc: Payment document executable lure
  crit: suspicious
  conf: 0.92
  any:
    - id: payment-receipt-exe-lure
    - id: proof-of-payment-exe-lure
    - id: payment-advice-exe-lure
    - id: payment-details-exe-lure
    - id: payment-invoice-exe-lure
    - id: purchase-order-exe-lure
    - id: order-exe-lure
    - id: quote-exe-lure
    - id: purchase-order-number-exe-lure
    - id: abbreviated-po-exe-lure
    - id: remittance-exe-lure
    - id: bank-swift-exe-lure
    - id: account-statement-exe-lure
    - id: shipping-awb-exe-lure
    - id: inquiry-pdf-exe-lure
    - id: transfer-document-exe-lure

# A business-document lure filename (PO / invoice / remittance / SWIFT …) on an
# executable whose payload is BOTH packed (high-entropy installer overlay) AND
# not from a real vendor (self-issued/ad-hoc cert or unsigned) is the malspam
# loader pattern — legitimate business software is never named this way AND
# shipped as a self-issued packed blob. Generalizes across lure themes and
# packers; the specific PO number / signer bytes are not hardcoded.
- id: business-lure-packed-untrusted-payload
  desc: Business-lure name hides a packed untrusted payload
  crit: hostile
  conf: 0.97
  attack: T1036.005,T1027
  all:
    - id: payment-document-exe-lure
    - id: metadata/binary/layout::high-entropy-overlay
  any:
    - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
    - id: metadata/signed/trust-level::unsigned
