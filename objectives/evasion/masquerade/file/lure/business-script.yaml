defaults:
  platforms: [windows]
  for: [batch, vbs]
  attack: T1036.005

traits:
  - id: bank-swift-script-lure
    desc: Bank SWIFT script lure
    crit: suspicious
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(?i)\b(MT103|bankasi|ziraat|swift)\b.*\.(cmd|bat|vbe|vbs)$'

  - id: transfer-script-lure
    desc: Transfer document script lure
    crit: suspicious
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(?i)\btransfer(encia)?\b.*\.(cmd|bat|vbe|vbs)$'

composite_rules:
  - id: business-document-script-lure
    desc: Business document script lure
    crit: suspicious
    conf: 0.9
    any:
      - id: bank-swift-script-lure
      - id: transfer-script-lure
