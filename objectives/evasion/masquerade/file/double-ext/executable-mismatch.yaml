defaults:
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  crit: hostile
  conf: 0.95
traits:
  - id: basename-is-doc-office-word
    desc: Filename has Word document extension
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(doc|docx)$
  - id: basename-is-doc-office-excel
    desc: Filename has Excel document extension
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(xls|xlsx)$
  - id: basename-is-doc-office-ppt
    desc: Filename has PPT document extension
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(ppt|pptx)$
  - id: basename-is-doc-other-1
    desc: Filename has PDF, RTF or TXT extension
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(pdf|rtf|txt)$
  - id: basename-is-doc-double-exe
    desc: Document double-extension executable
    crit: suspicious
    conf: 0.96
    if:
      type: path
      basename: true
      regex: (?i)^[^/\\\\]{1,260}\.(pdf|docx?|xlsx?|rtf)\.exe$
  - id: basename-is-exe
    desc: Filename has EXE extension
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: (?i)^[^/\\\\]{1,260}\.exe$
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: basename-is-doc-txt
    desc: Filename has TXT extension
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.txt$
  - id: basename-is-doc-other-2
    desc: Filename has CSV, ODS or ODT extension
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(csv|ods|odt)$
  - id: basename-is-media-video-1
    desc: Filename has video extension (1)
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(mp4|avi|mov)$
  - id: basename-is-media-video-2
    desc: Filename has video extension (2)
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(mkv|flv|wmv)$
  - id: basename-is-media-audio
    desc: Filename has audio extension
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(mp3|wav)$
  - id: basename-is-media-image-common
    desc: Filename has common image extension
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(png|jpg|jpeg|gif)$
  - id: basename-is-media-image-web
    desc: Filename has web image extension
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(bmp|ico|svg|webp)$
  - id: basename-is-media-image-pro
    desc: Filename has professional image extension
    crit: component
    if:
      type: path
      basename: true
      regex: ^[^/\\\\]{1,260}\.(tiff|tif)$
  - id: basename-is-media-image-numeric-common
    desc: Numeric common image filename
    crit: component
    if:
      type: path
      basename: true
      regex: ^\d+\.(png|jpg|jpeg|gif)$
  - id: basename-is-media-image-numeric-web
    desc: Numeric web image filename
    crit: component
    if:
      type: path
      basename: true
      regex: ^\d+\.(bmp|ico|svg|webp)$
  - id: basename-is-media-image-numeric-pro
    desc: Numeric professional image filename
    crit: component
    if:
      type: path
      basename: true
      regex: ^\d+\.(tiff|tif)$
composite_rules:
  - id: basename-is-doc-office
    desc: Filename has Office document extension
    crit: component
    any:
      - id: basename-is-doc-office-word
      - id: basename-is-doc-office-excel
      - id: basename-is-doc-office-ppt
  - id: basename-is-doc
    desc: Filename has document extension
    crit: component
    any:
      - id: basename-is-doc-office
      - id: basename-is-doc-other-2
      - id: basename-is-doc-other-1
    unless:
      - id: basename-is-doc-txt
  - id: basename-is-doc-or-txt
    desc: Filename has document-like extension
    crit: component
    any:
      - id: basename-is-doc
      - id: basename-is-doc-txt
  - id: basename-is-media-image
    desc: Filename has image extension
    crit: component
    any:
      - id: basename-is-media-image-common
      - id: basename-is-media-image-web
      - id: basename-is-media-image-pro
    unless:
      - id: basename-is-media-image-numeric-common
      - id: basename-is-media-image-numeric-web
      - id: basename-is-media-image-numeric-pro
  - id: basename-is-media
    desc: Filename has media extension
    crit: component
    any:
      - id: basename-is-media-video-1
      - id: basename-is-media-video-2
      - id: basename-is-media-audio
      - id: basename-is-media-image
  - id: pe-masquerading-as-image-comp
    desc: PE content associated with image-style filename
    crit: baseline
    conf: 0.55
    all:
      - id: metadata/file/magic::pe-dos-stub
      - id: basename-is-media
    unless:
      - id: metadata/file/extension::exe
  - id: pe-masquerading-as-doc
    desc: PE executable hiding as document file
    all:
      - id: metadata/file/magic::pe-dos-stub
      - id: basename-is-doc
    unless:
      - id: metadata/file/extension::exe
      - id: metadata/file/extension::dll
  - id: pe-masquerading-as-txt
    desc: PE executable hiding as text file
    crit: suspicious
    conf: 0.9
    size_min: 4096
    all:
      - id: metadata/file/magic::pe-dos-stub
      - id: basename-is-doc-txt
    unless:
      - id: metadata/file/extension::exe
      - id: metadata/file/extension::dll
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
  - id: pe-dll-named-exe
    desc: PE DLL uses EXE filename
    crit: suspicious
    conf: 0.9
    for: [pe]
    platforms: [windows]
    all:
      - id: basename-is-exe
      - id: metadata/binary/metrics/pe-details::pe-dll-characteristics
      - id: metadata/binary/symbols/exports::no-exports
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/trust-level::signer-evidence-present
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/signed/platform::microsoft
  - id: elf-masquerading-as-media
    desc: ELF executable hiding as media file
    all:
      - id: metadata/file/magic::elf-header
      - id: basename-is-media
  - id: elf-masquerading-as-doc
    desc: ELF executable hiding as document file
    all:
      - id: metadata/file/magic::elf-header
      - id: basename-is-doc
  - id: elf-masquerading-as-txt
    desc: ELF executable hiding as text file
    crit: suspicious
    conf: 0.9
    size_min: 4096
    all:
      - id: metadata/file/magic::elf-header
      - id: basename-is-doc-txt
  - id: macho-masquerading-as-media
    desc: Mach-O executable hiding as media file
    for:
      - macho
    any:
      - id: metadata/file/magic::macho-32
      - id: metadata/file/magic::macho-64
    all:
      - id: basename-is-media
  - id: macho-masquerading-as-doc
    desc: Mach-O executable hiding as document file
    for:
      - macho
    any:
      - id: metadata/file/magic::macho-32
      - id: metadata/file/magic::macho-64
    all:
      - id: basename-is-doc
  - id: macho-masquerading-as-txt
    desc: Mach-O executable hiding as text file
    crit: suspicious
    conf: 0.9
    for:
      - macho
    size_min: 4096
    any:
      - id: metadata/file/magic::macho-32
      - id: metadata/file/magic::macho-64
    all:
      - id: basename-is-doc-txt
    unless:
      - id: metadata/package/quality::has-tests
