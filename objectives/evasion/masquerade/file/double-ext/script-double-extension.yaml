defaults:
  platforms: [windows]
  for: [batch, powershell, javascript, vbs, html]
traits:
  - id: pdf-double-extension-script
    desc: PDF double extension script name
    crit: suspicious
    conf: 0.92
    for: [batch, powershell]
    if:
      type: path
      basename: true
      regex: '(?i)\.pdf\.(bat|cmd|ps1)$'
composite_rules: []
