defaults:
  platforms: [windows, unix]
  for: [scripts, javascript, typescript, binaries]
  attack: "T1036"
composite_rules:
  - id: tiktok-android-api-impersonation
    desc: Impersonates TikTok Android client while targeting TikTok mobile API
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/user-agent::tiktok-android-trill-ua
      - id: micro-behaviors/communications/http/services/tiktok::tiktok-api-h2-endpoint
    any:
      - id: micro-behaviors/communications/http/user-agent::android-cronet-ua
      - id: micro-behaviors/communications/http/headers::dnr-sec-fetch-spoof
      - id: micro-behaviors/communications/http/headers::dnr-client-hints-remove
      - id: micro-behaviors/communications/http/headers::dnr-origin-empty-set
