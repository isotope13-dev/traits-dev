# Browser Traffic Masquerade via System Proxy + Default Credentials
# Detects C2 agents that adopt the host's IE/WinHTTP proxy settings and
# auto-authenticate with the logged-in user's credentials, then send a
# Chrome-flavoured UA/Accept-Language/Accept-Encoding triplet so the
# egress looks like interactive browser traffic.
# ATT&CK: T1071.001 (Application Layer Protocol: Web Protocols),
#         T1090 (Proxy), T1036 (Masquerading)
defaults:
  platforms: [windows]
  for: [powershell, csharp]
  attack: T1071.001
  mbc: B0030
traits:
  - id: chrome-user-agent-literal
    desc: Chrome-flavoured User-Agent literal
    crit: component
    conf: 0.7
    if:
      type: text
      regex: Mozilla/5\.0[^\n]{0,80}Windows NT 10\.0[^\n]{0,80}Chrome/\d+[^\n]{0,40}Safari/
  - id: accept-language-en-us
    desc: Hardcoded Accept-Language en-US header
    crit: component
    conf: 0.7
    if:
      type: text
      regex: Accept-Language[^\n]{0,20}en-US
      case_insensitive: true
  - id: accept-encoding-gzip-deflate-br
    desc: Hardcoded Accept-Encoding gzip/deflate/br
    crit: component
    conf: 0.7
    if:
      type: text
      regex: gzip,\s*deflate,\s*br
      case_insensitive: true
composite_rules:
  - id: chrome-header-triplet
    desc: Chrome UA + Accept-Language + Accept-Encoding triplet
    crit: suspicious
    conf: 0.88
    attack: T1036
    all:
      - id: chrome-user-agent-literal
      - id: accept-language-en-us
      - id: accept-encoding-gzip-deflate-br
    unless:
      - id: metadata/package/testing/presence/harness::netcore-testapp-single-message-listener
  - id: browser-traffic-masquerade
    desc: C2 disguised as Chrome browser traffic
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/request/proxy::system-proxy-default-credentials-flow
      - id: chrome-header-triplet
