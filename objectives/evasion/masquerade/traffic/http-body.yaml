  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64\.StdEncoding\.EncodeToString|btoa)\b.{0,300}(send|UploadData)'
  count_max: 1027742
- id: base64-encoded-post-body--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64\.StdEncoding\.EncodeToString|btoa)\b.{0,300}(request)'
  count_max: 1027743
- id: base64-encoded-post-body--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64_encode)\b.{0,300}(post|upload)'
  count_max: 1027744
- id: base64-encoded-post-body--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64_encode)\b.{0,300}(send|UploadData)'
  count_max: 1027745
- id: base64-encoded-post-body--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64_encode)\b.{0,300}(request)'
  count_max: 1027746
- id: json-before-base64-encode--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(json\.dumps|ConvertTo-Json).{0,400}(b64encode|ToBase64String)'
  count_max: 1027747
- id: json-before-base64-encode--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(json\.dumps|ConvertTo-Json).{0,400}(base64\.StdEncoding|btoa)'
  count_max: 1027748
- id: json-before-base64-encode--rx-12
