defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1036

composite_rules:
  - id: browser-extension-provider-mismatch
    desc: Extension captures selected text while advertising an unrelated OpenAI host
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: micro-behaviors/browser-extension/action::context-menu-click-listener
      - id: micro-behaviors/browser-extension/action::selected-text-property-access
      - id: micro-behaviors/communications/ip/literal::javascript-external-ipv4-url
      - id: metadata/permission/host::host-permission-openai-api
      - id: metadata/permission/manifest::is-chrome-manifest
