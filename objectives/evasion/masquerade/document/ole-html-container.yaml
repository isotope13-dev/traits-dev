defaults:
  platforms: [windows, unix]
  for: [documents, oledoc, msg]
  attack: T1036.005

composite_rules:
  - id: office-extension-ole-html-container
    desc: Office extension wraps an embedded HTML OLE container
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/document/ole::ole-html-body
    any:
      - id: objectives/evasion/masquerade/document::basename-xls-extension
      - id: objectives/evasion/masquerade/document::basename-doc-extension
      - id: objectives/evasion/masquerade/document::basename-ppt-extension
    unless:
      - id: metadata/package/testing/
