# Desktop Entry masquerade signals — file-manager presentation cues that a
# .desktop launcher uses to impersonate a benign document or media file.
defaults:
  platforms: [linux]
  for: [desktop-entry]
  attack: T1036

traits:
  - id: icon-pdf
    desc: Icon names a PDF document
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: desktop_entry.icon
      regex: '^(application-pdf|gnome-mime-application-pdf)'

  - id: icon-office-doc
    desc: Icon names an office document
    crit: suspicious
    conf: 0.8
    if:
      type: value
      path: desktop_entry.icon
      regex: '^(x-office-|libreoffice-|openoffice-)'

  - id: icon-text-doc
    desc: Icon names a text document
    crit: suspicious
    conf: 0.7
    if:
      type: value
      path: desktop_entry.icon
      regex: '^(text-html|text-x-)'

  - id: icon-image-mime
    desc: Icon names an image mimetype
    crit: suspicious
    conf: 0.75
    if:
      type: value
      path: desktop_entry.icon
      regex: '^image-x-'

  - id: icon-audio-video-mime
    desc: Icon names audio or video
    crit: suspicious
    conf: 0.75
    if:
      type: value
      path: desktop_entry.icon
      regex: '^(audio-x-|video-x-)'

  - id: name-pdf-ext
    desc: Name embeds pdf extension
    crit: suspicious
    conf: 0.8
    if:
      type: value
      path: desktop_entry.name
      regex: '(?i)\.pdf(\b|_)'

  - id: name-doc-ext
    desc: Name embeds doc extension
    crit: suspicious
    conf: 0.8
    if:
      type: value
      path: desktop_entry.name
      regex: '(?i)\.(docx?|odt)(\b|_)'

  - id: name-xls-ext
    desc: Name embeds xls extension
    crit: suspicious
    conf: 0.8
    if:
      type: value
      path: desktop_entry.name
      regex: '(?i)\.xlsx?(\b|_)'

  - id: name-ppt-ext
    desc: Name embeds ppt extension
    crit: suspicious
    conf: 0.8
    if:
      type: value
      path: desktop_entry.name
      regex: '(?i)\.pptx?(\b|_)'

  - id: name-rtf-ext
    desc: Name embeds rtf extension
    crit: suspicious
    conf: 0.8
    if:
      type: value
      path: desktop_entry.name
      regex: '(?i)\.rtf(\b|_)'

  - id: name-archive-ext
    desc: Name embeds archive extension
    crit: suspicious
    conf: 0.8
    if:
      type: value
      path: desktop_entry.name
      regex: '(?i)\.(zip|rar|7z)(\b|_)'

  - id: name-image-ext
    desc: Name embeds image extension
    crit: suspicious
    conf: 0.75
    if:
      type: value
      path: desktop_entry.name
      regex: '(?i)\.(jpe?g|png|gif)(\b|_)'

  - id: name-media-ext
    desc: Name embeds audio or video
    crit: suspicious
    conf: 0.75
    if:
      type: value
      path: desktop_entry.name
      regex: '(?i)\.(mp[34]|avi|mov)(\b|_)'

composite_rules:
  - id: icon-document
    desc: Icon advertises a document
    crit: suspicious
    conf: 0.85
    any:
      - id: icon-pdf
      - id: icon-office-doc
      - id: icon-text-doc

  - id: icon-media
    desc: Icon advertises media
    crit: suspicious
    conf: 0.75
    any:
      - id: icon-image-mime
      - id: icon-audio-video-mime

  - id: name-document-lure
    desc: Name embeds document extension
    crit: suspicious
    conf: 0.8
    any:
      - id: name-pdf-ext
      - id: name-doc-ext
      - id: name-xls-ext
      - id: name-ppt-ext
      - id: name-rtf-ext
      - id: name-archive-ext
      - id: name-image-ext
      - id: name-media-ext

  - id: document-icon-shell-exec
    desc: Document icon covers shell Exec
    crit: suspicious
    conf: 0.9
    all:
      - id: icon-document
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-shell-c

  - id: media-icon-shell-exec
    desc: Media icon covers shell Exec
    crit: suspicious
    conf: 0.9
    all:
      - id: icon-media
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-shell-c

  - id: document-lure-dropper
    desc: Document-named entry runs a dropper
    crit: suspicious
    conf: 0.9
    all:
      - id: name-document-lure
    any:
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-shell-c
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-dropper-chain
