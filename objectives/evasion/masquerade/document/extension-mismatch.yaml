# Office document extension/CompObj mismatch — masquerade detection.
#
# Microsoft Office stores a CompObj stream (`\x01CompObj` per
# MS-OLEDS §2.3.6.1) declaring the document's true clipboard / app
# ProgID. cleave's office analyzer surfaces the parsed values on
# `ole.compobj.{user_type,clipboard_format,app_version}` in the
# kv tree.
#
# A `.doc` file whose CompObj `app_version` says `Excel.Sheet.8` is
# a known masquerade — used by CVE-2017-0199 droppers and
# misnamed-extension phishing payloads. The basename check pins
# the *claimed* format (extension); the kv query pins the *actual*
# format (CompObj). Mismatch ⇒ deliberate deception.
#
# We split into per-claim atomics so the composite signal is
# directional (".doc claiming Excel" is different evidence from
# ".xls claiming Word"). Each per-claim composite is `hostile` —
# benign extension drift via "Save As" with a wrong extension is
# vanishingly rare.
defaults:
  for: [oledoc]
  platforms: [windows]
  crit: notable
  conf: 0.95

traits:
  # --- Basename atoms — what the file *claims* via extension. ---
- id: basename-doc-extension
  desc: Filename has .doc extension
  if:
    type: basename
    regex: '(?i)\.doc$'
- id: basename-xls-extension
  desc: Filename has .xls extension
  if:
    type: basename
    regex: '(?i)\.xls$'
- id: basename-ppt-extension
  desc: Filename has .ppt extension
  if:
    type: basename
    regex: '(?i)\.ppt$'

  # --- CompObj-claim atoms — what the file *actually is* via stream. ---
- id: compobj-claims-word
  desc: CompObj declares Word document
  if:
    type: kv
    path: office.compobj.app_version
    regex: '^(MSWord|Word\.Document)'
- id: compobj-claims-excel
  desc: CompObj declares Excel sheet
  if:
    type: kv
    path: office.compobj.app_version
    regex: '^Excel\.'
- id: compobj-claims-powerpoint
  desc: CompObj declares PowerPoint
  if:
    type: kv
    path: office.compobj.app_version
    regex: '^PowerPoint\.'

composite_rules:
  # `.doc` file whose body says Excel — classic CVE-2017-0199 vector.
- id: doc-extension-excel-content
  desc: .doc file with Excel CompObj
  crit: hostile
  conf: 0.97
  attack: T1036.005
  all:
  - id: basename-doc-extension
  - id: compobj-claims-excel

  # `.xls` file whose body says Word.
- id: xls-extension-word-content
  desc: .xls file with Word CompObj
  crit: hostile
  conf: 0.97
  attack: T1036.005
  all:
  - id: basename-xls-extension
  - id: compobj-claims-word

  # `.ppt` file whose body says Word or Excel.
- id: ppt-extension-non-ppt-content
  desc: .ppt file with non-PowerPoint CompObj
  crit: hostile
  conf: 0.96
  attack: T1036.005
  all:
  - id: basename-ppt-extension
  any:
  - id: compobj-claims-word
  - id: compobj-claims-excel
