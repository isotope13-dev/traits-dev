# DLL proxy masquerading as DirectX runtime (d3d9.dll, d3d11.dll, etc.)
# Common DLL side-loading technique: place a minimal proxy DLL in an application
# directory to hijack legitimate DirectX loading.
# ATT&CK: T1574.002 (DLL Side-Loading), T1036.005 (Match Legitimate Name)
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1574.002
traits:
  - id: direct3d-create9-export
    desc: Exports Direct3DCreate9 API function
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: Direct3DCreate9
  - id: direct3d-create9ex-export
    desc: Exports Direct3DCreate9Ex API function
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: Direct3DCreate9Ex
  - id: d3create-export
    desc: Exports d3create function (D3D mimic)
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: d3create
composite_rules:
  - id: d3d9-proxy-dll
    desc: Minimal DLL masquerading as DirectX d3d9
    crit: suspicious
    conf: 0.88
    all:
      - id: direct3d-create9-export
      - id: metadata/binary/metrics::minimal-exports
    unless:
      - id: direct3d-create9ex-export
  - id: d3-mimic-dll
    desc: DLL with D3D-mimicking export name
    crit: suspicious
    conf: 0.85
    attack: T1036.005
    all:
      - id: d3create-export
      - id: metadata/binary/metrics::minimal-exports
