defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.8
  attack: T1574.002
traits:
  - id: nvbackend-sideload-host
    desc: "NVIDIA NvBackend.exe sideloading host ref"
    crit: notable
    if:
      type: text
      substr: "NvBackend.exe"
  - id: acrobat-sideload-host
    desc: Adobe Acrobat sideloading host reference
    crit: component
    if:
      type: text
      regex: "Acrobat(Reader)?\\.exe"
  - id: onedrive-sideload-host
    desc: Microsoft OneDrive sideloading host reference
    crit: component
    if:
      type: text
      substr: "OneDriveStandaloneUpdater.exe"
  - id: zoom-sideload-host
    desc: 'Zoom EXE name associated with sideload cases'
    crit: component
    if:
      type: text
      substr: "Zoom.exe"
  - id: gotomeeting-g2m-host
    desc: GoToMeeting G2M sideload host
    crit: component
    for: [pe, dll, zip, data]
    if:
      type: text
      exact: "G2M.exe"
  - id: gotomeeting-g2m-dll
    desc: GoToMeeting g2m DLL name
    crit: component
    for: [pe, dll, zip, data]
    if:
      type: text
      exact: "g2m.dll"
  - id: canon-ij-network-scanner-host
    desc: 'Canon IJ Network Scanner side-loader host'
    if:
      type: path
      basename: true
      exact: cnmnsst.exe
      case_insensitive: true
  - id: canon-ij-network-scanner-strings
    desc: Canon IJ Network Scanner Selector EX2 strings
    if:
      type: text
      substr: "Canon IJ Network Scanner Selector EX2"
  - id: canon-ij-cnclid-loader-ref
    desc: 'canon ij cnclid loader ref'
    if:
      type: text
      regex: (?i)CNCLID(34)?\.DLL
  - id: logiai-promptbuilder-host
    desc: Logitech Logi AI Prompt Builder sideload host
    crit: component
    conf: 0.92
    for: [pe, dll, zip, data]
    if:
      type: text
      exact: LogiAiPromptBuilder.exe
  - id: screen-retriever-plugin-dll
    desc: Flutter screen retriever plugin DLL name
    crit: component
    conf: 0.9
    for: [pe, dll, zip, data]
    if:
      type: text
      exact: screen_retriever_plugin.dll

composite_rules:
  - id: gotomeeting-g2m-sideload-pair
    desc: GoToMeeting G2M DLL sideload pair
    crit: suspicious
    conf: 0.92
    for: [pe, dll, zip, data]
    all:
      - id: gotomeeting-g2m-host
      - id: gotomeeting-g2m-dll
    any:
      - id: objectives/evasion/anti-av/platform/defender::etw-blinding-hostile
      - id: objectives/evasion/anti-av/platform/defender::amsi-memory-patch-hostile
      - id: micro-behaviors/crypto/symmetric/xxtea::tea-canonical-delta
  - id: logiai-screen-retriever-sideload-pair
    desc: Logitech Logi AI Prompt Builder screen retriever sideload pair
    crit: suspicious
    conf: 0.93
    for: [pe, dll, zip, data]
    all:
      - id: logiai-promptbuilder-host
      - id: screen-retriever-plugin-dll
