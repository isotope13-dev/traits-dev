defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: hostile
  conf: 0.95
  attack: T1574.002
traits:
  - id: libcares-basename
    desc: Filename is libcares-2.dll
    crit: component
    if:
      type: path
      basename: true
      exact: libcares-2.dll
      case_insensitive: true

composite_rules:
  - id: hostile-proxy-sideload
    desc: Hostile proxy DLL in sideload context
    conf: 0.98
    all:
      - id: metadata/binary/symbols/exports::pure-proxy-dll
    any:
      - id: objectives/evasion/masquerade/dll/sideload::nvbackend-sideload-host
      - id: objectives/evasion/masquerade/dll/sideload::acrobat-sideload-host
      - id: objectives/evasion/masquerade/dll/sideload::onedrive-sideload-host
      - id: objectives/evasion/masquerade/dll/sideload::zoom-sideload-host
      - id: libcares-basename
