# A DLL that presents libcurl's public identity while using a self-issued,
# unknown signing identity and junk-padded sections is a library masquerade
# with a concealed loader surface.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.005,T1574.002

traits:
  - id: curl-original-filename-claim
    desc: PE claims libcurl original filename
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.version.original_filename
      exact: libcurl.dll

  - id: curl-project-company-claim
    desc: PE claims The curl project company identity
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.version.company
      exact: The curl project

composite_rules:
  - id: self-issued-curl-identity-masquerade
    desc: Self-issued curl-export DLL with junk-padded identity claims
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/symbols/curl-exports::curl-api-export-set
      - id: curl-original-filename-claim
      - id: curl-project-company-claim
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::massive-string-count
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
      - id: metadata/signed/unknown/
    unless:
      - id: well-known/lib/benign-runtime-bundles::curl-runtime-library
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/

  # A functional libcurl performs network I/O and therefore imports Winsock
  # (ws2_32 WSAStartup) or a WinHTTP/WinINet client. A DLL that exports the
  # curl easy API and claims curl's identity yet imports no networking library
  # at all is a hollow stub shell — the exported functions are no-ops and the
  # real code runs from DllMain. This is the payload half of a curl DLL
  # side-load, independent of whether the file is bloated or self-signed, so it
  # catches signed or non-padded variants the identity-masquerade rule misses.
  - id: hollow-curl-export-no-network-import
    desc: Curl-identity DLL exports curl API but imports no networking library
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/binary/symbols/curl-exports::curl-api-export-set
    any:
      - id: curl-original-filename-claim
      - id: curl-project-company-claim
      - id: well-known/lib/benign-runtime-bundles::curl-windows-runtime-library
    needs: 1
    unless:
      - id: micro-behaviors/communications/socket/init::wsa-startup
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-open
      - id: metadata/signed/platform/
      - id: well-known/lib/benign-runtime-bundles::curl-runtime-library
