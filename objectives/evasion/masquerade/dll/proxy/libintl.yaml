# DLL Masquerade via GNU libintl (gettext) API Spoofing
# Detects DLLs that export the standard GNU gettext/libintl function set
# while containing unrelated (malicious) code — a DLL side-loading evasion technique.
# ATT&CK: T1574.002 (Hijack Execution Flow: DLL Side-Loading)
#          T1036 (Masquerading)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1574.002"
traits:
  - id: libintl-gettext-export
    desc: Exports gettext (GNU libintl API)
    crit: suspicious
    conf: 0.85
    for: [dll]
    if:
      type: symbol
      exact: "gettext"
    unless:
      - type: text
        exact: libintl.so.1
      - id: well-known/lib/gnu-libintl/
  - id: libintl-bindtextdomain-export
    desc: Exports bindtextdomain (GNU libintl API)
    crit: suspicious
    conf: 0.9
    for: [dll]
    if:
      type: symbol
      exact: "bindtextdomain"
    unless:
      - type: text
        exact: libintl.so.1
      - id: well-known/lib/gnu-libintl/
  - id: libintl-textdomain-export
    desc: Exports textdomain (GNU libintl API)
    crit: suspicious
    conf: 0.9
    for: [dll]
    if:
      type: symbol
      exact: "textdomain"
    unless:
      - type: text
        exact: libintl.so.1
      - id: well-known/lib/gnu-libintl/
  - id: libintl-ngettext-export
    desc: Exports ngettext (GNU libintl plural forms)
    crit: suspicious
    conf: 0.9
    for: [dll]
    if:
      type: symbol
      exact: "ngettext"
    unless:
      - type: text
        exact: libintl.so.1
      - id: well-known/lib/gnu-libintl/
  - id: libintl-dgettext-export
    desc: 'Exports dgettext'
    crit: suspicious
    conf: 0.9
    for: [dll]
    if:
      type: symbol
      exact: "dgettext"
    unless:
      - type: text
        exact: libintl.so.1
      - id: well-known/lib/gnu-libintl/
composite_rules:
  - id: libintl-api-exports
    desc: Exports multiple GNU libintl/gettext functions
    crit: suspicious
    conf: 0.9
    for: [dll]
    needs: 3
    any:
      - id: libintl-gettext-export
      - id: libintl-bindtextdomain-export
      - id: libintl-textdomain-export
      - id: libintl-ngettext-export
      - id: libintl-dgettext-export
    unless:
      - id: well-known/lib/gnu-libintl/
  - id: libintl-masquerade
    desc: DLL masquerading as GNU libintl while containing unrelated code
    crit: suspicious
    conf: 0.9
    for: [dll]
    all:
      - id: libintl-api-exports
    any:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::rust-binary
