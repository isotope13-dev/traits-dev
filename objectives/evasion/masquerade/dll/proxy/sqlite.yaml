defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1036.005, T1574.002"

composite_rules:
  - id: sqlite-private-export-proxy-loader
    desc: SQLite proxy DLL hides loader surface
    crit: hostile
    conf: 0.97
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    all:
      - id: metadata/binary/symbols/exports::sqlite-api-with-private-wrapper-exports
      - id: objectives/command-and-control/dropper/execution/masquerade-loader::overlay-dominates-pe-file
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-aes-cbc
      - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-multi-callbacks
    unless:
      - id: well-known/lib/sqlite/
      - id: metadata/signed/platform/
