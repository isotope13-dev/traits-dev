# DLL Name Typosquatting
# Detects intentionally misspelled DLL names used in sideloading
# ATT&CK: T1036.005 (Match Legitimate Name or Location)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1036.005"
traits:
  - id: miacrome-dll-typosquat
    desc: "Miacrome.dll Chrome typosquat"
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: "Miacrome"
