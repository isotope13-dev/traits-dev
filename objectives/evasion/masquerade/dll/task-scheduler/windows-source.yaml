defaults:
  platforms: [windows]
  for: [c, cpp, pe, dll]
  attack: T1036.005

traits:
  - id: wpts-dll-name
    desc: Task Scheduler extension DLL name
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: WptsExtensions.dll

  - id: wpts-copy-action-data
    desc: WptsCopyActionData export name
    crit: component
    conf: 0.96
    if:
      type: symbol
      substr: WptsCopyActionData

  - id: wpts-create-action
    desc: WptsCreateAction export name
    crit: component
    conf: 0.96
    if:
      type: symbol
      substr: WptsCreateAction

  - id: wpts-destroy-action
    desc: WptsDestroyAction export name
    crit: component
    conf: 0.96
    if:
      type: symbol
      substr: WptsDestroyAction

  - id: wpts-free-action-data
    desc: WptsFreeActionData export name
    crit: component
    conf: 0.96
    if:
      type: symbol
      substr: WptsFreeActionData

  - id: wpts-launch-action
    desc: WptsLaunchAction export name
    crit: component
    conf: 0.96
    if:
      type: symbol
      substr: WptsLaunchAction

  - id: microsoft-company-string
    desc: Microsoft company string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Microsoft Corporation

  - id: scheduler-version-string
    desc: Task Scheduler version string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 10.0.19041.1023

  - id: svchost-target-name
    desc: svchost target process name
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: svchost.exe

composite_rules:
  - id: wpts-export-cluster
    desc: Task Scheduler extension export cluster
    crit: suspicious
    conf: 0.98
    any:
      - id: wpts-copy-action-data
      - id: wpts-create-action
      - id: wpts-destroy-action
      - id: wpts-free-action-data
      - id: wpts-launch-action
    needs: 4

  - id: task-scheduler-extension-masquerade
    desc: Task Scheduler extension DLL masquerade
    crit: suspicious
    conf: 0.99
    all:
      - id: wpts-dll-name
      - id: wpts-export-cluster
    any:
      - id: microsoft-company-string
      - id: scheduler-version-string
      - id: svchost-target-name
    needs: 2

  - id: task-scheduler-masquerade-injector
    desc: Task Scheduler masquerade with injection
    crit: hostile
    conf: 0.99
    attack: T1055
    all:
      - id: task-scheduler-extension-masquerade
      - id: micro-behaviors/process/inject/dll::write-process-memory
    any:
      - id: micro-behaviors/process/inject/dll::create-remote-thread
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    needs: 1
