defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1574.002
traits:
  - id: msimg32-alphablend-forward
    desc: msimg32 AlphaBlend forwarder
    crit: component
    conf: 0.98
    if:
      type: text
      exact: C:\Windows\System32\msimg32.AlphaBlend
      section: .rdata
  - id: msimg32-gradientfill-forward
    desc: msimg32 GradientFill forwarder
    crit: component
    conf: 0.98
    if:
      type: text
      exact: C:\Windows\System32\msimg32.GradientFill
      section: .rdata
  - id: msimg32-transparentblt-forward
    desc: msimg32 TransparentBlt forwarder
    crit: component
    conf: 0.98
    if:
      type: text
      exact: C:\Windows\System32\msimg32.TransparentBlt
      section: .rdata
composite_rules:
  - id: msimg32-proxy-forwarders
    desc: msimg32 proxy DLL forwarders
    crit: suspicious
    conf: 0.98
    all:
      - id: msimg32-alphablend-forward
      - id: msimg32-gradientfill-forward
      - id: msimg32-transparentblt-forward
      - id: metadata/binary/symbols/exports::pure-proxy-dll
  - id: msimg32-proxy-hidden-loader
    desc: msimg32 proxy hidden loader
    crit: hostile
    conf: 0.99
    all:
      - id: msimg32-proxy-forwarders
      - id: micro-behaviors/process/create/flags::hidden-winexec
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::stack-copied-xor-payload
      - id: micro-behaviors/mem/protect/modify::virtual-protect
