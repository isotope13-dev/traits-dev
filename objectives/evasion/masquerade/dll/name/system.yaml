defaults:
  platforms: [windows]
  for: [pe]
  crit: suspicious
  conf: 0.85
traits:
  - id: export-name-masquerade
    desc: Export table name differs from filename
    if:
      type: text
      exact: "cloud.dll"
      section: .rdata
  - id: dll-basename
    desc: DLL filename extension present
    crit: baseline
    if:
      type: basename
      regex: \.dll$
  - id: api-ms-win-dll-basename
    desc: API-set forwarder DLL filename
    crit: baseline
    if:
      type: basename
      regex: '(?i)^api-ms-win-.{1,80}\.dll$'
  - id: suffixed-system-dll-core
    desc: Core system DLL name with digit suffix
    crit: component
    if:
      type: basename
      regex: "(userenv|xmllite|ntdll|kernel32)[0-9]\\.dll"
  - id: suffixed-system-dll-network
    desc: Network system DLL name with digit suffix
    crit: component
    if:
      type: basename
      regex: "(advapi32|ws2_32|wininet|winhttp)[0-9]\\.dll"
  - id: suffixed-system-dll-shell
    desc: Shell system DLL name with digit suffix
    crit: component
    if:
      type: basename
      regex: "(urlmon|shell32|shlwapi|ole32)[0-9]\\.dll"
  - id: suffixed-system-dll-crypto
    desc: Crypto system DLL name with digit suffix
    crit: component
    if:
      type: basename
      regex: "(oleaut32|crypt32|bcrypt)[0-9]\\.dll"
composite_rules:
  - id: suffixed-system-dll-masquerade
    desc: System DLL name with digit suffix
    any:
      - id: suffixed-system-dll-core
      - id: suffixed-system-dll-network
      - id: suffixed-system-dll-shell
      - id: suffixed-system-dll-crypto
  - id: mass-export-aliasing
    desc: High export count with low code density
    crit: notable
    for: [dll]
    all:
      - id: dll-basename
      - id: metadata/binary/metrics/anomaly::high-export-count-marker
      - id: metadata/binary/metrics/anomaly::low-function-count-marker
    unless:
      - id: api-ms-win-dll-basename
      - id: well-known/lib/vulkan::loader-dll
      - id: metadata/binary/symbols/exports::stable-abi-forwarder
      - id: metadata/library/python-runtime::python-stable-abi-forwarder-basename
      - id: metadata/binary/anomaly/format::vcruntime-dll-basename
      - id: metadata/binary/anomaly/format::libcrypto-dll-basename
      - id: metadata/binary/anomaly/format::libssl-dll-basename
