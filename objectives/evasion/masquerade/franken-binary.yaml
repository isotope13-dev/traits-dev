# Franken-binary: Mixing metadata from multiple unrelated vendors
# High-fidelity signal for loaders that wrap malicious payloads in "stolen" legitimate hosts
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1036
traits:
  - id: oracle-java-strings
    desc: Oracle/Java related strings
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: "sun.launcher.rmid"
      case_insensitive: true
composite_rules:
  - id: multi-vendor-metadata-mix
    desc: Binary contains metadata from 3+ vendors
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/evasion/masquerade/version-resource::microsoft-adobe-contradiction
      - id: oracle-java-strings
