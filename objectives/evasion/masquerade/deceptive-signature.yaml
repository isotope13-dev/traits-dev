defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: deceptive-signed-binary
    desc: Binary masquerades as Microsoft but is not signed by them
    crit: hostile
    conf: 0.96
    attack: T1036.004
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: metadata/signed/platform::any-valid-signature
    unless:
      - id: metadata/signed/platform::microsoft
    # Require at least one other suspicious behavior to avoid FPs on poorly configured benign software
    any:
      - id: objectives/evasion/process/injection/
      - id: objectives/anti-static/obfuscation/tools/garble::garble-obfuscated-go
      - id: objectives/anti-static/obfuscation/encoding/xor::string-decrypt
