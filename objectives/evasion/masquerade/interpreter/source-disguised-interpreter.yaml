# A file whose extension claims one source/script language but whose actual
# content is a different interpreter's program (e.g. a `.php` that is really
# `python3 -c "<code>"`). Disguising the loader's true language defeats extension-
# and parser-based triage — the SiteGuarding droppers ship Python/data logic under
# PHP and data filenames. These composites infer the masquerade intent; the
# neutral signals they reference live in metadata/ (structural metrics) and
# micro-behaviors/ (decompression, file-read).
defaults:
  platforms: [linux, macos, windows]
  conf: 0.95
  attack: T1036.008

composite_rules:
  # === SUSPICIOUS: mislabeled single-line source file ========================
  # A non-trivial source file that is one dense line AND does not parse as its
  # declared language. That combination is a disguised stub regardless of which
  # foreign language is hidden inside — it catches the masquerade structurally,
  # before any payload behavior is decoded.
  - id: mislabeled-single-line-source
    desc: One-line source fails parser
    crit: suspicious
    conf: 0.85
    attack: T1036.008,T1027
    for: [scripts]
    all:
      - id: metadata/file/metrics::source-degenerate-ast
      - id: metadata/file/metrics::file-one-liner
    unless:
      - id: metadata/library/python-stdlib::python-stdlib-test-file
      - id: metadata/file/extension/identity::template-source-basename
      - id: well-known/app/tabby::tabby-eval-dataset-member
      - id: well-known/app/civicrm/
      - id: well-known/app/egroupware/
      - id: metadata/file/profile/identity::notepad-plus-plus-language-model

  # === HOSTILE: interpreter dropper disguised under a foreign source extension =
  # Decompression + external file read surfacing on a non-python, non-shell source
  # host means a foreign interpreter program is concealed inside it (a `.py` or a
  # shell launching python is not a masquerade and is excluded by the gate).
  - id: interpreter-program-disguised-as-source
    desc: Interpreter dropper disguised as foreign source
    crit: hostile
    conf: 0.95
    attack: T1036.008,T1027
    for: [php, javascript, ruby, perl, lua, powershell]
    all:
      - id: micro-behaviors/data/compress/library::script-decompress-call
      - id: micro-behaviors/fs/file/open::file-read-call
    any:
      - id: micro-behaviors/fs/file/extension::data-blob-extension
      - id: micro-behaviors/data/compress/library::decompress-decoded-to-text
