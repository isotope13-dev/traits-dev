# C# assembly metadata masquerading as Microsoft products
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1036.005"
  mbc: "F0004"
traits:
  - id: microsoft-company
    desc: AssemblyCompany set to Microsoft
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: 'AssemblyCompany\s*\(\s*"Microsoft"\s*\)'
  - id: nt-kernel-title
    desc: Assembly titled as NT Kernel & System
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: 'AssemblyTitle\s*\(\s*"NT Kernel & System"\s*\)'
  - id: microsoft-copyright
    desc: Fake Microsoft copyright notice
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: 'AssemblyCopyright\s*\([^)]{0,50}Microsoft\s+\d{4}'
composite_rules:
  - id: microsoft-masquerade
    desc: Assembly masquerades as Microsoft product
    crit: suspicious
    conf: 0.96
    all:
      - id: microsoft-company
    any:
      - id: nt-kernel-title
      - id: microsoft-copyright
