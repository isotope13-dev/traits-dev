composite_rules:
- id: http-content-type-masquerade
  desc: HTTP POST claims form encoding but sends base64 body
  crit: suspicious
  conf: 0.92
  near_bytes: 2000
  all:
  - id: form-urlencoded-content-type
  - id: base64-encoded-post-body
- id: http-json-as-form-data
  desc: HTTP POST sends JSON as base64 claiming form encoding
  crit: hostile
  conf: 0.95
  all:
  - id: form-urlencoded-content-type
  - id: json-before-base64-encode
  - id: base64-encoded-post-body
- id: base64-encoded-post-body
  desc: base64-encode HTTP POST request body
  crit: notable
  conf: 0.8
  any:
  - id: base64-encoded-post-body--rx-1
  - id: base64-encoded-post-body--rx-2
  - id: base64-encoded-post-body--rx-3
  - id: base64-encoded-post-body--rx-4
  - id: base64-encoded-post-body--rx-5
  - id: base64-encoded-post-body--rx-6
  - id: base64-encoded-post-body--rx-7
  - id: base64-encoded-post-body--rx-8
  - id: base64-encoded-post-body--rx-9
  needs: 1
- id: json-before-base64-encode
  desc: JSON-serialize then base64-encode for HTTP body
  crit: component
  conf: 0.9
  any:
  - id: json-before-base64-encode--rx-10
  - id: json-before-base64-encode--rx-11
  - id: json-before-base64-encode--rx-12
  - id: json-before-base64-encode--rx-13
  - id: json-before-base64-encode--rx-14
  - id: json-before-base64-encode--rx-15
  - id: json-before-base64-encode--rx-16
  - id: json-before-base64-encode--rx-17
  - id: json-before-base64-encode--rx-18
  needs: 1
  unless:
  - type: basename
    regex: \.map$
  - type: text
    substr: '"sourcesContent":['
  - type: text
    substr: 'data:application/json;charset=utf-8;base64,'
  not:
  - substr: 'from"./chunk-'
  - substr: 'btoa(unescape(encodeURIComponent'
  - substr: 'http://example.com/ffmpeg-core.js#{btoa(JSON.stringify({'
  - substr: 'createResponse(t,o,n){let a={from:'
  - substr: 'payload:JSON.stringify({method:n,path:a,body:p,headers:i})'
  - substr: 'JSON.stringify(t))}static ɵ'
  - substr: 'JSON.stringify(authorized))'
  - substr: 'oauth2.auth.schema.get("flow")'
  - substr: 'static ɵfac=function('
  - substr: 'static ɵ'
  - substr: 'static \u0275'
