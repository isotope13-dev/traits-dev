# HTTP Content-Type / Body Masquerade
# Detects C2 agents that claim application/x-www-form-urlencoded Content-Type
# but actually send a base64-encoded (and often JSON-serialized) body.
# This confuses network inspection tools expecting key=value form data.
# ATT&CK: T1001.003 (Protocol Impersonation), T1071.001 (Web Protocols)
defaults:
  platforms: [windows, unix]
  attack: T1001.003
  for: [python, javascript, go, php, powershell]
traits:
  - id: form-urlencoded-content-type
    desc: Hardcoded form-urlencoded Content-Type in HTTP client
    crit: component
    conf: 0.7
    if:
      type: text
      substr: application/x-www-form-urlencoded
  - id: base64-encoded-post-body
    desc: base64-encode HTTP POST request body
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)(b64encode|ToBase64String|base64\.StdEncoding\.EncodeToString|btoa|base64_encode)\b.{0,300}(post|upload|send|UploadData|request)'
  - id: json-before-base64-encode
    desc: JSON-serialize then base64-encode for HTTP body
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(json\.dumps|ConvertTo-Json|json\.Marshal|JSON\.stringify|json\.encode).{0,400}(b64encode|ToBase64String|base64\.StdEncoding|btoa)|(b64encode|ToBase64String|base64\.StdEncoding|btoa).{0,400}(json\.dumps|ConvertTo-Json|json\.Marshal|JSON\.stringify)'
    not:
      - substr: 'from"./chunk-'
      - substr: 'btoa(unescape(encodeURIComponent'
      - substr: 'createResponse(t,o,n){let a={from:'
      - substr: 'payload:JSON.stringify({method:n,path:a,body:p,headers:i})'
      - substr: 'JSON.stringify(t))}static ɵ'
      - substr: 'JSON.stringify(authorized))'
      - substr: 'oauth2.auth.schema.get("flow")'
      - substr: 'static ɵfac=function('
      - substr: 'static ɵ'
      - substr: 'static \u0275'
composite_rules:
  - id: http-content-type-masquerade
    desc: HTTP POST claims form encoding but sends base64 body
    crit: suspicious
    conf: 0.92
    all:
      - id: form-urlencoded-content-type
      - id: base64-encoded-post-body
  - id: http-json-as-form-data
    desc: HTTP POST sends JSON as base64 claiming form encoding
    crit: hostile
    conf: 0.95
    all:
      - id: form-urlencoded-content-type
      - id: json-before-base64-encode
      - id: base64-encoded-post-body
