# HTTP Content-Type / Body Masquerade
# Detects C2 agents that claim application/x-www-form-urlencoded Content-Type
# but actually send a base64-encoded (and often JSON-serialized) body.
# This confuses network inspection tools expecting key=value form data.
# ATT&CK: T1001.003 (Protocol Impersonation), T1071.001 (Web Protocols)
defaults:
  platforms: [windows, unix]
  attack: T1001.003
  for: [python, javascript, go, php, powershell]
traits:
- id: form-urlencoded-content-type
  desc: Hardcoded form-urlencoded Content-Type in HTTP client
  crit: component
  conf: 0.7
  if:
    type: text
    substr: application/x-www-form-urlencoded
- id: base64-encoded-post-body--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(b64encode|ToBase64String)\b.{0,300}(post|upload)'
- id: base64-encoded-post-body--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(b64encode|ToBase64String)\b.{0,300}(send|UploadData)'
- id: base64-encoded-post-body--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(b64encode|ToBase64String)\b.{0,300}(request)'
- id: base64-encoded-post-body--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64\.StdEncoding\.EncodeToString|btoa)\b.{0,300}(post|upload)'
- id: base64-encoded-post-body--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64\.StdEncoding\.EncodeToString|btoa)\b.{0,300}(send|UploadData)'
- id: base64-encoded-post-body--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64\.StdEncoding\.EncodeToString|btoa)\b.{0,300}(request)'
- id: base64-encoded-post-body--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64_encode)\b.{0,300}(post|upload)'
- id: base64-encoded-post-body--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64_encode)\b.{0,300}(send|UploadData)'
- id: base64-encoded-post-body--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(base64_encode)\b.{0,300}(request)'
- id: json-before-base64-encode--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  not:
  - substr: 'from"./chunk-'
  - substr: 'btoa(unescape(encodeURIComponent'
  - substr: 'http://example.com/ffmpeg-core.js#{btoa(JSON.stringify({'
  - substr: 'createResponse(t,o,n){let a={from:'
  - substr: 'payload:JSON.stringify({method:n,path:a,body:p,headers:i})'
  - substr: 'JSON.stringify(t))}static ɵ'
  - substr: 'JSON.stringify(authorized))'
  - substr: 'oauth2.auth.schema.get("flow")'
  - substr: 'static ɵfac=function('
  - substr: 'static ɵ'
  - substr: 'static \u0275'
  if:
    type: text
    regex: '(json\.dumps|ConvertTo-Json).{0,400}(b64encode|ToBase64String)'
