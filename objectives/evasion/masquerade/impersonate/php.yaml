defaults:
  platforms: [windows, unix]
  mbc: B0032
  for:
    - php
traits:
  - id: googlebot
    desc: Googlebot User-Agent impersonation
    crit: suspicious
    conf: 0.9
    attack: T1036
    if:
      type: string_literal
      regex: Googlebot/\d
  - id: bingbot
    desc: Bingbot User-Agent impersonation
    crit: suspicious
    conf: 0.9
    attack: T1036
    if:
      type: string_literal
      regex: bingbot/\d
  - id: ua-array
    desc: User-Agent string array (rotation for
    crit: suspicious
    conf: 0.85
    attack: T1036
    if:
      type: string_literal
      regex: Mozilla/5\.0.{0,50}Mozilla/5\.0.{0,50}Mozilla/5\.0
  - id: array-rand-mozilla
    desc: array_rand followed by Mozilla
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: array_rand.{0,50}Mozilla
  - id: mozilla-array-rand
    desc: Mozilla followed by array_rand
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: Mozilla.{0,50}array_rand
composite_rules:
  - id: array-rand-ua
    desc: Random User-Agent selection
    crit: suspicious
    conf: 0.8
    any:
      - id: array-rand-mozilla
      - id: mozilla-array-rand
