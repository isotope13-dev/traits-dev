defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1036.005
  mbc: F0004
traits:
  - id: windows-live-title
    desc: Assembly title mimics Windows Live
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: 'AssemblyTitle\s*\(\s*"windows Live"\s*\)'
  - id: windows-live-product
    desc: Assembly product mimics Windows Live
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: 'AssemblyProduct\s*\(\s*"windows Live"\s*\)'
  - id: msnmsgr-install-path
    desc: Installation path mimics Messenger executable
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      exact: C:\\Windows\\System32\\msnmsgr.exe
  - id: windows-live-run-name
    desc: Run key name mimics Windows Live Messenger
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      exact: Windows Live messenger
composite_rules:
  - id: windows-live-messenger-masquerade
    desc: .NET source masquerades as Windows Live Messenger
    crit: suspicious
    conf: 0.99
    all:
      - id: windows-live-title
    any:
      - id: windows-live-product
      - id: msnmsgr-install-path
      - id: windows-live-run-name
    needs: 2
