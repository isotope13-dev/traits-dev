defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005,T1547.001

traits:
  - id: appdata-windowsupdate-executable-reference
    desc: AppData WindowsUpdate executable reference
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: "\\WindowsUpdate.exe"

  - id: windowsupdate-startup-shortcut-reference
    desc: WindowsUpdate startup shortcut reference
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: "\\WindowsUpdate.lnk"

  - id: appdata-environment-marker
    desc: APPDATA environment marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: APPDATA

composite_rules:
  - id: windowsupdate-shortcut-masquerade
    desc: WindowsUpdate executable staged with shortcut support
    crit: hostile
    conf: 0.98
    all:
      - id: appdata-environment-marker
      - id: appdata-windowsupdate-executable-reference
      - id: windowsupdate-startup-shortcut-reference
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/os/com/invoke::co-create-instance
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/app/
