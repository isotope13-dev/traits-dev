defaults:
  for: [pe]
  platforms: [windows]
  attack: T1036.005
  mbc: F0004
traits:
- id: mashup-runtime-product
  desc: Microsoft Mashup Runtime product
  crit: component
  conf: 0.97
  if:
    type: text
    exact: Microsoft® Mashup Runtime
    section: .rsrc
- id: mashup-container-filename
  desc: Mashup container filename claim
  crit: component
  conf: 0.96
  if:
    type: text
    exact: Microsoft.Mashup.Container.NetFX45.exe
- id: mashup-container-exe-filename
  desc: Mashup container executable claim
  crit: component
  conf: 0.96
  if:
    type: text
    exact: Microsoft.Mashup.Container.exe
- id: onenotem-filename
  desc: OneNoteM filename claim
  crit: component
  conf: 0.96
  if:
    type: text
    exact: OneNoteM.exe
- id: wow-helper-filename
  desc: Firefox wow_helper filename claim
  crit: component
  conf: 0.96
  if:
    type: text
    exact: wow_helper.exe
- id: systemsettings-filename
  desc: SystemSettings.exe filename claim
  crit: component
  conf: 0.96
  if:
    type: text
    exact: SystemSettings.exe
    section: .rsrc
- id: alibaba-company-name
  desc: Alibaba company name claim
  crit: component
  conf: 0.98
  if:
    type: text
    exact: Alibaba software (Shanghai) Corporation.
    section: .rsrc
- id: aliwangwang-description
  desc: AliWangWang product description
  crit: component
  conf: 0.98
  if:
    type: text
    exact: AliWangWang
    section: .rsrc
- id: aliim-original-filename
  desc: AliIM original filename claim
  crit: component
  conf: 0.98
  if:
    type: text
    exact: AliIM.exe
    section: .rsrc
- id: ali-taskbar-notifier-class
  desc: Ali taskbar notifier UI class
  crit: component
  conf: 0.94
  if:
    type: text
    exact: uCTaskbarNotifier
composite_rules:
- id: unsigned-mashup-runtime-masquerade
  desc: Unsigned Microsoft Mashup runtime masquerade
  crit: suspicious
  conf: 0.96
  all:
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  any:
  - id: mashup-runtime-product
  - id: mashup-container-filename
  - id: mashup-container-exe-filename
  unless:
  - id: metadata/signed/platform::microsoft
- id: onenote-screenclip-masquerade
  desc: OneNote screen capture tool masquerade
  crit: suspicious
  conf: 0.95
  all:
  - id: onenotem-filename
  any:
  - id: metadata/binary/debug::onenotem-pdb
  - id: micro-behaviors/hardware/display/screen::gdi-window-capture-primitives
  unless:
  - id: metadata/signed/platform::microsoft
- id: firefox-helper-masquerade
  desc: Firefox wow helper masquerade
  crit: suspicious
  conf: 0.95
  all:
  - id: wow-helper-filename
  any:
  - id: metadata/binary/debug::wow-helper-pdb
  - id: micro-behaviors/process/enumerate/apps::browser-apps-firefox
  unless:
  - id: metadata/signed/developer::mozilla-corporation
- id: unsigned-aliwangwang-masquerade
  desc: Unsigned Alibaba IM masquerade
  crit: suspicious
  conf: 0.99
  all:
  - id: metadata/package/versioning::pe-version-resource
  any:
  - id: alibaba-company-name
  - id: aliwangwang-description
  - id: aliim-original-filename
  - id: ali-taskbar-notifier-class
  needs: 3
  unless:
  - id: metadata/signed/platform
  - id: metadata/signed/developer
  - id: metadata/signed/certificate
- id: aliwangwang-admin-manifest
  desc: Alibaba IM masquerade with admin manifest
  crit: suspicious
  conf: 0.98
  all:
  - id: unsigned-aliwangwang-masquerade
  - id: micro-behaviors/os/privilege/manifest::require-administrator
- id: aliwangwang-admin-display-control
  desc: Alibaba IM masquerade with display control
  crit: suspicious
  conf: 0.97
  all:
  - id: aliwangwang-admin-manifest
  any:
  - id: micro-behaviors/ui/window/manage/control::window-region-shaping
  - id: micro-behaviors/ui/window/manage/control::get-window-dc
  - id: micro-behaviors/ui/controls/widget::system-parameters-info
  - id: micro-behaviors/hardware/display/screen::gdi-bitblt
  needs: 2
- id: aliwangwang-admin-screen-capture
  desc: Alibaba IM masquerade with admin screen capture
  crit: hostile
  conf: 0.99
  all:
  - id: aliwangwang-admin-manifest
  - id: micro-behaviors/hardware/display/screen::gdi-getdibits
  any:
  - id: micro-behaviors/hardware/display/screen::gdi-bitblt
  - id: micro-behaviors/ui/window/manage/control::get-window-dc
- id: aliwangwang-taskbar-admin-overlay-decoy
  desc: Alibaba taskbar admin overlay capture decoy
  crit: hostile
  conf: 0.997
  all:
  - id: aliwangwang-admin-display-control
  - id: aliwangwang-admin-screen-capture
  - id: ali-taskbar-notifier-class
- id: aliwangwang-branded-taskbar-admin-decoy
  desc: Branded Alibaba taskbar admin capture decoy
  crit: hostile
  conf: 0.998
  all:
  - id: unsigned-aliwangwang-masquerade
  - id: alibaba-company-name
  - id: aliwangwang-description
  - id: aliim-original-filename
  - id: ali-taskbar-notifier-class
  - id: aliwangwang-admin-display-control
  - id: aliwangwang-admin-screen-capture
- id: aliwangwang-taskbar-admin-capture-cluster
  desc: Alibaba taskbar IM admin capture cluster
  crit: hostile
  conf: 0.995
  all:
  - id: unsigned-aliwangwang-masquerade
  - id: ali-taskbar-notifier-class
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: micro-behaviors/hardware/display/screen::gdi-getdibits
  - id: micro-behaviors/ui/window/manage/control::get-window-dc
  any:
  - id: micro-behaviors/ui/window/manage/control::window-region-shaping
  - id: micro-behaviors/ui/controls/widget::system-parameters-info
- id: aliwangwang-taskbar-overlay-screen-capture
  desc: Alibaba taskbar overlay admin capture decoy
  crit: hostile
  conf: 0.998
  all:
  - id: metadata/package/versioning::pe-version-resource
  - id: alibaba-company-name
  - id: aliwangwang-description
  - id: aliim-original-filename
  - id: ali-taskbar-notifier-class
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: micro-behaviors/hardware/display/screen::gdi-getdibits
  - id: micro-behaviors/ui/window/manage/control::get-window-dc
  - id: micro-behaviors/ui/window/manage/control::window-region-shaping
  - id: micro-behaviors/ui/controls/widget::system-parameters-info
  unless:
  - id: metadata/signed/platform
  - id: metadata/signed/developer
  - id: metadata/signed/certificate
- id: aliwangwang-branded-windowdc-overlay-capture
  desc: Branded Alibaba window DC overlay capture decoy
  crit: hostile
  conf: 0.999
  all:
  - id: unsigned-aliwangwang-masquerade
  - id: alibaba-company-name
  - id: aliwangwang-description
  - id: aliim-original-filename
  - id: ali-taskbar-notifier-class
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: micro-behaviors/hardware/display/screen::gdi-getdibits
  - id: micro-behaviors/ui/window/manage/control::get-window-dc
  - id: micro-behaviors/ui/window/manage/control::window-region-shaping
- id: unsigned-systemsettings-masquerade
  desc: Unsigned binary claiming SystemSettings.exe identity
  crit: suspicious
  conf: 0.96
  all:
  - id: systemsettings-filename
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: metadata/signed/trust-level::unsigned
  unless:
  - id: metadata/signed/platform::microsoft
