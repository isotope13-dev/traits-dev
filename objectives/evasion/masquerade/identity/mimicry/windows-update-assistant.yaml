defaults:
  for:
  - pe
  platforms:
  - windows
  attack: T1036.005
traits:
- id: windows-update-assistant-desc
  desc: Windows Update Assistant description
  crit: component
  conf: 0.96
  if:
    type: text
    exact: Windows Update Assistant
    section: .rsrc
- id: rundll32-original-filename
  desc: rundll32.exe filename claim
  crit: component
  conf: 0.96
  if:
    type: text
    exact: rundll32.exe
    section: .rsrc
- id: windowsupdate-camelcase-token
  desc: WindowsUpdate identity token
  crit: component
  conf: 0.86
  if:
    type: text
    exact: WindowsUpdate
- id: windowsupdate-appdata-path--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: WindowsUpdate
    case_insensitive: true
- id: windowsupdate-appdata-path--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: LOCALAPPDATA
    case_insensitive: true
- id: windowsupdate-appdata-path--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: ProgramData
    case_insensitive: true
- id: windowsupdate-appdata-path--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Roaming
    case_insensitive: true
- id: windowsupdate-appdata-path--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Temp
    case_insensitive: true
- id: windowsupdate-executable-name
  desc: WindowsUpdate executable filename
  crit: component
  conf: 0.94
  if:
    type: basename
    regex: '(?i)^WindowsUpdate(?:\.exe)?$'
composite_rules:
- id: windows-update-assistant-rundll32
  desc: Windows updater masquerade identity
  crit: suspicious
  conf: 0.97
  all:
  - id: windows-update-assistant-desc
  - id: rundll32-original-filename
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  unless:
  - id: metadata/signed/platform::microsoft
- id: non-microsoft-windowsupdate-path
  desc: Non-Microsoft WindowsUpdate staging path
  crit: suspicious
  conf: 0.93
  all:
  - id: windowsupdate-appdata-path
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: non-microsoft-windowsupdate-reference
  desc: Non-Microsoft WindowsUpdate reference
  crit: suspicious
  conf: 0.84
  all:
  - id: windowsupdate-camelcase-token
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: non-microsoft-windowsupdate-filename
  desc: Non-Microsoft WindowsUpdate filename
  crit: suspicious
  conf: 0.91
  all:
  - id: windowsupdate-executable-name
  unless:
  - id: metadata/signed/platform::microsoft
- id: windowsupdate-appdata-path
  desc: WindowsUpdate AppData staging path
  crit: component
  conf: 0.95
  any:
  - id: windowsupdate-appdata-path--rx-1
  - id: windowsupdate-appdata-path--rx-2
  - id: windowsupdate-appdata-path--rx-3
  - id: windowsupdate-appdata-path--rx-4
  - id: windowsupdate-appdata-path--rx-5
  needs: 1
