defaults:
  for:
  - pe
  platforms:
  - windows
  attack: T1036.005
traits:
- id: windows-update-assistant-desc
  desc: Windows Update Assistant description
  crit: component
  conf: 0.96
  if:
    type: text
    exact: Windows Update Assistant
    section: .rsrc
- id: rundll32-original-filename
  desc: rundll32.exe filename claim
  crit: component
  conf: 0.96
  if:
    type: text
    exact: rundll32.exe
    section: .rsrc
- id: non-microsoft-windowsupdate-reference
  desc: Non-Microsoft WindowsUpdate reference
  crit: suspicious
  conf: 0.84
  if:
    type: text
    exact: WindowsUpdate
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: windowsupdate-appdata-path--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: LOCALAPPDATA
    case_insensitive: true
  count_max: 1029341
- id: windowsupdate-appdata-path--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: ProgramData
    case_insensitive: true
  count_max: 1029342
- id: windowsupdate-appdata-path--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Roaming
    case_insensitive: true
  count_max: 1029343
- id: non-microsoft-windowsupdate-filename
  desc: Non-Microsoft WindowsUpdate filename
  crit: suspicious
  conf: 0.91
  if:
    type: basename
    regex: '(?i)^WindowsUpdate(\.exe)?$'
  unless:
  - id: metadata/signed/platform::microsoft
- id: seven-zip-product-name
  desc: 7-Zip product name
  crit: component
  conf: 0.95
  if:
    type: kv
    path: pe.version_info.product_name
    regex: (?i)\b7-Zip\b
composite_rules:
- id: windows-update-assistant-rundll32
  desc: Windows updater masquerade identity
  crit: suspicious
  conf: 0.97
  all:
  - id: windows-update-assistant-desc
  - id: rundll32-original-filename
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  unless:
  - id: metadata/signed/platform::microsoft
- id: non-microsoft-windowsupdate-path
  desc: User-writable Windows staging path
  crit: suspicious
  conf: 0.93
  all:
  - id: windowsupdate-appdata-path
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: metadata/package/tooling::tool-identity-7zip
  - id: metadata/package/tooling::official-7zip-component
  - id: seven-zip-product-name
- id: windowsupdate-appdata-path
  desc: User-writable Windows staging reference
  crit: component
  conf: 0.95
  all:
  - id: non-microsoft-windowsupdate-reference
  any:
  - id: windowsupdate-appdata-path--rx-2
  - id: windowsupdate-appdata-path--rx-3
  - id: windowsupdate-appdata-path--rx-4
