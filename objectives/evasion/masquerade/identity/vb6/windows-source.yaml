defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1036.005
traits:
  - id: explorer-project-title-vb6
    desc: Project titled Microsoft Explorer
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      substr: Title="Microsoft Explorer"
  - id: explorer-exe-name-vb6
    desc: Project outputs Explorer.exe
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: (?i)\bExeName32\s*=\s*"Explorer\.exe"
  - id: security-patch-lure-name-vb6
    desc: Security patch lure executable
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: (?i)\bWin_Security_Patch_[0-9]{4}\.exe\b
composite_rules:
  - id: vb6-explorer-project-masquerade
    desc: VB6 project impersonates Explorer
    crit: suspicious
    conf: 0.98
    all:
      - id: explorer-project-title-vb6
      - id: explorer-exe-name-vb6
  - id: vb6-explorer-masquerade
    desc: VB6 Explorer identity masquerade
    crit: suspicious
    conf: 0.99
    all:
      - id: explorer-project-title-vb6
      - id: explorer-exe-name-vb6
    any:
      - id: micro-behaviors/fs/write::explorer-self-copy
      - id: security-patch-lure-name-vb6
