defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004
traits:
  - id: nodejs-installer-title
    desc: Node.js installer title
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "@Node.js v24.13.0 Setup"
  - id: nodejs-installer-progress-ui
    desc: Node.js installer progress UI
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '@  (Downloading|Installing|This will install|Node\.js v[0-9.]+ setup completed)'
  - id: nodejs-installer-window-class
    desc: Node.js setup window class
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "@NJSSetup"
composite_rules:
  - id: fake-nodejs-installer-ui
    desc: Fake Node.js installer UI
    crit: suspicious
    conf: 0.93
    all:
      - id: nodejs-installer-title
      - id: nodejs-installer-progress-ui
      - id: nodejs-installer-window-class
    unless:
      - id: metadata/binary/installer::known-benign-installer
  - id: fake-nodejs-installer-dropper
    desc: Fake Node.js installer dropper
    crit: hostile
    conf: 0.97
    all:
      - id: nodejs-installer-title
      - id: nodejs-installer-progress-ui
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
    any:
      - id: objectives/persistence/login/scheduled-task::task-scheduler-service-progid
      - id: objectives/persistence/login/scheduled-task::task-scheduler-register-method
      - id: objectives/execution/wmi::com-wmi-process-create
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/spawn::create-process-w-string
    needs: 2
