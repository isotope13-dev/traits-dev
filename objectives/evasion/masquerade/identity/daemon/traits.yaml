defaults:
  platforms:
    - unix
    - android
  for:
    - elf
  mbc: F0004
  attack: T1036.005
traits:
  - id: fake-smartd
    desc: Fake smartd process masquerade
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: /usr/sbin/smartd\s+-[nqp]
  - id: fake-syslogd
    desc: Fake syslogd process masquerade
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: /usr/sbin/syslogd\s+-[nms]
  - id: fake-crond
    desc: Fake crond process masquerade
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: /usr/sbin/cron[d]?\s+-[fn]
  - id: fake-sshd
    desc: Fake sshd process masquerade
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: /usr/sbin/sshd\s+-[Dd]
  - id: hald-pidfile
    desc: HAL daemon PID file path
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: /var/run/hald-
  - id: suspicious-pidfile
    desc: Suspicious PID file location
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: /var/run/[a-z]+-[a-z]+\.pid$
  - id: daemon-paths-a
    desc: System daemon path group A
    crit: component
    conf: 0.9
    if:
      type: text
      regex: /usr/sbin/(auditd|cron[d]?|acpid)
  - id: daemon-paths-b
    desc: System daemon path group B
    crit: component
    conf: 0.9
    if:
      type: text
      regex: /usr/sbin/(atd|sshd|rsyslogd)
  - id: daemon-paths-c
    desc: System daemon path group C
    crit: component
    conf: 0.9
    if:
      type: text
      regex: /usr/sbin/(syslogd|smartd)
  - id: auditd-path
    desc: auditd daemon path reference
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: /usr/sbin/auditd
  - id: acpid-path
    desc: acpid daemon path reference
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: /usr/sbin/acpid
  - id: prctl-symbol
    desc: prctl system call symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: prctl
    unless:
      - type: basename
        exact: chrome-sandbox
      - type: basename
        exact: python3
      - type: basename
        exact: tabby
composite_rules:
  - id: daemon-paths
    desc: Multiple system daemon paths
    crit: component
    conf: 0.9
    any:
      - id: daemon-paths-a
      - id: daemon-paths-b
      - id: daemon-paths-c
  - id: daemon-masquerade
    desc: Process masquerading as system daemon
    crit: hostile
    conf: 0.92
    all:
      - id: prctl-symbol
      - id: micro-behaviors/process/daemonize/background::daemon
    any:
      - id: fake-smartd
      - id: fake-syslogd
      - id: fake-crond
      - id: fake-sshd
      - id: hald-pidfile
  - id: masquerade-backdoor
    desc: Backdoor with daemon masquerading
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/socket/create/
      - id: micro-behaviors/process/create/shell/invoke::shell-symbols
    any:
      - id: fake-smartd
      - id: fake-syslogd
      - id: hald-pidfile
      - id: daemon-paths
  - id: multi-daemon-backdoor
    desc: Backdoor with daemon path masquerading
    crit: hostile
    conf: 0.95
    all:
      - id: daemon-paths
      - id: micro-behaviors/communications/socket/create/
      - id: micro-behaviors/process/daemonize/background::daemon
