defaults:
  platforms: [linux]
  for: [elf, go]
traits:
  - id: system-helper-service-path
    desc: References fake system-helper.service path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /etc/systemd/system/system-helper.service

composite_rules:
  - id: masqueraded-staged-c2-service
    desc: Masqueraded service with staged C2 configuration
    crit: hostile
    conf: 0.99
    attack: T1036.004
    all:
      - id: system-helper-service-path
      - id: objectives/command-and-control/infrastructure/config::go-linker-staged-c2-config
