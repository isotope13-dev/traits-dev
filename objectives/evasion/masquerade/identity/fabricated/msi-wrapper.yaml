defaults:
  platforms: [windows]
  attack: T1036.005

composite_rules:
  - id: msi-embedded-autoit-internet-explorer-masquerade
    desc: MSI impersonates Microsoft Internet Explorer
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/exec::autoit-a3x-command
      - id: metadata/binary/installer/database::internet-explorer-wrapper-title
      - id: metadata/binary/installer/database::msi-wrapper-microsoft-author
      - id: metadata/binary/installer/database::msi-wrapper-application
