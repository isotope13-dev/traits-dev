defaults:
  platforms: [windows]
  attack: T1036.005

composite_rules:
  - id: msi-embedded-autoit-internet-explorer-masquerade
    desc: MSI masquerades an AutoIt payload as Internet Explorer
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/file/profile/identity::msi-wrapper-internet-explorer-title
      - id: metadata/file/profile/identity::iexpress-autoit-stage
      - id: metadata/file/profile/identity::iexpress-wextract-manifest
      - id: metadata/file/profile/identity::msi-wrapper-microsoft-author
