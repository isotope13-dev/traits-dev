defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1036.005

composite_rules:
  - id: internet-explorer-msi-autoit-masquerade
    desc: MSI carrying an AutoIt dropper claims Internet Explorer and Microsoft identity
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/database::internet-explorer-wrapper-title
      - id: metadata/binary/installer/database::msi-wrapper-microsoft-author
      - id: objectives/command-and-control/dropper/execution/self-extract::msi-embedded-iexpress-autoit-dropper
