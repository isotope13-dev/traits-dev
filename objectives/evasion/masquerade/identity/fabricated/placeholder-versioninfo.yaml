defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036

traits:
  - id: pe-company-name-single-char
    desc: PE CompanyName is single-character placeholder
    crit: component
    conf: 0.95
    if:
      type: kv
      path: pe.version_info.company_name
      regex: '^.$'

  - id: pe-file-description-single-char
    desc: PE FileDescription is single-character placeholder
    crit: component
    conf: 0.95
    if:
      type: kv
      path: pe.version_info.file_description
      regex: '^.$'

composite_rules:
  - id: pe-versioninfo-single-char-placeholders
    desc: PE VERSIONINFO single-character placeholders
    crit: suspicious
    conf: 0.95
    size_min: 32768
    all:
      - id: pe-company-name-single-char
      - id: pe-file-description-single-char
    unless:
      - id: metadata/signed/platform::microsoft
