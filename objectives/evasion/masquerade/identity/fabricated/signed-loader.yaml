defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.005

composite_rules:
  - id: signed-system-masquerade-injection-loader
    desc: Microsoft-signed system masquerade with injection markers
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/persistence/login/registry/run-key::masquerade-system-update
      - id: metadata/signed/leaf::microsoft-corporation
      - id: objectives/evasion/process/injection/memory::geta-oep-helper-marker
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
