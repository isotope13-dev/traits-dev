defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
traits:
- id: generic-install-driver-filename
  desc: Generic InstallDriver original filename
  crit: component
  conf: 0.9
  if:
    type: value
    path: pe.version.original_filename
    regex: (?i)^InstallDriver\.EXE$
- id: generic-install-driver-product
  desc: Generic InstallDriver product metadata
  crit: component
  conf: 0.88
  if:
    type: value
    path: pe.version.product_name
    regex: (?i)^InstallDriver (Application|MFC Application)$
composite_rules:
- id: generic-install-driver-identity
  desc: Generic unvendored InstallDriver identity
  crit: component
  conf: 0.9
  all:
  - id: generic-install-driver-filename
  - id: generic-install-driver-product
  - id: metadata/binary/anomaly/format::version-info-company-name-absent
- id: unvendored-dotnet-driver-resource-loader
  desc: Unvendored InstallDriver .NET resource loader
  crit: suspicious
  conf: 0.96
  all:
  - id: generic-install-driver-identity
  - id: metadata/binary/framework::dotnet-metadata
  - id: micro-behaviors/data/embedded/payload/resource::dotnet-resource-data-access
  unless:
  - id: well-known/app/drivers::microsoft-dpinst-driver-installer
  - id: metadata/signed/trust-level::signer-evidence-present
  - id: metadata/package/versioning::pe-companyname-field
- id: unvendored-dotnet-self-resource-stager
  desc: Unvendored .NET self-resource stager
  crit: hostile
  conf: 0.94
  all:
  - id: unvendored-dotnet-driver-resource-loader
  - id: objectives/anti-analysis/self-modify/runtime::dotnet-getexecutingassembly-token
  - id: micro-behaviors/data/embedded/payload/resource::dotnet-resource-data-access
  any:
  - id: micro-behaviors/data/db/linq::linq-queries
  needs: 1
  unless:
  - id: well-known/app/drivers::microsoft-dpinst-driver-installer
  - id: metadata/signed/trust-level::signer-evidence-present
  - id: metadata/package/versioning::pe-companyname-field
