defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: integrated-office-string
    desc: 'MS Office Click-to-Run IntegratedOffice string'
    crit: component
    if:
      type: text
      substr: Microsoft Office Click-to-Run IntegratedOfficeEx
composite_rules:
  - id: integrated-office-masquerade
    desc: Microsoft Office Click-to-Run IntegratedOfficeExe masquerade
    crit: suspicious
    conf: 0.95
    all:
      - id: integrated-office-string
    unless:
      - id: metadata/signed/platform::microsoft-code-signing-pca-2011
