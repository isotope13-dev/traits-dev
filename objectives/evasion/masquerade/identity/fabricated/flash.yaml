defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1036.005

traits:
- id: flashplayer-product-subject
  desc: MSI claims Flash Player product identity
  crit: component
  conf: 0.96
  if:
    type: value
    path: office.subject
    regex: '(?i)^flashplayer'
composite_rules:
- id: flashplayer-msi-anti-analysis-masquerade
  desc: Flash-branded MSI combines masquerading, anti-analysis, and security discovery
  crit: hostile
  conf: 0.99
  attack: T1036.005,T1622,T1518.001
  all:
  - id: flashplayer-product-subject
  - id: metadata/binary/installer/database::msi-installer-database-title
  - id: metadata/document/ole::ole-high-entropy
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: objectives/discovery/host/security::pe-wmi-av-enumeration
