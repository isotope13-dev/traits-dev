# A .NET assembly claiming the Windows Error Reporting identity is not the
# native, Microsoft-signed WerFault implementation. Keep the identity atoms
# separate so other loader composites can reuse them.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.005

traits:
  - id: werfaultstub-original-filename-claim
    desc: VERSIONINFO original filename WerfaultStub.exe
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.version.original_filename
      exact: WerfaultStub.exe
  - id: werfaultstub-internal-name-claim
    desc: VERSIONINFO internal name WerfaultStub
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.version.internal_name
      exact: WerfaultStub.exe
  - id: com-surrogate-description-claim
    desc: VERSIONINFO claims the COM Surrogate description
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.description
      exact: COM Surrogate

composite_rules:
  - id: dotnet-werfault-identity-masquerade
    desc: Self-issued .NET assembly masquerading as WerfaultStub
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
      - id: werfaultstub-original-filename-claim
      - id: werfaultstub-internal-name-claim
      - id: com-surrogate-description-claim
