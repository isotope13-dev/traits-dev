defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004
traits:
  - id: defender-exe-path-string
    desc: Embedded "Windows Defender.exe" file-path literal
    crit: component
    conf: 0.96
    if:
      type: text
      exact: 'Windows Defender.exe'
  - id: defender-runkey-value-string
    desc: Embedded "Windows Defender" Run-key value literal
    crit: component
    conf: 0.92
    if:
      type: text
      exact: 'Windows Defender'

composite_rules:
  - id: defender-masquerade-system32-install
    desc: Self-install as Windows Defender in System32
    crit: hostile
    conf: 0.95
    all:
      - id: defender-exe-path-string
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/fs/path/check::get-module-filename
    any:
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
      - id: defender-runkey-value-string
      - id: objectives/persistence/login/registry/autostart::run-key
    unless:
      - id: metadata/signed/platform::microsoft
      - id: well-known/app/defender::is-defender-named
