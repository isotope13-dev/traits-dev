defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004
traits:
  - id: defender-exe-path-string
    desc: "Embedded \"Win Defender.exe\" file-path"
    crit: component
    conf: 0.96
    if:
      type: text
      exact: 'Windows Defender.exe'
  - id: defender-runkey-value-string
    desc: "Embedded \"Win Defender\" Run-key value"
    crit: component
    conf: 0.92
    if:
      type: text
      exact: 'Windows Defender'
  - id: defender-like-payload-filename
    desc: Windows Defender-like payload filename
    crit: suspicious
    conf: 0.94
    for: [scripts, typescript, csharp]
    if:
      type: literal
      kind: string
      regex: '(?i)^windows defender( [a-z0-9_.-]{1,40})?\.exe$'

composite_rules:
  - id: defender-masquerade-system32-install
    desc: Self-install as Windows Defender in System32
    crit: hostile
    conf: 0.95
    all:
      - id: defender-exe-path-string
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/fs/path/check::get-module-filename
    any:
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
      - id: defender-runkey-value-string
      - id: objectives/persistence/login/registry/autostart::run-key
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/defender/
  - id: defender-masquerade-payload-dropper
    desc: Defender-named payload downloaded and launched
    crit: hostile
    conf: 0.97
    for: [javascript, typescript]
    near_bytes: 8192
    all:
      - id: defender-like-payload-filename
      - id: objectives/command-and-control/dropper/node-bootstrap::download-file
    any:
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: objectives/command-and-control/dropper/execution/persistence::persistent-native-payload-dropper
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
