defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.005
  mbc: F0004
traits:
  - id: microsoft-wps-office-product
    desc: Microsoft WPS Office product identity
    crit: component
    conf: 0.96
    if:
      type: value
      path: pe.version.product_name
      exact: Microsoft WPS Office
  - id: microsoft-office-software-company
    desc: Microsoft Office Software company identity
    crit: component
    conf: 0.96
    if:
      type: value
      path: pe.version.company
      exact: Microsoft Office Software Co.,Ltd
  - id: kwps-dwgq-versioninfo
    desc: KWPS DWGQ version resource identity
    crit: component
    conf: 0.94
    if:
      type: value
      path: pe.version
      regex: 'kwpswn dwgQ|kwpswndwg\.dwgQ|WPS DWQ'
  - id: app-runtime-bootstrap-symbols
    desc: App Runtime Bootstrap symbol namespace
    crit: component
    conf: 0.94
    if:
      type: symbol
      regex: 'Microsoft\.WindowsAppRuntime\.Bootstrap\.dll_'
composite_rules:
  - id: unsigned-microsoft-wps-office-identity
    desc: Unsigned binary with fabricated Microsoft WPS identity
    crit: suspicious
    conf: 0.96
    all:
      - id: microsoft-wps-office-product
      - id: microsoft-office-software-company
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: kwps-dwgq-versioninfo
      - id: app-runtime-bootstrap-symbols
      - id: objectives/persistence/login/registry/autostart::programdata-run-key-command
    unless:
      - id: metadata/signed/platform/
