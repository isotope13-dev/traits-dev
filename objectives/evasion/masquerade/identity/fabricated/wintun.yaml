defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.005

traits:
  - id: wintun-service-security-export
    desc: Wintun PE exports service helper
    crit: notable
    conf: 0.97
    if:
      type: symbol
      exact: ServiceSecurity

  - id: wintun-ui-render-export
    desc: Wintun PE exports UI renderer
    crit: notable
    conf: 0.97
    if:
      type: symbol
      regex: '(?i)^Render.*(Graphics|Button|Gauge)$'

  - id: wintun-audio-export
    desc: Wintun PE exports audio helper
    crit: notable
    conf: 0.97
    if:
      type: symbol
      regex: '(?i)^(CaptureAudioSamples|PlayWaveMemory)$'

composite_rules:
  - id: wintun-unrelated-ui-helper-export
    desc: Unrelated helper export in Wintun PE
    crit: notable
    conf: 0.97
    any:
      - id: wintun-service-security-export
      - id: wintun-ui-render-export
      - id: wintun-audio-export

  - id: fabricated-wintun-ui-helper
    desc: PE fabricates Wintun identity around UI/audio loader code
    crit: hostile
    conf: 0.99
    attack: T1036.005,T1027.009,T1620
    all:
      - id: well-known/lib/wintun::wintun-wireguard-company
      - id: wintun-unrelated-ui-helper-export
      - id: metadata/binary/metrics/structural::embedded-pe-three-plus
      - id: micro-behaviors/mem/protect/modify::virtual-memory-allocation-protection-api-pair
    unless:
      - id: metadata/signed/platform/
