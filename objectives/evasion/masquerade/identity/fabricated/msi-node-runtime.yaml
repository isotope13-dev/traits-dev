defaults:
  platforms: [windows]
  for: [all]
  attack: T1036.005

composite_rules:
  - id: fabricated-node-runtime-foundation-msi
    desc: WiX MSI fabricates Node Runtime Foundation identity
    crit: hostile
    conf: 0.99
    attack: T1036.005,T1195.002
    all:
      - id: metadata/package/files/msi::node-runtime-subject
      - id: metadata/package/files/msi::nodejs-foundation-creator
      - id: metadata/package/files/msi::node-runtime-description
      - id: metadata/package/files/msi::wix-toolset-application
