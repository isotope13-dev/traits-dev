defaults:
  attack: T1036.005
  for:
  - pe
  platforms:
  - windows
traits:
- id: autoit-setup-description
  desc: AutoIt setup version resource
  crit: suspicious
  conf: 0.96
  if:
    type: text
    exact: AutoIt v3 Setup
- id: nsis-exehead-description
  desc: NSIS exehead manifest identity
  crit: suspicious
  conf: 0.95
  if:
    type: text
    exact: Nullsoft.NSIS.exehead
composite_rules:
- id: autoit-branded-nsis-wrapper
  desc: NSIS wrapper spoofing AutoIt setup
  crit: suspicious
  conf: 0.98
  all:
  - id: autoit-setup-description
  - id: metadata/binary/installer/script::nsis
  any:
  - id: nsis-exehead-description
  - id: metadata/binary/layout::overlay-over-90pct
  - id: metadata/binary/layout::multiple-pe-embedded
  unless:
  - id: metadata/lang/compiled::autoit-compiled-script
