defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005,T1027.009

composite_rules:
  - id: microsoft-signed-nsis-opaque-overlay
    desc: Tampered Microsoft-signed NSIS overlay wrapper
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/signed/leaf::microsoft-corporation
      - id: metadata/signed/certificate/identity::pe-signature-digest-mismatch
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/layout::high-entropy-overlay
      - id: micro-behaviors/data/archive/extension::archive-extension-reference
    unless:
      - id: metadata/binary/installer/family::known-benign-installer
