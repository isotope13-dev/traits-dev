defaults:
  attack: T1036
  for:
  - pe
  platforms:
  - windows
traits:
- id: vtk-output-window-process
  desc: VTK output window process string
  crit: component
  conf: 0.95
  if:
    type: text
    exact: vtkOutputWindowProcess
- id: vtk-rtti-array-cluster
  desc: Dense VTK RTTI array strings
  crit: component
  conf: 0.97
  count_min: 20
  if:
    type: text
    regex: vtk(TypedDataArray|DataArrayTemplate|SparseArray|DenseArray)
composite_rules:
- id: small-vtk-camouflage-pe
  desc: Small PE with dense VTK decoy strings
  crit: suspicious
  conf: 0.97
  size_max: 100000
  all:
  - id: vtk-output-window-process
  - id: vtk-rtti-array-cluster
  - id: metadata/binary/metrics/structural::no-imports
  - id: metadata/binary/layout::many-readable-strings
  any:
  - id: metadata/binary/resource::small-pe-no-resources
  - id: metadata/signed/trust-level::unsigned-pe-executable
  - id: metadata/binary/resource::rich-header-present
  - id: objectives/anti-static/obfuscation/binary-structure::int3-padding-text
  needs: 2
  unless:
  - id: metadata/signed/platform/
