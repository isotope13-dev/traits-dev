# Fabricated Windows security-product identity combined with a staged payload.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.005
  mbc: B0039

traits:
  - id: security-product-defender-identity
    desc: PE product name claims Defender identity
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.version.product_name
      regex: '(?i)\bdefender\b'
  - id: security-product-antivirus-identity
    desc: PE product name claims antivirus identity
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.version.product_name
      regex: '(?i)\bantivirus\b'
  - id: security-product-security-identity
    desc: PE product name claims security identity
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.version.product_name
      regex: '(?i)\bsecurity\b'
  - id: security-product-guard-identity
    desc: PE product name claims guard identity
    crit: notable
    conf: 0.96
    if:
      type: value
      path: pe.version.product_name
      regex: '(?i)\bguard\b'
  - id: windows-security-product-claim
    desc: Windows security-product claim
    crit: notable
    conf: 0.9
    if:
      type: text
      # The claim is a product *name* -- "Microsoft Defender", "Microsoft
      # Security Essentials", "Microsoft Windows Firewall". Barring `:/"<>` from
      # the gap keeps the match inside one name instead of letting it run across
      # URI and XML boundaries: a plain `.{0,40}` matched
      # `microsoft-com:asm.v3"><security` in the stock application manifest
      # (`urn:schemas-microsoft-com:asm.v3"><security>`), which every Windows PE
      # declaring trustInfo carries. The gap still admits a separator such as
      # `Microsoft(R) Defender`.
      regex: 'Microsoft[^"<>:/]{0,40}(Firewall|Defender|Security)'
      case_insensitive: true
    unless:
      - id: well-known/app/telegram::telegram-desktop-signed-client-context

composite_rules:
  - id: security-product-version-identity
    desc: PE product name claims security-product identity
    crit: notable
    conf: 0.96
    any:
      - id: security-product-defender-identity
      - id: security-product-antivirus-identity
      - id: security-product-security-identity
      - id: security-product-guard-identity
  - id: security-identity-opaque-anti-analysis-loader
    desc: Security-product identity masks opaque anti-analysis loader
    crit: hostile
    conf: 0.99
    attack: T1036.005,T1027,T1622
    all:
      - id: security-product-version-identity
      - id: metadata/binary/section/metrics::high-entropy-rdata-section
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
      - id: metadata/binary/layout::pe-multiple-tls-callbacks
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/app/
  - id: fabricated-security-product-overlay-stager
    desc: Fabricated Windows security-product identity on a packed multi-PE stager
    crit: hostile
    conf: 0.98
    all:
      - id: windows-security-product-claim
      - id: metadata/binary/metrics/structural::embedded-pe-three-plus
      - id: metadata/binary/layout::overlay-over-90pct
      - id: objectives/anti-static/pack/detect::aspack-marker
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
