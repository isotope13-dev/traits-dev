# Fabricated Windows security-product identity combined with a staged payload.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.005
  mbc: B0039

traits:
  - id: windows-security-product-claim
    desc: Windows security-product claim
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Microsoft.{0,40}(Firewall|Defender|Security)'
      case_insensitive: true

composite_rules:
  - id: fabricated-security-product-overlay-stager
    desc: Fabricated Windows security-product identity on a packed multi-PE stager
    crit: hostile
    conf: 0.98
    all:
      - id: windows-security-product-claim
      - id: metadata/binary/metrics/structural::embedded-pe-three-plus
      - id: metadata/binary/layout::overlay-over-90pct
      - id: objectives/anti-static/pack/detect::aspack-marker
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
