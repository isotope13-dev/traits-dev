defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1036.005
  conf: 0.93

traits:
  - id: visual-cpp-redistributable-product
    desc: MSI claims Visual C++ Redistributable
    crit: component
    if:
      type: raw
      substr: Visual C++ RedistributableProductName

  - id: kingston-technology-manufacturer
    desc: MSI claims Kingston manufacturer
    crit: component
    if:
      type: raw
      substr: Kingston TechnologyManufacturer

  - id: nvidia-usb-controller-product
    desc: MSI claims NVIDIA USB controller
    crit: component
    if:
      type: raw
      substr: USB Controller PackageProductName

  - id: nvidia-corporation-manufacturer
    desc: MSI claims NVIDIA manufacturer
    crit: component
    if:
      type: raw
      substr: NVIDIA CorporationManufacturer

  - id: googleapi-installer-title
    desc: MSI claims GoogleAPI installer identity
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: GoogleAPI Windows Installer

  - id: googleapi-company-author
    desc: MSI claims GoogleAPI company author
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: GoogleAPI Company

  - id: googleapi-launcher-payload
    desc: Embedded GoogleAPI launcher identity
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: GoogleAPI Launcher

composite_rules:
  - id: visual-cpp-kingston-msi-masquerade
    desc: Visual C++ MSI claims Kingston identity
    crit: suspicious
    conf: 0.98
    all:
      - id: visual-cpp-redistributable-product
      - id: kingston-technology-manufacturer
    any:
      - id: metadata/binary/installer/database::python-msi-library
      - id: metadata/binary/installer/database::msi-anti-tamper
    needs: 1

  - id: nvidia-usb-python-msi-masquerade
    desc: Python MSI claims NVIDIA USB identity
    crit: suspicious
    conf: 0.98
    all:
      - id: nvidia-usb-controller-product
      - id: nvidia-corporation-manufacturer
      - id: metadata/binary/installer/database::python-msi-library
      - id: objectives/command-and-control/dropper/execution/installer::msi-generated-ca-dll

  - id: googleapi-xiamen-msi-masquerade
    desc: MSI claims GoogleAPI but uses Xiamen signer
    crit: suspicious
    conf: 0.98
    all:
      - id: googleapi-installer-title
      - id: googleapi-company-author
      - id: googleapi-launcher-payload
      - id: objectives/evasion/masquerade/cert::xiamen-yamanganese-network
