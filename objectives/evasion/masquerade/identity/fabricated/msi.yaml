defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1036.005
  conf: 0.93

traits:
- id: internet-explorer-pe-product-claim
  desc: PE version resource claims Internet Explorer
  crit: component
  conf: 0.95
  for: [pe]
  if:
    type: text
    substr: Internet Explorer
    section: .rsrc

- id: visual-cpp-redistributable-product
  desc: MSI claims Visual C++ Redistributable
  crit: component
  if:
    type: text
    substr: Visual C++ RedistributableProductName

- id: kingston-technology-manufacturer
  desc: MSI claims Kingston manufacturer
  crit: component
  if:
    type: text
    substr: Kingston TechnologyManufacturer

- id: nvidia-usb-controller-product
  desc: MSI claims NVIDIA USB controller
  crit: component
  if:
    type: text
    substr: USB Controller PackageProductName

- id: nvidia-corporation-manufacturer
  desc: MSI claims NVIDIA manufacturer
  crit: component
  if:
    type: text
    substr: NVIDIA CorporationManufacturer

- id: googleapi-installer-title
  desc: MSI claims GoogleAPI installer identity
  crit: component
  conf: 0.92
  if:
    type: text
    substr: GoogleAPI Windows Installer

- id: googleapi-company-author
  desc: MSI claims GoogleAPI company author
  crit: component
  conf: 0.9
  if:
    type: text
    substr: GoogleAPI Company

- id: googleapi-launcher-payload
  desc: Embedded GoogleAPI launcher identity
  crit: component
  conf: 0.92
  if:
    type: text
    substr: GoogleAPI Launcher

- id: input-method-editor-product
  desc: MSI claims Input Method Editor
  crit: component
  conf: 0.9
  if:
      type: text
      substr: Input Method Editor
- id: google-msi-product-claim
  desc: MSI claims Google identity
  crit: component
  conf: 0.96
  for: [oledoc]
  if:
    type: value
    path: office.application
    regex: '(?i)^google( llc)?$'

- id: msi-ui-broker-product
  desc: MSI UI broker product claim
  crit: suspicious
  conf: 0.98
  for: [oledoc]
  if:
    type: text
    substr: SMTC UI Broker

- id: msi-toastui-payload
  desc: MSI carries ToastUI security payload
  crit: suspicious
  conf: 0.99
  for: [oledoc]
  if:
    type: text
    substr: ToastUI.exe

- id: msi-altova-author
  desc: MSI author field claims Altova
  crit: suspicious
  conf: 0.96
  for: [oledoc]
  if:
    type: text
    substr: Altova
composite_rules:
- id: microsoft-vcredist-fabricated-ole-identity
  desc: Visual C++ MSI carries fabricated OLE metadata
  crit: hostile
  conf: 0.98
  attack: T1036.005,T1027
  for: [all]
  all:
  - id: metadata/package/files/msi::ole2-installer-kind
  - id: metadata/package/files/msi::microsoft-vcredist-subject
  - id: metadata/package/files/msi::wix-toolset-application
  - id: metadata/package/files/msi::ole-security-flag

- id: msi-memu-fabricated-identity-launch
  desc: MSI launches MEmu runtime under a fabricated identity
  crit: hostile
  conf: 0.99
  all:
  - id: objectives/supply-chain/trojanized/app/package::msi-memu-runtime-under-unrelated-identity
  - id: metadata/file/profile/identity::msi-launchfile-custom-action

- id: msi-microsoft-runtime-target-masquerade
  desc: MSI masquerades as Microsoft runtime
  crit: hostile
  conf: 0.98
  attack: T1036.005,T1195.002
  for: [oledoc]
  all:
  - id: metadata/package/files/msi::ole2-installer-kind
  - id: metadata/binary/installer/database::msi-microsoft-runtime-file-target-pair
  - id: metadata/package/files/msi::msi-wix-toolset-branding

- id: internet-explorer-iexpress-autoit-masquerade
  desc: IExpress AutoIt payload masquerades as Internet Explorer
  crit: hostile
  conf: 0.99
  for: [pe]
  all:
  - id: internet-explorer-pe-product-claim
  - id: objectives/command-and-control/dropper/execution/self-extract::iexpress-encrypted-autoit-dropper
- id: visual-cpp-kingston-msi-masquerade
  desc: Visual C++ MSI claims Kingston identity
  crit: suspicious
  conf: 0.98
  all:
  - id: visual-cpp-redistributable-product
  - id: kingston-technology-manufacturer
  any:
  - id: metadata/binary/installer/database::python-msi-library
  - id: metadata/binary/installer/database::msi-anti-tamper
- id: nvidia-usb-python-msi-masquerade
  desc: Python MSI claims NVIDIA USB identity
  crit: suspicious
  conf: 0.98
  all:
  - id: nvidia-usb-controller-product
  - id: nvidia-corporation-manufacturer
  - id: metadata/binary/installer/database::python-msi-library
  - id: objectives/command-and-control/dropper/execution/installer::msi-generated-ca-dll

- id: googleapi-xiamen-msi-masquerade
  desc: MSI claims GoogleAPI but uses Xiamen signer
  crit: suspicious
  conf: 0.98
  all:
  - id: googleapi-installer-title
  - id: googleapi-company-author
  - id: googleapi-launcher-payload
  - id: objectives/evasion/masquerade/cert::xiamen-yamanganese-network

- id: microsoft-ime-python-msi-masquerade
  desc: Python MSI claims Microsoft IME identity
  crit: suspicious
  conf: 0.98
  all:
  - id: input-method-editor-product
  - id: metadata/binary/vendor::microsoft-corporation-author-string
  - id: metadata/binary/installer/database::python-msi-library
  - id: objectives/command-and-control/dropper/execution/installer::msi-generated-ca-dll
- id: google-branded-caphyon-embedded-msi
  desc: Google-branded MSI signed by Caphyon bundles an anti-analysis native loader
  crit: hostile
  conf: 0.99
  attack: T1036.005,T1622,T1055
  for: [all]
  scope: outer
  all:
  - id: metadata/signed/leaf::caphyon-srl
  - id: objectives/anti-analysis/debugger-detect/check::msi-embedded-anti-analysis-loader
  any:
  - id: metadata/package/files/msi::google-msi-author
  - id: google-msi-product-claim

- id: msi-security-ui-broker-masquerade
  desc: MSI masquerades as a UI broker payload
  crit: hostile
  conf: 0.995
  attack: T1036.005,T1195.002
  for: [oledoc]
  all:
  - id: msi-ui-broker-product
  - id: msi-toastui-payload
  - id: msi-altova-author
