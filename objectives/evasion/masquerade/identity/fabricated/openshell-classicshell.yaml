defaults:
  attack: T1036
  for: [pe]
  platforms: [windows]

traits:
  - id: openshell-menu-manifest-identity
    desc: Open-Shell Menu manifest identity
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.manifest.assembly_identity.name
      exact: Open-Shell.Menu
  - id: openshell-registry-path
    desc: Open-Shell registry path string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: 'SOFTWARE\OpenShell\OpenShell'
  - id: classicshell-registry-path
    desc: ClassicShell registry path string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: 'SOFTWARE\IvoSoft\ClassicShell'
  - id: openshell-setuphelper-pdb-path
    desc: Open-Shell SetupHelper project path
    crit: component
    conf: 0.99
    if:
      type: text
      exact: 'C:\projects\open-shell-menu\Src\Setup\SetupHelper\Release\SetupHelper.pdb'
  - id: openshell-startmenu-exe-name
    desc: Open-Shell StartMenu binary name
    crit: component
    conf: 0.97
    if:
      type: text
      exact: StartMenu.exe
  - id: classicshell-startmenu-exe-name
    desc: ClassicShell StartMenu binary name
    crit: component
    conf: 0.97
    if:
      type: text
      exact: ClassicStartMenu.exe
  - id: openshell-ownerwindow-class
    desc: Open-Shell owner window class
    crit: component
    conf: 0.97
    if:
      type: text
      exact: OpenShellUpdate.COwnerWindow
  - id: classicshell-ownerwindow-class
    desc: ClassicShell owner window class
    crit: component
    conf: 0.97
    if:
      type: text
      exact: ClassicShellUpdate.COwnerWindow

composite_rules:
  - id: openshell-startmenu-binary-pair
    desc: Open-Shell start menu binary names
    crit: component
    conf: 0.97
    all:
      - id: openshell-startmenu-exe-name
      - id: classicshell-startmenu-exe-name

  - id: openshell-ownerwindow-pair
    desc: Open-Shell owner window class pair
    crit: component
    conf: 0.97
    all:
      - id: openshell-ownerwindow-class
      - id: classicshell-ownerwindow-class

  - id: openshell-classicshell-brand-cluster
    desc: Open-Shell ClassicShell branding cluster
    crit: notable
    conf: 0.98
    all:
      - id: openshell-menu-manifest-identity
    any:
      - id: openshell-registry-path
      - id: classicshell-registry-path
      - id: openshell-ownerwindow-pair
      - id: openshell-startmenu-binary-pair
      - id: openshell-setuphelper-pdb-path
    needs: 3

  - id: trojanized-openshell-setup-helper
    desc: Trojanized Open-Shell Setup Helper identity
    crit: suspicious
    conf: 0.97
    all:
      - id: openshell-classicshell-brand-cluster
    any:
      - id: metadata/binary/metrics/structural::no-imports
      - id: metadata/binary/metrics/structural::malformed-pe-structure
      - id: metadata/binary/anomaly/format::pe-resource-dir-overrun
      - id: metadata/binary/anomaly/format::pe-import-dir-outside-section
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
