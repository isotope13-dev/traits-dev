defaults:
  attack: T1036
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: laomaotao-domain
    desc: LaoMaoTao website string
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: www.laomaotao.net
  - id: laomaotao-brand
    desc: LaoMaoTao brand metadata string
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: LaoMaoTao.Net
  - id: laomaotao-iso-form
    desc: LaoMaoTao ISO form class
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: TMAKEISOFILE
  - id: laomaotao-usbboot-form
    desc: LaoMaoTao USB boot form class
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: TUSBBOOT
composite_rules:
  - id: laomaotao-boot-tool-masquerade
    desc: LaoMaoTao boot tool identity masquerade
    crit: suspicious
    conf: 0.97
    all:
      - id: laomaotao-domain
    any:
      - id: laomaotao-brand
      - id: laomaotao-iso-form
      - id: laomaotao-usbboot-form
    needs: 2
