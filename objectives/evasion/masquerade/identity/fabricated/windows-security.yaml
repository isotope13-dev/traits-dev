defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004

traits:
  - id: security-health-manifest-identity
    desc: SecurityHealth manifest identity
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'name="SecurityHealth"'

composite_rules:
  - id: unsigned-security-health-manifest-masquerade
    desc: Unsigned PE claims SecurityHealth identity
    crit: suspicious
    conf: 0.95
    all:
      - id: security-health-manifest-identity
      - id: metadata/signed/trust-level::unsigned-missing-signature-record
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity/
  - id: unsigned-security-health-dispatch-loader
    desc: Unsigned SecurityHealth obfuscated loader
    crit: hostile
    conf: 0.97
    attack: "T1036.005,T1027,T1620"
    all:
      - id: unsigned-security-health-manifest-masquerade
      - id: objectives/anti-static/obfuscation/control-flow/dispatch::indexed-function-table-call-x64
      - id: micro-behaviors/mem/protect/modify::virtual-protect
