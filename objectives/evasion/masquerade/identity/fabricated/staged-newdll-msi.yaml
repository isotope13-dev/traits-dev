# Staged architecture-suffixed payload DLL names (NewDll_x64.dll etc.) inside
# a packed installer. Benign installers use product-branded filenames; malware
# MSI cabinets frequently stage generic NewDll_* payloads next to ISAPI entry
# points behind an empty-.text / high-entropy overlay.
defaults:
  platforms: [windows]
  for: [pe, dll, oledoc, ole]
  attack: T1036.005
  conf: 0.93

traits:
  - id: arch-suffixed-newdll-payload
    desc: Staged NewDll architecture-suffixed payload name
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: 'NewDll_(x64|x86|arm64)\.dll'

composite_rules:
  - id: packed-staged-newdll-installer
    desc: Packed installer stages architecture-suffixed NewDll payload
    crit: hostile
    conf: 0.96
    attack: T1036.005,T1027
    all:
      - id: arch-suffixed-newdll-payload
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::embedded-cipher-payload
      - id: objectives/anti-static/obfuscation/payload/section::empty-code-high-entropy-overlay
      - id: metadata/binary/layout::high-entropy-overlay
    needs: 2
