defaults:
  platforms: [windows]
  for: [oledoc]

composite_rules:
  - id: adobe-msi-repackages-dotnet-runtime
    desc: Adobe-branded MSI repackages Microsoft runtime files
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/installer/runtime::msi-runtime-file-table-pair
      - id: metadata/binary/installer/runtime::msi-adobe-acrobat-branding
      - id: metadata/binary/installer/runtime::msi-wix-toolset-branding
