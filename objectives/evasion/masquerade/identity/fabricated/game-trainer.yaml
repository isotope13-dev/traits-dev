# Game trainer masquerade detection.
# Legitimate game trainers are simple memory-patching utilities.
# An unsigned PE claiming to be a game trainer but exhibiting
# C2, crypto, and loader behavior is a fabricated identity.
# ATT&CK: T1036.005 (Masquerading: Match Legitimate Name or Location)
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: B0039
traits:
  - id: capcom-company-name
    desc: CAPCOM company name in version info
    crit: component
    conf: 0.9
    if:
      type: kv
      path: pe.version_info.company_name
      substr: "CAPCOM"
  - id: trainer-product-name
    desc: Game trainer product name in version info
    crit: component
    conf: 0.85
    if:
      type: kv
      path: pe.version_info.product_name
      regex: "(?i)trainer"
  - id: resident-evil-product
    desc: Resident Evil product reference in version info
    crit: component
    conf: 0.9
    if:
      type: kv
      path: pe.version_info.product_name
      regex: "(?i)resident.evil"
  - id: trainer-file-description
    desc: Game trainer file description in version info
    crit: component
    conf: 0.85
    if:
      type: kv
      path: pe.version_info.file_description
      regex: "(?i)trainer"
  - id: trainer-message-box
    desc: Game trainer message box text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "(?i)trainer.{0,40}(already running|admin required)"
composite_rules:
  - id: game-trainer-fabricated-identity
    desc: Unsigned PE masquerading as game trainer with loader behavior
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/signed::unsigned
    any:
      - id: capcom-company-name
      - id: trainer-product-name
      - id: resident-evil-product
      - id: trainer-file-description
      - id: trainer-message-box
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
  - id: game-trainer-malicious-loader
    desc: Game trainer masquerade with in-memory loader and C2
    crit: hostile
    conf: 0.97
    all:
      - id: game-trainer-fabricated-identity
      - id: metadata/signed::unsigned
    any:
      - id: objectives/command-and-control/backdoor/reflective-load::in-memory-pe-loader-with-decryption
      - id: micro-behaviors/communications/http/client::winhttp-request-flow
      - id: micro-behaviors/crypto/symmetric/aes::bcrypt-aes-cbc
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
