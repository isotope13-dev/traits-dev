defaults:
  attack: T1036.005
  platforms: [windows]
  for: [pe]
traits:
  - id: swifttunnel-fpsbooster-manifest
    desc: SwiftTunnel FPSBooster manifest identity
    crit: component
    conf: 0.98
    if:
      type: text
      substr: SwiftTunnel.FPSBooster
      section: .rsrc
composite_rules:
  - id: swifttunnel-fpsbooster-driver-masquerade
    desc: FPSBooster identity wraps driver installer
    crit: suspicious
    conf: 0.98
    all:
      - id: swifttunnel-fpsbooster-manifest
      - id: objectives/persistence/system/service/install::winpkfilter-silent-driver-msi-install
    any:
      - id: metadata/binary/debug::pdb-driver-installer-basename
      - id: metadata/lang/compiler/systems::rust-binary
