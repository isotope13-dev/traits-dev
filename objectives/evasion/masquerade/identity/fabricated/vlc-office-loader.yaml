defaults:
  attack: T1036
  for:
  - pe
  platforms:
  - windows
traits:
- id: vlc-manifest-identity
  desc: VideoLAN VLC manifest identity
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: VideoLAN.VLC
- id: libvlc-runtime-string
  desc: libvlc runtime library string
  crit: notable
  conf: 0.9
  if:
    type: text
    exact: libvlc.dll
- id: vlc-crashdump-path
  desc: VLC crashdump path string
  crit: notable
  conf: 0.92
  if:
    type: text
    exact: \vlc\crashdump
- id: office-policy-registry
  desc: Office policy registry path
  crit: suspicious
  conf: 0.88
  if:
    type: text
    substr: Software\Policies\Microsoft\Office
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft-corporation
- id: office-onenote-options-other-policy
  desc: OneNote policy options path
  crit: suspicious
  conf: 0.94
  if:
    type: text
    exact: Software\Policies\Microsoft\Office\16.0\OneNote\Options\Other
- id: click2run-build-path
  desc: ClickToRun build path string
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: click2run
- id: office-source-engine-service-description
  desc: Office Source Engine service description
  crit: suspicious
  conf: 0.97
  if:
    type: text
    exact: <description>Microsoft Office Source Engine</description>
composite_rules:
- id: vlc-office-masquerade
  desc: VLC identity with Office loader strings
  crit: suspicious
  conf: 0.94
  all:
  - id: vlc-manifest-identity
  any:
  - id: libvlc-runtime-string
  - id: vlc-crashdump-path
  - id: office-policy-registry
  - id: click2run-build-path
- id: office-source-engine-masquerade-overlay-dropper
  desc: Office Source Engine masquerade with overlay payload
  crit: hostile
  conf: 0.97
  attack: T1036.005
  all:
  - id: objectives/evasion/masquerade/version-resource/claim::office-source-engine-string
  - id: metadata/binary/layout::overlay-over-35pct
  any:
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: metadata/binary/metrics/structural::embedded-pe-multi
  - id: metadata/binary/layout::overlay-over-90pct
  - id: office-source-engine-service-description
  - id: objectives/anti-static/pack/heuristics::adobe-helper-acro-pdb-marker
  needs: 2
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: vlc-office-embedded-service-decoy
  desc: VLC decoy wrapping Office service payload
  crit: suspicious
  conf: 0.97
  all:
  - id: objectives/evasion/masquerade/identity/fabricated::vlc-office-masquerade
  - id: objectives/evasion/masquerade/version-resource/claim::office-source-engine-string
  any:
  - id: office-source-engine-service-description
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: metadata/binary/layout::overlay-over-35pct
  - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
  needs: 2
- id: vlc-office-service-wrapper
  desc: VLC decoy multistage Office service wrapper
  crit: hostile
  conf: 0.985
  all:
  - id: objectives/evasion/masquerade/identity/fabricated::vlc-office-embedded-service-decoy
  - id: micro-behaviors/os/service/control::service-dispatch-triad
  - id: metadata/binary/layout::multiple-pe-embedded
  unless:
  - id: metadata/signed/platform::microsoft
- id: vlc-com-keylogger-loader
  desc: VLC masquerade COM keylogger loader
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/evasion/masquerade/identity/fabricated::vlc-office-masquerade
  - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state
  - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
  any:
  - id: objectives/persistence/system/registry/com::inprocserver32-word
  - id: micro-behaviors/os/module/load::get-proc-address-import
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: metadata/binary/section/metrics::c2r-named-section
  needs: 2
- id: vlc-com-loader-anti-analysis
  desc: VLC masquerade COM loader anti-analysis
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/evasion/masquerade/identity/fabricated::vlc-office-masquerade
  - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
  any:
  - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
  - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: metadata/binary/section/metrics::c2r-named-section
  needs: 2
