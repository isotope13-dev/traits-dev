defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: zero-import-count
    desc: Import count is exactly zero
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: pe.import_dll_count
      max: 0.0

composite_rules:
  - id: importless-office-component-cert-context
    desc: Importless Office component with Microsoft certificate metadata
    crit: component
    conf: 0.94
    all:
      - id: objectives/evasion/masquerade/brand/wrapper::office-2016-component-claim
      - id: metadata/binary/vendor::microsoft-corp-marker-cert
  - id: importless-microsoft-benign-context
    desc: Benign Microsoft importless PE context
    crit: component
    conf: 0.9
    any:
      - id: metadata/signed/trust-level::signer-evidence-present
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/leaf::microsoft-corporation
      - id: metadata/file/extension/identity::dotnet-native-image
      - id: metadata/file/extension/identity::msstyles
      - id: metadata/binary/resource::resource-only-dll
      - id: well-known/app/installer::startallback-installer
      - id: metadata/binary/linking/api-set::api-set-forwarder-dll
      - id: metadata/binary/framework::dotnet-metadata
      - id: well-known/lib/wine::wine-runtime-component
      - id: importless-office-component-cert-context
      - id: well-known/app/microsoft-office-c2r::microsoft-office-c2r-common
  - id: importless-microsoft-masquerade
    desc: Importless PE claiming to be Microsoft Corporation
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: zero-import-count
    unless:
      - id: objectives/evasion/masquerade/identity/vendor/
