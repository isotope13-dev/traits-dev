defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: microsoft-corporation-string
    desc: String claiming to be Microsoft Corporation
    crit: component
    if:
      type: text
      word: "Microsoft Corporation"

composite_rules:
  - id: importless-microsoft-masquerade
    desc: Importless PE claiming to be Microsoft Corporation
    crit: hostile
    conf: 0.95
    all:
      - id: microsoft-corporation-string
      - id: metadata/binary/symbols/compat::zero-import-count
    unless:
      - id: metadata/signed/unsigned-pe::signer-evidence-present
