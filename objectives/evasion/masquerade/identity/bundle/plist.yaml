# macOS Info.plist Identity Masquerade
# Detects trojanized app bundles with fake or placeholder identities
# ATT&CK: T1036.005 (Masquerading: Match Legitimate Name)
defaults:
  for: [plist]
  platforms: [macos]
  attack: "T1036.005"
traits:
  # com.example.* is a reserved placeholder domain (RFC 2606).
  # Common in tutorial/testdata Info.plists AS WELL AS trojanized bundles.
  # Component-only — elevates to `suspicious` via `fake-app-identity` composite
  # when the plist also claims to be a shipped application (APPL package type).
  - id: example-bundle-id
    desc: Placeholder com.example bundle identifier
    crit: component
    conf: 0.95
    if:
      type: value
      path: "CFBundleIdentifier"
      regex: "^com\\.example\\."
  - id: appl-package-type
    desc: Application package type declaration
    crit: component
    conf: 0.9
    if:
      type: value
      path: "CFBundlePackageType"
      exact: "APPL"
  # Generic "utils" bundle ID used by macOS stealers
  - id: generic-utils-bundle-id
    desc: Suspicious generic com.utils.* identifier
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "CFBundleIdentifier"
      regex: "^com\\.utils\\.(application|voicemod|wormgpt|installer)$"

  # Legitimate apps use human-readable icon names, not content hashes.
  # A 64-char hex icon filename indicates automated/toolchain-driven packaging
  # and is a strong signal of malware-kit-generated bundles.
  - id: hash-named-icon-file
    desc: CFBundleIconFile named as SHA256 hash
    crit: suspicious
    conf: 0.9
    attack: "T1036"
    if:
      type: value
      path: "CFBundleIconFile"
      regex: "^[0-9a-f]{64}$"
composite_rules:
  # Application with placeholder bundle ID = trojanized/repackaged app
  # Precision: 3.8 (meets suspicious >= 2.0 threshold)
  - id: fake-app-identity
    desc: Application with placeholder/suspicious bundle identifier
    crit: suspicious
    conf: 0.95
    any:
      - id: example-bundle-id
      - id: generic-utils-bundle-id
    all:
      - id: appl-package-type
