defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1036.005
  mbc: F0004
  for: [scripts, binaries]
traits:
  - id: apple-account-app
    desc: AppleAccount.app impersonation
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: AppleAccount\.app|NccyrNppbhag
  - id: apple-account-assistant-clear
    desc: AppleAccountAssistant impersonation
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: AppleAccountAssistant
  - id: apple-account-assistant-rot13
    desc: "AppleAccountAssistant impersonation"
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: NccyrNppbhagNffvfgnag
  - id: xprotect-impersonation
    desc: XProtect impersonation
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: XProtect|VPR-havk
  - id: users-shared-path-rot13
    # ROT13 of /Users/Shared — obfuscation of a shared drop path is the
    # masquerade signal; cleartext /Users/Shared lives in micro-behaviors.
    desc: ROT13-obfuscated /Users/Shared path
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      exact: Hfref/Funerq
  - id: temp-user-path-clear
    desc: TempUser path access
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      exact: TempUser
  - id: temp-user-path-rot13
    desc: TempUser path access (obfuscated)
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      exact: GrzcHfre
  - id: system-service-prefix-name
    desc: System-like prefixed service name
    for: [elf, macho, pe]
    crit: notable
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/lang/source::python-protobuf-stub
      - id: metadata/lang/source::python-protobuf-generated
      - type: text
        substr: ../../../../services/remote/common/remoteAgentService.js
      - id: metadata/file/catalog/identity/
      - id: metadata/library/runtime::bootstrap-iconpicker-iconset
    not:
      - regex: '(?i)(system\.convert|\bsystem-(prompt|select|stats|log)-monitor\b|^system_(prompt|stats|prefix|suffix|version|language_code|prompt_parts)$)'
      - regex: '^daemon_(crash|error|init|launch|ready|restart|running|shutdown|signal|start|status|stop)$'
      - substr: system-test
      - exact: system_secret_service
    if:
      type: string_literal
      regex: ^(system|daemon)[_-][a-zA-Z0-9_-]*(service|daemon|agent)$
  - id: system-maintenance-prefix-name
    desc: System-like prefixed maintenance service name
    crit: notable
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/lang/source::python-protobuf-stub
      - id: metadata/lang/source::python-protobuf-generated
      - type: text
        substr: ../../../../services/remote/common/remoteAgentService.js
      - id: metadata/file/catalog/identity/
      - id: metadata/library/runtime::bootstrap-iconpicker-iconset
    not:
      - regex: '(?i)(system\.convert|\bsystem-(prompt|select|stats|log)-monitor\b|^system_(prompt|stats|prefix|suffix|version|language_code|prompt_parts)$)'
      - regex: '^daemon_(crash|error|init|launch|ready|restart|running|shutdown|signal|start|status|stop)$'
      - substr: system-test
      - exact: system_update
    if:
      type: string_literal
      regex: ^(system|daemon)[_-][a-zA-Z0-9_-]*(helper|update|updater)$
  - id: system-service-suffix-name
    desc: Service-like suffixed application name
    crit: component
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/lang/source::windows-generated-def-path
      - id: metadata/lang/source/
    not:
      - substr: system.Convert
      - regex: (?i)\bsystem\.convert\b
      - substr: themeService
      - substr: ProfilesService
      - substr: remoteAgentService
      - regex: '^(Http|Tcp|Udp)Service$'
      - regex: '^(AccessCheck|Close|Control|Create|Delete|Enum|Get|Lsa|Notify|Open|Query|Register|Set|Start|Unlock|WTS)[A-Za-z0-9_]*(Service|Daemon)$'
    if:
      type: string_literal
      regex: \b[a-zA-Z0-9_-]{3,}(Service|Daemon)\b
  - id: helper-tool-name
    desc: Helper.app path reference
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: '(^|/)[A-Za-z0-9._ -]*Helper\.app(/Contents(/|$)|$)'
  - id: obfuscated-app-name
    desc: Obfuscated application name
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: /([a-z]{15,}|[A-Z]{15,})\.app/Contents(/|$)
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: well-known/app/wechat-web-devtools::wechat-cli-path
  - id: random-app-name
    desc: Randomized application name
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: /[a-z0-9]{4,9}[0-9][a-z0-9]{4,10}\.app/Contents(/|$)
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
composite_rules:
  - id: apple-service-impersonation
    desc: Apple service impersonation
    crit: suspicious
    conf: 0.98
    platforms:
      - macos
    any:
      - id: apple-account-app
      - id: apple-account-assistant
      - id: xprotect-impersonation
  - id: system-app-masquerade
    desc: System application masquerade
    crit: suspicious
    conf: 0.95
    needs: 2
    unless:
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
      - id: well-known/lib/praisonaiagents::agent-property-docs
      - id: well-known/app/homebrew::source-tree
      - id: well-known/app/homebrew::source-tree-macos
    any:
      - id: users-shared-path-rot13
      - id: temp-user-path
      - id: system-service-name
      - id: helper-tool-name
  - id: apple-runtime-masquerade
    desc: Non-Apple binary claims Apple runtime identity
    crit: suspicious
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
    all:
      - id: metadata/binary/bundle::dt-runtime
      - id: metadata/signed/certificate/identity::developer-id
  - id: fake-system-binary
    desc: Fake system binary
    crit: hostile
    conf: 0.95
    platforms:
      - macos
      - linux
    all:
      - id: apple-service-impersonation
      - id: system-app-masquerade
  - id: apple-account-assistant
    desc: AppleAccountAssistant impersonation
    crit: suspicious
    conf: 0.95
    any:
      - id: apple-account-assistant-clear
      - id: apple-account-assistant-rot13
  - id: temp-user-path
    desc: TempUser path access
    crit: suspicious
    conf: 0.75
    any:
      - id: temp-user-path-clear
      - id: temp-user-path-rot13
  - id: system-service-name
    desc: System service name usage
    crit: component
    conf: 0.6
    any:
      - id: system-service-prefix-name
      - id: system-maintenance-prefix-name
      - id: system-service-suffix-name
