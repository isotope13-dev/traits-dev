defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1036.005
  mbc: F0004
  for: [scripts, binaries]
traits:
  - id: apple-account-app
    desc: AppleAccount.app impersonation
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: AppleAccount\.app|NccyrNppbhag
  - id: apple-account-assistant-clear
    desc: AppleAccountAssistant impersonation
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: AppleAccountAssistant
  - id: apple-account-assistant-rot13
    desc: AppleAccountAssistant impersonation (obfuscated)
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: NccyrNppbhagNffvfgnag
  - id: xprotect-impersonation
    desc: XProtect impersonation
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: XProtect|VPR-havk
  - id: users-shared-path
    desc: /Users/Shared path access
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: Users/Shared|Hfref/Funerq
  - id: temp-user-path-clear
    desc: TempUser path access
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      exact: TempUser
  - id: temp-user-path-rot13
    desc: TempUser path access (obfuscated)
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      exact: GrzcHfre
  - id: system-service-prefix-name
    desc: System-like prefixed service name
    crit: notable
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - type: text
        substr: ../../../../services/remote/common/remoteAgentService.js
      - id: metadata/file/text/catalog::nmap-http-fingerprints-catalog
    not:
      - regex: '(?i)(system\.convert|\bsystem-(stats|log)-monitor\b|^system_prompt$|^system_stats$)'
      - substr: system-test
    if:
      type: string_literal
      regex: ^(system|daemon)[_-][a-zA-Z0-9_-]{2,}$
  - id: system-service-suffix-name
    desc: Service-like suffixed application name
    crit: component
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/lang/source::windows-generated-def-path
      - id: metadata/lang/source::windows-generated-def-table
    not:
      - substr: system.Convert
      - regex: (?i)\bsystem\.convert\b
      - substr: themeService
      - substr: ProfilesService
      - substr: remoteAgentService
      - regex: '^(Http|Tcp|Udp)Service$'
      - regex: '^(AccessCheck|Close|Control|Create|Delete|Enum|Get|Lsa|Notify|Open|Query|Register|Set|Start|Unlock|WTS)[A-Za-z0-9_]*(Service|Daemon)$'
    if:
      type: string_literal
      regex: \b[a-zA-Z0-9_-]{3,}(Service|Daemon)\b
  - id: helper-tool-name
    desc: Helper tool name pattern
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: Helper\.app|helper.{0,10}tool
  - id: obfuscated-app-name
    desc: Obfuscated application name
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: /([a-z]{15,}|[A-Z]{15,})\.app(/|$)
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: random-app-name
    desc: Randomized application name
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: /[a-z0-9]{10,20}\.app(/|$)
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
composite_rules:
  - id: apple-service-impersonation
    desc: Apple service impersonation
    crit: suspicious
    conf: 0.98
    platforms:
      - macos
    any:
      - id: apple-account-app
      - id: apple-account-assistant
      - id: xprotect-impersonation
  - id: system-app-masquerade
    desc: System application masquerade
    crit: suspicious
    conf: 0.95
    needs: 2
    unless:
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
    any:
      - id: users-shared-path
      - id: temp-user-path
      - id: system-service-name
      - id: helper-tool-name
  - id: apple-runtime-masquerade
    desc: Non-Apple binary claims Apple runtime identity
    crit: suspicious
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
    all:
      - id: metadata/binary/bundle::dt-runtime
      - id: metadata/signed/certificate::developer-id
  - id: fake-system-binary
    desc: Fake system binary
    crit: hostile
    conf: 0.95
    platforms:
      - macos
      - linux
    all:
      - id: apple-service-impersonation
      - id: system-app-masquerade
  - id: apple-account-assistant
    desc: AppleAccountAssistant impersonation
    crit: suspicious
    conf: 0.95
    any:
      - id: apple-account-assistant-clear
      - id: apple-account-assistant-rot13
  - id: temp-user-path
    desc: TempUser path access
    crit: suspicious
    conf: 0.75
    any:
      - id: temp-user-path-clear
      - id: temp-user-path-rot13
  - id: system-service-name
    desc: System service name usage
    crit: component
    conf: 0.6
    any:
      - id: system-service-prefix-name
      - id: system-service-suffix-name
