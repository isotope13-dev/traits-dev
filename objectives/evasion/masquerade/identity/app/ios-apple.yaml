defaults:
  platforms: [ios, macos]
  for: [python, java, class]
  attack: T1036

traits:
  - id: ios-mobilesms-bundle-id
    desc: iOS MobileSMS bundle ID
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: com.apple.MobileSMS

  - id: ios-mobilesms-executable
    desc: iOS MobileSMS executable name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: MobileSMS

  - id: apple-system-updater-bundle
    desc: Apple System Updater bundle lure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'SystemUpdater\.app|com\.apple\.systemupdater'

  - id: jvm-system-updater-bundle
    desc: JVM SystemUpdater bundle lure
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 53 79 73 74 65 6D 55 70 64 61 74 65 72 2E 61 70 70

  - id: jvm-apple-root-ca-subject
    desc: JVM Apple Root CA subject string
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 41 70 70 6C 65 20 52 6F 6F 74 20 43 41
    unless:
      - id: well-known/tool/reverse-engineering/frida/

composite_rules:
  - id: ios-mobilesms-app-impersonation
    desc: iOS MobileSMS app impersonation
    crit: hostile
    conf: 0.98
    all:
      - id: ios-mobilesms-bundle-id
      - id: ios-mobilesms-executable

  - id: apple-system-updater-impersonation
    desc: Apple updater app impersonation
    crit: hostile
    conf: 0.97
    all:
      - id: apple-system-updater-bundle
      - id: objectives/persistence/system/launchd/core::fake-apple-label

  - id: jvm-apple-system-updater-impersonation
    desc: JVM Apple updater impersonation
    crit: hostile
    conf: 0.97
    all:
      - id: jvm-system-updater-bundle
      - id: jvm-apple-root-ca-subject
