defaults:
  platforms: [android]
  for: [c, cpp, elf]
  attack: T1036.005

traits:
  - id: android-google-play-package-id
    desc: Android Google Play package ID
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "com.android.vending"

  - id: android-google-play-label
    desc: Android Google Play label
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "Google Play Store"

  - id: android-forged-play-signing
    desc: Android forged Play signing data
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'forged_play_signing_key|Fake Google Play signing'

composite_rules:
  - id: android-google-play-identity-forgery
    desc: Android Google Play identity forgery
    crit: hostile
    conf: 0.98
    all:
      - id: android-google-play-package-id
      - id: android-google-play-label
    any:
      - id: android-forged-play-signing
