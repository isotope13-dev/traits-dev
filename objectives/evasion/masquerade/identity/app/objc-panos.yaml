defaults:
  platforms: [panos, appliance, unix]
  for: [objc, macho]
  attack: T1036.005

traits:
  - id: objc-panos-apple-systemservice
    desc: ObjC PAN-OS fake Apple service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: com.apple.systemservice.bundle

  - id: objc-panos-apple-copyright
    desc: ObjC PAN-OS fake Apple copyright
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Copyright 2024 Apple Inc.

  - id: objc-panos-resource-fork-artifact
    desc: ObjC PAN-OS resource fork artifact
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: SPURIOUS_RESOURCE_FORK_DATA

composite_rules:
  - id: objc-panos-fake-apple-bundle
    desc: ObjC PAN-OS fake Apple bundle
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-apple-systemservice
      - id: objc-panos-apple-copyright
      - id: objc-panos-resource-fork-artifact
