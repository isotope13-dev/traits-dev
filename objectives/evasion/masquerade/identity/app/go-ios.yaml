defaults:
  platforms: [ios]
  for: [go]
  attack: T1036

traits:
  - id: go-ios-mobilestored-name
    desc: Go iOS mobilestored name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: mobilestored

  - id: go-ios-backboardd-name
    desc: Go iOS backboardd name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: backboardd

  - id: go-ios-lockdownd-name
    desc: Go iOS lockdownd name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: lockdownd

  - id: go-ios-fake-binary-write
    desc: Go writes fake system binary
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'fake \\"\+procName|fake "\+procName'

composite_rules:
  - id: go-ios-system-process-masquerade
    desc: Go iOS system process masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: go-ios-fake-binary-write
    any:
      - id: go-ios-mobilestored-name
      - id: go-ios-backboardd-name
      - id: go-ios-lockdownd-name
    needs: 1
