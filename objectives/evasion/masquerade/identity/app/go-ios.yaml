defaults:
  platforms: [ios]
  for: [go]
  attack: T1036

traits:
  - id: go-ios-fake-binary-write
    desc: Go writes fake system binary
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'fake \\"\+procName|fake "\+procName'

composite_rules:
  - id: go-ios-system-process-masquerade
    desc: Go iOS system process masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: go-ios-fake-binary-write
    any:
      - id: metadata/file/string/process-name::mobilestored-daemon
      - id: metadata/file/string/process-name::backboardd-daemon
      - id: metadata/file/string/process-name::lockdownd-daemon
    needs: 1
