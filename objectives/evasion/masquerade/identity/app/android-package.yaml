defaults:
  platforms: [android]
  for: [zip]
  attack: T1036.005

traits:
  - id: xapk-random-cleaner-package-name
    desc: XAPK randomized cleaner package name
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '"package_name"\s*:\s*"com\.[a-z]{4,12}\.cleaner\.[a-z0-9]{4,8}"'
