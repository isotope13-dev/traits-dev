defaults:
  attack: T1036.005
  platforms:
    - unix
    - windows
traits:
  - id: user-agent-malformed-windows-wow64
    desc: Malformed Windows WOW64 User-Agent
    crit: suspicious
    conf: 0.92
    platforms:
      - windows
    for:
      - pe
    if:
      type: text
      regex: Mozilla/5\.0 \(Windows NT [0-9]+(_[0-9]+){2,}; WOW64\)
  - id: user-agent-msie8
    desc: Internet Explorer 8 User-Agent
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      substr: mozilla/4.0 (compatible; msie 8.0; windows nt 5.1; trident/4.0)
  - id: user-agent-windows10-chrome-xor
    desc: Windows 10 Chrome User-Agent
    crit: suspicious
    conf: 0.9
    for:
      - elf
      - shell
    if:
      type: text
      substr: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/62.0.3202.89 Safari/537.36
  - id: user-agent-windows81-chrome-xor
    desc: Windows 8.1 Chrome User-Agent
    crit: suspicious
    conf: 0.9
    for:
      - elf
      - shell
    if:
      type: text
      substr: Mozilla/5.0 (Windows NT 6.3; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/51.0.2704.106 Safari/537.36
  - id: user-agent-windows7-chrome-xor
    desc: Windows 7 Chrome User-Agent
    crit: suspicious
    conf: 0.9
    for:
      - elf
      - shell
    if:
      type: text
      substr: Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/48.0.2564.109 Safari/537.36
  - id: user-agent-windows81-firefox-xor
    desc: Windows 8.1 Firefox User-Agent
    crit: suspicious
    conf: 0.9
    for:
      - elf
      - shell
    if:
      type: text
      substr: Mozilla/5.0 (Windows NT 6.3; WOW64; rv:50.0) Gecko/20100101 Firefox/50.0
  - id: obsolete-windows-safari-ua-literal
    desc: Obsolete Windows Safari User-Agent literal
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript, scripts, source]
    if:
      type: literal
      kind: string
      regex: 'Mozilla/5\.0 \(Windows NT [^)]+\).{0,120}Version/[0-9.]+ Safari/[0-9]'
  - id: user-agent-macos-safari-xor
    desc: macOS Safari User-Agent
    crit: suspicious
    conf: 0.9
    for:
      - elf
      - shell
    if:
      type: text
      substr: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_11_6) AppleWebKit/601.7.7 (KHTML, like Gecko) Version/9.1.2 Safari/601.7.7
composite_rules:
  - id: user-agent-old-browser
    desc: Outdated browser user-agent (MSIE8 or old Chrome)
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    any:
      - id: user-agent-msie8
      - id: user-agent-windows7-chrome-xor
      - id: user-agent-windows81-chrome-xor
      - id: obsolete-windows-safari-ua-literal
  - id: hardcoded-windows-browser-ua-c2-script
    desc: Browser User-Agent with hardcoded C2 endpoint
    crit: suspicious
    conf: 0.92
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/communications/http/user-agent::hardcoded-windows-browser-ua-literal
      - id: objectives/command-and-control/channel/http-beacon::js-hardcoded-ip-post-telemetry
  - id: xor-user-agent-spoofing
    desc: XOR User-Agent spoofing
    crit: suspicious
    conf: 0.92
    for:
      - elf
      - shell
    mbc: E1014
    any:
      - id: user-agent-windows10-chrome-xor
      - id: user-agent-windows81-chrome-xor
      - id: user-agent-windows7-chrome-xor
      - id: user-agent-windows81-firefox-xor
      - id: user-agent-macos-safari-xor
