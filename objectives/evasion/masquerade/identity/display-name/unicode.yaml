defaults:
  attack: T1036
traits:
  - id: chrome-extension-name-ascii-zero-width
    desc: "ASCII identity contains hidden zero-width"
    crit: suspicious
    conf: 0.92
    platforms: [unix, windows]
    for: [chrome-manifest]
    if:
      type: value
      path: name
      regex: '[A-Za-z0-9][\u200B\u200C\u200D\u2060\uFEFF][A-Za-z0-9]'
  - id: chrome-extension-action-title-ascii-zero-width
    desc: 'ASCII action title hides zero-width'
    crit: suspicious
    conf: 0.88
    platforms: [unix, windows]
    for: [chrome-manifest]
    if:
      type: value
      path: action.default_title
      regex: '[A-Za-z0-9][\u200B\u200C\u200D\u2060\uFEFF][A-Za-z0-9]'
  - id: package-name-ascii-zero-width
    desc: Package identity contains hidden zero-width
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [package.json, composer.json, pkginfo]
    if:
      type: value
      path: name
      regex: '[A-Za-z0-9][\u200B\u200C\u200D\u2060\uFEFF][A-Za-z0-9]'
  - id: pyproject-package-name-ascii-zero-width
    desc: "Pyproject identity hides zero-width Unicode"
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [pyproject.toml]
    if:
      type: value
      path: project.name
      regex: '[A-Za-z0-9][\u200B\u200C\u200D\u2060\uFEFF][A-Za-z0-9]'
  - id: cargo-package-name-ascii-zero-width
    desc: Cargo identity hides zero-width Unicode
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [cargo.toml]
    if:
      type: value
      path: package.name
      regex: '[A-Za-z0-9][\u200B\u200C\u200D\u2060\uFEFF][A-Za-z0-9]'
  - id: desktop-entry-name-ascii-zero-width
    desc: Desktop ASCII name hides zero-width Unicode
    crit: suspicious
    conf: 0.88
    for: [desktop-entry]
    platforms: [linux]
    if:
      type: value
      path: desktop_entry.name
      regex: '[A-Za-z0-9][\u200B\u200C\u200D\u2060\uFEFF][A-Za-z0-9]'
  - id: vsix-display-name-ascii-zero-width
    desc: VSIX ASCII display name hides zero-width Unicode
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [vsix-manifest]
    if:
      type: value
      path: vsix.display_name
      regex: '[A-Za-z0-9][\u200B\u200C\u200D\u2060\uFEFF][A-Za-z0-9]'
