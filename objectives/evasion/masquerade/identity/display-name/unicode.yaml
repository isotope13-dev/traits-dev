defaults:
  attack: T1036
traits:
  - id: chrome-extension-name-zero-width
    desc: Chrome extension name contains zero-width Unicode
    crit: suspicious
    conf: 0.92
    platforms: [unix, windows]
    for: [chrome-manifest]
    if:
      type: value
      path: name
      regex: '[\u200B\u200C\u200D\u2060\uFEFF]'
  - id: chrome-extension-action-title-zero-width
    desc: 'chrome extension action title zero width'
    crit: suspicious
    conf: 0.88
    platforms: [unix, windows]
    for: [chrome-manifest]
    if:
      type: value
      path: action.default_title
      regex: '[\u200B\u200C\u200D\u2060\uFEFF]'
  - id: package-name-zero-width
    desc: Package name contains zero-width Unicode
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [package.json, composer.json, pkginfo]
    if:
      type: value
      path: name
      regex: '[\u200B\u200C\u200D\u2060\uFEFF]'
  - id: pyproject-package-name-zero-width
    desc: Pyproject package name contains zero-width Unicode
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [pyproject.toml]
    if:
      type: value
      path: project.name
      regex: '[\u200B\u200C\u200D\u2060\uFEFF]'
  - id: cargo-package-name-zero-width
    desc: Cargo package name contains zero-width Unicode
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [cargo.toml]
    if:
      type: value
      path: package.name
      regex: '[\u200B\u200C\u200D\u2060\uFEFF]'
  - id: desktop-entry-name-zero-width
    desc: Desktop entry name contains zero-width Unicode
    crit: suspicious
    conf: 0.88
    for: [desktop-entry]
    platforms: [linux]
    if:
      type: value
      path: desktop_entry.name
      regex: '[\u200B\u200C\u200D\u2060\uFEFF]'
  - id: vsix-display-name-zero-width
    desc: VSIX display name contains zero-width Unicode
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [vsix-manifest]
    if:
      type: value
      path: vsix.display_name
      regex: '[\u200B\u200C\u200D\u2060\uFEFF]'
