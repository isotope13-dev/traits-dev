defaults:
  platforms:
    - macos
  for: [plist]
traits:
  - id: debug-dylib-in-codesign
    desc: Debug dylib referenced in code signature
    crit: suspicious
    conf: 0.9
    attack: T1036
    if:
      type: text
      substr: debug.dylib
      case_insensitive: true
  - id: underscore-prefix-dylib
    desc: Underscore-prefixed dylib in code signature
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: MacOS/__
composite_rules:
  - id: suspicious-codesign-dylibs
    desc: Code signature with debug or unusual dylibs
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/vendor/apple/codesign::coderesources-plist
    any:
      - id: debug-dylib-in-codesign
      - id: underscore-prefix-dylib

  # Apple-internal binaries (iTunesUpdater, MobileDevice support tools) re-signed
  # and bundled inside third-party apps. The presence of com.apple.mobiledeviceupdater
  # or Apple hardware icons signals that Apple's own closed-source binary was extracted
  # and re-packaged under a third-party certificate — a supply-chain/masquerade technique
  # used by iOS "repair" tools (e.g., Tenorshare ReiBoot) to install Apple components
  # without users' awareness.
  - id: apple-component-rebundled
    desc: Apple internal binary re-signed in third-party code signature
    crit: suspicious
    conf: 0.85
    attack: "T1036.001"
    all:
      - id: metadata/vendor/apple/codesign::coderesources-plist
    any:
      - id: metadata/vendor/apple/codesign::apple-mobiledevice-updater-resource
      - id: metadata/vendor/apple/codesign::apple-hardware-icon-resource
