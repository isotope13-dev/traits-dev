defaults:
  platforms: [windows]
  for: [all]
  attack: T1036.005
  mbc: F0004

composite_rules:
  - id: msi-windows-host-alias-payload
    desc: MSI installs a payload under a Windows host name
    crit: hostile
    conf: 0.98
    attack: T1036.005,T1027.009
    all:
      - id: metadata/package/files/msi::ole2-installer-kind
      - id: metadata/file/profile/identity::msi-run-value-executable-target
    any:
      - id: metadata/file/profile/identity::msi-application-frame-host-alias
      - id: metadata/file/profile/identity::msi-svchost-alias
      - id: metadata/file/profile/identity::msi-runtime-broker-alias
      - id: metadata/file/profile/identity::msi-search-host-alias
    unless:
      - id: metadata/binary/installer/family/
