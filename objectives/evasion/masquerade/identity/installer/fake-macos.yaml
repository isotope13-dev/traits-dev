defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
traits:
  - id: dscl-authonly-loop
    desc: macOS dscl phishing loop
    crit: suspicious
    conf: 0.95
    attack: T1056.002
    if:
      type: text
      regex: dscl . authonly.{0,50}while
  - id: sudo-refresh-stdin
    desc: Refreshes sudo via stdin
    crit: suspicious
    conf: 0.9
    attack: T1548.002
    if:
      type: text
      substr: sudo -v -S
  - id: homabrews-domain
    desc: Fake Homebrew typosquatting domain
    crit: suspicious
    conf: 1.0
    attack: T1036.005
    if:
      type: string_literal
      substr: homabrews.org
  - id: base64-password
    desc: Base64 encodes password variable
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: echo.{0,50}password.{0,50}base64
    unless:
      - id: well-known/tool/dual-use/shadowsocks-libev::shadowsocks-libev-source
  - id: fake-macos-installer-msg
    desc: Fake macOS Installer message
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: macOS-Installer:.{0,100}apple\.com
composite_rules:
  - id: homebrew-marker
    desc: Homebrew marker markers
    crit: component
    conf: 0.6
    needs: 2
    any:
      - id: metadata/package/manager::homebrew-prefix
      - id: metadata/package/manager::brew-no-install
      - id: metadata/package/manager::homebrew-repo
  - id: fake-installer-behaviors
    desc: Suspicious installer behaviors
    crit: suspicious
    conf: 0.9
    any:
      - id: dscl-authonly-loop
      - id: homabrews-domain
      - id: sudo-refresh-stdin
      - id: base64-password
      - id: fake-macos-installer-msg
  - id: fake-homebrew-installer
    desc: Homebrew installer masquerade
    crit: hostile
    conf: 0.98
    attack: T1036.005
    mbc: F0004
    platforms:
      - macos
      - linux
    all:
      - id: homebrew-marker
      - id: fake-installer-behaviors
  - id: fake-macos-installer-exec
    desc: Fake macOS installer with hidden execution
    crit: hostile
    conf: 1.0
    attack: T1036.005
    all:
      - id: fake-macos-installer-msg
      - id: objectives/anti-static/obfuscation/encoding/base64::base64-decode-exec
