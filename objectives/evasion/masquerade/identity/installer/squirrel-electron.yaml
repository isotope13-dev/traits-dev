defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004

composite_rules:
  - id: unsigned-squirrel-electron-stub-masquerade
    desc: Unsigned Squirrel Electron stub masquerade
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/binary/debug::pdb-squirrel-stubexecutable
      - id: metadata/binary/resource::electron-asar-resource-wrapper
    any:
      - id: metadata/signed/trust-level::unsigned
      - id: metadata/binary/section/names::writable-rdata
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-rdata-pair
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
