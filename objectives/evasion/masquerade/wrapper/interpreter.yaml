# Renamed script interpreter detection
# Standalone script interpreters (LuaJIT, AutoIt, AutoHotkey, etc.) are
# commonly renamed and bundled with malicious payloads to bypass filename
# and process-name based detection.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004
traits:
  # === LuaJIT ===
  - id: luajit-export-name
    desc: PE export table identifies as luajit.exe
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: "luajit.exe"

  - id: luajit-version-string
    desc: LuaJIT version banner string
    crit: component
    conf: 0.95
    if:
      type: string_value
      regex: 'LuaJIT \d+\.\d+\.\d+'

  - id: luajit-lua-init-env
    desc: LUA_INIT environment variable handler
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: "LUA_INIT"

  - id: basename-is-luajit
    desc: Filename matches luajit
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '^luajit'
      case_insensitive: true

  # === AutoIt ===
  - id: autoit-version-string
    desc: AutoIt version resource string
    crit: component
    conf: 0.95
    if:
      type: string_value
      regex: 'AutoIt v\d'

  - id: basename-is-autoit
    desc: Filename matches autoit or au3
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '^(autoit|au3)'
      case_insensitive: true

  # === AutoHotkey ===
  - id: autohotkey-version-string
    desc: AutoHotkey version resource string
    crit: component
    conf: 0.95
    if:
      type: string_value
      regex: 'AutoHotkey( v\d|\d+\.\d+)'

  - id: basename-is-autohotkey
    desc: Filename matches autohotkey or ahk
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '^(autohotkey|ahk)'
      case_insensitive: true

composite_rules:
  - id: renamed-luajit
    desc: Renamed LuaJIT interpreter (not named luajit.exe)
    crit: suspicious
    conf: 0.9
    all:
      - id: luajit-export-name
    any:
      - id: luajit-version-string
      - id: luajit-lua-init-env
    unless:
      - id: basename-is-luajit

  - id: renamed-autoit
    desc: Renamed AutoIt interpreter
    crit: suspicious
    conf: 0.9
    all:
      - id: autoit-version-string
    unless:
      - id: basename-is-autoit
      - id: metadata/lang/compiled::autoit-compiled-script

  - id: renamed-autohotkey
    desc: Renamed AutoHotkey interpreter
    crit: suspicious
    conf: 0.9
    all:
      - id: autohotkey-version-string
    unless:
      - id: basename-is-autohotkey
  - id: renamed-autohotkey-downloader
    desc: Renamed AutoHotkey downloader wrapper
    crit: suspicious
    conf: 0.95
    all:
      - id: renamed-autohotkey
      - id: micro-behaviors/communications/http/get::wininet-http-flow
    any:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/communications/http/get::urlmon-dynamic-load
    needs: 1
  - id: renamed-autohotkey-stager
    desc: Renamed AutoHotkey network stager
    crit: hostile
    conf: 0.97
    all:
      - id: renamed-autohotkey
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
