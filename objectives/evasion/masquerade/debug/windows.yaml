defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: protocolhandler-pdb
    desc: protocolhandler decoy PDB name
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])protocolhandler\.pdb$'
  - id: groove-pdb
    desc: groove decoy PDB name
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])groove\.pdb$'
  - id: java-pdb
    desc: java decoy PDB name
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])java\.pdb$'
  - id: kinit-pdb
    desc: kinit decoy PDB name
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])kinit\.pdb$'
  - id: trusted-decoy-pdb
    desc: Trusted software decoy PDB name
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(protocolhandler|groove|java|kinit)\.pdb$'
      case_insensitive: true
  - id: elevation-service-pdb
    desc: Chrome elevation service PDB name
    crit: component
    conf: 0.96
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)(^|[\\/])elevation_service\.exe\.pdb$'
  - id: elevation-service-binary
    desc: Chrome elevation service binary name
    crit: component
    conf: 0.95
    if:
      type: text
      exact: elevation_service.exe
      section: .rdata
  - id: elevation-service-source-path
    desc: Chrome elevation service source path
    crit: component
    conf: 0.95
    if:
      type: text
      regex: \.\./\.\./chrome/elevation_service/
      case_insensitive: true
  - id: gethandleverifier-export
    desc: GetHandleVerifier export decoy name
    crit: component
    conf: 0.92
    if:
      type: symbol
      exact: GetHandleVerifier
  - id: ielevator-chrome-string
    desc: IElevatorChrome interface string
    crit: component
    if:
      type: text
      substr: IElevatorChrome
composite_rules:
  - id: office-java-decoy-pdbs
    desc: Decoy PDB names from trusted software
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: protocolhandler-pdb
      - id: groove-pdb
      - id: java-pdb
      - id: kinit-pdb
  - id: chrome-elevation-service-decoy
    desc: Chrome elevation service masquerade
    crit: suspicious
    conf: 0.97
    all:
      - id: elevation-service-pdb
    needs: 2
    any:
      - id: elevation-service-source-path
      - id: gethandleverifier-export
      - id: elevation-service-binary
    unless:
      - id: ielevator-chrome-string
  - id: fake-chrome-service-facade
    desc: Masquerades as Chrome service binary
    crit: suspicious
    conf: 0.98
    needs: 3
    any:
      - id: elevation-service-pdb
      - id: elevation-service-binary
      - id: elevation-service-source-path
      - id: gethandleverifier-export
      - id: metadata/lang/compiler/native::lld-pdb-marker
      - id: micro-behaviors/os/service/control::service-control-dispatch
    unless:
      - id: ielevator-chrome-string
