defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: protocolhandler-pdb
    desc: protocolhandler decoy PDB name
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: protocolhandler.pdb
      section: .rdata
  - id: groove-pdb
    desc: groove decoy PDB name
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: groove.pdb
      section: .rdata
  - id: java-pdb
    desc: java decoy PDB name
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: java.pdb
      section: .rdata
  - id: kinit-pdb
    desc: kinit decoy PDB name
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: kinit.pdb
      section: .rdata
  - id: trusted-decoy-pdb
    desc: Trusted software decoy PDB name
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: (?i)(protocolhandler|groove|java|kinit)\.pdb
      section: .rdata
composite_rules:
  - id: office-java-decoy-pdbs
    desc: Decoy PDB names from trusted software
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: protocolhandler-pdb
      - id: groove-pdb
      - id: java-pdb
      - id: kinit-pdb
