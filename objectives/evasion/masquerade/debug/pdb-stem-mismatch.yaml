# PE binary's embedded PDB stem disagrees with its on-disk stem.
#
# Linkers emit the PDB filename from the project name. A commodity
# stealer/loader rebranded as `update.exe` typically still ships with
# `<Build>\Release\stealer.pdb` referenced in its CodeView record.
# When the basenames (sans extension) disagree, the project's real
# identity is recoverable from the PDB — a high-signal attribution
# fact that complements `pe.debug.pdb.path` content checks.
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1036.005
traits:
  - id: pe-stem-differs-from-pdb-stem
    desc: PE stem disagrees with embedded PDB stem
    crit: notable
    conf: 0.85
    if:
      type: value
      path: file.stem
      ne: pe.debug.pdb.stem
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/binary/layout/
