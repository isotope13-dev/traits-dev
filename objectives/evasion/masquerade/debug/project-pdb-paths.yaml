defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: fridayt-pdb-path
    desc: fridayT build PDB path marker
    crit: suspicious
    conf: 0.99
    size_min: 500000
    size_max: 900000
    if:
      type: text
      exact: c:\work\fridayT.pdb
  - id: fakechrome-joesecurity-pdb-path
    desc: FakeChrome JoeSecurity PDB path
    crit: suspicious
    conf: 0.995
    size_min: 1000000
    size_max: 1200000
    if:
      type: text
      exact: C:\Work\JoeSecurity\trunk\src\windows\usermode\tools\FakeChrome\Release\Chrome.pdb
  - id: pillo-pdb-path
    desc: Pillo build PDB path marker
    crit: suspicious
    conf: 0.99
    size_min: 500000
    size_max: 900000
    if:
      type: text
      exact: c:\work\Pillo.pdb
  - id: perfboost-adobe-arm-carrier
    desc: Perfboost PDB carrier marker
    crit: component
    conf: 0.995
    size_min: 2000000
    size_max: 3500000
    if:
      type: text
      substr: perfboost.pdb
