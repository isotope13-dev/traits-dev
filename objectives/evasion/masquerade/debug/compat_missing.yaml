defaults:
  for: [pe]
  platforms: [windows]
traits:
- id: credprovslegacy-dll
  desc: Legacy credential provider DLL decoy
  crit: suspicious
  conf: 0.96
  if:
    type: text
    exact: credprovslegacy.dll
    section: .rdata
composite_rules:
- id: node-hosted-winclean-loader
  desc: Node-hosted WinClean launcher markers
  crit: suspicious
  conf: 0.97
  all:
  - id: objectives/evasion/masquerade/version-resource::winclean-original-filename
  any:
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: metadata/binary/debug::pdb-users-path
  - id: metadata/binary/debug::pdb-absolute-path
- id: elevated-winclean-launcher
  desc: Elevated WinClean launcher markers
  crit: suspicious
  conf: 0.97
  all:
  - id: objectives/evasion/masquerade/version-resource::winclean-original-filename
  any:
  - id: chrome-elevation-service-decoy
  - id: fake-chrome-service-facade
- id: mixed-windows-component-decoys
  desc: Mixed Windows component and service decoys
  crit: suspicious
  conf: 0.96
  any:
  - id: office-java-decoy-pdbs
  - id: trusted-decoy-pdb
  - id: fake-chrome-service-facade
  - id: credprovslegacy-dll
  needs: 2
