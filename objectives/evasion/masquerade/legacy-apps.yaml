defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  crit: suspicious
  conf: 0.85
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: registry-path-lotus
    desc: Legacy Lotus Approach registry path
    if:
      type: text
      regex: (?i)Software\\Lotus\\Approach
      section: .text
  - id: registry-path-borland
    desc: Legacy Borland Delphi registry path
    crit: notable
    if:
      type: text
      regex: (?i)Software\\Borland\\Delphi
      section: .text
    downgrade:
      any:
        - id: metadata/lang/compiler::borland-rtl-regkey
        - id: metadata/lang/compiler::borland-locales-regkey
        - id: metadata/lang/compiler/managed::delphi
  - id: registry-path-netscape
    desc: Legacy Netscape Navigator registry path
    if:
      type: text
      regex: (?i)Software\\Netscape\\Netscape Navigator
      section: .text
  - id: registry-path-aol
    desc: Legacy AOL Desktop registry path
    if:
      type: text
      regex: (?i)Software\\AOL\\Desktop
      section: .text
  - id: registry-path-compuserve
    desc: Legacy Compuserve registry path
    if:
      type: text
      regex: (?i)Software\\Compuserve
      section: .text
  - id: registry-path-symantec-act
    desc: Legacy Symantec ACT! registry path
    if:
      type: text
      regex: (?i)Software\\Symantec\\ACT!
      section: .text
  - id: obsolete-app-marker
    desc: Obsolete application marker (Lotus, Borland, Netscape)
    conf: 0.8
    if:
      type: text
      regex: (?i)(Lotus Approach|Borland Delphi|Netscape Navigator|Netscape Communicator)
      section: .text
