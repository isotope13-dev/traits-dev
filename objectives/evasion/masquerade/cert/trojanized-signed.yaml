# Trojanized signed PE: legitimate certificate + C2 infrastructure
# Detects signed binaries abused as malware carriers
defaults:
  for: [pe]
  platforms: [windows]
composite_rules:
  - id: signed-pe-with-c2-endpoints
    desc: Signed PE binary with embedded C2 endpoints
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
      - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
    any:
      - id: micro-behaviors/communications/http/post/
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: micro-behaviors/hardware/input/keyboard::set-windows-hook

