defaults:
  platforms: [windows]
  for: [pe]
  attack: T1553.002
  mbc: F0001

traits:
  - id: security-dir-embedded-pe
    desc: Certificate region begins inside embedded PE
    crit: component
    conf: 0.97
    if:
      type: hex
      pattern: "5A 90 00 03 00 00 00 04 00 00 00 FF FF 00 00"
      offset_range: [4096, null]

composite_rules:
  - id: security-dir-pe-payload-hijack
    desc: Certificate table hijack to embedded PE payload
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/layout::cert-table-truncated
      - id: metadata/binary/layout::pe-embedded
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::legacy-few-sections
      - id: security-dir-embedded-pe
    any:
      - id: micro-behaviors/fs/file/pe-inspect::shellcode-pe-header-probe-x64
      - id: metadata/build/manifest::pe-manifest-myapplication-template
