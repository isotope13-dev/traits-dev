defaults:
  platforms: [windows]
  for: [pe]
  attack: T1553.002

traits:
  - id: signed-installer-manifest-description
    desc: Generic Installer manifest description
    crit: component
    conf: 0.85
    if:
      type: value
      path: pe.manifest.description
      regex: '^Installer$'

composite_rules:
  - id: certum-oss-installer-template
    desc: Certum OSS-dev signed anonymous installer
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/signed/certificate::certum-oss-developer-cert
      - id: signed-installer-manifest-description
      - id: metadata/binary/resource::pe-no-version-info-resource
      - id: micro-behaviors/os/privilege/manifest::require-administrator

  - id: anonymous-signed-installer
    desc: Signed installer without VS_VERSION_INFO
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/resource::pe-no-version-info-resource
      - id: signed-installer-manifest-description
      - id: metadata/signed/certificate::pe-signature-verified
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/certificate::pe-cert-chain-truncated

  - id: signed-pe-expired-leaf-installer
    desc: Signed installer with shallow expired-era chain
    crit: suspicious
    conf: 0.88
    all:
      - id: metadata/signed/certificate::pe-cert-shallow-chain
      - id: signed-installer-manifest-description
      - id: metadata/binary/resource::pe-no-version-info-resource
    unless:
      - id: metadata/signed/platform::microsoft
