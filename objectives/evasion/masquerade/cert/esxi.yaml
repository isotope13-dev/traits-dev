defaults:
  platforms: [esxi, unix]
  for: [c, cpp, elf]
  attack: T1553.004

traits:
  - id: esxi-hidden-cert-backup-dir
    desc: ESXi hidden cert backup dir
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.vmsys_backup

  - id: esxi-rogue-rui-cert-name
    desc: ESXi rogue rui cert name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'rogue_rui\.(crt|key|pem)'

  - id: esxi-disable-ssl-verify-config
    desc: ESXi disables SSL verification
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '<verify(Peer|Host)>0</verify(Peer|Host)>'

composite_rules:
  - id: esxi-rui-cert-replacement
    desc: ESXi rui certificate replacement
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/files/config::esxi-rui-private-key-path
      - id: esxi-rogue-rui-cert-name
    any:
      - id: esxi-hidden-cert-backup-dir
      - id: esxi-disable-ssl-verify-config
      - id: objectives/credential-access/files/config::esxi-vpxa-config-path
