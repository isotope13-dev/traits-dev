# A cargo-theft intrusion actor has obtained code-signing certificates in this
# legal entity's name and used them to re-sign ScreenConnect components after
# the legitimate ConnectWise certificate was revoked. The subject by itself is
# only campaign context; pairing it with ScreenConnect build identity and a
# cryptographically valid signature identifies the trust-laundering behavior.
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1036.004"

traits:
  - id: stephen-whang-cpa-authenticode-subject
    desc: Campaign-linked Authenticode subject
    crit: notable
    conf: 0.98
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '^CN=STEPHEN WHANG\\, CPA\\, INC\.,'

composite_rules:
  - id: fraudulently-signed-screenconnect-service-runner
    desc: Campaign-signed ScreenConnect service runner
    crit: hostile
    conf: 0.99
    all:
      - id: stephen-whang-cpa-authenticode-subject
      - id: well-known/tool/dual-use/screenconnect::screenconnect-dotnet-service-runner-pdb
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
