# Microsoft Authenticode on a PE whose version-resource CompanyName is not
# Microsoft. Real Windows platform binaries declare a Microsoft publisher;
# third-party malware that grafts or abuses a Microsoft certificate leaves a
# foreign company string (e.g. Moonlight Holdings) in the version resource.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036.001

composite_rules:
  - id: microsoft-signed-foreign-company
    desc: Microsoft-signed PE claims non-Microsoft publisher
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/signed/platform::microsoft
      - id: metadata/package/versioning::pe-company-name-populated
    unless:
      - id: metadata/binary/vendor::microsoft-prefixed-company
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      # WHQL attestation embeds a Microsoft nested signer on third-party
      # drivers (WinDivert, Wintun, etc.) without claiming Microsoft authorship.
      - id: metadata/signed/certificate/identity::pe-whql-hardware-compat-attestation
      - id: metadata/signed/certificate/identity::pe-whql-hardware-compat-nested
      - id: well-known/lib/wintun/
      - id: metadata/package/quality/recognized-contexts/
      - id: metadata/package/quality/recognized-contexts::mtrini-openmp-runtime-context
      - id: well-known/tool/development/git-for-windows/

  - id: microsoft-signed-foreign-injector
    desc: Microsoft-signed foreign publisher with process injection
    crit: hostile
    conf: 0.96
    attack: T1036.001,T1055
    all:
      - id: microsoft-signed-foreign-company
    any:
      - id: objectives/evasion/process/injection/toolkit::poolparty-toolkit
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    needs: 2
