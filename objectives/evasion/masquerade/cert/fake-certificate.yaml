defaults:
  for: [pe]
  platforms: [windows]
composite_rules:
  - id: apple-identity-go-thread-loader
    desc: Apple identity on Go thread loader
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/signed/leaf::itunes.apple.com
      - id: metadata/lang/compiler/systems::go-pe-rich-symbols
      - id: micro-behaviors/os/api-resolution/manual::go-syscall-dynamic-api-dispatch
      - id: micro-behaviors/process/inject/runtime/thread-context::thread-context-apis-3of4
      - id: objectives/evasion/indicator-removal/timestamps::zero-header-timestamp
    any:
      - id: metadata/binary/resource::no-resources
      - id: metadata/binary/section/metrics::inflated-data-section
      - id: objectives/anti-static/obfuscation/name-mangling/type-names
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/platform::apple
      - id: metadata/binary/installer/family/
  - id: fake-putty-cert-dotnet
    desc: "Uses Simon Tatham / PuTTY cert on .NET binary"
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/signed/certificate/identity::simon-tatham-cert
      - id: metadata/binary/framework::dotnet-metadata
  - id: fake-microsoft-self-signed-dotnet-loader
    desc: Self-signed .NET loader claims Microsoft identity
    crit: suspicious
    conf: 0.97
    attack: T1036.005
    all:
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
      - id: metadata/binary/framework::dotnet-metadata
    any:
      - id: micro-behaviors/communications/http/client/managed::downloadstring
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: metadata/lang/compiler/managed::reflection-emit
    needs: 2
    unless:
      - id: metadata/signed/platform/
  - id: fake-microsoft-dotnet-download-reflection-loader
    desc: Fake Microsoft .NET download reflection loader
    crit: hostile
    conf: 0.98
    attack: T1036.005
    all:
      - id: fake-microsoft-self-signed-dotnet-loader
      - id: micro-behaviors/communications/http/client/managed::downloadstring
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: metadata/lang/compiler/managed::reflection-emit
    any:
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
      - id: micro-behaviors/process/create/shell/lang::powershell-engine-markers
    unless:
      - id: metadata/signed/platform/
  - id: fake-microsoft-dotnet-dynamic-download-loader
    desc: Fake Microsoft .NET dynamic download loader
    crit: hostile
    conf: 0.98
    attack: T1036.005
    all:
      - id: fake-microsoft-self-signed-dotnet-loader
      - id: micro-behaviors/communications/http/client/managed::downloadstring
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: metadata/lang/compiler/managed::reflection-emit
    any:
      - id: micro-behaviors/data/db/linq::linq-queries
      - id: metadata/lang/compiler/managed::il-generator-token
      - id: metadata/lang/compiler/managed::opcodes-token
    needs: 1
    unless:
      - id: metadata/signed/platform/
  - id: self-signed-memory-loader-certificate
    desc: Self-signed certificate on encrypted memory loader
    crit: hostile
    conf: 0.96
    attack: T1036.005
    all:
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
      - id: objectives/command-and-control/dropper/execution/windows-loader::self-signed-encrypted-memory-loader
      - id: metadata/signed/trust-level::signer-evidence-present
    any:
      - id: metadata/signed/unknown
      - id: objectives/evasion/masquerade/binary::overlay-usertrust-string
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
  - id: self-issued-obfuscated-utility-masquerade
    desc: Self-issued signer on obfuscated utility-shaped PE
    crit: hostile
    conf: 0.95
    attack: T1036.005
    all:
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
      - id: metadata/signed/unknown
      - id: objectives/anti-static/obfuscation/payload/section::empty-text-section
      - id: metadata/binary/metrics/structural::high-code-entropy
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
  - id: self-issued-themida-resource-masquerade
    desc: Self-issued Themida PE with payload-like resources
    crit: hostile
    conf: 0.96
    attack: T1036.005,T1027.002
    all:
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
      - id: metadata/signed/unknown/
      - id: objectives/anti-static/pack/detect::themida-boot-loader-layout
      - id: objectives/anti-static/obfuscation/payload/resource::large-icon-resource
      - id: metadata/binary/section/names::blank-section-name-cluster
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
  - id: self-issued-process-hollowing-masquerade
    desc: Self-issued certificate on a process-hollowing loader
    crit: hostile
    conf: 0.99
    attack: T1036.005,T1055.012
    all:
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
      - id: objectives/evasion/process/injection/hollowing::dynamic-api-process-hollowing
  - id: team-vr-signed-steinberg-license-masquerade
    desc: Team V.R signed Steinberg license masquerade
    crit: hostile
    conf: 0.98
    attack: T1036.005
    ref: sha256:2ed770b87cbe9c96c4265e4e104732dd002e32560ab0d938f44bdb838226c507
    all:
      - id: well-known/unwanted/software-crack::team-vr-self-issued-authenticode
      - id: objectives/evasion/masquerade/version-resource/licensing::steinberg-elicenser-version-identity
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
    any:
      - id: objectives/anti-static/pack/mpress::mpress-versioned-stub
      - id: objectives/anti-static/pack/mpress::mpress-sparse-dynamic-loader
    unless:
      - id: metadata/signed/platform/
  - id: fake-aptx-software-cert
    desc: Uses APTX Software certificate identity
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/signed/developer::aptx-software
      - id: metadata/binary/layout::overlay-size-metrics
    any:
      - id: metadata/signed/developer::usertrust-rsa-certification-authority
      - id: metadata/signed/developer::sectigo-rsa-time-stamping-ca
      - id: metadata/signed/developer::sectigo-rsa-time-stamping-signer-#3
  - id: fake-installvibes-packed-loader-cert
    desc: Uses InstallVibes certificate on packed loader
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/signed/certificate/identity::installvibes-comodo-usertrust-signed
    any:
      - id: objectives/command-and-control/dropper/execution/resource::pe-resource-api-loader-ansi
      - id: objectives/command-and-control/dropper/execution/resource::pe-resource-com-loader
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
      - id: objectives/anti-static/obfuscation/payload/encrypted::major-rsrc-section
    needs: 2
  - id: fake-freemium-comodo-evasive-loader-cert
    desc: Uses Freemium COMODO cert on evasive loader
    crit: suspicious
    conf: 0.985
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/
    all:
      - id: metadata/signed/developer::freemium-gmbh
      - id: objectives/evasion/fileless/memory::transacted-self-read-loader
    any:
      - id: metadata/signed/developer::addtrust-external-ca-root
      - id: metadata/signed/developer::comodo-rsa-code-signing-ca
      - id: metadata/signed/developer::comodo-rsa-certification-authority
      - id: objectives/anti-analysis/debugger-detect/check::output-debug-string
      - id: objectives/anti-analysis/vm-detect/processor-features::is-processor-feature-present
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/fs/shell-ops::shell-get-folder-path
    needs: 3
  - id: fake-freemium-comodo-admin-loader-cert
    desc: Uses Freemium COMODO cert on admin loader
    crit: hostile
    conf: 0.992
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/
    all:
      - id: fake-freemium-comodo-evasive-loader-cert
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    any:
      - id: micro-behaviors/os/com/invoke::co-create-instance
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/fs/shell-ops::shell-get-folder-path
    needs: 2
