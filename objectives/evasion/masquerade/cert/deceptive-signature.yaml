defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: deceptive-signed-binary
    desc: Binary masquerades as Microsoft but is not signed by them
    crit: hostile
    conf: 0.96
    attack: T1036.004
    all:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/signed/platform::any-valid-signature
    unless:
      - id: metadata/signed/platform/
    # Require at least one other suspicious behavior to avoid FPs on poorly configured benign software
    any:
      - id: objectives/evasion/process/injection/memory::process-inject-api
      - id: objectives/anti-static/obfuscation/obfuscator/garble::garble-obfuscated-go
      - id: objectives/anti-static/obfuscation/encoding/xor::string-decrypt
  - id: go-loader-tls-cert-signature
    desc: Go loader signed with TLS certificate
    crit: hostile
    conf: 0.96
    attack: T1036
    all:
      - id: objectives/anti-static/obfuscation/obfuscator/garble::go-pe-opaque-identity-loader
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
      - id: metadata/signed/certificate/identity::pe-cert-leaf-no-code-signing-eku-kv
      - id: metadata/signed/certificate/identity::pe-cert-leaf-domain-subject
    any:
      - id: objectives/anti-static/obfuscation/payload/section::oversized-rdata-section
      - id: metadata/binary/layout::low-entropy-large-overlay
    needs: 1

  # A verified signature is not benign provenance when the signer is not a
  # recognized platform signer and the same PE profiles the host through two
  # independent public-IP services.  Requiring the absent CompanyName field
  # avoids flagging ordinary signed applications that merely use telemetry.
  - id: signed-unknown-pe-multi-geo-profile
    desc: Signed PE with unknown signer and multi-service external-IP profiling
    crit: hostile
    conf: 0.96
    attack: T1036.004,T1614
    all:
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
      - id: metadata/signed/unknown/
      - id: metadata/binary/anomaly/format::version-info-company-name-absent
      - id: micro-behaviors/communications/http/ip-discovery::ip-api-com
      - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
