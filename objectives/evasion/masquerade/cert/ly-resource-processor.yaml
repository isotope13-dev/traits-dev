defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: ly-signed-sennheiser-resource-processor-overlay
    desc: LY-signed PE claims Sennheiser over opaque overlay
    crit: hostile
    conf: 0.99
    attack: T1036.004,T1027.009
    all:
      - id: metadata/signed/certificate/identity::pe-signer-ly-corporation
      - id: metadata/binary/anomaly/provenance::pe-version-company-sennheiser
      - id: metadata/binary/anomaly/provenance::pe-version-product-resource-processor
      - id: metadata/binary/layout::high-entropy-overlay
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/
