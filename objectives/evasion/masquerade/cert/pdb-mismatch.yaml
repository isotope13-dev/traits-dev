defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.001

traits:
  - id: cert-org-pdb-mismatch
    desc: Certificate organization does not match PDB path
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: pe.cert_org_pdb_mismatch
      min: 1
    unless:
      - id: well-known/lib/node-notifier::snoretoast-helper
      - id: well-known/game/steam/
    downgrade:
      any:
        - id: metadata/signed/leaf::progress-software-corporation
        - id: metadata/binary/anomaly/format::binary-signed-with-individual-cert
        - id: metadata/signed/leaf::python-software-foundation
        - id: metadata/signed/developer::python-software-foundation
        - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
