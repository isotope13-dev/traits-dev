defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036

traits:
  - id: comments-companyname-leak
    desc: Comments holds CompanyName field name
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.comments
      regex: '\b[H.]?CompanyName\b'

  - id: trademarks-origfile-leak
    desc: Trademarks holds OriginalFilename name
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.trademarks
      regex: '\b[H.]?OriginalFilename\b'

  - id: privatebuild-product-leak
    desc: PrivateBuild holds ProductName field name
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.private_build
      regex: '\b[H.]?ProductName\b'

composite_rules:
  - id: versioninfo-template-corruption
    desc: VERSIONINFO field names leaked into value slots
    crit: suspicious
    conf: 0.92
    size_min: 4096
    needs: 2
    any:
      - id: comments-companyname-leak
      - id: trademarks-origfile-leak
      - id: privatebuild-product-leak
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/certificate/identity::pe-signature-verified
