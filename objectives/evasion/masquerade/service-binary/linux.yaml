defaults:
  platforms: [linux]
  for: [elf]
  attack: T1036.005

traits: []

composite_rules:
  - id: trojanized-service-binary-loader
    desc: Trojanized service binary loader
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/dropper/staging/embedded::static-encrypted-embedded-elf-loader
    any:
      - id: micro-behaviors/os/service/daemon::httpd
      - id: micro-behaviors/fs/path/binary::binary-usr-sbin
      - id: micro-behaviors/fs/proc/mounts::mounts-mountinfo

