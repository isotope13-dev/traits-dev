# Stealthy shell-rc tampering: instead of appending its persistence line to the
# end of .bashrc/.zshrc/.profile (where a user would notice it), the script
# computes the file's midpoint and sed-inserts the line there to blend in among
# existing config. The midpoint computation + variable-addressed sed insert of a
# PATH-prepend line is the evasive tell; legitimate installers append at the end.
defaults:
  platforms: [unix]
  for: [shell]
  attack: T1564
traits:
  - id: rc-midline-compute
    desc: Computes the midpoint line of a file
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\(\(\s*\$?[A-Za-z_]\w*\s*/\s*2\s*\)\)'
  - id: sed-variable-line-insert
    desc: sed inserts text at variable line
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\$\{[A-Za-z_]\w*\}i\\'
composite_rules:
  - id: shell-rc-stealth-midline-hijack
    desc: Hides PATH hijack mid-file in shell rc
    crit: hostile
    conf: 0.93
    all:
      - id: rc-midline-compute
      - id: sed-variable-line-insert
      - id: objectives/persistence/login/shell/path-hijack::shell-path-prepend-export
