# Suspicious Unsigned Binary Detection
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.8
composite_rules:
  - id: unsigned-pe-microsoft-version-claim
    desc: PE has Microsoft version metadata but no verifiable embedded signature
    crit: notable
    conf: 0.94
    attack: T1036.005
    all:
      - id: metadata/signed/trust-level::unsigned-missing-signature-record
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity/
      - id: metadata/binary/vendor::windows-system-implementer-dll
      - id: well-known/lib/wine/
      - id: well-known/app/peazip/
      - id: objectives/evasion/masquerade/pe-tampering::microsoft-office-csi-ship-binary
      - id: objectives/evasion/masquerade/pe-tampering::office-csi-cmigrate-pdb
  - id: unsigned-microsoft-high-entropy-memory-loader
    desc: Unsigned Microsoft-claim PE protects high-entropy data
    crit: hostile
    conf: 0.97
    attack: "T1036.005,T1027.002"
    all:
      - id: unsigned-pe-microsoft-version-claim
      - id: metadata/binary/section/metrics::high-entropy-rdata-section
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity/
      - id: metadata/binary/installer/family/
      - id: well-known/app/peazip/
  - id: suspicious-unsigned-binary
    desc: "Detects an unsigned binary with suspicious characteristics"
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity/
    any:
      - id: objectives/anti-static/pack/entropy::high-entropy-section
      - id: objectives/anti-static/obfuscation/imports::peb-access-x64
  - id: unsigned-microsoft-command-loader
    desc: Unsigned Microsoft-claim PE executes cmd shell
    crit: hostile
    conf: 0.95
    attack: "T1036.005,T1059.003"
    all:
      - id: unsigned-pe-microsoft-version-claim
      - id: micro-behaviors/process/create/exec::cmd-shell-via-createprocess
    any:
      - id: metadata/binary/section/metrics::writable-text-section
      - id: metadata/binary/anomaly/signing::small-high-entropy-data-section
      - id: metadata/binary/metrics/structural::high-code-entropy
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/peazip/
  - id: unsigned-microsoft-writable-cmd-loader
    desc: Unsigned Microsoft writable cmd loader
    crit: hostile
    conf: 0.96
    attack: "T1036.005,T1059.003"
    all:
      - id: unsigned-microsoft-command-loader
      - id: metadata/binary/section/metrics::writable-text-section
  - id: unsigned-microsoft-embedded-pe
    desc: Unsigned Microsoft-claim PE with embedded payload
    crit: hostile
    conf: 0.97
    attack: "T1036.005,T1027.009"
    all:
      - id: unsigned-pe-microsoft-version-claim
      - id: metadata/binary/layout::pe-embedded
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/sfx/
      - id: metadata/library/mfc/
      - id: well-known/app/peazip/
  - id: unsigned-microsoft-scrubbed-build-profile
    desc: Unsigned Microsoft-claim PE with zeroed build timestamp and PEB access
    crit: hostile
    conf: 0.96
    for: [pe]
    arch: [x86]
    size_max: 1048576
    attack: T1036.005,T1070.006
    all:
      - id: unsigned-pe-microsoft-version-claim
      - id: metadata/binary/anomaly/provenance::pe-zero-timestamp
      - id: objectives/anti-static/obfuscation/imports::teb-peb-access
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity/

  - id: unsigned-microsoft-encrypted-manual-loader
    desc: Unsigned Microsoft-claim PE with an encrypted manually resolved loader
    crit: hostile
    conf: 0.99
    attack: T1036.005,T1027.013,T1620
    all:
      - id: unsigned-pe-microsoft-version-claim
      - id: micro-behaviors/os/api-resolution/manual::x64-pe-export-directory-walk
      - id: micro-behaviors/crypto/symmetric/xxtea::x64-xxtea-decrypt-round
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/process/thread/create::create-thread
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity/
  - id: unsigned-microsoft-rwx-reloc-carrier
    desc: Unsigned Microsoft PE carries RWX reloc payload
    crit: hostile
    conf: 0.99
    attack: T1036.005,T1027.009
    for: [pe]
    all:
      - id: unsigned-pe-microsoft-version-claim
      - id: objectives/anti-static/pack/section-anomaly::reloc-rwx-payload-section
      - id: metadata/binary/layout::pe-checksum-valid
