# Masquerade / Identity Deception Detection
# ATT&CK: T1036.005 (Masquerading: Match Legitimate File or Process)
# Detects when files or processes impersonate system components

defaults:
  platforms: [windows, unix]
  for: [binaries, scripts]
  crit: suspicious
  attack: T1036.005
  mbc: F0004

traits:
  # === Service Name Prefixes (legitimate system service patterns) ===
  # These detect actual process/service masquerading, not API endpoint names

  - id: system-service-prefix-name
    desc: Service name with system-like prefix
    crit: notable
    conf: 0.6
    unless:
      - type: text
        substr: system_stats
      - type: text
        regex: ^system_(default|info)$
      - id: metadata/file/text::nmap-http-fingerprints-catalog
    if:
      type: basename
      regex: ^system_[a-z]{2,}
    not:
      - exact: system_info

  - id: service-prefix-svc
    desc: Name with svc service identifier
    crit: component
    conf: 0.5
    unless:
      - type: text
        substr: system_stats
    if:
      type: text
      regex: ^svc_[a-z0-9]+

  - id: daemon-name-system
    desc: Daemon name with system prefix
    crit: notable
    conf: 0.65
    unless:
      - type: text
        substr: system_stats
    if:
      type: text
      regex: (system_|sys_)[a-z]{2,}daemon

  - id: system-stats-observed
    desc: system_stats string in file
    crit: component
    conf: 0.5
    if:
      type: text
      substr: system_stats

  - id: system-stats-url-path
    desc: system_stats used as URL path
    crit: component
    conf: 0.7
    if:
      type: text
      substr: "/system_stats"

  - id: system-stats-kv-default
    desc: system_stats in default config field
    crit: component
    conf: 0.7
    for: [manifests]
    if:
      type: kv
      path: default
      substr: system_stats

composite_rules:
  - id: service-name-masquerade
    desc: Name resembles legitimate system service
    crit: notable
    conf: 0.7
    any:
      - id: system-service-prefix-name
      - id: service-prefix-svc
      - id: daemon-name-system
    unless:
      - id: metadata/library/python-runtime::python-runtime

  - id: legitimate-api-endpoint-system
    desc: system_stats as legitimate API endpoint
    crit: baseline
    conf: 1.0
    all:
      - id: system-stats-observed
    any:
      - id: system-stats-url-path
      - id: system-stats-kv-default
    needs: 1
