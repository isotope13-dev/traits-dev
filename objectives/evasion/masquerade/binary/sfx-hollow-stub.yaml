defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

traits:
  - id: sfxmod-build-2712-banner
    desc: 7zSfxMod build 2712 banner
    crit: component
    conf: 0.97
    if:
      type: text
      substr: "build 2712 (December 30, 2012)"

  - id: sfxmod-oleg-scherbakov-banner
    desc: 7zSfxMod copyright banner
    crit: component
    conf: 0.97
    if:
      type: text
      substr: "Copyright (c) 2005-2012 Oleg Scherbakov"

  - id: sfxmod-green-software-manifest
    desc: 7zSfxMod default Green software manifest
    crit: component
    conf: 0.97
    if:
      type: value
      path: pe.manifest.assembly_identity.name
      exact: "Green software"

  - id: sfxmod-install-marker-utf8
    desc: 7zSfxMod Install UTF-8 config marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "!@Install@!UTF-8!"

  - id: sfxmod-install-end-marker
    desc: 7zSfxMod InstallEnd config marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "!@InstallEnd@!"

  - id: 1by1-product-name
    desc: 1by1 Directory Player ProductName claim
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.product_name
      regex: '(?i)1by1\b'

composite_rules:
  - id: sfxmod-green-software-elevation
    desc: 7zSfxMod admin-requiring Green software stub
    crit: suspicious
    conf: 0.95
    all:
      - id: sfxmod-green-software-manifest
      - id: metadata/build/manifest::pe-requires-admin

  - id: sfxmod-1by1-cover-mismatch
    desc: 1by1 VersionInfo with 7zSfxMod manifest cover
    crit: hostile
    conf: 0.98
    all:
      - id: 1by1-product-name
      - id: sfxmod-green-software-manifest

  - id: sfxmod-build-2712-elevation-dropper
    desc: 7zSfxMod build-2712 elevation dropper
    crit: hostile
    conf: 0.97
    all:
      - id: sfxmod-build-2712-banner
      - id: sfxmod-oleg-scherbakov-banner
      - id: sfxmod-green-software-manifest
      - id: metadata/build/manifest::pe-requires-admin
      - id: sfxmod-install-marker-utf8
      - id: sfxmod-install-end-marker
    unless:
      - id: metadata/signed/platform::microsoft
