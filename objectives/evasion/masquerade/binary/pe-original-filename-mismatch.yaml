# PE binary's embedded OriginalFilename disagrees with its on-disk
# basename — the binary was renamed after link time.
#
# Real software pairs the link-time `OriginalFilename` resource with
# the published filename. Disagreement means somebody renamed the
# file after build, the dominant pattern being commodity-malware
# repacks (`update.exe` shipped as a binary whose OriginalFilename
# is still `mimikatz.exe`). False positives exist (installers
# legitimately drop renamed copies, e.g. `setup.tmp` extracts to
# `setup.exe`) — keep this at notable until paired with hostile
# context.
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1036.005
traits:
  - id: pe-basename-differs-from-original-filename
    desc: 'PE basename differs from OriginalFilename'
    crit: notable
    conf: 0.85
    if:
      type: value
      path: file.basename
      ne: pe.version.original_filename
    unless:
      # Verified Microsoft platform binaries are commonly renamed by runtime
      # packaging, framework extraction, and sample intake.  A mismatch here
      # is not masquerade evidence when the embedded publisher is authentic.
      - id: metadata/signed/platform::microsoft
      # cleave names extracted archive members `fil<hash>`; that synthetic
      # basename is not the installed filename and must not be compared with
      # VERSIONINFO.
      - type: basename
        regex: '^fil[0-9A-Fa-f]{8,}$'
      # WiX custom-action binaries are commonly stored under generated stream
      # names while retaining their link-time filename.
      - id: metadata/signed/leaf::wix-toolset-.net-foundation
      # The intake pipeline names samples by SHA-256.  That collection name is
      # not a post-build masquerade and must not be compared with PE metadata.
      - type: basename
        regex: '^[0-9a-f]{64}\.(exe|dll)$'

composite_rules:
  - id: renamed-opaque-native-payload
    desc: Renamed opaque native payload with API concealment
    crit: hostile
    conf: 0.95
    attack: T1036.005,T1027.009
    all:
      - id: pe-basename-differs-from-original-filename
      - id: objectives/anti-static/obfuscation/payload/section::large-high-entropy-gfx-section
      - id: objectives/anti-static/obfuscation/imports::opaque-payload-api-concealment
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
