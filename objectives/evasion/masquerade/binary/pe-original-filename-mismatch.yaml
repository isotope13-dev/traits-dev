# A filename mismatch is neutral metadata; this composite adds attack-specific
# payload concealment signals before inferring masquerade.
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1036.005,T1027.009

composite_rules:
  - id: renamed-opaque-native-payload
    desc: Renamed opaque native payload with API concealment
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/binary/anomaly/provenance::pe-basename-differs-from-original-filename
      - id: objectives/anti-static/obfuscation/payload/section::large-high-entropy-gfx-section
      - id: objectives/anti-static/obfuscation/imports::opaque-payload-api-concealment
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
  - id: unsigned-microsoft-branded-rwx-loader
    desc: Unsigned Microsoft-branded PE with custom RWX loader section
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/anomaly/provenance::pe-basename-differs-from-original-filename
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/signed/trust-level::unsigned
      - id: metadata/hardening/memory::wx-section
    any:
      - id: metadata/binary/section/metrics::pe-nonstandard-entry
      - id: metadata/binary/section/metrics::multiple-nonstandard-section-names
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/

  # A renamed unsigned PE with a zero checksum and embedded-PE/XOR loader
  # markers is an attack-shaped identity wrapper. The gates avoid turning
  # ordinary renamed releases or static native utilities into masquerades.
  - id: unsigned-renamed-native-loader-masquerade
    desc: Unsigned renamed native PE with concealed loader markers
    crit: hostile
    conf: 0.97
    attack: T1036.005,T1027.009,T1620
    all:
      - id: metadata/binary/anomaly/provenance::pe-basename-differs-from-original-filename
      - id: metadata/binary/layout::pe-no-signature-record
      - id: metadata/binary/layout::pe-checksum-zeroed
      - id: metadata/binary/resource::pe-single-version-resource
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-walk
    any:
      - id: micro-behaviors/crypto/symmetric/xor/loop::x64-xor-imm8-widen-loop
      - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite-arg-x64
      - id: objectives/anti-analysis/debugger-detect/check::nt-process-debug-port-info-class
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
