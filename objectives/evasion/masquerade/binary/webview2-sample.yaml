defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

traits:
  - id: webview2-api-sample-pdb
    desc: WebView2 sample PDB path
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(?i)WebView2APISample\.pdb$'
  - id: webview2-api-sample-name
    desc: WebView2 sample project name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: WebView2APISample
  - id: webview2-loader-dll-name
    desc: WebView2 loader DLL name
    crit: component
    conf: 0.9
    if:
      type: text
      exact: WebView2Loader.dll
  - id: visualwincomp-config-name
    desc: Visualwincomp config filename
    crit: component
    conf: 0.96
    if:
      type: text
      exact: visualwincomp.txt
  - id: visualwincomp-programdata-path
    desc: Visualwincomp ProgramData path
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(?i)C:\\ProgramData\\visualwincomp-[^\\]{1,32}\\'

composite_rules:
  - id: trojanized-webview2-sample-loader
    desc: Trojanized WebView2 sample loader
    crit: suspicious
    conf: 0.97
    all:
      - id: webview2-api-sample-name
      - id: webview2-loader-dll-name
    any:
      - id: visualwincomp-config-name
      - id: visualwincomp-programdata-path
      - id: webview2-api-sample-pdb
  - id: webview2-sample-visualwincomp-masquerade
    desc: WebView2 sample visualwincomp masquerade
    crit: suspicious
    conf: 0.99
    all:
      - id: webview2-api-sample-pdb
      - id: visualwincomp-config-name
