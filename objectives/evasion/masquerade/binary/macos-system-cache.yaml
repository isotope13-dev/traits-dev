# macOS System Cache Path Masquerade
# Detects dropping malicious files disguised as Apple system cache entries,
# fake LaunchAgent/LaunchDaemon plists with com.apple.* names, and hidden
# /private/tmp payloads using Apple-style naming conventions.
# ATT&CK: T1036.005 (Masquerading: Match Legitimate Name or Location)
defaults:
  platforms:
    - macos
  for:
    - javascript
    - typescript
    - shell
    - applescript
    - python
    - macho
  attack: T1036.005
  mbc: F0004
traits:
  - id: library-caches-com-apple
    desc: Drops file in /Library/Caches as com.apple.*
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: /Library/Caches/com\.apple\.[a-z][a-z0-9.-]{2,40}
    not:
      - substr: /Library/Caches/com.apple.xbs
      - substr: /AppleInternal/Library/BuildRoots/
      - substr: /Sources/xnu/
      - regex: com\.apple\.(SoftwareUpdate|metadata|InstallAssistant|installer)
      - regex: com\.apple\.(Safari|appstore|commerce|dt\.)
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/vendor/apple::system-component
  - id: user-library-caches-fake-apple
    desc: Drops file in ~/Library/Caches as com.apple.*
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: ~/Library/Caches/com\.apple\.[a-z][a-z0-9.-]{2,40}
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/vendor/apple::system-component
  - id: launchagents-fake-apple
    desc: Fake Apple name in LaunchAgents/Daemons path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (LaunchAgents|LaunchDaemons)/com\.apple\.[a-z][a-z0-9.-]{2,40}\.plist
    not:
      - regex: com\.apple\.(SoftwareUpdate|metadata|InstallAssistant|installer)
      - regex: com\.apple\.(Safari|appstore|commerce|dt\.)
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/vendor/apple::system-component
  - id: private-tmp-hidden-apple
    desc: Hidden /private/tmp path with Apple-style name
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: /private/tmp/\.[a-z][a-z0-9]{3,8}(\.scpt|\.plist|\.dylib|\.app)?
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/vendor/apple::system-component
composite_rules:
  - id: fake-apple-cache-drop
    desc: Fake Apple cache path file drop
    crit: suspicious
    conf: 0.85
    any:
      - id: library-caches-com-apple
      - id: user-library-caches-fake-apple
      - id: launchagents-fake-apple
  - id: macos-payload-staging
    desc: Hidden tmp drop or fake Apple system path
    crit: suspicious
    conf: 0.88
    any:
      - id: library-caches-com-apple
      - id: user-library-caches-fake-apple
      - id: launchagents-fake-apple
      - id: private-tmp-hidden-apple
