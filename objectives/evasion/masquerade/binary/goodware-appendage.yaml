defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036
  mbc: OB0006

traits:
  - id: repeated-globalsign-cert-text
    desc: Repeated GlobalSign certificate text
    crit: component
    conf: 0.9
    count_min: 8
    if:
      type: text
      substr: GlobalSign

  - id: dense-microsoft-cert-text
    desc: Dense Microsoft certificate text
    crit: component
    conf: 0.9
    count_min: 10
    if:
      type: text
      substr: Microsoft Corporation

  - id: oracle-unpack200-appendage
    desc: Oracle unpack200 appendage marker
    crit: component
    conf: 0.97
    if:
      type: text
      substr: unpack200.exe

  - id: adobe-arm-appendage
    desc: Adobe ARM appendage marker
    crit: component
    conf: 0.97
    if:
      type: text
      exact: AdobeARM.exe

  - id: office-msosync-appendage
    desc: Office msosync appendage marker
    crit: component
    conf: 0.96
    if:
      type: text
      substr: msosync.pdb

composite_rules:
  - id: multi-vendor-goodware-appendage
    desc: Multi-vendor goodware appendage
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: repeated-globalsign-cert-text
      - id: dense-microsoft-cert-text
    any:
      - id: oracle-unpack200-appendage
      - id: adobe-arm-appendage
      - id: office-msosync-appendage
    needs: 2
    unless:
      - id: metadata/binary/installer/script::nsis

  - id: modified-signed-goodware-appendage-carrier
    desc: Modified signed goodware appendage carrier
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: repeated-globalsign-cert-text
      - id: dense-microsoft-cert-text
      - id: objectives/anti-static/obfuscation/payload/container::modified-autoit-png-resource-carrier
      - id: objectives/anti-static/obfuscation/payload/container::pe-checksum-mismatch-png
    any:
      - id: oracle-unpack200-appendage
      - id: adobe-arm-appendage
      - id: office-msosync-appendage
    needs: 2
    unless:
      - id: metadata/binary/installer/script::nsis
