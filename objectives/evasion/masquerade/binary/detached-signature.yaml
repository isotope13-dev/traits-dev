defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.001

traits:
  - id: overlay-certum-ca-string
    desc: Certum CA string in overlay
    crit: component
    conf: 0.8
    if:
      type: text
      section: overlay
      substr: "Certum Certification Authority"
  - id: overlay-digicert-string
    desc: DigiCert string in overlay
    crit: component
    conf: 0.8
    if:
      type: text
      section: overlay
      substr: "DigiCert Inc"
  - id: overlay-ubisoft-string
    desc: Ubisoft string in overlay
    crit: component
    conf: 0.8
    if:
      type: text
      section: overlay
      substr: "UBISOFT ENTERTAINMENT INC"
composite_rules:
  - id: signature-overlay-strings
    desc: Signature-related strings in overlay
    crit: component
    conf: 0.8
    any:
      - id: overlay-certum-ca-string
      - id: overlay-digicert-string
      - id: overlay-ubisoft-string
  - id: detached-signature-overlay
    desc: Detached or malformed signature in overlay
    crit: suspicious
    conf: 0.95
    any:
      - id: unsigned-signature-overlay
      - id: metadata/binary/layout::security-dir-out-of-bounds
      - id: metadata/binary/anomaly/format::pe-dos-stub-zeroed
  - id: unsigned-signature-overlay
    desc: Unsigned PE with signature strings in overlay
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/layout::has-overlay
      - id: signature-overlay-strings
      - id: metadata/signed/trust-level::unsigned
