defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.001

traits:
  - id: overlay-certum-ca-string
    desc: Certum CA string in overlay
    crit: component
    conf: 0.8
    if:
      type: text
      section: overlay
      substr: "Certum Certification Authority"
  - id: overlay-digicert-string
    desc: DigiCert string in overlay
    crit: component
    conf: 0.8
    if:
      type: text
      section: overlay
      substr: "DigiCert Inc"
  - id: overlay-ubisoft-string
    desc: Ubisoft string in overlay
    crit: component
    conf: 0.8
    if:
      type: text
      section: overlay
      substr: "UBISOFT ENTERTAINMENT INC"
  - id: overlay-comodo-string
    desc: COMODO certificate string in overlay
    crit: component
    conf: 0.86
    if:
      type: text
      section: overlay
      substr: "COMODO CA Limited"
  - id: overlay-usertrust-string
    desc: USERTrust certificate string in overlay
    crit: component
    conf: 0.86
    if:
      type: text
      section: overlay
      substr: "The USERTRUST Network"
  - id: overlay-utn-object-string
    desc: UTN USERFirst Object string in overlay
    crit: component
    conf: 0.88
    if:
      type: text
      section: overlay
      substr: "UTN-USERFirst-Object"
  - id: overlay-symantec-string
    desc: Symantec timestamp string in overlay
    crit: component
    conf: 0.84
    if:
      type: text
      section: overlay
      substr: "Symantec Time Stamping Services Signer"
  - id: overlay-pkcs7-signeddata-oid
    desc: PKCS7 SignedData OID in overlay
    crit: component
    conf: 0.9
    if:
      type: hex
      section: overlay
      pattern: "06 09 2A 86 48 86 F7 0D 01 07 02"
composite_rules:
  - id: signature-overlay-strings
    desc: Signature-related strings in overlay
    crit: component
    conf: 0.8
    any:
      - id: overlay-certum-ca-string
      - id: overlay-digicert-string
      - id: overlay-ubisoft-string
      - id: overlay-comodo-string
      - id: overlay-usertrust-string
      - id: overlay-utn-object-string
      - id: overlay-symantec-string
  - id: detached-signature-overlay
    desc: Detached or malformed signature in overlay
    crit: suspicious
    conf: 0.95
    any:
      - id: unsigned-signature-overlay
      - id: metadata/binary/layout::security-dir-out-of-bounds
      - id: metadata/binary/anomaly/format::pe-dos-stub-zeroed
  - id: unsigned-signature-overlay
    desc: Unsigned PE with signature strings in overlay
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/layout::has-overlay
      - id: signature-overlay-strings
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: overlay-pkcs7-signeddata-oid
      - id: metadata/binary/layout::overlay-size-256
