defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: dotnet-template-future-process-launcher
    desc: Future-dated template-named .NET process launcher
    crit: hostile
    conf: 0.97
    attack: T1036.005,T1106
    mbc: F0004
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/build/manifest::pe-manifest-myapplication-template
      - id: metadata/binary/anomaly/provenance::pe-far-future-timestamp
      - id: micro-behaviors/process/create/launch::create-process-api-name
    unless:
      - id: metadata/signed/platform/

  - id: dotnet-reflected-api-masquerade
    desc: Masqueraded .NET API resolver with template identity
    crit: hostile
    conf: 0.98
    attack: T1036.005,T1027.007
    mbc: B0032
    all:
      - id: objectives/anti-static/obfuscation/imports::dotnet-reflected-api-resolver
      - id: metadata/build/manifest::pe-manifest-myapplication-template
      - id: objectives/evasion/masquerade/binary::pe-basename-differs-from-original-filename
      - id: metadata/package/versioning::pe-version-resource
    unless:
      - id: metadata/signed/platform/

  - id: dotnet-template-encoded-network-loader
    desc: .NET template identity with encoded network loader
    crit: hostile
    conf: 0.97
    attack: "T1036.005,T1105,T1140"
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/build/manifest::pe-manifest-myapplication-template
      - id: micro-behaviors/communications/http/client/managed::downloadstring
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
    any:
      - id: micro-behaviors/data/compress/library::gzipstream-dotnet
      - id: micro-behaviors/os/syscall/raw::nt-protect-ssn
    needs: 1
    unless:
      - id: metadata/signed/platform/

  - id: dotnet-template-reflection-masquerade
    desc: Renamed .NET template stub with reflective payload access
    crit: hostile
    conf: 0.96
    attack: "T1036.005,T1027.009,T1620"
    all:
      - id: metadata/build/manifest::pe-manifest-myapplication-template
      - id: metadata/package/versioning::pe-version-resource
      - id: objectives/evasion/masquerade/binary::pe-basename-differs-from-original-filename
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/resource::clr-resource-large
      - id: micro-behaviors/process/interpreter/reflection/runtime::methodbase-class
    any:
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
