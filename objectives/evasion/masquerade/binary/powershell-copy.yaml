# PowerShell Binary Copy + Windows System Script Drop Masquerade
# Detects:
#   1. Copying powershell.exe to a different name (T1036.003)
#   2. BAT/PS1 scripts written/dropped to Windows system paths (T1036.005)
#   3. VBScript WScript.Shell staging via cscript (T1059.005)
#   4. Hidden filesystem attributes on dropped scripts (T1564.001)
# ATT&CK: T1036.003 (Rename System Utilities), T1036.005 (Match Legitimate Name or Location)
defaults:
  platforms:
    - windows
  for: [scripts, binaries]
  attack: T1036.003
  mbc: F0004
traits:
  - id: copy-powershell-exe
    desc: Copies powershell.exe to new name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: copy.{0,60}powershell\.exe.{0,60}\\[a-zA-Z0-9_.-]+\.exe
  - id: programdata-wt-exe
    desc: wt.exe in PROGRAMDATA masquerade
    crit: suspicious
    conf: 0.95
    attack: T1036.005
    if:
      type: text
      regex: PROGRAMDATA.{0,20}\\wt\.exe
  - id: powershell-to-programdata
    desc: PowerShell copy to PROGRAMDATA
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: powershell\.exe.{0,60}PROGRAMDATA
  - id: where-powershell-locate
    desc: where powershell binary discovery
    crit: suspicious
    conf: 0.8
    attack: T1082
    if:
      type: text
      substr: "where powershell"
  - id: ps-double-hidden-window
    desc: Dual hidden-window /min and -w h flags
    crit: suspicious
    conf: 0.9
    attack: T1564.003
    if:
      type: text
      regex: /min.{0,80}(-w\s+h\b|-WindowStyle\s+Hidden)|(-w\s+h\b|-WindowStyle\s+Hidden).{0,80}/min
  - id: bat-hidden-filesystem-attr
    desc: Drops file with Hidden filesystem attribute
    crit: suspicious
    conf: 0.9
    attack: T1564.001
    if:
      type: text
      regex: Set-ItemProperty.{0,120}Attributes.{0,60}Hidden
  - id: vbs-wscript-shell-curl
    desc: VBScript WScript.Shell curl download chain
    crit: suspicious
    conf: 0.9
    attack: T1105
    if:
      type: text
      regex: WScript\.Shell.{0,300}curl\s
  - id: cscript-nologo-self-delete
    desc: cscript //nologo run then VBS self-delete
    crit: suspicious
    conf: 0.88
    attack: T1070.004
    if:
      type: text
      regex: cscript.{0,60}//nologo.{0,200}del.{0,60}\.(vbs|js)
  - id: bat-in-system-dir
    desc: BAT file path in Windows system directory
    crit: suspicious
    conf: 0.85
    attack: T1036.005
    if:
      type: text
      regex: (PROGRAMDATA|AppData.{0,10}Roaming|SystemRoot|WINDIR).{0,100}[a-zA-Z0-9_.-]+\.bat
    not:
      - regex: (example|sample|test|readme|EXAMPLE|TEST)
  - id: ps1-in-system-dir
    desc: PS1 file path in Windows system directory
    crit: suspicious
    conf: 0.8
    attack: T1036.005
    if:
      type: text
      regex: (PROGRAMDATA|AppData.{0,10}Roaming).{0,100}[a-zA-Z0-9_.-]+\.ps1
  - id: system-name-bat
    desc: BAT file with system-process-mimicking name
    crit: suspicious
    conf: 0.8
    attack: T1036.005
    if:
      type: text
      regex: \\(system|windows|update|svchost|service|taskhost|csrss|lsass|winlogon|smss|wuauserv)[a-z0-9_-]*\.bat
composite_rules:
  - id: powershell-binary-masquerade
    desc: PowerShell binary copy masquerade
    crit: suspicious
    conf: 0.9
    any:
      - id: copy-powershell-exe
      - id: programdata-wt-exe
      - id: powershell-to-programdata
  - id: system-dir-script-drop
    desc: BAT or PS1 dropped to Windows system path
    crit: suspicious
    conf: 0.88
    attack: T1036.005
    any:
      - id: bat-in-system-dir
      - id: ps1-in-system-dir
  - id: system-named-bat-drop
    desc: System-named BAT dropped to system directory
    crit: hostile
    conf: 0.92
    attack: T1036.005
    all:
      - id: system-name-bat
      - id: bat-in-system-dir
  - id: wt-exe-vbs-cscript-chain
    desc: wt.exe masquerade with VBScript cscript launch
    crit: hostile
    conf: 0.97
    all:
      - id: programdata-wt-exe
      - id: vbs-wscript-shell-curl
      - id: cscript-nologo-self-delete
  - id: hidden-bat-persist-drop
    desc: Hidden BAT dropped to system directory
    crit: hostile
    conf: 0.95
    attack: T1564.001
    all:
      - id: bat-hidden-filesystem-attr
      - id: bat-in-system-dir
  - id: ps-double-hidden-system-drop
    desc: Double-hidden PS drop to system directory
    crit: hostile
    conf: 0.93
    attack: T1564.003
    all:
      - id: ps-double-hidden-window
      - id: system-dir-script-drop
