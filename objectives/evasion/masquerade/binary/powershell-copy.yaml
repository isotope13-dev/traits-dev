# PowerShell Binary Copy Masquerade
# Detects copying powershell.exe to a different name to evade detection
# Used by axios hijack RAT (copies to wt.exe) and other malware
# ATT&CK: T1036.003 (Masquerading: Rename System Utilities)
defaults:
  platforms:
    - windows
  for:
    - javascript
    - typescript
    - python
    - pe
  attack: T1036.003
  mbc: F0004
traits:
  - id: copy-powershell-exe
    desc: Copies powershell.exe to new name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: copy.{0,60}powershell\.exe.{0,60}\\[a-zA-Z0-9_.-]+\.exe
  - id: programdata-wt-exe
    desc: wt.exe in PROGRAMDATA masquerade
    crit: suspicious
    conf: 0.95
    attack: T1036.005
    if:
      type: text
      regex: PROGRAMDATA.{0,20}\\wt\.exe
  - id: powershell-to-programdata
    desc: PowerShell copy to PROGRAMDATA
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: powershell\.exe.{0,60}PROGRAMDATA
composite_rules:
  - id: powershell-binary-masquerade
    desc: PowerShell binary copy masquerade
    crit: suspicious
    conf: 0.9
    any:
      - id: copy-powershell-exe
      - id: programdata-wt-exe
      - id: powershell-to-programdata
