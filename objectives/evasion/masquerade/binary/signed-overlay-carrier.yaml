defaults:
  platforms: [windows]
  for: [pe]
  attack: T1553.002
  mbc: F0001

traits:
  - id: manifest-desc-orbd
    desc: Manifest borrows Oracle ORB daemon description
    crit: suspicious
    conf: 0.99
    if:
      type: kv
      path: pe.manifest.description
      substr: Java(TM) SE orbd
    unless:
      - id: metadata/signed/leaf::oracle-corporation
      - id: metadata/signed/leaf::oracle-america-inc.

  - id: fltldr-internal-name
    desc: Office Filter Loader InternalName
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.version_info.internal_name
      exact: fltldr

  - id: fltldr-original-filename
    desc: Office Filter Loader OriginalFilename
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.version_info.original_filename
      regex: '(?i)^fltldr\.exe$'

composite_rules:
  - id: fltldr-oversized-carrier
    desc: Oversized Office Filter Loader carrier
    crit: suspicious
    conf: 0.98
    size_min: 358400
    all:
      - id: fltldr-internal-name
      - id: fltldr-original-filename

  - id: signed-microsoft-tampered-overlay-pe
    desc: Tampered signed Microsoft PE with embedded payload
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/signed/leaf::microsoft-corporation
      - id: metadata/signed/certificate::pe-signature-digest-mismatch
      - id: metadata/binary/layout::pe-embedded

  - id: fltldr-overlay-payload-carrier
    desc: Office Filter Loader carrier with embedded PE
    crit: hostile
    conf: 0.99
    all:
      - id: fltldr-internal-name
      - id: metadata/binary/layout::pe-embedded
    any:
      - id: metadata/signed/certificate::pe-signature-digest-mismatch
      - id: manifest-desc-orbd
      - id: metadata/build/artifact::manifest-version-mismatch
