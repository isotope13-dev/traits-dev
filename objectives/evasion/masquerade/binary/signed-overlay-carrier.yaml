defaults:
  platforms: [windows]
  for: [pe]
  attack: T1553.002
  mbc: F0001

traits:
  - id: manifest-desc-orbd
    desc: Manifest borrows Oracle ORB daemon description
    crit: suspicious
    conf: 0.99
    if:
      type: kv
      path: pe.manifest.description
      substr: Java(TM) SE orbd
    unless:
      - id: metadata/signed/leaf::oracle-corporation
      - id: metadata/signed/leaf::oracle-america-inc.

  - id: fltldr-internal-name
    desc: Office Filter Loader InternalName
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.version.internal_name
      exact: fltldr

  - id: fltldr-original-filename
    desc: Office Filter Loader OriginalFilename
    crit: component
    conf: 0.99
    if:
      type: kv
      path: pe.version.original_filename
      regex: '(?i)^fltldr\.exe$'

  - id: chocolatey-shimgen-strings
    desc: Chocolatey shimgen switch strings
    crit: component
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: 'shimgen-(log|noop|gui|waitforexit)'

  - id: chocolatey-shimgen-banner
    desc: Chocolatey shimgen setup banner
    crit: component
    conf: 0.97
    if:
      type: text
      substr: "Set up Shim to run with the following parameters"

composite_rules:
  - id: fltldr-oversized-carrier
    desc: Oversized Office Filter Loader carrier
    crit: suspicious
    conf: 0.98
    size_min: 358400
    all:
      - id: fltldr-internal-name
      - id: fltldr-original-filename

  - id: signed-microsoft-tampered-overlay-pe
    desc: Tampered signed Microsoft PE with embedded payload
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/signed/leaf::microsoft-corporation
      - id: metadata/signed/certificate::pe-signature-digest-mismatch
      - id: metadata/binary/layout::pe-embedded
    unless:
      - id: metadata/signed/certificate::pe-signature-verified-kv

  - id: fltldr-overlay-payload-carrier
    desc: Office Filter Loader carrier with embedded PE
    crit: hostile
    conf: 0.99
    all:
      - id: fltldr-internal-name
      - id: metadata/binary/layout::pe-embedded
    any:
      - id: metadata/signed/certificate::pe-signature-digest-mismatch
      - id: manifest-desc-orbd
      - id: metadata/build/artifact::manifest-version-mismatch

  - id: shimgen-overlay-payload-carrier
    desc: Chocolatey shimgen launcher with overlay PE payload
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/signed/certificate::pe-signature-digest-mismatch
      - id: metadata/binary/layout::pe-embedded
    any:
      - id: chocolatey-shimgen-strings
      - id: chocolatey-shimgen-banner

  - id: signed-tampered-overlay-pe-generic
    desc: Tampered signed PE with embedded PE payload
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/signed/certificate::pe-signature-verified
      - id: metadata/signed/certificate::pe-signature-digest-mismatch
      - id: metadata/binary/layout::multiple-pe-embedded
    unless:
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/binary/installer/sfx::7zip-sfx-archive-profile
      - id: metadata/binary/installer/script::nsis

  - id: signed-microsoft-rwx-overlay-loader
    desc: Tampered Microsoft-signed overlay loader
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/signed/leaf::microsoft-corporation
      - id: metadata/signed/certificate::pe-signature-digest-mismatch
      - id: metadata/binary/layout::overlay-dominates-third
      - id: objectives/anti-static/obfuscation/payload/section::ep-in-last-section-rwx
    any:
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-rsrc-pair
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    unless:
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/binary/installer/script::nsis
