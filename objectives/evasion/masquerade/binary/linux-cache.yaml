# Linux User-Cache Library Masquerade
# Detects payloads dropped under ~/.cache/ disguised as common system
# libraries (libssh, libssl, libcrypto). Legitimate distributions install
# these libraries to /usr/lib or /lib, never to a user-writable cache dir.
# ATT&CK: T1036.005 (Masquerading: Match Legitimate Name or Location)
defaults:
  platforms: [linux]
  for: [go, elf]
  attack: T1036.005
  mbc: F0004
traits:
  - id: masquerade-libssh
    desc: Masquerade as libssh in cache
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: .cache/libssh
  - id: masquerade-libssl
    desc: Masquerade as libssl in cache
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: .cache/libssl
  - id: masquerade-libcrypto
    desc: Masquerade as libcrypto in cache
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: .cache/libcrypto
composite_rules:
  - id: masquerade-lib
    desc: Masquerade as system library
    crit: suspicious
    conf: 0.85
    any:
      - id: masquerade-libssh
      - id: masquerade-libssl
      - id: masquerade-libcrypto
