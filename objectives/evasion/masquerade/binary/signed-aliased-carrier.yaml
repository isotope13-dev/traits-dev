defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036,T1027

# A valid signature does not make a binary benign when its signed image has a
# zeroed DOS stub, hundreds of aliased exports, and a high-entropy overlay.
# This is a structural signed-carrier pattern, not a signer-name allowlist.
composite_rules:
  - id: signed-aliased-high-entropy-carrier
    desc: Signed PE with aliased exports and opaque payload
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
      - id: metadata/binary/anomaly/format::pe-dos-stub-zeroed
      - id: metadata/binary/metrics/pe-details::many-aliased-exports
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay-raw
      - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/

  - id: cert-table-aliased-amsi-payload
    desc: PE certificate table with aliased anti-analysis payload
    crit: hostile
    conf: 0.99
    attack: T1027,T1027.007,T1562.001
    all:
      - id: metadata/binary/layout::cert-table-present
      - id: metadata/binary/metrics/pe-details::many-aliased-exports
      - id: metadata/binary/section/metrics::large-high-entropy-writable-data-section
      - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
      - id: objectives/evasion/anti-av/platform/defender::amsi-memory-patch-hex-bytes
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/
