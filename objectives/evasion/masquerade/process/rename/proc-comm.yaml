defaults:
  platforms: [linux, openwrt]
  for: [c, cpp, elf]
  attack: T1036.004
  mbc: F0004
traits:
  - id: proc-self-comm-path
    desc: Writes Linux process name via /proc/self/comm
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /proc/self/comm
composite_rules:
  - id: proc-comm-kworker-masquerade
    desc: kworker name via /proc/self/comm
    crit: hostile
    conf: 0.98
    all:
      - id: proc-self-comm-path
      - id: objectives/evasion/masquerade/process/name::fake-kworker-cpu-name
    any:
      - id: objectives/evasion/masquerade/process/rename::prctl-setname
      - id: micro-behaviors/process/argument/wipe::memset-argv
      - id: micro-behaviors/process/create/setsid::c-setsid-call
      - id: micro-behaviors/process/create/setsid::import
      - id: micro-behaviors/os/env/vars/access::unsetenv
