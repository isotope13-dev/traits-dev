defaults:
  platforms: [openbsd, bsd, unix]
  for: [go, elf]
  attack: T1036

traits:
  - id: go-argv0-httpd-string
    desc: Go argv0 httpd string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /usr/sbin/httpd

  - id: go-argv0-assignment
    desc: Go assigns argv zero
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: os.Args[0]

composite_rules:
  - id: go-openbsd-httpd-argv-masquerade
    desc: Go OpenBSD httpd argv masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: go-argv0-httpd-string
      - id: go-argv0-assignment

