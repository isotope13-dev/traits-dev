defaults:
  platforms: [openbsd, bsd, unix]
  for: [go, elf]
  attack: T1036

traits:
  - id: go-argv0-httpd-string
    desc: Go argv0 httpd string
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: /usr/sbin/httpd
    unless:
      - type: path
        basename: true
        exact: busybox_versions.go
      - type: basename
        exact: apko

  - id: go-argv0-assignment
    desc: Go argv zero assignment
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'os\.Args\s*\[\s*0\s*\]\s*='

composite_rules:
  - id: go-openbsd-httpd-argv-masquerade
    desc: Go OpenBSD httpd argv masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: go-argv0-httpd-string
      - id: go-argv0-assignment
