---
defaults:
  for:
  - elf
  platforms:
  - linux
  mbc: F0004
traits:
- id: strncpy-argv0
  desc: strncpy on argv[0] (process name
  crit: suspicious
  conf: 0.85
  for:
  - c
  - elf
  if:
    type: text
    regex: strncpy\s*\(\s*argv\s*\[\s*0\s*\]
- id: memset-argv0
  desc: memset on argv[0] (process name
  crit: suspicious
  conf: 0.85
  for:
  - c
  - elf
  if:
    type: text
    regex: memset\s*\(\s*argv\s*\[\s*0\s*\]
  unless:
  - id: well-known/lib/benign-runtime-bundles::php-source-tree
- id: strcpy-argv0
  desc: strcpy on argv[0] (process name
  crit: suspicious
  conf: 0.85
  for:
  - c
  - elf
  if:
    type: text
    regex: strcpy\s*\(\s*argv\s*\[\s*0\s*\]
- id: go-stealth-procname-package
  desc: Go stealth procname package
  crit: suspicious
  conf: 0.92
  attack: T1036.004
  for:
  - go
  - elf
  if:
    type: text
    regex: internal/.{0,80}/stealth/procname(_linux)?\.go
- id: go-stealth-argv-package
  desc: Go stealth argv package
  crit: notable
  conf: 0.85
  attack: T1036.004
  for:
  - go
  - elf
  if:
    type: text
    regex: internal/.{0,80}/stealth/argv\.go
composite_rules:
- id: argv0-manipulation
  desc: Manipulates argv[0] to hide process
  crit: suspicious
  conf: 0.8
  attack: T1036.004
  for:
  - c
  - elf
  any:
  - id: strncpy-argv0
  - id: memset-argv0
  - id: strcpy-argv0
  - id: go-stealth-procname-package
  - id: go-stealth-argv-package
