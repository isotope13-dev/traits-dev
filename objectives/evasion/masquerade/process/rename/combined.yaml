---
defaults:
  for:
  - elf
  - c
  - cpp
  platforms:
  - linux
  mbc: F0004
  attack: T1036.004
composite_rules:
- id: process-and-identity-masquerade
  desc: Process names with identity change
  crit: suspicious
  conf: 0.86
  all:
  - id: micro-behaviors/process/info/current::set-process-name-prctl
  any:
  - id: objectives/evasion/masquerade/process/name::fake-system-process
  - id: objectives/evasion/masquerade/process/name::fake-abrtd
  - id: objectives/evasion/masquerade/process/rename::argv0-manipulation
- id: bpfdoor-style-comp
  desc: System-process masquerade with argv0 rewrite
  crit: hostile
  conf: 0.98
  # Generic technique used by BPFDoor, QLNX, Symbiote, and many Linux
  # implants. Family attribution belongs in well-known/, not here.
  all:
  - id: process-and-identity-masquerade
  any:
  - id: objectives/evasion/masquerade/process/name::fake-abrtd
  - id: objectives/evasion/masquerade/process/name::fake-system-process
  - id: objectives/evasion/masquerade/process/rename::argv0-manipulation
