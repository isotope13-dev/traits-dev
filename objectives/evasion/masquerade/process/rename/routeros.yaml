defaults:
  platforms: [routeros, appliance, unix]
  for: [c, cpp, rust, go, elf]
  attack: T1036

traits:
  - id: routeros-proc-comm-cmdline
    desc: RouterOS proc comm cmdline
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/proc/self/(comm|cmdline)'

  - id: routeros-core-daemon-name
    desc: RouterOS core daemon name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(router|netwatch|dhcp-server|pppoe-server)\b'

  - id: routeros-service-daemon-name
    desc: RouterOS service daemon name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(hotspot|package-updater|ntp-client|snmp)\b'

  - id: routeros-fake-cmdline-path
    desc: RouterOS fake cmdline path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/proc/[0-9.]+/sbin/[a-z0-9-]+ --'

  - id: routeros-fake-status-log
    desc: RouterOS fake status log
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: 'RouterOS v[0-9][\s\S]{0,220}(system resource|interface ether|dhcp lease)'

composite_rules:
  - id: routeros-daemon-name-set
    desc: RouterOS daemon name set
    crit: suspicious
    conf: 0.94
    all:
      - id: routeros-core-daemon-name
      - id: routeros-service-daemon-name

  - id: routeros-process-name-masquerade
    desc: RouterOS process masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-proc-comm-cmdline
      - id: routeros-daemon-name-set
      - id: routeros-fake-cmdline-path

  - id: routeros-fake-daemon-artifacts
    desc: RouterOS fake daemon artifacts
    crit: hostile
    conf: 0.96
    all:
      - id: routeros-daemon-name-set
      - id: routeros-fake-status-log
    any:
      - id: routeros-proc-comm-cmdline
      - id: routeros-fake-cmdline-path
