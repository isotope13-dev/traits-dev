---
defaults:
  for:
  - elf
  - c
  - cpp
  platforms:
  - linux
  - openwrt
traits:
- id: pr-set-name-const
  desc: PR_SET_NAME constant reference
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: 'prctl\s*\(\s*PR_SET_NAME\b|PR_SET_NAME\s*,'
- id: prctl-syscall-x64
  desc: prctl syscall instruction (x86_64)
  crit: suspicious
  conf: 0.9
  for:
  - elf
  - "-go"
  size_max: 10485760
  if:
    type: hex
    section: ".text"
    pattern: B8 9D 00 00 00 0F 05
  unless:
  - id: well-known/tool/development/qemu
  - id: micro-behaviors/dylib/library/libc/
  - id: micro-behaviors/dylib/library/family/
  - id: well-known/app/mcu-ai-debug/
  - id: metadata/binary/linking/runtime::glibc-runtime-markers
composite_rules:
- id: prctl-setname
  desc: Uses prctl to manipulate process state
  crit: suspicious
  conf: 0.8
  mbc: F0004
  attack: T1036.004
  any:
  - id: micro-behaviors/process/control/prctl::prctl-symbol
  - id: pr-set-name-const
  - id: prctl-syscall-x64
  unless:
  - id: well-known/app/kilocode::kilo-code-native-runtime
  - id: well-known/tool/reverse-engineering/frida/
