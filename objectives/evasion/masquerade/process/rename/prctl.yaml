---
defaults:
  for:
  - elf
  platforms:
  - linux
traits:
- id: pr-set-name-const
  desc: PR_SET_NAME constant reference
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: PR_SET_NAME
- id: prctl-syscall-x64
  desc: prctl syscall instruction (x86_64)
  crit: suspicious
  conf: 0.9
  for:
  - elf
  - "-go"
  size_max: 10485760
  if:
    type: hex
    section: ".text"
    pattern: B8 9D 00 00 00 0F 05
  unless:
  - id: well-known/tool/development/qemu
composite_rules:
- id: prctl-setname
  desc: Uses prctl to change process
  crit: suspicious
  conf: 0.8
  mbc: F0004
  attack: T1036.004
  any:
  - id: objectives/evasion/masquerade/identity/daemon::prctl-symbol
  - id: pr-set-name-const
  - id: prctl-syscall-x64
