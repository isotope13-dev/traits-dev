defaults:
  platforms: [linux]
  for: [binaries]
  attack: T1036.004
  mbc: F0004
traits:
  - id: kthread-name-ksoftirqd
    desc: Spoofs ksoftirqd kernel thread name
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\[ksoftirqd/\d{1,3}\]'
  - id: kthread-name-kworker
    desc: Spoofs kworker kernel thread name
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\[kworker/[a-zA-Z0-9_:]{1,12}\]'
  - id: kthread-name-rcu-sched
    desc: Spoofs rcu_sched kernel thread name
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\[rcu_(sched|preempt|bh)\]'
  - id: kthread-name-watchdog
    desc: Spoofs watchdog kernel thread name
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\[watchdog/\d{1,3}\]'
  - id: kthread-name-migration
    desc: Spoofs migration kernel thread name
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\[migration/\d{1,3}\]'
composite_rules:
  - id: kernel-thread-name-spoof
    desc: Multi-name kernel-thread name spoofing
    crit: hostile
    conf: 0.95
    needs: 3
    any:
      - id: kthread-name-ksoftirqd
      - id: kthread-name-kworker
      - id: kthread-name-rcu-sched
      - id: kthread-name-watchdog
      - id: kthread-name-migration
