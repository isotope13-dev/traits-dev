defaults:
  platforms: [unix]
  for: [python]
  attack: T1036.004
  mbc: F0004

traits:
  - id: python-system-like-daemon-fstring
    desc: Python generates a system-like daemon name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'return\s+f["'']\{prefix\}-\{random_id\}-\{suffix\}'

composite_rules:
  - id: python-obfuscated-detached-daemon
    desc: Detached Python daemon with suppressed stdio
    crit: hostile
    conf: 0.98
    all:
      - id: python-system-like-daemon-fstring
      - id: micro-behaviors/process/create/subprocess::subprocess-detached-session
      - id: micro-behaviors/process/create/subprocess::python-subprocess-devnull
