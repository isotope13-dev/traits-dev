defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1036.004

traits:
  - id: dotnet-exec-a-system-name
    desc: .NET exec -a system name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'exec -a (systemd-journald|cron)'

  - id: dotnet-hidden-nohup-shell
    desc: .NET hidden nohup shell
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'nohup /bin/sh[\s\S]{0,120}exec -a'

composite_rules:
  - id: dotnet-process-title-masquerade
    desc: .NET process title masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-exec-a-system-name
      - id: dotnet-hidden-nohup-shell
