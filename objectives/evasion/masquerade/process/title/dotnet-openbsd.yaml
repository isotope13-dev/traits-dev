defaults:
  platforms: [openbsd, bsd, unix]
  for: [csharp]
  attack: T1036

traits:
  - id: dotnet-setproctitle-import
    desc: .NET imports setproctitle
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: extern void setproctitle

  - id: dotnet-openbsd-httpd-title
    desc: .NET spoofs httpd title
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: setproctitle("/usr/sbin/httpd")

composite_rules:
  - id: dotnet-openbsd-httpd-title-masquerade
    desc: .NET OpenBSD httpd title masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-setproctitle-import
      - id: dotnet-openbsd-httpd-title

