# Process masquerade as npm
# Detects code that disguises a malicious binary as the npm package manager
# to evade detection in process listings and naive EDR rules.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell, python]
  attack: T1036
  mbc: F0004
composite_rules:
  - id: npm-binary-masquerade
    desc: Binary masqueraded as npm package manager
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/fs/write/file/npm-masquerade::write-binary-as-npm
      - id: micro-behaviors/fs/write/file/npm-masquerade::chmod-npm-binary
  - id: npm-process-masquerade
    desc: Process masquerade as npm (write + chmod + exec + grep evasion)
    crit: hostile
    conf: 0.96
    all:
      - id: npm-binary-masquerade
      - id: micro-behaviors/fs/write/file/npm-masquerade::exec-local-npm-binary
    any:
      - id: micro-behaviors/process/enumerate/grep::bracketed-grep-npm
