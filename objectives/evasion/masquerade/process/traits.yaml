defaults:
  for:
    - elf
  platforms:
    - linux
traits:
  - id: pr-set-name-const
    desc: PR_SET_NAME constant reference
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: PR_SET_NAME
  - id: prctl-syscall-x64
    desc: prctl syscall instruction (x86_64)
    crit: notable
    conf: 0.9
    for:
      - elf
      - -go
    size_max: 10485760
    if:
      type: hex
      section: .text
      pattern: B8 9D 00 00 00 0F 05
  - id: fake-abrtd-path
    desc: Contains abrtd daemon path
    crit: notable
    conf: 0.85
    mbc: F0004
    if:
      type: text
      substr: /usr/sbin/abrtd
  - id: fake-abrtd-name
    desc: Contains abrtd daemon name
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: abrtd
  - id: fake-sshd-bracket
    desc: Fake kernel thread name pattern
    crit: notable
    conf: 0.85
    mbc: F0004
    if:
      type: text
      substr: '[sshd]'
  - id: fake-kworker
    desc: Fake kernel worker thread name
    crit: notable
    conf: 0.85
    mbc: F0004
    if:
      type: text
      substr: '[kworker/'
  - id: fake-migration
    desc: Fake migration thread name
    crit: notable
    conf: 0.85
    mbc: F0004
    if:
      type: text
      substr: '[migration/'
  - id: fake-ksoftirqd
    desc: Fake ksoftirqd thread name
    crit: notable
    conf: 0.85
    mbc: F0004
    if:
      type: text
      substr: '[ksoftirqd/'
  - id: fake-kthreadd
    desc: Fake kthreadd thread name
    crit: notable
    conf: 0.85
    mbc: F0004
    if:
      type: text
      substr: '[kthreadd]'
  - id: fake-systemd-path
    desc: Contains systemd path (potential masquerade)
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: /lib/systemd/systemd
  - id: fake-udevd-path
    desc: Contains udevd path (potential masquerade)
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: /sbin/udevd
  - id: fake-rsyslogd-path
    desc: Contains rsyslogd path (potential masquerade)
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: /usr/sbin/rsyslogd
  - id: fake-syslogd-path
    desc: Contains syslogd path
    crit: component
    conf: 0.75
    if:
      type: text
      exact: /usr/sbin/syslogd
  - id: fake-dbus-daemon-path
    desc: Contains dbus-daemon path
    crit: component
    conf: 0.75
    if:
      type: text
      exact: /usr/bin/dbus-daemon
  - id: fake-cron-path
    desc: Contains cron daemon path
    crit: component
    conf: 0.7
    if:
      type: text
      exact: /usr/sbin/cron
  - id: fake-crond-path
    desc: Contains crond path (potential masquerade)
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: /usr/sbin/crond
  - id: fake-atd-path
    desc: Contains atd path (potential masquerade)
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: /usr/sbin/atd
  - id: strncpy-argv0
    desc: strncpy on argv[0] (process name
    crit: suspicious
    conf: 0.85
    mbc: F0004
    for:
      - c
      - elf
    if:
      type: text
      regex: strncpy\s*\(\s*argv\s*\[\s*0\s*\]
  - id: memset-argv0
    desc: memset on argv[0] (process name
    crit: suspicious
    conf: 0.85
    mbc: F0004
    for:
      - c
      - elf
    if:
      type: text
      regex: memset\s*\(\s*argv\s*\[\s*0\s*\]
  - id: strcpy-argv0
    desc: strcpy on argv[0] (process name
    crit: suspicious
    conf: 0.85
    mbc: F0004
    for:
      - c
      - elf
    if:
      type: text
      regex: strcpy\s*\(\s*argv\s*\[\s*0\s*\]
composite_rules:
  - id: prctl-setname
    desc: Uses prctl to change process
    crit: notable
    conf: 0.8
    mbc: F0004
    attack: T1036.004
    any:
      - id: objectives/evasion/masquerade/identity::prctl-symbol
      - id: pr-set-name-const
      - id: prctl-syscall-x64
  - id: fake-abrtd
    desc: Masquerades as abrtd daemon (BPFDoor
    crit: suspicious
    conf: 0.95
    mbc: F0004
    attack: T1036.004
    any:
      - id: fake-abrtd-path
      - id: fake-abrtd-name
  - id: fake-system-process
    desc: Contains names of system processes
    crit: suspicious
    conf: 0.75
    mbc: F0004
    attack: T1036.004
    needs: 2
    any:
      - id: fake-sshd-bracket
      - id: fake-kworker
      - id: fake-migration
      - id: fake-ksoftirqd
      - id: fake-kthreadd
      - id: fake-systemd-path
      - id: fake-udevd-path
      - id: fake-rsyslogd-path
      - id: fake-crond-path
      - id: fake-atd-path
  - id: iot-daemon-path-set
    desc: IoT daemon process masquerade set
    crit: suspicious
    conf: 0.92
    mbc: F0004
    attack: T1036.004
    all:
      - id: fake-syslogd-path
      - id: fake-dbus-daemon-path
      - id: fake-cron-path
  - id: argv0-manipulation
    desc: Manipulates argv[0] to hide process
    crit: suspicious
    conf: 0.8
    mbc: F0004
    attack: T1036.004
    for:
      - c
      - elf
    any:
      - id: strncpy-argv0
      - id: memset-argv0
      - id: strcpy-argv0
  - id: bpfdoor-style-comp
    desc: BPFDoor-style process masquerading with anti-forensics
    crit: hostile
    conf: 0.98
    mbc: F0004
    attack: T1036.004
    all:
      - id: prctl-setname
    any:
      - id: fake-abrtd
      - id: fake-system-process
      - id: argv0-manipulation
