defaults:
  platforms: [macos]
  for: [macho, shell, go, c]
  attack: T1036.005
traits:
  - id: replace-app-symbol
    desc: "ReplaceApp app substitution module"
    crit: component
    if:
      type: text
      word: ReplaceApp
  - id: replace-app-icon-artifact
    desc: Reference to replace_app_AppIcon.icns artifact
    crit: component
    if:
      type: text
      word: replace_app_AppIcon.icns
  - id: target-wallet-app-ledger
    desc: Targets Ledger Live for substitution
    crit: component
    if:
      type: text
      word: Ledger Live.app
  - id: target-wallet-app-trezor
    desc: Targets Trezor Suite for substitution
    crit: component
    if:
      type: text
      word: Trezor Suite.app
composite_rules:
  - id: app-substitution-artifacts
    desc: Application substitution artifacts
    crit: component
    any:
      - id: replace-app-symbol
      - id: replace-app-icon-artifact
  - id: app-substitution-targets
    desc: Application substitution targets
    crit: component
    any:
      - id: target-wallet-app-ledger
      - id: target-wallet-app-trezor
  - id: macos-app-substitution
    desc: macOS application substitution / hijacking detected
    crit: hostile
    conf: 0.98
    all:
      - id: app-substitution-artifacts
      - id: app-substitution-targets
