# Process Title Masquerading - JavaScript/Node.js
# Detects process.title manipulation to disguise Node.js processes
# ATT&CK: T1036 (Masquerading)
# MBC: F0004 (Process Name Spoofing)
defaults:
  attack: T1036
  mbc: F0004
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: process-title-npm-masquerade
    desc: Process title set to npm-like name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "process\\.title\\s*=\\s*['\"]npm-"
  - id: process-title-daemon-masquerade
    desc: Process title set to daemon-like name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "process\\.title\\s*=\\s*['\"][a-z]+-daemon['\"]"
  - id: process-title-service-masquerade
    desc: Process title set to service-like name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "process\\.title\\s*=\\s*['\"][a-z]+-compiler"
