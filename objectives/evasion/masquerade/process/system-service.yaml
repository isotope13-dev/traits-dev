# System Service Masquerade
# Detects malicious binaries masquerading as system services.
# ATT&CK: T1036.004 (Masquerade Task or Service)
defaults:
  platforms: [unix]
  for: [scripts, shell, binaries, elf]
traits:
- id: systemd-masquerade-path--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: dbus-daemon
    case_insensitive: true
- id: systemd-masquerade-path--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: syslogd
    case_insensitive: true
- id: systemd-masquerade-path--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: systemd
    case_insensitive: true
- id: systemd-masquerade-path--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: var/tmp
    case_insensitive: true
- id: systemd-masquerade-path--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: home
    case_insensitive: true
- id: systemd-masquerade-path--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: sshd
    case_insensitive: true
- id: systemd-masquerade-reference--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: systemd
    case_insensitive: true
- id: systemd-masquerade-reference--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: var/tmp
    case_insensitive: true
- id: systemd-masquerade-reference--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: home
    case_insensitive: true
composite_rules:
- id: system-service-masquerade
  desc: System service masquerade in suspicious path
  crit: hostile
  conf: 0.95
  any:
  - id: systemd-masquerade-path
  - id: systemd-masquerade-reference
- id: systemd-masquerade-path
  desc: System service name in writable path
  crit: suspicious
  conf: 0.95
  any:
  - id: systemd-masquerade-path--rx-1
  - id: systemd-masquerade-path--rx-2
  - id: systemd-masquerade-path--rx-3
  - id: systemd-masquerade-path--rx-4
  - id: systemd-masquerade-path--rx-5
  - id: systemd-masquerade-path--rx-6
  needs: 1
  unless:
  - type: basename
    regex: '^systemd-[a-z0-9-]+$'

- id: systemd-masquerade-reference
  desc: References systemd process in writable path
  crit: suspicious
  conf: 0.85
  any:
  - id: systemd-masquerade-reference--rx-7
  - id: systemd-masquerade-reference--rx-8
  - id: systemd-masquerade-reference--rx-9
  needs: 1
