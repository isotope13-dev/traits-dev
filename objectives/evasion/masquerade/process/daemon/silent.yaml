defaults:
  platforms: [unix, windows, macos]
# Silent Daemon Persistence with Masquerading
# Detects background process creation combined with generic/misleading identity
composite_rules:
  - id: silent-daemon-masquerade
    desc: Silent background daemon with masqueraded identity
    crit: hostile
    conf: 0.95
    attack: T1543.001
    platforms: [macos]
    for: [macho]
    scope: leaf
    all:
      - id: objectives/persistence/system/daemon/init::daemon-fork
      - id: micro-behaviors/process/create/setsid::import
    any:
      - id: objectives/evasion/masquerade/naming/placeholder::generic-bundle-id-pattern
      - id: objectives/evasion/masquerade/naming/placeholder::generic-executable-name-1
      - id: objectives/evasion/masquerade/naming/placeholder::generic-executable-name-2
    unless:
      - id: well-known/lib/jruby::runtime-context
