defaults:
  for:
    - pe
    - rust
  platforms:
    - windows
  attack: T1036.005
  mbc: F0004
traits:
  - id: audiodg-name
    desc: audiodg.exe process name
    crit: component
    conf: 0.8
    if:
      type: text
      word: audiodg.exe
  - id: wininit-name
    desc: wininit.exe process name
    crit: component
    conf: 0.8
    if:
      type: text
      word: wininit.exe
  - id: taskhost-name
    desc: taskhost.exe process name
    crit: component
    conf: 0.8
    if:
      type: text
      word: taskhost.exe
  - id: svchost-name
    desc: svchost.exe process name
    crit: component
    conf: 0.8
    if:
      type: text
      word: svchost.exe
  - id: lsass-name
    desc: lsass.exe process name
    crit: component
    conf: 0.82
    if:
      type: text
      word: lsass.exe
  - id: winlogon-name
    desc: winlogon.exe process name
    crit: component
    conf: 0.82
    if:
      type: text
      word: winlogon.exe
  - id: explorer-name
    desc: explorer.exe process name
    crit: component
    conf: 0.8
    if:
      type: text
      word: explorer.exe
  - id: fontdrvhost-name
    desc: fontdrvhost.exe process name
    crit: component
    conf: 0.84
    if:
      type: text
      word: fontdrvhost.exe
  - id: chrpssdecr-name
    desc: ChrPssDecr executable name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: ChrPssDecr.exe
composite_rules:
  - id: unsigned-system-process-name-set
    desc: Unsigned binary embeds many system process names
    crit: suspicious
    conf: 0.93
    any:
      - id: audiodg-name
      - id: wininit-name
      - id: taskhost-name
      - id: svchost-name
      - id: lsass-name
      - id: winlogon-name
      - id: explorer-name
      - id: fontdrvhost-name
    needs: 6
    unless:
      - id: metadata/signed/
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-versioninfo
        - id: metadata/signed/platform/
        - id: metadata/binary/metrics/structural::many-imports
