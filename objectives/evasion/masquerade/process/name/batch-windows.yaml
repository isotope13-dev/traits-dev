defaults:
  platforms: [windows]
  for: [batch]
  attack: T1036.004

traits:
  - id: batch-fake-svchost-drop
    desc: Batch fake svchost drop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'set\s+FAKE_BIN=.{0,80}\\svchost\.exe'
      case_insensitive: true

  - id: batch-real-svchost-cover-start
    desc: Batch real svchost cover start
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'System32\svchost.exe'

composite_rules:
  - id: batch-svchost-task-masquerade
    desc: Batch svchost task masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: batch-fake-svchost-drop
      - id: batch-real-svchost-cover-start
      - id: micro-behaviors/os/autorun/scheduled::schtasks-runlevel-highest
