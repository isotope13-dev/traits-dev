defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
- id: system-like-scheduled-task-name
  desc: Scheduled task uses system-like name
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)/tn\s+"[A-Za-z0-9_-]{0,24}(update|service|security|defender)
composite_rules:
- id: masqueraded-elevated-logon-task
  desc: Masqueraded elevated logon task
  crit: hostile
  conf: 0.98
  attack: T1036
  all:
  - id: system-like-scheduled-task-name
  - id: objectives/persistence/login/scheduled-task/cli::schtasks-self-payload-command
