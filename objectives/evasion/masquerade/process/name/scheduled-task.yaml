defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
- id: system-like-scheduled-task-name
  desc: Scheduled task uses system-like name
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)/tn\s+"[A-Za-z0-9_-]{0,24}(update|service|security|defender)
composite_rules:
- id: rar-staged-masqueraded-elevated-logon-task
  desc: Unsigned RAR-staged masqueraded elevated logon task
  crit: hostile
  conf: 0.99
  attack: T1036,T1053.005,T1027.009
  all:
  - id: system-like-scheduled-task-name
  - id: objectives/persistence/login/scheduled-task/cli::windows-schtasks-onlogon-highest
  - id: micro-behaviors/data/embedded/payload/archive::rar-magic
  - id: metadata/signed/trust-level::unsigned
- id: masqueraded-elevated-logon-runas-persist
  desc: System-named elevated logon task with runas relaunch
  crit: hostile
  conf: 0.97
  attack: T1036.004,T1053.005,T1548.002
  all:
  - id: system-like-scheduled-task-name
  - id: objectives/persistence/login/scheduled-task/cli::windows-schtasks-onlogon-highest
  - id: micro-behaviors/os/privilege/elevation::runas-elevation-token
  - id: micro-behaviors/process/create/exec::shell-execute-ex
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
