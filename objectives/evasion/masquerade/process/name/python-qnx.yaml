defaults:
  platforms: [qnx, unix]
  for: [python, pyc]
  attack: T1036.004

traits:
  - id: qnx-python-proc-comm-write
    desc: QNX Python proc comm write
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/tool/development/bazel-diff::bazel-diff-bzlmod-test-fixture
      - id: micro-behaviors/process/control/prctl::linux-libc-prctl-fallback
    if:
      type: text
      regex: 'open\([^)]{0,120}/proc/(self|\{?pid\}?|[0-9]{1,10})/comm[^)]{0,80}["'']w'

  - id: qnx-python-proc-cmdline-write
    desc: QNX Python proc cmdline write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'open\([^)]{0,120}/proc/(self|\{?pid\}?|[0-9]{1,10})/cmdline[^)]{0,80}["'']w'

  - id: qnx-python-process-sh-mask
    desc: QNX Python sh process mask
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'comm_modified[\s\S]{0,160}cmdline_modified'

  - id: qnx-pyc-process-sh-mask
    desc: QNX pyc comm modified flag
    crit: suspicious
    conf: 0.94
    for: [pyc]
    if:
      type: text
      substr: comm_modified

  - id: qnx-pyc-cmdline-modified
    desc: QNX pyc cmdline modified flag
    crit: suspicious
    conf: 0.94
    for: [pyc]
    if:
      type: text
      substr: cmdline_modified

composite_rules:
  - id: qnx-python-proc-title-masquerade
    desc: QNX Python proc title masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-python-proc-comm-write
      - id: qnx-python-proc-cmdline-write
      - id: qnx-python-process-sh-mask

  - id: qnx-pyc-proc-title-masquerade
    desc: QNX pyc proc title masquerade
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: qnx-python-proc-comm-write
      - id: qnx-python-proc-cmdline-write
      - id: qnx-pyc-process-sh-mask
      - id: qnx-pyc-cmdline-modified
