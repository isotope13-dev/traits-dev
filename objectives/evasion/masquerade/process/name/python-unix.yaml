defaults:
  platforms: [unix, appliance]
  for: [python, pyc]
  attack: T1036.004

traits:
  - id: python-vxworks-task-aliases
    desc: Python VxWorks task aliases
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: 'netTask[\s\S]{0,160}(hostMon|bootMon)|hostMon[\s\S]{0,160}bootMon'

  - id: python-vxworks-env-mask
    desc: Python VxWorks env mask
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'VxWorks>[\s\S]{0,120}vt100'

composite_rules:
  - id: python-proc-self-comm-target
    desc: Python proc self comm target
    crit: suspicious
    conf: 0.92
    for: [python]
    all:
      - id: micro-behaviors/fs/proc/info/path::process-self-comm
    unless:
      - id: well-known/tool/development/bazel-diff::bazel-diff-bzlmod-test-fixture
      - id: micro-behaviors/process/control/prctl::linux-libc-prctl-fallback

  - id: python-vxworks-process-masquerade
    desc: Python VxWorks process masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: python-proc-self-comm-target
      - id: python-vxworks-task-aliases
    any:
      - id: python-vxworks-env-mask
      - id: objectives/evasion/masquerade/process/name::qnx-python-proc-cmdline-write

  - id: python-pyc-vxworks-masquerade
    desc: Python bytecode process mask
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: micro-behaviors/fs/proc/info/path::process-self-comm
      - id: python-vxworks-task-aliases
