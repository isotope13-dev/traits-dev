---
defaults:
  for:
  - elf
  - c
  - cpp
  platforms:
  - linux
  - openwrt
traits:
- id: fake-abrtd-path
  desc: Contains abrtd daemon path
  crit: suspicious
  conf: 0.85
  mbc: F0004
  if:
    type: text
    substr: "/usr/sbin/abrtd"
- id: fake-abrtd-name
  desc: Contains abrtd daemon name
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: abrtd
- id: fake-sshd-bracket
  desc: Fake kernel thread name pattern
  crit: suspicious
  conf: 0.85
  mbc: F0004
  if:
    type: text
    substr: "[sshd]"
- id: fake-kworker
  desc: Fake kernel worker thread name
  crit: suspicious
  conf: 0.85
  mbc: F0004
  if:
    type: text
    substr: "[kworker/"
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: fake-kworker-name
  desc: Kernel worker process name
  crit: notable
  conf: 0.78
  mbc: F0004
  if:
    type: text
    exact: kworker
- id: fake-kworker-cpu-name
  desc: Kernel worker CPU process name
  crit: suspicious
  conf: 0.9
  mbc: F0004
  attack: T1036.004
  if:
    type: text
    regex: '\bkworker/[0-9]+(:[0-9]+)?\b'
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: fake-migration
  desc: Fake migration thread name
  crit: suspicious
  conf: 0.85
  mbc: F0004
  if:
    type: text
    substr: "[migration/"
- id: fake-ksoftirqd
  desc: Fake ksoftirqd thread name
  crit: suspicious
  conf: 0.85
  mbc: F0004
  if:
    type: text
    substr: "[ksoftirqd/"
- id: fake-ksoftirqd-name
  desc: ksoftirqd process name
  crit: notable
  conf: 0.82
  mbc: F0004
  if:
    type: text
    exact: ksoftirqd
- id: fake-ksoftirqd-cpu-name
  desc: ksoftirqd CPU process name
  crit: suspicious
  conf: 0.92
  mbc: F0004
  attack: T1036.004
  if:
    type: text
    regex: "^ksoftirqd/[0-9]+$"
- id: fake-kthreadd
  desc: Fake kthreadd thread name
  crit: suspicious
  conf: 0.85
  mbc: F0004
  if:
    type: text
    substr: "[kthreadd]"
- id: fake-systemd-path
  desc: Contains systemd path (potential masquerade)
  crit: component
  conf: 0.6
  if:
    type: text
    substr: "/lib/systemd/systemd"
- id: fake-udevd-path
  desc: Contains udevd path (potential masquerade)
  crit: suspicious
  conf: 0.6
  if:
    type: text
    substr: "/sbin/udevd"
- id: fake-rsyslogd-path
  desc: Contains rsyslogd path (potential masquerade)
  crit: suspicious
  conf: 0.6
  if:
    type: text
    substr: "/usr/sbin/rsyslogd"
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: fake-syslogd-path
  desc: Contains syslogd path
  crit: component
  conf: 0.75
  if:
    type: text
    exact: "/usr/sbin/syslogd"
- id: fake-dbus-daemon-path
  desc: Contains dbus-daemon path
  crit: component
  conf: 0.75
  if:
    type: text
    exact: "/usr/bin/dbus-daemon"
- id: fake-cron-path
  desc: Contains cron daemon path
  crit: component
  conf: 0.7
  if:
    type: text
    exact: "/usr/sbin/cron"
- id: fake-crond-path
  desc: Contains crond path (potential masquerade)
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: "/usr/sbin/crond"
  unless:
  - type: basename
    exact: apko
- id: fake-cron-foreground-path
  desc: Contains cron -f foreground command line
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: "/usr/sbin/cron -f"
- id: fake-postfix-master-path
  desc: Contains postfix master daemon path
  crit: suspicious
  conf: 0.7
  mbc: F0004
  if:
    type: text
    substr: "/usr/libexec/postfix/master"
- id: fake-upowerd-path
  desc: Contains upowerd daemon path
  crit: suspicious
  conf: 0.7
  mbc: F0004
  if:
    type: text
    substr: "/usr/libexec/upowerd"
- id: fake-gdm-auth-session
  desc: Contains GDM auth session name
  crit: suspicious
  conf: 0.7
  mbc: F0004
  if:
    type: text
    substr: gdm/auth-session
- id: fake-hald-runner
  desc: Contains HAL daemon runner name
  crit: suspicious
  conf: 0.7
  mbc: F0004
  if:
    type: text
    substr: hald-runner
- id: fake-hald-addon-input
  desc: Contains HAL input daemon name
  crit: suspicious
  conf: 0.72
  mbc: F0004
  if:
    type: text
    substr: 'hald-addon-input: Listening on /dev/input/event'
- id: fake-dbus-socket
  desc: Contains dbus socket masquerade
  crit: suspicious
  conf: 0.72
  mbc: F0004
  if:
    type: text
    substr: dbus/dbus_socket
- id: fake-chronyd-path
  desc: Contains chronyd daemon path
  crit: suspicious
  conf: 0.62
  mbc: F0004
  if:
    type: text
    substr: "/usr/sbin/chronyd"
- id: fake-polkitd-path
  desc: Contains polkitd daemon path
  crit: suspicious
  conf: 0.62
  mbc: F0004
  if:
    type: text
    substr: "/usr/lib/polkit-1/polkitd"
- id: fake-tuned-path
  desc: Contains tuned daemon path
  crit: suspicious
  conf: 0.62
  mbc: F0004
  if:
    type: text
    substr: "/usr/sbin/tuned"
- id: fake-watchdogd-bracket
  desc: Fake watchdog kernel thread
  crit: suspicious
  conf: 0.72
  mbc: F0004
  if:
    type: text
    substr: "[watchdogd]"
- id: fake-kaluad-charger-bracket
  desc: Fake kernel thread pair
  crit: suspicious
  conf: 0.72
  mbc: F0004
  if:
    type: text
    substr: "[kaluad_sync][charger_manager]"
- id: fake-atd-path
  desc: Contains atd path (potential masquerade)
  crit: suspicious
  conf: 0.6
  if:
    type: text
    substr: "/usr/sbin/atd"
composite_rules:
- id: fake-abrtd
  desc: Masquerades as abrtd daemon (BPFDoor
  crit: suspicious
  conf: 0.95
  mbc: F0004
  attack: T1036.004
  any:
  - id: fake-abrtd-path
  - id: fake-abrtd-name
- id: fake-system-process
  desc: Contains names of system processes
  crit: suspicious
  conf: 0.75
  mbc: F0004
  attack: T1036.004
  needs: 2
  any:
  - id: fake-sshd-bracket
  - id: fake-kworker
  - id: fake-kworker-name
  - id: fake-kworker-cpu-name
  - id: fake-migration
  - id: fake-ksoftirqd
  - id: fake-ksoftirqd-name
  - id: fake-ksoftirqd-cpu-name
  - id: fake-kthreadd
  - id: fake-systemd-path
  - id: fake-udevd-path
  - id: fake-rsyslogd-path
  - id: fake-crond-path
  - id: fake-upowerd-path
  - id: fake-gdm-auth-session
  - id: fake-hald-runner
  - id: fake-hald-addon-input
  - id: fake-dbus-socket
  - id: fake-chronyd-path
  - id: fake-polkitd-path
  - id: micro-behaviors/os/service/config::networkmanager-daemon-path
  - id: fake-tuned-path
  - id: fake-watchdogd-bracket
  - id: fake-kaluad-charger-bracket
  - id: fake-atd-path
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: iot-daemon-path-set
  desc: IoT daemon process masquerade set
  crit: suspicious
  conf: 0.92
  mbc: F0004
  attack: T1036.004
  all:
  - id: fake-syslogd-path
  - id: fake-dbus-daemon-path
  - id: fake-cron-path
- id: kworker-ksoftirqd-masquerade
  desc: Kernel worker softirq masquerade
  crit: suspicious
  conf: 0.96
  mbc: F0004
  attack: T1036.004
  all:
  - id: fake-ksoftirqd-name
  any:
  - id: fake-kworker-name
  - id: fake-kworker-cpu-name
- id: daemon-helper-name-masquerade
  desc: Cluster of fake daemon helper process names
  crit: suspicious
  conf: 0.94
  mbc: F0004
  attack: T1036.004
  for: [elf]
  all:
  - id: micro-behaviors/process/info/commandline::daemon-helper-name-cluster
  - id: micro-behaviors/os/service/config::system-helper-description
- id: c2-daemon-helper-masquerade-bot
  desc: C2 endpoint with daemon-helper process masquerade
  crit: hostile
  conf: 0.97
  mbc: B0030
  attack: T1036.004,T1071
  for: [elf]
  platforms: [linux]
  all:
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-elf
  - id: daemon-helper-name-masquerade

- id: multiarch-daemon-helper-iot-bot
  desc: Multi-arch IoT bot with daemon-helper masquerade
  crit: hostile
  conf: 0.97
  mbc: B0030
  attack: T1036.004,T1071
  for: [elf]
  platforms: [linux]
  all:
  - id: daemon-helper-name-masquerade
  - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-bot-suffix-cluster
  any:
  - id: micro-behaviors/fs/path/device/special::multi-watchdog-device-cluster
  - id: micro-behaviors/communications/socket/syscall::arm-direct-network-syscalls
  - id: objectives/persistence/login/shell/tasking::native-pipe-crontab-install

- id: flood-bot-daemon-masquerade
  desc: Multi-vector flood bot with daemon-name masquerade
  crit: hostile
  conf: 0.99
  mbc: B0042
  attack: T1498.001,T1036.004
  for: [elf]
  all:
  - id: daemon-helper-name-masquerade
  - id: objectives/impact/dos/multi-vector::multi-vector-attack-method-cluster
