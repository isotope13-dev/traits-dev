defaults:
  platforms: [netscaler, appliance, unix]
  for: [lua]
  attack: T1036

traits:
  - id: lua-hidden-cache-masq-dir
    desc: Lua hidden cache masquerade dir
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.cache

  - id: lua-systemd-journald-decoy
    desc: Lua systemd-journald decoy
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: systemd-journald

  - id: lua-health-check-symlink
    desc: Lua health_check symlink
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ln -sf /bin/cat[\s\S]{0,80}health_check'

  - id: lua-cron-daily-decoy
    desc: Lua cron.daily decoy
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /cron.daily

composite_rules:
  - id: lua-service-name-masquerade
    desc: Lua service name masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: lua-hidden-cache-masq-dir
      - id: lua-systemd-journald-decoy
    any:
      - id: lua-health-check-symlink
      - id: lua-cron-daily-decoy
