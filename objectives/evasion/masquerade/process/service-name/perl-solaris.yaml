defaults:
  platforms: [solaris, unix]
  for: [perl]
  attack: T1036

traits:
  - id: perl-solaris-pkg-client-name
    desc: Perl Solaris pkg client name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: my $fake_process_name = "pkg.client"

  - id: perl-pkg-depotd-argv0
    desc: Perl pkg.depotd argv0
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: $0 = "/usr/lib/pkg.depotd/$fake_process_name"

  - id: perl-solaris-update-log
    desc: Perl Solaris update log
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: "pkg.client: Starting system package verification"

composite_rules:
  - id: perl-solaris-pkg-client-masquerade
    desc: Perl Solaris pkg client mask
    crit: hostile
    conf: 0.98
    all:
      - id: perl-solaris-pkg-client-name
      - id: perl-pkg-depotd-argv0
    any:
      - id: perl-solaris-update-log
