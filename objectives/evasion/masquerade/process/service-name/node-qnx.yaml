defaults:
  platforms: [qnx, unix]
  for: [javascript, typescript]
  attack: T1036.004

traits:
  - id: qnx-node-service-fake-name
    desc: QNX Node service fake name
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "(FAKE_NAME|process\\.title)\\s*=\\s*['\"]qnx-[A-Za-z0-9_.-]{3,48}['\"]"

  - id: qnx-node-service-pid-path
    desc: QNX Node service pid path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/run/qnx-[A-Za-z0-9_.-]{3,48}\.pid'

composite_rules:
  - id: qnx-node-service-impersonation
    desc: QNX Node service impersonation
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-service-fake-name
      - id: qnx-node-service-pid-path
