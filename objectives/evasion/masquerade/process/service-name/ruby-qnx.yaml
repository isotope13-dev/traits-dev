defaults:
  platforms: [qnx, unix]
  for: [ruby]
  attack: T1036.004

traits:
  - id: qnx-ruby-health-monitor-title
    desc: QNX Ruby health monitor title
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: system-health-monitor

  - id: qnx-ruby-decoy-health-logs
    desc: QNX Ruby decoy health logs
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /var/log/system-health

  - id: qnx-ruby-decoy-c2-report
    desc: QNX Ruby decoy C2 report
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/decoy

composite_rules:
  - id: qnx-ruby-decoy-service-mask
    desc: QNX Ruby decoy service mask
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-ruby-health-monitor-title
      - id: qnx-ruby-decoy-health-logs
      - id: qnx-ruby-decoy-c2-report
