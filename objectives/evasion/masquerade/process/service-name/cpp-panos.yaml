defaults:
  platforms: [panos, appliance, unix]
  for: [cpp, elf]
  attack: T1036

traits:
  - id: cpp-panos-kworker-comm-name
    desc: C++ PAN-OS kworker comm name
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: kworker/0:1H

composite_rules:
  - id: cpp-panos-kworker-comm-masquerade
    desc: C++ PAN-OS kworker masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: cpp-panos-kworker-comm-name
      - id: micro-behaviors/fs/proc/info/path::process-self-comm
