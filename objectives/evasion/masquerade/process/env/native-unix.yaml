defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1036.004

traits:
  - id: native-system-process-name
    desc: Native system process name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'PR_SETNAME[\s\S]{0,120}"(sched|kworker|svcd)"'

  - id: native-pr-setname-call
    desc: Native PR_SETNAME call
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: PR_SETNAME

  - id: native-sched-name-string
    desc: Native sched name string
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: '"sched"'

  - id: native-shell-env-scrub
    desc: Native shell env scrub
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'unsetenv\s*\(\s*"HISTFILE"[\s\S]{0,260}unsetenv\s*\(\s*"LD_PRELOAD"'

composite_rules:
  - id: native-process-env-masquerade
    desc: Native process env masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: native-system-process-name
      - id: native-shell-env-scrub

  - id: native-pr-setname-env-masquerade
    desc: Native PR_SETNAME masquerade
    crit: hostile
    conf: 0.97
    all:
      - id: native-pr-setname-call
      - id: native-sched-name-string
      - id: native-shell-env-scrub
