defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004

traits:
  - id: encoded-spoolsv-webfolders-drop-path
    desc: Encoded spoolsv Web Folders drop path
    crit: component
    conf: 0.99
    if:
      type: text
      exact: 4KnLz/H8BPH++r/l9vsC8Mvg/Pr6/P2/5fb7AvDL2vYA8fzw/AXzv9D3/vECA8vUAgG/5fz7AwLx8Muur7Cwy/Dv/Pz78PW9AucCnw==
  - id: flash-install-log-decoy-path
    desc: Flash install log decoy path
    crit: component
    conf: 0.95
    if:
      type: text
      exact: c:\windows\system32\Macromed\Flash\FlashInstall.log

composite_rules:
  - id: spoolsv-deep-microsoft-directory-masquerade
    desc: Spoolsv drop in Microsoft Web Folders
    crit: suspicious
    conf: 0.99
    all:
      - id: encoded-spoolsv-webfolders-drop-path
      - id: micro-behaviors/fs/directory/mkdir::make-sure-directory-path-exists
    any:
      - id: flash-install-log-decoy-path
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::base64-arithmetic-xor-decoder
