# System Service Masquerade
# Detects binaries / scripts that drop a file with a system-service name
# (systemd, sshd, dbus-daemon) into a user-writable path (/tmp, /var/tmp,
# /dev/shm, /home/<user>) — the canonical Linux process-name spoofing
# pattern. The path is part of every atomic regex so a bare mention of
# "systemd" or "home" in a script can never escalate to hostile.
# ATT&CK: T1036.004 (Masquerade Task or Service)
defaults:
  platforms: [unix]
  for: [scripts, shell, binaries, elf]
  crit: suspicious
  conf: 0.95
traits:
  - id: service-name-in-tmp
    desc: System service name in /tmp or /var/tmp
    if:
      type: text
      regex: '/(tmp|var/tmp)/(systemd|sshd|dbus-daemon)\b'
  - id: service-name-in-shm
    desc: System service name in /dev/shm
    if:
      type: text
      regex: '/dev/shm/(systemd|sshd|dbus-daemon)\b'
  - id: service-name-in-home
    desc: System service name under a /home/<user>/ directory
    if:
      type: text
      regex: '/home/[a-z0-9_-]{1,32}/(systemd|sshd|dbus-daemon)\b'
  - id: service-name-in-run-user
    desc: System service name in /run/user/<uid>/
    if:
      type: text
      regex: '/run/user/[0-9]{1,6}/(systemd|sshd|dbus-daemon)\b'
  - id: legitimate-systemd-helper-basename
    desc: Legitimate systemd-* helper basename
    crit: component
    conf: 1.0
    if:
      type: basename
      regex: '^systemd-[a-z0-9-]+$'
composite_rules:
  - id: system-service-masquerade
    desc: Binary masquerading as a system service from a user-writable path
    crit: hostile
    conf: 0.95
    any:
      - id: service-name-in-tmp
      - id: service-name-in-shm
      - id: service-name-in-home
      - id: service-name-in-run-user
    unless:
      - id: legitimate-systemd-helper-basename
