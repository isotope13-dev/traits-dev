defaults:
  platforms: [unix]
  for: [elf, shell, text]
  attack: T1036.004
traits:
  - id: top-basename
    desc: top process basename
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      exact: top
  - id: shell-renames-xmrig-top
    desc: Shell renames XMRig as top
    crit: suspicious
    conf: 0.95
    for: [shell, text]
    if:
      type: text
      regex: '\b(mv|cp)\b[^\n]{0,120}\bxmrig\b[^\n]{0,120}\btop\b'
  - id: shm-top-execution
    desc: Executes top from shared memory
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/dev/shm/[A-Za-z0-9._/-]{0,80}/top\b'
composite_rules:
  - id: xmrig-masquerades-as-top
    desc: XMRig masquerades as top
    crit: hostile
    conf: 0.98
    all:
      - id: top-basename
    any:
      - id: objectives/impact/cryptojacking/miner/context::xmrig
  - id: shell-stages-xmrig-as-top
    desc: Shell stages XMRig as top
    crit: hostile
    conf: 0.97
    all:
      - id: shell-renames-xmrig-top
    any:
      - id: shm-top-execution
      - id: micro-behaviors/process/create/shell/invoke::shell-execution-shm
      - id: objectives/impact/cryptojacking/miner/tunnel::ssh-local-mining-tunnel
