# Defense-evasion masquerade (T1036.008): an installer conceals an executable
# second-stage payload as a benign, non-installable "backup"/data file so it is
# overlooked on disk and by casual inspection of the package. Scoped to Windows
# Installer packages that also bundle a runtime API-hooking framework
# (madCollection: madExcept + the maddisAsm runtime disassembler), which is the
# instrumentation a Delphi loader uses to unpack and run the concealed blob — the
# combination that separates this from a benign installer that merely happens to
# carry a data file. Structure-based; no per-sample string hardcoding.
defaults:
  for: [all]
  platforms: [windows]
composite_rules:
  - id: installer-payload-masquerade-backup-file
    desc: Installer hides a payload as backup
    crit: hostile
    conf: 0.9
    mbc: "F0004, E1105"
    attack: "T1036.008, T1027"
    all:
      - id: metadata/file/profile/identity::msi-format-database-title
      - id: metadata/file/profile/identity::msi-disguised-backup-component
      - id: metadata/file/profile/identity::msi-madcollection-runtime-bundle
