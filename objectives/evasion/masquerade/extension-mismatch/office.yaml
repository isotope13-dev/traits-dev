defaults:
  platforms: [windows, unix]
  for: [oledoc]
  attack: T1036.008

composite_rules:
  - id: macro-olelink-extension-masquerade
    desc: Macro-bearing OLE link document uses a wrong extension
    crit: hostile
    conf: 0.98
    attack: "T1036.008,T1204.002"
    all:
      - id: metadata/file/extension/identity::document-content-extension-mismatch
      - id: metadata/document/ole::ole-vba-macro-count
      - id: objectives/execution/interpreter/document::stdolelink-dangerous-clsid
