# System binaries copied to randomized .log filenames in writable
# staging directories. Observed in SHADOW-EARTH-053 where net.exe and
# powershell.exe were copied to C:\ProgramData with names like
# $D5PLAA1.log, $9XF5WLD.log, $VMB9AIT.log to defeat process-name-based
# detection. The .log extension is benign but the file is actually a PE.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell]
  attack: T1036.008
traits:
- id: dollar-random-log-name
  desc: Dollar-token .log filename
  crit: suspicious
  conf: 0.85
  if:
    type: path
    basename: true
    regex: '^\$[A-Z0-9]{5,12}\.log$'
- id: dollar-random-log-cmdline--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(copy|cp|Copy-Item)\s+\S{0,80}(net|powershell)\.exe\s+\S{0,80}\$[A-Za-z0-9]{4,}\.log'
    case_insensitive: true
  count_max: 1024399
- id: dollar-random-log-cmdline--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(copy|cp|Copy-Item)\s+\S{0,80}(cmd|wmic)\.exe\s+\S{0,80}\$[A-Za-z0-9]{4,}\.log'
    case_insensitive: true
  count_max: 1024400
- id: dollar-random-log-cmdline--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(copy|cp|Copy-Item)\s+\S{0,80}(nltest|whoami)\.exe\s+\S{0,80}\$[A-Za-z0-9]{4,}\.log'
    case_insensitive: true
  count_max: 1024401
- id: programdata-dollar-log-write
  desc: Writes $RANDOM.log into ProgramData
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'ProgramData\\\\?\$[A-Z0-9]{4,12}\.log'
composite_rules:
- id: random-log-binary-masquerade
  desc: System binary masqueraded as $RANDOM.log
  crit: hostile
  conf: 0.95
  any:
  - id: dollar-random-log-cmdline
  - id: programdata-dollar-log-write
  - id: dollar-random-log-name
- id: dollar-random-log-cmdline
  desc: Copies system binary to $RANDOM.log
  crit: suspicious
  conf: 0.92
  any:
  - id: dollar-random-log-cmdline--rx-1
  - id: dollar-random-log-cmdline--rx-2
  - id: dollar-random-log-cmdline--rx-3
