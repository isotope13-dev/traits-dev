defaults:
  platforms: [windows, linux, macos]
  crit: suspicious
  conf: 0.9
  attack: T1036.008
traits:
  # Image-format mismatches (JPEG-named-.png, PNG-named-.jpg, etc.) are extremely
  # common and benign — a renderable raster with the wrong extension is not a hidden
  # payload. Only executable/script content disguised as an image is the real
  # masquerade (T1036.008), so these atoms gate on `for: [scripts, elf, macho, pe]`
  # and the benign image-as-image case is a non-surfacing building block.
  - id: not-png-as-png
    desc: Non-PNG content with .png extension
    crit: suspicious
    for: [scripts, elf, macho, pe, -png]
    if:
      type: basename
      regex: (?i)\.png$
    unless:
      # Executables/scripts under a samples//tests/ path are deliberate test fixtures.
      - type: basename
        regex: '(?i)(^|[\\/!])(samples?|tests?)[\\/!].*\.png$'
  # NOTE: a JPEG named .png (even one carrying Photoshop metadata) is just the common
  # benign image-as-image mismatch — no separate "carrier" trait. Genuine hidden payloads
  # in images are caught by polyglot / appended-archive / embedded-PE detection, not by
  # the extension mismatch.
  - id: not-jpeg-as-jpeg
    desc: Non-JPEG content with .jpg/.jpeg extension
    crit: suspicious
    for: [scripts, elf, macho, pe, -jpeg]
    if:
      type: basename
      regex: (?i)\.(jpe?g)$
  - id: binary-as-pdf
    desc: Binary disguised as PDF document
    for: [elf, macho, pe]
    if:
      type: basename
      regex: (?i)\.pdf$
  - id: binary-as-office
    desc: Binary disguised as Office document
    for: [elf, macho, pe]
    if:
      type: basename
      regex: (?i)\.(docx?|xlsx?|pptx?)$
  - id: binary-as-text
    desc: Binary disguised as text file
    crit: suspicious
    for: [elf, macho, pe]
    if:
      type: basename
      regex: (?i)\.(txt|csv|md)$
    unless:
      - type: metrics
        field: text.total_lines
        min: 5
      - type: metrics
        field: binary.string_count
        min: 20
      - type: metrics
        field: text.whitespace_ratio
        min: 0.08
      - type: basename
        regex: (?i)(^|[\\/])(rfc\d+|requirements[^\\/]*)\.txt$
      - type: basename
        regex: (?i)(^|[\\/])(docs|test-data|perf/texts)[\\/]
      - type: basename
        regex: (?i)(^|[\\/])(test|CMakeLists)\.txt$
      - type: basename
        regex: (?i)[^/]+_example\.txt$
