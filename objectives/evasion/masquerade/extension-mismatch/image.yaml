defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: suspicious
  conf: 0.9
  attack: T1036.008
traits:
  - id: not-png-as-png
    desc: Non-PNG content with .png extension
    for: [scripts, binaries, jpeg, -png]
    if:
      type: basename
      regex: (?i)\.png$
  - id: not-jpeg-as-jpeg
    desc: Non-JPEG content with .jpg/.jpeg extension
    for: [scripts, binaries, png, -jpeg]
    if:
      type: basename
      regex: (?i)\.(jpe?g)$
  - id: binary-as-pdf
    desc: Binary disguised as PDF document
    for: [elf, macho, pe]
    if:
      type: basename
      regex: (?i)\.pdf$
  - id: binary-as-office
    desc: Binary disguised as Office document
    for: [elf, macho, pe]
    if:
      type: basename
      regex: (?i)\.(docx?|xlsx?|pptx?)$
  - id: binary-as-text
    desc: Binary disguised as text file
    for: [elf, macho, pe]
    if:
      type: basename
      regex: (?i)\.(txt|csv|md)$
    unless:
      - type: basename
        regex: (?i)(^|[\\/])requirements\.txt$
