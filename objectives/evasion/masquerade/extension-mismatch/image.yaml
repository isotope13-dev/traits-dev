defaults:
  platforms: [windows, linux, macos]
  crit: suspicious
  conf: 0.9
  attack: T1036.008
traits:
  - id: not-png-as-png
    desc: Non-PNG content with .png extension
    crit: notable
    for: [scripts, elf, macho, pe, jpeg, -png]
    if:
      type: basename
      regex: (?i)\.png$
  - id: photoshop-jpeg-as-png
    desc: Photoshop JPEG metadata
    crit: component
    conf: 0.86
    for: [jpeg]
    if:
      type: raw
      substr: Adobe Photoshop
  - id: not-jpeg-as-jpeg
    desc: Non-JPEG content with .jpg/.jpeg extension
    crit: notable
    for: [scripts, elf, macho, pe, png, -jpeg]
    if:
      type: basename
      regex: (?i)\.(jpe?g)$
  - id: binary-as-pdf
    desc: Binary disguised as PDF document
    for: [elf, macho, pe]
    if:
      type: basename
      regex: (?i)\.pdf$
  - id: binary-as-office
    desc: Binary disguised as Office document
    for: [elf, macho, pe]
    if:
      type: basename
      regex: (?i)\.(docx?|xlsx?|pptx?)$
  - id: binary-as-text
    desc: Binary disguised as text file
    crit: notable
    for: [elf, macho, pe]
    if:
      type: basename
      regex: (?i)\.(txt|csv|md)$
    unless:
      - type: metrics
        field: text.total_lines
        min: 5
      - type: metrics
        field: binary.string_count
        min: 20
      - type: metrics
        field: text.whitespace_ratio
        min: 0.08
      - type: basename
        regex: (?i)(^|[\\/])(rfc\d+|requirements[^\\/]*)\.txt$
      - type: basename
        regex: (?i)(^|[\\/])(docs|test-data|perf/texts)[\\/]
      - type: basename
        regex: (?i)(^|[\\/])(test|CMakeLists)\.txt$
      - type: basename
        regex: (?i)[^/]+_example\.txt$
composite_rules:
  - id: image-format-masquerade-carrier
    desc: Image format masquerade staging carrier
    # Notable rather than hostile: archive-level scans pair
    # `not-png-as-png` findings on one file with `photoshop-jpeg-as-png`
    # on a different file in the same archive (cross-file aggregation),
    # producing FPs on benign apps that ship a mix of PNG icons and
    # Photoshop-saved JPEG assets. Same-file masquerade still surfaces
    # via the underlying notable atomic traits.
    crit: notable
    conf: 0.96
    all:
      - id: not-png-as-png
      - id: photoshop-jpeg-as-png
