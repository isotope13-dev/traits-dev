# Executable script content wearing a web-font extension. Fonts (.woff2/.woff/
# .ttf/.otf/.eot) are opaque binary blobs beginning with a format magic
# (wOF2/wOFF/OTTO/0x00010000). A file that content-sniffs as a *script* yet is
# named like a font is a deliberate disguise (T1036.008) used to smuggle a
# loader past reviewers who see a "font asset". Seen in the html-to-gutenberg /
# fetch-page-assets npm compromise where public/fonts/fa-solid-400.woff2 was a
# space-padded, obfuscated Node loader auto-run from a VS Code folderOpen task.
defaults:
  platforms: [windows, linux, macos]
  attack: T1036.008
traits:
  - id: script-named-as-font
    desc: Script content under a font extension
    crit: suspicious
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '\.(woff2?|ttf|otf|eot)$'
      case_insensitive: true
