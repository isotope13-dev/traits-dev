# A .ps1 whose body is a C-style escaped byte array is not a PowerShell script.
#
# PowerShell has no \xNN string escape — it escapes with a backtick (`e, `t).
# So "\xe8\x2d" in a .ps1 is just the literal 8-character text \xe8\x2d, and a
# file made of thousands of such rows executes nothing: it is inert as
# PowerShell. The rows are the emit format of a shellcode generator targeting a
# *different* language (msfvenom -f c and friends), so the .ps1 extension
# describes neither the content nor any way it could run — the file is a raw
# Windows x86 payload wearing a script extension (T1036.008).
#
# Why that matters for triage: content-sniffing does not catch this. cleave
# types the file from its extension and reports no mismatch, an analyst sees a
# "PowerShell script" in a listing, and a .ps1 in a staging directory reads as
# tooling rather than as the payload it is.
#
# Gated on two independent x86 shellcode idioms on top of the escape rows, so it
# cannot fire on a .ps1 that merely embeds escaped data (a here-doc, a key, a
# base64 wrapper) — those carry the rows and none of the opcodes.
defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1036.008
composite_rules:
  - id: powershell-body-is-x86-shellcode
    desc: PowerShell file body is x86 shellcode bytes
    crit: hostile
    conf: 0.93
    all:
      - id: micro-behaviors/data/embedded/payload/array::quoted-byte-escape-rows
    any:
      - id: micro-behaviors/os/api-resolution/hash-based::escaped-x86-teb-self-ref
      - id: micro-behaviors/os/api-resolution/hash-based::escaped-x86-api-name-hash-fold
      - id: micro-behaviors/mem/protect/modify::escaped-x86-virtualalloc-rw-commit
    needs: 2
    downgrade:
      any:
        - id: well-known/tool/offensive/payload-corpus::payloadsallthethings-reference
