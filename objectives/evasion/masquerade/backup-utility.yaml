# Masquerading as legitimate backup/utility software
# ATT&CK: T1036.005 (Masquerading: Match Legitimate File or Process Name)
# Detects when a binary claims to be a backup or system utility
# but exhibits stealer/keylogger behavior.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004
traits:
  - id: product-name-backup
    desc: backup product name
    if:
      type: kv
      path: pe.version_info.product_name
      regex: "(?i)backup|restore|recovery|console"
  - id: internal-name-backup
    desc: backup internal name
    if:
      type: kv
      path: pe.version_info.internal_name
      regex: "(?i)backup|restore|recovery|console"
  - id: original-filename-backup
    desc: backup original filename
    if:
      type: kv
      path: pe.version_info.original_filename
      regex: "(?i)backup|restore|recovery|console"
composite_rules:
  - id: backup-console-stealer-masquerade
    desc: Backup utility masquerading with stealer capabilities
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/hardware/input/keyboard::set-windows-hook
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
    any:
      - id: objectives/evasion/masquerade::product-name-backup
      - id: objectives/evasion/masquerade::internal-name-backup
      - id: objectives/evasion/masquerade::original-filename-backup
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
