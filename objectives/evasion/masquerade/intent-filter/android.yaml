# Android deep-link and file-handler masquerade via oversized browsable alias surface.
defaults:
  platforms: [android]
  for: [apk, binaries]
  crit: notable
  conf: 0.9
  attack: "T1036"

traits:
  - id: browsable-category
    desc: Browsable intent category
    crit: suspicious
    conf: 0.8
    if:
      type: text
      exact: "android.intent.category.BROWSABLE"

  - id: view-action
    desc: External VIEW intent handling
    crit: suspicious
    conf: 0.8
    if:
      type: text
      exact: "android.intent.action.VIEW"

  - id: instagram-scheme
    desc: Instagram deep-link capture
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "instagram"

  - id: snapchat-domain
    desc: Snapchat link capture
    crit: component
    conf: 0.92
    if:
      type: text
      exact: "link.snapchat.com"

  - id: telegram-domain
    desc: Telegram link capture
    crit: component
    conf: 0.92
    if:
      type: text
      exact: "telegram.me"

  - id: whatsapp-domain
    desc: WhatsApp link capture
    crit: component
    conf: 0.92
    if:
      type: text
      exact: "api.whatsapp.com"

  - id: twitter-domain
    desc: Twitter link capture
    crit: component
    conf: 0.92
    if:
      type: text
      exact: "mobile.twitter.com"

  - id: zoom-domain
    desc: Zoom link capture
    crit: component
    conf: 0.92
    if:
      type: text
      exact: "*.zoom.us"

  - id: reddit-domain
    desc: Reddit link capture
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "*.reddit.in"

  - id: wikipedia-domain
    desc: Wikipedia link capture
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "*.wikipedia.org"

  - id: amazon-domain
    desc: Amazon link capture
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "*.amazon.in"

  - id: bet365-domain
    desc: Bet365 link capture
    crit: component
    conf: 0.94
    if:
      type: text
      exact: "*bet365.com"

  - id: mime-pdf
    desc: PDF handler registration
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "application/pdf"

  - id: mime-zip
    desc: ZIP handler registration
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "application/zip"

  - id: mime-word
    desc: Word handler registration
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "application/msword"

  - id: mime-excel
    desc: Excel handler registration
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "application/vnd.ms-excel"

composite_rules:
  - id: multi-brand-link-capture
    desc: APK captures many third-party deep-link ecosystems
    crit: suspicious
    conf: 0.98
    all:
      - id: browsable-category
      - id: view-action
    any:
      - id: instagram-scheme
      - id: snapchat-domain
      - id: telegram-domain
      - id: whatsapp-domain
      - id: twitter-domain
      - id: zoom-domain
      - id: reddit-domain
      - id: wikipedia-domain
      - id: amazon-domain
      - id: bet365-domain
    needs: 5

  - id: deep-link-and-file-hijack
    desc: APK masquerades as handler for brands and common document types
    crit: hostile
    conf: 0.99
    all:
      - id: multi-brand-link-capture
    any:
      - id: mime-pdf
      - id: mime-zip
      - id: mime-word
      - id: mime-excel
    needs: 3
