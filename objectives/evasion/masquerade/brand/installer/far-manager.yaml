# Far Manager impersonation
# Genuine Far Manager 2.x release builds were code-signed by FAR Group.
# A UPX-packed, unsigned PE that claims the Far Manager 2.0.1807 manifest
# is a strong dropper-disguise tell (cf. observed Amadey/SmokeLoader staging).
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
traits:
  - id: far-manager-manifest-name
    desc: Manifest declares Far Manager assembly identity
    crit: component
    conf: 0.97
    if:
      type: value
      path: pe.manifest.assembly_identity.name
      exact: Far Manager
  - id: far-manager-manifest-2-0-1807
    desc: Manifest version 2.0.0.1807
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.manifest.assembly_identity.version
      exact: 2.0.0.1807
  - id: far-manager-original-filename
    desc: VERSIONINFO original filename Far.exe
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.original_filename
      exact: Far.exe
  - id: far-manager-company
    desc: VERSIONINFO Eugene Roshal company line
    crit: component
    conf: 0.95
    if:
      type: value
      path: pe.version.company
      regex: Eugene Roshal( & FAR Group)?
  - id: far-manager-upx-imphash
    desc: UPX-of-Far-Manager imphash
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.imphash
      exact: 828ff9c529543d503a8f29d805d14abb
composite_rules:
  - id: far-manager-identity
    desc: Far Manager identity (manifest + version info)
    crit: component
    conf: 0.95
    needs: 2
    any:
      - id: far-manager-manifest-name
      - id: far-manager-manifest-2-0-1807
      - id: far-manager-original-filename
      - id: far-manager-company
  - id: far-manager-upx-unsigned-masquerade
    desc: UPX-packed unsigned Far Manager masquerade
    crit: hostile
    conf: 0.97
    mbc: F0001
    all:
      - id: far-manager-identity
      - id: metadata/binary/section/names::upx-section-pair
      - id: metadata/signed/trust-level::unsigned-pe-executable
  - id: far-manager-upx-imphash-cluster
    desc: Far Manager-themed UPX dropper (imphash pivot)
    crit: hostile
    conf: 0.98
    all:
      - id: far-manager-upx-imphash
      - id: far-manager-identity
      - id: metadata/signed/trust-level::unsigned-pe-executable
