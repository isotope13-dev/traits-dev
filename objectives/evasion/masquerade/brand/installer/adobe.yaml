# Adobe brand impersonation in PE version resource.
# Malware (droppers, loaders, infector) that claims to be an Adobe
# installer/bootstrapper to trick users into executing it.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

composite_rules:
  - id: adobe-bootstrapper-masquerade
    desc: Unsigned binary masquerading as Adobe installer
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/evasion/masquerade/version-resource/contradiction::adobe-bootstrapper-versioninfo
    any:
      - id: metadata/signed/trust-level::unsigned
      - id: metadata/signed/trust-level::unsigned-pe-executable
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::adobe
      - id: metadata/signed/developer::adobe-systems
