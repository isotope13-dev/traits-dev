# Adobe brand impersonation in PE version resource.
# Malware (droppers, loaders, infector) that claims to be an Adobe
# installer/bootstrapper to trick users into executing it.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
traits:
  - id: adobe-download-manager-product
    desc: VERSIONINFO Adobe Download Manager
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.product_name
      exact: Adobe Download Manager
  - id: adobe-download-manager-description
    desc: VERSIONINFO Adobe Download Manager description
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.description
      exact: Adobe Download Manager
  - id: adobe-acrobat-reader-original-filename
    desc: VERSIONINFO Adobe Acrobat Reader filename
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.original_filename
      regex: '^Adobe-Acrobat-Reader-Windows-[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'
  - id: adobe-acrobat-reader-internal-name
    desc: VERSIONINFO Adobe Acrobat Reader internal name
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.internal_name
      regex: '^Adobe-Acrobat-Reader-Windows-[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'
  - id: itch-manifest-name
    desc: Manifest claims itch Setup
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.manifest.assembly_identity.name
      exact: itch Setup
  - id: itch-manifest-description
    desc: Manifest describes itch installer
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.manifest.description
      exact: Installer for the itch desktop application
  - id: itch-company-name
    desc: VERSIONINFO itch corp company
    crit: component
    conf: 0.97
    if:
      type: kv
      path: pe.version.company
      exact: itch corp.
  - id: itch-product-name
    desc: VERSIONINFO itch-setup product name
    crit: component
    conf: 0.97
    if:
      type: kv
      path: pe.version.product_name
      exact: itch-setup
  - id: itch-original-filename
    desc: VERSIONINFO itch-setup executable name
    crit: component
    conf: 0.98
    if:
      type: kv
      path: pe.version.original_filename
      exact: itch-setup.exe
  - id: itch-file-description
    desc: VERSIONINFO itch installer description
    crit: component
    conf: 0.96
    if:
      type: kv
      path: pe.version.description
      exact: Installer and self-update helper for the itch app

composite_rules:
  - id: adobe-bootstrapper-masquerade
    desc: Unsigned binary masquerading as Adobe installer
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/evasion/masquerade/version-resource/contradiction::adobe-bootstrapper-versioninfo
    any:
      - id: metadata/signed/trust-level::unsigned
      - id: metadata/signed/trust-level::unsigned-pe-executable
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::adobe
      - id: metadata/signed/developer::adobe-systems
  - id: adobe-download-manager-masquerade
    desc: Unsigned binary masquerading as Adobe Download Manager
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/vendor::adobe-version-info-company
      - id: adobe-download-manager-product
      - id: adobe-download-manager-description
    any:
      - id: adobe-acrobat-reader-original-filename
      - id: adobe-acrobat-reader-internal-name
      - id: metadata/package/versioning::pe-file-version-ipv4-shape
      - id: metadata/package/versioning::pe-product-version-ipv4-shape
      - id: metadata/binary/metrics/structural::malformed-pe-structure
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::adobe
      - id: metadata/signed/developer::adobe-systems
      - id: metadata/signed/certificate::pe-signature-verified
  - id: itch-setup-identity
    desc: itch Setup installer identity
    crit: suspicious
    conf: 0.96
    needs: 3
    any:
      - id: itch-manifest-name
      - id: itch-manifest-description
      - id: itch-company-name
      - id: itch-product-name
      - id: itch-original-filename
      - id: itch-file-description
  - id: itch-setup-unsigned-masquerade
    desc: Unsigned binary masquerading as itch Setup
    crit: suspicious
    conf: 0.97
    all:
      - id: itch-setup-identity
      - id: metadata/signed/trust-level::unsigned-pe-executable
