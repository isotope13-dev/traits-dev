defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
traits:
  - id: hpwuschd-original-filename
    desc: VERSIONINFO original filename hpwuSchd.exe
    crit: component
    conf: 0.96
    if:
      type: kv
      path: pe.version.original_filename
      regex: ^hpwuSchd\.exe$
      case_insensitive: true
  - id: hpwuschd-file-description
    desc: VERSIONINFO file description hpwuSchd Application
    crit: component
    conf: 0.96
    if:
      type: kv
      path: pe.version.description
      exact: hpwuSchd Application
  - id: hp-company-name
    desc: VERSIONINFO Hewlett-Packard company name
    crit: component
    conf: 0.9
    if:
      type: kv
      path: pe.version.company
      regex: ^Hewlett-?Packard
      case_insensitive: true
  - id: hpwuschd-mutex
    desc: HPWUSCHD single-instance mutex name
    crit: component
    conf: 0.97
    if:
      type: text
      word: HPWUSCHD
      section: rdata
  - id: hpwu-bfdd-guid
    desc: HPWU/HPSU BFDD6660 GUID artefact
    crit: component
    conf: 0.99
    if:
      type: text
      regex: ^HP(WU|SU)-BFDD6660-DFDE-11d6-9DAD-0048541FE13[13]$
      section: rdata
  - id: hp-software-update-regpath
    desc: HP Software Update registry path
    crit: component
    conf: 0.93
    if:
      type: text
      substr: software\Hewlett-Packard\HP Software Update
      case_insensitive: true
      section: rdata
composite_rules:
  - id: hpwuschd-identity
    desc: hpwuSchd HP Update Scheduler identity
    crit: component
    conf: 0.95
    needs: 2
    any:
      - id: hpwuschd-original-filename
      - id: hpwuschd-file-description
      - id: hp-company-name
      - id: hpwuschd-mutex
      - id: hpwu-bfdd-guid
      - id: hp-software-update-regpath
  - id: hpwuschd-unsigned-masquerade
    desc: Unsigned binary masquerading as HP Update Scheduler
    crit: hostile
    conf: 0.96
    all:
      - id: hpwuschd-identity
      - id: metadata/signed/trust-level::unsigned-pe-executable
