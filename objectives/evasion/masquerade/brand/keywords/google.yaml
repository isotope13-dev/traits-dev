# Google brand reference. Neutral branding: the word "Google" appears in
# countless legitimate apps, notifications, and SDKs. Lure intent comes from
# composites that pair it with disguised-notification text and RAT behavior.
defaults:
  platforms:
  - android
  for:
  - apk
  - zip
traits:
- id: google-brand-keyword
  desc: Google brand name reference
  crit: baseline
  conf: 0.5
  if:
    type: text
    word: "Google"
