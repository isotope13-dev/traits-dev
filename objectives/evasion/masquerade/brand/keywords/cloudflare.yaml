# Cloudflare brand references in document text. Neutral branding: a page titled
# as Cloudflare is just as likely a legitimate Cloudflare property (or a
# `<title>Cloudflare Logo</title>` SVG) as a phishing lure. Phishing intent comes
# from composites (e.g. objectives/credential-access/phishing/captcha) that pair
# this branding with turnstile/CAPTCHA lure text and redirect behavior.
defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
    - html
traits:
  - id: cloudflare-html-title
    desc: Cloudflare brand name in HTML title
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)<title.{0,40}>.{0,80}cloudflare
