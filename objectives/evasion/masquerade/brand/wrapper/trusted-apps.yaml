defaults:
  attack: T1036.005
  platforms: [windows]
  for: [pe]
traits:
  - id: office-system-product-claim
    desc: Office system product claim
    crit: component
    conf: 0.97
    size_min: 500000
    size_max: 4000000
    if:
      type: text
      exact: 2007 Microsoft Office system
  - id: office-2016-component-claim
    desc: Office 2016 component claim
    crit: component
    conf: 0.97
    size_min: 500000
    size_max: 4000000
    if:
      type: text
      exact: Microsoft Office 2016 component
  - id: oracle-rmid-wrapper-manifest
    desc: Oracle rmid wrapper manifest
    crit: component
    conf: 0.98
    size_min: 1500000
    size_max: 2500000
    if:
      type: text
      exact: <description>Java(TM) SE rmid process</description>
      section: .rsrc
  - id: office-conflict-wizard-payload
    desc: Office Conflict Wizard payload marker
    crit: component
    conf: 0.98
    size_min: 1500000
    size_max: 2500000
    if:
      type: text
      substr: Office Conflict Wizard
  - id: aceconflict-vb6-payload
    desc: AceConflict VB6 payload marker
    crit: component
    conf: 0.97
    size_min: 1500000
    size_max: 2500000
    if:
      type: text
      exact: AceConflictEXE
  - id: adobe-collabsync-exe-name
    desc: AdobeCollabSync executable name
    crit: component
    conf: 0.98
    size_min: 1000000
    size_max: 1200000
    if:
      type: text
      exact: AdobeCollabSync.exe
  - id: adobe-collabsync-version-claim
    desc: Adobe Synchronizer version claim
    crit: component
    conf: 0.98
    size_min: 1000000
    size_max: 1200000
    if:
      type: text
      exact: Adobe Collaboration Synchronizer 11.0
  - id: office-screen-recorder-claim
    desc: Office Screen Recorder claim
    crit: component
    conf: 0.98
    size_min: 1000000
    size_max: 1200000
    if:
      type: text
      exact: Microsoft Office Screen Recorder
  - id: office-sync-interface
    desc: Office sync interface marker
    crit: component
    conf: 0.98
    size_min: 900000
    size_max: 3000000
    if:
      type: text
      exact: Microsoft Office Document Cache Sync Client Interface
  - id: office-sync-local-client
    desc: Office LocalSyncClient marker
    crit: component
    conf: 0.97
    size_min: 900000
    size_max: 3000000
    if:
      type: text
      exact: LocalSyncClient
  - id: adobe-acrobat-updater-claim
    desc: Adobe Acrobat Updater claim
    crit: component
    conf: 0.98
    size_min: 500000
    size_max: 3000000
    if:
      type: text
      exact: Adobe Acrobat Updater
  - id: adobe-installation-helper-claim
    desc: Adobe Installation Helper claim
    crit: component
    conf: 0.98
    size_min: 2600000
    size_max: 2900000
    if:
      type: text
      exact: Adobe Installation Helper
      section: .rsrc
  - id: adobe-host-internal-name
    desc: Adobe host.exe internal name
    crit: component
    conf: 0.97
    size_min: 2600000
    size_max: 2900000
    if:
      type: text
      exact: host.exe
      section: .rsrc
  - id: vsto-clsid-hijack-path
    desc: VSTO COM hijack CLSID path
    crit: suspicious
    conf: 0.99
    size_min: 900000
    size_max: 3000000
    if:
      type: text
      exact: CLSID\{000C0126-0000-0000-C000-000000000046}\InprocServer32
  - id: vsto-installer-binary
    desc: VSTOInstaller payload marker
    crit: notable
    conf: 0.96
    size_min: 900000
    size_max: 3000000
    if:
      type: text
      exact: VSTOInstaller.exe
  - id: msi-bootstrap-command
    desc: MSI updater bootstrap command
    crit: suspicious
    conf: 0.95
    size_min: 900000
    size_max: 3000000
    if:
      type: text
      exact: msiexec.exe /i"%s" %s REBOOT="ReallySuppress"
  - id: javacpl-pdb-path
    desc: Java control panel PDB path
    crit: suspicious
    conf: 0.99
    size_min: 500000
    size_max: 4000000
    if:
      type: text
      substr: javacpl.pdb
      case_insensitive: true
  - id: java-deployment-properties-path
    desc: Java deployment properties path
    crit: component
    conf: 0.97
    size_min: 500000
    size_max: 4000000
    if:
      type: text
      exact: '%s\Sun\Java\Deployment\deployment.properties'
  - id: java-com-inproc-path
    desc: Java COM InprocServer32 path
    crit: suspicious
    conf: 0.98
    size_min: 1000000
    size_max: 4000000
    if:
      type: text
      exact: SOFTWARE\Classes\CLSID\%s\InprocServer32
    unless:
      - id: metadata/signed/leaf::oracle-america-inc.
  - id: java-cafee-clsid
    desc: Java plugin CLSID prefix
    crit: component
    conf: 0.97
    size_min: 500000
    size_max: 4000000
    if:
      type: text
      exact: '{CAFEEFAC-'
  - id: java-home-registry
    desc: Java runtime home registry path
    crit: suspicious
    conf: 0.97
    size_min: 1000000
    size_max: 4000000
    if:
      type: text
      exact: SOFTWARE\JavaSoft\Java Runtime Environment
composite_rules:
  - id: java-control-panel-com-wrapper-marker
    desc: Java control panel COM wrapper marker
    crit: suspicious
    conf: 0.98
    size_min: 1000000
    size_max: 4000000
    all:
      - id: javacpl-pdb-path
      - id: java-com-inproc-path
    any:
      - id: java-deployment-properties-path
      - id: java-cafee-clsid
      - id: java-home-registry
      - id: office-2016-component-claim
    needs: 2
