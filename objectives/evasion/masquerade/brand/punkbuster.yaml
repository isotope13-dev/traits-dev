# PunkBuster brand masquerade combined with loader behavior.
# PunkBuster is a legitimate game anti-cheat company (PunkBuster Ltd.).
# Legitimate PunkBuster binaries are Authenticode-signed. An unsigned PE
# carrying PunkBuster version-info strings alongside in-memory loader
# behavior is a strong masquerade signal.
# ATT&CK: T1036.005 (Masquerading: Match Legitimate Name or Location)
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: B0039
composite_rules:
  - id: punkbuster-masquerade-loader
    desc: Unsigned PE masquerading as PunkBuster with loader behavior
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/text/keywords::punkbuster-company-name
      - id: metadata/signed::unsigned
      - id: objectives/command-and-control/backdoor/reflective-load::in-memory-pe-loader-with-decryption
    any:
      - id: micro-behaviors/data/text/keywords::punkbuster-file-description
      - id: micro-behaviors/data/text/keywords::punkbuster-internal-name
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
