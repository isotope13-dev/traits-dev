defaults:
  platforms: [macos]
  for: [plist, macho]
  crit: component
  conf: 0.9

traits:
  - id: bundle-name-vlc
    desc: CFBundleName claims VLC
    if:
      type: text
      substr: VLC
  - id: bundle-name-notepadpp
    desc: CFBundleName claims Notepad++
    if:
      type: text
      substr: Notepad++
  - id: bundle-id-mismatch-vlc
    desc: CFBundleIdentifier does not match VLC
    if:
      type: text
      substr: CFBundleIdentifier
    not:
      - regex: org\.videolan\.vlc
  - id: bundle-id-mismatch-notepadpp
    desc: CFBundleIdentifier does not match Notepad++
    if:
      type: text
      substr: CFBundleIdentifier
    not:
      - regex: com\.notepad-plus-plus
composite_rules:
  - id: macos-brand-confusion-vlc
    desc: macOS Brand confusion (VLC name with non-VLC bundle ID)
    crit: suspicious
    conf: 0.95
    all:
      - id: bundle-name-vlc
      - id: bundle-id-mismatch-vlc
  - id: macos-brand-confusion-notepadpp
    desc: macOS Brand confusion (Notepad++ name with non-Notepad++ bundle ID)
    crit: suspicious
    conf: 0.95
    all:
      - id: bundle-name-notepadpp
      - id: bundle-id-mismatch-notepadpp
