defaults:
  platforms: [macos]
  for: [plist, macho]
  crit: component
  conf: 0.9

# Brand-confusion detection: plist names itself as a real app (VLC, Notepad++)
# but uses a bundle identifier that doesn't match the real developer's domain.
# The match-the-expected-id traits are positive signals so the composite can
# `unless` them — standalone "mismatch" traits firing on every non-VLC plist
# were an arbitrary claim about every other macOS bundle in the world.
traits:
  - id: bundle-name-vlc
    desc: CFBundleName claims VLC
    if:
      type: kv
      path: CFBundleName
      regex: (?i)^VLC\b
  - id: bundle-name-notepadpp
    desc: CFBundleName claims Notepad++
    if:
      type: kv
      path: CFBundleName
      exact: Notepad++
  - id: bundle-id-vlc
    desc: Real VideoLAN VLC bundle identifier
    if:
      type: kv
      path: CFBundleIdentifier
      regex: ^org\.videolan\.vlc\b
  - id: bundle-id-notepadpp
    desc: Real Notepad++ bundle identifier
    if:
      type: kv
      path: CFBundleIdentifier
      regex: ^com\.notepad-plus-plus\b
composite_rules:
  - id: macos-brand-confusion-vlc
    desc: macOS Brand confusion (VLC name with non-VLC bundle ID)
    crit: suspicious
    conf: 0.95
    all:
      - id: bundle-name-vlc
    unless:
      - id: bundle-id-vlc
  - id: macos-brand-confusion-notepadpp
    desc: macOS Brand confusion (Notepad++ name with non-Notepad++ bundle ID)
    crit: suspicious
    conf: 0.95
    all:
      - id: bundle-name-notepadpp
    unless:
      - id: bundle-id-notepadpp
