# VeriSign brand impersonation in PE version resource. Used by signed
# loaders/droppers (Eilio Developments cert family, etc.) that pass the
# version-info off as a "VeriSign installer" so users see a familiar brand.
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1036.005
  crit: component
  conf: 0.95

traits:
  - id: verisign-manager-product-name
    desc: ProductName claims "Verisign manager"
    if:
      type: text
      exact: Verisign manager
      section: .rsrc

  - id: verisign-installer-company-name
    desc: CompanyName claims Verisign installer
    if:
      type: text
      regex: 'Verisign\.Installer[_ ]S\.?L\.?'
      section: .rsrc

  - id: verisign-setup-internal-name
    desc: InternalName claims Verisign_setup.exe
    if:
      type: text
      regex: '\bVerisign_setup\.exe\b'
      section: .rsrc

composite_rules:
  - id: verisign-installer-version-resource-decoy
    desc: Fake VeriSign installer version resource
    crit: suspicious
    conf: 0.97
    needs: 2
    any:
      - id: verisign-manager-product-name
      - id: verisign-installer-company-name
      - id: verisign-setup-internal-name
    unless:
      - id: metadata/signed/platform::microsoft
