# Microsoft Store / Microsoft brand impersonation in HTML lures.
# The Microsoft logo is the four-coloured-square arrangement; the
# specific hex values F25022/7FBA00/00A4EF/FFB900 are mandated by
# the Microsoft brand guidelines and embedded SVG-with-these-colours
# in non-Microsoft-domain HTML is a brand-impersonation signal.
# Each colour and text fragment is a component — meaningful only
# inside the composite that combines them.
defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1036.005
  mbc: F0007
traits:
  - id: ms-logo-red-square
    desc: Microsoft red square brand colour
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '#[Ff]25022\b'
  - id: ms-logo-green-square
    desc: Microsoft green square brand colour
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '#7[Ff][Bb][Aa]00\b'
  - id: ms-logo-blue-square
    desc: Microsoft blue square brand colour
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '#00[Aa]4[Ee][Ff]\b'
  - id: ms-logo-yellow-square
    desc: Microsoft yellow square brand colour
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '#[Ff][Ff][Bb]900\b'
  - id: ms-store-text-lure
    desc: Microsoft Store text reference
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?i)\bMicrosoft Store\b'
  - id: ms-out-of-date-lure
    desc: Client out-of-date update phrasing
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?i)\b(?:client|app|workplace) is out of date\b'
  - id: ms-redirected-to-store
    desc: Redirected-to-Microsoft-Store phrase
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)redirect[a-z]{0,3}\b[^\n]{0,80}Microsoft Store'
composite_rules:
  - id: ms-logo-svg-impersonation
    desc: Microsoft logo SVG colour set
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: ms-logo-red-square
      - id: ms-logo-green-square
      - id: ms-logo-blue-square
      - id: ms-logo-yellow-square
  - id: microsoft-store-fake-update-lure
    desc: Fake Microsoft Store update lure
    crit: hostile
    conf: 0.97
    all:
      - id: ms-logo-svg-impersonation
    any:
      - id: ms-store-text-lure
      - id: ms-out-of-date-lure
      - id: ms-redirected-to-store
    not:
      - regex: '(?i)https?://[^/]*\.microsoft\.com/'
      - regex: '(?i)https?://[^/]*\.microsoftonline\.com/'
      - regex: '(?i)https?://[^/]*\.live\.com/'
