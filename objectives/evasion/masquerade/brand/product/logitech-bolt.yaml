defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

traits:
  - id: logitech-company-name
    desc: Logitech company name claim
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.company
      exact: Logitech

  - id: logitech-bolt-product-name
    desc: Logitech Bolt product name
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.product_name
      exact: Logitech Bolt

  - id: logitech-bolt-file-description
    desc: Logitech Bolt file description
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.description
      exact: Logitech Bolt

  - id: logibolt-internal-name
    desc: LogiBolt internal name
    crit: component
    conf: 0.97
    if:
      type: value
      path: pe.version.internal_name
      exact: LogiBolt.exe

  - id: logibolt-original-filename
    desc: LogiBolt original filename
    crit: component
    conf: 0.97
    if:
      type: value
      path: pe.version.original_filename
      exact: LogiBolt.exe

  - id: logitech-bolt-file-version
    desc: Logitech Bolt file version claim
    crit: component
    conf: 0.96
    if:
      type: value
      path: pe.version.file_version
      exact: 20.0.38253.850

composite_rules:
  - id: logitech-bolt-identity
    desc: Logitech Bolt version identity
    crit: component
    conf: 0.98
    needs: 3
    any:
      - id: logitech-company-name
      - id: logitech-bolt-product-name
      - id: logitech-bolt-file-description
      - id: logibolt-internal-name
      - id: logibolt-original-filename
      - id: logitech-bolt-file-version

  - id: unsigned-logitech-bolt-masquerade
    desc: Unsigned PE masquerading as Logitech Bolt
    crit: suspicious
    conf: 0.95
    all:
      - id: logitech-bolt-identity
      - id: metadata/signed/trust-level::unsigned
    unless:
      - id: metadata/signed/platform::microsoft

  - id: logitech-bolt-packed-loader-masquerade
    desc: Logitech Bolt packed loader masquerade
    crit: hostile
    conf: 0.99
    all:
      - id: logitech-bolt-identity
      - id: metadata/signed/trust-level::unsigned
      - id: objectives/anti-static/pack/section-names::p60-bd-packed-loader-layout
    unless:
      - id: metadata/signed/platform::microsoft
