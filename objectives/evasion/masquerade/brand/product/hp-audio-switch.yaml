defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

traits:
  - id: hp-audio-switch-product-name
    desc: HP Audio Switch product name
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.product_name
      exact: HP Audio Switch

  - id: hp-audio-switch-file-description
    desc: HP Audio Switch file description
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.description
      exact: HP Audio Switch

  - id: hp-audio-switch-company-name
    desc: HP Inc company name claim
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.version.company
      exact: HP Inc.

  - id: hp-audio-switch-internal-name
    desc: HPAudioSwitch internal name
    crit: component
    conf: 0.97
    if:
      type: value
      path: pe.version.internal_name
      exact: HPAudioSwitch.exe

  - id: hp-audio-switch-original-filename
    desc: HPAudioSwitch original filename
    crit: component
    conf: 0.97
    if:
      type: value
      path: pe.version.original_filename
      exact: HPAudioSwitch.exe

composite_rules:
  - id: hp-audio-switch-identity
    desc: HP Audio Switch version identity
    crit: component
    conf: 0.98
    needs: 3
    any:
      - id: hp-audio-switch-product-name
      - id: hp-audio-switch-file-description
      - id: hp-audio-switch-company-name
      - id: hp-audio-switch-internal-name
      - id: hp-audio-switch-original-filename

  - id: unsigned-hp-audio-switch-masquerade
    desc: Unsigned PE masquerading as HP Audio Switch
    crit: suspicious
    conf: 0.95
    all:
      - id: hp-audio-switch-identity
      - id: metadata/signed/trust-level::unsigned
    unless:
      - id: metadata/signed/platform/

  - id: hp-audio-switch-packed-loader-masquerade
    desc: HP Audio Switch packed loader masquerade
    crit: hostile
    conf: 0.98
    all:
      - id: hp-audio-switch-identity
      - id: metadata/signed/trust-level::unsigned
      - id: metadata/binary/metrics/structural::malformed-pe-structure
      - id: metadata/binary/symbols/imports::pe-imports-max-six
      - id: metadata/binary/section/names::large-n4w-z-section-pair
    unless:
      - id: metadata/signed/platform/
