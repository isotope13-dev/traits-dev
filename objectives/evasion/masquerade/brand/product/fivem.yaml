# FiveM / Cfx.re Brand Masquerade Detection
# FiveM is a legitimate multiplayer modification framework for GTA V.
# Its executables (CitizenMP.exe, FiveM.app.exe) are always Authenticode-signed
# by "Cfx.re" / "FiveM". An unsigned PE carrying FiveM version-info strings is
# a strong masquerade signal used by Vidar/StealC-class loaders.
# ATT&CK: T1036.005 (Masquerading: Match Legitimate Name or Location)
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: B0039

traits:
  # Component atoms — individual brand strings scoped to .rsrc
  - id: citizenmp-internal-name
    desc: CitizenMP.exe internal name in resources
    crit: component
    conf: 0.95
    if:
      type: text
      exact: CitizenMP.exe
      section: .rsrc

  - id: fivem-game-subprocess
    desc: FiveM Game subprocess description
    crit: component
    conf: 0.95
    if:
      type: text
      exact: FiveM Game subprocess
      section: .rsrc

  - id: cfxre-copyright
    desc: Cfx.re copyright string in resources
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "(C) 2015-2022 Cfx.re"
      section: .rsrc

composite_rules:
  # Unsigned PE carrying FiveM brand strings = masquerade
  - id: unsigned-fivem-masquerade
    desc: Unsigned PE masquerading as FiveM/CitizenMP
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: citizenmp-internal-name
      - id: fivem-game-subprocess
      - id: cfxre-copyright
    needs: 2
    unless:
      - id: metadata/signed/platform/

  # Strong masquerade: multiple FiveM strings + unsigned + no Microsoft signing
  - id: fivem-brand-masquerade
    desc: PE impersonating FiveM with forged version resources
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/signed/trust-level::unsigned
    needs: 2
    any:
      - id: citizenmp-internal-name
      - id: fivem-game-subprocess
      - id: cfxre-copyright
