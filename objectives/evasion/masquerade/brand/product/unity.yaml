defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: B0013

traits:
  - id: unity-nvidia-gpu-export
    desc: Unity NVIDIA high-performance GPU export
    crit: component
    conf: 0.95
    if:
      type: text
      exact: NvOptimusEnablement
  - id: unity-amd-gpu-export
    desc: Unity AMD high-performance GPU export
    crit: component
    conf: 0.95
    if:
      type: text
      exact: AmdPowerXpressRequestHighPerformance
  - id: unity-player-import
    desc: Imports UnityPlayer.dll
    crit: component
    conf: 1.0
    if:
      type: text
      word: UnityPlayer.dll
  - id: unity-player-pdb-path
    desc: Unity Player PDB path string
    crit: component
    conf: 0.95
    if:
      type: text
      word: WindowsPlayer_player_Master_il2cpp_x64.pdb

composite_rules:
  - id: unity-gpu-high-perf-export
    desc: Unity high-performance GPU export
    crit: component
    conf: 0.95
    any:
      - id: unity-nvidia-gpu-export
      - id: unity-amd-gpu-export
  - id: graphics-dll-ref
    desc: Reference to graphics DLLs
    crit: component
    conf: 1.0
    any:
      - id: micro-behaviors/os/module/load::d3d11-dll-reference
      - id: micro-behaviors/os/module/load::opengl32-dll-reference
  - id: unity-masquerade-hollow-gui
    desc: Unity masquerade as GUI binary with missing UI/graphics imports
    crit: hostile
    conf: 0.96
    any:
      - id: unity-gpu-high-perf-export
      - id: unity-player-pdb-path
    unless:
      - id: unity-player-import
      - id: micro-behaviors/os/module/load::user32-dll-reference
      - id: objectives/evasion/masquerade/brand/product/
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/binary/framework/
