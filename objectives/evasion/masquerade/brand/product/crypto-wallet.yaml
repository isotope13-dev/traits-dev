defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1036
  crit: component
  conf: 0.86
traits:
  - id: ledger-live-brand-page
    desc: Ledger Live brand page
    if:
      id: metadata/file/text/string::ledger-live-product
  - id: ledger-official-link-cluster
    desc: Ledger official link cluster
    count_min: 3
    if:
      type: text
      substr: "https://www.ledger.com/"
composite_rules:
  - id: ledger-recovery-phrase-phish
    desc: Ledger recovery phrase phishing
    crit: hostile
    conf: 0.98
    all:
      - id: ledger-live-brand-page
      - id: ledger-official-link-cluster
      - id: objectives/credential-access/wallet/mnemonic::web-mnemonic-entry-form
      - id: objectives/exfiltration/http/query::browser-query-data-exfil
