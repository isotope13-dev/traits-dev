defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005

traits:
  - id: webex-version-resource
    desc: Webex brand in version resource
    crit: component
    conf: 0.93
    count_min: 3
    if:
      type: text
      word: Webex
      section: .rsrc

composite_rules:
  - id: webex-nsis-staged-installer
    desc: Webex-branded NSIS staged installer
    crit: hostile
    conf: 0.97
    all:
      - id: webex-version-resource
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/layout::overlay-over-90pct
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    any:
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: objectives/command-and-control/dropper/execution/installer::large-overlay-bundle
