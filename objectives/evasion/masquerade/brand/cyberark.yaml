# CyberArk Masquerading
defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: cyberark-brand-str
    desc: CyberArk brand string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "CyberArk"
      section: .rsrc

  - id: cyberark-epm-agent-str
    desc: CyberArk Endpoint Privilege Manager Agent string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "CyberArk Endpoint Privilege Manager"
      section: .rsrc

composite_rules:
  - id: cyberark-masquerade
    desc: Binary masquerading as CyberArk software
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/signed::unsigned
    any:
      - id: cyberark-brand-str
      - id: cyberark-epm-agent-str
    unless:
      - id: metadata/signed/platform::microsoft
