defaults:
  platforms: [macos]
  for: [applescript, macho, swift, objc]
  attack: T1036.005

traits:
  - id: meeting-sdk-token
    desc: Meeting lure SDK token
    crit: component
    conf: 0.8
    if:
      type: text
      word: SDK
  - id: meeting-sdk-action-token
    desc: Meeting lure update action
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?i)(download (the )?update|install.{0,12}latest version|update required)'
  - id: meeting-brand-teams-zoom-webex
    desc: Teams Zoom Webex brand text
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)(Microsoft Teams|Zoom|Webex)'
  - id: meeting-brand-meet-skype-slack
    desc: Meet Skype Slack brand text
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)(Google Meet|Skype|Slack)'
  - id: meeting-docs-teams
    desc: Teams developer docs lure
    crit: component
    conf: 0.88
    if:
      type: text
      substr: learn.microsoft.com/en-us/microsoftteams
  - id: meeting-docs-zoom
    desc: Zoom developer docs lure
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(developers|marketplace)\.zoom\.us'
  - id: meeting-docs-webex
    desc: Webex developer docs lure
    crit: component
    conf: 0.88
    if:
      type: text
      substr: developer.webex.com
  - id: meeting-docs-google-meet
    desc: Google Meet developer docs lure
    crit: component
    conf: 0.88
    if:
      type: text
      substr: developers.google.com/meet
  - id: meeting-action-deprecated
    desc: Meeting deprecated action lure
    crit: component
    conf: 0.82
    if:
      type: text
      word: deprecated
      case_insensitive: true
  - id: meeting-action-latest-version
    desc: Meeting latest-version lure
    crit: component
    conf: 0.84
    if:
      type: text
      substr: update to the latest version
      case_insensitive: true
  - id: meeting-action-start-button
    desc: Meeting start-button lure
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?i)pressing the.{0,40}start button'
  - id: meeting-action-video-features
    desc: Meeting video-features lure
    crit: component
    conf: 0.82
    if:
      type: text
      substr: video conferencing features
      case_insensitive: true
  - id: meeting-live-domain-teams-zoom-webex
    desc: Teams Zoom Webex live domain
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'https://(teams|zoom|webex)-live\.[A-Za-z0-9.-]{2,80}/'
  - id: meeting-live-domain-meet-skype-slack
    desc: Meet Skype Slack live domain
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'https://(meet|skype|slack)-live\.[A-Za-z0-9.-]{2,80}/'
  - id: meeting-updater-path-teams-zoom-webex
    desc: Teams Zoom Webex updater path
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)(MSTeams|Teams|Zoom|Webex).{0,20}Updater.{0,20}\.scpt'
  - id: meeting-updater-path-meet-skype-slack
    desc: Meet Skype Slack updater path
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)(Meet|Skype|Slack).{0,20}Updater.{0,20}\.scpt'
  - id: applescript-softwareupdate-url-product
    desc: AppleScript softwareupdate URL product
    crit: suspicious
    conf: 0.94
    for: [applescript]
    if:
      type: text
      regex: 'softwareupdate\s+--evaluate-products\s+--products\s+["& ]+https?://'
  - id: applescript-softwareupdate-var-product
    desc: AppleScript softwareupdate variable product
    crit: suspicious
    conf: 0.94
    for: [applescript]
    if:
      type: text
      regex: 'softwareupdate\s+--evaluate-products\s+--products\s+"\s*&\s*[A-Za-z][A-Za-z0-9_]*'

composite_rules:
  - id: meeting-brand-lure
    desc: Meeting platform brand lure
    crit: component
    conf: 0.9
    any:
      - id: meeting-brand-teams-zoom-webex
      - id: meeting-brand-meet-skype-slack
  - id: meeting-sdk-update-lure-text
    desc: Meeting SDK update lure text
    crit: suspicious
    conf: 0.92
    all:
      - id: meeting-sdk-token
      - id: meeting-sdk-action-token
      - id: meeting-brand-lure
    near_bytes: 1024
  - id: meeting-platform-docs-lure
    desc: Meeting platform docs lure URL
    crit: notable
    conf: 0.88
    any:
      - id: meeting-docs-teams
      - id: meeting-docs-zoom
      - id: meeting-docs-webex
      - id: meeting-docs-google-meet
  - id: meeting-update-action-text
    desc: Meeting update action prompt text
    crit: notable
    conf: 0.84
    any:
      - id: meeting-action-deprecated
      - id: meeting-action-latest-version
      - id: meeting-action-start-button
      - id: meeting-action-video-features
  - id: meeting-live-lookalike-domain
    desc: Meeting lookalike payload domain
    crit: suspicious
    conf: 0.92
    any:
      - id: meeting-live-domain-teams-zoom-webex
      - id: meeting-live-domain-meet-skype-slack
  - id: meeting-updater-scpt-path
    desc: Meeting updater AppleScript stage path
    crit: notable
    conf: 0.9
    any:
      - id: meeting-updater-path-teams-zoom-webex
      - id: meeting-updater-path-meet-skype-slack
  - id: meeting-sdk-update-lure
    desc: Meeting SDK update prompt lure
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: meeting-sdk-update-lure-text
      - id: meeting-platform-docs-lure
      - id: meeting-update-action-text
      - id: micro-behaviors/process/create/script/apple-event::open-g-flag
  - id: meeting-lookalike-stage-lure
    desc: Meeting lookalike staged payload lure
    crit: suspicious
    conf: 0.97
    all:
      - id: meeting-sdk-update-lure
    any:
      - id: meeting-live-lookalike-domain
      - id: meeting-updater-scpt-path
  - id: meeting-softwareupdate-url-lure
    desc: Meeting softwareupdate URL lure
    crit: suspicious
    conf: 0.97
    for: [applescript]
    all:
      - id: meeting-platform-docs-lure
    any:
      - id: applescript-softwareupdate-url-product
      - id: applescript-softwareupdate-var-product
