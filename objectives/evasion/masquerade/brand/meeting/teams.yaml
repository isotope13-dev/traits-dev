defaults:
  platforms: [macos]
  for: [macho, swift, objc, applescript]
  attack: T1036.005

traits:
  - id: teams-basename
    desc: Binary named Teams
    crit: suspicious
    conf: 0.8
    if:
      type: path
      basename: true
      exact: Teams
  - id: teams-update-success-text
    desc: Teams update success text
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: Teams app has been updated successfully
  - id: teams-sdk-update-lure
    desc: Fake Teams SDK update lure
    crit: suspicious
    conf: 0.95
    for: [applescript]
    if:
      type: text
      substr: Microsoft Teams SDK Support
  - id: teams-docs-background-lure
    desc: Opens Teams docs as lure
    crit: suspicious
    conf: 0.93
    for: [applescript]
    if:
      type: text
      substr: learn.microsoft.com/en-us/microsoftteams/platform/whats-new
  - id: teams-live-lookalike-domain
    desc: Teams lookalike payload domain
    crit: suspicious
    conf: 0.96
    for: [applescript]
    if:
      type: text
      regex: 'https://teams-live\.com\.co/\d{3,8}/check'

composite_rules:
  - id: unsigned-teams-authentication-ui
    desc: Unsigned Teams authentication UI
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/signed/adhoc::unsigned
      - id: objectives/credential-access/phishing/lure::app-authentication-lure
    any:
      - id: teams-basename
      - id: teams-update-success-text
  - id: fake-teams-sdk-update-lure
    desc: Fake Teams SDK update lure
    crit: suspicious
    conf: 0.97
    for: [applescript]
    all:
      - id: teams-sdk-update-lure
      - id: teams-docs-background-lure
