defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036

traits:
  - id: yandex-installer-version-resource
    desc: Yandex installer version resource
    crit: component
    conf: 0.92
    if:
      type: text
      exact: Yandex Installer
      section: .rsrc
  - id: yandex-product-version-resource
    desc: Yandex product version resource
    crit: component
    conf: 0.9
    if:
      type: text
      exact: ProductYandexVersion
      section: .rsrc

composite_rules:
  - id: yandex-installer-dummy-cert
    desc: Yandex installer dummy certificate masquerade
    crit: suspicious
    conf: 0.95
    all:
      - id: yandex-installer-version-resource
      - id: yandex-product-version-resource
      - id: metadata/signed/developer::yandex-llc
      - id: metadata/signed/developer::dummy-certificate
    any:
      - id: metadata/binary/layout::pe-checksum-mismatch
      - id: metadata/binary/framework::large-rsrc-section
    needs: 1
  - id: yandex-masquerade-injection-loader
    desc: Yandex installer masquerade injection loader
    crit: hostile
    conf: 0.98
    all:
      - id: yandex-installer-dummy-cert
      - id: objectives/evasion/process/injection/memory::taskhostw-ntapi-injection
