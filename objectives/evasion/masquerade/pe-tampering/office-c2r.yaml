defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.009
  mbc: B0032
  size_min: 200000

traits:
  - id: office-c2r-build-pdb-path
    desc: Microsoft Office C2R build-pipeline PDB path
    crit: component
    conf: 0.97
    if:
      type: text
      regex: '[A-Z]:\\Target\\x(86|64)\\ship\\[a-z][a-z0-9_-]{1,32}\\'

  - id: office-csi-cmigrate-pdb
    desc: Microsoft Office CSI cmigrate.pdb marker
    crit: component
    conf: 0.99
    if:
      type: text
      substr: 'cmigrate.pdb'

composite_rules:
  - id: office-c2r-tampered-rwx-overlay
    desc: Tampered Microsoft Office C2R binary with RWX overlay
    crit: hostile
    conf: 0.97
    all:
      - id: office-c2r-build-pdb-path
      - id: metadata/hardening/memory::wx-section
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: objectives/anti-static/pack/heuristics::reloc-rwx-encrypted-payload
      - id: metadata/binary/section/names::suspicious-reloc-section
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-data-section
      - id: office-csi-cmigrate-pdb
