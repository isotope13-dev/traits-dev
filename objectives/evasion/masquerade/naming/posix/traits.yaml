defaults:
  platforms:
    - unix
    - android
    - ios
  crit: notable
  conf: 0.6
  for: [scripts, binaries]
traits:
  - id: backdoor-keywords
    desc: Backdoor-related naming patterns
    crit: notable
    if:
      type: text
      regex: \b(bkdr|bd_handler)\w*\b
      case_insensitive: true
  - id: trigger-a
    desc: Underscored trigger handler name
    crit: notable
    if:
      type: text
      regex: \btrigger_(func|handler|condition|event)\b
      case_insensitive: true
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: trigger-b
    desc: Trigger naming pattern family B
    crit: notable
    if:
      type: text
      word: on_trigger
      case_insensitive: true
  - id: secret-b
    desc: Secret naming pattern family B
    if:
      type: text
      regex: \b(hidden_cmd|covert_)\w*\b
      case_insensitive: true
composite_rules:
  - id: backdoor-comp
    desc: Backdoor naming pattern (suggests malicious intent)
    crit: notable
    conf: 0.6
    any:
      - id: backdoor-keywords
      - id: objectives/evasion/kernel-hide/keywords::rootkit-word
  - id: trigger
    desc: Trigger naming pattern
    crit: notable
    conf: 0.6
    any:
      - id: trigger-a
      - id: trigger-b
