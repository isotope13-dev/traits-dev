defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  conf: 0.6
  for: [scripts, binaries]
traits:
  - id: backdoor-keywords
    desc: Backdoor-related naming patterns
    if:
      type: string_value
      regex: \b(bkdr|bd_handler)\w*\b
      case_insensitive: true
  - id: magic-a
    desc: Magic value naming pattern family A
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: \bmagic_?(key|value|number|bytes)\w*\b
  - id: magic-b
    desc: Magic value naming pattern family B
    crit: component
    conf: 0.5
    if:
      type: string_value
      regex: \b(magic_?header|MAGIC_)\w*\b
  - id: trigger-a
    desc: Trigger naming pattern family A
    if:
      type: string_value
      regex: \btrigger_?(func|handler|condition|event)\b
      case_insensitive: true
  - id: trigger-b
    desc: Trigger naming pattern family B
    if:
      type: string_value
      word: on_trigger
      case_insensitive: true
  - id: secret-a
    desc: Secret naming pattern family A
    if:
      type: string_value
      regex: \bsecret_?(key|data|payload|cmd)\w*\b
      case_insensitive: true
  - id: secret-b
    desc: Secret naming pattern family B
    if:
      type: string_value
      regex: \b(hidden_cmd|covert_)\w*\b
      case_insensitive: true
composite_rules:
  - id: backdoor-comp
    desc: Backdoor naming pattern (suggests malicious intent)
    crit: notable
    conf: 0.6
    any:
      - id: backdoor-keywords
      - id: micro-behaviors/data/text/malware::rootkit-word
  - id: magic-comp
    desc: Magic value naming pattern
    crit: notable
    conf: 0.5
    any:
      - id: magic-a
      - id: magic-b
  - id: trigger
    desc: Trigger naming pattern (suggests conditional execution)
    crit: notable
    conf: 0.6
    any:
      - id: trigger-a
      - id: trigger-b
  - id: secret-comp
    desc: Secret/hidden payload naming pattern
    crit: notable
    conf: 0.6
    any:
      - id: secret-a
      - id: secret-b
