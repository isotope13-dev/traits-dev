defaults:
  platforms:
    - unix
    - android
    - ios
  crit: notable
  conf: 0.6
  for: [scripts, binaries]
traits:
  - id: backdoor-keywords
    desc: Backdoor-related naming patterns
    crit: notable
    if:
      type: text
      regex: \b(bkdr|bd_handler)\w*\b
      case_insensitive: true
    unless:
      - id: well-known/tool/dual-use/mihomo::mihomo-comment-bundle
  - id: secret-b
    desc: Secret naming pattern family B
    if:
      type: text
      regex: \b(hidden_cmd|covert_)\w*\b
      case_insensitive: true
composite_rules:
  - id: backdoor-comp
    desc: Backdoor naming pattern (suggests malicious intent)
    crit: notable
    conf: 0.6
    any:
      - id: backdoor-keywords
      - id: objectives/evasion/kernel-hide/keywords::rootkit-word
