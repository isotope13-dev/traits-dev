defaults:
  platforms:
    - unix
    - android
    - ios
  crit: notable
  conf: 0.6
  for: [scripts, binaries]
traits:
  - id: backdoor-keywords
    desc: Backdoor-related naming patterns
    crit: notable
    if:
      type: text
      regex: \b(bkdr|bd_handler)\w*\b
      case_insensitive: true
  - id: magic-a
    desc: Magic value naming pattern family A
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bmagic_?(key|value|bytes)\w*\b
    unless:
    - id: well-known/app/systemd::container-runtime-component-basename
  - id: magic-b
    desc: Magic value naming pattern family B
    crit: component
    conf: 0.5
    if:
      type: text
      regex: \b(magic_?header|MAGIC_)\w*\b
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: trigger-a
    desc: Trigger naming pattern family A
    crit: notable
    if:
      type: text
      regex: \btrigger_?(func|handler|condition|event)\b
      case_insensitive: true
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: trigger-b
    desc: Trigger naming pattern family B
    crit: notable
    if:
      type: text
      word: on_trigger
      case_insensitive: true
  - id: secret-a
    desc: Secret naming pattern family A
    crit: notable
    if:
      type: text
      regex: \bsecret_?(key|data|payload|cmd)\w*\b
      case_insensitive: true
    not:
      - regex: (?i)SecretKey(Selector|Ref|Volume|Source|Spec)
      - regex: (?i)SecretData(Source|Provider|Wrapper)
    downgrade:
      any:
        - id: metadata/signed/platform::apple
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: secret-b
    desc: Secret naming pattern family B
    if:
      type: text
      regex: \b(hidden_cmd|covert_)\w*\b
      case_insensitive: true
composite_rules:
  - id: backdoor-comp
    desc: Backdoor naming pattern (suggests malicious intent)
    crit: notable
    conf: 0.6
    any:
      - id: backdoor-keywords
      - id: objectives/evasion/kernel-hide/keywords::rootkit-word
  - id: magic-comp
    desc: Magic value naming pattern
    crit: suspicious
    conf: 0.5
    any:
      - id: magic-a
      - id: magic-b
    unless:
      - id: well-known/app/kilocode::kilo-code-js-bundle
  - id: trigger
    desc: Trigger naming pattern (suggests conditional execution)
    crit: notable
    conf: 0.6
    any:
      - id: trigger-a
      - id: trigger-b
  - id: secret-comp
    desc: Secret/hidden payload naming pattern
    crit: notable
    conf: 0.6
    any:
      - id: secret-a
      - id: secret-b
