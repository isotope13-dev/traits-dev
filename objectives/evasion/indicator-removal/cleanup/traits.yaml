defaults:
  platforms:
  - unix
  - windows
  crit: notable
  attack: T1070.004
  mbc: F0005
  for:
  - python
  - shell
traits:
- id: touch-marker-file
  desc: Touch execution marker file
  crit: suspicious
  conf: 0.75
  if:
    type: string_literal
    regex: touch.{0,50}\.(ran|done|exec)\b
- id: hidden-tmp-marker
  desc: Hidden marker in tmp
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: /tmp/\.[a-z].{0,50}-ran|/tmp/\.[a-z].{0,50}-done
- id: marker-ran-indicator
  desc: Marker file ran indicator
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    regex: -ran["']|\.ran["']|_ran["']
- id: marker-done-indicator--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: string_literal
    regex: (marker|tracker).{0,20}(-done|\.done|_done)["']
  count_max: 1020271
- id: marker-done-indicator--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: string_literal
    regex: (state|status).{0,20}(-done|\.done|_done)["']
  count_max: 1020272
- id: execution-tracker-a
  desc: Python or script ran marker
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: (python|script)-ran
- id: execution-tracker-b
  desc: Marker or tracker ran status
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: \b(marker|tracker)([._-][A-Za-z0-9]{1,12})?[._-](ran|done)\b
- id: marker-done-indicator-cond-0--inline-20274
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: path
    regex: (^|[\\/])[^\\/]{0,120}\.m4$
  count_max: 1020275
- id: marker-done-indicator-cond-1--inline-20275
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: \$[A-Za-z0-9_]{1,40}_done["']
  count_max: 1020276
- id: marker-done-indicator-cond-2--inline-20276
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    substr: querySelector('#b.done')
  count_max: 1020277
composite_rules:
- id: marker-file-creation
  desc: Marker file creation
  crit: suspicious
  conf: 0.85
  attack: T1070.004 - python - shell
  needs: 2
  any:
  - id: touch-marker-file
  - id: hidden-tmp-marker
  - id: marker-ran-indicator
- id: execution-tracking
  desc: Execution tracking behavior
  crit: suspicious
  conf: 0.9
  mbc: F0005 - python - shell
  needs: 2
  any:
  - id: marker-file-creation
  - id: execution-tracker
- id: execution-tracker
  desc: Execution tracking file
  crit: suspicious
  conf: 0.8
  any:
  - id: execution-tracker-a
  - id: execution-tracker-b
- id: marker-done-indicator
  desc: Marker file done indicator
  crit: suspicious
  conf: 0.75
  any:
  - id: marker-done-indicator--rx-1
  - id: marker-done-indicator--rx-2
  unless:
  - id: marker-done-indicator-cond-0--inline-20274
  - id: marker-done-indicator-cond-1--inline-20275
  - id: marker-done-indicator-cond-2--inline-20276
