defaults:
  platforms: [linux]
  for: [elf]
  attack: T1070.004
  mbc: C0047

composite_rules:
  - id: self-deleting-shell-download-stager
    desc: Shell downloader removes executed payloads
    crit: hostile
    conf: 0.99
    attack: T1105,T1070.004
    platforms: [unix]
    for: [shell]
    near_lines: 8
    all:
      - id: objectives/command-and-control/dropper/delivery/fetch-exec::raw-ip-repeated-download-exec-cleanup
      - id: micro-behaviors/fs/delete/directory::shell-recursive-delete

  - id: self-deleting-elf-download-stager
    desc: ELF downloader deletes staged payloads
    crit: hostile
    conf: 0.99
    attack: T1105,T1070.004
    all:
      - id: objectives/command-and-control/dropper/delivery/download-execute::raw-ip-download-chmod-relative-exec
      - id: micro-behaviors/fs/directory/delete::rm-rf

  - id: multi-protocol-payload-cleanup
    desc: Multi-protocol payload cleanup
    crit: hostile
    conf: 0.98
    attack: T1105,T1070.004,T1059.004
    platforms: [unix]
    for: [shell]
    near_bytes: 1024
    all:
      - id: objectives/command-and-control/botnet/iot::multi-protocol
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
      - id: micro-behaviors/process/create/local-exec::interpreter-local-relative-script
      - id: micro-behaviors/fs/delete/directory::shell-recursive-delete
