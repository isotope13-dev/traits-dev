# Go Anti-Forensics: Secure File Deletion (Shredding)
# Detects Go source code implementing multi-pass file overwrite followed by deletion,
# a secure shred pattern used by RATs to destroy evidence on remote clients.
# ATT&CK: T1070.004 (Indicator Removal: File Deletion)
# MBC: F0005 (Anti-Forensic)
defaults:
  platforms: [windows, unix]
  for: [go]
  attack: T1070.004
  mbc: F0005

traits:
  # A "shred" struct with Remove:true is the clearest signal of intentional
  # secure deletion — overwrites data before deleting, defeating forensic recovery.
  - id: go-shred-remove-flag
    desc: Go shred struct with Remove flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: "Remove: true"

  # Times: N in a shred/wipe struct indicates multi-pass overwrite
  - id: go-shred-times-field
    desc: Go shred struct overwrite count field
    crit: component
    conf: 0.75
    if:
      type: text
      regex: "Times:\\s+[0-9]"

  # Zeros: true means zeroing pass after random data — standard shred pattern
  - id: go-shred-zeros-flag
    desc: Go shred struct with Zeros zeroing pass
    crit: component
    conf: 0.75
    if:
      type: text
      substr: "Zeros: true"

composite_rules:
  - id: go-secure-shred-pattern
    desc: Go multi-pass secure file shred with delete
    crit: suspicious
    conf: 0.92
    all:
      - id: go-shred-remove-flag
    any:
      - id: go-shred-times-field
      - id: go-shred-zeros-flag
