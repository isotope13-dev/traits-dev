defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1070
traits:
  - id: securezeromemory-string
    desc: SecureZeroMemory anti-forensic macro
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: SecureZeroMemory
    unless:
      - id: well-known/app/wireshark/
      - id: well-known/lib/benign-runtime-bundles::dotnet-aspnetcore-crypto-runtime
      - id: well-known/app/windows-desktop-tools::steamkit2-library
  - id: rtlsecurezeromemory-string
    desc: RtlSecureZeroMemory ntdll forward
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: RtlSecureZeroMemory
    unless:
      - id: well-known/app/wireshark/
  - id: zeroize-crate-symbol
    desc: Rust zeroize crate symbol
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \bzeroize::(Zeroize|Zeroizing|ZeroizeOnDrop)\b
composite_rules:
  - id: anti-forensic-memory-scrub
    desc: Anti-forensic memory scrub primitives
    crit: suspicious
    conf: 0.9
    any:
      - id: securezeromemory-string
      - id: rtlsecurezeromemory-string
      - id: zeroize-crate-symbol
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework/
      - id: well-known/tool/sysadmin/sandboxie/
      - id: well-known/lib/benign-runtime-bundles::dotnet-aspnetcore-crypto-runtime
  - id: scrubbing-shellcode-loader
    desc: Shellcode loader with heap-scrub anti-forensic flow
    crit: hostile
    conf: 0.93
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
      - id: micro-behaviors/mem/alloc/heap::heap-free
      - id: micro-behaviors/mem/c-runtime/functions::vectorized-zero-fill
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework/
