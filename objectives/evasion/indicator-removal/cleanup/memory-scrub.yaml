defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1070
traits:
  - id: securezeromemory-string
    desc: SecureZeroMemory anti-forensic macro
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: SecureZeroMemory
  - id: rtlsecurezeromemory-string
    desc: RtlSecureZeroMemory ntdll forward
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: RtlSecureZeroMemory
  - id: zeroize-crate-symbol
    desc: Rust zeroize crate symbol
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \bzeroize::(Zeroize|Zeroizing|ZeroizeOnDrop)\b
  - id: virtual-lock-symbol
    desc: VirtualLock import (memory pinning for secrets)
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: VirtualLock
  - id: virtual-unlock-symbol
    desc: VirtualUnlock import (paired with secure-zero)
    crit: notable
    conf: 0.9
    if:
      type: import
      exact: VirtualUnlock
  - id: vectorized-zero-density
    desc: Vectorized zero-fill blocks (xorps + movups stores)
    crit: component
    conf: 0.6
    arch: [x86-64]
    size_max: 5242880
    count_min: 3
    if:
      type: hex
      section: .text
      pattern: 0F 57 C0 0F 11
composite_rules:
  - id: anti-forensic-memory-scrub
    desc: Anti-forensic memory scrub primitives
    crit: suspicious
    conf: 0.9
    any:
      - id: securezeromemory-string
      - id: rtlsecurezeromemory-string
      - id: zeroize-crate-symbol
      - id: virtual-lock-symbol
      - id: virtual-unlock-symbol
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: scrubbing-shellcode-loader
    desc: Shellcode loader with heap-scrub anti-forensic flow
    crit: hostile
    conf: 0.93
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
      - id: micro-behaviors/mem/alloc/heap::heap-free
      - id: vectorized-zero-density
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
