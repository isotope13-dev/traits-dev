defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1070

traits:
  - id: provider-container-api-key-env
    desc: Provider container API key environment
    crit: component
    conf: 0.92
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    if:
      type: text
      substr: CONTAINER_API_KEY

  - id: vast-instance-api-endpoint
    desc: Vast instance API endpoint
    crit: component
    conf: 0.92
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    if:
      type: text
      substr: console.vast.ai/api/v0/instances/

composite_rules:
  - id: python-cloud-instance-self-delete
    desc: Python cloud instance self-delete
    crit: hostile
    conf: 0.98
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    all:
      - id: micro-behaviors/communications/http/delete::urllib-bearer-delete
      - id: provider-container-api-key-env
      - id: vast-instance-api-endpoint

  - id: bootstrap-then-cloud-instance-self-delete
    desc: Bootstrap payload then cloud instance self-delete
    crit: hostile
    conf: 0.98
    ref: sha256:3c194dcffee3decd03e434a716b0e71b3d6eb5a21e3e7776c12ef33d50451ce2
    all:
      - id: python-cloud-instance-self-delete
      - id: micro-behaviors/fs/write/content::python-materializes-bootstrap-script
      - id: micro-behaviors/fs/write/content::root-flash-staging-path
