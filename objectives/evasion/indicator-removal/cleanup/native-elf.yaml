defaults:
  platforms: [linux]
  for: [elf]
  attack: T1070.002

traits:
  - id: log-directory-filter-script
    desc: Embeds log-directory filtering script
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: 'find\s+%s\s+-type\s+f\|grep\s+-v\s+wtmp\|grep\s+-v\s+utmp\|grep\s+-v\s+lastlog'
  - id: temporary-script-chmod
    desc: Makes temporary script executable
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'chmod\s+\+x\s+/tmp/[A-Za-z0-9_.-]{1,80}'
  - id: log-filter-temp-copy
    desc: Filters log contents through temporary files
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'grep\s+-v.{0,100}/tmp/[A-Za-z0-9_.-]{1,80}\.tmp'

composite_rules:
  - id: elf-log-directory-scrubber
    desc: Executes temporary log-scrubbing script
    crit: hostile
    conf: 0.99
    all:
      - id: log-directory-filter-script
      - id: temporary-script-chmod
      - id: log-filter-temp-copy
      - id: micro-behaviors/process/create/shell/spawn::system-fn
