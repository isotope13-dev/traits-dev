# Binary-tamper restorer / anti-forensic cleanup.
#
# After corrupting a target binary in memory, an exploit drops a small script
# that: clears the file's immutable flag, writes the saved ORIGINAL bytes back
# in place (dd conv=notrunc) so the on-disk binary looks untouched, re-applies
# the original flags, deletes its own helper artifacts, and drops a shell.
# The restore-original-bytes + clear-flags + self-delete + shell shape is
# specific to tamper-hiding, not ordinary maintenance scripts.
# ATT&CK: T1070 (Indicator Removal)
defaults:
  attack: T1070
  platforms: [unix]
  for: [c, cpp, scripts]
traits:
  - id: tmp-hidden-file-cleanup
    desc: Removes hidden temp artifacts
    crit: component
    conf: 0.8
    if:
      type: text
      regex: \brm\s+-[rf]{1,2}\s.{0,60}/tmp/\.
composite_rules:
  # Restore saved original bytes in place + clear BSD immutable flag + delete
  # own temp artifacts = a binary-tamper restorer hiding the modification.
  - id: binary-tamper-restore-cleanup
    desc: In-place binary restore with flag clear and self-cleanup
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/fs/file/write/direct::dd-conv-notrunc
      - id: micro-behaviors/fs/attributes/chflags::chflags-clear-flags
      - id: tmp-hidden-file-cleanup
  # Same restorer that also drops an interactive root shell.
  - id: tamper-restorer-shell-drop
    desc: Binary-tamper restorer dropping interactive shell
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/fs/file/write/direct::dd-conv-notrunc
      - id: tmp-hidden-file-cleanup
      - id: micro-behaviors/process/create/shell/invoke::bin-sh-interactive
