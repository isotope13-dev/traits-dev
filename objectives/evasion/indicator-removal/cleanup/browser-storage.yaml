# Anti-forensic wiping of an extension's own client-side data stores.
#
# Enumerating every IndexedDB database and deleting each one is not how an app
# clears a cache — a legitimate app deletes the specific database it created by
# name. The enumerate-all-and-delete-each idiom, run unconditionally at the top
# of a background service worker (so it executes on every worker start), erases
# whatever local state the extension accumulated (queued telemetry, install
# ids, prior config) before an examiner can read it. Security researchers
# documented exactly this as the shared anti-forensic fingerprint of a
# 141-extension live-wallpaper PUP/adware campaign (Socket / The Hacker News,
# 2026-06): "All ... extensions included an IndexedDB enumerate-and-delete
# routine running on each service-worker start."
#
# The wipe capability itself is notable (an extension resetting its own store
# can be benign cache management). It becomes anti-forensic trace removal when
# it runs inside a monetized/tracked extension — one that carries UTM install
# attribution and a lifecycle uninstall URL — which is the context this
# composite requires so ordinary cache resets do not inherit the finding.
defaults:
  platforms: [unix, windows]
  for: [crx, xpi, zip]
  attack: T1070

composite_rules:
  - id: monetized-extension-indexeddb-wipe
    desc: Extension wipes all its own IndexedDB stores on startup (anti-forensic)
    crit: suspicious
    conf: 0.9
    mbc: F0007
    scope: archive
    all:
      - id: micro-behaviors/data/db/web-storage::extension-own-indexeddb-reset
      - id: micro-behaviors/communications/http/url/query::utm-source-medium-campaign-url
      - id: micro-behaviors/browser-extension/lifecycle::runtime-set-uninstall-url
