defaults:
  platforms:
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: killall-terminal
    desc: Kill Terminal app (hide evidence)
    crit: suspicious
    conf: 0.9
    platforms: [macos]
    for: [macho, shell, applescript]
    attack: T1070
    if:
      type: text
      substr: killall Terminal
  - id: shell-cert-path-rm-rf
    desc: Shell removes staged certificate path
    crit: component
    conf: 0.9
    for: [shell]
    ref: sha256:e4445eaa3155940f60991241a809409aa70b708303a0d07aa35b2e3d2bf76885
    if:
      type: text
      regex: '\brm\s+-rf\s+["'']?\$CERT_PATH["'']?'
composite_rules:
  - id: applescript-hidden-stage-cleanup
    desc: AppleScript hidden C2 stage cleanup
    crit: hostile
    conf: 0.98
    platforms: [macos]
    for: [applescript]
    attack: T1070.004,T1105
    all:
      - id: objectives/command-and-control/dropper/delivery/download-execute::fetch-output-hidden-stage
      - id: objectives/evasion/self-delete/file/script::applescript-rm-hidden-tmp
      - id: objectives/command-and-control/dropper/staging/memory::applescript-c2-module-exec
  - id: kubernetes-client-cert-cleanup
    desc: Kubernetes credential artifact cleanup
    crit: hostile
    conf: 0.99
    for: [shell]
    platforms: [unix]
    attack: T1070.004
    ref: sha256:e4445eaa3155940f60991241a809409aa70b708303a0d07aa35b2e3d2bf76885
    all:
      - id: objectives/credential-access/cloud/token/cli::kubernetes-client-cert-bundle-materialization
      - id: objectives/credential-access/validation/check::kubernetes-client-cert-mtls-validation
      - id: shell-cert-path-rm-rf
