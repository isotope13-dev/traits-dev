defaults:
  platforms:
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: kill-signal-9-direct
    desc: Direct process kill with signal 9
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?m)^\s*(pkill|killall|kill)\s+-9\s+
    unless:
      - id: metadata/package/testing/presence/harness::freebsd-pjdfstest-shell
    attack: T1070.003
  - id: kill-signal-9-command
    desc: Process kill command with signal 9
    crit: component
    conf: 0.8
    if:
      type: text
      regex: \b(pkill|killall|kill)\s+-9\b
    attack: T1070.003
  - id: shell-exec-wrapper
    desc: Shell execution wrapper
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?m)^[ \t]*[^/#*\n]{0,200}\b(exec|system|shell_exec)\s*\(
    attack: T1059
  - id: process-open-wrapper
    desc: Process open wrapper
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?m)^[ \t]*[^/#*\n]{0,200}\b(passthru|proc_open)\s*\(
    attack: T1059
  - id: killall-terminal
    desc: Kill Terminal app (hide evidence)
    crit: suspicious
    conf: 0.9
    platforms: [macos]
    for: [macho, shell, applescript]
    attack: T1070
    if:
      type: text
      substr: killall Terminal
composite_rules:
  - id: pkill-signal-9-wrapped
    desc: Process kill signal 9 through execution wrapper
    crit: notable
    conf: 0.82
    attack: T1070.003
    all:
      - id: kill-signal-9-command
    any:
      - id: shell-exec-wrapper
      - id: process-open-wrapper
  - id: pkill-signal-9
    desc: Process kill with signal 9
    crit: notable
    conf: 0.82
    attack: T1070.003
    any:
      - id: kill-signal-9-direct
      - id: pkill-signal-9-wrapped
