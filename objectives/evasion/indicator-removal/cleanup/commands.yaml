defaults:
  platforms:
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: pkill-signal-9
    desc: pkill with kill -9 signal
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (killall -9|kill\s+-9)
    unless:
      - id: metadata/package/testing/presence/harness::freebsd-pjdfstest-shell
    attack: T1070.003
  - id: killall-terminal
    desc: Kill Terminal app (hide evidence)
    crit: suspicious
    conf: 0.9
    platforms: [macos]
    for: [macho, shell, applescript]
    attack: T1070
    if:
      type: text
      substr: killall Terminal
