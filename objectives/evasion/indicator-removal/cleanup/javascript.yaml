defaults:
  platforms: [windows]
  for: [javascript]

composite_rules:
  - id: js-wsh-staged-file-cleanup
    desc: JScript cleans a staged file after hidden PowerShell execution
    crit: hostile
    conf: 0.98
    attack: T1070.004,T1059.001,T1059.007
    mbc: B0006
    all:
      - id: micro-behaviors/fs/delete/file::fso-deletefile-call
      - id: objectives/execution/interpreter/script/dropper::wsh-powershell-dropper
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run
