defaults:
  attack: "T1070.001"
  mbc: "F0005"
  for: [pe, dll, c, cpp]
  platforms: [windows]
traits:
- id: clear-eventlog-api
  desc: ClearEventLog API reference
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '\b(ClearEventLogA|fClearEventLog)\s*\('
  unless:
  - id: metadata/lang/source::windows-dll-ordinal-lookup-source
  - id: metadata/lang/source/
  - id: metadata/lang/source/
  - id: metadata/lang/source::windows-sdk-network-header-declarations
  - id: metadata/lang/source/
- id: clear-eventlog-import
  desc: ClearEventLog import symbol
  crit: suspicious
  conf: 0.96
  for: [pe, dll]
  if:
    type: import
    exact: ClearEventLogA
  unless:
  - id: well-known/lib/wine/
- id: fsctl-delete-usn-journal--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: FSCTL_DELETE_USN_JOURNAL
  count_max: 1020156
- id: fsctl-delete-usn-journal--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: USN_DELETE_FLAG_DELETE
  count_max: 1020157
- id: fsctl-delete-usn-journal--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: DeleteUsnJournalData
  count_max: 1020158
composite_rules:
- id: clear-eventlog-signal
  desc: ClearEventLog signal
  crit: component
  conf: 0.96
  any:
  - id: clear-eventlog-api
  - id: clear-eventlog-import
- id: clear-windows-event-logs-native
  desc: Clear Windows event logs natively
  crit: suspicious
  conf: 0.97
  all:
  - id: clear-eventlog-signal
  - id: micro-behaviors/os/event/log::event-log-open
  unless:
  - id: well-known/lib/microsoft-imagehlp::microsoft-debug-helper-dll
  downgrade:
    any:
    - id: metadata/lang/source/
- id: native-usn-journal-clearing
  desc: Clears NTFS change journal natively
  crit: suspicious
  conf: 0.97
  attack: "T1070.004"
  all:
  - id: fsctl-delete-usn-journal
  - id: micro-behaviors/fs/file/handle::device-io-control-win
- id: fsctl-delete-usn-journal
  desc: Deletes NTFS change journal
  crit: suspicious
  conf: 0.96
  attack: "T1070.004"
  any:
  - id: fsctl-delete-usn-journal--rx-1
  - id: fsctl-delete-usn-journal--rx-2
  - id: fsctl-delete-usn-journal--rx-3
