defaults:
  attack: "T1070.001"
  mbc: "F0005"
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: clear-eventlog-api
    desc: ClearEventLog API reference
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\b(ClearEventLogA|fClearEventLog)\s*\('
    unless:
      - id: metadata/lang/source::windows-dll-ordinal-lookup-source
      - id: metadata/lang/source::windows-compat-api-source
      - id: metadata/lang/source::wine-compat-source
      - id: metadata/lang/source::windows-sdk-network-header-declarations
      - id: metadata/lang/source::windows-eventlog-service-implementation
  - id: open-eventlog-api
    desc: OpenEventLog API reference
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\b(OpenEventLogA|fOpenEventLog)\s*\('
    unless:
      - id: metadata/lang/source::windows-dll-ordinal-lookup-source
      - id: metadata/lang/source::windows-compat-api-source
      - id: metadata/lang/source::wine-compat-source
      - id: metadata/lang/source::windows-sdk-network-header-declarations
      - id: metadata/lang/source::windows-eventlog-service-implementation
composite_rules:
  - id: clear-windows-event-logs-native
    desc: Clear Windows event logs natively
    crit: suspicious
    conf: 0.97
    all:
      - id: clear-eventlog-api
      - id: open-eventlog-api
