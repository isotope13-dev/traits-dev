defaults:
  platforms: [netbsd, unix, windows]
  for: [csharp, pe]
  attack: T1070.001

traits:
  - id: csharp-var-log-list
    desc: C# Unix log file list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/log/auth\.log[\s\S]{0,220}/var/log/messages[\s\S]{0,220}/var/log/cron'

  - id: csharp-empty-log-write
    desc: C# empty log write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'File\.WriteAllText\(log,\s*""\)'

composite_rules:
  - id: csharp-unix-log-clearing
    desc: C# Unix log clearing
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-var-log-list
      - id: csharp-empty-log-write
