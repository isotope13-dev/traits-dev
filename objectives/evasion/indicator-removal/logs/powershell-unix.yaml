defaults:
  platforms: [unix, netbsd, windows]
  for: [powershell]
  attack: T1070.002

traits:
  - id: ps-remove-staging-dirs
    desc: PS removes staging dirs
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'stagingDirs[\s\S]{0,220}Remove-Item -Recurse -Force'

composite_rules:
  - id: ps-history-eventlog-cleanup
    desc: PS history eventlog cleanup
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/shell/history::powershell-history-theft
      - id: objectives/evasion/indicator-removal/logs::clear-eventlog
    any:
      - id: ps-remove-staging-dirs
