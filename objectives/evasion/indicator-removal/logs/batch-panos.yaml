defaults:
  platforms: [panos, appliance, windows]
  for: [batch]
  attack: T1070.001

traits:
  - id: batch-panos-wevtutil-clear
    desc: Batch PAN-OS wevtutil clear
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'wevtutil cl (Security|Application)'

  - id: batch-panos-eventlog-disable
    desc: Batch PAN-OS eventlog disable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sc config eventlog start= disabled

composite_rules:
  - id: batch-panos-log-clear-disable
    desc: Batch PAN-OS log clear disable
    crit: hostile
    conf: 0.98
    all:
      - id: batch-panos-wevtutil-clear
      - id: batch-panos-eventlog-disable

  - id: batch-panos-log-history-removal
    desc: Batch PAN-OS log history removal
    crit: hostile
    conf: 0.98
    all:
      - id: batch-panos-wevtutil-clear
      - id: objectives/credential-access/shell/history::consolehost-history
