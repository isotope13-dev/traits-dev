defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - shell
traits:
  - id: var-log-lastlog
    desc: /var/log/lastlog last login
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      exact: /var/log/lastlog
  - id: var-log-auth
    desc: /var/log/auth authentication log
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /var/log/auth
  - id: var-log-cron
    desc: /var/log/cron cron log
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /var/log/cron
  - id: var-spool-mail
    desc: /var/spool/mail user mail
    crit: component
    conf: 0.7
    if:
      type: text
      substr: /var/spool/mail
    unless:
      - id: metadata/package/testing/presence/harness::test-fixture-directory
      - type: path
        regex: '(^|[\\/])testdata[\\/]'
      - type: path
        regex: '(^|[\\/])lib[\\/]apk[\\/]db[\\/]scripts\.tar$'
      - id: well-known/tool/sysadmin/alpine-packages::alpine-apk-scripts-db
  - id: echo-redirect-var-log
    desc: echo overwrite to /var/log
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.001
    if:
      type: text
      regex: "echo\\s+(['\"]{0,2}|[^-\\s>][^>\\n]{0,40})\\s*>\\s*/var/log/"
    not:
      - regex: 'echo\s+["'']\*/[0-9]+(\s+\*){4}'
  - id: echo-redirect-var-spool
    desc: echo overwrite to /var/spool
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.001
    if:
      type: text
      regex: echo\s+\S+\s*>\s*/var/spool/
  - id: redirect-var-log
    desc: '>/var/log/ redirect to log file'
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.001
    if:
      type: text
      regex: '(^|\n)>\s*/var/log/(auth|secure|syslog)\b'
  - id: history-c
    desc: history -c clear history command
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.003
    if:
      type: string_literal
      substr: history -c
  - id: history-r
    desc: history -r reload history command
    crit: suspicious
    conf: 0.7
    mbc: F0005
    if:
      type: string_literal
      substr: history -r
  - id: unset-histfile
    desc: unset HISTFILE command
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.003
    if:
      type: string_literal
      substr: unset HISTFILE
  - id: truncate-var-log
    desc: truncate /var/log command
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.001
    if:
      type: text
      regex: truncate\s+(-s\s*0\s+)?/var/log
composite_rules:
  - id: system-log
    desc: Reference to system log file
    crit: suspicious
    conf: 0.66
    any:
      - id: micro-behaviors/fs/path/log/accounting::multiple-log-files
      - id: var-log-lastlog
      - id: var-log-auth
      - id: micro-behaviors/fs/path/log/system::log-var
      - id: var-log-cron
      - id: var-spool-mail
  - id: log-clear
    desc: System log clearing
    crit: suspicious
    conf: 0.65
    any:
      - id: redirect-var-log
      - id: echo-redirect-var-log
      - id: echo-redirect-var-spool
      - id: history-c
      - id: history-r
      - id: unset-histfile
      - id: truncate-var-log
  - id: multi-log-wipe
    desc: Overwrites multiple log files
    crit: suspicious
    conf: 0.95
    mbc: F0005
    attack: T1070.001
    all:
      - id: log-clear
    needs: 2
    any:
      - id: micro-behaviors/fs/path/log/accounting::multiple-log-files
      - id: var-log-lastlog
      - id: var-log-auth
      - id: micro-behaviors/fs/path/log/system::log-var
      - id: var-log-cron
      - id: var-spool-mail
