defaults:
  platforms: [netbsd, unix]
  for: [swift]
  attack: T1070.001

traits:
  - id: swift-netbsd-log-list
    desc: Swift NetBSD log list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/log/messages[\s\S]{0,220}/var/log/secure[\s\S]{0,220}/var/log/maillog'

  - id: swift-history-and-dmesg-clear
    desc: Swift clears history and dmesg
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'history -c[\s\S]{0,420}dmesg[\s\S]{0,80}-C'

composite_rules:
  - id: swift-netbsd-log-history-clear
    desc: Swift NetBSD log history clear
    crit: hostile
    conf: 0.98
    all:
      - id: swift-netbsd-log-list
      - id: swift-history-and-dmesg-clear
