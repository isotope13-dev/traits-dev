defaults:
  platforms: [unix]
  for: [shell]
  attack: T1070

traits:
  - id: shell-macos-history-delete
    desc: Shell macOS history delete
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\$HOME/\.(bash_history|zsh_history|sh_history|history)[\s\S]{0,180}rm -f "\$histfile"'

  - id: shell-macos-log-delete
    desc: Shell macOS log delete
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'rm -rf "$HOME/Library/Logs"/*'

  - id: shell-macos-varlog-delete
    desc: Shell macOS varlog delete
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/log/(asl/\*\.asl|system\.log|install\.log)'

composite_rules:
  - id: shell-macos-log-history-clear
    desc: Shell macOS log history clear
    crit: hostile
    conf: 0.96
    needs: 2
    any:
      - id: shell-macos-history-delete
      - id: shell-macos-log-delete
      - id: shell-macos-varlog-delete
