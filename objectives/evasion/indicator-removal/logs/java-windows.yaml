defaults:
  platforms: [windows]
  for: [java, class, java_class, jar]
  attack: T1070.001
  mbc: F0005

traits:
  - id: java-wevtutil-clear-logs
    desc: Java clears event logs
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '"wevtutil"[\s\S]{0,80}"cl"|wevtutil[\s\S]{0,80}cl'

  - id: java-prefetch-cleanup
    desc: Java removes Prefetch files
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Windows[\s\S]{0,80}Prefetch[\s\S]{0,220}Files\.delete'

composite_rules:
  - id: java-windows-log-clear
    desc: Java clears Windows logs
    crit: hostile
    conf: 0.98
    all:
      - id: java-wevtutil-clear-logs
    any:
      - id: java-prefetch-cleanup
      - id: micro-behaviors/process/create/spawn::java-processbuilder-source
