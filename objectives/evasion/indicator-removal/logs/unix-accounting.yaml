defaults:
  platforms:
    - unix
  for:
    - c
  attack: T1070.001
traits:
  - id: utmp-user-match
    desc: Matches utmp records by username
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: strncmp\((ut|utx|utmp_ent)\.(ut_name), ?who, ?strlen\(who\)\)
  - id: utmp-line-match
    desc: Matches utmp records by tty line
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: strncmp\((ut|utx)\.(ut_line), line, strlen\(line\)\)
  - id: zero-utmp-record
    desc: Zeroes utmp record structures
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: bzero\(\(char \*\)&? ?ut(mp_ent|x?),sizeof
  - id: zero-lastlog-record
    desc: Zeroes lastlog record structure
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: bzero\(\(char \*\)&? ?(ll|newll),sizeof
  - id: seek-and-overwrite-record
    desc: Seeks backward before record overwrite
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: lseek\(f, ?-\(.{0,40}(SEEK_CUR|L_XTND)
  - id: lastlog-time-forgery
    desc: Rewrites lastlog timestamp field
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: ll.ll_time = mktime(tm);
  - id: lastlog-host-forgery
    desc: Rewrites lastlog host field
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: strncpy(ll.ll_host, host, sizeof(ll.ll_host));
  - id: lastlog-time-format
    desc: Accepts forged YYMMddhhmm timestamp
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: 'fprintf(stderr, "ERROR: Time format is YYMMddhhmm.\n");'
  - id: tmp-accounting-file
    desc: Creates temporary accounting rewrite file
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: tmpf = tmpnam((char *) NULL);
  - id: tty-device-account-match
    desc: Matches accounting records by tty device
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: if ( !(ac.ac_uid == pwd->pw_uid && ac.ac_tty == sbuf.st_rdev) )
  - id: copy-back-accounting-log
    desc: Copies cleaned accounting file back
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: copy_file(tmpf, ACCT_FILE);
  - id: wtmp-cleanup-status
    desc: Reports wtmp cleanup complete
    for: [elf]
    crit: component
    conf: 0.92
    if:
      type: text
      exact: wtmp logs cleaned up.
  - id: utmp-cleanup-status
    desc: Reports utmp cleanup complete
    for: [elf]
    crit: component
    conf: 0.92
    if:
      type: text
      exact: utmp logs cleaned up.
  - id: wtmp-cleanup-status-xor
    desc: XOR-obfuscated wtmp cleanup status
    for: [elf]
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      encoding: xor
      exact: wtmp logs cleaned up.
  - id: utmp-cleanup-status-xor
    desc: XOR-obfuscated utmp cleanup status
    for: [elf]
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      encoding: xor
      exact: utmp logs cleaned up.
composite_rules:
  - id: login-record-wipe
    desc: Selectively wipes login accounting records
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/path/log/accounting::login-accounting-files
    needs: 3
    any:
      - id: utmp-user-match
      - id: utmp-line-match
      - id: zero-utmp-record
      - id: seek-and-overwrite-record
  - id: lastlog-record-forgery
    desc: Alters lastlog timestamps and hosts
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/fs/path/log/accounting::lastlog-file
    needs: 2
    any:
      - id: lastlog-time-forgery
      - id: lastlog-host-forgery
      - id: lastlog-time-format
      - id: zero-lastlog-record
  - id: process-accounting-log-wipe
    desc: Rewrites process accounting records
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/fs/path/log/accounting::pacct-file
      - id: tmp-accounting-file
      - id: copy-back-accounting-log
      - id: tty-device-account-match
  - id: binary-accounting-cleanup-status
    desc: Cleanup status strings for accounting logs
    for: [elf]
    crit: component
    conf: 0.94
    any:
      - id: wtmp-cleanup-status
      - id: utmp-cleanup-status
      - id: wtmp-cleanup-status-xor
      - id: utmp-cleanup-status-xor
  - id: binary-accounting-cleanup-status-xor
    desc: XOR-obfuscated accounting cleanup status
    for: [elf]
    crit: suspicious
    conf: 0.98
    any:
      - id: wtmp-cleanup-status-xor
      - id: utmp-cleanup-status-xor
  - id: login-record-wipe-binary
    desc: Clears login accounting logs in ELF
    for: [elf]
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/fs/path/log/accounting::login-accounting-files-binary
      - id: binary-accounting-cleanup-status
  - id: login-record-wipe-binary-obfuscated
    desc: XOR-obfuscated login accounting cleanup
    for: [elf]
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/log/accounting::login-accounting-files-binary-xor
      - id: binary-accounting-cleanup-status-xor
  - id: unix-accounting-log-wipe-legacy
    desc: Clears Unix login and accounting evidence
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/log/accounting::unix-accounting-logs
    needs: 2
    any:
      - id: login-record-wipe
      - id: lastlog-record-forgery
      - id: process-accounting-log-wipe
  - id: unix-accounting-log-wipe
    desc: Clears Unix login and accounting evidence
    crit: suspicious
    conf: 0.98
    any:
      - id: unix-accounting-log-wipe-legacy
      - id: login-record-wipe-binary
      - id: login-record-wipe-binary-obfuscated
