defaults:
  platforms: [unix, openwrt]
  for: [perl]
  attack: T1070.002

composite_rules:
  - id: perl-var-log-truncation
    desc: Perl system log truncation
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/fs/path/log/system::log-var
      - id: micro-behaviors/fs/file/truncate::shell-truncate-log-redirection
    any:
      - id: micro-behaviors/process/create/shell/lang::backticks-exec
      - id: micro-behaviors/process/create/shell/lang::system-call
