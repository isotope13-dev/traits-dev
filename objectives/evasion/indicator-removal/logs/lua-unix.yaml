defaults:
  platforms: [unix, fortios]
  for: [lua]
  attack: T1070.002

traits:
  - id: lua-var-log-paths
    desc: Lua targets appliance logs
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/var/log/(syslog|fortigate\.log)'

  - id: lua-open-write-mode
    desc: Lua opens file in write mode
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'io\.open\s*\(.{0,80},\s*"w"'

composite_rules:
  - id: lua-unix-log-truncate
    desc: Lua truncates Unix logs
    crit: hostile
    conf: 0.98
    all:
      - id: lua-var-log-paths
      - id: lua-open-write-mode
