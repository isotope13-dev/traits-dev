defaults:
  platforms: [linux]
  for: [python, pyc]
  attack: T1070.001

traits:
  - id: python-auditctl-disable
    desc: Python disables auditctl
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: '"auditctl", "-e", "0"'

  - id: python-journal-vacuum
    desc: Python vacuums journal logs
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: '"journalctl", "--vacuum-time=1s"'

  - id: python-masks-security-units
    desc: Python masks security units
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'auditd\.service[\s\S]{0,140}fail2ban\.service[\s\S]{0,140}ossec\.service'

composite_rules:
  - id: python-linux-security-log-evasion
    desc: Python Linux log evasion
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: python-auditctl-disable
      - id: python-journal-vacuum
      - id: python-masks-security-units
