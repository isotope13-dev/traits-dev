defaults:
  platforms: [panos, appliance, unix]
  for: [shell]
  attack: T1070.002

traits:
  - id: panos-shell-history-truncate
    desc: PAN-OS shell history truncate
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/root/\.bash_history /home/\*/\.bash_history'

  - id: panos-shell-log-truncate-list
    desc: PAN-OS shell log truncate list
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/var/log/auth\.log[\s\S]{0,220}/var/log/lastlog'

  - id: panos-shell-journal-vacuum
    desc: PAN-OS shell journal vacuum
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: journalctl --vacuum-time=1s

composite_rules:
  - id: panos-shell-log-wipe
    desc: PAN-OS shell log wipe
    crit: hostile
    conf: 0.98
    all:
      - id: panos-shell-history-truncate
      - id: panos-shell-log-truncate-list
      - id: panos-shell-journal-vacuum
