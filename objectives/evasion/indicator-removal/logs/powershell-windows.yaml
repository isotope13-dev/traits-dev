defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1070.001

traits:
  - id: ps-clear-windows-powershell-log
    desc: PS clear Windows PS log
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Clear-EventLog -LogName "Windows PowerShell"

  - id: ps-clear-operational-log
    desc: PS clear operational log
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Microsoft-Windows-PowerShell/Operational

composite_rules:
  - id: ps-powershell-log-clearing
    desc: PS PowerShell log clearing
    crit: hostile
    conf: 0.98
    all:
      - id: ps-clear-windows-powershell-log
      - id: ps-clear-operational-log
    any:
      - id: objectives/credential-access/shell/history::consolehost-history
