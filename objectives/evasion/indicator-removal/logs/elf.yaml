defaults:
  platforms: [linux]
  for: [elf]
  attack: T1070.001,T1070.003

traits:
  - id: home-shell-history-removal
    desc: Removes HOME shell history
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '(?i)\brm\s+-f\s+["]?\$HOME/\.bash_history\b'

  - id: package-log-removal
    desc: Removes apt/yum package logs
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '(?i)\brm\s+-f\b[^\n]{0,180}/var/tmp/(apt|yum)\.log\b'

composite_rules:
  - id: native-history-and-package-log-wipe
    desc: Erases shell history and package logs
    crit: hostile
    conf: 0.99
    mbc: F0005
    all:
      - id: home-shell-history-removal
      - id: package-log-removal
