defaults:
  platforms: [windows, unix]
traits:
  - id: tainted-mask
    desc: tainted_mask kernel variable
    crit: suspicious
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: symbol
      exact: tainted_mask
  - id: taint-mask
    desc: taint_mask kernel variable
    crit: suspicious
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: symbol
      exact: taint_mask
  - id: kernel-taint-assign
    desc: Direct assignment to kernel taint
    crit: suspicious
    conf: 1.0
    attack: T1562.001
    for:
      - c
    if:
      type: symbol
      kind: bind
      exact: '*taint_mask_ptr = 0'
  - id: filter-kmsg
    desc: filter_kmsg function
    crit: suspicious
    conf: 0.75
    for:
      - c
      - elf
    if:
      type: symbol
      exact: filter_kmsg
  - id: filter-taint
    desc: filter_taint function
    crit: suspicious
    conf: 0.75
    for:
      - c
      - elf
    if:
      type: symbol
      exact: filter_taint
  - id: sanitize-log
    desc: sanitize_log function
    crit: suspicious
    conf: 0.75
    for:
      - c
      - elf
    if:
      type: symbol
      exact: sanitize_log
  - id: dev-kmsg-path
    desc: /dev/kmsg kernel message device
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: /dev/kmsg
    downgrade:
      any:
        - id: well-known/tool/sysadmin/container/
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/app/systemd::container-runtime-component-basename
      - id: well-known/tool/sysadmin/stress-ng::stress-ng
  - id: taskstats-user-cmd
    desc: taskstats_user_cmd kernel function
    crit: suspicious
    conf: 0.8
    for:
      - c
      - elf
    if:
      type: symbol
      exact: taskstats_user_cmd
  - id: esrch-constant
    desc: ESRCH error constant (No such process)
    crit: notable
    conf: 0.6
    for:
      - c
    if:
      type: string_literal
      substr: ESRCH
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: taint-mask-symbols
    desc: Kernel taint mask variables
    for:
      - c
      - elf
    any:
      - id: tainted-mask
      - id: taint-mask
    crit: suspicious
  - id: log-filter-functions
    desc: Log filtering/sanitization functions
    for:
      - c
      - elf
    any:
      - id: filter-kmsg
      - id: filter-taint
      - id: sanitize-log
    crit: suspicious
  - id: kmsg-access
    desc: Kernel message log access
    for: [scripts, binaries]
    any:
      - id: dev-kmsg-path
      - id: micro-behaviors/os/kernel/routines::do-syslog-routine
    crit: suspicious
  - id: log-sanitization
    desc: Real-time filtering of dmesg or
    crit: suspicious
    conf: 0.95
    attack: T1562.001
    for:
      - c
      - elf
    all:
      - id: kmsg-access
      - id: log-filter-functions
  - id: taskstats-deception
    desc: Blinds TaskStats netlink API to
    crit: suspicious
    conf: 1.0
    attack: T1562.001
    for:
      - c
      - elf
    all:
      - id: taskstats-user-cmd
      - id: micro-behaviors/os/syscall/invoke::taskstats-pid-attribute
      - id: esrch-constant
