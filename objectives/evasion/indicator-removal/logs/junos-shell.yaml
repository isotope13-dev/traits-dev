defaults:
  platforms: [junos, appliance, unix]
  for: [shell]
  attack: T1070.001

traits:
  - id: shell-junos-log-clear-set
    desc: Shell clears Junos log set
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/log/messages[\s\S]{0,120}/var/log/syslog[\s\S]{0,120}/var/log/auth\.log'
  - id: shell-find-truncate-logs
    desc: Shell find truncates log files
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'find /var/log[\s\S]{0,120}truncate -s 0'
    unless:
      - id: metadata/build/package::cloud-marketplace-cleanup-script

composite_rules:
  - id: shell-junos-log-clearing
    desc: Shell Junos log clearing
    crit: hostile
    conf: 0.96
    all:
      - id: shell-junos-log-clear-set
      - id: shell-find-truncate-logs
