defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1070.002

traits:
  - id: ruby-var-log-truncate-list
    desc: Ruby truncates multiple system logs
    crit: suspicious
    conf: 0.94
    count_min: 4
    if:
      type: text
      regex: '/var/log/[A-Za-z0-9._/-]+'
    unless:
      - id: well-known/app/homebrew::source-tree

  - id: ruby-file-truncate-zero
    desc: Ruby truncates files to zero
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: File.truncate(log_path, 0)
  - id: ruby-log-write-empty
    desc: Ruby empties a file under /var/log
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'File\.write\(\s*[''"]/var/log/[^,\n]{1,80}[''"]\s*,\s*[''"]{2}\s*\)'

composite_rules:
  - id: ruby-freebsd-log-truncation
    desc: Ruby truncates Unix logs
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-var-log-truncate-list
    any:
      - id: ruby-file-truncate-zero
      - id: ruby-log-write-empty
