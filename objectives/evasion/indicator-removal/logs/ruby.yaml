defaults:
  platforms: [freebsd, unix]
  for: [ruby]
  attack: T1070.002

traits:
  - id: ruby-var-log-truncate-list
    desc: Ruby truncates multiple system logs
    crit: suspicious
    conf: 0.94
    count_min: 4
    if:
      type: text
      regex: '/var/log/[A-Za-z0-9._/-]+'

  - id: ruby-file-truncate-zero
    desc: Ruby truncates files to zero
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: File.truncate(log_path, 0)

composite_rules:
  - id: ruby-freebsd-log-truncation
    desc: Ruby truncates FreeBSD logs
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-var-log-truncate-list
      - id: ruby-file-truncate-zero

