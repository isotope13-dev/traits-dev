defaults:
  attack: T1070.001
  mbc: F0005
  platforms: [windows]
  for:
    - powershell
    - batch
traits:
  - id: wevtutil-cl
    desc: wevtutil cl command
    crit: suspicious
    conf: 0.56
    if:
      type: text
      regex: wevtutil\s+cl
  - id: clear-eventlog
    desc: Clear-EventLog cmdlet
    crit: suspicious
    conf: 0.56
    if:
      type: text
      substr: Clear-EventLog
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
composite_rules:
  - id: log-clear-windows
    desc: Clear Windows event logs
    crit: suspicious
    conf: 0.66
    any:
      - id: wevtutil-cl
      - id: clear-eventlog
