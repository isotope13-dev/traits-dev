defaults:
  platforms: [panos, appliance, unix]
  for: [rust, elf]
  attack: T1070.002

traits:
  - id: rust-panos-var-log-list
    desc: Rust PAN-OS var log list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/log/auth\.log[\s\S]{0,240}/var/log/messages'

  - id: rust-panos-history-clear
    desc: Rust PAN-OS history clear
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: history -c && history -w

composite_rules:
  - id: rust-panos-log-history-clear
    desc: Rust PAN-OS log history clear
    crit: hostile
    conf: 0.98
    all:
      - id: rust-panos-var-log-list
      - id: rust-panos-history-clear
