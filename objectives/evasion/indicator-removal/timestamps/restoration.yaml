defaults:
  attack: T1070.006
  platforms: [unix, windows]
  for: [python]
traits:
  - id: os-utime-restoration
    desc: "Restoration of file timestamps via os.utime()"
    crit: component
    conf: 0.85
    if:
      id: micro-behaviors/fs/file/timestamp::os-utime
composite_rules:
  - id: timestamp-preservation
    desc: Preserving file timestamps after modification
    crit: suspicious
    conf: 0.9
    scope: archive
    all:
      - id: os-utime-restoration
      - id: micro-behaviors/fs/file/timestamp::timestamp-preserve
    unless:
      - id: well-known/lib/pyodide::pyodide-stdlib-asset
