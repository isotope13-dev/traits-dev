defaults:
  attack: T1070.006
  platforms: [unix, windows]
  for: [python]
traits:
  - id: os-utime-restoration
    desc: Restoration of file timestamps using os.utime()
    crit: component
    conf: 0.85
    if:
      id: micro-behaviors/fs/file/timestamp::timestamp-modification
composite_rules:
  - id: timestamp-preservation
    desc: Preserving file timestamps after modification
    crit: suspicious
    conf: 0.9
    all:
      - id: os-utime-restoration
      - id: micro-behaviors/fs/file/timestamp::timestamp-preserve
