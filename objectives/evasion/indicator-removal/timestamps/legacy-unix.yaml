defaults:
  platforms: [linux, unix]
  for: [c]
  crit: suspicious
  conf: 0.88
  attack: T1070.006
  mbc: F0006
traits:
  - id: system-clock-rollback
    desc: Rolls system clock around file swap
    conf: 0.94
    if:
      type: raw
      exact: settimeofday(&ntime, &tzp)
  - id: file-time-restore
    desc: Restores trojaned file timestamps
    conf: 0.92
    if:
      type: raw
      exact: utimes(argv[1], ftime)
  - id: owner-mode-restore
    desc: Restores original owner and mode
    conf: 0.9
    if:
      type: raw
      regex: ch(mod|own)\(argv\[1\], statbuf\.st_
  - id: checksum-tail-fixup
    desc: Patches checksum trailer bytes
    conf: 0.9
    if:
      type: raw
      exact: 'fprintf(stderr, "%s: Last 17 bytes not zero\n", argv[0]);'
composite_rules:
  - id: trojan-replacement-coverup
    desc: Replaces binary and restores forensic metadata
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/process/create/shell::system-fn
      - id: system-clock-rollback
      - id: file-time-restore
    any:
      - id: owner-mode-restore
      - id: checksum-tail-fixup
