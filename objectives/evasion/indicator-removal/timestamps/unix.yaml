defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries, c]
  mbc: F0006
  attack: T1070.006
composite_rules:
  - id: unix-timestomp
    desc: File timestamp modification (Unix evasion context)
    crit: suspicious
    conf: 0.7
    any:
      - id: micro-behaviors/fs/file/timestamp/
  - id: backdoor-timestamp-modification
    desc: Backdoor with file timestamp modification
    crit: suspicious
    conf: 0.82
    all:
      - id: micro-behaviors/fs/file/timestamp::unix-timestamp-modification
    any:
      - id: objectives/command-and-control/backdoor/stealth::native-filter-stealth-backdoor
      - id: objectives/command-and-control/backdoor/stealth::pty-iptables-history-backdoor
      - id: objectives/command-and-control/backdoor/stealth::stealth-backdoor-history-suppression
