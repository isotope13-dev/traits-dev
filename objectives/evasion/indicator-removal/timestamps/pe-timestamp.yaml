defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1070.006"
traits:
  - id: timestamp-anomaly
    desc: PE timestamp anomaly detected
    crit: baseline
    conf: 0.7
    if:
      type: metrics
      field: pe.timestamp_anomaly
      min: 1
    unless:
      # Go's linker sets PE timestamp=0 by default (reproducible builds);
      # every Go PE has a "timestamp anomaly" that doesn't indicate removal.
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/lang/compiler/systems::rust-binary

  - id: export-timestamp-absent
    desc: Export timestamp is absent
    crit: baseline
    conf: 0.9
    if:
      type: metrics
      field: pe.export_timestamp_present
      max: 0

  - id: export-timestamp-maxval
    desc: Export directory timestamp set to 0xFFFFFFFF (tampered)
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: pe.export_timestamp_year
      min: 2100
    unless:
      - id: export-timestamp-absent
      - id: metadata/binary/metrics::many-exports-200

  - id: debug-timestamp-post-2024
    desc: Debug directory timestamp is 2025 or newer
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: pe.debug_timestamp_min
      min: 1735689600

  - id: header-timestamp-pre-2025
    desc: PE header compile timestamp predates 2025
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: pe.timestamp
      min: 1
      max: 1735689599

  - id: debug-timestamps-consistent
    desc: Debug timestamps internally consistent
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: pe.debug_timestamp_consistent
      min: 1

composite_rules:
  - id: debug-newer-than-compile-header
    desc: Debug timestamp newer than PE compile timestamp
    crit: suspicious
    conf: 0.88
    all:
      - id: debug-timestamp-post-2024
      - id: header-timestamp-pre-2025
    unless:
      - id: debug-timestamps-consistent
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/sfx::winrar-sfx-footprint
      - id: metadata/signed/platform::microsoft
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
      - id: metadata/binary/installer/script::nsis
