defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe, go]
  attack: T1070.006
traits:
  - id: go-timestomp-change-self-time
    desc: Go timestomping function
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: ChangeSelfTime
  - id: go-timestomp-modify-timestamp
    desc: Go timestomping function
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: modifyTimestamp
  - id: go-timestomp-touch-time
    desc: Go timestomping function
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: TouchTime
composite_rules:
  - id: go-timestomp
    desc: Go timestomping function
    crit: suspicious
    conf: 0.95
    any:
      - id: go-timestomp-change-self-time
      - id: go-timestomp-modify-timestamp
      - id: go-timestomp-touch-time
