# Timestomping Detection - Windows
# Behavioral composites for timestamp manipulation in evasion context
# MBC: F0006 (Timestomp)
# ATT&CK: T1070.006
#
# Note: Atomic Windows API traits moved to fs/file/timestamp/windows.yaml
# This file contains only behavioral composites
defaults:
  platforms: [windows]
  for: [pe, dll]
  mbc: "F0006"
  attack: "T1070.006"
composite_rules:
  - id: timestomp-with-file-copy
    desc: File timestamp modification with file operations
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/fs/sync/fsync::set-file-time
      - id: micro-behaviors/fs/enumerate/directory::find-first-file
      - id: micro-behaviors/process/info/current::get-module-filename
    any:
      - id: micro-behaviors/fs/file/write::write-file
      - id: micro-behaviors/fs/file/open::file-create-win
    downgrade:
      any:
        - id: metadata/binary/installer/script::nsis
        - id: metadata/binary/installer/script::inno-setup
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/library/python-runtime::python-runtime
        - id: metadata/binary/metrics::many-imports
