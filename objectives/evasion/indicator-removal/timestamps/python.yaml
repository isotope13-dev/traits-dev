# Timestomping Detection - Python
# Behavioral composites for timestamp manipulation in evasion context
# MBC: F0006 (Timestomp)
# ATT&CK: T1070.006
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  mbc: "F0006"
  attack: "T1070.006"
traits:
  - id: termui-impl-basename
    desc: _termui_impl.py file
    crit: component
    if:
      type: basename
      exact: _termui_impl.py
  - id: getmtime-subtraction
    desc: getmtime subtraction pattern
    crit: component
    if:
      type: raw
      regex: 'getmtime\(name\)\s*-\s*2'
  - id: require-save-string
    desc: require_save string
    crit: component
    if:
      type: raw
      substr: require_save
composite_rules:
  - id: timestomp
    desc: File timestamp modification (evasion)
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/fs/file/timestamp::timestamp-preserve
      - id: micro-behaviors/fs/file/timestamp::timestamp-modification
    unless:
      - id: termui-impl-basename
      - id: getmtime-subtraction
      - id: require-save-string
