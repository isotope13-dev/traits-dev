# Timestomping Detection - Python
# Behavioral composites for timestamp manipulation in evasion context
# MBC: F0006 (Timestomp)
# ATT&CK: T1070.006
defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: "F0006"
  attack: "T1070.006"
traits:
  - id: termui-impl-basename
    desc: _termui_impl.py file
    crit: component
    if:
      type: path
      basename: true
      exact: _termui_impl.py
  - id: mailbox-basename
    desc: mailbox.py file
    crit: component
    if:
      type: path
      basename: true
      exact: mailbox.py
  - id: getmtime-subtraction
    desc: getmtime subtraction pattern
    crit: component
    if:
      type: text
      regex: 'getmtime\(name\)\s*-\s*2'
  - id: require-save-string
    desc: require_save string
    crit: component
    if:
      type: text
      substr: require_save
composite_rules:
  - id: timestomp
    desc: File timestamp modification (evasion)
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/fs/file/timestamp::timestamp-preserve
      - id: micro-behaviors/fs/file/timestamp::os-utime
    unless:
      - id: termui-impl-basename
      - id: mailbox-basename
      - id: getmtime-subtraction
      - id: require-save-string
      # Restoring access time while retaining the target's current mtime is
      # normal filesystem bookkeeping, not evidence of timestomping.
      - id: micro-behaviors/fs/file/timestamp::os-utime-preserve-mtime
      - id: well-known/lib/paver::paver-module-path
