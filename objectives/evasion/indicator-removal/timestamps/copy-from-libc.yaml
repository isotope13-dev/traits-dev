defaults:
  platforms: [linux]
  for: [binaries]
  attack: T1070.006
  mbc: F0005
traits:
  - id: libc-so-source-path
    desc: References /usr/lib/libc.so.6 path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '/usr/lib(/x86_64-linux-gnu)?/libc\.so\.6'
  - id: stat-libc-source
    desc: Stat libc to harvest its timestamps
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '\b(stat|lstat)\s*\(\s*"[^"]{0,120}libc\.so'
composite_rules:
  - id: timestomp-from-libc
    desc: Timestomp dropped artifact using libc
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/file/timestamp::utimensat-syscall
      - id: libc-so-source-path
