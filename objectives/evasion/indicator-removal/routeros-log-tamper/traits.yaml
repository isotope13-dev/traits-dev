defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, javascript]
  attack: T1070.001

traits:
  - id: routeros-log-remove
    desc: RouterOS log removal
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(/log remove|/system logging action remove)'

  - id: routeros-system-logging-disabled
    desc: RouterOS system logging off
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/system logging (action )?set[\s\S]{0,180}disabled=yes'

  - id: routeros-log-action-none
    desc: RouterOS log action none
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/log action set[\s\S]{0,120}target=none'

  - id: routeros-log-topics-cleared
    desc: RouterOS logging topics cleared
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/(system )?log(ging)? set[^\r\n]{0,180}topics=""'

composite_rules:
  - id: routeros-log-tampering
    desc: RouterOS log tampering
    crit: suspicious
    conf: 0.98
    any:
      - id: routeros-system-logging-disabled
      - id: routeros-log-action-none
    all:
      - id: routeros-log-topics-cleared

  - id: routeros-log-removal-and-topic-clearing
    desc: RouterOS removes and silences logs
    crit: suspicious
    conf: 0.98
    all:
      - id: routeros-log-remove
      - id: routeros-log-topics-cleared
