defaults:
  platforms: [unix, appliance]
  for: [go, elf]
  attack: T1070.002

traits:
  - id: go-auditctl-disable
    desc: Go auditctl disable
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: auditctl -e 0

  - id: go-audit-log-clear
    desc: Go audit log clear
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/var/log/audit(/audit\.log|\.log)'

  - id: go-audit-rules-delete
    desc: Go audit rules delete
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: auditctl -D

composite_rules:
  - id: go-audit-logging-tamper
    desc: Go audit logging tamper
    crit: hostile
    conf: 0.98
    all:
      - id: go-auditctl-disable
    any:
      - id: go-audit-log-clear
      - id: go-audit-rules-delete
