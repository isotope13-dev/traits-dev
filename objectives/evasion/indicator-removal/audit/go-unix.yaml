defaults:
  platforms: [unix, appliance]
  for: [go, elf]
  attack: T1070.002

traits:
  - id: go-auditctl-disable
    desc: Go auditctl disable
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: auditctl -e 0

  - id: go-audit-log-path
    desc: Go audit log path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /var/log/audit

  - id: go-audit-rm-shred-clear
    desc: Go audit log rm or shred
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(rm\s+-[rf]+|shred)(\s+-\S+){0,4}\s+'

  - id: go-audit-truncate-clear
    desc: Go audit log truncate clear
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'truncate\s+-s\s*0\s+'

  - id: go-audit-redirect-clear
    desc: Go audit log redirect clear
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'cat\s+/dev/null\s*>\s*|:\s*>|>\s*'

  - id: go-audit-echo-clear
    desc: Go audit log echo clear
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'echo\s*(-n)?\s*("")?\s*>'

  - id: go-audit-rules-delete
    desc: Go audit rules delete
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: auditctl -D

composite_rules:
  - id: go-audit-log-clear
    desc: Go audit log clear
    crit: suspicious
    conf: 0.92
    # The clear operation must target the audit log: require it adjacent to the
    # /var/log/audit reference. Without proximity this fired on the audit tools
    # themselves (auditd, aureport, ausearch), which reference /var/log/audit and
    # also contain unrelated redirect/`>` characters elsewhere in the binary.
    near_bytes: 80
    all:
      - id: go-audit-log-path
    any:
      - id: go-audit-rm-shred-clear
      - id: go-audit-truncate-clear
      - id: go-audit-redirect-clear
      - id: go-audit-echo-clear

  - id: go-audit-logging-tamper
    desc: Go audit logging tamper
    crit: hostile
    conf: 0.98
    all:
      - id: go-auditctl-disable
    any:
      - id: go-audit-log-clear
      - id: go-audit-rules-delete
