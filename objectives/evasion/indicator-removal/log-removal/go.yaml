defaults:
  platforms: [unix]
  for: [go, elf, macho]
  attack: T1070.002
  mbc: F0005

traits:
  - id: go-var-log-directory
    desc: Go references system log directory
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: /var/log
composite_rules:
  - id: go-recursive-var-log-removal
    desc: Go recursively removes system log directory
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/file/delete::os-RemoveAll
      - id: go-var-log-directory
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/sysadmin/kubernetes/minikube/
  - id: recursive-var-log-removal-symbols
    desc: Recursive system log removal symbols
    crit: hostile
    conf: 0.97
    for: [elf, macho]
    all:
      - id: micro-behaviors/fs/file/delete::os-RemoveAll-string
      - id: micro-behaviors/fs/path/log/system::var-log-directory-text
    unless:
      - id: well-known/tool/detection/
      - id: well-known/tool/sysadmin/kubernetes/minikube/
