defaults:
  platforms: [unix]
  for: [go, elf, macho]
  attack: T1070.002
  mbc: F0005

traits:
  - id: casaos-binary-path
    desc: CasaOS binary path
    crit: baseline
    conf: 0.96
    if:
      type: path
      substr: /casaos
composite_rules:
  - id: go-recursive-var-log-removal
    desc: Go recursively removes system log directory
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/file/delete::os-RemoveAll
      - id: micro-behaviors/fs/directory/readdir::go-readdir-var-log
    near_bytes: 256
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/sysadmin/kubernetes/minikube/
      - id: well-known/tool/sysadmin/k3s::k3s-rootless-source-path
      - id: well-known/tool/sysadmin/unix-benign::casaos-binary
      - id: casaos-binary-path
  - id: recursive-var-log-removal-symbols
    desc: Recursive system log removal symbols
    crit: notable
    conf: 0.97
    for: [elf, macho]
    all:
      - id: micro-behaviors/fs/file/delete::os-RemoveAll-string
      - id: micro-behaviors/fs/path/log/system::var-log-directory-text
    unless:
      - id: well-known/tool/detection/
      - id: well-known/tool/sysadmin/kubernetes/minikube/
      - id: well-known/tool/sysadmin/unix-benign::casaos-binary
      - id: well-known/tool/sysadmin/unix-benign::emacs-tramp-native-eln
      - id: casaos-binary-path
