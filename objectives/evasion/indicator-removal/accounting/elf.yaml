defaults:
  platforms: [linux]
  for: [elf]
  attack: T1070.002

traits:
  - id: temporary-accounting-rewrite-file
    desc: Uses temporary accounting rewrite files
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '^/tmp/(WTMP|UTMP)\.TMP$'
  - id: accounting-log-replace-command
    desc: Replaces accounting logs via shell
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'mv\s+/tmp/(WTMP|UTMP)\.TMP.{0,160}chmod\s+644'
  - id: removed-accounting-record-output
    desc: Reports removed accounting records
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Removed.{0,80}(entry|entries).{0,100}(file|%s)'
  - id: edited-lastlog-record-output
    desc: Reports changed login records
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)(lastlog|login).{0,60}(entry|record|user)'

composite_rules:
  - id: elf-login-accounting-rewrite
    desc: Rewrites Unix login accounting records
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/fs/path/log/accounting::login-accounting-files-binary
    needs: 2
    any:
      - id: temporary-accounting-rewrite-file
      - id: accounting-log-replace-command
      - id: removed-accounting-record-output
  - id: elf-lastlog-record-edit
    desc: Edits Unix lastlog login records
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/log/accounting::lastlog-path-binary
      - id: edited-lastlog-record-output
