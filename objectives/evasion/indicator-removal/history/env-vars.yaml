defaults:
  attack: T1562.003
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: histcontrol-ignorealltps
    desc: HISTCONTROL set to ignore all history
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (HISTCONTROL=ignorealltps|export HISTCONTROL=ignorealltps)
composite_rules:
  - id: history-evasion-setup
    desc: Shell history evasion via environment variables
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: objectives/evasion/indicator-removal/history::histsize-zero
      - id: histcontrol-ignorealltps
      - id: objectives/evasion/indicator-removal/history::prompt-command-clear
