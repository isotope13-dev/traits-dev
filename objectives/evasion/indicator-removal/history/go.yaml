defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe, go]
  attack: T1070.003
traits:
  - id: go-clean-history-cleanhistory
    desc: Go history cleaning function
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: CleanHistory
  - id: go-clean-history-clearhistory
    desc: Go history cleaning function
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: clearHistory
  - id: go-clean-history-historyclear
    desc: Go history cleaning function
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: HistoryClear
composite_rules:
  - id: go-clean-history
    desc: Go history cleaning function
    crit: suspicious
    conf: 0.95
    any:
      - id: go-clean-history-cleanhistory
      - id: go-clean-history-clearhistory
      - id: go-clean-history-historyclear
