defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, c, cpp]
traits:
  - id: histfile-devnull
    desc: HISTFILE=/dev/null redirection
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      regex: (?i)HISTFILE=/dev/null
    unless:
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: well-known/app/posh-ovirt/
      - id: micro-behaviors/process/tty/pty::terminal-runner-history-isolation
  - id: export-histfile
    desc: export HISTFILE to evasive destination
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      regex: export HISTFILE=(/dev/null|/tmp/.{1,40}|/var/tmp/.{1,40})
    unless:
      - id: well-known/app/posh-ovirt/
  - id: histsize-zero
    desc: HISTSIZE=0 disables history
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: HISTSIZE=0
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: well-known/tool/sysadmin/unix-benign::emacs-tramp-native-eln
      - id: well-known/app/aui-agent-builder/
      - id: metadata/package/files/system-package::zsh-function-script
      - id: micro-behaviors/process/tty/pty::terminal-runner-history-isolation
  - id: histfilesize-zero
    desc: HISTFILESIZE=0 disables history file
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: HISTFILESIZE=0
    unless:
      - id: metadata/file/profile/identity::generated-attack-map-context
      - id: well-known/tool/sysadmin/unix-benign::emacs-tramp-native-eln
  - id: mysql-histfile-devnull
    desc: MYSQL_HISTFILE=/dev/null redirection
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      regex: (?i)MYSQL_HISTFILE=/dev/null
  - id: export-mysql-histfile
    desc: export MYSQL_HISTFILE= variable
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: export MYSQL_HISTFILE=
  - id: set-plus-o-history
    desc: set +o history to disable bash history
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: 'set +o history'
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: well-known/tool/sysadmin/alpine-packages/
      - id: well-known/tool/development/swiftlint::swiftlint-release-binary
      - id: metadata/lang/compiler/systems::swift-argument-parser-shell-completion-artifacts
  - id: powershell-psreadline-history-remove
    desc: PowerShell PSReadLine history delete
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    platforms: [windows]
    for: [powershell, batch, markdown, text]
    if:
      type: text
      regex: (?i)\bRemove-Item\b[^\r\n]{0,80}\bGet-PSReadLineOption\b[^\r\n]{0,80}\.HistorySavePath\b
composite_rules:
  - id: histfile-null
    desc: Redirects shell history to /dev/null
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    any:
      - id: histfile-devnull
      - id: export-histfile
      - id: objectives/evasion/indicator-removal/logs::unset-histfile
      - id: histsize-zero
      - id: histfilesize-zero
    unless:
      - id: metadata/file/profile/identity::generated-attack-map-context
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - id: well-known/tool/sysadmin/unix-benign::emacs-tramp-native-eln
      - id: micro-behaviors/process/tty/pty::terminal-runner-history-isolation
  - id: mysql-histfile-null
    desc: Clears MySQL command history
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    any:
      - id: mysql-histfile-devnull
      - id: export-mysql-histfile
  - id: prompt-command-clear
    desc: Unsets PROMPT_COMMAND to evade logging
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.003
    any:
      - id: micro-behaviors/os/env/vars/modify::prompt-command-unset
      - id: micro-behaviors/os/env/vars/modify::prompt-command-empty
      - id: micro-behaviors/os/env/vars/modify::prompt-command-empty-assignment
    unless:
      - id: well-known/tool/sysadmin/unix-benign::emacs-tramp-native-eln
  - id: history-clearing
    desc: Shell history clearing techniques
    crit: suspicious
    conf: 0.9
    any:
      - id: histfile-null
      - id: mysql-histfile-null
      - id: native-shell-history-truncate
    unless:
      - id: well-known/tool/sysadmin/unix-benign::emacs-tramp-native-eln
  - id: native-shell-history-truncate
    desc: Native shell history truncate
    crit: hostile
    conf: 0.96
    for: [c, cpp, objc]
    attack: T1070.003
    all:
      - id: objectives/credential-access/shell/history::shell-history
      - id: micro-behaviors/fs/file/truncate::open-o-trunc-flag
  - id: backdoor-shell-setup
    desc: Multiple anti-forensics techniques (backdoor indicator)
    crit: hostile
    conf: 0.95
    attack: T1070.003
    all:
      - id: history-clearing
      - id: prompt-command-clear
    unless:
      - id: well-known/tool/sysadmin/unix-benign::emacs-tramp-native-eln
