defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: histfile-devnull
    desc: HISTFILE=/dev/null redirection
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      regex: (?i)HISTFILE=/dev/null
  - id: export-histfile
    desc: export HISTFILE to evasive destination
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      regex: export HISTFILE=(/dev/null|/tmp/.{1,40}|/var/tmp/.{1,40})
  - id: histsize-zero
    desc: HISTSIZE=0 disables history
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: HISTSIZE=0
  - id: histfilesize-zero
    desc: HISTFILESIZE=0 disables history file
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: HISTFILESIZE=0
  - id: mysql-histfile-devnull
    desc: MYSQL_HISTFILE=/dev/null redirection
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      regex: (?i)MYSQL_HISTFILE=/dev/null
  - id: export-mysql-histfile
    desc: export MYSQL_HISTFILE= variable
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: export MYSQL_HISTFILE=
  - id: unset-prompt-command
    desc: unset PROMPT_COMMAND command
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: unset PROMPT_COMMAND
  - id: prompt-command-empty
    desc: PROMPT_COMMAND='' empty string
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: PROMPT_COMMAND=''
  - id: prompt-command-unset
    desc: PROMPT_COMMAND= assignment
    crit: notable
    conf: 0.75
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: PROMPT_COMMAND=
  - id: set-plus-o-history
    desc: set +o history to disable bash history
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    if:
      type: text
      substr: 'set +o history'
composite_rules:
  - id: histfile-null
    desc: Redirects shell history to /dev/null
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    any:
      - id: histfile-devnull
      - id: export-histfile
      - id: objectives/evasion/indicator-removal/logs::unset-histfile
      - id: histsize-zero
      - id: histfilesize-zero
  - id: mysql-histfile-null
    desc: Clears MySQL command history
    crit: suspicious
    conf: 0.9
    mbc: F0005
    attack: T1070.003
    any:
      - id: mysql-histfile-devnull
      - id: export-mysql-histfile
  - id: prompt-command-clear
    desc: Unsets PROMPT_COMMAND to evade logging
    crit: suspicious
    conf: 0.85
    mbc: F0005
    attack: T1070.003
    any:
      - id: unset-prompt-command
      - id: prompt-command-empty
      - id: prompt-command-unset
  - id: history-clearing
    desc: Shell history clearing techniques
    crit: suspicious
    conf: 0.9
    any:
      - id: histfile-null
      - id: mysql-histfile-null
  - id: backdoor-shell-setup
    desc: Multiple anti-forensics techniques (backdoor indicator)
    crit: hostile
    conf: 0.95
    attack: T1070.003
    all:
      - id: history-clearing
      - id: prompt-command-clear
