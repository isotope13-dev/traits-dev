defaults:
  platforms: [windows]
  for: [batch]
  attack: T1070.003
traits:
- id: git-log-last-commit-metadata--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'git\s+log\s+-1\s+--date=format-local:'
  count_max: 1019973
- id: git-log-last-commit-metadata--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: git\s+log\s+-1\s+--format=%(cd|s|an|ae)
  count_max: 1019974
- id: git-current-branch-query
  desc: Queries current git branch
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: git\s+rev-parse\s+--abbrev-ref\s+HEAD
- id: git-local-author-rewrite
  desc: Rewrites local git author identity
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: git\s+config\s+--local\s+user\.(name|email)
- id: system-clock-rewind
  desc: Rewinds system clock to prior time
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: \bdate\s+%LAST_COMMIT_DATE%|\btime\s+%LAST_COMMIT_TIME%
- id: git-amend-no-verify
  desc: Amends commit while bypassing hooks
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: git\s+commit\s+--amend.{0,120}--no-verify
- id: git-force-push-no-verify
  desc: Force pushes while bypassing hooks
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: git\s+push\s+-u[f]?\s+origin.{0,120}--no-verify

composite_rules:
- id: timestamped-amend-rewrite
  desc: Git amend with timestamp preservation
  crit: suspicious
  conf: 0.93
  all:
  - id: git-log-last-commit-metadata
  - id: system-clock-rewind
  - id: git-amend-no-verify
- id: git-history-falsification
  desc: Git history falsification with hook bypass
  crit: hostile
  conf: 0.97
  all:
  - id: timestamped-amend-rewrite
  - id: git-force-push-no-verify
  any:
  - id: git-local-author-rewrite
  - id: git-current-branch-query
- id: git-log-last-commit-metadata
  desc: Queries last git commit metadata
  crit: suspicious
  conf: 0.88
  any:
  - id: git-log-last-commit-metadata--rx-1
  - id: git-log-last-commit-metadata--rx-2
