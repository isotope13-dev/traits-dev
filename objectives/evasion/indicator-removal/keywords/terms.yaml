---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - binaries
  - scripts
  - source
traits:
- id: hide
  desc: Concealment keyword in eBPF/rootkit context
  crit: component
  conf: 0.5
  if:
    type: text
    regex: '(?i)\\b(bpf|ebpf|rootkit).{0,60}\\bhide\\w*\\b'
