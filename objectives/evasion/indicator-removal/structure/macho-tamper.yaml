# Mach-O structural tampering — variant composite that does NOT
# suppress on Go binaries, recognizing that Go-built malware
# (vxshell, DPRK MachOMan family) deliberately leverages Go's
# whitelist status to evade conventional Mach-O detectors.
#
# These triple-signal composites require THREE independent anomaly
# fires together, which is genuinely rare even in legitimate Go
# binaries — Go's loader emits valid __PAGEZERO and doesn't normally
# combine writable EP regions with W+X segments AND a non-default
# PAGEZERO size simultaneously.
defaults:
  platforms: [macos, ios]
  for: [macho]
  attack: T1027.002
composite_rules:
  # Three-signal cluster — high-confidence even on Go binaries.
  # Requires writable-EP AND W+X AND (PAGEZERO anomaly OR encryption).
  # Each signal in isolation has Go-binary FP risk; the conjunction
  # of all three is genuinely rare and indicates deliberate
  # structural tampering regardless of source language.
  - id: macho-triple-structural-tamper
    desc: Mach-O three-signal structural tampering (Go-resistant)
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/binary/anomaly/format::macho-entry-in-writable-segment
      - id: metadata/binary/anomaly/format::macho-wx-segment
    any:
      - id: metadata/binary/anomaly/format::macho-pagezero-size-anomalous
      - id: metadata/binary/anomaly/format::macho-encrypted-section-present
      - id: metadata/binary/anomaly/format::macho-segment-overlap
    unless:
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: well-known/lib/node-notifier/
      - id: well-known/lib/sindresorhus-do-not-disturb/
      - id: well-known/tool/sysadmin/pngpaste/
