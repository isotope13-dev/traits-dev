# Network Indicator Removal
# Detects source code that hides network connections, interfaces, or ports
# from standard system monitoring tools (netstat, ifconfig, ss).
# ATT&CK: T1070 (Indicator Removal), T1564 (Hide Artifacts)
defaults:
  platforms: [unix]
  for: [c, cpp, source]
  crit: suspicious
  conf: 0.85
  attack: T1070
  mbc: B0047
traits:
  # Source code that conditionally shows/hides PROMISC based on bypass flag
  - id: promisc-flag-suppression-src
    desc: IFF_PROMISC hidden behind bypass flag
    conf: 0.88
    if:
      type: text
      regex: IFF_PROMISC.{0,40}hide|hide.{0,40}IFF_PROMISC

  # Source code that hides network connections via hide flag
  - id: network-filter-hide-flag
    desc: Network connection filtered by hide flag
    conf: 0.85
    if:
      type: text
      substr: hide=1

  # Filtering by UID to hide specific user's connections
  - id: netstat-uid-hiding
    desc: Netstat filters connections by UID
    conf: 0.87
    if:
      type: text
      regex: hack_type.{0,20}uid|uid.{0,20}hack

composite_rules:
  # Trojanized network monitoring tool: reads config + sets hide flags
  - id: trojanized-network-tool
    desc: Trojanized network tool hides connections
    crit: hostile
    conf: 0.93
    all:
      - id: network-filter-hide-flag
    any:
      - id: objectives/evasion/kernel-hide/userspace::hidden-netstat-config
      - id: netstat-uid-hiding
