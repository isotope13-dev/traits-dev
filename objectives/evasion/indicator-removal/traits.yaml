# Indicator Removal Traits
# Evidence cleanup and indicator removal patterns
defaults:
  platforms: [linux, unix, android, macos, ios]
traits:
  - id: etc-crontab-target
    desc: Target /etc/crontab system crontab
    crit: suspicious
    conf: 0.85
    for: [elf, shell]
    if:
      type: string
      substr: /etc/crontab
    attack: T1070.004
  - id: pkill-signal-9
    desc: pkill with kill -9 signal
    crit: notable
    conf: 0.8
    for: [elf, shell]
    if:
      type: string
      regex: (killall -9|kill\s+-9)
    attack: T1070.003
