defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
  for:
    - elf
    - shell
traits:
  - id: etc-crontab-target
    desc: Target /etc/crontab system crontab
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: /etc/crontab
    attack: T1070.004
  - id: pkill-signal-9
    desc: pkill with kill -9 signal
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: (killall -9|kill\s+-9)
    attack: T1070.003
