defaults:
  platforms:
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: etc-crontab-target
    desc: Target /etc/crontab system crontab
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: /etc/crontab
    not:
      - substr: '^#.*?/etc/crontab'
      - substr: 'header: "^#.*?/etc/crontab"'
    attack: T1070.004
    downgrade:
      any:
        - id: metadata/binary/metrics::massive-executable
  - id: pkill-signal-9
    desc: pkill with kill -9 signal
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (killall -9|kill\s+-9)
    attack: T1070.003
  - id: killall-terminal
    desc: Kill Terminal app (hide evidence)
    crit: suspicious
    conf: 0.9
    platforms: [macos]
    for: [macho, shell, applescript]
    attack: T1070
    if:
      type: text
      substr: killall Terminal
