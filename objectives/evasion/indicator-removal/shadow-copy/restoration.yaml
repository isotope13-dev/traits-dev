# Shadow Copy Manipulation for Evasion
# Detects abuse of Volume Shadow Copies to restore files or manipulate file states.
# ATT&CK: T1564 (Hide Artifacts)
defaults:
  platforms: [windows]
  for: [pe, source, scripts]
traits:
  - id: shadow-copy-mount
    desc: Mounts or accesses Volume Shadow Copy
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?i)(?:vssadmin\s+list\s+shadows|\\\\\?\\GLOBALROOT\\Device\\HarddiskVolumeShadowCopy)'

  - id: shadow-copy-restore-command
    desc: Restores file from Shadow Copy via CLI
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)(?:copy|move|robocopy|xcopy).{0,50}\\Device\\HarddiskVolumeShadowCopy'

  - id: vss-api-usage
    desc: Volume Shadow Copy Service (VSS) API usage
    crit: notable
    conf: 0.9
    for: [pe, dll, c, cpp]
    if:
      type: symbol
      regex: '(?i)IVssBackupComponents'

composite_rules:
  - id: shadow-copy-mounted-file-ops
    desc: Shadow copy file operations
    crit: suspicious
    conf: 0.9
    all:
      - id: shadow-copy-mount
      - id: micro-behaviors/fs/file/operations::binary-file-ops
  - id: shadow-copy-file-restoration
    desc: Manipulates Shadow Copies to restore or access files (potential evasion)
    crit: suspicious
    conf: 0.95
    any:
      - id: shadow-copy-restore-command
      - id: shadow-copy-mounted-file-ops
