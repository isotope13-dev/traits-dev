# Fake Compiler Version String Detection
# Detects multiple distinct compiler identification strings from incompatible toolchains,
# indicating decoy/noise padding to inflate string metrics and confuse analysts
# ATT&CK: T1036 (Masquerading)
defaults:
  platforms: [windows, linux, unix, macos]
  for: [pe, elf, macho]
  attack: "T1036"
traits:
  - id: clang-version-strings
    desc: "Multiple Clang version strings"
    crit: component
    count_min: 3
    if:
      type: string
      regex: "^Clang \\d+\\.\\d+\\.\\d+$"
  - id: msvc-version-strings
    desc: "Multiple MSVC version strings"
    crit: component
    count_min: 3
    if:
      type: string
      regex: "^MSVC \\d+\\.\\d+\\.\\d+$"
  - id: icc-version-strings
    desc: "Multiple ICC version strings"
    crit: component
    count_min: 3
    if:
      type: string
      regex: "^ICC \\d+\\.\\d+\\.\\d+$"
  - id: llvm-version-strings
    desc: "Multiple LLVM version strings"
    crit: component
    count_min: 3
    if:
      type: string
      regex: "^LLVM \\d+\\.\\d+\\.\\d+$"
composite_rules:
  - id: multiple-compiler-decoys
    desc: "Multiple fake compiler version strings (decoy padding)"
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: clang-version-strings
      - id: msvc-version-strings
      - id: icc-version-strings
      - id: llvm-version-strings
