defaults:
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  attack: T1036
traits:
  - id: go-trading-type-facade
    desc: Go binary with financial trading types
    crit: suspicious
    conf: 0.80
    count_min: 3
    if:
      type: text
      regex: 'main\.(AssetClass|PnLRecord|OrderSide|OrderStatus)'
composite_rules:
  - id: go-trading-facade-injection
    desc: Go trading facade with process injection
    crit: suspicious
    conf: 0.90
    all:
      - id: go-trading-type-facade
      - id: objectives/evasion/process/injection::thread-execution-hijacking
