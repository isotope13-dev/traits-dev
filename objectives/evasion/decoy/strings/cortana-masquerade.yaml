# Cortana masquerade: PE binaries embedding Cortana.Signals strings
# to masquerade as a legitimate Microsoft Cortana component.
# Used by Rhadamanthys and other malware families to deceive analysts
# and evade signature-based detection by appearing as a Windows system DLL.
#
# Legitimate Cortana binaries are signed by Microsoft and have proper
# PE structure. The masquerade pattern is characterized by:
# - Large overlay or packed payload containing Cortana strings
# - High entropy .text section (obfuscated unpacker)
# - Unsigned or suspiciously signed binary
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1036

traits:
  - id: cortana-signals-dll-reference
    desc: Cortana.Signals.dll component reference
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Cortana.Signals.dll

  - id: cortana-signals-source-path
    desc: Cortana signals source path string
    crit: component
    conf: 0.95
    if:
      type: text
      regex: d:\\os\\src\\shellcommon\\shell\\cortana\\signals\\src\\

  - id: cortana-signals-activation-factory
    desc: Cortana.Signals activation factory reference
    crit: component
    conf: 0.92
    if:
      type: text
      regex: Cortana\.Signals\.\w+__\w+ActivationFactory

  - id: cortana-signals-pdb-reference
    desc: Cortana.Signals PDB reference string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: Cortana.Signals.pdb

  - id: cortana-event-provider-name
    desc: Cortana event tracing provider name
    crit: component
    conf: 0.92
    if:
      type: text
      regex: Microsoft-Windows-Shell-Cortana(CSU|Proactive|Trace)

composite_rules:
  - id: cortana-signals-masquerade
    desc: Cortana signals strings masquerading as legitimate component
    crit: suspicious
    conf: 0.92
    needs: 3
    any:
      - id: cortana-signals-dll-reference
      - id: cortana-signals-source-path
      - id: cortana-signals-activation-factory
      - id: cortana-signals-pdb-reference
      - id: cortana-event-provider-name
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/platform::microsoft-corporation
