# Decoy document execution
# A download followed by opening a file can support a deceptive dropper chain;
# the individual download and open operations remain neutral capabilities.
defaults:
  platforms: [unix, macos]
  for: [shell]

composite_rules:
  - id: download-and-open-decoy
    desc: Downloads a file and opens it as a decoy
    crit: suspicious
    conf: 0.9
    attack: T1036
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: micro-behaviors/process/create/launch::open-file-command
