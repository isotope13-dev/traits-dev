# Document-side lure content — text and structural cues that
# appear inside an office document body to social-engineer the user
# into enabling macros or clicking through.
#
# These atomics scan the raw document bytes (works for both legacy
# OLE2 streams and OOXML XML parts) for the canonical phishing
# strings used by Emotet/IcedID/Qakbot/TrickBot droppers and recent
# Russian-state lures. Each atomic is `notable` standalone; the
# composite combines them with VBA presence to flag the lure-plus-
# payload pattern that's nearly always malicious.
defaults:
  for: [oledoc, ooxml]
  platforms: [windows, unix]
  crit: notable
  conf: 0.9

traits:
  # --- "Enable Editing" / "Enable Content" lure banner text ---
- id: lure-enable-editing
  desc: Enable Editing lure banner text
  if:
    type: text
    substr: Enable Editing
    case_insensitive: true
- id: lure-enable-content
  desc: Enable Content lure banner text
  if:
    type: text
    substr: Enable Content
    case_insensitive: true
- id: lure-enable-macros
  desc: Enable Macros lure banner text
  if:
    type: text
    substr: Enable Macros
    case_insensitive: true
- id: lure-protected-view
  desc: Document references Protected View
  if:
    type: text
    substr: Protected View
    case_insensitive: true

  # --- Brand impersonation strings (DocuSign, Microsoft 365, Adobe
  #     are the canonical phishing brands for office-doc lures) ---
- id: lure-docusign-brand
  desc: DocuSign brand impersonation text
  if:
    type: text
    substr: DocuSign
    case_insensitive: true
- id: lure-office365-brand
  desc: Office 365 / Microsoft 365 brand text
  if:
    type: text
    regex: '(?i)(Microsoft|Office)\s+365'
- id: lure-adobe-brand
  desc: Adobe brand impersonation text
  if:
    type: text
    substr: Adobe
    case_insensitive: true

  # --- "Created in newer version" classic Excel-XLM lure ---
- id: lure-newer-version-banner
  desc: Created-in-newer-version lure
  if:
    type: text
    regex: '(?i)created\s+in\s+(a\s+)?newer\s+version'

  # --- "Document protected" / "decryption required" lure ---
- id: lure-decryption-required
  desc: Decryption-required lure text
  if:
    type: text
    regex: '(?i)decryption\s+required'

composite_rules:
  # Generic lure-plus-macro: any lure banner combined with a VBA
  # project. This is the canonical phishing-document pattern.
- id: lure-banner-with-macros
  desc: Lure banner combined with VBA macros
  crit: suspicious
  conf: 0.95
  attack: T1204.002
  all:
  - id: metadata/document/office/markup::ooxml-raw-vba-project
  any:
  - id: lure-enable-editing
  - id: lure-enable-content
  - id: lure-enable-macros
  - id: lure-newer-version-banner
- id: brand-lure-with-macros
  desc: Brand-impersonation lure with VBA macros
  crit: hostile
  conf: 0.96
  attack: T1204.002
  all:
  - id: metadata/document/office/markup::ooxml-raw-vba-project
  any:
  - id: lure-docusign-brand
  - id: lure-office365-brand
  - id: lure-adobe-brand
