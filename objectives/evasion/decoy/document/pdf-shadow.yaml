defaults:
  for: [pdf]
  platforms: [windows, macos, linux]
  attack: T1036

composite_rules:
  - id: pdf-shadow-overlapping-form-fields-after-signature
    desc: Signed PDF shadow update with overlapping form fields
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/document/pdf/properties::pdf-signed-post-signature-incremental-update
      - id: metadata/document/pdf/properties::pdf-overlapping-form-fields

  - id: pdf-shadow-repeated-form-name-rect-after-signature
    desc: Signed PDF shadow update repeats form name and rectangle
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/document/pdf/properties::pdf-signed-post-signature-incremental-update
      - id: metadata/document/pdf/properties::pdf-duplicate-form-name-and-rect
