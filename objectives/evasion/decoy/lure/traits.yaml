defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: fake-author-claim
    desc: Suspicious claims about authorship or purpose
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: (?i)this module contains abstractions for the input stream
  - id: game-over-score-banner
    desc: Embedded console game score banner
    crit: notable
    conf: 0.88
    platforms: [windows]
    for: [pe]
    if:
      type: text
      exact: 'Game Over!! Score:'
  - id: pause-command-literal
    desc: Embedded pause command literal
    crit: component
    conf: 0.72
    platforms: [windows]
    for: [pe]
    if:
      type: text
      exact: pause
composite_rules:
  - id: console-game-decoy
    desc: Console game decoy interaction
    crit: suspicious
    conf: 0.9
    all:
      - id: game-over-score-banner
      - id: pause-command-literal
    any:
      - id: micro-behaviors/hardware/input/keyboard::get-async-key-state
      - id: micro-behaviors/process/create/exec::cmd-exe-reference
      - id: micro-behaviors/process/create/spawn::create-process-w
