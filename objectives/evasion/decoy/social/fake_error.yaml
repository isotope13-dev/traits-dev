defaults:
  platforms: [unix, windows]
  crit: suspicious
  conf: 0.8
  mbc: B0011.001
  for: [scripts, pe, dll]
traits:
  - id: fake-error-document-corrupt-state
    for: [powershell, batch, vbs, javascript, html, pe, dll]
    desc: Fake document corrupt message
    crit: component
    if:
      type: encoded
      regex: (?i)\b(this\s+)?(document|pdf|file)\s+(is|appears to be)\s+corrupt(ed)?\b
  - id: fake-error-document-damaged-state
    for: [powershell, batch, vbs, javascript, html, pe, dll]
    desc: Fake document damaged message
    crit: component
    if:
      type: encoded
      regex: (?i)\b(this\s+)?(document|pdf|file)\s+(is|appears to be)\s+damaged\b
  - id: fake-error-pdf-corrupted
    desc: Fake PDF corrupted error message
    platforms: [windows]
    if:
      type: text
      regex: '(?i)\bpdf file is corrupted\b'
  - id: fake-error-dll-missing
    desc: Fake DLL missing lure
    attack: T1036
    for: [pe, scripts]
    if:
      type: text
      regex: '\b[A-Za-z][A-Za-z0-9_]+\.dll is missing from your computer'
  - id: fake-error-nvsix-not-installed
    desc: Fake nvsix DLL install failure
    crit: suspicious
    conf: 0.96
    attack: T1036
    for: [pe]
    if:
      type: text
      substr: Packet nvsix.dll not installed!
composite_rules:
  - id: fake-error-document-corrupted
    for: [powershell, batch, vbs, javascript, html, pe, dll]
    desc: Fake 'document corrupted' error message
    any:
      - id: fake-error-document-corrupt-state
      - id: fake-error-document-damaged-state
