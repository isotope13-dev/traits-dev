defaults:
  platforms: [unix, windows]
  crit: suspicious
  conf: 0.8
  mbc: B0011.001
  for: [scripts, pe, dll]
traits:
  - id: fake-error-document-corrupted
    for: [powershell, batch, vbs, javascript, html, pe, dll]
    desc: Fake 'document corrupted' error message
    if:
      type: encoded
      regex: (?i)document[^'"]{1,50}corrupted|document is corrupted
  - id: fake-error-pdf-corrupted
    desc: Fake PDF corrupted error message
    platforms: [windows]
    if:
      type: text
      regex: '(?i)\bpdf file is corrupted\b'
  - id: fake-error-dll-missing
    desc: Fake DLL missing lure
    attack: T1036
    for: [pe, scripts]
    if:
      type: text
      regex: '\b[A-Za-z][A-Za-z0-9_]+\.dll is missing from your computer'
  - id: fake-error-nvsix-not-installed
    desc: Fake nvsix DLL install failure
    crit: suspicious
    conf: 0.96
    attack: T1036
    for: [pe]
    if:
      type: text
      substr: Packet nvsix.dll not installed!
composite_rules: []
