defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: js-adspect-keywords
    desc: Adspect cloaking service keywords
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: ADSPECT|adspect-proxy\.php|adspect_response
  - id: js-fake-cloudflare
    desc: Cloudflare Captcha/Turnstile references
    crit: component
    conf: 0.9
    if:
      type: string_literal
      regex: verify-you-are-human|challenges\.cloudflare\.com|cf-turnstile|cf-link
  - id: js-white-page-logic
    desc: Cloaking "white page" (benign content) fallback
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: showBuiltinWhitePage|Offlido|Compliance-Forward
  - id: adspect-browser-fingerprint-fields
    desc: Adspect browser fingerprint fields
    crit: notable
    conf: 0.88
    count_min: 4
    if:
      type: text
      regex: 'HTTP_USER_AGENT|HTTP_REFERER|QUERY_STRING|HTTP_ACCEPT_LANGUAGE|REQUEST_URI|SERVER_NAME'
  - id: adspect-proxy-post-json
    desc: Adspect proxy JSON POST
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'fetch\(CONFIG\.PROXY_URL[\s\S]{0,400}JSON\.stringify\(payload\)'
  - id: adspect-action-router-cases
    desc: Adspect action router cases
    crit: notable
    conf: 0.9
    count_min: 7
    if:
      type: string_literal
      regex: '^(local|noop|301|302|303|307|308|refresh|meta|form|assign|replace|top|iframe|proxy|fetch|js|return)$'
  - id: adspect-remote-js-action
    desc: Adspect remote JavaScript action
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: "case ['\"]js['\"][\\s\\S]{0,400}atob\\(target\\)[\\s\\S]{0,240}eval\\(script\\)"
  - id: adspect-remote-content-actions
    desc: Adspect remote content actions
    crit: suspicious
    conf: 0.88
    count_min: 3
    if:
      type: text
      regex: 'showIframe\(target\)|proxyContent\(target\)|fetchContent\(target\)|serveLocalFile\(target\)|window\.open\(target'
  - id: adspect-file-fetch-endpoint
    desc: Adspect file fetch endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: string_literal
      substr: adspect-file.php?file=
  - id: adspect-third-party-content-proxy
    desc: Adspect third-party content proxy
    crit: suspicious
    conf: 0.94
    if:
      type: string_literal
      substr: https://api.allorigins.win/get?url=
  - id: adspect-document-write-content
    desc: Adspect fetched content document.write
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'function\s+fetchContent\([^)]{0,80}\)[\s\S]{0,900}document\.write\('
  - id: adspect-html-rewrite-script-injection
    desc: Adspect HTML rewrite script injection
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'function\s+serveLocalFile\([^)]{0,80}\)[\s\S]{0,9000}createElement\(\s*[''"]script[''"]\s*\)[\s\S]{0,1200}insertAdjacentElement\('
  - id: adspect-sandboxed-iframe-embed
    desc: Adspect permissive iframe embedding
    crit: suspicious
    conf: 0.93
    if:
      type: string_literal
      substr: 'sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"'
composite_rules:
  - id: js-adspect-cloaking
    desc: Adspect cloaking client script
    crit: hostile
    conf: 0.98
    attack: T1027
    all:
      - id: js-adspect-keywords
    any:
      - id: js-fake-cloudflare
      - id: js-white-page-logic
      - id: objectives/anti-analysis/browser-detect::js-disable-inspect
  - id: adspect-fingerprint-cloaking-post
    desc: Adspect fingerprint cloaking POST
    crit: hostile
    conf: 0.97
    attack: T1027
    all:
      - id: js-adspect-keywords
      - id: adspect-browser-fingerprint-fields
      - id: adspect-proxy-post-json
  - id: adspect-server-controlled-routing
    desc: Adspect server-controlled routing actions
    crit: hostile
    conf: 0.97
    attack: T1027
    all:
      - id: js-adspect-keywords
      - id: adspect-action-router-cases
    any:
      - id: adspect-remote-content-actions
      - id: objectives/credential-access/phishing/tactics::js-dynamic-location-href-redirect
      - id: objectives/credential-access/phishing/tactics::meta-refresh-redirect
  - id: adspect-remote-js-execution
    desc: Adspect server-supplied JavaScript execution
    crit: hostile
    conf: 0.99
    attack: T1059.007
    all:
      - id: js-adspect-keywords
      - id: adspect-remote-js-action
  - id: adspect-remote-content-injection
    desc: Adspect remote content injection
    crit: hostile
    conf: 0.98
    attack: T1105
    all:
      - id: js-adspect-keywords
      - id: adspect-remote-content-actions
    any:
      - id: adspect-document-write-content
      - id: adspect-html-rewrite-script-injection
      - id: adspect-sandboxed-iframe-embed
      - id: adspect-third-party-content-proxy
      - id: adspect-file-fetch-endpoint
