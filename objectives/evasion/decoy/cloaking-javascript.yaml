defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: js-adspect-keywords
    desc: Adspect cloaking service keywords
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: ADSPECT|adspect-proxy\.php|adspect_response
  - id: js-fake-cloudflare
    desc: Cloudflare Captcha/Turnstile references
    crit: component
    conf: 0.9
    if:
      type: string_literal
      regex: verify-you-are-human|challenges\.cloudflare\.com|cf-turnstile|cf-link
  - id: js-white-page-logic
    desc: Cloaking "white page" (benign content) fallback
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: showBuiltinWhitePage|Offlido|Compliance-Forward
composite_rules:
  - id: js-adspect-cloaking
    desc: Adspect cloaking client script
    crit: hostile
    conf: 0.98
    attack: T1027
    all:
      - id: js-adspect-keywords
    any:
      - id: js-fake-cloudflare
      - id: js-white-page-logic
      - id: objectives/anti-analysis/browser-detect::js-disable-inspect
