defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: high-complexity-decoy-dll
    desc: High complexity but very few functions
    for: [dll]
    all:
      - id: metadata/binary/metrics::high-complexity-marker
      - id: metadata/binary/metrics::low-function-count-marker
    unless:
      - id: metadata/binary/framework::dotnet-assembly
