defaults:
  platforms: [windows, unix]
  for:
  - javascript
  - typescript
traits:
- id: js-adspect-keywords
  desc: Adspect cloaking service keywords
  crit: suspicious
  conf: 0.95
  if:
    type: string_literal
    regex: ADSPECT|adspect-proxy\.php|adspect_response
- id: js-fake-cloudflare
  desc: Cloudflare Captcha/Turnstile references
  crit: component
  conf: 0.9
  if:
    type: string_literal
    regex: verify-you-are-human|challenges\.cloudflare\.com|cf-turnstile|cf-link
- id: js-white-page-logic
  desc: "Cloaking \"white page\" ( content) fallback"
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: showBuiltinWhitePage|Offlido|Compliance-Forward
- id: adspect-browser-fingerprint-fields--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: HTTP_USER_AGENT
  count_max: 1028328
- id: adspect-browser-fingerprint-fields--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: HTTP_REFERER
  count_max: 1028329
- id: adspect-browser-fingerprint-fields--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: QUERY_STRING
  count_max: 1028330
- id: adspect-browser-fingerprint-fields--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: HTTP_ACCEPT_LANGUAGE
  count_max: 1028331
- id: adspect-browser-fingerprint-fields--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: REQUEST_URI
  count_max: 1028332
- id: adspect-browser-fingerprint-fields--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: SERVER_NAME
  count_max: 1028333
- id: adspect-proxy-post-json
  desc: Adspect proxy JSON POST
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'fetch\(CONFIG\.PROXY_URL[\s\S]{0,400}JSON\.stringify\(payload\)'
- id: adspect-action-router-cases--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 7
  if:
    type: string_literal
    regex: '^(local|noop)$'
  count_max: 1028335
- id: adspect-action-router-cases--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 7
  if:
    type: string_literal
    regex: '^(301|302)$'
  count_max: 1028336
- id: adspect-action-router-cases--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 7
  if:
    type: string_literal
    regex: '^(303|307)$'
  count_max: 1028337
- id: adspect-action-router-cases--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 7
  if:
    type: string_literal
    regex: '^(308|refresh)$'
  count_max: 1028338
- id: adspect-action-router-cases--rx-11
  desc: Repeated meta or form action labels
  crit: component
  conf: 0.9
  count_min: 7
  if:
    type: string_literal
    regex: '^(meta|form)$'
  count_max: 1028339
- id: adspect-action-router-cases--rx-12
  desc: Repeated assign or replace action labels
  crit: component
  conf: 0.9
  count_min: 7
  if:
    type: string_literal
    regex: '^(assign|replace)$'
  count_max: 1028340
- id: adspect-action-router-cases--rx-13
  desc: Repeated top or iframe action labels
  crit: component
  conf: 0.9
  count_min: 7
  if:
    type: string_literal
    regex: '^(top|iframe)$'
  count_max: 1028341
- id: adspect-action-router-cases--rx-14
  desc: Repeated proxy or fetch action labels
  crit: component
  conf: 0.9
  count_min: 7
  if:
    type: string_literal
    regex: '^(proxy|fetch)$'
  count_max: 1028342
- id: adspect-action-router-cases--rx-15
  desc: Repeated JavaScript or return labels
  crit: component
  conf: 0.9
  count_min: 7
  if:
    type: string_literal
    regex: '^(js|return)$'
  count_max: 1028343
- id: adspect-remote-js-action
  desc: Adspect remote JavaScript action
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: "case ['\"]js['\"][\\s\\S]{0,400}atob\\(target\\)[\\s\\S]{0,240}eval\\(script\\)"
- id: adspect-remote-content-actions--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: showIframe(target)
  count_max: 1028345
- id: adspect-remote-content-actions--rx-17
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: proxyContent(target)
  count_max: 1028346
- id: adspect-remote-content-actions--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: fetchContent(target)
  count_max: 1028347
- id: adspect-remote-content-actions--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: serveLocalFile(target)
  count_max: 1028348
- id: adspect-remote-content-actions--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: window.open(target
  count_max: 1028349
- id: adspect-file-fetch-endpoint
  desc: Adspect file fetch endpoint
  crit: suspicious
  conf: 0.94
  if:
    type: string_literal
    substr: adspect-file.php?file=
- id: adspect-third-party-content-proxy
  desc: Adspect third-party content proxy
  crit: suspicious
  conf: 0.94
  if:
    type: string_literal
    substr: https://api.allorigins.win/get?url=
- id: adspect-document-write-content
  desc: Adspect fetched content document.write
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'function\s+fetchContent\([^)]{0,80}\)[\s\S]{0,900}document\.write\('
- id: adspect-html-rewrite-script-injection--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: symbol
    exact: insertAdjacentElement
  count_max: 1028353
- id: adspect-html-rewrite-script-injection--rx-22
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: symbol
    exact: serveLocalFile
  count_max: 1028354
- id: adspect-html-rewrite-script-injection--rx-25
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: '1200'
  count_max: 1028357
- id: adspect-html-rewrite-script-injection--rx-26
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: '9000'
  count_max: 1028358
- id: adspect-sandboxed-iframe-embed
  desc: Adspect permissive iframe embedding
  crit: suspicious
  conf: 0.93
  if:
    type: string_literal
    substr: 'sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"'
composite_rules:
- id: js-adspect-cloaking
  desc: Adspect cloaking client script
  crit: hostile
  conf: 0.98
  attack: T1027
  all:
  - id: js-adspect-keywords
  any:
  - id: js-fake-cloudflare
  - id: js-white-page-logic
  - id: objectives/anti-analysis/browser-detect::js-disable-inspect
- id: adspect-fingerprint-cloaking-post
  desc: Adspect fingerprint cloaking POST
  crit: hostile
  conf: 0.97
  attack: T1027
  all:
  - id: js-adspect-keywords
  - id: adspect-browser-fingerprint-fields
  - id: adspect-proxy-post-json
- id: adspect-server-controlled-routing
  desc: Adspect server-controlled routing actions
  crit: hostile
  conf: 0.97
  attack: T1027
  all:
  - id: js-adspect-keywords
  - id: adspect-action-router-cases
  any:
  - id: adspect-remote-content-actions
  - id: micro-behaviors/ui/window/manage/dom::browser-location-href-assign
  - id: objectives/credential-access/phishing/tactics::meta-refresh-redirect
- id: adspect-remote-js-execution
  desc: Adspect server-supplied JavaScript execution
  crit: hostile
  conf: 0.99
  attack: T1059.007
  all:
  - id: js-adspect-keywords
  - id: adspect-remote-js-action
- id: adspect-remote-content-injection
  desc: Adspect remote content injection
  crit: hostile
  conf: 0.98
  attack: T1105
  all:
  - id: js-adspect-keywords
  - id: adspect-remote-content-actions
  any:
  - id: adspect-document-write-content
  - id: adspect-html-rewrite-script-injection
  - id: adspect-sandboxed-iframe-embed
  - id: adspect-third-party-content-proxy
  - id: adspect-file-fetch-endpoint
- id: adspect-browser-fingerprint-fields
  desc: Adspect browser fingerprint fields
  crit: notable
  conf: 0.88
  any:
  - id: adspect-browser-fingerprint-fields--rx-1
  - id: adspect-browser-fingerprint-fields--rx-2
  - id: adspect-browser-fingerprint-fields--rx-3
  - id: adspect-browser-fingerprint-fields--rx-4
  - id: adspect-browser-fingerprint-fields--rx-5
  - id: adspect-browser-fingerprint-fields--rx-6
- id: adspect-action-router-cases
  desc: Multiple content-routing action labels
  crit: component
  conf: 0.9
  needs: 4
  any:
  - id: adspect-action-router-cases--rx-7
  - id: adspect-action-router-cases--rx-8
  - id: adspect-action-router-cases--rx-9
  - id: adspect-action-router-cases--rx-10
  - id: adspect-action-router-cases--rx-11
  - id: adspect-action-router-cases--rx-12
  - id: adspect-action-router-cases--rx-13
  - id: adspect-action-router-cases--rx-14
  - id: adspect-action-router-cases--rx-15
- id: adspect-remote-content-actions
  desc: Adspect remote content actions
  crit: suspicious
  conf: 0.88
  any:
  - id: adspect-remote-content-actions--rx-16
  - id: adspect-remote-content-actions--rx-17
  - id: adspect-remote-content-actions--rx-18
  - id: adspect-remote-content-actions--rx-19
  - id: adspect-remote-content-actions--rx-20
- id: adspect-html-rewrite-script-injection
  desc: Adspect HTML rewrite script injection
  crit: suspicious
  conf: 0.96
  all:
  - id: adspect-html-rewrite-script-injection--rx-21
  - id: adspect-html-rewrite-script-injection--rx-22
  - id: micro-behaviors/ui/window/manage/dom::browser-create-script-element
  - id: adspect-html-rewrite-script-injection--rx-25
  - id: adspect-html-rewrite-script-injection--rx-26
  near_bytes: 4096
