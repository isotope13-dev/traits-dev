defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: high-complexity-decoy-dll
    desc: High complexity but very few functions
    for: [dll]
    all:
      - id: metadata/binary/metrics/anomaly::high-complexity-marker
      - id: metadata/binary/metrics/anomaly::low-function-count-marker
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/certificate::pe-signature-verified
