defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
- id: property-nft-marketplace-text
  desc: Property NFT marketplace text
  crit: suspicious
  conf: 0.82
  if:
    type: text
    substr: property NFTs
    case_insensitive: true
- id: nft-secondary-market
  desc: NFT secondary market wording
  crit: suspicious
  conf: 0.82
  if:
    type: text
    substr: buy and sell NFTs among themselves
    case_insensitive: true
- id: purchase-nfts
  desc: NFT purchase call to action
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: Purchase NFTs
    case_insensitive: true
- id: tokenized-real-estate-text
  desc: Tokenized real estate text
  crit: suspicious
  conf: 0.84
  if:
    type: text
    substr: tokenized real estate
    case_insensitive: true
- id: fractional-shares
  desc: Fractional property shares text
  crit: suspicious
  conf: 0.82
  if:
    type: text
    substr: fractional shares of premium properties
    case_insensitive: true
- id: fractional-owner
  desc: Fractional owner text
  crit: suspicious
  conf: 0.82
  if:
    type: text
    substr: fractional owner of the property
    case_insensitive: true
- id: nft-tokenization-price
  desc: Dollar NFT token denomination
  crit: suspicious
  conf: 0.82
  if:
    type: text
    regex: \\$[0-9]+ NFT tokens
- id: monthly-rental-returns
  desc: Monthly rental returns text
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: monthly rental returns
    case_insensitive: true
- id: wallet-rental-income
  desc: Rental income to wallet text
  crit: suspicious
  conf: 0.82
  if:
    type: text
    substr: rental income directly to your wallet
    case_insensitive: true
- id: passive-income-pitch
  desc: Passive income investment wording
  crit: suspicious
  conf: 0.78
  if:
    type: text
    regex: 'passive income.{0,56}investment'
    case_insensitive: true
  unless:
  - id: well-known/tool/detection/ai-guardrail/
- id: passive-income-crypto-term
  desc: Passive income followed by crypto term
  crit: suspicious
  conf: 0.78
  if:
    type: text
    regex: 'passive income.{0,56}(crypto|wallet|token)'
    case_insensitive: true
- id: passive-income-yield-term
  desc: Passive income followed by yield term
  crit: suspicious
  conf: 0.78
  if:
    type: text
    regex: 'passive income.{0,56}(yield|returns)'
    case_insensitive: true
- id: annual-returns-rate
  desc: Annual returns rate text
  crit: suspicious
  conf: 0.78
  if:
    type: text
    substr: '% Annual'
- id: multi-wallet-branding
  desc: Multiple wallet brands advertised
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: (?i)metamask.{0,120}phantom wallet.{0,120}(okx|trust) wallet
- id: proof-of-hold-mechanism
  desc: Proof of hold mechanism
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (?i)\bproof of hold\b|\bPOH\b.{0,80}\bwallet\b
- id: minting-speed-formula
  desc: Token minting speed formula
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: (?i)\bminting speed\b.{0,120}\bTWINE\b|\bTWINE < 21,000,000\b
- id: liquidity-wallet-market-maker
  desc: Liquidity wallet market maker pitch
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (?i)\bliquidity wallet\b.{0,180}\b(liquidity provider|market maker)\b
- id: reinvested-profit-yield--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (?i)\b(reinvest(ed|s)?|distributed)\b.{0,120}\b(profits|returns)\b
  count_max: 1028991
- id: reinvested-profit-yield--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (?i)\b(reinvest(ed|s)?|distributed)\b.{0,120}\b(income)\b
  count_max: 1028992
- id: admin-keys-burned
  desc: Admin keys burned reassurance
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (?i)\badmin keys\b.{0,120}\b(burned|burnt)\b
- id: immutable-front-end-only--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\bimmutable\b.{0,120}\b(front end|front-end)\b
  count_max: 1028994
- id: immutable-front-end-only--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(front end|front-end)\s+only\b.{0,120}\b(wallet|dapp)\b
  count_max: 1028995
- id: immutable-front-end-only--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(front end|front-end)\s+only\b.{0,120}\b(smart contract|contract)\b
  count_max: 1028996
- id: immutable-front-end-only--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(front end|front-end)\s+only\b.{0,120}\b(decentralized|on-chain)\b
  count_max: 1028997
- id: immutable-front-end-only--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(front end|front-end)\s+only\b.{0,120}\b(blockchain|crypto)\b
  count_max: 1028998
- id: immutable-front-end-only--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(wallet|dapp)\b.{0,120}\b(front end|front-end)\s+only\b
  count_max: 1028999
- id: immutable-front-end-only--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(smart contract|contract)\b.{0,120}\b(front end|front-end)\s+only\b
  count_max: 1029000
- id: immutable-front-end-only--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(decentralized|on-chain)\b.{0,120}\b(front end|front-end)\s+only\b
  count_max: 1029001
- id: immutable-front-end-only--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(blockchain|crypto)\b.{0,120}\b(front end|front-end)\s+only\b
  count_max: 1029002
- id: proof-of-reserve-collateral
  desc: Proof of reserve collateral claims
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: (?i)\bproof of reserve\b|\bproof of collateral\b
- id: automated-wallet-yield-engine--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\bbuy(ing)? SCADS\b.{0,120}\bmint(ing)? TWINE\b.{0,120}\bsell(ing)?\b
  count_max: 1029004
- id: automated-wallet-yield-engine--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \bhold it in their wallet\b.{0,120}\bminting of TWINE\b
  count_max: 1029005
composite_rules:
- id: property-nft-marketplace
  desc: Property NFT marketplace pitch
  crit: suspicious
  conf: 0.84
  any:
  - id: property-nft-marketplace-text
  - id: nft-secondary-market
  - id: purchase-nfts
- id: tokenized-real-estate
  desc: Tokenized real estate investment pitch
  crit: suspicious
  conf: 0.85
  any:
  - id: tokenized-real-estate-text
  - id: fractional-shares
  - id: fractional-owner
  - id: nft-tokenization-price
- id: rental-income-returns
  desc: Rental returns wallet marketing
  crit: suspicious
  conf: 0.82
  any:
  - id: monthly-rental-returns
  - id: wallet-rental-income
  - id: passive-income-pitch
  - id: passive-income-crypto-term
  - id: passive-income-yield-term
  - id: annual-returns-rate
- id: wallet-property-investment-facade
  desc: Crypto property investment facade
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/ui/controls/wallet::wallet-connect-cta
  - id: property-nft-marketplace
  any:
  - id: tokenized-real-estate
  - id: rental-income-returns
  - id: multi-wallet-branding
- id: wallet-yield-marketing
  desc: Wallet-based yield marketing scheme
  crit: suspicious
  conf: 0.95
  any:
  - id: proof-of-hold-mechanism
  - id: minting-speed-formula
  - id: liquidity-wallet-market-maker
  - id: reinvested-profit-yield
  - id: automated-wallet-yield-engine
- id: decentralization-reassurance
  desc: Irreversible decentralization reassurance
  crit: suspicious
  conf: 0.94
  any:
  - id: admin-keys-burned
  - id: immutable-front-end-only
  - id: proof-of-reserve-collateral
- id: wallet-connect-yield-scam
  desc: Wallet-connect yield scam facade
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/ui/controls/wallet::wallet-connect-cta
  - id: wallet-yield-marketing
  any:
  - id: decentralization-reassurance
  - id: multi-wallet-branding
- id: self-reinforcing-liquidity-scheme
  desc: Self-reinforcing liquidity scheme
  crit: hostile
  conf: 0.97
  all:
  - id: liquidity-wallet-market-maker
  - id: reinvested-profit-yield
  any:
  - id: proof-of-hold-mechanism
  - id: automated-wallet-yield-engine
  - id: proof-of-reserve-collateral
- id: reinvested-profit-yield
  desc: Reinvested profit yield narrative
  crit: suspicious
  conf: 0.88
  any:
  - id: reinvested-profit-yield--rx-1
  - id: reinvested-profit-yield--rx-2
  unless:
  # Spreadsheet formula catalogs (Excel/Google Sheets MIRR help) discuss
  # reinvested income/returns as ordinary finance terminology.
  - id: metadata/library/finance::spreadsheet-mirr-formula-help
  - id: well-known/lib/bitgo-js::bitgo-js-archive-context
- id: immutable-front-end-only
  desc: Immutable front-end only claim
  crit: suspicious
  conf: 0.9
  any:
  - id: immutable-front-end-only--rx-3
  - id: immutable-front-end-only--rx-4
  - id: immutable-front-end-only--rx-5
  - id: immutable-front-end-only--rx-6
  - id: immutable-front-end-only--rx-7
  - id: immutable-front-end-only--rx-8
  - id: immutable-front-end-only--rx-9
  - id: immutable-front-end-only--rx-10
  - id: immutable-front-end-only--rx-11
- id: automated-wallet-yield-engine
  desc: Automated wallet yield engine
  crit: suspicious
  conf: 0.9
  any:
  - id: automated-wallet-yield-engine--rx-12
  - id: automated-wallet-yield-engine--rx-13
