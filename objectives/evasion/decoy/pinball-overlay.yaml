defaults:
  for: [pe]
  platforms: [windows]

traits:
- id: pinball-game-strings--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: (?i)(3d.?pinball|pinball\.hlp)

- id: pinball-game-strings--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: (?i)(pinball\.pdb|pinball\.dat)

- id: pinball-game-strings--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: (?i)(pinballexe|pinballtheme)

- id: pinball-game-strings--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: (?i)(dlg_highscores|pinball\.exe)

composite_rules:
- id: pinball-overlay-camouflage
  desc: 3D Pinball game data camouflaging malware overlay
  crit: suspicious
  conf: 0.92
  all:
  - id: pinball-game-strings
  - id: metadata/binary/layout::overlay-over-90pct
  unless:
  - id: metadata/signed/platform::microsoft-corporation
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: pinball-game-strings
  desc: 3D Pinball game data strings in overlay
  crit: baseline
  conf: 0.95
  any:
  - id: pinball-game-strings--rx-1
  - id: pinball-game-strings--rx-2
  - id: pinball-game-strings--rx-3
  - id: pinball-game-strings--rx-4
  needs: 1
