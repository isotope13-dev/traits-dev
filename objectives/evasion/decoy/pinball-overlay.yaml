defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: pinball-game-strings
    desc: 3D Pinball game data strings in overlay
    crit: baseline
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: (?i)(3d.?pinball|pinball\.hlp|pinball\.pdb|pinball\.dat|pinballexe|pinballtheme|dlg_highscores|pinball\.exe)

composite_rules:
  - id: pinball-overlay-camouflage
    desc: 3D Pinball game data camouflaging malware overlay
    crit: suspicious
    conf: 0.92
    all:
      - id: pinball-game-strings
      - id: metadata/binary/layout::overlay-over-90pct
    unless:
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
