defaults:
  platforms: [solaris, unix]
  for: [go, elf]
  attack: T1564

traits:
  - id: go-solaris-pr-hidename
    desc: Go Solaris PR_HIDENAME
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'prHidename\s*=\s*16[\s\S]{0,160}syscall\.Syscall'

  - id: go-solaris-pr-hidename-value
    desc: Go Solaris PR_HIDENAME value
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'prHidename\s*=\s*16'

  - id: go-solaris-prctl-syscall
    desc: Go Solaris prctl syscall
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'syscall\.Syscall\s*\(\s*sysPrctl'

  - id: go-solaris-svcd-name
    desc: Go Solaris svcd name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'name\s*:=\s*"svcd"'

composite_rules:
  - id: go-solaris-process-hide
    desc: Go Solaris process hide
    crit: hostile
    conf: 0.98
    all:
      - id: go-solaris-pr-hidename
      - id: go-solaris-svcd-name

  - id: go-solaris-prctl-hide
    desc: Go Solaris prctl hide
    crit: hostile
    conf: 0.98
    all:
      - id: go-solaris-pr-hidename-value
      - id: go-solaris-prctl-syscall
      - id: go-solaris-svcd-name
