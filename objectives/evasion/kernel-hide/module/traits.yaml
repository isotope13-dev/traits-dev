defaults:
  platforms:
    - unix
  for: [elf, c]
traits:
  - id: proc-kallsyms
    desc: /proc/kallsyms kernel symbol file
    crit: notable
    conf: 0.75
    mbc: F0015
    attack: T1014
    if:
      type: text
      substr: /proc/kallsyms
  - id: proc-ksyms
    desc: /proc/ksyms legacy kernel symbol file
    crit: notable
    conf: 0.75
    mbc: F0015
    attack: T1014
    if:
      type: text
      substr: /proc/ksyms
  - id: kallsyms-lookup-fn
    desc: kallsyms_lookup kernel function
    crit: notable
    conf: 0.8
    mbc: F0015
    if:
      type: symbol
      regex: kallsyms_lookup
  - id: tcp4-seq-show
    desc: tcp4_seq_show function
    crit: suspicious
    conf: 0.85
    mbc: F0015
    attack: T1014
    if:
      type: symbol
      regex: tcp4_seq_show
  - id: tcp6-seq-show
    desc: tcp6_seq_show function
    crit: suspicious
    conf: 0.85
    mbc: F0015
    attack: T1014
    if:
      type: symbol
      regex: tcp6_seq_show
  - id: udp4-seq-show
    desc: udp4_seq_show function
    crit: suspicious
    conf: 0.85
    mbc: F0015
    attack: T1014
    if:
      type: symbol
      regex: udp4_seq_show
  - id: udp6-seq-show
    desc: udp6_seq_show function
    crit: suspicious
    conf: 0.85
    mbc: F0015
    attack: T1014
    if:
      type: symbol
      regex: udp6_seq_show
  - id: proc-root-readdir
    desc: proc_root_readdir function
    crit: suspicious
    conf: 0.85
    mbc: F0015
    attack: T1014
    if:
      type: symbol
      regex: proc_root_readdir
  - id: proc-iterate
    desc: proc_iterate function
    crit: component
    conf: 0.85
    mbc: F0015
    if:
      type: symbol
      exact: proc_iterate
  - id: proc-fill-cache
    desc: proc_fill_cache function
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: proc_fill_cache
  - id: filldir
    desc: filldir callback function
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: filldir
    unless:
      - id: objectives/evasion/kernel-hide/lkm/headers::kernel-module-header-detect
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: filldir64
    desc: filldir64 callback function
    crit: notable
    conf: 0.75
    if:
      type: symbol
      regex: filldir64
    unless:
      - id: objectives/evasion/kernel-hide/lkm/headers::kernel-module-header-detect
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: pid-getattr
    desc: pid_getattr function
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: pid_getattr
  - id: sys-getpriority
    desc: sys_getpriority syscall
    crit: component
    conf: 0.5
    if:
      type: symbol
      regex: sys_getpriority
  - id: sys-getdents
    desc: sys_getdents syscall
    crit: component
    conf: 0.7
    if:
      type: symbol
      regex: sys_getdents
  - id: sys-getdents64
    desc: sys_getdents64 syscall
    crit: component
    conf: 0.7
    if:
      type: symbol
      regex: sys_getdents64
  - id: sys-kill
    desc: sys_kill syscall
    crit: component
    conf: 0.5
    if:
      type: symbol
      regex: sys_kill
  - id: orig-cr0
    desc: orig_cr0 CR0 register backup
    crit: suspicious
    conf: 0.9
    mbc: F0015
    if:
      type: text
      substr: orig_cr0
  - id: write-cr0
    desc: write_cr0 function
    crit: suspicious
    conf: 0.9
    mbc: F0015
    if:
      type: symbol
      regex: ^write_cr0
    unless:
      - type: text
        substr: _ASM_X86_SPECIAL_INSNS_H
    downgrade:
      any:
        - type: text
          regex: <linux/(module|export)\.h>
  - id: native-write-cr0
    desc: native_write_cr0 function
    crit: suspicious
    conf: 0.9
    mbc: F0015
    if:
      type: symbol
      regex: ^native_write_cr0
    unless:
      - type: text
        substr: _ASM_X86_SPECIAL_INSNS_H
    downgrade:
      any:
        - type: text
          regex: <linux/(module|export)\.h>
  - id: init-module
    desc: init_module entry point
    crit: notable
    conf: 0.5
    if:
      type: symbol
      regex: init_module
  - id: cleanup-module
    desc: cleanup_module exit point
    crit: notable
    conf: 0.5
    if:
      type: symbol
      regex: cleanup_module
  - id: this-module
    desc: __this_module reference
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: __this_module
  - id: vermagic
    desc: vermagic= kernel version magic
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: vermagic=
  - id: modinfo-section
    desc: .modinfo section
    crit: notable
    conf: 0.5
    for:
      - elf
    if:
      type: section
      exact: .modinfo
  - id: gnu-linkonce
    desc: .gnu.linkonce section
    crit: notable
    conf: 0.5
    if:
      type: section
      substr: .gnu.linkonce
  - id: nf-register-hook
    desc: nf_register_hook function
    crit: notable
    conf: 0.8
    mbc: F0015
    if:
      type: symbol
      regex: nf_register_hook
  - id: nf-register-net-hook
    desc: nf_register_net_hook function
    crit: notable
    conf: 0.8
    mbc: F0015
    if:
      type: symbol
      regex: nf_register_net_hook
  - id: nf-unregister-hook
    desc: nf_unregister_hook function
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: nf_unregister_hook
  - id: nf-hookfn
    desc: nf_hookfn callback type
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: nf_hookfn
  - id: nf-accept
    desc: NF_ACCEPT verdict
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: NF_ACCEPT
  - id: nf-drop
    desc: NF_DROP verdict
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: NF_DROP
  - id: vfs-read
    desc: vfs_read function
    crit: component
    conf: 0.5
    if:
      type: symbol
      regex: vfs_read
  - id: vfs-write
    desc: vfs_write function
    crit: component
    conf: 0.5
    if:
      type: symbol
      regex: vfs_write
  - id: vfs-readdir
    desc: vfs_readdir function
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: vfs_readdir
  - id: iterate-dir
    desc: iterate_dir function
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: iterate_dir
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: objectives/evasion/kernel-hide/lkm/headers::kernel-module-header-detect
  - id: file-operations
    desc: file_operations struct
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: file_operations
  - id: inode-operations
    desc: inode_operations struct
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: inode_operations
  - id: diamorphine-name
    desc: Diamorphine rootkit name
    crit: suspicious
    conf: 0.95
    mbc: F0015
    attack: T1014
    if:
      type: text
      substr: diamorphine
      case_insensitive: true
  - id: is-invisible
    desc: is_invisible function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: is_invisible
  - id: module-hidden
    desc: module_hidden flag
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: module_hidden
  - id: hide-module
    desc: hide_module function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: hide_module
  - id: give-root
    desc: give_root function
    crit: suspicious
    conf: 0.95
    attack: T1068
    if:
      type: text
      substr: give_root
  - id: hacked-kill
    desc: hacked_kill function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: hacked_kill
  - id: orig-getdents
    desc: orig_getdents function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: orig_getdents
  - id: reptile-name
    desc: Reptile rootkit name string
    crit: component
    conf: 0.95
    mbc: F0015
    attack: T1014
    if:
      type: text
      regex: '\b(reptile_rootkit|reptile\.ko|reptile_cmd|reptile_hide|reptile_shell)\b'
      case_insensitive: true
  - id: khook
    desc: khook framework marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: khook
  - id: kmatryoshka
    desc: kmatryoshka packer marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: kmatryoshka
  - id: reptile-hide
    desc: reptile_hide function
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: reptile_hide
  - id: magic-packet-dup
    desc: YOURMAGICPACKET trigger
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: YOURMAGICPACKET
  - id: reptile-cmd
    desc: reptile_cmd backdoor
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: reptile_cmd
  - id: syslogk-name
    desc: Syslogk rootkit name
    crit: suspicious
    conf: 0.95
    mbc: F0015
    attack: T1014
    if:
      type: text
      substr: syslogk
      case_insensitive: true
  - id: rekoobe-magic
    desc: Rekoobe magic string (PgSD93iu)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: PgSD93iu
  # Source-level kernel module API symbols
  - id: module-init-sym
    desc: module_init kernel macro import
    crit: notable
    conf: 0.7
    for: [c]
    if:
      type: symbol
      exact: module_init
  - id: module-exit-sym
    desc: module_exit kernel macro import
    crit: notable
    conf: 0.7
    for: [c]
    if:
      type: symbol
      exact: module_exit
  - id: read-cr0-sym
    desc: read_cr0 register read function
    crit: notable
    conf: 0.9
    for: [c]
    if:
      type: symbol
      exact: read_cr0
  - id: xchg-sym
    desc: xchg atomic exchange operation
    crit: notable
    conf: 0.85
    for: [c]
    if:
      type: symbol
      exact: xchg
  - id: kmalloc-sym
    desc: kmalloc kernel memory allocation
    crit: baseline
    conf: 0.8
    for: [c]
    if:
      type: symbol
      exact: kmalloc
  - id: printk-sym
    desc: printk kernel logging function
    crit: notable
    conf: 0.7
    for: [c]
    if:
      type: symbol
      exact: printk
composite_rules:
  - id: kallsyms-lookup-method
    desc: Accesses /proc/kallsyms for kernel symbol
    crit: notable
    conf: 0.85
    mbc: F0015
    attack: T1014
    any:
      - id: proc-kallsyms
      - id: proc-ksyms
      - id: objectives/evasion/kernel-hide::lookup-address-usage
      - id: kallsyms-lookup-fn
  - id: tcp-seq-funcs
    desc: TCP/UDP seq_show hook functions
    crit: suspicious
    conf: 0.85
    any:
      - id: tcp4-seq-show
      - id: tcp6-seq-show
      - id: udp4-seq-show
      - id: udp6-seq-show
  - id: tcp-hiding
    desc: Hooks TCP sequence show function
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1014
    all:
      - id: tcp-seq-funcs
      - id: micro-behaviors/fs/proc/info::proc-net-tcp
    unless:
      - id: objectives/discovery/network/scan::scanner
  - id: proc-hiding-funcs
    desc: Proc filesystem hiding functions
    crit: suspicious
    conf: 0.85
    size_max: 50000
    needs: 2
    any:
      - id: proc-root-readdir
      - id: proc-iterate
      - id: proc-fill-cache
      - id: filldir
      - id: filldir64
      - id: pid-getattr
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: syscall-targets
    desc: Syscall hook targets
    crit: component
    conf: 0.7
    any:
      - id: sys-getpriority
      - id: sys-getdents
      - id: sys-getdents64
      - id: sys-kill
  - id: cr0-manipulation
    desc: CR0 write protection bypass
    crit: suspicious
    conf: 0.9
    any:
      - id: orig-cr0
      - id: write-cr0
      - id: native-write-cr0
  - id: syscall-hook
    desc: Syscall table manipulation patterns
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1014
    any:
      - id: syscall-table-hook
      - id: cr0-manipulation
  - id: syscall-table-hook
    desc: Syscall table with hook targets
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/evasion/kernel-hide/hook::syscall-table-ref
      - id: syscall-targets
  - id: module-markers
    desc: Kernel module format markers
    crit: notable
    conf: 0.5
    needs: 3
    any:
      - id: init-module
      - id: cleanup-module
      - id: this-module
      - id: vermagic
      - id: modinfo-section
      - id: gnu-linkonce
  - id: nf-registration
    desc: Netfilter hook registration functions
    crit: notable
    conf: 0.8
    any:
      - id: nf-register-hook
      - id: nf-register-net-hook
      - id: nf-unregister-hook
      - id: nf-hookfn
  - id: nf-verdicts
    desc: Netfilter verdict values
    crit: notable
    conf: 0.5
    any:
      - id: nf-accept
      - id: nf-drop
  - id: netfilter-hook
    desc: Netfilter hook manipulation for packet
    crit: notable
    conf: 0.85
    mbc: F0015
    attack: T1014
    needs: 2
    any:
      - id: nf-registration
      - id: nf-verdicts
  - id: vfs-operations
    desc: VFS operation structures
    crit: notable
    conf: 0.7
    any:
      - id: file-operations
      - id: inode-operations
  - id: vfs-functions
    desc: VFS layer functions
    crit: notable
    conf: 0.6
    any:
      - id: vfs-read
      - id: vfs-write
      - id: vfs-readdir
      - id: iterate-dir
  - id: vfs-hook
    desc: VFS layer hooking for file
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1014
    all:
      - id: vfs-operations
      - id: vfs-functions
  - id: diamorphine-behavior
    desc: Diamorphine behavior markers
    crit: suspicious
    conf: 0.9
    any:
      - id: module-hidden
      - id: hide-module
      - id: give-root
  - id: diamorphine-hooks
    desc: Diamorphine hook markers
    crit: suspicious
    conf: 0.9
    all:
      - id: hacked-kill
      - id: orig-getdents
  - id: diamorphine
    desc: Diamorphine kernel rootkit indicators
    crit: suspicious
    conf: 0.95
    mbc: F0015
    attack: T1014
    any:
      - id: diamorphine-name
      - id: diamorphine-with-behavior
      - id: diamorphine-hooks
  - id: diamorphine-with-behavior
    desc: Diamorphine with behavior markers
    crit: suspicious
    conf: 0.95
    all:
      - id: is-invisible
      - id: diamorphine-behavior
  - id: reptile
    desc: Reptile kernel rootkit indicators
    crit: suspicious
    conf: 0.95
    mbc: F0015
    attack: T1014
    any:
      - id: reptile-name
      - id: reptile-markers
  - id: reptile-markers
    desc: Reptile rootkit markers
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: khook
      - id: kmatryoshka
      - id: reptile-hide
      - id: objectives/evasion/kernel-hide/module::magic-packet-dup
      - id: reptile-cmd
  - id: syslogk-behavior
    desc: Syslogk rootkit behavior
    crit: suspicious
    conf: 0.9
    all:
      - id: proc-kallsyms
      - id: tcp4-seq-show
  - id: syslogk
    desc: Syslogk kernel rootkit indicators
    crit: suspicious
    conf: 0.95
    mbc: F0015
    attack: T1014
    any:
      - id: syslogk-behavior
      - id: syslogk-name
      - id: rekoobe-magic
  - id: lkm-rootkit
    desc: Linux Kernel Module rootkit detected
    crit: hostile
    conf: 0.95
    mbc: F0015
    attack: T1014
    all:
      - id: module-markers
      - id: lkm-rootkit-behavior-comp
      - id: kallsyms-lookup-method
  - id: lkm-rootkit-behavior-comp
    desc: LKM rootkit behavior indicators
    crit: suspicious
    conf: 0.9
    any:
      - id: syscall-hook
      - id: proc-hiding-funcs
      - id: tcp-hiding
      - id: vfs-hook
