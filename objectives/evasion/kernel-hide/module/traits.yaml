defaults:
  platforms:
  - unix
  for: [elf, c]
traits:
- id: tcp4-seq-show
  desc: Hooks tcp4_seq_show to hide TCP4 ports
  crit: suspicious
  conf: 0.85
  mbc: F0015
  attack: T1014
  if:
    type: symbol
    substr: tcp4_seq_show
- id: tcp6-seq-show
  desc: Hooks tcp6_seq_show to hide TCP6 ports
  crit: suspicious
  conf: 0.85
  mbc: F0015
  attack: T1014
  if:
    type: symbol
    substr: tcp6_seq_show
- id: udp4-seq-show
  desc: Hooks udp4_seq_show to hide UDP4 ports
  crit: suspicious
  conf: 0.85
  mbc: F0015
  attack: T1014
  if:
    type: symbol
    substr: udp4_seq_show
- id: udp6-seq-show
  desc: Hooks udp6_seq_show to hide UDP6 ports
  crit: suspicious
  conf: 0.85
  mbc: F0015
  attack: T1014
  if:
    type: symbol
    substr: udp6_seq_show
- id: proc-iterate
  desc: Hooks proc_iterate to hide /proc entries
  crit: component
  conf: 0.85
  mbc: F0015
  if:
    type: symbol
    exact: proc_iterate
- id: proc-fill-cache
  desc: Hooks proc_fill_cache to hide PIDs
  crit: suspicious
  conf: 0.8
  if:
    type: symbol
    substr: proc_fill_cache
- id: filldir
  desc: Hooks filldir to hide files in readdir
  crit: component
  conf: 0.75
  if:
    type: symbol
    substr: filldir
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: filldir64
  desc: Hooks filldir64 to hide files in readdir
  crit: component
  conf: 0.75
  if:
    type: symbol
    substr: filldir64
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: pid-getattr
  desc: Hooks pid_getattr to hide processes
  crit: suspicious
  conf: 0.8
  if:
    type: symbol
    substr: pid_getattr
- id: sys-getpriority
  desc: sys_getpriority rootkit hook target
  crit: component
  conf: 0.5
  if:
    type: symbol
    substr: sys_getpriority
- id: sys-getdents
  desc: getdents syscall, file-hiding target
  crit: component
  conf: 0.7
  if:
    type: symbol
    substr: sys_getdents
- id: sys-getdents64
  desc: getdents64 syscall, file-hiding target
  crit: component
  conf: 0.7
  if:
    type: symbol
    substr: sys_getdents64
- id: sys-kill
  desc: sys_kill syscall, rootkit control target
  crit: component
  conf: 0.5
  if:
    type: symbol
    substr: sys_kill
- id: orig-cr0
  desc: Saved CR0 for write-protect toggle
  crit: suspicious
  conf: 0.9
  mbc: F0015
  if:
    type: text
    substr: orig_cr0
  unless:
  - id: metadata/lang/source::linux-kernel-arch-source-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
# The bare `write_cr0` / `native_write_cr0` / `read_cr0` calls are neutral
# privileged-register capabilities and live in
# micro-behaviors/os/kernel/register/. They used to be defined here as
# suspicious traits described as "Toggles CR0 WP" / "Disables CR0 write
# protection", but neither matcher inspected the WP bit — they fired on any CR0
# access, so ordinary in-tree drivers doing cache control tripped the whole
# kernel-hide family. The WP intent is now asserted by cr0-manipulation below.
- id: init-module
  desc: init_module entry point
  crit: component
  conf: 0.5
  if:
    type: symbol
    exact: init_module
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: cleanup-module
  desc: cleanup_module exit point
  crit: component
  conf: 0.5
  if:
    type: symbol
    substr: cleanup_module
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: this-module
  desc: __this_module reference
  crit: component
  conf: 0.5
  if:
    type: text
    substr: __this_module
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: vermagic
  desc: vermagic= kernel version magic
  crit: component
  conf: 0.5
  if:
    type: text
    substr: vermagic=
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: modinfo-section
  desc: .modinfo section
  crit: component
  conf: 0.5
  for:
  - elf
  if:
    type: section
    exact: .modinfo
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: gnu-linkonce
  desc: .gnu.linkonce section
  crit: component
  conf: 0.5
  if:
    type: section
    substr: .gnu.linkonce
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: vfs-read
  desc: Hooks vfs_read to tamper file reads
  crit: component
  conf: 0.5
  if:
    type: symbol
    substr: vfs_read
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: vfs-write
  desc: Hooks vfs_write to tamper file writes
  crit: component
  conf: 0.5
  if:
    type: symbol
    substr: vfs_write
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: vfs-readdir
  desc: Hooks vfs_readdir to hide files
  crit: component
  conf: 0.7
  if:
    type: symbol
    substr: vfs_readdir
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: iterate-dir
  desc: Hooks iterate_dir to hide files
  crit: component
  conf: 0.7
  if:
    type: symbol
    substr: iterate_dir
  unless:
  - id: micro-behaviors/os/syscall/invoke/
  - id: micro-behaviors/os/kernel/module::linux-module-header-include
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: file-operations
  desc: file_operations VFS table hook target
  crit: component
  conf: 0.7
  if:
    type: text
    substr: file_operations
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: inode-operations
  desc: inode_operations struct
  # notable not suspicious — any kernel filesystem code declares inode_operations.
  # Meaningful only as a component of rootkit composites alongside seq-show
  # hooking, vfs_readdir replacement, etc.
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: inode_operations
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: diamorphine-name
  desc: Diamorphine rootkit name
  crit: suspicious
  conf: 0.95
  mbc: F0015
  attack: T1014
  if:
    type: text
    substr: diamorphine
    case_insensitive: true
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: is-invisible
  desc: Rootkit visibility-check helper
  crit: component
  conf: 0.9
  if:
    type: text
    substr: is_invisible
- id: module-hidden
  desc: LKM self-hiding flag (rootkit)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: module_hidden
- id: hide-module
  desc: Removes LKM from kernel module list
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: hide_module
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: give-root
  desc: Magic privilege-escalation backdoor
  crit: suspicious
  conf: 0.95
  attack: T1068
  if:
    type: text
    substr: give_root
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: hacked-kill
  desc: Hooked sys_kill for signal control
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: hacked_kill
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: orig-getdents
  desc: Saved getdents ptr for file hiding
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: orig_getdents
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: reptile-name--rx-1
  desc: Reptile rootkit name marker 1/3
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\b(reptile_rootkit|reptile\.ko)\b'
    case_insensitive: true
  count_max: 1031366
- id: reptile-name--rx-2
  desc: Reptile rootkit cmd/hide marker 2/3
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\b(reptile_cmd|reptile_hide)\b'
    case_insensitive: true
  count_max: 1031367
- id: reptile-name--rx-3
  desc: Reptile rootkit shell marker 3/3
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\b(reptile_shell)\b'
    case_insensitive: true
  count_max: 1031368
- id: khook
  desc: Kernel function-hooking framework
  crit: suspicious
  conf: 0.9
  if:
    type: text
    word: KHOOK
- id: kmatryoshka
  desc: kmatryoshka packer marker
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: kmatryoshka
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: reptile-hide
  desc: Reptile rootkit hide command
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: reptile_hide
- id: magic-packet-dup
  desc: YOURMAGICPACKET trigger
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: YOURMAGICPACKET
- id: reptile-cmd
  desc: Reptile rootkit control command
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: reptile_cmd
- id: syslogk-name
  desc: Syslogk rootkit name
  crit: suspicious
  conf: 0.95
  mbc: F0015
  attack: T1014
  if:
    type: text
    word: syslogk
- id: rekoobe-magic
  desc: Rekoobe magic string (PgSD93iu)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: PgSD93iu
- id: printk-sym
  desc: Kernel log fn (module code)
  crit: notable
  conf: 0.7
  for: [c]
  if:
    type: symbol
    exact: printk
  unless:
  - id: micro-behaviors/os/syscall/invoke/
  - id: metadata/lang/source::linux-kernel-arch-source-path
  - id: metadata/lang/source::linux-kernel-source-tree-path
composite_rules:
- id: tcp-seq-funcs
  desc: TCP/UDP seq_show hook functions
  crit: suspicious
  conf: 0.85
  any:
  - id: tcp4-seq-show
  - id: tcp6-seq-show
  - id: udp4-seq-show
  - id: udp6-seq-show
- id: tcp-hiding
  desc: Hooks TCP sequence show function
  crit: suspicious
  conf: 0.9
  mbc: F0015
  attack: T1014
  all:
  - id: tcp-seq-funcs
  - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
  unless:
  - id: objectives/discovery/network/scan/proc/
- id: proc-hiding-funcs
  desc: Proc filesystem hiding functions
  crit: suspicious
  conf: 0.85
  size_max: 50000
  needs: 2
  any:
  - id: micro-behaviors/os/kernel/proc::proc-root-readdir-symbol
  - id: proc-iterate
  - id: proc-fill-cache
  - id: filldir
  - id: filldir64
  - id: pid-getattr
  unless:
  - id: micro-behaviors/os/syscall/invoke/
- id: syscall-targets
  desc: Syscall hook targets
  crit: component
  conf: 0.7
  any:
  - id: sys-getpriority
  - id: sys-getdents
  - id: sys-getdents64
  - id: sys-kill
# A CR0 write plus evidence that the write-protect bit specifically is being
# cleared. Requiring the WP evidence is what separates a rootkit unlocking
# read-only kernel memory from a driver toggling cache or restoring CR0 on
# resume, both of which write CR0 without ever touching bit 16.
- id: cr0-manipulation
  desc: CR0 write-protect bypass
  crit: suspicious
  conf: 0.9
  all:
  - id: cr0-write-protect-clear
  any:
  - id: micro-behaviors/os/kernel/register::cr0-write-call
  - id: micro-behaviors/os/kernel/register::native-cr0-write-call
  - id: orig-cr0
  unless:
  - id: metadata/lang/source::linux-kernel-arch-source-path
- id: cr0-write-protect-clear
  desc: Clears the CR0 write-protect bit
  crit: suspicious
  conf: 0.95
  any:
  - id: objectives/evasion/kernel-hide/lkm/internals::cr0-wp-bit-manipulation
  - id: objectives/evasion/kernel-hide/hook::cr0-wp-bit-clear-source
- id: syscall-hook
  desc: Syscall table manipulation patterns
  crit: suspicious
  conf: 0.9
  mbc: F0015
  attack: T1014
  any:
  - id: syscall-table-hook
  - id: cr0-manipulation
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: syscall-table-hook
  desc: Syscall table with hook targets
  crit: suspicious
  conf: 0.9
  all:
  - id: objectives/evasion/kernel-hide/hook::syscall-table-ref
  - id: syscall-targets
- id: module-markers
  desc: Kernel module format markers
  crit: component
  conf: 0.5
  needs: 3
  any:
  - id: init-module
  - id: cleanup-module
  - id: this-module
  - id: vermagic
  - id: modinfo-section
  - id: gnu-linkonce
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: vfs-operations
  desc: VFS operation structures
  crit: suspicious
  conf: 0.7
  any:
  - id: file-operations
  - id: inode-operations
- id: vfs-functions
  desc: VFS layer functions
  crit: suspicious
  conf: 0.6
  any:
  - id: vfs-read
  - id: vfs-write
  - id: vfs-readdir
  - id: iterate-dir
- id: vfs-hook
  desc: VFS layer hooking for file
  crit: suspicious
  conf: 0.9
  mbc: F0015
  attack: T1014
  all:
  - id: vfs-operations
  - id: vfs-functions
  any:
  - id: is-invisible
  - id: module-hidden
  - id: hide-module
  - id: orig-getdents
  - id: hacked-kill
  - id: khook
  - id: objectives/evasion/kernel-hide/hook::syscall-table-ref
- id: diamorphine-behavior
  desc: Diamorphine behavior markers
  crit: suspicious
  conf: 0.9
  any:
  - id: module-hidden
  - id: hide-module
  - id: give-root
- id: diamorphine-hooks
  desc: Diamorphine hook markers
  crit: suspicious
  conf: 0.9
  all:
  - id: hacked-kill
  - id: orig-getdents
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: diamorphine
  desc: Diamorphine kernel rootkit indicators
  crit: suspicious
  conf: 0.95
  mbc: F0015
  attack: T1014
  any:
  - id: diamorphine-name
  - id: diamorphine-with-behavior
  - id: diamorphine-hooks
- id: diamorphine-with-behavior
  desc: Diamorphine with behavior markers
  crit: suspicious
  conf: 0.95
  all:
  - id: is-invisible
  - id: diamorphine-behavior
- id: reptile
  desc: Reptile kernel rootkit indicators
  crit: suspicious
  conf: 0.95
  mbc: F0015
  attack: T1014
  any:
  - id: reptile-name
  - id: reptile-markers
- id: reptile-markers
  desc: Reptile rootkit markers
  crit: suspicious
  conf: 0.9
  needs: 2
  any:
  - id: khook
  - id: kmatryoshka
  - id: reptile-hide
  - id: objectives/evasion/kernel-hide/module::magic-packet-dup
  - id: reptile-cmd
- id: syslogk-behavior
  desc: Syslogk rootkit behavior
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/fs/proc/system::proc-kallsyms
  - id: tcp4-seq-show
- id: syslogk
  desc: Syslogk kernel rootkit indicators
  crit: suspicious
  conf: 0.95
  mbc: F0015
  attack: T1014
  any:
  - id: syslogk-behavior
  - id: syslogk-name
  - id: rekoobe-magic
- id: lkm-rootkit
  desc: Linux Kernel Module rootkit detected
  crit: hostile
  conf: 0.95
  mbc: F0015
  attack: T1014
  all:
  - id: module-markers
  - id: lkm-rootkit-behavior-comp
  any:
  - id: micro-behaviors/fs/proc/system::proc-kallsyms
  - id: micro-behaviors/fs/proc/system::proc-ksyms
  - id: objectives/evasion/kernel-hide/wp::lookup-address-usage
  - id: micro-behaviors/os/kernel/routines::kallsyms-lookup-symbol
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: lkm-rootkit-behavior-comp
  desc: LKM rootkit behavior indicators
  crit: suspicious
  conf: 0.9
  any:
  - id: syscall-hook
  - id: proc-hiding-funcs
  - id: tcp-hiding
  - id: vfs-hook
- id: reptile-name
  desc: Reptile rootkit name string
  crit: component
  conf: 0.95
  mbc: F0015
  attack: T1014
  any:
  - id: reptile-name--rx-1
  - id: reptile-name--rx-2
  - id: reptile-name--rx-3
