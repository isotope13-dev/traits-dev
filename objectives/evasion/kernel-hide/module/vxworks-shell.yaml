defaults:
  platforms: [unix, appliance]
  for: [shell]
  attack: T1014

traits:
  - id: vxworks-module-list-unlink
    desc: VxWorks module list unlink
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'modName2Id[\s\S]{0,260}modInfoGet[\s\S]{0,260}listDelete'

  - id: vxworks-task-table-hide
    desc: VxWorks task table hide
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'taskIdName2Id[\s\S]{0,260}task control block'

composite_rules:
  - id: vxworks-shell-module-task-hide
    desc: VxWorks module and task hiding
    crit: hostile
    conf: 0.98
    all:
      - id: vxworks-module-list-unlink
      - id: vxworks-task-table-hide
