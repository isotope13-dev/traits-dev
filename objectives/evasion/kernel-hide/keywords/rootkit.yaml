defaults:
  platforms:
    - unix
    - windows
  crit: notable
  conf: 0.5
  for: [scripts, binaries]
traits:
  - id: rootkit-word
    desc: Rootkit keyword
    if:
      type: text
      word: rootkit
      case_insensitive: true
    not:
      # AWS Security Hub / threat-intel API schemas enumerate finding types.
      - substr: '"rootkit"'
      - substr: RootkitLinux
      - substr: FindingType
    unless:
      - type: path
        regex: '(?i)(^|[\\/])vendor[\\/]aws[\\/]'
      - type: path
        regex: '(?i)api-2\.json(\.php)?$'
      - id: well-known/app/wordpress-plugins::wordpress-plugin-path-w3-total-cache
      # Encyclopedia / docs pages discussing rootkits are not implants.
      - id: metadata/file/profile/identity::static-html-shell
