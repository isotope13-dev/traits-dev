defaults:
  platforms: [macos]
  for: [c, macho]

traits:
  - id: macos-sy-call-hook
    desc: macOS syscall table sy_call assignment
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1014
    for:
      - c
    if:
      type: text
      regex: (\]|->)\s*\.?\s*sy_call\s*=
    unless:
      - id: micro-behaviors/os/kernel/syscall::sys-sysent-header
      - id: objectives/evasion/kernel-hide/lkm/interface::sys-module-header
  - id: macos-kauth-cred-setuidgid
    desc: macOS kernel credential manipulation
    crit: suspicious
    conf: 0.95
    attack: T1068
    for:
      - c
    if:
      type: text
      substr: kauth_cred_setuidgid
  - id: macos-ipf-addv4
    desc: macOS IPv4 filter registration
    crit: suspicious
    conf: 0.8
    mbc: F0015
    for:
      - c
    if:
      type: text
      substr: ipf_addv4
  - id: macos-sidt-ref
    desc: macOS sidt instruction reference
    crit: component
    conf: 0.75
    for:
      - c
    if:
      type: text
      substr: sidt
  - id: macos-allproc-ref
    desc: macOS my_allproc process list
    crit: component
    conf: 0.75
    for:
      - c
    if:
      type: text
      substr: my_allproc
  - id: macos-list-remove-p-list
    desc: macOS p_list removal macro
    crit: component
    conf: 0.8
    for:
      - c
    if:
      type: text
      substr: LIST_REMOVE(p, p_list)
  - id: macos-kextstat-ref
    desc: macOS kextstat tool reference
    crit: component
    conf: 0.7
    for:
      - c
    if:
      type: text
      substr: kextstat
  - id: macos-who-ref
    desc: macOS who tool reference
    crit: component
    conf: 0.7
    for:
      - c
    if:
      type: text
      regex: '\b/usr/bin/who\b|popen\s*\([^;\n]{0,80}["'']who["'']'
  - id: macos-w-strncmp
    desc: macOS w command comparison
    crit: component
    conf: 0.7
    for:
      - c
    if:
      type: text
      substr: strncmp(p->p_comm,w
  - id: macos-kunc-execute
    desc: macOS KUNCExecute kernel command exec
    crit: suspicious
    conf: 0.95
    attack: T1059
    for:
      - c
    if:
      type: text
      substr: KUNCExecute
  - id: macos-kext-getdirentries-hook
    desc: macOS getdirentries hook function
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1014
    if:
      type: text
      substr: new_getdirentries
  - id: macos-kext-write-nocancel-hook
    desc: macOS write_nocancel syscall hook
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1014
    if:
      type: text
      substr: new_write_nocancel
  - id: macos-sysent-getdirentries64
    desc: macOS SYS_getdirentries64 table target
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: text
      substr: table[SYS_getdirentries64].sy_call
  - id: macos-sysent-getdirentriesattr
    desc: macOS SYS_getdirentriesattr table target
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: text
      substr: table[SYS_getdirentriesattr].sy_call
  - id: macos-sysent-write-nocancel
    desc: macOS SYS_write_nocancel table target
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: text
      substr: table[SYS_write_nocancel].sy_call
  - id: macos-kext-ipf-filter
    desc: macOS IP filter hook function
    crit: suspicious
    conf: 0.8
    mbc: F0015
    if:
      type: text
      substr: ipf_input
  - id: macos-open-app-as-root
    desc: macOS kOpenAppAsRoot flag
    crit: component
    conf: 0.75
    for:
      - c
    if:
      type: text
      substr: kOpenAppAsRoot
  - id: macos-open-application-path
    desc: macOS kOpenApplicationPath flag
    crit: component
    conf: 0.75
    for:
      - c
    if:
      type: text
      substr: kOpenApplicationPath
  - id: macos-magic-icmp-type-zero
    desc: macOS magic ICMP type zero
    crit: component
    conf: 0.75
    for:
      - c
    if:
      type: text
      substr: MAGIC_ICMP_TYPE 0
  - id: macos-magic-icmp-code-255
    desc: macOS magic ICMP code 255
    crit: suspicious
    conf: 0.85
    for:
      - c
    if:
      type: text
      substr: MAGIC_ICMP_CODE 255
  - id: macos-grep-comm-compare
    desc: macOS grep process name compare
    crit: suspicious
    conf: 0.8
    for:
      - c
    if:
      type: text
      substr: strncmp(p->p_comm, grep
  - id: macos-sysctl-comm-compare
    desc: macOS sysctl process name compare
    crit: suspicious
    conf: 0.8
    for:
      - c
    if:
      type: text
      substr: strncmp(p->p_comm, sysctl
  - id: macos-kextstat-comm-compare
    desc: macOS kextstat process name compare
    crit: suspicious
    conf: 0.8
    for:
      - c
    if:
      type: text
      substr: strncmp(p->p_comm, kextstat

composite_rules:
  - id: macos-kernel-backdoor
    desc: macOS kernel network trigger backdoor
    crit: suspicious
    conf: 0.95
    attack: T1014
    all:
      - id: macos-ipf-addv4
      - id: macos-kunc-execute
    any:
      - id: macos-icmp-root-exec
      - id: macos-kext-ipf-filter
  - id: macos-sysent-hook-targets
    desc: macOS sysent hook target cluster
    crit: suspicious
    conf: 0.92
    attack: T1014
    all:
      - id: macos-sy-call-hook
    needs: 2
    any:
      - id: macos-sysent-getdirentries64
      - id: macos-sysent-getdirentriesattr
      - id: macos-sysent-write-nocancel
  - id: macos-kernel-symbol-walk
    desc: macOS Mach-O kernel symbol walk
    crit: suspicious
    conf: 0.9
    attack: T1014
    all:
      - id: micro-behaviors/data/format/executable/header::macho-lc-segment64
      - id: micro-behaviors/data/format/executable/header::macho-lc-symtab
    any:
      - id: macos-sy-call-hook
      - id: macos-allproc-ref
      - id: macos-sysent-getdirentries64
      - id: macos-sysent-getdirentriesattr
  - id: macos-smashaslr-idt-walk
    desc: macOS IDT walk to kernel base
    crit: suspicious
    conf: 0.95
    attack: T1068
    all:
      - id: macos-sidt-ref
      - id: micro-behaviors/data/format/executable/header::macho-mh-magic64
  - id: macos-allproc-dkom
    desc: macOS allproc list DKOM hiding
    crit: suspicious
    conf: 0.95
    attack: T1014
    all:
      - id: macos-allproc-ref
      - id: macos-list-remove-p-list
  - id: macos-console-output-scrub
    desc: macOS console output scrubbing hook
    crit: suspicious
    conf: 0.9
    attack: T1014
    all:
      - id: macos-kext-write-nocancel-hook
      - id: macos-kextstat-ref
      - id: micro-behaviors/os/network/status::netstat
  - id: macos-tool-blindness-scrub
    desc: macOS tool output blindness hook
    crit: suspicious
    conf: 0.93
    attack: T1014
    all:
      - id: macos-kext-write-nocancel-hook
    needs: 2
    any:
      - id: macos-grep-comm-compare
      - id: macos-sysctl-comm-compare
      - id: macos-kextstat-comm-compare
  - id: macos-user-hiding-scrub
    desc: macOS who and w output scrubbing
    crit: suspicious
    conf: 0.9
    attack: T1014
    all:
      - id: macos-kext-write-nocancel-hook
      - id: macos-who-ref
      - id: macos-w-strncmp
  - id: macos-icmp-root-exec
    desc: macOS ICMP triggered root execution
    crit: suspicious
    conf: 0.95
    attack: T1059
    all:
      - id: micro-behaviors/communications/ip/services::ipproto-icmp
      - id: macos-open-app-as-root
      - id: macos-open-application-path
  - id: macos-icmp-magic-trigger
    desc: macOS magic ICMP trigger tuple
    crit: suspicious
    conf: 0.94
    attack: T1014
    all:
      - id: micro-behaviors/communications/ip/services::ipproto-icmp
      - id: macos-magic-icmp-code-255
      - id: macos-magic-icmp-type-zero
  - id: macos-kernel-hide-combo
    desc: macOS rootkit hiding technique cluster
    crit: suspicious
    conf: 0.95
    attack: T1014
    needs: 2
    any:
      - id: macos-allproc-dkom
      - id: macos-kext-getdirentries-hook
      - id: macos-kext-write-nocancel-hook
      - id: macos-console-output-scrub
      - id: macos-tool-blindness-scrub
      - id: macos-user-hiding-scrub
  - id: macos-sysctl-debug-cluster
    desc: macOS sysctl debug control cluster
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: objectives/evasion/kernel-hide/control::macos-sysctl-handle-string
      - id: objectives/evasion/kernel-hide/control::macos-sysctl-register-oid
      - id: objectives/evasion/kernel-hide/debug
  - id: macos-kernel-control-plane
    desc: macOS rootkit sysctl control plane
    crit: suspicious
    conf: 0.9
    attack: T1014
    all:
      - id: objectives/evasion/kernel-hide/control::macos-sysctl-proc-anybody
      - id: macos-sysctl-debug-cluster
      - id: micro-behaviors/os/sysinfo/config::sysctl
  - id: macos-kernel-symbol-resolution
    desc: macOS dynamic kernel symbol resolution
    crit: suspicious
    conf: 0.95
    attack: T1014
    all:
      - id: macos-kernel-symbol-walk
      - id: macos-smashaslr-idt-walk
  - id: macos-kernel-symbol-obfuscation
    desc: macOS obfuscated kernel symbol resolution
    crit: suspicious
    conf: 0.94
    attack: T1027
    all:
      - id: macos-kernel-symbol-resolution
      - id: micro-behaviors/data/encode/xor::cyclic-xor-string-decrypt
  - id: rubilyn-support
    desc: macOS advanced rootkit behavior support
    crit: suspicious
    conf: 0.94
    any:
      - id: macos-kernel-backdoor
      - id: macos-sysent-hook-targets
      - id: macos-kernel-symbol-resolution
      - id: macos-kernel-symbol-obfuscation
