defaults:
  platforms: [unix, windows]
# Rootkit Controller Detection
# Detects CLI tools designed to control kernel-mode rootkits
# ATT&CK: T1014 (Rootkit), T1068 (Privilege Escalation)
composite_rules:
  - id: cli-controller
    desc: Rootkit control interface with privilege escalation
    crit: hostile
    conf: 0.95
    attack: "T1014"
    all:
      - id: micro-behaviors/fs/device/ioctl::ioctl
      - id: rootkit-hiding-ops
      - id: privilege-ops
  - id: rootkit-hiding-ops
    desc: Rootkit hiding operations
    crit: notable
    conf: 0.8
    any:
      - id: objectives/evasion/process/hidden/message::hide-pid-msg
      - id: objectives/evasion/process/hidden/network::hide-port-msg
      - id: objectives/evasion/file-hiding::hide-file-msg
  - id: privilege-ops
    desc: Rootkit privilege operations
    crit: notable
    conf: 0.8
    any:
      - id: objectives/privilege-escalation/exploit::root-shell-msg
      - id: objectives/privilege-escalation/exploit::root-privileges-msg
  - id: generic-hider
    desc: Generic hiding tool (potential rootkit)
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/fs/device/ioctl::ioctl
      - id: rootkit-hiding-ops
