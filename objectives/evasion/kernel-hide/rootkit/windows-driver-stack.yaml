defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1014"

traits:
  - id: minifilter-altitude-keys
    desc: Minifilter altitude registry keys
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'Instances\\[^\\]{1,80}\\(DefaultInstance|Altitude)\b'
    not:
      - regex: \b(vulnerability|package|installer|chocolatey)\b
  - id: services-driver-registry-path
    desc: Driver services registry path
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: CurrentControlSet\\Services\\
    unless:
      - id: metadata/package::bitdefender-ctc-module
  - id: protectmode-control
    desc: Driver protect mode controls
    crit: suspicious
    conf: 0.98
    count_min: 3
    if:
      type: text
      regex: \b(ProtectMode::\w+|AddSelfDriverProtectReg)\b
  - id: mutualrevive-control
    desc: Driver mutual revive controls
    crit: suspicious
    conf: 0.99
    count_min: 5
    if:
      type: text
      regex: \bMutualRevive::[A-Za-z]+\b
  - id: vulnerable-driver-device
    desc: Vulnerable driver device access
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: \b(RTCore64|DBUtil_2_3|DefaultRTCoreConfig|DefaultDBUtilConfig)\b
  - id: kernel-read-write-controller
    desc: Kernel read write controller
    crit: component
    conf: 0.96
    if:
      type: text
      regex: \b(NewKernelRW|KernelRW|GetDeviceHandle|virtualToPhysical|PhysicalAddress)\b
  - id: kernel-trace-cleanup-markers
    desc: Kernel driver trace cleanup
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: \b(PiDDBCache|MmUnloadedDrivers)\b
  - id: kernel-callback-removal-symbols
    desc: Kernel callback removal symbols
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: \b(RemoveCallbacksByDriver|EnumerateProcessCallbacks|CallbackRemover)\b
  - id: prefetcher-disable-marker
    desc: Prefetcher disable marker
    crit: suspicious
    conf: 0.94
    for: [pe, c, cpp]
    if:
      type: text
      regex: \b(PrefetchParameters|EnablePrefetcher)\b
    unless:
      - id: ms-xp-defrag-host
      - id: metadata/signed/platform::microsoft
  - id: defrag-pdb-path
    desc: Defrag.pdb debug path marker
    crit: component
    conf: 0.95
    if:
      type: text
      word: Defrag.pdb
  - id: xpsprtm-build-path
    desc: Windows XP SP-RTM source-tree path
    crit: component
    conf: 0.99
    if:
      type: text
      substr: 'xpsprtm\base\fs\utils\dfrg'
  - id: executable-read-patch-markers
    desc: Executable read patch markers
    crit: component
    conf: 0.94
    for: [pe, c, cpp]
    count_min: 2
    if:
      type: text
      regex: \b(IRP_MJ_READ|IRP_MJ_CREATE|explorer\.exe|\.EXE|IMAGE_DOS_SIGNATURE|IMAGE_NT_SIGNATURE|NumberOfSections)\b

composite_rules:
  - id: ms-xp-defrag-host
    desc: Microsoft XP defrag.exe host fingerprint
    crit: component
    conf: 0.99
    all:
      - id: defrag-pdb-path
      - id: xpsprtm-build-path
  - id: minifilter-network-rootkit-driver
    desc: Kernel minifilter network rootkit
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/os/kernel/callback::rootkit-callback-triad
      - id: micro-behaviors/os/kernel/callback::filesystem-minifilter-control
      - id: micro-behaviors/communications/socket/init::kernel-wsk-network-stack
      - id: micro-behaviors/os/kernel/device::userland-device-bridge
    any:
      - id: minifilter-altitude-keys
      - id: protectmode-control
      - id: mutualrevive-control
      - id: metadata/binary/section/metrics::tkd0-exec-section
    needs: 1
  - id: self-reviving-rootkit-driver
    desc: Self reviving protected rootkit driver
    crit: hostile
    conf: 0.99
    all:
      - id: protectmode-control
      - id: mutualrevive-control
      - id: micro-behaviors/os/registry/hive::create-registry-key
      - id: micro-behaviors/os/registry/hive::set-registry-value
    any:
      - id: minifilter-altitude-keys
      - id: services-driver-registry-path
      - id: micro-behaviors/os/kernel/device::userland-device-bridge
    needs: 1
  - id: vulnerable-driver-kernel-tampering
    desc: Vulnerable driver kernel tampering
    crit: hostile
    conf: 0.98
    all:
      - id: vulnerable-driver-device
      - id: kernel-read-write-controller
    any:
      - id: kernel-trace-cleanup-markers
      - id: kernel-callback-removal-symbols
    needs: 1
  - id: filesystem-executable-read-patcher
    desc: Filesystem executable read patcher
    crit: hostile
    conf: 0.99
    for: [pe, c, cpp]
    all:
      - id: micro-behaviors/os/kernel/callback::filesystem-minifilter-control
      - id: micro-behaviors/os/kernel/device::filesystem-filter-device
      - id: executable-read-patch-markers
    any:
      - id: prefetcher-disable-marker
      - id: services-driver-registry-path
      - id: micro-behaviors/os/kernel/device::filesystem-irp-major-functions
    needs: 1
