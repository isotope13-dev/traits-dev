defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1014"

traits:
- id: minifilter-altitude-keys
  desc: Minifilter altitude registry keys
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'Instances\\[^\\]{1,80}\\(DefaultInstance|Altitude)\b'
  not:
  - regex: \bvulnerability\b
  - regex: \bpackage\b
  - regex: \binstaller\b
  - regex: \bchocolatey\b
- id: services-driver-registry-path
  desc: Driver services registry path
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: CurrentControlSet\\Services\\
  unless:
  - id: metadata/package/manifest/vendor::bitdefender-ctc-module
- id: protectmode-control
  desc: Driver protect mode controls
  crit: suspicious
  conf: 0.98
  count_min: 3
  if:
    type: text
    regex: \b(ProtectMode::\w+|AddSelfDriverProtectReg)\b
- id: mutualrevive-control
  desc: Driver mutual revive controls
  crit: suspicious
  conf: 0.99
  count_min: 5
  if:
    type: text
    regex: \bMutualRevive::[A-Za-z]+\b
- id: kernel-read-write-controller--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: \b(NewKernelRW|KernelRW)\b
  count_max: 1030984
- id: kernel-read-write-controller--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: \b(GetDeviceHandle|virtualToPhysical)\b
  count_max: 1030985
- id: kernel-read-write-controller--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: \b(PhysicalAddress)\b
  count_max: 1030986
- id: prefetcher-disable-marker--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [pe, c, cpp]
  if:
    type: text
    regex: \bPrefetchParameters.{0,200}\bEnablePrefetcher
  count_max: 1030989
- id: prefetcher-disable-marker--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [pe, c, cpp]
  if:
    type: text
    regex: \bEnablePrefetcher.{0,200}\bPrefetchParameters
  count_max: 1030990
- id: defrag-pdb-path
  desc: Defrag.pdb debug path marker
  crit: component
  conf: 0.95
  if:
    type: text
    word: Defrag.pdb
- id: xpsprtm-build-path
  desc: Windows XP SP-RTM source-tree path
  crit: component
  conf: 0.99
  if:
    type: text
    substr: 'xpsprtm\base\fs\utils\dfrg'
- id: executable-read-patch-markers--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [pe, c, cpp]
  count_min: 2
  if:
    type: text
    regex: \b(IRP_MJ_READ|IRP_MJ_CREATE)\b

  count_max: 1030993
- id: executable-read-patch-markers--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [pe, c, cpp]
  count_min: 2
  if:
    type: text
    regex: \b(explorer\.exe|\.EXE)\b

  count_max: 1030994
- id: executable-read-patch-markers--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [pe, c, cpp]
  count_min: 2
  if:
    type: text
    regex: \b(IMAGE_DOS_SIGNATURE|IMAGE_NT_SIGNATURE)\b

  count_max: 1030995
- id: executable-read-patch-markers--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [pe, c, cpp]
  count_min: 2
  if:
    type: text
    regex: \b(NumberOfSections)\b

  count_max: 1030996
- id: vulnerable-driver-device--rtcore64
  desc: Vulnerable driver device access (RTCore64)
  crit: suspicious
  conf: 0.96
  if:
    type: text
    word: RTCore64
- id: vulnerable-driver-device--dbutil-2-3
  desc: Vulnerable driver device access (DBUtil_2_3)
  crit: suspicious
  conf: 0.96
  if:
    type: text
    word: DBUtil_2_3
- id: vulnerable-driver-device--defaultrtcoreconfig
  desc: Vulnerable driver device (DefaultRTCoreConfig)
  crit: suspicious
  conf: 0.96
  if:
    type: text
    word: DefaultRTCoreConfig
- id: vulnerable-driver-device--defaultdbutilconfig
  desc: Vulnerable driver device (DefaultDBUtilConfig)
  crit: suspicious
  conf: 0.96
  if:
    type: text
    word: DefaultDBUtilConfig
- id: kernel-trace-cleanup-markers--piddbcache
  desc: Kernel driver trace cleanup (PiDDBCache)
  crit: suspicious
  conf: 0.97
  if:
    type: text
    word: PiDDBCache
- id: kernel-trace-cleanup-markers--mmunloadeddrivers
  desc: Kernel driver trace cleanup (MmUnloadedDrivers)
  crit: suspicious
  conf: 0.97
  if:
    type: text
    word: MmUnloadedDrivers
- id: kernel-callback-removal-symbols--removecallbacksbydriver
  desc: Kernel callback (RemoveCallbacksByDriver)
  crit: suspicious
  conf: 0.96
  if:
    type: text
    word: RemoveCallbacksByDriver
- id: kernel-callback-removal-symbols--enumerateprocesscallbacks
  desc: Kernel callback (EnumerateProcessCallbacks)
  crit: suspicious
  conf: 0.96
  if:
    type: text
    word: EnumerateProcessCallbacks
- id: kernel-callback-removal-symbols--callbackremover
  desc: Kernel callback removal (CallbackRemover)
  crit: suspicious
  conf: 0.96
  if:
    type: text
    word: CallbackRemover
composite_rules:
- id: vulnerable-driver-device
  desc: Vulnerable driver device access
  crit: suspicious
  conf: 0.96
  any:
  - id: vulnerable-driver-device--rtcore64
  - id: vulnerable-driver-device--dbutil-2-3
  - id: vulnerable-driver-device--defaultrtcoreconfig
  - id: vulnerable-driver-device--defaultdbutilconfig
- id: kernel-trace-cleanup-markers
  desc: Kernel driver trace cleanup
  crit: suspicious
  conf: 0.97
  any:
  - id: kernel-trace-cleanup-markers--piddbcache
  - id: kernel-trace-cleanup-markers--mmunloadeddrivers
- id: kernel-callback-removal-symbols
  desc: Kernel callback removal symbols
  crit: suspicious
  conf: 0.96
  any:
  - id: kernel-callback-removal-symbols--removecallbacksbydriver
  - id: kernel-callback-removal-symbols--enumerateprocesscallbacks
  - id: kernel-callback-removal-symbols--callbackremover
- id: ms-xp-defrag-host
  desc: Microsoft XP defrag.exe host fingerprint
  crit: component
  conf: 0.99
  all:
  - id: defrag-pdb-path
  - id: xpsprtm-build-path
- id: minifilter-network-rootkit-driver
  desc: Kernel minifilter network rootkit
  crit: hostile
  conf: 0.99
  all:
  - id: micro-behaviors/os/kernel/callback::rootkit-callback-triad
  - id: micro-behaviors/os/kernel/callback::filesystem-minifilter-control
  - id: micro-behaviors/communications/socket/init::kernel-wsk-network-stack
  - id: micro-behaviors/os/kernel/device::userland-device-bridge
  any:
  - id: minifilter-altitude-keys
  - id: protectmode-control
  - id: mutualrevive-control
  - id: metadata/binary/section/metrics::tkd0-exec-section
- id: self-reviving-rootkit-driver
  desc: Self reviving protected rootkit driver
  crit: hostile
  conf: 0.99
  all:
  - id: protectmode-control
  - id: mutualrevive-control
  - id: micro-behaviors/os/registry/hive::create-registry-key
  - id: micro-behaviors/os/registry/hive::set-registry-value
  any:
  - id: minifilter-altitude-keys
  - id: services-driver-registry-path
  - id: micro-behaviors/os/kernel/device::userland-device-bridge
- id: vulnerable-driver-kernel-tampering
  desc: Vulnerable driver kernel tampering
  crit: hostile
  conf: 0.98
  all:
  - id: vulnerable-driver-device
  - id: kernel-read-write-controller
  any:
  - id: kernel-trace-cleanup-markers
  - id: kernel-callback-removal-symbols
- id: filesystem-executable-read-patcher
  desc: Filesystem executable read patcher
  crit: hostile
  conf: 0.99
  for: [pe, c, cpp]
  all:
  - id: micro-behaviors/os/kernel/callback::filesystem-minifilter-control
  - id: micro-behaviors/os/kernel/device::filesystem-filter-device
  - id: executable-read-patch-markers
  any:
  - id: prefetcher-disable-marker
  - id: services-driver-registry-path
  - id: micro-behaviors/os/kernel/device::filesystem-irp-major-functions
- id: kernel-read-write-controller
  desc: Kernel read write controller
  crit: component
  conf: 0.96
  any:
  - id: kernel-read-write-controller--rx-1
  - id: kernel-read-write-controller--rx-2
  - id: kernel-read-write-controller--rx-3
- id: prefetcher-disable-marker
  desc: Prefetcher disable marker
  crit: suspicious
  conf: 0.94
  for: [pe, c, cpp]
  any:
  - id: prefetcher-disable-marker--rx-4
  - id: prefetcher-disable-marker--rx-5
  unless:
  - id: objectives/evasion/kernel-hide/rootkit/
  - id: metadata/signed/platform/
- id: executable-read-patch-markers
  desc: Executable read patch markers
  crit: component
  conf: 0.94
  for: [pe, c, cpp]
  any:
  - id: executable-read-patch-markers--rx-6
  - id: executable-read-patch-markers--rx-7
  - id: executable-read-patch-markers--rx-8
  - id: executable-read-patch-markers--rx-9
