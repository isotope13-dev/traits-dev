defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1014"

traits:
  - id: minifilter-altitude-keys
    desc: Minifilter altitude registry keys
    crit: suspicious
    conf: 0.96
    count_min: 2
    if:
      type: text
      regex: \b(DefaultInstance|Instances|Altitude)\b
    not:
      - regex: \b(vulnerability|package|installer|chocolatey)\b
  - id: services-driver-registry-path
    desc: Driver services registry path
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: CurrentControlSet\\Services\\
  - id: protectmode-control
    desc: Driver protect mode controls
    crit: suspicious
    conf: 0.98
    count_min: 3
    if:
      type: text
      regex: \b(ProtectMode::\w+|AddSelfDriverProtectReg)\b
  - id: mutualrevive-control
    desc: Driver mutual revive controls
    crit: suspicious
    conf: 0.99
    count_min: 5
    if:
      type: text
      regex: \bMutualRevive::[A-Za-z]+\b

composite_rules:
  - id: minifilter-network-rootkit-driver
    desc: Kernel minifilter network rootkit
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/os/kernel/callback::rootkit-callback-triad
      - id: micro-behaviors/os/kernel/callback::filesystem-minifilter-control
      - id: micro-behaviors/communications/socket/init::kernel-wsk-network-stack
      - id: micro-behaviors/os/kernel/device::userland-device-bridge
    any:
      - id: minifilter-altitude-keys
      - id: protectmode-control
      - id: mutualrevive-control
      - id: metadata/binary/section/metrics::tkd0-exec-section
    needs: 1
  - id: self-reviving-rootkit-driver
    desc: Self reviving protected rootkit driver
    crit: hostile
    conf: 0.99
    all:
      - id: protectmode-control
      - id: mutualrevive-control
      - id: micro-behaviors/os/registry/hive::create-registry-key
      - id: micro-behaviors/os/registry/hive::set-registry-value
    any:
      - id: minifilter-altitude-keys
      - id: services-driver-registry-path
      - id: micro-behaviors/os/kernel/device::userland-device-bridge
    needs: 1
