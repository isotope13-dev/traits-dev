defaults:
  attack: "T1014"
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: hideme-ioctl
    desc: Rootkit HIDEME IOCTL code
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: "IOCTL_ROOTKIT_HIDEME"
  - id: hideme-dispatch
    desc: HIDEME IOCTL dispatch case
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "case IOCTL_ROOTKIT_HIDEME:"
  - id: hideme-controller
    desc: HideMe controller routine
    crit: suspicious
    conf: 0.94
    if:
      type: text
      word: "HideMe"
  - id: eprocess-layout
    desc: EPROCESS hiding structure access
    crit: suspicious
    conf: 0.94
    if:
      type: text
      word: "EPROCESS"
  - id: dkom-offset-triplet
    desc: DKOM EPROCESS offset triplet
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'OFFSET_PID[\s\S]{0,160}OFFSET_FLINK[\s\S]{0,80}OFFSET_BLINK'
  - id: dkom-active-process-unlink
    desc: Active process list unlinked
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '->Blink->Flink\s*=|->Flink->Blink\s*='
  - id: get-eprocess-routine
    desc: EPROCESS lookup routine
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      regex: GetEPROCESS
  - id: hide-process-routine
    desc: HideProcess routine
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      regex: HideProcess
composite_rules:
  - id: windows-process-hiding-rootkit
    desc: Windows process-hiding rootkit control
    crit: hostile
    conf: 0.99
    all:
      - id: hideme-ioctl
      - id: hideme-dispatch
    any:
      - id: hideme-controller
      - id: eprocess-layout
  - id: windows-dkom-active-process-unlink
    desc: Windows DKOM process unlinking rootkit
    crit: hostile
    conf: 0.97
    all:
      - id: dkom-active-process-unlink
      - id: get-eprocess-routine
    any:
      - id: dkom-offset-triplet
      - id: eprocess-layout
      - id: hide-process-routine
