defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: idr-pid-hiding
    desc: PID hiding by directly manipulating the pid_namespace IDR tree
    crit: hostile
    conf: 1.0
    all:
      - id: micro-behaviors/process/pid/lookup::idr-replace
      - id: micro-behaviors/process/pid/lookup::proc-pid-ns
  - id: procfs-seq-ops-hooking
    desc: Hooking seq_ops or proc_ops directly via proc_dir_entry to hide connections/files
    crit: hostile
    conf: 1.0
    any:
      - id: micro-behaviors/fs/proc/system::proc-dir-entry-seq-ops
      - id: micro-behaviors/fs/proc/system::proc-dir-entry-proc-ops
  - id: lkm-rootkit-core
    desc: Core LKM rootkit behaviors (WP bypass, instruction decoder, inline hooking)
    crit: hostile
    conf: 1.0
    all:
      - id: objectives/evasion/kernel-hide/wp-bypass::kernel-wp-bypass
      - id: objectives/evasion/kernel-hide/hook::lkm-instruction-decoder
