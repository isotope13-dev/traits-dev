defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1014"
traits:
- id: spa0-unpacker-section
  desc: Custom .spa0 unpacker section
  crit: suspicious
  conf: 0.97
  if:
    type: section
    exact: ".spa0"
    executable: true
- id: spa1-rwx-payload-section
  desc: High entropy RWX .spa1 payload
  crit: suspicious
  conf: 0.99
  if:
    type: section
    exact: ".spa1"
    writable: true
    executable: true
    entropy_min: 7.3
    length_min: 500000
composite_rules:
- id: packed-driver-layout
  desc: Packed driver custom section layout
  crit: suspicious
  conf: 0.99
  all:
  - id: spa0-unpacker-section
  - id: spa1-rwx-payload-section
  any:
  - id: objectives/anti-static/obfuscation/payload/section::empty-text-section
  - id: objectives/anti-static/obfuscation/payload/section::tiny-text-section
- id: packed-driver-payload-container
  desc: Packed driver with embedded payloads
  crit: suspicious
  conf: 0.98
  all:
  - id: packed-driver-layout
  - id: micro-behaviors/data/embedded/payload/header::pe-magic-embedded-multiple
- id: packed-kernel-rootkit-driver
  desc: Packed kernel rootkit driver pattern
  crit: suspicious
  conf: 0.99
  all:
  - id: packed-driver-layout
  - id: micro-behaviors/os/kernel/callback::rootkit-callback-triad
  - id: micro-behaviors/os/kernel/routines::dynamic-resolution
  any:
  - id: micro-behaviors/process/inject/apc::kernel-apc-injection-primitives
  - id: micro-behaviors/process/attach/address-space::cross-process-address-space-attach
  - id: micro-behaviors/os/registry/hive::registry-hive-load-unload
  - id: micro-behaviors/os/kernel/device::kernel-device-control
