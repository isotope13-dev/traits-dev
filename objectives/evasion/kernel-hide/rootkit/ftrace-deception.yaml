defaults:
  platforms: [windows, unix]
  for: [c, elf]
traits:
  - id: singularity-lower
    desc: singularity keyword (lowercase)
    crit: notable
    conf: 0.7
    if:
      type: text
      word: singularity
  - id: singularity-title
    desc: Singularity keyword (title case)
    crit: notable
    conf: 0.7
    if:
      type: text
      word: Singularity
  - id: singularity-upper
    desc: SINGULARITY keyword (uppercase)
    crit: notable
    conf: 0.7
    if:
      type: text
      word: SINGULARITY
  - id: ftrace-lower
    desc: ftrace keyword (lowercase)
    crit: notable
    conf: 0.7
    if:
      type: text
      word: ftrace
  - id: ftrace-title
    desc: Ftrace keyword (title case)
    crit: notable
    conf: 0.7
    if:
      type: text
      word: Ftrace
  - id: ftrace-upper
    desc: FTRACE keyword (uppercase)
    crit: notable
    conf: 0.7
    if:
      type: text
      word: FTRACE
  - id: taint-lower
    desc: taint keyword (lowercase)
    crit: notable
    conf: 0.6
    size_max: 10485760
    if:
      type: text
      word: taint
  - id: taint-title
    desc: Taint keyword (title case)
    crit: notable
    conf: 0.6
    if:
      type: text
      word: Taint
  - id: taint-upper
    desc: TAINT keyword (uppercase)
    crit: notable
    conf: 0.6
    if:
      type: text
      word: TAINT
  - id: ftrace-enabled
    desc: ftrace_enabled kernel variable
    crit: suspicious
    conf: 0.75
    if:
      type: text
      word: ftrace_enabled
  - id: tracing-on
    desc: tracing_on kernel variable
    crit: suspicious
    conf: 0.75
    if:
      type: text
      word: tracing_on
  - id: saved-ftrace-value
    desc: saved_ftrace_value variable (fake state storage)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      word: saved_ftrace_value
  - id: ftrace-write-intercepted
    desc: ftrace_write_intercepted flag (deception indicator)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      word: ftrace_write_intercepted
composite_rules:
  - id: deception-read-hook
    desc: copy_to_user in read-handler context
    crit: notable
    conf: 0.9
    attack: T1562.001
    all:
      - id: micro-behaviors/os/kernel/routines::copy-to-user
    any:
      - id: objectives/evasion/kernel-hide/module::tcp-seq-funcs
      - id: objectives/evasion/kernel-hide/module::proc-root-readdir
      - id: objectives/evasion/kernel-hide/module::vfs-read
  - id: singularity-keyword
    desc: Singularity keyword (case variants)
    any:
      - id: singularity-lower
      - id: singularity-title
      - id: singularity-upper
    crit: suspicious
  - id: ftrace-keyword
    desc: Ftrace keyword (case variants)
    crit: suspicious
    any:
      - id: ftrace-lower
      - id: ftrace-title
      - id: ftrace-upper
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::video-lib-marker
        - id: micro-behaviors/dylib/library::graphics-lib-marker
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: micro-behaviors/dylib/library::debugger-tool-marker
  - id: taint-keyword
    desc: Taint keyword (case variants)
    any:
      - id: taint-lower
      - id: taint-title
      - id: taint-upper
    crit: suspicious
  - id: rootkit-keywords
    desc: Rootkit-related keywords
    crit: suspicious
    any:
      - id: singularity-keyword
      - id: ftrace-keyword
      - id: taint-keyword
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::video-lib-marker
        - id: micro-behaviors/dylib/library::graphics-lib-marker
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: micro-behaviors/dylib/library::debugger-tool-marker
  - id: ftrace-state-vars
    desc: Ftrace state variables
    any:
      - id: ftrace-enabled
      - id: tracing-on
    crit: suspicious
  - id: fake-state-vars
    desc: Fake state storage variables
    any:
      - id: saved-ftrace-value
      - id: ftrace-write-intercepted
    crit: suspicious
  - id: fake-state-logic
    desc: Divergent logic where READ returns
    crit: suspicious
    conf: 0.9
    attack: T1562.001
    all:
      - id: ftrace-state-vars
      - id: fake-state-vars
  - id: fake-state-deception
    desc: Fake state deception detected
    crit: suspicious
    conf: 0.95
    attack: T1562.001
    needs: 2
    any:
      - id: fake-state-logic
      - id: deception-read-hook
