defaults:
  platforms: [unix, windows]
traits:
  - id: wdf-version-bind-symbol
    desc: WdfVersionBind WDF driver symbol
    crit: notable
    for: [pe]
    if:
      type: symbol
      exact: WdfVersionBind
  - id: bugcheck-callback-symbol
    desc: KeRegisterBugCheckReasonCallback kernel symbol
    crit: notable
    for: [pe]
    if:
      type: symbol
      exact: KeRegisterBugCheckReasonCallback
composite_rules:
  - id: native-cross-process-memory-driver
    desc: Native driver exposes cross-process memory tampering primitives
    crit: suspicious
    conf: 0.99
    for: [pe]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/kernel/module::native-kernel-api-context
      - id: micro-behaviors/mem/read/cross-process::kernel-cross-process-memory-copy
      - id: micro-behaviors/process/attach/address-space::attach-process-address-space
      - id: micro-behaviors/process/attach/address-space::detach-process-address-space
      - id: micro-behaviors/process/attach/address-space::lookup-process-by-id
      - id: micro-behaviors/os/kernel/device::create-device-object
      - id: micro-behaviors/os/kernel/device::create-device-symbolic-link
      - id: micro-behaviors/os/kernel/routines::dynamic-resolution
  - id: hidden-kernel-memory-tamper-driver
    desc: Hidden kernel memory tamper driver
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/kernel/module::windows-kernel-driver
      - id: objectives/anti-static/obfuscation/string/encoding::xoradd-kernel-api-string-table
      - id: micro-behaviors/os/kernel/routines::dynamic-resolution
    needs: 2
    any:
      - id: micro-behaviors/mem/read/cross-process::kernel-cross-process-memory-copy
      - id: micro-behaviors/mem/protect/modify::kernel-virtual-memory-protect
      - id: micro-behaviors/mem/query/virtual::zw-query-virtual-memory-xoradd-string
      - id: micro-behaviors/process/attach/address-space::hidden-process-object-access
  - id: userland-controlled-memory-tamper-driver
    desc: Userland controlled memory tamper driver
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/kernel/module::windows-kernel-driver
      - id: micro-behaviors/os/kernel/device::hidden-kernel-device-control
    needs: 2
    any:
      - id: micro-behaviors/mem/read/cross-process::kernel-cross-process-memory-copy
      - id: micro-behaviors/mem/protect/modify::kernel-virtual-memory-protect
      - id: micro-behaviors/process/attach/address-space::hidden-process-object-access
  - id: virtual-input-memory-tamper-driver
    desc: Virtual input memory tamper driver
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/hardware/input/virtual::virtual-keyboard-mouse-driver
      - id: objectives/anti-static/obfuscation/string/encoding::xoradd-kernel-api-string-table
    any:
      - id: micro-behaviors/mem/read/cross-process::kernel-cross-process-memory-copy
      - id: micro-behaviors/mem/protect/modify::kernel-virtual-memory-protect
  - id: hidden-kernel-process-query-driver
    desc: Hidden kernel process query driver
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/kernel/module::windows-kernel-driver
      - id: objectives/anti-static/obfuscation/string/encoding::xoradd-kernel-api-string-table
      - id: micro-behaviors/process/attach/address-space::hidden-process-object-access
      - id: micro-behaviors/mem/query/virtual::zw-query-virtual-memory-xoradd-string
  - id: virtual-input-hidden-process-driver
    desc: Virtual input hidden process driver
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/hardware/input/virtual::virtual-keyboard-mouse-driver
      - id: objectives/anti-static/obfuscation/string/encoding::xoradd-kernel-api-string-table
      - id: micro-behaviors/process/attach/address-space::hidden-process-object-access
  - id: hidden-io-space-process-driver
    desc: Hidden IO space process driver
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/kernel/module::windows-kernel-driver
      - id: micro-behaviors/process/attach/address-space::hidden-process-object-access
      - id: micro-behaviors/mem/protect/modify::mm-unmap-io-space-xoradd-string
    any:
      - id: objectives/anti-static/obfuscation/string/encoding::xoradd-kernel-api-string-table
      - id: micro-behaviors/os/kernel/routines::dynamic-resolution
  - id: driver-hidden-api
    desc: Kernel driver hides critical APIs using encoding
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/kernel/routines::dynamic-resolution
    any:
      - id: objectives/evasion/kernel-hide/micro/exec::thread-manipulation-enc
      - id: objectives/evasion/kernel-hide/micro/mem
    needs: 2
  - id: driver-suspicious-path
    desc: Kernel driver references suspicious System32 binary
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/fs/path/system::system32-bin
      - id: micro-behaviors/os/kernel/routines::dynamic-resolution
    unless:
      - id: wdf-version-bind-symbol
      - id: bugcheck-callback-symbol
  - id: atbash-userland-memory-tamper-driver
    desc: Userland-controlled Atbash memory tamper driver
    crit: hostile
    conf: 0.99
    for: [pe]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/kernel/module::windows-kernel-driver
      - id: micro-behaviors/os/kernel/device::atbash-kernel-device-control
      - id: micro-behaviors/process/attach/address-space::atbash-process-object-access
    any:
      - id: micro-behaviors/mem/read/cross-process::kernel-cross-process-memory-copy
      - id: micro-behaviors/mem/protect/modify::kernel-virtual-memory-protect
      - id: micro-behaviors/mem/protect/modify::kernel-io-space-mapping
    needs: 1
  - id: atbash-obfuscated-kernel-memory-driver
    desc: Atbash-obfuscated kernel memory access driver
    crit: hostile
    conf: 0.99
    for: [pe]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/kernel/module::windows-kernel-driver
      - id: objectives/anti-static/obfuscation/string/encoding::atbash-kernel-api-string-table
      - id: micro-behaviors/os/kernel/device::atbash-kernel-device-control
    any:
      - id: micro-behaviors/mem/read/cross-process::kernel-cross-process-memory-copy
      - id: micro-behaviors/mem/protect/modify::kernel-virtual-memory-protect
      - id: micro-behaviors/mem/protect/modify::kernel-io-space-mapping
    needs: 1
