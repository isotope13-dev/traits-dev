defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: ksymless-trampoline-stager
    desc: "x86-64 trampoline hook stager"
    crit: suspicious
    conf: 1.0
    if:
      type: text
      regex: H\xb8\x00\x00\x00\x00\x00\x00\x00\x00P\xc3
  - id: ksymless-find-address-up
    desc: Stack walking heuristic to find x64_sys_call
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: find_address_up
composite_rules:
  - id: ksymless-rootkit
    desc: ksymless kernel rootkit signature
    crit: hostile
    conf: 1.0
    all:
      - id: ksymless-trampoline-stager
      - id: ksymless-find-address-up
    any:
      - id: objectives/evasion/kernel-hide/rootkit::idr-pid-hiding
      - id: objectives/evasion/kernel-hide/rootkit::procfs-seq-ops-hooking
