defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: mem-protect-enc
    desc: Hidden (encoded) memory protection API
    crit: suspicious
    if:
      type: encoded
      exact: NtProtectVirtualMemory
  - id: pe-header-enc
    desc: Hidden (encoded) PE header parsing API
    crit: suspicious
    if:
      type: encoded
      exact: RtlImageNtHeader
    unless:
      - type: text
        substr: VLFindUmDll
  - id: pe-data-enc
    desc: Hidden (encoded) PE directory parsing API
    crit: suspicious
    if:
      type: encoded
      exact: RtlImageDirectoryEntryToData
