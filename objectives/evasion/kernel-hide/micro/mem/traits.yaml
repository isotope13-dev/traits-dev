defaults:
  platforms:
    - unix
    - windows
  for: [binaries, c, cpp]
traits:
  - id: mem-protect-enc
    desc: Hidden (encoded) memory protection API
    crit: suspicious
    if:
      type: encoded
      exact: NtProtectVirtualMemory
  - id: pe-header-enc
    desc: Hidden (encoded) PE header parsing API
    crit: suspicious
    if:
      type: encoded
      exact: RtlImageNtHeader
    unless:
      - type: text
        substr: VLFindUmDll
      - type: symbol
        exact: WdfVersionBind
      - type: text
        substr: Bitdefender Active Threat Control Filesystem Minifilter
  - id: pe-data-enc
    desc: Hidden (encoded) PE directory parsing API
    crit: suspicious
    if:
      type: encoded
      exact: RtlImageDirectoryEntryToData
    unless:
      - type: symbol
        exact: WdfVersionBind
      - type: text
        substr: Bitdefender Active Threat Control Filesystem Minifilter
