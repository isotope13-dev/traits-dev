defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: thread-manipulation-enc
    for: [powershell, python, javascript, pe, dll, elf]
    desc: Hidden (encoded) thread manipulation API
    crit: suspicious
    if:
      type: encoded
      encoding:
        - base64
        - base64-obf
        - hex
        - xor
        - url
        - unicode-escape
      exact: NtCreateThreadEx
