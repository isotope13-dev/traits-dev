# Kernel Module Hiding Techniques
# ATT&CK: T1014 (Rootkit)
defaults:
  platforms: [windows, unix]
  for: [c]
traits:
  - id: list-del-this-module-regex
    desc: Removing THIS_MODULE from module list (regex)
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    if:
      type: text
      regex: 'list_del\s*\(\s*&\s*THIS_MODULE\s*->\s*list\s*\)'
  - id: list-del-this-module-exact
    desc: Removing THIS_MODULE from module list (exact)
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    if:
      type: text
      exact: "list_del(&THIS_MODULE->list)"
  - id: task-flags-10000000
    desc: Process hiding via task flags (Diamorphine)
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    if:
      type: text
      regex: 'task\s*->\s*flags\s*(\^|&|\|)?=\s*0x10000000'
composite_rules:
  - id: list-del-this-module
    desc: Removing THIS_MODULE from module list (hiding)
    crit: suspicious
    conf: 0.95
    any:
      - id: list-del-this-module-regex
      - id: list-del-this-module-exact
