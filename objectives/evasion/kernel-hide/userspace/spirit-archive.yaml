defaults:
  attack: T1014
  mbc: B0003
  for: [scripts, binaries]
  platforms:
    - unix
traits:
  - id: staged-fkit-library
    desc: Spirit fkit library staged
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '[#"]?spirit/tar/usr/local/lib/fkit(arm)?\.so$'
  - id: staged-pkit-library
    desc: Spirit pkit library staged
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '#?spirit/tar/usr/local/lib/pkit(arm)?\.so$'
  - id: staged-skit-library
    desc: Spirit skit library staged
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '#?spirit/tar/usr/local/lib/skit(arm)?\.so$'
  - id: staged-sshkit-library
    desc: Spirit sshkit library staged
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '["%]?spirit/tar/usr/local/lib/sshkit(arm)?\.so$'
  - id: staged-sshpkit-library
    desc: Spirit sshpkit library staged
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '[#&]?spirit/tar/usr/local/lib/sshpkit(arm)?\.so$'
  - id: staged-spirit-libdir
    desc: Spirit local lib staging path
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: spirit/tar/usr/local/lib
composite_rules:
  - id: spirit-userspace-rootkit-bundle
    desc: Spirit userspace rootkit payload bundle
    crit: hostile
    conf: 0.98
    all:
      - id: staged-fkit-library
      - id: staged-pkit-library
      - id: staged-skit-library
      - id: staged-sshkit-library
      - id: staged-sshpkit-library
      - id: staged-spirit-libdir
      - id: metadata/file/magic::rar-v5
