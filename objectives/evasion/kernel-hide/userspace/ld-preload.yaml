defaults:
  platforms: [linux]
  for: [elf, c, shell]
traits:
- id: ld-library-path-env
  desc: References LD_LIBRARY_PATH environment variable
  crit: notable
  conf: 0.6
  if:
    id: micro-behaviors/os/linker/env::ld-library-path
  unless:
  - id: metadata/binary/linking/static::static-linked-heuristic
  - id: metadata/binary/provenance::netbsd-runtime-linker-artifact
  - id: objectives/evasion/hijack-execution-flow/linker::standard-dynamic-linker
  downgrade:
    any:
    - type: basename
      regex: (?i)^Makefile
    - type: basename
      regex: (?i)^configure
    - type: basename
      regex: \.(SH|sh\.in|cmake)$
- id: dlsym-rtld-next-pattern
  desc: dlsym(RTLD_NEXT call string
  crit: component
  conf: 0.8
  for: [elf, c]
  if:
    type: text
    regex: ^dlsym\s*\(\s*RTLD_NEXT\b
- id: skullseclabs-string
  desc: skullseclabs author string
  crit: suspicious
  conf: 0.95
  for:
  - elf
  if:
    type: text
    substr: skullseclabs
- id: hooked-string
  desc: Hooked function indicator
  crit: suspicious
  conf: 0.7
  for:
  - elf
  if:
    type: text
    substr: Hooked
- id: static-string
  desc: Static hook indicator
  crit: suspicious
  conf: 0.5
  for:
  - elf
  unless:
  - id: well-known/tool/development/gnat
  if:
    type: text
    regex: Static:\s+\w+
- id: proc-pid-pattern
  desc: /proc/[pid] path pattern
  crit: suspicious
  conf: 0.4
  for:
  - elf
  - c
  if:
    type: text
    regex: /proc/[0-9]+/(stat|status|cmdline|maps)
- id: hidden-proc-string
  desc: hidden_proc string reference
  crit: suspicious
  conf: 0.9
  for:
  - elf
  - c
  if:
    type: text
    word: hidden_proc
  unless:
  - id: metadata/lang/source::wine-compat-source
  - id: metadata/lang/source::windows-compat-api-source
- id: backup-ld-string
  desc: backup_ld string reference
  crit: suspicious
  conf: 0.9
  for:
  - elf
  if:
    type: text
    word: backup_ld
- id: orig-ld-string
  desc: orig_ld string reference
  crit: suspicious
  conf: 0.9
  for:
  - elf
  if:
    type: text
    word: orig_ld
- id: real-ld-string
  desc: real_ld string reference
  crit: suspicious
  conf: 0.9
  for:
  - elf
  if:
    type: text
    word: real_ld
- id: ld-so-bak-pattern
  desc: ld.so backup file pattern
  crit: suspicious
  conf: 0.9
  for:
  - elf
  if:
    type: text
    regex: ld[\-_\.]so[.\-_]?bak
    case_insensitive: true
- id: backup-ld-so-file
  desc: .backup_ld.so file reference
  crit: suspicious
  conf: 0.9
  for:
  - elf
  if:
    type: text
    substr: .backup_ld.so
- id: ld-so-preload-file
  desc: References ld.so.preload file
  crit: suspicious
  conf: 0.9
  mbc: F0015
  attack: T1574.006
  for:
  - elf
  - shell
  - c
  - cpp
  - rust
  - go
  if:
    type: text
    regex: (^|/etc/)ld\.so\.preload\b
  unless:
  - type: basename
    regex: ^libjvm\.so$
  - id: objectives/evasion/hijack-execution-flow/linker::dynamic-linker-binary
    # libc itself implements the LD_PRELOAD mechanism and references
    # /etc/ld.so.preload by string; that is the loading code, not an
    # attacker writing to the file. Real malicious writes still escalate
    # via composites that pair this trait with chattr/chmod/write ops.
  - id: micro-behaviors/dylib/library/family::system-lib-marker
  - id: well-known/lib/glibc
  - type: raw
    regex: UnveilIfExists
- id: ld-so-preload-chattr
  desc: Removes file attributes from ld.so.preload
  crit: suspicious
  conf: 0.9
  mbc: F0015
  attack: T1574.006
  for:
  - shell
  if:
    type: string_literal
    regex: chattr\s+[-+][ia]+\s+/etc/ld\.so\.preload
- id: original-prefix-a
  desc: original_ prefix core hook set
  crit: component
  conf: 0.7
  for:
  - elf
  if:
    type: text
    regex: original_(open|read|write|execve)
  unless:
  - id: metadata/lang/compiler/generated::f2py-python-extension
- id: original-prefix-b
  desc: original_ prefix network hook set
  crit: component
  conf: 0.7
  for:
  - elf
  if:
    type: text
    regex: \boriginal_(connect|socket|unlink)\b
  unless:
  - id: metadata/lang/compiler/generated::f2py-python-extension
- id: real-prefix-a
  desc: real_ prefix core hook set
  crit: component
  conf: 0.7
  for:
  - elf
  if:
    type: text
    regex: real_(open|read|write|execve)
  unless:
  - id: metadata/lang/compiler/generated::f2py-python-extension
- id: real-prefix-b
  desc: real_ prefix network hook set
  crit: component
  conf: 0.7
  for:
  - elf
  if:
    type: text
    regex: \breal_(connect|socket|unlink)\b
  unless:
  - id: metadata/lang/compiler/generated::f2py-python-extension
- id: old-prefix-a
  desc: old_ prefix core hook set
  crit: component
  conf: 0.7
  for:
  - elf
  - c
  if:
    type: raw
    regex: \bold_(open|read|write|execve)\b
- id: old-prefix-b
  desc: old_ prefix filesystem hook set
  crit: component
  conf: 0.7
  for:
  - elf
  - c
  if:
    type: raw
    regex: \bold_(readdir|unlink|mkdir|rmdir)\b
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: old-prefix-c
  desc: old_ prefix xattr hook set
  crit: component
  conf: 0.7
  for:
  - elf
  - c
  if:
    type: raw
    regex: \bold_(listxattr|getxattr|setxattr)\b
- id: ld-preload-rootkit-installer-hostile
  desc: Hostile LD_PRELOAD rootkit installer
  crit: suspicious
  conf: 0.98
  mbc: F0015
  attack: T1574.006
  for:
  - shell
  if:
    type: text
    regex: 'echo.{0,50}>\s*/etc/ld\.so\.preload'
  unless:
  - id: metadata/package/versioning::version-resource-metadata
- id: ld-so-preload-clear
  desc: Clears /etc/ld.so.preload content
  crit: suspicious
  conf: 0.9
  mbc: F0015
  attack: T1574.006
  for:
  - shell
  if:
    type: string_literal
    regex: (cat\s+/dev/null\s*>|echo\s*>|truncate\s+.{0,50}|>)\s*/etc/ld\.so\.preload
- id: runtime-shared-object-compile--rx-1
  desc: shared-object build command
  crit: component
  conf: 0.94
  for: [c, cpp, rust, go, elf, shell]
  if:
    type: text
    regex: '(?i)\b(gcc|clang|cc)\b[^\n]{0,120}(-shared|\.so\b)'
  count_max: 1031162
- id: runtime-shared-object-compile--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [c, cpp, rust, go, elf, shell]
  if:
    type: text
    substr: fPIC
  count_max: 1031163
- id: preload-rootkit-hook-set--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  for: [c, cpp, elf]
  if:
    type: text
    substr: readdir64
  count_max: 1031164
- id: preload-rootkit-hook-set--rx-5
  desc: libc access hook definition
  crit: component
  conf: 0.92
  for: [c, cpp]
  if:
    type: text
    regex: '(^|\n)\s*(int|static\s+int)\s+access\s*\('
  count_max: 1031166
- id: preload-rootkit-hook-set--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.92
  for: [c, cpp, elf]
  if:
    type: text
    substr: lxstat
  count_max: 1031167
- id: preload-rootkit-hook-set--rx-7
  desc: RTLD_NEXT dlsym hook lookup
  crit: component
  conf: 0.92
  for: [c, cpp, elf]
  if:
    type: text
    regex: '\bdlsym\s*\(\s*RTLD_NEXT\b'
  count_max: 1031168
- id: preload-rootkit-hook-set--rx-9
  desc: libc lstat hook definition
  crit: component
  conf: 0.92
  for: [c, cpp]
  if:
    type: text
    regex: '(^|\n)\s*(int|static\s+int)\s+(__x)?lstat(64)?\s*\('
  count_max: 1031170
- id: preload-rootkit-hook-set--rx-10
  desc: rootkit hide-user constant
  crit: component
  conf: 0.92
  for: [c, cpp, elf]
  if:
    type: text
    regex: '\b(HIDEUID|hide_uid|hidden_uid|magic_uid)\b.{0,80}\b2000\b'
  count_max: 1031171
- id: timestomp-against-system-library--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp, rust, go, elf]
  if:
    type: text
    regex: '(utimensat|utime)[\s\S]{0,600}/(usr/)?lib/(.{0,80}/)?libc\.so(\.\d+)?'
  count_max: 1031172
- id: timestomp-against-system-library--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp, rust, go, elf]
  if:
    type: text
    regex: '(utimes|futimens)[\s\S]{0,600}/(usr/)?lib/(.{0,80}/)?libc\.so(\.\d+)?'
  count_max: 1031173
- id: timestomp-against-system-library--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp, rust, go, elf]
  if:
    type: text
    regex: '/(usr/)?lib/(.{0,80}/)?libc\.so(\.\d+)?[\s\S]{0,600}(utimensat|utime)'
  count_max: 1031174
- id: timestomp-against-system-library--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp, rust, go, elf]
  if:
    type: text
    regex: '/(usr/)?lib/(.{0,80}/)?libc\.so(\.\d+)?[\s\S]{0,600}(utimes|futimens)'
  count_max: 1031175
composite_rules:
- id: ld-preload-comp
  desc: References LD_PRELOAD environment variable
  crit: suspicious
  conf: 0.8
  any:
  - id: micro-behaviors/os/linker/env::ld-preload
  - id: ld-library-path-env
- id: hook-infrastructure
  desc: Hooking infrastructure (dlsym + RTLD_NEXT)
  crit: suspicious
  conf: 0.9
  any:
  - id: dlsym-rtld-next-pattern
  all:
  - id: micro-behaviors/dylib/lookup::dlsym-symbol
  - id: micro-behaviors/dylib/lookup::rtld-next
- id: hook-infrastructure-source
  desc: Hooking infrastructure in source code
  crit: suspicious
  conf: 0.9
  for:
  - c
  - cpp
  all:
  - id: micro-behaviors/dylib/lookup::dlsym-symbol
  - id: micro-behaviors/dylib/lookup::rtld-next-source
  any:
  - id: original-prefix-a
  - id: original-prefix-b
  - id: real-prefix-a
  - id: real-prefix-b
  - id: old-prefix-a
  - id: old-prefix-b
  - id: old-prefix-c
- id: dlsym-rtld-next
  desc: Uses dlsym with RTLD_NEXT (function
  crit: suspicious
  conf: 0.9
  mbc: F0015
  attack: T1574.006
  any:
  - id: dlsym-rtld-next-pattern
  - id: hook-infrastructure
  - id: hook-infrastructure-source
- id: hook-indicator
  desc: Hook implementation indicator
  crit: suspicious
  conf: 0.7
  needs: 2
  any:
  - id: micro-behaviors/dylib/lookup::dlsym-symbol
  - id: micro-behaviors/dylib/lookup::rtld-next
  - id: micro-behaviors/os/linker/env::ld-preload
  - id: dlsym-rtld-next-pattern
  unless:
  - id: micro-behaviors/dylib/library/family::system-lib-marker
  - id: metadata/binary/linking/static::static-linked-heuristic
  - id: metadata/binary/provenance::netbsd-runtime-linker-artifact
  - id: objectives/evasion/hijack-execution-flow/linker::standard-dynamic-linker
  - id: well-known/tool/development/qemu
- id: hook-prefixes
  desc: Function hook prefixes (original_/real_)
  crit: suspicious
  conf: 0.7
  for:
  - elf
  all:
  - id: original-prefix
  - id: real-prefix
- id: original-prefix
  desc: original_ function prefix (hook backup)
  crit: suspicious
  conf: 0.7
  for:
  - elf
  unless:
  - id: micro-behaviors/dylib/load/
  - id: micro-behaviors/dylib/library/
  - id: metadata/lang/compiler/
  any:
  - id: original-prefix-a
  - id: original-prefix-b
- id: real-prefix
  desc: real_ function prefix (hook backup)
  crit: suspicious
  conf: 0.7
  for:
  - elf
  unless:
  - id: micro-behaviors/dylib/load/
  - id: micro-behaviors/dylib/library/
  - id: metadata/lang/compiler/
  any:
  - id: real-prefix-a
  - id: real-prefix-b
- id: old-prefix
  desc: old_ function prefix (hook backup)
  crit: suspicious
  conf: 0.7
  for:
  - elf
  - c
  needs: 2
  any:
  - id: old-prefix-a
  - id: old-prefix-b
  - id: old-prefix-c
- id: symbiote
  desc: Symbiote rootkit indicators
  crit: suspicious
  conf: 0.95
  mbc: F0015
  attack: T1574.006
  for:
  - elf
  any:
  - id: skullseclabs-string
  - id: objectives/exfiltration/dns/tunnel::dnscat-name
  - id: hook-prefixes
  all:
  - id: hooked-string
  - id: static-string
- id: proc-paths
  desc: Multiple /proc path references
  crit: suspicious
  conf: 0.4
  for:
  - elf
  - c
  needs: 2
  any:
  - id: micro-behaviors/fs/proc/info/path::process-self-exe
  - id: proc-pid-pattern
  - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
- id: proc-hiding
  desc: Patterns for hiding processes via LD_PRELOAD
  crit: suspicious
  conf: 0.9
  mbc: F0015
  attack: T1574.006
  for:
  - elf
  - c
  any:
  - id: objectives/evasion/kernel-hide/userspace::hide-pid
  - id: hidden-proc-string
  unless:
  - id: objectives/discovery/network/scan/proc::scanner
- id: ld-backup-pattern
  desc: Dynamic linker backup/restore pattern
  crit: suspicious
  conf: 0.9
  mbc: F0015
  attack: T1574.006
  for:
  - elf
  any:
  - id: backup-ld-string
  - id: orig-ld-string
  - id: real-ld-string
  - id: ld-so-bak-pattern
  - id: backup-ld-so-file
- id: ld-preload-rootkit
  desc: LD_PRELOAD userspace rootkit (Symbiote-style)
  crit: suspicious
  conf: 0.95
  mbc: F0015
  attack: T1574.006
  for:
  - elf
  - c
  all:
  - id: dlsym-rtld-next
  any:
  - id: proc-hiding
  - id: symbiote
  - id: hook-prefixes
  - id: old-prefix
- id: ld-preload-rootkit-installer
  desc: LD_PRELOAD rootkit installer (modifies /etc/ld.so.preload)
  crit: hostile
  conf: 0.95
  mbc: F0015
  attack: T1574.006
  for:
  - elf
  - shell
  all:
  - id: ld-so-preload-file
  any:
  - id: ld-backup-pattern
  - id: micro-behaviors/dylib/library/libc::libc-internal-functions-a
  - id: dlsym-rtld-next
  - id: ld-preload-rootkit-installer-hostile
  - id: ld-so-preload-chattr
- id: compile-on-host-preload-rootkit
  desc: Compiles and installs LD_PRELOAD rootkit
  crit: hostile
  conf: 0.98
  mbc: F0015
  attack: T1574.006
  for: [c, cpp, rust, go, elf, shell]
  all:
  - id: ld-so-preload-file
  - id: runtime-shared-object-compile
  any:
  - id: preload-rootkit-hook-set
  - id: dlsym-rtld-next
  - id: timestomp-against-system-library
- id: runtime-shared-object-compile
  desc: fPIC shared-object compilation flags
  crit: component
  conf: 0.94
  attack: T1574.006
  for: [c, cpp, rust, go, elf, shell]
  all:
  - id: runtime-shared-object-compile--rx-1
  - id: runtime-shared-object-compile--rx-2
  near_bytes: 4096
  unless:
  - id: metadata/package/testing/presence/harness::freebsd-atf-shell
  - id: metadata/package/testing/harness/runtime::is-test
- id: preload-rootkit-hook-set
  desc: LD_PRELOAD filesystem hiding hook set
  crit: suspicious
  conf: 0.92
  attack: T1574.006
  for: [c, cpp, elf]
  any:
  - id: preload-rootkit-hook-set--rx-3
  - id: micro-behaviors/dylib/lookup::rtld-next-source
  - id: preload-rootkit-hook-set--rx-5
  - id: preload-rootkit-hook-set--rx-6
  - id: preload-rootkit-hook-set--rx-7
  - id: micro-behaviors/fs/file/open::fopen-text
  - id: preload-rootkit-hook-set--rx-9
  - id: preload-rootkit-hook-set--rx-10
- id: timestomp-against-system-library
  desc: Copies timestamps from system library
  crit: suspicious
  conf: 0.9
  attack: T1070.006
  for: [c, cpp, rust, go, elf]
  any:
  - id: timestomp-against-system-library--rx-11
  - id: timestomp-against-system-library--rx-12
  - id: timestomp-against-system-library--rx-13
  - id: timestomp-against-system-library--rx-14
