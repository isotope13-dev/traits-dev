defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries, source]
traits:
  - id: ld-library-path-env
    desc: References LD_LIBRARY_PATH environment variable
    crit: notable
    conf: 0.6
    if:
      id: micro-behaviors/os/linker/env::ld-library-path
    downgrade:
      any:
        - type: basename
          regex: (?i)^Makefile
        - type: basename
          regex: (?i)^configure
        - type: basename
          regex: \.(SH|sh\.in|cmake)$
  - id: dlsym-rtld-next-pattern
    desc: dlsym(RTLD_NEXT call string
    crit: component
    conf: 0.8
    if:
      type: text
      regex: ^dlsym\s*\(\s*RTLD_NEXT\b
  - id: skullseclabs-string
    desc: skullseclabs author string
    crit: suspicious
    conf: 0.95
    for:
      - elf
    if:
      type: text
      substr: skullseclabs
  - id: hooked-string
    desc: Hooked function indicator
    crit: notable
    conf: 0.7
    for:
      - elf
    if:
      type: text
      substr: Hooked
  - id: static-string
    desc: Static hook indicator
    crit: notable
    conf: 0.5
    for:
      - elf
    if:
      type: text
      regex: Static:\s+\w+
  - id: proc-pid-pattern
    desc: /proc/[pid] path pattern
    crit: notable
    conf: 0.4
    for:
      - elf
      - c
    if:
      type: text
      regex: /proc/[0-9]+/(stat|status|cmdline|maps)
  - id: hidden-proc-string
    desc: hidden_proc string reference
    crit: suspicious
    conf: 0.9
    for:
      - elf
      - c
    if:
      type: text
      word: hidden_proc
  - id: backup-ld-string
    desc: backup_ld string reference
    crit: suspicious
    conf: 0.9
    for:
      - elf
    if:
      type: text
      word: backup_ld
  - id: orig-ld-string
    desc: orig_ld string reference
    crit: suspicious
    conf: 0.9
    for:
      - elf
    if:
      type: text
      word: orig_ld
  - id: real-ld-string
    desc: real_ld string reference
    crit: suspicious
    conf: 0.9
    for:
      - elf
    if:
      type: text
      word: real_ld
  - id: ld-so-bak-pattern
    desc: ld.so backup file pattern
    crit: suspicious
    conf: 0.9
    for:
      - elf
    if:
      type: text
      regex: ld[\-_\.]so[.\-_]?bak
      case_insensitive: true
  - id: backup-ld-so-file
    desc: .backup_ld.so file reference
    crit: suspicious
    conf: 0.9
    for:
      - elf
    if:
      type: text
      substr: .backup_ld.so
  - id: ld-so-preload-file
    desc: References ld.so.preload file
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1574.006
    for:
      - elf
      - shell
    if:
      type: text
      regex: (^|/etc/)ld\.so\.preload\b
    unless:
      - id: objectives/evasion/hijack-execution-flow/linker::dynamic-linker-binary
  - id: ld-so-preload-chattr
    desc: Removes file attributes from ld.so.preload
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1574.006
    for:
      - shell
    if:
      type: string_literal
      regex: chattr\s+[-+][ia]+\s+/etc/ld\.so\.preload
  - id: original-prefix-a
    desc: original_ prefix core hook set
    crit: notable
    conf: 0.7
    for:
      - elf
    if:
      type: text
      regex: original_(open|read|write|execve)
  - id: original-prefix-b
    desc: original_ prefix network hook set
    crit: notable
    conf: 0.7
    for:
      - elf
    if:
      type: text
      regex: \boriginal_(connect|socket|unlink)\b
  - id: real-prefix-a
    desc: real_ prefix core hook set
    crit: notable
    conf: 0.7
    for:
      - elf
    if:
      type: text
      regex: real_(open|read|write|execve)
  - id: real-prefix-b
    desc: real_ prefix network hook set
    crit: notable
    conf: 0.7
    for:
      - elf
    if:
      type: text
      regex: \breal_(connect|socket|unlink)\b
  - id: old-prefix-a
    desc: old_ prefix core hook set
    crit: notable
    conf: 0.7
    for:
      - elf
      - c
    if:
      type: raw
      regex: \bold_(open|read|write|execve)\b
  - id: old-prefix-b
    desc: old_ prefix filesystem hook set
    crit: notable
    conf: 0.7
    for:
      - elf
      - c
    if:
      type: raw
      regex: \bold_(readdir|unlink|mkdir|rmdir)\b
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: old-prefix-c
    desc: old_ prefix xattr hook set
    crit: notable
    conf: 0.7
    for:
      - elf
      - c
    if:
      type: raw
      regex: \bold_(listxattr|getxattr|setxattr)\b
  - id: ld-so-preload-write
    desc: Writes shared library path to ld.so.preload
    crit: suspicious
    conf: 0.95
    mbc: F0015
    attack: T1574.006
    for:
      - shell
    if:
      type: text
      regex: 'echo.{0,50}>\s*/etc/ld\.so\.preload'
  - id: ld-so-preload-clear
    desc: Clears /etc/ld.so.preload content
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1574.006
    for:
      - shell
    if:
      type: string_literal
      regex: (cat\s+/dev/null\s*>|echo\s*>|truncate\s+.{0,50}|>)\s*/etc/ld\.so\.preload
composite_rules:
  - id: ld-preload-comp
    desc: References LD_PRELOAD environment variable
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/os/linker/env::ld-preload
      - id: ld-library-path-env
  - id: hook-infrastructure
    desc: Hooking infrastructure (dlsym + RTLD_NEXT)
    crit: suspicious
    conf: 0.9
    any:
      - id: dlsym-rtld-next-pattern
    all:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: micro-behaviors/dylib/lookup::rtld-next
  - id: hook-infrastructure-source
    desc: Hooking infrastructure in source code
    crit: suspicious
    conf: 0.9
    for:
      - c
      - cpp
    all:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: micro-behaviors/dylib/lookup::rtld-next-source
    any:
      - id: original-prefix-a
      - id: original-prefix-b
      - id: real-prefix-a
      - id: real-prefix-b
      - id: old-prefix-a
      - id: old-prefix-b
      - id: old-prefix-c
  - id: dlsym-rtld-next
    desc: Uses dlsym with RTLD_NEXT (function
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1574.006
    any:
      - id: dlsym-rtld-next-pattern
      - id: hook-infrastructure
      - id: hook-infrastructure-source
  - id: hook-indicator
    desc: Hook implementation indicator
    crit: notable
    conf: 0.7
    needs: 2
    any:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: micro-behaviors/dylib/lookup::rtld-next
      - id: micro-behaviors/os/linker/env::ld-preload
      - id: dlsym-rtld-next-pattern
    unless:
      - id: micro-behaviors/dylib/library::system-lib-marker
  - id: hook-prefixes
    desc: Function hook prefixes (original_/real_)
    crit: notable
    conf: 0.7
    for:
      - elf
    all:
      - id: original-prefix
      - id: real-prefix
  - id: original-prefix
    desc: original_ function prefix (hook backup)
    crit: notable
    conf: 0.7
    for:
      - elf
    unless:
      - id: micro-behaviors/dylib/load/
      - id: micro-behaviors/dylib/library/
      - id: metadata/lang/compiler/
    any:
      - id: original-prefix-a
      - id: original-prefix-b
  - id: real-prefix
    desc: real_ function prefix (hook backup)
    crit: notable
    conf: 0.7
    for:
      - elf
    unless:
      - id: micro-behaviors/dylib/load/
      - id: micro-behaviors/dylib/library/
      - id: metadata/lang/compiler/
    any:
      - id: real-prefix-a
      - id: real-prefix-b
  - id: old-prefix
    desc: old_ function prefix (hook backup)
    crit: notable
    conf: 0.7
    for:
      - elf
      - c
    needs: 2
    any:
      - id: old-prefix-a
      - id: old-prefix-b
      - id: old-prefix-c
  - id: symbiote
    desc: Symbiote rootkit indicators
    crit: suspicious
    conf: 0.95
    mbc: F0015
    attack: T1574.006
    for:
      - elf
    any:
      - id: skullseclabs-string
      - id: objectives/exfiltration/dns/tunnel::dnscat-name
      - id: hook-prefixes
    all:
      - id: hooked-string
      - id: static-string
  - id: proc-paths
    desc: Multiple /proc path references
    crit: notable
    conf: 0.4
    for:
      - elf
      - c
    needs: 2
    any:
      - id: micro-behaviors/fs/proc/info::process-self-exe
      - id: proc-pid-pattern
      - id: micro-behaviors/fs/proc/info::proc-net-tcp
  - id: proc-hiding
    desc: Patterns for hiding processes via LD_PRELOAD
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1574.006
    for:
      - elf
      - c
    any:
      - id: objectives/evasion/kernel-hide/userspace::hide-pid
      - id: hidden-proc-string
    unless:
      - id: well-known/malware/botnet/mirai::stripped-mirai-iot-botnet
      - id: objectives/discovery/network/scan::scanner
  - id: ld-backup-pattern
    desc: Dynamic linker backup/restore pattern
    crit: suspicious
    conf: 0.9
    mbc: F0015
    attack: T1574.006
    for:
      - elf
    any:
      - id: backup-ld-string
      - id: orig-ld-string
      - id: real-ld-string
      - id: ld-so-bak-pattern
      - id: backup-ld-so-file
  - id: ld-preload-rootkit
    desc: LD_PRELOAD userspace rootkit (Symbiote-style)
    crit: suspicious
    conf: 0.95
    mbc: F0015
    attack: T1574.006
    for:
      - elf
      - c
    all:
      - id: dlsym-rtld-next
    any:
      - id: proc-hiding
      - id: symbiote
      - id: hook-prefixes
      - id: old-prefix
  - id: ld-preload-rootkit-installer
    desc: LD_PRELOAD rootkit installer (modifies /etc/ld.so.preload)
    crit: suspicious
    conf: 0.95
    mbc: F0015
    attack: T1574.006
    for:
      - elf
      - shell
    all:
      - id: ld-so-preload-file
    any:
      - id: ld-backup-pattern
      - id: micro-behaviors/dylib/library/libc::libc-internal-functions-a
      - id: dlsym-rtld-next
      - id: ld-so-preload-write
      - id: ld-so-preload-chattr
  - id: ld-preload-rootkit-installer-hostile
    desc: Hostile LD_PRELOAD rootkit installer
    crit: hostile
    conf: 0.98
    all:
      - id: ld-so-preload-write
    unless:
      - id: metadata/package/versioning::version-resource-metadata
