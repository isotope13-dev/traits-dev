defaults:
  platforms: [linux, unix]
  for: [c, cpp, elf]
traits:
  - id: magic-gid-hiding
    desc: Uses MAGIC_GID for process/file hiding
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "MAGIC_GID"

  - id: ssh-password-sniffing
    desc: Sniffs SSH passwords by hooking read/write
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'strcmp\(__progname,\s*"ssh"\)'

  - id: strace-evasion-symbol
    desc: Evades strace by hooking and filtering output
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: filter_strace

composite_rules:
  - id: hostile-ld-preload-rootkit
    desc: Complete LD_PRELOAD userspace rootkit
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/evasion/kernel-hide/userspace::hook-infrastructure-source
      - id: objectives/evasion/kernel-hide/userspace::magic-gid-hiding

  - id: hostile-ssh-sniffer
    desc: LD_PRELOAD rootkit stealing SSH passwords
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/evasion/kernel-hide/userspace::hook-infrastructure-source
      - id: objectives/evasion/kernel-hide/userspace::ssh-password-sniffing
