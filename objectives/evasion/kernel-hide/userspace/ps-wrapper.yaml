# Userspace Process-Hiding ps Wrapper
# Detects trojanized ps wrappers that conceal processes from administrators
defaults:
  for: [shell]
  platforms: [unix]
traits:
  - id: ps-install-move
    desc: Installation renames /bin/ps to hidden backup
    crit: suspicious
    conf: 0.95
    attack: "T1574.001"
    mbc: "F0015"
    if:
      type: text
      exact: "mv /bin/ps /bin/.ps"
  - id: ps-install-copy
    desc: Installation copies wrapper to /bin/ps
    crit: suspicious
    conf: 0.95
    attack: "T1574.001"
    mbc: "F0015"
    if:
      type: text
      exact: "cp ~/psbackdoor.sh /bin/ps"
  - id: ps-install-chmod
    desc: Installation sets wrapper executable
    crit: suspicious
    conf: 0.8
    attack: "T1574.001"
    mbc: "F0015"
    if:
      type: text
      exact: "chmod a+x /bin/ps"
composite_rules:
  - id: process-list-filtering
    desc: Hides processes by filtering ps output
    crit: suspicious
    conf: 0.98
    attack: "T1564"
    mbc: "B0003"
    all:
      - id: objectives/evasion/process/hidden/filter::hidden-ps-backup-path
      - id: objectives/evasion/process/hidden/filter::ps-grep-filter-pipeline
  - id: trojanized-ps-install
    desc: Replaces /bin/ps with wrapper
    crit: suspicious
    conf: 0.98
    attack: "T1574.001"
    mbc: "F0015"
    all:
      - id: ps-install-move
      - id: ps-install-copy
      - id: ps-install-chmod
  - id: ps-process-hiding-backdoor
    desc: Trojanized ps process-hiding backdoor
    crit: hostile
    conf: 0.99
    attack: "T1564"
    mbc: "B0003"
    all:
      - id: process-list-filtering
      - id: metadata/file/text::shell-like-plain-text
      - id: objectives/evasion/process/hidden/filter::ps-output-truncation
      - id: objectives/evasion/process/hidden/filter::hidden-temp-delete
