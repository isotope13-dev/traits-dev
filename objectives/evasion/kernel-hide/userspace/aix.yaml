defaults:
  platforms: [aix, unix]
  for: [c, cpp, elf, shell]
  attack: T1574.006
traits:
  - id: aix-shared-object-compile
    desc: shared-object build command (AIX)
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(gcc|clang|cc)\b[^\n]{0,120}-G\b'
    unless:
      - type: trait
        id: metadata/file/extension::linux-kernel-package-artifact-basename
composite_rules:
  - id: aix-rootkit-installer
    desc: AIX rootkit installer via LIBPATH
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/linker/env::libpath
      - id: aix-shared-object-compile
      - id: objectives/evasion/kernel-hide/userspace::preload-rootkit-hook-set
