defaults:
  platforms: [unix]
  for: [c]
  crit: suspicious
  conf: 0.88
  attack: T1014
  mbc: F0003
traits:
  - id: hidden-tty-control-file
    desc: Hidden tty file controls visibility
    conf: 0.9
    if:
      type: text
      regex: /dev/ttyp[pqr]
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: process-show-bypass
    desc: Ps hide list bypassed with slash flag
    conf: 0.95
    if:
      type: text
      substr: Able to list processes with 'ps -/' command
  - id: file-show-bypass
    desc: Ls hide list bypassed with slash flag
    conf: 0.95
    if:
      type: text
      regex: Able to list (files|du stats) with .{0,12}-/. command
  - id: hidden-ps-config
    desc: Ps reads hidden control file
    conf: 0.94
    if:
      type: text
      substr: PSCONF, "r"
  - id: hidden-netstat-config
    desc: Netstat reads hidden control file
    conf: 0.94
    if:
      type: text
      substr: NSCONF, "r"
  - id: hidden-filelist-config
    desc: Ls or du reads hidden file list
    conf: 0.94
    if:
      type: text
      substr: LSCONF, "r"
  - id: promisc-flag-removed
    desc: Ifconfig output omits PROMISC flag
    conf: 0.95
    if:
      type: text
      exact: '"\\020\\1UP\\2BROADCAST\\3DEBUG\\4LOOPBACK\\5POINTOPOINT\\6NOTRAILERS\\7RUNNING\\10NOARP\\12MULTI\\020PRIVATE"'
composite_rules:
  - id: process-hiding-ps-trojan
    desc: Trojan ps hides selected processes
    crit: hostile
    conf: 0.98
    all:
      - id: process-show-bypass
      - id: hidden-ps-config
  - id: file-hiding-admin-trojan
    desc: Trojan ls or du hides selected files
    crit: hostile
    conf: 0.97
    all:
      - id: hidden-filelist-config
      - id: file-show-bypass
  - id: network-visibility-admin-trojan
    desc: Trojan net tools hide sniffing evidence
    crit: hostile
    conf: 0.98
    any:
      - id: hidden-netstat-config
      - id: promisc-flag-removed
    needs: 2
