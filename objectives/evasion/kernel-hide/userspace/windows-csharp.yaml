defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1014
  mbc: F0003

traits:
  - id: win32-file-lookup-hook-source
    desc: Win32 file lookup hook source
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'HookFindFirstFile[\s\S]{0,500}ERROR_FILE_NOT_FOUND|SetLastError\(0x2\)'
  - id: win32-createfile-hide-hook-source
    desc: Win32 CreateFile hide hook source
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'HookCreateFile[\s\S]{0,500}HIDDEN_FILE'
  - id: process-user-hide-filter-source
    desc: Process user hide filter source
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ShouldHidePid[\s\S]{0,260}GetUsernameFromPid[\s\S]{0,260}HIDE_USER'
  - id: token-user-lookup-by-pid-source
    desc: Token user lookup by PID source
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'OpenProcessToken[\s\S]{0,260}GetTokenInformation[\s\S]{0,260}LookupAccountSid'

composite_rules:
  - id: windows-userspace-rootkit-hide-hooks
    desc: Windows userspace rootkit hide hooks
    crit: hostile
    conf: 0.97
    all:
      - id: win32-file-lookup-hook-source
      - id: win32-createfile-hide-hook-source
    any:
      - id: process-user-hide-filter-source
      - id: token-user-lookup-by-pid-source
