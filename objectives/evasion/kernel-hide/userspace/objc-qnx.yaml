defaults:
  platforms: [qnx, unix]
  for: [objc]
  attack: T1564

traits:
  - id: qnx-objc-proc-cmdline-blank
    desc: QNX ObjC proc cmdline blank
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc/%d/cmdline[\s\S]{0,220}char blank\[128\]'

  - id: qnx-objc-proc-as-zero
    desc: QNX ObjC proc as zero
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc/%d/as/0[\s\S]{0,260}write\(fd, &zero, 1\)'

  - id: qnx-objc-proc-devctl-info
    desc: QNX ObjC proc devctl info
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: DCMD_PROC_INFO

composite_rules:
  - id: qnx-objc-procfs-process-hide
    desc: QNX ObjC procfs process hide
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-objc-proc-cmdline-blank
      - id: qnx-objc-proc-as-zero
      - id: qnx-objc-proc-devctl-info
