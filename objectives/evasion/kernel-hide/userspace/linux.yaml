defaults:
  platforms:
  - linux
  for:
  - elf
traits:
- id: hide-pid
  desc: hide_pid function
  crit: suspicious
  conf: 0.85
  mbc: B0003
  attack: T1014
  if:
    type: text
    exact: hide_pid
- id: hide-file
  desc: hide_file function
  crit: suspicious
  conf: 0.85
  mbc: B0003
  attack: T1014
  if:
    type: function
    exact: hide_file
- id: original-readdir-backup
  desc: Backed-up original readdir function
  crit: suspicious
  conf: 0.85
  mbc: F0015
  attack: T1014
  if:
    type: text
    regex: ^(orig|original)_readdir$
- id: rootkit-so-name-set
  desc: Hidden rootkit shared object names
  crit: suspicious
  conf: 0.94
  mbc: F0005
  attack: T1564.001
  count_min: 3
  if:
    type: text
    regex: ^(pkit|fkit|skit)(arm)?\.so$
- id: spirit-hidden-name
  desc: Hidden Spirit name marker
  crit: component
  conf: 0.9
  mbc: F0005
  attack: T1564.001
  if:
    type: text
    regex: ^spirit(-arm)?$
- id: spirit-toolchain-set-a
  desc: Hidden Spirit toolchain set A
  crit: component
  conf: 0.9
  mbc: F0005
  attack: T1564.001
  count_min: 2
  if:
    type: text
    regex: ^(libgcc_a|gcclib|crtend_b)$
- id: spirit-toolchain-set-b
  desc: Hidden Spirit toolchain set B
  crit: component
  conf: 0.9
  mbc: F0005
  attack: T1564.001
  count_min: 2
  if:
    type: text
    regex: ^(crtres_c|adxintrin_b|\.adxintrin_b|gcc_[yp])$
- id: filter-process-name-core--process-to-filter
  desc: Process filter or hide (process_to_filter)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    exact: process_to_filter
- id: filter-process-name-core--filter-process
  desc: Process filter or hide function (filter_process)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    exact: filter_process
- id: filter-process-name-core--hide-process
  desc: Process filter or hide function (hide_process)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    exact: hide_process
- id: filter-process-name-alt--should-hide
  desc: Additional process filter function (should_hide)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    word: should_hide
- id: filter-process-name-alt--filtered-process
  desc: Additional process filter (filtered_process)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    word: filtered_process
composite_rules:
- id: filter-process-name-core
  desc: Process filter or hide function
  crit: suspicious
  conf: 0.85
  mbc: B0003
  attack: T1014
  any:
  - id: filter-process-name-core--process-to-filter
  - id: filter-process-name-core--filter-process
  - id: filter-process-name-core--hide-process
- id: filter-process-name-alt
  desc: Additional process filter function
  crit: suspicious
  conf: 0.85
  mbc: B0003
  attack: T1014
  any:
  - id: filter-process-name-alt--should-hide
  - id: filter-process-name-alt--filtered-process
- id: filter-process-name
  desc: Process filtering function reference
  crit: suspicious
  conf: 0.85
  mbc: B0003
  attack: T1014
  any:
  - id: filter-process-name-core
  - id: filter-process-name-alt
- id: spirit-hidden-name-set
  desc: Hidden Spirit component names
  crit: suspicious
  conf: 0.95
  mbc: F0005
  attack: T1564.001
  all:
  - id: spirit-hidden-name
  any:
  - id: spirit-toolchain-set-a
  - id: spirit-toolchain-set-b
- id: hidden-entry-list
  desc: Embedded hidden-entry filter list
  crit: suspicious
  conf: 0.96
  mbc: F0005
  attack: T1564.001
  all:
  - id: objectives/evasion/kernel-hide/userspace::ld-so-preload-file
  any:
  - id: rootkit-so-name-set
  - id: spirit-hidden-name-set
- id: readdir-hook
  desc: Exported readdir function (directory listing hook)
  crit: notable
  conf: 0.85
  for: [elf, so]
  mbc: F0015
  attack: T1014
  all:
  - id: micro-behaviors/fs/directory/readdir::readdir-readdir
  - id: metadata/binary/symbols/exports::has-exports
  - id: micro-behaviors/dylib/lookup::dlsym-symbol
  any:
  - id: original-readdir-backup
  - id: micro-behaviors/dylib/lookup::rtld-next
  - id: objectives/evasion/kernel-hide/userspace::ld-so-preload-file
  - id: filter-process-name
  - id: hide-file
  - id: hide-pid
  - id: micro-behaviors/fs/proc/info/path::process-pid-stat-template
  unless:
  - id: metadata/binary/linking/static::elf-interpreter-section-name
  downgrade:
    any:
    - id: metadata/binary/metrics/size::massive-executable
- id: procfs-readdir-process-hide
  desc: Procfs-aware readdir process-hiding hook
  crit: hostile
  conf: 0.98
  mbc: B0003
  attack: T1014
  for: [elf, so]
  all:
  - id: readdir-hook
  - id: micro-behaviors/fs/proc/info/path::process-pid-stat-template
- id: procfs-write-output-hide
  desc: Procfs-aware write output-hiding hook
  crit: hostile
  conf: 0.98
  mbc: B0003
  attack: T1014
  for: [elf, so]
  all:
  - id: readdir-hook
  - id: micro-behaviors/fs/file/write/direct::write--write
- id: getdents-hook
  desc: Exported getdents function (directory listing hook)
  crit: notable
  conf: 0.85
  for: [so]
  mbc: F0015
  attack: T1014
  all:
  - id: micro-behaviors/fs/directory/readdir::readdir-getdents
  - id: metadata/binary/symbols/exports::has-exports
  - id: micro-behaviors/dylib/lookup::dlsym-symbol
  any:
  - id: micro-behaviors/dylib/lookup::rtld-next
  - id: objectives/evasion/kernel-hide/userspace::ld-so-preload-file
  - id: filter-process-name
  - id: hide-file
  - id: hide-pid
  unless:
  - id: metadata/binary/linking/static::elf-interpreter-section-name
- id: hooked-library
  desc: Userspace rootkit library with hooked functions
  crit: notable
  conf: 0.9
  for: [so]
  mbc: F0015
  attack: T1014
  all:
  - id: micro-behaviors/dylib/lookup::dlsym-symbol
  any:
  - id: readdir-hook
  - id: getdents-hook
- id: rootkit
  desc: Linux rootkit patterns
  crit: notable
  conf: 0.66
  mbc: B0003
  attack: T1014
  needs: 2
  any:
  - id: objectives/evasion/kernel-hide/keywords::rootkit-word
  - id: hide-pid
  - id: hide-file
  - id: objectives/evasion/kernel-hide/userspace::ld-so-preload-file
  - id: readdir-hook
  - id: getdents-hook
- id: process-hiding-rootkit
  desc: Process-hiding rootkit library
  crit: hostile
  conf: 0.95
  mbc: B0003
  attack: T1014
  all:
  - id: hooked-library
  - id: filter-process-name
  - id: original-readdir-backup
- id: file-hiding-rootkit
  desc: File-hiding rootkit library
  crit: hostile
  conf: 0.96
  mbc: B0003
  attack: T1014
  all:
  - id: hooked-library
  - id: objectives/evasion/kernel-hide/userspace::ld-so-preload-file
  - id: original-readdir-backup
  any:
  - id: micro-behaviors/data/string/library::strncmp
