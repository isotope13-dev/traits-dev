defaults:
  platforms:
    - linux
  for:
    - elf
traits:
  - id: hide-pid
    desc: hide_pid function
    crit: suspicious
    conf: 0.85
    mbc: B0003
    attack: T1014
    if:
      type: text
      substr: hide_pid
  - id: hide-file
    desc: hide_file function
    crit: suspicious
    conf: 0.85
    mbc: B0003
    attack: T1014
    if:
      type: text
      exact: hide_file
  - id: has-exports
    desc: Binary exports symbols
    crit: component
    conf: 0.5
    if:
      type: exports_count
      min: 1
  - id: filter-process-name-core
    desc: Process filter or hide function
    crit: suspicious
    conf: 0.85
    mbc: B0003
    attack: T1014
    if:
      type: text
      regex: ^(process_to_filter|filter_process|hide_process)$
  - id: filter-process-name-alt
    desc: Additional process filter function
    crit: suspicious
    conf: 0.85
    mbc: B0003
    attack: T1014
    if:
      type: text
      regex: ^(should_hide|filtered_process)$
  - id: original-readdir-backup
    desc: Backed-up original readdir function
    crit: suspicious
    conf: 0.85
    mbc: F0015
    attack: T1014
    if:
      type: text
      regex: ^(orig|original)_readdir$
  - id: rootkit-so-name-set
    desc: Hidden rootkit shared object names
    crit: suspicious
    conf: 0.94
    mbc: F0005
    attack: T1564.001
    count_min: 3
    if:
      type: text
      regex: ^(pkit|fkit|skit)(arm)?\.so$
  - id: spirit-hidden-name
    desc: Hidden Spirit name marker
    crit: component
    conf: 0.9
    mbc: F0005
    attack: T1564.001
    if:
      type: text
      regex: ^spirit(?:-arm)?$
  - id: spirit-toolchain-set-a
    desc: Hidden Spirit toolchain set A
    crit: component
    conf: 0.9
    mbc: F0005
    attack: T1564.001
    count_min: 2
    if:
      type: text
      regex: ^(libgcc_a|gcclib|crtend_b)$
  - id: spirit-toolchain-set-b
    desc: Hidden Spirit toolchain set B
    crit: component
    conf: 0.9
    mbc: F0005
    attack: T1564.001
    count_min: 2
    if:
      type: text
      regex: ^(crtres_c|adxintrin_b|\.adxintrin_b|gcc_[yp])$
composite_rules:
  - id: filter-process-name
    desc: Process filtering function reference
    crit: suspicious
    conf: 0.85
    mbc: B0003
    attack: T1014
    any:
      - id: filter-process-name-core
      - id: filter-process-name-alt
  - id: spirit-hidden-name-set
    desc: Hidden Spirit component names
    crit: suspicious
    conf: 0.95
    mbc: F0005
    attack: T1564.001
    all:
      - id: spirit-hidden-name
    any:
      - id: spirit-toolchain-set-a
      - id: spirit-toolchain-set-b
  - id: hidden-entry-list
    desc: Embedded hidden-entry filter list
    crit: suspicious
    conf: 0.96
    mbc: F0005
    attack: T1564.001
    all:
      - id: objectives/evasion/kernel-hide/userspace::ld-so-preload-file
    any:
      - id: rootkit-so-name-set
      - id: spirit-hidden-name-set
  - id: readdir-hook
    desc: Exported readdir function (directory listing hook)
    crit: suspicious
    conf: 0.85
    for: [so]
    mbc: F0015
    attack: T1014
    all:
      - id: micro-behaviors/fs/directory/readdir::readdir-readdir
      - id: has-exports
    downgrade:
      any:
        - id: metadata/binary/metrics::massive-executable
  - id: getdents-hook
    desc: Exported getdents function (directory listing hook)
    crit: suspicious
    conf: 0.85
    for: [so]
    mbc: F0015
    attack: T1014
    all:
      - id: micro-behaviors/fs/directory/readdir::readdir-getdents
      - id: has-exports
  - id: hooked-library
    desc: Userspace rootkit library with hooked functions
    crit: suspicious
    conf: 0.9
    for: [so]
    mbc: F0015
    attack: T1014
    all:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
    any:
      - id: readdir-hook
      - id: getdents-hook
  - id: rootkit
    desc: Linux rootkit patterns
    crit: suspicious
    conf: 0.66
    mbc: B0003
    attack: T1014
    needs: 2
    any:
      - id: micro-behaviors/data/text/malware::rootkit-word
      - id: hide-pid
      - id: hide-file
      - id: objectives/evasion/kernel-hide/userspace::ld-so-preload-file
      - id: readdir-hook
      - id: getdents-hook
  - id: process-hiding-rootkit
    desc: Process-hiding rootkit library
    crit: hostile
    conf: 0.95
    mbc: B0003
    attack: T1014
    all:
      - id: hooked-library
      - id: filter-process-name
      - id: original-readdir-backup
  - id: file-hiding-rootkit
    desc: File-hiding rootkit library
    crit: hostile
    conf: 0.96
    mbc: B0003
    attack: T1014
    all:
      - id: hooked-library
      - id: objectives/evasion/kernel-hide/userspace::ld-so-preload-file
      - id: original-readdir-backup
    any:
      - id: micro-behaviors/data/string/operations::strncmp
      - id: micro-behaviors/fs/path/extension::so
