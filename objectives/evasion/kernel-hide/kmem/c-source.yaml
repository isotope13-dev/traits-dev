defaults:
  platforms: [unix]
  for: [c, cpp]

traits:
- id: c-kmem-device-open
  desc: C opens kernel memory
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'open("/dev/kmem"'

- id: c-kmem-read-helper
  desc: C kernel memory read helper
  crit: suspicious
  conf: 0.93
  if:
    type: text
    word: "kread"

- id: c-kmem-write-helper
  desc: C kernel memory write helper
  crit: suspicious
  conf: 0.94
  if:
    type: text
    word: "kwrite"

- id: c-syscall-table-kmem
  desc: C inspects syscall table
  crit: suspicious
  conf: 0.94
  if:
    type: text
    word: "sys_call_table"

- id: c-idt-system-call-extract
  desc: C extracts IDT syscall
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'idt.base+8*0x80'

- id: c-proc-root-ops-check
  desc: C checks proc root ops
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'PROC_ROOT_(FILE_OPS|INODE_OPS|READDIR|LOOKUP)'

- id: c-module-list-relink
  desc: C relinks kernel modules
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'modk.next = kaddr'

- id: c-task-struct-kmem-walk
  desc: C walks task_struct
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'sizeof(struct task_struct)'

composite_rules:
- id: c-kmem-syscall-table-audit
  desc: C kmem syscall table audit
  crit: hostile
  conf: 0.97
  all:
  - id: c-kmem-device-open
  - id: c-kmem-read-helper
  - id: c-syscall-table-kmem
  - id: c-idt-system-call-extract

- id: c-kmem-rootkit-structure-audit
  desc: C kmem rootkit structure audit
  crit: hostile
  conf: 0.97
  all:
  - id: c-kmem-read-helper
  any:
  - id: c-proc-root-ops-check
  - id: c-module-list-relink
  - id: c-task-struct-kmem-walk
  needs: 2

- id: c-kmem-module-relink-write
  desc: C kmem module relink write
  crit: hostile
  conf: 0.98
  all:
  - id: c-kmem-device-open
  - id: c-kmem-read-helper
  - id: c-kmem-write-helper
  - id: c-module-list-relink
