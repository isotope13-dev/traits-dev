# Linux Kernel Rootkit Detection - Syscall Hooking Infrastructure
# MBC: Defense Evasion, Privilege Escalation  
# ATT&CK: T1014 (Rootkit), T1068 (Exploitation for Privilege Escalation)
defaults:
  platforms: [windows, unix]
  for: [c]
traits:
  # SYSCALL HOOKING INFRASTRUCTURE
  # ============================================================
  - id: asmlinkage-decl
    desc: Assembly linkage declaration (syscall calling
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "asmlinkage"
  - id: t-syscall-typedef
    desc: Syscall function pointer typedef
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\b(t_syscall|sys_?call_(ptr|hook|orig))\b'
  - id: orig-syscall-pattern
    desc: Original syscall saving pattern (hooking
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    # `orig_<syscall>` saved-original function pointers for the classic hooked
    # syscalls (file hiding: getdents; signal control: kill; net hiding: tcp4_*,
    # packet_rcv). The bare `^orig_` prefix matched benign locals like
    # `orig_length`/`orig_size` in ordinary (incl. Cython-generated) C.
    if:
      type: symbol
      kind: identifier
      regex: '^orig_(getdents|kill|tcp4|packet)'
  - id: pt-regs-register-access
    desc: Direct register access via pt_regs
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: member
      exact: "pt_regs->"
  - id: pt-regs-di-access
    desc: RDI register access (first syscall
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: member
      exact: "->di"
  - id: pt-regs-si-access
    desc: RSI register access (second syscall
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: member
      exact: "->si"
  # ============================================================
  # GETDENTS HOOKING SPECIFIC
  # ============================================================
  - id: getdents-hook-function
    desc: getdents hook function (directory listing
    crit: suspicious
    conf: 0.99
    attack: "T1014"
    if:
      type: symbol
      kind: function
      exact: "getdents"
  - id: nr-getdents-ref
    desc: __NR_getdents syscall number reference
    crit: suspicious
    conf: 0.98
    # `__NR_getdents` syscall-number macro — cached identifier fact.
    if:
      type: symbol
      kind: identifier
      exact: "__NR_getdents"
  - id: nr-kill-ref
    desc: __NR_kill syscall number reference (signal
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "__NR_kill"
  # ============================================================
  # USER/KERNEL BOUNDARY
  # ============================================================
  - id: user-annotation
    desc: __user annotation (kernel/userspace boundary marker)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: "__user"
  - id: gfp-kernel-alloc
    desc: GFP_KERNEL allocation flag
    crit: suspicious
    conf: 0.7
    if:
      type: symbol
      kind: call
      exact: "GFP_KERNEL"
  # ============================================================
  # KERNEL FUNCTION CALLS
  # ============================================================
  - id: kallsyms-lookup
    desc: Kernel symbol lookup (rootkit indicator)
    crit: suspicious
    conf: 0.98
    mbc: "F0004"
    if:
      type: symbol
      kind: call
      exact: "kallsyms_lookup_name"
  - id: prepare-credential-access-call
    desc: Prepare kernel credentials (privilege escalation)
    crit: suspicious
    conf: 0.98
    attack: "T1068"
    if:
      type: symbol
      kind: call
      exact: "prepare_credential-access"
  - id: commit-credential-access-call
    desc: Commit kernel credentials (privilege escalation)
    crit: suspicious
    conf: 0.98
    attack: "T1068"
    if:
      type: symbol
      kind: call
      exact: "commit_credential-access"
  - id: list-del-call
    desc: Kernel list deletion (module hiding)
    crit: baseline
    conf: 0.95
    attack: "T1014"
    if:
      type: symbol
      kind: call
      exact: "list_del"
  - id: cr0-read-call
    desc: Read CR0 register (memory protection
    crit: suspicious
    conf: 0.98
    if:
      type: symbol
      kind: call
      exact: "read_cr0"
  - id: kzalloc-call
    desc: Kernel memory allocation
    crit: baseline
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: "kzalloc"
# ============================================================
