defaults:
  for:
    - c
  platforms:
    - unix
traits:
  - id: sys-module-header
    desc: FreeBSD kernel module header include
    crit: component
    conf: 0.95
    attack: T1014
    if:
      type: text
      substr: sys/module.h
  - id: sys-linker-header
    desc: FreeBSD kernel linker interface
    crit: component
    conf: 0.95
    attack: T1014
    if:
      type: text
      substr: sys/linker.h
  - id: sysent-array-access
    desc: Direct syscall table array access
    crit: suspicious
    conf: 0.98
    attack: T1014
    if:
      type: text
      regex: sysent\s*\[.{1,64}\]\s*\.(sy_call|sy_narg|sy_auevent|sy_flags)\s*=
  - id: sysent-struct-decl
    desc: Sysent structure declaration (syscall table type)
    crit: suspicious
    conf: 0.95
    attack: T1014
    if:
      type: text
      substr: struct sysent
  - id: sysctl-handler-args
    desc: Sysctl handler function signature
    crit: component
    conf: 0.9
    if:
      type: text
      substr: SYSCTL_HANDLER_ARGS
  - id: oid-handler-hook
    desc: Sysctl OID handler pointer replacement
    crit: suspicious
    conf: 0.98
    attack: T1014
    if:
      type: text
      regex: ->\s*oid_handler\s*=
  - id: copyin-call
    desc: FreeBSD kernel copyin from userspace
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: copyin
  - id: copyout-call
    desc: FreeBSD kernel copyout to userspace
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: copyout
  - id: kernel-linker-impl-marker
    desc: FreeBSD kern_linker.c implementation marker
    crit: component
    conf: 0.99
    if:
      type: text
      substr: linker_kernel_file
  - id: linker-files-ref
    desc: FreeBSD linker_files list reference
    crit: suspicious
    conf: 0.95
    attack: T1014
    if:
      type: text
      substr: linker_files
    unless:
      - id: kernel-linker-impl-marker
  - id: tailq-manipulation
    desc: TAILQ list manipulation in kernel context
    crit: component
    conf: 0.8
    if:
      type: text
      substr: TAILQ_NEXT
  - id: mod-load-handler
    desc: FreeBSD MOD_LOAD module init handler
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bMOD_LOAD\b.{0,120}\bmoduledata_t\b|\bmoduledata_t\b.{0,120}\bMOD_LOAD\b'
  - id: moduledata-decl
    desc: FreeBSD moduledata_t declaration
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: moduledata_t
  - id: p-ruid-manipulation
    desc: Direct process real UID field access
    crit: component
    conf: 0.95
    attack: T1068
    if:
      type: text
      substr: p_ruid
  - id: cr-uid-manipulation
    desc: Direct credential UID field access
    crit: component
    conf: 0.95
    attack: T1068
    if:
      type: text
      substr: cr_uid
  - id: p-rgid-manipulation
    desc: Direct process real GID field access
    crit: component
    conf: 0.95
    attack: T1068
    if:
      type: text
      substr: p_rgid
  - id: bsd-kmod-mk
    desc: FreeBSD kernel module build system
    crit: suspicious
    conf: 0.95
    for:
      - c
      - shell
    if:
      type: text
      substr: bsd.kmod.mk
  - id: trojaned-function-prefix
    desc: Function named with trojan prefix
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: trojaned_[a-z]
  - id: r00ter-leet-name
    desc: Leet-speak rooter variable name
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: r00ter
  - id: getdirentries-ref
    desc: FreeBSD getdirentries syscall reference
    crit: component
    conf: 0.95
    attack: T1014
    if:
      type: text
      word: getdirentries
  - id: tcp-pcblist-ref
    desc: TCP PCB list reference (connection hiding)
    crit: component
    conf: 0.9
    attack: T1014
    if:
      type: text
      substr: tcp_pcblist
  - id: tcpctl-pcblist-ref
    desc: TCPCTL_PCBLIST sysctl constant
    crit: component
    conf: 0.95
    attack: T1014
    if:
      type: text
      substr: TCPCTL_PCBLIST
  - id: kern-proc-all-ref
    desc: KERN_PROC_ALL sysctl reference
    crit: component
    conf: 0.85
    if:
      type: text
      substr: KERN_PROC_ALL
  - id: kern-proc-pid-ref
    desc: KERN_PROC_PID sysctl reference
    crit: component
    conf: 0.85
    if:
      type: text
      substr: KERN_PROC_PID
composite_rules:
  - id: freebsd-kmod-context
    desc: FreeBSD kernel module context markers
    crit: component
    conf: 0.9
    any:
      - id: sys-module-header
      - id: sys-linker-header
      - id: mod-load-handler
      - id: moduledata-decl
      - id: bsd-kmod-mk
  - id: freebsd-kmod-headers
    desc: FreeBSD kernel module header set (with syscall table)
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/os/kernel/syscall::sys-sysent-header
    any:
      - id: sys-module-header
      - id: sys-linker-header
  - id: freebsd-syscall-hook
    desc: FreeBSD syscall table modification
    crit: suspicious
    conf: 0.98
    all:
      - id: sysent-array-access
      - id: sysent-struct-decl
  - id: freebsd-sysctl-hook
    desc: FreeBSD sysctl OID handler hooking
    crit: suspicious
    conf: 0.95
    all:
      - id: sysctl-handler-args
      - id: oid-handler-hook
      - id: freebsd-kmod-context
  - id: getdirentries-hook
    desc: FreeBSD getdirentries hook context
    crit: suspicious
    conf: 0.93
    attack: T1014
    all:
      - id: getdirentries-ref
      - id: freebsd-kmod-context
    any:
      - id: sysent-array-access
      - id: sysctl-handler-args
  - id: freebsd-privesc
    desc: FreeBSD kernel credential manipulation
    crit: suspicious
    conf: 0.95
    attack: T1068
    all:
      - id: freebsd-kmod-context
    any:
      - id: p-ruid-manipulation
      - id: cr-uid-manipulation
      - id: p-rgid-manipulation
  - id: freebsd-module-hiding
    desc: FreeBSD kernel module self-hiding
    crit: suspicious
    conf: 0.95
    attack: T1014
    all:
      - id: linker-files-ref
      - id: tailq-manipulation
    unless:
      - id: kernel-linker-impl-marker
  - id: freebsd-network-hiding
    desc: FreeBSD TCP connection hiding
    crit: suspicious
    conf: 0.95
    attack: T1014
    all:
      - id: freebsd-kmod-context
    any:
      - id: tcp-pcblist-ref
      - id: tcpctl-pcblist-ref
  - id: freebsd-process-hiding
    desc: FreeBSD process hiding via sysctl
    crit: suspicious
    conf: 0.9
    attack: T1014
    all:
      - id: sysctl-handler-args
      - id: freebsd-kmod-context
    any:
      - id: kern-proc-all-ref
      - id: kern-proc-pid-ref
  - id: freebsd-kmod-rootkit
    desc: FreeBSD kernel module rootkit detected
    crit: hostile
    conf: 0.98
    attack: T1014
    all:
      - id: freebsd-kmod-headers
    needs: 2
    any:
      - id: freebsd-syscall-hook
      - id: freebsd-sysctl-hook
      - id: freebsd-privesc
      - id: freebsd-module-hiding
      - id: freebsd-network-hiding
      - id: freebsd-process-hiding
