defaults:
  platforms: [windows, unix]
traits:
  - id: asm-cr0-manipulation
    desc: Inline assembly manipulating CR0 register
    crit: notable
    conf: 0.98
    for:
      - c
    if:
      type: tree-sitter
      node: asm_statement
      exact: cr0
      case_insensitive: true
  - id: asm-syscall-invocation
    desc: Inline assembly with direct syscall
    crit: notable
    conf: 0.85
    for:
      - c
    if:
      type: text
      regex: int.{0,10}0x80|syscall|sysenter
  - id: current-files-access
    desc: Current process file table access
    crit: notable
    conf: 0.85
    for:
      - c
    if:
      type: symbol
      kind: member
      exact: current->files
  - id: fdt-access
    desc: File descriptor table access
    crit: suspicious
    conf: 0.8
    for:
      - c
    if:
      type: symbol
      kind: member
      exact: ->fdt
  - id: f-path-dentry-access
    desc: File path dentry access (inode
    crit: suspicious
    conf: 0.8
    for:
      - c
    if:
      type: symbol
      kind: member
      exact: f_path.dentry
  - id: d-inode-access
    desc: Dentry inode access
    crit: suspicious
    conf: 0.8
    for:
      - c
    if:
      type: symbol
      kind: member
      exact: ->d_inode
  - id: i-ino-access
    desc: Inode number access (filesystem identification)
    crit: suspicious
    conf: 0.85
    for:
      - c
    if:
      type: symbol
      kind: member
      exact: i_ino
  - id: i-rdev-access
    desc: Inode device number access
    crit: suspicious
    conf: 0.8
    for:
      - c
    if:
      type: symbol
      kind: member
      exact: i_rdev
  - id: major-macro-call
    desc: MAJOR device number extraction
    crit: suspicious
    conf: 0.75
    for:
      - c
    if:
      type: symbol
      kind: call
      exact: MAJOR
  - id: syscall-table-decl
    desc: Syscall table pointer (syscall hooking)
    crit: suspicious
    conf: 0.99
    attack: T1014
    for:
      - c
    # `sys_call_table` is a cached identifier fact — match it directly (like the
    # `sethi_opcode`/`jmp_opcode` identifier traits), no comment/string FPs.
    if:
      type: symbol
      kind: identifier
      exact: sys_call_table
  - id: task-struct-decl
    desc: Task structure access (process manipulation)
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: text
      substr: task_struct
  - id: cred-struct-decl
    desc: Credential structure access (privilege escalation)
    crit: suspicious
    conf: 0.95
    for:
      - c
    if:
      type: text
      substr: struct cred
  - id: linux-dirent-decl
    desc: Directory entry structure (file/process hiding)
    crit: suspicious
    conf: 0.95
    for:
      - c
    # `linux_dirent` cached identifier fact (no per-node cursor walk).
    if:
      type: symbol
      kind: identifier
      exact: linux_dirent
  - id: pt-regs-decl
    desc: Register state structure (syscall interception)
    crit: suspicious
    conf: 0.85
    for:
      - c
    if:
      type: text
      substr: pt_regs
  - id: syscall-number-ref
    desc: Direct syscall number reference (syscall
    crit: suspicious
    conf: 0.9
    for:
      - c
    # `__NR_<syscall>` syscall-number macros — cached identifier fact.
    if:
      type: symbol
      kind: identifier
      regex: '^__NR_'
  - id: proc-root-ino-ref
    desc: Proc filesystem root inode (process
    crit: suspicious
    conf: 0.95
    for:
      - c
    if:
      type: text
      substr: PROC_ROOT_INO
  - id: cr0-wp-bit-manipulation
    desc: CR0 write-protect bit manipulation
    crit: suspicious
    conf: 0.99
    for:
      - c
    if:
      type: text
      substr: '0x00010000'
  - id: this-module-ref
    desc: Kernel module self-reference (module hiding)
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: symbol
      kind: member
      exact: THIS_MODULE
  - id: esrch-return
    desc: Return -ESRCH (no such process
    crit: suspicious
    conf: 0.8
    for:
      - c
    # `ESRCH` errno — cached identifier fact.
    if:
      type: symbol
      kind: identifier
      exact: ESRCH
  - id: error-code-return
    desc: Kernel error code return
    crit: component
    conf: 0.6
    for:
      - c
    # `return -E<NAME>` — the negative-errno return idiom. The `return -E`
    # prefix is the discriminator (a bare `E[A-Z]+` identifier would FP on
    # EXIT/ERROR/etc.), so this stays a source-text match.
    if:
      type: text
      regex: 'return\s+-E[A-Z]{2,}\b'
  - id: sys-memfd-create-ref
    desc: SYS_memfd_create syscall reference
    crit: suspicious
    conf: 0.95
    for:
      - elf
    if:
      type: text
      substr: SYS_memfd_create
  - id: finit-module-call
    desc: finit_module function call
    crit: suspicious
    conf: 0.95
    for:
      - elf
      - c
    if:
      type: symbol
      exact: 'finit_module'
    downgrade:
      any:
        - id: micro-behaviors/os/bpf/program/maps::bpf-map-hash
  - id: sys-finit-module-ref
    desc: SYS_finit_module syscall reference
    crit: component
    conf: 0.95
    for:
      - elf
      - c
    if:
      type: text
      substr: SYS_finit_module
  - id: lookup-address-call
    desc: lookup_address kernel function call
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: symbol
      kind: call
      exact: lookup_address
  - id: page-rw-flag
    desc: _PAGE_RW memory protection flag
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: string_literal
      substr: _PAGE_RW
  - id: page-nx-flag
    desc: _PAGE_NX memory protection flag
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: string_literal
      substr: _PAGE_NX
  - id: elf64-ehdr-decl
    desc: Elf64_Ehdr structure declaration
    crit: suspicious
    conf: 0.85
    for:
      - c
    if:
      type: text
      substr: Elf64_Ehdr
  - id: elf64-shdr-decl
    desc: Elf64_Shdr structure declaration
    crit: suspicious
    conf: 0.85
    for:
      - c
    if:
      type: text
      substr: Elf64_Shdr
  - id: elf64-phdr-decl
    desc: Elf64_Phdr structure declaration
    crit: suspicious
    conf: 0.85
    for:
      - c
    if:
      type: text
      substr: Elf64_Phdr
  - id: elf-entry-field
    desc: e_entry ELF entry point field
    crit: suspicious
    conf: 0.9
    for:
      - c
    if:
      type: symbol
      kind: member
      exact: e_entry
  - id: patch-string-ref
    desc: patch string reference
    crit: component
    conf: 0.6
    for:
      - c
    if:
      type: string_literal
      word: patch
  - id: task-flags-manipulation
    desc: Task flags manipulation (process hiding
    crit: suspicious
    conf: 0.98
    attack: T1014
    for:
      - c
    if:
      type: text
      substr: 'task->flags'
    unless:
      - id: metadata/lang/source::wine-compat-source
      - id: metadata/lang/source::windows-compat-api-source
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: pf-invisible-flag
    desc: PF_INVISIBLE flag value (0x10000000)
    crit: suspicious
    conf: 0.99
    attack: T1014
    for:
      - c
    if:
      type: tree-sitter
      kind: binary_op
      exact: '0x10000000'
composite_rules:
  - id: hooked-syscall-error-path
    desc: Kernel hook returns errno path
    crit: suspicious
    conf: 0.75
    for:
      - c
    all:
      - id: syscall-table-decl
      - id: error-code-return
