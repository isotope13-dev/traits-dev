defaults:
  platforms: [windows, unix]
  for:
    - c
traits:
  - id: solaris-ddi-header
    desc: Solaris DDI kernel header (driver kit)
    crit: component
    conf: 0.95
    attack: T1014
    if:
      type: symbol
      kind: import
      exact: sys/ddi.h
  - id: solaris-sunddi-header
    desc: Solaris DKI kernel header (driver interface)
    crit: component
    conf: 0.95
    attack: T1014
    if:
      type: symbol
      kind: import
      exact: sys/sunddi.h
  - id: solaris-modctl-header
    desc: Solaris module control header
    crit: suspicious
    conf: 0.95
    attack: T1014
    if:
      type: symbol
      kind: import
      exact: sys/modctl.h
  - id: solaris-syscall-header
    desc: Solaris syscall definitions header
    crit: suspicious
    conf: 0.9
    attack: T1014
    if:
      type: symbol
      kind: import
      exact: sys/syscall.h
  - id: solaris-cred-header
    desc: Solaris credentials header (privilege escalation)
    crit: suspicious
    conf: 0.95
    attack: T1068
    if:
      type: symbol
      kind: import
      exact: sys/cred.h
  - id: ddi-crit-unlock-call
    desc: ddi_exit_critical function
    crit: suspicious
    conf: 0.95
    attack: T1014
    if:
      type: symbol
      kind: call
      exact: ddi_exit_critical
  - id: kcred-kernel-cred
    desc: kcred kernel credential reference
    crit: suspicious
    conf: 0.99
    attack: T1068
    if:
      type: string_literal
      substr: kcred
  - id: sysent-reference
    desc: sysent syscall entry table reference
    crit: suspicious
    conf: 0.98
    attack: T1014
    if:
      type: string_literal
      regex: sysent\[
  - id: sethi-opcode-struct
    desc: SPARC sethi opcode structure (kernel instruction patching)
    crit: suspicious
    conf: 0.98
    attack: T1014
    if:
      type: symbol
      kind: identifier
      exact: sethi_opcode
  - id: jmp-opcode-struct
    desc: SPARC jmp/jmpl opcode structure (kernel jump patching)
    crit: suspicious
    conf: 0.98
    attack: T1014
    # Cached identifier fact (mirrors `sethi-opcode-struct` above) — matches the
    # `jmp_opcode`/`jmpl_opcode` identifier without a per-node cursor walk.
    if:
      type: symbol
      kind: identifier
      regex: 'jmpl?_opcode'
