defaults:
  platforms: [windows, unix]
  for:
    - c
  attack: T1014
traits:
  - id: mod-installed-zeroed
    desc: mod_installed flag zeroed (module hiding)
    crit: component
    conf: 0.97
    if:
      type: text
      word: mod_installed
  - id: mod-loaded-zeroed
    desc: mod_loaded flag zeroed (module hiding)
    crit: component
    conf: 0.97
    if:
      type: text
      word: mod_loaded
  - id: mod-nenabled-zeroed
    desc: mod_nenabled flag zeroed (module hiding)
    crit: component
    conf: 0.97
    if:
      type: text
      word: mod_nenabled
  - id: pid-prinactive-hiding
    desc: pid_prinactive flag manipulation (process hiding)
    crit: suspicious
    conf: 0.99
    if:
      type: text
      word: pid_prinactive
  - id: kobj-getsymvalue-call
    desc: kobj_getsymvalue runtime symbol lookup
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: kobj_getsymvalue
  - id: kobj-sync-call
    desc: kobj_sync after module unlink (remove symbols)
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: kobj_sync
  - id: rootkit-com-ref
    desc: rootkit.com reference string
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "rootkit.com"
  - id: hot-patch-sym
    desc: hot_patch_kernel_text symbol (kernel patching)
    crit: suspicious
    conf: 0.99
    if:
      type: symbol
      exact: hot_patch_kernel_text
  - id: ddi-crit-sym
    desc: ddi_enter_critical symbol (atomic kernel ops)
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: ddi_enter_critical
  - id: dtrace-disable-sym
    desc: dtrace_interrupt_disable symbol (disable tracing)
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: dtrace_interrupt_disable
  - id: dtrace-enable-sym
    desc: dtrace_interrupt_enable symbol
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: dtrace_interrupt_enable
  - id: crdup-sym
    desc: crdup symbol (credential duplication)
    crit: suspicious
    conf: 0.98
    attack: T1068
    if:
      type: symbol
      exact: crdup
  - id: kcred-crdup-raw
    desc: crdup(kcred) kernel credential elevation (raw)
    crit: suspicious
    conf: 0.99
    attack: T1068
    if:
      type: text
      substr: "crdup(kcred"
  - id: sysent-raw
    desc: sysent syscall entry table (raw)
    crit: suspicious
    conf: 0.98
    if:
      type: text
      word: sysent
  - id: solaris-ddi-raw
    desc: Solaris DDI header reference (raw)
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "sys/ddi.h"
composite_rules:
  - id: mod-state-zeroing
    desc: Module state flags zeroed (loaded/installed)
    crit: suspicious
    conf: 0.97
    any:
      - id: mod-installed-zeroed
      - id: mod-loaded-zeroed
      - id: mod-nenabled-zeroed
    needs: 2
