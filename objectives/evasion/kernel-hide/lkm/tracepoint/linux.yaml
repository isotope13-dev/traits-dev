defaults:
  # Linux kernel tracepoints (android shares the Linux kernel).
  platforms: [linux, android]
  for: [c]

traits:
  - id: fork-tracepoint-symbol
    desc: Fork tracepoint symbol reference
    crit: suspicious
    conf: 0.97
    attack: T1014
    if:
      type: string_literal
      exact: __tracepoint_sched_process_fork

  - id: tracepoint-probe-register
    desc: Tracepoint probe register symbol
    crit: suspicious
    conf: 0.88
    attack: T1014
    if:
      type: string_literal
      exact: tracepoint_probe_register

  - id: tracepoint-probe-unregister
    desc: Tracepoint probe unregister symbol
    crit: component
    conf: 0.84
    if:
      type: string_literal
      exact: tracepoint_probe_unregister

  - id: resolve-sym-helper
    desc: Dynamic symbol resolver helper
    crit: component
    conf: 0.78
    if:
      type: symbol
      exact: resolve_sym

  - id: hidden-parent-pid-check
    desc: Hidden parent PID check helper
    crit: suspicious
    conf: 0.92
    attack: T1014
    if:
      type: symbol
      exact: is_hidden_pid

  - id: hidden-child-pid-check
    desc: Hidden child PID check helper
    crit: suspicious
    conf: 0.9
    attack: T1014
    if:
      type: symbol
      exact: is_child_pid
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: child-pid-hide-propagation
    desc: Child PID hide propagation helper
    crit: suspicious
    conf: 0.94
    attack: T1014
    if:
      type: symbol
      exact: add_child_pid

    unless:
      - id: well-known/app/samba::samba-source-tree
  - id: notrace-keyword
    desc: notrace handler annotation
    crit: component
    conf: 0.8
    if:
      type: text
      word: notrace

  - id: export-symbol-macro
    desc: Kernel export symbol macro
    crit: component
    conf: 0.7
    if:
      type: text
      word: EXPORT_SYMBOL

  - id: ftrace-helper-include-path
    desc: Ftrace helper include path
    crit: suspicious
    conf: 0.9
    attack: T1014
    if:
      type: string_literal
      exact: ../ftrace/ftrace_helper.h

composite_rules:
  - id: tracepoint-hook-lifecycle
    desc: Fork tracepoint hook lifecycle
    crit: suspicious
    conf: 0.96
    attack: T1014
    all:
      - id: fork-tracepoint-symbol
      - id: tracepoint-probe-register
      - id: tracepoint-probe-unregister

  - id: hidden-child-process-propagation
    desc: Hidden process child propagation
    crit: suspicious
    conf: 0.97
    attack: T1014
    all:
      - id: child-pid-hide-propagation
    any:
      - id: hidden-parent-pid-check
      - id: hidden-child-pid-check

  - id: dynamic-tracepoint-resolution
    desc: Dynamic tracepoint symbol resolution
    crit: suspicious
    conf: 0.94
    attack: T1014
    all:
      - id: resolve-sym-helper
      - id: fork-tracepoint-symbol
    any:
      - id: tracepoint-probe-register
      - id: tracepoint-probe-unregister

  - id: notrace-tracepoint-handler
    desc: notrace tracepoint stealth handler
    crit: suspicious
    conf: 0.93
    attack: T1014
    all:
      - id: notrace-keyword
      - id: tracepoint-hook-lifecycle

  - id: tracepoint-module-exports
    desc: Exported tracepoint hook lifecycle
    crit: suspicious
    conf: 0.86
    attack: T1014
    all:
      - id: export-symbol-macro
      - id: tracepoint-hook-lifecycle

  - id: tracepoint-rootkit-hiding
    desc: Tracepoint-driven hidden process propagation
    crit: hostile
    conf: 0.99
    attack: T1014
    all:
      - id: tracepoint-hook-lifecycle
      - id: hidden-child-process-propagation
    any:
      - id: dynamic-tracepoint-resolution
      - id: notrace-tracepoint-handler
