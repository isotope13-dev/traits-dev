defaults:
  platforms: [linux]
  for: [c, cpp]
  attack: T1014

traits:
  - id: lkm-pf-packet-raw-socket
    desc: LKM PF_PACKET raw socket
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'sock_create\s*\(\s*PF_PACKET\s*,\s*SOCK_RAW'

  - id: lkm-socket-bpf-filter
    desc: LKM socket BPF attach
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'sock_setsockopt\s*\([\s\S]{0,90}SO_ATTACH_FILTER'

  - id: lkm-classic-bpf-filter-array
    desc: LKM classic BPF array
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'struct\s+sock_filter\s+\w+\s*\[\]\s*='
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-any
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: spa-rsa-signature-check
    desc: SPA RSA signature check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'verify_sig_rsa\s*\(\s*req\s*,\s*sig\s*\)'

  - id: spa-digest-memcmp-check
    desc: SPA digest memcmp check
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'memcmp\s*\(\s*sig->digest\s*,\s*hash\s*,\s*sig->digest_size'

  - id: spa-state-add-knock
    desc: SPA adds knock state
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'state_add\s*\(\s*knock_state'

  - id: lkm-guarded-port-param
    desc: LKM guarded port param
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'module_param_array\s*\(\s*ports'

  - id: lkm-listener-kthread
    desc: LKM listener kthread
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'kthread_create\s*\(\s*&listen\s*,\s*NULL'

  - id: lkm-state-gated-drop
    desc: LKM state gated NF_DROP
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'state_lookup\s*\(\s*knock_state[\s\S]{0,180}return\s+NF_DROP'

  - id: lkm-rcu-knock-state-list
    desc: LKM RCU knock state list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'list_for_each_entry_rcu\s*\([\s\S]{0,80}knock_state'

  - id: lkm-state-reaper-timer
    desc: LKM state reaper timer
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'mod_timer\s*\(\s*reaper[\s\S]{0,80}msecs_to_jiffies'

composite_rules:
  - id: lkm-spa-raw-listener
    desc: LKM raw SPA packet listener
    crit: hostile
    conf: 0.98
    all:
      - id: lkm-pf-packet-raw-socket
      - id: lkm-socket-bpf-filter
      - id: micro-behaviors/communications/socket/receive::kernel-recvmsg-symbol
      - id: spa-rsa-signature-check
      - id: spa-digest-memcmp-check
      - id: spa-state-add-knock
    any:
      - id: lkm-classic-bpf-filter-array
      - id: micro-behaviors/communications/socket/options::options-filter

  - id: lkm-netfilter-spa-gate
    desc: LKM netfilter SPA gate
    crit: hostile
    conf: 0.97
    all:
      - id: lkm-guarded-port-param
      - id: lkm-listener-kthread
      - id: lkm-state-gated-drop
    any:
      - id: micro-behaviors/os/kernel/module::nf-register-hook
      - id: micro-behaviors/os/kernel/module::nf-register-net-hook

  - id: lkm-rcu-spa-state-cache
    desc: LKM RCU SPA state cache
    crit: suspicious
    conf: 0.94
    all:
      - id: lkm-rcu-knock-state-list
      - id: lkm-state-reaper-timer
