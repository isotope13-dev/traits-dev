defaults:
  platforms: [windows, unix]
  for: [c]
traits:
  - id: d-reclen-manipulation
    desc: Directory entry record length manipulation
    crit: suspicious
    conf: 0.98
    attack: T1014
    if:
      type: ast
      kind: attribute
      exact: d_reclen
  - id: d-name-access
    desc: Directory entry name field access
    crit: suspicious
    conf: 0.8
    if:
      type: ast
      kind: attribute
      exact: d_name
  - id: simple-strtoul-call
    desc: String to unsigned long conversion
    crit: suspicious
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: simple_strtoul
  - id: find-task-by-pid-call
    desc: Kernel task lookup by PID
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: find_task_by_pid
  - id: task-pid-zero-assignment
    desc: Task PID field zeroed
    crit: component
    conf: 0.95
    attack: T1014
    if:
      type: text
      regex: '\btask->pid\s*=\s*0\b'
  - id: memmove-call
    desc: Memory move operation (often used
    crit: suspicious
    conf: 0.7
    if:
      type: ast
      kind: call
      exact: memmove
  - id: memcmp-dirent-context
    desc: Memory comparison (file prefix matching
    crit: suspicious
    conf: 0.7
    if:
      type: ast
      kind: call
      exact: memcmp
  - id: sect-attrs-removal
    desc: Module section attributes removal (hide
    crit: suspicious
    conf: 0.99
    attack: T1014
    if:
      type: ast
      kind: attribute
      exact: sect_attrs
  - id: list-add-call
    desc: Kernel list addition (module unhiding
    crit: suspicious
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: list_add
  - id: kfree-call
    desc: Kernel memory free (often used
    crit: suspicious
    conf: 0.7
    if:
      type: ast
      kind: call
      exact: kfree
  - id: corruption-mention-comment
    desc: Code mentions corruption/corrupting
    crit: suspicious
    conf: 0.95
    if:
      type: ast
      kind: comment
      exact: corrupt
      case_insensitive: true
  - id: stealthy-mention-comment
    desc: Code mentions stealth/stealthy
    crit: suspicious
    conf: 0.95
    if:
      type: ast
      kind: comment
      exact: stealth
      case_insensitive: true
  - id: unauthorized-mention-comment
    desc: Code mentions unauthorized access
    crit: notable
    conf: 0.95
    if:
      type: ast
      kind: comment
      regex: unauthori[sz]ed\s+(access|process|kernel)
      case_insensitive: true
  - id: defeating-mention-comment
    desc: Code mentions defeating protections
    crit: suspicious
    conf: 0.95
    if:
      type: ast
      kind: comment
      exact: defeat
      case_insensitive: true
  - id: persistence-mention-comment
    desc: Code mentions persistence
    crit: suspicious
    conf: 0.85
    if:
      type: ast
      kind: comment
      exact: persist
      case_insensitive: true
  - id: polymorphic-mention-comment
    desc: Code mentions polymorphic techniques
    crit: suspicious
    conf: 0.95
    if:
      type: ast
      kind: comment
      exact: polymorphic
      case_insensitive: true
  - id: covert-channel-mention-comment
    desc: Code mentions covert channels/communication
    crit: suspicious
    conf: 0.95
    if:
      type: ast
      kind: comment
      exact: covert
      case_insensitive: true
  - id: rootkit-mention-comment
    desc: Code explicitly mentions rootkit
    crit: suspicious
    conf: 1.0
    if:
      type: ast
      kind: comment
      exact: rootkit
      case_insensitive: true
  - id: malware-mention-comment-malware
    desc: Code explicitly mentions malware/backdoor
    crit: suspicious
    conf: 1.0
    if:
      type: ast
      kind: comment
      exact: malware
      case_insensitive: true
  - id: malware-mention-comment-backdoor
    desc: Code explicitly mentions malware/backdoor
    crit: suspicious
    conf: 1.0
    if:
      type: ast
      kind: comment
      exact: backdoor
      case_insensitive: true
  - id: privilege-escalation-mention-comment
    desc: Code explicitly mentions privilege escalation
    crit: suspicious
    conf: 0.95
    if:
      type: ast
      kind: comment
      regex: privilege.?escalation|privilege-escalation
      case_insensitive: true
    unless:
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: evasion-mention-comment-evasion
    desc: Code mentions evasion techniques
    crit: suspicious
    conf: 0.9
    if:
      type: ast
      kind: comment
      exact: evasion
      case_insensitive: true
  - id: evasion-mention-comment-evade
    desc: Code mentions evasion techniques
    crit: suspicious
    conf: 0.9
    if:
      type: ast
      kind: comment
      exact: evade
      case_insensitive: true
  - id: syscall-hook-mention-comment
    desc: Code mentions syscall hooking
    crit: suspicious
    conf: 0.95
    if:
      type: ast
      kind: comment
      regex: syscall.{0,20}(hook|intercept)
      case_insensitive: true
    unless:
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: hide-function-name-hide-proc
    desc: Function hides process or module
    crit: suspicious
    conf: 0.85
    if:
      type: ast
      kind: function
      regex: '(^|_)hide_(process|pid|module)'
      case_insensitive: true

  - id: hide-function-name-hide-net
    desc: Function hides port or connection
    crit: suspicious
    conf: 0.85
    if:
      type: ast
      kind: function
      regex: '(^|_)hide_(port|conn)'
      case_insensitive: true

  - id: hide-function-name-hide-fs
    desc: Function hides file or directory
    crit: notable
    conf: 0.85
    if:
      type: ast
      kind: function
      regex: '(^|_)hide_(file|dir)'
      case_insensitive: true

  - id: hide-function-name-invisible
    desc: Function name suggests hiding capability
    crit: suspicious
    conf: 0.85
    if:
      type: ast
      kind: function
      exact: "invisible"
      case_insensitive: true

  - id: hide-function-name-stealth
    desc: Function name suggests hiding capability
    crit: suspicious
    conf: 0.85
    if:
      type: ast
      kind: function
      exact: "stealth"
      case_insensitive: true

  - id: hiding-init-exit-pattern
    desc: hiding_<resource>_init/exit rootkit lifecycle
    crit: suspicious
    conf: 0.9
    attack: T1014
    if:
      type: text
      regex: '\bhiding_[a-z][a-z_]{2,30}_(init|exit)\b'

  - id: hiding-header-guard
    desc: HIDING_<resource>_H header guard naming
    crit: notable
    conf: 0.8
    attack: T1014
    if:
      type: text
      regex: '\bHIDING_[A-Z][A-Z0-9_]{2,30}_H\b'

  - id: hook-syscall-literal
    desc: Function name contains hook syscall
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: '(^|_)(hook|hijack).{0,20}syscall$'

  - id: hook-syscall-target
    desc: Function name hooks sys_ target
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: '(^|_)(hook|hijack).{0,20}sys_[a-z0-9_]+$'
  - id: random-prefix-function
    desc: Function with random-looking prefix (obfuscation)
    crit: suspicious
    conf: 0.7
    if:
      type: ast
      kind: function
      regex: ^([a-f0-9]{8,}|x[a-f0-9]{8,})_
    not:
      - regex: ^(CRYPTO|OpenSSL|ssize|ares_)
  - id: underscore-heavy-naming
    desc: Heavy underscore usage in names
    crit: component
    conf: 0.6
    if:
      type: ast
      node: declaration
      regex: ^__[a-z]{1,40}(_[a-z0-9]{1,40}){1,8}
    not:
      - regex: ^__kernel_
      - regex: ^__pyx_
      - regex: ^__declspec
      - regex: ^__gnu_
      - regex: ^__cgo_
      - regex: ^__user
      - regex: ^__iomem
      - regex: ^__be[0-9]+
      - regex: ^__le[0-9]+
composite_rules:
  - id: malware-mention-comment
    desc: Code explicitly mentions malware/backdoor
    crit: suspicious
    conf: 1.0
    any:
      - id: malware-mention-comment-malware
      - id: malware-mention-comment-backdoor
  - id: evasion-mention-comment
    desc: Code mentions evasion techniques
    crit: suspicious
    conf: 0.9
    any:
      - id: evasion-mention-comment-evasion
      - id: evasion-mention-comment-evade
  - id: hide-function-name
    desc: Function name suggests hiding capability
    crit: suspicious
    conf: 0.85
    any:
      - id: hide-function-name-hide-proc
      - id: hide-function-name-hide-net
      - id: hide-function-name-hide-fs
      - id: hide-function-name-invisible
      - id: hide-function-name-stealth
      - id: hiding-init-exit-pattern
  - id: hiding-mention-comment
    desc: Code mentions hiding/hidden
    crit: suspicious
    conf: 0.9
    not:
      - substr: ssid
      - substr: hidden flag
      - substr: want_hidden
    any:
      - id: objectives/evasion/kernel-hide/lkm/hiding/
  - id: obfuscated-hide-symbols
    desc: Obfuscated hiding symbol names
    crit: suspicious
    conf: 0.8
    all:
      - id: underscore-heavy-naming
      - id: hide-function-name
    any:
      - id: hook-syscall-function-name
    needs: 1
  - id: hook-syscall-function-name
    desc: Function name suggests syscall hooking
    crit: suspicious
    conf: 0.9
    any:
      - id: hook-syscall-literal
      - id: hook-syscall-target
  - id: linux-task-pid-zero-hide
    desc: Linux kernel process hidden by zeroing PID
    crit: hostile
    conf: 0.96
    attack: T1014
    all:
      - id: find-task-by-pid-call
      - id: task-pid-zero-assignment
    any:
      - id: objectives/evasion/kernel-hide/lkm/headers::kernel-module-header-detect
      - id: objectives/evasion/kernel-hide/lkm/internals::task-struct-decl
  - id: hiding-module-naming-convention
    desc: Rootkit hiding-module naming convention
    crit: suspicious
    conf: 0.95
    attack: T1014
    mbc: F0015
    all:
      - id: hiding-init-exit-pattern
      - id: hiding-header-guard
