defaults:
  # Linux kernel-module hiding — linux-only by definition.
  platforms: [linux]
  for: [c]
traits:
- id: d-reclen-manipulation
  desc: Directory entry record length manipulation
  crit: suspicious
  conf: 0.98
  attack: T1014
  if:
    type: symbol
    kind: member
    exact: d_reclen
- id: d-name-access
  desc: Directory entry name field access
  crit: suspicious
  conf: 0.8
  if:
    type: symbol
    kind: member
    exact: d_name
- id: hook-getdents64-function
  desc: getdents64 hook function
  crit: suspicious
  conf: 0.92
  attack: T1014
  if:
    type: symbol
    substr: hook_getdents64
- id: hidden-dirent-name-compare
  desc: Directory entry hidden by name
  crit: suspicious
  conf: 0.95
  attack: T1014
  if:
    type: text
    regex: 'strcmp\s*\(\s*d->d_name\s*,\s*"[^"]{1,80}"\s*\)\s*==\s*0'
  not:
    - substr: "import_stmt"
    - substr: "import_name"
    - substr: "funcdef"
    - substr: "classdef"
    - substr: "future_hack"
  unless:
    - id: well-known/lib/glibc
    - id: well-known/app/util-linux::util-linux-source-tree
    - type: text
      regex: 'strcmp\s*\(\s*d->d_name\s*,\s*"some-(file|dir|fifo)"\s*\)\s*==\s*0'
- id: hardcoded-hidden-file-name
  desc: Hardcoded hidden filename
  crit: suspicious
  conf: 0.88
  attack: T1014
  if:
    type: string_literal
    exact: file_to_hide
- id: dirent-memmove-record-removal--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: d->d_reclen
  count_max: 1032024
- id: dirent-memmove-record-removal--rx-2
  desc: memmove adjusts dirent record
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '\bmemmove\s*\([^;\n]{0,160}d_reclen|d_reclen[^;\n]{0,160}\bmemmove\s*\('
  count_max: 1032025
- id: dirent-memmove-record-removal--rx-3
  desc: dirent char-pointer arithmetic
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '\(\s*char\s*\*\s*\)\s*(d|dirp|current|next)\b'
  count_max: 1032026
- id: find-task-by-pid-call
  desc: Kernel task lookup by PID
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: find_task_by_pid
- id: task-pid-zero-assignment
  desc: Task PID field zeroed
  crit: component
  conf: 0.95
  attack: T1014
  if:
    type: text
    regex: '\btask->pid\s*=\s*0\b'
- id: sect-attrs-removal
  desc: Module section attributes removal (hide
  crit: suspicious
  conf: 0.99
  attack: T1014
  if:
    type: symbol
    kind: member
    exact: sect_attrs
- id: corruption-mention-comment
  desc: Code mentions corruption/corrupting
  crit: notable
  conf: 0.95
  if:
    type: comment
    regex: '(?i)corrupt(?:ing|ion)?\s*(?:kernel|memory|task|pid|module)'
- id: stealthy-mention-comment
  desc: Code mentions stealth/stealthy
  crit: notable
  conf: 0.95
  if:
    type: comment
    substr: stealth
    case_insensitive: true
- id: unauthorized-mention-comment
  desc: Code mentions unauthorized access
  crit: suspicious
  conf: 0.95
  if:
    type: comment
    regex: unauthori[sz]ed\s+(access|process|kernel)
    case_insensitive: true
  unless:
  - id: well-known/app/samba::samba-source-tree
  - id: metadata/file/string/artifact::linux-syscall-note-license
  - id: metadata/lang/source::linux-kernel-header-source-path
# Requires a protection/mitigation object, matching this trait's description and
# the idiom of its siblings (corrupt+kernel/memory, persist+rootkit/backdoor).
# A bare `defeat` substring matched ordinary English prose in any C comment
# ("caching here would defeat the purpose"), which fired on the bundled RE2 C++
# sources of the legitimate npm `re2` package.
- id: defeating-mention-comment
  desc: Code mentions defeating protections
  crit: notable
  conf: 0.95
  if:
    type: comment
    regex: '(?i)defeat(?:ing|s|ed)?\s+(?:the\s+)?(?:kaslr|smep|smap|lockdown|secure\s*boot|signature|integrity|protection|mitigation|detection|antivirus|edr|sandbox|hardening|kernel)'
- id: persistence-mention-comment
  desc: Code mentions persistence
  crit: notable
  conf: 0.85
  if:
    type: comment
    regex: '(?i)persist(?:ence|ent)?\s*(?:hook|rootkit|backdoor|malware)'
- id: polymorphic-mention-comment
  desc: Comment mentions polymorphic malware
  crit: notable
  conf: 0.95
  if:
    type: comment
    regex: '(?i)polymorphic\s+(?:malware|pack(?:er|ing)?|engine|virus|rootkit|binary|code)'
- id: covert-channel-mention-comment
  desc: Code mentions covert channels/communication
  crit: notable
  conf: 0.95
  if:
    type: comment
    substr: covert
    case_insensitive: true
  unless:
  - id: metadata/lang/source::linux-kernel-source-tree-path
- id: rootkit-mention-comment
  desc: Code explicitly mentions rootkit
  crit: notable
  conf: 1.0
  if:
    type: comment
    substr: rootkit
    case_insensitive: true
- id: malware-mention-comment-malware
  desc: Code explicitly mentions malware/backdoor
  crit: notable
  conf: 1.0
  if:
    type: comment
    substr: malware
    case_insensitive: true
- id: malware-mention-comment-backdoor
  desc: Code explicitly mentions malware/backdoor
  crit: notable
  conf: 1.0
  if:
    type: comment
    substr: backdoor
    case_insensitive: true
  unless:
  - id: metadata/lang/source::linux-kernel-source-tree-path
- id: evasion-mention-comment-evasion
  desc: Code mentions evasion techniques
  crit: notable
  conf: 0.9
  if:
    type: comment
    substr: evasion
    case_insensitive: true
  unless:
  - id: metadata/lang/source::linux-kernel-source-tree-path
- id: evasion-mention-comment-evade
  desc: Code mentions evasion techniques
  crit: notable
  conf: 0.9
  if:
    type: comment
    substr: evade
    case_insensitive: true
- id: hide-function-name-hide-proc
  desc: Function hides process or module
  crit: suspicious
  conf: 0.85
  if:
    type: symbol
    kind: function
    regex: '^hide_(process|pid|module)(_|$)'

- id: hide-function-name-hide-net
  desc: Function hides port or connection
  crit: suspicious
  conf: 0.85
  if:
    type: symbol
    kind: function
    regex: '^hide_(port|conn)(_|$)'

- id: hide-function-name-hide-fs
  desc: Function hides file or directory
  crit: suspicious
  conf: 0.85
  if:
    type: symbol
    kind: function
    regex: '^hide_(file|dir)(_|$)'

- id: hide-function-name-invisible
  desc: Function name suggests hiding capability
  crit: suspicious
  conf: 0.85
  if:
    type: symbol
    kind: function
    exact: "invisible"

- id: hide-function-name-stealth
  desc: Function name suggests hiding capability
  crit: suspicious
  conf: 0.85
  if:
    type: symbol
    kind: function
    exact: "stealth"

- id: hiding-init-exit-pattern
  desc: hiding_<resource>_init/exit rootkit lifecycle
  crit: suspicious
  conf: 0.9
  attack: T1014
  if:
    type: text
    regex: '\bhiding_[a-z][a-z_]{2,30}_(init|exit)\b'

- id: hiding-header-guard
  desc: HIDING_<resource>_H header guard naming
  crit: notable
  conf: 0.8
  attack: T1014
  if:
    type: text
    regex: '\bHIDING_[A-Z][A-Z0-9_]{2,30}_H\b'

- id: hook-syscall-literal
  desc: Function name contains hook syscall
  crit: component
  conf: 0.85
  if:
    type: symbol
    regex: '(^|_)(hook|hijack).{0,20}syscall$'

- id: hook-syscall-target
  desc: Function name hooks sys_ target
  crit: component
  conf: 0.85
  if:
    type: symbol
    regex: '(^|_)(hook|hijack).{0,20}sys_[a-z0-9_]+$'
composite_rules:
- id: malware-mention-comment
  desc: Code explicitly mentions malware/backdoor
  crit: suspicious
  conf: 1.0
  any:
  - id: malware-mention-comment-malware
  - id: malware-mention-comment-backdoor
- id: evasion-mention-comment
  desc: Code mentions evasion techniques
  crit: suspicious
  conf: 0.9
  any:
  - id: evasion-mention-comment-evasion
  - id: evasion-mention-comment-evade
- id: hide-function-name
  desc: Function name suggests hiding capability
  crit: suspicious
  conf: 0.85
  any:
  - id: hide-function-name-hide-proc
  - id: hide-function-name-hide-net
  - id: hide-function-name-hide-fs
  - id: hide-function-name-invisible
  - id: hide-function-name-stealth
  - id: hiding-init-exit-pattern
- id: hiding-mention-comment
  desc: Code mentions hiding/hidden
  crit: suspicious
  conf: 0.9
  not:
  - substr: ssid
  - substr: hidden flag
  - substr: want_hidden
  any:
  - id: objectives/evasion/kernel-hide/lkm/hiding/
- id: obfuscated-hide-symbols
  desc: Obfuscated hiding symbol names
  crit: suspicious
  conf: 0.8
  all:
  - id: objectives/anti-static/obfuscation/name-mangling/variables::random-prefix-function
  - id: hide-function-name
  any:
  - id: hook-syscall-function-name
- id: hook-syscall-function-name
  desc: Function name suggests syscall hooking
  crit: suspicious
  conf: 0.9
  any:
  - id: hook-syscall-literal
  - id: hook-syscall-target
- id: linux-task-pid-zero-hide
  desc: Linux kernel process hidden by zeroing PID
  crit: hostile
  conf: 0.96
  attack: T1014
  all:
  - id: find-task-by-pid-call
  - id: task-pid-zero-assignment
  any:
  - id: micro-behaviors/os/kernel/module::linux-module-header-include
  - id: micro-behaviors/os/kernel/struct::task-struct
- id: linux-getdents-dirent-filter
  desc: Linux getdents directory entry hiding
  crit: hostile
  conf: 0.98
  attack: T1014
  all:
  - id: hook-getdents64-function
  - id: hidden-dirent-name-compare
  - id: dirent-memmove-record-removal
  any:
  - id: hardcoded-hidden-file-name
  - id: micro-behaviors/os/kernel/routines::copy-from-user
  - id: micro-behaviors/os/kernel/routines::copy-to-user
- id: linux-lkm-syscall-getdents-rootkit
  desc: Linux LKM syscall getdents rootkit
  crit: hostile
  conf: 0.99
  attack: T1014
  all:
  - id: linux-getdents-dirent-filter
  - id: objectives/evasion/kernel-hide/hook::syscall-table-write
  any:
  - id: objectives/evasion/kernel-hide/hook::cr0-write-protect-disable-source
  - id: objectives/evasion/kernel-hide/lkm/rootkit::kprobes-kallsyms
  - id: micro-behaviors/os/kernel/routines::kallsyms-lookup-symbol
- id: hiding-module-naming-convention
  desc: Rootkit hiding-module naming convention
  crit: suspicious
  conf: 0.95
  attack: T1014
  mbc: F0015
  all:
  - id: hiding-init-exit-pattern
  - id: hiding-header-guard
- id: dirent-memmove-record-removal
  desc: Removes dirent record with memmove
  crit: suspicious
  conf: 0.96
  attack: T1014
  all:
  - id: dirent-memmove-record-removal--rx-1
  - id: dirent-memmove-record-removal--rx-2
  - id: dirent-memmove-record-removal--rx-3
  near_bytes: 4096
