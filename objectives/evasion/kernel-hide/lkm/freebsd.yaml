# FreeBSD Kernel Module (kmod) Rootkit Detection
# ATT&CK: T1014 (Rootkit), T1068 (Privilege Escalation)
defaults:
  for: [c]
  platforms: [unix]
traits:
  # FREEBSD KERNEL MODULE HEADERS
  - id: sys-module-header
    desc: FreeBSD kernel module header include
    crit: notable
    conf: 0.95
    attack: "T1014"
    if:
      type: raw
      substr: "sys/module.h"
  - id: sys-sysent-header
    desc: FreeBSD syscall entry table header
    crit: notable
    conf: 0.98
    attack: "T1014"
    if:
      type: raw
      substr: "sys/sysent.h"
  - id: sys-linker-header
    desc: FreeBSD kernel linker interface
    crit: notable
    conf: 0.95
    attack: "T1014"
    if:
      type: raw
      substr: "sys/linker.h"
  - id: sys-sysctl-header
    desc: FreeBSD sysctl interface header
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "sys/sysctl.h"

  # SYSCALL TABLE MODIFICATION
  - id: sysent-array-access
    desc: Direct syscall table array access
    crit: suspicious
    conf: 0.98
    attack: "T1014"
    if:
      type: raw
      regex: "sysent\\s*\\["
  - id: sysent-struct-decl
    desc: Sysent structure declaration (syscall replacement)
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    if:
      type: raw
      substr: "struct sysent"

  # SYSCTL OID HOOKING
  - id: sysctl-handler-args
    desc: Sysctl handler function signature
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: "SYSCTL_HANDLER_ARGS"
  - id: oid-handler-hook
    desc: Sysctl OID handler pointer replacement
    crit: suspicious
    conf: 0.98
    attack: "T1014"
    if:
      type: raw
      substr: "oid_handler"

  # KERNEL/USER BOUNDARY (FreeBSD-specific)
  - id: copyin-call
    desc: FreeBSD kernel copyin from userspace
    crit: notable
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: "copyin"
  - id: copyout-call
    desc: FreeBSD kernel copyout to userspace
    crit: notable
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: "copyout"

  # LINKER FILE LIST MANIPULATION (module hiding)
  - id: linker-files-ref
    desc: FreeBSD linker_files list reference
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    if:
      type: raw
      substr: "linker_files"
  - id: tailq-manipulation
    desc: TAILQ list manipulation in kernel context
    crit: component
    conf: 0.8
    if:
      type: raw
      substr: "TAILQ_NEXT"

  # FREEBSD MODULE LIFECYCLE
  - id: mod-load-handler
    desc: FreeBSD MOD_LOAD module init handler
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: "MOD_LOAD"
  - id: moduledata-decl
    desc: FreeBSD moduledata_t declaration
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: "moduledata_t"

  # PROCESS CREDENTIAL MANIPULATION
  - id: p-ruid-manipulation
    desc: Direct process real UID field access
    crit: suspicious
    conf: 0.95
    attack: "T1068"
    if:
      type: raw
      substr: "p_ruid"
  - id: cr-uid-manipulation
    desc: Direct credential UID field access
    crit: notable
    conf: 0.95
    attack: "T1068"
    if:
      type: raw
      substr: "cr_uid"
  - id: p-rgid-manipulation
    desc: Direct process real GID field access
    crit: suspicious
    conf: 0.95
    attack: "T1068"
    if:
      type: raw
      substr: "p_rgid"

  # BSD KMOD BUILD SYSTEM
  - id: bsd-kmod-mk
    desc: FreeBSD kernel module build system
    crit: suspicious
    conf: 0.95
    for: [c, shell]
    if:
      type: raw
      substr: "bsd.kmod.mk"

  # ROOTKIT NAMING PATTERNS
  - id: trojaned-function-prefix
    desc: Function named with trojan prefix
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      regex: "trojaned_[a-z]"
  - id: r00ter-leet-name
    desc: Leet-speak rooter variable name
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      substr: "r00ter"

  # GETDIRENTRIES HOOKING (FreeBSD file hiding)
  - id: getdirentries-hook
    desc: FreeBSD getdirentries syscall reference
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    for: [binaries, scripts]
    if:
      type: raw
      word: "getdirentries"

  # TCP PCB LIST MANIPULATION (network hiding)
  - id: tcp-pcblist-ref
    desc: TCP PCB list reference (connection hiding)
    crit: suspicious
    conf: 0.9
    attack: "T1014"
    if:
      type: raw
      substr: "tcp_pcblist"
  - id: tcpctl-pcblist-ref
    desc: TCPCTL_PCBLIST sysctl constant
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    if:
      type: raw
      substr: "TCPCTL_PCBLIST"

  # KERN_PROC SYSCTL HOOKING (process hiding)
  - id: kern-proc-all-ref
    desc: KERN_PROC_ALL sysctl reference
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "KERN_PROC_ALL"
  - id: kern-proc-pid-ref
    desc: KERN_PROC_PID sysctl reference
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "KERN_PROC_PID"

composite_rules:
  - id: freebsd-kmod-headers
    desc: FreeBSD kernel module header set (with syscall table)
    crit: suspicious
    conf: 0.95
    all:
      - id: sys-sysent-header
    any:
      - id: sys-module-header
      - id: sys-linker-header
  - id: freebsd-syscall-hook
    desc: FreeBSD syscall table modification
    crit: suspicious
    conf: 0.98
    all:
      - id: sysent-array-access
      - id: sysent-struct-decl
  - id: freebsd-sysctl-hook
    desc: FreeBSD sysctl OID handler hooking
    crit: suspicious
    conf: 0.95
    all:
      - id: sysctl-handler-args
      - id: oid-handler-hook
  - id: freebsd-privesc
    desc: FreeBSD kernel credential manipulation
    crit: suspicious
    conf: 0.95
    attack: "T1068"
    any:
      - id: p-ruid-manipulation
      - id: cr-uid-manipulation
      - id: p-rgid-manipulation
  - id: freebsd-module-hiding
    desc: FreeBSD kernel module self-hiding
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    all:
      - id: linker-files-ref
      - id: tailq-manipulation
  - id: freebsd-network-hiding
    desc: FreeBSD TCP connection hiding
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    any:
      - id: tcp-pcblist-ref
      - id: tcpctl-pcblist-ref
  - id: freebsd-process-hiding
    desc: FreeBSD process hiding via sysctl
    crit: suspicious
    conf: 0.9
    attack: "T1014"
    all:
      - id: sysctl-handler-args
    any:
      - id: kern-proc-all-ref
      - id: kern-proc-pid-ref
  - id: freebsd-kmod-rootkit
    desc: FreeBSD kernel module rootkit detected
    crit: hostile
    conf: 0.98
    attack: "T1014"
    all:
      - id: freebsd-kmod-headers
    needs: 2
    any:
      - id: freebsd-syscall-hook
      - id: freebsd-sysctl-hook
      - id: freebsd-privesc
      - id: freebsd-module-hiding
      - id: freebsd-network-hiding
      - id: freebsd-process-hiding
