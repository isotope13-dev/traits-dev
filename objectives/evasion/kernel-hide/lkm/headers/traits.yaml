defaults:
  # Linux kernel-module headers — linux-only by definition.
  platforms: [linux]
  for:
    - c
traits:
  - id: kunit-test-header
    desc: KUnit test header include
    crit: notable
    conf: 0.99
    if:
      type: string_literal
      regex: <kunit/test\.h>
  - id: kprobes-include-str
    desc: linux/kprobes.h include
    crit: notable
    conf: 0.95
    attack: T1014
    if:
      type: string_literal
      regex: linux/kprobes\.h
    downgrade:
      any:
        - type: string_literal
          regex: <linux/(module|export)\.h>
    unless:
      - id: objectives/evasion/kernel-hide/lkm/headers::kunit-test-header
  - id: kernel-module-header-detect
    desc: Linux kernel module header detection
    crit: baseline
    conf: 0.99
    if:
      type: string_literal
      regex: <linux/module\.h>
  - id: dirent-include-str
    desc: linux/dirent.h include (file hiding)
    crit: suspicious
    conf: 0.9
    attack: T1014
    if:
      type: string_literal
      regex: linux/dirent\.h
    unless:
      - id: micro-behaviors/os/syscall/invoke/
  - id: linkage-include-str
    desc: linux/linkage.h include (kernel ABI)
    crit: baseline
    conf: 0.85
    if:
      type: string_literal
      regex: linux/linkage\.h
    downgrade:
      any:
        - type: string_literal
          regex: <linux/(module|export)\.h>
  - id: syscall-table-str
    desc: __syscall_table reference
    crit: suspicious
    conf: 0.95
    attack: T1014
    if:
      type: string_literal
      substr: __syscall_table
  - id: linux-dirent-str
    desc: linux_dirent structure
    crit: suspicious
    conf: 0.9
    attack: T1014
    if:
      type: string_literal
      word: linux_dirent
  - id: cr0-variable-str
    desc: cr0 register variable
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: \bcr0\b\s*([=)\]])
    unless:
      - id: well-known/lib/wine::wine-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
    downgrade:
      any:
        - type: string_literal
          regex: <linux/(module|export)\.h>
  - id: force-order-str
    desc: __force_order variable (CR0 compiler barrier)
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: __force_order
  - id: nr-getdents-str
    desc: NR_getdents syscall number reference
    crit: suspicious
    conf: 0.9
    attack: T1014
    if:
      type: string_literal
      substr: NR_getdents
  - id: kernel-module-header
    desc: Linux kernel module header (loadable
    crit: suspicious
    conf: 0.98
    if:
      type: symbol
      kind: import
      exact: linux/module.h
  - id: kernel-header
    desc: Linux kernel header
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: import
      exact: linux/kernel.h
  - id: kernel-syscalls-header
    desc: Linux syscall definitions (syscall hooking)
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: import
      exact: linux/syscalls.h
  - id: kernel-dirent-header
    desc: Linux directory entry header (file
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: import
      exact: linux/dirent.h
    unless:
      - id: micro-behaviors/os/syscall/invoke/
  - id: kernel-cred-header
    desc: "Linux credentials header"
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: import
      exact: linux/cred.h
  - id: kernel-kallsyms-header
    desc: Linux kallsyms header (kernel symbol
    crit: suspicious
    conf: 0.98
    if:
      type: symbol
      kind: import
      exact: linux/kallsyms.h
  - id: kernel-fault-inject-header
    desc: 'Linux fault injection header'
    crit: notable
    conf: 0.99
    if:
      type: string_literal
      regex: linux/fault-inject\.h
  - id: kernel-ftrace-header
    desc: Linux ftrace header (function tracing/hooking)
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: import
      exact: linux/ftrace.h
  - id: kernel-kprobes-header
    desc: Linux kprobes header
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: import
      exact: linux/kprobes.h
  - id: kernel-procfs-header
    desc: Linux procfs header (process hiding)
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: import
      exact: linux/proc_fs.h
  - id: kernel-fdtable-header
    desc: Linux fdtable header (descriptor hiding)
    crit: notable
    conf: 0.9
    attack: T1014
    if:
      type: string_literal
      regex: linux/fdtable\.h
  - id: kernel-inet-diag-header
    desc: Linux INET diagnostics header
    crit: notable
    conf: 0.8
    attack: T1014
    if:
      type: string_literal
      regex: linux/inet_diag\.h
  - id: kernel-nf-conntrack-header
    desc: Netfilter conntrack netlink header
    crit: notable
    conf: 0.92
    attack: T1014
    if:
      type: string_literal
      regex: linux/netfilter/nfnetlink_conntrack\.h
  - id: kernel-audit-header
    desc: Linux audit subsystem header
    crit: component
    conf: 0.88
    attack: T1070.002
    if:
      type: string_literal
      regex: linux/audit\.h
  - id: kernel-syslog-header
    desc: Linux syslog subsystem header
    crit: notable
    conf: 0.88
    attack: T1070.002
    if:
      type: string_literal
      regex: linux/syslog\.h
  - id: kernel-io-uring-header
    desc: Linux io_uring header
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: linux/io_uring\.h
  - id: ftrace-helper-include
    desc: Ftrace helper library (common rootkit
    crit: suspicious
    conf: 0.99
    if:
      type: symbol
      kind: import
      exact: ftrace_helper
  - id: for-each-process-macro
    desc: Kernel process enumeration macro
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: for_each_process
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/lang/source::linux-kernel-source-tree-path
  - id: exit-attribute
    desc: __exit Linux module cleanup attribute
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?m)\)\s*__exit\s*([;,{])'
  - id: force-order-variable
    desc: __force_order variable (prevent CR0 write
    crit: suspicious
    conf: 0.95
    # `__force_order` — cached identifier fact (the CR0-write compiler barrier).
    if:
      type: symbol
      kind: identifier
      exact: __force_order
composite_rules:
  - id: lkm-kprobe-hide-header-cluster
    desc: LKM kprobe hiding header cluster
    crit: hostile
    conf: 0.98
    attack: T1014
    all:
      - id: kernel-module-header-detect
      - id: kprobes-include-str
      - id: dirent-include-str
      - id: micro-behaviors/os/kernel/headers::linux-sched-signal-header
      - id: kernel-fdtable-header
    any:
      - id: micro-behaviors/os/kernel/headers::linux-tracepoint-header
      - id: micro-behaviors/os/kernel/headers::linux-sock-diag-header
      - id: kernel-inet-diag-header
  - id: lkm-network-stealth-header-cluster
    desc: LKM network stealth header cluster
    crit: hostile
    conf: 0.99
    attack: T1014
    all:
      - id: kernel-module-header-detect
      - id: kprobes-include-str
      - id: micro-behaviors/os/kernel/headers::linux-sock-diag-header
      - id: kernel-inet-diag-header
      - id: kernel-nf-conntrack-header
      - id: micro-behaviors/os/kernel/headers::linux-user-mode-helper-header
    any:
      - id: kernel-audit-header
      - id: kernel-syslog-header
      - id: micro-behaviors/os/kernel/headers::linux-bpf-header
      - id: kernel-io-uring-header
