defaults:
  # Linux kernel-module compat surface — linux-only by definition.
  platforms: [linux]
  for: [binaries, source]
  attack: T1014

traits:
  - id: kallsyms-lookup-name-call
    desc: kallsyms_lookup_name call text
    for: [c, cpp, elf]
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'kallsyms_lookup_name\(["a-zA-Z_]'
    unless:
      - id: metadata/file/string/artifact::linux-syscall-note-license
      - id: metadata/lang/source::linux-kernel-header-source-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context

  - id: kallsyms-lookup-name-pointer
    desc: kallsyms_lookup_name pointer
    for: [c, cpp, elf]
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\*\s*kallsyms_lookup_name'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: kallsyms-lookup-name-typedef
    desc: kallsyms_lookup_name typedef
    for: [c, cpp, elf]
    crit: notable
    conf: 0.9
    if:
      type: text
      word: kallsyms_lookup_name_t

  - id: kallsyms-lookup-name-quoted
    desc: kallsyms_lookup_name quoted
    for: [c, cpp, elf]
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: '"kallsyms_lookup_name"'

composite_rules:
  - id: kallsyms-lookup-name-str
    desc: kallsyms_lookup_name string reference
    for: [c, cpp, elf]
    crit: notable
    conf: 0.9
    any:
      - id: kallsyms-lookup-name-call
      - id: kallsyms-lookup-name-pointer
      - id: kallsyms-lookup-name-typedef
      - id: kallsyms-lookup-name-quoted
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
