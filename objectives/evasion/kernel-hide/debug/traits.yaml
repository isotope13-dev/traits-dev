defaults:
  platforms: [macos]
  for: [c]

traits:
  - id: macos-sysctl-debug-node
    desc: macOS debug sysctl root node
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: SYSCTL_NODE(_debug,OID_AUTO
  - id: macos-sysctl-debug-children
    desc: macOS multiple debug sysctl children
    crit: suspicious
    conf: 0.9
    count_min: 4
    if:
      type: raw
      substr: SYSCTL_PROC(_debug_rubilyn
