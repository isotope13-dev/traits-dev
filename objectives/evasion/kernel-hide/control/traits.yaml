defaults:
  platforms: [macos]
  for: [c]

traits:
  - id: macos-sysctl-proc-anybody
    desc: macOS sysctl node writable by anybody
    crit: suspicious
    conf: 0.9
    attack: T1014
    if:
      type: raw
      regex: SYSCTL_PROC\([\s\S]{0,120}CTLFLAG_ANYBODY
  - id: macos-sysctl-handle-string
    desc: macOS sysctl string handler
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: sysctl_handle_string
  - id: macos-sysctl-register-oid
    desc: macOS sysctl OID registration burst
    crit: suspicious
    conf: 0.9
    count_min: 4
    if:
      type: raw
      substr: sysctl_register_oid(&sysctl__debug_rubilyn
