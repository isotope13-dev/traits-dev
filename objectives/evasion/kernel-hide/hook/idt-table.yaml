defaults:
  platforms: [windows, linux]
  for: [c, cpp]
  attack: T1014

traits:
  - id: sidt-instruction-source
    desc: SIDT instruction in kernel source
    crit: notable
    conf: 0.9
    if:
      type: text
      word: sidt
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: linux-idt-offset-write
    desc: Linux IDT descriptor overwritten
    crit: component
    conf: 0.94
    platforms: [linux]
    if:
      type: text
      regex: '\bidt\[.{0,32}\]\.offset_(hi|lo)\s*='
  - id: windows-idt-offset-write
    desc: Windows IDT descriptor overwritten
    crit: component
    conf: 0.94
    platforms: [windows]
    if:
      type: text
      regex: '\bidtEntry\[.{0,32}\]\.(LowOffset|HiOffset)\s*='
  - id: hook-idt-routine
    desc: HookIDT routine symbol
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)hookidt'
  - id: linux-idt-table-substitution
    desc: Linux IDT table substitution
    crit: suspicious
    conf: 0.96
    platforms: [linux]
    if:
      type: text
      regex: 'local_store_idt[\s\S]{0,500}local_load_idt'
  - id: linux-idt-hook-handler-table
    desc: Linux IDT hook handler table
    crit: suspicious
    conf: 0.95
    platforms: [linux]
    if:
      type: text
      regex: 'idt_fake_hdlrs[\s\S]{0,500}idt_hook\[256\]'

composite_rules:
  - id: idt-interrupt-table-hook
    desc: Kernel IDT interrupt handler hook
    crit: hostile
    conf: 0.95
    all:
      - id: sidt-instruction-source
      - id: hook-idt-routine
    any:
      - id: linux-idt-offset-write
      - id: windows-idt-offset-write
  - id: linux-idt-table-substitution-hook
    desc: Linux IDT table substitution hook
    crit: hostile
    conf: 0.98
    all:
      - id: sidt-instruction-source
      - id: linux-idt-table-substitution
      - id: linux-idt-hook-handler-table
