defaults:
  platforms: [unix]
  for: [c, elf]
traits:
  - id: kernel-addr-i386
    desc: i386 kernel virtual address constant
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "0xc0000000"
  - id: kernel-addr-x64
    desc: x86_64 kernel text address constant
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "0xffffffff81000000"
  - id: sys-close-probe
    desc: sys_close reference (syscall table fingerprint)
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: sys_close
    unless:
      - id: metadata/vendor/netbsd::runtime-linker-artifact
composite_rules:
  - id: brute-force-syscall-scan
    desc: Brute-force kernel memory scan for syscall
    crit: suspicious
    conf: 0.95
    attack: T1014
    all:
      - id: objectives/evasion/kernel-hide/hook::syscall-table-ref
    any:
      - id: kernel-addr-i386
      - id: kernel-addr-x64
      - id: sys-close-probe
