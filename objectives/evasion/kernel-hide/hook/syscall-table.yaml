defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries, c]
traits:
  - id: syscall-table-ref
    desc: Reference to sys_call_table
    crit: baseline
    conf: 0.8
    if:
      type: raw
      substr: sys_call_table
  - id: nr-syscall-ref
    desc: Reference to __NR_ syscalls
    crit: baseline
    conf: 0.8
    if:
      type: raw
      substr: __NR_
  - id: syscall-table-assign
    desc: Assignment into sys_call_table
    crit: notable
    conf: 0.9
    for: [c]
    if:
      type: ast
      kind: assignment
      exact: "sys_call_table\\s*\\["
composite_rules:
  - id: syscall-table-write
    desc: Assigns into sys_call_table
    crit: suspicious
    conf: 0.9
    attack: T1014
    mbc: F0004
    all:
      - id: syscall-table-assign
      - id: nr-syscall-ref
