defaults:
  platforms: [linux]
  for: [c, elf]
traits:
  - id: syscall-table-ref
    desc: Reference to sys_call_table
    crit: component
    conf: 0.8
    if:
      type: text
      substr: sys_call_table
  - id: nr-syscall-ref
    desc: Reference to __NR_ syscalls
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: __NR_
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: named-nr-getdents-ref
    desc: Named getdents syscall number
    crit: suspicious
    conf: 0.88
    if:
      type: text
      word: MY_NR_getdents
  - id: syscall-table-assign
    desc: Assignment into sys_call_table
    crit: suspicious
    conf: 0.9
    for: [c]
    if:
      type: symbol
      kind: bind
      exact: "sys_call_table\\s*\\["
  - id: syscall-table-index-assign
    desc: Assignment into syscall table index
    crit: suspicious
    conf: 0.92
    for: [c]
    if:
      type: text
      regex: '\b_{0,2}syscall_table\s*\[[^\]]{1,80}\]\s*='
  - id: syscall-table-pointer-arith
    desc: Syscall table pointer arithmetic
    crit: component
    conf: 0.9
    for: [c]
    if:
      type: text
      regex: 'syscall_table\s*\+\s*__NR_[A-Za-z0-9_]+'
  - id: syscall-table-deref-write
    desc: Syscall table pointer overwritten
    crit: notable
    conf: 0.94
    for: [c]
    if:
      type: text
      regex: '\*\s*\(.{0,40}\)\s*\(\s*syscall_table\s*\+'
  - id: syscall-table-symbol-retrieve
    desc: Runtime syscall table symbol retrieval
    crit: suspicious
    conf: 0.94
    for: [c]
    if:
      type: text
      substr: 'symbol_retrieve("sys_call_table")'
composite_rules:
  - id: syscall-table-write
    desc: Assigns into sys_call_table
    crit: suspicious
    conf: 0.9
    attack: T1014
    mbc: F0004
    all:
      - id: syscall-table-index-assign
    any:
      - id: nr-syscall-ref
      - id: named-nr-getdents-ref
      - id: syscall-table-assign
  - id: syscall-table-pointer-overwrite
    desc: Overwrites Linux syscall table entry
    crit: hostile
    conf: 0.95
    attack: T1014
    mbc: F0004
    all:
      - id: syscall-table-pointer-arith
      - id: syscall-table-deref-write
      - id: nr-syscall-ref
  - id: syscall-table-readonly-pointer-overwrite
    desc: Overwrites Linux syscall table through read-only memory writer
    crit: hostile
    conf: 0.98
    attack: T1014
    mbc: F0004
    all:
      - id: syscall-table-ref
      - id: syscall-table-symbol-retrieve
      - id: objectives/evasion/kernel-hide/hook::kernel-write-protection-bypass
