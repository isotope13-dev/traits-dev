defaults:
  platforms:
    - linux
    - unix
  for: [source]
traits:
  - id: kernel-symbol-enumeration
    desc: Enumerates exported kernel symbols
    crit: notable
    conf: 0.95
    if:
      type: raw
      exact: movl $130,%eax                    # get num kernel syms
  - id: syscall-table-symbol
    desc: Resolves sys_call_table symbol
    crit: notable
    conf: 0.95
    if:
      type: raw
      exact: .string "sys_call_table"
  - id: current-task-symbol
    desc: Resolves current task pointer
    crit: notable
    conf: 0.92
    if:
      type: raw
      exact: .string "current"
  - id: kmalloc-symbol
    desc: Resolves kmalloc allocator symbol
    crit: notable
    conf: 0.92
    if:
      type: raw
      exact: .string "kmalloc"
  - id: dev-kmem-open
    desc: Opens /dev/kmem for writes
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      exact: movl $devkmem,%ebx           # open /dev/kmem
  - id: uname-hook-allocation
    desc: Temporarily hooks uname allocator
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      exact: movl $122,%eax                    # call uname to alloc some space
  - id: execve-residency-sentinel
    desc: Synthetic execve residency probe
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      exact: movl $0x666,%ebx
  - id: execve-hook-export
    desc: Exports replacement execve handler
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      exact: .global newexecve
  - id: task-credential-offset
    desc: Kernel task credential offset
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      exact: leal 0x310(%eax),%esi
composite_rules:
  - id: linux-kmem-execve-rootkit-source
    desc: Linux /dev/kmem execve rootkit
    crit: suspicious
    conf: 0.98
    attack: T1014
    mbc: F0004
    all:
      - id: syscall-table-symbol
      - id: current-task-symbol
      - id: kmalloc-symbol
      - id: execve-hook-export
      - id: task-credential-offset
    any:
      - id: dev-kmem-open
      - id: uname-hook-allocation
      - id: kernel-symbol-enumeration
  - id: kernel-credential-tamper-hook
    desc: Kernel hook overwrites caller credentials
    crit: suspicious
    conf: 0.97
    attack: T1068
    all:
      - id: execve-hook-export
      - id: task-credential-offset
      - id: execve-residency-sentinel
