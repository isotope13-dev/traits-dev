defaults:
  platforms: [windows, unix]
  for: [c, cpp]
traits:
  - id: x86-opcode-prefix-rex
    desc: Scanning for x86 REX prefix
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\b(opcode|modrm)\b.{0,40}\b0x40\b'
  - id: x86-opcode-prefix-66
    desc: Scanning for x86 0x66 prefix
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\b(opcode|modrm)\b.{0,40}\b0x66\b'
  - id: x86-opcode-prefix-0f
    desc: Scanning for x86 0x0F prefix
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\b(opcode|modrm)\b.{0,40}\b0x0F\b'
  - id: x86-modrm-shift
    desc: Decoding x86 ModR/M shift
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'modrm\s*>>\s*6'
  - id: x86-modrm-mask
    desc: Decoding x86 ModR/M mask
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'modrm\s*&\s*0x7'
composite_rules:
  - id: lkm-instruction-decoder
    desc: Kernel module contains x86 instruction length decoder
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/evasion/kernel-hide/hook::x86-opcode-prefix-rex
      - id: objectives/evasion/kernel-hide/hook::x86-opcode-prefix-66
      - id: objectives/evasion/kernel-hide/hook::x86-opcode-prefix-0f
      - id: objectives/evasion/kernel-hide/hook::x86-modrm-shift
      - id: objectives/evasion/kernel-hide/hook::x86-modrm-mask
