# Kernel Kill Syscall Hooking Behaviors
# ATT&CK: T1014 (Rootkit)
defaults:
  platforms: [windows, unix]
  for: [c]
traits:
- id: kill-hook-sig-switch-core
  desc: Switch signal dispatch block
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'switch\s*\(\s*sig\s*\)\s*\{[\s\S]{0,500}case\s+SIG[A-Z_]+'
  not:
  - regex: 'case\s+SIG[A-Z_]+:\s*name\s*=\s*"SIG[A-Z_]+"\s*;'
- id: kill-hook-action-marker
  desc: Kill hook privilege markers
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(prepare_creds|commit_creds|task\s*->\s*flags)'
- id: kill-hook-hide-marker
  desc: Kill hook hide markers
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(hide(pid|proc|module)?|invisible)'
- id: kill-hook-privesc-trigger-text
  desc: Kill signal root trigger pattern
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'case\s+SIG[A-Z_]+:\s*[a-zA-Z0-9_]*[Rr]oot\s*\('
- id: kill-hook-invis-toggle-text
  desc: Kill hook invisibility xor flag
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'task\s*->\s*flags\s*\^?=\s*0x10000000'
- id: kill-hook-python-signal-marker
  desc: Python signal handler marker
  crit: notable
  conf: 0.82
  if:
    type: text
    substr: PyOS_sighandler_t
- id: kill-hook-kill-context--sys-kill
  desc: Kill hook syscall symbol (sys_kill)
  crit: component
  conf: 0.88
  if:
    type: text
    word: sys_kill
- id: kill-hook-kill-context--x64-sys-kill
  desc: Kill hook syscall symbol (__x64_sys_kill)
  crit: component
  conf: 0.88
  if:
    type: text
    word: __x64_sys_kill
- id: kill-hook-kill-context--arm64-sys-kill
  desc: Kill hook syscall symbol (__arm64_sys_kill)
  crit: component
  conf: 0.88
  if:
    type: text
    word: __arm64_sys_kill
- id: kill-hook-kill-context--hook-kill
  desc: Kill hook syscall symbol (hook_kill)
  crit: component
  conf: 0.88
  if:
    type: text
    word: hook_kill
- id: kill-hook-compat-func--mingw
  desc: Compatibility signal wrapper function (mingw)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: mingw
- id: kill-hook-compat-func--posix
  desc: Compatibility signal wrapper function (posix)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: posix
- id: kill-hook-compat-func--compat
  desc: Compatibility signal wrapper function (compat)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: compat
- id: kill-hook-compat-func--wrapper
  desc: Compatibility signal wrapper function (wrapper)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: wrapper
- id: kill-hook-signal-runtime-func--emulate
  desc: Signal runtime function (emulate)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: emulate
- id: kill-hook-signal-runtime-func--signal
  desc: Signal runtime function (_signal)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: _signal
- id: kill-hook-signal-runtime-func--force-sig
  desc: Signal runtime function (force_sig)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: force_sig
- id: kill-hook-signal-runtime-func--send-sig
  desc: Signal runtime function (send_sig)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: send_sig
- id: kill-hook-signal-helper-func--getsig
  desc: Signal helper function (getsig)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: getsig
- id: kill-hook-signal-helper-func--setsig
  desc: Signal helper function (setsig)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: setsig
- id: kill-hook-signal-helper-func--sighandler
  desc: Signal helper function (sighandler)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: sighandler
- id: kill-hook-signal-helper-func--sig-handler
  desc: Signal helper function (sig_handler)
  crit: notable
  conf: 0.82
  if:
    type: symbol
    kind: function
    regex: sig_handler
composite_rules:
- id: kill-hook-kill-marker
  desc: Kill hook syscall symbol
  crit: component
  conf: 0.88
  any:
  - id: kill-hook-kill-context--sys-kill
  - id: kill-hook-kill-context--x64-sys-kill
  - id: kill-hook-kill-context--arm64-sys-kill
  - id: kill-hook-kill-context--hook-kill
- id: kill-hook-compat-func
  desc: Compatibility signal wrapper function
  crit: notable
  conf: 0.82
  any:
  - id: kill-hook-compat-func--mingw
  - id: kill-hook-compat-func--posix
  - id: kill-hook-compat-func--compat
  - id: kill-hook-compat-func--wrapper
- id: kill-hook-signal-runtime-func
  desc: Signal runtime function
  crit: notable
  conf: 0.82
  any:
  - id: kill-hook-signal-runtime-func--emulate
  - id: kill-hook-signal-runtime-func--signal
  - id: kill-hook-signal-runtime-func--force-sig
  - id: kill-hook-signal-runtime-func--send-sig
- id: kill-hook-signal-helper-func
  desc: Signal helper function
  crit: notable
  conf: 0.82
  any:
  - id: kill-hook-signal-helper-func--getsig
  - id: kill-hook-signal-helper-func--setsig
  - id: kill-hook-signal-helper-func--sighandler
  - id: kill-hook-signal-helper-func--sig-handler
- id: kill-hook-sig-switch
  desc: Switch signal in kill hook (control)
  crit: suspicious
  conf: 0.92
  attack: "T1014"
  all:
  - id: kill-hook-sig-switch-core
  - id: kill-hook-kill-marker
  any:
  - id: kill-hook-action-marker
  - id: kill-hook-hide-marker
  unless:
  - id: objectives/evasion/kernel-hide/hook/
  - id: objectives/evasion/kernel-hide/hook/
  - id: objectives/evasion/kernel-hide/hook/
  - id: kill-hook-python-signal-marker
- id: kill-hook-privesc-trigger
  desc: Kill hook triggers privilege escalation
  crit: suspicious
  conf: 0.95
  attack: "T1068"
  all:
  - id: kill-hook-privesc-trigger-text
  - id: kill-hook-kill-marker
- id: kill-hook-invis-toggle
  desc: Kill hook toggles invisibility flag
  crit: suspicious
  conf: 0.95
  attack: "T1014"
  all:
  - id: kill-hook-invis-toggle-text
  - id: kill-hook-action-marker
  - id: kill-hook-hide-marker
