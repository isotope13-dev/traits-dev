# Linux Kernel Write Protection Bypass Detection
defaults:
  platforms: [linux]
  for: [c, cpp]
traits:
  - id: kernel-write-protection-bypass
    desc: "kernel write protection bypass techniques."
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: "slrk_write_(read|ptr_read)_only"
  - id: cr0-wp-bit-clear-source
    desc: Clears CR0 write-protect bit
    crit: suspicious
    conf: 0.96
    attack: T1014
    if:
      type: text
      regex: '(cr0\s*&\s*~0x00010000|read_cr0\(\)\s*&\s*~CR0_WP)'
    unless:
      - id: metadata/lang/source::linux-kernel-arch-source-path
  - id: cr0-inline-mov-source
    desc: Inline assembly writes CR0
    crit: suspicious
    conf: 0.94
    attack: T1014
    if:
      type: string_literal
      substr: 'mov %0, %%cr0'
    unless:
      - type: text
        word: CR0_PG
      - type: text
        regex: 'mov %0, %%cr[34]'
      - id: metadata/lang/source::linux-kernel-arch-source-path
  - id: cr0-wp-bit-restore-source
    desc: Restores CR0 write-protect bit
    crit: suspicious
    conf: 0.94
    attack: T1014
    if:
      type: text
      regex: 'write_cr0\(read_cr0\(\) \| CR0_WP\)'
    unless:
      - id: metadata/lang/source::linux-kernel-arch-source-path
  - id: readonly-write-wrapper-source
    desc: Protected kernel memory write wrapper
    crit: suspicious
    conf: 0.95
    attack: T1014
    if:
      type: text
      regex: 'disable_write_protect\(\);[\s\S]{0,80}memcpy\('
    unless:
      - id: metadata/lang/source::linux-kernel-arch-source-path

composite_rules:
  - id: cr0-write-protect-disable-source
    desc: Disables kernel CR0 write protection
    crit: suspicious
    conf: 0.97
    attack: T1014
    all:
      - id: cr0-wp-bit-clear-source
    any:
      - id: cr0-inline-mov-source
      - id: objectives/evasion/kernel-hide/module::write-cr0
  - id: cr0-protected-kernel-write-source
    desc: CR0-gated protected kernel write
    crit: hostile
    conf: 0.98
    attack: T1014
    all:
      - id: cr0-wp-bit-clear-source
      - id: cr0-wp-bit-restore-source
      - id: readonly-write-wrapper-source
