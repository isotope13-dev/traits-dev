# Linux Kernel Write Protection Bypass Detection
defaults:
  platforms: [linux]
  for: [c, cpp]

traits:
  - id: kernel-write-protection-bypass
    desc: Detects kernel write protection bypass techniques.
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: "slrk_write_(read|ptr_read)_only"
