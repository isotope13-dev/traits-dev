defaults:
  platforms: [windows]
  for: [pe, c, cpp]
  attack: T1014

traits:
  - id: ke-service-descriptor-table-ref
    desc: KeServiceDescriptorTable reference
    crit: component
    conf: 0.92
    if:
      type: text
      word: KeServiceDescriptorTable
  - id: zw-query-system-info-target
    desc: ZwQuerySystemInformation hook target
    crit: notable
    conf: 0.93
    if:
      type: text
      # Do not treat strings in an embedded driver/image as code in the
      # containing PE.  The hook target is meaningful only when it is present
      # in the host image's executable section.
      section: .text
      word: ZwQuerySystemInformation
  - id: zw-query-directory-file-target
    desc: ZwQueryDirectoryFile hook target
    crit: component
    conf: 0.93
    if:
      type: text
      word: ZwQueryDirectoryFile
  - id: mapped-system-call-table-write
    desc: Mapped SSDT entry write
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "MappedSystemCallTable[SYSCALL_INDEX("
  - id: system-process-info-filter
    desc: System process list filter
    crit: component
    conf: 0.9
    if:
      type: text
      word: SYSTEMPROCESSINFORMATION

composite_rules:
  - id: windows-ssdt-process-list-hook
    desc: Windows SSDT process-list hook
    crit: hostile
    conf: 0.96
    all:
      - id: ke-service-descriptor-table-ref
      - id: zw-query-system-info-target
    any:
      - id: mapped-system-call-table-write
      - id: system-process-info-filter
      - id: objectives/evasion/kernel-hide/lkm/hiding::hide-function-name
    needs: 2
  - id: windows-ssdt-enumeration-hook-driver
    desc: Windows SSDT enumeration hook driver
    crit: hostile
    conf: 0.96
    all:
      - id: ke-service-descriptor-table-ref
    any:
      - id: zw-query-system-info-target
      - id: zw-query-directory-file-target
    unless:
      - id: well-known/lib/wine::wine-runtime-component
