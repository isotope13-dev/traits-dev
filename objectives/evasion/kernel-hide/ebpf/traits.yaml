  - id: password-string
- id: http-manipulation-action
  desc: HTTP manipulation actions
  crit: suspicious
  conf: 0.8
  for:
  - c
  - elf
  any:
  - id: http-routes
  - id: http-edit
  - id: http-drop
- id: http-manipulation
  desc: eBPF program performing HTTP traffic
  crit: suspicious
  conf: 0.95
  attack: T1557
  for:
  - c
  - elf
  all:
  - id: micro-behaviors/os/bpf/program/loader::sec-xdp
  - id: http-string
  - id: http-manipulation-action
- id: kprobe-syscall-intercept
