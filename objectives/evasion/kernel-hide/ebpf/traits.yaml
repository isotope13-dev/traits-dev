  - id: metadata/package/files/system-package::julia-system-image-shared-object
- id: bpf-map-create-syscall--rx-1
  desc: BPF_MAP_CREATE/SYS_bpf syscall
  crit: component
  conf: 0.88
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '\b(BPF_MAP_CREATE|SYS_bpf|__NR_bpf)\b'
  count_max: 1030779
- id: bpf-map-create-syscall--rx-2
  desc: Raw bpf() syscall invocation
  crit: component
  conf: 0.88
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: 'syscall\s*\(\s*(SYS_bpf|__NR_bpf)'
  count_max: 1030780
- id: bpf-map-update-syscall
  desc: BPF map update syscall
  crit: component
  conf: 0.88
  attack: T1014
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    substr: BPF_MAP_UPDATE_ELEM
- id: bpf-map-delete-syscall
  desc: BPF map delete syscall
  crit: notable
  conf: 0.88
  attack: T1014
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    substr: BPF_MAP_DELETE_ELEM
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: metadata/file/string/artifact::linux-syscall-note-license
  - id: metadata/lang/source::linux-kernel-header-source-path
- id: bpf-hidden-object-names--rx-3
  desc: Rootkit map name hide_pids/files
  crit: component
  conf: 0.9
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(hidden|hide)_(pids?|files?)\b'
  count_max: 1030783
- id: bpf-hidden-object-names--rx-4
  desc: Rootkit map name hide_names/ports
  crit: component
  conf: 0.9
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(hidden|hide)_(names?|ports?)\b'
  count_max: 1030784
- id: bpf-hidden-object-names--rx-5
  desc: Rootkit map name hide_tcp/targets
  crit: component
  conf: 0.9
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(hidden|hide)_(tcp|targets?)\b'
  count_max: 1030785
- id: bpf-rootkit-controller-actions--rx-6
  desc: Named hide/unhide process or file action
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(hide|unhide)[_-](pids?|files?)\b'
  count_max: 1030786
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: bpf-rootkit-controller-actions--rx-7
  desc: Named hide/unhide port or TCP action
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(hide|unhide)[_-](ports?|tcp)\b'
  count_max: 1030787
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: bpf-rootkit-controller-actions--rx-8
  desc: hidden pid/file flush action
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(list_hidden|flush_hidden)\b.{0,40}\b(pid|file)\b'
  count_max: 1030788
- id: bpf-rootkit-controller-actions--rx-9
  desc: Lists or flushes hidden ports
