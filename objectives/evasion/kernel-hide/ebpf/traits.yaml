defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: sec-syscall-enter
  desc: SEC("tp/syscalls/sys_enter_") tracepoint
  crit: notable
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    regex: SEC\("t(p|racepoint)/syscalls/sys_enter_
- id: sec-syscall-exit
  desc: SEC("tp/syscalls/sys_exit_") tracepoint
  crit: notable
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    regex: SEC\("t(p|racepoint)/syscalls/sys_exit_
- id: sec-uprobe
  desc: SEC("uprobe/") section marker
  crit: notable
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    substr: SEC("uprobe/
- id: xdp-tcph
  desc: XDP TCP header parsing marker
  crit: component
  conf: 0.62
  for:
  - c
  - elf
  if:
    type: text
    regex: struct\s+tcphdr|tcphdr\s*\*
- id: xdp-payload-xdp-packet
  desc: XDP or packet payload reference
  crit: component
  conf: 0.5
  for:
  - c
  if:
    type: string_literal
    regex: (xdp|packet)[_-]?(payload|data)
- id: xdp-payload-ctx
  desc: Context payload or data reference
  crit: component
  conf: 0.5
  for:
  - c
  if:
    type: string_literal
    regex: ctx[_-]?(payload|data)
- id: xdp-payload-pointer
  desc: Payload pointer offset or length
  crit: component
  conf: 0.5
  for:
  - c
  if:
    type: string_literal
    regex: payload[_-]?(ptr|offset|len)
- id: datadog-ebpf
  desc: github.com/DataDog/ebpf library
  crit: notable
  conf: 0.85
  for:
  - go
  size_min: 1
  if:
    type: text
    substr: github.com/DataDog/ebpf
- id: go-bindata-asset-dep
  desc: Go bindata embedded asset dependency
  crit: notable
  conf: 0.8
  for: [go.mod]
  size_min: 1
  if:
    type: text
    regex: 'github\.com/[A-Za-z0-9_.-]+/go-bindata\b'
- id: ebpf-new-collection
  desc: Loads eBPF program collection (Go)
  crit: suspicious
  conf: 0.85
  for:
  - go
  if:
    type: string_literal
    substr: ebpf.NewCollection
- id: ebpf-new-program
  desc: Loads an eBPF program (Go)
  crit: suspicious
  conf: 0.85
  for:
  - go
  if:
    type: string_literal
    substr: ebpf.NewProgram
- id: load-pinned-program
  desc: Loads a pinned eBPF program (Go)
  crit: suspicious
  conf: 0.85
  for:
  - go
  if:
    type: string_literal
    substr: LoadPinnedProgram
- id: getdents64-kretprobe
  desc: SYSCALL_KRETPROBE getdents64 hook
  crit: suspicious
  conf: 0.95
  for:
  - c
  if:
    type: text
    substr: SYSCALL_KRETPROBE(getdents64)
- id: bpf-override-return
  desc: bpf_override_return helper usage
  crit: suspicious
  conf: 0.9
  for:
  - c
  - elf
  if:
    type: symbol
    exact: bpf_override_return
- id: getdents64-tracepoint
  desc: "Hooks getdents64 tracepoint hide directories"
  crit: suspicious
  conf: 0.9
  for:
  - c
  - elf
  if:
    type: text
    substr: tp/syscalls/sys_exit_getdents64
- id: crypt-verify
  desc: crypt_verify password-check hook target
  crit: component
  conf: 0.7
  for:
  - c
  - elf
  if:
    type: text
    substr: crypt_verify
- id: http-routes
  desc: http_routes manipulation
  crit: suspicious
  conf: 0.7
  for:
  - c
  - elf
  if:
    type: text
    substr: http_routes
- id: http-edit
  desc: eBPF HTTP_EDIT packet-rewrite action
  crit: suspicious
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    substr: HTTP_EDIT
- id: http-drop
  desc: eBPF HTTP_DROP packet action
  crit: suspicious
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    substr: HTTP_DROP
- id: http-string-action-a
  desc: HTTP action edit or drop
  crit: suspicious
  conf: 0.3
  for:
  - c
  if:
    type: string_literal
    regex: HTTP[_-](EDIT|DROP)
- id: http-string-action-b
  desc: HTTP action pass or redirect
  crit: suspicious
  conf: 0.3
  for:
  - c
  if:
    type: string_literal
    regex: HTTP[_-](PASS|REDIRECT)
  unless:
  - id: well-known/lib/wine::wine-source-tree
  - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
  - id: well-known/lib/benign-runtime-bundles::php-source-tree
- id: http-string-action-c
  desc: HTTP action hijack
  crit: suspicious
  conf: 0.3
  for:
  - c
  if:
    type: string_literal
    regex: HTTP[_-]HIJACK
- id: http-string-packet-near
  desc: HTTP and packet near each other
  crit: component
  conf: 0.3
  for:
  - c
  if:
    type: string_literal
    regex: packet.{0,20}HTTP|HTTP.{0,20}packet
- id: password-string-direct-a
  desc: Password buffer pointer or length
  crit: component
  conf: 0.4
  for:
  - c
  - elf
  downgrade:
    any:
    - id: well-known/tool/sysadmin/rustdesk/
    - id: well-known/app/adguardhome::release-path
  if:
    type: text
    regex: password[_-]?(buf|ptr|len)
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: password-string-direct-b
  desc: Password hash or data
  crit: component
  conf: 0.4
  for:
  - c
  - elf
  if:
    type: text
    regex: password[_-]?(hash|data)
- id: password-string-op
  desc: Password getter or checker
  crit: component
  conf: 0.4
  for:
  - c
  - elf
  downgrade:
    any:
    - id: well-known/tool/sysadmin/rustdesk/
  if:
    type: text
    regex: (get|check)[_-]?password
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: sql-uprobe-target
  desc: SQL query uprobe target
  crit: suspicious
  conf: 0.9
  for:
  - c
  - elf
  if:
    type: text
    regex: uprobe/(SQLDBQueryContext|SQLiteConnQuery)
- id: query-override-state
  desc: SQL query override state
  crit: suspicious
  conf: 0.85
  for:
  - c
  - elf
  if:
    type: text
    regex: query_override(_pattern|_gen)?
