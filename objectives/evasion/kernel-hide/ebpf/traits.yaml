defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: sec-syscall-enter
  desc: SEC("tp/syscalls/sys_enter_") tracepoint
  crit: notable
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    regex: SEC\("t(p|racepoint)/syscalls/sys_enter_
- id: sec-syscall-exit
  desc: SEC("tp/syscalls/sys_exit_") tracepoint
  crit: suspicious
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    regex: SEC\("t(p|racepoint)/syscalls/sys_exit_
- id: sec-uprobe
  desc: SEC("uprobe/") section marker
  crit: notable
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    substr: SEC("uprobe/
- id: xdp-iph
  desc: IP header struct reference
  crit: notable
  conf: 0.5
  for:
  - c
  - elf
  if:
    type: text
    exact: iph
- id: xdp-tcph
  desc: TCP header struct reference
  crit: notable
  conf: 0.5
  for:
  - c
  - elf
  if:
    type: text
    exact: tcph
- id: xdp-payload-xdp-packet
  desc: XDP or packet payload reference
  crit: suspicious
  conf: 0.5
  for:
  - c
  if:
    type: string_literal
    regex: (xdp|packet)[_-]?(payload|data)
- id: xdp-payload-ctx
  desc: Context payload or data reference
  crit: suspicious
  conf: 0.5
  for:
  - c
  if:
    type: string_literal
    regex: ctx[_-]?(payload|data)
- id: xdp-payload-pointer
  desc: Payload pointer offset or length
  crit: suspicious
  conf: 0.5
  for:
  - c
  if:
    type: string_literal
    regex: payload[_-]?(ptr|offset|len)
- id: cilium-ebpf
  desc: github.com/cilium/ebpf library
  crit: suspicious
  conf: 0.85
  for:
  - go
  if:
    type: string_literal
    substr: github.com/cilium/ebpf
- id: libbpfgo
  desc: github.com/aquasecurity/libbpfgo library
  crit: suspicious
  conf: 0.85
  for:
  - go
  if:
    type: string_literal
    substr: github.com/aquasecurity/libbpfgo
- id: datadog-ebpf
  desc: github.com/DataDog/ebpf library
  crit: suspicious
  conf: 0.85
  for:
  - go
  if:
    type: string_literal
    substr: github.com/DataDog/ebpf
- id: ebpf-new-collection
  desc: ebpf.NewCollection function
  crit: suspicious
  conf: 0.85
  for:
  - go
  if:
    type: string_literal
    substr: ebpf.NewCollection
- id: ebpf-new-program
  desc: ebpf.NewProgram function
  crit: suspicious
  conf: 0.85
  for:
  - go
  if:
    type: string_literal
    substr: ebpf.NewProgram
- id: load-pinned-program
  desc: LoadPinnedProgram function
  crit: suspicious
  conf: 0.85
  for:
  - go
  if:
    type: string_literal
    substr: LoadPinnedProgram
- id: getdents64-kretprobe
  desc: SYSCALL_KRETPROBE getdents64 hook
  crit: suspicious
  conf: 0.95
  for:
  - c
  if:
    type: text
    substr: SYSCALL_KRETPROBE(getdents64)
- id: bpf-override-return
  desc: bpf_override_return helper usage
  crit: suspicious
  conf: 0.9
  for:
  - c
  - elf
  if:
    type: symbol
    exact: bpf_override_return
- id: getdents64-tracepoint
  desc: tp/syscalls/sys_exit_getdents64 tracepoint
  crit: suspicious
  conf: 0.9
  for:
  - c
  - elf
  if:
    type: text
    substr: tp/syscalls/sys_exit_getdents64
- id: crypt-verify
  desc: crypt_verify function reference
  crit: suspicious
  conf: 0.7
  for:
  - c
  - elf
  if:
    type: text
    substr: crypt_verify
- id: http-routes
  desc: http_routes manipulation
  crit: suspicious
  conf: 0.7
  for:
  - c
  - elf
  if:
    type: text
    substr: http_routes
- id: http-edit
  desc: HTTP_EDIT action
  crit: suspicious
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    substr: HTTP_EDIT
- id: http-drop
  desc: HTTP_DROP action
  crit: suspicious
  conf: 0.8
  for:
  - c
  - elf
  if:
    type: text
    substr: HTTP_DROP
- id: http-string-action-a
  desc: HTTP action edit or drop
  crit: suspicious
  conf: 0.3
  for:
  - c
  if:
    type: string_literal
    regex: HTTP[_-](EDIT|DROP)
- id: http-string-action-b
  desc: HTTP action pass or redirect
  crit: suspicious
  conf: 0.3
  for:
  - c
  if:
    type: string_literal
    regex: HTTP[_-](PASS|REDIRECT)
- id: http-string-action-c
  desc: HTTP action hijack
  crit: suspicious
  conf: 0.3
  for:
  - c
  if:
    type: string_literal
    regex: HTTP[_-]HIJACK
- id: http-string-packet-near
  desc: HTTP and packet near each other
  crit: suspicious
  conf: 0.3
  for:
  - c
  if:
    type: string_literal
    regex: packet.{0,20}HTTP|HTTP.{0,20}packet
- id: password-string-direct-a
  desc: Password buffer pointer or length
  crit: suspicious
  conf: 0.4
  for:
  - c
  - elf
  downgrade:
    any:
    - id: well-known/tool/sysadmin/rustdesk::rustdesk-linux-package
    - id: well-known/app/adguardhome::release-path
  if:
    type: text
    regex: password[_-]?(buf|ptr|len)
- id: password-string-direct-b
  desc: Password hash or data
  crit: notable
  conf: 0.4
  for:
  - c
  - elf
  if:
    type: text
    regex: password[_-]?(hash|data)
- id: password-string-op
  desc: Password getter or checker
  crit: suspicious
  conf: 0.4
  for:
  - c
  - elf
  downgrade:
    any:
    - id: well-known/tool/sysadmin/rustdesk::rustdesk-linux-package
  if:
    type: text
    regex: (get|check)[_-]?password
- id: sql-uprobe-target
  desc: SQL query uprobe target
  crit: suspicious
  conf: 0.9
  for:
  - c
  - elf
  if:
    type: text
    regex: uprobe/(SQLDBQueryContext|SQLiteConnQuery)
- id: query-override-state
  desc: SQL query override state
  crit: suspicious
  conf: 0.85
  for:
  - c
  - elf
  if:
    type: text
    regex: query_override(_pattern|_gen)?
- id: bpf-map-create-syscall--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '\b(BPF_MAP_CREATE|SYS_bpf|__NR_bpf)\b'
  count_max: 1030779
- id: bpf-map-create-syscall--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: 'syscall\s*\(\s*(?:SYS_bpf|__NR_bpf)'
  count_max: 1030780
- id: bpf-map-update-syscall
  desc: BPF map update syscall
  crit: suspicious
  conf: 0.88
  attack: T1014
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    substr: BPF_MAP_UPDATE_ELEM
- id: bpf-map-delete-syscall
  desc: BPF map delete syscall
  crit: suspicious
  conf: 0.88
  attack: T1014
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    substr: BPF_MAP_DELETE_ELEM
- id: bpf-hidden-object-names--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(hidden|hide)_(pids?|files?)\b'
  count_max: 1030783
- id: bpf-hidden-object-names--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(hidden|hide)_(names?|ports?)\b'
  count_max: 1030784
- id: bpf-hidden-object-names--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(hidden|hide)_(tcp|targets?)\b'
  count_max: 1030785
- id: bpf-rootkit-controller-actions--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)(hide|unhide).{0,80}(pid|file)'
  count_max: 1030786
- id: bpf-rootkit-controller-actions--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)(hide|unhide).{0,80}(port|tcp)'
  count_max: 1030787
- id: bpf-rootkit-controller-actions--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)(list|flush).{0,80}(pid|file)'
  count_max: 1030788
- id: bpf-rootkit-controller-actions--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)(list|flush).{0,80}(port|tcp)'
  count_max: 1030789
- id: bpf-rootkit-controller-actions--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(pid|file).{0,80}(hide|unhide)'
  count_max: 1030790
- id: bpf-rootkit-controller-actions--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(port|tcp).{0,80}(hide|unhide)'
  count_max: 1030791
composite_rules:
- id: xdp-payload
  desc: Packet payload reference
  crit: suspicious
  conf: 0.5
  for:
  - c
  any:
  - id: xdp-payload-xdp-packet
  - id: xdp-payload-ctx
  - id: xdp-payload-pointer
- id: http-string
  desc: HTTP packet manipulation marker
  crit: notable
  conf: 0.3
  for:
  - c
  any:
  - id: http-string-action-a
  - id: http-string-action-b
  - id: http-string-action-c
  - id: http-string-packet-near
- id: password-string
  desc: Password string reference
  crit: suspicious
  conf: 0.4
  for:
  - c
  - elf
  any:
  - id: password-string-direct-a
  - id: password-string-direct-b
  - id: password-string-op
- id: syscall-hooking
  desc: eBPF program hooking syscall tracepoints
  crit: suspicious
  conf: 0.95
  attack: T1014
  for:
  - c
  - elf
  any:
  - id: sec-syscall-enter
  - id: sec-syscall-exit
- id: xdp-packet-inspection
  desc: XDP packet inspection primitives
  crit: suspicious
  conf: 0.7
  for:
  - c
  - elf
  needs: 3
  any:
  - id: micro-behaviors/os/bpf/program/network::xdp-data-end
  - id: xdp-iph
  - id: xdp-tcph
  - id: xdp-payload
- id: offensive-intent
  desc: Offensive intent markers
  crit: suspicious
  conf: 0.7
  all:
  - id: ebpf-indicator
  any:
  - id: objectives/evasion/masquerade/naming/posix/
- id: ebpf-indicator
  desc: eBPF-related markers
  crit: suspicious
  conf: 0.6
  for:
  - c
  - elf
  any:
  - id: sec-syscall-enter
  - id: sec-syscall-exit
  - id: micro-behaviors/os/bpf/program/loader::sec-xdp
  - id: sec-uprobe
  - id: micro-behaviors/os/bpf/program/network::xdp-md-struct
  - id: cilium-ebpf
  - id: libbpfgo
  - id: datadog-ebpf
- id: xdp-backdoor
  desc: XDP-based network backdoor or packet
  crit: suspicious
  conf: 0.95
  attack: T1205
  for:
  - c
  - elf
  all:
  - id: xdp-section-marker
  - id: xdp-packet-inspection
  - id: offensive-intent
- id: xdp-section-marker
  desc: XDP section markers
  crit: suspicious
  conf: 0.8
  for:
  - c
  - elf
  any:
  - id: micro-behaviors/os/bpf/program/loader::sec-xdp
  - id: micro-behaviors/os/bpf/program/network::xdp-md-struct
- id: go-loader
  desc: Go-based eBPF program loader using
  crit: suspicious
  conf: 0.9
  for:
  - go
  any:
  - id: cilium-ebpf
  - id: libbpfgo
  - id: datadog-ebpf
  - id: ebpf-new-collection
  - id: ebpf-new-program
  - id: load-pinned-program
- id: go-ebpf-sections
  desc: Go eBPF offensive section references
  crit: suspicious
  conf: 0.8
  for:
  - go
  any:
  - id: sec-syscall-enter
  - id: sec-syscall-exit
  - id: micro-behaviors/os/bpf/program/loader::sec-xdp
  - id: sec-uprobe
- id: go-offensive-intent
  desc: Go eBPF offensive intent markers
  crit: suspicious
  conf: 0.7
  for:
  - go
  any:
  - id: micro-behaviors/data/text/malware::rootkit-word
  - id: micro-behaviors/data/text/keywords::hide
  - id: objectives/evasion/anti-av/platform::bypass
- id: go-offensive-program
  desc: Go loader referencing offensive eBPF
  crit: suspicious
  conf: 0.95
  attack: T1014
  for:
  - go
  all:
  - id: go-ebpf-sections
  - id: go-offensive-intent
- id: sensitive-file-ref
  desc: Sensitive system file references
  crit: suspicious
  conf: 0.7
  any:
  - id: micro-behaviors/fs/path/config/accounts/
  - id: micro-behaviors/fs/path/config/privesc/
- id: sudoers-manipulation
  desc: eBPF-based runtime manipulation of sudoers
  crit: suspicious
  conf: 1.0
  attack: T1068
  for:
  - c
  - elf
  all:
  - id: sensitive-file-ref
  - id: micro-behaviors/os/bpf/program/tracing::bpf-probe-write-user
- id: dirent-hiding
  desc: eBPF-based file/directory hiding via getdents
  crit: suspicious
  conf: 0.95
  attack: T1014
  for:
  - c
  - elf
  all:
  - id: getdents64-tracepoint
  - id: micro-behaviors/os/syscall/invoke::d-reclen-field
  - id: micro-behaviors/os/bpf/program/tracing::bpf-probe-write-user
- id: getdents-dirent-hide-rootkit
