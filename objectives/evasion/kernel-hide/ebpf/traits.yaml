  - id: getdents64-kretprobe
  - id: micro-behaviors/os/syscall/invoke::d-name-field
  - id: micro-behaviors/os/syscall/invoke::d-reclen-field
  - id: micro-behaviors/os/bpf/program/tracing::bpf-probe-write-user
  - id: bpf-override-return
- id: uprobe-hooking
  desc: eBPF program hooking user-space functions
  crit: suspicious
  conf: 0.95
  attack: T1014
