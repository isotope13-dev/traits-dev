  - c
  - elf
  all:
  - id: getdents64-tracepoint
  - id: micro-behaviors/os/syscall/invoke::d-reclen-modification
  - id: micro-behaviors/os/syscall/invoke::dirent64-struct
  - id: micro-behaviors/os/bpf/program/tracing::bpf-probe-write-user
- id: hidden-object-dirent-rootkit
  desc: eBPF hidden object dirent rootkit
  crit: hostile
  conf: 0.99
  attack: T1014
  for:
  - c
  - elf
  all:
  - id: bpf-hidden-object-names
  - id: getdents64-tracepoint
  - id: micro-behaviors/os/syscall/invoke::d-reclen-modification
  - id: micro-behaviors/os/bpf/program/tracing::bpf-probe-write-user
- id: getdents-offset-rewrite-hide-rootkit
  # The dirent-hiding composites above key on struct field names (dirent64,
  # d_reclen). Rootkits that splice the getdents64 return buffer with raw byte
  # offsets (c->buf + c->off + 16) instead of named struct fields evade those.
  # The robust offset-independent signal is: hook the getdents64 syscall-exit
  # tracepoint AND rewrite the userspace return buffer via bpf_probe_write_user
  # AND pin maps named for hidden objects. No legitimate eBPF tool does all three.
  desc: eBPF rootkit hooking getdents64 tracepoint to hide directory entries
  crit: hostile
  conf: 0.98
  attack: T1014
  for:
  - c
  - elf
  - go
  - rust
  all:
  - id: getdents64-tracepoint
  - id: micro-behaviors/os/bpf/program/tracing::bpf-probe-write-user
  - id: bpf-hidden-object-names
- id: ebpf-connection-hide-rootkit
  # Companion to the getdents directory-hiding composite: the same
  # bpf_probe_write_user + hidden-object-map machinery hooked against the TCP
  # connection table hides the implant's own C2 sockets from ss/netstat/lsof.
  desc: Conceals network connections via eBPF
  crit: hostile
  conf: 0.97
  attack: T1014
  for:
  - c
  - elf
  - go
  - rust
  all:
  - id: micro-behaviors/os/bpf/program/tracing::bpf-probe-write-user
  - id: bpf-hidden-object-names
  - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
- id: dirent-hiding-kretprobe
  desc: eBPF getdents64 kretprobe dirent hiding
  crit: hostile
  conf: 0.99
  attack: T1014
  for:
  - c
  all:
  - id: getdents64-kretprobe
  - id: micro-behaviors/os/syscall/invoke::d-name-field
  - id: micro-behaviors/os/syscall/invoke::d-reclen-field
  - id: micro-behaviors/os/bpf/program/tracing::bpf-probe-write-user
