  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(list_hidden|flush_hidden|flush)\b.{0,40}\b(port|tcp)\b'
  count_max: 1030789
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: bpf-rootkit-controller-actions--rx-10
  desc: Reverse-order process/file hide action
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(pids?|files?)[_-](hide|unhide)\b'
  count_max: 1030790
- id: bpf-rootkit-controller-actions--rx-11
  desc: Reverse-order port/TCP hide action
  crit: component
  conf: 0.78
  for: [c, cpp, elf, go, rust]
  if:
    type: text
    regex: '(?i)\b(ports?|tcp)[_-](hide|unhide)\b'
