  - id: micro-behaviors/os/bpf/program/tracing::syscall-kprobe-macro
  - id: micro-behaviors/os/bpf/program/tracing::pt-regs-parm
- id: sql-query-tampering
  desc: eBPF SQL query user-memory tampering
  crit: hostile
  conf: 0.99
  attack: T1565.001
