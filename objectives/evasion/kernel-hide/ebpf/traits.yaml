  all:
  - id: sql-uprobe-target
  - id: query-override-state
  - id: micro-behaviors/os/bpf/program/tracing::bpf-probe-write-user
  - id: micro-behaviors/os/bpf/program/maps::bpf-map-update
  - id: micro-behaviors/os/bpf/program/maps::bpf-map-delete
- id: advanced-rootkit
  desc: Advanced eBPF rootkit detected
  crit: suspicious
