  - elf
  all:
  - id: bpf-hidden-object-names
  - id: getdents64-tracepoint
  - id: micro-behaviors/os/syscall/invoke::d-reclen-modification
  - id: micro-behaviors/os/bpf/program/tracing::bpf-probe-write-user
- id: dirent-hiding-kretprobe
  desc: eBPF getdents64 kretprobe dirent hiding
  crit: hostile
  conf: 0.99
  attack: T1014
  for:
  - c
