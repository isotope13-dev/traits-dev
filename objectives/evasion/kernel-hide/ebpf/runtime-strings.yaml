      - id: well-known/tool/sysadmin/alpine-packages::alpine-datadog-agent-binary
      - id: metadata/package/metrics::datadog-word
      - id: well-known/app/kilocode::kilo-code-native-runtime
      - id: well-known/lib/bun-runtime::runtime-context
      - id: well-known/tool/dual-use/rclone::rclone-tool
      - id: well-known/lib/benign-runtime-bundles/
