defaults:
  platforms: [linux]
  for: [binaries]
  attack: T1014
traits:
  - id: hidden-pid-ebpf-message
    desc: Diagnostic message hiding PID via
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bPID\b[^\n]{0,40}\bhidden\b[^\n]{0,40}\beBPF\b'
  - id: hidden-file-ebpf-message
    desc: Diagnostic message hiding file via
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bfile\b[^\n]{0,40}\bhidden\b[^\n]{0,40}\beBPF\b'
  - id: hidden-port-ebpf-message
    desc: Diagnostic message hiding port via
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bport\b[^\n]{0,40}\bhidden\b[^\n]{0,40}\beBPF\b'
  - id: ebpf-precheck-bpf-syscall
    desc: eBPF rootkit pre-check for bpf
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'bpf\(\)[^\n]{0,40}(syscall not available|not supported|unavailable)'
  - id: ebpf-precheck-kernel-version
    desc: eBPF rootkit pre-check for kernel
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'kernel too old[^\n]{0,40}(4\.18|5\.[0-9])'
composite_rules:
  - id: ebpf-rootkit-runtime-controller
    desc: Stripped binary designed to deploy and control an embedded eBPF stealth rootkit
    crit: hostile
    conf: 0.98
    mbc: F0010
    needs: 2
    any:
      - id: objectives/evasion/kernel-hide/ebpf
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-datadog-agent-binary
      - id: metadata/package/metrics::datadog-word
