defaults:
  platforms: [linux]
  for: [binaries]
  attack: T1014
traits:
  - id: hidden-pid-ebpf-message
    desc: Diagnostic message hiding PID via eBPF
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bPID\b[^\n]{0,40}\bhidden\b[^\n]{0,40}\beBPF\b'
  - id: hidden-file-ebpf-message
    desc: Diagnostic message hiding file via eBPF
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bfile\b[^\n]{0,40}\bhidden\b[^\n]{0,40}\beBPF\b'
  - id: hidden-port-ebpf-message
    desc: Diagnostic message hiding port via eBPF
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bport\b[^\n]{0,40}\bhidden\b[^\n]{0,40}\beBPF\b'
  - id: ebpf-precheck-bpf-syscall
    desc: eBPF rootkit pre-check for bpf
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'bpf\(\)[^\n]{0,40}(syscall not available|not supported|unavailable)'
  - id: ebpf-precheck-kernel-version
    desc: eBPF rootkit pre-check for kernel
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'kernel too old[^\n]{0,40}(4\.18|5\.[0-9])'
composite_rules:
  - id: ebpf-rootkit-runtime-controller
    desc: Stripped binary designed to deploy and control an embedded eBPF stealth rootkit
    crit: hostile
    conf: 0.98
    mbc: F0010
    needs: 3
    any:
      - id: objectives/evasion/kernel-hide/ebpf::bpf-hidden-object-names--rx-3
      - id: objectives/evasion/kernel-hide/ebpf::bpf-hidden-object-names--rx-4
      - id: objectives/evasion/kernel-hide/ebpf::bpf-hidden-object-names--rx-5
      - id: objectives/evasion/kernel-hide/ebpf::bpf-map-create-syscall--rx-1
      - id: objectives/evasion/kernel-hide/ebpf::bpf-map-create-syscall--rx-2
      - id: objectives/evasion/kernel-hide/ebpf::bpf-map-delete-syscall
      - id: objectives/evasion/kernel-hide/ebpf::bpf-map-update-syscall
      - id: objectives/evasion/kernel-hide/ebpf::bpf-override-return
      - id: objectives/evasion/kernel-hide/ebpf::bpf-rootkit-controller-actions--rx-10
      - id: objectives/evasion/kernel-hide/ebpf::bpf-rootkit-controller-actions--rx-11
      - id: objectives/evasion/kernel-hide/ebpf::bpf-rootkit-controller-actions--rx-6
      - id: objectives/evasion/kernel-hide/ebpf::bpf-rootkit-controller-actions--rx-7
      - id: objectives/evasion/kernel-hide/ebpf::bpf-rootkit-controller-actions--rx-8
      - id: objectives/evasion/kernel-hide/ebpf::bpf-rootkit-controller-actions--rx-9
      - id: micro-behaviors/os/bpf/program/loader::cilium-ebpf-import
      - id: objectives/evasion/kernel-hide/ebpf::crypt-verify
      - id: objectives/evasion/kernel-hide/ebpf::datadog-ebpf
      - id: objectives/evasion/kernel-hide/ebpf::ebpf-new-collection
      - id: objectives/evasion/kernel-hide/ebpf::ebpf-new-program
      - id: objectives/evasion/kernel-hide/ebpf::ebpf-precheck-bpf-syscall
      - id: objectives/evasion/kernel-hide/ebpf::ebpf-precheck-kernel-version
      - id: objectives/evasion/kernel-hide/ebpf::getdents64-kretprobe
      - id: objectives/evasion/kernel-hide/ebpf::getdents64-tracepoint
      - id: objectives/evasion/kernel-hide/ebpf::go-bindata-asset-dep
      - id: micro-behaviors/communications/http/server/framework::go-http-router-dep
      - id: objectives/evasion/kernel-hide/ebpf::hidden-file-ebpf-message
      - id: objectives/evasion/kernel-hide/ebpf::hidden-pid-ebpf-message
      - id: objectives/evasion/kernel-hide/ebpf::hidden-port-ebpf-message
      - id: objectives/evasion/kernel-hide/ebpf::http-drop
      - id: objectives/evasion/kernel-hide/ebpf::http-edit
      - id: objectives/evasion/kernel-hide/ebpf::http-routes
      - id: objectives/evasion/kernel-hide/ebpf::http-string-action-a
      - id: objectives/evasion/kernel-hide/ebpf::http-string-action-b
      - id: objectives/evasion/kernel-hide/ebpf::http-string-action-c
      - id: objectives/evasion/kernel-hide/ebpf::http-string-packet-near
      - id: micro-behaviors/os/bpf/program/loader::libbpfgo-import
      - id: objectives/evasion/kernel-hide/ebpf::load-pinned-program
      - id: objectives/evasion/kernel-hide/ebpf::password-string-direct-a
      - id: objectives/evasion/kernel-hide/ebpf::password-string-direct-b
      - id: objectives/evasion/kernel-hide/ebpf::password-string-op
      - id: objectives/evasion/kernel-hide/ebpf::query-override-state
