# Keylogger with HTTP exfiltration composites
# Keyboard hooks + HTTP POST = keystroke theft
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056.001
composite_rules:
  - id: keylog-http-exfil
    desc: Keyboard hook with HTTP POST exfiltration
    crit: hostile
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/input/keyboard::set-windows-hook
      - id: micro-behaviors/hardware/input/keyboard::get-key-state
      - id: micro-behaviors/communications/http/post::wininet-post
    any:
      - id: micro-behaviors/hardware/input/keyboard::call-next-hook-ex
      - id: micro-behaviors/os/clipboard/access::open-clipboard
      - id: micro-behaviors/ui/window/manage::get-foreground-window
    needs: 2
    downgrade:
      all:
        - id: metadata/signed/platform::microsoft
  - id: keylog-multipart-upload
    desc: Keyboard hook with multipart form upload
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/input/keyboard::set-windows-hook
      - id: micro-behaviors/communications/http/post::multipart-form
    any:
      - id: micro-behaviors/hardware/input/keyboard::get-key-state
      - id: micro-behaviors/hardware/input/keyboard::call-next-hook-ex
      - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
    downgrade:
      all:
        - id: metadata/signed/platform::microsoft
