# PyInstaller-packed Python Stealer Detection
# ATT&CK: T1005 (Data from Local System)
# MBC: E1004 (Data Theft)
defaults:
  platforms: [windows, macos, linux, unix]
  for: [pe, macho, elf]
  mbc: "E1004"
composite_rules:
  - id: pyinstaller-pe-stealer
    desc: PyInstaller psutil stealer bundle
    crit: hostile
    conf: 0.95
    platforms: [windows]
    for: [pe]
    attack: "T1005"
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-extraction
      - id: micro-behaviors/fs/temp/pyinstaller::archive-psutil-windows-member
    any:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-pe-embedded-exe
      - id: micro-behaviors/fs/temp/pyinstaller::archive-embedded-exe-member
  - id: pyinstaller-cookie-stealer
    desc: PyInstaller packed browser cookie stealer
    crit: hostile
    conf: 0.95
    attack: "T1539"
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-browser-cookie3
    any:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-requests-module
      - id: micro-behaviors/data/db/sqlite::sqlite3-string
  - id: pyinstaller-windows-capability-stealer
    desc: PyInstaller Windows bundle with system-control and recon capabilities
    crit: hostile
    conf: 0.98
    platforms: [windows]
    for: [pe]
    attack: "T1059"
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::runtime-tmpdir-option
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: micro-behaviors/process/create/shell/spawn::win-createprocess
      - id: micro-behaviors/process/enumerate/snapshot::dynamic-toolhelp-enumerator
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: objectives/lateral-movement/exploit/memory::executable-memory-allocation
      - id: objectives/discovery/host/fingerprint::getcomputername-text
      - id: objectives/command-and-control/dropper/execution/self-extract::ahk-run-cmd
