# Non-English "spyware" / espionage terms — surveillance-category labels that
# malware uses in its own comments and output. Farsi uses regex for the optional
# ZWNJ (U+200C) joiner; Arabic تجسس ("espionage/spying") is matched as a substr.
defaults:
  platforms: [unix, windows, android]
  for: [scripts, source, binaries, documents]
  crit: notable
  conf: 0.75
  attack: T1056
traits:
  - id: fa-spyware-term
    desc: Farsi spyware term (جاسوس‌افزار)
    conf: 0.8
    if:
      type: text
      regex: 'جاسوس\x{200c}?افزار'
  - id: ar-spyware-term
    desc: Arabic espionage/spying term (تجسس)
    conf: 0.6
    if:
      type: text
      substr: تجسس
