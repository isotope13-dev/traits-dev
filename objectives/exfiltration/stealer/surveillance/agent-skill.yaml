defaults:
  platforms: [unix, windows]
  for: [python, markdown]
  attack: T1041

composite_rules:
  - id: screenpipe-activity-to-llm-api
    desc: Sends Screenpipe activity to LLM API
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/telemetry/activity::screenpipe-ocr-window-harvest
    any:
      - id: micro-behaviors/communications/http/llm::llm-messages-path
      - id: micro-behaviors/communications/http/llm::llm-chat-completions-path
      - id: micro-behaviors/communications/http/llm::openrouter-chat-completions-url
