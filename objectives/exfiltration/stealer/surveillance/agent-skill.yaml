defaults:
  platforms: [unix, windows]
  for: [python, markdown]
  attack: T1041

traits:
  - id: screenpipe-fetch-events-call
    desc: Calls screenpipe event fetcher
    crit: component
    conf: 0.9
    if:
      type: text
      substr: fetch_window(

  - id: llm-backend-factory-call
    desc: Constructs configurable LLM backend
    crit: component
    conf: 0.9
    if:
      type: text
      substr: make_backend(

  - id: llm-cluster-synthesize-call
    desc: "Sends clustered observations LLM synthesizer"
    crit: component
    conf: 0.9
    if:
      type: text
      substr: synthesize(cluster

composite_rules:
  - id: screenpipe-observation-to-llm-backend
    desc: Sends screen-derived workflow observations to an LLM backend
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/collection/monitor/capture::screenpipe-ocr-window-harvest
    any:
      - id: micro-behaviors/communications/http/llm::llm-messages-path
      - id: micro-behaviors/communications/http/llm::llm-chat-completions-path
      - id: micro-behaviors/communications/http/llm::openrouter-chat-completions-url

  - id: screenpipe-cluster-to-llm-synthesis
    desc: Sends screen-derived workflow clusters to configurable LLM synthesis
    crit: suspicious
    conf: 0.94
    all:
      - id: screenpipe-fetch-events-call
      - id: llm-backend-factory-call
      - id: llm-cluster-synthesize-call
