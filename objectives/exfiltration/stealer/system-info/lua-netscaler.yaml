defaults:
  platforms: [netscaler, appliance, unix]
  for: [lua]
  attack: T1041

traits:
  - id: lua-passwd-group-enum
    desc: Lua passwd group enum
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,180}/etc/group'

  - id: lua-curl-report-post
    desc: Lua curl report POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'curl -s -X POST[\s\S]{0,160}/api/v1/report'

  - id: lua-report-hidden-cache
    desc: Lua hidden cache report
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.cache/.report

composite_rules:
  - id: lua-account-report-exfil
    desc: Lua account report exfil
    crit: hostile
    conf: 0.98
    all:
      - id: lua-passwd-group-enum
      - id: lua-curl-report-post
    any:
      - id: lua-report-hidden-cache
