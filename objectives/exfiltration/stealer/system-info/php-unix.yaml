defaults:
  platforms: [unix]
  for: [php]
  attack: T1041

traits:
  - id: php-system-info-commands
    desc: PHP system info commands
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'hostname[\s\S]{0,120}sw_vers[\s\S]{0,120}uname -m'

  - id: php-encoded-http-register
    desc: PHP encoded HTTP register
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: base64_encode(rot13($payload))

composite_rules:
  - id: php-system-info-http-exfil
    desc: PHP system info HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-system-info-commands
      - id: php-encoded-http-register
      - id: micro-behaviors/communications/http/upload::octet-stream-upload-header
