defaults:
  platforms: [netscaler, appliance, unix]
  for: [perl]
  attack: T1041

traits:
  - id: perl-netscaler-system-collect
    desc: Perl NetScaler system collect
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'sub collect_network_info[\s\S]{0,260}(ifconfig|netstat)'

  - id: perl-netscaler-config-slurp
    desc: Perl NetScaler config slurp
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'slurp\("/nsconfig/(ns\.conf|license\.dat)"\)'

  - id: perl-post-collect-exfil
    desc: Perl POST collect exfil
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: http://${C2_HOST}:${C2_PORT}/collect

composite_rules:
  - id: perl-netscaler-system-exfil
    desc: Perl NetScaler system exfil
    crit: hostile
    conf: 0.98
    all:
      - id: perl-netscaler-system-collect
      - id: perl-netscaler-config-slurp
    any:
      - id: perl-post-collect-exfil
