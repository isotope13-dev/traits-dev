defaults:
  platforms: [windows]
  for: [php]
  attack: T1041

traits:
  - id: php-windows-sysinfo-stage
    desc: PHP stages Windows sysinfo
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'C:\\{2,4}Windows\\{2,4}Temp\\{2,4}\.?sysinfo'
  - id: php-telemetry-endpoint
    desc: PHP telemetry endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/v1/telemetry
composite_rules:
  - id: php-windows-sysinfo-curl-exfil
    desc: PHP Windows sysinfo curl exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-windows-sysinfo-stage
      - id: php-telemetry-endpoint
      - id: micro-behaviors/communications/http/curl::post-data
