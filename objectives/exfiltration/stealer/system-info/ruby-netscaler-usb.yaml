defaults:
  platforms: [netscaler, appliance, unix]
  for: [ruby]
  attack: T1041

traits:
  - id: ruby-netscaler-artifact-collect
    desc: Ruby NetScaler artifact collect
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'def collect_netscaler_artifacts[\s\S]{0,220}ns_config_files'

  - id: ruby-beacon-post-exfil
    desc: Ruby beacon POST exfil
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'URI\("https://#\{C2_HOST\}:#\{C2_PORT\}/api/v1/beacon"\)'

composite_rules:
  - id: ruby-netscaler-artifact-exfil
    desc: Ruby NetScaler artifact exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-nsconfig-find
      - id: ruby-netscaler-artifact-collect
    any:
      - id: ruby-beacon-post-exfil
