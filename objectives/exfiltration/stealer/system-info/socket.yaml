defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  - id: sysinfo-exfil-socket
    desc: System recon combined with raw socket connection (exfiltration)
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/enumerate/shell/
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
    any:
      - id: micro-behaviors/communications/socket/connect/
      - id: objectives/command-and-control/beacon/network/http::direct-http-c2
