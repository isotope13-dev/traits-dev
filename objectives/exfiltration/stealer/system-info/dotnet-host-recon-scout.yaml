# .NET host-recon scout pattern.
#
# Generic detection of small .NET binaries that fingerprint a victim
# host from multiple sources, encrypt or encode the result, and ship
# it out over HTTP — independent of the specific family. Designed to
# catch future variants of the DAEMON Tools "scout-and-deploy" model
# (Stage 1 = recon scout; Stage 2 = injector for the picked victims)
# even when method names, registry keys, and C2 domains are renamed.
#
# Hostile firing requires: small .NET stub + multi-source profile +
# HTTP outbound (UploadString or POST). The size cap is essential —
# a multi-megabyte signed application that touches many APIs is not
# this pattern.
defaults:
  platforms: [windows]
  for: [pe]
  size_max: 131072       # 128 KB — scout stubs are tiny by design
  attack: "T1041"
  mbc: "B0030"

composite_rules:
  - id: dotnet-stub-host-fingerprint-exfil
    desc: Tiny .NET stub fingerprints host then exfils
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/discovery/host/fingerprint::multi-source-victim-fingerprint
    any:
      - id: micro-behaviors/communications/http/client/managed::uploadstring
      - id: micro-behaviors/communications/http/post::post-string-pe
      - id: micro-behaviors/communications/http/upload
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::microsoft-windows

  - id: dotnet-stub-fingerprint-with-spoofed-ua
    desc: .NET fingerprint stub posts with browser UA
    crit: hostile
    conf: 0.985
    attack: "T1071.001"
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/discovery/host/fingerprint::multi-source-victim-fingerprint
      - id: micro-behaviors/communications/http/user-agent::browser-mozilla-5-0
    any:
      - id: micro-behaviors/communications/http/client/managed::uploadstring
      - id: micro-behaviors/communications/http/post::post-string-pe
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::microsoft-windows
