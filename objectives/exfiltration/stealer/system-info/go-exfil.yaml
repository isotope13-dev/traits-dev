# Go Stealer Patterns
# ATT&CK: T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: go-stealer-exfil
    desc: "Go-based sensitive data exfiltration"
    crit: suspicious
    conf: 0.98
    mbc: "C0001"
    attack: "T1041"
    for: [go]
    all:
      - id: objectives/collection/archive/data::sensitive-archiving
    any:
      - id: objectives/command-and-control/channel/messaging::http-post
      - id: objectives/command-and-control/infrastructure/domain/malicious::c2-domain
