defaults:
  platforms: [netscaler, appliance, unix]
  for: [ruby]
  attack: T1041

traits:
  - id: ruby-nsconfig-find
    desc: Ruby nsconfig file find
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: find /nsconfig -type f

  - id: ruby-net-http-beacon
    desc: Ruby Net::HTTP beacon
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Net::HTTP::Post[\s\S]{0,180}/api/v1/beacon'

  - id: ruby-netscaler-config-collect
    desc: Ruby NetScaler config collect
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/nsconfig/(nsadmin|nsip)\.conf'

composite_rules:
  - id: ruby-netscaler-config-exfil
    desc: Ruby NetScaler config exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-net-http-beacon
    any:
      - id: ruby-nsconfig-find
      - id: ruby-netscaler-config-collect
