defaults:
  platforms: [macos]
  for: [applescript]
  attack: T1041

traits:
  - id: applescript-profile-message-prefix
    desc: AppleScript host profile prefix
    crit: component
    conf: 0.94
    if:
      type: text
      substr: 'set message to ("b:" & userName'
  - id: applescript-profile-message-serial
    desc: AppleScript serial profile field
    crit: component
    conf: 0.94
    if:
      type: text
      substr: 'serialNumber & ":" & moduleName'
  - id: applescript-profile-curl-post
    desc: AppleScript posts host profile
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'curl\s+-fksL\s+-m\s+\d+\s+-d\s+"\s*&\s*message\s*&\s*"\s+https://"\s*&\s*domain\s*&\s*"/j'

composite_rules:
  - id: applescript-profile-message-envelope
    desc: AppleScript host profile envelope
    crit: suspicious
    conf: 0.95
    near_lines: 2
    all:
      - id: applescript-profile-message-prefix
      - id: applescript-profile-message-serial
  - id: applescript-host-profile-exfil
    desc: AppleScript exfiltrates host profile
    crit: hostile
    conf: 0.98
    attack: T1041,T1082
    all:
      - id: applescript-profile-message-envelope
      - id: applescript-profile-curl-post
      - id: objectives/discovery/system/fingerprint/machine-id::macos-command-hardware-serial
    any:
      - id: micro-behaviors/os/sysinfo/cpu::sysctl-cpu-brand-string
      - id: objectives/discovery/system/hardware/sysctl::sysctl-cpu-brand-dup
      - id: micro-behaviors/fs/path/sensitive/browser::telegram-keepcoder-path
