# System info exfiltration via URL-encoded POST body in PE binaries
# Detects format strings used to build system fingerprint POST data
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1082
traits:
- id: sysinfo-post-cpuarch
  desc: CPU architecture POST parameter
  crit: component
  conf: 0.9
  if:
    type: text
    substr: cpuarch=%d
- id: sysinfo-post-cpunum
  desc: CPU count POST parameter
  crit: component
  conf: 0.9
  if:
    type: text
    substr: sicpunum=%d
- id: botversion-field
  desc: Bot version identifier string
  crit: component
  conf: 0.92
  if:
    type: text
    substr: botversion=
- id: taskid-field
  desc: C2 task identifier string
  crit: component
  conf: 0.85
  if:
    type: text
    exact: taskid
composite_rules:
- id: sysinfo-url-encoded-post
  desc: System info URL-encoded POST exfiltration
  crit: suspicious
  conf: 0.93
  all:
  - id: micro-behaviors/communications/socket/init::wsa-startup
  any:
  - id: sysinfo-post-cpuarch
  - id: sysinfo-post-cpunum
  - id: botversion-field
- id: bot-c2-tracking
  desc: Bot C2 tasking and tracking fields
  crit: suspicious
  conf: 0.92
  any:
  - id: botversion-field
  - id: taskid-field
  needs: 2
