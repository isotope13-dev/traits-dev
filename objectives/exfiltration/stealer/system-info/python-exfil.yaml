defaults:
  platforms: [unix, windows]
  for: [python]
composite_rules:
  - id: python-requests-post-exfil
    desc: Python requests.post to external IP
    crit: suspicious
    conf: 0.9
    attack: T1041
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/ip::http-ip-url
  - id: python-credential-harvest-exfil
    desc: Credential harvesting with HTTP exfiltration
    crit: hostile
    conf: 0.95
    attack: T1552
    all:
      - id: micro-behaviors/communications/ip::http-ip-url
      - id: objectives/credential-access/files/config::credential-files-config
