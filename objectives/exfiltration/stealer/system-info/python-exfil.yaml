defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
composite_rules:
  - id: python-host-profile-ssh-http-exfil
    desc: Python host profiling and SSH key enumeration sent over HTTP
    crit: hostile
    conf: 0.99
    attack: T1082,T1552.004,T1041
    mbc: E1082,E1057
    near_bytes: 6000
    all:
      - id: objectives/exfiltration/stealer/credential/platform::python-unix-secret-http-exfil
      - id: objectives/discovery/system/profile::python-device-host-profile-fields
      - id: micro-behaviors/data/decode/base64::b64decode-call

  - id: python-requests-post-exfil
    desc: Python requests.post to external IP
    crit: suspicious
    conf: 0.9
    attack: T1041
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/ip/literal::http-ip-url
  - id: python-credential-harvest-exfil
    desc: Credential harvesting with HTTP exfiltration
    crit: hostile
    conf: 0.95
    attack: T1552
    all:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/fs/path/sensitive/credentials::credential-config-path-corpus
