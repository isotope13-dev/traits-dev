defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: base64-json-encode
    desc: Base64 encoded JSON data
    crit: notable
    conf: 0.85
    attack: T1027
    if:
      type: string_literal
      regex: Base64\.encode64.{0,50}to_json|encode64.{0,50}json
  - id: socket-ip-address
    desc: Ruby socket IP address query
    crit: notable
    conf: 0.8
    attack: T1016
    if:
      type: text
      regex: Socket\.(ip_address_list|getifaddrs)|getsockname
composite_rules:
  - id: info-stealer
    desc: System info stealer with HTTP exfil
    crit: hostile
    conf: 0.95
    attack: T1041
    all:
      - id: micro-behaviors/os/env/vars/cicd::rb-socket-gethostname
      - id: socket-ip-address
      - id: micro-behaviors/communications/http/lib/netlib::net-http
      - id: micro-behaviors/communications/http/lib/netlib::hardcoded-ip-url
  - id: system-info-exfiltration
    desc: System information exfiltration
    crit: suspicious
    conf: 0.9
    attack: T1041
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/
      - id: micro-behaviors/communications/http/lib/netlib::hardcoded-ip-url
      - id: base64-json-encode
      - id: micro-behaviors/os/env/access::getenv-user
