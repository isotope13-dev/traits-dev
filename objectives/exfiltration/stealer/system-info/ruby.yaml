defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: base64-json-encode
    desc: Base64 encoded JSON data
    crit: suspicious
    conf: 0.85
    attack: T1027
    if:
      type: string_literal
      regex: Base64\.encode64.{0,50}to_json|encode64.{0,50}json
  - id: ruby-system-info-payload
    desc: Ruby system info payload fields
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'hostname[\s\S]{0,500}kernel[\s\S]{0,500}interfaces[\s\S]{0,500}routes'
  - id: ruby-exfil-upload-post
    desc: Ruby exfil upload POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/exfil/upload[\s\S]{0,260}Net::HTTP::Post'
  - id: ruby-system-sensitive-payload
    desc: Ruby system and secret payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Socket\.gethostname[\s\S]{0,800}/etc/passwd[\s\S]{0,800}/etc/shadow[\s\S]{0,800}\.ssh/\*'
  - id: ruby-tcp-base64-marshal-exfil
    desc: Ruby TCP Base64 Marshal exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Base64\.strict_encode64\(Marshal\.dump[\s\S]{0,260}TCPSocket\.open'
  - id: ruby-final-system-report
    desc: Ruby final system report
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'final_report[\s\S]{0,500}processes:[\s\S]{0,260}crontab:'
  - id: ruby-final-exfil-post
    desc: Ruby final exfil POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/exfil/final[\s\S]{0,260}Net::HTTP::Post'
composite_rules:
  - id: info-stealer
    desc: System info stealer with HTTP exfil
    crit: hostile
    conf: 0.95
    attack: T1041
    all:
      - id: micro-behaviors/os/env/vars/cicd::rb-socket-gethostname
      - id: micro-behaviors/os/network/interface::socket-ip-address
      - id: micro-behaviors/communications/http/lib/netlib::net-http
      - id: micro-behaviors/communications/http/lib/netlib::hardcoded-ip-url
  - id: system-info-exfiltration
    desc: System information sent through Ruby HTTP POST
    crit: suspicious
    conf: 0.9
    attack: T1041
    # `needs: 2 of any:` could fire on two sysinfo signals alone (e.g.
    # `mswin` and `mingw` platform tokens in a single RUBY_PLATFORM
    # check). Exfiltration requires both a collection and a sink, and
    # they need to live in the same script — a gem with platform
    # detection in utils.rb and HTTP in client.rb isn't exfiltrating.
    all:
      - id: micro-behaviors/os/sysinfo/
      - id: micro-behaviors/communications/http/post::net-http-post
    any:
      - id: micro-behaviors/communications/http/lib/netlib::hardcoded-ip-url
      - id: base64-json-encode
      - id: micro-behaviors/os/env/access::getenv-user
  - id: ruby-system-info-http-exfil
    desc: Ruby system info HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-system-info-payload
      - id: ruby-exfil-upload-post
      - id: micro-behaviors/communications/http/post::net-http-post
  - id: ruby-system-info-tcp-exfil
    desc: Ruby system info TCP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-system-sensitive-payload
      - id: ruby-tcp-base64-marshal-exfil
  - id: ruby-final-system-http-exfil
    desc: Ruby final system HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-final-system-report
      - id: ruby-final-exfil-post
