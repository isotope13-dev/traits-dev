defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: base64-json-encode
    desc: Base64 encoded JSON data
    crit: suspicious
    conf: 0.85
    attack: T1027
    if:
      type: string_literal
      regex: Base64\.encode64.{0,50}to_json|encode64.{0,50}json
composite_rules:
  - id: info-stealer
    desc: System info stealer with HTTP exfil
    crit: hostile
    conf: 0.95
    attack: T1041
    all:
      - id: micro-behaviors/os/env/vars/cicd::rb-socket-gethostname
      - id: micro-behaviors/os/network/interface::socket-ip-address
      - id: micro-behaviors/communications/http/lib/netlib::net-http
      - id: micro-behaviors/communications/http/lib/netlib::hardcoded-ip-url
  - id: system-info-exfiltration
    desc: System information exfiltration
    crit: suspicious
    conf: 0.9
    attack: T1041
    # `needs: 2 of any:` could fire on two sysinfo signals alone (e.g.
    # `mswin` and `mingw` platform tokens in a single RUBY_PLATFORM
    # check). Exfiltration requires both a collection and a sink, and
    # they need to live in the same script — a gem with platform
    # detection in utils.rb and HTTP in client.rb isn't exfiltrating.
    all:
      - id: micro-behaviors/os/sysinfo/
    any:
      - id: micro-behaviors/communications/http/lib/netlib::hardcoded-ip-url
      - id: base64-json-encode
      - id: micro-behaviors/os/env/access::getenv-user
