defaults:
  platforms: [freebsd, netbsd, unix]
  for: [swift]
  attack: T1041

traits:
  - id: swift-process-report-marker
    desc: Swift process discovery report marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: PROCESS_DISCOVERY_REPORT

  - id: swift-http-post-report-body
    desc: Swift HTTP POST report body
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'request\.httpMethod = "POST"[\s\S]{0,160}httpBody'
  - id: swift-urlsession-collect-post
    desc: Swift URLSession POST collect
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'URLComponents\(string:[\s\S]{0,160}/collect[\s\S]{0,260}request\.httpMethod = "POST"'
  - id: swift-system-process-inventory
    desc: Swift system process inventory
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'querySystemInfo[\s\S]{0,400}enumerateProcesses[\s\S]{0,400}enumerateNetworkInterfaces'
  - id: swift-network-recon-payload
    desc: Swift network recon payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'interfaces[\s\S]{0,500}routes[\s\S]{0,500}arp[\s\S]{0,500}dns'
  - id: swift-exfil-url-path
    desc: Swift exfil URL path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /exfil
  - id: swift-wmi-analog-marker
    desc: Swift WMI analog marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "WMI Analog: Win32_Process"
  - id: swift-netbsd-rc-service-enum
    desc: Swift NetBSD rc service enum
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: let svcDir = "/etc/rc.d"

composite_rules:
  - id: swift-process-report-http-exfil
    desc: Swift exfiltrates process report
    crit: hostile
    conf: 0.98
    all:
      - id: swift-process-report-marker
      - id: swift-http-post-report-body
  - id: swift-inventory-http-exfil
    desc: Swift inventory HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-system-process-inventory
      - id: swift-urlsession-collect-post
  - id: swift-network-info-http-exfil
    desc: Swift network info HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-network-recon-payload
      - id: swift-exfil-url-path
      - id: swift-http-post-report-body
  - id: swift-wmi-analog-http-exfil
    desc: Swift WMI analog HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-wmi-analog-marker
      - id: swift-netbsd-rc-service-enum
      - id: swift-urlsession-collect-post
