defaults:
  platforms: [unix]
  for: [perl]
  attack: T1041
  mbc: E1020

traits:
  - id: perl-http-json-socket-post
    desc: Perl raw HTTP JSON POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'IO::Socket::INET->new[\s\S]{0,360}POST \$path HTTP/1\.1'

  - id: perl-sensitive-env-loop
    desc: Perl filters secret env vars
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'PASS\|TOKEN\|KEY\|SECRET\|ACCESS\|CREDENTIAL\|PRIVATE'

  - id: perl-aws-credentials-path
    desc: Perl reads AWS credentials
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: .aws/credentials

  - id: perl-system-secret-file-loop
    desc: Perl loops over secret files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '"/etc/passwd",\s*"/etc/shadow",\s*"/etc/sudoers"'

  - id: perl-system-process-snapshot
    desc: Perl system process snapshot
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '`ps aux 2>/dev/null`[\s\S]{0,260}`netstat -an 2>/dev/null`'

  - id: perl-netbsd-info-collector
    desc: Perl NetBSD info collector
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'gather_netbsd_info[\s\S]{0,700}pkg_info'

composite_rules:
  - id: perl-env-cloud-http-exfil
    desc: Perl env cloud HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: perl-http-json-socket-post
      - id: perl-sensitive-env-loop
    any:
      - id: perl-aws-credentials-path
      - id: micro-behaviors/communications/http/post::post-request-line

  - id: perl-system-file-http-exfil
    desc: Perl system file HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: perl-http-json-socket-post
      - id: perl-system-secret-file-loop

  - id: perl-system-snapshot-http-exfil
    desc: Perl system snapshot exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/beacon/network/http::perl-lwp-beacon-post
      - id: perl-system-process-snapshot
    any:
      - id: objectives/exfiltration/http/upload::generic-http-exfil-endpoint

  - id: perl-netbsd-info-http-exfil
    desc: Perl NetBSD info exfil
    crit: hostile
    conf: 0.98
    all:
      - id: perl-netbsd-info-collector
      - id: objectives/exfiltration/http/upload::generic-http-exfil-endpoint
