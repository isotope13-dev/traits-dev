defaults:
  platforms: [unix]
  for: [shell]
  attack: T1041

traits:
  - id: shell-macos-process-inventory
    desc: Shell macOS process inventory
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ps auxww[\s\S]{0,220}ps axjf[\s\S]{0,220}lsof -i'

  - id: shell-macos-kext-launch-list
    desc: Shell macOS kext launch list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'kextstat[\s\S]{0,220}LaunchAgents'

  - id: shell-env-temp-dump
    desc: Shell env temp dump
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'env > /tmp/\.[^\n]{0,80}'

  - id: shell-macos-cpu-query
    desc: Shell macOS CPU query
    crit: notable
    conf: 0.90
    if:
      type: text
      substr: sysctl -n machdep.cpu.brand_string

  - id: shell-macos-version-query
    desc: Shell macOS version query
    crit: notable
    conf: 0.90
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: well-known/app/quickemu
    if:
      type: text
      substr: sw_vers

  - id: shell-macos-root-listeners
    desc: Shell macOS root listeners
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'awk ''\$2 == "root" \{ print \}''[\s\S]{0,180}grep LISTEN'

  - id: shell-curl-stdin-collect
    desc: Shell curl stdin collect
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'curl -s -X POST [^;\n]{0,120}/collect[\s\S]{0,120}--data-binary @-'

  - id: shell-compressed-cloud-upload
    desc: Shell compressed cloud upload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'gzip -c \| base64[\s\S]{0,260}X-Beacon:'

composite_rules:
  - id: shell-macos-process-http-exfil
    desc: Shell macOS process HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-curl-stdin-collect
    any:
      - id: shell-macos-process-inventory
      - id: shell-macos-kext-launch-list
    needs: 1

  - id: shell-macos-host-http-exfil
    desc: Shell macOS host HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-curl-stdin-collect
      - id: shell-macos-root-listeners
      - id: shell-env-temp-dump
      - id: shell-macos-cpu-query
      - id: shell-macos-version-query

  - id: shell-macos-cloud-info-exfil
    desc: Shell macOS cloud info exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-compressed-cloud-upload
    any:
      - id: objectives/credential-access/keychain/extract::dump-keychain
      - id: objectives/collection/stealer/workflow::chrome-profile-path
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-dir
    needs: 1
