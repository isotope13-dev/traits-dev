defaults:
  platforms: [unix, netbsd, windows]
  for: [powershell]
  attack: T1041

traits:
  - id: ps-process-monitor-function
    desc: PS process monitor function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Invoke-ProcessMonitoring

  - id: ps-json-stage-output
    desc: PS JSON stage output
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ConvertTo-Json[\s\S]{0,180}Out-File'
    unless:
      - id: well-known/app/azure-dev-cli/
      - id: well-known/app/windows-desktop-tools::playnite-source-path

  - id: ps-collect-post-exfil
    desc: PS collect POST exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Invoke-RestMethod[\s\S]{0,180}/collect[\s\S]{0,120}POST'

composite_rules:
  - id: ps-process-monitor-http-exfil
    desc: PS process monitor exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ps-process-monitor-function
      - id: ps-json-stage-output
      - id: ps-collect-post-exfil
    any:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::exfil
