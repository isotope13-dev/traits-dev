defaults:
  platforms: [netscaler, appliance, unix]
  for: [lua]
  attack: T1041

traits:
  - id: lua-netscaler-collect-post
    desc: Lua NetScaler collect POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'target_url[\s\S]{0,120}/collect'

  - id: lua-hex-encoded-upload
    desc: Lua hex encoded upload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: X-Encoded

  - id: lua-payload-type-exfil
    desc: Lua payload type exfil
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: X-Payload-Type

composite_rules:
  - id: lua-netscaler-hex-upload
    desc: Lua NetScaler hex upload
    crit: hostile
    conf: 0.98
    all:
      - id: lua-netscaler-collect-post
      - id: lua-hex-encoded-upload
    any:
      - id: lua-payload-type-exfil
