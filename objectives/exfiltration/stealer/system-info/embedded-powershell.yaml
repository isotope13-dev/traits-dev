defaults:
  platforms: [windows]
  for: [pe]
  attack: T1041

traits:
  - id: host-profile-query-parameters
    desc: URL query carries host identity fields
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '\?(key|token)=.{0,64}&(pc|host)=.{0,64}&user=.{0,64}&ip='

composite_rules:
  - id: embedded-powershell-host-profile-exfil
    desc: PowerShell exfiltrates host and public IP
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/exfiltration/stealer/system-info::host-profile-query-parameters
      - id: micro-behaviors/communications/http/ip-discovery::ipify-api
    any:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::iwr-uri
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::iwr-name
