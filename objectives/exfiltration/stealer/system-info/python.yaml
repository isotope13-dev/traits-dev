# System Information Exfiltration - Python
# Detects collection and exfiltration of system information
# MBC: E1082 (System Information Discovery) + T1041 (Exfiltration Over C2 Channel)
# ATT&CK: T1082, T1041
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: suspicious
  for: [python]
  mbc: "E1082+T1041"
  attack: "T1082+T1041"
composite_rules:
  - id: python-telemetry-host-profile-transport
    desc: Telemetry startup host-profile HTTPS transport
    crit: hostile
    conf: 0.98
    scope: archive
    for: [archives]
    attack: "T1082,T1041"
    all:
      - id: objectives/persistence/login/python-startup::pth-telemetry-initializer-import
      - id: micro-behaviors/os/sysinfo/environment::python-environment-collector
      - id: micro-behaviors/os/sysinfo/environment::python-installed-package-enumeration
      - id: micro-behaviors/communications/http/post::python-httpclient-post-transport
      - id: micro-behaviors/communications/socket/dial::python-dial

  - id: python-telemetry-startup-network
    desc: Startup telemetry reads env and opens socket
    crit: hostile
    conf: 0.98
    scope: archive
    for: [archives]
    attack: "T1546,T1041"
    all:
      - id: objectives/persistence/login/python-startup::pth-telemetry-initializer-import
      - id: micro-behaviors/os/env/vars/access::python-os-getenv-call
      - id: micro-behaviors/communications/socket/dial::python-dial

  - id: python-system-info-exfil
    desc: "Exfiltration of system information (User, Host, OS)"
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/discovery/system/fingerprint/hardware::python-username
      - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
      - id: micro-behaviors/data/encode/base64::base64-encoding
      - id: micro-behaviors/communications/http/request/client::request-python
