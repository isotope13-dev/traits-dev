defaults:
  platforms: [windows]
  for: [pe]
  attack: T1041,T1082
  mbc: E1041

composite_rules:
  - id: dotnet-host-profile-telegram-report
    desc: Windows host identity is reported through a Telegram bot and external endpoint
    crit: hostile
    conf: 0.98
    near_bytes: 8192
    all:
      - id: micro-behaviors/communications/messaging/send::telegram-bot-send-message
      - id: micro-behaviors/os/sysinfo/machine-id::machineguid
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
    unless:
      - id: metadata/signed/platform/

