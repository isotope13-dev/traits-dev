defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: node-host-user-json-fields
    desc: Node whoami JSON field
    crit: component
    conf: 0.88
    if:
      type: text
      word: whoami
  - id: node-package-version-json-fields
    desc: Node package version field
    crit: component
    conf: 0.82
    if:
      type: text
      word: packageVersion
  - id: node-system-profile-json
    desc: Node system profile JSON fields
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "operatingSystem.{0,80}ipAddress.{0,80}username"
  - id: node-client-identity-headers
    desc: Client identity HTTP headers
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: "X-Client-(OS|IP|User)"
    count_min: 3
composite_rules:
  - id: env-vars
    desc: Obfuscated exfiltration of environment variables
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/env/access::javascript
      - id: objectives/anti-static/obfuscation/eval/require::hex-buffer-decode
      - id: micro-behaviors/data/encode/base64/
  - id: node-system-info-fetch-exfil
    desc: Node system info JSON exfiltration
    crit: hostile
    conf: 0.96
    all:
      - id: node-system-profile-json
      - id: micro-behaviors/communications/http/request::fetch-json-body
    any:
      - id: objectives/discovery/host/geo::ip-address-camel
      - id: node-client-identity-headers
  - id: node-host-user-ip-post-exfil
    desc: Node package host user exfiltration
    crit: hostile
    conf: 0.97
    attack: T1041
    all:
      - id: objectives/discovery/system/fingerprint/hardware::node-hostname
      - id: objectives/discovery/system/fingerprint/hardware::node-userinfo
      - id: micro-behaviors/data/serialize/json::json-stringify-call
      - id: micro-behaviors/communications/http/request::post-method-text
      - id: micro-behaviors/communications/ip::http-ip-url
      - id: node-host-user-json-fields
      - id: node-package-version-json-fields
    any:
      - id: metadata/import/builtin::require-http
      - id: metadata/import/builtin::require-https
      - id: micro-behaviors/communications/http/request::http-client-usage
