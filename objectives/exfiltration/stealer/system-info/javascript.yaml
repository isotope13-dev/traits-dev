defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
- id: node-host-user-json-fields
  desc: Node whoami JSON field
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '["'']?whoami["'']?\s*:'
- id: node-package-version-json-fields
  desc: Node package version field marker
  crit: component
  conf: 0.82
  if:
    type: text
    word: packageVersion
- id: node-system-profile-json
  desc: Node system profile JSON fields
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "operatingSystem.{0,80}ipAddress.{0,80}username"
- id: node-compact-telemetry-fields
  desc: Compact host telemetry fields
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: \{['"]ts['"]:\w+,['"]type['"]:\w+,['"]hid['"]:\w+,['"]ss['"]:\w+,['"]cc['"]:\w+\}
  unless:
  - id: metadata/package/testing/
- id: node-encoded-post-form-fields
  desc: Encoded post form fields
  crit: component
  conf: 0.92
  if:
    type: text
    regex: fcG9z['"]\s*\+\s*['"]dA|kZm9y['"][\s\S]{0,40}GE|vdXJs
composite_rules:
- id: env-vars
  desc: Encoded environment-secret HTTP exfiltration
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/request/credentials::js-env-http-send
  - id: objectives/credential-access/env/secrets/filtered-access::node-filtered-secret-scan
  - id: micro-behaviors/data/encode/base64/
  unless:
  - id: well-known/lib/node-edge/
  - id: well-known/lib/npm-semver::semver-class
  - id: well-known/lib/npm-semver::semver-debug-env-marker
  - id: metadata/library/structure::vscode-extension-generated-asset
- id: node-system-info-fetch-exfil
  desc: Node system info JSON exfiltration
  crit: hostile
  conf: 0.96
  all:
  - id: node-system-profile-json
  - id: micro-behaviors/communications/http/request/client::fetch-json-body
  any:
  - id: micro-behaviors/communications/ip/parse::ip-address-camel
  - id: micro-behaviors/communications/http/headers::client-identity-headers
- id: node-windows-cli-http-exfil
  desc: Node Windows CLI HTTP exfil
  crit: hostile
  conf: 0.98
  attack: T1041
  all:
  - id: objectives/discovery/system/fingerprint/runtime::node-windows-cli-inventory
  - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  any:
  - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode
  - id: micro-behaviors/communications/http/request/client::post-method-text
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/harness/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
- id: node-host-user-ip-post-exfil
  desc: Node package host user exfiltration
  crit: hostile
  conf: 0.97
  attack: T1041
  all:
  - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
  - id: micro-behaviors/process/user/query::os-userinfo-call
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  - id: micro-behaviors/communications/http/request/client::post-method-text
  - id: micro-behaviors/communications/ip/literal::http-ip-url
  - id: node-host-user-json-fields
  - id: node-package-version-json-fields
  any:
  - id: metadata/import/builtin::require-http
  - id: metadata/import/builtin::require-https
  - id: micro-behaviors/communications/http/request/client::http-client-usage
- id: obfuscated-node-telemetry-exfil
  desc: Obfuscated Node telemetry exfiltration
  crit: hostile
  conf: 0.98
  attack: T1041
  all:
  - id: node-compact-telemetry-fields
  - id: node-encoded-post-form-fields
  - id: micro-behaviors/data/source/dynamic/load::node-dynamic-require-call
  any:
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::advanced-array-shuffling
  - id: objectives/anti-static/obfuscation/string/array::string-array-hex-index
  - id: objectives/command-and-control/dropper/execution/network-stage::buffer-base64-string-decoder
