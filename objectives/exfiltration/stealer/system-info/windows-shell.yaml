defaults:
  platforms: [windows]
  for: [batch, powershell, shell, binaries]
  attack: T1082,T1041
traits:
- id: windows-recon-output-file--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: tasklist
  count_max: 1017769
- id: windows-recon-output-file--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: whoami
  count_max: 1017771
composite_rules:
- id: windows-basic-recon-cluster
  desc: Windows network/system recon command cluster
  crit: notable
  conf: 0.9
  needs: 3
  any:
  - id: micro-behaviors/os/network/status::netstat
  - id: micro-behaviors/process/enumerate/shell::tasklist
  - id: micro-behaviors/process/user/query::windows-whoami-command
  - id: micro-behaviors/os/sysinfo/process::windows-systeminfo-command
  unless:
  - id: well-known/app/protected-benign-pe/
  - id: well-known/app/peazip::peazip-main-executable
- id: windows-recon-paste-exfil
  desc: Windows recon uploaded to paste service
  crit: hostile
  conf: 0.97
  all:
  - id: windows-basic-recon-cluster
  - id: windows-recon-output-file
  - id: objectives/exfiltration/oob/tunnel
  - id: objectives/command-and-control/infrastructure/paste
- id: windows-recon-output-file
  desc: Windows recon command output marker
  crit: component
  conf: 0.86
  needs: 2
  any:
  - id: micro-behaviors/os/sysinfo/process::systeminfo-token
  - id: windows-recon-output-file--rx-2
  - id: micro-behaviors/os/network/status::netstat
  - id: windows-recon-output-file--rx-4
  - id: micro-behaviors/os/env/vars/access::temp-var
