defaults:
  platforms: [windows]
  for: [batch, powershell, shell, binaries]
  attack: T1082,T1041
traits:
- id: windows-recon-output-file--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: systeminfo
- id: windows-recon-output-file--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: tasklist
- id: windows-recon-output-file--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: netstat
- id: windows-recon-output-file--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: whoami
- id: windows-recon-output-file--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: TEMP
composite_rules:
- id: windows-basic-recon-cluster
  desc: Windows network system process user recon
  crit: suspicious
  conf: 0.9
  needs: 3
  any:
  - id: micro-behaviors/os/network/status::netstat
  - id: micro-behaviors/process/enumerate/shell::tasklist
  - id: micro-behaviors/process/user/query::windows-whoami-command
  - id: micro-behaviors/os/sysinfo/process::windows-systeminfo-command
- id: windows-recon-paste-exfil
  desc: Windows recon uploaded to paste service
  crit: hostile
  conf: 0.97
  all:
  - id: windows-basic-recon-cluster
  - id: windows-recon-output-file
  - id: objectives/exfiltration/oob::curl-upload-method
  - id: objectives/command-and-control/infrastructure::public-paste-service
- id: windows-recon-output-file
  desc: Writes Windows recon to text file
  crit: suspicious
  conf: 0.86
  any:
  - id: windows-recon-output-file--rx-1
  - id: windows-recon-output-file--rx-2
  - id: windows-recon-output-file--rx-3
  - id: windows-recon-output-file--rx-4
  - id: windows-recon-output-file--rx-5
  needs: 1
