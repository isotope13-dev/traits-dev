defaults:
  platforms: [windows]
  for: [pe]
  attack: T1041

composite_rules:
- id: mac-identity-wcf-exfil
  desc: MAC fingerprint exfiltration over WCF
  crit: hostile
  conf: 0.99
  all:
  - id: objectives/discovery/system/fingerprint/network::dotnet-network-identity-fingerprint
  - id: micro-behaviors/communications/ip/literal::http-ip-url
  any:
  - id: objectives/command-and-control/infrastructure/ip::staged-tcp-query
  - id: micro-behaviors/communications/ipc/wcf::dotnet-wcf-tempuri-operation
  - id: objectives/discovery/system/fingerprint/network::user-service-path
