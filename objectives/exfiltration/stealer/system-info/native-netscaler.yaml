defaults:
  platforms: [netscaler, appliance, unix]
  for: [c, elf]
  attack: T1041

traits:
  - id: native-netscaler-http-beacon
    desc: Native NetScaler HTTP beacon
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /beacon HTTP/1.1

  - id: native-proc-cmdline-ref
    desc: Native /proc/PID/cmdline path reference
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '/proc/%s/cmdline|/proc/[0-9]+/cmdline'

composite_rules:
  - id: native-proc-cmdline-enum
    desc: Native proc cmdline enum
    crit: suspicious
    conf: 0.92
    all:
      - id: native-proc-cmdline-ref
    any:
      - id: micro-behaviors/os/env/access::native-environ-reference
      - id: native-netscaler-http-beacon

  - id: native-netscaler-system-http-exfil
    desc: Native NetScaler system HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-netscaler-http-beacon
      - id: micro-behaviors/communications/http/upload::octet-stream-upload-header
    any:
      - id: micro-behaviors/os/env/access::native-environ-reference
      - id: native-proc-cmdline-ref

  - id: native-netscaler-proc-http-exfil
    desc: Native NetScaler proc HTTP exfil
    crit: hostile
    conf: 0.97
    all:
      - id: native-proc-cmdline-ref
      - id: native-netscaler-http-beacon

  - id: native-netscaler-env-http-exfil
    desc: Native NetScaler env HTTP exfil
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/env/access::native-environ-reference
      - id: native-netscaler-http-beacon
