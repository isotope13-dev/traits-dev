defaults:
  platforms: [unix]
  for: [lua]
  attack: T1041
  mbc: E1020

traits:
  - id: lua-hex-command-table
    desc: Lua hex command table
    crit: suspicious
    conf: 0.94
    count_min: 6
    if:
      type: string_literal
      regex: '^[0-9a-f]{8,}$'

  - id: lua-hex-post-body
    desc: Lua hex-encodes POST body
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'local encoded = _hex_encode\(data\)[\s\S]{0,80}blob='

  - id: lua-curl-post-file-cleanup
    desc: Lua curl POST then removes file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'curl -s[\s\S]{0,80}-X POST -d @%s[\s\S]{0,80}rm -f %s'

composite_rules:
  - id: lua-encoded-system-http-exfil
    desc: Lua encoded system HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: lua-hex-command-table
      - id: lua-hex-post-body
      - id: lua-curl-post-file-cleanup
      - id: micro-behaviors/process/create/shell/invoke::lua-io-popen
