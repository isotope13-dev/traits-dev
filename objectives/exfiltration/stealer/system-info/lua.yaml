defaults:
  platforms: [unix, ios]
  for: [lua]
  attack: T1041
  mbc: E1020

composite_rules:
  - id: lua-host-recon-exfil
    desc: Lua host reconnaissance exfiltration
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/discovery/host/system::broad-host-recon-script
    any:
      - id: micro-behaviors/communications/http/post::post-request-line
      - id: micro-behaviors/communications/http/post::lua-http-request
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect
