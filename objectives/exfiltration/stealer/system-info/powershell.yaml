defaults:
  platforms: [windows]
  for: [powershell]
composite_rules:
  - id: ps-recon-exfil
    desc: PowerShell system recon with HTTP exfiltration
    crit: suspicious
    conf: 0.9
    attack: T1082
    all:
      - id: micro-behaviors/communications/ip::http-ip-url
      - id: micro-behaviors/os/wmi/query::query-os-info
