defaults:
  platforms: [windows]
  for: [powershell]
composite_rules:
  - id: ps-recon-exfil
    desc: PowerShell system recon with HTTP exfiltration
    crit: suspicious
    conf: 0.9
    attack: T1082
    all:
      - id: micro-behaviors/communications/ip::http-ip-url
      - id: micro-behaviors/os/wmi/query::query-os-info
  - id: ps-recon-curl-upload
    desc: PowerShell inventory curl upload
    crit: hostile
    conf: 0.95
    attack: T1041
    all:
      - id: ps-recon-exfil
      - id: objectives/command-and-control/beacon/network::curl-upload
    any:
      - id: micro-behaviors/fs/write/file::out-file
      - id: micro-behaviors/communications/ip::external-ipv4-port-any
  - id: ps-recon-defender-upload
    desc: PowerShell recon after Defender tampering
    crit: hostile
    conf: 0.96
    attack: T1562.001
    all:
      - id: ps-recon-curl-upload
      - id: objectives/evasion/anti-av/platform::defender-disable
