defaults:
  platforms: [netscaler, appliance, unix]
  for: [elf, binaries]
  attack: T1041

traits:
  - id: go-netscaler-beacon-curl
    desc: Go NetScaler beacon curl
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: curl -s -X POST http://%s/api/v1/beacon

  - id: go-netscaler-fw-agent
    desc: Go NetScaler fw agent
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: netscaler firmware agent

  - id: go-flash-nsconfig-conf
    desc: Go flash nsconfig conf
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /flash/nsconfig/ns.conf

composite_rules:
  - id: go-netscaler-firmware-beacon
    desc: Go NetScaler firmware beacon
    crit: hostile
    conf: 0.98
    all:
      - id: go-netscaler-beacon-curl
      - id: go-netscaler-fw-agent
    any:
      - id: go-flash-nsconfig-conf
