defaults:
  platforms: [windows]
  for: [php]
  attack: T1041

traits:
  - id: php-windows-profile-commands
    desc: PHP Windows profile commands
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ipconfig /all[\s\S]{0,260}tasklist /FO CSV[\s\S]{0,260}netstat -an'

  - id: php-env-profile-fields
    desc: PHP Windows env profile fields
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'USERPROFILE[\s\S]{0,180}SYSTEMDRIVE[\s\S]{0,180}PROGRAMFILES'

  - id: php-system-info-report
    desc: PHP system info report
    crit: component
    conf: 0.88
    if:
      type: literal
      exact: system_info

composite_rules:
  - id: php-windows-systeminfo-http-exfil
    desc: PHP Windows sysinfo HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-windows-profile-commands
      - id: php-env-profile-fields
      - id: php-system-info-report
      - id: objectives/command-and-control/remote-command/tasking::php-api-v1-report-path
