defaults:
  platforms: [windows]
  for: [pe]
  attack: T1041
traits:
- id: json-content-type-header
  desc: JSON content-type request header
  crit: notable
  conf: 0.95
  if:
    type: text
    exact: "Content-Type: application/json; charset=utf-8\r\n"
- id: systeminfo-client-user-agent
  desc: system inventory client user-agent
  crit: suspicious
  conf: 0.97
  if:
    type: text
    exact: SystemInfo Client/1.0
- id: ngrok-systeminfo-report-protocol
  desc: ngrok system inventory report protocol
  crit: suspicious
  conf: 0.99
  if:
    type: text
    regex: ngrok-free\.dev.{0,120}/api/report.{0,64}SystemInfo Client/1\.0
composite_rules:
- id: native-multi-source-winhttp-exfiltration
  desc: Multi-source loot staged for WinHTTP POST
  crit: hostile
  conf: 0.99
  attack: T1041,T1555.003,T1119
  for: [pe, dll]
  all:
    - id: objectives/collection/stealer/browser::native-browser-loot-report-schema
    - id: objectives/discovery/system/fingerprint/info::native-host-profile-schema
    - id: micro-behaviors/communications/http/client/winhttp::winhttp-runtime-resolution
    - id: micro-behaviors/communications/http/post::post-string-pe-wide

- id: winhttp-json-post
  desc: WinHTTP JSON POST exfiltration
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
  - id: json-content-type-header
  any:
  - id: systeminfo-client-user-agent
  - id: micro-behaviors/communications/http/endpoints::api-report-path
- id: tunnel-host-inventory-exfil
  desc: Host inventory exfiltration to tunnel
  crit: hostile
  conf: 0.99
  all:
  - id: objectives/discovery/system/fingerprint/info::win32-system-profiling
  - id: winhttp-json-post
  - id: objectives/command-and-control/infrastructure/domain/tunnel::ngrok-tunnel
  any:
  - id: systeminfo-client-user-agent
  - id: micro-behaviors/communications/http/endpoints::api-report-path
  - id: ngrok-systeminfo-report-protocol
  needs: 2
