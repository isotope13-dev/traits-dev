defaults:
  platforms: [windows]
  for: [batch]
  attack: T1059.006

traits:
  - id: pip-install-requests
    desc: Batch installs Python requests
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '(?im)^\s*pip\s+install\s+requests\s*$'

  - id: pip-install-pycryptodome
    desc: Batch installs Python cryptography dependency
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?im)^\s*pip\s+install\s+pycryptodome\s*$'

  - id: pip-install-console-style
    desc: Batch installs console styling dependency
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?im)^\s*pip\s+install\s+(pystyle|colorama)\s*$'

  - id: pip-install-wmi
    desc: Batch installs Python WMI dependency
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '(?im)^\s*pip\s+install\s+wmi\s*$'

  - id: pip-install-python-freezer
    desc: Batch installs Python executable builder
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '(?im)^\s*pip\s+install\s+(auto_py_to_exe|pyinstaller)\s*$'

  - id: pyinstaller-cookie-stealer-spec
    desc: Batch builds cookie stealer spec
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bpyinstaller\b.{0,80}\bcookie[\w./\\-]{0,40}\.spec\b'

  - id: pyinstaller-stealer-spec
    desc: Batch builds stealer spec
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bpyinstaller\b.{0,80}\bstealer[\w./\\-]{0,40}\.spec\b'

  - id: pyinstaller-keylogger-spec
    desc: Batch builds keylogger spec
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bpyinstaller\b.{0,80}\bkeylog(ger)?[\w./\\-]{0,40}\.spec\b'

  - id: pyinstaller-rat-screenlogger-spec
    desc: Batch builds RAT screenlogger spec
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bpyinstaller\b.{0,80}\b(rat|screenlog(ger)?)[\w./\\-]{0,40}\.spec\b'

composite_rules:
  - id: batch-python-stealer-dependency-set
    desc: Batch installs Python stealer dependency set
    crit: suspicious
    conf: 0.92
    all:
      - id: pip-install-requests
      - id: pip-install-pycryptodome
      - id: pip-install-wmi
    any:
      - id: pip-install-console-style
      - id: pip-install-python-freezer
    needs: 1

  - id: batch-python-stealer-builder-dependencies
    desc: Batch installs Python stealer builder dependencies
    crit: suspicious
    conf: 0.9
    all:
      - id: batch-python-stealer-dependency-set
      - id: pip-install-python-freezer

  - id: batch-python-cookie-stealer-builder
    desc: Batch builds Python cookie stealer
    crit: suspicious
    conf: 0.9
    all:
      - id: pyinstaller-cookie-stealer-spec
      - id: pip-install-python-freezer

  - id: batch-python-stealer-builder
    desc: Batch builds Python stealer
    crit: suspicious
    conf: 0.9
    all:
      - id: pyinstaller-stealer-spec
      - id: pip-install-python-freezer

  - id: batch-python-keylogger-builder
    desc: Batch builds Python keylogger
    crit: suspicious
    conf: 0.92
    all:
      - id: pyinstaller-keylogger-spec
      - id: pip-install-python-freezer

  - id: batch-python-rat-screenlogger-builder
    desc: Batch builds Python RAT screenlogger
    crit: suspicious
    conf: 0.9
    all:
      - id: pyinstaller-rat-screenlogger-spec
      - id: pip-install-python-freezer
