defaults:
  platforms: [qnx, unix]
  for: [python, pyc]
  attack: T1041

traits:
  - id: qnx-python-host-discovery-bundle
    desc: QNX Python host discovery bundle
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'sysctl[\s\S]{0,900}netstat[\s\S]{0,420}ifconfig'

  - id: qnx-python-collect-post
    desc: QNX Python collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'POST /collect HTTP/1\.1[\s\S]{0,260}X-Checksum'

  - id: qnx-python-sha256-exfil-header
    desc: QNX Python sha256 exfil header
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'X-Checksum[\s\S]{0,120}sha256'

  - id: qnx-pyc-host-discovery-bundle
    desc: QNX pyc host discovery bundle
    crit: suspicious
    conf: 0.94
    for: [pyc]
    if:
      type: text
      substr: network_connections

  - id: qnx-pyc-collect-post
    desc: QNX pyc collect POST
    crit: suspicious
    conf: 0.94
    for: [pyc]
    if:
      type: text
      regex: 'POST /collect HTTP/1\.1\r\nHost:'

  - id: qnx-pyc-sha256-exfil-header
    desc: QNX pyc sha256 exfil header
    crit: suspicious
    conf: 0.94
    for: [pyc]
    if:
      type: text
      substr: 'X-Checksum:'

  - id: qnx-pyc-sha256-symbol
    desc: QNX pyc sha256 symbol
    crit: suspicious
    conf: 0.94
    for: [pyc]
    if:
      type: text
      substr: sha256

composite_rules:
  - id: qnx-python-host-profile-exfil
    desc: QNX Python host profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-python-host-discovery-bundle
      - id: qnx-python-collect-post
      - id: qnx-python-sha256-exfil-header

  - id: qnx-pyc-host-profile-exfil
    desc: QNX pyc host profile exfil
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: qnx-pyc-host-discovery-bundle
      - id: micro-behaviors/os/network/interface::ifconfig
      - id: qnx-pyc-sha256-exfil-header
      - id: qnx-pyc-sha256-symbol
      - id: micro-behaviors/communications/socket/send::python-sendall-pyc-name
