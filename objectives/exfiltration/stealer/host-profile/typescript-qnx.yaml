defaults:
  platforms: [qnx, unix]
  for: [typescript, javascript]
  attack: T1041

traits:
  - id: qnx-ts-command-profile-fields
    desc: QNX TS command profile fields
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'qnx_syspage[\s\S]{0,420}qnx_processes[\s\S]{0,220}qnx_devinfo'

  - id: qnx-ts-secret-command-reads
    desc: QNX TS secret command reads
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'shadow_excerpt[\s\S]{0,420}ssh_keys'

composite_rules:
  - id: qnx-ts-automation-host-exfil
    desc: QNX TS automation host exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-ts-command-profile-fields
      - id: qnx-ts-secret-command-reads
      - id: objectives/command-and-control/backdoor/tasking/poll::qnx-ts-https-collect-post
