defaults:
  platforms: [unix, windows]
  for: [python, whl]
  attack: T1082,T1041
  mbc: E1082

traits:
  - id: python-device-id-field
    desc: Python device identifier field
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: text
      substr: '"device_id"'

  - id: python-host-name-field
    desc: Python host name field
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: text
      substr: '"host_name"'

  - id: python-cpu-field
    desc: Python CPU profile field
    crit: component
    for: [python]
    if:
      type: text
      word: cpu

  - id: python-memory-field
    desc: Python memory profile field
    crit: component
    for: [python]
    if:
      type: text
      word: memory

  - id: python-disk-field
    desc: Python disk profile field
    crit: component
    for: [python]
    if:
      type: text
      word: disk

  - id: python-gpu-field
    desc: Python GPU profile field
    crit: component
    for: [python]
    if:
      type: text
      word: gpu

  - id: python-profile-api-call
    desc: Python profile API call
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: text
      substr: _aigc_post

composite_rules:
  - id: python-hardware-profile-field
    desc: Python hardware profile field
    crit: notable
    conf: 0.9
    any:
      - id: python-cpu-field
      - id: python-memory-field
      - id: python-disk-field
      - id: python-gpu-field

  - id: python-remote-host-profile-reporting
    desc: Remote Python host profile reporting
    crit: hostile
    conf: 0.98
    for: [whl]
    scope: archive
    all:
      - id: python-device-id-field
      - id: python-host-name-field
      - id: python-hardware-profile-field
      - id: python-profile-api-call
      - id: objectives/command-and-control/backdoor/tasking/command-polling::python-remote-widget-task-worker
      - id: micro-behaviors/communications/http/request/client::request-python
