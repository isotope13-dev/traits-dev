defaults:
  platforms: [qnx, unix]
  for: [c, cpp, elf]
  attack: T1041

traits:
  - id: qnx-native-host-profile-lines
    desc: QNX native host profile lines
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'HOST=%s\\n[\s\S]{0,180}UID=%d EUID=%d\\n'

  - id: qnx-native-home-file-listing
    desc: QNX native home file listing
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: FILE=%s/%s

  - id: qnx-native-raw-socket-send
    desc: QNX native raw socket send
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'gethostbyname[\s\S]{0,520}send\(sock'

composite_rules:
  - id: qnx-native-host-profile-exfil
    desc: QNX native host profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-host-profile-lines
      - id: qnx-native-raw-socket-send

  - id: qnx-native-home-list-exfil
    desc: QNX native home listing exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-home-file-listing
      - id: qnx-native-raw-socket-send
