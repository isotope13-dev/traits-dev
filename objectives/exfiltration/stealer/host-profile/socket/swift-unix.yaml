defaults:
  platforms: [unix]
  for: [swift]
  attack: T1041

traits:
  - id: swift-socket-exfil-header
    desc: Swift socket exfil header
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: EXFIL:DATA

  - id: swift-unix-profile-fields
    desc: Swift Unix profile fields
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'HOSTNAME=[\s\S]{0,160}KERNEL=[\s\S]{0,160}ENV='

  - id: swift-c2-banner-write
    desc: Swift C2 banner write
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: WORM:HOST=

  - id: swift-checkin-path
    desc: Swift checkin path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/checkin

  - id: swift-systeminfo-function
    desc: Swift systemInfo function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: func systemInfo() -> String

composite_rules:
  - id: swift-socket-profile-exfil
    desc: Swift socket profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-socket-exfil-header
      - id: swift-unix-profile-fields

  - id: swift-socket-c2-banner
    desc: Swift socket C2 banner
    crit: hostile
    conf: 0.97
    all:
      - id: swift-c2-banner-write
      - id: swift-socket-exfil-header

  - id: swift-urlsession-profile-checkin
    desc: Swift profile checkin
    crit: hostile
    conf: 0.97
    all:
      - id: swift-checkin-path
      - id: swift-systeminfo-function
      - id: objectives/exfiltration/stealer/system-info::swift-http-post-report-body
