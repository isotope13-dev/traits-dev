defaults:
  platforms: [unix, appliance]
  for: [rust, elf]
  attack: T1041

traits:
  - id: rust-proc-profile-source-set
    desc: Rust /proc profile path set
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: '/proc/version[\s\S]{0,520}/proc/cpuinfo[\s\S]{0,520}/proc/meminfo'

  - id: native-exfil-command-token
    desc: Native EXFIL command token
    crit: suspicious
    conf: 0.9
    for: [elf]
    if:
      type: text
      regex: '\bEXFIL:'

  - id: rust-network-profile-source
    desc: Rust network profile source
    crit: notable
    conf: 0.9
    for: [rust]
    if:
      type: text
      regex: 'Command::new[\s\S]{0,160}["''](ip|ifconfig)["'']'
    unless:
      - type: text
        regex: 'pgy_probe|pgy_ipv4_candidates|POINTOPOINT|virtual IP'

  - id: rust-socket-profile-write
    desc: Rust socket profile write
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'stream\.write_all[\s\S]{0,160}payload'

composite_rules:
  - id: native-proc-profile-source-set
    desc: Native /proc profile path set
    crit: suspicious
    conf: 0.9
    for: [elf]
    all:
      - id: micro-behaviors/fs/path/os::proc-version
      - id: micro-behaviors/fs/proc/system::system-cpuinfo
      - id: micro-behaviors/fs/proc/system::system-meminfo

  - id: native-host-profile-exfil
    desc: Native host profile exfiltration
    crit: hostile
    conf: 0.96
    for: [elf]
    all:
      - id: native-proc-profile-source-set
      - id: native-exfil-command-token

  - id: rust-socket-profile-exfil
    desc: Rust socket profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-proc-profile-source-set
      - id: rust-socket-profile-write
    any:
      - id: rust-network-profile-source
      - id: objectives/command-and-control/backdoor/tasking/socket::rust-binary-beacon-magic
