defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: node-runs-hostname
    desc: Node wrapper runs hostname command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "run\\s*\\(\\s*['\"]hostname['\"]\\s*\\)"
  - id: node-runs-id
    desc: Node wrapper runs identity command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "run\\s*\\(\\s*['\"]id['\"]\\s*\\)"
  - id: node-runs-hostname-i
    desc: Node wrapper runs host IP command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "run\\s*\\(\\s*['\"]hostname -I['\"]\\s*\\)"

composite_rules:
  - id: node-host-profile-socket-exfil
    desc: Node host profiling sent over a socket
    crit: hostile
    conf: 0.98
    all:
      - id: node-runs-hostname
      - id: node-runs-id
      - id: node-runs-hostname-i
      - id: micro-behaviors/communications/socket/dial::javascript-dial
      - id: micro-behaviors/communications/socket/send::node-socket-json-write
    near_bytes: 2400
