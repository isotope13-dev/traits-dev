defaults:
  platforms: [qnx, unix]
  for: [objc]
  attack: T1041

traits:
  - id: qnx-objc-host-report
    desc: QNX ObjC host report
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: HOST DISCOVERY REPORT

  - id: qnx-objc-process-env-report
    desc: QNX ObjC process env report
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: PROCESS ENUMERATION

  - id: qnx-objc-interface-report
    desc: QNX ObjC interface report
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "IFACE: %s ADDR"

  - id: qnx-objc-http-collect-post
    desc: QNX ObjC HTTP collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'snprintf\(req[\s\S]{0,180}POST /collect HTTP/1\.1'

  - id: qnx-objc-octet-stream
    desc: QNX ObjC octet stream
    crit: component
    conf: 0.94
    if:
      type: text
      substr: application/octet-stream

composite_rules:
  - id: qnx-objc-host-profile-exfil
    desc: QNX ObjC host profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-objc-host-report
      - id: qnx-objc-process-env-report
      - id: qnx-objc-http-collect-post

  - id: qnx-objc-octet-host-exfil
    desc: QNX ObjC octet host exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-objc-http-collect-post
      - id: qnx-objc-octet-stream
      - id: qnx-objc-host-report

  - id: qnx-objc-inventory-http-exfil
    desc: QNX ObjC inventory HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-objc-interface-report
      - id: qnx-objc-process-env-report
      - id: qnx-objc-http-collect-post
