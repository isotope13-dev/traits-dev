defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1041

composite_rules:
  - id: native-passwd-curl-exfil
    desc: Native passwd curl exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/communications/http/curl::curl-post-flag
      - id: objectives/exfiltration/http/upload::exfil-beacon-http-endpoint

  - id: native-http-host-profile-exfil
    desc: Native HTTP host profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/exfiltration/stealer/system-info::native-environ-harvest-loop
      - id: objectives/exfiltration/stealer/credential/platform::native-http-octet-post
