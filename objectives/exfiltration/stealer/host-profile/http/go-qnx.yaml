defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1041

traits:
  - id: qnx-go-host-profile-json
    desc: QNX Go host profile JSON
    crit: component
    conf: 0.94
    if:
      type: text
      substr: env_probe

  - id: qnx-go-collect-post-path
    desc: QNX Go collect POST path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: :8080/collect

  - id: qnx-go-exfil-file-query
    desc: QNX Go exfil file query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/exfil?file=%s

  - id: qnx-go-sensitive-config-list
    desc: QNX Go sensitive config list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/(config/net\.cfg|config/system|ssl/private)'

  - id: qnx-go-agent-source-header
    desc: QNX Go agent source header
    crit: component
    conf: 0.94
    if:
      type: text
      substr: X-Source

composite_rules:
  - id: qnx-go-host-profile-http-exfil
    desc: QNX Go host profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-host-profile-json
      - id: qnx-go-collect-post-path
      - id: qnx-go-agent-source-header

  - id: qnx-go-sensitive-file-http-exfil
    desc: QNX Go sensitive file HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-exfil-file-query
      - id: qnx-go-sensitive-config-list

  - id: qnx-go-config-collect-exfil
    desc: QNX Go config collect exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::go-format-collect-url
      - id: qnx-go-sensitive-config-list
