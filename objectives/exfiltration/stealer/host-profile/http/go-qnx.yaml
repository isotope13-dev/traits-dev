defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1041

traits:
  - id: qnx-go-host-profile-json
    desc: QNX Go host profile JSON
    crit: component
    conf: 0.94
    if:
      type: text
      substr: env_probe

  - id: qnx-go-collect-endpoint-path
    desc: QNX-style HTTP /collect endpoint path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: ':8080/collect([/?]|$)'

  - id: qnx-go-exfil-file-query
    desc: QNX Go exfil file query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/exfil?file=%s

  - id: qnx-go-agent-source-header
    desc: QNX Go agent source header
    crit: component
    conf: 0.94
    if:
      type: text
      substr: X-Source

composite_rules:
  - id: qnx-go-host-profile-http-exfil
    desc: QNX Go host profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-host-profile-json
      - id: qnx-go-collect-endpoint-path
      - id: qnx-go-agent-source-header
