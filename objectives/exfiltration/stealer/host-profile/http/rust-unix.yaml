defaults:
  platforms: [unix]
  for: [rust]
  attack: T1041

traits:
  - id: rust-host-profile-commands
    desc: Rust host profile commands
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Command::new\("uname"\)[\s\S]{0,520}Command::new\("ps"\)'

  - id: rust-network-profile-command
    desc: Rust network profile command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Command::new\("netstat"\)'

  - id: rust-exfil-endpoint-url
    desc: Rust exfil endpoint URL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'https?://[^"''\s]{1,120}/exfil\b'

  - id: rust-ureq-octet-stream-post
    desc: Rust ureq octet POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ureq::post\(EXFIL_ENDPOINT\)[\s\S]{0,180}application/octet-stream'

composite_rules:
  - id: rust-host-profile-http-exfil
    desc: Rust host profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-host-profile-commands
      - id: rust-exfil-endpoint-url
      - id: rust-ureq-octet-stream-post
    any:
      - id: rust-network-profile-command
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
