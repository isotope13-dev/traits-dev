defaults:
  platforms: [unix]
  for: [rust, elf]
  attack: T1041

traits:
  - id: rust-host-profile-command-set
    desc: Rust host profile commands
    crit: suspicious
    conf: 0.92
    for: [rust]
    count_min: 2
    if:
      type: text
      regex: 'Command::new\("(uname|ps|netstat)"\)'
    unless:
      - id: metadata/package/testing/presence/harness::rust-tests-path-filename
      - id: metadata/package/testing/harness/unit::rust-test
      - id: micro-behaviors/communications/ipc/mcp::mcp-rust-child-process-transport
      - type: path
        dirname: true
        regex: '(^|[\\/])(test_infra|tests)([\\/]|$)'

  - id: unix-passwd-report-marker
    desc: Unix passwd report marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "===/etc/passwd==="

  - id: unix-ps-report-marker
    desc: Unix ps report marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ps-ef

  - id: unix-netstat-report-marker
    desc: Unix netstat report marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: netstat-an

  - id: rust-network-profile-command
    desc: Rust network profile command
    crit: notable
    conf: 0.9
    for: [rust]
    if:
      type: text
      regex: 'Command::new\("netstat"\)'

  - id: rust-exfil-path-marker
    desc: Rust /exfil path marker
    crit: component
    conf: 0.92
    if:
      type: text
      substr: /exfil

  - id: rust-ureq-octet-stream-post
    desc: Rust ureq octet POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ureq::post\(EXFIL_ENDPOINT\)[\s\S]{0,180}application/octet-stream'

  - id: rust-elf-octet-stream-exfil
    desc: Rust ELF octet stream exfil
    crit: suspicious
    conf: 0.92
    for: [elf]
    if:
      type: text
      regex: '/exfil.{0,120}application/octet-stream'

composite_rules:
  - id: rust-host-profile-evidence
    desc: Rust host profile evidence
    crit: suspicious
    conf: 0.94
    any:
      - id: rust-host-profile-command-set
      - id: unix-passwd-report-marker
      - id: unix-ps-report-marker
      - id: unix-netstat-report-marker
    needs: 2

  - id: rust-octet-exfil-transport
    desc: Rust octet exfil transport
    crit: suspicious
    conf: 0.94
    any:
      - id: rust-ureq-octet-stream-post
      - id: rust-elf-octet-stream-exfil

  - id: rust-host-profile-http-exfil
    desc: Rust host profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-host-profile-evidence
      - id: rust-exfil-path-marker
      - id: rust-octet-exfil-transport
