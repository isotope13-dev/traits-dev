defaults:
  platforms: [windows, unix, appliance]
  for: [powershell]
  attack: T1041

traits:
  - id: ps-system-state-fields
    desc: PowerShell system state fields
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'hostname[\s\S]{0,220}kernel[\s\S]{0,220}partitions'

  - id: ps-httpwebrequest-post
    desc: PowerShell HttpWebRequest POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'HttpWebRequest[\s\S]{0,180}\.Method = "POST"'

  - id: ps-exfil-state-path
    desc: PowerShell exfil state path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /exfil/state

composite_rules:
  - id: ps-system-state-http-exfil
    desc: PowerShell system state exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ps-system-state-fields
      - id: ps-httpwebrequest-post
      - id: ps-exfil-state-path
