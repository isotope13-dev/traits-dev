defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1041

traits:
  - id: python-host-profile-fields
    desc: Python host profile fields
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '"hostname"[\s\S]{0,160}"platform"[\s\S]{0,160}"system"'

  - id: python-android-product-prop
    desc: Python Android product property
    crit: suspicious
    conf: 0.9
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    if:
      type: text
      regex: 'ro\.product\.(brand|model|manufacturer)'
    unless:
      - id: well-known/lib/skia::source-tree

  - id: python-android-version-prop
    desc: Python Android version property
    crit: suspicious
    conf: 0.9
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    if:
      type: text
      substr: ro.build.version.release

  - id: python-hidden-device-id-file
    desc: Python hidden device id file
    crit: suspicious
    conf: 0.92
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    if:
      type: text
      regex: 'expanduser.{0,120}~/\.[^"'']{0,80}(device|machine|hwid|host)[_-]?id'

  - id: python-process-snapshot-command
    desc: Python process snapshot command
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '"ps"[\s\S]{0,80}"-eo"[\s\S]{0,140}"pid,ppid,user,stat,start,time,comm"'

composite_rules:
  - id: python-host-profile-raw-http-exfil
    desc: Python host profile raw HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: python-host-profile-fields
      - id: python-process-snapshot-command
      - id: micro-behaviors/communications/socket/connect::socket-sock-stream
      - id: objectives/exfiltration/http/collect::python-collect-post-line
      - id: micro-behaviors/communications/email/mime::mime-octet-stream

  - id: python-device-host-profile-fields
    desc: Python device host profile fields
    crit: suspicious
    conf: 0.94
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    all:
      - id: micro-behaviors/os/sysinfo/platform/runtime::platform-full
      - id: micro-behaviors/os/sysinfo/platform/runtime::platform-system
      - id: micro-behaviors/os/sysinfo/platform/runtime::python-platform-machine
      - id: micro-behaviors/communications/socket/connect::socket-gethostname

  - id: python-android-build-prop-fields
    desc: Python Android build property fields
    crit: suspicious
    conf: 0.93
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    all:
      - id: python-android-product-prop
      - id: python-android-version-prop

  - id: python-device-profile-checkin-post
    desc: Python device profile checkin POST
    crit: hostile
    conf: 0.98
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    all:
      - id: python-device-host-profile-fields
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/communications/http/request/client::python-json-post-method
    any:
      - id: python-android-build-prop-fields
      - id: python-hidden-device-id-file
    needs: 1
