defaults:
  platforms: [unix]
  for: [go, elf, macho]
  attack: T1041

composite_rules:
  - id: go-host-profile-http-exfil
    desc: Go host profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/discovery/system/profile::go-system-fingerprint-section
      - id: micro-behaviors/communications/http/endpoints::go-format-collect-url
    any:
      - id: objectives/discovery/system/profile::go-host-profile-command-set
      - id: objectives/discovery/system/fingerprint/runtime::go-system-info-discovery

  - id: go-command-profile-http-exfil
    desc: Go command profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/discovery/system/profile::go-host-profile-command-set
      - id: micro-behaviors/communications/http/endpoints::go-format-collect-url

  - id: go-sensitive-profile-exfil
    desc: Go sensitive profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/sensitive/credentials::unix-shadow-root-ssh-paths
    any:
      - id: micro-behaviors/communications/http/endpoints::collect-post-request
      - id: micro-behaviors/communications/http/endpoints::go-format-collect-url
