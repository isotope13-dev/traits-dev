defaults:
  platforms: [unix, appliance]
  for: [typescript, javascript]
  attack: T1041

traits:
- id: js-http-url-template-literal
  desc: JavaScript HTTP URL template literal
  crit: component
  conf: 0.94
  if:
    type: string_literal
    regex: 'https?://[^`''"]{1,160}\$\{[A-Za-z_$][A-Za-z0-9_$]*\}'

- id: ts-process-list-marker--processlist
  desc: Process list or envdump marker (processlist)
  crit: component
  conf: 0.93
  if:
    type: text
    word: processlist
- id: ts-process-list-marker--envdump
  desc: Process list or envdump marker (envdump)
  crit: component
  conf: 0.93
  if:
    type: text
    word: envdump
composite_rules:
- id: ts-process-list-marker
  desc: Process list or envdump marker
  crit: component
  conf: 0.93
  any:
  - id: ts-process-list-marker--processlist
  - id: ts-process-list-marker--envdump
- id: ts-process-env-collection
  desc: TS process list with env data
  crit: suspicious
  conf: 0.93
  near_bytes: 360
  all:
  - id: ts-process-list-marker
  - id: micro-behaviors/os/env/access::process-env

- id: ts-http-host-profile-exfil
  desc: TS HTTP host profile exfil
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/data/source/syntax/schema::host-system-metric-schema
  - id: ts-process-env-collection
  - id: micro-behaviors/communications/http/request/client::post-method-text
  - id: micro-behaviors/communications/http/request/client::request-write-call
- id: js-http-get-host-profile-exfil
  desc: JS HTTP GET host profile exfil
  crit: hostile
  conf: 0.98
  mbc: E1041
  all:
  - id: objectives/discovery/system/fingerprint/runtime::js-os-hostname
  - id: micro-behaviors/os/sysinfo/platform/runtime::os-platform-call
  - id: objectives/discovery/system/fingerprint/runtime::js-os-arch
  - id: micro-behaviors/communications/http/request/client::http-get-dup
  - id: js-http-url-template-literal
  any:
  - id: metadata/import/builtin::require-http
  - id: micro-behaviors/communications/ip/literal::external-ipv4-script
