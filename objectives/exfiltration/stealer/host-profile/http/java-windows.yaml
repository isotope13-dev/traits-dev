defaults:
  platforms: [windows]
  for: [java, class, java_class, jar]
  attack: T1041

traits:
  - id: java-accounts-endpoint
    desc: Java accounts endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /accounts

  - id: jvm-accounts-endpoint
    desc: JVM accounts endpoint
    crit: suspicious
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 61 63 63 6F 75 6E 74 73

  - id: java-windows-host-profile-fields
    desc: Java Windows host profile fields
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '--- ENV ---[\s\S]{0,220}--- DRIVES ---[\s\S]{0,220}--- PROCESSES ---'

composite_rules:
  - id: java-account-http-exfil
    desc: Java account HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/discovery/account/enum::java-windows-account-inventory
      - id: java-accounts-endpoint
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source

  - id: jvm-account-http-exfil
    desc: JVM account HTTP exfil
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: objectives/discovery/account/enum::jvm-windows-account-inventory
      - id: micro-behaviors/communications/http/lib/urlconnection::request-java-bytecode
      - id: micro-behaviors/communications/http/post::jvm-bytecode-post-method
      - id: micro-behaviors/communications/http/post::jvm-bytecode-do-output
      - id: micro-behaviors/communications/http/post::jvm-bytecode-outputstream-write
    any:
      - id: java-accounts-endpoint
      - id: jvm-accounts-endpoint

  - id: jvm-account-post-exfil
    desc: JVM account POST exfil
    crit: hostile
    conf: 0.97
    for: [class, java_class, jar]
    all:
      - id: objectives/discovery/account/enum::jvm-windows-account-inventory
      - id: jvm-accounts-endpoint
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-bytecode

  - id: java-windows-profile-http-exfil
    desc: Java Windows profile exfil
    crit: hostile
    conf: 0.98
    for: [java]
    all:
      - id: java-windows-host-profile-fields
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source

  - id: jvm-windows-profile-http-exfil
    desc: JVM Windows profile exfil
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: java-windows-host-profile-fields
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-bytecode
