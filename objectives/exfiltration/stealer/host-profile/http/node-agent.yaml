defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, npm]
  attack: T1041
  mbc: B0030

traits:
  - id: telemetry-upload-download-endpoint
    desc: Telemetry endpoint for file transfer
    crit: component
    conf: 0.98
    if:
      type: text
      substr: /api/telemetry/upload-download

composite_rules:
  - id: remote-host-profile-and-file-upload
    desc: Remote host profile with arbitrary file upload
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: objectives/discovery/system/fingerprint/runtime::js-os-hostname
      - id: objectives/discovery/system/fingerprint/runtime::js-os-userinfo
      - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
      - id: telemetry-upload-download-endpoint
      - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
      - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode
