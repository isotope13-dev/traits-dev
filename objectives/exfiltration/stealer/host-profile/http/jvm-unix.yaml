defaults:
  platforms: [unix]
  for: [java, kotlin, class, java_class, jar]
  attack: T1041

traits:
  - id: jvm-profile-temp-files
    desc: JVM profile temp files
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/tmp/\.sys_info[\s\S]{0,160}/tmp/\.proc_list'

  - id: jvm-exfil-base64-marker
    desc: JVM exfil base64 marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'EXFIL:[\s\S]{0,120}Base64\.getEncoder'

  - id: jvm-collect-octet-post
    desc: JVM collect octet POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/collect[\s\S]{0,220}application/octet-stream'

  - id: jvm-form-host-profile
    desc: JVM form host profile
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ENV=[\s\S]{0,220}HOST=[\s\S]{0,220}PROCS='

  - id: jvm-form-profile-field-names
    desc: JVM form profile fields
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: 'ENV=[\s\S]{0,180}&HOST=[\s\S]{0,180}&OS='

  - id: jvm-process-profile-field
    desc: JVM process profile field
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "&PROCS="

  - id: jvm-exfil-endpoint-post
    desc: JVM exfil endpoint POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/exfil[\s\S]{0,220}requestMethod = "POST"'

  - id: jvm-solaris-profile-headers
    desc: JVM Solaris profile headers
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '---PROCESSES---[\s\S]{0,220}---NETWORK---[\s\S]{0,220}---SMF---'

  - id: jvm-profile-temp-files-bytes
    desc: JVM profile temp file bytes
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 74 6D 70 2F 2E 73 79 73 5F 69 6E 66 6F

  - id: jvm-collect-octet-post-bytes
    desc: JVM collect octet POST bytes
    crit: component
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 61 70 70 6C 69 63 61 74 69 6F 6E 2F 6F 63 74 65 74 2D 73 74 72 65 61 6D

  - id: jvm-exfil-path-bytecode
    desc: JVM exfil path bytecode
    crit: component
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 65 78 66 69 6C

  - id: jvm-env-host-profile-bytes
    desc: JVM env host profile bytes
    crit: component
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 45 4E 56 3D

  - id: jvm-exfil-marker-bytes
    desc: JVM EXFIL marker bytes
    crit: suspicious
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 45 58 46 49 4C 3A

  - id: jvm-solaris-profile-bytes
    desc: JVM Solaris profile bytes
    crit: suspicious
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2D 2D 2D 50 52 4F 43 45 53 53 45 53 2D 2D 2D

composite_rules:
  - id: jvm-base64-profile-http-exfil
    desc: JVM profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-profile-temp-files
      - id: jvm-exfil-base64-marker
      - id: jvm-collect-octet-post

  - id: jvm-solaris-profile-http-exfil
    desc: JVM Solaris profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-solaris-profile-headers
      - id: jvm-collect-octet-post

  - id: jvm-bytecode-profile-http-exfil
    desc: JVM bytecode profile exfil
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-profile-temp-files-bytes
      - id: jvm-collect-octet-post-bytes
      - id: jvm-exfil-marker-bytes

  - id: jvm-bytecode-solaris-profile-exfil
    desc: JVM bytecode Solaris profile exfil
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-solaris-profile-bytes
      - id: jvm-collect-octet-post-bytes

  - id: jvm-form-host-profile-exfil
    desc: JVM form host profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-form-host-profile
      - id: jvm-exfil-endpoint-post

  - id: jvm-process-profile-exfil
    desc: JVM process profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-form-profile-field-names
      - id: jvm-process-profile-field
      - id: jvm-exfil-endpoint-post

  - id: jvm-bytecode-form-profile-exfil
    desc: JVM bytecode form profile exfil
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-exfil-path-bytecode
      - id: jvm-env-host-profile-bytes
