defaults:
  platforms: [windows]
  for: [ruby]
  attack: T1041

traits:
  - id: ruby-tasklist-command
    desc: Ruby tasklist command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: tasklist.exe

  - id: ruby-netstat-command
    desc: Ruby netstat -ano command
    crit: component
    conf: 0.9
    if:
      type: text
      substr: netstat -ano

  - id: ruby-schtasks-query-command
    desc: Ruby schtasks query command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: schtasks.exe /query

  - id: ruby-registry-runkey-query
    desc: Ruby registry Run key query
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'reg query[\s\S]{0,240}CurrentVersion\\\\Run'

  - id: ruby-oob-api-data-path
    desc: Ruby OOB API data path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /api/data/

  - id: ruby-http-chunk-headers
    desc: Ruby HTTP chunk headers
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'X-Chunk-ID[\s\S]{0,180}X-Chunk-Index[\s\S]{0,180}X-Chunk-Total'

  - id: ruby-base64-json-payload
    desc: Ruby Base64 JSON payload
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'Base64\.urlsafe_encode64\(JSON\.generate'
    unless:
      - id: metadata/package/testing/presence/harness::ruby-spec-file

composite_rules:
  - id: ruby-windows-inventory-commands
    desc: Ruby Windows inventory commands
    crit: suspicious
    conf: 0.94
    all:
      - id: ruby-tasklist-command
      - id: ruby-netstat-command
      - id: ruby-schtasks-query-command

  - id: ruby-oob-system-info-exfil
    desc: Ruby OOB system info exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-windows-inventory-commands
      - id: ruby-registry-runkey-query
      - id: ruby-base64-json-payload
      - id: ruby-oob-api-data-path
      - id: ruby-http-chunk-headers
