defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1041
  mbc: E1041

composite_rules:
  - id: npm-postinstall-env-profile-oob-exfil
    desc: npm postinstall exfils environment profile
    crit: hostile
    conf: 0.98
    ref: sha256:456f6483c9c64c940c3bb3182a1f2794c4d1d9be5e8d5cd8412e8ef6d45892f6
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
      - id: micro-behaviors/os/env/vars/access::npm-script-full-env-object
      - id: micro-behaviors/communications/http/post::npm-script-http-post
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
    any:
      - id: micro-behaviors/os/env/vars/access::npm-script-github-actions-oidc-vars
      - id: objectives/supply-chain/recon-exfil/inline::postinstall-host-env-object
