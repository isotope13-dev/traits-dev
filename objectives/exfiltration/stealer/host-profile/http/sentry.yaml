defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: E1041

composite_rules:
- id: sentry-public-ip-profile-exfil
  desc: Sentry exfils public IP profile
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/collection/monitor/telemetry::sentry-ingest-dsn
  - id: objectives/collection/stealer/host-profile::sentry-default-pii-enabled
  - id: objectives/collection/stealer/host-profile::sentry-set-user-call
  - id: objectives/collection/stealer/host-profile::sentry-ip-address-user-field
  - id: micro-behaviors/communications/http/endpoints::cloudflare-trace-ip-endpoint
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
