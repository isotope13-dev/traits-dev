defaults:
  platforms: [qnx, unix]
  for: [javascript, typescript]
  attack: T1041

composite_rules:
  - id: qnx-node-chunked-collect-exfil
    desc: QNX Node chunked collect exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::collect-post-request
      - id: micro-behaviors/data/runtime/keywords::chunk-seq-headers
      - id: micro-behaviors/data/runtime/keywords::fingerprint-string

  - id: qnx-node-multipart-profile-exfil
    desc: QNX Node multipart profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/runtime/keywords::gzip-sync
      - id: micro-behaviors/data/runtime/keywords::qnx-neutrino-ua
      - id: objectives/exfiltration/stealer/credential/ssh::qnx-node-multipart-ingest
