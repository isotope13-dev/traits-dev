defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

composite_rules:
- id: obfuscated-vscode-network-beacon
  desc: Obfuscated host and network module bridge
  crit: hostile
  conf: 0.97
  attack: T1041,T1195.002
  mbc: E1041
  all:
  - id: objectives/supply-chain/hidden-payload/runtime::obfuscated-vscode-global-module-bridge
  - id: micro-behaviors/data/source/property/computed::js-computed-property-call
  - id: objectives/anti-static/obfuscation/string/dynamic::arithmetic-decoder-wrapper-call
  any:
  - id: micro-behaviors/communications/http/request/client

- id: host-user-identity-http-query
  desc: Host user identity HTTP query exfiltration
  crit: hostile
  conf: 0.98
  attack: T1041
  mbc: E1041
  all:
  - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
  - id: micro-behaviors/data/source/property/identity
  - id: micro-behaviors/communications/http/request/client::http-request
  - id: micro-behaviors/communications/http/get::javascript-get-method-text
  - id: micro-behaviors/data/encode/url::encode-uri-component-call
  - id: metadata/library/vscode::vscode-extension-marker
  any:
  - id: micro-behaviors/fs/path/sensitive/credentials::gitconfig-file
  - id: micro-behaviors/fs/path/sensitive/credentials::git-repository-config-file

- id: obfuscated-dynamic-url-query
  desc: Obfuscated dynamic URL query construction
  crit: suspicious
  conf: 0.96
  all:
  - id: objectives/anti-static/obfuscation/control-flow/logic::js-tamper-checked-eval-unpacker
  - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
  - id: micro-behaviors/data/source/dynamic/load::node-computed-require-call
  - id: micro-behaviors/communications/http/url/query::js-urlsearchparams-construction

- id: obfuscated-dynamic-url-query-exfiltration
  desc: Obfuscated dynamic URL query exfiltration
  crit: hostile
  conf: 0.98
  attack: T1041
  mbc: E1041
  all:
  - id: obfuscated-dynamic-url-query
  - id: objectives/anti-static/obfuscation/control-flow/logic::js-complex-obfuscation
  - id: micro-behaviors/data/encode/xor::js-charcode-xor-operation
