defaults:
  platforms: [windows, unix]
  for: [swift]
  attack: T1041

traits:
  - id: swift-host-identity-fields
    desc: Swift host identity fields
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'hostName[\s\S]{0,180}userName'

  - id: swift-system-profile-fields
    desc: Swift system profile fields
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'operatingSystem[\s\S]{0,220}physicalMemory'

  - id: swift-exfil-source-host-field
    desc: Swift exfil source host field
    crit: component
    conf: 0.88
    if:
      type: text
      substr: source_host

composite_rules:
  - id: swift-host-profile-http-exfil
    desc: Swift host profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/exfiltration/stealer/credential/http::swift-cloud-credential-http-exfil
      - id: swift-host-identity-fields
      - id: swift-system-profile-fields
      - id: swift-exfil-source-host-field
