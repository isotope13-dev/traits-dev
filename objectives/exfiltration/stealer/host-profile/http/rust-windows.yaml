defaults:
  platforms: [windows]
  for: [rust]
  attack: T1041

traits:
  - id: rust-windows-host-profile-fields
    desc: Rust Windows host profile fields
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'hostname[\s\S]{0,220}username[\s\S]{0,220}process_count'

  - id: rust-windows-env-data-marker
    desc: Rust Windows env data marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ENV_DATA

composite_rules:
  - id: rust-windows-profile-http-exfil
    desc: Rust Windows profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-windows-host-profile-fields
      - id: rust-windows-env-data-marker
      - id: objectives/command-and-control/beacon/poll::rust-agent-http-beacon
