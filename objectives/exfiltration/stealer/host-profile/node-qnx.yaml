defaults:
  platforms: [qnx, unix]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: qnx-node-collect-socket-post
    desc: QNX Node collect socket POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /collect HTTP/1.1

  - id: qnx-node-chunk-seq-headers
    desc: QNX Node chunk sequence headers
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "X-Seq:"

  - id: qnx-node-fingerprint-system-data
    desc: QNX Node fingerprint system data
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: fingerprint

  - id: qnx-node-gzip-base64-exfil
    desc: QNX Node gzip base64 exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: gzipSync

  - id: qnx-node-qnx-neutrino-ua
    desc: QNX Node Neutrino user agent
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: QNX/7.1 (Neutrino; RTOS)

composite_rules:
  - id: qnx-node-chunked-collect-exfil
    desc: QNX Node chunked collect exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-collect-socket-post
      - id: qnx-node-chunk-seq-headers
      - id: qnx-node-fingerprint-system-data

  - id: qnx-node-multipart-profile-exfil
    desc: QNX Node multipart profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-gzip-base64-exfil
      - id: qnx-node-qnx-neutrino-ua
      - id: objectives/exfiltration/stealer/credential/ssh::qnx-node-multipart-ingest
