defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1041

traits:
  - id: qnx-perl-telemetry-post
    desc: QNX Perl telemetry POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /api/v1/telemetry HTTP/1.1

  - id: qnx-perl-sdp-user-agent
    desc: QNX Perl SDP user agent
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'User-Agent: sdp-client/8.1.0 (QNX)'

  - id: qnx-perl-env-host-profile
    desc: QNX Perl env host profile
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'PATH=$ENV{PATH}'

  - id: qnx-perl-sensor-harvest
    desc: QNX Perl sensor harvest
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: harvest_sensors

  - id: qnx-perl-i2c-device-glob
    desc: QNX Perl i2c device glob
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /dev/i2c-*

  - id: qnx-perl-exfil-beacon-call
    desc: QNX Perl exfil beacon call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: beacon('exfil'

composite_rules:
  - id: qnx-perl-sdp-telemetry-exfil
    desc: QNX Perl SDP telemetry exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-telemetry-post
      - id: qnx-perl-sdp-user-agent
      - id: qnx-perl-env-host-profile

  - id: qnx-perl-sensor-profile-exfil
    desc: QNX Perl sensor profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-sensor-harvest
      - id: qnx-perl-i2c-device-glob
      - id: qnx-perl-exfil-beacon-call
