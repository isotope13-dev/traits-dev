defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, javascript]
  attack: T1041

traits:
  - id: routeros-system-profile-read
    desc: RouterOS system profile read
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/system (identity|resource) (get|print)[\s\S]{0,700}/system'

  - id: routeros-interface-inventory
    desc: RouterOS interface inventory
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/interface (get|getall|print|find)'

  - id: routeros-ip-address-inventory
    desc: RouterOS IP address inventory
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/ip address (get|print|find|count)'

  - id: routeros-route-inventory
    desc: RouterOS route inventory
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/ip route (get|print|find|count)'

  - id: routeros-config-export-read
    desc: RouterOS config export read
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/export (compact|terse)'

  - id: routeros-firewall-inventory
    desc: RouterOS firewall inventory
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/ip firewall [a-z-]* ?(get|print|find)'

  - id: routeros-http-data-upload
    desc: RouterOS HTTP data upload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/tool fetch[\s\S]{0,520}(http-method=post|http-data=|upload-data=)'

  - id: routeros-fetch-collect-url
    desc: RouterOS fetch collect URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tool fetch[\s\S]{0,360}/(collect|exfil|beacon)'

composite_rules:
  - id: routeros-host-profile-http-exfil
    desc: RouterOS host profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-system-profile-read
      - id: routeros-interface-inventory
    any:
      - id: routeros-http-data-upload
      - id: routeros-fetch-collect-url

  - id: routeros-config-http-exfil
    desc: RouterOS config HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-config-export-read
      - id: routeros-http-data-upload
    any:
      - id: routeros-firewall-inventory
      - id: routeros-fetch-collect-url
