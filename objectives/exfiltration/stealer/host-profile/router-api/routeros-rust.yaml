defaults:
  platforms: [routeros, appliance, unix]
  for: [rust, elf]
  attack: T1041

traits:
  - id: rust-routeros-collect-path
    desc: Rust RouterOS collect URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'https?://[\s\S]{0,80}/collect([^A-Za-z]|$)'

  - id: rust-routeros-collect-context
    desc: Rust RouterOS collect context
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/collect[\s\S]{0,520}RouterOS|RouterOS[\s\S]{0,520}/collect'

  - id: rust-routeros-exfil-path
    desc: Rust RouterOS exfil path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'RouterOS[\s\S]{0,260}/exfil|/exfil[\s\S]{0,260}RouterOS'

  - id: rust-routeros-healthmonitor-agent
    desc: Rust RouterOS health agent
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: RouterOS-HealthMonitor

  - id: rust-routeros-http-agent
    desc: Rust RouterOS HTTP agent
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: RouterOS-HTTP-Agent

  - id: rust-mikrotik-routeros-agent
    desc: Rust MikroTik RouterOS UA
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: MikroTik/RouterOS

  - id: rust-unix-profile-source-set
    desc: Rust Unix profile source set
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/etc/os-release|/proc/version)[\s\S]{0,260}/proc/cpuinfo'

  - id: rust-routeros-network-profile-commands
    desc: Rust RouterOS profile commands
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'RouterOS[\s\S]{0,260}(ip addr|ifconfig|ss -tlnp)'

composite_rules:
  - id: rust-routeros-agent-header
    desc: Rust RouterOS agent header
    crit: suspicious
    conf: 0.9
    any:
      - id: rust-routeros-healthmonitor-agent
      - id: rust-routeros-http-agent
      - id: rust-mikrotik-routeros-agent

  - id: rust-routeros-host-profile-exfil
    desc: Rust RouterOS profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-routeros-agent-header
    any:
      - id: rust-routeros-collect-path
      - id: rust-routeros-collect-context
      - id: rust-routeros-exfil-path
      - id: rust-unix-profile-source-set
      - id: rust-routeros-network-profile-commands
    needs: 2
