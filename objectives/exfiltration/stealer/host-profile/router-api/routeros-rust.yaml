defaults:
  platforms: [routeros, appliance, unix]
  for: [rust, elf]
  attack: T1041

traits:
  - id: rust-generic-collect-url
    desc: Rust generic collect URL
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'https?://[\s\S]{0,80}/collect([^A-Za-z]|$)'
    unless:
      - id: metadata/package/testing/harness/unit/
      - id: metadata/package/testing/presence/harness::rust-tests-path-filename
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::tests-path-basename

  - id: rust-routeros-collect-context
    desc: Rust collect URL near RouterOS context
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/collect[\s\S]{0,520}RouterOS|RouterOS[\s\S]{0,520}/collect'

  - id: rust-routeros-exfil-path
    desc: Rust RouterOS exfil path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'RouterOS[\s\S]{0,260}/exfil|/exfil[\s\S]{0,260}RouterOS'

  - id: rust-routeros-healthmonitor-agent
    desc: Rust RouterOS health agent
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: RouterOS-HealthMonitor

  - id: rust-routeros-http-agent
    desc: Rust RouterOS HTTP agent
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: RouterOS-HTTP-Agent

  - id: rust-mikrotik-routeros-agent
    desc: Rust MikroTik RouterOS UA
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: MikroTik/RouterOS

  - id: rust-unix-profile-source-set
    desc: Rust Unix profile source set
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/etc/os-release|/proc/version)[\s\S]{0,260}/proc/cpuinfo'

composite_rules:
  - id: rust-routeros-agent-header
    desc: Rust RouterOS agent header
    crit: suspicious
    conf: 0.9
    any:
      - id: rust-routeros-healthmonitor-agent
      - id: rust-routeros-http-agent
      - id: rust-mikrotik-routeros-agent

  - id: rust-network-profile-command-set
    desc: Rust network profile commands
    crit: notable
    conf: 0.88
    any:
      - id: micro-behaviors/os/network/interface::ip-addr
      - id: micro-behaviors/os/network/interface::ifconfig
      - id: micro-behaviors/os/network/status::ss

  - id: rust-routeros-host-profile-exfil
    desc: Rust RouterOS profile exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-routeros-agent-header
    any:
      - id: rust-generic-collect-url
      - id: rust-routeros-collect-context
      - id: rust-routeros-exfil-path
      - id: rust-unix-profile-source-set
      - id: rust-network-profile-command-set
    needs: 2
