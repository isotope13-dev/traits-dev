defaults:
  platforms: [routeros, appliance, unix]
  for: [ruby]
  attack: T1041

traits:
  - id: ruby-routeros-sysinfo-commands
    desc: Ruby RouterOS sysinfo commands
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'uname -a[\s\S]{0,220}/proc/cpuinfo[\s\S]{0,220}ip addr show'

  - id: ruby-net-http-json-post
    desc: Ruby Net::HTTP JSON POST
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Net::HTTP::Post\.new[\s\S]{0,120}application/json'

  - id: ruby-sysinfo-path
    desc: Ruby sysinfo path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /sysinfo
    unless:
      - id: well-known/app/homebrew::source-tree

composite_rules:
  - id: ruby-routeros-sysinfo-exfil
    desc: Ruby RouterOS sysinfo exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-routeros-sysinfo-commands
      - id: ruby-net-http-json-post
      - id: ruby-sysinfo-path
