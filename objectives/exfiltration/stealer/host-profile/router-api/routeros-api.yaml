defaults:
  platforms: [routeros, appliance]
  for: [python, pyc]
  attack: T1041

composite_rules:
  - id: routeros-api-profile-http-exfil
    desc: RouterOS API profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/discovery/system/profile::routeros-api-host-profile-query-set
    any:
      - id: micro-behaviors/communications/http/request/client::requests-post-json-payload
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/http/post::python-base64-json-body
      - id: micro-behaviors/communications/http/lib/urllib::urllib-request-symbol
      - id: micro-behaviors/communications/http/lib/urllib::urllib-request-pyc-symbol
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-pyc-symbol
