defaults:
  platforms: [routeros, appliance, unix]
  for: [ruby]
  attack: T1041

traits:
  - id: ruby-geofence-report-path
    desc: Ruby geofence report path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /report

  - id: ruby-env-geo-json-report
    desc: Ruby env geo JSON report
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'environment: env_data[\s\S]{0,120}geolocation: geo_data'

composite_rules:
  - id: ruby-routeros-geo-report-exfil
    desc: Ruby RouterOS geo report exfil
    crit: hostile
    conf: 0.97
    all:
      - id: ruby-geofence-report-path
      - id: ruby-env-geo-json-report
      - id: ruby-net-http-json-post
