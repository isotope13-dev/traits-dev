defaults:
  platforms: [routeros, appliance]
  for: [javascript]
  attack: T1041

composite_rules:
  - id: routeros-js-profile-http-exfil
    desc: RouterOS JS profile HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/discovery/system/profile::routeros-js-host-profile-query-set
    any:
      - id: micro-behaviors/communications/http/post::http-post-call
      - id: micro-behaviors/communications/http/post::post-request-line
