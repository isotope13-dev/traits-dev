defaults:
  platforms: [qnx, unix, windows]
  for: [csharp, pe]
  attack: T1041

traits:
  - id: qnx-dotnet-cloud-exfil-method
    desc: QNX .NET cloud exfil method
    crit: component
    conf: 0.94
    if:
      type: text
      substr: ExfiltrateToCloud

  - id: qnx-dotnet-telemetry-path
    desc: QNX .NET telemetry path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /api/v1/telemetry

  - id: qnx-dotnet-process-files-json
    desc: QNX .NET process/file JSON fields
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'processes[\s\S]{0,600}files'

  - id: qnx-dotnet-hex-exfil-json
    desc: QNX .NET hex exfil JSON blob
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 7b226461746154797065223a22657866696c747261

composite_rules:
  - id: qnx-dotnet-system-info-http-exfil
    desc: QNX .NET system info HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-dotnet-cloud-exfil-method
      - id: qnx-dotnet-telemetry-path
      - id: qnx-dotnet-process-files-json
      - id: qnx-dotnet-hex-exfil-json
