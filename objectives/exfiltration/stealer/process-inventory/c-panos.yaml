defaults:
  platforms: [panos, appliance, unix]
  for: [c, elf]
  attack: T1041

traits:
  - id: c-panos-process-inventory
    desc: C PAN-OS process inventory
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ps auxww 2>/dev/null

  - id: c-panos-netstat-inventory
    desc: C PAN-OS netstat inventory
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ss -tunapl 2>/dev/null || netstat

composite_rules:
  - id: c-panos-process-network-exfil
    desc: C PAN-OS process network exfil
    crit: hostile
    conf: 0.98
    all:
      - id: c-panos-process-inventory
      - id: c-panos-netstat-inventory
      - id: objectives/exfiltration/stealer/credential/http::c-panos-tar-remove-archive
