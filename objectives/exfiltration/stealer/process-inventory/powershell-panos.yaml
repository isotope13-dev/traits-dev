defaults:
  platforms: [panos, appliance, windows]
  for: [powershell]
  attack: T1041

traits:
  - id: ps-panos-netip-recon
    desc: PS PAN-OS network IP recon
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Get-NetIPAddress -AddressFamily IPv4

  - id: ps-panos-panos-recon-source
    desc: PS PAN-OS recon source tag
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: source = "panos_recon"

composite_rules:
  - id: ps-panos-recon-http-exfil
    desc: PS PAN-OS recon HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ps-panos-netip-recon
      - id: ps-panos-panos-recon-source
      - id: objectives/command-and-control/remote-command/control::ps-panos-invoke-post
