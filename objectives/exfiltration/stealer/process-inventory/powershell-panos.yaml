defaults:
  platforms: [panos, appliance, windows]
  for: [powershell]
  attack: T1041

traits:
  - id: ps-panos-panos-recon-source
    desc: PS PAN-OS recon source tag
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: source = "panos_recon"

composite_rules:
  - id: ps-panos-recon-http-exfil
    desc: PS PAN-OS recon HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/network/interface::powershell-get-netipaddress
      - id: ps-panos-panos-recon-source
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-post-method
