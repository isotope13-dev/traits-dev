defaults:
  platforms: [android]
  for: [rust]
  attack: T1041

traits:
  - id: rust-proc-cmdline-walk
    desc: Rust proc cmdline walk
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/proc/\{\}/(cmdline|status)'

  - id: rust-process-json-payload
    desc: Rust process JSON payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ExfilPayload[\s\S]{0,160}(processes|process_info|process_count)'

composite_rules:
  - id: rust-android-process-inventory-exfil
    desc: Rust Android process inventory exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-proc-cmdline-walk
      - id: rust-process-json-payload
