defaults:
  platforms: [aix, unix]
  for: [java]
  attack: T1041
composite_rules:
  - id: aix-java-process-inventory-exfil
    desc: AIX Java process inventory exfil
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source
      - id: micro-behaviors/process/enumerate/shell::java-ps-ef-command
    any:
      - id: micro-behaviors/process/enumerate/shell::java-ps-eo-command
      - id: micro-behaviors/fs/proc/info/listing::java-proc-pid-directory-walk
      - id: micro-behaviors/fs/proc/info/listing::java-proc-pid-status-read
    needs: 1
