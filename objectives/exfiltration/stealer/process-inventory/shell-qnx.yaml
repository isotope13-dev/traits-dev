defaults:
  platforms: [qnx, unix]
  for: [shell]
  attack: T1041

traits:
  - id: qnx-shell-flat-db-stage
    desc: QNX shell flat DB stage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: DB_FILE="/tmp/.sys_data.db"

  - id: qnx-shell-qnx-proc-collect
    desc: QNX shell proc info collect
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: db_insert "qnx" "proc_info"

  - id: qnx-shell-db-curl-upload
    desc: QNX shell DB curl upload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'curl -s -X POST "http://\$\{BENCHMARK_HOST\}/collect"[\s\S]{0,160}-d "@\$\{DB_FILE\}"'

  - id: qnx-shell-db-wget-upload
    desc: QNX shell DB wget upload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: wget -q --post-file="$DB_FILE"

composite_rules:
  - id: qnx-shell-flat-db-http-exfil
    desc: QNX shell flat DB HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-shell-flat-db-stage
      - id: qnx-shell-db-curl-upload

  - id: qnx-shell-proc-db-http-exfil
    desc: QNX shell proc DB HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-shell-qnx-proc-collect
      - id: qnx-shell-db-curl-upload
