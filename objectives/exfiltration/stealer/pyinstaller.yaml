# PyInstaller-packed Python Stealer Detection
# ATT&CK: T1005 (Data from Local System)
# MBC: E1004 (Data Theft)
defaults:
  platforms: [windows, macos, linux, unix]
  for: [pe, macho, elf]
  mbc: "E1004"
composite_rules:
  - id: pyinstaller-pe-stealer
    desc: PyInstaller Python stealer (psutil recon + embedded payload)
    crit: hostile
    conf: 0.95
    platforms: [windows]
    for: [pe]
    attack: "T1005"
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-pe-psutil-windows
    any:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-pe-embedded-exe
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-mpyimod
  - id: pyinstaller-cookie-stealer
    desc: PyInstaller packed browser cookie stealer
    crit: hostile
    conf: 0.95
    attack: "T1539"
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-browser-cookie3
    any:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-requests-module
      - id: micro-behaviors/data/db/conn/sqlite::sqlite3-string
  - id: pyinstaller-browser-cred-stealer
    desc: PyInstaller packed browser credential stealer
    crit: hostile
    conf: 0.96
    attack: T1555.003
    platforms: [windows]
    for: [pe]
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-win32crypt-module
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-requests-module
      - id: micro-behaviors/data/db/conn/sqlite::sqlite3-string
  - id: pyinstaller-chromium-cred-stealer
    desc: PyInstaller packed Chromium credential stealer
    crit: hostile
    conf: 0.98
    attack: T1555.003
    platforms: [windows]
    for: [pe]
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-win32crypt-module
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-cryptography-module
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-requests-module
      - id: micro-behaviors/data/db/conn/sqlite::sqlite3-string
  - id: pyinstaller-discord-cookie-stealer
    desc: PyInstaller Discord bot with cookie stealing
    crit: hostile
    conf: 0.96
    attack: T1539
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-discord-module
    any:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-cookie-read-fail
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-aiohttp-cookiejar
  - id: pyinstaller-screen-mutator-stealer
    desc: PyInstaller screenshot stealer with mutation testing
    crit: hostile
    conf: 0.98
    attack: T1041
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-mss-screenshot-module
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-requests-module
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-vt-client
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-appender-module
    any:
      - id: objectives/anti-static/obfuscation/payload::pyinstaller-overlay-mutator
      - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay-raw
      - id: metadata/binary/layout::overlay-over-90pct
