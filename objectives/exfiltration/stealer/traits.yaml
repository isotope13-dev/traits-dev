# Data Exfiltration Patterns for Info-Stealers
# Detects C2 communication patterns common in credential stealers
# ATT&CK: T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  attack: "T1041"
  crit: suspicious
  # curl/wget commands can be embedded in any file type
  for: [shell, python, javascript, ruby]
traits:
  # === Gate URL atomic (EXFIL-SPECIFIC) ===
  - id: gate-var-http
    desc: gate = http variable
    crit: notable
    conf: 0.7
    for: [shell, python, javascript]
    if:
      type: string_value
      regex: "\\bgate\\s*=\\s*[\"']http"
  - id: c2-var-http
    desc: c2 = http variable
    crit: notable
    conf: 0.7
    for: [shell, python, javascript]
    if:
      type: string_value
      regex: "\\bc2\\s*=\\s*[\"']http"
  - id: panel-var-http
    desc: panel = http variable
    crit: notable
    conf: 0.7
    for: [shell, python, javascript]
    if:
      type: string_value
      regex: "\\bpanel\\s*=\\s*[\"']http"
composite_rules:
  # Gate URL (exfil-specific)
  - id: gate-url
    desc: Hardcoded gate/C2 URL variable
    crit: suspicious
    conf: 0.85
    for: [shell, python, javascript]
    any:
      - id: gate-var-http
      - id: c2-var-http
      - id: panel-var-http
        # curl POST with custom headers
        # NOTE: This is suspicious because legitimate downloads don't use custom POST headers
  - id: multipart-upload-comp
    desc: Multipart upload with stealer context
    crit: suspicious
    conf: 0.75
    for: [shell, python, javascript]
    all:
      - id: micro-behaviors/communications/http/headers::multipart-upload
    any:
      - id: gate-url
      - id: micro-behaviors/communications/http/headers::bot-headers
      - id: micro-behaviors/communications/http/client
    unless:
      - id: metadata/format/magic::pe-dos-stub
    none:
      - id: metadata/quality/testing::wpt-test-file
      - id: metadata/quality/testing::jest-test-file
      - id: metadata/quality/testing::mocha-test-file
      - id: metadata/quality/testing::test-filename-pattern
      - id: objectives/lateral-movement/supply-chain/npm/testing::test-fixtures
      - id: metadata/library/axios::axios-class
        # Full exfiltration pattern: must have POST with custom headers or C2 indicators
        # NOTE: Simple curl downloads (without POST/upload indicators) won't trigger this
  - id: stealer-exfil
    desc: Stealer data exfiltration pattern
    crit: notable
    conf: 0.95
    mbc: "C0001"
    for: [shell]
    needs: 3
    any:
      - id: micro-behaviors/communications/http/curl::curl-post
      - id: objectives/command-and-control/beacon/network::curl-upload
      - id: micro-behaviors/communications/http/headers::bot-headers
      - id: gate-url
      - id: micro-behaviors/communications/http/upload::zip-upload
