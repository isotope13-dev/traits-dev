defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
  crit: hostile
composite_rules:
  - id: targeted-app-recon-exfil
    desc: Reconnaissance targeting specific browsers/office apps combined with exfiltration
    conf: 1.0
    all:
      - id: micro-behaviors/process/enumerate/apps::browser-apps
      - id: micro-behaviors/process/enumerate/apps::office-apps
    any:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
      - id: objectives/command-and-control/beacon/network::direct-http-c2
    downgrade:
      any:
        - id: metadata/signed/anchor-apple
        - id: metadata/signed/platform::apple
        - id: metadata/format::many-imports
        - id: metadata/lang/compiler::rust-binary
    unless:
      - id: metadata/format/pe::resource-only-dll
