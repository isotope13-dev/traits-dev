defaults:
  platforms: [windows]
  for: [pe]
  attack: T1041

traits:
  - id: ahk-xmlhttp-create
    desc: AutoHotkey XMLHTTP COM client
    crit: suspicious
    conf: 0.95
    attack: T1071.001
    if:
      type: text
      exact: 'http := ComObjCreate("MSXML2.XMLHTTP")'

  - id: ahk-process-post-open
    desc: AutoHotkey process list POST
    crit: suspicious
    conf: 0.98
    attack: T1071.001
    if:
      type: text
      exact: 'http.Open("POST", "http://ise.ms/b7.php", false)'

  - id: ahk-urlencoded-header
    desc: AutoHotkey form URL encoded header
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: 'http.setRequestHeader("Content-Type", "application/x-www-form-urlencoded")'

  - id: ahk-processlist-send
    desc: AutoHotkey process list exfil send
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: 'http.Send("v=" processList)'

  - id: ahk-processlist-error-send
    desc: AutoHotkey process enum error beacon
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: 'http.Send("v=e!")'

composite_rules:
  - id: ahk-process-inventory-http-exfil
    desc: AutoHotkey process inventory HTTP exfiltration
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/discovery/host/process::ahk-wmi-process-inventory
      - id: ahk-xmlhttp-create
      - id: ahk-urlencoded-header
      - id: ahk-processlist-send
    any:
      - id: ahk-process-post-open
      - id: objectives/command-and-control/infrastructure/domain::short-domain-url-pattern
    needs: 1

  - id: ahk-process-inventory-failure-beacon
    desc: AutoHotkey process recon failure beacon
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/discovery/host/process::ahk-wmi-process-inventory
      - id: ahk-xmlhttp-create
      - id: ahk-process-post-open
      - id: ahk-urlencoded-header
      - id: ahk-processlist-error-send
