defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
  crit: hostile
composite_rules:
  - id: targeted-app-recon-exfil
    desc: Recon targeting specific browsers/office apps combined with exfiltration
    conf: 1.0
    all:
      - id: objectives/discovery/host/process::tasklist-shell
      - id: micro-behaviors/process/enumerate/apps::browser-apps
      - id: micro-behaviors/process/enumerate/apps::office-apps
    any:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: objectives/command-and-control/beacon/network/http::direct-http-c2
    downgrade:
      any:
        - id: metadata/signed/anchor-apple
        - id: metadata/signed/platform::apple
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/lang/compiler/systems/
    unless:
      - id: metadata/binary/resource/
