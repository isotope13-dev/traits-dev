defaults:
  platforms: [unix, windows]
  for: [scripts]
  attack: T1041
  mbc: E1041
traits:
  - id: sync-connect-message
    desc: sync_connect token
    crit: component
    conf: 0.9
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      substr: sync_connect
  - id: sync-dataset-user-fields
    desc: Sync dataset user fields
    crit: suspicious
    conf: 0.88
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      regex: 'dataset_id.{0,80}user_id|user_id.{0,80}dataset_id'
  - id: encrypted-op-callback
    desc: Encrypted operation sync handler
    crit: suspicious
    conf: 0.88
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      substr: on_op_received

composite_rules:
  - id: personal-data-sync-relay
    desc: Personal data sync relay
    crit: hostile
    conf: 0.94
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    all:
      - id: sync-connect-message
      - id: sync-dataset-user-fields
    any:
      - id: encrypted-op-callback
      - id: micro-behaviors/communications/http/headers::bearer-header-from-token
      - id: micro-behaviors/communications/http/websocket::websockets-python-lib
