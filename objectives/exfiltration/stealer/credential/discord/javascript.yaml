# Discord Credential Exfiltration - JavaScript
# Detects exfiltration of credentials to Discord webhooks
# ATT&CK: T1552.001 (Credentials In Files), T1567 (Exfiltration Over Web Service)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: sensitive-file-name
    desc: Sensitive credential filename
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: ayarlar.json
  - id: recognized-dotenv-default-path
    desc: Recognized dotenv default path resolution
    crit: component
    conf: 1.0
    if:
      type: text
      substr: path.resolve(process.cwd(), '.env')
  - id: recognized-dotenv-env-population
    desc: Recognized dotenv env population
    crit: component
    conf: 1.0
    if:
      type: text
      substr: process.env[key] = parsed[key]
composite_rules:
  - id: js-sensitive-file-target
    desc: Targets sensitive configuration files
    crit: component
    conf: 0.85
    all:
      - id: sensitive-file-name
    any:
      - id: micro-behaviors/fs/file/read::read-node
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
    unless:
      - id: recognized-dotenv-default-path
      - id: recognized-dotenv-env-population
  - id: discord-token-http-query-exfiltration
    desc: Extension sends Discord token in an HTTP query
    crit: hostile
    conf: 0.99
    attack: T1041,T1539,T1528
    scope: archive
    for: [crx, xpi, zip, archives]
    all:
      - id: micro-behaviors/data/db/web-storage::browser-storage-token-key-read
      - id: micro-behaviors/communications/http/request/credentials::token-variable-in-fetch-query
      - id: metadata/permission/host::host-permission-discord
