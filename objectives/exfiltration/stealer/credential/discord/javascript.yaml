# Discord Credential Exfiltration - JavaScript
# Discord token/credential theft with webhook exfiltration
# ATT&CK: T1567 (Exfiltration Over Web Service)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
  attack: "T1567"
composite_rules:
  - id: js-discord-cred-exfil
    desc: Exfiltration of sensitive files to Discord
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/exfiltration/messaging::discord-webhook-url-dup
      - id: objectives/credential-access/discord/exfil::js-sensitive-file-target
      - id: micro-behaviors/fs/file/read::read-node
  - id: script-kiddie-webhook-grabber
    desc: Discord token grabber using hardcoded WebhookClient
    crit: hostile
    conf: 0.98
    mbc: B0030
    all:
      - id: micro-behaviors/communications/http/webhook::discord-webhook-client-hardcoded
      - id: objectives/credential-access/discord/token::discord-path
