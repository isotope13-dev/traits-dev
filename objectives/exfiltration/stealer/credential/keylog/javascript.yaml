# Keylogger Exfiltration - JavaScript/Node.js
# Keylogger with network exfiltration (collection + network = exfiltration)
# ATT&CK: T1056.001 (Input Capture: Keylogging) + T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: js-keylogger-exfil
    desc: JavaScript keylogger with exfiltration
    crit: hostile
    conf: 0.95
    attack: "T1056.001"
    mbc: "B0015"
    for: [javascript]
    all:
      - id: micro-behaviors/communications/http/request::axios-post-call
    any:
      - id: micro-behaviors/hardware/input/keyboard::node-keyboard-listener
      - id: micro-behaviors/hardware/input/keyboard::global-keyboard-listener
