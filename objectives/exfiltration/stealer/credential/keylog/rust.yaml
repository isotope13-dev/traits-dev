defaults:
  platforms: [windows, unix]
  for: [rust, elf]
  attack: T1056.001
traits:
  - id: rust-keyboard-events-endpoint
    desc: Rust keyboard events endpoint
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /api/validate/keyboard-events
  - id: rust-keystring-field
    desc: Rust keyString exfil field
    crit: component
    conf: 0.9
    if:
      type: text
      substr: keyString
  - id: rust-clipstring-field
    desc: Rust clipString exfil field
    crit: component
    conf: 0.9
    if:
      type: text
      substr: clipString
composite_rules:
  - id: rust-keyboard-clipboard-exfiltration
    desc: Rust keyboard clipboard exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: rust-keyboard-events-endpoint
      - id: rust-keystring-field
      - id: rust-clipstring-field
  - id: rust-evdev-keylog-http-exfil
    desc: Rust evdev keylog HTTP exfil
    crit: hostile
    conf: 0.98
    platforms: [unix]
    attack: T1041
    all:
      - id: objectives/collection/keylog/hook::rust-unix-evdev-keylogger
      - id: micro-behaviors/communications/http/endpoints::collect-post-request
