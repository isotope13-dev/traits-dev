defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041

traits:
- id: cursor-auth-send-log
  desc: Cursor auth sent log
  crit: component
  conf: 0.92
  if:
    type: text
    substr: Cursor auth sent to bridge

- id: auth-message-type
  desc: Auth message type field
  crit: component
  conf: 0.78
  if:
    type: text
    regex: 'type:\s*["'']auth["'']'

composite_rules:
- id: cursor-auth-websocket-exfil
  desc: Cursor auth token WebSocket exfiltration
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/credential-access/dev-tools/cursor::cursor-auth-access-token-key
  - id: objectives/credential-access/dev-tools/cursor::cursor-auth-refresh-token-key
  - id: micro-behaviors/communications/http/websocket::wss-scheme
  any:
  - id: objectives/credential-access/dev-tools/cursor::cursor-itemtable-value-query
  - id: cursor-auth-send-log
  - id: auth-message-type
