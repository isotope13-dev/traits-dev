defaults:
  platforms: [unix, windows]
  for:
    - java
    - class
traits:
  - id: gson-config-jar-string
    desc: Gson config JAR staging path
    crit: suspicious
    conf: 0.95
    for: [class, jar, zip]
    if:
      type: text
      exact: gson-2.10.1.jar
  - id: fabric-mod-metadata
    desc: Fabric mod manifest filename
    crit: component
    conf: 0.86
    for: [jar, zip]
    if:
      type: text
      substr: fabric.mod.json
  - id: forge-eventhandler-ref
    desc: Forge event handler annotation reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: Mod$EventHandler
  - id: forge-preinit-ref
    desc: Forge preinit event reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: FMLPreInitializationEvent
  - id: minecraft-session-field
    desc: Minecraft session field label
    crit: component
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: text
      exact: session
  - id: minecraft-token-field
    desc: Minecraft token field label
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      exact: token
  - id: minecraft-client-ref
    desc: Minecraft client singleton reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: net/minecraft/class_310
  - id: minecraft-session-ref
    desc: Minecraft session object reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: net/minecraft/class_320
  - id: minecraft-name-getter-ref
    desc: Minecraft name getter reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: method_1676
  - id: minecraft-token-getter-ref
    desc: Minecraft access token getter
    crit: component
    conf: 0.92
    for: [class, jar, zip]
    if:
      type: text
      substr: method_1674
  - id: minecraft-uuid-getter-ref
    desc: Minecraft UUID getter reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: method_44717
  - id: reversed-weedhack-module-url
    desc: Reversed Weedhack module URL
    crit: component
    conf: 0.99
    for: [class, jar, zip]
    if:
      type: text
      substr: "#eludom/raj/selif/ur.kcahdeew//:ptth"
  - id: initialize-weedhack-callback
    desc: Weedhack payload init callback
    crit: component
    conf: 0.99
    for: [class, jar, zip]
    if:
      type: text
      substr: initializeWeedhack
composite_rules:
  - id: fabric-reflective-remote-loader
    desc: Fabric mod reflective remote loader
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-mod-metadata
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-urlclassloader-bytecode
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-getdeclaredconstructor
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-method-invoke-bytecode
      - type: trait
        id: minecraft-session-access
  - id: forge-mod-entrypoint
    desc: Forge mod event entrypoint
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    all:
      - type: trait
        id: forge-eventhandler-ref
      - type: trait
        id: forge-preinit-ref
  - id: minecraft-session-access
    desc: Minecraft session name access
    crit: notable
    conf: 0.91
    for: [class, jar, zip]
    all:
      - type: trait
        id: minecraft-client-ref
      - type: trait
        id: minecraft-session-ref
      - type: trait
        id: minecraft-name-getter-ref
  - id: minecraft-session-token-access
    desc: Minecraft session token and UUID access
    crit: suspicious
    conf: 0.96
    mbc: B0006
    attack: T1528
    for: [class, jar, zip]
    all:
      - type: trait
        id: minecraft-session-access
      - type: trait
        id: minecraft-token-getter-ref
      - type: trait
        id: minecraft-uuid-getter-ref
  - id: minecraft-token-http-body-exfil
    desc: Minecraft session token access paired with HTTP request-body write
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: T1041
    for: [jar, zip]
    all:
      - type: trait
        id: minecraft-session-token-access
      - type: trait
        id: micro-behaviors/data/buffer::jvm-outputstream-write
  - id: minecraft-token-encrypted-dropper
    desc: Minecraft session token access paired with encrypted payload drop and launch
    crit: hostile
    conf: 0.98
    mbc: E1027
    attack: "T1528, T1027, T1059"
    for: [jar, zip]
    all:
      - type: trait
        id: minecraft-session-token-access
      - type: trait
        id: micro-behaviors/data/decode/base64::java-base64-decoding-bytecode
      - type: trait
        id: micro-behaviors/crypto/library/provider::secretkeyspec
      - type: trait
        id: micro-behaviors/fs/write/file/direct::jvm-fileoutputstream-bytecode
    any:
      - type: trait
        id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode
      - type: trait
        id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
  - id: minecraft-token-encrypted-http-exfil-dropper
    desc: Minecraft token access with encrypted dropper and HTTP request-body write
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: "T1528, T1027, T1041"
    for: [jar, zip]
    all:
      - type: trait
        id: minecraft-token-encrypted-dropper
      - type: trait
        id: minecraft-token-http-body-exfil
  - id: forge-reflective-session-access
    desc: Forge reflective session token access
    crit: suspicious
    conf: 0.96
    mbc: B0006
    attack: T1003
    for: [jar, zip]
    all:
      - type: trait
        id: metadata/package/config::forge-mcmod-info
      - type: trait
        id: forge-mod-entrypoint
      - type: trait
        id: minecraft-session-field
      - type: trait
        id: minecraft-token-field
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-class-getmethod-bytecode
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-method-invoke-bytecode
    any:
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-class-forname-bytecode
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-class-forname-bytecode
  - id: fabric-account-forwarding-loader
    desc: Fabric mod account forwarding loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-reflective-remote-loader
      - type: trait
        id: minecraft-session-access
  - id: fabric-http-jar-classloader
    desc: Fabric HTTP JAR classloader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-mod-metadata
      - type: trait
        id: minecraft-session-token-access
      - type: trait
        id: micro-behaviors/communications/http/lib/httpclient::java-httpclient-api
      - type: trait
        id: micro-behaviors/communications/http/lib/httpclient::java-byte-array-response-handler
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::jarinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::getnextjarentry-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::jvm-classloader-class-ref
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-getdeclaredconstructor
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-method-invoke-bytecode
  - id: weedhack-fabric-account-loader
    desc: Weedhack Fabric account loader
    crit: hostile
    conf: 0.99
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-http-jar-classloader
      - type: trait
        id: reversed-weedhack-module-url
      - type: trait
        id: initialize-weedhack-callback
  - id: minecraft-account-forwarding-classloader
    desc: Minecraft account forwarding classloader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [class]
    all:
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-urlclassloader-bytecode
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-getdeclaredconstructor
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-loadclass
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-class-getmethod-bytecode
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-invoke
      - type: trait
        id: minecraft-session-access
  - id: forge-staged-account-loader
    desc: Forge mod staged account loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: metadata/package/config::forge-mcmod-info
      - type: trait
        id: forge-mod-entrypoint
      - type: trait
        id: micro-behaviors/communications/socket/create::java-socket-slash-reference
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::jarinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::getnextjarentry-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::jvm-classloader-class-ref
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-getdeclaredconstructor
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-method-invoke-bytecode
  - id: forge-reflective-session-stage-loader
    desc: Forge session stealer staged loader
    crit: hostile
    conf: 0.99
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: forge-reflective-session-access
      - type: trait
        id: micro-behaviors/communications/socket/create::java-socket-slash-reference
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::jarinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::getnextjarentry-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-getdeclaredconstructor
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-method-invoke-bytecode
    any:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::staged-loader-variant
      - type: trait
        id: gson-config-jar-string
  - id: forge-gson-staged-classloader
    desc: Forge mod staged bytecode loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: metadata/package/config::forge-mcmod-info
      - type: trait
        id: forge-mod-entrypoint
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::gson-loader-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::jarinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::getnextjarentry-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-getdeclaredconstructor
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-method-invoke-bytecode
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-urlclassloader-bytecode
