defaults:
  platforms: [unix, windows]
  for:
    - java
    - class
traits:
  - id: gson-config-jar-string
    desc: Gson config JAR staging path
    crit: suspicious
    conf: 0.95
    for: [class, jar, zip]
    if:
      type: raw
      exact: gson-2.10.1.jar
  - id: fabric-mod-metadata
    desc: Fabric mod manifest present
    crit: suspicious
    conf: 0.86
    for: [jar, zip]
    if:
      type: raw
      substr: fabric.mod.json
  - id: forge-eventhandler-ref
    desc: Forge event handler annotation reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: Mod$EventHandler
  - id: forge-preinit-ref
    desc: Forge preinit event reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: FMLPreInitializationEvent
  - id: minecraft-session-field
    desc: Minecraft session field label
    crit: component
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: raw
      exact: session
  - id: minecraft-token-field
    desc: Minecraft token field label
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      exact: token
  - id: minecraft-client-ref
    desc: Minecraft client singleton reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: net/minecraft/class_310
  - id: minecraft-session-ref
    desc: Minecraft session object reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: net/minecraft/class_320
  - id: minecraft-name-getter-ref
    desc: Minecraft name getter reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: method_1676
  - id: minecraft-token-getter-ref
    desc: Minecraft access token getter
    crit: component
    conf: 0.92
    for: [class, jar, zip]
    if:
      type: raw
      substr: method_1674
  - id: minecraft-uuid-getter-ref
    desc: Minecraft UUID getter reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: method_44717
  - id: reversed-weedhack-module-url
    desc: Reversed Weedhack module URL
    crit: component
    conf: 0.99
    for: [class, jar, zip]
    if:
      type: raw
      substr: "#eludom/raj/selif/ur.kcahdeew//:ptth"
  - id: initialize-weedhack-callback
    desc: Weedhack payload init callback
    crit: component
    conf: 0.99
    for: [class, jar, zip]
    if:
      type: raw
      substr: initializeWeedhack
composite_rules:
  - id: fabric-reflective-remote-loader
    desc: Fabric mod reflective remote loader
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-mod-metadata
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::urlclassloader-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getdeclaredconstructor-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::invoke-string
      - type: trait
        id: minecraft-session-access
  - id: forge-mod-entrypoint
    desc: Forge mod event entrypoint
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    all:
      - type: trait
        id: forge-eventhandler-ref
      - type: trait
        id: forge-preinit-ref
  - id: minecraft-session-access
    desc: Minecraft session name access
    crit: suspicious
    conf: 0.91
    for: [class, jar, zip]
    all:
      - type: trait
        id: minecraft-client-ref
      - type: trait
        id: minecraft-session-ref
      - type: trait
        id: minecraft-name-getter-ref
  - id: minecraft-session-token-access
    desc: Minecraft session token access
    crit: suspicious
    conf: 0.96
    mbc: B0006
    attack: T1528
    for: [class, jar, zip]
    all:
      - type: trait
        id: minecraft-session-access
      - type: trait
        id: minecraft-token-getter-ref
      - type: trait
        id: minecraft-uuid-getter-ref
  - id: forge-reflective-session-access
    desc: Forge reflective session token access
    crit: suspicious
    conf: 0.96
    mbc: B0006
    attack: T1003
    for: [jar, zip]
    all:
      - type: trait
        id: metadata/package/config::forge-mcmod-info
      - type: trait
        id: forge-mod-entrypoint
      - type: trait
        id: minecraft-session-field
      - type: trait
        id: minecraft-token-field
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getmethod-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::invoke-string
    any:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::forname-string
      - type: trait
        id: objectives/supply-chain/recon-exfil/build::class-forname
  - id: fabric-account-forwarding-loader
    desc: Fabric mod account forwarding loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-reflective-remote-loader
      - type: trait
        id: minecraft-session-access
  - id: fabric-http-jar-classloader
    desc: Fabric HTTP JAR classloader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-mod-metadata
      - type: trait
        id: minecraft-session-token-access
      - type: trait
        id: objectives/command-and-control/backdoor/loader/stage::httpclient-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/stage::http-bodyhandler-bytearray-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::jarinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::getnextjarentry-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::classloader-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::defineclass-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getdeclaredconstructor-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::invoke-string
  - id: weedhack-fabric-account-loader
    desc: Weedhack Fabric account loader
    crit: hostile
    conf: 0.99
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-http-jar-classloader
      - type: trait
        id: reversed-weedhack-module-url
      - type: trait
        id: initialize-weedhack-callback
  - id: minecraft-account-forwarding-classloader
    desc: Minecraft account forwarding classloader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [class]
    all:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::urlclassloader-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getdeclaredconstructor-string
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-loadclass
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-getmethod
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-invoke
      - type: trait
        id: minecraft-session-access
  - id: forge-staged-account-loader
    desc: Forge mod staged account loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: metadata/package/config::forge-mcmod-info
      - type: trait
        id: forge-mod-entrypoint
      - type: trait
        id: objectives/command-and-control/backdoor/loader/stage::socket-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::jarinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::getnextjarentry-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::classloader-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::defineclass-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getdeclaredconstructor-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::invoke-string
  - id: forge-reflective-session-stage-loader
    desc: Forge session stealer staged loader
    crit: hostile
    conf: 0.99
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: forge-reflective-session-access
      - type: trait
        id: objectives/command-and-control/backdoor/loader/stage::socket-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::jarinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::getnextjarentry-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getdeclaredconstructor-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::invoke-string
    any:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::staged-loader-variant
      - type: trait
        id: gson-config-jar-string
  - id: forge-gson-staged-classloader
    desc: Forge mod staged bytecode loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: metadata/package/config::forge-mcmod-info
      - type: trait
        id: forge-mod-entrypoint
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::gson-loader-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::jarinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::getnextjarentry-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getdeclaredconstructor-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::invoke-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::urlclassloader-string
