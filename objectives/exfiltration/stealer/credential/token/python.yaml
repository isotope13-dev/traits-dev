# API Key Exfiltration - Python
# API key harvesting via function parameter with HTTP exfiltration
# ATT&CK: T1528 (Steal Application Access Token) + T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: "T1041"
composite_rules:
  - id: credential-harvesting
    desc: API key harvesting via function param
    crit: suspicious
    conf: 0.85
    attack: "T1528"
    all:
      - id: objectives/credential-access/api-harvest/token::api-key-parameter
      - id: micro-behaviors/communications/http/lib/requests::requests-post
    any:
      - id: objectives/credential-access/api-harvest/token::bearer-fstring
      - id: objectives/credential-access/api-harvest/token::api-key-in-auth-header
      - id: micro-behaviors/communications/http/headers::headers-auth
