# API client authenticating POST request
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
composite_rules:
  - id: api-client-auth-post
    desc: API client authenticating POST request
    crit: notable
    conf: 0.85
    all:
      - id: objectives/credential-access/api-harvest/token::api-key-parameter
      - id: micro-behaviors/communications/http/lib/requests::requests-post
    any:
      - id: objectives/credential-access/api-harvest/token::bearer-fstring
      - id: objectives/credential-access/api-harvest/token::api-key-in-auth-header
      - id: micro-behaviors/communications/http/headers::headers-auth
    unless:
      - id: micro-behaviors/communications/http/llm::openrouter-chat-completions-url
