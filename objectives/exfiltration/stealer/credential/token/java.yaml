defaults:
  platforms: [windows, unix]
  for: [class, jar, zip]
  attack: T1041

traits:
  - id: forge-session-token-fields
    desc: Forge mod session token fields
    crit: suspicious
    conf: 0.98
    attack: T1528
    for: [class]
    if:
      type: text
      regex: acceptedMinecraftVersions.{0,240}session.{0,40}token

composite_rules:
  - id: minecraft-session-token-stealer
    desc: Minecraft session token stealer
    crit: hostile
    conf: 0.99
    attack: T1528
    all:
      - id: metadata/package/config::forge-mcmod-info
      - id: forge-session-token-fields
      - id: micro-behaviors/data/source/dynamic/reflect::java-class-forname
      - id: micro-behaviors/data/source/dynamic/reflect::java-class-getmethod-bytecode
      - id: micro-behaviors/communications/socket/create::java-socket-slash-reference

  - id: minecraft-staged-gson-loader
    desc: Forge mod staged Gson loader
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/package/config::forge-mcmod-info
      - id: micro-behaviors/data/source/dynamic/reflect::java-urlclassloader-bytecode
      - id: objectives/command-and-control/backdoor/loader/classloader::gson-loader-string
      - id: objectives/exfiltration/stealer/credential/token::gson-config-jar-string
