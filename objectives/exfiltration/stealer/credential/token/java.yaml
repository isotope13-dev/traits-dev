defaults:
  platforms: [windows, unix]
  for: [class, jar, zip]
  attack: T1041

traits:
  - id: forge-session-token-fields
    desc: Forge mod session token fields
    crit: suspicious
    conf: 0.98
    attack: T1528
    if:
      type: raw
      regex: acceptedMinecraftVersions.{0,120}session.{0,40}token

composite_rules:
  - id: minecraft-session-token-stealer
    desc: Minecraft session token stealer
    crit: hostile
    conf: 0.99
    attack: T1528
    all:
      - id: metadata/package/config::forge-mcmod-info
      - id: forge-session-token-fields
      - id: objectives/anti-static/obfuscation/reflection/class::java-class-forname
      - id: objectives/anti-static/obfuscation/reflection/class::java-getmethod
      - id: objectives/command-and-control/backdoor/loader::socket-string

  - id: minecraft-staged-gson-loader
    desc: Forge mod staged Gson loader
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/package/config::forge-mcmod-info
      - id: objectives/command-and-control/backdoor/loader::urlclassloader-string
      - id: objectives/command-and-control/backdoor/loader::gson-loader-string
      - id: objectives/command-and-control/backdoor/loader::gson-config-jar-string
