defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: B0030
traits:
  - id: capture-all-credentials-call
    desc: Calls aggregate credential capture
    crit: component
    conf: 0.92
    if:
      type: tree-sitter
      kind: call
      exact: _captureAllCredentials
  - id: credential-endpoint-literal
    desc: Credential exfil endpoint literal
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: credentials
  - id: obfuscated-credential-payload
    desc: Obfuscates credential payload values
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: tree-sitter
      kind: call
      exact: _obfuscatePayload
composite_rules:
  - id: node-captured-credentials-http-exfil
    desc: Captured credentials sent over HTTP
    crit: hostile
    conf: 0.97
    all:
      - id: capture-all-credentials-call
      - id: credential-endpoint-literal
      - id: obfuscated-credential-payload
      - id: micro-behaviors/communications/http/request/client::https-request
      - id: micro-behaviors/communications/http/request/client::request-write-call
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/library/structure/
