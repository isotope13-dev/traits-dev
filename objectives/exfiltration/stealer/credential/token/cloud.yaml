defaults:
  platforms: [windows, macos, linux]
  for: [binaries, scripts]
  attack: T1528
composite_rules:
  - id: cloud-config-stealer
    desc: Multi-service cloud configuration stealer
    crit: hostile
    conf: 0.98
    needs: 2
    unless:
      - id: well-known/tool/sysadmin/kubernetes
    any:
      - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::gcloud-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::kube-config
      - id: micro-behaviors/fs/path/sensitive/credentials::docker-config
