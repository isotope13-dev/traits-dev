defaults:
  platforms: [windows, macos, linux]
  for: [binaries, scripts]
  attack: T1528
composite_rules:
  - id: cloud-config-stealer
    desc: Multi-service cloud configuration stealer
    crit: hostile
    conf: 0.98
    needs: 2
    unless:
      - id: well-known/tool/sysadmin/kubernetes
      - id: well-known/tool/sysadmin/container/
      - id: micro-behaviors/data/text/security/scanner::defensive-scanner-tool-context
      - id: micro-behaviors/data/text/security/threat-intel::signatures-db
      - id: metadata/library/data::rust-cloud-object-store-sdk
      - id: well-known/tool/detection/agent-sentry::nhi-auditor-context
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::cloud-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::container-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::orchestration-credentials
