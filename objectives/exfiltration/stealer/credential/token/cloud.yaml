defaults:
  platforms: [windows, macos, linux]
  for: [binaries, scripts]
  attack: T1528
traits:
  # Vim/Neovim compile the credential paths into their filetype-detection
  # table as vim-escaped regexes (e.g. "/%.aws/credentials$", "/%.kube/config$").
  # The "%." escaped-dot + "$" anchor form is unique to the editor's ftdetect
  # table — a real stealer references "~/.aws/credentials", never this regex.
  # Requiring a neovim filetype-API symbol alongside it makes a malware match
  # impossible while pinning this to the editor binary.
  - id: neovim-ftdetect-table-path
    desc: Vim ftdetect credential regex
    crit: component
    conf: 1.0
    if:
      type: text
      regex: '/%\.(aws|kube)/[A-Za-z]+\$'
  - id: neovim-filetype-api-symbol
    desc: Neovim filetype API symbol
    crit: component
    conf: 1.0
    for: [elf, macho, pe]
    if:
      type: symbol
      regex: 'did_set_filetype_or_syntax'
composite_rules:
  - id: neovim-ftdetect-table-context
    desc: Neovim ftdetect table context
    crit: baseline
    conf: 1.0
    all:
      - id: neovim-ftdetect-table-path
      - id: neovim-filetype-api-symbol

  - id: cloud-config-stealer
    desc: Multi-service cloud configuration stealer
    crit: hostile
    conf: 0.98
    needs: 2
    unless:
      - id: cloud-config-benign-context
      - id: well-known/tool/sysadmin/alpine-packages::telegraf-binary-name
      - id: well-known/tool/sysadmin/alpine-packages::alpine-telegraf-member-binary
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::cloud-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::container-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::orchestration-credentials

  - id: cloud-config-benign-context
    desc: Benign cloud config context
    crit: baseline
    conf: 0.95
    any:
      - id: well-known/tool/sysadmin/kubernetes
      - id: well-known/tool/sysadmin/container/
      - id: well-known/tool/detection/security-scanner::defensive-scanner-tool-context
      - id: well-known/tool/detection/threat-intel::signatures-db
      - id: metadata/library/data::rust-cloud-object-store-sdk
      - id: well-known/tool/detection/agent-sentry::nhi-auditor-context
      - id: neovim-ftdetect-table-context
      - id: well-known/tool/sysadmin/alpine-packages::alpine-cloud-native-tool-binary
      - id: well-known/lib/conda-package::google-auth-mtls-helper
      - id: well-known/app/vector::vector-observability-agent
