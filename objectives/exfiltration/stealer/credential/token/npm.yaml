# NPM Token Exfiltration
# NPM authentication token theft with network exfiltration
# ATT&CK: T1552.001 (Unsecured Credentials: Credentials In Files) + T1041
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1041"
composite_rules:
  - id: npm-token-stealer
    desc: NPM authentication token stealer
    crit: hostile
    conf: 1.0
    attack: "T1552.001"
    mbc: E1059
    for: [javascript, typescript]
    all:
      - id: objectives/credential-access/env/secrets::npm-auth-token-extraction
    any:
      - id: micro-behaviors/communications/http/services::suspicious-analytics-usage
      - id: micro-behaviors/communications/http/headers::referer-dynamic-concatenation
      - id: micro-behaviors/communications/http/headers::referer-dummy-url-pattern
      - id: objectives/command-and-control/channel/http/uri/fragment::uri-fragment-counter-path-unte
  - id: npm-token-stealer-fallback
    desc: NPM token key string with suspicious exfiltration indicators
    crit: hostile
    conf: 0.9
    attack: "T1552.001"
    mbc: E1059
    for: [javascript, typescript]
    all:
      - id: objectives/credential-access/env/secrets::npm-auth-token-key-raw
    any:
      - id: micro-behaviors/communications/http/services::suspicious-analytics-usage
      - id: micro-behaviors/communications/http/headers::referer-dynamic-concatenation
      - id: micro-behaviors/communications/http/headers::referer-dummy-url-pattern
      - id: objectives/command-and-control/channel/http/uri/fragment::uri-fragment-counter-path-unte
  - id: gh-cli-token-webhook-exfil
    desc: GH CLI token exfiltration
    crit: hostile
    conf: 0.99
    attack: "T1528"
    mbc: "C0027"
    for: [package.json, shell]
    all:
      - id: objectives/lateral-movement/supply-chain/npm/credential-access::gh-auth-token
      - id: objectives/lateral-movement/supply-chain/npm/credential-access::curl-webhook-post
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
