defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1041

traits:
  - id: ruby-cloud-credential-path-list
    desc: Ruby cloud credential path list
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.aws.{0,120}\.azure.{0,120}\.gcloud'

  - id: ruby-orchestration-credential-paths
    desc: Ruby orchestration credential paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.kube.{0,120}\.docker/config\.json'

  - id: ruby-c2-command-poll
    desc: Ruby C2 command polling
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v1/commands[\s\S]{0,500}Open3\.capture3'
  - id: ruby-beacon-command-poll
    desc: Ruby beacon command polling
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/api/beacon/checkin[\s\S]{0,900}Open3\.capture2e'

  - id: ruby-json-exfil-post
    desc: Ruby JSON exfil POST
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/api/v1/exfil[\s\S]{0,500}Net::HTTP::Post'
  - id: ruby-cloud-exfil-posts
    desc: Ruby cloud exfil POST paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/exfil/cloud
  - id: ruby-final-exfil-path
    desc: Ruby final exfil path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/exfil/final
  - id: ruby-cloud-metadata-paths
    desc: Ruby cloud metadata paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'iam/security-credentials[\s\S]{0,700}computeMetadata/v1'

composite_rules:
  - id: ruby-cloud-credential-exfil
    desc: Ruby cloud credential exfil
    crit: hostile
    conf: 0.97
    all:
      - id: ruby-cloud-credential-path-list
      - id: ruby-orchestration-credential-paths
      - id: ruby-json-exfil-post
    any:
      - id: ruby-c2-command-poll
      - id: objectives/credential-access/files/config::login-secret-file-paths
      - id: objectives/credential-access/cloud/token/files::gcp-default-credentials
  - id: ruby-cloud-beacon-exfil
    desc: Ruby cloud beacon exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-cloud-exfil-posts
      - id: ruby-final-exfil-path
      - id: ruby-beacon-command-poll
    any:
      - id: ruby-cloud-metadata-paths
      - id: objectives/discovery/cloud/metadata::aws-iam-credentials
      - id: objectives/discovery/cloud/metadata::gcp-access-token
      - id: objectives/credential-access/cloud/token/files::gcp-default-credentials
