defaults:
  platforms: [unix, windows]
  for: [javascript, xpi]
  attack: T1041
  mbc: B0028

composite_rules:
  - id: wallet-secret-callback-http-exfiltration
    desc: Extension sends wallet input through callback JSON POST
    crit: hostile
    conf: 0.99
    for: [xpi]
    scope: archive
    all:
      - id: well-known/app/browser-extension::xpi-path
      - id: objectives/credential-access/wallet/mnemonic::wallet-credential-entry-label
      - id: micro-behaviors/ui/window/manage/dom::dom-element-value-read
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: micro-behaviors/communications/http/header/content-type::json-header
    any:
      - id: objectives/exfiltration/sensitive-data::js-wallet-secret-data-field
      - id: objectives/exfiltration/sensitive-data::js-input-value-data-field

  - id: wallet-seed-phrase-http-exfiltration
    desc: Browser extension sends wallet seed phrase over HTTP
    crit: hostile
    conf: 0.99
    for: [xpi]
    scope: archive
    all:
      - id: well-known/app/browser-extension::xpi-path
      - id: objectives/exfiltration/sensitive-data::js-seed-phrase-request-field
      - id: micro-behaviors/communications/ipc/message::chrome-runtime-on-message
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/url/query::js-urlsearchparams-construction

  - id: wallet-seed-phrase-xhr-fallback-exfiltration
    desc: Browser extension sends wallet seed through XHR fallback
    crit: hostile
    conf: 0.98
    for: [xpi]
    scope: archive
    all:
      - id: well-known/app/browser-extension::xpi-path
      - id: objectives/exfiltration/sensitive-data::js-seed-phrase-request-field
      - id: micro-behaviors/communications/ipc/message::chrome-runtime-on-message
      - id: micro-behaviors/communications/http/request/client::xmlhttprequest-new
      - id: micro-behaviors/communications/http/url/query::js-urlsearchparams-construction

  - id: wallet-captured-secret-http-exfiltration
    desc: Wallet extension sends captured secret in JSON POST
    crit: hostile
    conf: 0.99
    for: [xpi]
    scope: archive
    all:
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: micro-behaviors/communications/http/header/content-type::json-header
    any:
      - id: well-known/app/browser-extension::wallet-marker-rabby
      - id: well-known/app/browser-extension::wallet-marker-tronlink
      - id: well-known/app/browser-extension::wallet-marker-trust
      - id: objectives/exfiltration/sensitive-data::js-wallet-secret-data-field
      - id: objectives/credential-access/wallet/mnemonic::wallet-seed-word-field-code
