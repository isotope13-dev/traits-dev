defaults:
  platforms: [unix, windows]
  for: [javascript, xpi]
  attack: T1041
  mbc: B0028

composite_rules:
  - id: wallet-seed-phrase-http-exfiltration
    desc: Browser extension sends wallet seed phrase over HTTP
    crit: hostile
    conf: 0.99
    for: [xpi]
    scope: archive
    all:
      - id: objectives/credential-access/wallet/mnemonic::wallet-secret-identifier
      - id: micro-behaviors/communications/ipc/message::chrome-runtime-on-message
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/url/query::js-urlsearchparams-construction

  - id: wallet-seed-phrase-xhr-fallback-exfiltration
    desc: Browser extension sends wallet seed through XHR fallback
    crit: hostile
    conf: 0.98
    for: [xpi]
    scope: archive
    all:
      - id: objectives/credential-access/wallet/mnemonic::wallet-secret-identifier
      - id: micro-behaviors/communications/ipc/message::chrome-runtime-on-message
      - id: micro-behaviors/communications/http/request/client::xmlhttprequest-new
      - id: micro-behaviors/communications/http/url/query::js-urlsearchparams-construction
