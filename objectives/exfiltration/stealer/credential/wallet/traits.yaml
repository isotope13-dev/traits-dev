# Wallet-material collection followed by upload to public file hosts.
# Wallet paths and BIP-39 terms are useful analyst signals on their own, but
# the combination with a curl upload and a public file host is hostile.
defaults:
  platforms: [unix]
  for: [elf]
  attack: "T1555.003,T1041"
  mbc: "F1014"

traits:
  - id: python-encoded-wallet-store-path
    desc: Decoded content references wallet paths
    crit: suspicious
    conf: 0.96
    for: [python]
    if:
      type: encoded
      encoding: base64
      regex: '(?i)(/\.config/solana/|/\.ethereum/keystore|metamask|phantom)'

  - id: python-encoded-wallet-secret-terms
    desc: Decoded content references wallet secrets
    crit: suspicious
    conf: 0.94
    for: [python]
    if:
      type: encoded
      encoding: base64
      regex: '(?i)\b(wallet|mnemonic|seed)\b'

  - id: python-encoded-file-upload-command
    desc: Decoded content contains curl upload
    crit: suspicious
    conf: 0.94
    for: [python]
    if:
      type: encoded
      encoding: base64
      regex: '(?is)\bcurl\b.{0,220}(--upload-file|-F\s+["'']?files\[\])'

  - id: python-encoded-public-upload-endpoint
    desc: Decoded content references upload URL
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: encoded
      encoding: base64
      regex: 'https?://[A-Za-z0-9.-]{3,253}/[^\s]{0,80}(upload|pinFileToIPFS)'

composite_rules:
  - id: python-encoded-wallet-upload-exfil
    desc: Decoded payload uploads wallet material
    crit: hostile
    conf: 0.99
    for: [python]
    attack: "T1552.004,T1041,T1027.009"
    all:
      - id: python-encoded-wallet-store-path
      - id: python-encoded-wallet-secret-terms
      - id: python-encoded-file-upload-command
      - id: python-encoded-public-upload-endpoint

  - id: wallet-material-public-host-upload
    desc: Wallet material uploaded to public file hosts
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/crypto/library/blockchain/wallet::bip39-wordlist-reference
      - id: objectives/credential-access/wallet/desktop::doteth-keystore
      - id: micro-behaviors/communications/http/upload::curl-upload-file
    any:
      - id: micro-behaviors/communications/http/services/file-hosting::transfer-sh
      - id: micro-behaviors/communications/http/services/file-hosting::uguu-se
