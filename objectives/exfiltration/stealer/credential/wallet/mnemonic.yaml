# Wallet Mnemonic Exfiltration
# Mnemonic phrase theft with HTTP exfiltration
# ATT&CK: T1005 (Data from Local System) + T1041
defaults:
  platforms: [unix, windows]
  attack: "T1041"
composite_rules:
  - id: stealer-pattern
    desc: Mnemonic phrase theft (extraction + HTTP exfil)
    crit: hostile
    conf: 0.95
    for: [python, javascript]
    all:
      - id: objectives/credential-access/wallet/mnemonic::mnemonic-terms
      - id: micro-behaviors/communications/http/request::http-client
      - id: objectives/credential-access/wallet/mnemonic::wallet-context
