# Wallet Mnemonic Exfiltration
# Mnemonic phrase theft with HTTP exfiltration
# ATT&CK: T1005 (Data from Local System) + T1041
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1041"
composite_rules:
  - id: stealer-pattern
    desc: Mnemonic phrase theft (extraction + HTTP exfil)
    crit: hostile
    conf: 0.95
    for: [python, javascript, powershell]
    all:
      - id: objectives/credential-access/wallet/mnemonic::mnemonic-terms
      - id: micro-behaviors/communications/http/request::http-client
      - id: objectives/credential-access/wallet/mnemonic::wallet-context
  - id: ps-encoded-bip39-telegram-stealer
    desc: Encoded PowerShell mnemonic stealer
    crit: hostile
    conf: 0.97
    for: [powershell]
    all:
      - id: objectives/credential-access/wallet/mnemonic::bip39-wordlist-encoded-fragments
      - id: objectives/exfiltration/messaging/telegram::telegram-bot-encoded-file-exfil
