# Wallet Mnemonic Exfiltration
# Mnemonic phrase theft with HTTP exfiltration
# ATT&CK: T1005 (Data from Local System) + T1041
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1041"
composite_rules:
  - id: stealer-pattern
    desc: Mnemonic phrase theft (extraction + HTTP exfil)
    crit: hostile
    conf: 0.95
    for: [python, javascript, powershell]
    all:
      - id: objectives/credential-access/wallet/mnemonic::mnemonic-terms
      - id: micro-behaviors/communications/http/request/client::http-client
      - id: objectives/credential-access/wallet/mnemonic::wallet-context
  - id: pe-clipboard-mnemonic-http-exfil
    desc: Windows mnemonic clipboard HTTP exfiltration
    crit: hostile
    conf: 0.96
    for: [pe]
    all:
      - id: objectives/credential-access/wallet/mnemonic::embedded-bip39-wordlist
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/get::internet-open-url
    any:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: objectives/command-and-control/infrastructure/domain/heuristic::php-url
  - id: pe-file-mnemonic-http-exfil
    desc: Windows mnemonic file HTTP exfiltration
    crit: hostile
    conf: 0.96
    for: [pe]
    all:
      - id: objectives/credential-access/wallet/mnemonic::embedded-bip39-wordlist
      - id: micro-behaviors/fs/traversal/drives::get-logical-drives
      - id: micro-behaviors/fs/enumerate/directory::find-first-file
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/get::internet-open-url
      - id: micro-behaviors/communications/ip/literal::http-ip-url
    any:
      - id: objectives/collection/file-targeting/filter::mnemonic-extension-wide-glob
      - id: objectives/collection/file-targeting/filter::seed-extension-wide-glob
  - id: ps-encoded-bip39-telegram-stealer
    desc: Encoded PowerShell mnemonic stealer
    crit: hostile
    conf: 0.97
    for: [powershell]
    all:
      - id: objectives/credential-access/wallet/mnemonic::bip39-wordlist-encoded-fragments
      - id: objectives/exfiltration/messaging/telegram::telegram-bot-encoded-file-exfil
  - id: web-wallet-recovery-query-exfil
    desc: Web wallet recovery phrase exfiltration
    crit: hostile
    conf: 0.98
    for: [html, javascript]
    all:
      - id: objectives/credential-access/wallet/mnemonic::web-mnemonic-entry-form
      - id: objectives/exfiltration/http/query::browser-query-data-exfil
