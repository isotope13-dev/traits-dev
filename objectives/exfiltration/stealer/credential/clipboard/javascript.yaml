# Clipboard Exfiltration - JavaScript/Node.js
# Clipboard capture with network exfiltration (collection + network = exfiltration)
# ATT&CK: T1115 (Clipboard Data) + T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  - id: js-clipboard-monitor-command
    desc: "JavaScript clipboard command access"
    crit: component
    conf: 0.95
    any:
      - id: objectives/collection/clipboard/monitor::js-pbpaste
      - id: objectives/collection/clipboard/monitor::js-powershell-clipboard
      - id: objectives/collection/clipboard/monitor::js-xclip
  - id: js-clipboard-exfil
    desc: "JavaScript clipboard capture exfiltration"
    crit: hostile
    conf: 0.95
    mbc: "B0014"
    attack: "T1041"
    scope: leaf
    near_bytes: 8192
    all:
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    any:
      - id: objectives/collection/clipboard/monitor::js-pbpaste
      - id: objectives/collection/clipboard/monitor::js-powershell-clipboard
      - id: objectives/collection/clipboard/monitor::js-xclip
  - id: js-clipboard-exfil-external-ip
    desc: "JavaScript clipboard exfiltrates to IP"
    crit: hostile
    conf: 0.97
    mbc: "B0014"
    attack: "T1041"
    scope: leaf
    near_bytes: 32768
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: js-clipboard-monitor-command
    any:
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: micro-behaviors/communications/http/lib/axios::axios
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    needs: 1
