# Clipboard Exfiltration - JavaScript/Node.js
# Clipboard capture with network exfiltration (collection + network = exfiltration)
# ATT&CK: T1115 (Clipboard Data) + T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: clipboard-chunk-order-marker
    desc: Ordered chunk upload query fields
    crit: suspicious
    conf: 0.95
    platforms: [windows, unix]
    if:
      type: text
      regex: '[\"'']uid[\"'']\s*,\s*[\"'']part[\"'']\s*,\s*[\"'']total[\"'']\s*,\s*[\"'']data[\"'']'

composite_rules:
  - id: js-clipboard-monitor-command
    desc: "JavaScript clipboard command access"
    crit: component
    conf: 0.95
    any:
      - id: micro-behaviors/os/clipboard/access::node-pbpaste-read
      - id: micro-behaviors/os/clipboard/access::node-powershell-get-clipboard
      - id: micro-behaviors/os/clipboard/access::node-xclip-read
  - id: js-clipboard-exfil
    desc: "JavaScript clipboard capture exfiltration"
    crit: hostile
    conf: 0.95
    mbc: "B0014"
    attack: "T1041"
    near_bytes: 8192
    all:
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    any:
      - id: micro-behaviors/os/clipboard/access::node-pbpaste-read
      - id: micro-behaviors/os/clipboard/access::node-powershell-get-clipboard
      - id: micro-behaviors/os/clipboard/access::node-xclip-read
  - id: js-clipboard-exfil-external-ip
    desc: "JavaScript clipboard exfiltrates to IP"
    crit: hostile
    conf: 0.97
    mbc: "B0014"
    attack: "T1041"
    near_bytes: 32768
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: js-clipboard-monitor-command
    any:
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: micro-behaviors/communications/http/lib/axios::axios
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    needs: 1

  - id: browser-clipboard-chunked-http-exfil
    desc: Browser clipboard chunks sent over HTTP
    crit: hostile
    conf: 0.99
    attack: T1041,T1115
    mbc: B0014
    platforms: [windows, unix]
    for: [javascript, xpi, archives]
    scope: archive
    all:
      - id: objectives/collection/clipboard/monitor::browser-clipboard-http-exfil
      - id: clipboard-chunk-order-marker
