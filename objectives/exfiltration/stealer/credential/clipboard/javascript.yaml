# Clipboard Exfiltration - JavaScript/Node.js
# Clipboard capture with network exfiltration (collection + network = exfiltration)
# ATT&CK: T1115 (Clipboard Data) + T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  - id: js-clipboard-exfil
    desc: "JavaScript clipboard capture exfiltration"
    crit: hostile
    conf: 0.95
    mbc: "B0014"
    attack: "T1041"
    all:
      - id: micro-behaviors/communications/http/request::http-client-usage
    any:
      - id: objectives/collection/clipboard/monitor::js-pbpaste
      - id: objectives/collection/clipboard/monitor::js-powershell-clipboard
      - id: objectives/collection/clipboard/monitor::js-xclip
