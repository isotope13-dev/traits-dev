defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: node-aws-container-credential-uri
    desc: AWS container credential URI access
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: AWS_CONTAINER_CREDENTIALS_RELATIVE_URI
    unless:
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/library/data::aws-sdk-js-v3-bundle
      - id: well-known/lib/aws-sdk-js/
      - id: metadata/library/google-runtime::gcp-metadata-js-bundle
      - id: metadata/package/files/dependency::node-modules-path
  - id: node-aws-container-metadata-ip
    desc: AWS container metadata credential IP
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: 169.254.170.2
    unless:
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/library/data::aws-sdk-js-v3-bundle
      - id: well-known/lib/aws-sdk-js/
      - id: metadata/library/google-runtime::gcp-metadata-js-bundle
      - id: metadata/package/files/dependency::node-modules-path
  - id: node-aws-cli-secretsmanager
    desc: AWS Secrets Manager CLI command
    crit: component
    conf: 0.9
    if:
      type: text
      substr: smanager get-secret-value
  - id: node-aws-cli-secret-word
    desc: AWS secret CLI word
    crit: component
    conf: 0.9
    if:
      type: text
      substr: aws secret
  - id: node-find-root-maxdepth
    desc: Find command scans root filesystem
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'find\s+/\s+-maxdepth\s+\d+'
  - id: node-find-key-filenames
    desc: Find command key filename filters
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'id_(rsa|ed25519)|\.pem|\.key'
  - id: node-git-config-remote-harvest
    desc: Git config and remote harvest
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'git config --list[\s\S]{0,260}git remote -v'
  - id: node-json-data-field
    desc: JSON data field in body
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'JSON\.stringify\s*\(\s*\{[^}]{0,80}\bd\s*:'

composite_rules:
  - id: node-base64-json-exfil-body
    desc: Base64 JSON exfil body
    crit: suspicious
    conf: 0.92
    near_bytes: 512
    all:
      - id: node-json-data-field
      - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode
  - id: node-aws-secretsmanager-cli
    desc: AWS Secrets Manager CLI harvest
    crit: suspicious
    conf: 0.94
    all:
      - id: node-aws-cli-secretsmanager
      - id: node-aws-cli-secret-word
  - id: node-sensitive-find-command
    desc: Node find command targets secrets
    crit: suspicious
    conf: 0.94
    all:
      - id: node-find-root-maxdepth
    any:
      - id: node-find-key-filenames
      - id: micro-behaviors/fs/path/sensitive/credentials/
      - id: objectives/collection/file-targeting/filter::pem-extension
  - id: node-custom-exfil-sink
    desc: Node custom HTTP exfil sink
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/exfiltration/stealer/credential/platform::node-exfil-endpoint
    any:
      - id: node-base64-json-exfil-body
      - id: objectives/exfiltration/http/upload::node-upload-sink
      - id: micro-behaviors/communications/http/request/client::request-write-call
  - id: node-cloud-credential-sources
    desc: Node cloud credential sources
    crit: suspicious
    conf: 0.96
    any:
      - id: metadata/file/string/cloud::aws-imds-v2-token-ttl-header
      - id: metadata/file/string/cloud::aws-iam-credentials-metadata-path
      - id: objectives/credential-access/cloud/token/files::aws-iam-credential-access-path
      - id: node-aws-container-credential-uri
      - id: node-aws-container-metadata-ip
      - id: node-aws-secretsmanager-cli
      - id: metadata/file/string/cloud::gcp-default-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::container-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::terraform-credentials
  - id: node-dev-env-package-files
    desc: Node env and package auth files
    crit: suspicious
    conf: 0.94
    near_bytes: 256
    all:
      - id: micro-behaviors/fs/file/read::read-node
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::dotenv-filename-literal
      - id: micro-behaviors/fs/path/sensitive/credentials::npmrc-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::netrc
  - id: node-dev-container-config-files
    desc: Node container config files
    crit: suspicious
    conf: 0.94
    near_bytes: 256
    all:
      - id: micro-behaviors/fs/file/read::read-node
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::docker-config
      - id: micro-behaviors/fs/path/sensitive/credentials::kube-config
  - id: node-dev-source-control-files
    desc: Node source control auth files
    crit: suspicious
    conf: 0.94
    near_bytes: 256
    all:
      - id: micro-behaviors/fs/file/read::read-node
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::git-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::gh-cli-hosts
  - id: node-dev-vault-iac-files
    desc: Node vault and IaC files
    crit: suspicious
    conf: 0.94
    near_bytes: 256
    all:
      - id: micro-behaviors/fs/file/read::read-node
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::vault-token-file
      - id: micro-behaviors/fs/path/sensitive/credentials::terraform-credentials
  - id: node-dev-login-cloud-files
    desc: Node login and cloud files
    crit: suspicious
    conf: 0.94
    near_bytes: 256
    all:
      - id: micro-behaviors/fs/file/read::read-node
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
      - id: metadata/file/string/cloud::gcp-default-credentials
  - id: node-developer-secret-file-sources
    desc: Node developer secret file sources
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: node-dev-env-package-files
      - id: node-dev-container-config-files
      - id: node-dev-source-control-files
      - id: node-dev-vault-iac-files
      - id: node-dev-login-cloud-files
  - id: node-process-env-http-exfil
    desc: Node process environment HTTP exfil
    crit: hostile
    conf: 0.98
    attack: "T1552.001, T1041"
    mbc: "E1552, E1041"
    all:
      - id: micro-behaviors/os/env/access::node-process-env-object-assignment
      - id: node-custom-exfil-sink
  - id: node-cloud-credential-http-exfil
    desc: Node cloud credentials HTTP exfil
    crit: hostile
    conf: 0.98
    attack: "T1552.005, T1528, T1041"
    mbc: "E1552, E1041"
    all:
      - id: node-cloud-credential-sources
      - id: node-custom-exfil-sink
  - id: node-developer-secret-files-http-exfil
    desc: Node developer secret files HTTP exfil
    crit: hostile
    conf: 0.98
    attack: "T1552.001, T1552.004, T1041"
    mbc: "E1552, E1041"
    all:
      - id: node-developer-secret-file-sources
      - id: node-custom-exfil-sink
    any:
      - id: objectives/exfiltration/sensitive-data::js-sensitive-file-read-source
      - id: node-sensitive-find-command
  - id: node-sensitive-find-http-exfil
    desc: Node recursive secret file HTTP exfil
    crit: hostile
    conf: 0.98
    attack: "T1005, T1552.001, T1041"
    mbc: "E1005, E1552, E1041"
    all:
      - id: node-sensitive-find-command
      - id: node-custom-exfil-sink
  - id: node-git-metadata-http-exfil
    desc: Node Git metadata HTTP exfil
    crit: hostile
    conf: 0.96
    attack: "T1213.003, T1041"
    mbc: "E1041"
    all:
      - id: node-git-config-remote-harvest
      - id: node-custom-exfil-sink
  - id: node-multi-source-secret-http-exfil
    desc: Node multi-source secret HTTP exfil
    crit: hostile
    conf: 0.99
    attack: "T1552.001, T1552.004, T1552.005, T1041"
    mbc: "E1552, E1041"
    needs: 2
    any:
      - id: micro-behaviors/os/env/access::node-process-env-object-assignment
      - id: node-cloud-credential-sources
      - id: node-developer-secret-file-sources
      - id: node-sensitive-find-command
      - id: node-git-config-remote-harvest
    all:
      - id: node-custom-exfil-sink
