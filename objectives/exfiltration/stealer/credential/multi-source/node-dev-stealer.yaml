defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: node-wallet-json-target
    desc: Node targets wallet JSON
    crit: component
    conf: 0.9
    if:
      type: text
      substr: wallet.json
  - id: node-keypair-json-target
    desc: Node targets keypair JSON
    crit: component
    conf: 0.9
    if:
      type: text
      substr: keypair.json
  - id: node-mnemonic-file-target
    desc: Node targets mnemonic files
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "mnemonic\\.txt|seed\\.txt|hardhat\\.config\\."
  - id: node-private-key-token
    desc: Node PRIVATE_KEY token
    crit: component
    conf: 0.9
    if:
      type: text
      word: PRIVATE_KEY
  - id: node-wallet-key-token
    desc: Node WALLET_KEY token
    crit: component
    conf: 0.9
    if:
      type: text
      word: WALLET_KEY
  - id: node-mnemonic-token
    desc: Node MNEMONIC token
    crit: component
    conf: 0.9
    if:
      type: text
      word: MNEMONIC
  - id: node-seed-phrase-token
    desc: Node SEED_PHRASE token
    crit: component
    conf: 0.9
    if:
      type: text
      word: SEED_PHRASE
  - id: node-auth-token-token
    desc: Node auth token field
    crit: component
    conf: 0.9
    if:
      type: text
      word: _authToken
  - id: node-shell-history-paths
    desc: Node shell history paths
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      regex: "\\.(bash|zsh|sh)_history"
  - id: node-dev-secret-report-file
    desc: Node writes developer secret report
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: dev-secrets-scrape.txt

composite_rules:
  - id: node-wallet-secret-file-target-list
    desc: Node wallet secret file target list
    crit: suspicious
    conf: 0.94
    needs: 3
    any:
      - id: node-wallet-json-target
      - id: node-keypair-json-target
      - id: node-mnemonic-file-target
      - id: micro-behaviors/fs/path/sensitive/credentials::keystore-suffix
  - id: node-dev-secret-regex-list
    desc: Node developer secret regex list
    crit: suspicious
    conf: 0.94
    needs: 3
    any:
      - id: node-private-key-token
      - id: node-wallet-key-token
      - id: node-mnemonic-token
      - id: node-seed-phrase-token
      - id: node-auth-token-token
      - id: micro-behaviors/os/env/vars/credentials::aws-secret-access-key-var
  - id: node-shell-history-collection
    desc: Node shell history collection
    crit: suspicious
    conf: 0.93
    all:
      - id: node-shell-history-paths
    any:
      - id: micro-behaviors/fs/file/read::readfilesync-call
      - id: micro-behaviors/process/create/shell/bridge::execSync-call
    needs: 1
    unless:
      - id: well-known/app/baidu-comate::baidu-comate
  - id: node-dev-secret-source-cluster
    desc: Node developer secret source cluster
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: node-wallet-secret-file-target-list
      - id: node-dev-secret-regex-list
      - id: node-dev-secret-report-file
  - id: node-dev-secrets-clipboard-history-exfil
    desc: Node exfils developer secrets clipboard and history
    crit: hostile
    conf: 0.98
    attack: "T1552.001,T1552.003,T1115,T1041"
    mbc: "E1552,E1115,E1041"
    all:
      - id: objectives/supply-chain/recon-exfil/registry/probe::node-file-upload-form-stream
      - id: node-dev-secret-source-cluster
    any:
      - id: micro-behaviors/os/clipboard/access::node-cli-clipboard-readwrite
      - id: node-shell-history-collection
  - id: node-developer-credential-stealer
    desc: Node collects developer credentials and clipboard
    crit: hostile
    conf: 0.97
    attack: "T1552.001,T1552.003,T1115"
    mbc: "E1552,E1115"
    all:
      - id: node-dev-secret-source-cluster
    any:
      - id: node-shell-history-collection
      - id: micro-behaviors/os/clipboard/access::node-cli-clipboard-readwrite
