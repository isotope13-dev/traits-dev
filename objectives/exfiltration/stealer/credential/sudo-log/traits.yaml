# Credential-log exfiltration. A companion uploader reads a harvested
# sudo/credential log file and ships it to a remote collector. The /exfil
# endpoint and octet-stream transport are already canonical atoms in the Rust
# ELF exfil family (host-profile/http/rust-unix); this adds the missing
# credential-log-source signal and elevates exfil-of-a-credential-log to
# hostile (the existing host-profile composite only covers uname/ps/netstat
# recon, not credential theft).
defaults:
  platforms: [linux, macos]
  for: [elf, macho]
  attack: T1041
traits:
  - id: sudo-log-name
    desc: Sudo log filename
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '(?i)(^|[/\\])sudo(ers)?[a-z0-9_-]*\.(log|txt)\b'
  - id: auth-log-name
    desc: Authentication log filename
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '(?i)(^|[/\\])(auth|secure)([._-][a-z0-9_-]+)?\.(log|txt)\b'
  - id: password-log-name
    desc: Password log filename
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '(?i)(^|[/\\])(passwd|shadow)[a-z0-9_-]*\.(log|txt)\b'
  - id: credential-log-name
    desc: Credential log filename
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '(?i)(^|[/\\])credentials?[a-z0-9_-]*\.(log|txt)\b'
composite_rules:
  - id: credential-log-filename
    desc: Sudo, authentication, or credential log filename
    crit: notable
    conf: 0.6
    any:
      - id: sudo-log-name
      - id: auth-log-name
      - id: password-log-name
      - id: credential-log-name
  - id: credential-log-octet-exfil
    desc: Octet-stream exfil of a credential log
    crit: hostile
    conf: 0.95
    all:
      - id: credential-log-filename
      - id: objectives/exfiltration/stealer/host-profile/http::rust-elf-octet-stream-exfil
  - id: credential-log-network-exfil
    desc: Network exfil of a credential log file
    crit: hostile
    conf: 0.92
    all:
      - id: credential-log-filename
      - id: objectives/exfiltration/stealer/host-profile/http::rust-exfil-path-marker
      - id: micro-behaviors/communications/ip/resolve::resolve-getaddrinfo
