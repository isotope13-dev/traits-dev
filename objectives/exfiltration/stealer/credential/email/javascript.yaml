# SMTP combo checkers commonly notify an operator when a credential works.
# This is exfiltration when the alert payload contains the verified account
# fields, not merely a generic success log.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: E1041

traits:
  - id: smtp-credential-alert-sender
    desc: Sends verified SMTP credentials to alerts
    crit: suspicious
    conf: 0.94
    if:
      type: text
      word: sendSmtpAlert

  - id: smtp-alert-recipient-field
    desc: Configures SMTP credential alert recipients
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: alertEmails

composite_rules:
  - id: obfuscated-smtp-credential-exfiltration
    desc: Exfiltrates verified SMTP credentials by alert email
    crit: hostile
    conf: 0.97
    all:
      - id: smtp-credential-alert-sender
      - id: smtp-alert-recipient-field
      - id: objectives/credential-access/theft/harvested-store::obfuscated-smtp-valid-credential-store
