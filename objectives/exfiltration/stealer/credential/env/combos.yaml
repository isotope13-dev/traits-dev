# Environment Credential Exfiltration
# Environment variable / dotenv credential theft with network exfiltration
# ATT&CK: T1552.001 (Unsecured Credentials) + T1041
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1041"
composite_rules:
  # Dotenv secrets staged for callback exfiltration
  - id: dotenv-to-callback
    desc: Dotenv secrets staged for callback exfiltration
    crit: hostile
    conf: 0.96
    for: [javascript, typescript]
    all:
      - id: objectives/credential-access/env/dotenv::js-dotenv-read
      - id: objectives/exfiltration/oob/endpoint::webhook-site
  # Proximity-gated: a real dotenv exfil wires the .env read and the POST body
  # together within a few statements. Without a distance bound, any large
  # multi-feature bundle that calls dotenv.config() at startup AND issues an
  # unrelated POST elsewhere (e.g. a hub/API client) matches by mere
  # co-occurrence. near_bytes keeps the read+POST tightly coupled (also robust
  # to minified single-line payloads).
  - id: dotenv-http-post-exfil
    desc: Dotenv secrets sent by HTTP POST
    crit: hostile
    conf: 0.97
    for: [javascript, typescript]
    near_bytes: 2048
    all:
      - id: objectives/credential-access/env/dotenv::js-dotenv-read
      - id: micro-behaviors/communications/http/request/client::http-post-config
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    downgrade:
      any:
        - id: objectives/supply-chain/trojanized/app/context::benign-env-file-context
        - id: metadata/package/quality::has-tests
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  # Ruby environment variable exfiltration
  - id: ruby-env-exfiltration
    desc: Environment variable exfiltration
    crit: suspicious
    conf: 0.88
    attack: "T1018"
    for: [ruby]
    platforms: [unix, windows]
    needs: 2
    any:
      - id: objectives/credential-access/env/secrets/
      - id: objectives/command-and-control/backdoor/rat/multi::faraday-http
  - id: vault-env-http-exfiltration
    desc: Vault env credentials sent by HTTP POST
    crit: hostile
    conf: 0.98
    for: [python]
    all:
      - id: objectives/credential-access/credential-manager/store-api::vault-env-targeting
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/communications/http/request/client::requests-post-json-payload
    any:
      - id: objectives/exfiltration/http/upload::credential-var-in-dict
      - id: micro-behaviors/os/env/access::os-environ-symbol
  - id: metadata-url-vault-exfiltration
    desc: Metadata URL drives Vault env exfiltration
    crit: suspicious
    conf: 0.96
    for: [python]
    all:
      - id: vault-env-http-exfiltration
      - id: objectives/execution/interpreter/eval/dynamic::exec-fp-read-dict
      - id: micro-behaviors/communications/http/request/client::requests-post-metadata-url
