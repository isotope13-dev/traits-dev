# Environment Credential Exfiltration
# Environment variable / dotenv credential theft with network exfiltration
# ATT&CK: T1552.001 (Unsecured Credentials) + T1041
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1041"
composite_rules:
  # Dotenv secrets staged for callback exfiltration
  - id: dotenv-to-callback
    desc: Dotenv secrets staged for callback exfiltration
    crit: hostile
    conf: 0.96
    for: [javascript, typescript]
    all:
      - id: objectives/credential-access/env/dotenv::js-dotenv-read
      - id: objectives/exfiltration/oob::webhook-site
  # Ruby environment variable exfiltration
  - id: ruby-env-exfiltration
    desc: Environment variable exfiltration
    crit: suspicious
    conf: 0.88
    attack: "T1018"
    for: [ruby]
    platforms: [unix, windows]
    needs: 2
    any:
      - id: objectives/credential-access/env/secrets::env-to-hash
      - id: objectives/credential-access/env/secrets::env-serialization
      - id: objectives/credential-access/env/secrets::env-bracket-access
      - id: objectives/credential-access/env/secrets::host-env-check
      - id: objectives/command-and-control/backdoor::faraday-http
