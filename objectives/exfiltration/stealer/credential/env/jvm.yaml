defaults:
  platforms: [windows, unix]
  for: [kotlin]
  attack: T1041

traits:
  - id: kotlin-env-map-destructure-loop
    desc: Kotlin env map destructure loop
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'for\s*\(\(\w+,\s*\w+\)\s+in\s+\w+\)'

  - id: kotlin-env-key-value-append
    desc: Kotlin env key-value append
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'appendLine\([^)]{0,80}\$\w+=\$\w+'

composite_rules:
  - id: kotlin-env-map-dump
    desc: Kotlin env map dump
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/env/access::java-system-getenv
      - id: kotlin-env-map-destructure-loop
      - id: kotlin-env-key-value-append

  - id: kotlin-env-http-exfil
    desc: Kotlin env HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-env-map-dump
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source
      - id: micro-behaviors/communications/http/post::jvm-http-body-write-source
