defaults:
  platforms: [unix]
  for: [shell]
  attack: "T1552.001, T1041"

traits:
  - id: nohup-hidden-tmp-script
    desc: Hidden /tmp shell script via nohup
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'nohup\s+sh\s+/tmp/\.[A-Za-z0-9]{6,16}\.sh\s+>/dev/null\s+2>&1'
  - id: nexus-phase-callback-url
    desc: Phase callback with host and id
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'https?://[^"''\s]{3,120}:8080/h=[^&"''\s]{1,120}&l=(info|jsenv|k8s|crontab|cloud_meta|ssh|docker|cmdline|proc_all|tokens|history)&id='
  - id: harvest-phase-names
    desc: Credential harvest phase name set
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(environ|jsenv|cloud_meta|proc_all|pkgauth)[\s\S]{0,1200}(ssh|tokens|history|docker|cmdline)|\b(ssh|tokens|history|docker|cmdline)[\s\S]{0,1200}(environ|jsenv|cloud_meta|proc_all|pkgauth)\b'
  - id: shell-history-harvest-files
    desc: Shell history files harvested
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.(bash_history|zsh_history|mysql_history|psql_history)\b[\s\S]{0,500}\.(bash_history|zsh_history|mysql_history|psql_history)\b'
  - id: proc-environ-harvest
    desc: Process environ files harvested
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/proc/\*?/environ|/proc/\$\{?[^/\s}]{1,40}\}?/environ|/proc/[0-9*]+/environ'
  - id: package-auth-file-harvest
    desc: Package registry auth files harvested
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.(npmrc|pypirc|netrc)\b[\s\S]{0,500}\.(npmrc|pypirc|netrc)\b'

composite_rules:
  - id: automated-webapp-secret-harvester
    desc: Automated webapp credential harvesting script
    crit: hostile
    conf: 0.99
    all:
      - id: nohup-hidden-tmp-script
      - id: harvest-phase-names
    any:
      - id: nexus-phase-callback-url
      - id: proc-environ-harvest
      - id: shell-history-harvest-files
      - id: package-auth-file-harvest
      - id: micro-behaviors/os/container/runtime::serviceaccount-token
      - id: objectives/credential-access/cloud/token::aws-iam-credential-access-path
    needs: 2
  - id: cloud-kube-webapp-secret-sweep
    desc: Webapp cloud Kubernetes secret sweep
    crit: hostile
    conf: 0.98
    all:
      - id: harvest-phase-names
    any:
      - id: micro-behaviors/os/container/runtime::serviceaccount-token
      - id: objectives/credential-access/cloud/token::aws-iam-credential-access-path
      - id: objectives/credential-access/cloud/token::gcp-metadata-host
      - id: package-auth-file-harvest
      - id: proc-environ-harvest
      - id: shell-history-harvest-files
    needs: 4
