defaults:
  platforms: [unix]
  for: [shell]
  attack: "T1552.001, T1041"

traits:
- id: nohup-hidden-tmp-script
  desc: Hidden /tmp shell script via nohup
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'nohup\s+sh\s+/tmp/\.[A-Za-z0-9]{6,16}\.sh\s+>/dev/null\s+2>&1'
- id: nexus-phase-callback-url--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'https?://[^"''\s]{3,120}:8080/h=[^&"''\s]{1,120}&l=(info|jsenv)&id='
  count_max: 1019058
- id: nexus-phase-callback-url--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'https?://[^"''\s]{3,120}:8080/h=[^&"''\s]{1,120}&l=(k8s|crontab)&id='
  count_max: 1019059
- id: nexus-phase-callback-url--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'https?://[^"''\s]{3,120}:8080/h=[^&"''\s]{1,120}&l=(cloud_meta|ssh)&id='
  count_max: 1019060
- id: nexus-phase-callback-url--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'https?://[^"''\s]{3,120}:8080/h=[^&"''\s]{1,120}&l=(docker|cmdline)&id='
  count_max: 1019061
- id: nexus-phase-callback-url--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'https?://[^"''\s]{3,120}:8080/h=[^&"''\s]{1,120}&l=(proc_all|tokens)&id='
  count_max: 1019062
- id: nexus-phase-callback-url--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'https?://[^"''\s]{3,120}:8080/h=[^&"''\s]{1,120}&l=(history)&id='
  count_max: 1019063
- id: harvest-phase-env
  desc: Environment harvest phase names
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'l=(environ|jsenv)&id=|\b(environ|jsenv)\s*\)'
- id: harvest-phase-cloud
  desc: Cloud metadata harvest phase names
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'l=(cloud_meta|proc_all)&id=|\b(cloud_meta|proc_all)\s*\)'
- id: harvest-phase-package-auth
  desc: Package auth harvest phase name
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'l=pkgauth&id=|\bpkgauth\s*\)'
- id: harvest-phase-ssh-token
  desc: SSH and token harvest phase names
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'l=(ssh|tokens)&id=|\b(ssh|tokens)\s*\)'
- id: harvest-phase-history-container
  desc: Shell history and container harvest phase names
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'l=(history|docker)&id=|\b(history|docker)\s*\)'
- id: harvest-phase-command-line
  desc: Command line harvest phase name
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'l=cmdline&id=|\bcmdline\s*\)'
- id: shell-history-harvest-files--rx-25
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.(bash_history|zsh_history)\b[\s\S]{0,500}\.(bash_history|zsh_history)\b'
  count_max: 1019082
- id: shell-history-harvest-files--rx-26
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.(bash_history|zsh_history)\b[\s\S]{0,500}\.(mysql_history|psql_history)\b'
  count_max: 1019083
- id: shell-history-harvest-files--rx-27
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.(mysql_history|psql_history)\b[\s\S]{0,500}\.(bash_history|zsh_history)\b'
  count_max: 1019084
- id: shell-history-harvest-files--rx-28
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.(mysql_history|psql_history)\b[\s\S]{0,500}\.(mysql_history|psql_history)\b'
  count_max: 1019085
- id: proc-environ-path-harvest
  desc: Process environ files harvested
  crit: suspicious
  conf: 0.92
  for: [shell, javascript, typescript, python, ruby]
  if:
    type: text
    regex: '/proc/\*?/environ|/proc/\$\{?[^/\s}]{1,40}\}?/environ|/proc/[0-9*]+/environ'
- id: package-auth-file-harvest--rx-29
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.(npmrc|pypirc)\b[\s\S]{0,500}\.(npmrc|pypirc|netrc)\b'

  count_max: 1019087
- id: package-auth-file-harvest--rx-30
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.(netrc)\b[\s\S]{0,500}\.(npmrc|pypirc|netrc)\b'

  count_max: 1019088
composite_rules:
- id: node-proc-env-aws-exfil
  desc: Node.js reads AWS credentials from /proc and exfiltrates
  crit: hostile
  conf: 0.98
  attack: T1552.007
  for: [javascript, typescript]
  all:
  - id: proc-environ-path-harvest
  any:
  - id: objectives/command-and-control/infrastructure/domain/hosting::workers-dev-domain
  - id: objectives/supply-chain/recon-exfil/oast/env::oast-fun-url
  - id: micro-behaviors/communications/http/endpoints::aws-api-endpoint
- id: automated-webapp-secret-harvester
  desc: Automated webapp credential harvesting script
  crit: hostile
  conf: 0.99
  all:
  - id: nohup-hidden-tmp-script
  - id: harvest-phase-names
  any:
  - id: nexus-phase-callback-url
  - id: proc-environ-path-harvest
  - id: shell-history-harvest-files
  - id: package-auth-file-harvest
  - id: micro-behaviors/os/container/runtime::serviceaccount-token
  - id: objectives/credential-access/cloud/token::aws-iam-credential-access-path
  needs: 2
- id: cloud-kube-webapp-secret-sweep
  desc: Webapp cloud Kubernetes secret sweep
  crit: hostile
  conf: 0.98
  all:
  - id: harvest-phase-names
  any:
  - id: micro-behaviors/os/container/runtime::serviceaccount-token
  - id: objectives/credential-access/cloud/token::aws-iam-credential-access-path
  - id: objectives/credential-access/cloud/token::gcp-metadata-host
  - id: package-auth-file-harvest
  - id: proc-environ-path-harvest
  - id: shell-history-harvest-files
  needs: 4
- id: nexus-phase-callback-url
  desc: Phase callback with host and id
  crit: suspicious
  conf: 0.92
  any:
  - id: nexus-phase-callback-url--rx-1
  - id: nexus-phase-callback-url--rx-2
  - id: nexus-phase-callback-url--rx-3
  - id: nexus-phase-callback-url--rx-4
  - id: nexus-phase-callback-url--rx-5
  - id: nexus-phase-callback-url--rx-6
- id: harvest-phase-names
  desc: Credential harvest phase name set
  crit: suspicious
  conf: 0.9
  any:
  - id: harvest-phase-env
  - id: harvest-phase-cloud
  - id: harvest-phase-package-auth
  - id: harvest-phase-ssh-token
  - id: harvest-phase-history-container
  - id: harvest-phase-command-line
  needs: 2
  near_bytes: 1200
- id: shell-history-harvest-files
  desc: Shell history files harvested
  crit: suspicious
  conf: 0.9
  any:
  - id: shell-history-harvest-files--rx-25
  - id: shell-history-harvest-files--rx-26
  - id: shell-history-harvest-files--rx-27
  - id: shell-history-harvest-files--rx-28
- id: package-auth-file-harvest
  desc: Package registry auth files harvested
  crit: suspicious
  conf: 0.9
  any:
  - id: package-auth-file-harvest--rx-29
  - id: package-auth-file-harvest--rx-30
