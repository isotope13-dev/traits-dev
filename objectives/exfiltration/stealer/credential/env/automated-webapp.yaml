- id: proc-environ-harvest
  desc: Process environ files harvested
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '/proc/\*?/environ|/proc/\$\{?[^/\s}]{1,40}\}?/environ|/proc/[0-9*]+/environ'
- id: package-auth-file-harvest--rx-29
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.(npmrc|pypirc)\b[\s\S]{0,500}\.(npmrc|pypirc|netrc)\b'

- id: package-auth-file-harvest--rx-30
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.(netrc)\b[\s\S]{0,500}\.(npmrc|pypirc|netrc)\b'

composite_rules:
- id: automated-webapp-secret-harvester
  desc: Automated webapp credential harvesting script
  crit: hostile
  conf: 0.99
  all:
  - id: nohup-hidden-tmp-script
  - id: harvest-phase-names
  any:
  - id: nexus-phase-callback-url
  - id: proc-environ-harvest
  - id: shell-history-harvest-files
  - id: package-auth-file-harvest
  - id: micro-behaviors/os/container/runtime::serviceaccount-token
  - id: objectives/credential-access/cloud/token::aws-iam-credential-access-path
  needs: 2
- id: cloud-kube-webapp-secret-sweep
  desc: Webapp cloud Kubernetes secret sweep
  crit: hostile
  conf: 0.98
  all:
  - id: harvest-phase-names
  any:
  - id: micro-behaviors/os/container/runtime::serviceaccount-token
  - id: objectives/credential-access/cloud/token::aws-iam-credential-access-path
  - id: objectives/credential-access/cloud/token::gcp-metadata-host
  - id: package-auth-file-harvest
  - id: proc-environ-harvest
  - id: shell-history-harvest-files
  needs: 4
- id: nexus-phase-callback-url
  desc: Phase callback with host and id
  crit: suspicious
  conf: 0.92
  any:
  - id: nexus-phase-callback-url--rx-1
  - id: nexus-phase-callback-url--rx-2
  - id: nexus-phase-callback-url--rx-3
  - id: nexus-phase-callback-url--rx-4
  - id: nexus-phase-callback-url--rx-5
  - id: nexus-phase-callback-url--rx-6
  needs: 1
- id: harvest-phase-names
  desc: Credential harvest phase name set
  crit: suspicious
  conf: 0.9
  any:
  - id: harvest-phase-names--rx-7
  - id: harvest-phase-names--rx-8
  - id: harvest-phase-names--rx-9
  - id: harvest-phase-names--rx-10
  - id: harvest-phase-names--rx-11
  - id: harvest-phase-names--rx-12
  - id: harvest-phase-names--rx-13
  - id: harvest-phase-names--rx-14
  - id: harvest-phase-names--rx-15
  - id: harvest-phase-names--rx-16
  - id: harvest-phase-names--rx-17
  - id: harvest-phase-names--rx-18
  - id: harvest-phase-names--rx-19
  - id: harvest-phase-names--rx-20
  - id: harvest-phase-names--rx-21
  - id: harvest-phase-names--rx-22
  - id: harvest-phase-names--rx-23
  - id: harvest-phase-names--rx-24
  needs: 1
- id: shell-history-harvest-files
  desc: Shell history files harvested
  crit: suspicious
  conf: 0.9
  any:
  - id: shell-history-harvest-files--rx-25
  - id: shell-history-harvest-files--rx-26
  - id: shell-history-harvest-files--rx-27
  - id: shell-history-harvest-files--rx-28
  needs: 1
- id: package-auth-file-harvest
  desc: Package registry auth files harvested
  crit: suspicious
  conf: 0.9
  any:
  - id: package-auth-file-harvest--rx-29
  - id: package-auth-file-harvest--rx-30
  needs: 1
