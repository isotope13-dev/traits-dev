    type: text
    regex: '(cloud_meta|proc_all)[\s\S]{0,1200}(ssh|tokens)'
- id: harvest-phase-names--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(cloud_meta|proc_all)[\s\S]{0,1200}(history|docker)'
- id: harvest-phase-names--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
