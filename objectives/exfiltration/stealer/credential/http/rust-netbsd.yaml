defaults:
  platforms: [netbsd, unix]
  for: [rust, elf]
  attack: T1552.001

traits:
  - id: rust-netbsd-secret-file-bundle
    desc: Rust NetBSD secret file bundle
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'id_rsa[\s\S]{0,500}\.docker/config\.json[\s\S]{0,500}/etc/master\.passwd'

  - id: rust-collector-functions
    desc: Rust collector functions
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'collect_ssh_keys[\s\S]{0,260}collect_browser_data'

  - id: rust-http-upload-post
    desc: Rust HTTP upload POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /upload HTTP/1.1

composite_rules:
  - id: rust-netbsd-credential-upload
    desc: Rust NetBSD credential upload
    crit: hostile
    conf: 0.98
    all:
      - id: rust-http-upload-post
    any:
      - id: rust-netbsd-secret-file-bundle
      - id: rust-collector-functions
    needs: 1

  - id: rust-netbsd-credential-upload-elf
    desc: Rust NetBSD credential ELF upload
    crit: hostile
    conf: 0.98
    all:
      - id: rust-http-upload-post
      - id: objectives/credential-access/files/config::native-master-passwd-read
      - id: objectives/credential-access/files/config::native-ssh-private-key-paths
