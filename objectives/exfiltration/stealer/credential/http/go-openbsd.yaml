defaults:
  platforms: [openbsd, bsd, unix]
  for: [go, elf]
  attack: T1041

traits:
  - id: go-ssh-ingest-endpoint
    desc: Go SSH ingest endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '"+c2Host+"/ingest'

  - id: go-ssh-ingest-url
    desc: Go SSH ingest URL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: openbsd-go-ssh-masquerade-condition-74cee.benchmark.atomdrift.org/ingest

  - id: go-form-urlencoded-post
    desc: Go form-urlencoded POST to C2 ingest endpoint
    # `application/x-www-form-urlencoded` is the standard HTTP form content
    # type emitted by virtually every HTTP client (wget, git-lfs, dirmngr,
    # paru, fish, the Go net/http stdlib, ...), so it cannot signal credential
    # exfiltration on its own. Require it to co-occur with the C2 SSH-key
    # ingest endpoint that this stealer posts the harvested form to.
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'application/x-www-form-urlencoded[\s\S]{0,260}("\+c2Host\+"|/ingest)'

composite_rules:
  - id: go-ssh-key-http-ingest
    desc: Go SSH key HTTP ingest
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/post::url-encoded-content-type
      - id: objectives/credential-access/ssh/key::go-ssh-key-harvest-post
    any:
      - id: go-ssh-ingest-endpoint
      - id: go-ssh-ingest-url
