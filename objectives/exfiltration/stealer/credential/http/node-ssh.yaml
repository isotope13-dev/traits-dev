defaults:
  platforms: [unix, netbsd]
  for: [javascript, typescript]
  attack: T1552.004

traits:
  - id: node-ssh-key-read-loop
    desc: Node SSH key read loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'discoverSSHKeys[\s\S]{0,700}fs\.readFileSync\(keyPath'
  - id: node-dot-ssh-readdir
    desc: Node enumerates SSH directory
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'path\.join\(os\.homedir\(\),\s*["'']\.ssh["'']\)[\s\S]{0,260}fs\.readdirSync\('

composite_rules:
  - id: node-ssh-key-http-exfil
    desc: Node SSH key HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-ssh-key-read-loop
      - id: objectives/exfiltration/http/upload::node-collect-exfil
  - id: node-ssh-dir-profile-http-exfil
    desc: Node exfils SSH directory profile over HTTP
    crit: hostile
    conf: 0.99
    attack: "T1552.004, T1041"
    mbc: "E1552, E1041"
    all:
      - id: node-dot-ssh-readdir
      - id: objectives/exfiltration/http/upload::node-collect-exfil
      - id: objectives/command-and-control/beacon/network/http::direct-http-c2-script-ip
