defaults:
  platforms: [unix, netbsd]
  for: [javascript, typescript]
  attack: T1552.004

traits:
  - id: node-ssh-key-read-loop
    desc: Node SSH key read loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'discoverSSHKeys[\s\S]{0,700}fs\.readFileSync\(keyPath'

composite_rules:
  - id: node-ssh-key-http-exfil
    desc: Node SSH key HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-ssh-key-read-loop
      - id: objectives/exfiltration/http/upload::node-collect-exfil
