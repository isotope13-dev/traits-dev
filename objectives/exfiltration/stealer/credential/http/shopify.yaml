defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  attack: T1041,T1552.001

composite_rules:
  - id: shopify-token-host-diversion
    desc: Shopify token host diversion
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/url/host::url-host-reassignment-forwarding
      - id: micro-behaviors/communications/http/headers::shopify-access-token-header
      - id: objectives/credential-access/env/secrets/platform::shopify-api-key-environment-variable
