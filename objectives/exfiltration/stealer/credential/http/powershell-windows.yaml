defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1041
  mbc: E1041

composite_rules:
  - id: ps-env-secret-http-exfil
    desc: PowerShell env secret HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/env/secrets/filtered-access::ps-env-credential-harvest
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::irm-name
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-post-method
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-body-param
    any:
      - id: micro-behaviors/os/env/vars/access::env-computername
      - id: micro-behaviors/os/env/vars/access::env-username
    needs: 1
  - id: ps-credential-collect-http-exfil
    desc: PowerShell credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/exfiltration/http/collect::ps-send-exfil-function
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::irm-name
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-post-method
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-body-param
    any:
      - id: objectives/credential-access/credential-manager/cli::ps-windows-credential-manager-list
      - id: objectives/credential-access/browser/chromium::password-sql
      - id: objectives/credential-access/browser/firefox::path
      - id: objectives/credential-access/shell/history::powershell-history-theft
      - id: objectives/credential-access/env/secrets/bulk-access::ps-bulk-env-secret-harvest
      - id: objectives/credential-access/ssh/key::powershell-ssh-private-key-harvest
      - id: objectives/credential-access/windows-registry/security-keys::ps-lsa-secrets-registry-access
      - id: objectives/credential-access/windows-registry/security-keys::ps-winlogon-autologon-secrets
    needs: 2
  - id: ps-credential-archive-http-exfil
    desc: PowerShell credential archive exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/exfiltration/http/upload::ps-zip-body-upload
    needs: 2
    any:
      - id: objectives/credential-access/credential-manager/cli::ps-cmdkey-list-command
      - id: objectives/credential-access/wifi::netsh-wifi-password-extraction
      - id: objectives/credential-access/browser/chromium::logins-table
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
      - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::aws-config
