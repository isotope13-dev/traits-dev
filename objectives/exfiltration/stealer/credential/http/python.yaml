defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1041

traits:
  - id: python-encoded-sensitive-report
    desc: Encoded sensitive report data
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '(?s)base64\.b64encode\s*\([\s\S]{0,700}(build_body|found_paths)'
  - id: python-sensitive-report-post
    desc: HTTP post of assembled report
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?s)requests\.post\s*\([^)]{0,400}body'

composite_rules:
  - id: python-credential-collection-http-exfil
    desc: Credential sweep with encoded HTTP exfiltration
    crit: hostile
    conf: 0.99
    attack: T1005,T1552.001,T1041
    mbc: B0023
    all:
      - id: objectives/credential-access/cloud/devops-bundle::developer-credential-sweep
      - id: python-encoded-sensitive-report
      - id: python-sensitive-report-post
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: micro-behaviors/data/encode/base64::b64encode-call
