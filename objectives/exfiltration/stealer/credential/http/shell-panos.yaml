defaults:
  platforms: [panos, appliance, unix]
  for: [shell]
  attack: T1041

traits:
  - id: panos-shell-sensitive-file-harvest
    desc: PAN-OS shell sensitive file harvest
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'find /etc/shadow /etc/gshadow /etc/ssh /root/\.ssh /home'

  - id: panos-shell-collect-post
    desc: PAN-OS shell collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/collect

composite_rules:
  - id: panos-shell-credential-http-exfil
    desc: PAN-OS shell credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: panos-shell-sensitive-file-harvest
      - id: panos-shell-collect-post
