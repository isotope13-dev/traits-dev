defaults:
  platforms: [windows]
  for: [c, cpp, pe, dll]
  attack: T1041

traits:
  - id: winhttp-json-exfil-path
    desc: WinHTTP JSON exfil path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/exfil

  - id: json-credential-payload-fields
    desc: JSON credential payload fields
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'type\\":\\"exfil[\s\S]{0,260}creds\\":'

composite_rules:
  - id: native-windows-cloud-secret-http-exfil
    desc: Native Windows cloud secret exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/env/secrets/bulk-access::native-windows-cloud-env-harvest
      - id: winhttp-json-exfil-path
      - id: json-credential-payload-fields
    any:
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-send-request
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-send-request-text
