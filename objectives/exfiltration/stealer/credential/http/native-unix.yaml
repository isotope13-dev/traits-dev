defaults:
  platforms: [unix]
  for: [c, cpp, objc, rust, go, elf]
  attack: T1041

composite_rules:
  - id: native-unix-secret-http-exfil
    desc: Native Unix secret HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/files/config::native-unix-secret-path-bundle
    any:
      - id: objectives/exfiltration/http/collect::native-collect-http-post
      - id: objectives/exfiltration/http/collect::native-exfil-http-post
