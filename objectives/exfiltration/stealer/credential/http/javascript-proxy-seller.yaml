defaults:
  platforms: [unix, windows]
  for: [npm]
  attack: T1041
  mbc: B0030

# The package is deliberately branded as Proxy-Seller, but its default API
# host is a different domain.  The URL builder places the caller's API key in
# the path, so the combination is credential redirection rather than ordinary
# use of a third-party HTTP client.
composite_rules:
  - id: proxy-seller-api-key-redirection
    desc: Proxy-Seller API key redirected to diverted host
    crit: hostile
    conf: 0.995
    scope: outer
    all:
      - id: objectives/supply-chain/impersonation/mcp::proxy-seller-mcp-package-name
      - id: objectives/supply-chain/impersonation/mcp::proxy-seller-mcp-author-name
      - id: objectives/supply-chain/impersonation/mcp::proxy-seller-mcp-personal-repository
      - id: objectives/supply-chain/impersonation/mcp::proxy-seller-mcp-diverted-api-host
      - id: micro-behaviors/communications/http/request/credentials::js-api-key-url-encoding
      - id: micro-behaviors/data/encode/url::encode-uri-component-call
