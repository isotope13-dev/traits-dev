defaults:
  platforms: [unix, netbsd]
  for: [perl]
  attack: T1552.001

traits:
  - id: perl-netbsd-pki-private-path
    desc: Perl NetBSD PKI private path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/pkg/etc/ssl/private

  - id: perl-base64-json-exfil
    desc: Perl base64 JSON exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'JSON::PP[\s\S]{0,260}encode_base64'

composite_rules:
  - id: perl-netbsd-secret-http-exfil
    desc: Perl NetBSD secret exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
      - id: perl-base64-json-exfil
    any:
      - id: perl-netbsd-pki-private-path
      - id: objectives/exfiltration/http/upload::perl-socket-http-post
      - id: objectives/exfiltration/http/upload::generic-http-exfil-endpoint
