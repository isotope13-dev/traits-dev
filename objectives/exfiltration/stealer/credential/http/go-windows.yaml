defaults:
  platforms: [windows]
  for: [go]
  attack: T1041

traits:
  - id: go-exfil-endpoint-path
    desc: Go HTTP exfil endpoint path
    crit: component
    conf: 0.9
    if:
      type: literal
      exact: /exfil

composite_rules:
  - id: go-windows-credential-http-exfil
    desc: Go Windows credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: go-exfil-endpoint-path
      - id: micro-behaviors/communications/http/post::http-newrequest-post
    any:
      - id: objectives/credential-access/browser/chromium::logins-table
      - id: objectives/credential-access/email/outlook::go-outlook-mail-harvest
      - id: objectives/credential-access/email/thunderbird::go-thunderbird-mail-harvest
      - id: objectives/credential-access/credential-manager/cli::go-windows-credential-manager-list
    needs: 2
  - id: go-windows-collect-credential-exfil
    desc: Go Windows collect credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::collect-path
      - id: micro-behaviors/communications/http/post::http-newrequest-post
    any:
      - id: objectives/credential-access/env/harvesting::go-env-credential-harvest
      - id: objectives/credential-access/wifi::go-netsh-wifi-password-extraction
      - id: objectives/credential-access/browser/chromium::logins-table
      - id: objectives/credential-access/credential-manager/cli::go-windows-credential-manager-list
    needs: 2
