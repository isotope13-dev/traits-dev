defaults:
  platforms: [panos, appliance, unix]
  for: [go, elf]
  attack: T1041

traits:
  - id: go-panos-https-exfil-format
    desc: Go PAN-OS HTTPS exfil format
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: https://%s/exfil

composite_rules:
  - id: go-panos-vpn-http-exfil
    desc: Go PAN-OS VPN HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: go-panos-https-exfil-format
      - id: objectives/credential-access/vpn/config::go-panos-vpn-secret-paths
