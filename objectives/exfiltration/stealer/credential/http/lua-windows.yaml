defaults:
  platforms: [windows]
  for: [lua]
  attack: T1041

traits:
  - id: lua-webclient-upload-command
    desc: Lua WebClient upload command
    crit: suspicious
    conf: 0.93
    if:
      type: literal
      regex: 'Upload(Data|String)\("http://'

  - id: lua-creds-api-endpoint
    desc: Lua credentials API endpoint
    crit: component
    conf: 0.9
    if:
      type: literal
      exact: /api/creds

composite_rules:
  - id: lua-steam-credential-http-exfil
    desc: Lua Steam credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/gaming/steam/profile::steam-cred-theft
      - id: lua-webclient-upload-command
      - id: lua-creds-api-endpoint
