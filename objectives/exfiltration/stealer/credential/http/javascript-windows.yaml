defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: T1041

composite_rules:
  - id: node-windows-credential-http-exfil
    desc: Node Windows credential HTTP exfil
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: micro-behaviors/data/serialize/json::json-stringify-call
    needs: 2
    any:
      - id: objectives/credential-access/credential-manager/cli::node-cmdkey-list-exec
      - id: objectives/credential-access/browser/chromium::logins-table
      - id: micro-behaviors/fs/path/application/browser::firefox-profile-directory
      # AWS and SSH credential collection is covered by platform-specific
      # rules; it is not Windows credential-manager or browser theft.
    unless:
      - id: well-known/lib/stacksjs-ts-cloud::ts-cloud-package-context
      - id: well-known/lib/stacksjs-ts-cloud::ts-cloud-npm-package-context
      - id: well-known/lib/stacksjs-ts-cloud::ts-cloud-archive-package-context
