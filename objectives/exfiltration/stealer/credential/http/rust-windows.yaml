defaults:
  platforms: [windows]
  for: [rust]
  attack: T1041

traits:
  - id: rust-windows-sensitive-file-list
    desc: Rust Windows sensitive file list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ntuser\.dat[\s\S]{0,260}Microsoft/Credentials'

  - id: rust-windows-dev-secret-files
    desc: Rust Windows dev secret files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.git-credentials[\s\S]{0,260}\.npmrc[\s\S]{0,260}\.env'

  - id: rust-windows-browser-login-data
    desc: Rust Windows browser Login Data
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Chrome\\\\User Data\\\\Default\\\\Login Data'

  - id: rust-windows-collect-post
    desc: Rust Windows collect POST
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'POST /collect HTTP/1\.1[\s\S]{0,260}application/json'

composite_rules:
  - id: rust-windows-beacon-credential-exfil
    desc: Rust Windows beacon credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-windows-sensitive-file-list
      - id: objectives/command-and-control/beacon/poll::rust-agent-http-beacon

  - id: rust-windows-collect-credential-exfil
    desc: Rust Windows collect credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-windows-collect-post
    any:
      - id: rust-windows-dev-secret-files
      - id: rust-windows-browser-login-data
    needs: 1
