defaults:
  platforms: [panos, appliance, unix]
  for: [c, elf]
  attack: T1041

traits:
  - id: c-panos-cloud-browser-paths
    desc: C PAN-OS cloud browser paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.docker/config\.json[\s\S]{0,160}\.npmrc[\s\S]{0,160}\.pypirc'

  - id: c-panos-tar-remove-archive
    desc: C PAN-OS tar remove archive
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: tar czf '%s' --remove-files

  - id: c-panos-curl-data-binary-post
    desc: curl --data-binary upload option
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: --data-binary @
    unless:
      - id: well-known/lib/benign-runtime-bundles::pihole-ftl-binary

composite_rules:
  - id: c-panos-credential-archive-exfil
    desc: C PAN-OS credential archive exfil
    crit: hostile
    conf: 0.98
    all:
      - id: c-panos-cloud-browser-paths
      - id: c-panos-tar-remove-archive
      - id: c-panos-curl-data-binary-post
