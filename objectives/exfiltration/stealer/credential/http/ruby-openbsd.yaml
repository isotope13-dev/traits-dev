defaults:
  platforms: [openbsd, bsd, unix]
  for: [ruby]
  attack: T1041

traits:
  - id: ruby-openbsd-credential-scan
    desc: Ruby OpenBSD credential scan
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: /etc/shadow[\s\S]{0,220}/etc/sudoers

  - id: ruby-openbsd-ssh-key-scan
    desc: Ruby OpenBSD SSH key scan
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(find|cat|File\.read|Dir\.glob)[^\n]{0,220}~/.ssh/[\s\S]{0,220}authorized_keys'
    unless:
      - id: metadata/file/string/artifact::vagrant-machine-communicate-marker

  - id: ruby-openbsd-private-key-scan
    desc: Ruby OpenBSD private key scan
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: private_keys[\s\S]{0,120}find ~/.ssh

composite_rules:
  - id: ruby-openbsd-credential-http-exfil
    desc: Ruby credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-openbsd-credential-scan
      - id: ruby-openbsd-ssh-key-scan
      - id: micro-behaviors/communications/http/post::net-http-post

  - id: ruby-openbsd-ssh-key-http-exfil
    desc: Ruby SSH key HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-openbsd-private-key-scan
      - id: ruby-openbsd-ssh-key-scan
      - id: micro-behaviors/communications/http/post::net-http-post
