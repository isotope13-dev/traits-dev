defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1041

composite_rules:
  # A cloud token read together with browser-auth route discovery and an
  # authenticated account request is a credential collection/exfiltration
  # chain, rather than ordinary HTTP client usage.
  - id: node-cloud-auth-route-fetch-exfil
    desc: Node cloud credential and auth-route data sent to an account endpoint
    crit: hostile
    conf: 0.99
    attack: "T1552.001,T1041"
    mbc: E1041
    near_bytes: 4096
    all:
      - id: objectives/credential-access/env/secrets/cloud-access::node-cloud
      - id: objectives/collection/stealer/browser::browser-auth-route-terms
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/client::bearer-authorization-prefix
      - id: micro-behaviors/communications/http/endpoints::accounts-endpoint-path
      - id: objectives/exfiltration/http/hardcoded-key::request-body-marker
    unless:
      - id: metadata/package/testing/
      - id: metadata/package/quality/recognized-contexts::ci-source-context
  - id: node-filtered-env-http-exfil
    desc: Node filtered env HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/env/secrets/filtered-access::node-env-secret-filter
      - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
      - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode
    any:
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: objectives/exfiltration/http/upload::node-encode-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: node-aws-env-native-http-exfil
    desc: Node AWS env credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/env/secrets/cloud-access::node-aws
      - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
      - id: micro-behaviors/communications/http/request/client::post-method-text
    any:
      - id: objectives/exfiltration/oob/endpoint::webhook-site
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
