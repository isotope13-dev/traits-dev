defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1041

composite_rules:
  - id: node-filtered-env-http-exfil
    desc: Node filtered env HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/env/secrets/filtered-access::node-env-secret-filter
      - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
      - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode
    any:
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: objectives/exfiltration/http/upload::node-encode-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
