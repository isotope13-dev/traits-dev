defaults:
  platforms: [openbsd, bsd, unix]
  for: [shell]
  attack: T1041
  mbc: E1041

traits:
  - id: shell-find-etc-files
    desc: Shell finds /etc files
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'find\s+/etc\s+[^#\n]{0,80}-name\s+"?\*\.conf'

  - id: shell-find-home-secrets
    desc: Shell finds home secret files
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'find\s+/home\s+[^#\n]{0,80}(\.netrc|\.pgpass)'

  - id: shell-find-root-readable
    desc: Shell finds readable root files
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'find\s+/root\s+-type\s+f\s+-readable'

  - id: shell-vpn-env-secret-filter
    desc: Shell filters VPN secret env vars
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "env | grep -iE 'vpn|tunnel|proxy|auth"

  - id: shell-curl-upload-endpoint
    desc: Shell curls upload endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'curl\s+[^#\n]{0,120}-X\s+POST\s+["''][^"'']{0,120}/upload'

  - id: shell-curl-collect-endpoint
    desc: Shell curls collect endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'curl\s+[^#\n]{0,120}-X\s+POST\s+["''][^"'']{0,120}/collect'

  - id: shell-curl-keys-endpoint
    desc: Shell curls keys endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'curl\s+[^#\n]{0,120}-X\s+POST\s+["''][^"'']{0,120}/keys'

  - id: shell-xor-passwd-source
    desc: Shell XOR encodes passwd path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '"/etc/passwd"\s+XOR'

  - id: shell-hidden-exfil-file
    desc: Shell writes hidden exfil file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '_DST=.{0,80}"/\.\$?\([^)]{0,40}EX'

  - id: shell-base64-source-to-dst
    desc: Shell base64s source to staging
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'base64\s+<\s+"\$_SRC"[\s\S]{0,80}>\s+"\$_DST"'

composite_rules:
  - id: shell-sensitive-config-http-exfil
    desc: Shell exfiltrates sensitive config
    crit: hostile
    conf: 0.98
    all:
      - id: shell-curl-upload-endpoint
    any:
      - id: shell-find-etc-files
      - id: shell-find-home-secrets
      - id: shell-find-root-readable
      - id: shell-vpn-env-secret-filter
      - id: objectives/credential-access/vpn/config::openbsd-shell-vpn-secret-harvest

  - id: shell-ssh-key-http-exfil
    desc: Shell exfiltrates SSH keys
    crit: hostile
    conf: 0.98
    all:
      - id: shell-curl-keys-endpoint
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key

  - id: shell-obfuscated-passwd-http-exfil
    desc: Shell obfuscated passwd exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-xor-passwd-source
      - id: shell-hidden-exfil-file
      - id: shell-base64-source-to-dst
