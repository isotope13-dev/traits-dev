defaults:
  platforms: [netscaler, appliance, unix]
  for: [swift]
  attack: T1041

traits:
  - id: swift-netscaler-exfil-url
    desc: Swift NetScaler exfil URL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'URL\(string:[\s\S]{0,80}/exfil'

  - id: swift-cloud-sensitive-paths
    desc: Swift cloud sensitive paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\.kube/config|terraform\.tfstate|\.docker/config\.json)'

composite_rules:
  - id: swift-ssh-credential-http-exfil
    desc: Swift SSH credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-netscaler-exfil-url
      - id: micro-behaviors/communications/http/post::swift-urlrequest-post-method
      - id: micro-behaviors/fs/file/read::swift-direct-file-read-api
    any:
      - id: objectives/credential-access/ssh/path

  - id: swift-cloud-secret-http-exfil
    desc: Swift cloud secret HTTP exfil
    crit: hostile
    conf: 0.97
    all:
      - id: swift-netscaler-exfil-url
      - id: micro-behaviors/communications/http/post::swift-urlrequest-post-method
      - id: swift-cloud-sensitive-paths
