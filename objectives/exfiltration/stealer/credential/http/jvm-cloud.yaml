defaults:
  platforms: [unix]
  for: [class, jar]
  attack: T1041

traits:
  - id: jvm-api-exfiltrate-path
    desc: JVM API exfiltrate path
    crit: suspicious
    conf: 0.94
    if:
      type: hex
      pattern: 2F 61 70 69 2F 65 78 66 69 6C 74 72 61 74 65

composite_rules:
  - id: jvm-cloud-token-http-exfil
    desc: JVM cloud token HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/cloud/token::jvm-aws-iam-credential-path
      - id: objectives/credential-access/cloud/token::jvm-gcp-metadata-host
      - id: micro-behaviors/communications/http/lib/urlconnection::request-java-bytecode
      - id: jvm-api-exfiltrate-path
