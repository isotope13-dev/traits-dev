defaults:
  platforms: [android, windows, unix]
  for: [javascript, typescript]
  attack: T1041

composite_rules:
  - id: external-imap-credential-log
    desc: Sends IMAP credentials through external HTTP logging
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/credential-access/email/config::password-bearing-imap-config-log
      - id: micro-behaviors/communications/http/url/path::fetch-encoded-template-path
