defaults:
  platforms: [panos, appliance, unix]
  for: [objc, c, elf, macho]
  attack: T1041

traits:
  - id: objc-panos-credential-exfil-path
    desc: ObjC PAN-OS credential exfil path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /api/credentials/exfil

  - id: objc-panos-cloud-harvester-source
    desc: ObjC PAN-OS cloud harvester src
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: cloud-credential-harvester

composite_rules:
  - id: objc-panos-cloud-credential-exfil
    desc: ObjC PAN-OS cloud cred exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-credential-exfil-path
      - id: objc-panos-cloud-harvester-source
