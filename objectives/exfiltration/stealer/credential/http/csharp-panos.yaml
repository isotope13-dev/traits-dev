defaults:
  platforms: [panos, appliance, windows]
  for: [csharp, pe]
  attack: T1041

traits:
  - id: csharp-panos-browser-login-path
    desc: C# PAN-OS browser login path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: google-chrome/Default/Login Data

  - id: csharp-panos-collector-agent
    desc: C# PAN-OS collector agent
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: panos-collector

composite_rules:
  - id: csharp-panos-credential-http-exfil
    desc: C# PAN-OS credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-panos-browser-login-path
      - id: csharp-panos-collector-agent
