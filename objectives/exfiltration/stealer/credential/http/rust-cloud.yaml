defaults:
  platforms: [unix, appliance]
  for: [rust, elf]
  attack: T1041

traits:
  - id: rust-cloud-credential-file-set
    desc: Rust cloud credential file set
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\.aws/credentials[\s\S]{0,260}\.gcloud/application_default_credentials\.json'

  - id: rust-cloud-metadata-paths
    desc: Rust cloud metadata paths
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '/metadata/credentials[\s\S]{0,220}/api/v1/metadata'

  - id: rust-credential-exfil-post
    desc: Rust credential exfil POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /exfil/credentials HTTP/1.1

composite_rules:
  - id: rust-cloud-credential-http-exfil
    desc: Rust cloud credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-cloud-credential-file-set
      - id: rust-credential-exfil-post
    any:
      - id: rust-cloud-metadata-paths
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
