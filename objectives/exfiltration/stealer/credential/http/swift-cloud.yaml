defaults:
  platforms: [windows, unix]
  for: [swift]
  attack: T1041

traits:
  - id: swift-publish-endpoint
    desc: Swift publish endpoint
    crit: component
    conf: 0.74
    if:
      type: text
      substr: /publish

  - id: swift-messages-endpoint
    desc: Swift messages endpoint
    crit: component
    conf: 0.74
    if:
      type: text
      substr: /messages

composite_rules:
  - id: swift-cloud-credential-http-exfil
    desc: Swift cloud credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/post::swift-urlrequest-post-method
      - id: micro-behaviors/communications/http/post::swift-urlrequest-http-body
      - id: micro-behaviors/communications/http/post::swift-urlsession-data-task
      - id: micro-behaviors/communications/http/post::swift-jsonserialization-data
    needs: 2
    any:
      - id: objectives/credential-access/env/secrets/cloud-access::swift-cloud-env-secret-harvest
      - id: objectives/credential-access/cloud/local-credentials::swift-cloud-file-secret-harvest
      - id: objectives/discovery/cloud/metadata::swift-cloud-metadata-harvest

  - id: swift-cloud-message-http-exfil
    desc: Swift cloud message HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-cloud-credential-http-exfil
    any:
      - id: swift-publish-endpoint
      - id: swift-messages-endpoint
