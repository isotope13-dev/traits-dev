defaults:
  platforms: [unix, appliance]
  for: [c, cpp, objc, elf]
  attack: T1041

traits:
  - id: native-credential-exfil-frame
    desc: Native credential exfil frame
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: 'EXFIL|%s|%zu|'

composite_rules:
  - id: native-credential-tcp-exfil
    desc: Native credential TCP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-credential-exfil-frame
      - id: objectives/exfiltration/stealer/credential/platform::native-linux-env-read
      - id: micro-behaviors/os/privilege/paths::etc-shadow
    any:
      - id: micro-behaviors/communications/socket/send::send-symbol
      - id: micro-behaviors/communications/socket/connect::connect
