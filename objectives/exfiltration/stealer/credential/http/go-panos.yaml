defaults:
  platforms: [panos, appliance, unix]
  for: [go, elf]
  attack: T1041

traits:
  - id: go-panos-secret-path-set
    desc: Go PAN-OS secret path set
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,420}/root/\.bash_history'

  - id: go-panos-http-beacon-post
    desc: Go PAN-OS HTTP beacon post
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: http://%s:8080/beacon

  - id: go-panos-credential-theft-phase
    desc: Go PAN-OS credential theft phase
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: credentialTheftPhase

  - id: go-panos-exfiltrate-data-func
    desc: Go PAN-OS exfiltrate data func
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: exfiltrateData

composite_rules:
  - id: go-panos-credential-http-exfil
    desc: Go PAN-OS credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: go-panos-secret-path-set
      - id: go-panos-http-beacon-post

  - id: go-panos-credential-phase-exfil
    desc: Go PAN-OS credential phase exfil
    crit: hostile
    conf: 0.98
    all:
      - id: go-panos-credential-theft-phase
      - id: go-panos-exfiltrate-data-func
      - id: go-panos-http-beacon-post
