defaults:
  platforms: [netbsd, unix, windows]
  for: [csharp, pe]
  attack: T1552.001

traits:
  - id: csharp-netbsd-sensitive-files
    desc: C# NetBSD sensitive files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/master\.passwd[\s\S]{0,260}/root/\.ssh/id_rsa'

  - id: csharp-aes-http-exfil
    desc: C# AES HTTP exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CreateEncryptor[\s\S]{0,900}HttpWebRequest[\s\S]{0,260}/exfil'

  - id: csharp-aes-create-call
    desc: C# AES create call
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: Aes.Create()

  - id: csharp-http-exfil-endpoint
    desc: C# HTTP exfil endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /exfil

  - id: csharp-netbsd-master-passwd
    desc: C# NetBSD master.passwd
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/master.passwd

composite_rules:
  - id: csharp-netbsd-credential-exfil
    desc: C# NetBSD credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-netbsd-sensitive-files
      - id: csharp-http-exfil-endpoint
      - id: micro-behaviors/communications/http/client/managed::httpwebrequest
    any:
      - id: csharp-aes-http-exfil
      - id: csharp-aes-create-call
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-encryptor-raw
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel

  - id: csharp-netbsd-credential-exfil-pe
    desc: C# NetBSD credential PE exfil
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-netbsd-master-passwd
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-credentials
      - id: csharp-http-exfil-endpoint
      - id: micro-behaviors/communications/http/client/managed::httpwebrequest
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-encryptor-raw
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
