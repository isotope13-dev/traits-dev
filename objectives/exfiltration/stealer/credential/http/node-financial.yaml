defaults:
  platforms: [unix, netbsd]
  for: [javascript, typescript]
  attack: T1552.001

traits:
  - id: node-financial-secret-patterns
    desc: Node financial secret patterns
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'stripe\|paypal\|square\|plaid'

  - id: node-audit-report-file
    desc: Node audit report file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: audit_report.json

  - id: node-account-group-discovery
    desc: Node account group discovery
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,260}/etc/group'
    unless:
      - id: well-known/tool/development/anthropic-claude-agent::claude-agent-sdk-js-marker

composite_rules:
  - id: node-financial-account-http-exfil
    desc: Node financial account exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-financial-secret-patterns
      - id: objectives/exfiltration/http/upload::node-collect-exfil
    any:
      - id: node-audit-report-file
      - id: node-account-group-discovery
