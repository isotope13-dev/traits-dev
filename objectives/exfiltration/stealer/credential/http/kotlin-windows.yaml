defaults:
  platforms: [windows]
  for: [kotlin, class, java_class, jar]
  attack: T1041

traits:
  - id: kotlin-ssh-aws-path-cluster
    desc: Kotlin SSH and AWS path cluster
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\.ssh[\s\S]{0,700}\.aws'

  - id: kotlin-cmdkey-wifi-cluster
    desc: Kotlin cmdkey and WiFi cluster
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)cmdkey\s+/list[\s\S]{0,700}netsh wlan'

  - id: kotlin-gcloud-browser-cluster
    desc: Kotlin gcloud browser cluster
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\.config/gcloud[\s\S]{0,700}Login Data'

  - id: kotlin-wmi-account-profile
    desc: Kotlin WMI account profile data
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)Win32_Process[\s\S]{0,700}Win32_UserAccount'

  - id: kotlin-cmd-profile-data
    desc: Kotlin command profile data
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)tasklist[\s\S]{0,700}(whoami /all|ipconfig /all)'

  - id: jvm-cmdkey-list-bytes
    desc: JVM cmdkey list bytes
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 63 6D 64 6B 65 79 20 2F 6C 69 73 74

  - id: jvm-netsh-wlan-keyclear-bytes
    desc: JVM netsh WiFi key bytes
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 6E 65 74 73 68 20 77 6C 61 6E 20 73 68 6F 77 20 70 72 6F 66 69 6C 65

  - id: jvm-gcloud-credentials-bytes
    desc: JVM gcloud credential bytes
    crit: suspicious
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2E 63 6F 6E 66 69 67 2F 67 63 6C 6F 75 64

composite_rules:
  - id: kotlin-windows-credential-sweep
    desc: Kotlin Windows credential sweep
    crit: suspicious
    conf: 0.95
    any:
      - id: kotlin-ssh-aws-path-cluster
      - id: kotlin-cmdkey-wifi-cluster
      - id: kotlin-gcloud-browser-cluster

  - id: kotlin-windows-profile-sweep
    desc: Kotlin Windows profile sweep
    crit: suspicious
    conf: 0.93
    any:
      - id: kotlin-wmi-account-profile
      - id: kotlin-cmd-profile-data

  - id: kotlin-windows-credential-http-exfil
    desc: Kotlin Windows credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source
      - id: micro-behaviors/communications/http/post::jvm-http-body-write-source
      - id: kotlin-windows-credential-sweep

  - id: kotlin-windows-profile-http-exfil
    desc: Kotlin Windows profile HTTP exfil
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source
      - id: micro-behaviors/communications/http/post::jvm-http-body-write-source
      - id: kotlin-windows-profile-sweep

  - id: kotlin-windows-bytecode-credential-exfil
    desc: Kotlin bytecode credential exfil
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: micro-behaviors/communications/http/lib/urlconnection::request-java-bytecode
      - id: micro-behaviors/communications/http/post::jvm-bytecode-post-method
      - id: micro-behaviors/communications/http/post::jvm-bytecode-do-output
      - id: micro-behaviors/communications/http/post::jvm-bytecode-outputstream-write
    needs: 1
    any:
      - id: jvm-cmdkey-list-bytes
      - id: jvm-netsh-wlan-keyclear-bytes
      - id: jvm-gcloud-credentials-bytes
      - id: objectives/exfiltration/stealer/credential/browser::jvm-login-data-bytes
      - id: objectives/exfiltration/stealer/credential/browser::jvm-firefox-logins-bytes
