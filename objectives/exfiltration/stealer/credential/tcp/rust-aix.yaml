defaults:
  platforms: [aix, unix]
  for: [rust]
  attack: T1041
traits:
  - id: rust-file-exfil-record
    desc: Rust FILE exfil record
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'FILE:{}'
  - id: rust-cred-exfil-record
    desc: Rust CRED exfil record
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'CRED:{}:{}'
composite_rules:
  - id: rust-sensitive-tcp-exfil
    desc: Rust sensitive TCP exfil
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/connect::tcpstream-connect-timeout
      - id: micro-behaviors/communications/socket/send::rust-write-all
    any:
      - id: rust-file-exfil-record
      - id: rust-cred-exfil-record
    needs: 1
