defaults:
  platforms: [netbsd, unix]
  for: [c, cpp, objc, elf]
  attack: T1552.001

traits:
  - id: native-bsd-credential-paths
    desc: Native BSD credential paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/master\.passwd[\s\S]{0,700}(id_rsa|authorized_keys|\.pgpass|\.netrc)'

  - id: native-http-collect-post
    desc: Native HTTP collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'POST /collect HTTP/1\.1[\s\S]{0,260}Content-Length'

  - id: native-http-post-token
    desc: Native HTTP POST token
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'POST[\s\S]{0,300}Content-Length'

  - id: native-http-collect-path
    desc: Native HTTP collect path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /collect

  - id: native-ssh-credential-harvest
    desc: Native SSH credential harvest
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'SSH Credential Harvest[\s\S]{0,700}(id_rsa|authorized_keys|SSH_AUTH_SOCK)'

  - id: native-browser-credential-paths
    desc: Native browser credential paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Login Data[\s\S]{0,420}logins\.json'

composite_rules:
  - id: native-bsd-credential-http-exfil
    desc: Native BSD credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-bsd-credential-paths
      - id: native-http-collect-post

  - id: native-bsd-credential-octet-exfil
    desc: Native BSD credential octet exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-bsd-credential-paths
      - id: native-http-post-token
      - id: micro-behaviors/communications/http/upload::octet-stream-upload-header

  - id: native-ssh-credential-http-exfil
    desc: Native SSH credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-ssh-credential-harvest
      - id: native-http-post-token
      - id: native-http-collect-path

  - id: native-ssh-key-collect-exfil
    desc: Native SSH key collect exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/files/config::native-ssh-private-key-paths
      - id: native-http-collect-path
      - id: micro-behaviors/communications/http/upload::octet-stream-upload-header

  - id: native-browser-credential-http-exfil
    desc: Native browser credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-browser-credential-paths
      - id: native-http-post-token
      - id: micro-behaviors/communications/http/upload::octet-stream-upload-header
