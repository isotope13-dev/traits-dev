defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1041

traits:
  - id: native-socket-exfil-header
    desc: Native socket exfil header
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: EXFIL|file=%s

  - id: native-socket-unix-secret-set
    desc: Native socket Unix secrets
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,180}/etc/shadow[\s\S]{0,180}/etc/nsswitch\.conf'

composite_rules:
  - id: native-socket-secret-exfil
    desc: Native socket secret exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-socket-exfil-header
      - id: native-socket-unix-secret-set
