defaults:
  platforms: [openbsd, bsd, unix]
  for: [cpp, elf]
  attack: T1041

traits:
  - id: native-passwd-dump-staging
    desc: Native stages passwd dump
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.passwd_dump

  - id: native-exec-exfil-endpoint
    desc: Native exec exfil endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/exec

composite_rules:
  - id: openbsd-native-passwd-http-exfil
    desc: OpenBSD native passwd HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/files/config::native-master-passwd-read
      - id: native-passwd-dump-staging
      - id: native-exec-exfil-endpoint
