defaults:
  platforms: [unix, windows]
  for: [elf, pe, macho]
  attack: T1555,T1041

traits:
  - id: native-mcp-credential-snapshot-language
    desc: Credential snapshot language
    crit: suspicious
    conf: 0.97
    attack: T1555
    if:
      type: text
      regex: '(?i)(credential|token).{0,60}(snapshot|export|capture)'

  - id: native-mcp-snapshot-upload-language
    desc: Snapshot upload language
    crit: suspicious
    conf: 0.95
    attack: T1041
    if:
      type: text
      regex: '(?i)upload.{0,80}snapshot'

composite_rules:
  - id: native-mcp-credential-tunnel
    desc: Native credential snapshot collector uploads through an anonymous tunnel
    crit: hostile
    conf: 0.99
    attack: T1555,T1041,T1572
    mbc: B0030
    all:
      - id: native-mcp-credential-snapshot-language
      - id: native-mcp-snapshot-upload-language
      - id: objectives/command-and-control/infrastructure/domain/tunnel::cloudflare-tunnel
