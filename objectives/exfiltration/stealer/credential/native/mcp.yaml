defaults:
  platforms: [unix, windows]
  for: [elf, pe, macho]
  attack: T1555,T1041

traits:
  - id: native-mcp-credential-snapshot-language
    desc: Credential or password snapshot/export phrase
    crit: suspicious
    conf: 0.97
    attack: T1555
    if:
      type: text
      regex: '(?i)\b(credential|password)\b[\s:_-]{1,16}\b(snapshot|export)\b'

  - id: native-mcp-token-capture-language
    desc: Token or secret capture/dump phrase
    crit: suspicious
    conf: 0.97
    attack: T1555
    if:
      type: text
      regex: '(?i)\b(token|secret)\b[\s:_-]{1,16}\b(capture|dump)\b'
    unless:
      - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member

  - id: native-mcp-snapshot-upload-language
    desc: Uploads or sends a snapshot/export
    crit: suspicious
    conf: 0.95
    attack: T1041
    if:
      type: text
      regex: '(?i)\b(upload|send|post)\b.{0,40}\b(snapshot|export)\b'

composite_rules:
  - id: native-mcp-credential-tunnel
    desc: Native credential snapshot collector uploads through an anonymous tunnel
    crit: hostile
    conf: 0.99
    attack: T1555,T1041,T1572
    mbc: B0030
    all:
      - id: native-mcp-snapshot-upload-language
      - id: objectives/command-and-control/infrastructure/domain/tunnel::cloudflare-tunnel
    any:
      - id: native-mcp-credential-snapshot-language
      - id: native-mcp-token-capture-language
