defaults:
  platforms: [netscaler, appliance, unix]
  for: [c, elf]
  attack: T1041

traits:
  - id: native-sensitive-read-func
    desc: Native sensitive read function
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: read_sensitive_data

  - id: native-socket-send-func
    desc: Native socket send function
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?<![A-Za-z0-9_])send_data'
    unless:
      - type: basename
        regex: '\.ko$'
      - id: objectives/evasion/kernel-hide/module::vermagic
      - type: section
        exact: .modinfo


  - id: native-etc-credential-set
    desc: Native etc credential set
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,160}/etc/resolv\.conf'

composite_rules:
  - id: native-sensitive-socket-exfil
    desc: Native sensitive socket exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-sensitive-read-func
      - id: native-socket-send-func
      - id: native-etc-credential-set
