defaults:
  platforms: [routeros, appliance, unix]
  for: [java, kotlin]
  attack: T1041

composite_rules:
  - id: jvm-browser-credential-http-exfil
    desc: JVM browser credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source
      - id: micro-behaviors/communications/http/post::jvm-http-body-write-source
    any:
      - id: objectives/credential-access/browser/chromium::browser-creds-table-sql
      - id: objectives/credential-access/browser/chromium::password-sql
      - id: objectives/credential-access/browser/chromium::chromium-cookie-sql
      - id: objectives/credential-access/browser/firefox::moz-logins-sql
    needs: 1
