# A browser extension that packages extracted WhatsApp Web session material
# into an HTTP request is credential exfiltration, not ordinary API use.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, xpi]
  attack: T1041

traits:
  - id: whatsapp-session-migration-endpoint
    desc: Targets a WhatsApp session migration endpoint
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      regex: '/whatsapp/(migrar-sessao|session)'

  - id: session-dump-request-body
    desc: Places a session dump in HTTP body
    crit: suspicious
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bbody\s*:\s*\{[^}]{0,120}\bdump\b'

composite_rules:
  - id: whatsapp-session-material-exfiltration
    desc: Uploads extracted WhatsApp Web session material
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: objectives/credential-access/messaging/whatsapp::whatsapp-web-session-material-theft
      - id: whatsapp-session-migration-endpoint
      - id: session-dump-request-body
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
