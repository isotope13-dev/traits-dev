# Browser-session credential access and use. The combination below is
# specific to code that reads a browser context's cookies, evaluates page
# state, and sends requests through that authenticated context.
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1539
composite_rules:
  # Reading cookies from a Playwright context the script itself drives, reusing
  # them via context.request, and evaluating JS on the page is ordinary
  # session-aware automation (QA suites, scrapers, AI-agent browsers) — the
  # script already owns that browser. Credential THEFT means harvesting another
  # browser's on-disk store (Chrome Cookies/Login Data + DPAPI/keychain) or
  # shipping the cookies to an external endpoint; those legs carry the hostile
  # verdict. On its own this is a notable session-handling capability.
  - id: python-browser-session-cookie-transport
    desc: Uses browser session cookies for authenticated HTTP transport
    crit: notable
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/cookies::playwright-browser-context-cookie-read
      - id: micro-behaviors/communications/http/request/client::python-browser-context-request
      - id: micro-behaviors/process/create/script/automation::playwright-page-evaluate
    near_bytes: 8192
  - id: python-cookie-material-telegram-export
    desc: Exports session-cookie material through Telegram messaging
    crit: suspicious
    conf: 0.97
    scope: archive
    for: [whl, python-sdist]
    attack: "T1539,T1567.002"
    all:
      - id: micro-behaviors/communications/messaging/send::python-cookie-material-to-telegram-call
      - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
      - id: micro-behaviors/communications/messaging/send::chat-send-message
