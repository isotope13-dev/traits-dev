defaults:
  platforms: [windows]
  for: [batch, vbs]
  attack: T1555

traits:
  - id: batch-firefox-profile-copy
    desc: Batch copies Firefox credential stores
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Mozilla\\Firefox\\Profiles[\s\S]{0,360}(logins\.json|key4\.db)'
  - id: batch-thunderbird-profile-copy
    desc: Batch copies Thunderbird credential stores
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Thunderbird\\Profiles[\s\S]{0,360}(logins\.json|key4\.db)'
  - id: batch-passworded-rar-archive
    desc: Batch creates passworded RAR archive
    crit: suspicious
    conf: 0.9
    attack: T1560
    if:
      type: text
      regex: '(?i)["'']?%temp%\\[A-Za-z0-9_.-]+\.exe["'']?\s+a\s+-hp'
  - id: batch-curl-infile-upload
    desc: Batch curl infile upload
    crit: suspicious
    conf: 0.9
    attack: T1041
    if:
      type: text
      regex: '(?i)curl\s+-Uri\s+\d{1,3}(\.\d{1,3}){3}/.{1,40}\.php\s+-Method\s+Post\s+-infile'
  - id: obfuscated-schtasks-mshta
    desc: Obfuscated schtasks mshta PowerShell
    crit: suspicious
    conf: 0.92
    attack: T1053.005
    if:
      type: text
      regex: '(?i)scht%[^%\r\n]{1,40}%sks.{0,180}mshta\s+vbscript:Execute'
  - id: powershell-iex-command
    desc: PowerShell Invoke-Expression command
    crit: suspicious
    conf: 0.86
    attack: T1059.001
    if:
      type: text
      substr: Invoke-Expression
  - id: powershell-curl-content-fetch
    desc: PowerShell IEX curl content
    crit: suspicious
    conf: 0.92
    attack: T1059.001
    if:
      type: text
      regex: '(?i)curl\s+-uri\s+\d{1,3}(\.\d{1,3}){3}/.{1,40}\.php'

composite_rules:
  - id: batch-browser-credential-archive-upload
    desc: Batch browser credential archive upload
    crit: hostile
    conf: 0.98
    attack: T1555, T1041
    all:
      - id: batch-passworded-rar-archive
      - id: batch-curl-infile-upload
    any:
      - id: batch-firefox-profile-copy
      - id: batch-thunderbird-profile-copy
  - id: batch-mshta-powershell-tasking
    desc: Batch mshta PowerShell tasking
    crit: hostile
    conf: 0.97
    attack: T1053.005, T1059.001
    all:
      - id: obfuscated-schtasks-mshta
      - id: powershell-iex-command
      - id: powershell-curl-content-fetch
