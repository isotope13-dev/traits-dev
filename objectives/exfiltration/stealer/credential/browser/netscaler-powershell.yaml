defaults:
  platforms: [netscaler, appliance, windows]
  for: [powershell]
  attack: T1555.003

traits:
  - id: ps-browser-login-data-read
    desc: PowerShell browser Login Data read
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Login Data[\s\S]{0,180}ReadAllBytes'

  - id: ps-firefox-key4-read
    desc: PowerShell Firefox key4 read
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'key4\.db[\s\S]{0,180}ReadAllBytes'

  - id: ps-exfil-data-header
    desc: PowerShell exfil data header
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: X-Exfil-Data

  - id: ps-dns-exfil-query
    desc: PowerShell DNS exfil query
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\.exfil\.\$\{Script:C2Host\}'

  - id: ps-browser-collect-url
    desc: Netscaler browser collection endpoint path
    crit: suspicious
    conf: 0.91
    unless:
      - id: well-known/app/aui-agent-builder/
    if:
      type: text
      # Match the endpoint segment, not the /collect prefix inside unrelated
      # paths such as Splunk's /services/collector/event.
      # Keep the endpoint token bounded; documentation URLs such as
      # `/collect-parse-fslogix-event-log/` are not collection endpoints.
      regex: '/collect(?![-A-Za-z0-9_])'

composite_rules:
  - id: ps-browser-sidechannel-exfil
    desc: PowerShell browser side-channel exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ps-exfil-data-header
    any:
      - id: ps-browser-login-data-read
      - id: ps-firefox-key4-read
      - id: ps-dns-exfil-query

  - id: ps-browser-dns-exfil
    desc: PowerShell browser DNS exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ps-dns-exfil-query
    any:
      - id: ps-browser-login-data-read
      - id: ps-firefox-key4-read

  - id: ps-browser-credential-http-exfil
    desc: PowerShell browser credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ps-browser-login-data-read
      - id: ps-browser-collect-url
    any:
      - id: micro-behaviors/communications/http/endpoints::collect-post-request
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-post-method
