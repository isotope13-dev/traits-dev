defaults:
  platforms: [qnx, unix]
  for: [java, class, java_class]
  attack: T1555.003

traits:
  - id: qnx-java-browser-login-stores
    desc: QNX Java browser login stores
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Login Data[\s\S]{0,220}logins\.json'

  - id: qnx-java-browser-exfil-post
    desc: QNX Java browser exfil POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'POST /exfil HTTP/1\.1[\s\S]{0,260}Content-Type'

  - id: qnx-java-bytecode-login-data
    desc: QNX Java bytecode Login Data
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 4C 6F 67 69 6E 20 44 61 74 61

  - id: qnx-java-bytecode-firefox-logins
    desc: QNX Java bytecode Firefox logins
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 6C 6F 67 69 6E 73 2E 6A 73 6F 6E

  - id: qnx-java-bytecode-post-exfil
    desc: QNX Java bytecode POST exfil
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 50 4F 53 54 20 2F 65 78 66 69 6C 20 48 54 54 50

composite_rules:
  - id: qnx-java-browser-credential-exfil
    desc: QNX Java browser credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-java-browser-login-stores
      - id: micro-behaviors/fs/file/read::java-readallbytes
      - id: qnx-java-browser-exfil-post

  - id: qnx-java-bytecode-browser-exfil
    desc: QNX Java bytecode browser exfil
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: qnx-java-bytecode-login-data
      - id: qnx-java-bytecode-firefox-logins
      - id: micro-behaviors/fs/file/read::jvm-readallbytes-bytecode
      - id: qnx-java-bytecode-post-exfil
