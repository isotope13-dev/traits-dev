defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1539,T1114"

composite_rules:
  - id: google-session-mailbox-recon
    desc: Google session cookie used for mailbox reconnaissance
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/cookies::browser-page-cookie-read
      - id: micro-behaviors/communications/http/services/google::google-mail-sync-endpoint
      - id: micro-behaviors/communications/http/services/google::google-security-account-navigation
