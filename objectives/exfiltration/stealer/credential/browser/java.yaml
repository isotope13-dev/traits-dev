defaults:
  platforms: [windows, unix]
  for: [java, class, java_class, jar]
  attack: T1555.003

traits:
  - id: java-browser-login-stores
    desc: Java browser login stores
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Login Data[\s\S]{0,220}logins\.json'

  - id: java-browser-exfil-post
    desc: Java browser exfil POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'POST /exfil HTTP/1\.1[\s\S]{0,260}Content-Type'

  - id: java-bytecode-firefox-logins
    desc: Java bytecode Firefox logins
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: text
      substr: logins.json

  - id: jvm-login-data-bytes
    desc: JVM browser Login Data bytes
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 4C 6F 67 69 6E 20 44 61 74 61

  - id: jvm-firefox-logins-bytes
    desc: JVM Firefox logins bytes
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 6C 6F 67 69 6E 73 2E 6A 73 6F 6E

  - id: java-bytecode-post-exfil
    desc: Java bytecode POST exfil
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: text
      regex: 'POST[\s\S]{0,160}exfil'

composite_rules:
  - id: java-browser-credential-exfil
    desc: Java browser credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: java-browser-login-stores
      - id: micro-behaviors/fs/file/read::java-readallbytes
    any:
      - id: java-browser-exfil-post
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source

  - id: java-bytecode-browser-exfil
    desc: Java bytecode browser exfil
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-login-data-bytes
      - id: jvm-firefox-logins-bytes
      - id: objectives/exfiltration/stealer/host-profile/http::jvm-exfil-path-bytecode
      - id: micro-behaviors/fs/file/read::jvm-readallbytes-bytecode
    any:
      - id: java-bytecode-post-exfil
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-bytecode
      - id: micro-behaviors/communications/http/post::jvm-bytecode-post-method
