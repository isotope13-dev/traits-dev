defaults:
  platforms: [unix]
  for: [shell]
  attack: T1555.003

traits:
  - id: shell-legacy-browser-profiles
    desc: Shell legacy browser profiles
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.netscape[\s\S]{0,220}\.mozilla'

  - id: shell-browser-secret-files
    desc: Shell browser secret files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'signons[23]?\.txt[\s\S]{0,260}(key[34]\.db|logins\.json)'

  - id: shell-browser-creds-post
    desc: Shell browser creds POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '--data-binary @-[\s\S]{0,160}/api/creds'

composite_rules:
  - id: shell-browser-credential-exfil
    desc: Shell browser credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-legacy-browser-profiles
      - id: shell-browser-secret-files
      - id: shell-browser-creds-post
