defaults:
  platforms: [windows, unix]
  for: [pe, python, pyc, javascript]
  attack: T1041

traits:
  - id: python-browser-session-webhook-share-method
    desc: Python browser-session webhook method
    crit: component
    conf: 0.99
    for: [python]
    if:
      type: symbol
      kind: function
      exact: send_webhook
  - id: python-browser-session-email-share-method
    desc: Python browser-session email method
    crit: component
    conf: 0.99
    for: [python]
    if:
      type: symbol
      kind: function
      exact: send_email
  - id: python-browser-session-cookie-field
    desc: Reads session cookie collection
    crit: component
    conf: 0.99
    for: [python]
    if:
      type: text
      regex: 'session\.get\(\s*["'']cookies["'']'
  - id: python-smtp-sendmail-call
    desc: Python SMTP sendmail call
    crit: component
    conf: 0.98
    for: [python]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)sendmail$'

composite_rules:
  - id: browser-credentials-discord-webhook
    desc: Browser credentials exfiltrated to Discord webhook
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/credential-access/browser/multi-target::hostile-browser-stealer
      - id: objectives/exfiltration/messaging/webhook::discord-exfiltration
  - id: python-browser-session-webhook-exfiltration
    desc: Browser session cookies are packaged and sent to a webhook
    crit: hostile
    conf: 0.99
    all:
      - id: python-browser-session-webhook-share-method
      - id: python-browser-session-cookie-field
      - id: micro-behaviors/communications/http/request/client::urllib-json-post
  - id: python-browser-session-email-exfiltration
    desc: Browser session cookies are packaged and sent by SMTP
    crit: hostile
    conf: 0.99
    all:
      - id: python-browser-session-email-share-method
      - id: python-browser-session-cookie-field
      - id: micro-behaviors/communications/email/send/smtp::python-smtplib-import
      - id: python-smtp-sendmail-call
