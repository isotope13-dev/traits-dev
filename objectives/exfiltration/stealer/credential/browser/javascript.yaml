# Browser Credential Exfiltration - JavaScript
# Browser credential theft with HTTP exfiltration
# ATT&CK: T1555.003 (Credentials from Web Browsers) + T1041
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1041"
traits:
  - id: browser-oast-endpoint
    desc: Browser OAST exfil endpoint
    crit: suspicious
    conf: 0.92
    platforms: [unix, windows]
    for: [javascript, typescript]
    if:
      type: text
      regex: "https?://[a-z0-9-]+\\.oastify\\.com"
  - id: browser-image-query-exfil
    desc: Browser image query exfil fallback
    crit: suspicious
    unless:
      - id: well-known/tool/offensive/pentestkit/
      - id: well-known/app/containarium::containarium-security-demo-context
    conf: 0.9
    platforms: [unix, windows]
    for: [javascript, typescript]
    if:
      type: text
      regex: "new\\s+Image\\(\\)\\.src\\s*=\\s*[^;]{0,120}\\?.{0,60}(encodeURIComponent|btoa)"
composite_rules:
  - id: js-browser-wallet-stealer-source
    desc: Browser or wallet credential source
    crit: notable
    conf: 0.94
    any:
      # Reference the positive stealer composites explicitly — a bare directory
      # prefix also matched the baseline `multi-app-stealer-benign-context`
      # marker (e.g. detection-tool vocabulary), firing the hostile upload
      # composite on benign frameworks that merely touch credential categories.
      - id: objectives/credential-access/theft/multi-app::browser-wallet-stealer
      - id: objectives/credential-access/theft/multi-app::multi-app-credential-stealer
      - id: objectives/credential-access/browser/multi-target/
      - id: objectives/credential-access/wallet/desktop::stealer
      - id: objectives/credential-access/wallet/extension::multi-wallet-targeting
      - id: objectives/credential-access/wallet/extension::wallet-extension-store-targeting
      - id: objectives/credential-access/wallet/extension::metamask-wallet-profile
      - id: objectives/credential-access/wallet/lazarus::lazarus-crypto-targeting
      - id: objectives/credential-access/wallet/mnemonic::comprehensive-stealer
      - id: objectives/credential-access/wallet/provider::solana-wallet-drainer-config
      - id: objectives/credential-access/wallet/provider::wallet-drainer
      - id: objectives/credential-access/wallet/solana::solana-wallet-drain
      - id: objectives/credential-access/wallet/solana::solana-env-drain
      - id: objectives/credential-access/wallet/solana::solana-private-key-http-exfil

  - id: js-browser-storage-http-exfil
    desc: Browser storage credential exfiltration
    crit: hostile
    conf: 0.98
    attack: "T1555.003,T1041"
    mbc: "B0028"
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/data/db/web-storage::browser-storage-credential-key
      - id: micro-behaviors/data/db/web-storage::browser-storage-sweep-loop
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    any:
      - id: micro-behaviors/communications/http/lib/axios::request-axios
      - id: micro-behaviors/communications/http/post/
      - id: micro-behaviors/communications/http/upload/
    # Storage enumeration and an HTTP client are not exfiltration by
    # themselves: extensions commonly maintain their own cached auth state.
    # Require the source, sweep, and transport evidence to occur in one local
    # code region so unrelated application features cannot be joined into a
    # credential-theft finding.
    near_bytes: 4096
    unless:
      - id: well-known/app/browser-extension/
      - id: well-known/tool/detection/
      - id: well-known/lib/tina4ruby::tina4-js-client
      - id: metadata/package/testing/
      - id: metadata/package/quality/false-positives::dscodegpt-extension-auth-context

  - id: js-browser-cookie-storage-oast-exfil
    desc: Browser cookies and storage exfiltrated to OAST endpoint
    crit: hostile
    conf: 0.98
    attack: "T1555.003,T1041"
    mbc: "B0028"
    for: [javascript, typescript]
    all:
      - id: browser-oast-endpoint
      - id: micro-behaviors/communications/http/cookies::document-cookie-read
      - id: micro-behaviors/data/db/web-storage::browser-storage-sweep-loop
    any:
      - id: micro-behaviors/communications/http/post::no-cors-post-request
      - id: micro-behaviors/communications/http/services/analytics::browser-send-beacon
      - id: browser-image-query-exfil
    unless:
      - id: well-known/app/browser-extension/
      - id: well-known/tool/detection/
      - id: metadata/package/testing/

  - id: js-browser-auth-state-http-exfil
    desc: Browser auth state exfiltration
    crit: hostile
    conf: 0.99
    attack: "T1555.003,T1041"
    mbc: B0028
    for: [javascript, typescript]
    all:
      # Counters, consent flags, and other generic localStorage use are not
      # credential access. Require a key named as authentication state.
      - id: micro-behaviors/data/db/web-storage::browser-storage-credential-key
      - id: micro-behaviors/communications/http/cookies::document-cookie-read
      - id: micro-behaviors/communications/http/oauth::access-token
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    any:
      - id: micro-behaviors/communications/http/services/analytics::browser-send-beacon
      - id: micro-behaviors/communications/http/post/
    unless:
      - id: well-known/app/browser-extension/
      - id: well-known/tool/detection/
      - id: metadata/package/testing/
      - id: metadata/package/quality/false-positives::dscodegpt-extension-auth-context

  - id: js-browser-wallet-upload-exfil
    desc: Browser or wallet data upload exfiltration
    crit: hostile
    conf: 0.98
    attack: "T1555.003"
    mbc: "B0028"
    for: [javascript]
    all:
      - id: js-browser-wallet-stealer-source
    any:
      - id: micro-behaviors/communications/http/upload/
      - id: micro-behaviors/communications/http/post/
    unless:
      - id: well-known/app/browser-extension/

  - id: js-stealer
    desc: Chromium browser credential stealer (SQLite + HTTP POST)
    crit: suspicious
    conf: 0.98
    attack: "T1555.003"
    mbc: "B0028"
    for: [javascript]
    all:
      - id: objectives/credential-access/browser/chromium::password-sql
      - id: micro-behaviors/communications/http/post::axios-post-call
