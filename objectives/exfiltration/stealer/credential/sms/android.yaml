defaults:
  platforms: [android]
  for: [apk, binaries]
  crit: notable
  conf: 0.86
  attack: "T1636.004"

traits:
  - id: read-sms-permission
    desc: Android READ_SMS permission
    conf: 0.92
    if:
      type: text
      substr: "android.permission.READ_SMS"

  - id: receive-sms-permission
    desc: Android RECEIVE_SMS permission
    conf: 0.92
    if:
      type: text
      substr: "android.permission.RECEIVE_SMS"

  - id: broadcast-sms-permission
    desc: Android BROADCAST_SMS receiver permission
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "android.permission.BROADCAST_SMS"

  - id: sms-deliver-intent
    desc: SMS_DELIVER receiver intent
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "android.provider.Telephony.SMS_DELIVER"

  - id: sms-received-intent
    desc: SMS_RECEIVED receiver intent
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "android.provider.Telephony.SMS_RECEIVED"

  - id: sms-receiver-class
    desc: SMS receiver implementation class
    conf: 0.88
    if:
      type: text
      substr: "MsReceiver"

  - id: sms-origin-address
    desc: SMS sender address extraction
    conf: 0.9
    if:
      type: text
      substr: "getOriginatingAddress"

  - id: sms-message-body
    desc: SMS message body extraction
    conf: 0.9
    if:
      type: text
      substr: "getMessageBody"

  - id: sms-gzip-outputstream
    desc: GZIP compressed SMS staging
    conf: 0.88
    if:
      type: text
      substr: "Ljava/util/zip/GZIPOutputStream;"

  - id: sms-base64-encode
    desc: Base64 string encoding routine
    conf: 0.84
    if:
      type: text
      substr: "encodeToString"

  - id: sms-app-channel-flag
    desc: SMS exfil app channel flag
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "&from=app"

  - id: sms-bot-id-package
    desc: Bot identifier package string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "com.kumarsanu.isnclk"

composite_rules:
  - id: sms-collection-primitives
    desc: SMS interception collection primitives
    crit: suspicious
    conf: 0.96
    all:
      - id: read-sms-permission
      - id: receive-sms-permission
      - id: sms-origin-address
      - id: sms-message-body

  - id: sms-receiver-manifest
    desc: SMS broadcast receiver manifest wiring
    crit: suspicious
    conf: 0.98
    all:
      - id: broadcast-sms-permission
      - id: sms-deliver-intent
      - id: sms-received-intent

  - id: sms-exfil-encoding-chain
    desc: SMS exfiltration encoding chain
    crit: suspicious
    conf: 0.95
    all:
      - id: sms-gzip-outputstream
      - id: sms-base64-encode
      - id: sms-app-channel-flag

  - id: android-sms-otp-exfil
    desc: Android app intercepts and relays SMS OTP data
    crit: hostile
    conf: 0.995
    mbc: "F0004"
    all:
      - id: sms-collection-primitives
      - id: sms-exfil-encoding-chain
    any:
      - id: sms-receiver-class
      - id: sms-receiver-manifest
      - id: sms-bot-id-package
      - id: objectives/credential-access/phishing/tactics::bundled-bank-phish-apk
