defaults:
  platforms: [android, unix]
  for: [shell, php, perl, c, cpp, elf, go, kotlin]
  attack: T1041

traits:

composite_rules:
  - id: android-upload-transport
    desc: Android upload transport
    crit: suspicious
    conf: 0.92
    any:
      - id: micro-behaviors/communications/http/upload::curl-data-binary
      - id: micro-behaviors/communications/http/curl::post-data
      - id: objectives/exfiltration/http/upload::raw-exfil-post-path
      - id: micro-behaviors/communications/http/upload::octet-stream-upload-header

  - id: android-credential-http-exfil
    desc: Android credential HTTP exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/theft/file::android-credential-store-targeting
    any:
      - id: objectives/exfiltration/http/upload::generic-http-exfil-endpoint

  - id: android-credential-upload-exfil
    desc: Android credential upload exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/theft/file::android-credential-store-targeting
      - id: android-upload-transport

  - id: android-discord-http-exfil
    desc: Android Discord token exfiltration
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/credential-access/theft/file::android-discord-token-harvest
      - id: objectives/exfiltration/http/upload::generic-http-exfil-endpoint
