defaults:
  platforms: [android]
  for: [kotlin, class]
  attack: T1041

traits:
  - id: kotlin-credential-exfil-host
    desc: Kotlin credential exfil host
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'EXFILTRATION_HOST|/api/v1/credentials'

composite_rules:
  - id: kotlin-login-credential-exfil
    desc: Kotlin login credential exfil
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/credential-access/capture/input::kotlin-login-credential-capture
      - id: kotlin-credential-exfil-host
    any:
      - id: micro-behaviors/communications/http/post::jvm-post-method-source
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-open-kotlin-source
      - id: micro-behaviors/communications/http/post::jvm-bytecode-outputstream-write
