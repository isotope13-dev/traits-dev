defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
composite_rules:
  - id: node-ai-tool-secret-exfil
    desc: Node exfiltrates AI tool secrets
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/dev-tools/ai::ai-coding-tool-secret-harvest
    any:
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: micro-behaviors/communications/http/upload::form-data-stream-upload
      - id: micro-behaviors/communications/http/upload::form-data-append
      - id: micro-behaviors/communications/http/request/client::fetch-json-body
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
    unless:
      - id: well-known/tool/detection/sast::sast-scanner-integration
