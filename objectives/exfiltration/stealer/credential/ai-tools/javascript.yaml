defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
composite_rules:
  - id: node-ai-tool-secret-exfil
    desc: Node exfiltrates AI tool secrets
    crit: hostile
    conf: 0.98
    near_bytes: 4096
    all:
      - id: objectives/credential-access/dev-tools/ai::ai-coding-tool-secret-harvest
    any:
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: micro-behaviors/communications/http/upload::form-data-stream-upload
      - id: micro-behaviors/communications/http/upload::form-data-append
      - id: micro-behaviors/communications/http/request/client::fetch-json-body
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
    unless:
      - id: well-known/tool/detection/sast::sast-scanner-integration
  # Direct single-file theft: read a known credential/secret file and push it
  # out over a curl/HTTP upload. Complements node-ai-tool-secret-exfil above,
  # which requires a recursive directory walk — this fires when malware
  # hardcodes one credential path instead of enumerating a config directory.
  - id: node-credential-file-curl-exfil
    desc: Reads a known credential file and stages it for HTTP upload
    crit: hostile
    conf: 0.96
    near_bytes: 2048
    all:
      - id: micro-behaviors/fs/path/sensitive/credentials/
      - id: micro-behaviors/fs/file/read::read-node
    any:
      - id: objectives/command-and-control/beacon/network/client-cli::curl-form-file-attach
      - id: micro-behaviors/communications/http/upload::form-data-stream-upload
      - id: micro-behaviors/communications/http/upload::form-data-append
    unless:
      - id: well-known/tool/detection/sast::sast-scanner-integration
      - id: objectives/supply-chain/trojanized/app/context::credential-exfil-benign-context
      - id: objectives/supply-chain/trojanized/app/context::generated-swagger-typescript-api-client
      - id: objectives/supply-chain/trojanized/app/context::swagger-typescript-api-banner
