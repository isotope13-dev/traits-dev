defaults:
  platforms: [unix, windows]
  for: [class, jar, zip]
  attack: T1041

traits:
  - id: java-beacon-payload-builder
    desc: Java builds beacon payload
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: buildBeaconPayload
  - id: java-custom-dragonflybsd-user-agent
    desc: Java custom DragonFlyBSD user agent
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: "Mozilla/5.0 (X11; DragonFlyBSD) AppleWebKit/537.36"

composite_rules:
  - id: java-credential-beacon-exfiltration
    desc: Java credential sweep beacon exfiltration
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/credential-access/files/config::java-developer-credential-sweep
      - id: objectives/command-and-control/beacon/network/periodic::java-periodic-https-beacon
      - id: java-beacon-payload-builder
    any:
      - id: java-custom-dragonflybsd-user-agent
      - id: objectives/collection/clipboard/capture::java-awt-clipboard-capture
