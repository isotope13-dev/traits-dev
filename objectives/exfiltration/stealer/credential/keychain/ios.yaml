# Keychain Exfiltration - iOS/macOS
# Keychain access with network channel exfiltration
# ATT&CK: T1555.001 (Keychain) + T1041
defaults:
  crit: suspicious
  conf: 0.9
  attack: "T1041"
  mbc: T1555.001
  for: [macho]
  platforms: [ios, macos]
composite_rules:
  - id: keychain-network-collection
    desc: Keychain access with network channel
    all:
      - id: micro-behaviors/os/security/mac/keychain::keychain-item-crud
      - id: micro-behaviors/communications/socket/connect::nwconnection-connect
      - id: micro-behaviors/communications/socket/send::nwconnection-send
