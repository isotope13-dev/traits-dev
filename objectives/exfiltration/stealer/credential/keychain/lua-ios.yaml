defaults:
  platforms: [ios]
  for: [lua]
  attack: T1041
  mbc: T1555.001

composite_rules:
  - id: ios-keychain-credential-exfil
    desc: iOS keychain credentials exfiltration
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/credential-access/gaming/mobile::ios-gamecenter-keychain-targeting
    any:
      - id: micro-behaviors/communications/http/post::post-request-line
      - id: micro-behaviors/communications/http/post::lua-http-request
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect

  - id: ios-cookie-credential-exfil
    desc: iOS cookie credentials exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/credential-access/browser/safari::ios-cookie-db-extraction
    any:
      - id: micro-behaviors/communications/http/post::post-request-line
      - id: micro-behaviors/communications/http/post::lua-http-request
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect
