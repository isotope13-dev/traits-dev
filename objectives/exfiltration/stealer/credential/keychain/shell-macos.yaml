defaults:
  platforms: [unix]
  for: [shell]
  attack: T1555.001

traits:
  - id: shell-keychain-dump-command
    desc: Shell dumps macOS keychain
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'security dump-keychain[\s\S]{0,180}(-d (user|system|login)|-t internet)'

  - id: shell-keychain-password-queries
    desc: Shell keychain password queries
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'security find-generic-password[\s\S]{0,220}security find-internet-password'

  - id: shell-macos-ssh-browser-secrets
    desc: Shell macOS SSH browser secrets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'cat ~/.ssh/id_rsa[\s\S]{0,320}Chrome/Default/Login Data'

  - id: shell-curl-octet-upload
    desc: Shell curl octet upload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'curl -s .{0,80}-X POST[\s\S]{0,220}application/octet-stream'

composite_rules:
  - id: shell-macos-keychain-http-exfil
    desc: Shell macOS keychain exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-keychain-dump-command
    any:
      - id: shell-keychain-password-queries
      - id: shell-macos-ssh-browser-secrets
    needs: 1

  - id: shell-macos-secret-http-exfil
    desc: Shell macOS secret HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-curl-octet-upload
    any:
      - id: shell-keychain-dump-command
      - id: shell-macos-ssh-browser-secrets
    needs: 1
