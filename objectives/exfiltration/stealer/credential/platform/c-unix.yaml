defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1552.001

traits:
  - id: c-unix-ssh-token-files
    desc: C Unix SSH token files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.ssh/id_rsa[\s\S]{0,260}\.ssh/known_hosts[\s\S]{0,260}\.netrc'

  - id: c-cloud-token-env-list
    desc: C cloud token env list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'GCP_TOKEN[\s\S]{0,90}GOOGLE_APPLICATION_CREDENTIALS'

  - id: c-http-post-collector
    desc: C HTTP POST collector
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'POST /collect HTTP/1\.1[\s\S]{0,260}application/octet-stream'

composite_rules:
  - id: c-unix-credential-http-exfil
    desc: C Unix credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: c-http-post-collector
      - id: c-unix-ssh-token-files
      - id: c-cloud-token-env-list
    any:
      - id: micro-behaviors/os/privilege/paths::etc-shadow
