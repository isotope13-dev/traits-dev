defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1552.001

traits:
  - id: csharp-sensitive-env-key-list
    desc: C# sensitive env key list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'AWS_ACCESS_KEY_ID[\s\S]{0,90}AWS_SECRET_ACCESS_KEY'

  - id: csharp-unix-credential-files
    desc: C# Unix credential files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,140}/etc/passwd'

  - id: csharp-beacon-creds-param
    desc: C# beacon creds parameter
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "&creds="


composite_rules:
  - id: csharp-unix-credential-beacon
    desc: C# Unix credential beacon
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-beacon-creds-param
      - id: csharp-sensitive-env-key-list
      - id: csharp-unix-credential-files
