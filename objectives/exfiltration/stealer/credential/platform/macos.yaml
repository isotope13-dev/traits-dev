# macOS Credential Exfiltration
# macOS credential theft with network exfiltration
# ATT&CK: T1555 (Credentials from Password Stores) + T1041
defaults:
  platforms: [macos]
  attack: "T1041"
  for: [macho]
composite_rules:
  # Hardware fingerprint + network = tracking/identification
  - id: fingerprint-with-exfil
    desc: "macOS hardware fingerprinting network exfiltration"
    crit: suspicious
    conf: 0.8
    attack: "T1082"
    mbc: "B0001.009"
    all:
      - id: objectives/discovery/system/fingerprint/machine-id::hardware-fingerprint-macos
    any:
      - id: micro-behaviors/communications/socket/create::client-macos
      - id: micro-behaviors/communications/socket/create::socket-connect-macos
      - id: micro-behaviors/communications/http/download/curl/
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/binary/vendor::system-component
  # Credential targeting + hardware fingerprinting + network = stealer
  - id: credential-stealer-macos
    desc: "macOS credential stealer"
    crit: hostile
    conf: 0.95
    attack: "T1555"
    mbc: "B0028"
    all:
      - id: objectives/discovery/system/fingerprint/machine-id::macos-hardware-uuid
      - id: objectives/credential-access/validation/check::csidentity-password-auth
      - id: objectives/collection/file-targeting/filter::credential-files
      - id: micro-behaviors/communications/socket/create/
