defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: node-aws-credential-path
    desc: Node AWS credential path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .aws/credentials

  - id: node-exfil-endpoint
    desc: Node exfil endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /exfil
  - id: node-bsd-password-stores
    desc: Node BSD password stores
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/master\.passwd[\s\S]{0,180}/etc/shadow'
  - id: node-root-ssh-targets
    desc: Node root SSH targets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/root/\.ssh[\s\S]{0,180}/root/\.ssh/authorized_keys'
  - id: node-browser-login-targets
    desc: Node browser login targets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Login Data[\s\S]{0,180}logins\.json'
  - id: node-env-secret-filter
    desc: Node env secret filter
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'API_KEY[\s\S]{0,120}SECRET[\s\S]{0,120}TOKEN'
  - id: node-http-collect-post
    desc: Node HTTP collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/api/v1/collect[\s\S]{0,400}POST'

composite_rules:
  - id: node-keychain-aws-exfil
    desc: Node keychain AWS exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-exfil-endpoint
    any:
      - id: objectives/credential-access/keychain/extract::dump-keychain
      - id: node-aws-credential-path
    needs: 1
  - id: node-unix-secret-http-exfil
    desc: Node Unix secret HTTP exfil
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: node-bsd-password-stores
      - id: node-root-ssh-targets
      - id: node-browser-login-targets
      - id: node-env-secret-filter
      - id: node-http-collect-post
      - id: node-exfil-endpoint
