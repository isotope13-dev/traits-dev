defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: node-aws-credential-readfile
    desc: Node readFile accesses AWS credentials
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/tool/detection/ai-guardrail/
      - id: well-known/lib/aws-sdk-js/
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/file/profile/identity::generated-documentation-page
    if:
      type: symbol
      kind: call
      regex: '(^|\.)readFile(Sync)?$'
      arg:
        kind: string
        regex: '(?i)(^|[~/])\.aws[/\\]credentials$'

  - id: node-aws-credential-open
    desc: Node open accesses AWS credentials
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/tool/detection/ai-guardrail/
      - id: well-known/lib/aws-sdk-js/
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/file/profile/identity::generated-documentation-page
    if:
      type: symbol
      kind: call
      regex: '(^|\.)open(Sync)?$'
      arg:
        kind: string
        regex: '(?i)(^|[~/])\.aws[/\\]credentials$'

  - id: node-aws-credential-stream
    desc: Node streams AWS credential file
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/tool/detection/ai-guardrail/
      - id: well-known/lib/aws-sdk-js/
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/file/profile/identity::generated-documentation-page
    if:
      type: symbol
      kind: call
      exact: createReadStream
      arg:
        kind: string
        regex: '(?i)(^|[~/])\.aws[/\\]credentials$'

  - id: node-exfil-endpoint
    desc: Node exfil endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '["''`]/exfil(["''`/?#]|$)'
    unless:
      - id: well-known/app/qwen-code::qwen-code-bundle-text
  - id: node-bsd-password-stores
    desc: Node BSD password stores
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/master\.passwd[\s\S]{0,180}/etc/shadow'
  - id: node-root-ssh-targets
    desc: Node references root SSH authorized_keys paths
    crit: notable
    unless:
      - id: well-known/tool/offensive/pentestkit/
    conf: 0.94
    if:
      type: text
      regex: '/root/\.ssh[\s\S]{0,180}/root/\.ssh/authorized_keys'
  - id: node-browser-login-targets
    desc: Node browser login targets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Login Data[\s\S]{0,180}logins\.json'
  # Co-occurrence of the API_KEY/SECRET/TOKEN env-var names within a small
  # window. This is a weak fragment — ordinary config schemas/interfaces declare
  # exactly these fields — so it carries no standalone signal and is only
  # meaningful inside node-unix-secret-http-exfil (needs >=2 legs, including an
  # exfil endpoint). Component, not suspicious.
  - id: node-env-secret-filter
    desc: Co-occurring API_KEY/SECRET/TOKEN env names
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'API_KEY[\s\S]{0,120}SECRET[\s\S]{0,120}TOKEN'
  - id: node-http-collect-post
    desc: Node HTTP collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/api/v1/collect[\s\S]{0,400}POST'

composite_rules:
  - id: node-aws-credential-file-read
    desc: Node reads AWS credential file
    crit: suspicious
    conf: 0.94
    any:
      - id: node-aws-credential-readfile
      - id: node-aws-credential-open
      - id: node-aws-credential-stream
  - id: node-keychain-aws-exfil
    desc: Node keychain AWS exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-exfil-endpoint
    any:
      - id: objectives/credential-access/keychain/extract::dump-keychain
      - id: node-aws-credential-file-read
    needs: 1
  - id: node-unix-secret-http-exfil
    desc: Node Unix secret HTTP exfil
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: node-bsd-password-stores
      - id: node-root-ssh-targets
      - id: node-browser-login-targets
      - id: node-env-secret-filter
      - id: node-http-collect-post
      - id: node-exfil-endpoint
