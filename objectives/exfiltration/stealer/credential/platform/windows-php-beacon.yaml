defaults:
  platforms: [windows]
  for: [pe]
  attack: T1041
  mbc: B0030
traits:
  - id: ilog-php-endpoint
    desc: ilog.php beacon template
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /ilog.php?i=
  - id: log-php-uid-endpoint
    desc: log.php UID beacon template
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /log.php?uid=
  - id: fg-php-uid-endpoint
    desc: fg.php UID beacon template
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: fg.php?uid=
composite_rules:
  - id: php-stealer-beacon-templates
    desc: Multiple PHP beacon URI templates
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: ilog-php-endpoint
      - id: log-php-uid-endpoint
      - id: fg-php-uid-endpoint
  - id: browser-stealer-php-exfil
    desc: Browser stealer with PHP exfil templates
    crit: hostile
    conf: 0.98
    all:
      - id: fg-php-uid-endpoint
      - id: objectives/command-and-control/infrastructure/domain/malicious::php-log-dup
      - id: micro-behaviors/communications/http/request/client::user-agent-header
    any:
      - id: micro-behaviors/process/enumerate/apps::chrome-process-name
      - id: micro-behaviors/dylib/library/family::libcurl-ref
      - id: micro-behaviors/communications/http/post::url-encoded-content-type
      - id: micro-behaviors/communications/http/post::post-string-pe
    unless:
      - id: metadata/signed/platform/microsoft
