defaults:
  platforms: [unix]
  for: [shell]
  attack: T1552.001

traits:
  - id: shell-shadow-root-collection
    desc: Shell collects shadow root
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'cat /etc/shadow[\s\S]{0,220}ls -laR /root'

  - id: shell-ssh-key-copy-loop
    desc: Shell copies SSH keys
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'for keyfile in "\$HOME"/\.ssh/id_\*[\s\S]{0,180}cp "\$keyfile"'

  - id: shell-history-copy-loop
    desc: Shell copies shell history
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'for hist in "\$HOME"/\.bash_history "\$HOME"/\.zsh_history'

  - id: shell-cloud-browser-token-bundle
    desc: Shell bundles browser tokens
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Login Data[\s\S]{0,520}\.aws/credentials[\s\S]{0,520}\.docker/config\.json'

  - id: shell-package-token-bundle
    desc: Shell bundles package tokens
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.netrc[\s\S]{0,220}\.npmrc[\s\S]{0,220}\.pypirc'

composite_rules:
  - id: shell-local-secret-collector
    desc: Shell local secret collector
    crit: hostile
    conf: 0.98
    all:
      - id: shell-shadow-root-collection
      - id: shell-ssh-key-copy-loop
      - id: shell-history-copy-loop

  - id: shell-credential-bundle-collector
    desc: Shell credential bundle collector
    crit: hostile
    conf: 0.98
    all:
      - id: shell-cloud-browser-token-bundle
      - id: shell-package-token-bundle
    any:
      - id: shell-ssh-key-copy-loop
      - id: shell-history-copy-loop
