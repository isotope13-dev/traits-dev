defaults:
  platforms: [unix]
  for: [php]
  attack: T1041

traits:
  - id: php-unix-secret-file-list
    desc: PHP Unix secret file list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,260}\.ssh/id_rsa[\s\S]{0,260}\.docker/config\.json'

  - id: php-cloud-secret-key-list
    desc: PHP cloud secret key list
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'AWS_SECRET_ACCESS_KEY[\s\S]{0,260}GOOGLE_APPLICATION_CREDENTIALS'

  - id: php-generic-secret-key-list
    desc: PHP generic secret key list
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'TOKEN[\s\S]{0,180}API_KEY[\s\S]{0,180}SECRET'

  - id: php-curl-collect-post
    desc: PHP curl collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CURLOPT_URL[\s\S]{0,140}/collect[\s\S]{0,360}CURLOPT_POSTFIELDS'

  - id: php-raw-http-exfil-post
    desc: PHP raw HTTP exfil POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'POST /exfil HTTP/1\.1[\s\S]{0,260}application/octet-stream'

composite_rules:
  - id: php-unix-secret-curl-exfil
    desc: PHP Unix secret curl exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-unix-secret-file-list
      - id: php-curl-collect-post
    any:
      - id: php-cloud-secret-key-list
      - id: php-generic-secret-key-list

  - id: php-unix-secret-raw-http-exfil
    desc: PHP Unix raw HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-raw-http-exfil-post
    any:
      - id: php-unix-secret-file-list
      - id: php-cloud-secret-key-list
      - id: php-generic-secret-key-list
    needs: 1
