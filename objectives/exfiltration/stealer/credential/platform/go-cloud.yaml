defaults:
  platforms: [unix]
  for: [go, elf]
  attack: T1552.001

traits:
  - id: go-cloud-env-key-list
    desc: Go Azure env-name pair
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'AZURE_TENANT_ID[\s\S]{0,120}AZURE_CLIENT_SECRET'
    # Azure auth unit tests commonly set these names together to exercise the
    # default credential chain.  A test file is not an executable credential
    # collection path; keep the suspicious atom for production Go source.
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file

  - id: go-root-cloud-cred-files
    desc: Go root cloud cred files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/root/\.aws/credentials[\s\S]{0,220}/root/\.config/gcloud'

  - id: go-proc-environ-token-scan
    desc: Go proc environ token scan
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc", pid, "environ"[\s\S]{0,260}keyPattern\.MatchString'

  - id: go-postdata-credential
    desc: Go posts credential data
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'postData\(client, target, "credential"'

composite_rules:
  - id: go-cloud-env-credential-exfil
    desc: Go cloud env credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: go-cloud-env-key-list
      - id: go-postdata-credential
    any:
      - id: go-root-cloud-cred-files
      - id: go-proc-environ-token-scan
