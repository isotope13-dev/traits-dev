defaults:
  platforms: [unix]
  for: [go, elf]
  attack: T1552.001

traits:
  - id: go-root-cloud-cred-files
    desc: Go root cloud cred files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/root/\.aws/credentials[\s\S]{0,220}/root/\.config/gcloud'

  - id: go-proc-environ-token-scan
    desc: Go proc environ token scan
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc", pid, "environ"[\s\S]{0,260}keyPattern\.MatchString'

  - id: go-postdata-credential
    desc: Go posts credential data
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'postData\(client, target, "credential"'

composite_rules:
  - id: go-cloud-env-credential-exfil
    desc: Go cloud env credential exfil
    crit: hostile
    conf: 0.98
    for: [go]
    all:
      - id: micro-behaviors/os/env/vars/credentials::azure-tenant-client-secret-env-names
      - id: go-postdata-credential
    any:
      - id: go-root-cloud-cred-files
      - id: go-proc-environ-token-scan
  - id: go-binary-cloud-env-credential-exfil
    desc: Go binary cloud credential exfiltration
    crit: hostile
    conf: 0.98
    for: [elf]
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/os/env/vars/credentials::azure-tenant-client-secret-env-names
      - id: go-postdata-credential
    any:
      - id: go-root-cloud-cred-files
      - id: go-proc-environ-token-scan
