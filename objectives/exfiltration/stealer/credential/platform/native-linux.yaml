defaults:
  platforms: [unix]
  for: [c, elf]
  attack: T1041

traits:
  - id: native-linux-credential-file-list
    desc: Native Linux credential files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,260}/etc/ssh/ssh_host_rsa_key[\s\S]{0,260}/root/\.ssh/id_rsa'

  - id: native-linux-env-read
    desc: Native Linux environ read
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: /proc/self/environ

  - id: native-http-octet-post
    desc: Native HTTP octet POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'POST %s HTTP/1\.1[\s\S]{0,260}application/octet-stream'

composite_rules:
  - id: native-linux-credential-http-exfil
    desc: Native Linux credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-linux-credential-file-list
      - id: native-http-octet-post
    any:
      - id: native-linux-env-read
