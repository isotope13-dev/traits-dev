# Python Credential Exfiltration
# System profiler with credential targeting and HTTP exfiltration
# ATT&CK: T1555 (Credentials from Password Stores) + T1041
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  attack: "T1041"
traits:
- id: encoded-curl-archive-upload
  desc: Encoded curl archive upload
  crit: suspicious
  conf: 0.96
  platforms: [unix]
  if:
    type: encoded
    regex: 'curl["''][\s\S]{0,500}--data-binary["''][\s\S]{0,160}@\{[^}]{1,40}\}'
- id: encoded-aws-secret-collector
  desc: Encoded AWS secret collector
  crit: suspicious
  conf: 0.95
  platforms: [unix]
  if:
    type: encoded
    substr: AWS_CONTAINER_CREDENTIALS_RELATIVE_URI
- id: encoded-kubernetes-secret-collector
  desc: Encoded Kubernetes secret collector
  crit: suspicious
  conf: 0.95
  platforms: [unix]
  if:
    type: encoded
    regex: 'secrets/kubernetes\.io/serviceaccount/(token|ca\.crt|namespace)'
- id: encoded-package-secret-collector
  desc: Encoded package secret collector
  crit: suspicious
  conf: 0.95
  platforms: [unix]
  if:
    type: encoded
    regex: '\.docker/config\.json|\.pypirc|\.npmrc|\.netrc'
- id: b64-curl-data-binary-upload
  desc: Base64 curl data-binary upload
  crit: suspicious
  conf: 0.95
  platforms: [unix]
  if:
    type: text
    substr: LS1kYXRhLWJpbmFyeS
- id: b64-aws-container-credentials
  desc: Base64 AWS container credentials
  crit: suspicious
  conf: 0.95
  platforms: [unix]
  if:
    type: text
    substr: QVdTX0NPTlRBSU5FUl9DUkVERU5USUFM
- id: b64-kubernetes-serviceaccount
  desc: Base64 Kubernetes serviceaccount
  crit: suspicious
  conf: 0.95
  platforms: [unix]
  if:
    type: text
    substr: c2VjcmV0cy9rdWJlcm5ldGVzLmlvL3NlcnZpY2VhY2NvdW50
- id: b64-package-credential-files--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.93
  platforms: [unix]
  if:
    type: text
    substr: Lm5wbXJj
  count_max: 1019178
- id: b64-package-credential-files--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.93
  platforms: [unix]
  if:
    type: text
    substr: LnB5cGlyYw
  count_max: 1019179
- id: b64-package-credential-files--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.93
  platforms: [unix]
  if:
    type: text
    substr: Lm5ldHJj
  count_max: 1019180
- id: b64-package-credential-files--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.93
  platforms: [unix]
  if:
    type: text
    substr: LmRvY2tlci9jb25maWcuanNvbg
  count_max: 1019181
composite_rules:
- id: python-profiler
  desc: "System profiler with exfiltration"
  crit: suspicious
  conf: 0.90
  mbc: "B0028"
  attack: "T1555"
  needs: 2
  any:
  - id: objectives/credential-access/theft/stealer::system-info-with-browser
  - id: objectives/credential-access/theft/stealer::system-info-with-wallet
  all:
  - id: objectives/discovery/system/
  - id: objectives/exfiltration/http/
- id: encoded-cloud-secret-collector
  desc: Encoded cloud secret collector
  crit: suspicious
  conf: 0.96
  platforms: [unix]
  needs: 2
  any:
  - id: encoded-aws-secret-collector
  - id: encoded-kubernetes-secret-collector
  - id: encoded-package-secret-collector
- id: encoded-python-cloud-secret-exfil
  desc: Encoded Python cloud secret exfiltration
  crit: hostile
  conf: 0.98
  platforms: [unix]
  all:
  - id: encoded-curl-archive-upload
  - id: encoded-cloud-secret-collector
  any:
  - id: objectives/anti-static/obfuscation/payload/loader::py-base64-exec-inline
  - id: objectives/supply-chain/hidden-payload/imports::inline-base64-exec
  - id: objectives/anti-static/obfuscation/code-metrics/structure::single-long-line-outlier
- id: base64-python-cloud-secret-exfil
  desc: Base64 cloud secret upload
  crit: hostile
  conf: 0.98
  platforms: [unix]
  all:
  - id: b64-curl-data-binary-upload
  - id: objectives/anti-static/obfuscation/payload/loader::py-base64-exec-inline-any
  needs: 2
  any:
  - id: b64-aws-container-credentials
  - id: b64-kubernetes-serviceaccount
  - id: b64-package-credential-files
- id: base64-python-archive-upload
  desc: Base64 Python archive upload
  crit: hostile
  conf: 0.97
  platforms: [unix]
  all:
  - id: b64-curl-data-binary-upload
  - id: objectives/anti-static/obfuscation/payload/loader::py-base64-exec-inline-any
  - id: micro-behaviors/communications/url/encoded::https-b64-protocol-fragment
- id: b64-package-credential-files
  desc: Base64 package credential files
  crit: suspicious
  conf: 0.93
  platforms: [unix]
  any:
  - id: b64-package-credential-files--rx-1
  - id: b64-package-credential-files--rx-2
  - id: b64-package-credential-files--rx-3
  - id: b64-package-credential-files--rx-4
