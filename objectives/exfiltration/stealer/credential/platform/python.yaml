# Python Credential Exfiltration
# System profiler with credential targeting and HTTP exfiltration
# ATT&CK: T1555 (Credentials from Password Stores) + T1041
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  attack: "T1041"
composite_rules:
  - id: python-profiler
    desc: "System profiler with exfiltration"
    crit: suspicious
    conf: 0.90
    mbc: "B0028"
    attack: "T1555"
    needs: 2
    any:
      - id: objectives/credential-access/theft/stealer::system-info-with-browser
      - id: objectives/credential-access/theft/stealer::system-info-with-wallet
    all:
      - id: objectives/discovery/system/
      - id: objectives/exfiltration/http
