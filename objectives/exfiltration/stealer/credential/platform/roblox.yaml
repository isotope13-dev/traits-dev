# Roblox Cookie Exfiltration
# Roblox cookie theft with Discord webhook exfiltration
# ATT&CK: T1552.002 (Credentials in Registry) + T1567
defaults:
  platforms: [unix, windows, macos]
  attack: "T1567"
composite_rules:
  - id: roblox-stealer-indicators
    desc: Indicators of Roblox cookie theft
    crit: suspicious
    conf: 0.8
    any:
      - id: micro-behaviors/os/registry/keys::registry-access
      - id: micro-behaviors/data/text/parsing::parse-pattern
      - id: micro-behaviors/data/text/parsing::split-logic
  - id: exfil-indicators
    desc: Indicators of exfiltration
    crit: suspicious
    conf: 0.8
    any:
      - id: objectives/command-and-control/channel::discord-webhook-url
      - id: objectives/exfiltration/messaging::discord-exfiltration
  - id: registry-stealer
    desc: Steals Roblox cookies from Windows Registry and exfiltrates via Discord
    crit: hostile
    conf: 1.0
    attack: T1552.002
    all:
      - id: roblox-stealer-indicators
      - id: exfil-indicators
