# Roblox Cookie Exfiltration
# Roblox .ROBLOSECURITY session-cookie theft with Discord webhook exfiltration.
# Covers both the registry/COOK:: parsing variant and the file-based variant
# that reads %LOCALAPPDATA%\Roblox\LocalStorage\robloxcookies.dat.
# ATT&CK: T1539 (Steal Web Session Cookie) + T1567 (Exfil over Web Service)
defaults:
  platforms: [windows, macos]
  for: [python, pyc, scripts, binaries]
  attack: "T1567"
composite_rules:
  - id: roblox-cookie-source
    desc: Accesses a Roblox session-cookie store
    crit: suspicious
    conf: 0.85
    any:
      - id: micro-behaviors/os/registry/keys::registry-access
      - id: micro-behaviors/data/parse/analysis::parse-pattern
      - id: micro-behaviors/data/parse/analysis::split-logic
      - id: micro-behaviors/fs/path/sensitive/credentials::roblox-cookie-file
  - id: exfil-indicators
    desc: Indicators of Discord exfiltration
    crit: suspicious
    conf: 0.8
    any:
      - id: micro-behaviors/communications/http/webhook::discord-webhook-path-split
      - id: objectives/exfiltration/messaging/webhook::discord-exfiltration
  - id: roblox-cookie-stealer
    desc: Steals Roblox cookies and exfiltrates via Discord
    crit: hostile
    conf: 0.97
    attack: T1539
    all:
      - id: roblox-cookie-source
      - id: exfil-indicators
  - id: roblox-cookie-upload-exfiltration
    desc: Roblox cookie file uploaded to a file host
    crit: hostile
    conf: 0.96
    attack: "T1539,T1567"
    all:
      - id: micro-behaviors/fs/path/sensitive/credentials::roblox-cookie-file
      - id: micro-behaviors/communications/http/services/file-hosting::tmpfiles-org
    unless:
      - id: well-known/tool/detection/
