defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1041

traits:
  # Merely referencing the env-var NAME `AWS_SECRET_ACCESS_KEY` is done by every
  # AWS SDK/CLI wrapper and by secret-redaction/sanitizer code that strips it
  # from child environments — a notable credential-context capability, not theft
  # alone. Exfil intent is the composite (secret list + POST-to-URL together).
  - id: rust-cloud-secret-env-list
    desc: Rust references AWS secret env var name
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: AWS_SECRET_ACCESS_KEY

  - id: rust-platform-secret-files
    desc: Rust platform secret files
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\.aws/credentials[\s\S]{0,120}\.docker/config\.json'

  # `find-generic-password` is the standard macOS keychain READ used by every
  # CLI that stores/retrieves its own API keys (Security.framework) — a notable
  # credential-store capability, not theft alone. Exfil intent is the composite
  # (keychain read + collect/POST-to-URL together).
  - id: rust-keychain-find-password
    desc: "Rust reads macOS keychain"
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: find-generic-password

  - id: rust-ureq-collect-post
    desc: Rust ureq collect POST
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: ureq::post(&url)

  - id: rust-agent-collect-post
    desc: Rust agent collect POST
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: agent.post(&url)

  - id: rust-post-url-call
    desc: Rust post URL call
    crit: component
    conf: 0.94
    if:
      type: text
      substr: .post(&url)

  - id: rust-ingest-post
    desc: Rust ingest POST
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /ingest

  - id: rust-dump-keychain-command
    desc: Rust dump-keychain command
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: dump-keychain

  - id: rust-browser-login-query
    desc: Rust browser login query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SELECT origin_url, username_value

composite_rules:
  - id: rust-cloud-keychain-http-exfil
    desc: Rust cloud/keychain HTTP upload context
    crit: hostile
    conf: 0.98
    all:
      - id: rust-post-url-call
      - id: rust-ingest-post
    any:
      - id: rust-cloud-secret-env-list
      - id: rust-platform-secret-files
      - id: rust-keychain-find-password
    needs: 1

  - id: rust-ureq-keychain-http-exfil
    desc: Rust ureq keychain exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-ureq-collect-post
    any:
      - id: rust-cloud-secret-env-list
      - id: rust-platform-secret-files
      - id: rust-keychain-find-password
      - id: rust-dump-keychain-command
    needs: 1

  - id: rust-browser-credential-exfil
    desc: Rust browser credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-ureq-collect-post
      - id: rust-browser-login-query

  - id: rust-monitor-credential-exfil
    desc: Rust monitor credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-ingest-post
    any:
      - id: rust-keychain-find-password
      - id: rust-dump-keychain-command
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
    needs: 1
