defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1041

traits:
  - id: rust-platform-secret-files
    desc: Rust platform secret files
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\.aws/credentials[\s\S]{0,120}\.docker/config\.json'

  - id: rust-ureq-collect-post
    desc: Rust ureq collect POST
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: ureq::post(&url)

  - id: rust-agent-collect-post
    desc: Rust agent collect POST
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: agent.post(&url)

  - id: rust-post-url-call
    desc: Rust post URL call
    crit: component
    conf: 0.94
    if:
      type: text
      substr: .post(&url)

  - id: rust-dump-keychain-command
    desc: Rust dump-keychain command
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: dump-keychain

  - id: rust-browser-login-query
    desc: Rust browser login query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SELECT origin_url, username_value

composite_rules:
  - id: rust-cloud-keychain-http-exfil
    desc: Rust cloud/keychain HTTP upload context
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/lang/compiler/systems::rust-binary
      - id: rust-post-url-call
      - id: micro-behaviors/communications/http/endpoints::ingest-api-path
    any:
      - id: micro-behaviors/os/env/vars/credentials::aws-secret-access-key-var
      - id: rust-platform-secret-files
      - id: micro-behaviors/os/security/keychain::macos-keychain-generic-password-command-reference
    needs: 1

  - id: rust-ureq-keychain-http-exfil
    desc: Rust ureq keychain exfil
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/lang/compiler/systems::rust-binary
      - id: rust-ureq-collect-post
    any:
      - id: micro-behaviors/os/env/vars/credentials::aws-secret-access-key-var
      - id: rust-platform-secret-files
      - id: micro-behaviors/os/security/keychain::macos-keychain-generic-password-command-reference
      - id: rust-dump-keychain-command
    needs: 1

  - id: rust-browser-credential-exfil
    desc: Rust browser credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/lang/compiler/systems::rust-binary
      - id: rust-ureq-collect-post
      - id: rust-browser-login-query

  - id: rust-monitor-credential-exfil
    desc: Rust monitor credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/lang/compiler/systems::rust-binary
      - id: micro-behaviors/communications/http/endpoints::ingest-api-path
    any:
      - id: micro-behaviors/os/security/keychain::macos-keychain-generic-password-command-reference
      - id: rust-dump-keychain-command
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
    needs: 1
    unless:
      - id: well-known/app/microsoft-edge::microsoft-edge-package-context
