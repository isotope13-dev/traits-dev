defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1041

traits:
  - id: rust-cloud-secret-env-list
    desc: Rust cloud secret env list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: AWS_SECRET_ACCESS_KEY

  - id: rust-platform-secret-files
    desc: Rust platform secret files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.aws/credentials[\s\S]{0,120}\.docker/config\.json'

  - id: rust-keychain-find-password
    desc: Rust keychain find password
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: find-generic-password

  - id: rust-ureq-collect-post
    desc: Rust ureq collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ureq::post(&url)

  - id: rust-agent-collect-post
    desc: Rust agent collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: agent.post(&url)

  - id: rust-post-url-call
    desc: Rust post URL call
    crit: component
    conf: 0.94
    if:
      type: text
      substr: .post(&url)

  - id: rust-ingest-post
    desc: Rust ingest POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /ingest

  - id: rust-dump-keychain-command
    desc: Rust dump-keychain command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: dump-keychain

  - id: rust-browser-login-query
    desc: Rust browser login query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SELECT origin_url, username_value

composite_rules:
  - id: rust-cloud-keychain-http-exfil
    desc: Rust cloud keychain exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-post-url-call
    any:
      - id: rust-cloud-secret-env-list
      - id: rust-platform-secret-files
      - id: rust-keychain-find-password
    needs: 1

  - id: rust-ureq-keychain-http-exfil
    desc: Rust ureq keychain exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-ureq-collect-post
    any:
      - id: rust-cloud-secret-env-list
      - id: rust-platform-secret-files
      - id: rust-keychain-find-password
      - id: rust-dump-keychain-command
    needs: 1

  - id: rust-browser-credential-exfil
    desc: Rust browser credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-ureq-collect-post
      - id: rust-browser-login-query

  - id: rust-monitor-credential-exfil
    desc: Rust monitor credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-ingest-post
    any:
      - id: rust-keychain-find-password
      - id: rust-dump-keychain-command
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
    needs: 1
