defaults:
  platforms: [unix]
  for: [swift]
  attack: T1041

traits:
  - id: swift-master-passwd-path
    desc: Swift targets master.passwd
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/master.passwd

  - id: swift-git-credential-path
    desc: Swift targets Git credentials
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .git-credentials

  - id: swift-package-secret-paths
    desc: Swift targets package secrets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.cargo/credentials\.toml|\.gem/credentials'

  - id: swift-container-aws-paths
    desc: Swift targets cloud secrets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.docker/config\.json[\s\S]{0,220}aws/credentials'

  - id: swift-curl-form-collect-post
    desc: Swift curl form POST collect
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'curl[\s\S]{0,180}-X[\s\S]{0,40}POST[\s\S]{0,180}--form[\s\S]{0,180}/collect'

  - id: swift-filtered-env-secrets
    desc: Swift filters secret env vars
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'key\.contains\("key"\)[\s\S]{0,220}token[\s\S]{0,220}secret'
  - id: swift-lateral-exfil-path
    desc: Swift lateral exfil path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /lateral/exfil

composite_rules:
  - id: swift-bsd-credential-http-exfil
    desc: Swift BSD credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-master-passwd-path
      - id: swift-curl-form-collect-post
    any:
      - id: swift-git-credential-path
      - id: swift-package-secret-paths
      - id: swift-container-aws-paths
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
  - id: swift-bsd-credential-urlrequest-exfil
    desc: Swift BSD credential URL exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-master-passwd-path
      - id: objectives/exfiltration/http/upload::swift-urlrequest-collect-post
    any:
      - id: swift-git-credential-path
      - id: swift-package-secret-paths
      - id: swift-container-aws-paths
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys

  - id: swift-secret-env-http-exfil
    desc: Swift secret env HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-filtered-env-secrets
      - id: swift-lateral-exfil-path
