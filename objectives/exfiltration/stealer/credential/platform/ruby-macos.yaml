defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1041

traits:
  - id: ruby-discord-leveldb-path
    desc: Ruby Discord leveldb path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Local Storage", "leveldb

  - id: ruby-net-http-collect-post
    desc: Ruby Net::HTTP POST constructor
    crit: component
    conf: 0.94
    if:
      type: text
      substr: Net::HTTP::Post.new

  - id: ruby-ssh-key-collection
    desc: Ruby SSH key collection
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: collect_ssh_keys

composite_rules:
  - id: ruby-discord-keychain-exfil
    desc: Ruby Discord keychain exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-net-http-collect-post
    any:
      - id: ruby-discord-leveldb-path
      - id: objectives/credential-access/keychain/extract::dump-keychain
    needs: 1

  - id: ruby-keychain-ssh-harvest
    desc: Ruby keychain SSH harvest
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/keychain/extract::dump-keychain
      - id: ruby-ssh-key-collection
