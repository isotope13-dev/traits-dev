defaults:
  platforms: [unix]
  for: [java, class, jar]
  attack: T1552.001

traits:
  - id: java-db-config-path-list
    desc: Java DB config path list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/mysql/my\.cnf[\s\S]{0,260}/etc/postgresql[\s\S]{0,260}/etc/mongod\.conf'

  - id: java-secret-file-find-list
    desc: Java secret file find list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.npmrc[\s\S]{0,260}\.pypirc[\s\S]{0,260}\.kube/config[\s\S]{0,260}\.aws/credentials'

  - id: java-sensitive-file-list
    desc: Java sensitive file list
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,220}/etc/shadow[\s\S]{0,220}/root/\.ssh/id_rsa'

composite_rules:
  - id: java-db-and-secret-harvest
    desc: Java DB and secret harvest
    crit: hostile
    conf: 0.98
    all:
      - id: java-db-config-path-list
      - id: java-secret-file-find-list

  - id: java-sensitive-file-harvest
    desc: Java sensitive file harvest
    crit: hostile
    conf: 0.97
    all:
      - id: java-sensitive-file-list
    any:
      - id: java-secret-file-find-list
      - id: java-db-config-path-list
