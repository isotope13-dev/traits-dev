defaults:
  platforms: [unix]
  for: [go, elf]
  attack: T1041

traits:
  - id: go-system-secret-paths
    desc: Go system credential path references
    crit: component
    conf: 0.94
    count_min: 2
    for: [go]
    if:
      type: text
      regex: '/etc/(shadow|passwd|sudoers)'
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit/
      - id: well-known/tool/detection/clawker::source-tree
      - type: text
        substr: "--package-name=libc"

  - id: go-root-ssh-key-paths
    desc: Go root SSH key path list
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '/root/\.ssh/id_(rsa|ed25519)'

  - id: go-root-history-paths
    desc: Go root shell history paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/root/\.(bash|zsh|mysql)_history'

  - id: go-hidden-dir-file-stash
    desc: Go stashes files in hidden dir
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'filepath\.Join\(hiddenDir[\s\S]{0,160}os\.WriteFile'

  - id: go-file-exfil-tcp
    desc: Go sends files over TCP
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'net\.DialTimeout\("tcp"[\s\S]{0,420}FILE:%s:%d'

  - id: go-chrome-login-join
    desc: Go Chrome login path join
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: '"Chrome", "Default", "Login Data"'

  - id: go-http-collect-post
    desc: Go HTTP collect POST
    crit: suspicious
    conf: 0.94
    for: [go, elf, macho]
    if:
      type: text
      regex: 'NewRequest\("POST"[\s\S]{0,160}/collect'

  - id: go-macho-http-collect-url
    desc: Go Mach-O HTTP collect URL
    crit: suspicious
    conf: 0.94
    for: [macho]
    if:
      type: text
      substr: http://%s:8080/collect

composite_rules:
  - id: go-root-credential-path-list
    desc: Go root credential path list
    crit: suspicious
    conf: 0.95
    any:
      - id: go-system-secret-paths
      - id: go-root-ssh-key-paths
      - id: go-root-history-paths
    needs: 2

  - id: go-root-secret-tcp-exfil
    desc: Go root secret TCP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: go-root-credential-path-list
      - id: go-hidden-dir-file-stash
      - id: go-file-exfil-tcp

  - id: go-macos-credential-http-exfil
    desc: Go macOS credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: go-http-collect-post
    any:
      - id: go-chrome-login-join
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key-filename-enum
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
    needs: 1

  - id: go-root-credential-http-exfil
    desc: Go root credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: go-root-credential-path-list
    any:
      - id: go-http-collect-post
      - id: micro-behaviors/communications/http/endpoints::go-format-collect-url

  - id: go-master-passwd-http-exfil
    desc: Go master.passwd HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::go-format-collect-url
      - id: objectives/credential-access/files/config::native-master-passwd-read

  - id: go-macho-credential-http-exfil
    desc: Go Mach-O credential exfil
    crit: hostile
    conf: 0.98
    for: [macho]
    all:
      - id: go-macho-http-collect-url
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key-filename-enum
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
    needs: 1
