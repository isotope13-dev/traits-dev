defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1041

traits:
  - id: python-env-secret-key-list
    desc: Python env secret key list
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'AWS_ACCESS_KEY_ID[\s\S]{0,260}AWS_SECRET_ACCESS_KEY|DB_PASSWORD[\s\S]{0,260}SECRET_KEY'

  - id: python-ssh-secret-files
    desc: Python SSH secret files
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'id_rsa[\s\S]{0,180}id_ed25519[\s\S]{0,180}known_hosts[\s\S]{0,180}\.netrc'

  - id: python-json-request-call
    desc: Python JSON request call
    crit: component
    conf: 0.94
    if:
      type: text
      substr: urllib.request.Request

  - id: python-json-content-type
    desc: Python JSON content type
    crit: component
    conf: 0.94
    if:
      type: text
      substr: application/json

  - id: python-request-post-method
    desc: Python request POST method
    crit: component
    conf: 0.94
    if:
      type: text
      substr: method="POST"

composite_rules:
  - id: python-unix-secret-http-exfil
    desc: Python Unix secret exfil
    crit: hostile
    conf: 0.98
    all:
      - id: python-json-request-call
      - id: python-json-content-type
      - id: python-request-post-method
    any:
      - id: python-env-secret-key-list
      - id: python-ssh-secret-files
    needs: 1
