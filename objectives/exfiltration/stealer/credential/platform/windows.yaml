# Windows Credential Exfiltration
# Windows infostealer with registry harvest and HTTP exfiltration
# ATT&CK: T1113 + T1041
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1041"
  mbc: "C0014"
composite_rules:
  - id: windows-infostealer-registry-enum
    desc: Windows infostealer with registry harvest and process recon
    crit: hostile
    conf: 0.92
    all:
      - id: objectives/credential-access/browser/dpapi::crypt-unprotect-data
      - id: micro-behaviors/os/registry/access::reg-open-key-ex-w-symbol
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
    any:
      - id: micro-behaviors/communications/http/get::wininet-read-file-src
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/communications/http/get::wininet-http-flow
    unless:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
  - id: rust-dpapi-loader-stealer
    desc: Rust DPAPI stealer with loader tradecraft
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/credential-access/browser/dpapi::crypt-unprotect-data
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/communications/ipc/named-pipe::rust-anonymous-pipe-path
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    any:
      - id: micro-behaviors/os/exception/error-handling::add-vectored-exception-handler
      - id: objectives/evasion/masquerade/cert::fake-aptx-software-cert
      - id: objectives/evasion/masquerade/debug::office-java-decoy-pdbs
      - id: micro-behaviors/process/create/exec::cmd-exe-slash-c
    unless:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/signed/platform::microsoft
