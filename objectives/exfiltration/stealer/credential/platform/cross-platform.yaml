# Cross-Platform Credential Exfiltration
# Multi-wallet targeting with network exfiltration
# ATT&CK: T1005 (Data from Local System) + T1041
defaults:
  attack: "T1041"
  mbc: "B0028"
  platforms: [linux, unix, macos, windows, android, ios]
  for: [scripts, binaries]
composite_rules:
  - id: multi-wallet-network-stealer
    desc: Multi-wallet targeting with network exfil
    crit: hostile
    conf: 0.95
    attack: "T1005"
    all:
      - id: objectives/credential-access/wallet/desktop
        needs: 3
    any:
      - id: micro-behaviors/communications/http/download/curl
      - id: micro-behaviors/communications/socket/create
      - id: micro-behaviors/communications/http/request
    unless:
      - id: well-known/tools/detection/stng
