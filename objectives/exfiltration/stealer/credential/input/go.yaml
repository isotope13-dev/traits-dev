# Password Input Exfiltration - Go
# Password capture with HTTP exfiltration
# ATT&CK: T1056 (Input Capture) + T1041
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: "T1041"
composite_rules:
  - id: password-exfil-http
    desc: Password captured and sent via HTTP
    crit: hostile
    conf: 0.95
    mbc: E1056
    all:
      - id: objectives/credential-access/capture/input::password-reading
      - id: objectives/credential-access/capture/input::http-exfil-operation
