defaults:
  platforms: [windows, unix]
  for: [javascript, html]
  attack: T1041
traits:
  - id: js-emailjs-password-field
    desc: EmailJS send payload includes a password field
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'emailjs\.send\s*\([\s\S]{0,900}\buser_password\s*:\s*password\b'
  - id: js-emailjs-email-field
    desc: EmailJS send payload includes an email field
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'emailjs\.send\s*\([\s\S]{0,900}\buser_email\s*:\s*email\b'
  - id: js-emailjs-ip-field
    desc: EmailJS send payload includes IP metadata
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'emailjs\.send\s*\([\s\S]{0,900}\buser_ip\s*:\s*ipInfo\.ip\b'
composite_rules:
  - id: js-emailjs-credential-exfil
    desc: Password exfiltration through EmailJS
    crit: hostile
    conf: 0.98
    mbc: E1056
    all:
      - id: micro-behaviors/communications/http/services/emailjs::emailjs-send
      - id: js-emailjs-password-field
      - id: js-emailjs-email-field
    any:
      - id: js-emailjs-ip-field
      - id: objectives/discovery/host/geo::victim-profiling
