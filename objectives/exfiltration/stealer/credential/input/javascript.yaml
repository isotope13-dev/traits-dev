defaults:
  platforms: [windows, unix]
  for: [javascript, html]
  attack: T1041
traits:
  - id: js-emailjs-password-field
    desc: EmailJS sends password field
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "user_password: password"
  - id: js-emailjs-email-field
    desc: EmailJS sends email field
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "user_email: email"
  - id: js-emailjs-ip-field
    desc: EmailJS sends IP metadata
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "user_ip: ipInfo.ip"
composite_rules:
  - id: js-emailjs-credential-exfil
    desc: Password exfiltration through EmailJS
    crit: hostile
    conf: 0.98
    mbc: E1056
    all:
      - id: micro-behaviors/communications/http/services::emailjs-send
      - id: js-emailjs-password-field
      - id: js-emailjs-email-field
    any:
      - id: js-emailjs-ip-field
      - id: objectives/discovery/host/geo::victim-profiling
