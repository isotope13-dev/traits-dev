defaults:
  platforms: [qnx, unix]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: qnx-node-ssh-system-targets
    desc: QNX Node SSH/system targets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'id_ed25519[\s\S]{0,500}/etc/shadow'

  - id: qnx-node-qnx-secret-targets
    desc: QNX Node QNX secret targets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/qnx/etc/passwd[\s\S]{0,260}/etc/qssl/certs'

  - id: qnx-node-multipart-ingest
    desc: QNX Node multipart ingest
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "----ExfilBoundary"

composite_rules:
  - id: qnx-node-credential-multipart-exfil
    desc: QNX Node credential multipart exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-ssh-system-targets
      - id: qnx-node-qnx-secret-targets
      - id: qnx-node-multipart-ingest
