defaults:
  platforms: [panos, appliance, unix]
  for: [python]
  attack: T1041

traits:
  - id: python-panos-gather-ssh-creds
    desc: Python PAN-OS gather SSH creds
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: gather_ssh_credentials

  - id: python-panos-ssh-forward-api
    desc: Python PAN-OS SSH forward API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/ssh/forward

composite_rules:
  - id: python-panos-ssh-credential-exfil
    desc: Python PAN-OS SSH cred exfil
    crit: hostile
    conf: 0.98
    all:
      - id: python-panos-gather-ssh-creds
      - id: python-panos-ssh-forward-api
