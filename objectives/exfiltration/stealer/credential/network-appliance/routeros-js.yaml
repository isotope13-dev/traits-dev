defaults:
  platforms: [routeros, appliance]
  for: [javascript]
  attack: T1041

traits:
  - id: routeros-js-ppp-secret-query
    desc: RouterOS JS PPP secret query
    crit: suspicious
    conf: 0.93
    if:
      type: string_literal
      exact: /ppp/secret/print

  - id: routeros-js-wireguard-key-query
    desc: RouterOS JS WireGuard key query
    crit: suspicious
    conf: 0.93
    if:
      type: string_literal
      exact: /interface/wireguard/keys/print

  - id: routeros-js-user-manager-query
    desc: RouterOS JS user manager query
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/user-manager/(database/)?print'

  - id: routeros-js-radius-query
    desc: RouterOS JS RADIUS query
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/radius/(profile/)?print'

  - id: routeros-js-certificate-list-call
    desc: RouterOS JS certificate list call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: getCertificateList

  - id: routeros-js-user-profile-call
    desc: RouterOS JS user profile call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: getUserManagerProfiles

  - id: routeros-js-flash-ssh-path
    desc: RouterOS JS flash SSH path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /flash/ssh/

composite_rules:
  - id: routeros-js-secret-query-set
    desc: RouterOS JS secret query set
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: routeros-js-ppp-secret-query
      - id: routeros-js-wireguard-key-query
      - id: routeros-js-user-manager-query
      - id: routeros-js-radius-query
      - id: routeros-js-certificate-list-call
      - id: routeros-js-user-profile-call
      - id: routeros-js-flash-ssh-path

  - id: routeros-js-secret-http-exfil
    desc: RouterOS JS secret HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-js-secret-query-set
    any:
      - id: micro-behaviors/communications/http/post::http-post-call
      - id: micro-behaviors/communications/http/post::post-request-line
