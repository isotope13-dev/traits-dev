defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, javascript]
  attack: T1552

traits:
  - id: routeros-user-database-read
    desc: RouterOS user database read
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/user (print|get|find|count)'

  - id: routeros-sensitive-config-export
    desc: RouterOS sensitive config export
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(/export show-sensitive|/user print show-sensitive|wireless security-profiles)'

  - id: routeros-user-dump-variable
    desc: RouterOS user dump variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(creds_dump|userDump|userList)'

composite_rules:
  - id: routeros-user-db-http-exfil
    desc: RouterOS user DB HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-user-database-read
      - id: routeros-user-dump-variable
      - id: objectives/exfiltration/stealer/host-profile/router-api::routeros-fetch-collect-url

  - id: routeros-sensitive-config-http-exfil
    desc: RouterOS sensitive config exfil
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-sensitive-config-export
      - id: objectives/exfiltration/stealer/host-profile/router-api::routeros-http-data-upload
