defaults:
  platforms: [appliance, unix]
  for: [c, cpp, objc, elf]
  attack: T1552.001

traits:
  - id: vxworks-system-config-path
    desc: VxWorks system config path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/vxWorks

  - id: native-exfil-passwd-shadow
    desc: Native passwd shadow exfil
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\b(EXFIL|FILE)\|(passwd|shadow)\b'

  - id: native-exfil-env-version
    desc: Native environ version exfil
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\b(EXFIL|FILE)\|(environ|version|vxworks)\b'

  - id: native-sensitive-file-labels
    desc: Native sensitive file labels
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"shadow"[\s\S]{0,180}"passwd"[\s\S]{0,360}"vxworks"'

composite_rules:
  - id: vxworks-config-socket-exfil
    desc: VxWorks config socket exfil
    crit: hostile
    conf: 0.98
    all:
      - id: vxworks-system-config-path
      - id: micro-behaviors/communications/socket/send::send
    any:
      - id: native-exfil-passwd-shadow
      - id: native-exfil-env-version
      - id: native-sensitive-file-labels
