defaults:
  platforms: [routeros, appliance, unix]
  for: [rust, elf]
  attack: T1041

traits:
  - id: rust-rw-config-backup-path
    desc: Rust RouterOS rw backup path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /rw/config/back

  - id: rust-dot-config-backup-rsc
    desc: Rust RouterOS backup rsc
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /.config/backup.rsc

  - id: rust-routeros-api-token-path
    desc: Rust RouterOS API token path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /.routeros/api-token

  - id: rust-unix-secret-path-bundle
    desc: Rust Unix secret path bundle
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,260}/root/\.ssh/(id_rsa|authorized_keys)'

  - id: rust-cache-data-credential-stash
    desc: Rust cache credential stash
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.cache_data

composite_rules:
  - id: rust-routeros-config-secret-paths
    desc: Rust RouterOS secret paths
    crit: suspicious
    conf: 0.92
    any:
      - id: rust-rw-config-backup-path
      - id: rust-dot-config-backup-rsc
      - id: rust-routeros-api-token-path

  - id: rust-routeros-credential-exfil
    desc: Rust RouterOS credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-routeros-config-secret-paths
      - id: rust-unix-secret-path-bundle
    any:
      - id: rust-cache-data-credential-stash
      - id: objectives/exfiltration/stealer/host-profile/router-api::rust-routeros-collect-path
    needs: 1
