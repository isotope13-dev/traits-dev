defaults:
  platforms: [routeros, appliance]
  for: [python, pyc]
  attack: T1041

composite_rules:
  - id: routeros-api-credential-http-exfil
    desc: RouterOS API credential HTTP exfil
    crit: hostile
    conf: 0.98
    any:
      - id: objectives/credential-access/dump/system::routeros-api-user-credential-dump
      - id: objectives/credential-access/dump/system::routeros-api-key-credential-dump
      - id: objectives/credential-access/vpn/config::routeros-api-vpn-secret-query-set
    needs: 1
    all:
      - id: micro-behaviors/communications/http/post::python-base64-json-body

  - id: routeros-api-credential-requests-exfil
    desc: RouterOS API credential requests exfil
    crit: hostile
    conf: 0.98
    any:
      - id: objectives/credential-access/dump/system::routeros-api-user-credential-dump
      - id: objectives/credential-access/vpn/config::routeros-api-vpn-secret-query-set
    needs: 1
    all:
      - id: micro-behaviors/communications/http/request/client::requests-post-json-payload
