defaults:
  platforms: [netscaler, appliance, unix]
  for: [scripts, binaries, go, java, kotlin, csharp, swift]
  attack: T1041

traits:
  - id: netscaler-nsconfig-path
    desc: NetScaler ns.conf path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/(flash/)?ns_?config/(running/)?ns\.conf\b'

  - id: netscaler-ssl-material-path
    desc: NetScaler SSL material path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/nsconfig/ssl/.{1,80}\.(pem|key)\b'

  - id: netscaler-license-path
    desc: NetScaler license file path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /nsconfig/license.dat

  - id: netscaler-systemuser-api-path
    desc: NetScaler systemuser API path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /nitro/v1/config/systemuser

  - id: netscaler-credential-db-path
    desc: NetScaler credential DB path
    crit: suspicious
    conf: 0.92
    for: [java, kotlin, class, jar]
    if:
      type: text
      regex: '\.netscaler/(credentials|data)\.db'

  - id: netscaler-credential-sql-query
    desc: NetScaler credential SQL query
    crit: suspicious
    conf: 0.92
    for: [java, kotlin, class, jar]
    if:
      type: text
      regex: 'SELECT .{0,80}(username|password|credentials)'

  - id: netscaler-config-read-source
    desc: NetScaler source config read
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(slurp|io\.open|File\.read)[\s\S]{0,120}/(flash/)?ns_?config'

  - id: netscaler-config-read-native
    desc: NetScaler native config read
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(os\.ReadFile|Get-Content|fopen)[\s\S]{0,120}/(flash/)?ns_?config'

  - id: netscaler-collect-http-path
    desc: NetScaler collect HTTP path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'netscaler[\s\S]{0,220}/collect'

  - id: netscaler-exfil-api-agent
    desc: NetScaler exfil API agent
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/api/v1/exfil[\s\S]{0,120}(AgentId|netscaler|NetScaler)'

  - id: netscaler-data-chunk-header
    desc: NetScaler data chunk header
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: X-Data-Chunk

  - id: netscaler-dns-exfil-label
    desc: NetScaler DNS exfil label
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: .exfil.

  - id: jvm-netscaler-db-bytecode
    desc: JVM NetScaler DB bytecode
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: raw
      regex: 'netscaler\.db[\s\S]{0,999}SELECT name, value FROM credentials'

composite_rules:
  - id: netscaler-config-secret-access
    desc: NetScaler config secret access
    crit: hostile
    conf: 0.97
    all:
      - id: netscaler-nsconfig-path
    any:
      - id: netscaler-ssl-material-path
      - id: netscaler-license-path
      - id: netscaler-systemuser-api-path
      - id: netscaler-config-read-source
      - id: netscaler-config-read-native

  - id: netscaler-jvm-credential-db-exfil
    desc: NetScaler JVM credential DB exfil
    crit: hostile
    conf: 0.98
    for: [java, kotlin, class, jar]
    all:
      - id: netscaler-credential-db-path
      - id: netscaler-credential-sql-query
    any:
      - id: objectives/exfiltration/dns/tunnel::jvm-netscaler-dns-exfil
      - id: netscaler-exfil-api-agent

  - id: jvm-netscaler-db-credential-exfil
    desc: JVM NetScaler DB credential exfil
    crit: hostile
    conf: 0.97
    for: [class, jar]
    all:
      - id: jvm-netscaler-db-bytecode
      - id: objectives/exfiltration/dns/tunnel::jvm-netscaler-dns-bytecode

  - id: netscaler-config-http-exfil
    desc: NetScaler config HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-nsconfig-path
    any:
      - id: netscaler-collect-http-path
      - id: netscaler-exfil-api-agent
      - id: netscaler-data-chunk-header

  - id: netscaler-config-dns-exfil
    desc: NetScaler config DNS exfil
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-nsconfig-path
      - id: netscaler-dns-exfil-label
    any:
      - id: micro-behaviors/data/encode/payload::printf-hex-byte-format
      - id: netscaler-ssl-material-path
