defaults:
  platforms: [netscaler, appliance, unix]
  for: [perl]
  attack: T1552

traits:
  - id: perl-nsconfig-credential-paths
    desc: Perl nsconfig credential paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/nsconfig/(ns\.conf|nsrootkey|license\.lic)'

  - id: perl-credential-collect-sub
    desc: Perl credential collect sub
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: sub extract_netscaler_creds

  - id: perl-http-collect-exfil
    desc: Perl HTTP collect exfil
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: POST => "http://$TARGET_HOST/collect"

composite_rules:
  - id: perl-netscaler-credential-exfil
    desc: Perl NetScaler credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: perl-nsconfig-credential-paths
      - id: perl-credential-collect-sub
    any:
      - id: perl-http-collect-exfil
