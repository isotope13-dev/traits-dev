# AppleScript Credential Exfiltration
# Credential variable detection with network activity
# ATT&CK: T1555 (Credentials from Password Stores) + T1041
defaults:
  for: [applescript]
  platforms: [macos]
  attack: "T1041"
composite_rules:
  - id: credential-exfil
    desc: "Credentials with network activity"
    crit: hostile
    conf: 0.85
    all:
      - id: objectives/credential-access/capture/variable-scan::handles-passwords
    any:
      - id: micro-behaviors/communications/http/url/build::url-variable
      - id: micro-behaviors/communications/http/url/build::server-variable
      - id: 'micro-behaviors/process/create/shell/spawn::shell-execution'
