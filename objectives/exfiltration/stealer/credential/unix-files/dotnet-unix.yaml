defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1041

traits:
  - id: dotnet-unix-account-files
    desc: .NET Unix account files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,120}/etc/shadow'
    unless:
      - id: well-known/app/aks-engine/

  - id: dotnet-passwd-path-text
    desc: .NET passwd path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /etc/passwd
    unless:
      - id: well-known/tool/sysadmin/cdrtools/
      - id: well-known/app/aks-engine/

  - id: dotnet-shadow-path-text
    desc: .NET shadow path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /etc/shadow
    unless:
      - id: well-known/app/aks-engine/

  - id: dotnet-http-octet-post
    desc: .NET HTTP octet POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'HttpWebRequest[\s\S]{0,220}application/octet-stream'

composite_rules:
  - id: dotnet-passwd-path
    desc: .NET passwd path
    crit: suspicious
    conf: 0.9
    all:
      - id: dotnet-passwd-path-text
      - id: metadata/binary/framework::clr-runtime-header

  - id: dotnet-shadow-path
    desc: .NET shadow path
    crit: suspicious
    conf: 0.9
    all:
      - id: dotnet-shadow-path-text
      - id: metadata/binary/framework::clr-runtime-header

  - id: dotnet-unix-account-http-exfil
    desc: .NET Unix account HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-unix-account-files
      - id: micro-behaviors/communications/http/upload::credential-collection-upload-path
    any:
      - id: dotnet-http-octet-post
      - id: objectives/exfiltration/stealer/credential/http::csharp-http-exfil-endpoint

  - id: dotnet-pe-account-http-exfil
    desc: .NET PE account HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-passwd-path
      - id: dotnet-shadow-path
      - id: micro-behaviors/communications/http/upload::credential-collection-upload-path
    unless:
      - id: well-known/app/aks-engine/
    any:
      - id: dotnet-http-octet-post
      - id: objectives/exfiltration/stealer/credential/http::csharp-http-exfil-endpoint

  - id: dotnet-account-collect-exfil
    desc: .NET account collect exfil
    crit: hostile
    conf: 0.97
    all:
      - id: dotnet-passwd-path
      - id: dotnet-shadow-path
      - id: micro-behaviors/communications/http/upload::credential-collection-upload-path
    unless:
      - id: well-known/app/aks-engine/
