defaults:
  platforms: [unix]
  for: [java, kotlin, class, java_class, jar]
  attack: T1041

traits:
  - id: jvm-unix-secret-file-set
    desc: JVM Unix secret file set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,180}/etc/shadow'

  - id: jvm-home-credential-files
    desc: JVM home credential files
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.ssh/id_rsa[\s\S]{0,220}\.pgpass'

  - id: jvm-sensitive-dump-path
    desc: JVM sensitive dump path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.sensitive_data

  - id: jvm-bulk-config-secret-scan
    desc: JVM bulk config secret scan
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.aws/credentials[\s\S]{0,260}\.docker/config\.json[\s\S]{0,260}\.npmrc'

  - id: jvm-env-secret-key-filter
    desc: JVM env secret key filter
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: 'PASSWORD[\s\S]{0,180}TOKEN[\s\S]{0,180}API_KEY'

  - id: jvm-hex-unix-account-paths
    desc: JVM hex Unix account paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '2F6574632F706173737764[\s\S]{0,160}2F6574632F736861646F77'

  - id: jvm-hex-unix-account-paths-bytes
    desc: JVM hex Unix account bytes
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 32 46 36 35 37 34 36 33 32 46 37 30 36 31 37 33 37 33 37 37 36 34

composite_rules:
  - id: jvm-unix-secret-http-exfil
    desc: JVM Unix secret HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-unix-secret-file-set
    any:
      - id: jvm-sensitive-dump-path
      - id: objectives/exfiltration/stealer/host-profile/http::jvm-collect-octet-post

  - id: jvm-home-credential-http-exfil
    desc: JVM home credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-home-credential-files
      - id: objectives/exfiltration/stealer/host-profile/http::jvm-collect-octet-post

  - id: jvm-config-secret-http-exfil
    desc: JVM config secret HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-bulk-config-secret-scan
      - id: objectives/exfiltration/stealer/host-profile/http::jvm-collect-octet-post

  - id: jvm-env-secret-http-exfil
    desc: JVM env secret HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-env-secret-key-filter
      - id: objectives/exfiltration/stealer/host-profile/http::jvm-collect-octet-post

  - id: jvm-hex-unix-account-ftp-exfil
    desc: JVM hex account FTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-hex-unix-account-paths
      - id: objectives/exfiltration/ftp::kotlin-ftp-hex-pasv-stor

  - id: jvm-bytecode-account-ftp-exfil
    desc: JVM bytecode account FTP exfil
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-hex-unix-account-paths-bytes
      - id: objectives/exfiltration/ftp::kotlin-ftp-pasv-stor-hex
