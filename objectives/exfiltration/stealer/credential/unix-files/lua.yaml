defaults:
  platforms: [routeros, appliance, unix]
  for: [lua]
  attack: T1041

traits:
  - id: lua-ssh-private-key-path
    desc: Lua SSH private key path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /root/.ssh/id_rsa

  - id: lua-shell-history-path
    desc: Lua shell history path
    crit: component
    conf: 0.85
    if:
      type: text
      substr: /root/.bash_history

  - id: lua-curl-data-post
    desc: Lua curl data POST
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'curl -s -m 10 -d .{0,90}-X POST'

composite_rules:
  - id: lua-unix-secret-path-set
    desc: Lua Unix secret path set
    crit: suspicious
    conf: 0.92
    any:
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: lua-ssh-private-key-path
      - id: lua-shell-history-path
    needs: 2

  - id: lua-unix-secret-http-exfil
    desc: Lua Unix secret HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: lua-unix-secret-path-set
      - id: lua-curl-data-post
      - id: objectives/command-and-control/backdoor/tasking/poll::lua-http-result-post-path
