defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: node-passwd-shadow-read
    desc: Node passwd shadow read
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,220}/etc/shadow'

  - id: node-state-exfil-post
    desc: Node state exfil POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "postToC2\\('/api/state'[\\s\\S]{0,120}payload\\)"

  - id: node-shadow-discovery-post
    desc: Node shadow discovery POST
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'postC2\(`discovery:[\s\S]{0,260}info\.shadow'

composite_rules:
  - id: node-passwd-shadow-http-exfil
    desc: Node passwd shadow HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-passwd-shadow-read
    any:
      - id: node-state-exfil-post
      - id: node-shadow-discovery-post
      - id: micro-behaviors/communications/http/post::post-request-line
