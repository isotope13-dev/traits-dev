defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: node-passwd-path-reference
    desc: Node references passwd file path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /etc/passwd
  - id: node-shadow-path-reference
    desc: Node references shadow file path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /etc/shadow
  - id: node-state-exfil-post
    desc: Node posts application state
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "postToC2\\('/api/state'[\\s\\S]{0,120}payload\\)"
  - id: node-shadow-discovery-post
    desc: Node posts shadow discovery data
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'postC2\\(`discovery:[\\s\\S]{0,260}info\\.shadow'
composite_rules:
  - id: node-passwd-shadow-read
    desc: Node reads passwd and shadow files
    crit: suspicious
    unless:
      - id: well-known/tool/offensive/pentestkit::local-storage-panel
      - id: well-known/app/freddie::benign-archive-context
    conf: 0.92
    near_bytes: 512
    all:
      - id: node-passwd-path-reference
      - id: node-shadow-path-reference
      - id: micro-behaviors/fs/file/read::read-node

  - id: node-passwd-shadow-http-exfil
    desc: Node passwd shadow HTTP exfil
    crit: hostile
    unless:
      - id: well-known/tool/offensive/pentestkit/
    conf: 0.98
    all:
      - id: node-passwd-shadow-read
    any:
      - id: node-state-exfil-post
      - id: node-shadow-discovery-post
      - id: micro-behaviors/communications/http/post::post-request-line
  - id: node-passwd-shadow-curl-exfil
    desc: Node passwd shadow curl exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-passwd-shadow-read
      - id: objectives/exfiltration/stealer/file::js-shell-curl-file-exfil
