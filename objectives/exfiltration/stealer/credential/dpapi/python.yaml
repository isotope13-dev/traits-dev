# DPAPI credential stealer
# Decrypting a DPAPI-sealed secret (win32crypt.CryptUnprotectData) and then
# shipping the cleartext to an attacker-controlled Discord webhook is a complete
# steal-and-send chain with no legitimate use.
# ATT&CK: T1555.003 (Credentials from Web Browsers) + T1567 (Exfil over Web Service)
defaults:
  for: [python, source]
  platforms: [windows]
composite_rules:
  - id: dpapi-webhook-stealer
    desc: DPAPI-decrypted secret exfiltrated to Discord
    crit: hostile
    conf: 0.95
    attack: T1567.002
    all:
      - id: objectives/credential-access/browser/dpapi::python-dpapi-unprotect
      - id: micro-behaviors/communications/http/webhook::discord-webhook-path-split
