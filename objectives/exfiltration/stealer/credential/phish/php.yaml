defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1041

traits:
  - id: php-post-password-fields
    desc: PHP captures password POST fields
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\$_POST\[[''"](pass|password|cpass|epass)[''"]\]'
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: well-known/app/postfixadmin::postfixadmin-source-path
      - id: well-known/app/packetfence::source-tree-path
      - id: well-known/app/wordpress-plugins::known-wordpress-plugin
  - id: php-post-card-number-fields
    desc: PHP captures card number POST fields
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\$_POST\[[''"](ccnum|cardnum|cctype)[''"]\]'
  - id: php-post-card-secret-fields
    desc: PHP captures card CVV POST fields
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\$_POST\[[''"](cvv1|cvv|cvc)[''"]\]'
  - id: php-card-dump-result-file
    desc: PHP writes card dump result file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'fopen\s*\(\s*["'']resultat\.txt["'']\s*,\s*["'']a["'']\s*\)'
  - id: php-card-info-mail-subject
    desc: PHP mails captured card information
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'mail\s*\([\s\S]{0,180}Card info'
  - id: php-three-ds-password-field
    desc: PHP captures 3DS password field
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\$_POST\[[''"](tdpassword|3dpassword|vbvpass)[''"]\]'
  - id: php-post-challenge-response-fields
    desc: PHP captures challenge responses
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\$_POST\[[''"](Challenge[0-9]+|Response[0-9]+)[''"]\]'
  - id: php-phish-result-banner
    desc: PHP phishing result banner
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)=ReZulT=|Online User ID:|Confirm Password:'
  - id: php-redirects-after-capture
    desc: PHP redirects after capture
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)header\s*\(\s*["'']Location:\s*https?://'
    unless:
      - id: metadata/file/magic/identity::php-archive

composite_rules:
  - id: php-mail-credential-phish
    desc: PHP mails captured credentials
    crit: hostile
    conf: 0.98
    all:
      - id: php-post-password-fields
      - id: micro-behaviors/communications/email/send/mail-func::mail-call
    any:
      - id: php-post-challenge-response-fields
      - id: php-phish-result-banner
  - id: php-redirecting-credential-phish
    desc: PHP credential phish redirect
    crit: hostile
    conf: 0.96
    all:
      - id: php-post-password-fields
      - id: php-redirects-after-capture
    any:
      - id: php-post-challenge-response-fields
      - id: php-phish-result-banner
  - id: php-card-mail-phish
    desc: PHP mails captured payment card data
    crit: hostile
    conf: 0.98
    all:
      - id: php-post-card-number-fields
      - id: php-post-card-secret-fields
      - id: php-card-info-mail-subject
      - id: micro-behaviors/communications/email/send/mail-func::mail-call
    any:
      - id: php-post-password-fields
      - id: php-three-ds-password-field
      - id: objectives/credential-access/financial/credit-card::credit-card-form-fields
  - id: php-card-filedump-phish
    desc: PHP stores captured payment card data
    crit: hostile
    conf: 0.97
    all:
      - id: php-post-card-number-fields
      - id: php-post-card-secret-fields
      - id: php-card-dump-result-file
    any:
      - id: php-post-password-fields
      - id: php-three-ds-password-field
      - id: objectives/credential-access/financial/credit-card::credit-card-form-fields
