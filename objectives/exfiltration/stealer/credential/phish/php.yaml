defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1041

traits:
  - id: php-post-password-fields
    desc: PHP captures password POST fields
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\$_POST\[[''"](pass|password|cpass|epass)[''"]\]'
  - id: php-post-challenge-response-fields
    desc: PHP captures challenge responses
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\$_POST\[[''"](Challenge[0-9]+|Response[0-9]+)[''"]\]'
  - id: php-phish-result-banner
    desc: PHP phishing result banner
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)=ReZulT=|Online User ID:|Confirm Password:'
  - id: php-redirects-after-capture
    desc: PHP redirects after capture
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)header\s*\(\s*["'']Location:\s*https?://'
    unless:
      - id: metadata/file/magic/identity::php-archive

composite_rules:
  - id: php-mail-credential-phish
    desc: PHP mails captured credentials
    crit: hostile
    conf: 0.98
    all:
      - id: php-post-password-fields
      - id: micro-behaviors/communications/email/send/mail-func::mail-call
    any:
      - id: php-post-challenge-response-fields
      - id: php-phish-result-banner
  - id: php-redirecting-credential-phish
    desc: PHP credential phish redirect
    crit: hostile
    conf: 0.96
    all:
      - id: php-post-password-fields
      - id: php-redirects-after-capture
    any:
      - id: php-post-challenge-response-fields
      - id: php-phish-result-banner
