defaults:
  platforms: [panos, appliance, unix]
  for: [shell]
  attack: T1041

traits:
  - id: shell-panos-env-fingerprint-post
    desc: Shell PAN-OS env fingerprint POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /env-fingerprint

  - id: shell-panos-env-base64-dump
    desc: Shell PAN-OS env base64 dump
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: env | sort | base64 -w0

composite_rules:
  - id: shell-panos-env-http-exfil
    desc: Shell PAN-OS env HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-panos-env-fingerprint-post
      - id: shell-panos-env-base64-dump
