defaults:
  platforms:
    - unix
    - windows
    - macos
composite_rules:
  - id: curl-with-file-targeting
    desc: HTTP client with sensitive file target
    crit: hostile
    conf: 0.95
    attack: T1041
    mbc: B0030
    for: [binaries, scripts]
    all:
      - id: micro-behaviors/communications/http/download/curl::libcurl-http
    any:
      - id: sensitive-file-targeting
    downgrade:
      any:
        - id: metadata/binary/installer/script/
        - id: metadata/binary/vendor::is-microsoft-named
    unless:
      - id: well-known/tool/dual-use/licensing/
  - id: macos-file-copy-exfil
    desc: macOS file copying with sensitive-file network context
    crit: suspicious
    conf: 0.9
    attack: T1041
    platforms:
      - macos
    for:
      - macho
    all:
      - id: micro-behaviors/fs/file/binary::fcopyfile-macos
      - id: sensitive-file-targeting
    any:
      - id: micro-behaviors/communications/http/download/curl::libcurl-http
      - id: micro-behaviors/communications/socket/create/
    unless:
      - id: micro-behaviors/dylib/library/family/
      - id: well-known/lib/jvm::runtime-network-library-basename
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/lang/compiler/systems/
  - id: sensitive-file-targeting
    desc: Sensitive file target selection
    crit: notable
    conf: 0.92
    for: [binaries, scripts]
    any:
      - id: objectives/collection/file-targeting/filter::credential-files
      - id: objectives/collection/file-targeting/filter::wallet-files
      - id: objectives/collection/file-targeting/filter::dense-extension-list
    unless:
      - id: well-known/app/kilocode::kilo-code-js-bundle
      - id: objectives/credential-access/browser/dpapi::dpapi-usage
      - id: objectives/credential-access/browser/multi-target::composite
      - id: objectives/credential-access/browser/multi-target::native-dpapi-browser-collector
      - id: objectives/impact/cryptojacking/miner/signatures::wallet-ref
      - id: micro-behaviors/crypto/library/blockchain/
  - id: recursive-file-theft
    desc: Recursive directory scan with file
    crit: hostile
    conf: 0.95
    attack: T1005
    mbc: B0030
    for: [binaries, scripts]
    all:
      - id: micro-behaviors/fs/directory/traverse::recursive-directory-traversal
      - id: sensitive-file-targeting
    any:
      - id: micro-behaviors/communications/http/download/curl::libcurl-http
      - id: micro-behaviors/communications/socket/create/
    unless:
      - id: micro-behaviors/dylib/library/family/
      - id: micro-behaviors/dylib/library/family/
      - id: micro-behaviors/dylib/library/family/
      - id: metadata/signed/platform::apple
      - id: metadata/signed/id::com.apple.xpc.launchd
      - id: well-known/app/sq::go-module-path
      - id: well-known/app/remotepower::documented-rmm-release-context
    downgrade:
      any:
        - id: metadata/lang/compiler/systems/
  - id: encoded-hardware-fingerprint
    desc: Hardware fingerprint with base64 encoding
    crit: suspicious
    conf: 0.9
    attack: T1082
    for: [binaries, scripts]
    all:
      - id: micro-behaviors/data/encode/base64::custom-implementation
      - id: objectives/discovery/system/fingerprint/machine-id::hardware-uuid
    any:
      - id: micro-behaviors/communications/http/upload/
      - id: micro-behaviors/communications/socket/create/
      - id: micro-behaviors/communications/http/download/curl::libcurl-custom-headers
    downgrade:
      any:
        - id: metadata/binary/installer/family/
  - id: obfuscated-exfiltration
    desc: Multi-layer encoding with network (obfuscated)
    crit: hostile
    conf: 0.95
    attack: T1027
    mbc: B0032
    for: [binaries, scripts]
    all:
      - id: micro-behaviors/data/encode/base64::custom-implementation
      - id: objectives/anti-static/obfuscation/encoding/xor::string-decrypt
    any:
      - id: micro-behaviors/communications/http/download/curl::libcurl-http
      - id: micro-behaviors/communications/socket/create/
  - id: stealer-trifecta
    desc: Complete stealer pattern (network +)
    crit: hostile
    conf: 0.98
    attack: T1041
    mbc: B0030
    for: [binaries, scripts]
    all:
      - id: micro-behaviors/communications/http/download/curl::libcurl-http
      - id: objectives/anti-static/obfuscation/encoding/xor::string-decrypt
    any:
      - id: objectives/discovery/system/fingerprint/
  - id: chrome-cookie-upload
    desc: Chrome cookie theft and upload
    crit: hostile
    conf: 0.95
    attack: T1555.003
    mbc: B0028
    all:
      - id: objectives/credential-access/browser/chromium::chromium-cookie-sql
      - id: micro-behaviors/communications/http/upload::curl-upload-file
  - id: screencapture-with-creds
    desc: Screenshot capture with credential theft
    crit: hostile
    conf: 0.95
    attack: T1113
    mbc: B0028
    for: [binaries, scripts]
    all:
      - id: micro-behaviors/hardware/display/screenshot::macos-screencapture-command
    any:
      - id: micro-behaviors/fs/file/open::wallet-dat-path
      - id: objectives/credential-access/validation/check::csidentity-password-auth
      - id: objectives/collection/file-targeting/filter::credential-files
      - id: objectives/collection/file-targeting/filter::wallet-files
      - id: objectives/credential-access/browser/chromium/
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: well-known/tool/detection/
  - id: stealth-screenshot
    desc: Stealth screenshot with volume muting
    crit: hostile
    conf: 0.95
    attack: T1113
    for: [binaries, scripts]
    all:
      - id: micro-behaviors/hardware/display/screenshot::macos-screencapture-command
      - id: objectives/evasion/process/hidden/audio::volume-mute
  - id: cis-exclusion-stealer
    desc: CIS locale exclusion with credential theft
    crit: hostile
    conf: 0.95
    attack: T1614.001
    for: [binaries, scripts]
    all:
      - id: objectives/anti-analysis/geofencing/region/cluster::cis-geofencing
    any:
      - id: objectives/credential-access/validation/check::csidentity-password-auth
      - id: objectives/discovery/system/fingerprint/machine-id::macos-hardware-uuid
      - id: objectives/discovery/host/browser/identity::browser-data-files
      - id: objectives/collection/file-targeting/filter::credential-files
      - id: objectives/collection/file-targeting/filter::wallet-files
    unless:
      - id: well-known/tool/detection/
  - id: binary-exfil-to-ip
    desc: Binary data exfiltration to raw IP
    crit: hostile
    conf: 0.95
    attack: T1041
    for: [binaries, scripts]
    all:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/communications/http/download/curl::libcurl-custom-headers
    any:
      - id: objectives/collection/file-targeting/
      - id: objectives/discovery/system/fingerprint/
      - id: objectives/credential-access/validation/check/
  - id: cookieminer-dropper
    desc: CookieMiner dropper script
    crit: hostile
    conf: 1.0
    attack: T1059.004
    mbc: B0024
    for:
      - shell
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: objectives/credential-access/browser/chromium::chromium-cookie-sql
      - id: objectives/command-and-control/dropper/execution/payload::cp-execute
      - id: micro-behaviors/communications/http/upload::curl-upload-file
  - id: networked-wallet-and-credential-file-stealer
    desc: Networked wallet and credential-file stealer
    crit: hostile
    conf: 0.99
    attack: "T1041,T1555.003,T1552.004"
    for: [binaries, scripts]
    all:
      - id: objectives/credential-access/wallet/extension::multi-wallet-targeting
      - id: objectives/collection/file-targeting/filter::credential-files
    any:
      - id: micro-behaviors/communications/http/headers::auth-header
      - id: micro-behaviors/communications/http/upload/
    unless:
      - id: well-known/tool/detection/
  - id: python-multi-app-credential-upload
    desc: Python multi-app credential upload
    crit: hostile
    conf: 0.98
    attack: "T1555,T1041"
    for: [python, pyc]
    all:
      - id: objectives/credential-access/theft/multi-app::multi-app-credential-stealer
      - id: micro-behaviors/communications/http/endpoints::ingest-api-path
    unless:
      - id: well-known/tool/detection/
