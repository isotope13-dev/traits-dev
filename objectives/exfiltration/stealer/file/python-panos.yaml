defaults:
  platforms: [panos, appliance, unix]
  for: [python]
  attack: T1041

traits:
  - id: python-panos-collection-tar
    desc: Python PAN-OS collection tar
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: collection.tar.gz

  - id: python-panos-exfil-upload-url
    desc: Python PAN-OS exfil upload URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: url = f"http://{EXFIL_HOST}/upload"

  - id: python-panos-sensitive-file-list
    desc: Python Unix sensitive file list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,120}/etc/passwd'
    unless:
      - type: text
        regex: '/etc/shadow[\s\S]{0,80}mode[\s\S]{0,20}ro[\s\S]{0,120}/etc/passwd'
      - type: text
        substr: CorrelationRule(
      - type: text
        substr: CENSUS-PRIV-ESC
      - id: well-known/tool/detection/
      - id: well-known/tool/detection/security-scanner::blocked-sensitive-path-list
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository

composite_rules:
  - id: python-panos-archive-http-upload
    desc: Python PAN-OS archive upload
    crit: hostile
    conf: 0.98
    all:
      - id: python-panos-collection-tar
      - id: python-panos-exfil-upload-url

  - id: python-panos-sensitive-archive
    desc: Python PAN-OS sensitive archive
    crit: hostile
    conf: 0.98
    all:
      - id: python-panos-collection-tar
      - id: python-panos-sensitive-file-list
