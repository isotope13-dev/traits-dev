defaults:
  platforms: [panos, appliance, unix]
  for: [python]
  attack: T1041

traits:
  - id: python-panos-collection-tar
    desc: Python PAN-OS collection tar
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: collection.tar.gz

  - id: python-panos-exfil-upload-url
    desc: Python PAN-OS exfil upload URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: url = f"http://{EXFIL_HOST}/upload"

composite_rules:
  - id: python-panos-archive-http-upload
    desc: Python PAN-OS archive upload
    crit: hostile
    conf: 0.98
    all:
      - id: python-panos-collection-tar
      - id: python-panos-exfil-upload-url

  - id: python-panos-sensitive-archive
    desc: Python PAN-OS sensitive archive
    crit: hostile
    conf: 0.98
    all:
      - id: python-panos-collection-tar
      - id: micro-behaviors/fs/path/config/accounts::unix-password-file-path-pair
