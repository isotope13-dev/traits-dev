defaults:
  platforms: [macos]
  for: [binaries, scripts]
  attack: T1537
traits:
  - id: target-imessage-db
    desc: Targets iMessage chat.db for extraction
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: Library/Messages/chat.db
  - id: target-apple-notes-db
    desc: Targets Apple Notes database for extraction
    crit: suspicious
    conf: 0.9
    if:
      type: text
      # Library/Group Containers/group.com.apple.notes/NoteStore.sqlite
      regex: (?i)Library/.*?com\.apple\.notes/.*?NoteStore\.sqlite
  - id: target-safari-cookies
    desc: Targets Safari binary cookies for extraction
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Library/Cookies/Cookies.binarycookies
  - id: target-telegram-tdata
    desc: Targets Telegram tdata session store (macOS)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      # Specific to macOS pathing usually seen in stealers
      regex: (?i)Library/Application\s+Support/Telegram\s+Desktop/tdata
  - id: target-macos-keychain
    desc: Targets macOS keychain login.keychain
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Library/Keychains/login.keychain
composite_rules:
  - id: macos-comm-stealer
    desc: Multi-service macOS communication stealer
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: target-imessage-db
      - id: target-apple-notes-db
      - id: target-telegram-tdata
