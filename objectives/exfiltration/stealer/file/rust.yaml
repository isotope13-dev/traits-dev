defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1041
traits:
  - id: rust-file-exfil-endpoint
    desc: Rust file exfiltration endpoint
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /api/validate/files
  - id: rust-project-env-exfil-endpoint
    desc: Rust project dotenv endpoint
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /api/validate/project-env
  - id: rust-file-content-base64-field
    desc: Rust base64 file content encoding
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '"base64"'
  - id: rust-env-content-field
    desc: Rust dotenv content field
    crit: component
    conf: 0.9
    if:
      type: text
      substr: envContent
composite_rules:
  - id: rust-file-content-exfiltration
    desc: Rust file content exfiltration
    crit: suspicious
    conf: 0.98
    all:
      - id: rust-file-exfil-endpoint
    any:
      - id: rust-file-content-base64-field
      - id: rust-project-env-exfil-endpoint
      - id: rust-env-content-field
  - id: rust-project-env-exfiltration
    desc: Rust project dotenv exfiltration
    crit: suspicious
    conf: 0.98
    all:
      - id: rust-project-env-exfil-endpoint
      - id: rust-env-content-field
    any:
      - id: rust-file-exfil-endpoint
      - id: objectives/credential-access/files/config::rust-dotenv-file-target
