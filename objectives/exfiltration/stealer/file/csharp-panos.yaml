defaults:
  platforms: [panos, appliance, windows]
  for: [csharp, pe]
  attack: T1041

traits:
  - id: csharp-collect-sensitive-data-method
    desc: C# collect sensitive data method
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: CollectSensitiveData

  - id: csharp-byte-array-exfil-method
    desc: C# byte array exfil method
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Exfiltrate\(byte\[\] data\)'

composite_rules:
  - id: csharp-panos-sensitive-file-exfil
    desc: C# PAN-OS sensitive file exfil
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-collect-sensitive-data-method
      - id: csharp-byte-array-exfil-method
