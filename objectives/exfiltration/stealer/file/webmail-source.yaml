defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1020
traits:
- id: formdata-mail-append
  desc: Appends harvested mail to FormData
  # Component-only: meaningful solely inside webmail-eml-exfiltration
  # (mailbox harvest + .eml construction). As a standalone signal it is
  # noisy — chat/identity form fields ("msg", "userEmail") trip it. The
  # \b before (mail|eml|msg) stops the embedded "mail" in "Email" from
  # matching identity fields like userEmail/email.
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.append\(\s*["''].{0,40}\b(mail|eml|msg)["'']\s*,\s*\w'
  not:
  - substr: '.append("email"'
  - substr: ".append('email'"
- id: svg-path-append-recognized
  desc: Recognized SVG path append pattern
  crit: component
  conf: 0.99
  if:
    type: text
    substr: 'append("svg:path")'

composite_rules:
- id: webmail-eml-exfiltration
  desc: Webmail message exfiltration as .eml
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/collection/email-harvest::webmail-mailbox-harvest
  - id: micro-behaviors/communications/email/mime::eml-file-construction
  any:
  - id: formdata-mail-append
  - id: micro-behaviors/communications/http/post::no-cors-post-request
  - id: micro-behaviors/communications/http/post::formdata-class
  unless:
  - id: svg-path-append-recognized
