defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1020
traits:
- id: eml-file-construction
  desc: Wraps mail as .eml file
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'new\s+File\(.{0,160}\.eml["'']|["'']\.eml["'']'
- id: formdata-mail-append
  desc: Appends harvested mail to FormData
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '\.append\(\s*["''].{0,40}(mail|eml|msg)["'']\s*,\s*\w'
- id: nocors-post-upload--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'mode:\s*["'']no-cors["''].{0,120}method:\s*["'']POST["'']'
- id: nocors-post-upload--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'method:\s*["'']POST["''].{0,120}mode:\s*["'']no-cors["'']'
- id: svg-path-append-benign
  desc: Benign SVG path append pattern
  crit: component
  conf: 0.99
  if:
    type: text
    substr: 'append("svg:path")'

composite_rules:
- id: webmail-eml-exfiltration
  desc: Webmail message exfiltration as .eml
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/collection/email-harvest::webmail-mailbox-harvest
  - id: eml-file-construction
  any:
  - id: formdata-mail-append
  - id: nocors-post-upload
  - id: micro-behaviors/communications/http/upload::form-data-new
  unless:
  - id: svg-path-append-benign
- id: nocors-post-upload
  desc: Posts harvested data with no-cors
  crit: suspicious
  conf: 0.9
  any:
  - id: nocors-post-upload--rx-1
  - id: nocors-post-upload--rx-2
  needs: 1
  downgrade:
    any:
    - id: metadata/library/structure::google-tag-manager-bundle
