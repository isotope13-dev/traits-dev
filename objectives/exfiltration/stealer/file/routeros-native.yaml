defaults:
  platforms: [routeros, appliance]
  for: [c, cpp]
  attack: T1041

composite_rules:
  - id: routeros-log-backup-http-exfil
    desc: RouterOS log backup HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/log/system::routeros-log-file-paths
      - id: micro-behaviors/fs/path/config/backup::routeros-flash-backup-path
      - id: objectives/exfiltration/http/collect::native-collect-http-post
