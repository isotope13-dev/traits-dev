defaults:
  platforms: [panos, appliance, windows]
  for: [batch]
  attack: T1041

traits:
  - id: batch-panos-curl-log-post
    desc: Batch PAN-OS curl log POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: --data-binary @"%LOGFILE%"

  - id: batch-panos-collect-endpoint
    desc: Batch PAN-OS collect endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /collect

  - id: batch-panos-db-file-stage
    desc: Batch PAN-OS DB file stage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: DB_FILE=%TEMP%\sysdata_

  - id: batch-panos-restmethod-db-post
    desc: Batch PAN-OS DB POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Invoke-RestMethod -Uri 'http://!EXFIL_HOST!/collect'

composite_rules:
  - id: batch-panos-log-http-upload
    desc: Batch PAN-OS log HTTP upload
    crit: hostile
    conf: 0.98
    all:
      - id: batch-panos-curl-log-post
      - id: batch-panos-collect-endpoint

  - id: batch-panos-database-http-upload
    desc: Batch PAN-OS database upload
    crit: hostile
    conf: 0.98
    all:
      - id: batch-panos-db-file-stage
      - id: batch-panos-restmethod-db-post
