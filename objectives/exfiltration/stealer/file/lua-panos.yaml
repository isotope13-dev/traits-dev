defaults:
  platforms: [panos, appliance, unix]
  for: [lua]
  attack: T1041

traits:
  - id: lua-panos-cache-tar-archive
    desc: Lua PAN-OS cache tar archive
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.cache_data.tar.gz

  - id: lua-panos-curl-upload
    desc: Lua PAN-OS curl upload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /upload
    unless:
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree

composite_rules:
  - id: lua-panos-tar-curl-exfil
    desc: Lua PAN-OS tar curl exfil
    crit: hostile
    conf: 0.98
    all:
      - id: lua-panos-cache-tar-archive
      - id: lua-panos-curl-upload
