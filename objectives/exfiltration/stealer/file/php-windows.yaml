defaults:
  platforms: [windows]
  for: [php]
  attack: T1005

traits:
  - id: php-sensitive-file-extension-set
    desc: PHP sensitive file extension set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.pfx[\s\S]{0,260}\.key[\s\S]{0,260}\.env'

  - id: php-windows-sensitive-roots
    desc: PHP Windows sensitive roots
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'C:\\\\Users[\s\S]{0,180}C:\\\\Windows\\\\System32\\\\config'

  - id: php-hashes-target-files
    desc: PHP hashes target files
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: hash_file('md5'
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree

  - id: php-stages-target-files
    desc: PHP stages target files
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'copy\(\$file\[''path''\], \$stagedPath\)'

  - id: php-file-discovery-report
    desc: PHP file discovery report
    crit: component
    conf: 0.88
    if:
      type: literal
      exact: file_discovery

composite_rules:
  - id: php-sensitive-file-staging
    desc: PHP sensitive file staging
    crit: hostile
    conf: 0.98
    all:
      - id: php-sensitive-file-extension-set
      - id: php-windows-sensitive-roots
      - id: micro-behaviors/fs/enumerate/directory::php-recursive-directory-iterator
      - id: php-stages-target-files
    any:
      - id: php-hashes-target-files
      - id: php-file-discovery-report
