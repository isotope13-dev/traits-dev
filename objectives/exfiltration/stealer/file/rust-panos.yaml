defaults:
  platforms: [panos, appliance, unix]
  for: [rust, elf]
  attack: T1041

traits:
  - id: rust-panos-keylog-shm-buffer
    desc: Rust PAN-OS keylog shm buffer
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /dev/input

  - id: rust-panos-http-collect-post
    desc: Rust PAN-OS HTTP collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /collect HTTP/1.1

composite_rules:
  - id: rust-panos-keylog-http-exfil
    desc: Rust PAN-OS keylog HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-panos-keylog-shm-buffer
      - id: rust-panos-http-collect-post
