defaults:
  platforms: [panos, appliance, unix]
  for: [php]
  attack: T1041

traits:
  - id: php-panos-loot-tar-stage
    desc: PHP PAN-OS loot tar stage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /loot.tar

composite_rules:
  - id: php-panos-loot-http-upload
    desc: PHP PAN-OS loot HTTP upload
    crit: hostile
    conf: 0.98
    all:
      - id: php-panos-loot-tar-stage
      - id: micro-behaviors/communications/http/post::php-stream-context-post
