defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1041
traits:
- id: node-base64-content-field
  desc: POST content field base64-encodes input
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'content\s*:\s*btoa\s*\('
- id: node-file-bucket-json-fields
  desc: File exfiltration JSON buckets
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: "envFiles.{0,80}jsonFiles.{0,80}docFiles"
- id: node-file-content-record
  desc: File path and content records
  crit: suspicious
  conf: 0.84
  count_min: 3
  if:
    type: text
    regex: "'path':.{0,80}'content':"
  unless:
    - id: metadata/library/vscode::require-vscode
    - id: metadata/library/vscode::vscode-extension-marker
    - id: metadata/package/manifest/runtime::vscode-extension
    - id: well-known/app/baidu-comate::baidu-comate
  not:
    - substr: "'range':"
    - substr: "'diagnostics':"
    - substr: "'summary':"
- id: node-sensitive-extension-filter
  desc: Sensitive file extension filter
  crit: component
  conf: 0.78
  if:
    type: string_literal
    regex: "^\\^\\\\d\\+\\\\\\.json\\$$"
- id: node-import-time-stealer-launch
  desc: Import-time stealer launch chain
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "exports\\[.{1,80}\\]\\)\\(\\)\\[.{1,40}\\]\\(_0x[0-9a-f]+=>__awaiter"
- id: node-formdata-file-stream-field
  desc: FormData files field streams local files
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "append\\(\\s*['\"]files['\"][\\s\\S]{0,180}fs\\.createReadStream\\("
- id: node-axios-formdata-post
  desc: Axios posts FormData body
  crit: component
  conf: 0.86
  if:
    type: text
    regex: "\\.post\\(\\s*[A-Za-z_$][\\w.$]*\\s*,\\s*(form|formData|fd)\\b[\\s\\S]{0,160}getHeaders\\("
- id: node-home-scan-paths
  desc: Node scans user home or Windows drives
  crit: component
  conf: 0.86
  if:
    type: text
    regex: "os\\.homedir\\(\\)|getWindowsDrives\\(|String\\.fromCharCode\\(code\\).{0,80}:\\\\\\\\"
- id: node-sensitive-document-extension-set
  desc: Sensitive document and config extension set
  crit: component
  conf: 0.84
  if:
    type: text
    regex: "ALLOWED_EXTENSIONS[\\s\\S]{0,240}(\\.env|config\\.toml)[\\s\\S]{0,240}(\\.docx?|\\.xlsx|\\.pdf)"
- id: node-remote-scan-pattern-tasking
  desc: Remote scan pattern tasking endpoints
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "/api/(scan-patterns|block-patterns)[\\s\\S]{0,180}/api/(scan-patterns|block-patterns)"
composite_rules:
- id: node-sensitive-file-fetch-exfil
  desc: Node sensitive files sent by fetch
  crit: hostile
  conf: 0.97
  all:
  - id: node-file-bucket-json-fields
  - id: micro-behaviors/communications/http/request/client::fetch-json-body
  any:
  - id: node-file-content-record
  - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
  - id: node-sensitive-extension-filter
  - id: micro-behaviors/fs/path/sensitive/credentials::dotenv-filename-literal
- id: node-project-secret-fetch-exfil
  desc: Node project secrets sent by fetch
  crit: hostile
  conf: 0.98
  # Keep file-target evidence close to the POST. A large legitimate bundle can
  # contain project-inspection code, credential names, and unrelated registry
  # POSTs in separate modules without transferring those files.
  near_bytes: 8192
  all:
  - id: objectives/credential-access/files/config::node-project-secret-file-targets
  - id: micro-behaviors/communications/http/post::fetch-post-call
  any:
  - id: micro-behaviors/data/parse/json::json-response-path-content-fields
  - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
  - id: micro-behaviors/fs/enumerate/directory::fs-readdir
  - id: micro-behaviors/fs/enumerate/directory::file-search-exclude-common
  unless:
  - id: micro-behaviors/process/interpreter/vm/
  - id: metadata/library/runtime::acquire-vscode-api
  - id: metadata/library/runtime::vscode-webview-bundle
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/library/ai/
  - id: well-known/app/baidu-comate::baidu-comate
- id: node-recursive-archive-upload
  desc: Recursive file archive uploaded by Node
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
  - id: micro-behaviors/data/compress/library::node-gzip-stream-archive
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  any:
  - id: micro-behaviors/communications/http/headers::client-identity-headers
  - id: node-file-bucket-json-fields
- id: node-import-time-file-stealer
  desc: Import-time Node file stealer
  crit: hostile
  conf: 0.97
  all:
  - id: node-import-time-stealer-launch
  - id: node-sensitive-file-fetch-exfil
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
- id: node-sensitive-files-formdata-exfil
  desc: Node sensitive files uploaded by multipart FormData
  crit: hostile
  conf: 0.97
  all:
  - id: node-formdata-file-stream-field
  - id: node-axios-formdata-post
  - id: node-sensitive-document-extension-set
  any:
  - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
  - id: micro-behaviors/fs/enumerate/directory::fs-readdir
  - id: node-home-scan-paths
  - id: node-remote-scan-pattern-tasking
  unless:
  - id: metadata/package/testing/harness/runtime/
  - id: metadata/library/runtime::vscode-webview-bundle
  - id: metadata/library/structure::js-large-module-bundle
- id: node-crypto-validation-exfil
  desc: Crypto facade validates generated values through external POST
  crit: hostile
  conf: 0.97
  attack: T1041,T1195.002
  all:
  - id: micro-behaviors/crypto/library/wrapper::exports-crypto-interface
  - id: micro-behaviors/os/random/crypto::node-random-bytes
  - id: micro-behaviors/data/encode/base64::btoa-symbol
  - id: micro-behaviors/communications/http/post::fetch-post-call
  - id: node-base64-content-field
  unless:
  - id: metadata/package/testing/harness/runtime/
  - id: metadata/package/testing/
- id: node-wallet-keyword-cluster
  desc: Node wallet credential keyword cluster
  crit: component
  conf: 0.9
  needs: 2
  any:
  - id: objectives/credential-access/wallet/keywords::wallet-token
  - id: objectives/credential-access/wallet/keywords::mnemonic-word
  - id: objectives/credential-access/wallet/solana::solana-keypair-reference
  - id: micro-behaviors/crypto/library/blockchain/wallet::bip39-wordlist-reference
- id: node-encrypted-wallet-file-exfil
  desc: Node encrypts wallet files before IPFS upload
  crit: hostile
  conf: 0.99
  attack: T1552.001,T1041,T1027
  all:
  - id: node-wallet-keyword-cluster
  - id: micro-behaviors/fs/file/read::read-node
  - id: micro-behaviors/crypto/library/provider::asymmetric-public-encrypt
  - id: micro-behaviors/communications/http/services/ipfs::public-ipfs-gateway-literal
  any:
  - id: micro-behaviors/communications/http/post::post
  - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
