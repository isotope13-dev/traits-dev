defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1041
traits:
- id: node-env-package-targets
  desc: Targets env and npm lockfiles
  crit: suspicious
  conf: 0.9
  count_min: 3
  if:
    type: text
    regex: "['\"](\\.env|package\\.json|package-lock\\.json)['\"]"
  unless:
  - id: well-known/lib/json-ts::converter-bundle
- id: node-json-file-content-records
  desc: Node records JSON file content fields
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: "JSON\\.parse[\\s\\S]{0,240}['\"]content['\"]\\s*:"
- id: node-fetch-post-content-field
  desc: Node POSTs content JSON field
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "method:\\s*['\"]POST['\"][\\s\\S]{0,220}content\\s*:"
- id: node-file-bucket-json-fields
  desc: File exfiltration JSON buckets
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: "envFiles.{0,80}jsonFiles.{0,80}docFiles"
- id: node-file-content-record
  desc: File path and content records
  crit: suspicious
  conf: 0.84
  count_min: 3
  if:
    type: text
    regex: "'path':.{0,80}'content':"
- id: node-sensitive-extension-filter
  desc: Sensitive file extension filter
  crit: component
  conf: 0.78
  if:
    type: text
    regex: "\\^\\\\d\\+\\\\\\.json\\$|['\"]\\.env['\"]"
- id: node-import-time-stealer-launch
  desc: Import-time stealer launch chain
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "exports\\[.{1,80}\\]\\)\\(\\)\\[.{1,40}\\]\\(_0x[0-9a-f]+=>__awaiter"
composite_rules:
- id: node-sensitive-file-fetch-exfil
  desc: Node sensitive files sent by fetch
  crit: hostile
  conf: 0.97
  all:
  - id: node-file-bucket-json-fields
  - id: micro-behaviors/communications/http/request/client::fetch-json-body
  any:
  - id: node-file-content-record
  - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
  - id: node-sensitive-extension-filter
- id: node-project-secret-fetch-exfil
  desc: Node project secrets sent by fetch
  crit: hostile
  conf: 0.98
  all:
  - id: node-env-package-targets
  - id: node-fetch-post-content-field
  any:
  - id: node-json-file-content-records
  - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
  - id: micro-behaviors/fs/enumerate/directory::fs-readdir
  - id: micro-behaviors/fs/enumerate/directory::file-search-exclude-common
- id: node-recursive-archive-upload
  desc: Recursive file archive uploaded by Node
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
  - id: micro-behaviors/data/compress/library::node-gzip-stream-archive
  - id: micro-behaviors/communications/http/request/client::fetch-string
  any:
  - id: objectives/exfiltration/stealer/system-info::node-client-identity-headers
  - id: node-file-bucket-json-fields
- id: node-import-time-file-stealer
  desc: Import-time Node file stealer
  crit: hostile
  conf: 0.97
  all:
  - id: node-import-time-stealer-launch
  - id: node-sensitive-file-fetch-exfil
  - id: objectives/anti-static/obfuscation/tools/js-obfuscator::hex-name-mangling
