defaults:
  platforms: [windows]
  for: [pe, c, cpp, csharp, source]
  attack: T1005
  mbc: B0030
traits:
  - id: server-file-table-token
    desc: Server-provided file table token
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(?i)\b(getFileTable|file_hashes|FileHashTable)\b'
  - id: media-sync-state-token
    desc: Removable media synchronization state token
    crit: component
    conf: 0.76
    if:
      type: text
      regex: '(?i)\b(localMediaList|mediaGetClock|CheckForMediaChanges|CheckAvailableMedia)\b'
  - id: downloaded-file-writeback
    desc: HTTP response written to disk
    crit: notable
    conf: 0.84
    for: [csharp, source]
    if:
      type: text
      regex: 'ReadAsByteArrayAsync\s*\([\s\S]{0,240}File\.WriteAllBytes\s*\('
composite_rules:
  - id: removable-drive-selection
    desc: Selects removable drive content
    crit: notable
    conf: 0.88
    any:
      - id: micro-behaviors/fs/traversal/drives::logical-drive-enumeration
      - id: micro-behaviors/fs/traversal/drives::source-drive-enum-and-type
      - id: micro-behaviors/fs/traversal/drives::drive-type-removable-source
  - id: http-transfer-capability
    desc: HTTP transfer capability present
    crit: notable
    conf: 0.82
    any:
      - id: micro-behaviors/communications/http/post/
      - id: micro-behaviors/communications/http/upload/
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/socket/create/
  - id: removable-media-http-sync
    desc: Removable media synchronized over HTTP
    crit: suspicious
    conf: 0.93
    all:
      - id: media-sync-state-token
      - id: removable-drive-selection
      - id: http-transfer-capability
  - id: remote-file-table-drive-sync
    desc: C2 file table drives synchronization
    crit: hostile
    conf: 0.96
    all:
      - id: removable-media-http-sync
      - id: server-file-table-token
    any:
      - id: downloaded-file-writeback
      - id: micro-behaviors/communications/http/post/
      - id: micro-behaviors/communications/http/upload/
