defaults:
  platforms: [unix]
  for: [shell]
  attack: T1048
  mbc: B0030
composite_rules:
  - id: hidden-staging-tftp-upload
    desc: TFTP upload from hidden staging
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/communications/ftp/download/tftp::scripted-upload
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
    near_lines: 120
  - id: collected-file-tftp-exfil
    desc: Collected files exfiltrated by TFTP
    crit: hostile
    conf: 0.98
    all:
      - id: hidden-staging-tftp-upload
      - id: objectives/collection/file-targeting/image::png-magic-file-collection
    near_lines: 160
