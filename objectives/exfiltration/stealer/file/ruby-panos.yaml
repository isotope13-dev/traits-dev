defaults:
  platforms: [panos, appliance, unix]
  for: [ruby]
  attack: T1041

traits:
  - id: ruby-panos-bash-curl-exfil
    desc: Ruby PAN-OS bash curl exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: curl -s http://HOST_PLACEHOLDER/exfil

  - id: ruby-panos-python-beacon
    desc: Ruby PAN-OS Python beacon
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: urllib.request.urlopen

composite_rules:
  - id: ruby-panos-lolbin-http-exfil
    desc: Ruby PAN-OS lolbin HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-panos-bash-curl-exfil
      - id: ruby-panos-python-beacon
