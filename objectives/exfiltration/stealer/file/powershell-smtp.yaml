defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1041
  mbc: B0030

traits:
  - id: powershell-screenshot-folder
    desc: PowerShell screenshot folder target
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\$env:USERPROFILE\\Documents\\ScreenShot\\'
      case_insensitive: true

composite_rules:
  - id: powershell-smtp-attachment-exfil
    desc: PowerShell SMTP attachment exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/email/send/smtp::smtp-ssl-mail-exfil
      - id: micro-behaviors/communications/email/send/smtp::smtp-dotnet-attachment-add
      - id: powershell-screenshot-folder
