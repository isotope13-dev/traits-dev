defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1005

traits:
  - id: python-hidden-archive-path
    desc: Python hidden archive path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.sysmon_archive.tar.gz

composite_rules:
  - id: python-sensitive-targz-staging
    desc: Python sensitive tar staging
    crit: hostile
    conf: 0.98
    for: [python]
    all:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/data/archive/create/tar::python-tar-gz-write-mode
    any:
      - id: python-hidden-archive-path

  - id: python-pyc-sensitive-targz
    desc: Python pyc sensitive tar
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-pyc
      - id: micro-behaviors/os/privilege/paths::etc-shadow-pyc
      - id: micro-behaviors/data/archive/create/tar::python-tar-gz-write-mode
    any:
      - id: python-hidden-archive-path
