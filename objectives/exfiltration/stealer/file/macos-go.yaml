defaults:
  platforms: [macos]
  for: [macho]
  attack: T1567
traits:
  - id: macos-go-browser-credential-artifacts
    desc: Binary references browser credential stores
    crit: suspicious
    conf: 0.9
    # "Login Data" / the Chrome keychain DB are real credential-store artifacts.
    # A bare browser NAME ("Microsoft Edge") is not — it appears in user-agents,
    # browser-detection, allowlists, and security-tool signature data, so it was
    # dropped to avoid mislabeling any binary that merely names a browser.
    if:
      type: text
      regex: '(Login Data|chrome-extension_login\.keychain-db)'
  - id: macos-go-chrome-keychain-artifact
    desc: Go binary references Chrome keychain database
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: chrome-extension_login.keychain-db
  - id: macos-go-group-container-copy
    desc: Go binary copies macOS group containers
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: Group Containers
    unless:
      - id: well-known/app/macos-system-binaries
  - id: macos-go-archive-output-names
    desc: Go binary names stealer zip archives
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '%s_(ext|tel|exodus)\.zip'
composite_rules:
  - id: macos-go-telegram-browser-wallet-stealer
    desc: Go macOS browser wallet Telegram stealer
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/exfiltration/messaging/telegram::go-telegram-archive-exfil
      - id: objectives/credential-access/wallet/desktop::desktop-wallet-product-list
    any:
      - id: macos-go-browser-credential-artifacts
      - id: macos-go-chrome-keychain-artifact
  - id: macos-go-group-container-telegram-stealer
    desc: Go macOS group container Telegram stealer
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/exfiltration/messaging/telegram::go-telegram-archive-exfil
      - id: macos-go-group-container-copy
      - id: macos-go-archive-output-names
