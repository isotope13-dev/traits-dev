defaults:
  platforms: [macos]
  for: [macho]
  attack: T1567
traits:
  - id: macos-browser-credential-artifacts
    desc: macOS browser credential artifact reference
    crit: suspicious
    conf: 0.9
    # "Login Data" / the Chrome keychain DB are real credential-store artifacts.
    # A bare browser NAME ("Microsoft Edge") is not — it appears in user-agents,
    # browser-detection, allowlists, and security-tool signature data, so it was
    # dropped to avoid mislabeling any binary that merely names a browser.
    if:
      type: text
      regex: '(Login Data|chrome-extension_login\.keychain-db)'
  - id: macos-chrome-keychain-artifact
    desc: macOS Chrome keychain database reference
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: chrome-extension_login.keychain-db
  - id: macos-stealer-archive-output-names
    desc: macOS collected-data archive output names
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '%s_(ext|tel|exodus)\.zip'
composite_rules:
  - id: macos-telegram-browser-wallet-stealer
    desc: macOS browser wallet Telegram stealer
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/exfiltration/messaging/telegram::go-telegram-archive-exfil
      - id: objectives/credential-access/wallet/desktop::desktop-wallet-product-list
    any:
      - id: macos-browser-credential-artifacts
      - id: macos-chrome-keychain-artifact
  - id: macos-group-container-telegram-stealer
    desc: macOS group-container Telegram stealer
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/exfiltration/messaging/telegram::go-telegram-archive-exfil
      - id: micro-behaviors/fs/path/library::library-group-containers
      - id: macos-stealer-archive-output-names
