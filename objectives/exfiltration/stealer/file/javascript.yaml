defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  - id: js-file-archive-exfil
    desc: File enumeration with archive and FTP exfiltration
    crit: hostile
    conf: 0.95
    attack: T1560.001
    all:
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
      - id: micro-behaviors/communications/ip::external-ipv4-script
    any:
      - id: micro-behaviors/communications/ftp/client::ftp-require
      - id: micro-behaviors/communications/ftp/client::ftp-put
    needs: 1
  - id: js-sensitive-file-exfil
    desc: Sensitive file targeting with external IP exfiltration
    crit: hostile
    conf: 0.95
    attack: T1041
    all:
      - id: objectives/exfiltration/stealer/credential/discord::js-sensitive-file-target
      - id: micro-behaviors/communications/ip::external-ipv4-script
