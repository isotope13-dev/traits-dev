defaults:
  platforms: [unix]
  for: [javascript]
traits:
- id: shell-find-cat-all-files
  desc: Shell reads every file via find cat
  crit: suspicious
  conf: 0.97
  attack: T1005
  if:
    type: text
    regex: 'find\s+/[^\n"''`]{1,80}\s+-type\s+f\s+-exec\s+cat\s+\{\}\s+\\\\;'
- id: curl-post-command-sub-data
  desc: curl POST sends command substitution data
  crit: suspicious
  conf: 0.95
  attack: T1041
  if:
    type: text
    regex: "curl\\s+-X\\s+POST\\s+https?://.{1,120}\\s+-d\\s+\\$\\("
- id: curl-post-command-sub-data-any-order
  desc: curl POST sends command substitution data
  crit: suspicious
  conf: 0.95
  attack: T1041
  if:
    type: string_literal
    regex: "curl\\s+-X\\s+POST.{0,120}-d\\s+['\"]?\\$\\("
- id: curl-post-cats-local-file
  desc: curl POST cats local file content
  crit: suspicious
  conf: 0.96
  attack: T1005
  unless:
  - id: well-known/app/browser-extension-known/
  - id: well-known/tool/detection/ai-guardrail/
  - id: metadata/package/testing/
  if:
    type: literal
    kind: string
    regex: "\\bcurl\\b[^\\r\\n]{0,160}\\$\\(\\s*cat\\s+/[^)'\"]{1,120}\\)"
- id: curl-post-command-sub-url
  desc: curl POST URL embeds command output
  crit: suspicious
  conf: 0.95
  attack: T1041
  if:
    type: text
    regex: "curl\\s+-X\\s+POST\\s+['\"]?https?://.{1,160}\\$\\((whoami|hostname|id|pwd)\\)"
- id: curl-user-agent-data-smuggling
  desc: curl User-Agent data smuggling
  crit: suspicious
  conf: 0.92
  attack: T1041
  if:
    type: text
    regex: "\\bcurl\\b.{0,220}-A\\s+['\"]?\\$\\("
- id: shell-base64-passwd-bundle
  desc: Shell base64s passwd file bundle
  crit: suspicious
  conf: 0.9
  attack: T1005
  if:
    type: text
    regex: "cat\\s+/etc/passwd.{0,260}\\|\\s*base64"
- id: shell-base64-shadow-bundle
  desc: Shell base64s shadow file bundle
  crit: suspicious
  conf: 0.9
  attack: T1005
  if:
    type: text
    regex: "cat\\s+/etc/shadow.{0,260}\\|\\s*base64"
- id: shell-base64-hosts-bundle
  desc: Shell base64s hosts file bundle
  crit: suspicious
  conf: 0.86
  attack: T1005
  if:
    type: text
    regex: "cat\\s+/etc/hosts.{0,260}\\|\\s*base64"
composite_rules:
- id: js-file-archive-exfil
  desc: File enumeration with archive and FTP exfiltration
  crit: hostile
  conf: 0.95
  attack: T1560.001
  all:
  - id: micro-behaviors/fs/enumerate/directory::fs-readdir
  - id: micro-behaviors/communications/ip/literal::external-ipv4-script
  any:
  - id: micro-behaviors/communications/ftp/client::ftp-require
  - id: micro-behaviors/communications/ftp/client::ftp-put
- id: js-sensitive-file-exfil
  desc: Sensitive file targeting with external IP exfiltration
  crit: hostile
  conf: 0.95
  attack: T1041
  all:
  - id: objectives/exfiltration/stealer/credential/discord::js-sensitive-file-target
  - id: micro-behaviors/communications/ip/literal::external-ipv4-script
- id: js-shell-file-post-exfil
  desc: Shell reads local files and POSTs them
  crit: hostile
  conf: 0.99
  attack: T1041
  mbc: E1041
  all:
  - id: micro-behaviors/process/create/shell/bridge::child-process-require
  - id: objectives/exfiltration/http/upload::curl-exfil
  - id: objectives/exfiltration/oob/endpoint::requestrepo
  any:
  - id: shell-find-cat-all-files
  - id: curl-post-command-sub-data
- id: js-shell-curl-file-exfil
  desc: Node shell curl file exfiltration
  crit: hostile
  conf: 0.98
  attack: T1041
  mbc: E1041
  all:
  - id: micro-behaviors/process/create/shell/bridge::child-process-require
  - id: micro-behaviors/communications/http/curl::curl-post-flag
  any:
  - id: curl-post-command-sub-data-any-order
  - id: curl-post-cats-local-file
  - id: curl-post-command-sub-url
  - id: curl-user-agent-data-smuggling
  - id: shell-base64-passwd-bundle
  - id: shell-base64-shadow-bundle
  - id: shell-base64-hosts-bundle
  needs: 2
- id: js-external-http-upload-target
  desc: External HTTP upload target
  crit: component
  conf: 0.9
  platforms: [windows, unix]
  all:
  - id: micro-behaviors/communications/http/upload/
  any:
  - id: micro-behaviors/communications/ip/literal::external-ipv4-script
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-source-literal
  - id: micro-behaviors/communications/http/url/external-ip/
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/file/format::sourcemap-inline-base64
- id: js-sensitive-target-file-marker
  desc: Two-plus sensitive-file directory signals in one unit
  crit: component
  conf: 0.6
  platforms: [windows, unix]
  near_lines: 200
  needs: 2
  any:
  - id: objectives/collection/file-targeting/filter/
  - id: objectives/credential-access/cloud/token/
  - id: objectives/credential-access/wallet/
  - id: micro-behaviors/fs/path/sensitive/credentials/
  - id: micro-behaviors/fs/path/application/config/
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/file/format::sourcemap-inline-base64
- id: js-targeted-file-upload-exfil
  desc: Targeted file upload exfiltration
  crit: hostile
  conf: 0.97
  platforms: [windows, unix]
  attack: T1041
  mbc: B0030
  all:
  - id: js-sensitive-target-file-marker
  - id: js-external-http-upload-target
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/file/format::sourcemap-inline-base64
