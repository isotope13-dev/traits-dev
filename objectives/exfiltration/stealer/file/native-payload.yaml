defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  attack: T1041
  mbc: E1041
traits:
  - id: cxx-get-file-size-symbol
    desc: C++ GetFileSize routine symbol
    crit: component
    conf: 0.86
    size_min: 500000
    size_max: 8000000
    if:
      type: text
      exact: _Z11GetFileSizePc
      section: .strtab
composite_rules:
  - id: native-file-payload-exfil
    desc: Native file payload exfiltration
    crit: hostile
    conf: 0.96
    all:
      - id: cxx-get-file-size-symbol
      - id: objectives/command-and-control/backdoor/tasking/payload::cxx-send-payload-symbol
    any:
      - id: micro-behaviors/fs/file/read::read
      - id: micro-behaviors/fs/file/read::fread
      - id: micro-behaviors/fs/file/open::fopen
