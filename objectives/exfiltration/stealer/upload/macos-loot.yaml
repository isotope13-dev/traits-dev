# Collect → encrypt → multipart upload sequences used by macOS stealers
# after harvesting browser data and Documents/Downloads loot.
defaults:
  platforms: [macos]
  for: [macho]
  attack: "T1041,T1560.001"
  mbc: "E1041"

traits:
  - id: collected-files-encrypting-narrative
    desc: Collect-then-encrypt progress narrative
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)Collected\s+%\w+\s+files.{0,40}encrypting'

  - id: collect-upload-timing-narrative
    desc: Collect and upload timing narrative
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'collect=%.1fs\s+upload=%.1fs'

  - id: grabbed-files-staging-dirname
    desc: GrabbedFiles staging directory name
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: GrabbedFiles

  - id: documents-search-root
    desc: Documents directory search root
    crit: component
    conf: 0.85
    if:
      type: text
      exact: /Documents

  - id: downloads-search-root
    desc: Downloads directory search root
    crit: component
    conf: 0.85
    if:
      type: text
      exact: /Downloads

composite_rules:
  - id: documents-downloads-search-roots
    desc: Searches Documents and Downloads roots
    crit: notable
    conf: 0.9
    near_bytes: 128
    all:
      - id: documents-search-root
      - id: downloads-search-root

  - id: macos-encrypted-loot-multipart-exfil
    desc: Encrypted loot uploaded via libcurl MIME
    crit: hostile
    conf: 0.99
    all:
      - id: collected-files-encrypting-narrative
      - id: micro-behaviors/communications/http/download/curl::macos-libcurl-mime-upload
    any:
      - id: collect-upload-timing-narrative
      - id: grabbed-files-staging-dirname
      - id: documents-downloads-search-roots

  - id: macos-documents-loot-browser-exfil
    desc: Documents loot plus browser harvest with upload
    crit: hostile
    conf: 0.98
    all:
      - id: documents-downloads-search-roots
      - id: grabbed-files-staging-dirname
      - id: objectives/credential-access/browser/multi-target::collect-browser-data-routine
      - id: micro-behaviors/communications/http/download/curl::macos-libcurl-http
