defaults:
  platforms: [openbsd, bsd, unix]
  for: [ruby]
  attack: T1041

traits:
  - id: ruby-openbsd-system-probe-set
    desc: Ruby OpenBSD system probe set
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: sysctl kern\.version[\s\S]{0,360}sysctl -a

  - id: ruby-openbsd-collect-path
    desc: Ruby OpenBSD collect path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/v1/collect

composite_rules:
  - id: ruby-openbsd-system-http-exfil
    desc: Ruby system HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-openbsd-system-probe-set
      - id: ruby-openbsd-collect-path
      - id: micro-behaviors/communications/http/post::net-http-post
