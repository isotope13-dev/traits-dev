defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1041

composite_rules:
  - id: staged-multipart-wininet-upload
    desc: Staged multipart upload over WinInet
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/http/get::ansi-wininet-session-stack
      - id: micro-behaviors/communications/http/headers::file-upload-headers
    any:
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
      - id: micro-behaviors/os/sysinfo/network::get-adapters-info
      - id: micro-behaviors/process/create/exec::cmd-shell-via-createprocess
      - id: micro-behaviors/communications/http/post::post-string-pe
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/installer::known-benign-installer
  - id: hostile-recon-upload-client
    desc: Host profiling with staged HTTP upload
    crit: hostile
    conf: 0.95
    all:
      - id: staged-multipart-wininet-upload
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
    any:
      - id: micro-behaviors/os/sysinfo/network::get-adapters-info
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
      - id: micro-behaviors/os/sysinfo/hardware::get-memory-status
      - id: micro-behaviors/os/sysinfo/platform::get-system-default-lang-id
      - id: objectives/discovery/system/fingerprint/info::win32-system-profiling
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
