defaults:
  platforms: [windows]
  for: [pe]
  attack: T1041

composite_rules:
  - id: staged-multipart-wininet-upload
    desc: Staged multipart upload over WinInet
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/http/get::ansi-wininet-session-stack
      - id: micro-behaviors/communications/http/headers::file-upload-headers
    any:
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
      - id: micro-behaviors/os/sysinfo/network::get-adapters-info
      - id: micro-behaviors/process/create/exec::cmd-shell-via-createprocess
      - id: micro-behaviors/communications/http/post::post-string-pe
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/installer/family/
  - id: hostile-recon-upload-client
    desc: Host profiling with staged HTTP upload
    crit: hostile
    conf: 0.95
    all:
      - id: staged-multipart-wininet-upload
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
    any:
      - id: micro-behaviors/os/sysinfo/network::get-adapters-info
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
      - id: micro-behaviors/os/sysinfo/hardware::get-memory-status
      - id: micro-behaviors/os/sysinfo/platform/locale::get-system-default-lang-id
      - id: objectives/discovery/system/fingerprint/info::win32-system-profiling
    needs: 2
    unless:
      - id: metadata/signed/platform/
  - id: credential-stealer-http-post
    desc: Credential stealer targets with HTTP POST
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/post::post-string-pe
    any:
      - id: micro-behaviors/fs/path/sensitive/browser::chromium-network-cookies-path
      - id: objectives/credential-access/discord/token::local-state-path
      - id: objectives/credential-access/gaming/steam/profile::steam-tokens-artifact
      - id: objectives/credential-access/browser/chromium::logins-table
    needs: 2
    unless:
      - id: metadata/signed/platform/
  - id: pe-browser-profile-upload-protocol
    desc: Browser profile data upload protocol
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/upload::pe-filename-upload-header
      - id: micro-behaviors/communications/http/upload::pe-browser-type-upload-header
      - id: micro-behaviors/communications/http/upload::pe-profile-name-upload-header
    any:
      - id: micro-behaviors/communications/http/upload::pe-octet-stream-content-type
      - id: objectives/command-and-control/channel/http-beacon::chrome-spoof-user-agent-pe
    unless:
      - id: metadata/signed/platform/
  - id: ie-pstore-form-post-exfil
    desc: IE Protected Storage form POST exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/browser/ie::ie-protected-storage-credential-theft
      - id: micro-behaviors/communications/http/post::form-urlencoded-header-pe
      - id: micro-behaviors/communications/socket/init::connect-api-ordinal
    any:
      - id: micro-behaviors/communications/socket/init::send-api-ordinal
      - id: micro-behaviors/communications/socket/init::recv-api-ordinal
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-c2-ip-port
    needs: 2
    unless:
      - id: metadata/signed/platform/
  - id: firefox-cookie-multipart-upload
    desc: Firefox cookie store multipart upload
    crit: hostile
    conf: 0.97
    attack: T1555.003
    ref: sha256:25645bc6bc084101de911c528b795604dedc79647fd7011693f49a8f347cfd3b
    all:
      - id: objectives/credential-access/browser/firefox::path
      - id: objectives/discovery/host/browser/identity::cookies-file
      - id: objectives/exfiltration/http/upload::multipart-file-upload-transfer
    any:
      - id: micro-behaviors/communications/http/cookies::domain-attribute
      - id: micro-behaviors/communications/socket/init::send-api-ordinal
      - id: micro-behaviors/communications/socket/init::recv-api-ordinal
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/mozilla/
      - id: metadata/binary/installer/family/
  - id: browser-cookie-proxy-upload-client
    desc: Browser cookie upload with proxy reuse
    crit: hostile
    conf: 0.96
    attack: T1555.003
    ref: sha256:25645bc6bc084101de911c528b795604dedc79647fd7011693f49a8f347cfd3b
    all:
      - id: objectives/discovery/host/browser/identity::cookies-file
      - id: objectives/exfiltration/http/upload::multipart-file-upload-transfer
      - id: micro-behaviors/os/registry/access::internet-settings-key
    any:
      - id: micro-behaviors/communications/http/headers::auth-header
      - id: micro-behaviors/communications/http/request/proxy::proxy-connection-keepalive
      - id: micro-behaviors/communications/proxy/tunnel::internet-settings-proxy-values
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
