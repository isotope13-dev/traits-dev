defaults:
  platforms: [openbsd, bsd, unix]
  for: [javascript]
  attack: T1041

traits:
  - id: node-passwd-user-collection
    desc: Node collects passwd users
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: fs.readFileSync('/etc/passwd'

  - id: node-process-snapshot
    desc: Node creates process snapshot
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: /tmp/.ps_snapshot.json

composite_rules:
  - id: node-openbsd-discovery-http-exfil
    desc: Node OpenBSD discovery HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/services/microsoft-dataverse::global-discovery-instances-route
    any:
      - id: node-passwd-user-collection
      - id: node-process-snapshot
