defaults:
  platforms: [openbsd, bsd, unix]
  for: [csharp]
  attack: T1041

traits:
  - id: dotnet-runtime-info-collect
    desc: .NET runtime info collection
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: RuntimeInformation.OSDescription

  - id: dotnet-passwd-read
    desc: .NET reads passwd file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: File.ReadAllText("/etc/passwd")

  - id: dotnet-ipglobal-properties
    desc: .NET reads IP global properties
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: IPGlobalProperties.GetIPGlobalProperties()

  - id: dotnet-command-runner
    desc: .NET process start configuration
    crit: notable
    conf: 0.78
    if:
      type: text
      substr: ProcessStartInfo

  - id: dotnet-collect-post
    desc: .NET posts collect data
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: PostAsync("collect"

  - id: dotnet-octet-collect-post
    desc: .NET posts octet collect
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: PostAsync($"http://{C2_HOST}/collect"

  - id: dotnet-pkg-info-collect
    desc: .NET collects pkg_info output
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: RunCmd("pkg_info"

composite_rules:
  - id: dotnet-host-recon-http-exfil
    desc: .NET host recon HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-collect-post
    needs: 2
    any:
      - id: dotnet-runtime-info-collect
      - id: micro-behaviors/process/create/vb-shell::process-enumeration-dotnet
      - id: objectives/discovery/system/fingerprint/network::network-interface-enumeration-dotnet
      - id: dotnet-passwd-read

  - id: dotnet-openbsd-recon-http-exfil
    desc: .NET OpenBSD recon HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-octet-collect-post
    needs: 2
    any:
      - id: micro-behaviors/process/create/vb-shell::process-enumeration-dotnet
      - id: dotnet-passwd-read
      - id: dotnet-pkg-info-collect

  - id: dotnet-process-inventory-http-exfil
    desc: .NET process inventory HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-collect-post
      - id: micro-behaviors/process/create/vb-shell::process-enumeration-dotnet
      - id: dotnet-command-runner

  - id: dotnet-network-inventory-http-exfil
    desc: .NET network inventory HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-collect-post
      - id: objectives/discovery/system/fingerprint/network::network-interface-enumeration-dotnet
      - id: dotnet-ipglobal-properties
