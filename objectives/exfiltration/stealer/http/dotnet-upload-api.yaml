defaults:
  platforms: [windows]
  for: [pe]
  attack: T1041

traits:
  - id: upload-v3-path
    desc: Versioned upload API path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: /v3/upload?uuid={0}&index={1}&parent={2}&uploadKey={3}&hash={4}

  - id: encrypted-message-field
    desc: Encrypted message schema field
    crit: component
    conf: 0.92
    if:
      type: text
      exact: EncryptedMessage

  - id: name-uploadkey-field
    desc: Name to uploadKey mapping field
    crit: component
    conf: 0.96
    if:
      type: text
      exact: "Name\tuploadKey"

  - id: namehashed-field
    desc: Hashed filename schema field
    crit: component
    conf: 0.9
    if:
      type: text
      exact: nameHashed

composite_rules:
  - id: dotnet-versioned-upload-api
    desc: .NET client uses versioned upload API
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/client/managed::httpclient
      - id: upload-v3-path

  - id: encrypted-upload-schema
    desc: Encrypted chunked upload schema
    crit: suspicious
    conf: 0.96
    all:
      - id: upload-v3-path
    any:
      - id: encrypted-message-field
      - id: name-uploadkey-field
      - id: namehashed-field
    needs: 3

  - id: encrypted-http-upload-client
    desc: Encrypted HTTP upload client
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-versioned-upload-api
      - id: encrypted-upload-schema
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-symmetric-crypto
    unless:
      - id: metadata/signed/platform/

  - id: host-profiled-upload-stealer
    desc: Host profiling with encrypted upload
    crit: hostile
    conf: 0.985
    all:
      - id: encrypted-http-upload-client
    any:
      - id: micro-behaviors/process/user/query::dotnet-user-name
      - id: micro-behaviors/os/sysinfo/hostname::dotnet-user-domain-name
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
      - id: micro-behaviors/os/sysinfo/directories::dotnet-system-directory
    needs: 3
    unless:
      - id: metadata/signed/platform/
