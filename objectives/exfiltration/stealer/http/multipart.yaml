defaults:
  platforms:
    - unix
    - windows
  attack: T1041
  crit: suspicious
  for: [scripts, binaries]
traits:
  - id: gate-var-http
    desc: gate = http variable
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: \bgate\s*=\s*["']http
  - id: c2-var-http
    desc: c2 = http variable
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: \bc2\s*=\s*["']http
  - id: panel-var-http
    desc: panel = http variable
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: \bpanel\s*=\s*["']http
composite_rules:
  - id: multipart-upload-comp
    desc: Multipart upload with stealer context
    crit: suspicious
    conf: 0.75
    all:
      - id: micro-behaviors/communications/http/headers::multipart-upload
    any:
      - id: objectives/exfiltration/stealer/http::c2-var-http
      - id: objectives/exfiltration/stealer/http::dotnet-collect-post
      - id: micro-behaviors/process/create/start-process::dotnet-process-start-info
      - id: micro-behaviors/os/sysinfo/network::dotnet-ip-global-properties
      - id: objectives/exfiltration/stealer/http::dotnet-octet-collect-post
      - id: objectives/exfiltration/stealer/http::dotnet-passwd-read
      - id: objectives/exfiltration/stealer/http::dotnet-pkg-info-collect
      - id: micro-behaviors/os/sysinfo/platform/runtime::dotnet-runtime-info
      - id: objectives/exfiltration/stealer/http::gate-var-http
      - id: objectives/exfiltration/stealer/http::name-uploadkey-field
      - id: objectives/exfiltration/stealer/http::namehashed-field
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-node-read
      - id: objectives/exfiltration/stealer/http::node-process-snapshot
      - id: objectives/exfiltration/stealer/http::panel-var-http
      - id: objectives/exfiltration/stealer/http::ruby-openbsd-collect-path
      - id: objectives/exfiltration/stealer/http::ruby-openbsd-system-probe-set
      - id: objectives/exfiltration/stealer/http::upload-v3-path
      - id: micro-behaviors/communications/http/headers::bot-headers
    unless:
      - id: metadata/file/magic/identity::pe-dos-stub
      - id: metadata/package/testing/presence/fixture/
      - id: metadata/package/testing/presence/fixture/
      - id: metadata/package/testing/presence/fixture/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::tests-path-basename
      - id: metadata/library/axios::axios-class
  - id: stealer-exfil
    desc: Stealer data exfiltration pattern
    crit: suspicious
    conf: 0.95
    mbc: C0001
    for:
      - shell
    needs: 3
    any:
      - id: micro-behaviors/communications/http/curl::curl-post
      - id: objectives/command-and-control/beacon/network/client-cli::curl-upload
      - id: micro-behaviors/communications/http/headers::bot-headers
      - id: objectives/exfiltration/stealer/http::c2-var-http
      - id: objectives/exfiltration/stealer/http::dotnet-collect-post
      - id: micro-behaviors/process/create/start-process::dotnet-process-start-info
      - id: micro-behaviors/os/sysinfo/network::dotnet-ip-global-properties
      - id: objectives/exfiltration/stealer/http::dotnet-octet-collect-post
      - id: objectives/exfiltration/stealer/http::dotnet-passwd-read
      - id: objectives/exfiltration/stealer/http::dotnet-pkg-info-collect
      - id: micro-behaviors/os/sysinfo/platform/runtime::dotnet-runtime-info
      - id: objectives/exfiltration/stealer/http::encrypted-message-field
      - id: objectives/exfiltration/stealer/http::gate-var-http
      - id: objectives/exfiltration/stealer/http::name-uploadkey-field
      - id: objectives/exfiltration/stealer/http::namehashed-field
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-node-read
      - id: objectives/exfiltration/stealer/http::node-process-snapshot
      - id: objectives/exfiltration/stealer/http::panel-var-http
      - id: objectives/exfiltration/stealer/http::ruby-openbsd-collect-path
      - id: objectives/exfiltration/stealer/http::ruby-openbsd-system-probe-set
      - id: objectives/exfiltration/stealer/http::upload-v3-path
      - id: micro-behaviors/communications/http/upload::zip-upload
