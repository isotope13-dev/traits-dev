# Keylogger with HTTP exfiltration composites
# Keyboard hooks + HTTP POST = keystroke theft
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056.001
composite_rules:
  - id: keylog-http-exfil
    desc: Keyboard hook with HTTP POST exfiltration
    crit: hostile
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
      - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
      - id: micro-behaviors/communications/http/post::wininet-post
      - id: micro-behaviors/ui/window/manage/control::get-foreground-window
    any:
      - id: micro-behaviors/hardware/input/keyboard/label::keylogger-string
      - id: micro-behaviors/hardware/input/keyboard/hook::virtual-key-label-map
      - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
    downgrade:
      all:
        - id: metadata/signed/platform/
  - id: keylog-multipart-upload
    desc: Keyboard hook with multipart form upload
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
      - id: micro-behaviors/communications/http/post::multipart-form
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
      - id: micro-behaviors/hardware/input/keyboard/hook::call-next-hook-ex
      - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
    downgrade:
      all:
        - id: metadata/signed/platform/
  - id: keylog-network-exfil
    desc: Keylogger with outbound network exfiltration
    crit: hostile
    conf: 0.94
    all:
      - id: objectives/collection/keylog/capture::windows-hook-keypoll-window-title
      - id: micro-behaviors/communications/socket/init::connect-api-ordinal
      - id: micro-behaviors/communications/http/headers::auth-header
    any:
      - id: micro-behaviors/communications/http/get::wininet-dll-import-name
      - id: micro-behaviors/communications/http/headers::basic-auth
      - id: micro-behaviors/communications/http/request/client::http-version
    needs: 2
    downgrade:
      all:
        - id: metadata/signed/platform/
