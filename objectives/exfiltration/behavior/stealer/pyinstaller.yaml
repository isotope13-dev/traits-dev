# PyInstaller-packed Python Stealer Detection
# ATT&CK: T1005 (Data from Local System)
# MBC: E1004 (Data Theft)
defaults:
  for: [pe]
composite_rules:
  - id: pyinstaller-pe-stealer
    desc: PyInstaller Python stealer (psutil recon + embedded payload)
    crit: hostile
    conf: 0.95
    attack: "T1005"
    mbc: "E1004"
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-pe-psutil-windows
    any:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-pe-embedded-exe
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-mpyimod
