defaults:
  platforms: [unix]
  for: [c, cpp]
  attack: T1048.003
  mbc: E1041

traits:
  - id: ftp-anonymous-login-sequence
    desc: FTP anonymous login sequence
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'USER anonymous\\r\\n[\s\S]{0,240}PASS [^"''\r\n]{1,80}\\r\\n'
  - id: ftp-pasv-command
    desc: FTP PASV command
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: "PASV\\r\\n"
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/package/files/dependency::native-vendor-dependency-path
  - id: ftp-stor-format-command
    desc: FTP STOR format command
    crit: notable
    conf: 0.92
    if:
      type: literal
      exact: "STOR %s\\r\\n"
  - id: ftp-sensitive-unix-files
    desc: Sensitive Unix files sent over FTP
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,260}/etc/passwd[\s\S]{0,260}/proc/version'
  - id: ftp-exfil-remote-prefix
    desc: FTP exfiltration remote filename prefix
    crit: component
    conf: 0.9
    if:
      type: literal
      substr: exfil_

composite_rules:
  - id: ftp-sensitive-host-file-exfil
    desc: FTP upload of sensitive host files
    crit: hostile
    conf: 0.98
    all:
      - id: ftp-anonymous-login-sequence
      - id: ftp-pasv-command
      - id: ftp-stor-format-command
      - id: ftp-sensitive-unix-files
      - id: ftp-exfil-remote-prefix
