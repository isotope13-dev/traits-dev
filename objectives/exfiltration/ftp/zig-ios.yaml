defaults:
  platforms: [ios]
  for: [zig]
  attack: T1048.003

traits:
  - id: zig-ftp-login-sequence
    desc: Zig FTP login sequence
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'USER anonymous\\r\\n|PASS anonymous@'

  - id: zig-ftp-stor-data-channel
    desc: Zig FTP STOR data channel
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'PASV\\r\\n|STOR \{s\}\\r\\n'

composite_rules:
  - id: zig-ios-ftp-exfiltration
    desc: Zig iOS FTP exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: zig-ftp-login-sequence
      - id: zig-ftp-stor-data-channel
      - id: micro-behaviors/communications/socket/connect::zig-tcp-connect-host
