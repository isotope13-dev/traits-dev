defaults:
  platforms: [unix]
  for: [shell]
  attack: T1048.003

traits:
  - id: shell-ftp-here-session
    desc: Shell FTP scripted session
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ftp_session=\$\(cat <<EOF[\s\S]{0,180}put \$payload'

  - id: shell-ftp-tar-dump
    desc: Shell FTP tar dump
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: dump.tar.gz

  - id: shell-ftp-target-command
    desc: Shell FTP target command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ftp -n "$TARGET_HOST"

  - id: shell-root-shadow-archive
    desc: Shell archives root secrets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'cat /etc/shadow[\s\S]{0,260}ls -laR /root'

composite_rules:
  - id: shell-ftp-secret-archive-exfil
    desc: Shell FTP secret archive exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-ftp-here-session
      - id: shell-ftp-tar-dump
      - id: shell-root-shadow-archive
      - id: shell-ftp-target-command
