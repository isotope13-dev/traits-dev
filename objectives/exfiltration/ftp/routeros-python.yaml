defaults:
  platforms: [routeros, appliance]
  for: [python]
  attack: T1048.003

traits:
  - id: python-ftplib-stor-upload
    desc: Python FTP STOR upload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ftplib\.FTP\(\)[\s\S]{0,600}storbinary'

composite_rules:
  - id: routeros-python-vpn-ftp-exfil
    desc: RouterOS Python VPN FTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/vpn/config::routeros-api-vpn-secret-query-set
      - id: python-ftplib-stor-upload
