defaults:
  platforms: [unix]
  for: [kotlin, shell, class, java_class, jar]
  attack: T1048

traits:
  - id: kotlin-ftp-hex-user-pass
    desc: Kotlin FTP hex user pass
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '55534552[\s\S]{0,220}50415353'

  - id: kotlin-ftp-user-pass-hex
    desc: Kotlin FTP user pass hex
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar, zip]
    if:
      type: hex
      pattern: 35 35 35 33 34 35 35 32

  - id: kotlin-ftp-hex-pasv-stor
    desc: Kotlin FTP hex PASV STOR
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '50415356[\s\S]{0,260}53544F52'

  - id: kotlin-ftp-pasv-stor-hex
    desc: Kotlin FTP PASV STOR hex
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar, zip]
    if:
      type: hex
      pattern: 35 33 35 34 34 46 35 32

  - id: kotlin-exfil-filename
    desc: Kotlin exfil filename
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: exfil_

  - id: kotlin-exfil-filename-hex
    desc: Kotlin exfil filename hex
    crit: suspicious
    conf: 0.9
    for: [class, java_class, jar, zip]
    if:
      type: hex
      pattern: 65 78 66 69 6C 5F

composite_rules:
  - id: kotlin-ftp-credential-exfil
    desc: Kotlin FTP credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-ftp-hex-user-pass
      - id: kotlin-ftp-hex-pasv-stor
      - id: kotlin-exfil-filename

  - id: kotlin-bytecode-ftp-exfil
    desc: Kotlin bytecode FTP exfil
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: kotlin-ftp-user-pass-hex
      - id: kotlin-ftp-pasv-stor-hex
      - id: kotlin-exfil-filename-hex
