defaults:
  platforms: [ios, unix]
  for: [python]
  attack: T1048.003

traits:
  - id: python-anonymous-exfil-login
    desc: Python anonymous exfil FTP login
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: exfil@benchmark

composite_rules:
  - id: python-ftp-credential-exfil
    desc: Python FTP credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/ftp/upload::python-ftp-storbinary-upload
      - id: python-anonymous-exfil-login
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
      - id: micro-behaviors/fs/path/sensitive/credentials::netrc
      - id: micro-behaviors/fs/path/sensitive/credentials::gcloud-credentials
