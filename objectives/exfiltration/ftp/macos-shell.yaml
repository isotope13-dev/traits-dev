defaults:
  platforms: [unix]
  for: [shell]
  attack: T1048.003

traits:
  - id: shell-curl-ftp-upload
    desc: Shell curl FTP upload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'curl -s -T [^;\n]{0,120}ftp://'

  - id: shell-tar-system-info
    desc: Shell tars system info
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'tar czf [^;\n]{0,120}system_info\.txt'

  - id: shell-keychain-ssh-archive
    desc: Shell keychain SSH archive
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'security dump-keychain[\s\S]{0,260}cat "\$HOME/\.ssh/id_rsa"'

composite_rules:
  - id: shell-macos-ftp-secret-exfil
    desc: Shell macOS FTP secret exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-curl-ftp-upload
    any:
      - id: shell-tar-system-info
      - id: shell-keychain-ssh-archive
    needs: 1
