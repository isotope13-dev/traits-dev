defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1048.003

traits:
  - id: node-basic-ftp-upload-loop
    desc: Node basic-ftp upload loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'new Client\(\)[\s\S]{0,520}uploadFrom'

  - id: node-sensitive-file-copy-list
    desc: Node sensitive file copy list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,220}/etc/shadow[\s\S]{0,220}/etc/ssh/sshd_config'

  - id: node-ssh-env-file-staging
    desc: Node SSH env file staging
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.env\.production[\s\S]{0,260}\.ssh[\s\S]{0,260}copyFileSync'

composite_rules:
  - id: node-sensitive-files-ftp-exfil
    desc: Node sensitive files FTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-basic-ftp-upload-loop
    any:
      - id: node-sensitive-file-copy-list
      - id: node-ssh-env-file-staging
    needs: 1
