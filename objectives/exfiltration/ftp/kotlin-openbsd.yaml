defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1048.003

traits:
  - id: kotlin-ftp-stor-command
    desc: Kotlin FTP STOR command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: STOR $filename

  - id: kotlin-ftp-exfil-header
    desc: Kotlin FTP exfil header
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: EXOFLTR|v1

composite_rules:
  - id: kotlin-ftp-exfiltration
    desc: Kotlin FTP exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-ftp-stor-command
      - id: kotlin-ftp-exfil-header

