defaults:
  platforms: [android, unix]
  for: [swift]
  attack: T1048

traits:
  - id: swift-curl-ftp-upload
    desc: Swift curl FTP upload
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '"curl".{0,120}"-T"'

  - id: swift-ftp-url-target
    desc: Swift FTP URL target
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "ftp://\\("

  - id: swift-ftp-pasv-command
    desc: Swift FTP PASV command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '"PASV"'

  - id: swift-ftp-stor-command
    desc: Swift FTP STOR command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '"STOR '

composite_rules:
  - id: swift-ftp-file-exfiltration
    desc: Swift FTP file exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: swift-curl-ftp-upload
      - id: swift-ftp-url-target

  - id: swift-manual-ftp-exfiltration
    desc: Swift manual FTP exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: swift-ftp-pasv-command
      - id: swift-ftp-stor-command
    any:
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
