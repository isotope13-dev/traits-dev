defaults:
  platforms: [macos]
  for: [macho, swift, objc]
  attack: T1567

traits:
  - id: telegram-message-success-string
    desc: Telegram message success text
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Message sent successfully to Telegram
  - id: telegram-error-string
    desc: Telegram send error text
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Telegramsenderror
  - id: telegram-bot-token-property
    desc: Telegram bot token property
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: telegramBotToken
  - id: telegram-channel-property
    desc: Telegram channel ID property
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: telegramChannelID

composite_rules:
  - id: telegram-bot-token-indicator
    desc: Telegram bot token indicator
    crit: suspicious
    conf: 0.92
    any:
      - id: objectives/exfiltration/messaging/telegram::telegram-bot-c2
      - id: telegram-bot-token-property
  - id: swift-telegram-json-exfil
    desc: Swift Telegram JSON exfiltration
    crit: suspicious
    conf: 0.98
    all:
      - id: objectives/exfiltration/messaging/telegram::api-endpoint
      - id: micro-behaviors/communications/http/lib/nsurlsession::nsurlsession-swift-request
      - id: micro-behaviors/data/serialize/json::swift-json-object-serialization
      - id: telegram-bot-token-indicator
    any:
      - id: telegram-message-success-string
      - id: telegram-error-string
      - id: telegram-bot-token-property
      - id: telegram-channel-property
  - id: macos-password-telegram-exfil
    desc: macOS password Telegram exfiltration
    crit: hostile
    conf: 0.995
    all:
      - id: swift-telegram-json-exfil
      - id: objectives/credential-access/phishing/lure::macos-password-phishing-prompt
