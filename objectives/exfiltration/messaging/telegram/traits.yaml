defaults:
  platforms:
    - windows
    - unix
  for: [binaries, scripts]
  attack: T1567
traits:
  - id: nock-mock
    desc: Nock HTTP mock usage
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: nock
  - id: api-endpoint
    desc: Telegram Bot API endpoint
    crit: suspicious
    conf: 0.9
    for: [binaries, scripts, rust]
    unless:
      - id: well-known/tool/sysadmin/rustdesk::rustdesk-android-package
      - id: well-known/tool/sysadmin/rustdesk::rustdesk-linux-package
      - id: test-mock-context
      - id: tqdm-progress-import
    downgrade:
      any:
        - id: well-known/tool/sysadmin/rustdesk::rustdesk-linux-package
        - id: well-known/tool/sysadmin/rustdesk::rustdesk-android-package
    if:
      type: text
      substr: api.telegram.org
  - id: send-document
    desc: Telegram sendDocument file upload
    crit: suspicious
    conf: 0.92
    for: [binaries, scripts, rust]
    unless:
      - id: test-mock-context
    if:
      type: text
      substr: /sendDocument
  - id: send-document-symbol
    desc: Telegram sendDocument method symbol
    crit: component
    conf: 0.88
    for: [binaries, scripts, rust]
    unless:
      - id: test-mock-context
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/harness/runtime::test-basename-pattern
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: text
      word: sendDocument
  - id: go-telegram-bot-api
    desc: Go Telegram Bot API package
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: github.com/go-telegram-bot-api/telegram-bot-api
  - id: go-telegram-upload-methods
    desc: Go Telegram upload workflow methods
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(UploadFiles|UploadData|NeedsUpload)\b'
  - id: go-archive-zip-package
    desc: Go archive zip package reference
    crit: component
    conf: 0.82
    if:
      type: text
      substr: archive/zip
  - id: send-message
    desc: Telegram sendMessage API call
    crit: suspicious
    conf: 0.85
    for: [binaries, scripts, rust]
    unless:
      - id: well-known/tool/sysadmin/rustdesk::rustdesk-android-package
      - id: well-known/tool/sysadmin/rustdesk::rustdesk-linux-package
      - id: test-mock-context
      - id: tqdm-progress-import
    downgrade:
      any:
        - id: well-known/tool/sysadmin/rustdesk::rustdesk-linux-package
        - id: well-known/tool/sysadmin/rustdesk::rustdesk-android-package
    if:
      type: text
      substr: /sendMessage
  - id: send-photo
    desc: Telegram sendPhoto API call
    crit: suspicious
    conf: 0.85
    for: [binaries, scripts, rust]
    unless:
      - id: test-mock-context
    if:
      type: text
      substr: /sendPhoto
  - id: bot-token-pattern
    desc: Hardcoded Telegram bot API path with token
    crit: suspicious
    conf: 0.95
    for: [binaries, scripts, rust]
    if:
      type: text
      regex: api\.telegram\.org/bot\d{8,12}:[A-Za-z0-9_-]{35}
    not:
      - substr: api.telegram.org/bot0123456789:ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefgh
      - substr: api.telegram.org/bot01234567:abcdefghijklmn_ABCDEFGH
      - substr: UseSTD3RulesAccept-
      - regex: api\.telegram\.org/bot\d+:\d+$
      - regex: api\.telegram\.org/bot\d{8}:[0-9a-f]{24,35}
  - id: api-endpoint-b64-fragment
    desc: Base64 Telegram API endpoint fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: YXBpL
  - id: telegram-domain-b64-fragment
    desc: Base64 Telegram domain fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: nRlbGVnc
  - id: telegram-bot-path-b64-fragment
    desc: Base64 Telegram bot path fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: m9yZy9ib3Q
  - id: send-document-b64-fragment
    desc: Base64 sendDocument fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: VuZERvY3VtZW
  - id: seeds-txt-b64-fragment
    desc: Base64 seeds.txt filename fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: lZHMudHh0YC
  - id: bot-user-agent
    desc: Bot-identifying HTTP user agent
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)\b(system\s*info|stealer|grabber|bot)[/ ]\d+\.\d+
  - id: telegram-zip-comment
    desc: Telegram bot archive comment
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Bot Telegram
  - id: tqdm-progress-import
    desc: tqdm progress library import
    crit: component
    conf: 0.99
    for: [python]
    if:
      type: text
      regex: '(from tqdm[. ]|import tqdm[. \n])'
composite_rules:
  - id: telegram-sendmessage-exfil
    desc: Telegram sendMessage bot API usage
    crit: suspicious
    conf: 0.92
    for: [scripts, source]
    unless:
      - id: test-mock-context
      - id: tqdm-progress-import
    all:
      - id: api-endpoint
      - id: send-message
  - id: test-mock-context
    desc: Telegram API mock test fixture
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    all:
      - id: nock-mock
    any:
      - id: metadata/package/testing/presence/fixture::mocha-test-file
      - id: metadata/package/testing/presence/fixture::jest-test-file
      - id: metadata/package/testing/harness/runtime::test-basename-prefix
      - id: metadata/package/testing/harness/runtime::test-basename-suffix
      - id: metadata/package/testing/harness/runtime::test-basename-spec
  - id: telegram-bot-exfil
    desc: Telegram bot API file exfiltration
    crit: hostile
    conf: 0.95
    for: [binaries, scripts, c, cpp]
    unless:
      - id: test-mock-context
    all:
      - id: api-endpoint
    any:
      - id: send-document
      - id: send-document-symbol
      - id: send-photo
      - id: go-telegram-upload-methods
  - id: telegram-bot-c2
    desc: Telegram bot API data exfiltration
    crit: hostile
    conf: 0.92
    near_bytes: 256
    all:
      - id: api-endpoint
      - id: bot-token-pattern
    unless:
    - id: test-mock-context
  - id: telegram-bot-encoded-file-exfil
    desc: Encoded Telegram bot file exfiltration
    crit: hostile
    conf: 0.96
    for: [powershell]
    all:
      - id: api-endpoint-b64-fragment
      - id: telegram-domain-b64-fragment
      - id: telegram-bot-path-b64-fragment
      - id: send-document-b64-fragment
      - id: seeds-txt-b64-fragment
  - id: telegram-archive-exfil
    desc: Archive exfiltration via Telegram
    crit: hostile
    conf: 0.96
    all:
      - id: telegram-bot-exfil
    any:
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-class
      - id: telegram-zip-comment
      - id: metadata/import/python::zipfile
      - id: objectives/collection/archive/create::zip-output-file
      - id: objectives/collection/archive/upload::zip-upload-comp
      - id: go-archive-zip-package
      - id: go-telegram-upload-methods
  - id: go-telegram-archive-exfil
    desc: Go Telegram bot archive exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: api-endpoint
      - id: go-telegram-bot-api
      - id: go-telegram-upload-methods
      - id: go-archive-zip-package
