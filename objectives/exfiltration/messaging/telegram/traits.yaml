defaults:
  platforms:
    - windows
    - unix
  for: [binaries, scripts]
  attack: T1567
traits:
  - id: nock-mock
    desc: Nock HTTP mock usage
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: nock
  - id: api-endpoint
    desc: Telegram Bot API endpoint
    crit: suspicious
    conf: 0.9
    unless:
      - id: test-mock-context
    if:
      type: text
      substr: api.telegram.org
  - id: send-document
    desc: Telegram sendDocument file upload
    crit: suspicious
    conf: 0.92
    unless:
      - id: test-mock-context
    if:
      type: text
      substr: /sendDocument
  - id: send-message
    desc: Telegram sendMessage API call
    crit: suspicious
    conf: 0.85
    unless:
      - id: test-mock-context
    if:
      type: text
      substr: /sendMessage
  - id: send-photo
    desc: Telegram sendPhoto API call
    crit: suspicious
    conf: 0.85
    unless:
      - id: test-mock-context
    if:
      type: text
      substr: /sendPhoto
  - id: bot-token-pattern
    desc: Hardcoded Telegram bot token
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \d{8,12}:[A-Za-z0-9_-]{35}
    unless:
      - type: text
        substr: 'arn:aws:'
    not:
      - substr: 0123456789:ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefgh
      - substr: 01234567:abcdefghijklmn_ABCDEFGH
      - substr: UseSTD3RulesAccept-
      - regex: ^\d+:\d+$
      - regex: \d{8}:[0-9a-f]{24,35}
  - id: api-endpoint-b64-fragment
    desc: Base64 Telegram API endpoint fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: YXBpL
  - id: telegram-domain-b64-fragment
    desc: Base64 Telegram domain fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: nRlbGVnc
  - id: telegram-bot-path-b64-fragment
    desc: Base64 Telegram bot path fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: m9yZy9ib3Q
  - id: send-document-b64-fragment
    desc: Base64 sendDocument fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: VuZERvY3VtZW
  - id: seeds-txt-b64-fragment
    desc: Base64 seeds.txt filename fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: lZHMudHh0YC
  - id: bot-user-agent
    desc: Bot-identifying HTTP user agent
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)\b(system\s*info|stealer|grabber|bot)[/ ]\d+\.\d+
  - id: telegram-zip-comment
    desc: Telegram bot archive comment
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Bot Telegram
composite_rules:
  - id: test-mock-context
    desc: Telegram API mock test fixture
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    all:
      - id: nock-mock
    any:
      - id: metadata/package/testing/presence::mocha-test-file
      - id: metadata/package/testing/presence::jest-test-file
      - id: metadata/package/testing/harness::test-basename-prefix
      - id: metadata/package/testing/harness::test-basename-suffix
      - id: metadata/package/testing/harness::test-basename-spec
  - id: telegram-bot-exfil
    desc: Telegram bot API file exfiltration
    crit: hostile
    conf: 0.95
    unless:
      - id: test-mock-context
    all:
      - id: api-endpoint
    any:
      - id: send-document
      - id: send-photo
  - id: telegram-bot-c2
    desc: Telegram bot API data exfiltration
    crit: suspicious
    conf: 0.92
    near_bytes: 256
    all:
      - id: api-endpoint
      - id: bot-token-pattern
  - id: telegram-bot-encoded-file-exfil
    desc: Encoded Telegram bot file exfiltration
    crit: hostile
    conf: 0.96
    for: [powershell]
    all:
      - id: api-endpoint-b64-fragment
      - id: telegram-domain-b64-fragment
      - id: telegram-bot-path-b64-fragment
      - id: send-document-b64-fragment
      - id: seeds-txt-b64-fragment
  - id: telegram-archive-exfil
    desc: Archive exfiltration via Telegram
    crit: hostile
    conf: 0.96
    all:
      - id: telegram-bot-exfil
    any:
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-class
      - id: telegram-zip-comment
      - id: metadata/import/python::zipfile
      - id: objectives/collection/archive::zip-output-file
      - id: objectives/collection/archive::zip-upload-comp
