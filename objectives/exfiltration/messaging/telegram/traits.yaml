defaults:
  platforms:
    - windows
    - unix
  for: [binaries, scripts]
  attack: T1567
traits:
  - id: api-endpoint
    desc: Telegram Bot API endpoint
    crit: component
    conf: 0.9
    for: [binaries, scripts, rust]
    unless:
      - id: well-known/tool/sysadmin/rustdesk::rustdesk-android-package
      - id: well-known/tool/sysadmin/rustdesk::rustdesk-linux-package
      - id: test-mock-context
      - id: metadata/library/data::tqdm-progress-import
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-api-client
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-library-context
    if:
      type: text
      substr: api.telegram.org
  - id: send-document
    desc: Telegram sendDocument file upload
    crit: component
    conf: 0.92
    for: [binaries, scripts, rust]
    unless:
      - id: test-mock-context
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-api-client
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-library-context
      - id: well-known/app/opencode-router
    if:
      type: text
      substr: /sendDocument
  - id: send-document-symbol
    desc: Telegram sendDocument method symbol
    crit: component
    conf: 0.88
    for: [binaries, scripts, rust]
    unless:
      - id: test-mock-context
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/harness/runtime::test-basename-pattern
      - id: metadata/package/testing/harness/runtime::is-test
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-api-client
      - id: well-known/app/opencode-router
    if:
      type: text
      word: sendDocument
  - id: go-telegram-bot-api
    desc: Go Telegram Bot API package
    crit: component
    conf: 0.9
    if:
      type: text
      substr: github.com/go-telegram-bot-api/telegram-bot-api
  - id: go-telegram-upload-methods
    desc: Go Telegram upload workflow methods
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(UploadFiles|UploadData|NeedsUpload)\b'
  - id: go-archive-zip-package
    desc: Go archive zip package reference
    crit: component
    conf: 0.82
    if:
      type: text
      substr: archive/zip
  - id: send-message
    desc: Telegram sendMessage API call
    crit: component
    conf: 0.85
    for: [binaries, scripts, rust]
    unless:
      - id: well-known/tool/sysadmin/rustdesk::rustdesk-android-package
      - id: well-known/tool/sysadmin/rustdesk::rustdesk-linux-package
      - id: test-mock-context
      - id: metadata/library/data::tqdm-progress-import
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-api-client
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-library-context
    if:
      type: text
      substr: /sendMessage
  - id: go-api-endpoint
    desc: Go Telegram Bot API endpoint
    crit: component
    conf: 0.9
    for: [go]
    if:
      type: text
      substr: api.telegram.org
  - id: go-send-message
    desc: Go Telegram sendMessage API call
    crit: component
    conf: 0.85
    for: [go]
    if:
      type: text
      substr: /sendMessage
  - id: send-photo
    desc: Telegram sendPhoto API call
    crit: component
    conf: 0.85
    for: [binaries, scripts, rust]
    unless:
      - id: test-mock-context
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-api-client
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-library-context
      - id: well-known/app/opencode-router
    if:
      type: text
      substr: /sendPhoto
  - id: bot-token-pattern
    desc: Hardcoded Telegram bot API path with token
    crit: suspicious
    conf: 0.95
    for: [binaries, scripts, rust]
    if:
      type: text
      regex: api\.telegram\.org/bot\d{8,12}:[A-Za-z0-9_-]{35}
    not:
      - substr: api.telegram.org/bot0123456789:ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefgh
      - substr: api.telegram.org/bot01234567:abcdefghijklmn_ABCDEFGH
      - substr: UseSTD3RulesAccept-
      - regex: api\.telegram\.org/bot\d+:\d+$
      - regex: api\.telegram\.org/bot\d{8}:[0-9a-f]{24,35}
  - id: python-hardcoded-bot-token
    desc: Hardcoded Telegram bot token literal
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '["'']\d{8,12}:[A-Za-z0-9_-]{30,60}["'']'
  - id: pytelegrambotapi-telebot-client
    desc: pyTelegramBotAPI TeleBot client
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '\btelebot\.TeleBot\s*\('
  - id: python-telegram-send-document-method
    desc: Python Telegram send_document method
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '\.send_document\s*\('
  - id: sensitive-document-name-targets
    desc: Sensitive document filename targets
    crit: component
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: 'passwords\.txt|credentials\.txt|\.docx|\.xlsx'
  - id: api-endpoint-b64-fragment
    desc: Base64 Telegram API endpoint fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: YXBpL
  - id: telegram-domain-b64-fragment
    desc: Base64 Telegram domain fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: nRlbGVnc
  - id: telegram-bot-path-b64-fragment
    desc: Base64 Telegram bot path fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: m9yZy9ib3Q
  - id: send-document-b64-fragment
    desc: Base64 sendDocument fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: VuZERvY3VtZW
  - id: seeds-txt-b64-fragment
    desc: Base64 seeds.txt filename fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: text
      substr: lZHMudHh0YC
  - id: bot-user-agent
    desc: Bot-identifying HTTP user agent
    crit: suspicious
    conf: 0.85
    if:
      type: text
      # Require the User-Agent slash form (Bot/1.0); the space form matched
      # benign version phrases like "bot 4.0" (a WAF bot-management version).
      regex: (?i)\b(system\s*info|stealer|grabber|bot)/\d+\.\d+
  - id: telegram-zip-comment
    desc: Telegram bot archive comment
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Bot Telegram
composite_rules:
  - id: telegram-sendmessage-exfil
    desc: Telegram sendMessage bot API usage
    crit: notable
    conf: 0.92
    for: [scripts, source]
    unless:
      - id: well-known/tool/detection/malware-config-parser
      - id: test-mock-context
      - id: metadata/library/data::tqdm-progress-import
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-api-client
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-library-context
      - id: well-known/app/opencode-router
      - id: micro-behaviors/communications/http/services/telegram::python-telegram-tool-context
    all:
      - id: api-endpoint
      - id: send-message
  - id: telegram-sendmessage-go-exfil
    desc: Go Telegram sendMessage bot API usage
    crit: notable
    conf: 0.92
    for: [go]
    all:
      - id: go-api-endpoint
      - id: go-send-message
  - id: telegram-sendmessage-macho-exfil
    desc: Mach-O Telegram sendMessage bot API usage
    crit: notable
    conf: 0.92
    for: [macho]
    unless:
      - id: well-known/tool/detection/malware-config-parser
      - id: test-mock-context
      - id: metadata/library/data::tqdm-progress-import
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-api-client
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-library-context
      - id: well-known/app/opencode-router
    all:
      - id: api-endpoint
      - id: send-message
  - id: telegram-wallet-search-exfil
    desc: Telegram exfiltrates wallet search results
    crit: hostile
    conf: 0.98
    for: [scripts, source, macho]
    near_bytes: 8192
    all:
      - id: telegram-wallet-search-source
    any:
      - id: telegram-sendmessage-exfil
      - id: telegram-sendmessage-go-exfil
      - id: telegram-sendmessage-macho-exfil
  - id: telegram-wallet-search-source
    desc: Wallet search results source
    crit: component
    for: [scripts, source, macho]
    any:
      - id: objectives/collection/stealer/wallet::crypto-wallet-shell-find
      - id: objectives/collection/stealer/wallet::crypto-wallet-powershell-search
      - id: objectives/collection/stealer/wallet::crypto-wallet-macho-shell-find
  - id: telegram-system-profile-exfil
    desc: Telegram exfiltrates system profile
    crit: suspicious
    conf: 0.94
    for: [javascript, typescript]
    near_bytes: 8192
    all:
      - id: telegram-sendmessage-exfil
    any:
      - id: objectives/exfiltration/http/upload::node-system-info-source
      - id: objectives/discovery/system/fingerprint/hardware::js-sysinfo-multi
      - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
      - id: objectives/discovery/system/fingerprint/hardware::process-fingerprint-multi
  - id: test-mock-context
    desc: Telegram API mock test fixture
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    all:
      - id: metadata/package/testing/harness/fixture::nock-mock
    any:
      - id: metadata/package/testing/presence/fixture::mocha-test-file
      - id: metadata/package/testing/presence/fixture::jest-test-file
      - id: metadata/package/testing/harness/runtime::test-basename-prefix
      - id: metadata/package/testing/harness/runtime::test-basename-suffix
      - id: metadata/package/testing/harness/runtime::test-basename-spec
  - id: telegram-bot-exfil
    desc: Telegram Bot API file upload
    crit: notable
    conf: 0.95
    for: [binaries, scripts, c, cpp]
    unless:
      - id: test-mock-context
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-api-client
      - id: micro-behaviors/communications/http/services/telegram::telegram-bot-library-context
      - id: well-known/app/opencode-router
      - id: micro-behaviors/communications/http/services/telegram::python-telegram-tool-context
    all:
      - id: api-endpoint
    any:
      - id: send-document
      - id: send-document-symbol
      - id: send-photo
      - id: go-telegram-upload-methods
  - id: telegram-bot-c2
    desc: Telegram bot API data exfiltration
    crit: hostile
    conf: 0.92
    near_bytes: 256
    all:
      - id: api-endpoint
      - id: bot-token-pattern
    unless:
    - id: test-mock-context
  - id: python-telegram-hardcoded-bot
    desc: Python Telegram bot with hardcoded token
    crit: suspicious
    conf: 0.96
    for: [python]
    all:
      - id: pytelegrambotapi-telebot-client
      - id: python-hardcoded-bot-token
  - id: python-telegram-file-exfil
    desc: Python Telegram file exfiltration
    crit: suspicious
    conf: 0.96
    for: [python]
    all:
      - id: pytelegrambotapi-telebot-client
      - id: python-telegram-send-document-method
  - id: python-telegram-sensitive-file-theft
    desc: Python Telegram sensitive file theft
    crit: hostile
    conf: 0.98
    for: [python]
    all:
      - id: python-telegram-hardcoded-bot
      - id: python-telegram-file-exfil
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
      - id: sensitive-document-name-targets
  - id: telegram-bot-encoded-file-exfil
    desc: Encoded Telegram bot file exfiltration
    crit: hostile
    conf: 0.96
    for: [powershell]
    all:
      - id: api-endpoint-b64-fragment
      - id: telegram-domain-b64-fragment
      - id: telegram-bot-path-b64-fragment
      - id: send-document-b64-fragment
      - id: seeds-txt-b64-fragment
  - id: telegram-archive-exfil
    desc: Archive exfiltration via Telegram
    crit: hostile
    conf: 0.96
    all:
      - id: telegram-bot-exfil
    any:
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-class
      - id: telegram-zip-comment
      - id: metadata/import/python::zipfile
      - id: objectives/collection/archive/create::zip-output-file
      - id: objectives/collection/archive/upload::zip-upload-comp
      - id: go-archive-zip-package
      - id: go-telegram-upload-methods
  - id: go-telegram-archive-exfil
    desc: Go Telegram bot archive exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: api-endpoint
      - id: go-telegram-bot-api
      - id: go-telegram-upload-methods
      - id: go-archive-zip-package
