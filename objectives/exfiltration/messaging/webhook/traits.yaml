defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1041
  mbc: B0030
  for: [scripts, binaries]
traits:
  - id: slack-webhook-url
    desc: Slack webhook URL
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: '(^|[^A-Za-z0-9-])hooks\.slack\.com/services/[A-Z0-9]{8,}/[A-Z0-9]{8,}/[A-Za-z0-9]{16,}'
    not:
      - regex: 'hooks\.slack\.com/services/T0{8}/B0{8}/X{16,}'
  - id: slack-incoming-webhook
    desc: Slack webhook service URL
    crit: component
    conf: 0.85
    if:
      type: string_literal
      regex: 'hooks\.slack\.com/services/[A-Z0-9]{8,}/[A-Z0-9]{8,}/[A-Za-z0-9]{16,}'
    not:
      - substr: "slack.com/apps/new/"
      - substr: "hooks.slack.com/services/..."
      - substr: "https://hooks.slack.com/"
      - regex: 'hooks\.slack\.com/services/T0{8}/B0{8}/X{16,}'
  - id: discord-webhook-pattern
    desc: Discord webhook wording or configuration
    crit: component
    conf: 0.85
    if:
      type: string_literal
      regex: discord.{0,50}webhook|webhook.{0,50}discord
    not:
      - regex: discord(app)?\.com/api
      - substr: 'discord\.com|discordapp\.com'
      - substr: discord://webhook_id/webhook_token
  - id: send-message-channel-class-marker
    desc: SendMessageChannel class marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: SendMessageChannel
  - id: builtin-http-transports-doc-marker
    desc: Built-in HTTP transports documentation marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: built-in HTTP transports
  - id: webhook-channel-url-validation-marker
    desc: Webhook URL validation message marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: webhook channel requires 'webhook_url'
  - id: telegram-bot-api
    desc: Telegram bot API URL
    crit: component
    conf: 0.9
    if:
      type: string_literal
      regex: api\.telegram\.org/bot
    unless:
      - id: metadata/library/data::tqdm-progress-import
      - id: micro-behaviors/communications/http/services/telegram/
      - id: micro-behaviors/communications/http/services/telegram/
  - id: generic-webhook-url
    desc: Generic webhook URL pattern
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: https?://.{0,40}/(webhook|hooks)/
    unless:
      - id: script-hook-download-url-marker
      - id: metadata/package/testing/
      - id: objectives/exfiltration/messaging/webhook/
      - id: metadata/package/quality/false-positives::benign-app-fp-context
  - id: script-hook-download-url-marker
    desc: Script hook download URL marker
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      regex: 'https?://.{1,160}/hooks/.{1,160}\.(sh|bash|ps1)\b'
  - id: easypanel-node-meta-webhook
    desc: Easypanel node-meta webhook
    crit: suspicious
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: easypanel.host/webhook/t/e/s/t/e/node-meta/ads
    unless:
      - id: metadata/package/testing/
      - id: objectives/exfiltration/messaging/webhook/
      - id: metadata/package/quality/false-positives::benign-app-fp-context
      - id: objectives/exfiltration/messaging/webhook/
  - id: licensekey-credential-field
    desc: licenseKey credential field
    crit: component
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      substr: licenseKey
  - id: chaveaion-request-field
    desc: chaveAion request field
    crit: suspicious
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: chaveAion
    unless:
      - id: metadata/package/testing/
  - id: webhook-hostname-field-forward
    desc: Webhook followed by hostname payload field
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(webhook|hooks)[\s\S]{0,160}["'']hostname["'']\s*:'
  - id: webhook-hostname-field-reverse
    desc: Hostname payload field followed by webhook
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '["'']hostname["'']\s*:[\s\S]{0,160}(webhook|hooks)'
  - id: webhook-ip-field-forward
    desc: Webhook followed by IP payload field
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(webhook|hooks)[\s\S]{0,160}["'']ip["'']\s*:'
  - id: webhook-ip-field-reverse
    desc: IP payload field followed by webhook
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '["'']ip["'']\s*:[\s\S]{0,160}(webhook|hooks)'
  - id: webhook-with-system-data-curl
    desc: curl webhook JSON post pattern
    crit: component
    conf: 0.95
    if:
      type: text
      regex: \bcurl\b.{0,50}webhook.{0,50}json
composite_rules:
  - id: webhook-with-system-data-host-1
    desc: "Webhook payload includes host identity field"
    crit: suspicious
    conf: 0.95
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
      - id: well-known/app/remotepower::documented-rmm-release-context
    any:
      - id: webhook-hostname-field-forward
      - id: webhook-hostname-field-reverse
  - id: webhook-with-system-data-host-2
    desc: "Webhook payload includes network identity field"
    crit: suspicious
    conf: 0.95
    unless:
      - id: well-known/app/remotepower::documented-rmm-release-context
    any:
      - id: webhook-ip-field-forward
      - id: webhook-ip-field-reverse
  - id: webhook-notification-settings-marker
    desc: User-configured notification webhook marker
    crit: component
    conf: 0.95
    any:
      - id: webhook-notification-word-marker
      - id: webhook-config-word-marker
  - id: webhook-notification-word-marker
    desc: Notification webhook wording
    crit: component
    conf: 0.94
    all:
      - id: micro-behaviors/ui/window/notify/keywords::notification-alert-word
      - id: micro-behaviors/communications/http/keywords::webhook-service-word
    near_bytes: 256
  - id: webhook-config-word-marker
    desc: Configured webhook wording
    crit: component
    conf: 0.9
    all:
      - id: micro-behaviors/ui/window/notify/keywords::notification-config-word
      - id: micro-behaviors/communications/http/keywords::webhook-service-word
    near_bytes: 256
  - id: slack-exfiltration
    desc: Slack webhook exfiltration
    crit: suspicious
    conf: 0.95
    for:
      - python
      - shell
    any:
      - id: slack-webhook-url
      - id: slack-incoming-webhook
    unless:
      - id: well-known/tool/detection/
  - id: discord-exfiltration
    desc: Discord webhook receives potentially sensitive data
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/webhook::discord-webhook-path
    any:
      - id: objectives/credential-access
      - id: objectives/collection/stealer
      - id: objectives/collection/keylog
      - id: micro-behaviors/fs/path/sensitive/credentials
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/detection/
      - id: send-message-channel-class-marker
      - id: builtin-http-transports-doc-marker
      - id: webhook-channel-url-validation-marker
  - id: discord-host-fingerprint-exfiltration
    desc: Discord webhook host fingerprint exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: discord-exfiltration
    any:
      - id: objectives/discovery/system/fingerprint/machine-id::machine-id-collection
      - id: micro-behaviors/communications/http/ip-discovery::multi-ip-discovery
      - id: objectives/discovery/host/geo::ipify-api-comp
      - id: objectives/discovery/host/geo::victim-profiling
      - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
    needs: 2
  - id: discord-browser-profile-exfiltration
    desc: Discord webhook browser profile exfiltration
    crit: hostile
    conf: 0.96
    for: [javascript, typescript, chrome-manifest, crx]
    scope: archive
    all:
      - id: discord-exfiltration
      - id: micro-behaviors/os/sysinfo/platform/browser::navigator-platform-read
      - id: micro-behaviors/data/db/web-storage::chrome-storage-session-get
    any:
      - id: micro-behaviors/data/db/web-storage::chrome-storage-session-set
      - id: micro-behaviors/data/db/web-storage::chrome-storage-session-access-level
      - id: metadata/permission/host::broad-host-access
  - id: browser-extension-session-cookie-discord-upload
    desc: Browser extension sends session-cookie-backed content to Discord
    crit: hostile
    conf: 0.99
    attack: T1539,T1041,T1567.004
    scope: archive
    for: [archives]
    all:
      - id: discord-exfiltration
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-get
      - id: metadata/permission/cookie::permission-cookies
      - id: micro-behaviors/communications/http/post::javascript-formdata-file-field
  - id: discord-keylogger-exfiltration
    desc: Discord webhook keylogger exfiltration
    crit: hostile
    conf: 0.98
    for: [python, pyc]
    all:
      - id: discord-exfiltration
      - id: objectives/collection/keylog/capture::python-keylogger-file
  - id: webhook-c2-channel
    desc: Webhook C2 exfiltration channel
    crit: suspicious
    conf: 0.98
    attack: T1567
    for:
      - python
      - javascript
    needs: 2
    any:
      - id: slack-exfiltration
      - id: discord-exfiltration
      - id: webhook-with-system-data
    unless:
      - id: metadata/package/testing/
      - id: objectives/exfiltration/messaging/webhook/
      - id: metadata/package/quality/false-positives::benign-app-fp-context
      - id: well-known/tool/detection/
  - id: webhook-with-system-data
    desc: Webhook with system data
    crit: suspicious
    conf: 0.95
    any:
      - id: webhook-with-system-data-host-1
      - id: webhook-with-system-data-host-2
      - id: webhook-with-system-data-curl
  - id: license-validator-webhook
    desc: External webhook validates supplied license
    crit: hostile
    conf: 0.97
    for: [javascript, typescript]
    all:
      - id: generic-webhook-url
      - id: easypanel-node-meta-webhook
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: licensekey-credential-field
    any:
      - id: chaveaion-request-field
      - id: micro-behaviors/communications/http/request/client::http-config-body
    unless:
      - id: metadata/package/testing/
  - id: webhook-license-credential-exfil
    desc: Posts supplied license credential to webhook
    crit: hostile
    conf: 0.995
    for: [javascript, typescript]
    all:
      - id: license-validator-webhook
      - id: chaveaion-request-field
    unless:
      - id: metadata/package/testing/
