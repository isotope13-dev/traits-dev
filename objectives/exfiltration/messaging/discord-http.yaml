defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell]

traits:
  # https.request to Discord webhook
- id: https-request-discord-webhook
  desc: https.request to Discord webhook
  crit: suspicious
  conf: 0.97
  attack: "T1041"
  mbc: "E1041"
  if:
    type: text
    regex: "require\\(['\"]https['\"]\\)\\.request\\([^)]{0,50}https://discord\\.com/api/webhooks"

  # Discord webhook URL with https.request
- id: discord-request-builder
  desc: Discord webhook request builder
  crit: suspicious
  conf: 0.96
  attack: "T1567"
  if:
    type: text
    regex: "discord\\.com/api/webhooks[^'\"]{0,100}['\"]?\\s*,?\\s*\\{\\s*method"

  # HTTPS POST for exfiltration  
- id: https-post-exfil
  desc: HTTPS POST data exfiltration
  crit: suspicious
  conf: 0.93
  attack: "T1041"
  if:
    type: text
    regex: "require\\(['\"]https['\"]\\)\\.request[^}]{0,50}method['\"]:\\s*['\"]POST"

composite_rules:
  # Hostile: Complete Discord exfiltration chain
- id: discord-http-exfil-chain
  desc: Discord webhook HTTPS exfiltration
  crit: hostile
  conf: 0.98
  attack: "T1567"
  mbc: "E1041"
  all:
  - id: https-request-discord-webhook
  any:
  - id: https-post-exfil
  - id: micro-behaviors/data/serialize/json::json-stringify-call
- id: discord-webhook-system-info
  desc: Discord webhook system info exfiltration
  crit: hostile
  conf: 0.98
  attack: "T1041"
  mbc: "E1041"
  for: [shell]
  all:
  - id: micro-behaviors/communications/http/webhook::discord-webhook-path-any
  - id: micro-behaviors/communications/http/post::post-method-detection
  - id: micro-behaviors/os/env/vars/cicd::shell-system-fingerprinting
  any:
  - id: micro-behaviors/os/sysinfo/platform/arch::os-release-read
  - id: micro-behaviors/process/user/query::id-cmd-shell
