defaults:
  platforms: [windows, unix]
  for: [class, jar, zip]
  attack: "T1567.002"
  mbc: "E1041"
traits:
- id: java-system-property-user
  desc: Java username property collection
  crit: component
  conf: 0.88
  if:
    type: text
    exact: user.name
- id: java-system-property-os
  desc: Java OS property collection
  crit: component
  conf: 0.88
  if:
    type: text
    exact: os.name
- id: discord-embed-json-payload
  desc: Discord embed JSON payload
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '"embeds".{0,120}"fields".{0,120}"inline"'
composite_rules:
- id: java-discord-system-status-exfil
  desc: Java Discord system status exfiltration
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/communications/http/webhook::discord-webhook-path-raw
  - id: micro-behaviors/communications/http/lib/urlconnection::request-java-bytecode
  - id: micro-behaviors/communications/http/post::java-json-post
  - id: discord-embed-json-payload
  any:
  - id: java-system-property-user
  - id: java-system-property-os
