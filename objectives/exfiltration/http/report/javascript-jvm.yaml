defaults:
  platforms: [routeros, appliance, unix]
  for: [javascript]
  attack: T1041

traits:
  - id: js-jvm-report-post-body
    desc: JS JVM report POST body
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'score=[\s\S]{0,160}indicators=[\s\S]{0,360}setRequestMethod\("POST"\)'

  - id: js-jvm-http-output-body
    desc: JS JVM HTTP output body
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'setDoOutput\(true\)[\s\S]{0,420}getOutputStream\(\)[\s\S]{0,260}writeBytes'

composite_rules:
  - id: js-jvm-sandbox-report-exfil
    desc: JS JVM sandbox report exfil
    crit: hostile
    conf: 0.98
    all:
      - id: js-jvm-report-post-body
      - id: js-jvm-http-output-body
