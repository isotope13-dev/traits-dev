# A mail client's remote diagnostic logger transmits its messages by embedding
# them in a URL path, and one of the serialized values is the IMAP account
# configuration block -- which carries the account's plaintext password.
# The logger receives an IMAP configuration object that includes its plaintext
# password and transmits it in an encoded URL path. That is a credential leak
# to a remote service, independent of whether the author calls it diagnostics.
defaults:
  platforms: [android, windows, unix]
  for: [javascript, typescript]
  attack: T1552

traits:
  - id: imap-config-passed-to-remote-logger
    desc: Passes IMAP JSON to a function
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]{0,24}\s*\(.{0,180}JSON\.stringify\(.{0,100}\.imap'

composite_rules:
  - id: imap-credential-config-http-report
    desc: IMAP password config sent in URL path
    crit: hostile
    conf: 0.98
    attack: T1041,T1552
    all:
      - id: micro-behaviors/communications/email/access/imap::account-password-field
      - id: micro-behaviors/communications/email/access/imap::account-imap-config-serialization
      - id: micro-behaviors/communications/http/url/path::fetch-encoded-template-path

  - id: imap-config-remote-logger-exfiltration
    desc: IMAP config JSON sent to remote logger
    crit: hostile
    conf: 0.99
    attack: T1041,T1552
    all:
      - id: imap-config-passed-to-remote-logger
      - id: micro-behaviors/communications/http/url/path::fetch-encoded-template-path
