# A mail client's remote diagnostic logger transmits its messages by embedding
# them in a URL path, and one of the serialized values is the IMAP account
# configuration block -- which carries the account's plaintext password.
# Suspicious rather than hostile: this is equally the shape of over-verbose
# debug logging (a real defect that leaks credentials into server access logs)
# and of a deliberate credential-report channel. The atoms below only describe
# the credential read, the serialization, and the URL-path transport; nothing
# here infers that the endpoint is attacker-controlled.
defaults:
  platforms: [android, windows, unix]
  for: [javascript, typescript]
  attack: T1552

composite_rules:
  - id: imap-credential-config-http-report
    desc: IMAP password config sent to remote log URL
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/email/access/imap::account-password-field
      - id: micro-behaviors/communications/email/access/imap::account-imap-config-serialization
      - id: micro-behaviors/communications/http/url/path::fetch-encoded-template-path
