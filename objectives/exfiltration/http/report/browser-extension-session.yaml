# Session material forwarded by an extension through a callback navigation and
# an HTML form POST.  The atoms describe the transport; the hostile rule also
# requires credential collection from the companion extension files.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html, crx, zip, archives]
  attack: T1041,T1539

traits:
  - id: extension-session-data-url-forward
    desc: Encodes session response for navigation
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: 'encodeURIComponent\s*\(\s*response\.data\s*\)'

  - id: extension-callback-action
    desc: Sets callback form action from a URL
    crit: notable
    conf: 0.97
    for: [javascript, typescript, html]
    if:
      type: text
      regex: 'form\.action\s*=\s*callbackUrl'
  - id: extension-callback-session-field
    desc: Places session data in a form field
    crit: notable
    conf: 0.95
    for: [javascript, typescript, html]
    if:
      type: text
      regex: 'sessionInput\.value|name=["'']session["'']'
composite_rules:
  - id: extension-collected-session-callback-exfil
    desc: Extension forwards collected authenticated session data through a callback form
    crit: hostile
    conf: 0.995
    attack: T1041,T1539,T1528
    scope: archive
    for: [crx, zip, archives]
    all:
      - id: micro-behaviors/data/db/web-storage::browser-storage-sweep-loop
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-get-all
      - id: metadata/permission/cookie::permission-cookies
      - id: extension-session-data-url-forward
      - id: extension-callback-action
      - id: extension-callback-session-field
      - id: micro-behaviors/ui/window/manage/dom::browser-form-submit
      - id: micro-behaviors/browser-extension/tabs::chrome-tabs-create
      - id: micro-behaviors/communications/http/url/domain::js-remote-host-url
    any:
      - id: micro-behaviors/communications/http/oauth::access-token
      - id: micro-behaviors/communications/http/oauth::refresh-token
  - id: extension-callback-form-session-post
    desc: Callback form posts session data
    crit: notable
    conf: 0.98
    near_lines: 40
    all:
      - id: extension-callback-action
      - id: extension-callback-session-field
      - id: micro-behaviors/ui/window/manage/dom::browser-form-submit
