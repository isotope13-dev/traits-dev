# Obfuscated result-hook dispatcher (harvested creds/vulns → webhook/SMTP).
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. The results module survives with a distinctive,
# un-encrypted private API that collects the run's findings (credential fields,
# web-vuln buckets, matched addresses), writes them to a local result file, and
# dispatches alerts to a configured webhook (axios) or SMTP mailbox. These
# identifiers are attack-context-specific fragments of that toolkit; convicts
# only when several co-occur inside obfuscator.io-obfuscated code.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: E1041

traits:
  - id: result-hook-dispatcher
    desc: ResultHookDispatcher findings dispatcher
    crit: component
    conf: 0.8
    if:
      type: text
      substr: ResultHookDispatcher
  - id: local-result-writer
    desc: LocalResultWriter findings file writer
    crit: component
    conf: 0.8
    if:
      type: text
      substr: LocalResultWriter
  - id: load-result-hook-config
    desc: loadResultHookConfig hook config loader
    crit: component
    conf: 0.8
    if:
      type: text
      substr: loadResultHookConfig
  - id: format-alert-message
    desc: formatAlertMessage findings alert formatter
    crit: component
    conf: 0.8
    if:
      type: text
      substr: formatAlertMessage
  - id: resolve-mail-config
    desc: resolveMailConfig SMTP alert config resolver
    crit: component
    conf: 0.8
    if:
      type: text
      substr: resolveMailConfig

composite_rules:
  - id: result-hook-dispatch-api
    desc: Private findings result-hook dispatch API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: result-hook-dispatcher
      - id: local-result-writer
      - id: load-result-hook-config
      - id: format-alert-message
      - id: resolve-mail-config
  - id: obfuscated-result-hook-exfil
    desc: Obfuscated harvested-findings result-hook exfil dispatcher
    crit: hostile
    conf: 0.95
    all:
      - id: result-hook-dispatch-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
