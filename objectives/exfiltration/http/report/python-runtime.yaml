defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1041

traits:
  - id: socketio-log-update-event
    desc: Socket.IO log update event
    crit: component
    conf: 0.94
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      regex: 'emit\s*\(\s*["'']log_update["'']'

  - id: signed-payload-socketio-emit
    desc: Signed payload Socket.IO emit
    crit: component
    conf: 0.92
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      regex: 'secure_payload[\s\S]{0,180}\.emit\s*\('

  - id: emit-log-to-web-before-exec
    desc: Web log emission before exec
    crit: component
    conf: 0.88
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      regex: 'emit_log_to_web[\s\S]{0,260}exec\s*\('

  - id: exec-before-emit-log-to-web
    desc: Exec before web log emission
    crit: component
    conf: 0.88
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      regex: 'exec\s*\([\s\S]{0,520}emit_log_to_web'

composite_rules:
  - id: python-frame-local-socketio-exfil
    desc: Python frame locals Socket.IO exfil
    crit: hostile
    conf: 0.96
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::traceback-frame-text
      - id: micro-behaviors/data/source/dynamic/reflect::frame-locals-text
      - id: micro-behaviors/data/source/dynamic/reflect::traceback-next-text
      - id: micro-behaviors/data/serialize/json::json-dumps-call
      - id: metadata/library/socketio::python-client-import
      - id: micro-behaviors/communications/websocket/send::python-socketio-connect-call
      - id: micro-behaviors/communications/websocket/send::python-socketio-emit-call
    any:
      - id: socketio-log-update-event
      - id: signed-payload-socketio-emit

  - id: python-runtime-exec-socketio-exfil
    desc: Python executed source Socket.IO exfil
    crit: hostile
    conf: 0.95
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    all:
      - id: micro-behaviors/fs/read/file::file-open-content
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: objectives/execution/interpreter/runtime/dynamic::compile-exec-source-call
      - id: micro-behaviors/data/source/dynamic/reflect::frame-locals-text
      - id: micro-behaviors/data/serialize/json::json-dumps-call
      - id: metadata/library/socketio::python-client-import
      - id: micro-behaviors/communications/websocket/send::python-socketio-emit-call
    any:
      - id: emit-log-to-web-before-exec
      - id: exec-before-emit-log-to-web

  - id: mcp-forensic-telemetry-http-exfil
    desc: MCP forensic telemetry HTTP exfil
    crit: hostile
    conf: 0.96
    ref: sha256:4a646c14c10fbca2666cce3a4bae7554e5815b4fdf4926b42d4c92e1e783340c
    all:
      - id: micro-behaviors/os/telemetry/logging/llm::mcp-forensic-event-telemetry
      - id: micro-behaviors/os/telemetry/logging/llm::config-expanded-telemetry-sinks
      - id: micro-behaviors/os/telemetry/logging/llm::http-post-telemetry-sink
      - id: micro-behaviors/data/serialize/json::json-dumps-call
