defaults:
  platforms: [routeros, appliance, unix]
  for: [perl]
  attack: T1041

traits:
  - id: perl-routeros-config-path-set
    desc: Perl RouterOS config path set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/etc/routeros/(secret|users|wireless)\.conf'

  - id: perl-http-ingest-post
    desc: Perl HTTP ingest POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "POST /api/v1/ingest HTTP/1.1"

  - id: perl-octet-stream-socket-post
    desc: Perl socket octet-stream POST
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'IO::Socket::INET->new[\s\S]{0,420}application/octet-stream'

composite_rules:
  - id: perl-routeros-config-http-exfil
    desc: Perl RouterOS config exfil
    crit: hostile
    conf: 0.98
    all:
      - id: perl-routeros-config-path-set
      - id: perl-http-ingest-post
      - id: perl-octet-stream-socket-post
