defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: B0030

traits:
  - id: js-options-object-http-report
    desc: HTTP report includes options object
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\bfetch\s*\([\s\S]{0,900}\bbody\s*:\s*JSON\.stringify\s*\(\s*\{\s*options\s*:'

  - id: js-node-infrastructure-profile
    desc: JavaScript reads Node and project dependencies
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'process\.cwd\(\)[\s\S]{0,500}readFileSync[\s\S]{0,220}devDependencies'
  - id: js-default-health-and-infrastructure-posts
    desc: Posts health and infrastructure reports
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: '/api/v1/(health|infrastructure)[\s\S]{0,260}method:["'']POST["'']'

composite_rules:
  - id: js-options-report-with-returned-script
    desc: Options exfiltration endpoint also executes returned script
    crit: hostile
    conf: 0.99
    attack: T1041,T1059.007,T1071.001
    mbc: B0032
    all:
      - id: js-options-object-http-report
      - id: objectives/command-and-control/backdoor/dispatch/eval::decoded-script-eval-dispatch
      - id: micro-behaviors/process/interpreter/eval::js-member-eval-call

  - id: js-node-profile-and-environment-exfiltration
    desc: Reports host profile and environment data remotely
    crit: hostile
    conf: 0.99
    attack: "T1041,T1552.001,T1082"
    all:
      - id: js-node-infrastructure-profile
      - id: js-default-health-and-infrastructure-posts
      - id: objectives/credential-access/env/secrets/filtered-access::js-env-entries-secret-keyword-sweep
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
