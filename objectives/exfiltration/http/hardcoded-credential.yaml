# Hardcoded API Keys/Build IDs in HTTP Exfiltration
# Detects long hex strings used as API keys or build IDs in HTTP POST bodies
# Used by Shub stealer and related wallet-targeting campaigns
# ATT&CK: T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [windows, unix]
  for: [python, javascript, go, php, powershell]
  attack: T1041
  mbc: C0002
traits:
  - id: hex-api-key-in-body
    desc: Long hex API key in body
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)(api[_-]?key|apikey).{0,5}['""][0-9a-f]{48,}['"]
  - id: hex-build-id-in-body
    desc: Long hex build ID in body
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)(build[_-]?id|buildid).{0,5}['""][0-9a-f]{48,}['"]
composite_rules:
  - id: exfil-with-hardcoded-key
    desc: Exfil with hardcoded API key
    crit: suspicious
    conf: 0.85
    any:
      - id: hex-api-key-in-body
      - id: hex-build-id-in-body
