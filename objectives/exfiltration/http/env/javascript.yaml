defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: B0030
traits:
  - id: axios-post-env-spread
    desc: Environment dump via axios POST
    crit: suspicious
    conf: 0.99
    if:
      type: tree-sitter
      query: |
        (call_expression
          function: (member_expression
            object: (identifier) @obj
            property: (property_identifier) @prop)
          arguments: (arguments
            (_)
            (object
              (spread_element
                (member_expression
                  object: (identifier) @src
                  property: (property_identifier) @env))))
          (#eq? @obj "axios")
          (#eq? @prop "post")
          (#eq? @src "process")
          (#eq? @env "env"))
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
  - id: js-environment-snapshot-source
    desc: Builds a filtered environment snapshot
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'Object\.entries\(process\.env\)[\s\S]{0,900}substring\(0,3\)'
composite_rules:
  - id: js-environment-snapshot-exfiltration
    desc: Sends a filtered environment snapshot remotely
    crit: hostile
    conf: 0.99
    attack: "T1041,T1552.001"
    all:
      - id: js-environment-snapshot-source
      - id: objectives/credential-access/env/secrets/filtered-access::js-env-entries-secret-keyword-sweep
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: micro-behaviors/os/env/vars/access::js-object-entries-env
