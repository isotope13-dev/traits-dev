defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: B0030
traits:
  - id: axios-post-env-spread-ast
    desc: axios POST spreads process.env
    crit: suspicious
    conf: 0.98
    if:
      type: ast
      query: |
        (call_expression
          function: (member_expression
            object: (identifier) @obj
            property: (property_identifier) @prop)
          arguments: (arguments
            (_)
            (object
              (spread_element
                (member_expression
                  object: (identifier) @src
                  property: (property_identifier) @env))))
          (#eq? @obj "axios")
          (#eq? @prop "post")
          (#eq? @src "process")
          (#eq? @env "env"))
composite_rules:
  - id: axios-post-env-spread
    desc: Environment dump via axios POST
    crit: hostile
    conf: 0.99
    all:
      - id: axios-post-env-spread-ast
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/
