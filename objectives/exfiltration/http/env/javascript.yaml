defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: B0030
traits:
- id: axios-post-env-spread
  desc: Environment dump via axios POST
  crit: suspicious
  conf: 0.99
  if:
    type: ast
    query: |
      (call_expression
        function: (member_expression
          object: (identifier) @obj
          property: (property_identifier) @prop)
        arguments: (arguments
          (_)
          (object
            (spread_element
              (member_expression
                object: (identifier) @src
                property: (property_identifier) @env))))
        (#eq? @obj "axios")
        (#eq? @prop "post")
        (#eq? @src "process")
        (#eq? @env "env"))
  downgrade:
    any:
    - id: metadata/package::has-tests
    - id: metadata/signed/platform/
composite_rules: []
