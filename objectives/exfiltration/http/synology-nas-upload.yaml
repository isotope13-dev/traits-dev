# File exfiltration via Synology NAS Web API
# Detects tools that upload files to Synology NAS devices, commonly used
# in supply chain attacks for data exfiltration
# ATT&CK: T1041 (Exfiltration Over C2 Channel), T1567 (Exfiltration Over Web Service)
defaults:
  platforms: [linux, macos, windows, unix]
  for: [javascript, typescript, python, shell]
  attack: T1041
  mbc: C0002
composite_rules:
- id: synology-nas-file-exfiltration
  desc: File exfiltration via Synology NAS upload
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/communications/http::synology-nas-api
  - id: micro-behaviors/communications/http/headers::file-upload-headers
  - id: micro-behaviors/communications/http/upload::form-data-new
  any:
  - id: micro-behaviors/communications/http/post::http-post-call
  - id: micro-behaviors/communications/http/request::post-method-text
- id: synology-nas-authenticated-exfil
  desc: Authenticated file exfiltration to Synology NAS
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/communications/http::synology-nas-api
  - id: micro-behaviors/communications/http/headers::file-upload-headers
  - id: micro-behaviors/communications/http/headers::basic-auth
  any:
  - id: micro-behaviors/os/env/access::javascript
  - id: objectives/credential-access/env/secrets/bulk-access::object-keys-env
