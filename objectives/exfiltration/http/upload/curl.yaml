defaults:
  attack: T1041
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: curl-d-flag
  desc: curl sends inline POST data
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: curl\s+-d
- id: curl-data-flag
  desc: curl --data flag
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: curl\s+--data
- id: curl-ua-smuggle
  desc: curl User-Agent header data smuggling
  crit: suspicious
  conf: 0.85
  attack: T1071.001
  if:
    type: text
    regex: '-A\s+"\$\('
- id: curl-upload-filename-header
  desc: curl sends upload filename header
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: '-H\s+["'']X-Filename:'
composite_rules:
- id: curl-exfil
  desc: Curl command with data-bearing POST parameter
  crit: suspicious
  conf: 0.9
  any:
  - id: curl-d-flag
  - id: curl-data-flag
  - id: curl-ua-smuggle
  - id: micro-behaviors/communications/http/upload::curl-post-binary-upload
- id: curl-file-upload-exfil
  desc: curl uploads local file over HTTP
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/communications/http/curl::curl-post-flag
  - id: micro-behaviors/communications/http/upload::curl-post-binary-upload
  any:
  - id: curl-upload-filename-header
  - id: micro-behaviors/communications/http/download/cli::curl-s-flag
  - id: micro-behaviors/os/console/io::stderr-to-dev-null
