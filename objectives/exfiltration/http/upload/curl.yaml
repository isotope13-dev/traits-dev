defaults:
  attack: T1041
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: curl-d-flag
  desc: Shell curl sends inline POST data
  crit: suspicious
  conf: 0.8
  for: [shell, batch, powershell]
  if:
    type: text
    regex: '(?i)\bcurl(\.exe)?\s+-d(ata)?(\s|=)'
- id: python-subprocess-curl-d-flag
  desc: Python subprocess curl data upload
  crit: suspicious
  conf: 0.9
  for: [python]
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  if:
    type: tree-sitter
    kind: call
    regex: 'subprocess\.(run|call|Popen)\([^)]{0,120}curl[^)]{0,40}-d\b'
- id: python-subprocess-curl-data-flag
  desc: Python subprocess invokes curl with data option
  crit: suspicious
  conf: 0.9
  for: [python]
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  if:
    type: tree-sitter
    kind: call
    regex: 'subprocess\.(run|call|Popen)\([^)]{0,120}curl[^)]{0,40}--data\b'
- id: python-os-system-curl-d-flag
  desc: Python os.system curl data upload
  crit: suspicious
  conf: 0.9
  for: [python]
  if:
    type: symbol
    kind: call
    exact: os.system
    arg:
      kind: string
      regex: '\bcurl\s+-d(ata)?(\s|=)'
- id: curl-ua-smuggle
  desc: curl User-Agent header data smuggling
  crit: suspicious
  conf: 0.85
  attack: T1071.001
  unless:
  - id: well-known/app/pihole::pihole-artifact
  if:
    type: text
    regex: '-A\s+"\$\('
composite_rules:
- id: curl-exfil
  desc: Curl command with data-bearing POST parameter
  crit: suspicious
  conf: 0.9
  any:
  - id: curl-d-flag
  - id: micro-behaviors/communications/http/curl::curl-data-option
  - id: python-subprocess-curl-d-flag
  - id: python-subprocess-curl-data-flag
  - id: python-os-system-curl-d-flag
  - id: curl-ua-smuggle
  - id: micro-behaviors/communications/http/upload::curl-post-binary-upload
- id: curl-file-upload-exfil
  desc: curl uploads local file over HTTP
  crit: notable
  conf: 0.97
  near_lines: 20
  all:
  - id: micro-behaviors/communications/http/curl::curl-post-flag
  - id: micro-behaviors/communications/http/upload::curl-post-binary-upload
  any:
  - id: micro-behaviors/communications/http/upload::curl-upload-filename-header
  - id: micro-behaviors/communications/http/download/cli::curl-s-flag
  - id: micro-behaviors/os/console/io::stderr-to-dev-null
