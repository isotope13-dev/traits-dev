# Hybrid Encryption for Exfiltration
# Generates random AES key, encrypts data, RSA-wraps the session key.
# Classic pattern in CI/CD supply chain attacks (trivy-gha, codecov).
# ATT&CK: T1573.002 (Asymmetric Cryptography)
defaults:
  for: [shell]
  platforms: [unix]
  attack: T1573.002
traits:
  - id: encrypted-metadata-upload-prompt
    desc: Encrypted metadata upload prompt
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Include encrypted metadata in upload?"
  - id: diagnostics-cloud-storage-message
    desc: Diagnostics cloud storage message
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Saved diagnostics log in cloud storage as:"
composite_rules:
  - id: interactive-diagnostics-upload
    desc: Interactive diagnostics upload helper
    crit: component
    conf: 0.95
    all:
      - id: encrypted-metadata-upload-prompt
      - id: diagnostics-cloud-storage-message
  - id: hybrid-encrypt-exfil
    desc: Hybrid RSA+AES encryption for data exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/crypto/library/hybrid::openssl-rsa-aes-hybrid-encryption
    any:
      - id: micro-behaviors/communications/http/upload::curl-post-binary-upload
      - id: micro-behaviors/communications/http/upload::curl-data-binary
      - id: micro-behaviors/communications/http/upload::github-uploads-api
      - id: objectives/exfiltration/http/upload::icp-canister-drop-endpoint
    unless:
      - id: objectives/exfiltration/http/upload/
  - id: session-key-encrypt
    desc: Random session key encrypted with public key
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/crypto/symmetric/aes/openssl::openssl-rand-key
      - id: micro-behaviors/crypto/asymmetric/rsa::openssl-pkeyutl-encrypt
  - id: node-hybrid-encrypted-exfil
    desc: Node hybrid encrypted HTTP exfiltration
    crit: hostile
    conf: 0.97
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/crypto/symmetric/aes/runtime-library::aes-256-cbc
      - id: micro-behaviors/os/random/crypto::node-random-32-byte-value
      - id: micro-behaviors/crypto/asymmetric/rsa::node-crypto-public-encrypt
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    near_lines: 80
  - id: python-hybrid-encrypted-http-upload
    desc: Python AES-GCM and RSA-OAEP encrypted HTTP upload
    crit: hostile
    conf: 0.97
    for: [python]
    all:
      - id: micro-behaviors/crypto/symmetric/aes/library::cryptography-aesgcm-api
      - id: micro-behaviors/crypto/asymmetric/rsa::rsa-oaep-public-encrypt
      - id: micro-behaviors/data/compress/library::gzip-compress-call
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/post::python-post-method-literal
    near_lines: 90
  - id: python-hybrid-encrypted-secret-exfil
    desc: Python hybrid encrypted secret exfiltration over HTTP
    crit: hostile
    conf: 0.985
    for: [python, archives]
    scope: archive
    all:
      - id: objectives/supply-chain/credential-theft/cloud-kube::python-cloud-kube-secret-harvest
      - id: micro-behaviors/data/compress/library::gzip-compress-call
      - id: micro-behaviors/crypto/symmetric/aes/library::python-aes-gcm-usage
      - id: micro-behaviors/crypto/asymmetric/rsa::rsa-oaep-public-encrypt
      - id: micro-behaviors/data/encode/base64::b64encode-call
    any:
      - id: python-hybrid-encrypted-http-upload
      - id: micro-behaviors/communications/http/post::python-post-method-literal
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-data
      - id: objectives/exfiltration/stealer/credential/env::python-env-secret-urllib-exfil
