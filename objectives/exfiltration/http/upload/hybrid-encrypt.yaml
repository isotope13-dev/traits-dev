# Hybrid Encryption for Exfiltration
# Generates random AES key, encrypts data, RSA-wraps the session key.
# Classic pattern in CI/CD supply chain attacks (trivy-gha, codecov).
# ATT&CK: T1573.002 (Asymmetric Cryptography)
defaults:
  for: [shell]
  platforms: [unix]
  attack: T1573.002
traits:
  - id: encrypted-metadata-upload-prompt
    desc: Encrypted metadata upload prompt
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Include encrypted metadata in upload?"
  - id: diagnostics-cloud-storage-message
    desc: Diagnostics cloud storage message
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Saved diagnostics log in cloud storage as:"
  - id: node-rsa-public-encrypt-call
    desc: Node RSA public encryption call
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bcrypto\.publicEncrypt\s*\(|\bpublicEncrypt\s*\('
    unless:
      - id: metadata/library/runtime::browserify-crypto-bundle
      - id: metadata/library/structure::js-webpack-bundle
  - id: python-aes-gcm-encrypt-helper-symbol
    desc: Python AES-GCM encrypt helper symbol
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: symbol
      regex: '(?i)(aes.*gcm.*encrypt|encrypt.*aes.*gcm)'
  - id: python-rsa-oaep-encrypt-helper-symbol
    desc: Python RSA-OAEP encrypt helper symbol
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: symbol
      regex: '(?i)(rsa.*oaep.*encrypt|encrypt.*rsa.*oaep)'
composite_rules:
  - id: interactive-diagnostics-upload
    desc: Interactive diagnostics upload helper
    crit: component
    conf: 0.95
    all:
      - id: encrypted-metadata-upload-prompt
      - id: diagnostics-cloud-storage-message
  - id: hybrid-encrypt-exfil
    desc: Hybrid RSA+AES encryption for data exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/crypto/symmetric/aes/openssl::openssl-enc-aes
    any:
      - id: micro-behaviors/crypto/asymmetric/rsa::openssl-pkeyutl-encrypt
      - id: micro-behaviors/crypto/asymmetric/rsa::embedded-pem-pubkey
    unless:
      - id: interactive-diagnostics-upload
  - id: session-key-encrypt
    desc: Random session key encrypted with public key
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/crypto/symmetric/aes/openssl::openssl-rand-key
      - id: micro-behaviors/crypto/asymmetric/rsa::openssl-pkeyutl-encrypt
  - id: node-hybrid-encrypted-exfil
    desc: Node hybrid encrypted HTTP exfiltration
    crit: hostile
    conf: 0.97
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/crypto/symmetric/aes/runtime-library::aes-256-cbc
      - id: micro-behaviors/crypto/library/provider::random-32-byte-key
      - id: node-rsa-public-encrypt-call
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    near_lines: 80
  - id: python-json-post-body
    desc: Python JSON body sent with urllib Request
    crit: notable
    conf: 0.9
    for: [python]
    unless:
      - id: well-known/tool/detection/proxy-sandbox
      # JSON POST to a loopback target is local IPC (e.g. aria2 JSON-RPC),
      # not an upload to attacker infrastructure.
      - id: objectives/exfiltration/http/upload::loopback-http-target
    all:
      - id: micro-behaviors/communications/http/lib/urllib::urllib-request-symbol
      - id: micro-behaviors/data/serialize/json::json-dumps-call
      - id: micro-behaviors/communications/http/post::python-post-method-literal
    near_lines: 20
  - id: python-hybrid-encrypted-http-upload
    desc: Python AES-GCM and RSA-OAEP encrypted HTTP upload
    crit: hostile
    conf: 0.97
    for: [python]
    all:
      - id: python-aes-gcm-encrypt-helper-symbol
      - id: python-rsa-oaep-encrypt-helper-symbol
      - id: micro-behaviors/data/compress/library::gzip-compress-call
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: python-json-post-body
    near_lines: 90
  - id: python-hybrid-encrypted-secret-exfil
    desc: Python hybrid encrypted secret exfiltration over HTTP
    crit: hostile
    conf: 0.985
    for: [python, archives]
    scope: archive
    all:
      - id: objectives/supply-chain/credential-theft/cloud-kube::python-cloud-kube-secret-harvest
      - id: micro-behaviors/data/compress/library::gzip-compress-call
      - id: micro-behaviors/crypto/symmetric/aes/library::python-aes-gcm-usage
      - id: micro-behaviors/crypto/asymmetric/rsa::rsa-oaep-public-encrypt
      - id: micro-behaviors/data/encode/base64::b64encode-call
    any:
      - id: python-hybrid-encrypted-http-upload
      - id: python-json-post-body
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-data
      - id: objectives/exfiltration/http/upload::urllib-credential-exfil
