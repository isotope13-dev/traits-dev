# Hybrid Encryption for Exfiltration
# Generates random AES key, encrypts data, RSA-wraps the session key.
# Classic pattern in CI/CD supply chain attacks (trivy-gha, codecov).
# ATT&CK: T1573.002 (Asymmetric Cryptography)
defaults:
  for: [shell]
  platforms: [unix]
  attack: T1573.002
traits:
  - id: encrypted-metadata-upload-prompt
    desc: Encrypted metadata upload prompt
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Include encrypted metadata in upload?"
  - id: diagnostics-cloud-storage-message
    desc: Diagnostics cloud storage message
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Saved diagnostics log in cloud storage as:"
  - id: node-rsa-public-encrypt-call
    desc: Node RSA public encryption call
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bcrypto\.publicEncrypt\s*\(|\bpublicEncrypt\s*\('
  - id: node-random-session-key
    desc: Node random session key generation
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: text
      regex: 'randomBytes\s*\(\s*(32|0x20)\s*\)'
composite_rules:
  - id: interactive-diagnostics-upload
    desc: Interactive diagnostics upload helper
    crit: component
    conf: 0.95
    all:
      - id: encrypted-metadata-upload-prompt
      - id: diagnostics-cloud-storage-message
  - id: hybrid-encrypt-exfil
    desc: Hybrid RSA+AES encryption for data exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/crypto/symmetric/aes/openssl::openssl-enc-aes
    any:
      - id: micro-behaviors/crypto/asymmetric/rsa::openssl-pkeyutl-encrypt
      - id: micro-behaviors/crypto/asymmetric/rsa::embedded-pem-pubkey
    unless:
      - id: interactive-diagnostics-upload
  - id: session-key-encrypt
    desc: Random session key encrypted with public key
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/crypto/symmetric/aes/openssl::openssl-rand-key
      - id: micro-behaviors/crypto/asymmetric/rsa::openssl-pkeyutl-encrypt
  - id: node-hybrid-encrypted-exfil
    desc: Node hybrid encrypted HTTP exfiltration
    crit: hostile
    conf: 0.97
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/crypto/symmetric/aes/library::aes-256-cbc
      - id: node-random-session-key
      - id: node-rsa-public-encrypt-call
      - id: micro-behaviors/communications/http/request/client::http-client-usage
