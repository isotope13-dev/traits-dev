defaults:
  platforms: [aix, unix]
  for: [java]
  attack: T1041
composite_rules:
  - id: aix-java-host-report-http-exfil
    desc: AIX Java host report HTTP exfil
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source
      - id: micro-behaviors/communications/http/post::jvm-http-body-write-source
      - id: objectives/discovery/system/fingerprint/info::java-broad-host-fingerprint-source
    any:
      - id: objectives/anti-analysis/vm-detect/script::aix-java-vm-detection-report
      - id: micro-behaviors/process/enumerate/shell::java-ps-ef-command
      - id: micro-behaviors/fs/proc/info/listing::java-proc-pid-directory-walk
    needs: 1
