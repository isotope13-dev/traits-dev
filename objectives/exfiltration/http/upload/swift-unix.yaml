defaults:
  platforms: [unix]
  for: [swift]
  attack: T1041

traits:
  - id: swift-timing-bit-exfil
    desc: Swift timing bit exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /timing/bit/

  - id: swift-hex-chunk-http-exfil
    desc: Swift hex chunk HTTP exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /exfil/

  - id: swift-system-data-ssh-keys
    desc: Swift collects SSH keys
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "SSH_KEY["

composite_rules:
  - id: swift-timing-sidechannel-exfil
    desc: Swift timing sidechannel exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-timing-bit-exfil
      - id: swift-system-data-ssh-keys

  - id: swift-http-hex-data-exfil
    desc: Swift HTTP hex data exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-hex-chunk-http-exfil
      - id: swift-system-data-ssh-keys
