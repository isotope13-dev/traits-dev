defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
composite_rules:
  - id: encrypted-exfiltration-to-paste-site
    desc: Encrypted data exfiltration to a public paste service
    crit: hostile
    conf: 0.9
    near_lines: 80
    all:
      - id: objectives/command-and-control/infrastructure/paste::dpaste
      - id: objectives/exfiltration/http/upload::curl-file-upload-exfil
    any:
      - id: micro-behaviors/crypto/library/
      - id: micro-behaviors/data/encode/
