defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: secret-key
    desc: Secret marker string (key/token/api)
    crit: component
    conf: 0.6
    if:
      type: text
      regex: secret[_-]?(key|token|api)
      case_insensitive: true
    not:
      - regex: ^SecretKey$
      - regex: (?i)SecretKey(Selector|Ref|Volume|Source|Spec|Factory|Ring)
      - regex: (?i)NSS.{0,10}SecretKey
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: secret-other
    desc: Secret marker string (exfil/data/steal/grab)
    crit: component
    conf: 0.6
    if:
      type: text
      regex: secret[_-]?(exfil|data|steal|grab)
      case_insensitive: true
    not:
      - regex: (?i)SecretData$
      - regex: (?i)SecretData(Source|Provider|Wrapper)
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
    downgrade:
      any:
        - id: metadata/signed/platform::apple
composite_rules:
  - id: secret-comp
    desc: Secret marker string
    crit: component
    conf: 0.6
    any:
      - id: secret-key
      - id: secret-other
