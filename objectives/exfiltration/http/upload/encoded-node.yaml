# Node.js Data Encoding for Exfiltration
# Behavioral composites that combine encoding with exfiltration indicators
# ATT&CK: T1041 (Exfiltration Over C2 Channel), T1132 (Data Encoding)
#
# Note: Atomic encoding traits moved to data/encoding/node.yaml
# This file contains only behavioral composites that indicate exfiltration
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
  attack: "T1041"
composite_rules:
  # Encode then exfil pattern
  - id: node-encode-exfil
    desc: Encodes data then sends via HTTP
    crit: suspicious
    conf: 0.9
    near_bytes: 1200
    all:
      - id: micro-behaviors/data/encode/base64/
      - id: objectives/exfiltration/http/upload::node-upload-sink
    unless:
      - id: micro-behaviors/os/service/legitimate::package-manager
      - id: micro-behaviors/os/service/legitimate::ci-cd-pipeline
      - id: metadata/library/axios
      - id: well-known/lib/node-edge/
      - id: metadata/library/structure/
      - id: metadata/package/files/dependency::node-modules-path
      - id: micro-behaviors/process/create/shell/host/
