defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1041

traits:
- id: image-formdata-fields
  desc: Image fields in FormData upload
  crit: notable
  conf: 0.9
  ref: sha256:4fcdbf8912196b7e1541615dc3c51b0715aa125d1a223387055231551d255e70
  for: [javascript, typescript]
  if:
    type: text
    regex: '\.append\(["''](selfieImage|clothingImage)["'']'

- id: upload-user-id-fields
  desc: Upload includes user identifiers
  crit: notable
  conf: 0.9
  ref: sha256:4fcdbf8912196b7e1541615dc3c51b0715aa125d1a223387055231551d255e70
  for: [javascript, typescript]
  if:
    type: text
    regex: '\.append\(["''](uid|blobId)["'']'

composite_rules:
- id: browser-extension-screenshot-json-upload
  desc: Browser extension uploads screenshots as JSON
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-capture-visible
  - id: micro-behaviors/data/serialize/json::screenshot-data-stringify
  - id: micro-behaviors/communications/http/request/client::fetch-post-pattern
  - id: micro-behaviors/communications/http/url/domain::js-remote-host-url

- id: captcha-image-solver-exfiltration
  desc: Extension sends CAPTCHA images to solver service
  crit: hostile
  conf: 0.98
  scope: archive
  all:
  - id: objectives/evasion/security-bypass/anti-bot::captcha-solver-api-endpoint
  - id: objectives/evasion/security-bypass/anti-bot::captcha-image-submission-message
  - id: micro-behaviors/communications/http/request/client::js-fetch-call

- id: image-formdata-with-user-id
  desc: Image FormData includes user identifiers
  crit: suspicious
  conf: 0.93
  ref: sha256:4fcdbf8912196b7e1541615dc3c51b0715aa125d1a223387055231551d255e70
  near_bytes: 1800
  all:
  - id: micro-behaviors/communications/http/post::formdata-class
  - id: image-formdata-fields
  - id: upload-user-id-fields

- id: all-site-extension-image-upload
  desc: All-site extension uploads selected images
  crit: suspicious
  conf: 0.95
  ref: sha256:4fcdbf8912196b7e1541615dc3c51b0715aa125d1a223387055231551d255e70
  scope: archive
  all:
  - id: image-formdata-with-user-id
  - id: micro-behaviors/communications/http/post::fetch-post-call
  - id: metadata/permission/manifest::host-permission-all-urls
  any:
  - id: micro-behaviors/process/inject/webextension::broad-content-script-injection
  - id: metadata/permission/manifest::permission-tabs
