# Shell-based Network Exfiltration
# Behavioral composites that combine shell tools with exfiltration indicators
# ATT&CK: T1041 (Exfiltration Over C2 Channel)
#
# Note: Atomic curl/wget/nc traits moved to communications/http/client/shell.yaml
# This file contains only behavioral composites that indicate exfiltration
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  mbc: "E1041"
  attack: "T1041"
  for: [shell, batch, powershell, vbs]
traits:
  - id: shell-tar-create-file
    desc: Shell creates tar archive
    crit: component
    conf: 0.9
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: 'tar\s+cf\s+"?\$?[A-Za-z0-9_./{}-]*\.tar'

  - id: shell-curl-form-file-upload
    desc: Shell curl form file upload
    crit: suspicious
    conf: 0.92
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: 'curl\s+[^\n]{0,180}-F\s+".{0,80}=@.{0,120}"'
    unless:
      - id: well-known/app/omarchy::source-tree

  - id: shell-curl-octet-upload
    desc: Shell curl octet upload
    crit: suspicious
    conf: 0.94
    platforms: [unix]
    for: [shell]
    if:
      type: text
      regex: 'curl -s .{0,80}-X POST[\s\S]{0,220}application/octet-stream'
    unless:
      - id: well-known/tool/detection/clawker::adversarial-payload-fixture

composite_rules:
  - id: shell-staged-tar-http-upload
    desc: Shell staged tar HTTP upload
    crit: hostile
    conf: 0.98
    platforms: [unix]
    for: [shell]
    all:
      - id: shell-tar-create-file
      - id: shell-curl-form-file-upload
    any:
      - id: micro-behaviors/fs/path/temp::unix-temp
      - id: micro-behaviors/fs/path/location::hidden-dir-literal

  - id: curl-post-data
    desc: Curl POST with data (potential exfiltration)
    crit: suspicious
    conf: 0.85
    any:
      - id: objectives/supply-chain/trojanized/build-pipeline::curl-with-env-data
    unless:
      - id: micro-behaviors/os/service/legitimate::package-manager
      - id: micro-behaviors/os/service/legitimate::ci-cd-pipeline
      - id: micro-behaviors/os/service/legitimate/
      - id: micro-behaviors/os/service/legitimate::installer-script
  - id: curl-upload-file-comp
    desc: Curl file upload (potential exfiltration)
    crit: suspicious
    conf: 0.85
    any:
      - id: micro-behaviors/communications/http/upload::curl-upload-file
    unless:
      - id: micro-behaviors/os/service/legitimate::package-manager
      - id: micro-behaviors/os/service/legitimate::ci-cd-pipeline
      - id: micro-behaviors/os/service/legitimate::backup-script
      - id: metadata/signed/id::com.apple.curl
      - id: micro-behaviors/communications/http/download/curl::curl-easy-init
  - id: shell-tool-exfil
    desc: Shell tool exfiltration
    crit: suspicious
    conf: 0.85
    attack: "T1048"
    all:
      - id: metadata/library/socketio::client
    unless:
      - id: micro-behaviors/os/service/legitimate::backup-script
      - id: micro-behaviors/os/service/legitimate/
      - id: metadata/file/format::valid
