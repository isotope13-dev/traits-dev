defaults:
  platforms: [openwrt]
  for: [python, pyc]
  attack: T1041

traits:

composite_rules:
  - id: openwrt-python-credential-http-exfil
    desc: OpenWrt Python credential/config HTTP exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/credential-access/theft/file::openwrt-python-credential-config-harvest
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
    any:
      - id: objectives/exfiltration/http/upload::python-urllib-exfil
      - id: micro-behaviors/communications/http/request/client::python-json-post-method
      - id: micro-behaviors/communications/http/request/client::python-urlencoded-post-body
      - id: micro-behaviors/communications/http/lib/urllib::urllib-request-object
      - id: micro-behaviors/communications/http/lib/urllib::urllib-request-pyc-symbol
    needs: 1
