defaults:
  platforms: [unix]
  for: [java, class, jar]
  attack: T1041

traits:
  - id: java-collect-upload-path
    desc: Java collect upload path
    crit: suspicious
    conf: 0.94
    if:
      type: hex
      pattern: 2F 61 70 69 2F 76 31 2F 63 6F 6C 6C 65 63 74

  - id: java-octet-stream-upload
    desc: Java octet-stream upload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Content-Type[\s\S]{0,120}application/octet-stream[\s\S]{0,260}getOutputStream'

  - id: java-fallback-chunk-exfil
    desc: Java fallback chunk exfil
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'collect\?chunk=[\s\S]{0,180}URLEncoder\.encode'
  - id: java-reflective-collect-post
    desc: Java reflective collect POST
    crit: suspicious
    conf: 0.94
    for: [shell, java, class, jar]
    if:
      type: text
      regex: 'setRequestMethod[\s\S]{0,80}POST[\s\S]{0,700}getOutputStream'
  - id: java-sensitive-command-set
    desc: Java sensitive command set
    crit: suspicious
    conf: 0.94
    for: [shell, java, class, jar]
    if:
      type: text
      regex: '/etc/master\.passwd[\s\S]{0,500}/root/\.ssh/(id_rsa|authorized_keys)'
  - id: jvm-master-passwd-hex
    desc: JVM master.passwd bytes
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 2F 65 74 63 2F 6D 61 73 74 65 72 2E 70 61 73 73 77 64
  - id: jvm-root-id-rsa-hex
    desc: JVM root id_rsa bytes
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 2F 72 6F 6F 74 2F 2E 73 73 68 2F 69 64 5F 72 73 61
  - id: jvm-collect-result-paths
    desc: JVM collect and result paths
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: raw
      regex: '/collect[\s\S]{0,1000}/result'
    unless:
      - type: basename
        exact: librav1e.a
      - id: well-known/app/ankidroid::package-member
composite_rules:
  - id: java-collect-path
    desc: Java collect path
    crit: suspicious
    conf: 0.95
    any:
      - id: micro-behaviors/communications/http/endpoints::jvm-collect-path
      - id: java-collect-upload-path

  - id: java-http-data-exfiltration
    desc: Java HTTP data exfiltration
    crit: hostile
    conf: 0.98
    near_bytes: 4096
    all:
      - id: java-collect-path
    any:
      - id: java-octet-stream-upload
      - id: java-fallback-chunk-exfil
      - id: java-collect-upload-path
      - id: objectives/exfiltration/stealer/credential/platform::java-db-and-secret-harvest
      - id: objectives/exfiltration/stealer/credential/platform::java-sensitive-file-harvest
      - id: java-reflective-collect-post
    needs: 1
    unless:
      - id: well-known/app/logstash::logstash-container-archive
  - id: java-command-sensitive-exfil
    desc: Java command sensitive exfil
    crit: hostile
    conf: 0.98
    for: [shell, java, class, jar]
    all:
      - id: java-sensitive-command-set
      - id: java-reflective-collect-post
  - id: jvm-netbsd-sensitive-exfil
    desc: JVM NetBSD sensitive exfil
    crit: hostile
    conf: 0.98
    for: [class, jar]
    all:
      - id: jvm-master-passwd-hex
      - id: jvm-root-id-rsa-hex
      - id: jvm-collect-result-paths
