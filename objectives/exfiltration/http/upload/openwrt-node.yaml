defaults:
  platforms: [openwrt]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: node-chunked-base64-upload
    desc: Node chunked base64 upload body
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Transfer-Encoding["'']?\s*:\s*["'']chunked|toString\(["'']base64["'']\)'
composite_rules:
  - id: openwrt-node-credential-http-exfil
    desc: OpenWrt Node credential/config HTTP exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/credential-access/theft/file::openwrt-node-credential-config-harvest
      - id: micro-behaviors/communications/http/request/client::https-request
    any:
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: micro-behaviors/communications/http/request/client::request-write-call
      - id: micro-behaviors/communications/http/request/client::request-end-call
      - id: micro-behaviors/data/serialize/json::json-stringify-call
      - id: node-chunked-base64-upload
    needs: 2
  - id: openwrt-node-chunked-http-exfil
    desc: OpenWrt Node chunked HTTP exfiltration
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/request/client::https-request
      - id: node-chunked-base64-upload
      - id: micro-behaviors/communications/http/request/client::request-write-call
      - id: micro-behaviors/communications/http/request/client::request-end-call
    any:
      - id: objectives/credential-access/theft/file::openwrt-node-credential-config-harvest
      - id: objectives/discovery/system/fingerprint/runtime::js-system-info-discovery
      - id: micro-behaviors/fs/path/config/system::openwrt-uci-config-access
      - id: micro-behaviors/fs/file/read::read-node
    needs: 1
