defaults:
  platforms: [openwrt]
  for: [php]
  attack: T1041

composite_rules:
  - id: openwrt-php-credential-http-exfil
    desc: OpenWrt PHP credential HTTP exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/credential-access/theft/file::openwrt-php-credential-config-harvest
      - id: micro-behaviors/communications/http/request/options::php-stream-context-create
    any:
      - id: micro-behaviors/communications/http/client/file-read::file-get-contents-url
      - id: micro-behaviors/communications/http/client/file-read::file-get-contents-url-interpolation
      - id: micro-behaviors/data/serialize/object::json-encode
    needs: 2
