defaults:
  platforms: [ios, unix]
  for: [zig]
  attack: T1041

traits:
  - id: zig-ios-http-collect-post
    desc: Zig iOS HTTP collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /collect HTTP/1.1

  - id: zig-ios-tcpconnect-exfil
    desc: Zig iOS tcpConnect exfil
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'parseIp4\(TARGET_HOST[\s\S]{0,180}tcpConnect'

  - id: zig-ios-log-payload-exfil
    desc: Zig iOS log payload exfil
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'const payload = log\.items|exfiltrateData\(payload\)'

composite_rules:
  - id: zig-ios-http-log-exfil
    desc: Zig iOS HTTP log exfil
    crit: hostile
    conf: 0.98
    all:
      - id: zig-ios-http-collect-post
      - id: zig-ios-tcpconnect-exfil
      - id: zig-ios-log-payload-exfil
