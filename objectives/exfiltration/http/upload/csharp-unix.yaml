defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1041

traits:
  - id: csharp-activity-report-upload
    desc: C# activity report upload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "--- SYSTEM ACTIVITY REPORT ---"

  - id: csharp-webclient-base64-upload
    desc: C# WebClient base64 upload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Convert\.ToBase64String[\s\S]{0,220}UploadString'

  - id: csharp-fake-windows-ua
    desc: C# fake Windows user agent
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "Windows NT 10.0; Win64; x64"

composite_rules:
  - id: csharp-activity-base64-exfil
    desc: C# activity base64 exfil
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-activity-report-upload
      - id: csharp-webclient-base64-upload
    any:
      - id: csharp-fake-windows-ua
