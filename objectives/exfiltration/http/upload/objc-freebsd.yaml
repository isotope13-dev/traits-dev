defaults:
  platforms: [freebsd, netbsd, unix]
  for: [objc]
  attack: T1041

traits:
  - id: objc-http-collect-post
    desc: ObjC builds HTTP collect POST
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'POST /collect HTTP/1\.[01]'

  - id: objc-http-body-send
    desc: ObjC sends HTTP body over socket
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'send\s*\(\s*sock[\s\S]{0,180}(body|bytes\s*\+\s*sent)'

  - id: objc-plist-json-payload
    desc: ObjC serializes plist or JSON
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'NS(PropertyList|JSON)Serialization'

composite_rules:
  - id: objc-bsd-credential-http-exfil
    desc: ObjC BSD credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/files/config::objc-bsd-credential-sweep
      - id: objc-http-collect-post
      - id: objc-http-body-send
    any:
      - id: objc-plist-json-payload
      - id: micro-behaviors/communications/http/headers::content-length-template
      - id: micro-behaviors/communications/socket/connect::connect-symbol
      - id: micro-behaviors/communications/socket/send::send-symbol
    needs: 1
