defaults:
  platforms: [openwrt]
  for: [lua]
  attack: T1041
traits:
  - id: lua-temp-upload-file
    desc: Lua temp upload staging file
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '/tmp/\.(stealer|cache|payload|exfil)[A-Za-z0-9_-]*'
  - id: lua-hex-chunk-labels
    desc: Lua hex chunk labels
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'string\.format\("%03d_%s"|chunk_size\s*=\s*50'
composite_rules:
  - id: openwrt-lua-credential-http-exfil
    desc: OpenWrt Lua credential HTTP exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/credential-access/theft/file::openwrt-lua-credential-config-harvest
    any:
      - id: micro-behaviors/communications/http/curl::curl-post-flag
      - id: lua-temp-upload-file
      - id: objectives/exfiltration/http/upload::lua-http-exfil
    needs: 2
  - id: openwrt-lua-credential-raw-http-exfil
    desc: OpenWrt Lua raw HTTP credential exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/credential-access/theft/file::openwrt-lua-credential-config-harvest
      - id: micro-behaviors/communications/http/post::post-request-line
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect
    any:
      - id: micro-behaviors/communications/socket/send::lua-socket-send
      - id: micro-behaviors/communications/http/post::url-encoded-content-type
  - id: openwrt-lua-dns-sidechannel-exfil
    desc: OpenWrt Lua DNS side-channel exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/credential-access/theft/file::openwrt-lua-credential-config-harvest
      - id: micro-behaviors/communications/dns/lookup/txt::dns-txt-tool-query
    any:
      - id: lua-hex-chunk-labels
      - id: micro-behaviors/process/create/shell/invoke::lua-io-popen
