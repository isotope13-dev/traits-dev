defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1041
  mbc: E1041

composite_rules:
  - id: browser-selection-text-ip-upload
    desc: Browser extension uploads selected page text to a hardcoded external IP
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: micro-behaviors/browser-extension/action::context-menu-click-listener
      - id: micro-behaviors/browser-extension/action::selected-text-property-access
      - id: micro-behaviors/communications/ip/literal::javascript-external-ipv4-url
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/post::post
      - id: metadata/permission/manifest::is-chrome-manifest
