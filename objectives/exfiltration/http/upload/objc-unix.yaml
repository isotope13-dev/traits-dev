defaults:
  platforms: [unix]
  for: [objc, elf]
  attack: T1041

traits:
  - id: objc-libcurl-agent-header
    desc: ObjC libcurl agent header
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "X-Source: agent"

  - id: objc-curlopt-postfields
    desc: ObjC CURLOPT_POSTFIELDS
    crit: component
    conf: 0.9
    if:
      type: text
      substr: CURLOPT_POSTFIELDS

  - id: objc-screenshot-media-upload
    desc: ObjC uploads screenshot media
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "Content-Type: image/ppm"

composite_rules:
  - id: objc-libcurl-postfields
    desc: ObjC libcurl POSTFIELDS
    crit: suspicious
    conf: 0.93
    all:
      - id: objc-curlopt-postfields
      - id: micro-behaviors/process/interpreter/runtime/dynamic::objc-runtime-msgsend

  - id: objc-libcurl-agent-upload
    desc: ObjC libcurl agent upload
    crit: hostile
    conf: 0.98
    all:
      - id: objc-libcurl-agent-header
      - id: objc-libcurl-postfields
      - id: objc-screenshot-media-upload
    any:
      - id: micro-behaviors/communications/http/download/curl::curl-easy-perform
