defaults:
  platforms: [windows, unix]
  for: [powershell]
  attack: T1041

traits:
  - id: ps-zip-content-type
    desc: PowerShell ZIP content type
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: application/zip

  - id: ps-read-zip-variable
    desc: PowerShell reads ZIP variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ReadAllBytes\(\$[A-Za-z_]*(ZIP|ARCHIVE)[A-Za-z_]*\)'
      case_insensitive: true

composite_rules:
  - id: ps-zip-body-upload
    desc: PowerShell ZIP body upload
    crit: suspicious
    conf: 0.95
    near_lines: 12
    all:
      - id: ps-zip-content-type
      - id: ps-read-zip-variable
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::ps-post
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-body-param
