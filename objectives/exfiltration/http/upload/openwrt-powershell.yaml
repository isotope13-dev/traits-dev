defaults:
  platforms: [openwrt]
  for: [scripts]
  attack: T1041

composite_rules:
  - id: openwrt-powershell-credential-http-exfil
    desc: OpenWrt PowerShell credential exfil
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/credential-access/theft/file::openwrt-powershell-credential-config-harvest
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::ps-post
    any:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::exfil
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-body-param
    needs: 1
