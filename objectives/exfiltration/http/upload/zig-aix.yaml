defaults:
  platforms: [aix, unix]
  for: [zig, elf]
  attack: T1041
traits:
  - id: zig-http-post-exfil-request
    desc: Zig HTTP POST exfil request
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'POST /exfil HTTP/1\.1'
  - id: zig-sensitive-data-collection
    desc: Zig sensitive data collection
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: SENSITIVE DATA COLLECTION
composite_rules:
  - id: zig-sensitive-http-exfil
    desc: Zig sensitive HTTP exfil
    crit: hostile
    conf: 0.97
    all:
      - id: zig-http-post-exfil-request
      - id: zig-sensitive-data-collection
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
    needs: 1
