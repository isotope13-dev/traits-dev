defaults:
  platforms: [esxi, unix, windows]
  for: [c, cpp, elf, lua, perl, powershell]
  attack: T1041

traits:
  - id: c-ssl-write-http-post
    desc: C SSL_write HTTP POST
    crit: suspicious
    conf: 0.92
    for: [c, cpp, elf]
    platforms: [esxi, unix]
    if:
      type: text
      regex: 'SSL_write[\s\S]{0,260}POST /'

  - id: lua-https-post-request
    desc: Lua HTTPS POST request
    crit: suspicious
    conf: 0.92
    for: [lua]
    platforms: [esxi, unix]
    if:
      type: text
      regex: 'https\.request[\s\S]{0,220}method\s*=\s*"POST"'

  - id: perl-socket-http-post
    desc: Perl socket HTTP POST
    crit: suspicious
    conf: 0.9
    for: [perl]
    platforms: [esxi, unix]
    if:
      type: text
      regex: 'POST /[^\\r\\n]{0,80} HTTP/1\.1\\r\\n'

  - id: powershell-restmethod-post
    desc: PowerShell RestMethod POST
    crit: notable
    conf: 0.88
    for: [powershell]
    platforms: [esxi, windows]
    if:
      type: text
      regex: 'Invoke-RestMethod[\s\S]{0,160}-Method\s+Post'

  - id: powershell-base64-archive-body
    desc: PowerShell base64 archive body
    crit: suspicious
    conf: 0.92
    for: [powershell]
    platforms: [windows]
    if:
      type: text
      regex: 'Compress-Archive[\s\S]{0,420}ToBase64String'

composite_rules:
  - id: esxi-key-material-http-exfil
    desc: ESXi key material HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/files/config::esxi-credential-config-access
    any:
      - id: c-ssl-write-http-post
      - id: lua-https-post-request
      - id: perl-socket-http-post
      - id: powershell-restmethod-post

  - id: powershell-esxi-archive-http-exfil
    desc: PowerShell ESXi archive exfil
    crit: hostile
    conf: 0.97
    for: [powershell]
    platforms: [windows]
    all:
      - id: powershell-base64-archive-body
      - id: powershell-restmethod-post
