defaults:
  platforms: [unix, netbsd]
  for: [perl]
  attack: T1041

traits:
  - id: perl-raw-sock-tcp-connect
    desc: Perl raw SOCK TCP connect
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'socket\(SOCK[\s\S]{0,160}connect\(SOCK'

composite_rules:
  - id: perl-raw-socket-collect-exfil
    desc: Perl raw socket collect exfil
    crit: hostile
    conf: 0.98
    all:
      - id: perl-raw-sock-tcp-connect
      - id: objectives/exfiltration/http/upload::perl-socket-http-post
