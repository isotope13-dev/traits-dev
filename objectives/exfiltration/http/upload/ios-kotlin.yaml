defaults:
  platforms: [ios]
  for: [kotlin]
  attack: T1041

traits:
  - id: kotlin-ios-collection-post
    desc: Kotlin iOS collection POST
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'POST /collection HTTP/1\.[01]'

  - id: kotlin-ios-socket-send
    desc: Kotlin iOS socket send exfil
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'send\s*\(\s*sockFd[\s\S]{0,120}reqPtr'

composite_rules:
  - id: kotlin-ios-http-collection-exfil
    desc: Kotlin iOS HTTP collection exfil
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-ios-collection-post
      - id: kotlin-ios-socket-send
      - id: micro-behaviors/communications/http/upload::octet-stream-upload-header
