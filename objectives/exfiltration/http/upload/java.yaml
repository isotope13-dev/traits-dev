defaults:
  platforms: [unix, windows]
  for: [java, class, kotlin]
  attack: T1041
composite_rules:
  - id: java-http-exfil
    desc: Java script exfiltrating data via HttpURLConnection
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/client/library::java-http-url-connection
      - id: micro-behaviors/data/encode/base64::java-base64-encode
