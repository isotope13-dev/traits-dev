defaults:
  platforms: [unix, windows]
  for: [java, class, kotlin]
  attack: T1041
composite_rules:
  - id: java-http-exfil
    desc: Java HttpURLConnection exfil
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/client/library::java-http-url-connection
      - id: micro-behaviors/data/encode/base64::java-base64-encode
  - id: jvm-sensitive-http-post-exfil
    desc: Java/Kotlin sensitive HTTP exfil
    crit: hostile
    conf: 0.97
    for: [java, kotlin]
    near_lines: 260
    all:
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source
      - id: micro-behaviors/communications/http/post::jvm-http-body-write-source
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-bytecode
      - id: micro-behaviors/fs/path/config/accounts::account-files
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-credentials
      - id: objectives/discovery/system/fingerprint/info::java-broad-host-fingerprint-source
      - id: objectives/credential-access/files/config::java-developer-credential-sweep
    needs: 1
  - id: jvm-bytecode-sensitive-http-post-exfil
    desc: JVM bytecode sensitive HTTP exfil
    crit: hostile
    conf: 0.97
    for: [class, jar, zip]
    all:
      - id: micro-behaviors/communications/http/lib/urlconnection::request-java-bytecode
      - id: micro-behaviors/communications/http/post::jvm-bytecode-post-method
      - id: micro-behaviors/communications/http/post::jvm-bytecode-do-output
      - id: micro-behaviors/data/buffer::jvm-outputstream-write
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-bytecode
      - id: micro-behaviors/fs/path/config/accounts::account-files
      - id: micro-behaviors/os/privilege/paths::etc-shadow-bytecode
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-credentials
    needs: 1
    unless:
      - id: well-known/lib/benign-runtime-bundles/
  - id: kotlin-sensitive-http-copy-exfil
    desc: Kotlin sensitive HTTP copy exfiltration
    crit: hostile
    conf: 0.97
    for: [kotlin]
    all:
      - id: micro-behaviors/communications/http/post::jvm-urlconnection-post-source
      - id: micro-behaviors/communications/http/post::kotlin-http-body-copy-source
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/config/accounts::account-files
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-credentials
    needs: 1
  - id: kotlin-bytecode-sensitive-http-copy-exfil
    desc: Kotlin bytecode sensitive HTTP copy exfiltration
    crit: hostile
    conf: 0.97
    for: [class, jar, zip]
    all:
      - id: micro-behaviors/communications/http/lib/urlconnection::request-java-bytecode
      - id: micro-behaviors/communications/http/post::jvm-bytecode-post-method
      - id: micro-behaviors/communications/http/post::jvm-bytecode-do-output
      - id: micro-behaviors/communications/http/post::kotlin-bytecode-copyto-default
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-bytecode
      - id: micro-behaviors/fs/path/config/accounts::account-files
      - id: micro-behaviors/os/privilege/paths::etc-shadow-bytecode
    needs: 1
