defaults:
  platforms: [unix]
  for: [lua]
  attack: T1041
composite_rules:
  - id: lua-http-exfil
    desc: Lua script exfiltrating data via curl or fetch
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/invoke::lua-os-execute
    any:
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: micro-behaviors/communications/http/client/library::fetch-cmd
