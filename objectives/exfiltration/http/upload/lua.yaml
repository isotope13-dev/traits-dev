defaults:
  platforms: [unix]
  for: [lua]
  attack: T1041
traits:
  - id: lua-http-exfil
    desc: Lua os.execute invokes curl
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'os\.execute\s*\([^)]{0,220}\bcurl\b'
    unless:
      - type: text
        regex: 'https?://(127\.0\.0\.1|localhost|\[::1\])(?::[0-9]+)?/'
