defaults:
  for: [groovy]
  platforms: [unix, windows]
  attack: T1041

traits:
  - id: groovy-file-text-read
    desc: Groovy reads file text
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: 'new File\s*\([^\n]{0,80}\)[\s\S]{0,160}\.text'

  - id: groovy-http-post-output
    desc: Groovy HTTP POST output
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'setRequestMethod\s*\(\s*["'']POST["'']\s*\)[\s\S]{0,240}outputStream'

  - id: groovy-hardcoded-upload-url
    desc: Groovy hardcoded upload URL
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: 'new URL\s*\(\s*["'']https?://.{0,120}/upload'

composite_rules:
  - id: groovy-http-file-upload
    desc: Groovy HTTP file upload
    crit: hostile
    conf: 0.95
    all:
      - id: groovy-file-text-read
      - id: groovy-http-post-output
      - id: groovy-hardcoded-upload-url
