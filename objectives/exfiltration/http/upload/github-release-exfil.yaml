# GitHub API Abuse for Data Exfiltration
# Creates repos and uploads encrypted data as release assets.
# Observed in trivy-gha supply chain attack as fallback exfil channel.
# ATT&CK: T1567.001 (Exfiltration to Code Repository)
defaults:
  for: [shell, python, javascript]
  platforms: [unix, windows]
  attack: T1567.001
composite_rules:
  - id: github-release-exfil
    desc: GitHub release asset upload
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/upload::github-uploads-api
    any:
      - id: micro-behaviors/communications/http/services/github::github-create-release-api
      - id: micro-behaviors/communications/http/upload::curl-data-binary
  - id: github-repo-exfil-chain
    desc: Creates repo then uploads data via releases
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/services/github::github-create-repo-api
      - id: micro-behaviors/communications/http/services/github::github-create-release-api
      - id: micro-behaviors/communications/http/upload::curl-data-binary
  - id: github-repo-contents-exfil
    desc: GitHub repo contents exfiltration workflow
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/services/github::github-create-repo
      - id: micro-behaviors/communications/http/services/github::github-repo-file-write
    any:
      - id: objectives/credential-access/api-harvest/token::github-token-pattern-harvest
      - id: objectives/credential-access/env/secrets/named-access::node-git-token
  - id: github-release-encrypted-archive-exfil
    desc: Encrypted archive uploaded to GitHub release
    crit: hostile
    conf: 0.97
    all:
      - id: github-release-exfil
      - id: objectives/exfiltration/http/upload::hybrid-encrypt-exfil
    any:
      - id: objectives/collection/archive/compress::tar-create
      - id: objectives/collection/archive/compress::tar-current-dir
