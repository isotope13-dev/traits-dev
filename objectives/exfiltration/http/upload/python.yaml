defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1041
traits:
  - id: credential-var-in-dict
    desc: Credential variable used in dictionary
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '["''](password|token|secret|key)["'']\s*:\s*\$'
  - id: github-cli-download-auth-token-fragment
    desc: "GitHub CLI download authz header fragment"
    crit: component
    conf: 0.8
    if:
      type: text
      substr: 'GH_CLI_DOWNLOAD_LINK=$(curl -H "Authorization:token $GITHUB_TOKEN"'
  - id: cicd-release-script-b64encode-marker
    desc: CI release script base64 encoding marker
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "base64.b64encode((Path(__file__).parent / 'scripts' / 'cicd-release.sh')"
  - id: hermes-cli-model-marker
    desc: Hermes CLI model client marker
    crit: component
    conf: 0.8
    if:
      type: text
      substr: hermes_cli
composite_rules:
  - id: aws-shared-credentials-http-exfil
    desc: AWS shared credentials exfiltrated over HTTP
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/cloud/aws-token::python-aws-shared-credentials-file-access
      - id: micro-behaviors/communications/http/client/library::urllib-request
  - id: urllib-credential-exfil
    desc: Urllib exfiltration with credential targeting
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/client/library::urllib-request
      - id: micro-behaviors/os/env/vars/access::getenv
  - id: python-targz-requests-post
    desc: Python script uploading tar.gz archive via requests
    crit: hostile
    conf: 0.98
    unless:
      - id: metadata/package/quality/source::source-archive-member
      - id: metadata/package/testing/
      - id: metadata/package/testing/presence/harness::python-info-test-path
    all:
      - id: micro-behaviors/data/compress/library::gzip-compress-call
      - id: micro-behaviors/communications/http/lib/requests::requests-post
    any:
      - id: micro-behaviors/data/compress/library::tarfile-open-call
      - id: metadata/file/extension/identity::archive-extension-reference
  - id: python-header-archive-post
    desc: Python script sending archive in HTTP header
    crit: hostile
    conf: 0.98
    unless:
      - id: github-cli-download-auth-token-fragment
      - id: cicd-release-script-b64encode-marker
    all:
      - id: micro-behaviors/communications/http/headers::auth-header
      - id: micro-behaviors/data/encode/base64::b64encode-call
    any:
      - id: micro-behaviors/data/compress/library::gzip-compress-call
      - id: micro-behaviors/data/compress/library::tarfile-open-call
      - id: metadata/file/extension/identity::archive-extension-reference
  - id: python-urllib-exfil
    desc: Python script exfiltrating data via urllib
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/client/library::urllib-request
      - id: micro-behaviors/data/serialize/json::json-dumps-call
    # Exfiltration means data is UPLOADED, so require a POST/upload signal
    # (urlopen with data=, or a Request object). urllib + json.dumps alone is
    # also "download a reference DB and write a local JSON cache" (e.g.
    # tcrsift/datacache.py downloads via urlopen GET) — not exfiltration.
    any:
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-data
      - id: micro-behaviors/communications/http/lib/urllib::urllib-request-object
    unless:
      - id: well-known/lib/pyaigis
      # urllib + json.dumps against a loopback target is local IPC (e.g. an
      # aria2/JSON-RPC daemon), not exfiltration.
      - id: micro-behaviors/communications/http/endpoints/
      - id: hermes-cli-model-marker
