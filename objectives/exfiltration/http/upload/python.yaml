# HTTP Exfiltration - Python
# MBC: C0002 (HTTP Communication)
# ATT&CK: T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [windows, unix]
  crit: suspicious
  for: [python]
  attack: "T1041"
traits:
  # Data collection with HTTP transmission
- id: system-data-post-platform--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: processor
  count_max: 1021757
- id: system-data-post-platform--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: platform
  count_max: 1021758
- id: system-data-post-platform--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: machine
  count_max: 1021759
- id: system-data-post-platform--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: request
  count_max: 1021760
- id: system-data-post-platform--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: system
  count_max: 1021761
- id: system-data-post-platform--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: uname
  count_max: 1021762
- id: system-data-post-platform--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: node
  count_max: 1021763
- id: system-data-post-platform--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: post
  count_max: 1021764
- id: system-data-post-uname
  desc: POST system data (uname)
  conf: 0.8
  if:
    type: text
    regex: "uname\\(.{0,50}\\b(post|send|request)\\b"
- id: system-data-post-hostname
  desc: POST system data (hostname)
  conf: 0.8
  if:
    type: text
    regex: "hostname\\(.{0,50}\\b(post|send|request)\\b"
- id: file-read-http-send
  desc: Read file and HTTP send
  conf: 0.8
  if:
    type: text
    regex: "\\bopen\\b.{0,50}\\bread\\b.{0,50}\\b(post|send|request)\\b"
- id: private-key-identifier
  desc: Private key identifier in code
  crit: component
  conf: 0.8
  if:
    type: text
    regex: "\\b(p(r|t)ivat(e)?_?key|private_?key)\\b"
- id: urllib-post-with-data-dict
  desc: urllib POST request with data dict
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: 'request\.Request\([^)]{0,60}method=.POST'
- id: credential-var-in-dict
  desc: Credential field packed into dict
  crit: component
  conf: 0.8
  if:
    type: text
    regex: "\\{[^}]{0,160}[\"']?(access_key|secret_key|password|token)[\"']?\\s*:"
    case_insensitive: true
- id: python-targz-requests-post
  desc: Python posts tar archive
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '\.tar\.gz[\s\S]{0,900}requests\.post\s*\(|requests\.post\s*\([\s\S]{0,900}\.tar\.gz'
- id: python-header-archive-post--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    regex: 'headers\s*=[\s\S]{0,500}\.tar\.gz[\s\S]{0,500}requests\.post'
  count_max: 1021772
- id: python-header-archive-post--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    regex: 'requests\.post[\s\S]{0,500}headers\s*=[\s\S]{0,500}\.tar\.gz'
  count_max: 1021773
composite_rules:
- id: secret-dict-material
  desc: Secret keyword in credential dict
  crit: component
  conf: 0.8
  all:
  - id: objectives/exfiltration/http/upload::credential-var-in-dict
  - id: micro-behaviors/data/text/keywords/lexicon::secret
- id: system-data-post
  desc: POST system data
  crit: suspicious
  conf: 0.8
  any:
  - id: system-data-post-platform
  - id: system-data-post-uname
  - id: system-data-post-hostname
- id: exfiltration
  desc: "System info exfiltration"
  crit: suspicious
  conf: 0.85
  needs: 2
  any:
  - id: system-data-post
  - id: file-read-http-send
  all:
  - id: objectives/discovery/system/
  - id: micro-behaviors/communications/http/request/
- id: key-material-post
  desc: Posts key-like material over HTTP
  crit: suspicious
  conf: 0.9
  mbc: "E1041"
  all:
  - id: micro-behaviors/communications/http/lib/requests::requests-post
  - id: micro-behaviors/communications/http/request/client::url-literal
  any:
  - id: objectives/impact/cryptojacking/miner/context::wallet-ref
  - id: objectives/exfiltration/http/upload::private-key-identifier
  - id: objectives/exfiltration/http/upload::credential-var-in-dict
  - id: objectives/exfiltration/http/upload::secret-dict-material
- id: urllib-credential-exfil
  desc: Credentials POSTed via urllib request
  crit: hostile
  conf: 0.95
  mbc: "E1041"
  all:
  - id: urllib-post-with-data-dict
  - id: credential-var-in-dict
  - id: micro-behaviors/communications/http/lib/urllib::urllib-request-alias-urlopen
- id: obfuscated-url-credential-exfil
  desc: Obfuscated URL used for credential exfiltration
  crit: hostile
  conf: 0.96
  mbc: "E1041"
  all:
  - id: urllib-post-with-data-dict
  - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
  any:
  - id: objectives/anti-static/obfuscation/eval/scripting::python-chr-ord-shift
  - id: objectives/anti-static/obfuscation/eval/scripting::python-chr-ord-reverse-shift
- id: remote-gated-key-exfil
  desc: Remote-gated key exfiltration
  crit: hostile
  conf: 0.96
  mbc: "E1041"
  all:
  - id: objectives/exfiltration/http/upload::key-material-post
  - id: objectives/command-and-control/remote-command/config::remote-switch-gating
  # Python Windows info stealer: popen(systeminfo) + HTTP POST exfil
  # Precision: os-popen-ast (~2.0) + popen-systeminfo (~2.0) + requests-post (~0.5) + python-only (+0.5) >= 5.0
- id: popen-systeminfo-http-post
  desc: Python Windows info stealer (popen systeminfo + HTTP POST)
  crit: hostile
  conf: 0.93
  mbc: "E1041"
  all:
  - id: micro-behaviors/process/create/subprocess::os-popen-ast
  - id: objectives/discovery/system/fingerprint/runtime::popen-systeminfo
  - id: micro-behaviors/communications/http/lib/requests::requests-post
- id: discord-browser-stealer
  desc: Python browser credential theft to Discord
  crit: hostile
  conf: 0.98
  attack: "T1555.003"
  mbc: "B0028"
  all:
  - id: objectives/exfiltration/messaging/webhook::discord-exfiltration
  - id: objectives/credential-access/browser/multi-target::python-browser-stealer-imports
  any:
  - id: objectives/credential-access/browser/chromium::multi-browser
  - id: objectives/discovery/host/browser::multi-browser-profile-targeting
- id: system-data-post-platform
  desc: POST system data (platform)
  crit: baseline
  conf: 0.8
  any:
  - id: system-data-post-platform--rx-1
  - id: system-data-post-platform--rx-2
  - id: system-data-post-platform--rx-3
  - id: system-data-post-platform--rx-4
  - id: system-data-post-platform--rx-5
  - id: system-data-post-platform--rx-6
  - id: system-data-post-platform--rx-7
  - id: system-data-post-platform--rx-8
- id: python-header-archive-post
  desc: Python posts archive with header
  crit: suspicious
  conf: 0.93
  any:
  - id: python-header-archive-post--rx-9
  - id: python-header-archive-post--rx-10
