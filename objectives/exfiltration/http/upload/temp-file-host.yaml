defaults:
  platforms: [windows, linux, macos]
  for: [python]
  attack: T1041

composite_rules:
  - id: temp-file-host-image-exfil
    desc: Image data uploaded to public temporary host
    crit: hostile
    conf: 0.96
    ref: sha256:c32ab210c704a33aa44c0d7319ee854303abcd0ac41434f5710f91b390cd1e80
    all:
      - id: objectives/command-and-control/infrastructure/domain/hosting::public-file-or-payload-hosting
      - id: micro-behaviors/communications/http/upload::requests-post-files-parameter
      - id: micro-behaviors/data/encode/image/jpeg::in-memory-jpeg-encode
    any:
      - id: objectives/anti-static/obfuscation/string/concat::python-split-host-parts
