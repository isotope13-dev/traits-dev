defaults:
  platforms: [ios]
  for: [lua]
  attack: T1041

traits:
  - id: lua-ios-curl-collect-post
    desc: Lua iOS curl collect POST
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'curl -s -X POST[\s\S]{0,160}/collect'

  - id: lua-ios-base64-exfil-data
    desc: Lua iOS base64 exfil data
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'base64EncodedStringWithOptions|data=%s'

composite_rules:
  - id: lua-ios-http-data-exfil
    desc: Lua iOS HTTP data exfil
    crit: hostile
    conf: 0.98
    all:
      - id: lua-ios-curl-collect-post
      - id: lua-ios-base64-exfil-data
