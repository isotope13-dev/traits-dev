defaults:
  platforms: [unix, windows, macos]
  attack: T1567.002

# HTTP/FTP Upload Symbols - Deleted
# This was a taxonomy violation - atomic symbol detection belongs in micro-behaviors/
# The capabilities already exist at:
# - micro-behaviors/communications/http/upload::http-upload-symbol
# - micro-behaviors/communications/ftp/upload::ftp-upload-symbol
#
# For proper exfiltration objectives, combine upload capabilities with other
# evidence of malicious intent (sensitive file paths, encoding, etc.)

composite_rules:
  # A binary that disguises itself as UPX-packed — section names without a valid
  # magic, or "packed" sections that are not actually compressed — and ALSO ships
  # a multipart file uploader is a masquerading exfil/uploader bot. Genuine
  # UPX-packed upload tools keep valid UPX! magic and high-entropy compressed
  # sections, so the tamper/masquerade gate excludes them; the conjunction with a
  # remote multipart upload is malicious.
  - id: masquerade-packed-multipart-uploader
    desc: Fake-UPX-masquerading binary that uploads files over HTTP multipart
    crit: hostile
    conf: 0.9
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/upload::multipart-form-data-upload
    any:
      - id: objectives/anti-static/pack/upx::scrambled-upx-header
      - id: objectives/anti-static/pack/upx::upx-sections-not-compressed
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
