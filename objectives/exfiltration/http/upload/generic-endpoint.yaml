defaults:
  platforms: [android, unix]
  for: [shell, php, perl, c, cpp, elf, go, kotlin]
  attack: T1041

traits:
  - id: exfil-beacon-http-endpoint
    desc: HTTP exfiltration or beacon URL path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'https?://[^"''\s]{1,120}/(exfil(trate|tration)?|beacon)([/?#]|\b)'
    unless:
      # Security tests commonly embed representative /exfil URLs as inert
      # fixtures; the Go test-file context is not executable exfiltration.
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: well-known/app/wordpress-plugins::wordpress-plugin-path-stats4wp
      - id: well-known/tool/detection/clawker::source-tree
      - id: well-known/app/wordpress-plugins/
      - id: well-known/tool/detection/llm-scanner::mvar-security-context
      - id: well-known/app/k9x-satan::attack-fixture-context

  - id: raw-exfil-post-path
    desc: Raw HTTP exfil POST path
    crit: component
    conf: 0.86
    if:
      type: text
      substr: 'POST /exfil'
