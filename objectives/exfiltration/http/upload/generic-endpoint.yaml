defaults:
  platforms: [android, unix]
  for: [shell, php, perl, c, cpp, elf, go, kotlin]
  attack: T1041

traits:
  - id: generic-http-exfil-endpoint
    desc: Generic HTTP exfil endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'https?://[^"''\s]{1,120}/(exfil|collect|beacon)\b'
    unless:
      - id: well-known/tool/detection/clawker::source-tree
      - id: well-known/app/wordpress-plugins::known-wordpress-plugin
      - type: text
        substr: google-analytics.com/collect

  - id: raw-exfil-post-path
    desc: Raw HTTP exfil POST path
    crit: component
    conf: 0.86
    if:
      type: text
      substr: 'POST /exfil'
