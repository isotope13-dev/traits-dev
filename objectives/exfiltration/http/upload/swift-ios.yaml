defaults:
  platforms: [ios]
  for: [swift]
  attack: T1041

traits:
  - id: swift-ios-urlsession-collect-post
    desc: Swift iOS URLSession collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'URLSession\.shared[\s\S]{0,220}httpMethod = "POST"'

  - id: swift-ios-keychain-payload
    desc: Swift iOS keychain payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'SecItemCopyMatching[\s\S]{0,220}KEYCHAIN='

composite_rules:
  - id: swift-ios-keychain-http-exfil
    desc: Swift iOS Keychain HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: swift-ios-urlsession-collect-post
      - id: swift-ios-keychain-payload
