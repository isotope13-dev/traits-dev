defaults:
  platforms: [windows]
  for: [pe]
  attack: T1041

traits:
  - id: encoded-rfc1918-http-c2-110-login
    desc: Encoded internal HTTP C2 login URL
    crit: component
    conf: 0.99
    if:
      type: text
      exact: 9/Pz76m8vK6vvbGwr72usr2yqa6ur7z7/AT2/byf
  - id: encoded-rfc1918-http-c2-110-file
    desc: Encoded internal HTTP C2 file URL
    crit: component
    conf: 0.99
    if:
      type: text
      exact: 9/Pz76m8vK6vvbO9sK+9saeprq6vvPLwAvH7/AT2/bwF9vsCvJ8=
composite_rules:
  - id: encoded-internal-http-c2-post
    desc: Encoded internal HTTP C2 POST endpoints
    crit: suspicious
    conf: 0.99
    all:
      - id: encoded-rfc1918-http-c2-110-login
      - id: encoded-rfc1918-http-c2-110-file
      - id: micro-behaviors/communications/http/post::wininet-post
    any:
      - id: micro-behaviors/communications/http/post::form-urlencoded-header-pe
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::base64-arithmetic-xor-decoder
  - id: encoded-recon-log-http-exfil
    desc: Encoded recon log HTTP exfiltration
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/discovery/system/fingerprint/encoded::encoded-windows-recon-to-log
      - id: encoded-internal-http-c2-post
      - id: micro-behaviors/fs/file/read::read-file
