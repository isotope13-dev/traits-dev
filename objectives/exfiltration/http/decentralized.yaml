defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell, python]
  attack: T1041
traits:
- id: icp-raw-canister-endpoint
  desc: ICP raw canister HTTP endpoint
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '\b[a-z0-9-]{5,80}\.raw\.icp0\.io\b'

- id: icp-canister-drop-endpoint
  desc: ICP canister drop endpoint
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'https://[a-z0-9-]{5,80}\.raw\.icp0\.io/drop\b'

composite_rules:
- id: encrypted-icp-canister-exfil
  desc: Encrypted exfiltration to ICP canister
  crit: hostile
  conf: 0.98
  all:
  - id: icp-canister-drop-endpoint
  any:
  - id: objectives/exfiltration/http::node-hybrid-encrypted-exfil
  - id: objectives/exfiltration/http::hybrid-encrypt-exfil
  - id: micro-behaviors/crypto/symmetric/aes::aes-256-cbc
