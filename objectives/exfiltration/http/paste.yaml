defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
composite_rules:
  - id: crypto-capability
    desc: Helper for crypto/encoding capabilities
    crit: component
    conf: 0.6
    any:
      - id: micro-behaviors/crypto/library/
      - id: micro-behaviors/data/encode/
  - id: encrypted-exfiltration-to-paste-site
    desc: Encrypted data exfiltration to a public paste service
    crit: hostile
    conf: 0.9
    all:
      - id: crypto-capability
      - id: objectives/command-and-control/infrastructure::dpaste
