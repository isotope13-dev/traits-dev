# GitHub API Abuse for Data Exfiltration
# Creates repos and uploads encrypted data as release assets.
# Observed in trivy-gha supply chain attack as fallback exfil channel.
# ATT&CK: T1567.001 (Exfiltration to Code Repository)
defaults:
  for: [shell, python, javascript]
  platforms: [linux, unix, macos, windows]
  attack: T1567.001
composite_rules:
  - id: github-release-exfil
    desc: Data exfiltration via GitHub release assets
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/upload::github-uploads-api
    any:
      - id: micro-behaviors/communications/http/services::github-create-release-api
      - id: micro-behaviors/communications/http/upload::curl-data-binary
  - id: github-repo-exfil-chain
    desc: Creates repo then uploads data via releases
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/services::github-create-repo-api
      - id: micro-behaviors/communications/http/services::github-create-release-api
      - id: micro-behaviors/communications/http/upload::curl-data-binary
