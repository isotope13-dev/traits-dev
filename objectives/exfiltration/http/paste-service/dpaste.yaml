defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, go]
composite_rules:
  - id: dpaste-api-exfil
    desc: Dpaste API exfiltration detected
    crit: hostile
    conf: 1.0
    all:
      - id: micro-behaviors/communications/http/services/dpaste::dpaste-api
      - id: dpaste-api-exfil-method
      - id: dpaste-api-exfil-auth
  - id: dpaste-api-exfil-method
    desc: Dpaste API POST helper
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/communications/http/services/dpaste::dpaste-api
      - id: micro-behaviors/communications/http/post::post
  - id: dpaste-api-exfil-auth
    desc: Dpaste API authentication header or token
    crit: suspicious
    conf: 0.8
    any:
      - id: objectives/credential-access/env/token::bearer-token-hex-16
      - id: micro-behaviors/communications/http/request/client::auth-header-dup
      - id: micro-behaviors/communications/http/headers::go-bearer-auth-set
    unless:
      - id: metadata/library/structure/
      - id: metadata/build/bundler/
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: go-dpaste-encrypted-form-exfil
    desc: Go encrypted Dpaste form exfiltration
    crit: hostile
    conf: 0.98
    attack: T1041
    mbc: B0030
    for: [go]
    all:
      - id: micro-behaviors/communications/http/services/dpaste::dpaste-api-go
      - id: micro-behaviors/communications/http/post::go-url-encoded-form-post
      - id: micro-behaviors/communications/http/headers::go-bearer-auth-set
      - id: micro-behaviors/crypto/symmetric/aes/library::go-cfb-encrypter
      - id: micro-behaviors/data/serialize/json::go-json-marshal
      - id: micro-behaviors/data/encode/hex::go-hex-encode-string
  - id: go-direct-dpaste-post
    desc: Go direct POST to Dpaste API
    crit: suspicious
    conf: 0.95
    attack: T1041
    for: [go]
    all:
      - id: micro-behaviors/communications/http/services/dpaste::dpaste-api-go
      - id: micro-behaviors/communications/http/post::http-newrequest-post-literal-url
  - id: go-dpaste-literal-bearer-post
    desc: Go Dpaste POST with literal bearer token
    crit: hostile
    conf: 0.98
    attack: T1041
    mbc: B0030
    for: [go]
    all:
      - id: go-direct-dpaste-post
      - id: micro-behaviors/communications/http/headers::go-bearer-auth-set
