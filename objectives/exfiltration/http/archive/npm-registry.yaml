defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1041
  mbc: E1041

composite_rules:
  - id: npm-published-ai-agent-archive-exfil
    desc: Archives an AI agent home and publishes it through an authenticated npm registry
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/collection/archive/create::ai-agent-home-tar-collection
      - id: micro-behaviors/os/package-manager/publish::npm-publish-command
    any:
      - id: micro-behaviors/os/package-manager/config::npm-set-registry-auth-token
      - id: objectives/credential-access/env/secrets/file::npm-auth-token-key-raw
