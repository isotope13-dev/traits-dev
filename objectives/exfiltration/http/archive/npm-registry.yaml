defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1041
  mbc: E1041

composite_rules:
  - id: npm-published-filesystem-archive-exfil
    desc: Publishes encoded filesystem archive through npm
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/collection/archive/create::broad-filesystem-tar-collection
      - id: micro-behaviors/fs/file/read::read-node
      - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode
      - id: micro-behaviors/os/package-manager/publish::npm-publish-command
