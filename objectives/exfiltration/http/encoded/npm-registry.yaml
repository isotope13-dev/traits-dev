defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: E1041

composite_rules:
  - id: npm-package-description-command-exfil
    desc: Publishes encoded command results in npm description
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/remote-command/control::npm-dist-tag-shell-tasking
      - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode
      - id: micro-behaviors/os/package-manager/publish::npm-variable-description-package
      - id: micro-behaviors/os/package-manager/publish::npm-publish-command
