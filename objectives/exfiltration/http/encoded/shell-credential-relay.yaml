# A shell script containing an embedded Node postinstall-style relay.  Each
# capability remains a notable micro-behavior; the combination is suspicious
# because it reads CI/cloud credentials, hides the destination behind atob,
# and sends the value through a child-process curl request.
defaults:
  platforms: [unix, windows]
  for: [shell]
  attack: "T1041,T1552.001,T1027"

composite_rules:
  - id: shell-embedded-credential-relay
    desc: Embedded Node code reads credentials and relays them through curl
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/bridge::shell-embedded-node-child-process-exec
      - id: micro-behaviors/communications/http/curl::shell-embedded-node-curl-exec
      - id: micro-behaviors/data/source/dynamic/eval::shell-embedded-eval-of-atob
    any:
      - id: micro-behaviors/os/env/vars/credentials::shell-embedded-node-credential-env-read
      - id: micro-behaviors/os/env/vars/credentials::shell-embedded-node-npm-token-read
    unless:
      - id: metadata/package/quality/false-positives-shell::supply-shield-fixture-context
