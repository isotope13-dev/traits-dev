# Encoded JavaScript data sent in an HTTP POST.
#
# XOR and base64 are common implementation details on their own.  Require an
# actual POST sink as well as an explicit external fetch target before calling
# the combination exfiltration-like; this keeps API-key obfuscation and normal
# GET-based application traffic neutral.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: B0030

traits:
  # b64encode(JSON.stringify(...)) packs structured browser state before upload.
  - id: b64encode-json-stringify-call
    desc: Base64-encodes JSON.stringify output
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'b64encode\s*\(\s*JSON\.stringify\s*\('

composite_rules:
  - id: js-xor-base64-http-post-exfil
    desc: JavaScript XOR/base64 data sent to an external HTTP POST endpoint
    crit: hostile
    conf: 0.94
    all:
      - id: micro-behaviors/crypto/symmetric/xor/loop::xor-modulo-key-loop
      - id: micro-behaviors/data/encode/base64::btoa-symbol
      - id: micro-behaviors/communications/http/endpoints::fetch-explicit-external-url
      - id: micro-behaviors/communications/http/post::fetch-post-call
    # Google Tag Manager legitimately encodes analytics payloads before
    # sending them to its collection endpoints.  Its bundle fingerprint is
    # a benign context, not evidence of attacker-controlled exfiltration.
    unless:
      - id: metadata/library/structure::google-tag-manager-bundle

  # Content-script / extension spyware packs cookies + profile JSON into a
  # Base64 POST body. Requires the encode, the POST body shape, and a cookie
  # read so ordinary JSON APIs do not inherit the hostile label.
  - id: js-cookie-b64-json-post-exfil
    desc: Cookies packed into Base64 JSON HTTP POST
    crit: hostile
    conf: 0.96
    attack: T1539,T1041
    all:
      - id: b64encode-json-stringify-call
      - id: micro-behaviors/communications/http/post::fetch-post-b64encode-body
      - id: micro-behaviors/communications/http/cookies::document-cookie-read
      - id: micro-behaviors/communications/http/request/client::fetch-post-pattern
    any:
      - id: micro-behaviors/browser-extension/lifecycle::chrome-namespace
      - id: micro-behaviors/data/db/web-storage::chrome-storage-api
    unless:
      - id: metadata/library/structure::google-tag-manager-bundle
