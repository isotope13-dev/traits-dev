# XOR + base64 encoded data beaconed to an external host from the browser.
#
# Supply-chain skimmers obscure the harvested data (new admin credentials,
# nonces, site origin, WordPress version) before exfiltration: a cyclic XOR
# decoder loop keyed on a hardcoded string, base64 via btoa(), then a fetch()
# to an absolute attacker URL (e.g. tidio.cc/cdn-cgi/* in the OptinMonster
# attack). The XOR-encode → base64 → external-fetch triad has no legitimate use
# in page scripts; benign telemetry sends JSON to a same-origin or first-party
# endpoint without hand-rolled XOR.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
  mbc: B0030

traits:
  - id: btoa-base64-encode
    desc: base64 encode via btoa()
    crit: component
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: btoa

  - id: fetch-external-absolute-url
    desc: fetch() to an absolute external URL
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'fetch\s*\(\s*[`"'']https?://'

composite_rules:
  - id: js-xor-base64-external-beacon
    desc: XOR+base64 encoded data beaconed to external host
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/encode/xor::js-xor-cyclic-pattern
      - id: btoa-base64-encode
      - id: fetch-external-absolute-url
    unless:
      - id: well-known/app/browser-extension::adblock-extension-bundle
