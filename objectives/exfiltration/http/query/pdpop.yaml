defaults:
  platforms: [windows]
  for: [pe]
  attack: T1041

traits:
  - id: pdpop-video-metadata-query
    desc: PDPOP video metadata upload query
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: http://bbs.pdpop.com/insertVideoInfo.php?save_name=%s_%I64d&duration=%I64d&playtime=%d&width=%d&height=%d&video_bitrate=%d&audio_bitrate=%d&audio_sample_rate=%d&avgfps=%f&vcodecname=%s&acodecname=%s
      section: .rdata

  - id: pdpop-md5-lookup-query
    desc: PDPOP MD5 upload lookup query
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: http://bbs.pdpop.com/board_md5_re.php?szMD5SUM=%s&nSize=%I64d&fromWhere=upclient
      section: .rdata

  - id: pdpop-filtering-query
    desc: PDPOP filtering upload query
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: http://bbs.pdpop.com/filteringInsert.php?m1_hash=%s&murekaHash=&smartHash=%s&md5sum=%s&fileSize=%I64d
      section: .rdata

  - id: pdpop-upload-status-query
    desc: PDPOP upload status query template
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: uid=%I64d&FileIdx=%s&Content_id=%s&Content_title=%s
      section: .rdata

composite_rules:
  - id: pdpop-upload-client-context
    desc: PDPOP upload client context
    crit: component
    conf: 0.99
    all:
      - id: metadata/file/catalog/identity::webhard-registry-path
      - id: metadata/file/catalog/identity::sfpdpop-helper-dll

  - id: pdpop-upload-metadata-exfil
    desc: PDPOP upload metadata exfiltration
    crit: suspicious
    conf: 0.99
    all:
      - id: pdpop-upload-client-context
    any:
      - id: pdpop-md5-lookup-query
      - id: pdpop-filtering-query
      - id: pdpop-upload-status-query
    needs: 2

  - id: pdpop-video-metadata-exfil
    desc: PDPOP video upload telemetry exfiltration
    crit: suspicious
    conf: 0.995
    all:
      - id: pdpop-upload-client-context
      - id: pdpop-video-metadata-query
