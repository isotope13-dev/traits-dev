defaults:
  platforms: [netscaler, appliance, unix]
  for: [lua]
  attack: T1041

traits:
  - id: lua-http-call-exfil-query
    desc: Lua HTTP exfil query
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'http\.call[\s\S]{0,220}/exfil/(cookies|headers)\?data='

  - id: lua-exfil-query-path
    desc: Lua exfil query path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/exfil/(cookies|headers)\?data='

  - id: lua-txn-cookie-header-read
    desc: Lua txn cookie header read
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'txn\.get_http_request_(cookies|headers)\(\)'

  - id: lua-octet-stream-exfil
    desc: Lua octet-stream exfil
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'X-Source.{0,80}netscaler-lua'

composite_rules:
  - id: lua-netscaler-cookie-header-exfil
    desc: Lua NetScaler cookie exfil
    crit: hostile
    conf: 0.98
    all:
      - id: lua-exfil-query-path
      - id: lua-txn-cookie-header-read
    any:
      - id: lua-octet-stream-exfil
