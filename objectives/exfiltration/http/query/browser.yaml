defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1041
  size_max: 524288
traits:
  - id: encoded-data-query-param
    desc: Encoded data query parameter
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\?data=[''"]?\s*\+\s*encodeURIComponent\('
  - id: cookie-query-key
    desc: Cookie-like query key
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\?[A-Za-z0-9_-]*(cookie|session|sid)[A-Za-z0-9_-]*='
  - id: encodeURIComponent-query-concat
    desc: Encodes cookie or session data into query
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\b(cookie|session|sid)[\w-]{0,32}=.{0,40}encodeURIComponent\('
  - id: cookie-session-argument
    desc: Cookie/session encode argument
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'encodeURIComponent\([^)]{0,160}(document\.cookie|cookies?)'
  - id: session-id-argument
    desc: Session identifier encode argument
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'encodeURIComponent\([^)]{0,160}\b(session|sid)\b'
  - id: image-query-exfil
    desc: Image beacon query exfiltration
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'new\s+Image\(\)\.src\s*=.{0,180}\?data=.{0,120}encodeURIComponent\('
    unless:
      - id: well-known/app/containarium::containarium-security-demo-context
  - id: xhr-query-exfil
    desc: XMLHttpRequest query exfiltration
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'XMLHttpRequest[\s\S]{0,180}\?data='
composite_rules:
  - id: encoded-cookie-query-param
    desc: Encoded cookie query parameter
    crit: notable
    conf: 0.88
    all:
      - id: cookie-query-key
      - id: encodeURIComponent-query-concat
    any:
      - id: cookie-session-argument
      - id: session-id-argument
    near_bytes: 240
  - id: browser-query-data-exfil
    desc: Browser query data exfiltration
    crit: suspicious
    conf: 0.92
    all:
      - id: encoded-data-query-param
    any:
      - id: image-query-exfil
      - id: xhr-query-exfil
    unless:
      - id: well-known/app/containarium::containarium-security-demo-context
  - id: browser-cookie-query-exfil
    desc: Browser cookie query exfiltration
    crit: hostile
    conf: 0.96
    attack: T1539
    mbc: E1005
    all:
      - id: encoded-cookie-query-param
      - id: micro-behaviors/communications/http/cookies::document-cookie-read
      - id: micro-behaviors/communications/http/request/client::xmlhttprequest-new
      - id: objectives/exfiltration/oob/endpoint::webhook-site
