defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1041
  size_max: 524288
traits:
  - id: encoded-data-query-param
    desc: Encoded data query parameter
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\?data=[''"]?\s*\+\s*encodeURIComponent\('
  - id: image-query-exfil
    desc: Image beacon query exfiltration
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'new\s+Image\(\)\.src\s*=.{0,180}\?data=.{0,120}encodeURIComponent\('
  - id: xhr-query-exfil
    desc: XMLHttpRequest query exfiltration
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'XMLHttpRequest[\s\S]{0,180}\?data='
composite_rules:
  - id: browser-query-data-exfil
    desc: Browser query data exfiltration
    crit: suspicious
    conf: 0.92
    all:
      - id: encoded-data-query-param
    any:
      - id: image-query-exfil
      - id: xhr-query-exfil
