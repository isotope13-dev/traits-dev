defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1041
traits:
  - id: pin-mac-query-exfil-template
    desc: PIN and MAC exfiltration query template
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\?Re=%s.{0,80}PIN=%s.{0,80}mac=%s'
  - id: numbered-query-fingerprint-template
    desc: Numbered query host fingerprint template
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\?J1=%s&J2=%s&J3=%s&J4=%s'
  - id: short-query-machineboard-template
    desc: Short query machineboard exfil template
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '\?A=%s&u=%s&c=%s&mb=%s'
  - id: minimal-fingerprint-query-template
    desc: Minimal F1 to F4 fingerprint query
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: '\?u=u&F1=%s&F2=%s&F3=%s&F4=%s'
composite_rules:
  - id: stacked-host-fingerprint-c2-templates
    desc: Multiple stacked host fingerprint C2 templates
    crit: hostile
    conf: 0.97
    all:
      - id: pin-mac-query-exfil-template
      - id: numbered-query-fingerprint-template
    any:
      - id: short-query-machineboard-template
      - id: minimal-fingerprint-query-template
