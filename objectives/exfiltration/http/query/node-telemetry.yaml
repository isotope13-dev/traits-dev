defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  attack: T1041
traits:
  - id: query-param-timestamp
    desc: Query adds timestamp field
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: searchParams\.set\(\s*['"]timestamp['"]
  - id: query-param-instancename
    desc: Query adds instanceName field
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: searchParams\.set\(\s*['"]instanceName['"]
  - id: query-param-ip
    desc: Query adds IP address field
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: searchParams\.set\(\s*['"]ip['"]
  - id: query-param-engine
    desc: Query adds cache engine field
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: searchParams\.set\(\s*['"]engine['"]
  - id: protocol-switch-request-fn
    desc: Switches request function by protocol
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: url\.protocol.{0,40}https:.{0,40}httpsRequest.{0,20}httpRequest
  - id: silent-catch-resolve
    desc: Catch resolves without surfacing failure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: resolve(); // Don't reject, just warn
composite_rules:
  - id: telemetry-query-params-quartet
    desc: Query adds timestamp host engine IP
    crit: suspicious
    conf: 0.98
    all:
      - id: query-param-timestamp
      - id: query-param-instancename
      - id: query-param-ip
      - id: query-param-engine
  - id: url-derived-http-get
    desc: URL object drives GET beacon
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/query::new-url-endpoint
      - id: micro-behaviors/communications/url/construction/fragment::url-hostname-option
      - id: micro-behaviors/communications/url/construction/fragment::url-path-search-option
      - id: micro-behaviors/communications/http/get::get
  - id: ip-telemetry-get-exfil
    desc: Local IP telemetry sent by GET webhook
    crit: hostile
    conf: 0.995
    mbc: E1041
    all:
      - id: objectives/discovery/network/interface::local-ip-from-networkinterfaces
      - id: micro-behaviors/communications/http/webhook::wbhk-studio-webhook
      - id: telemetry-query-params-quartet
      - id: url-derived-http-get
  - id: stealthy-ip-telemetry-get-exfil
    desc: Silent local IP telemetry webhook
    crit: hostile
    conf: 0.995
    mbc: E1041
    all:
      - id: ip-telemetry-get-exfil
      - id: silent-catch-resolve
