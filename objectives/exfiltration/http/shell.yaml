# Shell-based Network Exfiltration
# Behavioral composites that combine shell tools with exfiltration indicators
# ATT&CK: T1041 (Exfiltration Over C2 Channel)
#
# Note: Atomic curl/wget/nc traits moved to communications/http/client/shell.yaml
# This file contains only behavioral composites that indicate exfiltration
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  mbc: "E1041"
  attack: "T1041"
  for: [shell, batch, powershell, vbs]
composite_rules:
  - id: curl-post-data
    desc: Curl POST with data (potential exfiltration)
    crit: suspicious
    conf: 0.85
    any:
      - id: objectives/supply-chain/trojanized/build-pipeline::curl-with-env-data
    unless:
      - id: micro-behaviors/os/service/legitimate::package-manager
      - id: micro-behaviors/os/service/legitimate::ci-cd-pipeline
      - id: micro-behaviors/os/service/legitimate::health-check
      - id: micro-behaviors/os/service/legitimate::installer-script
  - id: curl-upload-file-comp
    desc: Curl file upload (potential exfiltration)
    crit: suspicious
    conf: 0.85
    any:
      - id: micro-behaviors/communications/http/upload::curl-upload-file
    unless:
      - id: micro-behaviors/os/service/legitimate::package-manager
      - id: micro-behaviors/os/service/legitimate::ci-cd-pipeline
      - id: micro-behaviors/os/service/legitimate::backup-script
      - id: metadata/signed/id::com.apple.curl
      - id: micro-behaviors/communications/http/download/curl::curl-easy-init
  - id: shell-tool-exfil
    desc: Shell tool exfiltration
    crit: notable
    conf: 0.85
    attack: "T1048"
    all:
      - id: metadata/library/socketio::client
    unless:
      - id: micro-behaviors/os/service/legitimate::backup-script
      - id: micro-behaviors/os/service/legitimate::health-check
      - id: metadata/file/text/json::valid
