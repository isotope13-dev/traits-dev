defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1041

traits:
  - id: csharp-unix-secret-file-list
    desc: C# Unix secret file list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.ssh/id_rsa[\s\S]{0,260}\.netrc[\s\S]{0,260}\.aws/credentials'

  - id: csharp-env-secret-filter
    desc: C# filters secret env vars
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'GetEnvironmentVariables\(\)[\s\S]{0,260}(SECRET|TOKEN|CRED|AUTH)'

  - id: csharp-bytearray-content
    desc: C# byte array content
    crit: component
    conf: 0.93
    if:
      type: text
      substr: ByteArrayContent

  - id: csharp-raw-http-post-template
    desc: C# raw HTTP POST template
    crit: component
    conf: 0.93
    if:
      type: text
      substr: POST {path} HTTP/1.1

composite_rules:
  - id: csharp-unix-file-secret-collect
    desc: C# Unix file secret collect
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/email/mime::mime-octet-stream
      - id: csharp-unix-secret-file-list
    any:
      - id: csharp-bytearray-content
      - id: csharp-raw-http-post-template

  - id: csharp-unix-env-secret-collect
    desc: C# Unix env secret collect
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/email/mime::mime-octet-stream
      - id: csharp-env-secret-filter
    any:
      - id: csharp-bytearray-content
      - id: csharp-raw-http-post-template
