defaults:
  platforms: [unix, appliance]
  for: [perl]
  attack: T1041

traits:
  - id: perl-multipart-content-type
    desc: Perl multipart content type
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/app/windows-desktop-tools::cmder-vendor-member
    if:
      type: text
      substr: multipart/form-data

  - id: perl-harvest-dat-filename
    desc: Perl harvest dat filename
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: harvest.dat

  - id: perl-socket-http-send
    desc: Perl socket HTTP send
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'IO::Socket::INET->new[\s\S]{0,260}->send\(\$http_req\)'

  - id: perl-config-secret-line-scan
    desc: Perl config secret line scan
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'password\|passwd\|secret\|token\|api_key'

composite_rules:
  - id: perl-multipart-credential-exfil
    desc: Perl multipart credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: perl-multipart-content-type
      - id: perl-harvest-dat-filename
      - id: perl-socket-http-send
      - id: perl-config-secret-line-scan
