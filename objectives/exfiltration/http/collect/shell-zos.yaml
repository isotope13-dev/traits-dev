defaults:
  platforms: [zos]
  for: [shell]
  attack: T1041

traits:
  - id: shell-harvest-credentials-func
    desc: Shell harvest credentials func
    crit: suspicious
    conf: 0.94
    if:
      type: symbol
      exact: harvest_credentials

  - id: shell-netrc-env-secret-loop
    desc: Shell netrc env secret loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.netrc[\s\S]{0,260}\*PASS\*\|\*SECRET\*\|\*TOKEN\*'

  - id: shell-zos-credential-files
    desc: Shell z/OS credential files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.tsoerc[\s\S]{0,220}LOGONPROC[\s\S]{0,260}db2profile'

  - id: shell-api-exfil-path
    desc: Shell API exfil path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/exfil

composite_rules:
  - id: shell-zos-credential-http-exfil
    desc: Shell z/OS credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-harvest-credentials-func
      - id: micro-behaviors/fs/path/sensitive/credentials::shell-ssh-private-key-path-pair
      - id: shell-api-exfil-path
