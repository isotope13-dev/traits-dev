defaults:
  platforms: [unix, appliance]
  for: [python, pyc]
  attack: T1041

traits:
  - id: python-urllib-post-request
    desc: Python urllib POST request
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'urllib\.request[\s\S]{0,220}Request[\s\S]{0,220}POST'

  - id: python-ingest-or-collect-url
    desc: Python ingest collect URL
    crit: component
    conf: 0.91
    if:
      type: text
      regex: '(/api/v1/ingest|/collect\?data=|/%s\?d=)'

  - id: python-json-exfil-payload
    desc: Python JSON exfil payload
    crit: component
    conf: 0.91
    if:
      type: text
      regex: 'json\.dumps[\s\S]{0,220}(urlopen|Request)'


composite_rules:
  - id: python-urllib-json-exfil
    desc: Python urllib JSON exfil
    crit: hostile
    conf: 0.98
    all:
      - id: python-urllib-post-request
      - id: python-ingest-or-collect-url
    any:
      - id: python-json-exfil-payload
      - id: objectives/collection/screenshot/capture::python-exfiltrate-raw-name

  - id: python-pyc-urllib-exfil
    desc: Python bytecode urllib exfil
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-pyc-symbol
      - id: python-ingest-or-collect-url
