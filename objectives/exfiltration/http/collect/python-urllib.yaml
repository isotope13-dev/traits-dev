defaults:
  platforms: [unix, appliance]
  for: [python, pyc]
  attack: T1041

traits:
  - id: python-urllib-post-request
    desc: Python urllib POST request
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'urllib\.request[\s\S]{0,220}Request[\s\S]{0,220}POST'

  # Query-string data-smuggling endpoints: the collected blob rides as a URL
  # parameter (`?data=`, `?d=`). A plain REST path like `/api/v1/ingest` is
  # deliberately excluded — it is the canonical telemetry-ingest route of
  # countless benign agents (and this project's own service), not an exfil tell.
  - id: python-collect-url-query
    desc: Exfil collection URL query param
    crit: component
    conf: 0.91
    if:
      type: text
      regex: '(/collect\?data=|/%s\?d=)'

  - id: python-json-request-payload
    desc: Python JSON request payload
    crit: component
    conf: 0.91
    if:
      type: text
      regex: 'json\.dumps[\s\S]{0,220}(urlopen|Request)'


composite_rules:
  - id: python-urllib-json-exfil
    desc: Python urllib JSON exfil
    crit: hostile
    conf: 0.98
    all:
      - id: python-urllib-post-request
      - id: python-collect-url-query
    any:
      - id: python-json-request-payload
      - id: objectives/collection/screenshot/capture::python-exfiltrate-raw-name

  # Stealer variant that POSTs to a generic-looking ingest route rather than a
  # query-smuggling URL. The plain ingest path is benign on its own, so this
  # requires a captured-media payload (screenshot) to separate exfil from an
  # ordinary telemetry client that merely JSON-encodes events.
  - id: python-urllib-ingest-media-exfil
    desc: Python urllib ingest-endpoint media exfil
    crit: hostile
    conf: 0.97
    all:
      - id: python-urllib-post-request
      - id: micro-behaviors/communications/http/endpoints::ingest-api-path
      - id: objectives/collection/screenshot/capture::python-exfiltrate-raw-name

  - id: python-pyc-urllib-exfil
    desc: Python bytecode urllib exfil
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-pyc-symbol
      - id: python-collect-url-query
