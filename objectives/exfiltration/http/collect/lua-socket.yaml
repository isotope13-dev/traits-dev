defaults:
  platforms: [unix, appliance]
  for: [lua]
  attack: T1041

traits:
  - id: lua-form-collect-body
    desc: Lua form collect body
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'type=file_exfil[\s\S]{0,520}type=credential_dump'

composite_rules:
  - id: lua-socket-credential-http-exfil
    desc: Lua socket credential HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect
      - id: micro-behaviors/communications/socket/send::lua-socket-send
      - id: lua-form-collect-body
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/sensitive/credentials::netrc
    any:
      - id: micro-behaviors/communications/http/post::post-request-line
      - id: micro-behaviors/communications/http/post::url-encoded-content-type
