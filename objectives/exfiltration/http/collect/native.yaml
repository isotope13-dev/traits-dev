defaults:
  platforms: [unix]
  for: [c, cpp, objc, rust, go, elf]
  attack: T1041

traits:
  - id: native-collect-http-post
    desc: Native HTTP collect POST
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'POST /collect HTTP/1\.1[\s\S]{0,260}(Content-Length|application/octet-stream)'

  - id: native-exfil-http-post
    desc: Native HTTP exfil POST
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'POST /exfil HTTP/1\.1[\s\S]{0,260}(Content-Length|application/octet-stream)'
