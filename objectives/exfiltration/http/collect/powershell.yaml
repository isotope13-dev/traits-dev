defaults:
  platforms: [windows, unix, appliance]
  for: [powershell]
  attack: T1041

traits:
  - id: ps-send-exfil-function
    desc: PowerShell exfil send function
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: function Send-Exfiltration

  - id: ps-http-collect-webrequest
    desc: PowerShell collect webrequest
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'Invoke-WebRequest[\s\S]{0,220}-Method POST[\s\S]{0,220}application/octet-stream'

composite_rules:
  - id: ps-http-collect-exfil
    desc: PowerShell HTTP collect exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ps-send-exfil-function
    any:
      - id: ps-http-collect-webrequest
      - id: micro-behaviors/communications/http/endpoints::collect-post-request
