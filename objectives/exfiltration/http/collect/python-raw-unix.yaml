defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1041

traits:
  - id: python-secret-prefix-list
    desc: Python secret prefix list
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: sensitive_prefixes

  - id: python-raw-socket-stream
    desc: Python raw socket stream
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: socket.SOCK_STREAM

  - id: python-collect-post-line
    desc: Python collect POST line
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: POST /collect HTTP/1.1

composite_rules:
  - id: python-raw-secret-http-exfil
    desc: Python raw secret HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: python-raw-socket-stream
      - id: python-collect-post-line
      - id: micro-behaviors/communications/email/mime::mime-octet-stream
      - id: python-secret-prefix-list
