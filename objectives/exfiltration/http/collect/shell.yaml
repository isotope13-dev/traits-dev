defaults:
  platforms: [unix, appliance]
  for: [shell]
  attack: T1041

traits:
  - id: shell-http-collect-url
    desc: Shell HTTP collect URL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'http://[^"'' ]{1,120}/collect'

  - id: shell-curl-collect-post
    desc: Shell curl collect POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'curl\s+[^\\n]{0,140}-X POST[^\\n]{0,180}/collect'

  - id: shell-wget-collect-post
    desc: Shell wget collect POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'wget\s+[^\\n]{0,180}--post-(data|file)[^\\n]{0,180}/collect'

  - id: shell-nc-collect-post
    desc: Shell netcat collect POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'POST /collect HTTP/1\.[01][\s\S]{0,360}\|\s*nc\b'

composite_rules:
  - id: shell-http-collect-exfil
    desc: Shell HTTP collect exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-http-collect-url
    any:
      - id: shell-curl-collect-post
      - id: shell-wget-collect-post
      - id: shell-nc-collect-post
      - id: micro-behaviors/communications/http/endpoints::collect-post-request
