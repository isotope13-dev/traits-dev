# Hardcoded API keys/build IDs in HTTP exfiltration bodies.
defaults:
  platforms: [windows, unix]
  for: [python, javascript, go, php, powershell]
  attack: T1041
  mbc: C0002
traits:
  - id: requests-payload-argument
    desc: Requests payload argument
    crit: component
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '(?i)\brequests\.\w+\([^)]{0,300}\b(body|data|json|payload)\s*='
  - id: httpx-payload-argument
    desc: HTTPX payload argument
    crit: component
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '(?i)\bhttpx\.\w+\([^)]{0,300}\b(body|data|json|payload)\s*='
  - id: axios-payload-argument
    desc: Axios payload argument
    crit: component
    conf: 0.86
    for: [javascript]
    if:
      type: text
      regex: '(?i)\baxios\.\w+\([^)]{0,300}\b(body|data|json|payload)\s*='
  - id: urllib-payload-argument
    desc: urllib request payload argument
    crit: component
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '(?i)\burllib\.request\.\w+\([^)]{0,300}\b(body|data)\s*='
  - id: hex-api-key-literal
    desc: Long hexadecimal API key literal
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)(api[_-]?key|apikey).{0,5}['""][0-9a-f]{48,}['"]
    not:
      - regex: (?i)defaultApiKey
  - id: hex-build-id-literal
    desc: Long hexadecimal build ID literal
    crit: component
    conf: 0.75
    if:
      type: text
      regex: (?i)(build[_-]?id|buildid).{0,5}['""][0-9a-f]{48,}['"]
composite_rules:
  - id: request-body-marker
    desc: HTTP API payload argument marker
    crit: component
    conf: 0.86
    any:
      - id: requests-payload-argument
      - id: httpx-payload-argument
      - id: axios-payload-argument
      - id: urllib-payload-argument
      - id: micro-behaviors/communications/http/request/client::http-config-body

  - id: exfil-with-hardcoded-key
    desc: Exfil with hardcoded API key
    crit: suspicious
    conf: 0.85
    near_lines: 80
    all:
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    any:
      - id: hex-api-key-in-body
      - id: hex-build-id-in-body
  - id: hex-api-key-in-body
    desc: Long hex API key in request body
    crit: component
    conf: 0.8
    all:
      - id: request-body-marker
      - id: hex-api-key-literal
    near_bytes: 512
  - id: hex-build-id-in-body
    desc: Long hex build ID in request body
    crit: component
    conf: 0.75
    all:
      - id: request-body-marker
      - id: hex-build-id-literal
    near_bytes: 512
