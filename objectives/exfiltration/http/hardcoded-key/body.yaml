# Hardcoded API keys/build IDs in HTTP exfiltration bodies.
defaults:
  platforms: [windows, unix]
  for: [python, javascript, go, php, powershell]
  attack: T1041
  mbc: C0002
traits:
  - id: hex-api-key-in-body
    desc: Long hex API key in body
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)(api[_-]?key|apikey).{0,5}['""][0-9a-f]{48,}['"]
    not:
      - regex: (?i)defaultApiKey
  - id: hex-build-id-in-body
    desc: Long hex build ID in body
    crit: component
    conf: 0.75
    if:
      type: text
      regex: (?i)(build[_-]?id|buildid).{0,5}['""][0-9a-f]{48,}['"]
composite_rules:
  - id: exfil-with-hardcoded-key
    desc: Exfil with hardcoded API key
    crit: suspicious
    conf: 0.85
    near_lines: 80
    all:
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    any:
      - id: hex-api-key-in-body
      - id: hex-build-id-in-body
