defaults:
  attack: T1041
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
    - python
    - shell
traits:
  - id: curl-d-flag
    desc: curl -d flag
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: curl\s+-d
  - id: curl-data-flag
    desc: curl --data flag
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: curl\s+--data
  - id: curl-post-flag
    desc: curl -X POST flag
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: curl\s+-X\s*POST
composite_rules:
  - id: curl-exfil
    desc: Curl command with data parameter
    crit: suspicious
    conf: 0.9
    any:
      - id: curl-d-flag
      - id: curl-data-flag
      - id: curl-post-flag
