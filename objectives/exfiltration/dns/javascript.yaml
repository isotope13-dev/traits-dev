defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: js-json-base64-dns-label
    desc: JSON data base64 encoded for DNS label
    crit: suspicious
    conf: 0.94
    platforms: [unix, windows]
    attack: "T1048.003"
    if:
      type: text
      regex: 'Buffer\.from\(JSON\.stringify\(.{1,100}\)\)\.toString\(["'']base64'
  - id: js-template-oast-pro-label
    desc: Template subdomain targets oast.pro
    crit: suspicious
    conf: 0.95
    platforms: [unix, windows]
    attack: "T1048.003"
    if:
      type: text
      regex: '`\$\{[A-Za-z0-9_]+\}\.[a-z0-9]{12,}\.oast\.pro`'
composite_rules:
  - id: js-dns-chunking-indicator
    desc: "DNS chunking capability in JS"
    crit: component
    any:
      - id: objectives/exfiltration/dns/prep::dns-regex-chunking
      - id: objectives/exfiltration/dns/prep::template-subdomain-chunk
  - id: js-dns-exfiltration-chunking
    desc: "DNS exfiltration via chunked subdomains"
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1048.003"
    all:
      - id: micro-behaviors/communications/dns/lookup::node-dns-lookup
      - id: js-dns-chunking-indicator
  - id: js-dns-oast-json-profile-exfil
    desc: DNS OAST exfiltration of encoded host profile
    crit: hostile
    conf: 0.99
    platforms: [unix, windows]
    mbc: "E1041"
    attack: "T1048.003"
    all:
      - id: metadata/import/builtin::require-dns
      - id: micro-behaviors/communications/dns/lookup::dns-lookup-call
      - id: objectives/exfiltration/oob::interact-sh-pro-live
      - id: js-json-base64-dns-label
      - id: js-template-oast-pro-label
    any:
      - id: objectives/discovery/system/fingerprint/hardware::node-cwd
      - id: objectives/discovery/account::username-env
    needs: 1
