defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
- id: js-json-base64-dns-label
  desc: JSON data base64 encoded for DNS label
  crit: component
  conf: 0.94
  platforms: [unix, windows]
  attack: "T1048.003"
  if:
    type: text
    regex: 'Buffer\.from\(JSON\.stringify\(.{1,100}\)\)\.toString\(["'']base64'
- id: js-template-oast-pro-label
  desc: Template subdomain targets oast.pro
  crit: suspicious
  conf: 0.95
  platforms: [unix, windows]
  attack: "T1048.003"
  if:
    type: text
    regex: '`\$\{[A-Za-z0-9_]+\}\.[a-z0-9]{12,}\.oast\.pro`'
- id: js-template-oastify-payload-label
  desc: Template subdomain sends payload field to Oastify
  crit: suspicious
  conf: 0.97
  platforms: [unix, windows]
  attack: "T1048.003"
  if:
    type: text
    regex: '`\$\{payload\.[A-Za-z0-9_]+\}\.\$\{[A-Z_]*HOST\}`'
composite_rules:
- id: js-dns-chunking-indicator
  desc: "DNS chunking capability in JS"
  crit: suspicious
  any:
  - id: objectives/exfiltration/dns/prep::dns-regex-chunking
  - id: objectives/exfiltration/dns/prep::template-subdomain-chunk
- id: js-dns-exfiltration-chunking
  desc: "DNS exfiltration via chunked subdomains"
  crit: hostile
  conf: 0.95
  mbc: "B0030"
  attack: "T1048.003"
  near_bytes: 2048
  all:
  - id: micro-behaviors/communications/dns/lookup/resolver::node-dns-lookup
  - id: js-dns-chunking-indicator
- id: js-dns-oast-json-profile-exfil
  desc: DNS OAST exfiltration of encoded host profile
  crit: hostile
  conf: 0.99
  platforms: [unix, windows]
  mbc: "E1041"
  attack: "T1048.003"
  all:
  - id: metadata/import/builtin::require-dns
  - id: micro-behaviors/communications/dns/lookup/resolver::dns-lookup-call
  - id: objectives/exfiltration/oob/endpoint::interact-sh-pro-live
  - id: js-json-base64-dns-label
  - id: js-template-oast-pro-label
  any:
  - id: micro-behaviors/os/sysinfo/platform/runtime::process-cwd-call
  - id: objectives/discovery/account/enum::username-env
- id: js-canarytokens-host-identity-dns-exfil
  desc: Canarytokens DNS exfiltration of host identity
  crit: hostile
  conf: 0.995
  platforms: [unix, windows]
  mbc: "E1041"
  attack: "T1048.003"
  all:
  - id: micro-behaviors/communications/dns/lookup/resolver::dns-lookup-call
  - id: objectives/exfiltration/oob/endpoint::canarytokens-com
  - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
  - id: micro-behaviors/process/user/query::os-userinfo-call
  - id: micro-behaviors/data/encode/base32::rfc4648-lowercase-alphabet
- id: js-oastify-template-subdomain-exfil
  desc: Oastify DNS exfiltration via templated subdomain
  crit: hostile
  conf: 0.995
  platforms: [unix, windows]
  mbc: "E1041"
  attack: "T1048.003"
  all:
  - id: micro-behaviors/communications/dns/lookup/resolver::node-dns-lookup
  - id: objectives/exfiltration/oob/endpoint::oastify
  - id: js-template-oastify-payload-label
