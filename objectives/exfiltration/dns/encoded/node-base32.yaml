defaults:
  platforms: [unix, appliance, windows]
  for: [javascript, typescript]
  attack: T1048.003

traits:
  - id: node-base32-label-chunker
    desc: Node base32 DNS label chunker
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567[\s\S]{0,320}labelLen\s*=\s*48'

  - id: node-json-secret-file-payload
    desc: Node JSON secret file payload
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'JSON\.stringify\(\{[\s\S]{0,220}secrets:[\s\S]{0,120}files:'

composite_rules:
  - id: node-base32-dns-secret-exfil
    desc: Node base32 DNS secret exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-base32-label-chunker
      - id: node-json-secret-file-payload
      - id: micro-behaviors/communications/dns/lookup/resolver::node-dns-lookup
