defaults:
  platforms: [unix, windows]
composite_rules:
  - id: js-dns-tunneling-exfil
    desc: JavaScript DNS tunneling exfiltration of system metadata
    crit: hostile
    all:
      - id: objectives/command-and-control/dns/tunneling::js-dns-tunneling-construction
      - id: objectives/exfiltration/dns::dns-resolve
    any:
      - id: objectives/discovery/system/fingerprint/hardware::js-sysinfo-multi
      - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
  - id: js-dns-tunneling-chunked-exfil
    desc: DNS exfiltration using regex chunking and template subdomains
    crit: hostile
    conf: 0.95
    attack: "T1071.004"
    all:
      - id: objectives/exfiltration/dns/prep::dns-regex-chunking
      - id: objectives/exfiltration/dns/prep::template-subdomain-chunk
      - id: micro-behaviors/data/encode/hex::buffer-to-hex
    any:
      - id: micro-behaviors/communications/dns/lookup::dns-resolve4
      - id: micro-behaviors/communications/dns/lookup::node-dns-lookup
  - id: js-interactsh-recon-exfil
    desc: System reconnaissance exfiltrated via Interactsh DNS
    crit: hostile
    conf: 0.95
    attack: "T1567.002"
    all:
      - id: objectives/exfiltration/oob::interact-sh-me-fun
      - id: micro-behaviors/os/sysinfo/
    any:
      - id: micro-behaviors/communications/dns/lookup::dns-resolve4
      - id: micro-behaviors/communications/dns/lookup::node-dns-lookup
      - id: objectives/exfiltration/dns/prep::template-subdomain-chunk
  - id: js-ping-hex-dns-recon-exfil
    desc: JavaScript hex encodes recon for DNS pingback
    crit: hostile
    conf: 0.97
    attack: "T1048.003"
    mbc: "E1041"
    all:
      - id: micro-behaviors/process/create/shell/lang::child-process-exec
      - id: micro-behaviors/data/encode/hex::buffer-to-hex
      - id: micro-behaviors/communications/dns/tools::ping-hex-subdomain
      - id: objectives/command-and-control/infrastructure/domain::eu-org-free-dns
    any:
      - id: objectives/discovery/network/scan::external-recon-service
      - id: objectives/discovery/system::js-os-hostname
      - id: objectives/discovery/system/fingerprint/hardware::node-hostname
  - id: js-ping-var-dns-recon-exfil
    desc: JavaScript encodes recon for templated DNS pingback
    crit: hostile
    conf: 0.97
    attack: "T1048.003"
    mbc: "E1041"
    all:
      - id: micro-behaviors/process/create/shell/lang::child-process-destructure-require
      - id: micro-behaviors/data/encode/hex::buffer-to-hex
      - id: micro-behaviors/communications/dns/tools::ping-var-subdomain
      - id: objectives/command-and-control/infrastructure/domain::eu-org-free-dns
    any:
      - id: objectives/discovery/network/scan::external-recon-service
      - id: objectives/discovery/system::js-os-hostname
      - id: objectives/discovery/system/fingerprint/hardware::node-hostname
