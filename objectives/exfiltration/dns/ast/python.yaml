# Domain Encoding for Exfiltration - Python AST Detection
# Detects patterns where collected data is encoded into domain-like structures
# ATT&CK: T1048.003 (Exfiltration Over Alternative Protocol: DNS)
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.8
traits:
  # === F-string with 3+ dot-separated interpolations and literal domain suffix ===
  # Pattern: f"{var1}.{var2}.{var3}.example.com" - classic subdomain encoding
  - id: fstring-multi-interpolation
    desc: 'fstring multi interpolation'
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'f["'']\{.{1,50}\}\.\{.{1,50}\}\.\{.{1,50}\}\.\w+\.(com|net|org|io)'
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/scripted/
      - type: text
        regex: base_url\s*=\s*f["']https?://
      - type: text
        regex: "f[\"']\\{self\\..{1,30}\\}\\.\\{self\\."
  # === bytes([len(x)]) pattern - DNS label length prefix ===
  # Pattern: bytes([len(label)]) - manual DNS qname encoding
  - id: bytes-len-prefix
    desc: Bytes array with length prefix encoding
    # A single `bytes([len(x)])` is the universal length-prefixed framing idiom
    # for any binary/TLV protocol (BLE, struct serializers, etc.), not DNS on its
    # own. Building block only — meaningful solely combined with a domain-split or
    # qname leg in the dns-label-manual-construction composite.
    crit: component
    conf: 0.9
    size_max: 50000
    if:
      type: text
      regex: 'bytes\s*\(\s*\[\s*len\s*\('
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness/
        - id: metadata/package/testing/scripted/
        - id: well-known/tool/detection/security-scanner::wpsecscan-check-module
  # === struct.pack with network byte order ===
  # Pattern: struct.pack("!H...", ...) - network protocol construction
  - id: struct-pack-network-order
    desc: "struct.pack with network byte order"
    crit: component
    conf: 0.85
    if:
      # Restored arg discriminator dropped in the call migration.
      type: symbol
      kind: call
      exact: 'struct.pack'
      arg:
        kind: string
        regex: '^!'
  # === String .encode("ascii") in loop context ===
  # Pattern: label.encode("ascii") - text to bytes for protocol
  - id: encode-ascii-in-loop
    desc: 'ASCII encoding inside iteration'
    crit: suspicious
    conf: 0.75
    if:
      type: tree-sitter
      query: |
        (for_statement
          body: (block
            (expression_statement
              (augmented_assignment
                right: (binary_expression
                  right: (call
                    function: (attribute
                      attribute: (identifier) @method)
                    arguments: (argument_list
                      (string) @enc)))))))
          (#eq? @method "encode")
          (#match? @enc "ascii"))
composite_rules:
  # === DNS Label Manual Construction ===
  - id: dns-label-manual-construction
    desc: Manual DNS label construction pattern
    crit: suspicious
    conf: 0.9
    attack: "T1071.004"
    unless:
      - id: metadata/package/testing/presence/harness::test-directory-path
    needs: 2
    unless:
      - id: well-known/app/ze::ze-source-tree
    any:
      - id: micro-behaviors/communications/dns/label::python-dot-label-loop
      - id: bytes-len-prefix
      - id: encode-ascii-in-loop
  # === Subdomain Data Encoding ===
  - id: subdomain-exfil-pattern
    desc: Data encoded into subdomain structure
    crit: suspicious
    conf: 0.9
    attack: "T1048.003"
    any:
      - id: fstring-multi-interpolation
    all:
      - id: struct-pack-network-order
