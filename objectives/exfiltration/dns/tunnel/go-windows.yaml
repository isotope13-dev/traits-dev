defaults:
  platforms: [windows]
  for: [go, pe]
  attack: T1048.003

traits:
  - id: go-dns-label-base64-payload
    desc: Go DNS label base64 payload
    crit: suspicious
    conf: 0.94
    for: [go]
    if:
      type: text
      regex: 'RawURLEncoding\.EncodeToString[\s\S]{0,220}chunkString'

  - id: go-dns-txt-mx-c2-lookups
    desc: Go DNS TXT/MX C2 lookups
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'net\.LookupTXT[\s\S]{0,260}net\.LookupMX'

  - id: go-ssh-dns-exfil-labels
    desc: Go SSH credential DNS labels
    crit: suspicious
    conf: 0.94
    for: [go]
    if:
      type: text
      regex: '"(ssh|cred)-%s\.%s"'

  - id: go-dns-c2-functions-pe
    desc: Go PE DNS C2 function names
    crit: suspicious
    conf: 0.93
    for: [pe]
    if:
      type: text
      regex: 'main\.dnsC2Beacon[\s\S]{0,260}main\.rawDNSQuery'

  - id: go-ssh-dns-functions-pe
    desc: Go PE SSH DNS functions
    crit: suspicious
    conf: 0.93
    for: [pe]
    if:
      type: text
      regex: 'main\.sshCredentialAccess[\s\S]{0,220}net\.LookupTXT'

composite_rules:
  - id: go-dns-c2-label-tunnel
    desc: Go DNS C2 label tunnel
    crit: hostile
    conf: 0.98
    for: [go]
    all:
      - id: go-dns-label-base64-payload
      - id: go-dns-txt-mx-c2-lookups

  - id: go-ssh-credential-dns-exfil
    desc: Go SSH credential DNS exfil
    crit: hostile
    conf: 0.98
    for: [go]
    all:
      - id: go-ssh-dns-exfil-labels
      - id: go-dns-txt-mx-c2-lookups
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key-filename-enum
      - id: objectives/credential-access/credential-manager/cli::go-windows-credential-manager-list

  - id: go-pe-dns-c2-tunnel
    desc: Go PE DNS C2 tunnel
    crit: hostile
    conf: 0.97
    for: [pe]
    all:
      - id: go-dns-c2-functions-pe
      - id: go-dns-txt-mx-c2-lookups

  - id: go-pe-ssh-dns-exfil
    desc: Go PE SSH DNS exfil
    crit: hostile
    conf: 0.97
    for: [pe]
    all:
      - id: go-ssh-dns-functions-pe
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key-filename-enum
    any:
      - id: go-dns-c2-functions-pe
      - id: go-dns-txt-mx-c2-lookups
