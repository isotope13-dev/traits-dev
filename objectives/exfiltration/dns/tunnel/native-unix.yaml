defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1048.003

traits:
  - id: native-dns-exfil-label-template
    desc: Native DNS exfil label template
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(%s\.)?exfil\.%s|\.exfil\.'

  - id: native-dns-beacon-label-template
    desc: Native DNS beacon label template
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(%s\.)?beacon\.%s|\.beacon\.'

  - id: native-hex-dns-label-encoding
    desc: Native hex DNS label encoding
    crit: suspicious
    conf: 0.9
    for: [c, cpp, objc]
    if:
      type: text
      regex: '%02x[\s\S]{0,220}gethostbyname\s*\('

composite_rules:
  - id: native-dns-label-exfil
    desc: Native DNS label exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-dns-exfil-label-template
      - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
    any:
      - id: native-hex-dns-label-encoding
      - id: objectives/exfiltration/dns/tunnel::dns-exfil

  - id: native-dns-beacon-c2
    desc: Native DNS beacon C2
    crit: hostile
    conf: 0.97
    all:
      - id: native-dns-beacon-label-template
      - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
    any:
      - id: objectives/exfiltration/dns/tunnel::dns-c2
      - id: objectives/exfiltration/dns/tunnel::dns-beacon
