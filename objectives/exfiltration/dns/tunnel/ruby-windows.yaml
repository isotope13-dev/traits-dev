defaults:
  platforms: [windows]
  for: [ruby]
  attack: T1048.003

traits:
  - id: ruby-dns-label-base64-slice
    desc: Ruby DNS label base64 slice
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Base64\.strict_encode64[\s\S]{0,140}each_slice\(63\)'

  - id: ruby-dns-exfil-getaddrinfo
    desc: Ruby DNS exfil getaddrinfo
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'query_host[\s\S]{0,180}Socket\.getaddrinfo'

composite_rules:
  - id: ruby-dns-label-exfil
    desc: Ruby DNS label exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-dns-label-base64-slice
      - id: ruby-dns-exfil-getaddrinfo
