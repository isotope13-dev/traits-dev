defaults:
  platforms: [netscaler, appliance, unix]
  for: [php]
  attack: T1048.003

traits:
  - id: php-dns-exfil-function
    desc: PHP DNS exfil function
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      exact: dns_exfil

  - id: php-netscaler-dns-get-record
    desc: PHP dns_get_record exfil
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'dns_get_record\(\$full, DNS_A\)'

  - id: php-base64-dns-chunks
    desc: PHP base64 DNS chunks
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'str_split\(base64_encode\(\$data\), 60\)'

composite_rules:
  - id: php-dns-chunk-exfil
    desc: PHP DNS chunk exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-dns-exfil-function
      - id: php-base64-dns-chunks
    any:
      - id: php-netscaler-dns-get-record
