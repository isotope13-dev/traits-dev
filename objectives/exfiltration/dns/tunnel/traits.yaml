defaults:
  platforms: [windows, unix]
  for: [python, javascript, powershell, pe, elf]
  mbc: C0001
  attack: T1071.004
traits:
  - id: dnscat-secret
    desc: dnscat2 secret environment variable
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: DNSCAT_SECRET
  - id: dnscat-name
    desc: dnscat2 tool name reference
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: dnscat
      case_insensitive: true
  - id: dnscat-session
    desc: dnscat2 session state constant
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: SESSION_STATE_ESTABLISHED
  - id: dnscat-packet
    desc: dnscat2 packet debug message
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: MSG packet
  - id: iodine-name
    desc: iodine tool name reference
    crit: notable
    conf: 0.6
    count_min: 2
    if:
      type: text
      word: iodine
  - id: tun-device
    desc: TUN device access for tunneling
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: /dev/net/tun
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
  - id: dns-tunnel-phrase
    desc: DNS tunnel terminology
    # The phrase alone appears in legitimate tunnel/client help and crypto
    # diagnostics. Composites still use it as context for actual DNS tunneling.
    crit: component
    conf: 0.9
    if:
      type: text
      substr: dns tunnel
      case_insensitive: true
    unless:
      - type: text
        substr: is not allowed in FIPS 140-only
      - type: text
        regex: 'route \[subcommand options\] \[dns TUNNEL HOSTNAME\]'
  - id: dns-exfil
    desc: DNS exfiltration terminology
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: dns exfil
      case_insensitive: true
    unless:
    - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
  - id: dns-c2
    desc: DNS C2 terminology
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: dns c2
      case_insensitive: true
    unless:
    - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
  - id: subdomain-encode
    desc: Long encoded-looking DNS subdomain label
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: '\b[a-z0-9]{30,}\.[a-z]{2,16}\.(com|net|org|io)\b'
    not:
      - regex: '\b[a-z0-9]{30,}\.(amazonaws|googleapis|windows|amazonwebservices)\.(com|net|org|io)\b'
      - regex: '\b[a-z0-9]{30,}\.(amazonaws\.com|amazonwebservices\.com\.cn)\b'
  - id: dns-beacon
    desc: DNS beacon terminology
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: dns beacon
      case_insensitive: true
  - id: doh-google
    desc: Google DoH endpoint
    crit: component
    conf: 0.7
    if:
      type: text
      substr: dns.google/dns-query
    unless:
      - id: well-known/lib/electron::v8-isolate-marker
  - id: doh-quad9
    desc: Quad9 DoH endpoint
    crit: component
    conf: 0.7
    if:
      type: text
      substr: dns.quad9.net/dns-query
    unless:
      - id: well-known/lib/electron::v8-isolate-marker
  - id: doh-json-content
    desc: DoH JSON content type
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: application/dns-json
composite_rules:
  - id: doh-endpoint
    desc: Known DoH endpoint reference
    crit: suspicious
    conf: 0.7
    any:
      - id: micro-behaviors/communications/dns/doh::doh-cloudflare-json
      - id: doh-google
      - id: doh-quad9
  - id: doh-content
    desc: DoH content-type indicator
    crit: suspicious
    conf: 0.6
    any:
      - id: micro-behaviors/communications/dns/doh::doh-content-type
      - id: doh-json-content
  - id: dnscat
    desc: dnscat2 DNS tunneling tool
    crit: suspicious
    conf: 0.95
    any:
      - id: dnscat-secret
      - id: dnscat-name
      - id: dnscat-session
      - id: dnscat-packet
  - id: iodine
    desc: iodine DNS tunneling tool
    crit: suspicious
    conf: 0.95
    any:
      - id: dns-tunnel-phrase
    all:
      - id: iodine-name
      - id: tun-device
  - id: generic-comp
    desc: Generic DNS tunneling patterns
    crit: suspicious
    conf: 0.8
    any:
      - id: dns-exfil
      - id: dns-c2
      - id: subdomain-encode
      - id: micro-behaviors/communications/dns/lookup/txt::txt-record-string
      - id: dns-beacon
  - id: doh-c2
    desc: DNS over HTTPS potential C2
    crit: notable
    conf: 0.75
    all:
      - id: doh-endpoint
      - id: doh-content
    any:
      - id: dns-exfil
      - id: dns-c2
      - id: dns-beacon
      - id: subdomain-encode
    unless:
      - id: well-known/lib/electron::v8-isolate-marker
      - id: generic-comp
  - id: dns-txt-exec
    desc: DNS TXT record used as C2 command channel
    crit: hostile
    conf: 0.9
    mbc: C0011
    for: [shell, python, javascript, typescript]
    all:
      - id: micro-behaviors/communications/dns/lookup/txt::txt-record-string
    any:
      - id: micro-behaviors/process/create/shell/invoke::shell-execution
      - id: micro-behaviors/process/create/subprocess::os-popen
      - id: micro-behaviors/process/create/subprocess::check-output
      - id: micro-behaviors/process/create/shell/bridge::js-exec
      - id: micro-behaviors/process/create/shell/bridge::execSync-call
