defaults:
  platforms: [openbsd, bsd, unix]
  for: [python, pyc]
  attack: T1048.003

traits:
  - id: python-openbsd-dns-exfil-format
    desc: Python OpenBSD DNS exfil format
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.exfil\.[\s\S]{0,32}04d'

  - id: python-openbsd-dns-exfil-function
    desc: Python OpenBSD DNS exfil func
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: exfiltrate_dns

composite_rules:
  - id: python-openbsd-dns-exfiltration
    desc: Python OpenBSD DNS exfil
    crit: hostile
    conf: 0.98
    all:
      - id: python-openbsd-dns-exfil-format
      - id: python-openbsd-dns-exfil-function
