defaults:
  platforms: [unix, windows, macos]
  for: [javascript, typescript]
composite_rules:
  - id: js-dns-tunneling-exfil
    desc: JavaScript DNS tunneling exfiltration of system metadata
    crit: hostile
    all:
      - id: objectives/command-and-control/dns/tunneling::js-dns-tunneling-construction
      - id: micro-behaviors/communications/dns/lookup/resolver::node-dns-lookup
    any:
      - id: objectives/discovery/system/fingerprint/hardware::js-sysinfo-multi
      - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
  - id: js-dns-tunneling-chunked-exfil
    desc: DNS exfiltration using regex chunking and template subdomains
    crit: hostile
    conf: 0.95
    attack: "T1071.004"
    all:
      - id: objectives/exfiltration/dns/prep::dns-regex-chunking
      - id: objectives/exfiltration/dns/prep::template-subdomain-chunk
      - id: micro-behaviors/data/encode/hex::buffer-hex
    any:
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-resolve4
      - id: micro-behaviors/communications/dns/lookup/resolver::node-dns-lookup
  - id: js-interactsh-recon-exfil
    desc: System reconnaissance exfiltrated via Interactsh DNS
    crit: hostile
    conf: 0.95
    attack: "T1567.002"
    all:
      - id: objectives/exfiltration/oob/endpoint::interact-sh-me-fun
      - id: micro-behaviors/os/sysinfo/
    any:
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-resolve4
      - id: micro-behaviors/communications/dns/lookup/resolver::node-dns-lookup
      - id: objectives/exfiltration/dns/prep::template-subdomain-chunk
  - id: js-nslookup-dns-tunnel-exfil
    desc: DNS tunnel exfiltration via nslookup exec
    crit: hostile
    conf: 0.95
    attack: "T1048.003"
    mbc: "E1041"
    all:
      - id: micro-behaviors/communications/dns/cli::nslookup-exec
      - id: micro-behaviors/data/encode/hex::xxd-hex-encode
    any:
      - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
      - id: metadata/import/builtin::require-child-process
