defaults:
  platforms: [unix, netbsd]
  for: [shell]
  attack: T1048.003

traits:
  - id: shell-base64-fold-dns-labels
    desc: Shell base64 DNS labels
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'base64 "\$STAGING/payload\.tgz"[\s\S]{0,120}fold -w 30'

  - id: shell-host-txt-exfil-query
    desc: Shell host TXT exfil query
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/app/lynis::lynis-project-script
    if:
      type: text
      substr: host -t txt

  - id: shell-base64-nslookup-labels
    desc: Shell base64 nslookup labels
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'base64 \S+[\s\S]{0,80}fold -w 30'

  - id: shell-nslookup-variable-label
    desc: Shell nslookup variable label
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'nslookup "\$\{?chunk\}?\.'

composite_rules:
  - id: shell-dns-txt-staging-exfil
    desc: Shell DNS TXT staging exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-base64-fold-dns-labels
      - id: shell-host-txt-exfil-query

  - id: shell-nslookup-data-exfil
    desc: Shell nslookup data exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-base64-nslookup-labels
      - id: shell-nslookup-variable-label
