defaults:
  platforms: [unix, netbsd]
  for: [shell]
  attack: T1048.003

traits:
  - id: shell-base64-fold-dns-labels
    desc: Shell base64 DNS labels
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'base64 "\$STAGING/payload\.tgz"[\s\S]{0,120}fold -w 30'

  - id: shell-host-txt-exfil-query
    desc: Shell host TXT exfil query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: host -t txt

composite_rules:
  - id: shell-dns-txt-staging-exfil
    desc: Shell DNS TXT staging exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-base64-fold-dns-labels
      - id: shell-host-txt-exfil-query
