defaults:
  platforms: [ios, unix]
  for: [perl, python]
  attack: T1048.003

traits:
  - id: perl-dns-side-channel-function
    desc: Perl DNS side-channel function
    crit: suspicious
    conf: 0.93
    for: [perl]
    if:
      type: text
      substr: dns_query_side_channel

  - id: perl-dns-exfil-subdomain
    desc: Perl builds exfil DNS subdomain
    crit: suspicious
    conf: 0.94
    for: [perl]
    if:
      type: text
      regex: 'exfil\.\$\{C2_HOST\}|gethostbyname\(\$fqdn\)'

  - id: python-dns-exfil-function
    desc: Python DNS exfil function
    crit: suspicious
    conf: 0.93
    for: [python]
    if:
      type: text
      substr: _dns_exfiltrate

  - id: python-dns-exfil-lookup
    desc: Python DNS exfil lookup
    crit: suspicious
    conf: 0.94
    for: [python]
    if:
      type: text
      regex: 'base64\.b32encode[\s\S]{0,260}socket\.getaddrinfo'

composite_rules:
  - id: perl-dns-side-channel-exfil
    desc: Perl DNS side-channel exfil
    crit: hostile
    conf: 0.98
    all:
      - id: perl-dns-side-channel-function
      - id: perl-dns-exfil-subdomain

  - id: python-dns-side-channel-exfil
    desc: Python DNS side-channel exfil
    crit: hostile
    conf: 0.98
    all:
      - id: python-dns-exfil-function
      - id: python-dns-exfil-lookup
