defaults:
  platforms: [unix]
  for: [php]
  attack: T1048.003

traits:
  - id: php-hash-dns-exfil
    desc: PHP hash DNS exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'md5\(\$payload\)[\s\S]{0,220}host [^;\n]{0,120}\$TARGET_HOST'

  - id: php-dns-exfil-log
    desc: PHP DNS exfil log
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "[exfil] DNS query"

  - id: php-dns-get-record-exfil
    desc: PHP DNS get_record exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: dns_get_record($dns_query, DNS_A)

  - id: php-dns-label-chunks
    desc: PHP DNS label chunks
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: str_split($encoded, 58)

composite_rules:
  - id: php-dns-hash-exfil
    desc: PHP DNS hash exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-hash-dns-exfil
    any:
      - id: php-dns-exfil-log

  - id: php-dns-label-exfil
    desc: PHP DNS label exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-dns-get-record-exfil
      - id: php-dns-label-chunks
