defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1048.003

traits:
  - id: kotlin-hex-data-exfil
    desc: Kotlin hex encodes exfil data
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: val hexData = toHex

  - id: kotlin-exfil-subdomain
    desc: Kotlin uses exfil subdomain
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "$chunk.exfil."

  - id: kotlin-dns-checkin-loop
    desc: Kotlin DNS checkin loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: dnsCheckin("$chunk.exfil.

composite_rules:
  - id: kotlin-dns-hex-exfil-channel
    desc: Kotlin DNS hex exfil channel
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-hex-data-exfil
      - id: kotlin-dns-checkin-loop
    any:
      - id: kotlin-exfil-subdomain
      - id: objectives/exfiltration/stealer/credential/network-appliance::netscaler-dns-exfil-label
