defaults:
  platforms: [unix, appliance]
  for: [php]
  attack: T1048.003

traits:
  - id: php-dns-txt-query-builder
    desc: PHP DNS TXT query builder
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'Type TXT = 16[\s\S]{0,260}send_dns_packet'

  - id: php-hex-label-chunking
    desc: PHP hex label chunking
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'bin2hex\(\$data\)[\s\S]{0,180}str_split\(\$encoded'

  - id: php-staged-file-dns-loop
    desc: PHP staged file DNS loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "glob(STAGING_DIR . '/*')"

  - id: php-dns-marker-chunk-send
    desc: PHP DNS marker chunk send
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'dns_exfiltrate_chunk($marker'

composite_rules:
  - id: php-dns-staged-file-exfil
    desc: PHP DNS staged file exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-dns-txt-query-builder
      - id: php-hex-label-chunking
      - id: php-staged-file-dns-loop
      - id: php-dns-marker-chunk-send
