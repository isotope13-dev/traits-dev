defaults:
  platforms: [netscaler, appliance, unix]
  for: [java, kotlin, class, jar]
  attack: T1048.003

traits:
  - id: jvm-netscaler-dns-exfil-host
    desc: JVM NetScaler DNS exfil host
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'EXFIL_HOST[\s\S]{0,160}netscaler'

  - id: jvm-dns-chunk-query-format
    desc: JVM DNS chunk query format
    crit: suspicious
    conf: 0.92
    for: [java, kotlin]
    if:
      type: text
      substr: "%04d.%s.%s"

  - id: jvm-dns-format-bytecode
    desc: JVM DNS format bytecode
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: text
      regex: '%04d\.%s\.%s'

composite_rules:
  - id: jvm-netscaler-dns-exfil
    desc: JVM NetScaler DNS exfil
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-netscaler-dns-exfil-host
      - id: jvm-dns-chunk-query-format
    any:
      - id: micro-behaviors/communications/dns/lookup/resolver::jvm-inetaddress-getallbyname-source

  - id: jvm-netscaler-dns-bytecode
    desc: JVM NetScaler DNS bytecode
    crit: hostile
    conf: 0.97
    for: [class, jar]
    all:
      - id: jvm-dns-format-bytecode
      - id: objectives/command-and-control/dns/tunneling::jvm-dns-getallbyname
