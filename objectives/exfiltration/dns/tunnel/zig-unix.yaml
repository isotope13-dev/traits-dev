defaults:
  platforms: [unix]
  for: [zig, elf]
  attack: T1048.003

traits:
  - id: zig-dns-hex-chunk-loop
    desc: Zig DNS hex chunk loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'chunk_size: usize = 30[\s\S]{0,340}hex\[idx\.\.end\]'

  - id: zig-dns-txt-build
    desc: Zig builds DNS TXT query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Question type: TXT[\s\S]{0,120}Question class: IN'

  - id: zig-posix-dns-sendto
    desc: Zig sends DNS UDP packet
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'DNS_SERVER[\s\S]{0,900}posix\.sendto'

composite_rules:
  - id: zig-dns-sensitive-data-exfil
    desc: Zig DNS sensitive data exfil
    crit: hostile
    conf: 0.98
    all:
      - id: zig-dns-hex-chunk-loop
      - id: zig-dns-txt-build
      - id: micro-behaviors/fs/path/sensitive/credentials::unix-shadow-root-ssh-paths
      - id: zig-posix-dns-sendto
