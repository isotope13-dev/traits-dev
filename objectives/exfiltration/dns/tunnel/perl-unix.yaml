defaults:
  platforms: [unix]
  for: [perl]
  attack: T1048.003

traits:
  - id: perl-dns-exfil-label
    desc: Perl DNS exfil label
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '["'']exfil[.-][^"'']{0,60}\$'

composite_rules:
  - id: perl-dns-label-exfil
    desc: Perl DNS label exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/dns/client::perl-udp-dns-socket
      - id: micro-behaviors/data/encode/hex::perl-byte-hex-loop
      - id: perl-dns-exfil-label

  - id: perl-dig-txt-label-exfil
    desc: Perl dig TXT label exfil
    crit: hostile
    conf: 0.98
    all:
      - id: perl-dns-exfil-label
      - id: micro-behaviors/communications/dns/tools::perl-dig-command-string
      - id: micro-behaviors/data/encode/hex::perl-unpack-hex
