defaults:
  platforms: [panos, appliance, unix]
  for: [go, elf]
  attack: T1048.003

traits:
  - id: go-panos-dns-hb-payload
    desc: Go PAN-OS DNS HB payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: hb:%s:%s:%d

  - id: go-panos-google-dns-udp
    desc: Go PAN-OS Google DNS UDP
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: net.Dial("udp", "8.8.8.8:53")

composite_rules:
  - id: go-panos-dns-heartbeat-tunnel
    desc: Go PAN-OS DNS heartbeat tunnel
    crit: hostile
    conf: 0.98
    all:
      - id: go-panos-dns-hb-payload
      - id: go-panos-google-dns-udp
