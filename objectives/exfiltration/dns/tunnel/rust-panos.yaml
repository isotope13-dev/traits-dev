defaults:
  platforms: [panos, appliance, unix]
  for: [rust, elf]
  attack: T1048.003

traits:
  - id: rust-panos-dns-exfil-failure
    desc: Rust PAN-OS DNS exfil failure
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: dns exfil failed for chunk

  - id: rust-panos-google-dns-server
    desc: Rust PAN-OS Google DNS server
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: format!("8.8.8.8:53").to_socket_addrs()

composite_rules:
  - id: rust-panos-dns-exfiltration
    desc: Rust PAN-OS DNS exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: rust-panos-dns-exfil-failure
      - id: rust-panos-google-dns-server
