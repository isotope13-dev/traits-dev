defaults:
  platforms: [openwrt]
  for: [zig]
  attack: T1048.003

traits:
  - id: zig-hex-dns-query-builder
    desc: Zig hex DNS query builder
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'hexEncode[\s\S]{0,500}bufPrint\(.{0,120}"\{s\}\.\{s\}"'
  - id: zig-dns-base-constant
    desc: Zig DNS base constant
    crit: notable
    conf: 0.88
    if:
      type: text
      word: DNS_BASE
  - id: zig-dns-exfil-function
    desc: Zig DNS exfil function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'fn\s+exfiltrateData[\s\S]{0,700}DNS_BASE'
  - id: zig-proc-uptime-path
    desc: Zig proc uptime path
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: /proc/uptime
  - id: zig-gethostname-call
    desc: Zig gethostname call
    crit: notable
    conf: 0.86
    if:
      type: text
      word: gethostname

composite_rules:
  - id: openwrt-zig-account-dns-exfil
    desc: OpenWrt Zig account DNS exfil
    crit: hostile
    conf: 0.97
    all:
      - id: zig-hex-dns-query-builder
      - id: zig-dns-base-constant
      - id: micro-behaviors/communications/ip/resolve::zig-getaddrinfo
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
  - id: openwrt-zig-system-dns-exfil
    desc: OpenWrt Zig system DNS exfil
    crit: hostile
    conf: 0.96
    all:
      - id: zig-hex-dns-query-builder
      - id: zig-dns-exfil-function
      - id: micro-behaviors/communications/ip/resolve::zig-getaddrinfo
    any:
      - id: zig-proc-uptime-path
      - id: zig-gethostname-call
