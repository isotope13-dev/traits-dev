defaults:
  platforms: [routeros, appliance, unix]
  for: [objc, elf]
  attack: T1048.003

traits:
  - id: objc-email-dns-beacon-format
    desc: ObjC email DNS beacon format
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "email-%d-%s"

  - id: objc-email-beacon-selector-flow
    desc: ObjC email beacon selector flow
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'emailAt:[\s\S]{0,360}SEL_\("beacon:"\)'

composite_rules:
  - id: objc-email-dns-exfil
    desc: ObjC email DNS exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objc-email-dns-beacon-format
      - id: objc-email-beacon-selector-flow
      - id: objectives/command-and-control/dns/tunneling::objc-resolver-dns-c2
