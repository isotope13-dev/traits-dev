defaults:
  platforms: [qnx]
  for: [elf]
  attack: T1048.003

traits:
  - id: qnx-zig-elf-dns-lookup-symbols
    desc: QNX Zig ELF DNS lookup symbol
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/binary/linking/static::ld-linux-interp
    if:
      type: text
      substr: Io.Threaded.lookupDns

  - id: qnx-zig-elf-dns-query-writer
    desc: QNX Zig ELF DNS query writer
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/binary/linking/static::ld-linux-interp
    if:
      type: text
      substr: writeResolutionQuery

  - id: qnx-zig-elf-txt-value-symbol
    desc: QNX Zig ELF TXT value symbol
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/binary/linking/static::ld-linux-interp
    if:
      type: text
      substr: value_txt

composite_rules:
  - id: qnx-zig-elf-dns-payload-channel
    desc: QNX Zig ELF DNS payload channel
    crit: hostile
    conf: 0.96
    all:
      - id: qnx-zig-elf-dns-lookup-symbols
      - id: qnx-zig-elf-dns-query-writer
      - id: qnx-zig-elf-txt-value-symbol
