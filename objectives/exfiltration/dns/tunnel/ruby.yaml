defaults:
  platforms: [unix, openwrt]
  for: [ruby]
  attack: T1048.003

traits:
  - id: ruby-dns-exfiltrate-label
    desc: Ruby DNS exfiltrate label
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: dns_exfiltrate
  - id: ruby-exfil-subdomain-prefix
    desc: Ruby exfil subdomain prefix
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "'exfil.'"

composite_rules:
  - id: ruby-dns-subdomain-exfil
    desc: Ruby DNS subdomain exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-resolve
      - id: micro-behaviors/data/encode/base64::ruby-base64-urlsafe-encode
    any:
      - id: ruby-dns-exfiltrate-label
      - id: ruby-exfil-subdomain-prefix
      - id: objectives/exfiltration/dns/tunnel::dns-exfil
    needs: 1
