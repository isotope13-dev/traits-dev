defaults:
  platforms: [openbsd, bsd, unix]
  for: [objc, elf]
  attack: T1048.003

traits:
  - id: objc-exfil-subdomain-format
    desc: ObjC exfil subdomain format
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "%s.exfil.%s"

  - id: objc-account-dns-exfil-call
    desc: ObjC account DNS exfil call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: exfil_accounts_via_dns

  - id: objc-master-passwd-copy-paths
    desc: ObjC master passwd copy paths
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: '/etc/master\.passwd[\s\S]{0,260}/tmp/\.cache_sys/\.passwd\.bak'

composite_rules:
  - id: objc-openbsd-dns-account-exfil
    desc: ObjC DNS account exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: objc-exfil-subdomain-format
      - id: objc-account-dns-exfil-call
      - id: objectives/credential-access/files/config::native-master-passwd-read

  - id: objc-openbsd-passwd-copy-dns-exfil
    desc: ObjC passwd DNS exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objc-master-passwd-copy-paths
      - id: objc-exfil-subdomain-format
