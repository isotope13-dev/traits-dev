# Subdomain Data Encoding
# Detects encoding data into DNS subdomain structure for exfiltration
# ATT&CK: T1048.003 (Exfiltration Over Alternative Protocol: DNS)
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
  conf: 0.85
traits:
  # Domain string concatenation pattern
  - id: domain-concat-vars
    desc: Domain concatenation with variables
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: "\\+\\s*[\"']\\.[\"']\\s*\\+\\s*\\w+\\s*\\+\\s*[\"']\\.\\w+\\.(com|net|org|io)[\"']"
  # Exfil domain variable naming
  - id: exfil-domain-var
    desc: Exfiltration domain variable naming
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: "(exfil_domain|exfiltration_domain|c2_domain|beacon_domain)\\s*="
  # Require an actual URL and a variable DNS label. A generic dotted f-string
  # also represents ordinary filenames such as ``f\"{stamp}.tar.gz\"``.
  - id: python-url-variable-subdomain
    desc: Python URL with a variable DNS label
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "(?i)https?://[^\"']{0,120}\\{\\w+\\}\\.[a-z0-9-]+\\.[a-z]{2,24}([/?:\"']|$)"
composite_rules:
  - id: subdomain-data-encoding
    desc: Data encoded in DNS subdomains
    crit: suspicious
    conf: 0.9
    attack: "T1048.003"
    any:
      - id: domain-concat-vars
      - id: exfil-domain-var
  - id: python-hex-subdomain-encoding
    desc: Hex-encoded data placed in a URL hostname
    crit: suspicious
    conf: 0.9
    attack: "T1048.003"
    near_lines: 40
    all:
      - id: micro-behaviors/data/encode/hex::string-encode-hex
      - id: python-url-variable-subdomain
