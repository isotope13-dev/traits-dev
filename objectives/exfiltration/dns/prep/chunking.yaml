# DNS Exfil Preparations - Chunking
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: notable
  for: [javascript, typescript]
traits:
  - id: dns-regex-chunking
    desc: Regex string chunking for DNS limits
    if:
      type: text
      regex: '\.match\(/.{1,10}\{\s*\d+\s*,\s*6[0-4]\s*\}.{0,5}/g\)'
  - id: template-subdomain-chunk
    desc: Template string multi-level subdomain with vars
    if:
      type: text
      regex: '`[a-zA-Z0-9_.-]{0,20}\$\{[^}]{1,30}\}\.\$\{[^}]{1,30}\}\.\$\{[^}]{1,30}\}'
