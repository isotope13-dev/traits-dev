# DNS Exfil Preparations - Chunking
defaults:
  platforms: [windows, unix]
  crit: notable
  for: [javascript, typescript]
traits:
  - id: dns-regex-chunking
    desc: Regex string chunking for DNS limits
    if:
      type: text
      regex: '\.match\(/.{1,10}\{\s*\d+\s*,\s*6[0-4]\s*\}.{0,5}/g\)\s*\.join\(\s*["'']\.["'']\s*\)'
  - id: template-subdomain-chunk
    desc: "Template multi-level subdomain with vars"
    crit: component
    if:
      type: text
      regex: '`[a-zA-Z0-9_.-]{0,20}\$\{[^}]{1,30}\}\.\$\{[^}]{1,30}\}\.\$\{[^}]{1,30}\}'
    not:
      - substr: '${this.major}.${this.minor}.${this.patch}'
