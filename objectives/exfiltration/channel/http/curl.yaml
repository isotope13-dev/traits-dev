# Curl-based HTTP Exfiltration
# ATT&CK: T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript, python, shell]
traits:
  - id: curl-d-flag
    desc: curl -d flag
    crit: notable
    conf: 0.8
    attack: "T1041"
    if:
      type: string
      regex: "curl\\s+-d"
  - id: curl-data-flag
    desc: curl --data flag
    crit: notable
    conf: 0.8
    attack: "T1041"
    if:
      type: string
      regex: "curl\\s+--data"
  - id: curl-post-flag
    desc: curl -X POST flag
    crit: notable
    conf: 0.8
    attack: "T1041"
    if:
      type: string
      regex: "curl\\s+-X\\s*POST"
composite_rules:
  - id: curl-exfil
    desc: Curl command with data parameter
    crit: suspicious
    conf: 0.9
    attack: "T1041"
    any:
      - id: curl-d-flag
      - id: curl-data-flag
      - id: curl-post-flag
