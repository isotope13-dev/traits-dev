# Telegram Bot API Exfiltration
# Malware using Telegram bots as C2/exfil channels
# Common in infostealers: Aeternum, AgentTesla, RedLine variants
defaults:
  platforms: [windows, linux, macos, unix]
  for: [binaries, scripts]
  attack: T1567
traits:
  - id: api-endpoint
    desc: Telegram Bot API endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: api.telegram.org
  - id: send-document
    desc: Telegram sendDocument file upload
    crit: suspicious
    conf: 0.92
    if:
      type: string
      substr: /sendDocument
  - id: send-message
    desc: Telegram sendMessage API call
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: /sendMessage
  - id: send-photo
    desc: Telegram sendPhoto API call
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: /sendPhoto
  - id: bot-token-pattern
    desc: Hardcoded Telegram bot token
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: '\d{8,12}:[A-Za-z0-9_-]{35}'
    not:
      - regex: '^\d+:\d+$'
  - id: bot-user-agent
    desc: Bot-identifying HTTP user agent
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: '(?i)(system\s*info|stealer|grabber|bot)[/ ]\d+\.\d+'
composite_rules:
  - id: telegram-bot-exfil
    desc: Telegram bot API file exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: api-endpoint
    any:
      - id: send-document
      - id: send-photo
  - id: telegram-bot-c2
    desc: Telegram bot API data exfiltration
    crit: suspicious
    conf: 0.92
    all:
      - id: api-endpoint
      - id: bot-token-pattern
