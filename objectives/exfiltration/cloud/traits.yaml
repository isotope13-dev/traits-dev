defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: s3-amazonaws-domain
    desc: S3 amazonaws.com domain
    crit: component
    mbc: E1567.002
    attack: T1567.002
    conf: 0.8
    if:
      type: string_value
      regex: https?://s3\.amazonaws\.com/
  - id: s3-upload-method
    desc: S3 upload method call
    crit: notable
    mbc: E1567.002
    attack: T1567.002
    conf: 0.8
    if:
      type: string_value
      regex: s3.{0,50}\.upload
    unless:
      - type: raw
        substr: "Usage::"
      - type: raw
        substr: "Example usage::"
  - id: dropbox-api-domain
    desc: Dropbox API domain
    crit: notable
    mbc: E1567
    attack: T1567
    conf: 0.8
    if:
      type: string_value
      substr: api.dropbox.com
  - id: dropbox-upload-method
    desc: Dropbox upload method
    crit: notable
    mbc: E1567
    attack: T1567
    conf: 0.8
    if:
      type: string_value
      regex: dropbox.{0,50}upload
  - id: gdrive-domain
    desc: Google Drive domain
    crit: notable
    mbc: E1567
    attack: T1567
    conf: 0.8
    if:
      type: string_value
      substr: drive.google.com
  - id: googleapis-drive
    desc: Google APIs drive reference
    crit: notable
    mbc: E1567
    attack: T1567
    conf: 0.8
    if:
      type: string_value
      regex: googleapis.{0,50}drive
composite_rules:
  - id: s3-upload
    desc: AWS S3 upload
    crit: notable
    mbc: E1567.002
    attack: T1567.002
    conf: 0.9
    all:
      - id: s3-amazonaws-domain
      - id: s3-upload-method
  - id: dropbox-api
    desc: Dropbox API access
    crit: notable
    mbc: E1567
    attack: T1567
    conf: 0.9
    any:
      - id: dropbox-api-domain
      - id: dropbox-upload-method
  - id: gdrive-api
    desc: Google Drive API access
    crit: notable
    mbc: E1567
    attack: T1567
    conf: 0.9
    any:
      - id: gdrive-domain
      - id: googleapis-drive
