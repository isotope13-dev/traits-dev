defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
- id: s3-amazonaws-domain
  desc: S3 amazonaws.com domain
  crit: component
  mbc: E1567.002
  attack: T1567.002
  conf: 0.8
  if:
    type: text
    regex: https?://s3\.amazonaws\.com/
- id: s3-regional-bucket-domain
  desc: S3 regional bucket domain
  crit: component
  mbc: E1567.002
  attack: T1567.002
  conf: 0.82
  if:
    type: text
    regex: https?://[a-z0-9][a-z0-9.-]{2,80}\.s3\.[a-z0-9-]+\.amazonaws\.com/
- id: s3-upload-method
  desc: S3 upload method call
  crit: component
  mbc: E1567.002
  attack: T1567.002
  conf: 0.8
  if:
    type: text
    regex: s3.{0,50}\.upload
  unless:
  - type: text
    substr: "Usage::"
  - type: text
    substr: "Example usage::"
- id: dropbox-api-domain
  desc: Dropbox API domain
  crit: component
  mbc: E1567
  attack: T1567
  conf: 0.8
  if:
    type: text
    substr: api.dropbox.com
- id: dropbox-content-domain
  desc: Dropbox content API domain
  crit: component
  mbc: E1567
  attack: T1567
  conf: 0.8
  if:
    type: text
    substr: content.dropboxapi.com
- id: dropbox-files-endpoint
  desc: Dropbox files API path
  crit: component
  mbc: E1567
  attack: T1567
  conf: 0.82
  if:
    type: text
    regex: /2/(files|sharing|users)/|/1/fileops/
- id: dropbox-upload-method
  desc: Dropbox upload method
  crit: suspicious
  mbc: E1567
  attack: T1567
  conf: 0.8
  if:
    type: text
    regex: dropbox.{0,50}upload
  unless:
  - id: objectives/credential-access/cloud/token::sharex-uploaderslib-assembly
  - id: encrypted-vault-dropbox-sync
  - id: metadata/package/testing/presence/harness::example-directory
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
- id: gdrive-domain
  desc: Google Drive domain
  crit: notable
  mbc: E1567
  attack: T1567
  conf: 0.8
  if:
    type: text
    substr: drive.google.com
  unless:
  - type: text
    regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
- id: googleapis-drive
  desc: Google APIs drive reference
  crit: notable
  mbc: E1567
  attack: T1567
  conf: 0.8
  if:
    type: text
    regex: googleapis.{0,50}drive
  not:
    # `googleapis.com/auth/drive[.*]` is an OAuth *scope* — a permission request, not
    # exfiltration. Any Google app needing Drive declares it (the upload itself goes to
    # the Drive API path `/drive/v3/files` or `/upload/drive/`, which still matches).
    # Filters the Earth Engine SDK scope-list FP.
    - regex: 'auth/drive'
  unless:
  - id: objectives/credential-access/cloud/token::sharex-uploaderslib-assembly
  - type: text
    regex: '\$\{[^}]{0,120}&& \(\$[a-z]{3,8}\)\}'
  - id: metadata/package/testing/harness/runtime::is-test
- id: cloudflare-r2-upload-method--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\b(PUT|putObject)\b.{0,180}(r2\.cloudflarestorage\.com|R2_ACCESS_KEY|CLOUDFLARE_R2)'
  count_max: 1021181
- id: cloudflare-r2-upload-method--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\b(PutObject|Upload)\b.{0,180}(r2\.cloudflarestorage\.com|R2_ACCESS_KEY|CLOUDFLARE_R2)'
  count_max: 1021182
- id: dropbox-syncwithdropbox-call
  desc: syncWithDropbox call marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: syncWithDropbox
- id: dropbox-encryptvaultdata-call
  desc: encryptVaultData call marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: encryptVaultData
- id: dropbox-uploadtodropbox-call
  desc: uploadToDropbox call marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: uploadToDropbox
composite_rules:
  - id: encrypted-vault-dropbox-sync
    desc: Encrypted vault Dropbox sync
    crit: component
    conf: 0.88
    near_bytes: 800
    all:
      - id: dropbox-syncwithdropbox-call
      - id: dropbox-encryptvaultdata-call
      - id: dropbox-uploadtodropbox-call

  - id: s3-upload
    desc: AWS S3 upload
    crit: suspicious
    mbc: E1567.002
    attack: T1567.002
    conf: 0.9
    any:
      - id: s3-amazonaws-domain
      - id: s3-regional-bucket-domain
    all:
      - id: s3-upload-method
  - id: dropbox-api
    desc: Dropbox API access
    crit: suspicious
    mbc: E1567
    attack: T1567
    conf: 0.9
    needs: 2
    any:
      - id: dropbox-api-domain
      - id: dropbox-content-domain
      - id: dropbox-files-endpoint
      - id: dropbox-upload-method
    unless:
      - id: encrypted-vault-dropbox-sync
      - id: metadata/package/testing/presence/harness::example-directory
      - id: metadata/package/testing/harness/runtime::test-basename-pattern
  - id: gdrive-api
    desc: Google Drive API access
    crit: notable
    mbc: E1567
    attack: T1567
    conf: 0.9
    any:
      - id: gdrive-domain
      - id: googleapis-drive
  - id: cloudflare-r2-upload
    desc: Cloudflare R2 object upload
    crit: suspicious
    mbc: E1567.002
    attack: T1567.002
    conf: 0.92
    all:
      - id: objectives/command-and-control/infrastructure/cloud::cloudflare-r2-url
    any:
      - id: cloudflare-r2-upload-method
      - id: objectives/credential-access/env/secrets/cloud-access::env-r2-access-key
      - id: objectives/credential-access/env/secrets/cloud-access::env-cloudflare-token
  - id: cloudflare-r2-secret-exfil
    desc: Cloud credentials uploaded to R2
    crit: hostile
    mbc: E1567.002
    attack: T1567.002
    conf: 0.97
    all:
      - id: cloudflare-r2-upload
    any:
      - id: objectives/credential-access/env/secrets/cloud-access::node-aws
      - id: objectives/credential-access/env/secrets/cloud-access::node-cloud
      - id: objectives/discovery/cloud/metadata::metadata-harvesting
  - id: cloudflare-r2-upload-method
    desc: Cloudflare R2 object upload
    crit: notable
    conf: 0.86
    mbc: E1567.002
    attack: T1567.002
    any:
      - id: cloudflare-r2-upload-method--rx-1
      - id: cloudflare-r2-upload-method--rx-2
