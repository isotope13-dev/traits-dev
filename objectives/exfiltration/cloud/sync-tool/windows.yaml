defaults:
  platforms: [windows]
  for: [batch, powershell, pe]
  attack: T1567
traits:
  - id: goodsync-name
    desc: GoodSync sync tool reference
    crit: component
    if:
      type: text
      regex: '(?i)\bGoodSync(?:\.exe)?\b'
  - id: goodsync-job-action
    desc: GoodSync job action switch
    crit: suspicious
    if:
      type: text
      regex: '(?i)\bGoodSync(?:\.exe)?\b.{0,120}\b(sync|analyze|jobs|run)\b'
  - id: backblaze-target
    desc: Backblaze B2 storage target
    crit: suspicious
    if:
      type: text
      regex: '(?i)\b(backblaze|backblazeb2\.com|b2://)\b'
    unless:
      - type: text
        substr: ShareX.UploadersLib
  - id: bulk-common-data-path
    desc: Bulk common data path list (reconnaissance context)
    # Generic ProgramData/Users/inetpub path clusters are useful only when
    # paired with sync/cloud tooling below; installers and uninstallers also
    # enumerate these locations during cleanup.
    crit: component
    count_min: 2
    not:
      - substr: 'C:\users\builder\appdata\local'
      - substr: 'C:\Users\victorbarac\AppData\Local\Microsoft\Windows'
      - substr: 'victorbarac\AppData\Local\Microsoft\Windows'
      - substr: 'victorbarac\AppData'
      - substr: 'C:\ProgramData\Goodix'
      - substr: 'C:\ProgramData\Microsoft\Windows'
      - substr: 'C:\Users\Administrator\Downloads'
      - substr: 'c:\users\administrator\downloads'
      - substr: 'Cracker Tools'
      - substr: '.cargo\registry'
      - substr: '.cargo\git'
    unless:
      - type: text
        substr: Bitdefender Active Threat Control Filesystem Minifilter
    if:
      type: text
      regex: '(?i)(?:[A-Z]:\\|\\\\)(ProgramData|Users|inetpub)(\\[\w .-]{1,40}){1,4}'

  - id: bulk-sensitive-server-data-path
    desc: Bulk sensitive server data path list
    crit: suspicious
    count_min: 2
    if:
      type: text
      regex: '(?i)(?:[A-Z]:\\|\\\\)(inetpub\\wwwroot|ProgramData\\Microsoft\\Crypto|Users\\.{1,40}\\(AppData\\Roaming\\(Discord|Telegram|FileZilla)|Documents\\Secrets))(\\[\w .-]{1,40}){0,4}'

  - id: sync-recursive-flags
    desc: Recursive sync transfer flags
    # Component-only: the individual tokens (`/sync`, `/run`, etc.) collide
    # with Go runtime package paths and any CLI tool switches. Only meaningful
    # when paired with GoodSync + Backblaze in `goodsync-backblaze-exfil`.
    crit: component
    if:
      type: text
      regex: '(?i)(--recursive|/left=|/right=|/sync.{0,40}/(left|right)=)'
composite_rules:
  - id: goodsync-backblaze-exfil
    desc: GoodSync exfiltration to Backblaze
    crit: hostile
    conf: 0.95
    all:
      - id: goodsync-name
      - id: backblaze-target
    any:
      - id: goodsync-job-action
      - id: sync-recursive-flags
      - id: bulk-common-data-path
      - id: bulk-sensitive-server-data-path
    needs: 2
