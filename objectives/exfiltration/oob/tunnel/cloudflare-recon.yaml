# Cloudflare-tunnel host enumeration beacon: small script gathers AV, IP,
# computer name, username, then uploads to a TryCloudflare endpoint.
defaults:
  attack: T1567
  mbc: B0030
traits:
- id: curl-upload-method--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [shell, batch, powershell]
  platforms: [unix, windows]
  if:
    type: text
    regex: (?i)\bcurl\b[^\r\n]{0,200}(\s-X\s+(POST|PUT|PATCH)|\s--upload-file\b)
  count_max: 1021876
- id: curl-upload-method--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [shell, batch, powershell]
  platforms: [unix, windows]
  if:
    type: text
    regex: (?i)\bcurl\b[^\r\n]{0,200}(\s-T\s+|\s-d\s+@)
  count_max: 1021877
- id: curl-upload-method--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [shell, batch, powershell]
  platforms: [unix, windows]
  if:
    type: text
    regex: (?i)\bcurl\b[^\r\n]{0,200}(\s--data-binary\s+@)
  count_max: 1021878
composite_rules:
- id: cf-tunnel-host-recon-beacon
  desc: Host info exfiltration to Cloudflare tunnel
  crit: hostile
  conf: 0.95
  platforms: [windows]
  for: [batch, powershell]
  all:
  - id: objectives/command-and-control/infrastructure/domain/tunnel::cloudflare-tunnel
  any:
  - id: micro-behaviors/communications/http/ip-discovery::ipify-api
  - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
  - id: micro-behaviors/communications/http/ip-discovery::ip-api-com
  - id: micro-behaviors/os/wmi/query::query-antivirus
  - id: micro-behaviors/os/wmi/query::query-security-center
  - id: micro-behaviors/os/env/vars/access::env-username
  - id: micro-behaviors/os/env/vars/access::env-computername
  needs: 2
- id: cf-tunnel-recon-upload-exfil
  desc: Cloudflare tunnel beacon with explicit data upload
  crit: hostile
  conf: 0.97
  platforms: [windows]
  for: [batch, powershell]
  all:
  - id: cf-tunnel-host-recon-beacon
  any:
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-upload
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-post-method
- id: cf-tunnel-host-recon-beacon-posix
  desc: Host info exfiltration to Cloudflare tunnel (shell)
  crit: hostile
  conf: 0.95
  platforms: [macos, linux]
  for: [shell, applescript]
  all:
  - id: objectives/command-and-control/infrastructure/domain/tunnel::cloudflare-tunnel
  any:
  - id: micro-behaviors/communications/http/ip-discovery::ipify-api
  - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
  - id: micro-behaviors/communications/http/ip-discovery::ip-api-com
  - id: micro-behaviors/process/user/query::whoami-cmd
  needs: 2
- id: cf-tunnel-recon-upload-exfil-posix
  desc: Cloudflare tunnel beacon with curl upload (shell)
  crit: hostile
  conf: 0.97
  platforms: [macos, linux]
  for: [shell, applescript]
  all:
  - id: cf-tunnel-host-recon-beacon-posix
  - id: curl-upload-method--rx-1
  - id: curl-upload-method--rx-2
  - id: curl-upload-method--rx-3
