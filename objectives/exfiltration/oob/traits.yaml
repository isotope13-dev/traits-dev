defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: bytedance-dast
    desc: Exfiltrates data to Bytedance DAST
    crit: suspicious
    conf: 0.95
    attack: T1048
    if:
      type: text
      regex: '[a-z0-9-]+\.byted-dast\.com'
  - id: workers-dev
    desc: Communication with Cloudflare Workers
    crit: notable
    conf: 0.7
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.workers\.dev'
    unless:
      - id: metadata/package::embedded-domain-reputation-catalog
  - id: oastify-b64
    desc: Base64-encoded Oastify OOB domain indicator
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: b2FzdGlmeS5jb20
  - id: oast-fun-b64
    desc: Base64-encoded OAST.fun OOB domain indicator
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: b2FzdC5mdW4
  - id: oast-fun-b64-hexwrapped
    desc: Hex-wrapped Base64 OAST.fun indicator
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 6232467a6443356d645734(3d)?
      case_insensitive: true
  - id: http-b64
    desc: Base64-encoded HTTP protocol fragment
    crit: component
    conf: 0.6
    if:
      type: text
      substr: aHR0cDovL
    not:
      - regex: base64,.{0,500}aHR0cDovL
      - regex: data:image/[A-Za-z0-9.+-]+;base64,
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
  - id: https-b64
    desc: Base64-encoded HTTPS protocol fragment
    crit: component
    conf: 0.6
    if:
      type: text
      substr: aHR0cHM6Ly
    not:
      - regex: ^iVBORw0KGgo
      - regex: base64,.{0,500}aHR0cHM6Ly
      - regex: data:image/[A-Za-z0-9.+-]+;base64,
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
  - id: slack-webhook
    desc: Slack webhook exfiltration endpoint
    crit: notable
    conf: 0.8
    attack: T1567
    if:
      type: text
      regex: hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+
    unless:
      - id: metadata/package::has-tests
composite_rules:
  - id: oob-domains
    desc: Any OOB domain pattern
    any:
      - id: objectives/discovery/network/ip-tracker/
      - id: bytedance-dast
      - id: workers-dev
      - id: encoded-oob-indicators
      - id: slack-webhook
    crit: notable
  - id: preinstall-exfil
    desc: OOB exfiltration from npm preinstall
    crit: suspicious
    conf: 0.99
    attack: T1048
    mbc: B0030
    all:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: oob-domains
  - id: crypto-exfil
    desc: Encrypted OOB exfiltration via crypto
    crit: suspicious
    conf: 0.95
    attack: T1048
    mbc: B0030
    all:
      - id: micro-behaviors/crypto/symmetric/aes::crypto-require-call
      - id: oob-domains
  - id: encoded-oob-indicators
    desc: Base64-encoded OOB domain indicators
    any:
      - id: oastify-b64
      - id: oast-fun-b64
      - id: oast-fun-b64-hexwrapped
    crit: notable
  - id: encoded-oob-exfil
    desc: Base64-encoded OOB domain with HTTP
    crit: suspicious
    conf: 0.95
    attack: T1048
    mbc: B0030
    all:
      - id: micro-behaviors/communications/http/request/
      - id: encoded-oob-indicators
