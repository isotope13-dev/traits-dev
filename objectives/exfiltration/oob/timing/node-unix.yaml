defaults:
  platforms: [unix, netbsd]
  for: [javascript, typescript]
  attack: T1048

traits:
  - id: node-timing-query-exfil
    desc: Node timing query exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /timing?d=

  - id: node-dns-sink-query
    desc: Node DNS sink query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /dns-sink?n=

composite_rules:
  - id: node-side-channel-http-dns-exfil
    desc: Node side-channel exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-timing-query-exfil
      - id: node-dns-sink-query
