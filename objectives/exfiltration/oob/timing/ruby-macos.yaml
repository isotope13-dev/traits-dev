defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1048

traits:
  - id: ruby-byte-timing-sleep
    desc: Ruby byte timing sleep
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sleep (byte_val / 255.0

  - id: ruby-heartbeat-byte-get
    desc: Ruby heartbeat byte GET
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /heartbeat?t=#{idx}&v=#{byte_val}

composite_rules:
  - id: ruby-http-timing-sidechannel
    desc: Ruby HTTP timing sidechannel
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-byte-timing-sleep
      - id: ruby-heartbeat-byte-get
