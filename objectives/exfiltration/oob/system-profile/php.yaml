# System-profile beacon shape in PHP: gather a multi-field host
# fingerprint (hostname + os + cwd + server identity + env vars),
# JSON-encode it, and POST it to an opaque URL. Post-install call-home
# in supply-chain implants, first call in PHP webshells.
defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: B0030
  attack: T1041
composite_rules:
  - id: host-profile-json-post
    desc: Host profile JSON-POSTed remote
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/sysinfo/hostname::php-gethostname-call
      - id: micro-behaviors/data/serialize/object::json-encode
      - id: micro-behaviors/communications/http/curl::exec-symbol
    any:
      - id: objectives/discovery/system/fingerprint/info::server-name-access
      - id: micro-behaviors/fs/directory/cwd::php-getcwd
      - id: micro-behaviors/os/sysinfo/platform/runtime::php-uname-symbol
      - id: micro-behaviors/os/env/dump::php-getenv-no-args
    needs: 2
    near_bytes: 4096

  - id: php-webhook-host-profile-post
    desc: PHP posts host profile to OOB endpoint
    crit: hostile
    conf: 0.99
    mbc: E1041
    all:
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
      - id: micro-behaviors/communications/http/post::php-stream-context-http-post
      - id: micro-behaviors/data/serialize/object::json-encode
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::php-uname-call
      - id: micro-behaviors/fs/directory/cwd::php-getcwd
      - id: micro-behaviors/os/user/account::php-get-current-user
    needs: 2
    near_bytes: 4096
