defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1041
  mbc: E1041
traits:
  - id: python-host-id-fields
    desc: Python host identity fields
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      # Require the field to be populated by a host-identity lookup, rather
      # than treating arbitrary configuration metadata named "hostname" as
      # collection.
      regex: '["''](hostname|ip_address)["'']\s*:\s*[^,\n]{0,30}(gethostname|gethostbyname)'
  - id: python-platform-profile-fields
    desc: Python platform profile fields
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '["''](platform|architecture|processor)["'']\s*:\s*[^,\n]{0,12}platform\.(system|machine)'
  - id: python-platform-version-fields
    desc: Python platform version fields
    crit: component
    conf: 0.88
    count_min: 2
    if:
      type: text
      regex: '["''](platform_release|platform_version|python_version|python_executable)["'']\s*:'
  - id: python-user-path-profile-fields
    desc: Python user path profile fields
    crit: component
    conf: 0.88
    count_min: 2
    if:
      type: text
      regex: '["''](username|home_directory|current_directory)["'']\s*:'
composite_rules:
  - id: python-host-profile-fields
    desc: Python host profile field set
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: python-host-id-fields
      - id: python-platform-profile-fields
      - id: python-platform-version-fields
  - id: python-webhook-host-profile-post
    desc: Python posts host profile to webhook
    crit: suspicious
    conf: 0.94
    near_lines: 160
    all:
      - id: python-host-profile-fields
      - id: objectives/exfiltration/oob/endpoint::webhook-site
      - id: micro-behaviors/communications/http/request/client::requests-post-json-payload
  - id: python-webhook-user-path-post
    desc: Python posts user path profile to webhook
    crit: suspicious
    conf: 0.93
    near_lines: 160
    all:
      - id: python-user-path-profile-fields
      - id: objectives/exfiltration/oob/endpoint::webhook-site
      - id: micro-behaviors/communications/http/request/client::requests-post-json-payload
  - id: python-webhook-full-host-profile-exfil
    desc: Python exfils full host profile to webhook
    crit: hostile
    conf: 0.97
    near_lines: 180
    all:
      - id: python-host-profile-fields
      - id: python-user-path-profile-fields
      - id: objectives/exfiltration/oob/endpoint::webhook-site
      - id: micro-behaviors/communications/http/request/client::requests-post-json-payload
  - id: python-webhook-system-info-exfil
    desc: Python exfils system_info object to webhook
    crit: hostile
    conf: 0.97
    near_lines: 180
    all:
      - id: python-webhook-full-host-profile-exfil
      - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
      - id: micro-behaviors/fs/path/location::os-path-expanduser
