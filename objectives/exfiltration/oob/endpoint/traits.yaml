defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: bytedance-dast
    desc: Bytedance DAST callback domain
    crit: suspicious
    conf: 0.95
    attack: T1048
    if:
      type: text
      regex: '[a-z0-9-]+\.byted-dast\.com'
  - id: oastify-b64
    desc: Base64-encoded Oastify OOB domain indicator
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: b2FzdGlmeS5jb20
  - id: oast-fun-b64
    desc: Base64-encoded OAST.fun OOB domain indicator
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: b2FzdC5mdW4
  - id: oast-fun-b64-hexwrapped
    desc: Hex-wrapped Base64 OAST.fun indicator
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 6232467a6443356d645734(3d)?
      case_insensitive: true
composite_rules:
  - id: oob-domains
    desc: Out-of-band callback domain pattern
    any:
      - id: bytedance-dast
      - id: oastify-b64
      - id: oast-fun-b64
      - id: oast-fun-b64-hexwrapped
    crit: suspicious
  - id: preinstall-exfil
    desc: OOB exfiltration from npm preinstall
    crit: suspicious
    conf: 0.99
    attack: T1048
    mbc: B0030
    all:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: oob-domains
  - id: crypto-oob
    desc: OOB callback with crypto module import
    crit: suspicious
    conf: 0.95
    attack: T1048
    mbc: B0030
    all:
      - id: micro-behaviors/crypto/library/provider::crypto-module-import
      - id: oob-domains
  - id: encoded-oob-indicators
    desc: Base64-encoded OOB domain indicators
    any:
      - id: oastify-b64
      - id: oast-fun-b64
      - id: oast-fun-b64-hexwrapped
    crit: suspicious
  - id: encoded-oob-exfil
    desc: Base64-encoded OOB domain with HTTP
    crit: suspicious
    conf: 0.95
    attack: T1048
    mbc: B0030
    all:
      - id: micro-behaviors/communications/http/request/
    any:
      - id: oastify-b64
      - id: oast-fun-b64
      - id: oast-fun-b64-hexwrapped
