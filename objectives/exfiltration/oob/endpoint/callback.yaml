defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.85
  for: [python, javascript, shell, powershell, pe, go, ruby, package.json]
traits:
  - id: burpcollaborator
    desc: Burp Collaborator OOB service
    if:
      type: text
      regex: ([a-z0-9]{8,32}\.)?burpcollaborator\.net\b
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: collab-digi-ninja
    desc: collab.digi.ninja OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?collab\.digi\.ninja\b
  - id: interact-sh-me-fun
    desc: interact.sh OOB service (me/fun)
    if:
      type: text
      regex: ([a-z0-9]{8,64}\.)?oast\.(me|fun)\b
  - id: interact-sh-pro-live
    desc: interact.sh OOB service (pro/live)
    if:
      type: text
      regex: ([a-z0-9]{8,64}\.)?oast\.(pro|live)\b
  - id: interact-sh-online-site
    desc: interact.sh OOB service (online/site)
    if:
      type: text
      regex: ([a-z0-9]{8,64}\.)?oast\.(online|site)\b
  - id: interactsh-com
    desc: interactsh.com OOB service
    if:
      type: text
      regex: ([a-z0-9]{8,64}\.)?interactsh\.com\b
  - id: pipedream
    desc: Pipedream OOB service
    ref: sha256:456f6483c9c64c940c3bb3182a1f2794c4d1d9be5e8d5cd8412e8ef6d45892f6
    if:
      type: text
      regex: ([a-z0-9]{8,32}\.)?(m\.)?pipedream\.(net|com)\b
  - id: pipedream-npm-script
    desc: Pipedream OOB service in npm script
    for: [package.json]
    ref: sha256:456f6483c9c64c940c3bb3182a1f2794c4d1d9be5e8d5cd8412e8ef6d45892f6
    if:
      type: value
      path: 'scripts[*]'
      regex: ([a-z0-9]{8,32}\.)?(m\.)?pipedream\.(net|com)\b
  - id: ngrok-free
    desc: ngrok-free tunnel URL
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '[a-z0-9-]+\.ngrok-free\.(app|dev)\b'
    not:
      # Placeholder / doc examples, not live callback infrastructure
      - regex: '\babcd1234\.ngrok-free\.(app|dev)\b'
      - regex: '\babc123\.ngrok-free\.(app|dev)\b'
      - regex: '\bexample\.ngrok-free\.(app|dev)\b'
      - regex: '\byour-subdomain\.ngrok-free\.(app|dev)\b'
  - id: xss-report-callback
    desc: xss.report callback collection path
    if:
      type: text
      regex: xss\.report/(c|r)/[A-Za-z0-9_-]{3,80}\b
  - id: dnslog-cn
    desc: DNSLog.cn OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?dnslog\.cn\b
  - id: ceye-io
    desc: ceye.io OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?ceye\.io\b
  - id: requestbin
    desc: RequestBin OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?requestbin\.(com|net)\b
  - id: requestcatcher
    desc: RequestCatcher OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?requestcatcher\.com\b
  - id: hookbin
    desc: HookBin OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?hookbin\.com\b
  - id: httpdump-app
    desc: httpdump.app OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?httpdump\.app\b
  - id: webhook-site
    desc: webhook.site OOB service
    for: [scripts, pe, go, ruby, package.json, xml]
    if:
      type: text
      regex: ([a-z0-9-]+\.)?webhook\.site\b
    unless:
      # Per-file: only suppress when *this* file is a test, not when the package
      # contains any test elsewhere — malicious packages bundle a token test.js
      # to silence package-level suppressors.
      - id: metadata/package/testing/harness/runtime/
  - id: webhook-cool
    desc: webhook.cool OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?webhook\.cool\b
  - id: webhookrelay
    desc: webhookrelay.com OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?webhookrelay\.com\b
  - id: requestrepo
    desc: RequestRepo OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?requestrepo\.com\b
  - id: canarytokens-dup
    desc: CanaryTokens OOB service
    if:
      type: text
      regex: https?://([a-z0-9-]+\.)?canarytokens\.org\b
  - id: canarytokens-com
    desc: CanaryTokens.com OOB service
    if:
      type: text
      regex: https?://([a-z0-9-]+\.)?canarytokens\.com\b
  - id: beez-buzz
    desc: Beez.buzz OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?beez\.buzz\b
  - id: oastify
    desc: Oastify OOB service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?oastify\.com\b
  - id: own-sh
    desc: 0wn.sh OOB callback service
    if:
      type: text
      regex: ([a-z0-9-]+\.)?0wn\.sh\b
  - id: bypass-eu-org
    desc: bypass.eu.org SSRF bypass service
    crit: suspicious
    conf: 0.9
    attack: T1599
    if:
      type: text
      regex: ([a-f0-9]{6,16}\.(ipv4|ipv6)\.)?bypass\.eu\.org\b
  - id: dnshook-site
    desc: dnshook.site DNS canary/OOB service
    crit: suspicious
    conf: 0.95
    attack: T1048.003
    if:
      type: text
      regex: '[a-z0-9]{8,64}\.dnshook\.site\b'
  - id: eyes-sh
    desc: eyes.sh OOB service
    crit: suspicious
    conf: 0.95
    attack: T1048.003
    if:
      type: text
      regex: ([a-z0-9-]+\.)?eyes\.sh\b
  - id: zivyelab-collaborator
    desc: ZivyeLab collaborator OOB service
    crit: suspicious
    conf: 0.95
    attack: T1048
    if:
      type: text
      regex: ([a-z0-9]+\.)?collaborator\.zivyelab\.com\b
composite_rules:
  - id: interact-sh
    desc: interact.sh OOB service
    any:
      - id: interact-sh-me-fun
      - id: interact-sh-pro-live
      - id: interact-sh-online-site

  - id: oob-endpoint-any
    desc: Any OOB callback endpoint
    crit: notable
    conf: 0.9
    any:
      - id: burpcollaborator
      - id: collab-digi-ninja
      - id: interactsh-com
      - id: interact-sh
      - id: pipedream
      - id: pipedream-npm-script
      - id: ngrok-free
      - id: requestbin
      - id: requestcatcher
      - id: hookbin
      - id: httpdump-app
      - id: webhook-site
      - id: webhook-cool
      - id: webhookrelay
      - id: requestrepo
      - id: canarytokens-dup
      - id: canarytokens-com
      - id: beez-buzz
      - id: oastify
      - id: own-sh
      - id: bypass-eu-org
      - id: dnshook-site
      - id: eyes-sh
      - id: zivyelab-collaborator

  # Single-file install/recon beacon: fetch() to a known OOB collaborator host
  # with errors deliberately swallowed so install never fails visibly.
  - id: js-fetch-oob-swallowed-beacon
    desc: JavaScript fetch to OOB with suppressed errors
    crit: hostile
    conf: 0.96
    attack: T1048
    mbc: E1041
    for: [javascript, typescript]
    near_lines: 3
    all:
      - id: micro-behaviors/data/control-flow/error-handling::fetch-empty-catch-handler
      - id: oob-endpoint-any
    unless:
      - id: metadata/package/testing/harness/runtime/

  - id: oob-endpoint-file-exfil
    desc: File read posted to OOB callback endpoint
    crit: hostile
    conf: 0.95
    attack: T1567
    mbc: B0030
    for: [scripts, source]
    # OOB endpoints are exclusively for receiving callbacks (no legitimate API
    # surface). Reading a file and POSTing to one within the same source file
    # is the classic supply-chain exfil chain (e.g. @theguyswithaball color-utils).
    near_lines: 120
    all:
      - id: oob-endpoint-any
      - id: micro-behaviors/fs/file/read::file-content-read-operation
      - id: micro-behaviors/communications/http/post::post
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/tool/detection/security-scanner/
      - id: well-known/tool/detection/llm-scanner/
  - id: js-local-route-oob-post
    desc: Local application route content posted to OOB callback
    crit: hostile
    conf: 0.96
    attack: T1041
    mbc: E1041
    for: [javascript, typescript]
    near_lines: 120
    all:
      - id: oob-endpoint-any
      - id: micro-behaviors/communications/http/url/path::js-relative-route-fetch
      - id: micro-behaviors/communications/http/client/response-body::js-response-text-read
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: micro-behaviors/data/serialize/json::json-stringify-call
    unless:
      - id: metadata/package/testing/harness/runtime/
