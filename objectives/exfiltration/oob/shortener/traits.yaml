defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.8
  for: [scripts, binaries]
traits:
  - id: bitly
    desc: bit.ly URL shortener
    if:
      type: text
      regex: bit\.ly\b
    unless:
      - type: text
        substr: ShareX.UploadersLib
  - id: tinyurl
    desc: tinyurl.com URL shortener
    if:
      type: text
      regex: tinyurl\.com\b
  - id: t-co
    desc: t.co (Twitter) URL shortener
    if:
      type: text
      regex: (?:https?://|//)t\.co/
  - id: rebrandly
    desc: rebrand.ly URL shortener
    if:
      type: text
      regex: rebrand\.ly\b
  - id: buff-ly
    desc: buff.ly URL shortener
    if:
      type: text
      regex: buff\.ly\b
  - id: goo-gl
    desc: goo.gl URL shortener (legacy)
    if:
      type: text
      regex: goo\.gl\b
  - id: ow-ly
    desc: ow.ly URL shortener
    if:
      type: text
      regex: ow\.ly\b
  - id: is-gd
    desc: is.gd URL shortener
    if:
      type: text
      regex: is\.gd\b
    unless:
      - type: text
        substr: ShareX.UploadersLib
  - id: su-pr
    desc: su.pr URL shortener
    if:
      type: text
      regex: su\.pr\b
  - id: bl-ink
    desc: bl.ink URL shortener
    if:
      type: text
      regex: bl\.ink\b
