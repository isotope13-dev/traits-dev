defaults:
  attack: T1041
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: css-js-comment-append
    desc: Appending data to CSS/JS files inside comments
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: 'bootstrap\.min\.css|jquery\.min\.js'
composite_rules:
  - id: web-asset-exfiltration
    desc: Exfiltration via side-channel in web assets
    crit: hostile
    conf: 0.98
    all:
      - id: css-js-comment-append
      - id: micro-behaviors/process/create/subprocess::os-popen-ast
