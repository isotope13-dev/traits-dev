defaults:
  attack: T1041
  platforms:
    - unix
    - windows
  for:
    - python
traits:
  - id: web-asset-filename
    desc: Common web asset filename
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: bootstrap_malicious\.min\.css|jquery\.min\.js
composite_rules:
  - id: web-asset-exfiltration
    desc: Exfiltration via side-channel in web assets
    crit: hostile
    conf: 0.98
    all:
      - id: web-asset-filename
      - id: micro-behaviors/process/create/subprocess::os-popen-ast
