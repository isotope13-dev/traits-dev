defaults:
  platforms: [routeros, appliance, unix]
  for: [java, kotlin, class, jar]
  attack: T1048.003

composite_rules:
  - id: jvm-dns-side-channel-exfil
    desc: JVM DNS side-channel exfil
    crit: hostile
    conf: 0.98
    for: [java, kotlin]
    all:
      - id: micro-behaviors/data/encode/base64::java-base64-encode
      - id: micro-behaviors/communications/dns/lookup/resolver::jvm-inetaddress-getallbyname-source

  - id: jvm-dns-side-channel-bytecode
    desc: JVM DNS side-channel bytecode
    crit: suspicious
    conf: 0.98
    # A JAR pools independent class files. Requiring a single class keeps
    # generic shaded Base64 and DNS-library code from combining into a
    # side-channel finding at archive scope.
    for: [class]
    scope: leaf
    near_bytes: 4096
    all:
      - id: micro-behaviors/data/encode/base64::jvm-base64-encode-bytecode
      - id: objectives/command-and-control/dns/tunneling::jvm-dns-getallbyname
    unless:
      - id: well-known/app/trino::wolfi-trino-plugin-package
      - id: well-known/app/trino::trino-library-path
      - id: metadata/library/structure::vscode-language-server-library
      - id: well-known/app/salesforce-vscode::salesforce-vscode
