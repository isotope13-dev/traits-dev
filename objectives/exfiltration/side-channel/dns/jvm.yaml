defaults:
  platforms: [routeros, appliance, unix]
  for: [java, kotlin, class, jar]
  attack: T1048.003

traits:
  - id: jvm-base64-label-source
    desc: JVM Base64 DNS label source
    crit: suspicious
    conf: 0.91
    for: [java, kotlin]
    if:
      type: text
      regex: 'Base64\.getEncoder\(\)[\s\S]{0,160}encodeToString'

  - id: jvm-base64-label-bytecode
    desc: JVM Base64 encodeToString bytecode
    crit: component
    conf: 0.91
    for: [class, jar]
    if:
      type: raw
      regex: 'getEncoder[\s\S]{0,240}encodeToString'

composite_rules:
  - id: jvm-dns-side-channel-exfil
    desc: JVM DNS side-channel exfil
    crit: hostile
    conf: 0.98
    for: [java, kotlin]
    all:
      - id: jvm-base64-label-source
      - id: micro-behaviors/communications/dns/lookup/resolver::jvm-inetaddress-getallbyname-source

  - id: jvm-dns-side-channel-bytecode
    desc: JVM DNS side-channel bytecode
    crit: suspicious
    conf: 0.98
    for: [class, jar]
    near_bytes: 4096
    all:
      - id: jvm-base64-label-bytecode
      - id: objectives/command-and-control/dns/tunneling::jvm-dns-getallbyname
