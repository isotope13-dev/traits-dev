defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1048

traits:
  - id: qnx-perl-dns-side-channel
    desc: QNX Perl DNS side channel
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: DNS side-channel probe

  - id: qnx-perl-timing-side-channel
    desc: QNX Perl timing side channel
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: timing side-channel completed

  - id: qnx-perl-system-exfil-api
    desc: QNX Perl system exfil API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/exfil/system

composite_rules:
  - id: qnx-perl-multi-side-channel-exfil
    desc: QNX Perl multi side-channel exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-dns-side-channel
      - id: qnx-perl-timing-side-channel
      - id: qnx-perl-system-exfil-api
