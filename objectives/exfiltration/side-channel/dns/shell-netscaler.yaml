defaults:
  platforms: [netscaler, appliance, unix]
  for: [shell]
  attack: T1048.003

traits:
  - id: shell-dns-hex-label-loop
    desc: Shell DNS hex label loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: nslookup "${label}.${TARGET_HOST}"

  - id: shell-dig-exfil-label
    desc: Shell dig exfil label
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: dig +short "${label}.${TARGET_HOST}"

  - id: shell-sandbox-marker-payload
    desc: Shell sandbox marker payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'payload="SANDBOX:[01]:'

composite_rules:
  - id: shell-dns-side-channel-exfil
    desc: Shell DNS side-channel exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-dns-hex-label-loop
      - id: shell-dig-exfil-label
    any:
      - id: shell-sandbox-marker-payload
