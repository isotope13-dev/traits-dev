# DNS Exfiltration Composites
# Detects DNS exfiltration patterns
# ATT&CK: T1048.003 (Exfiltration Over Alternative Protocol: Exfiltration Over Unencrypted/Obfuscated Non-C2 Protocol)
defaults:
  attack: T1048.003
  platforms: [linux, unix, macos, android, ios]
  for: [shell]

traits:
  - id: dns-label-dot-join
    desc: Joins DNS labels with dots
    crit: component
    conf: 0.94
    for: [javascript, typescript]
    platforms: [unix, windows]
    if:
      type: text
      regex: '\]\.join\(\s*["'']\.["'']\s*\)'

composite_rules:
  - id: identity-data-dns-label-assembly
    desc: Builds DNS label from identity data
    crit: component
    conf: 0.96
    for: [javascript, typescript]
    platforms: [unix, windows]
    # Collection and DNS emission may be separated by small helper functions;
    # keep the pair file-local while allowing that normal layout.
    near_bytes: 2048
    all:
      - id: objectives/exfiltration/stealer/host-profile/http::identity-query-fields
      - id: dns-label-dot-join

  - id: dns-exfil-curl-truncation
    desc: DNS exfil via curl with label truncation
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/curl::curl-dynamic-subdomain
      - id: objectives/exfiltration/dns/prep::dns-label-truncation
  - id: dns-exfil-curl-hex
    desc: DNS exfil via curl with hex encoding
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/curl::curl-dynamic-subdomain
      - id: micro-behaviors/data/encode/hex::hex-encode-xxd
  - id: dns-exfil-curl
    desc: Network exfiltration via dynamic DNS subdomains using curl/wget
    crit: hostile
    conf: 0.95
    any:
      - id: objectives/exfiltration/side-channel/dns::dns-exfil-curl-truncation
      - id: objectives/exfiltration/side-channel/dns::dns-exfil-curl-hex
  - id: host-user-identity-dns-beacon
    desc: Host user identity DNS beacon
    crit: hostile
    conf: 0.98
    mbc: E1041
    for: [javascript, typescript]
    platforms: [unix, windows]
    all:
      - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
      - id: micro-behaviors/communications/dns/lookup/resolver::node-dns-lookup
      - id: metadata/library/vscode::vscode-extension-marker
      - id: identity-data-dns-label-assembly
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::gitconfig-file
      - id: micro-behaviors/fs/path/sensitive/credentials::git-repository-config-file
