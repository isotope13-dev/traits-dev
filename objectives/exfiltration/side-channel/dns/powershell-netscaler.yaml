defaults:
  platforms: [netscaler, appliance, windows]
  for: [powershell]
  attack: T1048.003

traits:
  - id: ps-dns-exfil-chunks
    desc: PS DNS exfil chunks
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: ConvertTo-DnsExfilChunks

  - id: ps-dns-exfil-query
    desc: PS DNS exfil query
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\$dnsQuery[\s\S]{0,120}GetHostEntry'

  - id: ps-exfil-http-headers
    desc: PS exfil HTTP headers
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'X-Exfil-(Chunk|Data|Total-Size)'

composite_rules:
  - id: ps-netscaler-dns-side-exfil
    desc: PS NetScaler DNS side exfil
    crit: hostile
    conf: 0.98
    all:
      - id: ps-dns-exfil-chunks
      - id: ps-dns-exfil-query
    any:
      - id: ps-exfil-http-headers
