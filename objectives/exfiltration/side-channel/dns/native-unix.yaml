defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1048.003

composite_rules:
  - id: native-dig-txt-hostprofile-exfil
    desc: Native dig TXT host exfil
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/dns/tools::dig-txt-template
      - id: micro-behaviors/os/sysinfo/hostname::gethostname
      - id: micro-behaviors/process/create/shell/invoke::system-fn

  - id: native-dns-label-side-exfil
    desc: Native DNS label side exfil
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/dns/label::native-byte-subdomain-format
      - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
