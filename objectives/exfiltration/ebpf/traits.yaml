# eBPF Data Exfiltration Structures
# Detects eBPF infrastructure designed for data collection and exfiltration
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [c]
composite_rules:
  # eBPF data exfiltration structure
  # eBPF types + data event struct + kernel transfer = data collection
  - id: ebpf-exfil-struct
    desc: eBPF data exfiltration structures
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/os/bpf/program/loader::ebpf-kernel-types
      - id: micro-behaviors/os/bpf/program/loader::data-event-struct
    any:
      - id: micro-behaviors/os/bpf/program/loader::kernel-userspace-transfer
      - id: micro-behaviors/os/bpf/program/ssl::ssl-op-string
      - id: micro-behaviors/os/bpf/program/ssl::ssl-op-type
