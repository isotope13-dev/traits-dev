defaults:
  platforms:
  - linux
  - macos
  - windows
  - unix
  - android
  - ios
  for:
  - binaries
  - scripts
  - source
  - manifests
  - documents
  - media
  - data
  attack: T1041
  mbc: B0030
traits:
- id: datadog-go-package-text
  desc: Datadog Go package text
  crit: notable
  conf: 0.9
  platforms: [unix, windows]
  for: [elf, go]
  if:
    type: text
    regex: '(?i)github\.com/DataDog'
- id: go-caller-string-byte-payload
  desc: Go string([]byte) conversion idiom
  crit: component
  conf: 0.9
  for: [go]
  platforms: [unix, windows]
  if:
    type: text
    substr: string([]byte
composite_rules:
- id: go-caller-data-http-exfiltration
  desc: Caller-supplied string/byte data exfiltration
  crit: hostile
  conf: 0.96
  for: [go]
  all:
  - id: go-caller-string-byte-payload
  - id: objectives/exfiltration/http/paste-service::go-dpaste-encrypted-form-exfil
- id: go-env-http-exfiltration
  desc: Environment variable exfiltration via HTTP (Go)
  crit: hostile
  conf: 0.95
  all:
  - id: metadata/lang/scripted::env-access
  - id: micro-behaviors/communications/http/post::http-post-methods
  downgrade:
    any:
    - id: metadata/package/testing/
    - id: metadata/signed/platform/
- id: go-file-http-exfiltration
  desc: Sensitive file read and HTTP exfiltration (Go)
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/fs/file/read::read-go
  - id: micro-behaviors/communications/http/post::http-post-methods
  any:
  - id: micro-behaviors/fs/path/sensitive/credentials/
  - id: micro-behaviors/fs/path/sensitive/browser/
  downgrade:
    any:
    - id: metadata/package/testing/
    - id: metadata/signed/platform/
- id: go-sysinfo-http-exfiltration
  desc: System information discovery and HTTP exfiltration (Go)
  crit: hostile
  conf: 0.93
  all:
  - id: objectives/discovery/system/fingerprint/runtime::go-system-info-discovery
  - id: micro-behaviors/communications/http/post::http-post-methods
  downgrade:
    any:
    - id: metadata/package/testing/
    - id: metadata/signed/platform/
- id: go-dns-exfiltration
  desc: DNS lookup near environment or secrets
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/communications/dns/lookup/resolver::dns-lookup
  any:
  - id: metadata/lang/scripted::env-access
  - id: micro-behaviors/fs/path/sensitive/credentials/
  unless:
  # Large binaries (>50MB) are infrastructure tools, not purpose-built exfiltration.
  - id: metadata/binary/metrics/size::massive-executable
  - id: well-known/tool/dual-use/aitun/
  downgrade:
    any:
    - id: metadata/package/testing/
    - id: metadata/signed/platform/
- id: go-socket-exfiltration
  desc: Data exfiltration via raw sockets (Go)
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/socket/connect::socket-dial
  any:
  - id: metadata/lang/scripted::env-access
  - id: micro-behaviors/fs/path/sensitive/credentials/
  - id: objectives/discovery/system/fingerprint/runtime::go-system-info-discovery
  unless:
  - id: micro-behaviors/communications/http/lib/netlib::net-http-import
  # Large binaries (>50MB) are infrastructure tools, not purpose-built exfiltration.
  - id: metadata/binary/metrics/size::massive-executable
  - id: metadata/package/testing/
  - id: well-known/tool/dual-use/aitun/
  - id: well-known/tool/dual-use/frp/
  - id: well-known/tool/sysadmin/alpine-packages/
  - id: well-known/app/lazygit/
  - id: datadog-go-package-text
- id: go-sensitive-data-exfiltration
  desc: Sensitive data exfiltration (Go)
  crit: hostile
  conf: 0.95
  any:
  - id: go-env-http-exfiltration
  - id: go-file-http-exfiltration
  - id: go-sysinfo-http-exfiltration
  - id: go-socket-exfiltration
