defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: browser-identity-upload-fields
    desc: Adds browser identity to upload payload
    crit: notable
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: 'payload\.(userName|userEmail|userMeta)\s*='

  - id: browser-activity-upload-path
    desc: References activity telemetry upload path
    crit: notable
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: /api/activities

composite_rules:
  - id: browser-profile-quiz-http-exfiltration
    desc: Uploads student identity with quiz content
    crit: hostile
    conf: 0.99
    attack: T1041,T1119
    mbc: B0030
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: micro-behaviors/ui/window/manage/dom::student-profile-field-collection
      - id: micro-behaviors/ui/window/manage/dom::textarea-batch-value-collection
      - id: micro-behaviors/data/serialize/json::json-user-content-timestamp-payload
      - id: micro-behaviors/communications/http/url/domain::js-insecure-remote-http-url
      - id: micro-behaviors/communications/http/post::browser-data-upload-channel

  - id: browser-profile-quiz-fallback-exfiltration
    desc: Sends collected quiz data through fallback channels
    crit: hostile
    conf: 0.99
    attack: T1041,T1119
    mbc: B0030
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: micro-behaviors/ui/window/manage/dom::textarea-batch-value-collection
      - id: micro-behaviors/data/serialize/json::json-user-content-timestamp-payload
      - id: micro-behaviors/communications/http/url/domain::js-insecure-remote-http-url
      - id: micro-behaviors/communications/http/upload::browser-multi-channel-upload-fallback

  - id: browser-intercepted-identity-http-exfil
    desc: Exfiltrates identity harvested from browser authentication responses
    crit: hostile
    conf: 0.99
    attack: "T1119,T1041"
    scope: archive
    all:
      - id: objectives/collection/stealer/browser::browser-auth-response-identity-interception
      - id: browser-identity-upload-fields
      - id: browser-activity-upload-path
      - id: micro-behaviors/communications/http/request/client::post-method-text
    unless:
      - id: metadata/package/testing/
