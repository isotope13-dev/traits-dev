defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: browser-identity-upload-fields
    desc: Assigns browser identity fields to an object
    crit: notable
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: 'user(Name|Email|Meta)\s*='

  - id: browser-activity-upload-path
    desc: References activity telemetry upload path
    crit: notable
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: /api/activities

composite_rules:
  - id: course-page-discord-exfiltration
    desc: Course-page content uploaded to Discord
    crit: hostile
    conf: 0.99
    attack: T1119,T1041,T1567.004
    scope: archive
    for: [xpi, crx, zip, archives]
    all:
      - id: objectives/exfiltration/messaging/webhook::discord-exfiltration
      - id: metadata/permission/cookie::permission-cookies
      - id: micro-behaviors/communications/http/post::javascript-formdata-file-field

  - id: browser-profile-quiz-http-exfiltration
    desc: Uploads student identity with quiz content
    crit: hostile
    conf: 0.99
    attack: T1041,T1119
    mbc: B0030
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: micro-behaviors/ui/window/manage/dom::student-learner-dom-selector-collection
      - id: micro-behaviors/ui/window/manage/dom::textarea-batch-value-collection
      - id: micro-behaviors/data/serialize/json::json-user-content-timestamp-payload
      - id: micro-behaviors/communications/http/url/domain::js-insecure-remote-http-url
      - id: micro-behaviors/communications/http/request/client::browser-http-request-channel

  - id: browser-profile-quiz-fallback-exfiltration
    desc: Sends collected quiz data through fallback channels
    crit: hostile
    conf: 0.99
    attack: T1041,T1119
    mbc: B0030
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: micro-behaviors/ui/window/manage/dom::textarea-batch-value-collection
      - id: micro-behaviors/data/serialize/json::json-user-content-timestamp-payload
      - id: micro-behaviors/communications/http/url/domain::js-insecure-remote-http-url
      - id: micro-behaviors/communications/http/upload::browser-multi-channel-upload-fallback

  - id: browser-intercepted-identity-http-exfil
    desc: Exfiltrates identity harvested from browser authentication responses
    crit: hostile
    conf: 0.99
    attack: "T1119,T1041"
    scope: archive
    all:
      - id: objectives/collection/stealer/browser::browser-auth-response-identity-interception
      - id: browser-identity-upload-fields
      - id: browser-activity-upload-path
      - id: micro-behaviors/communications/http/request/client::post-method-text
    unless:
      - id: metadata/package/testing/

  - id: browser-response-identity-http-exfil-file
    desc: Exfiltrates identity from hooked browser responses
    crit: hostile
    conf: 0.99
    attack: "T1119,T1041"
    scope: file
    all:
      - id: micro-behaviors/process/hook/xhr::fetch-hook
      - id: micro-behaviors/communications/http/client/response-body::js-response-text-read
      - id: browser-identity-upload-fields
      - id: browser-activity-upload-path
      - id: micro-behaviors/communications/http/request/client::post-method-text
    unless:
      - id: metadata/package/testing/

  - id: browser-auth-token-response-http-exfil-file
    desc: Exfiltrates identity while scanning browser token stores
    crit: hostile
    conf: 0.99
    attack: "T1119,T1041"
    scope: file
    all:
      - id: micro-behaviors/communications/http/oauth::access-token
      - id: micro-behaviors/process/hook/xhr::fetch-hook
      - id: micro-behaviors/communications/http/client/response-body::js-response-text-read
      - id: browser-identity-upload-fields
      - id: browser-activity-upload-path
      - id: micro-behaviors/communications/http/request/client::post-method-text
    unless:
      - id: metadata/package/testing/

  - id: browser-auth-storage-identity-http-exfil
    desc: Exfiltrates identity harvested from browser auth stores
    crit: hostile
    conf: 0.99
    attack: "T1119,T1041"
    all:
      - id: objectives/collection/stealer/browser::browser-auth-storage-identity-scan
      - id: browser-identity-upload-fields
      - id: browser-activity-upload-path
      - id: micro-behaviors/communications/http/request/client::post-method-text
    unless:
      - id: metadata/package/testing/
