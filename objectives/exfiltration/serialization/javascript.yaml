# Data Serialization - JavaScript/Node.js
# Detects serialization of sensitive data before exfiltration
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
composite_rules:
  # GuardDog: JSON-serialized environment
  - id: js-serialize-environment
    desc: Environment variables serialized as JSON (JS)
    crit: suspicious
    conf: 0.90
    all:
      - id: micro-behaviors/os/env/access::javascript
      - id: micro-behaviors/data/serialize/json::process-env-json-stringify
    unless:
      - id: well-known/app/vscode-marketplace::dev-session-canvas-vsix
      - id: well-known/app/vscode-marketplace::dev-session-canvas-member-path
      - id: well-known/app/kombai::kombai-extension-runtime-context
    downgrade:
      any:
        - id: objectives/supply-chain/trojanized/app/package::github-actions-automation-script
