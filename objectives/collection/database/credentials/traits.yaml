defaults:
  platforms: [unix, windows]
  for: [php, c, cpp, python, shell]
  attack: T1552
traits:
  - id: database-config-targeting-sql
    desc: Targets SQL configuration files
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(my\.cnf|php-fpm\.conf)'
    unless:
      - id: well-known/tool/offensive/payload-corpus/
  - id: database-config-targeting-www
    desc: Targets Web configuration files
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(www\.conf|wp-config\.php)'
    unless:
      - type: text
        regex: 'WP_DEBUG.{0,120}wp-config\.php'
      - type: text
        regex: 'AUTH_KEY.{0,240}wp-config\.php|wp-config\.php.{0,240}AUTH_KEY'
composite_rules:
  - id: database-config-targeting-any
    desc: Targets any database configuration file
    crit: component
    conf: 0.8
    any:
      - id: database-config-targeting-sql
      - id: database-config-targeting-www
  - id: database-credential-harvesting
    desc: Harvesting database credentials
    crit: hostile
    conf: 0.95
    all:
      - id: database-config-targeting-any
      - id: micro-behaviors/data/db/config::multiple-database-credential-keys
    unless:
      - id: micro-behaviors/crypto/library/blockchain/
      - id: well-known/lib/deb-package/
      - id: well-known/app/civicrm/
      - id: well-known/tool/offensive/sic-security/
