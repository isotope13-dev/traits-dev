defaults:
  platforms: [unix, windows]
  for: [php, c, cpp, python, shell]
  attack: T1552
composite_rules:
  - id: database-credential-harvesting
    desc: Harvesting database credentials
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/path/config/web::database-config-path
      - id: micro-behaviors/data/db/config::multiple-database-credential-keys
    # A config-path mention and credential-shaped prose are common in web
    # plugin documentation. Credential harvesting needs these signals close
    # together in the same source region; distant documentation sections do
    # not establish a read or collection operation.
    near_bytes: 4096
    unless:
      - id: micro-behaviors/crypto/library/blockchain/
      - id: well-known/lib/deb-package/
      - id: well-known/app/civicrm/
      - id: well-known/tool/offensive/sic-security/
      - id: well-known/tool/development/charm-tools::charm-tools-test-layer-path
      - id: well-known/app/wordpress-plugins::wordpress-maintenance-plugin
      - id: metadata/library/runtime::upstream-php-source
      - id: micro-behaviors/data/db/mysql::pymysql
      - id: well-known/lib/pymysql::pymysql-package-path
