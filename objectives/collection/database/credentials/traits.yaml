defaults:
  platforms: [unix, windows]
  for: [php, c, cpp, python, shell]
  attack: T1552
traits:
  - id: database-config-targeting-sql
    desc: Targets SQL configuration files
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(my\.cnf|php-fpm\.conf)'
    unless:
      - id: micro-behaviors/data/text/security/payload-corpus::pentest-payload-corpus
  - id: database-config-targeting-www
    desc: Targets Web configuration files
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(www\.conf|wp-config\.php)'
    unless:
      - type: text
        regex: 'WP_DEBUG.{0,120}wp-config\.php'
  - id: database-credential-patterns-host
    desc: Database host config key (db=, database:)
    crit: component
    conf: 0.85
    if:
      type: string_literal
      # ':[^:]' rejects the '::' scope/namespace operator (Rust/C++ paths,
      # AUR "name::source" VCS prefixes) so "prjoxide-db::git+url" is not a hit.
      regex: '(?i)(db|database|mysql)\s*(=|:[^:])'
  - id: database-credential-patterns-user
    desc: Regex for database users
    # 'host'/'user' are generic enough to match benign log lines
    # (e.g. "SMTP Host:"); only meaningful inside the needs:2 harvesting
    # composite, so keep this a component-level signal, not standalone-suspicious.
    crit: component
    conf: 0.85
    if:
      type: string_literal
      regex: '(?i)(postgres|pgsql|host|user)\s*[=:]'
  - id: database-credential-patterns-pass
    desc: Regex for database passwords
    crit: component
    conf: 0.85
    if:
      type: string_literal
      regex: '(?i)(pass|password|passwd)\s*[=:]'
  - id: database-credential-patterns-secret
    desc: Regex for database secrets
    crit: component
    conf: 0.85
    if:
      type: string_literal
      regex: '(?i)(secret|key|dsn|connection)\s*[=:]'
composite_rules:
  - id: database-config-targeting-any
    desc: Targets any database configuration file
    crit: component
    conf: 0.8
    any:
      - id: database-config-targeting-sql
      - id: database-config-targeting-www
  - id: database-credential-patterns-any
    desc: Mentions multiple database credential fields
    crit: component
    conf: 0.9
    any:
      - id: database-credential-patterns-host
      - id: database-credential-patterns-user
      - id: database-credential-patterns-pass
      - id: database-credential-patterns-secret
    needs: 2
  - id: database-credential-harvesting
    desc: Harvesting database credentials
    crit: hostile
    conf: 0.95
    all:
      - id: database-config-targeting-any
      - id: database-credential-patterns-any
    unless:
      - id: micro-behaviors/crypto/library/blockchain::crypto-exchange-sdk-benign-context
