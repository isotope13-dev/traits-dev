defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1005
composite_rules:
  - id: wordpress-commerce-order-profiling
    desc: WordPress commerce order profiling
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/data/text/keywords/wordpress::woocommerce-order-summary-fields
    any:
      - id: objectives/anti-static/obfuscation/string/array::php-escaped-string-table-obfuscation
      - id: micro-behaviors/os/stdio::error-suppress-prefix
      - id: objectives/anti-static/obfuscation/code-metrics::php-webshell-pattern
