# Collection - Database Access
# ATT&CK: T1005 (Data from Local System)
defaults:
  attack: T1005
  for: [scripts, binaries]
  platforms: [linux, unix, windows, macos, ios, android]
traits:
  # === Atomic: SQLite ===
  - id: sqlite-dup
    desc: SQLite database access
    crit: notable
    conf: 0.7
    platforms: [unix, windows]
    if:
      id: micro-behaviors/data/db/conn/sqlite::sqlite
      # === Atomic: MySQL ===
  - id: mysql-dup
    desc: MySQL database access
    crit: notable
    conf: 0.7
    platforms: [unix, windows]
    if:
      id: micro-behaviors/data/db/conn/mysql::mysql
      # === Atomic: LevelDB ===
  - id: leveldb
    desc: LevelDB database access
    crit: notable
    conf: 0.7
    platforms: [unix, windows]
    if:
      type: string_value
      regex: "\\b[Ll]evel[Dd][Bb]\\b"
    not:
      - regex: "disabled-by-default-memory-infra"
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation::chromium-junk-strings
  - id: postgresql-dup
    desc: PostgreSQL database access
    crit: notable
    conf: 0.7
    platforms: [unix, windows]
    if:
      id: micro-behaviors/data/db/conn/postgresql::postgresql
