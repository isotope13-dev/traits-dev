defaults:
  attack: T1005
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: sqlite-dup
    desc: SQLite database access
    crit: notable
    conf: 0.7
    platforms:
      - unix
      - windows
    if:
      id: micro-behaviors/data/db/conn/sqlite::sqlite
  - id: mysql-dup
    desc: MySQL database access
    crit: notable
    conf: 0.7
    platforms:
      - unix
      - windows
    if:
      id: micro-behaviors/data/db/conn/mysql::mysql
  - id: leveldb
    desc: LevelDB database access
    crit: notable
    conf: 0.7
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: \b[Ll]evel[Dd][Bb]\b
    not:
      - regex: disabled-by-default-memory-infra
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/legacy::chromium-junk-strings
  - id: postgresql-dup
    desc: PostgreSQL database access
    crit: notable
    conf: 0.7
    platforms:
      - unix
      - windows
    if:
      id: micro-behaviors/data/db/conn/postgresql::postgresql
