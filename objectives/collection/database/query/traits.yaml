defaults:
  attack: T1005
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: database-indexing-endpoints
    desc: Database context indexing endpoints
    crit: notable
    conf: 0.9
    platforms: [unix, windows]
    for: [javascript, typescript]
    if:
      type: text
      regex: /indexing/(instance|database|tables|questions)
  - id: metabase-question-indexing-endpoint
    desc: Metabase question indexing endpoint
    crit: notable
    conf: 0.92
    platforms: [unix, windows]
    for: [javascript, typescript]
    if:
      type: text
      substr: /indexing/questions
  - id: metabase-schema-indexing-endpoints
    desc: Metabase schema indexing endpoints
    crit: notable
    conf: 0.92
    platforms: [unix, windows]
    for: [javascript, typescript]
    if:
      type: text
      regex: /indexing/(instance|database|tables)
  - id: mysql-dup
    desc: MySQL database access
    crit: notable
    conf: 0.7
    platforms:
      - unix
      - windows
    if:
      id: micro-behaviors/data/db/mysql::mysql
  - id: leveldb
    desc: LevelDB database access
    crit: notable
    conf: 0.7
    platforms:
      - unix
      - windows
    if:
      type: text
      regex: \b[Ll]evel[Dd][Bb]\b
    not:
      - regex: disabled-by-default-memory-infra
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/string/junking/
    unless:
      - id: well-known/lib/electron::electron-chromium-runtime-strong
  - id: postgresql-dup
    desc: PostgreSQL database access
    crit: notable
    conf: 0.7
    platforms:
      - unix
      - windows
    if:
      id: micro-behaviors/data/db/postgresql
    unless:
      - id: micro-behaviors/data/db/postgresql::psql-command
      - id: well-known/app/terraform::terraform-core-binary

  # rusty-leveldb is a pure-Rust LevelDB reimplementation. Malware authors embed it to
  # avoid importing libleveldb.dll and to statically access Electron app Local Storage
  # without raising DLL-load-based detection. Rarely seen in legitimate Windows binaries.
  - id: rusty-leveldb-crate
    desc: 'rusty-leveldb Rust crate embedded'
    crit: suspicious
    conf: 0.88
    platforms: [windows, linux, macos]
    for: [binaries]
    if:
      type: text
      regex: rusty-leveldb-[0-9]
    not:
      - regex: (?i)(test|example|demo|sample|poc)

composite_rules:
  - id: ai-sql-assistant-editor-bridge
    desc: AI SQL assistant editor bridge
    crit: notable
    conf: 0.9
    scope: archive
    platforms: [unix, windows]
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/data/db/sql::ai-sql-generation-api-client
    any:
      - id: micro-behaviors/data/db/sql::metabase-ace-editor-bridge
      - id: micro-behaviors/data/db/sql::pgadmin-codemirror-editor-bridge
  - id: browser-extension-database-context-indexing
    desc: Browser extension indexes database context
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [javascript, typescript]
    all:
      - id: database-indexing-endpoints
      - id: micro-behaviors/communications/http/request/credentials::fetch-credentials-include
    any:
      - id: micro-behaviors/data/db/sql::metabase-api-schema-client
      - id: micro-behaviors/data/db/sql::metabase-card-sql-client
      - id: micro-behaviors/data/db/schema/introspection::pgadmin-query-tool-schema-poll
  - id: metabase-saved-question-indexing
    desc: Metabase saved questions indexed remotely
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [javascript, typescript]
    all:
      - id: metabase-question-indexing-endpoint
      - id: micro-behaviors/data/db/sql::metabase-card-sql-client
      - id: micro-behaviors/communications/http/request/credentials::fetch-credentials-include
  - id: pgadmin-schema-introspection-extension
    desc: Browser extension introspects pgAdmin schema
    crit: notable
    conf: 0.9
    scope: archive
    platforms: [unix, windows]
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/data/db/sql::pgadmin-codemirror-editor-bridge
      - id: micro-behaviors/data/db/schema/introspection::pgadmin-query-tool-schema-poll
  # Rust binary + embedded rusty-leveldb + Local Storage path = Electron token stealer
  - id: rust-leveldb-electron-stealer
    desc: Rust binary using rusty-leveldb to access Electron Local Storage
    crit: suspicious
    conf: 0.9
    attack: T1539
    mbc: B0028
    all:
      - id: rusty-leveldb-crate
    any:
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
      - id: micro-behaviors/fs/path/sensitive/browser::local-storage-ref
      - id: objectives/credential-access/messaging/electron::yandex-music-leveldb
