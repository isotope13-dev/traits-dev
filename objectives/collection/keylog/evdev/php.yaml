defaults:
  platforms: [unix]
  for: [php]
  attack: T1056.001

traits:
  - id: php-dev-input-events
    desc: PHP reads evdev event devices
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /dev/input/event*

  - id: php-ev-key-unpack
    desc: PHP unpacks EV_KEY frames
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "unpack\\('Jtv_sec/Jtv_usec/Stype/Scode/lvalue'"

  - id: php-keylog-file-write
    desc: PHP writes keylog records
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "code=%d char='%s'"

composite_rules:
  - id: php-evdev-keylogger
    desc: PHP evdev keylogger
    crit: hostile
    conf: 0.98
    all:
      - id: php-dev-input-events
      - id: php-ev-key-unpack
      - id: php-keylog-file-write
