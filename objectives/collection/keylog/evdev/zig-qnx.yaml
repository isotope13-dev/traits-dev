defaults:
  platforms: [qnx, unix]
  for: [zig]
  attack: T1056.001

traits:
  - id: qnx-zig-keyboard-device-list
    desc: QNX Zig keyboard device list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/dev/input/keyboard[\s\S]{0,120}/dev/io-pkt-stm'

  - id: qnx-zig-keylog-buffer
    desc: QNX Zig keylog buffer
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: KEYLOG_BUF_SIZE

  - id: qnx-zig-keylog-c2-send
    desc: QNX Zig keylog C2 send
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'flush_keylog[\s\S]{0,260}libc\.send'

composite_rules:
  - id: qnx-zig-keylog-c2-stream
    desc: QNX Zig keylog C2 stream
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-zig-keyboard-device-list
      - id: qnx-zig-keylog-buffer
      - id: qnx-zig-keylog-c2-send
