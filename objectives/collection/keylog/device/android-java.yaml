defaults:
  platforms: [android]
  for: [java]
  attack: T1056.001
  mbc: F0006

traits:
  - id: android-keylogger-db-name
    desc: Android keylogger database name
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: keyLOGgerDB
  - id: android-appwise-keyevents-table
    desc: Android appwise key events table
    crit: notable
    conf: 0.88
    if:
      type: literal
      exact: Appwise_KeyEvents
  - id: android-saved-keyevents-table
    desc: Android saved key events table
    crit: notable
    conf: 0.88
    if:
      type: literal
      exact: Saved_Appwise_KeyEvents
  - id: android-typedtext-column
    desc: Android typed text column source
    crit: notable
    conf: 0.88
    if:
      type: literal
      exact: TypedText

composite_rules:
  - id: android-keyevents-table
    desc: Android key events table source
    crit: notable
    conf: 0.88
    any:
      - id: android-appwise-keyevents-table
      - id: android-saved-keyevents-table
  - id: android-keylogger-typed-text-store
    desc: Android keylogger typed text store
    crit: suspicious
    conf: 0.95
    all:
      - id: android-keylogger-db-name
      - id: android-keyevents-table
      - id: android-typedtext-column
