defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1056.001

traits:
  - id: native-dev-kbd-path
    desc: Native /dev/kbd path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /dev/kbd

  - id: native-hex-dev-kbd-path
    desc: Hex encoded /dev/kbd path
    crit: suspicious
    conf: 0.92
    for: [c, cpp, objc]
    if:
      type: text
      substr: 2f6465762f6b6264

composite_rules:
  - id: native-dev-kbd-keylogger
    desc: Native /dev/kbd keylogger
    crit: hostile
    conf: 0.98
    all:
      - id: native-dev-kbd-path
      - id: micro-behaviors/fs/file/read::read

  - id: native-hex-dev-kbd-keylogger
    desc: Hex /dev/kbd keylogger
    crit: hostile
    conf: 0.98
    for: [c, cpp, objc]
    all:
      - id: native-hex-dev-kbd-path
      - id: micro-behaviors/fs/file/open::open-o-nonblock-source
      - id: micro-behaviors/fs/file/open::open-o-nonblock-source
