defaults:
  platforms: [unix]
  for: [c, cpp]

traits:
- id: lkm-keyboard-header
  desc: LKM includes keyboard API
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: '#include<linux/keyboard.h>'

- id: lkm-key-notifier-param
  desc: LKM keyboard notifier param
  crit: suspicious
  conf: 0.93
  if:
    type: text
    word: "keyboard_notifier_param"
  unless:
    - id: well-known/tool/detection/cilium-tetragon::source-path
    - type: path
      dirname: true
      regex: '(^|[\\/])(bindings?|generated|net_gen)([\\/]|$)'
    - id: metadata/file/string/file::linux-vmlinux-header-basename
    - type: text
      regex: 'Automatically generated|bindgen|Code generated'

- id: lkm-register-keyboard-notifier
  desc: LKM registers key notifier
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: "register_keyboard_notifier"

- id: lkm-unregister-keyboard-notifier
  desc: LKM unregisters key notifier
  crit: component
  conf: 0.9
  if:
    type: text
    word: "unregister_keyboard_notifier"

- id: lkm-keycode-event-gate
  desc: LKM gates keycodes
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'kcode == KBD_KEYCODE'

- id: lkm-key-buffer-ring
  desc: LKM stores key buffer
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'char keyBuffer'

- id: lkm-key-map-arrays
  desc: LKM key map arrays
  crit: component
  conf: 0.93
  if:
    type: text
    regex: 'keys(Shift)?\[\]'
  unless:
    - id: well-known/app/obs-studio
    - id: well-known/app/openssl/
    - id: well-known/lib/ggml
    - id: well-known/lib/hpc
    - id: well-known/lib/benign-runtime-bundles::php-source-tree
    - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
    - id: well-known/app/telegram::telegram-desktop-third-party-source
    - id: well-known/app/openvpn::openvpn-source-tree
    - type: text
      substr: uct_rkeys

- id: lkm-copy-keys-to-user
  desc: LKM exposes key buffer
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'copy_to_user(buf, keyBuffer'

- id: lkm-keylog-chardev
  desc: LKM keylog char device
  crit: suspicious
  conf: 0.93
  if:
    type: text
    word: "register_chrdev"

- id: shell-mknod-keylog-device
  desc: Shell creates keylog device
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'mknod /dev/$ARG1 c'

composite_rules:
- id: lkm-keyboard-notifier-capture
  desc: LKM keyboard notifier capture
  crit: hostile
  conf: 0.98
  attack: T1056.001
  mbc: F0002
  all:
  - id: lkm-keyboard-header
  - id: lkm-key-notifier-param
  - id: lkm-register-keyboard-notifier
  - id: lkm-unregister-keyboard-notifier
  - id: lkm-keycode-event-gate
  - id: lkm-key-buffer-ring
  - id: lkm-key-map-arrays
  - id: lkm-copy-keys-to-user
  - id: lkm-keylog-chardev
