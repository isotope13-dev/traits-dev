defaults:
  platforms: [unix]
  for: [c, cpp]

traits:
- id: lkm-keyboard-header
  desc: LKM includes keyboard API
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: '#include<linux/keyboard.h>'

# The bare keyboard-notifier registration and its param struct are neutral
# kernel callback capabilities (the in-tree speakup screen reader registers on
# the same chain), so they live in micro-behaviors/os/kernel/callback/ at
# notable. They previously sat here at suspicious and convicted in-tree drivers
# on their own; the keylogging intent is asserted by the composite below, which
# additionally requires keycode gating, key maps and copy_to_user.

- id: lkm-keycode-event-gate
  desc: LKM gates keycodes
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'kcode == KBD_KEYCODE'

- id: lkm-key-map-arrays
  desc: LKM key map arrays
  crit: component
  conf: 0.93
  if:
    type: text
    regex: 'keys(Shift)?\[\]'
  unless:
    - id: well-known/app/obs-studio
    - id: well-known/app/openssl/
    - id: well-known/lib/ggml
    - id: well-known/lib/hpc
    - id: well-known/lib/benign-runtime-bundles::php-source-tree
    - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
    - id: well-known/app/telegram::telegram-desktop-third-party-source
    - id: well-known/app/openvpn::openvpn-source-tree
    - type: text
      substr: uct_rkeys

- id: lkm-copy-keys-to-user
  desc: LKM exposes key buffer
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'copy_to_user(buf, keyBuffer'

- id: shell-mknod-keylog-device
  desc: Shell creates keylog device
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'mknod /dev/$ARG1 c'

composite_rules:
- id: lkm-keyboard-notifier-capture
  desc: LKM keyboard notifier capture
  crit: hostile
  conf: 0.98
  attack: T1056.001
  mbc: F0002
  all:
  - id: lkm-keyboard-header
  - id: micro-behaviors/os/kernel/callback::keyboard-notifier-param-struct
  - id: micro-behaviors/os/kernel/callback::keyboard-notifier-register
  - id: micro-behaviors/os/kernel/callback::keyboard-notifier-unregister
  - id: lkm-keycode-event-gate
  - id: lkm-key-map-arrays
  - id: lkm-copy-keys-to-user
  - id: micro-behaviors/os/kernel/device::linux-register-chrdev
