# Terminal credential keylogging via echo suppression. A binary that reads the
# terminal attributes, disables echo (tcgetattr + tcsetattr) to silently capture
# a typed secret, and persists it to a credential log file. Echo toggling alone
# is normal for any password prompt; the credential-log write is the malicious
# differentiator, so the hostile composite is gated on it.
defaults:
  platforms: [linux, macos]
  for: [elf, macho]
  attack: T1056.001
composite_rules:
  - id: terminal-echo-credential-keylog
    desc: Disables echo and logs captured password
    crit: hostile
    conf: 0.92
    mbc: B0042
    all:
      - id: micro-behaviors/process/tty/pty::tcgetattr
      - id: micro-behaviors/process/tty/pty::tcsetattr
      - id: objectives/exfiltration/stealer/credential/sudo-log::credential-log-filename
    # Keep terminal-control imports tied to a nearby credential-log use.
    # Large native CLIs can embed documentation mentioning /var/log/auth.log
    # while using tcgetattr/tcsetattr only for an ordinary password prompt.
    near_bytes: 65536
    unless:
      - id: well-known/app/delegate::delegate-known-proxy-context
