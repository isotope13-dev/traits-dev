defaults:
  platforms: [unix]
  for: [shell]
  attack: T1056.001

traits:
  - id: shell-terminal-raw-keycap
    desc: Shell terminal raw keycap
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: stty -echo raw -icanon

  - id: shell-tty-byte-capture
    desc: Shell tty byte capture
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'dd if="\$\{?tty_dev\}?" bs=1 count='

  - id: shell-keylog-file-marker
    desc: Shell keylog file marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(KEYLOG_FILE|LOGFILE)=.{0,80}(keylog|input)\.'

composite_rules:
  - id: shell-terminal-keylogger
    desc: Shell terminal keylogger
    crit: hostile
    conf: 0.98
    all:
      - id: shell-terminal-raw-keycap
      - id: shell-tty-byte-capture
      - id: shell-keylog-file-marker
