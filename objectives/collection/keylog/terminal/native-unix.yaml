defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1056.001

traits:
  - id: native-termios-raw-mode
    desc: Native termios raw mode
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'tcgetattr[\s\S]{0,220}tcsetattr[\s\S]{0,180}(ICANON|ECHO)'

  - id: native-stdin-byte-read
    desc: Native stdin byte read
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'read\s*\(\s*(STDIN_FILENO|0)\s*,[\s\S]{0,80},\s*1\s*\)'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
composite_rules:
  - id: native-terminal-raw-capture
    desc: Native terminal raw capture
    crit: component
    conf: 0.97
    # The bare termios symbol trio (ttyname + tcgetattr + tcsetattr/cfmakeraw) is
    # just interactive terminal control — every shell, editor, pager, and login
    # tool (bash, less, gpg, tset, sg, su) has it, so it is a pure false positive.
    # Genuine keylog capture is the raw-mode *disable* plus a single-byte stdin
    # read loop, which the two atoms below detect; require both.
    all:
      - id: native-termios-raw-mode
      - id: native-stdin-byte-read
