defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1056.001

traits:
  - id: native-terminal-raw-mode-apis
    desc: Native terminal raw-mode APIs
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\b(cfmakeraw|tcsetattr)\b'

composite_rules:
  - id: native-terminal-raw-capture
    desc: Native terminal raw capture
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/process/tty/terminal::ttyname
      - id: micro-behaviors/process/tty/pty::tcgetattr
      - id: native-terminal-raw-mode-apis
