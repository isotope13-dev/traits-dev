defaults:
  platforms: [openbsd, bsd, unix]
  for: [lua]
  attack: T1056.001

traits:
  - id: lua-kbdmux-raw-mode
    desc: Lua reads kbdmux raw mode
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: KBDMODE_RAW

  - id: lua-kbdmux-device
    desc: Lua opens kbdmux device
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /dev/kbdmux

  - id: lua-tty-keylog-capture
    desc: Lua TTY keylog capture
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: stty -echo -icanon

  - id: lua-keylog-data-file
    desc: Lua keylog data file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.keylog_data

composite_rules:
  - id: lua-openbsd-kbdmux-keylogger
    desc: Lua OpenBSD kbdmux keylogger
    crit: hostile
    conf: 0.98
    all:
      - id: lua-kbdmux-raw-mode
      - id: lua-kbdmux-device

  - id: lua-openbsd-tty-keylogger
    desc: Lua OpenBSD TTY keylogger
    crit: hostile
    conf: 0.98
    all:
      - id: lua-tty-keylog-capture
      - id: lua-keylog-data-file

