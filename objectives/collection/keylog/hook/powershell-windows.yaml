defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1056.001
  mbc: E1056.001

traits:
  - id: ps-addtype-setwindowshookex
    desc: PowerShell compiles keyboard hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Add-Type[\s\S]{0,900}SetWindowsHookEx'

  - id: ps-keylog-file-append
    desc: PowerShell appends captured keys
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'KBDLLHOOKSTRUCT[\s\S]{0,700}File\.AppendAllText'

composite_rules:
  - id: ps-inline-csharp-keylogger
    desc: PowerShell inline C# keylogger
    crit: hostile
    conf: 0.98
    all:
      - id: ps-addtype-setwindowshookex
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-low-level-keyboard-hook-const
      - id: ps-keylog-file-append
