defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056.001
  mbc: E1056.001
composite_rules:
- id: windows-dll-keyboard-hook-lifecycle
  desc: Windows DLL keyboard hook lifecycle
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
  - id: micro-behaviors/hardware/input/keyboard/hook::hookon-hookoff-export-pair
  unless:
  - id: metadata/signed/platform/
- id: windows-hook-ipc-keylogger-component
  desc: Windows keyboard hook IPC keylogger component
  crit: hostile
  conf: 0.94
  all:
  - id: windows-dll-keyboard-hook-lifecycle
  - id: micro-behaviors/communications/ipc/file-mapping::open-file-mapping-a
  - id: metadata/binary/metrics/structural::minimal-exports
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
- id: windows-hook-registry-persistence-keylogger
  desc: Keyboard hook with registry and process control
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::low-level-windows-keyboard-hook
  - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
  - id: micro-behaviors/process/terminate/kill::terminate-process
  any:
  - id: objectives/anti-analysis/sandbox-detect/tool-references::user-interaction-trigger-cluster
  - id: micro-behaviors/hardware/input/keyboard/hook::foreground-window-input-state
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  - id: micro-behaviors/hardware/display/screen::get-desktop-window
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
  - id: well-known/tool/sysadmin/sandboxie/
  - id: micro-behaviors/ui/framework/imgui/
  - id: well-known/app/
  - id: well-known/lib/benign-runtime-bundles/
  - id: well-known/lib/electron::electron-chromium-runtime-strong
- id: windows-hook-foreground-registry-capture
  desc: Low-level keyboard hook with foreground-window and registry activity
  crit: notable
  conf: 0.94
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::low-level-windows-keyboard-hook
  - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/os/registry/access::registry-set-value-api
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::get-cursor-pos
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  - id: micro-behaviors/hardware/display/screen::get-desktop-window
  - id: objectives/anti-analysis/sandbox-detect/tool-references::user-interaction-trigger-cluster
  needs: 2
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
  - id: well-known/tool/sysadmin/sandboxie/
  - id: micro-behaviors/ui/framework/imgui/
  - id: well-known/app/winscp/
  - id: well-known/tool/sysadmin/conemu/
  - id: well-known/app/telegram::telegram-desktop-product-identity
  - id: well-known/lib/benign-runtime-bundles/
  - id: well-known/lib/electron::electron-chromium-runtime-strong
- id: windows-hook-clipboard-screen-surveillance
  desc: Windows hook collects clipboard and screen
  crit: hostile
  conf: 0.97
  ref: sha256:f3e35b270f7b8aba8f24e4a97711e33d3ae748a5ad994c098513acfe7a9e4dc0
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
  - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
  - id: micro-behaviors/os/clipboard/access::get-clipboard-data
  any:
  - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
  - id: micro-behaviors/hardware/display/screen::gdi-bitmap-transfer-primitives
  - id: objectives/collection/screenshot/capture::gdi-window-capture
  needs: 1
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/lib/jvm/
  - id: well-known/lib/swt::windows-native-library
  - id: objectives/collection/keylog/capture::known-gui-runtime-input-exception
  - id: metadata/binary/installer/family/
