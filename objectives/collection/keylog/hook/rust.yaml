defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1056.001
  mbc: B0015
traits:
  - id: windows-lowlevel-keyboard-hook-api
    desc: Windows low-level keyboard hook API
    crit: component
    conf: 0.9
    if:
      type: text
      substr: SetWindowsHookExW
  - id: unix-input-devices-proc
    desc: Unix input device registry access
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /proc/bus/input/devices
  - id: unix-evdev-input-path
    desc: Unix evdev keyboard path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /dev/input/event
  - id: rust-dev-input-dir
    desc: Rust reads input device dir
    crit: component
    conf: 0.9
    platforms: [unix]
    if:
      type: text
      substr: '"/dev/input"'
  - id: rust-event-device-filter
    desc: Rust filters event devices
    crit: component
    conf: 0.9
    platforms: [unix]
    if:
      type: text
      substr: 'starts_with("event")'
  - id: macos-cgevent-tap-create
    desc: macOS CGEvent tap creation
    crit: component
    conf: 0.9
    if:
      type: text
      substr: CGEvent.tapCreate
  - id: macos-swiftc-eventtap-helper
    desc: Compiles Swift event tap helper
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'Command::new("swiftc")'
  - id: keylog-window-header-format
    desc: Keylog window header format string
    crit: component
    conf: 0.92
    if:
      type: text
      substr: '=== {} ==='
  - id: randomized-log-filename-format
    desc: Randomized .log filename format string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "{}.log"
  - id: rust-foreground-window-api
    desc: Rust foreground window API usage
    crit: component
    conf: 0.86
    if:
      type: symbol
      exact: GetForegroundWindow
  - id: rust-window-title-api
    desc: Rust window title API usage
    crit: component
    conf: 0.86
    if:
      type: symbol
      exact: GetWindowTextW
  - id: rust-window-title-length-api
    desc: Rust window title length API usage
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: GetWindowTextLengthW
composite_rules:
  - id: rust-windows-lowlevel-keylogger
    desc: Rust Windows low-level hook keylogger
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
    any:
      - id: windows-lowlevel-keyboard-hook-api
      - id: keylog-window-header-format
      - id: rust-foreground-window-api
      - id: rust-window-title-api
    needs: 2
  - id: rust-unix-evdev-proc-keylogger
    desc: Rust Unix evdev proc keylogger
    crit: suspicious
    conf: 0.95
    all:
      - id: unix-input-devices-proc
      - id: unix-evdev-input-path
  - id: rust-evdev-dir-event-scan
    desc: Rust evdev event directory scan
    crit: suspicious
    conf: 0.95
    all:
      - id: rust-dev-input-dir
      - id: rust-event-device-filter
  - id: rust-unix-evdev-keylogger
    desc: Rust Unix evdev keylogger
    crit: suspicious
    conf: 0.95
    any:
      - id: rust-evdev-dir-event-scan
      - id: rust-unix-evdev-proc-keylogger
  - id: rust-macos-eventtap-keylogger
    desc: Rust macOS event tap keylogger
    crit: suspicious
    conf: 0.95
    all:
      - id: macos-cgevent-tap-create
      - id: macos-swiftc-eventtap-helper
  - id: rust-windows-window-title-keylogger
    desc: Rust keylogger with active window titles
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
      - id: rust-foreground-window-api
      - id: rust-window-title-api
    any:
      - id: keylog-window-header-format
      - id: rust-window-title-length-api
      - id: micro-behaviors/hardware/input/keyboard/hook::virtual-key-label-map
      - id: micro-behaviors/os/message/queue::get-message-w
  - id: rust-keylogger-random-temp-log
    desc: Rust keylogger writes randomized temp log
    crit: notable
    conf: 0.93
    all:
      - id: randomized-log-filename-format
      - id: metadata/file/profile/identity::rust-random-name-module
      - id: micro-behaviors/fs/path/temp::rust-temp-dir
    any:
      - id: keylog-window-header-format
      - id: micro-behaviors/os/event/library/tokio::tokio-spawn
  - id: rust-keylogger-managed-hook-thread
    desc: Rust keylogger manages hook thread lifecycle
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
    any:
      - id: micro-behaviors/os/message/queue::get-message-w
      - id: micro-behaviors/os/message/queue::post-thread-message-w
  - id: rust-persistent-keyboard-hook-package
    desc: Rust package combines global keyboard hook with login persistence
    crit: hostile
    conf: 0.97
    for: [archives, rust]
    scope: archive
    attack: T1056.001, T1547.001
    all:
      - id: rust-keylogger-managed-hook-thread
    any:
      - id: objectives/persistence/system/supervised::rust-windows-hkcu-run-key
      - id: objectives/persistence/system/supervised::rust-winreg-hkcu-run-key
      - id: objectives/persistence/system/supervised::rust-schtasks-onlogon
      - id: objectives/persistence/system/service/systemd::systemd-user-persistence
