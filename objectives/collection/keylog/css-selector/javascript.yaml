defaults:
  platforms: [windows, unix]
  for: [javascript, html]
  attack: T1056.001

traits:
  - id: css-value-suffix-image-exfil
    desc: CSS value suffix image exfil
    crit: suspicious
    conf: 0.96
    for: [javascript]
    if:
      type: text
      regex: 'input\[value\$=.{0,80}background-image:\s*url'

  - id: css-keylog-char-route
    desc: CSS keylogger character route
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: string_literal
      exact: /log/:char

  - id: css-keylog-focus-route
    desc: CSS keylogger focus route
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: string_literal
      exact: /focus/:field

  - id: css-keylog-ip-buffer
    desc: CSS keylogger IP buffer
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      substr: logs[ip]

  - id: html-loads-bad-css-keylogger
    desc: HTML loads bad CSS keylogger stylesheet
    crit: suspicious
    conf: 0.9
    for: [html]
    if:
      type: text
      substr: href="/bad.css"

  - id: html-password-value-sync-demo
    desc: HTML password input value sync demo
    crit: suspicious
    conf: 0.88
    for: [html]
    if:
      type: text
      regex: 'type="password"[\s\S]{0,260}setAttribute\('

composite_rules:
  - id: css-selector-keylogger-server
    desc: CSS selector keylogger server
    crit: hostile
    conf: 0.97
    for: [javascript]
    all:
      - id: css-value-suffix-image-exfil
      - id: css-keylog-char-route
      - id: css-keylog-focus-route
      - id: css-keylog-ip-buffer
      - id: micro-behaviors/data/encode/charcode::from-char-code

  - id: css-selector-keylogger-demo-page
    desc: CSS selector keylogger demo page
    crit: suspicious
    conf: 0.93
    for: [html]
    all:
      - id: html-loads-bad-css-keylogger
      - id: html-password-value-sync-demo
