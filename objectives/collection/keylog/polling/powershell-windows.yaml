defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1056.001
  mbc: E1056.001

traits:
  - id: ps-keypoll-file-append
    desc: PowerShell key polling append
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'GetAsyncKeyState[\s\S]{0,700}File\.AppendAllText'

composite_rules:
  - id: ps-polling-keylogger
    desc: PowerShell polling keylogger
    crit: hostile
    conf: 0.97
    all:
      - id: ps-keypoll-file-append
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-low-level-keyboard-hook-const
