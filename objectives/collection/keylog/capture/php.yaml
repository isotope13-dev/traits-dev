defaults:
  platforms: [unix]
  for: [php]
  attack: T1056.001
composite_rules:
  - id: php-tty-keylog
    desc: PHP script capturing keystrokes from /dev/tty
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/spawn::php-exec
      - id: micro-behaviors/fs/file/write/direct::php-file-write
      - id: micro-behaviors/fs/path/device/terminal::dev-tty
      - id: micro-behaviors/process/tty/terminal::stty-cmd
    unless:
      - id: well-known/tool/development/composer::composer-phar-cli
      - id: metadata/library/web-frameworks::laravel-context
      - id: metadata/library/web-frameworks::symfony-context
      - id: well-known/lib/symfony::symfony-framework
