defaults:
  platforms: [unix]
  for: [php]
  attack: T1056.001
traits:
  - id: dev-tty-literal
    desc: References /dev/tty device
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      exact: /dev/tty
  - id: stty-literal
    desc: References stty terminal command
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: stty
composite_rules:
  - id: php-tty-keylog
    desc: PHP script capturing keystrokes from /dev/tty
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/spawn::php-exec
      - id: micro-behaviors/fs/file/write/direct::php-file-write
      - id: dev-tty-literal
      - id: stty-literal
    unless:
      - id: well-known/tool/development/composer::composer-phar-cli
