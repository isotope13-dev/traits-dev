# Keylogger Behavioral Composites
# Generic keylogger detection patterns (not family-specific)
# ATT&CK: T1056.001 (Keylogging)
defaults:
  attack: T1056.001
  platforms: [macos]
  for: [macho]
composite_rules:
  # Windows keylogger + clipboard + stealer combo
  # Fires hostile when a keylogger is combined with clipboard capture and
  # additional data-stealing indicators (dropper, SQLite, file enumeration).
  - id: windows-keylogger-clipboard-stealer
    desc: Windows keylogger with clipboard and data theft
    crit: hostile
    conf: 0.93
    platforms: [windows]
    for: [pe]
    all:
      - id: objectives/collection/keylog/capture::windows-hook-window-title-keylogger
      - id: objectives/collection/clipboard/capture::windows-clipboard-capture-with-user-monitoring
    any:
      - id: micro-behaviors/data/db/sqlite
      - id: objectives/command-and-control/dropper/execution/inject::self-map-extract-execute
      - id: objectives/evasion/self-delete/file/script::module-path-delete
      - id: micro-behaviors/fs/file/delete::deletefile-w
      - id: micro-behaviors/fs/traversal/drives::get-logical-drive-strings
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: well-known/app/internet-explorer/
      - id: well-known/lib/electron/
      - id: well-known/lib/videolan/
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/app/winscp/
  # Generalized keylogger with clipboard
  - id: keylogger-clipboard-stealer
    desc: Keylogger with clipboard and mouse tracking
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/collection/keylog/capture::keylogger-with-clipboard
      - id: objectives/collection/keylog/capture::evt-marker-file
    any:
      - id: micro-behaviors/fs/path/library::hidden-library-caches
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
  # Keylogger with structured data output
  - id: structured-keylogger
    desc: Keylogger with structured timestamped output
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: objectives/collection/keylog/capture::keylog-filename-pattern
      - id: objectives/collection/keylog/capture::clipboard-capture-pattern
      - id: objectives/collection/keylog/capture::mouse-state-tracking

  # --- Windows surveillance-suite (RAT/spyware) composites ---
  # The keylogger composites above require file-stealer extras (SQLite, drive
  # enumeration, self-delete). A surveillance RAT that captures keystrokes +
  # screen + clipboard and exfiltrates over the network does not look like a
  # file stealer, so it slipped through at notable. These composites anchor on
  # the covert-capture core (window-title keystroke logging + GDI screen
  # capture) and pair it with a distinct fourth malicious facet. Each is on its
  # own a no-benign-use combination; the unless guards exempt signed Microsoft
  # components that legitimately import these APIs.
  - id: surv-keylog-present
    desc: Keystroke capture capability present
    crit: component
    conf: 0.9
    platforms: [windows]
    for: [pe]
    any:
      - id: objectives/collection/keylog/capture::windows-hook-window-title-keylogger
      - id: objectives/collection/keylog/capture::windows-hook-keypoll-window-title
      - id: objectives/collection/keylog/capture::windows-rawinput
      - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
    unless:
      - id: well-known/lib/tcl-tk/
      - id: metadata/library/qt/
      - id: well-known/lib/sdl::sdl-runtime-component
      - id: well-known/lib/ffmpeg/
      - id: known-gui-runtime-input-exception
  - id: surv-screencap-present
    desc: Screen capture capability present
    crit: component
    conf: 0.9
    platforms: [windows]
    for: [pe]
    any:
      - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
      - id: micro-behaviors/hardware/display/screen::gdi-bitmap-transfer-primitives
    unless:
      - id: well-known/lib/tcl-tk/
      - id: metadata/library/qt/
      - id: well-known/lib/sdl::sdl-runtime-component
      - id: well-known/lib/ffmpeg/
      - id: known-gui-runtime-input-exception
  - id: surv-clipboard-present
    desc: Clipboard capture capability present
    crit: component
    conf: 0.9
    platforms: [windows]
    for: [pe]
    any:
      - id: objectives/collection/clipboard/capture::clipboard-access-api
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
    unless:
      - id: well-known/lib/tcl-tk/
      - id: well-known/lib/sdl::sdl-runtime-component
      - id: well-known/lib/ffmpeg/
  - id: windows-surveillance-spyware-suite
    desc: Windows spyware — keystroke, screen, and clipboard capture
    crit: hostile
    conf: 0.93
    platforms: [windows]
    for: [pe]
    all:
      - id: surv-keylog-present
      - id: surv-screencap-present
      - id: surv-clipboard-present
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: well-known/app/internet-explorer/
      - id: well-known/lib/electron/
      - id: well-known/lib/videolan/
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/app/qbittorrent/
      - id: well-known/app/winscp/
      - id: well-known/app/tor-browser/
  - id: windows-surveillance-c2-exfil
    desc: Windows surveillance capture with network exfiltration
    crit: hostile
    conf: 0.92
    platforms: [windows]
    for: [pe]
    all:
      - id: surv-keylog-present
      - id: surv-screencap-present
      - id: micro-behaviors/communications/http/client/managed::httpclient
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: well-known/app/internet-explorer/
      - id: well-known/lib/electron/
      - id: well-known/lib/videolan/
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/app/qbittorrent/
      - id: well-known/app/winscp/
      - id: well-known/app/tor-browser/
  - id: windows-evasive-surveillance
    desc: Sandbox-evading Windows surveillance capture
    crit: hostile
    conf: 0.92
    platforms: [windows]
    for: [pe]
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::foreground-window-input-state
      - id: surv-keylog-present
      - id: surv-screencap-present
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: well-known/app/internet-explorer/
      - id: well-known/lib/electron/
      - id: well-known/lib/videolan/
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/app/qbittorrent/
      - id: well-known/app/winscp/
      - id: well-known/app/tor-browser/
  - id: windows-surveillance-remote-control
    desc: Windows surveillance capture with shell command execution
    crit: hostile
    conf: 0.9
    platforms: [windows]
    for: [pe]
    all:
      - id: surv-keylog-present
      - id: surv-screencap-present
      - id: micro-behaviors/process/create/exec::shell-execute
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: well-known/app/internet-explorer/
      - id: well-known/lib/electron/
      - id: well-known/lib/videolan/
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/app/qbittorrent/
      - id: well-known/app/winscp/
      - id: well-known/app/tor-browser/

  # A PE that combines hidden API resolution, an encrypted writable payload,
  # keyboard polling, clipboard read/write, GDI capture, and temp-file staging
  # is a surveillance-loader profile. The payload-section and staging legs
  # avoid flagging ordinary GUI code that happens to use one capture API.
  - id: windows-opaque-surveillance-loader
    desc: Obfuscated Windows surveillance loader with staged payload
    crit: hostile
    conf: 0.98
    platforms: [windows]
    for: [pe]
    attack: T1027,T1056.001,T1113,T1115
    all:
      - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
      - id: metadata/binary/section/metrics::large-high-entropy-writable-data-section
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state-str
      - id: micro-behaviors/os/clipboard/access::win32-clipboard-read-write
      - id: micro-behaviors/hardware/display/screen::gdi-getdibits
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/
