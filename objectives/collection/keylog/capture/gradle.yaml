defaults:
  platforms: [unix, windows]
  for: [groovy]
  attack: T1056.001
  mbc: B0015

composite_rules:
  - id: gradle-obfuscated-native-keyhook-package
    desc: Gradle packages obfuscated native keyhook
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/package/dependencies::gradle-jnativehook-dependency
      - id: metadata/build/artifact::gradle-proguard-task
    any:
      - id: metadata/build/artifact::gradle-obfuscated-jar-output

  - id: gradle-native-keyhook-obfuscated-output
    desc: Gradle native keyhook obfuscated output
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/package/dependencies::gradle-jnativehook-dependency
      - id: metadata/build/artifact::gradle-obfuscated-jar-output

  - id: gradle-obfuscated-keyhook-distribution
    desc: Gradle distributes obfuscated native keyhook jar
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/package/dependencies::gradle-jnativehook-dependency
      - id: metadata/build/artifact::gradle-proguard-task
      - id: metadata/build/artifact::gradle-obfuscated-jar-output

  - id: gradle-shaded-obfuscated-keyhook
    desc: Gradle shades and obfuscates native keyhook dependency
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/package/dependencies::gradle-jnativehook-dependency
      - id: metadata/build/artifact::gradle-shadow-plugin
      - id: metadata/build/artifact::gradle-shadow-relocate
      - id: metadata/build/artifact::gradle-obfuscated-jar-output
