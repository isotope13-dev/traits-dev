# Polling-based input monitoring (without SetWindowsHookEx)
# Some malware and game cheats use polling APIs (GetKeyState, GetAsyncKeyState)
# combined with clipboard access and mouse monitoring for input capture.
# Unlike hook-based keyloggers, these don't install keyboard hooks.
# ATT&CK: T1056.001 (Input Capture: Keylogging)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1056.001"
  mbc: "B0015"
composite_rules:
  - id: polling-input-monitor
    desc: Polling-based input monitoring (keyboard + clipboard)
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
    any:
      - id: micro-behaviors/hardware/input/mouse/synthesis::mouse-event
      - id: micro-behaviors/hardware/input/keyboard/hook::get-cursor-pos
      - id: micro-behaviors/os/clipboard/access::set-clipboard-data
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
      - id: well-known/app/internet-explorer::internet-explorer-frame-component
      - id: benign-polling-input-tool-context
      - id: well-known/lib/electron::electron-chromium-runtime-strong
    downgrade:
      any:
        - id: micro-behaviors/ui/framework/imgui::dear-imgui-library
  - id: benign-polling-input-tool-context
    desc: Benign input polling tool context
    crit: component
    conf: 0.9
    any:
      - id: well-known/lib/sdl::sdl-runtime-component
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
      - id: well-known/tool/sysadmin/disk-utility::winhex-xways
      - id: metadata/lang/compiled::autoit-binary
      - id: well-known/tool/sysadmin/systeminformer
      - id: well-known/tool/sysadmin/winrar::winrar-component
