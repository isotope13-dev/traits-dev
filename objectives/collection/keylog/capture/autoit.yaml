defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: autoit-keylogger-profile
    desc: AutoIt keyboard capture profile
    crit: notable
    conf: 0.95
    all:
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: micro-behaviors/hardware/input/keyboard/label::keystroke-capture-string
    unless:
      - id: well-known/app/installer::uniextract-installer
