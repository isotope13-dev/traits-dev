# Windows keylogging intent composites
# ATT&CK: T1056.001 (Input Capture: Keylogging)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1056.001"
  mbc: "B0015"
composite_rules:
  - id: windows-hook-keylogger
    desc: Keyboard hook with key state polling
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/hardware/input/keyboard::set-windows-hook
      - id: micro-behaviors/hardware/input/keyboard::get-key-state
      - id: micro-behaviors/hardware/input/keyboard::virtual-key-label-map
    any:
      - id: micro-behaviors/hardware/input/keyboard::call-next-hook-ex
      - id: micro-behaviors/ui/window/manage::get-foreground-window
      - id: micro-behaviors/ui/window/manage::get-window-text
    downgrade:
      all:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
  - id: windows-active-window-keylogger
    desc: Keyboard hook with active window context
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/hardware/input/keyboard::set-windows-hook
      - id: micro-behaviors/hardware/input/keyboard::get-key-state
      - id: micro-behaviors/ui/window/manage::get-foreground-window
      - id: micro-behaviors/ui/window/manage::get-window-text
      - id: micro-behaviors/hardware/input/keyboard::virtual-key-label-map
  - id: windows-hook-state-keylogger
    desc: Windows hook with key state polling
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/input/keyboard::windows-hook-lifecycle
      - id: micro-behaviors/hardware/input/keyboard::get-key-state
      - id: micro-behaviors/hardware/input/keyboard::virtual-key-label-map
    any:
      - id: micro-behaviors/ui/window/manage::get-foreground-window
      - id: micro-behaviors/ui/window/manage::get-window-text
      - id: micro-behaviors/hardware/input/keyboard::get-keyboard-state-str
      - id: micro-behaviors/hardware/input/keyboard::map-virtual-key-str
    needs: 2
    downgrade:
      all:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
  - id: windows-hook-window-title-keylogger
    desc: Windows hook with window title polling
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/hardware/input/keyboard::windows-hook-lifecycle
      - id: micro-behaviors/hardware/input/keyboard::get-key-state
      - id: micro-behaviors/ui/window/manage::get-foreground-window
      - id: micro-behaviors/ui/window/manage::get-window-text
    any:
      - id: micro-behaviors/hardware/input/keyboard::virtual-key-label-map
      - id: micro-behaviors/hardware/input/keyboard::to-unicode-ex-str
      - id: micro-behaviors/hardware/input/keyboard::polling-keylogger-api-cluster
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: well-known/tool/sysadmin/sandboxie::signed-sandboxie-component
      - id: well-known/tool/reverse-engineering/resource-hacker::resource-hacker
      # Cross-device input-forwarding tools (screen mirror, phone link)
      # legitimately combine keyboard hooks with active-window tracking.
      - id: metadata/signed/leaf::huawei-device-co.-ltd.
  - id: windows-hook-keypoll-window-title
    desc: Windows hook key polling with active window title
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/hardware/input/keyboard::windows-hook-lifecycle
      - id: micro-behaviors/hardware/input/keyboard::get-key-state
      - id: micro-behaviors/hardware/input/keyboard::get-async-key-state
      - id: micro-behaviors/ui/window/manage::get-foreground-window
      - id: micro-behaviors/ui/window/manage::get-window-text
    any:
      - id: micro-behaviors/hardware/input/keyboard::virtual-key-label-map
      - id: micro-behaviors/hardware/input/keyboard::to-unicode-ex-str
      - id: micro-behaviors/hardware/input/keyboard::polling-keylogger-api-cluster
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: well-known/tool/sysadmin/sandboxie::signed-sandboxie-component
      - id: well-known/tool/reverse-engineering/resource-hacker::resource-hacker
      # Cross-device input-forwarding tools (screen mirror, phone link)
      # legitimately combine keyboard hooks with active-window tracking.
      - id: metadata/signed/leaf::huawei-device-co.-ltd.
