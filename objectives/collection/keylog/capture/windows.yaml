# Windows keylogging intent composites
# ATT&CK: T1056.001 (Input Capture: Keylogging)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1056.001"
  mbc: "B0015"
composite_rules:
- id: known-gui-runtime-input-exception
  desc: MFC or Coremail input-hook exception
  crit: exception
  conf: 0.99
  any:
  - id: metadata/library/mfc/
  - id: well-known/app/coremail/
- id: windows-input-hook-key-state-surveillance
  desc: Windows input hook with key-state and active-window capture
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-low-level-keyboard-hook-const
  - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::map-virtual-key
  - id: micro-behaviors/hardware/input/keyboard/hook::get-keyboard-layout-str
  - id: micro-behaviors/hardware/input/keyboard/hook::call-next-hook-ex
  needs: 1
  unless:
  - id: metadata/binary/installer/family/
  - id: well-known/tool/reverse-engineering/
  - id: well-known/tool/sysadmin/
  - id: well-known/lib/electron::electron-windows-runtime-pdb
  - id: well-known/lib/sdl::sdl-runtime-component
  - id: well-known/lib/ffmpeg/
  # Eclipse SWT's signed Windows JNI library exposes these APIs for GUI input.
  - id: well-known/lib/swt::windows-native-library
  - id: well-known/app/protected-benign-pe::cpuid-signer
  - id: known-gui-runtime-input-exception
- id: windows-hook-keypoll-foreground
  desc: Keyboard hook with key polling and foreground check
  crit: suspicious
  conf: 0.91
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
  - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/hardware/input/keyboard/hook::virtual-key-label-map
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::call-next-hook-ex
  - id: micro-behaviors/hardware/input/keyboard/hook::get-cursor-pos
  - id: micro-behaviors/ui/window/manage/control::get-message-pos
  needs: 1
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/build/manifest::pe-has-manifest
  unless:
  - id: well-known/tool/reverse-engineering/cff-explorer/
- id: windows-hook-keylogger
  desc: Keyboard hook with key state polling
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
  - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
  - id: micro-behaviors/hardware/input/keyboard/hook::virtual-key-label-map
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::call-next-hook-ex
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  downgrade:
    all:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
- id: windows-active-window-keylogger
  desc: Keyboard hook with active window context
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
  - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  - id: micro-behaviors/hardware/input/keyboard/hook::virtual-key-label-map
- id: windows-hook-state-keylogger
  desc: Windows hook with key state polling
  crit: suspicious
  conf: 0.93
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
  - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
  - id: micro-behaviors/hardware/input/keyboard/hook::virtual-key-label-map
  any:
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  - id: micro-behaviors/hardware/input/keyboard/hook::get-keyboard-state-str
  - id: micro-behaviors/hardware/input/keyboard/layout::map-virtual-key-str
  needs: 2
  downgrade:
    all:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
- id: windows-hook-window-title-keylogger
  desc: Windows hook with window title polling
  crit: notable
  conf: 0.92
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
  - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::virtual-key-label-map
  - id: micro-behaviors/hardware/input/keyboard/hook::to-unicode-ex-str
  - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
  - id: well-known/tool/sysadmin/sandboxie/
  - id: well-known/tool/reverse-engineering/resource-hacker/
      # Cross-device input-forwarding tools (screen mirror, phone link)
      # legitimately combine keyboard hooks with active-window tracking.
  - id: metadata/signed/leaf::huawei-device-co.-ltd.
- id: keylogger-protected-by-defender-exclusion
  desc: Keylogger protected by Defender exclusion
  crit: hostile
  conf: 0.97
  all:
  - id: windows-hook-keypoll-foreground
  - id: micro-behaviors/os/security/defender::defender-exclusion-command
  any:
  - id: objectives/evasion/anti-av/platform/defender::defender-excludes-telegram-stage
  - id: objectives/evasion/anti-av/platform/defender::defender-programdata-stage-path
- id: packed-upx-hook-screen-collector
  desc: Packed UPX keyboard and screen collector
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/anti-static/pack/upx::scrambled-upx-header
  - id: objectives/command-and-control/dropper/execution/loader::compact-rwx-upx1
  - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
  - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
  any:
  - id: micro-behaviors/os/clipboard/access::open-clipboard
  - id: micro-behaviors/os/message/dde::dde-client-transaction
  - id: micro-behaviors/os/registry/access::registry-set-value-api
  needs: 1
  unless:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/signed/platform/
  - id: well-known/tool/reverse-engineering/
- id: windows-hook-keypoll-window-title
  desc: Windows hook key polling with active window title
  crit: notable
  conf: 0.94
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
  - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
  - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::virtual-key-label-map
  - id: micro-behaviors/hardware/input/keyboard/hook::to-unicode-ex-str
  - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
  - id: well-known/tool/sysadmin/sandboxie/
  - id: well-known/tool/reverse-engineering/resource-hacker/
      # Cross-device input-forwarding tools (screen mirror, phone link)
      # legitimately combine keyboard hooks with active-window tracking.
  - id: metadata/signed/leaf::huawei-device-co.-ltd.
- id: api-resolved-keyboard-clipboard-surveillance
  desc: API-resolved keyboard and clipboard surveillance
  crit: hostile
  conf: 0.98
  attack: T1056.001,T1115,T1027.007
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state-str
  - id: micro-behaviors/hardware/input/keyboard/hook::get-keyboard-state-str
  - id: micro-behaviors/os/clipboard/access::get-clipboard-data-text
  - id: micro-behaviors/os/clipboard/access::set-clipboard-data-text
  - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
  - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
- id: api-resolved-input-window-surveillance
  desc: Hashed API resolution with keyboard polling and active-window tracking
  crit: hostile
  conf: 0.98
  attack: T1056.001,T1027.002,T1055
  all:
  - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
  - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state-str
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::get-cursor-pos
  - id: micro-behaviors/ui/window/manage/enumerate::enum-windows
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
- id: hashed-polling-keylogger-window-surveillance
  desc: Hashed API polling keylogger with active-window tracking
  crit: hostile
  conf: 0.97
  attack: T1056.001,T1027.007
  all:
  - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
  - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
  - id: micro-behaviors/hardware/input/keyboard/hook::foreground-window-input-state
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
  - id: well-known/game/
  - id: well-known/tool/sysadmin/
- id: opaque-api-resolved-keyboard-clipboard-screen-loader
  desc: Opaque loader with keyboard clipboard and screen collection
  crit: hostile
  conf: 0.99
  attack: T1027,T1027.007,T1056.001,T1113,T1115
  for: [pe]
  all:
  - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
  - id: metadata/binary/section/metrics::large-high-entropy-writable-data-section
  - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
  - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state-str
  - id: micro-behaviors/hardware/input/keyboard/hook::get-keyboard-state-str
  - id: micro-behaviors/os/clipboard/access::get-clipboard-data-text
  - id: micro-behaviors/os/clipboard/access::set-clipboard-data-text
  - id: micro-behaviors/hardware/display/screen::gdi-getdibits
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework/
  - id: metadata/binary/installer/
