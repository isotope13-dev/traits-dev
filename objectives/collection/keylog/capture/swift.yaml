defaults:
  for: [swift]
  platforms: [macos]
  attack: T1056.001
  mbc: B0015

traits:
  - id: swift-keylogger-class-launch
    desc: Swift launches keylogger class
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\bKeylogger\s*\(\)\s*'

composite_rules:
  - id: swift-keylogger-runloop-launcher
    desc: Swift keylogger run-loop launcher
    crit: suspicious
    conf: 0.9
    all:
      - id: swift-keylogger-class-launch
      - id: micro-behaviors/os/event/library/runloop::swift-main-runloop-run

  - id: swift-hid-keyboard-input-monitor
    desc: Swift HID keyboard input monitor
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-manager-create
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-input-value-callback-register
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-keyboard-match
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-keypad-match
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-runloop-schedule
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iokit-hid-import

  - id: swift-hid-keylogger-active-app-log
    desc: Swift HID keylogger logs active app names
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-input-value-callback-register
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-active-application-observer
      - id: micro-behaviors/fs/file/read-write::swift-filehandle-write
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-keyboard-match
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-device-match-callback

  - id: swift-hid-keypress-file-logger
    desc: Swift HID keypress callback writes mapped keystrokes to file
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-value-callback
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-keyboard-usage-page-filter
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-key-press-value
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-keymap-scancode-lookup
      - id: micro-behaviors/fs/file/read-write::swift-filehandle-write

  - id: swift-hid-scancode-keylog-filter
    desc: Swift HID keylogger filters scancode ranges before logging
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-value-callback
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-keyboard-usage-page-filter
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-scancode-range-filter
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-keymap-scancode-lookup

  - id: swift-hid-device-and-key-log
    desc: Swift logs HID device events alongside keystrokes
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-device-match-callback
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-device-removal-callback
      - id: micro-behaviors/hardware/input/keyboard/hook::swift-iohid-input-value-callback-register
      - id: micro-behaviors/fs/file/read-write::swift-filehandle-write
