defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1056.001
  mbc: E1056.001

composite_rules:
  - id: cpp-windows-polling-keylogger-source
    desc: C/C++ Windows polling keylogger source
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state-str
      - id: micro-behaviors/hardware/input/keyboard/hook::cpp-virtual-key-range-loop
      - id: micro-behaviors/hardware/input/keyboard/hook::cpp-key-label-map-uppercase
      - id: micro-behaviors/hardware/input/keyboard/hook::cpp-append-keylog-stream
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::cpp-dll-thread-entry
      - id: micro-behaviors/ui/window/manage/control::get-foreground-window
      - id: micro-behaviors/ui/window/manage/control::get-window-text
  - id: cpp-dll-thread-keylog-writer
    desc: C/C++ DLL thread keylog writer
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state-str
      - id: micro-behaviors/hardware/input/keyboard/hook::cpp-append-keylog-stream
      - id: micro-behaviors/hardware/input/keyboard/hook::cpp-dll-thread-entry
