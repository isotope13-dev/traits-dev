# Native X11 global input capture.
defaults:
  platforms: [linux]
  for: [elf, c, cpp]
  attack: T1056.001
  mbc: B0015

traits:
  - id: xinput-keyboard-marker
    desc: Native XInput keyboard event marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'XInputExtension|X keyboard extension|KEYBOARD'

composite_rules:
  - id: native-x11-global-input-capture
    desc: Native X11 program captures decoded global key events
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/hardware/display/connection::x11-open-display
      - id: micro-behaviors/hardware/input/keyboard/hook::x11-xinput-extension
      - id: micro-behaviors/hardware/input/keyboard/hook::x11-select-input-events
      - id: micro-behaviors/hardware/input/keyboard/hook::x11-read-input-events
      - id: micro-behaviors/hardware/input/keyboard/hook::x11-decode-input-event
      - id: xinput-keyboard-marker
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::x11-raw-key-event-struct
      - id: micro-behaviors/hardware/input/keyboard/hook::x11-key-translation-call
    unless:
      - id: well-known/app/freerdp::client-context
      - id: well-known/tool/sysadmin/xinput::xinput-diagnostic-utility
      - id: well-known/lib/benign-runtime-bundles::openjdk-awt-x11-runtime
      # Electron native-addon sources commonly include the complete XInput
      # global-hotkey implementation; the package/runtime context explains it.
      - id: metadata/package/files/runtime::electron-resources-app-asar
