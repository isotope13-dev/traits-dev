defaults:
  platforms: [macos]
  for: [scripts]

traits:
  - id: osascript-exec
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: micro-behaviors/process/create/script/osascript::osascript-exec
  - id: python-network-exfil
    for: [text]
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: string_literal
      exact: __cleave_missing_python_network_exfil__
