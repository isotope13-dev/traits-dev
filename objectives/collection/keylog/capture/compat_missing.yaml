    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: objectives/command-and-control/dropper/staging/memory::objectives/collection/keylog/capture::osascript-exec
  - id: python-network-exfil
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: string_literal
      exact: __cleave_missing_python_network_exfil__
