defaults:
  platforms:
    - unix
    - windows
  for: [makefile]
  attack: T1056.001
  mbc: B0015

traits:
  - id: keylog-project-name
    desc: Makefile keylog project name
    crit: component
    conf: 0.92
    size_max: 4096
    if:
      type: text
      regex: '^PROJECT\s*[:+?]?=\s*(kee?log[a-z0-9_-]*)\b'
      case_insensitive: true

composite_rules:
  - id: windows-bof-keylogger-build
    desc: Windows BOF keylogger build
    crit: hostile
    conf: 0.97
    all:
      - id: keylog-project-name
      - id: objectives/command-and-control/dropper/execution/loader::crtless-dual-arch-bof-makefile
