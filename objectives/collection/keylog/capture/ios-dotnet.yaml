defaults:
  platforms: [ios]
  for: [csharp]
  attack: T1056.001

traits:
  - id: dotnet-ios-inputview-keylogger
    desc: .NET iOS input view keylogger
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CustomInputView[\s\S]{0,180}OnKeystroke'

  - id: dotnet-ios-keylog-keychain-store
    desc: .NET stores keylog data in Keychain
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'captured_keys|com\.agent\.klog'

composite_rules:
  - id: dotnet-ios-keylog-http-exfil
    desc: .NET iOS keylogger HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-ios-inputview-keylogger
      - id: dotnet-ios-keylog-keychain-store
      - id: micro-behaviors/communications/http/client/managed::httpclient
