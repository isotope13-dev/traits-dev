defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, c, cpp]
  mbc: B0015
  attack: T1056.001
  crit: suspicious
traits:
- id: p-user-proxy-dll
  desc: p_user USER32 proxy DLL marker
  crit: component
  conf: 0.9
  platforms: [windows]
  for: [pe]
  if:
    type: basename
    exact: p_user.dll
- id: windows-rawinput
  desc: Windows raw input API for
  crit: notable
  conf: 0.7
  platforms:
  - windows
  for: [pe, c, cpp]
  if:
    type: symbol
    exact: GetRawInputData
  unless:
  - type: basename
    exact: glfw3.dll
  - type: basename
    exact: p_user.dll
- id: x11-grab
  desc: X11 global key grab
  crit: notable
  conf: 0.65
  platforms:
  - linux
  - macos
  for: [elf, macho, c, cpp]
  if:
    type: symbol
    exact: XGrabKey
  unless:
  - type: basename
    regex: ^lib.*\.(so|dylib)(\.\d+)*$
  - type: text
    substr: xorg
- id: linux-evdev-event-path
  desc: Linux evdev input event path
  crit: notable
  conf: 0.9
  platforms: [linux]
  for: [elf, c, cpp]
  if:
    type: text
    regex: '/dev/input/event[0-9*%{}a-zA-Z_.-]*'
- id: linux-input-devices-path
  desc: Linux input devices registry path
  crit: notable
  conf: 0.84
  platforms: [linux]
  for: [elf, c, cpp]
  if:
    type: text
    substr: /proc/bus/input/devices
- id: linux-input-event-struct
  desc: Linux input_event structure parsing
  crit: notable
  conf: 0.84
  platforms: [linux]
  for: [elf, c, cpp]
  if:
    type: text
    regex: '\bstruct\s+input_event\b|\bEV_KEY\b'
- id: x11-screenshot-or-key-fallback--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  for: [elf, c, cpp]
  platforms: [linux]
  if:
    type: text
    regex: '\b(XOpenDisplay|XQueryKeymap)\b'
  count_max: 1030402
- id: x11-screenshot-or-key-fallback--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  for: [elf, c, cpp]
  platforms: [linux]
  if:
    type: text
    regex: '\b(XGetInputFocus|XGetImage)\b'
  count_max: 1030403
- id: x11-screenshot-or-key-fallback--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  for: [elf, c, cpp]
  platforms: [linux]
  if:
    type: text
    regex: '\b(XKeysymToKeycode)\b'
  count_max: 1030404
- id: macos-eventtap
  desc: macOS CGEventTap for key interception
  crit: notable
  conf: 0.7
  platforms:
  - macos
  for: [macho, c, cpp]
  if:
    type: symbol
    substr: CGEventTapCreate
- id: go-gohook
  desc: Go robotn/gohook keyboard capture library
  conf: 0.75
  if:
    type: text
    substr: github.com/robotn/gohook
- id: pynput-import-keyboard
  desc: from pynput import keyboard
  conf: 0.5
  if:
    type: text
    substr: from pynput import keyboard
- id: pynput-keyboard-import
  desc: from pynput.keyboard import
  conf: 0.5
  if:
    type: text
    substr: from pynput.keyboard
- id: require-iohook
  desc: require("iohook")
  conf: 0.6
  if:
    type: raw
    regex: require\(['"]iohook['"]\)
- id: import-iohook
  desc: from "iohook" import
  conf: 0.6
  if:
    type: text
    regex: from ['"]iohook['"]
- id: use-rdev
  desc: 'use rdev:: import statement'
  conf: 0.5
  if:
    type: text
    substr: 'use rdev::'
- id: extern-crate-rdev
  desc: extern crate rdev
  conf: 0.5
  if:
    type: text
    substr: extern crate rdev
- id: osascript-title
  desc: Osascript command (title case)
  crit: notable
  conf: 0.6
  if:
    type: text
    word: Osascript
- id: osascript-upper
  desc: OSASCRIPT command (uppercase)
  crit: notable
  conf: 0.6
  if:
    type: text
    word: OSASCRIPT
- id: keystroke-lower
  desc: keystroke keyword (lowercase)
  crit: notable
  conf: 0.7
  size_max: 10485760
  count_min: 2
  if:
    type: text
    word: keystroke
  unless:
  - type: basename
    regex: \.map$
  - type: basename
    exact: tabby
  - type: basename
    regex: ^(hotkeyInputModal\.component|hotkeys\.service)\.ts$
  not:
  - substr: '"name": "tabby-core"'
  - substr: Observable<Keystroke>
  - substr: _keystroke = new Subject<Keystroke>()
  - substr: pressedKeystroke
  - substr: lastKeystrokes
  - substr: getKeystrokeName(
- id: keystroke-title
  desc: Keystroke keyword (title case)
  crit: notable
  conf: 0.7
  size_max: 10485760
  count_min: 2
  if:
    type: text
    word: Keystroke
  unless:
  - type: basename
    regex: \.d\.ts$
  - type: basename
    regex: \.map$
  - type: basename
    exact: tabby
  - type: basename
    regex: ^(hotkeyInputModal\.component|hotkeys\.(service|util))\.ts$
  - type: text
    substr: Adobe
  - type: text
    substr: Form
  not:
  - substr: '"name": "tabby-core"'
  - substr: Observable<Keystroke>
  - substr: _keystroke = new Subject<Keystroke>()
  - substr: pressedKeystroke
  - substr: lastKeystrokes
  - substr: getKeystrokeName(
- id: keystroke-upper
  desc: KEYSTROKE keyword (uppercase)
  crit: notable
  conf: 0.7
  if:
    type: text
    word: KEYSTROKE
- id: key-code-lower
  desc: key code phrase (lowercase)
  crit: component
  conf: 0.7
  if:
    type: text
    substr: key code
  downgrade:
    any:
    - type: text
      substr: Virtual key code
    - type: text
      regex: \bVK_[A-Za-z0-9]+\b
- id: key-code-title
  desc: Key Code phrase (title case)
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: Key Code
- id: key-code-upper
  desc: KEY CODE phrase (uppercase)
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: KEY CODE
- id: key-down-lower
  desc: key down phrase (lowercase)
  crit: notable
  conf: 0.7
  size_max: 10485760
  if:
    type: text
    regex: 'key down\b'
    case_insensitive: true
  not:
  - regex: (?i)event.{0,20}key down
  - regex: (?i)holding a key down
  - regex: (?i)mouse button.{0,40}key down
  - regex: (?i)\b(ctrl|shift|alt)\s+key down\b
  unless:
  - id: well-known/tool/reverse-engineering/resource-hacker::resource-hacker
- id: key-down-title
  desc: Key Down phrase (title case)
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: Key Down
- id: key-down-upper
  desc: KEY DOWN phrase (uppercase)
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: KEY DOWN
- id: system-events-lower
  desc: system events phrase (lowercase)
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: system events
- id: system-events-title
  desc: System Events phrase (title case)
  crit: notable
  conf: 0.7
  if:
    type: raw
    regex: (?i)tell\s+application\s+"System Events"
- id: system-events-upper
  desc: SYSTEM EVENTS phrase (uppercase)
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: SYSTEM EVENTS
- id: application-call
  desc: Application( constructor call
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: Application\(\s*['\"][A-Za-z0-9 ._-]{1,64}['\"]
- id: keycode-camel
  desc: keyCode property
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: keyCode
- id: require-applescript-single
  desc: require('applescript') import
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: require('applescript')
- id: require-applescript-double
  desc: require("applescript") import
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: require("applescript")
- id: node-osascript
  desc: node-osascript library
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: node-osascript
- id: run-applescript
  desc: run-applescript function
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: run-applescript
- id: wine-joystick-context
  desc: Wine joystick or gamepad context
  crit: baseline
  conf: 0.95
  for: [elf, c, cpp]
  platforms: [linux]
  if:
    type: text
    regex: "(?i)(joystick|gamepad|dinput|wine_dinput)"
- id: wine-debug-channel
  desc: Wine debug channel marker
  crit: baseline
  conf: 0.95
  for: [elf, c, cpp]
  platforms: [linux]
  if:
    type: text
    substr: WINE_DEFAULT_DEBUG_CHANNEL
composite_rules:
- id: osascript-keyword
  desc: osascript keyword (case variants)
  crit: notable
  any:
  - id: micro-behaviors/process/create/script/osascript::osascript-dup
  - id: osascript-title
  - id: osascript-upper
- id: keystroke-keyword
  desc: keystroke keyword (case variants)
  crit: notable
  any:
  - id: keystroke-lower
  - id: keystroke-title
  - id: keystroke-upper
- id: key-code-phrase
  desc: key code phrase (case variants)
  crit: notable
  any:
  - id: key-code-lower
  - id: key-code-title
  - id: key-code-upper
- id: key-down-phrase
  desc: key down phrase (case variants)
  crit: notable
  any:
  - id: key-down-lower
  - id: key-down-title
  - id: key-down-upper
- id: system-events-phrase
  desc: system events phrase (case variants)
  any:
  - id: system-events-lower
  - id: system-events-title
  - id: system-events-upper
- id: applescript-keywords
  desc: AppleScript keystroke keywords
  crit: notable
  any:
  - id: keystroke-keyword
  - id: key-code-phrase
  - id: key-down-phrase
- id: jxa-keystroke-keywords
  desc: JXA keystroke keywords
  any:
  - id: keystroke-lower
  - id: keycode-camel
- id: applescript-require
  desc: Node.js AppleScript library imports
  any:
  - id: require-applescript-single
  - id: require-applescript-double
  - id: node-osascript
  - id: run-applescript
- id: python-pynput
  desc: Python pynput keyboard listener
  conf: 0.7
  any:
  - id: pynput-import-keyboard
  - id: pynput-keyboard-import
- id: js-iohook
  desc: Node.js iohook global keyboard hook
  conf: 0.75
  any:
  - id: require-iohook
  - id: import-iohook
- id: rust-rdev
  desc: Rust rdev keyboard event library
  conf: 0.65
  any:
  - id: use-rdev
  - id: extern-crate-rdev
- id: applescript-keystroke
  desc: AppleScript keystroke capture
  crit: suspicious
  conf: 0.95
  platforms: [macos]
  for: [javascript, shell, applescript]
  all:
  - id: osascript-keyword
  - id: system-events-phrase
  - id: applescript-keywords
- id: jxa-keystroke
  desc: JXA (JavaScript for Automation) keystroke
  crit: suspicious
  conf: 0.95
  platforms: [macos]
  for: [javascript]
  all:
  - id: application-call
  - id: system-events-phrase
  - id: jxa-keystroke-keywords
- id: osascript-exec-via-execsync
  desc: osascript execution via exec
  all:
  - id: osascript-keyword
  - id: micro-behaviors/process/create/shell/bridge::js-execsync
- id: node-applescript
  desc: Node.js AppleScript execution
  crit: suspicious
  conf: 0.85
  attack: T1059.002
  platforms: [macos]
  for: [javascript]
  any:
  - id: applescript-require
  - id: osascript-exec-via-execsync
- id: windows-keylogger
  desc: Windows keyboard capture API cluster
  crit: suspicious
  conf: 0.85
  platforms: [windows]
  for: [pe, c, cpp]
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
  any:
  - id: windows-rawinput
  - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
  - id: micro-behaviors/hardware/input/keyboard/hook::virtual-key-label-map
  unless:
  - id: p-user-proxy-dll
  - id: well-known/lib/sdl::sdl-runtime-component
  - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
  - id: metadata/signed/leaf::nvidia-corporation
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/package/versioning::pe-version-resource
- id: linux-keylogger
  desc: Linux keylogger pattern (multiple input
  conf: 0.85
  platforms: [linux]
  for: [elf, c, cpp]
  all:
  - id: micro-behaviors/hardware/input/keyboard/label::linux-input-device
  - id: x11-grab
- id: linux-raw-input-keylogger
  desc: Linux raw input keylogger
  crit: hostile
  conf: 0.98
  platforms: [linux]
  for: [elf, c, cpp]
  all:
  - id: linux-evdev-event-path
  any:
  - id: linux-input-devices-path
  - id: linux-input-event-struct
  - id: x11-screenshot-or-key-fallback
  unless:
  - id: objectives/collection/keylog/capture::wine-joystick-context
  - id: objectives/collection/keylog/capture::wine-debug-channel
  - id: well-known/tool/sysadmin/busybox::busybox-binary
- id: x11-screenshot-or-key-fallback
  desc: X11 screenshot or keyboard fallback
  crit: suspicious
  conf: 0.86
  for: [elf, c, cpp]
  platforms: [linux]
  any:
  - id: x11-screenshot-or-key-fallback--rx-1
  - id: x11-screenshot-or-key-fallback--rx-2
  - id: x11-screenshot-or-key-fallback--rx-3
