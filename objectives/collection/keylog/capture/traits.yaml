defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, c, cpp]
  mbc: B0015
  attack: T1056.001
  crit: suspicious
traits:
- id: p-user-proxy-dll
  desc: p_user USER32 proxy DLL marker
  crit: component
  conf: 0.9
  platforms: [windows]
  for: [pe]
  if:
    type: path
    basename: true
    exact: p_user.dll

- id: hotkey-ts-basename
  desc: Hotkey TypeScript basename
  crit: notable
  conf: 1.0
  if:
    type: path
    basename: true
    regex: ^(hotkeyInputModal\.component|hotkeys\.(service|util))\.ts$
- id: get-raw-input-data
  desc: Reads raw keyboard input buffer
  crit: component
  conf: 0.8
  platforms:
  - windows
  for: [pe, c, cpp]
  if:
    type: symbol
    exact: GetRawInputData
  unless:
  - type: basename
    exact: glfw3.dll
  - type: basename
    exact: p_user.dll
  - id: well-known/lib/dioxus::dioxus-runtime
  - id: well-known/game/mod/
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: register-raw-input-devices
  desc: Registers for raw keyboard input
  crit: component
  conf: 0.86
  platforms: [windows]
  for: [pe, c, cpp]
  if:
    type: symbol
    exact: RegisterRawInputDevices
  unless:
  - id: well-known/lib/dioxus::dioxus-runtime
  - id: well-known/game/mod/
- id: x11-grab
  desc: X11 global key grab
  crit: notable
  conf: 0.65
  platforms:
  - linux
  - macos
  for: [elf, macho, c, cpp]
  if:
    type: symbol
    exact: XGrabKey
  unless:
  - type: basename
    regex: ^lib.*\.(so|dylib)(\.\d+)*$
  - type: text
    substr: xorg
- id: go-gohook
  desc: Go robotn/gohook keyboard capture library
  conf: 0.75
  if:
    type: text
    substr: github.com/robotn/gohook
- id: pynput-import-keyboard
  desc: from pynput import keyboard
  conf: 0.5
  if:
    type: text
    substr: from pynput import keyboard
- id: pynput-keyboard-import
  desc: from pynput.keyboard import
  conf: 0.5
  if:
    type: text
    substr: from pynput.keyboard
- id: require-iohook
  desc: require("iohook")
  conf: 0.6
  if:
    type: text
    regex: require\(['"]iohook['"]\)
- id: import-iohook
  desc: from "iohook" import
  conf: 0.6
  if:
    type: text
    regex: from ['"]iohook['"]
- id: use-rdev
  desc: 'use rdev:: import statement'
  conf: 0.5
  if:
    type: text
    substr: 'use rdev::'
- id: extern-crate-rdev
  desc: extern crate rdev
  conf: 0.5
  if:
    type: text
    substr: extern crate rdev
- id: osascript-title
  desc: Osascript command (title case)
  crit: notable
  conf: 0.6
  if:
    type: text
    word: Osascript
- id: osascript-upper
  desc: OSASCRIPT command (uppercase)
  crit: notable
  conf: 0.6
  if:
    type: text
    word: OSASCRIPT
- id: keystroke-lower
  desc: keystroke keyword (lowercase)
  crit: notable
  conf: 0.7
  size_max: 10485760
  count_min: 2
  if:
    type: text
    word: keystroke
  unless:
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: well-known/lib/jline::jline-jar-basename
  - id: well-known/lib/jline/
  - id: well-known/lib/jruby/
  - id: well-known/app/tabby::tabby-basename
  - type: basename
    regex: ^(hotkeyInputModal\.component|hotkeys\.service)\.ts$
  not:
  - substr: '"name": "tabby-core"'
  - substr: 'Keystroke: '
  - substr: Observable<Keystroke>
  - substr: _keystroke = new Subject<Keystroke>()
  - substr: keyStroke
  - substr: pressedKeystroke
  - substr: lastKeystrokes
  - substr: getKeystrokeName(
- id: keystroke-title
  desc: Keystroke keyword (title case)
  crit: notable
  conf: 0.7
  size_max: 10485760
  count_min: 2
  if:
    type: text
    word: Keystroke
  unless:
  - id: objectives/collection/keylog/capture/
  - id: well-known/lib/jruby/
  not:
  - substr: '"name": "tabby-core"'
  - substr: 'Keystroke: '
  - substr: Observable<Keystroke>
  - substr: _keystroke = new Subject<Keystroke>()
  - substr: keyStroke
  - substr: pressedKeystroke
  - substr: lastKeystrokes
  - substr: getKeystrokeName(
  - substr: jline/console/ConsoleReader
  - substr: Ljline/console/ConsoleReader;
  - substr: Adobe
  - substr: Form
- id: keystroke-upper
  desc: KEYSTROKE keyword (uppercase)
  crit: notable
  conf: 0.7
  if:
    type: text
    word: KEYSTROKE
- id: key-down-lower
  desc: key down phrase (lowercase)
  crit: notable
  conf: 0.7
  size_max: 10485760
  if:
    type: text
    regex: 'key down\b'
    case_insensitive: true
  not:
  - regex: (?i)event.{0,20}key down
  - regex: (?i)holding a key down
  - regex: (?i)mouse button.{0,40}key down
  - regex: (?i)\b(ctrl|shift|alt)\s+key down\b
  unless:
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: well-known/tool/reverse-engineering/resource-hacker/
  - id: well-known/app/rdesktop/
- id: key-down-title
  desc: Key Down phrase (title case)
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: Key Down
- id: key-down-upper
  desc: KEY DOWN phrase (uppercase)
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: KEY DOWN
- id: system-events-lower
  desc: system events phrase (lowercase)
  crit: notable
  conf: 0.7
  # Require the quoted AppleScript application reference. A bare "system events"
  # substring matched ordinary prose ("ignore file system events"); the macOS
  # automation target is always referenced as application "System Events".
  if:
    type: text
    substr: '"system events"'
- id: system-events-title
  desc: System Events phrase (title case)
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)tell\s+application\s+"System Events"
- id: system-events-upper
  desc: SYSTEM EVENTS phrase (uppercase)
  crit: notable
  conf: 0.7
  # Quoted AppleScript application reference (see system-events-lower).
  if:
    type: text
    substr: '"SYSTEM EVENTS"'
- id: application-call
  desc: Application( constructor call
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: Application\(\s*['\"][A-Za-z0-9 ._-]{1,64}['\"]
- id: keycode-camel
  desc: Reads JS keyCode of keypress
  crit: notable
  conf: 0.7
  if:
    type: symbol
    exact: keyCode
- id: require-applescript-single
  desc: require('applescript') import
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: require('applescript')
- id: require-applescript-double
  desc: require("applescript") import
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: require("applescript")
- id: node-osascript
  desc: node-osascript library
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: node-osascript
- id: run-applescript
  desc: run-applescript function
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: run-applescript
- id: rawinput-message-token--wm-input
  desc: Windows raw input message token (WM_INPUT)
  crit: component
  conf: 0.72
  for: [pe, c, cpp]
  platforms: [windows]
  if:
    type: text
    word: WM_INPUT
- id: rawinput-message-token--rawinputdevice
  desc: Windows raw input message token (RAWINPUTDEVICE)
  crit: component
  conf: 0.72
  for: [pe, c, cpp]
  platforms: [windows]
  if:
    type: text
    word: RAWINPUTDEVICE
- id: rawinput-message-token--ridev-inputsink
  desc: Windows raw input message (RIDEV_INPUTSINK)
  crit: component
  conf: 0.72
  for: [pe, c, cpp]
  platforms: [windows]
  if:
    type: text
    word: RIDEV_INPUTSINK
composite_rules:
- id: rawinput-message-token
  desc: Windows raw input message token
  crit: component
  conf: 0.72
  platforms: [windows]
  for: [pe, c, cpp]
  unless:
  - id: well-known/lib/dioxus::dioxus-runtime
  - id: well-known/game/mod/
  any:
  - id: rawinput-message-token--wm-input
  - id: rawinput-message-token--rawinputdevice
  - id: rawinput-message-token--ridev-inputsink
- id: keystroke-title-recognized-marker
  desc: Keystroke title recognized marker
  crit: notable
  conf: 1.0
  any:
  - id: well-known/lib/jline::jline-jar-basename
  - id: well-known/lib/jline::console-reader-context
  - id: well-known/lib/jruby::runtime-context
  - id: metadata/file/extension/identity::declaration-file-extension
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: well-known/app/tabby::tabby-basename
  - id: hotkey-ts-basename
- id: windows-rawinput
  desc: Windows raw input capture path
  crit: notable
  conf: 0.82
  platforms: [windows]
  for: [pe, c, cpp]
  all:
  - id: get-raw-input-data
  any:
  - id: register-raw-input-devices
  - id: rawinput-message-token
  downgrade:
    any:
    - id: well-known/lib/dioxus
  unless:
  - id: metadata/build/framework::tauri-runtime
- id: osascript-keyword
  desc: osascript keyword (case variants)
  crit: notable
  any:
  - id: micro-behaviors/process/create/script/osascript::osascript-dup
  - id: osascript-title
  - id: osascript-upper
- id: keystroke-keyword
  desc: keystroke keyword (case variants)
  crit: notable
  any:
  - id: keystroke-lower
  - id: keystroke-title
  - id: keystroke-upper
- id: key-down-phrase
  desc: key down phrase (case variants)
  crit: notable
  any:
  - id: key-down-lower
  - id: key-down-title
  - id: key-down-upper
  unless:
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: metadata/file/string/artifact::linux-syscall-note-license
  - id: metadata/lang/source::linux-kernel-header-source-path
  - id: well-known/app/rdesktop/
- id: system-events-phrase
  desc: system events phrase (case variants)
  crit: component
  any:
  - id: system-events-lower
  - id: system-events-title
  - id: system-events-upper
- id: applescript-keywords
  desc: AppleScript keystroke keywords
  crit: notable
  any:
  - id: keystroke-keyword
  - id: key-down-phrase
- id: jxa-keystroke-keywords
  desc: JXA keystroke keywords
  any:
  - id: keystroke-lower
  - id: keycode-camel
- id: applescript-require
  desc: Node.js AppleScript library imports
  any:
  - id: require-applescript-single
  - id: require-applescript-double
  - id: node-osascript
  - id: run-applescript
- id: python-pynput
  desc: Python pynput keyboard listener
  conf: 0.7
  any:
  - id: pynput-import-keyboard
  - id: pynput-keyboard-import
- id: js-iohook
  desc: Node.js iohook global keyboard hook
  conf: 0.75
  any:
  - id: require-iohook
  - id: import-iohook
- id: rust-rdev
  desc: Rust rdev keyboard event library
  conf: 0.65
  any:
