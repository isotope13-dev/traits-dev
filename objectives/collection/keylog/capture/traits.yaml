defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - pe
    - elf
    - macho
    - python
    - javascript
    - powershell
  mbc: B0015
  attack: T1056.001
  crit: suspicious
traits:
  - id: windows-rawinput
    desc: Windows raw input API for
    crit: notable
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - python
      - javascript
      - powershell
    if:
      type: symbol
      regex: GetRawInputData
  - id: linux-input-device
    desc: Direct access to Linux input
    conf: 0.75
    platforms:
      - linux
    for:
      - elf
      - python
      - javascript
    if:
      type: string_value
      regex: /dev/input/event[0-9]+
  - id: x11-grab
    desc: X11 key grabbing for keylogging
    conf: 0.65
    platforms:
      - linux
      - unix
    for:
      - elf
      - python
      - javascript
    if:
      type: symbol
      regex: XGrabKey
    unless:
      - type: basename
        regex: ^lib.*\.so
      - type: string_value
        substr: xorg
  - id: macos-eventtap
    desc: macOS CGEventTap for key interception
    crit: notable
    conf: 0.7
    platforms:
      - macos
    for:
      - macho
      - python
      - javascript
    if:
      type: symbol
      regex: CGEventTapCreate
  - id: go-gohook
    desc: Go robotn/gohook keyboard capture library
    conf: 0.75
    if:
      type: string_value
      substr: github.com/robotn/gohook
  - id: pynput-import-keyboard
    desc: from pynput import keyboard
    conf: 0.5
    if:
      type: raw
      substr: from pynput import keyboard
  - id: pynput-keyboard-import
    desc: from pynput.keyboard import
    conf: 0.5
    if:
      type: string_value
      regex: from pynput\.keyboard
  - id: require-iohook
    desc: require("iohook")
    conf: 0.6
    if:
      type: raw
      regex: require\(['"]iohook['"]\)
  - id: import-iohook
    desc: from "iohook" import
    conf: 0.6
    if:
      type: string_value
      regex: from ['"]iohook['"]
  - id: use-rdev
    desc: 'use rdev:: import statement'
    conf: 0.5
    if:
      type: string_value
      regex: 'use rdev::'
  - id: extern-crate-rdev
    desc: extern crate rdev
    conf: 0.5
    if:
      type: string_value
      substr: extern crate rdev
  - id: osascript-title
    desc: Osascript command (title case)
    crit: notable
    conf: 0.6
    if:
      type: string_value
      word: Osascript
  - id: osascript-upper
    desc: OSASCRIPT command (uppercase)
    crit: notable
    conf: 0.6
    if:
      type: string_value
      word: OSASCRIPT
  - id: keystroke-lower
    desc: keystroke keyword (lowercase)
    crit: notable
    conf: 0.7
    size_max: 10485760
    if:
      type: string_value
      word: keystroke
  - id: keystroke-title
    desc: Keystroke keyword (title case)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      word: Keystroke
  - id: keystroke-upper
    desc: KEYSTROKE keyword (uppercase)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      word: KEYSTROKE
  - id: key-code-lower
    desc: key code phrase (lowercase)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: key code
    downgrade:
      any:
        - type: string_value
          substr: Virtual key code
        - type: string_value
          regex: \bVK_[A-Za-z0-9]+\b
  - id: key-code-title
    desc: Key Code phrase (title case)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: Key Code
  - id: key-code-upper
    desc: KEY CODE phrase (uppercase)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: KEY CODE
  - id: key-down-lower
    desc: key down phrase (lowercase)
    crit: notable
    conf: 0.7
    size_max: 10485760
    if:
      type: string_value
      substr: key down
    not:
      - regex: (?i)event.{0,20}key down
      - regex: (?i)holding a key down
  - id: key-down-title
    desc: Key Down phrase (title case)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: Key Down
  - id: key-down-upper
    desc: KEY DOWN phrase (uppercase)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: KEY DOWN
  - id: system-events-lower
    desc: system events phrase (lowercase)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: system events
  - id: system-events-title
    desc: System Events phrase (title case)
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: (?i)tell\s+application\s+"System Events"
  - id: system-events-upper
    desc: SYSTEM EVENTS phrase (uppercase)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: SYSTEM EVENTS
  - id: application-call
    desc: Application( constructor call
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: Application\(\s*['\"][A-Za-z0-9 ._-]{1,64}['\"]
  - id: keycode-camel
    desc: keyCode property
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: keyCode
  - id: require-applescript-single
    desc: require('applescript') import
    crit: notable
    conf: 0.7
    if:
      type: raw
      substr: require('applescript')
  - id: require-applescript-double
    desc: require("applescript") import
    crit: notable
    conf: 0.7
    if:
      type: raw
      substr: require("applescript")
  - id: node-osascript
    desc: node-osascript library
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: node-osascript
  - id: run-applescript
    desc: run-applescript function
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: run-applescript
composite_rules:
  - id: osascript-keyword
    desc: osascript keyword (case variants)
    crit: notable
    any:
      - id: micro-behaviors/process/create/script::osascript-dup
      - id: osascript-title
      - id: osascript-upper
  - id: keystroke-keyword
    desc: keystroke keyword (case variants)
    crit: notable
    any:
      - id: keystroke-lower
      - id: keystroke-title
      - id: keystroke-upper
  - id: key-code-phrase
    desc: key code phrase (case variants)
    crit: notable
    any:
      - id: key-code-lower
      - id: key-code-title
      - id: key-code-upper
  - id: key-down-phrase
    desc: key down phrase (case variants)
    crit: notable
    any:
      - id: key-down-lower
      - id: key-down-title
      - id: key-down-upper
  - id: system-events-phrase
    desc: system events phrase (case variants)
    any:
      - id: system-events-lower
      - id: system-events-title
      - id: system-events-upper
  - id: applescript-keywords
    desc: AppleScript keystroke keywords
    crit: notable
    any:
      - id: keystroke-keyword
      - id: key-code-phrase
      - id: key-down-phrase
  - id: jxa-keystroke-keywords
    desc: JXA keystroke keywords
    any:
      - id: keystroke-lower
      - id: keycode-camel
  - id: applescript-require
    desc: Node.js AppleScript library imports
    any:
      - id: require-applescript-single
      - id: require-applescript-double
      - id: node-osascript
      - id: run-applescript
  - id: python-pynput
    desc: Python pynput keyboard listener
    conf: 0.7
    any:
      - id: pynput-import-keyboard
      - id: pynput-keyboard-import
  - id: js-iohook
    desc: Node.js iohook global keyboard hook
    conf: 0.75
    any:
      - id: require-iohook
      - id: import-iohook
  - id: rust-rdev
    desc: Rust rdev keyboard event library
    conf: 0.65
    any:
      - id: use-rdev
      - id: extern-crate-rdev
  - id: applescript-keystroke
    desc: AppleScript keystroke capture
    crit: suspicious
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
      - python
      - javascript
    all:
      - id: osascript-keyword
      - id: system-events-phrase
      - id: applescript-keywords
  - id: jxa-keystroke
    desc: JXA (JavaScript for Automation) keystroke
    crit: suspicious
    conf: 0.95
    platforms:
      - macos
    for:
      - macho
      - python
      - javascript
    all:
      - id: application-call
      - id: system-events-phrase
      - id: jxa-keystroke-keywords
  - id: osascript-exec-comp
    desc: osascript execution via exec
    all:
      - id: osascript-keyword
      - id: micro-behaviors/process/create/shell/lang::js-execsync
  - id: node-applescript
    desc: Node.js AppleScript execution
    crit: suspicious
    conf: 0.85
    attack: T1059.002
    platforms:
      - macos
    for:
      - macho
      - python
      - javascript
    any:
      - id: applescript-require
      - id: osascript-exec
  - id: windows-keylogger
    desc: Windows keyboard capture API cluster
    crit: suspicious
    conf: 0.85
    platforms:
      - windows
    for:
      - pe
      - python
      - javascript
      - powershell
    needs: 2
    any:
      - id: micro-behaviors/hardware/input/keyboard::set-windows-hook
      - id: windows-rawinput
      - id: micro-behaviors/hardware/input/keyboard::get-async-key-state
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/quality/versioning::pe-version-resource
  - id: linux-keylogger
    desc: Linux keylogger pattern (multiple input
    conf: 0.85
    platforms:
      - linux
    for:
      - elf
      - python
      - javascript
    all:
      - id: linux-input-device
      - id: x11-grab
