# UI automation keystroke injection
# Detects programmatic keystroke/paste simulation used to bypass
# security prompts or inject input into other applications.
# Distinct from keylogging (passive capture): this is active injection.
defaults:
  platforms: [linux, macos, windows, unix]
  for: [scripts]
  attack: T1056.001
traits:
  - id: sendkeys-sendwait
    desc: Windows SendKeys keystroke injection
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: "SendKeys]::SendWait"

  - id: osascript-key-code
    desc: macOS AppleScript keystroke injection
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: 'System Events.{0,20}key code|System Events.{0,20}keystroke'

composite_rules:
  - id: cross-platform-keystroke-injection
    desc: Cross-platform keystroke injection (Windows + macOS)
    crit: hostile
    conf: 0.95
    all:
      - id: sendkeys-sendwait
      - id: osascript-key-code
