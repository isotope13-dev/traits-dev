# .NET Polling Keylogger Composites
# Detects VB.NET/C# RATs using GetAsyncKeyState + ToUnicodeEx + window tracking
# ATT&CK: T1056.001 (Input Capture: Keylogging)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056.001
  mbc: E1056.001
composite_rules:
  - id: dotnet-polling-keylogger
    desc: .NET polling keylogger with window context
    crit: hostile
    conf: 0.92
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
      - id: micro-behaviors/ui/window/manage/enumerate::get-window-thread-process-id
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state-str
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: well-known/tool/sysadmin/sandboxie/
        - id: well-known/lib/slint/
    unless:
      - id: metadata/binary/framework::large-rsrc-section
      - id: well-known/lib/sdl/
      - id: metadata/lang/compiled/
  - id: dotnet-keylogger-with-exfil
    desc: .NET keylogger with network exfiltration capability
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/collection/keylog/capture::dotnet-polling-keylogger
    any:
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
      - id: micro-behaviors/communications/http/client/managed::webclient
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: well-known/tool/sysadmin/sandboxie/
        - id: well-known/lib/slint/
        - id: well-known/lib/sdl/
