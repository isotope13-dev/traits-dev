defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  mbc: B0015
  attack: T1056.001
  crit: suspicious
traits:
  - id: import-pyhook
    desc: import pyHook statement
    crit: notable
    conf: 0.6
    platforms:
      - windows
    if:
      type: text
      substr: import pyHook
  - id: from-pyhook
    desc: from pyHook import
    crit: notable
    conf: 0.6
    platforms:
      - windows
    if:
      type: string_literal
      substr: from pyHook
  - id: pyhook-hookmanager
    desc: pyHook.HookManager
    crit: notable
    conf: 0.7
    platforms:
      - windows
    if:
      type: string_literal
      substr: pyHook.HookManager
  - id: import-pywinhook
    desc: import pyWinhook statement
    crit: notable
    conf: 0.6
    platforms:
      - windows
    if:
      type: text
      substr: import pyWinhook
  - id: from-pywinhook
    desc: from pyWinhook import
    crit: notable
    conf: 0.6
    platforms:
      - windows
    if:
      type: string_literal
      substr: from pyWinhook
  - id: pywinhook-hookmanager
    desc: pyWinhook.HookManager
    crit: notable
    conf: 0.7
    platforms:
      - windows
    if:
      type: string_literal
      substr: pyWinhook.HookManager
  - id: import-keyboard
    desc: import keyboard statement
    crit: component
    conf: 0.5
    if:
      type: text
      substr: import keyboard
  - id: keyboard-on-press-dup
    desc: keyboard.on_press function
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: keyboard.on_press
  - id: keyboard-hook
    desc: keyboard.hook function
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: keyboard.hook
  - id: keyboard-record
    desc: keyboard.record function
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: keyboard.record
  - id: keyboard-listener
    desc: keyboard.Listener class
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: keyboard.Listener(
  - id: on-press-eq
    desc: on_press= parameter
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: on_press\s*=
  - id: on-release-eq
    desc: on_release= parameter
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: on_release\s*=
  - id: python-hook-keyboard
    desc: Keyboard hook registration
    conf: 0.9
    if:
      type: text
      substr: .HookKeyboard()
  - id: python-keydown-handler
    desc: KeyDown event handler registration
    conf: 0.85
    if:
      type: string_literal
      regex: \.KeyDown\s*=
  - id: keydown-keyword
    desc: KeyDown keyword
    crit: component
    conf: 0.5
    if:
      type: text
      substr: KeyDown
  - id: on-press-keyword
    desc: on_press keyword
    crit: component
    conf: 0.5
    if:
      type: text
      substr: on_press
  - id: on-release-keyword
    desc: on_release keyword
    crit: component
    conf: 0.5
    if:
      type: text
      substr: on_release
composite_rules:
  - id: python-pyhook
    desc: Windows keyboard hooking (pyHook)
    conf: 0.85
    platforms:
      - windows
    any:
      - id: import-pyhook
      - id: from-pyhook
      - id: pyhook-hookmanager
  - id: python-pywinhook
    desc: Windows keyboard hooking (pyWinhook)
    conf: 0.85
    platforms:
      - windows
    any:
      - id: import-pywinhook
      - id: from-pywinhook
      - id: pywinhook-hookmanager
  - id: python-keyboard
    desc: Cross-platform keyboard capture (keyboard module)
    conf: 0.8
    all:
      - id: import-keyboard
    any:
      - id: objectives/collection/keylog/capture::keyboard-on-press-dup
      - id: keyboard-hook
      - id: keyboard-record
  - id: python-pynput-listener
    desc: Keyboard listener via pynput
    conf: 0.8
    for: [python, pyc]
    any:
      - id: keyboard-listener
      - id: objectives/collection/monitor/watch::pynput-keyboard
      - id: on-press-eq
      - id: on-release-eq
    unless:
      - id: metadata/library/gui::pynput-package-path
  - id: python-keylogger-import
    desc: Import of keylogging library
    crit: component
    conf: 0.8
    any:
      - id: import-pyhook
      - id: import-pywinhook
      - id: import-keyboard
      - id: objectives/collection/monitor/watch::pynput-keyboard
  - id: python-file-open-write
    desc: Python opens file for writing
    crit: component
    conf: 0.7
    any:
      - id: micro-behaviors/fs/write/file/direct::python-open-append
      - id: micro-behaviors/fs/write/file/direct::python-open-write-dup
  - id: python-keyboard-hook-setup
    desc: Keyboard hook setup method
    crit: notable
    conf: 0.85
    any:
      - id: python-hook-keyboard
      - id: keyboard-listener
      - id: keyboard-hook
  - id: python-network-exfil-comp
    desc: Network library for potential exfiltration
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/communications/http/request/client::request
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: micro-behaviors/communications/socket/connect::socket-module-import
    unless:
      - id: micro-behaviors/crypto/library/blockchain/
      - id: metadata/package/testing/presence/harness/
  - id: python-key-event-handlers
    desc: Key event handler callbacks
    crit: notable
    conf: 0.8
    any:
      - id: keydown-keyword
      - id: on-press-keyword
      - id: on-release-keyword
  - id: python-keylogger-file
    desc: Keylogger writing to file
    conf: 0.95
    crit: hostile
    mbc: B0015 - python
    all:
      - id: python-keylogger-import
      - id: python-file-open-write
    any:
      # Require an actual hook/listener operation.  Generic pynput imports,
      # on_press words in documentation, and unrelated file writes are common
      # in automation and UI libraries.
      - id: micro-behaviors/hardware/input/keyboard/listener::pynput-listener-constructor
      - id: python-keyboard
      - id: python-hook-keyboard
      - id: python-keydown-handler
