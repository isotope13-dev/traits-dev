defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  mbc: B0015
  attack: T1056.001
  crit: suspicious
traits:
  - id: import-pyhook
    desc: import pyHook statement
    crit: notable
    conf: 0.6
    platforms:
      - windows
    if:
      type: text
      substr: import pyHook
  - id: from-pyhook
    desc: from pyHook import
    crit: notable
    conf: 0.6
    platforms:
      - windows
    if:
      type: string_literal
      substr: from pyHook
  - id: pyhook-hookmanager
    desc: pyHook.HookManager
    crit: notable
    conf: 0.7
    platforms:
      - windows
    if:
      type: string_literal
      substr: pyHook.HookManager
  - id: import-pywinhook
    desc: import pyWinhook statement
    crit: notable
    conf: 0.6
    platforms:
      - windows
    if:
      type: text
      substr: import pyWinhook
  - id: from-pywinhook
    desc: from pyWinhook import
    crit: notable
    conf: 0.6
    platforms:
      - windows
    if:
      type: string_literal
      substr: from pyWinhook
  - id: pywinhook-hookmanager
    desc: pyWinhook.HookManager
    crit: notable
    conf: 0.7
    platforms:
      - windows
    if:
      type: string_literal
      substr: pyWinhook.HookManager
  - id: import-keyboard
    desc: import keyboard statement
    crit: component
    conf: 0.5
    if:
      type: text
      substr: import keyboard
  - id: keyboard-on-press-dup
    desc: keyboard.on_press function
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: keyboard.on_press
  - id: keyboard-hook
    desc: keyboard.hook function
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: keyboard.hook
  - id: keyboard-record
    desc: keyboard.record function
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: keyboard.record
  - id: on-press-eq
    desc: on_press= parameter
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: on_press\s*=
  - id: on-release-eq
    desc: on_release= parameter
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: on_release\s*=
  - id: python-hook-keyboard
    desc: Keyboard hook registration
    conf: 0.9
    if:
      type: text
      substr: .HookKeyboard()
  - id: python-keydown-handler
    desc: KeyDown event handler registration
    conf: 0.85
    if:
      type: string_literal
      regex: \.KeyDown\s*=
  - id: pynput-key-value-write
    desc: Writes captured pynput key value
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(write|append)\s*\([^)]{0,100}key\.(char|vk|name)'
  - id: pynput-key-value-send
    desc: Sends captured pynput key value
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(send|post)\s*\([^)]{0,100}key\.(char|vk|name)'
composite_rules:
  - id: python-pyhook
    desc: Windows keyboard hooking (pyHook)
    conf: 0.85
    platforms:
      - windows
    any:
      - id: import-pyhook
      - id: from-pyhook
      - id: pyhook-hookmanager
  - id: python-pywinhook
    desc: Windows keyboard hooking (pyWinhook)
    conf: 0.85
    platforms:
      - windows
    any:
      - id: import-pywinhook
      - id: from-pywinhook
      - id: pywinhook-hookmanager
  - id: python-keyboard
    desc: Cross-platform keyboard capture (keyboard module)
    conf: 0.8
    all:
      - id: import-keyboard
    any:
      - id: objectives/collection/keylog/capture::keyboard-on-press-dup
      - id: keyboard-hook
      - id: keyboard-record
  - id: python-keylogger-import
    desc: Import of keylogging library
    crit: component
    conf: 0.8
    any:
      - id: import-pyhook
      - id: import-pywinhook
      - id: import-keyboard
      - id: micro-behaviors/hardware/input/keyboard/listener::pynput-keyboard-import
  - id: python-file-open-write
    desc: Python opens file for writing
    crit: component
    conf: 0.7
    any:
      - id: micro-behaviors/fs/write/file/direct::python-open-append
      - id: micro-behaviors/fs/write/file/direct::python-open-write-dup
  - id: python-keyboard-hook-setup
    desc: Keyboard hook API registration
    crit: notable
    conf: 0.85
    any:
      - id: python-hook-keyboard
      - id: keyboard-hook
  - id: pynput-key-value-record
    desc: Records or sends pynput key values
    crit: suspicious
    conf: 0.92
    any:
      - id: pynput-key-value-write
      - id: pynput-key-value-send
  - id: python-custom-keyboard-capture
    desc: Python captures a low-level keyboard event stream
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::python-key-event-type
      - id: micro-behaviors/hardware/input/keyboard/hook::python-keyboard-dispatcher
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::python-low-level-keyboard-hook
      - id: micro-behaviors/hardware/input/keyboard/hook::python-async-key-state-poll
  - id: python-keylogger-file
    desc: Keylogger writing to file
    conf: 0.95
    crit: hostile
    mbc: B0015 - python
    all:
      - id: python-keylogger-import
      - id: python-file-open-write
    any:
      # Require an actual hook/listener operation.  Generic pynput imports,
      # on_press words in documentation, and unrelated file writes are common
      # in automation and UI libraries.
      - id: python-keyboard
      - id: python-hook-keyboard
      - id: python-keydown-handler
      - id: pynput-key-value-record
  - id: python-keylogger-file-with-smtp-exfil
    desc: File-backed Python keylogger sends data through SMTP
    crit: hostile
    conf: 0.96
    for: [python, pyc]
    scope: file
    all:
      - id: python-keylogger-file
      - id: micro-behaviors/communications/email/send/smtp::python-smtp-sendmail-call
