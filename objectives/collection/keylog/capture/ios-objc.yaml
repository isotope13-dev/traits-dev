defaults:
  platforms: [ios]
  for: [cpp, objc]
  attack: T1056.001

traits:
  - id: objc-ios-textfield-change
    desc: ObjC iOS text field change hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: UITextFieldTextDidChangeNotification

  - id: objc-ios-textview-change
    desc: ObjC iOS text view change hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: UITextViewTextDidChangeNotification

  - id: objc-ios-keylog-file
    desc: ObjC iOS hidden keylog file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/tmp/\.klog_|log_key_event'

composite_rules:
  - id: objc-ios-ui-keylogger
    desc: ObjC iOS UI keylogger
    crit: hostile
    conf: 0.98
    all:
      - id: objc-ios-textfield-change
      - id: objc-ios-textview-change
      - id: objc-ios-keylog-file
