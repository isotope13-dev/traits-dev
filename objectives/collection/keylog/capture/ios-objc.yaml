defaults:
  platforms: [ios]
  for: [cpp, objc]
  attack: T1056.001

traits:
  - id: objc-ios-keylog-file
    desc: ObjC iOS hidden keylog file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/tmp/\.klog_|log_key_event'

composite_rules:
  - id: objc-ios-ui-keylogger
    desc: ObjC iOS UI keylogger
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/ui/window/form-input::ios-textfield-text-change-notification
      - id: micro-behaviors/ui/window/form-input::ios-textview-text-change-notification
      - id: objc-ios-keylog-file
