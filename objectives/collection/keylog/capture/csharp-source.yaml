defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1056.001
  mbc: E1056.001

composite_rules:
  - id: csharp-low-level-keylogger-source
    desc: C# low-level keylogger source
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
      - id: micro-behaviors/hardware/input/keyboard/hook::to-unicode-ex-str
      - id: micro-behaviors/hardware/input/keyboard/hook::get-keyboard-layout-str
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::map-virtual-key
      - id: micro-behaviors/hardware/input/keyboard/layout::map-virtual-key-str

