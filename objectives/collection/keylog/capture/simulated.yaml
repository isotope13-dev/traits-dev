defaults:
  for: [binaries, c, cpp, rust, go, csharp]
  platforms: [linux, macos, windows]
  conf: 0.8

traits:
  - id: keylogger-not-implemented
    desc: 'Mentions keylogging is not implemented'
    crit: notable
    if:
      type: text
      regex: '(?i)keylog(ger|ging)?(\s+is)?\s+not\s+implemented'

  - id: keylogger-placeholder-mode
    desc: Mentions a keylogger running in placeholder mode
    crit: suspicious
    if:
      type: text
      regex: '(?i)keylog(ger|ging)?.{0,50}placeholder mode'

  - id: simulated-system-activity-log
    desc: Log message simulating system activity
    crit: notable
    if:
      id: micro-behaviors/data/text/logs/simulated::system-activity-detected-log

composite_rules:
  - id: simulated-keylogger
    desc: Simulates keylogger activity for unsupported platforms
    crit: suspicious
    all:
      - id: keylogger-not-implemented
      - id: keylogger-placeholder-mode
