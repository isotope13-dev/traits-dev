defaults:
  for: [source, binaries]
  conf: 0.8

traits:
  - id: keylogger-not-implemented
    desc: Mentions keylogging is not implemented (placeholder/mock)
    crit: notable
    if:
      type: text
      regex: '(?i)keylog(?:ger|ging)?(?:\s+is)?\s+not\s+implemented'

  - id: keylogger-placeholder-mode
    desc: Mentions a keylogger running in placeholder mode
    crit: suspicious
    if:
      type: text
      regex: '(?i)keylog(?:ger|ging)?.*placeholder mode'

  - id: simulated-system-activity-log
    desc: Log message simulating system activity
    crit: notable
    if:
      type: text
      substr: "[System Activity Detected at "

composite_rules:
  - id: simulated-keylogger
    desc: Simulates keylogger activity for unsupported platforms
    crit: suspicious
    all:
      - id: keylogger-not-implemented
      - id: keylogger-placeholder-mode
