defaults:
  platforms: [windows]
  for: [pe]
  attack: T1056.001

composite_rules:
  - id: go-rat-keylogging
    desc: Go RAT keylogging capability
    crit: suspicious
    conf: 0.9
    unless:
      - id: well-known/tool/dual-use/rclone::rclone-package-path
    all:
      - id: micro-behaviors/hardware/input/keyboard/label::keylogger-string
    any:
      - id: objectives/command-and-control/remote-command/control::go-websocket-fragment
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
