defaults:
  platforms: [windows]
  for: [pe]
  attack: T1056.001

traits:
  - id: keylogger-fragment
    desc: Keylogger command fragment
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: keylogge

composite_rules:
  - id: go-rat-keylogging
    desc: Go RAT keylogging capability
    crit: suspicious
    conf: 0.9
    all:
      - id: keylogger-fragment
    any:
      - id: objectives/command-and-control/remote-command/control::go-websocket-fragment
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
