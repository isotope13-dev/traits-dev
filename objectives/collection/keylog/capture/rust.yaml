defaults:
  platforms: [windows]
  for: [pe]
  attack: T1056.001
  mbc: B0015

traits:
  - id: rust-special-key-label-run
    desc: Rust special key label run
    crit: suspicious
    conf: 0.86
    if:
      type: hex
      section: .rdata
      pattern: 5b 42 41 43 4b 53 50 41 43 45 5d 5b 45 4e 54 45 52 5d

composite_rules:
  - id: rust-rat-key-label-collector
    desc: Rust RAT key label collector
    crit: hostile
    conf: 0.95
    all:
      - id: rust-special-key-label-run
      - id: objectives/command-and-control/backdoor/dispatch/module::rust-socketio-client-path
      - id: micro-behaviors/process/create/command-handler::execute-command-label
      - id: objectives/command-and-control/backdoor/dispatch/module::rat-auth-heartbeat-labels
