defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1056.001
  mbc: B0015
traits:
  - id: windows-lowlevel-keyboard-hook-api
    desc: Windows low-level keyboard hook API
    crit: component
    conf: 0.9
    if:
      type: text
      substr: SetWindowsHookExW
  - id: windows-lowlevel-keyboard-hook-const
    desc: Windows low-level keyboard hook constant
    crit: component
    conf: 0.9
    if:
      type: text
      substr: WH_KEYBOARD_LL
  - id: linux-input-devices-proc
    desc: Linux input device registry access
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /proc/bus/input/devices
  - id: linux-evdev-input-path
    desc: Linux evdev keyboard path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /dev/input/event
  - id: macos-cgevent-tap-create
    desc: macOS CGEvent tap creation
    crit: component
    conf: 0.9
    if:
      type: text
      substr: CGEvent.tapCreate
  - id: macos-swiftc-eventtap-helper
    desc: Compiles Swift event tap helper
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'Command::new("swiftc")'
composite_rules:
  - id: rust-windows-lowlevel-keylogger
    desc: Rust Windows low-level keylogger
    crit: suspicious
    conf: 0.95
    all:
      - id: windows-lowlevel-keyboard-hook-api
      - id: windows-lowlevel-keyboard-hook-const
  - id: rust-linux-evdev-keylogger
    desc: Rust Linux evdev keylogger
    crit: suspicious
    conf: 0.95
    all:
      - id: linux-input-devices-proc
      - id: linux-evdev-input-path
  - id: rust-macos-eventtap-keylogger
    desc: Rust macOS event tap keylogger
    crit: suspicious
    conf: 0.95
    all:
      - id: macos-cgevent-tap-create
      - id: macos-swiftc-eventtap-helper
