# JavaScript wrappers around native global keyboard listeners.
defaults:
  platforms: [windows, macos, linux]
  for: [javascript, typescript]
  attack: T1056.001
  mbc: B0015

traits:
  - id: global-keyboard-listener-description
    desc: Global keyboard listener or key logger marker
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(?i)global\s+(keyboard|key)\s+listener|key-?loggers?'

  - id: native-key-event-stream
    desc: Parses and forwards native key events
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '_getEventData\s*\(|listener\s*\(event\)|stdout\s*\.\s*on\s*\(\s*data'

composite_rules:
  - id: javascript-native-global-key-capture
    desc: JavaScript launches a native global key capture helper
    crit: hostile
    conf: 0.98
    all:
      - id: global-keyboard-listener-description
      - id: native-key-event-stream
      - id: micro-behaviors/process/create/system::js-execfile-call
