defaults:
  platforms: [android]
  for: [apk, zip]

composite_rules:
  - id: android-accessibility-keyboard-capture
    desc: Android accessibility keyboard capture
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-service-config
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-request-layout
      - id: micro-behaviors/hardware/input/keyboard::android-custom-keyboard-resources
      - id: micro-behaviors/os/privilege/manifest::device-admin-policy-resource
    any:
      - id: micro-behaviors/hardware/input/accessibility::android-miui-accessibility-layout
      - id: micro-behaviors/os/privilege/check::android-oppo-battery-settings-layout
