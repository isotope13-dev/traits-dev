defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
- id: react-props-internal-access
  desc: React __reactProps$ scraping
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: __reactProps$
  unless:
    - id: metadata/library/react/
    - id: metadata/library/structure::js-large-minified-bundle
    - id: metadata/library/structure::js-dist-asset-bundle
    - type: text
      substr: "* @license React"

- id: react-event-handlers-access
  desc: React event handler scraping
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: __reactEventHandlers$
  unless:
    - id: metadata/library/react/
    - id: metadata/library/structure::js-large-minified-bundle
    - id: metadata/library/structure::js-dist-asset-bundle
    - type: text
      substr: "* @license React"

- id: primevideo-player-infobar
  desc: Prime Video player infobar
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: .atvwebplayersdk-infobar-container

- id: primevideo-update-stream-path
  desc: Prime Video UpdateStream path
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: /cdp/usage/UpdateStream

- id: titleid-query-read
  desc: Reads titleId query parameter
  crit: component
  conf: 0.95
  if:
    type: text
    substr: url.searchParams.get("titleId")

composite_rules:
- id: primevideo-react-view-tracking
  desc: Prime Video React view scraping
  crit: suspicious
  conf: 0.98
  all:
  - id: react-event-handlers-access
  - id: primevideo-player-infobar

- id: primevideo-playback-start-monitor
  desc: Prime Video playback start monitor
  crit: notable
  conf: 0.97
  all:
  - id: primevideo-update-stream-path
  - id: titleid-query-read
