# C# ad-fraud and affiliate-conversion emulation.
defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1496
  mbc: B0029

traits:
  - id: csharp-browser-emulation-agent
    desc: Browser-emulating HTTP agent
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "agent.EmulateBrowser();"
  - id: csharp-recursive-pixel-crawl
    desc: Recursive conversion pixel crawler
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "Program.GetRecursivePixels(agent, url2);"
  - id: csharp-html-pixel-src-extraction
    desc: Extracts tracking pixels from HTML
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "DataExtractor.ExtractDataArray(html, \"<IMG src="
  - id: csharp-google-conversion-builder
    desc: Builds Google ad conversion URL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "createGoogleAdServicesURL"
  - id: csharp-utm-cookie-forgery
    desc: Forges UTM tracking cookies
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "cookies.Add(uri1, Program.createCookie(\"__utma\""
  - id: csharp-utm-gif-tracker
    desc: Google Analytics GIF tracker template
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "__utm.gif?utmwv="
  - id: csharp-http-download-start-delete
    desc: Download execute then delete helper
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'getURL2File[\s\S]{0,180}Process\.Start[\s\S]{0,120}File\.Delete'

composite_rules:
  - id: csharp-affiliate-conversion-fraud
    desc: C# affiliate conversion fraud emulator
    crit: hostile
    conf: 0.96
    all:
      - id: csharp-browser-emulation-agent
      - id: csharp-recursive-pixel-crawl
    any:
      - id: csharp-html-pixel-src-extraction
      - id: csharp-google-conversion-builder
      - id: csharp-utm-cookie-forgery
      - id: csharp-utm-gif-tracker
    needs: 3
  - id: csharp-adware-download-exec-helper
    desc: C# adware download execute helper
    crit: suspicious
    conf: 0.92
    all:
      - id: csharp-browser-emulation-agent
      - id: csharp-http-download-start-delete
