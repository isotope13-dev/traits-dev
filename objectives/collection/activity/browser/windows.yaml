defaults:
  platforms: [windows]
  for: [pe, source]
  attack: T1217
traits:
- id: firefox-history-sql-query
  desc: Firefox history SQL query
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: SELECT.{0,80}url.{0,40}title.{0,40}visit_count.{0,80}FROM\s+moz_places
    case_insensitive: true
- id: firefox-history-table-reference
  desc: Firefox moz_places history table
  crit: notable
  conf: 0.78
  if:
    type: text
    word: moz_places
- id: browser-history-controller-cpp
  desc: Browser history controller source marker
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: BrowserHistoryController.cpp
- id: history-reader-cpp
  desc: History reader source marker
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: HistoryReader.cpp
- id: browser-profile-cpp
  desc: Browser profile source marker
  crit: notable
  conf: 0.96
  if:
    type: text
    substr: BrowserProfile.cpp
- id: browser-history-parse-exception
  desc: Browser history parsing exception class
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: BrowserHistoryParseException
- id: chrome-reader-exception
  desc: Chromium history reader exception class
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: ChromeReaderException
- id: firefox-profile-exception
  desc: Firefox profile parsing exception class
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: FirefoxProfileException
- id: browser-process-name-main
  desc: Common browser process names
  crit: component
  conf: 0.8
  for: [pe, dll, csharp, source]
  if:
    type: text
    regex: '(?i)\b(chrome|msedge|firefox)\.exe\b'
- id: browser-process-name-alt
  desc: Alternate Chromium browser process names
  crit: component
  conf: 0.78
  for: [pe, dll, csharp, source]
  if:
    type: text
    regex: '(?i)\b(brave|opera|vivaldi)\.exe\b'
composite_rules:
- id: firefox-history-harvest
  desc: Firefox history database harvesting
  crit: suspicious
  conf: 0.93
  all:
  - id: firefox-history-sql-query
  any:
  - id: micro-behaviors/data/db/conn/sqlite
  - id: objectives/discovery/host/browser::places-sqlite
- id: browser-history-parser-components
  desc: Browser history parsing implementation markers
  crit: notable
  conf: 0.97
  any:
  - id: browser-history-controller-cpp
  - id: history-reader-cpp
  - id: browser-profile-cpp
  needs: 2
- id: browser-history-collection
  desc: Multi-browser history collection via embedded parser
  crit: suspicious
  conf: 0.95
  all:
  - id: browser-history-parser-components
  - id: micro-behaviors/data/db/conn/sqlite
  any:
  - id: browser-history-parse-exception
  - id: chrome-reader-exception
  - id: firefox-profile-exception
- id: browser-history-telemetry
  desc: Browser history collection with network telemetry path
  crit: suspicious
  conf: 0.96
  all:
  - id: browser-history-collection
  any:
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-session-connect-flow
  - id: micro-behaviors/communications/http/get::internet-open
- id: browser-addressbar-ui-automation
  desc: Foreground browser address bar monitoring through UI Automation
  crit: suspicious
  conf: 0.92
  for: [pe, dll, csharp, source]
  all:
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/ui/window/manage/control::ui-automation-edit-value-read
  any:
  - id: browser-process-name-main
  - id: browser-process-name-alt
