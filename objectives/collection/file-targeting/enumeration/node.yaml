defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1033,T1005

traits:
  - id: node-exec-account-file-command
    desc: Node command reads the Unix passwd file
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '(?i)\bexec\s*\(\s*[''"`][^''"`]{0,80}/etc/passwd\b'

composite_rules:
  - id: node-exec-account-file-collection
    desc: Node executes a shell command to collect Unix account data
    crit: hostile
    conf: 0.99
    attack: T1033,T1005,T1059.004
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-exec
      - id: node-exec-account-file-command

  - id: node-child-process-account-output
    desc: Node child-process code collects and emits Unix account data
    crit: hostile
    conf: 0.99
    attack: T1033,T1005,T1059.004
    all:
      - id: metadata/import/builtin::require-child-process
      - id: node-exec-account-file-command
      - id: micro-behaviors/process/fd/stdio::stdout-string
