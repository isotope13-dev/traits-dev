defaults:
  platforms: [unix, windows]
  for: [java, class, kotlin]
  attack: T1083
composite_rules:
  - id: java-sensitive-file-access
    desc: Java script accessing sensitive system files
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-bytecode
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/os/privilege/paths::etc-shadow-bytecode
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
      - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
    unless:
      - id: metadata/package/documentation::unix-manpage
      - id: well-known/tool/sysadmin/nmap::nmap-nse-script-path
      - id: well-known/app/util-linux::util-linux-translation-path
