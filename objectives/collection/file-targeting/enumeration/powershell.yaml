defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1083

traits:
  - id: powershell-placeholder-recursive-enumeration
    desc: PowerShell templated recursive file enumeration
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Get-ChildItem\s+["'']~STARTDIR~["'']\s+-Recurse\s+-Depth\s+~DEPTH~'
      case_insensitive: true

  - id: powershell-quiet-fullname-collection
    desc: PowerShell quietly enumerates full paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Get-ChildItem[^\r\n]{0,320}SilentlyContinue[^\r\n]{0,320}\.FullName'
      case_insensitive: true
    unless:
      - id: well-known/app/drivers/
      - id: well-known/app/meshcentral::meshcentral-windows-agent-installer-context

composite_rules:
  - id: powershell-templated-file-enumeration
    desc: PowerShell templated file enumeration
    crit: suspicious
    conf: 0.92
    all:
      - id: powershell-placeholder-recursive-enumeration
      - id: powershell-quiet-fullname-collection
