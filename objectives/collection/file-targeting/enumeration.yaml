# File Enumeration Pattern
# Detects malware searching files for encryption/infection
# Generic indicator for ransomware, worms, data exfiltration
# file-find-api removed - use micro-behaviors/fs/enumerate/directory::find-first-file-ex instead
defaults:
  platforms: [windows]
  for: [pe]
  mbc: "C0000"
  attack: "T1083"
composite_rules:
  - id: file-enumeration-targeting
    desc: File system enumeration pattern
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/fs/enumerate/directory::find-first-file
      - id: micro-behaviors/fs/enumerate/directory::find-next-file
    downgrade:
      any:
        - id: metadata/package/quality::versioned
        - id: metadata/binary/metrics/size::large-file-1mb
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/file/text/string::is-windows-named
        - id: metadata/binary/metrics/size::tiny-pe
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
  - id: file-enumeration-with-access
    desc: File enumeration + access combination
    crit: suspicious
    conf: 0.9
    all:
      - id: file-enumeration-targeting
      - id: micro-behaviors/fs/file/open/
    downgrade:
      any:
        - id: metadata/package/quality::versioned
        - id: metadata/binary/metrics/size::large-file-1mb
        - id: metadata/binary/metrics/structural::many-imports
