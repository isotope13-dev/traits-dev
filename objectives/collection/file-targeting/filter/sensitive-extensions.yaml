defaults:
  platforms: [windows, unix]
  for: [python, javascript, powershell, perl, pe]
  attack: T1005
  mbc: B0024
  crit: suspicious
traits:
  - id: ppk-extension
    desc: PuTTY private key (.ppk) extension
    crit: notable
    conf: 0.75
    attack: T1552.004
    if:
      type: text
      regex: \.ppk\b|["']\.ppk["']
    unless:
      - id: metadata/package/config::sensitive-file-exclusion-list
  - id: asc-extension
    desc: .asc filename extension fragment
    crit: component
    conf: 0.7
    attack: T1552.004
    unless:
      - id: metadata/package/documentation::unix-manpage
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/tool/sysadmin/ripgrep/
    if:
      type: text
      regex: '(^|[/*"''])[\w.-]*\.asc\b'
  - id: rdp-extension
    desc: Remote Desktop Protocol extension
    crit: notable
    conf: 0.75
    attack: T1552.004
    if:
      type: text
      regex: '(^|[/\\"''])[\w.-]{1,120}\.rdp($|["'']|[\s?#,)])'
  - id: gpg-extension
    desc: GPG key material extension
    crit: notable
    conf: 0.8
    attack: T1552.004
    if:
      type: text
      regex: \.gpg\b|["']\.gpg["']
  - id: java-keystore-extension
    desc: Java keystore extension
    crit: notable
    conf: 0.8
    attack: T1552.004
    if:
      type: text
      regex: \.(jks|keystore)\b|["']\.(jks|keystore)["']
    unless:
      - id: metadata/package/config::sensitive-file-exclusion-list
  - id: wallet-extension
    desc: Cryptocurrency wallet path extension
    crit: notable
    conf: 0.85
    attack: T1555
    if:
      type: text
      # Require a path separator or a glob marker. Translation keys such as
      # `wallet-pass-gallery.wallet` are not file targeting.
      regex: '(?i)[/\\*][^\r\n]{0,120}\.wallet\b'
  # Bare `.mnemonic` is ambiguous (TCR-name file formats, assembler mnemonics,
  # memory-aid files), so on its own it is not a wallet-seed signal — it only
  # counts inside a crypto-wallet context (see mnemonic-seed-wallet-context).
  - id: mnemonic-extension
    desc: Mnemonic file extension
    crit: component
    conf: 0.9
    attack: T1555
    if:
      type: string_literal
      regex: (^|[/*])[\w-]*\.mnemonic\b
  - id: mnemonic-extension-wide-glob
    desc: Wide mnemonic seed glob
    crit: suspicious
    conf: 0.95
    for: [pe]
    platforms: [windows]
    attack: T1555
    if:
      type: hex
      pattern: "2A 00 2E 00 6D 00 6E 00 65 00 6D 00 6F 00 6E 00 69 00 63 00"
      section: .rdata
  - id: wallet-seed-keyword-glob-pe
    desc: Wallet seed keyword glob
    crit: suspicious
    conf: 0.97
    for: [pe, dll]
    platforms: [windows]
    attack: T1555
    if:
      type: text
      substr: "*wallet*|*seed*|*mnemonic*|*phrase*|*backup*|*recovery*|*12words*|*24words*"
  - id: seed-extension
    desc: Seed phrase file extension
    crit: component
    conf: 0.85
    attack: T1555
    if:
      type: text
      regex: '(^|[/*])[\w.-]*\.seed\b|["'']\.seed["'']'
    unless:
      - type: text
        substr: /vnd.fdsn.seed
  - id: seed-extension-wide-glob
    desc: Wide seed phrase glob
    crit: suspicious
    conf: 0.95
    for: [pe]
    platforms: [windows]
    attack: T1555
    if:
      type: hex
      pattern: "2A 00 2E 00 73 00 65 00 65 00 64 00"
      section: .rdata
  - id: dat-extension
    desc: Generic data extension
    crit: component
    conf: 0.4
    if:
      type: text
      regex: \.dat\b|["']\.dat["']
  - id: sql-extension
    desc: SQL database extension
    crit: component
    conf: 0.5
    if:
      type: text
      regex: \.sql\b|["']\.sql["']
  - id: conf-extension
    desc: Config file extension
    crit: component
    conf: 0.4
    attack: T1552.001
    unless:
      - id: metadata/library/structure/
    if:
      type: text
      regex: \.conf\b|["']\.conf["']
  - id: hex-wallet-extension
    desc: Hex-escaped wallet extension
    crit: suspicious
    conf: 0.95
    attack: T1555
    for: [perl]
    if:
      type: text
      exact: \x2E\x77\x61\x6C\x6C\x65\x74
  - id: hex-pem-extension
    desc: Hex-escaped PEM extension
    crit: suspicious
    conf: 0.92
    attack: T1552.004
    for: [perl]
    if:
      type: text
      exact: \x2E\x70\x65\x6D
  - id: hex-ovpn-extension
    desc: Hex-escaped OVPN extension
    crit: suspicious
    conf: 0.92
    attack: T1552.001
    for: [perl]
    if:
      type: text
      exact: \x2E\x6F\x76\x70\x6E
  - id: hex-kdbx-extension
    desc: Hex-escaped KDBX extension
    crit: suspicious
    conf: 0.95
    attack: T1555.005
    for: [perl]
    if:
      type: text
      exact: \x2E\x6B\x64\x62\x78
  - id: hex-cookies-sqlite
    desc: Hex-escaped cookies.sqlite target
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    for: [perl]
    if:
      type: text
      exact: \x63\x6F\x6F\x6B\x69\x65\x73\x2E\x73\x71\x6C\x69\x74\x65
  - id: hex-logins-json
    desc: Hex-escaped logins.json target
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    for: [perl]
    if:
      type: text
      exact: \x6C\x6F\x67\x69\x6E\x73\x2E\x6A\x73\x6F\x6E
  - id: hex-key4-db
    desc: Hex-escaped key4.db target
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    for: [perl]
    if:
      type: text
      exact: \x6B\x65\x79\x34\x2E\x64\x62
composite_rules:
  - id: credential-files
    desc: Targets credential and remote-access files
    crit: notable
    conf: 0.85
    attack: T1552.004
    needs: 2
    any:
      - id: ppk-extension
      - id: micro-behaviors/fs/path/sensitive/credentials::pem-file-extension-reference
      - id: asc-extension
      - id: rdp-extension
      - id: micro-behaviors/fs/path/sensitive/credentials::vpn-tls-client-cert-refs
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: metadata/package/config::sensitive-file-exclusion-list
  - id: mnemonic-seed-ambiguous-ext
    desc: Bare mnemonic/seed file extension
    crit: component
    conf: 0.9
    any:
      - id: mnemonic-extension
      - id: seed-extension
  # Bare `.mnemonic`/`.seed` extensions only signal wallet-seed targeting when
  # the file is already about crypto wallets. Gate them on the existing
  # wallet-keyword clusters so legitimate non-wallet uses of those extensions
  # (e.g. tcrsift's `.mnemonic` TCR-name file format) don't reach a verdict.
  - id: mnemonic-seed-wallet-marker
    desc: Mnemonic/seed extension in a crypto-wallet marker
    crit: suspicious
    conf: 0.9
    attack: T1555
    all:
      - id: mnemonic-seed-ambiguous-ext
    any:
      - id: objectives/collection/stealer/wallet::crypto-wallet-keyword-cluster
      - id: objectives/collection/stealer/wallet::hardware-wallet-keyword-cluster
  - id: wallet-files
    desc: References cryptocurrency wallet files
    crit: notable
    conf: 0.9
    attack: T1555
    any:
      - id: wallet-extension
      - id: mnemonic-extension-wide-glob
      - id: seed-extension-wide-glob
      - id: hex-wallet-extension
      - id: hex-kdbx-extension
      - id: mnemonic-seed-wallet-marker
  - id: mnemonic-seed-files
    desc: Targets mnemonic seed files
    crit: suspicious
    conf: 0.92
    attack: T1555
    any:
      - id: mnemonic-extension-wide-glob
      - id: seed-extension-wide-glob
      - id: wallet-seed-keyword-glob-pe
      - id: mnemonic-seed-wallet-marker
  - id: hex-browser-secret-files
    desc: Hex-escaped browser secret stores
    crit: suspicious
    conf: 0.97
    attack: T1555.003
    for: [perl]
    needs: 2
    any:
      - id: hex-cookies-sqlite
      - id: hex-logins-json
      - id: hex-key4-db
  - id: hex-stealer-extension-list
    desc: Hex-escaped stealer file target list
    crit: hostile
    conf: 0.99
    for: [perl]
    needs: 4
    any:
      - id: hex-wallet-extension
      - id: hex-kdbx-extension
      - id: hex-ovpn-extension
      - id: hex-pem-extension
      - id: hex-cookies-sqlite
      - id: hex-logins-json
      - id: hex-key4-db
  - id: stealer-extension-list
    desc: Comprehensive extension targeting
    crit: hostile
    conf: 0.95
    size_max: 262144
    all:
      - id: micro-behaviors/fs/enumerate/directory/
    needs: 5
    any:
      - id: ppk-extension
      - id: micro-behaviors/fs/path/sensitive/credentials::pem-file-extension-reference
      - id: asc-extension
      - id: rdp-extension
      - id: micro-behaviors/fs/path/sensitive/credentials::vpn-tls-client-cert-refs
      - id: metadata/file/extension/encrypted::credential-file-extension--kdbx
      - id: wallet-extension
      - id: metadata/file/extension/identity::key-extension
      - id: sql-extension
      - id: conf-extension
      - id: micro-behaviors/fs/path/extension::database-file-extension-reference
      - id: micro-behaviors/fs/path/extension::sqlite-file-extension-reference
  - id: dense-extension-list
    desc: Dense sensitive extension list
    crit: suspicious
    conf: 0.9
    size_max: 262144
    unless:
      - id: metadata/package/config::sensitive-file-exclusion-list
    needs: 8
    any:
      - id: ppk-extension
      - id: micro-behaviors/fs/path/sensitive/credentials::pem-file-extension-reference
      - id: asc-extension
      - id: rdp-extension
      - id: micro-behaviors/fs/path/sensitive/credentials::vpn-tls-client-cert-refs
      - id: metadata/file/extension/encrypted::credential-file-extension--kdbx
      - id: wallet-extension
      - id: metadata/file/extension/identity::key-extension
      - id: sql-extension
      - id: conf-extension
      - id: metadata/file/extension/identity::json-extension
      - id: dat-extension
      - id: micro-behaviors/fs/path/extension::database-file-extension-reference
      - id: micro-behaviors/fs/path/extension::sqlite-file-extension-reference
      - id: dat-extension
