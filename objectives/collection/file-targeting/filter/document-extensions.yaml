defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1083
traits:
  # Quoted office/text document extension literal — a file-targeting-by-
  # extension fragment. Referenced by stealer composites (e.g. crypto-stealer)
  # that also sweep documents; it is not itself wallet- or credential-specific.
  - id: document-extension-literal
    desc: References a document filename extension
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "['\"`]\\.(docx?|xlsx?|txt)['\"`]"
