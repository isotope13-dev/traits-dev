defaults:
  platforms: [android]
  for: [apk, zip, java, kotlin]

traits:
  - id: android-pdf-word-mime
    desc: Android PDF Word MIME targeting
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: "application/(pdf|msword|vnd\\.ms-)"
  - id: android-ooxml-mime
    desc: Android Office XML MIME targeting
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: application/vnd.openxmlformats-officedocument
  - id: android-javascript-mime
    desc: Android JavaScript file MIME targeting
    crit: suspicious
    conf: 0.86
    if:
      type: raw
      substr: text/javascript
  - id: android-image-mime
    desc: Android image MIME target filter
    crit: notable
    conf: 0.88
    unless:
      - id: well-known/app/pandoc::package-path
    if:
      type: raw
      regex: "image/[a-z0-9.+_-]{1,40}"
  - id: android-audio-mime
    desc: Android audio MIME targeting
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: "audio/[A-Za-z0-9.+_-]{1,40}"
  - id: android-video-mime
    desc: Android video MIME targeting
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: "video/[A-Za-z0-9.+_-]{1,40}"
  - id: android-zip-rar-mime
    desc: Android ZIP RAR MIME targeting
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: "application/(zip|x-rar-compressed)"
  - id: android-7z-tar-mime
    desc: Android 7z TAR MIME targeting
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: "application/(x-7z-compressed|x-tar)"
  - id: android-apk-json-mime
    desc: Android APK MIME targeting
    crit: suspicious
    conf: 0.88
    unless:
      - id: well-known/tool/development/gnat::compiler
    if:
      type: raw
      substr: application/vnd.android.package-archive
  - id: android-backup-ttkm-name
    desc: Android TTKM backup name
    crit: component
    conf: 0.92
    unless:
      - id: well-known/tool/development/gnat::compiler
    if:
      type: raw
      substr: ttkmbackup
      case_insensitive: true
  - id: android-backup-path-name
    desc: Android backup path name
    crit: component
    conf: 0.92
    unless:
      - id: well-known/tool/development/gnat::compiler
    if:
      type: raw
      regex: "(?i)[/. _-]backup[/. _-]"
  - id: android-backup-file-name
    desc: Android backup file name
    crit: component
    conf: 0.92
    unless:
      - id: well-known/tool/development/gnat::compiler
    if:
      type: raw
      regex: "(?i)[/. _-]backup(file|data|dir|path)"
  - id: android-recent-file-filter
    desc: Android recently modified file filter
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: "lastModified\\(\\)|lastModified\\s*[<>=]|NewFilesWorker"

composite_rules:
  - id: android-user-media-file-targeting
    desc: Android user media file targeting
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/os/privilege/manifest::read-external-storage
    needs: 2
    any:
      - id: micro-behaviors/fs/path/media

  - id: android-media-and-clipboard-access
    desc: Android media clipboard access
    crit: suspicious
    conf: 0.94
    all:
      - id: android-user-media-file-targeting
    any:
      - id: micro-behaviors/os/clipboard/access::clipboard-manager
      - id: micro-behaviors/os/clipboard/access::set-primary-clip

  - id: android-mime-file-exfil-targeting
    desc: Android targets files by MIME category
    crit: suspicious
    conf: 0.96
    any:
      - id: android-pdf-word-mime
      - id: android-ooxml-mime
      - id: android-javascript-mime
      - id: android-image-mime
      - id: android-audio-mime
      - id: android-video-mime
      - id: android-zip-rar-mime
      - id: android-7z-tar-mime
      - id: android-apk-json-mime
    needs: 2

  - id: android-backup-and-recent-file-sweep
    desc: Android backup and recent file sweep
    crit: suspicious
    conf: 0.95
    all:
      - id: android-backup-name-sweep
      - id: android-recent-file-filter
  - id: android-backup-name-sweep
    desc: Android backup filename sweep
    crit: component
    conf: 0.92
    any:
      - id: android-backup-ttkm-name
      - id: android-backup-path-name
      - id: android-backup-file-name
