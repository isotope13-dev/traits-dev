defaults:
  platforms: [android]
  for: [java, kotlin]

traits:
  - id: android-pdf-word-mime
    desc: Document MIME file category
    crit: component
    conf: 0.9
    if:
      type: string_literal
      regex: "application/(pdf|msword|vnd\\.ms-)"
  - id: android-ooxml-mime
    desc: Office XML MIME file category
    crit: component
    conf: 0.9
    if:
      type: string_literal
      substr: application/vnd.openxmlformats-officedocument
  - id: android-javascript-mime
    desc: JavaScript MIME file category
    crit: component
    conf: 0.86
    if:
      type: string_literal
      substr: text/javascript
  - id: android-image-mime
    desc: Image MIME file category
    crit: component
    conf: 0.88
    unless:
      - id: well-known/app/pandoc::package-path
    if:
      type: string_literal
      regex: "image/[a-z0-9.+_-]{1,40}"
  - id: android-audio-mime
    desc: Audio MIME file category
    crit: component
    conf: 0.88
    if:
      type: string_literal
      regex: "audio/[A-Za-z0-9.+_-]{1,40}"
    not:
    - regex: 'audio/[^"'';\s]{1,40}\.(wav|mp3|ogg|aac|flac|m4a)'
    unless:
    - id: metadata/library/runtime::acquire-vscode-api
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: android-video-mime
    desc: Video MIME file category
    crit: component
    conf: 0.88
    if:
      type: string_literal
      regex: "video/[A-Za-z0-9.+_-]{1,40}"
  - id: android-zip-rar-mime
    desc: ZIP/RAR MIME file category
    crit: component
    conf: 0.88
    if:
      type: string_literal
      regex: "application/(zip|x-rar-compressed)"
  - id: android-7z-tar-mime
    desc: 7z/TAR MIME file category
    crit: component
    conf: 0.88
    if:
      type: string_literal
      regex: "application/(x-7z-compressed|x-tar)"
  - id: android-backup-ttkm-name
    desc: Android TTKM backup name
    crit: component
    conf: 0.92
    unless:
      - id: well-known/tool/development/gnat
    if:
      type: text
      substr: ttkmbackup
      case_insensitive: true
  - id: android-backup-path-name
    desc: Android backup path name
    crit: component
    conf: 0.92
    unless:
      - id: well-known/tool/development/gnat
    if:
      type: text
      regex: "(?i)[/. _-]backup[/. _-]"
  - id: android-backup-file-name
    desc: Android backup file name
    crit: component
    conf: 0.92
    unless:
      - id: well-known/tool/development/gnat
    if:
      type: text
      regex: "(?i)[/. _-]backup(file|data|dir|path)"
  - id: android-recent-file-filter
    desc: Android recently modified file filter
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: "lastModified\\(\\)|lastModified\\s*[<>=]|NewFilesWorker"

composite_rules:
  - id: android-user-media-file-targeting
    desc: Android user media file targeting
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/os/privilege/manifest::read-external-storage
    needs: 2
    any:
      - id: micro-behaviors/fs/path/media

  - id: android-media-and-clipboard-access
    desc: Android media clipboard access
    crit: suspicious
    conf: 0.94
    all:
      - id: android-user-media-file-targeting
    any:
      - id: micro-behaviors/os/clipboard/access::clipboard-manager
      - id: micro-behaviors/os/clipboard/access::set-primary-clip

  - id: android-mime-file-exfil-targeting
    desc: Android targets files by MIME category
    crit: suspicious
    conf: 0.96
    all:
      - id: android-external-storage-access
    any:
      - id: android-pdf-word-mime
      - id: android-ooxml-mime
      - id: android-javascript-mime
      - id: android-image-mime
      - id: android-audio-mime
      - id: android-video-mime
      - id: android-zip-rar-mime
      - id: android-7z-tar-mime
      - id: micro-behaviors/os/package-manager/install::android-apk-mime-type
    needs: 2

  - id: android-external-storage-access
    desc: Android external storage access
    crit: component
    conf: 0.95
    any:
      - id: micro-behaviors/os/privilege/manifest::read-external-storage
      - id: micro-behaviors/os/privilege/manifest::write-external-storage
      - id: micro-behaviors/os/privilege/manifest::manage-external-storage

  - id: android-backup-and-recent-file-sweep
    desc: Android backup and recent file sweep
    crit: suspicious
    conf: 0.95
    all:
      - id: android-backup-name-sweep
      - id: android-recent-file-filter
  - id: android-backup-name-sweep
    desc: Android backup filename sweep
    crit: component
    conf: 0.92
    any:
      - id: android-backup-ttkm-name
      - id: android-backup-path-name
      - id: android-backup-file-name
