defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1119

traits:
- id: image-selection-control
  desc: Injected image selection control
  crit: notable
  conf: 0.9
  ref: sha256:4fcdbf8912196b7e1541615dc3c51b0715aa125d1a223387055231551d255e70
  for: [javascript, typescript]
  if:
    type: text
    regex: '(image-select-button|select-clothing-button)'

composite_rules:
- id: all-site-extension-image-selection
  desc: All-site extension selects page images
  crit: suspicious
  conf: 0.94
  ref: sha256:4fcdbf8912196b7e1541615dc3c51b0715aa125d1a223387055231551d255e70
  scope: archive
  all:
  - id: image-selection-control
  - id: micro-behaviors/ui/window/manage/dom::browser-enumerates-page-images
  - id: metadata/permission/manifest::host-permission-all-urls
  any:
  - id: metadata/permission/host::content-script-all-sites
  - id: metadata/permission/manifest::permission-tabs
