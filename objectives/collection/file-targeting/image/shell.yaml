defaults:
  platforms: [unix]
  for: [shell]
  attack: T1005
  mbc: B0024
composite_rules:
  - id: png-magic-file-collection
    desc: PNG files collected by magic bytes
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/directory/traverse::find-type-file
      - id: micro-behaviors/data/format/media/magic::shell-png-magic-validation
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
    near_lines: 80
