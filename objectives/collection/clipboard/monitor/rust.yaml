defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1115
traits:
  - id: rust-pbpaste-command
    desc: Rust invokes macOS pbpaste
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: 'Command::new("pbpaste")'
  - id: rust-powershell-get-clipboard
    desc: Rust invokes PowerShell Get-Clipboard
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Get-Clipboard
  - id: rust-xclip-command
    desc: Rust invokes xclip clipboard
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: xclip
  - id: rust-wl-paste-command
    desc: Rust invokes wl-paste clipboard
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: wl-paste
  - id: rust-clipboard-loop-statement
    desc: Rust loop statement marker
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'loop\s*\{'
  - id: rust-clipboard-while-loop
    desc: Rust while loop marker
    crit: component
    conf: 0.75
    if:
      type: text
      regex: 'while\s+'
  - id: rust-clipboard-tokio-interval
    desc: Rust Tokio interval marker
    crit: component
    conf: 0.85
    if:
      type: text
      substr: 'tokio::time::interval'
  - id: rust-clipboard-thread-sleep
    desc: Rust thread sleep marker
    crit: component
    conf: 0.8
    if:
      type: text
      substr: 'std::thread::sleep'
  - id: rust-clipboard-duration-wait
    desc: Rust duration wait marker
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'Duration::from_(secs|millis)'
composite_rules:
  - id: rust-clipboard-polling-mechanism
    desc: Rust clipboard polling mechanism
    crit: component
    conf: 0.85
    any:
      - id: rust-clipboard-loop-statement
      - id: rust-clipboard-while-loop
      - id: rust-clipboard-tokio-interval
      - id: rust-clipboard-thread-sleep
      - id: rust-clipboard-duration-wait
  - id: rust-clipboard-poll-loop
    desc: Rust clipboard polling loop
    crit: component
    conf: 0.85
    near_lines: 80
    all:
      - id: rust-clipboard-polling-mechanism
    any:
      - id: rust-powershell-get-clipboard
      - id: rust-pbpaste-command
      - id: rust-xclip-command
      - id: rust-wl-paste-command
  - id: rust-cross-platform-clipboard-monitor
    desc: Rust cross-platform clipboard monitor
    crit: suspicious
    conf: 0.95
    scope: leaf
    near_lines: 80
    all:
      - id: rust-powershell-get-clipboard
      - id: rust-clipboard-poll-loop
    any:
      - id: rust-pbpaste-command
      - id: rust-xclip-command
      - id: rust-wl-paste-command
