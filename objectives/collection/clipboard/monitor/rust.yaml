defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1115
# Intent layer only: the clipboard-read tools (pbpaste/xclip/wl-paste/
# Get-Clipboard) are clipboard-access capabilities in
# micro-behaviors/os/clipboard/access, and the polling primitives (loop/while/
# sleep/interval) are control-flow + timing capabilities. These composites
# infer clipboard-monitoring intent by combining a polling loop with a
# clipboard read across platforms.
composite_rules:
  - id: rust-clipboard-polling-mechanism
    desc: Rust clipboard polling mechanism
    crit: component
    conf: 0.85
    any:
      - id: micro-behaviors/data/control-flow/loop::rust-loop-statement
      - id: micro-behaviors/data/control-flow/loop::rust-while-loop
      - id: micro-behaviors/time/sleep/interval::rust-tokio-interval
      - id: micro-behaviors/time/sleep/interval::rust-thread-sleep
      - id: micro-behaviors/time/sleep/interval::rust-duration-from
  - id: rust-clipboard-poll-loop
    desc: Rust clipboard polling loop
    crit: component
    conf: 0.85
    near_lines: 80
    all:
      - id: rust-clipboard-polling-mechanism
    any:
      - id: micro-behaviors/os/clipboard/access
  - id: rust-cross-platform-clipboard-monitor
    desc: Rust cross-platform clipboard monitor
    crit: suspicious
    conf: 0.95
    near_lines: 80
    all:
      - id: micro-behaviors/os/clipboard/access::rust-powershell-get-clipboard
      - id: rust-clipboard-poll-loop
    any:
      - id: micro-behaviors/os/clipboard/access::rust-pbpaste-command
      - id: micro-behaviors/os/clipboard/access::rust-xclip-command
      - id: micro-behaviors/os/clipboard/access::rust-wl-paste-command
