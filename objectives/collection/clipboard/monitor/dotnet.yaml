defaults:
  platforms:
    - windows
  for:
    - pe
    - pe
    - csharp
traits:
  - id: wndproc-override
    desc: Overrides WndProc method
    crit: component
    if:
      type: text
      substr: WndProc
  - id: wm-clipboardupdate-hex
    desc: WM_CLIPBOARDUPDATE message ID (hex)
    crit: component
    if:
      type: text
      substr: '0x031D'
  - id: wm-clipboardupdate-const
    desc: WM_CLIPBOARDUPDATE constant name
    crit: component
    if:
      type: text
      substr: WM_CLIPBOARDUPDATE
composite_rules:
  - id: dotnet-clipboard-monitor-proc
    desc: .NET clipboard monitor (WndProc method)
    crit: component
    all:
      - id: micro-behaviors/os/clipboard/access::dotnet-add-clipboard-listener
      - id: wndproc-override
    any:
      - id: wm-clipboardupdate-hex
      - id: wm-clipboardupdate-const
  - id: dotnet-clipboard-monitor-parent
    desc: .NET clipboard monitor (SetParent method)
    crit: component
    all:
      - id: micro-behaviors/os/clipboard/access::dotnet-add-clipboard-listener
      - id: micro-behaviors/os/clipboard/access::dotnet-set-parent-message
  - id: dotnet-clipboard-monitor
    desc: .NET-based clipboard monitor
    crit: suspicious
    conf: 0.95
    any:
      - id: dotnet-clipboard-monitor-proc
      - id: dotnet-clipboard-monitor-parent
