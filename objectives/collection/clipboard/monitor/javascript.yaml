defaults:
  platforms: [windows, unix]
  attack: T1115
  for:
    - javascript
composite_rules:
  # A browser extension that periodically reads clipboard text, URL-encodes
  # it, and sends it with fetch is an exfiltration workflow.  Evaluate this
  # only on parsed JavaScript; compressed package bytes are not a valid
  # evidence surface for JavaScript behavior.
  - id: browser-clipboard-http-exfil
    desc: Browser clipboard data sent over HTTP
    crit: hostile
    conf: 0.98
    mbc: B0014
    attack: T1041,T1115
    # Clipboard reads in a browser UI and HTTP requests elsewhere in a bundle
    # are common.  Require the encoding and transport evidence to be close to
    # the read so unrelated UI/API code cannot form an exfiltration composite.
    scope: file
    near_bytes: 4096
    all:
      - id: micro-behaviors/os/clipboard/access::browser-clipboard-read
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/data/encode/url::encode-uri-component-call
