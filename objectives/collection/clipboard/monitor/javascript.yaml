defaults:
  platforms: [windows, unix]
  attack: T1553
  for:
    - javascript
traits:
  - id: js-pbpaste
    desc: Accesses system clipboard via pbpaste
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: pbpaste
    unless:
      - id: metadata/package/files/system-package::julia-runtime-path
      - id: well-known/lib/clipboardy::clipboardy-package-path
      - id: well-known/app/qwen-code::qwen-code-bundle-text
      - id: well-known/app/guangnao-agent-cli::guangnao-agent-cli-context
  - id: js-powershell-clipboard
    desc: Accesses system clipboard via PowerShell
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: powershell.{0,50}Get-Clipboard
  - id: js-xclip
    desc: Accesses system clipboard via xclip
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: 'xclip.{0,80}(-o|-out|--out)'
    not:
      - substr: "pbcopy/xclip"
      - substr: "xclip/pbcopy"
  # --- Clipboard WRITE-back via CLI tools ---
  # A script that shells out to overwrite the system clipboard is doing more
  # than reading it; paired with a read below it is a clipboard monitor that
  # can rewrite copied content (the clipper shape). These stay suspicious to
  # match their read-side counterparts above.
  - id: js-xclip-write
    desc: Overwrites system clipboard via xclip
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: 'xclip\s+-selection\s+clipboard'
    not:
      - regex: '(-o|-out|--out)'
      - substr: "pbcopy/xclip"
      - substr: "xclip/pbcopy"
  - id: js-set-clipboard
    desc: Overwrites clipboard via Set-Clipboard
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: Set-Clipboard
composite_rules:
  # Read-then-write of the system clipboard through CLI helpers (pbpaste/xclip
  # -o/Get-Clipboard to read; pbcopy/xclip/Set-Clipboard to write) is the
  # substitution primitive of a clipboard clipper. Neutral on its own for a
  # legitimate clipboard sync utility, so notable; hostile intent comes from a
  # referencing composite that adds a hardcoded wallet address.
  - id: js-cli-clipboard-read
    desc: Reads system clipboard via CLI helper
    crit: component
    conf: 0.9
    any:
      - id: js-pbpaste
      - id: js-xclip
      - id: js-powershell-clipboard
  - id: js-cli-clipboard-write
    desc: Overwrites system clipboard via CLI helper
    crit: component
    conf: 0.9
    any:
      - id: objectives/collection/clipboard/capture::str-pbcopy
      - id: js-xclip-write
      - id: js-set-clipboard
  - id: js-cli-clipboard-readwrite
    desc: Reads and rewrites the system clipboard via CLI helpers
    crit: notable
    conf: 0.9
    all:
      - id: js-cli-clipboard-read
      - id: js-cli-clipboard-write
