defaults:
  platforms: [windows, unix]
  attack: T1553
  for:
    - javascript
traits:
  - id: js-pbpaste
    desc: Accesses system clipboard via pbpaste
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: pbpaste
    unless:
      - id: metadata/package/files/system-package::julia-runtime-path
  - id: js-powershell-clipboard
    desc: Accesses system clipboard via PowerShell
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: powershell.{0,50}Get-Clipboard
  - id: js-xclip
    desc: Accesses system clipboard via xclip
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: 'xclip.{0,80}(-o|-out|--out)'
    not:
      - substr: "pbcopy/xclip"
      - substr: "xclip/pbcopy"
