defaults:
  attack: T1553
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: js-pbpaste
    desc: Accesses system clipboard via pbpaste
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: pbpaste
  - id: js-powershell-clipboard
    desc: Accesses system clipboard via PowerShell
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: powershell.{0,50}Get-Clipboard
  - id: js-xclip
    desc: Accesses system clipboard via xclip
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: xclip
