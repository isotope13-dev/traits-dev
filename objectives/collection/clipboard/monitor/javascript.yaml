defaults:
  platforms: [windows, unix]
  attack: T1115
  for:
    - javascript
composite_rules:
  - id: js-cli-clipboard-readwrite
    desc: Reads and rewrites the system clipboard via CLI helpers
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/clipboard/access::node-cli-clipboard-readwrite
    unless:
      - id: well-known/lib/clipboardy::clipboardy-package-path
      - id: well-known/lib/raycast-api/
      - id: well-known/app/pinokio::app-bundle
