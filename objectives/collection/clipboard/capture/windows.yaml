defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1115
  mbc: B0047

composite_rules:
- id: windows-clipboard-capture-with-user-monitoring
  desc: Clipboard capture with user monitoring
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/os/clipboard/access::get-clipboard-data
  - id: micro-behaviors/os/clipboard/access::register-clipboard-format
  any:
  - id: objectives/collection/keylog/capture/
  - id: objectives/collection/clipboard/monitor/
  - id: objectives/exfiltration/stealer/credential/clipboard/
  - id: objectives/credential-access/
  unless:
  - id: objectives/collection/clipboard/capture/
- id: windows-clipboard-screen-hook-surveillance
  desc: Clipboard capture with screen capture and input hooks
  crit: notable
  conf: 0.93
  all:
  - id: micro-behaviors/os/clipboard/access::get-clipboard-data
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
  any:
  - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
  - id: micro-behaviors/hardware/display/screen::gdi-bitmap-transfer-primitives
  - id: objectives/collection/screenshot/capture::gdi-dib-capture
  - id: objectives/collection/screenshot/capture::gdi-window-capture
  unless:
  - id: metadata/signed/platform/
  - id: metadata/library/automation/
  - id: metadata/file/string/identity::tool-identity-notepadplusplus
  - id: well-known/tool/sysadmin/conemu/
  - id: well-known/lib/
  - id: metadata/binary/installer/family/
  - id: well-known/tool/development/inno-setup/
  downgrade:
    any:
    - id: well-known/app/internet-explorer/
- id: windows-clipboard-screen-hook-sandbox-gated
  desc: Sandbox-gated clipboard screen hook capture
  crit: hostile
  conf: 0.96
  attack: T1115,T1113,T1056.001,T1497
  ref: sha256:7c1b267db7d698a897d572cd41f2e5746a06bb1a512a69f1c629c7852b99c459
  all:
  - id: windows-clipboard-screen-hook-surveillance
  - id: micro-behaviors/hardware/input/keyboard/hook::foreground-window-input-state
  - id: micro-behaviors/os/clipboard/access::set-clipboard-data
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::map-virtual-key
  - id: micro-behaviors/hardware/input/keyboard/layout::map-virtual-key-str
  - id: micro-behaviors/hardware/display/screen::get-desktop-window
  unless:
  - id: well-known/app/aiburn::aiburn-application
  - id: well-known/lib/ffmpeg/
  - id: metadata/binary/installer/family/
  - id: well-known/tool/development/inno-setup/
- id: packed-clipboard-keylogger-surveillance
  desc: Packed binary combines clipboard, screen, and keyboard surveillance
  crit: hostile
  conf: 0.98
  attack: "T1115,T1113,T1056.001,T1027"
  all:
  - id: windows-clipboard-screen-hook-surveillance
  - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
  any:
  - id: objectives/anti-static/pack/detect::upx-marker
  - id: metadata/hardening/memory::extreme-wx-section-count-10
  - id: objectives/anti-static/pack/section-anomaly::large-low-entropy-rwx-section
  unless:
  - id: metadata/signed/platform/
  - id: well-known/tool/reverse-engineering/
- id: clipboard-capture-recognized-marker
  desc: Recognized marker for Windows clipboard capture
  crit: notable
  conf: 0.9
  any:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
  - id: well-known/app/internet-explorer::internet-explorer-frame-component
  - id: well-known/tool/reverse-engineering/
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: well-known/lib/sdl::sdl-runtime-component
  - id: well-known/lib/electron::electron-chromium-runtime-strong
  - id: well-known/tool/sysadmin/conemu::conemu-setup-signature
  - id: well-known/tool/sysadmin/winrar::winrar-component
  - id: well-known/app/protected-benign-pe/
  - id: well-known/app/atuin::atuin-binary
  - id: metadata/file/string/identity::tool-identity-notepadplusplus
- id: windows-unicode-clipboard-capture-source
  desc: Win32 Unicode clipboard capture in source
  crit: suspicious
  conf: 0.93
  for: [rust]
  all:
  - id: micro-behaviors/os/clipboard/access::win32-unicode-clipboard-read
  - id: objectives/collection/clipboard/capture::clipboard-marker
- id: clipboard-stealer-with-c2
  desc: Clipboard stealer with C2 endpoints
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/os/clipboard/access::open-clipboard
  - id: micro-behaviors/os/clipboard/access::get-clipboard-data
  any:
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-rsrc-pair
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-pe
  needs: 1
  unless:
  - id: objectives/collection/clipboard/capture/
- id: clipboard-c2-recognized-marker
  desc: Recognized marker for clipboard APIs with endpoint-like strings
  crit: notable
  conf: 0.9
  any:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
  - id: well-known/app/internet-explorer::internet-explorer-frame-component
  - id: well-known/tool/offensive/mimikatz::mimikatz
  - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-release-component
  - id: well-known/tool/reverse-engineering/scylla::scylla-unpacker
  - id: well-known/tool/reverse-engineering/radare2::radare2-release-binary
  - id: metadata/lang/compiled::autoit-binary
  - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
  - id: metadata/binary/symbols/plugin::x64dbg-plugin-export
