defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1115
  mbc: B0047

composite_rules:
  - id: windows-clipboard-capture-with-user-monitoring
    desc: Clipboard capture with user monitoring
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: micro-behaviors/os/clipboard/access::register-clipboard-format
    any:
      - id: objectives/collection/keylog/capture::windows-hook-window-title-keylogger
      - id: objectives/collection/keylog/capture::windows-hook-state-keylogger
      - id: objectives/collection/keylog/capture::windows-hook-keypoll-window-title
      - id: objectives/collection/clipboard/monitor/
      - id: objectives/exfiltration/stealer/credential/clipboard/
      - id: objectives/credential-access/
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: well-known/tool/reverse-engineering/resource-hacker::resource-hacker
