defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1115
  mbc: B0047

composite_rules:
- id: windows-clipboard-capture-with-user-monitoring
  desc: Clipboard capture with user monitoring
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/os/clipboard/access::get-clipboard-data
  - id: micro-behaviors/os/clipboard/access::register-clipboard-format
  any:
  - id: objectives/collection/keylog/capture/
  - id: objectives/collection/clipboard/monitor/
  - id: objectives/exfiltration/stealer/credential/clipboard/
  - id: objectives/credential-access/
  unless:
  - id: clipboard-capture-benign-context
- id: clipboard-capture-benign-context
  desc: Benign context for Windows clipboard capture
  crit: component
  conf: 0.9
  any:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
  - id: well-known/app/internet-explorer::internet-explorer-frame-component
  - id: well-known/tool/reverse-engineering/
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: well-known/lib/sdl::sdl-runtime-component
  - id: well-known/lib/electron::electron-chromium-runtime-strong
  - id: well-known/tool/sysadmin/conemu::conemu-setup-signature
  - id: well-known/tool/sysadmin/winrar::winrar-component
  - id: well-known/app/protected-benign-pe/
  - id: well-known/app/atuin::atuin-binary
- id: windows-unicode-clipboard-capture-source
  desc: Win32 Unicode clipboard capture in source
  crit: suspicious
  conf: 0.93
  for: [rust]
  all:
  - id: micro-behaviors/os/clipboard/access::win32-unicode-clipboard-read
  - id: objectives/collection/clipboard/capture::clipboard-context
- id: clipboard-stealer-with-c2
  desc: Clipboard stealer with C2 endpoints
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/os/clipboard/access::open-clipboard
  - id: micro-behaviors/os/clipboard/access::get-clipboard-data
  any:
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-rsrc-pair
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-pe
  needs: 1
  unless:
  - id: clipboard-c2-benign-context
- id: clipboard-c2-benign-context
  desc: Benign context for clipboard APIs with endpoint-like strings
  crit: component
  conf: 0.9
  any:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
  - id: well-known/app/internet-explorer::internet-explorer-frame-component
  - id: well-known/tool/offensive/mimikatz::mimikatz
  - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-release-component
  - id: well-known/tool/reverse-engineering/scylla::scylla-unpacker
  - id: well-known/tool/reverse-engineering/radare2::radare2-release-binary
  - id: metadata/lang/compiled::autoit-binary
  - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
  - id: metadata/binary/symbols/plugin::x64dbg-plugin-export
