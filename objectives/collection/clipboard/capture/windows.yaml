defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1115
  mbc: B0047

composite_rules:
  - id: windows-clipboard-capture-with-user-monitoring
    desc: Clipboard capture with user monitoring
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: micro-behaviors/os/clipboard/access::register-clipboard-format
    any:
      - id: objectives/collection/keylog/capture::windows-hook-window-title-keylogger
      - id: objectives/collection/keylog/capture::windows-hook-state-keylogger
      - id: objectives/collection/screenshot/capture::gdi-window-capture
      - id: objectives/collection/screenshot/capture::gdi-dib-capture
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::microsoft-corp-marker
