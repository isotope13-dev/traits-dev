defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: win32-crypto-clipper
    desc: Win32 cryptocurrency clipboard hijacker (clipper)
    crit: hostile
    conf: 0.95
    attack: T1115
    all:
      - id: micro-behaviors/os/clipboard/access::open-clipboard-text
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data-text
      - id: micro-behaviors/os/clipboard/access::set-clipboard-data-text
    any:
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/os/sysinfo/platform/locale::enum-system-locales
