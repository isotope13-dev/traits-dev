defaults:
  platforms: [unix, windows, macos]
  for: [java, class]
  attack: T1115
  mbc: B0014
composite_rules:
  - id: java-clipboard-capture
    desc: Java captures clipboard text
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/clipboard/access::java-clipboard-text-read
    any:
      - id: micro-behaviors/data/text/keywords/clipboard::clipboard-token
      - id: objectives/credential-access/files/config::clipboard-harvest-tool

