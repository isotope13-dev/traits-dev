defaults:
  platforms: [unix, windows, macos]
  for: [java, class]
  attack: T1115
  mbc: B0014
composite_rules:
  - id: java-clipboard-capture
    desc: Java captures clipboard text
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/clipboard/access::java-clipboard-text-read
    any:
      - id: micro-behaviors/os/clipboard/access::clipboard-keyword
      - id: objectives/credential-access/files/config::clipboard-read-command
    unless:
      - id: well-known/app/plantuml::package-member
      - id: well-known/app/plantuml::vscode-extension-member
      - id: well-known/app/plantuml::jar-member
      - id: well-known/app/plantuml::clipboard-loop-class
