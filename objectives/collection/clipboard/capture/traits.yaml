defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.7
traits:
  - id: str-pasteboard
    desc: Pasteboard string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: pasteboard
      case_insensitive: true
  - id: str-pbcopy
    desc: pbcopy string
    crit: component
    conf: 0.7
    for: [scripts, binaries, -javascript, -pe]
    if:
      type: text
      substr: pbcopy
      case_insensitive: true
  - id: str-pbpaste
    desc: pbpaste string
    crit: component
    conf: 0.7
    for: [scripts, binaries, -javascript, -pe]
    if:
      type: text
      substr: pbpaste
      case_insensitive: true
  - id: str-xclip
    desc: xclip string
    crit: component
    conf: 0.7
    for: [scripts, binaries, -class, -pe]
    if:
      type: text
      substr: xclip
      case_insensitive: true
  - id: str-xsel
    desc: xsel string
    crit: component
    conf: 0.7
    for:
      - shell
    if:
      type: string_literal
      word: xsel
      case_insensitive: true
  - id: str-wl-copy
    desc: wl-copy string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: wl-copy
      case_insensitive: true
  - id: str-wl-paste
    desc: wl-paste string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: wl-paste
      case_insensitive: true
composite_rules:
  - id: clipboard-marker
    desc: Clipboard handling marker
    crit: baseline
    conf: 0.7
    for: [scripts, binaries, source]
    any:
      - id: micro-behaviors/os/clipboard/access::clipboard-keyword
      - id: str-pasteboard
      - id: str-pbcopy
      - id: str-pbpaste
      - id: str-xclip
      - id: str-xsel
      - id: str-wl-copy
      - id: str-wl-paste
      - id: micro-behaviors/os/clipboard/access::node-pbpaste-read
      - id: micro-behaviors/os/clipboard/access::node-xclip-read
  - id: clipboard-access-api
    desc: Clipboard content read marker
    crit: notable
    conf: 0.8
    for: [scripts, binaries, source]
    all:
      - id: clipboard-marker
    any:
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: objectives/impact/crypto-manipulation/clipboard::crypto-address-swap
      - id: objectives/impact/crypto-manipulation/clipboard::address-variable-reassign
    unless:
      - id: metadata/binary/installer/script/
      - id: micro-behaviors/ui/framework/imgui/

  - id: irc-browser-clipboard-trojan
    desc: IRC bot targets browsers and clipboard
    crit: hostile
    conf: 0.98
    attack: T1071.001,T1115,T1555.003
    all:
      - id: clipboard-access-api
      - id: objectives/discovery/host/browser/identity::browser-process-roster
      - id: objectives/command-and-control/channel/irc/bot::pe-irc-protocol
