defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: notable
  conf: 0.7
traits:
  - id: str-clipboard
    desc: Clipboard string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: clipboard
      case_insensitive: true
  - id: str-pasteboard
    desc: Pasteboard string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: pasteboard
      case_insensitive: true
  - id: str-pbcopy
    desc: pbcopy string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: pbcopy
      case_insensitive: true
  - id: str-pbpaste
    desc: pbpaste string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: pbpaste
      case_insensitive: true
  - id: str-xclip
    desc: xclip string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: xclip
      case_insensitive: true
  - id: str-xsel
    desc: xsel string
    crit: component
    conf: 0.7
    for:
      - shell
    if:
      type: string_literal
      word: xsel
      case_insensitive: true
  - id: str-wl-copy
    desc: wl-copy string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: wl-copy
      case_insensitive: true
  - id: str-wl-paste
    desc: wl-paste string
    crit: component
    conf: 0.7
    if:
      type: text
      substr: wl-paste
      case_insensitive: true
composite_rules:
  - id: clipboard-context
    desc: Clipboard handling context
    crit: baseline
    conf: 0.7
    any:
      - id: str-clipboard
      - id: str-pasteboard
      - id: str-pbcopy
      - id: str-pbpaste
      - id: str-xclip
      - id: str-xsel
      - id: str-wl-copy
      - id: str-wl-paste
      - id: objectives/supply-chain/hidden-payload/imports::clipboard-string
      - id: objectives/collection/clipboard/monitor::js-pbpaste
      - id: objectives/collection/clipboard/monitor::js-xclip
  - id: ethereum-address
    desc: Clipboard read/write API context
    crit: notable
    conf: 0.8
    all:
      - id: clipboard-context
    any:
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: micro-behaviors/os/clipboard/access::set-clipboard-data
      - id: objectives/impact/crypto-manipulation/clipboard::crypto-address-swap
      - id: objectives/impact/crypto-manipulation/clipboard::address-variable-reassign
