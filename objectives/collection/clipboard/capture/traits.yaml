# Clipboard Data Capture Patterns
# Detects markers for capturing sensitive data from clipboard
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python, javascript, powershell, shell, pe, macho]
  crit: notable
  conf: 0.7
traits:
  - id: eth-address-literal
    desc: Ethereum address literal
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: "^0x[a-fA-F0-9]{40}$"
  - id: str-clipboard
    desc: Clipboard string
    crit: component
    conf: 0.7
    for: [javascript, powershell, shell, pe, macho]
    if:
      type: string_value
      substr: "clipboard"
      case_insensitive: true
  - id: str-pasteboard
    desc: Pasteboard string
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: "pasteboard"
      case_insensitive: true
  - id: str-pbcopy
    desc: pbcopy string
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: "pbcopy"
      case_insensitive: true
  - id: str-pbpaste
    desc: pbpaste string
    crit: component
    conf: 0.7
    for: [python, powershell, shell, pe, macho]
    if:
      type: string_value
      substr: "pbpaste"
      case_insensitive: true
  - id: str-xclip
    desc: xclip string
    crit: component
    conf: 0.7
    for: [python, powershell, shell, pe, macho]
    if:
      type: string_value
      substr: "xclip"
      case_insensitive: true
  - id: str-xsel
    desc: xsel string
    crit: component
    conf: 0.7
    for: [shell]
    if:
      type: string_value
      word: "xsel"
      case_insensitive: true
  - id: str-wl-copy
    desc: wl-copy string
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: "wl-copy"
      case_insensitive: true
  - id: str-wl-paste
    desc: wl-paste string
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: "wl-paste"
      case_insensitive: true
composite_rules:
  - id: clipboard-context
    desc: Clipboard handling context
    crit: notable
    conf: 0.7
    any:
      - id: str-clipboard
      - id: str-pasteboard
      - id: str-pbcopy
      - id: str-pbpaste
      - id: str-xclip
      - id: str-xsel
      - id: str-wl-copy
      - id: str-wl-paste
      - id: objectives/lateral-movement/supply-chain/pypi/code-analysis::clipboard-string
      - id: objectives/credential-access/clipboard/monitor::js-pbpaste
      - id: objectives/credential-access/clipboard/monitor::js-xclip
  - id: ethereum-address
    desc: Ethereum address pattern in clipboard capture context
    crit: suspicious
    conf: 0.8
    all:
      - id: eth-address-literal
      - id: clipboard-context
    any:
      # Require actual clipboard data handling or explicit wallet swap logic
      - id: micro-behaviors/hardware/clipboard/access::get-clipboard-data
      - id: micro-behaviors/hardware/clipboard/access::set-clipboard-data
      - id: objectives/impact/crypto-theft/clipboard::replace-wallet-address
      - id: objectives/impact/crypto-theft/clipboard::address-variable-reassign
