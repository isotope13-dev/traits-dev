defaults:
  platforms: [unix]
  for: [php]
  attack: T1115

traits:
  - id: php-xclip-xsel-wlpaste
    desc: PHP reads Linux clipboard tools
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'xclip -selection clipboard -o[\s\S]{0,220}xsel --clipboard --output[\s\S]{0,220}wl-paste'

  - id: php-clipboard-exfil-label
    desc: PHP clipboard exfil label
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: exfil_data('clipboard'

composite_rules:
  - id: php-linux-clipboard-exfil
    desc: PHP Linux clipboard exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-xclip-xsel-wlpaste
      - id: php-clipboard-exfil-label
