defaults:
  platforms:
    - windows
    - unix
  crit: notable
  conf: 1.0
  for:
    - vbs
traits:
  - id: inline__vbs-clipboard-loop__any_1
    desc: Derived string condition
    if:
      type: text
      regex: \bDo\b.{0,50}\bLoop\b
  - id: inline__vbs-clipboard-loop__any_2
    desc: Derived string condition
    if:
      type: text
      regex: \bWhile\b.{0,30}\bTrue\b.{0,30}Clipboard
  - id: inline__vbs-clipboard-loop__any_3
    desc: Derived string condition
    if:
      type: text
      regex: Clipboard.{0,30}sleep
  - id: inline__vbs-clipboard-loop__unless_1
    desc: Node.js runtime marker
    crit: baseline
    if:
      type: text
      word: nodejs
