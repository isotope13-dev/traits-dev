defaults:
  platforms: [unix, windows]
  for: [class, jar, zip]
  attack: T1115

traits:
  - id: java-awt-system-clipboard
    desc: Java AWT system clipboard access
    crit: component
    conf: 0.9
    if:
      type: text
      substr: java/awt/Toolkit
  - id: java-xclip-clipboard-read
    desc: Java invokes xclip clipboard read
    crit: component
    conf: 0.92
    platforms: [linux]
    if:
      type: text
      substr: xclip
  - id: java-dataflavor-class
    desc: Java clipboard DataFlavor class
    crit: component
    conf: 0.88
    if:
      type: text
      substr: java/awt/datatransfer/DataFlavor

composite_rules:
  - id: java-awt-clipboard-capture
    desc: Java clipboard data capture
    crit: notable
    conf: 0.94
    all:
      - id: java-awt-system-clipboard
      - id: java-dataflavor-class
    unless:
      - id: well-known/app/plantuml::vscode-extension-member
      - id: well-known/app/plantuml::jar-member
      - id: well-known/app/plantuml::clipboard-loop-class
      - id: well-known/lib/hutool::hutool-core-library
      - id: well-known/lib/hutool::hutool-core-class-member
  - id: java-clipboard-capture-with-x11-fallback
    desc: Java clipboard capture with xclip fallback
    crit: suspicious
    conf: 0.96
    all:
      - id: java-awt-clipboard-capture
      - id: java-xclip-clipboard-read
