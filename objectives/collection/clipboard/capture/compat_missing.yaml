defaults:
  for: [pe, macho, python, javascript, powershell, shell]
  platforms: [windows, linux, macos]
composite_rules:
  - id: clipboard-session-transfer
    desc: Clipboard read or write transfer behavior
    crit: notable
    conf: 0.88
    all:
      - id: clipboard-context
    any:
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: micro-behaviors/os/clipboard/access::set-clipboard-data
      - id: objectives/impact/crypto-manipulation/clipboard::replace-wallet-address
    needs: 1
    unless:
      - id: micro-behaviors/os/module/load::uninstall-exe-basename
      - id: metadata/vendor/armnf::marker
      - id: objectives/collection/keylog/capture::p-user-proxy-dll
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/developer/
