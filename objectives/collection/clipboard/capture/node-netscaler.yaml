defaults:
  platforms: [netscaler, appliance, unix]
  for: [javascript, typescript]
  attack: T1115

traits:
  - id: node-clipboard-collect-call
    desc: Node clipboard collect call
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      exact: collectClipboard

  - id: node-clipboard-exfil-tag
    desc: Node clipboard exfil tag
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "'clip'"

  - id: node-collect-query-exfil
    desc: Node collect query exfil
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/collect\?tag=\$\{encodeURIComponent'

composite_rules:
  - id: node-clipboard-http-exfil
    desc: Node clipboard HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: node-clipboard-collect-call
      - id: node-clipboard-exfil-tag
      - id: node-collect-query-exfil
