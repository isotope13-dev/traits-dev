defaults:
  platforms: [windows]
  for: [pe]
  attack: T1115

traits:
  - id: clipboard-fragment
    desc: Clipboard command fragment
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: clipboar

composite_rules:
  - id: go-rat-clipboard-access
    desc: Go clipboard access over command channel
    crit: notable
    conf: 0.9
    all:
      - id: clipboard-fragment
    any:
      - id: objectives/command-and-control/remote-command/protocol::go-websocket-fragment
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
