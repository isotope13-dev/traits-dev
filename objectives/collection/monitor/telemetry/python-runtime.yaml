defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1119

traits:
  - id: locals-json-dumps-window
    desc: Python locals JSON serialization
    crit: component
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      regex: '\b(f_locals|locals)\b[\s\S]{0,180}\bjson\.dumps\s*\('

composite_rules:
  - id: python-runtime-frame-local-telemetry
    desc: Python runtime frame local telemetry
    crit: suspicious
    conf: 0.94
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::traceback-frame-text
      - id: micro-behaviors/data/source/dynamic/reflect::frame-locals-text
      - id: micro-behaviors/data/source/dynamic/reflect::traceback-next-text
      - id: micro-behaviors/data/serialize/json::json-dumps-call
    any:
      - id: micro-behaviors/data/source/dynamic/reflect::traceback-extract-tb-text
      - id: locals-json-dumps-window

  - id: python-frame-local-remote-telemetry
    desc: Python frame locals remote telemetry
    crit: hostile
    conf: 0.96
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::traceback-frame-text
      - id: micro-behaviors/data/source/dynamic/reflect::frame-locals-text
      - id: micro-behaviors/data/source/dynamic/reflect::traceback-next-text
      - id: micro-behaviors/data/serialize/json::json-dumps-call
      - id: metadata/library/socketio::python-client-import
      - id: micro-behaviors/communications/websocket/send::python-socketio-emit-call
    any:
      - id: micro-behaviors/data/source/dynamic/reflect::traceback-extract-tb-text
      - id: objectives/exfiltration/http/report::signed-payload-socketio-emit
