defaults:
  platforms: [android]
  for: [apk, zip]
  attack: T1412

composite_rules:
  - id: android-sketchware-logcat-broadcast
    desc: Android logcat debug broadcast
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/event/log::android-logcat-command
      - id: micro-behaviors/os/event/log::android-logcat-clear-command
      - id: micro-behaviors/os/event/log::sketchware-debug-log-broadcast
      - id: micro-behaviors/os/event/log::sketchware-logger-class
