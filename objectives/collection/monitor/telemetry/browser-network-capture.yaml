defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: network-request-body-field
    desc: Captured network request body field
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(?i)(networkRequests?|capturedRequests?)\s*:[\s\S]{0,120}\brequestBody\s*:'

  - id: network-response-body-field
    desc: Captured network response body field
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(?i)(networkRequests?|capturedRequests?)\s*:[\s\S]{0,120}\bresponseBody\s*:'

  - id: console-log-buffer-for-export
    desc: Buffers console messages for export
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'console\.(log|error|warn)\s*=\s*\([^)]{1,80}\)\s*=>[\s\S]{0,700}\.push\(\{\s*type\s*:'

  - id: console-capture-payload-field
    desc: Console log capture payload field
    crit: component
    conf: 0.97
    if:
      type: text
      regex: '(?i)\bconsoleLogs?\s*:'

  - id: network-capture-payload-field
    desc: Network capture payload field
    crit: component
    conf: 0.97
    if:
      type: text
      regex: '(?i)\bnetworkRequests?\s*:'

  - id: signed-upload-url-reference
    desc: References a signed upload URL
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?i)upload-url|signed.?url'

composite_rules:
  - id: extension-network-debug-capture
    desc: Extension captures and uploads page network data
    crit: hostile
    conf: 0.995
    attack: T1119,T1041
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: micro-behaviors/process/hook/xhr::fetch-hook
      - id: network-request-response-body-record
      - id: console-network-capture-payload
      - id: signed-upload-url-put
      - id: metadata/permission/manifest::host-permission-all-urls
    unless:
      - id: well-known/app/pinboard::pinboard-extension-name

  - id: network-request-response-body-record
    desc: Records network request and response bodies
    crit: notable
    conf: 0.96
    all:
      - id: network-request-body-field
      - id: network-response-body-field
    near_bytes: 1000

  - id: console-network-capture-payload
    desc: Builds a console and network capture payload
    crit: notable
    conf: 0.97
    all:
      - id: console-capture-payload-field
      - id: network-capture-payload-field
    near_bytes: 1200

  - id: signed-upload-url-put
    desc: Uploads data with a signed URL
    crit: notable
    conf: 0.92
    all:
      - id: signed-upload-url-reference
      - id: micro-behaviors/communications/http/put::javascript-put-request-body
    near_bytes: 700
