defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1056.002

composite_rules:
  - id: browser-form-input-telemetry
    desc: Captures browser input for remote anonymization
    crit: suspicious
    conf: 0.98
    attack: "T1056.002,T1041"
    scope: archive
    for: [crx, xpi, zip, archives]
    all:
      - id: micro-behaviors/ui/window/form-input::capture-phase-input-listener
      - id: micro-behaviors/ui/window/form-input::browser-value-property-read
      - id: micro-behaviors/ui/window/form-input::browser-input-capture-message
      - id: micro-behaviors/ui/window/form-input::browser-anonymize-message
      - id: micro-behaviors/communications/http/request/client::post-method-text
