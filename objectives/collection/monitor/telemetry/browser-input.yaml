defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1056.002

traits:
  - id: capture-phase-input-listener
    desc: Registers a capture-phase browser input listener
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'document\.addEventListener\(\s*["'']input["'']\s*,[^,\n]{1,120},\s*true\s*\)'

  - id: browser-text-field-types
    desc: References browser text-field element types
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'HTML(Input|TextArea)Element'

  - id: password-field-value-guard
    desc: Separately guards password field values
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'element\.type\s*===\s*["'']password["'']'

  - id: browser-element-value-read
    desc: Reads a browser element value
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: member
      exact: element.value

  - id: input-value-activity-field
    desc: Adds input value to activity record
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'sendActivity\([^\n]{0,160}["'']type["'']\s*,\s*\{\s*value\s*\}'

composite_rules:
  - id: nonpassword-text-field-value-read
    desc: Reads non-password browser text fields
    crit: notable
    conf: 0.95
    all:
      - id: browser-text-field-types
      - id: password-field-value-guard
      - id: browser-element-value-read
    near_lines: 30

  - id: browser-form-input-telemetry
    desc: Captures browser form values for remote activity telemetry
    crit: suspicious
    conf: 0.98
    attack: "T1056.002,T1041"
    all:
      - id: capture-phase-input-listener
      - id: nonpassword-text-field-value-read
      - id: input-value-activity-field
      - id: objectives/exfiltration/sensitive-data::browser-activity-upload-path
      - id: micro-behaviors/communications/http/request/client::post-method-text
