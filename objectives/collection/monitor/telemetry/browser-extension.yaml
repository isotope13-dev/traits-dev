defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041

traits:
  - id: page-link-collection-selector
    desc: Collects hyperlinks from web pages
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b(document|[A-Za-z_$][\w$]*)\.querySelectorAll\(\s*["'']a\[href\]["'']\s*\)'

  - id: page-link-check-message
    desc: Link check message dispatch tag
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'what:\s*["'']check_links["'']'

  - id: link-check-endpoint
    desc: Remote link scanning endpoint
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: https://service.allblock.app/check_links

  - id: link-check-queue-key
    desc: Queues harvested links for upload
    crit: component
    conf: 0.93
    if:
      type: text
      substr: linkCheckQueue

  - id: lifecycle-uid-tracking-url
    desc: Welcome or uninstall UID tracking URL
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'https://allblock\.app/(en/welcome\?uid=|api/uninstall\?uid=)'

composite_rules:
  - id: content-script-link-harvest-dispatch
    desc: Content script harvests page hyperlinks
    crit: suspicious
    conf: 0.95
    all:
      - id: page-link-collection-selector
      - id: page-link-check-message

  - id: background-link-check-upload
    desc: Background worker uploads harvested links
    crit: suspicious
    conf: 0.97
    all:
      - id: link-check-endpoint
      - id: link-check-queue-key
    any:
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::runtime-set-uninstall-url

  - id: extension-install-uninstall-uid-tracking
    desc: Browser extension lifecycle UID tracking
    crit: suspicious
    conf: 0.95
    all:
      - id: lifecycle-uid-tracking-url
    any:
      - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::runtime-set-uninstall-url
      - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::setUninstallURL
