defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1119,T1041

traits:
  - id: wp-admin-metadata-collection
    desc: WordPress admin/site metadata collection
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: "get_users\\s*\\([\\s\\S]{0,260}['\"]role['\"]\\s*=>\\s*['\"]administrator['\"]"

  - id: php-remote-metadata-payload
    desc: Remote PHP metadata request payload
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "wp_json_encode\\s*\\([\\s\\S]{0,900}\\b(admin_email|site_url|plugin_version|country_info)\\b"

composite_rules:
  - id: wp-admin-metadata-remote-telemetry
    desc: WordPress plugin sends administrator and site metadata to a remote service
    crit: suspicious
    conf: 0.96
    all:
      - id: wp-admin-metadata-collection
      - id: php-remote-metadata-payload
      - id: micro-behaviors/communications/http/request/wordpress::wp-remote-post
