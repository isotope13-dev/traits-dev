composite_rules:
- id: telemetry-email-field
  desc: Email identity field
  crit: component
  conf: 0.9
  any:
  - id: telemetry-email-field--useremail
  - id: telemetry-email-field--emaildomain
- id: telemetry-distinct-id-fields
  desc: Distinct telemetry ID fields
  crit: component
  conf: 0.88
  any:
  - id: telemetry-distinct-id-fields--distinctid
  - id: telemetry-distinct-id-fields--uniqueid
- id: telemetry-file-path-fields
  desc: File path telemetry fields
  crit: component
  conf: 0.86
  any:
  - id: telemetry-file-path-fields--filepath
  - id: telemetry-file-path-fields--newfilepath
  - id: telemetry-file-path-fields--directorypath
  - id: telemetry-file-path-fields--tsconfigpath
- id: telemetry-workspace-path-fields
  desc: Workspace path telemetry fields
  crit: component
  conf: 0.86
  any:
  - id: telemetry-workspace-path-fields--workspacepath
  - id: micro-behaviors/fs/directory/readdir::cwd-call
- id: telemetry-terminal-fields
  desc: Terminal telemetry fields
  crit: component
  conf: 0.86
  unless:
  - id: well-known/app/google-web::official-google-web-asset
  any:
  - id: telemetry-terminal-fields--terminalid
  - id: telemetry-terminal-fields--shellpath
  - id: micro-behaviors/process/create/subprocess::python-subprocess-io-fields--stdout
- id: telemetry-browser-url-fields
  desc: URL-related telemetry field tokens
  crit: component
  conf: 0.86
  unless:
  - id: well-known/app/google-web::official-google-web-asset
  any:
  - id: telemetry-browser-url-fields--pageid
  - id: telemetry-browser-url-fields--browserid
  - id: telemetry-browser-url-fields--threadid
- id: browser-telemetry-events
  desc: Browser telemetry events
  crit: component
  conf: 0.9
  any:
  - id: browser-telemetry-events--browser-open-clicked
  - id: browser-telemetry-events--browser-open-success
  - id: browser-telemetry-events--agent-browser-open-triggered
  - id: browser-telemetry-events--send-to-chat
- id: file-operation-telemetry-events
  desc: File operation telemetry events
  crit: component
  conf: 0.9
  any:
  - id: file-operation-telemetry-events--read-file-error
  - id: file-operation-telemetry-events--write-file-error
  - id: file-operation-telemetry-events--delete-file-error
  - id: file-operation-telemetry-events--rename-file-error
- id: screenshot-telemetry-events
  desc: Screenshot telemetry events
  crit: component
  conf: 0.9
  any:
  - id: screenshot-telemetry-events--screenshot-failure
  - id: screenshot-telemetry-events--screenshot-success
  - id: screenshot-telemetry-events--heatmap-failure
  - id: screenshot-telemetry-events--heatmap-success
- id: canvas-telemetry-events
  desc: Canvas telemetry events
  crit: component
  conf: 0.88
  any:
  - id: canvas-telemetry-events--canvascreated
  - id: canvas-telemetry-events--canvasrenamed
  - id: canvas-telemetry-events--canvasundo
  - id: canvas-telemetry-events--canvasredo
- id: node-telemetry-events
  desc: Node canvas telemetry events
  crit: component
  conf: 0.88
  any:
  - id: node-telemetry-events--nodecreated
  - id: node-telemetry-events--nodedeleted
  - id: node-telemetry-events--nodesbatchdeleted
- id: node-undo-telemetry-events
  desc: Node undo telemetry events
  crit: component
  conf: 0.88
  any:
  - id: node-undo-telemetry-events--nodeundo
  - id: node-undo-telemetry-events--noderedo
- id: theme-telemetry-events
  desc: Theme telemetry events
  crit: component
  conf: 0.88
  any:
  - id: theme-telemetry-events--themeapplied
  - id: theme-telemetry-events--themeduplicated
  - id: theme-telemetry-events--themecreated
- id: theme-change-telemetry-events
  desc: Theme change telemetry events
  crit: component
  conf: 0.88
  any:
  - id: theme-change-telemetry-events--themeupdated
  - id: theme-change-telemetry-events--themedeleted
- id: style-export-telemetry-events
  desc: Style export telemetry events
  crit: component
  conf: 0.88
  any:
  - id: style-export-telemetry-events--styleguidecreated
  - id: style-export-telemetry-events--styleguideupdated
  - id: style-export-telemetry-events--styleguidedeleted
  - id: style-export-telemetry-events--fileexported
- id: telemetry-persistent-id-field-cluster
  desc: Persistent telemetry ID field cluster
  crit: component
  conf: 0.9
  needs: 2
  any:
  - id: metadata/file/string/telemetry::session-id-field-js
  - id: metadata/file/string/telemetry::device-id-field-js
  - id: telemetry-distinct-id-fields

- id: developer-activity-telemetry-fields
  desc: Developer activity telemetry fields
  crit: component
  conf: 0.88
  needs: 2
  any:
  - id: telemetry-file-path-fields
  - id: telemetry-workspace-path-fields
  - id: telemetry-terminal-fields
  - id: telemetry-browser-url-fields

- id: developer-activity-telemetry-events
  desc: Developer activity telemetry events
  crit: component
  conf: 0.9
  needs: 2
  any:
  - id: terminal-telemetry-events
  - id: browser-telemetry-events
  - id: workspace-telemetry-events
  - id: file-operation-telemetry-events
  - id: screenshot-telemetry-events
  - id: typecheck-telemetry-events

- id: design-activity-telemetry-events
  desc: Design activity telemetry events
  crit: component
  conf: 0.9
  needs: 2
  any:
  - id: canvas-telemetry-events
  - id: node-telemetry-events
  - id: node-undo-telemetry-events
  - id: theme-telemetry-events
  - id: theme-change-telemetry-events
  - id: style-export-telemetry-events

- id: posthog-user-identity-telemetry
  desc: PostHog user identity telemetry fields
  crit: notable
  conf: 0.94
  unless:
  - id: well-known/app/ibb8::ibb8-browser-extension-context
  all:
  - id: well-known/lib/posthog::posthog-telemetry-client
  - id: telemetry-user-identity-fields
  any:
  - id: telemetry-email-field
  - id: telemetry-persistent-id-field-cluster

- id: developer-activity-telemetry
  desc: Telemetry records developer activity
  crit: suspicious
  conf: 0.92
  unless:
  - id: well-known/app/kombai::kombai-browser-profile-import-context
  all:
  - id: developer-activity-telemetry-fields
  - id: developer-activity-telemetry-events
  any:
  - id: well-known/lib/posthog::posthog-telemetry-client
  - id: design-telemetry-forwarder

- id: stored-profile-telemetry
  desc: Telemetry profile stored locally
  crit: notable
  conf: 0.9
  all:
  - id: telemetry-profile-file
  any:
  - id: telemetry-profile-writer
  - id: telemetry-user-identity-fields
  - id: telemetry-persistent-id-field-cluster

- id: uninstall-profile-telemetry
  desc: Uninstall sends telemetry profile
  crit: suspicious
  conf: 0.96
  all:
  - id: well-known/lib/posthog::posthog-host
  - id: telemetry-profile-file
  - id: uninstall-telemetry-event
  any:
  - id: telemetry-persistent-id-field-cluster
  - id: objectives/discovery/system/fingerprint/user::node-host-user-query-pair

- id: host-user-uninstall-telemetry-id
  desc: Uninstall telemetry includes host user ID
  crit: suspicious
  conf: 0.95
  all:
  - id: uninstall-profile-telemetry
  - id: objectives/discovery/system/fingerprint/user::node-host-user-query-pair

- id: sentry-user-context-telemetry
  desc: Sentry sends user context telemetry
  crit: notable
  conf: 0.92
  all:
  - id: sentry-ingest-dsn
  any:
  - id: sentry-worker-identity-bridge
  - id: telemetry-user-identity-fields

- id: worker-telemetry-forwarding
  desc: Worker forwards telemetry events
  crit: notable
  conf: 0.9
  all:
  - id: design-telemetry-forwarder
  any:
  - id: design-activity-telemetry-events
  - id: sentry-worker-identity-bridge
  - id: sentry-exception-capture

- id: design-activity-telemetry
  desc: Design activity telemetry forwarding
  crit: notable
  conf: 0.92
  all:
  - id: design-telemetry-forwarder
  - id: design-activity-telemetry-events
  unless:
  - id: well-known/app/kombai::kombai-extension-runtime-context
