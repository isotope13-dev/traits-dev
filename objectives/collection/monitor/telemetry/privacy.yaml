defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1119

traits:
  - id: posthog-host
    desc: PostHog telemetry host
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'https://(us\.i\.)?posthog\.com|posthog\.com/(capture|batch|decide)'
      case_insensitive: true

  - id: posthog-event-object
    desc: PostHog event object fields
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'distinctId.{0,240}\bevent\b.{0,240}\bproperties\b|\bdistinct_id\b.{0,240}\bevent\b'
      case_insensitive: true

  - id: posthog-feature-flag-lookup
    desc: PostHog feature flag lookup
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bgetFeatureFlag\s*\(|\bsendFeatureFlags\s*:'

  - id: sentry-ingest-dsn
    desc: Sentry ingest DSN
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'https://[a-f0-9]{16,}@o[0-9]+\.ingest\.[a-z0-9.-]*sentry\.io/[0-9]+'
      case_insensitive: true

  - id: sentry-exception-capture
    desc: Sentry exception capture
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\bcaptureException\s*\(|Sentry[^"\n]{0,120}captureException'

  - id: sentry-worker-identity-bridge
    desc: Sentry worker identity bridge
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'set-sentry-identity|applyWorkerSentryIdentity|initWorkerSentry'

  - id: telemetry-profile-file
    desc: Stored telemetry profile file
    crit: component
    conf: 0.96
    if:
      type: text
      substr: telemetry.json

  - id: telemetry-profile-writer
    desc: Writes stored telemetry profile
    crit: component
    conf: 0.92
    if:
      type: text
      word: storeTelemetryData

  - id: uninstall-telemetry-event
    desc: Extension uninstall telemetry event
    crit: component
    conf: 0.96
    if:
      type: text
      word: extension_uninstalled

  - id: telemetry-user-identity-fields
    desc: User identity telemetry fields
    crit: component
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '\b(userEmail|emailDomain|userId|orgId)\b'

  - id: telemetry-email-field
    desc: Email address telemetry field
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b(userEmail|emailDomain)\b'

  - id: telemetry-persistent-id-fields
    desc: Session telemetry ID fields
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\$session_id|\bsessionId\b'

  - id: telemetry-device-id-fields
    desc: Device telemetry ID fields
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\$device_id|\bdeviceId\b'

  - id: telemetry-distinct-id-fields
    desc: Distinct telemetry ID fields
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\bdistinctId\b|\buniqueId\b'

  - id: host-user-telemetry-id
    desc: Host user telemetry identifier
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'hostname\(\).{0,120}userInfo\(\)\.username|userInfo\(\)\.username.{0,120}hostname\(\)'

  - id: telemetry-file-path-fields
    desc: File path telemetry fields
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(filePath|newFilePath|directoryPath|tsconfigPath)\b'

  - id: telemetry-workspace-path-fields
    desc: Workspace path telemetry fields
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(workspacePath|cwd)\b'

  - id: telemetry-terminal-fields
    desc: Terminal telemetry fields
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(terminalId|shellPath|command|stdout)\b'

  - id: telemetry-browser-url-fields
    desc: Browser URL telemetry fields
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(url|pageId|browserId|threadId)\b'

  - id: terminal-telemetry-events
    desc: Terminal telemetry events
    crit: component
    conf: 0.9
    if:
      type: text
      word: terminal_run_command

  - id: browser-telemetry-events
    desc: Browser telemetry events
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(browser_open_clicked|browser_open_success|agent_browser_open_triggered|send_to_chat)\b'

  - id: workspace-telemetry-events
    desc: Workspace telemetry events
    crit: component
    conf: 0.9
    if:
      type: text
      word: OPEN_FOLDER_KOMBAI_FOCUS

  - id: file-operation-telemetry-events
    desc: File operation telemetry events
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(READ_FILE_ERROR|WRITE_FILE_ERROR|DELETE_FILE_ERROR|RENAME_FILE_ERROR)\b'

  - id: screenshot-telemetry-events
    desc: Screenshot telemetry events
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(SCREENSHOT_FAILURE|SCREENSHOT_SUCCESS|HEATMAP_FAILURE|HEATMAP_SUCCESS)\b'

  - id: typecheck-telemetry-events
    desc: Typecheck telemetry events
    crit: component
    conf: 0.9
    if:
      type: text
      word: typescript_check_compilation_failed

  - id: design-telemetry-forwarder
    desc: Design telemetry event forwarder
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'telemetry:track|ctx\.tracer\.posthog\.capture'

  - id: canvas-telemetry-events
    desc: Canvas telemetry events
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\b(canvasCreated|canvasRenamed|canvasUndo|canvasRedo)\b'

  - id: node-telemetry-events
    desc: Node canvas telemetry events
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\b(nodeCreated|nodeDeleted|nodesBatchDeleted)\b'

  - id: node-undo-telemetry-events
    desc: Node undo telemetry events
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\b(nodeUndo|nodeRedo)\b'

  - id: theme-telemetry-events
    desc: Theme telemetry events
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\b(themeApplied|themeDuplicated|themeCreated)\b'

  - id: theme-change-telemetry-events
    desc: Theme change telemetry events
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\b(themeUpdated|themeDeleted)\b'

  - id: style-export-telemetry-events
    desc: Style export telemetry events
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\b(styleGuideCreated|styleGuideUpdated|styleGuideDeleted|fileExported)\b'

composite_rules:
  - id: telemetry-persistent-id-field-cluster
    desc: Persistent telemetry ID field cluster
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: telemetry-persistent-id-fields
      - id: telemetry-device-id-fields
      - id: telemetry-distinct-id-fields

  - id: developer-activity-telemetry-fields
    desc: Developer activity telemetry fields
    crit: component
    conf: 0.88
    needs: 2
    any:
      - id: telemetry-file-path-fields
      - id: telemetry-workspace-path-fields
      - id: telemetry-terminal-fields
      - id: telemetry-browser-url-fields

  - id: developer-activity-telemetry-events
    desc: Developer activity telemetry events
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: terminal-telemetry-events
      - id: browser-telemetry-events
      - id: workspace-telemetry-events
      - id: file-operation-telemetry-events
      - id: screenshot-telemetry-events
      - id: typecheck-telemetry-events

  - id: design-activity-telemetry-events
    desc: Design activity telemetry events
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: canvas-telemetry-events
      - id: node-telemetry-events
      - id: node-undo-telemetry-events
      - id: theme-telemetry-events
      - id: theme-change-telemetry-events
      - id: style-export-telemetry-events

  - id: posthog-telemetry-client
    desc: PostHog telemetry client
    crit: notable
    conf: 0.92
    all:
      - id: posthog-host
    any:
      - id: posthog-event-object
      - id: posthog-feature-flag-lookup

  - id: posthog-user-identity-telemetry
    desc: PostHog sends user identity telemetry
    crit: suspicious
    conf: 0.94
    all:
      - id: posthog-telemetry-client
      - id: telemetry-user-identity-fields
    any:
      - id: telemetry-email-field
      - id: telemetry-persistent-id-field-cluster

  - id: developer-activity-telemetry
    desc: Telemetry records developer activity
    crit: suspicious
    conf: 0.92
    all:
      - id: developer-activity-telemetry-fields
      - id: developer-activity-telemetry-events
    any:
      - id: posthog-telemetry-client
      - id: design-telemetry-forwarder

  - id: stored-profile-telemetry
    desc: Telemetry profile stored locally
    crit: notable
    conf: 0.9
    all:
      - id: telemetry-profile-file
    any:
      - id: telemetry-profile-writer
      - id: telemetry-user-identity-fields
      - id: telemetry-persistent-id-field-cluster

  - id: uninstall-profile-telemetry
    desc: Uninstall sends telemetry profile
    crit: suspicious
    conf: 0.96
    all:
      - id: posthog-host
      - id: telemetry-profile-file
      - id: uninstall-telemetry-event
    any:
      - id: telemetry-persistent-id-field-cluster
      - id: host-user-telemetry-id

  - id: host-user-uninstall-telemetry-id
    desc: Uninstall telemetry includes host user ID
    crit: suspicious
    conf: 0.95
    all:
      - id: uninstall-profile-telemetry
      - id: host-user-telemetry-id

  - id: sentry-user-context-telemetry
    desc: Sentry sends user context telemetry
    crit: suspicious
    conf: 0.92
    all:
      - id: sentry-ingest-dsn
    any:
      - id: sentry-worker-identity-bridge
      - id: telemetry-user-identity-fields
      - id: sentry-exception-capture

  - id: worker-telemetry-forwarding
    desc: Worker forwards telemetry events
    crit: notable
    conf: 0.9
    all:
      - id: design-telemetry-forwarder
    any:
      - id: design-activity-telemetry-events
      - id: sentry-worker-identity-bridge
      - id: sentry-exception-capture

  - id: design-activity-telemetry
    desc: Telemetry records design activity
    crit: suspicious
    conf: 0.91
    all:
      - id: design-telemetry-forwarder
      - id: design-activity-telemetry-events
