defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1119

traits:
- id: sentry-ingest-dsn
  desc: Official Sentry ingest DSN
  crit: notable
  conf: 0.92
  if:
    type: literal
    kind: string
    regex: 'https://[a-f0-9]{16,}@o[0-9]+\.ingest\.[a-z0-9.-]*sentry\.io/[0-9]+'
    case_insensitive: true

- id: sentry-self-hosted-dsn
  desc: Self-hosted Sentry DSN endpoint
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: 'https://[a-f0-9]{16,}@[a-z0-9.-]+/[0-9]+[\s\S]{0,600}sentry'
    case_insensitive: true

- id: sentry-exception-capture
  desc: Sentry exception capture
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '\bcaptureException\s*\(|Sentry[^"\n]{0,120}captureException'

- id: sentry-worker-identity-bridge
  desc: Sentry worker identity bridge
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'set-sentry-identity|applyWorkerSentryIdentity|initWorkerSentry'

- id: telemetry-profile-file
  desc: Stored telemetry profile file
  crit: component
  conf: 0.96
  if:
    type: text
    substr: telemetry.json

- id: telemetry-profile-writer
  desc: Writes stored telemetry profile
  crit: component
  conf: 0.92
  if:
    type: text
    word: storeTelemetryData

- id: uninstall-telemetry-event
  desc: Extension uninstall telemetry event
  crit: component
  conf: 0.96
  if:
    type: text
    word: extension_uninstalled

- id: telemetry-user-identity-fields
  desc: User identity telemetry fields
  crit: component
  conf: 0.9
  count_min: 3
  if:
    type: text
    regex: '\b(userEmail|emailDomain|userId|orgId)\b'

- id: terminal-telemetry-events
  desc: Terminal telemetry events
  crit: component
  conf: 0.9
  if:
    type: text
    word: terminal_run_command

- id: workspace-telemetry-events
  desc: Workspace telemetry events
  crit: component
  conf: 0.9
  if:
    type: text
    word: OPEN_FOLDER_KOMBAI_FOCUS

- id: typecheck-telemetry-events
  desc: Typecheck telemetry events
  crit: component
  conf: 0.9
  if:
    type: text
    word: typescript_check_compilation_failed

- id: design-telemetry-forwarder
  desc: Design telemetry event forwarder
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'telemetry:track|ctx\.tracer\.posthog\.capture'

- id: telemetry-email-field--useremail
  desc: userEmail identity field
  crit: component
  conf: 0.9
  if:
    type: text
    word: userEmail
- id: telemetry-email-field--emaildomain
  desc: emailDomain identity field
  crit: component
  conf: 0.9
  if:
    type: text
    word: emailDomain
- id: telemetry-distinct-id-fields--distinctid
  desc: Distinct telemetry ID fields (distinctId)
  crit: component
  conf: 0.88
  if:
    type: text
    word: distinctId
- id: telemetry-distinct-id-fields--uniqueid
  desc: Distinct telemetry ID fields (uniqueId)
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '(?i)telemetry.{0,80}\buniqueId\b|\buniqueId\b.{0,80}telemetry'
- id: telemetry-file-path-fields--filepath
  desc: File path telemetry fields (filePath)
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)telemetry.{0,80}\bfilePath\b|\bfilePath\b.{0,80}telemetry'
- id: telemetry-file-path-fields--newfilepath
  desc: File path telemetry fields (newFilePath)
  crit: component
  conf: 0.86
  if:
    type: text
    word: newFilePath
- id: telemetry-file-path-fields--directorypath
  desc: File path telemetry fields (directoryPath)
  crit: component
  conf: 0.86
  if:
    type: text
    word: directoryPath
- id: telemetry-file-path-fields--tsconfigpath
  desc: File path telemetry fields (tsconfigPath)
  crit: component
  conf: 0.86
  if:
    type: text
    word: tsconfigPath
- id: telemetry-workspace-path-fields--workspacepath
  desc: Workspace path telemetry fields (workspacePath)
  crit: component
  conf: 0.86
  if:
    type: text
    word: workspacePath
- id: telemetry-terminal-fields--terminalid
  desc: Terminal telemetry fields (terminalId)
  crit: component
  conf: 0.86
  if:
    type: text
    word: terminalId
- id: telemetry-terminal-fields--shellpath
  desc: Terminal telemetry fields (shellPath)
  crit: component
