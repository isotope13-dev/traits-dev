defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
composite_rules:
  - id: windows-audio-capture-http-exfil
    desc: Audio capture with HTTP exfiltration
    crit: hostile
    conf: 0.95
    attack: T1123
    all:
      - id: micro-behaviors/hardware/input/audio::windows-mci-audio-recording
    any:
      - id: objectives/command-and-control/channel/http::upload-monitoring-endpoint
      - id: micro-behaviors/communications/http/post::wininet-post
      - id: micro-behaviors/communications/http/upload/
  - id: windows-webcam-capture-http-exfil
    desc: Webcam capture with HTTP exfiltration
    crit: hostile
    conf: 0.95
    attack: T1125
    all:
      - id: micro-behaviors/hardware/display/camera::windows-vfw-frame-capture
    any:
      - id: objectives/command-and-control/channel/http::upload-monitoring-endpoint
      - id: micro-behaviors/communications/http/post::wininet-post
      - id: micro-behaviors/communications/http/upload/
