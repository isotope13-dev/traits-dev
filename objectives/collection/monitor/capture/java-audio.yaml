defaults:
  platforms: [windows, unix]
  for: [java]
  attack: T1123
  mbc: F0009

traits:
  - id: java-target-data-line-source
    desc: Java microphone TargetDataLine source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: identifier
      exact: TargetDataLine
  - id: java-audiosystem-write-source
    desc: Java AudioSystem writes captured audio
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'AudioSystem\.write\('
  - id: java-audioinputstream-source
    desc: Java AudioInputStream source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: identifier
      exact: AudioInputStream

composite_rules:
  - id: java-microphone-capture-to-file
    desc: Java microphone capture to file
    crit: suspicious
    conf: 0.94
    all:
      - id: java-target-data-line-source
      - id: java-audioinputstream-source
      - id: java-audiosystem-write-source
