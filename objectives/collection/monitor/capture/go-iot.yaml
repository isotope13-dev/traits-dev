defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1123

traits:
  - id: go-snapshot-credential-filename
    desc: Snapshot filename contains credential fields
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '%s_%s_%s_%s.jpg'

composite_rules:
  - id: go-camera-snapshot-request
    desc: Go camera snapshot collection path
    crit: suspicious
    conf: 0.99
    scope: outer
    all:
      - id: micro-behaviors/hardware/display/camera::go-camera-snapshot-call
      - id: micro-behaviors/communications/http/endpoints::camera-snapshot-cgi-endpoint
      - id: micro-behaviors/data/embedded/payload/image::go-jpeg-decoder-import

  - id: go-compromised-camera-snapshot
    desc: Compromised IoT camera snapshot collection
    crit: hostile
    conf: 0.99
    attack: T1123,T1210
    scope: outer
    all:
      - id: micro-behaviors/hardware/display/camera::go-camera-snapshot-call
      - id: micro-behaviors/communications/http/endpoints::camera-snapshot-cgi-endpoint
      - id: micro-behaviors/data/embedded/payload/image::go-jpeg-decoder-import
      - id: go-snapshot-credential-filename
      - id: objectives/lateral-movement/exploit/scanner::go-device-cve-methods
      - id: objectives/lateral-movement/exploit/scanner::go-rpc-session-zero
      - id: objectives/lateral-movement/exploit/scanner::go-unauth-config-probe
      - id: objectives/lateral-movement/exploit/scanner::go-device-admin-endpoint
    any:
      - id: micro-behaviors/os/user/account::admin-group-selection
      - id: micro-behaviors/os/user/account::primary-admin-group-selection
