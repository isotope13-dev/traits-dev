defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1123

traits:
  - id: go-camera-snapshot-function
    desc: Go calls camera snapshot operation
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: GetSnapshot

  - id: go-camera-snapshot-endpoint
    desc: Camera snapshot CGI endpoint
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: snapshot.cgi

  - id: go-camera-snapshot-jpeg
    desc: Camera snapshot JPEG response
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: image/jpeg

  - id: go-snapshot-credential-filename
    desc: Snapshot filename contains credential fields
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '%s_%s_%s_%s.jpg'

composite_rules:
  - id: go-camera-snapshot-request
    desc: Go camera snapshot collection path
    crit: suspicious
    conf: 0.99
    scope: outer
    all:
      - id: go-camera-snapshot-function
      - id: go-camera-snapshot-endpoint
      - id: go-camera-snapshot-jpeg

  - id: go-compromised-camera-snapshot
    desc: Compromised IoT camera snapshot collection
    crit: hostile
    conf: 0.99
    attack: T1123,T1210
    scope: outer
    all:
      - id: go-camera-snapshot-function
      - id: go-camera-snapshot-endpoint
      - id: go-camera-snapshot-jpeg
      - id: go-snapshot-credential-filename
      - id: objectives/lateral-movement/exploit/scanner::go-iot-cve-admin-takeover
