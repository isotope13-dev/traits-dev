defaults:
  platforms: [windows]
  for: [pe]
  attack: T1113
  mbc: B0009

traits:
  - id: rust-screen-webcam-control-labels
    desc: Rust screen webcam control labels
    crit: suspicious
    conf: 0.92
    if:
      type: hex
      section: .rdata
      pattern: 73 63 72 65 65 6e 5f 73 74 61 72 74 73 63 72 65 65 6e 5f 73 74 6f 70
  - id: rust-media-frame-labels
    desc: Rust media frame labels
    crit: suspicious
    conf: 0.88
    if:
      type: hex
      section: .rdata
      pattern: 73 63 72 65 65 6e 5f 66 72 61 6d 65
  - id: rust-image-screen-frame-label
    desc: Rust image screen frame label
    crit: suspicious
    conf: 0.86
    if:
      type: hex
      section: .rdata
      pattern: 69 6d 61 67 65 73 63 72 65 65 6e 5f 66 72 61 6d 65
  - id: rust-camera-framework-paths
    desc: Rust camera framework paths
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'nokhwa-.{0,20}src[/\\]camera\.rs'

composite_rules:
  - id: rust-rat-screen-webcam-streaming
    desc: Rust RAT screen webcam streaming
    crit: hostile
    conf: 0.96
    all:
      - id: rust-screen-webcam-control-labels
      - id: rust-media-frame-labels
    any:
      - id: rust-image-screen-frame-label
      - id: rust-camera-framework-paths
      - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
      - id: micro-behaviors/hardware/display/camera/
    needs: 1
  - id: rust-socketio-rat-surveillance
    desc: Rust Socket.IO RAT surveillance
    crit: hostile
    conf: 0.97
    all:
      - id: rust-rat-screen-webcam-streaming
      - id: objectives/command-and-control/backdoor/dispatch/module::rust-socketio-client-path
      - id: objectives/command-and-control/backdoor/dispatch/module::rat-command-action-labels
      - id: objectives/command-and-control/backdoor/dispatch/module::rat-auth-heartbeat-labels
