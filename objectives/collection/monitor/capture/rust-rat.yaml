defaults:
  platforms: [windows]
  for: [pe]
  attack: T1113
  mbc: B0009

traits:
  - id: screen-webcam-control-labels
    desc: Screen and webcam control labels
    crit: suspicious
    conf: 0.92
    if:
      type: hex
      section: .rdata
      pattern: 73 63 72 65 65 6e 5f 73 74 61 72 74 73 63 72 65 65 6e 5f 73 74 6f 70
  - id: screen-frame-label
    desc: Screen-frame label outside graphics vocabulary
    crit: component
    conf: 0.88
    if:
      type: text
      word: screen_frame
      section: .rdata
    not:
      - substr: gmode_
    unless:
      - id: metadata/lang/compiler/systems::go-binary-comp
  - id: image-screen-frame-label
    desc: Image screen-frame label
    crit: suspicious
    conf: 0.86
    if:
      type: hex
      section: .rdata
      pattern: 69 6d 61 67 65 73 63 72 65 65 6e 5f 66 72 61 6d 65
  - id: camera-framework-paths
    desc: Camera framework source paths
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'nokhwa-.{0,20}src[/\\]camera\.rs'

composite_rules:
  - id: rust-rat-screen-webcam-streaming
    desc: Rust RAT screen webcam streaming
    crit: hostile
    conf: 0.96
    all:
      - id: screen-webcam-control-labels
      - id: screen-frame-label
    any:
      - id: image-screen-frame-label
      - id: camera-framework-paths
      - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
      - id: micro-behaviors/hardware/display/camera/
    needs: 1
  - id: rust-socketio-rat-surveillance
    desc: Rust Socket.IO RAT surveillance
    crit: hostile
    conf: 0.97
    all:
      - id: rust-rat-screen-webcam-streaming
      - id: objectives/command-and-control/backdoor/dispatch/module::rust-socketio-client-path
      - id: micro-behaviors/process/create/command-handler::execute-command-label
      - id: objectives/command-and-control/backdoor/dispatch/module::rat-auth-heartbeat-labels
