defaults:
  platforms: [windows, unix]
  for: [rust]
traits:
  - id: stream-handler-fn
    desc: Stream handler function
    crit: component
    conf: 0.88
    if:
      type: symbol
      exact: stream_handler
  - id: desktop-stream-handler
    desc: Desktop stream handler route
    crit: component
    conf: 0.9
    if:
      type: text
      substr: desktop::stream_handler
  - id: webcam-stream-handler
    desc: Webcam stream handler route
    crit: component
    conf: 0.9
    if:
      type: text
      substr: webcam::stream_handler
  - id: stream-handler-route
    desc: Root route to stream handler
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'route\(\s*"/"\s*,\s*get\((desktop|webcam)::stream_handler\)\)'
  - id: stream-stop-function
    desc: Stream shutdown control function
    crit: component
    conf: 0.82
    if:
      type: text
      word: stream_stop
  - id: stream-desktop-command
    desc: Desktop stream command route
    crit: component
    conf: 0.95
    if:
      type: string_literal
      exact: /stream_desktop
  - id: stream-webcam-command
    desc: Webcam stream command route
    crit: component
    conf: 0.95
    if:
      type: string_literal
      exact: /stream_webcam
  - id: local-tunnel-start
    desc: Local tunnel bootstrap target
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: 'tunnel::start(&obfuscate!("http://127.0.0.1:80"))'
  - id: public-url-banner
    desc: Public URL status banner
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: "Public URL: "
  - id: desktop-tunnel-server
    desc: Desktop tunnel server launch
    crit: component
    conf: 0.94
    if:
      type: text
      substr: 'tunnel::server(1, &obfuscate!("http://127.0.0.1:80"), tunnel)'
  - id: webcam-tunnel-server
    desc: Webcam tunnel server launch
    crit: component
    conf: 0.94
    if:
      type: text
      substr: 'tunnel::server(2, &obfuscate!("http://127.0.0.1:80"), tunnel)'
  - id: randomized-wav-filename-format
    desc: Randomized WAV filename format
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: "{}.wav"
composite_rules:
  - id: rust-random-temp-wav-recording
    desc: Rust randomized temp WAV recording
    crit: suspicious
    conf: 0.95
    attack: T1123
    all:
      - id: micro-behaviors/hardware/input/audio::rust-cpal-audio-recording
      - id: micro-behaviors/fs/path/temp::rust-temp-dir
      - id: randomized-wav-filename-format
    any:
      - id: metadata/file/profile/identity::rust-random-name-module
      - id: micro-behaviors/hardware/input/audio::hound-wav-writer
  - id: rust-http-desktop-stream
    desc: Rust desktop stream over HTTP
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/display/screen::scrap-screen-capture
      - id: micro-behaviors/communications/http/server/framework::rust-mjpeg-stream-response
    any:
      - id: stream-handler-fn
      - id: desktop-stream-handler
      - id: stream-handler-route
      - id: stream-stop-function
      - id: micro-behaviors/data/encode/image/jpeg::rust-jpeg-frame-encoding
  - id: rust-http-webcam-stream
    desc: Rust webcam stream over HTTP
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/http/server/framework::rust-axum-http-server
      - id: webcam-stream-handler
    any:
      - id: stream-handler-route
      - id: stream-stop-function
  - id: rust-dual-stream-surveillance
    desc: Rust desktop and webcam streaming
    crit: suspicious
    conf: 0.95
    all:
      - id: rust-http-desktop-stream
      - id: rust-http-webcam-stream
  - id: rust-ngrok-surveillance-stream
    desc: Rust ngrok tunnel for live surveillance stream
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/proxy/tunnel::rust-ngrok-http-tunnel
      - id: rust-dual-stream-surveillance
    any:
      - id: stream-handler-route
      - id: stream-stop-function
  - id: rust-tunneled-desktop-stream-dispatch
    desc: Rust tunneled desktop stream control
    crit: suspicious
    conf: 0.96
    all:
      - id: stream-desktop-command
      - id: local-tunnel-start
      - id: desktop-tunnel-server
    any:
      - id: public-url-banner
      - id: stream-stop-function
  - id: rust-tunneled-webcam-stream-dispatch
    desc: Rust tunneled webcam stream control
    crit: suspicious
    conf: 0.96
    all:
      - id: stream-webcam-command
      - id: local-tunnel-start
      - id: webcam-tunnel-server
    any:
      - id: public-url-banner
      - id: stream-stop-function
  - id: rust-tunneled-dual-stream-dispatch
    desc: Rust tunneled desktop and webcam streaming
    crit: hostile
    conf: 0.98
    all:
      - id: rust-tunneled-desktop-stream-dispatch
      - id: rust-tunneled-webcam-stream-dispatch
