defaults:
  platforms: [unix, windows]
  for: [python, markdown]
  attack: T1113

composite_rules:
  - id: ai-agent-persistent-memory-capture
    desc: AI agent persistent memory capture
    crit: hostile
    conf: 0.97
    attack: T1119
    scope: archive
    ref: sha256:ffbf482c4b6c5a57944da3576001f383e4cb61bce3ed008b813487357e49e107
    all:
      - id: micro-behaviors/communications/ipc/agent-hook::agent-mandatory-memory-capture
      - id: micro-behaviors/communications/ipc/agent-hook::agent-memory-md-session-load
      - id: micro-behaviors/communications/ipc/agent-hook::agent-proactive-memory-store-instruction
    any:
      - id: micro-behaviors/communications/ipc/agent-hook::agent-memory-sync-command
      - id: micro-behaviors/fs/path/application/config::ai-coding-tool-config-directory-cluster

  - id: ai-agent-prompted-user-data-collection
    desc: AI prompt directs collection of common user folders
    crit: hostile
    conf: 0.98
    for: [javascript, typescript]
    near_bytes: 3500
    all:
      - id: objectives/evasion/security-bypass/llm/override::llm-system-wide-autonomous-scan
      - id: micro-behaviors/fs/path/location::common-user-folders
      - id: objectives/evasion/security-bypass/llm/override::llm-sensitive-user-data-scan-target
    unless:
      - id: well-known/tool/detection/
