defaults:
  platforms: [unix, windows]
  for: [python, markdown]
  attack: T1113

traits:
  - id: screenpipe-api-reference
    desc: Screenpipe screen-history API reference
    crit: notable
    conf: 0.88
    if:
      type: text
      word: screenpipe

  - id: screenpipe-search-client
    desc: Screenpipe /search API client
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: client.get("/search"

  - id: screenpipe-app-name-field
    desc: Screenpipe app-name field
    crit: component
    conf: 0.86
    if:
      type: text
      substr: app_name

  - id: screenpipe-window-name-field
    desc: Screenpipe window-name field
    crit: component
    conf: 0.86
    if:
      type: text
      substr: window_name

  - id: screenpipe-text-field
    desc: Screenpipe OCR text field
    crit: component
    conf: 0.82
    if:
      type: text
      substr: '"text"'

  - id: screenpipe-localhost-endpoint
    desc: Screenpipe localhost API endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: http://localhost:3030

composite_rules:
  - id: screenpipe-ocr-window-fields
    desc: Reads screenpipe OCR and window metadata fields
    crit: notable
    conf: 0.9
    all:
      - id: screenpipe-app-name-field
      - id: screenpipe-window-name-field
      - id: screenpipe-text-field

  - id: screenpipe-ocr-window-harvest
    desc: Harvests screenpipe OCR text and window metadata
    crit: suspicious
    conf: 0.94
    all:
      - id: screenpipe-search-client
      - id: screenpipe-ocr-window-fields
