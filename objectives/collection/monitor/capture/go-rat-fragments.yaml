defaults:
  platforms: [windows]
  for: [pe]
  attack: T1113

traits:
- id: remote-desktop-control-fragments--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: 'rd_start'

- id: remote-desktop-control-fragments--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: 'rd_block'

- id: remote-desktop-control-fragments--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: 'monitors'

- id: remote-desktop-control-fragments--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: '_display'

- id: webcam-microphone-fragments
  desc: Webcam and microphone fragments
  crit: notable
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: 'webcam_(s|l)|mic_(star|stop)'

composite_rules:
- id: go-rat-remote-desktop-control
  desc: Go display control over websocket
  crit: notable
  conf: 0.93
  all:
  - id: remote-desktop-control-fragments
  any:
  - id: objectives/command-and-control/remote-command/protocol::go-websocket-fragment
  - id: micro-behaviors/process/create/system::go-os-exec-pclntab

- id: go-rat-webcam-microphone-capture
  desc: Go RAT webcam microphone capture
  crit: suspicious
  conf: 0.93
  all:
  - id: webcam-microphone-fragments
  any:
  - id: objectives/command-and-control/remote-command/protocol::go-websocket-fragment
  - id: micro-behaviors/process/create/system::go-os-exec-pclntab
- id: remote-desktop-control-fragments
  desc: Remote desktop control fragments
  crit: notable
  conf: 0.85
  any:
  - id: remote-desktop-control-fragments--rx-1
  - id: remote-desktop-control-fragments--rx-2
  - id: remote-desktop-control-fragments--rx-3
  - id: remote-desktop-control-fragments--rx-4
  needs: 1
