defaults:
  platforms: [unix, windows]
  for: [python, whl, python-sdist]
  attack: T1123,T1125

traits:
  - id: python-remote-media-surface
    desc: Python remote camera or microphone surface
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(/dev/video[0-9]+|MediaPlayer\s*\(|RTCPeerConnection\s*\(|MediaRecorder\s*\()'

  - id: python-media-track-receiver
    desc: Python receives and records remote media tracks
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: remote track

  - id: python-signal-client-control
    desc: Python signaling client controls peer sessions
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\bself\.signal\b'

composite_rules:
  - id: python-websocket-media-surveillance-agent
    desc: Python WebSocket agent receives remote camera or audio
    crit: hostile
    conf: 0.995
    scope: archive
    all:
      - id: micro-behaviors/communications/websocket/library::python-websockets-client
      - id: objectives/command-and-control/backdoor/rat/multi::python-remote-command-routing-protocol
      - id: python-remote-media-surface
      - id: python-media-track-receiver
      - id: python-signal-client-control
