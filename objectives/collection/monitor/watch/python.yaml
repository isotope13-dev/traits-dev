defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: pyperclip-paste-dup
    desc: pyperclip.paste() call
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: pyperclip\.paste\(
  - id: clipboard-get
    desc: clipboard.get() call
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: clipboard\.get\(
  - id: pynput-keyboard
    desc: pynput.keyboard import
    crit: notable
    conf: 0.7
    mbc: F0002
    attack: T1056.001
    if:
      type: string
      substr: pynput.keyboard
  - id: keyboard-on-press
    desc: keyboard.on_press hook
    crit: notable
    conf: 0.7
    mbc: F0002
    attack: T1056.001
    if:
      type: string
      regex: keyboard\.on_press\s*\(
composite_rules:
  - id: clipboard-access
    desc: Accesses system clipboard (potential stealer)
    crit: suspicious
    conf: 0.9
    any:
      - id: objectives/collection/monitor/watch::pyperclip-paste-dup
      - id: clipboard-get
    downgrade:
      any:
        - id: metadata/quality::versioned
  - id: keyboard-logger
    desc: Monitors keyboard input (potential keylogger)
    crit: suspicious
    conf: 0.9
    mbc: F0002
    attack: T1056.001
    any:
      - id: pynput-keyboard
      - id: keyboard-on-press
  - id: screen-capture-comp
    desc: Captures screen display
    crit: notable
    conf: 0.9
    mbc: B0002
    attack: T1113
    any:
      - id: micro-behaviors/hardware/display/screen::mss-screenshot
      - id: micro-behaviors/hardware/display/screen::pil-imagegrab
      - id: micro-behaviors/hardware/display/screen::pyautogui-screenshot
