defaults:
  for: [pe, dll]
  platforms: [windows]

composite_rules:
  - id: windows-user-activity-collection-triad
    desc: Keylogging screenshot clipboard collection
    crit: hostile
    conf: 0.95
    attack: T1056.001
    mbc: B0015
    all:
      - id: objectives/collection/keylog/capture::windows-hook-window-title-keylogger
      - id: objectives/collection/screenshot/capture::gdi-window-capture
      - id: objectives/collection/clipboard/capture::windows-clipboard-capture-with-user-monitoring
    any:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
      - id: objectives/anti-analysis/timing/evasion::ui-timer-keypoll-gate
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::microsoft-corp-marker
