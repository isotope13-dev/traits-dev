defaults:
  for: [pe, dll]
  platforms: [windows]

composite_rules:
- id: dotnet-active-and-multiscreen-capture
  desc: .NET active-window screenshot with DPI-aware display enumeration
  crit: suspicious
  conf: 0.94
  attack: T1113
  mbc: B0002
  ref: sha256:102dd32a30d7a0cf86955e6045e0426a26dfef393ce946d49c006d19c4c036e9
  all:
  - id: objectives/collection/screenshot/capture::dotnet-gdi-active-window-png-capture
  - id: micro-behaviors/hardware/display/screen::dotnet-dpi-aware-display-enumeration
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: metadata/library/automation/
- id: windows-user-activity-collection-triad
  desc: Keylogging screenshot clipboard collection
  crit: hostile
  conf: 0.95
  attack: T1056.001
  mbc: B0015
  all:
  - id: objectives/collection/keylog/capture::windows-hook-window-title-keylogger
  - id: objectives/collection/screenshot/capture::gdi-window-capture
  - id: objectives/collection/clipboard/capture::windows-clipboard-capture-with-user-monitoring
  any:
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: micro-behaviors/process/sync/mutex::mutex-instance-check
  - id: objectives/anti-analysis/timing/evasion::ui-timer-keypoll-gate
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
  - id: well-known/tool/reverse-engineering/resource-hacker/
  - id: well-known/tool/sysadmin/sandboxie/
