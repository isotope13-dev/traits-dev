defaults:
  attack: "T1040"
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: packet-sniffer-title
    desc: Packet Sniffer thread title
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      substr: "Packet Sniffer"
  - id: irc-sniff-format
    desc: IRC traffic sniffer format
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: "IRC sniff"
  - id: ftp-sniff-format
    desc: FTP traffic sniffer format
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: "FTP sniff"
  - id: http-sniff-format
    desc: HTTP traffic sniffer format
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: "HTTP sniff"
  - id: vuln-sniff-format
    desc: Vulnerability sniffer format
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      substr: "VULN sniff"
composite_rules:
  - id: protocol-credential-sniffer
    desc: Multi-protocol credential sniffer
    crit: suspicious
    conf: 0.98
    needs: 2
    any:
      - id: packet-sniffer-title
      - id: irc-sniff-format
      - id: ftp-sniff-format
      - id: http-sniff-format
      - id: vuln-sniff-format
