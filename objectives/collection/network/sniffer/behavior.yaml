defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: log-file-regex-search
    desc: Searching for patterns in system logs
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: '/var/log/[\w\.-]+_error\.log|sslvpn_ngx_error\.log'
composite_rules:
  - id: log-command-extraction
    desc: Extracting commands from log files
    crit: suspicious
    conf: 0.9
    attack: T1505
    all:
      - id: log-file-regex-search
      - id: micro-behaviors/data/decode/base64::b64decode-string
      - id: micro-behaviors/process/create/subprocess::os-popen
