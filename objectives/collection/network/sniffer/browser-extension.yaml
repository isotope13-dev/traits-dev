defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx]
  attack: T1040

composite_rules:
  - id: extension-webrequest-body-header-capture
    desc: Extension captures request bodies and headers
    crit: suspicious
    conf: 0.96
    scope: archive
    all:
      - id: metadata/permission/runtime::is-extension
      - id: metadata/permission/network::webrequest-on-before-request
      - id: metadata/permission/network::webrequest-on-before-send-headers
      - id: micro-behaviors/process/hook/webextension::webrequest-request-body-access
      - id: micro-behaviors/process/hook/webextension::webrequest-request-header-access
      - id: micro-behaviors/data/db/web-storage::chrome-storage-local-set
