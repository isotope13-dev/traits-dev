defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: ai-agent-https-proxy-intercept
    desc: AI agent HTTPS proxy interception
    crit: hostile
    conf: 0.99
    attack: T1557
    all:
      - id: objectives/supply-chain/trojanized/app/ai-agent-tools::native-ai-agent-identity
      - id: micro-behaviors/communications/proxy/mitm::proxy-ca-module-marker
      - id: micro-behaviors/communications/proxy/mitm::https-interception-marker
      - id: micro-behaviors/communications/proxy/mitm::custom-upstream-marker
