# SSL/TLS Traffic Interception Detection
# Detects tools that intercept encrypted traffic before/after encryption
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [c, elf]
composite_rules:
  # SSL/TLS target marker: presence of a real TLS library function/op the
  # interceptor hooks (OpenSSL/GnuTLS/NSS). Required by the SSL-intercept
  # composites so generic eBPF uprobe tooling (bpftool, sched_ext schedulers)
  # that never touches TLS no longer matches an "SSL interception" trait.
  - id: ssl-tls-marker
    desc: SSL/TLS library hook target
    crit: notable
    conf: 0.8
    any:
      - id: objectives/collection/network/ssl-intercept::ssl-op-string
      - id: objectives/collection/network/ssl-intercept::ssl-hook-target
      - id: micro-behaviors/communications/socket/ssl::gnutls-record-send-recv-source
      - id: objectives/collection/network/ssl-intercept::ssl-nss-fn
      - id: micro-behaviors/communications/socket/ssl::openssl-ssl-functions
      - id: objectives/collection/network/ssl-intercept::ssl-attach-openssl
      - id: objectives/collection/network/ssl-intercept::ssl-attach-gnutls
      - id: objectives/collection/network/ssl-intercept::ssl-attach-nss
      - id: objectives/collection/network/ssl-intercept::ssl-listen-event
  # eBPF uprobe hook mechanism
  - id: ebpf-uprobe-hook
    desc: eBPF uprobe hooking
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/os/bpf/program/tracing::uprobe-attach
      - id: micro-behaviors/os/bpf/program/tracing::uprobe-sec
        # eBPF-based SSL/TLS Interception
        # Combines: uprobe attachment + BPF capabilities
  - id: ebpf-ssl-intercept
    desc: eBPF-based SSL/TLS interception
    crit: suspicious
    conf: 0.9
    attack: "T1557"
    mbc: "C0001"
    all:
      - id: ebpf-uprobe-hook
      - id: micro-behaviors/os/bpf/
      - id: ssl-tls-marker
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-datadog-agent-member
        # Generic SSL function hooking (non-eBPF)
        # For LD_PRELOAD or other hooking mechanisms
  - id: ssl-hook-pattern
    desc: SSL/TLS function hook pattern
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/os/bpf/
      - id: ssl-tls-marker
    any:
      - id: objectives/collection/network/ssl-intercept::ssl-op-string
      - id: micro-behaviors/os/bpf/program/tracing::uprobe-attach
        # SSL sniffer loader program
        # Detects the main loader program (not the eBPF probe itself)
  - id: ssl-sniffer-loader-comp
    desc: SSL sniffer loader program
    crit: suspicious
    conf: 0.9
    attack: "T1557"
    all:
      - id: objectives/collection/network/ssl-intercept::ssl-sniffer-loader
    any:
      - id: objectives/collection/network/ssl-intercept::ebpf-loader-include
      - id: objectives/discovery/host/software::ssl-lib-targets
        # Multi-TLS library interception tool
        # Targeting multiple SSL/TLS libraries = credential/traffic interception
  - id: multi-tls-intercept
    desc: Multi-library TLS interception
    crit: hostile
    conf: 0.95
    attack: "T1557"
    mbc: "C0001"
    all:
      - id: objectives/collection/network/ssl-intercept::ssl-sniffer-loader
      - id: objectives/discovery/host/software::ssl-lib-targets
      - id: micro-behaviors/os/bpf/
