defaults:
  platforms: [android]
  for: [apk, zip]

traits:
  - id: android-smsc-resource-member
    desc: Android APK embeds SMSC resource file
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^res/raw/smsc\.txt$'

  - id: android-mccmnc-resource-member
    desc: Android APK embeds MCC/MNC resource file
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^res/raw/mccmnc\.txt$'

  - id: android-operator-localized-text-assets
    desc: Android APK localized operator text assets
    crit: component
    conf: 0.88
    if:
      type: value
      path: "archive.members[*].path"
      regex: '^assets/texts/(ru_megafon|ru|ua)/rules_activity\.txt$'

composite_rules:
  - id: android-operator-sms-config-apk
    desc: Android APK bundles SMSC and MCC/MNC operator config resources
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: android-smsc-resource-member
      - id: android-mccmnc-resource-member
      - id: android-operator-localized-text-assets

  - id: android-sms-phone-permission-cluster
    desc: Android SMS and phone permission cluster
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/privilege/manifest::send-sms
      - id: micro-behaviors/os/privilege/manifest::receive-sms
    any:
      - id: micro-behaviors/os/privilege/manifest::read-sms
      - id: micro-behaviors/os/privilege/manifest::read-phone-numbers
      - id: micro-behaviors/os/privilege/manifest::read-phone-state
    needs: 2

  - id: android-sms-loader-permission-cluster
    desc: Android staged loader requests SMS control
    crit: hostile
    conf: 0.98
    all:
      - id: android-sms-phone-permission-cluster
      - id: objectives/command-and-control/dropper/staged-loader::android-native-encrypted-stage-writer
