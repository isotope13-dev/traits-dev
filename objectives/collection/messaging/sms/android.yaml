defaults:
  platforms: [android]
  for: [apk, zip]

composite_rules:
  - id: android-sms-phone-permission-cluster
    desc: Android SMS and phone permission cluster
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/privilege/manifest::send-sms
      - id: micro-behaviors/os/privilege/manifest::receive-sms
    any:
      - id: micro-behaviors/os/privilege/manifest::read-sms
      - id: micro-behaviors/os/privilege/manifest::read-phone-numbers
      - id: micro-behaviors/os/privilege/manifest::read-phone-state
    needs: 2

  - id: android-sms-loader-permission-cluster
    desc: Android staged loader requests SMS control
    crit: hostile
    conf: 0.98
    all:
      - id: android-sms-phone-permission-cluster
      - id: objectives/command-and-control/dropper/staged-loader::android-native-encrypted-stage-writer
