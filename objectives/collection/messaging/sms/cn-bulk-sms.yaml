# Chinese Bulk SMS API Detection
# Detects hardcoded Chinese SMS service API endpoints in binaries.
# These providers (weimi.cc, juhe.cn) have legitimate uses but are
# abused for automated smishing against logistics and e-commerce customers.
# ATT&CK: T1566 (Phishing)
defaults:
  for: [binaries]
  platforms: [windows, android]
  attack: T1566
traits:
  - id: weimi-cc-api
    desc: Weimi.cc Chinese bulk SMS API
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: api.weimi.cc/

  - id: weimi-cc-admin
    desc: Weimi.cc SMS admin panel URL
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: www.weimi.cc/sms.html

  - id: juhe-cn-sms-send
    desc: Juhe.cn SMS send API endpoint
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: v.juhe.cn/sms/

  - id: sms-tpl-id-param
    desc: SMS template dispatch parameter
    crit: component
    conf: 0.7
    if:
      type: string_value
      exact: tpl_id=

  - id: sms-mobile-param
    desc: SMS target phone number parameter
    crit: component
    conf: 0.7
    if:
      type: string_value
      exact: mobile=

composite_rules:
  - id: cn-bulk-sms-dispatch
    desc: Chinese bulk SMS API for automated dispatch
    crit: suspicious
    conf: 0.88
    any:
      - id: weimi-cc-api
      - id: juhe-cn-sms-send

  - id: cn-sms-with-target-params
    desc: Chinese SMS API with phone targeting params
    crit: suspicious
    conf: 0.9
    any:
      - id: weimi-cc-api
      - id: juhe-cn-sms-send
    all:
      - id: sms-tpl-id-param
      - id: sms-mobile-param
