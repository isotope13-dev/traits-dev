defaults:
  platforms: [ios, macos]
  for: [python]
  attack: T1114

traits:
  - id: python-ios-sms-db-path
    desc: Python iOS SMS database path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /var/mobile/Library/SMS/sms.db

  - id: python-apple-messages-path
    desc: Python Apple Messages path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ~/Library/Messages
    unless:
      - id: metadata/package/quality/false-positives::agent-utilities-library-context

composite_rules:
  - id: python-apple-message-collection
    desc: Python collects Apple messages
    crit: hostile
    conf: 0.98
    any:
      - id: python-ios-sms-db-path
      - id: python-apple-messages-path
    all:
      - id: micro-behaviors/data/encode/base64::b64encode-call
