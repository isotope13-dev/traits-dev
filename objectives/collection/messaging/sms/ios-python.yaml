defaults:
  platforms: [ios, macos]
  for: [python]
  attack: T1114

composite_rules:
  - id: python-apple-message-collection
    desc: Python encodes an Apple message database
    crit: suspicious
    conf: 0.94
    any:
      - id: micro-behaviors/fs/path/sensitive/apple::ios-sms-db
      - id: micro-behaviors/fs/path/sensitive/apple::imessage-chat-db
    all:
      - id: micro-behaviors/data/encode/base64::b64encode-call
