defaults:
  for:
    - elf
  platforms:
    - linux
    - unix
  attack: T1040
  mbc: B0022
traits:
  - id: data-dump-dir
    desc: Raw SMS dump directory
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /tmp/devlog/orbit/keyring/esd/data/
      section: .rodata
  - id: keyword-hit-dir
    desc: Keyword SMS hit directory
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /tmp/devlog/orbit/keyring/esd/kwdata/
      section: .rodata
  - id: hardcoded-collector-endpoint
    desc: Hardcoded telecom collector endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: 48.129.134.128:300
composite_rules:
  - id: local-sms-dump-path
    desc: Local SMS dump staging path
    crit: suspicious
    conf: 0.95
    any:
      - id: data-dump-dir
      - id: keyword-hit-dir
  - id: sms-target-config
    desc: SMS target filter config
    crit: suspicious
    conf: 0.95
    any:
      - id: micro-behaviors/communications/socket/ss7::imsi-filter-config
      - id: micro-behaviors/communications/socket/ss7::keyword-filter-config
  - id: packet-captured-sms-collection
    desc: Packet-captured SMS collection
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/communications/capture/pcap::listener
      - id: micro-behaviors/communications/socket/ss7::tcap-sms-parser
      - id: local-sms-dump-path
  - id: selective-sms-surveillance
    desc: Selective SMS surveillance collector
    crit: hostile
    conf: 0.99
    all:
      - id: packet-captured-sms-collection
      - id: sms-target-config
    any:
      - id: micro-behaviors/communications/socket/ss7::sms-imsi-log
      - id: micro-behaviors/communications/socket/ss7::selective-sms-filtering
      - id: objectives/evasion/masquerade/identity/telecom::telecom-log-masquerade
