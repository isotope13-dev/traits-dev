defaults:
  platforms: [windows]
  for: [pe, dll, csharp, powershell, batch]
  attack: T1114
  mbc: C0066
traits:
- id: phoneexperiencehost-process
  desc: PhoneExperienceHost process target
  crit: notable
  conf: 0.88
  if:
    type: text
    substr: PhoneExperienceHost
- id: yourphone-process
  desc: YourPhone process target
  crit: notable
  conf: 0.86
  if:
    type: text
    substr: YourPhone
- id: link-to-windows-process
  desc: Link to Windows process target
  crit: notable
  conf: 0.86
  if:
    type: text
    substr: Link to Windows
- id: phone-link-sqlite-database
  desc: Phone Link SQLite database target
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'PhoneExperiences-[^\\/\r\n]{0,80}\.db|PhoneExperiences-\*\.db'
- id: phonelink-host-log-name
  desc: Phone Link host log filename
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'phonelink-.{0,80}\.txt'
    case_insensitive: true
- id: phone-link-feedback-staging
  desc: Phone Link feedback staging path
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(?i)(ProgramData|%TEMP%)\\Microsoft\\feedback\\cm'
- id: phone-link-proxy-session-check
  desc: Phone Link session status marker
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '(?i)Maybe connected'
composite_rules:
- id: phone-link-process-keywords
  desc: Phone Link process targeting
  crit: suspicious
  conf: 0.92
  needs: 2
  any:
  - id: phoneexperiencehost-process
  - id: yourphone-process
  - id: link-to-windows-process
- id: phone-link-session-recon
  desc: Phone Link session reconnaissance
  crit: suspicious
  conf: 0.96
  all:
  - id: phone-link-process-keywords
  any:
  - id: phonelink-host-log-name
  - id: phone-link-feedback-staging
  - id: phone-link-proxy-session-check
  unless:
  - id: metadata/signed/platform::microsoft
- id: phone-link-otp-data-targeting
  desc: Phone Link OTP data targeting
  crit: hostile
  conf: 0.98
  attack: T1114.001
  all:
  - id: phone-link-process-keywords
  - id: phone-link-sqlite-database
  any:
  - id: phonelink-host-log-name
  - id: phone-link-feedback-staging
  - id: phone-link-proxy-session-check
  unless:
  - id: metadata/signed/platform::microsoft
