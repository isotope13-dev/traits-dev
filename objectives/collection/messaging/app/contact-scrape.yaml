# Bulk messaging-contact scraping by a browser extension.
#
# Lead-generation / "group send" tooling walks search results and arbitrary
# result pages, pulls every phone number and messaging invite link out of the
# rendered page text, and ships the list to a backend to seed an outbound
# campaign. Individually each piece is ordinary DOM work; together with a
# content script registered against every http(s) origin it is mass collection
# of third-party contact PII from pages the user never chose to hand over.
#
# Kept at suspicious, not hostile: commercial CRM/outreach vendors ship exactly
# this and the operator installs it knowingly. Escalation belongs to composites
# that add covert delivery or theft of the installing user's own data.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1119

traits:
  - id: page-body-innertext-harvest
    desc: Reads entire page body text
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'getElementsByTagName\(["'']body["'']\)\[0\]\.innerText'

  - id: libphonenumber-page-text-extraction
    desc: Extracts phone numbers with libphonenumber
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: findPhoneNumbersInText

  - id: multi-country-phone-regex-table
    desc: Many country-specific phone number patterns
    crit: notable
    conf: 0.9
    count_min: 15
    if:
      type: text
      regex: '\(\\\+\?'

  - id: whatsapp-group-invite-link-scrape
    desc: Extracts WhatsApp group invite links
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'chat\.whatsapp\.com[\\/]{0,3}\(\[0-9a-zA-Z\]'

composite_rules:
  - id: extension-bulk-contact-scrape
    desc: Extension scrapes contact numbers from pages
    crit: suspicious
    conf: 0.93
    for: [javascript, chrome-manifest, crx, xpi]
    scope: archive
    all:
      - id: micro-behaviors/process/inject/webextension::broad-content-script-injection
      - id: page-body-innertext-harvest
      # Requiring the upload separates a harvester from a click-to-call or
      # linkifier extension, which also detects numbers on every page but
      # keeps them local.
      - id: micro-behaviors/communications/http/request/client::http-post-json
    any:
      - id: libphonenumber-page-text-extraction
      - id: multi-country-phone-regex-table
      - id: whatsapp-group-invite-link-scrape
