# Desktop Messaging Application Data Collection
# Detects theft of messaging app local data
# ATT&CK: T1005 (Data from Local System)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
  attack: "T1005"
  crit: suspicious
traits:
  # === Telegram Desktop atomic indicators ===
  - id: telegram-tdata-desktop
    desc: Telegram Desktop tdata path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "Telegram Desktop/tdata"
  - id: telegram-tdata-desktop-win
    desc: Telegram Desktop tdata Windows path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: "Telegram Desktop.{1,5}tdata"
  - id: telegram-tdata-short
    desc: Telegram tdata path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "Telegram/tdata"
  - id: telegram-key-datas
    desc: "Telegram Desktop key_datas file"
    conf: 0.9
    if:
      type: string_value
      substr: "key_datas"
  - id: telegram-map-hash
    desc: Telegram map file hash
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "D877F783D5D3EF8C"
  - id: telegram-map-numbered
    desc: Telegram numbered map files
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: "/map[0-9]{1,2}"
  # === Signal Desktop atomic indicators ===
  - id: signal-app-dir
    # Removed: discord-ldb-ext was a pure alias to objectives/credential-access/discord/token::ldb-extension
    # Removed: discord-log-ext was too generic (.log matches any log file)
    # Discord-specific paths moved to objectives/credential-access/discord/token/

    desc: Signal app directory token
    crit: component
    conf: 0.6
    if:
      type: string_value
      regex: '(?i)(?:^|[/\\])Signal(?: Desktop)?[/\\]'
  - id: signal-storage-indexeddb
    desc: Signal IndexedDB storage path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)Signal(?: Desktop)?[/\\]IndexedDB'
  - id: signal-storage-local
    desc: Signal local storage path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)Signal(?: Desktop)?[/\\]Local Storage'
  - id: signal-storage-session
    desc: Signal session storage path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)Signal(?: Desktop)?[/\\]Session Storage'
  - id: signal-storage-cookies
    desc: Signal network cookies path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)Signal(?: Desktop)?[/\\]Network[/\\]Cookies'
  - id: signal-cookies-path
    desc: Signal cookies storage path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)Signal(?: Desktop)?[/\\]Cookies'
  - id: signal-storage-config
    desc: Signal config json path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)Signal(?: Desktop)?[/\\]config\.json'
  # === Slack Desktop atomic indicators ===
  # These reference electron/infection for base path detection, add specific file context
  - id: slack-storage-root
    desc: Slack storage directory path
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: '(?i)[/\\]slack[/\\]storage[/\\]'
  - id: slack-storage-local
    desc: Slack local storage path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)Slack[/\\]Local Storage'
  - id: slack-storage-session
    desc: Slack session storage path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)Slack[/\\]Session Storage'
  - id: slack-storage-indexeddb
    desc: Slack IndexedDB path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: "Slack/IndexedDB"
  - id: slack-storage-cookies
    desc: Slack network cookies path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)Slack[/\\]Network[/\\]Cookies'
  - id: slack-cookies-path
    desc: Slack cookies storage path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)Slack[/\\]Cookies'
  # === WhatsApp Desktop atomic indicators ===
  - id: whatsapp-indexeddb-path
    desc: WhatsApp IndexedDB path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "WhatsApp/IndexedDB"
  - id: whatsapp-localstorage-path
    desc: WhatsApp local storage path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "WhatsApp/Local Storage"
  - id: whatsapp-sessionstorage-path
    desc: WhatsApp session storage path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: "WhatsApp/Session Storage"
  - id: whatsapp-cookies-path
    desc: WhatsApp network cookies path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: '(?i)WhatsApp[/\\]Network[/\\]Cookies'
  - id: whatsapp-cookies-file
    desc: WhatsApp cookies storage path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: '(?i)WhatsApp[/\\]Cookies'
composite_rules:
  - id: signal-data-path
    desc: Signal Desktop storage path
    crit: suspicious
    conf: 0.9
    all:
      - id: signal-app-dir
    any:
      - id: signal-storage-indexeddb
      - id: signal-storage-local
      - id: signal-storage-session
      - id: signal-storage-cookies
      - id: signal-cookies-path
      - id: signal-storage-config
  # Telegram tdata composite
  - id: telegram-tdata
    desc: Telegram Desktop tdata directory
    crit: suspicious
    conf: 0.9
    any:
      - id: telegram-tdata-desktop
      - id: telegram-tdata-desktop-win
      - id: telegram-tdata-short
  # Telegram map composite
  - id: telegram-map
    desc: Telegram Desktop map files
    crit: suspicious
    conf: 0.85
    all:
      - id: telegram-tdata
    any:
      - id: telegram-map-hash
      - id: telegram-map-numbered
  # WhatsApp storage composite
  - id: whatsapp-storage
    # Discord leveldb composite (use credential-access/discord/)
    # REMOVED - use objectives/credential-access/discord/token::localstorage-path instead

    desc: WhatsApp Desktop storage
    crit: suspicious
    conf: 0.85
    any:
      - id: whatsapp-indexeddb-path
      - id: whatsapp-localstorage-path
      - id: whatsapp-sessionstorage-path
      - id: whatsapp-cookies-path
      - id: whatsapp-cookies-file
  - id: slack-data-path
    desc: Slack Desktop data path
    crit: suspicious
    conf: 0.85
    any:
      - id: slack-storage-root
      - id: slack-storage-local
      - id: slack-storage-session
      - id: slack-storage-indexeddb
      - id: slack-storage-cookies
      - id: slack-cookies-path
  # Multi-messenger theft
  - id: multi-messenger
    desc: "Multiple messaging apps targeted"
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: telegram-tdata
      - id: objectives/credential-access/discord/token::localstorage-path
      - id: signal-data-path
      - id: slack-data-path
      - id: whatsapp-storage
  # Credential staging - username + temp dir + mkdir + messaging app path
  # This pattern indicates staging stolen data for exfiltration
  - id: messaging-data-staging
    desc: "Staging stolen messaging app credentials"
    crit: hostile
    conf: 0.95
    attack: "T1074.001"
    mbc: "E1074"
    all:
      - id: telegram-tdata
      - id: objectives/discovery/system/fingerprint/hardware::python-username
      - id: micro-behaviors/fs/temp/directory::temp-directory
      - id: micro-behaviors/fs/directory/mkdir::mkdir-python
