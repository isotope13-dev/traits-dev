defaults:
  platforms: [windows, linux, macos]
  for: [javascript, package.json, pe, elf, macho]
  attack: T1005
  crit: suspicious
traits:
  - id: telegram-tdata-desktop
    desc: Telegram Desktop tdata path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: Telegram Desktop/tdata
  - id: telegram-tdata-desktop-win
    desc: Telegram Desktop tdata Windows path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: Telegram Desktop.{1,5}tdata
  - id: telegram-tdata-short
    desc: Telegram tdata path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: Telegram/tdata
  - id: telegram-key-datas
    desc: Telegram Desktop key_datas file
    conf: 0.9
    if:
      type: text
      substr: key_datas
  - id: telegram-map-hash
    desc: Telegram map file hash
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: D877F783D5D3EF8C
  - id: telegram-map-numbered
    desc: Telegram numbered map files
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: /map[0-9]{1,2}
  - id: telegram-go-collector-symbol
    desc: Go Telegram collection routine
    crit: component
    conf: 0.9
    platforms: [macos]
    for: [macho]
    if:
      type: text
      exact: GetTelegram
  - id: discord-core-module
    desc: Discord desktop core module path
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?i)discord_desktop_core'
  - id: discord-core-module-versioned
    desc: Discord versioned core module path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)modules[/\\]discord_desktop_core-'
  - id: discord-core-index-js
    desc: Discord desktop core index.js path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'discord_desktop_core-.{1,40}[/\\]discord_desktop_core[/\\]index\.js'
      case_insensitive: true
  - id: discord-index-js
    desc: index.js file path
    crit: component
    conf: 0.7
    if:
      type: text
      exact: index.js
  - id: discord-session-storage
    desc: Discord session storage path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)discord[/\\]Session Storage'
  - id: discord-local-state-json
    desc: Discord local state dump artifact
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)discord[/\\].{0,40}_Local_State\.json'
  - id: discord-masterkey-dump
    desc: Discord master key dump artifact
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)discord[/\\].{0,40}_masterkey\.txt'
  - id: discord-backup-codes
    desc: Discord backup code artifact
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)discord_backup_codes\.txt'
  - id: discord-info-artifact
    desc: Discord collection artifact name
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: DISCORD_INFO
  - id: discord-core-https-loader
    desc: Discord core https loader payload
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: require\(['"]https['"]\)\.request
  - id: discord-core-eval-loader
    desc: Discord core eval loader payload
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: core\.asar.{0,120}eval\([A-Za-z_$][A-Za-z0-9_$]*\)
  - id: discord-core-asar-bridge
    desc: Discord core.asar bridge payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: module.exports = require("./core.asar");
  - id: signal-app-dir
    desc: Signal app directory token
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '(?i)(?:^|[/\\])Signal(?: Desktop)?[/\\]'
  - id: signal-storage-indexeddb
    desc: Signal IndexedDB storage path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)Signal(?: Desktop)?[/\\]IndexedDB'
  - id: signal-storage-local
    desc: Signal local storage path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)Signal(?: Desktop)?[/\\]Local Storage'
  - id: signal-storage-session
    desc: Signal session storage path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)Signal(?: Desktop)?[/\\]Session Storage'
  - id: signal-storage-cookies
    desc: Signal network cookies path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)Signal(?: Desktop)?[/\\]Network[/\\]Cookies'
  - id: signal-cookies-path
    desc: Signal cookies storage path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)Signal(?: Desktop)?[/\\]Cookies'
  - id: signal-storage-config
    desc: Signal config json path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)Signal(?: Desktop)?[/\\]config\.json'
  - id: slack-storage-root
    desc: Slack storage directory path
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)[/\\]slack[/\\]storage[/\\]
  - id: slack-storage-local
    desc: Slack local storage path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)Slack[/\\]Local Storage
  - id: slack-storage-session
    desc: Slack session storage path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)Slack[/\\]Session Storage
  - id: slack-storage-indexeddb
    desc: Slack IndexedDB path
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Slack/IndexedDB
  - id: slack-storage-cookies
    desc: Slack network cookies path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)Slack[/\\]Network[/\\]Cookies
  - id: slack-cookies-path
    desc: Slack cookies storage path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)Slack[/\\]Cookies
  - id: whatsapp-indexeddb-path
    desc: WhatsApp IndexedDB path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: WhatsApp/IndexedDB
  - id: whatsapp-localstorage-path
    desc: WhatsApp local storage path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: WhatsApp/Local Storage
  - id: whatsapp-sessionstorage-path
    desc: WhatsApp session storage path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: WhatsApp/Session Storage
  - id: whatsapp-cookies-path
    desc: WhatsApp network cookies path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)WhatsApp[/\\]Network[/\\]Cookies
  - id: whatsapp-cookies-file
    desc: WhatsApp cookies storage path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)WhatsApp[/\\]Cookies
composite_rules:
  - id: signal-data-path
    desc: Signal Desktop storage path
    crit: suspicious
    conf: 0.9
    all:
      - id: signal-app-dir
    any:
      - id: signal-storage-indexeddb
      - id: signal-storage-local
      - id: signal-storage-session
      - id: signal-storage-cookies
      - id: signal-cookies-path
      - id: signal-storage-config
  - id: telegram-tdata
    desc: Telegram Desktop tdata directory
    crit: suspicious
    conf: 0.9
    any:
      - id: telegram-tdata-desktop
      - id: telegram-tdata-desktop-win
      - id: telegram-tdata-short
  - id: telegram-map
    desc: Telegram Desktop map files
    crit: suspicious
    conf: 0.85
    all:
      - id: telegram-tdata
    any:
      - id: telegram-map-hash
      - id: telegram-map-numbered
  - id: telegram-go-stealer-routine
    desc: Telegram collector with keychain theft
    crit: suspicious
    conf: 0.95
    platforms: [macos]
    for: [macho]
    all:
      - id: telegram-go-collector-symbol
      - id: objectives/credential-access/keychain/extract::go-dump-keychain-symbol
  - id: whatsapp-storage
    desc: WhatsApp Desktop storage
    crit: suspicious
    conf: 0.85
    any:
      - id: whatsapp-indexeddb-path
      - id: whatsapp-localstorage-path
      - id: whatsapp-sessionstorage-path
      - id: whatsapp-cookies-path
      - id: whatsapp-cookies-file
  - id: slack-data-path
    desc: Slack Desktop data path
    crit: suspicious
    conf: 0.85
    any:
      - id: slack-storage-root
      - id: slack-storage-local
      - id: slack-storage-session
      - id: slack-storage-indexeddb
      - id: slack-storage-cookies
      - id: slack-cookies-path
  - id: multi-messenger
    desc: Multiple messaging apps targeted
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: telegram-tdata
      - id: objectives/credential-access/discord/token::localstorage-path
      - id: signal-data-path
  - id: discord-session-theft
    desc: Discord session data harvesting
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: objectives/credential-access/discord/token::localstorage-path
      - id: discord-session-storage
      - id: discord-local-state-json
      - id: discord-masterkey-dump
      - id: discord-backup-codes
      - id: discord-info-artifact
  - id: discord-core-backdoor
    desc: Discord desktop core trojanization
    crit: hostile
    conf: 0.97
    all:
      - id: discord-core-module
      - id: discord-core-module-versioned
      - id: discord-index-js
    any:
      - id: discord-core-https-loader
      - id: discord-core-eval-loader
      - id: discord-core-asar-bridge
      - id: slack-data-path
      - id: whatsapp-storage
  - id: messaging-data-staging
    desc: Staging stolen messaging app credentials
    crit: hostile
    conf: 0.95
    attack: T1074.001
    mbc: E1074
    all:
      - id: telegram-tdata
      - id: objectives/discovery/system/fingerprint/hardware::python-username
      - id: micro-behaviors/fs/temp/directory::temp-directory
      - id: micro-behaviors/fs/directory/mkdir::mkdir-python
