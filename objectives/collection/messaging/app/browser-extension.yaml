defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1119

traits:
  - id: ai-chat-dom-scrape--chatgpt-claude-after
    desc: AI chat DOM scrape selector context
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (chatgpt|claude)[\s\S]{0,500}(MutationObserver|querySelectorAll)
  - id: ai-chat-dom-scrape--gemini-copilot-after
    desc: AI chat DOM scrape selector context
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (gemini|copilot)[\s\S]{0,500}(MutationObserver|querySelectorAll)
  - id: ai-chat-dom-scrape--perplexity-poe-after
    desc: AI chat DOM scrape selector context
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (perplexity|poe\.com)[\s\S]{0,500}(MutationObserver|querySelectorAll)
  - id: ai-chat-dom-scrape--character-after
    desc: AI chat DOM scrape selector context
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (character\.ai|data-message-author-role)[\s\S]{0,500}(MutationObserver|querySelectorAll)
  - id: ai-chat-dom-scrape--conversation-after
    desc: AI chat DOM scrape selector context
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (conversation-turn)[\s\S]{0,500}(MutationObserver|querySelectorAll)
  - id: ai-chat-dom-scrape--chatgpt-claude-before
    desc: AI chat DOM scrape selector context
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (MutationObserver|querySelectorAll)[\s\S]{0,500}(chatgpt|claude)
  - id: ai-chat-dom-scrape--gemini-copilot-before
    desc: AI chat DOM scrape selector context
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (MutationObserver|querySelectorAll)[\s\S]{0,500}(gemini|copilot)
  - id: ai-chat-dom-scrape--perplexity-poe-before
    desc: AI chat DOM scrape selector context
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (MutationObserver|querySelectorAll)[\s\S]{0,500}(perplexity|poe\.com)
  - id: ai-chat-dom-scrape--character-before
    desc: AI chat DOM scrape selector context
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (MutationObserver|querySelectorAll)[\s\S]{0,500}(character\.ai|data-message-author-role)
  - id: ai-chat-dom-scrape--conversation-before
    desc: AI chat DOM scrape selector context
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (MutationObserver|querySelectorAll)[\s\S]{0,500}(conversation-turn)

composite_rules:
  - id: ai-chat-dom-scrape
    desc: AI chat DOM scraping
    crit: component
    conf: 0.88
    any:
      - id: ai-chat-dom-scrape--chatgpt-claude-after
      - id: ai-chat-dom-scrape--gemini-copilot-after
      - id: ai-chat-dom-scrape--perplexity-poe-after
      - id: ai-chat-dom-scrape--character-after
      - id: ai-chat-dom-scrape--conversation-after
      - id: ai-chat-dom-scrape--chatgpt-claude-before
      - id: ai-chat-dom-scrape--gemini-copilot-before
      - id: ai-chat-dom-scrape--perplexity-poe-before
      - id: ai-chat-dom-scrape--character-before
      - id: ai-chat-dom-scrape--conversation-before

  - id: extension-ai-chat-monitor
    desc: Extension monitors AI chat DOM
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/permission/runtime::is-extension
      - id: ai-chat-dom-scrape
    any:
      - id: micro-behaviors/communications/ipc/message::chrome-runtime-send-message
      - id: objectives/impact/ui/delivery::dom-mutation-observer
