defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: hardcoded-qq-recipient
    desc: Hardcoded QQ recipient identifier
    crit: suspicious
    conf: 0.99
    if:
      type: string_literal
      exact: '1821181277'
  - id: eight-hex-code-filter
    desc: Filters messages for 8 hex codes
    crit: suspicious
    conf: 0.97
    count_min: 2
    if:
      type: text
      regex: \[0-9A-Fa-f\]\{8\}
    not:
      - substr: "json-schema.org"
      - substr: "U[0-9A-Fa-f]{8}"
      - substr: "u[0-9A-Fa-f]{8}"
      - substr: "ace/mode/gherkin_highlight_rules"
      - substr: "ace/mode/python_highlight_rules"
      - substr: 'define("ace/mode/'
      - substr: 'define("ace/snippets/'
      - substr: "urn:uuid"
  - id: message-space-stripping
    desc: Strips spaces before message matching
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: session\.content\.replace\(\s*["'] ["']\s*,\s*["']["']\s*\)
  - id: extracted-first-hex-code
    desc: Exfiltrates first extracted hex code
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: extractAll8DigitHex\(.{0,80}\)\[0\]
  - id: helper-extracts-all-hex-codes
    desc: Helper extracts all matching hex codes
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: function\s+extractAll8DigitHex|extractAll8DigitHex\s*=
composite_rules:
  - id: koishi-chat-code-surveillance
    desc: Koishi plugin monitors messages for hex codes
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/communications/ipc/message::koishi-message-event-hook
      - id: eight-hex-code-filter
    any:
      - id: message-space-stripping
      - id: helper-extracts-all-hex-codes
  - id: koishi-private-message-code-exfil
    desc: Koishi plugin exfiltrates intercepted chat codes
    crit: hostile
    conf: 0.995
    attack: T1041
    all:
      - id: koishi-chat-code-surveillance
      - id: micro-behaviors/communications/ipc/message::koishi-private-message-hardcoded-user
    any:
      - id: micro-behaviors/communications/ipc/message::koishi-private-message-send
      - id: hardcoded-qq-recipient
      - id: extracted-first-hex-code
