defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: hardcoded-qq-recipient
    desc: Hardcoded QQ recipient identifier
    crit: suspicious
    conf: 0.99
    if:
      type: string_value
      exact: "1821181277"
  - id: eight-hex-code-filter
    desc: Filters messages for 8 hex codes
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: '\[0-9A-Fa-f\]\{8\}'
  - id: message-space-stripping
    desc: Strips spaces before message matching
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: 'session\.content\.replace\(\s*["''] ["'']\s*,\s*["'']["'']\s*\)'
  - id: extracted-first-hex-code
    desc: Exfiltrates first extracted hex code
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'extractAll8DigitHex\(.{0,80}\)\[0\]'
  - id: helper-extracts-all-hex-codes
    desc: Helper extracts all matching hex codes
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: 'function\s+extractAll8DigitHex|extractAll8DigitHex\s*='
composite_rules:
  - id: koishi-chat-code-surveillance
    desc: Koishi plugin monitors messages for hex codes
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/communications/messaging/private-message::koishi-message-event-hook
      - id: eight-hex-code-filter
    any:
      - id: message-space-stripping
      - id: helper-extracts-all-hex-codes
  - id: koishi-private-message-code-exfil
    desc: Koishi plugin exfiltrates intercepted chat codes
    crit: hostile
    conf: 0.995
    attack: T1041
    all:
      - id: koishi-chat-code-surveillance
      - id: micro-behaviors/communications/messaging/private-message::koishi-private-message-hardcoded-user
    any:
      - id: micro-behaviors/communications/messaging/private-message::koishi-private-message-send
      - id: hardcoded-qq-recipient
      - id: extracted-first-hex-code
