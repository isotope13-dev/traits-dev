defaults:
  platforms: [macos]
  for: [python, shell, scripts, binaries]
  attack: T1005
  mbc: E1005
traits:
  - id: chatdb-sql-query
    desc: iMessage chat.db message-table query
    # Reading the local Messages database is a sensitive capability, but this
    # exact read-only query is also the normal implementation of an iMessage
    # connector. Collection intent requires the companion harvest indicators.
    crit: notable
    conf: 0.94
    if:
      type: literal
      kind: string
      regex: '(?is)FROM message.{0,240}(handle_id|chat_message_join|is_from_me)'
    unless:
      - id: metadata/package/quality/false-positives::agent-utilities-library-context
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: attributed-body-parser
    desc: iMessage attributedBody parser
    crit: suspicious
    conf: 0.9
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      regex: '(?i)attributed_?body.{0,220}(bplist00|plistlib\.loads)'
  - id: chatdb-temp-copy
    desc: iMessage chat.db temp copy
    crit: suspicious
    conf: 0.88
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      regex: '(?is)chat\.db.{0,220}(COPY_CHUNK_SIZE|EOVERFLOW)'
