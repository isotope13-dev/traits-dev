defaults:
  platforms: [macos]
  for: [python, shell, scripts, binaries]
  attack: T1005
  mbc: E1005
traits:
  - id: chatdb-sql-query
    desc: iMessage chat.db SQL query
    crit: suspicious
    conf: 0.94
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      regex: '(?is)\bFROM\s+message\b.{0,80}\bJOIN\b'
  - id: attributed-body-parser
    desc: iMessage attributedBody parser
    crit: suspicious
    conf: 0.9
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      regex: '(?i)attributed_?body.{0,220}(bplist00|plistlib\.loads)'
  - id: chatdb-temp-copy
    desc: iMessage chat.db temp copy
    crit: suspicious
    conf: 0.88
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      regex: '(?is)chat\.db.{0,220}(COPY_CHUNK_SIZE|EOVERFLOW)'
