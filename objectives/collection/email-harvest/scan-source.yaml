# Email address harvesting from filesystem
# Worms scan files for @ patterns to extract email addresses
defaults:
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: email-domain-filter
    desc: Email domain anti-spam filter
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "nospam_domains"
  - id: massmail-queue
    desc: Mass mail queue implementation
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "massmail_queue"
