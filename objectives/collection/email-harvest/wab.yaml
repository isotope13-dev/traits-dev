# Windows Address Book (WAB) email harvesting
# Worms parse WAB files to extract email addresses for mass-mailing
defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp, csharp]
traits:
  - id: wab-registry-path
    desc: WAB file registry path access
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: "Microsoft\\WAB\\WAB4\\WAB File Name"
  - id: wab-registry-path-rot13
    desc: ROT13-encoded WAB registry path
    crit: suspicious
    conf: 0.96
    for: [c, cpp]
    if:
      type: text
      substr: 'Zvpebfbsg\\JNO\\JNO4'
