# MAPI email reading and address harvesting
# MapiLogOn/MapiFindNext/MAPIReadMail - direct MAPI API calls
# Used by Delphi and native Windows worms to harvest contacts from inbox
defaults:
  for: [pe, c, cpp, csharp]
  platforms: [windows]
traits:
  - id: mapi-logon
    desc: MAPI session logon call
    crit: notable
    conf: 0.9
    if:
      type: text
      word: MapiLogOn
  - id: mapi-find-next
    desc: MAPI message enumeration call
    crit: notable
    conf: 0.9
    if:
      type: text
      word: MapiFindNext
  - id: mapi-read-mail
    desc: MAPI message read call
    crit: notable
    conf: 0.9
    if:
      type: text
      word: MAPIReadMail
  - id: mapi-send-mail
    desc: MAPI message send call
    crit: notable
    conf: 0.9
    if:
      type: text
      word: MAPISendMail
composite_rules:
  - id: mapi-inbox-harvest
    desc: MAPI inbox message harvesting
    crit: suspicious
    conf: 0.95
    all:
      - id: mapi-logon
      - id: mapi-find-next
      - id: mapi-read-mail
