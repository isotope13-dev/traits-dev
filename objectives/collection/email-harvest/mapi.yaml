# MAPI email reading and address harvesting
# MapiLogOn/MapiFindNext/MAPIReadMail - direct MAPI API calls
# Used by Delphi and native Windows worms to harvest contacts from inbox
defaults:
  for: [pe, dll, c, cpp, csharp]
  platforms: [windows]
composite_rules:
  - id: mapi-inbox-harvest
    desc: MAPI inbox message harvesting
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/email/access/mapi::session-logon
      - id: micro-behaviors/communications/email/access/mapi::enumerate-messages
      - id: micro-behaviors/communications/email/access/mapi::read-message
