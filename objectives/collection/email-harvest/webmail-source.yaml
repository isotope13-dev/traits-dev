defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1114
traits:
  - id: webmail-message-list-fetch
    desc: Fetches webmail message list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: _task=mail&_action=list|_mbox=.{0,80}_remote=1
  - id: webmail-viewsource-fetch
    desc: Fetches raw webmail message source
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: _action=viewsource|_save=0&_uid=|_extwin=1
  - id: uid-extraction-regex
    desc: Extracts message UIDs from response
    crit: component
    conf: 0.82
    if:
      # \buid word-boundary: the bare substring `uid` matched inside ordinary
      # identifiers like `guidance` (g·uid·ance) in `for (… of Object.entries(
      # getGuidance…))`. Anchor to a word start so only a `uid` token counts.
      type: text
      regex: matchAll\(.{0,120}\buid|for\s*\(.{0,120}\buid
  - id: same-origin-mail-url-build
    desc: Builds same-origin mail endpoint URL
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: window\.location\.(origin|pathname).{0,120}_task=mail

composite_rules:
  - id: webmail-mailbox-harvest
    desc: Authenticated webmail mailbox harvesting
    crit: hostile
    conf: 0.96
    all:
      - id: webmail-message-list-fetch
      - id: webmail-viewsource-fetch
    any:
      - id: uid-extraction-regex
      - id: same-origin-mail-url-build
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
