defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1114
  mbc: E1114

traits:
  - id: provider-email-extractor-entrypoint
    desc: Runs automated provider email extraction
    crit: notable
    conf: 0.97
    if:
      type: function
      exact: runEmailExtractor

  - id: provider-label-table
    desc: Defines multiple lead-data providers
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: identifier
      exact: PROVIDER_LABELS

  - id: provider-api-key-templates
    desc: Defines provider API-key templates
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: apikey

  - id: email-result-writer-reference
    desc: Uses an email-result writer
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bcreateEmailWriter\b'

composite_rules:
  - id: provider-email-harvest
    desc: Automates multi-provider email-address harvesting
    crit: suspicious
    conf: 0.96
    all:
      - id: provider-email-extractor-entrypoint
      - id: provider-label-table
      - id: provider-api-key-templates
      - id: email-result-writer-reference

  - id: obfuscated-provider-email-harvester
    desc: Obfuscated multi-provider email harvester with persisted results
    crit: hostile
    conf: 0.98
    all:
      - id: provider-email-harvest
      - id: objectives/supply-chain/hidden-payload/runtime::obfuscator-io-toolkit-bundle
