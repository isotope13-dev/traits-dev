# Obfuscated mailbox email-address harvester (output writer).
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted (invisible to static string scans). The harvester's
# output module survives with a distinctive, un-encrypted private API that pulls
# every email address out of extracted messages and contacts and writes per-
# account address files. These class/function identifiers are attack-context-
# specific fragments of that toolkit; convicts only when several co-occur inside
# obfuscator.io-obfuscated code (a legitimate mail tool is not shipped RC4-
# obfuscated with this exact private harvesting API).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1114
  mbc: E1114

traits:
  - id: box-extract-writer
    desc: BoxExtractWriter harvested-address writer
    crit: component
    conf: 0.8
    if:
      type: text
      substr: BoxExtractWriter
  - id: collect-addresses-from-message
    desc: Harvests addresses from a mailbox message
    crit: component
    conf: 0.8
    if:
      type: text
      substr: collectAddressesFromMessage
  - id: collect-addresses-from-contacts
    desc: Harvests addresses from contacts
    crit: component
    conf: 0.8
    if:
      type: text
      substr: collectAddressesFromContacts
  - id: collect-unique-addresses
    desc: Dedupes harvested addresses from a result
    crit: component
    conf: 0.8
    if:
      type: text
      substr: collectUniqueAddressesFromResult
  - id: format-address-file-content
    desc: Formats harvested-address output file
    crit: component
    conf: 0.8
    if:
      type: text
      substr: formatAddressFileContent

composite_rules:
  - id: mailbox-address-harvest-api
    desc: Private mailbox email-address harvesting API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: box-extract-writer
      - id: collect-addresses-from-message
      - id: collect-addresses-from-contacts
      - id: collect-unique-addresses
      - id: format-address-file-content
  - id: obfuscated-mailbox-address-harvester
    desc: Obfuscated mailbox email-address harvester (BoxExtract toolkit)
    crit: hostile
    conf: 0.95
    all:
      - id: mailbox-address-harvest-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
