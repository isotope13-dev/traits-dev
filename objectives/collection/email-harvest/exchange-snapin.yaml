# Exchange management snap-in loaded for mailbox enumeration.
# SHADOW-EARTH-053 (and Silk Typhoon/Hafnium previously) load
# Microsoft.Exchange.Management.PowerShell.SnapIn explicitly when
# Get-Mailbox fails in a default PS session, then enumerate mailboxes
# with Get-Mailbox/Get-User and additional fields like userAccountControl
# and AccountDisabled to identify high-value targets.
defaults:
  platforms: [windows]
  for: [powershell, batch, pe, dll]
  attack: T1114.002
  mbc: E1114
traits:
  - id: add-pssnapin-exchange
    desc: Loads Exchange Management PowerShell snap-in
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'Add-PSSnapin[^\n]{0,80}Microsoft\.Exchange\.Management\.PowerShell\.(SnapIn|E2010|Admin)'
      case_insensitive: true
  - id: get-mailbox-enum
    desc: PowerShell Get-Mailbox enumeration
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'Get-Mailbox(\s|\b)'
  - id: get-user-with-uac
    desc: Get-User enumeration with userAccountControl
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Get-User[^\n]{0,200}userAccountControl'
      case_insensitive: true
  - id: bypass-execution-policy
    desc: PowerShell execution policy bypass flag
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '-ExecutionPolicy\s+Bypass\b|-ep\s+bypass\b'
      case_insensitive: true
  - id: ews-exchange-export
    desc: Exchange Web Services exporter call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ExchangeService[^\n]{0,200}(ExportItems|FindItems)|ExchangeWebServices'
composite_rules:
  - id: exchange-mailbox-harvest
    desc: Mailbox harvesting via Exchange snap-in
    crit: hostile
    conf: 0.96
    all:
      - id: add-pssnapin-exchange
    any:
      - id: get-mailbox-enum
      - id: get-user-with-uac
      - id: ews-exchange-export
