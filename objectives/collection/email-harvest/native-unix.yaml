defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1114

traits:
  - id: native-user-mail-configs
    desc: Native user mail configs
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '\.(thunderbird|msmtp)|/Mail\b'
    unless:
      - id: well-known/app/claws-mail::mail-client

  - id: native-email-token-extract
    desc: Native email token extract
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: looks_like_email

composite_rules:
  - id: native-email-harvest
    desc: Native email harvest
    crit: hostile
    conf: 0.98
    all:
      - id: native-email-token-extract
    needs: 2
    any:
      - id: micro-behaviors/fs/path/sensitive/email::mailstore-path-set
      - id: native-user-mail-configs
      - id: micro-behaviors/communications/http/endpoints::collect-path
