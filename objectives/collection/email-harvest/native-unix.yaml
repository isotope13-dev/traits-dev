defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1114

traits:
  - id: native-mailstore-paths
    desc: Native mailstore path set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/var/mail[\s\S]{0,220}/var/spool/mail'

  - id: native-user-mail-configs
    desc: Native user mail configs
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '\.(thunderbird|msmtp)|/Mail\b'

  - id: native-email-token-extract
    desc: Native email token extract
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: looks_like_email

composite_rules:
  - id: native-email-harvest
    desc: Native email harvest
    crit: hostile
    conf: 0.98
    all:
      - id: native-email-token-extract
    needs: 2
    any:
      - id: native-mailstore-paths
      - id: native-user-mail-configs
      - id: micro-behaviors/communications/http/endpoints::collect-path
