# Obfuscated PitchBook API email harvester (target collection).
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. The lead-sourcing module survives with a
# distinctive, un-encrypted private API that queries the PitchBook private-market
# data platform's API (by region / product / role), loops over entities, and
# collects their email addresses to feed the toolkit's mailer with targets.
# These identifiers are attack-context-specific fragments of that toolkit;
# convicts only when several co-occur inside obfuscator.io-obfuscated code.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1114
  mbc: E1114

traits:
  - id: pitchbook-email-extractor
    desc: PitchbookEmailExtractor scraper class
    crit: component
    conf: 0.8
    if:
      type: text
      substr: PitchbookEmailExtractor
  - id: region-to-pitchbook-params
    desc: regionToPitchbookParams target selector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: regionToPitchbookParams
  - id: product-to-pitchbook-params
    desc: productToPitchbookParams target selector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: productToPitchbookParams
  - id: target-loop-extractor
    desc: TargetLoopExtractor bulk entity loop
    crit: component
    conf: 0.8
    if:
      type: text
      substr: TargetLoopExtractor

composite_rules:
  - id: pitchbook-harvest-api
    desc: Private PitchBook email-harvest scraper API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: pitchbook-email-extractor
      - id: region-to-pitchbook-params
      - id: product-to-pitchbook-params
      - id: target-loop-extractor
  - id: obfuscated-pitchbook-email-harvester
    desc: Obfuscated PitchBook API email harvester (target sourcing)
    crit: hostile
    conf: 0.95
    all:
      - id: pitchbook-harvest-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
