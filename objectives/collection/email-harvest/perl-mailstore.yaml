defaults:
  platforms: [unix, fortios]
  for: [perl]
  attack: T1114

traits:
  - id: perl-mailstore-harvest-paths
    desc: Perl mailstore harvest paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/var/(mail|spool/mail)[\s\S]{0,260}(Maildir|thunderbird|/home)'

  - id: perl-email-header-extract
    desc: Perl extracts email headers
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\^From:\\s\*\(\.\+\)\$[\s\S]{0,220}\^To:\\s\*\(\.\+\)\$'

composite_rules:
  - id: perl-email-harvest-workflow
    desc: Perl email harvest workflow
    crit: hostile
    conf: 0.98
    all:
      - id: perl-mailstore-harvest-paths
      - id: perl-email-header-extract

