defaults:
  platforms: [windows]
  for: [csharp]
traits:
  - id: internet-cache-folder
    desc: InternetCache folder enumeration
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: "Environment.SpecialFolder.InternetCache"
  - id: obfuscated-html-glob
    desc: Obfuscated HTML file glob
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "modem(\"(,jv(\")"
  - id: obfuscated-mailto-index
    desc: Obfuscated mailto index lookup
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'IndexOf\s*\(\s*\w+\.\w+\("ocknvm8"\)'
  - id: url-decoded-email-normalization
    desc: URL-decoded email normalization
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'Replace\("%20",\s*""\)\.Replace\("%40",\s*"@"\)'
composite_rules:
  - id: internet-cache-mailto-harvest
    desc: Harvests email from cached HTML
    crit: suspicious
    conf: 0.98
    all:
      - id: internet-cache-folder
      - id: url-decoded-email-normalization
    any:
      - id: obfuscated-html-glob
      - id: obfuscated-mailto-index
