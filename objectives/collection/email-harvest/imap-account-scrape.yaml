# Bulk IMAP mailbox scraping.
#
# An automated email-account harvester logs into an IMAP account with
# supplied credentials, enumerates *every* mailbox/folder, and pulls the
# messages out of each one — the mailbox-scraping half of an "email account
# checker / combo checker" toolkit. Legitimate IMAP clients read the mailbox
# the user opened; a harvester walks the whole account and drains it.
#
# The atoms below match the harvester's exported orchestration functions.
# Any single one is a notable mailbox-access behavior on its own; the
# hostile verdict is reserved for the composite, which additionally requires
# the ImapFlow client import and obfuscator.io packing so it cannot fire on a
# benign backup/migration utility that happens to enumerate folders.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1114.002
  mbc: E1114

traits:
  - id: imap-list-all-mailboxes
    desc: Enumerates every IMAP mailbox in the account
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: listAllMailboxes

  - id: imap-extract-all-folder-messages
    desc: Bulk-extracts messages from an IMAP folder
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: extractFolderMessages

  - id: imap-per-account-extract
    desc: Orchestrates per-account IMAP mailbox extraction
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: extractViaImap

composite_rules:
  - id: imap-full-mailbox-harvest
    desc: Enumerates and drains every IMAP mailbox in an account
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/email/access/imap::imapflow-library-import
    any:
      - id: imap-list-all-mailboxes
      - id: imap-extract-all-folder-messages
      - id: imap-per-account-extract
    needs: 2

  - id: obfuscated-imap-mailbox-harvester
    desc: Obfuscated ImapFlow bulk-mailbox harvester
    crit: hostile
    conf: 0.95
    all:
      - id: imap-full-mailbox-harvest
      - id: objectives/supply-chain/hidden-payload/runtime::obfuscator-io-toolkit-bundle
