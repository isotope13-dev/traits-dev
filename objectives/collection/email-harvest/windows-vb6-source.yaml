defaults:
  platforms: [windows]
  for: [vbs]
traits:
  - id: recursive-drive-scan-vb6
    desc: Recursively scans ready drives
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: For Each drv In fso.drives
  - id: html-mailto-harvest-vb6
    desc: Harvests mailto links from HTML
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: 'mailto:'
    unless:
      - id: metadata/library/structure::javascript-source-map-file
      - id: well-known/lib/deb-package::firefox-omni-basename
      - id: metadata/package/quality/source::security-tracker-cve-leaf
      - id: metadata/package/quality/recognized-contexts-extra::hashed-text-record
  - id: dbx-mail-harvest-vb6
    desc: Harvests addresses from DBX
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: ElseIf U83A9FuI = "dbx" Then
  - id: harvested-address-buffer-vb6
    desc: Accumulates harvested email list
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: jwJUsdKW = jwJUsdKW &
composite_rules:
  - id: filesystem-email-harvest-vb6
    desc: Harvests email from local files
    crit: suspicious
    conf: 0.98
    all:
      - id: recursive-drive-scan-vb6
      - id: harvested-address-buffer-vb6
    any:
      - id: html-mailto-harvest-vb6
      - id: dbx-mail-harvest-vb6
