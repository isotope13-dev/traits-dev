defaults:
  platforms: [macos]
  for: [python, javascript, shell, applescript, macho]
  attack: T1119
  mbc: E1119
traits:
  - id: apple-contacts-jxa-application
    desc: Apple Contacts JXA target
    crit: suspicious
    conf: 0.95
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      substr: Application("Contacts")
  - id: apple-contacts-jxa-fields
    desc: Apple Contacts fields enumeration
    crit: suspicious
    conf: 0.92
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      regex: 'people\(\).{0,200}(phones\(\)|emails\(\))'
  - id: google-people-connections-api
    desc: Google People contacts API
    crit: suspicious
    conf: 0.92
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      substr: people.googleapis.com/v1/people/me/connections
  - id: google-contacts-readonly-scope
    desc: Google contacts readonly scope
    crit: suspicious
    conf: 0.9
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      substr: googleapis.com/auth/contacts.readonly
  - id: google-oauth-device-code
    desc: Google OAuth device code
    crit: notable
    conf: 0.86
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      substr: oauth2.googleapis.com/device/code

composite_rules:
  - id: local-and-cloud-contact-harvest
    desc: Local and cloud contacts harvesting
    crit: hostile
    conf: 0.96
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    any:
      - id: apple-contacts-jxa-application
      - id: apple-contacts-jxa-fields
      - id: google-people-connections-api
      - id: google-contacts-readonly-scope
      - id: google-oauth-device-code
    needs: 3
