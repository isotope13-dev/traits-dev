defaults:
  platforms: [macos]
  for: [python, javascript, shell, applescript, macho]
  attack: T1119
  mbc: E1119
traits:
  - id: apple-contacts-jxa-application
    desc: Apple Contacts JXA target
    crit: suspicious
    conf: 0.95
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      substr: Application("Contacts")
  - id: apple-contacts-jxa-fields
    desc: Apple Contacts JXA fields enumeration
    crit: suspicious
    conf: 0.92
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    if:
      type: text
      regex: 'Application\(["'']Contacts["'']\)[\s\S]{0,500}people\(\).{0,80}(phones\(\)|emails\(\))'
composite_rules:
  - id: local-and-cloud-contact-harvest
    desc: Local and cloud contacts harvesting
    crit: hostile
    conf: 0.96
    ref: sha256:2c2ea9613e294962bd4145978ab0a9b61b7cbe8ad3f7b29ae25e678d55b28a1f
    any:
      - id: apple-contacts-jxa-application
      - id: apple-contacts-jxa-fields
      - id: micro-behaviors/communications/http/services/google::people-connections-api
      - id: micro-behaviors/communications/http/services/google::contacts-readonly-scope
      - id: micro-behaviors/communications/http/oauth::google-oauth-device-code
    needs: 3
