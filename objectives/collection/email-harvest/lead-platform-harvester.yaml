# Obfuscated B2B lead-platform email harvesters (ZoomInfo, LinkedIn).
#
# Components of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. These modules scrape B2B contact platforms for
# target email addresses to feed the mailer: each authenticates to a platform
# API, searches by region/product/role, loops over matched people, and
# normalizes/enriches their emails. Each composite is anchored on the platform-
# specific extractor class (the region/normalize helpers are shared), so it
# convicts only that harvester inside obfuscator.io-obfuscated code (T1114).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1114
  mbc: E1114

traits:
  # ---- ZoomInfo ----
  - id: zoominfo-email-extractor
    desc: ZoomInfoEmailExtractor scraper class
    crit: component
    conf: 0.8
    if:
      type: text
      substr: ZoomInfoEmailExtractor
  - id: zoominfo-auth
    desc: ZoomInfoAuth API JWT authenticator
    crit: component
    conf: 0.8
    if:
      type: text
      substr: ZoomInfoAuth
  - id: region-to-zoominfo-attributes
    desc: regionToZoomInfoAttributes target selector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: regionToZoomInfoAttributes
  - id: normalize-enriched-emails
    desc: normalizeEnrichedEmails harvested-email parser
    crit: component
    conf: 0.8
    if:
      type: text
      substr: normalizeEnrichedEmails
  # ---- LinkedIn ----
  - id: linkedin-email-extractor
    desc: LinkedInEmailExtractor scraper class
    crit: component
    conf: 0.8
    if:
      type: text
      substr: LinkedInEmailExtractor
  - id: region-to-linkedin-params
    desc: regionToLinkedInParams target selector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: regionToLinkedInParams
  - id: normalize-person
    desc: normalizePerson scraped-contact parser
    crit: component
    conf: 0.75
    if:
      type: text
      substr: normalizePerson

composite_rules:
  - id: zoominfo-harvest-api
    desc: Private ZoomInfo email-harvest scraper API
    crit: suspicious
    conf: 0.9
    all:
      - id: zoominfo-email-extractor
    any:
      - id: zoominfo-auth
      - id: region-to-zoominfo-attributes
      - id: normalize-enriched-emails
  - id: obfuscated-zoominfo-email-harvester
    desc: Obfuscated ZoomInfo API email harvester (target sourcing)
    crit: hostile
    conf: 0.95
    all:
      - id: zoominfo-harvest-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
  - id: linkedin-harvest-api
    desc: Private LinkedIn email-harvest scraper API
    crit: suspicious
    conf: 0.9
    all:
      - id: linkedin-email-extractor
    any:
      - id: region-to-linkedin-params
      - id: normalize-person
  - id: obfuscated-linkedin-email-harvester
    desc: Obfuscated LinkedIn API email harvester (target sourcing)
    crit: hostile
    conf: 0.95
    all:
      - id: linkedin-harvest-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
