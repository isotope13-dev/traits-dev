defaults:
  platforms: [unix]
  for: [objc, elf]
  attack: T1113
  mbc: C0014

traits:
  - id: objc-x11-root-capture
    desc: ObjC X11 root capture
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'XOpenDisplay\(NULL\)[\s\S]{0,300}RootWindow'

  - id: objc-x11-xgetimage-call
    desc: X11 XGetImage screen-grab API reference
    crit: component
    conf: 0.94
    if:
      type: text
      substr: XGetImage

  - id: objc-ppm-screenshot-temp
    desc: ObjC temp PPM screenshot
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/screen_%d.ppm

composite_rules:
  - id: objc-x11-getimage
    desc: ObjC X11 XGetImage capture
    crit: suspicious
    conf: 0.94
    all:
      - id: objc-x11-xgetimage-call
      - id: micro-behaviors/process/interpreter/runtime/dynamic::objc-runtime-msgsend

  - id: objc-x11-screenshot-capture
    desc: ObjC X11 screenshot capture
    crit: hostile
    conf: 0.98
    all:
      - id: objc-x11-root-capture
      - id: objc-x11-getimage
      - id: objc-ppm-screenshot-temp
