defaults:
  for:
    - macho
    - shell
  platforms:
    - macos
  attack: T1113
  mbc: C0014
traits:
  - id: screenshot-filename
    desc: Screenshot output filename pattern
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: screenshot\.\w{3,4}
  - id: ffmpeg-avfoundation-frame-capture
    desc: ffmpeg captures macOS AVFoundation frame
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ffmpeg\s+-f\s+avfoundation\b.{0,180}-frames:v\s+1'
  - id: private-etc-screen-staging
    desc: Screen capture staged under private etc
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '/private/etc/[^ \t\r\n]{1,80}\.(jpg|jpeg|png)'
composite_rules:
  # A screenshot helper can be legitimate, but a shell installer that also
  # writes and loads a system LaunchDaemon is a persistent surveillance
  # workflow. Keep the hostile inference on the combination, not on the
  # screenshot capability alone.
  - id: macos-screenshot-launchd-surveillance
    desc: macOS screenshot capture with LaunchDaemon persistence
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/hardware/display/screenshot::macos-screencapture-command
      - id: micro-behaviors/os/service/config::launchdaemons-path
      - id: micro-behaviors/os/service/control::launchctl-load-variable
  - id: macos-ffmpeg-stealth-screenshot
    desc: Silent ffmpeg macOS screenshot capture
    crit: hostile
    conf: 0.97
    all:
      - id: ffmpeg-avfoundation-frame-capture
      - id: private-etc-screen-staging
      - id: micro-behaviors/os/console/io::null-redirect-stdout-stderr
