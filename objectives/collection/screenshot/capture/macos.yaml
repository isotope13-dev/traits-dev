defaults:
  for:
    - macho
    - shell
  platforms:
    - macos
  attack: T1113
  mbc: C0014
traits:
  - id: screencapture-cmd
    desc: macOS screencapture command
    crit: suspicious
    conf: 0.85
    if:
      type: text
      word: screencapture
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: metadata/signed/platform::apple
        - id: well-known/tool/detection/
        - type: text
          regex: '@\(#\)PROGRAM:[A-Za-z][A-Za-z0-9]*\s+PROJECT:[A-Za-z]+-[0-9]+'
  - id: cg-window-capture
    desc: macOS CGWindow screen capture API
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: CGWindowListCreateImageFromArray
  - id: screenshot-filename
    desc: Screenshot output filename pattern
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: screenshot\.\w{3,4}
  - id: ffmpeg-avfoundation-frame-capture
    desc: ffmpeg captures macOS AVFoundation frame
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ffmpeg\s+-f\s+avfoundation\b.{0,180}-frames:v\s+1'
  - id: private-etc-screen-staging
    desc: Screen capture staged under private etc
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '/private/etc/[^ \t\r\n]{1,80}\.(jpg|jpeg|png)'
composite_rules:
  - id: macos-ffmpeg-stealth-screenshot
    desc: Silent ffmpeg macOS screenshot capture
    crit: hostile
    conf: 0.97
    all:
      - id: ffmpeg-avfoundation-frame-capture
      - id: private-etc-screen-staging
      - id: micro-behaviors/os/console/io::null-redirect-stdout-stderr
