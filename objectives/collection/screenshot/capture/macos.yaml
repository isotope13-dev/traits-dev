defaults:
  for:
    - macho
    - shell
  platforms:
    - macos
  attack: T1113
  mbc: C0014
traits:
  - id: screencapture-cmd
    desc: macOS screencapture command
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: \bscreencapture\b(\s+-[A-Za-z]+)?\s+[/~.]
    downgrade:
      any:
        - id: metadata/vendor/apple::system-component
        - id: metadata/signed/platform::apple
        - id: well-known/tools/detection/
        - type: string_value
          regex: '@\(#\)PROGRAM:[A-Za-z][A-Za-z0-9]*\s+PROJECT:[A-Za-z]+-[0-9]+'
  - id: cg-window-capture
    desc: macOS CGWindow screen capture API
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: CGWindowListCreateImageFromArray
  - id: screenshot-filename
    desc: Screenshot output filename pattern
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: screenshot\.\w{3,4}
