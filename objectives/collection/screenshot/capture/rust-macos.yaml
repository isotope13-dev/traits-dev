defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1113

traits:
  - id: rust-screencapture-command
    desc: Invokes macOS screencapture tool
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: screencapture
    unless:
      - id: objectives/supply-chain/trojanized/app/debug-probe/
      - id: well-known/app/macos-benign/

  - id: rust-screenshot-png-temp
    desc: Saves screenshot to /tmp/snap_ PNG
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/snap_

composite_rules:
  - id: rust-macos-screenshot-capture
    desc: Rust macOS screenshot capture
    crit: hostile
    conf: 0.98
    all:
      - id: rust-screencapture-command
      - id: rust-screenshot-png-temp
