defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1113

traits:
  - id: rust-screencapture-command
    desc: Rust screencapture command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: screencapture

  - id: rust-screenshot-png-temp
    desc: Rust screenshot temp PNG
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/snap_

composite_rules:
  - id: rust-macos-screenshot-capture
    desc: Rust macOS screenshot capture
    crit: hostile
    conf: 0.98
    all:
      - id: rust-screencapture-command
      - id: rust-screenshot-png-temp
