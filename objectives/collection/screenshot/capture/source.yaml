# Screenshot capture in source code
# ATT&CK: T1113 (Screen Capture)
defaults:
  attack: T1113
  mbc: C0014

traits:
  # C# / Windows GDI screenshot traits
- id: bitblt-dllimport
  desc: BitBlt GDI screen capture via DllImport
  crit: notable
  conf: 0.9
  for: [csharp]
  platforms: [windows]
  if:
    type: text
    substr: BitBlt(IntPtr

- id: screen-primaryscreen
  desc: Screen.PrimaryScreen bounds access
  crit: component
  conf: 0.8
  for: [csharp]
  platforms: [windows]
  if:
    type: text
    substr: Screen.PrimaryScreen

- id: cursor-position-draw
  desc: Mouse cursor capture on screenshot
  crit: component
  conf: 0.7
  for: [csharp]
  platforms: [windows]
  if:
    type: text
    substr: Cursor.Position

- id: ps-save-screenshot-function
  desc: PowerShell Save-Screenshot function
  crit: component
  conf: 0.92
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: '(?i)\bfunction\s+Save-Screenshot\b'

- id: ps-addtype-drawing-screenshot--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: '(?is)\bAdd-Type\b.{0,400}(System\.Drawing|Graphics)'

  count_max: 1031798
- id: ps-addtype-drawing-screenshot--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: '(?is)\bAdd-Type\b.{0,400}(Bitmap|CopyFromScreen)'

  count_max: 1031799
- id: ps-addtype-drawing-screenshot--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: '(?is)\bAdd-Type\b.{0,400}(BitBlt)'

  count_max: 1031800
- id: ps-virtual-screen-capture--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: '(?is)(SystemInformation\.VirtualScreen|Screen\.AllScreens).{0,400}(CopyFromScreen|BitBlt)'

  count_max: 1031801
- id: ps-virtual-screen-capture--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: '(?is)(SystemInformation\.VirtualScreen|Screen\.AllScreens).{0,400}(Graphics)'

  count_max: 1031802
- id: ps-virtual-screen-capture--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: '(?is)(Screen\.PrimaryScreen).{0,400}(CopyFromScreen|BitBlt|Graphics)'

  count_max: 1031803
- id: ps-screenshot-loop--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.86
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: '(?is)while\s*\(\s*\$true\s*\).{0,800}(Save-Screenshot|CopyFromScreen).{0,800}Start-Sleep'

  # Go: server-side code that retrieves screenshots from a remote client via RPC
  # and saves them as PNG files under a screenshots/ directory (RAT pattern).
  count_max: 1031804
- id: ps-screenshot-loop--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.86
  for: [powershell]
  platforms: [windows]
  if:
    type: text
    regex: '(?is)while\s*\(\s*\$true\s*\).{0,800}(BitBlt).{0,800}Start-Sleep'

  # Go: server-side code that retrieves screenshots from a remote client via RPC
  # and saves them as PNG files under a screenshots/ directory (RAT pattern).
  count_max: 1031805
- id: go-rpc-screen-api
  desc: Go RPC Screen API call (remote)
  crit: notable
  conf: 0.85
  for: [go]
  platforms: [windows, unix]
  if:
    type: text
    substr: "API.Screen"

- id: go-screenshots-dir
  desc: screenshots/ subdirectory for captured images
  crit: component
  conf: 0.75
  for: [go]
  platforms: [windows, unix]
  if:
    type: text
    substr: "/screenshots/"

composite_rules:
- id: csharp-screenshot
  desc: C# GDI screenshot capture pattern
  crit: suspicious
  conf: 0.9
  for: [csharp]
  platforms: [windows]
  all:
  - id: screen-primaryscreen
  - id: cursor-position-draw
  any:
  - id: bitblt-dllimport
  - id: micro-behaviors/hardware/display/screen::gdi-bitblt

- id: powershell-addtype-screenshot
  desc: PowerShell compiled screenshot capture
  crit: suspicious
  conf: 0.95
  for: [powershell]
  platforms: [windows]
  all:
  - id: ps-addtype-drawing-screenshot
  - id: ps-virtual-screen-capture
  any:
  - id: ps-save-screenshot-function
  - id: objectives/execution/interpreter/eval/invoke::add-type
  - id: metadata/lang/scripted::add-type-definition

- id: powershell-screenshot-timer
  desc: PowerShell repeated screenshot capture
  crit: suspicious
  conf: 0.93
  for: [powershell]
  platforms: [windows]
  all:
  - id: powershell-addtype-screenshot
  - id: ps-screenshot-loop

- id: powershell-screenshot-upload
  desc: PowerShell screenshot C2 upload
  crit: hostile
  conf: 0.96
  for: [powershell]
  platforms: [windows]
  all:
  - id: powershell-addtype-screenshot
  - id: objectives/command-and-control/beacon/network/client-cli::curl-upload
  - id: micro-behaviors/communications/ip/literal::http-ip-url

- id: powershell-screenshot-surveillance-upload
  desc: PowerShell screenshot loop upload
  crit: hostile
  conf: 0.97
  for: [powershell]
  platforms: [windows]
  all:
  - id: powershell-screenshot-timer
  - id: powershell-screenshot-upload

- id: go-rpc-screenshot-capture
  desc: Go RAT remote screenshot capture via RPC
  crit: suspicious
  conf: 0.9
  for: [go]
  platforms: [windows, unix]
  all:
  - id: go-rpc-screen-api
  - id: go-screenshots-dir
  - id: micro-behaviors/fs/file/write/direct::os-write-file
- id: ps-addtype-drawing-screenshot
  desc: PowerShell Add-Type drawing capture
  crit: component
  conf: 0.9
  for: [powershell]
  platforms: [windows]
  any:
  - id: ps-addtype-drawing-screenshot--rx-1
  - id: ps-addtype-drawing-screenshot--rx-2
  - id: ps-addtype-drawing-screenshot--rx-3
- id: ps-virtual-screen-capture
  desc: PowerShell virtual screen capture
  crit: component
  conf: 0.9
  for: [powershell]
  platforms: [windows]
  any:
  - id: ps-virtual-screen-capture--rx-4
  - id: ps-virtual-screen-capture--rx-5
  - id: ps-virtual-screen-capture--rx-6
- id: ps-screenshot-loop
  desc: PowerShell repeated screenshot loop
  crit: component
  conf: 0.86
  for: [powershell]
  platforms: [windows]
  any:
  - id: ps-screenshot-loop--rx-7
  - id: ps-screenshot-loop--rx-8
