# Windows Screenshot Capture via GDI + GDI+ Encoding
# Full screenshot pipeline: GDI capture -> GDI+ PNG encode -> exfil
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1113
  mbc: "C0014"
composite_rules:
  - id: gdi-window-capture
    desc: GDI window capture with screen context
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/hardware/display/screen::gdi-window-capture-primitives
    any:
      - id: micro-behaviors/ui/window/manage::get-foreground-window
      - id: micro-behaviors/ui/window/manage::get-window-text
      - id: micro-behaviors/ui/window/manage::get-window-text-length
    unless:
      - id: metadata/binary/metrics::many-exports
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
  - id: gdi-gdiplus-capture
    desc: GDI screen capture with GDI+ image encoding
    crit: notable
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
      - id: micro-behaviors/data/encode/image/gdiplus::save-image-to-stream
    unless:
      - id: metadata/binary/metrics::many-exports
  - id: gdi-dib-capture
    desc: GDI screen capture via DIB section (BMP format)
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
      - id: micro-behaviors/hardware/display/screen::create-dib-section
    unless:
      - id: metadata/binary/metrics::many-exports
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
  - id: printwindow-jpeg-capture
    desc: PrintWindow capture with JPEG encoding
    crit: notable
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/display/screen::printwindow-capture-primitives
    any:
      - id: micro-behaviors/hardware/display/screen::imageformat-jpeg-str
      - id: micro-behaviors/hardware/display/screen::bitmap-fromscratch-str
      - id: micro-behaviors/communications/http/server/managed::mjpeg-stream-content-type
    needs: 1
    downgrade:
      any:
        - id: well-known/app::startallback-basename
        - id: well-known/app::darkmagic-basename
  - id: printwindow-window-capture
    desc: PrintWindow selected window capture
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/hardware/display/screen::printwindow-capture-primitives
      - id: micro-behaviors/ui/window/manage::desktop-window-enumeration
    any:
      - id: micro-behaviors/ui/window/manage::get-window-rect
      - id: micro-behaviors/communications/http/server/managed::mjpeg-stream-content-type
    needs: 1
  - id: screenshot-exfil
    desc: Screenshot capture with network exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: gdi-gdiplus-capture
    any:
      - id: micro-behaviors/communications/http/post/
      - id: objectives/exfiltration/messaging/telegram::api-endpoint
      - id: micro-behaviors/communications/http/upload/
  - id: screenshot-dib-exfil
    desc: BMP screenshot capture with network exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: gdi-dib-capture
    any:
      - id: micro-behaviors/communications/http/post/
      - id: objectives/exfiltration/messaging/telegram::api-endpoint
      - id: micro-behaviors/communications/http/upload/
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/signed/platform::microsoft-code-signing-pca-2011
  - id: gdi-gdiplus-init-capture
    desc: GDI capture with GDI+ initialization
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
      - id: micro-behaviors/data/encode/image/gdiplus::startup
    unless:
      - id: metadata/binary/metrics::many-exports
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
  - id: winrt-graphics-capture
    desc: WinRT GraphicsCapture screenshot capability
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/hardware/display/screen::winrt-graphics-capture-primitives
    any:
      - id: micro-behaviors/data/encode/image::pixel-access-pixelformat
      - id: metadata/binary/metrics::near-zero-strings
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: gdi-capture-http-exfil
    desc: Screen capture with HTTP network access
    crit: hostile
    conf: 0.92
    all:
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
      - id: micro-behaviors/data/encode/image/gdiplus::startup
    any:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/post::wininet-post
    unless:
      - id: metadata/binary/metrics::many-exports
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/binary/metrics::many-imports
  # DPAPI + screen capture canvas + HTTP read = credential/screenshot stealer
  - id: windows-stealer-dpapi-screen-exfil
    desc: Windows credential theft with screen capture and HTTP exfil
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/credential-access/browser/dpapi::crypt-unprotect-data
      - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
    any:
      - id: micro-behaviors/communications/http/get::wininet-read-file-src
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/communications/http/get::wininet-http-flow
    unless:
      - id: metadata/binary/vendor::microsoft-corp-marker
