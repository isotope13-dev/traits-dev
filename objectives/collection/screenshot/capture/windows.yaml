# Windows Screenshot Capture via GDI + GDI+ Encoding
# Full screenshot pipeline: GDI capture -> GDI+ PNG encode -> exfil
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1113
  mbc: "C0014"
traits:
- id: screenshot-jpg-artifact
  desc: Screenshot JPEG artifact name
  crit: component
  conf: 0.86
  if:
    type: text
    exact: screenshot.jpg
composite_rules:
- id: gdi-window-capture
  desc: GDI window capture with screen context
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/hardware/display/screen::gdi-window-capture-primitives
  any:
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  - id: micro-behaviors/ui/window/manage/control::get-window-text-length
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: metadata/binary/metrics/structural::many-exports
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
- id: gdi-gdiplus-capture
  desc: GDI screen capture with GDI+ image encoding
  crit: notable
  conf: 0.93
  all:
  - id: micro-behaviors/hardware/display/screen::gdi-bitblt
  any:
  - id: micro-behaviors/data/encode/image/gdiplus::save-image-to-stream
  - id: micro-behaviors/data/encode/image/gdiplus::save-image-to-file
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: metadata/binary/metrics/structural::many-exports
  downgrade:
    any:
    - id: metadata/library/automation/
    - id: metadata/library/automation/
- id: gdi-dib-capture
  desc: GDI screen capture via DIB section (BMP format)
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/hardware/display/screen::gdi-bitblt
  - id: micro-behaviors/hardware/display/screen::create-dib-section
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: metadata/binary/metrics/structural::many-exports
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/library/automation/
    - id: metadata/library/automation/
- id: printwindow-jpeg-capture
  desc: PrintWindow capture with JPEG encoding
  crit: notable
  conf: 0.93
  all:
  - id: micro-behaviors/hardware/display/screen::printwindow-capture-primitives
  any:
  - id: micro-behaviors/hardware/display/screen::imageformat-jpeg-str
  - id: micro-behaviors/hardware/display/screen::bitmap-fromscratch-str
  - id: micro-behaviors/communications/http/server/managed::mjpeg-stream-content-type
  downgrade:
    any:
    - id: well-known/app/startallback::startallback-basename
    - id: well-known/app/startallback::darkmagic-basename
- id: printwindow-window-capture
  desc: PrintWindow selected window capture
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/hardware/display/screen::printwindow-capture-primitives
  - id: micro-behaviors/ui/window/manage/enumerate::desktop-window-enumeration
  any:
  - id: micro-behaviors/ui/window/manage/control::get-window-rect
  - id: micro-behaviors/communications/http/server/managed::mjpeg-stream-content-type
  downgrade:
    any:
    - id: metadata/binary/vendor/
    - id: well-known/app/internet-explorer/
- id: screenshot-exfil
  desc: Screenshot capture with network exfiltration
  crit: hostile
  conf: 0.95
  all:
  - id: gdi-gdiplus-capture
  any:
  - id: micro-behaviors/communications/http/post/
  - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
  - id: micro-behaviors/communications/http/upload/
  unless:
  - id: metadata/library/automation/
  - id: metadata/library/automation/
  - id: well-known/app/winmerge/
- id: screenshot-dib-exfil
  desc: BMP screenshot capture with network exfiltration
  crit: hostile
  conf: 0.95
  all:
  - id: gdi-dib-capture
  any:
  - id: micro-behaviors/communications/http/post/
  - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
  - id: micro-behaviors/communications/http/upload/
  unless:
  - id: metadata/library/automation/
  - id: well-known/app/rufus/
  - id: well-known/app/qbittorrent/
  - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
  - id: well-known/app/winmerge/
  # MFC is a GUI framework exposing both GDI bitmap and WinINet HTTP wrappers;
  # the runtime DLL itself captures and exfiltrates nothing.
  - id: metadata/library/mfc::mfc-runtime-library
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft-corporation
    - id: metadata/signed/platform::microsoft-code-signing-pca-2011
- id: gdi-capture-clipboard-desktop-access
  desc: GDI capture with clipboard and desktop access
  crit: suspicious
  conf: 0.94
  all:
  - id: gdi-window-capture
  - id: micro-behaviors/os/clipboard/access::win32-clipboard-read-write
  - id: micro-behaviors/ui/window/station::open-desktop-import
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: metadata/binary/metrics/structural::many-exports
- id: pe-screenshot-jpeg-upload
  desc: Screenshot JPEG HTTP upload
  crit: hostile
  conf: 0.96
  all:
  - id: screenshot-jpg-artifact
  - id: micro-behaviors/communications/http/upload::pe-jpeg-content-type
  - id: micro-behaviors/communications/http/upload::pe-filename-upload-header
  any:
  - id: micro-behaviors/ui/window/manage/control::get-dc
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  - id: micro-behaviors/communications/http/upload::pe-octet-stream-content-type
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::microsoft-corporation
- id: gdi-gdiplus-init-capture
  desc: GDI capture with GDI+ initialization
  crit: suspicious
  conf: 0.88
  all:
  - id: micro-behaviors/hardware/display/screen::gdi-bitblt
  - id: micro-behaviors/data/encode/image/gdiplus::startup
  unless:
  - id: metadata/binary/metrics/structural::many-exports
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
- id: winrt-graphics-capture
  desc: WinRT GraphicsCapture screenshot capability
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/hardware/display/screen::winrt-graphics-capture-primitives
  any:
  - id: micro-behaviors/data/encode/image/pixel::pixel-access-pixelformat
  - id: metadata/binary/metrics/structural::near-zero-strings
  downgrade:
    any:
    - id: metadata/signed/platform/
  unless:
  - id: well-known/app/windows-desktop-tools::quicklook-release-path
- id: gdi-capture-http-exfil
  desc: Screen capture with HTTP network access
  crit: hostile
  conf: 0.92
  all:
  - id: micro-behaviors/hardware/display/screen::gdi-bitblt
  - id: micro-behaviors/data/encode/image/gdiplus::startup
  any:
  - id: micro-behaviors/communications/http/get::internet-open
  - id: micro-behaviors/communications/http/post::wininet-post
  unless:
  - id: metadata/binary/metrics/structural::many-exports
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft-corporation
    - id: metadata/binary/metrics/structural::many-imports
  # DPAPI + screen capture canvas + HTTP read = credential/screenshot stealer
- id: windows-stealer-dpapi-screen-exfil
  desc: Windows credential theft with screen capture and HTTP exfil
  crit: hostile
  conf: 0.95
  all:
  - id: objectives/credential-access/browser/dpapi::crypt-unprotect-data
  - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
  any:
  - id: micro-behaviors/communications/http/get::wininet-read-file-src
  - id: micro-behaviors/communications/http/get::internet-read-file
  - id: micro-behaviors/communications/http/get::wininet-http-flow
  unless:
  - id: metadata/binary/vendor/
- id: directx-gdiplus-screenshot-capture
  desc: DirectX screenshot capture with PNG encoding
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/hardware/display/screen::d3d11-device-swapchain
  - id: micro-behaviors/data/encode/image/gdiplus::create-bitmap-from-hbitmap
  - id: micro-behaviors/data/encode/image/gdiplus::png-encoder-clsid
  unless:
  - id: metadata/binary/vendor/
- id: directx-tor-screenshot-exfil
  desc: DirectX screenshot capture with Tor C2
  crit: hostile
  conf: 0.96
  all:
  - id: directx-gdiplus-screenshot-capture
  - id: objectives/command-and-control/channel/tor/client::native-libcurl-onion-socks
