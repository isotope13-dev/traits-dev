# Windows Screenshot Capture via GDI + GDI+ Encoding
# Full screenshot pipeline: GDI capture -> GDI+ PNG encode -> exfil
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1113
  mbc: "C0014"
composite_rules:
  - id: gdi-gdiplus-capture
    desc: GDI screen capture with GDI+ image encoding
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
      - id: micro-behaviors/data/encode/image/gdiplus::save-image-to-stream
    unless:
      - id: metadata/format::many-exports
  - id: screenshot-exfil
    desc: Screenshot capture with network exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: gdi-gdiplus-capture
    any:
      - id: micro-behaviors/communications/http/post
      - id: objectives/exfiltration/messaging/telegram/bot-api::api-endpoint
      - id: micro-behaviors/communications/http/upload
  # DPAPI + screen capture canvas + HTTP read = credential/screenshot stealer
  - id: windows-stealer-dpapi-screen-exfil
    desc: Windows credential theft with screen capture and HTTP exfil
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/crypto/dpapi/decrypt::crypt-unprotect-data
      - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
    any:
      - id: micro-behaviors/communications/http/get::wininet-read-file-src
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/communications/http/get::wininet-http-flow
    none:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
