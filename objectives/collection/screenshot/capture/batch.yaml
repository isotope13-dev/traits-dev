defaults:
  platforms: [windows]
  for: [batch]
  attack: T1113
  mbc: C0014

traits:
  - id: nircmd-savescreenshot-loop
    desc: NirCmd repeated screenshot capture
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)nircmd(\.exe)?\s+(nircmd(\.exe)?\s+)?loop\s+\d+\s+\d+\s+savescreenshot\b'

  - id: screenshot-directory-create
    desc: Batch creates screenshot directory
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(?im)^\s*(md|mkdir)\s+screenshots\b'

  - id: batch-goto-colon-loop
    desc: Batch goto colon loop
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?im)^\s*goto\s+:[A-Za-z0-9_-]+\b'

composite_rules:
  - id: batch-nircmd-screenshot-loop
    desc: Batch loops screenshot capture
    crit: hostile
    conf: 0.97
    all:
      - id: nircmd-savescreenshot-loop
      - id: screenshot-directory-create
      - id: batch-goto-colon-loop
