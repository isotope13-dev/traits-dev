defaults:
  platforms: [qnx, unix]
  for: [objc]
  attack: T1113

traits:
  - id: qnx-objc-photon-screen-attach
    desc: QNX ObjC Photon screen attach
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: PhScreenAttach

  - id: qnx-objc-photon-getimage
    desc: QNX ObjC Photon get image
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: PhGetImage

  - id: qnx-objc-capture-api-path
    desc: QNX ObjC capture API path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/capture/

composite_rules:
  - id: qnx-objc-screenshot-http-delivery
    desc: QNX ObjC screenshot HTTP delivery
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-objc-photon-screen-attach
      - id: qnx-objc-photon-getimage
      - id: qnx-objc-capture-api-path
