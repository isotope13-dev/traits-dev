defaults:
  platforms: [windows, unix, android]
  for:
    - java
    - class
    - jar
    - zip
traits:
  - id: java-screenshot-capture
    desc: Java screen capture methods
    crit: notable
    conf: 0.8
    mbc: C0014
    attack: T1113
    if:
      type: symbol
      kind: call
      exact: createScreenCapture
  - id: java-png-creation
    desc: Java PNG image creation
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      regex: '(^|\.)write$'
      arg:
        kind: string
        regex: '(?i)^png$'
composite_rules:
  - id: java-awt-robot-ref
    desc: Java AWT Robot reference
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/hardware/input/robot::java-awt-robot-import
      - id: micro-behaviors/hardware/input/robot::java-awt-robot

  - id: java-screenshot-png-output
    desc: Java screen capture with PNG output
    crit: notable
    conf: 0.9
    mbc: C0014
    attack: T1113
    all:
      - id: java-awt-robot-ref
    any:
      - id: java-png-creation
      - id: micro-behaviors/fs/path/temp::java-temp-png-output-path
