defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [java, class]
traits:
  - id: java-awt-robot-dup
    desc: Java AWT Robot for screen capture
    crit: notable
    conf: 0.85
    mbc: C0014
    attack: T1113
    if:
      type: string_value
      substr: java.awt.Robot
  - id: java-screenshot-capture
    desc: Java screen capture methods
    crit: notable
    conf: 0.8
    mbc: C0014
    attack: T1113
    if:
      type: string_value
      substr: createScreenCapture
  - id: java-png-creation
    desc: Java PNG image creation
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: javax.imageio.ImageIO.write
  - id: java-png-suspicious-paths
    desc: PNG creation in suspicious temporary paths
    crit: suspicious
    conf: 0.8
    mbc: C0014
    attack: T1113
    count_min: 1
    if:
      type: string_value
      regex: \.png.{0,50}temp|tmp.{0,50}\.png|/var/.{0,50}\.png|/tmp/.{0,50}\.png
composite_rules:
  - id: java-screenshot-exfil
    desc: Java screenshot capture with potential exfiltration
    crit: hostile
    conf: 0.9
    mbc: C0014
    attack: T1113
    all:
      - id: objectives/collection/screenshot/capture::java-awt-robot-dup
    any:
      - id: java-png-creation
      - id: java-png-suspicious-paths
