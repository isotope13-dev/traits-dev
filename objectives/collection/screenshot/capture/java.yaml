defaults:
  platforms: [windows, unix, android]
  for:
    - java
    - class
    - jar
    - zip
traits:
  - id: java-awt-robot-dup
    desc: Java AWT Robot for screen capture
    crit: notable
    conf: 0.85
    mbc: C0014
    attack: T1113
    if:
      type: text
      substr: java.awt.Robot
  - id: java-screenshot-capture
    desc: Java screen capture methods
    crit: notable
    conf: 0.8
    mbc: C0014
    attack: T1113
    if:
      type: text
      substr: createScreenCapture
  - id: java-png-creation
    desc: Java PNG image creation
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: javax.imageio.ImageIO.write
  - id: java-png-suspicious-paths
    desc: PNG creation in suspicious temporary paths
    crit: suspicious
    conf: 0.8
    mbc: C0014
    attack: T1113
    count_min: 1
    if:
      type: text
      regex: (?i)(/tmp/|/var/tmp/|\\temp\\).{0,40}\.png
composite_rules:
  - id: java-awt-robot-ref
    desc: Java AWT Robot reference
    crit: notable
    conf: 0.85
    any:
      - id: java-awt-robot-dup
      - id: micro-behaviors/hardware/input/robot::java-awt-robot

  - id: java-screenshot-exfil
    desc: Java screenshot capture with potential exfiltration
    crit: hostile
    conf: 0.9
    mbc: C0014
    attack: T1113
    all:
      - id: java-awt-robot-ref
    any:
      - id: java-png-creation
      - id: java-png-suspicious-paths
