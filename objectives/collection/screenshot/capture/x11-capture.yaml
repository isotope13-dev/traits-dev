defaults:
  platforms: [linux]
  attack: T1113
  mbc: C0014
  for: [go, c, cpp, rust]

traits:
  - id: x11-screen-capture-reset
    desc: X11 screen capture reset function
    crit: component
    conf: 0.8
    if:
      type: text
      word: x11Reset
  
  - id: desktop-capture-reset
    desc: Reset desktop capture functionality
    crit: component
    conf: 0.8
    if:
      type: text
      word: ResetDesktopCapture

composite_rules:
  - id: x11-desktop-capture-reset-behavior
    desc: Resets X11 desktop capture (stealth/cleanup)
    crit: suspicious
    conf: 0.85
    all:
      - id: x11-screen-capture-reset
      - id: desktop-capture-reset
