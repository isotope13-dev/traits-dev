defaults:
  platforms: [windows, unix]
  attack: T1113
  for: [javascript, chrome-manifest, crx, archives]

composite_rules:
- id: all-url-extension-visible-tab-capture
  desc: All-site extension captures tab screenshots
  crit: hostile
  conf: 0.96
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  scope: archive
  all:
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-capture-visible
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: objectives/supply-chain/hidden-payload/extensions/permission::permission-debugger
  any:
  - id: metadata/permission/host::content-script-all-sites
  - id: metadata/permission/activation::content-script-all-frames
  - id: metadata/permission/manifest::permission-tabs
  unless:
  - id: well-known/app/rinkt::rpa-extension
