defaults:
  platforms: [windows, unix]
  attack: T1113
  for: [javascript, chrome-manifest, crx, archives]

composite_rules:
- id: all-url-extension-visible-tab-capture
  desc: Extension captures visible tabs across all sites with debugger access
  # Broad tab capture is a high-value capability, but this combination is
  # also used by legitimate screenshot, testing, and browser-automation
  # extensions.  Capture alone does not establish hostile collection intent.
  crit: notable
  conf: 0.9
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  scope: archive
  all:
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-capture-visible
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: metadata/permission/debugger::permission-debugger
  any:
  - id: micro-behaviors/process/inject/webextension::broad-content-script-injection
  - id: micro-behaviors/process/inject/webextension::content-script-all-frames
  - id: metadata/permission/manifest::permission-tabs
  unless:
  - id: well-known/app/rinkt::native-host-id
  - id: well-known/app/linghou::linghou-browser-extension-context
