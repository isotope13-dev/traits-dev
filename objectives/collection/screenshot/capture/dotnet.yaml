# .NET Screenshot Capture Composites (CopyFromScreen pipeline)
# Detects RATs using managed .NET screen capture APIs
# ATT&CK: T1113 (Screen Capture)
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1113
  mbc: C0014
traits:
  - id: system-drawing-common-library
    desc: System Drawing Common framework library
    crit: component
    conf: 0.95
    if:
      type: basename
      exact: System.Drawing.Common.dll
  - id: system-drawing-common-marker
    desc: System Drawing Common assembly marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: System.Drawing.Common.dll
  - id: scan-qrcode-from-screen-marker
    desc: QR scan from screen helper
    crit: component
    conf: 0.98
    if:
      type: text
      exact: ScanQRCodeFromScreen
composite_rules:
  - id: dotnet-screenshot-capture
    desc: .NET managed screen capture via CopyFromScreen
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
    unless:
      - id: system-drawing-common-library
      - id: system-drawing-common-marker
      - id: scan-qrcode-from-screen-marker
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics::many-exports
        - id: metadata/signed/developer
  - id: dotnet-screenshot-with-exfil
    desc: .NET screenshot capture with network exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
    any:
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
      - id: micro-behaviors/communications/http/client::webclient
    unless:
      - id: system-drawing-common-library
      - id: system-drawing-common-marker
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
