# .NET Screenshot Capture Composites (CopyFromScreen pipeline)
# Detects RATs using managed .NET screen capture APIs
# ATT&CK: T1113 (Screen Capture)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1113
  mbc: C0014
composite_rules:
  - id: dotnet-screenshot-file-capture
    desc: .NET screenshot capture to JPEG file
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
      - id: micro-behaviors/hardware/display/screen::screenshot-jpg-template
  - id: dotnet-screenshot-capture
    desc: .NET screenshot capture with transfer context
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
      - id: micro-behaviors/hardware/display/screen::imageformat-jpeg-str
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
    unless:
      - id: micro-behaviors/communications/http/client::uploadstring
      - id: micro-behaviors/communications/http/client::uploadvalues
  - id: dotnet-screenshot-with-exfil
    desc: .NET screenshot capture with network exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
      - id: micro-behaviors/hardware/display/screen::imageformat-jpeg-str
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
    any:
      - id: micro-behaviors/communications/http/client::uploadstring
      - id: micro-behaviors/communications/http/client::uploadvalues
