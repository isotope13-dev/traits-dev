# .NET Screenshot Capture Composites (CopyFromScreen pipeline)
# Detects RATs using managed .NET screen capture APIs
# ATT&CK: T1113 (Screen Capture)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1113
  mbc: C0014
composite_rules:
  - id: dotnet-managed-screenshot-encrypted-remote-control
    desc: .NET screenshot collection with encrypted remote control
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/hardware/display/screen::dotnet-gdi-managed-screen-capture
      - id: micro-behaviors/hardware/input/mouse/synthesis::mouse-event
      - id: micro-behaviors/process/enumerate/managed::dotnet-process-discovery
      - id: micro-behaviors/communications/http/client/managed::dotnet-http-client-with-aes
    any:
      - id: micro-behaviors/communications/socket/create::tcpclient-dotnet-str
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
    needs: 1
  - id: dotnet-screenshot-file-capture
    desc: .NET screenshot capture to JPEG file
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
      - id: micro-behaviors/hardware/display/screen::screenshot-jpg-template
  - id: dotnet-screenshot-capture
    desc: .NET screenshot capture with transfer context
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
      - id: micro-behaviors/hardware/display/screen::imageformat-jpeg-str
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
    unless:
      - id: micro-behaviors/communications/http/client/managed::uploadstring
      - id: micro-behaviors/communications/http/client/managed::uploadvalues
  - id: dotnet-screenshot-with-exfil
    desc: .NET screenshot capture with network exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
      - id: micro-behaviors/hardware/display/screen::imageformat-jpeg-str
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
    any:
      - id: micro-behaviors/communications/http/client/managed::uploadstring
      - id: micro-behaviors/communications/http/client/managed::uploadvalues
  - id: dotnet-multimedia-surveillance-tcp
    desc: .NET screen and webcam capture over TCP
    crit: hostile
    conf: 0.98
    attack: T1113,T1125,T1095
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
      - id: micro-behaviors/hardware/input/video::avicap32-device-enum
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
    any:
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: micro-behaviors/communications/http/client/managed::downloaddata
      - id: objectives/command-and-control/dropper/staging/embedded::vb-newlatebinding
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: well-known/app/
      - id: well-known/lib/
