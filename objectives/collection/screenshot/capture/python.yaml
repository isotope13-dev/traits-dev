defaults:
  platforms: [windows, unix]
  for:
    - python
  attack: T1113
  mbc: B0002
traits:
  - id: screenshot-save-image
    desc: Screen image saved to disk
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: grab\(\)\.save\([^)]{0,220}["'](JPEG|PNG|JPG)["']
  - id: screenshot-name-artifact
    desc: Screenshot filename artifact
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      exact: scrn.jpg
  - id: screenshot-image-extension
    desc: Screenshot filename artifact
    crit: component
    conf: 0.65
    if:
      type: text
      regex: screenshot.{0,30}\.(jpg|jpeg|png)
  - id: python-framebuffer-capture
    desc: Python framebuffer capture
    crit: suspicious
    conf: 0.94
    for: [python, pyc]
    if:
      type: text
      regex: '/dev/fb0|capture_framebuffer'
    count_min: 2
  - id: python-collect-screenshots-name
    desc: Python collect_screenshots name
    crit: component
    conf: 0.9
    for: [python, pyc]
    if:
      type: text
      substr: collect_screenshots
  - id: python-exfiltrate-raw-name
    desc: Python exfiltrate_raw name
    crit: component
    conf: 0.9
    for: [python, pyc]
    if:
      type: text
      substr: exfiltrate_raw
composite_rules:
  - id: python-screen-capture
    desc: Python screenshot capture behavior
    crit: suspicious
    conf: 0.92
    any:
      - id: micro-behaviors/hardware/display/screen::pil-imagegrab
      - id: micro-behaviors/hardware/display/screen::screen-capture
    all:
      - id: screenshot-save-image
  - id: python-temp-screen-staging
    desc: Python temp screenshot staging
    crit: suspicious
    conf: 0.95
    all:
      - id: python-screen-capture
      - id: micro-behaviors/fs/temp/directory::temp-directory
      - id: screenshot-name-artifact
      - id: screenshot-image-extension
  - id: python-screenshot-exfil
    desc: Python screenshot capture with network exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: python-screen-capture
    any:
      - id: micro-behaviors/communications/http/post::session-post
      - id: micro-behaviors/communications/http/post::session-post
      - id: micro-behaviors/communications/http/upload/
  - id: python-overlay-screenshot-vercel-exfil
    desc: Python overlay screenshots to Vercel
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/hardware/display/screen::screen-capture
      - id: micro-behaviors/communications/http/post::session-post
      - id: micro-behaviors/communications/http/endpoints::vercel-serverless
      - id: micro-behaviors/ui/window/manage/visibility::tkinter-topmost
      - id: micro-behaviors/ui/window/manage/visibility::tkinter-overrideredirect
    any:
      - id: micro-behaviors/os/clipboard/access::pyperclip-paste
      - id: micro-behaviors/hardware/display/screen::pil-imagegrab
  - id: python-device-screenshot-exfil
    desc: Python device screenshot exfil
    crit: hostile
    conf: 0.98
    for: [python, pyc]
    all:
      - id: python-framebuffer-capture
      - id: python-collect-screenshots-name
      - id: python-exfiltrate-raw-name

  - id: python-remote-surveillance-collection-agent
    desc: Python remote command agent with screen and clipboard collection
    crit: hostile
    conf: 0.995
    for: [whl, python-sdist]
    scope: package
    attack: T1113,T1115,T1071.001
    mbc: B0022
    all:
      - id: objectives/command-and-control/backdoor/rat/multi::python-command-dispatch-handler-cluster
      - id: objectives/command-and-control/infrastructure/paste::npoint
      - id: micro-behaviors/hardware/display/screen::screen-capture
      - id: objectives/collection/clipboard/monitor::getclipboarddata-fn
