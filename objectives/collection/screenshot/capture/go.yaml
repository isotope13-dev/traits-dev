defaults:
  platforms: [linux, macos, windows]
  attack: T1113
  mbc: C0014
  for: [go]

traits:
  - id: go-empty-recover
    desc: Suppresses Go runtime panics
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'recover\(\) != nil \{\s*\}'

composite_rules:
  - id: go-stealth-screenshot-capture
    desc: Go stealth screenshot capture (panic suppression)
    crit: suspicious
    conf: 0.95
    all:
      - id: go-empty-recover
      - id: micro-behaviors/hardware/display/screen::screenshot-string
