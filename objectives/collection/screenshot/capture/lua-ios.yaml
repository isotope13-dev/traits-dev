defaults:
  platforms: [ios]
  for: [lua]
  attack: T1113

traits:
  - id: lua-ios-image-marker
    desc: Lua iOS image marker capture
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: UIGraphicsBeginImageContextWithOptions

  - id: lua-ios-png-representation
    desc: Lua iOS PNG representation
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: UIImagePNGRepresentation

  - id: lua-ios-keywindow-render
    desc: Lua renders iOS keyWindow layer
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'keyWindow[\s\S]{0,140}renderInContext'

composite_rules:
  - id: lua-ios-screenshot-capture
    desc: Lua iOS screenshot capture
    crit: hostile
    conf: 0.98
    all:
      - id: lua-ios-image-marker
      - id: lua-ios-png-representation
      - id: lua-ios-keywindow-render
