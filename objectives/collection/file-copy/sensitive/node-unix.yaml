defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1005

traits:
  - id: node-sensitive-copyfile-loop
    desc: Node sensitive copyFile loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'TARGET_FILES[\s\S]{0,520}fs\.copyFileSync'

  - id: node-unix-sensitive-targets
    desc: Node Unix sensitive targets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,220}/etc/shadow[\s\S]{0,220}/etc/crontab'

  - id: node-ssh-key-copy-loop
    desc: Node SSH key copy loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'readdirSync\(sshDir\)[\s\S]{0,320}copyFileSync'

composite_rules:
  - id: node-sensitive-file-staging
    desc: Node sensitive file staging
    crit: hostile
    conf: 0.98
    all:
      - id: node-sensitive-copyfile-loop
    any:
      - id: node-unix-sensitive-targets
      - id: node-ssh-key-copy-loop
