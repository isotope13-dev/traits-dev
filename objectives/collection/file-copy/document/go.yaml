defaults:
  platforms: [windows, linux, macos]
  mbc: E1119
  attack: T1119
traits:
  - id: lu4p-cat-import
    desc: lu4p/cat document extraction library
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: github\.com/lu4p/cat|lu4p/cat
  - id: lu4p-cat-string
    desc: lu4p/cat library in binary
    crit: suspicious
    conf: 0.85
    for: [go, elf, macho, pe]
    if:
      type: text
      substr: lu4p/cat
    unless:
      - id: metadata/library/structure::vscode-packaged-native-tool
  - id: pdfcpu-import
    desc: pdfcpu PDF library
    crit: notable
    conf: 0.7
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: pdfcpu
  - id: unipdf-import
    desc: unipdf PDF library
    crit: notable
    conf: 0.7
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: unidoc/unipdf
  - id: docx-import
    desc: DOCX parsing library
    crit: notable
    conf: 0.7
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: baliance/gooxml|nguyenthenguyen/docx
  - id: extract-text-string
    desc: ExtractText function
    crit: notable
    conf: 0.75
    for: [go]
    if:
      type: text
      word: ExtractText
  - id: parse-document-string
    desc: ParseDocument function
    crit: notable
    conf: 0.75
    for: [go]
    if:
      type: text
      word: ParseDocument
composite_rules:
  - id: document-extractor
    desc: Document text extraction capability
    crit: suspicious
    conf: 0.85
    any:
      - id: lu4p-cat-import
      - id: lu4p-cat-string
  - id: pdf-extraction
    desc: PDF text extraction
    crit: notable
    conf: 0.75
    any:
      - id: pdfcpu-import
      - id: unipdf-import
