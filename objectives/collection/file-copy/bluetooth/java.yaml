defaults:
  platforms: [android]
  for: [java, class]
  attack: T1005
  mbc: E1020

traits:
  - id: android-bluetooth-source
    desc: Android Bluetooth API source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: import
      regex: '^android\.bluetooth(\.|$)'
  - id: android-obex-source
    desc: Android OBEX API source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: import
      regex: '^javax\.obex(\.|$)'
  - id: android-insecure-rfcomm-source
    desc: Android insecure RFCOMM socket source
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: createInsecureRfcommSocketToServiceRecord
  - id: android-bluetooth-connector-source
    desc: Android Bluetooth connector source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: BluetoothConnector
  - id: android-bluetooth-underlying-socket
    desc: Android Bluetooth underlying socket
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: getUnderlyingSocket
  - id: android-obex-put-source
    desc: Android OBEX put method source
    crit: component
    conf: 0.88
    if:
      type: symbol
      kind: function
      exact: Put
  - id: android-obex-output-stream-source
    desc: Android OBEX output stream source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: openOutputStream
  - id: android-add-transfer-method
    desc: Android add transfer method
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: function
      exact: AddTransfer
  - id: android-send-file-ftp-method
    desc: Android send file FTP method
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: function
      exact: SendFileViaFTP
  - id: android-start-batch-method
    desc: Android start batch method
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: function
      exact: StartBatch
  - id: android-bluetooth-opp-service-source
    desc: Android Bluetooth OPP service source
    crit: component
    conf: 0.86
    if:
      type: text
      substr: BluetoothOPPService
  - id: android-device-admin-enable-source
    desc: Android device admin enable source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: identifier
      exact: ACTION_ADD_DEVICE_ADMIN
  - id: android-obex-client-session-source
    desc: Android OBEX client session source
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: ClientSession

composite_rules:
  - id: android-batch-transfer-method
    desc: Android batch transfer method
    crit: component
    conf: 0.84
    any:
      - id: android-add-transfer-method
      - id: android-send-file-ftp-method
      - id: android-start-batch-method
  - id: android-bluetooth-obex-file-transfer
    desc: Android Bluetooth OBEX transfer
    crit: suspicious
    conf: 0.94
    all:
      - id: android-bluetooth-source
      - id: android-obex-source
    any:
      - id: android-insecure-rfcomm-source
      - id: android-bluetooth-connector-source
      - id: android-bluetooth-underlying-socket
      - id: android-obex-put-source
      - id: android-obex-output-stream-source
      - id: android-batch-transfer-method
      - id: android-bluetooth-opp-service-source
      - id: android-device-admin-enable-source
      - id: android-obex-client-session-source
    needs: 3
