defaults:
  platforms:
    - macos
  for:
    - macho
    - shell
    - applescript
  attack: T1005
  mbc: OB0009
traits:
  - id: duplicate-folder
    desc: AppleScript Finder folder duplication
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: duplicate folder \(POSIX file
  - id: duplicate-file
    desc: AppleScript Finder file duplication
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: duplicate file \(POSIX file
composite_rules:
  - id: finder-copy-theft
    desc: AppleScript Finder file/folder copying
    crit: suspicious
    conf: 0.95
    any:
      - id: duplicate-folder
      - id: duplicate-file
