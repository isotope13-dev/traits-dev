defaults:
  for: [shell, python, javascript, elf, macho, pe]
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: tar-create
    desc: Creates tar archive
    crit: notable
    conf: 0.6
    attack: T1560
    platforms:
      - unix
    for: [scripts, binaries]
    if:
      type: text
      regex: tar\s+-c
  - id: tar-current-dir
    desc: Archives current directory to tar file
    crit: suspicious
    conf: 0.75
    attack: T1560
    platforms:
      - unix
    for: [scripts, binaries]
    if:
      type: text
      regex: tar\s+-[a-zA-Z]*c[a-zA-Z]*f[a-zA-Z]*\s+\S+\s+\.
    unless:
      - type: text
        substr: "qdrant-backward-compatibility"
    downgrade:
      any:
        - id: metadata/package/testing/presence::autoconf-testsuite
        - id: metadata/package/testing/presence::gnu-coreutils-test
  - id: tar-from-file
    desc: Tar with file list input
    crit: suspicious
    conf: 0.7
    attack: T1560
    platforms:
      - unix
    for: [scripts, binaries]
    if:
      type: text
      regex: (^|\s)tar\s+-[rT]
    downgrade:
      any:
        - id: metadata/package/testing/presence::autoconf-testsuite
        - id: metadata/package/testing/presence::gnu-coreutils-test
  - id: zip-create-dup
    desc: Creates zip archive
    crit: notable
    conf: 0.6
    attack: T1560
    if:
      type: text
      regex: zip\s+-[rX]
  - id: unarchive
    desc: Unarchive operation
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: '[Uu]narchive'
composite_rules:
  - id: binary-tar-exec
    desc: Binary executes tar command
    crit: suspicious
    conf: 0.8
    attack: T1560
    platforms:
      - unix
    for: [scripts, binaries]
    any:
      - id: tar-create
      - id: tar-from-file
