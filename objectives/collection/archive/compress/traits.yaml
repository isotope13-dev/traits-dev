defaults:
  for: [scripts, binaries]
  attack: T1560
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: tar-current-dir
    desc: Archives current directory to tar file
    crit: notable
    conf: 0.75
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: text
      regex: '(^|[\n;&|({\[=:"''`])\s*tar\s+-[a-zA-Z]*c[a-zA-Z]*f[a-zA-Z]*\s+\S+\s+\.'
    downgrade:
      any:
        - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
        - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
  - id: tar-from-file
    desc: Tar with file list input
    crit: suspicious
    conf: 0.7
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: text
      regex: '(^|[\n;&|({\[=:"''`])\s*tar\s+-[A-Za-z]*T'
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - type: path
        regex: 'pandaclient[\\/]AthenaUtils\.py$'
    downgrade:
      any:
        - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
        - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
  - id: tar-append
    desc: Appends files to tar archive
    crit: notable
    conf: 0.7
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: text
      regex: '(^|[\n;&|({\[=:"''`])\s*tar\s+-[A-Za-z]*r'
composite_rules:
  - id: binary-tar-exec
    desc: Binary executes tar command
    crit: suspicious
    conf: 0.8
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    any:
      - id: micro-behaviors/data/archive/create/tar::tar-create
      - id: tar-from-file
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
