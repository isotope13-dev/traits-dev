defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: tar-create
    desc: Creates tar archive
    crit: notable
    conf: 0.6
    attack: T1560
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      regex: tar\s+-c
  - id: tar-current-dir
    desc: Archives current directory to tar file
    crit: suspicious
    conf: 0.75
    attack: T1560
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      regex: tar\s+-[a-zA-Z]*c[a-zA-Z]*f[a-zA-Z]*\s+\S+\s+\.
    downgrade:
      any:
        - id: metadata/package/testing/presence::autoconf-testsuite
        - id: metadata/package/testing/presence::gnu-coreutils-test
  - id: tar-from-file
    desc: Tar with file list input
    crit: suspicious
    conf: 0.7
    attack: T1560
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      regex: (^|\s)tar\s+-[rT]
    downgrade:
      any:
        - id: metadata/package/testing/presence::autoconf-testsuite
        - id: metadata/package/testing/presence::gnu-coreutils-test
  - id: zip-create-dup
    desc: Creates zip archive
    crit: notable
    conf: 0.6
    attack: T1560
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: zip\s+-[rX]
  - id: unarchive
    desc: Unarchive operation
    crit: notable
    conf: 0.5
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: '[Uu]narchive'
composite_rules:
  - id: binary-tar-exec
    desc: Binary executes tar command
    crit: suspicious
    conf: 0.8
    attack: T1560
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    any:
      - id: tar-create
      - id: tar-from-file
