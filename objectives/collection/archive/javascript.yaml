# JavaScript source code archiving and exfiltration
# Detects npm packages that archive project files and upload them
defaults:
  platforms: [linux, macos, windows, unix]
  for: [javascript, typescript]
traits:
  - id: archiver-require
    desc: Requires archiver module for zip creation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: require\(['"]archiver['"]\)
  - id: archive-glob-all
    desc: Archives all files via glob pattern
    crit: suspicious
    conf: 0.85
    attack: T1560.001
    if:
      type: text
      substr: "archive.glob("
  - id: archive-pipe
    desc: Pipes archive to output stream
    crit: component
    conf: 0.7
    if:
      type: text
      substr: archive.pipe(
  - id: archive-finalize
    desc: Finalizes archive for writing
    crit: component
    conf: 0.7
    if:
      type: text
      substr: archive.finalize()
composite_rules:
  - id: js-source-archive-upload
    desc: Archives and uploads source code
    crit: hostile
    conf: 0.95
    attack: T1048.003
    all:
      - id: archiver-require
      - id: micro-behaviors/communications/http/request::https-request
    any:
      - id: archive-glob-all
      - id: archive-pipe
  - id: js-archive-creation
    desc: Creates archive of project files
    crit: suspicious
    conf: 0.85
    attack: T1560.001
    all:
      - id: archiver-require
    any:
      - id: archive-glob-all
      - id: archive-finalize
