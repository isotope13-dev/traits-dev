defaults:
  platforms: [windows, unix]
  for: [powershell]
  attack: T1560
traits:
  - id: compress-archive-ssh-path
    desc: Compress-Archive targets SSH path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Compress-Archive.{0,240}(\.ssh|id_rsa|IdentityFile)'
  - id: ssh-path-compress-archive
    desc: SSH path near Compress-Archive
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\.ssh|id_rsa|IdentityFile).{0,240}Compress-Archive'
  - id: tar-archives-ssh-path
    desc: tar archives SSH path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'tar(\.exe)?\s+-[A-Za-z]*c.{0,240}(\.ssh|id_rsa|IdentityFile)'
  - id: ssh-path-near-tar-archive
    desc: SSH path near tar archive
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\.ssh|id_rsa|IdentityFile).{0,240}tar(\.exe)?\s+-[A-Za-z]*c'
composite_rules:
  - id: powershell-data-archiving
    desc: PowerShell archives SSH credentials
    crit: hostile
    conf: 0.95
    any:
      - id: compress-archive-ssh-path
      - id: ssh-path-compress-archive
      - id: tar-archives-ssh-path
      - id: ssh-path-near-tar-archive
    unless:
      - id: well-known/app/posh-ovirt/
