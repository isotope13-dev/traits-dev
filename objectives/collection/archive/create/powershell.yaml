defaults:
  platforms: [windows, unix]
  for: [powershell]
  attack: T1560
composite_rules:
  - id: powershell-data-archiving
    desc: PowerShell script archiving collected data
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-dir
    any:
      - id: micro-behaviors/process/create/shell/invoke::tar-cmd
      - id: objectives/collection/archive/compress::powershell-compress-archive
