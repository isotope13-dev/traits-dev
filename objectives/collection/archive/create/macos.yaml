defaults:
  for:
    - shell
    - applescript
    - python
  attack: T1560.001
  platforms:
    - macos
  crit: notable
traits:
  - id: ditto-keepparent
    desc: ditto --keepParent compression
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: ditto.{0,30}--keepParent.{0,30}-c
  - id: ditto-rsrc-flag
    desc: ditto -rsrc flag
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: ditto.{0,30}-rsrc
  - id: zip-recursive-quiet
    desc: zip -r or -q flag
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: \bzip\s+-[rq]
  - id: zip-output-file
    desc: zip command output file
    crit: component
    conf: 0.65
    if:
      type: string_literal
      regex: \bzip\s+-[A-Za-z0-9qr-]*\s+\S{1,80}\.zip\b
composite_rules:
  - id: ditto-compress-comp
    desc: ditto archive creation with compression
    crit: notable
    conf: 0.85
    any:
      - id: objectives/collection/archive/data::ditto-ck-flags
      - id: ditto-keepparent
  - id: ditto-sequester-comp
    desc: ditto with resource fork handling
    crit: notable
    conf: 0.9
    any:
      - id: objectives/collection/archive/data::ditto-sequester
      - id: ditto-rsrc-flag
  - id: zip-create-comp
    desc: zip archive creation
    crit: notable
    conf: 0.75
    all:
      - id: zip-recursive-quiet
      - id: zip-output-file
  - id: tmp-archive
    desc: Archive creation in /tmp
    crit: suspicious
    conf: 0.8
    all:
      - id: zip-create-comp
    any:
      - id: micro-behaviors/fs/path/temp::tmp-zip-path
      - id: micro-behaviors/fs/path/temp::tmp-out-zip
      - id: micro-behaviors/fs/path/temp::var-tmp-zip
    unless:
      - id: well-known/app/skypilot::skypilot-source-file
  - id: ditto-staging
    desc: macOS data staging via ditto
    crit: suspicious
    conf: 0.9
    any:
      - id: ditto-compress-comp
      - id: ditto-sequester-comp
    all:
      - id: tmp-archive
  - id: archive-exfil
    desc: Archive collection with network exfiltration
    crit: suspicious
    conf: 0.9
    all:
      - id: tmp-archive
    any:
      - id: ditto-compress-comp
      - id: ditto-sequester-comp
      - id: zip-create-comp
