defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries, source]
# Collection of sensitive files into archives
# ATT&CK: T1560 (Archive Collected Data)
composite_rules:
  - id: archive-writer
    desc: Archive creation capability
    crit: component
    any:
      - id: micro-behaviors/data/archive/zip::zip-writer
      - id: micro-behaviors/data/archive/zip::zip-create
      - id: micro-behaviors/data/archive/zip::miniz-zip-writer-api
      - id: micro-behaviors/data/archive/library::archiver

  - id: sensitive-credentials
    desc: "Reference to sensitive credentials"
    crit: component
    any:
      - id: objectives/credential-access/ssh/key::id-rsa
      - id: micro-behaviors/fs/path/sensitive/credentials::gcloud-credentials
      - id: metadata/file/string/cloud::gcp-default-credentials
  - id: sensitive-archiving
    desc: "Archiving of sensitive credentials or keys"
    crit: suspicious
    conf: 0.95
    attack: "T1560"
    all:
      - id: archive-writer
      - id: micro-behaviors/os/user/
      - id: micro-behaviors/fs/file/
      - id: sensitive-credentials
    scope: leaf
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-cloud-native-tool-binary
