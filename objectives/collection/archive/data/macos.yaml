defaults:
  for:
    - shell
    - applescript
  attack: T1560
  platforms:
    - macos
traits:
  - id: ditto-ck-flags
    desc: ditto -c -k compression flags
    crit: notable
    conf: 0.7
    attack: T1560.001
    if:
      type: string_literal
      regex: ditto\s+-c\s+-k
  - id: ditto-sequester
    desc: ditto --sequesterRsrc flag
    crit: notable
    conf: 0.7
    attack: T1560.001
    if:
      type: string_literal
      substr: --sequesterRsrc
  - id: ditto-zip-output
    desc: ditto with .zip output
    crit: notable
    conf: 0.7
    attack: T1560.001
    if:
      type: string_literal
      regex: ditto.{0,50}\.zip
  - id: ditto-copy
    desc: macOS ditto directory copy
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: (?i)\bditto\s+([~./]|\$[A-Za-z_]|\"[~./]|'[~./])
  - id: hdiutil-create-cmd
    desc: hdiutil create command
    crit: notable
    conf: 0.65
    attack: T1560.001
    if:
      type: string_literal
      regex: hdiutil\s+create
  - id: hdiutil-format-flag
    desc: hdiutil -format flag
    crit: notable
    conf: 0.65
    attack: T1560.001
    if:
      type: string_literal
      regex: hdiutil.{0,30}-format
  - id: tar-create-flag
    desc: tar create flag
    crit: component
    conf: 0.5
    attack: T1560.001
    if:
      type: string_literal
      regex: tar\s+-[a-z]*c[a-z]*
  - id: tar-create-long
    desc: tar --create long option
    crit: component
    conf: 0.5
    attack: T1560.001
    if:
      type: string_literal
      substr: tar --create
  - id: gzip-compress
    desc: gzip command compression flag
    crit: component
    conf: 0.5
    attack: T1560.001
    if:
      type: string_literal
      regex: gzip\s+-
    unless:
      - id: well-known/app/drivers::linux-driver-script-basename
  - id: zip-flags
    desc: zip with flags
    crit: notable
    conf: 0.55
    attack: T1560.001
    if:
      type: string_literal
      regex: \bzip\s+-[r0-9]
  - id: unzip-overwrite
    desc: unzip -o overwrite flag
    crit: notable
    conf: 0.55
    attack: T1560.001
    if:
      type: string_literal
      regex: unzip\s+-o
  - id: tmp-dmg-file
    desc: .dmg file in /tmp
    crit: notable
    conf: 0.6
    attack: T1074.001
    if:
      type: string_literal
      regex: /tmp/.{0,50}\.dmg
  - id: tmp-out-file
    desc: /tmp/out. output file
    crit: notable
    conf: 0.6
    attack: T1074.001
    if:
      type: string_literal
      substr: /tmp/out.
  - id: tmp-zip-staging
    desc: Zip staged in /tmp
    crit: notable
    conf: 0.7
    attack: T1074.001
    if:
      type: string_literal
      regex: /tmp/[^\s]{1,50}\.zip
composite_rules:
  - id: hdiutil-create
    desc: macOS disk image creation
    crit: notable
    conf: 0.75
    attack: T1560.001
    any:
      - id: hdiutil-create-cmd
      - id: hdiutil-format-flag
  - id: zip-compress
    desc: zip archive creation
    crit: notable
    conf: 0.65
    attack: T1560.001
    any:
      - id: zip-flags
      - id: unzip-overwrite
  - id: ditto-compress
    desc: macOS ditto archive compression
    crit: suspicious
    conf: 0.85
    attack: T1560.001
    any:
      - id: ditto-ck-flags
      - id: ditto-sequester
      - id: ditto-zip-output
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: tar-compress
    desc: tar archive creation
    crit: notable
    conf: 0.6
    attack: T1560.001
    any:
      - id: tar-create-flag
      - id: tar-create-long
      - id: gzip-compress
  - id: tmp-directory
    desc: Staging in /tmp
    crit: notable
    conf: 0.7
    attack: T1074.001
    any:
      - id: tmp-zip-staging
      - id: tmp-dmg-file
      - id: tmp-out-file
