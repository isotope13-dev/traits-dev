defaults:
  for:
    - macho
    - objc
    - swift
    - applescript
  platforms:
    - macos
  attack: T1083
  crit: notable
traits:
  - id: ds-store
    desc: .DS_Store metadata files
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: .DS_Store
  - id: localized-folder
    desc: .localized folder marker
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: .localized
  - id: applications-dir
    desc: /Applications directory reference
    crit: component
    conf: 0.7
    if:
      type: text
      substr: /Applications
  - id: library-dir
    desc: ~/Library directory reference
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: ~/Library
  - id: downloads-dir
    desc: ~/Downloads directory reference
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (^|[/\\])Users[/\\].{1,64}[/\\]Downloads\b|~[/\\]Downloads\b
  - id: documents-dir
    desc: ~/Documents directory reference
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: /Documents\b|~/Documents
composite_rules:
  - id: user-directory-enum
    desc: Enumerates macOS user directories
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: applications-dir
      - id: library-dir
      - id: downloads-dir
      - id: documents-dir
      - id: micro-behaviors/os/env/vars/user-info::home-var
  - id: metadata-collection
    desc: Filesystem traversal with macOS file filtering
    crit: suspicious
    conf: 0.85
    all:
      - id: ds-store
      - id: user-directory-enum
      - id: micro-behaviors/fs/directory/traverse/
