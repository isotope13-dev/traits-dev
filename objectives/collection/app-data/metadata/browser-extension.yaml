defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: shopping-record-winner-field
    desc: Shopping record winner field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']?winner["'']?\s*:'

  - id: shopping-record-buyer-field
    desc: Shopping record buyer field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']?buyer["'']?\s*:'

  - id: shopping-record-bidder-field
    desc: Shopping record bidder field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']?bidder["'']?\s*:'

  - id: shopping-record-price-field
    desc: Shopping record price field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']?currentPrice["'']?\s*:'

  - id: shopping-record-final-price-field
    desc: Shopping record final price field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']?finalPrice["'']?\s*:'

  - id: shopping-record-item-field
    desc: Shopping record item identifier field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']?itemId["'']?\s*:'

  - id: shopping-record-listing-field
    desc: Shopping record listing field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']?listing["'']?\s*:'

  - id: shopping-record-payment-card-field
    desc: Payment-card field marker
    crit: component
    conf: 0.9
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: text
      # `expiry` is a generic UI/data property and occurs in unrelated
      # libraries. Require an explicitly card-specific field name.
      regex: '["'']?(cardNumber|cardCvv|cvv)["'']?\s*:'

  - id: shopping-record-postal-address-field
    desc: Shipping or billing address field marker
    crit: component
    conf: 0.88
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: text
      regex: '["'']?(shippingAddress|billingAddress)["'']?\s*:'

  - id: shopping-record-account-contact-field
    desc: Customer contact field marker
    crit: component
    conf: 0.85
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: text
      regex: '["'']?(buyerEmail|customerEmail|buyerPhone)["'']?\s*:'

  - id: swagger-ui-link-selector
    desc: Swagger UI schema link selector
    crit: notable
    conf: 0.94
    ref: sha256:14e6689d364517cfb12e021b84a1ef2e97550a387fcadde09fe40c706098410a
    if:
      type: text
      regex: 'document\.querySelector\s*\([^)]{0,220}swagger-ui'

  - id: active-page-hash-read
    desc: Browser location hash read
    crit: component
    conf: 0.9
    ref: sha256:14e6689d364517cfb12e021b84a1ef2e97550a387fcadde09fe40c706098410a
    unless:
      - id: well-known/app/google-web::official-google-web-asset
      - id: metadata/library/jquery/
    if:
      type: text
      substr: window.location.hash

  - id: boardgamegeek-preload-marker
    desc: BoardGameGeek preload data marker
    crit: component
    conf: 0.96
    if:
      type: text
      substr: 'GEEK\.geekitemPreload'

composite_rules:
  - id: shopping-record-identity-field
    desc: Shopping record identity field
    crit: component
    conf: 0.9
    any:
      - id: shopping-record-winner-field
      - id: shopping-record-buyer-field
      - id: shopping-record-bidder-field

  - id: shopping-record-value-field
    desc: Shopping record value field
    crit: component
    conf: 0.9
    any:
      - id: shopping-record-price-field
      - id: shopping-record-final-price-field
      - id: shopping-record-item-field
      - id: shopping-record-listing-field

  - id: shopping-transaction-record-dom-extraction
    desc: Extracts shopping transaction records
    crit: notable
    conf: 0.94
    # Product parsers and filter controls reuse these field names throughout a
    # bundle.  A transaction record is the compact, co-located object rather
    # than unrelated fields spread across a large vendor bundle.
    near_bytes: 4096
    all:
      - id: shopping-record-identity-field
      - id: shopping-record-value-field
      - id: micro-behaviors/ui/window/manage/dom::dom-text-content-read

  - id: extension-boardgamegeek-metadata-collection
    desc: Extension collects BoardGameGeek metadata
    crit: notable
    conf: 0.96
    for: [javascript, typescript, crx]
    scope: archive
    all:
      - id: micro-behaviors/ui/window/manage/dom::extension-active-page-html-read
      - id: boardgamegeek-preload-marker

  - id: extension-active-swagger-schema-discovery
    desc: Extension collects active Swagger schema
    crit: suspicious
    conf: 0.96
    ref: sha256:14e6689d364517cfb12e021b84a1ef2e97550a387fcadde09fe40c706098410a
    for: [javascript, typescript, chrome-manifest, crx]
    scope: archive
    all:
      - id: micro-behaviors/process/inject/webextension::webextension-scripting-execute
      - id: metadata/permission/manifest::permission-scripting
      - id: metadata/permission/active-tab::permission-active-tab
      - id: swagger-ui-link-selector
      - id: active-page-hash-read

  # Scraping public listing fields (title, price, winning bidder) from an
  # e-commerce page and POSTing them to the extension's own backend is the
  # ordinary shape of price trackers, repricers, seller dashboards and stream
  # overlay tools — it is not exfiltration on its own, and the endpoint's
  # hosting provider says nothing about intent. Hostile requires the scraped
  # record to carry payment or account PII the page owner never volunteered.
  - id: shopping-account-payment-record-field
    desc: Shopping record carries payment or account PII field
    crit: notable
    conf: 0.9
    any:
      - id: shopping-record-payment-card-field
      - id: shopping-record-postal-address-field
      - id: shopping-record-account-contact-field

  - id: extension-shopping-payment-data-exfiltration
    desc: Extension sends scraped shopping payment/PII off-site
    crit: hostile
    conf: 0.95
    attack: T1041
    for: [javascript, chrome-manifest, xpi, crx]
    scope: archive
    all:
      - id: metadata/permission/host::content-script-shopping
      - id: shopping-account-payment-record-field
      - id: micro-behaviors/ui/window/manage/dom::dom-text-content-read
    any:
      - id: micro-behaviors/communications/http/request/client::http-post-json
      - id: micro-behaviors/communications/http/endpoints::fetch-explicit-external-url
