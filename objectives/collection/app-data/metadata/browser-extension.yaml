defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1119

traits:
  - id: swagger-ui-link-selector
    desc: Swagger UI schema link selector
    crit: notable
    conf: 0.94
    ref: sha256:14e6689d364517cfb12e021b84a1ef2e97550a387fcadde09fe40c706098410a
    if:
      type: text
      regex: 'document\.querySelector\s*\([^)]{0,220}swagger-ui'

  - id: active-page-hash-read
    desc: Browser location hash read
    crit: component
    conf: 0.9
    ref: sha256:14e6689d364517cfb12e021b84a1ef2e97550a387fcadde09fe40c706098410a
    unless:
      - id: well-known/app/google-web::official-google-web-asset
      - id: metadata/library/jquery/
    if:
      type: text
      substr: window.location.hash

composite_rules:
  - id: extension-active-swagger-schema-discovery
    desc: Extension collects active Swagger schema
    crit: suspicious
    conf: 0.96
    ref: sha256:14e6689d364517cfb12e021b84a1ef2e97550a387fcadde09fe40c706098410a
    for: [javascript, typescript, chrome-manifest, crx]
    scope: archive
    all:
      - id: micro-behaviors/process/inject/webextension::chrome-scripting-execute
      - id: metadata/permission/manifest::permission-scripting
      - id: metadata/permission/active-tab::permission-active-tab
      - id: swagger-ui-link-selector
      - id: active-page-hash-read
