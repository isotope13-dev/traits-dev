defaults:
  for:
    - macho
    - objc
    - swift
    - applescript
  platforms:
    - macos
  attack: T1083
  crit: notable
traits:
  - id: ds-store
    desc: .DS_Store metadata files
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: .DS_Store
  - id: localized-folder
    desc: .localized folder marker
    crit: notable
    conf: 0.5
    # Match the macOS `.localized` folder as a path component or standalone
    # filename only. A bare substring also hits Swift/ObjC i18n APIs
    # (`error.localizedDescription`, `"key".localized`) which are unrelated to
    # app-data folder enumeration.
    if:
      type: text
      regex: '/\.localized\b|["'']\.localized["'']'
  - id: applications-dir
    desc: /Applications directory reference
    crit: component
    conf: 0.7
    if:
      type: text
      substr: /Applications
  - id: downloads-dir
    desc: ~/Downloads directory reference
    crit: notable
    conf: 0.5
    # This is an app-data path signal for macOS source, not a build-path
    # signal. Mach-O binaries commonly retain the developer's source tree
    # (for example /Users/name/Downloads/... in GNU toolchain symbols).
    for: [objc, swift, applescript]
    if:
      type: text
      regex: (^|[/\\])Users[/\\].{1,64}[/\\]Downloads\b|~[/\\]Downloads\b
composite_rules:
  - id: user-directory-enum
    desc: Enumerates macOS user directories
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: applications-dir
      - id: micro-behaviors/fs/path/location::user-library-path
      - id: downloads-dir
      - id: micro-behaviors/fs/path/location::documents-folder-target
      - id: micro-behaviors/os/env/vars/user-info::home-var
  - id: metadata-collection
    desc: Filesystem traversal with macOS file filtering
    crit: suspicious
    conf: 0.85
    all:
      - id: ds-store
      - id: user-directory-enum
      - id: micro-behaviors/fs/directory/traverse/
    unless:
      - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
