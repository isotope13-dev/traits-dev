defaults:
  for: [scripts, binaries]
  attack: T1005
  platforms:
    - macos
  crit: suspicious
traits:
  - id: notestore-wal
    desc: Apple Notes write-ahead log
    conf: 0.85
    if:
      type: text
      substr: NoteStore.sqlite-wal
  - id: notestore-shm
    desc: Apple Notes shared memory file
    conf: 0.85
    if:
      type: text
      substr: NoteStore.sqlite-shm
  - id: notes-accounts
    desc: Apple Notes Accounts directory
    conf: 0.85
    if:
      type: text
      regex: group\.com\.apple\.notes/Accounts
  - id: notes-media
    desc: Apple Notes Media/attachments directory
    conf: 0.85
    if:
      type: text
      regex: group\.com\.apple\.notes.{0,50}Media
composite_rules:
  - id: notes-theft
    desc: Apple Notes data collection
    crit: suspicious
    conf: 0.9
    for:
      - shell
      - python
      - applescript
      - macho
    all:
      - id: micro-behaviors/fs/path/sensitive/apple::apple-notes-store
    any:
      - id: notestore-wal
      - id: notestore-shm
      - id: notes-accounts
      - id: notes-media
    downgrade:
      any:
        - id: metadata/signed/platform::apple
