defaults:
  for: [scripts, binaries]
  attack: T1005
  platforms:
    - macos
  crit: suspicious
traits:
  - id: notestore-db
    desc: Apple Notes SQLite database file
    conf: 0.9
    if:
      type: text
      substr: NoteStore.sqlite
  - id: notestore-wal
    desc: Apple Notes write-ahead log
    conf: 0.85
    if:
      type: text
      substr: NoteStore.sqlite-wal
  - id: notestore-shm
    desc: Apple Notes shared memory file
    conf: 0.85
    if:
      type: text
      substr: NoteStore.sqlite-shm
  - id: notes-container
    desc: Apple Notes group container path
    conf: 0.9
    if:
      type: text
      regex: group\.com\.apple\.notes/
  - id: notes-accounts
    desc: Apple Notes Accounts directory
    conf: 0.85
    if:
      type: text
      regex: group\.com\.apple\.notes/Accounts
  - id: notes-media
    desc: Apple Notes Media/attachments directory
    conf: 0.85
    if:
      type: text
      regex: group\.com\.apple\.notes.{0,50}Media
composite_rules:
  - id: notes-theft
    desc: Apple Notes data collection
    crit: suspicious
    conf: 0.9
    all:
      - id: notestore-db
    any:
      - id: notestore-wal
      - id: notestore-shm
      - id: notes-container
