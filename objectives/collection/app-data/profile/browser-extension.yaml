defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, chrome-manifest]
  crit: component
  conf: 0.86
  attack: T1119

traits:
  - id: linkedin-profile-content-script
    desc: LinkedIn profile content script
    for: [chrome-manifest]
    if:
      type: kv
      path: content_scripts.matches
      regex: linkedin\.com/in/

  - id: linkedin-page-url-field
    desc: LinkedIn profile URL field
    for: [javascript, typescript]
    if:
      type: text
      substr: linkedin_page_url

  - id: profile-full-name-field
    desc: Profile full name field
    for: [javascript, typescript]
    if:
      type: text
      substr: full_name

  - id: profile-headline-field
    desc: Profile headline field
    for: [javascript, typescript]
    if:
      type: text
      substr: headline

  - id: profile-company-field
    desc: Profile company field
    for: [javascript, typescript]
    if:
      type: text
      substr: companyName

  - id: linkedin-profile-card-selector
    desc: LinkedIn profile card selector
    for: [javascript, typescript]
    if:
      type: text
      substr: '[componentkey*="com.linkedin.sdui.profile.card"]'

  - id: linkedin-experience-section-selector
    desc: LinkedIn experience section selector
    for: [javascript, typescript]
    if:
      type: text
      substr: '[componentkey*="ExperienceTopLevelSection"]'

composite_rules:
  - id: linkedin-profile-data-fields
    desc: LinkedIn profile data fields
    crit: component
    conf: 0.88
    for: [javascript, typescript]
    needs: 3
    any:
      - id: linkedin-page-url-field
      - id: profile-full-name-field
      - id: profile-headline-field
      - id: profile-company-field

  - id: linkedin-profile-dom-collection
    desc: LinkedIn profile DOM collection
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    all:
      - id: linkedin-profile-data-fields
      - id: linkedin-profile-card-selector
      - id: linkedin-experience-section-selector

  - id: linkedin-profile-collection-extension
    desc: LinkedIn profile collection extension
    crit: notable
    conf: 0.92
    all:
      - id: linkedin-profile-content-script
      - id: linkedin-profile-data-fields
