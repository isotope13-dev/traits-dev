defaults:
  platforms: [macos]
  for: [scripts]
  attack: T1005
  mbc: B0028
traits:
  - id: stravy-staging-dir
    desc: stravy temp staging directory
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /tmp/stravy/
  - id: alego-zip-archive
    desc: alego staged zip archive
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /tmp/alego.zip
  - id: staging-browser-bucket
    desc: Browser staging bucket name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Brs/
  - id: staging-extension-bucket
    desc: Extension staging bucket name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Exts/
  - id: staging-wallet-bucket
    desc: Wallet staging bucket name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Wlt/
  - id: staging-keychain-bucket
    desc: Keychain staging bucket name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Kch/
  - id: staging-notes-bucket
    desc: Notes staging bucket name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Notes/
  - id: staging-files-bucket
    desc: Files staging bucket name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Files/
  - id: x-bid-header
    desc: Hex session header for exfil
    crit: suspicious
    conf: 0.95
    attack: T1041
    if:
      type: text
      regex: X-Bid:\s*[0-9a-f]{32}
  - id: multipart-zip-upload
    desc: Multipart upload of staged zip
    crit: suspicious
    conf: 0.95
    attack: T1041
    if:
      type: text
      regex: lil-arch=@/tmp/.{1,80}\.zip
  - id: health-check-path
    desc: HTTP health-check endpoint path
    crit: notable
    conf: 0.9
    attack: T1071.001
    if:
      type: text
      substr: /api/health
  - id: receive-endpoint
    desc: HTTP receive endpoint path
    crit: notable
    conf: 0.9
    attack: T1041
    if:
      type: text
      substr: /api/data/receive
  - id: protection-service-title
    desc: Fake macOS Protection Service title
    crit: suspicious
    conf: 0.95
    attack: T1056.002
    if:
      type: text
      substr: macOS Protection Service
  - id: device-password-authorize-prompt
    desc: Device password authorization lure
    crit: suspicious
    conf: 0.95
    attack: T1056.002
    if:
      type: text
      substr: Input device password to authorize your access
  - id: chrome-generic-password-query
    desc: Chrome generic password query
    crit: suspicious
    conf: 0.95
    attack: T1555.001
    if:
      type: text
      regex: find-generic-password.{0,40}"Chrome"
  - id: uuid-query-command
    desc: system profiler UUID query
    crit: notable
    conf: 0.9
    attack: T1082
    if:
      type: text
      regex: system_profiler\s+SPHardwareDataType.{0,80}UUID
  - id: full-system-profile
    desc: Full system profiler triad
    crit: notable
    conf: 0.9
    attack: T1082
    if:
      type: text
      regex: system_profiler\s+SPSoftwareDataType\s+SPHardwareDataType\s+SPDisplaysDataType
  - id: password-cache-file
    desc: Hidden cached password file
    crit: suspicious
    conf: 0.85
    attack: T1555
    if:
      type: text
      substr: /.pwd
  - id: username-cache-file
    desc: Hidden cached username file
    crit: notable
    conf: 0.8
    attack: T1074.001
    if:
      type: text
      substr: /.username
  - id: firefox-profiles-path
    desc: Firefox profiles path target
    crit: notable
    conf: 0.85
    attack: T1555.003
    if:
      type: text
      substr: Firefox/Profiles/
  - id: waterfox-profiles-path
    desc: Waterfox profiles path target
    crit: notable
    conf: 0.85
    attack: T1555.003
    if:
      type: text
      substr: Waterfox/Profiles/
  - id: chrome-profile-path
    desc: Chrome profile path target
    crit: notable
    conf: 0.85
    attack: T1555.003
    if:
      type: text
      substr: Google/Chrome/
  - id: brave-profile-path
    desc: Brave profile path target
    crit: notable
    conf: 0.85
    attack: T1555.003
    if:
      type: text
      substr: BraveSoftware/Brave-Browser/
  - id: edge-profile-path
    desc: Edge profile path target
    crit: notable
    conf: 0.85
    attack: T1555.003
    if:
      type: text
      substr: Microsoft Edge/
  - id: vivaldi-profile-path
    desc: Vivaldi profile path target
    crit: notable
    conf: 0.85
    attack: T1555.003
    if:
      type: text
      substr: Vivaldi/
  - id: arc-userdata-path
    desc: Arc user data path target
    crit: notable
    conf: 0.85
    attack: T1555.003
    if:
      type: text
      substr: Arc/User Data/
  - id: login-keychain-db-target
    desc: login keychain database target
    crit: suspicious
    conf: 0.9
    attack: T1555.001
    if:
      type: text
      substr: login.keychain-db
  - id: electrum-wallet-path
    desc: Electrum wallet path target
    crit: notable
    conf: 0.85
    attack: T1555.005
    if:
      type: text
      substr: .electrum/wallets/
  - id: coinomi-wallet-path
    desc: Coinomi wallet path target
    crit: notable
    conf: 0.85
    attack: T1555.005
    if:
      type: text
      substr: Coinomi/wallets/
  - id: exodus-wallet-path
    desc: Exodus wallet path target
    crit: notable
    conf: 0.85
    attack: T1555.005
    if:
      type: text
      substr: Exodus/
  - id: atomic-wallet-path
    desc: Atomic wallet path target
    crit: notable
    conf: 0.85
    attack: T1555.005
    if:
      type: text
      substr: atomic/Local Storage/
  - id: trezor-suite-path
    desc: Trezor Suite path target
    crit: notable
    conf: 0.85
    attack: T1555.005
    if:
      type: text
      substr: "@trezor/suite-desktop/"
  - id: filegrabber-function
    desc: AppleScript filegrabber handler
    crit: component
    conf: 0.9
    if:
      type: text
      substr: on filegrabber(
  - id: parseff-function
    desc: AppleScript parseFF handler
    crit: component
    conf: 0.9
    if:
      type: text
      substr: on parseFF(
  - id: chromium-function
    desc: AppleScript chromium handler
    crit: component
    conf: 0.9
    if:
      type: text
      substr: on chromium(
  - id: toast-function
    desc: AppleScript toast handler
    crit: component
    conf: 0.9
    if:
      type: text
      substr: on toast(
  - id: grabfolderlimit-var
    desc: AppleScript per-folder grab limit variable
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)\bGrabFolderLimit\b
  - id: desktop-folder-target
    desc: Targets Desktop folder
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)(/Desktop\b|["']Desktop["'])
  - id: documents-folder-target
    desc: Targets Documents folder
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)(/Documents\b|["']Documents["'])
  - id: downloads-folder-target
    desc: Targets Downloads folder
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)(/Downloads\b|["']Downloads["'])
  - id: mdls-filesize-query
    desc: Queries macOS file size metadata with mdls
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: mdls\s+-name\s+kMDItemFSSize
  - id: find-maxdepth-2
    desc: Limits recursive search depth to 2
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: find.{0,120}-maxdepth\s+2\b
  - id: find-size-under-5m
    desc: Filters collected files under 5 MB
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: find.{0,120}-size\s+-5M\b
  - id: head-20-limit
    desc: Caps collection results to 20 files
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bhead\s+-20\b
  - id: office-secret-extension-list
    desc: Mixed document and secret extension list
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (?si)(extensionsList|exts)\b.{0,300}["']pdf["'].{0,120}["']docx["'].{0,120}["']wallet["'].{0,120}["']kdbx["'].{0,200}(["']ovpn["']|["']rdp["']|["']xlsx["']|["']json["'])
  - id: curl-download-l-o
    desc: curl -L -o download command
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: curl\s+-L\s+-o
  - id: unzip-quiet-dir
    desc: unzip quietly into directory
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: unzip\s+-q.{0,40}-d
  - id: sudo-app-delete
    desc: sudo delete application bundle
    crit: suspicious
    conf: 0.95
    attack: T1554
    if:
      type: text
      regex: sudo\s+-S\s+rm\s+-rf.{0,60}/Applications/
  - id: sudo-app-copy
    desc: sudo copy application bundle
    crit: suspicious
    conf: 0.95
    attack: T1554
    if:
      type: text
      regex: sudo\s+-S\s+cp\s+-r
  - id: find-app-bundle
    desc: Search extracted app bundle
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: find.{0,80}-name '\*\.app'.{0,40}-type d
composite_rules:
  - id: staged-infostealer-layout
    desc: Multi-bucket temp staging layout
    crit: suspicious
    conf: 0.92
    all:
      - id: stravy-staging-dir
    needs: 4
    any:
      - id: staging-browser-bucket
      - id: staging-extension-bucket
      - id: staging-wallet-bucket
      - id: staging-keychain-bucket
      - id: staging-notes-bucket
      - id: staging-files-bucket
  - id: applescript-password-phish-validate
    desc: AppleScript password phishing with validation
    crit: suspicious
    conf: 0.95
    attack: T1056.002
    all:
      - id: objectives/credential-access/validation/check::dscl-authonly-comp
    any:
      - id: protection-service-title
      - id: device-password-authorize-prompt
      - id: objectives/credential-access/phishing/lure::hidden-answer
  - id: applescript-profile-and-exfil
    desc: AppleScript profiling and archive exfiltration
    crit: suspicious
    conf: 0.95
    attack: T1041
    all:
      - id: x-bid-header
      - id: objectives/collection/archive::ditto-staging
    needs: 2
    any:
      - id: multipart-zip-upload
      - id: receive-endpoint
      - id: health-check-path
      - id: full-system-profile
      - id: uuid-query-command
  - id: applescript-browser-wallet-collection
    desc: AppleScript browser wallet data theft
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    needs: 3
    any:
      - id: chromium-browser-targets
      - id: firefox-profiles-path
      - id: waterfox-profiles-path
      - id: objectives/credential-access/browser/safari::cookies-binarycookies
      - id: wallet-target-bundle
      - id: chrome-generic-password-query
      - id: objectives/collection/app-data/notes/app::notestore-db
      - id: login-keychain-db-target
  - id: helper-handler-bundle
    desc: AppleScript stealer helper handlers
    crit: suspicious
    conf: 0.9
    needs: 3
    any:
      - id: filegrabber-function
      - id: parseff-function
      - id: chromium-function
      - id: toast-function
  - id: chromium-browser-targets
    desc: Multiple Chromium browser targets
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    needs: 4
    any:
      - id: chrome-profile-path
      - id: brave-profile-path
      - id: edge-profile-path
      - id: vivaldi-profile-path
      - id: arc-userdata-path
  - id: common-user-folders
    desc: Multiple common user folders targeted
    crit: notable
    conf: 0.9
    needs: 3
    any:
      - id: desktop-folder-target
      - id: documents-folder-target
      - id: downloads-folder-target
  - id: size-aware-folder-grabber
    desc: Controlled folder grab with depth, size, or count limits
    crit: suspicious
    conf: 0.94
    all:
      - id: common-user-folders
    needs: 2
    any:
      - id: grabfolderlimit-var
      - id: mdls-filesize-query
      - id: find-maxdepth-2
      - id: find-size-under-5m
      - id: head-20-limit
  - id: wallet-target-bundle
    desc: Multiple desktop wallet targets
    crit: suspicious
    conf: 0.95
    attack: T1555.005
    needs: 4
    any:
      - id: electrum-wallet-path
      - id: coinomi-wallet-path
      - id: exodus-wallet-path
      - id: atomic-wallet-path
      - id: trezor-suite-path
  - id: applescript-targeted-document-grab
    desc: AppleScript targeted document grab with controlled limits
    crit: suspicious
    conf: 0.95
    all:
      - id: size-aware-folder-grabber
      - id: office-secret-extension-list
  - id: applescript-wallet-extension-store-targeting
    desc: AppleScript wallet extension store targeting
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/credential-access/wallet/extension::wallet-extension-store-targeting
    any:
      - id: chromium-browser-targets
      - id: wallet-target-bundle
  - id: applescript-infostealer-hostile
    desc: AppleScript infostealer with staged exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: staged-infostealer-layout
      - id: applescript-profile-and-exfil
      - id: applescript-browser-wallet-collection
      - id: helper-handler-bundle
    any:
      - id: applescript-password-phish-validate
      - id: objectives/credential-access/phishing/lure::password-phishing-comp
      - id: objectives/credential-access/phishing/lure::fake-system-prompt
  - id: applescript-controlled-archive-exfil
    desc: AppleScript controlled file grab with archive staging and exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: applescript-profile-and-exfil
    needs: 2
    any:
      - id: applescript-targeted-document-grab
      - id: applescript-wallet-extension-store-targeting
      - id: applescript-browser-wallet-collection
  - id: trojan-app-substitution
    desc: Downloaded app replacement via sudo
    crit: hostile
    conf: 0.96
    attack: T1554
    all:
      - id: toast-function
      - id: curl-download-l-o
      - id: unzip-quiet-dir
      - id: find-app-bundle
    any:
      - id: sudo-app-delete
      - id: sudo-app-copy
