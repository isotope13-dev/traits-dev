defaults:
  platforms: [unix, windows]
  for: [scripts]
  attack: T1005

traits:
  - id: ctf-flag-stealer-regex
    desc: Greps for CTF flags
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'HTB\\*\{[^}]{1,50}\}|flag\\*\{[^}]{1,50}\}'
    unless:
      - id: well-known/app/browser-extension::honey-popover-wallet-bundle
      - id: well-known/app/nvidia-nvcf::openbao-migration-script
      - id: well-known/tool/offensive/sic-security/
      - id: well-known/app/wordpress-plugins::known-wordpress-plugin
      - id: metadata/package/files/system-package::julia-runtime-path
      - id: metadata/package/files/dependency::os-image-root-file-path
      - type: path
        regex: 'Perl[\\/]Tidy'
      - type: path
        regex: 'nextcloud_mcp_server[\\/]observability[\\/]metrics\.py$'
  - id: ctf-flag-buffer-append
    desc: Appends a captured flag value
    crit: suspicious
    conf: 0.94
    if:
      type: text
      # Do not treat a generic safety_flags.append(...) list update as CTF
      # collection.  The value name is the useful CTF-specific evidence here.
      regex: '\b(self\.)?flags\.append\s*\(\s*(flag|flag_id|flag_ids)\b'
  - id: ctf-flag-submission-request
    desc: HTTP request submits buffered CTF flags
    crit: suspicious
    conf: 0.94
    for: [python]
    if:
      type: tree-sitter
      kind: call
      regex: '(?is)\bput\s*\(.{0,260}\b(flags|flag_ids)\b'

composite_rules:
  - id: ctf-flag-stealer-behavior
    desc: Automated stealing of CTF flags
    crit: hostile
    conf: 0.95
    all:
      - id: ctf-flag-stealer-regex
      - id: micro-behaviors/process/create/shell/bridge::js-execfilesync
  - id: ctf-flag-harvest-and-submit
    desc: Automates CTF flag collection and authenticated submission
    crit: hostile
    conf: 0.98
    attack: T1005,T1041
    all:
      - id: objectives/execution/exploit/network-service::ctf-flag-id-marker
      - id: objectives/execution/exploit/network-service::ctf-team-token-marker
      - id: ctf-flag-buffer-append
      - id: ctf-flag-submission-request
