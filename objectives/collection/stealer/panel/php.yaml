defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1005

traits:
  - id: php-stealer-config-flags
    desc: PHP stealer collection flags
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'IS_G_PWDS[\s\S]{0,160}IS_G_BROWSERS'

  - id: php-stealer-report-fields
    desc: PHP stealer report fields
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'username,\s*compname,\s*ip,\s*country,\s*os,\s*machine_id'

  - id: php-stealer-upload-gate
    desc: PHP stealer upload gate
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'move_uploaded_file[\s\S]{0,120}\./files/\$filename'

  - id: php-stealer-report-download
    desc: PHP stealer report download
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Content-Description: File Transfer[\s\S]{0,180}./files/\$file'

  - id: php-panel-cookie-md5-auth
    desc: PHP panel md5 cookie auth
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'setcookie\("pwd",\s*md5\(\$_POST'

composite_rules:
  - id: php-stealer-collection-panel
    desc: PHP credential stealer panel
    crit: hostile
    conf: 0.97
    all:
      - id: php-stealer-config-flags
      - id: php-stealer-report-fields
    any:
      - id: php-stealer-upload-gate
      - id: php-stealer-report-download
      - id: php-panel-cookie-md5-auth

  - id: php-stealer-upload-endpoint
    desc: PHP stealer upload endpoint
    crit: hostile
    conf: 0.97
    all:
      - id: php-stealer-upload-gate
      - id: php-stealer-report-fields
