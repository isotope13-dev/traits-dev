# Build provenance that names a messaging client while the PDB directory
# literally encodes theft intent (Chinese 窃取/密取/盗取). Paired with remote
# injection this is a messenger-branded stealer/injector carrier.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1005,T1036

traits:
  - id: pdb-cn-theft-path
    desc: PDB path contains Chinese theft-intent directory
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: pe.debug.pdb.path
      regex: '(窃取|密取|盗取|偷取)'

  - id: pdb-messenger-app-basename-common
    desc: PDB basename claims common messenger app
    crit: notable
    conf: 0.9
    if:
      type: value
      path: pe.debug.pdb.basename
      regex: '(?i)^(WhatsApp|Telegram|Discord)\.pdb$'
    unless:
      - id: well-known/app/telegram::telegram-desktop-signed-client-context

  - id: pdb-messenger-app-basename-other
    desc: PDB basename claims other messenger app
    crit: notable
    conf: 0.9
    if:
      type: value
      path: pe.debug.pdb.basename
      regex: '(?i)^(Signal|WeChat)\.pdb$'

composite_rules:
  - id: pdb-messenger-app-basename
    desc: PDB basename claims a messenger app
    crit: notable
    conf: 0.9
    any:
      - id: pdb-messenger-app-basename-common
      - id: pdb-messenger-app-basename-other

  - id: messenger-branded-theft-pdb
    desc: Messenger-branded PDB with theft-intent build path
    crit: hostile
    conf: 0.97
    all:
      - id: pdb-cn-theft-path
      - id: pdb-messenger-app-basename

  - id: messenger-theft-pdb-remote-injector
    desc: Messenger theft-PDB carrier with remote injection
    crit: hostile
    conf: 0.98
    attack: T1005,T1055,T1036
    all:
      - id: messenger-branded-theft-pdb
    any:
      - id: objectives/evasion/process/injection/memory::resource-backed-remote-thread-injector
      - id: objectives/evasion/process/injection/syscall::wow64-cross-arch-remote-injector
      - id: micro-behaviors/process/inject/dll::create-remote-thread
