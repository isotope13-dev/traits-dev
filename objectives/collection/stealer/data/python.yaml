# Python Infostealer and Staging Detection
# Aggregates micro-behaviors into high-level stealer narratives
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
composite_rules:
  - id: infostealer
    desc: "Python infostealer behavior"
    crit: suspicious
    conf: 0.95
    mbc: "OB0003"
    attack: "T1041"
    needs: 3
    all:
      - id: objectives/discovery/system/
      - id: micro-behaviors/communications/http/request/
    any:
      - id: micro-behaviors/fs/file/write/
      - id: objectives/credential-access/
      - id: objectives/collection/
  - id: dynamic-dropper
    desc: "Dynamic Python dropper behavior"
    crit: suspicious
    conf: 0.98
    mbc: "B0023"
    attack: "T1059"
    all:
      - id: objectives/anti-static/obfuscation/string/
      - id: objectives/supply-chain/
      - id: objectives/execution/
  - id: evasive-profiler
    desc: "Evasive Python system profiler"
    crit: suspicious
    conf: 0.95
    mbc: "E1082"
    attack: "T1082"
    all:
      - id: objectives/anti-static/obfuscation/aliasing
      - id: objectives/discovery/system/
      - id: micro-behaviors/communications/http/request/
  - id: data-staging
    desc: "Data staging for exfiltration"
    crit: suspicious
    conf: 0.98
    mbc: "B0030"
    attack: "T1074"
    near_lines: 100
    needs: 3
    all:
      - id: objectives/discovery/system/
    any:
      - id: micro-behaviors/fs/file/write/
      - id: objectives/collection/archive/
      - id: objectives/exfiltration/http/
