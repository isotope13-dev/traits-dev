# Python Infostealer and Staging Detection
# Aggregates micro-behaviors into high-level stealer narratives
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  - id: ai-gateway-preferred-adapter
    desc: Gateway preferred adapter env var
    crit: component
    conf: 0.9
    if:
      type: text
      substr: GATEWAY_PREFERRED_ADAPTER
composite_rules:
  - id: ai-gateway-env-marker
    desc: AI gateway environment setup marker
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/os/env/vars/access::anthropic-auth-token-variable
      - id: micro-behaviors/os/env/vars/access::anthropic-base-url-variable
      - id: ai-gateway-preferred-adapter
  - id: infostealer
    desc: "Python infostealer behavior"
    crit: suspicious
    conf: 0.95
    mbc: "OB0003"
    attack: "T1041"
    near_lines: 160
    needs: 3
    all:
      - id: objectives/discovery/system/
      - id: micro-behaviors/communications/http/request/
    any:
      - id: objectives/credential-access/browser/
      - id: objectives/credential-access/cloud/session/
      - id: objectives/credential-access/discord/
      - id: objectives/credential-access/files/config/
      - id: objectives/credential-access/keychain/
      - id: objectives/credential-access/ssh/key/
      - id: objectives/credential-access/wallet/
      - id: objectives/collection/stealer/browser/
      - id: objectives/collection/stealer/session/
      - id: objectives/collection/stealer/wallet/
      - id: objectives/exfiltration/stealer/
    unless:
      - id: well-known/tool/detection/proxy-sandbox
      - id: well-known/tool/detection/security-scanner/
      - id: well-known/tool/detection/security-scanner/
      - id: metadata/package/quality/false-positives::benign-app-fp-context
      - id: well-known/app/kubeflow-community::notebook-scripts

  - id: mcp-workspace-document-harvesting
    desc: MCP prompt directs harvesting of local documents
    crit: hostile
    conf: 0.99
    attack: T1005
    all:
      - id: objectives/evasion/security-bypass/llm/prompt::mcp-agent-instruction-poisoning
      - id: micro-behaviors/data/format/pdf::read-fitz
      - id: micro-behaviors/data/format/pdf::read-pypdf
  - id: stealer-data-source-marker
    desc: Python stealer data source marker
    crit: component
    conf: 0.85
    any:
      - id: objectives/credential-access/browser/
      - id: objectives/credential-access/cloud/session/
      - id: objectives/credential-access/discord/
      - id: objectives/credential-access/files/config/
      - id: objectives/credential-access/keychain/
      - id: objectives/credential-access/ssh/key/
      - id: objectives/credential-access/wallet/
      - id: objectives/collection/stealer/browser/
      - id: objectives/collection/stealer/session/
      - id: objectives/collection/stealer/wallet/
    unless:
      - id: objectives/exfiltration/stealer/credential/token/
  - id: dynamic-dropper
    desc: Stealer data source near staged payload
    crit: notable
    conf: 0.98
    mbc: "B0023"
    attack: "T1059"
    near_lines: 120
    all:
      - id: stealer-data-source-marker
    any:
      - id: objectives/command-and-control/dropper/staging/
      - id: objectives/supply-chain/hidden-payload/
    unless:
      - id: well-known/lib/pyaigis/
      - id: well-known/lib/glibc
      - id: well-known/tool/detection/proxy-sandbox
      - id: micro-behaviors/crypto/library/blockchain/
      - id: objectives/exfiltration/stealer/credential/token/
      - id: objectives/collection/stealer/data/
  - id: evasive-profiler
    desc: "Python system profiling with HTTP client"
    crit: notable
    conf: 0.95
    mbc: "E1082"
    attack: "T1082"
    all:
      - id: objectives/anti-static/obfuscation/aliasing
      - id: objectives/discovery/system/
      - id: micro-behaviors/communications/http/request/
    unless:
      # AI-agent observability tools profile the host/runtime for telemetry.
      - id: well-known/tool/detection/ai-guardrail/
      - id: well-known/app/aither-adk::aither-adk
  - id: data-staging
    desc: "Data staging for exfiltration"
    crit: suspicious
    conf: 0.98
    mbc: "B0030"
    attack: "T1074"
    near_lines: 100
    needs: 3
    all:
      - id: objectives/discovery/system/
    any:
      - id: micro-behaviors/fs/file/write/
      - id: objectives/collection/archive/
      - id: objectives/exfiltration/http/
    unless:
      - id: well-known/tool/detection/proxy-sandbox
