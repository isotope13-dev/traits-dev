# Stealer behavior - Browser and Wallet File Access
# Detects accessing sensitive browser credential and cryptocurrency wallet files
# MBC: OB0009 (Collection)
# ATT&CK: T1555.003 (Credentials from Web Browsers), T1005 (Data from Local System)
defaults:
  attack: T1555.003
  mbc: OB0009
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  # Helper: Any sensitive file path
  - id: sensitive-paths
    desc: Browser or wallet file paths
    crit: suspicious
    conf: 0.8
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    any:
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
      - id: objectives/credential-access/browser/chromium::chromium-cookie-sql
      - id: objectives/credential-access/browser/chromium::chromium-cookie-sql
      - id: objectives/credential-access/browser/safari::cookies-path
      - id: objectives/credential-access/wallet/desktop/
  - id: sensitive-file-access
    desc: Python stealer accessing sensitive browser or wallet files
    crit: suspicious
    conf: 0.95
    for: [python]
    # Stealth stealers are typically small
    size_max: 5000
    all:
      - id: objectives/command-and-control/remote-command/control::generic-dup
      - id: sensitive-paths
    unless:
      - id: micro-behaviors/fs/file/open::cookiejar-exclusion
