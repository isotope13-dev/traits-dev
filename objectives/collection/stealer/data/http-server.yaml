# HTTP Server-based Data Collection/Stealer
# Detects exfiltration data collection via HTTP endpoints
# MBC: OB0003 (Stealer)
# ATT&CK: T1041 (Exfiltration Over C2 Channel)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1041"
  mbc: "OB0003"
  for: [python]
traits:
  - id: jsonl-corpus-basename
    desc: JSONL corpus file basename
    crit: component
    conf: 0.9
    platforms: [unix, windows]
    if:
      type: path
      basename: true
      regex: (?i)\.jsonl$
  - id: llm-provider-router-env
    desc: LLM provider router env
    crit: component
    conf: 0.95
    platforms: [unix, windows]
    if:
      type: text
      regex: 'ROUTER_(LEADER|TEAMMATE)_URL'
composite_rules:
  # Data collection with HTTP server storage
  - id: data-collection-with-storage
    desc: Collects and stores exfiltrated data on HTTP server
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/server/request::http-post-endpoint
      - id: micro-behaviors/communications/http/server/request::file-write-storage
    any:
      - id: micro-behaviors/communications/http/server/request::extract-from-request-json
      - id: micro-behaviors/communications/http/server/request::extract-from-request-form
      - id: micro-behaviors/communications/http/server/request::extract-from-request-data
    near_lines: 80
    unless:
      - id: jsonl-corpus-basename
      - id: llm-provider-router-env
