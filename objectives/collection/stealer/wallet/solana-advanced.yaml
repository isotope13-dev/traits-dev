defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: desktop-path-token
    desc: Explicit Desktop path token in content
    conf: 0.85
    crit: component
    if:
      type: text
      regex: (?i)(users|home)[/\\\\][^/\\\\]{1,32}[/\\\\]desktop[/\\\\]
composite_rules:
  - id: solana-key-access
    desc: Solana wallet secret-material operation
    conf: 0.8
    crit: notable
    any:
      - id: micro-behaviors/crypto/library/blockchain/wallet::solana-keypair-from-secret-key
      - id: micro-behaviors/crypto/library/blockchain/wallet::bip39-mnemonic-validation
      - id: micro-behaviors/data/decode/base58::bs58-decode
  - id: desktop-dir-search
    desc: Searching Desktop directory specifically
    conf: 0.8
    crit: suspicious
    attack: T1005
    all:
      - id: desktop-path-token
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
  - id: desktop-crypto-stealer
    desc: Iterates Desktop looking for Solana/BIP39 secrets
    conf: 0.95
    crit: hostile
    attack: T1552.004
    all:
      - id: solana-key-access
      - id: desktop-dir-search
      - id: micro-behaviors/communications/http/post::post
