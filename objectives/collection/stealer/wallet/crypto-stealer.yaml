defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
  attack: T1552.001
traits:
- id: crypto-wallet-keyword-cluster--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    substr: metamask
  count_max: 1030638
- id: crypto-wallet-keyword-cluster--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    substr: phantom
  count_max: 1030639
- id: crypto-wallet-keyword-cluster--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    substr: mnemonic
  count_max: 1030640
- id: crypto-wallet-keyword-cluster--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    id: micro-behaviors/data/text/keywords/lexicon::keystore
  count_max: 1030642
- id: hardware-wallet-keyword-cluster--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: trezor
  count_max: 1030643
- id: hardware-wallet-keyword-cluster--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: ledger
  count_max: 1030644
- id: hardware-wallet-keyword-cluster--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: electrum
  count_max: 1030645
- id: hardware-wallet-keyword-cluster--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: exodus
  count_max: 1030646
- id: hardware-wallet-keyword-cluster--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: trustwallet
  count_max: 1030647
- id: json-filename-filter-expression
  desc: JSON filename filter expression
  crit: component
  conf: 0.84
  unless:
  - id: well-known/tool/sysadmin/k9s
  - id: well-known/lib/json-ts
  if:
    type: text
    regex: "\\.json['\"`][\\s\\S]{0,180}(includes|indexOf)"
- id: solana-config-path
  desc: Solana CLI config path
  if:
    type: text
    substr: /.config/solana/id.json
- id: solana-config-b64
  desc: Base64 encoded Solana config path
  crit: suspicious
  if:
    type: text
    substr: Ly5jb25maWcvc29sYW5hL2lkLmpzb24
composite_rules:
- id: crypto-document-filename-filter
  desc: Filters document filenames
  crit: component
  conf: 0.82
  near_bytes: 220
  all:
  - id: objectives/collection/file-targeting/filter::document-extension-literal
  - id: micro-behaviors/data/string/search::js-includes-indexof-call
- id: native-wallet-c2-binary
  desc: Native binary with wallet targeting and C2 timing
  crit: hostile
  conf: 0.94
  for: [elf, macho, pe]
  all:
  - id: crypto-wallet-keyword-cluster
  - id: objectives/anti-analysis/timing/evasion::delay-with-network
  any:
  - id: micro-behaviors/crypto/asymmetric/ecdh
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-string
  - id: micro-behaviors/communications/http/download/curl::libcurl-http
- id: crypto-wallet-file-stealer
  desc: Crypto wallet file stealer
  crit: hostile
  conf: 0.96
  unless:
  - id: well-known/lib/json-ts
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: micro-behaviors/data/text/security/threat-intel::signatures-db
  all:
  - id: crypto-json-filename-filter
  any:
  - id: crypto-wallet-keyword-cluster
  - id: hardware-wallet-keyword-cluster
- id: solana-stealer
  desc: Solana wallet stealer
  crit: hostile
  conf: 0.95
  all:
  - id: solana-config-b64
  any:
  - id: micro-behaviors/fs/write/file/direct::js-file-write
  - id: objectives/supply-chain/hidden-payload/extensions/vscode::file-copy-ops
  - id: objectives/anti-static/obfuscation/syntax::js-comma-sequence-obfuscation-v2
- id: crypto-wallet-keyword-cluster
  desc: Targets named crypto wallet artifacts
  crit: suspicious
  conf: 0.9
  unless:
  - id: well-known/tool/detection/proxy-sandbox
  - id: well-known/app/codeplane::runtime-context
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: micro-behaviors/data/text/security/threat-intel::signatures-db
  any:
  - id: crypto-wallet-keyword-cluster--rx-1
  - id: crypto-wallet-keyword-cluster--rx-2
  - id: crypto-wallet-keyword-cluster--rx-3
  - id: crypto-wallet-keyword-cluster--rx-5
- id: hardware-wallet-keyword-cluster
  desc: Targets hardware wallet backup files
  crit: suspicious
  conf: 0.88
  unless:
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: micro-behaviors/data/text/security/threat-intel::signatures-db
  any:
  - id: hardware-wallet-keyword-cluster--rx-6
  - id: hardware-wallet-keyword-cluster--rx-7
  - id: hardware-wallet-keyword-cluster--rx-8
  - id: hardware-wallet-keyword-cluster--rx-9
  - id: hardware-wallet-keyword-cluster--rx-10
- id: crypto-json-filename-filter
  desc: Filters JSON files by wallet keywords
  crit: suspicious
  conf: 0.88
  unless:
  - id: well-known/app/codeplane::runtime-context
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  all:
  - id: json-filename-filter-expression
  any:
  - id: crypto-wallet-keyword-cluster
  - id: hardware-wallet-keyword-cluster
