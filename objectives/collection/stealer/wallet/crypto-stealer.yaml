defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
  attack: T1552.001
traits:
- id: crypto-wallet-keyword-cluster--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    substr: metamask
  count_max: 1030638
- id: crypto-wallet-keyword-cluster--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    substr: phantom
  count_max: 1030639
- id: crypto-wallet-keyword-cluster--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    substr: mnemonic
  count_max: 1030640
- id: crypto-wallet-keyword-cluster--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    substr: private_key
  count_max: 1030641
- id: crypto-wallet-keyword-cluster--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    substr: keystore
  count_max: 1030642
- id: hardware-wallet-keyword-cluster--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 4
