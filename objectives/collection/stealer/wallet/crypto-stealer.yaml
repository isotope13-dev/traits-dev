defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
  attack: T1552.001
traits:
- id: crypto-wallet-keyword-cluster--rx-1
  desc: Repeated MetaMask wallet keyword
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    substr: metamask
  count_max: 1030638
- id: crypto-wallet-keyword-cluster--rx-2
  desc: Repeated Phantom wallet keyword
  crit: component
  conf: 0.9
  count_min: 4
  if:
    id: metadata/library/web3::phantom-wallet-word
  count_max: 1030639
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: crypto-wallet-keyword-cluster--rx-3
  desc: Repeated mnemonic wallet keyword
  crit: component
  conf: 0.9
  count_min: 4
  if:
    id: objectives/credential-access/wallet/keywords::mnemonic-word
  count_max: 1030640
- id: hardware-wallet-keyword-cluster--rx-6
  desc: Repeated Trezor wallet keyword
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: trezor
  count_max: 1030643
- id: hardware-wallet-keyword-cluster--rx-7
  desc: Repeated Ledger wallet identifiers
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    regex: '(?i)(Ledger Live|LedgerWallet|ledger\.com)'
  count_max: 1030644
- id: hardware-wallet-keyword-cluster--rx-8
  desc: Repeated Electrum wallet keyword
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: electrum
  count_max: 1030645
- id: hardware-wallet-keyword-cluster--rx-9
  desc: Repeated Exodus wallet keyword
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: exodus
  count_max: 1030646
- id: hardware-wallet-keyword-cluster--rx-10
  desc: Repeated Trust Wallet keyword
  crit: component
  conf: 0.88
  count_min: 4
  if:
    type: text
    substr: trustwallet
  count_max: 1030647
- id: hardware-wallet-target-surface
  desc: Wallet or keystore target term
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)\b(wallet|keystore)\b'
- id: hardware-wallet-file-read-call
  desc: Wallet-related file read or metadata API call
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(?i)\b(readFile|readdir|stat)\s*\([^)]{0,60}\b(wallet|keystore)\b'
- id: hardware-wallet-file-search-call
  desc: Wallet-related file search or traversal API call
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(?i)\b(glob|walk|find)\s*\([^)]{0,60}\b(wallet|keystore)\b'
- id: hardware-wallet-file-copy-call
  desc: Wallet-related file copy API call
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(?i)\bcopyFile(Sync)?\s*\([^)]{0,60}\b(wallet|keystore)\b'
- id: json-filename-filter-expression
  desc: JSON filename filter expression
  crit: component
  conf: 0.84
  unless:
  - id: well-known/tool/sysadmin/k9s
  - id: well-known/lib/json-ts
  if:
    type: text
    regex: "\\.json['\"`][\\s\\S]{0,180}(includes|indexOf)"
- id: solana-config-path
  desc: Solana CLI config path
  if:
    type: text
    substr: /.config/solana/id.json
- id: solana-config-b64
  desc: Base64 encoded Solana config path
  crit: suspicious
  if:
    type: text
    substr: Ly5jb25maWcvc29sYW5hL2lkLmpzb24
- id: shell-find-wallet-glob
  desc: Shell find targets wallet names
  crit: component
  conf: 0.92
  platforms: [unix]
  for: [shell, python, javascript, typescript, ruby, go, applescript]
  if:
    type: text
    regex: '\bfind\b[^\n]{0,180}-iname\s+["'']\*wallet\*["'']'
- id: shell-find-keystore-glob
  desc: Shell find targets keystores
  crit: component
  conf: 0.9
  platforms: [unix]
  for: [shell, python, javascript, typescript, ruby, go, applescript]
  if:
    type: text
    regex: '-iname\s+["'']\*keystore\*["'']'
- id: shell-find-id-json-name
  desc: Shell find targets id.json
  crit: component
  conf: 0.86
  platforms: [unix]
  for: [shell, python, javascript, typescript, ruby, go, applescript]
  if:
    type: text
    regex: '-iname\s+["'']id\.json["'']'
- id: macho-shell-find-iname-filter
  desc: Mach-O shell find name filter
  crit: component
  conf: 0.9
  platforms: [macos]
  for: [macho]
  if:
    type: text
    substr: -iname
- id: macho-shell-find-maxdepth
  desc: Mach-O shell find depth limiter
  crit: component
  conf: 0.88
  platforms: [macos]
  for: [macho]
  if:
    type: text
    substr: -maxdepth
- id: applescript-find-command
  desc: AppleScript shell find command
  crit: component
  conf: 0.9
  platforms: [unix]
  for: [applescript]
  if:
    type: text
    word: find
- id: applescript-find-wallet-glob
  desc: AppleScript shell find targets wallets
  crit: component
  conf: 0.9
  platforms: [unix]
  for: [applescript]
  if:
    type: text
    regex: '\*wallet\*'
- id: applescript-find-keystore-glob
  desc: AppleScript shell find targets keystores
  crit: component
  conf: 0.88
  platforms: [unix]
  for: [applescript]
  if:
    type: text
    regex: '\*keystore\*'
- id: powershell-recursive-file-search
  desc: PowerShell recursively enumerates files
  crit: component
  conf: 0.9
  for: [powershell]
  if:
    type: text
    regex: 'Get-ChildItem[\s\S]{0,120}-Recurse'
- id: powershell-wallet-glob
  desc: PowerShell targets wallet names
  crit: component
  conf: 0.9
  for: [powershell]
  if:
    type: literal
    regex: '\*wallet\*'
- id: powershell-keystore-glob
  desc: PowerShell targets keystores
  crit: component
  conf: 0.88
  for: [powershell]
  if:
    type: literal
    regex: '\*keystore\*'
composite_rules:
- id: hardware-wallet-file-access
  desc: Reads or searches local files
  crit: component
  conf: 0.9
  any:
  - id: hardware-wallet-file-read-call
  - id: hardware-wallet-file-search-call
  - id: hardware-wallet-file-copy-call

- id: crypto-document-filename-filter
  desc: Filters document filenames
  crit: component
  conf: 0.82
  near_bytes: 220
  all:
  - id: objectives/collection/file-targeting/filter::document-extension-literal
  - id: micro-behaviors/data/string/search::js-includes-indexof-call
- id: native-wallet-c2-binary
  desc: Native binary with wallet targeting and C2 timing
  crit: hostile
  conf: 0.94
  for: [elf, macho, pe]
  all:
  - id: crypto-wallet-keyword-cluster
  - id: objectives/anti-analysis/timing/evasion::delay-with-network
  any:
  - id: micro-behaviors/crypto/asymmetric/ecdh
  - id: objectives/command-and-control/infrastructure/keywords::heartbeat-word
  - id: micro-behaviors/communications/http/download/curl::libcurl-http
- id: crypto-wallet-file-stealer
  desc: Crypto wallet file stealer
  crit: hostile
  conf: 0.96
  unless:
  - id: well-known/lib/json-ts
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/tool/detection/threat-intel/
  - id: well-known/app/browser-extension/
  - id: metadata/library/ai::cline-extension-api-host
  all:
  - id: crypto-json-filename-filter
- id: solana-stealer
  desc: Solana wallet stealer
  crit: hostile
  conf: 0.95
  all:
  - id: solana-config-b64
  any:
  - id: micro-behaviors/fs/write/file/direct::js-file-write
  - id: micro-behaviors/fs/file/copy::fs-copy
  - id: metadata/lang/javascript-features::js-comma-sequence-count-5
- id: crypto-wallet-keyword-cluster
  desc: Targets named crypto wallet artifacts
  crit: suspicious
  conf: 0.9
  unless:
  - id: well-known/tool/detection/proxy-sandbox
  - id: well-known/app/codeplane/
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/tool/detection/threat-intel/
  - id: micro-behaviors/crypto/library/blockchain/
  - id: metadata/library/structure/
  - id: well-known/tool/reverse-engineering/radare2/
  - id: metadata/library/ai::cline-extension-api-host
  any:
  - id: crypto-wallet-keyword-cluster--rx-1
  - id: crypto-wallet-keyword-cluster--rx-2
  - id: crypto-wallet-keyword-cluster--rx-3
- id: hardware-wallet-keyword-cluster
  desc: Targets hardware wallet backup files
  crit: suspicious
  conf: 0.88
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/tool/detection/threat-intel/
  - id: micro-behaviors/crypto/library/blockchain/
  - id: metadata/library/ai::cline-extension-api-host
  near_bytes: 160
  all:
  - id: hardware-wallet-target-surface
  - id: hardware-wallet-file-access
  any:
  - id: hardware-wallet-keyword-cluster--rx-6
  - id: hardware-wallet-keyword-cluster--rx-7
  - id: hardware-wallet-keyword-cluster--rx-8
  - id: hardware-wallet-keyword-cluster--rx-9
  - id: hardware-wallet-keyword-cluster--rx-10

- id: crypto-json-filename-filter
  desc: Filters JSON files by wallet keywords
  crit: suspicious
  conf: 0.88
  unless:
  - id: well-known/app/codeplane/
  - id: well-known/tool/detection/security-scanner/
  - id: metadata/library/ai::cline-extension-api-host
  all:
  - id: json-filename-filter-expression
  any:
  - id: crypto-wallet-keyword-cluster
  - id: hardware-wallet-keyword-cluster
- id: applescript-find-wallet-target
  desc: AppleScript find targets wallet names
  crit: component
  platforms: [unix]
  for: [applescript]
  near_bytes: 512
  all:
  - id: applescript-find-command
  - id: applescript-find-wallet-glob
- id: applescript-find-keystore-target
  desc: AppleScript find targets keystores
  crit: component
  platforms: [unix]
  for: [applescript]
  near_bytes: 512
  all:
  - id: applescript-find-command
  - id: applescript-find-keystore-glob
- id: applescript-find-id-json-target
  desc: AppleScript find targets id.json
  crit: component
  platforms: [unix]
  for: [applescript]
  near_bytes: 512
  all:
  - id: applescript-find-command
  - id: micro-behaviors/fs/path/application/config::id-json-filename-text
- id: shell-find-wallet-target
  desc: Shell find targets wallet names
  crit: component
  platforms: [unix]
  for: [shell, python, javascript, typescript, ruby, go, applescript]
  any:
  - id: shell-find-wallet-glob
  - id: applescript-find-wallet-target
- id: shell-find-keystore-target
  desc: Shell find targets keystores
  crit: component
  platforms: [unix]
  for: [shell, python, javascript, typescript, ruby, go, applescript]
  any:
  - id: shell-find-keystore-glob
  - id: applescript-find-keystore-target
- id: shell-find-id-json-target
  desc: Shell find targets id.json
  crit: component
  platforms: [unix]
  for: [shell, python, javascript, typescript, ruby, go, applescript]
  any:
  - id: shell-find-id-json-name
  - id: applescript-find-id-json-target
- id: crypto-wallet-shell-find
  desc: Shell searches for wallet files
  crit: suspicious
  conf: 0.94
  platforms: [unix]
  for: [shell, python, javascript, typescript, ruby, go, applescript]
  near_bytes: 512
  all:
  - id: shell-find-wallet-target
  any:
  - id: shell-find-keystore-target
  - id: shell-find-id-json-target
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/tool/detection/threat-intel/
- id: crypto-wallet-powershell-search
  desc: PowerShell searches for wallet files
  crit: suspicious
  conf: 0.94
  for: [powershell]
  near_bytes: 512
  all:
  - id: powershell-recursive-file-search
  - id: powershell-wallet-glob
  any:
  - id: powershell-keystore-glob
  - id: micro-behaviors/fs/path/application/config::id-json-filename-literal
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/tool/detection/threat-intel/
- id: crypto-wallet-macho-shell-find
  desc: Mach-O shell command searches for wallet files
  crit: suspicious
  conf: 0.94
  platforms: [macos]
  for: [macho]
  near_bytes: 512
  all:
  - id: macho-shell-find-maxdepth
  - id: macho-shell-find-iname-filter
  - id: micro-behaviors/fs/path/application/config::id-json-filename-text
  - id: micro-behaviors/os/console/io::stderr-to-dev-null
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/tool/detection/threat-intel/
