defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1119
  mbc: E1119

traits:
- id: sentry-default-pii-enabled
  desc: Sentry default PII enabled
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\bsendDefaultPii\s*:\s*true'

- id: sentry-set-user-call
  desc: Sentry setUser call
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\bSentry\.setUser\s*\('

- id: sentry-ip-address-user-field
  desc: Sentry IP address user field
  crit: component
  conf: 0.88
  if:
    type: text
    word: ip_address

composite_rules:
- id: sentry-hardcoded-ip-pii-telemetry
  desc: Hardcoded Sentry collects public IP
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/collection/monitor/telemetry::sentry-ingest-dsn
  - id: sentry-default-pii-enabled
  - id: sentry-set-user-call
  - id: sentry-ip-address-user-field
  - id: micro-behaviors/communications/http/endpoints::cloudflare-trace-ip-endpoint
