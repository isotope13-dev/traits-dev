# Browser-extension telemetry becomes hostile when it persistently identifies
# a user and uploads both public and local network context, rather than merely
# reading one browser fingerprint component for local compatibility.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, crx, xpi, zip, archives]
  attack: T1119,T1041

traits:
  - id: browser-identity-network-telemetry-fields
    desc: Browser ID and network profile fields
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)(BrowserID|browserid)'

  - id: local-network-telemetry-field
    desc: Local or public IP telemetry field
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)(IPLocal|IPPublic|localIP|publicIP)'

  - id: country-telemetry-field
    desc: Country telemetry field
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)\bcountry(Code)?\s*:'

  - id: geo-telemetry-field
    desc: Geolocation telemetry field
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)\b(geo|geolocation)\s*:'

  - id: region-telemetry-field
    desc: Region telemetry field
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)\bregion\s*:'

  - id: os-telemetry-field
    desc: Operating-system telemetry field
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)\bos\s*:'

  - id: platform-telemetry-field
    desc: Platform telemetry field
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)\bplatform\s*:'

  - id: extension-os-profile-fields
    desc: Extension collects operating-system fields
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bOS_(name|bitcount|version)\s*:'

  - id: extension-runtime-identity-fields
    desc: Extension collects runtime identity fields
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b(extension_ID|EXT_UID)\s*:'

composite_rules:
  - id: geo-system-telemetry-field
    desc: Geo or system telemetry field
    crit: component
    conf: 0.95
    any:
      - id: country-telemetry-field
      - id: geo-telemetry-field
      - id: region-telemetry-field
      - id: os-telemetry-field
      - id: platform-telemetry-field

  - id: browser-identity-network-profile-exfiltration
    desc: Extension uploads browser and network identity data
    crit: hostile
    conf: 0.99
    attack: T1119,T1041,T1016
    scope: archive
    for: [crx, xpi, zip, archives]
    all:
      - id: browser-identity-network-telemetry-fields
      - id: local-network-telemetry-field
      - id: geo-system-telemetry-field
      - id: micro-behaviors/communications/http/request/client::jquery-ajax-call
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-set
      - id: objectives/discovery/host/geo::victim-profiling
      - id: objectives/discovery/system/fingerprint/network::webrtc-local-ip-discovery
