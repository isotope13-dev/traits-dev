# Browser-extension telemetry becomes hostile when it persistently identifies
# a user and uploads both public and local network context, rather than merely
# reading one browser fingerprint component for local compatibility.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, crx, xpi, zip, archives]
  attack: T1119,T1041

traits:
  - id: browser-identity-network-telemetry-fields
    desc: Browser ID and network profile fields
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)(BrowserID|browserid)'

  - id: local-network-telemetry-field
    desc: Local or public IP telemetry field
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)(IPLocal|IPPublic|localIP|publicIP)'

  - id: geo-system-telemetry-field
    desc: Geo or system telemetry field
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)(country|Geo|OS)'

composite_rules:
  - id: browser-identity-network-profile-exfiltration
    desc: Extension uploads browser and network identity data
    crit: hostile
    conf: 0.99
    attack: T1119,T1041,T1016
    scope: archive
    for: [crx, xpi, zip, archives]
    all:
      - id: browser-identity-network-telemetry-fields
      - id: local-network-telemetry-field
      - id: geo-system-telemetry-field
      - id: micro-behaviors/communications/http/request/client::jquery-ajax-call
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-set
      - id: objectives/discovery/host/geo::victim-profiling
      - id: objectives/discovery/system/fingerprint/network::webrtc-local-ip-discovery
