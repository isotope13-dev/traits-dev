defaults:
  platforms: [unix, windows, macos]
  for: [elf, macho, pe, go]
traits:
  - id: go-sqlite3-dup
    desc: go-sqlite3 library import
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: go-sqlite3
composite_rules:
  - id: browser-strings
    desc: Browser name strings
    any:
      - id: micro-behaviors/process/enumerate/apps::browser-apps-chrome-firefox
      - id: micro-behaviors/process/enumerate/apps::browser-apps-firefox
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
      - id: objectives/credential-access/browser/chromium::cookies-dup
    crit: notable
  - id: aws-env-vars
    desc: AWS environment variable names
    any:
      - id: objectives/credential-access/environment/secret-access::aws-access-key-dup
      - id: objectives/credential-access/environment/secret-access::aws-secret
    crit: notable
  - id: browser-cred-harvest
    desc: Browser credential database harvesting
    crit: suspicious
    conf: 0.85
    attack: T1555.003
    all:
      - id: browser-strings
        needs: 2
      - id: objectives/collection/stealer/browser::go-sqlite3-dup
  - id: aws-cred-harvest
    desc: AWS credential environment variable harvesting
    crit: suspicious
    conf: 0.85
    attack: T1552.001
    all:
      - id: micro-behaviors/os/env/access::os-getenv
      - id: aws-env-vars
  - id: credential-harvest
    desc: Credential harvesting patterns
    crit: suspicious
    conf: 0.85
    any:
      - id: browser-cred-harvest
      - id: aws-cred-harvest
    downgrade:
      any:
        - id: metadata/quality::versioned
  - id: python-obfuscated-browser-stealer
    desc: Obfuscated Python browser stealer
    crit: hostile
    conf: 0.96
    attack: T1555.003
    mbc: E1005 - python
    all:
      - id: objectives/anti-static/obfuscation/logic::python-chr-arithmetic-loader
      - id: objectives/credential-access/browser/multi-target::python-browser-stealer-imports
    any:
      - id: micro-behaviors/communications/http/websocket::websocket
      - id: metadata/import/python::zipfile
      - id: metadata/import/python::cryptography/hazmat/primitives/ciphers
