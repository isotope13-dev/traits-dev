defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: windows-browser-terminate-api
    desc: Browser process termination API
    crit: component
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    if:
      id: micro-behaviors/process/terminate/kill::terminate-process
  - id: windows-browser-terminate-source
    desc: Browser termination source API
    crit: component
    conf: 0.9
    for: [source]
    platforms: [windows]
    if:
      id: micro-behaviors/process/terminate/kill::terminate-process-source
  - id: browser-process-chrome
    desc: References chrome.exe process name
    crit: component
    conf: 0.82
    for: [pe, dll, c, cpp]
    platforms: [windows]
    if:
      type: text
      word: chrome.exe
  - id: browser-process-edge
    desc: References msedge.exe process name
    crit: component
    conf: 0.82
    for: [pe, dll, c, cpp]
    platforms: [windows]
    if:
      type: text
      word: msedge.exe
  - id: browser-process-brave
    desc: Brave browser process name
    crit: component
    conf: 0.82
    for: [pe, dll, c, cpp]
    platforms: [windows]
    if:
      type: text
      word: brave.exe
  - id: browser-process-opera
    desc: References opera.exe process name
    crit: component
    conf: 0.82
    for: [pe, dll, c, cpp]
    platforms: [windows]
    if:
      type: text
      word: opera.exe
  - id: native-browser-handle-copy-start-log
    desc: Native browser handle-copy start log
    crit: suspicious
    conf: 0.97
    attack: T1555.003
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      regex: '(?i)Attempting\s+To\s+Steal\s+Opened\s+File\s+Handles'
  - id: native-browser-handle-copy-result-log
    desc: Native browser handle-copy result log
    crit: suspicious
    conf: 0.97
    attack: T1555.003
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      regex: '(?i)Successfully\s+Copied\s+File\s+Via\s+Duplicated\s+Handle'
  - id: native-browser-target-handle-log
    desc: Native browser target-handle log
    crit: suspicious
    conf: 0.97
    attack: T1555.003
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      regex: '(?i)Found\s+Target\s+File\s+Handle\s+In\s+Process'
  - id: python-browser-robocopy-loot
    desc: Python robocopy browser loot staging
    crit: suspicious
    conf: 0.95
    for: [python]
    platforms: [windows]
    if:
      type: text
      regex: robocopy.{0,80}(Cookies|Login Data|Local State).{0,60}/R:1

  - id: native-browser-loot-browser-field
    desc: Browser loot report browser field
    crit: component
    conf: 0.96
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      substr: '"browser":"'
  - id: native-browser-loot-cookie-field
    desc: Browser loot report cookie field
    crit: component
    conf: 0.96
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      substr: '"cookies":['
  - id: native-browser-loot-password-field
    desc: Browser loot report password field
    crit: component
    conf: 0.96
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      substr: '"passwords":['
  - id: native-browser-loot-steam-file
    desc: Steam loot output filename
    crit: component
    conf: 0.96
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      exact: steam.txt

  - id: managed-browser-stealer-scan-label
    desc: Managed browser and wallet scan labels
    crit: notable
    conf: 0.97
    attack: T1555.003,T1552.001
    for: [data, oledoc, pe, dll]
    platforms: [windows]
    if:
      type: text
      regex: '(?i)(ScanBrowsers|ScanWallets)'

  - id: managed-browser-cookie-label
    desc: Managed browser cookie collection labels
    crit: component
    conf: 0.97
    attack: T1555.003
    for: [data, oledoc, pe, dll]
    platforms: [windows]
    if:
      type: text
      regex: '(?i)(get_Cookies|ScannedCookie)'

  - id: managed-browser-credential-label
    desc: Managed browser credential collection labels
    crit: component
    conf: 0.97
    attack: T1555.003
    for: [data, oledoc, pe, dll]
    platforms: [windows]
    if:
      type: text
      regex: '(?i)(get_Password|Logins|Autofills)'

composite_rules:
  - id: managed-stealer-browser-target-cluster
    desc: Managed browser stealer target cluster
    crit: hostile
    conf: 0.99
    attack: T1555.003,T1552.001
    for: [data, oledoc, pe, dll]
    platforms: [windows]
    all:
      - id: managed-browser-stealer-scan-label
      - id: managed-browser-cookie-label
      - id: managed-browser-credential-label

  - id: native-browser-handle-copy-log
    desc: Native browser file-handle copy
    crit: suspicious
    conf: 0.98
    attack: T1555.003
    for: [pe, dll]
    platforms: [windows]
    any:
      - id: native-browser-handle-copy-start-log
      - id: native-browser-handle-copy-result-log
      - id: native-browser-target-handle-log
  - id: native-browser-key-material-theft
    desc: Native browser key-material theft
    crit: hostile
    conf: 0.99
    attack: T1555.003
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: objectives/credential-access/browser/chromium::native-browser-key-extraction
      - id: objectives/credential-access/browser/chromium::native-browser-process-discovery-log
  - id: native-browser-file-handle-theft
    desc: Native browser file-handle theft
    crit: hostile
    conf: 0.99
    attack: T1555.003
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: native-browser-handle-copy-log
      - id: objectives/credential-access/browser/chromium::native-browser-process-discovery-log
  - id: native-browser-loot-report-schema
    desc: Browser loot report schema
    crit: suspicious
    conf: 0.97
    attack: T1555.003,T1119
    for: [pe, dll]
    platforms: [windows]
    needs: 3
    any:
      - id: native-browser-loot-browser-field
      - id: native-browser-loot-cookie-field
      - id: native-browser-loot-password-field
      - id: native-browser-loot-steam-file
  - id: native-browser-password-loot-decryptor
    desc: Browser password loot with AES decryption
    crit: hostile
    conf: 0.99
    attack: T1555.003
    mbc: B0028
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: native-browser-loot-report-schema
      - id: objectives/credential-access/browser/chromium::login-data-string
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-aes-gcm-decrypt
  - id: native-browser-web-data-loot-decryptor
    desc: Chromium Web Data loot with AES decryption
    crit: hostile
    conf: 0.99
    attack: T1555.003
    mbc: B0028
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: native-browser-loot-report-schema
      - id: micro-behaviors/fs/path/sensitive/browser::chromium-web-data-file
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-aes-gcm-decrypt
  - id: python-auth-cookie-request-replay
    desc: Python replays embedded browser cookies in HTTP requests
    crit: hostile
    conf: 0.99
    for: [python]
    attack: T1539
    scope: archive
    all:
      - id: objectives/credential-access/browser/session-hijack::python-hardcoded-browser-auth-cookies
      - id: micro-behaviors/communications/http/cookies::python-cookiejar-request-assignment

  - id: browser-strings
    desc: Browser name strings
    crit: baseline
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
    any:
      - id: micro-behaviors/process/enumerate/apps::chrome-process-name
      - id: micro-behaviors/process/enumerate/apps::browser-apps-firefox
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
      - id: objectives/credential-access/browser/chromium::chromium-cookie-sql
  - id: aws-env-vars
    desc: AWS environment variable names
    any:
      - id: objectives/credential-access/env/secrets/cloud-access::aws-access-key-dup
      - id: objectives/credential-access/env/secrets/cloud-access::aws-secret
    crit: component
  - id: browser-cred-harvest
    desc: Browser credential database harvesting
    crit: suspicious
    conf: 0.85
    attack: T1555.003
    unless:
      - id: well-known/app/alist::release-path
    all:
      - id: browser-strings
      - id: micro-behaviors/data/db/sqlite::go-sqlite3-driver-import
  - id: aws-cred-harvest
    desc: AWS credential environment variable harvesting
    crit: suspicious
    conf: 0.85
    attack: T1552.001
    all:
      - id: micro-behaviors/os/env/access::os-getenv
      - id: aws-env-vars
  - id: credential-harvest
    desc: Credential harvesting patterns
    crit: suspicious
    conf: 0.85
    any:
      - id: browser-cred-harvest
      - id: aws-cred-harvest
    downgrade:
      any:
        - id: metadata/package/quality/profile/
  - id: python-obfuscated-browser-stealer
    desc: Obfuscated Python browser stealer
    crit: suspicious
    conf: 0.96
    attack: T1555.003
    mbc: E1005 - python
    all:
      - id: objectives/anti-static/obfuscation/control-flow/logic::python-chr-arithmetic-loader
      - id: objectives/credential-access/browser/multi-target::python-browser-stealer-imports
    any:
      - id: micro-behaviors/communications/http/websocket::websocket
      - id: metadata/import/python::zipfile
      - id: metadata/import/python::cryptography/hazmat/primitives/ciphers
  - id: python-windows-chromium-loot-staging
    desc: Python Chromium loot staging on Windows
    crit: suspicious
    conf: 0.96
    attack: T1555.003
    for: [python]
    platforms: [windows]
    all:
      - id: micro-behaviors/process/terminate/command::taskkill-browser-image
      - id: objectives/credential-access/browser/chromium::brave-path
      - id: objectives/credential-access/browser/chromium::chrome-path
      - id: objectives/credential-access/browser/chromium::edge-path
      - id: objectives/credential-access/browser/chromium::opera-path
      - id: objectives/credential-access/browser/chromium::local-state
  - id: python-discord-browser-stealer
    desc: Python Discord browser stealer
    crit: hostile
    conf: 0.98
    attack: T1567
    mbc: E1005
    for: [python]
    platforms: [windows]
    all:
      - id: python-windows-chromium-loot-staging
      - id: micro-behaviors/communications/http/webhook::discord-webhook-path
      - id: micro-behaviors/communications/http/lib/requests::requests-post
    any:
      - id: objectives/collection/archive/upload::zip-upload-comp
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
  - id: browser-termination-api
    desc: Browser process termination API
    crit: component
    conf: 0.92
    for: [pe, dll, source]
    platforms: [windows]
    any:
      - id: windows-browser-terminate-api
      - id: windows-browser-terminate-source
  - id: browser-process-name-cluster
    desc: Multiple browser process names
    crit: component
    conf: 0.88
    for: [pe, dll, source]
    platforms: [windows]
    near_bytes: 512
    needs: 2
    any:
      - id: browser-process-chrome
      - id: micro-behaviors/process/enumerate/apps::browser-apps-firefox-exe
      - id: browser-process-edge
      - id: browser-process-brave
      - id: browser-process-opera
  - id: browser-db-unlock-termination-source
    desc: Browser database unlock termination
    crit: suspicious
    conf: 0.94
    attack: T1555.003
    for: [source]
    platforms: [windows]
    all:
      - id: windows-browser-terminate-source
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-source
      - id: browser-process-name-cluster
    any:
      - id: objectives/credential-access/browser/chromium::logins-table
      - id: objectives/credential-access/browser/chromium::cookie-sql
      - id: objectives/credential-access/browser/firefox::moz-logins-sql
      - id: objectives/credential-access/browser/firefox::key4-db
      - id: objectives/collection/activity/browser::firefox-history-harvest
  - id: browser-db-unlock-termination-pe
    desc: Browser database unlock termination
    crit: suspicious
    conf: 0.94
    attack: T1555.003
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: windows-browser-terminate-api
      - id: micro-behaviors/process/enumerate/snapshot/
      - id: browser-process-name-cluster
    any:
      - id: objectives/credential-access/browser/chromium::logins-table
      - id: objectives/credential-access/browser/chromium::cookie-sql
      - id: objectives/credential-access/browser/firefox::moz-logins-sql
      - id: objectives/credential-access/browser/firefox::key4-db
      - id: objectives/collection/activity/browser::firefox-history-harvest
  - id: browser-db-unlock-termination
    desc: Browser database unlock termination
    crit: suspicious
    conf: 0.95
    for: [pe, dll, source]
    platforms: [windows]
    any:
      - id: browser-db-unlock-termination-source
      - id: browser-db-unlock-termination-pe
  - id: browser-stealer-process-kill-chain
    desc: Browser credential theft process killing
    crit: hostile
    conf: 0.97
    attack: T1555.003
    for: [pe, dll, source]
    platforms: [windows]
    all:
      - id: browser-db-unlock-termination
    any:
      - id: objectives/credential-access/browser/dpapi::dpapi-usage
      - id: objectives/credential-access/browser/chromium::master-decrypt
      - id: objectives/credential-access/browser/chromium::multi-browser
      - id: micro-behaviors/communications/messaging/send::telegram-bot-api-file-upload

  - id: native-browser-collection-stealer
    desc: Native browser/app stealer with API hiding
    crit: hostile
    conf: 0.99
    attack: T1555.003,T1119,T1027.007
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: native-browser-loot-report-schema
      - id: objectives/credential-access/browser/chromium::chromium-app-bound-key-name-wide
      - id: objectives/anti-static/obfuscation/imports::fnv1a-api-resolution
  - id: native-browser-stealer-with-steam-target
    desc: Native browser stealer with Steam target marker
    crit: hostile
    conf: 0.98
    attack: T1555.003
    mbc: B0028
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: objectives/credential-access/browser/chromium::native-browser-credential-store-decryption
      - id: native-browser-loot-steam-file
