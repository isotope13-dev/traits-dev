defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1119

traits:
  - id: browser-auth-route-pattern-name
    desc: Names an authentication route matcher
    crit: component
    conf: 0.9
    if:
      type: text
      word: AUTH_URL_PATTERN

  - id: browser-auth-route-terms
    desc: Matches several authentication route terms
    crit: component
    conf: 0.88
    count_min: 4
    if:
      type: text
      regex: '\b(auth|login|session|token)\b'

  - id: cloned-fetch-response-json
    desc: Clones and parses fetch responses as JSON
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'response\.clone\(\)[\s\S]{0,160}\b(await\s+)?[A-Za-z_$][A-Za-z0-9_$]*\.json\(\)'

  - id: xhr-response-json-intercept
    desc: Parses intercepted XHR response JSON
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'XMLHttpRequest\.prototype\.send\s*=[\s\S]{0,700}\bresponseText\b'

  - id: auth-response-name-fields
    desc: References multiple user-name fields
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '\b(firstName|lastName|displayName|userName)\b'

  - id: auth-response-email-fields
    desc: References user-email response fields
    crit: component
    conf: 0.92
    count_min: 1
    if:
      type: text
      regex: '\b(userEmail|emailAddress|primaryEmail|workEmail)\b'

composite_rules:
  - id: browser-auth-response-identity-interception
    desc: Intercepts authentication responses to harvest user identity
    crit: suspicious
    conf: 0.98
    all:
      - id: browser-auth-route-pattern-name
      - id: browser-auth-route-terms
      - id: auth-response-name-fields
      - id: auth-response-email-fields
      - id: micro-behaviors/process/hook/xhr::fetch-hook
      - id: cloned-fetch-response-json
    any:
      - id: xhr-response-json-intercept
      - id: micro-behaviors/process/hook/xhr::open-hook
      - id: micro-behaviors/process/hook/xhr::send-hook

