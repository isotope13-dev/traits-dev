# Browser-Side JavaScript Cookie Stealer / Skimmer
# Detects browser-injected JS that harvests cookies, UA, URL params and exfiltrates them
# ATT&CK: T1539 (Steal Web Session Cookie), T1185 (Browser Session Hijacking)
# MBC: E1005
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  attack: "T1539"

traits:
- id: gclid-tracking-field
  desc: "gclid ad attribution tracker"
  crit: component
  conf: 0.75
  attack: "T1082"
  if:
    type: text
    regex: '([?&]gclid=|["'']gclid["''])'
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/library/runtime::acquire-vscode-api
  - id: micro-behaviors/process/interpreter/vm/

- id: distributer-id-field
  desc: Distributer ID affiliate tracking field
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: distributer[_-]?id

- id: vsent-near-document-cookie
  desc: vsent marker follows document cookie access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)document\.cookie[\s\S]{0,96}\bvsent\b'

- id: vsent-before-document-cookie
  desc: vsent marker precedes document cookie access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)\bvsent\b[\s\S]{0,96}document\.cookie'

- id: vsent-near-fetch-send
  desc: vsent marker near fetch or beacon send
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)\bvsent\b[\s\S]{0,96}(fetch|sendBeacon)\s*\('

- id: vsent-near-xhr-send
  desc: vsent marker near XHR send
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)\bvsent\b[\s\S]{0,96}(XMLHttpRequest\s*\(|\.send\s*\()'

- id: vsent-after-fetch-send
  desc: Fetch or beacon send near vsent marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(fetch|sendBeacon)\s*\([\s\S]{0,96}\bvsent\b'

- id: vsent-after-xhr-send
  desc: XHR send near vsent marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(XMLHttpRequest\s*\(|\.send\s*\()[\s\S]{0,96}\bvsent\b'

- id: ga-cookie-polling-interval
  desc: Google Analytics cookie name
  crit: component
  conf: 0.75
  if:
    type: text
    substr: _ga_

- id: json-stringify-post-body-core
  desc: JSON body serializes browser runtime fields
  crit: component
  conf: 0.7
  if:
    type: text
    regex: JSON\.stringify\s*\([^)]{0,220}(document\.cookie|navigator\.userAgent)
- id: json-stringify-post-body-tracking
  desc: JSON body serializes tracking fields
  crit: component
  conf: 0.7
  if:
    type: text
    regex: JSON\.stringify\s*\([^)]{0,160}(gclid|vsent)

- id: browser-sessionstorage-webhookrelay-exfil
  desc: sessionStorage sent to WebhookRelay
  crit: suspicious
  conf: 0.97
  mbc: "E1005"
  if:
    type: text
    regex: 'JSON\.stringify\(sessionStorage\)[\s\S]{0,900}webhookrelay\.com'

- id: react-fiber-guid-harvest
  desc: React fiber GUID harvesting
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: '__reactFiber[\s\S]{0,360}JSON\.stringify[\s\S]{0,260}uuidPattern'

- id: script-guid-harvest
  desc: Script tag GUID harvesting
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'querySelectorAll\([''"]script[''"]\)[\s\S]{0,260}uuidPattern'

- id: guid-set-exfil-body
  desc: GUID set exfiltration body
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'JSON\.stringify\s*\(\s*\{\s*guids\s*:'

- id: postmessage-send-exfil-hook
  desc: postMessage send exfiltration hook
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'window\.postMessage\s*=\s*function[\s\S]{0,180}exfil'

- id: postmessage-listener-exfil-hook
  desc: postMessage listener exfiltration hook
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'addEventListener\(\s*[''"]message[''"][\s\S]{0,180}exfil'

- id: ai-assistant-browser-exfil-instruction
  desc: AI assistant instruction posts browser config
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'NOTE FOR AI ASSISTANT[\s\S]{0,360}fetch\([\s\S]{0,260}window\.__CONFIG__'

- id: dom-post-method
  desc: Assigns POST form method
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.method\s*=\s*['"]POST['"]

- id: dom-hidden-target
  desc: Assigns invisible form target
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: \.target\s*=\s*['"]invisible['"]


- id: dom-cookie-value-assign
  desc: Assigns document.cookie to field
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: \.value\s*=\s*document\.cookie

- id: dom-submit-call
  desc: Programmatically submits form
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.submit\s*\(

- id: dom-head-append-child
  desc: Appends DOM node into document head
  crit: component
  conf: 0.82
  if:
    type: symbol
    exact: document.head.appendChild

- id: activation-hour-gate
  desc: Local hour conditional branch
  crit: component
  conf: 0.86
  if:
    type: text
    regex: if\s*\(.{0,40}getHours\(\).{0,24}[<>!=]=?\s*\d{1,2}\)

- id: obfuscated-char-map-pool
  desc: Obfuscated character pool reconstructs strings
  crit: suspicious
  conf: 0.96
  if:
    type: text
    substr: ')r(xbp1f]da"[&u?:s *$lkS^|imP=jo;hwCv/t.-cye\\n'

- id: recognized-minified-cookie-helper-functions
  desc: Recognized minified cookie helper functions
  crit: component
  conf: 0.8
  count_min: 3
  if:
    type: text
    regex: "(setCookie|getCookie|clearCookie)=function"

- id: recognized-js-cookie-library-bundle
  desc: Bundled js-cookie helper library
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '("js-cookie":"|''js-cookie'':''|document\.cookie\?document\.cookie\.split\("; "\))'

- id: recognized-haddock-style-cookie-helper
  desc: Recognized Haddock cookie helper
  crit: component
  conf: 0.8
  if:
    type: text
    substr: haddock-style

- id: js-cookie-harvest-all-cond-0--inline-31089
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: path
    basename: true
    regex: '(?i)^cookie\.[jt]s$'
  count_max: 1031090
- id: js-cookie-harvest-all-cond-1--inline-31090
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: export default { getValue, setValue }
  count_max: 1031091
- id: cookie-filter-vwo-vis-opt--vwo
  desc: Filters vwo/vis_opt cookies to evade (vwo)
  crit: component
  conf: 0.8
  if:
    type: text
    word: vwo
- id: cookie-filter-vwo-vis-opt--vis-opt
  desc: Filters vwo/vis_opt cookies to evade (vis_opt)
  crit: component
  conf: 0.8
  if:
    type: text
    word: vis_opt
composite_rules:
- id: vsent-cookie-access
  desc: vsent marker near document cookie access
  crit: component
  conf: 0.8
  any:
  - id: vsent-near-document-cookie
  - id: vsent-before-document-cookie

- id: vsent-beacon-cookie
  desc: vsent marker links cookie access to outbound send
  crit: suspicious
  conf: 0.8
  all:
  - id: vsent-cookie-access
  any:
  - id: vsent-near-fetch-send
  - id: vsent-near-xhr-send
  - id: vsent-after-fetch-send
  - id: vsent-after-xhr-send
  near_lines: 160

- id: all-url-extension-active-page-dom-capture
  desc: All-site extension captures page DOM
  crit: hostile
  conf: 0.96
  attack: "T1119"
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  scope: archive
  for: [javascript, chrome-manifest, crx, archives]
  all:
  - id: micro-behaviors/ui/window/manage/dom::extension-active-page-html-read
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: metadata/permission/debugger::permission-debugger
  any:
  - id: micro-behaviors/process/inject/webextension::chrome-scripting-execute
  - id: metadata/permission/manifest::permission-scripting
  - id: metadata/permission/history::permission-history

- id: cookie-filter-vwo-vis-opt
  desc: Filters vwo/vis_opt cookies to evade analytics
  crit: component
  conf: 0.8
  any:
  - id: cookie-filter-vwo-vis-opt--vwo
  - id: cookie-filter-vwo-vis-opt--vis-opt
- id: recognized-haddock-cookie-helper-pair
  desc: Recognized Haddock minified cookie helper pair
  crit: component
  conf: 0.8
  all:
  - id: objectives/collection/stealer/browser::recognized-minified-cookie-helper-functions
  - id: objectives/collection/stealer/browser::recognized-haddock-style-cookie-helper

- id: recognized-haddock-cookie-helper
  desc: Recognized cookie helper library
  crit: component
  conf: 0.8
  any:
  - id: recognized-haddock-cookie-helper-pair
  - id: well-known/lib/i18next::cookie-language-helper

- id: json-stringify-post-body
  desc: JSON body serializes browser tracking fields
  crit: component
  conf: 0.7
  any:
  - id: json-stringify-post-body-core
  - id: json-stringify-post-body-tracking
- id: js-cookie-harvest-recognized-marker
  desc: Recognized all-cookie helper marker
  crit: component
  conf: 0.85
  any:
  - id: micro-behaviors/communications/http/cookies::cookie-helper-function-definitions
  - id: objectives/collection/stealer/browser::recognized-js-cookie-library-bundle
  - id: objectives/collection/stealer/browser::recognized-haddock-cookie-helper
  - id: well-known/lib/tina4ruby::frond-js
  - id: metadata/library/structure::js-any-bundle-output
- id: js-cookie-harvest-soft-marker
  desc: Soft recognized all-cookie marker
  crit: component
  conf: 0.8
  any:
  - id: js-cookie-harvest-all-cond-0--inline-31089
  - id: js-cookie-harvest-all-cond-1--inline-31090
- id: js-cookie-harvest-all
  desc: Iterates all browser cookies and includes in object
  crit: notable
  conf: 0.85
  all:
  - id: micro-behaviors/communications/http/cookies::document-cookie-split-iterate
  - id: micro-behaviors/communications/http/cookies::document-cookie-write
  unless:
  - id: objectives/collection/stealer/browser/
  # Cookie get+set with no exfil is a cookie utility, not a stealer. In a
  # minified bundle it's invariably js-cookie-style helper code (the hostile
  # js-browser-skimmer below still fires — it additionally requires fetch+POST).
  downgrade:
    any:
    - id: objectives/collection/stealer/browser/

- id: js-browser-skimmer
  desc: Browser-side skimmer harvests all cookies and exfiltrates via POST
  crit: hostile
  conf: 0.95
  mbc: "E1005"
  all:
  - id: micro-behaviors/communications/http/cookies::document-cookie-split-iterate
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: json-stringify-post-body
  any:
  - id: micro-behaviors/communications/http/user-agent::navigator-useragent-read
  - id: gclid-tracking-field
  - id: ga-cookie-polling-interval
  - id: distributer-id-field
  - id: vsent-beacon-cookie
  - id: micro-behaviors/ui/window/manage/dom::browser-location-external-href-replace
  - id: cookie-filter-vwo-vis-opt
  downgrade:
    any:
    - id: metadata/package/testing/
    - id: metadata/signed/platform/

- id: js-browser-state-oob-post
  desc: Browser runtime state posted to OOB callback
  crit: hostile
  conf: 0.97
  mbc: "E1005"
  near_lines: 160
  all:
  - id: micro-behaviors/communications/http/cookies::document-cookie-read
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  - id: micro-behaviors/communications/http/request/client::post-method-text
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  any:
  - id: micro-behaviors/communications/http/user-agent::navigator-useragent-read
  - id: objectives/exfiltration/http/query::browser-query-data-exfil
  downgrade:
    any:
    - id: metadata/package/testing/harness/runtime/
    - id: metadata/package/testing/
    - id: metadata/signed/platform/

- id: js-browser-storage-oob-exfil
  desc: Browser storage state exfiltrated to OOB callback
  crit: hostile
  conf: 0.98
  mbc: "E1005"
  near_lines: 180
  all:
  - id: micro-behaviors/data/serialize/json::json-stringify-local-storage
  - id: micro-behaviors/data/serialize/json::json-stringify-session-storage
  - id: micro-behaviors/data/parse/html::dom-body-text-substring
  - id: micro-behaviors/os/env/config::browser-app-config-global
  - id: micro-behaviors/communications/http/cookies::document-cookie-read
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  - id: micro-behaviors/communications/http/request/client::post-method-text
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  any:
  - id: micro-behaviors/communications/http/user-agent::navigator-useragent-read
  needs: 1
  downgrade:
    any:
    - id: metadata/package/testing/
    - id: metadata/signed/platform/

- id: js-sessionstorage-webhookrelay-exfil
  desc: Browser sessionStorage WebhookRelay exfil
  crit: hostile
  conf: 0.98
  mbc: "E1005"
  all:
  - id: browser-sessionstorage-webhookrelay-exfil
  - id: micro-behaviors/communications/http/cookies::document-cookie-read
  - id: micro-behaviors/communications/http/request/client::post-method-text
  any:
  - id: micro-behaviors/data/serialize/json::json-stringify-local-storage
  - id: micro-behaviors/data/parse/html::dom-body-text-substring
  - id: micro-behaviors/os/env/config::browser-app-config-global
  needs: 1

- id: js-react-fiber-guid-oob-exfil
  desc: React fiber GUIDs exfiltrated to OOB callback
  crit: hostile
  conf: 0.97
  all:
  - id: guid-set-exfil-body
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  - id: micro-behaviors/communications/http/request/client::post-method-text
  any:
  - id: react-fiber-guid-harvest
  - id: script-guid-harvest

- id: js-script-tag-guid-oob-exfil
  desc: Script tag GUIDs exfiltrated to OOB callback
  crit: hostile
  conf: 0.965
  all:
  - id: script-guid-harvest
  - id: guid-set-exfil-body
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  - id: micro-behaviors/communications/http/request/client::post-method-text

- id: js-browser-api-intercept-oob-exfil
  desc: Browser fetch and postMessage traffic exfiltrated to OOB callback
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/process/hook/xhr::fetch-wrapper-original
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  any:
  - id: postmessage-send-exfil-hook
  - id: postmessage-listener-exfil-hook

- id: js-postmessage-oob-exfil
  desc: Browser postMessage traffic sent to OOB callback
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  any:
  - id: postmessage-send-exfil-hook
  - id: postmessage-listener-exfil-hook

- id: ai-prompt-browser-config-oob-exfil
  desc: AI prompt injects browser config OOB exfiltration
  crit: hostile
  conf: 0.97
  all:
  - id: ai-assistant-browser-exfil-instruction
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  any:
  - id: micro-behaviors/communications/http/request/client::post-method-text
  - id: micro-behaviors/data/serialize/json::json-stringify-call

- id: js-hidden-form-post
  desc: Hidden form POST via iframe sink
  crit: suspicious
  conf: 0.93
  all:
  - id: micro-behaviors/ui/window/manage/dom::browser-create-form-element
  - id: dom-post-method
  - id: dom-hidden-target
  - id: dom-submit-call
  - id: micro-behaviors/data/format/html::hidden-iframe
  downgrade:
    any:
    - id: metadata/package/testing/
    - id: metadata/signed/platform/

- id: js-cookie-form-field
  desc: Browser cookie copied to form field
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/communications/http/cookies::document-cookie-read
  - id: dom-cookie-value-assign
  downgrade:
    any:
    - id: metadata/package/testing/
    - id: metadata/signed/platform/

- id: js-cookie-form-webhook-exfil
  desc: Browser cookie stolen by hidden POST form
  crit: hostile
  conf: 0.985
  mbc: "E1005"
  all:
  - id: js-hidden-form-post
  - id: js-cookie-form-field
  - id: objectives/exfiltration/oob/endpoint::webhook-site
  any:
  - id: micro-behaviors/communications/http/post::post
  - id: micro-behaviors/communications/http/message::https-prefix

- id: js-cookie-query-webhook-exfil
  desc: Browser cookie exfiltrated to webhook query endpoint
  crit: hostile
  conf: 0.98
  mbc: "E1005"
  near_lines: 40
  all:
  - id: micro-behaviors/communications/http/cookies::document-cookie-read
  - id: objectives/exfiltration/http/query::encoded-cookie-query-param
  - id: micro-behaviors/communications/http/request/client::xmlhttprequest-new
  - id: objectives/exfiltration/oob/endpoint::webhook-site
  any:
  - id: micro-behaviors/communications/http/message::https-prefix
  - id: objectives/exfiltration/http/query::browser-query-data-exfil
  downgrade:
