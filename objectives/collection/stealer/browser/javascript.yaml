# Browser-Side JavaScript Cookie Stealer / Skimmer
# Detects browser-injected JS that harvests cookies, UA, URL params and exfiltrates them
# ATT&CK: T1539 (Steal Web Session Cookie), T1185 (Browser Session Hijacking)
# MBC: E1005
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  attack: "T1539"

traits:
  - id: gclid-tracking-field
    desc: Google Click ID (gclid) ad attribution tracking
    crit: notable
    conf: 0.75
    attack: "T1082"
    if:
      type: text
      word: gclid

  - id: distributer-id-field
    desc: Distributer ID affiliate tracking field
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: distributer[_-]?id

  - id: vsent-beacon-cookie
    desc: vsent cookie as exfiltration send-once beacon flag
    crit: notable
    conf: 0.8
    if:
      type: text
      word: vsent

  - id: cookiebot-consent-check
    desc: Checks Cookiebot consent before tracking (GDPR evasion)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: Cookiebot(\?\.|\.)consent

  - id: ga-cookie-polling-interval
    desc: Polls for Google Analytics _ga_ cookie
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: _ga_

  - id: cookie-filter-vwo-vis-opt
    desc: Filters vwo/vis_opt cookies to evade analytics
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (vwo|vis_opt)

  - id: json-stringify-post-body-core
    desc: JSON body serializes core browser fields
    crit: component
    conf: 0.7
    if:
      type: text
      regex: JSON\.stringify\s*\([^)]{0,160}(cookie|userAgent)
  - id: json-stringify-post-body-tracking
    desc: JSON body serializes tracking fields
    crit: component
    conf: 0.7
    if:
      type: text
      regex: JSON\.stringify\s*\([^)]{0,160}(gclid|vsent)

  - id: dom-form-create
    desc: Creates DOM form element
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: createElement\(['"]form['"]\)

  - id: dom-post-method
    desc: Assigns POST form method
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: \.method\s*=\s*['"]POST['"]

  - id: dom-hidden-target
    desc: Assigns invisible form target
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: \.target\s*=\s*['"]invisible['"]

  - id: dom-iframe-create
    desc: Creates iframe element
    crit: component
    conf: 0.8
    count_min: 2
    if:
      type: text
      regex: createElement\(['"]iframe['"]\)

  - id: dom-display-none
    desc: Hides DOM element
    crit: component
    conf: 0.7
    if:
      type: text
      regex: style\.display\s*=\s*['"]none['"]

  - id: dom-cookie-value-assign
    desc: Assigns document.cookie to field
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: \.value\s*=\s*document\.cookie

  - id: dom-submit-call
    desc: Programmatically submits form
    crit: component
    conf: 0.82
    if:
      type: text
      regex: \.submit\s*\(

  - id: dom-head-append-child
    desc: Appends DOM node into document head
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: document.head.appendChild

  - id: csp-header-read
    desc: Reads HTTP response header via headers.get
    crit: suspicious
    conf: 0.88
    if:
      type: symbol
      exact: .headers.get
    downgrade:
      any:
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: metadata/library/structure::js-large-module-bundle

  - id: browser-base64-packer
    desc: Base64-packs browser data for exfiltration
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: btoa(unescape(encodeURIComponent(

  - id: activation-hour-gate
    desc: Local hour conditional branch
    crit: component
    conf: 0.86
    if:
      type: text
      regex: if\s*\(.{0,40}getHours\(\).{0,24}[<>!=]=?\s*\d{1,2}\)

  - id: obfuscated-char-map-pool
    desc: Obfuscated character pool reconstructs strings
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: ')r(xbp1f]da"[&u?:s *$lkS^|imP=jo;hwCv/t.-cye\\n'

  - id: benign-cookie-helper-source
    desc: Benign cookie helper source
    crit: component
    conf: 0.8
    count_min: 3
    if:
      type: symbol
      regex: "^(setCookie|clearCookie|getCookie)$"

  - id: benign-minified-cookie-helper-functions
    desc: Benign minified cookie helper functions
    crit: component
    conf: 0.8
    count_min: 3
    if:
      type: text
      regex: "(setCookie|getCookie|clearCookie)=function"

  - id: benign-haddock-style-cookie-helper
    desc: Benign Haddock cookie helper
    crit: component
    conf: 0.8
    if:
      type: text
      substr: haddock-style

composite_rules:
  - id: benign-haddock-cookie-helper
    desc: Benign Haddock cookie helper
    crit: component
    conf: 0.8
    all:
      - id: objectives/collection/stealer/browser::benign-minified-cookie-helper-functions
      - id: objectives/collection/stealer/browser::benign-haddock-style-cookie-helper

  - id: json-stringify-post-body
    desc: JSON body serializes browser tracking fields
    crit: notable
    conf: 0.7
    any:
      - id: json-stringify-post-body-core
      - id: json-stringify-post-body-tracking
  - id: js-cookie-harvest-all
    desc: Iterates all browser cookies and includes in object
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/cookies::document-cookie-split-iterate
      - id: micro-behaviors/communications/http/cookies::document-cookie-write
    unless:
      - id: objectives/collection/stealer/browser::benign-cookie-helper-source
      - id: objectives/collection/stealer/browser::benign-haddock-cookie-helper
    downgrade:
      any:
        - type: basename
          regex: '(?i)^cookie\.[jt]s$'
        - type: text
          substr: export default { getValue, setValue }
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/

  - id: js-browser-skimmer
    desc: Browser-side skimmer harvests all cookies and exfiltrates via POST
    crit: hostile
    conf: 0.95
    mbc: "E1005"
    all:
      - id: micro-behaviors/communications/http/cookies::document-cookie-split-iterate
      - id: micro-behaviors/communications/http/request::fetch-string
      - id: json-stringify-post-body
    any:
      - id: micro-behaviors/communications/http/cookies::navigator-useragent-read
      - id: gclid-tracking-field
      - id: distributer-id-field
      - id: vsent-beacon-cookie
      - id: objectives/credential-access/phishing/tactics::js-location-redirect
      - id: cookie-filter-vwo-vis-opt
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/

  - id: js-cookie-with-url-params
    desc: Writes URL query params to cookies for tracking/exfil
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/cookies::location-search-harvest
      - id: micro-behaviors/communications/http/cookies::document-cookie-write
    downgrade:
      any:
        - type: text
          substr: x-user-token=
        - type: text
          substr: document.cookie=e+"="+o+c}
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/

  - id: dom-iframe-hidden
    desc: Creates hidden iframe sink
    crit: suspicious
    conf: 0.88
    all:
      - id: dom-iframe-create
      - id: dom-display-none
    downgrade:
      any:
        - type: basename
          regex: '(?i)(^|[-_.])(test|spec)\.[jt]sx?$'
        - type: text
          substr: sockjs-client
        - id: metadata/package/tooling::webpack-bundled
        - id: metadata/library/structure::google-tag-manager-bundle
        - id: metadata/library/react/
        - id: metadata/package/testing/presence::test-fixtures
        - id: metadata/library/structure::js-large-module-bundle

  - id: js-hidden-form-post
    desc: Hidden form POST via iframe sink
    crit: suspicious
    conf: 0.93
    all:
      - id: dom-form-create
      - id: dom-post-method
      - id: dom-hidden-target
      - id: dom-submit-call
      - id: dom-iframe-hidden
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/

  - id: js-cookie-form-field
    desc: Browser cookie copied to form field
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/http/cookies::document-cookie-read
      - id: dom-cookie-value-assign
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/

  - id: js-cookie-form-webhook-exfil
    desc: Browser cookie stolen by hidden POST form
    crit: hostile
    conf: 0.985
    mbc: "E1005"
    all:
      - id: js-hidden-form-post
      - id: js-cookie-form-field
      - id: objectives/exfiltration/oob::webhook-site
    any:
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/communications/http/protocol::https-prefix

  - id: js-csp-prefetch-skimmer
    desc: CSP-aware browser skimmer steals cookies and exfiltrates
    crit: hostile
    conf: 0.98
    mbc: "E1005"
    all:
      - id: micro-behaviors/communications/http/cookies::document-cookie-read
      - id: micro-behaviors/communications/http/request::js-fetch-call
      - id: csp-header-read
      - id: dom-head-append-child
      - id: browser-base64-packer
    any:
      - id: activation-hour-gate
      - id: micro-behaviors/communications/http/url::local-ip-or-localhost-guard
      - id: obfuscated-char-map-pool
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/
