- id: js-csp-prefetch-skimmer
  desc: CSP-aware browser skimmer steals cookies and exfiltrates
  crit: hostile
  conf: 0.98
  mbc: "E1005"
  all:
  - id: micro-behaviors/communications/http/cookies::document-cookie-read
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: micro-behaviors/communications/http/headers::csp-response-header-read
  - id: dom-head-append-child
  - id: micro-behaviors/data/encode/base64::btoa-utf8-safe-encode
  any:
