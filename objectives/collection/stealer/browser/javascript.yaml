# Browser-Side JavaScript Cookie Stealer / Skimmer
# Detects browser-injected JS that harvests cookies, UA, URL params and exfiltrates them
# ATT&CK: T1539 (Steal Web Session Cookie), T1185 (Browser Session Hijacking)
# MBC: E1005
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
  attack: "T1539"

traits:
  - id: gclid-tracking-field
    desc: Google Click ID (gclid) ad attribution tracking
    crit: notable
    conf: 0.75
    attack: "T1082"
    if:
      type: text
      word: gclid

  - id: distributer-id-field
    desc: Distributer ID affiliate tracking field
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: distributer[_-]?id

  - id: vsent-beacon-cookie
    desc: vsent cookie as exfiltration send-once beacon flag
    crit: notable
    conf: 0.8
    if:
      type: text
      word: vsent

  - id: cookiebot-consent-check
    desc: Checks Cookiebot consent before tracking (GDPR evasion)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: Cookiebot(\?\.|\.)consent

  - id: ga-cookie-polling-interval
    desc: Polls for Google Analytics _ga_ cookie
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: _ga_

  - id: cookie-filter-vwo-vis-opt
    desc: Filters vwo/vis_opt cookies to evade analytics
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (vwo|vis_opt)

  - id: json-stringify-post-body-core
    desc: JSON body serializes core browser fields
    crit: component
    conf: 0.7
    if:
      type: text
      regex: JSON\.stringify\s*\([^)]{0,160}(cookie|userAgent)
  - id: json-stringify-post-body-tracking
    desc: JSON body serializes tracking fields
    crit: component
    conf: 0.7
    if:
      type: text
      regex: JSON\.stringify\s*\([^)]{0,160}(gclid|vsent)

  - id: dom-form-create
    desc: Creates DOM form element
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: createElement\(['"]form['"]\)

  - id: dom-post-method
    desc: Assigns POST form method
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: \.method\s*=\s*['"]POST['"]

  - id: dom-hidden-target
    desc: Assigns invisible form target
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: \.target\s*=\s*['"]invisible['"]

  - id: dom-iframe-create
    desc: Creates iframe element
    crit: component
    conf: 0.8
    count_min: 2
    if:
      type: text
      regex: createElement\(['"]iframe['"]\)

  - id: dom-display-none
    desc: Hides DOM element
    crit: component
    conf: 0.7
    if:
      type: text
      regex: style\.display\s*=\s*['"]none['"]

  - id: dom-cookie-value-assign
    desc: Assigns document.cookie to field
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: \.value\s*=\s*document\.cookie

  - id: dom-submit-call
    desc: Programmatically submits form
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: \.submit\s*\(

composite_rules:
  - id: json-stringify-post-body
    desc: JSON body serializes browser tracking fields
    crit: notable
    conf: 0.7
    any:
      - id: json-stringify-post-body-core
      - id: json-stringify-post-body-tracking
  - id: js-cookie-harvest-all
    desc: Iterates all browser cookies and includes in object
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/cookies::document-cookie-split-iterate
      - id: micro-behaviors/communications/http/cookies::document-cookie-write
    downgrade:
      any:
        - type: text
          substr: from"./chunk-
        - type: basename
          regex: '(?i)^cookie\.[jt]s$'
        - type: text
          substr: export default { getValue, setValue }
        - type: text
          substr: document.cookie=s.join("
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/

  - id: js-browser-skimmer
    desc: Browser-side skimmer harvests all cookies and exfiltrates via POST
    crit: hostile
    conf: 0.95
    mbc: "E1005"
    all:
      - id: micro-behaviors/communications/http/cookies::document-cookie-split-iterate
      - id: micro-behaviors/communications/http/request::fetch-string
      - id: json-stringify-post-body
    any:
      - id: micro-behaviors/communications/http/cookies::navigator-useragent-read
      - id: gclid-tracking-field
      - id: distributer-id-field
      - id: vsent-beacon-cookie
      - id: objectives/credential-access/phishing/tactics::js-location-redirect
      - id: cookie-filter-vwo-vis-opt
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/

  - id: js-cookie-with-url-params
    desc: Writes URL query params to cookies for tracking/exfil
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/cookies::location-search-harvest
      - id: micro-behaviors/communications/http/cookies::document-cookie-write
    downgrade:
      any:
        - type: text
          substr: document.cookie=e+"="+o+c}
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/

  - id: dom-iframe-hidden
    desc: Creates hidden iframe sink
    crit: suspicious
    conf: 0.88
    all:
      - id: dom-iframe-create
      - id: dom-display-none
    downgrade:
      any:
        - type: text
          substr: sockjs-client
        - id: metadata/package/tooling::webpack-bundled
        - id: metadata/library/react/
        - id: metadata/package/testing/presence::test-fixtures

  - id: js-hidden-form-post
    desc: Hidden form POST via iframe sink
    crit: suspicious
    conf: 0.93
    all:
      - id: dom-form-create
      - id: dom-post-method
      - id: dom-hidden-target
      - id: dom-submit-call
      - id: dom-iframe-hidden
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/

  - id: js-cookie-form-field
    desc: Browser cookie copied to form field
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/http/cookies::document-cookie-read
      - id: dom-cookie-value-assign
    downgrade:
      any:
        - id: metadata/package::has-tests
        - id: metadata/signed/platform/

  - id: js-cookie-form-webhook-exfil
    desc: Browser cookie stolen by hidden POST form
    crit: hostile
    conf: 0.985
    mbc: "E1005"
    all:
      - id: js-hidden-form-post
      - id: js-cookie-form-field
      - id: objectives/exfiltration/oob::webhook-site
    any:
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/communications/http/protocol::https-prefix
