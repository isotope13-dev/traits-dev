defaults:
  platforms: [unix]
  for: [python]
  attack: T1114
traits:
  - id: developer-session-export-api
    desc: Language-server session API
    crit: notable
    conf: 0.99
    if:
      type: string_literal
      regex: 'Get(AllCascadeTrajectories|CascadeTranscriptForTrajectoryId|CascadeTrajectorySteps)'
  - id: developer-session-user-input-export
    desc: Exports session user inputs
    crit: notable
    conf: 0.99
    if:
      type: string_literal
      exact: includeUserInputs
composite_rules:
  - id: authenticated-developer-session-export
    desc: Exports private sessions with harvested token
    crit: hostile
    conf: 0.99
    scope: file
    all:
      - id: objectives/credential-access/dev-tools/session::process-environment-token-harvest
      - id: developer-session-export-api
      - id: developer-session-user-input-export
