defaults:
  platforms: [windows, unix]
  for: [javascript]
  attack: T1539
  crit: suspicious

traits:
  - id: jwt-localstorage-write
    desc: JWT written to localStorage
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\blocalStorage\.setItem\(\s*["'']jwt["'']'

  - id: jwt-localstorage-read
    desc: JWT read from localStorage
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\blocalStorage\.getItem\(\s*["'']jwt["'']'

  - id: bearer-header-from-storage
    desc: Bearer header from storage
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\bAuthorization\s*=\s*["'']Bearer\s+["'']\s*\+\s*(?:this\.state\.\w+\.\w+|localStorage\.getItem\(\s*["'']jwt["'']\s*\))'

  - id: refresh-token-endpoint
    desc: Refresh token endpoint access
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(?:User|Auth)\/RefreshToken\b|["'']RefreshToken["'']'

  - id: private-key-endpoint
    desc: Private key retrieval endpoint
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '\b(?:Visitor|User|Admin)\/GetPrivateKey\b|["'']GetPrivateKey["'']'

  - id: public-key-endpoint
    desc: Public key retrieval endpoint
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\b(?:Visitor|User|Admin)\/GetPublicKey\b|["'']GetPublicKey["'']'

  - id: jwt-payload-decode
    desc: JWT payload segment extraction
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\b(?:jwt|token)\w*\.split\(\s*["'']\.\s*["'']\s*\)\s*\[1\]'

  - id: decodeuricomponent-atob-chain
    desc: decodeURIComponent on atob output
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\bdecodeURIComponent\s*\([^)]{0,40}atob\s*\(|\batob.{0,40}decodeURIComponent'
    not:
      - substr: base64
      - substr: token.split
    unless:
      - type: basename
        exact: open-jssdk.es.js
      - type: text
        substr: ASSET_PRESETS

  - id: authenticated-blob-download
    desc: Authenticated blob download workflow
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(Authorization|Bearer).{0,40}responseType:\s*["'']blob["'']'

  - id: browser-forced-download
    desc: Browser forced file download
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'createObjectURL.{0,40}(\.click\(|download\s*=)|downloadElement\.download\s*='
    not:
      - substr: duplicati-config.
      - substr: downloadFile(o,e){let t=window.URL.createObjectURL(o)

composite_rules:
  - id: browser-jwt-session-persistence
    desc: Browser JWT session persistence
    crit: suspicious
    conf: 0.96
    all:
      - id: jwt-localstorage-read
    any:
      - id: jwt-localstorage-write
      - id: bearer-header-from-storage
      - id: refresh-token-endpoint

  - id: browser-jwt-token-introspection
    desc: Browser JWT token introspection
    crit: suspicious
    conf: 0.95
    all:
      - id: browser-jwt-session-persistence
      - id: jwt-payload-decode
    any:
      - id: decodeuricomponent-atob-chain
      - id: refresh-token-endpoint

  - id: browser-private-key-harvest
    desc: Browser private key harvesting flow
    crit: hostile
    conf: 0.98
    all:
      - id: private-key-endpoint
      - id: browser-jwt-session-persistence
    any:
      - id: public-key-endpoint
      - id: browser-jwt-token-introspection

  - id: token-and-key-session-harvest
    desc: Token refresh with key retrieval
    crit: hostile
    conf: 0.99
    all:
      - id: private-key-endpoint
      - id: refresh-token-endpoint
      - id: bearer-header-from-storage
    any:
      - id: jwt-localstorage-write
      - id: jwt-payload-decode

  - id: browser-bearer-session-replay
    desc: Browser bearer session replay
    crit: hostile
    conf: 0.97
    all:
      - id: bearer-header-from-storage
      - id: browser-jwt-session-persistence
      - id: jwt-localstorage-read

  - id: browser-session-refresh-replay
    desc: Browser session refresh replay
    crit: hostile
    conf: 0.96
    all:
      - id: bearer-header-from-storage
      - id: refresh-token-endpoint
      - id: jwt-localstorage-read
    any:
      - id: browser-jwt-token-introspection
      - id: jwt-localstorage-write

  - id: browser-authenticated-file-replay
    desc: Browser authenticated file replay
    crit: hostile
    conf: 0.97
    all:
      - id: bearer-header-from-storage
      - id: jwt-localstorage-read
      - id: authenticated-blob-download
    any:
      - id: browser-forced-download
      - id: browser-jwt-session-persistence
