defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1539"
traits:
- id: tiktok-state-object-read--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: SIGI_STATE
  count_max: 1030059
- id: tiktok-state-object-read--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: __UNIVERSAL_DATA_FOR_REHYDRATION__
  count_max: 1030060
composite_rules:
- id: tiktok-session-api-scraper
  desc: Uses TikTok browser session state to issue authenticated TikTok API requests
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/cookies::tiktok-webid-cookie-match
  - id: micro-behaviors/communications/http/headers::x-tt-params-header
  - id: micro-behaviors/communications/http/request::fetch-string
  any:
  - id: micro-behaviors/communications/http/headers::credentialed-fetch-include
  - id: micro-behaviors/communications/http/cookies::session-storage-access
  - id: micro-behaviors/crypto/symmetric/aes::cryptojs-aes-cbc-encrypt
  - id: tiktok-state-object-read
- id: tiktok-state-object-read
  desc: Reads TikTok hydrated page state objects
  crit: suspicious
  conf: 0.85
  any:
  - id: tiktok-state-object-read--rx-1
  - id: tiktok-state-object-read--rx-2
