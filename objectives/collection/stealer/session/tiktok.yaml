defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1539"
traits:
composite_rules:
- id: tiktok-session-api-scraper
  desc: Uses TikTok browser session state to issue authenticated TikTok API requests
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/cookies::tiktok-webid-cookie-match
  - id: micro-behaviors/communications/http/headers::x-tt-params-header
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  any:
  - id: micro-behaviors/communications/http/request/credentials::fetch-credentials-include
  - id: micro-behaviors/data/db/web-storage::dom-sessionstorage
  - id: micro-behaviors/crypto/symmetric/aes/library::cryptojs-aes-cbc-encrypt
  - id: micro-behaviors/data/parse/html::tiktok-hydration-json-parse
