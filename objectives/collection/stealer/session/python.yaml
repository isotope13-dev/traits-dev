defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1539
  crit: suspicious

traits:
- id: jwt-file-or-browser-read--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: cookies.sqlite
  count_max: 1030035
- id: jwt-file-or-browser-read--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: localStorage
  count_max: 1030036
- id: jwt-file-or-browser-read--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: session
  count_max: 1030037
- id: jwt-file-or-browser-read--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: access
  count_max: 1030038
- id: jwt-file-or-browser-read--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: upload
  count_max: 1030039
- id: jwt-file-or-browser-read--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: cache
  count_max: 1030040
- id: jwt-file-or-browser-read--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: exfil
  count_max: 1030041
- id: jwt-file-or-browser-read--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: steal
  count_max: 1030042
- id: token-refresh-endpoint
  desc: Refresh token reference
  crit: component
  conf: 0.9
  if:
    type: text
    regex: /RefreshToken\b|\brefresh[_-]?token\b

- id: private-key-endpoint-python
  desc: Private key API endpoint reference
  crit: notable
  conf: 0.97
  if:
    type: text
    regex: /GetPrivateKey\b|\bget[_-]?private[_-]?key\b

composite_rules:
- id: python-bearer-session-replay
  desc: Python bearer session replay
  crit: hostile
  conf: 0.97
  unless:
  - id: well-known/app/piglit
  all:
  - id: micro-behaviors/communications/http/headers::bearer-header-from-token
  - id: jwt-file-or-browser-read
  any:
  - id: micro-behaviors/communications/http/lib/requests::requests-session
  - id: micro-behaviors/communications/http/lib/httpx::httpx-client
  - id: micro-behaviors/communications/http/lib/httpx::httpx-async-client
  - id: micro-behaviors/communications/http/lib/aiohttp::aiohttp-session
  - id: token-refresh-endpoint

- id: python-authenticated-file-replay
  desc: Python authenticated file replay
  crit: hostile
  conf: 0.97
  unless:
  - id: well-known/app/piglit
  all:
  - id: python-bearer-session-replay
  - id: micro-behaviors/communications/http/request/client::response-stream-python
  any:
  - id: micro-behaviors/fs/file/open::binary-write-mode
  - id: token-refresh-endpoint
  - id: micro-behaviors/communications/http/services/aws-s3::generate-presigned-url

- id: python-async-session-replay
  desc: Python async session replay
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/communications/http/headers::bearer-header-from-token
  - id: jwt-file-or-browser-read
  - id: micro-behaviors/communications/http/request/client::async-response-stream-python
  any:
  - id: micro-behaviors/communications/http/lib/httpx::httpx-async-client
  - id: micro-behaviors/communications/http/lib/aiohttp::aiohttp-session
  - id: micro-behaviors/communications/http/services/aws-s3::generate-presigned-url

- id: python-token-and-key-harvest
  desc: Python token and key harvest
  crit: hostile
  conf: 0.98
  all:
  - id: python-bearer-session-replay
  - id: private-key-endpoint-python
  any:
  - id: token-refresh-endpoint
  - id: micro-behaviors/communications/http/request/client::response-stream-python
- id: jwt-file-or-browser-read
  desc: JWT read from browser or file
  crit: suspicious
  conf: 0.92
  any:
  - id: jwt-file-or-browser-read--rx-1
  - id: jwt-file-or-browser-read--rx-2
  - id: jwt-file-or-browser-read--rx-3
  - id: jwt-file-or-browser-read--rx-4
  - id: jwt-file-or-browser-read--rx-5
  - id: jwt-file-or-browser-read--rx-6
  - id: jwt-file-or-browser-read--rx-7
  - id: jwt-file-or-browser-read--rx-8
