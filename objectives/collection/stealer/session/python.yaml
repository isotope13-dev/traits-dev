defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1539
  crit: suspicious

traits:
  - id: bearer-header-from-token
    desc: Bearer header from token
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: Authorization.{0,40}Bearer.{0,40}(token|jwt|access_token|session)

  - id: jwt-file-or-browser-read
    desc: JWT read from browser or file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: localStorage.{0,24}(jwt|token)|cookies\.sqlite|access[_-]?token\.

  - id: token-refresh-endpoint
    desc: Refresh token reference
    crit: component
    conf: 0.9
    if:
      type: text
      regex: /RefreshToken\b|\brefresh[_-]?token\b

  - id: private-key-endpoint-python
    desc: Private key endpoint access
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: /GetPrivateKey\b|\bget[_-]?private[_-]?key\b

composite_rules:
  - id: python-bearer-session-replay
    desc: Python bearer session replay
    crit: hostile
    conf: 0.97
    all:
      - id: bearer-header-from-token
      - id: jwt-file-or-browser-read
    any:
      - id: micro-behaviors/communications/http/lib/requests::requests-session
      - id: micro-behaviors/communications/http/lib/httpx::httpx-client
      - id: micro-behaviors/communications/http/lib/httpx::httpx-async-client
      - id: micro-behaviors/communications/http/lib/aiohttp::aiohttp-session
      - id: token-refresh-endpoint

  - id: python-authenticated-file-replay
    desc: Python authenticated file replay
    crit: hostile
    conf: 0.97
    all:
      - id: python-bearer-session-replay
      - id: micro-behaviors/communications/http/request::response-stream-python
    any:
      - id: micro-behaviors/fs/file/open::binary-write-mode
      - id: token-refresh-endpoint
      - id: micro-behaviors/communications/http/services/aws-s3::generate-presigned-url

  - id: python-async-session-replay
    desc: Python async session replay
    crit: hostile
    conf: 0.97
    all:
      - id: bearer-header-from-token
      - id: jwt-file-or-browser-read
      - id: micro-behaviors/communications/http/request::async-response-stream-python
    any:
      - id: micro-behaviors/communications/http/lib/httpx::httpx-async-client
      - id: micro-behaviors/communications/http/lib/aiohttp::aiohttp-session
      - id: micro-behaviors/communications/http/services/aws-s3::generate-presigned-url

  - id: python-token-and-key-harvest
    desc: Python token and key harvest
    crit: hostile
    conf: 0.98
    all:
      - id: python-bearer-session-replay
      - id: private-key-endpoint-python
    any:
      - id: token-refresh-endpoint
      - id: micro-behaviors/communications/http/request::response-stream-python
