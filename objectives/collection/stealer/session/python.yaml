defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1539
  crit: suspicious

traits:
- id: jwt-file-or-browser-read--rx-1
  desc: Browser cookies database filename
  crit: component
  conf: 0.92
  if:
    type: text
    substr: cookies.sqlite
  count_max: 1030035
- id: jwt-file-or-browser-read--rx-2
  desc: Python accesses localStorage identifier
  crit: component
  conf: 0.92
  if:
    type: tree-sitter
    kind: identifier
    exact: localStorage
  count_max: 1030036
- id: jwt-file-or-browser-read--rx-3
  desc: Python accesses sessionStorage identifier
  crit: component
  conf: 0.92
  if:
    type: tree-sitter
    kind: identifier
    exact: sessionStorage
  count_max: 1030037
- id: token-refresh-endpoint
  desc: Refresh token reference
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'RefreshToken\b|\brefresh[_-]?token\b'

- id: private-key-endpoint-python
  desc: Private key API endpoint reference
  crit: component
  conf: 0.97
  if:
    type: text
    regex: 'GetPrivateKey\b|\bget[_-]?private[_-]?key\b'
- id: browser-session-extraction-description
  desc: Browser session extraction description
  crit: component
  conf: 0.97
  for: [pkginfo]
  if:
    type: text
    substr: Extract browser sessions

- id: portable-cookie-package-description
  desc: Portable cookie package description
  crit: component
  conf: 0.97
  for: [pkginfo]
  if:
    type: text
    regex: 'Package \.tokenade.{0,40}JSON with cookies'

- id: donor-session-replay-description
  desc: Donor session replay description
  crit: suspicious
  conf: 0.98
  for: [pkginfo]
  if:
    type: text
    regex: 'browse as the donor|You are logged in as donor'
    case_insensitive: true

composite_rules:
- id: package-advertises-browser-session-replay
  desc: Package advertises browser session replay
  crit: hostile
  conf: 0.98
  for: [pkginfo]
  all:
  - id: browser-session-extraction-description
  - id: portable-cookie-package-description
  - id: donor-session-replay-description

- id: python-browser-session-portability-stealer
  desc: Python browser session portability stealer
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/credential-access/browser/chromium::browser-creds-table-sql
  - id: micro-behaviors/fs/path/sensitive/browser::firefox-cookies
  - id: micro-behaviors/data/db/web-storage::dom-localstorage
  - id: micro-behaviors/data/serialize/json::browser-session-state-json-fields
  any:
  - id: micro-behaviors/communications/http/devtools/client::cdp-method-runtime-evaluate
  - id: micro-behaviors/communications/http/devtools/client::cdp-client
  - id: micro-behaviors/communications/http/service-worker::intercept-all
  - id: micro-behaviors/communications/http/request/credentials::fetch-credentials-include

- id: python-bearer-session-replay
  desc: Python bearer session replay
  crit: hostile
  conf: 0.97
  unless:
  - id: well-known/app/piglit
  - id: well-known/tool/offensive/sic-security/
  - id: well-known/app/remotepower::documented-rmm-release-context
  all:
  - id: micro-behaviors/communications/http/headers::bearer-header-from-token
  - id: jwt-file-or-browser-read
  any:
  - id: micro-behaviors/communications/http/lib/requests::requests-session
  - id: micro-behaviors/communications/http/client/httpx::httpx-client
  - id: micro-behaviors/communications/http/client/httpx::httpx-async-client
  - id: micro-behaviors/communications/http/lib/aiohttp::aiohttp-session

- id: python-authenticated-file-replay
  desc: Python authenticated file replay
  crit: hostile
  conf: 0.97
  unless:
  - id: well-known/app/piglit
  - id: well-known/tool/offensive/sic-security/
  all:
  - id: python-bearer-session-replay
  - id: micro-behaviors/communications/http/request/client::response-stream-python
  any:
  - id: micro-behaviors/fs/file/open::binary-write-mode
  - id: token-refresh-endpoint
  - id: micro-behaviors/communications/http/services/aws-s3::generate-presigned-url

- id: python-async-session-replay
  desc: Python async session replay
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/communications/http/headers::bearer-header-from-token
  - id: jwt-file-or-browser-read
  - id: micro-behaviors/communications/http/request/client::async-response-stream-python
  any:
  - id: micro-behaviors/communications/http/client/httpx::httpx-async-client
  - id: micro-behaviors/communications/http/lib/aiohttp::aiohttp-session
  - id: micro-behaviors/communications/http/services/aws-s3::generate-presigned-url

- id: python-token-and-key-harvest
  desc: Python token and key harvest
  crit: hostile
  conf: 0.98
  all:
  - id: python-bearer-session-replay
  - id: private-key-endpoint-python
  any:
  - id: token-refresh-endpoint
  - id: micro-behaviors/communications/http/request/client::response-stream-python
- id: jwt-file-or-browser-read
  desc: Browser session storage reference
  crit: component
  conf: 0.92
  any:
  - id: jwt-file-or-browser-read--rx-1
  - id: jwt-file-or-browser-read--rx-2
  - id: jwt-file-or-browser-read--rx-3
  unless:
  - id: well-known/app/kubeflow-community::notebook-scripts
  - id: well-known/tool/offensive/sic-security/
