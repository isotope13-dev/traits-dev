defaults:
  platforms: [windows, unix]
  for: [class, jar, zip]
  attack: T1552
traits:
  - id: minecraft-client-session-access
    desc: Minecraft client session access
    crit: component
    conf: 0.94
    if:
      type: import
      exact: net/minecraft/client/Minecraft.func_110432_I
  - id: minecraft-session-token-read
    desc: Minecraft session token read
    crit: component
    conf: 0.96
    if:
      type: import
      exact: net/minecraft/util/Session.func_111286_b
composite_rules:
  - id: minecraft-session-token-webhook-stealer
    desc: Minecraft session token webhook stealer
    crit: hostile
    conf: 0.97
    all:
      - id: minecraft-client-session-access
      - id: minecraft-session-token-read
      - id: micro-behaviors/communications/http/webhook::discord-webhook-path-any
