defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: telegram-tdata-access
    desc: Access to Telegram tdata directory (session hijacking)
    crit: suspicious
    conf: 0.95
    attack: T1539
    if:
      type: text
      regex: (?i)Telegram Desktop\\tdata
