# Telegram Session Stealing
# Targets Telegram Desktop session data
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: telegram-tdata-access
    desc: Access to Telegram tdata directory (session hijacking)
    crit: suspicious
    conf: 0.95
    attack: T1539
    if:
      type: string
      regex: '(?i)Telegram Desktop\\tdata'
