# --- Variant-independent AMOS (Atomic Stealer) behaviors ---
# The family-tuned composites above key on specific upload shapes (chunked,
# /tmp/out.zip, upload.php), specific lure titles, and named handler functions.
# Numerically-obfuscated AMOS variants delivered as a single-line
# `osascript -e 'run script "..."'` blob (functions renamed to f<digits>, paths
# built by concatenation, AST string literals not cleanly exposed) slip past
# them while performing the identical kill chain. These three text-based
# composites detect the behaviors directly, regardless of the carrier wrapping.
- id: applescript-credential-phish-hostile
  desc: Fake auth dialog harvests and validates login password
  crit: hostile
  conf: 0.97
  attack: T1056.002
  # Impersonation lure + masked password entry + dscl validation of the entered
  # password is the complete credential-phish-and-verify loop; `dscl . authonly`
  # to check a user-typed password against the local directory service has no
  # legitimate use behind a hand-rolled dialog (real tools use Authorization
  # Services / `with administrator privileges`).
  all:
  - id: objectives/credential-access/validation/check::dscl-authonly-comp
  - id: objectives/credential-access/phishing/lure::hidden-answer
  any:
  - id: protection-service-title
  - id: device-password-authorize-prompt
  - id: macos-wants-change-prompt
  - id: password-prompt-wording-fragment
- id: applescript-buildid-databinary-exfil
  desc: Campaign-tagged curl upload of collected data
  crit: hostile
  conf: 0.96
  attack: T1041
  # AMOS C2 protocol: a curl request carrying the `buildid:` campaign header that
  # binary-uploads a staged file. The buildid header + --data-binary file upload
  # + (POST or a hardcoded-IP endpoint) is the exf* leg, independent of whether
  # the archive is chunked or named out.zip.
  all:
  - id: buildid-upload-header
  - id: micro-behaviors/communications/http/curl::curl-data-binary-file
  any:
  - id: micro-behaviors/communications/http/curl::curl-post-flag
  - id: micro-behaviors/communications/ip/literal::http-ip-url
