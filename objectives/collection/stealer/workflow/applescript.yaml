defaults:
  platforms: [macos]
  for: [applescript, shell]
  attack: T1005
  mbc: B0028
traits:
- id: stravy-staging-dir
  desc: stravy temp staging directory
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: /tmp/stravy/
- id: alego-zip-archive
  desc: alego staged zip archive
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: /tmp/alego.zip
- id: staging-browser-bucket
  desc: Browser staging bucket name
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Brs/
- id: staging-extension-bucket
  desc: Extension staging bucket name
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Exts/
- id: staging-wallet-bucket
  desc: Wallet staging bucket name
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Wlt/
- id: staging-keychain-bucket
  desc: Keychain staging bucket name
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Kch/
- id: staging-notes-bucket
  desc: Notes staging bucket name
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Notes/
- id: staging-files-bucket
  desc: Files staging bucket name
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Files/
- id: filegrabber-staging-bucket
  desc: FileGrabber staging bucket name
  crit: component
  conf: 0.9
  if:
    type: text
    substr: FileGrabber/
- id: chromium-staging-bucket
  desc: Chromium staging bucket name
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Chromium/
- id: desktop-wallets-staging-bucket
  desc: Desktop wallets staging bucket name
  crit: component
  conf: 0.9
  if:
    type: text
    substr: deskwallets/
- id: x-bid-header
  desc: Hex session header for exfil
  crit: suspicious
  conf: 0.95
  attack: T1041
  if:
    type: text
    regex: X-Bid:\s*[0-9a-f]{32}
- id: x-chunk-headers
  desc: Chunked upload headers
  crit: suspicious
  conf: 0.95
  attack: T1041
  if:
    type: text
    regex: "X-Chunk-(ID|Part|Total):"
- id: buildid-upload-header
  desc: BuildID upload header
  crit: notable
  conf: 0.9
  attack: T1041
  unless:
  - id: metadata/lang/source::python-protobuf-stub
  - id: metadata/lang/source::python-mypy-protobuf-generated
  if:
    type: text
    regex: "(?i)buildid:"
- id: uuid-upload-header
  desc: UUID upload header
  crit: notable
  conf: 0.85
  attack: T1041
  if:
    type: text
    regex: "(?i)[\"'\\\\]uuid:"
- id: user-upload-header
  desc: Upload request user field
  crit: notable
  conf: 0.75
  attack: T1041
  unless:
  - id: well-known/app/crunr/
  - id: metadata/lang/source::python-generated-basename
  - id: metadata/lang/source::python-protobuf-generated
  - id: metadata/lang/source::python-protobuf-stub
  - id: metadata/lang/source::python-mypy-protobuf-generated
  not:
  - regex: "(?m)^\\s*user:\\s*(builtins\\.)?str\\b"
  - regex: "(?m)^\\s*user:\\s*Optional\\[str\\]"
  if:
    type: text
    regex: '(?i)"user:\s*[^"\r\n]{1,40}"'
- id: curl-contact-upload
  desc: curl file upload to contact endpoint
  crit: suspicious
  conf: 0.9
  attack: T1041
  if:
    type: text
    regex: curl.{0,180}-F\s+["']?file=@.{0,80}/contact
- id: curl-upload-php
  desc: curl file upload to upload.php
  crit: suspicious
  conf: 0.9
  attack: T1041
  if:
    type: text
    regex: curl.{0,180}(-F\s+["']?file=@|--data-binary\s+@).{0,120}/upload\.php
- id: curl-gate-chunk-upload
  desc: curl chunk upload to gate
  crit: suspicious
  conf: 0.9
  attack: T1041
  if:
    type: text
    regex: curl.{0,180}(-F\s+["']?file=@|--data-binary\s+@).{0,160}/gate/chunk
- id: curl-outzip-data-binary
  desc: curl uploads /tmp/out.zip
  crit: suspicious
  conf: 0.9
  attack: T1041
  if:
    type: text
    regex: curl.{0,120}--data-binary\s+@/tmp/out\.zip
- id: tmp-chunk-upload
  desc: /tmp chunk upload artifact
  crit: suspicious
  conf: 0.9
  attack: T1041
  if:
    type: text
    regex: /tmp/chunk_[A-Za-z]{2}
- id: split-outzip-chunks
  desc: Splits /tmp/out.zip into chunks
  crit: suspicious
  conf: 0.9
  attack: T1030
  if:
    type: text
    regex: split\s+-b\s+\d+\s+/tmp/out\.zip\s+/tmp/chunk_
- id: lovemrtrump-staging-dir
  desc: Odyssey temp staging directory
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: /tmp/lovemrtrump
- id: multipart-zip-upload
  desc: Multipart upload of staged zip
  crit: suspicious
  conf: 0.95
  attack: T1041
  if:
    type: text
    regex: lil-arch=@/tmp/.{1,80}\.zip
- id: multipart-dynamic-file-upload
  desc: Multipart upload of dynamic file
  crit: notable
  conf: 0.9
  attack: T1041
  if:
    type: text
    regex: -F\s+.{0,120}file=@
  unless:
  - id: well-known/app/omarchy::source-tree
- id: receive-endpoint
  desc: HTTP receive endpoint path
  crit: suspicious
  conf: 0.9
  attack: T1041
  if:
    type: text
    substr: /api/data/receive
- id: grabber-endpoint
  desc: HTTP grabber endpoint path
  crit: suspicious
  conf: 0.9
  attack: T1041
  if:
    type: text
    regex: '/api/(grabber|stealer)([/_-]|\b)'
- id: protection-service-title
  desc: Fake macOS Protection Service title
  crit: suspicious
  conf: 0.95
  attack: T1056.002
  if:
    type: text
    substr: macOS Protection Service
- id: device-password-authorize-prompt
  desc: Device password authorization lure
  crit: suspicious
  conf: 0.95
  attack: T1056.002
  if:
    type: text
    substr: Input device password to authorize your access
- id: macos-wants-change-prompt
  desc: Fake macOS change password prompt
  crit: suspicious
  conf: 0.95
  attack: T1056.002
  if:
    type: text
    substr: macOS wants to make changes
- id: macos-dialog-title
  desc: Dialog title mimicking macOS
  crit: suspicious
  conf: 0.85
  attack: T1056.002
  if:
    type: text
    substr: with title "macOS"
# Generic wording alone does not establish a credential-phishing dialog; the
# complete hostile composite below adds hidden password input and dscl
# validation. Keep this phrase as an incomplete component for that composite.
- id: password-prompt-wording-fragment
  desc: Generic password prompt wording fragment
  crit: component
  conf: 0.9
  attack: T1056.002
  unless:
  - id: metadata/file/string/identity/
  - id: well-known/app/pihole::pihole-artifact
  if:
    type: text
    regex: '(?i)(provide|enter|input) your (\w{1,10} )?password'
- id: chrome-generic-password-query
  desc: Chrome generic password query
  crit: suspicious
  conf: 0.95
  attack: T1555.001
  if:
    type: text
    regex: find-generic-password.{0,40}"Chrome"
- id: uuid-query-command
  desc: system profiler UUID query
  crit: suspicious
  conf: 0.9
  attack: T1082
  if:
    type: text
    regex: system_profiler\s+SPHardwareDataType.{0,80}UUID
- id: full-system-profile
  desc: Full system profiler triad
  crit: suspicious
  conf: 0.9
  attack: T1082
  if:
    type: text
    regex: system_profiler\s+SPSoftwareDataType\s+SPHardwareDataType\s+SPDisplaysDataType
- id: password-cache-file
  desc: Hidden cached password file
  crit: suspicious
  conf: 0.85
  attack: T1555
  if:
    type: text
    substr: /.pwd
  unless:
  - id: metadata/package/files/system-package::debian-account-maintainer-tool
- id: username-cache-file
  desc: Hidden cached username file
  crit: suspicious
  conf: 0.8
  attack: T1074.001
  if:
    type: text
    substr: /.username
- id: firefox-profiles-path
  desc: Firefox profiles path target
  crit: suspicious
  conf: 0.85
  attack: T1555.003
  if:
    type: text
    substr: Firefox/Profiles/
  unless:
  - id: micro-behaviors/crypto/certificate/usage::certutil-ca-bundle-export
- id: waterfox-profiles-path
  desc: Waterfox profiles path target
  crit: suspicious
  conf: 0.85
  attack: T1555.003
  if:
    type: text
    substr: Waterfox/Profiles/
- id: chrome-profile-path
  desc: Chrome profile path target
  crit: suspicious
  conf: 0.85
  attack: T1555.003
  if:
    type: text
    substr: Google/Chrome/
  unless:
    - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
    - id: well-known/lib/skia::source-tree
- id: brave-profile-path
  desc: Brave profile path target
  crit: suspicious
  conf: 0.85
  attack: T1555.003
  if:
    type: text
    substr: BraveSoftware/Brave-Browser/
- id: edge-profile-path
  desc: Edge profile path target
  crit: suspicious
  conf: 0.85
  attack: T1555.003
  if:
    type: text
    substr: Microsoft Edge/
- id: vivaldi-profile-path
  desc: Vivaldi profile path target
  crit: suspicious
  conf: 0.85
  attack: T1555.003
  if:
    type: text
    substr: Vivaldi/
- id: electrum-wallet-path
  desc: Electrum wallet path target
  crit: suspicious
  conf: 0.85
  attack: T1555.005
  if:
    type: text
    substr: .electrum/wallets/
- id: coinomi-wallet-path
  desc: Coinomi wallet path target
  crit: suspicious
  conf: 0.85
  attack: T1555.005
  if:
    type: text
    substr: Coinomi/wallets/
- id: exodus-wallet-path
  desc: Exodus wallet path target
  crit: suspicious
  conf: 0.85
  attack: T1555.005
  if:
    type: text
    substr: Exodus/
- id: atomic-wallet-path
  desc: Atomic wallet path target
  crit: suspicious
  conf: 0.85
  attack: T1555.005
  if:
    type: text
    substr: atomic/Local Storage/
- id: trezor-suite-path
  desc: Trezor Suite path target
  crit: suspicious
  conf: 0.85
  attack: T1555.005
  if:
    type: text
    substr: "@trezor/suite-desktop/"
- id: filegrabber-function
  desc: AppleScript filegrabber handler
  crit: component
  conf: 0.9
  if:
    type: text
    substr: on filegrabber(
- id: copy-from-dir-function
  desc: AppleScript recursive copy handler
  crit: component
  conf: 0.85
  if:
    type: text
    substr: on copy_from_dir(
- id: steal-chromium-data-function
  desc: AppleScript Chromium theft handler
  crit: component
  conf: 0.9
  attack: T1555.003
  if:
    type: text
    substr: on steal_chromium_data(
- id: upload-to-c2-function
  desc: AppleScript C2 upload handler
  crit: component
  conf: 0.9
  attack: T1041
  if:
    type: text
    substr: on upload_to_c2(
- id: parseff-function
  desc: AppleScript parseFF handler
  crit: component
  conf: 0.9
  if:
    type: text
    substr: on parseFF(
- id: chromium-function
  desc: AppleScript chromium handler
  crit: component
  conf: 0.9
  if:
    type: text
    substr: on chromium(
- id: toast-function
  desc: AppleScript toast handler
  crit: component
  conf: 0.9
  if:
    type: text
    substr: on toast(
- id: curl-download-archive-zip-dmg-pkg
  desc: curl downloads archive payload
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "curl\\s+-L\\s+-o\\s+[^\\s]{1,160}\\.(zip|dmg|pkg)(\\s|$)"
- id: curl-download-archive-tarball
  desc: curl downloads tarball payload
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "curl\\s+-L\\s+-o\\s+[^\\s]{1,160}\\.(tgz|tar\\.gz)(\\s|$)"
- id: curl-download-app-bundle
  desc: curl downloads app bundle path
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "curl\\s+-L\\s+-o\\s+[^\\s]{1,160}/[^/\\s]{1,80}\\.app(\\s|$)"
- id: sudo-app-delete
  desc: sudo delete application bundle
  crit: suspicious
  conf: 0.95
  attack: T1554
  if:
    type: text
    regex: sudo\s+-S\s+rm\s+-rf.{0,60}/Applications/
- id: sudo-app-copy
  desc: sudo copy application bundle
  crit: suspicious
  conf: 0.95
  attack: T1554
  if:
    type: text
    regex: sudo\s+-S\s+cp\s+-r
- id: find-app-bundle
  desc: Search extracted app bundle
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: find.{0,80}-name '\*\.app'.{0,40}-type d
- id: accounts-helper-path
  desc: Masqueraded AccountsHelper implant path
  crit: suspicious
  conf: 0.95
  attack: T1036.005
  if:
    type: text
    substr: /Library/Application Support/.com.apple.accountsd/AccountsHelper
- id: accounts-helper-split-path
  desc: Split AccountsHelper implant path
  crit: suspicious
  conf: 0.9
  attack: T1036.005
  if:
    type: text
    regex: '\.com\.apple\.accountsd[\s\S]{0,160}AccountsHelper'
- id: accountsd-helper-label
  desc: Masqueraded accountsd helper label
  crit: suspicious
  conf: 0.95
  attack: T1036.005
  if:
    type: text
    substr: com.apple.accountsd.helper
- id: sudo-pipe-launchdaemon
  desc: Piped sudo LaunchDaemon installation
  crit: suspicious
  conf: 0.95
  attack: T1543.004
  if:
    type: text
    regex: sudo\s+-S\s+(cp|chown|launchctl).{0,120}LaunchDaemons
  unless:
  - id: well-known/app/tailscale::tailscale-source-token
  - type: path
    dirname: true
    regex: '(^|[\\/])tstest([\\/]|$)'
composite_rules:
- id: staged-infostealer-layout
  desc: Multi-bucket temp staging layout
  crit: suspicious
  conf: 0.92
  all:
  - id: stravy-staging-dir
  needs: 4
  any:
  - id: staging-browser-bucket
  - id: staging-extension-bucket
  - id: staging-wallet-bucket
  - id: staging-keychain-bucket
  - id: staging-notes-bucket
  - id: staging-files-bucket
- id: tmp-infostealer-layout
  desc: Temporary stealer staging layout
  crit: suspicious
  conf: 0.92
  needs: 2
  any:
  - id: filegrabber-staging-bucket
  - id: chromium-staging-bucket
  - id: desktop-wallets-staging-bucket
  - id: tmp-chunk-upload
  - id: lovemrtrump-staging-dir
  - id: micro-behaviors/fs/path/temp::tmp-out-zip
  - id: objectives/collection/archive/create::tmp-archive
- id: applescript-staging-layout
  desc: AppleScript stealer staging layout
  crit: suspicious
  conf: 0.92
  any:
  - id: staged-infostealer-layout
  - id: tmp-infostealer-layout
- id: applescript-password-phish-validate
  desc: AppleScript password phishing with validation
  crit: suspicious
  conf: 0.95
  attack: T1056.002
  all:
  - id: objectives/credential-access/validation/check::dscl-authonly-comp
  any:
  - id: protection-service-title
  - id: device-password-authorize-prompt
  - id: macos-wants-change-prompt
  - id: macos-dialog-title
  - id: objectives/credential-access/phishing/lure::hidden-answer
- id: applescript-profile-and-exfil
  desc: AppleScript profiling and archive exfiltration
  crit: suspicious
  conf: 0.95
  attack: T1041
  all:
  - id: objectives/collection/archive/create::archive-exfil
  needs: 2
  any:
  - id: x-bid-header
  - id: objectives/collection/archive/create::ditto-staging
  - id: multipart-zip-upload
  - id: multipart-dynamic-file-upload
  - id: receive-endpoint
  - id: grabber-endpoint
  - id: micro-behaviors/communications/http/endpoints::health-check-path
  - id: full-system-profile
  - id: uuid-query-command
- id: curl-chunk-upload-endpoint
  desc: curl chunk upload endpoint
  crit: suspicious
  conf: 0.94
  attack: T1041
  any:
  - id: curl-contact-upload
  - id: curl-gate-chunk-upload
- id: applescript-chunked-curl-exfil
  desc: AppleScript chunked curl archive exfiltration
  crit: hostile
  conf: 0.97
  attack: T1041
  all:
  - id: objectives/collection/archive/create::ditto-staging
  - id: split-outzip-chunks
  - id: curl-chunk-upload-endpoint
  needs: 2
  any:
  - id: x-chunk-headers
  - id: buildid-upload-header
  - id: tmp-chunk-upload
- id: applescript-direct-chunked-upload
  desc: AppleScript chunked curl upload
  crit: hostile
  conf: 0.96
  attack: T1041
  all:
  - id: split-outzip-chunks
  - id: curl-chunk-upload-endpoint
  - id: x-chunk-headers
  any:
  - id: buildid-upload-header
  - id: tmp-chunk-upload
- id: applescript-outzip-curl-exfil
  desc: AppleScript /tmp/out.zip curl exfiltration
  crit: hostile
  conf: 0.96
  attack: T1041
  all:
  - id: curl-outzip-data-binary
  - id: buildid-upload-header
  any:
  - id: uuid-upload-header
  - id: user-upload-header
  - id: micro-behaviors/fs/path/temp::tmp-out-zip
- id: applescript-upload-php-exfil
  desc: AppleScript upload.php archive exfiltration
  crit: hostile
  conf: 0.95
  attack: T1041
  all:
  - id: curl-upload-php
  any:
  - id: micro-behaviors/fs/path/temp::tmp-out-zip
  - id: objectives/collection/archive/create::ditto-staging
  - id: buildid-upload-header
  - id: uuid-upload-header
- id: applescript-grabber-archive-signal
  desc: AppleScript grabber archive creation
  crit: suspicious
  conf: 0.93
  attack: T1560.001
  for: [applescript]
