defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  attack: T1119
composite_rules:
  - id: python-photo-stealer
    desc: Python Photo Stealer Behavior
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/enumerate/extension::search-image-extensions
      - id: micro-behaviors/fs/path/location::os-path-expanduser
      - id: metadata/import/python::glob
      - id: micro-behaviors/data/archive/zip::pyzipper-aes
      - id: micro-behaviors/data/archive/zip::pyzipper-setpassword
