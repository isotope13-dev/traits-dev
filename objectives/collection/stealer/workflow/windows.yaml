defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056.001
composite_rules:
  - id: windows-input-screen-clipboard-collector
    desc: Keyboard screen clipboard collection
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/input/keyboard::windows-hook-lifecycle
      - id: objectives/collection/screenshot/capture::gdi-dib-capture
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
    any:
      - id: micro-behaviors/os/clipboard/access::set-clipboard-data
      - id: micro-behaviors/os/clipboard/access::register-clipboard-format
      - id: micro-behaviors/hardware/input/keyboard::virtual-key-label-map
      - id: micro-behaviors/hardware/input/keyboard::polling-keylogger-api-cluster
      - id: objectives/collection/keylog/capture/
      - id: objectives/collection/clipboard/monitor/
      - id: objectives/exfiltration/stealer/credential/clipboard/
      - id: objectives/credential-access/
      - id: micro-behaviors/communications/http/upload/
    unless:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/signed/platform::microsoft
  - id: windows-native-surveillance-stealer
    desc: Native Windows input screenshot clipboard stealer
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/collection/keylog/capture::windows-hook-state-keylogger
      - id: objectives/collection/screenshot/capture::gdi-dib-capture
      - id: objectives/collection/clipboard/capture::clipboard-session-transfer
    any:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: objectives/command-and-control/dropper/execution/loader::pe-resource-api-loader-ansi
      - id: metadata/binary/resource::oversized-low-entropy-rsrc
    needs: 2
    unless:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/signed/platform::microsoft
