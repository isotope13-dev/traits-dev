defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056.001
composite_rules:
- id: windows-keyscreen-timer-collector
  desc: Windows keylogger screenshot timer collector
  crit: hostile
  conf: 0.96
  all:
  - id: objectives/collection/keylog/capture::windows-keylogger
  - id: objectives/collection/screenshot/capture::gdi-dib-capture
  - id: objectives/anti-analysis/timing/evasion::ui-timer-keypoll-gate
  any:
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/os/sysinfo/hostname::get-user-name
  unless:
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: well-known/lib/slint::slint-library
  - id: metadata/binary/framework::large-rsrc-section
- id: windows-input-screen-clipboard-collector
  desc: Keyboard screen clipboard collection
  crit: suspicious
  conf: 0.93
  all:
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
  - id: objectives/collection/screenshot/capture::gdi-dib-capture
  - id: micro-behaviors/os/clipboard/access::get-clipboard-data
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
  - id: objectives/collection/keylog/capture/
  - id: objectives/collection/clipboard/monitor/
  - id: objectives/exfiltration/stealer/credential/clipboard/
  - id: objectives/credential-access/
  - id: micro-behaviors/communications/http/upload/
  unless:
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/signed/platform::microsoft
  - id: well-known/tool/reverse-engineering/resource-hacker::resource-hacker
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
- id: windows-native-surveillance-stealer
  desc: Native Windows input clipboard stealer
  crit: hostile
  conf: 0.96
  all:
  - id: objectives/collection/keylog/capture::windows-hook-state-keylogger
  - id: objectives/collection/clipboard/capture::clipboard-session-transfer
  unless:
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/signed/platform::microsoft
