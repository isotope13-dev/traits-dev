defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056.001
composite_rules:
  - id: windows-input-screen-clipboard-collector
    desc: Keyboard screen clipboard collection
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/input/keyboard::windows-hook-lifecycle
      - id: micro-behaviors/hardware/display/screen::create-dib-section
      - id: micro-behaviors/hardware/display/screen::gdi-create-compatible-bitmap
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: micro-behaviors/os/clipboard/access::set-clipboard-data
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/process/sync/mutex::guid-mutex
      - id: metadata/binary/resource::resource-heavy-low-entropy-rsrc
    unless:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/signed/platform::microsoft
