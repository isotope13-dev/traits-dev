defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056.001
composite_rules:
- id: windows-keyscreen-timer-collector
  desc: Windows keylogger screenshot timer collector
  crit: hostile
  conf: 0.96
  all:
  - id: objectives/collection/keylog/capture::windows-keylogger
  - id: objectives/collection/screenshot/capture::gdi-dib-capture
  - id: objectives/anti-analysis/timing/evasion::ui-timer-keypoll-gate
  any:
  - id: micro-behaviors/ui/window/manage/control::get-window-text
  - id: micro-behaviors/ui/window/manage/control::get-foreground-window
  - id: micro-behaviors/os/sysinfo/hostname::get-user-name
  unless:
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: well-known/lib/slint::slint-library
  - id: metadata/binary/framework::large-rsrc-section
- id: windows-input-screen-clipboard-collector
  desc: Keyboard screen clipboard collection
  crit: suspicious
  conf: 0.93
  all:
  - id: objectives/collection/screenshot/capture::gdi-dib-capture
  - id: micro-behaviors/os/clipboard/access::get-clipboard-data
  any:
  - id: objectives/collection/keylog/capture::windows-rawinput
  - id: objectives/collection/keylog/capture::polling-input-monitor
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
  - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
  - id: objectives/collection/keylog/capture/
  - id: objectives/collection/clipboard/monitor/
  - id: objectives/exfiltration/stealer/credential/clipboard/
  - id: objectives/credential-access/
  - id: micro-behaviors/communications/http/upload/
  unless:
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/signed/platform::microsoft
  - id: well-known/tool/reverse-engineering/
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: well-known/tool/sysadmin/disk-utility::winhex-xways
- id: windows-evasive-native-surveillance-stealer
  desc: Evasive native input clipboard stealer
  crit: hostile
  conf: 0.96
  all:
  - id: windows-input-screen-clipboard-collector
  any:
  - id: objectives/anti-analysis/timing/evasion::waitable-timer-sleep-mask
  - id: objectives/command-and-control/dropper/execution/inject::self-map-extract-execute
  - id: objectives/anti-static/obfuscation/string/anomaly::stack-string-obfuscated-pe
  needs: 2
  unless:
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/signed/platform::microsoft
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: well-known/tool/sysadmin/disk-utility::winhex-xways
- id: windows-native-surveillance-stealer
  desc: Native Windows input clipboard stealer
  crit: hostile
  conf: 0.96
  all:
  - id: objectives/collection/keylog/capture::windows-hook-state-keylogger
  - id: objectives/collection/clipboard/capture::clipboard-session-transfer
  unless:
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/signed/platform::microsoft
- id: windows-browser-clipboard-stealer
  desc: Browser local storage and clipboard stealer
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/discovery/host/browser::local-storage
  - id: objectives/collection/clipboard/capture::clipboard-session-transfer
  needs: 2
  any:
  - id: micro-behaviors/fs/config/system::ini-read-write-cycle
  - id: metadata/binary/section/metrics::multiple-random-zero-perm-sections
  - id: objectives/anti-static/obfuscation/string/junking::chromium-proxy-source-path
  - id: objectives/evasion/masquerade/identity/fabricated::networked-fake-version-resource
  unless:
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/signed/platform::microsoft
- id: tauri-native-keyscreen-collector
  desc: Tauri app with raw input and screenshot capture
  crit: hostile
  conf: 0.97
  all:
  - id: metadata/build/framework::tauri-runtime
  - id: objectives/collection/keylog/capture::get-raw-input-data
  - id: objectives/collection/keylog/capture::register-raw-input-devices
  - id: objectives/collection/screenshot/capture::gdi-dib-capture
  any:
  - id: objectives/anti-analysis/debugger-detect/check::debugger-api
  - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  unless:
  - id: metadata/signed/platform::microsoft
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
