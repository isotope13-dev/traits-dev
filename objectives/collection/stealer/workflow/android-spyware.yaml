defaults:
  platforms: [android]
  for: [apk, zip]

traits:
  - id: cleaner-location-privacy-module
    desc: Cleaner location privacy module
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: "res/mipmap-xxhdpi-v4/ic_home_location_privacy_clean.webp"

  - id: cleaner-social-clean-module
    desc: Cleaner social app module
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: "res/mipmap-xxhdpi-v4/ic_home_social_clean.webp"

  - id: cleaner-app-uninstall-module
    desc: Cleaner app inventory module
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: "res/mipmap-xxhdpi-v4/ic_home_app_uninstall.webp"

  - id: cleaner-app-scan-animation
    desc: Cleaner app scan animation
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: "res/raw/loader_animation_scan_app.json"

  - id: cleaner-location-scan-animation
    desc: Cleaner location scan animation
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: "res/raw/loader_animation_scan_location.json"

composite_rules:
  - id: android-accessibility-screen-capture
    desc: Android accessibility screen capture
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-service-config
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-request-layout
      - id: micro-behaviors/hardware/display/screen::android-screen-capture-capability

  - id: android-camera-screen-capture
    desc: Android camera and screen capture
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/display/camera::android-camera-capture-capability
      - id: micro-behaviors/hardware/display/screen::android-screen-capture-capability

  - id: android-audio-video-spyware
    desc: Android audio video spyware
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/hardware/display/camera::android-camera-capture-capability
      - id: micro-behaviors/hardware/input/audio::android-audio-recording-capability
      - id: micro-behaviors/hardware/display/screen::android-screen-capture-capability

  - id: android-accessibility-sensor-spyware
    desc: Android accessibility sensor spyware
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-service-config
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-request-layout
      - id: micro-behaviors/hardware/display/screen::android-screen-capture-capability
      - id: micro-behaviors/hardware/display/camera::android-camera-capture-capability
    any:
      - id: micro-behaviors/ui/window/manage::android-floating-window-layouts
      - id: micro-behaviors/os/privilege/manifest::device-admin-policy-resource
      - id: micro-behaviors/hardware/display/screen::android-screen-lock-layout

  - id: android-notification-usage-surveillance
    desc: Android notification usage surveillance
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/privilege/manifest::bind-notification-listener
      - id: micro-behaviors/os/privilege/manifest::notification-listener-service
      - id: micro-behaviors/os/privilege/manifest::package-usage-stats
    any:
      - id: micro-behaviors/os/privilege/manifest::query-all-packages
      - id: micro-behaviors/os/privilege/manifest::get-installed-apps

  - id: android-cleaner-privacy-scan-modules
    desc: Android cleaner privacy scan modules
    crit: suspicious
    conf: 0.94
    all:
      - id: cleaner-location-privacy-module
      - id: cleaner-social-clean-module
      - id: cleaner-app-uninstall-module
    any:
      - id: cleaner-app-scan-animation
      - id: cleaner-location-scan-animation
      - id: metadata/package::apk-multiple-secondary-dex

  - id: android-cleaner-surveillance-riskware
    desc: Android cleaner surveillance riskware
    crit: hostile
    conf: 0.98
    all:
      - id: android-notification-usage-surveillance
      - id: micro-behaviors/os/sysinfo/platform/mobile::android-persistent-id-collection
      - id: micro-behaviors/os/telemetry/activity::android-attribution-tracking-sdks
      - id: objectives/command-and-control/channel/http/uri::android-cleaner-signed-backend-channel
    any:
      - id: objectives/persistence/system/service::android-boot-jobservice-persistence
      - id: objectives/impact/wipe/disk/mass-delete::android-full-storage-file-shredder
