# Stealer / Spyware - JavaScript
# ATT&CK: T1005, T1056, T1113
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  # === Helpers ===
  - id: js-defanged-c2
    desc: Defanged C2 IP address
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/communications/ip/parse::ip-defanged-brackets
      - id: micro-behaviors/communications/ip/parse::ip-defanged-parentheses
  - id: js-browser-target
    desc: Targets browser data paths
    crit: suspicious
    conf: 0.8
    any:
      - id: objectives/credential-access/browser/chromium/
  - id: js-browser-or-cloud-target
    desc: Targets browser or cloud credentials
    crit: suspicious
    conf: 0.88
    any:
      - id: js-browser-target
      - id: objectives/credential-access/cloud/token::gcp-default-credentials
      - id: objectives/discovery/cloud/metadata::gcp-service-account-email
  - id: js-shell-or-daemonized-exec
    desc: Shell or daemonized process execution context
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: micro-behaviors/process/create/shell/bridge::js-spawn
      - id: micro-behaviors/process/create/shell/bridge::child-process-import-runtime
      - id: micro-behaviors/process/create/spawn::process-env-daemonized-flag
  - id: js-token-harvest-evidence
    desc: GitHub or registry token harvesting evidence
    crit: suspicious
    conf: 0.95
    any:
      - id: objectives/credential-access/api-harvest/token::git-and-registry-token-harvest
      - id: objectives/credential-access/api-harvest/token::github-token-pattern-harvest
      - id: objectives/credential-access/api-harvest/token::npm-token-regex-harvest
  # === Hostile Rules ===
  - id: js-spyware-bundle
    desc: JavaScript spyware bundle (Keylogging + Screenshots + Network)
    crit: hostile
    conf: 0.95
    attack: "T1056"
    all:
      - id: micro-behaviors/hardware/input/keyboard::global-keyboard-listener
      - id: micro-behaviors/hardware/display/screen::import-node-screenshots
      - id: micro-behaviors/communications/http/lib/axios::axios
  - id: js-wallet-spyware-collector
    desc: JavaScript wallet spyware collection bundle
    crit: hostile
    conf: 0.96
    attack: "T1056, T1552"
    all:
      - id: micro-behaviors/hardware/input/keyboard::global-keyboard-listener
      - id: micro-behaviors/hardware/display/screen::import-node-screenshots
      - id: micro-behaviors/communications/http/post::formdata-class
    any:
      - id: objectives/credential-access/wallet/mnemonic::mnemonic-word
      - id: objectives/credential-access/wallet/mnemonic::metamask-word
  - id: js-file-stealer-recursive
    desc: Recursive file stealer targeting sensitive data
    crit: hostile
    conf: 0.90
    attack: "T1005"
    all:
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
      - id: micro-behaviors/fs/enumerate/directory::file-search-exclude-common
      - id: micro-behaviors/communications/http/lib/axios::axios
  - id: js-browser-stealer-c2
    desc: Browser data stealer with defanged C2 IP
    crit: hostile
    conf: 0.95
    attack: "T1555.003"
    all:
      - id: micro-behaviors/communications/http/lib/axios::axios
      - id: js-defanged-c2
      - id: js-browser-target
  - id: obfuscated-browser-stealer
    desc: Obfuscated browser/credential stealer
    crit: hostile
    conf: 0.95
    attack: "T1555.003"
    all:
      - id: objectives/discovery/host/browser::browser-names
      - id: objectives/anti-static/pack::packed-string-decryptor
    any:
      - id: objectives/credential-access/discord/token::appdata-ref
      - id: objectives/credential-access/discord/token::ldb-extension
      - id: micro-behaviors/fs/write/file/direct::js-file-write
  - id: npm-system-stealer-hostile
    desc: Hostile NPM system stealer (Recon + Evasion + Exfil)
    crit: hostile
    conf: 1.0
    all:
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::dangerous-requires
      - id: objectives/anti-analysis/sandbox-detect/detection::evasion-checks
    any:
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::npm-data-exfil
      - id: objectives/exfiltration/dns::js-dns-tunneling-exfil
  - id: js-shell-token-harvester
    desc: Shell-driven GitHub/npm token collection
    crit: hostile
    conf: 0.98
    all:
      - id: js-shell-or-daemonized-exec
      - id: js-token-harvest-evidence
    downgrade:
      any:
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: metadata/library/structure::js-large-module-bundle
  - id: js-daemonized-credential-collector
    desc: Detached JavaScript credential collector
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/process/create/spawn::detached-self-reexec
    any:
      - id: js-shell-token-harvester
      - id: objectives/exfiltration/http::github-repo-contents-exfil
  - id: js-browser-cloud-secret-collector
    desc: Recursive browser and cloud credential collector
    crit: suspicious
    conf: 0.94
    all:
      - id: js-browser-or-cloud-target
      - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
    any:
      - id: objectives/credential-access/cloud/token::gcp-default-credentials
      - id: objectives/discovery/cloud/metadata::metadata-harvesting
  - id: js-ci-container-aware-collector
    desc: CI and container aware credential collector
    crit: suspicious
    conf: 0.94
    all:
      - id: js-browser-cloud-secret-collector
    any:
      - id: objectives/discovery/system/fingerprint/cicd::js-runner-fingerprinting
      - id: micro-behaviors/os/container/runtime::dockerenv
      - id: micro-behaviors/fs/proc/container::container-self-cgroup
