# Stealer / Spyware - JavaScript
# ATT&CK: T1005, T1056, T1113
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  # === Helpers ===
  # === Hostile Rules ===
  - id: js-spyware-bundle
    desc: JavaScript spyware bundle (Keylogging + Screenshots + Network)
    crit: hostile
    conf: 0.95
    attack: "T1056"
    all:
      - id: micro-behaviors/hardware/input/keyboard/listener::global-keyboard-listener
      - id: micro-behaviors/hardware/display/screen::import-node-screenshots
      - id: micro-behaviors/communications/http/lib/axios::axios
  - id: js-wallet-spyware-collector
    desc: JavaScript wallet spyware collection bundle
    crit: hostile
    conf: 0.96
    attack: "T1056, T1552"
    all:
      - id: micro-behaviors/hardware/input/keyboard/listener::global-keyboard-listener
      - id: micro-behaviors/hardware/display/screen::import-node-screenshots
      - id: micro-behaviors/communications/http/post::formdata-class
    any:
      - id: objectives/credential-access/wallet/keywords::mnemonic-word
      - id: objectives/credential-access/wallet/keywords::metamask-word
  - id: js-file-stealer-recursive
    desc: Recursive file stealer targeting sensitive data
    crit: hostile
    conf: 0.90
    attack: "T1005"
    near_bytes: 32768
    all:
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
      - id: micro-behaviors/fs/enumerate/directory::file-search-exclude-common
      - id: micro-behaviors/communications/http/lib/axios::axios
    unless:
      - id: metadata/library/structure/
  - id: js-browser-stealer-c2
    desc: Browser data stealer with defanged C2 IP
    crit: hostile
    conf: 0.95
    attack: "T1555.003"
    all:
      - id: micro-behaviors/communications/http/lib/axios::axios
      - id: objectives/credential-access/browser/chromium/
    any:
      - id: micro-behaviors/communications/ip/parse::ip-defanged-brackets
      - id: micro-behaviors/communications/ip/parse::ip-defanged-parentheses
  - id: obfuscated-browser-stealer
    desc: Obfuscated browser/credential stealer
    crit: hostile
    conf: 0.95
    attack: "T1555.003"
    all:
      - id: objectives/discovery/host/browser/identity::browser-names
      - id: objectives/anti-static/obfuscation/string/dynamic::arithmetic-decoder-wrapper-call
    any:
      - id: objectives/credential-access/discord/token::appdata-ref
      - id: objectives/credential-access/discord/token::ldb-extension
      - id: micro-behaviors/fs/write/file/direct::js-file-write
  - id: npm-system-stealer-hostile
    desc: Hostile NPM system stealer (Recon + Evasion + Exfil)
    crit: hostile
    conf: 1.0
    all:
      - id: metadata/import/builtin::runtime-api-import-set
      - id: objectives/anti-analysis/sandbox-detect/suite::evasion-checks
    any:
      - id: objectives/supply-chain/recon-exfil/host-profile/install-context::npm-data-exfil
      - id: objectives/exfiltration/dns/tunnel::js-dns-tunneling-exfil
  - id: js-shell-token-harvester
    desc: Shell-driven GitHub/npm token collection
    crit: hostile
    conf: 0.98
    near_lines: 80
    all:
      - id: objectives/credential-access/api-harvest/token::github-token-pattern-harvest
    any:
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: micro-behaviors/process/create/shell/bridge::spawn-call
      - id: micro-behaviors/process/create/shell/bridge::child-process-import-runtime
      - id: micro-behaviors/process/create/spawn::process-env-daemonized-flag
    unless:
      - id: metadata/package/quality/false-positives::github-cli-auth-helper-context
    downgrade:
      any:
        - id: micro-behaviors/process/interpreter/vm/
        - id: metadata/library/structure::js-large-module-bundle
  - id: js-daemonized-credential-collector
    desc: Detached JavaScript credential collector
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/process/create/spawn::detached-self-reexec
    any:
      - id: js-shell-token-harvester
      - id: objectives/exfiltration/http/upload::github-repo-contents-exfil
  - id: js-browser-login-data-stealer
    desc: JavaScript browser credential stealer
    crit: hostile
    conf: 0.98
    attack: "T1555.003"
    all:
      - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
  - id: js-discord-stealer
    desc: JavaScript Discord credential or data stealer
    crit: hostile
    conf: 0.98
    attack: "T1555.003"
    all:
      - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
      - id: objectives/exfiltration/messaging/webhook::discord-webhook-pattern
    any:
      - id: objectives/credential-access/browser/chromium/
      - id: objectives/credential-access/cloud/token/files::js-recursive-cloud-credential-scan
  - id: aws-credential-local-staging
    desc: Stages AWS credentials in a local file
    crit: hostile
    conf: 0.99
    attack: T1074.001,T1552.001
    all:
      - id: objectives/credential-access/cloud/aws-token::aws-ses-credential-record
      - id: objectives/credential-access/cloud/aws-token::aws-credential-save-backend
      - id: micro-behaviors/fs/write/file/stream::node-stream-record-write
    unless:
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
