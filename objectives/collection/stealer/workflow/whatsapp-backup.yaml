defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1005
traits:
  - id: whatsappbackup-user-agent
    desc: WhatsAppBackup custom User-Agent
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'WhatsAppBackup/[0-9]+(\.[0-9]+)?'
  - id: whatsappbackup-data-zip-path
    desc: WhatsAppBackup data ZIP path
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)C:\\\\?WhatsAppBackup\\\\?WhatsAppData\.zip|C:/WhatsAppBackup/WhatsAppData\.zip'
  - id: whatsappbackup-lock-path
    desc: WhatsAppBackup temp lock path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(%TEMP%|\$env:TEMP|tempfile\.gettempdir\(\)).{0,80}whatsapp_backup\.lock'
  - id: whatsappbackup-upload-endpoint
    desc: WhatsAppBackup upload endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'https?://[A-Za-z0-9.-]{4,120}/upload_(large|status)\.php\b'
composite_rules:
  - id: whatsappbackup-stealer-upload
    desc: WhatsAppBackup staged data upload
    crit: hostile
    conf: 0.97
    all:
      - id: whatsappbackup-data-zip-path
      - id: whatsappbackup-upload-endpoint
    any:
      - id: whatsappbackup-user-agent
      - id: whatsappbackup-lock-path
      - id: objectives/command-and-control/infrastructure/domain::suspicious-tld
