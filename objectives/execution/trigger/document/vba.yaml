defaults:
  for: [oledoc, ooxml, vbs]
  platforms: [windows]
traits: []
composite_rules:
  - id: auto-open-with-shell
    desc: Auto-open macro launching shell
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/process/create/macro/office::auto-open-sub-decl
      - id: micro-behaviors/process/create/macro/office::shell-or-createobject-call
  - id: office-vba-auto-execute-dropper
    desc: Auto-open macro with download capability
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
    any:
      - id: micro-behaviors/communications/http/client::xmlhttp-object
      - id: micro-behaviors/communications/http/client::urldownloadtofile-api
      - id: micro-behaviors/communications/http/client::winhttp-object
      - id: micro-behaviors/communications/http/download::webclient-downloadfile-office-vba
    needs: 1
  - id: office-vba-auto-execute-shell
    desc: Auto-open macro with shell execution
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
      - id: micro-behaviors/process/create/shell/lang::wscript-shell-object
    any:
      - id: micro-behaviors/os/env/vars::temp-path-lookup
      - id: micro-behaviors/communications/http/client::xmlhttp-object
      - id: micro-behaviors/os/wmi/query::win32-process-create
    needs: 1
