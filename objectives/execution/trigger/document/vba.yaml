defaults:
  for: [vbs]
  platforms: [windows]
  crit: suspicious
  conf: 0.92
traits:
  - id: auto-open-with-shell
    desc: Auto-open macro launches shell
    conf: 0.96
    if:
      type: raw
      regex: '(?is)(Sub\s+(AutoOpen|Document_Open|Workbook_Open|Auto_Open)\b).{0,2000}(Shell\b|WScript\.Shell|CreateObject)'
  - id: auto-close-trigger
    desc: VBA auto-close execution trigger
    conf: 0.9
    if:
      type: string
      regex: "(?i)\\b(AutoClose|Document_Close|Workbook_BeforeClose|Auto_Close|Document_BeforeClose)\\b"
  - id: workbook-activate-trigger
    desc: VBA Workbook_Activate trigger
    conf: 0.88
    if:
      type: string
      regex: "(?i)\\bWorkbook_Activate\\b"
  - id: document-beforeprint-trigger
    desc: VBA Document_BeforePrint trigger
    conf: 0.88
    if:
      type: string
      regex: "(?i)\\bDocument_BeforePrint\\b"
  - id: content-change-trigger
    desc: VBA content change execution
    conf: 0.88
    if:
      type: string
      regex: "(?i)\\b(Worksheet_Change|Worksheet_Calculate|Worksheet_SelectionChange)\\b"
composite_rules:
  - id: office-vba-auto-execute-dropper
    desc: Auto-open macro with download capability
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
    any:
      - id: micro-behaviors/communications/http/client::xmlhttp-object
      - id: micro-behaviors/communications/http/client::urldownloadtofile-api
      - id: micro-behaviors/communications/http/client::winhttp-object
      - id: micro-behaviors/communications/download-net/url::webclient-downloadfile-office-vba
    needs: 1
  - id: office-vba-auto-execute-shell
    desc: Auto-open macro with shell execution
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
      - id: micro-behaviors/process/create/shell/lang::wscript-shell-object
    any:
      - id: micro-behaviors/os/env/vars::temp-path-lookup
      - id: micro-behaviors/communications/http/client::xmlhttp-object
      - id: micro-behaviors/os/wmi/query::win32-process-create
    needs: 1
