defaults:
  for: [text, rtf, pdf]
  platforms: [windows]
composite_rules:
  - id: office-vba-remote-msi-command
    desc: Office VBA remote MSI execution
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
    any:
      - id: metadata/format/document/office::msiexec-quiet-install
      - id: micro-behaviors/process/create/shell/lang::createobject-call
