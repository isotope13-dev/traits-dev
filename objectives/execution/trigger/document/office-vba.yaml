defaults:
  for: [all]
  platforms: [windows]
traits:
  - id: autoopen-entrypoint
    desc: Word AutoOpen macro entry
    crit: notable
    conf: 0.95
    if:
      type: raw
      word: "autoopen"
      case_insensitive: true
composite_rules:
  - id: word-vba-autoexec
    desc: Word VBA autoexec trigger
    crit: notable
    conf: 0.97
    all:
      - id: metadata/format/document/office::word-vba-project
      - id: autoopen-entrypoint
  - id: word-vba-shell-autoexec
    desc: Word macro autoexec shell
    crit: suspicious
    conf: 0.98
    all:
      - id: word-vba-autoexec
      - id: micro-behaviors/process/create/shell/lang::textbox-backed-shell
