defaults:
  for: [pdf]
  platforms: [windows, macos, linux]
  crit: hostile
  conf: 0.96
  attack: T1203

composite_rules:
  - id: pdf-hidden-form-jsfuck-stager
    desc: PDF JSFuck hidden-form stager
    conf: 0.97
    all:
      - id: metadata/document/pdf/properties::pdf-jsfuck-getfield-loader
      - id: metadata/document/pdf/properties::pdf-hidden-zero-rect-form-field
      - id: metadata/document/pdf/properties::pdf-large-decoded-form-value
  - id: pdf-acrobat-privileged-c2-loader
    desc: PDF Acrobat privileged C2 loader
    conf: 0.98
    all:
      - id: metadata/document/pdf/properties::pdf-form-payload-final-js-eval
    any:
      - id: metadata/document/pdf/properties::pdf-form-payload-readfileintostream
      - id: metadata/document/pdf/properties::pdf-form-payload-trustedfunction
      - id: metadata/document/pdf/properties::pdf-form-payload-rss-addfeed
  - id: pdf-stream-obfuscated-js-exploit
    desc: PDF stream obfuscated JS exploit
    conf: 0.94
    all:
      - id: micro-behaviors/process/create/eval::pdf-stream-js-eval-call
    any:
      - id: micro-behaviors/process/create/eval::pdf-stream-js-unescape
      - id: micro-behaviors/process/create/eval::pdf-stream-js-fromcharcode
      - id: micro-behaviors/process/create/eval::pdf-stream-js-util-bytetochar
  - id: pdf-known-acrobat-cve-api
    desc: PDF known Acrobat CVE API
    conf: 0.96
    any:
      - id: micro-behaviors/process/interpreter/document-api/
  - id: pdf-richvalue-uaf-js-pattern
    desc: PDF richValue UAF JS pattern
    conf: 0.96
    all:
      - id: micro-behaviors/process/create/eval::pdf-stream-object-defineproperty
      - id: micro-behaviors/process/create/eval::pdf-stream-event-richvalue
      - id: micro-behaviors/process/create/eval::pdf-stream-resetform
