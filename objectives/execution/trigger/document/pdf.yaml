defaults:
  for: [pdf]
  platforms: [windows, macos, linux]
  crit: hostile
  conf: 0.96
  attack: T1203

composite_rules:
  - id: pdf-hidden-form-jsfuck-stager
    desc: PDF JSFuck hidden-form stager
    conf: 0.97
    all:
      - id: metadata/document/pdf/properties::pdf-jsfuck-getfield-loader
      - id: metadata/document/pdf/properties::pdf-hidden-zero-rect-form-field
      - id: metadata/document/pdf/properties::pdf-large-decoded-form-value
  - id: pdf-acrobat-privileged-c2-loader
    desc: PDF Acrobat privileged C2 loader
    conf: 0.98
    all:
      - id: metadata/document/pdf/properties::pdf-form-payload-final-js-eval
    any:
      - id: metadata/document/pdf/properties::pdf-form-payload-readfileintostream
      - id: metadata/document/pdf/properties::pdf-form-payload-trustedfunction
      - id: metadata/document/pdf/properties::pdf-form-payload-rss-addfeed
