# IDE Triggers
# Detects automatic execution triggers in IDE configurations.
defaults:
  platforms: [windows, unix]
  # tasks.json is typed `json`, not javascript — must be listed or the
  # folderOpen autorun trigger goes undetected.
  for: [javascript, shell, json]
traits:
  - id: ide-auto-run-task
    desc: VS Code task runs on open
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '["'']runOn["'']\s*:\s*["'']folderOpen["'']'
