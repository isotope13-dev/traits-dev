# Obsidian Plugin Execution
# MBC: B0025 (Remote Command Execution)
# ATT&CK: T1204 (User Execution)
defaults:
  platforms: [macos, windows, linux]
  for:
  - javascript
  - typescript
  - html
  - markdown
  - package.json
  size_max: 1048576
traits:
- id: shell-commands-config--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(?i)\.obsidian[\\/]+plugins[\\/]+(obsidian-)?shell-?commands[\\/]+data\.json'
  count_max: 1020293
- id: shell-commands-config--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '["'']obsidian-shellcommands["'']'
  count_max: 1020294
- id: shell-commands-data-json--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '(?i)"(id|plugin)"\s*:\s*"obsidian-shellcommands"'
  count_max: 1020295
- id: shell-commands-data-json--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"shellCommands"\s*:'
  count_max: 1020296
- id: shell-commands-data-json--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"platformSpecificCommands"\s*:'
  count_max: 1020297
- id: shell-commands-powershell-stager--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(?i)(powershell|pwsh)[\s\S]{0,500}(iwr|Invoke-WebRequest)'
  count_max: 1020298
- id: shell-commands-powershell-stager--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(?i)(Invoke-Expression|iex)[\s\S]{0,500}(iwr|Invoke-WebRequest)'
  count_max: 1020299
- id: shell-commands-powershell-stager--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(?i)(powershell|pwsh)[\s\S]{0,500}(Start-BitsTransfer|OutFile)'
  count_max: 1020300
- id: shell-commands-powershell-stager--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(?i)(Invoke-Expression|iex)[\s\S]{0,500}(Start-BitsTransfer|OutFile)'
  count_max: 1020301
- id: shell-commands-osascript-stager
  desc: Obsidian osascript download stager
  crit: suspicious
  conf: 0.96
  platforms: [macos]
  if:
    type: text
    regex: '(?i)(curl|osascript)[\s\S]{0,500}\|\s*osascript'

- id: hider-plugin-config
  desc: Obsidian Hider plugin reference
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: '(?i)\.obsidian[\\/]+plugins[\\/]+obsidian-hider\b|["'']obsidian-hider["'']'

- id: shell-commands-event-trigger--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)(on-open-vault|on-open-file)"

  count_max: 1020304
- id: shell-commands-event-trigger--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)(on-save-file|on-startup)"

  count_max: 1020305
- id: shell-commands-event-trigger--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)(on-quit|every\\s*n\\s*seconds)"

  count_max: 1020306
composite_rules:
- id: obsidian-plugin-abuse
  desc: Potential Obsidian plugin-based execution abuse
  crit: suspicious
  conf: 0.85
  all:
  - id: shell-commands-config
  any:
  - id: micro-behaviors/process/create/shell
  - id: micro-behaviors/process/create/shell/lang::powershell-keyword
  - id: micro-behaviors/process/create/script/osascript::osascript-exec
  - id: shell-commands-event-trigger
  - id: hider-plugin-config
  - id: shell-commands-data-json
- id: obsidian-plugin-download-execution
  desc: Obsidian plugin download execution
  crit: hostile
  conf: 0.98
  all:
  - id: shell-commands-data-json
  any:
  - id: shell-commands-powershell-stager
  - id: shell-commands-osascript-stager
- id: shell-commands-config
  desc: Obsidian shell commands plugin reference
  crit: notable
  conf: 0.95
  any:
  - id: shell-commands-config--rx-1
  - id: shell-commands-config--rx-2
- id: shell-commands-data-json
  desc: Obsidian shellcommands data JSON
  crit: notable
  conf: 0.94
  any:
  - id: shell-commands-data-json--rx-3
  - id: shell-commands-data-json--rx-4
  - id: shell-commands-data-json--rx-5
- id: shell-commands-powershell-stager
  desc: Obsidian PowerShell download stager
  crit: suspicious
  conf: 0.96
  any:
  - id: shell-commands-powershell-stager--rx-6
  - id: shell-commands-powershell-stager--rx-7
  - id: shell-commands-powershell-stager--rx-8
  - id: shell-commands-powershell-stager--rx-9
- id: shell-commands-event-trigger
  desc: Obsidian shell command event trigger
  crit: notable
  conf: 0.9
  any:
  - id: shell-commands-event-trigger--rx-10
  - id: shell-commands-event-trigger--rx-11
  - id: shell-commands-event-trigger--rx-12
