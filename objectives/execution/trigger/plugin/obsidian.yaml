# Obsidian Plugin Execution
# MBC: B0025 (Remote Command Execution)
# ATT&CK: T1204 (User Execution)
defaults:
  platforms: [macos, windows, linux]
  for:
  - javascript
  - typescript
  - html
  - markdown
  - package.json
  size_max: 1048576
traits:
- id: shell-commands-config--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(?i)\.obsidian[\\/]+plugins[\\/]+(obsidian-)?shell-?commands[\\/]+data\.json'
  count_max: 1020293
- id: shell-commands-config--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '["'']obsidian-shellcommands["'']'
  count_max: 1020294
- id: hider-plugin-config
  desc: Obsidian Hider plugin reference
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: '(?i)\.obsidian[\\/]+plugins[\\/]+obsidian-hider\b|["'']obsidian-hider["'']'

- id: shell-commands-event-trigger--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)(on-open-vault|on-open-file)"

  count_max: 1020304
- id: shell-commands-event-trigger--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)(on-save-file|on-startup)"

  count_max: 1020305
- id: shell-commands-event-trigger--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(?i)(on-quit|every\\s*n\\s*seconds)"

  count_max: 1020306
composite_rules:
- id: obsidian-plugin-abuse
  desc: Potential Obsidian plugin-based execution abuse
  crit: suspicious
  conf: 0.85
  all:
  - id: shell-commands-config
  any:
  - id: micro-behaviors/process/create/shell
  - id: micro-behaviors/process/create/shell/lang::powershell-keyword
  - id: micro-behaviors/process/create/script/osascript::osascript-exec
  - id: shell-commands-event-trigger
  - id: hider-plugin-config
  - id: micro-behaviors/data/plugin::shellcommands-data-json
- id: obsidian-plugin-download-execution
  desc: Obsidian plugin download execution
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/data/plugin::shellcommands-data-json
  any:
  - id: micro-behaviors/data/plugin::shellcommands-powershell-stager
  - id: micro-behaviors/data/plugin::shellcommands-osascript-stager
- id: shell-commands-config
  desc: Obsidian shell commands plugin reference
  crit: notable
  conf: 0.95
  any:
  - id: shell-commands-config--rx-1
  - id: shell-commands-config--rx-2
- id: shell-commands-event-trigger
  desc: Obsidian shell command event trigger
  crit: notable
  conf: 0.9
  any:
  - id: shell-commands-event-trigger--rx-10
  - id: shell-commands-event-trigger--rx-11
  - id: shell-commands-event-trigger--rx-12
