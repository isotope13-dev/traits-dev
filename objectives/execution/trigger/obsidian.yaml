# Obsidian Plugin Execution
# MBC: B0025 (Remote Command Execution)
# ATT&CK: T1204 (User Execution)
defaults:
  platforms: [macos, windows, linux]
  for:
    - javascript
    - typescript
    - html
    - markdown
    - package.json
  size_max: 1048576
traits:
  - id: shell-commands-config
    desc: Obsidian shell commands plugin reference
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)\.obsidian[\\/]+plugins[\\/]+(?:obsidian-)?shell-?commands[\\/]+data\.json|["'']obsidian-shellcommands["'']'
  - id: shell-commands-data-json
    desc: Obsidian shellcommands data JSON
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)"(?:id|plugin)"\s*:\s*"obsidian-shellcommands"|"shellCommands"\s*:|"platformSpecificCommands"\s*:'
  - id: shell-commands-powershell-stager
    desc: Obsidian PowerShell download stager
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)(powershell|pwsh|Invoke-Expression|iex)[\s\S]{0,500}(iwr|Invoke-WebRequest|Start-BitsTransfer|OutFile)'
  - id: shell-commands-osascript-stager
    desc: Obsidian osascript download stager
    crit: suspicious
    conf: 0.96
    platforms: [macos]
    if:
      type: text
      regex: '(?i)(curl|osascript)[\s\S]{0,500}\|\s*osascript'

  - id: hider-plugin-config
    desc: Obsidian Hider plugin reference
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)\.obsidian[\\/]+plugins[\\/]+obsidian-hider\b|["'']obsidian-hider["'']'

  - id: shell-commands-event-trigger
    desc: Obsidian shell command event trigger
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "(?i)(on-open-vault|on-open-file|on-save-file|on-startup|on-quit|every\\s*n\\s*seconds)"

composite_rules:
  - id: obsidian-plugin-abuse
    desc: Potential Obsidian plugin-based execution abuse
    crit: suspicious
    conf: 0.85
    all:
      - id: shell-commands-config
    any:
      - id: micro-behaviors/process/create/shell
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
      - id: micro-behaviors/process/create/script::osascript-exec
      - id: shell-commands-event-trigger
      - id: hider-plugin-config
      - id: shell-commands-data-json
  - id: obsidian-plugin-download-execution
    desc: Obsidian plugin download execution
    crit: hostile
    conf: 0.98
    all:
      - id: shell-commands-data-json
    any:
      - id: shell-commands-powershell-stager
      - id: shell-commands-osascript-stager
