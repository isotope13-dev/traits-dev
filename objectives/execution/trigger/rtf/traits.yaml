defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [rtf]
traits:
  - id: objupdate
    desc: RTF objupdate directive forcing object update/execution.
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: 'objupdate'
  - id: objautlink
    desc: RTF objautlink directive for automatic linking.
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: 'objautlink'
