defaults:
  for: [rtf]
traits:
  - id: objupdate
    desc: RTF objupdate directive forcing object update/execution.
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: 'objupdate'
  - id: objautlink
    desc: RTF objautlink directive for automatic linking.
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: 'objautlink'
