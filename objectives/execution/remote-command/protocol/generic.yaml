# Remote Command Execution
defaults:
  for: [text, shell, ruby, python, javascript, php, powershell, vbs, applescript]
traits:
  - id: generic-dup
    desc: "Function to execute remote commands"
    crit: notable
    conf: 0.2
    if:
      type: string
      # Match executeCommand but exclude ObjC selectors (trailing colon)
      # and common legitimate patterns like executeCommandConfiguration
      regex: "(?i)\\bexecuteCommand\\b"
    not:
      - regex: "(?i)executeCommand(:|Configuration)"
