# Windows Background Command Execution
# Detects commands designed to run in background/hidden on Windows
# ATT&CK: T1059.003 (Windows Command Shell)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python, shell, php, javascript]
  attack: "T1059.003"
  mbc: "E1059"
traits:
  # Windows 'start' command for background execution
  - id: start-command
    desc: "Windows 'start' command for background"
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: "\\bstart\\s+['\"]?\\{?\\$?\\w*executable"
  # Start with /b flag (no window)
  - id: start-hidden
    desc: "Windows 'start /b' hidden background"
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: "\\bstart\\s+/[bB]\\s"
  # Start with /min flag (minimized)
  - id: start-minimized
    desc: "Windows 'start /min' minimized process"
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: "\\bstart\\s+/min\\s"
  # PowerShell hidden window
  - id: powershell-hidden
    desc: "PowerShell hidden window execution"
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '(?i)pow\^?ershell.{0,80}-(w|window\^?style)\s+hi\^?dden'
  - id: powershell-hidden-tokenized
    desc: "Tokenized PowerShell windowstyle marker"
    crit: suspicious
    conf: 0.82
    for: [javascript, vbs, batch, shell]
    if:
      type: raw
      regex: '(?i)WINl8y7.{0,24}wS.{0,24}ncibn4e81u2I'
  # cmd.exe /c with start
  - id: cmd-start
    desc: "cmd.exe /c with background start"
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: "cmd(\\.exe)?\\s*/[cC]\\s+start"
  - id: cmd-powershell-chain-tokenized
    desc: "cmd.exe launching PowerShell chain"
    crit: suspicious
    conf: 0.86
    for: [javascript, vbs, batch, shell]
    if:
      type: raw
      regex: '(?i)cmd\.exe.{0,24}/c.{0,40}P\^?OWeR'
composite_rules:
  # Background pip install on Windows (common malware pattern)
  - id: hidden-pip-install
    desc: "Background pip install via Windows"
    crit: suspicious
    conf: 0.95
    all:
      - id: start-hidden
      - id: micro-behaviors/os/package-manager/install::pip-install
