defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1047
  mbc: E1043
traits:
- id: swbem-locator-progid
  desc: SWbemLocator COM ProgID
  crit: component
  conf: 0.9
  if:
    type: text
    exact: "@WbemScripting.SWbemLocator"
- id: cimv2-namespace-string
  desc: WMI CIMV2 namespace
  crit: component
  conf: 0.88
  if:
    type: text
    exact: "@root\\cimv2"
- id: win32-process-class-string
  desc: Win32_Process class string
  crit: component
  conf: 0.88
  if:
    type: text
    exact: "@Win32_Process"
- id: wmi-execmethod-string
  desc: WMI ExecMethod string
  crit: component
  conf: 0.88
  if:
    type: text
    exact: "@ExecMethod"
- id: wmi-commandline-property
  desc: WMI CommandLine property
  crit: component
  conf: 0.88
  if:
    type: text
    exact: "@CommandLine"
- id: wmi-spawn-parameter-cluster--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: '@(Methods_|Create)'
- id: wmi-spawn-parameter-cluster--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: '@(InParameters|SpawnInstance_)'
- id: wmi-spawn-parameter-cluster--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: '@(Properties_|Value)'
composite_rules:
- id: com-wmi-process-create
  desc: WMI COM process execution
  crit: suspicious
  conf: 0.94
  all:
  - id: swbem-locator-progid
  - id: cimv2-namespace-string
  - id: win32-process-class-string
  - id: wmi-commandline-property
  any:
  - id: wmi-execmethod-string
  - id: wmi-spawn-parameter-cluster
  needs: 1
- id: wmi-spawn-parameter-cluster
  desc: WMI spawn parameter cluster
  crit: component
  conf: 0.86
  any:
  - id: wmi-spawn-parameter-cluster--rx-1
  - id: wmi-spawn-parameter-cluster--rx-2
  - id: wmi-spawn-parameter-cluster--rx-3
  needs: 1
