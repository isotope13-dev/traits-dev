defaults:
  platforms:
    - windows
  for:
    - javascript
    - vbs
traits:
  # Bare Win32_Process class reference. Dual-use: a *query* of it is process
  # enumeration (micro-behaviors/process/enumerate/wmi), while execution is
  # Win32_Process.Create — so the bare class name alone is not an execution
  # signal. Keep it a component building block for the wmi-process-spawn
  # composite below (which adds the Create/SpawnInstance/winmgmts evidence).
  - id: win32-process-query
    desc: Win32_Process WMI class reference
    crit: component
    conf: 0.75
    if:
      type: text
      substr: Win32_Process
    attack: T1047
    mbc: E1043
  - id: process-startup-config
    desc: Win32_ProcessStartup config
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: Win32_ProcessStartup
    attack: T1047
    mbc: E1043
  - id: wmi-get-object
    desc: GetObject WMI retrieval
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: GetObject
    attack: T1047
  - id: process-startup-fragmented
    desc: Fragmented Win32_ProcessStartup class
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Win32_Proc["'']\s*\+\s*["'']essStartup'
    attack: T1047
    mbc: E1043
  - id: win32-process-fragmented
    desc: Fragmented Win32_Process class
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'Win3["'']\s*\+\s*["'']2_Pro["'']\s*\+\s*["'']cess'
    attack: T1047
    mbc: E1043
  - id: hidden-window-flag-dup
    desc: Hidden window execution
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (ShowWindow = 0|ShowWindow=0|SW_HIDE|ShowWindow\s*=\s*0)
    attack: T1027
    mbc: E1003
    unless:
      - id: metadata/library/structure::js-large-module-bundle
  - id: process-create-call
    desc: WMI Win32_Process.Create invocation
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(Win32_Process|winmgmts|wbemServices|StdRegProv)[^\n]{0,80}\.\s*Create\s*\('
    attack: T1047
    mbc: E1043
  - id: process-startup-spawninstance-symbol
    desc: WMI startup SpawnInstance symbol
    crit: component
    conf: 0.9
    if:
      type: symbol
      regex: '(^|\.)SpawnInstance_$'
    attack: T1047
    mbc: E1043
  - id: process-startup-spawninstance-text
    desc: WMI startup SpawnInstance text
    crit: component
    conf: 0.88
    for: [javascript]
    if:
      type: text
      substr: SpawnInstance_
    attack: T1047
    mbc: E1043
  - id: showwindow-assignment-symbol
    desc: WMI ShowWindow property symbol
    crit: notable
    conf: 0.86
    if:
      type: symbol
      regex: '(^|\.)ShowWindow$'
    attack: T1564.003
    mbc: E1003
  - id: showwindow-assignment-text
    desc: WMI ShowWindow assignment text
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '(?i)\.\s*showwindow\s*='
    attack: T1564.003
    mbc: E1003
  - id: process-create-symbol
    desc: WMI process Create call symbol
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      regex: '\.Create$'
    attack: T1047
    mbc: E1043
  - id: process-create-cvar-call
    desc: WMI Create CVar command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\.\s*Create\s+CVar\s*\('
    attack: T1047
    mbc: E1043
  - id: process-create-variable-call
    desc: Variable Create method call
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\b[A-Za-z_][A-Za-z0-9_]{1,40}\.Create\s*\('
    unless:
      - id: metadata/lang/source/
      - id: metadata/library/structure/
      - type: text
        substr: dataGroup
      - type: text
        substr: dataPoints
    attack: T1047
    mbc: E1043
  - id: createobject-variable-arg
    desc: CreateObject variable argument
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)(^|[^.A-Za-z0-9_])CreateObject\s*\(\s*[A-Za-z_][A-Za-z0-9_]{2,40}\s*\)'
    attack: T1027
    mbc: E1027
composite_rules:
  - id: wmi-process-spawn
    desc: WMI process execution
    crit: suspicious
    conf: 0.85
    attack: T1047
    mbc: E1043
    needs: 2
    any:
      - id: objectives/execution/interpreter/scripting/host::winmgmts-string
      - id: win32-process-query
      - id: process-startup-config
      - id: process-startup-fragmented
      - id: win32-process-fragmented
      - id: process-create-call
  - id: wmi-fileless-malware
    desc: WMI fileless malware
    crit: hostile
    conf: 0.9
    attack: T1047
    mbc: E1043
    all:
      - id: wmi-process-spawn
      - id: objectives/execution/wmi::hidden-window-flag-dup
  - id: wmi-showwindow-hidden-property
    desc: WMI ShowWindow hidden property
    crit: notable
    conf: 0.88
    attack: T1564.003
    mbc: E1003
    any:
      - id: hidden-window-flag-dup
      - id: showwindow-assignment-symbol
      - id: showwindow-assignment-text
  - id: wmi-hidden-cvar-process-create
    desc: WMI hidden CVar process create
    crit: hostile
    conf: 0.96
    attack: T1047, T1564.003
    mbc: E1043
    all:
      - id: process-create-cvar-call
      - id: wmi-showwindow-hidden-property
    any:
      - id: micro-behaviors/process/create/macro/office::createobject-non-literal-arg
      - id: createobject-variable-arg
  - id: wmi-hidden-variable-process-create
    desc: WMI hidden variable process create
    crit: hostile
    conf: 0.95
    attack: T1047, T1564.003
    mbc: E1043
    all:
      - id: process-create-variable-call
      - id: wmi-showwindow-hidden-property
    any:
      - id: process-startup-spawninstance-symbol
      - id: process-startup-spawninstance-text
      - id: objectives/execution/interpreter/vbscript/wmi::startup-spawn-instance
  - id: wmi-hidden-startup-process
    desc: WMI hidden process startup
    crit: suspicious
    conf: 0.92
    attack: T1047, T1564.003
    mbc: E1043
    all:
      - id: process-startup-spawninstance-symbol
      - id: wmi-showwindow-hidden-property
    any:
      - id: wmi-get-object
      - id: process-startup-fragmented
  - id: wmi-hidden-powershell-process
    desc: WMI hidden PowerShell process launch
    crit: hostile
    conf: 0.96
    attack: T1047, T1059.001, T1564.003
    mbc: E1043
    all:
      - id: wmi-hidden-startup-process
      - id: process-create-symbol
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
    any:
      - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass
      - id: objectives/execution/wmi::hidden-window-flag-dup
  - id: wmi-lateral-movement
    desc: WMI lateral movement
    crit: hostile
    conf: 0.9
    attack: T1047
    mbc: E1080
    all:
      - id: wmi-process-spawn
      - id: micro-behaviors/communications/
