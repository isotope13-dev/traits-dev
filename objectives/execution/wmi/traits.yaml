defaults:
  platforms:
    - windows
  for:
    - javascript
    - vbs
traits:
  - id: win32-process-query
    desc: Win32_Process WMI class
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: Win32_Process
    attack: T1047
    mbc: E1043
  - id: process-startup-config
    desc: Win32_ProcessStartup config
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: Win32_ProcessStartup
    attack: T1047
    mbc: E1043
  - id: wmi-get-object
    desc: GetObject WMI retrieval
    crit: notable
    conf: 0.6
    if:
      type: raw
      substr: GetObject(
    attack: T1047
  - id: hidden-window-flag-dup
    desc: Hidden window execution
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: (ShowWindow = 0|ShowWindow=0|SW_HIDE|ShowWindow\s*=\s*0)
    attack: T1027
    mbc: E1003
    unless:
      - id: metadata/library/structure::js-large-module-bundle
  - id: process-create-call
    desc: Process creation via Create
    crit: notable
    conf: 0.75
    if:
      type: raw
      substr: .Create(
    attack: T1047
    mbc: E1043
composite_rules:
  - id: wmi-process-spawn
    desc: WMI process execution
    crit: suspicious
    conf: 0.85
    attack: T1047
    mbc: E1043
    needs: 2
    any:
      - id: objectives/execution/interpreter/scripting/host::winmgmts-string
      - id: win32-process-query
      - id: process-startup-config
      - id: process-create-call
  - id: wmi-fileless-malware
    desc: WMI fileless malware
    crit: hostile
    conf: 0.9
    attack: T1047
    mbc: E1043
    all:
      - id: wmi-process-spawn
      - id: objectives/execution/wmi::hidden-window-flag-dup
  - id: wmi-lateral-movement
    desc: WMI lateral movement
    crit: hostile
    conf: 0.9
    attack: T1047
    mbc: E1080
    all:
      - id: wmi-process-spawn
      - id: micro-behaviors/communications/
