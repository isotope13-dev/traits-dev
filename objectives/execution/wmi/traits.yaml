defaults:
  platforms:
    - windows
  for:
    - javascript
    - vbs
traits:
  - id: win32-process-query
    desc: Win32_Process WMI class
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: Win32_Process
    attack: T1047
    mbc: E1043
  - id: process-startup-config
    desc: Win32_ProcessStartup config
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: Win32_ProcessStartup
    attack: T1047
    mbc: E1043
  - id: wmi-get-object
    desc: GetObject WMI retrieval
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: GetObject
    attack: T1047
  - id: process-startup-fragmented
    desc: Fragmented Win32_ProcessStartup class
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Win32_Proc["'']\s*\+\s*["'']essStartup'
    attack: T1047
    mbc: E1043
  - id: win32-process-fragmented
    desc: Fragmented Win32_Process class
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'Win3["'']\s*\+\s*["'']2_Pro["'']\s*\+\s*["'']cess'
    attack: T1047
    mbc: E1043
  - id: hidden-window-flag-dup
    desc: Hidden window execution
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (ShowWindow = 0|ShowWindow=0|SW_HIDE|ShowWindow\s*=\s*0)
    attack: T1027
    mbc: E1003
    unless:
      - id: metadata/library/structure::js-large-module-bundle
  - id: process-create-call
    desc: WMI Win32_Process.Create invocation
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(Win32_Process|winmgmts|wbemServices|StdRegProv)[^\n]{0,80}\.\s*Create\s*\('
    attack: T1047
    mbc: E1043
  - id: process-startup-spawninstance-symbol
    desc: WMI startup SpawnInstance symbol
    crit: component
    conf: 0.9
    if:
      type: symbol
      regex: '\.SpawnInstance_$'
    attack: T1047
    mbc: E1043
  - id: showwindow-assignment-symbol
    desc: WMI ShowWindow property symbol
    crit: component
    conf: 0.86
    if:
      type: symbol
      regex: '\.ShowWindow$'
    attack: T1564.003
    mbc: E1003
composite_rules:
  - id: wmi-process-spawn
    desc: WMI process execution
    crit: suspicious
    conf: 0.85
    attack: T1047
    mbc: E1043
    needs: 2
    any:
      - id: objectives/execution/interpreter/scripting/host::winmgmts-string
      - id: win32-process-query
      - id: process-startup-config
      - id: process-startup-fragmented
      - id: win32-process-fragmented
      - id: process-create-call
  - id: wmi-fileless-malware
    desc: WMI fileless malware
    crit: hostile
    conf: 0.9
    attack: T1047
    mbc: E1043
    all:
      - id: wmi-process-spawn
      - id: objectives/execution/wmi::hidden-window-flag-dup
  - id: wmi-hidden-startup-process
    desc: WMI hidden process startup
    crit: suspicious
    conf: 0.92
    attack: T1047, T1564.003
    mbc: E1043
    all:
      - id: process-startup-spawninstance-symbol
      - id: showwindow-assignment-symbol
      - id: hidden-window-flag-dup
    any:
      - id: wmi-get-object
      - id: process-startup-fragmented
  - id: wmi-lateral-movement
    desc: WMI lateral movement
    crit: hostile
    conf: 0.9
    attack: T1047
    mbc: E1080
    all:
      - id: wmi-process-spawn
      - id: micro-behaviors/communications/
