defaults:
  platforms: [windows]
  for: [powershell, batch]
  attack: T1047
traits:
  - id: get-wmiobject-remote-process
    desc: Remote Win32_Process WMI query
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bGet-WmiObject\b[^\n]{0,160}\bWin32_Process\b[^\n]{0,160}[ \t]-ComputerName\b'
  - id: wmi-computername-target
    desc: WMI remote computer target
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)[ \t]-ComputerName[ \t]+\S{1,120}'
  - id: invoke-wmimethod-process-create
    desc: Remote WMI process creation
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bInvoke-WmiMethod\b[^\n]{0,220}\bWin32_Process\b[^\n]{0,220}\bCreate\b'
  - id: invoke-cimmethod-process-create
    desc: Remote CIM process creation
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bInvoke-CimMethod\b[^\n]{0,220}\bWin32_Process\b[^\n]{0,220}\bCreate\b'
    unless:
      - id: metadata/file/profile/identity::ansible-python-package-path
      - type: text
        substr: 'ProcessStartupInformation = $psi'
composite_rules:
  - id: powershell-wmi-remote-process-spawn
    desc: PowerShell WMI remote execution
    crit: hostile
    conf: 0.97
    any:
      - id: invoke-wmimethod-process-create
      - id: invoke-cimmethod-process-create
    all:
      - id: wmi-computername-target
