defaults:
  platforms: [windows]
  for: [kotlin]
  attack: T1047

traits:
  - id: kotlin-wmi-process-create
    desc: Kotlin WMI process create
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: "(?i)\\[WMI\\]['\"]win32_process['\"][\\s\\S]{0,160}\\.Create\\s*\\("

composite_rules:
  - id: kotlin-wmi-process-execution
    desc: Kotlin WMI process execution
    crit: suspicious
    conf: 0.95
    any:
      - id: kotlin-wmi-process-create
      - id: objectives/execution/wmi::process-create-call
