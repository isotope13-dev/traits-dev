defaults:
  platforms: [windows]
  for: [php]
  attack: T1047
  mbc: E1043

traits:
  - id: php-wmi-com-moniker
    desc: PHP WMI COM moniker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'WinMgmts:\\\\.\\root\\cimv2'
  - id: php-win32-process-create
    desc: PHP Win32_Process.Create call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Win32_Process[\s\S]{0,180}->Create\s*\('
  - id: php-wmic-process-query
    desc: PHP wmic process query
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'wmic process where[\s\S]{0,120}powershell\.exe'

composite_rules:
  - id: php-wmi-process-execution
    desc: PHP WMI process execution
    crit: hostile
    conf: 0.97
    all:
      - id: php-wmi-com-moniker
      - id: php-win32-process-create
    any:
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
      - id: php-wmic-process-query
