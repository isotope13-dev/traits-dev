defaults:
  platforms: [windows]
  for: [javascript, html, vbs, powershell]

composite_rules:
  - id: hta-remote-download-hidden-wmi-powershell
    desc: HTA downloads hidden PowerShell via WMI
    crit: hostile
    conf: 0.99
    attack: "T1047,T1059.001,T1059.007,T1105,T1564.003"
    mbc: "B0030,B0032,E1043"
    all:
      - id: metadata/file/format::hta-application-element
      - id: objectives/command-and-control/dropper/delivery/hidden-stage::hta-wmi-hidden-process-stage
