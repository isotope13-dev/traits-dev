defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
  crit: suspicious
  conf: 0.85
  attack: T1190
traits:
  - id: build-install-helper-script
    desc: Build install helper script marker
    crit: component
    if:
      type: text
      substr: "build & installation helper script"
  - id: package-validation-script
    desc: Package validation script marker
    crit: component
    if:
      type: text
      substr: This validates new installations
  - id: apt-get-noninteractive-y
    desc: apt-get install -y (non-interactive)
    crit: notable
    if:
      type: text
      substr: apt-get install -y
  - id: apt-install-noninteractive-y
    desc: apt install -y (non-interactive)
    crit: notable
    if:
      type: text
      substr: apt install -y
  - id: debian-frontend-noninteractive
    desc: DEBIAN_FRONTEND=noninteractive
    crit: notable
    if:
      type: text
      substr: DEBIAN_FRONTEND=noninteractive
  - id: yum-noninteractive
    desc: automated yum install without interaction
    crit: notable
    if:
      type: text
      substr: yum install -y
  - id: dnf-noninteractive
    desc: automated dnf install without interaction
    crit: notable
    if:
      type: text
      substr: dnf install -y
composite_rules:
  - id: apt-get-noninteractive
    desc: automated apt-get install without interaction
    crit: notable
    any:
      - id: apt-get-noninteractive-y
      - id: apt-install-noninteractive-y
      - id: debian-frontend-noninteractive
  - id: package-manager-abuse
    desc: Malicious package manager usage
    crit: notable
    needs: 2
    any:
      - id: apt-get-noninteractive
      - id: yum-noninteractive
      - id: dnf-noninteractive
      - id: micro-behaviors/os/package-manager/install::package-manager-conditional
    unless:
      - id: build-install-helper-script
      - id: package-validation-script
      - id: micro-behaviors/data/text/app::netdata-path
  - id: multi-distro-package-targeting
    desc: Multi-distro package manager targeting
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: apt-get-noninteractive
      - id: yum-noninteractive
      - id: dnf-noninteractive
    unless:
      - id: build-install-helper-script
      - id: package-validation-script
      - id: micro-behaviors/data/text/app::netdata-path
