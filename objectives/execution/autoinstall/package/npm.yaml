defaults:
  platforms: [unix, windows]
  conf: 0.9
  attack: T1059.007

traits:
- id: src-npm-install-package
  desc: Source invokes npm install package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  # The autoinstall threat is `npm install <pkg>` executed as a COMMAND. Anchor
  # at command position (line start, shell separator, quote, `$`/`RUN` prefix)
  # so English prose ("...so npm install succeeds") and comments don't match the
  # following word as a package. Also: same-line package only (`[ \t]+`, not
  # `\s+`, which spanned a newline after a bare `npm install`) and a valid
  # package-name start (`[A-Za-z0-9@]`, never `-`) so flag-only dependency
  # installs (`npm install --omit=dev` / `--production`) no longer match.
  if:
    type: text
    regex: '(?m)(^|[;&|''"`])[ \t]*npm[ \t]+install[ \t]+[A-Za-z0-9@][A-Za-z0-9._/-]{1,79}'
  unless:
    - id: objectives/execution/autoinstall/package/
    - id: well-known/app/calvyn-code
    - id: npm-install-global-tool
    - id: objectives/execution/autoinstall/package/
    - id: objectives/execution/autoinstall/package/
- id: src-npm-i-package
  desc: Source invokes npm i package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm[ \t]+i[ \t]+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9@][A-Za-z0-9._-]{1,79}'
  unless:
    - id: objectives/execution/autoinstall/package/
    - id: package-manager-ui-install-snippet
    - id: well-known/app/cloudflare::framework-autoconfig
- id: src-npx-yes-package
  desc: Runs an auto-installed package with npx --yes
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  unless:
    - id: npm-parity-test-runner-context
    - id: well-known/app/cloudflare::framework-autoconfig
    - id: well-known/tool/detection/
    - id: metadata/library/structure/
  if:
    type: text
    regex: '\bnpx\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npx-package-flag
  desc: Source npx declares transient package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpx\s+(--package|-p)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
  unless:
    - id: objectives/execution/autoinstall/package/
    - id: objectives/execution/autoinstall/package/
    - id: well-known/app/cloudflare::framework-autoconfig
    - id: metadata/library/structure/
- id: src-npx-versioned-package
  desc: Source npx runs versioned package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}@[0-9]'
  unless:
    - id: objectives/execution/autoinstall/package/
    - id: objectives/execution/autoinstall/package/
    - id: well-known/app/cloudflare::framework-autoconfig
    - id: metadata/library/structure/
- id: src-npm-exec-yes-package
  desc: Source npm exec auto-installs package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  unless:
    - id: metadata/library/structure/
  if:
    type: text
    regex: '\bnpm\s+exec\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npm-exec-package-flag
  desc: Source npm exec declares package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  unless:
    - id: well-known/lib/benign-runtime-bundles::bundled-npm-source
  if:
    type: text
    regex: '\bnpm\s+exec\s+(--package|-p)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npm-x-package-flag
  desc: Source npm x declares package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm\s+x\s+(--package|-p)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-pnpm-dlx-package
  desc: Source pnpm dlx transient package
  crit: notable
  for: [shell, javascript, typescript, makefile]
  unless:
    - id: makefile-pnpm-dlx-tsx-local-source
    - id: metadata/library/ai/
  if:
    type: text
    regex: '\bpnpm\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-pnpx-package
  desc: Source pnpx transient package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bpnpx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
  unless:
    - id: objectives/execution/autoinstall/package/
    - id: objectives/execution/autoinstall/package/
    - id: well-known/app/cloudflare::framework-autoconfig
    - id: makefile-pnpx-prettier-local-file
- id: src-yarn-dlx-package
  desc: Source yarn dlx transient package
  crit: notable
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\byarn\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
  unless:
    - id: well-known/tool/development/yarn::yarn-cli-bundle-marker
    - id: metadata/library/ai/
- id: src-bunx-package
  desc: Source bunx transient package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bbunx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
  unless:
    - id: objectives/execution/autoinstall/package/
    - id: well-known/app/localai/
# `npm install <pkg>` is a supply-chain concern only in the auto-run install
# lifecycle hooks (preinstall/install/postinstall/prepare), where it pulls an
# undeclared package the moment a consumer installs. The same command in a
# `test`/`build`/custom script is normal dev tooling the maintainer runs by hand
# (e.g. setprototypeof's `testversion: docker run ... npm install mocha && npm t`),
# so it is matched per-hook rather than across every `scripts[*]` entry.
- id: script-npm-install-preinstall
  desc: preinstall hook installs a package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.preinstall
    regex: '\bnpm\s+install\s+(@?[A-Za-z0-9][A-Za-z0-9._-]*/)?[A-Za-z0-9][A-Za-z0-9._-]{1,79}'
- id: script-npm-install-install
  desc: install hook installs a package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.install
    regex: '\bnpm\s+install\s+(@?[A-Za-z0-9][A-Za-z0-9._-]*/)?[A-Za-z0-9][A-Za-z0-9._-]{1,79}'
- id: script-npm-install-postinstall
  desc: postinstall hook installs a package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.postinstall
    regex: '\bnpm\s+install\s+(@?[A-Za-z0-9][A-Za-z0-9._-]*/)?[A-Za-z0-9][A-Za-z0-9._-]{1,79}'
- id: script-npm-install-prepare
  desc: prepare hook installs a package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.prepare
    regex: '\bnpm\s+install\s+(@?[A-Za-z0-9][A-Za-z0-9._-]*/)?[A-Za-z0-9][A-Za-z0-9._-]{1,79}'
- id: script-npx-yes-package
  desc: preinstall hook npx auto-installs package
  crit: notable
  for: [package.json]
  unless:
    - id: micro-behaviors/os/service/legitimate/
    - id: metadata/library/automation::playwright-browser-install-script
  if:
    type: value
    path: scripts.preinstall
    regex: '\bnpx\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-npx-yes-install
  desc: install hook npx auto-installs package
  crit: notable
  for: [package.json]
  unless:
    - id: micro-behaviors/os/service/legitimate/
    - id: metadata/library/automation::playwright-browser-install-script
  if:
    type: value
    path: scripts.install
    regex: '\bnpx\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-npx-yes-postinstall
  desc: postinstall hook npx auto-installs package
  crit: notable
  for: [package.json]
  unless:
    - id: micro-behaviors/os/service/legitimate/
    - id: metadata/library/automation::playwright-browser-install-script
  if:
    type: value
    path: scripts.postinstall
    regex: '\bnpx\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-npx-yes-prepare
  desc: prepare hook npx auto-installs package
  crit: notable
  for: [package.json]
  unless:
    - id: micro-behaviors/os/service/legitimate/
    - id: metadata/library/automation::playwright-browser-install-script
  if:
    type: value
    path: scripts.prepare
    regex: '\bnpx\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-npx-versioned-package
  desc: Package script npx versioned package
  crit: notable
  for: [package.json]
  if:
    type: value
    path: scripts[*]
    regex: '\bnpx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}@[0-9]'
# pnpm/yarn dlx fetch-and-run an undeclared package; only an install-lifecycle
# hook auto-runs it on a consumer's machine. In a test/build/custom script it is
# dev tooling the maintainer runs by hand, so match per-hook (matches the
# script-npm-install-* pattern above), not across every scripts[*] entry.
- id: script-pnpm-dlx-preinstall
  desc: preinstall hook pnpm dlx package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.preinstall
    regex: '\bpnpm\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-pnpm-dlx-install
  desc: install hook pnpm dlx package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.install
    regex: '\bpnpm\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-pnpm-dlx-postinstall
  desc: postinstall hook pnpm dlx package
