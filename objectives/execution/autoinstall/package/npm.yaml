    regex: '\bbunx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'

composite_rules:
- id: script-npm-install-package
  desc: Install hook auto-installs a package
  crit: suspicious
  for: [package.json]
  any:
    - id: script-npm-install-preinstall
    - id: script-npm-install-install
    - id: script-npm-install-postinstall
    - id: script-npm-install-prepare
