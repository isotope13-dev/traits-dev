  if:
    type: value
    path: scripts.postinstall
    regex: '\bpnpm\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-pnpm-dlx-prepare
  desc: prepare hook pnpm dlx package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.prepare
    regex: '\bpnpm\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-yarn-dlx-preinstall
  desc: preinstall hook yarn dlx package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.preinstall
    regex: '\byarn\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-yarn-dlx-install
  desc: install hook yarn dlx package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.install
    regex: '\byarn\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-yarn-dlx-postinstall
  desc: postinstall hook yarn dlx package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.postinstall
    regex: '\byarn\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-yarn-dlx-prepare
  desc: prepare hook yarn dlx package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts.prepare
    regex: '\byarn\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: build-npm-install-package
  desc: Build npm install names package
  crit: notable
  for: [dockerfile, github-actions]
  if:
    type: text
    regex: '\bnpm\s+install\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
