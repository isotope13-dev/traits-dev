defaults:
  platforms: [windows, unix]
  for:
    - python
  mbc: B0024
  attack: T1059.006
  crit: suspicious
traits:
  - id: subprocess-install
    desc: Runtime pip install via subprocess
    conf: 0.9
    if:
      type: text
      regex: subprocess\.[a-z_]+\([\s\S]{0,420}\bpip\b[\s\S]{0,160}\binstall\b
  - id: sys-executable
    desc: pip install using sys.executable
    conf: 0.95
    if:
      type: text
      regex: sys\.executable[\s\S]{0,160}['"]-m['"][\s\S]{0,80}['"]pip['"][\s\S]{0,80}['"]install['"]
  - id: os-system
    desc: Runtime pip install via os.system
    conf: 0.9
    if:
      type: text
      regex: os\.system\([\s\S]{0,220}\bpip\b[\s\S]{0,120}\binstall\b
    downgrade:
      all:
        - type: text
          regex: 'except\s+(ImportError|ModuleNotFoundError)\b[^:]{0,80}:'
        - type: text
          regex: 'os\.system\(\s*["'']pip install requests["'']\s*\)'
  - id: main-call
    desc: Direct pip.main() installation
    conf: 0.9
    if:
      id: micro-behaviors/os/package-manager/install::pip-main-install
  - id: main-call-content
    desc: Direct pip.main() call in source
    conf: 0.85
    if:
      type: text
      regex: pip\.main\(
  - id: try-colon
    desc: 'try: statement'
    crit: baseline
    conf: 0.5
    if:
      type: string_literal
      exact: 'try:'
  - id: except-colon-pattern
    desc: except statement with colon
    crit: component
    conf: 0.5
    size_max: 50000
    if:
      type: text
      regex: 'except\s+(ImportError|ModuleNotFoundError)\b[^:]{0,80}:'
  - id: import-statement
    desc: import statement for installer-related modules
    crit: component
    conf: 0.4
    if:
      type: text
      regex: import\s+(pip|pkg_resources)\b
  - id: except-module-not-found-content
    desc: except ModuleNotFoundError in source
    crit: component
    conf: 0.8
    if:
      type: text
      regex: except ModuleNotFoundError[\s\S]{0,500}\bpip\b
  - id: except-import-error-content
    desc: except ImportError in source
    crit: component
    conf: 0.7
    if:
      type: text
      regex: except ImportError[\s\S]{0,500}\bpip\b
  - id: pip-break-system-packages
    desc: pip install break-system-packages flag
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: --break-system-packages
composite_rules:
  - id: try-import-install
    desc: Try-except import with fallback pip
    conf: 0.9
    crit: suspicious
    all:
      - id: except-colon-pattern
    any:
      - id: subprocess-install
      - id: sys-executable
      - id: os-system
      - id: main-call-content
    downgrade:
      any:
        - type: text
          regex: 'os\.system\(\s*["'']pip install requests["'']\s*\)'
        - type: text
          regex: 'subprocess\.[a-z_]+\([\s\S]{0,200}["'']requests["'']'
  - id: yara-pip-fallback-install
    desc: Try import with pip install
    conf: 0.95
    crit: suspicious
    all:
      - id: except-colon-pattern
      - id: import-statement
    any:
      - id: subprocess-install
      - id: sys-executable
      - id: os-system
      - id: main-call-content
  - id: pip-fallback-install-content
    desc: Try-import with pip.main() auto-install
    conf: 0.9
    crit: suspicious
    all:
      - id: micro-behaviors/os/package-manager/install::python-pip-module-import
      - id: main-call-content
    any:
      - id: except-module-not-found-content
      - id: except-import-error-content
  - id: break-system-packages-autoinstall
    desc: Runtime pip install bypasses system package guard
    conf: 0.94
    crit: suspicious
    all:
      - id: pip-break-system-packages
    any:
      - id: subprocess-install
      - id: sys-executable
      - id: os-system
      - id: main-call-content
