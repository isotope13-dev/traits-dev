defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
  mbc: B0024
  attack: T1059.006
  crit: suspicious
traits:
  - id: subprocess-install
    desc: Runtime pip install via subprocess
    conf: 0.9
    if:
      type: string_value
      regex: subprocess\.[a-z_]+\(.{0,220}pip.{0,120}install
  - id: sys-executable
    desc: pip install using sys.executable
    conf: 0.95
    if:
      type: string_value
      regex: sys\.executable.{0,120}-m.{0,120}pip.{0,120}install
  - id: os-system
    desc: Runtime pip install via os.system
    conf: 0.9
    if:
      type: string_value
      regex: os\.system\(.{0,220}pip.{0,120}install
  - id: try-import-install
    desc: Try-except import with fallback pip
    conf: 0.85
    if:
      type: string_value
      regex: except[^:]{0,120}:.{0,50}pip.{0,20}install|ImportError.{0,50}pip.{0,20}install
  - id: main-call
    desc: Direct pip.main() installation
    conf: 0.9
    if:
      id: micro-behaviors/os/package-manager/install::pip-main-install
  - id: main-call-content
    desc: Direct pip.main() call in source
    conf: 0.85
    if:
      type: raw
      regex: pip\.main\(
  - id: import-pip-module
    desc: Direct pip module import
    conf: 0.8
    crit: notable
    if:
      type: raw
      substr: import pip
  - id: try-colon
    desc: 'try: statement'
    crit: notable
    conf: 0.5
    if:
      type: string_value
      exact: 'try:'
  - id: except-colon-pattern
    desc: except statement with colon
    crit: component
    conf: 0.5
    size_max: 50000
    if:
      type: string_value
      regex: 'except\s+(ImportError|ModuleNotFoundError)\b[^:]{0,80}:'
  - id: import-statement
    desc: import statement for installer-related modules
    crit: notable
    conf: 0.4
    if:
      type: raw
      regex: import\s+(pip|importlib|setuptools|pkg_resources)\b
  - id: except-module-not-found-content
    desc: except ModuleNotFoundError in source
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: except ModuleNotFoundError.{0,200}pip
  - id: except-import-error-content
    desc: except ImportError in source
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: except ImportError.{0,200}pip
composite_rules:
  - id: yara-pip-fallback-install
    desc: Try import with pip install
    conf: 0.95
    crit: suspicious
    all:
      - id: try-import-install
      - id: import-statement
    any:
      - id: except-module-not-found-content
      - id: except-import-error-content
      - id: except-colon-pattern
  - id: pip-fallback-install-content
    desc: Try-import with pip.main() auto-install
    conf: 0.9
    crit: suspicious
    all:
      - id: import-pip-module
      - id: main-call-content
    any:
      - id: except-module-not-found-content
      - id: except-import-error-content
