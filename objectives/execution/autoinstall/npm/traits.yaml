defaults:
  platforms: [unix, windows]
  conf: 0.9
  attack: T1059.007

traits:
- id: npm-install-documentation-comment
  desc: npm install command shown in source documentation
  crit: baseline
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: '(?m)^\s*\*\s+npm\s+install\b'
- id: npm-parity-test-runner-context
  desc: npm/npx use in parity test runner
  crit: baseline
  conf: 0.92
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '[Pp]arity (runner|test)'
- id: package-manager-comment-npm
  desc: npm command mentioned in source comment
  crit: baseline
  conf: 0.9
  for: [javascript, typescript, shell, makefile]
  if:
    type: text
    regex: '(?m)^\s*(//|#|\*)[^\n]{0,160}\bnpm\b'
- id: package-manager-comment-npx
  desc: npx command mentioned in source comment
  crit: baseline
  conf: 0.9
  for: [javascript, typescript, shell, makefile]
  if:
    type: text
    regex: '(?m)^\s*(//|#|\*)[^\n]{0,160}\bnpx\b'
- id: package-manager-comment-pnpx
  desc: pnpx command mentioned in source comment
  crit: baseline
  conf: 0.9
  for: [javascript, typescript, shell, makefile]
  if:
    type: text
    regex: '(?m)^\s*(//|#|\*)[^\n]{0,160}\bpnpx\b'
- id: package-manager-comment-pnpm
  desc: pnpm command mentioned in source comment
  crit: baseline
  conf: 0.9
  for: [javascript, typescript, shell, makefile]
  if:
    type: text
    regex: '(?m)^\s*(//|#|\*)[^\n]{0,160}\bpnpm\b'
- id: package-manager-comment-yarn
  desc: yarn command mentioned in source comment
  crit: baseline
  conf: 0.9
  for: [javascript, typescript, shell, makefile]
  if:
    type: text
    regex: '(?m)^\s*(//|#|\*)[^\n]{0,160}\byarn\b'
- id: package-manager-comment-bunx
  desc: bunx command mentioned in source comment
  crit: baseline
  conf: 0.9
  for: [javascript, typescript, shell, makefile]
  if:
    type: text
    regex: '(?m)^\s*(//|#|\*)[^\n]{0,160}\bbunx\b'
- id: package-manager-help-run-npm
  desc: npm command shown in run help
  crit: baseline
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    regex: '(?i)\b(run|running|by running)\s*[`"'']?npm\b'
- id: package-manager-help-run-npx
  desc: npx command shown in run help
  crit: baseline
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    regex: '(?i)\b(run|running|by running)\s*[`"'']?npx\b'
- id: package-manager-help-install-npm
  desc: npm command shown in install help
  crit: baseline
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    regex: '(?i)\b(After installation|installCommand:|via)\s*[`"''\s]*npm\b'
- id: package-manager-help-install-npx
  desc: npx command shown in install help
  crit: baseline
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    regex: '(?i)\b(After installation|installCommand:)\s*[`"'']?npx\b'
- id: makefile-openapi-doc-target
  desc: Makefile OpenAPI documentation target
  crit: baseline
  conf: 0.9
  for: [makefile]
  if:
    type: text
    regex: '(?m)^generate-.{0,40}(api|doc|postman).{0,40}:'
- id: npm-install-global-openapi-doc-tool
  desc: npm installs global OpenAPI documentation tool
  crit: component
  conf: 0.9
  for: [makefile]
  if:
    type: text
    regex: '\bnpm\s+install\s+-g\s+(widdershins|openapi-to-postmanv2)\b'
- id: package-manager-bootstrap-check
  desc: Package manager bootstrap check
  crit: component
  conf: 0.84
  for: [shell, makefile]
  if:
    type: text
    regex: 'command\s+-v\s+(pnpm|yarn|bun|npm)\b'
- id: package-manager-bootstrap-install-command
  desc: Package manager bootstrap install command
  crit: component
  conf: 0.84
  for: [shell, makefile]
  if:
    type: text
    regex: '\bnpm\s+install\s+-g\s+(pnpm|yarn|bun)@?[0-9]*'
- id: npm-install-global-tool
  desc: npm installs a global CLI tool
  crit: baseline
  conf: 0.84
  for: [shell, makefile]
  # A GLOBAL (`-g`) install in a build script / Makefile is dev tooling
  # (linters, doc generators, codegen), not a project dependency — the
  # supply-chain autoinstall threat is a LOCAL `npm install <pkg>` that runs an
  # untrusted package's install hooks into the project tree.
  if:
    type: text
    regex: '\bnpm\s+install\s+-g\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: package-manager-ui-install-snippet
  desc: Package-manager install command in UI
  crit: baseline
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    regex: '(data-copy|codeblock|install)[^\\n]{0,120}npm\s+i\s+'
- id: src-npm-install-package
  desc: Source invokes npm install package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm\s+install\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
  unless:
    - id: src-npm-install-benign-context
    - id: npm-install-global-tool
    - id: package-manager-bootstrap-install
    - id: makefile-openapi-doc-generator-install
- id: src-npm-i-package
  desc: Source invokes npm i package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm\s+i\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
  unless:
    - id: package-manager-command-help-text
    - id: package-manager-ui-install-snippet
    - id: well-known/app/cloudflare::framework-autoconfig
- id: src-npx-yes-package
  desc: Source npx auto-installs package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  unless:
    - id: npm-parity-test-runner-context
    - id: package-manager-command-help-text
    - id: package-manager-command-comment
    - id: well-known/app/cloudflare::framework-autoconfig
    - id: micro-behaviors/data/text/security/scanner::defensive-scanner-tool-context
  if:
    type: text
    regex: '\bnpx\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npx-package-flag
  desc: Source npx declares transient package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpx\s+(--package|-p)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
  unless:
    - id: package-manager-command-help-text
    - id: package-manager-command-comment
    - id: well-known/app/cloudflare::framework-autoconfig
- id: src-npx-versioned-package
  desc: Source npx runs versioned package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}@[0-9]'
  unless:
    - id: package-manager-command-help-text
    - id: package-manager-command-comment
    - id: well-known/app/cloudflare::framework-autoconfig
- id: src-npm-exec-yes-package
  desc: Source npm exec auto-installs package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm\s+exec\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npm-exec-package-flag
  desc: Source npm exec declares package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm\s+exec\s+(--package|-p)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npm-x-package-flag
  desc: Source npm x declares package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm\s+x\s+(--package|-p)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-pnpm-dlx-package
  desc: Source pnpm dlx transient package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bpnpm\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-pnpx-package
  desc: Source pnpx transient package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bpnpx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
  unless:
    - id: package-manager-command-help-text
    - id: package-manager-command-comment
    - id: well-known/app/cloudflare::framework-autoconfig
- id: src-yarn-dlx-package
  desc: Source yarn dlx transient package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\byarn\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-bunx-package
  desc: Source bunx transient package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bbunx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
  unless:
    - id: package-manager-command-help-text
    - id: package-manager-command-comment
    - id: well-known/app/localai::localai-ui-build-context
- id: script-npm-install-package
  desc: Package script npm install package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts[*]
    regex: '\bnpm\s+install\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-npx-yes-package
  desc: Package script npx auto-installs package
  crit: suspicious
  for: [package.json]
  unless:
    - id: micro-behaviors/os/service/legitimate::devto-publish-script
  if:
    type: value
    path: scripts[*]
    regex: '\bnpx\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-npx-versioned-package
  desc: Package script npx versioned package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts[*]
    regex: '\bnpx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}@[0-9]'
- id: script-pnpm-dlx-package
  desc: Package script pnpm dlx package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts[*]
    regex: '\bpnpm\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: script-yarn-dlx-package
  desc: Package script yarn dlx package
  crit: suspicious
  for: [package.json]
  if:
    type: value
    path: scripts[*]
    regex: '\byarn\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: build-npm-install-package
  desc: Build npm install names package
  crit: notable
  for: [dockerfile, github-actions]
  if:
    type: text
    regex: '\bnpm\s+install\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: build-npx-yes-package
  desc: Build npx auto-installs package
  crit: notable
  for: [dockerfile, github-actions]
  if:
    type: text
    regex: '\bnpx\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: build-npx-versioned-package
  desc: Build npx runs versioned package
  crit: notable
  for: [dockerfile, github-actions]
  if:
    type: text
    regex: '\bnpx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}@[0-9]'
- id: build-npm-exec-yes-package
  desc: Build npm exec auto-installs package
  crit: notable
  for: [dockerfile, github-actions]
  if:
    type: text
    regex: '\bnpm\s+exec\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: build-pnpm-dlx-package
  desc: Build pnpm dlx transient package
  crit: notable
  for: [dockerfile, github-actions]
  if:
    type: text
    regex: '\bpnpm\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: build-pnpx-package
  desc: Build pnpx transient package
  crit: notable
  for: [dockerfile, github-actions]
  if:
    type: text
    regex: '\bpnpx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: build-yarn-dlx-package
  desc: Build yarn dlx transient package
  crit: notable
  for: [dockerfile, github-actions]
  if:
    type: text
    regex: '\byarn\s+dlx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: build-bunx-package
  desc: Build bunx transient package
  crit: notable
  for: [dockerfile, github-actions]
  if:
    type: text
    regex: '\bbunx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'

- id: src-npm-install-benign-phrase-1
  desc: Benign text phrase env setup
  crit: baseline
  conf: 0.9
  for: [shell, javascript, typescript, makefile, package.json, dockerfile, github-actions]
  if:
    type: text
    regex: 'dev environment setup|Site dependencies \(npm\)|npm deps installed'

- id: src-npm-install-benign-phrase-2
  desc: Benign text phrase ignore scripts
  crit: baseline
  conf: 0.9
  for: [shell, javascript, typescript, makefile, package.json, dockerfile, github-actions]
  if:
    type: text
    substr: 'This can happen when --ignore-scripts was used'

- id: src-npm-install-benign-phrase-3
  desc: Benign text phrase reinstall
  crit: baseline
  conf: 0.9
  for: [shell, javascript, typescript, makefile, package.json, dockerfile, github-actions]
  if:
    type: text
    regex: '(Or r|R)einstall: npm install'

composite_rules:
- id: src-npm-install-benign-context
  desc: npm install benign context
  crit: baseline
  any:
    - id: npm-install-documentation-comment
    - id: micro-behaviors/os/service/legitimate::npm-native-binary-wrapper
    - id: micro-behaviors/data/text/app::akm-bun-install-help-text
    - id: micro-behaviors/data/text/app::akm-checksummed-self-update
    - id: package-manager-command-help-text
    - id: well-known/app/cloudflare::framework-autoconfig
    - id: well-known/app/localai::localai-ui-build-context
    - id: well-known/lib/tailwindcss::tailwindcss-cdn-bundle
    - id: makefile-openapi-doc-generator-install
    - id: src-npm-install-benign-phrase-1
    - id: src-npm-install-benign-phrase-2
    - id: src-npm-install-benign-phrase-3
- id: makefile-openapi-doc-generator-install
  desc: Makefile installs OpenAPI documentation generator
  crit: baseline
  conf: 0.9
  near_lines: 8
  all:
    - id: makefile-openapi-doc-target
    - id: npm-install-global-openapi-doc-tool
- id: package-manager-bootstrap-install
  desc: Guarded package-manager bootstrap install
  crit: baseline
  conf: 0.86
  for: [shell, makefile]
  near_lines: 20
  all:
    - id: package-manager-bootstrap-check
    - id: package-manager-bootstrap-install-command
- id: package-manager-command-comment
  desc: Package-manager command in comment
  crit: baseline
  conf: 0.9
  any:
  - id: package-manager-comment-npm
  - id: package-manager-comment-npx
  - id: package-manager-comment-pnpx
  - id: package-manager-comment-pnpm
  - id: package-manager-comment-yarn
  - id: package-manager-comment-bunx
- id: package-manager-command-help-text
  desc: Package-manager command shown in user-facing help text
  crit: baseline
  conf: 0.85
  any:
  - id: package-manager-help-run-npm
  - id: package-manager-help-run-npx
  - id: package-manager-help-install-npm
  - id: package-manager-help-install-npx
