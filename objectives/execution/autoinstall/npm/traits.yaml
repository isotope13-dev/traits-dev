defaults:
  platforms: [unix, windows]
  conf: 0.9
  attack: T1059.007

traits:
- id: npm-install-documentation-comment
  desc: npm install command shown in source documentation
  crit: baseline
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: '(?m)^\s*\*\s+npm\s+install\b'
- id: npm-parity-test-runner-context
  desc: npm/npx use in parity test runner
  crit: baseline
  conf: 0.92
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '[Pp]arity (runner|test)'
- id: src-npm-install-package
  desc: Source invokes npm install package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm\s+install\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
  unless:
    - id: npm-install-documentation-comment
    - id: micro-behaviors/os/service/legitimate::npm-native-binary-wrapper
- id: src-npm-i-package
  desc: Source invokes npm i package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm\s+i\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npx-yes-package
  desc: Source npx auto-installs package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  unless:
    - id: npm-parity-test-runner-context
  if:
    type: text
    regex: '\bnpx\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npx-package-flag
  desc: Source npx declares transient package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpx\s+(--package|-p)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npx-versioned-package
  desc: Source npx runs versioned package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpx\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}@[0-9]'
- id: src-npm-exec-yes-package
  desc: Source npm exec auto-installs package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm\s+exec\s+(-y|--yes)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npm-exec-package-flag
  desc: Source npm exec declares package
  crit: suspicious
  for: [shell, javascript, typescript, makefile]
  if:
    type: text
    regex: '\bnpm\s+exec\s+(--package|-p)\s+(@?[A-Za-z0-9._-]+/)?[A-Za-z0-9._-]{2,80}'
- id: src-npm-x-package-flag
