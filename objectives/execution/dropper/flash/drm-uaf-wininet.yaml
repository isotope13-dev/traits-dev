defaults:
  attack: "T1203"
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: korean-jpg-c2
    desc: Korean JPG masquerade download URL (campaign-specific)
    crit: suspicious
    conf: 0.98
    if:
      type: string
      substr: "1588-2040.co.kr/conf/product"
composite_rules:
  - id: flash-drm-uaf-wininet-dropper
    desc: Flash DRM UAF exploit with WinInet stager
    crit: hostile
    conf: 0.98
    mbc: "B0029"
    all:
      - id: objectives/lateral-movement/exploit/cve/flash::cve-2018-4878-flash-uaf
      - id: korean-jpg-c2
    any:
      - id: micro-behaviors/process/create/shell::hidden-cmd-stackstring
      - id: micro-behaviors/process/create/shell::temp-fontdrvhost-drop
      - id: micro-behaviors/communications/http/get::dynamic-wininet-api-set
      - id: micro-behaviors/communications/http/get::wininet-library-stackstring
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/create/shell::createprocess-shellcode-api
  - id: flash-drm-uaf-security-evasion
    desc: Flash exploit with security product targeting
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/lateral-movement/exploit/cve/flash::cve-2018-4878-flash-uaf
      - id: micro-behaviors/data/source/markers/actionscript::exploit-dev-path
    any:
      - id: micro-behaviors/process/create/shell::fontdrvhost-myagent
      - id: micro-behaviors/env/detect/platform/actionscript::actionscript-debugger-check
      - id: micro-behaviors/data/source/markers/actionscript::timer-event-uaf
      - id: micro-behaviors/data/source/markers/actionscript::korean-security-product-targeting
