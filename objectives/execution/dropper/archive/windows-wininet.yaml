defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: image-zip-http-path
    desc: Hardcoded image ZIP payload path
    crit: notable
    conf: 0.84
    attack: "T1105"
    if:
      type: string_value
      regex: '(?i)^/(images?|files?)/[^\\s]{1,80}\\.zip$'
  - id: download-zip-http-path
    desc: Hardcoded download ZIP payload path
    crit: notable
    conf: 0.84
    attack: "T1105"
    if:
      type: string_value
      regex: '(?i)^/downloads?/[^\\s]{1,80}\\.zip$'
  - id: upload-zip-http-path
    desc: Hardcoded upload ZIP payload path
    crit: notable
    conf: 0.84
    attack: "T1105"
    if:
      type: string_value
      regex: '(?i)^/uploads?/[^\\s]{1,80}\\.zip$'
  - id: temp-randomized-exe-path
    desc: Randomized temp executable staging path
    crit: suspicious
    conf: 0.92
    attack: "T1105"
    if:
      type: string_value
      regex: '(?i)\\\\Temp\\\\[0-9a-f]{16,64}\\.exe$'
  - id: shell-open-verb
    desc: ShellExecute open verb string
    crit: component
    conf: 0.75
    if:
      type: string_value
      exact: "open"
  - id: wildcard-application-mime
    desc: Wildcard application MIME string
    crit: component
    conf: 0.72
    if:
      type: string_value
      exact: "application/*"
composite_rules:
  - id: wininet-zip-temp-execute
    desc: WinInet ZIP downloader stages and executes temp payload
    crit: hostile
    conf: 0.96
    attack: "T1105"
    mbc: "B0024"
    unless:
      - id: metadata/format/installer::known-benign-installer
      - id: metadata/signed/platform::microsoft
      - id: metadata/quality/versioning::pe-version-resource
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/get::http-open-request
      - id: micro-behaviors/communications/http/get::http-send-request
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: micro-behaviors/fs/file/operations::file-create-win
      - id: micro-behaviors/io/console/output::write-file
      - id: micro-behaviors/process/create/exec::shell-execute
    any:
      - id: image-zip-http-path
      - id: download-zip-http-path
      - id: upload-zip-http-path
      - id: temp-randomized-exe-path
      - id: micro-behaviors/mem/decompress/native::rtl-decompress-buffer
      - id: objectives/privilege-escalation/manifest/uac::require-admin-execution-level
      - id: shell-open-verb
      - id: wildcard-application-mime
    needs: 2
