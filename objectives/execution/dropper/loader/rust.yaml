# Dropper - Rust
# ATT&CK: T1105
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [rust]
traits:
  - id: client-get
    desc: HTTP client.get call
    crit: notable
    conf: 0.6
    if:
      type: string
      substr: "client.get"
  - id: write-body
    desc: Write HTTP body to file
    crit: notable
    conf: 0.6
    if:
      type: string
      substr: ".write(&body)"
  - id: rust-spawn-call
    desc: Process spawn call
    crit: notable
    conf: 0.6
    if:
      type: string
      substr: ".spawn()"
composite_rules:
  - id: rust-download-exec
    desc: Downloads and executes a file
    crit: suspicious
    conf: 0.95
    attack: "T1105"
    mbc: "B0024"
    all:
      - id: client-get
      - id: write-body
      - id: rust-spawn-call
