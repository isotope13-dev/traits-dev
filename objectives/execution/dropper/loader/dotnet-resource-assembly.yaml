defaults:
  platforms: [windows]
  for: [csharp]
traits:
  - id: resource-manager
    desc: ResourceManager payload access
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: 'new ResourceManager('
  - id: resource-string-fetch
    desc: Resource string retrieval
    crit: baseline
    conf: 0.8
    if:
      type: raw
      substr: .GetString(
  - id: assembly-load-bytes
    desc: Assembly loaded from bytes
    crit: suspicious
    conf: 0.95
    attack: T1620
    mbc: F0004.001
    if:
      type: raw
      substr: Assembly.Load(bytes
  - id: gettype-getmethod-invoke
    desc: Reflection invoke chain
    crit: suspicious
    conf: 0.95
    attack: T1620
    mbc: F0004
    if:
      type: raw
      substr: .GetType(name).GetMethod(
  - id: decoy-decrypt-discard
    desc: Decoy decrypt result discarded
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: 'Encoding.Default.GetBytes(ZBJWxRwVmymkewtQzL.GsfHdpElDosSHExQNk(resourceManager.GetString("vcGVC"), "IbjZ"));'
composite_rules:
  - id: encrypted-resource-loader
    desc: Decrypts and loads resource assembly
    crit: suspicious
    conf: 0.96
    attack: T1620
    mbc: B0030
    all:
      - id: resource-manager
      - id: resource-string-fetch
      - id: assembly-load-bytes
      - id: gettype-getmethod-invoke
    any:
      - id: micro-behaviors/crypto/symmetric/aes::aes-decrypt-csharp
      - id: micro-behaviors/crypto/kdf/operations::dotnet-password-kdf
  - id: encrypted-resource-loader-with-decoy
    desc: Encrypted loader with decoy decrypt
    crit: suspicious
    conf: 0.97
    all:
      - id: encrypted-resource-loader
      - id: decoy-decrypt-discard
