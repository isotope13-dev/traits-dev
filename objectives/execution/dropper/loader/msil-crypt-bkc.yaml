defaults:
  platforms: [windows]
  for: [csharp]
traits:
  - id: resource-key-bucrxssrwh
    desc: RunPE blob resource key
    crit: component
    conf: 0.99
    if:
      type: string_value
      exact: BUcRxssrwh
  - id: resource-key-ktekgsixfhqnimo
    desc: Final payload resource key
    crit: component
    conf: 0.99
    if:
      type: string_value
      exact: KtEKGSixFHQniMOu
  - id: resource-key-ennbm
    desc: RunPE type name key
    crit: component
    conf: 0.99
    if:
      type: string_value
      exact: eNNBm
  - id: resource-key-olfx
    desc: Inject method name key
    crit: component
    conf: 0.99
    if:
      type: string_value
      exact: OLFX
  - id: decoy-resource-vcgvc
    desc: Decoy encrypted resource key
    crit: component
    conf: 0.99
    if:
      type: string_value
      exact: vcGVC
composite_rules:
  - id: msil-crypt-bkc-resource-layout
    desc: MSIL cryptor resource layout
    crit: suspicious
    conf: 0.99
    all:
      - id: resource-key-bucrxssrwh
      - id: resource-key-ktekgsixfhqnimo
      - id: resource-key-ennbm
      - id: resource-key-olfx
    any:
      - id: decoy-resource-vcgvc
  - id: msil-crypt-bkc-runpe-loader
    desc: MSIL cryptor RunPE loader
    crit: hostile
    conf: 0.99
    attack: T1055.012
    mbc: E1055.012
    all:
      - id: msil-crypt-bkc-resource-layout
      - id: objectives/execution/dropper/loader::encrypted-resource-loader
      - id: objectives/evasion/process/injection::runpe-self-hollowing
