# Extconf.rb detection
# Useful for context in composite rules
defaults:
  for: [text, shell, ruby, python, javascript, php, powershell, vbs, applescript]
  crit: notable
  conf: 1.0
traits:
  - id: filename-extconf
    desc: File is named extconf.rb
    if:
      type: basename
      exact: extconf.rb
      case_insensitive: true
