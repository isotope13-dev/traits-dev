# Extconf.rb detection
# Useful for context in composite rules
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [ruby]
  crit: notable
  conf: 1.0
traits:
  - id: filename-extconf
    desc: File is named extconf.rb
    if:
      type: basename
      exact: extconf.rb
      case_insensitive: true
