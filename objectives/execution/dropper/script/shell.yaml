defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  for: [shell]
traits:
  - id: wget-download
    desc: "Download via wget"
    crit: notable
    conf: 0.7
    mbc: C0002
    attack: T1105
    if:
      type: trait
      id: micro-behaviors/communications/download/curl::wget-cmd
  - id: wget-q-flag
    desc: "wget quiet flag"
    crit: notable
    if:
      type: raw
      regex: "\\bwget(\\.exe)?\\b[^\\n]{0,120}\\s-q(\\s|$)"
  - id: wget-output-stdout
    desc: "wget output to stdout flag"
    crit: notable
    if:
      type: raw
      regex: "\\s+-O\\s*-(\\s|$)"
  - id: curl-download
    desc: "Download via curl"
    crit: notable
    conf: 0.7
    mbc: C0002
    attack: T1105
    if:
      type: trait
      id: micro-behaviors/communications/download/curl::curl-cmd
  - id: execute-dot-slash
    desc: "./ execution pattern"
    crit: notable
    conf: 0.6
    attack: T1059.004
    if:
      type: raw
      regex: '(^|\n|[;&|]{1,2}|\bnohup\s+)\s*\./[a-zA-Z0-9_][a-zA-Z0-9_.-]+'
  - id: inline__curl-silent-stdout__any_1
    desc: "Curl silent download pattern 1"
    crit: notable
    if:
      type: raw
      regex: 'curl(\.exe)?\s+[^|&\n]{0,120}-s[^|&\n]{0,120}(https?://|ftp://)'
  - id: inline__curl-silent-stdout__any_2
    desc: "Curl silent download pattern 2"
    crit: notable
    if:
      type: raw
      regex: 'curl(\.exe)?\s+[^|&\n]{0,120}--silent[^|&\n]{0,120}(https?://|ftp://)'
  - id: cmd-quiet-chain
    desc: "Windows cmd quiet chained execution"
    crit: notable
    conf: 0.8
    platforms: [windows]
    for: [text, javascript, powershell, batch, vbs, lnk]
    if:
      type: raw
      regex: '\bcmd(\.exe)?\s+/q\s+/c\s'
      case_insensitive: true
  - id: cmd-quiet-args
    desc: "cmd-style quiet arguments chain"
    crit: notable
    conf: 0.75
    platforms: [windows]
    for: [text, javascript, powershell, batch, vbs, lnk]
    if:
      type: raw
      regex: '(^|\s)/q\s+/c\s+'
      case_insensitive: true
  - id: curl-output-appdata-js
    desc: "Download JavaScript to AppData via curl"
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    for: [text, javascript, powershell, batch, vbs, lnk]
    if:
      type: raw
      regex: '\bcurl(\.exe)?\b[^\n]{0,220}(--output|-o)\s+%APPDATA%\\[^\n&|]{1,180}\.js\b'
      case_insensitive: true
  - id: appdata-staging-dir
    desc: "Create staging directory under AppData"
    crit: notable
    conf: 0.8
    platforms: [windows]
    for: [text, javascript, powershell, batch, vbs, lnk]
    if:
      type: raw
      regex: '\b(md|mkdir)\s+"?%APPDATA%\\[^"&|\n]{1,80}\\[^"&|\n]{1,80}"?'
      case_insensitive: true
  - id: wscript-js-launch
    desc: "Execute JavaScript via WScript"
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    for: [text, javascript, powershell, batch, vbs, lnk]
    if:
      type: raw
      regex: '\bwscript(\.exe)?\s+[^"&|\n]{1,180}\.js\b'
      case_insensitive: true
  - id: lnk-launcher-name
    desc: "LNK-named launcher artifact"
    crit: component
    conf: 0.95
    platforms: [windows]
    for: [text, javascript, powershell, batch, vbs, lnk]
    if:
      type: basename
      regex: '(?i)\.lnk$'
composite_rules:
  - id: wget-silent-stdout
    desc: "Silent wget output to stdout"
    crit: suspicious
    conf: 0.9
    mbc: C0002
    attack: T1105
    all:
      - id: micro-behaviors/communications/download/curl::wget-cmd
      - id: wget-q-flag
      - id: wget-output-stdout
    unless:
      - type: raw
        regex: \|\s*([a-z/]+/)?gpg\b\s+--import
  - id: curl-silent-stdout
    desc: "Silent curl output to stdout"
    crit: notable
    conf: 0.9
    mbc: C0002
    attack: T1105
    size_max: 5000
    not:
      - regex: (?i)netbsd\.org
      - regex: (?i)freebsd\.org
      - regex: (?i)openbsd\.org
      - regex: (?i)dragonflybsd\.org
      - regex: (?i)kernel\.org
      - regex: (?i)github\.com
      - regex: (?i)google\.com
    any:
      - id: inline__curl-silent-stdout__any_1
      - id: inline__curl-silent-stdout__any_2
  - id: windows-appdata-js-dropper-chain
    desc: "Windows shell chain downloads JS to AppData and executes with WScript"
    crit: hostile
    conf: 0.96
    attack: T1105
    all:
      - id: curl-output-appdata-js
      - id: appdata-staging-dir
      - id: wscript-js-launch
    any:
      - id: cmd-quiet-chain
      - id: cmd-quiet-args
  - id: windows-lnk-js-dropper-launcher
    desc: "Tiny LNK launcher downloads JS to AppData and runs WScript"
    crit: hostile
    conf: 0.97
    attack: T1105
    platforms: [windows]
    for: [text, javascript, powershell, batch, vbs, lnk]
    size_max: 4096
    all:
      - id: lnk-launcher-name
      - id: curl-output-appdata-js
      - id: appdata-staging-dir
      - id: wscript-js-launch
    any:
      - id: cmd-quiet-chain
      - id: cmd-quiet-args
