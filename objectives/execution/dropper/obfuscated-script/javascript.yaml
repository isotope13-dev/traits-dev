defaults:
  for: [javascript, typescript]
composite_rules:
  - id: obfuscated-jscript-dropper
    desc: "Obfuscated JScript dropper behavior (conditional compilation + eval + string manipulation)"
    crit: hostile
    conf: 0.85
    all:
      - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-eval
    any:
      - id: objectives/anti-static/obfuscation/source/syntax::js-split-string-property
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
      - id: objectives/anti-static/obfuscation/source/syntax::js-comma-sequence-obfuscation-v2
    needs: 1
    attack: "T1027"
    mbc: "B0032"
  - id: jscript-obfuscated-bat-dropper
    desc: "Obfuscated JScript dropper executing batch script"
    crit: hostile
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-on
      - id: micro-behaviors/process/create/script::batch-script-execution
    any:
      - id: objectives/anti-static/obfuscation/string-conceal::js-createobject-reversed
      - id: objectives/anti-static/obfuscation/string-conceal::js-adodb-savetofile-reversed
      - id: objectives/anti-static/obfuscation/string-conceal::js-xmlhttp-responsebody-reversed
    needs: 1
    attack: "T1059.003"
    mbc: "E1100"
  - id: jscript-nemucod-dict-dropper
    desc: "Obfuscated JScript Dropper using dict array mapping"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/encode/map::js-nested-object-table-mapping
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
    attack: "T1027"
    mbc: "B0032"
  - id: jscript-split-join-dropper
    desc: "Obfuscated JScript Dropper using split/join substitution"
    crit: hostile
    conf: 0.90
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/process/interpreter/jscript::is-jscript
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
    any:
      - id: objectives/anti-static/obfuscation/string-conceal/split-join::js-split-wrapper
      - id: objectives/anti-static/obfuscation/string-conceal/split-join::js-join-wrapper
      - id: objectives/anti-static/obfuscation/string-conceal/split-join::js-split-join-deobfuscation-dot
    needs: 1
    attack: "T1027"
    mbc: "B0032"
