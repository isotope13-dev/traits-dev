defaults:
  platforms: [windows]
  for: [oledoc, ooxml]
composite_rules:
  - id: excel-vba-msiexec-dropper
    desc: Excel VBA msiexec payload dropper
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/format/document/office::excel-vba-project
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
      - id: objectives/execution/trigger/document::office-vba-remote-msi-command
    any:
      - id: objectives/anti-static/obfuscation/document::msforms-command-concealment
      - id: objectives/anti-analysis/sandbox/detect/document::office-vba-msi-guardrails
      - id: objectives/anti-static/obfuscation/document::office-vba-static-padding
