composite_rules:
  - id: temp-file-execution
    desc: Drop and execute file from Temp directory
    crit: suspicious
    conf: 0.85
    platforms: [windows]
    for: [pe, powershell, batch]
    size_max: 524288
    all:
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: micro-behaviors/io/console/output::write-file
    any:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/exec::shell-execute-a
