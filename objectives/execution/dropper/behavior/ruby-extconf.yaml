# Malicious extconf.rb Dropper
# ATT&CK: T1105 (Ingress Tool Transfer), T1059 (Command Execution)
defaults:
  platforms: [unix, windows, macos]
  crit: hostile
  conf: 1.0
composite_rules:
  - id: extconf-rename-exec
    desc: extconf.rb renames a file to executable (Dropper)
    all:
      - id: objectives/execution/dropper/script::filename-extconf
      - id: objectives/execution/dropper/script::ruby-ast-rename-to-exe
  - id: extconf-fragmented-download
    desc: extconf.rb performs fragmented URL download
    all:
      - id: objectives/execution/dropper/script::filename-extconf
      - id: objectives/execution/dropper/script::ruby-ast-fragmented-url-fetch
  - id: extconf-os-check-exec
    desc: extconf.rb checks for Windows and executes command
    all:
      - id: objectives/execution/dropper/script::filename-extconf
      - id: objectives/execution/dropper/script::ruby-ast-check-windows-regex
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
