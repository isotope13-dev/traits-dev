defaults:
  platforms: [unix, windows, macos]

composite_rules:
  - id: evasive-shellcode-loader
    desc: "Evasive shellcode loading via indirect PEB and custom VirtualProtect resolution"
    crit: hostile
    mbc: B0004
    attack: T1055
    all:
      - id: micro-behaviors/os/process/peb::evasive-peb-access-x64
    any:
      - id: micro-behaviors/dylib/lookup::virtualprotect-suffix-resolution
      - id: micro-behaviors/dylib/lookup::wide-string-uppercase-mask
      - id: micro-behaviors/dylib/lookup::api-hash-kernel32-192299a5
  - id: ntdll-remap-shellcode-runner
    desc: NTDLL remap plus shellcode execution workflow
    crit: hostile
    conf: 0.94
    attack: T1055
    mbc: B0004
    all:
      - id: micro-behaviors/fs/memory/mmap::ntdll-image-remap-cluster
      - id: micro-behaviors/io/console/logging::shellcode-execution-status
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
    any:
      - id: objectives/anti-analysis/timing/evasion::timing-anti-debug
      - id: objectives/anti-analysis/debugger/detect::debugger-api
