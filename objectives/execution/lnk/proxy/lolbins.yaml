# LNK LOLBIN Target Detection (Extended)
# ATT&CK: T1218 (System Binary Proxy Execution)
#
# Detects LNK files targeting Living Off The Land Binaries (LOLBINs)
# that are commonly abused for code execution, download, or bypass.
# Supplements suspicious-targets.yaml with additional LOLBINs.
defaults:
  platforms: [windows]
  attack: "T1218"
  for: [lnk]
traits:
  # === Download/Transfer LOLBINs ===
  - id: bitsadmin-target
    desc: LNK targets bitsadmin.exe
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)bitsadmin\.exe$'
  # === Code execution LOLBINs ===
  - id: msbuild-target
    desc: LNK targets msbuild.exe
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)msbuild\.exe$'
  - id: installutil-target
    desc: LNK targets installutil.exe
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)installutil\.exe$'
  - id: cmstp-target
    desc: LNK targets cmstp.exe
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)cmstp\.exe$'
  - id: wmic-target
    desc: LNK targets wmic.exe
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)wmic\.exe$'
  - id: forfiles-target
    desc: LNK targets forfiles.exe
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)forfiles\.exe$'
  - id: command-c-argument
    desc: LNK arguments execute command with /c
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)(^|\s)/c\s+'
  - id: forfiles-powershell-argument
    desc: LNK forfiles arguments invoke PowerShell
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\bpowershell(\.exe)?\b|\bpwsh(\.exe)?\b'
  - id: forfiles-mshta-argument
    desc: LNK forfiles arguments invoke mshta
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\bmshta(\.exe)?\b'
  - id: pcalua-target
    desc: 'LNK targets pcalua.exe'
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)pcalua\.exe$'
  # === Scripting engines ===
  - id: shell-target
    desc: LNK targets shell.exe (WSL)
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)shell\.exe$'
  - id: wsl-target
    desc: LNK targets wsl.exe
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)wsl\.exe$'
  # === .NET execution ===
  - id: csc-target
    desc: LNK targets csc.exe (C# compiler)
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)csc\.exe$'
  - id: vbc-target
    desc: LNK targets vbc.exe (VB compiler)
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)vbc\.exe$'
  - id: jsc-target
    desc: LNK targets jsc.exe (JScript compiler)
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)jsc\.exe$'
composite_rules:
  # Helper: code execution LOLBINs
  - id: execution-lolbin
    desc: LNK targets execution LOLBIN
    crit: suspicious
    conf: 0.9
    any:
      - id: msbuild-target
      - id: installutil-target
      - id: cmstp-target
      - id: forfiles-target
      - id: pcalua-target
  # Helper: .NET compilers
  - id: dotnet-compiler
    desc: LNK targets .NET compiler
    crit: suspicious
    conf: 0.9
    any:
      - id: csc-target
      - id: vbc-target
      - id: jsc-target
  # Helper: WSL execution
  - id: wsl-execution
    desc: LNK targets WSL
    crit: suspicious
    conf: 0.85
    any:
      - id: shell-target
      - id: wsl-target
  # High confidence: hidden window + LOLBIN
  - id: hidden-execution-lolbin
    desc: LNK runs execution LOLBIN with hidden window
    crit: hostile
    conf: 0.95
    all:
      - id: execution-lolbin
      - id: objectives/command-and-control/dropper/lnk/target::hidden-window
  - id: forfiles-command-proxy
    desc: LNK uses forfiles /c command proxy
    crit: hostile
    conf: 0.96
    attack: T1202
    all:
      - id: forfiles-target
      - id: command-c-argument
  - id: forfiles-script-proxy
    desc: LNK uses forfiles to proxy script execution
    crit: hostile
    conf: 0.97
    attack: T1202
    all:
      - id: forfiles-command-proxy
    any:
      - id: forfiles-powershell-argument
      - id: forfiles-mshta-argument
  - id: hidden-bitsadmin
    desc: LNK runs bitsadmin with hidden window
    crit: hostile
    conf: 0.95
    all:
      - id: bitsadmin-target
      - id: objectives/command-and-control/dropper/lnk/target::hidden-window
  - id: lnk-command-proxy-download-chain
    desc: LNK proxies command execution after download
    crit: hostile
    conf: 0.99
    attack: T1105,T1218
    all:
      - id: command-c-argument
      - id: objectives/command-and-control/dropper/lnk/command-content::kv-curl-in-args
      - id: objectives/command-and-control/dropper/lnk/target::rundll32-target-dup
