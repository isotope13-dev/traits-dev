defaults:
  platforms: [windows]
  for: [lnk]
  attack: T1204.002
  mbc: B0024
traits:
  - id: lnk-deflatestream-reference
    desc: LNK references DeflateStream
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: DeflateStream
  - id: lnk-frombase64string-reference
    desc: LNK references FromBase64String
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: FromBase64String
  - id: lnk-kv-deflatestream-argument
    desc: LNK arguments reference DeflateStream
    crit: suspicious
    conf: 0.94
    if:
      type: kv
      path: arguments
      substr: DeflateStream
  - id: lnk-kv-frombase64string-argument
    desc: LNK arguments reference FromBase64String
    crit: suspicious
    conf: 0.94
    if:
      type: kv
      path: arguments
      substr: FromBase64String
  - id: lnk-kv-powershell-argument
    desc: LNK arguments invoke PowerShell
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: arguments
      regex: '\bpowershell(?:\.exe)?\b'
      case_insensitive: true
  - id: lnk-zzz-payload-delimiter
    desc: LNK ZZZ payload delimiter
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: ZZZ
  - id: lnk-powershell-encoded-short
    desc: LNK PowerShell encoded flag
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '(?i)\bpowershell(\.exe)?\b.{0,80}\s-e\s+'
composite_rules:
  - id: lnk-deflate-base64-dropper
    desc: LNK DeflateStream Base64 dropper
    crit: hostile
    conf: 0.97
    all:
      - id: lnk-deflatestream-reference
      - id: lnk-frombase64string-reference
    any:
      - id: lnk-zzz-payload-delimiter
      - id: lnk-powershell-encoded-short
    needs: 1
  - id: lnk-kv-deflate-base64-dropper
    desc: LNK arguments run DeflateStream Base64 dropper
    crit: hostile
    conf: 0.98
    all:
      - id: lnk-kv-deflatestream-argument
      - id: lnk-kv-frombase64string-argument
    any:
      - id: lnk-kv-powershell-argument
      - id: objectives/execution/lnk/dropper::kv-encoding-flag
    needs: 1
