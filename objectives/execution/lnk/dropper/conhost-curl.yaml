defaults:
  platforms: [windows]
  for: [lnk]
  attack: T1105

traits:
  - id: conhost-target-raw
    desc: LNK embeds conhost target path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: '%SystemRoot%\System32\conhost.exe'

  - id: icon-location-shell32
    desc: LNK embeds shell32 icon path
    crit: component
    conf: 0.8
    if:
      type: text
      substr: '%SystemRoot%\system32\shell32.dll'

  - id: working-directory-system32
    desc: LNK working directory is System32
    crit: component
    conf: 0.85
    if:
      type: hex
      pattern: '25 00 53 00 79 00 73 00 74 00 65 00 6D 00 52 00 6F 00 6F 00 74 00 25 00 5C 00 53 00 79 00 73 00 74 00 65 00 6D 00 33 00 32 00'

  - id: compact-launcher-string-surface
    desc: Tiny shortcut exposes few strings
    crit: component
    conf: 0.8
    size_max: 4096
    if:
      type: string_value_count
      max: 6
      min_length: 3

  - id: conhost-headless-cmd-proxy
    desc: LNK uses conhost headless cmd proxy
    crit: suspicious
    conf: 0.94
    if:
      type: hex
      pattern: '2D 00 2D 00 68 00 65 00 61 00 64 00 6C 00 65 00 73 00 73 00 20 00 63 00 6D 00 64 00 2E 00 65 00 78 00 65 00 20 00 2F 00 63 00'

  - id: cmd-start-background
    desc: LNK starts background cmd chain
    crit: notable
    conf: 0.88
    if:
      type: hex
      pattern: '63 00 6D 00 64 00 2E 00 65 00 78 00 65 00 20 00 2F 00 63 00 20 00 73 00 74 00 61 00 72 00 74 00 20 00 22 00 22 00 20 00 2F 00 62 00'

  - id: repeated-background-start
    desc: LNK repeats background start execution
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: hex
      pattern: '73 00 74 00 61 00 72 00 74 00 20 00 22 00 22 00 20 00 2F 00 62 00'

  - id: curl-silent-output-args
    desc: LNK uses curl silent output
    crit: notable
    conf: 0.9
    count_min: 2
    if:
      type: hex
      pattern: '63 00 75 00 72 00 6C 00 2E 00 65 00 78 00 65 00 20 00 2D 00 73 00 20 00 2D 00 6F 00'

  - id: temp-bin-download
    desc: LNK downloads temp BIN payload
    crit: suspicious
    conf: 0.9
    if:
      type: hex
      pattern: '2E 00 62 00 69 00 6E 00'

  - id: temp-exe-download
    desc: LNK downloads temp EXE payload
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: hex
      pattern: '25 00 54 00 45 00 4D 00 50 00 25 00 5C 00'

  - id: temp-exe-background-launch
    desc: LNK launches temp EXE in background
    crit: suspicious
    conf: 0.94
    attack: T1204.002
    if:
      type: hex
      pattern: '73 00 74 00 61 00 72 00 74 00 20 00 22 00 22 00 20 00 2F 00 62 00 20 00 25 00 54 00 45 00 4D 00 50 00 25 00 5C 00'

  - id: http-ip-endpoint-pair
    desc: LNK embeds two HTTP IP endpoints
    crit: suspicious
    conf: 0.93
    count_min: 2
    if:
      type: hex
      pattern: '68 00 74 00 74 00 70 00 3A 00 2F 00 2F 00'

composite_rules:
  - id: conhost-curl-temp-dropper
    desc: Hidden LNK downloader stages temp payloads
    crit: hostile
    conf: 0.98
    all:
      - id: conhost-target-raw
      - id: conhost-headless-cmd-proxy
      - id: curl-silent-output-args
      - id: temp-exe-download
      - id: temp-exe-background-launch
    any:
      - id: repeated-background-start
      - id: http-ip-endpoint-pair
      - id: compact-launcher-string-surface

  - id: headless-system32-shortcut-camouflage
    desc: Hidden System32 shortcut uses shell icon
    crit: suspicious
    conf: 0.91
    all:
      - id: conhost-target-raw
      - id: conhost-headless-cmd-proxy
      - id: working-directory-system32
      - id: icon-location-shell32

  - id: multi-stage-temp-payload-launcher
    desc: LNK stages BIN and EXE payloads
    crit: hostile
    conf: 0.96
    all:
      - id: curl-silent-output-args
      - id: temp-bin-download
      - id: temp-exe-download
      - id: temp-exe-background-launch
    any:
      - id: cmd-start-background
      - id: http-ip-endpoint-pair
