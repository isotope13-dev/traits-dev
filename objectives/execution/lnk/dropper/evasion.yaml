defaults:
  platforms: [windows]
  for: [lnk, batch]
traits:
  - id: path-traversal-hex
    desc: Uses relative path traversal in UTF-16
    crit: suspicious
    conf: 0.8
    if:
      type: hex
      pattern: "2E 00 2E 00 5C 00 2E 00 2E 00 5C 00"

  - id: script-in-tmp
    desc: Drops script in temporary directory
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)(\$env:tmp|%tmp%).{0,50}\.vbs'

composite_rules:
  - id: hostile-script-dropper
    desc: Obfuscated LNK drops and executes script
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/execution/lnk/dropper::path-traversal-hex
      - id: objectives/execution/lnk/dropper::script-in-tmp
      - id: objectives/anti-static/obfuscation/string/reconstruct::for-loop-string-reconstruction
