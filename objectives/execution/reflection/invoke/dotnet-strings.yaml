# .NET Reflection Patterns (string-based for compiled assemblies)
# These complement the AST-based csharp.yaml traits
defaults:
  platforms: [windows, linux, macos, unix, android, ios]
  for: [pe, dll, csharp]
traits:
  - id: namespace-import
    desc: Reflection method namespace token
    crit: component
    conf: 0.70
    if:
      type: string
      substr: "System.Reflection.MethodInfo"
  - id: activator
    desc: Dynamic object instantiation via Activator
    crit: component
    conf: 0.80
    if:
      type: string
      substr: "Activator"
  # === Property info atomic indicators ===
  - id: property-info-class
    desc: PropertyInfo class reference
    crit: component
    conf: 0.6
    if:
      type: string
      substr: "PropertyInfo"
  - id: get-properties-method
    desc: GetProperties method reference
    crit: component
    conf: 0.6
    if:
      type: string
      exact: "GetProperties"
  # === Method info atomic indicators ===
  - id: method-info-class
    desc: MethodInfo class reference
    crit: component
    conf: 0.6
    if:
      type: string
      substr: "MethodInfo"
  - id: get-method-call
    desc: GetMethod call reference
    crit: component
    conf: 0.6
    if:
      type: string
      exact: "GetMethod"
  - id: get-methods-call
    desc: GetMethods call reference
    crit: component
    conf: 0.6
    if:
      type: string
      exact: "GetMethods"
  # === Type info atomic indicators ===
  - id: get-type-call
    desc: GetType( call reference
    crit: component
    conf: 0.6
    if:
      type: string
      substr: "GetType("
  - id: typeof-call
    desc: typeof( call reference
    crit: component
    conf: 0.6
    if:
      type: string
      substr: "typeof("
  - id: type-info-class
    desc: TypeInfo class reference
    crit: component
    conf: 0.6
    if:
      type: string
      exact: "TypeInfo"
composite_rules:
  # Property info composite
  - id: property-info
    desc: Reflection property access
    crit: component
    conf: 0.55
    all:
      - id: property-info-class
      - id: get-properties-method
  # Method info composite
  - id: method-info
    desc: Reflection method access
    crit: component
    conf: 0.55
    needs: 2
    any:
      - id: method-info-class
      - id: get-method-call
      - id: get-methods-call
    downgrade:
      none:
        - id: metadata/format/pe::dotnet-metadata
  # Type info composite
  - id: type-info
    desc: Runtime type inspection
    crit: notable
    conf: 0.70
    needs: 2
    any:
      - id: get-type-call
      - id: typeof-call
      - id: type-info-class
