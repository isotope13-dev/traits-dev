# .NET Reflection Execution Chain
# Detects the Assembly.Load → GetTypes → Invoke pattern used by .NET loaders
# to dynamically load and execute payloads at runtime.
# Complements dotnet-strings.yaml (individual reflection components) and
# class/traits.yaml (dotnet-reflection composite, needs only 1 of 5 indicators).
defaults:
  for: [pe, dll]
traits:
  # Separate "Assembly" and "Load" tokens in .NET IL metadata (not the combined
  # "Assembly.Load" string that class/traits.yaml catches). These appear as
  # individual method references in the metadata tables.
  - id: dotnet-assembly-token
    desc: Assembly class reference
    crit: component
    conf: 0.6
    if:
      type: string
      exact: "Assembly"
  - id: dotnet-load-token
    desc: Load method reference
    crit: component
    conf: 0.5
    if:
      type: string
      exact: "Load"
  - id: dotnet-gettypes-token
    desc: GetTypes method reference
    crit: component
    conf: 0.6
    if:
      type: string
      exact: "GetTypes"
  - id: dotnet-invoke-token
    desc: Invoke method reference
    crit: component
    conf: 0.6
    if:
      type: string
      exact: "Invoke"
  - id: dotnet-methodbase-token
    desc: MethodBase class reference
    crit: component
    conf: 0.6
    if:
      type: string
      exact: "MethodBase"
composite_rules:
  # The full Assembly.Load → GetTypes → MethodInfo → Invoke chain.
  # Much stronger signal than individual reflection indicators.
  - id: dotnet-assembly-load-invoke
    desc: ".NET dynamic assembly load and invoke"
    crit: suspicious
    conf: 0.92
    attack: "T1620"
    mbc: "E1059"
    all:
      - id: dotnet-assembly-token
      - id: dotnet-invoke-token
    any:
      - id: dotnet-gettypes-token
      - id: get-method-call
      - id: method-info-class
      - id: dotnet-methodbase-token
