# Nemucod JScript Downloader Behavior
# Detects Nemucod family variants based on behavioral patterns
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  - id: js-nemucod-downloader-jitter
    desc: Nemucod JScript downloader with timing jitter check
    crit: hostile
    all:
      - id: objectives/anti-analysis/timing/nemucod::nemucod-jitter-check
      - id: micro-behaviors/fs/write/file::adodb-fragment-adod
      - id: objectives/execution/interpreter/script/wsh::wscript-shell-fragment-tiny-2a
  - id: js-nemucod-fragmented-drop
    desc: Nemucod fragmented ADODB.Stream drop and execute
    crit: hostile
    all:
      - id: micro-behaviors/process/interpreter/jscript::is-jscript
    any:
      - id: micro-behaviors/fs/write/file::adodb-fragment-adod
      - id: objectives/anti-static/obfuscation/string-conceal/nemucod::save-to-file-fragment-oFil
    needs: 2
