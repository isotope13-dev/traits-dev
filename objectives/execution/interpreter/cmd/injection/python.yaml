defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1059.006"

traits:
- id: fstring-shell-command-param--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'f["''](echo|cat) \{(command|filename)\}'

  count_max: 1026526
- id: fstring-shell-command-param--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'f["''](sh|bash) \{(command|filename)\}'

  count_max: 1026527
- id: fstring-ping-command-param
  desc: Ping command f-string parameter
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'f["'']ping\b[^"'']{0,160}\{(website|host(name)?)\}'

  count_max: 1026528
- id: fstring-ping-target-param
  desc: Ping target f-string parameter
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'f["'']ping\b[^"'']{0,160}\{(ip|target|name)\}'

  count_max: 1026529
- id: fstring-netsh-command-param
  desc: Netsh command f-string parameter
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'f["'']netsh\b[^\n]{0,160}\{(wifi_name|name)\}'

  count_max: 1026530
- id: echo-command-param-fstring
  desc: Echo command from parameter
  crit: component
  conf: 0.94
  mbc: "E1059"
  if:
    type: text
    regex: 'full_command\s*=\s*f["'']echo \{command\}["'']'

- id: cat-filename-param-fstring
  desc: Cat command from filename
  crit: component
  conf: 0.94
  mbc: "E1059"
  if:
    type: text
    regex: 'cmd\s*=\s*f["'']cat \{filename\}["'']'

- id: command-injection-comments
  desc: Command injection vulnerability comments
  crit: component
  conf: 0.75
  count_min: 2
  if:
    type: text
    substr: command injection
    case_insensitive: true

- id: python-bash-network-payload
  desc: Python embeds bash network command
  crit: suspicious
  conf: 0.98
  if:
    type: text
    # Do not treat every fixed bash wrapper as injection. Require a command
    # commonly used for delivery or a shell network channel.
    regex: '(?i)\bbash\s+-c\s+["''][^"'']{0,96}\b(curl|wget|nc)\b[^"'']{0,96}["'']'
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context

- id: python-bash-destructive-payload
  desc: Python embeds destructive bash command
  crit: suspicious
  conf: 0.98
  if:
    type: text
    regex: '(?i)\bbash\s+-c\s+["''][^"'']{0,96}\b(chmod|eval|rm\s+-rf)\b[^"'']{0,96}["'']'
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context

- id: python-bash-python-payload
  desc: Python embeds bash Python command
  crit: suspicious
  conf: 0.98
  if:
    type: text
    regex: '(?i)\bbash\s+-c\s+["''][^"'']{0,96}\bpython[23]?\s+-c\b[^"'']{0,96}["'']'
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context

- id: python-nslookup-payload
  desc: Python embeds nslookup command
  crit: suspicious
  conf: 0.98
  if:
    type: text
    regex: '(?i)\bnslookup\s+([A-Za-z0-9._-]+\.[A-Za-z]{2,})\b'
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context

- id: python-dev-tcp-payload
  desc: Python embeds dev-tcp endpoint
  crit: suspicious
  conf: 0.98
  if:
    type: text
    regex: '/dev/tcp/([A-Za-z0-9._-]+)/[0-9]{1,5}\b'
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context
  - id: well-known/tool/offensive/decepticon::package-tree-member

composite_rules:
- id: python-bash-command-payload
  desc: Python embeds dangerous bash command
  crit: suspicious
  conf: 0.98
  any:
  - id: python-bash-network-payload
  - id: python-bash-destructive-payload
  - id: python-bash-python-payload
- id: python-shell-command-injection
  desc: Python shell command injection
  crit: suspicious
  conf: 0.92
  all:
  - id: fstring-shell-command-param
  any:
  - id: micro-behaviors/process/create/subprocess::shell-true
  - id: micro-behaviors/process/create/system::python-os-system
  unless:
  - id: metadata/package/testing/

- id: python-skill-command-injection-tool
  desc: Python skill command injection tool
  crit: hostile
  conf: 0.96
  all:
  - id: fstring-shell-command-param
  - id: echo-command-param-fstring
  - id: cat-filename-param-fstring
  - id: objectives/execution/interpreter/eval/dynamic::exec-open-read
  - id: command-injection-comments
  any:
  - id: micro-behaviors/process/create/subprocess::shell-true
  - id: micro-behaviors/process/create/subprocess::run-content
  - id: micro-behaviors/process/create/system::python-os-system
  unless:
  - id: metadata/package/testing/
- id: fstring-shell-command-param
  desc: Shell command f-string parameter
  crit: suspicious
  conf: 0.9
  mbc: "E1059"
  any:
  - id: fstring-shell-command-param--rx-1
  - id: fstring-shell-command-param--rx-2
  - id: fstring-ping-command-param
  - id: fstring-ping-target-param
  - id: fstring-netsh-command-param

- id: python-shell-command-payload
  desc: Python carries shell command payload
  crit: suspicious
  conf: 0.98
  any:
  - id: python-bash-command-payload
  - id: python-nslookup-payload
  - id: python-dev-tcp-payload
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context
