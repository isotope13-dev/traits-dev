defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: browser-load-extension-flag
    desc: Browser executed with --load-extension flag
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: --load-extension=
