defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1059
composite_rules:
  - id: go-tokenized-command-string-runner
    desc: Go tokenized command runner
    crit: suspicious
    conf: 0.92
    near_lines: 12
    all:
      - id: micro-behaviors/data/string/split::go-strings-fields
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/process/create/direct::go-command-output-capture
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
