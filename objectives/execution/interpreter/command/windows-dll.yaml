defaults:
  for: [pe, dll]
  platforms: [windows]

composite_rules:
  - id: mutex-gated-system-directory-winexec
    desc: Mutex-gated WinExec launch from system directory
    crit: hostile
    conf: 0.93
    attack: T1106
    all:
      - id: micro-behaviors/process/create/exec::winexec
      - id: micro-behaviors/process/create/flags::winexec-sw-show-immediate
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
      - id: micro-behaviors/process/sync/mutex::open-mutex
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: metadata/binary/installer/family/
