# PowerShell launched by an MSI-hosted Windows Script Host custom action.
defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1059.001,T1059.007,T1564.003

traits:
  - id: wscript-shell-run-launcher
    desc: WScript.Shell Run launcher embedded in an MSI
    crit: notable
    conf: 0.98
    if:
      type: raw
      regex: '(?i)CreateObject\(\s*["'']Wscript\.Shell["'']\s*\)\.Run\b'
  - id: hidden-noprofile-powershell
    desc: Hidden no-profile PowerShell launch
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: '(?i)\bpowershell\.exe\s+-NoP\s+-W\s+Hidden\b'
  - id: encoded-powershell-command
    desc: PowerShell encoded-command option
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: '(?i)\bpowershell\.exe\b.{0,80}-(Enc|EncodedCommand)\b'

composite_rules:
  - id: msi-hidden-encoded-powershell
    desc: MSI launcher hides and encodes PowerShell execution
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001,T1059.007,T1564.003
    all:
      - id: wscript-shell-run-launcher
      - id: hidden-noprofile-powershell
      - id: encoded-powershell-command
