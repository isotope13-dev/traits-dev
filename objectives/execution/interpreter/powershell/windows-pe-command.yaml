defaults:
  platforms: [windows]
  for: [pe]
  attack: T1059.001

traits:
  - id: powershell-command-exe-string
    desc: PowerShell Command invocation string
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: powershell.exe -Command "
  - id: hidden-bypass-file-command
    desc: Hidden PowerShell bypass file execution
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: powershell.exe -ExecutionPolicy Bypass -WindowStyle Hidden -NoProfile -File "
  - id: powershell-command-read-from-file
    desc: PowerShell command read from file
    crit: component
    conf: 0.92
    if:
      type: text
      substr: Comando letto dal file
  - id: italian-hidden-powershell-status
    desc: Italian hidden PowerShell status
    crit: component
    conf: 0.92
    if:
      type: text
      substr: finestra nascosta

composite_rules:
  - id: downloaded-config-powershell-execution
    desc: Executes PowerShell from downloaded config
    crit: suspicious
    conf: 0.95
    all:
      - id: powershell-command-exe-string
      - id: powershell-command-read-from-file
      - id: italian-hidden-powershell-status
      - id: micro-behaviors/process/create/spawn::create-process-a
    any:
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: objectives/command-and-control/dropper/delivery/download-execute::local-host-life-download-raw-url
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
