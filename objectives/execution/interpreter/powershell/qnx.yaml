defaults:
  platforms: [qnx, unix, windows]
  for: [powershell]
  attack: T1059.001

traits:
  - id: qnx-ps-remote-stage-fetch
    desc: QNX PowerShell remote stage fetch
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/payload/stage1\.ps1[\s\S]{0,900}ReadAsStringAsync'

  - id: qnx-ps-iex-remote-script
    desc: QNX PowerShell IEX remote script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Invoke-RemotePayload[\s\S]{0,520}Invoke-Expression \$remoteScript'

  - id: qnx-ps-gzip-iex-payload
    desc: QNX PowerShell gzip IEX payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Compression\.GzipStream[\s\S]{0,520}Invoke-Expression \$decompressed'

  - id: qnx-ps-self-spawn-bypass
    desc: QNX PowerShell self spawn bypass
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Invoke-Expression \$decompressed[\s\S]{0,900}Start-Process'

composite_rules:
  - id: qnx-ps-remote-iex-chain
    desc: QNX PowerShell remote IEX chain
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-ps-remote-stage-fetch
      - id: qnx-ps-iex-remote-script

  - id: qnx-ps-compressed-iex-chain
    desc: QNX PowerShell compressed IEX
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-ps-gzip-iex-payload
      - id: qnx-ps-self-spawn-bypass

  - id: qnx-ps-interpreter-abuse-chain
    desc: QNX PowerShell interpreter abuse
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-ps-remote-stage-fetch
      - id: qnx-ps-gzip-iex-payload
      - id: qnx-ps-self-spawn-bypass
