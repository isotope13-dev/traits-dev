defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - powershell
traits:
  - id: pwsh-downloader
    crit: suspicious
    conf: 0.9
    desc: Detects PowerShell downloader using (New-Object System.Net.WebClient).DownloadFile
    if:
      type: string_value
      regex: /new-object system.net.webclient\)\.downloadfile/i
