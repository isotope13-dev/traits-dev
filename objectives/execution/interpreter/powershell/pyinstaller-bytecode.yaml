defaults:
  platforms: [windows]
  for: [pyc]
  attack: T1059.001

traits: []

composite_rules:
  - id: pyc-powershell-process-termination
    desc: Python bytecode kills a process through PowerShell
    crit: hostile
    conf: 0.97
    attack: T1059.001,T1059.003
    all:
      - id: micro-behaviors/process/create/shell/interpreter::powershell-executable-token
      - id: micro-behaviors/process/create/subprocess::pyc-check-output-call
      - id: micro-behaviors/process/terminate/command::pyc-taskkill-force-image
  - id: pyc-powershell-minimized-launch
    desc: Python bytecode launches a minimized process through PowerShell
    crit: hostile
    conf: 0.97
    attack: T1059.001,T1564.003
    all:
      - id: micro-behaviors/process/create/shell/interpreter::powershell-executable-token
      - id: micro-behaviors/process/create/subprocess::pyc-check-output-call
      - id: micro-behaviors/process/create/hidden::pyc-start-minimized-wait
