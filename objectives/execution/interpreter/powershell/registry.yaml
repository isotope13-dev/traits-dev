defaults:
  platforms: [windows]
  for: [pe]
  attack: T1059.001
traits: []
composite_rules:
  - id: executionpolicy-registry-tamper
    desc: PowerShell execution policy tamper
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/os/registry/access::powershell-executionpolicy-write-chain
    any:
      - id: micro-behaviors/os/registry/access::powershell-policy-state
      - id: metadata/lang/encoded/wide::shell-interpreter-powershell
      - id: micro-behaviors/os/registry/access::registry-query-value-api
    needs: 2
