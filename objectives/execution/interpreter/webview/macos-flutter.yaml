defaults:
  platforms: [macos]
  for: [macho, dylib, javascript, html]
  attack: T1059
  mbc: B0024

composite_rules:
  - id: flutter-webview-bridge-process-exec
    desc: Flutter WebView bridge process execution
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/interpreter/webview::flutter-webview-native-invoke-bridge
      - id: micro-behaviors/process/create/shell/runner::remote-execute-symbol
    any:
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
      - id: micro-behaviors/process/create/shell/runner
  - id: flutter-webview-js-channel-process-runner
    desc: Flutter WebView JavaScript channel process runner
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/process/interpreter/webview::flutter-webview-js-channel-bridge
      - id: micro-behaviors/process/create/shell/runner::process-start
    any:
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
      - id: micro-behaviors/process/create/shell/runner
  - id: flutter-webview-polled-process-dispatch
    desc: Flutter WebView polled process dispatch
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/interpreter/webview::flutter-webview-js-channel-bridge
      - id: micro-behaviors/process/create/shell/runner::process-start
      - id: objectives/command-and-control/backdoor/dispatch/bridge::update-delay-api-path
    any:
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
      - id: micro-behaviors/process/create/shell/runner
