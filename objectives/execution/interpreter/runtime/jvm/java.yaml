# Java Execution and Security Traits
# Detects dangerous Java patterns in source code
# MBC: Execution, Defense Evasion
# ATT&CK: T1059 (Command and Scripting Interpreter)
defaults:
  platforms: [windows, unix]
  for: [java]
traits:
  # ============================================================
  # COMMAND EXECUTION
  # ============================================================
  - id: runtime-exec
    desc: Runtime.exec() command execution
    crit: notable
    conf: 0.95
    mbc: "C0033"
    attack: "T1059"
    if:
      type: symbol
      kind: call
      exact: "Runtime.exec"
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        exact: src.zip
      - type: basename
        regex: \.sig$
  - id: runtime-getruntime-exec
    desc: Runtime.getRuntime().exec() command execution
    crit: notable
    conf: 0.95
    mbc: "C0033"
    attack: "T1059"
    if:
      type: symbol
      kind: call
      exact: "getRuntime().exec"
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        exact: src.zip
      - type: basename
        regex: \.sig$
  - id: processbuilder
    desc: ProcessBuilder command execution
    crit: notable
    conf: 0.9
    mbc: "C0033"
    attack: "T1059"
    if:
      type: symbol

      kind: call

      regex: '(^|\\.)ProcessBuilder$'
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  # ============================================================
  # REFLECTION (ANTI-ANALYSIS / EVASION)
  # ============================================================
  - id: class-forname
    desc: Dynamic class loading via reflection
    crit: notable
    conf: 0.9
    mbc: "F0006"
    if:
      type: symbol
      kind: call
      exact: "Class.forName"
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  - id: method-invoke
    desc: Dynamic method invocation via reflection
    crit: notable
    conf: 0.95
    mbc: "F0006"
    if:
      type: symbol
      kind: call
      exact: ".invoke("
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  - id: setaccessible
    desc: Bypass Java access control via
    crit: suspicious
    conf: 0.95
    mbc: "F0006"
    if:
      type: symbol
      kind: call
      exact: ".setAccessible"
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  - id: getdeclaredmethod
    desc: Access private methods via reflection
    crit: notable
    conf: 0.9
    mbc: "F0006"
    if:
      type: symbol
      kind: call
      exact: ".getDeclaredMethod"
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  - id: getdeclaredfield
    desc: Access private fields via reflection
    crit: notable
    conf: 0.9
    mbc: "F0006"
    if:
      type: symbol
      kind: call
      exact: ".getDeclaredField"
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  # ============================================================
  # DESERIALIZATION (COMMON ATTACK VECTOR)
  # ============================================================
  - id: objectinputstream
    desc: Object deserialization (potential RCE vector)
    crit: notable
    conf: 0.9
    mbc: "C0033"
    attack: "T1059"
    if:
      type: symbol

      kind: call

      regex: '(^|\\.)ObjectInputStream$'
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  - id: readobject
    desc: Deserialize object from stream
    crit: notable
    conf: 0.9
    mbc: "C0033"
    if:
      type: symbol
      kind: call
      exact: ".readObject("
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  - id: xmldecoder
    desc: XML deserialization (CVE vector)
    crit: suspicious
    conf: 0.9
    mbc: "C0033"
    if:
      type: symbol

      kind: call

      regex: '(^|\\.)XMLDecoder$'
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  # ============================================================
  # NATIVE CODE LOADING
  # ============================================================
  - id: system-loadlibrary
    desc: Load native library
    crit: notable
    conf: 0.9
    mbc: "C0033"
    attack: "T1129"
    if:
      type: symbol
      kind: call
      exact: "System.loadLibrary"
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  - id: system-load
    desc: Load native library by path
    crit: notable
    conf: 0.9
    mbc: "C0033"
    attack: "T1129"
    if:
      type: symbol
      kind: call
      exact: "System.load("
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  # ============================================================
  # DYNAMIC CLASS LOADING
  # ============================================================
  - id: urlclassloader
    desc: Load classes from URL
    crit: notable
    conf: 0.9
    mbc: "C0033"
    if:
      type: symbol

      kind: call

      regex: '(^|\\.)URLClassLoader$'
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  - id: defineclass
    desc: Define class from bytecode
    crit: suspicious
    conf: 0.95
    mbc: "C0033"
    if:
      type: symbol
      kind: call
      exact: ".defineClass"
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  # ============================================================
  # SCRIPT EXECUTION
  # ============================================================
  - id: scriptengine
    desc: Script engine execution
    crit: notable
    conf: 0.9
    mbc: "C0033"
    attack: "T1059"
    if:
      type: symbol

      kind: call

      regex: '(^|\\.)ScriptEngineManager$'
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  - id: scriptengine-eval
    desc: Evaluate script code
    crit: notable
    conf: 0.9
    mbc: "C0033"
    attack: "T1059"
    if:
      type: symbol
      kind: call
      exact: ".eval("
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  # ============================================================
  # JNDI (Log4Shell vector)
  # ============================================================
  - id: initialcontext
    desc: JNDI InitialContext (potential injection)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      word: "javax/naming/InitialContext"
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
  - id: jndi-lookup
    desc: JNDI lookup (Log4Shell attack vector)
    crit: notable
    conf: 0.9
    mbc: "C0033"
    if:
      type: symbol
      kind: call
      exact: ".lookup("
    unless:
      - type: basename
        exact: ct.sym
      - type: basename
        regex: \.sig$
