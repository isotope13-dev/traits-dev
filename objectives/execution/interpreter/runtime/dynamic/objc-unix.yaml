defaults:
  platforms: [unix, appliance]
  for: [objc, c, elf]
  attack: T1059

traits:
  - id: objc-runtime-class-method-resolve
    desc: ObjC runtime method resolve
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'objc_getClass[\s\S]{0,260}class_getInstanceMethod'

  - id: objc-msgsend-dynamic-invoke
    desc: ObjC msgSend dynamic invoke
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: objc_msgSend

composite_rules:
  - id: objc-runtime-dynamic-execution
    desc: ObjC runtime dynamic execution
    crit: hostile
    conf: 0.98
    all:
      - id: objc-runtime-class-method-resolve
      - id: objc-msgsend-dynamic-invoke
