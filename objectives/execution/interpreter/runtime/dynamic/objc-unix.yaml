defaults:
  platforms: [unix, appliance]
  for: [objc, c, elf]
  attack: T1059

composite_rules:
  - id: objc-runtime-dynamic-execution
    desc: ObjC runtime dynamic execution
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/hook/interception::objc-runtime-class-method-resolve
      - id: micro-behaviors/process/interpreter/runtime/dynamic::objc-runtime-msgsend
