defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1059.006

traits:
  - id: exec-sandbox-name-assignment
    desc: Python synthetic exec sandbox name
    crit: component
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      regex: '__name__["'']?\]\s*=\s*["'']__exec_sandbox__["'']'

  - id: globals-copy-before-exec
    desc: Python globals copy before exec
    crit: component
    conf: 0.88
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      regex: 'globals\(\)\.copy\(\)[\s\S]{0,180}exec\s*\('

  - id: compile-exec-source-call
    desc: Python compile source exec mode
    crit: component
    conf: 0.9
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    if:
      type: text
      regex: 'compile\s*\([^,\n]{1,120},\s*[^,\n]{1,120},\s*["'']exec["'']\s*\)'

composite_rules:
  - id: python-source-read-compile-exec
    desc: Python reads compiles executes source
    crit: suspicious
    conf: 0.94
    ref: sha256:a6dfb93ccf1c019100eb55c65b0d5ccc26f835cf876f96fe8366a3376449052a
    all:
      - id: micro-behaviors/fs/read/file::file-open-content
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: compile-exec-source-call
    any:
      - id: exec-sandbox-name-assignment
      - id: globals-copy-before-exec
