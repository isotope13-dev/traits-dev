# Google Colab Runtime Capabilities
# Detects interactions with Google Colab specific APIs
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: notable
traits:
  - id: register-callback
    desc: Registers Colab browser bridge callback
    if:
      type: symbol
      substr: "register_callback"
  - id: invoke-function
    desc: Invokes Colab function from JS
    if:
      type: text
      substr: "google.colab.kernel.invokeFunction"
  - id: browser-display-html
    desc: Displays HTML/JS in Colab
    if:
      type: symbol
      substr: "IPython.display"
composite_rules:
  - id: browser-recon-bridge
    desc: Browser-side reconnaissance bridge (Colab)
    crit: suspicious
    all:
      - id: objectives/execution/interpreter/runtime/colab::register-callback
      - id: objectives/execution/interpreter/runtime/colab::browser-display-html
    any:
      - id: objectives/execution/interpreter/runtime/colab::invoke-function
      - id: micro-behaviors/communications/http/download/curl::fetch-call
