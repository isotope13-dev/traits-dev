defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1059.002

traits:
  - id: rust-osascript-js-mode
    desc: Rust osascript JS mode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: '"-l", "JavaScript"'

  - id: rust-jxa-sensitive-env
    desc: Rust JXA sensitive env
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SENSITIVE_ENV=

composite_rules:
  - id: rust-osascript-jxa-credential-script
    desc: Rust osascript JXA credential script
    crit: hostile
    conf: 0.98
    all:
      - id: rust-osascript-js-mode
      - id: rust-jxa-sensitive-env
