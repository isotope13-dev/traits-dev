defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: filesystem-object-string
    desc: FileSystemObject string reference
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
      - vbs
    if:
      type: text
      substr: FileSystemObject
  - id: winmgmts-string
    desc: winmgmts WMI moniker string
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
      - vbs
      - powershell
    if:
      type: text
      substr: 'winmgmts:'
  - id: schedule-service-string
    desc: Schedule.Service string reference
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
      - vbs
      - powershell
    if:
      type: text
      substr: Schedule.Service
  - id: win32-scheduledjob-string
    desc: Win32_ScheduledJob string reference
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
      - vbs
      - powershell
    if:
      type: text
      substr: Win32_ScheduledJob
  - id: regread-method
    desc: RegRead method call
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
      - vbs
    if:
      type: text
      substr: RegRead
  - id: regwrite-method
    desc: RegWrite method call
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
      - vbs
    if:
      type: text
      substr: RegWrite
  - id: regdelete-method
    desc: RegDelete method call
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
      - vbs
    if:
      type: text
      substr: RegDelete
  - id: wscript-shell-split-join
    desc: Split-join WScript.Shell progid
    crit: suspicious
    conf: 0.92
    for:
      - javascript
      - vbs
    platforms:
      - windows
    if:
      type: text
      regex: '["'']WS["''].{0,40}["'']crip["''].{0,40}["'']t\.Sh["''].{0,40}["'']ell["''].{0,60}\.join\(["'']["'']\)'
  - id: shell-application-split-join
    desc: Split-join Shell.Application progid
    crit: suspicious
    conf: 0.92
    for:
      - javascript
      - vbs
    platforms:
      - windows
    if:
      type: text
      regex: '["'']She["''].{0,40}["'']ll\.A["''].{0,40}["'']pp["''].{0,40}["'']lica["''].{0,40}["'']ti["''].{0,40}["'']on["''].{0,60}\.join\(["'']["'']\)'
  - id: process-env-split-join
    desc: Split-join Process environment selector
    crit: suspicious
    conf: 0.9
    for:
      - javascript
      - vbs
    platforms:
      - windows
    if:
      type: text
      regex: '["'']Proc["''].{0,24}["'']ess["''].{0,60}\.join\(["'']["'']\)'
  - id: array-join-empty-string-ast
    desc: Array literal joined with empty string
    crit: notable
    conf: 0.82
    for:
      - javascript
    platforms:
      - windows
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (array) @arr
            property: (property_identifier) @join)
          arguments: (arguments
            (string
              (string_fragment) @sep)))
        (#eq? @join "join")
        (#eq? @sep "")
  - id: environment-symbol
    desc: Symbolic Environment method access
    crit: notable
    conf: 0.84
    for:
      - javascript
      - vbs
    platforms:
      - windows
    if:
      type: symbol
      regex: '\.Environment$'
  - id: run-symbol
    desc: Symbolic Run method access
    crit: notable
    conf: 0.84
    for:
      - javascript
      - vbs
    platforms:
      - windows
    if:
      type: symbol
      regex: '\.Run$'
  - id: exec-symbol
    desc: Symbolic Exec method access
    crit: notable
    conf: 0.84
    for:
      - javascript
      - vbs
    platforms:
      - windows
    if:
      type: symbol
      regex: '\.Exec$'
  - id: expandenv-symbol
    desc: Symbolic ExpandEnvironmentStrings method access
    crit: notable
    conf: 0.84
    for:
      - javascript
      - vbs
    platforms:
      - windows
    if:
      type: symbol
      regex: '\.ExpandEnvironmentStrings$'
  - id: hklm-hive
    desc: HKLM registry hive reference
    crit: notable
    conf: 0.4
    for:
      - javascript
      - typescript
      - vbs
      - powershell
    if:
      type: text
      exact: HKLM
  - id: hkcu-hive
    desc: HKCU registry hive reference
    crit: notable
    conf: 0.4
    for:
      - javascript
      - typescript
      - vbs
      - powershell
    if:
      type: text
      exact: HKCU
  - id: winhttp-string
    desc: WinHttp string reference
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
      - vbs
    if:
      type: text
      substr: WinHttp
  - id: run-method
    desc: .Run method call
    crit: notable
    conf: 0.4
    for:
      - javascript
      - typescript
      - vbs
    if:
      type: text
      substr: .Run(
  - id: exec-method
    desc: .Exec method call
    crit: notable
    conf: 0.4
    for:
      - javascript
      - typescript
      - vbs
    if:
      type: text
      substr: .Exec(
composite_rules:
  - id: wsh-env-builder-patterns
    desc: WSH environment builder patterns
    crit: suspicious
    conf: 0.86
    for:
      - javascript
      - vbs
    platforms:
      - windows
    any:
      - id: wscript-shell-split-join
      - id: process-env-split-join
      - id: environment-symbol
      - id: array-join-empty-string-ast
  - id: run-invocation-patterns
    desc: WSH Run invocation patterns
    crit: notable
    conf: 0.8
    for:
      - javascript
      - vbs
    platforms:
      - windows
    any:
      - id: run-method
      - id: run-symbol
  - id: exec-invocation-patterns
    desc: WSH Exec invocation patterns
    crit: notable
    conf: 0.8
    for:
      - javascript
      - vbs
    platforms:
      - windows
    any:
      - id: exec-method
      - id: exec-symbol
  - id: msxml-http-variants
    desc: MSXML HTTP request object variants
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
      - vbs
    any:
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: micro-behaviors/communications/http/client::http-client-any
  - id: wmi-scripting-patterns
    desc: WMI scripting patterns
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
      - vbs
      - powershell
    any:
      - id: winmgmts-string
      - id: objectives/execution/activex/com::activex-wmi
  - id: schedule-service-patterns
    desc: Task scheduler COM object patterns
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
      - vbs
      - powershell
    any:
      - id: schedule-service-string
      - id: win32-scheduledjob-string
  - id: registry-methods
    desc: Registry manipulation methods
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
      - vbs
    any:
      - id: regread-method
      - id: regwrite-method
      - id: regdelete-method
  - id: registry-hives
    desc: Registry hive references
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
      - vbs
      - powershell
    any:
      - id: hklm-hive
      - id: hkcu-hive
  - id: registry-scripting
    desc: Registry manipulation via scripting
    crit: suspicious
    conf: 0.85
    attack: T1112
    for:
      - javascript
      - typescript
      - vbs
    all:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: registry-methods
      - id: registry-hives
  - id: http-objects
    desc: HTTP objects for network access
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
      - vbs
    any:
      - id: msxml-http-variants
      - id: winhttp-string
  - id: execution-methods
    desc: Code execution methods
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
      - vbs
    any:
      - id: run-method
      - id: exec-method
      - id: objectives/command-and-control/dropper/execution/loader::file-write
  - id: wsh-or-fso
    desc: WScript.Shell or FileSystemObject
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
      - vbs
    any:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: filesystem-object-string
  - id: wsh-dropper
    desc: Windows Script Host dropper pattern
    crit: suspicious
    conf: 0.95
    attack: T1059.005
    for:
      - javascript
      - typescript
      - vbs
    all:
      - id: wsh-or-fso
      - id: http-objects
      - id: execution-methods
