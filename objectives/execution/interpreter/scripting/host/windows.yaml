defaults:
  platforms: [windows]
traits:
- id: schedule-service-string
  desc: Schedule.Service progid (Task Scheduler)
  crit: notable
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    substr: Schedule.Service
- id: win32-scheduledjob-string
  desc: Win32_ScheduledJob WMI class (task scheduling)
  crit: notable
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    substr: Win32_ScheduledJob
  unless:
  - type: text
    exact: WMI Win32 Provider
    section: .rsrc
- id: wscript-shell-split-join--rx-2
  desc: '"crip" string literal'
  crit: component
  conf: 0.92
  for:
  - javascript
  - vbs
  if:
    type: string_literal
    exact: crip
- id: wscript-shell-split-join--rx-3
  desc: '"t.Sh" string literal'
  crit: component
  conf: 0.92
  for:
  - javascript
  - vbs
  if:
    type: string_literal
    exact: t.Sh
- id: shell-application-split-join--rx-5
  desc: "\"lica\" (middle of split Shell.app)"
  crit: component
  conf: 0.92
  for:
  - javascript
  - vbs
  if:
    type: string_literal
    exact: lica
- id: shell-application-split-join--rx-6
  desc: "\"ll.A\" (middle of split Shell.app)"
  crit: component
  conf: 0.92
  for:
  - javascript
  - vbs
  if:
    type: string_literal
    exact: ll.A
- id: shell-application-split-join-sharded
  desc: Sharded Shell.Application progid
  crit: suspicious
  conf: 0.93
  for:
  - javascript
  - vbs
  if:
    type: text
    regex: '["'']Shel["''].{0,24}["'']l\.Ap["''].{0,48}["'']plic["''].{0,48}["'']ati["''].{0,24}["'']on["'']'
- id: process-env-split-join
  desc: Split-join Process environment selector
  crit: suspicious
  conf: 0.9
  for:
  - javascript
  - vbs
  if:
    type: text
    regex: '["'']Proc["''].{0,24}["'']ess["''].{0,60}\.join\(["'']["'']\)'
- id: process-env-split-join-pro-cess
  desc: Split-join Process environment selector
  crit: suspicious
  conf: 0.9
  for:
  - javascript
  - vbs
  if:
    type: text
    regex: '["'']Pro["''].{0,24}["'']cess["''].{0,60}\.join\(["'']["'']\)'
- id: exec-symbol
  desc: Symbolic Exec method access
  crit: notable
  conf: 0.84
  for:
  - javascript
  - vbs
  if:
    type: symbol
    regex: '\.Exec$'
- id: winhttp-string
  desc: WinHttp progid (WSH HTTP client)
  crit: notable
  conf: 0.5
  for: [scripts, -python]
  if:
    type: text
    substr: WinHttp
  unless:
  - id: metadata/signed/developer::google-llc
- id: exec-method
  desc: .Exec method call
  crit: notable
  conf: 0.4
  for: [scripts, binaries]
  if:
    type: text
    substr: .Exec(
  unless:
  - id: metadata/file/extension/identity::yara-extension
composite_rules:
- id: wsh-env-builder-patterns
  desc: WSH environment builder patterns
  crit: suspicious
  conf: 0.86
  for:
  - javascript
  - vbs
  all:
  - id: micro-behaviors/data/string/concat::join-empty-separator-call
  any:
  - id: wscript-shell-split-join
  - id: process-env-split-join
  - id: process-env-split-join-pro-cess
  unless:
  - id: well-known/lib/tabulator/
  - id: micro-behaviors/os/env/access::wsh-environment-symbol
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
- id: exec-invocation-patterns
  desc: WSH Exec invocation patterns
  crit: notable
  conf: 0.8
  for:
  - javascript
  - vbs
  any:
  - id: exec-method
  - id: exec-symbol
- id: wmi-scripting-patterns
  desc: WMI scripting patterns
  crit: notable
  conf: 0.7
  for: [scripts, binaries]
  any:
  - id: micro-behaviors/os/wmi/query::wmi-moniker-string
  - id: objectives/execution/activex/com::activex-wmi
- id: schedule-service-patterns
  desc: Task scheduler COM object patterns
  crit: notable
  conf: 0.8
  for: [scripts, binaries]
  any:
  - id: schedule-service-string
  - id: win32-scheduledjob-string
- id: registry-methods
  desc: Registry manipulation methods
  crit: notable
  conf: 0.6
  for: [scripts, binaries]
  any:
  - id: micro-behaviors/os/registry/manipulate::regread-call
  - id: micro-behaviors/os/registry/manipulate::regwrite-call
  - id: micro-behaviors/os/registry/manipulate::regdelete-call
- id: registry-scripting
  desc: Registry manipulation via scripting
  crit: suspicious
  conf: 0.85
  attack: T1112
  for: [scripts, binaries]
  all:
  - id: micro-behaviors/os/com/object::wscript-shell-literal
  - id: registry-methods
  any:
  - id: micro-behaviors/os/registry/access::hklm-hive
  - id: micro-behaviors/os/registry/access::hkcu-hive
- id: http-objects
  desc: HTTP objects for network access
  crit: notable
  conf: 0.6
  for: [scripts, binaries]
  any:
  - id: micro-behaviors/os/com/object::msxml-http-variants
  - id: winhttp-string
- id: execution-methods
  desc: Code execution methods
  crit: notable
  conf: 0.5
  for: [scripts, binaries]
  any:
  - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run
  - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-hidden-window
  - id: exec-method
  - id: objectives/command-and-control/dropper/execution/loader::file-write
- id: wsh-or-fso
  desc: WScript.Shell or FileSystemObject
  crit: notable
  conf: 0.7
  for: [scripts, binaries]
  any:
  - id: micro-behaviors/os/com/object::wscript-shell-literal
  - id: micro-behaviors/os/com/object::filesystemobject-progid
- id: wsh-dropper
  desc: Windows Script Host dropper pattern
  crit: suspicious
  conf: 0.95
  attack: T1059.005
  for: [scripts, binaries]
  all:
  - id: wsh-or-fso
  - id: http-objects
  - id: execution-methods
- id: wscript-shell-split-join
  desc: Split-join WScript.Shell progid
  crit: suspicious
  conf: 0.92
  for:
  - javascript
  - vbs
  all:
  - id: micro-behaviors/data/string/concat::array-join-empty-separator-text
  - id: wscript-shell-split-join--rx-2
  - id: wscript-shell-split-join--rx-3
  # Fragments "crip" and "t.Sh" are short and individually generic
  # ("description" contains "crip", any object.Sh* contains "t.Sh"). Require
  # the array-join, "crip" and "t.Sh" pieces to be co-located inside the
  # same split-join expression.
  near_bytes: 256
- id: shell-application-split-join
  desc: Split-join Shell.Application progid
  crit: suspicious
  conf: 0.92
  for:
  - javascript
  - vbs
  all:
  - id: micro-behaviors/data/string/concat::array-join-empty-separator-text
  - id: shell-application-split-join--rx-5
  - id: shell-application-split-join--rx-6
  near_bytes: 256
