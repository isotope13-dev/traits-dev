defaults:
  crit: notable
  conf: 0.8
  platforms:
  - windows
  for: [javascript, typescript]
  attack: T1059.005
  mbc: E1059
traits:
- id: wscript-shell-obfuscated-dup
  desc: Obfuscated WScript.Shell reference
  if:
    type: encoded
    regex: (?i)\{[^:]+:['"]W['"]\}\.[a-zA-Z0-9_$]+\+\{[^:]+:['"]S['"]\}
- id: wscript-shell-comma-fragment-head
  desc: Comma-fragmented WScript prefix
  crit: suspicious
  if:
    type: text
    regex: '["'']WS["'']\)\+"c"\+\(.{0,40}["'']ri["'']\)'
- id: wscript-shell-comma-fragment-tail
  desc: Comma-fragmented Shell suffix
  crit: suspicious
  if:
    type: text
    regex: '"pt\."\+"S"\+\(.{0,40}["'']h["'']\)\+"ell"'
- id: wscript-shell-comma-fragment-head-alt
  desc: Split-comma WScript prefix
  crit: suspicious
  if:
    type: text
    regex: '["'']WS["'']\)\s*\+\s*["'']cript\.S["'']'
- id: wscript-shell-comma-fragment-tail-alt
  desc: Split-comma Shell suffix
  crit: suspicious
  if:
    type: text
    regex: '["'']h["'']\)\s*\+\s*["'']ell["'']'
- id: activex-object-obfuscated
  desc: Obfuscated ActiveXObject creation
  if:
    type: encoded
    regex: '(?i)["'']A["''][^;\n]{0,200}["''](ctiveXObject|tiveXObject|XObject)["'']'
  unless:
  - id: metadata/library/runtime::core-js-runtime-bundle
  - id: metadata/library/runtime/
  - id: well-known/lib/web-ui-vendors::createjs-library-marker
  - id: metadata/library/jquery/
- id: wscript-network-obfuscated
  desc: Obfuscated WScript.Network reference
  if:
    type: encoded
    regex: (?i)WScript\.Network
- id: adodb-stream-obfuscated
  desc: Obfuscated ADODB.Stream reference
  if:
    type: encoded
    regex: (?i)\{[^:]+:['"]A['"]\}\.[a-zA-Z0-9_$]+\+\{[^:]+:['"]D['"]\}
- id: adodb-stream-comma-fragment-head
  desc: Comma-fragmented ADODB prefix
  crit: suspicious
  if:
    type: text
    regex: '"A"\)\+"D"\+\(.{0,40}["'']OD["'']\)\+"B\."\+\(.{0,40}["'']S["'']\)'
- id: adodb-stream-comma-fragment-tail
  desc: Comma-fragmented Stream suffix
  crit: suspicious
  if:
    type: text
    regex: '"t"\+\(.{0,40}["'']r["'']\)\+"eam"'
- id: adodb-stream-comma-fragment-head-alt
  desc: Split-comma ADODB prefix
  crit: suspicious
  if:
    type: text
    regex: '["'']A["'']\s*\+\s*["'']D["''].{0,40}["'']OD["'']\)\s*\+\s*["'']B\.["'']'
- id: adodb-stream-comma-fragment-tail-alt
  desc: Split-comma Stream suffix
  crit: suspicious
  if:
    type: text
    regex: '["'']Str["''].{0,80}["'']eam["'']\)'
- id: xmlhttp-obfuscated-fragment
  desc: Obfuscated XMLHTTP fragment concat
  if:
    type: encoded
    regex: (?i)\{[^:]+:['"]M['"]\}\.[a-zA-Z0-9_$]+\+\{[^:]+:['"]S['"]\}
- id: xmlhttp-comma-fragment-head
  desc: Comma-fragmented MSXML prefix
  crit: suspicious
  if:
    type: text
    regex: '"M"\+\(.{0,40}["'']S["'']\)\+\(.{0,40}["'']X["'']\)'
- id: xmlhttp-comma-fragment-tail
  desc: Comma-fragmented XMLHTTP suffix
  crit: suspicious
  if:
    type: text
    regex: '"ML2"\+\(.{0,40}["'']\.X["'']\)\+"M"\+"LH"\+"TTP"'
- id: xmlhttp-comma-fragment-head-alt
  desc: Split-comma MSXML prefix
  crit: suspicious
  if:
    type: text
    regex: '["'']M["'']\s*\+\s*["'']S["'']\s*\+\s*["'']XM["'']\s*\+\s*["'']L["'']'
- id: xmlhttp-comma-fragment-tail-alt
  desc: Split-comma XMLHTTP suffix
  crit: suspicious
  if:
    type: text
    regex: '["'']2\.X["''].{0,80}["'']MLH["'']\s*\+\s*["'']TTP["'']'
composite_rules:
- id: wscript-shell-comma-obfuscated-alt
  desc: Alt comma-obfuscated WScript.Shell reference
  crit: suspicious
  all:
  - id: wscript-shell-comma-fragment-head-alt
  - id: wscript-shell-comma-fragment-tail-alt
- id: wscript-shell-comma-obfuscated
  desc: Comma-obfuscated WScript.Shell reference
  crit: suspicious
  any:
  - id: wscript-shell-comma-obfuscated-alt
  - id: wscript-shell-comma-fragment-head
  - id: wscript-shell-comma-fragment-tail
  needs: 2
- id: adodb-stream-comma-obfuscated-alt
  desc: Alt comma-obfuscated ADODB.Stream reference
  crit: suspicious
  all:
  - id: adodb-stream-comma-fragment-head-alt
  - id: adodb-stream-comma-fragment-tail-alt
- id: adodb-stream-comma-obfuscated
  desc: Comma-obfuscated ADODB.Stream reference
  crit: suspicious
  any:
  - id: adodb-stream-comma-obfuscated-alt
  - id: adodb-stream-comma-fragment-head
  - id: adodb-stream-comma-fragment-tail
  needs: 2
- id: xmlhttp-comma-obfuscated-alt
  desc: Alt comma-obfuscated XMLHTTP reference
  crit: suspicious
  all:
  - id: xmlhttp-comma-fragment-head-alt
  - id: xmlhttp-comma-fragment-tail-alt
- id: xmlhttp-comma-obfuscated
  desc: Comma-obfuscated XMLHTTP reference
  crit: suspicious
  any:
  - id: xmlhttp-comma-obfuscated-alt
  - id: xmlhttp-comma-fragment-head
  - id: xmlhttp-comma-fragment-tail
  needs: 2
