defaults:
  platforms: [windows]
  for: [vbs, javascript]
  attack: T1059.005

composite_rules:
  - id: wsh-hidden-command-output-runner
    desc: WSH runs a hidden command and captures output
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: objectives/execution/interpreter/scripting/host::exec-method
      - id: micro-behaviors/process/io/wsh::wsh-process-output-readall
    any:
      - id: objectives/anti-static/obfuscation/wsh::vbs-execute-concat-code
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-run-hidden-zero
