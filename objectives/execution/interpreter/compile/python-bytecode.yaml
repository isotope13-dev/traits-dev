defaults:
  platforms: [unix, windows, appliance]
  for: [python, pyc]
  attack: T1059.006

traits:
  - id: python-runtime-compile-call
    desc: Python runtime compile call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'compile\([\s\S]{0,160}"exec"'

  - id: python-marshal-bytecode-write
    desc: Python marshal bytecode write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'marshal[\s\S]{0,220}(MAGIC_NUMBER|dumps)'

  - id: python-exec-compiled-payload
    desc: Python exec compiled payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(__compiled_payload__|exec\(compile_result)'

  - id: python-pyc-tempfile-compile
    desc: Python bytecode temp compile
    crit: suspicious
    conf: 0.9
    for: [pyc]
    if:
      type: text
      substr: mkstemp

composite_rules:
  - id: python-runtime-bytecode-loader
    desc: Python runtime bytecode loader
    crit: hostile
    conf: 0.98
    all:
      - id: python-marshal-bytecode-write
      - id: python-exec-compiled-payload
    any:
      - id: python-runtime-compile-call
      - id: python-pyc-tempfile-compile

  - id: python-pyc-runtime-bytecode-loader
    desc: Python bytecode runtime loader
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: python-exec-compiled-payload
      - id: python-pyc-tempfile-compile
