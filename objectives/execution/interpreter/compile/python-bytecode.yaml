defaults:
  platforms: [unix, windows, appliance]
  for: [python, pyc]
  attack: T1059.006

traits:
  - id: python-runtime-compile-call
    desc: Python runtime compile call
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'compile\([\s\S]{0,160}"exec"'
    unless:
      - id: objectives/execution/interpreter/compile/

  - id: python-marshal-bytecode-write
    desc: Python marshal bytecode write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\bmarshal\.dumps\b'
    unless:
      - id: metadata/library/python-stdlib::python-stdlib-idlelib
      - id: metadata/library/python-stdlib::p-8
      - id: metadata/library/python-stdlib::python-stdlib-test-file
      - id: well-known/lib/pytest/
      - type: path
        regex: '(^|[!/])tensorflow/python/keras/utils/generic_utils\.py$'
      - id: metadata/package/testing/
      - id: metadata/package/testing/presence/harness::python-info-test-path
      - id: well-known/app/windows-desktop-tools::cmder-vendor-member

  - id: python-exec-compiled-payload
    desc: Python exec compiled payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(__compiled_payload__|exec\(compile_result)'
    unless:
      - id: metadata/library/python-stdlib::python-stdlib-idlelib
      - id: metadata/library/python-stdlib::p-8
      - id: metadata/library/python-stdlib::python-stdlib-test-file

  - id: python-pyc-tempfile-compile
    desc: Python bytecode temp compile
    crit: suspicious
    conf: 0.9
    for: [pyc]
    if:
      type: text
      regex: '(?i)mkstemp[\s\S]{0,100}\.pyc'

  - id: python-runtime-lexer-parser
    desc: Python language runtime lexer/parser marker
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'Lexer\(source[\s\S]{0,260}parser\.parse\('

  - id: python-runtime-ast-transformer
    desc: "Python language runtime AST transformer"
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: transformer.transform
    unless:
      - id: metadata/library/data::aws-python-sdk-source

composite_rules:
  - id: python-language-runtime-compile-marker
    desc: Python language runtime compile marker
    crit: notable
    conf: 0.9
    all:
      - id: python-runtime-lexer-parser
      - id: python-runtime-ast-transformer

  - id: python-runtime-bytecode-loader
    desc: Python runtime bytecode loader
    crit: hostile
    conf: 0.98
    all:
      - id: python-marshal-bytecode-write
      - id: python-exec-compiled-payload
    any:
      - id: python-runtime-compile-call
      - id: python-pyc-tempfile-compile

  - id: python-pyc-runtime-bytecode-loader
    desc: Python bytecode runtime loader
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: python-exec-compiled-payload
      - id: python-pyc-tempfile-compile
