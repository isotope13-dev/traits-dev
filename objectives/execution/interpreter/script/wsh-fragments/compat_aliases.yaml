defaults:
  platforms: [windows]
  for: [scripts, binaries, html]
  crit: component
  conf: 0.1

traits:
  - id: dynamic-this-execution-computed
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::dynamic-this-execution-computed
  - id: execution-policy-bypass
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::execution-policy-bypass
  - id: execution-policy-bypass-tokenized
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::execution-policy-bypass-tokenized
  - id: expand-archive-present
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::expand-archive-present
  - id: wscript-createobject
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::wscript-createobject
  - id: wscript-process-execution
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::wscript-process-execution
  - id: wscript-quit-obfuscated
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::wscript-quit-obfuscated
  - id: wscript-shell
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::wscript-shell
  - id: wscript-sleep
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::wscript-sleep
  - id: wsh-adodb-stream-binary
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::wsh-adodb-stream-binary
  - id: wsh-expand-env-strings
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::wsh-expand-env-strings
  - id: wsh-response-body
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::wsh-response-body
  - id: wsh-save-to-file
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::wsh-save-to-file
  - id: wsh-save-to-file-literal
    desc: Legacy WSH compat alias
    count_min: 1
    if:
      id: objectives/execution/interpreter/script/wsh::wsh-save-to-file-literal

composite_rules:
  - id: compat-aliases-referenced
    desc: Compatibility alias aggregator
    crit: component
    conf: 0.1
    any:
      - id: dynamic-this-execution-computed
      - id: execution-policy-bypass
      - id: execution-policy-bypass-tokenized
      - id: expand-archive-present
      - id: wscript-createobject
      - id: wscript-process-execution
      - id: wscript-quit-obfuscated
      - id: wscript-shell
      - id: wscript-sleep
      - id: wsh-adodb-stream-binary
      - id: wsh-expand-env-strings
      - id: wsh-response-body
      - id: wsh-save-to-file
      - id: wsh-save-to-file-literal
