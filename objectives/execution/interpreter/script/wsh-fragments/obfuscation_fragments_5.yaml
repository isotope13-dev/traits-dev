defaults:
  platforms: [windows]
  crit: suspicious
  conf: 0.9
  for:
    - javascript
traits:
  - id: adodb-fragment-tiny-exact
    desc: Exact tiny ADODB fragments (AD, OD, DB,
    crit: component
    size_max: 50000
    if:
      type: string_literal
      regex: ^(AD|OD|DB\.St)$
    unless:
      - id: metadata/package/help::usage-title
  - id: xmlhttp-fragment-tiny-exact
    desc: Exact tiny XMLHTTP fragments (XMLH, XML2., MS)
    crit: component
    size_max: 50000
    if:
      type: string_literal
      regex: ^(XMLH|XML2\.|MS|TTP)$
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/package/help::usage-title
  - id: xmlhttp-fragment-tiny-exact-alt
    desc: Exact tiny XMLHTTP fragments (MLHTT, ("MSX)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      regex: '^(\("MSX|MLHTT)$'
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/package/help::usage-title
  - id: readystate-fragment-tiny-exact
    desc: Exact tiny readyState fragments (rea, dy, tate)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      regex: ^(rea|dy|tate)$
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/package/help::usage-title
  - id: readystate-fragment-tiny-exact-alt
    desc: Exact tiny readyState fragments (eady, yStat)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      regex: ^(eady|yStat)$
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/package/help::usage-title
  - id: wscript-shell-fragment-tiny-exact-1
    desc: Exact tiny WScript fragments (WScr, ipt.)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      exact: ipt.
    unless:
      - id: metadata/package/help::usage-title
  - id: wscript-shell-fragment-tiny-exact-2
    desc: Exact tiny WScript fragments (She, ll)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      regex: ^(She|ll)$
    unless:
      - id: metadata/package/help::usage-title
  - id: timing-fragment-tiny-exact-1
    desc: Tiny timing fragments (Sl, eep, Date)
    crit: component
    if:
      type: string_literal
      regex: ^(Sl|eep)$
    unless:
      - id: metadata/package/help::usage-title
  - id: timing-fragment-tiny-exact-2
    desc: Tiny timing fragments (Mill, illi, onds)
    crit: suspicious
    if:
      type: string_literal
      regex: ^(Mill|illi|onds)$
    unless:
      - id: metadata/package/help::usage-title
  - id: payload-handling-fragment-tiny-exact-1
    desc: Tiny payload fragments (Respo, nseBo, saveT)
    crit: suspicious
    if:
      type: string_literal
      regex: ^(Respo|nseBo|saveT)$
    unless:
      - id: metadata/package/help::usage-title
  - id: payload-handling-fragment-tiny-exact-2
    desc: Tiny payload fragments (oFile, Expa, ndEn, viron)
    crit: suspicious
    if:
      type: string_literal
      regex: ^(oFile|Expa|ndEn|viron)$
    unless:
      - id: metadata/package/help::usage-title
  - id: response-body-fragment-tiny-exact
    desc: Tiny ResponseBody fragments (spon, seB, ody);)
    crit: suspicious
    if:
      type: string_literal
      regex: '^(spon|seB|ody\);)$'
    unless:
      - id: metadata/package/help::usage-title
  - id: xmlhttp-open-fragment-tiny-exact
    desc: Tiny XMLHTTP open/get fragments (.open, ("GE)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      regex: '^(\.open|\("GE)$'
    unless:
      - id: metadata/package/help::usage-title
  - id: run-fragment-tiny-exact
    desc: Tiny WScript.Shell.Run fragment (.Ru)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      exact: ".Ru"
    unless:
      - id: metadata/package/help::usage-title
  - id: run-fragment-ws-ru-exact
    desc: Tiny WScript.Shell.Run fragment (ws.Ru)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      exact: ws.Ru
    unless:
      - id: metadata/package/help::usage-title
  - id: temp-path-fragment-tiny
    desc: Tiny %TEMP% dropper path fragment (%TEM)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      regex: ^(%TEM|EMP%)$
    unless:
      - id: metadata/package/help::usage-title
  - id: expand-env-fragment-tiny-1
    desc: Tiny ExpandEnvironmentStrings fragment (Env, iron, mentS)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      regex: ^(iron|mentS)$
    unless:
      - id: metadata/package/help::usage-title
  - id: counter-url-fragment-1
    desc: C2 tracking counter URL fragment (/coun, ter/?)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      regex: ^(/coun|ter/\?)$
    unless:
      - id: metadata/package/help::usage-title
  - id: variant-url-fragment-1
    desc: Variant URL fragment (/ozon)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      exact: /ozon
    unless:
      - id: metadata/package/help::usage-title
  - id: variant-url-fragment-2
    desc: Variant URL fragment (o.org.)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      exact: o.org.
    unless:
      - id: metadata/package/help::usage-title
  - id: variant-url-fragment-3
    desc: Variant URL fragment (es/k7)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      exact: es/k7
    unless:
      - id: metadata/package/help::usage-title
  - id: variant-staging-fragment-1
    desc: Variant WSH staging fragment (WScrip, t.Shel)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      regex: ^(WScrip|t\.Shel)$
    unless:
      - id: metadata/package/help::usage-title
  - id: variant-staging-fragment-2
    desc: Variant temp staging fragment (dEnvir, onment, .scr)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      regex: ^(dEnvir|onment|\.scr)$
    unless:
      - id: metadata/package/help::usage-title
  - id: variant-staging-fragment-3
    desc: Variant execution fragment (Ru)
    crit: suspicious
    size_max: 50000
    if:
      type: string_literal
      exact: Ru
    unless:
      - id: metadata/package/help::usage-title
  - id: comma-wscript-shell-constructor
    desc: Comma-fragmented WScript.Shell constructor
    crit: component
    size_max: 50000
    if:
      type: text
      regex: '\w+\s*=\s*new\s+\w+\(''WSc''\s*\+\s*\([^)]{1,80}''r''\)'
  - id: comma-xmlhttp-constructor
    desc: Comma-fragmented XMLHTTP constructor
    crit: component
    size_max: 50000
    if:
      type: text
      regex: '\w+\s*=\s*new\s+\w+\(''MS''\s*\+\s*\([^)]{1,80}''X''\)'
  - id: comma-adodb-stream-constructor
    desc: Comma-fragmented ADODB.Stream constructor
    crit: component
    size_max: 50000
    if:
      type: text
      regex: '\w+\s*=\s*new\s+\w+\(''AD''\s*\+\s*\([^)]{1,80}''O''\)'
  - id: comma-bracket-open-method
    desc: Comma-fragmented bracket open method
    crit: component
    size_max: 50000
    if:
      type: text
      regex: '\[''op''\s*\+\s*\([^)]{1,80}''e''\)\s*\+\s*''n''\]'
  - id: split-temp-scr-staging-fragments
    desc: Split TEMP screensaver staging fragments
    crit: component
    size_max: 50000
    count_min: 3
    if:
      type: string_literal
      regex: '^(%TE|P%|\.s)$'
  - id: wsh-run-method-literal
    desc: WScript Run method literal
    crit: component
    size_max: 50000
    if:
      type: string_literal
      exact: Run
    unless:
      - id: metadata/package/help::usage-title
composite_rules:
  - id: wscript-shell-fragment-tiny-exact
    desc: Exact tiny WScript fragments
    crit: suspicious
    any:
      - id: wscript-shell-fragment-tiny-exact-1
      - id: wscript-shell-fragment-tiny-exact-2
  - id: xmlhttp-fragment-tiny-exact-extended
    desc: Exact tiny XMLHTTP fragments
    crit: suspicious
    any:
      - id: xmlhttp-fragment-tiny-exact
      - id: xmlhttp-fragment-tiny-exact-alt
  - id: timing-fragment-tiny-exact
    desc: Exact tiny timing/delay fragments
    crit: suspicious
    any:
      - id: timing-fragment-tiny-exact-1
      - id: timing-fragment-tiny-exact-2
  - id: readystate-fragment-tiny-exact-extended
    desc: Exact tiny readyState fragments
    crit: suspicious
    any:
      - id: readystate-fragment-tiny-exact
      - id: readystate-fragment-tiny-exact-alt
  - id: payload-handling-fragment-tiny-exact
    desc: Exact tiny payload handling fragments
    crit: suspicious
    any:
      - id: payload-handling-fragment-tiny-exact-1
      - id: payload-handling-fragment-tiny-exact-2
  - id: expand-env-fragment-tiny
    desc: ExpandEnvironmentStrings tiny fragments
    crit: suspicious
    any:
      - id: expand-env-fragment-tiny-1
      - id: objectives/execution/interpreter/script/wsh-fragments::expand-env-fragment-1
  - id: counter-url-fragment
    desc: C2 counter tracking URL fragment pair
    crit: suspicious
    all:
      - id: counter-url-fragment-1
      - id: objectives/execution/interpreter/script/wsh-fragments::xmlhttp-fragment-tiny-exact
  - id: variant-url-fragment-cluster
    desc: Variant download URL fragment cluster
    crit: suspicious
    all:
      - id: variant-url-fragment-1
      - id: variant-url-fragment-2
      - id: variant-url-fragment-3
      - id: xmlhttp-fragment-tiny-exact-extended
  - id: variant-staging-fragment-cluster
    desc: Variant temp SCR staging fragment cluster
    crit: suspicious
    all:
      - id: variant-staging-fragment-1
      - id: variant-staging-fragment-2
      - id: variant-staging-fragment-3
      - id: payload-handling-fragment-tiny-exact
  - id: jse-wsh-dropper-tiny-exact-fragments
    desc: Obfuscated JScript PE dropper via tiny WSH+ADODB+XMLHTTP fragments
    crit: hostile
    conf: 0.92
    attack: T1059.007
    all:
      - id: xmlhttp-fragment-tiny-exact
      - id: adodb-fragment-tiny-exact
      - id: readystate-fragment-tiny-exact
      - id: payload-handling-fragment-tiny-exact-1
    any:
      - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-keyword
      - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-return
  - id: jse-wsh-http-download-tiny-exact-fragments
    desc: Obfuscated JScript WSH HTTP download via tiny fragments
    crit: hostile
    conf: 0.95
    attack: T1059.007, T1105
    all:
      - id: xmlhttp-fragment-tiny-exact-extended
      - id: xmlhttp-open-fragment-tiny-exact
      - id: readystate-fragment-tiny-exact-extended
      - id: response-body-fragment-tiny-exact
    any:
      - id: temp-path-fragment-tiny
      - id: run-fragment-tiny-exact
      - id: expand-env-fragment-tiny
  - id: jse-wsh-responsebody-run-fragments
    desc: Obfuscated JScript WSH ResponseBody download and run
    crit: hostile
    conf: 0.97
    attack: T1059.007, T1105
    all:
      - id: xmlhttp-open-fragment-tiny-exact
      - id: response-body-fragment-tiny-exact
      - id: micro-behaviors/process/interpreter/jscript::adodb-fragment-dodb
      - id: run-fragment-ws-ru-exact
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::sequential-identifiers
    any:
      - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-keyword
      - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-return
  - id: jse-wsh-http-download-scr-run-variant
    desc: Obfuscated JScript WSH SCR download and run variant
    crit: hostile
    conf: 0.97
    attack: T1059.007, T1105
    all:
      - id: variant-url-fragment-cluster
      - id: variant-staging-fragment-cluster
      - id: adodb-fragment-tiny-exact
      - id: readystate-fragment-tiny-exact-extended
      - id: response-body-fragment-tiny-exact
  - id: jse-wsh-http-download-array-shards
    desc: Obfuscated JScript WSH downloader via array shards
    crit: hostile
    conf: 0.96
    attack: T1059.007, T1105
    all:
      - id: objectives/execution/interpreter/script/wsh-fragments::wscript-shell-fragment-1
      - id: xmlhttp-fragment-tiny-exact-extended
      - id: adodb-fragment-tiny-exact
      - id: readystate-fragment-tiny-exact-extended
      - id: micro-behaviors/data/source/syntax::array-literal-indexing
      - id: micro-behaviors/process/create/shell::cmd-name
      - id: micro-behaviors/data/source/syntax/keyword::js-keyword-function-constructor
  - id: jse-wsh-comma-fragmented-scr-dropper
    desc: Comma-fragmented WSH SCR downloader
    crit: hostile
    conf: 0.97
    attack: T1059.007, T1105
    all:
      - id: comma-wscript-shell-constructor
      - id: comma-xmlhttp-constructor
      - id: comma-adodb-stream-constructor
      - id: comma-bracket-open-method
      - id: split-temp-scr-staging-fragments
      - id: wsh-run-method-literal
      - id: objectives/anti-static/obfuscation/string/conceal::js-comma-string-obfuscation
