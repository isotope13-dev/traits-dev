# Obfuscated WSH String Fragments
# Detects fragmented strings common in JScript obfuscation
defaults:
  platforms: [windows]
  crit: notable
  conf: 0.8
  for: [javascript, typescript, vbs, html]
traits:
  - id: wscript-shell-fragment-1
    desc: WScript.Shell string fragment (WScrip/WScr)
    crit: component
    if:
      type: text
      substr: 'WScr'
    unless:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
  - id: wscript-shell-fragment-2
    desc: WScript.Shell string fragment (Shell/Shel)
    if:
      type: text
      regex: 't\.She["'']\s*\+|pt\.She["'']\s*\+|\.Shel["'']\s*\+'
  - id: adodb-fragment-1
    desc: ADODB.Stream string fragment (ADODB/ADO)
    if:
      type: text
      word: 'ADO'
  - id: adodb-fragment-2
    desc: 'ADODB.Stream string fragment'
    if:
      type: text
      regex: 'B\.Str|B\.St|DB\.St|ODB\.St'
    not:
      - substr: ADODB.Stream
    unless:
      - id: micro-behaviors/fs/write/file/stream::adodb-stream
  - id: filesystemobject-fragment-1a
    desc: FileSystemObject string fragment (SystemObj)
    # Require a quote adjacent to the fragment: split-string obfuscation
    # produces quoted literal fragments ("File"+"SystemObj"+"ect"), whereas
    # benign identifiers (isSystemObjectParams, UnassignSystemObjectParams)
    # carry no adjacent quote. Bare substr matched those FPs.
    if:
      type: text
      regex: '["'']SystemObj|SystemObj["'']'
    not:
      - substr: 'Scripting.FileSystemObject'
  - id: filesystemobject-fragment-1b
    desc: FileSystemObject string fragment (temObj)
    # Same quote-adjacency guard: bare "temObj" also matched the camelCase
    # identifier ...SystemObject (sys-TEM-OBJ-ect) in transpiled clients.
    if:
      type: text
      regex: '["'']temObj|temObj["'']'
    unless:
      - id: micro-behaviors/os/com/object::filesystemobject-progid
  - id: filesystemobject-fragment-2
    desc: FileSystemObject string fragment (FileSystem)
    if:
      type: text
      word: 'FileSystem'
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
      - id: metadata/library/jspdf/
  - id: expand-env-fragment-1
    desc: ExpandEnvironmentStrings fragment (xpandE)
    if:
      type: text
      regex: '["'']xpandE|xpandE["'']'
    unless:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
  - id: expand-env-fragment-2
    desc: ExpandEnvironmentStrings fragment (nviron)
    if:
      type: text
      regex: '["'']nviron|nviron["'']'
    unless:
      - id: micro-behaviors/data/text/keywords/env::environment-keyword
  - id: response-body-fragment-1
    desc: ResponseBody fragment (ResponseB)
    crit: component
    if:
      type: text
      substr: 'ResponseB'
  - id: response-body-fragment-2a
    desc: ResponseBody fragment (nseBody)
    crit: component
    if:
      type: text
      substr: 'nseBody'
  - id: response-body-fragment-2b
    desc: ResponseBody fragment (onseB)
    crit: component
    if:
      type: text
      substr: 'onseB'
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
  - id: script-fullname-fragment
    desc: WScript.ScriptFullName fragment
    if:
      type: text
      regex: 'ript["'']\s*\+\s*["'']Full|Full["'']\s*\+\s*["'']Name|ScriptFull["'']\s*\+\s*["'']Name'
composite_rules:
  - id: wscript-shell-fragment
    desc: WScript.Shell string fragment
    any:
      - id: wscript-shell-fragment-1
      - id: wscript-shell-fragment-2
      - id: micro-behaviors/process/interpreter/jscript::wscript-shell-fragment-dotshel
  - id: adodb-fragment
    desc: ADODB.Stream string fragment
    any:
      - id: adodb-fragment-1
      - id: adodb-fragment-2
      - id: micro-behaviors/process/interpreter/jscript::adodb-fragment-dodb
  - id: filesystemobject-fragment-1
    desc: FileSystemObject string fragment (SystemObj/temObj)
    any:
      - id: filesystemobject-fragment-1a
      - id: filesystemobject-fragment-1b
  - id: filesystemobject-fragment
    desc: FileSystemObject string fragment
    any:
      - id: filesystemobject-fragment-1
      - id: filesystemobject-fragment-2
  - id: expand-env-fragment
    desc: ExpandEnvironmentStrings fragment
    any:
      - id: expand-env-fragment-1
      - id: expand-env-fragment-2
  - id: response-body-fragment-2
    desc: ResponseBody fragment (nseBody/onseB)
    crit: component
    any:
      - id: response-body-fragment-2a
      - id: response-body-fragment-2b
  - id: response-body-fragment
    desc: ResponseBody fragment
    crit: component
    any:
      - id: response-body-fragment-1
      - id: response-body-fragment-2
      - id: objectives/anti-static/obfuscation/string/conceal::js-xmlhttp-responsebody-reversed
