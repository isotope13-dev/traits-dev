defaults:
  for: [powershell, batch, vbs]
  crit: notable
  conf: 0.5
  platforms:
    - windows
traits:
  - id: cmd-exe-dup
    desc: cmd.exe Windows command shell reference
    crit: notable
    conf: 0.4
    if:
      type: string
      regex: (?i)cmd\.exe
composite_rules:
  - id: powershell-exe-comp
    desc: powershell.exe executable reference
    all:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
  - id: windows-executable-ref
    desc: Windows executable or script file type reference
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/fs/path/extension
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
      - id: objectives/execution/interpreter/script::cmd-exe-dup
