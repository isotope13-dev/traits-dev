defaults:
  platforms: [android, unix]
  for: [shell]
  attack: T1059.004
traits:
  - id: prefix-temp-exe-run-path
    desc: PREFIX temp executable runner path
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "$PREFIX/tmp/exe_run_$$"
  - id: copy-arg-to-temp-file
    desc: Copies argument file to temp
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'cp\s+"\$file"\s+"\$tmp"'
  - id: execute-temp-with-args
    desc: Executes temp file with arguments
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '"\$tmp"\s+"\$@"'
composite_rules:
  - id: shell-temp-executable-runner
    desc: Shell copies file to temp and executes
    crit: suspicious
    conf: 0.95
    all:
      - id: prefix-temp-exe-run-path
      - id: copy-arg-to-temp-file
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
      - id: execute-temp-with-args
