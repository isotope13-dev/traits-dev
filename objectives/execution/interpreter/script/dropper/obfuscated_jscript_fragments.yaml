# Obfuscated JScript Dropper (Fragmented)
# Detects JScript malware using tiny fragments and dynamic execution
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: hostile
  conf: 0.9
  for: [javascript]
composite_rules:
  - id: obfuscated-downloader-tiny-fragments-2
    desc: Obfuscated WSH downloader (Tiny Fragments Variant 2)
    all:
      - id: objectives/execution/interpreter/script/wsh-fragments::wscript-shell-fragment-tiny-2
      - id: objectives/execution/interpreter/script/wsh-fragments::xmlhttp-fragment-tiny-2
    any:
      - id: objectives/execution/interpreter/script/wsh-fragments::savetofile-fragment-tiny-2
      - id: objectives/execution/interpreter/script/wsh-fragments::adodb-fragment-tiny-2
      - id: objectives/execution/interpreter/script/wsh-fragments::activex-fragment-tiny-2
  - id: obfuscated-jscript-dynamic-execution
    desc: Obfuscated JScript dynamic execution (this[...])
    all:
      - id: objectives/execution/interpreter/script/wsh::dynamic-this-execution-computed
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/functions::high-function-density
      - id: objectives/anti-static/obfuscation/code-metrics/functions::many-one-liner-functions
      - id: objectives/anti-static/obfuscation/code-metrics/structure::no-comments
    unless:
      - id: metadata/library/jquery/
      - id: metadata/library/d3/
      - id: metadata/library/prototype/
      - id: metadata/library/structure/
  - id: obfuscated-jscript-temp-dropper-staging
    desc: Obfuscated JScript temp-path staging chain
    crit: suspicious
    conf: 0.94
    attack: T1059.007, T1105
    all:
      - id: objectives/execution/interpreter/script/wsh-fragments::temp-path-fragment-tiny
      - id: objectives/execution/interpreter/script/wsh-fragments::payload-handling-fragment-tiny-exact-2
      - id: objectives/command-and-control/dropper/fragmented::from-charcode-fragment
      - id: objectives/command-and-control/dropper/fragmented::run-call-fragment
      - id: objectives/execution/interpreter/script/wsh-fragments::adodb-fragment-2
  - id: obfuscated-jscript-temp-exe-dropper
    desc: Obfuscated JScript WSH temp EXE dropper
    crit: hostile
    conf: 0.97
    attack: T1059.007, T1105, T1027
    mbc: B0017, B0018, B0032
    all:
      - id: obfuscated-jscript-temp-dropper-staging
      - id: objectives/anti-static/obfuscation/syntax::js-dense-string-building
      - id: objectives/execution/interpreter/eval/dynamic::js-indirect-eval-this
