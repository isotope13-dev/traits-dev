# Runtime Deobfuscation Composite Rules
# Detects patterns of runtime string deobfuscation
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: multi-layer-deobfuscation
    desc: "Multi-layer runtime string deobfuscation"
    crit: hostile
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: objectives/anti-static/obfuscation/string::self-modifying-string-replace
      - id: objectives/anti-static/obfuscation/string::custom-delimiter-obfuscation
    any:
      - id: objectives/anti-static/obfuscation/string::base64-function-keyword
      - id: objectives/execution/interpreter/script/embedded::powershell-cmdlet-patterns
  - id: obfuscation-with-duplicate-names
    desc: "Code inflation with duplicate function names"
    crit: hostile
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: objectives/anti-static/obfuscation/name-mangling::random-identifier-chains
    any:
      - id: objectives/anti-static/obfuscation/string::char-expansion-obfuscation
      - id: objectives/anti-static/obfuscation/string::cyrillic-junk-padding
      - id: objectives/anti-static/obfuscation/string::custom-delimiter-obfuscation
  - id: embedded-code-with-deobfuscation
    desc: "High embedded code with runtime deobfuscation"
    crit: hostile
    conf: 0.85
    for: [javascript, typescript, powershell]
    all:
      - id: objectives/anti-static/obfuscation/code-metrics/source::high-embedded-code-ratio
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/string::self-modifying-string-replace
      - id: objectives/anti-static/obfuscation/string::chained-replace-calls
      - id: objectives/anti-static/obfuscation/string::powershell-replace-operator
