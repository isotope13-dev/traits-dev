defaults:
  platforms: [unix, windows, macos]
# WSH-based Dropper Patterns
# Detects Windows Script Host droppers with PowerShell execution
traits:
  - id: wscript-global-index-bootstrap
    desc: Indexed WScript global bootstrap
    crit: suspicious
    conf: 0.96
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      substr: "[WScript][0][["
  - id: wscript-this-double-bracket-dispatch
    desc: Nested this bracket COM dispatch
    crit: suspicious
    conf: 0.94
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      substr: "this[["
  - id: indexed-get-fragment
    desc: Indexed GET fragment selection
    crit: suspicious
    conf: 0.95
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: '\[[^]]{0,80}"GET"[^]]{0,40}\]\[1\]'
  - id: indexed-url-separator-fragment
    desc: Indexed URL separator selection
    crit: suspicious
    conf: 0.95
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: '\[[^]]{0,80}":/"[^]]{0,40}\]\[1\]'
  - id: indexed-exe-number-fragment
    desc: Indexed EXE numeric fragment
    crit: suspicious
    conf: 0.94
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: '\[[^]]{0,80}"77"[^]]{0,40}\]\[0\]'
  - id: indexed-exe-text-fragment
    desc: Indexed EXE text fragment
    crit: suspicious
    conf: 0.94
    for: [javascript]
    platforms: [windows]
    if:
      type: text
      regex: '\[[^]]{0,80}"ex"[^]]{0,40}\]\[4\]'
composite_rules:
  - id: wsh-powershell-dropper
    desc: "WSH dropper executing PowerShell with bypass"
    crit: hostile
    conf: 0.95
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass
  - id: embedded-powershell-script
    desc: "Embedded PowerShell code in non-PowerShell file"
    crit: hostile
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: objectives/execution/interpreter/script/embedded::powershell-vars-in-javascript
      - id: objectives/execution/interpreter/script/embedded::powershell-cmdlet-patterns
  - id: obfuscated-wsh-dropper
    desc: "Obfuscated WSH dropper with char expansion"
    crit: hostile
    conf: 0.95
    for: [javascript]
    platforms: [windows]
    all:
      - id: objectives/anti-static/obfuscation/string::char-expansion-obfuscation
      - id: objectives/anti-static/obfuscation/string::base64-function-keyword
    any:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: objectives/execution/interpreter/script/embedded::powershell-cmdlet-patterns
  - id: public-folder-dropper
    desc: "File dropper using Public folder with random names"
    crit: hostile
    conf: 0.9
    attack: "T1564.001"
    for: [javascript, powershell]
    platforms: [windows]
    all:
      - id: objectives/command-and-control/dropper/staging/public-folder::public-folder-short-random
    any:
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: objectives/execution/interpreter/script/embedded::powershell-cmdlet-patterns
  - id: base64-payload-dropper
    desc: "Base64-encoded payload with WSH execution"
    crit: hostile
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: objectives/anti-static/obfuscation/string::base64-function-keyword
      - id: objectives/anti-static/obfuscation/string::char-expansion-obfuscation
    any:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: objectives/execution/interpreter/script/embedded::powershell-vars-in-javascript
  - id: wsh-js-downloader
    desc: "JScript/WSH Downloader with file write"
    crit: hostile
    conf: 0.95
    for: [javascript]
    platforms: [windows]
    all:
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file
      - id: objectives/execution/interpreter/script/wsh::wsh-response-body
    any:
      - id: objectives/execution/activex/com::activex-object-create
      - id: objectives/execution/interpreter/script/wsh::wscript-createobject
  - id: wsh-js-downloader-obfuscated-fragments
    desc: "Obfuscated JScript WSH download execute"
    crit: hostile
    conf: 0.96
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: objectives/execution/interpreter/script/wsh::wscript-shell-fragment
      - id: objectives/execution/interpreter/script/wsh::adodb-fragment
      - id: objectives/execution/interpreter/script/wsh::response-body-fragment
      - id: objectives/execution/interpreter/script/wsh::expand-env-fragment
    any:
      - id: objectives/execution/interpreter/script/wsh::xmlhttp-fragment-tiny-exact
      - id: objectives/execution/interpreter/script/wsh::savetofile-fragment-tiny-2
      - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-on
  - id: wsh-js-marker-obfuscated-downloader
    desc: "WSH downloader with marker-stripped Base64 strings"
    crit: hostile
    conf: 0.97
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: objectives/anti-static/obfuscation/syntax::js-marker-stripped-base64-decoder
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file
      - id: objectives/execution/interpreter/script/wsh::wscript-shell-fragment
      - id: micro-behaviors/process/interpreter/jscript::is-jscript
    any:
      - id: micro-behaviors/communications/http/protocol::http-prefix
      - id: objectives/execution/interpreter/script/wsh::save-to-file-fragment
  - id: wsh-js-downloader-array-fragments
    desc: "Indexed-array WSH downloader builds EXE URL"
    crit: hostile
    conf: 0.97
    attack: "T1059.007"
    mbc: "B0017, B0018, B0032"
    for: [javascript]
    platforms: [windows]
    all:
      - id: objectives/anti-static/obfuscation/syntax::js-array-index-concatenation
      - id: wscript-global-index-bootstrap
      - id: wscript-this-double-bracket-dispatch
      - id: indexed-get-fragment
      - id: indexed-url-separator-fragment
      - id: indexed-exe-number-fragment
      - id: indexed-exe-text-fragment
  - id: shell-application-powershell-dropper
    desc: "Shell.Application PowerShell download-execute dropper"
    crit: hostile
    conf: 0.97
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/com/object::shell-application-progid
      - id: objectives/execution/activex/com::shell-execute-method
      - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass
      - id: micro-behaviors/communications/http/download::webclient-downloadfile
    any:
      - id: micro-behaviors/process/create::start-process-dup
      - id: micro-behaviors/fs/path/location::path-suspicious-appdata-exe
      - id: micro-behaviors/process/daemonize::powershell-hidden
  - id: tokenized-wsh-powershell-download-execute
    desc: "Tokenized WSH PowerShell download execute dropper"
    crit: hostile
    conf: 0.97
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-obfuscated
      - id: objectives/anti-static/obfuscation/string::js-token-substitution-deobfuscation
    any:
      - id: micro-behaviors/communications/http/download::webclient-downloadfile-tokenized
      - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass-tokenized
      - id: micro-behaviors/process/daemonize::powershell-hidden-tokenized
      - id: micro-behaviors/process/create::start-process-tokenized
  - id: hex-obfuscated-wsh-temp-dropper
    desc: "Hex-obfuscated WSH temp dropper"
    crit: hostile
    conf: 0.96
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: objectives/execution/interpreter/script/wsh::wscript-createobject
      - id: objectives/execution/interpreter/scripting/host::run-hidden-double-zero
      - id: micro-behaviors/fs/path/temp::win-temp-env
      - id: objectives/anti-static/obfuscation/string/encoding::js-dense-hex-escapes
      - id: objectives/execution/interpreter/scripting/host::wscript-shell-obfuscated-dup
  - id: interleaved-eval-wsh-dropper
    desc: "Interleaved JScript eval WSH dropper"
    crit: hostile
    conf: 0.97
    attack: "T1059.007"
    mbc: "B0017, B0032"
    for: [javascript]
    platforms: [windows]
    all:
      - id: objectives/execution/interpreter/script/wsh::activexobject-call
      - id: objectives/anti-static/obfuscation/string/conceal::js-var-split-marker
      - id: micro-behaviors/data/encode/skip-step::js-skip-step-loop-variable
      - id: micro-behaviors/data/encode/skip-step::js-loop-string-concat
      - id: objectives/anti-static/obfuscation/string::js-interleaved-lowercase-junk
  - id: interleaved-charat-wsh-dropper
    desc: "Interleaved JScript charAt eval dropper"
    crit: hostile
    conf: 0.96
    attack: "T1059.007"
    mbc: "B0017, B0032"
    for: [javascript]
    platforms: [windows]
    all:
      - id: objectives/execution/interpreter/script/wsh::activexobject-call
      - id: objectives/anti-static/obfuscation/string::js-interleaved-lowercase-junk
      - id: micro-behaviors/data/encode/skip-step::js-loop-string-charat
    any:
      - id: objectives/execution/interpreter/eval/dynamic::js-indirect-eval-this
      - id: micro-behaviors/data/control-flow/analysis::loop-variable-variable-step
