defaults:
  platforms: [unix, windows, macos]
# WSH-based Dropper Patterns
# Detects Windows Script Host droppers with PowerShell execution
composite_rules:
  - id: wsh-powershell-dropper
    desc: "WSH dropper executing PowerShell with bypass"
    crit: hostile
    conf: 0.95
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass
  - id: embedded-powershell-script
    desc: "Embedded PowerShell code in non-PowerShell file"
    crit: hostile
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: objectives/execution/interpreter/script/embedded::powershell-vars-in-javascript
      - id: objectives/execution/interpreter/script/embedded::powershell-cmdlet-patterns
  - id: obfuscated-wsh-dropper
    desc: "Obfuscated WSH dropper with char expansion"
    crit: hostile
    conf: 0.95
    for: [javascript]
    platforms: [windows]
    all:
      - id: objectives/anti-static/obfuscation/string/reconstruct::char-expansion-obfuscation
      - id: objectives/anti-static/obfuscation/string/base64::base64-function-keyword
    any:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: objectives/execution/interpreter/script/embedded::powershell-cmdlet-patterns
  - id: public-folder-dropper
    desc: "File dropper using Public folder with random names"
    crit: hostile
    conf: 0.9
    attack: "T1564.001"
    for: [javascript, powershell]
    platforms: [windows]
    all:
      - id: objectives/command-and-control/dropper/staging/public-folder::public-folder-short-random
    any:
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: objectives/execution/interpreter/script/embedded::powershell-cmdlet-patterns
  - id: base64-payload-dropper
    desc: "Base64-encoded payload with WSH execution"
    crit: hostile
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: objectives/anti-static/obfuscation/string/base64::base64-function-keyword
      - id: objectives/anti-static/obfuscation/string/reconstruct::char-expansion-obfuscation
    any:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: objectives/execution/interpreter/script/embedded::powershell-vars-in-javascript
  - id: wsh-js-downloader
    desc: "JScript/WSH Downloader with file write"
    crit: hostile
    conf: 0.95
    for: [javascript]
    platforms: [windows]
    all:
      - id: micro-behaviors/fs/write/stream::adodb-binary-write
    any:
      - id: objectives/execution/activex/com::activex-object-create
      - id: objectives/execution/interpreter/script/wsh::wscript-createobject
  - id: wsh-fso-dropper
    desc: "WSH dropper using FileSystemObject to write and execute"
    crit: hostile
    conf: 0.95
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: micro-behaviors/fs/write/text::create-text-file-api
      - id: micro-behaviors/fs/write/text::write-text-file-method
    any:
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-obfuscated
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-indirect
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/lang/encoded/unicode-escape::app-asar-path
  - id: shell-application-powershell-dropper
    desc: "Shell.Application PowerShell download-execute dropper"
    crit: hostile
    conf: 0.97
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/com/object::shell-application-progid
      - id: objectives/execution/activex/com::shell-execute-method
      - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass
      - id: micro-behaviors/communications/http/download/webclient::webclient-downloadfile
    any:
      - id: micro-behaviors/process/create::start-process-dup
      - id: micro-behaviors/fs/path/location::path-suspicious-appdata-exe
      - id: micro-behaviors/process/daemonize/spawn::powershell-hidden
  - id: tokenized-wsh-powershell-download-execute
    desc: "Tokenized WSH PowerShell download execute dropper"
    crit: hostile
    conf: 0.97
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-obfuscated
      - id: objectives/anti-static/obfuscation/string/recovery::js-token-substitution-deobfuscation
    any:
      - id: micro-behaviors/communications/http/download/webclient::webclient-downloadfile-tokenized
      - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass-tokenized
      - id: micro-behaviors/process/daemonize/spawn::powershell-hidden-tokenized
      - id: micro-behaviors/process/create::start-process-tokenized
  - id: wsh-powershell-webclient-appdata-execute
    desc: "WSH PowerShell WebClient APPDATA execute"
    crit: hostile
    conf: 0.97
    attack: "T1059.007"
    for: [javascript]
    platforms: [windows]
    all:
      - id: micro-behaviors/communications/http/download/webclient::webclient-downloadfile
      - id: micro-behaviors/process/daemonize/spawn::powershell-hidden
      - id: micro-behaviors/fs/path/location::path-suspicious-appdata-exe
      - id: micro-behaviors/process/create::start-process-caret
    any:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
