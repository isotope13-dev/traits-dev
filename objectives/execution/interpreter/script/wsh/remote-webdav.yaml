defaults:
  for: [vbs]
  platforms: [windows]
  attack: T1059.007,T1105
composite_rules:
  - id: wsh-webdav-remote-script
    desc: WSH enables execution of a remote WebDAV script
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/os/wsh/file::wsh-windows-interpreter-option
      - id: micro-behaviors/communications/http/webdav::webdav-ssl-unc-path
      - id: objectives/command-and-control/infrastructure/domain/tunnel::cloudflare-tunnel
