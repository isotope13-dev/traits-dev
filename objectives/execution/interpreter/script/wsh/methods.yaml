defaults:
  crit: notable
  conf: 0.8
  platforms:
  - windows
  for:
  - javascript
  - vbs
traits:
- id: wsh-expand-env-strings-unicode
  desc: Calls unicode-escaped ExpandEnvironmentStrings
  if:
    type: encoded
    encoding: unicode-escape
    word: ExpandEnvironmentStrings
    case_insensitive: true
- id: wsh-response-body-unicode
  desc: Accesses unicode-escaped responseBody
  crit: component
  if:
    type: encoded
    encoding: unicode-escape
    word: responseBody
    case_insensitive: true
- id: wsh-response-body-hex
  desc: Accesses responseBody hex-escaped form
  crit: component
  if:
    type: string_literal
    substr: \\\\x72\\\\x65\\\\x73\\\\x70\\\\x6F\\\\x6E\\\\x73\\\\x65\\\\x42\\\\x6F\\\\x64\\\\x79
    case_insensitive: true
- id: wsh-save-to-file-literal
  desc: Calls saveToFile (often ADODB.Stream)
  crit: component
  if:
    type: string_literal
    case_insensitive: true
    word: saveToFile
- id: wsh-save-to-file-unicode
  desc: Calls unicode-escaped saveToFile
  crit: component
  if:
    type: encoded
    encoding: unicode-escape
    word: saveToFile
    case_insensitive: true
- id: wsh-save-to-file-hex
  desc: Calls saveToFile hex-escaped form
  if:
    type: string_literal
    case_insensitive: true
    regex: \\\\x73\\\\x61\\\\x76\\\\x65\\\\x54\\\\x6F\\\\x46\\\\x69\\\\x6C\\\\x65
- id: wsh-save-to-file-method
  desc: saveToFile method call in source
  crit: component
  if:
    type: text
    substr: ".saveToFile("
    case_insensitive: true
composite_rules:
- id: wsh-response-body
  desc: Accesses responseBody (XMLHTTP)
  unless:
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  any:
  - id: wsh-response-body-wscript
  - id: wsh-response-body-xmlhttp
  - id: wsh-response-body-adodb
- id: wsh-response-body-wscript
  desc: Accesses responseBody with WScript.Shell context
  all:
  - id: wsh-response-body-indicator
  - id: micro-behaviors/os/com/object::wscript-shell-literal
- id: wsh-response-body-xmlhttp
  desc: Accesses responseBody with XMLHTTP COM context
  all:
  - id: wsh-response-body-indicator
  - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
- id: wsh-response-body-adodb
  desc: Accesses responseBody with ADODB.Stream context
  all:
  - id: wsh-response-body-indicator
  - id: micro-behaviors/fs/write/file/stream::adodb-stream
- id: wsh-response-body-indicator
  desc: Accesses responseBody in a WSH-compatible encoding
  any:
  - id: micro-behaviors/process/create/script/wsh::responsebody-marker
  - id: objectives/execution/interpreter/script/wsh::wsh-response-body-unicode
  - id: objectives/execution/interpreter/script/wsh::wsh-response-body-hex
- id: wsh-save-to-file
  desc: Calls saveToFile (often ADODB.Stream)
  unless:
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  any:
  - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file-literal
  - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file-unicode
  - id: micro-behaviors/fs/write/stream::adodb-save-to-file-unicode
  - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file-hex
  - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file-method
- id: wsh-expand-env-strings
  desc: Calls ExpandEnvironmentStrings
  any:
  - id: micro-behaviors/os/env/access::wsh-expand-environment-strings-call
  - id: objectives/execution/interpreter/script/wsh::wsh-expand-env-strings-unicode
