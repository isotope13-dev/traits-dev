defaults:
  crit: notable
  conf: 0.8
  platforms:
    - windows
  for:
    - javascript
    - vbs
traits:
  - id: wsh-expand-env-strings-literal
    desc: Calls ExpandEnvironmentStrings
    if:
      type: text
      word: ExpandEnvironmentStrings
      case_insensitive: true
  - id: wsh-expand-env-strings-unicode
    desc: Calls unicode-escaped ExpandEnvironmentStrings
    if:
      type: encoded
      encoding: unicode-escape
      word: ExpandEnvironmentStrings
      case_insensitive: true
  - id: wsh-response-body-unicode
    desc: Accesses unicode-escaped responseBody
    crit: component
    if:
      type: encoded
      encoding: unicode-escape
      word: responseBody
      case_insensitive: true
  - id: wsh-response-body-hex
    desc: Accesses responseBody hex-escaped form
    crit: component
    if:
      type: string_literal
      substr: \\\\x72\\\\x65\\\\x73\\\\x70\\\\x6F\\\\x6E\\\\x73\\\\x65\\\\x42\\\\x6F\\\\x64\\\\x79
      case_insensitive: true
  - id: wsh-save-to-file-literal
    desc: Calls saveToFile (often ADODB.Stream)
    crit: component
    if:
      type: string_literal
      case_insensitive: true
      word: saveToFile
  - id: wsh-save-to-file-unicode
    desc: Calls unicode-escaped saveToFile
    crit: component
    if:
      type: encoded
      encoding: unicode-escape
      word: saveToFile
      case_insensitive: true
  - id: wsh-save-to-file-hex
    desc: Calls saveToFile hex-escaped form
    if:
      type: string_literal
      case_insensitive: true
      regex: \\\\x73\\\\x61\\\\x76\\\\x65\\\\x54\\\\x6F\\\\x46\\\\x69\\\\x6C\\\\x65
  - id: wsh-save-to-file-method
    desc: saveToFile method call in source
    crit: component
    if:
      type: text
      substr: ".saveToFile("
      case_insensitive: true
composite_rules:
  - id: wsh-response-body
    desc: Accesses responseBody (XMLHTTP)
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
    any:
      - id: micro-behaviors/process/create/script/wsh::responsebody-marker
      - id: wsh-response-body-unicode
      - id: wsh-response-body-hex
      - id: objectives/execution/interpreter/script/wsh-fragments::response-body-fragment
  - id: wsh-save-to-file
    desc: Calls saveToFile (often ADODB.Stream)
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
    any:
      - id: wsh-save-to-file-literal
      - id: wsh-save-to-file-unicode
      - id: micro-behaviors/fs/write/stream::adodb-save-to-file-unicode
      - id: wsh-save-to-file-hex
      - id: wsh-save-to-file-method
      - id: objectives/execution/interpreter/script/wsh-fragments::save-to-file-fragment
  - id: wsh-expand-env-strings-obfuscated
    desc: Obfuscated ExpandEnvironmentStrings access
    crit: component
    any:
      - id: objectives/execution/interpreter/script/wsh-fragments::expand-env-fragment
      - id: objectives/execution/interpreter/script/wsh-fragments::expand-env-fragment-tiny
  - id: wsh-expand-env-strings
    desc: Calls ExpandEnvironmentStrings
    any:
      - id: wsh-expand-env-strings-obfuscated
      - id: wsh-expand-env-strings-literal
      - id: wsh-expand-env-strings-unicode
