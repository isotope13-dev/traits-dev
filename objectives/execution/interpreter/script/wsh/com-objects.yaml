defaults:
  attack: T1059.001
  platforms: [windows]
  for: [javascript, vbs, batch, powershell, pe]
traits:
  - id: execution-policy-bypass-flag
    desc: ExecutionPolicy bypass flag
    crit: component
    conf: 0.95
    for: [scripts, binaries]
    if:
      type: raw
      regex: (?i)E\^?xecu\^?t\^?i\^?o\^?n\^?P\^?o\^?l\^?icy.{0,4}b\^?ypa\^?ss
  - id: powershell-launcher
    desc: PowerShell launcher reference
    crit: component
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: raw
      regex: (?i)p\^?o\^?w\^?e\^?r\^?s\^?h\^?e\^?l\^?l
    downgrade:
      any:
        - type: text
          substr: require('../common')
        - type: raw
          regex: Copyright.{0,80}Node contributors
  - id: execution-policy-force-set
    desc: Forced PowerShell execution policy change
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: Set-ExecutionPolicy\s+\w+.{0,40}-Force
  - id: expand-archive-present
    desc: Expand-Archive cmdlet reference
    crit: baseline
    conf: 0.7
    for: [powershell, javascript, pe]
    if:
      type: text
      substr: Expand-Archive

  - id: runas-verb-present
    desc: RunAs verb elevation reference
    crit: baseline
    conf: 0.7
    for: [powershell, javascript, pe]
    if:
      type: text
      substr: "-Verb RunAs"

  - id: execution-policy-bypass-tokenized
    desc: Tokenized PowerShell execution policy bypass
    crit: notable
    conf: 0.91
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)onpOLI.{0,60}Byp.{0,12}ss
    not:
      - substr: "', '"
      - substr: '", "'
      - substr: onPolicy Bypass
composite_rules:
  - id: execution-policy-bypass
    desc: PowerShell execution policy bypass
    crit: notable
    conf: 0.95
    for: [scripts, binaries]
    all:
      - id: execution-policy-bypass-flag
      - id: powershell-launcher
    downgrade:
      any:
        - id: expand-archive-present
        - id: runas-verb-present
