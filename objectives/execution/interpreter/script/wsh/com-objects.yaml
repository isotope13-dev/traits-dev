defaults:
  attack: T1059.001
  platforms: [unix, windows, macos]
  for: [binaries, scripts]
# Windows Script Host Traits
# Detects WSH-specific patterns
# Note: COM object detections are in objectives/execution/activex/com/ to avoid duplication
traits:
  - id: execution-policy-bypass-flag
    desc: "ExecutionPolicy bypass flag"
    crit: component
    conf: 0.95
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: raw
      regex: '(?i)E\^?xecu\^?t\^?i\^?o\^?n\^?P\^?o\^?l\^?icy.{0,4}b\^?ypa\^?ss'
  - id: powershell-launcher
    desc: "PowerShell launcher reference"
    crit: component
    conf: 0.9
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: raw
      regex: '(?i)p\^?o\^?w\^?e\^?r\^?s\^?h\^?e\^?l\^?l'
    downgrade:
      any:
        - type: raw
          substr: "require('../common')"
        - type: raw
          regex: "Copyright.{0,80}Node contributors"
  - id: execution-policy-force-set
    desc: "Forced PowerShell execution policy change"
    crit: suspicious
    conf: 0.90
    if:
      type: string
      regex: 'Set-ExecutionPolicy\s+\w+.{0,40}-Force'
  - id: execution-policy-bypass-tokenized
    desc: "Tokenized PowerShell execution policy bypass"
    crit: suspicious
    conf: 0.91
    platforms: [windows]
    for: [javascript, vbs, powershell, batch]
    if:
      type: raw
      regex: '(?i)onpOLI.{0,60}Byp.{0,12}ss'
composite_rules:
  - id: execution-policy-bypass
    desc: "PowerShell execution policy bypass"
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    all:
      - id: execution-policy-bypass-flag
      - id: powershell-launcher
