defaults:
  attack: T1059.001
  platforms: [windows]
  for: [javascript, vbs, batch, powershell, pe, oledoc]
traits:
  - id: execution-policy-bypass-flag
    desc: ExecutionPolicy bypass flag
    crit: component
    conf: 0.95
    if:
      type: text
      regex: (?i)E\^?xecu\^?t\^?i\^?o\^?n\^?P\^?o\^?l\^?icy.{0,4}b\^?ypa\^?ss
  - id: execution-policy-bypass-short-flag
    desc: Short ExecutionPolicy bypass flag
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (?i)-e\^?p.{0,16}b\^?ypa\^?ss
  - id: execution-policy-override-flag
    desc: ExecutionPolicy override flag
    crit: component
    conf: 0.95
    if:
      type: text
      regex: (?i)E\^?xecu\^?t\^?i\^?o\^?n\^?P\^?o\^?l\^?icy.{0,16}(remotesigned|unrestricted)
  - id: execution-policy-override-short-flag
    desc: Short ExecutionPolicy override flag
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (?i)-e\^?p.{0,16}(remotesigned|unrestricted)
  - id: execution-policy-force-set
    desc: Forced PowerShell execution policy change
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: Set-ExecutionPolicy\s+\w+.{0,40}-Force
  - id: execution-policy-bypass-tokenized
    desc: Tokenized PowerShell execution policy bypass
    crit: notable
    conf: 0.91
    if:
      type: text
      regex: (?i)onpOLI.{0,60}Byp.{0,12}ss
    not:
      - substr: "', '"
      - substr: '", "'
      - substr: onPolicy Bypass
  - id: execution-policy-bypass-concat-full
    desc: Concatenated ExecutionPolicy bypass
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?is)executionp.{0,120}olicy.{0,180}\bbypass\b
  - id: execution-policy-bypass-concat-fragment
    desc: Fragmented concatenated ExecutionPolicy bypass
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?is)ionPol.{0,220}icy Byp.{0,420}\bass\b
composite_rules:
  - id: execution-policy-bypass-concat
    desc: Concatenated PowerShell execution policy bypass
    crit: component
    conf: 0.9
    any:
      - id: execution-policy-bypass-concat-full
      - id: execution-policy-bypass-concat-fragment
  - id: execution-policy-bypass
    desc: PowerShell execution policy bypass
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
    any:
      - id: execution-policy-bypass-flag
      - id: execution-policy-bypass-short-flag
      - id: execution-policy-override-flag
      - id: execution-policy-override-short-flag
      - id: execution-policy-bypass-concat
    downgrade:
      any:
        - id: micro-behaviors/data/archive/extract/zip::powershell-expand-archive
        - id: micro-behaviors/os/privilege/elevation::runas-verb
    unless:
      - id: well-known/app/qwen-code::qwen-code-bundle-text
      - id: metadata/binary/section/name::bun-section-name
      - id: well-known/lib/bun-runtime::runtime-context
  - id: import-time-hidden-powershell-launch
    desc: Import-time hidden child launches PowerShell with policy bypass
    crit: hostile
    conf: 0.98
    attack: T1059.001,T1059.007,T1564.003
    for: [javascript]
    all:
      - id: objectives/supply-chain/trojanized/library/module-init::node-import-time-hidden-child-process
      - id: execution-policy-bypass
