defaults:
  platforms: [windows]
traits:
  - id: jscript-array-function-loop
    desc: "JScript array func loop (dynamic execution)"
    crit: notable
    conf: 0.9
    for:
      - javascript
    unless:
      - type: text
        regex: allowedEvents_\[\w+\]\s*&&\s*this\[['"]on['"]\s*\+\s*\w+\]
    if:
      type: text
      regex: this\[['"][a-zA-Z0-9]+['"]\s*\+\s*[a-zA-Z0-9]+\]\(
  - id: jscript-obfuscated-string-builder
    desc: "JScript obfuscated builder func pattern"
    crit: suspicious
    conf: 0.9
    for:
      - javascript
    size_max: 100000
    if:
      type: text
      regex: function\s+\w+\(\)\s*\{.{0,120}return\s+\w+\(\);\s*\}
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/fixture::embedded-unit-test-fixture
      - id: metadata/package/files/dependency::node-modules-path
      - id: metadata/library/structure/
      - id: metadata/package/files/ecosystem::openclaw-evolver-feature-flags-module
      # A CommonJS library's short forwarding helper is not WSH JScript
      # obfuscation. WSH droppers do not use the Node module loader.
      - type: text
        regex: '(?i)(module\.exports|\brequire\s*\()'
      # This targets Windows Script Host JScript droppers, which have no DOM. A
      # bare `function f(){ return g(); }` factory is ubiquitous in browser code
      # (e.g. adblock stub builders); exclude any file using browser-DOM globals,
      # which WSH JScript never references.
      - type: text
        word: document
      - type: text
        word: window
  - id: jscript-obfuscated-adodb-createobject-template
    desc: Obfuscated ADODB CreateObject template string
    crit: suspicious
    conf: 0.95
    for:
      - javascript
    if:
      type: string_literal
      regex: WS\{\d+\}teObject\("ado\{\d+\}am"\)
  - id: jscript-adodb-template-assign
    desc: "stub assignment template for COM methods"
    crit: suspicious
    conf: 0.88
    for:
      - javascript
    if:
      type: string_literal
      regex: \["\{0\}"\]\s*=\s*1;
  - id: jscript-adodb-template-call
    desc: Placeholder call template for COM methods
    crit: suspicious
    conf: 0.88
    for:
      - javascript
    if:
      type: string_literal
      regex: \["\{0\}"\]\s*\(\);
  - id: jscript-adodb-template-readtext
    desc: Placeholder ReadText invocation fragment
    crit: suspicious
    conf: 0.86
    for:
      - javascript
    if:
      type: string_literal
      regex: ReadT\{1\}
composite_rules:
  - id: jscript-adodb-method-template-dispatch
    desc: ADODB method dispatch via placeholders
    crit: suspicious
    conf: 0.9
    all:
      - id: jscript-adodb-template-assign
      - id: jscript-adodb-template-call
      - id: jscript-adodb-template-readtext
  - id: jscript-obfuscated-wsh-adodb-template-chain
    desc: Obfuscated WSH ADODB template execution chain
    crit: suspicious
    conf: 0.96
    all:
      - id: jscript-obfuscated-adodb-createobject-template
      - id: jscript-adodb-method-template-dispatch
