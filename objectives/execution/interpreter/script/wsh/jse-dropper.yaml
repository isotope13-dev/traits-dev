defaults:
  platforms:
    - windows
  for:
    - javascript
    - vbs
    - html
traits:
  - id: activexobject-call
    desc: ActiveXObject instantiation call
    crit: component
    conf: 0.9
    if:
      type: text
      regex: new\s+ActiveXObject\(
  - id: xmlhttp-progid
    desc: MSXML2.XMLHTTP COM ProgID string
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: MSXML2.XMLHTTP
  - id: powershell-bypass-hidden
    desc: PowerShell bypass with hidden window
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)powershell.{0,30}Bypass.{0,30}Hidden
  - id: ip-url-http
    desc: HTTP URL with raw IP address
    crit: suspicious
    conf: 0.9
    unless:
      - type: text
        substr: URI:http://
    if:
      type: text
      regex: http://\d+\.\d+\.\d+\.\d+/
      is: external_ip
  - id: ps1-file-extension
    desc: PowerShell script file extension reference
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: .ps1
  - id: activexobject-this-unicode
    desc: Unicode-escaped ActiveXObject global lookup
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: encoded
      encoding: unicode-escape
      regex: this\[['"]ActiveXObject['"]\]
  - id: xmlhttp-progid-unicode
    desc: Unicode-escaped MSXML2.XMLHTTP ProgID
    crit: notable
    conf: 0.9
    for: [javascript]
    if:
      type: encoded
      encoding: unicode-escape
      regex: new\s+\w+\('MSXML2\.XMLHTTP'\)
  - id: adodb-stream-progid-unicode
    desc: Unicode-escaped ADODB.Stream ProgID
    crit: notable
    conf: 0.9
    for: [javascript]
    if:
      type: encoded
      encoding: unicode-escape
      regex: new\s+\w+\('ADODB\.Stream'\)
  - id: xmlhttp-open-get-url-unicode
    desc: Unicode-escaped XMLHTTP GET URL
    crit: notable
    conf: 0.9
    for: [javascript]
    if:
      type: encoded
      encoding: unicode-escape
      regex: \['open'\]\('GET'\s*,\s*'http://
  - id: temp-exe-path-unicode
    desc: Unicode-escaped temp EXE path
    crit: notable
    conf: 0.88
    for: [javascript]
    if:
      type: encoded
      encoding: unicode-escape
      regex: "'%TEMP%'\\)\\s*\\+\\s*'/.{1,80}\\.exe'"
  - id: indirect-run-no-wait
    desc: Indirect WScript Run no-wait
    crit: notable
    conf: 0.85
    for: [javascript]
    if:
      type: text
      regex: \w+\s*\[\w+\]\(.{0,120},\s*1,\s*false\)
composite_rules:
  - id: jse-wsh-dropper
    desc: WSH dropper with COM objects and download
    crit: hostile
    conf: 0.95
    attack: T1059.007
    all:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: xmlhttp-progid
    any:
      - id: activexobject-call
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: powershell-bypass-hidden
  - id: jse-powershell-downloader
    desc: Script downloads and executes PowerShell
    crit: hostile
    conf: 0.95
    attack: T1059.007
    all:
      - id: powershell-bypass-hidden
      - id: ip-url-http
    any:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: ps1-file-extension
  - id: jse-wsh-dropper-obfuscated
    desc: Obfuscated WSH dropper via MSXML/ADODB fragments
    crit: suspicious
    conf: 0.92
    attack: T1059.007
    for: [javascript]
    all:
      - id: objectives/execution/interpreter/script/wsh-fragments::wscript-shell-fragment-1
      - id: objectives/execution/interpreter/script/wsh-fragments::msxml-fragment-msxml
      - id: objectives/execution/interpreter/script/wsh-fragments::adodb-fragment-adodb
    any:
      - id: objectives/anti-static/obfuscation/eval::suspicious-new-function-iife
      - id: objectives/supply-chain/hidden-payload/encoding::function-ctor-call-expr-arg
      - id: micro-behaviors/process/interpreter/vm::function-direct-call
  - id: jse-wsh-unicode-http-exe-dropper
    desc: Unicode-obfuscated WSH HTTP EXE dropper
    crit: hostile
    conf: 0.96
    attack: T1059.007, T1105
    for: [javascript]
    all:
      - id: activexobject-this-unicode
      - id: xmlhttp-progid-unicode
      - id: adodb-stream-progid-unicode
      - id: xmlhttp-open-get-url-unicode
      - id: objectives/execution/interpreter/script/wsh::wsh-response-body
      - id: micro-behaviors/fs/write/file::js-adodb-stream-savetofile-dynamic-path
    any:
      - id: temp-exe-path-unicode
      - id: indirect-run-no-wait
