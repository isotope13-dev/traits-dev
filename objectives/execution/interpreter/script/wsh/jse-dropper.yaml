defaults:
  platforms:
  - windows
  for:
  - javascript
  - vbs
  - html
traits:
- id: activexobject-call
  desc: ActiveXObject instantiation call
  crit: component
  conf: 0.9
  if:
    type: text
    regex: new\s+ActiveXObject\(
  # The bare `MSXML2.XMLHTTP` ProgID string is a generic COM capability, not an
  # intent signal — it appears in every HTTP-client polyfill's legacy-IE
  # fallback (axios, jQuery). The capability lives in micro-behaviors as
  # os/com/object::clsid-xmlhttp-generic; the jse-wsh-dropper composite below
  # references it directly rather than re-declaring a notable objective atom
  # that would surface standalone on benign browser bundles.
- id: powershell-bypass-hidden
  desc: PowerShell bypass with hidden window
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: (?i)powershell.{0,30}Bypass.{0,30}Hidden
- id: ps1-file-extension
  desc: PowerShell script file extension reference
  crit: component
  conf: 0.8
  if:
    type: text
    exact: .ps1
- id: activexobject-this-unicode
  desc: Unicode-escaped ActiveXObject global lookup
  crit: component
  conf: 0.9
  for: [javascript]
  if:
    type: encoded
    encoding: unicode-escape
    regex: this\[['"]ActiveXObject['"]\]
- id: xmlhttp-progid-unicode
  desc: Unicode-escaped MSXML2.XMLHTTP ProgID
  crit: suspicious
  conf: 0.9
  for: [javascript]
  if:
    type: encoded
    encoding: unicode-escape
    regex: new\s+\w+\('MSXML2\.XMLHTTP'\)
- id: adodb-stream-progid-unicode
  desc: Unicode-escaped ADODB.Stream ProgID
  crit: suspicious
  conf: 0.9
  for: [javascript]
  if:
    type: encoded
    encoding: unicode-escape
    regex: new\s+\w+\('ADODB\.Stream'\)
- id: xmlhttp-open-get-url-unicode
  desc: Unicode-escaped XMLHTTP GET URL
  crit: suspicious
  conf: 0.9
  for: [javascript]
  if:
    type: encoded
    encoding: unicode-escape
    regex: \['open'\]\('GET'\s*,\s*'http://
- id: temp-exe-path-unicode
  desc: Unicode-escaped temp EXE path
  crit: suspicious
  conf: 0.88
  for: [javascript]
  if:
    type: encoded
    encoding: unicode-escape
    regex: "'%TEMP%'\\)\\s*\\+\\s*'/.{1,80}\\.exe'"
- id: indirect-run-no-wait
  desc: Indirect WScript Run no-wait
  crit: suspicious
  conf: 0.85
  for: [javascript]
  if:
    type: text
    regex: \w+\s*\[\w+\]\(.{0,120},\s*1,\s*false\)
composite_rules:
- id: jse-wsh-dropper
  desc: WSH dropper with COM objects and download
  crit: hostile
  conf: 0.95
  attack: T1059.007
  all:
  - id: micro-behaviors/os/com/object::wscript-shell-literal
  - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
  any:
  - id: activexobject-call
  - id: micro-behaviors/os/com/object::filesystemobject-progid
  - id: powershell-bypass-hidden
- id: jse-powershell-downloader
  desc: Script downloads and executes PowerShell
  crit: hostile
  conf: 0.95
  attack: T1059.007
  all:
  - id: powershell-bypass-hidden
  - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
  any:
  - id: micro-behaviors/os/com/object::wscript-shell-literal
  - id: ps1-file-extension
- id: obfuscated-hidden-powershell-loader
  desc: Obfuscated WSH writes and runs a hidden embedded PowerShell stage
  crit: hostile
  conf: 0.98
  attack: T1027,T1059.001,T1059.007,T1105,T1564.003
  for: [javascript]
  all:
  - id: powershell-bypass-hidden
  - id: micro-behaviors/process/interpreter/eval::embedded-powershell-iex
  - id: micro-behaviors/fs/write/content::create-script-file
  - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-obfuscated
- id: jse-wsh-unicode-http-exe-dropper
  desc: Unicode-obfuscated WSH HTTP EXE dropper
  crit: hostile
  conf: 0.96
  attack: T1059.007, T1105
  for: [javascript]
  all:
  - id: activexobject-this-unicode
  - id: xmlhttp-progid-unicode
  - id: adodb-stream-progid-unicode
  - id: xmlhttp-open-get-url-unicode
  - id: objectives/execution/interpreter/script/wsh::wsh-response-body
  - id: micro-behaviors/fs/write/file/stream::js-adodb-stream-savetofile-dynamic-path
  any:
  - id: temp-exe-path-unicode
  - id: indirect-run-no-wait

- id: jse-obfuscated-powershell-file-loader
  desc: Obfuscated JScript stages a hidden PowerShell payload through a created file
  crit: hostile
  conf: 0.99
  attack: T1027,T1059.001,T1059.007,T1564.003
  for: [javascript]
  all:
  - id: powershell-bypass-hidden
  - id: micro-behaviors/fs/write/content::create-text-file-api
  - id: objectives/anti-static/obfuscation/syntax::js-wscript-dynamic-property-ast
  - id: metadata/file/metrics::single-long-line
