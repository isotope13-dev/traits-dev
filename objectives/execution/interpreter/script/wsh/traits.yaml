defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - javascript
    - vbs
traits:
  - id: wscript-createobject
    desc: WScript.CreateObject
    crit: notable
    conf: 0.7
    platforms:
      - windows
    if:
      type: string_literal
      substr: WScript.CreateObject
    attack: T1202
  - id: wscript-getobject
    desc: WScript.GetObject
    crit: notable
    conf: 0.7
    platforms:
      - windows
    if:
      type: string_literal
      substr: WScript.GetObject
    attack: T1202
  - id: wscript-arguments
    desc: WScript.Arguments access
    crit: notable
    conf: 0.65
    platforms:
      - windows
    if:
      type: string_literal
      substr: WScript.Arguments
  - id: wscript-scriptfullname
    desc: WScript.ScriptFullName
    crit: notable
    conf: 0.5
    platforms:
      - windows
    if:
      type: text
      substr: WScript.ScriptFullName
  - id: wscript-sleep
    desc: WScript.Sleep timing
    crit: notable
    conf: 0.5
    platforms:
      - windows
    if:
      type: string_literal
      substr: WScript.Sleep
    attack: T1060
composite_rules:
  - id: wscript-execution-comp
    desc: Windows Script Host execution
    crit: notable
    conf: 0.75
    platforms:
      - windows
    attack: T1202
    needs: 2
    any:
      - id: wscript-createobject
      - id: wscript-getobject
      - id: wscript-sleep
  - id: wscript-com-objects
    desc: WScript COM object usage
    crit: notable
    conf: 0.8
    platforms:
      - windows
    attack: T1202
    mbc: E1243
    any:
      - id: objectives/execution/activex/
  - id: wscript-process-execution
    desc: WScript process execution
    crit: hostile
    conf: 0.85
    platforms:
      - windows
    attack: T1202
    mbc: E1243
    all:
      - id: wscript-execution
      - id: micro-behaviors/process/create/spawn/
  - id: script-based-malware
    desc: Script-based malware framework
    crit: hostile
    conf: 0.9
    platforms:
      - windows
    attack: T1202
    mbc: E1243
    needs: 3
    any:
      - id: objectives/execution/activex/
      - id: wscript-createobject
      - id: wscript-sleep
  - id: obfuscated-wscript-activex-self-runner
    desc: Obfuscated WScript ActiveX self-runner
    crit: hostile
    conf: 0.95
    platforms:
      - windows
    attack: T1059.007, T1027
    mbc: B0032
    all:
      - id: wscript-scriptfullname
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: objectives/anti-static/obfuscation/syntax::js-wscript-dynamic-property-ast
    any:
      - id: objectives/execution/interpreter/scripting/host::activex-object-obfuscated
      - id: objectives/anti-static/obfuscation/multi-layer::js-base64-shard-array
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::push-shift-bracket-pattern
    needs: 2
    unless:
      - id: well-known/lib/
      - id: well-known/tool/
      - id: metadata/package/testing/harness/runtime/
  - id: obfuscated-hidden-wmi-loader
    desc: Obfuscated WSH hides a WMI process
    crit: hostile
    conf: 0.99
    attack: T1027,T1047,T1059.007,T1564.003
    mbc: B0032
    all:
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: micro-behaviors/os/wmi/query::wmi-hidden-process-create
      - id: metadata/file/metrics::high-byte-script-text
