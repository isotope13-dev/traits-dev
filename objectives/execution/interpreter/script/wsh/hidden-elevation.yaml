# Silent UAC elevation: re-launch a process with admin rights via PowerShell
# Start-Process -Verb RunAs while hiding the window (-WindowStyle Hidden /
# windowsHide). Legitimate elevation is interactive and visible — the user sees
# the UAC prompt and the elevated window. Spawning an elevated process from a
# hidden PowerShell with the window suppressed is the silent-elevation pattern
# of install-hook droppers and loaders (e.g. npm `setup.js` re-running node on a
# payload as admin). No benign reason to hide an elevation.
defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: T1548.002
  mbc: F0015

traits:
  - id: charcode-runas-shellexecute-verb
    desc: Runas charcode near ShellExecute
    crit: suspicious
    conf: 0.96
    if:
      type: text
      # The verb is decoded immediately before the WSH ShellExecute call;
      # matching that relationship avoids treating ordinary `runas` prose as
      # elevation behavior.
      regex: 'ShellExecute\s*\([\s\S]{0,180}114,117,110,97,115'

composite_rules:
  - id: hidden-runas-elevation-launch
    desc: Silently elevates a launched process via hidden PowerShell Start-Process RunAs
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
      - id: micro-behaviors/os/privilege/elevation::runas-verb
      - id: micro-behaviors/process/create/start-process::start-process-filepath
      - id: micro-behaviors/process/create/spawn::windowshide-option

  - id: hidden-wsh-self-elevation
    desc: WSH relaunches itself hidden with the runas verb
    crit: hostile
    conf: 0.99
    attack: T1059.007,T1548.002,T1564.003
    all:
      - id: charcode-runas-shellexecute-verb
      - id: micro-behaviors/process/create/shell/wsh::shellexecute-hidden-showcmd
      - id: objectives/execution/interpreter/script/wsh::wscript-scriptfullname
