defaults:
  platforms: [windows]
  crit: notable
  conf: 0.8
  for: [javascript, vbs]
traits:
  - id: wsh-adodb-stream-binary
    desc: "Sets stream type to binary (ADODB.Stream)"
    if:
      type: text
      regex: '(?i)ADODB\.Stream[\s\S]{0,500}\.type\s*=\s*1\b|\.type\s*=\s*1\b[\s\S]{0,500}ADODB\.Stream'
