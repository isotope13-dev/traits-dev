# Obfuscated WSH Patterns
# Detects obfuscated calls to WScript methods
defaults:
  crit: suspicious
  conf: 0.8
  for: [javascript]
  platforms: [windows]
traits:
  - id: wscript-shell-obfuscated
    desc: 'obfuscated WScript.Shell creation'
    if:
      type: text
      # Matches .Shel\x6c or .Shell via concatenation
      regex: '\.Shel(\\x6c|["'']\+["'']l)'
  - id: wscript-quit-obfuscated
    desc: Obfuscated WScript.Quit call
    if:
      type: text
      # Matches ["Q"+"u"+"it"] or ["Q"+"uit"] etc.
      regex: '\[["'']Q["'']\+["'']u["'']\+["'']it["'']\]|\[["'']Q["'']\+["'']uit["'']\]'
composite_rules:
  - id: obfuscated-activex-shell-launch
    desc: Obfuscated WSH ActiveX shell launch
    crit: hostile
    conf: 0.98
    attack: T1059.007, T1027, T1106
    all:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: micro-behaviors/data/encode/charcode::charcodeat-arithmetic-deferred
      - id: micro-behaviors/process/create/shell/wsh::shellexecute-method-call
