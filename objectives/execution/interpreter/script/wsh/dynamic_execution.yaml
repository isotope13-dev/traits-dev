# Dynamic Execution Patterns in JScript
# Detects obfuscated execution methods
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: suspicious
  conf: 0.8
  for: [javascript]
traits:
  - id: dynamic-this-execution-computed
    desc: Dynamic execution via this[func()+func()]
    crit: notable
    count_min: 2
    if:
      type: text
      # Matches this[expr()+expr()] style computed dynamic dispatch
      # Requires function call or concatenation inside brackets (not just this[a]())
      regex: 'this\[[a-zA-Z0-9_\s]*[\(\+][a-zA-Z0-9_\(\)\+\s]*\]\('
    unless:
      - id: metadata/library/jquery/
      - id: metadata/library/prototype/
