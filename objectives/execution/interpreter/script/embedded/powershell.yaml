  count_max: 1023904
- id: powershell-cmdlet-patterns
  desc: "PS cmdlet naming pattern in non-PS code"
  crit: component
  conf: 0.8
  for: [batch, vbs, javascript, csharp, c, cpp, html]
  count_min: 1
  unless:
  - id: metadata/library/syntaxhighlighter::syntaxhighlighter-core
  - id: metadata/library/syntaxhighlighter::ace-editor-core
  if:
    type: string_literal
    regex: Out-File|Get-Content|Invoke-Expression
  downgrade:
    any:
    - id: metadata/library/data::botocore-lib
    - id: metadata/import/python::boto3
    - id: micro-behaviors/communications/ssh/connect::paramiko-dup
    - id: metadata/package/testing/harness/runtime/
- id: powershell-vars-in-javascript-cond-1--inline-23905
  desc: Regex component marker
  crit: notable
  conf: 0.9
  size_max: 200000
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: "pg_common.tcl"
  count_max: 1023906
composite_rules:
- id: powershell-vars-in-javascript
  desc: PowerShell variables in JavaScript strings
  crit: suspicious
  conf: 0.9
  for:
  - javascript
  - typescript
  size_max: 200000
  any:
  - id: powershell-vars-in-javascript--rx-1
  - id: powershell-vars-in-javascript--rx-2
  - id: powershell-vars-in-javascript--rx-3
  - id: powershell-vars-in-javascript--rx-4
  - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
  - id: micro-behaviors/communications/http/client/managed::downloadstring
  - id: powershell-vars-in-javascript--rx-7
  - id: powershell-vars-in-javascript--rx-8
  unless:
  - id: metadata/package/testing/
  - id: powershell-vars-in-javascript-cond-1--inline-23905
  not:
  - substr: "$jQval"
  - regex: '\.\$[a-z][A-Z][a-zA-Z]{3}'
