defaults:
  platforms:
    - unix
    - windows
traits:
  - id: powershell-vars-in-javascript
    desc: PowerShell variables in JavaScript strings
    crit: suspicious
    conf: 0.9
    for:
      - javascript
      - typescript
    size_max: 200000
    count_min: 10
    per_kb_min: 0.2
    if:
      type: text
      regex: '\$(?:env:|PSVersionTable|ErrorActionPreference|ProgressPreference|ExecutionContext|MyInvocation|PSScriptRoot|Host|HOME|args\b|input\b|profile\b|[A-Za-z_][A-Za-z0-9_]{2,}\s*=)[\s\S]{0,240}\b(?:powershell|pwsh|Invoke-|New-Object|Start-Process|Set-ExecutionPolicy|DownloadString|FromBase64String)\b|\b(?:powershell|pwsh|Invoke-|New-Object|Start-Process|Set-ExecutionPolicy|DownloadString|FromBase64String)\b[\s\S]{0,240}\$(?:env:|PSVersionTable|ErrorActionPreference|ProgressPreference|ExecutionContext|MyInvocation|PSScriptRoot|Host|HOME|args\b|input\b|profile\b|[A-Za-z_][A-Za-z0-9_]{2,}\s*=)'
    not:
      - substr: "$jQval"
      - regex: '\.\$[a-z][A-Z][a-zA-Z]{3}'
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: text
        substr: "pg_common.tcl"
  - id: powershell-cmdlet-patterns-raw
    desc: PowerShell cmdlet naming pattern (raw)
    crit: component
    conf: 0.8
    for: [scripts, source, -powershell]
    count_min: 1
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: string_literal
        substr: "Invoke-Expression '. "
      - type: string_literal
        substr: "profile.ps1"
      - type: text
        substr: "ace/mode/powershell_highlight_rules"
    if:
      type: string_literal
      regex: Out-File|Get-Content|Invoke-Expression
composite_rules:
  - id: powershell-cmdlet-patterns
    desc: PowerShell cmdlet naming pattern in non-PS code
    crit: notable
    conf: 0.8
    for: [scripts, source, -powershell]
    all:
      - id: powershell-cmdlet-patterns-raw
    unless:
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-core
      - id: metadata/library/syntaxhighlighter::ace-editor-core
    downgrade:
      any:
        - id: metadata/library/data::botocore-lib
        - id: metadata/import/python::boto3
        - id: micro-behaviors/communications/ssh/connect::paramiko-dup
        - id: metadata/package/testing/harness::is-test
