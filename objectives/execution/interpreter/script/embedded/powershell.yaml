defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: powershell-vars-in-javascript
    desc: PowerShell variables in JavaScript strings
    crit: suspicious
    conf: 0.9
    for:
      - javascript
      - typescript
    size_max: 200000
    count_min: 10
    per_kb_min: 0.2
    if:
      type: raw
      regex: '[^$]\$[a-z][A-Z][a-zA-Z]{3}'
  - id: powershell-cmdlet-patterns-raw
    desc: PowerShell cmdlet naming pattern (raw)
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
      - python
    count_min: 1
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: string_value
      regex: Out-File|Get-Content|Invoke-Expression
composite_rules:
  - id: powershell-cmdlet-patterns
    desc: PowerShell cmdlet naming pattern in non-PS code
    crit: suspicious
    conf: 0.8
    all:
      - id: powershell-cmdlet-patterns-raw
    unless:
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-core
    downgrade:
      any:
        - id: metadata/library/data::botocore-lib
        - id: metadata/import/python::boto3
        - id: micro-behaviors/communications/ssh/connect::paramiko-dup
        - id: metadata/package/testing/harness::is-test
