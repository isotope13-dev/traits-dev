defaults:
  platforms:
  - unix
  - windows
traits:
- id: powershell-vars-in-javascript--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  size_max: 200000
  per_kb_min: 0.2
  count_min: 10
  not:
  - substr: "$jQval"
  - regex: '\.\$[a-z][A-Z][a-zA-Z]{3}'
  if:
    type: text
    substr: ErrorActionPreference
- id: powershell-vars-in-javascript--rx-2
  desc: Regex component marker
