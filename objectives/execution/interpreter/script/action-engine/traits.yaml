defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: action-events-exec
    desc: Executes script via ActionEvents engine
    crit: notable
    conf: 0.9
    if:
      type: string
      regex: "ActionEvents\\.executeScript|execute\\.script"
