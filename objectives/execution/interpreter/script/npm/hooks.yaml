defaults:
  platforms: [windows, unix]
  for: [package.json]
traits:
  - id: npm-preinstall-script
    desc: npm preinstall hook present
    crit: notable
    conf: 1.0
    unless:
      - type: basename
        regex: '[\\/]node_modules[\\/]'
    if:
      type: text
      regex: '"preinstall"\s*:\s*"[^"\n]{1,512}"'
  - id: npm-install-script
    desc: npm install hook present
    crit: notable
    conf: 1.0
    unless:
      - type: basename
        regex: '[\\/]node_modules[\\/]'
    if:
      type: text
      regex: '"install"\s*:\s*"[^"\n]{1,512}"'
  - id: npm-postinstall-script
    desc: npm postinstall hook present
    crit: notable
    conf: 1.0
    if:
      type: kv
      path: "scripts.postinstall"
    unless:
      - type: basename
        regex: '[\\/]node_modules[\\/]'
      - type: kv
        path: "keywords"
        regex: tabby-builtin-plugin
      - type: kv
        path: "name"
        exact: "run-script-os"
      - type: kv
        path: "scripts.postinstall"
        exact: "run-script-os"
