defaults:
  platforms: [windows, unix]
  for: [package.json]
traits:
  - id: npm-preinstall-script
    desc: npm preinstall hook present
    crit: notable
    conf: 1.0
    unless:
      - id: metadata/package/files/dependency::node-modules-path
      - id: metadata/package/scripts::preinstall-runtime-guard-help
      - type: value
        path: "scripts.preinstall"
        exact: "npx only-allow pnpm"
    if:
      type: text
      regex: '"preinstall"\s*:\s*"[^"\n]{1,512}"'
  - id: npm-install-script
    desc: npm install hook present
    crit: notable
    conf: 1.0
    unless:
      - id: metadata/package/files/dependency::node-modules-path
    if:
      type: text
      regex: '"install"\s*:\s*"[^"\n]{1,512}"'
  - id: npm-postinstall-script
    desc: npm postinstall hook present
    crit: notable
    conf: 1.0
    if:
      type: value
      path: "scripts.postinstall"
    unless:
      - id: metadata/package/files/dependency::node-modules-path
      - id: metadata/package/manifest/runtime::vscode-extension
      - type: value
        path: "keywords"
        regex: tabby-builtin-plugin
      - type: value
        path: "name"
        exact: "run-script-os"
      - type: value
        path: "scripts.postinstall"
        exact: "run-script-os"
      - id: metadata/package/scripts::postinstall-protobuf-codegen-download
