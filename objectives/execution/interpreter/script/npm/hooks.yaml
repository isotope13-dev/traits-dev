defaults:
  platforms: [windows, unix]
  for: [package.json]
traits:
  - id: npm-preinstall-script
    desc: npm preinstall hook present
    crit: notable
    conf: 1.0
    unless:
      - id: metadata/package/files/dependency::node-modules-path
      - id: metadata/package/scripts/
      - type: value
        path: "scripts.preinstall"
        exact: "npx only-allow pnpm"
      - id: well-known/lib/xmljs::libxmljs-native-addon-context
    if:
      type: text
      regex: '"preinstall"\s*:\s*"[^"\n]{1,512}"'
  - id: npm-install-script
    desc: npm install hook present
    crit: notable
    conf: 1.0
    unless:
      - id: metadata/package/files/dependency::node-modules-path
      - id: well-known/lib/xmljs::libxmljs-native-addon-context
    if:
      type: text
      regex: '"install"\s*:\s*"[^"\n]{1,512}"'
  - id: npm-postinstall-script
    desc: Declares an npm postinstall lifecycle hook
    crit: component
    conf: 1.0
    if:
      type: value
      path: "scripts.postinstall"
    unless:
      - id: metadata/package/files/dependency::node-modules-path
      - id: metadata/package/manifest/runtime::vscode-extension
      - type: value
        path: "keywords"
        regex: tabby-builtin-plugin
      - type: value
        path: "name"
        exact: "run-script-os"
      - type: value
        path: "scripts.postinstall"
        exact: "run-script-os"
      - type: value
        path: "scripts.postinstall"
        substr: "stackpath.bootstrapcdn.com/twitter-bootstrap"
      - type: value
        path: "scripts.postinstall"
        substr: "installed! Run:"
      - id: metadata/package/scripts::postinstall-protobuf-codegen-download
composite_rules:
  - id: npm-postinstall-windows-program-poc
    desc: POC package runs a Windows executable from npm postinstall
    crit: hostile
    conf: 0.99
    all:
      - id: npm-postinstall-script
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-windows-program
      - id: metadata/package/manifest/name::npm-name-poc
