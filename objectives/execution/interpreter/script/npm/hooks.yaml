defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
traits:
  - id: npm-preinstall-script
    desc: npm preinstall hook present
    crit: notable
    conf: 1.0
    if:
      type: text
      regex: '"preinstall"\s*:\s*"[^"\n]{1,512}"'
  - id: npm-install-script
    desc: npm install hook present
    crit: notable
    conf: 1.0
    if:
      type: text
      regex: '"install"\s*:\s*"[^"\n]{1,512}"'
  - id: npm-postinstall-script
    desc: npm postinstall hook present
    crit: notable
    conf: 1.0
    if:
      type: kv
      path: "scripts.postinstall"
    unless:
      - type: kv
        path: "scripts.postinstall"
        exact: "run-script-os"
