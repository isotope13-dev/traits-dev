defaults:
  platforms: [windows, unix]
  for:
    - ruby
traits:
  - id: calls-create-makefile-1
    desc: Calls create_makefile (standard extconf behavior)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: create_makefile
  - id: calls-create-makefile-2
    desc: Calls create_header (standard extconf behavior)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: create_header
  - id: calls-create-makefile-3
    desc: References mkmf (standard extconf behavior)
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: mkmf
  - id: ast-httparty-get
    desc: HTTParty GET request invocation
    crit: notable
    conf: 0.9
    if:
      type: ast
      query: "((call\n  receiver: (constant) @recv\n  method: (identifier) @method\n  arguments: (argument_list (_) @arg))\n (#eq? @recv \"HTTParty\")\n (#eq? @method \"get\"))\n"
composite_rules:
  - id: calls-create-makefile
    desc: Calls create_makefile (standard extconf behavior)
    crit: notable
    conf: 0.8
    any:
      - id: calls-create-makefile-1
      - id: calls-create-makefile-2
      - id: calls-create-makefile-3
  - id: extconf-http-fetch
    desc: extconf.rb performs HTTParty fetch during build
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/build::filename-extconf
      - id: ast-httparty-get
