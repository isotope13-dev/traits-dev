defaults:
  for: [scripts, binaries]
  crit: notable
  conf: 0.5
  platforms:
    - windows
traits:
  - id: cmd-exe-dup
    desc: cmd.exe Windows command shell reference
    crit: component
    conf: 0.4
    if:
      type: text
      regex: (?i)cmd\.exe
    unless:
      - type: basename
        regex: ^clink\.bat$
      - id: well-known/app/defender::is-defender-named-2
composite_rules:
  - id: powershell-exe-comp
    desc: powershell.exe executable reference
    for: [batch, pe, python, javascript, vbs]
    near_bytes: 256
    all:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
  - id: windows-executable-ref
    desc: Windows executable or script file type reference
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/fs/path/extension/
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
      - id: objectives/execution/interpreter/script/shell::cmd-exe-dup
