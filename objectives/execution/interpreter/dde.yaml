defaults:
  for: [documents]
  platforms: [windows]
  crit: suspicious
  conf: 0.9
traits:
  - id: ddeauto-field-code
    desc: DDEAUTO field code in document
    crit: hostile
    conf: 0.95
    attack: "T1559.002"
    if:
      type: raw
      regex: '(?i)\bDDEAUTO\b'
  - id: dde-field-code
    desc: DDE field code in document
    conf: 0.88
    attack: "T1559.002"
    if:
      type: raw
      regex: '(?i)<w:fldChar[^>]*fldCharType="begin"[^>]*/>.{0,200}\bDDE\b'
  - id: dde-cmd-execution
    desc: DDE command execution reference
    crit: hostile
    conf: 0.96
    attack: "T1559.002"
    if:
      type: raw
      regex: '(?i)DDE(AUTO)?\s+["\x27]?(cmd|powershell|mshta|wscript|cscript)'
  - id: dde-external-link-excel
    desc: Excel external DDE link file
    conf: 0.88
    if:
      type: string
      regex: "(?i)xl/externalLinks/externalLink[0-9]"
