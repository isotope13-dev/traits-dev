defaults:
  platforms: [unix, windows]
  for: [javascript]
  attack: T1059.007
traits:
  - id: function-constructor-variable
    desc: Function constructor with variable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'new Function\s*\(\s*\w+\s*\)\s*\('
  - id: eval-variable
    desc: eval on decoded variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\beval\s*\(\s*\w+\s*\)'
  - id: noop-delay-loop
    desc: No-op loop delay padding
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'for\s*\(\s*var\s+\w+\s*=\s*\d+\s*;\s*\w+\s*<\s*\d+\s*;\s*\w+\+\+\s*\)\s*\{\s*\}'
composite_rules:
  - id: xor-array-eval-loader
    desc: JavaScript XOR array eval loader
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/data/encode/char-code::js-xor-array-payload-reconstruction
    any:
      - id: eval-variable
      - id: objectives/execution/interpreter/eval/dynamic::eval-variable
      - id: objectives/execution/interpreter/eval/dynamic::eval-transformed-code
  - id: xor-array-function-loader
    desc: JavaScript XOR array Function loader
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/data/encode/char-code::js-xor-array-payload-reconstruction
      - id: function-constructor-variable
    any:
      - id: noop-delay-loop
      - id: objectives/execution/activex/com::activex-object-create
  - id: xor-array-com-stage-loader
    desc: JavaScript XOR array COM stage loader
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/data/encode/char-code::js-xor-array-payload-reconstruction
    any:
      - id: objectives/execution/activex/com::activex-object-create
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: micro-behaviors/fs/write/file::adodb-stream
