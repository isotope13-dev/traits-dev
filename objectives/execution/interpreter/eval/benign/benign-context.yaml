defaults:
  platforms: [windows, unix]
  for: [javascript]
composite_rules:
  - id: js-assign-common-root-known-benign-context
    desc: Known benign global-object alias context
    crit: component
    conf: 0.9
    any:
      - id: metadata/file/text/metrics::js-readable-source-context
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/library/jquery::fn-extend
      - id: metadata/package/testing/harness/runtime::is-test
      - id: well-known/tool/development/vscode-svelte::extension-bundle
      - id: well-known/lib/pathway::python-package
      - id: metadata/file/text/metrics::js-typescript-source-file-context
