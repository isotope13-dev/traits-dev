# Obfuscated Dynamic Execution Patterns (JavaScript)
# Detects evasive eval usage
# ATT&CK: T1027 + T1059.007
defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  # Indirect eval execution via this[var]. Density-gated: a single dynamic
  # dispatch is normal in type-check / dispatch-table libraries (e.g.
  # `return this[type](value)`). Real obfuscated indirect-eval reuses the
  # pattern repeatedly within a small region.
  - id: js-indirect-eval-this
    desc: Indirect eval through object property
    crit: notable
    conf: 0.8
    attack: "T1059.007"
    count_min: 3
    if:
      type: text
      regex: 'this\[\w+\]\('
    unless:
      - id: metadata/library/jquery/
      - id: metadata/library/prototype/
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-esbuild-bundle
  - id: js-indirect-eval-this-assign
    desc: Indirect eval through variable alias
    crit: notable
    conf: 0.8
    attack: "T1059.007"
    if:
      type: text
      regex: '\b\w+\s*=\s*this\[\s*[''"]?(eval|Function|constructor)[''"]?\s*\]'
      case_insensitive: true
    unless:
      - id: metadata/library/jquery/
      - id: metadata/library/d3/
      - id: metadata/library/prototype/
  - id: js-assign-global-this
    desc: Assigning 'this' (global object) to a variable
    crit: notable
    conf: 0.7
    size_max: 500000
    count_min: 2
    if:
      type: text
      regex: '\b\w+\s*=\s*this\b([^\.]|$)'
    not:
      - substr: '"version":3,"file":'
      - substr: "f=this,"
      - regex: '\b(var|let|const)\s+\w+\s*=\s*this\b'
      - regex: '\b__import[A-Za-z]+\s*=\s*this\b'
      - regex: '\b\w+\s*=\s*this\s*\['
      - regex: '\b_?this\s*=\s*this\b'
      - regex: '\bthat\s*=\s*this\b'
      - regex: '\bself\s*=\s*this\b'
      - regex: '\bparent\s*=\s*this\b'
      - regex: '\b(root|global|window|globalThis|me)\s*=\s*this\b'
    unless:
      - type: basename
        regex: '(^jsbn(-combined|2)?\.js$|\.js\.map$)'
      - type: basename
        regex: (^|[\\/])(.+[\\/])?node_modules[\\/]ipv6[\\/]
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-terminal[\\/]dist[\\/]
      - type: basename
        regex: ^(rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: js-assign-common-root-1
    desc: Global object assignment (root/self/global)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(root|self|global|that)\s*=\s*this\b'
    unless:
      # Exclude well-formatted code where self=this is standard pre-ES6 pattern
      - type: metrics
        field: text.whitespace_ratio
        min: 0.20
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: well-known/tool/development/vscode-svelte::extension-bundle
      - id: well-known/lib/pathway::python-package
      # TypeScript source files regularly use `that = this` as the idiomatic
      # pre-arrow-function closure capture — no obfuscation intent.
      - type: basename
        regex: '\.ts$'
  - id: js-assign-common-root-2
    desc: Global object alias assignment pattern
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\b(me|window|globalThis)\s*=\s*this\b'
    downgrade:
      any:
        - type: metrics
          field: text.whitespace_ratio
          min: 0.20
        - id: metadata/package/testing/harness/runtime::is-test
  # Indirect eval execution via window[var] or similar
  - id: js-indirect-eval-window
    desc: Indirect eval via global
    crit: suspicious
    conf: 0.8
    attack: "T1059.007"
    if:
      type: text
      regex: '(window|self|global)\[\w+\]\('
    downgrade:
      any:
        - id: metadata/library/structure::js-large-module-bundle
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  # Construction of "eval" string (e.g., 'e'+'val')
  - id: js-eval-construction
    desc: Constructed eval string
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '[''"]e[''"]\s*\+\s*[''"]val[''"]'
  - id: js-ascii-char-map-prefix
    desc: ASCII char map array prefix
    crit: suspicious
    conf: 0.96
    size_max: 20000
    if:
      type: text
      substr: "var EFUpp=['','','','','','','','','','','"
  - id: js-parseint-tostring-remap
    desc: parseInt toString radix remap
    crit: suspicious
    conf: 0.93
    size_max: 20000
    if:
      type: text
      regex: 'parseInt\(\w+,\w+\);\w+=\w+\.toString\(\w+\);'
  - id: js-parsefloat-finite-guard
    desc: parseFloat finite token guard
    crit: component
    conf: 0.93
    size_max: 20000
    if:
      type: text
      substr: return !isNaN(parseFloat(
  - id: js-char-map-radix-lookup
    desc: Char map radix lookup return
    crit: suspicious
    conf: 0.92
    size_max: 20000
    if:
      type: text
      substr: return EFUpp[jYAdx(
composite_rules:
  - id: js-assign-common-root
    desc: Common global object assignment (root, self, global)
    crit: suspicious
    conf: 0.9
    size_max: 50000
    any:
      - id: js-assign-common-root-1
      - id: js-assign-common-root-2
  - id: js-ascii-map-eval-reconstruction
    desc: ASCII-map numeric decoder feeding eval
    crit: hostile
    conf: 0.98
    all:
      - id: js-ascii-char-map-prefix
      - id: js-parseint-tostring-remap
      - id: js-parsefloat-finite-guard
      - id: js-char-map-radix-lookup
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
      - id: objectives/anti-static/obfuscation/string/conceal::js-junk-math-1
