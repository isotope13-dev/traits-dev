defaults:
  platforms: [windows, unix]
  crit: notable
  attack: T1059
  for:
    - ruby
traits:
  - id: instance-eval
    desc: Ruby instance_eval call
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      word: instance_eval
    unless:
      - type: text
        regex: instance_eval\(&method\)
  - id: class-eval
    desc: Ruby class_eval call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: class_eval
    unless:
      - type: text
        regex: class_eval\s+<<-RUBY,\s+__FILE__,\s+__LINE__\s+\+\s+1
      - id: metadata/package/testing/presence/harness::ruby-test-file
  - id: module-eval
    desc: Ruby module_eval call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: module_eval
  - id: prepend-module
    desc: Ruby Module prepend
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \.prepend\s+Module\.new
  - id: eval-payload-variable
    desc: Ruby eval of PAYLOAD variable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\beval\s*\(\s*PAYLOAD\s*\)'

composite_rules:
  - id: ruby-fragmented-base64-eval
    desc: Ruby fragmented base64 eval
    crit: hostile
    conf: 0.97
    all:
      - id: eval-payload-variable
      - id: objectives/anti-static/obfuscation/encoding/base64::ruby-fragmented-base64-payload
