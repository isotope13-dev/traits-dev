defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  attack: T1059
  for:
    - ruby
traits:
  - id: eval-call-ruby
    desc: Ruby eval call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: eval
  - id: instance-eval
    desc: Ruby instance_eval call
    crit: notable
    conf: 0.9
    if:
      type: string_value
      word: instance_eval
  - id: class-eval
    desc: Ruby class_eval call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: class_eval
  - id: module-eval
    desc: Ruby module_eval call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: module_eval
  - id: prepend-module
    desc: Ruby Module prepend
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: \.prepend\s+Module\.new
  - id: define-method-dynamic
    desc: Ruby dynamic method definition
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: define_method\s*\(\s*:[a-z_]+
