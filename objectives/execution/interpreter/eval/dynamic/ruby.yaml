defaults:
  platforms: [windows, unix]
  crit: notable
  attack: T1059
  for:
    - ruby
traits:
  - id: prepend-module
    desc: Ruby Module prepend
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \.prepend\s+Module\.new
  - id: eval-payload-variable
    desc: Ruby eval of PAYLOAD variable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\beval\s*\(\s*PAYLOAD\s*\)'

composite_rules:
  - id: ruby-fragmented-base64-eval
    desc: Ruby fragmented base64 eval
    crit: hostile
    conf: 0.97
    all:
      - id: eval-payload-variable
      - id: objectives/anti-static/obfuscation/encoding/base64::ruby-fragmented-base64-payload
