defaults:
  platforms: [windows, unix]
  crit: notable
  attack: T1059
  for:
    - ruby
traits:
  - id: instance-eval
    desc: Ruby instance_eval call
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      word: instance_eval
    unless:
      - type: text
        regex: instance_eval\(&method\)
  - id: class-eval
    desc: Ruby class_eval call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: class_eval
    unless:
      - type: text
        regex: class_eval\s+<<-RUBY,\s+__FILE__,\s+__LINE__\s+\+\s+1
      - id: metadata/package/testing/presence/harness::ruby-test-file
  - id: module-eval
    desc: Ruby module_eval call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: module_eval
  - id: prepend-module
    desc: Ruby Module prepend
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \.prepend\s+Module\.new
  - id: define-method-dynamic
    desc: Ruby dynamic method definition
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: define_method\s*\(\s*:[a-z_]+
