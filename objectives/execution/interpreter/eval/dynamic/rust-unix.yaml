defaults:
  platforms: [unix]
  for: [rust]
  attack: T1059
  mbc: E1059

traits:
  - id: rust-evaluator-reentry
    desc: Rust routes eval input to evaluator
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: 'buffer\.starts_with\("eval "\)[\s\S]{0,240}eval_call\s*\('

composite_rules:
  - id: rust-hooked-unix-evaluator
    desc: Rust hook evaluator socket channel
    crit: hostile
    conf: 0.99
    mbc: B0022
    all:
      - id: micro-behaviors/process/create/direct::rust-hook-command-spawn
      - id: rust-evaluator-reentry
      - id: micro-behaviors/communications/ipc/unix-socket::unix-listener-bind
      - id: micro-behaviors/communications/ipc/unix-socket::unix-listener-accept
      - id: micro-behaviors/communications/ipc/unix-socket::unix-stream-read
      - id: micro-behaviors/communications/ipc/unix-socket::unix-socket-path
    unless:
      - id: well-known/app/yom::yom-core-hook-context
