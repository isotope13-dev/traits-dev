defaults:
  platforms: [unix]
  for: [rust]
  attack: T1059
  mbc: E1059

traits:
  - id: rust-hook-evaluator-launch
    desc: Rust launches a hook-selected executable
    crit: component
    conf: 0.97
    if:
      type: text
      regex: 'Command::new\s*\(\s*&[A-Za-z_][A-Za-z0-9_]*_hook\s*\)[\s\S]{0,180}\.spawn\s*\('

  - id: rust-evaluator-reentry
    desc: Rust routes eval input to evaluator
    crit: component
    conf: 0.97
    if:
      type: text
      regex: 'buffer\.starts_with\("eval "\)[\s\S]{0,240}eval_call\s*\('

composite_rules:
  - id: rust-hooked-unix-evaluator
    desc: Rust hook evaluator socket channel
    crit: hostile
    conf: 0.99
    mbc: B0022
    all:
      - id: rust-hook-evaluator-launch
      - id: rust-evaluator-reentry
      - id: micro-behaviors/communications/ipc/unix-socket::unix-listener-bind
      - id: micro-behaviors/communications/ipc/unix-socket::unix-listener-accept
