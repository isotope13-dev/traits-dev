defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1059.006"

traits:
  - id: exec-open-read
    desc: exec() on file read
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'exec\s*\(\s*open\s*\(.{1,160}\)\.read\s*\('
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: objectives/persistence/login/python-startup::pythonstartup-env
  - id: exec-fp-read-dict
    desc: exec() on file handle into dict
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'exec\s*\(\s*[A-Za-z_]\w*\.read\(\)\s*,\s*[A-Za-z_]\w+\s*\)'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: objectives/persistence/login/python-startup::pythonstartup-env
  - id: exec-three-argument-after-read
    desc: Three-argument exec after file read
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'read\(\)[\s\S]{0,500}exec\(\s*\w+,\s*\w+,\s*\w+\)'
