defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1059.006"

traits:
  - id: exec-open-read
    desc: exec() on file read
    crit: suspicious
    conf: 0.92
    mbc: "E1059"
    if:
      type: text
      regex: 'exec\s*\(\s*open\s*\(.{1,160}\)\.read\s*\('
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: objectives/persistence/login/python-startup::pythonstartup-env
