defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1059.006"

traits:
  - id: exec-open-read
    desc: exec() on file read
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'exec\s*\(\s*open\s*\(.{1,160}\)\.read\s*\('
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: objectives/persistence/login/python-startup::pythonstartup-env
  - id: exec-fp-read-dict
    desc: exec() on file handle into dict
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'exec\s*\(\s*[A-Za-z_]\w*\.read\(\)\s*,\s*[A-Za-z_]\w+\s*\)'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: objectives/persistence/login/python-startup::pythonstartup-env
