defaults:
  platforms: [windows, unix]
  for: [svg]
  attack: T1059.007
  mbc: B0032
traits:
  - id: svg-constructor-property-chain-direct
    desc: Constructor property chain
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\\[\\s*["'']constructor["'']\\s*\\]'
  - id: svg-hex-constructor-prefix
    desc: Hex-escaped constructor prefix
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\\[\\s*["'']\\\\x63\\\\x6f\\\\x6e\\\\x73\\\\x74'
  - id: svg-hex-constructor-suffix
    desc: Hex-escaped constructor suffix
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\\\\x72\\\\x75\\\\x63\\\\x74\\\\x6f\\\\x72["'']\\s*\\]'
composite_rules:
  - id: svg-hex-encoded-constructor-property
    desc: Hex-escaped constructor property chain
    crit: suspicious
    conf: 0.93
    all:
      - id: svg-hex-constructor-prefix
      - id: svg-hex-constructor-suffix
    near_bytes: 120
  - id: svg-constructor-property-chain
    desc: SVG bracketed constructor property chain
    crit: suspicious
    conf: 0.93
    any:
      - id: svg-constructor-property-chain-direct
      - id: svg-hex-encoded-constructor-property
  - id: svg-base64-literal
    desc: Base64-like string inside SVG script
    crit: notable
    conf: 0.86
    all:
      - id: micro-behaviors/data/format/html::html-svg-script-element
      - id: micro-behaviors/data/encode/base64::svg-base64-string
    near_bytes: 4096
