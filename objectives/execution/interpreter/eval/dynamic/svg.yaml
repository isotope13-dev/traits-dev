defaults:
  platforms: [windows, unix]
  for: [svg]
  attack: T1059.007
  mbc: B0032
traits:
  - id: svg-constructor-property-chain
    desc: Constructor property chain
    crit: suspicious
    conf: 0.93
    count_min: 2
    if:
      type: text
      regex: '\[\s*["''](constructor|\\x63\\x6f\\x6e\\x73\\x74\\x72\\x75\\x63\\x74\\x6f\\x72)["'']\s*\]'
  - id: svg-base64-literal
    desc: Base64-like string literal in SVG script
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '[''"]\$?[A-Za-z0-9+/]{32,}={0,2}[''"]'
  - id: svg-hex-ciphertext
    desc: Long hexadecimal ciphertext literals
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '[''"][0-9a-fA-F]{80,}[''"]'
