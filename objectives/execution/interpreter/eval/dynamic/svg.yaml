defaults:
  platforms: [windows, unix]
  for: [svg]
  attack: T1059.007
  mbc: B0032
traits:
  - id: svg-constructor-property-chain
    desc: Constructor property chain
    crit: suspicious
    conf: 0.93
    count_min: 2
    if:
      type: text
      regex: '\[\s*["''](constructor|\\x63\\x6f\\x6e\\x73\\x74\\x72\\x75\\x63\\x74\\x6f\\x72)["'']\s*\]'
  - id: svg-base64-string
    desc: Base64-like string literal inside SVG markup
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?is)<svg\b.{0,800}["'']\$?[A-Za-z0-9+/]{32,}={0,2}["'']'
  - id: svg-hex-ciphertext
    desc: Long hexadecimal ciphertext literals
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '[''"][0-9a-fA-F]{80,}[''"]'
composite_rules:
  - id: svg-base64-literal
    desc: Base64-like string inside SVG script
    crit: notable
    conf: 0.86
    all:
      - id: micro-behaviors/data/format/html::html-svg-script-element
      - id: svg-base64-string
    near_bytes: 4096
