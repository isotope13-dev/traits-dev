defaults:
  platforms: [unix, windows]
  for: [javascript]
  attack: T1059.007
traits:
  - id: noop-delay-loop
    desc: No-op loop delay padding
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'for\s*\(\s*var\s+\w+\s*=\s*\d+\s*;\s*\w+\s*<\s*\d+\s*;\s*\w+\+\+\s*\)\s*\{\s*\}'
composite_rules:
  - id: large-numeric-reconstructed-code-execution
    desc: Large numeric JavaScript payload executes reconstructed code
    crit: hostile
    conf: 0.96
    attack: T1027,T1059.007
    all:
      - id: objectives/supply-chain/hidden-payload/eval::huge-numeric-source-blob
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
  - id: xor-array-eval-loader
    desc: JavaScript XOR array eval loader
    crit: suspicious
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-xor-numeric-array-string-reconstruction
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
      - id: objectives/execution/interpreter/eval/dynamic::eval-variable
      - id: objectives/execution/interpreter/eval/dynamic::eval-transformed-code
  - id: xor-array-function-loader
    desc: JavaScript XOR array Function loader
    crit: suspicious
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-xor-numeric-array-string-reconstruction
      - id: micro-behaviors/process/interpreter/eval::js-new-function-variable-argument
    any:
      - id: noop-delay-loop
      - id: micro-behaviors/process/interpreter/jscript::activex-object
  - id: xor-array-com-stage-loader
    desc: JavaScript XOR array COM stage loader
    crit: suspicious
    conf: 0.97
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-xor-numeric-array-string-reconstruction
    any:
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: micro-behaviors/fs/write/file/stream::adodb-stream
