defaults:
  platforms: [windows, unix]
traits:
  - id: node-vm
    desc: Executing code via Node.js VM
    crit: notable
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: vm\.runIn(New)?Context
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
        - id: metadata/package/testing/harness::node-inspector-harness
