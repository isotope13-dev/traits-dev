defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: node-vm
    desc: Executing code via Node.js VM
    crit: notable
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: string_value
      regex: vm\.runIn(New)?Context
    downgrade:
      any:
        - id: metadata/dev/testing::is-test
        - id: metadata/dev/testing::node-inspector-harness
