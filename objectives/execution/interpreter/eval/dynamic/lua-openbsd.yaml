defaults:
  platforms: [openbsd, bsd, unix]
  for: [lua, shell]
  attack: T1059

traits:
  - id: lua-polyglot-gate-marker
    desc: Lua polyglot gate marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: .hs4iyd

  - id: lua-decoded-payload-comment
    desc: Lua decoded payload comment
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: XOR decode and execute hidden payload

  - id: lua-encoded-blob-prefix
    desc: Lua encoded blob prefix
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: \x4e\x41\x45\x22

composite_rules:
  - id: lua-polyglot-decoded-eval
    desc: Lua polyglot decoded eval
    crit: hostile
    conf: 0.98
    all:
      - id: lua-polyglot-gate-marker
      - id: lua-decoded-payload-comment
      - id: lua-encoded-blob-prefix
