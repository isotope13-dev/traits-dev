defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: eval-symbol
    desc: eval() function call
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
      - typescript
      - perl
    if:
      type: symbol
      exact: eval
    unless:
      - type: text
        substr: -module(
      - type: text
        substr: "@externs"
      - type: text
        substr: JSON.retrocycle
    downgrade:
      any:
        - id: metadata/package/testing/harness::embedded-unit-test-fixture
        - id: metadata/package/testing/harness::is-test
  - id: eval-as-first-arg
    desc: eval as first argument (eval,
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
    if:
      type: string_literal
      regex: \(eval\s*,
  - id: eval-as-last-arg
    desc: eval as last argument ,eval)
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
    if:
      type: string_literal
      regex: ',\s*eval\)'
  - id: eval-variable
    desc: eval with variable argument
    crit: notable
    conf: 0.9
    attack: T1059.007
    for:
      - javascript
    if:
      type: string_literal
      regex: eval\s*\(\s*[a-zA-Z_$][a-zA-Z0-9_$]*\s*\)
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
  - id: constructor-property-access
    desc: Constructor property access
    crit: notable
    conf: 0.65
    attack: T1059.007
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \[\s*["']constructor["']\s*\]
  - id: bracket-function-access
    desc: Function access via bracket notation
    crit: baseline
    conf: 0.65
    attack: T1027.002
    for:
      - javascript
    count_min: 3
    if:
      type: text
      regex: \w+\[\w+\]\s*\(
  - id: vm-runIn-method
    desc: vm.runIn method
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
    if:
      type: string_literal
      regex: vm\.runIn
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
        - id: metadata/package/testing/harness::node-inspector-harness
  - id: runInContext-call
    desc: runInContext call
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
    if:
      type: string_literal
      substr: runInContext
    downgrade:
      any:
        - id: metadata/library/lodash/
        - id: metadata/package/testing/harness::is-test
        - id: metadata/package/testing/harness::node-inspector-harness
  - id: runInNewContext-call
    desc: runInNewContext call
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
    if:
      type: string_literal
      substr: runInNewContext
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
        - id: metadata/package/testing/harness::node-inspector-harness
  - id: iife-pattern-dup
    desc: Immediately invoked function expression
    crit: notable
    conf: 0.9
    for:
      - javascript
    count_min: 5
    if:
      type: text
      regex: \(\s*(async\s+)?function\s*\([^)]{0,50}\)\s*\{[\s\S]{0,240}\}\s*\)\s*\(
  - id: variable-immediate-call
    desc: Many variable-assigned function expressions
    crit: notable
    conf: 0.7
    for:
      - javascript
    count_min: 15
    if:
      type: text
      regex: var\s+\w+\s*=\s*function\s*\([^)]{0,120}\)\s*\{|var\s+\w+\s*=\s*\(\s*\)\s*=>
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: eval-function-definition
    desc: eval() compiling a function string
    crit: notable
    conf: 0.8
    for:
      - javascript
    if:
      type: text
      regex: eval\s*\(\s*["']\[?function
  - id: eval-call-expression-arg
    desc: eval() with call expression argument
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    for:
      - javascript
    if:
      type: ast
      query: |
        (call_expression
          function: (identifier) @fn
          arguments: (arguments
            (call_expression) @arg)
          (#eq? @fn "eval"))
    unless:
      - type: text
        substr: o.sharedParser=new i.Parser,o.autoload=function(
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: function-constructor-from-typeof
    desc: Function constructor derived from typeof
    crit: suspicious
    conf: 0.85
    attack: T1059.007
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: typeof.{0,80}charAt\(0\)\.toUpperCase\(\).{0,60}typeof.{0,80}\.slice\(1\)
  - id: svga-autoloader-bundle
    desc: SVGA player autoloader bundle marker
    crit: baseline
    conf: 0.99
    for:
      - javascript
    if:
      type: text
      substr: o.sharedParser=new i.Parser,o.autoload=function(
composite_rules:
  - id: eval-function-reference
    desc: eval passed as function reference
    crit: suspicious
    conf: 0.95
    attack: T1059.007
    for:
      - javascript
    any:
      - id: eval-as-first-arg
      - id: eval-as-last-arg
  - id: eval-transformed-code
    desc: eval() executing transformed call result
    crit: suspicious
    conf: 0.94
    attack: T1059.007
    for:
      - javascript
    all:
      - id: eval-symbol
      - id: eval-call-expression-arg
    unless:
      - id: svga-autoloader-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: Function-constructor
    desc: Function constructor usage
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    mbc: B0009.016
    for:
      - javascript
    any:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor
      - id: constructor-property-access
      - id: function-constructor-from-typeof
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::version-string
      - id: metadata/library/prototype::copyright
      - id: metadata/library/jquery::fn-extend
      - id: metadata/library/d3::d3-detection-all
