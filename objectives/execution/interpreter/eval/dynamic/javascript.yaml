defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: eval-as-first-arg
    desc: eval as first argument (eval,
    crit: notable
    conf: 0.7
    attack: T1059.007
    if:
      type: string_literal
      regex: \(eval\s*,
  - id: eval-as-last-arg
    desc: eval passed as the final call argument
    crit: notable
    conf: 0.7
    attack: T1059.007
    unless:
      - id: metadata/library/structure/
    if:
      type: string_literal
      regex: ',\s*eval\)'
  - id: eval-variable
    desc: eval with variable argument
    crit: notable
    conf: 0.9
    attack: T1059.007
    if:
      type: string_literal
      regex: eval\s*\(\s*[a-zA-Z_$][a-zA-Z0-9_$]*\s*\)
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context

  - id: js-interpreter-constructor-timeout
    desc: JavaScript interpreter constructor timeout
    crit: suspicious
    conf: 0.94
    attack: T1059.007
    if:
      type: text
      # Match constructors that are actually used as embedded interpreters;
      # DatabaseSync and other ordinary APIs also accept `{ timeout: ... }`.
      regex: 'new\s+(VM|NodeVM|Isolate)\s*\(\s*\w+\s*,\s*\{\s*timeout\s*:'
    unless:
      - id: metadata/package/testing/harness/runtime/

  - id: js-interpreter-evaluate-call
    desc: JavaScript VM evaluate call
    crit: suspicious
    conf: 0.94
    attack: T1059.007
    if:
      type: text
      regex: '\b(vm|nodevm|isolate)\.evaluate\s*\(\s*\w+\s*\)'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/lib/uglifyjs::compressor-source
      - id: metadata/library/jsonata::jsonata-query-evaluate

  - id: constructor-property-access
    desc: JavaScript accesses constructor property
    crit: component
    conf: 0.65
    attack: T1059.007
    mbc: B0032
    if:
      type: text
      regex: \[\s*["']constructor["']\s*\]
    unless:
      - id: metadata/library/jquery::obfuscated-jquery-source
  # Removed: `\w+\[\w+\]\s*\(` (computed-property call) is too generic to
  # be an objective on its own — it fires on any dispatch/action table
  # (`window[name](payload)`, `handlers[evt](e)`). Real indirect-eval
  # detection is handled by the AST and `bracket-eval` traits in
  # obfuscated_js.yaml that require an eval/Function target specifically.
  - id: iife-pattern-dup
    desc: Immediately invoked function expression
    crit: notable
    conf: 0.9
    count_min: 5
    if:
      type: text
      regex: \(\s*(async\s+)?function\s*\([^)]{0,50}\)\s*\{[\s\S]{0,240}\}\s*\)\s*\(
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure/
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: variable-immediate-call
    desc: Many variable-assigned function expressions
    crit: notable
    conf: 0.7
    count_min: 15
    if:
      type: text
      regex: var\s+\w+\s*=\s*function\s*\([^)]{0,120}\)\s*\{|var\s+\w+\s*=\s*\(\s*\)\s*=>
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure/
      - id: metadata/library/structure::js-dist-asset-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: well-known/lib/jspdf/
      - id: metadata/library/async::async-library
  - id: eval-function-definition
    desc: eval() compiling a function string
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: eval\s*\(\s*["']\[?function
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/source/
  - id: eval-call-expression-arg
    desc: eval() with call expression argument
    crit: notable
    conf: 0.9
    attack: T1059.007
    if:
      type: tree-sitter
      query: |
        (call_expression
          function: (identifier) @fn
          arguments: (arguments
            (call_expression) @arg)
          (#eq? @fn "eval"))
    unless:
      - id: metadata/library/svga::svga-autoloader-bundle
      - id: objectives/execution/interpreter/eval/dynamic/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/runtime::v8-native-intrinsic-call
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - type: basename
        regex: "\\.scrbl$"
  - id: eval-contents-of-helper
    desc: eval(contentsOf(...)) Node test helper
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: eval(contentsOf(
  - id: readline-rl-on-line
    desc: Node readline rl.on('line') handler
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: \brl\.on\s*\(\s*['"]line['"]

  - id: synced-extension-task-field
    desc: Reads synced browser task list
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      regex: 'storage\.sync\.get\(\s*\[[^\]]{0,120}\btasks_r\b'

  - id: synced-extension-task-code
    desc: Executes code from synced browser task
    crit: suspicious
    conf: 0.99
    attack: T1059.007
    for: [javascript, typescript]
    if:
      type: text
      regex: 'new\s+Function\s*\(\s*task\.code\s*\)'

composite_rules:
  - id: js-embedded-interpreter-evaluate
    desc: Embedded interpreter evaluates JavaScript strings
    crit: suspicious
    conf: 0.96
    attack: T1059.007
    mbc: B0032
    all:
      - id: js-interpreter-constructor-timeout
      - id: js-interpreter-evaluate-call
    near_bytes: 512

  - id: hex-mangled-decoded-computed-execution
    desc: Hex-mangled JavaScript executes a custom-decoded computed stage
    crit: hostile
    conf: 0.98
    attack: T1027,T1140,T1059.007
    mbc: B0032
    scope: file
    all:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
      - id: micro-behaviors/data/decode/custom::js-alphabet-coded-decoder-source
      - id: micro-behaviors/process/interpreter/eval::js-computed-charcode-call
      - id: micro-behaviors/data/encode/char-code::fromcharcode-xor-rebuild
    unless:
      - id: metadata/library/mermaid::mermaid-bundle-marker
      - id: well-known/app/wordpress-plugins/
      - id: well-known/lib/freemius::freemius-js-ref

  - id: packed-arithmetic-decoder-runtime-stage
    desc: Arithmetic-decoded JavaScript stage executes via eval
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.007,T1140
    mbc: B0032
    all:
      - id: micro-behaviors/data/decode/custom::fromcharcode-large-offset-expression
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
      - id: metadata/file/metrics::single-long-line
    unless:
      - id: metadata/package/testing/

  - id: js-alphabet-decoder-aliased-eval-stage
    desc: JavaScript alphabet decoder executes its result through aliased eval
    crit: hostile
    conf: 0.99
    attack: T1027,T1140,T1059.007
    mbc: B0032
    scope: file
    all:
      - id: micro-behaviors/data/decode/custom::js-alphabet-coded-decoder-source
      - id: micro-behaviors/data/decode/custom::js-charcode-byte-mask
      - id: micro-behaviors/process/interpreter/eval::js-eval-alias-assignment
      - id: metadata/library/structure::js-medium-minified-line
    unless:
      - id: metadata/package/testing/

  - id: jsdom-dynamic-execution
    desc: Dynamic code execution within JSDOM sandbox
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/interpreter/vm::jsdom-run-scripts
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: eval-bundler-compatibility-marker
    desc: Known eval() compat noise bundle/macro markers
    crit: notable
    conf: 0.95
    any:
      - id: eval-contents-of-helper
      - id: metadata/build/autotools/
      - id: readline-rl-on-line
  - id: eval-function-reference
    desc: eval passed as function reference
    crit: suspicious
    conf: 0.95
    attack: T1059.007
    any:
      - id: eval-as-first-arg
      - id: eval-as-last-arg
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: eval-transformed-code
    desc: eval() executing transformed code
    crit: notable
    conf: 0.94
    attack: T1059.007
    all:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: eval-call-expression-arg
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/runtime::v8-native-intrinsic-call
      - id: metadata/library/svga::svga-autoloader-bundle
      - id: objectives/execution/interpreter/eval/dynamic/
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: encrypted-array-function-stage
    desc: Encrypted byte array decoded and executed as a JavaScript stage
    crit: hostile
    conf: 0.97
    attack: "T1027, T1059.007, T1140"
    all:
      - id: objectives/anti-static/obfuscation/payload/jscript::embedded-encrypted-byte-array
      - id: objectives/anti-static/obfuscation/payload/jscript::embedded-secret-key-byte-array
      - id: micro-behaviors/process/interpreter/eval::js-charcode-constructor-stage
  - id: indirect-eval-decoded-stage
    desc: Indirect eval executes a decoded JavaScript stage
    crit: hostile
    conf: 0.96
    attack: "T1027, T1059.007, T1140"
    near_bytes: 4096
    all:
      - id: micro-behaviors/data/string/conversion::js-fromcharcode-alias
      - id: micro-behaviors/process/interpreter/eval::js-indirect-eval-variable
    any:
      - id: micro-behaviors/data/control-flow/loop::js-length-loop-compound-add
      - id: objectives/supply-chain/hidden-payload/eval::huge-numeric-source-blob
    unless:
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/package/testing/
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/library/mermaid::mermaid-bundle-marker
      - id: well-known/app/google-web::google-recaptcha-runtime

  - id: javascript-remote-encoded-command-invocation
    desc: JavaScript pairs a fetched PHP endpoint with an encoded command API
    crit: hostile
    conf: 0.995
    attack: T1105,T1059.007,T1027
    all:
      - id: micro-behaviors/communications/http/url/php-endpoint::url-php-endpoint-encoded
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/process/interpreter/eval::js-base64-decoded-computed-call
    unless:
      - id: metadata/package/testing/

  - id: webextension-all-url-remote-eval
    desc: All-URL extension executes WebSocket commands
    crit: hostile
    conf: 0.995
    attack: T1059.007,T1071.001,T1176
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: objectives/command-and-control/backdoor/dispatch/eval::websocket-eval-command-marker
      - id: micro-behaviors/communications/http/websocket::websocket-constructor-call
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
      - id: metadata/permission/manifest::host-permission-all-urls

  - id: webextension-synced-task-code-execution
    desc: All-site extension executes code supplied through synced task storage
    crit: hostile
    conf: 0.995
    attack: T1059.007,T1176
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: metadata/permission/manifest::permission-all-urls
      - id: synced-extension-task-field
      - id: synced-extension-task-code
      - id: micro-behaviors/data/db/web-storage::chrome-storage-sync
      - id: micro-behaviors/communications/http/url/path::browser-location-host-read
