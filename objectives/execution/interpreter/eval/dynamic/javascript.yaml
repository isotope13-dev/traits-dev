defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: eval-as-first-arg
    desc: eval as first argument (eval,
    crit: notable
    conf: 0.7
    attack: T1059.007
    if:
      type: string_literal
      regex: \(eval\s*,
  - id: eval-as-last-arg
    desc: eval as last argument ,eval)
    crit: notable
    conf: 0.7
    attack: T1059.007
    if:
      type: string_literal
      regex: ',\s*eval\)'
  - id: eval-variable
    desc: eval with variable argument
    crit: notable
    conf: 0.9
    attack: T1059.007
    if:
      type: string_literal
      regex: eval\s*\(\s*[a-zA-Z_$][a-zA-Z0-9_$]*\s*\)
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: constructor-property-access
    desc: constructor property access marker
    crit: notable
    conf: 0.65
    attack: T1059.007
    mbc: B0032
    if:
      type: text
      regex: \[\s*["']constructor["']\s*\]
  - id: bracket-function-access
    desc: Function access via bracket notation
    crit: notable
    conf: 0.65
    attack: T1027.002
    count_min: 3
    if:
      type: text
      regex: \w+\[\w+\]\s*\(
  - id: vm-runIn-method
    desc: vm.runIn method
    crit: notable
    conf: 0.7
    attack: T1059.007
    unless:
      - id: metadata/package/testing/harness::test-basename-spec
    if:
      type: string_literal
      regex: vm\.runIn
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
        - id: metadata/package/testing/harness::node-inspector-harness
  - id: runInContext-call
    desc: runInContext call
    crit: notable
    conf: 0.7
    attack: T1059.007
    if:
      type: string_literal
      substr: runInContext
    downgrade:
      any:
        - id: metadata/library/lodash/
        - id: metadata/package/testing/harness::is-test
        - id: metadata/package/testing/harness::node-inspector-harness
  - id: runInNewContext-call
    desc: runInNewContext call
    crit: notable
    conf: 0.7
    attack: T1059.007
    unless:
      - id: metadata/package/testing/harness::test-basename-spec
    if:
      type: string_literal
      substr: runInNewContext
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
        - id: metadata/package/testing/harness::node-inspector-harness
  - id: iife-pattern-dup
    desc: Immediately invoked function expression
    crit: notable
    conf: 0.9
    count_min: 5
    if:
      type: text
      regex: \(\s*(async\s+)?function\s*\([^)]{0,50}\)\s*\{[\s\S]{0,240}\}\s*\)\s*\(
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: variable-immediate-call
    desc: Many variable-assigned function expressions
    crit: notable
    conf: 0.7
    count_min: 15
    if:
      type: text
      regex: var\s+\w+\s*=\s*function\s*\([^)]{0,120}\)\s*\{|var\s+\w+\s*=\s*\(\s*\)\s*=>
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: eval-function-definition
    desc: eval() compiling a function string
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: eval\s*\(\s*["']\[?function
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package::terser-output
  - id: eval-call-expression-arg
    desc: eval() with call expression argument
    crit: notable
    conf: 0.9
    attack: T1059.007
    if:
      type: ast
      query: |
        (call_expression
          function: (identifier) @fn
          arguments: (arguments
            (call_expression) @arg)
          (#eq? @fn "eval"))
    unless:
      - id: svga-autoloader-bundle
      - id: eval-bundler-fp-context
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/harness::v8-native-intrinsic-call
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - type: basename
        regex: "\\.scrbl$"
  - id: function-constructor-from-typeof
    desc: Function constructor derived from typeof
    crit: suspicious
    conf: 0.85
    attack: T1059.007
    mbc: B0032
    if:
      type: text
      regex: typeof.{0,80}charAt\(0\)\.toUpperCase\(\).{0,60}typeof.{0,80}\.slice\(1\)
  - id: svga-autoloader-bundle
    desc: SVGA player autoloader bundle marker
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: o.sharedParser=new i.Parser,o.autoload=function(
  - id: eval-contents-of-helper
    desc: eval(contentsOf(...)) Node test helper
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: eval(contentsOf(
  - id: ac-defun-autoconf-macro
    desc: Autoconf AC_DEFUN macro fragment
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: AC_DEFUN([
  - id: readline-rl-on-line
    desc: Node readline rl.on('line') handler
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: \brl\.on\s*\(\s*['"]line['"]
composite_rules:
  - id: eval-bundler-fp-context
    desc: Known eval() false-positive bundle/macro contexts
    crit: baseline
    conf: 0.95
    any:
      - id: eval-contents-of-helper
      - id: ac-defun-autoconf-macro
      - id: readline-rl-on-line
  - id: eval-function-reference
    desc: eval passed as function reference
    crit: suspicious
    conf: 0.95
    attack: T1059.007
    any:
      - id: eval-as-first-arg
      - id: eval-as-last-arg
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: eval-transformed-code
    desc: eval() executing transformed code
    crit: notable
    conf: 0.94
    attack: T1059.007
    all:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: eval-call-expression-arg
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/harness::v8-native-intrinsic-call
      - id: svga-autoloader-bundle
      - id: eval-bundler-fp-context
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: Function-constructor
    desc: Function constructor usage
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    mbc: B0009.016
    any:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor
      - id: constructor-property-access
      - id: function-constructor-from-typeof
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::version-string
      - id: metadata/library/prototype::copyright
      - id: metadata/library/jquery::fn-extend
      - id: metadata/library/d3::d3-detection-all
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/library/structure::js-large-module-bundle
