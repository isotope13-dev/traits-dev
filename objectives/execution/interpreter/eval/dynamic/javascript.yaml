defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: eval-symbol
    desc: eval() function call
    crit: notable
    conf: 0.7
    attack: T1059.007
    for: [javascript, typescript, perl]
    if:
      type: symbol
      exact: eval
  - id: eval-as-first-arg
    desc: eval as first argument (eval,
    crit: notable
    conf: 0.7
    attack: T1059.007
    for: [javascript]
    if:
      type: string_value
      regex: \(eval\s*,
  - id: eval-as-last-arg
    desc: eval as last argument ,eval)
    crit: notable
    conf: 0.7
    attack: T1059.007
    for: [javascript]
    if:
      type: string_value
      regex: ',\s*eval\)'
  - id: eval-variable
    desc: eval with variable argument
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    for: [javascript]
    if:
      type: string_value
      regex: eval\s*\(\s*[a-zA-Z_$][a-zA-Z0-9_$]*\s*\)
  - id: constructor-property-access
    desc: Constructor property access
    crit: suspicious
    conf: 0.75
    attack: T1059.007
    mbc: B0032
    for: [javascript]
    if:
      type: raw
      regex: \[\s*["']constructor["']\s*\]
  - id: bracket-function-access
    desc: Function access via bracket notation
    crit: notable
    conf: 0.65
    attack: T1027.002
    for: [javascript]
    count_min: 3
    if:
      type: raw
      regex: \w+\[\w+\]\s*\(
  - id: vm-runIn-method
    desc: vm.runIn method
    crit: notable
    conf: 0.7
    attack: T1059.007
    for: [javascript]
    if:
      type: string_value
      regex: vm\.runIn
  - id: runInContext-call
    desc: runInContext call
    crit: notable
    conf: 0.7
    attack: T1059.007
    for: [javascript]
    if:
      type: string_value
      substr: runInContext
    downgrade:
      any:
        - id: metadata/library/lodash
  - id: runInNewContext-call
    desc: runInNewContext call
    crit: notable
    conf: 0.7
    attack: T1059.007
    for: [javascript]
    if:
      type: string_value
      substr: runInNewContext
  - id: iife-pattern-dup
    desc: Immediately invoked function expression
    crit: notable
    conf: 0.9
    for: [javascript]
    count_min: 5
    if:
      type: raw
      regex: \(\s*(async\s+)?function\s*\([^)]{0,50}\)\s*\{[\s\S]{0,240}\}\s*\)\s*\(
  - id: variable-immediate-call
    desc: Many variable-assigned function expressions
    crit: notable
    conf: 0.7
    for: [javascript]
    count_min: 15
    if:
      type: raw
      regex: var\s+\w+\s*=\s*function\s*\([^)]{0,120}\)\s*\{|var\s+\w+\s*=\s*\(\s*\)\s*=>
  - id: eval-function-definition
    desc: eval() compiling a function string
    crit: notable
    conf: 0.8
    for: [javascript]
    if:
      type: raw
      regex: eval\s*\(\s*["']\[?function
  - id: function-constructor-from-typeof
    desc: Function constructor derived from typeof
    crit: suspicious
    conf: 0.85
    attack: T1059.007
    mbc: B0032
    for: [javascript]
    if:
      type: raw
      regex: typeof.{0,80}charAt\(0\)\.toUpperCase\(\).{0,60}typeof.{0,80}\.slice\(1\)
composite_rules:
  - id: eval-function-reference
    desc: eval passed as function reference
    crit: suspicious
    conf: 0.95
    attack: T1059.007
    for: [javascript]
    any:
      - id: eval-as-first-arg
      - id: eval-as-last-arg
  - id: Function-constructor
    desc: Function constructor usage
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    mbc: B0009.016
    for: [javascript]
    any:
      - id: objectives/anti-static/obfuscation/require::function-constructor
      - id: constructor-property-access
      - id: function-constructor-from-typeof
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::version-string
      - id: metadata/library/prototype::copyright
      - id: metadata/library/jquery::fn-extend
      - id: metadata/library/d3::d3-detection-all
