defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: js-eval-assignment
    desc: Assignment or return of 'eval' function reference
    crit: suspicious
    conf: 0.8
    for: [javascript]
    any:
      - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-keyword
      - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-return

  - id: mcp-lua-arbitrary-code-tool
    desc: MCP tool exposes Lua execution
    crit: suspicious
    conf: 0.95
    for: [python, lua, whl]
    scope: outer
    all:
      - id: micro-behaviors/communications/ipc/mcp::mcp-arbitrary-code-tool-schema
    any:
      - id: micro-behaviors/process/create/eval::lua-load
      - id: micro-behaviors/process/create/eval::lua-dynamic-load
