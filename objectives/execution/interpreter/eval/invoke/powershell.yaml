# PowerShell Dynamic Execution
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059.001
defaults:
  platforms: [unix, windows]
  for: [powershell, batch, shell]
  mbc: "E1059"
  attack: "T1059.001"
traits:
  # Invoke-Expression (iex) - primary eval mechanism
  - id: iex
    desc: Invoke-Expression cmdlet
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?i)\biex\b|Invoke-Expression'
    unless:
      - type: text
        substr: "completion powershell"
    downgrade:
      any:
        - type: text
          substr: "install.ps1 | iex"
  - id: iex-backtick-obfuscated
    desc: Backtick-obfuscated IEX alias
    crit: suspicious
    conf: 0.9
    for: [powershell]
    attack: T1027
    mbc: E1027
    if:
      type: text
      substr: "I`E`X"
  # Invoke-Command (icm) - remote and local execution
  - id: icm
    desc: Invoke-Command cmdlet
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)\bicm\b|Invoke-Command'
  # ScriptBlock execution
  - id: scriptblock
    desc: ScriptBlock execution
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)\[ScriptBlock\]|Invoke-ScriptBlock|ScriptBlock\.Create'
  # Add-Type for compiling C#
  - id: add-type
    desc: Add-Type compilation
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?i)Add-Type\s+-TypeDefinition'
  # Call operator (&)
  - id: call-operator
    desc: PowerShell call operator
    crit: notable
    conf: 0.5
    for: [powershell]
    if:
      type: text
      regex: '&\s*\('
  # IEX string reconstructed from $VerbosePreference ("SilentlyContinue")
  # Used by PowMix and other loaders to hide the literal "Invoke-Expression".
  - id: iex-via-verbose-preference
    desc: IEX rebuilt from $VerbosePreference
    crit: suspicious
    conf: 0.95
    for: [powershell]
    attack: T1027
    mbc: E1027
    if:
      type: text
      regex: \$VerbosePreference(?:\.[A-Za-z]+\(\))?\s*(?:\.substring|\[\d+)
      case_insensitive: true
  - id: call-operator-get-command-dynamic
    desc: Dynamic call-operator via Get-Command
    crit: suspicious
    conf: 0.9
    for: [powershell]
    if:
      type: text
      regex: '&\s*\(\s*Get-Command\s+\$[A-Za-z_][A-Za-z0-9_]*\s*\)'
      case_insensitive: true
composite_rules:
  # Dynamic code evaluation
  - id: ps-dynamic-eval
    desc: PowerShell dynamic code evaluation
    crit: notable
    conf: 0.8
    any:
      - id: iex
      - id: iex-backtick-obfuscated
      - id: scriptblock
      - id: add-type
