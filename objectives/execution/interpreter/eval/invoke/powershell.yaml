# PowerShell Dynamic Execution
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059.001
defaults:
  platforms: [unix, windows]
  for: [powershell, batch, shell]
  mbc: "E1059"
  attack: "T1059.001"
traits:
  # Invoke-Expression (iex) - primary eval mechanism
  - id: iex
    desc: Invoke-Expression cmdlet
    crit: notable
    conf: 0.75
    size_min: 1
    if:
      type: text
      regex: '(?i)\biex\b|Invoke-Expression'
    unless:
      - type: text
        substr: "completion powershell"
    downgrade:
      any:
        - type: text
          substr: "install.ps1 | iex"
  - id: iex-backtick-obfuscated
    desc: Backtick-obfuscated IEX alias
    crit: suspicious
    conf: 0.9
    for: [powershell]
    attack: T1027
    mbc: E1027
    if:
      type: text
      substr: "I`E`X"
  # Invoke-Command (icm) - remote and local execution
  - id: icm
    desc: Invoke-Command cmdlet
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)\bicm\b|Invoke-Command'
  # ScriptBlock execution
  - id: scriptblock
    desc: ScriptBlock execution
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)\[ScriptBlock\]|Invoke-ScriptBlock|ScriptBlock\.Create'
  - id: encoded-iex
    desc: Encoded Invoke-Expression cmdlet
    crit: suspicious
    conf: 0.9
    for: [powershell, vbs, html, batch, lnk]
    if:
      type: encoded
      encoding: base64
      regex: '(?i)\biex\b|Invoke-Expression'
  - id: encoded-scriptblock-create
    desc: Encoded ScriptBlock.Create execution
    crit: suspicious
    conf: 0.9
    for: [powershell, vbs, html, batch, lnk]
    if:
      type: encoded
      encoding: base64
      regex: '(?i)\[ScriptBlock\]::Create|ScriptBlock\.Create\('
  # Add-Type for compiling C#
  - id: add-type
    desc: Add-Type compilation
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?i)Add-Type\s+-TypeDefinition'
  - id: add-type-variable
    desc: Add-Type variable compilation
    crit: notable
    conf: 0.78
    for: [powershell]
    if:
      type: text
      regex: '(?i)\bAdd-Type\s+\$[A-Za-z_][A-Za-z0-9_]*'
  # Call operator (&)
  - id: call-operator
    desc: PowerShell call operator
    crit: notable
    conf: 0.5
    for: [powershell]
    if:
      type: text
      regex: '&\s*\('
  # IEX string reconstructed from $VerbosePreference ("SilentlyContinue")
  # Used by PowMix and other loaders to hide the literal "Invoke-Expression".
  - id: iex-via-verbose-preference
    desc: IEX rebuilt from $VerbosePreference
    crit: suspicious
    conf: 0.95
    for: [powershell]
    attack: T1027
    mbc: E1027
    if:
      type: text
      regex: \$VerbosePreference(\.[A-Za-z]+\(\))?\s*(\.substring|\[\d+)
      case_insensitive: true
  - id: call-operator-get-command-dynamic
    desc: Dynamic call-operator via Get-Command
    crit: suspicious
    conf: 0.9
    for: [powershell]
    if:
      type: text
      regex: '&\s*\(\s*Get-Command\s+\$[A-Za-z_][A-Za-z0-9_]*\s*\)'
      case_insensitive: true
  - id: call-operator-get-command-scriptblock
    desc: Get-Command ScriptBlock invocation
    crit: suspicious
    conf: 0.95
    for: [powershell]
    if:
      type: text
      regex: '&\s*\(\s*(gcm|Get-Command)\s+[A-Za-z0-9_$:-]{3,}\s*\)\.ScriptBlock\b'
      case_insensitive: true
  - id: call-operator-gcm-wildcard-iex
    desc: Wildcard Get-Command resolves IEX
    crit: suspicious
    conf: 0.95
    for: [powershell]
    attack: T1027
    mbc: E1027
    if:
      type: text
      regex: '&\s*\(\s*(gcm|Get-Command)\s+i\*{8,}x\s*\)'
      case_insensitive: true
  - id: ast-scriptblock-constructor
    desc: PowerShell AST scriptblock constructor
    crit: suspicious
    conf: 0.94
    for: [powershell, batch]
    if:
      type: text
      regex: (?i)ParamBloc.{0,16}kAst.{0,120}Na.{0,16}medBlockAst
  - id: ast-getscriptblock-reflection
    desc: Reflected GetScriptBlock invocation
    crit: suspicious
    conf: 0.94
    for: [powershell, batch]
    if:
      type: text
      regex: (?i)(GetScriptBlock|kcolBtpircSteG)
    unless:
      - id: metadata/file/profile/identity::ansible-python-package-path
composite_rules:
  - id: base64-xor-scriptblock-loader
    desc: Base64 plus XOR decoded scriptblock loader
    crit: hostile
    conf: 0.97
    for: [powershell]
    all:
      - id: scriptblock
      - id: micro-behaviors/data/encode/base64::from-base64-string
      - id: objectives/command-and-control/dropper/lnk/remcos::powershell-bxor-op
      - id: call-operator
  - id: base64-decode-to-iex
    desc: PowerShell base64 decode to IEX
    crit: suspicious
    conf: 0.95
    for: [powershell]
    all:
      - id: iex
      - id: micro-behaviors/data/encode/base64::from-base64-string-concat
  - id: base64-xor-decode-to-iex
    desc: PowerShell Base64 XOR decode to IEX
    crit: hostile
    conf: 0.98
    for: [powershell]
    all:
      - id: iex
      - id: micro-behaviors/data/encode/base64::from-base64-string
      - id: micro-behaviors/crypto/symmetric/xor/loop::indexed-bxor-loop
      - id: objectives/anti-static/obfuscation/code-metrics/structure::ps-suspicious-single-line
  - id: base64-rc4-gzip-scriptblock-loader
    desc: PowerShell Base64 RC4 gzip ScriptBlock loader
    crit: hostile
    conf: 0.98
    for: [powershell]
    all:
      - id: micro-behaviors/data/encode/base64::from-base64-string
      - id: micro-behaviors/crypto/symmetric/xor/rotational::rotation-counter-update
      - id: micro-behaviors/data/compress/library::gzip-decompress-to-text
      - id: call-operator-get-command-scriptblock
      - id: objectives/anti-static/obfuscation/code-metrics/structure::ps-suspicious-single-line
  - id: encoded-base64-decode-to-iex
    desc: Encoded PowerShell base64 decode to IEX
    crit: suspicious
    conf: 0.95
    for: [powershell, vbs, html, batch, lnk]
    near_bytes: 4096
    all:
      - id: encoded-iex
      - id: micro-behaviors/data/decode/base64::encoded-dotnet-frombase64string-text
  - id: encoded-base64-decode-to-scriptblock
    desc: Encoded PowerShell base64 decode to ScriptBlock
    crit: suspicious
    conf: 0.95
    for: [powershell, vbs, html, batch, lnk]
    near_bytes: 4096
    all:
      - id: encoded-scriptblock-create
      - id: micro-behaviors/data/decode/base64::encoded-dotnet-frombase64string-text
  # Dynamic code evaluation
  - id: ps-dynamic-eval
    desc: PowerShell dynamic code evaluation
    crit: notable
    conf: 0.8
    any:
      - id: iex
      - id: iex-backtick-obfuscated
      - id: scriptblock
      - id: encoded-iex
      - id: encoded-scriptblock-create
      - id: add-type
      - id: call-operator-gcm-wildcard-iex
      - id: ast-scriptblock-constructor
      - id: ast-getscriptblock-reflection
  - id: ps-encoded-scriptblock-addtype
    desc: PowerShell encoded scriptblock
    crit: hostile
    conf: 0.98
    for: [powershell]
    all:
      - id: iex
      - id: scriptblock
      - id: add-type
      - id: micro-behaviors/data/encode/base64::to-base64-string
