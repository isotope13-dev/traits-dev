# PowerShell Dynamic Execution
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059.001
defaults:
  platforms: [unix, windows]
  for: [powershell, batch, shell]
  mbc: "E1059"
  attack: "T1059.001"
traits:
  - id: iex-backtick-obfuscated
    desc: Backtick-obfuscated IEX alias
    crit: suspicious
    conf: 0.9
    for: [powershell]
    attack: T1027
    mbc: E1027
    if:
      type: text
      substr: "I`E`X"
  - id: encoded-iex
    desc: Encoded Invoke-Expression cmdlet
    crit: suspicious
    conf: 0.9
    for: [powershell, vbs, html, batch, lnk]
    if:
      type: encoded
      encoding: base64
      regex: '(?i)\biex\b|Invoke-Expression'
  - id: encoded-scriptblock-create
    desc: Encoded ScriptBlock.Create execution
    crit: suspicious
    conf: 0.9
    for: [powershell, vbs, html, batch, lnk]
    if:
      type: encoded
      encoding: base64
      regex: '(?i)\[ScriptBlock\]::Create|ScriptBlock\.Create\('
  # IEX string reconstructed from $VerbosePreference ("SilentlyContinue")
  # Used by PowMix and other loaders to hide the literal "Invoke-Expression".
  - id: iex-via-verbose-preference
    desc: IEX rebuilt from $VerbosePreference
    crit: suspicious
    conf: 0.95
    for: [powershell]
    attack: T1027
    mbc: E1027
    if:
      type: text
      regex: \$VerbosePreference(\.[A-Za-z]+\(\))?\s*(\.substring|\[\d+)
      case_insensitive: true
  - id: call-operator-get-command-dynamic
    desc: Dynamic call-operator via Get-Command
    crit: suspicious
    conf: 0.9
    for: [powershell]
    if:
      type: text
      regex: '&\s*\(\s*Get-Command\s+\$[A-Za-z_][A-Za-z0-9_]*\s*\)'
      case_insensitive: true
  - id: wildcard-get-command-iex
    desc: Wildcard lookup resolves IEX
    crit: suspicious
    conf: 0.97
    for: [powershell]
    attack: T1027
    mbc: E1027
    if:
      type: text
      regex: '(?i)Get-Command\s+\*voke-\*pression'
  - id: call-operator-get-command-scriptblock
    desc: Get-Command ScriptBlock invocation
    crit: suspicious
    conf: 0.95
    for: [powershell]
    if:
      type: text
      regex: '&\s*\(\s*(gcm|Get-Command)\s+[A-Za-z0-9_$:-]{3,}\s*\)\.ScriptBlock\b'
      case_insensitive: true
  - id: call-operator-gcm-wildcard-iex
    desc: Wildcard Get-Command resolves IEX
    crit: suspicious
    conf: 0.95
    for: [powershell]
    attack: T1027
    mbc: E1027
    if:
      type: text
      regex: '&\s*\(\s*(gcm|Get-Command)\s+i\*{8,}x\s*\)'
      case_insensitive: true
  - id: ast-scriptblock-constructor
    desc: PowerShell AST scriptblock constructor
    crit: suspicious
    conf: 0.94
    for: [powershell, batch]
    if:
      type: text
      regex: (?i)ParamBloc.{0,16}kAst.{0,120}Na.{0,16}medBlockAst
  - id: ast-getscriptblock-reflection
    desc: Reflected GetScriptBlock invocation
    crit: suspicious
    conf: 0.94
    for: [powershell, batch]
    if:
      type: text
      regex: (?i)(GetScriptBlock|kcolBtpircSteG)
    unless:
      - id: metadata/file/profile/identity::ansible-python-package-path
composite_rules:
  - id: powershell-hex-xor-multi-eval-loader
    desc: PowerShell executes a hex-XOR payload through eval fallbacks
    crit: hostile
    conf: 0.99
    attack: "T1027,T1140,T1059.001"
    mbc: "B0032,C0043,E1059"
    for: [powershell]
    all:
      - id: micro-behaviors/data/encode/payload::powershell-hex-here-string-carrier
      - id: micro-behaviors/crypto/symmetric/xor/loop::repeating-key-indexed-bxor-loader
      - id: micro-behaviors/process/interpreter/eval::powershell-multiple-eval-paths

  - id: c2-polled-command-invoke-expression
    desc: PowerShell invokes commands received from a C2 poller
    crit: hostile
    conf: 0.99
    attack: "T1059.001, T1071.001"
    mbc: "B0030"
    for: [powershell]
    all:
      - id: objectives/command-and-control/backdoor/tasking/poll::ps1-agent-command-polling-backdoor
      - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
  - id: policy-bypassed-remote-script-eval
    desc: Policy-bypassed remote PowerShell evaluation
    crit: hostile
    conf: 0.99
    mbc: "B0030"
    attack: "T1059.001, T1105"
    for: [powershell]
    all:
    - id: micro-behaviors/process/create/flags::powershell-policy-bypass-flag
    - id: objectives/command-and-control/dropper/execution/fileless::ps-restmethod-bare-domain-eval-call
  - id: obfuscated-scriptblock-loader
    desc: Obfuscated PowerShell ScriptBlock loader
    crit: hostile
    conf: 0.99
    for: [powershell]
    all:
      - id: objectives/anti-static/obfuscation/string/anomaly::dense-obfuscated-powershell
      - id: micro-behaviors/process/interpreter/eval::powershell-call-operator
      - id: micro-behaviors/process/interpreter/eval::powershell-scriptblock-constructor
      - id: objectives/anti-static/obfuscation/string/reconstruct::single-char-concat-pattern

  - id: powershell-obfuscated-reflection-scriptblock-loader
    desc: Obfuscated PowerShell payload invokes reflected code
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001,T1129
    mbc: B0032,E1059
    for: [powershell]
    all:
      - id: objectives/anti-static/obfuscation/string/anomaly::powershell-obfuscated-byte-loader
      - id: micro-behaviors/process/interpreter/reflection/runtime::powershell-reflection-method-enumeration
      - id: micro-behaviors/process/interpreter/eval::powershell-scriptblock-constructor-text

  - id: obfuscated-powershell-file-write-dynamic-invoke
    desc: Obfuscated PowerShell decodes and dynamically invokes code while writing a file
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.001
    mbc: B0032,E1059
    for: [powershell, batch]
    scope: file
    all:
      - id: objectives/anti-static/obfuscation/eval/powershell-loader::ps-indexed-charcode-assignment
      - id: objectives/anti-static/obfuscation/eval/powershell-loader::ps-invoke-via-variable
      - id: objectives/anti-static/obfuscation/eval/powershell-loader::ps-charcode-array
      - id: micro-behaviors/fs/write/file/direct::out-file

  - id: obfuscated-powershell-staged-dynamic-eval
    desc: PowerShell dynamically evaluates reconstructed code
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.001
    mbc: B0032,E1059
    for: [powershell, batch]
    all:
      - id: objectives/anti-static/obfuscation/eval/powershell-loader::ps-invoke-via-variable
      - id: objectives/anti-static/obfuscation/eval/powershell-loader::ps-indexed-charcode-assignment

  - id: base64-xor-scriptblock-loader
    desc: Base64 plus XOR decoded scriptblock loader
    crit: hostile
    conf: 0.97
    for: [powershell]
    all:
      - id: micro-behaviors/process/interpreter/eval::powershell-scriptblock-constructor
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/crypto/symmetric/xor/loop::repeating-key-indexed-bxor-loader
      - id: micro-behaviors/process/interpreter/eval::powershell-call-operator
  - id: base64-decode-to-iex
    desc: PowerShell base64 decode to IEX
    crit: suspicious
    conf: 0.95
    for: [powershell]
    all:
      - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
      - id: micro-behaviors/data/decode/base64::from-base64-string-concat
  - id: base64-xor-decode-to-iex
    desc: PowerShell Base64 XOR decode to IEX
    crit: hostile
    conf: 0.98
    for: [powershell]
    all:
      - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/crypto/symmetric/xor/loop::indexed-bxor-loop
      - id: metadata/file/metrics::powershell-long-line
  - id: powershell-remote-wildcard-eval
    desc: PowerShell downloads text and evaluates it through wildcard command resolution
    crit: hostile
    conf: 0.99
    for: [powershell]
    attack: T1105,T1059.001,T1027
    mbc: B0024,E1059,E1027
    all:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-downloadstring
      - id: wildcard-get-command-iex

  - id: powershell-task-xml-remote-eval
    desc: Remote task XML plus wildcard PowerShell eval
    crit: hostile
    conf: 0.99
    for: [powershell]
    attack: T1053.005,T1105,T1059.001
    mbc: F0012,B0024,E1059
    all:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-downloadstring
      - id: micro-behaviors/os/autorun/scheduled::powershell-schtasks-xml-create
      - id: wildcard-get-command-iex
  - id: base64-rc4-gzip-scriptblock-loader
    desc: PowerShell Base64 RC4 gzip ScriptBlock loader
    crit: hostile
    conf: 0.98
    for: [powershell]
    all:
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/crypto/symmetric/xor/rotational::rotation-counter-update
      - id: micro-behaviors/data/compress/library::gzip-decompress-to-text
      - id: call-operator-get-command-scriptblock
      - id: metadata/file/metrics::powershell-long-line
  - id: encoded-base64-decode-to-iex
    desc: Encoded PowerShell base64 decode to IEX
    crit: suspicious
    conf: 0.95
    for: [powershell, vbs, html, batch, lnk]
    near_bytes: 4096
    all:
      - id: encoded-iex
      - id: micro-behaviors/data/decode/base64::encoded-dotnet-frombase64string-text
  - id: encoded-base64-decode-to-scriptblock
    desc: Encoded PowerShell base64 decode to ScriptBlock
    crit: suspicious
    conf: 0.95
    for: [powershell, vbs, html, batch, lnk]
    near_bytes: 4096
    all:
      - id: encoded-scriptblock-create
      - id: micro-behaviors/data/decode/base64::encoded-dotnet-frombase64string-text
  - id: powershell-concatenated-base64-reflection-execution
    desc: PowerShell concatenates Base64 and executes reflected script code
    crit: hostile
    conf: 0.99
    for: [powershell]
    attack: T1027,T1140,T1059.001
    all:
      - id: micro-behaviors/process/interpreter/reflection/runtime::powershell-assembly-method-invoke
      - id: micro-behaviors/process/interpreter/eval::powershell-scriptblock-constructor-text
    any:
      - id: micro-behaviors/data/decode/base64::from-base64-string-concat
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-reflected-split
  - id: powershell-compressed-stage-write-launch
    desc: PowerShell decodes compressed stage and launches it
    crit: hostile
    conf: 0.99
    attack: T1027,T1140,T1059.001
    mbc: B0032,E1059
    for: [powershell]
    all:
      - id: micro-behaviors/data/encode/payload::large-base64-string-literals
      - id: micro-behaviors/process/interpreter/reflection/runtime::powershell-assembly-method-invoke
      - id: micro-behaviors/data/compress/library::gzip-decompress-to-text
      - id: micro-behaviors/fs/write/file/direct::write-all-text
      - id: micro-behaviors/process/create/start-process::start-process-call
    any:
      - id: micro-behaviors/process/create/hidden::start-process-windowstyle-hidden
      - id: micro-behaviors/process/create/shell/interpreter::powershell-executable-token
  # Dynamic code evaluation
  - id: ps-dynamic-eval
    desc: PowerShell dynamic code evaluation
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
      - id: iex-backtick-obfuscated
      - id: micro-behaviors/process/interpreter/eval::powershell-scriptblock-execution
      - id: encoded-iex
      - id: encoded-scriptblock-create
      - id: micro-behaviors/process/interpreter/eval::powershell-add-type
      - id: call-operator-gcm-wildcard-iex
      - id: ast-scriptblock-constructor
      - id: ast-getscriptblock-reflection
  - id: ps-encoded-scriptblock-addtype
    desc: PowerShell encoded scriptblock
    crit: hostile
    conf: 0.98
    for: [powershell]
    all:
      - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
      - id: micro-behaviors/process/interpreter/eval::powershell-scriptblock-execution
      - id: micro-behaviors/process/interpreter/eval::powershell-add-type
      - id: micro-behaviors/data/encode/base64::to-base64-string
  - id: ps-custom-base32-decoded-script-execution
    desc: Custom base32 decoded script execution
    crit: hostile
    conf: 0.99
    for: [powershell]
    all:
      - id: micro-behaviors/data/decode/base32::ps-custom-base32-decoder
      - id: micro-behaviors/process/interpreter/eval::powershell-iex-call

  - id: powershell-http-tasking-command-eval
    desc: PowerShell evaluates commands returned by HTTP tasking
    crit: hostile
    conf: 0.99
    attack: T1071.001,T1059.001
    mbc: B0030
    for: [powershell]
    all:
      - id: objectives/command-and-control/dropper/execution/fileless::ps-c2-register-endpoint
      - id: objectives/command-and-control/dropper/execution/fileless::ps-c2-poll-endpoint
      - id: objectives/command-and-control/dropper/execution/fileless::ps-c2-report-endpoint
      - id: objectives/command-and-control/dropper/execution/fileless::ps-remote-command-response-field
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::request-powershell
      - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
