# Shell/Code Execution - Generic
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059
defaults:
  attack: T1059
  mbc: E1059
  platforms: [linux, unix, macos, android, ios, windows]
traits:
  # === Shell eval atomic indicators ===
  - id: eval-call-shell
    desc: eval() call (shell/js)
    crit: notable
    conf: 0.5
    for: [shell]
    if:
      type: raw
      substr: "eval("
  - id: exec-call-shell
    desc: exec() call (shell/js)
    crit: notable
    conf: 0.5
    for: [shell]
    if:
      type: raw
      substr: "exec("
  # === Python eval atomic indicators ===
  - id: eval-call-python
    desc: eval() call (Python)
    crit: notable
    conf: 0.4
    for: [python]
    if:
      type: raw
      substr: "eval("
  - id: exec-call-python
    desc: exec() call (Python)
    crit: notable
    conf: 0.4
    for: [python]
    if:
      type: raw
      substr: "exec("
  - id: compile-call-python
    desc: compile() call (Python)
    crit: notable
    conf: 0.4
    for: [python]
    if:
      type: ast
      query: "(call\n  function: (identifier) @fn\n  (#eq? @fn \"compile\"))\n"
composite_rules:
  - id: shell-eval
    desc: Dynamic code evaluation
    crit: notable
    conf: 0.66
    for: [shell]
    any:
      - id: eval-call-shell
      - id: exec-call-shell
  - id: python-eval
    desc: Python dynamic code evaluation
    crit: notable
    conf: 0.5
    for: [python]
    any:
      - id: eval-call-python
      - id: exec-call-python
      - id: compile-call-python
