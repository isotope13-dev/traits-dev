# Shell/Code Execution - Generic
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059
defaults:
  attack: T1059
  mbc: E1059
  platforms: [unix, windows]
traits:
  - id: python-runpy-basename
    desc: Python runpy stdlib file
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: basename
      exact: runpy.py
  - id: python-optparse-basename
    desc: Python optparse stdlib file
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: basename
      exact: optparse.py
  # === Shell eval atomic indicators ===
  - id: eval-call-shell
    desc: eval() call (shell/js)
    crit: notable
    conf: 0.5
    for: [shell]
    if:
      type: text
      substr: "eval("
  - id: exec-call-shell
    desc: exec() call (shell/js)
    crit: notable
    conf: 0.5
    for: [shell]
    if:
      type: text
      substr: "exec("
  # === Python eval atomic indicators ===
  - id: eval-call-python
    desc: eval() call (Python)
    crit: baseline
    conf: 0.4
    for: [python]
    if:
      type: ast
      query: "(call\n  function: (identifier) @fn\n  (#eq? @fn \"eval\"))\n"
  - id: exec-call-python
    desc: exec() call (Python)
    crit: baseline
    conf: 0.4
    for: [python]
    if:
      type: ast
      query: "(call\n  function: (identifier) @fn\n  (#eq? @fn \"exec\"))\n"
  - id: compile-call-python
    desc: compile() call (Python)
    crit: baseline
    conf: 0.4
    for: [python]
    if:
      type: ast
      query: "(call\n  function: (identifier) @fn\n  (#eq? @fn \"compile\"))\n"
  - id: python-exec-dunder-import-proximity
    desc: Python exec with nearby __import__
    crit: component
    conf: 0.75
    for: [python]
    if:
      type: text
      regex: '(__import__\s*\([^)\n]{1,160}\)\s*[^)\n]{0,80}\bexec\s*\(|\bexec\s*\([^)\n]{1,160}__import__\s*\()'
composite_rules:
  - id: shell-eval
    desc: Dynamic code evaluation
    crit: notable
    conf: 0.66
    for: [shell]
    any:
      - id: eval-call-shell
      - id: exec-call-shell
  - id: python-eval
    desc: Python dynamic code evaluation
    crit: notable
    conf: 0.5
    for: [python]
    any:
      - id: micro-behaviors/process/interpreter/python::eval-builtin
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: micro-behaviors/process/interpreter/python::compile-builtin
    unless:
      - id: python-runpy-basename
      - id: python-optparse-basename
      - id: metadata/package/testing/presence::python-test-file
      - id: metadata/package/testing/presence::test-directory
  - id: python-exec-dynamic-import
    desc: Python exec with dynamic import
    crit: suspicious
    conf: 0.82
    for: [python]
    all:
      - id: python-exec-dunder-import-proximity
    unless:
      - id: python-runpy-basename
      - id: python-optparse-basename
      - id: metadata/package/testing/presence::python-test-file
      - id: metadata/package/testing/presence::test-directory
