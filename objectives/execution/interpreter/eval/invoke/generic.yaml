# Shell/Code Execution - Generic
# MBC: E1059 (Command and Scripting Interpreter)
# ATT&CK: T1059
defaults:
  attack: T1059
  mbc: E1059
  platforms: [unix, windows]
traits:
- id: python-runpy-basename
  desc: Python runpy stdlib file
  crit: notable
  conf: 0.95
  for: [python]
  if:
    type: path
    basename: true
    exact: runpy.py
- id: python-optparse-basename
  desc: Python optparse stdlib file
  crit: notable
  conf: 0.95
  for: [python]
  if:
    type: path
    basename: true
    exact: optparse.py
composite_rules:
- id: shell-eval
  desc: Dynamic code evaluation
  crit: notable
  conf: 0.66
  for: [shell]
  any:
  - id: micro-behaviors/process/interpreter/eval::shell-eval
  - id: micro-behaviors/process/create/eval::shell-eval
  unless:
  - id: metadata/build/autotools/
  - id: well-known/tool/development/fzf::fzf-binary
- id: python-eval
  desc: Python dynamic code evaluation
  crit: notable
  conf: 0.5
  for: [python]
  any:
  - id: micro-behaviors/process/interpreter/python::eval-builtin
  - id: micro-behaviors/process/interpreter/python::exec-builtin
  - id: micro-behaviors/process/interpreter/python::compile-builtin
  unless:
  - id: python-runpy-basename
  - id: python-optparse-basename
  - id: metadata/library/python-stdlib
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness/
  - id: well-known/lib/scikit-learn
  - id: well-known/lib/psutil/
- id: python-exec-dynamic-import
  desc: Python exec with dynamic import
  crit: notable
  conf: 0.82
  for: [python]
  all:
  - id: python-exec-dunder-import-proximity
  unless:
  - id: python-runpy-basename
  - id: python-optparse-basename
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness/
  - id: metadata/library/pywin32::pywin32-binding-module
  - id: well-known/lib/scikit-learn
  - id: well-known/lib/psutil/
  - id: well-known/app/simba-ai::benchmark-temporal-codegen
  - id: well-known/app/skypilot::skypilot-source-file
- id: python-exec-dunder-import-proximity
  desc: Python exec with nearby __import__
  crit: component
  conf: 0.75
  for: [python]
  near_lines: 20
  all:
  - id: micro-behaviors/process/interpreter/python::dunder-import-call
  - id: micro-behaviors/process/interpreter/python::exec-builtin
  unless:
  - id: well-known/app/simba-ai::benchmark-temporal-codegen
  - id: well-known/lib/tornado/
