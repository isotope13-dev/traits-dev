# Remote Code Evaluation - PHP
# Detects eval() on data fetched from external sources
# ATT&CK: T1059.001, T1505.003
# Classic memory webshell and backdoor pattern
defaults:
  platforms: [windows, unix]
  for: [php]
  attack: "T1059.001"
  mbc: "E1059"
traits:
  - id: eval-file-get-contents
    desc: eval of file_get_contents result
    crit: suspicious
    conf: 0.95
    attack: "T1505.003"
    if:
      type: text
      regex: eval\s*\(.{0,60}file_get_contents\s*\(
    unless:
      - id: metadata/package/testing/harness/unit/
  - id: eval-error-suppressed
    desc: Error-suppressed eval (@eval)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '@eval\s*\('
    unless:
      - id: well-known/app/egroupware/
  - id: create-function-junk-injected
    desc: create_function name with embedded junk chars
    crit: suspicious
    conf: 0.95
    attack: T1027.010
    if:
      type: string_literal
      regex: cr\w{3,}ate_\w{3,}nction
  - id: ob-start-eval-capture
    desc: ob_start wrapping eval to capture output
    crit: suspicious
    conf: 0.9
    attack: T1505.003
    if:
      type: string_literal
      regex: ob_s\w*t\w*art.{0,60}e\w*val
  - id: eval-gz-b64-chain-in-string
    desc: 'eval)) chain embedded in code string'
    crit: suspicious
    conf: 0.92
    attack: T1059.004
    if:
      type: string_literal
      regex: e\w*val.{0,30}gz\w*un\w*compress
composite_rules:
  - id: remote-code-eval
    desc: "PHP eval of remotely-fetched code"
    crit: suspicious
    conf: 0.95
    attack: "T1505.003"
    size_max: 500000
    all:
      - id: micro-behaviors/process/interpreter/eval::eval-symbol
      - id: micro-behaviors/fs/read/file::file-get-contents
