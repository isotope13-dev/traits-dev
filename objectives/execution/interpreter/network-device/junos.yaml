defaults:
  platforms: [junos, appliance]
  for: [ruby]
  attack: T1059

traits:
  - id: ruby-netconf-client-open
    desc: Ruby NETCONF client open
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Netconf::Client\.open[\s\S]{0,260}transport:\s*:ssh'
  - id: ruby-netconf-command-rpc
    desc: Ruby NETCONF command RPC
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Netconf::Element\.new\("command"\)[\s\S]{0,220}client\.send_message'
  - id: ruby-netconf-edit-config
    desc: Ruby NETCONF edit-config
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Netconf::Element\.new\("edit-config"\)[\s\S]{0,260}client\.commit'
  - id: ruby-junos-rpc-targets
    desc: Ruby Junos RPC target set
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'system-information[\s\S]{0,900}software-information[\s\S]{0,900}interface-information'

composite_rules:
  - id: ruby-junos-netconf-rpc
    desc: Ruby Junos NETCONF RPC
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-netconf-client-open
      - id: ruby-netconf-command-rpc
    any:
      - id: ruby-netconf-edit-config
      - id: ruby-junos-rpc-targets
