defaults:
  platforms: [iosxe, appliance, windows]
  for: [ruby, kotlin, java, jar, class, java_class, batch]
  attack: T1059

traits:
  - id: iosxe-restconf-exec-endpoint
    desc: IOS-XE RESTCONF exec endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: /restconf/operations/(exec|cli)

  - id: iosxe-restconf-yang-json
    desc: IOS-XE RESTCONF YANG JSON header
    crit: component
    conf: 0.9
    if:
      type: text
      substr: application/yang-data+json

  - id: iosxe-cli-config-command
    desc: IOS-XE CLI config command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(configure terminal|show running-config|write memory)\b'

  - id: iosxe-restconf-native-tree
    desc: IOS-XE native RESTCONF tree
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Cisco-IOS-XE-native:native

  - id: jvm-iosxe-restconf-cli-const
    desc: JVM IOS-XE RESTCONF CLI const
    crit: suspicious
    conf: 0.93
    for: [jar, class, java_class, zip]
    if:
      type: hex
      pattern: 2F 72 65 73 74 63 6F 6E 66 2F 6F 70 65 72 61 74 69 6F 6E 73 2F 63 6C 69

  - id: jvm-iosxe-native-const
    desc: JVM IOS-XE native tree const
    crit: component
    conf: 0.9
    for: [jar, class, java_class, zip]
    if:
      type: hex
      pattern: 43 69 73 63 6F 2D 49 4F 53 2D 58 45 2D 6E 61 74 69 76 65 3A 6E 61 74 69 76 65

composite_rules:
  - id: iosxe-restconf-cli-execution
    desc: IOS-XE RESTCONF CLI execution
    crit: hostile
    conf: 0.97
    all:
      - id: iosxe-restconf-exec-endpoint
      - id: iosxe-cli-config-command
    any:
      - id: iosxe-restconf-yang-json
      - id: iosxe-restconf-native-tree
      - id: micro-behaviors/communications/http/post::jvm-http-body-write-source
      - id: micro-behaviors/communications/http/post::jvm-bytecode-outputstream-write

  - id: jvm-iosxe-restconf-cli-execution
    desc: JVM IOS-XE RESTCONF CLI exec
    crit: hostile
    conf: 0.97
    for: [jar, class, java_class, zip]
    all:
      - id: jvm-iosxe-restconf-cli-const
    any:
      - id: jvm-iosxe-native-const
      - id: micro-behaviors/communications/http/post::jvm-bytecode-outputstream-write
