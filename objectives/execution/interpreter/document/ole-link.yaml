defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1204.002

traits:
  - id: stdolelink-dangerous-clsid
    desc: StdOleLink external-link COM class
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: office.dangerous_clsids[*].clsid
      exact: "00000300-0000-0000-c000-000000000046"

  - id: wide-http-numeric-host-url
    desc: UTF-16 HTTP numeric-host URL
    crit: notable
    conf: 0.97
    attack: T1105
    if:
      type: raw
      regex: 'h\x00t\x00t\x00p\x00(s\x00)?:\x00/\x00/\x00([0-9]\x00){9,24}/\x00'
      case_insensitive: true

  - id: wide-base64-php-path
    desc: UTF-16 base64-like PHP path
    crit: component
    conf: 0.99
    if:
      type: raw
      regex: '/\x00([A-Za-z0-9+/]\x00){32,256}\.\x00p\x00h\x00p\x00'
      case_insensitive: true

  - id: wide-http-hex-host-url
    desc: UTF-16 HTTP URL with hexadecimal host
    crit: notable
    conf: 0.98
    attack: T1105
    if:
      type: hex
      pattern: '68 00 74 00 74 00 70 00 3A 00 2F 00 2F 00 30 00 78 00'

composite_rules:
  - id: wide-numeric-host-base64-php-url
    desc: Numeric-host URL carries a base64-like redirect
    crit: suspicious
    conf: 0.99
    attack: T1027
    all:
      - id: wide-http-numeric-host-url
      - id: wide-base64-php-path
    near_bytes: 700

  - id: stdolelink-obfuscated-remote-execution
    desc: StdOleLink directs Office to an obfuscated remote HTTP resource
    crit: hostile
    conf: 0.995
    all:
      - id: stdolelink-dangerous-clsid
      - id: wide-http-numeric-host-url
      - id: wide-numeric-host-base64-php-url

  - id: stdolelink-vba-remote-loader
    desc: VBA-bearing OLE document contains a StdOleLink to a numeric-host HTTP resource
    crit: hostile
    conf: 0.99
    attack: "T1105,T1204.002"
    all:
      - id: stdolelink-dangerous-clsid
      - id: wide-http-numeric-host-url
      - id: metadata/document/ole::vba-project-metadata

  - id: stdolelink-vba-hex-http-payload
    desc: VBA-bearing StdOleLink document targets a hex-host HTTP URL
    crit: hostile
    conf: 0.995
    attack: "T1105,T1204.002"
    all:
      - id: stdolelink-dangerous-clsid
      - id: metadata/document/ole::ole-vba-macro-count
      - id: metadata/document/ole::ole-vba-project-stream
      - id: wide-http-hex-host-url

  - id: encrypted-stdolelink-vba-hex-http-payload
    desc: Encrypted VBA-bearing StdOleLink targets a hex-host HTTP URL
    crit: hostile
    conf: 0.995
    attack: "T1027,T1105,T1204.002"
    all:
      - id: stdolelink-vba-hex-http-payload
      - id: metadata/document/ole::ole-encryption-feature
