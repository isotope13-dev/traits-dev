defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1204.002

traits:
  - id: stdolelink-dangerous-clsid
    desc: OLE document contains StdOleLink CLSID
    crit: component
    conf: 0.95
    if:
      type: value
      path: office.dangerous_clsids[*].clsid
      exact: "00000300-0000-0000-c000-000000000046"

composite_rules:
  - id: stdolelink-vba-execution-surface
    desc: OLE external link paired with VBA metadata
    crit: hostile
    conf: 0.97
    all:
      - id: stdolelink-dangerous-clsid
      - id: metadata/document/ole::vba-project-metadata
    any:
      - id: metadata/document/office/container::compobj-claims-excel
      - id: metadata/document/office/container::basename-xls-extension
