defaults:
  platforms: [windows]
  for: [oledoc, ooxml]
  attack: T1059.005

composite_rules:
  - id: auto-open-vba-process-execution
    desc: Auto-open VBA process execution
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/macro/office::raw-auto-open-entrypoint
      - id: micro-behaviors/process/create/shell/lang::vba-windows-shell-run
