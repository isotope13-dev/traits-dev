# RTF DDE-execution composites.
#
# Atomic field-instruction detections live in
# `metadata/document/rtf/properties/traits.yaml`. These composites
# combine kind + target evidence to express attacker intent at
# `hostile`. DDEAUTO firing a shell command line on document open is
# the canonical CVE-2017-0199 / DDE-zero-day vector.
defaults:
  for: [rtf]
  platforms: [windows]

composite_rules:
  # DDEAUTO + shell-invoking target = direct command execution on
  # open. No legitimate use of DDEAUTO with cmd.exe/powershell.
- id: rtf-ddeauto-shell-execution
  desc: RTF DDEAUTO shell command execution
  crit: hostile
  conf: 0.98
  attack: T1559.002
  all:
  - id: metadata/document/rtf/properties::rtf-field-ddeauto
  any:
  - id: metadata/document/rtf/properties::rtf-field-target-cmd-or-script
  - id: metadata/document/rtf/properties::rtf-field-target-living-off-the-land
- id: rtf-template-injection-remote
  desc: RTF template injection via remote field target
  crit: hostile
  conf: 0.96
  attack: T1221
  all:
  - id: metadata/document/rtf/properties::rtf-field-target-remote-url
  any:
  - id: metadata/document/rtf/properties::rtf-field-includetext
  - id: metadata/document/rtf/properties::rtf-field-import
