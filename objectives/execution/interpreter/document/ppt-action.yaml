# PowerPoint action-driven execution composites.
#
# PPT supports several click/hover-action verbs that fire macros or
# launch external programs. The atomic detections live in
# `micro-behaviors/process/create/macro/office/ppt.yaml`; this file
# combines them with VBA presence to express attacker intent at
# `hostile` (which RULES.md reserves for the `objectives/` tier).
defaults:
  for: [documents]
  platforms: [windows, macos]
  attack: T1204.002

composite_rules:
  # `ppaction://program` plus a VBA macro project = explicit
  # external-payload execution path. CVE-2017-0199 /
  # CVE-2014-4114 family of PPT droppers.
  - id: ppt-program-action-with-macros
    desc: PowerPoint program action with VBA macros
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/document/office/macro::ppt-vba-document
      - id: micro-behaviors/process/create/macro/office::ppt-custom-action-program

  # Mouseover-action fires without a click — used by Zusy / Trickbot
  # PPT droppers ("hover here to view content"). High-precision
  # signal when combined with VBA presence.
  - id: ppt-mouseover-with-macros
    desc: PowerPoint mouseover action with VBA macros
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/document/office/macro::ppt-vba-document
      - id: micro-behaviors/process/create/macro/office::ppt-mouseover-action
