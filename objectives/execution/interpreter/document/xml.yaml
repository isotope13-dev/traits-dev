defaults:
  platforms: [unix]
  for: [xml]
  attack: T1059.004
  mbc: E1203

traits:
  - id: xml-processbuilder-bean-start
    desc: XML bean starts ProcessBuilder
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: '<bean[^>]{1,160}java\.lang\.ProcessBuilder[^>]{1,160}init-method\s*=\s*["'']start["'']'

  - id: xml-shell-command-argv
    desc: XML bean supplies shell command arguments
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: '<value>\s*(sh|bash)\s*</value>[\s\S]{0,100}<value>\s*-c\s*</value>'

  - id: xml-shell-remote-fetch
    desc: XML value contains curl or wget fetch
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '<value>.{0,120}(curl|wget).{0,120}https?://.{1,120}</value>'

  - id: xml-shell-world-writable-mode
    desc: XML value contains chmod 777 command
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '<value>.{0,120}\bchmod\s+0?777\s+.{1,80}</value>'

  - id: xml-shell-local-binary-exec
    desc: XML value contains local binary invocation
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '<value>.{0,120}\./[A-Za-z0-9._-]{2,40}(\s|<|;)'

composite_rules:
  - id: spring-xml-shell-execution
    desc: Spring XML launches shell command
    crit: suspicious
    conf: 0.98
    all:
      - id: xml-processbuilder-bean-start
      - id: xml-shell-command-argv

  - id: spring-xml-remote-native-dropper
    desc: Spring XML downloads and executes native payload
    crit: hostile
    conf: 0.99
    attack: T1059.004,T1105,T1222.002
    all:
      - id: spring-xml-shell-execution
      - id: xml-shell-remote-fetch
      - id: xml-shell-world-writable-mode
      - id: xml-shell-local-binary-exec
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
    near_bytes: 280
