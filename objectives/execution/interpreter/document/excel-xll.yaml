defaults:
  platforms: [windows]
  for: [dll]
  attack: "T1218"
  crit: suspicious
  conf: 0.9

traits:
- id: exceldna-loader-class
  desc: ExcelDNA loader class reference
  conf: 0.96
  if:
    type: text
    substr: ExcelDna.Loader

- id: exceldna-resource-name
  desc: ExcelDNA resource section name
  conf: 0.98
  if:
    type: text
    substr: EXCELDNA.LOADER

- id: exceldna-integration-resource
  desc: ExcelDNA integration resource reference
  conf: 0.97
  if:
    type: text
    exact: EXCELDNA.INTEGRATION

- id: exceldna-xlldna-resource
  desc: ExcelDNA XLLDNA resource marker
  conf: 0.97
  if:
    type: text
    exact: XLLDNA

- id: exceldna-xlmain-resource
  desc: ExcelDNA XLMAIN entry resource
  crit: component
  conf: 0.95
  if:
    type: text
    exact: XLMAIN

- id: exceldna-assembly-lzma
  desc: ExcelDNA LZMA-compressed assembly resource
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: ASSEMBLY_LZMA

- id: exceldna-dna-library-marker
  desc: ExcelDNA DNA library XML marker
  conf: 0.96
  if:
    type: text
    substr: "<DnaLibrary"

- id: exceldna-dna-extension
  desc: ExcelDNA configuration file extension
  crit: component
  conf: 0.8
  if:
    type: text
    exact: ".dna"

- id: exceldna-pdb-path
  desc: ExcelDNA loader PDB build path
  crit: component
  conf: 0.99
  if:
    type: text
    substr: "Excel-DNA\\ExcelDna\\Source"

- id: xll-numbered-exports
  desc: XLL-style numbered function stub exports
  crit: component
  conf: 0.92
  if:
    type: symbol
    regex: ^f[0-9]{1,4}$

composite_rules:
- id: xll-injector-with-embedded-workbook-launch
  desc: Excel XLL injector drops and opens embedded workbook
  crit: hostile
  conf: 0.99
  mbc: B0033
  attack: T1055,T1027.009,T1106
  for: [pe, dll]
  all:
  - id: objectives/evasion/process/injection/syscall::xll-native-nt-remote-thread-injector
  - id: micro-behaviors/data/embedded/payload/archive::zip-locals-in-data-pe
  - id: micro-behaviors/fs/file/write/direct::write-file
  - id: micro-behaviors/process/create/shell/spawn::win-shellexecute
- id: exceldna-xll-loader
  desc: ExcelDNA framework used to load .NET payload via Excel XLL
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/process/create/macro/office::xll-auto-open
  - id: exceldna-resource-name
  any:
  - id: exceldna-loader-class
  - id: exceldna-xlldna-resource
  - id: exceldna-integration-resource
  - id: exceldna-assembly-lzma
  - id: exceldna-dna-library-marker
  - id: exceldna-dna-extension
  - id: exceldna-pdb-path
- id: exceldna-lzma-payload
  desc: ExcelDNA XLL with LZMA-compressed .NET payload in resources
  crit: hostile
  conf: 0.99
  all:
  - id: exceldna-assembly-lzma
  - id: micro-behaviors/process/create/macro/office::xll-auto-open
  - id: metadata/binary/framework::dotnet-metadata

- id: xll-numbered-stub-flood
  desc: XLL with massive numbered stub export table
  crit: suspicious
  conf: 0.95
  all:
  - id: metadata/binary/metrics/threshold::many-exports-1000
  - id: xll-numbered-exports
  - id: micro-behaviors/process/create/macro/office::xll-auto-open
