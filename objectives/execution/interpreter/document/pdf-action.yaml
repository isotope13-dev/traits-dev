# PDF action-driven execution composites.
#
# Atomic action / target / structural detections live in
# `metadata/document/pdf/properties/traits.yaml`. This file combines
# them into hostile composites expressing attacker intent — JavaScript
# auto-execute via OpenAction, Launch with shell command, embedded-
# executable dropper, JBIG2 vulnerability surface.
defaults:
  for: [pdf]
  platforms: [windows, macos, linux]
  attack: T1204.001

composite_rules:
  # OpenAction + JavaScript = code executes when the document opens.
  # Combined with a suspicious JS API like `unescape` / `fromCharCode`
  # this is the classic exploit-PDF / heap-spray pattern.
- id: pdf-openaction-javascript-suspicious
  desc: PDF OpenAction with suspicious JavaScript
  crit: hostile
  conf: 0.96
  all:
  - id: metadata/document/pdf/properties::pdf-has-openaction
  - id: metadata/document/pdf/properties::pdf-action-javascript
  any:
  - id: metadata/document/pdf/properties::pdf-js-fromcharcode
  - id: metadata/document/pdf/properties::pdf-js-unescape
- id: pdf-launch-shell-execution
  desc: PDF Launch action invokes shell command
  crit: hostile
  conf: 0.97
  all:
  - id: metadata/document/pdf/properties::pdf-action-launch
  any:
  - id: metadata/document/pdf/properties::pdf-launch-target-cmd
  - id: metadata/document/pdf/properties::pdf-launch-target-shell
- id: pdf-embedded-executable-dropper
  desc: PDF embeds executable with action
  crit: hostile
  conf: 0.96
  all:
  - id: metadata/document/pdf/properties::pdf-action-launch
  any:
  - id: metadata/document/pdf/properties::pdf-embedded-native-executable
  - id: metadata/document/pdf/properties::pdf-embedded-script-payload
  - id: metadata/document/pdf/properties::pdf-embedded-jar-payload
- id: pdf-xfa-javascript-exploit-surface
  desc: PDF XFA form with auto-executed or suspicious JavaScript
  crit: suspicious
  conf: 0.93
  all:
  - id: metadata/document/pdf/properties::pdf-has-xfa
  - id: metadata/document/pdf/properties::pdf-action-javascript
  any:
  - id: metadata/document/pdf/properties::pdf-has-openaction
  - id: metadata/document/pdf/properties::pdf-js-fromcharcode
  - id: metadata/document/pdf/properties::pdf-js-unescape
  - id: metadata/document/pdf/properties::pdf-js-eval-call
  unless:
  - id: well-known/lib/pdfium::source-tree
