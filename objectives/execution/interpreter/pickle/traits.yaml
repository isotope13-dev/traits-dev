defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [pickle]
  attack: T1059.006
  mbc: E1059
traits:
  # === Code execution references ===
  - id: os-system
    desc: Pickle references os.system
    crit: suspicious
    conf: 0.99
    if:
      type: symbol
      exact: os.system
  - id: os-popen
    desc: Pickle references os.popen
    crit: suspicious
    conf: 0.99
    if:
      type: symbol
      exact: os.popen
  - id: subprocess-popen
    desc: Pickle references subprocess.Popen
    crit: suspicious
    conf: 0.99
    if:
      type: symbol
      exact: subprocess.Popen
  - id: subprocess-call
    desc: Pickle references subprocess.call
    crit: suspicious
    conf: 0.99
    if:
      type: symbol
      exact: subprocess.call
  - id: builtins-exec
    desc: Pickle references builtins.exec
    crit: suspicious
    conf: 0.99
    if:
      type: symbol
      exact: builtins.exec
  - id: builtins-eval
    desc: Pickle references builtins.eval
    crit: suspicious
    conf: 0.99
    if:
      type: symbol
      exact: builtins.eval
  - id: nt-system
    desc: Pickle references nt.system
    crit: suspicious
    conf: 0.99
    if:
      type: symbol
      exact: nt.system
  - id: posix-system
    desc: Pickle references posix.system
    crit: suspicious
    conf: 0.99
    if:
      type: symbol
      exact: posix.system
  # === Network access ===
  - id: urllib-urlopen
    desc: Pickle references urlopen
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      substr: urlopen
  - id: socket-socket
    desc: Pickle references socket.socket
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: socket.socket
  - id: requests-module
    desc: Pickle references requests module
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      substr: requests.
  - id: webbrowser-open
    desc: Pickle references webbrowser.open
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: webbrowser.open
  # === Native code loading ===
  - id: ctypes-cdll
    desc: Pickle loads native library via ctypes
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      substr: ctypes.CDLL
  - id: ctypes-windll
    desc: Pickle loads Windows DLL via ctypes
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      substr: ctypes.windll
  # === Dynamic import / object construction ===
  - id: importlib-import
    desc: Pickle references importlib.import_module
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: importlib.import_module
  - id: builtins-getattr
    desc: Pickle references builtins.getattr
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: builtins.getattr
  - id: codecs-decode
    desc: Pickle references codecs.decode
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      exact: codecs.decode
  # === Destructive operations ===
  - id: shutil-rmtree
    desc: Pickle references shutil.rmtree
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: shutil.rmtree
  - id: os-remove
    desc: Pickle references os.remove
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: os.remove
composite_rules:
  - id: pickle-rce
    desc: Pickle with code execution and object construction
    crit: hostile
    conf: 0.99
    all:
      - id: builtins-getattr
    any:
      - id: os-system
      - id: os-popen
      - id: subprocess-popen
      - id: subprocess-call
      - id: builtins-exec
      - id: builtins-eval
      - id: nt-system
      - id: posix-system
      - id: urllib-urlopen
      - id: ctypes-cdll
      - id: ctypes-windll
      - id: shutil-rmtree
  - id: pickle-suspicious-globals
    desc: Pickle with multiple suspicious callables
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: os-system
      - id: os-popen
      - id: subprocess-popen
      - id: subprocess-call
      - id: builtins-exec
      - id: builtins-eval
      - id: nt-system
      - id: posix-system
      - id: urllib-urlopen
      - id: socket-socket
      - id: requests-module
      - id: ctypes-cdll
      - id: ctypes-windll
      - id: importlib-import
      - id: codecs-decode
