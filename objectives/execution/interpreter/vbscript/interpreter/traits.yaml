defaults:
  attack: T1059.005
  for: [scripts, binaries]
  platforms:
    - windows
traits:
  - id: wscript-createobject-dup
    desc: WScript.CreateObject call
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'WScript\.CreateObject\s*\('
  - id: wscript-shell-run-create
    desc: WScript.Shell creates launched process
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'CreateObject.{0,30}WScript\.Shell[\s\S]{0,240}\.(Run|Exec)\b'
  - id: wscript-run
    desc: WScript Run method
    crit: notable
    conf: 0.75
    # Bare `.run "..."` is ubiquitous in shell/Python installer text (e.g.
    # `nvidia-grid.run "..."`). Restrict to WSH script hosts where `.Run` is
    # the WScript.Shell method rather than a filename suffix.
    for: [vbs, html, batch]
    if:
      type: text
      regex: '(?i)\.run\s+[''"]|dIon\.run'
  - id: vbs-powershell-launch
    desc: VBScript launching PowerShell
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    for: [vbs, html, text]
    if:
      type: text
      regex: '(?i)(WScript|\.run\s|\.run\(|run\s*\(?\s*[''"]).{0,80}\bpowershell(\.exe)?\b'
    not:
      - substr: "run 'Connect-AzAccount' from PowerShell"
    unless:
      - id: metadata/binary/resource/
      - id: metadata/binary/resource/
      - id: metadata/binary/resource::resources-dll-extension
      - id: well-known/tool/detection/ai-guardrail/
  - id: vbs-mid-power-slice
    desc: VBScript Mid power slice
    crit: suspicious
    conf: 0.88
    attack: T1059.001
    for: [vbs, html, scripts, text]
    if:
      type: text
      regex: '(?i)Mid\s*\([^)]{0,60}power[^)]{0,20}\)'
    unless:
      - id: metadata/library/generated::sphinx-searchindex-js
      - id: metadata/package/documentation::documentation-dir-path
  - id: vbs-shell-concat-fragment
    desc: VBScript shell concat fragment
    crit: component
    conf: 0.88
    attack: T1059.001
    for: [vbs, html, scripts, text]
    if:
      type: text
      regex: '(?i)(^|[^&])&\s*\(?\s*["'']shell["'']'
  - id: vbs-powershell-hidden-bypass
    desc: VBScript hidden PowerShell bypass
    crit: suspicious
    conf: 0.96
    attack: T1059.001
    for: [vbs]
    if:
      type: text
      regex: powershell.{0,40}-w hidden.{0,80}-ExecutionPolicy Bypass
  - id: vbs-powershell-env-iex
    desc: VBScript PowerShell env IEX
    crit: suspicious
    conf: 0.97
    attack: T1059.001
    for: [vbs]
    if:
      type: text
      regex: IEX\s+\$env:[A-Za-z_][A-Za-z0-9_]{3,40}
  - id: vbs-hidden-exec
    desc: VBScript hidden execution (0, True)
    crit: suspicious
    conf: 0.85
    for: [vbs]
    unless:
      - id: metadata/file/string/identity::windows-safe-mode-toggle-script
      - id: well-known/tool/development/agents-live::run-hidden-wrapper-tool
    if:
      type: text
      regex: '(?i)\.run\s+[^,]{1,120},\s*0\s*,\s*true'
  - id: vbs-hidden-async-run
    desc: Hidden asynchronous WSH command
    crit: notable
    conf: 0.94
    attack: T1059.001
    for: [vbs]
    if:
      type: text
      regex: '(?i)\.run\s+[^,\r\n]{1,240},\s*0\s*,\s*(false|0)\b'
  - id: vbs-execute-dynamic
    desc: VBScript Execute/ExecuteGlobal dynamic eval
    crit: suspicious
    conf: 0.85
    for: [vbs, html]
    if:
      type: text
      regex: '(?i)(^|[\n:])\s*Execute(Global)?\s*\('
    unless:
      - id: well-known/lib/deb-package::firefox-omni-basename
      - id: metadata/package/quality/recognized-contexts-extra::hashed-text-record
  - id: wscript-host-exec
    desc: Windows Script Host execution reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\b[wc]script\.exe\b'

composite_rules:
  - id: wscript-shell-exec
    desc: WScript.Shell execution pattern
    crit: notable
    conf: 0.85
    any:
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-createobject-dup
      - id: wscript-shell-run-create
  - id: vbs-powershell-launcher
    desc: VBScript WScript.Shell launcher
    crit: notable
    conf: 0.95
    all:
      - id: wscript-shell-exec
      - id: wscript-run
  - id: vbs-split-powershell-launch
    desc: VBScript split PowerShell launch
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    for: [vbs, html, scripts, text]
    all:
      - id: vbs-mid-power-slice
      - id: vbs-shell-concat-fragment
  - id: vbs-hidden-wscript-launcher
    desc: Hidden VBScript WScript.Shell launcher
    crit: hostile
    conf: 0.98
    all:
      - id: vbs-powershell-launcher
      - id: objectives/execution/wmi::wmi-showwindow-hidden-property
  - id: vbs-hidden-split-powershell-runner
    desc: Hidden split PowerShell runner
    crit: hostile
    conf: 0.96
    attack: T1059.001
    for: [vbs, html, scripts, text]
    all:
      - id: vbs-split-powershell-launch
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-hidden-run
      - id: vbs-execute-dynamic
  - id: vbs-hidden-env-powershell-launcher
    desc: VBScript launches hidden env PowerShell
    crit: hostile
    conf: 0.98
    attack: T1059.001
    for: [vbs]
    all:
      - id: vbs-powershell-hidden-bypass
      - id: vbs-powershell-env-iex
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
  - id: vbs-hidden-async-powershell-launcher
    desc: Hidden async policy-bypassed PowerShell
    crit: hostile
    conf: 0.98
    attack: T1059.001,T1059.005,T1564.003
    for: [vbs]
    all:
      - id: vbs-powershell-launch
      - id: wscript-shell-run-create
      - id: vbs-hidden-async-run
      - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass
  - id: vbs-hidden-split-powershell-xor-loader
    desc: Hidden split PowerShell XOR loader
    crit: hostile
    conf: 0.98
    attack: T1059.005,T1059.001,T1027
    for: [vbs]
    all:
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-hidden-powershell-xor-loader
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
  - id: vbs-hidden-obfuscated-payload-runner
    desc: Hidden obfuscated VBScript payload runner
    crit: hostile
    conf: 0.98
    all:
      - id: vbs-hidden-async-run
      - id: objectives/anti-static/obfuscation/multi-layer::vbs-chunked-base64-payload-table
      - id: micro-behaviors/os/env/access::wsh-vbs-environment-method
  - id: vbs-obfuscated-dynamic-payload
    desc: Obfuscated VBScript dynamically evaluates payload
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005
    for: [vbs]
    all:
      - id: micro-behaviors/data/encode/char-code::dense-chr-construction
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-execute-dynamic
  - id: vbs-arithmetic-dynamic-payload
    desc: Arithmetic-rebuilt VBScript payload execution
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005
    for: [vbs]
    all:
      - id: micro-behaviors/data/encode/char-code::arithmetic-chr-reconstruction
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-execute-dynamic
