defaults:
  attack: T1059.005
  for: [scripts, binaries]
  platforms:
    - windows
traits:
  - id: wscript-createobject-dup
    desc: WScript.CreateObject call
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'WScript\.CreateObject\s*\('
  - id: wscript-shell-create
    desc: WScript.Shell object creation
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'CreateObject.{0,30}WScript\.Shell'
  - id: wscript-run
    desc: WScript Run method
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?i)\.run\s+[''"]|dIon\.run'
  - id: set-vbscript
    desc: VBScript Set statement
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '^Set\s+\w+\s*=|\nSet\s+\w+'
  - id: dim-vbscript
    desc: VBScript Dim statement
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: '\bDim\s+\w+'
    not:
      - substr: Display Dim
    unless:
      - id: metadata/lang/compiler/source::vb6-project-file
      - id: metadata/lang/compiler/source::vb6-form-source
      - id: metadata/lang/compiler/source::vb6-module-source
  - id: vbs-powershell-launch
    desc: VBScript launching PowerShell
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    if:
      type: text
      regex: '(?i)(WScript|\.run|run\s*\(?\s*[''"]).{0,80}\bpowershell(?:\.exe)?\b'
  - id: vbs-hidden-exec
    desc: VBScript hidden execution (0, True)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(?i)\.run\s+[^,]{1,120},\s*0\s*,\s*true'
  - id: vbs-execute-dynamic
    desc: VBScript Execute/ExecuteGlobal dynamic eval
    crit: suspicious
    conf: 0.85
    for: [vbs]
    if:
      type: text
      regex: '(?i)(^|[\n:])\s*Execute(?:Global)?\s*\('
  - id: wscript-host-exec
    desc: Windows Script Host execution reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\b[wc]script\.exe\b'

composite_rules:
  - id: wscript-shell-exec
    desc: WScript.Shell execution pattern
    crit: notable
    conf: 0.85
    any:
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-createobject-dup
      - id: wscript-shell-create
  - id: vbs-powershell-launcher
    desc: VBScript PowerShell launcher
    crit: suspicious
    conf: 0.95
    all:
      - id: wscript-shell-exec
      - id: wscript-run
