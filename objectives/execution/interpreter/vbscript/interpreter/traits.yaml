defaults:
  attack: T1059.005
  platforms:
    - windows
traits:
  - id: wscript-createobject-dup
    desc: WScript.CreateObject call
    crit: notable
    conf: 0.8
    for:
      - all
    if:
      type: string
      regex: WScript\.CreateObject\s*\(
  - id: wscript-shell-create
    desc: WScript.Shell object creation
    crit: notable
    conf: 0.85
    for:
      - all
    if:
      type: string
      regex: CreateObject.{0,30}WScript\.Shell
  - id: wscript-run
    desc: WScript Run method
    crit: notable
    conf: 0.75
    for:
      - all
    if:
      type: string
      regex: \.run\s+['"]|dIon\.run
      case_insensitive: true
  - id: set-vbscript
    desc: VBScript Set statement
    crit: notable
    conf: 0.6
    for:
      - all
    if:
      type: string
      regex: ^Set\s+\w+\s*=|\nSet\s+\w+
  - id: dim-vbscript
    desc: VBScript Dim statement
    crit: notable
    conf: 0.5
    for:
      - all
    if:
      type: string
      regex: \bDim\s+\w+
  - id: vbs-powershell-launch
    desc: VBScript launching PowerShell
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    for:
      - all
    if:
      type: string
      regex: WScript.{0,50}powershell|run.{0,50}powershell.{0,30}-[eE]nc
      case_insensitive: true
  - id: vbs-hidden-exec
    desc: VBScript hidden execution (0, True)
    crit: suspicious
    conf: 0.85
    for:
      - all
    if:
      type: string
      regex: \.run\s+[^,]{1,120},\s*0,\s*True|\.run\s+[^,]{1,120},\s*0\s*,\s*true
      case_insensitive: true
composite_rules:
  - id: wscript-shell-exec
    desc: WScript.Shell execution pattern
    crit: notable
    conf: 0.85
    attack: T1059.005
    any:
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-createobject-dup
      - id: wscript-shell-create
  - id: vbs-powershell-launcher
    desc: VBScript PowerShell launcher
    crit: suspicious
    conf: 0.95
    attack: T1059.005
    all:
      - id: wscript-shell-exec
      - id: wscript-run
