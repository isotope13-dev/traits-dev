defaults:
  attack: T1059.005
  for: [scripts, binaries]
  platforms:
    - windows
traits:
  - id: wscript-createobject-dup
    desc: WScript.CreateObject call
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'WScript\.CreateObject\s*\('
  - id: wscript-shell-create
    desc: WScript.Shell object creation
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'CreateObject.{0,30}WScript\.Shell'
  - id: wscript-run
    desc: WScript Run method
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?i)\.run\s+[''"]|dIon\.run'
  - id: vbs-powershell-launch
    desc: VBScript launching PowerShell
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    if:
      type: text
      regex: '(?i)(WScript|\.run\s|\.run\(|run\s*\(?\s*[''"]).{0,80}\bpowershell(?:\.exe)?\b'
    not:
      - substr: "run 'Connect-AzAccount' from PowerShell"
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/resource::managed-resource-stub
      - id: metadata/binary/resource::resources-dll-extension
  - id: vbs-powershell-hidden-bypass
    desc: VBScript hidden PowerShell bypass
    crit: suspicious
    conf: 0.96
    attack: T1059.001
    for: [vbs]
    if:
      type: text
      regex: powershell.{0,40}-w hidden.{0,80}-ExecutionPolicy Bypass
  - id: vbs-powershell-env-iex
    desc: VBScript PowerShell env IEX
    crit: suspicious
    conf: 0.97
    attack: T1059.001
    for: [vbs]
    if:
      type: text
      regex: IEX\s+\$env:[A-Za-z_][A-Za-z0-9_]{3,40}
  - id: vbs-hidden-exec
    desc: VBScript hidden execution (0, True)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(?i)\.run\s+[^,]{1,120},\s*0\s*,\s*true'
  - id: vbs-execute-dynamic
    desc: VBScript Execute/ExecuteGlobal dynamic eval
    crit: suspicious
    conf: 0.85
    for: [vbs]
    if:
      type: text
      regex: '(?i)(^|[\n:])\s*Execute(?:Global)?\s*\('
  - id: wscript-host-exec
    desc: Windows Script Host execution reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\b[wc]script\.exe\b'

composite_rules:
  - id: wscript-shell-exec
    desc: WScript.Shell execution pattern
    crit: notable
    conf: 0.85
    any:
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-createobject-dup
      - id: wscript-shell-create
  - id: vbs-powershell-launcher
    desc: VBScript PowerShell launcher
    crit: suspicious
    conf: 0.95
    all:
      - id: wscript-shell-exec
      - id: wscript-run
  - id: vbs-hidden-env-powershell-launcher
    desc: VBScript launches hidden env PowerShell
    crit: hostile
    conf: 0.98
    attack: T1059.001
    for: [vbs]
    all:
      - id: vbs-powershell-hidden-bypass
      - id: vbs-powershell-env-iex
      - id: metadata/lang/scripted::wscript-shell
