defaults:
  attack: T1047
  platforms:
    - windows
  for:
    - vbs
traits:
  - id: cimv2-moniker
    desc: WMI CIMV2 moniker literal
    crit: notable
    conf: 0.88
    if:
      type: string_value
      substr: 'winmgmts:root\cimv2'
  - id: startup-spawn-instance
    desc: WMI startup SpawnInstance call
    crit: suspicious
    conf: 0.92
    if:
      type: string_value
      substr: SpawnInstance_
composite_rules:
  - id: hidden-wmi-process-launch
    desc: Hidden WMI process launcher
    crit: suspicious
    conf: 0.97
    all:
      - id: cimv2-moniker
      - id: startup-spawn-instance
      - id: objectives/execution/wmi::process-startup-config
      - id: objectives/execution/wmi::hidden-window-flag-dup
  - id: hidden-wmi-powershell-stager
    desc: Hidden WMI PowerShell stager
    crit: hostile
    conf: 0.99
    all:
      - id: hidden-wmi-process-launch
      - id: objectives/anti-static/obfuscation/string/delimiter::env-cache-powershell-stager
