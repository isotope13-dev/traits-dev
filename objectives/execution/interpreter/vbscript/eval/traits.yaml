# VBScript Dynamic Code Execution
# Detects Execute/ExecuteGlobal - VBScript equivalents of eval()
# ATT&CK: T1059.005 (Command and Scripting Interpreter: Visual Basic)
defaults:
  platforms: [windows]
  for: [vbs]
  attack: "T1059.005"
traits:
  - id: executeglobal
    desc: VBScript ExecuteGlobal (eval)
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: '(?i)\bExecuteGlobal\b'
  - id: execute-statement
    desc: VBScript Execute statement (eval)
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: '(?i)\bExecute\s+\w'
  - id: eval-function
    desc: VBScript Eval() function
    crit: notable
    conf: 0.85
    if:
      type: string
      regex: '(?i)\bEval\s*\('
composite_rules:
  - id: remote-code-exec
    desc: VBScript remote code execution
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang::msxml-xmlhttp
    any:
      - id: executeglobal
      - id: execute-statement
