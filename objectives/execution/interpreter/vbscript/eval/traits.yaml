defaults:
  platforms:
    - windows
  for:
    - vbs
  attack: T1059.005
traits:
  - id: executeglobal
    desc: VBScript ExecuteGlobal (eval)
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: (?i)\bExecuteGlobal\b
  - id: execute-statement
    desc: VBScript Execute statement (eval)
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: (?i)\bExecute\s+\w
  - id: eval-function
    desc: VBScript Eval() function
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: (?i)\bEval\s*\(
composite_rules:
  - id: remote-code-exec
    desc: VBScript remote code execution
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/scripted::msxml-xmlhttp
    any:
      - id: executeglobal
      - id: execute-statement
