defaults:
  attack: T1059.005
  for:
    - vbs
  platforms:
    - windows
traits:
  - id: executeglobal-variable
    desc: ExecuteGlobal on variable
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bExecuteGlobal\s+\w+\b'
  - id: execute-variable-sink
    desc: Execute statement on variable
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '^[ \t]*Execute\s+[A-Za-z_]\w*'
      case_insensitive: true
    unless:
      - type: basename
        exact: Packages.db
      - id: metadata/library/structure::javascript-source-map-file
      - id: well-known/lib/deb-package::firefox-omni-basename
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: eval-variable
    desc: Eval on decoded variable
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bEval\s*\(\s*\w+\s*\)'
  - id: noop-delay-loop
    desc: No-op loop delay padding
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)For\s+\w+\s*=\s*\d+\s+To\s+\d+\s*:\s*Next'
  - id: array-table-obfuscation
    desc: Many Array() lookup tables (obfuscation)
    crit: notable
    conf: 0.85
    count_min: 8
    if:
      type: text
      regex: '(?i)\bArray\s*\('
  - id: split-frombase64string-builder
    desc: Split FromBase64String builder
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: '(?i)["'']FromBase["'']\s*\+\s*["'']64String\s*\('
  - id: split-unicode-decoder-builder
    desc: Split Unicode decoder builder
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: '(?i)stem\.Text\.Encod["'']\s*&\s*["'']ing|Unicode\.GetSt["'']\s*&\s*["'']ring'
  - id: powershell-reverses-decoded-command
    desc: PowerShell reverses decoded command
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: '(?i)\[-1\.\.-\$[A-Za-z_][A-Za-z0-9_]*\.Length\]\s*-\s*join\s*["'']{2}'
composite_rules:
  - id: msxml-executeglobal-vbs-loader
    desc: VBScript decodes bytes with MSXML and executes them
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.005,T1140
    all:
      - id: executeglobal-variable
      - id: micro-behaviors/data/decode/base64::msxml-node-typed-value
      - id: objectives/anti-static/obfuscation/wsh::vbs-createobject-variable-arg

  - id: execute-variable
    desc: VBScript Execute on variable
    crit: suspicious
    conf: 0.92
    all:
      - id: execute-variable-sink
      - id: metadata/lang/scripted::vbscript-valid

  - id: line-bloated-vbs-charcode-loader
    desc: Line-bloated VBScript character-decoding loader
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005
    all:
      - id: execute-variable
      - id: objectives/anti-static/obfuscation/wsh::vbs-split-mid-chrw-decoder
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat

  - id: array-reconstructed-vbs-stage-loader
    desc: Array-reconstructed VBScript stage loader
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005
    all:
      - id: micro-behaviors/data/encode/char-code::array-payload-reconstruction
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-execute-dynamic
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-high-byte-obfuscated-script
  - id: msxml-array-vbs-stage-loader
    desc: MSXML-backed VBScript stage loader
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005
    all:
      - id: micro-behaviors/data/encode/char-code::array-payload-reconstruction
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-execute-dynamic
      - id: micro-behaviors/data/decode/base64::msxml-domdocument-progid
  - id: xor-decoded-dynamic-exec-loader
    desc: XOR-decoded VBScript dynamic loader
    crit: suspicious
    conf: 0.99
    all:
      - id: micro-behaviors/data/encode/char-code::xor-array-payload-reconstruction
    any:
      - id: executeglobal-variable
      - id: execute-variable
      - id: eval-variable
  - id: xor-decoded-executeglobal-loader
    desc: XOR-decoded VBScript eval loader
    crit: suspicious
    conf: 0.99
    all:
      - id: micro-behaviors/data/encode/char-code::xor-array-payload-reconstruction
      - id: executeglobal-variable
    any:
      - id: micro-behaviors/data/encode/char-code::dense-chr-construction
      - id: noop-delay-loop
  - id: xor-decoded-wsh-stage-loader
    desc: XOR-decoded VBScript WSH stage loader
    crit: suspicious
    conf: 0.97
    all:
      - id: xor-decoded-dynamic-exec-loader
    any:
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-createobject-dup
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-shell-run-create
      - id: micro-behaviors/communications/http/client/vba::xmlhttp-object
      - id: micro-behaviors/fs/write/file/stream::adodb-stream
  # Hostile: ExecuteGlobal of a runtime-built variable is dynamic code execution
  # with no benign use once paired with an obfuscation technique that hides the
  # payload from static analysis. Each composite pairs that dynamic-exec sink
  # with a distinct obfuscation technique, so a loader using any one technique is
  # caught and multi-technique loaders surface multiple independent hostile
  # signals. The XOR composites above stay suspicious; these target the
  # non-XOR string-reassembly loaders (e.g. Array() lookup-table deobfuscators).
  - id: obfuscated-vbs-executeglobal-loader
    desc: Obfuscated VBScript ExecuteGlobal loader (line bloat)
    crit: hostile
    conf: 0.9
    all:
      - id: executeglobal-variable
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
  - id: chr-built-vbs-executeglobal-loader
    desc: Char-reconstructed VBScript ExecuteGlobal loader
    crit: hostile
    conf: 0.9
    all:
      - id: executeglobal-variable
      - id: micro-behaviors/data/encode/char-code::dense-chr-construction
  - id: array-table-vbs-executeglobal-loader
    desc: Array-table-deobfuscated VBScript ExecuteGlobal loader
    crit: hostile
    conf: 0.9
    all:
      - id: executeglobal-variable
      - id: array-table-obfuscation
  - id: reversed-base64-vbs-stage-loader
    desc: Reversed Base64 VBScript stage loader
    crit: hostile
    conf: 0.96
    attack: T1027
    all:
      - id: split-frombase64string-builder
      - id: split-unicode-decoder-builder
      - id: powershell-reverses-decoded-command
    any:
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-execute-dynamic
      - id: execute-variable
      - id: executeglobal-variable
  - id: hidden-vbs-powershell-base64-loader
    desc: Hidden VBScript PowerShell Base64 loader
    crit: hostile
    conf: 0.98
    attack: T1059.001
    all:
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-split-powershell-launch
      - id: split-frombase64string-builder
      - id: split-unicode-decoder-builder
      - id: powershell-reverses-decoded-command
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-hidden-run
    any:
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-execute-dynamic
      - id: execute-variable
      - id: executeglobal-variable
  - id: msxml-xor-executeglobal-vbs-stage
    desc: VBScript decodes an MSXML payload with XOR and executes it dynamically
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.005,T1105
    all:
      - id: executeglobal-variable
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-xor-decode-loop
      - id: objectives/command-and-control/dropper/execution/download-exec::windows-script-msxml-base64-decoder
  - id: delayed-msxml-executeglobal-vbs-loader
    desc: Delayed VBScript MSXML dynamic-code loader
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005
    all:
      - id: executeglobal-variable
      - id: micro-behaviors/data/decode/base64::msxml-domdocument-progid
      - id: noop-delay-loop
