defaults:
  attack: T1059.005
  for:
    - vbs
  platforms:
    - windows
traits:
  - id: executeglobal-variable
    desc: ExecuteGlobal on decoded variable
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bExecuteGlobal\s+\w+\b'
  - id: execute-variable
    desc: Execute on decoded variable
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bExecute\s+\w+\b'
  - id: eval-variable
    desc: Eval on decoded variable
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bEval\s*\(\s*\w+\s*\)'
  - id: noop-delay-loop
    desc: No-op loop delay padding
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)For\s+\w+\s*=\s*\d+\s+To\s+\d+\s*:\s*Next'
composite_rules:
  - id: xor-decoded-dynamic-exec-loader
    desc: XOR-decoded VBScript dynamic loader
    crit: suspicious
    conf: 0.99
    all:
      - id: micro-behaviors/data/encode/char-code::xor-array-payload-reconstruction
    any:
      - id: executeglobal-variable
      - id: execute-variable
      - id: eval-variable
  - id: xor-decoded-executeglobal-loader
    desc: XOR-decoded VBScript eval loader
    crit: suspicious
    conf: 0.99
    all:
      - id: micro-behaviors/data/encode/char-code::xor-array-payload-reconstruction
      - id: executeglobal-variable
    any:
      - id: micro-behaviors/data/encode/char-code::dense-chr-construction
      - id: noop-delay-loop
  - id: xor-decoded-wsh-stage-loader
    desc: XOR-decoded VBScript WSH stage loader
    crit: suspicious
    conf: 0.97
    all:
      - id: xor-decoded-dynamic-exec-loader
    any:
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-createobject-dup
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-shell-create
      - id: micro-behaviors/communications/http/client::xmlhttp-object
      - id: micro-behaviors/fs/write/file::adodb-stream
