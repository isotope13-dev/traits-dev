defaults:
  attack: T1047
  platforms:
    - windows
  for:
    - vbs
traits:
  - id: cimv2-moniker
    desc: WMI CIMV2 moniker literal
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: 'winmgmts:root\cimv2'
  - id: delimited-cimv2-moniker
    desc: Delimited WMI CIMV2 moniker
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: wcentrostigmaticicentrostigmaticncentrostigmaticm
  - id: delimited-process-startup-class
    desc: Delimited Win32_ProcessStartup class
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: Pcentrostigmaticrcentrostigmaticocentrostigmaticc
  - id: startup-spawn-instance
    desc: WMI startup SpawnInstance call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: SpawnInstance_
composite_rules:
  - id: hidden-wmi-process-launch
    desc: Hidden WMI process launcher
    crit: suspicious
    conf: 0.97
    all:
      - id: startup-spawn-instance
      - id: objectives/execution/wmi::hidden-window-flag-dup
    any:
      - id: cimv2-moniker
      - id: delimited-cimv2-moniker
      - id: objectives/execution/wmi::process-startup-config
      - id: delimited-process-startup-class
      - id: objectives/anti-static/obfuscation/wsh::vbs-obfuscated-getobject-target
  - id: hidden-wmi-powershell-stager
    desc: Hidden WMI PowerShell stager
    crit: hostile
    conf: 0.99
    all:
      - id: hidden-wmi-process-launch
      - id: objectives/anti-static/obfuscation/string/delimiter::env-cache-powershell-stager
  - id: obfuscated-hidden-wmi-process-launch
    desc: Obfuscated VBScript hidden WMI process launch
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/execution/wmi::wmi-hidden-variable-process-create
      - id: startup-spawn-instance
    any:
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-high-byte-obfuscated-script
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-runner-call
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
      - id: objectives/anti-static/obfuscation/string/anomaly::vbs-many-long-tokens
