defaults:
  platforms: [netbsd, unix]
  for: [go]
  attack: T1059

traits:
  - id: go-runtime-build-netbsd
    desc: Go runtime build NetBSD
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'exec\.Command[\s\S]{0,180}"go"[\s\S]{0,160}"build"[\s\S]{0,260}GOOS=netbsd'

  - id: go-fetched-payload-run
    desc: Go fetched payload run
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'fetchPayload\(\)[\s\S]{0,900}exec\.Command\(binPath\)'

  - id: go-temp-source-build
    desc: Go temp source build
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'srcPath := filepath\.Join[\s\S]{0,420}GOOS=netbsd'

  - id: go-compiled-bin-exec
    desc: Go compiled bin exec
    crit: component
    conf: 0.94
    if:
      type: text
      substr: exec.Command(binPath)

composite_rules:
  - id: go-runtime-compiled-payload
    desc: Go runtime compiled payload
    crit: hostile
    conf: 0.98
    all:
      - id: go-runtime-build-netbsd
      - id: go-fetched-payload-run

  - id: go-temp-compiled-payload
    desc: Go temp compiled payload
    crit: hostile
    conf: 0.98
    all:
      - id: go-temp-source-build
      - id: go-compiled-bin-exec
