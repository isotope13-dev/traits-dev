# Node.js VM Module Traits
# Detects sandbox execution and potential sandbox escape patterns
# MBC: B0024 (Sandbox Evasion), E1059 (Code Execution)
# ATT&CK: T1059 (Command and Scripting Interpreter)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  # VM Module Imports
  - id: vm-require
    desc: Node.js vm module import
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: "require\\(['\"]vm['\"]\\)|from ['\"]vm['\"]"
  - id: vm-createContext
    desc: VM createContext (sandbox creation)
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "\\bcreateContext\\s*\\("
  - id: vm-runInContext
    desc: VM runInContext (execute code in sandbox)
    crit: suspicious
    conf: 0.9
    mbc: "B0024"
    attack: "T1059"
    if:
      type: raw
      regex: "\\brunInContext\\s*\\("
    downgrade:
      any:
        - id: metadata/dev/testing::node-common-require
        - id: metadata/dev/testing::test-basename-pattern
  - id: vm-runInNewContext
    desc: VM runInNewContext (execute in isolated sandbox)
    crit: suspicious
    conf: 0.9
    mbc: "B0024"
    attack: "T1059"
    if:
      type: raw
      regex: "\\brunInNewContext\\s*\\("
    downgrade:
      any:
        - id: metadata/dev/testing::node-common-require
        - id: metadata/dev/testing::test-basename-pattern
  - id: vm-runInThisContext
    desc: VM runInThisContext (execute in current context)
    crit: suspicious
    conf: 0.85
    attack: "T1059"
    if:
      type: raw
      regex: "\\brunInThisContext\\s*\\("
    downgrade:
      any:
        - id: metadata/dev/testing::node-common-require
        - id: metadata/dev/testing::test-basename-pattern
  - id: vm-Script
    desc: VM Script compilation
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: "new vm\\.Script|vm\\.Script\\("
  # Sandbox Escape Patterns
  - id: constructor-escape
    desc: VM sandbox escape via constructor
    crit: suspicious
    conf: 0.95
    mbc: "B0024"
    attack: "T1059"
    if:
      type: string
      regex: "constructor\\s*\\(\\s*['\"]return this['\"]\\s*\\)|this\\.constructor\\.constructor"
  - id: process-binding
    desc: Access to process.binding (internal Node)
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: "\\bprocess\\.binding\\s*\\("
    unless:
      - id: micro-behaviors/vm/runtime/binding/node::process-binding-evals
      - id: micro-behaviors/vm/runtime/binding/node::process-binding-natives
      - id: metadata/dev/testing/benchmark::benchmark
  # Function constructor patterns
  - id: function-constructor-access
    desc: Function.constructor access
    crit: notable
    conf: 0.6
    if:
      type: string
      substr: "Function.constructor"
  - id: function-direct-call
    desc: Direct Function constructor call
    crit: notable
    conf: 0.5
    if:
      type: string
      substr: "Function("
  # HTTP method patterns
  - id: request-method-call
    desc: .request method call
    crit: notable
    conf: 0.4
    if:
      type: string
      substr: ".request("
  # Base64 decoding patterns
  - id: atob-call
    desc: atob base64 decode function
    crit: notable
    conf: 0.5
    if:
      type: string
      regex: "\\batob\\s*\\("
  - id: buffer-from-call
    desc: Buffer.from conversion
    crit: notable
    conf: 0.4
    count_min: 3
    if:
      type: string
      substr: "Buffer.from"
  # Base64-encoded URL detector using decoded strings
  - id: base64-url
    desc: Base64 encoded URL (potential C2
    crit: suspicious
    conf: 0.85
    mbc: "C0026"
    attack: "T1027"
    if:
      type: encoded
      encoding: base64
      regex: "https?://"
# === Composite Rules ===
composite_rules:
  # VM run methods
  - id: vm-run-methods
    desc: VM code execution methods
    crit: notable
    conf: 0.8
    any:
      - id: vm-runInContext
      - id: vm-runInNewContext
  # HTTP client methods
  - id: http-clients
    desc: HTTP client library usage
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/communications/http/request::script-http-client
      - id: request-method-call
  # Remote Code Execution via VM
  - id: vm-with-http
    desc: VM execution combined with HTTP
    crit: suspicious
    conf: 0.95
    mbc: "B0024"
    attack: "T1105"
    all:
      - id: vm-run-methods
      - id: http-clients
  # Function constructor patterns
  - id: function-constructors
    desc: Function constructor usage
    crit: notable
    conf: 0.6
    any:
      - id: objectives/anti-static/obfuscation/require::function-constructor
      - id: function-constructor-access
      - id: function-direct-call
      - id: objectives/execution/interpreter/eval/dynamic::function-constructor-from-typeof
  # Remote Code Loading via Function Constructor
  - id: function-with-http
    desc: Function constructor with HTTP fetch
    crit: suspicious
    conf: 0.95
    mbc: "B0024"
    attack: "T1105"
    all:
      - id: function-constructors
      - id: http-clients
    unless:
      - id: metadata/library/jquery
      - id: metadata/library/d3
      - id: metadata/library/structure
      - id: metadata/library/axios
      - id: metadata/library/prettier
  # File-to-VM Execution (dropper/loader pattern)
  - id: file-to-vm-execution
    desc: File read + VM execution (loader pattern)
    crit: suspicious
    conf: 0.92
    mbc: "E1059"
    attack: "T1059.007"
    all:
      - id: vm-require
      - id: vm-run-methods
      - id: metadata/import/builtin/node::require-fs
