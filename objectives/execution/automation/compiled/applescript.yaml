defaults:
  for:
    - applescript
  platforms:
    - macos
  attack: T1059.002
traits:
  - id: finder
    desc: Targets Finder
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: Finder
  - id: system-events
    desc: Targets System Events
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: System Events
  - id: safari
    desc: Targets Safari
    crit: notable
    conf: 0.85
    attack: T1185
    if:
      type: text
      substr: Safari
  - id: terminal
    desc: Targets Terminal
    crit: suspicious
    conf: 0.9
    attack: T1059.004
    if:
      type: text
      substr: Terminal
  - id: keychain-access-dup
    desc: Targets Keychain Access
    crit: suspicious
    conf: 0.95
    attack: T1555.001
    if:
      type: text
      substr: Keychain Access
  - id: security-agent
    desc: Targets Security Agent
    crit: suspicious
    conf: 0.95
    attack: T1548
    if:
      type: text
      substr: SecurityAgent
  - id: applescript-url-scheme
    desc: "applescript:// Script Editor URL handler"
    crit: suspicious
    conf: 0.9
    for: [html, shell, applescript, javascript, markdown]
    if:
      type: text
      substr: "applescript://com.apple.scripteditor"
composite_rules:
  - id: automates-settings
    desc: Automates System Settings/Preferences
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/process/create/script::ref-system-settings
      - id: micro-behaviors/process/create/script::ref-system-prefs
  - id: terminal-commands
    desc: Terminal automation commands
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/process/create/script::do-script
      - id: micro-behaviors/process/create/script::activate
  - id: automates-terminal
    desc: Automates Terminal application
    crit: suspicious
    conf: 0.9
    attack: T1059.004
    all:
      - id: terminal
      - id: terminal-commands
  - id: shell-with-settings
    desc: Shell execution with System Settings
    crit: suspicious
    conf: 0.85
    all:
      - id: automates-settings
      - id: micro-behaviors/process/create/shell::shell-execution
