defaults:
  for:
    - applescript
  platforms:
    - macos
  attack: T1059.002
traits:
  - id: finder
    desc: Targets Finder
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: Finder
  - id: system-events
    desc: Targets System Events
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: System Events
  - id: safari
    desc: Targets Safari
    crit: notable
    conf: 0.85
    attack: T1185
    # The Safari name keyword lives canonically in keywords/browser; reference
    # it (re-contextualized as AppleScript app-targeting, T1185) rather than
    # repeating the `Safari` string literal.
    if:
      id: objectives/discovery/host/browser/keywords::safari-name
  - id: terminal
    desc: Targets Terminal
    crit: suspicious
    conf: 0.9
    attack: T1059.004
    if:
      type: string_literal
      substr: Terminal
  - id: keychain-access-dup
    desc: Targets Keychain Access
    crit: suspicious
    conf: 0.95
    attack: T1555.001
    if:
      type: string_literal
      substr: Keychain Access
  - id: security-agent
    desc: Targets Security Agent
    crit: suspicious
    conf: 0.95
    attack: T1548
    if:
      type: string_literal
      substr: SecurityAgent
composite_rules:
  - id: automates-settings
    desc: Automates System Settings/Preferences
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/process/create/script/osascript::ref-system-settings
      - id: micro-behaviors/process/create/script/osascript::ref-system-prefs
  - id: terminal-commands
    desc: Terminal automation commands
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/process/create/script/apple-event::do-script
      - id: micro-behaviors/process/create/script/apple-event::activate
  - id: automates-terminal
    desc: Automates Terminal application
    crit: suspicious
    conf: 0.9
    attack: T1059.004
    all:
      - id: terminal
      - id: terminal-commands
  - id: shell-with-settings
    desc: Shell execution with System Settings
    crit: suspicious
    conf: 0.85
    all:
      - id: automates-settings
      - id: micro-behaviors/process/create/shell/spawn::shell-execution
