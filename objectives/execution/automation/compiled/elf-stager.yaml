defaults:
  platforms: [linux, android]
  for: [elf]
  attack: T1106

composite_rules:
  - id: tiny-elf-direct-ip-http-execution-stager
    desc: Tiny ELF executes direct-IP HTTP staging logic
    crit: hostile
    conf: 0.96
    size_max: 4096
    all:
      - id: objectives/command-and-control/beacon/network/http::direct-ip-tiny-elf-http-stager
      - id: metadata/binary/anomaly/format::elf-entry-in-last-segment
      - id: metadata/binary/linking/static::elf-needed-libs-zero
    any:
      - id: metadata/hardening/missing::stripped-binary
      - id: metadata/binary/anomaly/section-header::elf-no-section-headers
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/sysadmin/unix-benign/
  - id: sectionless-tiny-elf-http-execution-stager
    desc: Sectionless tiny ELF executes HTTP staging logic
    crit: hostile
    conf: 0.96
    size_max: 512
    all:
      - id: objectives/command-and-control/beacon/network/http::sectionless-syscall-tiny-elf-http-stager
      - id: metadata/binary/anomaly/format::elf-entry-in-last-segment
      - id: metadata/binary/anomaly/section-header::elf-no-section-headers
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/sysadmin/unix-benign/
  - id: covert-elf-shell-resolver-execution
    desc: ELF executes covert shell resolver C2 logic
    crit: hostile
    conf: 0.96
    attack: T1059.004
    all:
      - id: objectives/command-and-control/channel/covert::covert-elf-shell-resolver-c2
      - id: micro-behaviors/process/create/shell/encoded::bin-sh-binary-text
      - id: micro-behaviors/communications/dns/lookup/native::lookup-resolv
    any:
      - id: micro-behaviors/fs/path/config/system::config-hosts
      - id: micro-behaviors/fs/path/config/system::config-resolv
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/tool/sysadmin/unix-benign/
  - id: covert-prctl-shell-resolver-execution
    desc: ELF executes covert shell resolver C2 with prctl control
    crit: hostile
    conf: 0.96
    attack: T1059.004
    all:
      - id: objectives/command-and-control/channel/covert::covert-elf-shell-resolver-c2
      - id: objectives/evasion/masquerade/process/rename::prctl-syscall-x64
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/tool/sysadmin/unix-benign/
