defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, shell]
  attack: T1059
  mbc: B0022

composite_rules:
  - id: telegram-controlled-llm-agent
    desc: Telegram controlled LLM agent
    crit: suspicious
    conf: 0.95
    ref: sha256:32f1acd36984e7f7bd66b06d4185afa42fcf696bad4378aecf4b3bc8dfdab654
    for: [python]
    all:
      - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
      - id: micro-behaviors/communications/http/services/telegram::python-telegram-get-updates
    any:
      - id: micro-behaviors/process/create/agent::python-invoke-claude-call
      - id: micro-behaviors/communications/http/llm::openai-function-tool-schema

  - id: chat-controlled-codex-agent
    desc: Chat controlled Codex agent
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/websocket/library::feishu-lark-event-websocket-client
      - id: micro-behaviors/process/create/agent::codex-cli-or-agent-session
    any:
      - id: micro-behaviors/process/create/agent::codex-bypass-permissions-mode
      - id: micro-behaviors/fs/path/application/config::codex-skills-directory
      - id: micro-behaviors/communications/http/server/route::loopback-notify-endpoint

  - id: permissive-chat-controlled-codex-agent
    desc: Permissive chat controlled Codex agent
    crit: suspicious
    conf: 0.96
    all:
      - id: chat-controlled-codex-agent
      - id: micro-behaviors/process/create/agent::codex-bypass-permissions-mode

  - id: chat-controlled-claude-agent
    desc: Chat controlled Claude agent
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/process/create/agent::claude-cli-agent-session
      - id: micro-behaviors/communications/http/services/dingtalk::dingtalk-client-context
    any:
      - id: micro-behaviors/process/create/shell/bridge::chat-bash-command-handler
      - id: micro-behaviors/process/create/agent::ai-agent-bypass-permissions-mode
      - id: micro-behaviors/process/create/shell/bridge::child-process-exec

  - id: permissive-chat-controlled-claude-agent
    desc: Permissive chat controlled Claude agent
    crit: suspicious
    conf: 0.96
    all:
      - id: chat-controlled-claude-agent
      - id: micro-behaviors/process/create/agent::ai-agent-bypass-permissions-mode

  - id: dingtalk-chat-shell-command
    desc: DingTalk chat shell command
    crit: suspicious
    conf: 0.91
    all:
      - id: micro-behaviors/communications/http/services/dingtalk::dingtalk-client-context
      - id: micro-behaviors/process/create/shell/bridge::chat-bash-command-handler

  - id: scripted-permissive-claude-agent
    desc: Scripted permissive Claude agent
    crit: suspicious
    conf: 0.95
    for: [shell]
    all:
      - id: micro-behaviors/process/create/agent::claude-dangerous-agent-session
      - id: micro-behaviors/process/create/shell/spawn::shell-execution-comp

  - id: detached-permissive-claude-agent
    desc: Detached permissive Claude agent
    crit: suspicious
    conf: 0.96
    for: [shell]
    all:
      - id: scripted-permissive-claude-agent
      - id: micro-behaviors/process/create/shell/multiplexer::tmux-session-control
