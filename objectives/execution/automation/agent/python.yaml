defaults:
  platforms: [windows, unix]
  for: [python, pkginfo, archives]
  attack: T1059
  mbc: B0022

traits:
  - id: python-autonomous-deploy-loop-text
    desc: Python autonomous deploy loop text
    crit: component
    conf: 0.9
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: text
      regex: '(?s)work agents.{0,120}gate agents.{0,120}deploy or revert'

  - id: python-agent-deploy-command-field
    desc: Python agent deploy command field
    crit: component
    conf: 0.92
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: text
      regex: 'self\.deploy_cmd\s*=\s*self\.project\.get\(["'']deploy["'']'

  - id: python-agent-objective-metric-command
    desc: Python agent objective metric command
    crit: component
    conf: 0.9
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: text
      substr: 'self.objective_metric_cmd = self.project.get("objective_metric"'

  - id: python-agent-safe-command-import
    desc: Python agent safe command import
    crit: component
    conf: 0.9
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: text
      substr: from joshua.utils.safe_cmd import run_command

composite_rules:
  - id: python-codex-sandbox-bypass-runner
    desc: Python Codex sandbox bypass runner
    crit: hostile
    conf: 0.96
    for: [python]
    ref: sha256:32f1acd36984e7f7bd66b06d4185afa42fcf696bad4378aecf4b3bc8dfdab654
    all:
      - id: micro-behaviors/process/create/hcom::python-dangerous-llm-agent-runner
      - id: micro-behaviors/process/create/hcom::codex-dangerous-sandbox-bypass-flag

  - id: python-autonomous-ai-deploy-orchestrator
    desc: Python autonomous AI deploy orchestrator
    crit: suspicious
    conf: 0.97
    scope: archive
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    all:
      - id: objectives/supply-chain/trojanized/app/ai-agent-tools::pypi-autonomous-ai-deploy-tool
      - id: python-autonomous-deploy-loop-text
      - id: python-agent-deploy-command-field
      - id: python-agent-safe-command-import
    any:
      - id: python-agent-objective-metric-command
      - id: micro-behaviors/process/create/hcom::python-llm-command-template-runner

  - id: python-ai-agent-command-template-bridge
    desc: Python AI agent command template bridge
    crit: suspicious
    conf: 0.96
    scope: archive
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    all:
      - id: objectives/supply-chain/trojanized/app/ai-agent-tools::pypi-autonomous-ai-deploy-tool
      - id: micro-behaviors/process/create/hcom::python-llm-command-template-runner
      - id: micro-behaviors/process/create/subprocess::python-exec-capability

  - id: python-autonomous-ai-full-auto-deploy
    desc: Python AI full-auto deploy loop
    crit: hostile
    conf: 0.97
    scope: archive
    ref: sha256:b92af7e8379fba6a66eb7b99e4db29eacd6040b05abd2b8e0373eaf43dce92b0
    all:
      - id: python-autonomous-ai-deploy-orchestrator
      - id: python-ai-agent-command-template-bridge
    any:
      - id: objectives/supply-chain/trojanized/app/ai-agent-tools::pypi-autonomous-ai-unsafe-runner
      - id: micro-behaviors/process/create/hcom::python-dangerous-llm-agent-runner
      - id: micro-behaviors/process/create/hcom::python-full-auto-llm-agent-runner
      - id: micro-behaviors/process/create/hcom::codex-full-auto-approval-mode
