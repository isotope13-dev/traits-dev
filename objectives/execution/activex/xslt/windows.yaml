defaults:
  platforms: [windows]
  for: [vbs, html, javascript, xml]
  attack: T1059
  mbc: E1059
traits:
  - id: xslt-ms-script-block
    desc: XSLT embedded Microsoft script block
    crit: suspicious
    conf: 0.94
    for: [xml, html, javascript]
    if:
      type: text
      regex: '(?is)(<ms:script\b|<msxsl:script\b|%3c%6d%73%3a%73%63%72%69%70%74)'

  - id: xslt-jscript-language-encoded
    desc: Percent-encoded JScript marker
    crit: component
    conf: 0.9
    for: [xml]
    if:
      type: text
      regex: '(?i)%4a%53%63%72%69%70%74'

  - id: xslt-binaryformatter-marker
    desc: XSLT BinaryFormatter class marker
    crit: component
    conf: 0.95
    for: [xml, html, javascript]
    if:
      type: text
      regex: '(?i)\bBinaryFormatter\b'

  - id: msxsl-script-block
    desc: XSLT msxsl script block
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "<msxsl:script"
  - id: xslt-jscript-language
    desc: XSLT embedded JScript language
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'language\s*=\s*["'']{1,2}JScript'
  - id: xslt-transform-node-call
    desc: ASP XSLT TransformNode call
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bTransformNode\s*\('
  - id: xslt-shell-exec-call
    desc: XSLT shell Exec call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\b(msxml|transformnode|xsl)\b[\s\S]{0,80}\.Exec\s*\('
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
composite_rules:
  - id: xslt-jscript-language-marker
    desc: XSLT embedded JScript language marker
    crit: suspicious
    conf: 0.94
    any:
      - id: xslt-jscript-language
      - id: xslt-jscript-language-encoded

  - id: xslt-actctx-binaryformatter-loader
    desc: XSLT ActCtx BinaryFormatter loader chain
    crit: suspicious
    conf: 0.98
    for: [xml, html, javascript]
    all:
      - id: micro-behaviors/os/com/object::windows-actctx-manifest-class
      - id: xslt-binaryformatter-marker
      - id: micro-behaviors/data/serialize/unsafe::binary-formatter-deserialize-call

  - id: xslt-scriptlet-binaryformatter-loader
    desc: XSLT JScript BinaryFormatter payload loader
    crit: hostile
    conf: 0.99
    attack: T1059.007,T1140,T1218
    mbc: B0032,C0026
    all:
      - id: xslt-ms-script-block
      - id: xslt-jscript-language-marker
      - id: xslt-actctx-binaryformatter-loader
      - id: micro-behaviors/process/interpreter/jscript::activex-object-text
      - id: micro-behaviors/data/serialize/unsafe::binary-formatter

  - id: xslt-scriptlet-command-exec
    desc: XSLT scriptlet command execution
    crit: hostile
    conf: 0.99
    all:
      - id: msxsl-script-block
      - id: xslt-jscript-language
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: xslt-shell-exec-call
      - id: micro-behaviors/process/io/wsh::wsh-process-output-readall
    any:
      - id: xslt-transform-node-call
      - id: micro-behaviors/os/com/object::wscript-shell-literal
  - id: xslt-shell-output-command-runner
    desc: XSLT shell command output runner
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: xslt-shell-exec-call
      - id: micro-behaviors/process/io/wsh::wsh-process-output-readall
    any:
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-run-hidden-zero
      - id: objectives/anti-static/obfuscation/wsh::vbs-execute-concat-code
