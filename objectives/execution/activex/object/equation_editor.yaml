defaults:
  attack: T1203
  platforms: [unix, windows]
  for: [rtf, pe, oledoc]
traits:
  - id: equation-editor
    desc: "Contains Microsoft Equation Editor 3.0 object"
    crit: suspicious
    conf: 0.8
    mbc: "B0006.002"
    if:
      type: text
      substr: "Equation.3"
      case_insensitive: true
    unless:
      - id: metadata/document/office/container/
    downgrade:
      any:
        - id: metadata/binary/resource/
  - id: equation-editor-dangerous-clsid
    desc: Microsoft Equation Editor CLSID
    crit: suspicious
    conf: 0.96
    for: [oledoc]
    mbc: "B0006.002"
    if:
      type: value
      path: office.dangerous_clsids[*].clsid
      exact: "0002ce02-0000-0000-c000-000000000046"
  - id: equation-editor-native-payload-stream
    desc: Equation Editor OLE native payload stream
    crit: suspicious
    conf: 0.97
    for: [oledoc]
    mbc: "B0006.002"
    if:
      type: value
      path: office.streams[*]
      exact: "/\u0001OLE10NATivE"
composite_rules:
  - id: cve-2017-11882
    desc: "CVE-2017-11882 Exploitation (Equation Editor) with Payload"
    crit: hostile
    conf: 0.95
    all:
      - id: equation-editor
    any:
      - id: micro-behaviors/process/create/hcom::regsvr32
      - id: micro-behaviors/process/create/hcom::regsvr32-encoded
      - id: micro-behaviors/process/create/hcom::regsvr32-raw-hex
      - id: objectives/command-and-control/dropper/delivery/download-execute::squiblydoo
  - id: equation-editor-ole-exploit-surface
    desc: Equation Editor embedded OLE exploit surface
    crit: hostile
    conf: 0.96
    for: [oledoc]
    all:
      - id: equation-editor-dangerous-clsid
    any:
      - id: metadata/document/ole::ole-high-entropy
      - id: metadata/document/ole::objectpool-storage
      - id: equation-editor-native-payload-stream
  - id: equation-editor-native-payload-exploit
    desc: Equation Editor OLE native payload exploit
    crit: hostile
    conf: 0.98
    for: [oledoc]
    all:
      - id: equation-editor-dangerous-clsid
      - id: equation-editor-native-payload-stream
  - id: equation-editor-large-payload-exploit
    desc: Equation Editor OLE exploit with large payload body
    crit: hostile
    conf: 0.97
    for: [oledoc]
    all:
      - id: equation-editor-dangerous-clsid
      - id: metadata/document/ole::large-ole-document-body
  - id: ooxml-compact-large-ole-payload-exploit
    desc: Compact OOXML package carries an oversized embedded OLE payload
    crit: hostile
    conf: 0.96
    for: [ooxml]
    all:
      - id: metadata/document/office/markup::ooxml-embedded-ole-object
      - id: metadata/document/office/markup::ooxml-large-embedded-ole-object
      - id: metadata/document/office/markup::ooxml-compact-package
