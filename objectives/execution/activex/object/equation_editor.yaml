defaults:
  for: [all]
traits:
  - id: equation-editor
    desc: "Contains Microsoft Equation Editor 3.0 object"
    crit: suspicious
    conf: 0.8
    attack: "T1203"
    mbc: "B0006.002"
    if:
      type: raw
      substr: "Equation.3"
      case_insensitive: true
composite_rules:
  - id: cve-2017-11882
    desc: "CVE-2017-11882 Exploitation (Equation Editor) with Payload"
    crit: hostile
    conf: 0.95
    attack: "T1203"
    all:
      - id: equation-editor
    any:
      - id: micro-behaviors/process/create/tool::regsvr32
      - id: micro-behaviors/process/create/tool::regsvr32-encoded
      - id: micro-behaviors/process/create/tool::regsvr32-raw-hex
      - id: objectives/command-and-control/dropper/download-execute::squiblydoo
