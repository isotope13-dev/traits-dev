defaults:
  attack: T1203
  platforms: [linux, macos, windows, unix, android, ios]
  for: [rtf, pe, dll]
traits:
  - id: equation-editor
    desc: "Contains Microsoft Equation Editor 3.0 object"
    crit: suspicious
    conf: 0.8
    mbc: "B0006.002"
    if:
      type: raw
      substr: "Equation.3"
      case_insensitive: true
    unless:
      - id: metadata/format/document/help2::help2-container
    downgrade:
      any:
        - id: metadata/format/pe::resource-only-dll
composite_rules:
  - id: cve-2017-11882
    desc: "CVE-2017-11882 Exploitation (Equation Editor) with Payload"
    crit: hostile
    conf: 0.95
    all:
      - id: equation-editor
    any:
      - id: micro-behaviors/process/create/tool::regsvr32
      - id: micro-behaviors/process/create/tool::regsvr32-encoded
      - id: micro-behaviors/process/create/tool::regsvr32-raw-hex
      - id: objectives/command-and-control/dropper/delivery/download-execute::squiblydoo
