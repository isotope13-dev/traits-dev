defaults:
  crit: notable
  conf: 0.8
  platforms:
    - windows
  for:
    - javascript
  attack: T1059.005
  mbc: E1243
traits:
  - id: activex-winhttp
    desc: WinHTTP request object
    if:
      type: string_literal
      substr: WinHTTP.WinHTTPRequest
  - id: activex-wmi
    desc: WbemScripting.SWbemLocator
    if:
      type: string_literal
      substr: WbemScripting.SWbemLocator
    attack: T1047
    mbc: E1043
  - id: activex-object-create
    desc: new ActiveXObject pattern
    crit: baseline
    if:
      type: text
      regex: (?i)new\s+ActiveXObject\s*\(|this\[\s*['"](ActiveXObject|A\\u0063\\u0074)
    attack: T1202
  - id: shell-execute-method
    desc: ShellExecute COM method call
    if:
      type: text
      regex: (?i)\.ShellExecute\s*\(
    attack: T1106
composite_rules:
  - id: activex-network-access
    desc: ActiveX network capability
    conf: 0.8
    attack: T1071
    mbc: C0005
    any:
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: activex-winhttp
  - id: activex-file-network
    desc: File + network operations
    crit: suspicious
    conf: 0.85
    attack: T1071
    all:
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: activex-network-access
  - id: activex-shell-execution
    desc: Shell command execution via COM
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: micro-behaviors/os/com/object::shell-application-progid
      - id: activex-wmi
      - id: objectives/execution/interpreter/script/wsh::wscript-shell
  - id: activex-shell-app-execute
    desc: Shell.Application ShellExecute invocation
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    all:
      - id: micro-behaviors/os/com/object::shell-application-progid
      - id: shell-execute-method
