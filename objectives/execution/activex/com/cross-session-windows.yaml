defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp, csharp]
  attack: T1559.001
traits:
  - id: helppane-cross-session-clsid
    desc: HelpPane cross-session COM CLSID
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\{?f87b28f1-da9a-4f35-8ec0-800efcf26b83\}?'
  - id: ihxhelppane-execute-interface
    desc: HelpPane COM Execute interface
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?s)IHxHelpPaneServer.{0,240}\bExecute\b'
  - id: helpserver-interface-guid
    desc: HelpPane server interface GUID
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\{?8cec58ae-07a1-11d9-b15e-000d56bfe6ee\}?|\{?8cec592c-07a1-11d9-b15e-000d56bfe6ee\}?'
  - id: sc-remote-registry-start
    desc: sc starts RemoteRegistry remotely
    crit: suspicious
    conf: 0.9
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)\bsc(\.exe)?\s+\\\\\S{1,120}\s+start\s+RemoteRegistry\b'
  - id: net-remote-registry-start
    desc: net starts RemoteRegistry service
    crit: suspicious
    conf: 0.84
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)\bnet\s+start\s+RemoteRegistry\b'
  - id: comhijackwrite-command
    desc: COM hijack writer command
    crit: suspicious
    conf: 0.95
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)\bComHijackWrite(\.exe)?\b'
  - id: sessionhop-command
    desc: Cross-session execution tool command
    crit: suspicious
    conf: 0.95
    for: [powershell, batch]
    if:
      type: text
      regex: '(?i)\b(SessionHop|IHxExec)(\.exe)?\b'
composite_rules:
  - id: com-cross-session-activation-chain
    desc: Cross-session COM activation chain
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/os/com/session::set-session-id-call
      - id: micro-behaviors/os/com/session::storage-backed-com-activation
    any:
      - id: micro-behaviors/os/com/session::special-system-properties-interface
      - id: micro-behaviors/os/com/session::interactive-user-runas-value
      - id: helppane-cross-session-clsid
      - id: helpserver-interface-guid
  - id: helppane-cross-session-execution
    desc: HelpPane cross-session command execution
    crit: hostile
    conf: 0.98
    all:
      - id: helppane-cross-session-clsid
      - id: ihxhelppane-execute-interface
    any:
      - id: micro-behaviors/os/com/session::set-session-id-call
      - id: sessionhop-command
  - id: interactive-com-hijack-execution
    desc: Interactive-user COM hijack execution
    crit: hostile
    conf: 0.97
    attack: T1546.015, T1559.001
    all:
      - id: comhijackwrite-command
    any:
      - id: helppane-cross-session-clsid
      - id: helpserver-interface-guid
      - id: micro-behaviors/os/com/session::interactive-user-runas-value
  - id: remote-csa-preparation-chain
    desc: Remote cross-session activation setup
    crit: suspicious
    conf: 0.94
    for: [powershell, batch]
    any:
      - id: sc-remote-registry-start
      - id: net-remote-registry-start
    all:
      - id: objectives/lateral-movement/delivery/admin-share::admin-share-c-windows-temp-dll
      - id: comhijackwrite-command
  - id: remote-interactive-com-hijack
    desc: Remote interactive COM hijack
    crit: hostile
    conf: 0.98
    for: [powershell, batch]
    attack: T1546.015, T1559.001
    all:
      - id: comhijackwrite-command
      - id: objectives/lateral-movement/delivery/admin-share::admin-share-c-windows-temp-dll
    any:
      - id: sc-remote-registry-start
      - id: net-remote-registry-start
  - id: helppane-obfuscated-memory-loader
    desc: HelpPane memory loader with obfuscated dispatch
    crit: hostile
    conf: 0.97
    attack: T1559.001, T1620
    all:
      - id: helppane-cross-session-clsid
      - id: objectives/evasion/anti-av/syscall::indirect-nt-api-self-injection
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/anti-static/obfuscation/obfuscator/garble::go-garbled-type-pointer
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    needs: 1
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
      - id: well-known/app/
