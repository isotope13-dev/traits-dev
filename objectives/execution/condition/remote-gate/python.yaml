defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1204.002
  mbc: B0025

traits:
  - id: requests-text-allowlist-fetch
    desc: requests.get text assigned as allowlist
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b[A-Za-z_][A-Za-z0-9_]*\s*=\s*requests\.get\s*\(\s*[A-Za-z_][A-Za-z0-9_]*\s*\)\.text'
  - id: membership-allow-gate
    desc: membership check gates execution
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\bif\s+[A-Za-z_][A-Za-z0-9_]*\s+in\s+[A-Za-z_][A-Za-z0-9_]*\s*:'
  - id: paid-user-gate-wording
    desc: paid-user or subscription gate wording
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '(?i)\b(paid_users|buy tool|subscription first|approval)\b'
  - id: telegram-key-contact-url
    desc: Telegram contact URL includes generated key
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'https?://t\.me/[A-Za-z0-9_]{3,80}\?text=\{?[A-Za-z_][A-Za-z0-9_]*\}?'
  - id: denial-paywall-phrase
    desc: Paywall/subscription denial phrase
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)\b(buy tool|subscription first|paid_users)\b'
  - id: buy-marker-input-prompt
    desc: Input prompt rebuilt with buy-marker token
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\binput\s*\([\s\S]{0,220}___[A-Za-z0-9_]*buy[A-Za-z0-9_]*___\s*\('

composite_rules:
  - id: recursive-denial-prompt-loop
    desc: Denial prompt recursively repeats after user input
    crit: notable
    conf: 0.88
    near_bytes: 500
    all:
      - id: denial-paywall-phrase
      - id: buy-marker-input-prompt
  - id: remote-approval-gated-execution
    desc: Remote allowlist gates callback execution
    crit: notable
    conf: 0.92
    all:
      - id: requests-text-allowlist-fetch
      - id: membership-allow-gate
    any:
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: objectives/discovery/system/fingerprint/os::platform-profiling
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
  - id: paid-telegram-approval-gate
    desc: Paid-user remote approval gate with Telegram contact
    crit: notable
    conf: 0.94
    all:
      - id: remote-approval-gated-execution
      - id: paid-user-gate-wording
      - id: telegram-key-contact-url
    any:
      - id: objectives/discovery/system/fingerprint/hardware::python-machine-fingerprint-hash
      - id: micro-behaviors/process/create/system::python-os-system-open-url
