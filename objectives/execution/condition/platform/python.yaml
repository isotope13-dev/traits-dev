defaults:
  platforms: [unix]
  for: [python]
  attack: T1480
composite_rules:
  - id: python-execution-guard
    desc: Python script with complex execution triggers
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: micro-behaviors/os/privilege/query::is-root-check
      - id: micro-behaviors/os/sysinfo/platform/kernel::python-uptime-check
