defaults:
  platforms: [unix, windows]
# Multi-Platform Execution Logic
# Detects scripts that check for multiple OSs and execute commands
# Common in supply chain attacks to maximize impact
# ATT&CK: T1204.002
traits:
  - id: surql-schema-file
    desc: SurrealDB schema file
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: path
      basename: true
      regex: '\.surql$'
  - id: python-click-option-call
    desc: Python Click option declaration
    crit: component
    conf: 0.7
    for: [python]
    if:
      type: text
      substr: 'click.option('
  - id: python-cache-mode-help-text
    desc: Python cache mode CLI help text
    crit: component
    conf: 0.8
    for: [python]
    if:
      type: string_literal
      substr: 'Caching mode for compiled model artifacts'
  - id: python-cache-windows-note
    desc: Python cache option Windows availability note
    crit: component
    conf: 0.8
    for: [python]
    if:
      type: string_literal
      substr: 'not available on Windows'
  - id: python-bazel-bootstrap-launcher
    desc: Python Bazel bootstrap launcher
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: 'RULES_PYTHON_BOOTSTRAP_VERBOSE'
  - id: python-os-add-dll-directory
    desc: Python os.add_dll_directory usage
    crit: component
    conf: 0.85
    for: [python]
    if:
      type: text
      substr: os.add_dll_directory
  - id: js-get-kbd-keys-map-symbol
    desc: JavaScript getKbdKeysMap symbol
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      exact: getKbdKeysMap
  - id: js-get-kbd-keys-label-map-symbol
    desc: JavaScript getKbdKeysLabelMap symbol
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      exact: getKbdKeysLabelMap
  - id: js-get-kbd-screen-reader-text-symbol
    desc: "JS getKbdScreenReaderFriendlyText symbol"
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      exact: getKbdScreenReaderFriendlyText
  - id: js-kbd-key-symbol
    desc: JavaScript keyboard key type symbol
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: symbol
      exact: KbdKey
  - id: js-shortcut-template-label
    desc: JavaScript shortcut template label
    crit: component
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      substr: 'Shortcut: ${'
composite_rules:
  - id: python-click-cache-help-text
    desc: Python Click cache option help text
    crit: component
    conf: 0.85
    near_lines: 40
    all:
      - id: python-click-option-call
      - id: python-cache-mode-help-text
      - id: python-cache-windows-note
  - id: has-os-check
    desc: Checks for OS platform
    crit: component
    conf: 0.6
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-platform-content
      - id: micro-behaviors/os/sysinfo/platform/string::os-string-windows
      - id: micro-behaviors/os/sysinfo/platform/string::os-string-linux
  - id: executes-scripts
    desc: Executes script files
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/process/create/script/
      - id: micro-behaviors/process/create/shell/spawn::cmd-exe
  - id: js-keyboard-shortcut-ui-context
    desc: JavaScript OS-aware keyboard shortcut UI context
    crit: component
    conf: 0.9
    any:
      - id: js-get-kbd-keys-map-symbol
      - id: js-get-kbd-keys-label-map-symbol
      - id: js-get-kbd-screen-reader-text-symbol
      - id: js-kbd-key-symbol
      - id: js-shortcut-template-label
  - id: os-specific-execution-benign-context
    desc: Benign OS-specific execution context
    crit: component
    conf: 0.8
    any:
      - id: well-known/tool/detection/malware-config-parser
      - id: surql-schema-file
      - id: python-click-cache-help-text
      - id: python-bazel-bootstrap-launcher
      - id: micro-behaviors/ui/window/notify/message::winforms-notifyicon-balloon
      # Windows os.add_dll_directory branch is native-extension DLL loading,
      # not OS-conditional command dispatch (common in native Python wheels).
      - id: python-os-add-dll-directory
      # Pentest payload corpora pair OS-platform tokens with payload strings
      # like LOAD_FILE; not OS-conditional command dispatch.
      - id: well-known/tool/offensive/payload-corpus::pentest-payload-corpus
      - id: js-keyboard-shortcut-ui-context
      - id: metadata/file/string/identity::microsoft-vcredist-context
      # An AUR PKGBUILD that names a Linux release tarball and copies files in
      # package() is benign packaging, not OS-conditional command dispatch.
      - id: metadata/file/string/identity::pkgbuild-basename
  - id: os-specific-execution
    desc: Executes different commands based on OS platform
    crit: component
    conf: 0.85
    attack: T1204.002
    size_max: 40000
    near_lines: 120
    all:
      - id: has-os-check
      - id: micro-behaviors/process/create/exec::command-execution-capability
    unless:
      - id: objectives/execution/condition/platform/
