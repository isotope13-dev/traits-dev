defaults:
  platforms: [unix, windows]
# Multi-Platform Execution Logic
# Detects scripts that check for multiple OSs and execute commands
# Common in supply chain attacks to maximize impact
# ATT&CK: T1204.002
traits:
  - id: surql-schema-file
    desc: SurrealDB schema file
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: basename
      regex: '\.surql$'
  - id: python-click-option-call
    desc: Python Click option declaration
    crit: component
    conf: 0.7
    for: [python]
    if:
      type: text
      substr: 'click.option('
  - id: python-cache-mode-help-text
    desc: Python cache mode CLI help text
    crit: component
    conf: 0.8
    for: [python]
    if:
      type: string_literal
      substr: 'Caching mode for compiled model artifacts'
  - id: python-cache-windows-note
    desc: Python cache option Windows availability note
    crit: component
    conf: 0.8
    for: [python]
    if:
      type: string_literal
      substr: 'not available on Windows'
  - id: python-bazel-bootstrap-launcher
    desc: Python Bazel bootstrap launcher
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: 'RULES_PYTHON_BOOTSTRAP_VERBOSE'

composite_rules:
  - id: python-click-cache-help-text
    desc: Python Click cache option help text
    crit: component
    conf: 0.85
    near_lines: 40
    all:
      - id: python-click-option-call
      - id: python-cache-mode-help-text
      - id: python-cache-windows-note
  - id: has-os-check
    desc: Checks for OS platform
    crit: component
    conf: 0.6
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-platform-content
      - id: micro-behaviors/os/sysinfo/platform/string::os-string-windows
      - id: micro-behaviors/os/sysinfo/platform/string::os-string-linux
  - id: has-execution-capability
    desc: Has code execution capability
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/process/create/
  - id: executes-scripts
    desc: Executes script files
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/process/create/script/
      - id: micro-behaviors/process/create/shell/invoke::cmd-exe
  - id: os-specific-execution
    desc: Executes different commands based on OS platform
    crit: notable
    conf: 0.85
    attack: T1204.002
    size_max: 40000
    near_lines: 120
    all:
      - id: has-os-check
      - id: has-execution-capability
    unless:
      - id: surql-schema-file
      - id: python-click-cache-help-text
      - id: python-bazel-bootstrap-launcher
      - id: micro-behaviors/ui/window/notify::winforms-notifyicon-balloon
