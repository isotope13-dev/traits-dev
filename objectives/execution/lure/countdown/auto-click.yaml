# Lure pages that auto-trigger downloads via setInterval/setTimeout
# countdown plus a programmatic anchor click. The "your download will
# start in 5 seconds" pattern with manual-fallback button is
# canonical fake-update / fake-CAPTCHA UX. Each fragment is a generic
# UI primitive used by legitimate sites; only the cluster matters.
defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1204.001
  mbc: F0007
traits:
  - id: lure-countdown-interval
    desc: Lure countdown setInterval pattern
    crit: component
    conf: 0.7
    if:
      type: text
      regex: 'setInterval\s*\([^)]{0,120}([a-zA-Z_$][\w$]{0,30}--|\b\d+\s*-=)'
  - id: lure-auto-redirect-then-store
    desc: Auto-redirect-in-N-seconds phrase
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)redirect[a-z]{0,3}\b[^\n]{0,40}\bin\s+\d+\s+seconds?'
  - id: lure-multi-page-hide
    desc: Multi-page show/hide lure machine
    crit: component
    conf: 0.7
    count_min: 3
    if:
      type: text
      regex: '\.classList\.(add|remove)\s*\(\s*[''"]active[''"]'
  - id: lure-display-flex-toggle
    desc: Page display flex/none toggle
    crit: component
    conf: 0.7
    count_min: 2
    if:
      type: text
      regex: '\.style\.display\s*=\s*[''"](flex|none|block)[''"]'
  - id: lure-please-wait
    desc: Please-wait connecting status text
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?i)\b(Please wait|Connecting to|Joining)\b'
composite_rules:
  - id: countdown-auto-click-lure
    desc: Auto-click countdown lure orchestration
    crit: suspicious
    conf: 0.93
    needs: 3
    any:
      - id: objectives/execution/lure/countdown
    unless:
      - id: well-known/lib/tabulator/
