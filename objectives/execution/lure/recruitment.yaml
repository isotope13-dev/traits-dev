# Recruitment/Hiring Lures
# Social engineering lures targeting developers.
defaults:
  platforms: [windows, unix]
  for: [shell, scripts, javascript]
traits:
- id: dev-hiring-lure--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(job-interview|hiring-assignment)'
- id: dev-hiring-lure--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(recruitment-task|interview-project)'
- id: dev-hiring-lure--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(coding-challenge-verify|verify-human)'
- id: dev-hiring-lure--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(verify-dev|\btest-task\b.{0,80}\b(job|hiring)\b)'
- id: dev-hiring-lure--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(verify-dev|\btest-task\b.{0,80}\b(interview|recruitment)\b)'
composite_rules:
- id: dev-hiring-lure
  desc: Recruitment/Hiring lure targeting developers
  crit: suspicious
  conf: 0.8
  any:
  - id: dev-hiring-lure--rx-1
  - id: dev-hiring-lure--rx-2
  - id: dev-hiring-lure--rx-3
  - id: dev-hiring-lure--rx-4
  - id: dev-hiring-lure--rx-5
  needs: 1
