# Recruitment/Hiring Lures
# Social engineering lures targeting developers.
defaults:
  platforms: [windows, unix]
  for: [shell, scripts, javascript]
traits:
  - id: dev-hiring-lure
    desc: Recruitment/Hiring lure targeting developers
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)(job-interview|test-task|hiring-assignment|recruitment-task|interview-project|coding-challenge-verify|verify-human|verify-dev)'
