# ClickOnce Deployment Abuse
# ClickOnce is a legitimate Windows deployment mechanism abused by malware
# to download and execute arbitrary PE files from attacker-controlled URLs.
# SloppyLemming uses ClickOnce manifests to stage all payloads.
defaults:
  for: [pe, dll, binaries, scripts, documents]
  platforms: [windows]
  attack: T1218
traits:
  - id: clickonce-cache-path
    desc: ClickOnce application cache directory
    for: [pe, dll, csharp]
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: AppData\\Local\\Apps\\2\.0
  - id: clickonce-manifest-xml
    desc: ClickOnce deployment manifest XML namespace
    crit: notable
    conf: 0.9
    for: [documents]
    if:
      type: text
      substr: urn:schemas-microsoft-com:asm.v2
  - id: clickonce-deploy-url
    desc: ClickOnce deployment URL attribute
    crit: notable
    conf: 0.85
    for: [documents]
    if:
      type: text
      regex: deploymentProvider.{0,30}codebase
composite_rules:
  - id: clickonce-delivery
    desc: ClickOnce abuse for payload delivery
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: clickonce-cache-path
      - id: clickonce-manifest-xml
      - id: clickonce-deploy-url
