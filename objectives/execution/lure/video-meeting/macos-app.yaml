defaults:
  platforms: [macos]
  for: [macho, shell]
  attack: T1204.002
traits:
  - id: meeting-app-lure-options
    desc: Meeting app lure options
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)(app[_ -]?type|topic|meeting).{0,120}\b(zoom|teams|google|webex|slack)\b'
composite_rules:
  - id: meeting-app-archive-lure
    desc: Meeting app archive lure
    crit: suspicious
    conf: 0.92
    all:
      - id: meeting-app-lure-options
      - id: micro-behaviors/data/text/archive::app-archive-name
