defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1204.001
traits:
- id: browser-media-capture-api
  desc: Browser media capture API
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: 'navigator\.mediaDevices\.getUserMedia|getUserMedia\s*\('
- id: meeting-app-brand-lure
  desc: Meeting app brand lure
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)\b(?:Zoom|Google Meet|Microsoft Teams|Webex)\b'
- id: meeting-device-permission-lure--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: microphone
    case_insensitive: true
- id: meeting-device-permission-lure--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: permission
    case_insensitive: true
- id: meeting-device-permission-lure--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: access
    case_insensitive: true
- id: meeting-device-permission-lure--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: camera
    case_insensitive: true
- id: meeting-device-permission-lure--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: enable
    case_insensitive: true
- id: meeting-device-permission-lure--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: allow
    case_insensitive: true
- id: meeting-device-permission-lure--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: audio
    case_insensitive: true
- id: meeting-device-permission-lure--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: video
    case_insensitive: true
- id: mediarecorder-upload-loop--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'MediaRecorder[\s\S]{0,400}(?:fetch|XMLHttpRequest|WebSocket)[\s\S]{0,200}/upload'
- id: mediarecorder-upload-loop--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '/upload[\s\S]{0,400}MediaRecorder'
- id: meeting-websocket-media-stream--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'wss://[a-z0-9.-]{3,253}[^\s"''`<>]{0,120}[\s\S]{0,500}(?:MediaRecorder|getUserMedia)'
- id: meeting-websocket-media-stream--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(?:MediaRecorder|getUserMedia)[\s\S]{0,500}wss://[a-z0-9.-]{3,253}'
composite_rules:
- id: fake-video-meeting-media-lure
  desc: Fake video meeting media lure
  crit: suspicious
  conf: 0.94
  all:
  - id: browser-media-capture-api
  - id: meeting-app-brand-lure
  - id: meeting-device-permission-lure
  any:
  - id: objectives/execution/lure/clipboard::generic-windows-clipboard-execution-lure
  - id: objectives/execution/lure/clipboard::generic-windows-command-clipboard-lure
  - id: mediarecorder-upload-loop
  - id: meeting-websocket-media-stream
- id: fake-meeting-camera-exfiltration
  desc: Fake meeting camera exfiltration
  crit: hostile
  conf: 0.98
  all:
  - id: browser-media-capture-api
  - id: meeting-app-brand-lure
  any:
  - id: mediarecorder-upload-loop
  - id: meeting-websocket-media-stream
- id: fake-meeting-clickfix-execution
  desc: Fake meeting ClickFix execution
  crit: hostile
  conf: 0.98
  all:
  - id: fake-video-meeting-media-lure
  - id: objectives/execution/lure/clipboard::generic-windows-command-clipboard-lure
- id: meeting-device-permission-lure
  desc: Meeting device permission lure
  crit: component
  conf: 0.86
  any:
  - id: meeting-device-permission-lure--rx-1
  - id: meeting-device-permission-lure--rx-2
  - id: meeting-device-permission-lure--rx-3
  - id: meeting-device-permission-lure--rx-4
  - id: meeting-device-permission-lure--rx-5
  - id: meeting-device-permission-lure--rx-6
  - id: meeting-device-permission-lure--rx-7
  - id: meeting-device-permission-lure--rx-8
  needs: 1
- id: mediarecorder-upload-loop
  desc: MediaRecorder upload loop
  crit: suspicious
  conf: 0.94
  any:
  - id: mediarecorder-upload-loop--rx-9
  - id: mediarecorder-upload-loop--rx-10
  needs: 1
- id: meeting-websocket-media-stream
  desc: Meeting media WebSocket stream
  crit: suspicious
  conf: 0.92
  any:
  - id: meeting-websocket-media-stream--rx-11
  - id: meeting-websocket-media-stream--rx-12
  needs: 1
