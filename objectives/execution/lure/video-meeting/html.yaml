defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1204.001
traits:
- id: meeting-app-brand-lure
  desc: Meeting app brand lure
  crit: component
  conf: 0.86
  if:
    type: literal
    kind: string
    regex: '(?i)^(Zoom|Google Meet|Microsoft Teams|Webex)$'
- id: mediarecorder-upload-loop--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'MediaRecorder[\s\S]{0,400}(fetch|XMLHttpRequest|WebSocket)[\s\S]{0,200}/upload'
  count_max: 1017818
- id: mediarecorder-upload-loop--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '/upload[\s\S]{0,400}MediaRecorder'
  count_max: 1017819
- id: meeting-websocket-media-stream--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'wss://[a-z0-9.-]{3,253}[^\s"''`<>]{0,120}[\s\S]{0,500}(MediaRecorder|getUserMedia)'
  count_max: 1017820
- id: meeting-websocket-media-stream--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(MediaRecorder|getUserMedia)[\s\S]{0,500}wss://[a-z0-9.-]{3,253}'
  count_max: 1017821
composite_rules:
- id: fake-video-meeting-media-lure
  desc: Fake video meeting media lure
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/hardware/display/camera::browser-media-capture-api
  - id: meeting-app-brand-lure
  - id: meeting-device-permission-lure
  any:
  - id: objectives/execution/lure/clipboard::generic-windows-clipboard-execution-lure
  - id: objectives/execution/lure/clipboard::generic-windows-command-clipboard-lure
  - id: mediarecorder-upload-loop
  - id: meeting-websocket-media-stream
- id: fake-meeting-camera-exfiltration
  desc: Fake meeting camera exfiltration
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/hardware/display/camera::browser-media-capture-api
  - id: meeting-app-brand-lure
  any:
  - id: mediarecorder-upload-loop
  - id: meeting-websocket-media-stream
- id: fake-meeting-clickfix-execution
  desc: Fake meeting ClickFix execution
  crit: hostile
  conf: 0.98
  all:
  - id: fake-video-meeting-media-lure
  - id: objectives/execution/lure/clipboard::generic-windows-command-clipboard-lure
- id: meeting-device-permission-lure
  # A genuine lure pairs a permission-grant verb with a capture-device word in
  # proximity ("allow access to your camera and microphone"). A lone neutral
  # word (clinify docs saying "allow") is not a lure — hence the co-occurrence
  # requirement; the neutral terms live in metadata/permission/capture/media-terms.yaml.
  desc: Meeting device permission lure
  crit: component
  conf: 0.86
  near_bytes: 80
  all:
  - id: metadata/permission/capture::capture-device-term
  any:
  - id: metadata/permission/capture::permission-grant-access-verb
  - id: metadata/permission/capture::permission-grant-device-verb
- id: mediarecorder-upload-loop
  desc: MediaRecorder upload loop
  crit: suspicious
  conf: 0.94
  any:
  - id: mediarecorder-upload-loop--rx-9
  - id: mediarecorder-upload-loop--rx-10
- id: meeting-websocket-media-stream
  desc: Meeting media WebSocket stream
  crit: suspicious
  conf: 0.92
  any:
  - id: meeting-websocket-media-stream--rx-11
  - id: meeting-websocket-media-stream--rx-12
