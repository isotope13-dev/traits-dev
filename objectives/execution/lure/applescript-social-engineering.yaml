defaults:
  platforms: [macos]
  for: [applescript, macho]
  crit: hostile
  conf: 0.9
  mbc: B0021
  attack: T1204.001
traits:
  - id: storage-optimization-string
    desc: Storage Optimization string lure
    crit: component
    if:
      type: raw
      regex: (?i)Storage\s+Optimization
  - id: system-maintenance-string
    desc: System Maintenance string lure
    crit: component
    if:
      type: raw
      regex: (?i)System\s+Maintenance
  - id: cleanup-completed-string
    desc: cleanup completed string lure
    crit: component
    if:
      type: raw
      regex: (?i)cleanup\s+completed
  - id: freed-approximately-string
    desc: Freed approximately string lure
    crit: component
    if:
      type: raw
      regex: (?i)Freed\s+approximately.*?GB
  - id: chrome-update-lure
    desc: Chrome Update lure string
    crit: component
    if:
      type: raw
      regex: (?i)(Update\s+Chrome|Chrome\s+Update)
  - id: flash-player-lure
    desc: Adobe Flash Player lure string
    crit: component
    if:
      type: raw
      regex: (?i)Adobe\s+Flash\s+Player
  - id: security-update-lure
    desc: Security Update lure string
    crit: component
    if:
      type: raw
      regex: (?i)Security\s+Update
  - id: system-optimization-lure
    desc: System Optimization lure string
    crit: component
    if:
      type: raw
      regex: (?i)System\s+Optimization
composite_rules:
  - id: applescript-storage-lure
    desc: AppleScript storage optimization lure
    all:
      - id: storage-optimization-string
      - id: system-maintenance-string
      - id: micro-behaviors/process/create/script::shell-dup-cmd
  - id: applescript-cleanup-lure
    desc: AppleScript cleanup social engineering lure
    all:
      - id: cleanup-completed-string
      - id: freed-approximately-string
      - id: micro-behaviors/process/create/script::shell-dup-cmd
  - id: general-applescript-lure
    desc: General AppleScript social engineering lure (hostile)
    all:
      - id: micro-behaviors/process/create/script::shell-dup-cmd
    any:
      - id: chrome-update-lure
      - id: flash-player-lure
      - id: security-update-lure
      - id: system-optimization-lure
      - id: storage-optimization-string
      - id: cleanup-completed-string
