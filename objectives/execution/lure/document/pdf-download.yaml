defaults:
  platforms: [windows, unix]
  for: [pdf]
  attack: T1566.001
traits:
  - id: pdf-annotation-object
    desc: PDF annotation object
    crit: component
    conf: 0.86
    if:
      type: raw
      regex: '/Type\s*/Annot\b|/Subtype\s*/(Link|Widget)\b'
  - id: pdf-uri-msi-download
    desc: PDF URL to MSI payload
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: 'https?://[^\s<>()"]{4,220}\.msi\b'
  - id: pdf-uri-archive-download
    desc: PDF URL to archive payload
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: 'https?://[^\s<>()"]{4,220}\.(zip|7z|rar)\b'
composite_rules:
  - id: pdf-annotated-payload-download
    desc: PDF annotation downloads payload
    crit: hostile
    conf: 0.95
    all:
      - id: pdf-annotation-object
    any:
      - id: pdf-uri-msi-download
      - id: pdf-uri-archive-download
      - id: micro-behaviors/communications/http/url::cloud-executable-url
      - id: micro-behaviors/communications/http/url::cloud-archive-url

