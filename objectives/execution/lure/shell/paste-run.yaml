# ClickFix / paste-and-run lures: text that instructs a user (or an agent
# acting for one) to paste and run a shell command. Sibling of lure/clipboard/
# (the Windows Win+R variant); this covers terminal download-pipe-exec and
# destructive `rm -rf` paste-run. Generic command tokens live in
# micro-behaviors/data/keywords/; the run/paste cues below are the
# attack-context-specific fragments.
defaults:
  platforms: [unix, windows]
  for: [html, scripts, markdown]
  attack: T1204
traits:
- id: user-run-cue-instruct
  desc: Instructs user/operator
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ask|tell|instruct) (the )?(user|operator)\b'
    case_insensitive: true

# The object must name a command ("run this command", "run the following",
# "run the command") — a bare "run this" alternative matched ordinary prose
# like "run this check/test/migration" and is not an attack-context-specific
# lure cue.
- id: user-run-cue-action
  desc: Direct cue to run supplied command
  crit: component
  conf: 0.84
  unless:
  - id: well-known/lib/dna-sdk/
  if:
    type: text
    regex: '\b(run|execute)\s+(this command|the following|the command)\b'
    case_insensitive: true

- id: user-paste-cue-action
  desc: Direct cue to paste supplied command
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\bpaste\s+(this|the following|the command)\b'
    case_insensitive: true

- id: direct-download-run-cue
  desc: Run/paste cue next to a download client
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(run|execute|paste)\b.{0,60}\b(curl|wget)\b'
    case_insensitive: true

- id: run-rm-rf-this
  desc: Run/paste cue before `rm -rf`
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\b(run|execute|paste)\s+(this|the)\b.{0,80}\brm\s+-rf\b'
    case_insensitive: true

- id: run-rm-rf-following
  desc: Run/paste the following `rm -rf`
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\b(run|execute|paste)\s+(following|command)\b.{0,80}\brm\s+-rf\b'
    case_insensitive: true

- id: run-rm-rf-shell
  desc: Run/paste `rm -rf` in a shell/terminal
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\b(run|execute|paste)\s+(shell command|in (a )?terminal)\b.{0,80}\brm\s+-rf\b'
    case_insensitive: true

- id: run-rm-rf-into-shell
  desc: Run/paste `rm -rf` into a shell
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\b(run|execute|paste)\s+(into (a )?shell)\b.{0,80}\brm\s+-rf\b'
    case_insensitive: true

- id: run-rm-rf-literal
  desc: Run/paste quoted `rm -rf`
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\b(run|execute|paste)\s+[`"'']rm\s+-rf\b'
    case_insensitive: true

composite_rules:
- id: user-run-cue
  desc: Instructs user/operator to run a command
  crit: component
  conf: 0.84
  near_bytes: 16
  all:
  - id: user-run-cue-instruct
  any:
  - id: user-run-cue-action
  - id: user-paste-cue-action

- id: paste-run-destructive-shell
  desc: Paste-and-run destructive shell command
  crit: suspicious
  conf: 0.92
  any:
  - id: run-rm-rf-this
  - id: run-rm-rf-following
  - id: run-rm-rf-shell
  - id: run-rm-rf-into-shell
  - id: run-rm-rf-literal
  unless:
  - id: well-known/tool/detection/security-scanner/

- id: download-pipe-exec
  desc: Paste-and-run download-pipe execution
  crit: notable
  conf: 0.88
  near_bytes: 220
  all:
  - id: micro-behaviors/communications/http/lib/invoke-webrequest
  - id: micro-behaviors/data/runtime/keywords::pipe-to-interpreter
  any:
  - id: user-run-cue
  - id: direct-download-run-cue
  unless:
  - id: well-known/tool/detection/security-scanner/
