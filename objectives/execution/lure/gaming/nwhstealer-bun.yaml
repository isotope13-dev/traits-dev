defaults:
  platforms: [windows]
  for: [zip, pe, data]
  attack: T1204.002

traits:
  - id: nwh-game-trainer-zip-name
    desc: NWH game trainer ZIP lure
    crit: suspicious
    conf: 0.92
    for: [zip]
    if:
      type: path
      basename: true
      regex: '(?i)(Trainer_v1\.0|FiveM Mod)\.zip$'
  - id: nwh-software-activation-zip-name
    desc: NWH software activation ZIP lure
    crit: suspicious
    conf: 0.9
    for: [zip]
    if:
      type: path
      basename: true
      regex: '(?i)(Activation-Script|AutoTune 2026|Autodesk|GoGoTv_Plus).*\.zip$'
  - id: nwh-installer-exe-member
    desc: NWH archive Installer exe member
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Installer.exe
  - id: nwh-dw-loader-member
    desc: NWH archive DW loader member
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'DW[/\\]dw\.exe'
  - id: nwh-readme-dw-fallback
    desc: NWH Readme dw fallback
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)Readme\.txt.{0,240}dw\.exe'

composite_rules:
  - id: nwh-bun-loader-archive-layout
    desc: NWHStealer Bun archive layout
    crit: suspicious
    conf: 0.96
    all:
      - id: nwh-installer-exe-member
    any:
      - id: nwh-dw-loader-member
      - id: nwh-readme-dw-fallback
      - id: nwh-game-trainer-zip-name
      - id: nwh-software-activation-zip-name
