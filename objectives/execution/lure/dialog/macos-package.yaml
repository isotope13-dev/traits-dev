defaults:
  platforms: [macos]
  for: [data]
traits:
  - id: safari-versioned-dmg
    desc: Safari-branded versioned DMG name
    crit: suspicious
    conf: 0.92
    if:
      type: path
      basename: true
      regex: ^Safari_[0-9]+(\.[0-9]+){1,3}\.dmg$
  - id: safari-updater-bundle
    desc: Safari Updater bundle name
    crit: suspicious
    conf: 0.95
    if:
      type: path
      basename: true
      exact: Safari Updater.app
composite_rules:
  - id: safari-update-dmg-lure
    desc: Safari update package lure
    crit: suspicious
    conf: 0.92
    any:
      - id: safari-versioned-dmg
      - id: safari-updater-bundle
