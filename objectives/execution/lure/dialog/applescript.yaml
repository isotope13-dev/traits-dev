defaults:
  for: [source]
  platforms:
    - macos
  attack: T1204.002
traits:
  - id: compat-wizard
    desc: Compatibility Wizard lure text
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)Compatibility Wizard
  - id: compat-issue
    desc: Compatibility issue lure text
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)\b(this|your|the)\s+\w+\s+(has\s+)?compatibility\s+issue
  - id: file-not-opened
    desc: File couldn't be opened lure
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)couldn't be opened
  - id: missing-extensions
    desc: Missing extensions lure text
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)extensions are missing
  - id: missing-required-ext
    desc: Missing required extensions lure
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)Missing required extensions
  - id: missing-required-comp
    desc: Missing required components lure
    crit: suspicious
    conf: 0.85
    for: [applescript]
    unless:
      - type: text
        regex: '(?i)test\s+"[^"]*(url|uri)[^"]*missing required components'
    if:
      type: text
      regex: (?i)Missing required components
  - id: required-components
    desc: Required components lure text
    crit: notable
    conf: 0.8
    for: [applescript]
    if:
      type: text
      regex: (?i)required components
  - id: required-extensions
    desc: Required extensions lure text
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/lang/source::codegen-source-path
    if:
      type: text
      regex: (?i)required extensions
  - id: system-update
    desc: System update lure text
    crit: notable
    conf: 0.8
    for: [applescript, shell]
    if:
      type: text
      regex: (?i)System update
  - id: check-updates
    desc: Check updates lure text
    crit: notable
    conf: 0.75
    for:
      - applescript
      - shell
    if:
      type: string_literal
      regex: (?i)check(ing)?\s+(for\s+)?updates
  - id: install-components
    desc: Install components lure text
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\binstall(ing)?\s+(the\s+|missing\s+|required\s+|additional\s+)?components\b'
composite_rules:
  - id: missing-message
    desc: Missing components/extensions message
    crit: suspicious
    conf: 0.85
    any:
      - id: missing-extensions
      - id: missing-required-ext
      - id: missing-required-comp
  - id: user-action-prompt
    desc: User action prompt text
    crit: notable
    conf: 0.75
    any:
      - id: micro-behaviors/ui/dialog/prompt::click-button
      - id: micro-behaviors/ui/dialog/prompt::press-to-continue
  - id: update-message
    desc: Update-related lure message
    crit: notable
    conf: 0.8
    any:
      - id: system-update
      - id: check-updates
  - id: compat-lure
    desc: Compatibility-related lure message
    crit: suspicious
    conf: 0.9
    any:
      - id: compat-wizard
      - id: compat-issue
      - id: missing-extensions
      - id: missing-required-ext
  - id: compat-wizard-attack
    desc: Compatibility Wizard user execution lure
    crit: suspicious
    conf: 0.95
    for:
      - applescript
      - shell
    all:
      - id: compat-wizard
      - id: missing-message
  - id: fake-update-attack
    desc: Fake system update user execution
    crit: suspicious
    conf: 0.9
    for:
      - applescript
      - shell
    all:
      - id: update-message
      - id: install-components
  - id: missing-components-attack
    desc: Missing components user execution lure
    crit: suspicious
    conf: 0.9
    for:
      - applescript
      - shell
    all:
      - id: missing-message
      - id: user-action-prompt
  - id: lure-with-shell
    desc: User execution lure with shell
    crit: suspicious
    conf: 0.95
    for:
      - applescript
    all:
      - id: compat-lure
      - id: micro-behaviors/process/create/shell/spawn::shell-execution
