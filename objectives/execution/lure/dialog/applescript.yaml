defaults:
  for: [applescript, shell]
  platforms: [macos]
  attack: T1204.002
traits:
  - id: compat-wizard
    desc: Compatibility Wizard lure text
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)Compatibility Wizard
  - id: compat-issue
    desc: Compatibility issue lure text
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)\b(this|your|the)\s+\w+\s+(has\s+)?compatibility\s+issue
  - id: file-not-opened
    desc: File couldn't be opened lure
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)couldn't be opened
  - id: missing-extensions
    desc: Missing extensions lure text
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)extensions are missing
  - id: missing-required-ext
    desc: Missing required extensions lure
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)Missing required extensions
  - id: missing-required-comp
    desc: Missing required components lure
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)Missing required components
  - id: required-components
    desc: Required components lure text
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)required components
  - id: required-extensions
    desc: Required extensions lure text
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)required extensions
  - id: system-update
    desc: System update lure text
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)System update
  - id: check-updates
    desc: Check updates lure text
    crit: notable
    conf: 0.75
    for:
      - applescript
    if:
      type: text
      regex: (?i)check(ing)?\s+(for\s+)?updates
  - id: install-components
    desc: Install components lure text
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)install.{0,50}components
  - id: teams-sdk-update
    desc: Microsoft Teams SDK update lure
    crit: suspicious
    conf: 0.95
    for:
      - applescript
    if:
      type: text
      regex: (?i)Microsoft Teams.{0,40}SDK.{0,30}(update|newer version)
  - id: deprecated-sdk-version
    desc: Deprecated SDK version lure
    crit: notable
    conf: 0.85
    for:
      - applescript
    if:
      type: text
      regex: (?i)current Microsoft Teams SDK version is deprecated
  - id: click-button
    desc: Instructs user to click button
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)click the.{0,30}button
  - id: press-continue
    desc: Instructs user to press to continue
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)press.{0,30}to continue
composite_rules:
  - id: missing-message
    desc: Missing components/extensions message
    crit: suspicious
    conf: 0.85
    any:
      - id: missing-extensions
      - id: missing-required-ext
      - id: missing-required-comp
  - id: user-action-prompt
    desc: User action prompt text
    crit: notable
    conf: 0.75
    any:
      - id: click-button
      - id: press-continue
  - id: update-message
    desc: Update-related lure message
    crit: notable
    conf: 0.8
    any:
      - id: system-update
      - id: check-updates
      - id: deprecated-sdk-version
  - id: compat-lure
    desc: Compatibility-related lure message
    crit: suspicious
    conf: 0.9
    any:
      - id: compat-wizard
      - id: compat-issue
      - id: missing-extensions
      - id: missing-required-ext
  - id: teams-update-lure
    desc: Microsoft Teams update lure text
    crit: suspicious
    conf: 0.95
    for:
      - applescript
    all:
      - id: teams-sdk-update
    any:
      - id: deprecated-sdk-version
      - id: user-action-prompt
  - id: compat-wizard-attack
    desc: Compatibility Wizard user execution lure
    crit: suspicious
    conf: 0.95
    all:
      - id: compat-wizard
      - id: missing-message
  - id: fake-update-attack
    desc: Fake system update user execution
    crit: suspicious
    conf: 0.9
    all:
      - id: update-message
      - id: install-components
  - id: missing-components-attack
    desc: Missing components user execution lure
    crit: suspicious
    conf: 0.9
    all:
      - id: missing-message
      - id: user-action-prompt
  - id: lure-with-shell
    desc: User execution lure with shell
    crit: suspicious
    conf: 0.95
    for:
      - applescript
    all:
      - id: compat-lure
      - id: micro-behaviors/process/create/shell::shell-execution
  - id: compiled-compat-loader
    desc: Compiled compatibility lure loads script
    crit: hostile
    conf: 0.97
    for:
      - applescript
    all:
      - id: compat-wizard-attack
      - id: update-message
      - id: micro-behaviors/process/create/script::shell-dup-execution
      - id: micro-behaviors/process/create/script::external-script
