defaults:
  platforms: [windows]
  for: [pe]
  attack: T1204.002

traits:
  - id: italian-game-builder-menu
    desc: Italian game builder menu
    crit: component
    conf: 0.92
    if:
      type: text
      exact: MENU DI SELEZIONE DEL GENERE
  - id: game-project-config-output
    desc: Game project config output
    crit: component
    conf: 0.9
    if:
      type: text
      exact: CONFIGURAZIONE DEL PROGETTO
  - id: game-genre-choice-cluster
    desc: Game genre choice cluster
    crit: component
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: (?i)(Sparatutto|MMORPG|Sopravvivenza|Qualit. Grafica)

composite_rules:
  - id: italian-game-project-lure
    desc: Italian game project lure
    crit: suspicious
    conf: 0.94
    all:
      - id: italian-game-builder-menu
      - id: game-project-config-output
      - id: game-genre-choice-cluster
    any:
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: objectives/command-and-control/dropper/delivery/download-execute::local-host-life-download-raw-url
