defaults:
  platforms:
  - macos
  - windows
  for:
  - html
  attack: T1204.001
traits:
- id: win-r-instruction
  desc: Instructs Run dialog open
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: Press <strong>Win</strong>
- id: ctrl-v-instruction
  desc: Instructs clipboard paste
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: Then press <strong>Ctrl</strong>
- id: r-key-instruction
  desc: Instructs user to use R key
  crit: component
  conf: 0.75
  if:
    type: text
    substr: <strong>R</strong>
- id: v-key-instruction
  desc: Instructs user to use V key
  crit: component
  conf: 0.75
  if:
    type: text
    substr: <strong>V</strong>
- id: enter-instruction
  desc: Instructs user to press Enter
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: Press <strong>Enter</strong>
- id: hidden-instruction-panel
  desc: Hidden instruction panel in DOM
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: '<div id="instruction" class="cb-container" style="display: none;" role="alert">'
- id: local-stage-script
  desc: Numeric local script stage
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: '<script src="112.js"></script>'
- id: macos-command-space-instruction
  desc: Instructs user to open Spotlight
  crit: notable
  conf: 0.97
  platforms: [macos]
  if:
    type: text
    regex: '<b>⌘</b>\s*\+\s*<b>SPACE</b>.{0,50}open spotlight'
- id: terminal-launch-instruction
  desc: Instructs user to launch Terminal
  crit: notable
  conf: 0.96
  platforms: [macos]
  if:
    type: text
    regex: 'Type\s*<b>Terminal</b>\s*and press\s*<b>return</b>'
- id: terminal-paste-execution
  desc: Instructs pasting command into Terminal
  crit: notable
  conf: 0.98
  platforms: [macos]
  if:
    type: text
    regex: 'Paste\s*\(<b>⌘</b>\s*\+\s*<b>V</b>\).{0,50}<b>return</b>'
- id: fake-verification-id-message
  desc: Fake reCAPTCHA verification ID output
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'reCAPTCHA Verification ID:.{0,80}id="verification-id"'
- id: verification-id-dom
  desc: Verification ID DOM marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: id="verification-id"
- id: verify-button-id
  desc: Verify button DOM marker
  crit: component
  conf: 0.75
  if:
    type: text
    substr: id="verify-button"
- id: hidden-checkbox-window
  desc: Hidden checkbox verification window
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'id="checkbox-window" class="checkbox-window".{0,40}display'
- id: hidden-step-ui
  desc: Multi-step hidden verification UI
  crit: suspicious
  conf: 0.88
  count_min: 4
  if:
    type: text
    regex: 'class="step[123]".{0,40}display'
- id: local-main-js-stage
  desc: Local main.js stage loader
  crit: suspicious
  conf: 0.88
  if:
    type: text
    substr: '<script src="main.js"></script>'
- id: data-uri-favicon
  desc: Empty data URI favicon
  crit: component
  conf: 0.8
  if:
    type: text
    substr: 'id="dynamic-favicon" href="data:,"'
- id: storage-dev-cloudflare-verify-domain
  desc: Cloudflare verify lure on storage.dev
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: '[a-z0-9-]*cloudflare-verify[a-z0-9-]*\.t3\.storage\.dev'
- id: connection-security-review-text
  desc: Requests connection security review
  crit: notable
  conf: 0.82
  if:
    type: text
    substr: needs to review the security of your connection before proceeding.
- id: compact-verification-html
  desc: Compact staged verification HTML
  crit: component
  conf: 0.72
  size_max: 8192
  if:
    type: metrics
    field: binary.string_count
    min: 45
    max: 90
- id: win-r-open-run-instruction
  desc: Open Run with Win plus R
  crit: notable
  conf: 0.98
  platforms: [windows]
  if:
    type: text
    substr: Win + R to open Run.
- id: ctrl-v-paste-command-instruction
  desc: Paste command with Ctrl plus V
  crit: notable
  conf: 0.98
  platforms: [windows]
  if:
    type: text
    substr: Copy and paste Ctrl + V the following command
- id: verification-code-copy-button
  desc: Verification code panel with copy button
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Verification Code
- id: copied-button-feedback
  desc: Copy button changed to Copied feedback
  crit: component
  conf: 0.82
  if:
    type: text
    substr: Copied!
- id: unusual-web-traffic-warning
  desc: Fake unusual web traffic warning
  crit: suspicious
  conf: 0.96
  if:
    type: text
    substr: Unusual Web Traffic Detected
- id: automated-verification-failed
  desc: Claims automated verification attempts failed
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: Automated verification attempts have failed
- id: browser-clipboard-write
  desc: Browser clipboard write call
  crit: suspicious
  conf: 0.97
  if:
    type: symbol
    exact: writeText
- id: encoded-browser-clipboard-write
  desc: Encoded browser clipboard write marker
  crit: suspicious
  conf: 0.96
  if:
    type: text
    substr: bmF2aWdhdG9yLmNsaXBib2FyZC53cml0ZVRleHQ
- id: localstorage-cls-gate
  desc: Uses localStorage cls counter to gate lure
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: localStorage.cls
- id: encoded-localstorage-cls-gate
  desc: Encoded localStorage cls counter marker
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: bG9jYWxTdG9yYWdlLmNscy
- id: verification-code-decoy-text
  desc: Fake verification code decoy text
  crit: component
  conf: 0.93
  if:
    type: text
    substr: Cloudflare protection
- id: click-count-gate
  desc: "Multi-click gating pre revealing instructions"
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: clickCount\s*===\s*clickCounts
- id: encoded-copy-button
  desc: Encoded copy button marker
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: Y29weS1idXR0b24
- id: encoded-copy-button-label
  desc: Encoded Copy button label
  crit: component
  conf: 0.85
  if:
    type: text
    substr: Q29weTwvYnV0dG9u
- id: encoded-ctrl-v-lure
  desc: Encoded Ctrl + V instruction marker
  crit: notable
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    substr: Q3RybCArIFY
- id: run-dialog-instruction-generic--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: '(?i)\brun\s+dialog\b'
    case_insensitive: true
  count_max: 1017730
- id: run-dialog-instruction-generic--rx-2
  desc: Presses a Windows shortcut key
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: '(?i)\bpress\s+((the|your)\s+)?(windows?\s+key|win\s*\+\s*r|r\s+key|run\s+dialog)\b'
  count_max: 1017731
- id: run-dialog-instruction-generic--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    substr: 229E
    case_insensitive: true
  count_max: 1017732
- id: run-dialog-instruction-generic--rx-4
  desc: Windows shortcut key marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: '(?i)\bwindows?\s+key\b|\bwin\s*\+\s*r\b|\bhold\s+(the\s+)?win(dows)?\b'
  count_max: 1017733
- id: run-dialog-instruction-generic--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: '(?i)\bhold\b.{0,24}\b(win(dows)?|key|r)\b'
  count_max: 1017734
- id: run-dialog-instruction-generic--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: '(?i)\bopen\b.{0,40}\b(run|dialog)\b'
  count_max: 1017735
- id: paste-enter-instruction-generic--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.88
  platforms: [windows]
  if:
    type: text
    regex: '(?i)(Ctrl\s*(\+|and)\s*V|paste).{0,120}(Enter|Return)'
  count_max: 1017736
- id: paste-enter-instruction-generic--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.88
  platforms: [windows]
  if:
    type: text
    regex: '(Enter|Return).{0,120}(Ctrl\s*(\+|and)\s*V|paste)'
  count_max: 1017737
- id: clipboard-writes-windows-command--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  platforms: [windows]
  if:
    type: text
    substr: navigator.clipboard.writeText
    case_insensitive: true
  count_max: 1017738
- id: clipboard-writes-windows-command--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.94
  platforms: [windows]
  if:
    type: text
    substr: bitsadmin
    case_insensitive: true
  count_max: 1017740
- id: clipboard-writes-windows-command--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.94
  platforms: [windows]
  if:
    type: text
    substr: certutil
    case_insensitive: true
  count_max: 1017741
- id: clipboard-writes-windows-command--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.94
  platforms: [windows]
  if:
    type: text
    substr: cscript
    case_insensitive: true
  count_max: 1017744
- id: clipboard-writes-windows-command--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.94
  platforms: [windows]
  if:
    type: text
    substr: wscript
    case_insensitive: true
  count_max: 1017745
- id: remote-command-fetch
  desc: Browser fetches a remote command response
  crit: notable
  conf: 0.95
  for: [html, powershell]
  if:
    type: text
    regex: '(?is)fetch\s*\(\s*["''][^"'']{0,240}[?&]get_command=1["'']\s*\)'
- id: command-response-assignment
  desc: Stores a command returned by a server
  crit: notable
  conf: 0.98
  for: [html, powershell]
  if:
    type: text
    regex: '(?i)command\s*=\s*data\.command'
- id: command-copy-operation
  desc: Browser copies text to the clipboard
  crit: notable
  conf: 0.98
  for: [html, powershell]
  if:
    type: text
    regex: '(?i)execCommand\s*\(\s*["'']copy["'']\s*\)'
- id: command-clipboarddata-write
  desc: Browser writes command text to clipboard data
  crit: notable
  conf: 0.98
  for: [html, powershell]
  if:
    type: text
    regex: '(?i)clipboardData\.setData\s*\('
- id: remote-human-check-page
  desc: Page presents a human-verification lure
  crit: suspicious
  conf: 0.98
  for: [html, powershell]
  if:
    type: text
    substr: '<title>Checking if you are human</title>'
- id: remote-winr-instruction
  desc: Page instructs the Windows Run shortcut
  crit: suspicious
  conf: 0.97
  for: [html, powershell]
  if:
    type: text
    regex: '(?i)Windows Key.{0,120}\+\s*<b>R</b>'
- id: remote-ctrlv-instruction
  desc: Page instructs a Ctrl-V paste
  crit: suspicious
  conf: 0.97
  for: [html, powershell]
  if:
    type: text
    regex: '(?i)Ctrl.{0,80}\+\s*<b>V</b>'
composite_rules:
- id: command-response-clipboard-copy
  desc: Returned command is copied to the clipboard
  crit: suspicious
  conf: 0.99
  for: [html, powershell]
  all:
  - id: command-response-assignment
  any:
  - id: command-copy-operation
  - id: command-clipboarddata-write
- id: fake-captcha-winr-paste-instructions
  desc: Fake verification page gives paste instructions
  crit: suspicious
  conf: 0.98
  for: [html, powershell]
  all:
  - id: remote-human-check-page
  - id: remote-winr-instruction
  - id: remote-ctrlv-instruction
- id: fake-captcha-remote-command-clipboard
  desc: Fake CAPTCHA stages a remote command for clipboard execution
  crit: hostile
  conf: 0.995
  attack: T1204.001,T1059.001,T1105
  for: [html, powershell]
  all:
  - id: remote-command-fetch
  - id: command-response-clipboard-copy
  - id: fake-captcha-winr-paste-instructions
- id: clipboard-execution-sequence
  desc: Win+R clipboard execution sequence
  crit: suspicious
  conf: 0.98
  all:
  - id: win-r-instruction
  - id: r-key-instruction
  - id: ctrl-v-instruction
  - id: v-key-instruction
  - id: enter-instruction
- id: staged-clipboard-execution-lure
  desc: Hidden staged clipboard execution lure
  crit: suspicious
  conf: 0.98
  all:
  - id: clipboard-execution-sequence
  - id: hidden-instruction-panel
  any:
  - id: local-stage-script
  - id: micro-behaviors/ui/window/theme::theme-adaptation
- id: fake-captcha-clipboard-execution
  desc: Fake CAPTCHA clipboard execution lure
  crit: suspicious
  conf: 0.99
  all:
  - id: staged-clipboard-execution-lure
  - id: objectives/credential-access/phishing/captcha::cloudflare-turnstile
  any:
  - id: micro-behaviors/communications/http/client/cdn::multiple-frontend-cdn-assets
- id: macos-terminal-clipboard-sequence
  desc: Spotlight to Terminal paste execution sequence
  crit: suspicious
  conf: 0.99
  platforms: [macos]
  all:
  - id: macos-command-space-instruction
  - id: terminal-launch-instruction
  - id: terminal-paste-execution
  any:
  - id: fake-verification-id-message
  - id: verification-id-dom
- id: staged-verification-ui-lure
  desc: Staged hidden verification interface
  crit: suspicious
  conf: 0.95
  all:
  - id: hidden-checkbox-window
  - id: verify-button-id
  any:
  - id: hidden-step-ui
  - id: local-main-js-stage
  - id: compact-verification-html
  - id: data-uri-favicon
- id: cloudflare-themed-terminal-lure
  desc: Cloudflare themed Terminal verification lure
  crit: suspicious
  conf: 0.99
  platforms: [macos]
  all:
  - id: macos-terminal-clipboard-sequence
  - id: staged-verification-ui-lure
  any:
  - id: objectives/credential-access/phishing/captcha::cloudflare-turnstile-camouflaged
  - id: objectives/credential-access/phishing/captcha::cloudflare-style-verification-page
  - id: storage-dev-cloudflare-verify-domain
  - id: objectives/credential-access/phishing/captcha::cloudflare-ray-id
  - id: connection-security-review-text
- id: fake-cloudflare-macos-clipboard-execution
  desc: Fake Cloudflare macOS clipboard execution lure
  crit: hostile
  conf: 0.995
  platforms: [macos]
  all:
  - id: cloudflare-themed-terminal-lure
  - id: fake-verification-id-message
  - id: local-main-js-stage
  any:
  - id: storage-dev-cloudflare-verify-domain
  - id: objectives/credential-access/phishing/captcha::cloudflare-turnstile
  - id: objectives/credential-access/phishing/captcha::cloudflare-style-verification-page
- id: clipboard-copy-command-lure
  desc: Verification panel that copies a hidden command
  crit: suspicious
  conf: 0.98
  all:
  - id: encoded-copy-button
  - id: encoded-browser-clipboard-write
  any:
  - id: encoded-copy-button-label
  - id: copied-button-feedback
  - id: verification-code-decoy-text
  - id: verification-code-copy-button
- id: fake-cloudflare-windows-clipboard-execution
  desc: Fake Cloudflare clipboard execution lure
  crit: hostile
  conf: 0.995
  platforms: [windows]
  all:
  - id: encoded-ctrl-v-lure
  - id: clipboard-copy-command-lure
  any:
  - id: encoded-localstorage-cls-gate
  - id: localstorage-cls-gate
  - id: click-count-gate
  - id: objectives/credential-access/phishing/captcha::cloudflare-style-verification-page
- id: generic-windows-clipboard-execution-lure
  desc: Generic Windows clipboard execution lure
  crit: suspicious
  conf: 0.94
  platforms: [windows]
  scope: leaf
  all:
  - id: run-dialog-instruction-generic
  - id: paste-enter-instruction-generic
  any:
  - id: browser-clipboard-write
  - id: encoded-browser-clipboard-write
  - id: clipboard-copy-command-lure
  - id: clipboard-writes-windows-command
- id: generic-windows-command-clipboard-lure
  desc: Windows command copied to clipboard
  crit: hostile
  conf: 0.97
  platforms: [windows]
  scope: leaf
  all:
  - id: run-dialog-instruction-generic
  - id: clipboard-writes-windows-command
  any:
  - id: paste-enter-instruction-generic
  - id: copied-button-feedback
  - id: verification-code-copy-button
  - id: unusual-web-traffic-warning
- id: run-dialog-instruction-generic-verb
  desc: Run dialog instruction verb
  crit: component
  conf: 0.84
  platforms: [windows]
  any:
  - id: run-dialog-instruction-generic--rx-2
  - id: run-dialog-instruction-generic--rx-5
  - id: run-dialog-instruction-generic--rx-6
- id: run-dialog-instruction-generic-marker
  desc: Run dialog instruction marker
  crit: component
  conf: 0.86
  platforms: [windows]
  any:
  - id: run-dialog-instruction-generic--rx-1
  - id: run-dialog-instruction-generic--rx-3
  - id: run-dialog-instruction-generic--rx-4
- id: run-dialog-instruction-generic
  desc: Generic Win+R Run instruction
  crit: notable
  conf: 0.9
  platforms: [windows]
  scope: leaf
  all:
  - id: run-dialog-instruction-generic-verb
  - id: run-dialog-instruction-generic-marker
  unless:
  - id: metadata/document/html/
- id: paste-enter-instruction-generic
  desc: Generic paste then enter instruction
  crit: notable
  conf: 0.88
  platforms: [windows]
  any:
  - id: paste-enter-instruction-generic--rx-7
  - id: paste-enter-instruction-generic--rx-8
- id: clipboard-writes-windows-command
  desc: Clipboard writes Windows command
  crit: suspicious
  conf: 0.94
  platforms: [windows]
  all:
  - id: clipboard-writes-windows-command--rx-9
  any:
  - id: micro-behaviors/process/create/shell/lang::powershell-keyword
  - id: clipboard-writes-windows-command--rx-11
  - id: clipboard-writes-windows-command--rx-12
  - id: micro-behaviors/process/create/hcom::regsvr32
  - id: micro-behaviors/mem/read/dump::comsvcs-dump--rx-2
  - id: clipboard-writes-windows-command--rx-15
  - id: clipboard-writes-windows-command--rx-16
