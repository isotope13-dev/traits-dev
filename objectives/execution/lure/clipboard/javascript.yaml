defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1204.001
traits:
  - id: checkbox-click-trigger
    desc: Checkbox click starts action
    crit: component
    conf: 0.86
    if:
      type: text
      regex: "\\$\\(['\"]#checkbox1['\"]\\)\\.click\\s*\\("
  - id: verify-php-stage
    desc: Loads verify.php stage
    crit: component
    conf: 0.9
    if:
      type: text
      word: verify.php
  - id: send-tg-php-stage
    desc: Sends data to Telegram relay
    crit: suspicious
    conf: 0.92
    if:
      type: text
      word: send_tg.php
  - id: ajax-message-field
    desc: Ajax message field
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: "\\bmessage\\s*:"
    unless:
      - id: metadata/library/structure::js-large-module-bundle
  - id: verify-text-to-textarea
    desc: Verify response assigned textarea
    crit: component
    conf: 0.88
    if:
      type: text
      regex: "\\.value\\s*=\\s*verifyText\\b"
  - id: open-fix-beacons
    desc: Open and fix query beacons
    crit: component
    conf: 0.86
    count_min: 2
    if:
      type: text
      regex: "\\?(open=open|fix=fix)"
  - id: instruction-panel-reveal
    desc: Reveals hidden instruction panel
    crit: component
    conf: 0.82
    if:
      type: text
      regex: "#instruction[\\s\\S]{0,80}visible"
composite_rules:
  - id: verify-response-clipboard-copy
    desc: Server response copied to clipboard
    crit: suspicious
    conf: 0.94
    all:
      - id: verify-php-stage
      - id: verify-text-to-textarea
      - id: micro-behaviors/os/clipboard/access::browser-dom-clipboard-copy
    any:
      - id: checkbox-click-trigger
      - id: instruction-panel-reveal
  - id: telegram-relay-post
    desc: Posts staged content to Telegram relay
    crit: suspicious
    conf: 0.93
    near_lines: 5
    all:
      - id: send-tg-php-stage
      - id: ajax-message-field
      - id: micro-behaviors/communications/http/post::post
  - id: clickfix-clipboard-execution-lure
    desc: ClickFix clipboard execution lure
    crit: hostile
    conf: 0.98
    all:
      - id: verify-response-clipboard-copy
      - id: telegram-relay-post
    any:
      - id: open-fix-beacons
      - id: instruction-panel-reveal
      - id: checkbox-click-trigger
