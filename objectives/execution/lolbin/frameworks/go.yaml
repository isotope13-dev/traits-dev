defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1218
composite_rules:
  - id: go-godoc-http-server-exec
    desc: godoc HTTP server execution
    crit: suspicious
    conf: 0.9
    near_lines: 30
    all:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/communications/http/server/listener::go-godoc-http-command
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
