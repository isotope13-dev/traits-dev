defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1218

traits:
  - id: ruby-launchctl-runsh
    desc: Ruby launchctl runsh
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: launchctl runsh

  - id: ruby-sqlite-shell-command
    desc: Ruby sqlite .shell command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'sqlite3 :memory: ".shell'

  - id: ruby-curl-beacon-lolbin
    desc: Ruby curl beacon lolbin
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: curl -s -m 5 --max-time 5

composite_rules:
  - id: ruby-macos-lolbin-chain
    desc: Ruby macOS LOLBin chain
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: ruby-launchctl-runsh
      - id: ruby-sqlite-shell-command
      - id: ruby-curl-beacon-lolbin
