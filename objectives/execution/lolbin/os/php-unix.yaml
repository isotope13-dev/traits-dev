defaults:
  platforms: [unix]
  for: [php]
  attack: T1218

traits:
  - id: php-multi-lolbin-chain
    desc: PHP multi-LOLBin chain
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'find /tmp[\s\S]{0,260}base64 -d \| bash[\s\S]{0,420}awk_lolbin'

  - id: php-find-exec-lolbin
    desc: PHP find exec LOLBin
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "find /tmp -maxdepth 1 -type d -exec bash"

  - id: php-base64-bash-lolbin
    desc: PHP base64 bash LOLBin
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "base64 -d | bash"

  - id: php-tar-checkpoint-exec
    desc: PHP tar checkpoint exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: --checkpoint-action=exec=

composite_rules:
  - id: php-unix-lolbin-chain
    desc: PHP Unix LOLBin chain
    crit: hostile
    conf: 0.98
    any:
      - id: php-multi-lolbin-chain
      - id: php-find-exec-lolbin
      - id: php-base64-bash-lolbin
      - id: php-tar-checkpoint-exec
    needs: 2
