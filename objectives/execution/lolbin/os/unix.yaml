# Unix LOLBins (Living-off-the-Land Binaries)
# MBC: C0049 (Execution - LoLBins)
# ATT&CK: T1218 (System Binary Proxy Execution)
defaults:
  platforms: [unix]
  conf: 0.9
traits:
  - id: python-shell-execution
    desc: Shell execution via python -c
    crit: notable
    for: [shell]
    if:
      type: text
      regex: 'python[23]?\s+-c\s+[''"].{0,200}(import\s+os|os\.system|subprocess\.)'

  - id: perl-shell-execution
    desc: Shell execution via perl -e
    crit: notable
    for: [shell]
    if:
      type: text
      regex: 'perl\s+-e\s+[''"].{0,200}(exec\(|system\()'

  - id: ruby-shell-execution
    desc: Shell execution via ruby -e
    crit: notable
    for: [shell]
    if:
      type: text
      regex: 'ruby\s+-e\s+[''"].{0,200}(exec\(|system\()'

  - id: bash-c-execution
    desc: Command execution via bash -c
    crit: notable
    for: [shell, scripts]
    if:
      type: text
      regex: '/bin/bash\s+-c\s+[''"]'

  - id: suspicious-bash-c-redirection
    desc: Bash -c with heavy redirection (stealth signal)
    crit: suspicious
    conf: 0.85
    for: [shell, scripts]
    if:
      type: text
      regex: '/bin/bash\s+-c\s+[''"].{0,200}>/dev/null\s+2>&1'

composite_rules:
  - id: unix-lolbin
    desc: Any Unix LOLbin execution
    crit: notable
    any:
      - id: python-shell-execution
      - id: perl-shell-execution
      - id: ruby-shell-execution
      - id: bash-c-execution

  - id: stealth-lolbin-execution
    desc: Stealthy LOLbin execution with redirection
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/package/testing/presence/platform_suites::coreutils-test-functions
      - id: metadata/package/testing/presence::linux-kselftest-shell
      - id: metadata/package/tooling::autoconf-generated-script
      - id: metadata/package/tooling::libtool-generated-script
    all:
      - id: unix-lolbin
    any:
      - id: suspicious-bash-c-redirection
      - id: micro-behaviors/process/create/shell::shell-null-redirection
