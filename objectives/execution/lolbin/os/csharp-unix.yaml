defaults:
  platforms: [qnx, unix, windows]
  for: [csharp, pe]
  attack: T1218

traits:
  - id: csharp-unix-sh-paths
    desc: C# Unix shell path list
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /usr/bin/sh

  - id: csharp-unix-curl-paths
    desc: C# Unix curl path list
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /usr/bin/curl

  - id: csharp-unix-wget-paths
    desc: C# Unix wget path list
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /usr/bin/wget

  - id: csharp-unix-curl-devnull-exec
    desc: C# curl exec to /dev/null
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'exec \{0\} -s -m 10 -o /dev/null \{1\}'

  - id: csharp-unix-uname-lolbin
    desc: C# uname LOLBin exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "exec uname -a"

composite_rules:
  - id: csharp-unix-http-lolbin-exec
    desc: C# Unix HTTP LOLBin exec
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-unix-sh-paths
      - id: csharp-unix-curl-paths
      - id: csharp-unix-curl-devnull-exec
    any:
      - id: csharp-unix-wget-paths
      - id: csharp-unix-uname-lolbin
