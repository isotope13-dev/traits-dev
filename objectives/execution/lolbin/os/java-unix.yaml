defaults:
  platforms: [unix]
  for: [java, class, jar]
  attack: T1218

traits:
  - id: java-curl-payload-drop
    desc: Java curl payload drop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'curl[\s\S]{0,180}/payload\.sh[\s\S]{0,180}/tmp/\.callback\.sh'

composite_rules:
  - id: java-bash-lolbin
    desc: Java launches bash as a LOLBin
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/process/interpreter/shell::java-bash-process-launch
      - id: micro-behaviors/process/interpreter/shell::java-bash-command-token

  - id: java-python-lolbin
    desc: Java launches Python as a LOLBin
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/process/interpreter/python::java-python3-process-launch
      - id: micro-behaviors/process/interpreter/python::java-python3-interpreter-token
    unless:
      - id: metadata/package/files/system-package::jvm-bundled-native-dependency
      - id: metadata/package/files/system-package::app-bundled-example-source
      - id: well-known/app/lingua-franca-vscode/

  - id: java-unix-lolbin-dropper
    desc: Java Unix LOLBin dropper
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: java-bash-lolbin
      - id: java-python-lolbin
      - id: java-curl-payload-drop
