defaults:
  platforms: [unix]
  for: [java, class, jar]
  attack: T1218

traits:
  - id: java-bash-lolbin
    desc: Java bash LOLBin
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: bash -c

  - id: java-python-lolbin
    desc: Java python LOLBin
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: python3

  - id: java-curl-payload-drop
    desc: Java curl payload drop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'curl[\s\S]{0,180}/payload\.sh[\s\S]{0,180}/tmp/\.callback\.sh'

composite_rules:
  - id: java-unix-lolbin-dropper
    desc: Java Unix LOLBin dropper
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: java-bash-lolbin
      - id: java-python-lolbin
      - id: java-curl-payload-drop
