# MSI abusing msedge_proxy.exe to display phishing webapp
# ATT&CK: T1218 (System Binary Proxy Execution)
defaults:
  platforms: [windows]
  for: [oledoc]
  conf: 0.9
traits:
  - id: msedge-proxy-exe
    desc: References msedge_proxy.exe binary
    crit: component
    if:
      type: text
      substr: msedge_proxy.exe
  - id: msedge-app-flag
    desc: Edge proxy --app flag for chromeless window
    crit: component
    if:
      type: text
      substr: "--app="
composite_rules:
  - id: msi-edge-proxy-app
    desc: MSI launches Edge proxy in app mode
    crit: suspicious
    conf: 0.92
    attack: T1218
    all:
      - id: msedge-proxy-exe
      - id: msedge-app-flag
      - id: metadata/binary/installer/database::msi-installer-raw
