# Windows LOLBins (Living-off-the-Land Binaries)
# MBC: C0049 (Execution - LoLBins)
# ATT&CK: T1218 (System Binary Proxy Execution)
defaults:
  platforms: [windows]
  conf: 0.9
traits:
  - id: rundll32-exe-string
    desc: Explicit rundll32.exe string
    crit: component
    conf: 0.92
    for: [javascript, vbs, batch, powershell, python]
    if:
      type: text
      exact: rundll32.exe
  - id: shell32-openas-rundll
    desc: shell32 OpenAs_RunDLL export string
    crit: component
    conf: 0.98
    for: [javascript, vbs, batch, powershell, python]
    if:
      type: text
      exact: shell32,OpenAs_RunDLL
  - id: rundll32-suspicious-export
    desc: Rundll32 with suspicious export
    crit: suspicious
    conf: 0.85
    for: [javascript, vbs, batch, powershell, python]
    if:
      type: text
      regex: 'rundll32.{0,20},.{0,20}(qwerty|Run|start)'
      case_insensitive: true
  - id: cmd-start-rundll32-template
    desc: cmd start rundll32 execution template
    crit: suspicious
    conf: 0.95
    for: [pe, dll, batch, powershell]
    if:
      type: text
      exact: cmd /c start "" rundll32.exe "
  - id: nemucod-export-fragments
    desc: Fragments of Nemucod-style export call (qwerty 323)
    crit: suspicious
    for: [javascript, vbs]
    if:
      type: text
      regex: '",qwe".{0,50}"rty".{0,50}"323"'
      case_insensitive: true
  # GuardDog: MITRE ATT&CK T1218 System Binary Proxy Execution
  - id: regsvr32-execution
    desc: regsvr32.exe LOLBin scriptlet execution
    crit: suspicious
    attack: "T1218.010"
    for: [batch, powershell, python]
    if:
      type: text
      regex: '(?i)\bregsvr32(?:\.exe)?\b.{0,200}(?:/i:https?://|/i:\S{1,120}\.(?:sct|scrobj)|scrobj\.dll|(?:/u\b.{0,40}/n\b|/n\b.{0,40}/u\b))'
  - id: control-cpl-execution
    desc: control.exe with CPL file
    crit: suspicious
    attack: "T1218.002"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'control(\.exe)?\s+\S+\.cpl'
      case_insensitive: true
  - id: cmstp-execution
    desc: cmstp.exe execution
    crit: suspicious
    attack: "T1218.003"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'cmstp(\.exe)?'
      case_insensitive: true
  - id: installutil-execution
    desc: InstallUtil.exe execution
    crit: suspicious
    attack: "T1218.004"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'InstallUtil(\.exe)?'
      case_insensitive: true
  - id: mshta-execution
    desc: mshta.exe execution
    crit: suspicious
    attack: "T1218.005"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'mshta(\.exe)?'
      case_insensitive: true
  - id: msiexec-execution
    desc: msiexec.exe execution
    crit: suspicious
    attack: "T1218.007"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'msiexec(\.exe)?'
      case_insensitive: true
    downgrade:
      any:
        - type: raw
          regex: 'msiexec(\.exe)?\s+/[ilxapqfy]'
          case_insensitive: true
  - id: odbcconf-regsvr
    desc: odbcconf.exe with REGSVR
    crit: suspicious
    attack: "T1218.008"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'odbcconf(\.exe)?\s+.{0,120}\{\s*REGSVR\s+\S+\s*\}'
      case_insensitive: true
  - id: regsvcs-execution
    desc: regsvcs.exe execution
    crit: suspicious
    attack: "T1218.009"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'regsvcs(\.exe)?'
      case_insensitive: true
  - id: regasm-execution
    desc: regasm.exe execution
    crit: suspicious
    attack: "T1218.009"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'regasm(\.exe)?'
      case_insensitive: true
  - id: verclsid-execution
    desc: verclsid.exe with CLSID
    crit: suspicious
    attack: "T1218.012"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'verclsid(\.exe)?\s+.{0,120}\{\s*\S+\s*\}'
      case_insensitive: true
  - id: mavinject-execution
    desc: mavinject.exe DLL injection
    crit: suspicious
    attack: "T1218.013"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'mavinject(\.exe)?\s+\d+\s+/INJECTRUNNING'
      case_insensitive: true
  - id: mmc-embedding
    desc: mmc.exe with -Embedding
    crit: suspicious
    attack: "T1218.014"
    for: [batch, powershell, python]
    if:
      type: text
      regex: 'mmc(\.exe)?\s+-Embedding'
      case_insensitive: true
  - id: scriptrunner-execution
    desc: ScriptRunner.exe with -appvscript (LOLBin)
    crit: suspicious
    attack: "T1218"
    for: [scripts]
    if:
      type: text
      regex: 'ScriptRunner(\.exe)?\s+-appvscript'
      case_insensitive: true
  - id: finger-remote-query
    desc: finger.exe remote query execution
    crit: suspicious
    attack: "T1105"
    for: [batch, powershell, javascript, vbs, html]
    if:
      type: text
      regex: '(?i)\bfinger(?:\.exe)?\s+[a-z0-9._-]{1,64}@(?:[a-z0-9.-]{3,253}\.[a-z]{2,24}|(?:\d{1,3}\.){3}\d{1,3})\b'
composite_rules:
  - id: rundll32-openas-execution
    desc: OpenAs_RunDLL execution via rundll32
    crit: suspicious
    conf: 0.98
    for: [javascript, vbs, batch, powershell, python]
    all:
      - id: rundll32-exe-string
      - id: shell32-openas-rundll
  - id: windows-lolbin
    desc: Any Windows LOLbin execution
    crit: notable
    any:
      - id: micro-behaviors/process/create/shell::rundll32-exec
      - id: rundll32-openas-execution
      - id: cmd-start-rundll32-template
      - id: regsvr32-execution
      - id: control-cpl-execution
      - id: cmstp-execution
      - id: installutil-execution
      - id: mshta-execution
      - id: msiexec-execution
      - id: odbcconf-regsvr
      - id: regsvcs-execution
      - id: regasm-execution
      - id: verclsid-execution
      - id: mavinject-execution
      - id: mmc-embedding
      - id: scriptrunner-execution
      - id: finger-remote-query
