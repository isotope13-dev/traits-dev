# Windows LOLBins (Living-off-the-Land Binaries)
# MBC: C0049 (Execution - LoLBins)
# ATT&CK: T1218 (System Binary Proxy Execution)
defaults:
  platforms: [windows]
  conf: 0.9
traits:
- id: msiexec-package-verb
  desc: msiexec package install verb
  crit: component
  conf: 0.92
  for: [batch, powershell, python]
  if:
    type: text
    regex: '\bmsiexec(\.exe)?\s+[-/](i|a|x|package)\b'
    case_insensitive: true
- id: msiexec-unattended-switch
  desc: msiexec unattended install switch
  crit: component
  conf: 0.88
  for: [batch, powershell, python]
  if:
    type: text
    regex: '/(passive|quiet|qn)\b'
    case_insensitive: true
- id: msiexec-allusers-property
  desc: msiexec ALLUSERS property
  crit: component
  conf: 0.88
  for: [batch, powershell, python]
  if:
    type: text
    substr: ALLUSERS=
    case_insensitive: true
- id: rundll32-exe-string
  desc: Explicit rundll32.exe string
  crit: component
  conf: 0.92
  for: [javascript, vbs, batch, powershell, python]
  if:
    type: text
    word: rundll32.exe
- id: shell32-openas-rundll
  desc: shell32 OpenAs_RunDLL export string
  crit: component
  conf: 0.98
  for: [javascript, vbs, batch, powershell, python]
  if:
    type: text
    exact: shell32,OpenAs_RunDLL
- id: rundll32-suspicious-export
  desc: Rundll32 with suspicious export
  crit: suspicious
  conf: 0.85
  for: [javascript, vbs, batch, powershell, python]
  if:
    type: text
    regex: >-
      (^|[;&|`"'(])\s*rundll32(\.exe)?\s+[^\r\n,]{1,160},\s*(qwerty|Run|start)\b
    case_insensitive: true
- id: cmd-start-rundll32-template
  desc: cmd start rundll32 execution template
  crit: suspicious
  conf: 0.95
  for: [pe, dll, batch, powershell]
  if:
    type: text
    exact: cmd /c start "" rundll32.exe "
- id: nemucod-export-fragments
  desc: 'Fragments of Nemucod-style export call'
  crit: suspicious
  for: [javascript, vbs]
  if:
    type: text
    regex: '",qwe".{0,50}"rty".{0,50}"323"'
    case_insensitive: true
  # GuardDog: MITRE ATT&CK T1218 System Binary Proxy Execution
- id: regsvr32-execution--rx-3
  desc: Regex component marker
  crit: component
  for: [batch, powershell, python]
  if:
    type: text
    substr: i:https
    case_insensitive: true
  count_max: 1021590
- id: control-cpl-execution
  desc: control.exe with CPL file
  crit: suspicious
  attack: "T1218.002"
  for: [batch, powershell, python]
  if:
    type: text
    regex: 'control(\.exe)?\s+\S+\.cpl'
    case_insensitive: true
- id: cmstp-execution
  desc: cmstp.exe execution
  crit: suspicious
  attack: "T1218.003"
  for: [batch, powershell, python]
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    - id: well-known/tool/dual-use/mihomo::mihomo-comment-bundle
    - id: metadata/file/profile/identity::generated-attack-map-context
  if:
    type: text
    # Require a non-comment, non-variable-expansion command line.  A bare
    # token search also finds `cmstp` inside encoded batch comment padding.
    regex: '(?im)^[ \t]*(?!rem\b|::|%)[^\r\n]{0,240}\bcmstp(\.exe)?\b'
    case_insensitive: true
- id: installutil-execution
  desc: InstallUtil.exe execution
  crit: suspicious
  attack: "T1218.004"
  for: [batch, powershell, python]
  unless:
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: metadata/file/profile/identity::generated-attack-map-context
  if:
    type: text
    regex: 'InstallUtil(\.exe)?'
    case_insensitive: true
- id: mshta-execution
  desc: mshta.exe execution
  crit: notable
  attack: "T1218.005"
  for: [batch, powershell, python]
  if:
    type: text
    regex: 'mshta(\.exe)?'
    case_insensitive: true
  unless:
    - id: well-known/tool/dual-use/mihomo::mihomo-comment-bundle
- id: odbcconf-regsvr
  desc: odbcconf.exe with REGSVR
  crit: suspicious
  attack: "T1218.008"
  for: [batch, powershell, python]
  if:
    type: text
    regex: 'odbcconf(\.exe)?\s+.{0,120}\{\s*REGSVR\s+\S+\s*\}'
    case_insensitive: true
- id: regsvcs-execution
  desc: regsvcs.exe execution
  crit: suspicious
  attack: "T1218.009"
  for: [batch, powershell, python]
  unless:
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: metadata/file/profile/identity::generated-attack-map-context
  if:
    type: text
    regex: 'regsvcs(\.exe)?'
    case_insensitive: true
- id: regasm-execution
  desc: regasm.exe execution
  crit: suspicious
  attack: "T1218.009"
  for: [batch, powershell, python]
  if:
    type: text
    regex: 'regasm(\.exe)?'
    case_insensitive: true
  unless:
  - id: well-known/lib/wine::wine-source-tree
  - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: metadata/file/profile/identity::generated-attack-map-context
- id: verclsid-execution
  desc: verclsid.exe with CLSID
  crit: suspicious
  attack: "T1218.012"
  for: [batch, powershell, python]
  if:
    type: text
    regex: 'verclsid(\.exe)?\s+.{0,120}\{\s*\S+\s*\}'
    case_insensitive: true
  unless:
  - id: metadata/file/profile/identity::generated-attack-map-context
- id: mavinject-execution
  desc: mavinject.exe DLL injection
  crit: suspicious
  attack: "T1218.013"
  for: [batch, powershell, python]
  if:
    type: text
    regex: 'mavinject(\.exe)?\s+\d+\s+/INJECTRUNNING'
    case_insensitive: true
- id: mmc-embedding
  desc: mmc.exe with -Embedding
  crit: suspicious
  attack: "T1218.014"
  for: [batch, powershell, python]
  if:
    type: text
    regex: 'mmc(\.exe)?\s+-Embedding'
    case_insensitive: true
  unless:
  - id: metadata/file/profile/identity::generated-attack-map-context
- id: scriptrunner-execution
  desc: ScriptRunner.exe with -appvscript (LOLBin)
  crit: suspicious
  attack: "T1218"
  for: [scripts]
  if:
    type: text
    regex: 'ScriptRunner(\.exe)?\s+-appvscript'
    case_insensitive: true
- id: finger-remote-query
  desc: finger.exe remote query execution
  crit: suspicious
  for: [batch, powershell, javascript, vbs, html]
  if:
    type: text
    regex: 'finger(\.exe)?\s+([-/][A-Za-z0-9?._-]+\s+){0,2}[A-Za-z0-9._-]{1,64}@[A-Za-z0-9.-]{1,253}'
    case_insensitive: true
  unless:
    - id: metadata/package/quality/source::security-tracker-cve-leaf
  conf: 1.0
  attack: "T1105"
composite_rules:
- id: xor-winhttp-rundll32-proxy-exec
  desc: Obfuscated remote payload execution through rundll32
  crit: hostile
  conf: 0.99
  attack: T1105,T1218.011
  mbc: B0024
  for: [pe, dll]
  all:
  - id: micro-behaviors/communications/http/client/winhttp::xor-decoded-winhttp-request-flow
  - id: micro-behaviors/communications/http/url/domain::xor-decoded-http-url
  - id: objectives/anti-static/obfuscation/decoders::xor-decoded-createprocess-api
  - id: micro-behaviors/process/create/shell/script-host::rundll32-exec
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/installer/family/
- id: msiexec-unattended-machine-install
  desc: Unattended system-wide msiexec install
  crit: component
  for: [batch, powershell, python]
  all:
  - id: msiexec-package-verb
  - id: msiexec-unattended-switch
  - id: msiexec-allusers-property
- id: msiexec-execution
  desc: msiexec.exe execution
  crit: suspicious
  attack: "T1218.007"
  for: [batch, powershell, python]
  all:
  - id: msiexec-package-verb
  - id: micro-behaviors/fs/path/extension::msi
  unless:
  - id: well-known/app/posh-ovirt/
  downgrade:
    any:
    - type: raw
      regex: 'msiexec(\.exe)?[^\\r\\n]{0,64}-Embedding\b'
      case_insensitive: true
    - type: raw
      regex: 'msiexec(\.exe)?\s+/[ilxapqfy]'
      case_insensitive: true
    - id: objectives/execution/lolbin/os/
    - type: text
      substr: ChocolateyProcessAsAdmin
    - type: text
      substr: Start-ChocolateyProcessAsAdmin
- id: rundll32-openas-execution
  desc: OpenAs_RunDLL execution via rundll32
  crit: suspicious
  conf: 0.98
  for: [javascript, vbs, batch, powershell, python]
  all:
  - id: rundll32-exe-string
  - id: shell32-openas-rundll
- id: windows-lolbin
  desc: Any Windows LOLbin execution
  crit: notable
  any:
  - id: micro-behaviors/process/create/shell/script-host::rundll32-exec
  - id: rundll32-openas-execution
  - id: cmd-start-rundll32-template
  - id: regsvr32-execution
  - id: control-cpl-execution
  - id: cmstp-execution
  - id: installutil-execution
  - id: mshta-execution
  - id: msiexec-execution
  - id: msiexec-unattended-machine-install
  - id: odbcconf-regsvr
  - id: regsvcs-execution
  - id: regasm-execution
  - id: verclsid-execution
  - id: mavinject-execution
  - id: mmc-embedding
  - id: scriptrunner-execution
  - id: finger-remote-query
- id: regsvr32-execution
  desc: regsvr32.exe LOLBin scriptlet execution
  crit: suspicious
  conf: 1.0
  attack: "T1218.010"
  for: [batch, powershell, python]
  unless:
  - id: well-known/app/winmerge::winmerge-shell-extension-register
  - id: well-known/app/obs-studio
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  all:
  - id: micro-behaviors/process/create/hcom::regsvr32
  any:
  - id: micro-behaviors/dylib/library/com::scrobj
  - id: regsvr32-execution--rx-3
