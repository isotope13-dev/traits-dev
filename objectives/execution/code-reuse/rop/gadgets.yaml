# ROP Gadget Density Detection
# Detects unusually high density of return instructions (potential ROP chains)
# Return-Oriented Programming uses existing code snippets ending in RET
# High RET density can indicate:
# - Intentionally placed ROP gadgets (exploitation frameworks)
# - Active ROP chain exploitation
# - Unusual code generation patterns
# ATT&CK: T1203 (Exploitation for Client Execution)
# CWE-693: Protection Mechanism Failure

defaults:
  attack: "T1203"
  for: [pe, elf, macho]

traits:
  # === High RET Density (ROP Indicator) ===

  # Very high density of RET instructions
  - id: high-ret-density
    desc: High density of return instructions
    crit: suspicious
    conf: 0.85
    per_kb_min: 50.0  # 50+ returns per KB is unusual
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "C3"

  # Extreme RET density (strong ROP indicator)
  - id: extreme-ret-density
    desc: Extreme return instruction density
    crit: suspicious
    conf: 0.95
    per_kb_min: 100.0  # 100+ returns per KB
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "C3"

  # === ROP Gadget Patterns ===

  # POP; POP; RET pattern (common ROP gadget)
  # Note: These patterns occur naturally in function epilogues in all compiled code.
  # x64 binaries routinely have hundreds of such sequences in normal epilogues.
  # A 500KB DLL can easily have 200-400 pop-pop-ret naturally.
  # Only meaningful when combined with other ROP indicators in composite rules.
  - id: pop-pop-ret-gadget
    desc: POP; POP; RET gadget pattern
    crit: component
    conf: 0.9
    count_min: 200
    per_kb_min: 2.0
    if:
      type: hex
      section: text
      pattern: "5? 5? C3"

  # POP; RET pattern (very common gadget)
  # Note: Extremely common in all compiled code - only useful in composites
  - id: pop-ret-gadget
    desc: POP; RET gadget pattern
    crit: component
    conf: 0.75
    count_min: 100
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "5? C3"

  # Short instruction followed by RET (1-3 byte gadgets)
  - id: short-ret-gadgets
    desc: Short instruction sequences ending in RET
    crit: suspicious
    conf: 0.85
    per_kb_min: 80.0  # High density of 2-byte gadgets
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "?? C3"

  # === Data Section RET Instructions ===

  # RET instructions in data sections (embedded shellcode/ROP chain)
  # C3 is a common byte value; require high density to indicate actual RET gadgets
  # Use exact section name .data to avoid fuzzy match issues with non-standard names
  # Downgraded to notable: single-byte C3 pattern alone is too imprecise for suspicious;
  # actual ROP chains are caught by composite rules requiring multiple indicators
  - id: ret-in-data-section
    desc: Return instructions in data section
    crit: notable
    conf: 0.95
    for: [pe, elf]
    count_min: 20
    per_kb_min: 5.0
    size_min: 1024
    size_max: 10485760
    if:
      type: hex
      section: .data
      pattern: "C3"

  # === Specific ROP Gadget Sequences ===

  # XCHG ESP, EAX; RET (stack pivot gadget)
  # 94 C3 is only 2 bytes - coincidental matches are extremely common in large
  # compiled binaries. A 1MB code section will have ~250 random matches.
  # Only meaningful at very high density or in small, purpose-built payloads.
  - id: stack-pivot-gadget
    desc: Stack pivot gadget (XCHG ESP, EAX; RET)
    crit: suspicious
    conf: 0.98
    for: [pe, elf]
    count_min: 50
    per_kb_min: 1.0
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "94 C3"

  # ADD ESP, XX; RET (stack adjustment gadget)
  # Standard function epilogue in x86 code; require high count to indicate
  # intentional gadget placement rather than normal compiled output
  - id: stack-adjust-ret
    desc: Stack adjustment gadget
    crit: component
    conf: 0.9
    count_min: 50
    per_kb_min: 2.0
    if:
      type: hex
      section: text
      pattern: "83 C4 ?? C3"

composite_rules:
  # ROP chain indicators
  - id: rop-chain-indicators
    desc: ROP chain or gadget farm indicators
    crit: hostile
    conf: 0.95
    attack: "T1203"
    needs: 2
    any:
      - id: extreme-ret-density
      - id: pop-pop-ret-gadget
      - id: ret-in-data-section
      - id: stack-pivot-gadget
      - id: high-ret-density

  # Intentional ROP gadget farm (exploitation toolkit)
  - id: rop-gadget-farm
    desc: Intentional ROP gadget farm
    crit: hostile
    conf: 0.98
    all:
      - id: extreme-ret-density
    any:
      - id: pop-pop-ret-gadget
      - id: pop-ret-gadget
      - id: stack-pivot-gadget

  # Embedded ROP chain (active exploitation)
  - id: embedded-rop-chain
    desc: Embedded ROP chain in data
    crit: hostile
    conf: 0.99
    attack: "T1203"
    all:
      - id: ret-in-data-section
    any:
      - id: objectives/anti-static/obfuscation/payload/section::high-entropy-data-section

  # Suspicious gadget patterns
  - id: suspicious-rop-gadgets
    desc: Suspicious ROP gadget patterns
    crit: suspicious
    conf: 0.85
    needs: 3
    any:
      - id: high-ret-density
      - id: pop-pop-ret-gadget
      - id: pop-ret-gadget
      - id: short-ret-gadgets
      - id: stack-adjust-ret
