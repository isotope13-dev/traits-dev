# Reflective PE Loading - Windows Composites
# Detects in-memory PE loading (manual mapping, MemoryLoadLibrary)
# ATT&CK: T1620 (Reflective Code Loading)
# MBC: B0032

defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1620"
  mbc: "B0032"

composite_rules:
  - id: pe-reflective-loader
    desc: In-memory PE loader (reflective DLL)
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/load/memory-module::memory-load-library
    any:
      - id: micro-behaviors/mem/load/reflective::mz-signature-check
      - id: micro-behaviors/mem/load/reflective::payload-thread-str
      - id: micro-behaviors/mem/load/reflective::pe-arch-detect

  - id: pe-crypter-loader
    desc: Encrypted PE payload with reflective loading
    crit: hostile
    conf: 0.95
    all:
      - id: pe-reflective-loader
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-data
      - id: objectives/anti-static/obfuscation/payload/section::oversized-data-section
