# Reflective PE Loading - Windows Composites
# Detects in-memory PE loading (manual mapping, MemoryLoadLibrary)
# ATT&CK: T1620 (Reflective Code Loading)
# MBC: B0032
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1620"
  mbc: "B0032"
composite_rules:
  - id: runtime-loader-with-encoded-data
    desc: Runtime loader APIs with encoded data
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/execution/reflection/class::dynamic-load-pattern
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-data
    any:
      - id: micro-behaviors/mem/query/info::virtualquery
      - id: objectives/execution/reflection/class::virtualprotect-sym
      - id: micro-behaviors/os/api-resolution/manual::kernel32-resolver
    downgrade:
      any:
        - id: metadata/format/pe::asprotect
        - id: objectives/anti-static/packer/detect::aspack-marker
        - id: metadata/purpose/debug-tool::ollydbg-plugin-export
        - id: metadata/purpose/debug-tool::debug-event-loop
        - type: exports_count
          min: 20
  - id: pe-reflective-loader
    desc: In-memory PE loader (reflective DLL)
    crit: suspicious
    conf: 0.95
    all:
      - id: native-pe-loader
    any:
      - id: micro-behaviors/process/create/load/memory-module::memory-load-library
      - id: micro-behaviors/mem/load/reflective
  - id: native-pe-loader
    desc: Native PE reflective loader
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/mem/load/reflective::native-loader-api-combo
      - id: micro-behaviors/mem/load/reflective::pe-signature-check-asm
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: pe-crypter-loader
    desc: Encrypted PE payload with reflective loading
    crit: hostile
    conf: 0.95
    all:
      - id: pe-reflective-loader
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-data
      - id: objectives/anti-static/obfuscation/payload/section::oversized-data-section
