# Module Enumeration Capabilities
# Runtime module and library enumeration
defaults:
  for: ["pe", "dll"]
  platforms: ["windows"]
traits:
  # === Module Lookup ===
  - id: get-module-handle-by-name
    desc: Get module handle Unicode
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "GetModuleHandleW"
  - id: get-module-handle-ansi
    desc: Get module handle ANSI
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "GetModuleHandleA"
  - id: get-module-filename-dup
    desc: Get module file path
    crit: baseline
    conf: 0.70
    if:
      type: string
      exact: "GetModuleFileNameW"
  - id: get-module-filename-ansi
    desc: Get module file path (ANSI)
    crit: baseline
    conf: 0.70
    if:
      type: string
      exact: "GetModuleFileNameA"
      # === Dynamic Loading ===
      # NOTE: LoadLibraryW and LoadLibraryExW moved to objectives/execution/native/runtime
  - id: free-library
    desc: Unload dynamic library
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "FreeLibrary"
      # === Process Information ===
  - id: get-current-process
    desc: Get current process handle
    crit: baseline
    conf: 0.70
    if:
      type: symbol
      exact: "GetCurrentProcess"
    # NOTE: GetCurrentProcessId moved to micro-behaviors/process/info/thread/
