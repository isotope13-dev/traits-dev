defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: csharp-code-provider
    desc: CSharpCodeProvider instantiation
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: CSharpCodeProvider
  - id: compile-assembly-from-source
    desc: Runtime compilation from source string
    crit: suspicious
    conf: 0.95
    attack: "T1027.004"
    if:
      type: raw
      substr: CompileAssemblyFromSource
  - id: generate-executable
    desc: Compiler configured for executable output
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: GenerateExecutable
composite_rules:
  - id: runtime-code-compilation
    desc: Runtime C# code compilation
    crit: suspicious
    conf: 0.95
    attack: "T1027.004"
    all:
      - id: csharp-code-provider
      - id: compile-assembly-from-source
