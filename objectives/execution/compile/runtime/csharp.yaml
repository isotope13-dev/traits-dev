defaults:
  for: [csharp]
  platforms: [windows]
traits:
- id: csharp-code-provider
  desc: CSharpCodeProvider instantiation
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: CSharpCodeProvider
- id: compile-assembly-from-source
  desc: Runtime compilation from source string
  crit: suspicious
  conf: 0.95
  attack: "T1027.004"
  if:
    type: text
    substr: CompileAssemblyFromSource
- id: generate-executable
  desc: Compiler configured for executable output
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: GenerateExecutable
- id: in-memory-roslyn-emit
  desc: Roslyn emits assembly in memory
  crit: suspicious
  conf: 0.95
  attack: T1027.004
  for: [powershell, batch, csharp]
  if:
    type: text
    regex: (?i)(Compilation.{0,120}MemoryStream.{0,120}Emit|EtimE#E#N-1)
- id: roslyn-syntax-tree-parse
  desc: Roslyn parses source syntax tree
  crit: notable
  conf: 0.88
  for: [powershell, batch, csharp]
  if:
    type: text
    regex: (?i)Syntax.{0,16}Tree.{0,80}ParseText
- id: roslyn-metadata-reference
  desc: Roslyn metadata reference creation
  crit: notable
  conf: 0.88
  for: [powershell, batch, csharp]
  if:
    type: text
    regex: (?i)Metadata.{0,24}Reference.{0,80}CreateFromFile
composite_rules:
- id: runtime-code-compilation
  desc: Runtime C# code compilation
  crit: suspicious
  conf: 0.95
  attack: "T1027.004"
  all:
  - id: csharp-code-provider
  - id: compile-assembly-from-source
- id: runtime-roslyn-compilation
  desc: Runtime Roslyn C# compilation
  crit: suspicious
  conf: 0.97
  attack: T1027.004
  for: [powershell, batch, csharp]
  all:
  - id: in-memory-roslyn-emit
  any:
  - id: roslyn-syntax-tree-parse
  - id: roslyn-metadata-reference
