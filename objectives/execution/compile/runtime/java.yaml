defaults:
  platforms: [unix, windows]
  for: [java, class, java_class]
  attack: T1027.004

traits:
  - id: java-toolprovider-compiler-source
    desc: Java gets runtime system compiler
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ToolProvider.getSystemJavaCompiler

  - id: java-compiler-task-source
    desc: Java creates runtime compiler task
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: JavaCompiler.CompilationTask

  - id: java-toolprovider-compiler-bytecode
    desc: Java bytecode gets system compiler
    crit: suspicious
    conf: 0.94
    for: [class, java_class]
    if:
      type: hex
      pattern: 67 65 74 53 79 73 74 65 6D 4A 61 76 61 43 6F 6D 70 69 6C 65 72

  - id: java-urlclassloader-bytecode
    desc: Java bytecode URLClassLoader
    crit: notable
    conf: 0.94
    for: [class, java_class]
    if:
      type: hex
      pattern: 55 52 4C 43 6C 61 73 73 4C 6F 61 64 65 72

  - id: java-runtimepayload-bytecode
    desc: Java bytecode runtime payload
    crit: suspicious
    conf: 0.94
    for: [class, java_class]
    if:
      type: hex
      pattern: 52 75 6E 74 69 6D 65 50 61 79 6C 6F 61 64

  - id: java-urlclassloader-temp-class
    desc: Java loads runtime compiled temp class
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'URLClassLoader[\s\S]{0,220}loadClass[\s\S]{0,220}(RuntimePayload|JavaCompiler|\.java)'
  - id: java-nim-command-source
    desc: Java invokes Nim compiler
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: nim
  - id: java-nim-mingw-flag-source
    desc: Java Nim Mingw build flag
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: -d=mingw
  - id: java-nim-gui-flag-source
    desc: Java Nim GUI build flag
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: --app=gui
  - id: java-nim-strip-flag-source
    desc: Java Nim strip build flag
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: -d:strip
  - id: java-go-windows-build-source
    desc: Java invokes Go Windows payload
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: -ldflags=-s -w -H=windowsgui
  - id: java-mingw-cross-compiler-source
    desc: Java invokes Mingw cross compiler
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: x86_64-w64-mingw32-gcc

composite_rules:
  - id: java-runtime-compile-load
    desc: Java compiles and loads runtime class
    crit: hostile
    conf: 0.98
    all:
      - id: java-toolprovider-compiler-source
      - id: java-compiler-task-source
      - id: java-urlclassloader-temp-class

  - id: java-bytecode-runtime-compile-load
    desc: Java bytecode runtime compile load
    crit: hostile
    conf: 0.98
    for: [class, java_class]
    all:
      - id: java-toolprovider-compiler-bytecode
      - id: java-urlclassloader-bytecode
      - id: java-runtimepayload-bytecode
  - id: java-windows-payload-builder
    desc: Java Windows payload build chain
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/process/create/spawn::java-processbuilder-source
    any:
      - id: java-nim-command-source
      - id: java-nim-mingw-flag-source
      - id: java-nim-gui-flag-source
      - id: java-nim-strip-flag-source
      - id: java-go-windows-build-source
      - id: java-mingw-cross-compiler-source
    needs: 2
