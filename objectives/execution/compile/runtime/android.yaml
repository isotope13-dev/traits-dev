defaults:
  platforms: [android, unix]
  for: [elf]
  attack: T1059
traits:
  - id: c-repl-temp-source-template
    desc: C REPL temp source template
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "void __cmd_%d__() { %s; }"
  - id: clang-temp-output-command
    desc: clang compiles temp output command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'clang %s -o %s 2>/data/data/com\.termux/files/home/tmp\.err'
  - id: termux-temp-shared-output
    desc: Termux temp shared output path
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "/data/data/com.termux/files/home/tmp.so"
composite_rules:
  - id: termux-c-repl-compile-execute
    desc: Termux C REPL compiles and executes code
    crit: suspicious
    conf: 0.96
    all:
      - id: c-repl-temp-source-template
      - id: clang-temp-output-command
      - id: termux-temp-shared-output
      - id: micro-behaviors/process/create/shell::system-fn
