defaults:
  platforms: [android, windows, unix]
  for: [powershell]
  attack: T1027

traits:
  - id: ps-codedom-compile-source
    desc: PowerShell CodeDom compile source
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "CompileAssemblyFromSource"

  - id: ps-roslyn-compile-source
    desc: PowerShell Roslyn compile source
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "CSharpCompilation"

  - id: ps-inmemory-assembly-load
    desc: PowerShell in-memory assembly load
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'Assembly\]::Load\(\$ms\.ToArray\(\)\)|CompiledAssembly'

composite_rules:
  - id: ps-compile-load-assembly
    desc: PowerShell compile-load assembly
    crit: hostile
    conf: 0.98
    all:
      - id: ps-inmemory-assembly-load
    any:
      - id: ps-codedom-compile-source
      - id: ps-roslyn-compile-source
