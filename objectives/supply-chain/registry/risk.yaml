# Supply-chain risk verdicts built from registry metadata facts. Each composite
# combines neutral atomic registry traits into a behavior worth flagging: a
# registry record alone is not suspicious, but the *combination* of what a
# package is, how it's adopted, and what it claims to do can be.
defaults:
  for: [all]
  platforms: [unix, windows, android, ios]

composite_rules:
- id: social-media-data-harvester-extension
  desc: Browser extension whose store listing advertises bulk social-media data harvesting
  crit: suspicious
  conf: 0.85
  # A Chrome Web Store listing that openly pitches itself as a bulk
  # data-collection tool — broad reach over a user's logged-in sessions plus a
  # stated intent to harvest and export. The privacy/exfiltration risk is the
  # combination, not either fact alone.
  all:
    - id: metadata/registry::browser-extension
    - id: metadata/registry::harvesting-claim

- id: freshly-published-unestablished-package
  desc: Brand-new registry release with near-zero adoption — a classic malware drop window
  crit: suspicious
  conf: 0.7
  # A package published in the last week that essentially nobody installs. Most
  # supply-chain malware is caught in exactly this window: a fresh version, no
  # community vetting yet. An established, widely-installed package is not a drop.
  all:
    - id: metadata/registry::freshly-published
    - id: metadata/registry::low-adoption
  unless:
    - id: metadata/registry::widely-installed

- id: freshly-published-deprecated-install
  desc: Installing a freshly-changed release the registry marks deprecated
  crit: notable
  conf: 0.65
  # A deprecated package that also just changed — abandoned code being pulled
  # in, or a deprecated name revived to ship something new under it.
  all:
    - id: metadata/registry::deprecated
    - id: metadata/registry::freshly-published
