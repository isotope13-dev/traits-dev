defaults:
  platforms: [windows]
  for: [binaries, scripts, source, manifests, documents, media, data]
traits:
  - id: nuspec-file
    desc: NuGet nuspec manifest file
    crit: component
    conf: 0.98
    if:
      type: basename
      regex: '\.nuspec$'
      case_insensitive: true
  - id: empty-title-raw
    desc: Empty NuGet title field
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: '<title>\s*</title>'
  - id: empty-owners-raw
    desc: Empty NuGet owners field
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: '<owners>\s*</owners>'
  - id: placeholder-description-raw
    desc: Placeholder NuGet description
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '<description>\s*\.\.\.\s*</description>'
composite_rules:
  - id: empty-title
    desc: NuGet package has empty title
    crit: baseline
    conf: 0.86
    all:
      - id: nuspec-file
      - id: empty-title-raw
  - id: empty-owners
    desc: NuGet package has empty owners
    crit: baseline
    conf: 0.86
    all:
      - id: nuspec-file
      - id: empty-owners-raw
  - id: placeholder-description
    desc: NuGet package uses placeholder description
    crit: notable
    conf: 0.9
    all:
      - id: nuspec-file
      - id: placeholder-description-raw
  - id: hollow-nuget-metadata
    desc: NuGet package with hollow metadata
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: empty-title
      - id: empty-owners
      - id: placeholder-description
