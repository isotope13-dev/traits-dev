defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: chrome-runtime
    desc: chrome.runtime API usage
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: chrome.runtime
  - id: chrome-tabs
    desc: chrome.tabs API usage
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: chrome.tabs
  - id: chrome-storage
    desc: chrome.storage API usage
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: chrome.storage
  - id: chrome-webRequest
    desc: chrome.webRequest API usage
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: chrome.webRequest
  - id: chrome-scripting
    desc: chrome.scripting API usage
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: chrome.scripting
  - id: onInstalled
    desc: chrome.runtime.onInstalled listener
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: onInstalled
  - id: sendMessage
    desc: chrome.runtime.sendMessage
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: chrome\.runtime\.sendMessage|runtime\.sendMessage
  - id: onMessage
    desc: chrome.runtime.onMessage listener
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: (chrome\.)?runtime\.onMessage(\.addListener)?
  - id: executeScript
    desc: chrome.scripting.executeScript call
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: executeScript
  - id: insertCSS
    desc: chrome.scripting.insertCSS call
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: insertCSS
composite_rules:
  - id: chrome-extension-context
    desc: Chrome extension API context
    crit: notable
    conf: 0.95
    any:
      - id: chrome-runtime
      - id: chrome-tabs
      - id: chrome-storage
      - id: chrome-webRequest
