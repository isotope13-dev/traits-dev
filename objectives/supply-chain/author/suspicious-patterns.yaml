defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  conf: 0.8
  attack: T1195.002
traits:
  - id: npm-author-admin
    desc: npm package author is 'admin'
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: author.name
      regex: ^admin$
      case_insensitive: true
  - id: npm-author-user
    desc: npm package author is 'user'
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: author.name
      regex: ^user$
      case_insensitive: true
  - id: npm-author-test
    desc: npm package author is 'test'
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: author.name
      regex: ^test$
      case_insensitive: true
  - id: npm-author-developer
    desc: npm package author is 'developer'
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: author.name
      regex: ^developer$
      case_insensitive: true
  - id: npm-author-owner
    desc: npm package author is 'owner'
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: author.name
      regex: ^owner$
      case_insensitive: true
  - id: npm-author-root
    desc: npm package author is 'root'
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: author.name
      regex: ^root$
      case_insensitive: true
  - id: npm-author-anonymous
    desc: npm package author is 'anonymous'
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: author.name
      regex: ^anon(ymous)?$
      case_insensitive: true
  - id: npm-author-string-admin
    desc: npm package author string is 'admin'
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: author
      regex: ^admin$
      case_insensitive: true
  - id: npm-author-string-user
    desc: npm package author string is 'user'
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: author
      regex: ^user$
      case_insensitive: true
  - id: npm-author-string-test
    desc: npm package author string is 'test'
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: author
      regex: ^test$
      case_insensitive: true
  - id: npm-author-single-char
    desc: npm package author is single character
    crit: suspicious
    conf: 0.9
    for:
      - package.json
    if:
      type: kv
      path: author.name
      regex: ^.$
  - id: npm-author-numeric
    desc: npm package author is only numbers
    crit: suspicious
    conf: 0.9
    for:
      - package.json
    if:
      type: kv
      path: author.name
      regex: ^[0-9]+$
  - id: pypi-author-admin
    desc: PyPI package author is 'admin'
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: string_value
      regex: author\s*=\s*['"]admin['"]
      case_insensitive: true
  - id: pypi-author-user
    desc: PyPI package author is 'user'
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: string_value
      regex: author\s*=\s*['"]user['"]
      case_insensitive: true
  - id: pypi-author-test
    desc: PyPI package author is 'test'
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: string_value
      regex: author\s*=\s*['"]test['"]
      case_insensitive: true
  - id: pypi-author-developer
    desc: PyPI package author is 'developer'
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: string_value
      regex: author\s*=\s*['"]developer['"]
      case_insensitive: true
  - id: gem-author-admin
    desc: RubyGem author is 'admin'
    crit: suspicious
    conf: 0.85
    for:
      - ruby
    if:
      type: string_value
      regex: \.author\s*=\s*['"]admin['"]
      case_insensitive: true
  - id: gem-author-user
    desc: RubyGem author is 'user'
    crit: suspicious
    conf: 0.85
    for:
      - ruby
    if:
      type: string_value
      regex: \.author\s*=\s*['"]user['"]
      case_insensitive: true
  - id: gem-author-test
    desc: RubyGem author is 'test'
    crit: suspicious
    conf: 0.85
    for:
      - ruby
    if:
      type: string_value
      regex: \.author\s*=\s*['"]test['"]
      case_insensitive: true
composite_rules:
  - id: npm-generic-author-name
    desc: npm package has generic author name
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    any:
      - id: npm-author-admin
      - id: npm-author-user
      - id: npm-author-test
      - id: npm-author-developer
      - id: npm-author-owner
      - id: npm-author-root
      - id: npm-author-anonymous
      - id: npm-author-string-admin
      - id: npm-author-string-user
      - id: npm-author-string-test
      - id: npm-author-single-char
      - id: npm-author-numeric
  - id: pypi-generic-author-name
    desc: PyPI package has generic author name
    crit: suspicious
    conf: 0.85
    for:
      - python
    any:
      - id: pypi-author-admin
      - id: pypi-author-user
      - id: pypi-author-test
      - id: pypi-author-developer
  - id: gem-generic-author-name
    desc: RubyGem has generic author name
    crit: suspicious
    conf: 0.85
    for:
      - ruby
    any:
      - id: gem-author-admin
      - id: gem-author-user
      - id: gem-author-test
