defaults:
  platforms: [windows]
composite_rules:
  - id: nuget-package-with-loader-dll
    desc: NuGet package with staged loader DLL
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/metadata::nuspec-file
      - id: metadata/quality/files::dll-extension-basename
    any:
      - id: objectives/command-and-control/dropper/execution/loader::dotnet-resource-zip-stage-loader
      - id: objectives/command-and-control/dropper/execution/loader::dotnet-admin-batch-stage-loader
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: objectives/command-and-control/infrastructure/domain::http-url-binary
  - id: nuget-package-hollow-metadata-loader
    desc: NuGet loader with hollow metadata
    crit: suspicious
    conf: 0.95
    all:
      - id: nuget-package-with-loader-dll
      - id: objectives/supply-chain/metadata::hollow-nuget-metadata
