    conf: 0.92
    attack: T1036.005
    mbc: F0004
    platforms:
      - unix
      - windows
    all:
      - id: objectives/supply-chain/pypi/general::is-pkginfo-file
      - id: objectives/supply-chain/pypi/keywords::malware-keyword-in-keywords
  - id: poc-beacon-placeholder-package
