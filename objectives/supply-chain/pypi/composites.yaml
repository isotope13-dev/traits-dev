defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
composite_rules:
  - id: depconf-victim-indicators
    desc: Dependency confusion victim-targeting language
    crit: notable
    conf: 0.9
    attack: T1195.002
    platforms:
      - unix
      - windows
    any:
      - id: objectives/supply-chain/pypi/depconf/
  - id: pkginfo-no-description
    desc: PKG-INFO with empty or missing description
    crit: notable
    conf: 0.7
    platforms:
      - unix
      - windows
    any:
      - id: objectives/supply-chain/pypi/description::pkginfo-no-description-body
      - id: objectives/supply-chain/pypi/description::pkginfo-missing-description
  - id: pkginfo-low-effort-indicators
    desc: PKG-INFO with low-effort package indicators
    crit: notable
    conf: 0.7
    attack: T1036.005
    platforms:
      - unix
      - windows
    any:
      - id: objectives/supply-chain/pypi/homepage::pkginfo-free-hosting-homepage
      - id: objectives/supply-chain/pypi/summary::pkginfo-security-claim
  - id: pkginfo-cloned-readme-body
    desc: PKG-INFO body with cloned library README content
    crit: notable
    conf: 0.8
    attack: T1036.005
    mbc: F0004
    platforms:
      - unix
      - windows
    any:
      - id: objectives/supply-chain/pypi/cloned-body/
  - id: suspicious-setup-metadata
    desc: Suspicious setup.py metadata
    crit: suspicious
    conf: 0.8
    attack: T1036.005
    needs: 3
    any:
      - id: objectives/supply-chain/pypi/description::minimal-description
      - id: objectives/supply-chain/pypi/author::placeholder-author
      - id: objectives/supply-chain/pypi/email::generic-email
      - id: objectives/supply-chain/pypi/version::suspicious-version-pattern
      - id: objectives/supply-chain/pypi/keywords::typosquatting-keyword
  - id: malware-setup-profile
    desc: Malicious setup.py profile
    crit: suspicious
    conf: 0.85
    attack: T1036.005
    mbc: F0004
    platforms:
      - unix
      - windows
    needs: 4
    any:
      - id: suspicious-setup-metadata
      - id: objectives/supply-chain/pypi/keywords::empty-keywords
      - id: objectives/supply-chain/pypi/general::empty-classifiers
      - id: objectives/supply-chain/pypi/description::single-word-description
  - id: pkg-info-unknown-fields
    desc: PKG-INFO with UNKNOWN metadata fields
    crit: notable
    conf: 0.75
    attack: T1036.005
    mbc: F0004
    platforms:
      - unix
      - windows
    needs: 3
    any:
      - id: objectives/supply-chain/pypi/summary::unknown-summary
      - id: objectives/supply-chain/pypi/homepage::unknown-homepage
      - id: objectives/supply-chain/pypi/author::unknown-author
      - id: objectives/supply-chain/pypi/general::unknown-license
      - id: objectives/supply-chain/pypi/general::unknown-platform
      - id: objectives/supply-chain/pypi/description::unknown-description
      - id: objectives/supply-chain/pypi/email::unknown-author-email
  - id: pkginfo-all-unknown-metadata
    desc: PKG-INFO with all metadata fields UNKNOWN
    crit: notable
    conf: 0.9
    attack: T1195.002
    mbc: F0004
    platforms:
      - unix
      - windows
    all:
      - id: objectives/supply-chain/pypi/summary::unknown-summary
      - id: objectives/supply-chain/pypi/homepage::unknown-homepage
      - id: objectives/supply-chain/pypi/author::unknown-author
      - id: objectives/supply-chain/pypi/description::unknown-description
      - id: objectives/supply-chain/pypi/email::unknown-author-email
    none:
      - id: objectives/supply-chain/pypi/version::pkginfo-dev-version
  - id: pkg-info-privilege-social-engineering
    desc: PKG-INFO requests elevated install privileges
    crit: suspicious
    conf: 0.92
    attack: T1204.001
    mbc: F0004
    platforms:
      - unix
      - windows
    all:
      - id: objectives/supply-chain/pypi/summary::summary-requests-admin
      - id: objectives/supply-chain/pypi/general::unknown-platform
  - id: pkg-info-malware-keywords
    desc: PKG-INFO with malware-related keywords
