defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - python
  mbc: B0024
  attack: T1195.002
traits:
  - id: arch-string-check
    desc: Architecture string checks
    crit: notable
    conf: 0.5
    if:
      type: raw
      regex: '"(x86|AMD64|arm64|aarch64)" in platform'
  - id: import-safe-download
    desc: safe_download function import
    crit: notable
    conf: 0.7
    if:
      type: raw
      substr: import safe_download
  - id: download-with-delete
    desc: Download with delete=True parameter
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: delete=True
    unless:
      - type: raw
        regex: def\s+[^\n]+\bdelete=True
  - id: safe-run-call
    desc: Call to safe_run execution function
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: safe_run\s*\(
  - id: os-system-call
    desc: os.system() shell execution
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: call
      regex: os\.system\(
  - id: platform-os-system-combo
    desc: Platform check with os.system
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: platform\.system.{0,50}os\.system|os\.system.{0,50}platform\.system
  - id: inline-wget-exec
    desc: Inline wget download and execute
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: wget\s+https?://.{10,300}&&.{0,50}(tar|chmod|\./)
  - id: nohup-background
    desc: nohup background execution
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: nohup\s+\./[a-zA-Z_]
  - id: linux-in-platform
    desc: Linux in platform.system() check
    crit: notable
    conf: 0.6
    mbc: B0012
    attack: T1082
    if:
      type: raw
      substr: '"Linux" in platform.system()'
composite_rules:
  - id: platform-checks
    desc: Combined platform.system and platform.machine
    crit: notable
    conf: 0.75
    all:
      - id: micro-behaviors/os/sysinfo/platform::platform-system
      - id: micro-behaviors/os/sysinfo/platform::python-platform-machine
  - id: platform-targeted-download
    desc: Platform-targeted binary download
    crit: suspicious
    conf: 0.9
    attack: T1195.002 - python
    needs: 2
    any:
      - id: platform-checks
      - id: objectives/discovery/system/fingerprint/os::os-check-linux
      - id: objectives/discovery/system/fingerprint/os::os-check-darwin
      - id: arch-string-check
    all:
      - id: objectives/command-and-control/dropper/behavior::tmp-path
  - id: init-dropper
    desc: Supply chain dropper in module init
    crit: suspicious
    conf: 0.95
    mbc: B0024 - python
    all:
      - id: objectives/supply-chain/pypi/install-patterns::init-py-file
    any:
      - id: download-with-delete
      - id: safe-run-call
      - id: import-safe-download
      - id: objectives/command-and-control/dropper/behavior::tmp-path
      - id: os-system-call
      - id: platform-os-system-combo
      - id: inline-wget-exec
      - id: nohup-background
    none:
      - id: metadata/quality::configure-script
  - id: os-system-wget-dropper
    desc: os.system wget download and execute
    crit: hostile
    conf: 0.95
    mbc: B0024 - python
    all:
      - id: os-system-call
      - id: inline-wget-exec
