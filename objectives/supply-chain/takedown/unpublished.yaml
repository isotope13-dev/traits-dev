# The registry has already pulled this version (npm `time.unpublished`) while its
# metadata still resolves. A registry-side takedown is a strong reputation signal
# — a benign self-unpublish exists, so a removal alone stays notable (the
# `metadata/registry::version-removed` atom), but paired with another anomaly it
# is almost always a malware takedown. Fires on the registry record alone (the
# artifact is gone), so these are NOT scope:package.
defaults:
  for: [all]
  platforms: [unix, windows, android, ios]

composite_rules:
- id: fresh-package-already-removed
  desc: Days-old package already pulled from the registry
  crit: suspicious
  conf: 0.78
  # A package only days old whose version the registry already removed. npm
  # unpublishes malware fast, so a fresh name that is already gone is almost
  # always a takedown.
  all:
    - id: metadata/registry::brand-new-package
    - id: metadata/registry::version-removed

- id: anonymous-removed-package
  desc: Removed package had no maintainers
  crit: suspicious
  conf: 0.75
  # `fresh-package-already-removed` needs the version to be brand-new, but npm
  # usually pulls malware later than 7 days, so most removed packages are older.
  # A removed version with no maintainers is an anonymous package the registry
  # already deleted — rare for a benign self-unpublish.
  all:
    - id: metadata/registry::version-removed
    - id: metadata/registry::no-maintainers
