# Staged payload delivery patterns in npm packages
# Detects packages that prepare infrastructure for future payload delivery
defaults:
  platforms: [unix, windows, macos]
  attack: T1195.002
traits:
  # Commented-out require/import of dist or build files
  - id: commented-require-dist
    desc: Commented-out require of dist/build file
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: raw
      regex: '//\s*(const|let|var).{0,40}require\(.{0,60}(dist|build)/'
  # files field references dist/* but no build script
  - id: files-dist-ref
    desc: Package files field references dist directory
    crit: component
    conf: 0.85
    for: [package.json]
    if:
      type: kv
      path: "files[*]"
      substr: "dist/"
  - id: no-build-script
    desc: Package has no build script
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.build"
      exists: false
composite_rules:
  - id: phantom-dist-directory
    desc: Files field lists dist/ but no build script
    crit: suspicious
    conf: 0.88
    for: [package.json]
    all:
      - id: files-dist-ref
      - id: no-build-script
  - id: staged-payload-delivery
    desc: Staged payload delivery infrastructure
    crit: hostile
    conf: 0.92
    for: [javascript]
    all:
      - id: commented-require-dist
    any:
      - id: objectives/supply-chain/dependencies::npm-no-dependencies
      - id: metadata/quality/package-info::npm-no-author
