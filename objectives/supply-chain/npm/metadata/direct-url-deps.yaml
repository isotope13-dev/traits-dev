# Direct URL Dependencies - npm
# GuardDog-inspired: Detects packages with direct URL/Git dependencies
# These dependencies are not immutable and can be used to inject untrusted code
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# MBC: E1195 (Supply Chain Compromise)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
  crit: suspicious
  conf: 0.85
  attack: "T1195.002"
  mbc: "E1195"
traits:
  # Direct HTTP URL in dependencies
  - id: dep-http-url
    desc: Dependency using HTTPS URL
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}https://'
  - id: devdep-http-url
    desc: DevDependency using HTTPS URL
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: '"devDependencies"\s*:\s*\{[^}]{0,1000}https://'
    downgrade:
      any:
        - id: metadata/package/fields::is-private
  # git:// protocol
  - id: dep-git-url
    desc: Dependency using git:// URL
    crit: suspicious
    conf: 0.90
    if:
      type: raw
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}git://'
  # git+ssh://
  - id: dep-git-ssh-url
    desc: Dependency using git+ssh:// URL
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}git\+ssh://'
  # git+http:// or git+https://
  - id: dep-git-http-url
    desc: Dependency using git+http(s):// URL
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}git\+https?://'
  # git+file://
  - id: dep-git-file-url
    desc: Dependency using git+file:// URL
    crit: suspicious
    conf: 0.90
    if:
      type: raw
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}git\+file://'
  # GitHub shorthand: "user/repo"
  - id: dep-github-shorthand
    desc: Dependency using GitHub shorthand
    crit: suspicious
    conf: 0.80
    if:
      type: raw
      regex: '"dependencies".{0,5}\{.{0,200}:\s*"[a-zA-Z0-9_.-]+/'
    not:
      - substr: "http"
      - substr: "git://"
  - id: devdep-github-shorthand
    desc: DevDependency using GitHub shorthand
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: '"devDependencies".{0,5}\{.{0,200}:\s*"[a-zA-Z0-9_.-]+/'
    not:
      - substr: "http"
      - substr: "git://"
  # Direct tarball URLs
  - id: dep-tarball-url
    desc: Dependency using direct tarball URL
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '"dependencies"\s*:\s*\{.{0,1000}\.tgz"'
  # file:// protocol
  - id: dep-file-protocol
    desc: Dependency using file:// protocol
    crit: notable
    conf: 0.70
    if:
      type: raw
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}file://'
  # Relative paths
  - id: dep-relative-path
    desc: Dependency using relative path
    crit: notable
    conf: 0.65
    if:
      type: raw
      regex: '"dependencies".{0,5}\{.{0,500}:\s*"\.\.?/'
  # Plain HTTP (not HTTPS) dependency
  - id: dep-plaintext-http
    desc: Dependency fetched over plain HTTP
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}"http://'
  - id: devdep-plaintext-http
    desc: DevDependency fetched over plain HTTP
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: '"devDependencies"\s*:\s*\{[^}]{0,1000}"http://'
composite_rules:
  # Any HTTP/HTTPS URL in dependencies
  - id: http-url-dependency
    desc: Package depends on HTTPS URL
    crit: notable
    conf: 0.8
    any:
      - id: dep-http-url
      - id: dep-tarball-url
  # Any Git URL
  - id: git-url-dependency
    desc: Package depends on Git URL
    crit: suspicious
    conf: 0.85
    any:
      - id: dep-git-url
      - id: dep-git-ssh-url
      - id: dep-git-http-url
      - id: dep-git-file-url
  # Direct URL Dependency (all types)
  - id: direct-url-dependency
    desc: Package has direct URL dependencies
    crit: suspicious
    conf: 0.85
    any:
      - id: http-url-dependency
      - id: git-url-dependency
      - id: dep-github-shorthand
  # Multiple URL dependencies
  - id: multiple-url-dependencies
    desc: Package has multiple direct URL deps
    crit: hostile
    conf: 0.90
    needs: 2
    any:
      - id: dep-http-url
      - id: dep-git-url
      - id: dep-git-ssh-url
      - id: dep-git-http-url
      - id: dep-github-shorthand
      - id: dep-tarball-url
  # URL dependency with install hooks
  - id: url-dependency-with-hooks
    desc: Direct URL dependency with install hooks
    crit: hostile
    conf: 0.98
    all:
      - id: direct-url-dependency
      - id: objectives/supply-chain/npm/metadata::install-hooks
  # Plain HTTP dep composite
  - id: plaintext-http-dependency
    desc: Dependency fetched over plain HTTP
    crit: suspicious
    conf: 0.95
    any:
      - id: dep-plaintext-http
      - id: devdep-plaintext-http
  # URL dep + minimal metadata = hostile
  - id: url-dep-minimal-metadata
    desc: URL dependency with minimal package metadata
    crit: hostile
    conf: 0.95
    all:
      - id: direct-url-dependency
      - id: objectives/supply-chain/npm/behavior::pkg-no-description-short
    none:
      - id: objectives/supply-chain/npm/metadata::npm-has-repository
