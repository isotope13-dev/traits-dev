defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: readme-md
    desc: README.md file
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: README.md
  - id: placeholder-confusion-claim
    desc: README claims confusion prevention
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: placeholder.{0,80}prevent dependency confusion
      case_insensitive: true
  - id: no-usable-code-claim
    desc: README claims no usable code
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: does not contain usable code
      case_insensitive: true
composite_rules:
  - id: placeholder-readme-misdirection
    desc: README markets placeholder confusion decoy
    crit: notable
    conf: 0.92
    all:
      - id: readme-md
      - id: placeholder-confusion-claim
  - id: placeholder-readme-decoy
    desc: README denies usable code in decoy
    crit: suspicious
    conf: 0.95
    all:
      - id: readme-md
      - id: placeholder-confusion-claim
      - id: no-usable-code-claim
