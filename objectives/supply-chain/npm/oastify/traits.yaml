defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
traits:
  - id: repeated-preinstall-hooks
    desc: Registry metadata repeats preinstall hook
    crit: suspicious
    conf: 0.94
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"preinstall\"\\s*:\\s*\".{0,2400}\"preinstall\"\\s*:\\s*\""
  - id: curl-post
    desc: Lifecycle hook posts with curl
    crit: suspicious
    conf: 0.96
    attack: "T1041"
    if:
      type: raw
      regex: "curl\\s+(-[a-zA-Z]+\\s+){0,4}-X\\s+POST\\b"
  - id: data-urlencode
    desc: Lifecycle hook URL-encodes POST fields
    crit: suspicious
    conf: 0.97
    attack: "T1041"
    if:
      type: raw
      substr: "--data-urlencode"
  - id: hostname-postfield
    desc: Lifecycle hook posts hostname field
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    if:
      type: raw
      substr: "HOSTNAME=$(hostname)"
  - id: whoami-postfield
    desc: Lifecycle hook posts whoami field
    crit: suspicious
    conf: 0.97
    attack: "T1033"
    if:
      type: raw
      substr: "WHOAMI=$(whoami)"
  - id: uname-postfield
    desc: Lifecycle hook posts uname field
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    if:
      type: raw
      substr: "UNAME=$(uname -a)"
  - id: passwd-postfield
    desc: Lifecycle hook exfiltrates passwd field
    crit: suspicious
    conf: 0.995
    attack: "T1041"
    if:
      type: raw
      substr: "PASSWD=$(cat /etc/passwd)"
  - id: hostname-oastify-subdomain
    desc: Lifecycle hook uses hostname OASTify subdomain
    crit: suspicious
    conf: 0.995
    attack: "T1048.003"
    if:
      type: raw
      regex: "https?://\\$\\(hostname\\)\\.[a-z0-9]+\\.oastify\\.com"
  - id: oastify-url
    desc: Lifecycle hook posts to OASTify endpoint
    crit: suspicious
    conf: 0.96
    attack: "T1048.003"
    if:
      type: raw
      regex: "https?://[a-z0-9]+\\.oastify\\.com"
  - id: passwd-file-exfil
    desc: Lifecycle hook exfiltrates /etc/passwd file
    crit: suspicious
    conf: 0.98
    attack: "T1005"
    if:
      type: raw
      regex: "(content@|--upload-file\\s+|<\\s*)/etc/passwd"
  - id: curl-post-ssilent
    desc: Lifecycle hook uses silent curl POST
    crit: suspicious
    conf: 0.95
    attack: "T1041"
    if:
      type: raw
      regex: "curl\\s+(-[a-zA-Z]*s[a-zA-Z]*S|(-s\\s+-S|-S\\s+-s))"
  # Node.js inline exfil patterns (node -e with https.request)
  - id: node-oastify-hostname
    desc: Lifecycle hook references oastify.com hostname
    crit: suspicious
    conf: 0.96
    attack: "T1567"
    if:
      type: raw
      substr: "oastify.com"
  - id: node-os-platform
    desc: Lifecycle script calls os.platform()
    crit: component
    conf: 0.88
    attack: "T1082"
    if:
      type: raw
      substr: "os.platform()"
  - id: node-os-arch
    desc: Lifecycle script calls os.arch()
    crit: component
    conf: 0.88
    attack: "T1082"
    if:
      type: raw
      substr: "os.arch()"
  - id: node-os-userinfo
    desc: Lifecycle script calls os.userInfo()
    crit: component
    conf: 0.9
    attack: "T1033"
    if:
      type: raw
      substr: "os.userInfo()"
  - id: node-dns-lookup
    desc: Lifecycle script performs dns.lookup()
    crit: component
    conf: 0.88
    attack: "T1071.004"
    if:
      type: raw
      substr: "dns.lookup("
  - id: node-https-request
    desc: Lifecycle script makes https.request()
    crit: component
    conf: 0.85
    attack: "T1071.001"
    if:
      type: raw
      substr: ".request({hostname:"
composite_rules:
  - id: oastify-recon
    desc: Registry metadata exfiltrates host recon to OASTify
    crit: hostile
    conf: 0.995
    attack: "T1041"
    all:
      - id: objectives/supply-chain/npm/metadata::registry-metadata-json
      - id: objectives/supply-chain/npm/metadata::install-hooked-registry-package
      - id: curl-post
      - id: hostname-postfield
      - id: whoami-postfield
      - id: uname-postfield
      - id: hostname-oastify-subdomain
    any:
      - id: data-urlencode
      - id: repeated-preinstall-hooks
  - id: passwd-oastify-exfil
    desc: Registry metadata exfiltrates passwd to OASTify
    crit: hostile
    conf: 0.999
    attack: "T1041"
    all:
      - id: oastify-recon
      - id: passwd-postfield
  - id: curl-oastify-passwd-exfil
    desc: Preinstall curl exfiltrates passwd to OASTify
    crit: hostile
    conf: 0.998
    attack: "T1041"
    all:
      - id: objectives/supply-chain/npm/metadata::registry-metadata-json
      - id: objectives/supply-chain/npm/metadata::install-hooked-registry-package
      - id: curl-post
      - id: oastify-url
      - id: passwd-file-exfil
    any:
      - id: data-urlencode
      - id: curl-post-ssilent
  - id: node-oastify-recon
    desc: Node.js preinstall exfiltrates sysinfo to OASTify
    crit: hostile
    conf: 0.98
    attack: "T1041"
    mbc: "E1041"
    all:
      - id: objectives/supply-chain/npm/metadata::versioned-lifecycle-node-e
      - id: node-oastify-hostname
    any:
      - id: node-os-platform
      - id: node-os-arch
      - id: node-os-userinfo
      - id: node-dns-lookup
      - id: node-https-request
    needs: 2
  - id: node-oob-sysinfo-exfil
    desc: Node.js preinstall collects system fingerprint
    crit: suspicious
    conf: 0.94
    attack: "T1082"
    all:
      - id: objectives/supply-chain/npm/metadata::versioned-lifecycle-node-e
    any:
      - id: node-os-platform
      - id: node-os-arch
      - id: node-os-userinfo
    needs: 2
