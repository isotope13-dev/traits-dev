# Code Quality Composite Rules
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: terser-minifier-helpers
    desc: Minifier helper patterns
    for: [javascript]
    any:
      - {id: objectives/supply-chain/npm/minifier}
    crit: baseline
  - id: terser-output
    desc: Terser/UglifyJS minified output markers
    crit: baseline
    conf: 0.85
    for: [javascript]
    all:
      - {id: 'objectives/supply-chain/npm/minifier::use-strict-quote'}
      - {id: terser-minifier-helpers}
  - id: has-multiple-entries
    desc: Package has multiple entry points
    crit: notable
    conf: 0.85
    for: [package.json]
    needs: 2
    any:
      - {id: 'metadata/package/fields::pkg-main-field'}
      - {id: 'objectives/supply-chain/npm/exports::pkg-module-field'}
      - {id: 'objectives/supply-chain/npm/exports::pkg-exports-field-entry'}
      - {id: 'metadata/package/fields::pkg-types-field'}
