# GitHub Actions environment file poisoning.
# Attackers append to the workflow's $GITHUB_ENV / $GITHUB_PATH files to
# inject env vars or PATH entries into all subsequent steps in the same job.
# Combined with Go-module integrity bypass flags (GONOSUMCHECK, GOFLAGS=-mod=mod)
# this is a classic build-pipeline supply-chain compromise.
#
# ATT&CK: T1574.007 (Path Interception by PATH Environment Variable)
#         T1195.002 (Compromise Software Supply Chain)
defaults:
  platforms: [unix, windows]
  attack: T1195.002
  mbc: B0024
  for: [go, shell, python, javascript, typescript]
traits:
- id: go-mod-sum-bypass
  desc: Disables Go module sum verification
  crit: suspicious
  conf: 0.95
  for: [go]
  if:
    type: text
    regex: 'GONOSUMCHECK|GONOSUMDB|["`]OSU["`]\s*,\s*["`]MCHECK|["`]OSU["`]\s*,\s*["`]MDB'
  unless:
  - type: text
    substr: "UsageLine:"  # Go toolchain help documentation
  - id: well-known/lib/golang-x-tools/
  - id: well-known/tool/development/go-toolchain::go-toolchain-distribution
- id: go-mod-mutate-flag
  desc: Sets GOFLAGS=-mod=mod (forces module mutation)
  crit: suspicious
  conf: 0.95
  for: [go]
  if:
    type: text
    regex: 'GOFLAGS\s*=\s*-mod=mod|LAGS=-mod=mod'
  unless:
  - id: well-known/lib/golang-x-tools/
composite_rules:
- id: github-actions-env-poison
  desc: Injects env vars into GitHub Actions job via $GITHUB_ENV
  crit: hostile
  conf: 0.96
  near_lines: 30
  all:
  - id: micro-behaviors/os/env/vars/cicd::github-env-file
  any:
  - id: go-mod-sum-bypass
  - id: go-mod-mutate-flag
  - id: micro-behaviors/fs/file/open::os-openfile-append
- id: github-actions-path-hijack
  desc: Hijacks PATH in GitHub Actions job via $GITHUB_PATH
  crit: hostile
  conf: 0.95
  near_lines: 30
  all:
  - id: micro-behaviors/os/env/vars/cicd::github-path-file
  - id: micro-behaviors/fs/file/open::os-openfile-append
- id: go-build-supply-chain-poison
  desc: Go program poisons CI build with module-integrity bypass
  crit: hostile
  conf: 0.98
  for: [go]
  all:
  - id: micro-behaviors/os/env/vars/cicd::github-actions-flag
  - id: micro-behaviors/os/env/vars/cicd::github-env-file
  any:
  - id: go-mod-sum-bypass
  - id: go-mod-mutate-flag
