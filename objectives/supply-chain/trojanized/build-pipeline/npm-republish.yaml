# A release helper that edits package contents in place before publishing is
# supply-chain-relevant. The atomic replacement marker stays suspicious: some
# legitimate release tooling rewrites version or CDN metadata, while the
# combination with publication is the stronger tampering signal.
defaults:
  platforms: [unix]
  for: [shell]
  attack: T1195.002

traits:
  - id: package-content-replacement
    desc: Replaces package content before writing it back
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?s)replace\s*\(.{0,400}\)\s*.{0,400}\.write\s*\('

composite_rules:
  - id: package-content-replacement-and-publish
    desc: Rewrites package content and republishes it
    crit: suspicious
    conf: 0.95
    all:
      - id: package-content-replacement
      - id: micro-behaviors/process/interpreter/embedded-python::shell-embedded-python-heredoc
      - id: micro-behaviors/os/package-manager/publish::npm-publish-command
    near_lines: 55
