# A release helper that edits package contents in place before publishing is
# supply-chain-relevant. The atomic replacement marker stays suspicious: some
# legitimate release tooling rewrites version or CDN metadata, while the
# combination with publication is the stronger tampering signal.
defaults:
  platforms: [unix]
  for: [shell]
  attack: T1195.002

composite_rules:
  - id: package-content-replacement-and-publish
    desc: Rewrites package content and republishes it
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/data/manipulation::python-replace-before-file-write
      - id: micro-behaviors/process/interpreter/embedded-python::shell-embedded-python-heredoc
      - id: micro-behaviors/os/package-manager/publish::npm-publish-command
    near_lines: 55
  - id: npm-publish-and-cdn-purge
    desc: Publishes npm package and purges CDN cache
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/os/package-manager/publish::npm-publish-command
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen
    near_lines: 60
  - id: npm-republishes-remote-iframe-payload
    desc: Republishes package containing remote iframe takeover
    crit: hostile
    conf: 0.99
    for: [npm]
    scope: archive
    attack: T1195.002,T1491.002
    all:
      - id: package-content-replacement-and-publish
      - id: objectives/impact/ui/delivery::remote-iframe-overlay
