# CI/CD Script Tampering Detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects patterns similar to Codecov shell uploader attack
# Malicious code injected into CI scripts that exfiltrate secrets
defaults:
  platforms: [unix]
  for: [shell]
  crit: suspicious
  attack: "T1195.002"
traits:
  # ============================================================
  # CODECOV-STYLE PATTERNS
  # ============================================================
- id: env-to-curl-post
  desc: Environment sent to external URL
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(env|printenv|set).{0,30}\|.{0,30}curl.{0,30}-X\s*POST'
  # Atomic traits for sensitive variable grepping (grep/sed + TOKEN/SECRET)
- id: grep-token-var
  desc: grep for TOKEN variable
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'grep.{0,50}TOKEN'
- id: grep-secret-var
  desc: grep for SECRET variable
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'grep.{0,50}SECRET'
- id: sed-token-var
  desc: sed for TOKEN variable
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'sed.{0,50}TOKEN'
- id: sed-secret-var
  desc: sed for SECRET variable
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'sed.{0,50}SECRET'
- id: sensitive-var-tool-before-key
  desc: Grep-like tool before KEY variable
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: '(grep|awk|sed).{0,50}\bKEY\b'
- id: sensitive-var-key-before-tool
  desc: KEY variable before grep-like tool
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: '\bKEY\b.{0,50}(grep|awk|sed)'
- id: sensitive-var-tool-before-pass
  desc: Grep-like tool reads dollar PASS variable
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: '(?m)^.{0,200}(grep|awk|sed).{0,50}\$[A-Z_]*PASS\b'
- id: sensitive-var-tool-before-password
  desc: Grep-like tool reads password variable
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: '(grep|awk|sed).{0,50}\b[A-Z_]*(PASSWORD|PASSWD)\b'
  not:
  - substr: yourpasswordhere
- id: sensitive-var-grep-cred
  desc: Greps for CRED variables
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: '(grep|awk|sed).{0,50}CRED'
- id: curl-data-token-var
  desc: curl posts token variable
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '\bcurl\b.{0,80}(-d|--data\S*)\s+["'']?\$[A-Z_]*(TOKEN|SECRET|PASS)'
- id: curl-data-credential-var
  desc: curl posts credential variable
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '\bcurl\b.{0,80}(-d|--data\S*)\s+["'']?\$[A-Z_]*(KEY|CRED|AUTH)'
- id: curl-data-package-var
  desc: curl posts package token variable
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '\bcurl\b.{0,80}(-d|--data\S*)\s+["'']?\$[A-Z_]*(AWS|GITHUB|NPM)'
  # Atomic traits for shell uploader pattern (decomposed to avoid overlaps)
- id: sh-curl-process-sub-env
  desc: "Shell downloads code while reading environment"
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '(?m)^\s*sh\s+<\(curl[^\n]{0,200}(\$\(\s*|\|\s*)(print)?env\b'
  not:
  - substr: codecov.io/env
- id: sh-curl-process-sub-var--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'sh.{0,30}<\(curl[\s\S]{0,200}\$[A-Z_]*(TOKEN|KEY)[A-Z_]*'
  count_max: 1028713
- id: sh-curl-process-sub-var--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'sh.{0,30}<\(curl[\s\S]{0,200}\$[A-Z_]*(SECRET|PASS)[A-Z_]*'
  count_max: 1028714
- id: sh-curl-process-sub-var--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'sh.{0,30}<\(curl[\s\S]{0,200}\$[A-Z_]*(CRED|AUTH)[A-Z_]*'
  count_max: 1028715
- id: sh-curl-process-sub-var--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'sh.{0,30}<\(curl[\s\S]{0,200}\$[A-Z_]*(NPM|GITHUB)[A-Z_]*'
  count_max: 1028716
- id: gha-curl-python-output
  desc: Downloads Python from secret URL
  crit: notable
  conf: 0.94
  for: [github-actions]
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: '\bcurl\b.{0,120}\$\{\{\s*secrets\.[A-Z0-9_]+\s*\}\}.{0,120}(-o|--output)\s+\S{1,80}\.py'
- id: gha-env-dump
  desc: GitHub Actions dumps environment
  crit: notable
  conf: 0.85
  for: [github-actions]
  if:
    type: text
    regex: 'run:\s*(env|printenv)\b|run:\s*set\s*($|[|>])'
- id: gha-base64-secrets
  desc: GitHub Actions base64 encodes secrets
  crit: suspicious
  conf: 0.95
  for: [github-actions]
  if:
    type: text
    regex: 'run:.{0,80}base64.{0,50}\$\{\{\s*secrets\.'
- id: gha-comment-body-run
  desc: GitHub comment body in shell
  crit: suspicious
  conf: 0.96
  for: [github-actions]
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: '\$\{\{\s*github\.event\.comment\.body'
  unless:
  - id: well-known/app/stirling-pdf::source-tree
  - id: metadata/package/testing/presence/harness::github-actions-testdata-directory-path
- id: gha-issue-field-run
  desc: GitHub issue field in shell
  crit: suspicious
  conf: 0.94
  for: [github-actions]
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: '\$\{\{\s*github\.event\.issue\.(title|body)\s*\}\}'
  unless:
  - type: path
    regex: '(^|[\\/])\.github[\\/]workflows[\\/]auto-answer-issues\.ya?ml$'
  - id: metadata/package/testing/presence/harness::github-actions-testdata-directory-path
- id: gha-pr-field-run
  desc: GitHub PR field in shell
  # Interpolating PR title/body into a run step is a common commitlint/changelog
  # pattern. Attack intent requires a stager composite (e.g. curl|shell).
  crit: notable
  conf: 0.94
  for: [github-actions]
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: '\$\{\{\s*github\.event\.pull_request\.(title|body)\s*\}\}'
  unless:
  - id: metadata/package/testing/presence/harness::github-actions-testdata-directory-path
- id: gha-head-ref-run
  desc: GitHub head_ref in shell
  crit: component
  conf: 0.92
  for: [github-actions]
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: '\$\{\{\s*github\.head_ref\s*\}\}'
  unless:
    - id: metadata/library/github-actions::action-testdata-path
- id: gha-run-curl-pipe-shell
  desc: GitHub Actions curl pipe shell
  crit: notable
  conf: 0.95
  for: [github-actions]
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: '\bcurl\b[^\n|]{0,160}\|\s*(bash|sh)\b'
  unless:
  - id: objectives/command-and-control/dropper/delivery/pipe/
  downgrade:
    any:
    - id: objectives/command-and-control/dropper/delivery/pipe::gha-anchore-grype-pipe-installer
    # A conventionally-named install script piped to a shell is an installer, not
    # a tamper attempt. Downgrade keeps the untrusted-input stager composites
    # (gha-comment/issue/pr/head_ref-shell-stager) intact — those still fire.
    - id: micro-behaviors/os/service/legitimate::install-script-pipe
    - id: micro-behaviors/os/service/legitimate::getter-script-pipe
- id: gha-release-publish-step
  desc: GitHub Actions package publish step
  crit: component
  conf: 0.86
  for: [github-actions]
  if:
    type: text
    regex: 'pypa/gh-action-pypi-publish|ghcr\.io/[^''"\s]{1,160}'
- id: jenkins-shared-library-load
  desc: Jenkins shared library load
  crit: notable
  conf: 0.9
  for: [groovy]
  if:
    type: text
    regex: '@Library\("[A-Za-z0-9_.-]+@[^"]{1,40}"\)'
- id: jenkins-npm-publish-step
  desc: Jenkins npm publish step
  crit: notable
  conf: 0.9
  for: [groovy]
  if:
    type: text
    substr: "NPM_Publish"
  # ============================================================
  # CI CONFIG FILE PATTERNS
  # ============================================================
- id: travis-env-curl
  desc: Travis CI with env exfiltration
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(script|after_success|before_install)[\s\S]{0,200}(env|printenv).{0,30}curl'
- id: circleci-env-curl
  desc: CircleCI with env exfiltration
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(run:|command:)[\s\S]{0,100}(env|printenv).{0,30}(curl|wget)'
  # ============================================================
  # ARTIFACT POISONING
  # ============================================================
- id: makefile-basename
  desc: Makefile build script basename
  crit: notable
  conf: 0.95
  if:
    type: basename
    exact: Makefile
- id: curl-output-artifact-short-a
  desc: curl writes into dist or build
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'curl\b.{0,160}(\s-o\s*|\s--output\s+)(dist|build)/'
- id: curl-output-artifact-short-b
  desc: curl writes into out or target
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'curl\b.{0,160}(\s-o\s*|\s--output\s+)(out|target)/'
- id: curl-output-artifact-alt-a
  desc: curl writes into dist or build
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'curl\b.{0,160}(\s-O\s+|>\s*)(dist|build)/'
- id: curl-output-artifact-alt-b
  desc: curl writes into out or target
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'curl\b.{0,160}(\s-O\s+|>\s*)(out|target)/'
- id: curl-tee-artifact
  desc: curl piped into artifact tee
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'curl\b.{0,160}\|\s*tee\s+(dist|build|out|target)/'
- id: wget-output-artifact-short
  desc: wget writes into dist or build
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'wget\b.{0,160}\s-O\s+(dist|build)/'
- id: wget-output-artifact-short-b
  desc: wget writes into out or target
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'wget\b.{0,160}\s-O\s+(out|target)/'
- id: wget-output-artifact-long-a
  desc: wget writes into dist or build
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'wget\b.{0,160}\s--output-document[= ]+(dist|build)/'
- id: wget-output-artifact-long-b
  desc: wget writes into out or target
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'wget\b.{0,160}\s--output-document[= ]+(out|target)/'
composite_rules:
- id: sensitive-var-grep-pass
  desc: Grep-like tool targets password variables
  crit: notable
  conf: 0.75
  any:
  - id: sensitive-var-tool-before-pass
  - id: sensitive-var-tool-before-password
  # === Sensitive Variable Grepping (TOKEN/SECRET) ===
- id: sensitive-var-grep-token-secret
  desc: Exfiltrates grepped TOKEN or SECRET variables
  crit: suspicious
  conf: 0.85
  all:
  - id: env-to-curl-post
  any:
  - id: grep-token-var
  - id: grep-secret-var
  - id: sed-token-var
  - id: sed-secret-var
  # === Sensitive Variable Grepping (KEY/PASS/CRED) ===
- id: sensitive-var-grep-key
  desc: Greps for KEY variables
  crit: notable
  conf: 0.75
  any:
  - id: sensitive-var-tool-before-key
  - id: sensitive-var-key-before-tool
- id: sensitive-var-grep-key-pass-cred
  desc: Exfiltrates grepped KEY/PASS/CRED variables
  crit: suspicious
  conf: 0.85
  all:
  - id: env-to-curl-post
  any:
  - id: sensitive-var-grep-key
  - id: sensitive-var-grep-pass
  - id: sensitive-var-grep-cred
  # === Bash Uploader Pattern ===
- id: shell-uploader-pattern
  desc: Bash downloader with environment access
  crit: suspicious
  conf: 0.85
  all:
  - id: sh-curl-process-sub-env
  - id: sh-curl-process-sub-var
  # === Curl sensitive variable post ===
- id: curl-with-env-data
  desc: curl posts sensitive variable
  crit: suspicious
  conf: 0.95
  any:
  - id: curl-data-token-var
  - id: curl-data-credential-var
  - id: curl-data-package-var
  # === Codecov-style Attack ===
- id: codecov-style-attack
  desc: Codecov-style CI secret exfiltration
  crit: hostile
  conf: 0.98
  attack: "T1552.001"
  mbc: "E1552"
  needs: 2
  any:
  - id: env-to-curl-post
  - id: curl-with-env-data
  - id: shell-uploader-pattern
  unless:
  - id: well-known/app/freefem::freefem-release-script-path
  # === GitHub Actions Secret Theft ===
- id: gha-secret-theft
  desc: GitHub Actions secret theft
  crit: hostile
  conf: 0.95
  for: [github-actions]
  attack: "T1552.001"
  any:
  - id: micro-behaviors/communications/http/request/credentials::curl-secret-reference
  - id: gha-base64-secrets
  all:
  - id: gha-env-dump
# Fetching a script from a secret-held URL and running it is opaque remote
# code execution, but it has legitimate uses (private/owner-controlled data
# updaters that keep their scraper source private). On its own it is
# suspicious, not hostile; genuine trojanization additionally exfiltrates
# secrets or runs on untrusted triggers (gha-secret-theft /
# gha-untrusted-shell-injection), which carry the hostile verdict.
- id: gha-secret-python-download-exec
  desc: Runs Python fetched from a secret URL
  crit: suspicious
  conf: 0.9
  for: [github-actions]
  all:
  - id: micro-behaviors/communications/http/request/credentials::curl-secret-reference
  - id: gha-curl-python-output
  - id: micro-behaviors/process/create/script/file::github-actions-python-file
  # Owner-controlled data updaters (proxy lists, mirrors) fetch a private
  # scraper via secret URL and push refreshed data back with GITHUB_TOKEN.
  # That self-update shape is notable automation, not opaque remote exec.
  downgrade:
    all:
      - id: metadata/build/github-actions::github-push-action
      - id: metadata/build/github-actions::github-token-secret
# Committing the output of a secret-fetched updater back to its own repo is
# normal automation for auto-updated data repos (proxy lists, mirrors); a
# notable supply-chain observation, not a hostile push on its own.
- id: gha-secret-python-download-push
  desc: Secret-fetched CI code commits to its repo
  crit: notable
  conf: 0.9
  for: [github-actions]
  all:
  - id: gha-secret-python-download-exec
  - id: metadata/build/github-actions::github-push-action
  - id: metadata/build/github-actions::github-token-secret
- id: gha-untrusted-shell-injection
  desc: Untrusted GitHub field shell injection
  crit: hostile
  conf: 0.98
  for: [github-actions]
  attack: "T1059.004, T1195.002"
  any:
  - id: gha-comment-shell-stager
  - id: gha-issue-shell-stager
  - id: gha-pr-shell-stager
  - id: gha-head-ref-shell-stager
- id: gha-comment-shell-stager
  desc: Comment field executes shell stager
  crit: hostile
  conf: 0.98
  for: [github-actions]
  attack: "T1059.004, T1195.002"
  all:
  - id: gha-comment-body-run
  - id: gha-run-curl-pipe-shell
- id: gha-issue-shell-stager
  desc: Issue field executes shell stager
  crit: hostile
  conf: 0.98
  for: [github-actions]
  attack: "T1059.004, T1195.002"
  all:
  - id: gha-issue-field-run
  - id: gha-run-curl-pipe-shell
- id: gha-pr-shell-stager
  desc: PR field executes shell stager
  crit: hostile
  conf: 0.98
  for: [github-actions]
  attack: "T1059.004, T1195.002"
  all:
  - id: gha-pr-field-run
  - id: gha-run-curl-pipe-shell
- id: gha-head-ref-shell-stager
  desc: head_ref field executes shell stager
  crit: hostile
  conf: 0.97
  for: [github-actions]
  attack: "T1059.004, T1195.002"
  all:
  - id: gha-head-ref-run
  - id: gha-run-curl-pipe-shell
- id: gha-injected-release-pipeline
  desc: Injected GitHub release publishing pipeline
  crit: hostile
  conf: 0.98
  for: [github-actions]
  all:
  - id: gha-comment-body-run
  - id: gha-run-curl-pipe-shell
  - id: gha-release-publish-step
  # === CI Config Injection ===
- id: ci-config-injection
  desc: CI configuration injection attack
  crit: hostile
  conf: 0.95
  any:
  - id: travis-env-curl
  - id: circleci-env-curl
- id: jenkins-shared-library-publish
  desc: Jenkins shared library publishes package
  crit: suspicious
  conf: 0.93
  all:
  - id: jenkins-shared-library-load
  - id: jenkins-npm-publish-step
  # === Artifact Poisoning ===
- id: download-replace-artifact
  desc: Download to artifact directory
  crit: suspicious
  conf: 0.9
  any:
  - id: curl-output-artifact-short-a
  - id: curl-output-artifact-short-b
  - id: curl-output-artifact-alt-a
  - id: curl-output-artifact-alt-b
  - id: curl-tee-artifact
  - id: wget-output-artifact-short
  - id: wget-output-artifact-short-b
  - id: wget-output-artifact-long-a
  - id: wget-output-artifact-long-b
- id: artifact-replace-target
  desc: Replace build artifacts
  crit: suspicious
  conf: 0.8
  any:
  - id: micro-behaviors/fs/build-artifacts::stage-dist-build
  - id: micro-behaviors/fs/build-artifacts::stage-out-target
  unless:
  - id: metadata/package/testing/presence/harness::shell-crate-test-path
  - id: metadata/build/conda::conda-recipe-prefix-install-script
  - id: makefile-basename
  - id: micro-behaviors/process/create/shell/build::js-package-run-build-command
  - id: well-known/app/tabby/
  - id: metadata/package/testing/presence/harness::go-test-file
  - id: metadata/file/string/file::shell-benchmark-script-basename
  - id: metadata/file/string/file::shell-scripts-dir-context
- id: artifact-poisoning
  desc: Build artifact poisoning
  crit: hostile
  conf: 0.9
  all:
  - id: download-replace-artifact
  - id: artifact-replace-target
  # === Any CI/CD Attack ===
- id: ci-cd-supply-chain-attack
  desc: CI/CD supply chain attack
  crit: hostile
  conf: 0.98
  for: [shell, github-actions]
  any:
  # gha-secret-python-download-exec/-push intentionally excluded: opaque
  # secret-URL RCE alone is suspicious, not a confirmed supply-chain attack.
  - id: codecov-style-attack
  - id: gha-secret-theft
  - id: gha-untrusted-shell-injection
  - id: gha-injected-release-pipeline
  - id: ci-config-injection
  - id: artifact-poisoning
- id: sh-curl-process-sub-var
  desc: curl process substitution reads sensitive vars
  crit: suspicious
  conf: 0.85
  any:
  - id: sh-curl-process-sub-var--rx-2
  - id: sh-curl-process-sub-var--rx-3
  - id: sh-curl-process-sub-var--rx-4
  - id: sh-curl-process-sub-var--rx-5
  not:
  - substr: codecov.io/bash
  # ============================================================
  # GITHUB ACTIONS INJECTION
  # ============================================================
