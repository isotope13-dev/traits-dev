# GitHub Actions workflow patterns that allow untrusted PR content to
# influence privileged repository workflows. These are generic CI supply-chain
# risks, not Nx-specific indicators.
defaults:
  platforms: [unix, windows]
  for: [github-actions, shell, javascript]
  attack: T1195.002

traits:
- id: gha-pr-title-run-interpolation
  desc: PR title interpolated into shell
  crit: notable
  conf: 0.94
  for: [github-actions]
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: '\$\{\{\s*github\.event\.pull_request\.title\s*\}\}'
  unless:
  - id: metadata/package/testing/presence/harness::github-actions-testdata-directory-path

- id: gha-pr-body-run-interpolation
  desc: PR body interpolated into shell
  crit: notable
  conf: 0.94
  for: [github-actions]
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: '\$\{\{\s*github\.event\.pull_request\.body\s*\}\}'
  unless:
  - id: metadata/package/testing/presence/harness::github-actions-testdata-directory-path

- id: gha-checkout-extraheader-read
  desc: actions checkout extraheader token read
  crit: suspicious
  conf: 0.96
  for: [github-actions, shell]
  if:
    type: text
    regex: 'git\s+config\s+--get-all\s+http\.https://github\.com/\.extraheader'

- id: gha-curl-extraheader-post--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [github-actions, shell]
  if:
    type: text
    substr: http.https://github.com/.extraheader
  count_max: 1028684
- id: gha-curl-extraheader-post--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [github-actions, shell]
  if:
    type: text
    substr: data-raw
  count_max: 1028685
- id: gha-curl-extraheader-post--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [github-actions, shell]
  if:
    type: text
    substr: get-all
  count_max: 1028686
- id: gha-curl-extraheader-post--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [github-actions, shell]
  if:
    id: micro-behaviors/communications/http/download/curl::curl-cmd
  count_max: 1028688
- id: gha-node-auth-token-env
  desc: NODE_AUTH_TOKEN workflow environment secret
  crit: component
  conf: 0.9
  for: [github-actions]
  if:
    type: text
    regex: 'NODE_AUTH_TOKEN\s*:\s*\$\{\{\s*secrets\.'

- id: gha-cache-bust-env-write
  desc: GitHub Actions cache-bust env write
  crit: notable
  conf: 0.82
  for: [github-actions]
  if:
    type: text
    regex: 'CACHE_BUST\s*=\s*\$?\(?date\s+\+%s\)?[\s\S]{0,80}GITHUB_ENV'

- id: gha-package-publish-secret-name--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.88
  for: [github-actions]
  if:
    type: text
    regex: '\b(PYPI_API_TOKEN|NPM_TOKEN)\b'

  count_max: 1028694
- id: gha-package-publish-secret-name--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.88
  for: [github-actions]
  if:
    type: text
    regex: '\b(NODE_AUTH_TOKEN|TWINE_PASSWORD)\b'

  count_max: 1028695
- id: gha-package-publish-secret-name--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.88
  for: [github-actions]
  if:
    type: text
    regex: '\b(DOCKERHUB_TOKEN|DOCKER_PASSWORD)\b'

  count_max: 1028696
- id: gha-package-publish-secret-name--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.88
  for: [github-actions]
  if:
    type: text
    regex: '\b(CRATES_IO_TOKEN|CARGO_REGISTRY_TOKEN)\b'

  count_max: 1028697
- id: gha-github-script-workspace-require
  desc: github-script requires workspace file
  crit: suspicious
  conf: 0.92
  for: [github-actions]
  if:
    type: text
    regex: 'actions/github-script[\s\S]{0,900}require\s*\(\s*[''"]?\$\{\{\s*github\.workspace\s*\}\}/'

composite_rules:
- id: gha-secret-form-post
  desc: Active workflow curl POST embeds a secret
  crit: suspicious
  conf: 0.96
  for: [github-actions]
  near_bytes: 700
  all:
  - id: micro-behaviors/communications/http/curl::workflow-curl-data-option
  - id: metadata/build/github-actions::run-secret-reference

- id: gha-pr-target-checks-out-head
  desc: pull_request_target checks out external PR head
  crit: suspicious
  conf: 0.98
  for: [github-actions]
  all:
  - id: metadata/build/github-actions::pull-request-target-trigger
  - id: metadata/build/github-actions::actions-checkout-pr-head-ref
  unless:
  - id: metadata/build/github-actions::approval-gated-external-pr-checkout

- id: gha-pr-target-shell-injection
  desc: pull_request_target shell injection risk
  crit: suspicious
  conf: 0.98
  all:
  - id: metadata/build/github-actions::pull-request-target-trigger
  any:
  - id: gha-pr-title-run-interpolation
  - id: gha-pr-body-run-interpolation

- id: gha-pr-target-head-secret-exposure
  desc: External PR head receives workflow secrets
  crit: hostile
  conf: 0.99
  attack: "T1195.002,T1552.001"
  for: [github-actions]
  all:
  - id: metadata/build/github-actions::pull-request-target-trigger
  - id: gha-pr-target-checks-out-head
  any:
  - id: metadata/build/github-actions::local-composite-action-secret-input
  - id: metadata/build/github-actions::job-environment-secret-reference
  - id: metadata/build/github-actions::step-environment-secret-reference
  - id: metadata/build/github-actions::run-secret-reference

- id: gha-checkout-token-exfil
  desc: actions checkout token exfiltration
  crit: hostile
  conf: 0.985
  all:
  - id: gha-checkout-extraheader-read
  any:
  - id: objectives/supply-chain/recon-exfil/secrets/
  - id: micro-behaviors/communications/http/services/github::github-workflow-dispatch-api
  - id: gha-curl-extraheader-post
  - id: objectives/exfiltration/oob/endpoint::webhook-site

- id: gha-pr-target-checkout-token-theft
  desc: pull_request_target checkout token theft
  crit: hostile
  conf: 0.99
  all:
  - id: gha-pr-target-shell-injection
  - id: gha-checkout-extraheader-read
  any:
  - id: gha-checkout-token-exfil
  - id: objectives/exfiltration/oob/endpoint::webhook-site
  - id: micro-behaviors/communications/http/services/github::github-workflow-dispatch-api

- id: gha-publish-secret-workspace-script
  desc: Publish secret reaches workspace script
  crit: suspicious
  conf: 0.97
  all:
  - id: metadata/build/github-actions::workflow-dispatch-trigger
  - id: gha-node-auth-token-env
  - id: gha-github-script-workspace-require

- id: gha-dispatch-tokened-publish-exfil
  desc: Dispatched publish workflow token exfil
  crit: hostile
  conf: 0.99
  all:
  - id: micro-behaviors/communications/http/services/github::github-workflow-dispatch-api
  - id: gha-node-auth-token-env
  any:
  - id: objectives/supply-chain/recon-exfil/secrets::secrets-to-webhook
  - id: objectives/supply-chain/recon-exfil/secrets::secrets-in-http-body
  - id: objectives/supply-chain/recon-exfil/secrets::github-actions-secret-theft

- id: gha-bulk-secrets-workflow-exfil
  desc: GitHub Actions bulk secrets exfil
  crit: hostile
  conf: 0.99
  all:
  - id: gha-secret-form-post
  - id: metadata/build/github-actions::multiple-secret-references
  any:
  - id: gha-package-publish-secret-name
  - id: gha-cache-bust-env-write
  - id: metadata/build/github-actions::workflow-dispatch-trigger
  - id: objectives/supply-chain/recon-exfil/secrets::secrets-to-webhook
  unless:
  - id: well-known/tool/detection/stackrox::stackrox-security-platform
- id: gha-pr-target-encoded-shell-step
  desc: pull_request_target encoded shell step
  crit: suspicious
  conf: 0.98
  all:
  - id: metadata/build/github-actions::pull-request-target-trigger
  - id: objectives/anti-static/obfuscation/encoding/base64::base64-decode-exec
- id: gha-oidc-encoded-shell-step
  desc: OIDC workflow encoded shell step
  crit: suspicious
  conf: 0.98
  all:
  - id: metadata/build/github-actions::id-token-write-permission
  - id: objectives/anti-static/obfuscation/encoding/base64::base64-decode-exec
- id: gha-pr-target-oidc-encoded-shell
  desc: pull_request_target OIDC encoded shell
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/build/github-actions::pull-request-target-trigger
  - id: metadata/build/github-actions::id-token-write-permission
  - id: objectives/anti-static/obfuscation/encoding/base64::base64-decode-exec
- id: gha-pr-target-base64-shell-exec
  desc: pull_request_target base64 shell execution
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/build/github-actions::pull-request-target-trigger
  - id: objectives/anti-static/obfuscation/encoding/base64::base64-d-pipe-bash
- id: gha-oidc-base64-shell-exec
  desc: OIDC workflow base64 shell execution
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/build/github-actions::id-token-write-permission
  - id: objectives/anti-static/obfuscation/encoding/base64::base64-d-pipe-bash
- id: gha-pr-target-curl-pipe-shell
  desc: pull_request_target remote shell pipe
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/build/github-actions::pull-request-target-trigger
  - id: gha-pr-target-checks-out-head
  - id: objectives/command-and-control/dropper/delivery/pipe::gha-download-pipe-shell
  unless:
  - id: micro-behaviors/os/service/legitimate::clickhouse-installer-pipe
- id: gha-oidc-curl-pipe-shell
  desc: OIDC workflow remote shell pipe
  crit: notable
  conf: 0.99
  all:
  - id: metadata/build/github-actions::id-token-write-permission
  - id: gha-pr-target-checks-out-head
  - id: objectives/command-and-control/dropper/delivery/pipe::gha-download-pipe-shell
  unless:
  - id: micro-behaviors/os/service/legitimate::clickhouse-installer-pipe
- id: gha-pr-target-python-decoded-exec
  desc: pull_request_target Python decoded exec
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/build/github-actions::pull-request-target-trigger
  - id: objectives/anti-static/obfuscation/multi-layer::inline-python-decoded-exec-loader
- id: gha-oidc-python-decoded-exec
  desc: OIDC workflow Python decoded exec
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/build/github-actions::id-token-write-permission
  - id: objectives/anti-static/obfuscation/multi-layer::inline-python-decoded-exec-loader
- id: gha-pr-target-ruby-encoded-eval
  desc: pull_request_target Ruby encoded eval
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/build/github-actions::pull-request-target-trigger
  - id: objectives/anti-static/obfuscation/payload/encoded::inline-ruby-base64-eval
- id: gha-oidc-ruby-encoded-eval
  desc: OIDC workflow Ruby encoded eval
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/build/github-actions::id-token-write-permission
  - id: objectives/anti-static/obfuscation/payload/encoded::inline-ruby-base64-eval
- id: gha-curl-extraheader-post
  desc: Curl posts checkout extraheader token
  crit: suspicious
  conf: 0.98
  for: [github-actions, shell]
  all:
  - id: gha-curl-extraheader-post--rx-1
  - id: gha-curl-extraheader-post--rx-5
  any:
  - id: gha-curl-extraheader-post--rx-2
  - id: gha-curl-extraheader-post--rx-3
- id: gha-package-publish-secret-name
  desc: Registry publish-token secret name
  crit: component
  conf: 0.88
  for: [github-actions]
  any:
  - id: gha-package-publish-secret-name--rx-6
  - id: gha-package-publish-secret-name--rx-7
  - id: gha-package-publish-secret-name--rx-8
  - id: gha-package-publish-secret-name--rx-9
