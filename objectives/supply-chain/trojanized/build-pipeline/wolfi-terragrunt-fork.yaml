defaults:
  platforms: [unix, windows]
  for: [manifests]
  attack: T1195.002

traits:
  - id: terragrunt-package-name
    desc: Manifest package named terragrunt
    crit: notable
    conf: 0.9
    size_max: 4096
    if:
      type: raw
      substr: "name: terragrunt"
  - id: wolfi-git-checkout-step
    desc: Wolfi pipeline uses git-checkout
    crit: notable
    conf: 0.82
    size_max: 4096
    if:
      type: raw
      substr: "- uses: git-checkout"
  - id: terragrunt-personal-fork-checkout
    desc: Terragrunt checkout uses tdunlap607 fork
    crit: suspicious
    conf: 0.98
    size_max: 4096
    if:
      type: raw
      substr: "repository: https://github.com/tdunlap607/terragrunt"
  - id: terragrunt-personal-fork-update
    desc: Terragrunt update tracks tdunlap607 fork
    crit: suspicious
    conf: 0.98
    size_max: 4096
    if:
      type: raw
      substr: "identifier: tdunlap607/terragrunt"
  - id: terragrunt-upstream-branding-ldflags
    desc: Forked build keeps gruntwork version path
    crit: suspicious
    conf: 0.93
    size_max: 4096
    if:
      type: raw
      substr: "github.com/gruntwork-io/go-commons/version.Version="

composite_rules:
  - id: terragrunt-forked-release-manifest
    desc: Terragrunt manifest pulls and updates same fork
    crit: hostile
    conf: 0.995
    all:
      - id: terragrunt-package-name
      - id: terragrunt-personal-fork-checkout
      - id: terragrunt-personal-fork-update
      - id: wolfi-git-checkout-step
  - id: terragrunt-fork-branding-mismatch
    desc: Forked terragrunt manifest keeps upstream branding
    crit: hostile
    conf: 0.999
    all:
      - id: terragrunt-forked-release-manifest
      - id: terragrunt-upstream-branding-ldflags
