defaults:
  platforms: [linux]
  for: [elf]
  attack: T1195.002
  mbc: B0025

composite_rules:
  - id: trojanized-apache-httpd-wrapper
    desc: Trojanized Apache httpd with stubbed ELF layout
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/server/listener::apache-httpd-core-exports
      - id: metadata/binary/layout::memory-backed-stub-layout
      - id: metadata/binary/layout::elf-overlay-over-512
    any:
      - id: metadata/build/artifact::elf-stripped-but-symtab-present
      - id: metadata/binary/metrics/structural::few-functions
      - id: metadata/binary/metrics/structural::few-basic-blocks
