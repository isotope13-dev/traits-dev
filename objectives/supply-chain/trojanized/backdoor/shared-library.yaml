# Supply Chain Binary Backdoor - Shared Object (.so) Detection
# Detects malicious shared libraries with backdoor capabilities
# ATT&CK: T1195.002 (Supply Chain Compromise: Compromise Software Supply Chain)
# Examples: triton libtriton.so, various PyPI/npm supply chain attacks with native code
defaults:
  for: [so]
  platforms: [linux]
  attack: "T1195.002"
  mbc: "B0025"
composite_rules:
  # Network backdoor in shared library
  # Shared libraries with socket server capabilities + shell execution
  # This is highly suspicious - legitimate .so files rarely do this
  - id: so-network-backdoor
    desc: Shared library with networked shell behavior
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/create/shell/spawn::shell-execution
    any:
      - id: micro-behaviors/communications/socket/bind/function::bind
      - id: micro-behaviors/communications/socket/listen::accept-sym
      - id: micro-behaviors/process/create/popen::c-popen
      - id: micro-behaviors/process/create/shell/spawn::system-fn
    # Exclude system network libraries
    unless:
      - id: micro-behaviors/dylib/library/family/
      - id: micro-behaviors/dylib/library/family/
      - id: metadata/binary/metrics/structural::many-imports
      - id: micro-behaviors/os/bpf/
    downgrade:
      any:
        - id: metadata/binary/provenance/
  # Shared library targeting credentials
  # .so with both SSH and shell config access is highly suspicious
  - id: so-credential-targeting
    desc: Shared library targeting user credentials
    crit: suspicious
    conf: 0.85
    attack: "T1552.004"
    needs: 2
    any:
      - id: micro-behaviors/fs/path/sensitive/ssh::keys
      - id: micro-behaviors/fs/path/sensitive/ssh::keys
      - id: objectives/persistence/login/shell/config::shell-files
      - id: objectives/persistence/login/shell/config::profile
    unless:
      - id: micro-behaviors/dylib/library/family/
      - id: micro-behaviors/dylib/library/family/
  # Shared library with C2 infrastructure
  # .so with suspicious domain + network operations
  - id: so-c2-infrastructure
    desc: Shared library with C2 infrastructure
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/command-and-control/infrastructure/domain/malicious::c2-domain
    any:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/communications/socket/bind/function::bind
    unless:
      - id: micro-behaviors/dylib/library/family/
  # Trojanized shared library with rootkit capabilities.
  # Linux PIE executables share ET_DYN with shared libraries, so the
  # `for: [so]` filter alone matches standalone implant ELFs too. The
  # interpreter check below excludes those: only true .so libraries
  # lack PT_INTERP.
  - id: so-rootkit-behavior
    desc: Trojanized .so with LD_PRELOAD + shell/dlsym
    crit: suspicious
    conf: 0.8
    attack: "T1574.006"
    all:
      - id: metadata/binary/layout::shared-object-type
      - id: micro-behaviors/os/linker/env::ld-preload
    any:
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
    unless:
      - id: metadata/binary/provenance/
      - id: objectives/evasion/hijack-execution-flow/linker/
      - id: micro-behaviors/dylib/library/family::sanitizer-runtime
      - id: well-known/tool/development/qemu
      - id: metadata/library/observability::php-ddtrace-benign-loader-context
      # PIE executables (have a program interpreter) are not .so libraries.
      - id: metadata/binary/linking/runtime::interpreter
      # Static PIE executables are also ET_DYN, but cannot be preloaded as .so.
      - id: metadata/binary/linking/static::static-linked
      # ET_DYN static-PIE builds may retain dynamic sections but import no libs.
      - id: metadata/binary/linking/static::elf-needed-libs-zero
      # sudo's intercept preload lib is an LD_PRELOAD shim that dlsym-hooks exec
      # for the intercept sudoers policy — a stock sudo component, not a rootkit.
      - id: well-known/tool/sysadmin/unix-benign::sudo-intercept-library
  # Full supply chain backdoor pattern
  # Combines multiple suspicious behaviors into hostile indicator
  # Complexity: all(2) + any(4) = 3 base, need file_types for 4
  # Updated: for: adds +1, making complexity = 4
  - id: supply-chain-backdoor
    desc: Supply chain backdoor in shared library
    crit: hostile
    conf: 0.95
    for: [elf]
    all:
      # Must have network + shell execution
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/create/shell/spawn::shell-execution
    any:
      # Plus credential targeting or C2 infrastructure
      - id: so-credential-targeting
      - id: so-c2-infrastructure
      - id: objectives/command-and-control/infrastructure/domain/malicious::c2-domain
      - id: micro-behaviors/fs/path/sensitive/ssh::keys
    unless:
      - id: micro-behaviors/dylib/library/family/
      - id: micro-behaviors/dylib/library/family/
      - id: micro-behaviors/dylib/library/family/
  # Alternative: Network + credential + rootkit pattern
  # Complexity: all(3) + for: = 4
  - id: library-backdoor-rootkit
    desc: Library backdoor with rootkit and credential theft
    crit: hostile
    conf: 0.95
    for: [elf]
    all:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/create/shell/spawn::shell-execution
      - id: micro-behaviors/os/linker/env::ld-preload
    any:
      - id: micro-behaviors/fs/path/sensitive/ssh::keys
      - id: objectives/persistence/login/shell/config::shell-files
    unless:
      - id: micro-behaviors/dylib/library/family/
  # Simpler pattern: socket + shell + credential paths
  # Complexity: all(3) + any(1 via count_min) = still need more
  # Using file_types: +1 = 4
  - id: network-shell-credential-so
    desc: Library with network, shell, and credential access
    crit: suspicious
    conf: 0.9
    for: [elf]
    all:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/create/shell/spawn::shell-execution
    any:
      - id: micro-behaviors/fs/path/sensitive/ssh::keys
      - id: objectives/persistence/login/shell/config::shell-files
      - id: objectives/command-and-control/infrastructure/domain/malicious::c2-domain
    unless:
      - id: micro-behaviors/dylib/library/family/
      - id: micro-behaviors/dylib/library/family/
