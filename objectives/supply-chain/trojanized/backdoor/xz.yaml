defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [binaries]
  attack: T1195.002
  mbc: B0025
traits:
- id: high-entropy-strings-dup
  desc: Large obfuscated data blob
  crit: notable
  conf: 0.7
  if:
    type: metrics
    field: binary.high_entropy_string_count
    min: 200
  unless:
  - type: metrics
    field: binary.avg_string_entropy
    max: 3.2
  - type: metrics
    field: binary.string_count
    min: 1000
  - id: metadata/binary/resource::kernel-driver-idata
  downgrade:
    all:
    - id: metadata/binary/metrics/structural::many-imports
    - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-a
    any:
    - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-b
    - id: metadata/binary/metrics/threshold::many-exports-200
- id: massive-code-blob
  desc: Extremely large average function size
  crit: component
  conf: 0.85
  if:
    type: metrics
    field: binary.avg_func_size
    min: 10000
  unless:
  - type: metrics
    field: binary.func_count
    max: 50
  - id: metadata/package/help::documented-cli-binary
  - type: basename
    exact: sh
  downgrade:
    any:
    - id: metadata/signed/platform::apple
- id: many-huge-functions
  desc: Many huge functions (>64KB) -
  crit: suspicious
  conf: 0.9
  if:
    type: metrics
    field: binary.huge_func_count
    min: 4
- id: xz-backdoor-entry
  desc: XZ backdoor entry pattern bytes
  crit: suspicious
  conf: 0.95
  for:
  - elf
  if:
    type: hex
    section: .text
    pattern: F3 0F 1E FA 55 48 89 E5 48 89 7D D8 48 C7 45 E8
- id: lzma-crc64-table
  desc: lzma_crc64_table reference
  crit: suspicious
  conf: 0.4
  if:
    type: text
    substr: lzma_crc64_table
- id: xz-obf-pattern
  desc: XZ obfuscated function marker bytes
  crit: suspicious
  conf: 0.7
  for:
  - elf
  if:
    type: hex
    section: .text
    pattern: 0F B6 ?? ?? 0F B6 ?? ?? 31 ?? 0F B6 ?? ?? 31
- id: xz-cpuid-mask-check
  desc: CPUID mask check (component for xz-backdoor composite)
    # NOTE: this byte pattern matches xz's own CPU feature dispatch — the
    # path that picks SSE2/AVX CRC implementations at startup. It appears in
    # clean liblzma 5.4.5 (1 hit) and 5.6.3 (2 hits) and is *absent* from the
    # backdoored 5.6.0. Standalone it is not a backdoor signal; keeping it as
    # `component` so it only contributes when composed with other backdoor
    # evidence (xz-backdoor-entry, ifunc-pattern, multiple-compressed-payloads).
  crit: component
  conf: 0.4
  for:
  - elf
  if:
    type: hex
    section: .text
    pattern: 0F A2 F7 D1 81 E1 02 02 08 00
  unless:
  - type: basename
    regex: '^liblzma\.so\.5\.4\.5$'
- id: libsystemd-ref
  desc: libsystemd reference
  crit: notable
  conf: 0.4
  if:
    type: text
    substr: libsystemd
- id: mm-answer-keyallowed
  desc: mm_answer_keyallowed SSH function
  crit: component
  conf: 0.8
  if:
    type: symbol
    exact: mm_answer_keyallowed
  for: [elf, macho, so]
  unless:
  - type: basename
    regex: '\.o$'
- id: mm-answer-authpassword
  desc: mm_answer_authpassword SSH function
  crit: component
  conf: 0.8
  if:
    type: symbol
    exact: mm_answer_authpassword
  for: [elf, macho, so]
  unless:
  - type: basename
    regex: '\.o$'
- id: pubkey-auth-ref
  desc: pubkey_auth reference
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: pubkey_auth
  unless:
  - type: basename
    regex: '\.o$'
- id: rtld-global-ref
  desc: __rtld_global reference
  crit: suspicious
  conf: 0.6
  for:
  - elf
  if:
    type: text
    substr: __rtld_global
- id: la-symbind-ref
  desc: la_symbind audit hook
  crit: suspicious
  conf: 0.7
  for:
  - elf
  if:
    type: text
    substr: la_symbind
  unless:
  - id: objectives/evasion/hijack-execution-flow/linker::dynamic-linker-binary
- id: plaintext-sleep-command-token
  desc: Plaintext sleep command token
  crit: component
  conf: 0.55
  platforms:
  - windows
  for:
  - pe
  - dll
  if:
    type: text
    word: sleep
  unless:
  - id: metadata/lang/compiler/systems::go-buildinfo
- id: plaintext-hello-beacon-token
  desc: Plaintext hello beacon token
  crit: component
  conf: 0.55
  platforms:
  - windows
  for:
  - pe
  - dll
  if:
    type: text
    word: hello
- id: tokenizer-vocab-json
  desc: Tokenizer vocabulary JSON blob
  crit: component
  conf: 0.9
  if:
    type: text
    substr: '{"!": 0, "\"": 1'
- id: loopback-winsock-exec-profile
  desc: Loopback Winsock exec backdoor profile
  crit: component
  conf: 0.96
  platforms:
  - windows
  for:
  - pe
  - dll
  if:
    type: hex
    section: .data
    pattern: 65 78 65 63 00 00 00 00 73 6C 65 65 70 00 00 00 68 65 6C 6C 6F 00 00 00 31 32 37 2E
- id: glibc-runtime-basename
  desc: glibc runtime basename
  crit: component
  conf: 0.7
  for:
  - elf
  if:
    type: basename
    regex: ^libc\.so(\.[0-9]{1,3}){0,4}$
  count_max: 1013919
- id: ssh-hook-pattern-cond-1--inline-13920
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: basename
    regex: ^ssh(-.{1,32})?(\.exe)?$
  count_max: 1013921
- id: unexpected-crypto-cond-0--inline-13922
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: metrics
    field: binary.section_count
    min: 200
  count_max: 1013923
composite_rules:
- id: loopback-winsock-exec-backdoor
  desc: Loopback Winsock exec backdoor
  crit: hostile
  conf: 0.96
  platforms:
  - windows
  for:
  - pe
  - dll
  all:
  - id: loopback-winsock-exec-profile
  - id: micro-behaviors/communications/ip/literal::loopback-ipv4-binary
  - id: micro-behaviors/communications/socket/init::winsock-client-lifecycle
  - id: micro-behaviors/process/create/spawn::create-process-a
- id: symbol-interposition
  desc: XZ-style glibc symbol interposition
  crit: suspicious
  conf: 0.7
  for:
  - elf
  # XZ scope: dlsym + RTLD_NEXT alone is the universal LD_PRELOAD hook
  # idiom and fires on any preload shim (PAM hooks, runtime tracers,
  # benign sanitizers). Require an XZ-specific glibc-internals marker
  # so this stays inside the trojanized-xz-utils family.
  all:
  - id: micro-behaviors/dylib/lookup::dlsym-symbol
  - id: micro-behaviors/dylib/lookup::rtld-next
  any:
  - id: rtld-global-ref
  - id: la-symbind-ref
  downgrade:
    any:
    - id: glibc-runtime-basename
- id: xz-crc-pattern
  desc: XZ CRC64 patterns
  crit: suspicious
  conf: 0.6
  for:
  - elf
  needs: 2
  any:
  - id: lzma-crc64-table
  - id: metadata/binary/linking/runtime::ifunc
- id: xz-backdoor-signature
  desc: XZ Utils backdoor signature (CVE-2024-3094)
  crit: hostile
  conf: 0.99
  for:
  - elf
  all:
  - id: xz-crc-pattern
  any:
  - id: xz-backdoor-entry
  - id: xz-obf-pattern
- id: xz-ifunc-pattern
  desc: IFUNC resolver pattern (potential function
  crit: suspicious
  conf: 0.4
  for:
  - elf
  all:
  - id: metadata/binary/instruction::cpuid-instr
  - id: metadata/binary/linking/runtime::resolver-markers
  - id: metadata/binary/linking/runtime::ifunc-markers
- id: rsa-in-compression-lib
  desc: RSA operations in compression library
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/crypto/asymmetric/rsa::rsa-operations
  - id: metadata/library/compression::compression-lib
- id: ssh-hook-pattern
  desc: SSH authentication hooking pattern
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/os/service/remote::sshd-ref
  any:
  - id: micro-behaviors/crypto/asymmetric/rsa::rsa-public-decrypt
  - id: mm-answer-keyallowed
  - id: mm-answer-authpassword
  - id: pubkey-auth-ref
  unless:
  - id: metadata/signed/platform::apple
  downgrade:
    any:
    - id: micro-behaviors/communications/ssh/connect::openssh
    - id: ssh-hook-pattern-cond-1--inline-13920
- id: glibc-hijack
  desc: Dynamic linker interposition markers
  crit: suspicious
  conf: 0.7
  for:
  - elf
  all:
  - id: micro-behaviors/dylib/lookup::dlsym-symbol
  any:
  - id: rtld-global-ref
  - id: la-symbind-ref
  - id: micro-behaviors/os/linker/env::ld-preload
  - id: micro-behaviors/os/linker/env::ld-audit
  unless:
  - id: metadata/binary/provenance::netbsd-runtime-linker-artifact
  - id: objectives/evasion/hijack-execution-flow/linker::standard-dynamic-linker
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family::graphics-lib-marker
    - id: micro-behaviors/dylib/library/family::system-lib-marker
- id: benign-network-client-context
  desc: Benign network-capable utility context
  crit: baseline
