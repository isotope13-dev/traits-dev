defaults:
  platforms: [unix, windows]
  attack: T1195.002

traits:
  - id: require-local-stage
    desc: Requires local hidden stage
    crit: suspicious
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: require\s*\(\s*["'][^"'\\]{0,20}/\.[A-Za-z0-9_-][^"'\\]{0,18}["']\s*\)
    not:
      - substr: "require('./database')"
      - substr: 'require("./load-bindings")'
      - substr: 'require("./win32-sn-parser")'
      - regex: 'require\s*\(\s*["''][^"'']{0,40}/\.eslintrc(\.[a-z]+)?(\.[cm]?js)?["'']\s*\)'
      - regex: 'require\s*\(\s*["''][^"'']{0,40}/\.prettierrc(\.[a-z]+)?(\.[cm]?js)?["'']\s*\)'
      - regex: 'require\s*\(\s*["''][^"'']{0,40}/\.babelrc(\.[a-z]+)?(\.[cm]?js)?["'']\s*\)'
    unless:
      - type: basename
        regex: '(^|!!).{0,200}node_modules/.+\.[cm]?[jt]s$'
      - type: basename
        regex: '\.spec\.[cm]?[jt]s$'
      - type: basename
        regex: '(?i)\.eslintrc(\.[a-z]+)?\.[cm]?js$'
      - id: metadata/lang/source/

composite_rules:
  - id: npm-wrapper-hidden-stage
    desc: npm wrapper package loads hidden stage
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/package/dependencies::build-related-dependency-name
      - id: require-local-stage
    any:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: objectives/supply-chain/impersonation/npm-clone::npm-suspicious-clone
      - id: objectives/command-and-control/infrastructure/domain/brand-impersonation::brand-impersonation-serverless
