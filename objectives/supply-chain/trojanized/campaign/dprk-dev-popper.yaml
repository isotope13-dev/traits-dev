# DPRK "DEV#POPPER" Campaign Detection
# Composite patterns for the DEV#POPPER / OmniStealer campaign targeting developers
# ATT&CK: T1195.002 (Supply Chain Compromise)
# Reference: eSentire, Ransom-ISAC
defaults:
  platforms:
    - windows
    - unix
  for:
    - javascript
    - typescript
  attack: T1195.002
composite_rules:
  - id: dprk-dev-popper-campaign
    desc: "DPRK DEV#POPPER campaign indicators"
    crit: hostile
    conf: 0.95
    mbc: B0028
    any:
      - id: metadata/lang/javascript-features::dprk-shuffling-stager
      - id: well-known/malware/stealer/dev-popper::dev-popper-detected
      - id: well-known/malware/stealer/dev-popper::blockchain-c2-pointer
