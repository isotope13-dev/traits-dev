# DPRK "Contagious Interview" Campaign Detection
# Composite patterns tying together the DPRK supply-chain-to-stealer kill chain
# Seen across OtterCookie, BeaverTail, and InvisibleFerret
# ATT&CK: T1195.002 (Supply Chain Compromise)
# Reference: Walmart Global Tech, NTT Security, Palo Alto Unit42
defaults:
  platforms:
    - windows
    - unix
  for:
    - javascript
    - typescript
  attack: T1195.002
composite_rules:
  - id: npm-stealer-kill-chain
    desc: npm package with credential theft
    crit: hostile
    conf: 0.95
    mbc: B0028
    all:
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
    any:
      - id: objectives/credential-access/shell/history::history-theft
      - id: objectives/credential-access/env/dotenv::dotenv-credentials-theft
      - id: objectives/credential-access/ssh/key::slash-dot-ssh
      - id: objectives/credential-access/shell/history::powershell-history-theft
  - id: npm-ssh-backdoor-dropper
    desc: npm package installs SSH backdoor
    crit: hostile
    conf: 0.95
    mbc: E1098
    attack: T1098.004
    all:
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
    any:
      - id: objectives/persistence/login/ssh/backdoor::ssh-backdoor-comp
      - id: objectives/persistence/login/ssh/backdoor::ssh-pubkey-injection
      - id: objectives/persistence/login/ssh/backdoor::ssh-persistence-setup
  - id: dprk-interview-campaign
    desc: DPRK Contagious Interview pattern
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: well-known/malware/stealer/ottercookie::ottercookie-detected
      - id: well-known/malware/stealer/beaver-tail::beaver-tail-js-detected
      - id: npm-stealer-kill-chain
      - id: npm-ssh-backdoor-dropper
      - id: objectives/command-and-control/infrastructure/domain/brand-impersonation::brand-impersonation-serverless
