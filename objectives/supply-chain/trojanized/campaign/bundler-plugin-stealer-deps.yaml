# A package that presents as a bundler/build-tool plugin (rollup/vite/webpack/
# esbuild -plugin ...) yet declares runtime dependencies a build plugin has no
# reason to carry: `sqlite3` (a native SQLite driver used by DPRK BeaverTail /
# "Contagious Interview" stealers to read browser Login Data and crypto-wallet
# databases) plus a bare HTTP client (`request`) for exfiltration. Build plugins
# transform source at build time — they never open local databases or POST to the
# network. The identity/dependency incongruity is the manifest-visible fingerprint
# of the DPRK loader family, independent of the (throwaway) package name.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: "T1195.002, T1555.003"
composite_rules:
  - id: bundler-plugin-sqlite-http-stealer-deps
    desc: Build-plugin cover carries SQLite reader and HTTP-exfil deps
    crit: hostile
    conf: 0.92
    mbc: B0024
    all:
      - id: metadata/package/manifest/name::bundler-plugin-name
      - id: objectives/supply-chain/metadata-anomaly::npm-sqlite3-runtime-dependency
      - id: objectives/supply-chain/metadata-anomaly::npm-request-runtime-dependency
