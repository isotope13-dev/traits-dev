defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002

traits:
  - id: require-next-runtimejs
    desc: Requires next-runtimejs module
    crit: suspicious
    conf: 0.98
    # `require("next-runtimejs")` is captured as an import fact (name
    # `next-runtimejs`); matching the cached import is exact-equivalent to the
    # tree-sitter `require`-call-with-string-arg query, with no live parse.
    if:
      type: import
      exact: 'next-runtimejs'

  - id: next-runtimejs-before-commonjs-export
    desc: next-runtimejs load precedes module export
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: require\(["']next-runtimejs["']\)[\s\S]{0,80}module\.exports\s*=

composite_rules:
  - id: trojanized-library-next-runtimejs-loader
    desc: Trojanized library injects next-runtimejs loader
    crit: hostile
    conf: 0.99
    all:
      - id: require-next-runtimejs
      - id: next-runtimejs-before-commonjs-export
