defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002

traits:
  - id: require-next-runtimejs
    desc: Requires next-runtimejs module
    crit: suspicious
    conf: 0.98
    if:
      type: ast
      query: |
        (call_expression
          function: (identifier) @fn
          arguments: (arguments
            (string
              (string_fragment) @mod))
          (#eq? @fn "require")
          (#eq? @mod "next-runtimejs"))

  - id: next-runtimejs-before-commonjs-export
    desc: next-runtimejs load precedes CommonJS export
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: require\(["']next-runtimejs["']\)[\s\S]{0,80}typeof module === 'object'

composite_rules:
  - id: trojanized-library-next-runtimejs-loader
    desc: Trojanized library injects next-runtimejs loader
    crit: hostile
    conf: 0.99
    all:
      - id: require-next-runtimejs
      - id: next-runtimejs-before-commonjs-export
