defaults:
  platforms: [unix, windows]
  attack: T1195.002
  mbc: B0024

traits:
  - id: react-svg-render-lockfile-only
    desc: Lockfile-only react-svg-render dependency
    for: [package-lock.json]
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: '"react-svg-render"\s*:\s*"\^?1\.0\.2"'
    unless:
      - type: value
        path: package.json::dependencies.react-svg-render
        exists: true
      - type: value
        path: package.json::devDependencies.react-svg-render
        exists: true

composite_rules:
  - id: react-svg-render-hidden-dependency
    desc: Archive carries hidden react-svg-render dependency
    for: [tar, npm, zip]
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: react-svg-render-lockfile-only
      - id: objectives/supply-chain/metadata-anomaly::npm-phantom-runtime-dependency
