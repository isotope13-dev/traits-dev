defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
  mbc: B0024

traits:
  # June 2026 Mastra npm scope-takeover campaign: a hijacked @mastra publisher
  # account pushed patch releases across 140+ packages that left the shipped
  # code untouched and only appended `easy-day-js` to dependencies. easy-day-js
  # typosquats `dayjs` and carries an obfuscated postinstall dropper that pulls a
  # second-stage stealer at `npm install`, so the carrier package never imports
  # it -- declaring the dependency is the entire attack surface. The name has no
  # legitimate use, so a bare declaration is a high-confidence campaign IOC.
  # Carrier-only signal: the executable stealer lives in easy-day-js's own
  # postinstall hook, not in this tarball, so static analysis of the carrier
  # tops out at suspicious -- `--fetch=deps` is required to retrieve and confirm
  # the dropper as hostile (matching the next-runtimejs / wime-zle convention).
  - id: easy-day-js-dependency
    desc: Declares easy-day-js stealer dropper dep
    crit: suspicious
    conf: 0.99
    attack: "T1195.002,T1059.007"
    if:
      type: value
      path: dependencies.easy-day-js
      exists: true
  - id: easy-day-js-version-range
    desc: easy-day-js semver dependency range
    crit: suspicious
    conf: 0.96
    attack: "T1195.002,T1059.007"
    if:
      type: value
      path: dependencies.easy-day-js
      regex: '^\^?1\.'

composite_rules:
  - id: easy-day-js-stealer-carrier
    desc: Package carries easy-day-js stealer dependency
    crit: hostile
    conf: 0.98
    attack: "T1195.002,T1059.007"
    all:
      - id: easy-day-js-dependency
      - id: easy-day-js-version-range
