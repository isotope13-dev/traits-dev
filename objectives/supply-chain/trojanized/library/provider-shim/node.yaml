defaults:
  platforms: [linux, macos, windows]
  attack: T1195.002

composite_rules:
  - id: chain-registry-provider-proxy-shim
    desc: Chain registry uses a lazy provider proxy shim
    crit: suspicious
    conf: 0.86
    for: [javascript, typescript, package.json, archives]
    scope: archive
    all:
      - id: metadata/package/manifest/description::npm-chain-registry-description
      - id: micro-behaviors/os/module/load::dynamic-imported-provider-reexport
      - id: micro-behaviors/data/control-flow/dispatch::js-provider-computed-forwarding
      - id: micro-behaviors/data/control-flow/dispatch::js-commonjs-provider-export
