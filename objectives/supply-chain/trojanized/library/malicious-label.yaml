defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
  attack: T1195.001

traits:
  - id: malicious-label-prefix
    desc: Self-declared "[MALICIOUS]" label in code
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      regex: '\[MALICIOUS\]'

composite_rules:
  - id: malicious-labeled-exfil
    desc: Self-declared malicious code exfiltrates to OOB
    crit: hostile
    conf: 0.999
    mbc: E1041
    all:
      - id: malicious-label-prefix
      - id: objectives/exfiltration/oob::webhook-site
