# Import-time execution of a hidden detached dependency is a generic npm
# trojan pattern.  The direct process-launch evidence is kept in one file so
# the rule does not join unrelated workers from different package members.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002
  mbc: B0024

composite_rules:
  - id: node-import-time-hidden-child-process
    desc: Module-scope dependency launches a hidden detached child process
    crit: hostile
    conf: 0.99
    attack: "T1195.002,T1059.007"
    unless:
      - id: well-known/app/pinokio::app-bundle
    all:
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/create/shell/bridge::child-process-exec
      - id: micro-behaviors/data/control-flow/module-exec::module-scope-string-function
  - id: node-directly-invoked-database-connectivity-child
    desc: Directly invoked detached child performs database probe
    crit: hostile
    conf: 0.995
    attack: "T1195.002,T1059.007,T1053"
    all:
      - id: micro-behaviors/data/control-flow/module-exec::direct-zero-arg-call
      - id: objectives/supply-chain/hidden-payload/exec::node-dbconnectify-reference
      - id: objectives/supply-chain/hidden-payload/exec::node-db-connectivity-probe
      - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
      - id: micro-behaviors/process/create/spawn::process-execpath-spawn
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::stdio-ignore
