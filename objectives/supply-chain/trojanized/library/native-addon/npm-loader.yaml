defaults:
  platforms: [unix, windows]
  attack: T1195.002

traits:
  - id: package-publishes-prebuilt-dir
    desc: Package publishes prebuilt directory
    crit: notable
    conf: 0.86
    for: [package.json]
    if:
      type: value
      path: "files[*]"
      regex: "^(\\./)?prebuilt(/|$)"

composite_rules:
  - id: silent-native-addon-loader
    desc: Silent native addon loader stub
    crit: suspicious
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/os/module/load::local-native-addon-require
      - id: objectives/supply-chain/trojanized/library/hidden-dep::swallowed-loader-errors

  - id: tiny-prebuilt-native-addon-loader
    desc: Tiny prebuilt native addon loader
    crit: suspicious
    conf: 0.96
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/os/module/load::prebuilt-native-addon-require
      - id: metadata/file/metrics::tiny-javascript-file-lines
      - id: metadata/file/metrics::tiny-javascript-file-size

  - id: version-facade-native-addon-loader
    desc: Version facade native addon loader
    crit: suspicious
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/os/module/load::local-native-addon-require
      - id: objectives/supply-chain/impersonation/manifest/facade::version-only-package-export

  - id: npm-package-ships-native-elf-addon
    desc: npm package ships native ELF addon
    crit: suspicious
    conf: 0.95
    all:
      - id: package-publishes-prebuilt-dir
      - id: metadata/binary/framework::node-api-addon-export
      - id: metadata/binary/linking/runtime::needed-lib

  - id: minimal-native-addon-facade-package
    desc: Minimal npm facade ships prebuilt addon
    crit: suspicious
    conf: 0.94
    all:
      - id: package-publishes-prebuilt-dir
      - id: metadata/package/manifest/entrypoint::has-index-entry
      - id: objectives/supply-chain/hidden-payload/staging::no-build-script
    any:
      - id: tiny-prebuilt-native-addon-loader
      - id: version-facade-native-addon-loader
      - id: metadata/package/files/package-json::has-files-field
    needs: 2

  - id: trojanized-native-addon-loader-package
    desc: Trojanized package loads native addon
    crit: hostile
    conf: 0.97
    all:
      - id: npm-package-ships-native-elf-addon
    any:
      - id: silent-native-addon-loader
      - id: tiny-prebuilt-native-addon-loader
      - id: version-facade-native-addon-loader
    needs: 2

  - id: trojanized-npm-native-addon-dropper
    desc: Trojanized npm native addon dropper
    crit: hostile
    conf: 0.985
    all:
      - id: npm-package-ships-native-elf-addon
    any:
      - id: objectives/supply-chain/hidden-payload/trojan::node-addon-shell-stage
      - id: objectives/supply-chain/hidden-payload/trojan::node-addon-hidden-temp-writer
      - id: objectives/supply-chain/hidden-payload/trojan::node-addon-env-gated-stage
    needs: 2

  - id: native-addon-dropper-package
    desc: npm package ships native addon dropper
    crit: hostile
    conf: 0.985
    all:
      - id: trojanized-native-addon-loader-package
    any:
      - id: trojanized-npm-native-addon-dropper
      - id: objectives/supply-chain/hidden-payload/trojan::hidden-temp-shell-native-addon-dropper
      - id: objectives/supply-chain/hidden-payload/trojan::daemonized-native-addon-dropper
