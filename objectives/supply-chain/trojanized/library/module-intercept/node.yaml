defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.001
  mbc: B0024

traits:
  - id: targets-debug-node-module
    desc: Targets debug package module
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "dirname[lastNodeModulesIndex + 1] === 'debug'"

  - id: debug-common-module-branch
    desc: Branches on debug common module
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "s === './common'"

  - id: debug-module-branch
    desc: Branches on debug module
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "s === './debug'"

  - id: debug-save-accessor-rewrite
    desc: Rewrites debug save accessor
    crit: component
    conf: 0.95
    if:
      type: text
      regex: "Object\\.defineProperty\\(\\w+, ['\"]save['\"], \\{get:"

composite_rules:
  - id: debug-module-save-intercept
    desc: Intercepts debug package save hook
    crit: suspicious
    conf: 0.95
    all:
      - id: targets-debug-node-module
      - id: debug-save-accessor-rewrite
    any:
      - id: debug-common-module-branch
      - id: debug-module-branch

  - id: node-module-loader-backdoor
    desc: Node package hijacks module loader
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/os/module/load::node-module-wrap-override
      - id: micro-behaviors/os/module/load::node-require-wrapper-prototype
      - id: micro-behaviors/os/module/load::node-require-function-rebind
      - id: debug-module-save-intercept
