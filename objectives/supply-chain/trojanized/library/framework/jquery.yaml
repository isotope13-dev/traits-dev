# Trojanized jQuery Library Detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects jQuery libraries modified to include malicious capabilities
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"
  mbc: "B0024"
  for: [javascript]
composite_rules:
  - id: real-library-anchor
    desc: "jQuery library anchor beyond version text"
    crit: component
    conf: 0.8
    any:
      - {id: 'metadata/library/jquery::copyright'}
      - {id: 'metadata/library/jquery::fn-extend'}
  - id: jquery-legacy-activex-xhr-fallback
    desc: "jQuery ActiveX XHR compatibility path"
    crit: component
    conf: 0.9
    all:
      - {id: metadata/library/jquery}
      - {id: 'objectives/execution/activex/com::activex-object-create'}
    any:
      - {id: 'metadata/library/jquery::header-prefix'}
      - {id: 'metadata/library/jquery::domain'}
    not:
      - substr: Microsoft.XMLHTTP
      - substr: XMLHttpRequest
  # jQuery + ActiveXObject = HOSTILE (complexity >= 4)
  - id: trojanized-activex
    desc: "jQuery library with ActiveXObject (trojanized"
    crit: hostile
    conf: 0.98
    all:
      - {id: metadata/library/jquery}
      - {id: 'objectives/execution/activex/com::activex-object-create'}
    unless:
      - {id: 'metadata/library/jquery::version-string'}
      - {id: 'metadata/library/jquery::copyright'}
      - {id: 'objectives/supply-chain/trojanized/library/framework::jquery-legacy-activex-xhr-fallback'}
  # jQuery + Reverse Shell = HOSTILE
  - id: trojanized-reverse-shell
    desc: "jQuery library with reverse shell"
    crit: hostile
    conf: 0.98
    all:
      - {id: metadata/library/jquery}
      - {id: 'objectives/command-and-control/reverse-shell/dup::socket-with-exec'}
  # jQuery + Base64 Eval = HOSTILE (hidden payload)
  - id: trojanized-base64-eval
    desc: "jQuery library with base64+eval payload"
    crit: hostile
    conf: 0.95
    all:
      - {id: metadata/library/jquery}
      - {id: 'objectives/anti-static/obfuscation/payload/encoded::decode-exec-js'}
  # jQuery + Credential Access = HOSTILE
  - id: trojanized-credential-access
    desc: "jQuery library with credential access"
    crit: hostile
    conf: 0.98
    all:
      - {id: metadata/library/jquery}
    any:
      - {id: 'micro-behaviors/fs/path/sensitive/browser::login-data'}
      - {id: 'objectives/credential-access/browser/firefox::cookies-dup'}
  # jQuery + Command Execution = HOSTILE
  - id: trojanized-exec
    desc: "jQuery library with command execution"
    crit: hostile
    conf: 0.98
    all:
      - {id: 'metadata/library/jquery::version-string'}
      - {id: 'objectives/supply-chain/trojanized/library/framework::real-library-anchor'}
    any:
      - {id: micro-behaviors/process/create/shell}
      - {id: 'micro-behaviors/process/create/shell/bridge::child-process-exec'}
    unless:
      - {id: 'micro-behaviors/process/create/shell/host::vscode-extension-marker'}
  # jQuery + Network Backdoor = HOSTILE
  - id: trojanized-backdoor
    desc: "jQuery library with network backdoor"
    crit: hostile
    conf: 0.95
    all:
      - {id: metadata/library/jquery}
      - {id: 'objectives/command-and-control/infrastructure/domain/heuristic::hardcoded-domain-suspicious-pattern'}
