# Trojanized jQuery Library Detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects jQuery libraries modified to include malicious capabilities
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"
  mbc: "B0024"
  for: [javascript]
composite_rules:
  - id: real-library-anchor
    desc: "jQuery library anchor beyond version text"
    crit: component
    conf: 0.8
    any:
      - {id: 'metadata/library/jquery::copyright'}
      - {id: 'metadata/library/jquery::fn-extend'}
  # Stock jQuery uses ActiveXObject only for IE XHR ProgIDs. Keep this as a
  # positive identity for the compatibility path (not a trojan signal).
  - id: jquery-legacy-activex-xhr-fallback
    desc: "jQuery ActiveX XHR compatibility path"
    crit: notable
    conf: 0.9
    all:
      - {id: metadata/library/jquery}
      - {id: 'micro-behaviors/communications/http/client/xmlhttp::js-xmlhttp-progid'}
    any:
      - {id: 'metadata/library/jquery::header-prefix'}
      - {id: 'metadata/library/jquery::domain'}
      - {id: 'metadata/library/jquery::fn-extend'}
      - {id: 'metadata/library/jquery::copyright'}
  # Trojanized jQuery grafts WSH/FSO/Shell automation — not IE XHR fallback.
  # Stock ActiveXObject("Microsoft.XMLHTTP") must not score hostile.
  - id: trojanized-activex
    desc: "jQuery with non-XHR ActiveX automation ProgID"
    crit: hostile
    conf: 0.98
    all:
      - {id: metadata/library/jquery}
    any:
      - {id: 'micro-behaviors/os/com/object::wscript-shell-literal'}
      - {id: 'micro-behaviors/os/com/object::filesystemobject-progid'}
      - {id: 'micro-behaviors/os/com/object::shell-application-progid'}
  # jQuery + Reverse Shell = HOSTILE
  - id: trojanized-reverse-shell
    desc: "jQuery library with reverse shell"
    crit: hostile
    conf: 0.98
    all:
      - {id: metadata/library/jquery}
      - {id: 'objectives/command-and-control/reverse-shell/dup::socket-with-exec'}
  # jQuery + Base64 Eval = HOSTILE (hidden payload)
  - id: trojanized-base64-eval
    desc: "jQuery library with base64+eval payload"
    crit: hostile
    conf: 0.95
    all:
      - {id: metadata/library/jquery}
      - {id: 'objectives/anti-static/obfuscation/payload/encoded::decode-exec-js'}
  # jQuery + Credential Access = HOSTILE
  - id: trojanized-credential-access
    desc: "jQuery library with credential access"
    crit: hostile
    conf: 0.98
    all:
      - {id: metadata/library/jquery}
    any:
      - {id: 'micro-behaviors/fs/path/sensitive/browser::login-data'}
      - {id: 'objectives/credential-access/browser/firefox::cookies-dup'}
  # jQuery + Command Execution = HOSTILE
  # Require real process-launch primitives — a bare prefix on process/create/shell
  # also pulls git literals and benign guard markers that appear in stock jQuery.
  - id: trojanized-exec
    desc: "jQuery library with command execution"
    crit: hostile
    conf: 0.98
    all:
      - {id: 'metadata/library/jquery::version-string'}
      - {id: 'objectives/supply-chain/trojanized/library/framework::real-library-anchor'}
    any:
      - {id: 'micro-behaviors/process/create/shell/bridge::child-process-exec'}
      - {id: 'micro-behaviors/process/create/shell/wsh::wscript-shell-run'}
      - {id: 'micro-behaviors/process/create/shell/spawn::shell-execution'}
      - {id: 'micro-behaviors/process/create/subprocess::shell-true'}
      - {id: 'micro-behaviors/process/create/system::python-os-system'}
    unless:
      - {id: 'micro-behaviors/process/interpreter/vm/'}
  # jQuery + Network Backdoor = HOSTILE
  - id: trojanized-backdoor
    desc: "jQuery library with network backdoor"
    crit: hostile
    conf: 0.95
    all:
      - {id: 'metadata/library/jquery::version-string'}
      - {id: 'objectives/supply-chain/trojanized/library/framework::real-library-anchor'}
      - {id: 'micro-behaviors/communications/url/host::dynamic-dns-hostname'}
    unless:
      - {id: 'well-known/app/browser-extension/'}
      - {id: 'well-known/app/windows-desktop-tools::hyper-release-path'}
      - {id: 'well-known/tool/development/autorest/'}
      - {id: 'metadata/library/data::public-suffix-list'}
