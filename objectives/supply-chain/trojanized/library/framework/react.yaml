# Trojanized React Library Detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects React libraries modified to include malicious capabilities
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"
  mbc: "B0024"
  for: [javascript]
composite_rules:
  # React + ActiveXObject = HOSTILE (complexity >= 4)
  - id: react-trojanized-activex
    desc: "React library with ActiveXObject (trojanized"
    crit: hostile
    conf: 0.98
    all:
      - {id: 'metadata/library/react::library'}
      - {id: 'metadata/library/react::version-banner'}
      - {id: 'micro-behaviors/process/interpreter/jscript::activex-object',}
      # React + Reverse Shell = HOSTILE
  - id: react-trojanized-reverse-shell
    desc: "React library with reverse shell"
    crit: hostile
    conf: 0.98
    all:
      - {id: 'metadata/library/react::library'}
      - {id: 'metadata/library/react::version-banner'}
      - {id: 'objectives/command-and-control/reverse-shell/dup::socket-with-exec',}
      # React + Base64 Eval = HOSTILE (hidden payload)
  - id: react-trojanized-base64-eval
    desc: "React library with base64+eval payload"
    crit: hostile
    conf: 0.95
    all:
      - {id: 'metadata/library/react::library'}
      - {id: 'metadata/library/react::version-banner'}
      - {id: 'objectives/anti-static/obfuscation/payload/encoded::decode-exec-js',}
      # React + Credential Access = HOSTILE
  - id: react-trojanized-credential-access
    desc: "React library with credential access"
    crit: hostile
    conf: 0.98
    all:
      - {id: 'metadata/library/react::library'}
      - {id: 'metadata/library/react::version-banner'}
    any:
      - {id: 'micro-behaviors/fs/path/sensitive/browser::login-data'}
      - {id: 'objectives/credential-access/browser/firefox::cookies-dup',}
      # React + Command Execution = HOSTILE
  - id: react-trojanized-exec
    desc: "React library with command execution"
    crit: hostile
    conf: 0.98
    all:
      - {id: 'metadata/library/react::library'}
      - {id: 'metadata/library/react::version-banner'}
    any:
      - {id: micro-behaviors/process/create/shell}
      - {id: 'micro-behaviors/process/create/shell/bridge::child-process-exec',}
      # React + Network Backdoor = HOSTILE
  - id: react-trojanized-backdoor
    desc: "React library with network backdoor"
    crit: hostile
    conf: 0.95
    all:
      - {id: 'metadata/library/react::library'}
      - {id: 'metadata/library/react::version-banner'}
      - {id: 'micro-behaviors/communications/url/host::dynamic-dns-hostname'}

  - id: react-native-suspicious-capability-cluster
    desc: React Native suspicious capability cluster
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: metadata/package/manifest/name::official-react-native-scope
      - id: metadata/package/manifest/repository::official-react-native-repo
    any:
      - id: micro-behaviors/data/source/property/computed::js-global-require-alias
      - id: objectives/command-and-control/backdoor/tasking/http::kotlin-activate-token
      - id: objectives/command-and-control/backdoor/shell/reverse::reverse-tcp
      - id: micro-behaviors/process/create/shell/package::node-npx-target
    needs: 2
    unless:
      - id: metadata/package/manifest/name::official-react-native-scope
      - id: metadata/package/manifest/repository::official-react-native-repo
