defaults:
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: telegram-word
    desc: telegram word
    crit: component
    for:
      - package.json
      - javascript
      - typescript
    unless:
      - id: well-known/app/opencode-router
    if:
      type: text
      word: telegram
      case_insensitive: true
  - id: preinstall-hook
    desc: preinstall hook
    crit: component
    for:
      - package.json
    if:
      type: text
      substr: '"preinstall":'
  # require-* module-import atoms relocated to their canonical import homes
  # (metadata/import/builtin/node.yaml for core modules; metadata/import/package/
  # js-require.yaml for lodash/axios). These composites reference them cross-tier.
  - id: discord-js
    desc: discord.js string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: discord.js
  - id: discord-io
    desc: discord.io string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: discord.io
  - id: discord-client
    desc: Discord.Client string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: Discord.Client
  - id: dot-token
    desc: .token string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: .token
  - id: webhook-str
    desc: webhook string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      word: webhook
  - id: telegraf-str
    desc: telegraf string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: telegraf
  - id: oast-str
    desc: oast string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      word: oast
  - id: webhook-site-str
    desc: webhook.site string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: webhook.site
  - id: winston-str
    desc: winston string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: winston
  - id: pino-str
    desc: pino string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: pino
  - id: bunyan-str
    desc: bunyan string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: bunyan
  - id: log4js-str
    desc: log4js string
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: log4js
  - id: winston-test-helper
    desc: Winston test helper
    crit: notable
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: "require('../lib/winston')"
  - id: spawn-word
    desc: spawn word
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      word: spawn
  - id: sdk-suffix
    desc: -sdk suffix
    crit: component
    for:
      - javascript
      - typescript
      - package.json
    if:
      type: text
      substr: -sdk
  - id: api-suffix
    desc: -api suffix
    crit: component
    for:
      - javascript
      - typescript
      - package.json
    if:
      type: text
      substr: -api
  - id: client-word
    desc: '"Client" word literal'
    crit: component
    for:
      - javascript
      - typescript
      - package.json
    if:
      type: text
      word: Client
  - id: nanopb-framework
    desc: nanopb protobuf framework
    crit: notable
    conf: 0.9
    for:
      - macho
    if:
      type: text
      substr: nanopb
  - id: framework-binary-marker
    desc: Protobuf framework binary detected
    crit: notable
    conf: 0.95
    for:
      - macho
    if:
      type: text
      substr: GPBMessage
composite_rules:
  - id: popular-libs
    desc: Popular library names
    crit: component
    for:
      - package.json
    any:
      - id: metadata/package/dependencies::npm-dep-lodash
      - id: micro-behaviors/communications/http/lib/axios::axios
      - id: metadata/package/dependencies::npm-dep-express
      - id: metadata/package/dependencies::npm-dep-react
      - id: metadata/package/dependencies::npm-dep-discord
      - id: telegram-word
      - id: metadata/package/dependencies::npm-dep-winston
      - id: metadata/package/dependencies::npm-dep-pino
  - id: install-hooks
    desc: NPM install hooks
    crit: component
    for:
      - package.json
    any:
      - id: preinstall-hook
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
  - id: network-cmds
    desc: Network download commands
    crit: component
    for:
      - package.json
    any:
      - id: micro-behaviors/communications/http/download/curl::curl-cmd-dup
      - id: objectives/command-and-control/beacon/network/client-cli::wget-cmd-dup
  - id: popular-lib-with-hooks
    desc: Popular library with unusual install hooks
    crit: suspicious
    conf: 0.85
    attack: T1195.001
    for:
      - package.json
    all:
      - id: popular-libs
      - id: install-hooks
      - id: network-cmds
  - id: legit-requires
    desc: Legitimate library requires
    crit: component
    for:
      - javascript
    any:
      - id: metadata/library/web-frameworks::has-middleware
      - id: metadata/import/package::require-lodash
      - id: micro-behaviors/communications/http/lib/axios::axios-require
  - id: network-patterns
    desc: Network call patterns
    crit: component
    for:
      - javascript
    any:
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/client::generic-request-method-call
  - id: two-suspicious-requires
    desc: Two or more Node system-module imports
    crit: component
    for:
      - javascript
    needs: 2
    any:
      - id: metadata/import/builtin::require-child-process
      - id: metadata/import/builtin::require-os
      - id: metadata/import/builtin::require-https
      - id: metadata/import/builtin::require-fs
  - id: library-child-process-network
    desc: Library network code executes child processes
    crit: suspicious
    conf: 0.85
    attack: T1195.001
    for:
      - javascript
    all:
      - id: legit-requires
      - id: two-suspicious-requires
      - id: network-patterns
    any:
      - id: micro-behaviors/process/create/shell/bridge::child-process-exec
    unless:
      - id: well-known/app/node-red-hik-media-buffer::hik-media-buffer-context
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: metadata/library/structure::vscode-source-entrypoint
      - id: well-known/app/pinokio::app-bundle
  - id: discord-indicators
    desc: Discord library indicators
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: discord-js
      - id: discord-io
      - id: discord-client
  - id: discord-tokens
    desc: Discord token indicators
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: objectives/credential-access/env/secrets/messaging::discord-token
      - id: dot-token
  - id: steal-indicators
    desc: Data theft indicators
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/data/db/web-storage::dom-localstorage
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
  - id: exfil-indicators-comp
    desc: Exfiltration indicators
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: webhook-str
      - id: steal-indicators
      - id: micro-behaviors/communications/http/post::post
  - id: discord-library
    desc: Trojanized Discord library patterns
    crit: suspicious
    conf: 0.9
    attack: T1195.001
    mbc: B0024
    for:
      - javascript
      - typescript
    all:
      - id: discord-indicators
      - id: discord-tokens
      - id: exfil-indicators-comp
  - id: telegram-indicators
    desc: Telegram library indicators
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: telegram-word
      - id: telegraf-str
      - id: objectives/command-and-control/backdoor/keywords::malware-bot-tool-suffix
  - id: malicious-process-calls
    desc: Malicious process execution calls
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
      - id: micro-behaviors/process/create/shell/bridge::spawn-call
      - id: objectives/command-and-control/dropper/builder::exec-paren
  - id: oob-exfil-indicators
    desc: Out-of-band exfiltration indicators
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: oast-str
      - id: webhook-site-str
  - id: telegram-library
    desc: Trojanized Telegram library patterns
    crit: suspicious
    conf: 0.9
    attack: T1195.001
    mbc: B0024
    for:
      - javascript
      - typescript
    all:
      - id: telegram-indicators
      - id: malicious-process-calls
      - id: oob-exfil-indicators
  - id: logging-indicators
    desc: Logging library indicators
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: winston-str
      - id: pino-str
      - id: bunyan-str
      - id: log4js-str
  - id: two-logging-suspicious
    desc: Multiple process or sensitive-file additions in logging library context
    crit: notable
    for:
      - javascript
      - typescript
    needs: 2
    any:
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
      - id: spawn-word
      - id: objectives/anti-static/obfuscation/payload/bytecode::exec-word
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
  - id: logging-library
    desc: Trojanized logging library patterns
    crit: suspicious
    conf: 0.85
    attack: T1195.001
    for:
      - javascript
      - typescript
    size_max: 200000
    all:
      - id: logging-indicators
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
    any:
      - id: spawn-word
      - id: objectives/anti-static/obfuscation/payload/bytecode::exec-word
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
    unless:
      - id: metadata/build/bundler::has-sourcemap
      - id: winston-test-helper
  - id: sdk-indicators
    desc: SDK/API client indicators
    crit: component
    for:
      - javascript
      - typescript
      - package.json
    any:
      - id: sdk-suffix
      - id: metadata/package/manifest/name::npm-client-suffix
      - id: api-suffix
      - id: client-word
  - id: sdk-install-hooks
    desc: SDK install hooks
    crit: component
    for:
      - javascript
      - typescript
      - package.json
    any:
      - id: preinstall-hook
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
  - id: sdk-suspicious-activity
    desc: SDK suspicious activity
    crit: component
    for:
      - javascript
      - typescript
      - package.json
    any:
      - id: micro-behaviors/communications/http/download/curl::curl-cmd-dup
      - id: objectives/command-and-control/beacon/network/client-cli::wget-cmd-dup
      - id: micro-behaviors/process/user/query::os-userinfo-call
  - id: sdk-client
    desc: Trojanized SDK or API client
    crit: suspicious
    conf: 0.8
    attack: T1195.001
    for:
      - javascript
      - typescript
      - package.json
    all:
      - id: sdk-indicators
      - id: sdk-install-hooks
      - id: sdk-suspicious-activity
  - id: crypto-library-indicators
    desc: Cryptocurrency library indicators
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/crypto/library/blockchain::ethers-library-reference
      - id: micro-behaviors/crypto/library/blockchain::web3-library-reference
      - id: objectives/impact/cryptojacking/miner/signatures::wallet-ref
      - id: objectives/impact/ransom/encrypt/threat-text::bitcoin-word
      - id: micro-behaviors/crypto/library/blockchain::solana-library-reference
  - id: key-theft-indicators
    desc: Key theft patterns
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/os/env/vars/credentials::javascript-private-key-environment-variable
      - id: objectives/credential-access/env/secrets/wallet
      - id: micro-behaviors/crypto/library/provider::key-object-create
      - id: objectives/credential-access/wallet/mnemonic::keystore-file
  - id: crypto-exfil-indicators
    desc: Crypto exfiltration indicators
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: webhook-str
      - id: oast-str
      - id: objectives/collection/stealer/browser::json-stringify-post-body
  - id: crypto-library
    desc: Trojanized cryptocurrency library
    crit: suspicious
    conf: 0.9
    attack: T1195.001
    mbc: B0024
    for:
      - javascript
      - typescript
    size_max: 262144
    all:
      - id: crypto-library-indicators
      - id: key-theft-indicators
      - id: crypto-exfil-indicators
    unless:
      - id: well-known/tool/development/socket-cli::socket-dev-cli-bundle
      - id: well-known/tool/development/socket-cli::socket-dev-cli-vendored-path
  - id: suspicious-trojanized-framework
    desc: Likely trojanized framework with embedded payload and suspicious capabilities
    crit: suspicious
    conf: 0.9
    attack: T1195.001
    mbc: B0024
    for:
      - macho
      - elf
    all:
      - id: framework-binary-marker
      - id: micro-behaviors/data/embedded/payload/compression::lzma-magic
      - id: micro-behaviors/communications/http/delete::delete
  - id: trojanized-framework-networked
    desc: Trojanized framework with network and payload capabilities
    crit: suspicious
    conf: 0.92
    attack: T1195.001
    mbc: B0024
    for:
      - macho
      - elf
    all:
      - id: suspicious-trojanized-framework
      - id: micro-behaviors/communications/socket/bind/function::bind
  - id: trojanized-framework-with-c2
    desc: Trojanized framework with command & control indicators
    crit: hostile
    conf: 0.95
    attack: T1195.001
    mbc: B0024
    for:
      - macho
      - elf
    all:
      - id: trojanized-framework-networked
      - id: micro-behaviors/communications/http/url/domain::http-url-binary
  - id: nanopb-with-ios-injection
    desc: Protobuf library with iOS code injection framework
    crit: suspicious
    conf: 0.85
    attack: T1195.001
    mbc: B0024
    for:
      - macho
      - ipa
    all:
      - id: nanopb-framework
      - id: objectives/evasion/process/injection/runtime::cbinjection-framework
