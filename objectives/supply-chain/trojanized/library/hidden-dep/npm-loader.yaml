defaults:
  platforms: [unix, windows]
  attack: T1195.002

traits:
- id: lint-builder-dependency
  desc: Depends on lint-builder payload
  crit: suspicious
  conf: 0.98
  for: [package.json]
  if:
    type: text
    regex: '"(lint-builder|lint-null)"\s*:'

- id: four-sdk-aes-ipheriv-dependency
  desc: Depends on four-sdk-aes-ipheriv
  crit: suspicious
  conf: 0.995
  for: [package.json]
  if:
    type: value
    path: dependencies.four-sdk-aes-ipheriv
    exists: true

- id: wime-zle-dependency
  desc: Depends on wime-zle payload
  crit: suspicious
  conf: 0.995
  for: [package.json]
  if:
    type: value
    path: dependencies.wime-zle
    exists: true

- id: levex-refa-dependency
  desc: Depends on levex-refa payload
  crit: suspicious
  conf: 0.995
  for: [package.json]
  if:
    type: value
    path: dependencies.levex-refa
    exists: true

- id: assertcoreutils-dependency
  desc: Depends on assertcoreutils payload package
  crit: suspicious
  conf: 0.97
  for: [package.json]
  if:
    type: value
    path: dependencies.assertcoreutils
    exists: true

- id: slot-loader-dependency
  desc: Depends on slot loader payload
  crit: suspicious
  conf: 0.995
  for: [package.json]
  if:
    type: text
    regex: '"(parket-slot|websocket-slot)"\s*:'

- id: require-levex-refa
  desc: Requires levex-refa module
  crit: suspicious
  conf: 0.995
  for: [javascript, typescript]
  if:
    type: text
    substr: 'require("levex-refa")'

- id: require-slot-loader
  desc: Requires slot loader module
  crit: suspicious
  conf: 0.995
  for: [javascript, typescript]
  if:
    type: text
    regex: 'require\s*\(\s*["''](parket-slot|websocket-slot)["'']\s*\)'

- id: require-lint-builder
  desc: Requires lint-builder module
  crit: suspicious
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: import
    regex: '^(lint-builder|lint-null)$'

- id: require-four-sdk-aes-ipheriv
  desc: Requires four-sdk-aes-ipheriv
  crit: suspicious
  conf: 0.995
  for: [javascript, typescript]
  if:
    type: text
    substr: require('four-sdk-aes-ipheriv')

- id: require-wime-zle
  desc: Requires wime-zle module
  crit: suspicious
  conf: 0.995
  for: [javascript, typescript]
  if:
    type: import
    regex: '^(wime-zle|vime-azl)$'

- id: call-aes-create-ipheriv
  desc: Calls aesCreateIpheriv helper
  crit: suspicious
  conf: 0.995
  for: [javascript, typescript]
  if:
    type: text
    substr: aesCreateIpheriv();

- id: from-str-loader-call
  desc: Calls from_str loader method
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    # Migrated from a tree-sitter call query to a `kind: call`
    # match on the pre-extracted call fact (no per-member
    # tree-sitter cursor walk; same call-name semantics).
    type: symbol
    kind: call
    regex: '\.from_str$'
- id: noop-loader-promises
  desc: Loader chain swallows promise results
  crit: suspicious
  conf: 0.97
  for: [javascript, typescript]
  if:
    type: text
    substr: .then(e => { }).catch(e => { })

- id: from-str-promise-swallow
  desc: from_str promise swallows errors
  crit: component
  conf: 0.99
  for: [javascript, typescript]
  if:
    type: text
    substr: .then(e => e).catch(e => { })

- id: swallowed-loader-errors
  desc: Empty catch hides loader errors
  crit: component
  conf: 0.97
  for: [javascript, typescript]
  size_max: 65536
  if:
    type: text
    regex: 'from_str[\s\S]{0,240}catch\s*\([A-Za-z_][A-Za-z0-9_]*\)\s*\{\s*\}'
  unless:
  - type: text
    substr: instantiateWasm
  downgrade:
    any:
    - id: metadata/package/testing/
    - type: basename
      regex: '(?i)\.(spec|test)\.[jt]s$'
- id: fallback-try-require
  desc: try block probes dependency with require
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: 'try\s*\{[\s\S]{0,180}require\('
- id: fallback-catch-execsync
  desc: catch block runs execSync
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: 'catch[\s\S]{0,320}execSync'
- id: fallback-catch-require
  desc: catch block retries require
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: 'catch[\s\S]{0,640}require\('
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern

composite_rules:
- id: hidden-dependency-loader
  desc: Embedded dependency loader stub
  crit: suspicious
  conf: 0.99
  for: [javascript, typescript]
  all:
  - id: require-lint-builder
  - id: from-str-loader-call
  - id: noop-loader-promises
  - id: swallowed-loader-errors

- id: require-fallback-npm-install
  desc: Missing dependency fallback installs package at runtime
  crit: suspicious
  conf: 0.96
  for: [javascript, typescript]
  all:
  - id: fallback-try-require
  - id: fallback-catch-execsync
  - id: fallback-catch-require
  - id: objectives/supply-chain/install-hook/scripts/dynamic-install::runtime-npm-install-comp
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern

- id: runtime-autoinstall-hidden-dependency
  desc: Trojanized library auto-installs hidden dependency at runtime
  crit: hostile
  conf: 0.985
  for: [javascript, typescript]
  attack: "T1195.002,T1059.007"
  mbc: B0024
  all:
  - id: require-fallback-npm-install
  - id: objectives/supply-chain/install-hook/scripts/dynamic-install::stealth-runtime-npm-install
  any:
  - id: swallowed-loader-errors
  - id: micro-behaviors/process/create/spawn::windowshide-option

- id: trojanized-library-hidden-loader
  desc: Trojanized library runs hidden dependency
  crit: hostile
  conf: 0.995
  all:
  - id: lint-builder-dependency
  - id: hidden-dependency-loader
  any:
  - id: metadata/package/versioning::mature-package-version
  - id: objectives/supply-chain/impersonation/npm-clone::author-retained-original
  - id: metadata/package/manifest/name::npm-hyphenated-multiword-name

- id: npm-undeclared-import-time-loader
  desc: New package loads undeclared external dependency
  crit: hostile
  conf: 0.99
  for: [npm, tar, zip, archives]
  scope: package
  attack: "T1195.002,T1059.007"
  mbc: B0024
  all:
  - id: metadata/package/dependencies::npm-phantom-runtime-dependency
  - id: micro-behaviors/os/module/load::dynamic-external-import-string-literal
  - id: metadata/registry::brand-new-package

- id: known-payload-phantom-dependency
  desc: Package carries unused known payload dependency
  crit: hostile
  conf: 0.985
  for: [npm, tar, zip]
  scope: archive
  attack: "T1195.002,T1059.007"
  mbc: B0024
  all:
      - id: metadata/package/dependencies::npm-phantom-runtime-dependency
  any:
  - id: assertcoreutils-dependency
  - id: four-sdk-aes-ipheriv-dependency
  - id: wime-zle-dependency
  - id: levex-refa-dependency
  - id: slot-loader-dependency
- id: wime-zle-hidden-loader
  desc: Embedded wime-zle dependency loader
  crit: hostile
  conf: 0.998
  # Cross-file: the dependency is declared in package.json while the loader code
  # lives in a sibling .js. A .tgz is typed tar.gz (not npm), so package.json-
  # anchored sibling pooling never activates — evaluate at archive scope so the
  # manifest + script findings are pooled. (The JS-only wime-zle-loader-stub
  # below still covers the case where only the script is seen.)
  for: [javascript, typescript, package.json, archives]
  scope: archive
  all:
  - id: wime-zle-dependency
  - id: require-wime-zle
  - id: from-str-loader-call
  - id: from-str-promise-swallow

- id: wime-zle-loader-stub
  desc: wime-zle import-time loader stub
  crit: hostile
  conf: 0.998
  for: [javascript, typescript]
  all:
  - id: require-wime-zle
  - id: from-str-loader-call
  - id: from-str-promise-swallow

- id: levex-refa-hidden-loader
  desc: Embedded levex-refa dependency loader
  crit: hostile
  conf: 0.998
  # Cross-file (dep in package.json + loader in sibling .js); see
  # wime-zle-hidden-loader — evaluate at archive scope so .tgz pools both.
  for: [javascript, typescript, package.json, archives]
  scope: archive
  all:
  - id: levex-refa-dependency
  - id: require-levex-refa
  - id: from-str-loader-call
  - id: from-str-promise-swallow

- id: levex-refa-loader-stub
  desc: levex-refa import-time loader stub
  crit: hostile
  conf: 0.998
  for: [javascript, typescript]
  all:
  - id: require-levex-refa
  - id: from-str-loader-call
  - id: from-str-promise-swallow

- id: slot-loader-stub
  desc: Slot loader runs during import
  crit: hostile
  conf: 0.998
  for: [javascript, typescript]
  attack: "T1195.002,T1059.007"
  all:
  - id: require-slot-loader
  - id: from-str-loader-call
  - id: swallowed-loader-errors
  any:
  - id: noop-loader-promises
  - id: fallback-try-require
  - id: objectives/supply-chain/install-hook/init::top-level-require-method-call

- id: slot-hidden-dependency-loader
  desc: Package ships slot loader dependency
  crit: hostile
  conf: 0.998
  for: [javascript, typescript, package.json, archives]
  scope: archive
  attack: "T1195.002,T1059.007"
  all:
  - id: slot-loader-dependency
  - id: require-slot-loader
  - id: from-str-loader-call
  - id: swallowed-loader-errors

- id: trojanized-crypto-sdk-helper
  desc: Trojanized SDK triggers four-sdk-aes-ipheriv helper
  crit: hostile
  conf: 0.998
  all:
  - id: four-sdk-aes-ipheriv-dependency
  - id: require-four-sdk-aes-ipheriv
  - id: call-aes-create-ipheriv
  any:
  - id: micro-behaviors/crypto/library/blockchain/transaction::ethers-library-reference
  - id: objectives/supply-chain/trojanized/library/framework::sdk-suffix
  - id: metadata/package/manifest/name::npm-hyphenated-multiword-name
