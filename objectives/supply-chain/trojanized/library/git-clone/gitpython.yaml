defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1071.001
  mbc: E1105
  for:
    - python
traits:
  - id: gitpython-import
    desc: GitPython import
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: gitpython
  - id: git-clone-url
    desc: Git clone with URL
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: git\.Git.{0,50}clone|clone[_(].{0,30}github\.com
    unless:
      - id: metadata/library/data::pulumi-python-provider-generated
      - type: path
        regex: 'sandbox_namespaces\.py$'
  - id: git-clone-in-setup
    desc: Git clone during setup
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: install.{2,50}clone|clone.{2,50}install|setup.{2,50}clone
  - id: cmdclass-custom-install
    desc: Custom install command class
    crit: suspicious
    conf: 0.75
    size_max: 30000
    if:
      type: string_literal
      regex: cmdclass.{0,50}install|CustomInstallCommand
    unless:
      - type: basename
        regex: ^test_
  - id: install-hook-execution
    desc: Install hook execution
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: class.{0,50}install.{0,50}run|def run.{0,50}install
    unless:
      - id: well-known/app/tabby::tabby-eval-dataset-member
  - id: obfuscated-repo-prefix
    desc: Obfuscated repository name prefix
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: \\b(not|dis|anti)[-_a-z0-9]{0,12}
  - id: obfuscated-repo-suffix-grabber
    desc: Obfuscated repository name suffix (grabber)
    crit: suspicious
    conf: 0.7
    if:
      id: objectives/command-and-control/backdoor/keywords::grabber-word
    unless:
      - id: well-known/tool/detection/malware-config-parser
      - id: well-known/app/kubeflow-community::notebook-scripts
      - id: metadata/library/data::pillow-source
  - id: obfuscated-repo-suffix-logger
    desc: Obfuscated repository name suffix (logger)
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)(github\.com|gitlab\.com).{0,80}logger
    unless:
      - id: well-known/tool/development/pymobiledevice3
  # Note: the bare "malware" keyword lives in
  # well-known/malware/trojan/terms/generic.yaml as `malware-word`
  # alongside grabber-word / stealer-word. Referenced directly from
  # composite `obfuscated-repo-name-2` below.
composite_rules:
  - id: obfuscated-repo-name-1
    desc: Obfuscated repo (grabber/logger)
    crit: suspicious
    conf: 0.7
    all:
      - id: obfuscated-repo-prefix
    any:
      - id: obfuscated-repo-suffix-grabber
      - id: obfuscated-repo-suffix-logger
  - id: obfuscated-repo-name-2
    desc: Obfuscated repo (stealer/malware)
    crit: suspicious
    conf: 0.7
    all:
      - id: obfuscated-repo-prefix
    any:
      - id: objectives/credential-access/theft/keywords::stealer-word
      - id: objectives/command-and-control/backdoor/keywords::malware-word
    unless:
      - id: well-known/tool/detection/llm-scanner/
  - id: obfuscated-repo-name
    desc: Obfuscated repository name
    crit: suspicious
    conf: 0.7
    any:
      - id: obfuscated-repo-name-1
      - id: obfuscated-repo-name-2
  - id: gitpython-malicious-clone
    desc: GitPython malicious cloning
    crit: suspicious
    conf: 0.9
    attack: T1105
    needs: 2
    any:
      - id: git-clone-url
      - id: git-clone-in-setup
      - id: objectives/command-and-control/backdoor/keywords::suspicious-repo-name
    all:
      - id: gitpython-import
  - id: supply-chain-gitclone
    desc: Supply chain via git clone
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: gitpython-malicious-clone
      - id: cmdclass-custom-install
      - id: install-hook-execution
