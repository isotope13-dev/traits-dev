defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1071.001
  mbc: E1105
  for:
    - python
traits:
  - id: git-clone-url
    desc: Git clone with URL
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)(clone|clone_from|clone_repo)$'
      arg:
        kind: string
        regex: "^(https?|git|ssh)://[^\"'\\s]+(github|gitlab|bitbucket)\\.[^\"'\\s]+|^git@[^:]+:"
    unless:
      - id: metadata/library/data::pulumi-python-provider-generated
      - type: path
        regex: 'sandbox_namespaces\.py$'
  - id: obfuscated-repo-prefix
    desc: Suspicious prefix in repository URL
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?i)(github|gitlab)\.com/\S{1,60}/(not|dis|anti)[-_a-z0-9]{0,12}'
  - id: obfuscated-github-repo-suffix-grabber
    desc: GitHub URL with obfuscated grabber suffix
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: '(?i)https?://github\.com/[^\s"'']{1,60}/(not|dis|anti)[-_a-z0-9]{0,12}grabber\b'
  - id: obfuscated-gitlab-repo-suffix-grabber
    desc: GitLab URL with obfuscated grabber suffix
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: '(?i)https?://gitlab\.com/[^\s"'']{1,60}/(not|dis|anti)[-_a-z0-9]{0,12}grabber\b'
  - id: obfuscated-bitbucket-repo-suffix-grabber
    desc: Bitbucket URL with obfuscated grabber suffix
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: '(?i)https?://bitbucket\.org/[^\s"'']{1,60}/(not|dis|anti)[-_a-z0-9]{0,12}grabber\b'
    unless:
      - id: well-known/tool/detection/malware-config-parser
      - id: well-known/app/kubeflow-community::notebook-scripts
      - id: metadata/library/data::pillow-source
  - id: obfuscated-repo-suffix-logger
    desc: Prefixed repository name ending in logger
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: '(?i)(github|gitlab)\.com/\S{1,60}/(not|dis|anti)[-_a-z0-9]{0,12}logger\b'
    unless:
      - id: well-known/tool/development/pymobiledevice3
  # Note: the bare "malware" keyword lives in
  # well-known/malware/trojan/terms/generic.yaml as `malware-word`
  # alongside grabber-word / stealer-word. Referenced directly from
  # composite `obfuscated-repo-name-2` below.
composite_rules:
  - id: obfuscated-repo-suffix-grabber
    desc: Repository URL with obfuscated grabber suffix
    crit: suspicious
    conf: 0.7
    any:
      - id: obfuscated-github-repo-suffix-grabber
      - id: obfuscated-gitlab-repo-suffix-grabber
      - id: obfuscated-bitbucket-repo-suffix-grabber
  - id: obfuscated-repo-name-1
    desc: Obfuscated repo (grabber/logger)
    crit: suspicious
    conf: 0.7
    all:
      - id: obfuscated-repo-prefix
    any:
      - id: obfuscated-repo-suffix-grabber
      - id: obfuscated-repo-suffix-logger
    near_bytes: 256
  - id: obfuscated-repo-name-2
    desc: Obfuscated repo (stealer/malware)
    crit: suspicious
    conf: 0.7
    all:
      - id: obfuscated-repo-prefix
    any:
      - id: objectives/credential-access/theft/keywords::stealer-word
      - id: objectives/command-and-control/backdoor/keywords::malware-word
    near_bytes: 256
    unless:
      - id: well-known/tool/detection/llm-scanner/
  - id: obfuscated-repo-name
    desc: Obfuscated repository name
    crit: suspicious
    conf: 0.7
    any:
      - id: obfuscated-repo-name-1
      - id: obfuscated-repo-name-2
  - id: gitpython-malicious-clone
    desc: GitPython malicious cloning
    crit: suspicious
    conf: 0.9
    attack: T1105
    needs: 2
    any:
      - id: git-clone-url
      - id: micro-behaviors/process/create/vcs/git::python-git-clone-call
      - id: objectives/command-and-control/backdoor/keywords::suspicious-repo-name
    all:
      - id: micro-behaviors/process/create/vcs/git::python-gitpython-import
  - id: supply-chain-gitclone
    desc: Supply chain via git clone
    crit: suspicious
    conf: 0.95
    all:
      - id: gitpython-malicious-clone
      - id: metadata/build/package::setup-cmdclass-install
