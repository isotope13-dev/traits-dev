defaults:
  platforms: [unix, windows]
  attack: T1195.002
  for: [javascript]
traits:
  - id: remote-json-eval-body
    desc: Evaluates JSON parsed response body
    crit: suspicious
    conf: 0.99
    attack: T1059.007
    if:
      type: text
      regex: eval\s*\(\s*JSON\.parse\(\s*[A-Za-z_$][A-Za-z0-9_$]*\s*\)\s*\)
  - id: custom-bearrtoken-header
    desc: Uses custom bearrtoken header gate
    crit: suspicious
    conf: 0.97
    attack: T1071.001
    if:
      type: text
      regex: bearrtoken\s*:\s*["'][A-Za-z0-9_-]{1,32}["']
  - id: init-plugin-default-jsonkeeper-url
    desc: initPlugin defaults to JSONKeeper URL
    crit: suspicious
    conf: 0.97
    attack: T1105
    if:
      type: text
      regex: function\s+initPlugin.{0,180}jsonkeeper\.com/b/[A-Za-z0-9_-]{4,24}
  - id: response-data-payload-field
    desc: Response data used as payload
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'payload\s*:\s*data\.data'
  - id: json-cookie-function-constructor
    desc: JSON cookie field becomes Function body
    crit: suspicious
    conf: 0.98
    attack: T1059.007
    if:
      type: text
      regex: 'Function\.constructor[\s\S]{0,160}JSON\.parse\s*\([^)]{1,80}\)\.cookie'
  - id: json-parse-cookie-function-body
    desc: JSON cookie field becomes Function body
    crit: suspicious
    conf: 0.97
    attack: T1059.007
    if:
      type: text
      regex: 'JSON\.parse\s*\([^)]{1,80}\)\.cookie[\s\S]{0,180}new\s+Function\s*\(\s*[''"]require[''"]'
  - id: init-plugin-function
    desc: initPlugin function declaration
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'function\s+initPlugin\s*\('
  - id: init-plugin-import-call
    desc: initPlugin direct module call
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(^|\n)\s*initPlugin\s*\(\s*\)\s*;'
    unless:
      - type: text
        regex: 'useEffect\s*\([\s\S]{0,600}\binitPlugin\s*\(\s*\)'
  - id: module-exports-initplugin
    desc: Module exports initPlugin
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'module\.exports\s*=\s*initPlugin\s*;'
  - id: module-exports-plugin-factory
    desc: Module exports plugin factory
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'module\.exports\s*=\s*\{[\s\S]{0,160}\bgetPlugin\b'
  - id: normalize-path-decoy-function
    desc: normalizePath decoy implementation
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'const\s+normalizePath\s*=\s*\([^)]{0,80}\)\s*=>'
  - id: vercel-subdomain-fragment
    desc: Hardcoded Vercel subdomain fragment
    crit: component
    conf: 0.92
    attack: T1071.001
    if:
      type: text
      substr: ip-api-check-nine
  - id: icons-path-fragment
    desc: Hardcoded icons path fragment
    crit: component
    conf: 0.9
    attack: T1071.001
    if:
      type: text
      substr: /icons/
  - id: vercel-domain-fragment
    desc: Hardcoded Vercel domain fragment
    crit: component
    conf: 0.9
    attack: T1071.001
    if:
      type: text
      substr: vercel.app
  - id: genimi-subdomain-fragment
    desc: Hardcoded Genimi Vercel subdomain
    crit: component
    conf: 0.97
    attack: T1071.001
    if:
      type: text
      regex: 'server-(genimi-check|check-genimi)'
  - id: defy-path-fragment
    desc: Hardcoded defy path fragment
    crit: component
    conf: 0.94
    attack: T1071.001
    if:
      type: text
      substr: /defy/
  - id: protocol-fragment
    desc: Protocol fragment stored separately
    crit: component
    conf: 0.85
    attack: T1027
    if:
      type: text
      substr: protocol = "https"
  - id: separator-fragment
    desc: URL separator fragment stored separately
    crit: component
    conf: 0.84
    attack: T1027
    if:
      type: text
      substr: separator = "://"
  - id: windows-process-tree-lib-path
    desc: windows-process-tree library path
    crit: notable
    conf: 1.0
    if:
      type: path
      regex: windows-process-tree[\\/]lib[\\/]
  - id: retry-guard-positive
    desc: Retry guard checks positive counter
    crit: component
    conf: 0.84
    size_max: 200000
    attack: T1105
    unless:
      - type: basename
        regex: ^jsbn(-combined|2)?\.js$
      - type: basename
        regex: \.js\.map$
      - id: metadata/library/jquery::header-prefix
      - id: well-known/app/tabby::tabby-builtin-plugin-dist-path
    if:
      type: text
      regex: if\s*\(\s*(retry|retries|attempts?|retryCount)\s*>\s*0\s*\)
  - id: self-recursion-minus-one
    desc: Recursive retry decrements counter
    crit: component
    conf: 0.86
    size_max: 200000
    attack: T1105
    if:
      type: text
      regex: \w+\([^)]{0,80}\b(retry|retries|attempts?|retryCount)\s*-\s*1\s*\)
    unless:
      - id: windows-process-tree-lib-path
      - type: basename
        regex: ^jsbn(-combined|2)?\.js$
      - type: basename
        regex: \.js\.map$
      - id: metadata/library/jquery::header-prefix
      - type: basename
        regex: (^|[\\/])node_modules[\\/]ipv6[\\/]
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]ipv6[\\/]
      - id: well-known/app/tabby::tabby-builtin-plugin-dist-path
  - id: exports-remote-flow
    desc: Exports remote flow entrypoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: module\.exports\s*=\s*\{[\s\S]{0,80}unifyFlow
  - id: http-404-token-gate
    desc: Executes token only on HTTP 404
    crit: suspicious
    conf: 0.98
    attack: T1105
    if:
      type: text
      regex: status\s*===\s*404\s*&&\s*\w+\.response\.data\?\.token
  - id: function-ctor-require-token
    desc: Function constructor runs response token
    crit: suspicious
    conf: 0.99
    attack: T1059.007
    if:
      type: text
      regex: 'Function\.constructor[\s\S]{0,120}[''"]require[''"][\s\S]{0,120}token'
  - id: spawn-node-caller
    desc: Spawns node caller helper
    crit: suspicious
    conf: 0.96
    attack: T1059.007
    if:
      type: text
      regex: spawn\(\s*['"]node['"][\s\S]{0,240}\./lib/caller\.js
    not:
      - substr: child_process.spawnSync
  - id: lib-caller-path
    desc: References lib caller helper path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: ./lib/caller.js
  - id: node-path-module-exports
    desc: Node path module exports
    crit: component
    conf: 0.95
    if:
      type: text
      regex: module\.exports\.posix\s*=\s*posix[\s\S]{0,80}module\.exports\.win32\s*=\s*win32
  - id: node-normalize-array-function
    desc: Node path normalizeArray function
    crit: component
    conf: 0.9
    if:
      type: text
      regex: function\s+normalizeArray\s*\(
  - id: node-win32-split-path-function
    desc: Node path win32SplitPath function
    crit: component
    conf: 0.9
    if:
      type: text
      regex: function\s+win32SplitPath\s*\(
composite_rules:
  - id: vercel-icons-endpoint
    desc: Hardcoded Vercel icons endpoint
    crit: notable
    conf: 0.94
    attack: T1071.001
    all:
      - id: vercel-subdomain-fragment
      - id: icons-path-fragment
      - id: vercel-domain-fragment
  - id: vercel-defy-endpoint
    desc: Hardcoded Vercel defy endpoint
    crit: suspicious
    conf: 0.98
    attack: T1071.001
    all:
      - id: genimi-subdomain-fragment
      - id: defy-path-fragment
      - id: vercel-domain-fragment
  - id: split-url-fragments
    desc: URL built from split network fragments
    crit: suspicious
    conf: 0.9
    attack: T1027
    all:
      - id: protocol-fragment
      - id: separator-fragment
  - id: recursive-request-retry
    desc: Positive counter recursive call
    crit: component
    conf: 0.88
    attack: T1105
    all:
      - id: retry-guard-positive
      - id: self-recursion-minus-one
    unless:
      - id: windows-process-tree-lib-path
  - id: import-time-init-plugin
    desc: Plugin initializer runs at module load
    crit: suspicious
    conf: 0.94
    attack: T1059.007
    all:
      - id: init-plugin-function
      - id: init-plugin-import-call
  - id: path-normalizer-decoy-export
    desc: Path normalizer exports loader
    crit: suspicious
    conf: 0.95
    all:
      - id: normalize-path-decoy-function
      - id: module-exports-initplugin
  - id: detached-node-caller-launcher
    desc: Detached node caller launcher
    crit: suspicious
    conf: 0.97
    attack: T1059.007
    all:
      - id: spawn-node-caller
      - id: lib-caller-path
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/daemonize/detach::node-handle-unref-call
  - id: trojanized-library-detached-middleware
    desc: Library middleware launches detached Node stage
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1059.007
    all:
      - id: micro-behaviors/communications/http/server/middleware::returns-request-middleware-function
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
    any:
      - id: remote-json-eval-body
      - id: json-cookie-function-constructor
      - id: json-parse-cookie-function-body
      - id: custom-bearrtoken-header
  - id: node-path-module-implementation
    desc: Node path module implementation
    crit: notable
    conf: 0.95
    all:
      - id: node-path-module-exports
      - id: node-path-core-functions
    any:
      - id: metadata/package/testing/harness/runtime::joyent-copyright
  - id: node-path-core-functions
    desc: Node path core functions appear nearby
    crit: notable
    conf: 0.92
    all:
      - id: node-normalize-array-function
      - id: node-win32-split-path-function
    near_bytes: 4000
  - id: remote-json-eval-loader
    desc: Node package loads remote JSON into eval
    crit: hostile
    conf: 0.995
    attack: T1059.007
    all:
      - id: micro-behaviors/communications/http/request/client::request-import
      - id: remote-json-eval-body
      - id: vercel-icons-endpoint
    any:
      - id: custom-bearrtoken-header
      - id: split-url-fragments
      - id: recursive-request-retry
  - id: gated-split-url-json-eval-loader
    desc: Gated split-URL JSON eval loader
    crit: hostile
    conf: 0.995
    attack: T1059.007
    all:
      - id: micro-behaviors/communications/http/request/client::request-import
      - id: remote-json-eval-body
      - id: custom-bearrtoken-header
      - id: split-url-fragments
    any:
      - id: recursive-request-retry
      - id: http-404-token-gate
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::url-string-concatenation
  - id: remote-json-eval-endpoint-profile
    desc: Remote loader uses gated Vercel endpoint
    crit: suspicious
    conf: 0.98
    attack: T1071.001
    all:
      - id: vercel-icons-endpoint
      - id: custom-bearrtoken-header
    any:
      - id: split-url-fragments
      - id: recursive-request-retry
  - id: jsonkeeper-cookie-function-loader
    desc: JSONKeeper cookie executes with require
    crit: hostile
    conf: 0.995
    attack: T1102.001
    all:
      - id: micro-behaviors/communications/http/request/client::request-import
      - id: objectives/command-and-control/infrastructure/paste::jsonkeeper
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
      - id: json-cookie-function-constructor
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::function-result-invoked-require
    any:
      - id: custom-bearrtoken-header
      - id: recursive-request-retry
      - id: import-time-init-plugin
      - id: init-plugin-default-jsonkeeper-url
  - id: jsonkeeper-cookie-function-loader-facts
    desc: JSONKeeper parsed cookie executes with require
    crit: hostile
    conf: 0.995
    attack: T1102.001
    all:
      - id: micro-behaviors/communications/http/request/client::request-import
      - id: objectives/command-and-control/infrastructure/paste::jsonkeeper
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
      - id: micro-behaviors/data/serialize/json::json-parse-call
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::function-result-invoked-require
    any:
      - id: custom-bearrtoken-header
      - id: recursive-request-retry
      - id: import-time-init-plugin
      - id: init-plugin-default-jsonkeeper-url
  - id: remote-json-cookie-function-loader
    desc: Remote JSON cookie field executes with require
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1105,T1059.007
    all:
      - id: micro-behaviors/communications/http/request/client::node-https-get-dynamic
      - id: json-parse-cookie-function-body
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::function-result-invoked-require
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-module-bundle
  - id: jsonkeeper-response-field-eval-loader
    desc: JSONKeeper response field executes via eval
    crit: hostile
    conf: 0.995
    attack: T1102.001,T1059.007
    all:
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::request-json-field-eval-loader
      - id: objectives/command-and-control/infrastructure/paste::jsonkeeper
    any:
      - id: custom-bearrtoken-header
      - id: recursive-request-retry
      - id: init-plugin-default-jsonkeeper-url
  - id: exported-plugin-jsonkeeper-eval-loader
    desc: Exported plugin factory loads JSONKeeper code into eval
    crit: hostile
    conf: 0.995
    attack: T1195.002,T1102.001,T1059.007
    all:
      - id: jsonkeeper-response-field-eval-loader
      - id: module-exports-plugin-factory
  - id: node-jsonkeeper-eval-victim-profile
    desc: Node JSONKeeper eval collects victim profile
    crit: hostile
    conf: 0.995
    attack: T1102.001,T1059.007,T1082
    all:
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::axios-jsonkeeper-content-eval-loader
      - id: objectives/supply-chain/recon-exfil/host-profile/victim::npm-victim-id-recon
      - id: micro-behaviors/os/env/vars/access::js-process-env-spread
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
  - id: trojanized-path-normalizer-remote-eval
    desc: Path normalizer imports remote code
    crit: hostile
    conf: 0.995
    all:
      - id: jsonkeeper-cookie-function-loader
      - id: import-time-init-plugin
      - id: path-normalizer-decoy-export
    any:
      - id: custom-bearrtoken-header
      - id: recursive-request-retry
  - id: trojanized-remote-eval-library
    desc: Trojanized library exports remote eval flow
    crit: hostile
    conf: 0.995
    all:
      - id: remote-json-eval-loader
      - id: exports-remote-flow
    any:
      - id: custom-bearrtoken-header
      - id: split-url-fragments
      - id: recursive-request-retry
  - id: trojanized-node-path-remote-eval
    desc: Trojanized Node path module remote eval
    crit: hostile
    conf: 0.995
    all:
      - id: node-path-module-implementation
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::fetch-atob-json-eval-loader
    any:
      - id: objectives/command-and-control/infrastructure/paste::jsonkeeper-b64-endpoint
      - id: micro-behaviors/communications/url/encoded::encoded-http-url
  - id: http-404-token-loader
    desc: 404-gated token loader via require
    crit: hostile
    conf: 0.995
    attack: T1059.007
    all:
      - id: function-ctor-require-token
      - id: http-404-token-gate
    any:
      - id: micro-behaviors/communications/http/get::axios-get-call
      - id: custom-bearrtoken-header
      - id: vercel-defy-endpoint
  - id: jsonkeeper-gated-content-fetcher
    desc: JSONKeeper fetcher uses custom token gate
    crit: suspicious
    conf: 0.94
    attack: T1102.001
    all:
      - id: micro-behaviors/communications/http/request/client::request-import
      - id: custom-bearrtoken-header
      - id: objectives/command-and-control/infrastructure/paste::jsonkeeper
  - id: jsonkeeper-bearertoken-remote-eval-library
    desc: JSONKeeper Bearer-token remote-eval library
    crit: hostile
    conf: 0.97
    attack: T1102.001,T1059.007
    scope: archive
    all:
      - id: jsonkeeper-gated-content-fetcher
      - id: custom-bearrtoken-header
  - id: umd-dist-axios-atob-eval-loader
    desc: UMD dist library contains remote eval loader
    crit: hostile
    conf: 0.995
    attack: T1195.002,T1105,T1059.007
    mbc: B0009.016
    all:
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::axios-atob-json-eval-loader
      - id: metadata/library/structure::js-umd-wrapper
      - id: metadata/build/bundler::js-dist-basename
    unless:
      - id: metadata/package/testing/
      - id: metadata/package/testing/presence/manifest::test-fixtures
  - id: jsonkeeper-worker-payload-loader
    desc: JSONKeeper payload dispatched to worker
    crit: hostile
    conf: 0.97
    attack: T1102.001,T1105,T1195.002
    all:
      - id: objectives/command-and-control/infrastructure/paste::jsonkeeper
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/ipc/message::postmessage-call
      - id: micro-behaviors/data/control-flow/module-exec::assigned-async-function-iife
      - id: response-data-payload-field
