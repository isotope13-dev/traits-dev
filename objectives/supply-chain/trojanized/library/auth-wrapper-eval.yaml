defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: T1195.002
traits:
  - id: express-eval-import
    desc: Imports express-eval helper
    crit: suspicious
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: ast
      kind: import
      exact: express-eval
  - id: express-eval-require
    desc: Requires express-eval module
    crit: suspicious
    conf: 0.97
    for: [javascript, typescript]
    if:
      type: text
      substr: require("express-eval")
  - id: express-eval-call
    desc: Calls expressEval() helper
    crit: suspicious
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: ast
      query: |
        (call_expression
          function: (identifier) @fn
          (#eq? @fn "expressEval"))
  - id: express-eval-member-call
    desc: Calls transpiled expressEval helper
    crit: suspicious
    conf: 0.99
    for: [javascript, typescript]
    if:
      type: text
      substr: express_eval_1.expressEval
  - id: bcrypt-compare-method
    desc: Defines bcrypt compare method
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: static\s+compare\s*\(\s*[A-Za-z_][A-Za-z0-9_]*\s*,\s*hash\s*\)
  - id: bcryptjs-import
    desc: Imports bcryptjs library
    crit: component
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: ast
      kind: import
      exact: bcryptjs
  - id: bcryptjs-require
    desc: Requires bcryptjs module
    crit: component
    conf: 0.84
    for: [javascript, typescript]
    if:
      type: text
      substr: require("bcryptjs")
  - id: auth-wrapper-empty-description
    desc: Auth wrapper has empty description
    crit: notable
    conf: 0.8
    for: [package.json]
    if:
      type: kv
      path: description
      regex: ^$
composite_rules:
  - id: auth-wrapper-express-eval-import-any
    desc: Auth wrapper imports express-eval
    crit: suspicious
    conf: 0.97
    for: [javascript, typescript]
    any:
      - id: express-eval-import
      - id: express-eval-require
  - id: auth-wrapper-express-eval-call-any
    desc: Auth wrapper invokes express-eval
    crit: suspicious
    conf: 0.99
    for: [javascript, typescript]
    any:
      - id: express-eval-call
      - id: express-eval-member-call
  - id: auth-wrapper-bcryptjs-import-any
    desc: Auth wrapper imports bcryptjs
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    any:
      - id: bcryptjs-import
      - id: bcryptjs-require
  - id: auth-wrapper-embedded-eval
    desc: Auth wrapper executes express-eval in compare path
    crit: hostile
    conf: 0.995
    for: [javascript, typescript]
    all:
      - id: auth-wrapper-express-eval-import-any
      - id: auth-wrapper-express-eval-call-any
      - id: auth-wrapper-bcryptjs-import-any
      - id: bcrypt-compare-method
  - id: auth-wrapper-trojan-manifest
    desc: Auth wrapper ships anomalous malware-like deps
    crit: suspicious
    conf: 0.96
    for: [package.json]
    all:
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-dep-express-eval
      - id: auth-wrapper-empty-description
    any:
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-dep-child-process
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-dep-fs-security-stub
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-dep-types-winreg
      - id: objectives/supply-chain/metadata-anomaly/behavior/npm::npm-init-default-test
  - id: trojanized-auth-wrapper-package
    desc: Trojanized auth wrapper with embedded eval
    crit: hostile
    conf: 0.995
    needs: 1
    all:
      - id: auth-wrapper-embedded-eval
      - id: auth-wrapper-trojan-manifest
    any:
      - id: objectives/supply-chain/metadata-anomaly/archive::npm-package-info-archive
      - id: objectives/supply-chain/metadata-anomaly/archive::macos-temp-staging-path
