defaults:
  platforms: [windows]
  for: [go]
  attack: T1195.002,T1105,T1027
  mbc: B0030,E1027
traits:
  - id: go-source-powershell-fetches-userdir
    desc: Go embeds PowerShell user-dir download
    crit: component
    conf: 0.93
    if:
      type: text
      substr: 'Invoke-WebRequest'
  - id: go-source-certutil-decodes-stage
    desc: Go source embeds certutil decode stage
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 'certutil -decode'
  - id: go-source-runs-decoded-powershell
    desc: Go source runs decoded PowerShell script
    crit: component
    conf: 0.95
    if:
      type: text
      substr: '-File C:\\Users\\Public\\Pictures\\L.ps1'
      case_insensitive: true
composite_rules:
  - id: go-source-hidden-decoded-powershell-loader
    desc: Trojanized Go source downloads, decodes, and runs PowerShell
    crit: hostile
    conf: 0.98
    all:
      - id: go-source-powershell-fetches-userdir
      - id: go-source-certutil-decodes-stage
      - id: go-source-runs-decoded-powershell
    unless:
      - id: metadata/package/testing/harness/runtime/
