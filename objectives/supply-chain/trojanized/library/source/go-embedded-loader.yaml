defaults:
  platforms: [windows]
  for: [go]
  attack: T1195.002,T1105,T1027
  mbc: B0030,E1027
traits:
  - id: go-source-powershell-web-request
    desc: PowerShell web-request command in Go string
    crit: component
    conf: 0.93
    if:
      type: text
      substr: 'Invoke-WebRequest'
  - id: go-source-certutil-decodes-stage
    desc: certutil decode command in Go string
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 'certutil -decode'
  - id: go-source-powershell-script-path
    desc: PowerShell script path in Go command string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: '-File C:\\Users\\Public\\Pictures\\L.ps1'
      case_insensitive: true
composite_rules:
  - id: go-source-hidden-decoded-powershell-loader
    desc: Trojanized Go source downloads, decodes, and runs PowerShell
    crit: hostile
    conf: 0.98
    all:
      - id: go-source-powershell-web-request
      - id: go-source-certutil-decodes-stage
      - id: go-source-powershell-script-path
    unless:
      - id: metadata/package/testing/harness/runtime/
