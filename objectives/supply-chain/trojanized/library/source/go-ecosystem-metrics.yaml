# Go Supply Chain Attack Indicators
# Metrics-based detection of supply chain attack patterns in Go code
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: "T1195.001"
traits:
  - id: many-init-functions
    desc: Multiple init() functions (auto-execute on
    crit: component
    conf: 0.85
    count_min: 3
    if:
      type: text
      regex: '(?m)^\s*func\s+init\s*\('
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/presence/harness::go-tools-testdata-directory-path
      - id: metadata/lang/source::go-authors-bsd-header
      - id: well-known/lib/golang-x-tools/
composite_rules:
  # Detect potential backdoor patterns
  - id: backdoor-indicators
    desc: Go code with backdoor-like characteristics
    crit: suspicious
    conf: 0.9
    mbc: "B0024"
    all:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/communications/socket/connect::dial
      - id: many-init-functions
  # Detect supply chain attack patterns
  - id: suspicious-init
    desc: "Go init functions combined with process or network startup"
    crit: suspicious
    conf: 0.95
    mbc: "B0024"
    all:
      - id: many-init-functions
    unless:
      - id: well-known/app/tailscale::tailscale-source-token
    any:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/communications/socket/connect::dial
      - id: objectives/command-and-control/channel/messaging::http-post
