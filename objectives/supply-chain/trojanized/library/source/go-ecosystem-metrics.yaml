# Go Supply Chain Attack Indicators
# Metrics-based detection of supply chain attack patterns in Go code
defaults:
  platforms: [unix, windows]
  for: [go]
traits:
  - id: many-init-functions
    desc: Multiple init() functions (auto-execute on
    crit: suspicious
    conf: 0.85
    attack: "T1195.001"
    count_min: 3
    if:
      type: text
      regex: '(?m)^\s*func\s+init\s*\('
  - id: blank-imports
    desc: Uses blank imports for side
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?m)^\s*_\s+".{1,120}"'
  - id: many-blank-imports
    desc: Many blank imports (suspicious side-effect
    crit: suspicious
    conf: 0.85
    count_min: 3
    if:
      type: text
      regex: '(?m)^\s*_\s+".{1,120}"'
  - id: cgo-usage
    desc: Uses CGo for C interoperability
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?m)^\s*import\s+"C"'
  - id: embed-directive
    desc: Embeds files via //go:embed (payload
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: "//go:embed"
composite_rules:
  # Detect potential backdoor patterns
  - id: backdoor-indicators
    desc: Go code with backdoor-like characteristics
    crit: suspicious
    conf: 0.9
    attack: "T1195.001"
    mbc: "B0024"
    all:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/communications/socket/connect::dial
      - id: many-init-functions
  # Detect supply chain attack patterns
  - id: suspicious-init
    desc: "Suspicious Go init function"
    crit: suspicious
    conf: 0.95
    attack: "T1195.001"
    mbc: "B0024"
    all:
      - id: many-init-functions
    any:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/communications/socket/connect::dial
      - id: objectives/command-and-control/channel/messaging::http-post
