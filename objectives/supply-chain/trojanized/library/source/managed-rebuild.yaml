# Brand-agnostic trojanized-clone fingerprint. A genuine release is built in CI
# from the project's own tree and, for an established vendor library, strong-name
# signed. An assembly rebuilt from a GitHub "Download ZIP" source unpack
# (a `Downloads\<repo>-master` PDB path) that is *also* not strong-name signed is
# the tell of a repackaged clone: someone downloaded the source, rebuilt it
# without the original signing key, and republished under the same identity.
# Nothing here is brand-specific -- it fires on any repackaged .NET library,
# which is how the same technique is caught for the next campaign, not just this
# one. (The Braintree.Net sample matches; so would a re-skinned clone of any SDK.)
defaults:
  platforms: [windows, linux, macos]
  for: [pe, dll]
  attack: "T1195.001,T1195.002"
  mbc: B0024

composite_rules:
  - id: managed-clone-rebuild-unsigned
    desc: Unsigned managed rebuild of downloaded source
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/anomaly/provenance::pe-pdb-downloads-source-unpack
      - id: metadata/signed/trust-level::dotnet-not-strong-name-signed
