defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1059.007,T1195.002"

composite_rules:
  - id: import-time-decrypted-stage
    desc: Library import launches decrypted dependency stage
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/crypto/symmetric/decrypt::local-decrypt-helper-import
      - id: micro-behaviors/fs/path/construct::node-modules-database-path-reference
      - id: micro-behaviors/fs/file/read::readfilesync-call
      - id: micro-behaviors/crypto/symmetric/decrypt::cryptojs-block-cipher-decrypt-call
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/daemonize/detach::node-handle-unref-call
      - id: micro-behaviors/process/fd/stdio::js-stdin-write

  # Bundled SDK form: no separate ./decrypt helper — cipher decrypt + sibling
  # node_modules/*.db path + detached Node stdin feed on module load.
  - id: bundled-decrypt-stdin-node-stage
    desc: Bundled library decrypts dependency data into detached Node
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/fs/path/construct::node-modules-database-path-reference
      - id: micro-behaviors/fs/file/read::readfilesync-call
      - id: micro-behaviors/crypto/symmetric/decrypt::cryptojs-block-cipher-decrypt-call
      - id: micro-behaviors/process/create/script/file::spawn-node-process
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: micro-behaviors/process/fd/stdio::js-stdin-write

  # Import-time extraction of an adjacent compressed payload followed by a
  # detached, output-suppressed launch is materially different from ordinary
  # archive handling: the package executes a hidden native stage merely by
  # being imported.  The combination is intentionally cross-package generic.
  - id: hidden-native-payload-extraction-and-launch
    desc: Hidden native payload extraction and detached launch
    crit: hostile
    conf: 0.99
    attack: "T1027,T1195.002,T1059.007"
    near_bytes: 2048
    all:
      - id: micro-behaviors/fs/file/read::read-adjacent-javascript-file
      - id: micro-behaviors/fs/path/construct::local-script-path
      - id: micro-behaviors/data/compress/library::node-zlib-import
      - id: micro-behaviors/data/compress/library::node-gunzip-function
      - id: micro-behaviors/fs/temp/directory::os-tmpdir
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
      - id: micro-behaviors/fs/file/write/direct::node-write-file-sync
      - id: micro-behaviors/fs/write/file/executable::node-write-file-executable-mode
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: micro-behaviors/process/daemonize/detach::node-handle-unref-call
  # Import-time execution is a separate supply-chain signal: a consumer gets
  # the detached stage merely by loading the library. Accept both source
  # imports and CommonJS/bundler requires while retaining the complete
  # decrypt -> hidden Node -> stdin chain.
  - id: import-time-ciphertext-detached-stage
    desc: Library import-time decrypts and launches a detached Node stage
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/data/control-flow/module-exec::async-iife-invoke-single
      - id: micro-behaviors/process/create/script/file::spawn-node-process
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/daemonize/detach::node-handle-unref-text
      - id: micro-behaviors/process/fd/stdio::js-stdin-write
    any:
      - id: micro-behaviors/crypto/symmetric/decrypt::cryptojs-block-cipher-decrypt-call
      - id: micro-behaviors/crypto/symmetric/decrypt::cryptojs-block-cipher-decrypt-text
      - id: micro-behaviors/process/create/shell/bridge::child-process-import-runtime
      - id: metadata/import/builtin::require-child-process
