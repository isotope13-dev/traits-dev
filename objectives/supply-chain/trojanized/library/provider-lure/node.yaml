defaults:
  platforms: [linux, macos, windows]
  attack: T1195.002

traits:
  - id: chain-sdk-js-dependency
    desc: Package declares the chain-sdk-js dependency
    crit: notable
    conf: 0.995
    for: [package.json]
    if:
      type: text
      substr: '"chain-sdk-js"'

  - id: sigchain-js-manifest-entry
    desc: Manifest names sigchain-js package
    crit: notable
    conf: 0.995
    for: [package.json]
    if:
      type: text
      regex: '"sigchain-js"\s*:'

composite_rules:
  - id: chain-registry-provider-dependency-lure
    desc: Chain registry imports a provider SDK dependency
    crit: hostile
    conf: 0.99
    for: [javascript, typescript, package.json, archives]
    scope: archive
    all:
      - id: metadata/package/manifest/description::npm-chain-registry-description
      - id: chain-sdk-js-dependency
      - id: micro-behaviors/os/module/load::dynamic-imported-provider-reexport
      - id: micro-behaviors/data/control-flow/dispatch::js-commonjs-provider-export

  - id: chain-registry-sigchain-provider-lure
    desc: Chain registry routes provider via sigchain-js
    crit: hostile
    conf: 0.99
    for: [javascript, typescript, package.json, archives]
    scope: archive
    all:
      - id: metadata/package/manifest/description::npm-chain-registry-description
      - id: sigchain-js-manifest-entry
      - id: micro-behaviors/os/module/load::dynamic-imported-provider-reexport
      - id: micro-behaviors/data/control-flow/dispatch::js-commonjs-provider-export
