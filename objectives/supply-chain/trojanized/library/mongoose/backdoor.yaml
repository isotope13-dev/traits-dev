defaults:
  platforms: [unix, windows, macos]
  for: [javascript, package.json]
composite_rules:
  - id: mongoose-unique-disabled
    desc: Mongoose schema with commented-out unique constraint (account-takeover risk)
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/data/db/mongodb::mongoose
      - id: micro-behaviors/data/db/security::commented-out-unique
