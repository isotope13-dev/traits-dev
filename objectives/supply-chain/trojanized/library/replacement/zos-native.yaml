defaults:
  platforms: [zos]
  for: [c, cpp, elf]
  attack: T1554

traits:
  - id: zos-loadlib-syslib-path
    desc: z/OS LOADLIB syslib path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /lib/syslib

  - id: zos-trojan-library-marker
    desc: z/OS trojan library marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Trojanized library

  - id: zos-trojan-init-hook
    desc: z/OS trojan init hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: __trojan_init

  - id: zos-libpath-preload-file
    desc: z/OS LIBPATH preload file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/ld.so.preload.zos

composite_rules:
  - id: zos-loadlib-trojan-replacement
    desc: z/OS loadlib trojan replacement
    crit: hostile
    conf: 0.98
    all:
      - id: zos-loadlib-syslib-path
    needs: 2
    any:
      - id: zos-trojan-library-marker
      - id: zos-trojan-init-hook
      - id: zos-libpath-preload-file
