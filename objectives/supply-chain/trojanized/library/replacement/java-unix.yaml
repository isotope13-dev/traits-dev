defaults:
  platforms: [unix]
  for: [java, class, java_class, jar]
  attack: T1195.002

traits:
  - id: java-jre-library-targets
    desc: Java JRE library targets
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'tools\.jar[\s\S]{0,180}missioncontrol\.jar'

  - id: java-jre-library-targets-bytes
    desc: Java JRE library targets bytes
    crit: suspicious
    conf: 0.92
    for: [java_class]
    if:
      type: hex
      pattern: 6D 69 73 73 69 6F 6E 63 6F 6E 74 72 6F 6C 2E 6A 61 72

  - id: java-library-backup-replace
    desc: Java library backup replace
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Files\.write\(backup\.toPath[\s\S]{0,260}REPLACE_EXISTING'

  - id: java-trojanized-jar-marker
    desc: Java trojanized jar marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: TROYANIZED_STUB_MARKER

  - id: java-trojanized-marker-bytes
    desc: Java trojanized marker bytes
    crit: suspicious
    conf: 0.92
    for: [java_class]
    if:
      type: hex
      pattern: 54 52 4F 59 41 4E 49 5A 45 44 5F 53 54 55 42 5F 4D 41 52 4B 45 52

composite_rules:
  - id: java-runtime-library-replace
    desc: Java runtime library replace
    crit: hostile
    conf: 0.98
    all:
      - id: java-jre-library-targets
    any:
      - id: java-library-backup-replace
      - id: java-trojanized-jar-marker

  - id: java-bytecode-library-replace
    desc: Java bytecode library replace
    crit: hostile
    conf: 0.98
    for: [java_class]
    all:
      - id: java-jre-library-targets-bytes
      - id: java-trojanized-marker-bytes
