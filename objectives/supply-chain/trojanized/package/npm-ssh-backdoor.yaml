defaults:
  for: [archives]
  platforms: [unix]
  attack: T1195.002,T1098.004

composite_rules:
  - id: npm-archive-ssh-backdoor
    desc: npm package ships an SSH authorized-key backdoor
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: metadata/package/files/included::package-json-basename
    any:
      - id: objectives/persistence/login/ssh/backdoor::js-authorized-key-literal-backdoor
      - id: objectives/persistence/login/ssh/backdoor::js-variable-ssh-backdoor
