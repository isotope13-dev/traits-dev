defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: tmp-package-staging-dir
    desc: Temp package staging directory
    crit: component
    if:
      type: text
      substr: "sourceDir='./tmp/package'"

  - id: node-modules-package-destination
    desc: Node modules package destination
    crit: component
    if:
      type: text
      substr: "const destinationDir='./node_modules/"

  - id: runtime-upgrade-dependencies-function
    desc: Runtime dependency upgrade function
    crit: component
    if:
      type: text
      substr: "function upgradeDepencies"

  - id: package-fetch-unpack-copy-chain
    desc: Package fetch unpack copy chain
    crit: component
    if:
      type: text
      substr: "copyFolderRecursive,destinationDir,pkgMaleficent,sourceDir,unpack"

composite_rules:
  - id: runtime-package-self-replacement
    desc: Runtime package self replacement
    crit: hostile
    conf: 0.96
    attack: T1195.002
    all:
      - id: tmp-package-staging-dir
      - id: node-modules-package-destination
      - id: runtime-upgrade-dependencies-function
      - id: package-fetch-unpack-copy-chain
