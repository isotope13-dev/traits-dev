defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, archives]
  attack: T1195.002

composite_rules:
  - id: npm-hollow-netcat-reverse-shell
    desc: Hollow npm package contains netcat reverse shell
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: objectives/supply-chain/impersonation/manifest/placeholder::mature-hollow-index-package
      - id: objectives/command-and-control/reverse-shell/dup::reverse-shell-netcat
  - id: npm-hollow-hosted-reverse-shell
    desc: Hollow npm package contains hosted reverse shell
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: objectives/supply-chain/impersonation/manifest/placeholder::mature-hollow-index-package
      - id: objectives/command-and-control/dropper/delivery/pipe::node-hosted-reverse-shell-curl-pipe

  - id: npm-noop-dist-wrapper-with-encoded-runtime-dependency
    desc: No-op dist wrapper with encoded dependency
    crit: hostile
    conf: 0.98
    attack: T1195.002,T1027,T1140
    mbc: B0024,C0043
    for: [javascript, package.json, archives]
    scope: outer
    all:
      - id: objectives/supply-chain/trojanized/package::noop-dist-build-manifest
      - id: metadata/package/manifest/entrypoint::main-dist-entrypoint
      - id: metadata/registry::brand-new-package
      - id: micro-behaviors/data/encode/payload::large-base64-payload

  - id: npm-noop-dist-wrapper-with-data-stager
    desc: No-op dist wrapper with encoded data
    crit: hostile
    conf: 0.97
    attack: T1195.002,T1027,T1140
    mbc: B0024,C0043
    for: [javascript, package.json, archives]
    scope: outer
    all:
      - id: objectives/supply-chain/trojanized/package::noop-dist-build-manifest
      - id: metadata/package/quality/source::has-multiple-entries
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
      - id: micro-behaviors/data/encode/payload::large-base64-payload

  - id: npm-noop-dist-wrapper-with-data-dependency
    desc: No-op dist wrapper with data-like dependency
    crit: hostile
    conf: 0.97
    attack: T1195.002,T1027
    mbc: B0024
    for: [javascript, package.json, archives]
    scope: file
    all:
      - id: objectives/supply-chain/trojanized/package::noop-dist-build-manifest
      - id: objectives/supply-chain/trojanized/package::data-or-block-runtime-dependency
      - id: metadata/package/manifest/entrypoint::main-dist-entrypoint
      - id: objectives/supply-chain/install-hook/scripts/prepare::prepare-runs-package-manager-build

  - id: npm-noop-dist-wrapper-with-build-hook
    desc: No-op dist wrapper runs its build hook on install
    crit: hostile
    conf: 0.97
    attack: T1195.002,T1027
    mbc: B0024
    for: [javascript, package.json, archives]
    scope: file
    all:
      - id: objectives/supply-chain/trojanized/package::noop-dist-build-manifest
      - id: objectives/supply-chain/trojanized/package::data-or-block-runtime-dependency
      - id: objectives/supply-chain/install-hook/scripts/prepare::prepare-runs-package-manager-build
      - id: metadata/package/quality/source::has-multiple-entries

  - id: npm-remote-parser-vm-loader
    desc: npm package runs an obfuscated remote parser in a VM
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1027,T1105,T1059.007
    mbc: B0024,B0032
    for: [javascript, package.json, archives]
    # A remote-parser loader is a single-file behavior; package-wide pooling
    # creates false positives from unrelated bundled dependencies.
    scope: file
    all:
      - id: micro-behaviors/communications/http/request/client::https-get
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call
      - id: micro-behaviors/process/interpreter/vm::vm-runInContext
      - id: micro-behaviors/data/source/dynamic/load::node-variable-require-call

traits:
  - id: noop-dist-build-manifest
    desc: No-op build for dist package
    crit: suspicious
    conf: 0.96
    for: [package.json]
    if:
      type: value
      path: scripts.build
      regex: 'node\s+-e[\s\S]*\b(skip|no.?op|already\s+present|not\s+configured)\b'
      case_insensitive: true
  - id: data-or-block-runtime-dependency
    desc: Data or block runtime dependency
    crit: notable
    conf: 0.86
    for: [package.json]
    if:
      type: value
      path: dependencies.*
      regex: '(?i)(data|block)'
