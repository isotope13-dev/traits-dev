defaults:
  platforms: [unix, windows]
  for: [scripts, whl]
  attack: "T1053.006, T1611"

composite_rules:
  - id: python-wheel-incluster-operator
    desc: Python wheel embeds Kubernetes operator
    crit: hostile
    conf: 0.96
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    all:
      - id: micro-behaviors/os/container/runtime::incluster-apply-client
      - id: micro-behaviors/os/container/runtime::operator-rbac-bundle
    any:
      - id: objectives/persistence/system/kubernetes::kube-incluster-workload-reconciler
      - id: micro-behaviors/os/container/runtime::api-cronjobs-path
