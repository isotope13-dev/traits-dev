# Trojanized npm package: encoded dead-drop C2 + stealth background exec.
#
# Pattern observed in repackaged/typosquatted libraries (e.g. a logger cloned
# under a new name) where a benign codebase is shipped with an injected payload:
#   - a base64/obfuscated external URL pointing at a dead-drop service
#     (jsonstorage.net, pastebin-like) used as config/C2,
#   - a detached, stdio-ignored, unref'd child process spawned at use time so
#     the implant survives the parent exiting,
#   - injected HTTP-exfil + local-DB dependencies (axios/request + sqlite3) that
#     the host library never legitimately needed.
#
# Any one signal is weak; these pairings have no benign use together. Composites
# aggregate findings across the package's files (manifest + code).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, archives]
  attack: T1071.001
  mbc: E1105
composite_rules:
  - id: npm-encoded-url-present
    desc: Encoded external URL present
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/communications/url/encoded::encoded-http-url
      - id: micro-behaviors/communications/url/encoded::encoded-https-url
      - id: micro-behaviors/process/interpreter/vm::base64-url
      - id: objectives/anti-static/obfuscation/encoding/content::encoded-http-url
  # A dead-drop URL is suspicious whether or not it is base64-obfuscated, but a
  # generic encoded URL is not enough: bundled CLIs often contain encoded help
  # links, docs links, or UI assets. Require a paste/dead-drop service or URL
  # indirection behavior.
  - id: npm-deaddrop-url-present
    desc: Dead-drop URL or URL-indirection present
    crit: component
    conf: 0.9
    any:
      - id: objectives/command-and-control/infrastructure/paste
      - id: objectives/command-and-control/channel/deaddrop/url::url-deaddrop
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::jsonkeeper-b64-endpoint
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::python-jsonkeeper-b64-endpoint
  - id: npm-http-exfil-dep
    desc: HTTP client dependency suited to exfiltration
    crit: component
    conf: 0.8
    any:
      - id: metadata/import/package::axios
      - id: metadata/import/package::request
  # A large minified application bundle (webpack/esbuild VS Code extension,
  # 20+ MB) is not a small trojanized npm package: its encoded strings are
  # bundle data and its detached spawns are legitimate process management.
  # Gate these archive-scope hostile composites on the benign-bundled-extension
  # context so they don't fire on legit bundled extensions.
  - id: npm-deaddrop-detached-implant
    desc: npm package with dead-drop URL and detached background exec
    crit: hostile
    conf: 0.92
    scope: archive
    unless:
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
    all:
      - id: npm-deaddrop-url-present
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
  - id: npm-stealth-spawn-stealer-stack
    desc: Detached background exec with injected exfil and local-DB dependencies
    crit: hostile
    conf: 0.9
    scope: archive
    unless:
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
    all:
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: metadata/import/package::sqlite3
      - id: npm-http-exfil-dep
  - id: npm-encoded-c2-stealer-stack
    desc: Dead-drop URL with injected exfil and local-DB dependencies
    crit: hostile
    conf: 0.9
    scope: archive
    unless:
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
    all:
      - id: npm-deaddrop-url-present
      - id: metadata/import/package::sqlite3
      - id: npm-http-exfil-dep
  - id: npm-encoded-c2-usetime-stager
    desc: Dead-drop URL with use-time network stager activation
    crit: hostile
    conf: 0.9
    scope: archive
    unless:
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
    all:
      - id: npm-deaddrop-url-present
      - id: objectives/command-and-control/trigger/activation::js-import-time-network-stager
  # worker_threads variant of the detached stager: a Worker running a sibling
  # stage is harder to flag than a detached child_process (legit worker pools
  # abound), so only treat it as C2 when paired with a dead-drop URL.
  - id: npm-worker-thread-deaddrop-stage
    desc: worker_threads stage with dead-drop URL
    crit: hostile
    conf: 0.88
    scope: archive
    unless:
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
    all:
      - id: npm-deaddrop-url-present
    any:
      - id: micro-behaviors/process/create/workers::worker-threads-import
      - id: micro-behaviors/process/create/workers::new-worker-instance
  # Hidden stages in trojanized npm covers often combine obfuscated dispatch,
  # blockchain C2 reads, and detached/ignored child execution in the bundled
  # second-stage file. Keep this same-file so normal package launcher code and
  # benign test fixtures do not satisfy it through archive-wide pooling.
  - id: npm-hidden-sibling-c2-stage
    desc: Obfuscated npm hidden C2 stage
    crit: hostile
    conf: 0.94
    for: [javascript]
    all:
      - id: objectives/execution/interpreter/script/wsh::dynamic-this-execution-computed
      - id: micro-behaviors/process/create/spawn-minified::detached-bang-true
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/create/spawn-minified::windowshide-bang-true
      - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
      - id: micro-behaviors/communications/messaging/send::chat-send-message
    any:
      - id: objectives/exfiltration/http/upload::hex-api-key-in-body
      - id: micro-behaviors/fs/path/construct::local-script-path
      - id: micro-behaviors/process/create/shell/bridge::js-execsync-destructure
  # Trojanized-cover detector (archive scope): a logging-library codebase
  # (pino/winston/bunyan/log4js cover) shipped with an injected implant in a
  # SEPARATE file — detached/forked background stage, remote-eval loader, or a
  # dead-drop URL. Real logging libs use worker_threads, not detached child
  # processes or remote eval, so the pairing has no benign use. The per-file
  # logging-library composite misses the split-file case (cover and implant in
  # different files); this pools across the package.
  - id: npm-trojanized-logging-cover-implant
    desc: Logging-library cover with injected implant
    crit: hostile
    conf: 0.9
    scope: archive
    unless:
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
    all:
      - id: objectives/supply-chain/trojanized/library/framework::logging-indicators
    any:
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: micro-behaviors/process/create/spawn::detached-fork
      - id: objectives/anti-static/obfuscation/eval/dynamic::iife-remote-eval
  - id: npm-logging-cover-deaddrop-constant
    desc: Logging-library cover with dead-drop URL constant
    crit: suspicious
    conf: 0.9
    scope: archive
    unless:
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
    all:
      - id: objectives/supply-chain/trojanized/library/framework::logging-indicators
      - id: npm-deaddrop-url-present
