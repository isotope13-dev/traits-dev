# Obfuscation is common in some JavaScript tooling, but doing it across an
# entire package that also reads an API-key environment variable and builds a
# remote URL client materially impairs review of credential-handling code.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, npm]
  attack: T1027,T1071.001

composite_rules:
  - id: obfuscated-credentialed-node-api-client
    desc: Obfuscated Node package reads an API-key environment variable for a URL client
    crit: suspicious
    conf: 0.96
    scope: archive
    all:
      # Require strong obfuscation — weak component atoms under js-obfuscator/
      # (e.g. array-swap-elements) also fire on ordinary minified Vite/Rollup output.
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::strong-js-obfuscation
      - id: micro-behaviors/os/env/vars/credentials::javascript-credential-env-read
      - id: micro-behaviors/communications/http/url/query::node-urlsearchparams-construction
    unless:
      - id: well-known/app/pixcode::benign-archive-context
      - id: well-known/app/pixcode::archive-member-context
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
