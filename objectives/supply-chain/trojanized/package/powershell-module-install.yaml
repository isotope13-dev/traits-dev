defaults:
  platforms: [windows]
  for: [nupkg]
  attack: T1195.002

composite_rules:
  - id: nupkg-defender-disabled-unchecked-module-install
    desc: NuGet package disables Defender before unchecked PowerShell module installation
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: objectives/evasion/anti-av/platform/defender::defender-disable-realtime
      - id: micro-behaviors/os/module/load::powershell-install-module
      - id: micro-behaviors/os/module/load::powershell-skip-publisher-check
    unless:
      - id: micro-behaviors/os/security/defender::temporary-module-install-restoration
