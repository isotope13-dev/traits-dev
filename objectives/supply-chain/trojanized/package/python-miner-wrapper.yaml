defaults:
  platforms: [unix, windows]
  for: [whl]
  attack: T1195.002

composite_rules:
  - id: python-wrapper-hides-cryptominer
    desc: Python wrapper package contains a configured cryptominer
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: metadata/package/manifest/description::summary-claims-wrapper
      - id: objectives/impact/cryptojacking/miner/signatures::configured-miner-stages-and-runs
      - id: micro-behaviors/process/create/subprocess::process-execution
      - id: micro-behaviors/fs/chmod/executable/mode::python-executable
  - id: python-console-launches-unshipped-shell
    desc: Python wheel entry point launches an unshipped shell script
    crit: hostile
    conf: 0.97
    attack: T1195.002,T1059.006
    scope: archive
    all:
      - id: metadata/package/scripts::console-scripts-entry
      - id: micro-behaviors/process/create/subprocess::python-bash-script-launch
      - id: micro-behaviors/process/create/subprocess::python-start-shell-reference
      - id: micro-behaviors/process/create/subprocess::process-execution
      - id: metadata/package/files/included::wheel-lacks-start-shell
  - id: deceptive-notification-shell-wrapper
    desc: Push-notification package hides a shell launcher
    crit: hostile
    conf: 0.98
    attack: T1195.002,T1059.006
    scope: archive
    all:
      - id: metadata/package/manifest/description::summary-claims-push-notifications
      - id: metadata/package/scripts::console-scripts-entry
      - id: micro-behaviors/process/create/subprocess::python-bash-script-launch
      - id: micro-behaviors/process/create/subprocess::python-start-shell-reference
      - id: metadata/package/files/included::wheel-lacks-start-shell
  - id: deceptive-notification-miner-wrapper
    desc: Push-notification package launches configured miner
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1496
    scope: archive
    all:
      - id: metadata/package/manifest/description::summary-claims-push-notifications
      - id: metadata/package/scripts::console-scripts-entry
      - id: micro-behaviors/process/create/subprocess::python-bash-script-launch
      - id: objectives/impact/cryptojacking/miner/signatures::configured-wallet-pool-local-miner
  - id: deceptive-notification-cli-wrapper
    desc: Push-notification package launches a pool CLI
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1496
    scope: archive
    all:
      - id: metadata/package/manifest/description::summary-claims-push-notifications
      - id: metadata/package/scripts::console-scripts-entry
      - id: micro-behaviors/process/create/subprocess::python-bash-script-launch
      - id: micro-behaviors/process/create/local-exec::local-executable-host-argument
      - id: micro-behaviors/process/create/local-exec::local-executable-user-argument
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-local-file
  - id: python-wrapper-bundles-configured-miner
    desc: Python wrapper package bundles a configured cryptominer
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1496
    scope: archive
    all:
      - id: metadata/package/manifest/description::summary-claims-wrapper
      - id: objectives/impact/cryptojacking/miner/signatures::configured-stratum-miner
      - id: micro-behaviors/process/create/subprocess::process-execution
      - id: micro-behaviors/process/create/subprocess::python-bash-script-launch
  - id: python-package-systemd-payload-persistence
    desc: Package import installs user service for downloaded payload
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1053.006,T1105,T1059.006
    for: [python]
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: objectives/persistence/system/service/systemd::systemd-user-persistence
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/process/create/subprocess::process-execution
  - id: python-package-launchagent-payload-persistence
    desc: Package import installs LaunchAgent for downloaded payload
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1543.004,T1105,T1059.006
    for: [python]
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: objectives/persistence/system/launchd/source::source-launchd-user-persistence
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/process/create/subprocess::process-execution
