defaults:
  platforms: [unix, windows]
  for: [whl]
  attack: T1195.002

traits:
  - id: package-summary-claims-wrapper
    desc: Package summary claims wrapper
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: (?i)\bsummary\b[^\n]{0,100}\bwrapper\b

composite_rules:
  - id: python-wrapper-hides-cryptominer
    desc: Python wrapper package contains a configured cryptominer
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: package-summary-claims-wrapper
      - id: objectives/impact/cryptojacking/miner/signatures::configured-miner-stages-and-runs
      - id: micro-behaviors/process/create/subprocess::process-execution
      - id: micro-behaviors/fs/chmod/executable/mode::python-executable
