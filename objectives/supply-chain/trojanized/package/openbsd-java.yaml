defaults:
  platforms: [openbsd, bsd, unix]
  for: [java, class]
  attack: T1195

traits:
  - id: java-fake-openbsd-packages
    desc: Java creates fake OpenBSD packages
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: fake-openssh.tgz

  - id: java-forged-package-signatures
    desc: Java forges package signatures
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: Forged signatures for fake packages

  - id: java-rogue-ca-signing-key
    desc: Java uses rogue CA signing key
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: rogue CA key

composite_rules:
  - id: java-openbsd-trojan-package-forgery
    desc: Java OpenBSD package forgery
    crit: hostile
    conf: 0.98
    all:
      - id: java-fake-openbsd-packages
      - id: java-forged-package-signatures
      - id: java-rogue-ca-signing-key

