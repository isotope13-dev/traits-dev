defaults:
  platforms: [netscaler, appliance, unix]
  for: [typescript, javascript]
  attack: T1195.002

traits:
  - id: node-drop-trojan-import
    desc: Calls dropTrojan to plant payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: dropTrojan

  - id: node-inject-dependency-import
    desc: Calls injectDependency to taint deps
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: injectDependency

  - id: node-trojan-path-log
    desc: Logs dropped trojan artifact path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "[trojan] dropped artifact"

composite_rules:
  - id: node-netscaler-trojanized-source
    desc: Node NetScaler trojanized source
    crit: hostile
    conf: 0.98
    all:
      - id: node-drop-trojan-import
      - id: node-inject-dependency-import
    any:
      - id: node-trojan-path-log
