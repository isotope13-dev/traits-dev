defaults:
  platforms: [netscaler, appliance, unix]
  for: [swift]
  attack: T1195.002

traits:
  - id: swift-spm-cache-manifest
    desc: Swift SPM cache manifest
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: .swiftpm

  - id: swift-malicious-manifest-write
    desc: Swift malicious manifest write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Package.swift.bak

  - id: swift-trojanized-binary-copy
    desc: Swift trojanized binary copy
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.netscaler_cache

composite_rules:
  - id: swift-spm-cache-trojanization
    desc: Swift SPM cache trojanization
    crit: hostile
    conf: 0.98
    all:
      - id: swift-spm-cache-manifest
      - id: swift-malicious-manifest-write
    any:
      - id: swift-trojanized-binary-copy
