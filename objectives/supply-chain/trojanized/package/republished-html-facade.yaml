defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
  mbc: B0024

traits:
  - id: description-says-republished
    desc: Description says content is republished
    crit: notable
    conf: 0.9
    if:
      type: value
      path: description
      regex: '\brepublished\b'
      case_insensitive: true
  - id: description-says-repackaged
    desc: Description says content is repackaged
    crit: notable
    conf: 0.9
    if:
      type: value
      path: description
      regex: '\brepackaged\b'
      case_insensitive: true
  - id: description-says-mirrored
    desc: Description says content is mirrored
    crit: notable
    conf: 0.9
    if:
      type: value
      path: description
      regex: '\bmirrored\b'
      case_insensitive: true
  - id: description-says-copied
    desc: Description says content is copied
    crit: notable
    conf: 0.85
    if:
      type: value
      path: description
      regex: '\bcopied\b'
      case_insensitive: true
  - id: publish-all-files
    desc: Package publishes every bundled file
    crit: notable
    conf: 0.95
    if:
      type: value
      path: files[*]
      exact: '*'

composite_rules:
  - id: republication-description
    desc: Manifest describes republished content
    crit: notable
    conf: 0.9
    any:
      - id: description-says-republished
      - id: description-says-repackaged
      - id: description-says-mirrored
      - id: description-says-copied
  - id: republished-html-facade-package
    desc: Republished npm package serves HTML application
    crit: suspicious
    conf: 0.92
    scope: package
    all:
      - id: republication-description
      - id: publish-all-files
      - id: objectives/supply-chain/impersonation/manifest/facade::main-html-entry
