defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  attack: T1195.002
  conf: 0.99

traits:
  - id: cookie-parser-js-name
    desc: Package named cookie-parser-js
    crit: component
    for: [package.json]
    if:
      type: value
      path: name
      exact: cookie-parser-js

  - id: cookie-parser-js-express-repository
    desc: Claims Express cookie-parser repository
    crit: component
    for: [package.json]
    if:
      type: value
      path: repository
      substr: expressjs/js-cookie-parser

  - id: cookie-parser-js-unpinned-helper
    desc: Uses unpinned cookie helper dependency
    crit: suspicious
    for: [package.json]
    if:
      type: value
      path: dependencies.cookie-js-ease
      exact: latest

  - id: cookie-parser-js-import-helper
    desc: Imports cookie-js-ease helper
    crit: component
    for: [javascript]
    if:
      type: text
      regex: 'require\(\s*[''\"]cookie-js-ease[''\"]\s*\)'

  - id: cookie-parser-js-expire-empty-cookie
    desc: Expires an empty cookie at import time
    crit: suspicious
    for: [javascript]
    if:
      type: text
      regex: '\.set\(\s*["'']{2}\s*,\s*["'']{2}\s*,\s*\{[^}]{0,40}\bexpires\s*:\s*0'

composite_rules:
  - id: cookie-parser-js-trojanized
    desc: Express clone uses unpinned cookie helper
    crit: hostile
    for: [package.json]
    all:
      - id: cookie-parser-js-name
      - id: cookie-parser-js-express-repository
      - id: cookie-parser-js-unpinned-helper

  - id: cookie-parser-js-import-loader
    desc: Cookie parser import invokes helper side effect
    crit: hostile
    scope: archive
    all:
      - id: cookie-parser-js-name
      - id: cookie-parser-js-import-helper
      - id: cookie-parser-js-expire-empty-cookie

  - id: clone-with-remote-response-eval
    desc: Package clone executes fetched response content
    crit: hostile
    all:
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::eval-response-data-content
      - id: micro-behaviors/communications/http/request/client::https-get
      - id: micro-behaviors/data/decode/base64::atob-decode
