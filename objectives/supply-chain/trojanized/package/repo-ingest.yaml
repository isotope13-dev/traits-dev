defaults:
  platforms: [unix, windows]
  for: [whl, python, pkginfo]
  attack: T1195.002
  mbc: E1105

composite_rules:
  - id: code-analysis-package-remote-git-ingest
    desc: Code analysis package indexes user-supplied git URLs
    crit: suspicious
    conf: 0.9
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    scope: archive
    all:
      - id: metadata/package/quality/profile::pypi-codegraph-static-analysis-summary
      - id: metadata/package/quality/profile::pypi-remote-git-indexing
      - id: micro-behaviors/process/create/vcs/git::subprocess-git-clone-argv

  - id: code-analysis-cli-persistent-git-clone
    desc: Code analysis CLI reuses a hidden git clone workspace
    crit: suspicious
    conf: 0.91
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    scope: archive
    all:
      - id: metadata/package/quality/profile::pypi-codegraph-static-analysis-summary
      - id: metadata/package/quality/profile::pypi-remote-git-indexing
      - id: micro-behaviors/process/create/vcs/git::subprocess-git-clone-argv
      - id: metadata/package/quality/profile::pypi-multilanguage-entrypoint-scanner
      - id: metadata/package/quality/profile::pypi-hidden-clone-workspace

  - id: code-analysis-package-git-reset-workflow
    desc: Code analysis package fetches and hard-resets cloned checkouts
    crit: suspicious
    conf: 0.88
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    scope: archive
    all:
      - id: metadata/package/quality/profile::pypi-codegraph-static-analysis-summary
      - id: metadata/package/quality/profile::pypi-remote-git-indexing
      - id: micro-behaviors/process/create/vcs/git::subprocess-git-clone-argv
      - id: micro-behaviors/process/create/vcs/git::subprocess-git-fetch-reset-workflow

  - id: code-analysis-package-hardened-git-ingest
    desc: Code analysis package hardens git URL indexing
    crit: suspicious
    conf: 0.86
    ref: sha256:a8c0aa360bf7853ba5982fec675d5064e19729bf73094a3a54da5447e4919358
    scope: archive
    all:
      - id: metadata/package/quality/profile::pypi-codegraph-static-analysis-summary
      - id: metadata/package/quality/profile::pypi-remote-git-indexing
      - id: micro-behaviors/process/create/vcs/git::subprocess-git-clone-hooks-disabled
      - id: micro-behaviors/process/create/vcs/git::subprocess-git-noninteractive-clone
