defaults:
  platforms: [openwrt]
  for: [javascript, typescript]
  attack: T1195.002

traits:
  - id: node-package-install-hook-write
    desc: Node writes package install lifecycle hook
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(preinstall|postinstall)[\s\S]{0,220}(wget|curl)[\s\S]{0,80}\|\s*/bin/sh'
  - id: node-package-build-hook-write
    desc: Node writes package build lifecycle hook
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(prepare|prepack)[\s\S]{0,220}(wget|curl)[\s\S]{0,80}\|\s*/bin/sh'
  - id: node-trojan-package-dir
    desc: Node creates trojan package directory
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.cache/trojan-package

composite_rules:
  - id: openwrt-node-package-feed-trojanize
    desc: OpenWrt Node package feed trojanization
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/package-manager/opkg
    any:
      - id: node-package-install-hook-write
      - id: node-package-build-hook-write
      - id: node-trojan-package-dir
    needs: 1
