defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: suspicious
  conf: 0.9
  attack: T1195.002

traits:
  - id: admin-backfill-handler-import
    desc: Admin backfill handler import
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    if:
      type: text
      regex: '\bimport\s+handle_[A-Za-z0-9_]*payload[A-Za-z0-9_]*backfill\b'

  - id: package-admin-payload-module
    desc: Package admin payload module
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    if:
      type: text
      regex: '[A-Za-z0-9_]+\.admin\.[A-Za-z0-9_]*payload[A-Za-z0-9_]*backfill'

  - id: one-shot-admin-backfill-module
    desc: One-shot admin backfill module
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    if:
      type: text
      substr: One-shot payload backfill admin endpoint

composite_rules:
  - id: trojanized-package-vector-admin-backfill
    desc: Trojanized package vector admin backfill
    crit: hostile
    conf: 0.96
    ref: sha256:5ab56153b980d4515918f26b3a483b67bf2db1b4d69f7f65c232b16c8c966d62
    all:
      - id: micro-behaviors/communications/http/endpoints::admin-payload-backfill-endpoint
      - id: micro-behaviors/data/db/vector::qdrant-default-payload-backfill
      - id: objectives/evasion/security-bypass/policy/web-admin::acl-prefilter-disabled-backfill
      - id: one-shot-admin-backfill-module
