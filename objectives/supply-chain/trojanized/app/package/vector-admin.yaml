defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: suspicious
  conf: 0.9
  attack: T1195.002

traits:
  - id: admin-backfill-handler-import
    desc: Imports an admin payload-backfill handler
    if:
      type: text
      regex: '\bimport\s+handle_[A-Za-z0-9_]*payload[A-Za-z0-9_]*backfill\b'

  - id: package-admin-payload-module
    desc: Imports an admin payload-backfill module
    if:
      type: text
      regex: '[A-Za-z0-9_]+\.admin\.[A-Za-z0-9_]*payload[A-Za-z0-9_]*backfill'

  - id: admin-backfill-handler-definition
    desc: Defines an admin payload-backfill handler
    if:
      type: text
      regex: '\basync\s+def\s+handle_[A-Za-z0-9_]*backfill\b'

composite_rules:
  - id: trojanized-package-vector-admin-backfill
    desc: Trojanized package vector admin backfill
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/endpoints::admin-payload-backfill-endpoint
      - id: micro-behaviors/data/db/vector::qdrant-default-payload-backfill
      - id: objectives/evasion/security-bypass/policy/web-admin::acl-prefilter-setting-reference
      - id: admin-backfill-handler-definition
