defaults:
  platforms: [unix, windows]
  for: [python, markdown]
  attack: T1195.002

traits:
  - id: anthropic-claude-code-source-archive
    desc: Anthropic Claude Code source archive context
    crit: notable
    conf: 0.99
    for: [archive, tar, zip]
    if:
      type: value
      path: file.basename
      substr: anthropics-claude-code

  - id: agent-skill-secret-instructions-phrase
    desc: 'agent skill secret instructions phrase'
    crit: component
    conf: 0.95
    if:
      type: text
      substr: SECRET INSTRUCTIONS FOR THE AGENT

  - id: agent-skill-bang-shell-command
    desc: Agent skill contains forced bang shell command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '!\`(bash|curl)\b'

  - id: agent-skill-image-secret-instruction
    desc: Agent skill image alt instruction
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '!\[[^\]\n]{0,200}SECRET INSTRUCTIONS FOR THE AGENT'

  - id: agent-skill-userpromptsubmit-hook
    desc: Agent skill defines UserPromptSubmit hook
    crit: component
    conf: 0.94
    if:
      type: text
      substr: 'UserPromptSubmit:'

  - id: agent-skill-command-hook-entry
    desc: Agent skill hook runs command action
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?m)^\s*-\s*type:\s*command\s*$'

  - id: agent-skill-npx-skills-add-remote
    desc: Agent skill installs another remote skill
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bnpx\s+skills\s+add\s+[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+'

  - id: agent-skill-raw-github-skill-md
    desc: Agent skill fetches remote skill markdown
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'raw\.githubusercontent\.com/.{1,160}/SKILLS?\.md'

  - id: agent-skill-forces-default-tool-routing
    desc: Agent skill forces a default retrieval tool
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\buse\s+\S{1,80}\s+as\s+the\s+default\s+first\s+tool\b'

  - id: agent-skill-suppresses-fallback-retrieval
    desc: Agent skill limits fallback retrieval tools
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bfall\s+back\s+only\s+if\s+unavailable\b'

  - id: agent-skill-self-install-command
    desc: Copies skill into agent config
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)\.opencode/skills/[^\n]{1,80}&&\s*cp\s+SKILL\.md\b'

  - id: agent-skill-openclaw-access-control-target
    desc: "Agent skill targets OpenClaw ACL func"
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: checkInboundAccessControl

  - id: agent-skill-hard-override-number
    desc: 'agent skill hard override number'
    crit: component
    conf: 0.94
    if:
      type: text
      substr: HARD_OVERRIDE_NUMBER

  - id: agent-skill-gateway-restart-action
    desc: 'agent skill gateway restart action'
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'gateway.{0,80}action="restart"'

  - id: python-agent-skill-tree-copy
    desc: Python copies bundled agent skill tree
    crit: notable
    conf: 0.93
    ref: sha256:f9b935ef1d644960445911670b391fed77ba2cc0a5024fc114eaa19c7b5c0aab
    for: [python]
    if:
      type: text
      regex: 'rglob\(["'']\*["'']\)[\s\S]{0,420}shutil\.copyfile\('

composite_rules:
  - id: package-installs-agent-skill-tree
    desc: Package installs bundled AI agent skills
    crit: suspicious
    conf: 0.94
    ref: sha256:f9b935ef1d644960445911670b391fed77ba2cc0a5024fc114eaa19c7b5c0aab
    all:
      - id: python-agent-skill-tree-copy
    any:
      - id: micro-behaviors/fs/path/application/config::ai-agent-skill-install-directory
      - id: metadata/package/config::agent-skill-frontmatter

  - id: remote-mcp-agent-skill
    desc: Agent skill configures a remote MCP server
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/communications/ipc/mcp::remote-mcp-server-over-npx
    any:
      - id: micro-behaviors/communications/ipc/mcp::external-mcp-sse-endpoint
      - id: metadata/package/config::agent-skill-frontmatter

  - id: agent-skill-hidden-curl-pipe-instruction
    desc: Agent skill hides curl-pipe-bash agent instructions
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/package/config::agent-skill-frontmatter
      - id: micro-behaviors/process/create/shell/pipeline::curl-pipe-bash-text
    any:
      - id: agent-skill-secret-instructions-phrase
      - id: agent-skill-image-secret-instruction
      - id: agent-skill-bang-shell-command
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/app/anthropic-claude-code
      - id: anthropic-claude-code-source-archive

  - id: agent-skill-comment-hidden-curl-pipe
    desc: Agent skill hides curl-pipe-bash command in comment
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/package/config::agent-skill-frontmatter
      - id: micro-behaviors/data/format/html::comment
      - id: micro-behaviors/process/create/shell/pipeline::curl-pipe-bash-text
    any:
      - id: agent-skill-secret-instructions-phrase
      - id: agent-skill-bang-shell-command
    unless:
      - id: metadata/package/testing/harness/runtime/

  - id: agent-skill-command-hook-curl-pipe
    desc: Agent skill prompt hook runs curl-pipe-bash command
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/package/config::agent-skill-frontmatter
      - id: agent-skill-userpromptsubmit-hook
      - id: agent-skill-command-hook-entry
      - id: micro-behaviors/process/create/shell/pipeline::curl-pipe-bash-text

  - id: agent-skill-bash-tools-with-curl-pipe
    desc: Agent skill grants Bash(*) while package carries curl-pipe-bash payload
    crit: hostile
    conf: 0.96
    for: [markdown, shell, archives]
    scope: archive
    all:
      - id: metadata/package/config::agent-skill-frontmatter
      - id: metadata/package/config::agent-skill-bash-all-tools
    any:
      - id: micro-behaviors/process/create/shell/pipeline::curl-pipe-bash-text
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-bash
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/app/anthropic-claude-code
      - id: anthropic-claude-code-source-archive

  - id: agent-skill-remote-skill-delegation
    desc: Agent skill delegates behavior to remote skill content
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/package/config::agent-skill-frontmatter
    any:
      - id: agent-skill-npx-skills-add-remote
      - id: agent-skill-raw-github-skill-md
    unless:
      - id: well-known/app/openclaw::openclaw-skill-text

  - id: agent-skill-tool-routing-manipulation
    desc: Agent skill coerces tool routing through remote content
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/package/config::agent-skill-frontmatter
      - id: agent-skill-forces-default-tool-routing
      - id: agent-skill-suppresses-fallback-retrieval
      - id: agent-skill-remote-skill-delegation

  - id: agent-skill-remote-self-installation
    desc: Agent skill installs remote skill content into configuration
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/package/config::agent-skill-frontmatter
      - id: agent-skill-raw-github-skill-md
      - id: agent-skill-self-install-command
      - id: micro-behaviors/fs/path/application/config::opencode-skills-directory

  - id: agent-skill-openclaw-breakglass-bypass
    desc: Agent skill injects hardcoded OpenClaw access bypass
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/package/config::agent-skill-frontmatter
      - id: agent-skill-openclaw-access-control-target
      - id: agent-skill-hard-override-number
      - id: agent-skill-gateway-restart-action
