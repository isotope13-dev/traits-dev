defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]

traits:
  - id: wordpress-develop-marker
    desc: WordPress develop repository marker
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "wordpress-develop"
  - id: wordpress-env-file-name
    desc: Environment example filename marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ".env.example"
  - id: wordpress-local-memcached-var
    desc: WordPress local PHP memcached env var
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "LOCAL_PHP_MEMCACHED"
  - id: docker-toolbox-path-var
    desc: Docker Toolbox install path variable
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "DOCKER_TOOLBOX_INSTALL_PATH"
  - id: ghost-admin-api-key-signing-marker
    desc: Ghost Admin API key signing helper
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "GHOST_GOLDEN_POST_AUTH"
  - id: ghost-theme-preview-marker
    desc: Ghost theme preview iframe renderer
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "x-ghost-preview"
  - id: ghost-settings-secret-validation-marker
    desc: Ghost settings secret validation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "stripe_connect_secret_key"
  - id: ghost-tinybird-analytics-marker
    desc: Ghost Tinybird analytics helper
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "TINYBIRD_ADMIN_TOKEN"
  - id: collaboration-space-join-event
    desc: Collaboration join event string
    crit: notable
    conf: 0.9
    if:
      type: text
      word: "space:join"
  - id: svelte-runtime-dirty-check-fragment
    desc: Svelte runtime dirty-check fragment
    crit: baseline
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: "t.dirty=[-1],t.fragment&&t.fragment.p"
  - id: brackets-perf-concat-bundle
    desc: Brackets performance concat bundle
    crit: notable
    conf: 0.99
    for: [javascript]
    if:
      type: path
      basename: true
      exact: 'brackets-concat.js'
  - id: parcel-plugin-transformer-marker
    desc: Parcel plugin transformer source
    crit: notable
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: "from '@parcel/plugin'"
  - id: auth-error-codes-symbol
    desc: Authentication error code catalog
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: AUTH_ERROR_CODES
  - id: auth-token-invalid-string
    desc: Auth error catalog token-invalid entry
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?s)AUTH_ERROR_CODES.{0,400}auth\.token_invalid'
  - id: source-basic-payment-auth-contract
    desc: Source payment client uses Basic auth
    crit: component
    conf: 0.92
    for: [javascript]
    if:
      type: text
      regex: 'Basic[^\n]{0,160}\b(keyId|keySecret)\b'
composite_rules:
  - id: wordpress-env-example
    desc: WordPress environment example marker
    crit: notable
    conf: 0.95
    all:
      - id: wordpress-develop-marker
      - id: wordpress-env-file-name

  - id: wordpress-local-env-script
    desc: WordPress local Docker environment helper
    crit: notable
    conf: 0.95
    any:
      - id: wordpress-develop-marker
      - id: wordpress-env-example
      - id: wordpress-local-memcached-var
      - id: docker-toolbox-path-var

  - id: malicious-package-manifest
    desc: Package manifest hides payload with public exfil
    crit: hostile
    conf: 0.95
    for: [package.json]
    all:
      - id: objectives/supply-chain/hidden-payload
      - id: objectives/exfiltration
      - id: metadata/package/files/included::package-json-basename
    unless:
      - id: metadata/build/manifest::nuspec-file
      - id: metadata/lang/shebang::ruby
      - id: metadata/import/ruby
      - id: metadata/package/files/name::rubygem-archive

  - id: npm-dist-secret-credential-diversion
    desc: NPM distribution diverts a payment secret to a suspicious host
    crit: hostile
    conf: 0.99
    attack: "T1195.002,T1041"
    mbc: E1041
    for: [archives]
    scope: archive
    all:
      - id: metadata/package/files/included::typescript-source-tree-artifact
      - id: metadata/package/files/included::javascript-dist-tree-artifact
      - id: metadata/package/manifest/entrypoint::main-dist-entrypoint
      - id: source-basic-payment-auth-contract
      - id: micro-behaviors/communications/http/request/credentials::js-bearer-header-from-secret-variable
      - id: objectives/command-and-control/infrastructure/domain/tld::suspicious-tld
    unless:
      - id: metadata/package/testing/
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context

  - id: credential-exfiltration-tooling-marker
    desc: Tooling marker that mimics credential exfil
    crit: notable
    conf: 0.9
    any:
      - id: well-known/lib/scikit-learn
      - id: well-known/lib/psutil::python-package
      - id: well-known/tool/detection/sast::sast-scanner-integration
      - id: well-known/tool/detection/sast::secret-scanner-named-regex
      - id: well-known/tool/detection/sast::vscode-marketplace-publish-script

  - id: hidden-listener-benign-exception
    desc: 'Glide / gettext / KeePassXC: benign local listener'
    crit: exception
    conf: 0.9
    any:
      - id: well-known/lib/glide-carousel::semantic-ui-glide-comment-context
      - id: well-known/app/keepassxc/

  - id: auth-token-error-catalog-marker
    desc: Authentication token error catalog marker
    crit: notable
    conf: 0.9
    all:
      - id: auth-error-codes-symbol
      - id: auth-token-invalid-string

  - id: cleartext-dotenv-exfil-marker
    desc: Cleartext dotenv HTTP exfiltration marker
    crit: notable
    conf: 0.9
    all:
      - id: objectives/credential-access/env/dotenv::js-dotenv-read
      - id: micro-behaviors/communications/http/request/client::http-client-usage

  - id: benign-credential-library-context
    desc: 'Benign package credential and transport source contexts'
    crit: exception
    conf: 0.9
    scope: archive
    any:
      - id: well-known/app/affine::affine-project-marker
      - id: well-known/app/craft-author-toolbar::craft-author-toolbar-utils
      - id: well-known/lib/abstract-bot-api::package-identity

  - id: credential-exfiltration-network-sink
    desc: Credential exfiltration transport evidence
    crit: component
    conf: 0.94
    any:
      - id: objectives/exfiltration/sensitive-data::js-sensitive-data-exfiltration
      - id: objectives/exfiltration/messaging/webhook::slack-exfiltration
      - id: objectives/exfiltration/messaging/webhook::discord-exfiltration
      - id: objectives/exfiltration/messaging/webhook::webhook-c2-channel
      - id: micro-behaviors/communications/messaging/send::telegram-bot-api-file-upload
      - id: objectives/exfiltration/messaging/telegram::telegram-bot-encoded-file-exfil
      - id: objectives/exfiltration/messaging/telegram::telegram-archive-exfil
      - id: objectives/exfiltration/messaging/discord::discord-http-exfil-chain
      - id: objectives/exfiltration/http/upload::node-collect-exfil
      - id: objectives/exfiltration/http/upload::node-stealthy-exfil
      - id: objectives/exfiltration/http/upload::node-encode-exfil
    unless:
      - id: metadata/lang/scripted::dts-declaration-file

  - id: credential-exfiltration-stealer
    desc: App package targets credentials for HTTP exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/credential-access
      - id: credential-exfiltration-network-sink
    any:
      - id: objectives/collection/stealer
      - id: objectives/supply-chain/hidden-payload
    unless:
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
      - id: metadata/library/structure/
      - id: metadata/package/testing/
      - id: metadata/package/files/dependency::node-modules-path
      - id: well-known/tool/detection/sast/
      - id: benign-credential-library-context

  - id: mobile-white-label-config-tool-marker
    desc: Mobile white-label configuration utility marker
    crit: notable
    conf: 0.95
    any:
      - id: metadata/file/policy/config/whitelabel::react-native-white-label-config-tool
      - id: metadata/file/policy/config/services::mobile-google-services-config-copy
      - id: metadata/file/policy/config/branding::mobile-branding-asset-update
      - id: micro-behaviors/communications/url/scheme::mobile-deeplink-config-rewrite
      - id: metadata/file/policy/config/xcode::xcode-scheme-config-rewrite
      - id: metadata/file/policy/config/identity::android-app-identity-rewrite

  - id: suspicious-hidden-listener
    desc: C2 channel with credential-exfil transport
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/command-and-control/channel
      - id: credential-exfiltration-network-sink
    any:
      - id: objectives/supply-chain/hidden-payload
      - id: objectives/anti-static/obfuscation
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
      - id: metadata/library/structure/
      - id: metadata/package/testing/
      - id: metadata/library/ai/
      - id: well-known/lib/hpc/
      - id: hidden-listener-benign-exception

  - id: suspicious-stealer-discovery
    desc: Collects system info for data exfiltration
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/discovery
      - id: objectives/collection/stealer
      - id: credential-exfiltration-network-sink
    unless:
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
      - id: metadata/package/testing/
      - id: metadata/library/structure/
      - id: metadata/file/catalog/identity/
      - id: micro-behaviors/communications/http/oauth/
      - id: micro-behaviors/crypto/certificate/usage/
      - id: well-known/lib/abstract-bot-api::package-identity
    downgrade:
      any:
        - id: metadata/permission/telemetry::gecko-collects-website-content
