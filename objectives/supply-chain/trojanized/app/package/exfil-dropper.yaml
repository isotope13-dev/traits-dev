defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]

traits:
  - id: github-actions-automation-script
    desc: GitHub Actions automation script context
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'process.env.GITHUB_OUTPUT'
  - id: benign-yarn-lowprimes-bundle
    desc: Yarn standalone lowprimes constant
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "var lowprimes = [2,3,5,7,11,13,17,19"

  - id: gemini-cli-core-import
    desc: Gemini CLI core import
    crit: component
    conf: 1.0
    if:
      type: text
      substr: "@google/gemini-cli-core"
  - id: gemini-sandbox-var
    desc: Gemini sandbox env selector
    crit: component
    conf: 1.0
    if:
      type: text
      substr: "GEMINI_SANDBOX"
  - id: typescript-diagnostics-bundle
    desc: TypeScript diagnostics bundle marker
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "This_module_can_only_be_referenced_with_ECMAScript_imports"
  - id: tencent-tc3-hmac-sha256
    desc: Tencent TC3 HMAC marker
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "TC3-HMAC-SHA256"
  - id: tencent-tc-action-header
    desc: Tencent TC action header
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "X-TC-Action"
  - id: tencent-tc-timestamp-header
    desc: Tencent TC timestamp header
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "X-TC-Timestamp"
  - id: braintree-authorization-fingerprint
    desc: Braintree auth fingerprint token field
    crit: component
    conf: 0.98
    if:
      type: encoded
      substr: '"authorizationFingerprint":"'
  - id: braintree-sandbox-config-url
    desc: Braintree sandbox configuration URL
    crit: component
    conf: 0.98
    if:
      type: encoded
      substr: '"configUrl":"https://api.sandbox.braintreegateway.com:443/merchants/'
  - id: braintree-client-api-config-path
    desc: Braintree client API configuration path
    crit: component
    conf: 0.98
    if:
      type: encoded
      substr: '/client_api/v1/configuration"'
  - id: wordpress-develop-marker
    desc: WordPress develop repository marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "wordpress-develop"
  - id: wordpress-env-example
    desc: WordPress local environment example file marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: ".env.example"
  - id: wordpress-local-memcached-var
    desc: WordPress local PHP memcached env var
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "LOCAL_PHP_MEMCACHED"
  - id: docker-toolbox-path-var
    desc: Docker Toolbox install path variable
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "DOCKER_TOOLBOX_INSTALL_PATH"
  - id: ghost-admin-api-key-signing-context
    desc: Ghost Admin API key signing helper
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "GHOST_GOLDEN_POST_AUTH"
  - id: ghost-theme-preview-context
    desc: Ghost theme preview iframe renderer
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "x-ghost-preview"
  - id: ghost-settings-secret-validation-context
    desc: Ghost settings secret validation
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "stripe_connect_secret_key"
  - id: ghost-tinybird-analytics-context
    desc: Ghost Tinybird analytics helper
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "TINYBIRD_ADMIN_TOKEN"
  - id: socketio-client-import
    desc: Socket.IO client import string
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: "socket.io-client"
  - id: collaboration-space-join-event
    desc: Collaboration join event string
    crit: baseline
    conf: 0.9
    if:
      type: text
      word: "space:join"
  - id: benign-svelte-runtime-hidden-listener-context
    desc: Benign Svelte runtime dirty-check fragment
    crit: baseline
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: "t.dirty=[-1],t.fragment&&t.fragment.p"
  - id: gettext-po-catalog
    desc: Gettext translation catalog filename
    crit: component
    conf: 1.0
    for: [javascript, typescript, python]
    if:
      type: path
      basename: true
      regex: '(?i)\.pot?$'
  - id: brackets-perf-concat-bundle
    desc: Brackets performance concat bundle
    crit: baseline
    conf: 0.99
    for: [javascript]
    if:
      type: path
      basename: true
      exact: 'brackets-concat.js'
  - id: parcel-plugin-transformer-context
    desc: Parcel plugin transformer source
    crit: baseline
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: "from '@parcel/plugin'"
  - id: gitpod-workspace-image
    desc: Gitpod workspace image marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "gitpod/workspace-full"
  - id: browser-microsoft-apt-source
    desc: Microsoft apt source marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "packages.microsoft.com/config/ubuntu"
  - id: browser-chrome-package
    desc: Chrome apt package marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "google-chrome-stable"
  - id: browser-google-signing-key
    desc: Google Linux signing key marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "dl-ssl.google.com/linux/linux_signing_key.pub"
  - id: auth-error-codes-symbol
    desc: Authentication error code catalog
    crit: component
    conf: 0.9
    if:
      type: text
      substr: AUTH_ERROR_CODES
  - id: auth-token-invalid-string
    desc: Authentication token invalid string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: auth.token_invalid
composite_rules:
  - id: tencent-tc3-signing-context
    desc: Tencent Cloud TC3 request signing flow
    crit: baseline
    conf: 1.0
    all:
      - id: tencent-tc3-hmac-sha256
      - id: tencent-tc-action-header
      - id: tencent-tc-timestamp-header

  - id: braintree-sandbox-test-context
    desc: Braintree sandbox SDK test fixture
    crit: component
    conf: 0.98
    all:
      - id: braintree-authorization-fingerprint
      - id: braintree-sandbox-config-url
      - id: braintree-client-api-config-path
    any:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: objectives/discovery/system/fingerprint/hardware::node-test-artifact

  - id: wordpress-local-env-script
    desc: WordPress local Docker environment helper
    crit: baseline
    conf: 0.95
    any:
      - id: wordpress-develop-marker
      - id: wordpress-env-example
      - id: wordpress-local-memcached-var
      - id: docker-toolbox-path-var

  - id: malicious-package-manifest
    desc: Package manifest hides payload with public exfil
    crit: hostile
    conf: 0.95
    for: [package.json]
    all:
      - id: objectives/supply-chain/hidden-payload
      - id: objectives/exfiltration
      - id: metadata/package/files/included::package-json-basename
    unless:
      - id: metadata/build/manifest::nuspec-file
      - id: metadata/lang/shebang::ruby
      - id: metadata/import/ruby
      - id: metadata/package/files/name::rubygem-archive

  - id: benign-credential-exfil-noise
    desc: Benign bundle markers for exfil suppression
    crit: component
    conf: 0.9
    any:
      - id: typescript-diagnostics-bundle
      - id: objectives/supply-chain/trojanized/app/context::large-minified-js-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: brackets-perf-concat-bundle
      - id: benign-socketio-collab-context
      - id: tencent-tc3-signing-context
      - id: objectives/supply-chain/trojanized/app/context::semantic-ui-glide-comment-context
      - id: wordpress-local-env-script

  - id: benign-hidden-listener-extension-context
    desc: Benign extension bundle listener context
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/package/files/runtime
      - id: objectives/supply-chain/trojanized/app/context::benign-bundled-extension-code

  - id: benign-socketio-collab-context
    desc: Benign Socket.IO collaboration context
    crit: component
    conf: 0.9
    all:
      - id: socketio-client-import
      - id: collaboration-space-join-event

  - id: benign-credential-exfil-context
    desc: Benign credential exfiltration contexts
    crit: component
    conf: 0.9
    any:
      - id: github-actions-automation-script
      - id: objectives/supply-chain/trojanized/app/context::credential-exfil-benign-context
      - id: benign-credential-exfil-noise
      - id: benign-socketio-collab-context
      - id: tencent-tc3-signing-context
      - id: parcel-plugin-transformer-context
      - id: objectives/supply-chain/trojanized/app/context::credential-exfil-helper-context
      - id: gettext-po-catalog
      - id: metadata/file/catalog/identity::vscode-php-global-functions-catalog
      - id: browser-devcontainer-provisioning-context

  - id: browser-devcontainer-provisioning-context
    desc: Browser devcontainer provisioning context
    crit: component
    conf: 0.98
    all:
      - id: gitpod-workspace-image
      - id: browser-apt-install-context

  - id: browser-apt-install-context
    desc: Browser apt provisioning marker
    crit: component
    conf: 0.98
    any:
      - id: browser-microsoft-apt-source
      - id: browser-chrome-package
      - id: browser-google-signing-key

  - id: credential-exfiltration-tooling-context
    desc: Tooling context that mimics credential exfil
    crit: component
    conf: 0.9
    any:
      - id: well-known/lib/scikit-learn
      - id: well-known/lib/psutil::python-package
      - id: metadata/library/jquery
      - id: well-known/tool/detection/sast::sast-scanner-integration
      - id: well-known/tool/detection/sast::secret-scanner-named-regex
      - id: well-known/tool/detection/sast::vscode-marketplace-publish-script

  - id: suspicious-stealer-discovery-benign-context
    desc: Benign system-discovery exfiltration context
    crit: component
    conf: 0.9
    any:
      - id: braintree-sandbox-test-context
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: objectives/supply-chain/trojanized/app/context::benign-bundled-extension-code
      - id: metadata/file/catalog/identity::uproc-tools-catalog
      - id: metadata/library/github-actions::action-testdata-path
      - id: metadata/package/testing/harness/runtime::is-test
      - id: benign-credential-exfil-context
      - id: metadata/file/catalog/identity::frequency-list-catalog
      - id: objectives/supply-chain/trojanized/app/context::large-minified-js-bundle
      - id: metadata/library/structure::js-any-bundle-output
      - id: objectives/supply-chain/trojanized/app/context::browser-automation-helper-script
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/library/structure::js-closure-provide-call
      - id: metadata/library/structure::js-closure-module-call
      - id: metadata/library/ai::mcp-agent-tool-package
      - id: micro-behaviors/crypto/certificate/usage::has-pem-certificate
      - id: well-known/lib/ace-editor::ace-editor-bundle
      - id: well-known/lib/ace-editor::ace-uncompressed-editor-bundle

  - id: benign-hidden-listener-general-context
    desc: Benign hidden-listener context cluster
    crit: component
    conf: 0.9
    any:
      - id: metadata/lang/scripted::dts-declaration-file
      - id: benign-hidden-listener-extension-context
      - id: benign-svelte-runtime-hidden-listener-context
      - id: objectives/supply-chain/trojanized/app/context::large-minified-js-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-any-bundle-output
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::js-bdd-suite-text
      - id: objectives/supply-chain/trojanized/app/context::playwright-capture-helper
      - id: objectives/supply-chain/trojanized/app/context::semantic-ui-glide-comment-context
      - id: gettext-po-catalog
      - id: well-known/app/anthropic-claude-code
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
      - id: metadata/library/structure::js-minified-frontend-route-bundle
      - id: metadata/library/ai::ai-coding-assistant-runtime

  - id: benign-obfuscated-dropper-exceptions
    desc: Benign or classified obfuscated dropper exceptions
    crit: component
    conf: 0.9
    any:
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::meredith-obfuscated-wsh-download-run
      - id: objectives/command-and-control/dropper/fragmented::obfuscated-wsh-counter-exe-dropper-v2
      - id: objectives/supply-chain/trojanized/app/context::benign-obfuscated-dropper-contexts
      - id: metadata/package/manifest/name::official-pm2-package
      - id: objectives/supply-chain/trojanized/app/benign::benign-gemini-sandbox-context
      - id: cleartext-dotenv-exfil-context
      - id: metadata/library/structure::js-umd-wrapper-amd-minified
      - id: micro-behaviors/communications/http/oauth::oauth-client-sdk-context
      - id: micro-behaviors/os/service/legitimate::health-check
      - id: auth-token-error-catalog-context

  - id: auth-token-error-catalog-context
    desc: Authentication token error catalog context
    crit: component
    conf: 0.9
    all:
      - id: auth-error-codes-symbol
      - id: auth-token-invalid-string

  - id: obfuscated-dropper-exfiltration-benign-context
    desc: Benign context aggregator for obfuscated-dropper-exfiltration
    crit: component
    conf: 0.9
    any:
      - id: benign-obfuscated-dropper-exceptions
      - id: objectives/supply-chain/trojanized/app/benign::benign-gemini-sandbox-context
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/library/automation::selenium-ie-driver-doc-context
      - id: metadata/library/presentation-lib::x3dom-loadjs-helper
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-minified-frontend-route-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: well-known/app/opencode-router
      - id: well-known/app/nitin-ai
      - id: metadata/library/ai::mcp-agent-tool-package
      - id: micro-behaviors/fs/path/application/config::codex-hook-script
      - id: metadata/permission/manifest::gecko-collects-website-content

  - id: cleartext-dotenv-exfil-context
    desc: Cleartext dotenv HTTP exfiltration context
    crit: component
    conf: 0.9
    all:
      - id: objectives/credential-access/env/dotenv::js-dotenv-read
      - id: micro-behaviors/communications/http/request/client::http-client-usage

  - id: credential-exfiltration-stealer-exceptions
    desc: Benign credential exfiltration stealer exceptions
    crit: component
    conf: 0.9
    any:
      - id: metadata/file/extension/identity::edoc-file-extension
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
      - id: metadata/library/structure::dart-flutter-js-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-minified-relative-chunk-imports
      - id: objectives/supply-chain/trojanized/app/context
      - id: benign-credential-exfil-context
      - id: metadata/file/catalog/identity::frequency-list-catalog
      - id: metadata/package/manifest/name::official-pm2-package
      - id: metadata/file/format::i18n-locale-file
      - id: ghost-application-benign-context
      - id: well-known/app/affine::affine-project-marker
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/lang/scripted::racket-source
      - id: metadata/library/automation::selenium-ie-driver-doc-context
      - id: well-known/lib/npm-semver
      - id: micro-behaviors/communications/http/services/github::github-release-api
      - id: metadata/library/structure::js-closure-provide-call
      - id: metadata/library/structure::js-closure-module-call
      - id: metadata/library/structure::js-known-bundler-output
      - id: well-known/app/opencode-router
      - id: well-known/app/nitin-ai
      - id: metadata/library/structure::js-minified-frontend-route-bundle
      - id: objectives/anti-static/obfuscation/code-metrics/string-blob::js-base64-candidate-benign-context
      - id: micro-behaviors/process/create/shell/guard::node-temp-exec-benign-context
      - id: well-known/app/craft-author-toolbar::craft-author-toolbar-utils
      - id: well-known/app/tabby::tabby-openapi-codegen
      - id: well-known/app/anthropic-claude-code

  - id: credential-exfiltration-network-sink
    desc: Credential exfiltration network sink
    crit: component
    conf: 0.94
    any:
      - id: objectives/exfiltration/sensitive-data::js-sensitive-data-exfiltration
      - id: objectives/exfiltration/messaging/webhook::slack-exfiltration
      - id: objectives/exfiltration/messaging/webhook::discord-exfiltration
      - id: objectives/exfiltration/messaging/webhook::webhook-c2-channel
      - id: objectives/exfiltration/messaging/telegram::telegram-bot-exfil
      - id: objectives/exfiltration/messaging/telegram::telegram-bot-encoded-file-exfil
      - id: objectives/exfiltration/messaging/telegram::telegram-archive-exfil
      - id: objectives/exfiltration/messaging/discord::discord-http-exfil-chain
      - id: objectives/exfiltration/oob/
      - id: objectives/exfiltration/http/upload::node-collect-exfil
      - id: objectives/exfiltration/http/upload::node-stealthy-exfil
      - id: objectives/exfiltration/http/upload::node-encode-exfil

  - id: ghost-application-benign-context
    desc: Ghost application benign context cluster
    crit: baseline
    conf: 0.95
    any:
      - id: ghost-admin-api-key-signing-context
      - id: ghost-theme-preview-context
      - id: ghost-settings-secret-validation-context
      - id: ghost-tinybird-analytics-context

  - id: credential-exfiltration-stealer
    desc: App package targets credentials for HTTP exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/credential-access
      - id: credential-exfiltration-network-sink
    any:
      - id: objectives/collection/stealer
      - id: objectives/supply-chain/hidden-payload
    unless:
      - id: objectives/supply-chain/trojanized/app/context/
      - id: metadata/library/structure/
      - id: metadata/package/testing/
      - id: well-known/tool/detection/sast/
      - id: well-known/app/keepassxc/
    downgrade:
      any:
        - id: metadata/permission/manifest::gecko-collects-website-content

  - id: suspicious-obfuscated-dropper-benign-context
    desc: Benign obfuscated-dropper context
    crit: component
    conf: 1.0
    any:
      - id: benign-obfuscated-dropper-exceptions
      - id: mobile-white-label-config-tool-context
      - id: metadata/file/policy/config/
      - id: metadata/file/policy/config/branding::ios-splashscreen-imageset
      - id: micro-behaviors/communications/http/services/steam::steam-trade-extension-automation
      - id: objectives/anti-static/obfuscation/code-metrics/functions::steam-trade-content-script-context
      - id: micro-behaviors/communications/http/services/opnskin::opnskin-steam-trade-bridge
      - id: metadata/file/policy/config/services::android-google-services-config
      - id: metadata/file/policy/config/services::ios-google-service-info-config
      - id: metadata/file/policy/config/identity::android-manifest-path
      - id: metadata/file/policy/config/xcode::xcode-scheme-file-marker
      - id: objectives/supply-chain/trojanized/app/benign::benign-gemini-sandbox-context
