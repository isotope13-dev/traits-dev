defaults:
  platforms: [windows]
  for: [pe]
  attack: T1195.002
traits:
  - id: installer-welcome-banner
    desc: Installer or updater welcome banner
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'Welcome to [A-Za-z0-9 ._-]{3,40} (Installer|Updater)'
  - id: admin-autorun-task-prompt
    desc: Installer requests admin for autorun
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)run installer as Administrator.{0,120}(autorun task|UAC)'
  - id: fake-future-windows-gate
    desc: Installer blocks on fake future Windows
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'Windows 25H2.{0,120}Fullscreen Experiense API'
composite_rules:
  - id: trojanized-installer-netsupport-profile-exfil
    desc: NetSupport installer exfiltrates host profile
    crit: hostile
    conf: 0.995
    all:
      - id: metadata/binary/installer/database::advanced-installer-bootstrapper
      - id: well-known/tool/dual-use/netsupport::netsupport-client-embedded-bundle
      - id: objectives/exfiltration/stealer/system-info::embedded-powershell-host-profile-exfil
  - id: trojanized-installer-native-surveillance-bundle
    desc: Trojanized installer bundles native injection and surveillance payloads
    crit: hostile
    conf: 0.97
    for: [pe, archives]
    scope: archive
    all:
      - id: metadata/binary/metrics/structural::embedded-pe-three-plus
      - id: objectives/evasion/process/injection/dll::remote-thread-dll-injection-chain
      - id: objectives/exfiltration/stealer/surveillance::surveillance-capture
    any:
      - id: objectives/command-and-control/dropper/delivery/download::wininet-download-write-exec
      - id: objectives/command-and-control/dropper/delivery/download::unsigned-wininet-download-write-exec
      - id: micro-behaviors/communications/proxy/socks::socks5-string
    unless:
      - id: metadata/signed/platform/
      - id: well-known/lib/electron/
  - id: trojanized-installer-stealer-wrapper
    desc: Trojanized Windows installer stealer wrapper
    crit: hostile
    conf: 0.97
    all:
      - id: installer-welcome-banner
      - id: micro-behaviors/data/embedded/payload/archive::zip-magic-multiple-pe
      - id: objectives/collection/screenshot/capture::gdi-gdiplus-init-capture
    any:
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
      - id: micro-behaviors/process/terminate/command::taskkill-pid-force
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/script/
  - id: installer-admin-autorun-persistence
    desc: Installer seeks elevated autorun persistence
    crit: suspicious
    conf: 0.95
    all:
      - id: admin-autorun-task-prompt
      - id: installer-welcome-banner
