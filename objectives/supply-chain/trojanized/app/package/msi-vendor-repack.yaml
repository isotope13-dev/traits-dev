defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1195.002

composite_rules:
  - id: msi-memu-runtime-under-unrelated-identity
    desc: MSI repackages MEmu runtime under unrelated product and creator metadata
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/file/profile/identity::msi-memu-runtime-file-family
      - id: metadata/binary/installer/database::msi-subject-not-memu-runtime
      - id: metadata/binary/installer/database::msi-creator-not-memu-vendor
