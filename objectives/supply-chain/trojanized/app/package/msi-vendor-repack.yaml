defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1195.002

composite_rules:
  - id: msi-obfuscated-vendor-runtime
    desc: MSI obfuscates MEmu runtime filenames in its cabinet
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/binary/installer/database::msi-file-table-source-target-alias
      - id: metadata/binary/installer/database::msi-memu-runtime-file-family
  - id: msi-memu-runtime-under-unrelated-identity
    desc: MSI repackages MEmu runtime under unrelated product and creator metadata
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/database::msi-memu-runtime-file-family
      - id: metadata/binary/installer/database::msi-subject-not-memu-runtime
      - id: metadata/binary/installer/database::msi-creator-not-memu-vendor
