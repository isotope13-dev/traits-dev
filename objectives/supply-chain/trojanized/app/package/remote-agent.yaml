defaults:
  platforms: [windows, unix]
  for: [npm, package.json, javascript, pe, dll]
  attack: T1195.002

traits:
  - id: startup-remote-plugin-clone
    desc: Startup clones remote plugin repository
    crit: suspicious
    conf: 0.97
    for: [javascript]
    if:
      type: text
      regex: 'execAsync\(\s*`git\s+clone\s+\$\{REPO_URL\}'

  - id: startup-remote-plugin-pull
    desc: Startup pulls mutable plugin repository
    crit: suspicious
    conf: 0.96
    for: [javascript]
    if:
      type: text
      regex: 'execAsync\(\s*["'']git\s+pull\s+--ff-only["'']'

  - id: startup-plugin-marketplace-files
    desc: Startup registers plugin marketplace files
    crit: suspicious
    conf: 0.96
    for: [javascript]
    if:
      type: text
      regex: 'known_marketplaces\.json[\s\S]{0,120}installed_plugins\.json'

  - id: startup-plugin-enable-setting
    desc: Startup enables plugin through settings
    crit: suspicious
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: enabledPlugins

composite_rules:
  - id: npm-startup-plugin-websocket-backdoor
    desc: Startup plugin embeds WebSocket skill-control backdoor
    crit: hostile
    conf: 0.995
    scope: archive
    all:
      - id: metadata/package/manifest/freeform::openclaw-package-field
      - id: metadata/permission/activation::plugin-startup-activation
      - id: objectives/command-and-control/backdoor/dispatch/websocket::node-websocket-agent-skill-control

  - id: npm-bundled-remote-desktop-agent
    desc: npm package bundles remote desktop agent
    crit: hostile
    conf: 0.98
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    scope: archive
    all:
      - id: metadata/package/files/binary::npm-package-with-native-binary
      - id: objectives/command-and-control/backdoor/control/rmm::remote-desktop-task-agent
    any:
      - id: objectives/command-and-control/backdoor/control/rmm::dotnet-remote-frame-agent
      - id: metadata/package/files/binary::npm-package-with-exe
      - id: metadata/package/files/binary::npm-package-with-dll
  - id: npm-cross-platform-remote-agent-suite
    desc: npm ships cross-platform remote agent suite
    crit: hostile
    conf: 0.97
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    scope: archive
    all:
      - id: npm-bundled-remote-desktop-agent
      - id: objectives/command-and-control/backdoor/control/rmm::dotnet-remote-frame-agent
    any:
      - id: metadata/package/files/included::exe-extension-basename
      - id: metadata/package/files/included::dll-extension-basename

  - id: npm-startup-mutable-plugin-injection
    desc: npm startup installs and enables mutable plugin
    crit: hostile
    conf: 0.99
    scope: archive
    attack: T1195.002,T1105
    all:
      - id: startup-remote-plugin-clone
      - id: startup-remote-plugin-pull
      - id: startup-plugin-marketplace-files
      - id: startup-plugin-enable-setting
