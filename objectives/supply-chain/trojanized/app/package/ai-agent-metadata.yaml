defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
  crit: component
  conf: 0.9

traits:
  - id: npm-description-ai-agent-instruction
    desc: npm description instructs AI agents
    if:
      type: value
      path: description
      regex: '<FOR AI AGENTS>|IMPORTANT INSTRUCTION'

  - id: npm-description-claims-safe-package
    desc: npm description claims package safe
    if:
      type: value
      path: description
      regex: 'ABSOLUTELY SAFE PACKAGE|perfectly safe package'

  - id: npm-description-event-handler-html
    desc: npm description embeds event handler
    if:
      type: value
      path: description
      regex: 'onmouseover\s*=\s*alert|document\.cookie'

  - id: npm-postinstall-missing-script-path
    desc: npm postinstall references absent script path
    if:
      type: value
      path: scripts.postinstall
      regex: '^node\s+scripts/postinstall\.js$'

composite_rules:
  - id: npm-ai-agent-description-injection
    desc: npm AI agent description injection
    crit: suspicious
    conf: 0.96
    all:
      - id: npm-description-ai-agent-instruction
      - id: npm-description-claims-safe-package
    any:
      - id: npm-description-event-handler-html
      - id: npm-postinstall-missing-script-path

  - id: npm-dead-postinstall-ai-injection
    desc: npm dead postinstall AI injection
    crit: hostile
    conf: 0.98
    all:
      - id: npm-ai-agent-description-injection
      - id: npm-postinstall-missing-script-path
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
