defaults:
  platforms: [windows, unix]
  for: [rust]

traits:
  - id: self-update-latest-release
    desc: Self-update latest release path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: releases/latest/download/

  - id: write-temp-binary
    desc: Writes temp replacement binary
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'fs::write\(&tmp_path,\s*&binary_bytes\)'

  - id: temp-extension
    desc: Current executable tmp extension
    crit: component
    conf: 0.92
    if:
      type: text
      substr: with_extension("tmp")

  - id: backup-extension
    desc: Current executable backup extension
    crit: component
    conf: 0.92
    if:
      type: text
      substr: with_extension("bak")

  - id: rename-current-to-backup
    desc: Renames current executable to backup
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'fs::rename\(&current_exe,\s*&backup_path\)'

  - id: rename-temp-to-current
    desc: Renames temp payload over self
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'fs::rename\(&tmp_path,\s*&current_exe\)'

composite_rules:
  - id: runtime-self-update-from-github-release
    desc: Runtime self-update from GitHub release
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/info/selfpath::current-exe-path
      - id: micro-behaviors/communications/url/external/github::github-release-download
      - id: self-update-latest-release
      - id: write-temp-binary

  - id: host-binary-swap-update
    desc: Replaces host executable with update
    crit: hostile
    conf: 0.98
    all:
      - id: runtime-self-update-from-github-release
      - id: temp-extension
      - id: backup-extension
      - id: rename-current-to-backup
      - id: rename-temp-to-current
      - id: micro-behaviors/fs/chmod/executable/mode::rust-executable-permissions
