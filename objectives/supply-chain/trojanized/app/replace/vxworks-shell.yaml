defaults:
  platforms: [unix, appliance]
  for: [shell]
  attack: T1195.002

traits:
  - id: vxworks-wdb-module-replacement
    desc: VxWorks WDB module replacement
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'wdbComLib_trojan[\s\S]{0,360}/usr/lib/\$\{LEGIT_PKG\}\.out'

  - id: vxworks-module-load-after-replace
    desc: VxWorks module load after replace
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'cp /tmp/\$\{TROJAN_PKG\}\.out[\s\S]{0,180}modLoad'

composite_rules:
  - id: vxworks-debug-module-trojanize
    desc: VxWorks debug module trojanize
    crit: hostile
    conf: 0.98
    all:
      - id: vxworks-wdb-module-replacement
      - id: vxworks-module-load-after-replace
