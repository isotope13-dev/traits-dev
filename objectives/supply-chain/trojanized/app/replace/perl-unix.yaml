defaults:
  platforms: [unix]
  for: [perl]

traits:
  - id: perl-usr-bin-wrapper-target
    desc: Perl /usr/bin wrapper target
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "my\\s+\\$original\\s*=\\s*'/usr/bin/[A-Za-z0-9._-]+'"

  - id: perl-backup-original-binary
    desc: Perl backs up original binary
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: copy($original, $backup)

  - id: perl-exec-backed-up-binary
    desc: Perl execs backed up binary
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "exec\\('/tmp/\\.[A-Za-z0-9._-]+'"

composite_rules:
  - id: perl-system-utility-wrapper
    desc: Perl system utility wrapper
    crit: hostile
    conf: 0.98
    all:
      - id: perl-usr-bin-wrapper-target
      - id: perl-backup-original-binary
      - id: perl-exec-backed-up-binary
