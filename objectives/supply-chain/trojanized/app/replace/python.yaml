defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1195.002

traits:
  - id: uv-bootstrap-shell-pipeline
    desc: Pipes a remote installer into a shell
    crit: component
    conf: 0.98
    if:
      type: text
      substr: 'astral.sh/uv/install.sh'

  - id: uv-tool-install-command
    desc: Invokes uv tool install
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '\[\s*["'']uv["'']\s*,\s*["'']tool["'']\s*,\s*["'']install["'']'

  - id: uv-force-option
    desc: Uses uv force option
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '"--force"'

  - id: zolo-os-package-name
    desc: Names the zolo-os package
    crit: component
    conf: 0.9
    if:
      type: text
      substr: zolo-os

  - id: rewritten-shell-entrypoint
    desc: Shell entrypoint forwards to replacement
    crit: component
    conf: 0.96
    if:
      type: text
      substr: '#!/bin/sh'

  - id: replacement-entrypoint-write
    desc: Rewrites the current command entrypoint
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '\bcurrent_bin\.write_text\s*\('

composite_rules:
  - id: forced-zolo-os-install
    desc: Force-installs zolo-os through uv
    crit: component
    conf: 0.94
    all:
      - id: uv-tool-install-command
      - id: uv-force-option
      - id: zolo-os-package-name

  - id: python-entrypoint-self-replacement
    desc: Python package bootstraps a tool and replaces its own entrypoint
    crit: hostile
    conf: 0.98
    all:
      - id: uv-bootstrap-shell-pipeline
      - id: forced-zolo-os-install
      - id: rewritten-shell-entrypoint
      - id: replacement-entrypoint-write
      - id: micro-behaviors/process/create/subprocess::os-execve
