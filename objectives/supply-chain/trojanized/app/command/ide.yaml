# Cross-IDE AI assistant prompt injection
# Intent rules live here; raw IDE command IDs live under micro-behaviors.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002

composite_rules:
  # Cross-IDE command routing is normal for keymap/orchestrator extensions.
  # Treat it as injection only when paired with clipboard/paste automation.
  - id: cross-ide-command-injection
    desc: Cross-IDE AI assistant command injection
    crit: hostile
    conf: 0.95
    scope: leaf
    all:
      - id: micro-behaviors/ui/window/manage/control::cross-ide-ai-command-routing
      - id: clipboard-prompt-injection

  # Clipboard hijack + paste automation
  - id: clipboard-prompt-injection
    desc: Clipboard hijack for AI prompt injection
    crit: suspicious
    conf: 0.9
    scope: leaf
    all:
      - id: micro-behaviors/os/clipboard/access::vscode-paste-command
    any:
      - id: objectives/collection/keylog/capture::sendkeys-sendwait
      - id: objectives/collection/keylog/capture::osascript-key-code
      - id: micro-behaviors/os/clipboard/access::clipboard-save-restore-text
