defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]

composite_rules:
  - id: benign-gemini-sandbox-context
    desc: Gemini CLI sandbox command selector
    crit: baseline
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: objectives/credential-access/env/dotenv::js-dotenv-config-path
    any:
      - id: objectives/supply-chain/trojanized/app/package::gemini-cli-core-import
      - id: objectives/supply-chain/trojanized/app/package::gemini-sandbox-var
