defaults:
  platforms: [windows, unix]
  for: [package.json]
  attack: T1195.002
traits:
  - id: ai-cli-description-ai-first
    desc: Package describes AI CLI
    crit: component
    conf: 0.9
    if:
      type: value
      path: description
      regex: '(?i)\b(AI|LLM)\b.{0,40}\b(CLI|agent)\b'
  - id: ai-cli-description-cli-first
    desc: Package describes CLI AI
    crit: component
    conf: 0.9
    if:
      type: value
      path: description
      regex: '(?i)\b(CLI|agent)\b.{0,40}\b(AI|LLM)\b'
  - id: openai-runtime-dependency
    desc: Package depends on OpenAI
    crit: component
    conf: 0.9
    if:
      type: value
      path: dependencies.openai
      exists: true
composite_rules:
  - id: ai-cli-description
    desc: Package describes AI CLI
    crit: component
    conf: 0.9
    any:
      - id: ai-cli-description-ai-first
      - id: ai-cli-description-cli-first
  - id: hollow-ai-cli-package
    desc: Hollow AI CLI package
    crit: suspicious
    conf: 0.92
    all:
      - id: ai-cli-description
      - id: openai-runtime-dependency
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
    any:
      - id: metadata/package/manifest/entrypoint::pkg-main-field
      - id: metadata/package/manifest/entrypoint::bin-js-entry
