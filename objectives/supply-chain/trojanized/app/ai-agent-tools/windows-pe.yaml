defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1195.002,T1552.001,T1562.001
  mbc: B0024

traits:
  - id: native-ai-agent-identity
    desc: Native AI coding agent identity
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)\b(cursor-agent|claude(code)?|kiro)\b'
    unless:
      - id: metadata/binary/section/name::bun-section-name
  - id: native-agent-account-register
    desc: Native agent account registration markers
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(register-guest|switchCursorAccount)\b'
  - id: native-agent-account-reset
    desc: Native agent account reset markers
    crit: suspicious
    conf: 0.94
    if:
      type: text
      # A generic `reset-password` API is ordinary account functionality. Keep
      # the machine-identity reset marker, which is the agent-tampering signal
      # this trait describes.
      regex: '(?i)\breset_machine_id\b'
  - id: native-agent-account-token
    desc: Native agent token-control markers
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(del_user_data|WorkosCursorSessionToken)\b'
  - id: native-agent-untrusted-api-host
    desc: Native agent uses shady API host
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)https?://[A-Za-z0-9.-]{1,120}\.(vip|top)(:[0-9]{1,5})?/'

composite_rules:
  - id: native-agent-account-control
    desc: Native agent account control markers
    crit: suspicious
    conf: 0.94
    any:
      - id: native-agent-account-register
      - id: native-agent-account-reset
      - id: native-agent-account-token
  - id: native-agent-proxy-ca-control
    desc: Native agent proxy CA control markers
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/communications/proxy/mitm::proxy-ca-module-marker
      - id: micro-behaviors/communications/proxy/mitm::https-interception-marker
  - id: trojanized-native-ai-agent-control-plane
    desc: Trojanized native AI agent control plane
    crit: hostile
    conf: 0.99
    all:
      - id: native-ai-agent-identity
      - id: native-agent-account-control
      - id: native-agent-proxy-ca-control
      - id: native-agent-untrusted-api-host
