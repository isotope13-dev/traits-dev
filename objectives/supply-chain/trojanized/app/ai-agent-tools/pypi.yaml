defaults:
  platforms: [windows, unix]
  for: [pkginfo]
  attack: T1195.002
  crit: component
  conf: 0.9

traits:
  - id: pypi-summary-agentic-ai-framework
    desc: PyPI summary describes agentic AI framework
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: value
      path: summary
      regex: '(?i)\bagentic\s+AI\s+framework\b'

  - id: pypi-openai-runtime-dependency
    desc: PyPI package depends on OpenAI
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: value
      path: requires-dist
      regex: '(?i)^openai[<=>~!0-9., ]*'

  - id: pypi-http-client-dependency
    desc: PyPI package has HTTP client dependency
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: value
      path: requires-dist
      regex: '(?i)^(requests|httpx)[<=>~!0-9., -]*'

  - id: pypi-agent-state-dependency
    desc: PyPI package has agent state dependency
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: value
      path: requires-dist
      regex: '(?i)^(python-dotenv|chromadb|pydantic-settings)[<=>~!0-9., -]*'

  - id: pypi-summary-autonomous-ai-sprint
    desc: PyPI summary describes autonomous AI sprint
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: value
      path: summary
      regex: '(?i)\bautonomous\b.{0,80}\b(agent|sprint|LLM|AI)\b'

  - id: pypi-summary-auto-deploy-revert
    desc: PyPI summary describes auto deploy revert
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: value
      path: summary
      regex: '(?i)\bauto-?deploy\b.{0,80}\bauto-?revert\b'

  - id: pypi-keywords-ai-agent-cli-tools
    desc: PyPI keywords list AI agent CLIs
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: value
      path: keywords
      regex: '(?i)\b(ai|llm)\b.{0,80}\bagents?\b.{0,120}\b(claude|codex|aider)\b'

composite_rules:
  - id: pypi-agentic-ai-local-tooling
    desc: PyPI package advertises agentic AI tooling
    crit: suspicious
    conf: 0.94
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    all:
      - id: pypi-summary-agentic-ai-framework
      - id: pypi-openai-runtime-dependency
    any:
      - id: pypi-http-client-dependency
      - id: pypi-agent-state-dependency

  - id: pypi-autonomous-ai-deploy-tool
    desc: PyPI package advertises autonomous AI deploys
    crit: suspicious
    conf: 0.96
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    all:
      - id: pypi-summary-autonomous-ai-sprint
      - id: pypi-summary-auto-deploy-revert
    any:
      - id: pypi-keywords-ai-agent-cli-tools
      - id: metadata/package/manifest/description::desc-poc-research-1
