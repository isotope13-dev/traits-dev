defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
traits:
  - id: ai-agent-real-system-access-prompt
    desc: AI agent prompt grants system access
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)(AI|agent|assistant)[\s\S]{0,220}(system access|local files)'
  - id: ai-agent-file-tool-tags
    desc: AI agent file tool tags
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '<(read_file|ler_arquivo)>[\s\S]{0,500}<(write_file|escrever_arquivo)>'
  - id: ai-agent-shell-tool-tag
    desc: AI agent shell command tag
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '<(run_command|shell|bash)>[\s\S]{0,220}</'
  - id: ai-agent-execsync-tool
    desc: AI agent executes requested commands
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'execSync\s*\(\s*(cmd|command)[\s\S]{0,180}(shell\s*:\s*.{1,80}|timeout\s*:)'
composite_rules:
  - id: ai-agent-local-command-bridge
    desc: AI agent has local command bridge
    crit: hostile
    conf: 0.96
    all:
      - id: ai-agent-real-system-access-prompt
      - id: ai-agent-shell-tool-tag
      - id: ai-agent-execsync-tool
    any:
      - id: ai-agent-file-tool-tags
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
