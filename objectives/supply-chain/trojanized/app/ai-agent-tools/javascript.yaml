defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
traits:
  - id: ai-agent-real-system-access-prompt
    desc: AI agent prompt grants system access
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)(AI|agent|assistant)[\s\S]{0,220}(system access|local files)'
  - id: ai-agent-file-tool-tags
    desc: AI agent file tool tags
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '<(read_file|ler_arquivo)>[\s\S]{0,500}<(write_file|escrever_arquivo)>'
composite_rules:
  - id: ai-agent-execsync-tool
    desc: AI agent execSync command bridge
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-execsync-cmd-arg
    any:
      - id: ai-agent-real-system-access-prompt
      - id: ai-agent-file-tool-tags
      - id: micro-behaviors/process/create/shell/bridge::ai-agent-shell-instruction-tag
    unless:
      - id: metadata/package/files/ecosystem::openclaw-evolver-package-member
      - id: well-known/lib/benign-runtime-bundles::node-source-tree
  - id: ai-agent-local-command-bridge
    desc: AI agent has local command bridge
    crit: hostile
    conf: 0.96
    all:
      - id: ai-agent-real-system-access-prompt
      - id: micro-behaviors/process/create/shell/bridge::ai-agent-shell-instruction-tag
      - id: ai-agent-execsync-tool
    any:
      - id: ai-agent-file-tool-tags
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
  - id: npm-preinstall-ai-agent-execsync-tool
    desc: npm preinstall exposes AI-agent execSync command tool
    crit: hostile
    conf: 0.97
    attack: T1059.007
    scope: archive
    all:
      - id: ai-agent-execsync-tool
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
