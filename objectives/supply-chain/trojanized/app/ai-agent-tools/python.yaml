defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1195.002
  crit: component
  conf: 0.9

traits:
  - id: python-agent-run-command-name
    desc: Python agent run_command name
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: text
      substr: 'name="run_command"'

  - id: python-agent-shell-command-desc
    desc: Python agent shell command description
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: literal
      exact: Execute shell command

  - id: python-agent-run-command-function
    desc: Python agent run_command function binding
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: text
      substr: function=run_command

  - id: python-agent-python-repl-name
    desc: Python agent python_repl name
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: literal
      exact: python_repl

  - id: python-agent-python-code-desc
    desc: Python agent code execution description
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: literal
      substr: Execute Python code

  - id: python-agent-python-repl-function
    desc: Python agent python_repl function binding
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: text
      substr: function=python_repl

  - id: python-agent-all-tools-default
    desc: Python agent exposes all tools
    crit: component
    conf: 0.9
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: text
      substr: "allowed=None)  # None = all tools"

  - id: python-agent-persistent-user-data
    desc: Python agent persistent user data
    crit: suspicious
    conf: 0.93
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    if:
      type: text
      regex: '~/.flexygent/user/[\s\S]{0,900}(profile\.md|bio\.md)[\s\S]{0,900}memory\.json'

composite_rules:
  - id: python-agent-shell-command-tool
    desc: Python agent shell command tool
    crit: suspicious
    conf: 0.95
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    all:
      - id: python-agent-run-command-name
      - id: python-agent-shell-command-desc
      - id: python-agent-run-command-function
    near_bytes: 700

  - id: python-agent-python-repl-tool
    desc: Python agent REPL execution tool
    crit: suspicious
    conf: 0.95
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    all:
      - id: python-agent-python-repl-name
      - id: python-agent-python-code-desc
      - id: python-agent-python-repl-function
    near_bytes: 900

  - id: python-ai-agent-local-command-bridge
    desc: Python AI agent local command bridge
    crit: hostile
    conf: 0.96
    scope: archive
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    all:
      - id: objectives/evasion/security-bypass/llm/target::llm-agent-target
      - id: python-agent-shell-command-tool
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: micro-behaviors/fs/file/read-write::agent-file-tools
    any:
      - id: python-agent-python-repl-tool
      - id: micro-behaviors/communications/http/llm::openai-function-tool-schema

  - id: python-ai-agent-persistent-local-tools
    desc: Python AI agent persistent local tools
    crit: hostile
    conf: 0.95
    scope: archive
    ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
    all:
      - id: python-ai-agent-local-command-bridge
      - id: python-agent-persistent-user-data
    any:
      - id: python-agent-all-tools-default
      - id: objectives/supply-chain/trojanized/app/ai-agent-tools::pypi-agentic-ai-local-tooling
