defaults:
  platforms: [android]
  for: [apk, zip, java, kotlin]
  attack: T1195.002
traits:
- id: added-zhuagou-entry-activity
  desc: Added zhuagou entry activity
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'com\.(example\.zhuagou(\.SplashScreen)?|mob\.util\.MobSs)'
- id: original-activity-handoff
  desc: Android original activity handoff
  crit: component
  conf: 0.86
  if:
    type: text
    word: originalActivity
- id: main-activity-handoff
  desc: Android main activity handoff
  crit: component
  conf: 0.84
  if:
    type: text
    word: mainActivity
- id: launcher-activity-handoff
  desc: Android launcher activity handoff
  crit: component
  conf: 0.84
  if:
    type: text
    word: launcherActivity
composite_rules:
- id: original-game-activity-handoff
  desc: Backdoor hands off to game
  crit: suspicious
  conf: 0.9
  any:
  - id: micro-behaviors/os/message/intent::android-start-activity
  - id: original-activity-handoff
  - id: main-activity-handoff
  - id: launcher-activity-handoff
- id: android-game-entrypoint-backdoor
  desc: Android game entrypoint backdoor
  crit: hostile
  conf: 0.98
  all:
  - id: added-zhuagou-entry-activity
  any:
  - id: original-game-activity-handoff
  - id: micro-behaviors/os/service/daemon::android-service-reference
  - id: objectives/command-and-control/channel/deaddrop/cloud-storage::android-cloud-storage-command-rat
