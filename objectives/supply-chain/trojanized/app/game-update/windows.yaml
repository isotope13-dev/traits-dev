defaults:
  platforms: [windows]
  for: [pe, dll, csharp, cpp]
  attack: T1195.002
traits:
- id: mono-dll-update-target
  desc: mono.dll update target
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(?i)mono\.dll'
- id: game-client-process-target
  desc: Game client process target
  crit: notable
  conf: 0.84
  if:
    type: text
    regex: '(?i)(sqgame|dating|gameclient|launcher)\.exe'
  downgrade:
    any:
    - id: well-known/app/swifttunnel_vpn::swifttunnel
- id: clean-library-before-mono
  desc: Clean library marker before mono.dll
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)(clean|original).{0,40}mono\.dll'
- id: mono-before-restore-action
  desc: mono.dll before restore action
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)mono\.dll.{0,80}(replace|restore|overwrite)'
- id: shellcode-before-download
  desc: shellcode before download marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)shellcode.{0,80}(download|http|url)'
- id: download-before-shellcode
  desc: download marker before shellcode
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)(download|http|url).{0,80}shellcode'
composite_rules:
- id: clean-library-self-restore
  desc: Clean library self restore
  crit: suspicious
  conf: 0.92
  any:
  - id: clean-library-before-mono
  - id: mono-before-restore-action
- id: shellcode-download-reference
  desc: Shellcode download reference
  crit: suspicious
  conf: 0.92
  any:
  - id: shellcode-before-download
  - id: download-before-shellcode
- id: trojanized-mono-update-downloader
  desc: Trojanized mono update downloader
  crit: hostile
  conf: 0.98
  all:
  - id: mono-dll-update-target
  any:
  - id: shellcode-download-reference
  - id: game-client-process-target
  - id: clean-library-self-restore
  - id: objectives/anti-analysis/tool-detect/process::analysis-tool-enumeration
  needs: 2
- id: trojanized-mono-self-restoring-loader
  desc: Trojanized mono self-restoring loader
  crit: hostile
  conf: 0.99
  all:
  - id: mono-dll-update-target
  - id: clean-library-self-restore
  - id: shellcode-download-reference
  any:
  - id: game-client-process-target
  - id: objectives/anti-analysis/tool-detect/process::analysis-tool-enumeration
