defaults:
  platforms:
  - unix
  - windows
  for: [python, javascript, typescript, java, markdown, macho]
  attack: T1195.002

traits:
- id: skill-prompt-member
  desc: Skill archive prompt member
  crit: component
  conf: 0.92
  if:
    type: text
    substr: /SKILL.md

- id: install-reference-member
  desc: Skill archive install reference
  crit: component
  conf: 0.92
  if:
    type: text
    substr: /references/install/

- id: uninstall-reference-member
  desc: Skill archive uninstall reference
  crit: component
  conf: 0.92
  if:
    type: text
    substr: /references/uninstall/

- id: install-probe-pipe-bash
  desc: Remote probe installer piped to bash
  crit: suspicious
  conf: 0.98
  for: [shell, markdown]
  if:
    type: text
    substr: curl -sL https://raw.githubusercontent.com/Syncause/ts-agent-file

- id: syncause-wheel-release
  desc: Direct GitHub wheel dependency
  crit: suspicious
  conf: 0.96
  for: [python, pyproject.toml]
  if:
    type: text
    substr: syncause_tracer @ https://github.com/Syncause/syncause-sdk/releases/download/

- id: syncause-init-import
  desc: Syncause tracer initialization import
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: from syncause_tracer import initialize

- id: syncause-installation-patch
  desc: Installer saves patch artifact
  crit: notable
  conf: 0.9
  for: [python, javascript, typescript]
  if:
    type: text
    substr: .syncause/installation.patch

- id: syncause-node-instrumentation
  desc: Instrumentation node bootstrap import
  crit: notable
  conf: 0.93
  if:
    type: text
    substr: await import('./instrumentation.node');

- id: syncause-debug-stats-endpoint
  desc: Local debug span stats endpoint
  crit: notable
  conf: 0.96
  if:
    type: text
    substr: http://localhost:43210/remote-debug/spans/stats

- id: syncause-proxy-log
  desc: Probe proxy connection log
  crit: notable
  conf: 0.9
  for: [python, javascript, typescript, java]
  if:
    type: text
    substr: "[DEBUG] Connected to proxy server"

- id: syncause-otel-log
  desc: OpenTelemetry startup log check
  crit: notable
  conf: 0.88
  for: [python, javascript, typescript, java]
  if:
    type: text
    substr: "[DEBUG] OpenTelemetry SDK started"

- id: syncause-repo-token
  desc: Embedded GitHub PAT fragment
  crit: suspicious
  conf: 0.99
  if:
    type: text
    regex: github_pat_[A-Za-z0-9]{22}_[A-Za-z0-9_]{59}
  not:
  - substr: github_pat_access_type

- id: syncause-maven-credential-url
  desc: Credentialized GitHub Packages URL
  crit: suspicious
  conf: 0.98
  for: [java]
  if:
    type: text
    substr: "@maven.pkg.github.com/Syncause/syncause-sdk"

- id: syncause-bytebuddy-plugin
  desc: Syncause ByteBuddy plugin loader
  crit: suspicious
  conf: 0.97
  for: [java]
  if:
    type: text
    substr: com.syncause.bytebuddy.plugin.SyncausePlugin

- id: syncause-codeproxy-websocket
  desc: Syncause codeproxy websocket
  crit: suspicious
  conf: 0.98
  for: [java, javascript, typescript]
  if:
    type: text
    substr: wss://api.syn-cause.com/codeproxy/ws

- id: debug-mcp-package
  desc: Debug MCP latest package install
  crit: suspicious
  conf: 0.96
  for: [javascript, typescript, package.json, markdown]
  if:
    type: text
    substr: "@syncause/debug-mcp@latest"

- id: debug-mcp-server-id
  desc: Debug MCP server identifier
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: debug-mcp-server

- id: cursor-mcp-config
  desc: Cursor MCP config path
  crit: component
  conf: 0.92
  for: [markdown, javascript, typescript]
  if:
    type: text
    substr: .cursor/mcp.json

- id: claude-mcp-config
  desc: Claude MCP config path
  crit: component
  conf: 0.92
  for: [markdown, javascript, typescript, macho]
  if:
    type: text
    substr: .claude/settings.json

- id: claude-code-onboarding
  desc: Claude Code onboarding workflow
  crit: suspicious
  conf: 0.97
  for: [macho]
  if:
    type: text
    substr: Claude Code onboarding

- id: claude-auth-token-env--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [macho]
  if:
    type: text
    substr: CLAUDE_CODE_OAUTH_TOKEN
  count_max: 1027698
- id: anthropic-base-url-env
  desc: Anthropic base URL environment name
  crit: notable
  conf: 0.96
  for: [macho]
  if:
    type: text
    substr: ANTHROPIC_BASE_URL

- id: claude-setup-token-cli
  desc: Claude setup-token CLI guidance
  crit: suspicious
  conf: 0.97
  for: [macho]
  if:
    type: text
    substr: claude setup-token
  unless:
  - id: objectives/supply-chain/trojanized/app/debug-probe::claude-auth-token-env

- id: launchagent-42cc-path
  desc: 42cc LaunchAgent plist path
  crit: suspicious
  conf: 0.98
  for: [macho]
  if:
    type: text
    substr: LibraryLaunchAgents42cc.plist

- id: updater-script-42cc
  desc: 42cc updater shell script
  crit: suspicious
  conf: 0.96
  for: [macho]
  if:
    type: text
    substr: 42cc_update.sh

- id: update-endpoint-42cc
  desc: 42cc version update endpoint
  crit: notable
  conf: 0.96
  for: [macho]
  if:
    type: text
    substr: https://get.42plugin.com/42cc/version.json

- id: codex-mcp-config
  desc: Codex MCP config path
  crit: component
  conf: 0.92
  for: [markdown, cargo.toml]
  if:
    type: text
    substr: .codex/config.toml

- id: gemini-mcp-config
  desc: Gemini MCP config path
  crit: component
  conf: 0.92
  for: [markdown, javascript, typescript]
  if:
    type: text
    substr: .gemini/settings.json

- id: windsurf-mcp-config
  desc: Windsurf MCP config path
  crit: component
  conf: 0.92
  for: [markdown, javascript, typescript]
  if:
    type: text
    substr: .codeium/windsurf/mcp_config.json

- id: opencode-mcp-config
  desc: Opencode MCP config path
  crit: component
  conf: 0.92
  for: [markdown, javascript, typescript]
  if:
    type: text
    substr: .config/opencode/opencode.json

composite_rules:
- id: debugger-skill-archive-layout
  desc: Skill archive carries install and teardown playbooks
  crit: suspicious
  conf: 0.94
  all:
  - id: skill-prompt-member
  - id: install-reference-member
  - id: uninstall-reference-member

- id: cross-ide-debug-mcp-persistence
  desc: Cross-IDE debug MCP persistence bootstrap
  crit: hostile
  conf: 0.99
  all:
  - id: debug-mcp-package
  - id: debug-mcp-server-id
  needs: 3
  any:
  - id: cursor-mcp-config
  - id: claude-mcp-config
  - id: codex-mcp-config
  - id: gemini-mcp-config
  - id: windsurf-mcp-config
  - id: opencode-mcp-config

- id: credentialized-java-probe-loader
  desc: Credentialized Java probe loader with remote websocket
  crit: hostile
  conf: 0.995
  all:
  - id: syncause-repo-token
  - id: syncause-maven-credential-url
  - id: syncause-bytebuddy-plugin
  - id: syncause-codeproxy-websocket

- id: probe-bootstrap-modification
  desc: Probe bootstrap modifies application startup
  crit: suspicious
  conf: 0.97
  all:
  - id: install-probe-pipe-bash
  any:
  - id: syncause-wheel-release
  - id: syncause-init-import
  - id: syncause-node-instrumentation

- id: local-debug-control-plane
  desc: Local debug control plane verification
  crit: suspicious
  conf: 0.96
  any:
  - id: syncause-debug-stats-endpoint
  - id: syncause-proxy-log
  - id: syncause-otel-log
  - id: syncause-installation-patch

- id: remote-instrumentation-bootstrap
  desc: Remote instrumentation bootstrap with local control plane
  crit: hostile
  conf: 0.99
  all:
  - id: probe-bootstrap-modification
  - id: local-debug-control-plane

- id: native-claude-auth-bootstrap
  desc: Native Claude auth bootstrap workflow
  crit: suspicious
  conf: 0.985
  all:
  - id: claude-mcp-config
  - id: claude-auth-token-env
  any:
  - id: claude-code-onboarding
  - id: anthropic-base-url-env
  - id: claude-setup-token-cli
  unless:
  - id: objectives/supply-chain/trojanized/app/debug-probe::claude-auth-token-env

- id: native-claude-launchagent-persistence
  desc: Native Claude manager with launch agent persistence
  crit: hostile
  conf: 0.995
  all:
  - id: native-claude-auth-bootstrap
  - id: launchagent-42cc-path
  any:
  - id: updater-script-42cc
  - id: update-endpoint-42cc
- id: claude-auth-token-env
  desc: Claude auth token environment names
  crit: notable
  conf: 0.98
  for: [macho]
  any:
  - id: claude-auth-token-env--rx-1
  - id: objectives/collection/stealer/data::ai-gateway-anthropic-auth-token
