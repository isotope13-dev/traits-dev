defaults:
  platforms: [windows, unix]
  for: [tar, zip]
  attack: T1195.002,T1105,T1059

traits:
  - id: readme-curl-msi-download
    desc: README downloads an MSI with curl
    crit: notable
    conf: 0.97
    for: [markdown]
    if:
      type: text
      regex: '(?i)curl\s+-Lo\s+.{0,100}\.msi\s+https?://.{1,160}\.msi'

  - id: readme-msiexec-msi-install
    desc: README invokes msiexec on the downloaded MSI
    crit: notable
    conf: 0.97
    for: [markdown]
    if:
      type: text
      regex: '(?i)msiexec(\.exe)?\s+/i\s+.{0,100}\.msi'

  - id: markdown-curl-pipe-shell
    desc: Markdown documents curl-pipe-shell install
    crit: component
    conf: 0.96
    for: [markdown]
    if:
      type: text
      regex: '(?i)curl\s+-fsSL\s+https?://.{4,240}\|\s*(bash|sh)\b'

composite_rules:
  - id: readme-remote-shell-install-command
    desc: README pipes a remote script to shell
    crit: notable
    conf: 0.96
    for: [markdown]
    all:
      - id: metadata/file/extension/identity::markdown-file-basename
      - id: markdown-curl-pipe-shell

  - id: readme-remote-msi-install-command
    desc: README supplies a remote MSI install command
    crit: notable
    conf: 0.98
    for: [markdown]
    all:
      - id: metadata/file/extension/identity::markdown-file-basename
      - id: readme-curl-msi-download
      - id: readme-msiexec-msi-install

  - id: remote-msi-script-installer-bundle
    desc: README combines remote MSI and shell installers
    crit: hostile
    conf: 0.99
    for: [markdown]
    all:
      - id: readme-remote-msi-install-command
      - id: readme-remote-shell-install-command

  - id: cross-platform-remote-script-installer-bundle
    desc: README documents cross-platform remote installers
    crit: hostile
    conf: 0.99
    for: [markdown]
    all:
      - id: readme-remote-msi-install-command
      - id: readme-remote-shell-install-command
      - id: metadata/package/documentation::cross-platform-install-documentation
