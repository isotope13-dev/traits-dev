defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1195.002
  mbc: E1478
traits:
  - id: app-asar-path
    desc: Electron app.asar file path
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)app\.asar
    unless:
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
  - id: resources-app-asar
    desc: Electron resources/app.asar path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)resources[/\\]+app\.asar
    unless:
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
  - id: app-version-dir
    desc: Electron app-* version directory pattern
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '[/\\]app-[0-9*]'
  - id: discord-app-path
    desc: Discord application directory
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)(discord|discordcanary|discordptb)[/\\]
  - id: slack-app-path-macos
    desc: Slack macOS app.asar path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)Slack\.app[/\\]Contents[/\\]Resources[/\\]app\.asar
  - id: slack-app-path-windows
    desc: Slack versioned app.asar path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)[/\\]slack[/\\]app-[0-9][^/\\]{0,24}[/\\]resources[/\\]app\.asar
  - id: teams-app-path-macos
    desc: Teams macOS app.asar path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)Microsoft[ /]Teams\.app[/\\]Contents[/\\]Resources[/\\]app\.asar
  - id: teams-app-path-windows
    desc: Teams versioned app.asar path
    crit: notable
    conf: 0.7
    if:
      type: text
      case_insensitive: true
      regex: '[/\\]Microsoft[/\\]Teams[/\\]app-[0-9][^/\\]{0,24}[/\\]resources[/\\]app\.asar'
  - id: vscode-app-path
    desc: VS Code application directory
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)(visual studio code|[/\\]VS ?Code([/\\]|\.app[/\\]))
  - id: signal-app-path
    desc: Signal application directory
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)Signal[/\\]
  - id: asar-extract-unpack
    desc: asar extract/unpack operation
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)\basar(\.(cmd|exe))?["'\s:=-]{0,20}(extract|unpack)\b
  - id: asar-pack
    desc: asar pack operation
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)\basar(\.(cmd|exe))?["'\s:=-]{0,20}(pack|create)\b
  - id: curl-asar-download
    desc: curl download to asar path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: curl.{0,50}app\.asar
composite_rules:
  - id: slack-app-path
    desc: Slack application directory
    crit: notable
    conf: 0.75
    any:
      - id: slack-app-path-macos
      - id: slack-app-path-windows
  - id: teams-app-path
    desc: Microsoft Teams application directory
    crit: notable
    conf: 0.75
    any:
      - id: teams-app-path-macos
      - id: teams-app-path-windows
  - id: electron-app-paths
    desc: Electron application directory paths
    any:
      - id: discord-app-path
      - id: slack-app-path
      - id: teams-app-path
      - id: vscode-app-path
      - id: signal-app-path
  - id: asar-with-version-dir
    desc: app.asar with version directory
    all:
      - id: app-asar-path
      - id: app-version-dir
  - id: asar-targeting
    desc: Electron app.asar file targeting
    crit: notable
    conf: 0.8
    any:
      - id: resources-app-asar
      - id: asar-with-version-dir
  - id: electron-infection
    desc: Electron application infection pattern
    crit: hostile
    conf: 0.95
    all:
      - id: electron-app-paths
      - id: resources-app-asar
    any:
      - id: asar-extract-unpack
      - id: asar-pack
      - id: curl-asar-download
