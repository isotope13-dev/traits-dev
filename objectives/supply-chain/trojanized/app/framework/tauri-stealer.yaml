# Tauri (Rust desktop framework) apps that import remote-payload-fetch
# or screen/keylog/credential-theft APIs are abusing the framework as
# a stealer/RAT shell — legitimate Tauri apps stick to webview-mediated
# I/O and rarely call URLDownloadToFile, BitBlt, or Toolhelp32 directly.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1036.005
  mbc: F0004
composite_rules:
  - id: tauri-app-remote-payload-stealer
    desc: Tauri app imports remote-fetch and stealer APIs
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/build/framework::tauri-runtime
    any:
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
      - id: micro-behaviors/hardware/input/keyboard/hook::polling-keylogger-api-cluster
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
    needs: 2
    unless:
      - id: metadata/signed/platform/
