# Native payload loader disguised inside an npm package. The combination of
# FFI loading, worker isolation, recursive package deletion, and a binary
# entry with a text extension is an intent-level supply-chain signal.
defaults:
  platforms: [windows, unix]
  for: [npm]
  attack: T1195.002
composite_rules:
  - id: npm-native-loader-self-delete
    desc: npm package self-deletes after loading native payload
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: micro-behaviors/dylib/load/binding::koffi-native-library-load
      - id: micro-behaviors/process/create/workers::worker-constructor-call
      - id: micro-behaviors/fs/file/delete::fs-rmSync
