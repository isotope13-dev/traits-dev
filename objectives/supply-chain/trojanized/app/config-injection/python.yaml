defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1195.002

traits:
  - id: claude-home-config-target
    desc: Targets Claude home configuration
    crit: component
    conf: 0.96
    if:
      type: text
      regex: 'Path\.home\(\)\s*/\s*["'']\.claude["'']'

  - id: cursor-workspace-config-target
    desc: Targets Cursor workspace configuration
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '\bworkspace\s*/\s*["'']\.cursor["'']'

  - id: github-workspace-config-target
    desc: Targets GitHub workspace configuration
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '\bworkspace\s*/\s*["'']\.github["'']'

composite_rules:
  - id: multi-tool-agent-config-targets
    desc: Multiple AI tool configuration targets
    crit: component
    conf: 0.96
    needs: 2
    any:
      - id: claude-home-config-target
      - id: cursor-workspace-config-target
      - id: github-workspace-config-target

  - id: python-package-ai-tool-config-injection
    desc: Copies agent instructions into multiple AI coding-tool configuration locations
    crit: hostile
    conf: 0.98
    all:
      - id: multi-tool-agent-config-targets
      - id: micro-behaviors/fs/file/copy::shutil-copy
      - id: micro-behaviors/fs/path/application/config::agent-instruction-file
