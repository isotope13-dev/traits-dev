defaults:
  platforms: [unix, windows]
  for: [markdown, text, shell, python, javascript, typescript, go, ruby]
  attack: T1195.002

traits:
  - id: repo-agent-rules-apply-every-change
    desc: Repository agent rules apply broadly
    crit: component
    conf: 0.94
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    if:
      type: text
      regex: 'rules apply to \*\*every\*\* change[\s\S]{0,120}agent-driven or human'
      case_insensitive: true

  - id: repo-agent-rules-reject-violations
    desc: Agent rules reject violating code
    crit: component
    conf: 0.9
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    if:
      type: text
      substr: "Code that violates them is rejected"

  - id: repo-agent-rules-fix-existing-violations
    desc: Agent rules force adjacent fixes
    crit: component
    conf: 0.9
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    if:
      type: text
      substr: "fix the violations in that area as part of your change"

  - id: repo-agent-rules-no-ai-attribution
    desc: Agent rules forbid AI attribution
    crit: component
    conf: 0.94
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    if:
      type: text
      regex: 'no AI attribution|Co-Authored-By:\s*Claude|Generated by'
      case_insensitive: true

  - id: claude-guidance-delegates-agents-md
    desc: Claude guidance delegates to AGENTS
    crit: component
    conf: 0.93
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    if:
      type: text
      regex: 'Project guidance for Claude[\s\S]{0,220}AGENTS\.md'
      case_insensitive: true

  - id: pr-template-agent-rules-checklist
    desc: PR template enforces agent rules
    crit: component
    conf: 0.94
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    if:
      type: text
      regex: 'Engineering rules checklist[\s\S]{0,120}AGENTS\.md'
      case_insensitive: true

  - id: pr-template-no-ai-attribution
    desc: PR template forbids AI attribution
    crit: component
    conf: 0.92
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    if:
      type: text
      substr: "Commit messages are imperative, no AI attribution"
      case_insensitive: true

composite_rules:
  - id: packaged-agent-rules-with-attribution-suppression
    desc: Package carries agent rules suppressing AI attribution
    crit: suspicious
    conf: 0.94
    scope: archive
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    all:
      - id: metadata/package/config::agent-instructions-md-basename
      - id: repo-agent-rules-apply-every-change
      - id: repo-agent-rules-no-ai-attribution
    any:
      - id: repo-agent-rules-reject-violations
      - id: repo-agent-rules-fix-existing-violations

  - id: claude-bridge-to-repo-agent-policy
    desc: Claude guidance bridges to repository agent policy
    crit: suspicious
    conf: 0.92
    scope: archive
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    all:
      - id: claude-guidance-delegates-agents-md
      - id: repo-agent-rules-apply-every-change
      - id: repo-agent-rules-no-ai-attribution

  - id: pr-template-enforces-agent-policy
    desc: PR template enforces hidden agent policy
    crit: suspicious
    conf: 0.93
    scope: archive
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    all:
      - id: pr-template-agent-rules-checklist
      - id: pr-template-no-ai-attribution
    any:
      - id: repo-agent-rules-apply-every-change
      - id: micro-behaviors/fs/path/application/config::agent-instruction-file
