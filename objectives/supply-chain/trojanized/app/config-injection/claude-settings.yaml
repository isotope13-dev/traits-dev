defaults:
  platforms: [windows, unix]
  for: [json]
  attack: T1195.002

composite_rules:
  - id: claude-settings-api-endpoint-credential-redirect
    desc: Claude settings redirect API and embed token
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/application/config::claude-settings-json
      - id: micro-behaviors/os/env/vars/access::anthropic-base-url-variable
      - id: micro-behaviors/os/env/vars/access::anthropic-auth-token-variable
      - id: micro-behaviors/process/create/shell/agent-config::ai-agent-statusline-cached-plugin-wrapper
