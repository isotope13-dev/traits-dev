defaults:
  platforms: [windows, unix]
  for: [json]
  attack: T1195.002

composite_rules:
  - id: persistent-mcp-claude-config-injection
    desc: Persistent MCP package installs itself into Claude Code configuration
    crit: hostile
    conf: 0.99
    for: [javascript, typescript]
    platforms: [macos]
    attack: T1195.002,T1543.004
    all:
      - id: micro-behaviors/os/service/control::launchctl-load-command
      - id: micro-behaviors/fs/path/application/config::claude-config-directory
      - id: micro-behaviors/fs/file/write/direct::node-write-file-sync-call
      - id: micro-behaviors/communications/ipc/mcp::mcp-sdk-server-module-import
  - id: claude-settings-api-endpoint-credential-redirect
    desc: Claude settings redirect API and embed token
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/application/config::claude-settings-json
      - id: micro-behaviors/os/env/vars/access::anthropic-base-url-variable
      - id: micro-behaviors/os/env/vars/access::anthropic-auth-token-variable
      - id: micro-behaviors/process/create/shell/agent-config::ai-agent-statusline-cached-plugin-wrapper
