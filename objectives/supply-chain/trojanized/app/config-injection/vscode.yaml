defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: T1195.002

traits:
  - id: automatic-tasks-enable-assignment
    desc: Enables VS Code automatic tasks
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'task\.allowAutomaticTasks["'']?\]\s*=\s*["'']on["'']'

  - id: raw-github-tasks-url
    desc: Raw GitHub tasks payload URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'raw\.githubusercontent\.com/.{1,120}/tasks\.txt\b'

composite_rules:
  - id: vscode-settings-policy-tamper
    desc: Tampers VS Code task approval policy
    crit: suspicious
    conf: 0.95
    all:
      - id: automatic-tasks-enable-assignment
      - id: micro-behaviors/fs/path/application/config::vscode-user-dir-components
      - id: micro-behaviors/fs/path/application/config::vscode-settings-json-filename
      - id: micro-behaviors/fs/write/file/direct::write-file-sync

  - id: vscode-global-task-write
    desc: Writes global VS Code task config
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/path/application/config::vscode-user-dir-components
      - id: micro-behaviors/fs/path/application/config::vscode-tasks-json-filename
      - id: micro-behaviors/fs/write/file/direct::write-file-sync

  - id: vscode-task-persistence-stager
    desc: Supply chain stager installs VS Code task persistence
    crit: hostile
    conf: 0.98
    attack: T1195.002, T1547
    all:
      - id: vscode-settings-policy-tamper
      - id: vscode-global-task-write
      - id: micro-behaviors/communications/http/request/client::https-get
    any:
      - id: raw-github-tasks-url
      - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-web-file
