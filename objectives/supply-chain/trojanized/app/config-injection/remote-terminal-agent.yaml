# AI client configuration coupled to persistent remote terminal control.
defaults:
  platforms: [unix, windows]
  for: [python, pyc, whl]
  attack: T1195.002

composite_rules:
  - id: ai-client-config-remote-terminal-agent
    desc: AI client config installs remote terminal agent
    crit: hostile
    conf: 0.995
    scope: archive
    attack: "T1195.002,T1059,T1071.001"
    all:
      - id: objectives/command-and-control/backdoor/rat/remote-agent::python-remote-terminal-control
      - id: objectives/supply-chain/trojanized/app/config-injection::python-multi-agent-mcp-config-writer
    any:
      - id: objectives/persistence/system/service/systemd::systemd-user-persistence
      - id: objectives/persistence/login/scheduled-task/cli::windows-schtasks-create
      - id: objectives/persistence/system/launchd/source::source-launchd-user-persistence
