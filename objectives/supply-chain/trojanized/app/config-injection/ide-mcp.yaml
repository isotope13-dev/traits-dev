# IDE configuration injection
# Detects writing to AI coding assistant MCP/config files to inject
# malicious server configurations, exfiltrate tokens, or redirect
# tool calls to attacker-controlled endpoints.
defaults:
  platforms: [windows, unix]
  for:
    - shell
    - javascript
    - typescript
    - python
    - powershell
    - go
  attack: T1195.002
traits:
  # === MCP config filenames ===
  # These files are the config targets for AI IDE MCP injection.
  # path.join() splits components into separate strings, so we
  # match the config filename + IDE directory indicator separately.

  - id: mcp-json-filename
    desc: MCP config filename (mcp.json)
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "mcp.json"

  - id: mcp-config-json-filename
    desc: MCP config filename (mcp_config.json)
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "mcp_config.json"

  # === IDE directory indicators ===
  # Use substr — in shell, these appear inside path strings
  # like "$home/.cursor/mcp.json", not as standalone values.

  - id: cursor-dir
    desc: Cursor IDE config directory (.cursor)
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ".cursor"

  - id: windsurf-dir
    desc: Windsurf IDE config indicator
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "windsurf"

  - id: codeium-dir
    desc: Codeium/Windsurf config directory (.codeium)
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ".codeium"

  - id: kiro-dir
    desc: Kiro IDE config directory (.kiro)
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ".kiro"

  # === JWT decode for token exfiltration ===
  - id: jwt-decode-import
    desc: JWT decode library import
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "jwt-decode"

composite_rules:
  # MCP config + any IDE directory = config injection
  - id: mcp-config-injection
    desc: MCP configuration injection (multi-IDE)
    crit: hostile
    conf: 0.95
    all:
      - id: mcp-json-filename
    needs: 2
    any:
      - id: cursor-dir
      - id: codeium-dir
      - id: kiro-dir

  # mcp_config.json variant (Windsurf)
  - id: windsurf-mcp-injection
    desc: Windsurf MCP configuration injection
    crit: suspicious
    conf: 0.9
    all:
      - id: mcp-config-json-filename
    any:
      - id: windsurf-dir
      - id: codeium-dir

  # JWT decode + MCP config = token exfiltration
  - id: mcp-token-exfiltration
    desc: JWT token exfiltration via MCP config
    crit: hostile
    conf: 0.95
    all:
      - id: jwt-decode-import
    any:
      - id: mcp-json-filename
      - id: mcp-config-json-filename
