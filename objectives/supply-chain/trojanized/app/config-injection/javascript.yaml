defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
traits:
- id: js-build-config-target--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (postcss|tailwind)\.config\.(js|mjs|ts)
  count_max: 1028363
- id: js-build-config-target--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (eslint|next)\.config\.(js|mjs|ts)
  count_max: 1028364
- id: js-build-config-target--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (vite|webpack)\.config\.(js|mjs|ts)
  unless:
  - id: metadata/library/structure::js-known-bundler-output
  - id: metadata/lang/scripted::dts-declaration-file
  count_max: 1028365
- id: js-build-config-target--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (astro|vue)\.config\.(js|mjs|ts)
  count_max: 1028366
- id: js-build-config-target--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (vitest|playwright)\.config\.(js|mjs|ts)
  count_max: 1028367
- id: js-build-config-target--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (cypress|docusaurus)\.config\.(js|mjs|ts)
  count_max: 1028368
- id: js-build-config-target--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (remix|svelte)\.config\.(js|mjs|ts)
  count_max: 1028369
- id: js-build-config-target--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: truffle.js
  count_max: 1028370
- id: js-build-config-basename
  desc: Common JS build config filename
  crit: component
  conf: 0.93
  if:
    type: path
    basename: true
    regex: '^(postcss|tailwind)\.config\.(js|mjs|ts)$'
- id: js-build-config-direct-basename
  desc: Common JS build config filename
  crit: component
  conf: 0.94
  if:
    type: basename
    regex: '^(vite|webpack|postcss|tailwind)\.config\.(js|mjs|ts)$'
- id: js-build-config-path
  desc: Common JS build config path
  crit: component
  conf: 0.93
  if:
    type: path
    regex: '(^|/)(postcss|tailwind)\.config\.(js|mjs|ts)$'
- id: js-config-export-default
  desc: JavaScript config exports default object
  crit: component
  conf: 0.82
  if:
    type: text
    regex: 'export\s+default\s*\{'
- id: js-config-plugins-object
  desc: JavaScript config declares plugins object
  crit: component
  conf: 0.82
  if:
    type: text
    regex: 'plugins\s*:\s*\{'
- id: postcss-tailwind-plugin-name
  desc: PostCSS/Tailwind plugin config name
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\b(tailwindcss|autoprefixer)\s*:'
- id: postcss-tailwind-eval-atob-payload
  desc: Build config eval-atob payload
  crit: suspicious
  conf: 0.98
  mbc: E1059
  if:
    type: text
    regex: '(tailwindcss|autoprefixer)\s*:[\s\S]{0,260}eval\(\s*atob\s*\('
  unless:
  - id: metadata/package/testing/
# NOTE: js-export-boundary (module.exports / export default) is neutral JS
# syntax present in every module, so it lives at
# metadata/lang/scripted::js-export-boundary and is referenced cross-tier by the
# exports-anchor composite below (proximity to a build-config target is what
# makes it injection-relevant).
- id: cwd-root-targeting--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(postcss|tailwind)\.config
  count_max: 1028372
- id: cwd-root-targeting--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(eslint|next)\.config
  count_max: 1028373
- id: cwd-root-targeting--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(vite|webpack)\.config
  count_max: 1028374
- id: cwd-root-targeting--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(astro|vue)\.config
  count_max: 1028375
- id: cwd-root-targeting--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(vitest|playwright)\.config
  count_max: 1028376
- id: cwd-root-targeting--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(cypress|docusaurus)\.config
  count_max: 1028377
- id: cwd-root-targeting--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(remix|svelte)\.config
  count_max: 1028378
- id: test-fn-tmpdir-fp-pattern
  desc: Test function with tmpdir argument marker
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: 'function\s+\w*[Tt]est\w*\s*\([^)]{0,80}\btmp[Dd]ir\b'
- id: config-hidden-global-require
  desc: Config hides global require alias
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "global[_$_"
- id: config-hidden-iife-tail
  desc: Config has hidden IIFE tail
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: text.max_inline_whitespace_run
    min: 300
composite_rules:
- id: js-build-config-compatibility-marker
  desc: JS build-config-injector compat noise markers
  crit: notable
  any:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/testing/presence/harness::test-utils-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  - id: metadata/package/testing/scripted::mocha
  - id: metadata/package/testing/scripted::js-bdd-functions
  - id: metadata/build/scaffold::node-project-scaffold-template-writer
  - id: metadata/build/scaffold::node-project-scaffolder-file-writer
  - id: test-fn-tmpdir-fp-pattern
- id: exports-anchor
  desc: References export boundary in config
  crit: component
  conf: 0.8
  near_lines: 5
  all:
  - id: js-build-config-target
  - id: metadata/lang/scripted::js-export-boundary
- id: hidden-build-config-loader
  desc: Hidden build config loader
  crit: hostile
  conf: 0.97
  all:
  - id: exports-anchor
  - id: config-hidden-iife-tail
  any:
  - id: config-hidden-global-require
  - id: micro-behaviors/data/source/property/computed::js-global-require-alias
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::whitespace-hidden-eval
  unless:
  - id: objectives/supply-chain/trojanized/app/config-injection/
- id: build-config-eval-atob-payload
  desc: Build config executes Base64-decoded payload
  crit: hostile
  conf: 0.98
  mbc: E1059
  all:
  - id: js-build-config-target
  - id: objectives/supply-chain/hidden-payload/encoding::eval-atob
  unless:
  - id: metadata/package/testing/
  - id: well-known/tool/detection/
- id: build-config-remote-function-loader
  desc: Build config executes remote Function payload
  crit: hostile
  conf: 0.995
  mbc: E1059
  all:
  - id: js-build-config-target
  - id: objectives/command-and-control/dropper/delivery/fetch-eval::request-body-function-loader
  any:
  - id: objectives/supply-chain/trojanized/library/remote-eval::import-time-init-plugin
  - id: objectives/supply-chain/trojanized/library/remote-eval::custom-bearrtoken-header
  unless:
  - id: metadata/package/testing/
  - id: well-known/tool/detection/
- id: postcss-tailwind-eval-atob-loader
  desc: PostCSS/Tailwind build config eval-atob loader
  crit: hostile
  conf: 0.99
  mbc: E1059
  all:
  - id: postcss-tailwind-eval-atob-payload
  - id: objectives/supply-chain/hidden-payload/encoding::eval-atob
- id: postcss-config-shape
  desc: PostCSS/Tailwind config object shape
  crit: component
  conf: 0.9
  all:
  - id: js-config-export-default
  - id: js-config-plugins-object
  - id: postcss-tailwind-plugin-name
- id: config-target-write
  desc: Writes or appends to config target
  crit: suspicious
  conf: 0.94
  all:
  - id: js-build-config-target
  any:
  - id: micro-behaviors/fs/write/file
  unless:
  - id: objectives/supply-chain/trojanized/app/config-injection/
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
- id: js-build-config-injector
  desc: Trojanized JS build config injector
  crit: hostile
  conf: 0.95
  all:
  - id: config-target-write
  any:
  - id: cwd-root-targeting
  - id: exports-anchor
  unless:
  - id: objectives/supply-chain/trojanized/app/config-injection/
- id: js-build-config-target
  desc: Targets common JS build config file
  crit: component
  conf: 0.92
  any:
  - id: js-build-config-target--rx-1
  - id: js-build-config-target--rx-2
  - id: js-build-config-target--rx-3
  - id: js-build-config-target--rx-4
  - id: js-build-config-target--rx-5
  - id: js-build-config-target--rx-6
  - id: js-build-config-target--rx-7
  - id: js-build-config-target--rx-8
  - id: js-build-config-basename
  - id: js-build-config-direct-basename
  - id: js-build-config-path
  - id: postcss-config-shape
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/harness/
  - id: metadata/package/testing/scripted/
  - id: metadata/package/testing/scripted/
  - id: metadata/package/testing/scripted/
  - id: metadata/library/structure::js-known-bundler-output
  - id: metadata/lang/scripted::dts-declaration-file
- id: cwd-root-targeting
  desc: Targets project root via cwd join
  crit: suspicious
  conf: 0.82
  any:
  - id: cwd-root-targeting--rx-9
  - id: cwd-root-targeting--rx-10
  - id: cwd-root-targeting--rx-11
  - id: cwd-root-targeting--rx-12
  - id: cwd-root-targeting--rx-13
  - id: cwd-root-targeting--rx-14
  - id: cwd-root-targeting--rx-15
