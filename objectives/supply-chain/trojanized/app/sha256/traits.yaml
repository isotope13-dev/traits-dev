defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]
composite_rules:
  - id: hostile-obfuscated-ip-exfiltration
    desc: Exfiltrates data to an obfuscated hardcoded IP address
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/command-and-control/infrastructure/domain/tld::ip-address-url
      - id: objectives/exfiltration/oob/endpoint::http-b64
      - id: objectives/collection/stealer/browser::json-stringify-post-body

  - id: hostile-hidden-stager
    desc: Obfuscated JS stager decoding payloads
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::hex-variable-names
      - id: objectives/supply-chain/hidden-payload/staging::b64-to-buffer

  - id: suspicious-npm-imposter
    desc: Theft-themed npm package with placeholder version
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming::name-theft-target-combo
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-version-0-0-0
