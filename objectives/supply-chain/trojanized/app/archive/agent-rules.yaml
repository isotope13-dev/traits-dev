defaults:
  platforms: [unix, windows]
  for: [zip, tar]
  attack: T1195.002

composite_rules:
  - id: source-archive-enforced-agent-policy
    desc: Source archive carries enforced agent policy
    crit: suspicious
    conf: 0.93
    scope: archive
    ref: sha256:9a9053d392771d26bd2bb934b7796f8945487c8e864072c181c1e7bd6828f745
    all:
      - id: metadata/package/config::agent-instructions-md-basename
      - id: objectives/supply-chain/trojanized/app/config-injection::packaged-agent-rules-with-attribution-suppression
    any:
      - id: objectives/supply-chain/trojanized/app/config-injection::claude-bridge-to-repo-agent-policy
      - id: objectives/supply-chain/trojanized/app/config-injection::pr-template-enforces-agent-policy

  - id: source-archive-agent-rewrite-policy
    desc: Source archive carries agent rewrite policy
    crit: suspicious
    conf: 0.93
    scope: archive
    ref: sha256:df623f9857e2bb4a24abb5f654a80453081dc60db04f7299724c3d4b343da9be
    all:
      - id: metadata/package/config::agent-instructions-md-basename
      - id: objectives/supply-chain/trojanized/app/config-injection::repo-agent-policy-forces-adjacent-rewrite
    any:
      - id: objectives/supply-chain/trojanized/app/config-injection::claude-bridge-to-repo-agent-policy
      - id: objectives/supply-chain/trojanized/app/config-injection::pr-template-enforces-agent-policy
