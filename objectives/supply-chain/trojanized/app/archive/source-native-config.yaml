defaults:
  platforms: [unix, windows]
  for: [zip]
  attack: T1195.002

composite_rules:
  - id: github-source-archive-native-config-implant
    desc: GitHub source archive bundles native executables with encrypted config
    crit: hostile
    conf: 0.92
    ref: sha256:2b9abb9bb2abc5158ee389aff85055f397ce874a57b5ac9d807fa6c527a949bd
    scope: archive
    all:
      - id: metadata/package/quality/source::source-archive-member
      - id: metadata/build/archive::github-source-root-native-binary-entry
      - id: metadata/build/archive::archive-pgp-config-entry
