# A browser extension whose own store listing advertises bulk data harvesting —
# broad reach over a user's logged-in sessions plus a stated intent to collect
# and export. The privacy/exfiltration risk is the combination of platform reach
# and declared harvesting intent, read from the registry (store) listing.
defaults:
  for: [all]
  platforms: [unix, windows, android, ios]

composite_rules:
- id: social-media-data-harvester-extension
  desc: Browser extension whose store listing advertises bulk social-media harvesting
  crit: suspicious
  conf: 0.85
  all:
    - id: metadata/registry::browser-extension
    - id: metadata/registry::harvesting-claim
  any:
    - id: metadata/registry::freshly-published
    - id: metadata/registry::low-adoption
