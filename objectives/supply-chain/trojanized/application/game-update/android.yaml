defaults:
  platforms: [android]
  for: [apk, zip, java, kotlin]
  attack: T1195.002
traits:
- id: added-zhuagou-entry-activity
  desc: Added zhuagou entry activity
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'com\.(example\.zhuagou(\.SplashScreen)?|mob\.util\.MobSs)'
- id: start-activity-handoff
  desc: Android startActivity handoff
  crit: component
  conf: 0.86
  if:
    type: text
    exact: startActivity
- id: original-activity-handoff
  desc: Android original activity handoff
  crit: component
  conf: 0.86
  if:
    type: text
    exact: originalActivity
- id: main-activity-handoff
  desc: Android main activity handoff
  crit: component
  conf: 0.84
  if:
    type: text
    exact: mainActivity
- id: launcher-activity-handoff
  desc: Android launcher activity handoff
  crit: component
  conf: 0.84
  if:
    type: text
    exact: launcherActivity
- id: trojanized-game-extra-services
  desc: Game APK adds services
  crit: notable
  conf: 0.84
  count_min: 2
  if:
    type: text
    regex: 'android\.app\.Service|<service|JobService|ForegroundService'
composite_rules:
- id: original-game-activity-handoff
  desc: Backdoor hands off to game
  crit: suspicious
  conf: 0.9
  any:
  - id: start-activity-handoff
  - id: original-activity-handoff
  - id: main-activity-handoff
  - id: launcher-activity-handoff
- id: android-game-entrypoint-backdoor
  desc: Android game entrypoint backdoor
  crit: hostile
  conf: 0.98
  all:
  - id: added-zhuagou-entry-activity
  any:
  - id: original-game-activity-handoff
  - id: trojanized-game-extra-services
  - id: objectives/command-and-control/backdoor/binary/cloud-storage::android-cloud-storage-command-rat
