defaults:
  platforms: [windows, macos]
  for: [pe, macho]
  crit: hostile
  conf: 0.95

traits:
  - id: benign-generic-utility-basename
    desc: Generic utility filename used by benign installers
    crit: component
    conf: 0.85
    if:
      type: basename
      regex: '(?i)^(DLL|Uninstal|Zip32)\.(exe|SFX)$'
  - id: putty-identity-string
    desc: PuTTY identity string
    crit: component
    conf: 0.85
    if:
      type: text
      substr: PuTTY
composite_rules:
  - id: putty-crypto-library-context
    desc: PuTTY crypto implementation context
    crit: component
    conf: 0.9
    all:
      - id: putty-identity-string
      - id: micro-behaviors/crypto/kdf::pbkdf2
  - id: benign-bundled-tool-context
    desc: Benign bundled tool context
    crit: component
    conf: 0.9
    any:
      - id: putty-crypto-library-context
      - id: metadata/package/tooling::tool-identity-7zip

  - id: trojanized-system-utility-dropper
    desc: Trojanized system utility or hardware monitor dropper
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/package/tooling::trusted-tool-impersonator-context
    any:
      - id: suspicious-installer-behavior
      - id: brand-confusion-identity-anomaly
      - id: low-integrity-installer-packaging
    unless:
      - id: metadata/binary/installer/sfx::winrar-sfx
      - id: metadata/signed/developer::bitdefender-srl
      - id: metadata/signed/developer::valve-corp.
      - id: metadata/binary/installer/script::nsis
      - id: benign-generic-utility-basename
      - id: well-known/lib/wine::wine-runtime-component
      - id: benign-bundled-tool-context

  - id: suspicious-installer-behavior
    desc: Installer with anomalous execution capabilities
    crit: component
    conf: 0.95
    any:
      - id: micro-behaviors/os/com::safearray-put-element
      - id: micro-behaviors/crypto/kdf::pbkdf2
      - id: metadata/binary/installer/script::inno-password-canary
      - id: metadata/binary/installer/script::inno-bcrypt-random
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/signed/platform::microsoft

  - id: brand-confusion-identity-anomaly
    desc: High-trust identity with branding or structural inconsistencies
    crit: suspicious
    conf: 0.95
    any:
      - id: objectives/evasion/masquerade/brand::brand-confusion-cpuid-hwinfo
      - id: objectives/evasion/masquerade/brand::brand-confusion-cpuid-mismatch
    unless:
      - id: metadata/signed/leaf::microsoft-corporation

  - id: low-integrity-installer-packaging
    desc: High-trust tool delivered via low-integrity packaging
    crit: component
    conf: 0.9
    all:
      - id: metadata/binary/layout::has-overlay
    any:
      - id: metadata/binary/layout::pe-checksum-zeroed
      - id: metadata/signed::unsigned-pe-executable
      - id: metadata/binary/section/names::reloc-section-high-entropy
    unless:
      - id: metadata/binary/layout::pe-signature-present
      - id: metadata/signed/developer::martin-tofall
