defaults:
  platforms:
    - macos
    - unix
  for:
    - javascript
  attack: T1195.002
  mbc: E1478

traits:
  - id: cursor-app-dist-path
    desc: Cursor extension dist path
    crit: notable
    conf: 0.98
    if:
      type: string_value
      exact: /Applications/Cursor.app/Contents/Resources/app/extensions/cursor-always-local/dist

  - id: cursor-main-backup-name
    desc: Cursor main.js backup name
    crit: notable
    conf: 0.92
    if:
      type: string_value
      exact: main.js.bak

  - id: cursor-process-pgrep
    desc: pgrep checks Cursor app
    crit: notable
    conf: 0.95
    if:
      type: string_value
      exact: 'pgrep -f "Cursor.app"'

  - id: sw2031-api-host
    desc: Hardcoded sw2031 API host
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      exact: https://t.sw2031.com

  - id: sw2031-login-host
    desc: Hardcoded sw2031 login host
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      exact: https://cursor.sw2031.com

  - id: placeholder-credential-rewrite
    desc: Rewrites staged credential placeholder
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: replace\(['"]test:123456['"]

  - id: cursor-main-write
    desc: Writes Cursor main.js payload
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      substr: "fs.writeFileSync(path.join(dir, 'main.js'), cursorJsstr)"

  - id: cursor-main-backup-copy
    desc: Copies Cursor main.js backup
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      substr: "fs.copyFileSync(path.join(dir, 'main.js'), backupPath)"

composite_rules:
  - id: cursor-mainjs-patching
    desc: Patches Cursor extension main.js
    crit: suspicious
    conf: 0.96
    all:
      - id: cursor-app-dist-path
      - id: cursor-main-backup-name
      - id: cursor-main-write
      - id: cursor-main-backup-copy

  - id: staged-cursor-gateway-patcher
    desc: Encrypted staged Cursor gateway patcher
    crit: hostile
    conf: 0.99
    all:
      - id: cursor-mainjs-patching
      - id: cursor-process-pgrep
      - id: sw2031-api-host
      - id: sw2031-login-host
      - id: placeholder-credential-rewrite
      - id: objectives/command-and-control/dropper::buffer-from-base64-dup
      - id: micro-behaviors/crypto/symmetric/aes::aes-256-cbc
      - id: micro-behaviors/crypto/symmetric/aes::gunzip-function
