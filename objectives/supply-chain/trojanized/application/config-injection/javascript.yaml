defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
traits:
- id: js-build-config-target--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (postcss|tailwind)\.config\.(js|mjs|ts)
- id: js-build-config-target--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (eslint|next)\.config\.(js|mjs|ts)
- id: js-build-config-target--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (vite|webpack)\.config\.(js|mjs|ts)
- id: js-build-config-target--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (astro|vue)\.config\.(js|mjs|ts)
- id: js-build-config-target--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (vitest|playwright)\.config\.(js|mjs|ts)
- id: js-build-config-target--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (cypress|docusaurus)\.config\.(js|mjs|ts)
- id: js-build-config-target--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (remix|svelte)\.config\.(js|mjs|ts)
- id: js-build-config-target--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: truffle\.js
- id: js-export-boundary
  desc: References JavaScript export boundary
  crit: component
  conf: 0.8
  if:
    type: text
    regex: module\.exports|export\s+default
- id: cwd-root-targeting--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(postcss|tailwind)\.config
- id: cwd-root-targeting--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(eslint|next)\.config
- id: cwd-root-targeting--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(vite|webpack)\.config
- id: cwd-root-targeting--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(astro|vue)\.config
- id: cwd-root-targeting--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(vitest|playwright)\.config
- id: cwd-root-targeting--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(cypress|docusaurus)\.config
- id: cwd-root-targeting--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (process\.cwd\(\)|__dirname).{0,80}(remix|svelte)\.config
- id: test-fn-tmpdir-fp-pattern
  desc: Test function with tmpdir argument context
  crit: component
  conf: 0.7
  if:
    type: text
    regex: 'function\s+\w*[Tt]est\w*\s*\([^)]{0,80}\btmp[Dd]ir\b'
composite_rules:
- id: js-build-config-fp-context
  desc: JS build-config-injector false-positive contexts
  crit: component
  any:
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-directory
  - id: metadata/package/testing/presence::test-utils-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  - id: metadata/package/testing/scripted::mocha
  - id: metadata/package/testing/scripted::js-bdd-functions
  - id: objectives/supply-chain/trojanized/application/context::benign-build-script-context
  - id: test-fn-tmpdir-fp-pattern
- id: exports-anchor
  desc: References export boundary in config
  crit: component
  conf: 0.8
  near_lines: 5
  all:
  - id: js-build-config-target
  - id: js-export-boundary
- id: config-target-write
  desc: Writes or appends to config target
  crit: suspicious
  conf: 0.94
  all:
  - id: js-build-config-target
  any:
  - id: micro-behaviors/fs/write/file
  unless:
  - id: js-build-config-fp-context
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/tooling::webpack-bundled
  - id: metadata/package/tooling::esbuild-bundled
- id: js-build-config-injector
  desc: Trojanized JS build config injector
  crit: hostile
  conf: 0.95
  all:
  - id: config-target-write
  any:
  - id: cwd-root-targeting
  - id: exports-anchor
  unless:
  - id: js-build-config-fp-context
- id: js-build-config-target
  desc: Targets common JS build config file
  crit: component
  conf: 0.92
  any:
  - id: js-build-config-target--rx-1
  - id: js-build-config-target--rx-2
  - id: js-build-config-target--rx-3
  - id: js-build-config-target--rx-4
  - id: js-build-config-target--rx-5
  - id: js-build-config-target--rx-6
  - id: js-build-config-target--rx-7
  - id: js-build-config-target--rx-8
  needs: 1
  unless:
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  - id: metadata/package/testing/scripted::mocha
  - id: metadata/package/testing/scripted::js-bdd-functions
- id: cwd-root-targeting
  desc: Targets project root via cwd join
  crit: suspicious
  conf: 0.82
  any:
  - id: cwd-root-targeting--rx-9
  - id: cwd-root-targeting--rx-10
  - id: cwd-root-targeting--rx-11
  - id: cwd-root-targeting--rx-12
  - id: cwd-root-targeting--rx-13
  - id: cwd-root-targeting--rx-14
  - id: cwd-root-targeting--rx-15
  needs: 1
