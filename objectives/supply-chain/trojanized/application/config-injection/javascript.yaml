defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
traits:
  - id: js-build-config-target
    desc: Targets common JS build config file
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: (postcss|tailwind|eslint|next|vite|webpack|astro|vue|vitest|playwright|cypress|docusaurus|remix|svelte)\.config\.(js|mjs|ts)|truffle\.js
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/scripted::js-bdd-suite-text
      - id: metadata/package/testing/scripted::mocha
      - id: metadata/package/testing/scripted::js-bdd-functions
  - id: js-export-boundary
    desc: References JavaScript export boundary
    crit: component
    conf: 0.8
    if:
      type: text
      regex: module\.exports|export\s+default
  - id: cwd-root-targeting
    desc: Targets project root via cwd join
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: (process\.cwd\(\)|__dirname).{0,80}(postcss|tailwind|eslint|next|vite|webpack|astro|vue|vitest|playwright|cypress|docusaurus|remix|svelte)\.config
composite_rules:
  - id: exports-anchor
    desc: References export boundary in config
    crit: notable
    conf: 0.8
    all:
      - id: js-build-config-target
      - id: js-export-boundary
  - id: config-target-write
    desc: Writes or appends to config target
    crit: suspicious
    conf: 0.94
    all:
      - id: js-build-config-target
    any:
      - id: micro-behaviors/fs/write/file
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/scripted::js-bdd-suite-text
      - id: metadata/package/testing/scripted::mocha
      - id: metadata/package/testing/scripted::js-bdd-functions
  - id: js-build-config-injector
    desc: Trojanized JS build config injector
    crit: hostile
    conf: 0.95
    all:
      - id: config-target-write
    any:
      - id: cwd-root-targeting
      - id: exports-anchor
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/scripted::js-bdd-suite-text
      - id: metadata/package/testing/scripted::mocha
      - id: metadata/package/testing/scripted::js-bdd-functions
