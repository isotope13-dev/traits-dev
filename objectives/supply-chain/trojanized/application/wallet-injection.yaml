# Wallet App Source Code Injection
# Detects injection markers and hooks in trojanized wallet applications
# Used by Shub stealer and similar wallet-targeting campaigns
# ATT&CK: T1195.002 (Supply Chain Compromise)
defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
  for:
    - javascript
    - typescript
  attack: T1195.002
  mbc: B0024
traits:
  - id: webpack-hook-comment
    desc: WEBPACK HOOK injection marker
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: WEBPACK\s+HOOK
  - id: steal-bip39-comment
    desc: BIP39 steal marker in source
    crit: suspicious
    conf: 0.95
    attack: T1555
    if:
      type: text
      regex: (?i)STEAL.{0,20}BIP39
  - id: steal-mnemonic-comment
    desc: Mnemonic steal marker in source
    crit: suspicious
    conf: 0.95
    attack: T1555
    if:
      type: text
      regex: (?i)STEAL.{0,20}MNEMONIC
  - id: seed-capture-hook
    desc: Seed phrase capture code
    crit: suspicious
    conf: 0.9
    attack: T1555
    if:
      type: text
      regex: (?i)seed.{0,40}(capture|intercept|hook)
  - id: mnemonic-grab-hook
    desc: Mnemonic grab/steal code
    crit: suspicious
    conf: 0.9
    attack: T1555
    if:
      type: text
      regex: (?i)mnemonic.{0,40}(grab|steal|exfil)
composite_rules:
  - id: wallet-source-injection
    desc: Wallet app source code injection
    crit: hostile
    conf: 0.95
    any:
      - id: webpack-hook-comment
      - id: steal-bip39-comment
      - id: steal-mnemonic-comment
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: wallet-hook-pattern
    desc: Wallet application hook pattern
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/credential-access/wallet/mnemonic::wallet-context
    any:
      - id: seed-capture-hook
      - id: mnemonic-grab-hook
      - id: webpack-hook-comment
