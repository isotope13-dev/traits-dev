defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]

traits:
  - id: benign-yarn-lowprimes-bundle
    desc: Yarn standalone lowprimes constant
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "var lowprimes = [2,3,5,7,11,13,17,19"
  - id: erlang-module-marker
    desc: Erlang module declaration marker
    crit: component
    conf: 1.0
    if:
      type: text
      substr: "-module("
  - id: gemini-cli-core-import
    desc: Gemini CLI core import
    crit: component
    conf: 1.0
    if:
      type: text
      substr: "@google/gemini-cli-core"
  - id: gemini-sandbox-var
    desc: Gemini sandbox env selector
    crit: component
    conf: 1.0
    if:
      type: text
      substr: "GEMINI_SANDBOX"
  - id: typescript-diagnostics-bundle
    desc: TypeScript diagnostics bundle marker
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "This_module_can_only_be_referenced_with_ECMAScript_imports"
  - id: tencent-tc3-hmac-sha256
    desc: Tencent TC3 HMAC marker
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "TC3-HMAC-SHA256"
  - id: tencent-tc-action-header
    desc: Tencent TC action header
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "X-TC-Action"
  - id: tencent-tc-timestamp-header
    desc: Tencent TC timestamp header
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "X-TC-Timestamp"
  - id: wordpress-develop-marker
    desc: WordPress develop repository marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "wordpress-develop"
  - id: wordpress-env-example
    desc: WordPress local environment example file marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: ".env.example"
  - id: wordpress-local-memcached-var
    desc: WordPress local PHP memcached environment variable
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "LOCAL_PHP_MEMCACHED"
  - id: docker-toolbox-path-var
    desc: Docker Toolbox install path variable
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "DOCKER_TOOLBOX_INSTALL_PATH"
  - id: ghost-admin-api-key-signing-context
    desc: Ghost Admin API key signing helper
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "GHOST_GOLDEN_POST_AUTH"
  - id: ghost-theme-preview-context
    desc: Ghost theme preview iframe renderer
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "x-ghost-preview"
  - id: ghost-settings-secret-validation-context
    desc: Ghost settings secret validation
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "stripe_connect_secret_key"
  - id: ghost-tinybird-analytics-context
    desc: Ghost Tinybird analytics helper
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "TINYBIRD_ADMIN_TOKEN"
  - id: socketio-client-import
    desc: Socket.IO client import string
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: "socket.io-client"
  - id: collaboration-space-join-event
    desc: Collaboration join event string
    crit: baseline
    conf: 0.9
    if:
      type: text
      exact: "space:join"
  - id: benign-svelte-runtime-hidden-listener-context
    desc: Benign Svelte runtime dirty-check fragment update
    crit: baseline
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: "t.dirty=[-1],t.fragment&&t.fragment.p"
  - id: gettext-po-catalog
    desc: Gettext translation catalog filename
    crit: component
    conf: 1.0
    for: [source, javascript]
    if:
      type: basename
      regex: '(?i)\.pot?$'
  - id: brackets-perf-concat-bundle
    desc: Brackets performance concat bundle
    crit: baseline
    conf: 0.99
    for: [javascript]
    if:
      type: basename
      regex: '(^|!!)brackets-concat\.js$'
  - id: parcel-plugin-transformer-context
    desc: Parcel plugin transformer source
    crit: baseline
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: "from '@parcel/plugin'"
composite_rules:
  - id: tencent-tc3-signing-context
    desc: Tencent Cloud TC3 request signing flow
    crit: baseline
    conf: 1.0
    all:
      - id: tencent-tc3-hmac-sha256
      - id: tencent-tc-action-header
      - id: tencent-tc-timestamp-header

  - id: wordpress-local-env-script
    desc: WordPress local Docker environment helper
    crit: baseline
    conf: 0.95
    any:
      - id: wordpress-develop-marker
      - id: wordpress-env-example
      - id: wordpress-local-memcached-var
      - id: docker-toolbox-path-var

  - id: malicious-package-manifest
    desc: Package manifest hides payload with public exfil
    crit: hostile
    conf: 0.95
    for: [package.json]
    all:
      - id: objectives/supply-chain/hidden-payload
      - id: objectives/exfiltration
      - id: metadata/package/files::package-json-basename
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
      - id: metadata/lang/shebang::ruby
      - id: metadata/import/ruby
      - id: metadata/package::rubygem-archive

  - id: benign-credential-exfil-noise
    desc: Benign bundle markers for exfil suppression
    crit: component
    conf: 0.9
    any:
      - id: typescript-diagnostics-bundle
      - id: objectives/supply-chain/trojanized/application/context::large-minified-js-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: brackets-perf-concat-bundle
      - id: benign-socketio-collab-context
      - id: tencent-tc3-signing-context
      - id: objectives/supply-chain/trojanized/application/context::semantic-ui-glide-comment-context
      - id: wordpress-local-env-script

  - id: benign-hidden-listener-extension-context
    desc: Benign extension bundle listener context
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/package/files::extension-runtime-bundle
      - id: objectives/supply-chain/trojanized/application/context::benign-bundled-extension-code

  - id: benign-socketio-collab-context
    desc: Benign Socket.IO collaboration context
    crit: component
    conf: 0.9
    all:
      - id: socketio-client-import
      - id: collaboration-space-join-event

  - id: benign-credential-exfil-context
    desc: Benign credential exfiltration contexts
    crit: component
    conf: 0.9
    any:
      - id: metadata/package/testing/harness::is-test
      - id: objectives/supply-chain/trojanized/application/context::credential-exfil-benign-context
      - id: benign-credential-exfil-noise
      - id: benign-socketio-collab-context
      - id: tencent-tc3-signing-context
      - id: parcel-plugin-transformer-context
      - id: objectives/supply-chain/trojanized/application/context::credential-exfil-helper-context
      - id: gettext-po-catalog
      - id: metadata/file/text::vscode-php-global-functions-catalog
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/presence::test-filename-pattern

  - id: benign-hidden-listener-general-context
    desc: Benign hidden-listener context cluster
    crit: component
    conf: 0.9
    any:
      - id: benign-hidden-listener-extension-context
      - id: benign-svelte-runtime-hidden-listener-context
      - id: objectives/supply-chain/trojanized/application/context::large-minified-js-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/scripted::js-bdd-suite-text
      - id: objectives/supply-chain/trojanized/application/context::semantic-ui-glide-comment-context
      - id: gettext-po-catalog

  - id: benign-obfuscated-dropper-exceptions
    desc: Benign or classified obfuscated dropper exceptions
    crit: component
    conf: 0.9
    any:
      - id: objectives/command-and-control/dropper/execution/obfuscated::meredith-obfuscated-wsh-download-run
      - id: objectives/command-and-control/dropper/fragmented::obfuscated-wsh-counter-exe-dropper-v2
      - id: objectives/supply-chain/trojanized/application/context::benign-obfuscated-dropper-context
      - id: objectives/supply-chain/trojanized/application/context::benign-github-issue-artifacts-mcp
      - id: objectives/supply-chain/trojanized/application/context::benign-obfuscated-dropper-string-context
      - id: metadata/package/fields::official-pm2-package
      - id: objectives/supply-chain/trojanized/application/benign::benign-gemini-sandbox-context
      - id: cleartext-dotenv-exfil-context

  - id: obfuscated-dropper-exfiltration-benign-context
    desc: Benign context aggregator for obfuscated-dropper-exfiltration
    crit: component
    conf: 0.9
    any:
      - id: benign-obfuscated-dropper-exceptions
      - id: objectives/supply-chain/trojanized/application/benign::benign-gemini-sandbox-context
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/library/presentation-lib::x3dom-loadjs-helper
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-filename-pattern

  - id: cleartext-dotenv-exfil-context
    desc: Cleartext dotenv HTTP exfiltration context
    crit: component
    conf: 0.9
    all:
      - id: objectives/credential-access/env/dotenv::js-dotenv-read
      - id: micro-behaviors/communications/http/request::http-client-usage

  - id: credential-exfiltration-stealer-exceptions
    desc: Benign credential exfiltration stealer exceptions
    crit: component
    conf: 0.9
    any:
      - id: objectives/anti-static/obfuscation/payload::source-map-extension
      - id: metadata/library/structure::dart-flutter-js-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: objectives/supply-chain/trojanized/application/context
      - id: benign-credential-exfil-context
      - id: metadata/file/text::frequency-list-catalog
      - id: metadata/package/fields::official-pm2-package
      - id: metadata/file/text::i18n-locale-file
      - id: ghost-application-benign-context
      - id: well-known/app::affine-project-marker
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/lang/scripted::racket-source

  - id: ghost-application-benign-context
    desc: Ghost application benign context cluster
    crit: baseline
    conf: 0.95
    any:
      - id: ghost-admin-api-key-signing-context
      - id: ghost-theme-preview-context
      - id: ghost-settings-secret-validation-context
      - id: ghost-tinybird-analytics-context

  - id: credential-exfiltration-stealer
    desc: Node.js package targets credentials for HTTP exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/credential-access
      - id: objectives/exfiltration
    any:
      - id: objectives/collection/stealer
      - id: objectives/supply-chain/hidden-payload
    unless:
      - id: credential-exfiltration-stealer-exceptions
      - id: well-known/lib/scikit-learn::package
      - id: well-known/lib/scikit-learn::source-header
      - id: well-known/lib/psutil::python-package
      - id: metadata/library/jquery::library
      - id: metadata/library/d3::d3-detection-all

  - id: suspicious-obfuscated-dropper
    desc: Obfuscated code drops or decodes payload
    crit: notable
    conf: 0.85
    size_min: 500
    size_max: 500000
    all:
      - id: objectives/anti-static/obfuscation
      - id: objectives/command-and-control/dropper
    any:
      - id: objectives/supply-chain/hidden-payload/encoding
      - id: objectives/exfiltration
    unless:
      - id: benign-obfuscated-dropper-exceptions
      - id: objectives/supply-chain/trojanized/application/benign::benign-gemini-sandbox-context
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/library/presentation-lib::x3dom-loadjs-helper
      - id: objectives/supply-chain/trojanized/application/context::json-parse-export-helper
      - id: objectives/supply-chain/trojanized/application/context::hcaptcha-siteverify-secret-context
    downgrade:
      any:
        - id: objectives/supply-chain/trojanized/application/context::benign-build-script-context

  - id: obfuscated-dropper-exfiltration
    desc: Obfuscated dropper with exfiltration
    # Notable rather than hostile: the three required directory matches
    # (`obfuscation`, `dropper`, `exfiltration`) each include component
    # traits that fire on benign code (`.js` extension, `JSON.parse`,
    # `secretKey` variable name), so the composite over-fires on legit
    # crypto helpers and electron apps. Real droppers are still escalated
    # by the more specific composites in this file (credential-exfiltration-stealer,
    # suspicious-hidden-listener) which require concrete malware indicators.
    crit: notable
    conf: 0.97
    size_min: 500
    size_max: 500000
    all:
      - id: objectives/anti-static/obfuscation
      - id: objectives/command-and-control/dropper
      - id: objectives/exfiltration
    unless:
      - id: benign-obfuscated-dropper-exceptions
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/library/presentation-lib::x3dom-loadjs-helper
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/testing
      - id: obfuscated-dropper-exfiltration-benign-context
      - id: cleartext-dotenv-exfil-context

  - id: suspicious-hidden-listener
    desc: Network listener combined with data exfiltration
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/command-and-control/channel
      - id: objectives/exfiltration
    any:
      - id: objectives/supply-chain/hidden-payload
      - id: objectives/anti-static/obfuscation
    unless:
      - id: objectives/anti-static/obfuscation/payload::source-map-extension
      - id: metadata/library/structure::js-large-module-bundle
      - id: objectives/supply-chain/trojanized/application/context::large-minified-js-bundle
      - id: benign-hidden-listener-general-context

  - id: suspicious-stealer-discovery
    desc: Collects system info for data exfiltration
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/discovery
      - id: objectives/collection/stealer
      - id: objectives/exfiltration
    downgrade:
      any:
        - id: objectives/supply-chain/trojanized/application/context::large-minified-js-bundle
        - id: metadata/package/tooling::esbuild-bundled
    unless:
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: objectives/supply-chain/trojanized/application/context::benign-bundled-extension-code
      - id: metadata/file/text::uproc-tools-catalog
      - id: benign-credential-exfil-context
      - id: metadata/file/text::frequency-list-catalog
