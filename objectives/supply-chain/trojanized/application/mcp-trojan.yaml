defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]
traits:
  - id: erlang-module-marker
    desc: Erlang module declaration marker
    crit: component
    conf: 1.0
    if:
      type: raw
      substr: -module(
composite_rules:
  - id: large-minified-js-bundle
    desc: Large minified JavaScript bundle
    crit: baseline
    conf: 0.9
    all:
      - id: metadata/library/structure::js-large-module-bundle
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code

  - id: malicious-package-manifest
    desc: Package manifest hides payload with public exfil
    crit: hostile
    conf: 0.95
    for: [package.json]
    all:
      - id: objectives/supply-chain/hidden-payload
      - id: objectives/exfiltration
      - id: metadata/package/files::package-json-basename
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
      - id: metadata/lang/shebang::ruby
      - id: metadata/import/ruby
      - id: metadata/package::rubygem-archive

  - id: credential-exfiltration-stealer
    desc: Node.js package targets credentials for HTTP exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/credential-access
      - id: objectives/exfiltration
    any:
      - id: objectives/collection/stealer
      - id: objectives/supply-chain/hidden-payload
    unless:
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: benign-setup-script-context

  - id: suspicious-obfuscated-dropper
    desc: Obfuscated code drops or decodes payload
    crit: suspicious
    conf: 0.85
    size_min: 500
    size_max: 500000
    all:
      - id: objectives/anti-static/obfuscation
      - id: objectives/command-and-control/dropper
    any:
      - id: objectives/supply-chain/hidden-payload/encoding
      - id: objectives/exfiltration
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
      - id: large-minified-js-bundle
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/documentation::sonar-rule-metadata-json
      - id: erlang-module-marker
      - id: benign-setup-script-context
    downgrade:
      any:
        - id: benign-build-script-context

  - id: suspicious-hidden-listener
    desc: Network listener combined with data exfiltration
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/command-and-control/channel
      - id: objectives/exfiltration

  - id: suspicious-stealer-discovery
    desc: Collects system info for data exfiltration
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/discovery
      - id: objectives/collection/stealer
      - id: objectives/exfiltration
  - id: benign-build-script-context
    desc: Benign shell/configure build script context
    crit: baseline
    conf: 0.9
    any:
      - id: metadata/lang/shebang::shell
      - id: metadata/package::configure-script
      - id: objectives/execution/interpreter/script/extconf::calls-create-makefile
  - id: benign-setup-script-context
    desc: Benign interactive setup script
    crit: baseline
    conf: 0.9
    all:
      - id: metadata/import/builtin::require-fs
      - id: micro-behaviors/fs/write/file::write-file-sync
    any:
      - id: objectives/credential-access/cloud/token::dotenv-file-dup
      - id: micro-behaviors/data/db/conn/postgresql::postgresql-url
      - id: objectives/credential-access/env/secrets::openai-api-key
      - id: micro-behaviors/communications/http/oauth::oauth-upper
