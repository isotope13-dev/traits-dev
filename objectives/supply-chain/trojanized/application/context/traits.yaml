defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]

traits:
  - id: semantic-ui-glide-comment-context
    desc: Semantic UI glide attribution comment
    crit: component
    conf: 0.99
    if:
      type: text
      substr: "by Nick Pettit - https://github.com/nickpettit/glide"
  - id: npm-oidc-token-exchange-endpoint
    desc: npm OIDC token exchange endpoint
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: "/-/npm/v1/oidc/token/exchange/package/"
  - id: github-actions-oidc-request-env
    desc: GitHub Actions OIDC request variables
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: "ACTIONS_ID_TOKEN_REQUEST_URL"
  - id: npm-registry-fetch-import
    desc: npm registry fetch import
    crit: component
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: "require\\(['\"]npm-registry-fetch['\"]\\)"
  - id: angular-xsrf-token-name
    desc: Angular XSRF token cookie
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: XSRF-TOKEN
  - id: angular-xsrf-header-name
    desc: Angular XSRF token header
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: X-XSRF-TOKEN
  - id: angular-http-error-response
    desc: Angular HTTP error response
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: HttpErrorResponse
  - id: angular-with-credentials-option
    desc: Angular withCredentials option
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: withCredentials
  - id: openapi-api-error-class
    desc: OpenAPI ApiError class
    crit: component
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: ApiError
  - id: openapi-with-credentials-config
    desc: OpenAPI with credentials config
    crit: component
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: WITH_CREDENTIALS
  - id: openapi-response-transformer
    desc: OpenAPI response transformer
    crit: component
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: responseTransformer
  - id: openapi-username-config
    desc: OpenAPI username config
    crit: component
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: "USERNAME:void 0"
  - id: openapi-password-config
    desc: OpenAPI password config
    crit: component
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      substr: "PASSWORD:void 0"
  - id: cloud-s3-server-name-field
    desc: S3 server-name field
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: s3-server-name
  - id: rackspace-cloudfiles-label
    desc: Rackspace CloudFiles label
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: Rackspace CloudFiles
  - id: backup-storage-description
    desc: Backup storage description
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: Store backups in
  - id: dynamic-fields-config
    desc: Dynamic fields config
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: dynamicFields
  - id: zxcvbn-umd-export
    desc: zxcvbn UMD export marker
    crit: component
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: ").zxcvbn=e()"
  - id: zxcvbn-frequency-list
    desc: zxcvbn frequency list marker
    crit: component
    conf: 1.0
    for: [javascript]
    if:
      type: text
      substr: "passwords:\"123456,password,12345678,qwerty"
  - id: mcp-sdk-server-import
    desc: MCP SDK server import
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: "@modelcontextprotocol/sdk/server/mcp.js"
  - id: github-issue-images-tool
    desc: GitHub issue images tool
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: 'title: "GitHub Issue Images"'
  - id: github-issue-attachments-tool
    desc: GitHub issue attachments tool
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: 'title: "GitHub Issue Attachments"'
  - id: github-issue-comments-api
    desc: GitHub issue comments API
    crit: component
    conf: 0.97
    for: [javascript, typescript]
    if:
      type: text
      substr: "/issues/${issueNumber}/comments?per_page="
composite_rules:
  - id: angular-http-xsrf-runtime
    desc: Angular HTTP XSRF runtime
    crit: baseline
    conf: 0.98
    for: [javascript, typescript]
    all:
      - id: angular-xsrf-token-name
      - id: angular-xsrf-header-name
      - id: angular-http-error-response
      - id: angular-with-credentials-option
  - id: generated-openapi-api-client
    desc: Generated OpenAPI API client
    crit: baseline
    conf: 0.96
    for: [javascript, typescript]
    all:
      - id: openapi-api-error-class
      - id: openapi-with-credentials-config
      - id: openapi-response-transformer
      - id: openapi-username-config
      - id: openapi-password-config
  - id: cloud-storage-provider-config-ui
    desc: Cloud storage provider configuration UI
    crit: baseline
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: cloud-s3-server-name-field
      - id: rackspace-cloudfiles-label
      - id: backup-storage-description
      - id: dynamic-fields-config
  - id: zxcvbn-password-strength-library
    desc: zxcvbn password strength library
    crit: baseline
    conf: 1.0
    for: [javascript]
    all:
      - id: zxcvbn-umd-export
      - id: zxcvbn-frequency-list
  - id: benign-github-issue-artifacts-mcp
    desc: MCP GitHub issue artifact retriever
    crit: baseline
    conf: 0.98
    for: [javascript, typescript]
    all:
      - id: mcp-sdk-server-import
      - id: github-issue-images-tool
      - id: github-issue-attachments-tool
      - id: github-issue-comments-api
  - id: large-minified-js-bundle
    desc: Large minified JavaScript bundle
    crit: baseline
    conf: 0.9
    all:
      - id: metadata/library/structure::js-large-module-bundle
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code

  - id: benign-bundled-extension-code
    desc: Bundled extension code with normal build markers
    crit: baseline
    conf: 0.8
    any:
      - id: objectives/supply-chain/trojanized/application/context::large-minified-js-bundle
      - id: metadata/package/tooling::has-sourcemap
      - id: metadata/package::terser-output
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker

  - id: credential-exfil-benign-context
    desc: Benign bundle or setup context
    crit: baseline
    conf: 0.9
    any:
      - id: objectives/supply-chain/trojanized/application::typescript-diagnostics-bundle
      - id: objectives/supply-chain/trojanized/application::benign-yarn-lowprimes-bundle
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: objectives/supply-chain/trojanized/application/context::benign-setup-script-context
      - id: objectives/supply-chain/trojanized/application/benign::benign-gemini-sandbox-context
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/package/files::extension-runtime-bundle
      - id: objectives/supply-chain/trojanized/application/context::benign-bundled-extension-code
      - id: metadata/package/tooling::webpack-bundled
      - id: micro-behaviors/communications/http/oauth::oauth-lower
      - id: metadata/file/text::uproc-tools-catalog
      - id: angular-http-xsrf-runtime
      - id: generated-openapi-api-client
      - id: cloud-storage-provider-config-ui
      - id: zxcvbn-password-strength-library
      - id: benign-github-issue-artifacts-mcp

  - id: benign-build-script-context
    desc: Benign shell/configure build script context
    crit: baseline
    conf: 0.9
    any:
      - id: metadata/lang/shebang::shell
      - id: metadata/package::configure-script
      - id: objectives/execution/interpreter/script/extconf::calls-create-makefile

  - id: benign-setup-script-context
    desc: Benign interactive setup script
    crit: baseline
    conf: 0.9
    all:
      - id: metadata/import/builtin::require-fs
      - id: micro-behaviors/fs/write/file::write-file-sync
    any:
      - id: objectives/credential-access/cloud/token::dotenv-file-dup
      - id: micro-behaviors/data/db/conn/postgresql::postgresql-url
      - id: objectives/credential-access/env/secrets::openai-api-key
      - id: micro-behaviors/communications/http/oauth::oauth-upper

  - id: benign-obfuscated-dropper-context
    desc: Benign bundled or test obfuscation context
    crit: baseline
    conf: 0.9
    any:
      - id: objectives/anti-static/obfuscation/payload::source-map-extension
      - id: objectives/anti-static/obfuscation/payload::sources-content-json
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
      - id: objectives/supply-chain/trojanized/application/context::benign-bundled-extension-code
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/documentation::sonar-rule-metadata-json
      - id: objectives/supply-chain/trojanized/application::erlang-module-marker
      - id: objectives/supply-chain/trojanized/application::atom-github-credential-helper-context
      - id: objectives/supply-chain/trojanized/application/context::benign-setup-script-context
      - id: metadata/package/tooling::webpack-bundled
      - id: objectives/supply-chain/trojanized/application/context::benign-npm-oidc-token-exchange
      - id: objectives/supply-chain/trojanized/application/context::benign-github-issue-artifacts-mcp

  - id: benign-npm-oidc-token-exchange
    desc: Benign npm OIDC token exchange
    crit: baseline
    conf: 0.98
    all:
      - id: npm-oidc-token-exchange-endpoint
      - id: github-actions-oidc-request-env
      - id: npm-registry-fetch-import
