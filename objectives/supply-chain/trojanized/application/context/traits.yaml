defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]

traits:
- id: semantic-ui-glide-comment-context
  desc: Semantic UI glide attribution comment
  crit: component
  conf: 0.99
  if:
    type: text
    substr: "by Nick Pettit - https://github.com/nickpettit/glide"
- id: npm-oidc-token-exchange-endpoint
  desc: npm OIDC token exchange endpoint
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "/-/npm/v1/oidc/token/exchange/package/"
- id: github-actions-oidc-request-env
  desc: GitHub Actions OIDC request variables
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "ACTIONS_ID_TOKEN_REQUEST_URL"
- id: pm2-env-display-context
  desc: PM2 describe command displays environment differences
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    regex: 'Divergent env variables from local env[\s\S]{0,3000}Use `pm2 env %s`'
- id: npm-registry-fetch-import
  desc: npm registry fetch import
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    regex: "require\\(['\"]npm-registry-fetch['\"]\\)"
- id: angular-xsrf-token-name
  desc: Angular XSRF token cookie
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: XSRF-TOKEN
- id: angular-xsrf-header-name
  desc: Angular XSRF token header
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: X-XSRF-TOKEN
- id: angular-http-error-response
  desc: Angular HTTP error response
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: HttpErrorResponse
- id: angular-with-credentials-option
  desc: Angular withCredentials option
  crit: component
  conf: 0.95
  for: [javascript, typescript]
  if:
    type: text
    substr: withCredentials
- id: openapi-api-error-class
  desc: OpenAPI ApiError class
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: ApiError
- id: openapi-with-credentials-config
  desc: OpenAPI with credentials config
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: WITH_CREDENTIALS
- id: openapi-response-transformer
  desc: OpenAPI response transformer
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: responseTransformer
- id: openapi-username-config
  desc: OpenAPI username config
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: "USERNAME:void 0"
- id: openapi-password-config
  desc: OpenAPI password config
  crit: component
  conf: 0.96
  for: [javascript, typescript]
  if:
    type: text
    substr: "PASSWORD:void 0"
- id: cloud-s3-server-name-field
  desc: S3 server-name field
  crit: component
  conf: 0.95
  for: [javascript, typescript]
  if:
    type: text
    substr: s3-server-name
- id: rackspace-cloudfiles-label
  desc: Rackspace CloudFiles label
  crit: component
  conf: 0.95
  for: [javascript, typescript]
  if:
    type: text
    substr: Rackspace CloudFiles
- id: backup-storage-description
  desc: Backup storage description
  crit: component
  conf: 0.95
  for: [javascript, typescript]
  if:
    type: text
    substr: Store backups in
- id: dynamic-fields-config
  desc: Dynamic fields config
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: dynamicFields
- id: zxcvbn-umd-export
  desc: zxcvbn UMD export marker
  crit: component
  conf: 1.0
  for: [javascript]
  if:
    type: text
    substr: ").zxcvbn=e()"
- id: zxcvbn-frequency-list
  desc: zxcvbn frequency list marker
  crit: component
  conf: 1.0
  for: [javascript]
  if:
    type: text
    substr: "passwords:\"123456,password,12345678,qwerty"
- id: mcp-sdk-server-import
  desc: MCP SDK server import
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "@modelcontextprotocol/sdk/server/mcp.js"
- id: github-issue-images-tool
  desc: GitHub issue images tool
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: 'title: "GitHub Issue Images"'
- id: github-issue-attachments-tool
  desc: GitHub issue attachments tool
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: 'title: "GitHub Issue Attachments"'
- id: github-issue-comments-api
  desc: GitHub issue comments API
  crit: component
  conf: 0.97
  for: [javascript, typescript]
  if:
    type: text
    substr: "/issues/${issueNumber}/comments?per_page="
- id: benign-api-error-credential-context
  desc: Benign API credential helper
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "ApiError|withCredentials:p\\.WITH_CREDENTIALS|setHeaderEntries\\(r,e\\)"
- id: benign-document-event-context
  desc: Benign document event context
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "My Documents|x-dioxus-data|/__events|LOCAL_PHP_MEMCACHED"
- id: benign-ghost-credential-context
  desc: Benign Ghost credential context
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "GHOST_GOLDEN_POST_AUTH|Admin API key|Ghost \\$\\{token\\}"
- id: benign-ghost-preview-context
  desc: Benign Ghost preview context
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "theme-preview|x-ghost-preview|stripe_secret_key did not match"
- id: benign-tinybird-token-context
  desc: Benign Tinybird token context
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "TINYBIRD_ADMIN_TOKEN|this\\.tinybirdToken"
- id: benign-base64-config-context
  desc: Benign base64 config context
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "Buffer.from(p).toString(\"base64\")"
- id: benign-env-file-context
  desc: Benign environment file context
  crit: component
  conf: 0.9
  if:
    type: text
    substr: ".env file already exists"
- id: benign-obfuscated-dropper-string-context
  desc: Benign obfuscated dropper context
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: "theme-preview|generate-golden-email|data-attributes\\.js|tinybird-helpers\\.ts"
- id: json-parse-export-helper
  desc: JSON.parse exported helper
  crit: baseline
  conf: 0.75
  for: [javascript, typescript]
  if:
    type: text
    substr: "parse: (str) => JSON.parse(str)"
- id: authenticated-form-post-helper
  desc: Authenticated CSRF form submit helper
  crit: baseline
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "csrf_token[\\s\\S]{0,800}\\.submit\\("
- id: atom-github-credential-helper-context--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [javascript]
  if:
    type: text
    substr: Atom git credential helper/1.0.0
  count_max: 1028184
- id: atom-github-credential-helper-context--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [javascript]
  if:
    type: text
    substr: query { viewer { login } }
  count_max: 1028185
- id: atom-github-credential-helper-context--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [javascript]
  if:
    type: text
    substr: atom-github-git @
  count_max: 1028186
- id: atom-github-credential-helper-context--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [javascript]
  if:
    type: text
    substr: '1600'
  count_max: 1028187
- id: hcaptcha-siteverify-secret-context--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    regex: "api\\.hcaptcha\\.com/siteverify[\\s\\S]{0,500}HCAPTCHA_SECRET_KEY"
  count_max: 1028188
- id: hcaptcha-siteverify-secret-context--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    regex: "HCAPTCHA_SECRET_KEY[\\s\\S]{0,500}api\\.hcaptcha\\.com/siteverify"
  count_max: 1028189
- id: next-production-build-phase
  desc: Next.js production build phase
  crit: component
  conf: 0.98
  for: [typescript]
  if:
    type: text
    substr: PHASE_PRODUCTION_BUILD
- id: next-prerender-manifest-writer
  desc: Next.js prerender manifest writer
  crit: component
  conf: 0.98
  for: [typescript]
  if:
    type: text
    substr: writePrerenderManifest
- id: next-build-source-flow--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [typescript]
  if:
    type: text
    regex: "loadConfig.{0,240}PHASE_PRODUCTION_BUILD"
  count_max: 1028192
- id: next-build-source-flow--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [typescript]
  if:
    type: text
    regex: "writeManifest.{0,240}PRERENDER_MANIFEST"
  count_max: 1028193
- id: next-build-source-flow--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [typescript]
  if:
    type: text
    substr: NextBuildContext
  count_max: 1028194
- id: definitely-typed-namespace-import
  desc: TypeScript namespace import (DT-style)
  crit: component
  conf: 0.85
  for: [typescript]
  if:
    type: text
    regex: '(^|\n)import \* as \w+ from [''"].{1,80}[''"]'
composite_rules:
- id: angular-http-xsrf-runtime
  desc: Angular HTTP XSRF runtime
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  all:
  - id: angular-xsrf-token-name
  - id: angular-xsrf-header-name
  - id: angular-http-error-response
  - id: angular-with-credentials-option
- id: generated-openapi-api-client
  desc: Generated OpenAPI API client
  crit: baseline
  conf: 0.96
  for: [javascript, typescript]
  all:
  - id: openapi-api-error-class
  - id: openapi-with-credentials-config
  - id: openapi-response-transformer
  - id: openapi-username-config
  - id: openapi-password-config
- id: cloud-storage-provider-config-ui
  desc: Cloud storage provider configuration UI
  crit: baseline
  conf: 0.95
  for: [javascript, typescript]
  all:
  - id: cloud-s3-server-name-field
  - id: rackspace-cloudfiles-label
  - id: backup-storage-description
  - id: dynamic-fields-config
- id: zxcvbn-password-strength-library
  desc: zxcvbn password strength library
  crit: baseline
  conf: 1.0
  for: [javascript]
  all:
  - id: zxcvbn-umd-export
  - id: zxcvbn-frequency-list
- id: benign-github-issue-artifacts-mcp
  desc: MCP GitHub issue artifact retriever
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  all:
  - id: mcp-sdk-server-import
  - id: github-issue-images-tool
  - id: github-issue-attachments-tool
  - id: github-issue-comments-api
- id: benign-credential-filter-context
  desc: Benign credential filter context
  crit: baseline
  conf: 0.9
  any:
  - id: benign-api-error-credential-context
  - id: benign-document-event-context
  - id: benign-ghost-credential-context
  - id: benign-ghost-preview-context
  - id: benign-tinybird-token-context
  - id: benign-base64-config-context
  - id: benign-env-file-context
- id: credential-exfil-helper-context
  desc: Benign credential helper context
  crit: component
  conf: 0.9
  any:
  - id: semantic-ui-glide-comment-context
  - id: authenticated-form-post-helper
  - id: atom-github-credential-helper-context
- id: large-minified-js-bundle
  desc: Large minified JavaScript bundle
  crit: component
  conf: 0.9
  all:
  - id: metadata/library/structure::js-large-module-bundle
  - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code

- id: benign-bundled-extension-code
  desc: Bundled extension code with normal build markers
  crit: component
  conf: 0.8
  any:
  - id: objectives/supply-chain/trojanized/application/context::large-minified-js-bundle
  - id: metadata/package/tooling::has-sourcemap
  - id: metadata/package::terser-output
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker

- id: credential-exfil-benign-context
  desc: Benign bundle or setup context
  crit: component
  conf: 0.9
  any:
  - id: objectives/supply-chain/trojanized/application::typescript-diagnostics-bundle
  - id: objectives/supply-chain/trojanized/application::benign-yarn-lowprimes-bundle
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: objectives/supply-chain/trojanized/application/context::benign-setup-script-context
  - id: objectives/supply-chain/trojanized/application/benign::benign-gemini-sandbox-context
  - id: metadata/library/runtime::vscode-webview-bundle
  - id: metadata/package/files::extension-runtime-bundle
  - id: objectives/supply-chain/trojanized/application/context::benign-bundled-extension-code
  - id: metadata/package/tooling::webpack-bundled
  - id: micro-behaviors/communications/http/oauth::oauth-lower
  - id: metadata/file/text::uproc-tools-catalog
  - id: angular-http-xsrf-runtime
  - id: generated-openapi-api-client
  - id: cloud-storage-provider-config-ui
  - id: zxcvbn-password-strength-library
  - id: benign-github-issue-artifacts-mcp

- id: benign-build-script-context
  desc: Benign shell/configure build script context
  crit: baseline
  conf: 0.9
  any:
  - id: metadata/lang/shebang::shell
  - id: metadata/package::configure-script
  - id: objectives/execution/interpreter/script/extconf::calls-create-makefile
  - id: next-build-pipeline-context

- id: next-build-pipeline-context
  desc: Next.js build pipeline source
  crit: baseline
  conf: 0.98
  for: [typescript]
  all:
  - id: metadata/library/structure::js-large-module-bundle
  - id: next-build-source-flow
  any:
  - id: next-production-build-phase
  - id: next-prerender-manifest-writer

- id: benign-setup-script-context
  desc: Benign interactive setup script
  crit: baseline
  conf: 0.9
  all:
  - id: metadata/import/builtin::require-fs
  - id: micro-behaviors/fs/write/file::write-file-sync
  any:
  - id: objectives/credential-access/cloud/token::dotenv-file-dup
  - id: micro-behaviors/data/db/conn/postgresql::postgresql-url
  - id: objectives/credential-access/env/secrets::openai-api-key
  - id: micro-behaviors/communications/http/oauth::oauth-upper

- id: benign-obfuscated-dropper-context
  desc: Benign bundled or test obfuscation context
  crit: baseline
  conf: 0.9
  any:
  - id: objectives/anti-static/obfuscation/payload::source-map-extension
  - id: objectives/anti-static/obfuscation/payload::sources-content-json
  - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
  - id: objectives/supply-chain/trojanized/application/context::benign-bundled-extension-code
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/documentation::sonar-rule-metadata-json
  - id: objectives/supply-chain/trojanized/application::erlang-module-marker
  - id: atom-github-credential-helper-context
  - id: objectives/supply-chain/trojanized/application/context::benign-setup-script-context
  - id: metadata/package/tooling::webpack-bundled
  - id: objectives/supply-chain/trojanized/application/context::benign-npm-oidc-token-exchange
  - id: objectives/supply-chain/trojanized/application/context::benign-github-issue-artifacts-mcp

- id: benign-npm-oidc-token-exchange
  desc: Benign npm OIDC token exchange
  crit: baseline
  conf: 0.98
  all:
  - id: npm-oidc-token-exchange-endpoint
  - id: github-actions-oidc-request-env
  - id: npm-registry-fetch-import

- id: atom-github-credential-helper-context
  desc: Atom GitHub credential helper context
  crit: baseline
  conf: 0.98
  for: [javascript]
  all:
  - id: atom-github-credential-helper-context--rx-1
  - id: atom-github-credential-helper-context--rx-2
  - id: atom-github-credential-helper-context--rx-3
  - id: atom-github-credential-helper-context--rx-4
  near_bytes: 4096
- id: hcaptcha-siteverify-secret-context
  desc: hCaptcha server verification flow
  crit: baseline
  conf: 0.98
  for: [javascript, typescript]
  any:
  - id: hcaptcha-siteverify-secret-context--rx-5
  - id: hcaptcha-siteverify-secret-context--rx-6
- id: next-build-source-flow
  desc: Next.js build source flow
  crit: component
  conf: 0.98
  for: [typescript]
  any:
  - id: next-build-source-flow--rx-7
  - id: next-build-source-flow--rx-8
  - id: next-build-source-flow--rx-9
