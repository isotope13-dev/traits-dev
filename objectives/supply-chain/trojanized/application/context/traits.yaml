defaults:
  platforms: [linux, windows, macos]
  for: [javascript, typescript, package.json]

traits:
  - id: semantic-ui-glide-comment-context
    desc: Semantic UI glide attribution comment
    crit: component
    conf: 0.99
    if:
      type: text
      substr: "by Nick Pettit - https://github.com/nickpettit/glide"
  - id: npm-oidc-token-exchange-endpoint
    desc: npm OIDC token exchange endpoint
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: "/-/npm/v1/oidc/token/exchange/package/"
  - id: github-actions-oidc-request-env
    desc: GitHub Actions OIDC request variables
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      substr: "ACTIONS_ID_TOKEN_REQUEST_URL"
  - id: npm-registry-fetch-import
    desc: npm registry fetch import
    crit: component
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: "require\\(['\"]npm-registry-fetch['\"]\\)"
composite_rules:
  - id: large-minified-js-bundle
    desc: Large minified JavaScript bundle
    crit: baseline
    conf: 0.9
    all:
      - id: metadata/library/structure::js-large-module-bundle
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code

  - id: benign-bundled-extension-code
    desc: Bundled extension code with normal build markers
    crit: baseline
    conf: 0.8
    any:
      - id: objectives/supply-chain/trojanized/application/context::large-minified-js-bundle
      - id: metadata/package/tooling::has-sourcemap
      - id: metadata/package::terser-output
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker

  - id: credential-exfil-benign-context
    desc: Benign bundle or setup context
    crit: baseline
    conf: 0.9
    any:
      - id: objectives/supply-chain/trojanized/application::typescript-diagnostics-bundle
      - id: objectives/supply-chain/trojanized/application::benign-yarn-lowprimes-bundle
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: objectives/supply-chain/trojanized/application/context::benign-setup-script-context
      - id: objectives/supply-chain/trojanized/application/benign::benign-gemini-sandbox-context
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/package/files::extension-runtime-bundle
      - id: objectives/supply-chain/trojanized/application/context::benign-bundled-extension-code
      - id: metadata/package/tooling::webpack-bundled
      - id: micro-behaviors/communications/http/oauth::oauth-lower
      - id: metadata/file/text::uproc-tools-catalog

  - id: benign-build-script-context
    desc: Benign shell/configure build script context
    crit: baseline
    conf: 0.9
    any:
      - id: metadata/lang/shebang::shell
      - id: metadata/package::configure-script
      - id: objectives/execution/interpreter/script/extconf::calls-create-makefile

  - id: benign-setup-script-context
    desc: Benign interactive setup script
    crit: baseline
    conf: 0.9
    all:
      - id: metadata/import/builtin::require-fs
      - id: micro-behaviors/fs/write/file::write-file-sync
    any:
      - id: objectives/credential-access/cloud/token::dotenv-file-dup
      - id: micro-behaviors/data/db/conn/postgresql::postgresql-url
      - id: objectives/credential-access/env/secrets::openai-api-key
      - id: micro-behaviors/communications/http/oauth::oauth-upper

  - id: benign-obfuscated-dropper-context
    desc: Benign bundled or test obfuscation context
    crit: baseline
    conf: 0.9
    any:
      - id: objectives/anti-static/obfuscation/payload::source-map-extension
      - id: objectives/anti-static/obfuscation/payload::sources-content-json
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
      - id: objectives/supply-chain/trojanized/application/context::benign-bundled-extension-code
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/documentation::sonar-rule-metadata-json
      - id: objectives/supply-chain/trojanized/application::erlang-module-marker
      - id: objectives/supply-chain/trojanized/application/context::benign-setup-script-context
      - id: metadata/package/tooling::webpack-bundled
      - id: objectives/supply-chain/trojanized/application/context::benign-npm-oidc-token-exchange

  - id: benign-npm-oidc-token-exchange
    desc: Benign npm OIDC token exchange
    crit: baseline
    conf: 0.98
    all:
      - id: npm-oidc-token-exchange-endpoint
      - id: github-actions-oidc-request-env
      - id: npm-registry-fetch-import
