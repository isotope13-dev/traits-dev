# Electron Application Trojanization
# Detects tampering with core Electron application files.
defaults:
  platforms: [windows, unix]
  for: [javascript, shell]
traits:
- id: electron-app-tampering--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(?i)(resources/app|app\.asar|Contents/Resources/app).{0,50}(write|chmod)'
  count_max: 1027383
- id: electron-app-tampering--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(?i)(resources/app|app\.asar|Contents/Resources/app).{0,50}(append|copy)'
  count_max: 1027384
- id: electron-app-tampering--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(?i)(resources/app|app\.asar|Contents/Resources/app).{0,50}(mv|rm)'
  count_max: 1027385
- id: electron-app-tampering--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '(?i)(resources/app|app\.asar|Contents/Resources/app).{0,50}(mkdir)'
  count_max: 1027386
composite_rules:
- id: electron-app-tampering
  desc: Attempts to modify Electron core files
  crit: suspicious
  conf: 0.95
  any:
  - id: electron-app-tampering--rx-1
  - id: electron-app-tampering--rx-2
  - id: electron-app-tampering--rx-3
  - id: electron-app-tampering--rx-4
