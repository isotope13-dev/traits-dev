# Electron Application Trojanization
# Detects tampering with core Electron application files.
defaults:
  platforms: [windows, unix]
  for: [javascript, shell]
traits:
  - id: electron-app-tampering
    desc: Attempts to modify Electron core files
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)(resources/app|app\.asar|Contents/Resources/app).{0,50}(write|chmod|append|copy|mv|rm|mkdir)'
