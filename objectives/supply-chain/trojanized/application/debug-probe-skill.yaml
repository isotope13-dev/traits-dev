defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
  attack: T1195.002

traits:
  - id: skill-prompt-member
    desc: Skill archive prompt member
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: /SKILL.md

  - id: install-reference-member
    desc: Skill archive install reference
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: /references/install/

  - id: uninstall-reference-member
    desc: Skill archive uninstall reference
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: /references/uninstall/

  - id: install-probe-pipe-bash
    desc: Remote probe installer piped to bash
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      substr: curl -sL https://raw.githubusercontent.com/Syncause/ts-agent-file

  - id: syncause-wheel-release
    desc: Direct GitHub wheel dependency
    crit: suspicious
    conf: 0.96
    if:
      type: string_value
      substr: syncause_tracer @ https://github.com/Syncause/syncause-sdk/releases/download/

  - id: syncause-init-import
    desc: Syncause tracer initialization import
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: from syncause_tracer import initialize

  - id: syncause-installation-patch
    desc: Installer saves patch artifact
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: .syncause/installation.patch

  - id: syncause-node-instrumentation
    desc: Instrumentation node bootstrap import
    crit: notable
    conf: 0.93
    if:
      type: raw
      substr: await import('./instrumentation.node');

  - id: syncause-debug-stats-endpoint
    desc: Local debug span stats endpoint
    crit: notable
    conf: 0.96
    if:
      type: string_value
      substr: http://localhost:43210/remote-debug/spans/stats

  - id: syncause-proxy-log
    desc: Probe proxy connection log
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: "[DEBUG] Connected to proxy server"

  - id: syncause-otel-log
    desc: OpenTelemetry startup log check
    crit: notable
    conf: 0.88
    if:
      type: string_value
      substr: "[DEBUG] OpenTelemetry SDK started"

  - id: syncause-repo-token
    desc: Embedded GitHub PAT fragment
    crit: suspicious
    conf: 0.99
    if:
      type: string_value
      substr: github_pat_

  - id: syncause-maven-credential-url
    desc: Credentialized GitHub Packages URL
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      substr: "@maven.pkg.github.com/Syncause/syncause-sdk"

  - id: syncause-bytebuddy-plugin
    desc: Syncause ByteBuddy plugin loader
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      substr: com.syncause.bytebuddy.plugin.SyncausePlugin

  - id: syncause-codeproxy-websocket
    desc: Syncause codeproxy websocket
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      substr: wss://api.syn-cause.com/codeproxy/ws

  - id: debug-mcp-package
    desc: Debug MCP latest package install
    crit: suspicious
    conf: 0.96
    if:
      type: string_value
      substr: "@syncause/debug-mcp@latest"

  - id: debug-mcp-server-id
    desc: Debug MCP server identifier
    crit: notable
    conf: 0.94
    if:
      type: string_value
      substr: debug-mcp-server

  - id: cursor-mcp-config
    desc: Cursor MCP config path
    crit: component
    conf: 0.92
    if:
      type: string_value
      substr: .cursor/mcp.json

  - id: claude-mcp-config
    desc: Claude MCP config path
    crit: component
    conf: 0.92
    if:
      type: string_value
      substr: .claude/settings.json

  - id: codex-mcp-config
    desc: Codex MCP config path
    crit: component
    conf: 0.92
    if:
      type: string_value
      substr: .codex/config.toml

  - id: gemini-mcp-config
    desc: Gemini MCP config path
    crit: component
    conf: 0.92
    if:
      type: string_value
      substr: .gemini/settings.json

  - id: windsurf-mcp-config
    desc: Windsurf MCP config path
    crit: component
    conf: 0.92
    if:
      type: string_value
      substr: .codeium/windsurf/mcp_config.json

  - id: opencode-mcp-config
    desc: Opencode MCP config path
    crit: component
    conf: 0.92
    if:
      type: string_value
      substr: .config/opencode/opencode.json

composite_rules:
  - id: debugger-skill-archive-layout
    desc: Skill archive carries install and teardown playbooks
    crit: suspicious
    conf: 0.94
    all:
      - id: skill-prompt-member
      - id: install-reference-member
      - id: uninstall-reference-member

  - id: cross-ide-debug-mcp-persistence
    desc: Cross-IDE debug MCP persistence bootstrap
    crit: hostile
    conf: 0.99
    all:
      - id: debug-mcp-package
      - id: debug-mcp-server-id
    needs: 3
    any:
      - id: cursor-mcp-config
      - id: claude-mcp-config
      - id: codex-mcp-config
      - id: gemini-mcp-config
      - id: windsurf-mcp-config
      - id: opencode-mcp-config

  - id: credentialized-java-probe-loader
    desc: Credentialized Java probe loader with remote websocket
    crit: hostile
    conf: 0.995
    all:
      - id: syncause-repo-token
      - id: syncause-maven-credential-url
      - id: syncause-bytebuddy-plugin
      - id: syncause-codeproxy-websocket

  - id: probe-bootstrap-modification
    desc: Probe bootstrap modifies application startup
    crit: suspicious
    conf: 0.97
    all:
      - id: install-probe-pipe-bash
    any:
      - id: syncause-wheel-release
      - id: syncause-init-import
      - id: syncause-node-instrumentation

  - id: local-debug-control-plane
    desc: Local debug control plane verification
    crit: suspicious
    conf: 0.96
    any:
      - id: syncause-debug-stats-endpoint
      - id: syncause-proxy-log
      - id: syncause-otel-log
      - id: syncause-installation-patch

  - id: remote-instrumentation-bootstrap
    desc: Remote instrumentation bootstrap with local control plane
    crit: hostile
    conf: 0.99
    all:
      - id: probe-bootstrap-modification
      - id: local-debug-control-plane
