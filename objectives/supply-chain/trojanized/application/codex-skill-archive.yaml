defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [data]
  attack: T1195.002
  size_min: 256
  size_max: 8192

traits:
  - id: zip-local-header
    desc: ZIP local file header
    crit: component
    conf: 0.9
    if:
      type: hex
      pattern: "50 4B 03 04"
      offset: 0

  - id: codex-skill-member
    desc: Archive contains Codex SKILL.md member
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: codex/SKILL.md

  - id: codex-ux-member
    desc: Archive carries Codex UX marker member
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: codex/UX

composite_rules:
  - id: codex-skill-prompt-archive
    desc: Tiny ZIP archive carrying a Codex skill prompt payload
    crit: suspicious
    conf: 0.985
    size_max: 4096
    all:
      - id: zip-local-header
      - id: codex-skill-member
    any:
      - id: codex-ux-member
