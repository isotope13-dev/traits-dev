# Cross-IDE AI assistant command injection
# Detects programmatic invocation of commands in other AI coding assistants
# (Cursor Composer, Windsurf Cascade, Kiro Agent) to inject prompts,
# bypass security dialogs, or hijack AI chat sessions.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
traits:
  # === Cursor IDE ===
  - id: cursor-composer-command
    desc: Cursor Composer command invocation
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: '^composer\.(newAgentChat|closeComposerTab|openComposer)'

  # === Windsurf/Cascade ===
  - id: windsurf-chat-command
    desc: Windsurf Cascade chat command invocation
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: "windsurf.prioritized.chat"

  # === Kiro Agent ===
  - id: kiro-agent-command
    desc: Kiro Agent command invocation
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: "kiroAgent."

  # === Clipboard hijack for prompt injection ===
  - id: clipboard-paste-action
    desc: VS Code clipboard paste action command
    crit: component
    conf: 0.85
    if:
      type: string_literal
      exact: "editor.action.clipboardPasteAction"

  - id: clipboard-restore-pattern
    desc: Clipboard save/restore pattern (hijack indicator)
    crit: component
    conf: 0.85
    if:
      type: string_literal
      regex: '(restoring|saving|backup).{0,10}clipboard'
      case_insensitive: true

composite_rules:
  # Cross-IDE targeting = hostile
  - id: cross-ide-command-injection
    desc: Cross-IDE AI assistant command injection
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: cursor-composer-command
      - id: windsurf-chat-command
      - id: kiro-agent-command

  # Clipboard hijack + paste automation
  - id: clipboard-prompt-injection
    desc: Clipboard hijack for AI prompt injection
    crit: suspicious
    conf: 0.9
    all:
      - id: clipboard-paste-action
    any:
      - id: objectives/collection/keylog/capture::sendkeys-sendwait
      - id: objectives/collection/keylog/capture::osascript-key-code
      - id: clipboard-restore-pattern
