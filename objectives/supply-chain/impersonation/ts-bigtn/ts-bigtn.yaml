defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
traits:
- id: ts-bigtn-pkg-name
  desc: ts-bigtn package name
  crit: notable
  conf: 0.999
  if:
    type: kv
    path: name
    exact: ts-bigtn

composite_rules:
- id: ts-bigtn-malware
  desc: ts-bigtn typosquatting malware
  crit: hostile
  conf: 0.999
  all:
    - id: ts-bigtn-pkg-name
    - id: objectives/supply-chain/trojanized/library/hidden-dep::wime-zle-dependency
