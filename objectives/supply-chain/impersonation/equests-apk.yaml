defaults:
  platforms:
    - linux
    - unix
    - macos
    - windows
    - android
    - ios
  for: [manifests]
  size_min: 128
  size_max: 1024
  attack: T1195.002
  mbc: B0024

traits:
  - id: alpine-pkgname
    desc: Alpine pkgname is equests
    for: [none]
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      substr: "pkgname = equests"

  - id: alpine-origin
    desc: Alpine origin is equests
    for: [none]
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      substr: "origin = equests"

  - id: alpine-pkgver
    desc: Alpine version is 2.27.1-r0
    for: [none]
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      substr: "pkgver = 2.27.1-r0"

  - id: alpine-pkgdesc
    desc: Alpine package description equests
    for: [none]
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: "pkgdesc = equests"

composite_rules:
  - id: equests-apk-identity
    desc: equests Alpine package identity
    for: [none]
    crit: suspicious
    conf: 0.99
    all:
      - id: alpine-pkgname
      - id: alpine-origin

  - id: equests-apk
    desc: equests typosquat Alpine package
    for: [none]
    crit: hostile
    conf: 0.995
    all:
      - id: equests-apk-identity
      - id: alpine-pkgver
    any:
      - id: alpine-pkgdesc
