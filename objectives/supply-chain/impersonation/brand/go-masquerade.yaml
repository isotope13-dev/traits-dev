defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [go]
composite_rules:
  - id: uuid-library-masquerade
    desc: UUID library masquerade (standard UUID types + HTTP/Crypto)
    crit: notable
    conf: 0.8
    all:
      - id: micro-behaviors/crypto/library/provider::aes-new-cipher
      - id: micro-behaviors/communications/http/lib/netlib::net-http-import
      - id: micro-behaviors/data/serialize/json::encoding-json-import
