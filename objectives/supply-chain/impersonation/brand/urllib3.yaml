defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: fake-urllib3-metadata
    desc: Package description mimics urllib3 but does not mention urllib3
    crit: hostile
    conf: 1.0
    all:
      - id: metadata/build/pip::setup-py
      - id: well-known/lib/urllib3::urllib3-content
    unless:
      - id: well-known/lib/urllib3::urllib3-name
      - id: metadata/library/data::botocore-lib
  - id: metadata-mismatch-tui-http
    desc: Package Summary claims TUI but Description describes HTTP client
    crit: suspicious
    conf: 0.8
    for: [python]
    all:
      - id: metadata/package/manifest/description::terminal-ui-description
      - id: well-known/lib/urllib3::urllib3-content
