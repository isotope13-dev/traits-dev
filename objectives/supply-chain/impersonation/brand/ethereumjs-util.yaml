# EthereumJS utility impersonation.
# A package using the EthereumJS monorepo metadata under a different name is
# an identity spoof, not merely a similarly named Ethereum library.
defaults:
  platforms: [unix, windows]
  for: [npm, tar, zip]
  attack: T1195.002
  mbc: E1195.002

traits:
  - id: ethereumjs-util-impersonator-name
    desc: Package uses EthereumJS utility lookalike name
    crit: suspicious
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      exact: ethereum-lib-utils

  - id: ethereumjs-util-impersonator-archive-name
    desc: Archive uses EthereumJS utility lookalike name
    crit: suspicious
    conf: 0.99
    if:
      type: value
      path: npm.name
      exact: ethereum-lib-utils

composite_rules:
  - id: ethereumjs-util-identity-impersonation
    desc: EthereumJS utility package identity impersonation
    crit: hostile
    conf: 0.995
    scope: archive
    all:
      - id: ethereumjs-util-impersonator-archive-name
      - id: well-known/lib/ethereumjs-util::archive-package-repository
      - id: well-known/lib/ethereumjs-util::archive-package-homepage
    any:
      - id: well-known/lib/ethereumjs-util::npm-package-description
      - id: well-known/lib/ethereumjs-util::archive-package-name
