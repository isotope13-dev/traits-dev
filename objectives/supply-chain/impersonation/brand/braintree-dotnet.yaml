# Braintree SDK brand impersonation / identity forgery. The genuine SDK ships
# only as the NuGet id `Braintree`. A package published under a `Braintree.<x>`
# variant id that ALSO ships the official Braintree-branded assembly and points
# its projectUrl at the genuine upstream repo is repackaging the real SDK under
# a squatted name to inherit its trust. No legitimate wrapper vendors the
# official binary while claiming the upstream's own repository, so the three
# together are a high-confidence forgery independent of any payload.
#
# General typosquat detection (arbitrary brand) is a registry-side problem --
# it needs the corpus of real names + ownership. This keys on the artifact-local
# forgery tell instead: official brand assembly + non-canonical id + upstream URL.
# Braintree.Net typosquat (Socket, 2026).
defaults:
  platforms: [windows, linux, macos]
  attack: T1195.002
  mbc: B0024

traits:
  # A Braintree-prefixed *variant* id (Braintree.Net, Braintree.SDK, ...) -- the
  # canonical package is exactly `Braintree`, so a variant id is a neutral naming
  # fact on its own; the impersonation is the variant id + official brand binary.
  - id: nuspec-braintree-variant-id
    desc: NuGet id is a Braintree variant
    crit: component
    conf: 0.85
    for: [xml, nupkg]
    if:
      type: text
      regex: '<id>\s*Braintree[._-]'
  - id: nuspec-braintree-upstream-project-url
    desc: Manifest claims genuine Braintree repo
    crit: component
    conf: 0.8
    for: [xml, nupkg]
    if:
      type: text
      substr: github.com/braintree/braintree_dotnet

composite_rules:
  - id: braintree-sdk-brand-impersonation
    desc: Official Braintree SDK under squat id
    crit: suspicious
    conf: 0.95
    for: [nupkg, archives]
    scope: archive
    all:
      - id: well-known/lib/braintree::braintree-payment-sdk
      - id: nuspec-braintree-variant-id
      - id: nuspec-braintree-upstream-project-url
  # DLL-only signing forgery: the genuine Braintree SDK assembly is strong-name
  # signed; a source-rebuilt clone that never had the key is not. Catches the
  # trojanized assembly even when scanned outside its nupkg. Suspicious, not
  # hostile — the payload composites carry the verdict; this flags the forgery.
  - id: braintree-brand-assembly-unsigned
    desc: Braintree-branded assembly not strong-named
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    all:
      - id: well-known/lib/braintree::braintree-payment-sdk
      - id: metadata/signed/trust-level::dotnet-not-strong-name-signed
