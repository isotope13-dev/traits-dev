# "Filler" pseudo-cryptocurrency address generators bundled into a package
# that has no plausible reason to mint blockchain addresses. The functions
# return Math.random() output padded to look like real addresses; they are
# a low-effort marker of supply-chain trojans assembled from disparate parts.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002
traits:
  - id: fake-btc-address-random
    desc: BTC-style address from Math.random padding
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'generateBTCAddress[\s\S]{0,160}Math\.random\(\)'
  - id: fake-erc-address-random
    desc: ERC-style address from Math.random padding
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'generateERCAddress[\s\S]{0,160}Math\.random\(\)'
  - id: fake-trc-address-random
    desc: TRC-style address from Math.random padding
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'generateTRCAddress[\s\S]{0,160}Math\.random\(\)'
composite_rules:
  - id: fake-multichain-address-stub
    desc: Multi-chain fake address generator filler
    crit: suspicious
    conf: 0.97
    any:
      - id: fake-btc-address-random
      - id: fake-erc-address-random
      - id: fake-trc-address-random
    needs: 2
