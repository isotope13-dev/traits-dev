defaults:
  platforms:
    - unix
    - windows
    - macos
  crit: hostile
  attack: T1036.005
  mbc: B0030
  for:
    - python
    - shell
traits:
  - id: pypi-online-typosquat
    desc: PyPI typosquat domain
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: pypi\.online
  - id: pypi-typosquat-pattern
    desc: PyPI typosquat pattern
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: pypi[0-9]\.|pipy\.|pipi\.|ppyi\.
  - id: fake-pypi-server-1
    desc: Fake repo (pypi.online/shop/xyz/top)
    crit: suspicious
    if:
      type: string_literal
      regex: pypi\.(online|shop|xyz|top)
  - id: fake-pypi-server-2
    desc: Fake repo (python-packages/pip-install)
    crit: suspicious
    if:
      type: string_literal
      regex: (python-packages|pip-install)
  - id: cloud-php-endpoint
    desc: Cloud.php payload endpoint
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: cloud\.php\?type=
  - id: oshelper-filename
    desc: oshelper malware marker
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: oshelper
  - id: oshelper-session-cookie
    desc: oshelper session cookie
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: oshelper_session
composite_rules:
  - id: fake-pypi-server
    desc: Fake package repository server
    crit: suspicious
    conf: 0.85
    any:
      - id: fake-pypi-server-1
      - id: fake-pypi-server-2
  - id: pypi-typosquat-attack
    desc: PyPI typosquatting attack
    crit: suspicious
    conf: 0.98
    any:
      - id: pypi-online-typosquat
      - id: pypi-typosquat-pattern
  - id: fake-pypi-downloader
    desc: Fake PyPI payload downloader
    crit: hostile
    conf: 0.96
    attack: T1071.001
    mbc: E1105
    platforms:
      - unix
      - windows
    needs: 2
    any:
      - id: cloud-php-endpoint
      - id: oshelper-filename
      - id: oshelper-session-cookie
    all:
      - id: pypi-typosquat-attack
