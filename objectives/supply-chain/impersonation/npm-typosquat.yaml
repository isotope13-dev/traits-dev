defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
composite_rules:
  - id: typosquat-eslint
    desc: Package 'tslint' may be typosquatting 'eslint'
    crit: notable
    conf: 0.5
    all:
      - id: metadata/import/npm::tslint
    none:
      - id: metadata/import/npm::eslint
