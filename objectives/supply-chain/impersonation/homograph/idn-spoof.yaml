defaults:
  platforms: [unix, windows, android, ios]
  for: [scripts, source, manifests, documents, data]
  attack: T1036
  mbc: B0030
traits:
  # Tier 1 (notable): a URL authority containing a Greek or Cyrillic letter.
  # These scripts are relevant to IDN impersonation even when no adjacent
  # Latin letter is present, while localized path/query text is ordinary.
  - id: url-host-confusable-script
    desc: URL host contains Greek or Cyrillic characters
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (https?|ftp)://[^/?#\s]{0,128}[\x{370}-\x{52f}]
    not:
      # CJK/Japanese/Hangul URL text is localized documentation or an IDN, not a
      # Latin-brand homograph. Keep this trait focused on the impersonation path.
      - regex: "://[^\\s\"'\\)]{0,128}[\\x{3040}-\\x{9fff}\\x{ac00}-\\x{d7a3}]"
      # Android binary XML exposes namespace URIs next to localized UI strings;
      # do not treat the schema URI plus later currency/text glyphs as one URL.
      - substr: "://schemas.android.com/apk/res/"
      - substr: "://schemas.android.com/apk/res-"
      # Documentation placeholder URLs such as `http://...` / `http://…` are
      # not IDN or homograph evidence.
      - regex: 'https?://(\.\.\.|…)([`''"\s\)]|$)'
      - regex: 'https?://[^\s"''\)]{0,128}…[`''"\s\)]'
      - regex: 'https?://[^\s"''\)]{0,128}/…'
      # Shields.io badge labels may deliberately use Unicode glyphs (for
      # example a check mark); this is presentation, not a homograph host.
      - substr: "https://img.shields.io/"
    # Skip test fixtures that legitimately carry homograph/IDN sample URLs:
    # any test-context trait under metadata/package/testing/ suppresses this.
    unless:
      - id: metadata/package/testing/
      - id: metadata/library/data::public-suffix-list
      - type: path
        basename: true
        exact: htmLawed_TESTCASE.txt
      - type: path
        basename: true
        exact: htmLawed_TESTCASE.txt
      - id: well-known/app/egroupware/
      - type: path
        basename: true
        exact: htmLawed_TESTCASE.txt
      - id: metadata/library/runtime::core-js-runtime-bundle
      - id: well-known/tool/sysadmin/conemu/
  # Tier 2 (suspicious): the host label mixes an ASCII Latin letter directly
  # against a Greek or Cyrillic letter (e.g. Cyrillic "і" in "іnstall").
  # Those are the scripts used for Latin homographs; punctuation and localized
  # path/query text must not count as a mixed-script hostname.
  - id: url-host-mixed-script
    desc: Mixed-script IDN URL host
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (https?|ftp)://[^/?#\s]{0,128}([a-zA-Z][\x{370}-\x{52f}]|[\x{370}-\x{52f}][a-zA-Z])
    not:
      - substr: conemu.github.io
      - substr: https://…png
      - regex: 'https?://…[A-Za-z0-9._/-]*'
      - regex: 'https?://[A-Za-z0-9.-]+[）】，、。]'
      - substr: "://schemas.android.com/apk/res/"
      - substr: "://schemas.android.com/apk/res-"
      # CJK/Japanese/Hangul in the authority is a foreign-language host or
      # documentation placeholder (e.g. `http://服务器IP` = "server IP"), not a
      # homoglyph: these scripts are visually unmistakable from Latin and are
      # never used to impersonate an ASCII brand. Confusable scripts that DO
      # spoof Latin (Cyrillic, Greek) fall outside this range and still fire.
      - regex: '://[^/?#\s]*[\x{3040}-\x{9fff}\x{ac00}-\x{d7a3}]'
      - substr: '<strong>Soft-hyphen:</strong>'
      - substr: 'http://q='
      - substr: '// Submitted by'
    unless:
      - id: metadata/package/testing/
