defaults:
  platforms: [unix, windows, android, ios]
  for: [scripts, source, manifests, documents, data]
  attack: T1036
  mbc: B0030
traits:
  # Tier 1 (notable): any URL whose authority/path carries a non-ASCII byte.
  # Hostnames travel the wire as ASCII/punycode, so a raw non-ASCII character
  # in a URL is unusual on its own (legitimate only for un-encoded IDNs).
  - id: url-non-ascii
    desc: URL contains non-ASCII characters
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (https?|ftp)://[^\s"'\)]{0,256}[^\x00-\x7f]
    # Skip test fixtures that legitimately carry homograph/IDN sample URLs:
    # any test-context trait under metadata/package/testing/ suppresses this.
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/sysadmin/conemu::conemu-release-notes
      - type: path
        basename: true
        exact: WhatsNew-ConEmu.txt
        case_insensitive: true
      - id: well-known/tool/sysadmin/conemu/
      - id: well-known/tool/sysadmin/conemu::conemu-release-notes
      - type: path
        basename: true
        exact: WhatsNew-ConEmu.txt
        case_insensitive: true
  # Tier 2 (suspicious): the host label mixes an ASCII Latin letter directly
  # against a non-ASCII letter (e.g. Cyrillic "і" in "іnstall"). That mixing
  # is the classic IDN homograph substitution and is near-zero-FP: a genuine
  # foreign-only IDN host is entirely non-Latin and never trips this. Scoped
  # to the authority (no "/") so accented path/query text stays Tier 1.
  - id: url-host-mixed-script
    desc: IDN homograph in URL host
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (https?|ftp)://[^/\s"'\)]{0,256}([a-zA-Z][^\x00-\x7f]|[^\x00-\x7f][a-zA-Z])
      not:
        - substr: conemu.github.io
        - regex: 'https?://[A-Za-z0-9.-]+[）】，、。]'
    unless:
      - id: metadata/package/testing/
