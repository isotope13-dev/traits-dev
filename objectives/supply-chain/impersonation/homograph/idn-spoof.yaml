defaults:
  platforms: [unix, windows, android, ios]
  for: [scripts, source, manifests, documents, data]
  attack: T1036
  mbc: B0030
traits:
  # Tier 2 (suspicious): the host label mixes an ASCII Latin letter directly
  # against a Greek or Cyrillic letter (e.g. Cyrillic "і" in "іnstall").
  # Those are the scripts used for Latin homographs; punctuation and localized
  # path/query text must not count as a mixed-script hostname.
  - id: url-host-mixed-script
    desc: Mixed-script IDN URL host
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (https?|ftp)://[^/?#\s]{0,128}([a-zA-Z][\x{370}-\x{52f}]|[\x{370}-\x{52f}][a-zA-Z])
    not:
      - substr: conemu.github.io
      - substr: https://…png
      - regex: 'https?://…[A-Za-z0-9._/-]*'
      - regex: 'https?://[A-Za-z0-9.-]+[）】，、。]'
      - substr: "://schemas.android.com/apk/res/"
      - substr: "://schemas.android.com/apk/res-"
      # CJK/Japanese/Hangul in the authority is a foreign-language host or
      # documentation placeholder (e.g. `http://服务器IP` = "server IP"), not a
      # homoglyph: these scripts are visually unmistakable from Latin and are
      # never used to impersonate an ASCII brand. Confusable scripts that DO
      # spoof Latin (Cyrillic, Greek) fall outside this range and still fire.
      - regex: '://[^/?#\s]*[\x{3040}-\x{9fff}\x{ac00}-\x{d7a3}]'
      - substr: '<strong>Soft-hyphen:</strong>'
      - substr: 'http://q='
      - substr: '// Submitted by'
    unless:
      - id: metadata/package/testing/
