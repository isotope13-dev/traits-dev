defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: suspicious
  attack: T1195.002
traits:
- id: readline-question-wrapper
  desc: Wraps readline.question
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: readline\.question\s*\(
- id: prompt-wrapper-def
  desc: Custom prompt function definition
  crit: component
  conf: 0.5
  if:
    type: text
    regex: (function|const|let|var)\s+prompt\s*[=(]
  unless:
  - id: metadata/lang/javascript-features::closure-externs-annotation
  - type: text
    substr: "KeyboardInteractivePrompt"
- id: process-stdin-read
  desc: Reads from process.stdin
  crit: component
  conf: 0.5
  if:
    type: text
    substr: process.stdin
- id: crypto-wrapper-export-encrypt
  desc: Exports encrypt/decrypt interface
  crit: component
  conf: 0.6
  if:
    type: text
    regex: module.exports.{0,10}\{.{0,200}(encrypt|decrypt|hash)
- id: crypto-wrapper-export-cipher
  desc: Exports cipher/sign interface
  crit: component
  conf: 0.6
  if:
    type: text
    regex: module.exports.{0,10}\{.{0,200}(createCipher|createSign|createVerify)
- id: crypto-wrapper-export-keygen
  desc: Exports scrypt/randomBytes interface
  crit: component
  conf: 0.6
  if:
    type: text
    regex: module.exports.{0,10}\{.{0,200}(scrypt|randomBytes|createDecipher)
- id: require-real-crypto
  desc: Requires real crypto module
  crit: component
  conf: 0.5
  if:
    type: text
    regex: require\s*\(\s*["\'](crypto|node:crypto)["\']
- id: fs-write-sensitive-call-ssh
  desc: File write targets SSH key
  crit: component
  conf: 0.86
  if:
    type: text
    case_insensitive: true
    regex: (writeFile|appendFile)Sync?\s*\([^;]{0,360}(id_rsa|id_ed25519|authorized_keys)
- id: fs-write-sensitive-call-token
  desc: File write targets credential
  crit: component
  conf: 0.86
  if:
    type: text
    case_insensitive: true
    regex: (writeFile|appendFile)Sync?\s*\([^;]{0,360}(authToken|password|credentials)
- id: fs-write-sensitive-call-dotfile
  desc: File write targets credential dotfile
  crit: component
  conf: 0.86
  if:
    type: text
    case_insensitive: true
    regex: (writeFile|appendFile)Sync?\s*\([^;]{0,360}(\.npmrc|\.netrc|passwd)
- id: fs-stream-sensitive-call
  desc: Stream write targets credentials
  crit: component
  conf: 0.82
  if:
    type: text
    case_insensitive: true
    regex: createWriteStream\s*\([^;]{0,360}(id_rsa|credentials|password)
- id: fs-append-hidden
  desc: Appends to hidden file
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: fs\.(appendFile|writeFile)Sync?\s*\(\s*["\']/.{0,50}/\..{1,30}
- id: new-function-literal
  desc: new Function from literal string
  crit: notable
  conf: 0.8
  size_max: 262144
  if:
    type: text
    regex: new\s+Function\s*\(\s*["'][^,)]{1,200}["']\s*\)
  not:
    - regex: 'new\s+Function\s*\(\s*["'']return this["'']\s*\)'
- id: new-function-variable
  desc: new Function from variable
  crit: notable
  conf: 0.8
  size_max: 262144
  if:
    type: text
    regex: new\s+Function\s*\(\s*[a-zA-Z_$][a-zA-Z0-9_$]{0,80}\s*\)
composite_rules:
- id: input-capture-wrapper
  desc: Wrapper capturing user input
  crit: component
  conf: 0.85
  near_bytes: 2048
  any:
  - id: readline-question-wrapper
  - id: prompt-wrapper-def
  all:
  - id: process-stdin-read
  unless:
  - id: well-known/app/nitin-ai
- id: crypto-wrapper-export
  desc: Exports crypto-like interface
  crit: notable
  conf: 0.6
  any:
  - id: crypto-wrapper-export-encrypt
  - id: crypto-wrapper-export-cipher
  - id: crypto-wrapper-export-keygen
- id: crypto-module-wrapper
  desc: Wrapper around crypto module
  crit: notable
  conf: 0.85
  all:
  - id: crypto-wrapper-export
  - id: require-real-crypto
- id: crypto-wrapper-with-node-crypto
  desc: Exported Node crypto wrapper
  crit: notable
  conf: 0.86
  all:
  - id: crypto-wrapper-export
  - id: require-real-crypto
  - id: micro-behaviors/crypto/library/provider::node-crypto-operation
  downgrade:
    any:
    - id: metadata/package/testing/harness/runtime/
  unless:
  - id: micro-behaviors/communications/http/oauth/
  - id: well-known/lib/node-edge/
- id: obfuscated-node-crypto-loader
  desc: Obfuscated Node crypto loader
  crit: notable
  conf: 0.88
  all:
  - id: require-real-crypto
  - id: micro-behaviors/crypto/library/provider::node-crypto-operation
  any:
  - id: objectives/anti-static/obfuscation/string/array::string-array-hex-index
  - id: objectives/anti-static/obfuscation/eval/require::function-constructor
  - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
  downgrade:
    any:
    - id: metadata/package/testing/harness/runtime/
  unless:
  - id: micro-behaviors/communications/http/oauth/
  - id: well-known/lib/node-edge/
- id: dynamic-exec
  desc: Dynamic code execution
  crit: notable
  conf: 0.8
  any:
  - id: objectives/execution/interpreter/eval/dynamic::eval-variable
  - id: new-function-literal
  - id: new-function-variable
- id: js-input-intercept-exfil
  desc: Input interception with exfiltration
  crit: hostile
  conf: 0.95
  attack: T1056
  mbc: E1056
  near_bytes: 4096
  all:
  - id: input-capture-wrapper
  any:
  - id: micro-behaviors/communications/http/post::fetch-post-call
  - id: micro-behaviors/communications/http/post::axios-post-call
  - id: micro-behaviors/communications/http/post::http-request-post
  - id: fs-write-sensitive
  - id: fs-append-hidden
  unless:
  - id: well-known/app/nitin-ai
- id: crypto-intercept-exfil
  desc: Crypto wrapper with exfiltration
  crit: hostile
  conf: 0.95
  attack: T1056
  all:
  - id: crypto-module-wrapper
  any:
  - id: micro-behaviors/communications/http/post::fetch-post-call
  - id: micro-behaviors/communications/http/post::axios-post-call
  - id: micro-behaviors/communications/http/post::http-request-post
  - id: fs-write-sensitive
  - id: fs-append-hidden
  unless:
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/testing/
- id: js-credential-supply-chain
  desc: JavaScript credential interception supply chain attack
  crit: hostile
  conf: 0.98
  mbc: E1056
  any:
  - id: js-input-intercept-exfil
  - id: crypto-intercept-exfil
- id: fs-write-sensitive
  desc: Writes to sensitive path
  crit: suspicious
  conf: 0.8
  all:
  - id: micro-behaviors/fs/write/file/direct::js-file-write
  any:
  - id: fs-write-sensitive-call-ssh
  - id: fs-write-sensitive-call-token
  - id: fs-write-sensitive-call-dotfile
  - id: fs-stream-sensitive-call
  not:
  - substr: "process.env["
  unless:
  - id: metadata/package/tooling::node-project-scaffolder-file-writer
