defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: suspicious
  attack: T1195.002
traits:
- id: readline-question-wrapper
  desc: Wraps readline.question
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: readline\.question\s*\(
- id: prompt-wrapper-def
  desc: Custom prompt function definition
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: (function|const|let|var)\s+prompt\s*[=(]
  unless:
  - type: text
    substr: "@externs"
  - type: text
    substr: "KeyboardInteractivePrompt"
- id: process-stdin-read
  desc: Reads from process.stdin
  crit: component
  conf: 0.5
  if:
    type: text
    substr: process.stdin
- id: crypto-wrapper-export-encrypt
  desc: Exports encrypt/decrypt interface
  crit: component
  conf: 0.6
  if:
    type: text
    regex: module.exports.{0,10}\{.{0,200}(encrypt|decrypt|hash)
- id: crypto-wrapper-export-cipher
  desc: Exports cipher/sign interface
  crit: component
  conf: 0.6
  if:
    type: text
    regex: module.exports.{0,10}\{.{0,200}(createCipher|createSign|createVerify)
- id: crypto-wrapper-export-keygen
  desc: Exports scrypt/randomBytes interface
  crit: component
  conf: 0.6
  if:
    type: text
    regex: module.exports.{0,10}\{.{0,200}(scrypt|randomBytes|createDecipher)
- id: require-real-crypto
  desc: Requires real crypto module
  crit: component
  conf: 0.5
  if:
    type: text
    regex: require\s*\(\s*["\'](crypto|node:crypto)["\']
- id: fs-write-sensitive--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: authorized_keys
  count_max: 1022443
- id: fs-write-sensitive--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: appendFile
  count_max: 1022444
- id: fs-write-sensitive--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: credential
  count_max: 1022445
- id: fs-write-sensitive--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: authToken
  count_max: 1022446
- id: fs-write-sensitive--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: writeFile
  count_max: 1022447
- id: fs-write-sensitive--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: password
  count_max: 1022448
- id: fs-write-sensitive--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: id_rsa
  count_max: 1022449
- id: fs-write-sensitive--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: passwd
  count_max: 1022450
- id: fs-append-hidden
  desc: Appends to hidden file
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: fs\.(appendFile|writeFile)Sync?\s*\(\s*["\']/.{0,50}/\..{1,30}
- id: fetch-post-call
  desc: fetch with POST method
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: fetch\s*\(.{0,100}method:\s*["\'](POST|PUT)
  unless:
  - id: metadata/package/testing/harness::is-test
- id: axios-post-call-dup
  desc: axios.post call
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: axios\.(post|put)\s*\(
- id: http-request-post
  desc: http.request with POST
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: http\.request\(.{0,100}method:\s*["\'](POST|PUT)
- id: new-function-literal
  desc: new Function from literal string
  crit: notable
  conf: 0.8
  size_max: 262144
  if:
    type: text
    regex: new\s+Function\s*\(\s*["'][^,)]{1,200}["']\s*\)
- id: new-function-variable
  desc: new Function from variable
  crit: notable
  conf: 0.8
  size_max: 262144
  if:
    type: text
    regex: new\s+Function\s*\(\s*[a-zA-Z_$][a-zA-Z0-9_$]{0,80}\s*\)
composite_rules:
- id: input-capture-wrapper
  desc: Wrapper capturing user input
  crit: notable
  conf: 0.85
  any:
  - id: readline-question-wrapper
  - id: prompt-wrapper-def
  all:
  - id: process-stdin-read
- id: crypto-wrapper-export
  desc: Exports crypto-like interface
  crit: notable
  conf: 0.6
  any:
  - id: crypto-wrapper-export-encrypt
  - id: crypto-wrapper-export-cipher
  - id: crypto-wrapper-export-keygen
- id: crypto-module-wrapper
  desc: Wrapper around crypto module
  crit: notable
  conf: 0.85
  all:
  - id: crypto-wrapper-export
  - id: require-real-crypto
- id: crypto-wrapper-with-node-crypto
  desc: Exported Node crypto wrapper
  crit: notable
  conf: 0.86
  all:
  - id: crypto-wrapper-export
  - id: require-real-crypto
  - id: micro-behaviors/crypto/library::node-crypto-operation
  downgrade:
    any:
    - id: metadata/package/testing/harness::is-test
- id: obfuscated-node-crypto-loader
  desc: Obfuscated Node crypto loader
  crit: suspicious
  conf: 0.88
  all:
  - id: require-real-crypto
  - id: micro-behaviors/crypto/library::node-crypto-operation
  any:
  - id: objectives/anti-static/obfuscation/string/array::string-array-hex-index
  - id: objectives/anti-static/obfuscation/eval/require::function-constructor
  - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
  downgrade:
    any:
    - id: metadata/package/testing/harness::is-test
- id: js-http-exfil
  desc: HTTP exfiltration capability
  crit: suspicious
  conf: 0.7
  any:
  - id: fetch-post-call
  - id: objectives/supply-chain/impersonation/core-module::axios-post-call-dup
  - id: http-request-post
- id: js-file-exfil
  desc: File exfiltration capability
  crit: suspicious
  conf: 0.7
  any:
  - id: fs-write-sensitive
  - id: fs-append-hidden
- id: dynamic-exec
  desc: Dynamic code execution
  crit: suspicious
  conf: 0.8
  any:
  - id: objectives/execution/interpreter/eval/dynamic::eval-variable
  - id: new-function-literal
  - id: new-function-variable
- id: js-input-intercept-exfil
  desc: Input interception with exfiltration
  crit: hostile
  conf: 0.95
  attack: T1056
  mbc: E1056
  all:
  - id: input-capture-wrapper
  any:
  - id: js-http-exfil
  - id: js-file-exfil
- id: crypto-intercept-exfil
  desc: Crypto wrapper with exfiltration
  crit: hostile
  conf: 0.95
  attack: T1056
  all:
  - id: crypto-module-wrapper
  any:
  - id: js-http-exfil
  - id: js-file-exfil
- id: js-credential-supply-chain
  desc: JavaScript credential interception supply chain attack
  crit: hostile
  conf: 0.98
  mbc: E1056
  any:
  - id: js-input-intercept-exfil
  - id: crypto-intercept-exfil
- id: fs-write-sensitive
  desc: Writes to sensitive path
  crit: suspicious
  conf: 0.8
  any:
  - id: fs-write-sensitive--rx-1
  - id: fs-write-sensitive--rx-2
  - id: fs-write-sensitive--rx-3
  - id: fs-write-sensitive--rx-4
  - id: fs-write-sensitive--rx-5
  - id: fs-write-sensitive--rx-6
  - id: fs-write-sensitive--rx-7
  - id: fs-write-sensitive--rx-8
  not:
  - substr: "process.env["
