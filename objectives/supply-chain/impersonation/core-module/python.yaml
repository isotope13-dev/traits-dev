# Python Supply Chain Attack Detection - Package Impersonation
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects Python packages that masquerade as legitimate stdlib packages
defaults:
  platforms: [unix, windows]
  for: [python]
  crit: suspicious
  attack: "T1195.002"
traits:
  # === getpass Interception ===
- id: getpass-func-def
  desc: getpass function definition
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: 'def getpass\s*\('
- id: imports-real-getpass
  desc: Imports real getpass module
  crit: component
  conf: 0.5
  if:
    type: text
    regex: 'from getpass import|import getpass\b'
- id: getpass-module-call
  desc: Calls getpass.getpass
  crit: component
  conf: 0.5
  if:
    type: symbol
    exact: getpass
- id: input-func-def
  desc: Custom input function definition
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: 'def input\s*\('
- id: builtin-input-call
  desc: Calls __builtins__.input or builtins.input
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: '(__builtins__|builtins)\.input\('
  # === File Exfiltration ===
- id: write-password-file--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: password
  count_max: 1022256
- id: write-password-file--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: passwd
  count_max: 1022257
- id: write-password-file--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: write
  count_max: 1022258
- id: write-password-file--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: cred
  count_max: 1022259
- id: write-password-file--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: open
  count_max: 1022260
- id: write-password-file--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: with
  count_max: 1022261
- id: append-hidden-file
  desc: Appends to hidden file
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: 'open\s*\(\s*["\'']/.{0,50}/\..{1,30}["\'']\s*,\s*["\''][abwx]\+?["\'']'
  # === HTTP Exfiltration ===
- id: requests-post-call
  desc: requests.post call
  crit: component
  conf: 0.6
  if:
    type: text
    regex: 'requests\.post\s*\('
  # NOTE: urllib.request.urlopen detected by micro-behaviors/communications/http/lib/urllib::urllib-urlopen
- id: urllib-request-class
  desc: urllib Request class instantiation
  crit: component
  conf: 0.6
  if:
    type: text
    regex: 'urllib\.request\.Request\s*\('
  # === Subprocess Execution ===
- id: subprocess-shell-true
  desc: subprocess with shell=True
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: 'subprocess\.(run|Popen|call)\(.{0,100}shell\s*=\s*True'
      # Composite-based detection for multiline subprocess + shell=True
      # The regex above fails when args span multiple lines
- id: write-password-file-cond-0--inline-22265
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\.write\(.{0,80}(password-db|password-stores)\s*='
    case_insensitive: true
  count_max: 1022266
- id: write-password-file-cond-1--inline-22266
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\.write\(.{0,80}(store-passwords|store-plaintext-passwords)\s*='
    case_insensitive: true
  count_max: 1022267
- id: write-password-file-cond-2--inline-22267
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\.write\(.{0,80}http-proxy-password\s*='
    case_insensitive: true
      # Telnet/serial device auth writes password bytes to connection object
  count_max: 1022268
- id: write-password-file-cond-3--inline-22268
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: 'bytes(password, "ascii")'
  count_max: 1022269
- id: write-password-file-cond-4--inline-22269
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: "import telnetlib"
  count_max: 1022270
composite_rules:
  # === getpass Wrapper Detection ===
- id: getpass-wrapper
  desc: Wrapper around real getpass module
  crit: notable
  conf: 0.85
  all:
  - id: getpass-func-def
  any:
  - id: imports-real-getpass
  - id: getpass-module-call
  # === input Interception Detection ===
- id: input-intercept
  desc: Intercepts builtin input function
  crit: suspicious
  conf: 0.85
  all:
  - id: input-func-def
  - id: builtin-input-call
  # === HTTP Exfiltration ===
- id: py-http-exfil
  desc: HTTP exfiltration capability
  crit: suspicious
  conf: 0.7
  any:
  - id: requests-post-call
  - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen
  - id: urllib-request-class
  # === File Exfiltration ===
- id: py-file-exfil
  desc: File exfiltration capability
  crit: suspicious
  conf: 0.7
  any:
  - id: write-password-file
  - id: append-hidden-file
  # === Credential Interception with Exfil ===
- id: getpass-intercept-exfil
  desc: getpass interception with exfiltration
  crit: hostile
  conf: 0.95
  attack: "T1056"
  mbc: "E1056"
  all:
  - id: getpass-wrapper
  any:
  - id: py-http-exfil
  - id: py-file-exfil
  # === Input Interception with Exfil ===
- id: py-input-intercept-exfil
  desc: input interception with exfiltration
  crit: hostile
  conf: 0.95
  attack: "T1056"
  all:
  - id: input-intercept
  any:
  - id: py-http-exfil
  - id: py-file-exfil
  # === Full Supply Chain Pattern ===
- id: python-credential-supply-chain
  desc: Python credential interception supply chain attack
  crit: hostile
  conf: 0.98
  mbc: "E1056"
  any:
  - id: getpass-intercept-exfil
  - id: py-input-intercept-exfil
- id: write-password-file
  desc: Writes to file with password in path
  crit: suspicious
  conf: 0.8
  any:
  - id: write-password-file--rx-1
  - id: write-password-file--rx-2
  - id: write-password-file--rx-3
  - id: write-password-file--rx-4
  - id: write-password-file--rx-5
  - id: write-password-file--rx-6
  unless:
      # Benign config-template writes (password keys in INI/config content)
  - id: write-password-file-cond-0--inline-22265
  - id: write-password-file-cond-1--inline-22266
  - id: write-password-file-cond-2--inline-22267
  - id: write-password-file-cond-3--inline-22268
  - id: write-password-file-cond-4--inline-22269
