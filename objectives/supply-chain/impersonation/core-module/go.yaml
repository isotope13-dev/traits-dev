defaults:
  platforms:
    - unix
    - windows
  for:
    - go
  crit: suspicious
  attack: T1195.002
traits:
  - id: terminal-package-decl
    desc: Package named 'terminal'
    crit: notable
    conf: 0.6
    unless:
      - type: path
        regex: '(^|[\\/])(pkg|internal|cmd|cli|testdata)[\\/]terminal[\\/]'
      - type: path
        regex: '(^|/)golang\.org/x/crypto@[^/]+/ssh/terminal/'
      # The vendored compatibility shim is an official x/crypto package
      # forwarding to x/term, not an impersonating package.
      - type: path
        regex: '(^|[\\/])vendor[\\/]golang\.org[\\/]x[\\/]crypto[\\/]ssh[\\/]terminal[\\/]'
    if:
      type: text
      regex: ^package terminal\b
  - id: bitfield-script-import
    desc: Uses github.com/bitfield/script library
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: github.com/bitfield/script
  - id: readpassword-func
    desc: ReadPassword function definition
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: func ReadPassword\s*\(
  - id: echo-call
    desc: script.Echo method call
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: script.Echo(
  - id: script-get-call
    desc: script.Get method call
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: script.Get(
  - id: exec-command-sh
    desc: exec.Command with /bin/sh
    crit: component
    conf: 0.8
    if:
      type: text
      regex: exec\.Command\s*\(\s*"/bin/sh"
composite_rules:
  - id: terminal-wrapper
    desc: Wrapper around real terminal package
    crit: suspicious
    conf: 0.85
    all:
      - id: terminal-package-decl
      - id: micro-behaviors/ui/terminal::go-x-term-import
      - id: readpassword-func
  - id: password-intercept
    desc: Password interception with file write
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/ui/terminal::go-readpassword-call
      - id: objectives/credential-access/capture/input::file-write-operation
    unless:
      - id: objectives/credential-access/capture/input/
  - id: password-exfil-http-comp
    desc: Password captured and sent via HTTP
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/ui/terminal::go-readpassword-call
      - id: objectives/credential-access/capture/input::http-exfil-operation
    unless:
      - id: objectives/credential-access/capture/input/
  - id: fetch-and-exec
    desc: Fetches URL and executes as shell command
    crit: hostile
    conf: 0.95
    all:
      - id: script-get-call
      - id: exec-command-sh
      - id: micro-behaviors/process/create/direct::go-command-start
  - id: go-terminal-supply-chain
    desc: Go terminal package supply chain attack
    crit: hostile
    conf: 0.98
    mbc: E1056
    all:
      - id: terminal-wrapper
    any:
      - id: password-intercept
      - id: password-exfil-http-comp
      - id: fetch-and-exec
  - id: credential-theft-package
    desc: Go package with credential theft capability
    crit: hostile
    conf: 0.95
    attack: T1056
    needs: 3
    any:
      - id: readpassword-func
      - id: objectives/credential-access/capture/input::file-write-operation
      - id: objectives/credential-access/capture/input::http-exfil-operation
      - id: bitfield-script-import
      - id: exec-command-sh
