defaults:
  platforms:
    - unix
    - windows
  for:
    - go
  crit: suspicious
  attack: T1195.002
traits:
  - id: bitfield-script-import
    desc: Uses github.com/bitfield/script library
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: github.com/bitfield/script
  - id: echo-call
    desc: script.Echo method call
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: script.Echo(
  - id: script-get-call
    desc: script.Get method call
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: script.Get(
  - id: exec-command-sh
    desc: exec.Command with /bin/sh
    crit: component
    conf: 0.8
    if:
      type: text
      regex: exec\.Command\s*\(\s*"/bin/sh"
composite_rules:
  # A normal package can quite legitimately wrap x/term's password prompt.
  # Require the deprecated package identity as well as password handling and
  # external script I/O so the supply-chain signal stays attack-contextual.
  - id: terminal-wrapper
    desc: Terminal password wrapper performs external script I/O
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/supply-chain/impersonation/deprecated::go-pkg-terminal-deprecated
      - id: micro-behaviors/ui/terminal::go-x-term-import
      - id: micro-behaviors/ui/terminal::go-readpassword-call
      - id: echo-call
      - id: script-get-call
  - id: password-intercept
    desc: Password interception with file write
    crit: hostile
    conf: 0.95
    all:
      - id: terminal-wrapper
      - id: objectives/credential-access/capture/input::file-write-operation
    unless:
      - id: objectives/credential-access/capture/input/
  - id: password-exfil-http-comp
    desc: Password captured and sent via HTTP
    crit: hostile
    conf: 0.95
    all:
      - id: terminal-wrapper
      - id: objectives/credential-access/capture/input::http-exfil-operation
    unless:
      - id: objectives/credential-access/capture/input/
  - id: fetch-and-exec
    desc: Fetches URL and executes as shell command
    crit: hostile
    conf: 0.95
    all:
      - id: script-get-call
      - id: exec-command-sh
      - id: micro-behaviors/process/create/direct::go-command-start
  - id: go-terminal-supply-chain
    desc: Go terminal package supply chain attack
    crit: hostile
    conf: 0.98
    mbc: E1056
    all:
      - id: terminal-wrapper
    any:
      - id: password-intercept
      - id: password-exfil-http-comp
      - id: fetch-and-exec
  - id: credential-theft-package
    desc: Go package captures terminal passwords with secondary handling
    crit: hostile
    conf: 0.95
    attack: T1056
    all:
      - id: terminal-wrapper
    any:
      - id: objectives/credential-access/capture/input::file-write-operation
      - id: objectives/credential-access/capture/input::http-exfil-operation
      - id: exec-command-sh
