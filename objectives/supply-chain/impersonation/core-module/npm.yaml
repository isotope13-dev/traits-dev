defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
  mbc: E1195.002

traits:
  - id: description-node-path-module
    desc: Description claims Node path module
    crit: component
    conf: 0.9
    if:
      type: kv
      path: description
      exact: Node.js path module
  - id: main-path-js
    desc: Package main points to path.js
    crit: component
    conf: 0.85
    if:
      type: kv
      path: main
      regex: ^\.?/path\.js$
  - id: dependency-path-polyfill
    desc: Package depends on path polyfill
    crit: component
    conf: 0.75
    if:
      type: kv
      path: dependencies.path
      exists: true
  - id: legitimate-path-package-name
    desc: Legitimate path package name
    crit: component
    conf: 0.95
    if:
      type: kv
      path: name
      regex: ^(path|path-browserify)$

composite_rules:
  - id: npm-path-module-masquerade
    desc: npm package masquerades as path module
    crit: suspicious
    conf: 0.94
    all:
      - id: description-node-path-module
      - id: main-path-js
    any:
      - id: dependency-path-polyfill
      - id: objectives/supply-chain/metadata-anomaly/dependency/facade::npm-dep-fs-security-stub
      - id: objectives/supply-chain/metadata-anomaly/dependency/facade::npm-dep-execp
    unless:
      - id: legitimate-path-package-name
  - id: npm-path-module-execp-masquerade
    desc: path masquerade package depends on execp
    crit: hostile
    conf: 0.985
    all:
      - id: npm-path-module-masquerade
      - id: objectives/supply-chain/metadata-anomaly/dependency/facade::npm-dep-execp
