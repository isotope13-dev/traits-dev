defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
- id: name-dump-keyword
  desc: Package name contains "dump" keyword
  crit: notable
  conf: 0.7
  if:
    type: value
    path: name
    regex: 'dump'
    case_insensitive: true
- id: name-grab-keyword
  desc: Package name contains "grab" keyword
  crit: notable
  conf: 0.7
  if:
    type: value
    path: name
    regex: 'grab(ber)?'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-steal-keyword
  desc: Package name contains "steal" keyword
  crit: suspicious
  conf: 0.85
  if:
    type: value
    path: name
    regex: 'steal(er)?'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-hack-keyword
  desc: Package name contains "hack" keyword
  crit: notable
  conf: 0.7
  if:
    type: value
    path: name
    regex: '(^|[-_/])hack(er|ing)?($|[-_/])'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-crack-keyword
  desc: Package name contains "crack" keyword
  crit: notable
  conf: 0.7
  if:
    type: value
    path: name
    regex: 'crack(er)?'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-token-keyword
  desc: Package name contains "token" keyword
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: 'token'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-logger-keyword
  desc: Package name contains "logger" keyword
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: 'logger'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-exfil-keyword
  desc: Package name contains "exfil" keyword
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: name
    regex: 'exfil'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-discord-target
  desc: Package name contains "discord"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: 'discord'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-telegram-target
  desc: Package name contains "telegram"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: 'telegram'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-slack-target
  desc: Package name contains "slack"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: 'slack'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-wallet-target
  desc: Package name contains "wallet"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: 'wallet'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-crypto-target
  desc: Package name contains crypto
  crit: notable
  conf: 0.4
  if:
    type: value
    path: name
    regex: 'crypto'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-metamask-target
  desc: Package name contains "metamask"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: 'metamask'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-browser-target
  desc: Package name contains "browser"
  crit: notable
  conf: 0.4
  if:
    type: value
    path: name
    regex: 'browser'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
  - id: well-known/lib/influxdb3-js/
  - type: text
    substr: '"description": "InfluxDB 3 client for browser"'
- id: name-password-target
  desc: Package name contains "password"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: 'pass(word)?'
    case_insensitive: true
  not:
  - substr: '"name": "tabby-auto-sudo-password"'
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-mysql-prefix
  desc: Package name prefixes "mysql"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: '^mysql-'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-express-prefix
  desc: Package name prefixes "express"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: '^express-'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-react-prefix
  desc: Package name prefixes "react"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: '^react-'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-vue-prefix
  desc: Package name prefixes "vue"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: '^vue-'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: name-node-prefix
  desc: Package name prefixes "node"
  crit: notable
  conf: 0.5
  if:
    type: value
    path: name
    regex: '^node-'
    case_insensitive: true
  not:
  - substr: '"name": "node-pty"'
  unless:
  - id: metadata/package/manifest/freeform/
- id: keyword-dump
  desc: Keywords contain "dump"
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '"keywords":\s*\[[^\]]{0,300}".{0,120}dump.{0,120}"'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: keyword-grab
  desc: Keywords contain "grab"
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '"keywords":\s*\[[^\]]{0,300}".{0,120}grab.{0,120}"'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: keyword-steal
  desc: Keywords contain "steal"
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '"keywords":\s*\[[^\]]{0,300}".{0,120}steal.{0,120}"'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
- id: keyword-token-dup
  desc: Keywords contain "token"
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: '"keywords":\s*\[[^\]]{0,300}".{0,120}token.{0,120}"'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
  - type: text
    regex: '"keywords":\s*\[[^\]]{0,300}".{0,120}(auth|jwt|oauth).{0,120}"'
    case_insensitive: true
      # "token" is overloaded: LLM context-token counters / tokenizers
      # legitimately advertise it. Skip when the package is clearly LLM tooling.
  - type: text
    case_insensitive: true
    regex: claude
  - type: text
    case_insensitive: true
    regex: gpt
  - type: text
    case_insensitive: true
    regex: llm
  - type: text
    case_insensitive: true
    regex: openai
- id: keyword-discord
  desc: Keywords contain "discord"
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: '"keywords":\s*\[[^\]]{0,300}".{0,120}discord.{0,120}"'
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/freeform/
composite_rules:
- id: name-has-theft-keyword
  desc: Package name contains theft-related keyword
  crit: notable
  conf: 0.75
  any:
  - id: name-dump-keyword
  - id: name-grab-keyword
  - id: name-steal-keyword
  - id: name-hack-keyword
  - id: name-crack-keyword
  - id: name-exfil-keyword
- id: name-has-target-app
  desc: Package name contains target application
  crit: notable
  conf: 0.5
  any:
  - id: name-discord-target
  - id: name-telegram-target
  - id: name-slack-target
  - id: name-wallet-target
  - id: name-metamask-target
  - id: name-password-target
- id: name-theft-target-combo
  desc: Package name combines theft keyword with target app
  crit: suspicious
  conf: 0.9
  all:
  - id: name-has-theft-keyword
  - id: name-has-target-app
- id: keyword-theft-patterns
  desc: Keywords contain theft-related terms
  crit: notable
  conf: 0.75
  any:
  - id: keyword-dump
  - id: keyword-grab
  - id: keyword-steal
- id: keyword-theft-target-combo
  desc: Keywords combine theft and target terms
  crit: suspicious
  conf: 0.85
  all:
  - id: keyword-theft-patterns
  - id: keyword-discord
  - id: objectives/supply-chain/impersonation/name::keyword-token-dup
- id: theft-name-no-repo
  desc: Theft keyword in name without repository
  crit: suspicious
  conf: 0.85
  all:
  - id: name-has-theft-keyword
  unless:
  - id: metadata/package/manifest/repository/
- id: theft-name-no-bugs
  desc: Theft keyword in name without bugs URL
  crit: suspicious
  conf: 0.85
  all:
  - id: name-has-theft-keyword
  unless:
  - id: metadata/package/manifest/repository::has-bugs-url-field
- id: theft-name-no-homepage
  desc: Theft keyword in name without homepage
  crit: suspicious
  conf: 0.85
  all:
  - id: name-has-theft-keyword
  unless:
  - id: metadata/package/manifest/homepage::has-homepage-field
- id: name-has-financial-target
  desc: Package name targets financial asset
  crit: notable
  conf: 0.6
  any:
  - id: name-wallet-target
  - id: name-crypto-target
  - id: name-metamask-target
- id: inflated-version-financial-impersonation
  desc: Inflated version package impersonating financial tool
  crit: hostile
  conf: 0.95
  attack: T1195.002
  all:
  - id: name-has-financial-target
  - id: objectives/supply-chain/impersonation/registry/manifest::inflated-version-10plus
  any:
  - id: objectives/supply-chain/impersonation/npm-clone::repo-mismatch-indicator
  - id: objectives/supply-chain/install-hook/package/manifest::version-mature
  - id: metadata/package/manifest/entrypoint::main-dist-entrypoint
  - id: objectives/supply-chain/impersonation/manifest/skeleton::keywords-single-entry
  needs: 2
- id: credential-stealer-naming
  desc: Package naming suggests credential stealer
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  all:
  - id: name-theft-target-combo
  - id: keyword-discord
  - id: objectives/supply-chain/impersonation/name::keyword-token-dup
  unless:
  - id: metadata/package/manifest/repository/
