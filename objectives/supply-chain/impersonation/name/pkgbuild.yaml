# AUR package-name impersonation (T1036.005). Reads the parsed pkg.pkgname so
# the match is anchored to the declared package identity, not a stray string.
#
# Arch/AUR names are unique and unmoderated, which is exactly the CHAOS RAT
# (2025) distribution shape: a package named for a popular app plus a "trust me"
# qualifier — librewolf-fix-bin, firefox-patch-bin — so a user searching the AUR
# installs the trojan believing it is an official fix. `-bin` (a prebuilt
# binary) is itself normal in the AUR; the malicious tell is a reassurance word
# welded onto the name, and piracy words are illegitimate on their own.
#
# Each atom keeps <=3 alternations (the validator decomposes wider ones into
# component fragments, which don't surface standalone) and stays suspicious so a
# deceptively-named package is flagged on its own; the hostile composite adds the
# unverified-remote-source corroboration for the full review-then-swap trojan.
defaults:
  platforms: [linux]
  for: [shell]
  attack: T1036.005

traits:
  # Piracy / crack qualifiers: no legitimately-distributed package is named this.
- id: aur-pkgname-crack-suffix
  desc: Package name claims crack
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: pkg.pkgname
    regex: '-(cracked|hacked|nulled)$'
- id: aur-pkgname-keygen-suffix
  desc: Package name claims warez or keygen
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: pkg.pkgname
    regex: '-(keygen|warez|pirated)$'

  # Reassurance qualifier welded onto a prebuilt-binary name — the CHAOS RAT
  # shape (`<app>-fix-bin`, `<app>-patch-bin`). The `-bin` anchor keeps this off
  # ordinary `<app>-fix` source packages and the reassurance word keeps it off
  # ordinary `<app>-bin` prebuilt packages; only the deceptive combination fires.
- id: aur-pkgname-reassurance-bin
  desc: Prebuilt package name welds a reassurance word
  crit: suspicious
  conf: 0.85
  if:
    type: value
    path: pkg.pkgname
    regex: '-(fix|patch|secure)-bin$'

composite_rules:
  # The full CHAOS RAT signal: a deceptively-named prebuilt package that also
  # fetches a swappable, integrity-unverified remote archive. Either half alone
  # is suspicious; together they are the review-clean-then-swap trojan.
- id: aur-impersonation-unverified-trojan
  desc: Deceptively-named AUR package fetches unverified payload
  crit: hostile
  conf: 0.92
  all:
  - id: aur-pkgname-reassurance-bin
  - id: metadata/package/quality/integrity::pkgbuild-unverified-remote-source
