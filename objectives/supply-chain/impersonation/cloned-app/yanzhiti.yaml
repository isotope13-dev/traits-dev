# The wheel is a namespace-renamed copy of agentscope-ai/QwenPaw, but its
# embedded metadata repeatedly attributes the nonexistent YanZhiTi repository
# to the AgentScope organization. The renamed package also replaces QwenPaw's
# telemetry destination. Those three artifact-local facts make this a forged
# upstream identity rather than a generic fork or an isolated analytics call.
defaults:
  platforms: [unix, windows]
  for: [python, pkginfo, whl, archives]
  attack: T1195.002

composite_rules:
  - id: yanzhiti-agentscope-project-impersonation
    desc: YanZhiTi repack forges AgentScope project identity
    crit: hostile
    conf: 0.995
    ref: sha256:d456dc01ed76a5c64fdfab354573fdd7627d73fff1358a2ce0cdf0411ddf7c76
    scope: archive
    all:
      - id: metadata/package/manifest/name::pypi-package-name
      - id: metadata/package/manifest/repository::claimed-agentscope-repository
      - id: micro-behaviors/communications/http/endpoints::replacement-telemetry-endpoint
