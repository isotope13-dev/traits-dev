defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  attack: T1195.002

traits:
- id: openbuff-package-name
  desc: Openbuff AI-agent package identity
  crit: component
  conf: 0.99
  for: [package.json]
  if:
    type: value
    path: name
    exact: '@openbuff/cli'
- id: openbuff-agent-description
  desc: Openbuff coding-agent package description
  crit: component
  conf: 0.98
  for: [package.json]
  if:
    type: value
    path: description
    regex: '(?i)AI coding agent'
- id: foreign-ai-agent-telemetry-brand
  desc: Codebuff-branded telemetry variable
  crit: notable
  conf: 0.99
  for: [javascript, typescript]
  if:
    type: text
    regex: 'CODEBUFF_POSTHOG_(API_KEY|HOST)'

composite_rules:
- id: openbuff-codebuff-identity-clone
  desc: AI-agent package mixes Openbuff identity with Codebuff telemetry
  crit: hostile
  conf: 0.99
  scope: archive
  all:
    - id: openbuff-package-name
    - id: openbuff-agent-description
    - id: foreign-ai-agent-telemetry-brand
