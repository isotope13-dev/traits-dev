defaults:
  for: [package.json]
  platforms: [unix, windows]
traits:
  - id: mcp-keyword
    desc: Package uses MCP keyword
    crit: component
    conf: 0.5
    if:
      type: kv
      path: "keywords[*]"
      exact: mcp
  - id: mcp-proxy-keyword
    desc: Package uses proxy keyword
    crit: component
    conf: 0.5
    if:
      type: kv
      path: "keywords[*]"
      exact: proxy
  - id: mcp-desc-forward-remote
    desc: Description mentions forwarding to remote
    crit: component
    conf: 0.6
    if:
      type: kv
      path: "description"
      regex: (forward|relay|proxy).{0,30}remote
      case_insensitive: true
  - id: claude-keyword
    desc: Package uses claude keyword
    crit: component
    conf: 0.5
    if:
      type: kv
      path: "keywords[*]"
      exact: claude
composite_rules:
  - id: mcp-proxy-package
    desc: Package claims to be MCP proxy
    crit: notable
    conf: 0.8
    all:
      - id: mcp-keyword
    any:
      - id: mcp-proxy-keyword
      - id: mcp-desc-forward-remote
  - id: mcp-claude-proxy-package
    desc: Package impersonates Claude MCP tool
    crit: suspicious
    conf: 0.85
    all:
      - id: mcp-keyword
      - id: claude-keyword
    any:
      - id: mcp-proxy-keyword
      - id: mcp-desc-forward-remote
