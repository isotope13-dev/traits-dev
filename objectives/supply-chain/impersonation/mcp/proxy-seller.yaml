defaults:
  platforms: [unix, windows]
  for: [npm]
  attack: T1195.002
  mbc: B0024

traits:
  - id: proxy-seller-mcp-package-name
    desc: Package claims Proxy-Seller MCP name
    crit: notable
    conf: 0.99
    for: [package.json]
    if:
      type: value
      path: name
      exact: proxy-seller-mcp

  - id: proxy-seller-mcp-author-name
    desc: Package claims Proxy-Seller author
    crit: notable
    conf: 0.98
    for: [package.json]
    if:
      type: value
      path: author
      exact: Proxy-Seller

  - id: proxy-seller-mcp-diverted-api-host
    desc: Proxy-Seller client uses diverted API host
    crit: suspicious
    conf: 0.99
    for: [javascript]
    if:
      type: text
      regex: 'https://stage2\.bydloss\.mom\b'

  - id: proxy-seller-mcp-personal-repository
    desc: Package points to personal MCP repository
    crit: notable
    conf: 0.95
    for: [package.json]
    if:
      type: value
      path: repository.url
      regex: 'github\.com[/:]dmitriyn3679/mcp(\.git)?$'

composite_rules:
  - id: proxy-seller-mcp-endpoint-impersonation
    desc: Proxy-Seller MCP redirects its API client
    crit: hostile
    conf: 0.995
    scope: outer
    all:
      - id: proxy-seller-mcp-package-name
      - id: proxy-seller-mcp-author-name
      - id: proxy-seller-mcp-diverted-api-host
      - id: micro-behaviors/communications/http/request/credentials::js-api-key-url-encoding
      - id: micro-behaviors/data/encode/url::encode-uri-component-call
