defaults:
  platforms:
  - unix
  - windows
  for:
  - package.json
traits:
- id: name-ui-style-unscoped
  desc: Unscoped company-style UI style package name
  crit: component
  conf: 0.82
  if:
    type: value
    path: name
    regex: "^[a-z0-9][a-z0-9-]{3,40}-ui-style$"
- id: keywords-single-entry
  desc: Keywords array has exactly one entry
  crit: component
  conf: 0.7
  if:
    type: value
    path: keywords
    size_min: 1
    size_max: 1
  unless:
  - id: metadata/package/testing/presence/fixture::tabby-builtin-keyword
  - id: metadata/package/manifest/repository/
- id: test-script-trivial-shell-a
  desc: Trivial test script (ls/true/echo/pwd)
  crit: component
  conf: 0.85
  if:
    type: value
    path: scripts.test
    regex: "^(ls|true|echo|pwd)(\\s.{0,80})?$"
    case_insensitive: true
  unless:
  - type: value
    path: scripts.test
    exact: echo "No test suite configured" && exit 1
- id: test-script-trivial-shell-b
  desc: Trivial test script (cat/date/whoami)
  crit: component
  conf: 0.85
  if:
    type: value
    path: scripts.test
    regex: "^(cat|date|whoami)(\\s.{0,80})?$"
    case_insensitive: true
- id: desc-placeholder-package
  desc: Description mentions placeholder package
  crit: notable
  conf: 0.75
  if:
    type: value
    path: description
    substr: placeholder
    case_insensitive: true
- id: scoped-typosquat-1
  desc: Scoped React/Vue/Angular package name
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: '"name":\s*"@[^/]{1,80}/(react|vue|angular)"'
- id: scoped-typosquat-2
  desc: "@<scope>/ scoped package name"
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: '"name":\s*"@[^/]{1,80}/(express|lodash|axios)'
- id: zero-byte-js-entry
  desc: Zero-byte JavaScript main entry file
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  for:
  - javascript
  size_max: 0
  if:
    id: metadata/package/files/package-json::zero-byte-js-entry
- id: author-corp-email-dropbox
  desc: Author uses Dropbox corporate email
  crit: notable
  conf: 0.72
  attack: T1195.002
  if:
    type: value
    path: author
    substr: "@dropbox.com"
composite_rules:
- id: scoped-typosquat
  desc: "@<scope>/<framework> scoped package name"
  crit: notable
  conf: 0.85
  any:
  - id: objectives/supply-chain/impersonation/manifest/skeleton::scoped-typosquat-1
  - id: objectives/supply-chain/impersonation/manifest/skeleton::scoped-typosquat-2
- id: no-deps-with-hooks
  desc: Package has install hooks but no dependencies
  crit: notable
  conf: 0.85
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
  - id: metadata/package/dependencies::npm-no-deps-at-all
  unless:
  - id: metadata/package/manifest/entrypoint::has-bin-field
  - id: metadata/package/manifest/publishing::is-private
- id: multiple-hooks
  desc: Package has multiple install lifecycle hooks
  crit: notable
  conf: 0.85
  needs: 2
  any:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
  - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-install
  unless:
  - id: metadata/package/manifest/repository/
- id: new-version-hooks
  desc: Brand new package version with install hook
  crit: suspicious
  conf: 0.8
  all:
  - id: metadata/package/versioning::npm-version-0-0-1
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
  unless:
  - id: metadata/package/dependencies::has-dev-deps
  - id: well-known/app/nss::nss-taskcluster-automation
  - id: metadata/package/testing/presence/fixture/
- id: missing-metadata-hooks
  desc: Package missing standard metadata but has install hook
  crit: suspicious
  conf: 0.85
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
  unless:
  - id: metadata/package/manifest/repository::has-repository-field
  - id: metadata/package/manifest/entrypoint::has-bin-field
  - id: metadata/package/manifest/publishing::is-private
  - id: metadata/package/dependencies::has-dev-deps
  - id: objectives/supply-chain/impersonation/package/manifest/
  - id: objectives/supply-chain/install-hook/package/manifest::tabby-builtin-plugin-keyword
  downgrade:
    any:
    - id: metadata/package/manifest/freeform::pkg-skeleton-small
- id: hollow-ui-style-name-squat
  desc: Hollow UI style package namespace squat
  crit: hostile
  conf: 0.97
  attack: T1195.002
  mbc: B0024
  all:
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: objectives/supply-chain/impersonation/manifest/skeleton::name-ui-style-unscoped
  - id: metadata/package/manifest/entrypoint::has-index-entry
  - id: metadata/package/testing/presence/manifest::npm-init-default-test
  - id: objectives/supply-chain/impersonation/manifest/placeholder::desc-test-package
  any:
  - id: metadata/package/versioning::mature-version
  - id: metadata/package/quality/empty::npm-no-keywords
  - id: metadata/package/dependencies::npm-no-deps-devdependencies
  - id: metadata/package/files/package-json::author-very-short
  needs: 3
  unless:
  - id: metadata/package/manifest/repository/
  - id: metadata/package/manifest/entrypoint::has-bin-field
  - id: metadata/package/testing/presence/fixture::playwright-test-plugin-fixture
  - id: metadata/package/testing/presence/fixture::test-fixture-package-json-path
  - id: metadata/package/testing/presence/fixture/
- id: sfdc-prefix-init-squat
  desc: sfdc-prefixed npm init placeholder package
  crit: hostile
  conf: 0.97
  attack: T1195.002
  mbc: B0024
  all:
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: metadata/package/testing/presence/manifest::npm-init-default-test
  - id: metadata/package/quality/empty::npm-empty-description
  - id: metadata/package/manifest/name::npm-name-sfdc-prefix
  any:
  - id: metadata/package/quality/empty::npm-empty-author
  - id: metadata/package/dependencies::npm-no-runtime-dependencies
  - id: metadata/package/versioning::mature-version
  needs: 2
  unless:
  - id: metadata/package/manifest/repository/
  - id: metadata/package/manifest/entrypoint::has-bin-field
  - id: metadata/package/testing/presence/fixture::playwright-test-plugin-fixture
- id: sfdc-prefix-hollow-index-squat
  desc: sfdc-prefixed hollow package advertises default index entry
  crit: hostile
  conf: 0.98
  attack: T1195.002
  mbc: B0024
  all:
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: metadata/package/quality/empty::npm-empty-description
  - id: metadata/package/manifest/entrypoint::has-index-entry
  - id: metadata/package/manifest/name::npm-name-sfdc-prefix
  any:
  - id: metadata/package/testing/presence/manifest::npm-init-default-test
  - id: metadata/package/quality/empty::npm-empty-author
  - id: metadata/package/quality/empty::npm-no-keywords
  - id: metadata/package/dependencies::npm-no-runtime-dependencies
  needs: 3
  unless:
  - id: metadata/package/manifest/repository/
  - id: metadata/package/manifest/entrypoint::has-bin-field
  - id: metadata/package/testing/presence/fixture::playwright-test-plugin-fixture
- id: test-script-trivial-shell
  desc: Test script is a trivial shell command
  crit: notable
  conf: 0.85
  any:
  - id: objectives/supply-chain/impersonation/manifest/skeleton::test-script-trivial-shell-a
  - id: objectives/supply-chain/impersonation/manifest/skeleton::test-script-trivial-shell-b
- id: inflated-sparse-package-invalid-license-key
  desc: Inflated sparse package has invalid License key with install hook
  crit: suspicious
  conf: 0.95
  attack: T1195.002
  all:
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
  - id: metadata/package/versioning::npm-version-inflated-major
  - id: metadata/package/license::npm-license-key-case-variant
  any:
  - id: metadata/package/quality/empty::npm-empty-author
  - id: metadata/package/dependencies::npm-no-deps-devdependencies
  needs: 1
  unless:
  - id: metadata/package/manifest/repository/
  - id: metadata/package/manifest/publishing::is-private
