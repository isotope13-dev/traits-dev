composite_rules:
- id: swift-spm-attack-executable
  desc: Swift executable package declares attack purpose
  crit: suspicious
  conf: 0.9
  for: [swift]
  attack: T1195.002
  all:
  - id: swift-spm-attack-purpose-name
  - id: metadata/package/manifest/ecosystem::swift-package-description-import
  any:
  - id: metadata/package/manifest/ecosystem::swift-executable-target
- id: desc-attack-technique-a
  desc: Description names attack technique
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  any:
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-a--ssrf
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-a--xss
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-a--rce
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-a--lfi
- id: desc-attack-technique-b
  desc: Description names attack technique
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  any:
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-b--rfi
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-b--sqli
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-b--idor
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-b--ssti
- id: desc-attack-technique-c
  desc: Description names attack technique (xxe/csrf)
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  any:
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-c--xxe
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-c--csrf
- id: bug-bounty-marker
  desc: Bug bounty or security research
  crit: notable
  conf: 0.9
  for:
  - javascript
  - package.json
  any:
  - id: objectives/supply-chain/impersonation/manifest/attack-label::bug-bounty-marker-1
  - id: objectives/supply-chain/impersonation/manifest/attack-label::bug-bounty-marker-2
- id: desc-prevent-squat
  desc: Description claims to prevent squatting
  crit: notable
  conf: 0.75
  any:
  - id: metadata/package/manifest/description::desc-prevent-squat-1
  - id: metadata/package/manifest/description::desc-prevent-squat-2
- id: dependency-confusion-claim
  desc: Package claims dependency confusion protection
  crit: notable
  conf: 0.8
  any:
  - id: metadata/package/manifest/description::desc-dependency-confusion
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-dependency-resolution-verify
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-passive-poc
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-package-poc
  - id: objectives/supply-chain/impersonation/manifest/skeleton::desc-placeholder-package
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-prevent-squat
- id: desc-attack-technique
  desc: Description names an attack technique
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  any:
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-a
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-b
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique-c
- id: ssrf-probe-npm-package
  desc: npm package explicitly labelled as SSRF probe
  crit: hostile
  conf: 0.95
  attack: T1195.002
  mbc: B0030
  for:
  - archives
  scope: archive
  all:
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique
  - id: micro-behaviors/ui/window/manage/navigation::browser-meta-refresh-external-url
