defaults:
  platforms:
  - unix
  - windows
  for:
  - package.json
traits:
- id: swift-spm-attack-purpose-name
  desc: Swift package name declares attack purpose
  crit: suspicious
  conf: 0.88
  for: [swift]
  attack: T1195.002
  if:
    type: text
    regex: 'name:\s*"[A-Za-z0-9_.-]{0,48}(phish|backdoor|trojan)[A-Za-z0-9_.-]{0,48}"'
    case_insensitive: true
- id: desc-dependency-resolution-verify
  desc: desc dependency resolution verify
  crit: notable
  conf: 0.8
  if:
    type: value
    path: description
    regex: dependency\s+resolution\s+verif
    case_insensitive: true
- id: desc-passive-poc
  desc: Description mentions passive PoC
  crit: notable
  conf: 0.85
  if:
    type: value
    path: description
    substr: passive PoC
- id: desc-package-poc
  desc: Description labels package as PoC
  crit: notable
  conf: 0.84
  if:
    type: value
    path: description
    regex: "\\b[a-z0-9._ -]{0,40}\\bPoC\\b"
    case_insensitive: true
- id: bug-bounty-marker-1
  desc: Bug bounty marker 1
  crit: notable
  conf: 0.75
  if:
    type: text
    case_insensitive: true
    regex: bug\s*bounty|hackerone|bugcrowd
- id: bug-bounty-marker-2
  desc: Bug bounty marker 2
  crit: notable
  conf: 0.75
  if:
    type: text
    case_insensitive: true
    regex: proof\s*of\s*concept|\bPoC\b
- id: desc-attack-technique-a--ssrf
  desc: Description names attack technique (ssrf)
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: description
    exact: ssrf
- id: desc-attack-technique-a--xss
  desc: Description names attack technique (xss)
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: description
    exact: xss
- id: desc-attack-technique-a--rce
  desc: Description names attack technique (rce)
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: description
    exact: rce
- id: desc-attack-technique-a--lfi
  desc: Description names attack technique (lfi)
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: description
    exact: lfi
- id: desc-attack-technique-b--rfi
  desc: Description names attack technique (rfi)
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: description
    exact: rfi
- id: desc-attack-technique-b--sqli
  desc: Description names attack technique (sqli)
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: description
    exact: sqli
- id: desc-attack-technique-b--idor
  desc: Description names attack technique (idor)
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: description
    exact: idor
- id: desc-attack-technique-b--ssti
  desc: Description names attack technique (ssti)
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: description
    exact: ssti
- id: desc-attack-technique-c--xxe
  desc: Description names attack technique (xxe)
  crit: suspicious
