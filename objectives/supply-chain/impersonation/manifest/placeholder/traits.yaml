defaults:
  platforms:
  - unix
  - windows
  for:
  - package.json
traits:
- id: npm-init-default-license
  desc: Undescribed package uses default ISC license
  crit: baseline
  conf: 0.95
  if:
    type: value
    path: license
    exact: ISC
  unless:
  - id: metadata/package/manifest/description::has-description
- id: placeholder-author-no-repo
  desc: Placeholder author without repository URL
  crit: suspicious
  conf: 0.85
  if:
    type: value
    path: author
    exact: Your Name
  unless:
  - id: metadata/package/manifest/repository::has-repository-field
- id: desc-test-package
  desc: Description is npm test placeholder
  crit: component
  conf: 0.82
  if:
    type: value
    path: description
    regex: "^test package$"
    case_insensitive: true
- id: desc-auto-generated
  desc: Description says package is auto-generated
  crit: suspicious
  conf: 0.85
  attack: T1195.002
  count_min: 1
  if:
    id: metadata/package/files/package-json::desc-auto-generated
- id: js-placeholder-announcement-1a
  desc: Placeholder package name announcement
  crit: notable
  conf: 0.8
  for:
  - javascript
  unless:
  - id: metadata/package/testing/harness/
  - id: metadata/file/profile/identity::static-html-shell
  if:
    type: text
    regex: "\\b(placeholder|fake)\\b.{0,30}\\bpackage\\b"
    case_insensitive: true
  not:
  - regex: "(?i)placeholder\\s+for\\s+"
  - regex: "(?im)^\\s*(//|/\\*|\\*)\\s*.*\\b(placeholder|fake)\\b.{0,30}\\bpackage\\b"
  - substr: "Demo module setup"
- id: js-placeholder-announcement-1b
  desc: Code announces a placeholder module
  crit: notable
  conf: 0.8
  for:
  - javascript
  unless:
  - id: metadata/package/testing/harness/
  - id: well-known/tool/development/aube::aube-node-placeholder-reservation
  if:
    type: text
    regex: "\\b(this\\s+is\\s+)?(a\\s+)?(placeholder|fake)\\s+module\\b"
    case_insensitive: true
  not:
  - regex: "(?im)^\\s*(//|/\\*|\\*)\\s*.*\\b(placeholder|fake)\\b.{0,30}\\bmodule\\b"
  - substr: "Demo module setup"
- id: js-placeholder-announcement-2
  desc: Placeholder npm package announcement
  crit: notable
  conf: 0.8
  for:
  - javascript
  unless:
  - id: metadata/package/testing/harness/
  if:
    type: string_literal
    regex: "\\b(placeholder|fake)\\b.{0,30}\\bnpm\\b"
    case_insensitive: true
  not:
  - regex: "(?im)^\\s*(//|/\\*|\\*)\\s*.*\\b(placeholder|fake)\\b.{0,30}\\bnpm\\b"
  - substr: "Demo module setup"
- id: js-placeholder-announcement-3
  desc: Code says "do not use" this package/module
  crit: notable
  conf: 0.8
  for:
  - javascript
  size_max: 1024
  unless:
  - id: metadata/package/testing/harness/
  - id: well-known/tool/development/aube::aube-node-placeholder-reservation
  if:
    type: string_literal
    regex: do\s+not\s+use\b.{0,40}\b(package|module|npm)\b
    case_insensitive: true
- id: js-hijacked-package-message
  desc: Code announces hijacked package
  crit: suspicious
  conf: 0.98
  attack: T1195.002
  for:
  - javascript
  if:
    type: string_literal
    substr: hijacked package
    case_insensitive: true
- id: js-malicious-code-executed
  desc: Code prints "Malicious code executed"
  crit: suspicious
  conf: 0.98
  attack: T1195.002
  for:
  - javascript
  if:
    type: string_literal
    exact: Malicious code executed
- id: placeholder-author-test-handle
  desc: Package author uses testNNN handle
  crit: notable
  conf: 0.82
  if:
    type: value
    path: author
    regex: "^test[0-9]{2,8}$"
- id: archive-fs-service-worker-msw-module-doc
  desc: Archive filesystem service worker MSW module doc
  crit: notable
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "@module MSW tools for servicing files from archive files"
- id: archive-fs-service-worker-msw-type-stub
  desc: Archive filesystem service worker MSW type stub
  crit: notable
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    substr: "A placeholder for the MSW module type"
composite_rules:
- id: placeholder-author-generic-1-comp
  desc: Author field contains generic placeholder (set 1)
  crit: notable
  conf: 0.7
  any:
  - id: metadata/package/files/package-json::placeholder-author-generic-1a-dup
  - id: metadata/package/files/package-json::placeholder-author-generic-1b-dup
- id: placeholder-author-generic-2-comp
  desc: Author field contains generic placeholder (set 2)
  crit: notable
  conf: 0.7
  any:
  - id: metadata/package/files/package-json::placeholder-author-generic-2a-dup
  - id: metadata/package/files/package-json::placeholder-author-generic-2b-dup
- id: placeholder-author-generic-comp
  desc: Author field contains generic placeholder
  crit: notable
  conf: 0.75
  any:
  - id: objectives/supply-chain/impersonation/manifest/placeholder::placeholder-author-generic-1-comp
  - id: objectives/supply-chain/impersonation/manifest/placeholder::placeholder-author-generic-2-comp
- id: placeholder-repository-generic-comp
  desc: Repository metadata contains placeholder organization
  crit: notable
  conf: 0.88
  any:
  - id: metadata/package/files/package-json::placeholder-your-org-homepage
  - id: metadata/package/files/package-json::placeholder-your-org-repository
- id: placeholder-published-metadata
  desc: Published npm package contains scaffold placeholder metadata
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  needs: 2
  any:
  - id: objectives/supply-chain/impersonation/manifest/placeholder::placeholder-author-generic-comp
  - id: metadata/package/files/package-json::placeholder-author-object-name-1
  - id: metadata/package/files/package-json::placeholder-author-object-email-1
  - id: objectives/supply-chain/impersonation/manifest/placeholder::placeholder-repository-generic-comp
  - id: metadata/package/manifest/freeform::npm-template-manifest-placeholder
- id: js-placeholder-announcement-1
  desc: Code announces a placeholder package or module
  crit: notable
  conf: 0.7
  for:
  - javascript
  unless:
  - id: metadata/package/testing/harness/
  - id: well-known/lib/web-ui-vendors/
  - id: well-known/tool/development/yarn::yarn-cli-bundle-marker
  - id: well-known/tool/development/aube::aube-node-placeholder-reservation
  any:
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-placeholder-announcement-1a
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-placeholder-announcement-1b
- id: js-placeholder-announcement
  desc: Code announces a placeholder or reserved package name
  crit: notable
  conf: 0.85
  for:
  - javascript
  unless:
  - id: metadata/package/testing/harness/
  - id: well-known/lib/web-ui-vendors/
  - id: well-known/tool/development/yarn::yarn-cli-bundle-marker
  - id: well-known/tool/development/aube::aube-node-placeholder-reservation
  any:
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-placeholder-announcement-1
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-placeholder-announcement-1a
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-placeholder-announcement-1b
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-placeholder-announcement-2
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-placeholder-announcement-3
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-hijacked-package-message
- id: poc-placeholder-package
  desc: Tiny PoC package with test author
  crit: suspicious
  conf: 0.94
  attack: T1195.002
  all:
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: metadata/package/testing/presence/manifest::npm-init-default-test
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-package-poc
  any:
  - id: objectives/supply-chain/impersonation/manifest/placeholder::placeholder-author-test-handle
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-malicious-code-executed
  unless:
  - id: metadata/package/manifest/repository::has-repository-field
  - id: metadata/package/manifest/entrypoint::has-bin-field
  - id: metadata/package/testing/presence/fixture::test-fixture-package-json-path
- id: js-implementation-export
  desc: JavaScript module exports implementation
  crit: exception
  conf: 0.99
  any:
  - id: metadata/lang/javascript-features::cjs-exports-pattern
  - id: metadata/lang/javascript-features::esm-export
- id: fake-placeholder-noop
  desc: Small package stub announces no usable implementation
  crit: notable
  conf: 0.85
  for:
  - javascript
  size_max: 1024
  all:
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-placeholder-announcement
  - id: metadata/file/metrics::javascript-small-file-5k
  unless:
  - id: metadata/package/testing/harness/
  - id: objectives/supply-chain/impersonation/manifest/placeholder::js-implementation-export
  - id: metadata/package/testing/harness/v8/
  - id: archive-fs-service-worker-msw-module-doc
  - id: archive-fs-service-worker-msw-type-stub
  - id: well-known/lib/benign-runtime-bundles/
  - id: objectives/supply-chain/trojanized/app/package::parcel-plugin-transformer-marker
  - id: metadata/package/testing/presence/fixture::constants-js-basename
- id: npm-init-name-squat
  desc: Unmodified npm init skeleton package
  crit: notable
  conf: 0.85
  attack: T1195.002
  all:
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: metadata/package/testing/presence/manifest::npm-init-default-test
  - id: objectives/supply-chain/impersonation/manifest/placeholder::npm-init-default-license
  - id: metadata/package/quality/empty::npm-empty-description
  any:
  - id: metadata/package/quality/empty::npm-empty-author
  - id: metadata/package/versioning::mature-version
  - id: metadata/package/dependencies::npm-no-runtime-dependencies
  needs: 2
  unless:
  - id: metadata/package/manifest/name::npm-name-example
  - id: metadata/package/testing/presence/fixture/
  - id: metadata/package/manifest/entrypoint::has-bin-field
  - id: metadata/package/manifest/repository/
  - id: metadata/package/testing/presence/fixture::test-fixture-package-json-path
  - id: metadata/package/testing/presence/fixture/
  - id: objectives/supply-chain/impersonation/manifest/placeholder/
- id: mature-hollow-index-package
  desc: Mature hollow package advertises default index entry
  # Empty npm-init skeletons with a mature version are common reserved or
  # dual-publish stubs; elevate via composites that add install-hook/payload
  # legs rather than treating hollowness alone as suspicious.
  crit: notable
  conf: 0.9
  attack: T1195.002
  mbc: B0024
  all:
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: metadata/package/testing/presence/manifest::npm-init-default-test
  - id: metadata/package/quality/empty::npm-empty-description
  - id: metadata/package/manifest/entrypoint::has-index-entry
  any:
  - id: metadata/package/quality/empty::npm-empty-author
  - id: metadata/package/versioning::mature-version
  - id: metadata/package/quality/empty::npm-no-keywords
  - id: metadata/package/dependencies::npm-no-runtime-dependencies
  needs: 3
  unless:
  - id: well-known/lib/skia::source-tree
  - id: metadata/package/manifest/name::npm-name-example
  - id: metadata/package/manifest/entrypoint::has-bin-field
  - id: metadata/package/testing/presence/fixture::playwright-test-plugin-fixture
  - id: metadata/package/manifest/repository/
  - id: well-known/app/azure-dev-cli::azure-dev-cli-source-path
  - id: metadata/package/testing/presence/fixture::test-fixture-package-json-path
  - id: metadata/package/testing/presence/fixture/
- id: scoped-hollow-index-package
  desc: Scoped hollow package advertises default index
  crit: suspicious
  conf: 0.92
  attack: T1195.002
  mbc: B0024
  all:
  - id: metadata/package/manifest/name::scoped-package-name
  - id: objectives/supply-chain/impersonation/manifest/placeholder::mature-hollow-index-package
  - id: metadata/package/dependencies::npm-no-runtime-dependencies
  unless:
  - id: metadata/package/manifest/repository/
  - id: metadata/package/manifest/entrypoint::has-bin-field
  - id: metadata/package/testing/presence/fixture::playwright-test-plugin-fixture
  - id: metadata/package/testing/presence/fixture::test-fixture-package-json-path
  - id: metadata/package/testing/presence/fixture/
- id: hollow-package-invalid-runtime-type
  desc: Hollow package advertises invalid npm module type
  crit: suspicious
  conf: 0.92
  attack: T1195.002
  mbc: B0024
  all:
  - id: objectives/supply-chain/impersonation/manifest/placeholder::mature-hollow-index-package
  - id: metadata/package/manifest/freeform::npm-invalid-package-type-field
  unless:
  - id: metadata/package/manifest/repository/
  - id: metadata/package/testing/presence/fixture::test-fixture-package-json-path
  - id: metadata/package/testing/presence/fixture/
- id: dep-conf-placeholder-unlicensed
  desc: Placeholder-described package with UNLICENSED license and no repository
  crit: suspicious
  conf: 0.88
  attack: T1195.002
  all:
  - id: objectives/supply-chain/impersonation/manifest/skeleton::desc-placeholder-package
  - id: metadata/package/license::npm-unlicensed-declaration
  - id: metadata/package/manifest/repository::has-repository-evidence
