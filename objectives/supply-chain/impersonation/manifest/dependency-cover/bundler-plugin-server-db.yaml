# A package whose name masquerades as a bundler/build-tool plugin but whose
# manifest embeds a web-server framework (`express`) together with a native local
# database (`sqlite3`). A legitimate build plugin runs at build time and needs
# neither an HTTP server nor a database; shipping both under a build-plugin cover
# name is the shape of a server-backed backdoor / data-collection stager disguised
# as tooling. Manifest-only signal, so it fires even when the payload module is
# withheld from the published tarball.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: "T1195.002, T1071.001"
composite_rules:
  - id: bundler-plugin-server-database-cover
    desc: Build-plugin cover embeds a web server and local database
    crit: hostile
    conf: 0.9
    mbc: B0024
    all:
      - id: metadata/package/manifest/name::bundler-plugin-name
      - id: objectives/supply-chain/metadata-anomaly::npm-sqlite3-runtime-dependency
      - id: objectives/supply-chain/metadata-anomaly::npm-express-runtime-dependency
