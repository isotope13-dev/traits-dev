defaults:
  platforms:
  - unix
  - windows
  for:
  - package.json
traits:
- id: version-only-package-export
  desc: Exports version facade only
  crit: suspicious
  conf: 0.88
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: 'module.exports = { version: require(''./package.json'').version }'
- id: pkg-main-resp-path
  desc: Main uses resp/ directory
  crit: notable
  conf: 0.7
  count_min: 1
  if:
    id: metadata/package/files/package-json::pkg-main-resp-path
- id: cdn-keyword-jsdelivr
  desc: jsdelivr keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: jsdelivr
- id: cdn-keyword-cdn
  desc: cdn keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: cdn
- id: browser-keyword
  desc: browser keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: browser
- id: html-keyword
  desc: html keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: html
- id: desc-public-cdn-html
  desc: Description claims public CDN HTML page
  crit: suspicious
  conf: 0.92
  if:
    type: value
    path: description
    regex: static html page.{0,20}public cdn
    case_insensitive: true
- id: files-index-favicon-only
  desc: Package publishes only index and favicon
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: '"files"\s*:\s*\[\s*"index\.html"\s*,\s*"favicon\.ico"\s*\]'
- id: cdn-keyword-cloudflare
  desc: cloudflare keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: cloudflare
- id: cdn-keyword-unpkg
  desc: unpkg keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: unpkg
- id: template-keyword
  desc: Template keyword in package
  crit: notable
  conf: 0.5
  if:
    type: value
    path: keywords
    exact: template
- id: main-html-entry
  desc: Package main entry points to HTML file
  crit: notable
  conf: 0.85
  attack: T1195.002
  if:
    type: value
    path: main
    regex: "\\.(html|htm)$"
    case_insensitive: true
composite_rules:
- id: cdn-keyword-facade
  desc: CDN-related keywords
  crit: notable
  conf: 0.6
  any:
  - id: objectives/supply-chain/impersonation/manifest/facade::cdn-keyword-jsdelivr
  - id: objectives/supply-chain/impersonation/manifest/facade::cdn-keyword-cdn
  - id: objectives/supply-chain/impersonation/manifest/facade::cdn-keyword-cloudflare
  - id: objectives/supply-chain/impersonation/manifest/facade::cdn-keyword-unpkg
- id: static-html-cdn-keywords
  desc: Static HTML browser facade keywords
  crit: suspicious
  conf: 0.82
  needs: 2
  any:
  - id: objectives/supply-chain/impersonation/manifest/facade::cdn-keyword-cdn
  - id: objectives/supply-chain/impersonation/manifest/facade::browser-keyword
  - id: objectives/supply-chain/impersonation/manifest/facade::html-keyword
- id: public-cdn-html-facade
  desc: Public CDN HTML facade package
  crit: suspicious
  conf: 0.95
  attack: T1195.002
  all:
  - id: objectives/supply-chain/impersonation/manifest/facade::main-html-entry
  - id: objectives/supply-chain/impersonation/manifest/facade::desc-public-cdn-html
  - id: objectives/supply-chain/impersonation/manifest/facade::files-index-favicon-only
  - id: objectives/supply-chain/impersonation/package/manifest::npm-no-deps-at-all
  - id: objectives/supply-chain/recon-exfil/registry/probe::public-access-config
  any:
  - id: objectives/supply-chain/impersonation/manifest/facade::static-html-cdn-keywords
  - id: objectives/supply-chain/install-hook/package/manifest::desc-lightweight
- id: npm-attack-labeled-html-main
  desc: npm package with attack-term description and HTML main entry
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  all:
  - id: objectives/supply-chain/impersonation/manifest/attack-label::desc-attack-technique
  - id: objectives/supply-chain/impersonation/manifest/facade::main-html-entry
