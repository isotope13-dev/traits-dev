defaults:
  platforms: [unix, windows]
  crit: suspicious
  attack: T1195.002
traits:
  - id: go-func-readpassword-shadow
    desc: ReadPassword function calling term.ReadPassword
    crit: suspicious
    conf: 0.95
    for: [go]
    if:
      type: text
      regex: func ReadPassword\s*\(.{0,50}\)[\s\S]{0,100}\{[\s\S]{0,800}term\.ReadPassword
  - id: go-readpassword-with-io
    desc: ReadPassword with file/network I/O
    crit: suspicious
    conf: 0.95
    for: [go]
    if:
      type: text
      regex: ReadPassword[\s\S]{0,500}(\.Post\(|\.AppendFile\(|\.WriteFile\(|os\.WriteFile)
  - id: go-func-encrypt-shadow
    desc: Encrypt function calling real crypto
    crit: suspicious
    conf: 0.8
    for: [go]
    if:
      type: text
      regex: func Encrypt\s*\(.{0,50}\).{0,50}\{[\s\S]{0,500}(cipher\.|aes\.|crypto/)
  - id: go-func-decrypt-shadow
    desc: Decrypt function calling real crypto
    crit: suspicious
    conf: 0.8
    for: [go]
    if:
      type: text
      regex: func Decrypt\s*\(.{0,50}\).{0,50}\{[\s\S]{0,500}(cipher\.|aes\.|crypto/)
  - id: py-func-getpass-shadow
    desc: getpass function calling real getpass
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: def getpass\s*\(.{0,30}\):[\s\S]{0,300}getpass\.getpass\s*\(
  - id: py-getpass-keyword
    desc: getpass keyword
    crit: baseline
    conf: 0.7
    for: [python]
    if:
      type: text
      substr: getpass
  - id: py-file-open
    desc: file open operation
    crit: component
    conf: 0.5
    for: [python]
    if:
      type: text
      regex: open\s*\(\s*['"][^'"]{1,200}['"]\s*,\s*['"][wa+]
  - id: py-urlopen-call
    desc: urlopen network call
    crit: component
    conf: 0.6
    for: [python]
    if:
      type: text
      substr: urlopen
  - id: py-func-input-shadow
    desc: input function calling builtin input
    crit: suspicious
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: def input\s*\(.{0,30}\):[\s\S]{0,300}(__builtins__|builtins)\.input\s*\(
  - id: py-func-print-shadow
    desc: print function with network call
    crit: suspicious
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: def print\s*\(.{0,30}\):[\s\S]{0,300}(requests\.|urllib|socket)
  - id: js-console-log-shadow
    desc: console.log redefined with network call
    crit: suspicious
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      regex: console\.log\s*=\s*[^;]{0,200}(fetch|axios|http\.request)
  - id: js-require-shadow
    desc: require function shadowed
    crit: notable
    conf: 0.85
    for: [javascript, typescript]
    size_max: 102400
    if:
      type: text
      regex: (const|let|var)\s+require\s*=|require\s*=\s*function
  - id: js-encrypt-func-def
    desc: encrypt function definition
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    size_max: 262144
    if:
      type: text
      regex: \bencrypt\b\s*[=:]\s*function\s*\(
    not:
      - substr: '"version":3,"file":'
  - id: js-decrypt-func-def
    desc: decrypt function definition
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    size_max: 262144
    if:
      type: text
      regex: \bdecrypt\b\s*[=:]\s*function\s*\(
    not:
      - substr: '"version":3,"file":'
  - id: js-hash-func-def
    desc: hash function definition
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    size_max: 262144
    if:
      type: text
      regex: \bhash\b\s*[=:]\s*function\s*\(
    not:
      - substr: '"version":3,"file":'
  - id: ruby-gets-shadow
    desc: gets method redefined with I/O
    crit: suspicious
    conf: 0.8
    for: [ruby]
    if:
      type: text
      regex: def gets[\s\S]{0,300}(Net::HTTP|open\s*\(|File\.write)
composite_rules:
  - id: go-credential-shadow
    desc: Go credential function shadowing
    crit: hostile
    conf: 0.95
    attack: T1056
    mbc: E1056
    any:
      - id: go-func-readpassword-shadow
      - id: go-readpassword-with-io
  - id: go-crypto-shadow
    desc: Go crypto function shadowing
    crit: suspicious
    conf: 0.85
    any:
      - id: go-func-encrypt-shadow
      - id: go-func-decrypt-shadow
  - id: py-io-operation
    desc: Python I/O operation
    crit: component
    conf: 0.6
    any:
      - id: micro-behaviors/communications/http/lib/requests::requests-python
      - id: py-file-open
      - id: py-urlopen-call
  - id: py-getpass-with-io
    desc: getpass with file/network I/O
    crit: suspicious
    conf: 0.85
    all:
      - id: py-func-getpass-shadow
      - id: py-io-operation
  - id: python-credential-shadow
    desc: Python credential function shadowing
    crit: hostile
    conf: 0.95
    attack: T1056
    mbc: E1056
    any:
      - id: py-func-getpass-shadow
      - id: py-getpass-with-io
      - id: py-func-input-shadow
  - id: js-crypto-func-def
    desc: JavaScript crypto function definition
    crit: suspicious
    conf: 0.6
    any:
      - id: js-encrypt-func-def
      - id: js-decrypt-func-def
      - id: js-hash-func-def
  - id: js-crypto-shadow
    desc: crypto function with exfil
    crit: suspicious
    conf: 0.8
    all:
      - id: js-crypto-func-def
      - id: objectives/supply-chain/impersonation::js-http-exfil
  - id: javascript-function-shadow
    desc: JavaScript function shadowing
    crit: suspicious
    conf: 0.85
    any:
      - id: js-console-log-shadow
      - id: js-require-shadow
      - id: js-crypto-shadow
  - id: function-shadow-attack
    desc: Function shadowing supply chain attack
    crit: hostile
    conf: 0.95
    mbc: E1056
    any:
      - id: go-credential-shadow
      - id: python-credential-shadow
      - id: javascript-function-shadow
      - id: ruby-gets-shadow
