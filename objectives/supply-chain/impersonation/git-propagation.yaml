# Git Propagation
# Detects automated git operations used to spread malicious code.
defaults:
  platforms: [windows, unix]
  for: [shell, scripts]
traits:
  - id: git-silent-propagation
    desc: Automated git commit/push sequence
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'git\s+add\s+[\.\-A-Za-z]{1,10}&&\s*git\s+commit\s+.{1,100}&&\s*git\s+push'
