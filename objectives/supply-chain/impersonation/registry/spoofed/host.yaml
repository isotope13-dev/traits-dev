# Dependencies that resolve from a `registry.*` host other than registry.npmjs.org
# (or known mirrors) — the installer fetches an attacker-controlled tarball as
# if it were a registry package. Paired with a side-effect import this is
# dependency-confusion / registry-spoof staging.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
  mbc: E1195

traits:
  - id: dep-spoofed-npm-registry-host
    desc: Dependency URL uses non-npmjs registry host
    crit: suspicious
    conf: 0.96
    if:
      type: value
      path: dependencies.*
      regex: '^https://registry\.[a-z0-9.-]+/'
    not:
      - substr: '://registry.npmjs.org/'
      - substr: '://registry.npmmirror.com/'
      - substr: '://registry.yarnpkg.com/'
    unless:
      - id: well-known/tool/development/aube::aube-package-test-fixture
      - id: metadata/package/manifest/publishing::is-private

composite_rules:
  - id: spoofed-registry-side-effect-runtime-dep
    desc: Spoofed registry dependency loaded for side effects
    crit: hostile
    conf: 0.98
    scope: package
    all:
      - id: dep-spoofed-npm-registry-host
      - id: metadata/package/manifest/publishing::npm-public-publish-access
      - id: micro-behaviors/os/module/load::esm-side-effect-package-import
    unless:
      - id: metadata/package/manifest/publishing::is-private
      - id: well-known/tool/development/aube::aube-package-test-fixture
      - id: well-known/tool/development/aube::aube-published-npm-package
