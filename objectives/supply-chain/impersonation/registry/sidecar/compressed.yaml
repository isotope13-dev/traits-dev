# Compressed npm metadata sidecars
# These files appear in malware corpora as registry metadata snapshots rather than
# unpacked package.json files. Without structured decompression support, we focus on
# the unusual artifact shape that still carries analytical value.
defaults:
  for: [data]
  platforms: [unix, windows]
traits:
- id: meta-json-zstd-magic
  desc: Metadata sidecar has ZSTD magic
  crit: component
  conf: 1.0
  if:
    type: trait
    id: metadata/package/quality/registry/wheel-sdist::zstd-magic-header
- id: small-zstd-sidecar
  desc: Small compressed sidecar archive
  crit: component
  conf: 0.95
  size_min: 512
  size_max: 4096
  if:
    type: hex
    pattern: "28 B5 2F FD"
    offset: 0
- id: tiny-zstd-sidecar
  desc: Tiny compressed sidecar archive
  crit: component
  conf: 0.98
  size_min: 768
  size_max: 2048
  if:
    type: hex
    pattern: "28 B5 2F FD"
    offset: 0
- id: medium-zstd-sidecar
  desc: Medium compressed sidecar archive
  crit: component
  conf: 0.9
  size_min: 8193
  size_max: 65536
  if:
    type: hex
    pattern: "28 B5 2F FD"
    offset: 0
composite_rules:
- id: zstd-json-sidecar
  desc: ZSTD-compressed JSON metadata sidecar
  crit: notable
  conf: 0.96
  all:
  - id: metadata/package/files/name::meta-json-zst
  - id: meta-json-zstd-magic
- id: compact-zstd-json-sidecar
  desc: Compact ZSTD JSON metadata sidecar
  crit: suspicious
  conf: 0.94
  all:
  - id: zstd-json-sidecar
  - id: small-zstd-sidecar
- id: registry-zstd-sidecar
  desc: npm registry ZSTD metadata sidecar
  crit: suspicious
  conf: 0.96
  all:
  - id: zstd-json-sidecar
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
- id: medium-registry-zstd-sidecar
  desc: Medium npm registry ZSTD sidecar
  crit: suspicious
  conf: 0.9
  all:
  - id: registry-zstd-sidecar
  - id: medium-zstd-sidecar
- id: compact-registry-zstd-sidecar
  desc: Compact npm registry ZSTD sidecar
  crit: suspicious
  conf: 0.97
  all:
  - id: registry-zstd-sidecar
  - id: small-zstd-sidecar
- id: throwaway-registry-zstd-sidecar
  desc: Tiny npm registry ZSTD sidecar
  crit: suspicious
  conf: 0.98
  attack: T1195.002
  all:
  - id: compact-registry-zstd-sidecar
  - id: tiny-zstd-sidecar
- id: compressed-registry-sidecar
  desc: Compressed npm registry sidecar artifact
  crit: notable
  conf: 0.92
  any:
  - id: throwaway-registry-zstd-sidecar
  - id: compact-registry-zstd-sidecar
  - id: medium-registry-zstd-sidecar
- id: compressed-versioned-lifecycle-uri-encode
  desc: Lifecycle hook URI-encodes exfil data
  crit: suspicious
  conf: 0.9
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: micro-behaviors/data/encode/url::encode-uri-component-call
- id: compressed-registry-maintainer-mismatch
  desc: Registry metadata has maintainer count mismatch
  crit: notable
  conf: 0.78
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-maintainer-list-single
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-maintainer-list-multi
- id: compressed-generated-maintainer-identity
  desc: Registry maintainer identity appears auto-generated
  crit: suspicious
  conf: 0.85
  attack: "T1195.002"
  any:
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-gibberish-maintainer-name
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-gibberish-email-local
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-protonmail-maintainer
- id: compressed-postinstall-curl-oob-beacon
  desc: Registry postinstall uses curl to OOB/webhook service as install beacon
  crit: hostile
  conf: 0.97
  attack: "T1041"
  mbc: "B0030"
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  any:
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-postinstall-curl-oob-webhook
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-postinstall-curl-oob-oast
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-postinstall-curl-oob-misc
