defaults:
  for: [all]
  platforms: [unix, windows, android, ios]

composite_rules:
- id: suspected-publisher-takeover
  desc: Fresh release from unlisted publisher
  # Publisher/maintainer drift on a new package is a provenance signal, not
  # proof of takeover. Hostile supply-chain conclusions require stronger
  # registry evidence or additional package behavior.
  crit: notable
  conf: 0.72
  attack: "T1195.002"
  all:
  - id: metadata/registry::publisher-not-maintainer
  - id: metadata/registry::freshly-published
  any:
  - id: metadata/registry::recent-package
  - id: metadata/registry::low-adoption
  - id: metadata/registry::dormant-package-reawakened
  - id: metadata/registry::brand-new-package
  unless:
  - id: metadata/registry::many-releases

- id: dormant-package-revived
  desc: Dormant package suddenly published again
  crit: notable
  conf: 0.6
  all:
  - id: metadata/registry::dormant-package-reawakened
  - id: metadata/registry::freshly-published

- id: registry-takedown-security-hold
  desc: Registry takedown marks package malicious
  crit: hostile
  conf: 0.99
  attack: "T1195.002"
  all:
  - id: metadata/registry::registry-security-hold
  - id: metadata/registry::version-removed

- id: anonymous-removed-package
  desc: Removed package had no maintainers
  crit: suspicious
  conf: 0.75
  all:
  - id: metadata/registry::version-removed
  - id: metadata/registry::no-maintainers

- id: freshly-published-unestablished-package
  desc: Fresh low-adoption registry release
  crit: notable
  conf: 0.7
  all:
  - id: metadata/registry::freshly-published
  - id: metadata/registry::low-adoption
  unless:
  - id: metadata/registry::widely-installed

- id: freshly-published-deprecated-install
  desc: Fresh release of deprecated package
  crit: notable
  conf: 0.65
  all:
  - id: metadata/registry::deprecated
  - id: metadata/registry::freshly-published

- id: fresh-unestablished-throwaway
  desc: Brand-new low-adoption package
  crit: notable
  conf: 0.6
  all:
  - id: metadata/registry::brand-new-package
  - id: metadata/registry::few-releases
  - id: metadata/registry::low-adoption

- id: fresh-package-with-install-hook
  desc: Brand-new package runs install script
  crit: notable
  conf: 0.65
  all:
  - id: metadata/registry::brand-new-package
  - id: metadata/registry::registry-install-hook
