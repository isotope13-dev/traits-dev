defaults:
  for: [pkginfo]
  platforms: [unix, windows]
  attack: "T1195.002"
traits:
  - id: dist-two-files
    desc: Registry package ships exactly two files
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: "\"fileCount\"\\s*:\\s*2\\b"
  - id: dist-1k4-to-1k6
    desc: Registry package unpacks to 1.4-1.6KB
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "\"unpackedSize\"\\s*:\\s*1[45][0-9]{2}\\b"
  - id: dotted-gmail-local
    desc: Maintainer uses dotted Gmail alias pattern
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "\"email\":\\s*\"[a-z0-9]{1,4}(\\.[a-z0-9]{1,8}){4,}@gmail\\.com\""
composite_rules:
  - id: twofile-throwaway-takeover
    desc: Throwaway two-file registry takeover metadata
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
      - id: dotted-gmail-local
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-maintainer-list-single
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-readme-error
      - id: dist-two-files
      - id: dist-1k4-to-1k6
    any:
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-dist-tarball-url
      - id: metadata/package/quality/registry/package-json::versioned-dist-tags-latest
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-readme-error
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-test-hook
    needs: 2
