# README header declares a different package identity than package.json.
#
# Attackers regularly copy a popular package's README verbatim into a
# typosquatting / brand-impersonation package. The give-away: the
# README's first `# heading` keeps the original package's name, while
# `package.json::name` is the attacker's. The mempalace/clob malware
# is the canonical example — README literally said
# `# @img/sharp-win32-x64` while the package shipped as
# `@devcarron/clob`.
#
# Fires at archive-evaluation level (npm tarball) so the cross-file
# value lookup can reach both `README.md` and `package.json`.
defaults:
  platforms: [unix, windows]
  attack: T1036
  for: [tar, archives]
traits:
  - id: readme-heading-scoped-package
    desc: README heading names scoped package
    crit: component
    conf: 0.9
    if:
      type: value
      path: README.md::markdown.first_heading
      regex: '^@[a-z0-9][a-z0-9._-]{0,80}/[a-z0-9][a-z0-9._-]{1,80}$'

  - id: readme-heading-name-differs
    desc: README heading differs from manifest
    crit: component
    conf: 0.93
    if:
      type: value
      path: README.md::markdown.first_heading
      ne: package.json::name

composite_rules:
  - id: readme-header-package-name-mismatch
    desc: README package heading mismatches manifest
    crit: suspicious
    conf: 0.93
    mbc: F0012
    all:
      - id: readme-heading-scoped-package
      - id: readme-heading-name-differs
