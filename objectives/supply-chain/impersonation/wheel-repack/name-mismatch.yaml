# Python wheel filename declares one package identity; the inner
# dist-info METADATA blob declares another.
#
# Per PEP 427 the wheel filename leads with `{name}-{version}-...`,
# and the dist-info METADATA has a canonical `Name:` header. Both
# come from the build pipeline and agree on every legitimate build.
# Disagreement is wheel-repack: attacker took a legit wheel's METADATA
# blob (or a stale dist-info dir), dropped it into a freshly-named
# tarball, and shipped under a typosquat. Strong identity-impersonation
# signal.
defaults:
  platforms: [unix, windows]
  attack: T1036
  for: [whl]
traits:
  - id: wheel-filename-metadata-name-mismatch
    desc: Wheel filename disagrees with METADATA Name
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: whl.filename.name_prefix
      ne: METADATA::Name
  - id: wheel-openblox-homepage
    desc: Wheel metadata claims openblox homepage
    crit: component
    conf: 0.94
    if:
      type: value
      path: whl.home_page
      regex: '(?i)/openblox(\b|/|$)'
  - id: wheel-sqligen-top-level
    desc: Wheel exposes sqligen top level
    crit: component
    conf: 0.95
    if:
      type: value
      path: whl.top_level_packages[*]
      exact: sqligen
  - id: sdist-openblox-roblox-summary
    desc: sdist metadata claims openblox Roblox package
    crit: component
    conf: 0.94
    for: [tar]
    if:
      type: value
      path: python.summary
      regex: '(?i)\bRoblox\b'
  - id: sdist-openblox-homepage
    desc: sdist metadata claims openblox homepage
    crit: component
    conf: 0.94
    for: [tar]
    if:
      type: value
      path: python.homepage
      regex: '(?i)/openblox(\b|/|$)'
composite_rules:
  - id: wheel-openblox-sqligen-identity-mismatch
    desc: Wheel openblox identity exposes sqligen package
    crit: suspicious
    conf: 0.95
    all:
      - id: wheel-openblox-homepage
      - id: wheel-sqligen-top-level
  - id: sdist-openblox-placeholder-identity
    desc: sdist openblox Roblox placeholder identity
    crit: suspicious
    conf: 0.9
    for: [tar]
    all:
      - id: sdist-openblox-roblox-summary
      - id: sdist-openblox-homepage
