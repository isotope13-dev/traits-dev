# Python wheel filename declares one package identity; the inner
# dist-info METADATA blob declares another.
#
# Per PEP 427 the wheel filename leads with `{name}-{version}-...`,
# and the dist-info METADATA has a canonical `Name:` header. Both
# come from the build pipeline and agree on every legitimate build.
# Disagreement is wheel-repack: attacker took a legit wheel's METADATA
# blob (or a stale dist-info dir), dropped it into a freshly-named
# tarball, and shipped under a typosquat. Strong identity-impersonation
# signal.
defaults:
  platforms: [unix, windows]
  attack: T1036
  for: [whl]
traits:
  - id: wheel-filename-metadata-name-mismatch
    desc: Wheel filename disagrees with METADATA Name
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: whl.filename.name_prefix
      ne: METADATA::Name
