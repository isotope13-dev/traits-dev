# Supply Chain Package Risk Scoring
# Combines multiple quality and security indicators for high-confidence detection
# Based on GuardDog methodology - multiple weak signals create strong detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"
  mbc: "E1195"
composite_rules:
  # === Critical Risk: Multiple Major Red Flags (3+) ===

  # Requires name field to avoid FP on monorepo subpackage package.json files
  - id: npm-critical-risk-package
    desc: npm package with 3+ critical risk indicators
    crit: hostile
    conf: 0.98
    for: [package.json]
    size_min: 200
    all:
      - id: metadata/package/quality/empty::npm-has-name
      - id: metadata/package/versioning::npm-has-version
    any:
      - id: metadata/package/scripts::install-hooks
      - id: metadata/package/versioning::release-zero
      - id: metadata/package/quality/empty::npm-empty-description-any
      - id: metadata/package/manifest/author/risk::npm-generic-author-name
      - id: metadata/package/manifest/author/domain::npm-suspicious-email-domain
      - id: objectives/supply-chain/install-hook/package/direct-url::direct-url-dependency
    needs: 4
    downgrade:
      any:
        - id: objectives/supply-chain/impersonation/package/scoring/
        - id: metadata/package/manifest/publishing::is-private
  # === High Risk: Install Hooks + 3 Quality Issues ===
  - id: npm-install-hooks-low-quality
    desc: Install hooks with 3+ quality issues
    crit: hostile
    conf: 0.96
    for: [package.json]
    size_min: 200
    all:
      - id: metadata/package/scripts::install-hooks
    any:
      - id: metadata/package/versioning::release-zero
      - id: metadata/package/quality/empty::npm-empty-description-any
      - id: metadata/package/manifest/author/risk::npm-generic-author-name
      - id: metadata/package/manifest/author/domain::npm-free-email-provider
      - id: metadata/package/quality/empty::npm-no-author
    needs: 3
    unless:
      - id: metadata/package/manifest/repository/
      - id: metadata/package/manifest/publishing::is-private
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/harness::pkg-tests-fixture-directory
      - id: metadata/package/testing/presence/fixture/
      - id: metadata/package/testing/presence/fixture/
  # === High Risk: URL Dependency + Quality Issues ===
  - id: npm-url-dependency-low-quality
    desc: Direct URL dependency with quality issues
    crit: hostile
    conf: 0.94
    for: [package.json]
    size_min: 500
    all:
      - id: metadata/package/quality/empty::npm-has-name
      - id: metadata/package/versioning::npm-has-version
      - id: objectives/supply-chain/install-hook/package/direct-url::direct-url-dependency
    any:
      - id: metadata/package/versioning::release-zero
      - id: metadata/package/quality/empty::npm-empty-description-any
      - id: metadata/package/manifest/author/risk::npm-generic-author-name
      - id: metadata/package/manifest/author/domain::npm-suspicious-email-domain
    needs: 2
  # === High Risk: Fake Version + Multiple Issues ===
  - id: npm-fake-version-suspicious
    desc: Fake version number with suspicious patterns
    crit: hostile
    conf: 0.93
    for: [package.json]
    all:
      - id: metadata/package/versioning::fake-version-number
    any:
      - id: metadata/package/scripts::install-hooks
      - id: metadata/package/quality/empty::npm-empty-description-any
      - id: metadata/package/manifest/author/risk::npm-generic-author-name
      - id: metadata/package/manifest/author/domain::npm-free-email-provider
      - id: objectives/supply-chain/install-hook/package/direct-url::direct-url-dependency
    needs: 2
  # Requires name field to avoid FP on monorepo subpackage package.json files
  - id: npm-low-quality-package
    # === Suspicious: Multiple Quality Issues (no hooks) ===

    desc: npm package with 4+ quality issues
    crit: suspicious
    conf: 0.88
    for: [package.json]
    all:
      - id: metadata/package/quality/empty::npm-has-name
      - id: metadata/package/versioning::npm-has-version
    any:
      - id: metadata/package/versioning::suspicious-version-patterns
      - id: metadata/package/quality/empty::npm-empty-description-any
      - id: metadata/package/manifest/author/risk::npm-generic-author-name
      - id: metadata/package/manifest/author/domain::npm-free-email-provider
      - id: metadata/package/quality/empty::npm-no-author
      - id: metadata/package/quality/empty::npm-no-license
      - id: metadata/package/quality/empty::npm-empty-homepage
      - id: metadata/package/quality/empty::npm-no-keywords
    needs: 5
    unless:
      - id: metadata/package/manifest/publishing::is-private
      # Development dependencies identify a real project manifest even when
      # optional npm publishing metadata is intentionally minimal.
      - id: metadata/package/manifest/freeform::npm-metadata-benign-context
    downgrade:
      any:
        - id: metadata/package/manifest/freeform::pkg-skeleton-small
  # === Typosquatting Combinations ===
  - id: npm-typosquat-with-hooks
    desc: Typosquatting indicators with install hooks
    crit: hostile
    conf: 0.98
    for: [package.json]
    all:
      - id: objectives/supply-chain/impersonation/name::name-theft-target-combo
      - id: metadata/package/scripts::install-hooks
  # === Typosquatting with low quality metadata ===
  - id: npm-typosquat-low-quality
    desc: Typosquatting with low quality metadata
    crit: hostile
    conf: 0.95
    for: [package.json]
    all:
      - id: objectives/supply-chain/impersonation/name::name-theft-target-combo
    any:
      - id: metadata/package/versioning::release-zero
      - id: metadata/package/quality/empty::npm-empty-description-any
      - id: metadata/package/manifest/author/risk::npm-generic-author-name
      - id: metadata/package/manifest/author/domain::npm-suspicious-email-domain
    needs: 2
  # === PyPI Risk Scoring ===
  - id: pypi-critical-risk-package
    desc: PyPI package with 3+ critical risk indicators
    crit: hostile
    conf: 0.96
    for: [python]
    any:
      - id: metadata/build/package::python-install-hook
      - id: metadata/package/versioning::release-zero
      - id: metadata/package/quality/empty::pypi-empty-description
      - id: metadata/package/manifest/author/risk::pypi-generic-author-name
      - id: metadata/package/manifest/author/domain::pypi-author-temp-mail
      - id: metadata/package/quality/empty::pypi-empty-author
    needs: 3
  # === PyPI install hooks with quality issues ===
  - id: pypi-install-hooks-low-quality
    desc: PyPI install hooks with quality issues
    crit: hostile
    conf: 0.94
    for: [python]
    all:
      - id: metadata/build/package::python-install-hook
    any:
      - id: metadata/package/versioning::release-zero
      - id: metadata/package/quality/empty::pypi-empty-description
      - id: metadata/package/manifest/author/risk::pypi-generic-author-name
      - id: metadata/package/manifest/author/domain::pypi-free-email-provider
    needs: 2
  # === PyPI typosquatting with install hooks ===
  - id: pypi-typosquat-with-hooks
    desc: PyPI typosquatting with install hooks
    crit: hostile
    conf: 0.98
    for: [python]
    all:
      - id: objectives/supply-chain/impersonation/typosquat::pypi-typosquat-attack
      - id: metadata/build/package::python-install-hook
  # === RubyGems Risk Scoring ===
  - id: gem-critical-risk-package
    desc: RubyGem with 3+ critical risk indicators
    crit: hostile
    conf: 0.96
    for: [ruby]
    any:
      - id: metadata/package/versioning::release-zero
      - id: metadata/package/quality/empty::gem-empty-description
      - id: metadata/package/manifest/author/risk::gem-generic-author-name
      - id: metadata/package/manifest/author/domain::gem-free-email-provider
      - id: metadata/package/quality/empty::gem-empty-author
    needs: 3
  # === Stealth Package Indicators ===
  - id: npm-stealth-malware-indicators
    desc: Stealth malware package indicators
    crit: hostile
    conf: 0.97
    for: [package.json]
    size_min: 200
    all:
      - id: metadata/package/scripts::install-hooks
      - id: metadata/package/quality/empty::npm-empty-description-any
      - id: metadata/package/versioning::npm-version-exactly-1-0-0
    unless:
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/harness::pkg-tests-fixture-directory
      - id: metadata/package/testing/presence/fixture/
      - id: well-known/tool/development/aube::aube-package-test-fixture
      - id: well-known/app/rundeck::rundeck-legacy-package-manager-manifest
      - id: metadata/package/quality/scoring::npm-source-native-addon-wrapper
  # === Throwaway Package Indicators ===
  - id: npm-throwaway-package
    desc: Throwaway/test package with hooks
    crit: hostile
    conf: 0.96
    for: [package.json]
    all:
      - id: metadata/package/scripts::install-hooks
    any:
      - id: metadata/package/manifest/author/domain::pypi-author-temp-mail
      - id: metadata/package/versioning::release-zero
      - id: metadata/package/manifest/author/risk::npm-generic-author-name
    unless:
      - id: metadata/package/manifest/repository/
      - id: metadata/package/manifest/publishing::is-private
      - id: objectives/supply-chain/impersonation/package/manifest/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/harness::pkg-tests-fixture-directory
      - id: metadata/package/testing/presence/fixture/
  # === Professional Malware Indicators ===
  - id: npm-sophisticated-supply-chain-attack
    desc: Sophisticated supply chain attack patterns
    crit: hostile
    conf: 0.99
    for: [package.json]
    all:
      - id: metadata/package/scripts::install-hooks
      - id: objectives/supply-chain/install-hook/package/direct-url::direct-url-dependency
    any:
      - id: objectives/supply-chain/impersonation/name::name-theft-target-combo
      - id: metadata/package/manifest/author/domain::npm-suspicious-email-domain
  # === Dependency Confusion Attack Patterns ===
  - id: npm-dependency-confusion-candidate
    desc: Potential dependency confusion attack
    crit: hostile
    conf: 0.92
    for: [package.json]
    all:
      - id: metadata/package/scripts::install-hooks
      - id: metadata/package/versioning::npm-version-inflated-major
      - id: metadata/package/quality/empty::npm-empty-description-any
  # === Helper: Optional-Deps Orchestration Package ===
  # Platform-specific native module wrappers (e.g., @esbuild/win32-x64, @rollup/darwin-arm64)
  # declare only optionalDependencies and no install hooks. They are legitimate packages
  # that merely coordinate which platform-specific binary gets installed.
  - id: npm-optional-deps-orchestrator
    desc: Platform-specific optional-deps orchestrator package
    crit: notable
    conf: 0.85
    for: [package.json]
    all:
      - id: metadata/package/dependencies::has-optional-deps
      - id: metadata/package/manifest/runtime::has-platform-restrictions
    unless:
      - id: metadata/package/scripts/
      - id: objectives/supply-chain/install-hook/package/direct-url/
    any:
      - id: metadata/package/manifest/repository::has-repository-evidence
      - id: metadata/package/manifest/homepage::has-homepage-field
      - id: metadata/package/manifest/author/identity::has-author-email
      - id: metadata/package/keywords/identity::has-keywords
