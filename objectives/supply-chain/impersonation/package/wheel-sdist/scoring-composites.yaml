defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
composite_rules:
  - id: malpip-wheel-malicious-disclosure
    desc: Malpip wheel explicitly discloses malicious package intent
    crit: hostile
    conf: 0.99
    for: [whl]
    attack: T1195.002
    mbc: E1195
    platforms:
      - unix
      - windows
    scope: archive
    all:
      - id: objectives/supply-chain/impersonation/package/wheel-sdist::explicit-malicious-declaration
      - id: well-known/tool/offensive/malpip::wheel-project-homepage

  - id: malpip-wheel-builder-artifact
    desc: Malpip builder produces a tiny metadata-only wheel
    crit: hostile
    conf: 0.98
    for: [whl]
    attack: T1195.002
    mbc: E1195
    platforms:
      - unix
      - windows
    scope: archive
    all:
      - id: well-known/tool/offensive/malpip::wheel-project-homepage
      - id: metadata/package/metrics::tiny-wheel-archive-content
      - id: metadata/package/quality/ecosystem::wheel-archive-member

  - id: depconf-victim-indicators
    desc: Dependency confusion victim-targeting language
    crit: notable
    conf: 0.9
    attack: T1195.002
    platforms:
      - unix
      - windows
    any:
      - id: objectives/supply-chain/impersonation/depconf
  - id: pkginfo-no-description
    desc: PKG-INFO with empty or missing description
    crit: notable
    conf: 0.7
    platforms:
      - unix
      - windows
    any:
      - id: metadata/package/manifest/description::pkginfo-no-description-body
      - id: metadata/package/manifest/description::pkginfo-missing-description
  - id: pkginfo-low-effort-indicators
    desc: PKG-INFO with low-effort package indicators
    crit: notable
    conf: 0.7
    attack: T1036.005
    platforms:
      - unix
      - windows
    any:
      - id: metadata/package/manifest/homepage::pkginfo-free-hosting-homepage
      - id: objectives/supply-chain/impersonation/package/wheel-sdist::pkginfo-security-claim
  - id: pkginfo-cloned-readme-body
    desc: PKG-INFO body with cloned library README content
    crit: notable
    conf: 0.8
    attack: T1036.005
    mbc: F0004
    platforms:
      - unix
      - windows
    any:
      - id: objectives/supply-chain/impersonation/cloned-body
  - id: suspicious-setup-metadata
    desc: Suspicious setup.py metadata
    crit: suspicious
    conf: 0.8
    attack: T1036.005
    needs: 3
    any:
      - id: metadata/package/manifest/description::minimal-description
      - id: metadata/package/manifest/author/identity::placeholder-author
      - id: metadata/package/manifest/author/domain::generic-email
      - id: metadata/package/versioning::suspicious-version-pattern
      - id: metadata/package/keywords/identity::typosquatting-keyword
  - id: malware-setup-profile
    desc: Malicious setup.py profile
    crit: suspicious
    conf: 0.85
    attack: T1036.005
    mbc: F0004
    platforms:
      - unix
      - windows
    needs: 4
    any:
      - id: suspicious-setup-metadata
      - id: metadata/package/keywords/identity::empty-keywords
      - id: metadata/package/files/wheel-sdist::empty-classifiers
      - id: metadata/package/manifest/description::single-word-description
  - id: pkg-info-unknown-fields
    desc: PKG-INFO with UNKNOWN metadata fields
    crit: notable
    conf: 0.75
    attack: T1036.005
    mbc: F0004
    platforms:
      - unix
      - windows
    needs: 3
    any:
      - id: objectives/supply-chain/impersonation/package/wheel-sdist::unknown-summary
      - id: metadata/package/manifest/homepage::unknown-homepage
      - id: metadata/package/manifest/author/identity::unknown-author
      - id: metadata/package/files/wheel-sdist::unknown-license
      - id: metadata/package/files/wheel-sdist::unknown-platform
      - id: metadata/package/manifest/description::unknown-description
      - id: metadata/package/manifest/author/domain::unknown-author-email
  - id: pkginfo-all-unknown-metadata
    desc: PKG-INFO with all metadata fields UNKNOWN
    crit: notable
    conf: 0.9
    attack: T1195.002
    mbc: F0004
    platforms:
      - unix
      - windows
    all:
      - id: objectives/supply-chain/impersonation/package/wheel-sdist::unknown-summary
      - id: metadata/package/manifest/homepage::unknown-homepage
      - id: metadata/package/manifest/author/identity::unknown-author
      - id: metadata/package/manifest/description::unknown-description
      - id: metadata/package/manifest/author/domain::unknown-author-email
    unless:
      - id: metadata/package/versioning/
