defaults:
  platforms: [unix, windows]
  attack: T1195.002
traits:
  - id: python-placeholder-future-logic
    desc: 'python placeholder future logic'
    crit: component
    conf: 0.9
    for: [python]
    size_max: 20000
    if:
      type: text
      substr: Placeholder for future logic
  - id: python-placeholder-pass
    desc: Python placeholder implementation uses pass
    crit: component
    conf: 0.85
    for: [python]
    size_max: 20000
    if:
      type: text
      regex: '(?i)placeholder[\s\S]{0,300}\bpass\b'
  - id: test-package-readme
    desc: README identifies package as a test package
    crit: component
    conf: 0.84
    for: [text]
    size_max: 2000
    if:
      type: text
      regex: '(?i)^test package\b'
  - id: pkginfo-typo-protected-installation
    desc: Typo-protected installation claim
    # A description that markets "typo-protected" aliasing is a notable
    # observation, not suspicion on its own: legitimate authors register
    # defensive name variants that redirect to their canonical package.
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      substr: Typo-Protected Installation
  - id: pkginfo-official-install-claim
    desc: Official-package install claim
    # "Install the official package …" is ordinary redirect/rename language
    # (deprecations, moves, defensive placeholders all use it). Notable, not
    # suspicious — impersonation must be inferred by a composite that adds a
    # payload, an install hook, or a verified typosquat of a real package.
    crit: notable
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      substr: Install the official package
      case_insensitive: true
composite_rules:
  - id: placeholder-noop-python-module
    desc: Python package contains placeholder no-op module
    crit: suspicious
    conf: 0.9
    for: [python]
    all:
      - id: python-placeholder-future-logic
      - id: python-placeholder-pass
  - id: pypi-placeholder-noop-sparse-metadata
    desc: PyPI package has placeholder no-op code with sparse metadata
    crit: suspicious
    conf: 0.92
    for: [python, pkginfo, archives, zip]
    all:
      - id: placeholder-noop-python-module
      - id: metadata/package/dependencies::pypi-no-runtime-deps
      - id: metadata/package/manifest/author/identity::pkginfo-no-author-email
    scope: archive
  - id: pypi-placeholder-claimed-functionality
    desc: PyPI package claims functionality but only ships placeholder code
    crit: suspicious
    conf: 0.9
    for: [python, pkginfo, archives, zip]
    all:
      - id: placeholder-noop-python-module
      - id: metadata/package/files/wheel-sdist::from-setuptools-import
      - id: objectives/supply-chain/impersonation/package/wheel-sdist::pkginfo-single-word-summary
    scope: archive
  - id: pypi-empty-skeleton-sparse-metadata
    desc: Tiny PyPI skeleton package with sparse metadata
    crit: notable
    conf: 0.93
    for: [pkginfo, archives, zip]
    all:
      - id: metadata/package/metrics::pkginfo-tiny
      - id: objectives/supply-chain/impersonation/package/wheel-sdist::pkginfo-no-summary
      - id: metadata/package/dependencies::pypi-no-runtime-deps
      - id: metadata/package/manifest/author/identity::pkginfo-no-author-email
    scope: archive
    unless:
      - id: metadata/library/python-stdlib::python-stdlib-test-file
      - id: metadata/library/python-stdlib::python-stdlib-fixture-wheel
      - id: metadata/library/python-stdlib::python-stdlib-example2-fixture-pkginfo
  - id: pypi-empty-test-package-facade
    desc: Empty PyPI test-package facade
    crit: notable
    conf: 0.9
    for: [python, pkginfo, text, archives, zip]
    all:
      - id: pypi-empty-skeleton-sparse-metadata
      - id: test-package-readme
    scope: archive
  - id: pypi-empty-skeleton-lowest-version
    desc: Tiny PyPI skeleton package at initial placeholder version
    crit: notable
    conf: 0.9
    for: [pkginfo, archives, zip]
    all:
      - id: pypi-empty-skeleton-sparse-metadata
      - id: metadata/package/versioning::pkginfo-lowest-version
    scope: archive
  # PyPI analog of the npm types-package-runs-install-hook anomaly: a sparse
  # skeleton package (tiny, no summary, no deps, anonymous author) that ALSO
  # overrides install to run code. A package with no real functionality has no
  # legitimate reason to execute code at install time. Payload-agnostic — fires
  # on the structural anomaly regardless of how the install payload is written,
  # so it survives obfuscation changes the per-payload composites would miss.
  - id: pypi-skeleton-package-install-exec
    desc: Sparse-metadata skeleton package runs install-time code
    crit: hostile
    conf: 0.95
    mbc: B0024
    for: [python, pkginfo, archives, zip]
    all:
      - id: pypi-empty-skeleton-sparse-metadata
    any:
      - id: metadata/build/package::setuptools-run-override
      - id: metadata/build/package::setup-cmdclass-install
      - id: objectives/supply-chain/install-hook/build/pep517::pep517-backend-execution
    needs: 1
    scope: archive
  # Description markets a typo-protected alias and tells users to install a
  # different package name. On its own this is a redirect claim, not proof of
  # impersonation: renames, deprecations, and an author's own defensive
  # placeholders read identically. Notable — the malicious empty-facade case
  # (a payload / install hook) is caught hostile by
  # pypi-skeleton-package-install-exec above.
  - id: pypi-alternate-install-impersonation
    desc: Metadata redirects install to alternate package
    crit: notable
    conf: 0.9
    for: [pkginfo, whl, archives, zip]
    all:
      - id: pkginfo-typo-protected-installation
      - id: pkginfo-official-install-claim
    scope: archive
  - id: pypi-small-wheel-alternate-install-facade
    desc: Small wheel redirects install to alternate package
    crit: notable
    conf: 0.9
    for: [pkginfo, whl, archives, zip]
    all:
      - id: pkginfo-typo-protected-installation
      - id: pkginfo-official-install-claim
      - id: metadata/package/files/wheel-sdist::wheel-dist-info-member
      - id: metadata/package/metrics::small-wheel-file-set
    scope: archive
