defaults:
  platforms:
  - unix
  - windows
  crit: notable
  attack: T1036.005
  mbc: F0004
  for: [pkginfo]
traits:
- id: explicit-malicious-declaration
  desc: Summary explicitly declares malicious intent
  crit: suspicious
  conf: 0.98
  attack: T1195.002
  mbc: E1195
  if:
    type: value
    path: summary
    regex: malicious.{0,40}(packag|attack|exploit|malware)
    case_insensitive: true
  unless:
    - id: metadata/package/manifest/description::pypi-educational-malicious-package-disclosure
- id: unknown-summary
  desc: PKG-INFO has UNKNOWN summary
  crit: notable
  conf: 0.75
  if:
    type: value
    path: summary
    exact: UNKNOWN
- id: pkginfo-low-effort-summary
  desc: 'pkginfo low effort summary'
  crit: notable
  conf: 0.8
  if:
    type: value
    path: summary
    regex: (?i)((a |my )?very basic \w+|\w+pyapp\b)
- id: pkginfo-demo-release-summary
  desc: PKG-INFO summary describes demo release
  crit: notable
  conf: 0.75
  if:
    type: value
    path: summary
    regex: \b(demo|simulation)\b.{0,50}\brelease action\b|\brelease action\b.{0,50}\bsimulation\b
    case_insensitive: true
- id: pkginfo-single-word-summary
  desc: PKG-INFO with single-word summary
  crit: notable
  conf: 0.75
  unless:
  - id: unknown-summary
  if:
    type: value
    path: summary
    regex: ^\S{1,30}$
- id: pkginfo-security-claim-2
  desc: "Package summary claims AV/malware scanning"
  crit: component
  conf: 0.65
  if:
    type: value
    path: summary
    regex: (antivirus|anti-virus|malware.scanner)
    case_insensitive: true
- id: summary-exe-download-1
  desc: Summary mentions EXE with download
  crit: suspicious
  conf: 0.95
  attack: T1204.002
  if:
    type: value
    path: summary
    regex: (\.exe|\bexecutable\b).{0,30}\b(download|run)\b
    case_insensitive: true
- id: summary-exe-download-2
  desc: Summary mentions EXE with link or URL
  crit: suspicious
  conf: 0.95
  attack: T1204.002
  if:
    type: value
    path: summary
    regex: (\.exe|\bexecutable\b).{0,30}\b(link|url)\b
    case_insensitive: true
- id: summary-exe-download-rev
  desc: Summary advertises downloading and running EXE
  crit: suspicious
  conf: 0.95
  attack: T1204.002
  if:
    type: value
    path: summary
    regex: \b(download|run|fetch)\b.{0,30}(\.exe\b|\bexecutable\b)
    case_insensitive: true
- id: summary-stealer-collect-send
  desc: Summary describes collect-and-send behavior
  crit: suspicious
  conf: 0.95
  attack: T1005
  mbc: B0010
  if:
    type: value
    path: summary
    regex: (collect|harvest).{0,40}send
    case_insensitive: true
- id: summary-stealer-exfil-host
  desc: Summary describes exfiltration of host info
  crit: suspicious
  conf: 0.95
  attack: T1005
  mbc: B0010
  if:
    type: value
    path: summary
    regex: (send|exfil).{0,40}hostname
    case_insensitive: true
- id: summary-stealer-exfil-secret
  desc: Summary describes exfiltration of secrets
  crit: suspicious
  conf: 0.95
  attack: T1005
  mbc: B0010
  if:
    type: value
    path: summary
    regex: (send|exfil).{0,40}(credential|password)
    case_insensitive: true
- id: pkginfo-no-summary
    # Building block only: a missing Summary field is common in legitimate
    # libraries (hatchling/maturin/flit projects that set only a long
    # description), so it carries no standalone signal. It is meaningful
    # solely inside the empty-skeleton composites below, where it pairs with
    # no-homepage / no-author-email / tiny-package evidence.
  desc: PKG-INFO missing Summary field
  crit: component
  conf: 0.75
  if:
    type: value
    path: metadata-version
  unless:
  - type: value
    path: summary
- id: pkginfo-placeholder-summary-test
  desc: Placeholder summary (test)
  crit: component
  conf: 0.75
  if:
    type: value
    path: summary
    regex: ^\s*(test|example)\s*$
    case_insensitive: true
- id: pkginfo-placeholder-summary-template
  desc: Summary retains a template placeholder
  crit: notable
  conf: 0.95
  if:
    type: value
    path: summary
    regex: '^\s*add your description here\s*$'
    case_insensitive: true
- id: pkginfo-oast-homepage-url
  desc: PyPI metadata homepage uses OAST callback
  crit: suspicious
  conf: 0.95
  attack: T1195.002
  mbc: E1041
  if:
    type: text
    regex: '(?im)^Project-URL:\s*Homepage,\s*https?://[a-z0-9-]+\.oastify\.com\b'
- id: pkginfo-harmless-testing-decoy-text
  desc: PyPI metadata claims harmless testing utility
  crit: component
  conf: 0.86
  attack: T1195.002
  if:
    type: text
    regex: '(?is)\btesting package\b.{0,240}\b(completely harmless|kept simple|zero dependencies)\b'
- id: pkginfo-placeholder-summary-placeholder
  desc: Placeholder summary (placeholder)
  crit: component
  conf: 0.75
  if:
    type: value
    path: summary
    regex: ^\s*placeholder\s*$
    case_insensitive: true
- id: pkginfo-placeholder-summary-todo
  desc: Placeholder summary (todo)
  crit: component
  conf: 0.75
  if:
    type: value
    path: summary
    regex: ^\s*(todo|fixme)\s*$
    case_insensitive: true
- id: pkginfo-placeholder-summary-2
  desc: Placeholder summary (description/empty/dummy)
  crit: component
  conf: 0.75
  if:
    type: value
    path: summary
    regex: ^\s*(description|empty|dummy)\s*$
    case_insensitive: true
- id: pkginfo-dummy-package-summary
  desc: PKG-INFO dummy package summary
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: summary
    regex: '^Dummy .{1,80} package for PyPI$'
    case_insensitive: true
- id: summary-trading-bot-term
  desc: Summary advertises trading bot functionality
  crit: component
  conf: 0.88
  attack: T1204.001
  if:
    type: value
    path: summary
    regex: '(trading bot|automated trading)'
    case_insensitive: true
- id: summary-telegram-term
  desc: Summary references Telegram
  crit: component
  conf: 0.86
  attack: T1204.001
  if:
    type: value
    path: summary
    regex: '\bTelegram\b'
    case_insensitive: true
- id: requires-telethon
  desc: Package requires Telethon
  crit: component
  conf: 0.86
  attack: T1204.001
  if:
    type: text
    regex: 'Requires-Dist:\s*telethon'
    case_insensitive: true
- id: requires-websocket-client
  desc: Package requires websocket-client
  crit: component
  conf: 0.84
  attack: T1204.001
  if:
    type: text
    regex: 'Requires-Dist:\s*websocket-client'
    case_insensitive: true
- id: requires-pysocks
  desc: Package requires PySocks
  crit: component
  conf: 0.84
  attack: T1204.001
  if:
    type: text
    regex: 'Requires-Dist:\s*pysocks'
    case_insensitive: true
- id: requires-httpx
  desc: Package requires httpx
  crit: component
  conf: 0.84
  attack: T1204.001
  if:
    type: text
    regex: 'Requires-Dist:\s*httpx'
    case_insensitive: true
- id: summary-ctf-security-tool
  desc: Summary advertises CTF security tool
  crit: suspicious
  conf: 0.86
  attack: T1204.001
  if:
    type: value
    path: summary
    regex: '\bsecurity tool\b.{0,80}\bCTF\b|\bCTF\b.{0,80}\bsecurity tool\b'
    case_insensitive: true
- id: ctf-security-tool-requests-dep
  desc: CTF security tool package depends on requests
  crit: suspicious
  conf: 0.88
  attack: T1204.001
  if:
    type: text
    regex: 'Summary:\s*[^\n]{0,120}(security tool|CTF)[\s\S]{0,500}Requires-Dist:\s*requests'
    case_insensitive: true
- id: pkginfo-cloned-package-version-body
  desc: PKG-INFO dummy version package body
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'dummy Python package version of [A-Za-z0-9_.-]+'
    case_insensitive: true
- id: pkginfo-security-claim-1--malware-scanner
  desc: Package summary claims malware scanning
  crit: component
  conf: 0.65
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: 'malware scanner'
- id: pkginfo-security-claim-1--protect
  desc: pkginfo security claim 1 (protect)
  crit: component
  conf: 0.65
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: protect
- id: summary-requests-admin-1--admin
  desc: Explicit administrator privilege wording
  crit: component
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: '(?i)\badmin\s+privileg'
- id: summary-requests-admin-1--root
  desc: Explicit root privilege wording
  crit: component
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: '(?i)\broot\s+(privileg|access|account)\b'
- id: summary-requests-admin-1--sudo
  desc: Explicit sudo command wording
  crit: component
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: '(?i)\bsudo\s+(install|run|execute)\b'
- id: summary-requests-admin-1--elevat
  desc: Explicit elevated privilege wording
  crit: component
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: '(?i)\belevated\s+privileg'
- id: summary-requests-admin-2--install
  desc: Install wording tied to elevation
  crit: component
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: '(?i)\binstall\b[^\n]{0,60}\badmin\b'
- id: summary-requests-admin-2--permiss
  desc: Permission wording tied to elevation
  crit: component
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: '(?i)\badmin\s+permission'
- id: summary-misspelled-privilege-request-1--evoid
  desc: Misspelled privilege (evoid)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: evoid
- id: summary-misspelled-privilege-request-1--administative
  desc: Misspelled privilege (administative)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: administative
- id: summary-misspelled-privilege-request-1--permisions
  desc: Misspelled privilege (permisions)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: permisions
- id: summary-misspelled-privilege-request-1--adminstrat
  desc: Misspelled privilege (adminstrat)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: adminstrat
- id: summary-misspelled-privilege-request-2--privileg
  desc: Misspelled privilege (privileg)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: privileg
- id: summary-misspelled-privilege-request-2--instaling
  desc: Misspelled privilege (instaling)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: instaling
- id: summary-misspelled-privilege-request-2--elavat
  desc: Misspelled privilege (elavat)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: elavat
- id: summary-quotex-martingale-term--quotex
  desc: Summary refs Quotex / Martingale (Quotex)
  crit: component
  conf: 0.86
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: Quotex
- id: summary-quotex-martingale-term--martingale
  desc: Summary refs Quotex / Martingale (Martingale)
  crit: component
  conf: 0.86
  if:
    type: value
    path: summary
    case_insensitive: true
    regex: Martingale
composite_rules:
- id: pkginfo-security-claim-1
  desc: 'pkginfo security claim 1'
  crit: component
  conf: 0.65
  any:
  - id: pkginfo-security-claim-1--malware-scanner
  - id: pkginfo-security-claim-1--protect
- id: summary-requests-admin-1
  desc: Admin request (admin/root/sudo/elevat)
  crit: component
  conf: 0.75
  any:
  - id: summary-requests-admin-1--admin
  - id: summary-requests-admin-1--root
  - id: summary-requests-admin-1--sudo
  - id: summary-requests-admin-1--elevat
- id: summary-requests-admin-2
  desc: Admin request (install/permiss)
  crit: component
  conf: 0.75
  any:
  - id: summary-requests-admin-2--install
  - id: summary-requests-admin-2--permiss
- id: summary-misspelled-privilege-request-1
  desc: 'Misspelled privilege'
  crit: notable
  conf: 0.75
  any:
  - id: summary-misspelled-privilege-request-1--evoid
  - id: summary-misspelled-privilege-request-1--administative
  - id: summary-misspelled-privilege-request-1--permisions
  - id: summary-misspelled-privilege-request-1--adminstrat
- id: summary-misspelled-privilege-request-2
  desc: "Misspelled privilege"
  crit: notable
  conf: 0.75
  any:
  - id: summary-misspelled-privilege-request-2--privileg
  - id: summary-misspelled-privilege-request-2--instaling
  - id: summary-misspelled-privilege-request-2--elavat
- id: summary-quotex-martingale-term
  desc: "Summary refs Quotex / Martingale trading"
  crit: component
  conf: 0.86
  attack: T1204.001
  any:
  - id: summary-quotex-martingale-term--quotex
  - id: summary-quotex-martingale-term--martingale
- id: summary-telegram-trading-bot
  desc: Summary advertises Telegram trading bot integration
  crit: suspicious
  conf: 0.92
  attack: T1204.001
  all:
  - id: summary-trading-bot-term
  any:
  - id: summary-telegram-term
  - id: summary-quotex-martingale-term
- id: telegram-trading-network-deps
  desc: Telegram trading package declares network automation dependencies
  crit: suspicious
  conf: 0.9
  attack: T1204.001
  all:
  - id: summary-trading-bot-term
  - id: requires-telethon
  any:
  - id: requires-websocket-client
  - id: requires-pysocks
  - id: requires-httpx
- id: pkginfo-security-claim
  desc: PKG-INFO summary claims security functionality
  crit: notable
  conf: 0.5
  any:
  - id: pkginfo-security-claim-1
  - id: pkginfo-security-claim-2
- id: summary-requests-admin
  desc: Summary requests admin privileges for install
  crit: suspicious
  conf: 0.9
  attack: T1204.001
  all:
  - id: summary-requests-admin-1
  - id: summary-requests-admin-2
- id: summary-misspelled-privilege-request
  desc: Misspelled social engineering in PKG-INFO summary
  crit: suspicious
  conf: 0.9
  attack: T1204.001
  any:
  - id: summary-misspelled-privilege-request-1
  - id: summary-misspelled-privilege-request-2
- id: pkginfo-placeholder-summary
  desc: PKG-INFO summary contains placeholder text
  crit: notable
  conf: 0.8
  any:
  - id: pkginfo-placeholder-summary-test
  - id: pkginfo-placeholder-summary-template
  - id: pkginfo-placeholder-summary-placeholder
  - id: pkginfo-placeholder-summary-todo
  - id: pkginfo-placeholder-summary-2
- id: pypi-stealer-disclosure-any
  desc: PyPI metadata discloses stealer behavior
  crit: suspicious
  conf: 0.96
  any:
  - id: summary-stealer-collect-send
  - id: summary-stealer-exfil-host
  - id: summary-stealer-exfil-secret
  - id: metadata/package/manifest/description::desc-stealer-collect-send-server
  - id: metadata/package/manifest/description::desc-stealer-exfil-host
  - id: metadata/package/manifest/description::desc-stealer-exfil-secret
- id: pypi-self-disclosed-stealer
  desc: PyPI package self-discloses stealer functionality
  crit: hostile
  conf: 0.98
  attack: T1005
  mbc: B0010
  all:
  - id: pypi-stealer-disclosure-any
  any:
  - id: metadata/package/manifest/author/identity::pkginfo-short-author
  - id: metadata/package/manifest/author/domain::pkginfo-free-email-gmail
  - id: metadata/package/manifest/author/identity::pypi-no-author-email
- id: pkginfo-oast-homepage-decoy-package
  desc: PyPI OAST homepage hidden in harmless testing package metadata
  crit: hostile
  conf: 0.98
  attack: T1195.002
  mbc: E1041
  all:
  - id: pkginfo-oast-homepage-url
  - id: pkginfo-harmless-testing-decoy-text
- id: pypi-telegram-bulk-exfil-package
  desc: PyPI package with Telegram bulk file exfiltration
  crit: hostile
  conf: 0.98
  attack: T1195.002,T1041
  scope: outer
  all:
  - id: objectives/exfiltration/messaging/telegram::python-telegram-bulk-file-exfil
  - id: pkginfo-single-word-summary
