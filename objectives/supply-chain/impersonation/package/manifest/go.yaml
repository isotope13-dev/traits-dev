defaults:
  platforms: [unix, windows]
  for: [zip]
  attack: T1195.002
  conf: 0.95

composite_rules:
  - id: go-module-archive-declared-path-mismatch
    desc: Go source archive module path mismatch
    crit: suspicious
    scope: archive
    ref: sha256:f9b2e605e463190b69f89fa3d788f5ef0b92c1ef9b9221c3f35d9da659b9dae2
    all:
      - id: metadata/package/quality/source::go-proxy-archive-totegamma-concurrent-root
      - id: well-known/app/concrnt::go-module-path

  - id: go-module-archive-import-identity-mismatch
    desc: Go source archive import identity mismatch
    crit: suspicious
    scope: archive
    ref: sha256:f9b2e605e463190b69f89fa3d788f5ef0b92c1ef9b9221c3f35d9da659b9dae2
    all:
      - id: go-module-archive-declared-path-mismatch
      - id: well-known/app/concrnt::go-source-import-path

  - id: block-ftl-archive-declared-path-mismatch
    desc: Block FTL source archive path mismatch
    crit: suspicious
    scope: archive
    ref: sha256:873c0af73230b5aa01416cd0f48fae7f04bb52ddf3b12af42b42ead0b2f81d32
    all:
      - id: metadata/package/quality/source::github-versioned-block-ftl-mismatched-root
      - id: well-known/app/block-ftl::go-module-path
