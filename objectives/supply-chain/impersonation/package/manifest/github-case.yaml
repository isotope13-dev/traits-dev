defaults:
  platforms: [unix, windows]
  for: [zip]
  attack: T1195.002

composite_rules:
  - id: github-case-variant-source-archive
    desc: GitHub source archive case impersonation
    crit: hostile
    conf: 0.94
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    scope: archive
    all:
      - id: metadata/package/quality/source::github-versioned-go-mod-member
    any:
      - id: metadata/package/quality/source::github-versioned-uppercase-namespace-member
      - id: metadata/package/quality/source::github-versioned-uppercase-repo-member
  - id: github-case-variant-go-module-archive
    desc: Go source archive case impersonation
    crit: hostile
    conf: 0.95
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    scope: archive
    all:
      - id: metadata/package/quality/source::go-module-proxy-source-archive-member
      - id: metadata/package/quality/source::github-versioned-go-mod-member
    any:
      - id: metadata/package/quality/source::github-versioned-uppercase-namespace-member
      - id: metadata/package/quality/source::github-versioned-uppercase-repo-member
