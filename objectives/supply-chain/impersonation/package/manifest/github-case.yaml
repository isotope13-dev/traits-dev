defaults:
  platforms: [unix, windows]
  for: [zip]
  attack: T1195.002

composite_rules:
  - id: github-case-variant-source-archive
    desc: GitHub source archive case impersonation
    crit: hostile
    conf: 0.94
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    scope: archive
    all:
      - id: metadata/package/quality/source::github-versioned-go-mod-member
    any:
      - id: metadata/package/quality/source::github-versioned-uppercase-namespace-member
      - id: metadata/package/quality/source::github-versioned-uppercase-repo-member
  - id: github-case-variant-go-module-archive
    desc: Go source archive case impersonation
    crit: hostile
    conf: 0.95
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    scope: archive
    all:
      - id: metadata/package/quality/source::go-module-proxy-source-archive-member
      - id: metadata/package/quality/source::github-versioned-go-mod-member
    any:
      - id: metadata/package/quality/source::github-versioned-uppercase-namespace-member
      - id: metadata/package/quality/source::github-versioned-uppercase-repo-member
  - id: github-case-variant-hermit-bootstrap-archive
    desc: Case-variant Go archive embeds Hermit
    crit: hostile
    conf: 0.96
    ref: sha256:48f7be8317b3bf7a1261486b52ed6b6bac59086d6d29a3b94f87456a0ae3cccc
    scope: archive
    all:
      - id: github-case-variant-go-module-archive
      - id: metadata/package/quality/source::github-versioned-hermit-bootstrap-member
  - id: block-ftl-mismatch-hermit-bootstrap-archive
    desc: Block FTL mismatched archive embeds Hermit
    crit: hostile
    conf: 0.97
    ref: sha256:873c0af73230b5aa01416cd0f48fae7f04bb52ddf3b12af42b42ead0b2f81d32
    scope: archive
    all:
      - id: objectives/supply-chain/impersonation/package/manifest::block-ftl-archive-declared-path-mismatch
      - id: metadata/package/quality/source::github-versioned-hermit-bootstrap-member
