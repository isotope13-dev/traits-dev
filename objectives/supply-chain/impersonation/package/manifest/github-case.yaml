defaults:
  platforms: [unix, windows]
  attack: T1195.002

traits:
  - id: tbd54566975-canonical-go-module
    desc: Canonical TBD54566975 module declaration
    crit: suspicious
    conf: 0.99
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    for: [go.mod]
    if:
      type: text
      regex: '^module\s+github\.com/TBD54566975/ftl\s*$'
  - id: tbd54566975-case-variant-member-path
    desc: Case-variant member path context
    crit: suspicious
    conf: 0.98
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    for: [go.mod]
    if:
      type: path
      regex: 'Tbd54566975[\\/]ftl@v[0-9]'

composite_rules:
  - id: tbd54566975-case-variant-module-declaration
    desc: Go module declares different GitHub case
    crit: hostile
    conf: 0.99
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    for: [go.mod]
    all:
      - id: tbd54566975-canonical-go-module
      - id: tbd54566975-case-variant-member-path
  - id: tbd54566975-case-variant-source-archive
    desc: GitHub source archive case impersonation
    crit: hostile
    conf: 0.99
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    for: [zip]
    scope: archive
    all:
      - id: metadata/package/quality/source::tbd54566975-case-variant-archive-member
      - id: metadata/package/quality/source::tbd54566975-case-variant-go-mod-member
