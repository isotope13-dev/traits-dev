defaults:
  platforms:
  - unix
  - windows
  crit: notable
  conf: 0.75
  attack: T1195.002
traits:
- id: npm-no-dependencies
  desc: npm package has no dependencies
  crit: baseline
  conf: 0.6
  for:
  - package.json
  if:
    type: value
    path: dependencies
    exists: false
  not:
  - substr: "inflight.js"
  - substr: '"name":"tabby"'
  - substr: '"tabby-builtin-plugin"'
  - substr: '"author": "Tabby Developers"'
  unless:
  - id: objectives/supply-chain/impersonation/package/manifest/
- id: npm-empty-dependencies-object
  desc: npm package has empty dependencies object
  crit: notable
  conf: 0.65
  for:
  - package.json
  not:
  - substr: '"tabby-builtin-plugin"'
  if:
    type: text
    regex: '"dependencies"\s*:\s*\{\s*\}'
  unless:
  - id: objectives/supply-chain/impersonation/package/manifest/
  - type: value
    path: peerDependencies
    exists: true
  - type: value
    path: scripts.test
    exists: true
  - type: value
    path: scripts.lint
    exists: true
- id: npm-wildcard-dependency
  desc: npm package uses wildcard version dependency
  crit: notable
  conf: 0.85
  for:
  - package.json
  if:
    type: value
    path: dependencies.*
    exact: '*'
- id: npm-wildcard-devdependency
  desc: 'npm wildcard devdependency'
  crit: notable
  conf: 0.7
  for:
  - package.json
  if:
    type: value
    path: devDependencies.*
    exact: '*'
  unless:
  - id: objectives/supply-chain/impersonation/package/manifest/
  - type: value
    path: devDependencies.n8n-workflow
    exact: '*'
- id: npm-scoped-wildcard-devdependency
  desc: scoped wildcard devDependency
  crit: component
  conf: 0.9
  for:
  - package.json
  if:
    type: text
    regex: '"devDependencies"\s*:\s*\{[^}]{0,1000}"@[A-Za-z0-9._-]+/[A-Za-z0-9._-]+"\s*:\s*"\*"'
- id: npm-latest-tag-dependency
  desc: npm package uses 'latest' tag for dependency
  crit: notable
  conf: 0.8
  for:
  - package.json
  if:
    type: value
    path: dependencies.*
    exact: latest
- id: npm-benign-axios-proxy-builder
  desc: "axios-proxy-builder in serverless installer"
  crit: baseline
  conf: 0.99
  for:
  - package.json
  if:
    type: text
    regex: '"(serverless|serverless-sf-core)"[\s\S]{0,700}"axios-proxy-builder"'
- id: npm-package-serverless
  desc: serverless package name
  crit: baseline
  conf: 0.95
  for:
  - package.json
  if:
    type: value
    path: name
    exact: serverless
- id: npm-file-dependency
  desc: npm package depends on local file
  crit: notable
  conf: 0.7
  for:
  - package.json
  if:
    type: value
    path: dependencies.*
    regex: '^file:'
- id: npm-workspace-dependency
  desc: npm package uses workspace protocol
  crit: notable
  conf: 0.65
  for:
  - package.json
  if:
    type: value
    path: dependencies.*
    regex: '^workspace:'
- id: npm-catalog-dependency
  desc: npm package uses pnpm catalog protocol
  crit: notable
  conf: 0.65
  for:
  - package.json
  if:
    type: text
    substr: '"catalog:'
- id: npm-link-dependency
  desc: npm package uses link protocol
  crit: notable
  conf: 0.7
  for:
  - package.json
  if:
    type: value
    path: dependencies.*
    regex: '^link:'
- id: npm-portal-dependency
  desc: npm package uses portal protocol
  crit: notable
  conf: 0.7
  for:
  - package.json
  if:
    type: value
    path: dependencies.*
    regex: '^portal:'
- id: npm-prepare-hook
  desc: npm package has prepare hook
  crit: notable
  conf: 0.65
  for:
  - package.json
  if:
    type: value
    path: scripts.prepare
  unless:
  - type: value
    path: scripts.prepare
    exact: patch-package
      # `prepare` that just invokes a known bundler/compiler is benign
      # package authoring — `prepare` only runs on git-installs and at
      # publish, not on registry installs.
  - id: objectives/supply-chain/install-hook/scripts/prepare/
- id: npm-prepublish-hook
  desc: npm package has prepublish hook
  crit: notable
  conf: 0.7
  for:
  - package.json
  unless:
  - id: metadata/package/files/dependency::node-modules-nested-package-json
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  - type: value
    path: scripts.prepublish
    exact: npm run build
  - type: value
    path: scripts.prepublish
    exact: npm run benchclean
  - id: metadata/package/manifest/freeform::npm-from-field
  - id: metadata/package/manifest/freeform::npm-resolved-field
  if:
    type: value
    path: scripts.prepublish
    exists: true
- id: npm-prepublish-only-hook
  desc: npm package has prepublishOnly hook
  crit: notable
  conf: 0.7
  for:
  - package.json
  unless:
  - id: metadata/package/files/dependency::node-modules-nested-package-json
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  - type: value
    path: scripts.prepublishOnly
    exact: npm run build
  - id: metadata/package/manifest/freeform::npm-from-field
  - id: metadata/package/manifest/freeform::npm-resolved-field
  if:
    type: value
    path: scripts.prepublishOnly
    exists: true
- id: npm-postpublish-hook
  desc: npm package has postpublish hook
  crit: notable
  conf: 0.7
  for:
  - package.json
  unless:
  - id: metadata/package/files/dependency::node-modules-nested-package-json
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  - id: metadata/package/manifest/freeform::npm-from-field
  - id: metadata/package/manifest/freeform::npm-resolved-field
  if:
    type: value
    path: scripts.postpublish
    exists: true
- id: npm-script-download
  desc: npm package has 'download' script
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  if:
    type: value
    path: scripts.download
  unless:
  - type: value
    path: scripts.download
    regex: --mdfile=README
- id: npm-script-backdoor
  desc: npm package has 'backdoor' script
  crit: suspicious
  conf: 0.95
  for:
  - package.json
  if:
    type: value
    path: scripts.backdoor
- id: pypi-no-dependencies
  desc: PyPI package has no install_requires
  crit: notable
  conf: 0.6
  for:
  - python
  if:
    type: string_literal
    regex: install_requires\s*=\s*\[\s*\]
- id: pypi-unpinned-dependency
  desc: PyPI package uses unpinned dependency
  crit: notable
  conf: 0.7
  for:
  - python
  if:
    type: string_literal
    regex: install_requires.{0,100}['"][a-zA-Z0-9_-]{1,100}['"]
  not:
  - regex: '[''"][a-zA-Z0-9_-]+[><=]'
- id: gem-no-dependencies
  desc: RubyGem has no runtime dependencies
  crit: notable
  conf: 0.6
  for:
  - ruby
  if:
    type: string_literal
    regex: \.add_runtime_dependency\s*\(
- id: npm-dep-next-runtimejs
  desc: npm dependency on next-runtimejs
  crit: suspicious
  conf: 0.98
  for:
  - package.json
  if:
    type: value
    path: dependencies.next-runtimejs
- id: npm-dep-agnolia-string-argv
  desc: npm dependency on agnolia string-argv clone
  crit: suspicious
  conf: 0.99
  for:
  - package.json
  if:
    type: value
    path: dependencies.@agnoliaarisian7180/string-argv
    exists: true
- id: npm-dep-agnolia-string-argv-latest
  desc: agnolia string-argv dependency uses latest
  crit: suspicious
  conf: 0.99
  for:
  - package.json
  if:
    type: value
    path: dependencies.@agnoliaarisian7180/string-argv
    exact: latest
- id: npm-has-bundled-dependencies
  desc: npm package has bundled dependencies
  crit: component
  conf: 1.0
  for:
  - package.json
  if:
    type: value
    path: bundledDependencies
    exists: true
- id: npm-has-peer-dependencies
  desc: npm package declares peerDependencies
  crit: component
  conf: 1.0
  for:
  - package.json
  if:
    type: value
    path: peerDependencies
    exists: true
- id: npm-has-lint-script
  desc: npm package declares lint script
  crit: component
  conf: 1.0
  for:
  - package.json
  if:
    type: value
    path: scripts.lint
    exists: true
- id: tabby-electron-main
  desc: Tabby Electron package main marker
  crit: component
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    substr: '"main":"./dist/electron/main.js"'
- id: tabby-raw-package-marker
  desc: Tabby package raw metadata marker
  crit: component
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    regex: '"name":"tabby"|"author": "Tabby Developers"'
- id: known-no-devdeps-package-name
  desc: Known benign no-devDependencies package name
  crit: component
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    regex: '"name"\s*:\s*"(cycle|@luminati-io/socksv5|fs\.realpath)"'
- id: npm-no-deps-devdependencies
  desc: npm package has no devDependencies field
  crit: baseline
  conf: 0.6
  for:
  - package.json
  if:
    type: value
    path: devDependencies
    exists: false
  unless:
  - id: objectives/supply-chain/impersonation/package/manifest/
  - id: objectives/supply-chain/impersonation/package/manifest/
- id: npm-many-dev-deps
  desc: npm package has many devDependencies
  crit: component
  conf: 0.6
  for:
  - package.json
  if:
    type: value
    path: devDependencies
    size_min: 5
- id: npm-legacy-lib-eyes
  desc: Package is legacy npm library eyes
  crit: component
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    substr: '"name"          : "eyes"'
- id: npm-legacy-lib-colors
  desc: Package is legacy npm library colors
  crit: component
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    substr: '"name": "colors"'
- id: npm-legacy-lib-run-script-os
  desc: Package is run-script-os
  crit: component
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    substr: '"name": "run-script-os"'
- id: npm-pack-hooks--prepack
  desc: npm package has prepack or postpack (prepack)
  crit: notable
  conf: 0.7
  for:
  - package.json
  if:
    type: value
    path: scripts
    exact: prepack
- id: npm-pack-hooks--postpack
  desc: npm package has prepack or postpack (postpack)
  crit: notable
  conf: 0.7
  for:
  - package.json
  if:
    type: value
    path: scripts
    exact: postpack
- id: npm-script-exec--exec
  desc: npm package has 'exec' or 'execute' (exec)
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  if:
    type: value
    path: scripts
    exact: exec
- id: npm-script-exec--execute
  desc: npm package has 'exec' or 'execute' (execute)
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  if:
    type: value
    path: scripts
    exact: execute
composite_rules:
- id: npm-pack-hooks
  desc: npm package has prepack or postpack hooks
  crit: notable
  conf: 0.7
  for:
  - package.json
  any:
  - id: npm-pack-hooks--prepack
  - id: npm-pack-hooks--postpack
- id: npm-script-exec
  desc: npm package has 'exec' or 'execute' script
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  any:
  - id: npm-script-exec--exec
  - id: npm-script-exec--execute
- id: npm-bundled-scoped-wildcard-devdeps
  desc: bundled scoped wildcard devDependencies
  crit: component
  conf: 0.9
  for:
  - package.json
  all:
  - id: npm-scoped-wildcard-devdependency
  - id: npm-has-bundled-dependencies
- id: npm-publish-hooks
  desc: npm package has prepublish or postpublish hooks
  crit: notable
  conf: 0.7
  for:
  - package.json
  any:
  - id: npm-prepublish-hook
  - id: npm-prepublish-only-hook
  - id: npm-postpublish-hook
- id: npm-benign-missing-deps-context
  desc: Benign missing-dependencies context
  crit: component
  conf: 1.0
  for:
  - package.json
  any:
  - id: metadata/package/manifest/description::npm-security-holder-description
  - id: npm-has-peer-dependencies
  - id: metadata/package/dependencies::has-dev-deps
  - id: metadata/package/scripts::has-test-script
  - id: npm-has-lint-script
  - id: metadata/package/manifest/repository::has-repository-url
  - id: metadata/package/manifest/name::npm-no-name-field
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: tabby-electron-main
  - id: metadata/package/manifest/runtime::vscode-language-pack
- id: npm-benign-missing-devdeps-context
  desc: Benign contexts for missing devDependencies
  crit: component
  conf: 1.0
  for:
  - package.json
  any:
  - id: metadata/package/files/dependency::node-modules-nested-package-json
  - id: metadata/package/dependencies::has-runtime-deps
  - id: metadata/package/testing/presence/fixture::tabby-builtin-keyword
  - id: metadata/package/dependencies::has-peer-deps
  - id: metadata/package/dependencies::has-optional-deps
  - id: npm-has-bundled-dependencies
  - id: metadata/package/manifest/freeform::official-react-native-package
  - id: metadata/package/manifest/description::npm-security-holder-description
  - id: tabby-raw-package-marker
  - id: known-no-devdeps-package-name
  - id: metadata/package/manifest/name::npm-no-name-field
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: metadata/package/manifest/runtime::vscode-language-pack
- id: npm-benign-no-devdeps-legacy-lib
  desc: Legacy npm library without devDependencies
  crit: component
  conf: 1.0
  for:
  - package.json
  any:
  - id: npm-legacy-lib-eyes
  - id: npm-legacy-lib-colors
  - id: npm-legacy-lib-run-script-os
- id: pypi-install-hooks-any
  desc: Any PyPI install hook detected
  crit: notable
  conf: 0.6
  for:
  - python
  any:
  - id: metadata/build/package::setuptools-run-override
  - id: metadata/build/package::setup-cmdclass-install
  - id: metadata/package/files/wheel-sdist::install-class-inherit
- id: npm-no-deps-at-all
  desc: npm package has no dependencies or devDependencies
  crit: notable
  conf: 0.65
  for:
  - package.json
  all:
  - id: npm-no-runtime-dependencies
  - id: npm-no-deps-devdependencies
  unless:
  - id: metadata/package/manifest/name::npm-no-name-field
  - id: metadata/package/manifest/freeform::pkg-skeleton-small
  - id: metadata/package/manifest/runtime/
- id: npm-no-runtime-dependencies
  desc: npm package has no runtime dependencies
  crit: notable
  conf: 0.65
  for:
  - package.json
  any:
  - id: npm-no-dependencies
  - id: npm-empty-dependencies-object
- id: npm-runtime-dep-next-runtimejs
  desc: npm runtime depends on next-runtimejs
  crit: suspicious
  conf: 0.99
  for:
  - package.json
  all:
  - id: metadata/package/dependencies::has-runtime-deps
  - id: npm-dep-next-runtimejs
- id: npm-known-malicious-string-argv-dependency
  desc: npm package depends on malicious string-argv clone
  crit: hostile
  conf: 0.995
  for:
  - package.json
  all:
  - id: npm-dep-agnolia-string-argv
  - id: npm-dep-agnolia-string-argv-latest
- id: npm-unsafe-dependency-versions
  desc: npm package uses unsafe dependency versions
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  any:
  - id: npm-wildcard-dependency
  - id: npm-latest-tag-dependency
- id: npm-local-dependencies
  desc: npm package uses local or development-only dependencies
  crit: notable
  conf: 0.7
  for:
  - package.json
  any:
  - id: npm-file-dependency
  - id: npm-workspace-dependency
  - id: npm-link-dependency
  - id: npm-portal-dependency
- id: npm-monorepo-workspace-dep
  desc: Package has workspace or catalog dependencies
  crit: component
  conf: 0.7
  for:
  - package.json
  any:
  - id: npm-workspace-dependency
  - id: metadata/package/dependencies::workspace-devdependency
  - id: npm-catalog-dependency
- id: npm-benign-serverless-axios-proxy-builder
  desc: Benign Serverless axios-proxy-builder dependency
  crit: component
  conf: 1.0
  for:
  - package.json
  all:
  - id: npm-benign-axios-proxy-builder
  - id: npm-package-serverless
- id: npm-no-runtime-many-devdeps
  desc: npm package has no runtime deps but many devDependencies
  crit: notable
  conf: 0.8
  for:
  - package.json
  all:
  - id: npm-no-runtime-dependencies
  - id: npm-many-dev-deps
  unless:
  - id: metadata/package/testing/
- id: npm-suspicious-script-names
  desc: npm package has suspicious script names
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  any:
  - id: npm-script-download
  - id: npm-script-exec
  - id: npm-script-backdoor
