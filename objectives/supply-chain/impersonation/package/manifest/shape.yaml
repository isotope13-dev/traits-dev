defaults:
  platforms:
  - unix
  - windows
  crit: notable
  conf: 0.75
  attack: T1195.002
traits:
- id: npm-wildcard-dependency
  desc: npm package uses wildcard version dependency
  crit: notable
  conf: 0.85
  for:
  - package.json
  if:
    type: value
    path: dependencies.*
    exact: '*'
  unless:
  - id: well-known/app/bobi/
- id: npm-wildcard-devdependency
  desc: 'npm wildcard devdependency'
  crit: notable
  conf: 0.7
  for:
  - package.json
  if:
    type: value
    path: devDependencies.*
    exact: '*'
  unless:
  - id: objectives/supply-chain/impersonation/package/manifest/
  - type: value
    path: devDependencies.n8n-workflow
    exact: '*'
- id: npm-latest-tag-dependency
  desc: npm package uses 'latest' tag for dependency
  crit: notable
  conf: 0.8
  for:
  - package.json
  if:
    type: value
    path: dependencies.*
    exact: latest
- id: npm-recognized-axios-proxy-builder
  desc: "axios-proxy-builder in serverless installer"
  crit: notable
  conf: 0.99
  for:
  - package.json
  if:
    type: text
    regex: '"(serverless|serverless-sf-core)"[\s\S]{0,700}"axios-proxy-builder"'
- id: npm-package-serverless
  desc: serverless package name
  crit: notable
  conf: 0.95
  for:
  - package.json
  if:
    type: value
    path: name
    exact: serverless
# NOTE: a bare `scripts.prepare` field is a neutral, extremely common npm
# lifecycle hook (TS build, README generation, etc.) — not impersonation, and
# the engine already emits the neutral `supply-chain/install-hook/prepare`
# fact. A standalone notable "impersonation" trait on every prepare hook was a
# mislabeled/over-firing duplicate, so it was removed. Composites that need a
# prepare-hook signal should reference the engine fact.
- id: npm-prepublish-hook
  desc: npm package has prepublish hook
  crit: notable
  conf: 0.7
  for:
  - package.json
  unless:
  - id: metadata/package/files/dependency::node-modules-nested-package-json
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  - type: value
    path: scripts.prepublish
    exact: npm run build
  - type: value
    path: scripts.prepublish
    exact: npm run benchclean
  - id: metadata/package/manifest/freeform::npm-from-field
  - id: metadata/package/manifest/freeform::npm-resolved-field
  if:
    type: value
    path: scripts.prepublish
    exists: true
- id: npm-postpublish-hook
  desc: npm postpublish script hook
  crit: component
  conf: 0.7
  for:
  - package.json
  unless:
  - id: metadata/package/files/dependency::node-modules-nested-package-json
  - type: value
    path: keywords
    regex: tabby-builtin-plugin
  - id: metadata/package/manifest/freeform::npm-from-field
  - id: metadata/package/manifest/freeform::npm-resolved-field
  if:
    type: value
    path: scripts.postpublish
    exists: true
- id: npm-script-download
  desc: npm package has 'download' script
  crit: notable
  conf: 0.85
  for:
  - package.json
  if:
    type: value
    path: scripts.download
  unless:
  - type: value
    path: scripts.download
    regex: --mdfile=README
  # Native addons commonly expose a download script for prebuilt bindings.
  - type: value
    path: scripts.install
    regex: '(?i)prebuild|node-gyp|node-pre-gyp'
- id: npm-script-backdoor
  desc: npm package has 'backdoor' script
  crit: suspicious
  conf: 0.95
  for:
  - package.json
  if:
    type: value
    path: scripts.backdoor
- id: pypi-no-dependencies
  desc: PyPI package has no install_requires
  crit: notable
  conf: 0.6
  for:
  - python
  if:
    type: string_literal
    regex: install_requires\s*=\s*\[\s*\]
- id: pypi-unpinned-dependency
  desc: PyPI package uses unpinned dependency
  crit: notable
  conf: 0.7
  for:
  - python
  if:
    type: string_literal
    regex: install_requires.{0,100}['"][a-zA-Z0-9_-]{1,100}['"]
  not:
  - regex: '[''"][a-zA-Z0-9_-]+[><=]'
- id: gem-no-dependencies
  desc: RubyGem has no runtime dependencies
  crit: notable
  conf: 0.6
  for:
  - ruby
  if:
    type: string_literal
    regex: \.add_runtime_dependency\s*\(
- id: npm-dep-next-runtimejs
  desc: npm dependency on next-runtimejs
  crit: suspicious
  conf: 0.98
  for:
  - package.json
  if:
    type: value
    path: dependencies.next-runtimejs
- id: npm-dep-agnolia-string-argv
  desc: npm dependency on agnolia string-argv clone
  crit: suspicious
  conf: 0.99
  for:
  - package.json
  if:
    type: value
    path: dependencies.@agnoliaarisian7180/string-argv
    exists: true
- id: npm-dep-agnolia-string-argv-latest
  desc: agnolia string-argv dependency uses latest
  crit: suspicious
  conf: 0.99
  for:
  - package.json
  if:
    type: value
    path: dependencies.@agnoliaarisian7180/string-argv
    exact: latest
- id: npm-has-bundled-dependencies
  desc: npm package has bundled dependencies
  crit: notable
  conf: 1.0
  for:
  - package.json
  if:
    type: value
    path: bundledDependencies
    exists: true
- id: tabby-electron-main
  desc: Tabby Electron package main marker
  crit: notable
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    substr: '"main":"./dist/electron/main.js"'
- id: tabby-raw-package-marker
  desc: Tabby package raw metadata marker
  crit: notable
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    regex: '"name":"tabby"|"author": "Tabby Developers"'
- id: known-no-devdeps-package-name
  desc: Known recognized no-devDependencies package name
  crit: notable
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    regex: '"name"\s*:\s*"(cycle|@luminati-io/socksv5|fs\.realpath)"'
- id: npm-legacy-lib-eyes
  desc: Package is legacy npm library eyes
  crit: notable
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    substr: '"name"          : "eyes"'
- id: npm-legacy-lib-colors
  desc: Package is legacy npm library colors
  crit: notable
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    substr: '"name": "colors"'
- id: npm-legacy-lib-run-script-os
  desc: Package is run-script-os
  crit: notable
  conf: 1.0
  for:
  - package.json
  if:
    type: text
    substr: '"name": "run-script-os"'
- id: npm-pack-hooks--prepack
  desc: npm package has prepack or postpack (prepack)
  crit: notable
  conf: 0.7
  for:
  - package.json
  if:
    type: value
    path: scripts
    exact: prepack
- id: npm-pack-hooks--postpack
  desc: npm package has prepack or postpack (postpack)
  crit: notable
  conf: 0.7
  for:
  - package.json
  if:
    type: value
    path: scripts
    exact: postpack
- id: npm-script-exec--exec
  desc: npm package has 'exec' or 'execute' (exec)
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  if:
    type: value
    path: scripts
    exact: exec
- id: npm-script-exec--execute
  desc: npm package has 'exec' or 'execute' (execute)
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  if:
    type: value
    path: scripts
    exact: execute
composite_rules:
- id: npm-pack-hooks
  desc: npm package has prepack or postpack hooks
  crit: notable
  conf: 0.7
  for:
  - package.json
  any:
  - id: npm-pack-hooks--prepack
  - id: npm-pack-hooks--postpack
- id: npm-script-exec
  desc: npm package has 'exec' or 'execute' script
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  any:
  - id: npm-script-exec--exec
  - id: npm-script-exec--execute
- id: npm-bundled-scoped-wildcard-devdeps
  desc: bundled scoped wildcard devDependencies
  crit: notable
  conf: 0.9
  for:
  - package.json
  all:
  - id: metadata/package/dependencies::scoped-wildcard-devdependency
  - id: npm-has-bundled-dependencies
- id: npm-publish-hooks
  desc: npm package has prepublish or postpublish hooks
  crit: notable
  conf: 0.7
  for:
  - package.json
  any:
  - id: npm-prepublish-hook
  - id: npm-postpublish-hook
  # Intentionally omit metadata/...::has-prepublish-only — prepublishOnly is the
  # modern publish-only hook (commonly `npm run build`) and is not an
  # impersonation signal by itself; it remains detectable as metadata.
- id: npm-recognized-no-devdeps-legacy-lib
  desc: Legacy npm library without devDependencies
  crit: notable
  conf: 1.0
  for:
  - package.json
  any:
  - id: npm-legacy-lib-eyes
  - id: npm-legacy-lib-colors
  - id: npm-legacy-lib-run-script-os
- id: npm-runtime-dep-next-runtimejs
  desc: npm runtime depends on next-runtimejs
  crit: suspicious
  conf: 0.99
  for:
  - package.json
  all:
  - id: metadata/package/dependencies::has-runtime-deps
  - id: npm-dep-next-runtimejs
- id: npm-known-malicious-string-argv-dependency
  desc: npm package depends on malicious string-argv clone
  crit: hostile
  conf: 0.995
  for:
  - package.json
  all:
  - id: npm-dep-agnolia-string-argv
  - id: npm-dep-agnolia-string-argv-latest
- id: npm-unsafe-dependency-versions
  desc: npm package uses unsafe dependency versions
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  any:
  - id: npm-wildcard-dependency
  - id: npm-latest-tag-dependency
- id: npm-recognized-serverless-axios-proxy-builder
  desc: Recognized Serverless axios-proxy-builder dependency
  crit: notable
  conf: 1.0
  for:
  - package.json
  all:
  - id: npm-recognized-axios-proxy-builder
  - id: npm-package-serverless
- id: npm-suspicious-script-names
  desc: npm package has suspicious script names
  crit: suspicious
  conf: 0.85
  for:
  - package.json
  any:
  - id: npm-script-download
  - id: npm-script-exec
  - id: npm-script-backdoor
