defaults:
  platforms: [linux]
  for: [shell]
  attack: T1195.002

# A lifecycle-named function (post_install/pre_upgrade/...) inside the literal
# PKGBUILD is only hook-like text — the active scriptlet pacman runs as root is
# the separate `<pkgname>.install` file named by `install=`. These rules gate on
# the PKGBUILD basename (metadata::pkgbuild-basename) so they fire ONLY on a real
# PKGBUILD and never leak onto an active `.install` scriptlet (caught separately
# as active by pacman-scriptlet-hook). Referencing the two metadata atoms
# directly keeps the dependency on atoms, not on an intermediate composite.
composite_rules:
  - id: pkgbuild-inactive-pacman-hook
    desc: PKGBUILD has inert lifecycle function
    crit: suspicious
    conf: 0.9
    unless:
      - id: well-known/app/telegram::telegram-desktop-third-party-source
    all:
      - id: metadata/build/package::pacman-lifecycle-hook-fn
      - id: metadata/file/string/identity::pkgbuild-basename

  - id: pkgbuild-inactive-shell-rc-defacement
    desc: PKGBUILD embeds inactive shell rc defacement
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/build/package::pacman-lifecycle-hook-fn
      - id: metadata/file/string/identity::pkgbuild-basename
      - id: objectives/impact/deface/login-banner::shell-rc-login-banner-defacement

  - id: pkgbuild-inactive-system-rc-persistence
    desc: PKGBUILD embeds inactive system rc persistence
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/build/package::pacman-lifecycle-hook-fn
      - id: metadata/file/string/identity::pkgbuild-basename
      - id: objectives/persistence/login/shell/rc::global-shell-rc-mass-persistence
