# PKGBUILD ↔ .SRCINFO metadata divergence (T1195.002).
#
# `.SRCINFO` is machine-generated from the PKGBUILD (`makepkg --printsrcinfo`)
# and is what the AUR web UI and review tooling display — but pacman builds from
# the PKGBUILD. When the two disagree, the metadata that was reviewed is not the
# metadata that builds.
#
# Discriminating benign staleness from attack matters. A maintainer who bumps the
# version but forgets to regenerate .SRCINFO shifts pkgver, source and checksums
# together (internally consistent, just old). The malicious review-bypass shapes
# are the opposite:
#   - same advertised pkgver, different checksum: the source bytes changed behind
#     reviewed metadata;
#   - same pkgbase, different pkgver and checksum: the PKGBUILD builds a newer
#     source than the .SRCINFO and submitted source-package name advertised.
#
# filefacts parses both into a shared pkg.* value tree (the checksum digest is
# normalized — sorted, deduped, SKIP excluded — and never $-expanded, so it is
# directly comparable; raw source=() is NOT, because the PKGBUILD keeps
# $pkgver/$pkgname unexpanded while .SRCINFO expands them). The trait is
# archive-scoped (it evaluates on the package tarball that holds both files) and
# reaches each member's value tree through the `<filename>::` sibling prefix;
# every comparison no-ops when either side is absent, so a package shipping no
# .SRCINFO never fires.
defaults:
  platforms: [linux]
  for: [tar, archives]
  attack: T1195.002

traits:
  - id: srcinfo-checksum-mismatch
    desc: PKGBUILD checksums differ from .SRCINFO
    # AUR sources are .tar.gz; `tar` keeps this under the type:value 3-type cap.
    for: [tar]
    crit: suspicious
    conf: 0.9
    ref: sha256:becf18abc2cca2ec49a4f0c22537be11d85ecea9221f85d0f8780030701a6642
    if:
      type: value
      path: PKGBUILD::pkg.checksums
      ne: .SRCINFO::pkg.checksums
    # Some PKGBUILD parsers retain a commented signature/checksum placeholder
    # as "#SKIP". That is not an effective checksum and must not turn an
    # otherwise identical PKGBUILD/.SRCINFO pair into a mismatch.
    unless:
      - id: well-known/app/vmware-workstation::vmware-workstation-pkgbuild
      - id: metadata/build/package::pkgbuild-checksum-skip
      - id: metadata/build/package::pkgbuild-commented-checksum-placeholder
      - id: metadata/build/package::pkgbuild-architecture-conditional-checksums
      - id: metadata/package/manifest/repository::pkgbuild-ungoogled-chromium-maintainer
      - id: metadata/package/quality/source::kopuz-source-readme
      - id: metadata/package/quality/source::kopuz-aur-recipe-variant

  - id: srcinfo-pkgver-match
    # Building block: the PKGBUILD and .SRCINFO agree on the version. Combined
    # with a checksum mismatch this means "same advertised version, different
    # bytes" — the silent-swap discriminator.
    desc: PKGBUILD pkgver matches .SRCINFO
    for: [tar]
    crit: component
    conf: 0.6
    if:
      type: value
      path: PKGBUILD::pkg.pkgver
      eq: .SRCINFO::pkg.pkgver

  - id: srcinfo-pkgbase-mismatch
    # pkgbase is the package identity; a legitimate regen never changes it.
    desc: PKGBUILD and .SRCINFO package identities differ
    for: [tar]
    crit: notable
    conf: 0.85
    if:
      type: value
      path: PKGBUILD::pkg.pkgbase
      ne: .SRCINFO::pkg.pkgbase
    unless:
      - id: well-known/app/archlinux-kernel::versioned-lts-kernel-repackage-pkgbuild
      - id: well-known/game/mindustry::mindustry-source-identity
      - id: metadata/build/package::pkgbuild-shell-variable-pkgbase

composite_rules:
  - id: srcinfo-same-version-checksum-skew
    # Same version advertised, different source checksum built: the reviewed
    # .SRCINFO does not describe the bytes the PKGBUILD fetches. This is the
    # bait-and-switch / review-evasion shape, distinct from a benign stale regen
    # (which would also shift pkgver).
    desc: PKGBUILD checksum differs from same-version .SRCINFO
    crit: notable
    conf: 0.92
    ref: sha256:becf18abc2cca2ec49a4f0c22537be11d85ecea9221f85d0f8780030701a6642
    all:
      - id: srcinfo-checksum-mismatch
      - id: srcinfo-pkgver-match
    unless:
      - id: well-known/app/vmware-workstation::vmware-workstation-pkgbuild
      - id: metadata/build/package::pkgbuild-architecture-conditional-checksums
      - id: metadata/package/manifest/repository::pkgbuild-ungoogled-chromium-maintainer
      - id: metadata/package/quality/source::kopuz-source-readme
      - id: metadata/package/quality/source::kopuz-aur-recipe-variant

  - id: srcinfo-versioned-source-skew
    # Same package identity, but the PKGBUILD advances the source version and
    # digest while .SRCINFO still advertises the older reviewed source. This is
    # the source-package bait-and-switch shape: review tooling sees one release,
    # makepkg builds another.
    desc: PKGBUILD source metadata differs from .SRCINFO
    crit: notable
    conf: 0.9
    ref: sha256:becf18abc2cca2ec49a4f0c22537be11d85ecea9221f85d0f8780030701a6642
    all:
      - id: srcinfo-checksum-mismatch
    unless:
      - id: srcinfo-pkgver-match
      - id: srcinfo-pkgbase-mismatch
      - id: well-known/app/vmware-workstation::vmware-workstation-pkgbuild
      - id: metadata/build/package::pkgbuild-architecture-conditional-checksums
      - id: metadata/package/manifest/repository::pkgbuild-ungoogled-chromium-maintainer
      - id: metadata/package/quality/source::kopuz-source-readme
