# npm Clone / Identity Spoofing Detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects packages that clone/impersonate legitimate npm packages
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: suspicious
  attack: T1195.002
  mbc: E1195.002

traits:
  # === Package Name Similarity Patterns ===
  # Detects packages with names that are suspiciously similar to legitimate packages
  # These patterns look for name variations typical of clone packages

  - id: name-variation-any-illu
    desc: Known n8n-comfyui package clone variant
    crit: notable
    conf: 0.85
    if:
      type: value
      path: "name"
      regex: n8n-nodes-comfyui-(illu|lite|any-pro|x)

  - id: name-suffix-addition
    desc: Package name with suspicious suffix
    crit: notable
    conf: 0.75
    if:
      type: value
      path: "name"
      regex: -(any|pro|plus)$

  - id: name-suffix-enhanced
    desc: Package name with quality-word suffix
    crit: notable
    conf: 0.75
    if:
      type: value
      path: "name"
      regex: -(enhanced|ultimate)$

  - id: name-suffix-illu
    desc: Package name with illu suffix (identity marker)
    crit: notable
    conf: 0.8
    if:
      type: value
      path: "name"
      substr: -illu
  - id: n8n-random-triple-segments
    desc: n8n package with random triple suffix
    crit: suspicious
    conf: 0.96
    if:
      type: value
      path: "name"
      regex: ^n8n-nodes-([a-z]{5,12}-){2}[a-z]{5,12}$
  - id: phoai-ultimate-tools-name
    desc: PhoAi Ultimate Tools package name
    crit: suspicious
    conf: 0.98
    if:
      type: value
      path: "name"
      exact: n8n-nodes-phoai-ultimate-tools
  - id: n8n-obfuscator-dependency
    desc: n8n package depends on javascript-obfuscator
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "dependencies.javascript-obfuscator"
      exists: true
  - id: normalize-path-suffix-name
    desc: normalize-path package suffix clone
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '"name"\s*:\s*"normalize-path-[a-z0-9]{2,16}"'
  - id: jon-schlinkert-author-string
    desc: Retains Jon Schlinkert author
    crit: component
    conf: 0.92
    if:
      type: text
      substr: '"author": "Jon Schlinkert"'
  - id: normalize-path-keyword-cluster
    desc: normalize-path keyword cluster
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '"keywords"\s*:\s*\[[\s\S]{0,300}"backslash"[\s\S]{0,300}"file-path"[\s\S]{0,300}"slash"'
  - id: n8n-obfuscator-build-script
    desc: n8n build script invokes javascript-obfuscator
    crit: suspicious
    conf: 0.87
    if:
      type: value
      path: "scripts.build"
      substr: "javascript-obfuscator"
  - id: repo-gitbook-docsite
    desc: Repository URL points to GitBook docs
    crit: notable
    conf: 0.86
    if:
      type: value
      path: "repository.url"
      substr: "gitbook.io"
  - id: redis-request-parser-name
    desc: Package named redis-request-parser
    crit: suspicious
    conf: 0.97
    if:
      type: value
      path: "name"
      exact: "redis-request-parser"
  - id: agnolia-string-argv-name
    desc: Agnolia string-argv scoped clone name
    crit: suspicious
    conf: 0.99
    if:
      type: value
      path: "name"
      exact: "@agnoliaarisian7180/string-argv"
  - id: agnolia-string-argv-payload-dep
    desc: Agnolia string-argv pulls payload dependency
    crit: suspicious
    conf: 0.99
    if:
      type: value
      path: "dependencies.@usebioerhold8733/s-format"
      exact: "2.0.1"
  - id: federica-string-argv-repo-url
    desc: string-argv clone repository URL
    crit: notable
    conf: 0.96
    if:
      type: value
      path: "repository.url"
      substr: "github.com/federica090/string-argv"
  - id: string-format-upstream-repo-url
    desc: Metadata points to string-format upstream repo
    crit: component
    conf: 0.98
    if:
      type: value
      path: "repository.url"
      exact: "git://github.com/paola5702/string-format.git"
  - id: string-format-upstream-homepage
    desc: Metadata points to string-format homepage
    crit: component
    conf: 0.98
    if:
      type: value
      path: "homepage"
      exact: "https://github.com/paola5702/string-format"
  - id: string-format-upstream-bugs
    desc: Metadata points to string-format issue tracker
    crit: component
    conf: 0.98
    if:
      type: value
      path: "bugs"
      exact: "https://github.com/paola5702/string-format/issues"
  - id: string-format-upstream-author
    desc: Metadata retains string-format author
    crit: component
    conf: 0.98
    if:
      type: value
      path: "author"
      exact: "David Chambers <dc@paola5702.me>"
  - id: cookie-parser-upstream-repo
    desc: Repository shorthand points to cookie-parser
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: "repository"
      substr: "expressjs/cookie-parser"
  - id: cookie-parser-upstream-repo-url
    desc: Repository URL points to expressjs cookie-parser
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: "repository.url"
      substr: "github.com/expressjs/cookie-parser"
  - id: cookie-parser-upstream-homepage
    desc: Homepage points to cookie-parser project
    crit: notable
    conf: 0.9
    if:
      type: value
      path: "homepage"
      substr: "github.com/expressjs/cookie-parser#readme"
  - id: cookie-parser-upstream-bugs
    desc: Bugs URL points to cookie-parser issues
    crit: notable
    conf: 0.9
    if:
      type: value
      path: "bugs.url"
      substr: "github.com/expressjs/cookie-parser/issues"
  - id: clx-cookieparser-name
    desc: clx-cookieparser package name
    crit: component
    conf: 1.0
    if:
      type: value
      path: "name"
      exact: "clx-cookieparser"
  - id: clx-cookie-signature-name
    desc: clx-cookie-signature package name
    crit: component
    conf: 1.0
    if:
      type: value
      path: "name"
      exact: "clx-cookie-signature"
  - id: cookie-signature-upstream-repo-url
    desc: Repository URL points to upstream cookie-signature
    crit: suspicious
    conf: 0.94
    unless:
      - type: value
        path: "name"
        exact: "cookie-signature"
    if:
      type: value
      path: "repository.url"
      substr: "github.com/visionmedia/node-cookie-signature"
  - id: cookie-signature-upstream-author
    desc: Metadata retains cookie-signature upstream author
    crit: notable
    conf: 0.9
    unless:
      - type: value
        path: "name"
        exact: "cookie-signature"
    if:
      type: value
      path: "author"
      substr: "TJ Holowaychuk"

  - id: fairwords-websocket-name
    desc: Fairwords scoped websocket package name
    crit: component
    conf: 1.0
    if:
      type: value
      path: "name"
      exact: "@fairwords/websocket"

  - id: websocket-node-upstream-repo
    desc: Metadata points to WebSocket-Node upstream
    crit: component
    conf: 0.98
    if:
      type: value
      path: "repository.url"
      substr: "github.com/theturtle32/WebSocket-Node"

  - id: websocket-node-upstream-homepage
    desc: Homepage points to WebSocket-Node upstream
    crit: component
    conf: 0.98
    if:
      type: value
      path: "homepage"
      substr: "github.com/theturtle32/WebSocket-Node"

  - id: websocket-node-author-string
    desc: Metadata retains WebSocket-Node author
    crit: component
    conf: 0.98
    if:
      type: value
      path: "author"
      substr: "theturtle32@gmail.com"

  - id: stackus-package-name
    desc: Package named stackus
    crit: component
    conf: 1.0
    if:
      type: value
      path: "name"
      exact: "stackus"

  - id: pino-upstream-homepage
    desc: Metadata points to Pino homepage
    crit: component
    conf: 0.98
    if:
      type: value
      path: "homepage"
      exact: "https://getpino.io"

  - id: pino-main-entrypoint
    desc: Package main points to pino
    crit: component
    conf: 0.96
    if:
      type: value
      path: "main"
      exact: "pino.js"

  # === Author Field Retention Detection ===
  # Legitimate forks usually change author; retained author suggests identity laundering

  - id: author-retained-original
    desc: Package retains original author from cloned package
    crit: component
    conf: 0.7
    if:
      type: value
      path: "author.email"
      regex: "@(gmail|outlook|hotmail|yahoo)\\."

  # === Repository URL Mismatch ===
  # Repository points to original author but package is published by different actor

  - id: repo-zerorooot-matcher
    desc: Repository references zerorooot original author
    crit: notable
    conf: 0.85
    if:
      type: value
      path: "repository.url"
      substr: github.com/zerorooot

  - id: repo-mismatch-indicator
    desc: Repository URL may not match publisher
    crit: component
    conf: 0.5
    if:
      type: value
      path: "repository.url"
      regex: github\.com/[a-z0-9-]+/[a-z0-9-]+\.git
    unless:
      - id: metadata/package/fields/engines::vscode-extension

  # === Version Anomalies ===
  # Mature version (1.0.4+) on initial publication suggests fake history

  - id: version-mature-published
    desc: Mature package version
    crit: baseline
    conf: 0.65
    if:
      type: value
      path: "version"
      regex: ^1\.[0-9]\.[4-9]|^[2-9]\.
    unless:
      - id: well-known/lib/influxdb3-js::official-influxdb3-js-package

  # === Build Artifact Leakage ===
  # TypeScript build artifacts that reveal build environment

  - id: tsbuildinfo-buildpath-leak
    desc: TypeScript build info contains absolute path
    crit: notable
    conf: 0.9
    if:
      type: value
      path: "__resolved"
      regex: (C:\\Users|/Users/|/home/).{0,50}\.tgz

  - id: npminstall-done-false
    desc: Package has npminstall_done flag set
    crit: component
    conf: 0.5
    if:
      type: value
      path: "__npminstall_done"
      exists: true

  - id: pnpm-workspace-path-leak
    desc: Build path reveals pnpm workspace structure
    crit: notable
    conf: 0.75
    if:
      type: value
      path: "__resolved"
      substr: pnpm

  - id: big-js-impersonation
    desc: Impersonates MikeMcl/big.js repository
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: repository.url
      substr: github.com/MikeMcl/big.js
    unless:
      - type: value
        path: name
        exact: big.js
  - id: winston-upstream-repository
    desc: Metadata points to upstream winston repository
    crit: component
    conf: 0.98
    if:
      type: value
      path: repository.url
      substr: github.com/winstonjs/winston
    unless:
      - type: value
        path: name
        exact: winston
  - id: winston-upstream-readme
    desc: README retains upstream winston package links
    crit: component
    conf: 0.92
    for: [text, markdown]
    if:
      type: text
      regex: 'npmjs\.com/package/winston|npm\s+install\s+winston|github\.com/winstonjs/winston'

  - id: iconifi-react-name
    desc: Iconifi React typo package name
    crit: component
    conf: 0.99
    if:
      type: value
      path: name
      exact: "@iconifi/react"

  - id: iconify-upstream-repo-url
    desc: Metadata points to Iconify upstream repo
    crit: component
    conf: 0.98
    if:
      type: value
      path: repository.url
      substr: github.com/iconify/iconify

  - id: iconify-upstream-homepage
    desc: Metadata points to Iconify homepage
    crit: component
    conf: 0.96
    if:
      type: value
      path: homepage
      exact: "https://iconify.design/"

  - id: iconify-upstream-bugs
    desc: Metadata points to Iconify issues
    crit: component
    conf: 0.96
    if:
      type: value
      path: bugs
      substr: github.com/iconify/iconify/issues
