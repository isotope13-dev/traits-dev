defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: suspicious
  attack: T1195.002
  mbc: E1195.002

composite_rules:
  - id: npm-clone-name-pattern
    desc: Package name matches known clone pattern
    crit: suspicious
    conf: 0.85
    any:
      - id: name-variation-any-illu
      - id: name-suffix-addition
      - id: name-suffix-enhanced
      - id: name-suffix-illu

  - id: npm-identity-laundering
    desc: Package identity laundering (retained author + different repository)
    crit: suspicious
    conf: 0.88
    all:
      - id: author-retained-original
      - id: repo-zerorooot-matcher

  - id: npm-build-artifact-leakage
    desc: Build environment leaked in package artifacts
    crit: notable
    conf: 0.85
    any:
      - id: tsbuildinfo-buildpath-leak
      - id: pnpm-workspace-path-leak
  - id: cookie-signature-upstream-branding
    desc: Metadata retains cookie-signature upstream branding
    crit: suspicious
    conf: 0.95
    all:
      - id: cookie-signature-upstream-repo-url
    any:
      - id: metadata/package/maintainers::tj-holowaychuk-author

  - id: clx-cookieparser-cookie-parser-clone
    desc: clx-cookieparser clones cookie-parser identity
    crit: hostile
    conf: 0.995
    all:
      - id: clx-cookieparser-name
      - id: well-known/lib/cookie-parser

  - id: clx-cookie-signature-upstream-clone
    desc: clx-cookie-signature clones cookie-signature identity
    crit: hostile
    conf: 0.995
    all:
      - id: clx-cookie-signature-name
      - id: cookie-signature-upstream-branding

  - id: fairwords-websocket-upstream-clone
    desc: Fairwords websocket clones upstream identity
    crit: hostile
    conf: 0.995
    all:
      - id: fairwords-websocket-name
      - id: websocket-node-upstream-repo
      - id: websocket-node-author-string
    any:
      - id: websocket-node-upstream-homepage

  - id: scoped-require-dir-upstream-republish
    desc: Scoped package republishes require-dir upstream
    crit: suspicious
    conf: 0.98
    all:
      - id: scoped-require-dir-name
      - id: require-dir-upstream-repository

  - id: stackus-pino-upstream-branding
    desc: stackus package clones Pino branding
    crit: suspicious
    conf: 0.98
    all:
      - id: stackus-package-name
      - id: pino-upstream-homepage
      - id: pino-main-entrypoint

  - id: npm-suspicious-clone
    desc: Suspicious npm package clone detected
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: npm-clone-name-pattern
      - id: npm-identity-laundering
      - id: npm-build-artifact-leakage
      - id: npminstall-done-false

  - id: redis-request-parser-cookie-parser-clone
    desc: redis-request-parser clone retains cookie-parser identity
    crit: hostile
    conf: 0.995
    all:
      - id: redis-request-parser-name
      - id: metadata/package/dependencies::npm-dep-eslint-plugin-supertest
      - id: well-known/lib/cookie-parser

  - id: agnolia-string-argv-dependency-stub
    desc: string-argv clone pulls malicious payload dependency
    crit: hostile
    conf: 0.995
    all:
      - id: agnolia-string-argv-name
      - id: agnolia-string-argv-payload-dep
      - id: federica-string-argv-repo-url
  - id: string-format-upstream-clone
    desc: Scoped package clones string-format metadata
    crit: suspicious
    conf: 0.97
    all:
      - id: string-format-upstream-repo-url
      - id: string-format-upstream-homepage
      - id: string-format-upstream-bugs
    any:
      - id: string-format-upstream-author
      - id: metadata/package/manifest/name::scoped-package-name
      - id: metadata/package/versioning::mature-package-version
    needs: 2
  - id: string-format-dead-hook-clone
    desc: string-format clone ships dead postinstall loader
    crit: hostile
    conf: 0.995
    all:
      - id: string-format-upstream-clone
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-missing-init-js-payload
    any:
      - id: metadata/package/manifest/name::scoped-package-name
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-runs-init-js
      - id: metadata/package/versioning::mature-package-version

  - id: n8n-randomized-clone-package
    desc: Anonymous n8n node with randomized clone name
    crit: hostile
    conf: 0.985
    all:
      - id: n8n-random-triple-segments
      - id: metadata/package/manifest/freeform::npm-n8n-node-manifest
    any:
      - id: metadata/package/quality/empty::npm-no-author
      - id: metadata/package/quality/empty::npm-empty-author
      - id: metadata/package/manifest/description::short-description
      - id: metadata/package/manifest/name::npm-hyphenated-multiword-name

  - id: normalize-path-author-clone
    desc: normalize-path clone retains author
    crit: suspicious
    conf: 0.96
    all:
      - id: normalize-path-suffix-name
      - id: jon-schlinkert-author-string
      - id: normalize-path-keyword-cluster
    any:
      - id: metadata/package/versioning::mature-package-version
      - id: metadata/package/manifest/name::npm-hyphenated-multiword-name

  - id: n8n-webhook-validated-clone-package
    desc: Randomized n8n clone with webhook license validator
    crit: hostile
    conf: 0.995
    for: [archives]
    scope: archive
    all:
      - id: n8n-random-triple-segments
      - id: metadata/package/manifest/freeform::npm-n8n-node-manifest
      - id: objectives/exfiltration/messaging/webhook::license-validator-webhook
    any:
      - id: metadata/package/quality/empty::npm-no-author
      - id: metadata/package/quality/empty::npm-empty-author
      - id: metadata/package/manifest/description::short-description

  - id: n8n-obfuscated-docsite-package
    desc: Obfuscated n8n node with docsite repository
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/manifest/freeform::npm-n8n-node-manifest
      - id: repo-gitbook-docsite
      - id: n8n-obfuscator-dependency
    any:
      - id: n8n-obfuscator-build-script
      - id: name-suffix-enhanced

  - id: phoai-obfuscated-n8n-package
    desc: PhoAi n8n package with obfuscated docsite masquerade
    crit: hostile
    conf: 0.995
    all:
      - id: phoai-ultimate-tools-name
      - id: metadata/package/manifest/freeform::npm-n8n-node-manifest
      - id: n8n-obfuscator-dependency
      - id: repo-gitbook-docsite
    any:
      - id: n8n-obfuscator-build-script
      - id: name-suffix-enhanced

  - id: npm-crypto-facade-malicious-dep
    desc: Crypto library facade with suspicious runtime dependency
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/package/dependencies::npm-dep-ts-tweetnacl-utils
    any:
      - id: micro-behaviors/os/random/crypto::node-random-bytes
      - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant

  - id: big-js-impersonation-clone
    desc: Impersonation of the popular big.js library
    crit: hostile
    conf: 0.99
    all:
      - id: big-js-impersonation
    any:
      - id: objectives/supply-chain/trojanized/library/hidden-dep::lint-builder-dependency
      - id: author-retained-original
  - id: winston-clone-runtime-autoinstall
    desc: Winston clone auto-installs hidden dependency at runtime
    crit: hostile
    conf: 0.995
    for: [archives]
    scope: archive
    all:
      - id: winston-upstream-repository
      - id: objectives/supply-chain/trojanized/library/hidden-dep::runtime-autoinstall-hidden-dependency
    any:
      - id: winston-upstream-readme
      - id: metadata/package/dependencies::npm-dep-child-process
      - id: metadata/package/versioning::mature-package-version

  - id: iconifi-react-upstream-clone
    desc: Iconifi React clones Iconify metadata
    crit: suspicious
    conf: 0.98
    all:
      - id: iconifi-react-name
      - id: iconify-upstream-repo-url
      - id: iconify-upstream-homepage
    any:
      - id: iconify-upstream-bugs
      - id: metadata/package/versioning::mature-package-version
