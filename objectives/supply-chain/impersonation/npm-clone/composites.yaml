defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: suspicious
  attack: T1195.002
  mbc: E1195.002

composite_rules:
  - id: npm-clone-name-pattern
    desc: Package name matches known clone pattern
    crit: suspicious
    conf: 0.85
    any:
      - id: name-variation-any-illu
      - id: name-suffix-addition
      - id: name-suffix-enhanced
      - id: name-suffix-illu

  - id: npm-identity-laundering
    desc: Package identity laundering (retained author + different repository)
    crit: suspicious
    conf: 0.88
    all:
      - id: author-retained-original
      - id: repo-zerorooot-matcher

  - id: npm-build-artifact-leakage
    desc: Build environment leaked in package artifacts
    crit: notable
    conf: 0.85
    any:
      - id: tsbuildinfo-buildpath-leak
      - id: pnpm-workspace-path-leak

  - id: cookie-parser-upstream-branding
    desc: Metadata retains cookie-parser upstream branding
    crit: suspicious
    conf: 0.95
    any:
      - id: cookie-parser-upstream-repo
      - id: cookie-parser-upstream-repo-url
      - id: cookie-parser-upstream-homepage
      - id: cookie-parser-upstream-bugs

  - id: fairwords-websocket-upstream-clone
    desc: Fairwords websocket clones upstream identity
    crit: hostile
    conf: 0.995
    all:
      - id: fairwords-websocket-name
      - id: websocket-node-upstream-repo
      - id: websocket-node-author-string
    any:
      - id: websocket-node-upstream-homepage

  - id: npm-suspicious-clone
    desc: Suspicious npm package clone detected
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: npm-clone-name-pattern
      - id: npm-identity-laundering
      - id: npm-build-artifact-leakage
      - id: repo-mismatch-indicator
      - id: npminstall-done-false

  - id: redis-request-parser-cookie-parser-clone
    desc: redis-request-parser clone retains cookie-parser identity
    crit: hostile
    conf: 0.995
    all:
      - id: redis-request-parser-name
      - id: objectives/supply-chain/metadata-anomaly/dependency/facade::npm-dep-eslint-plugin-supertest
      - id: cookie-parser-upstream-branding

  - id: agnolia-string-argv-dependency-stub
    desc: string-argv clone pulls malicious payload dependency
    crit: hostile
    conf: 0.995
    all:
      - id: agnolia-string-argv-name
      - id: agnolia-string-argv-payload-dep
      - id: federica-string-argv-repo-url
  - id: string-format-upstream-clone
    desc: Scoped package clones string-format metadata
    crit: suspicious
    conf: 0.97
    all:
      - id: string-format-upstream-repo-url
      - id: string-format-upstream-homepage
      - id: string-format-upstream-bugs
    any:
      - id: string-format-upstream-author
      - id: objectives/supply-chain/metadata-anomaly/manifest/npm::scoped-package-name
      - id: version-mature-published
    needs: 2
  - id: string-format-dead-hook-clone
    desc: string-format clone ships dead postinstall loader
    crit: hostile
    conf: 0.995
    all:
      - id: string-format-upstream-clone
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-missing-init-js-payload
    any:
      - id: objectives/supply-chain/metadata-anomaly/manifest/npm::scoped-package-name
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-runs-init-js
      - id: version-mature-published

  - id: n8n-randomized-clone-package
    desc: Anonymous n8n node with randomized clone name
    crit: hostile
    conf: 0.985
    all:
      - id: n8n-random-triple-segments
      - id: n8n-node-manifest
    any:
      - id: metadata/package/quality::npm-no-author
      - id: metadata/package/quality::npm-empty-author
      - id: objectives/supply-chain/metadata-anomaly/package/npm::pkg-no-description-short
      - id: metadata/package/fields/name::npm-hyphenated-multiword-name

  - id: normalize-path-author-clone
    desc: normalize-path clone retains author
    crit: suspicious
    conf: 0.96
    all:
      - id: normalize-path-suffix-name
      - id: jon-schlinkert-author-string
      - id: normalize-path-keyword-cluster
    any:
      - id: version-mature-published
      - id: metadata/package/fields/name::npm-hyphenated-multiword-name

  - id: n8n-webhook-validated-clone-package
    desc: Randomized n8n clone with webhook license validator
    crit: hostile
    conf: 0.995
    all:
      - id: n8n-random-triple-segments
      - id: n8n-node-manifest
      - id: objectives/exfiltration/messaging/webhook::license-validator-webhook
    any:
      - id: metadata/package/quality::npm-no-author
      - id: metadata/package/quality::npm-empty-author
      - id: objectives/supply-chain/metadata-anomaly/package/npm::pkg-no-description-short

  - id: n8n-obfuscated-docsite-package
    desc: Obfuscated n8n node with docsite repository
    crit: suspicious
    conf: 0.95
    all:
      - id: n8n-node-manifest
      - id: repo-gitbook-docsite
      - id: n8n-obfuscator-dependency
    any:
      - id: n8n-obfuscator-build-script
      - id: name-suffix-enhanced

  - id: phoai-obfuscated-n8n-package
    desc: PhoAi n8n package with obfuscated docsite masquerade
    crit: hostile
    conf: 0.995
    all:
      - id: phoai-ultimate-tools-name
      - id: n8n-node-manifest
      - id: n8n-obfuscator-dependency
      - id: repo-gitbook-docsite
    any:
      - id: n8n-obfuscator-build-script
      - id: name-suffix-enhanced

  - id: npm-crypto-facade-malicious-dep
    desc: Crypto library facade with suspicious runtime dependency
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/supply-chain/metadata-anomaly/dependency/facade::npm-dep-ts-tweetnacl-utils
    any:
      - id: micro-behaviors/crypto/library/provider::random-bytes
      - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant

  - id: big-js-impersonation-clone
    desc: Impersonation of the popular big.js library
    crit: hostile
    conf: 0.99
    all:
      - id: big-js-impersonation
    any:
      - id: objectives/supply-chain/trojanized/library/hidden-dep::lint-builder-dependency
      - id: author-retained-original
