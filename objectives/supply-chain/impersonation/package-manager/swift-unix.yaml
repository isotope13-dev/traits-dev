defaults:
  platforms: [unix]
  for: [swift]
  attack: T1195

traits:
  - id: swiftpm-update-impersonation
    desc: SwiftPM update impersonation
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'SwiftPackageManager/5\.9\.2[\s\S]{0,220}/api/v1/packages/update-check'

  - id: swift-apt-useragent-impersonation
    desc: Swift APT UA impersonation
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "Debian APT-HTTP/1.3"

  - id: swift-pip-index-impersonation
    desc: Swift pip index impersonation
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'pip/23\.2\.1[\s\S]{0,180}/pypi/simple/cryptography'

composite_rules:
  - id: swift-package-manager-impersonation
    desc: Swift package manager impersonation
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: swiftpm-update-impersonation
      - id: swift-apt-useragent-impersonation
      - id: swift-pip-index-impersonation
