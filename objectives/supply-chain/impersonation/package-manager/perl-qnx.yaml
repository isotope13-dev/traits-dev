defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1036

traits:
  - id: qnx-perl-sdp-client-mask
    desc: QNX Perl SDP client mask
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/bin/sdp-client --update

  - id: qnx-perl-forged-qnx-manifest
    desc: QNX Perl forged manifest
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: QNX Release Signing Authority

  - id: qnx-perl-photon-manager-decoy
    desc: QNX Perl photon manager decoy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: photon-process-manager

  - id: qnx-perl-fake-photon-library
    desc: QNX Perl fake patch library
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'lib[A-Za-z0-9_-]*patch\.so\.[0-9][A-Za-z0-9_.-]{0,40}'

  - id: qnx-perl-qnx-patch-marker
    desc: QNX Perl patch marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'QNX-PATCH-[0-9][0-9A-Za-z._-]{0,24}'

  - id: qnx-perl-verified-pkg-label
    desc: QNX Perl verified pkg label
    crit: component
    conf: 0.9
    if:
      type: text
      substr: PKG_SIGNATURE=VERIFIED

composite_rules:
  - id: qnx-perl-sdp-package-impersonation
    desc: QNX Perl SDP package impersonation
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-sdp-client-mask
      - id: qnx-perl-forged-qnx-manifest
      - id: qnx-perl-photon-manager-decoy

  - id: qnx-perl-forged-photon-package
    desc: QNX Perl forged photon package
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-fake-photon-library
      - id: qnx-perl-qnx-patch-marker
      - id: qnx-perl-verified-pkg-label
