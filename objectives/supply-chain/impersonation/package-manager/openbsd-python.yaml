defaults:
  platforms: [openbsd, bsd, unix]
  for: [python, pyc]
  attack: T1195.002

traits:
  - id: python-pkg-temp-wrapper
    desc: Python package temp wrapper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.pkg-

  - id: python-impersonate-pkg-manager
    desc: Python impersonates pkg manager
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: impersonate_package_manager

composite_rules:
  - id: python-openbsd-pkg-manager-impersonation
    desc: Python pkg manager impersonation
    crit: hostile
    conf: 0.98
    all:
      - id: python-pkg-temp-wrapper
      - id: python-impersonate-pkg-manager
