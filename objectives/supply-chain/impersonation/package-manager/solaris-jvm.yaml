defaults:
  platforms: [solaris, unix]
  for: [java, class, java_class, jar]
  attack: T1036.005

traits:
  - id: jvm-solaris-pkgadd-wrapper
    desc: JVM Solaris pkgadd wrapper
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'CMD=pkgadd[\s\S]{0,220}/usr/sbin/pkgadd'

  - id: jvm-solaris-pkgadd-bytes
    desc: JVM Solaris pkgadd bytes
    crit: suspicious
    conf: 0.92
    for: [java_class]
    if:
      type: hex
      pattern: 43 4D 44 3D 70 6B 67 61 64 64

  - id: jvm-solaris-svccfg-wrapper
    desc: JVM Solaris svccfg wrapper
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'CMD=svccfg[\s\S]{0,220}/usr/sbin/svccfg'

  - id: jvm-solaris-svccfg-bytes
    desc: JVM Solaris svccfg bytes
    crit: suspicious
    conf: 0.92
    for: [java_class]
    if:
      type: hex
      pattern: 43 4D 44 3D 73 76 63 63 66 67

  - id: jvm-local-bin-path-export
    desc: JVM local bin PATH export
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: export PATH=$HOME/.local/bin:$PATH

composite_rules:
  - id: jvm-solaris-package-wrapper
    desc: JVM Solaris package wrapper
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-local-bin-path-export
    any:
      - id: jvm-solaris-pkgadd-wrapper
      - id: jvm-solaris-svccfg-wrapper

  - id: jvm-bytecode-package-wrapper
    desc: JVM bytecode package wrapper
    crit: hostile
    conf: 0.97
    for: [java_class]
    all:
      - id: jvm-solaris-pkgadd-bytes
      - id: jvm-solaris-svccfg-bytes
