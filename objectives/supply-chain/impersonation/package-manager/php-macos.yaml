defaults:
  platforms: [unix]
  for: [php]
  attack: T1195.002

traits:
  - id: php-homebrew-formula-write
    desc: PHP Homebrew formula write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: class MaliciousPackage < Formula

  - id: php-homebrew-tap-path
    desc: PHP Homebrew tap path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Library/Taps/homebrew/homebrew-core/Formula

  - id: php-composer-apple-package
    desc: PHP Apple composer package
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: apple/system-config

  - id: php-composer-script-curl
    desc: PHP composer script curl
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: post-install-cmd

composite_rules:
  - id: php-homebrew-package-impersonation
    desc: PHP Homebrew package impersonation
    crit: hostile
    conf: 0.98
    all:
      - id: php-homebrew-formula-write
      - id: php-homebrew-tap-path

  - id: php-composer-package-impersonation
    desc: PHP composer package impersonation
    crit: hostile
    conf: 0.98
    all:
      - id: php-composer-apple-package
      - id: php-composer-script-curl
