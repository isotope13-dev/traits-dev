defaults:
  platforms: [openbsd, bsd, unix]
  for: [java, class]
  attack: T1195

traits:
  - id: java-openbsd-installurl-write
    desc: Java writes OpenBSD installurl
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /etc/installurl

  - id: java-openbsd-pkg-conf-write
    desc: Java writes OpenBSD pkg.conf
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /etc/pkg.conf

  - id: java-disables-pkg-signature-check
    desc: Java disables pkg signature check
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: PKG_SIGNATURE_CHECK=0

composite_rules:
  - id: java-openbsd-package-source-impersonation
    desc: Java OpenBSD package source spoof
    crit: hostile
    conf: 0.98
    all:
      - id: java-openbsd-installurl-write
      - id: java-openbsd-pkg-conf-write
      - id: java-disables-pkg-signature-check

