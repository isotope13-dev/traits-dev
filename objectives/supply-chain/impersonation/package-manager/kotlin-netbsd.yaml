defaults:
  platforms: [netbsd, unix]
  for: [kotlin]
  attack: T1195.002

traits:
  - id: kotlin-netbsd-pkg-wrapper-set
    desc: Kotlin writes NetBSD pkg wrappers
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'pkg_add[\s\S]{0,180}pkg_delete[\s\S]{0,180}pkg_info'

  - id: kotlin-wrapper-credential-log
    desc: Kotlin wrapper logs credentials
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CRED_CAPTURE:[\s\S]{0,220}exec \$originalPath "\$@"'

composite_rules:
  - id: kotlin-netbsd-package-wrapper-theft
    desc: Kotlin NetBSD package wrapper theft
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-netbsd-pkg-wrapper-set
      - id: kotlin-wrapper-credential-log
