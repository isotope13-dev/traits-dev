# A package that aliases a third-party module's install API to the name `npm`
# (`const { syncApi: npm } = require("oubliette")`) so that `npm().install(...)`
# calls read like the legitimate npm CLI while covertly fetching an undeclared
# package at runtime. The alias is the disguise; the install call is the action.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1036
composite_rules:
  - id: npm-api-impersonation-install
    desc: Disguised npm-aliased runtime installer
    crit: hostile
    conf: 0.95
    attack: "T1036,T1195.002"
    mbc: "B0024"
    all:
      - id: objectives/supply-chain/install-hook/scripts/dynamic-install::pkgmgr-aliased-as-npm
      - id: objectives/supply-chain/install-hook/scripts/dynamic-install::api-install-package-call
