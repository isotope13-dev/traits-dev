defaults:
  for: [pkginfo]
  platforms: [unix, windows]
  crit: suspicious
  attack: "T1195.002"
traits:
  - id: summary-mentions-victim
    desc: Package summary explicitly mentions victims
    conf: 0.9
    if:
      type: value
      path: summary
      substr: victim
      case_insensitive: true
  - id: summary-poc-research-1
    desc: Summary claims proof of concept research
    conf: 0.88
    if:
      type: value
      path: summary
      regex: "(proof.of.concept|\\bpoc\\b|security.research)"
      case_insensitive: true
  - id: summary-poc-research-2
    desc: Summary claims bug bounty confusion
    conf: 0.88
    if:
      type: value
      path: summary
      regex: "(bug.bounty|dependency.confusion)"
      case_insensitive: true
  - id: summary-confirms-install
    desc: Summary mentions confirming package installation
    conf: 0.9
    if:
      type: value
      path: summary
      regex: "confirm.{0,30}install"
      case_insensitive: true
  - id: summary-beacon
    desc: Summary mentions beacon functionality
    conf: 0.9
    if:
      type: value
      path: summary
      regex: "\\bbeacon\\b"
      case_insensitive: true
composite_rules:
  - id: summary-poc-research
    desc: Summary claims dependency confusion research
    conf: 0.9
    any:
      - id: summary-poc-research-1
      - id: summary-poc-research-2
