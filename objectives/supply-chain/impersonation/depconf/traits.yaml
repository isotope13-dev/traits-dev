defaults:
  for: [pkginfo]
  platforms: [unix, windows]
  crit: suspicious
  attack: "T1195.002"
traits:
  - id: summary-mentions-victim
    desc: Package summary explicitly mentions victims
    conf: 0.9
    if:
      type: value
      path: summary
      substr: victim
      case_insensitive: true
  - id: summary-poc-research-1
    desc: Summary claims proof of concept research
    crit: component
    conf: 0.88
    if:
      type: value
      path: summary
      regex: "(proof.of.concept|\\bpoc\\b|security.research)"
      case_insensitive: true
  - id: summary-poc-research-2
    desc: Summary claims bug bounty confusion
    crit: component
    conf: 0.88
    unless:
      - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
    if:
      type: value
      path: summary
      regex: "(bug.bounty|dependency.confusion)"
      case_insensitive: true
  - id: summary-confirms-install
    desc: "Summary confirms package installation"
    conf: 0.9
    if:
      type: value
      path: summary
      regex: "confirm.{0,30}install"
      case_insensitive: true
  - id: summary-beacon
    desc: Summary mentions beacon functionality
    crit: component
    conf: 0.9
    if:
      type: value
      path: summary
      regex: "\\bbeacon\\b"
      case_insensitive: true
composite_rules:
  # A bare "proof of concept" claim is common in legitimate academic/research
  # software, so it only counts toward depconf when paired with a confirmer
  # (victim mention, install callback, beacon). Bug-bounty/dependency-confusion
  # wording alone is still only a component because scanners and research tools
  # commonly describe those concepts without performing the attack.
  - id: poc-claim-corroborated
    desc: Proof-of-concept claim with depconf marker
    crit: component
    conf: 0.9
    all:
      - id: summary-poc-research-1
    any:
      - id: summary-mentions-victim
      - id: summary-confirms-install
      - id: summary-beacon
  - id: summary-poc-research
    desc: Summary claims dependency confusion research
    crit: component
    conf: 0.9
    any:
      - id: summary-poc-research-2
      - id: poc-claim-corroborated
