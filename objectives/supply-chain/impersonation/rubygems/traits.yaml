defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  attack: T1195.002
traits:
  - id: executable-ls
    desc: RubyGems executable named ls
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "executables:\n- ls"
  - id: file-bin-ls
    desc: RubyGems ships bin/ls file
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "- bin/ls"
  - id: package-name-ls
    desc: RubyGems package named ls
    crit: component
    conf: 0.7
    if:
      type: text
      substr: "name: ls"
  - id: json-colour-name
    desc: RubyGems package named json_colour
    crit: suspicious
    conf: 0.98
    if:
      type: value
      path: name
      regex: ^json_colour$
  - id: json-color-homepage
    desc: Cloned json_color homepage
    crit: suspicious
    conf: 0.98
    if:
      type: value
      path: homepage
      exact: https://bitbucket.org/winebarrel/json_color
  - id: genki-sugawara-author
    desc: Cloned json_color author
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: "- Genki Sugawara"
  - id: sgwr-yahoo-email
    desc: Cloned json_color email
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: "- sgwr_dts@yahoo.co.jp"
composite_rules:
  - id: core-command-shadow
    desc: RubyGems package shadows /bin/ls
    crit: suspicious
    conf: 0.95
    all:
      - id: executable-ls
      - id: file-bin-ls
      - id: metadata/package/manifest/entrypoint::rubygems-bindir-bin
    unless:
      - id: package-name-ls
  - id: cloned-json-color-identity
    desc: Cloned json_color maintainer identity
    crit: suspicious
    conf: 0.98
    all:
      - id: json-color-homepage
      - id: genki-sugawara-author
      - id: sgwr-yahoo-email
  - id: json-colour-typosquat-shadow
    desc: json_colour typosquat with ls shadowing
    crit: hostile
    conf: 0.995
    all:
      - id: json-colour-name
      - id: json-color-homepage
      - id: genki-sugawara-author
      - id: sgwr-yahoo-email
      - id: executable-ls
      - id: file-bin-ls
      - id: metadata/package/manifest/entrypoint::rubygems-bindir-bin
