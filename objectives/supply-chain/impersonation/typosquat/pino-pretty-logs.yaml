# pino-pretty-logs — typosquat of the legitimate pino-pretty package.
# The 2.0.0 release was trojanized; it carries a verbatim cover-story
# description and a dist/index.js entrypoint. Generic indicators
# (main: "dist/...") are referenced from their canonical location at
# objectives/supply-chain/hidden-payload/staging:: rather than duplicated.
# ATT&CK: T1195.002 (Supply Chain Compromise).
defaults:
  platforms:
    - windows
    - unix
  for:
    - package.json
  attack: T1195.002

traits:
  - id: pino-pretty-logs-name
    desc: '"pino-pretty-logs" package name'
    crit: notable
    conf: 1.0
    if:
      type: value
      path: name
      exact: pino-pretty-logs

  - id: pino-pretty-logs-trojanized-version
    desc: 'pino-pretty-logs version 2.0.0'
    crit: component
    conf: 1.0
    if:
      type: value
      path: version
      exact: 2.0.0

  - id: pino-pretty-logs-cover-description
    desc: "pino-pretty-logs cover-story description"
    crit: component
    conf: 0.95
    if:
      type: value
      path: description
      exact: Useful pino logger and formatter with colorized output

composite_rules:
  - id: pino-pretty-logs-trojanized
    desc: pino-pretty-logs trojanized npm package
    crit: hostile
    conf: 0.995
    all:
      - id: pino-pretty-logs-name
      - id: pino-pretty-logs-trojanized-version
      - id: pino-pretty-logs-cover-description
      - id: metadata/package/manifest/entrypoint::main-dist-entrypoint
