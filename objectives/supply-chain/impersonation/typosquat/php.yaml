defaults:
  platforms: [unix]
  for: [php]
  attack: T1036
composite_rules:
  - id: php-impersonation-backdoor
    desc: Impersonates a PHP utility (e.g. php-fpm) while providing backdoor access
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/spawn::php-exec
      - id: micro-behaviors/fs/file/write/direct::php-file-write
      - id: metadata/file/string/file::php-fpm
    unless:
      - id: well-known/lib/tina4php
      - id: metadata/library/runtime::upstream-php-source
