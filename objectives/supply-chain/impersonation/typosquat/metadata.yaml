defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]

composite_rules:
  - id: private-helper-manifest-typosquat
    desc: Private helper manifest typosquat downgrade
    crit: baseline
    conf: 0.98
    all:
      - id: metadata/package/testing/presence/fixture::types-private-fixture-package
      - id: metadata/package/fields/name::npm-no-name-field
    downgrade:
      - id: supply-chain/typosquat
        to: component
