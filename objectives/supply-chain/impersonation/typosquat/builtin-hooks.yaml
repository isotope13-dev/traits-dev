# Engine-emitted `supply-chain/typosquat` hook.
# cleave flags dependency names within edit-distance 1 of popular packages.
# Google's `gaxios` (vs `axios`) and Joyent's `vasync` (vs `async`) trip that
# heuristic. Both are real, long-published upstream packages, so the finding is
# wrong wherever they appear — suppress on the *depended-on name*, not on which
# package declares it. Keying on the declarer (google-auth-library, bunyan)
# re-fires on the next consumer: google-gax, googleapis-common, restify.
defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
  - id: builtin-supply-chain-typosquat
    desc: Built-in typosquat finding hook
    crit: suspicious
    conf: 0.7
    if:
      type: basename
      exact: __cleave_builtin_typosquat_hook__
    unless:
      # Benign test fixtures and established upstream packages whose names
      # happen to be close to popular dependencies.
      - id: metadata/package/testing/presence/harness/
      - id: metadata/library/google-runtime/
      - id: well-known/lib/vasync/
      - id: well-known/lib/moment/
      - id: well-known/lib/traverse/
