defaults:
  platforms: [macos]
  for: [swift]
  attack: T1036
traits:
  - id: aix-tool-names
    desc: References AIX maintenance tools
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(instfix|lppchk)'
composite_rules:
  - id: swift-impersonation-recon
    desc: Swift script impersonating AIX tools while gathering data
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/invoke::c-popen-call
    any:
      - id: aix-tool-names
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
