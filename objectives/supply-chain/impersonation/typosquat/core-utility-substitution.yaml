# Dependency-substitution typosquats of ubiquitous npm utilities.
#
# A hijacked package may swap a ubiquitous runtime dependency for a lookalike
# utility that carries the payload. The Astro supply-chain compromise (OSV
# MAL-2026-10726) used `debug` -> `obug` and `picocolors` -> `piccolore`; both
# utilities also exist as legitimate standalone packages, so one use is only an
# indicator. Two independent substitutions in one package are hostile in that
# campaign context. Add new (real -> lookalike) pairs as campaigns surface.
defaults:
  platforms: [unix, windows]
  attack: T1195.002
  mbc: E1195.002

traits:
  # ---- package.json runtime-dependency declarations ----
  - id: dep-obug
    desc: Declares the obug debug utility
    crit: suspicious
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: dependencies.obug
      exists: true
    unless:
      - id: metadata/library/babel::babel-core-package
  - id: dep-piccolore
    desc: Declares the piccolore color utility
    crit: suspicious
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: dependencies.piccolore
      exists: true

  # ---- source imports of the lookalike modules ----
  - id: import-obug
    desc: Imports the obug debug utility
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: import
      exact: obug
  - id: import-piccolore
    desc: Imports the piccolore color utility
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: import
      exact: piccolore

composite_rules:
  - id: obug-substitution
    desc: Package manifest selects the obug debug utility
    crit: suspicious
    conf: 0.92
    for: [package.json]
    any:
      - id: dep-obug
      - id: import-obug
    unless:
      - id: metadata/library/babel::babel-core-package
  - id: piccolore-substitution
    desc: Package uses the piccolore color utility
    crit: suspicious
    conf: 0.92
    for: [package.json, javascript, typescript]
    any:
      - id: dep-piccolore
      - id: import-piccolore
  - id: core-utility-typosquat-substitution
    desc: Substitutes multiple npm utilities with typosquat lookalikes
    crit: hostile
    conf: 0.97
    for: [package.json, javascript, typescript, archives]
    scope: outer
    all:
      - id: obug-substitution
      - id: piccolore-substitution
