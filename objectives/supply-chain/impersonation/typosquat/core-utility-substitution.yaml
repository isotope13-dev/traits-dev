# Dependency-substitution typosquats of ubiquitous npm utilities.
#
# A hijacked package swaps a hugely popular runtime dependency for an
# attacker-registered lookalike that ships the payload. Observed in the astro
# supply-chain compromise (OSV MAL-2026-10726): `debug` -> `obug`,
# `picocolors` -> `piccolore`. The lookalikes do not exist as legitimate
# packages, so declaring or importing one is attack-context-specific. A single
# swap is suspicious; two independent ubiquitous-utility swaps in one package is
# a hostile substitution attack. Add new (real -> lookalike) pairs here as
# campaigns surface.
defaults:
  platforms: [unix, windows]
  attack: T1195.002
  mbc: E1195.002

traits:
  # ---- package.json runtime-dependency declarations ----
  - id: dep-obug
    desc: Dep 'obug' typosquats 'debug'
    crit: suspicious
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: dependencies.obug
      exists: true
  - id: dep-piccolore
    desc: Dep 'piccolore' typosquats 'picocolors'
    crit: suspicious
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: dependencies.piccolore
      exists: true

  # ---- source imports of the lookalike modules ----
  - id: import-obug
    desc: Imports 'obug' (typosquat of 'debug')
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: import
      exact: obug
  - id: import-piccolore
    desc: Imports 'piccolore' (typosquat picocolors)
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: import
      exact: piccolore

composite_rules:
  - id: obug-substitution
    desc: Depends on or imports 'obug', a typosquat of the 'debug' package
    crit: suspicious
    conf: 0.92
    for: [package.json, javascript, typescript]
    any:
      - id: dep-obug
      - id: import-obug
  - id: piccolore-substitution
    desc: Depends on or imports 'piccolore', a typosquat of 'picocolors'
    crit: suspicious
    conf: 0.92
    for: [package.json, javascript, typescript]
    any:
      - id: dep-piccolore
      - id: import-piccolore
  - id: core-utility-typosquat-substitution
    desc: Substitutes multiple npm utilities with typosquat lookalikes
    crit: hostile
    conf: 0.97
    for: [package.json, javascript, typescript, archives]
    scope: outer
    all:
      - id: obug-substitution
      - id: piccolore-substitution
