# Crypto/brand typosquat stub: a package whose manifest self-describes as an
# "Unofficial <name> SDK" — a cover-story used by wallet/blockchain typosquats
# (e.g. metamask/metemask, polygon) — while shipping essentially no library code
# and running a lifecycle install hook. The "unofficial SDK" description is the
# social-engineering hook that gets a mistaken `npm install` to run the hook;
# a real SDK provides functionality, not a tiny manifest + install script. Matched
# by the cover-description + install-hook + skeleton shape, not by any one brand
# name, so future wallet/chain typosquats are caught too.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: "T1195.002"
traits:
  - id: unofficial-sdk-cover-description
    desc: Manifest self-describes as an unofficial SDK
    crit: notable
    conf: 0.9
    if:
      type: value
      path: description
      regex: '(?i)^\s*unofficial\b.{1,80}\bsdk\b'
composite_rules:
  - id: unofficial-sdk-typosquat-install-hook
    desc: Unofficial-SDK typosquat runs an install hook
    crit: hostile
    conf: 0.9
    all:
      - id: unofficial-sdk-cover-description
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
