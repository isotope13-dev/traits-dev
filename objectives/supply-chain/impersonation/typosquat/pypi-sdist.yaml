defaults:
  platforms: [unix, windows]
  attack: T1195.002

traits:
  - id: pypi-lts-suffixed-name
    desc: PyPI package name uses LTS suffix
    crit: component
    conf: 0.86
    for: [tar]
    if:
      type: value
      path: python.name
      regex: '^[A-Za-z0-9_.-]+-lts$'
  - id: lts-console-script-imports-unsuffixed-module
    desc: LTS console script imports unsuffixed module
    crit: suspicious
    conf: 0.9
    for: [text]
    if:
      type: text
      regex: '(?m)^[A-Za-z0-9_.-]+-lts(-[A-Za-z0-9_.-]+)?\s*=\s*[A-Za-z0-9_]+\.cli:[A-Za-z0-9_]+'
  - id: pypi-direct-wheel-egg-link
    desc: Direct wheel URL dependency link
    crit: suspicious
    conf: 0.95
    for: [text]
    if:
      type: text
      regex: 'https?://.{1,240}\.whl#egg=[A-Za-z0-9_.-]{1,120}'
  - id: pypi-requires-malicious-name
    desc: PKG-INFO requires malicious-named package
    crit: suspicious
    conf: 0.94
    for: [pkginfo]
    if:
      type: text
      regex: '(?im)^Requires-Dist:\s*.{0,80}malicious.{0,80}$'
  - id: pypi-requires-payload-name
    desc: PKG-INFO requires payload-named package
    crit: suspicious
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: '(?im)^Requires-Dist:\s*.{0,80}(payload|implant).{0,80}$'
  - id: pypi-requires-stealer-name
    desc: PKG-INFO requires stealer-named package
    crit: suspicious
    conf: 0.9
    for: [pkginfo]
    if:
      type: text
      regex: '(?im)^Requires-Dist:\s*.{0,80}(stealer|exfil).{0,80}$'

composite_rules:
  - id: pypi-root-legacy-dependency-links-url
    desc: Root setup.py declares direct dependency link
    crit: suspicious
    conf: 0.92
    for: [python]
    scope: leaf
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/os/package-manager/install::python-legacy-dependency-link-url

  - id: pypi-lts-wrapper-upstream-impersonation
    desc: LTS-suffixed package wraps unsuffixed upstream module
    crit: suspicious
    conf: 0.93
    for: [archives]
    scope: archive
    all:
      - id: pypi-lts-suffixed-name
      - id: lts-console-script-imports-unsuffixed-module
    any:
      - id: metadata/package/scripts::entry-points-file
      - id: metadata/package/scripts::console-scripts-entry
  - id: pypi-direct-wheel-dependency-sdist
    desc: sdist installs direct wheel dependency
    crit: suspicious
    conf: 0.94
    for: [archives]
    scope: archive
    all:
      - id: metadata/package/files/wheel-sdist::pypi-egg-info-dependency-links
      - id: pypi-root-legacy-dependency-links-url
      - id: pypi-direct-wheel-egg-link
  - id: pypi-attack-named-direct-wheel-dependency
    desc: sdist direct wheel dependency names attack payload
    crit: hostile
    conf: 0.97
    for: [archives]
    scope: archive
    all:
      - id: pypi-direct-wheel-dependency-sdist
    any:
      - id: pypi-requires-malicious-name
      - id: pypi-requires-payload-name
      - id: pypi-requires-stealer-name
  - id: pypi-placeholder-template-sdist
    desc: PyPI sdist retains placeholder package template
    crit: suspicious
    conf: 0.9
    for: [archives]
    scope: archive
    all:
      - id: metadata/package/manifest/description::pyproject-placeholder-description
      - id: metadata/package/manifest/author/identity::placeholder-author-pkginfo-1
  - id: pypi-doi-scr-hollow-sdist
    desc: PyPI sdist uses DOI homepage with scr layout
    crit: suspicious
    conf: 0.88
    for: [archives]
    scope: archive
    all:
      - id: metadata/package/manifest/homepage::pkginfo-doi-homepage
      - id: metadata/package/files/wheel-sdist::pypi-sdist-scr-source-layout
  - id: openblox-custom-build-sdist
    desc: sdist placeholder identity with custom build hook
    crit: suspicious
    conf: 0.9
    for: [archives]
    scope: archive
    all:
      - id: objectives/supply-chain/impersonation/wheel-repack::sdist-openblox-placeholder-identity
      - id: metadata/build/package::setup-cmdclass-build-py
    any:
      - id: objectives/supply-chain/install-hook/build/behavioral::setup-obfuscated-shell-check-output
      - id: objectives/supply-chain/install-hook/build/behavioral::setup-computed-platform-shell-command
