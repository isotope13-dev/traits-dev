# crypto-js Typosquat Dependencies
# Detects dependencies that impersonate the legitimate crypto-js package
# Used by axios hijack (plain-crypto-js) and other supply chain attacks
# ATT&CK: T1195.002 (Supply Chain Compromise)
defaults:
  platforms:
    - windows
    - unix
  for:
    - package.json
  attack: T1195.002
traits:
  - id: dep-plain-crypto-js
    desc: plain-crypto-js dependency (typosquat)
    crit: suspicious
    conf: 0.99
    if:
      type: value
      path: dependencies.plain-crypto-js
  - id: dep-prefixed-crypto-js
    desc: Prefixed crypto-js dependency
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '"dependencies".{0,600}"[a-z]+-crypto-js"\s*:'
    not:
      - regex: '"crypto-js"\s*:'
