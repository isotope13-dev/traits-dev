defaults:
  platforms: [unix, windows]
  attack: T1195.002

traits:
  - id: pypi-private-variant-name
    desc: PyPI package name uses a private-variant suffix
    crit: suspicious
    conf: 0.88
    for: [pkginfo]
    if:
      type: value
      path: name
      regex: '(?i)(pvt|private|internal|inhouse)$'
  - id: numeric-suffixed-runtime-dependency
    desc: Numeric-suffixed runtime dependency
    crit: notable
    conf: 0.93
    for: [pkginfo]
    if:
      type: value
      path: requires-dist
      regex: '(?i)^[a-z][a-z0-9_-]{3,}[0-9]{2,}([._-][a-z0-9]+)*\s*([<>=!~]|;|$)'
  - id: numeric-suffixed-python-import
    desc: Numeric-suffixed Python import fragment
    crit: component
    conf: 0.94
    for: [python]
    if:
      type: text
      regex: '(?im)^\s*(from|import)\s+(?!base64\b)[a-z_][a-z0-9_]*[0-9]{2,}\b'
composite_rules:
  - id: numeric-runtime-dependency-import-chain
    desc: Wheel declares and imports a numeric-suffixed runtime namespace
    crit: hostile
    conf: 0.98
    for: [whl]
    scope: archive
    all:
      - id: numeric-suffixed-runtime-dependency
      - id: numeric-suffixed-python-import
  - id: private-variant-rewrites-transformers-imports
    desc: Private variant chains numeric dependency
    crit: hostile
    conf: 0.995
    for: [whl]
    scope: archive
    all:
      - id: pypi-private-variant-name
      - id: numeric-runtime-dependency-import-chain
  - id: private-variant-imports-numeric-module
    desc: Private variant imports numeric module
    crit: hostile
    conf: 0.98
    for: [whl]
    scope: archive
    all:
      - id: pypi-private-variant-name
      - id: numeric-suffixed-python-import
