defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  mbc: F0001
traits:
- id: npm-owner-add-exec
  desc: Executes npm owner add command
  crit: suspicious
  attack: T1098
  if:
    type: string_literal
    regex: npm\s+owner\s+add
- id: npm-whoami-exec
  desc: Executes npm whoami command
  crit: notable
  attack: T1098
  if:
    type: string_literal
    regex: npm\s+whoami
- id: npm-profile-url
  desc: NPM user profile URL pattern
  crit: notable
  attack: T1098
  if:
    type: string_literal
    substr: npmjs.org/~
- id: remove-postinstall
  desc: Removes postinstall script
  crit: suspicious
  attack: T1098
  if:
    type: string_literal
    regex: delete\s+\w+\.scripts\.postinstall
- id: npm-publish-exec
  desc: Executes npm publish command
  crit: notable
  conf: 0.9
  attack: T1195.002
  size_max: 500000
  unless:
  - type: basename
    regex: \.map$
  - type: basename
    exact: publish.js
  - type: text
    substr: "broken `npm publish`. Please report to https://github.com/babel/babel/issues"
  if:
    type: text
    regex: '(exec|spawn).{0,40}npm\s+publish'
  not:
  - substr: "execSync('npm run test');"
  - substr: "execSync('npm publish')"
  - substr: "broken `npm publish`"
  - substr: "Make sure the git working directory is clean before releasing"
- id: npm-maintainer-search-api
  desc: Queries npm maintainer package search
  crit: suspicious
  conf: 0.94
  attack: T1195.002
  if:
    type: text
    regex: '(registry\.npmjs\.org)?/v1/search\?text=maintainer:'
- id: npm-force-publish-token
  desc: Force publishes packages with token
  crit: suspicious
  conf: 0.96
  attack: T1195.002
  if:
    type: text
    regex: 'npm\s+publish.{0,80}--access\s+public.{0,80}--token\s+\$?\{?\w+'
- id: npm-publish-token-option
  desc: Publishes npm package with token
  crit: suspicious
  conf: 0.94
  attack: T1195.002
  if:
    type: text
    regex: 'npm\s+publish[\s\S]{0,160}--token\s+\$?\{?\w+'
- id: npm-version-patch-force
  desc: Forces npm package patch version
  crit: notable
  conf: 0.9
  attack: T1195.002
  if:
    type: text
    regex: 'npm\s+version\s+patch\s+--force'
- id: delete-private-field
  desc: Deletes private field from package data
  crit: suspicious
  conf: 0.85
  attack: T1195.002
  if:
    type: text
    regex: delete\s+\w+\.private
  not:
  - substr: "delete e.private"
  - substr: "delete connection.private"
  - substr: "delete error.private"
- id: node-bundle-postinstall
  desc: package postinstall executes bundle.js
  crit: suspicious
  conf: 0.95
  for: [package.json]
  if:
    type: text
    regex: '"post[Ii]nstall"\s*:\s*"node\s+bundle\.js"'
- id: github-workflow-file-write
  desc: Writes GitHub Actions workflow file
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '\.github/workflows/[^''"`\s]{1,120}\.ya?ml'
  unless:
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: well-known/tool/detection/sast::sast-scanner-integration
- id: npm-token-whoami-validation
  desc: Validates npm token with whoami
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'npm\s+whoami|/-/whoami\b|registry\.npmjs\.org/-/whoami'
- id: github-repo-create-shape
  desc: Creates GitHub repository by API
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '/user/repos\b|createForAuthenticatedUser|makeRepo\s*\('
composite_rules:
- id: npm-package-worm
  desc: NPM package worm (adds owner to packages)
  crit: hostile
  all:
  - id: npm-owner-add-exec
  - id: npm-whoami-exec
  any:
  - id: npm-profile-url
  - id: remove-postinstall
- id: npm-package-spam
  desc: Modifies and mass-publishes npm packages
  crit: hostile
  conf: 0.95
  attack: T1195.002
  all:
  - id: npm-publish-exec
  - id: micro-behaviors/process/create/shell/bridge::js-exec
  any:
  - id: delete-private-field
  - id: npm-owner-add-exec
  - id: remove-postinstall
- id: npm-maintainer-package-worm
  desc: Republish worm targets maintainer packages
  crit: hostile
  conf: 0.96
  attack: T1195.002
  all:
  - id: npm-maintainer-search-api
  - id: npm-force-publish-token
  any:
  - id: npm-version-patch-force
  - id: npm-publish-exec
  - id: npm-publish-token-option
- id: npm-token-package-infection-worm
  desc: NPM token package infection worm
  crit: hostile
  conf: 0.97
  attack: T1195.002
  all:
  - id: npm-token-whoami-validation
  - id: npm-publish-token-option
  any:
  - id: npm-version-patch-force
  - id: objectives/credential-access/env/secrets/file::npm-auth-token-extraction
  - id: objectives/credential-access/env/secrets/named-access::npm-token
- id: npm-bundle-postinstall-workflow-worm
  desc: NPM postinstall writes workflow worm
  crit: hostile
  conf: 0.99
  all:
  - id: node-bundle-postinstall
  any:
  - id: github-workflow-file-write
  - id: npm-token-whoami-validation
  - id: github-repo-create-shape
  - id: objectives/credential-access/api-harvest/token::trufflehog-filesystem-root-scan
  needs: 2
- id: js-workflow-credential-worm
  desc: JavaScript writes credential workflow worm
  crit: hostile
  conf: 0.99
  all:
  - id: github-workflow-file-write
  any:
  - id: npm-token-whoami-validation
  - id: github-repo-create-shape
  - id: objectives/credential-access/api-harvest/token::trufflehog-filesystem-root-scan
  - id: objectives/credential-access/env/secrets/named-access::npm-token
  needs: 2
