# Header-Based Remote Code Execution (RCE) Backdoor
# ATT&CK: T1105 (Ingress Tool Transfer), T1059 (Command and Scripting Interpreter)
# MBC: B0022 (Socket-based communication), E1059 (Code Execution)
#
# Pattern: Malicious code reassembles a payload from HTTP headers (often using specific regex)
# and executes it using vm.runInThisContext or similar.
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: webpack-sourcemap-runtime
    desc: Webpack source map runtime marker
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "sourceMapComment.replace("
  - id: webpack-internal-sourceurl
    desc: Webpack internal source URL marker
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: "webpack-internal:///"
composite_rules:
  - id: npm-header-rce-backdoor
    desc: HTTP Header-based Remote Code Execution Backdoor
    crit: hostile
    conf: 0.98
    attack: "T1105"
    mbc: "B0022"
    unless:
      - type: trait
        id: webpack-sourcemap-runtime
      - type: trait
        id: webpack-internal-sourceurl
    all:
      - type: trait
        id: micro-behaviors/data/buffer::offset-write
    needs: 2
    any:
      - type: trait
        id: objectives/anti-static/obfuscation/steganography::hex-command-regex
      - type: trait
        id: micro-behaviors/communications/http/protocol::header-stringify-scan
      - type: trait
        id: micro-behaviors/process/interpreter/vm::vm-runInThisContext
      - type: trait
        id: objectives/anti-static/obfuscation/encoding::encoded-node-require
      - type: trait
        id: objectives/anti-static/obfuscation/encoding::encoded-node-vm
      - type: trait
        id: objectives/anti-static/obfuscation/encoding::encoded-node-vm-run
      - type: trait
        id: micro-behaviors/data/buffer::buffer-alloc-large
      - type: trait
        id: micro-behaviors/data/buffer::module-exports-buffer-storage
