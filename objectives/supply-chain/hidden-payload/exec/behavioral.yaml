  - id: python-package-home-config-module-loader
    desc: Package hijacks Python module resolution to execute home config
    crit: hostile
    conf: 0.98
    attack: T1195.002,T1059.006
    # Evaluate only on individual Python members. Matching on whl/archives
    # rolls up legs from unrelated modules (sys.path mutate in one file,
    # Path.home()/.config in another, importlib.exec_module in a third) and
    # incorrectly fires as a package-level hostile finding.
    for: [python]
    scope: file
    near_lines: 80
    all:
      - id: micro-behaviors/os/module/search-path::sys-path-mutate
      - id: micro-behaviors/fs/path/location::hidden-dir-literal
      - id: micro-behaviors/fs/path/location::home-config-documents-reference
      - id: micro-behaviors/os/api-resolution/dynamic::python-importlib-spec-exec-module

  # Remote encoded-archive stager: download a blob over HTTP, base64-DECODE it
  # into an archive, EXTRACT it to disk, and run it. Base64-decoding downloaded
  # bytes into a zip and executing them is a dropper with no benign use — this is
  # the staging half of a typosquat that fetches a disguised .png, decodes it to
  # a zip under %APPDATA%, and launches pythonw.exe. Pairs with command-and-
  # control/dropper::python-remote-deobfuscated-payload-dropper (the decode-and-
  # run half) to give two hostile detections in distinct kill-chain stages.
  - id: python-remote-encoded-archive-stager
    desc: Decodes a downloaded blob into an archive and runs it
    crit: hostile
    conf: 0.97
    attack: T1105,T1027
    for: [python]
    scope: file
    # The agent keeps its HTTP, decoding, archive, and execution tools in
    # separate functions.  Require a genuinely staged chain in one region.
    near_lines: 40
    all:
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-extractall
    any:
      - id: micro-behaviors/process/create/subprocess::popen-ast
      - id: micro-behaviors/process/create/flags::python-create-no-window-hex
      - id: micro-behaviors/process/create/subprocess::python-subprocess-devnull
      - id: micro-behaviors/process/create/system::python-aliased-os-system
