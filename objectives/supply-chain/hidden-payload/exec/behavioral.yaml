defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: gzipfile-symbol
    desc: References Python GzipFile
    crit: component
    conf: 0.96
    attack: T1195.002
    for: [python]
    if:
      type: symbol
      exact: GzipFile
  - id: setup-pyc-filename-builder
    desc: setup.py builds Python bytecode filename
    crit: component
    conf: 0.94
    attack: T1195.002
    for: [python]
    unless:
      - id: well-known/tool/detection/proxy-sandbox
    if:
      type: text
      regex: '\.pyc|bytes\.fromhex\s*\(\s*["'']707963["'']\s*\)'
  - id: obfuscated-httpx-socks-import
    desc: Obfuscated httpx_socks import
    crit: suspicious
    conf: 0.95
    attack: T1027
    for: [python]
    if:
      type: text
      regex: "__import__\\s*\\(\\s*['\"]httpx['\"]\\s*\\+\\s*['\"]_socks['\"]"
  - id: reversed-subprocess-import
    desc: Reversed subprocess dynamic import
    crit: suspicious
    conf: 0.96
    attack: T1027
    for: [python]
    if:
      type: text
      regex: "__import__\\s*\\(\\s*['\"]ssecorpbus['\"]\\s*\\[::?-1\\]"
  - id: obfuscated-shell-bool-spawn
    desc: Obfuscated subprocess shell spawn
    crit: suspicious
    conf: 0.92
    attack: T1059.006
    for: [python]
    if:
      type: text
      # Only the obfuscated literal form — bool(1)/bool("1")/bool(0) used to
      # disguise shell=True. The benign coercion shell=bool(kwargs.get("shell",
      # False)) / bool(self.use_shell) wraps a runtime value, not a constant,
      # and is excluded.
      regex: '\bshell\s*=\s*bool\s*\(\s*["'']?\d'
  - id: python-base64-zlib-exec-loader
    desc: Python executes base64-decoded zlib payload
    crit: suspicious
    conf: 0.96
    attack: T1027
    for: [python]
    if:
      type: text
      regex: 'exec\s*\(\s*zlib\.decompress\s*\(\s*base64\.b64decode\s*\('
  - id: node-dbconnectify-reference
    desc: Node references dbconnectify module
    crit: notable
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: '\brequire\s*\(\s*["'']dbconnectify["'']\s*\)'
  - id: node-db-connectivity-probe
    desc: Node invokes database connectivity probe
    crit: notable
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: '\b[A-Za-z_$][A-Za-z0-9_$]*\s*\.\s*queryDBConnect\s*\(\s*\)'
composite_rules:
  - id: setup-gzip-pyc-loader
    desc: setup.py extracts Python bytecode from gzip
    crit: suspicious
    conf: 0.96
    attack: T1195.002
    for: [python]
    all:
      - id: metadata/build/pip::setup-py
      - id: gzipfile-symbol
      - id: setup-pyc-filename-builder
  - id: setup-importlib-exec-module
    desc: setup.py executes module through importlib spec
    crit: suspicious
    conf: 0.95
    attack: T1195.002
    for: [python]
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/os/api-resolution/dynamic::python-importlib-spec-exec-module
    unless:
      - id: well-known/tool/detection/proxy-sandbox
  - id: python-zipapp-native-stage-loader
    desc: Python ZIP app extracts native stage
    crit: suspicious
    conf: 0.94
    attack: T1027.009
    for: [python]
    all:
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-extractall
      - id: micro-behaviors/fs/temp/mktemp::tempfile-mkdtemp
      - id: micro-behaviors/fs/chmod/executable/mode::python-executable
      - id: micro-behaviors/process/create/system::python-aliased-os-system
    any:
      - id: micro-behaviors/fs/directory/delete::shutil-rmtree
      - id: micro-behaviors/fs/file/delete::py-rmtree
  - id: python-base64-zip-write-exec-loader
    desc: Python decodes ZIP payload then executes it
    crit: hostile
    conf: 0.98
    attack: T1195.002
    for: [python]
    all:
      - id: micro-behaviors/data/embedded/payload/archive::python-base64-zip-literal
      - id: micro-behaviors/data/decode/base64::b64decode-string
      - id: micro-behaviors/fs/file/write/direct::py-open-write-mode
      - id: micro-behaviors/process/create/system::python-aliased-os-system
  - id: pypi-base64-zip-write-exec-loader
    desc: PyPI package decodes an embedded payload then executes it
    crit: hostile
    conf: 0.99
    attack: T1195.002
    for: [whl, python-sdist]
    scope: archive
    all:
      - id: metadata/package/quality/ecosystem::pkginfo-core-metadata
    # The blob-dropper variant is text-reliable: a package whose module is one
    # huge base64 payload defeats literal/symbol extraction, so the strict
    # zip-literal loader above misses it while the generalized dropper catches it.
    any:
      - id: python-base64-zip-write-exec-loader
      - id: objectives/command-and-control/dropper/python-script::python-embedded-b64-blob-write-exec-dropper
  - id: python-extracted-native-stage-exec
