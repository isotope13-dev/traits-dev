defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: gzipfile-symbol
    desc: References Python GzipFile
    crit: component
    conf: 0.96
    attack: T1195.002
    for: [python]
    if:
      type: symbol
      exact: GzipFile
  - id: setup-pyc-filename-builder
    desc: setup.py builds Python bytecode filename
    crit: component
    conf: 0.94
    attack: T1195.002
    for: [python]
    unless:
      - id: well-known/tool/detection/proxy-sandbox
    if:
      type: text
      regex: '\.pyc|bytes\.fromhex\s*\(\s*["'']707963["'']\s*\)'
  - id: obfuscated-httpx-socks-import
    desc: Obfuscated httpx_socks import
    crit: suspicious
    conf: 0.95
    attack: T1027
    for: [python]
    if:
      type: text
      regex: "__import__\\s*\\(\\s*['\"]httpx['\"]\\s*\\+\\s*['\"]_socks['\"]"
  - id: reversed-subprocess-import
    desc: Reversed subprocess dynamic import
    crit: suspicious
    conf: 0.96
    attack: T1027
    for: [python]
    if:
      type: text
      regex: "__import__\\s*\\(\\s*['\"]ssecorpbus['\"]\\s*\\[::?-1\\]"
  - id: obfuscated-shell-bool-spawn
    desc: Obfuscated subprocess shell spawn
    crit: suspicious
    conf: 0.92
    attack: T1059.006
    for: [python]
    if:
      type: text
      regex: '\bshell\s*=\s*bool\s*\('
composite_rules:
  - id: setup-gzip-pyc-loader
    desc: setup.py extracts Python bytecode from gzip
    crit: suspicious
    conf: 0.96
    attack: T1195.002
    for: [python]
    all:
      - id: metadata/build/pip::setup-py
      - id: gzipfile-symbol
      - id: setup-pyc-filename-builder
  - id: setup-importlib-exec-module
    desc: setup.py executes module through importlib spec
    crit: suspicious
    conf: 0.95
    attack: T1195.002
    for: [python]
    all:
      - id: metadata/build/pip::setup-py
      - id: micro-behaviors/os/api-resolution/dynamic::python-importlib-spec-exec-module
    unless:
      - id: well-known/tool/detection/proxy-sandbox
  - id: spawn-bash-detached
    desc: Spawns detached bash shell process
    crit: suspicious
    conf: 0.85
    attack: "T1059.004"
    all:
      - id: micro-behaviors/process/create/spawn::spawn-bash
    any:
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::detached-dynamic
  - id: init-py-subprocess-touch
    desc: __init__.py launches touch via subprocess
    crit: suspicious
    conf: 0.97
    attack: T1195.002
    for: [python]
    all:
      - id: metadata/file/text/profile::init-py-file
      - id: micro-behaviors/process/create/subprocess::call-touch-argv
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
  - id: import-side-effect-file-create
    desc: Package import triggers file creation command
    crit: hostile
    conf: 0.98
    attack: T1195.002
    for: [python]
    all:
      - id: metadata/file/text/profile::init-py-file
      - id: micro-behaviors/process/create/subprocess::call-touch-argv
      - id: micro-behaviors/process/create/subprocess::call
  - id: python-package-inline-reverse-shell
    desc: Python package contains inline reverse shell
    crit: hostile
    conf: 0.99
    attack: T1195.002
    for: [python, pkginfo, zip, archives]
    scope: archive
    all:
      - id: metadata/build/pip::setup-py
      - id: objectives/command-and-control/reverse-shell/dup::inline-python-reverse-shell
  - id: npm-cli-reverse-shell
    desc: NPM CLI entrypoint contains reverse shell
    crit: hostile
    conf: 0.99
    attack: T1195.002
    for: [javascript, package.json, archives]
    scope: archive
    all:
      - id: metadata/package/files::npm-single-bin
    any:
      - id: objectives/command-and-control/reverse-shell/dup::reverse-shell-dev-tcp
      - id: objectives/command-and-control/reverse-shell/dev-tcp::dev-tcp-revshell
      - id: objectives/command-and-control/reverse-shell/dev-tcp::dev-tcp-bash-interactive-shell
      - id: objectives/command-and-control/reverse-shell/dup::socket-plus-interactive-shell
      - id: objectives/command-and-control/reverse-shell/dup::socket-plus-shell-exec
  - id: import-time-discord-dropper-bot
    desc: Import-time Discord dropper bot
    crit: hostile
    conf: 0.99
    attack: T1195.002
    for: [python]
    all:
      - id: metadata/file/text/profile::init-py-file
      - id: objectives/command-and-control/channel/discord::discord-python-bot-c2
      - id: objectives/command-and-control/dropper/execution/script::python-download-appdata-startfile
  - id: import-time-encrypted-python-payload
    desc: Import-time encrypted Python payload
    crit: hostile
    conf: 0.98
    attack: T1195.002
    for: [python]
    all:
      - id: micro-behaviors/crypto/symmetric/stream::python-rc4-like-stream-cipher
      - id: micro-behaviors/crypto/hash/digest::sha3-256-python
      - id: micro-behaviors/fs/file/write/direct::py-write-call
    any:
      - id: micro-behaviors/data/text/source::python-import-from-statement
      - id: micro-behaviors/data/text/source::python-py-extension-literal
  - id: time-gated-encrypted-python-payload
    desc: Time-gated encrypted Python payload
    crit: hostile
    conf: 0.98
    attack: T1195.002
    for: [python]
    all:
      - id: micro-behaviors/crypto/symmetric/stream::python-rc4-like-stream-cipher
      - id: micro-behaviors/crypto/hash/digest::sha3-256-python
      - id: micro-behaviors/fs/file/write/direct::py-write-call
    any:
      - id: micro-behaviors/data/text/source::python-datetime-threshold
      - id: micro-behaviors/data/text/source::python-timezone-utc
    needs: 1
  - id: python-packaged-data-executable-loader
    desc: Python package decrypts resource then writes and launches it
    crit: hostile
    conf: 0.99
    attack: T1195.002
    for: [python]
    all:
      - id: micro-behaviors/fs/read/resource::pkgutil-get-data
      - id: micro-behaviors/data/decode/base64::b64decode-string
      - id: objectives/anti-static/obfuscation/eval/scripting::python-chr-ord-shift
      - id: micro-behaviors/fs/file/write/direct::py-write-call
      - id: micro-behaviors/process/create/subprocess::popen-content
    any:
      - id: micro-behaviors/fs/chmod/modify::python-os-chmod
      - id: micro-behaviors/fs/chmod/executable/mode::python-executable
      - id: objectives/anti-static/obfuscation/payload/loader::py-subprocess-devnull
  - id: python-base64-zlib-exec-loader
    desc: Python executes base64-decoded zlib payload
    crit: suspicious
    conf: 0.96
    attack: T1027
    for: [python]
    all:
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: micro-behaviors/data/decode/base64::base64-decoding
      - id: micro-behaviors/data/compress/library::zlib-decompress-symbol
  - id: setup-gzip-pyc-exec-module
    desc: setup.py extracts and executes gzip-compressed bytecode
    crit: hostile
    conf: 0.99
    attack: T1195.002
    for: [python]
    all:
      - id: metadata/package/files::setup-py-basename
      - id: setup-gzip-pyc-loader
      - id: setup-pyc-filename-builder
      - id: setup-importlib-exec-module
  - id: pypi-setup-gzip-pyc-loader
    desc: PyPI sdist executes gzip-compressed bytecode during setup
    crit: hostile
    conf: 0.99
    attack: T1195.002
    for: [python, pkginfo, archives, zip]
    all:
      - id: setup-gzip-pyc-exec-module
      - id: metadata/build/pip::setup-py
    scope: archive
  - id: obfuscated-proxy-download-exec
    desc: Obfuscated proxy download-execute payload
    crit: hostile
    conf: 0.98
    attack: T1204.002
    for: [python]
    all:
      - id: obfuscated-httpx-socks-import
      - id: reversed-subprocess-import
      - id: obfuscated-shell-bool-spawn
  - id: pypi-obfuscated-proxy-download-exec
