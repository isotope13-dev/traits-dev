defaults:
  platforms: [unix, windows, macos]
  for: [javascript, typescript]
composite_rules:
  - id: spawn-bash-detached
    desc: Spawns detached bash shell process
    crit: suspicious
    conf: 0.85
    attack: "T1059.004"
    all:
      - id: micro-behaviors/process/create/spawn::spawn-bash
    any:
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::detached-dynamic
  - id: init-py-subprocess-touch
    desc: __init__.py launches touch via subprocess
    crit: suspicious
    conf: 0.97
    attack: T1195.002
    for: [python]
    all:
      - id: objectives/supply-chain/recon-exfil/install-hook::init-py-file
      - id: micro-behaviors/process/create/subprocess::call-touch-argv
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
  - id: import-side-effect-file-create
    desc: Package import triggers file creation command
    crit: hostile
    conf: 0.98
    attack: T1195.002
    for: [python]
    all:
      - id: objectives/supply-chain/recon-exfil/install-hook::init-py-file
      - id: micro-behaviors/process/create/subprocess::call-touch-argv
      - id: micro-behaviors/process/create/subprocess::call
