defaults:
  platforms: [windows, unix]
  attack: T1195.002
traits:
  - id: readme-github-raw-refs-link
    desc: README links GitHub raw refs path
    crit: component
    conf: 0.92
    for: [markdown]
    if:
      type: text
      regex: 'github\.com/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/raw/refs/heads/'

  - id: readme-zip-extension-link
    desc: README references ZIP link
    crit: component
    conf: 0.84
    for: [markdown]
    if:
      type: text
      regex: '\.zip\b'

  - id: readme-github-release-zip-link
    desc: README links a GitHub release ZIP
    # A release archive link is common documentation. It is only a component
    # until the README also treats the asset as a cloneable executable or
    # mislabels it as a license.
    crit: component
    conf: 0.95
    for: [markdown]
    if:
      type: text
      regex: '(?i)github\.com/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/releases/download/.{1,80}\.zip\b'

  - id: readme-clones-release-asset
    desc: README clones GitHub release asset
    crit: component
    conf: 0.94
    for: [markdown]
    if:
      type: text
      substr: 'git clone https://github.com/'

  - id: readme-clones-release-asset-instructions
    desc: README clones release asset in instructions
    crit: component
    conf: 0.94
    for: [markdown]
    if:
      type: text
      regex: '(?is)clone\s+the\s+repository.{0,240}releases/download/'

  - id: readme-launches-release-asset
    desc: README tells users to launch asset
    crit: notable
    conf: 0.94
    for: [markdown]
    if:
      type: text
      regex: '(?is)releases/download/.{1,160}\.zip\b.{0,240}\b(launch(ing)?|run|execute)\b'

  - id: readme-license-points-to-release-asset
    desc: README license link targets release asset
    crit: component
    conf: 0.96
    for: [markdown]
    if:
      type: text
      regex: '(?i)\[[^\]]{0,30}(license|licence)[^\]]{0,30}\]\(.{0,120}/releases/download/'

  # Object is payload/executable — NOT a bare "download ... zip", which is
  # universal benign install-doc language and is already covered separately by
  # readme-zip-extension-link in every composite that uses this leg.
  - id: readme-download-lure-language
    desc: README payload/executable download lure language
    crit: component
    conf: 0.86
    for: [markdown]
    if:
      type: text
      regex: '(?i)\b(download|install)\b.{0,120}\b(payload|executable)\b'

  - id: archive-examples-zip-sidecar
    desc: Source archive includes examples ZIP sidecar
    crit: component
    conf: 0.9
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)examples/[^/]{1,120}\.zip$'

  - id: archive-lua-exe-member
    desc: Archive contains Lua interpreter executable
    crit: component
    conf: 0.96
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)(lua|luajit)\.exe$'

  - id: archive-lua-launcher-member
    desc: Archive has Lua command launcher member
    crit: component
    conf: 0.95
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[Ll]auncher\.(cmd|bat)$'

  - id: archive-lua51-dll-member
    desc: Archive contains Lua 5.1 runtime DLL
    crit: component
    conf: 0.96
    for: [zip]
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)[Ll]ua51\.dll$'

  - id: batch-starts-lua-text-payload
    desc: Batch starts Lua text payload
    crit: suspicious
    conf: 0.95
    for: [batch]
    if:
      type: text
      regex: '(?i)\bstart\s+(lua|luajit)\.exe\s+\S{1,80}\.(txt|lua|dat)\b'

composite_rules:
  - id: luajit-script-archive-bundle
    desc: Archive bundles LuaJIT launcher and text payload
    crit: suspicious
    conf: 0.94
    for: [zip]
    all:
      - id: archive-lua-exe-member
      - id: archive-lua-launcher-member
      - id: micro-behaviors/data/archive/zip::archive-text-payload-member

  - id: luajit-archive-starts-text-payload
    desc: Archive launcher starts a LuaJIT text payload
    crit: hostile
    conf: 0.98
    attack: T1059.004,T1027
    scope: archive
    for: [archives, zip, batch, text]
    all:
      - id: archive-lua-exe-member
      - id: archive-lua-launcher-member
      - id: micro-behaviors/data/archive/zip::archive-text-payload-member
      - id: batch-starts-lua-text-payload

  - id: luajit-archive-full-runtime-lure
    desc: Archive bundles full LuaJIT launcher runtime
    crit: hostile
    conf: 0.99
    attack: T1059.004,T1027
    scope: archive
    for: [archives, zip, batch, text]
    all:
      - id: archive-lua-exe-member
      - id: archive-lua51-dll-member
      - id: archive-lua-launcher-member
      - id: micro-behaviors/data/archive/zip::archive-text-payload-member
      - id: batch-starts-lua-text-payload

  - id: luajit-obfuscated-script-archive-launcher
    desc: Archive launches obfuscated Lua payload with LuaJIT
    crit: hostile
    conf: 0.97
    scope: archive
    for: [archives, zip, batch, text]
    all:
      - id: archive-lua-exe-member
      - id: archive-lua-launcher-member
      - id: micro-behaviors/data/archive/zip::archive-text-payload-member
      - id: objectives/anti-static/obfuscation/code-metrics/structure::lua-packed-return-function-loader
      - id: objectives/anti-static/obfuscation/code-metrics/structure::lua-indexed-string-permutation-decoder

  - id: lua-obfuscated-string-table-archive-launcher
    desc: Lua archive launcher uses an obfuscated string-table payload
    crit: hostile
    conf: 0.98
    scope: archive
    for: [archives, zip, batch, text]
    all:
      - id: archive-lua-exe-member
      - id: archive-lua-launcher-member
      - id: micro-behaviors/data/archive/zip::archive-text-payload-member
      - id: objectives/anti-static/obfuscation/code-metrics/structure::lua-large-encoded-string-table
      - id: objectives/anti-static/obfuscation/code-metrics/structure::lua-environment-proxy-loader

  - id: luajit-archive-launches-indexed-string-dispatch
    desc: LuaJIT archive launches a large indexed-string dispatch payload
    crit: hostile
    conf: 0.98
    scope: archive
    for: [archives, zip, batch, text]
    all:
      - id: archive-lua-exe-member
      - id: archive-lua-launcher-member
      - id: micro-behaviors/data/archive/zip::archive-text-payload-member
      - id: objectives/anti-static/obfuscation/code-metrics/structure::lua-obfuscated-string-dispatch

  - id: luajit-archive-launches-escaped-string-dispatch
    desc: LuaJIT archive launches a decimal-escaped dispatch payload
    crit: hostile
    conf: 0.98
    scope: archive
    for: [archives, zip, batch, text]
    all:
      - id: archive-lua-exe-member
      - id: archive-lua-launcher-member
      - id: micro-behaviors/data/archive/zip::archive-text-payload-member
      - id: objectives/anti-static/obfuscation/code-metrics/structure::lua-escaped-string-dispatch

  - id: raw-zip-luajit-sidecar-lure
    desc: Source package promotes bundled LuaJIT payload ZIP
    crit: suspicious
    conf: 0.96
    scope: outer
    for: [archives, zip, markdown, batch, text]
    all:
      - id: readme-github-raw-refs-link
      - id: readme-zip-extension-link
      - id: readme-download-lure-language
      - id: archive-examples-zip-sidecar
      - id: archive-lua-exe-member

      - id: archive-lua-launcher-member
      - id: micro-behaviors/data/archive/zip::archive-text-payload-member
      - id: objectives/anti-static/obfuscation/code-metrics/structure::lua-packed-return-function-loader
      - id: objectives/anti-static/obfuscation/code-metrics/structure::lua-indexed-string-permutation-decoder
    unless:
      - id: metadata/package/testing/presence/harness/

  - id: readme-release-asset-clone-launch-lure
    desc: README disguises executable release asset as source clone
    crit: hostile
    conf: 0.98
    attack: T1036.005,T1195.002,T1204.002
    for: [markdown]
    all:
      - id: readme-github-release-zip-link
      - id: readme-clones-release-asset
      - id: readme-launches-release-asset

  - id: readme-release-asset-instruction-launch-lure
    desc: README disguises release asset as source download
    crit: hostile
    conf: 0.98
    attack: T1036.005,T1195.002,T1204.002
    for: [markdown]
    all:
      - id: readme-github-release-zip-link
      - id: readme-clones-release-asset-instructions
      - id: readme-launches-release-asset

  - id: readme-release-asset-license-lure
    desc: README disguises release asset as license document
    crit: hostile
    conf: 0.98
    attack: T1036.005,T1195.002
    for: [markdown]
    all:
      - id: readme-github-release-zip-link
      - id: readme-license-points-to-release-asset
      - id: readme-launches-release-asset

  - id: go-module-raw-zip-luajit-sidecar-lure
    desc: Go module source package promotes bundled LuaJIT payload ZIP
    crit: hostile
    conf: 0.97
    scope: outer
    for: [archives, zip, markdown, batch, text]
    all:
      - id: metadata/package/files/included::github-module-zip-basename
      - id: metadata/package/files/included::archive-go-mod-entry
      - id: readme-github-raw-refs-link
      - id: readme-zip-extension-link
      - id: readme-download-lure-language
      - id: archive-examples-zip-sidecar
      - id: archive-lua-exe-member
      - id: archive-lua-launcher-member
      - id: micro-behaviors/data/archive/zip::archive-text-payload-member
      - id: objectives/anti-static/obfuscation/code-metrics/structure::lua-packed-return-function-loader
      - id: objectives/anti-static/obfuscation/code-metrics/structure::lua-indexed-string-permutation-decoder
