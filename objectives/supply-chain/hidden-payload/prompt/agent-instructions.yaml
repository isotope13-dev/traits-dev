defaults:
  platforms: [unix, windows]
  for: [archives]
  attack: T1195.002

traits:
- id: packaged-agent-skill-member
  desc: Archive contains agent skill markdown
  crit: component
  conf: 0.95
  for: [vsix-archive]
  if:
    type: value
    path: "archive.members[*].path"
    regex: '(?i)(^|/)(\.agents/)?(skills|resources/skills)/[^/]+/SKILL\.md$'

composite_rules:
- id: packaged-llm-control-payload
  desc: Package embeds coercive agent-control instructions
  crit: hostile
  conf: 0.98
  scope: archive
  all:
  - id: packaged-agent-skill-member
  - id: objectives/evasion/security-bypass/llm/override::llm-coercive-skill-control
