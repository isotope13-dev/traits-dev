defaults:
  platforms: [unix, windows]
  for: [archives]
  attack: T1195.002

traits:
- id: after-install-instruction-member
  desc: Archive after-install member
  crit: notable
  conf: 0.95
  for: [archive]
  if:
    type: value
    path: "archive.members[*].path"
    regex: '(^|/)after-install\.md$'

composite_rules:
- id: packaged-concealed-terminal-install-payload
  desc: Package hides terminal actions
  crit: hostile
  conf: 0.99
  scope: archive
  all:
  - id: after-install-instruction-member
  - id: objectives/evasion/security-bypass/llm/prompt::indirect-prompt-injection-concealed-terminal-action

- id: packaged-llm-control-payload
  desc: Package embeds coercive agent-control instructions
  crit: hostile
  conf: 0.98
  scope: archive
  all:
  - id: metadata/package/config::agent-skill-archive-member
  - id: objectives/evasion/security-bypass/llm/override::llm-coercive-skill-control
