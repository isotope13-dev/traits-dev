defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - package.json
  attack: T1195.002
  mbc: "E1090"

traits:
  - id: malicious-displayname-xss-urlencoded
    desc: "URL-encoded XSS marker in displayName"
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: "displayName"
      regex: '%3[cC](script|img|svg)|%3[cC].{0,48}%3[eE]'

  - id: malicious-description-script-tag
    desc: "Script tag in description field"
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: "description"
      regex: '<\s*script'
      case_insensitive: true

  - id: malicious-repo-javascript-protocol
    desc: "Javascript protocol in repository field"
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: "repository"
      substr: "javascript:"

  - id: malicious-quoted-eval-urlencoded
    desc: "Eval with URL-encoded payload in displayName"
    crit: suspicious
    conf: 0.92
    if:
      type: kv
      path: "displayName"
      regex: 'eval\(this\.responseText\)|addEventListener\(%22load%22'

  - id: malicious-xss-dot-ht
    desc: "Malicious .xss.ht domain"
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: "displayName"
      substr: "vrlvaghela.xss.ht"

  - id: malicious-jsonp-callback
    desc: "JSONP callback with alert"
    crit: suspicious
    conf: 0.93
    if:
      type: kv
      path: description
      regex: 'callback=alert'
      case_insensitive: true

composite_rules:
  - id: malicious-devdeps-no-deps
    desc: Many devDependencies but no runtime dependencies
    crit: suspicious
    conf: 0.8
    all:
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-no-runtime-dependencies
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-many-dev-deps
    unless:
      - id: metadata/package::has-tests

  - id: xss-manifest-injection
    desc: "XSS injection in npm package metadata"
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/package/files::package-json-basename
    any:
      - id: malicious-displayname-xss-urlencoded
      - id: malicious-description-script-tag
      - id: malicious-quoted-eval-urlencoded
      - id: malicious-xss-dot-ht
      - id: malicious-jsonp-callback

  - id: xss-readme-injection
    desc: "XSS via javascript: protocol in README"
    crit: hostile
    conf: 0.9
    for: [javascript]
    all:
      - id: metadata/package/documentation::references-readme
      - id: micro-behaviors/process/interpreter/webview::javascript-uri-webview

  - id: vscode-manifest-xss
    desc: "VSCode extension with XSS in manifest"
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest::vscode-extension
    any:
      - id: malicious-displayname-xss-urlencoded
      - id: malicious-description-script-tag
      - id: malicious-jsonp-callback
      - id: malicious-xss-dot-ht
