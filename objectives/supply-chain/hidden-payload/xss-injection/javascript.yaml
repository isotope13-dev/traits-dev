defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
  attack: T1059.007
  mbc: "E1090"

composite_rules:
  - id: vscode-xss-injection
    desc: "XSS injection via VSCode API"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/ui/window/notify/message::show-information-message
    any:
      - id: objectives/privilege-escalation/exploit/keywords::img-onerror-handler
      - id: objectives/privilege-escalation/exploit/keywords::img-src-javascript
      - id: objectives/privilege-escalation/exploit/keywords::xss-var-semicolon
    needs: 2

  - id: vscode-xss-string-injection
    desc: "VSCode extension XSS text marker"
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/ui/window/notify/message::show-information-message
    any:
      - id: objectives/privilege-escalation/exploit/keywords::xss-string-segment
      - id: objectives/privilege-escalation/exploit/keywords::xss-var-semicolon
    unless:
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/app/vscode-marketplace::deque-axe-linter-vsix
