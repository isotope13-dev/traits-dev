defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
  attack: T1059.007
  mbc: "E1090"

traits:
  - id: malicious-vscode-onerror-xss
    desc: "Image onerror XSS payload"
    crit: suspicious
    conf: 0.9
    not:
      - substr: "jQuery.fn.extend"
    if:
      type: text
      regex: '<img.{0,50}onerror\s*='
      case_insensitive: true

  - id: malicious-vscode-showmsg-injection
    desc: "VS Code information message API call"
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(vscode\.window\.)?showInformationMessage\s*\('

  - id: malicious-vscode-xss-img-tag
    desc: "Malicious img tag with XSS"
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '<img.{0,128}src\s*=\s*[''"]x:'
      case_insensitive: true

  - id: malicious-vscode-semicolon-xss
    desc: "Malicious semicolon-prefixed var xss statement"
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: ';\s*var\s+xss\s*=\s*'

  - id: malicious-vscode-string-xss-segment
    desc: "XSS string in segments"
    crit: suspicious
    conf: 0.88
    unless:
      - id: metadata/library/runtime::next-edge-runtime-bundle
    if:
      type: string_literal
      regex: '\bXSS\b|alert\s*\(\/'

  - id: malicious-vscode-obfuscated-alert
    desc: "Obfuscated alert call in VSCode extension"
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: 'window\[[''"]alert[''"]\]|al\\u0065rt'

composite_rules:
  - id: vscode-xss-injection
    desc: "XSS injection via VSCode API"
    crit: hostile
    conf: 0.95
    all:
      - id: malicious-vscode-showmsg-injection
    any:
      - id: malicious-vscode-onerror-xss
      - id: malicious-vscode-xss-img-tag
      - id: malicious-vscode-semicolon-xss
    needs: 2

  - id: vscode-xss-string-injection
    desc: "VSCode extension XSS text marker"
    crit: suspicious
    conf: 0.8
    all:
      - id: malicious-vscode-showmsg-injection
    any:
      - id: malicious-vscode-string-xss-segment
      - id: malicious-vscode-semicolon-xss
    unless:
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/library/structure::js-large-module-bundle
