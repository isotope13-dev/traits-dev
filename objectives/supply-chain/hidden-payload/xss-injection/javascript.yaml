defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
  attack: T1059.007
  mbc: "E1090"

composite_rules:
  - id: vscode-xss-injection
    desc: "XSS injection via VSCode API"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/ui/window/notify::show-information-message
    any:
      - id: micro-behaviors/data/text/keywords/exploit::img-onerror-handler
      - id: micro-behaviors/data/text/keywords/exploit::img-src-javascript
      - id: micro-behaviors/data/text/keywords/exploit::xss-var-semicolon
    needs: 2

  - id: vscode-xss-string-injection
    desc: "VSCode extension XSS text marker"
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/ui/window/notify::show-information-message
    any:
      - id: micro-behaviors/data/text/keywords/exploit::xss-string-segment
      - id: micro-behaviors/data/text/keywords/exploit::xss-var-semicolon
    unless:
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/library/structure::js-large-module-bundle
