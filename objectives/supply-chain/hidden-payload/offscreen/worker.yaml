defaults:
  platforms: [unix, windows]
  for: [xpi]
  attack: T1195.002

composite_rules:
- id: extension-hidden-offscreen-network-worker
  desc: Offscreen worker carries cleartext beacon
  crit: hostile
  conf: 0.98
  scope: archive
  all:
  - id: metadata/file/format::web-extension-root-manifest
  - id: micro-behaviors/browser-extension/lifecycle::offscreen-document-creation
  - id: micro-behaviors/process/create/workers::worker-constructor-call
  - id: micro-behaviors/communications/http/request/url::fetch-timestamped-url
  - id: micro-behaviors/communications/http/url/domain::js-insecure-remote-http-url
