# Staged payload delivery patterns in npm packages
# Detects packages that prepare infrastructure for future payload delivery
defaults:
  platforms: [unix, windows]
  attack: T1195.002
traits:
  # Commented-out require/import of dist or build files
  - id: commented-require-dist
    desc: Commented-out require of dist/build file
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '//\s*(const|let|var).{0,40}require\(.{0,60}(dist|build)/'
composite_rules:
  - id: build-surface-claimed
    desc: Package claims generated build output
    crit: component
    conf: 0.82
    any:
      - id: metadata/package/fields/files::files-dist-ref
      - id: metadata/package/fields/main::main-dist-entrypoint
      - id: metadata/package/fields/types::types-dist-entrypoint
      - id: metadata/package/fields/exports::module-dist-entrypoint
      - id: commented-require-dist
  - id: declares-build-pipeline
    desc: Package declares build pipeline script
    crit: component
    conf: 0.78
    any:
      - id: metadata/package/fields/scripts::has-build-script-build
      - id: metadata/package/fields/scripts::has-build-script-compile
      - id: metadata/package/fields/scripts::has-build-script-prepare
      - id: metadata/package/fields/scripts::has-build-script-prepack
      - id: metadata/package/fields/scripts::has-build-script-prepublish
      - id: metadata/package/fields/scripts::has-build-script-prepublish-only
      - id: metadata/package/fields/scripts::has-build-script-package
      - id: metadata/package/fields/scripts::has-build-script-package-web
      - id: metadata/package/fields/scripts::has-build-script-compile-web
  - id: no-build-script
    desc: Package has no recognizable build pipeline
    crit: component
    conf: 0.8
    for: [package.json]
    all:
      - id: build-surface-claimed
    unless:
      - id: declares-build-pipeline
      - id: metadata/package/fields/freeform::npm-security-holder-package
      - id: metadata/package/testing/presence/fixture::definitelytyped-types-helper-package
  - id: phantom-dist-directory
    desc: Files field lists dist/ without declared entrypoints or build script
    crit: suspicious
    conf: 0.88
    for: [package.json]
    all:
      - id: metadata/package/fields/files::files-dist-ref
      - id: no-build-script
    unless:
      - id: metadata/package/fields/main::main-dist-entrypoint
      - id: metadata/package/fields/types::types-dist-entrypoint
      - id: metadata/package/fields/exports::module-dist-entrypoint
      - id: metadata/package/fields/exports::pkg-exports-dist-entrypoint
      - id: metadata/package/fields/freeform::openclaw-plugin-package
  - id: dist-entrypoint-install-loader
    desc: Dist package runs source install loader
    crit: suspicious
    conf: 0.93
    for: [package.json]
    all:
      - id: metadata/package/fields/main::main-dist-entrypoint
      - id: metadata/package/fields/types::types-dist-entrypoint
      - id: metadata/package/fields/files::files-dist-ref
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-runs-ts-node-local-script
  - id: staged-payload-delivery
    desc: Staged payload delivery infrastructure
    crit: hostile
    conf: 0.92
    for: [javascript]
    all:
      - id: commented-require-dist
    any:
      - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-no-dependencies
      - id: metadata/package/quality::npm-no-author
