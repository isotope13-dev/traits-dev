# Staged payload delivery patterns in npm packages
# Detects packages that prepare infrastructure for future payload delivery
defaults:
  platforms: [unix, windows]
  attack: T1195.002
traits:
  # Commented-out require/import of dist or build files
  - id: commented-require-dist
    desc: Commented-out require of dist/build file
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '//\s*(const|let|var).{0,40}require\(.{0,60}(dist|build)/'
  - id: indexed-base64-shard-lines
    desc: Indexed base64 shard marker lines
    crit: component
    conf: 0.92
    for: [javascript, data]
    if:
      type: text
      regex: '(?m)^z9:\d{1,6}:[A-Za-z0-9+/=]{16,}$'
  - id: cli-install-subcommand
    desc: CLI exposes an install subcommand
    crit: component
    conf: 0.75
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bcommand\s*={2,3}\s*["'']install["''][\s\S]{0,80}\binstall\s*\(\s*\)'
composite_rules:
  - id: build-surface-claimed
    desc: Package claims generated build output
    crit: component
    conf: 0.82
    any:
      - id: metadata/package/files/package-json::files-dist-ref
      - id: metadata/package/manifest/entrypoint::main-dist-entrypoint
      - id: metadata/package/manifest/entrypoint::types-dist-entrypoint
      - id: metadata/package/manifest/entrypoint::module-dist-entrypoint
      - id: metadata/package/manifest/entrypoint::pkg-exports-dist-direct
      - id: metadata/package/manifest/entrypoint::bin-dist-entrypoint
      - id: commented-require-dist
  - id: declares-build-pipeline
    desc: Package declares build pipeline script
    crit: component
    conf: 0.78
    any:
      - id: metadata/package/scripts::has-build-script-build
      - id: metadata/package/scripts::has-build-script-compile
      - id: metadata/package/scripts::has-build-script-prepare
      - id: metadata/package/scripts::has-build-script-prepack
      - id: metadata/package/scripts::has-build-script-prepublish
      - id: metadata/package/scripts::has-build-script-prepublish-only
      - id: metadata/package/scripts::has-build-script-package
      - id: metadata/package/scripts::has-build-script-package-web
      - id: metadata/package/scripts::has-build-script-compile-web
  - id: no-build-script
    desc: Package has no recognizable build pipeline
    crit: component
    conf: 0.8
    for: [package.json]
    all:
      - id: build-surface-claimed
    unless:
      - id: objectives/supply-chain/hidden-payload/staging/
      - id: metadata/package/manifest/freeform/
      - id: metadata/package/testing/presence/fixture/
  - id: phantom-dist-directory
    desc: Files field lists dist/ without declared entrypoints or build script
    crit: suspicious
    conf: 0.88
    for: [package.json]
    all:
      - id: metadata/package/files/package-json::files-dist-ref
      - id: no-build-script
    unless:
      - id: metadata/package/manifest/entrypoint::main-dist-entrypoint
      - id: metadata/package/manifest/entrypoint::types-dist-entrypoint
      - id: metadata/package/manifest/entrypoint::module-dist-entrypoint
      - id: metadata/package/manifest/entrypoint::pkg-exports-dist-entrypoint
      - id: metadata/package/manifest/entrypoint::pkg-exports-dist-direct
      - id: metadata/package/manifest/entrypoint::bin-dist-entrypoint
      - id: metadata/package/manifest/freeform/
  - id: dist-entrypoint-install-loader
    desc: Dist package runs source install loader
    crit: suspicious
    conf: 0.93
    for: [package.json]
    all:
      - id: metadata/package/manifest/entrypoint::main-dist-entrypoint
      - id: metadata/package/manifest/entrypoint::types-dist-entrypoint
      - id: metadata/package/files/package-json::files-dist-ref
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-runs-ts-node-local-script
  - id: staged-payload-delivery
    desc: Staged payload delivery infrastructure
    crit: hostile
    conf: 0.92
    for: [javascript]
    all:
      - id: commented-require-dist
    any:
      - id: objectives/supply-chain/impersonation/package/manifest::npm-no-dependencies
      - id: metadata/package/quality/empty::npm-no-author
  - id: node-sharded-base64-json-materializer
    desc: Node rebuilds base64 JSON shards
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    near_bytes: 4096
    all:
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
      - id: micro-behaviors/fs/file/read::read-node
      - id: micro-behaviors/data/source/syntax/array::js-array-sort-call
      - id: micro-behaviors/data/source/syntax/array::js-array-empty-join-call
      - id: micro-behaviors/data/decode/base64::node-json-parse-buffer
      - id: micro-behaviors/data/decode/base64::node-base64-tostring-token
  - id: npm-cli-sharded-json-payload-dropper
    desc: npm CLI hidden shard dropper
    crit: hostile
    conf: 0.94
    scope: archive
    for: [archives]
    all:
      - id: metadata/package/manifest/entrypoint::has-bin-field
      - id: indexed-base64-shard-lines
      - id: node-sharded-base64-json-materializer
      - id: micro-behaviors/data/decode/base64::node-base64-json-file-materializer
      - id: cli-install-subcommand
  - id: npm-gist-api-eval-loader
    desc: npm package loads and evals GitHub Gist API content
    crit: hostile
    conf: 0.96
    scope: archive
    for: [archives]
    all:
      - id: metadata/package/files/included::package-json-basename
      - id: objectives/command-and-control/channel/deaddrop/github::github-gist-api-eval-deaddrop
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::fetch-eval-remote-code
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
  # Decoy-loader: a benign-looking package whose only real action is to eagerly
  # import a separately-published "optional" dependency at module init and
  # swallow any load error, so the actual payload ships (and updates) in the
  # sibling package while the carrier stays clean to static review. The empty
  # catch (silent swallow) is the discriminator vs. legitimate optional-dep
  # loading, which logs or surfaces the failure. scope:archive pools the JS
  # behavior with the package.json manifest field across the npm tarball.
  - id: optional-dep-fire-forget-loader
    desc: Eagerly loads an optional dependency at init and swallows errors
    crit: suspicious
    conf: 0.85
    scope: archive
    for: [archives]
    all:
      - id: micro-behaviors/os/module/load::eager-import-error-swallowed
      - id: metadata/package/dependencies::has-optional-deps
    unless:
      - id: metadata/library/data::parcel-watcher-native-loader
  # Hostile tier — the full decoy profile. Beyond the loader behavior, the
  # manifest CONCEALS the runtime code-dependency: the package declares zero
  # runtime `dependencies` (only devDependencies) yet eagerly executes an
  # "optional" dependency at import. A genuine consumer of that module would
  # list it under `dependencies`; hiding it in `optionalDependencies` keeps the
  # carrier installable and clean-looking while the payload ships in the sibling
  # package. `unless` clears maintained packages that carry real provenance
  # (repository / homepage / author email), which decoy carriers omit.
  - id: optional-dep-decoy-loader
    desc: Decoy carrier hides a runtime dep as optional and runs it at import
    crit: hostile
    conf: 0.9
    scope: archive
    for: [archives]
    all:
      - id: micro-behaviors/os/module/load::eager-import-error-swallowed
      - id: metadata/package/dependencies::has-optional-deps
      - id: objectives/supply-chain/impersonation/package/manifest::npm-no-runtime-many-devdeps
    unless:
      - id: metadata/library/data::parcel-watcher-native-loader
      - id: metadata/package/manifest/repository/
      - id: metadata/package/manifest/homepage::has-homepage-field
      - id: metadata/package/manifest/author/identity::has-author-email
