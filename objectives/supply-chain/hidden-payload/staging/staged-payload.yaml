# Staged payload delivery patterns in npm packages
# Detects packages that prepare infrastructure for future payload delivery
defaults:
  platforms: [unix, windows, macos]
  attack: T1195.002
traits:
  # Commented-out require/import of dist or build files
  - id: commented-require-dist
    desc: Commented-out require of dist/build file
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '//\s*(const|let|var).{0,40}require\(.{0,60}(dist|build)/'
  # files field references dist/* but no recognizable build pipeline
  - id: files-dist-ref
    desc: Package files field references dist directory
    crit: component
    conf: 0.85
    for: [package.json]
    if:
      type: kv
      path: "files[*]"
      substr: "dist/"
  - id: main-dist-entrypoint
    desc: Package main entrypoint targets dist output
    crit: component
    conf: 0.8
    for: [package.json]
    if:
      type: kv
      path: "main"
      substr: "dist/"
  - id: types-dist-entrypoint
    desc: Package types entrypoint targets dist output
    crit: component
    conf: 0.8
    for: [package.json]
    if:
      type: kv
      path: "types"
      substr: "dist/"
  - id: module-dist-entrypoint
    desc: Package module entrypoint targets dist output
    crit: component
    conf: 0.8
    for: [package.json]
    if:
      type: kv
      path: "module"
      substr: "dist/"
  - id: no-build-script-build
    desc: Package has no build script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.build"
      exists: false
  - id: no-build-script-compile
    desc: Package has no compile script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.compile"
      exists: false
  - id: no-build-script-prepare
    desc: Package has no prepare script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.prepare"
      exists: false
  - id: no-build-script-prepack
    desc: Package has no prepack script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.prepack"
      exists: false
  - id: no-build-script-prepublish
    desc: Package has no prepublish script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.prepublish"
      exists: false
  - id: no-build-script-prepublish-only
    desc: Package has no prepublishOnly script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.prepublishOnly"
      exists: false
  - id: no-build-script-package
    desc: Package has no package script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.package"
      exists: false
  - id: no-build-script-package-web
    desc: Package has no package-web script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.package-web"
      exists: false
  - id: no-build-script-compile-web
    desc: Package has no compile-web script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.compile-web"
      exists: false
composite_rules:
  - id: no-build-script
    desc: Package has no recognizable build pipeline
    crit: component
    conf: 0.8
    for: [package.json]
    all:
      - id: no-build-script-build
      - id: no-build-script-compile
      - id: no-build-script-prepare
      - id: no-build-script-prepack
      - id: no-build-script-prepublish
      - id: no-build-script-prepublish-only
      - id: no-build-script-package
      - id: no-build-script-package-web
      - id: no-build-script-compile-web
  - id: phantom-dist-directory
    desc: Files field lists dist/ without declared entrypoints or build script
    crit: suspicious
    conf: 0.88
    for: [package.json]
    all:
      - id: files-dist-ref
      - id: no-build-script
    unless:
      - id: main-dist-entrypoint
      - id: types-dist-entrypoint
      - id: module-dist-entrypoint
  - id: staged-payload-delivery
    desc: Staged payload delivery infrastructure
    crit: hostile
    conf: 0.92
    for: [javascript]
    all:
      - id: commented-require-dist
    any:
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-no-dependencies
      - id: metadata/package/quality::npm-no-author
