# Staged payload delivery patterns in npm packages
# Detects packages that prepare infrastructure for future payload delivery
defaults:
  platforms: [unix, windows]
  attack: T1195.002
traits:
  # Commented-out require/import of dist or build files
  - id: commented-require-dist
    desc: Commented-out require of dist/build file
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '//\s*(const|let|var).{0,40}require\(.{0,60}(dist|build)/'
  # files field references dist/* but no recognizable build pipeline
  - id: files-dist-ref
    desc: Package files field references dist directory
    crit: component
    conf: 0.85
    for: [package.json]
    if:
      type: kv
      path: "files[*]"
      regex: "^(\\./)?dist(/|$)"
  - id: main-dist-entrypoint
    desc: Package main entrypoint targets dist output
    crit: component
    conf: 0.8
    for: [package.json]
    if:
      type: kv
      path: "main"
      substr: "dist/"
  - id: types-dist-entrypoint
    desc: Package types entrypoint targets dist output
    crit: component
    conf: 0.8
    for: [package.json]
    if:
      type: kv
      path: "types"
      substr: "dist/"
  - id: module-dist-entrypoint
    desc: Package module entrypoint targets dist output
    crit: component
    conf: 0.8
    for: [package.json]
    if:
      type: kv
      path: "module"
      substr: "dist/"
  - id: has-build-script-build
    desc: Package declares build script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.build"
      exists: true
  - id: has-build-script-compile
    desc: Package declares compile script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.compile"
      exists: true
  - id: has-build-script-prepare
    desc: Package declares prepare script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.prepare"
      exists: true
  - id: has-build-script-prepack
    desc: Package declares prepack script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.prepack"
      exists: true
  - id: has-build-script-prepublish
    desc: Package declares prepublish script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.prepublish"
      exists: true
  - id: has-build-script-prepublish-only
    desc: Package declares prepublishOnly script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.prepublishOnly"
      exists: true
  - id: has-build-script-package
    desc: Package declares package script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.package"
      exists: true
  - id: has-build-script-package-web
    desc: Package declares package-web script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.package-web"
      exists: true
  - id: has-build-script-compile-web
    desc: Package declares compile-web script entry
    crit: component
    conf: 0.7
    for: [package.json]
    if:
      type: kv
      path: "scripts.compile-web"
      exists: true
composite_rules:
  - id: build-surface-claimed
    desc: Package claims generated build output
    crit: component
    conf: 0.82
    any:
      - id: files-dist-ref
      - id: main-dist-entrypoint
      - id: types-dist-entrypoint
      - id: module-dist-entrypoint
      - id: commented-require-dist
  - id: declares-build-pipeline
    desc: Package declares build pipeline script
    crit: component
    conf: 0.78
    any:
      - id: has-build-script-build
      - id: has-build-script-compile
      - id: has-build-script-prepare
      - id: has-build-script-prepack
      - id: has-build-script-prepublish
      - id: has-build-script-prepublish-only
      - id: has-build-script-package
      - id: has-build-script-package-web
      - id: has-build-script-compile-web
  - id: no-build-script
    desc: Package has no recognizable build pipeline
    crit: component
    conf: 0.8
    for: [package.json]
    all:
      - id: build-surface-claimed
    unless:
      - id: declares-build-pipeline
      - id: metadata/package/fields/freeform::npm-security-holder-package
      - id: metadata/package/testing/presence/fixture::definitelytyped-types-helper-package
  - id: phantom-dist-directory
    desc: Files field lists dist/ without declared entrypoints or build script
    crit: suspicious
    conf: 0.88
    for: [package.json]
    all:
      - id: files-dist-ref
      - id: no-build-script
    unless:
      - id: main-dist-entrypoint
      - id: types-dist-entrypoint
      - id: module-dist-entrypoint
      - id: metadata/package/fields/freeform::openclaw-plugin-package
  - id: dist-entrypoint-install-loader
    desc: Dist package runs source install loader
    crit: suspicious
    conf: 0.93
    for: [package.json]
    all:
      - id: main-dist-entrypoint
      - id: types-dist-entrypoint
      - id: files-dist-ref
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-runs-ts-node-local-script
  - id: staged-payload-delivery
    desc: Staged payload delivery infrastructure
    crit: hostile
    conf: 0.92
    for: [javascript]
    all:
      - id: commented-require-dist
    any:
      - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-no-dependencies
      - id: metadata/package/quality::npm-no-author
