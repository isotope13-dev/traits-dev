# Staged payload delivery patterns in npm packages
# Detects packages that prepare infrastructure for future payload delivery
defaults:
  platforms: [unix, windows]
  attack: T1195.002
traits:
  # Commented-out require/import of dist or build files
  - id: commented-require-dist
    desc: Commented-out require of dist/build file
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '//\s*(const|let|var).{0,40}require\(.{0,60}(dist|build)/'
  - id: indexed-base64-shard-lines
    desc: Indexed base64 shard marker lines
    crit: component
    conf: 0.92
    for: [javascript, data]
    if:
      type: text
      regex: '(?m)^z9:\d{1,6}:[A-Za-z0-9+/=]{16,}$'
  - id: cli-install-subcommand
    desc: CLI exposes an install subcommand
    crit: component
    conf: 0.75
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bcommand\s*={2,3}\s*["'']install["''][\s\S]{0,80}\binstall\s*\(\s*\)'
  - id: node-array-sort-call
    desc: Node array sort call
    crit: component
    conf: 0.72
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.sort\s*\('
  - id: node-empty-join-call
    desc: Node empty join call
    crit: component
    conf: 0.72
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.join\s*\(\s*["''][^"'']{0,2}["'']\s*\)'
  - id: node-json-parse-buffer
    desc: Node JSON.parse Buffer.from
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: 'JSON\.parse\s*\(\s*Buffer\.from'
  - id: node-base64-tostring-token
    desc: Node base64 toString token
    crit: component
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']base64["''].{0,80}\.toString\s*\('
composite_rules:
  - id: build-surface-claimed
    desc: Package claims generated build output
    crit: component
    conf: 0.82
    any:
      - id: metadata/package/fields/files::files-dist-ref
      - id: metadata/package/fields/main::main-dist-entrypoint
      - id: metadata/package/fields/types::types-dist-entrypoint
      - id: metadata/package/fields/exports::module-dist-entrypoint
      - id: metadata/package/fields/exports::pkg-exports-dist-direct
      - id: metadata/package/fields/bin::bin-dist-entrypoint
      - id: commented-require-dist
  - id: declares-build-pipeline
    desc: Package declares build pipeline script
    crit: component
    conf: 0.78
    any:
      - id: metadata/package/fields/scripts::has-build-script-build
      - id: metadata/package/fields/scripts::has-build-script-compile
      - id: metadata/package/fields/scripts::has-build-script-prepare
      - id: metadata/package/fields/scripts::has-build-script-prepack
      - id: metadata/package/fields/scripts::has-build-script-prepublish
      - id: metadata/package/fields/scripts::has-build-script-prepublish-only
      - id: metadata/package/fields/scripts::has-build-script-package
      - id: metadata/package/fields/scripts::has-build-script-package-web
      - id: metadata/package/fields/scripts::has-build-script-compile-web
  - id: no-build-script
    desc: Package has no recognizable build pipeline
    crit: component
    conf: 0.8
    for: [package.json]
    all:
      - id: build-surface-claimed
    unless:
      - id: declares-build-pipeline
      - id: metadata/package/fields/freeform::npm-security-holder-package
      - id: metadata/package/testing/presence/fixture::definitelytyped-types-helper-package
  - id: phantom-dist-directory
    desc: Files field lists dist/ without declared entrypoints or build script
    crit: suspicious
    conf: 0.88
    for: [package.json]
    all:
      - id: metadata/package/fields/files::files-dist-ref
      - id: no-build-script
    unless:
      - id: metadata/package/fields/main::main-dist-entrypoint
      - id: metadata/package/fields/types::types-dist-entrypoint
      - id: metadata/package/fields/exports::module-dist-entrypoint
      - id: metadata/package/fields/exports::pkg-exports-dist-entrypoint
      - id: metadata/package/fields/exports::pkg-exports-dist-direct
      - id: metadata/package/fields/bin::bin-dist-entrypoint
      - id: metadata/package/fields/freeform::openclaw-plugin-package
  - id: dist-entrypoint-install-loader
    desc: Dist package runs source install loader
    crit: suspicious
    conf: 0.93
    for: [package.json]
    all:
      - id: metadata/package/fields/main::main-dist-entrypoint
      - id: metadata/package/fields/types::types-dist-entrypoint
      - id: metadata/package/fields/files::files-dist-ref
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-runs-ts-node-local-script
  - id: staged-payload-delivery
    desc: Staged payload delivery infrastructure
    crit: hostile
    conf: 0.92
    for: [javascript]
    all:
      - id: commented-require-dist
    any:
      - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-no-dependencies
      - id: metadata/package/quality::npm-no-author
  - id: node-sharded-base64-json-materializer
    desc: Node rebuilds base64 JSON shards
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    near_lines: 80
    all:
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
      - id: micro-behaviors/fs/file/read::read-node
      - id: node-array-sort-call
      - id: node-empty-join-call
      - id: node-json-parse-buffer
      - id: node-base64-tostring-token
  - id: node-decoded-json-file-writer
    desc: Node writes decoded JSON files
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    near_lines: 80
    all:
      - id: node-json-parse-buffer
      - id: node-base64-tostring-token
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
  - id: npm-cli-sharded-json-payload-dropper
    desc: npm CLI hidden shard dropper
    crit: hostile
    conf: 0.94
    scope: archive
    for: [archives]
    all:
      - id: metadata/package/fields/bin::has-bin-field
      - id: indexed-base64-shard-lines
      - id: node-sharded-base64-json-materializer
      - id: node-decoded-json-file-writer
      - id: cli-install-subcommand
  # Decoy-loader: a benign-looking package whose only real action is to eagerly
  # import a separately-published "optional" dependency at module init and
  # swallow any load error, so the actual payload ships (and updates) in the
  # sibling package while the carrier stays clean to static review. The empty
  # catch (silent swallow) is the discriminator vs. legitimate optional-dep
  # loading, which logs or surfaces the failure. scope:archive pools the JS
  # behavior with the package.json manifest field across the npm tarball.
  - id: optional-dep-fire-forget-loader
    desc: Package eagerly loads an optional dependency at module init and silently swallows errors
    crit: suspicious
    conf: 0.85
    scope: archive
    for: [archives]
    all:
      - id: micro-behaviors/os/module/load::eager-import-error-swallowed
      - id: metadata/package/fields/dependencies::has-optional-deps
  # Hostile tier — the full decoy profile. Beyond the loader behavior, the
  # manifest CONCEALS the runtime code-dependency: the package declares zero
  # runtime `dependencies` (only devDependencies) yet eagerly executes an
  # "optional" dependency at import. A genuine consumer of that module would
  # list it under `dependencies`; hiding it in `optionalDependencies` keeps the
  # carrier installable and clean-looking while the payload ships in the sibling
  # package. `unless` clears maintained packages that carry real provenance
  # (repository / homepage / author email), which decoy carriers omit.
  - id: optional-dep-decoy-loader
    desc: Decoy carrier conceals a runtime dependency as optional and eagerly executes it at import
    crit: hostile
    conf: 0.9
    scope: archive
    for: [archives]
    all:
      - id: micro-behaviors/os/module/load::eager-import-error-swallowed
      - id: metadata/package/fields/dependencies::has-optional-deps
      - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-no-runtime-many-devdeps
    unless:
      - id: metadata/package/fields/repository::has-repository-evidence
      - id: metadata/package/fields/homepage::has-homepage-field
      - id: metadata/package/fields/author::has-author-email
