# The same archive launcher is also a hidden-payload signal when viewed as a
# staged child process rather than as an npm lifecycle event.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1105,T1059.007

composite_rules:
  - id: detached-extracted-javascript-payload
    desc: JavaScript extracts an archive and silently detaches its payload
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/supply-chain/install-hook/dropper/setup-hook::js-cleartext-remote-archive-url
      - id: objectives/supply-chain/install-hook/dropper/setup-hook::js-archive-extraction-command
      - id: objectives/supply-chain/install-hook/dropper/setup-hook::js-detached-silent-payload-spawn
