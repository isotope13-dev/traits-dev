defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1195.002

composite_rules:
  - id: encrypted-pack-hidden-script-stage
    desc: MSI hides encrypted stage behind script launchers
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.003,T1059.005,T1059.007,T1195.002
    all:
      - id: metadata/file/profile/identity::spk2-pack-header
      - id: metadata/file/profile/identity::native-node-loader-filename
      - id: metadata/file/profile/identity::wsh-launcher-marker
      - id: metadata/file/profile/identity::command-script-node-layout

  - id: opaque-wix-msi-hidden-payload-stage
    desc: Oversized WiX MSI stages a near-max-entropy opaque payload
    crit: hostile
    conf: 0.97
    for: [all]
    attack: T1027,T1195.002
    size_min: 10000000
    all:
      - id: metadata/package/files/msi::msi-wix-toolset-branding
      - id: metadata/package/files/msi::msi-opaque-stream-cluster
      - id: metadata/package/files/msi::ole2-installer-kind
      - id: metadata/package/files/msi::ole-security-flag

  - id: node-runtime-ole2-staging-lure
    desc: OLE2 Node Runtime MSI stages oversized installer lure
    crit: hostile
    conf: 0.98
    for: [all]
    attack: T1195.002,T1036.005
    all:
      - id: metadata/package/files/msi::node-runtime-subject
      - id: metadata/package/files/msi::nodejs-foundation-creator
      - id: metadata/package/files/msi::ole2-installer-kind
      - id: metadata/package/files/msi::oversized-node-runtime-msi

  - id: obfuscated-node-pack-loader
    desc: Obfuscated Node code loads an encoded stage
    crit: hostile
    conf: 0.98
    for: [javascript]
    attack: T1027,T1059.007,T1620
    all:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::decoder-loop-keyword-triad
      - id: objectives/anti-static/obfuscation/payload/encoded::js-base64-blob
      - id: micro-behaviors/data/source/dynamic/load::node-computed-require-call
