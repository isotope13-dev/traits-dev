defaults:
  platforms: [qnx, unix]
  for: [objc]
  attack: T1027.009

traits:
  - id: qnx-objc-hidden-payload-b64
    desc: QNX ObjC hidden payload b64
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: HIDDEN_PAYLOAD_B64

  - id: qnx-objc-svc-update-path
    desc: QNX ObjC svc update path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.svc_update_

  - id: qnx-objc-cron-daemon-path
    desc: QNX ObjC cron daemon path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.cron_daemon_

composite_rules:
  - id: qnx-objc-hidden-payload-trigger
    desc: QNX ObjC hidden payload trigger
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-objc-hidden-payload-b64
      - id: qnx-objc-svc-update-path
      - id: qnx-objc-cron-daemon-path
