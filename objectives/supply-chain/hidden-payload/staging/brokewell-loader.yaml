# Brokewell Android Loader (banking trojan staging project)
#
# Public source for an Android loader used by the Brokewell banking
# trojan family. Wraps an attacker's RAT/implant APK in a fresh
# container that uses PackageInstaller to install it silently and
# launch it. Project README explicitly advertises bypassing Android
# 13/14/15 Accessibility permission restrictions, and ships an
# already-built keystore (`brkwlkey`) and a self-signed
# CN=RUSSIA,O=MOSCOW,C=RU certificate template.
defaults:
  attack: "T1631"
  size_min: 32
  platforms: [unix, windows, android, ios]

traits:
  - id: brokewell-readme-title
    desc: Brokewell loader README title
    for: [markdown]
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "Brokewell Android Loader"

  - id: brokewell-bypass-tagline
    desc: Brokewell loader bypass tagline
    for: [markdown]
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: "bypass android 1[345].{0,40}Accessibility"

  - id: brokewell-package-namespace
    desc: Brokewell apkstore package namespace
    for: [java, kotlin, xml, groovy]
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "com.brkwl.apkstore"

  - id: brokewell-apkstore-dropper-tag
    desc: Brokewell APKSTORE_DROPPER log tag
    for: [java, kotlin]
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: "APKSTORE_DROPPER"

  - id: brokewell-implant-pkgname-var
    desc: Brokewell IMPLANT_PKGNAME variable
    for: [java, kotlin]
    crit: suspicious
    conf: 0.96
    if:
      type: text
      word: "IMPLANT_PKGNAME"

  - id: brokewell-done-install-implant-action
    desc: Brokewell DONE_INSTALL_IMPLANT broadcast action
    for: [java, kotlin]
    crit: suspicious
    conf: 0.98
    if:
      type: text
      word: "DONE_INSTALL_IMPLANT"

  - id: brokewell-loc-sessinstall-method
    desc: Brokewell loc_sessINSTALL method name
    for: [java, kotlin]
    crit: suspicious
    conf: 0.98
    if:
      type: text
      word: "loc_sessINSTALL"

  - id: brokewell-implant-apk-first-name
    desc: Brokewell install-session payload name
    for: [java, kotlin]
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "implant-apk-first"

  - id: brokewell-keystore-alias
    desc: Brokewell brkwlkey keystore alias
    for: [groovy, markdown]
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "brkwlkey"

  - id: brokewell-keystore-password
    desc: Brokewell hardcoded VerSecPass keystore password
    for: [groovy, markdown]
    crit: suspicious
    conf: 0.97
    if:
      type: text
      word: "VerSecPass"

  - id: brokewell-keytool-russia-template
    desc: Brokewell CN=RUSSIA keytool dname template
    for: [markdown, groovy]
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "CN=RUSSIA,O=MOSCOW,C=RU"

  - id: brokewell-install-result-action
    desc: Brokewell INSTALL_RESULT manifest action
    for: [xml]
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "com.brkwl.apkstore.INSTALL_RESULT"

  - id: brokewell-implant-raw-placeholder
    desc: 'brokewell implant raw placeholder'
    for: [text]
    crit: suspicious
    conf: 0.98
    if:
      type: path
      basename: true
      exact: "put_your_implant_file_in_this_directory.txt"

  - id: brokewell-random-pkgname-generator
    desc: Brokewell random applicationId generator in Gradle
    for: [groovy]
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "defaultConfig\\.applicationId\\s*=\\s*randomPackageName"

composite_rules:
  - id: brokewell-loader-project-markers
    desc: Brokewell loader project source markers
    crit: hostile
    conf: 0.99
    needs: 3
    any:
      - id: brokewell-readme-title
      - id: brokewell-bypass-tagline
      - id: brokewell-package-namespace
      - id: brokewell-apkstore-dropper-tag
      - id: brokewell-implant-pkgname-var
      - id: brokewell-done-install-implant-action
      - id: brokewell-loc-sessinstall-method
      - id: brokewell-implant-apk-first-name
      - id: brokewell-keystore-alias
      - id: brokewell-keytool-russia-template
      - id: brokewell-install-result-action
      - id: brokewell-implant-raw-placeholder

  - id: brokewell-loader-build-config
    desc: Brokewell loader build config (keystore + Russia cert)
    crit: hostile
    conf: 0.99
    all:
      - id: brokewell-keystore-password
      - id: brokewell-keystore-alias
    any:
      - id: brokewell-keytool-russia-template
      - id: brokewell-package-namespace
      - id: brokewell-random-pkgname-generator
