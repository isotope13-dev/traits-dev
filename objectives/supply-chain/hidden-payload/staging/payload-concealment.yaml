defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
  attack: T1195.002
traits:
  - id: hex-string-array
    desc: Array of hex strings (potential shellcode)
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: \[\s*["']0x[0-9a-f]{2}["'](\s*,\s*["']0x[0-9a-f]{2}["']){10,}\s*\]
  - id: join-hex-array
    desc: Joining hex array into string
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: \.join\(["'']["'']\).{0,50}0x[0-9a-f]{2}
  - id: char-code-at-loop
    desc: Iterating with charCodeAt (decoding loop)
    crit: suspicious
    conf: 0.85
    size_max: 524288
    if:
      type: string_literal
      regex: \.charCodeAt\(.{0,50}\).{0,100}\^
    unless:
      - id: metadata/library/structure/
    downgrade:
      any:
        - id: metadata/build/bundler::babel-transpiled
        - id: metadata/package/quality/source/
        - id: objectives/anti-static/obfuscation/code-metrics/structure/
  - id: hidden-script-ref
    desc: References hidden .js file
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: '["'']\./\.[a-z0-9_-]+\.js["'']'
  - id: fs-read-hidden
    desc: Reads hidden file from disk
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: (readFile|readFileSync)\s*\(.{0,120}['"]\./\..{1,50}['"]
  - id: eval-hex-decode
    desc: eval() of hex-decoded buffer
    crit: suspicious
    conf: 0.98
    if:
      type: string_literal
      regex: eval\(Buffer\.from\(.{1,120},['']hex['']\)\.toString\(\)\)
  - id: process-env-username
    desc: Accesses process.env.USERNAME
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.USERNAME
  - id: path-join-hidden
    desc: path.join with hidden file path
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: path\.join\(.{1,50},['"]\..{1,36}['"]\)
    unless:
      - type: string_literal
        substr: .browserslistrc
  - id: base64-str
    desc: Base64 decoder capability marker
    crit: component
    conf: 0.75
    if:
      id: micro-behaviors/data/decode/base64::base64-tool
  - id: b64-to-buffer
    desc: base64 string to Buffer
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: Buffer\.from\(.{1,220},['']base64['']\)
  - id: buffer-slice-magic
    desc: Buffer.slice with magic offsets
    crit: baseline
    conf: 0.75
    size_max: 100000
    if:
      type: text
      regex: '\b(Buffer|payload|bytes?|Uint8Array)\b.{0,80}\.slice\(\d{1,4},\s*\d{1,4}\)'
    unless:
      - type: text
        regex: \.slice\(0,\s*\d\) # common string truncation like slice(0, 1) or slice(0, 5)
      - type: text
        regex: '\bpk\.slice\(0,\s*16\)'
  - id: malicious-electron-inject
    desc: Trojanized Electron app.asar injection
    crit: suspicious
    conf: 0.98
    attack: T1554
    mbc: B0024
    if:
      type: text
      substr: require("electron").app.on("ready"
  - id: install-hook-discord-exfil
    desc: Install hook Discord webhook exfil
    crit: suspicious
    conf: 0.98
    for:
      - package.json
    if:
      type: value
      path: scripts.preinstall
      regex: (curl|wget).{0,100}discord\.com/api/webhooks
composite_rules:
  - id: obfuscated-eval
    desc: Obfuscated eval via buffer decode
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: micro-behaviors/data/encode/tostring::tostring-call
    any:
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-dup
    unless:
      - id: metadata/library/structure/
      - id: metadata/library/github-actions/
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: hidden-payload-eval
    desc: eval() of payload from hidden file
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/import/builtin::require-fs
      - id: fs-read-hidden
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
  - id: hex-payload-injection
    desc: Hex-encoded payload injection
    crit: suspicious
    conf: 0.9
    all:
      - id: hex-string-array
      - id: join-hex-array
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
  - id: decoding-loop-eval
    desc: eval() following decoding loop
    crit: hostile
    conf: 0.95
    all:
      - id: char-code-at-loop
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
  - id: suspicious-eval-transform
    desc: eval() following data transformation
    crit: notable
    conf: 0.9
    all:
      - id: metadata/file/metrics::javascript-small-file-5k
      - id: micro-behaviors/data/encode/xor::js-indexed-buffer-xor-loop
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
  - id: encoded-eval-chain
    desc: Encoded data decoded then executed
    crit: hostile
    conf: 0.95
    any:
      - id: eval-hex-decode
      - id: obfuscated-eval
  - id: electron-trojan-injection
    desc: Electron application trojan injection
    crit: hostile
    conf: 0.95
    all:
      - id: malicious-electron-inject
      - id: micro-behaviors/communications/http/post::post
  - id: sliced-payload-eval
    desc: Execution of sliced data buffer
    crit: suspicious
    conf: 0.9
    all:
      - id: buffer-slice-magic
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
