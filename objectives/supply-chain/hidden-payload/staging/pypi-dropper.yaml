# Supply-Chain Hidden Payload - PyPI Dropper with Obfuscation
# Detects PyPI packages that hide dropper code behind legitimate-looking
# facade code using whitespace obfuscation or similar techniques.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1195.002
  mbc: E1027
composite_rules:
  # PyPI package with hidden exec dropper behind excessive whitespace
  # The dropper is concealed on an extremely long line (>500 chars)
  # to avoid detection during casual code review.
  - id: pypi-whitespace-hidden-dropper
    desc: PyPI dropper hidden behind excessive whitespace
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/command-and-control/dropper/execution/eval::exec-urlopen-read
      - id: objectives/anti-static/obfuscation/code-metrics/structure::py-excessive-whitespace-line
  # PyPI package with exec dropper and near-zero documentation
  # Combines the dropper with code quality signals typical of
  # supply-chain attacks.
  - id: pypi-dropper-with-facade
    desc: PyPI package with dropper and facade code
    crit: hostile
    conf: 0.93
    all:
      - id: objectives/command-and-control/dropper/execution/eval::exec-urlopen-read
      - id: metadata/file/profile/identity::init-py-file
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::py-excessive-whitespace-line
      - id: metadata/file/metrics::small-source-low-comment-ratio
      - id: metadata/package/manifest/author/domain::pkginfo-privacy-email-1
  # Import-time package code that downloads a response, arms it as executable,
  # and launches it is a payload loader even when the wheel has no setup hook.
  - id: pypi-init-download-chmod-exec
    desc: Package init downloads and executes a payload
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1105,T1059.006,T1222.002
    mbc: B0024
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/fs/write/file/direct::python-write-response-read
      - id: micro-behaviors/fs/chmod/executable/mode::python-owner-executable-bit
      - id: micro-behaviors/process/create/subprocess::process-execution
