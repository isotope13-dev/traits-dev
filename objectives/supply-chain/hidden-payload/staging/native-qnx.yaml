defaults:
  platforms: [qnx, unix]
  for: [c, cpp, elf]
  attack: T1027.009

traits:
  - id: qnx-native-payload-fragments
    desc: QNX native payload fragments
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'payload_fragment_a[\s\S]{0,260}payload_fragment_d'

  - id: qnx-native-hidden-service-path
    desc: QNX native hidden service path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/init.d/.hidden_service

  - id: qnx-native-cache-update-bin
    desc: QNX native cache update bin
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.cache_update.bin

composite_rules:
  - id: qnx-native-fragmented-hidden-payload
    desc: QNX native fragmented payload
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-payload-fragments
      - id: qnx-native-hidden-service-path

  - id: qnx-native-cache-hidden-payload
    desc: QNX native cache hidden payload
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-cache-update-bin
      - id: qnx-native-hidden-service-path
