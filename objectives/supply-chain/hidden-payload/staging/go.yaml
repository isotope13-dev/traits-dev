# Go Hidden Payload Detection
# ATT&CK: T1195.002 (Supply Chain Compromise: Compromise Software Supply Chain)
# MBC: B0024 (Execution Guardrails)
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1195.002

traits:
- id: header-stripping
  desc: Stripping fixed-size header from buffer
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(?i)\b(payload|shellcode|stage)\b.{0,80}\[[2-9]:\]'
  unless:
  - type: text
    substr: 'Code generated by go-bindata.'
  - id: metadata/package/testing/harness/unit/

- id: exec-python-inline
  desc: Go exec.Command with inline Python (-c)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'exec\.Command\(\s*"(python(\d(\.\d+)?)?|py)"\s*,\s*"-c"'
  unless:
  - id: metadata/package/testing/harness/unit/

- id: exec-decoded-string
  desc: 'exec.Command with string-converted byte slice'
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'exec\.Command\(\s*string\s*\('
  unless:
  - id: metadata/package/testing/harness/unit/

- id: exec-command-temp-arg--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'exec\.Command\(\s*(filepath\.Join\(.{0,180}(os\.TempDir\(\)|["`]/tmp)|os\.TempDir\(\))'
  count_max: 1029848
- id: exec-command-temp-arg--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'exec\.Command\(\s*(["`]/tmp/)'
  count_max: 1029849
- id: nvm-windows-updater-context
  desc: NVM for Windows updater source
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'NVM for Windows|nvm4w|coreybutler/nvm-windows'

composite_rules:
- id: header-stripping-write
  desc: Stripping fixed-size header and writing back to file
  crit: suspicious
  conf: 0.95
  all:
  - id: header-stripping
  - id: micro-behaviors/fs/file/write/direct::os-write-file
  unless:
  - id: metadata/package/testing/harness/unit/
  downgrade:
    any:
    - id: nvm-windows-updater-context

- id: exec-temp-file
  desc: Executes a file from temporary directory
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/process/create/direct::exec-command
  - id: exec-command-temp-arg
  unless:
  - id: metadata/package/testing/harness/unit/

- id: base64-decode-to-exec
  desc: Decodes base64 then executes (dropper pattern)
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/data/decode/base64::base64-decoding
  - id: micro-behaviors/process/create/direct::exec-command
    # already exists as base64-exec-command-proximity in some places, but we add more context here

- id: go-dropper-flow
  desc: Go downloader/dropper flow (download + extract + execute)
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/communications/http/lib/netlib::go-http-newrequest
  - id: micro-behaviors/data/archive/zip::zip-reader
  - id: micro-behaviors/process/create/direct::exec-command
  any:
  - id: header-stripping
  - id: micro-behaviors/fs/chmod/modify::go-os-chmod
  unless:
  - id: nvm-windows-updater-context

- id: go-exec-decoded-payload
  desc: Go executes decoded/transformed payload
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/data/decode/base64::base64-decoding
  any:
  - id: exec-python-inline
  - id: exec-decoded-string
- id: exec-command-temp-arg
  desc: exec.Command temporary path argument
  crit: component
  conf: 0.8
  any:
  - id: exec-command-temp-arg--rx-1
  - id: exec-command-temp-arg--rx-2
  unless:
  - id: metadata/package/testing/harness/unit/
