defaults:
  platforms: [openbsd, bsd, unix]
  for: [go, elf]
  attack: T1027

traits:
  - id: go-encoded-stager-const
    desc: Go encoded stager constant
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: encodedStager

  - id: go-runtime-build-stager
    desc: Go runtime build command
    crit: component
    conf: 0.92
    if:
      type: text
      substr: exec.Command("go", "build"

  - id: go-temp-stager-source
    desc: Go temp stager source
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: stager.go

composite_rules:
  - id: go-runtime-compiled-hidden-stager
    desc: Go runtime compiled hidden stager
    crit: hostile
    conf: 0.98
    all:
      - id: go-encoded-stager-const
      - id: go-runtime-build-stager
      - id: go-temp-stager-source
