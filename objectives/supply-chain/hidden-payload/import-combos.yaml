defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  attack: T1195.002
traits:
  - id: module-level-setup-call
    desc: Module-level setup launcher call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*setup\(\)\s*$'
  - id: module-level-fetchaudio-call
    desc: Module-level FetchAudio launcher call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?m)^\s*FetchAudio\(\)\s*$'
  - id: chrome-windows-path
    desc: Chrome Windows data path
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: Local/Google/Chrome
  - id: edge-windows-path
    desc: Edge Windows data path
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: Local/Microsoft/Edge
  - id: firefox-unix-path
    desc: Firefox Unix data path
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: .mozilla/firefox
  - id: page-execute-word
    desc: PAGE_EXECUTE memory protection word
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      word: PAGE_EXECUTE
    unless:
      - id: metadata/lang/source::windows-generated-def-table
  - id: clipboard-string
    desc: Clipboard reference
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: clipboard
  - id: inline-base64-exec
    desc: Inline Python base64 exec string
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'import base64;\s*exec\(base64\.b64decode\('
  - id: startup-folder-base64
    desc: Base64-encoded Windows Startup path
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: TWljcm9zb2Z0XFdpbmRvd3NcU3RhcnQgTWVudVxQcm9ncmFtc1xTdGFydHVw
  - id: create-no-window-flag
    desc: Windows hidden process creation flag
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: creationflags=0x08000000
composite_rules:
  - id: dual-launcher-entrypoints
    desc: Dual import-time payload launcher entrypoints
    crit: suspicious
    conf: 0.96
    all:
      - id: module-level-setup-call
      - id: module-level-fetchaudio-call
  - id: prot-exec-string
    desc: PROT_EXEC/PAGE_EXECUTE memory protection
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/mem/alloc/executable::prot-exec-const
      - id: page-execute-word
  - id: network-client-imports
    desc: Network client import pattern
    crit: notable
    conf: 0.6
    any:
      - id: metadata/import/python/requests
      - id: metadata/import/python/urllib/
      - id: metadata/import/python/http/
      - id: metadata/import/python/socket
  - id: crypto-network-imports
    desc: Cryptography with network capability
    crit: notable
    conf: 0.75
    all:
      - id: network-client-imports
    any:
      - id: metadata/import/python/cryptography/
      - id: metadata/import/python/hashlib
      - id: metadata/import/python/hmac
  - id: ctypes-mmap-combo
    desc: ctypes with memory mapping
    crit: notable
    conf: 0.8
    all:
      - id: metadata/import/python/ctypes
      - id: metadata/import/python/mmap
  - id: setup-py-socket-imports
    desc: setup.py imports socket module
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/build/pip::setup-py
      - id: metadata/import/python/socket
  - id: setup-py-ctypes-imports
    desc: setup.py imports ctypes module
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/build/pip::setup-py
      - id: metadata/import/python/ctypes
  - id: setup-py-input-capture
    desc: setup.py imports input capture modules
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/build/pip::setup-py
    any:
      - id: metadata/import/python/pynput
      - id: metadata/import/python/keyboard
      - id: metadata/import/python/pyautogui
  - id: browser-paths
    desc: Browser data directory paths
    crit: notable
    conf: 0.8
    any:
      - id: chrome-windows-path
      - id: edge-windows-path
      - id: firefox-unix-path
      - id: objectives/supply-chain/install-hook/scripts::chrome-macos-support
  - id: setup-py-browser-paths
    desc: setup.py references browser data paths
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/build/pip::setup-py
      - id: browser-paths
  - id: shellcode-loader-imports
    desc: Potential shellcode loader import pattern
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/import/python/ctypes
      - id: metadata/import/python/mmap
    any:
      - id: metadata/import/python/struct
      - id: prot-exec-string
  - id: setup-py-dropper-imports
    desc: setup.py with dropper import chain
    crit: hostile
    conf: 0.95
    mbc: B0024
    all:
      - id: metadata/build/pip::setup-py
      - id: metadata/import/python/socket
      - id: metadata/import/python/base64
    any:
      - id: metadata/import/python/os/system
      - id: metadata/import/python/subprocess/
      - id: objectives/execution/interpreter/eval/
  - id: setup-py-clipper-imports
    desc: setup.py with crypto clipper imports
    crit: hostile
    conf: 0.95
    mbc: E1510
    attack: T1115
    all:
      - id: metadata/build/pip::setup-py
      - id: network-client-imports
    any:
      - id: metadata/import/python/pyperclip
      - id: clipboard-string
  - id: inline-audio-payload-exec
    desc: Inline Python launches base64 audio payload
    crit: hostile
    conf: 0.98
    mbc: B0024
    all:
      - id: inline-base64-exec
      - id: micro-behaviors/process/create/subprocess::sys-executable-popen
      - id: objectives/anti-static/obfuscation/steganography::audio-stego-data-extraction
  - id: startup-audio-dropper
    desc: WAV payload dropped into Startup folder
    crit: hostile
    conf: 0.98
    mbc: B0024
    all:
      - id: startup-folder-base64
      - id: create-no-window-flag
      - id: micro-behaviors/fs/file/attributes::attrib-hidden
      - id: micro-behaviors/process/create/subprocess::popen-content
      - id: objectives/anti-static/obfuscation/steganography::audio-stego-data-extraction
  - id: import-time-dual-platform-dropper
    desc: Import-time dual-platform hidden payload dropper
    crit: hostile
    conf: 0.99
    mbc: B0024
    all:
      - id: dual-launcher-entrypoints
      - id: startup-audio-dropper
      - id: inline-audio-payload-exec
