# NPM Supply Chain - Persistence via package.json main field
# ATT&CK: T1547.001 (Boot or Logon Autostart Execution: Registry Run Keys / Startup Folder)
defaults:
  mbc: E1082
  platforms: [unix, windows]
  attack: T1547.001
  for: [javascript, typescript]
composite_rules:
  - id: write-cmd-to-startup
    desc: Writes .cmd batch file to Windows Startup folder
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/persistence/login/startup/folder::win-startup-path
      - id: micro-behaviors/fs/write/file/direct::write-file-async
      - id: micro-behaviors/fs/path/extension::cmd-dup
  - id: package-json-startup-persistence
    desc: Parses package.json to write main payload to Windows Startup folder
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/data/parse/json::parsed-json-main-property
      - id: write-cmd-to-startup
