# NPM Supply Chain - Persistence via package.json main field
# ATT&CK: T1547.001 (Boot or Logon Autostart Execution: Registry Run Keys / Startup Folder)
defaults:
  mbc: E1082
  platforms: [unix, windows]
  attack: T1547.001
  for: [javascript, typescript]
traits:
  - id: extract-package-json-main
    desc: Accesses .main property of parsed JSON
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: JSON\.parse\(.{0,100}\)\.main\b
composite_rules:
  - id: postinstall-persistent-native-dropper
    desc: NPM postinstall installs persistent native payload
    crit: hostile
    conf: 0.98
    attack: T1195.002,T1547
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
      - id: objectives/command-and-control/dropper/node-bootstrap::download-file
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
    any:
      - id: objectives/persistence/login/registry/autostart::run-key
      - id: objectives/persistence/system/init/boot::linux-xdg-executable
      - id: objectives/persistence/system/launchd/core::launchd-js-runatload-installer
  - id: write-cmd-to-startup
    desc: Writes .cmd batch file to Windows Startup folder
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/persistence/login/startup/folder::win-startup-path
      - id: micro-behaviors/fs/write/file/direct::write-file-async
      - id: micro-behaviors/fs/path/extension::cmd-dup
  - id: package-json-startup-persistence
    desc: Parses package.json to write main payload to Windows Startup folder
    crit: hostile
    conf: 0.99
    all:
      - id: extract-package-json-main
      - id: write-cmd-to-startup
