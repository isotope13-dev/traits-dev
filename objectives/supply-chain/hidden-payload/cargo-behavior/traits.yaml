defaults:
  platforms: [unix, windows]
  for: [cargo.toml]
traits:
- id: cargo-dep-sysinfo
  desc: Cargo depends on sysinfo
  crit: component
  conf: 0.82
  if:
    type: value
    path: dependencies.sysinfo
    regex: '.+'
- id: cargo-dep-axum
  desc: Cargo depends on Axum web framework
  crit: component
  conf: 0.8
  if:
    type: value
    path: dependencies.axum
    regex: '.+'
- id: cargo-dep-jsonwebtoken
  desc: Cargo depends on JWT handling
  crit: notable
  conf: 0.82
  if:
    type: value
    path: dependencies.jsonwebtoken
    regex: '.+'
- id: cargo-dep-sqlx
  desc: Cargo depends on SQLx
  crit: component
  conf: 0.8
  if:
    type: value
    path: dependencies.sqlx
    regex: '.+'
- id: cargo-dep-x25519
  desc: Cargo depends on X25519 key exchange
  crit: notable
  conf: 0.84
  if:
    type: value
    path: dependencies.x25519-dalek
    regex: '.+'
- id: cargo-dep-ed25519
  desc: Cargo depends on Ed25519 signatures
  crit: notable
  conf: 0.82
  if:
    type: value
    path: dependencies.ed25519-dalek
    regex: '.+'
- id: cargo-dep-single-instance
  desc: Cargo depends on single instance guard
  crit: notable
  conf: 0.82
  if:
    type: value
    path: dependencies.single-instance
    regex: '.+'
- id: cargo-dep-ssh2
  desc: Cargo depends on SSH2
  crit: notable
  conf: 0.84
  if:
    type: value
    path: dependencies.ssh2
    regex: '.+'
- id: cargo-dep-rspe
  desc: Cargo depends on PE manipulation crate
  crit: suspicious
  conf: 0.86
  if:
    type: value
    path: dependencies.rspe
    regex: '.+'
- id: cargo-dep-windows-service
  desc: Cargo depends on windows-service
  crit: notable
  conf: 0.84
  if:
    type: value
    path: dependencies.windows-service
    regex: '.+'
- id: cargo-dep-obfstr
  desc: Cargo depends on obfstr
  crit: notable
  conf: 0.84
  if:
    type: value
    path: dependencies.obfstr
    regex: '.+'
- id: cargo-dep-self-replace
  desc: Cargo depends on self-replace
  crit: notable
  conf: 0.86
  if:
    type: value
    path: dependencies.self-replace
    regex: '.+'
- id: cargo-dep-portable-pty
  desc: Cargo depends on portable PTY
  crit: notable
  conf: 0.86
  if:
    type: value
    path: dependencies.portable-pty
    regex: '.+'
- id: cargo-dep-arti-client
  desc: Cargo depends on arti-client
  crit: notable
  conf: 0.86
  if:
    type: value
    path: dependencies.arti-client
    regex: '.+'
- id: cargo-dep-tor-hsservice
  desc: Cargo depends on Tor hidden-service service
  crit: notable
  conf: 0.86
  if:
    type: value
    path: dependencies.tor-hsservice
    regex: '.+'
- id: cargo-dep-tor-hscrypto
  desc: Cargo depends on Tor hidden-service crypto
  crit: notable
  conf: 0.86
  if:
    type: value
    path: dependencies.tor-hscrypto
    regex: '.+'
- id: cargo-dep-tor-hsrproxy
  desc: Cargo depends on Tor HS reverse proxy
  crit: notable
  conf: 0.86
  if:
    type: value
    path: dependencies.tor-hsrproxy
    regex: '.+'
- id: cargo-dep-tor-proto
  desc: Cargo depends on Tor protocol crate
  crit: notable
  conf: 0.86
  if:
    type: value
    path: dependencies.tor-proto
    regex: '.+'
- id: cargo-dep-uefi
  desc: Cargo depends on UEFI runtime crate
  crit: notable
  conf: 0.82
  if:
    type: value
    path: dependencies.uefi
    regex: '.+'
- id: cargo-windows-com-feature
  desc: Cargo requests Windows COM APIs
  crit: notable
  conf: 0.82
  if:
    type: text
    word: Win32_System_Com
- id: cargo-windows-bits-feature
  desc: Cargo requests BITS COM APIs
  crit: suspicious
  conf: 0.86
  if:
    type: text
    word: Win32_Networking_BackgroundIntelligentTransferService
- id: cargo-windows-winhttp-feature
  desc: Cargo requests WinHTTP COM APIs
  crit: notable
  conf: 0.84
  if:
    type: text
    word: Win32_Networking_WinHttp
- id: cargo-windows-activex-feature
  desc: Cargo requests ActiveX scripting APIs
  crit: suspicious
  conf: 0.86
  if:
    type: text
    word: Win32_System_Diagnostics_Debug_ActiveScript
- id: cargo-package-agent-name
  desc: Cargo package named agent
  crit: component
  conf: 0.78
  if:
    type: value
    path: package.name
    exact: agent
- id: cargo-package-stager-name
  desc: Cargo package named stager
  crit: component
  conf: 0.78
  if:
    type: value
    path: package.name
    exact: stager
- id: cargo-package-dropper-name
  desc: Cargo package named dropper
  crit: component
  conf: 0.78
  if:
    type: value
    path: package.name
    exact: dropper
- id: cargo-package-c2-name
  desc: Cargo package named c2
  crit: component
  conf: 0.78
  if:
    type: value
    path: package.name
    exact: c2
- id: cargo-package-backtor-name
  desc: Cargo package named backtor
  crit: component
  conf: 0.78
  if:
    type: value
    path: package.name
    exact: backtor
- id: cargo-package-proc-exfil-name
  desc: Cargo package named proc_exfil
  crit: component
  conf: 0.78
  if:
    type: value
    path: package.name
    exact: proc_exfil
- id: cargo-package-service-modifier-name
  desc: Cargo package names service modifier role
  crit: component
  conf: 0.78
  if:
    type: value
    path: package.name
    regex: 'service[-_]?modifier'
    case_insensitive: true
- id: cargo-package-firmware-anomaly-name
  desc: Cargo package names firmware anomaly role
  crit: component
  conf: 0.78
  if:
    type: value
    path: package.name
    regex: 'firmware[-_]?anomaly'
    case_insensitive: true
- id: cargo-package-server-name
  desc: Cargo package named server
  crit: component
  conf: 0.76
  if:
    type: value
    path: package.name
    exact: server
- id: cargo-package-client-name
  desc: Cargo package named client
  crit: component
  conf: 0.76
  if:
    type: value
    path: package.name
    exact: client
- id: cargo-package-packer-name
  desc: Cargo package named packer
  crit: notable
  conf: 0.82
  if:
    type: value
    path: package.name
    exact: packer
- id: cargo-package-payload-staging-name
  desc: Cargo package names payload staging
  crit: notable
  conf: 0.82
  if:
    type: value
    path: package.name
    regex: 'payload[-_]?staging'
    case_insensitive: true
- id: cargo-package-loader-name
  desc: Cargo package named loader
  crit: notable
  conf: 0.82
  if:
    type: value
    path: package.name
    exact: loader
- id: cargo-package-executor-name
  desc: Cargo package named executor
  crit: notable
  conf: 0.82
  if:
    type: value
    path: package.name
    exact: executor
- id: cargo-package-enumeration-process-name
  desc: Cargo package named enumeration_process
  crit: notable
  conf: 0.82
  if:
    type: value
    path: package.name
    exact: enumeration_process
- id: cargo-package-process-enumeration-name
  desc: Cargo package names process enumeration
  crit: notable
  conf: 0.82
  if:
    type: value
    path: package.name
    regex: 'process[-_]?enumeration'
    case_insensitive: true
- id: cargo-package-uefi-name
  desc: Cargo package names UEFI
  crit: notable
  conf: 0.82
  if:
    type: value
    path: package.name
    regex: 'uefi'
    case_insensitive: true
- id: cargo-package-firmware-name
  desc: Cargo package names firmware
  crit: notable
  conf: 0.82
  if:
    type: value
    path: package.name
    regex: 'firmware'
    case_insensitive: true
  # cargo-lib-proc-macro and cargo-lib-cdylib relocated to
  # metadata/package/manifest::{cargo-lib-proc-macro,cargo-lib-cdylib}.
  # They are neutral manifest facts (cdylib = any PyO3/FFI/WASM lib), not
  # anomalies; the rootkit/loader composites below reference them cross-file.
- id: cargo-windows-registry-feature
  desc: Cargo requests Windows registry APIs
  crit: notable
  conf: 0.82
  if:
    type: text
    word: Win32_System_Registry
composite_rules:
- id: cargo-dep-tor-hidden-service
  desc: Cargo depends on Tor hidden-service crates
  crit: notable
  conf: 0.86
  any:
  - id: cargo-dep-arti-client
  - id: cargo-dep-tor-hsservice
  - id: cargo-dep-tor-hscrypto
  - id: cargo-dep-tor-hsrproxy
  - id: cargo-dep-tor-proto
- id: cargo-package-agent-role
  desc: Cargo package has agent role name
  crit: component
  conf: 0.78
  any:
  - id: cargo-package-agent-name
  - id: cargo-package-stager-name
  - id: cargo-package-dropper-name
  - id: cargo-package-c2-name
  - id: cargo-package-backtor-name
  - id: cargo-package-proc-exfil-name
  - id: cargo-package-service-modifier-name
  - id: cargo-package-firmware-anomaly-name
- id: cargo-package-server-role
  desc: Cargo package has server role name
  crit: component
  conf: 0.76
  any:
  - id: cargo-package-server-name
  - id: cargo-package-client-name
- id: cargo-package-packer-role
  desc: Cargo package has packer role name
  crit: notable
  conf: 0.82
  any:
  - id: cargo-package-packer-name
  - id: cargo-package-payload-staging-name
  - id: cargo-package-loader-name
  - id: cargo-package-executor-name
- id: cargo-package-process-enum-role
  desc: Cargo package has process enumeration role name
  crit: notable
  conf: 0.82
  any:
  - id: cargo-package-enumeration-process-name
  - id: cargo-package-process-enumeration-name
- id: cargo-package-uefi-role
  desc: Cargo package has UEFI role name
  crit: notable
  conf: 0.82
  any:
  - id: cargo-package-uefi-name
  - id: cargo-package-firmware-name
- id: cargo-network-agent-manifest
  desc: Cargo networked agent/dropper manifest
  crit: suspicious
  conf: 0.86
  all:
  - id: cargo-package-agent-role
  any:
  - id: metadata/import/package::dep-reqwest
  - id: metadata/import/package::dep-ureq
  - id: cargo-dep-tor-hidden-service
- id: cargo-c2-server-manifest
  desc: Cargo C2 web server manifest
  crit: notable
  conf: 0.88
  all:
  - id: cargo-dep-axum
  any:
  - id: cargo-dep-jsonwebtoken
  - id: objectives/supply-chain/hidden-payload/package::cargo-dep-rusqlite
  - id: cargo-dep-sqlx
  - id: cargo-package-agent-role
  - id: cargo-package-server-role
- id: cargo-rat-agent-crypto-profile
  desc: Cargo RAT agent crypto profile
  crit: suspicious
  conf: 0.88
  all:
  - id: cargo-package-agent-role
  any:
  - id: cargo-dep-x25519
  - id: cargo-dep-ed25519
  - id: cargo-dep-ssh2
  - id: cargo-dep-single-instance
- id: cargo-payload-staging-network-registry
  desc: Cargo payload staging over network with registry APIs
  crit: suspicious
  conf: 0.88
  all:
  - id: cargo-package-packer-role
  - id: metadata/import/package::dep-reqwest
  - id: cargo-windows-registry-feature
- id: cargo-packer-service-profile
  desc: Cargo packer with service profile
  crit: suspicious
  conf: 0.9
  all:
  - id: cargo-package-packer-role
  any:
  - id: cargo-dep-rspe
  - id: cargo-dep-windows-service
  - id: objectives/supply-chain/hidden-payload/package::cargo-windows-service-feature
- id: cargo-process-enumerator-manifest
  desc: Cargo process enumeration manifest
  crit: suspicious
  conf: 0.84
  all:
  - id: cargo-package-process-enum-role
  any:
  - id: objectives/supply-chain/hidden-payload/package::cargo-windows-process-status-feature
  - id: cargo-dep-sysinfo
- id: cargo-obfuscated-self-replacing-agent
  desc: Cargo obfuscated self-replacing agent
  crit: suspicious
  conf: 0.9
  all:
  - id: cargo-package-agent-role
  any:
  - id: cargo-dep-obfstr
  - id: cargo-dep-self-replace
- id: cargo-tor-pty-backdoor-manifest
  desc: Cargo Tor hidden-service PTY backdoor manifest
  crit: hostile
  conf: 0.95
  all:
  - id: cargo-dep-tor-hidden-service
  - id: cargo-dep-portable-pty
- id: cargo-com-automation-abuse-surface
  desc: Cargo COM automation abuse surface
  crit: suspicious
  conf: 0.88
  all:
  - id: cargo-windows-com-feature
  any:
  - id: cargo-windows-bits-feature
  - id: cargo-windows-winhttp-feature
  - id: cargo-windows-activex-feature
  - id: objectives/supply-chain/hidden-payload/package::cargo-windows-desktop-feature
- id: cargo-uefi-payload-builder
  desc: Cargo UEFI payload builder manifest
  crit: suspicious
  conf: 0.86
  all:
  - id: cargo-package-uefi-role
  - id: cargo-dep-uefi
