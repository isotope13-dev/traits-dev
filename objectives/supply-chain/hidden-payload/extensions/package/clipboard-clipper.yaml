# PyPI Clipboard Extension Clipper
# Detects setup.py scripts that combine obfuscation with COM automation. Those
# signals warrant review, but do not by themselves prove clipboard theft.
# ATT&CK: T1176 (Browser Extensions)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  attack: "T1176"
composite_rules:
  - id: pypi-clipboard-extension-clipper
    desc: Obfuscated PyPI setup uses Win32 COM automation
    crit: suspicious
    conf: 0.98
    mbc: "E1204"
    all:
      - id: metadata/build/pip::root-setup-py
      - id: objectives/anti-static/obfuscation/eval/scripting::python-getattr-oct-hex-obfuscation
      - id: micro-behaviors/communications/ipc/win32com::import-win32com
