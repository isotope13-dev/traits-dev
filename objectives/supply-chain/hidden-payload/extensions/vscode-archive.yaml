defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - ooxml
traits:
  - id: vsix-extension-file
    desc: VSIX package filename
    crit: notable
    conf: 0.98
    if:
      type: basename
      regex: (?i)\.vsix$
  - id: dsp-ide-name
    desc: DSP-IDE package naming token
    crit: notable
    conf: 0.9
    if:
      type: basename
      regex: (?i)dsp-ide
  - id: dingzex-publisher-token
    desc: dingzex publisher token in package filename
    crit: notable
    conf: 0.9
    if:
      type: basename
      regex: (?i)dingzex
  - id: oversized-vsix
    desc: Unusually large VSIX archive
    crit: suspicious
    conf: 0.85
    size_min: 250000000
composite_rules:
  - id: vsix-layout
    desc: Oversized VSIX package
    crit: suspicious
    conf: 0.9
    all:
      - id: vsix-extension-file
      - id: oversized-vsix
  - id: dingzex-dsp-ide-package
    desc: dingzex DSP-IDE VSIX package
    crit: suspicious
    conf: 0.92
    all:
      - id: vsix-extension-file
      - id: dsp-ide-name
      - id: dingzex-publisher-token
