defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002
traits:
  - id: runtime-onmessage-accept-all
    desc: Extension message listener accepts all
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: runtime\.onMessage\.addListener\s*\(\s*\(.{0,80}\)\s*=>\s*(!0|true)
  - id: hidden-zero-iframe
    desc: Hidden zero-size iframe injection
    crit: component
    conf: 0.9
    if:
      type: text
      regex: createElement\(['"]iframe['"]\)[\s\S]{0,900}(width|height|opacity|display)[\s\S]{0,240}(['"]?0(px)?['"]?|none)|(['"]?0(px)?['"]?|none)[\s\S]{0,240}(width|height|opacity|display)[\s\S]{0,900}iframe
  - id: shadow-dom-iframe
    desc: Shadow DOM iframe hiding
    crit: component
    conf: 0.92
    if:
      type: text
      regex: (attachShadow|\.shadowRoot)[\s\S]{0,700}iframe|iframe[\s\S]{0,700}(attachShadow|\.shadowRoot)
  - id: iframe-paywall-path
    desc: Remote paywall iframe path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: /paywall/\d{2,6}
  - id: postmessage-listener
    desc: Window postMessage listener
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: addEventListener\(['"]message['"]
  - id: postmessage-to-iframe
    desc: Sends postMessage to iframe
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: (contentWindow|iframe\.contentWindow)[\s\S]{0,160}\.postMessage\s*\(
  - id: message-origin-validation
    desc: Validates postMessage origin
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: \.origin\s*={2,3}\s*['"]https?://|\.origin\s*!={1,2}\s*['"]https?://|allowedOrigins?\.includes\(.{0,80}\.origin
  - id: extension-storage-proxy-ops
    desc: Multiple extension storage operations
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: chrome\.storage\.(local|sync)\.(get|set|remove)[\s\S]{0,900}chrome\.storage\.(local|sync)\.(get|set|remove)
  - id: storage-proxy-command-words
    desc: Storage proxy command words
    crit: component
    conf: 0.86
    count_min: 3
    if:
      type: text
      regex: \b(storageGet|storageSet|storageRemove|storageDelete|getStorage|setStorage|removeStorage|deleteStorage)\b
  - id: extension-debugger-attach
    desc: Chrome debugger attaches to tab
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: chrome\.debugger\.attach|debugger\.attach\s*\(
  - id: debugger-print-to-pdf
    desc: Debugger Page.printToPDF call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Page.printToPDF
  - id: ai-chat-dom-scrape
    desc: AI chat DOM scraping
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (chatgpt|claude|gemini|copilot|perplexity|poe\.com|character\.ai|data-message-author-role|conversation-turn)[\s\S]{0,500}(MutationObserver|querySelectorAll)|(MutationObserver|querySelectorAll)[\s\S]{0,500}(chatgpt|claude|gemini|copilot|perplexity|poe\.com|character\.ai|data-message-author-role|conversation-turn)
composite_rules:
  - id: extension-sleeper-message-scaffold
    desc: Dormant extension message scaffold
    crit: suspicious
    conf: 0.95
    all:
      - id: runtime-onmessage-accept-all
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::chrome-extension-context
  - id: extension-hidden-iframe-c2
    desc: Extension hidden iframe C2 channel
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::chrome-extension-context
      - id: hidden-zero-iframe
      - id: postmessage-listener
      - id: postmessage-to-iframe
    any:
      - id: iframe-paywall-path
      - id: shadow-dom-iframe
      - id: message-origin-validation
  - id: extension-shadow-iframe-c2
    desc: Shadow DOM iframe C2 channel
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::chrome-extension-context
      - id: shadow-dom-iframe
      - id: postmessage-listener
    any:
      - id: iframe-paywall-path
      - id: postmessage-to-iframe
      - id: message-origin-validation
  - id: extension-remote-storage-proxy
    desc: Extension storage remote-control proxy
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::chrome-extension-context
      - id: extension-storage-proxy-ops
      - id: storage-proxy-command-words
      - id: postmessage-listener
    any:
      - id: message-origin-validation
      - id: postmessage-to-iframe
      - id: micro-behaviors/communications/http/request::fetch-string
  - id: extension-debugger-pdf-capture
    desc: Extension captures page via debugger
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::chrome-extension-context
      - id: extension-debugger-attach
      - id: debugger-print-to-pdf
    any:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::tabs-query
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::tabs-update
      - id: ai-chat-dom-scrape
  - id: extension-ai-chat-monitor
    desc: Extension monitors AI chat DOM
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::chrome-extension-context
      - id: ai-chat-dom-scrape
    any:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::runtime-send-message
      - id: objectives/impact/ui/delivery::dom-mutation-observer
