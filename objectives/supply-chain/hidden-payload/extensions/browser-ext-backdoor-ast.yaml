defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: runtime-id-post-body
    desc: Posts extension runtime identifier
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: JSON\.stringify\s*\([^)]{0,260}(ext|extension_id)\s*:\s*(chrome\.)?runtime\.id

  - id: response-json-then-tab-open
    desc: Opens tab from remote response URL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: tabs\.create\s*\(\s*\{\s*url\s*:\s*[A-Za-z_$][\w$]*\.[A-Za-z_$][\w$]*

  - id: remote-html-assignment
    desc: Assigns remote field to innerHTML
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \.innerHTML\s*=\s*\w+\.(html|body|content|payload|markup|responseText|data)\b
    not:
      - substr: ".innerHTML=e.html"
      - substr: ".innerHTML = e.css"
      - substr: ".innerHTML = state.css"
      - substr: ".innerHTML = block.innerHTML"
      - substr: ".innerHTML = obj.outerHTML"
      - substr: ".innerHTML = result.value"
      - substr: ".innerHTML = headerData.description"
      - substr: ".innerHTML = item.description"
      - substr: ".innerHTML = templateEl.innerHTML"
      - substr: ".innerHTML=nb.highlighter"
      - substr: ".innerHTML=this._maybeSanitize"
      - substr: ".innerHTML=this.content"
      - substr: ".innerHTML=e.innerHTML"
      - substr: ".innerHTML=a.value"

  - id: user-info-endpoint
    desc: Generic user info endpoint path
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: /user_info\b

  - id: dnr-strip-security-headers
    desc: DNR strips browser security headers
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (remove|set).{0,40}(Content-Security-Policy|X-Frame-Options)
    not:
      - substr: "res.setHeader('X-Frame-Options'"
      - substr: "res.setHeader(\"X-Frame-Options\""

  - id: dnr-allow-origin-all
    desc: DNR allows cross-origin wildcard
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: (declarativeNetRequest|modifyHeaders|responseHeaders).{0,400}Access-Control-Allow-Origin.{0,40}\*|Access-Control-Allow-Origin.{0,80}\*.{0,400}(declarativeNetRequest|modifyHeaders|responseHeaders)
    not:
      - substr: "res.setHeader('Access-Control-Allow-Origin'"
      - substr: "res.setHeader(\"Access-Control-Allow-Origin\""
      - substr: "setHeader('Access-Control-Allow-Origin'"
      - substr: "setHeader('Access-Control-Allow-Origin', '*'"
      - substr: "Access-Control-Allow-Origin'), '*'"

  - id: dnr-websocket-permit
    desc: DNR permits broad WebSocket traffic
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: (declarativeNetRequest|modifyHeaders|responseHeaders|requestHeaders)[\s\S]{0,500}(Upgrade:\s*websocket|wss?://[A-Za-z0-9-]+\.[A-Za-z0-9.-]+)|(Upgrade:\s*websocket|wss?://[A-Za-z0-9-]+\.[A-Za-z0-9.-]+)[\s\S]{0,500}(declarativeNetRequest|modifyHeaders|responseHeaders|requestHeaders)

composite_rules:
  - id: extension-remote-tab-backdoor
    desc: Extension opens tabs from C2 response
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::tabs-create
      - id: micro-behaviors/communications/http/request::fetch-string
      - id: response-json-then-tab-open
    any:
      - id: runtime-id-post-body
      - id: user-info-endpoint

  - id: extension-remote-html-backdoor
    desc: Extension renders remote HTML payload
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/request::fetch-string
      - id: remote-html-assignment
      - id: user-info-endpoint

  - id: extension-dnr-header-bypass
    desc: Extension strips security headers for injection
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::declarative-net-request-update
      - id: dnr-strip-security-headers
    any:
      - id: dnr-allow-origin-all
      - id: dnr-websocket-permit
