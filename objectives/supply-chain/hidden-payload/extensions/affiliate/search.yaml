defaults:
  platforms: [linux, macos, windows]
  for: [json, chrome-manifest]

traits:
  - id: search-monetization-query-param
    desc: Search monetization query parameter
    crit: component
    conf: 0.88
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '[?&](PCSF|dgd)='
      case_insensitive: true
  - id: search-source-query-param
    desc: Search source tracking parameter
    crit: component
    conf: 0.86
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '[?&](source|acTypeId)='
      case_insensitive: true
  - id: affiliate-partner-query-param
    desc: Affiliate partner query parameter
    crit: component
    conf: 0.88
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '[?&](partner|subid)='
      case_insensitive: true
  - id: affiliate-id-query-param
    desc: Affiliate identifier query parameter
    crit: component
    conf: 0.88
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '[?&](affiliate|affid|pubid)='
      case_insensitive: true
  - id: yahoo-hosted-search-param
    desc: Yahoo hosted search parameter
    crit: component
    conf: 0.9
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '([?&](hspart|hsimp)=|yhs-)'
      case_insensitive: true
  - id: search-admin-link-endpoint
    desc: Search admin redirect endpoint
    crit: component
    conf: 0.9
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '/admin/public/link\?q=\{searchTerms\}'
      case_insensitive: true
  - id: search-api-service-host
    desc: Search middleware service host
    crit: component
    conf: 0.86
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: 'https?://[^/"'']*\bsearch[^/"'']*(-api|-svc)\b'
      case_insensitive: true
  - id: search-rewrite-permission-dnr
    desc: Search extension DNR permission
    crit: component
    conf: 0.88
    for: [json]
    if:
      type: value
      path: permissions
      exact: declarativeNetRequest
  - id: search-rewrite-permission-dnr-host
    desc: Search extension DNR host permission
    crit: component
    conf: 0.9
    for: [json]
    if:
      type: value
      path: permissions
      exact: declarativeNetRequestWithHostAccess
  - id: search-rewrite-permission-webrequest
    desc: Search extension webRequest permission
    crit: component
    conf: 0.88
    for: [json]
    if:
      type: value
      path: permissions
      exact: webRequest
  - id: search-provider-host-permission
    desc: Search provider host permission
    crit: component
    conf: 0.84
    if:
      type: value
      path: host_permissions
      substr: search
      case_insensitive: true
  - id: query-provider-host-permission
    desc: Query provider host permission
    crit: component
    conf: 0.84
    if:
      type: value
      path: host_permissions
      substr: query
      case_insensitive: true
  - id: serp-provider-host-permission
    desc: SERP provider host permission
    crit: component
    conf: 0.84
    if:
      type: value
      path: host_permissions
      substr: serp
      case_insensitive: true
  - id: extension-webstore-promotion-url
    desc: Chrome Web Store promotion URL
    crit: component
    conf: 0.88
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      substr: chromewebstore.google.com/detail/
      case_insensitive: true
  - id: extension-campaign-tracking-url
    desc: Campaign tracking URL parameters
    crit: component
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      substr: utm_source=
      case_insensitive: true
  - id: remote-extension-catalog-url
    desc: Remote extension catalog URL
    crit: component
    conf: 0.86
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      substr: /api/extensions.php
      case_insensitive: true
  - id: extension-shortcuts-storage-key
    desc: New tab shortcuts storage key
    crit: component
    conf: 0.84
    for: [javascript, typescript]
    platforms: [windows, unix]
    if:
      type: literal
      kind: string
      exact: shortcuts
  - id: runtime-search-query-redirect
    desc: Runtime search query redirect
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      regex: 'window\.location\s*=\s*["'']https?://[^"'']{1,180}[?&](q|query|keyword|search)='
      case_insensitive: true
  - id: runtime-search-input-value
    desc: Runtime search input value read
    crit: notable
    conf: 0.86
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      regex: '\$\(["''][^"'')]{0,80}search[^"'')]{0,80}["'']\)\.val\(\)'
      case_insensitive: true
  - id: runtime-search-q-input-value
    desc: Runtime search q input value read
    crit: notable
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      regex: '\$\(["'']#q["'']\)\.val\(\)'
  - id: google-search-query-url
    desc: Google search query URL
    crit: notable
    conf: 0.95
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      substr: https://www.google.com/search?q=
  - id: runtime-search-token-param
    desc: Runtime search token parameter
    crit: suspicious
    conf: 0.88
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      regex: 'https?://[^"''\s]{1,220}[?&]token=[A-Za-z0-9_-]{16,}'
      case_insensitive: true
    unless:
      - id: well-known/app/bruno::app-bundle
  - id: runtime-search-affiliate-param
    desc: Runtime search affiliate parameter
    crit: suspicious
    conf: 0.88
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      regex: 'https?://[^"''\s]{1,160}[?&](affiliate|affid|pubid)='
      case_insensitive: true
composite_rules:
  - id: runtime-search-form-navigation
    desc: Runtime search form opens query URL
    crit: notable
    conf: 0.94
    for: [javascript, typescript, html]
    all:
      - id: runtime-search-q-input-value
      - id: google-search-query-url
      - id: micro-behaviors/ui/window/manage/dom::browser-window-open
  - id: hosted-search-affiliate-marker
    desc: Hosted search affiliate marker
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/impact/ui/manipulation/core::search-url-query-template
    any:
      - id: yahoo-hosted-search-param
      - id: affiliate-partner-query-param
      - id: affiliate-id-query-param
  - id: runtime-search-tracking-token
    desc: Runtime search tracking token
    crit: suspicious
    conf: 0.9
    any:
      - id: runtime-search-token-param
      - id: runtime-search-affiliate-param
  - id: extension-search-newtab-takeover
    desc: Browser extension search and new tab takeover
    crit: hostile
    conf: 0.93
    attack: T1176
    all:
      - id: objectives/impact/ui/manipulation/core::browser-extension-default-search-override
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: objectives/impact/ui/manipulation/core::search-url-query-template
    any:
      - id: search-source-query-param
      - id: micro-behaviors/communications/http/url/query::search-source-query-parameter
      - id: search-monetization-query-param
      - id: yahoo-hosted-search-param
      - id: affiliate-partner-query-param
      - id: affiliate-id-query-param
  - id: extension-monetized-search-newtab-hijack
    desc: Monetized extension search and new tab hijacking
    crit: hostile
    conf: 0.95
    attack: T1176
    all:
      - id: objectives/impact/ui/manipulation/core::browser-extension-default-search-override
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: objectives/impact/ui/manipulation/core::search-url-query-template
    any:
      - id: search-monetization-query-param
      - id: search-source-query-param
      - id: micro-behaviors/communications/http/url/query::search-source-query-parameter
      - id: yahoo-hosted-search-param
      - id: affiliate-partner-query-param
      - id: affiliate-id-query-param
      - id: search-admin-link-endpoint
      - id: search-api-service-host
      - id: objectives/impact/ui/manipulation/core::search-branded-provider-host
  - id: hosted-search-affiliate-hijack
    desc: Hosted search affiliate hijacking
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/impact/ui/manipulation/core::browser-extension-default-search-override
      - id: hosted-search-affiliate-marker
    any:
      - id: search-monetization-query-param
      - id: search-source-query-param
      - id: micro-behaviors/communications/http/url/query::search-source-query-parameter
      - id: search-admin-link-endpoint
      - id: search-api-service-host
  - id: runtime-rewriting-search-hijack
    desc: Runtime-rewriting search hijacking
    crit: hostile
    conf: 0.94
    all:
      - id: objectives/impact/ui/manipulation/core::extension-search-monetization
      - id: objectives/impact/ui/manipulation/core::extension-search-rewrite-authority
    any:
      - id: search-provider-host-permission
      - id: query-provider-host-permission
      - id: serp-provider-host-permission
      - id: search-admin-link-endpoint
      - id: search-api-service-host

  - id: tracked-search-monetization-extension
    desc: Search monetization extension with persistent tracking
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/impact/ui/manipulation/core::extension-search-monetization
      - id: objectives/collection/monitor/tracking::extension-persistent-lifecycle-tracking
    any:
      - id: search-admin-link-endpoint
      - id: search-api-service-host
      - id: objectives/impact/ui/manipulation/core::search-branded-provider-host
  - id: extension-newtab-search-page
    desc: Browser extension new tab search page
    crit: notable
    conf: 0.92
    attack: T1176
    platforms: [windows, unix]
    scope: archive
    all:
      - id: metadata/permission/manifest::chrome-newtab-override
    any:
      - id: micro-behaviors/browser-extension/lifecycle::chrome-search-query
      - id: runtime-search-form-navigation
  - id: lifecycle-tracked-newtab-search-extension
    desc: Lifecycle-tracked new tab search extension
    crit: suspicious
    conf: 0.93
    attack: T1176
    platforms: [windows, unix]
    scope: archive
    all:
      - id: extension-newtab-search-page
      - id: objectives/collection/monitor/tracking::extension-install-uninstall-url-tracking
    any:
      - id: extension-shortcuts-storage-key
      - id: extension-webstore-promotion-url
      - id: extension-campaign-tracking-url
      - id: remote-extension-catalog-url
  - id: lifecycle-tracked-newtab-shortcuts-extension
    desc: Lifecycle-tracked new tab shortcuts extension
    crit: suspicious
    conf: 0.92
    attack: T1176
    platforms: [windows, unix]
    scope: archive
    all:
      - id: extension-newtab-search-page
      - id: extension-shortcuts-storage-key
    any:
      - id: objectives/collection/monitor/tracking::extension-install-uninstall-url-tracking
      - id: micro-behaviors/browser-extension/lifecycle::runtime-set-uninstall-url
  - id: promotional-newtab-search-extension
    desc: Promotional new tab search extension
    crit: suspicious
    conf: 0.94
    attack: T1176
    platforms: [windows, unix]
    scope: archive
    all:
      - id: extension-newtab-search-page
      - id: objectives/collection/monitor/tracking::extension-install-uninstall-url-tracking
    any:
      - id: extension-webstore-promotion-url
      - id: extension-campaign-tracking-url
      - id: remote-extension-catalog-url
  - id: monetized-newtab-shortcut-extension
    desc: Monetized new tab shortcut extension
    crit: suspicious
    conf: 0.93
    attack: T1176
    platforms: [windows, unix]
    scope: archive
    all:
      - id: extension-newtab-search-page
      - id: extension-shortcuts-storage-key
    any:
      - id: extension-webstore-promotion-url
      - id: extension-campaign-tracking-url
      - id: remote-extension-catalog-url
  - id: runtime-tracked-newtab-search-extension
    desc: Runtime tracked new tab search extension
    crit: hostile
    conf: 0.95
    attack: T1176
    platforms: [windows, unix]
    for: [crx, xpi, zip]
    scope: archive
    all:
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: runtime-search-query-redirect
      - id: runtime-search-input-value
    any:
      - id: runtime-search-token-param
      - id: runtime-search-affiliate-param
      - id: micro-behaviors/communications/http/url/query::search-source-query-parameter
