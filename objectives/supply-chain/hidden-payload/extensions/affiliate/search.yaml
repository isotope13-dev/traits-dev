defaults:
  platforms: [linux, macos, windows]
  for: [json, chrome-manifest]

traits:
  - id: search-monetization-query-param
    desc: Search monetization query parameter
    crit: component
    conf: 0.88
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '[?&](PCSF|dgd)='
      case_insensitive: true
  - id: search-source-query-param
    desc: Search source tracking parameter
    crit: component
    conf: 0.86
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '[?&](source|acTypeId)='
      case_insensitive: true
  - id: affiliate-partner-query-param
    desc: Affiliate partner query parameter
    crit: component
    conf: 0.88
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '[?&](partner|subid)='
      case_insensitive: true
  - id: affiliate-id-query-param
    desc: Affiliate identifier query parameter
    crit: component
    conf: 0.88
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '[?&](affiliate|affid|pubid)='
      case_insensitive: true
  - id: yahoo-hosted-search-param
    desc: Yahoo hosted search parameter
    crit: component
    conf: 0.9
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '([?&](hspart|hsimp)=|yhs-)'
      case_insensitive: true
  - id: search-admin-link-endpoint
    desc: Search admin redirect endpoint
    crit: component
    conf: 0.9
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: '/admin/public/link\?q=\{searchTerms\}'
      case_insensitive: true
  - id: search-api-service-host
    desc: Search middleware service host
    crit: component
    conf: 0.86
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: 'https?://[^/"'']*\bsearch[^/"'']*(-api|-svc)\b'
      case_insensitive: true
  - id: search-rewrite-permission-dnr
    desc: Search extension DNR permission
    crit: component
    conf: 0.88
    for: [json]
    if:
      type: value
      path: permissions
      exact: declarativeNetRequest
  - id: search-rewrite-permission-dnr-host
    desc: Search extension DNR host permission
    crit: component
    conf: 0.9
    for: [json]
    if:
      type: value
      path: permissions
      exact: declarativeNetRequestWithHostAccess
  - id: search-rewrite-permission-webrequest
    desc: Search extension webRequest permission
    crit: component
    conf: 0.88
    for: [json]
    if:
      type: value
      path: permissions
      exact: webRequest
  - id: search-provider-host-permission
    desc: Search provider host permission
    crit: component
    conf: 0.84
    if:
      type: value
      path: host_permissions
      substr: search
      case_insensitive: true
  - id: query-provider-host-permission
    desc: Query provider host permission
    crit: component
    conf: 0.84
    if:
      type: value
      path: host_permissions
      substr: query
      case_insensitive: true
  - id: serp-provider-host-permission
    desc: SERP provider host permission
    crit: component
    conf: 0.84
    if:
      type: value
      path: host_permissions
      substr: serp
      case_insensitive: true
  - id: extension-affiliate-query-parameter
    desc: Affiliate query parameter
    crit: component
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      substr: affiliate=
      case_insensitive: true
  - id: extension-affid-query-parameter
    desc: Affiliate ID query parameter
    crit: component
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      substr: affid=
      case_insensitive: true
  - id: extension-pubid-query-parameter
    desc: Publisher ID query parameter
    crit: component
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      substr: pubid=
      case_insensitive: true
  - id: extension-partner-query-parameter
    desc: Affiliate partner query parameter
    crit: component
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      substr: partner=
      case_insensitive: true
  - id: extension-subid-query-parameter
    desc: Affiliate sub-ID query parameter
    crit: component
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      substr: subid=
      case_insensitive: true
  - id: runtime-search-query-redirect
    desc: Runtime search query redirect
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      regex: 'window\.location\s*=\s*["'']https?://[^"'']{1,180}[?&](q|query|keyword|search)='
      case_insensitive: true
  - id: runtime-search-q-input-value
    desc: Runtime search q input value read
    crit: notable
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      regex: '\$\(["'']#q["'']\)\.val\(\)'
  - id: runtime-search-affiliate-param
    desc: Runtime navigation affiliate parameter
    crit: suspicious
    conf: 0.88
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      regex: '(?is)window\.location.{0,220}https?://[^"''\s]{1,160}[?&](affiliate|affid|pubid)='
      case_insensitive: true
  # Same syndication money-trail as yahoo-hosted-search-param, but found in the
  # extension's CODE rather than the manifest search_url. Hijackers keep the
  # manifest pointing at their own clean-looking domain and only bounce to the
  # partner-tagged syndication URL at runtime, so a manifest-only matcher misses
  # the monetization entirely. hspart/hsimp identify the paying search partner.
  - id: runtime-hosted-search-affiliate-redirect
    desc: Runtime hosted-search partner redirect URL
    crit: notable
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    if:
      type: text
      regex: 'https?://[^"''\s]{1,160}/(yhs/)?search\?[^"''\s]{0,160}[?&](hspart|hsimp)='
      case_insensitive: true
composite_rules:
  - id: extension-affiliate-tracking-parameter
    desc: Affiliate identifier URL parameter
    crit: component
    conf: 0.9
    any:
      - id: extension-affiliate-query-parameter
      - id: extension-affid-query-parameter
      - id: extension-pubid-query-parameter
      - id: extension-partner-query-parameter
      - id: extension-subid-query-parameter
  - id: runtime-search-form-navigation
    desc: Runtime search form opens query URL
    crit: notable
    conf: 0.94
    for: [javascript, typescript, html]
    all:
      - id: runtime-search-q-input-value
      - id: micro-behaviors/communications/http/url/query::google-search-query-url
      - id: micro-behaviors/ui/window/manage/dom::browser-window-open
  - id: hosted-search-affiliate-marker
    desc: Hosted search affiliate marker
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/impact/ui/manipulation/core::search-url-query-template
    any:
      - id: yahoo-hosted-search-param
      - id: affiliate-partner-query-param
      - id: affiliate-id-query-param
  - id: runtime-search-tracking-token
    desc: Runtime search tracking token
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript, html]
    platforms: [windows, unix]
    all:
      - id: micro-behaviors/communications/http/url/query::token-query-parameter
      - id: runtime-search-query-redirect
  - id: extension-search-newtab-takeover
    desc: Browser extension search and new tab takeover
    crit: hostile
    conf: 0.93
    attack: T1176
    all:
      - id: objectives/impact/ui/manipulation/core::browser-extension-default-search-override
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: objectives/impact/ui/manipulation/core::search-url-query-template
    any:
      - id: search-source-query-param
      - id: micro-behaviors/communications/http/url/query::search-source-query-parameter
      - id: search-monetization-query-param
      - id: yahoo-hosted-search-param
      - id: affiliate-partner-query-param
      - id: affiliate-id-query-param
  - id: extension-monetized-search-newtab-hijack
    desc: Monetized extension search and new tab hijacking
    crit: hostile
    conf: 0.95
    attack: T1176
    all:
      - id: objectives/impact/ui/manipulation/core::browser-extension-default-search-override
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: objectives/impact/ui/manipulation/core::search-url-query-template
    any:
      - id: search-monetization-query-param
      - id: search-source-query-param
      - id: micro-behaviors/communications/http/url/query::search-source-query-parameter
      - id: yahoo-hosted-search-param
      - id: affiliate-partner-query-param
      - id: affiliate-id-query-param
      - id: search-admin-link-endpoint
      - id: search-api-service-host
      - id: objectives/impact/ui/manipulation/core::search-branded-provider-host
  - id: hosted-search-affiliate-hijack
    desc: Hosted search affiliate hijacking
    crit: hostile
    conf: 0.95
    scope: archive
    for: [crx, xpi, zip, archives]
    all:
      - id: metadata/permission/manifest::chrome-search-provider-override
      - id: metadata/permission/manifest::chrome-default-search-provider
      - id: metadata/permission/manifest::chrome-search-terms-template
    any:
      - id: search-monetization-query-param
      - id: search-source-query-param
      - id: micro-behaviors/communications/http/url/query::search-source-query-parameter
      - id: search-admin-link-endpoint
      - id: search-api-service-host
  # Default-search takeover whose payout leg lives in code, not in the manifest:
  # the manifest advertises the vendor's own search page, and the extension then
  # bounces the query to a syndication partner URL carrying hspart/hsimp. The
  # sibling hosted-search-affiliate-hijack only inspects the manifest search_url,
  # so this indirection slipped past it entirely.
  - id: search-override-runtime-affiliate-redirect
    desc: Search override redirects to paid search partner
    crit: hostile
    conf: 0.95
    attack: T1176
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: objectives/impact/ui/manipulation/core::browser-extension-default-search-override
      - id: runtime-hosted-search-affiliate-redirect

  - id: runtime-rewriting-search-hijack
    desc: Runtime-rewriting search hijacking
    crit: hostile
    conf: 0.94
    all:
      - id: objectives/impact/ui/manipulation/core::extension-search-monetization
      - id: objectives/impact/ui/manipulation/core::extension-search-rewrite-authority
    any:
      - id: search-provider-host-permission
      - id: query-provider-host-permission
      - id: serp-provider-host-permission
      - id: search-admin-link-endpoint
      - id: search-api-service-host

  - id: tracked-search-monetization-extension
    desc: Search monetization extension with persistent tracking
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/impact/ui/manipulation/core::extension-search-monetization
      - id: extension-persistent-lifecycle-tracking
    any:
      - id: search-admin-link-endpoint
      - id: search-api-service-host
      - id: objectives/impact/ui/manipulation/core::search-branded-provider-host

  - id: extension-persistent-lifecycle-tracking
    desc: Persistent extension lifecycle tracking
    crit: component
    conf: 0.97
    all:
      - id: extension-persistent-cookie-access
      - id: micro-behaviors/browser-extension/lifecycle::runtime-set-uninstall-url
    any:
      - id: objectives/collection/monitor/tracking::extension-uninstall-feedback-url
      - id: objectives/collection/monitor/tracking::extension-install-no-cors-ping
      - id: micro-behaviors/browser-extension/lifecycle::uninstall-tracking

  - id: extension-persistent-cookie-access
    desc: Persistent extension cookie access pattern
    crit: component
    conf: 0.97
    all:
      - id: objectives/collection/monitor/tracking::extension-uid-cookie-name
      - id: objectives/collection/monitor/tracking::extension-uid-sync-storage
      - id: objectives/collection/monitor/tracking::extension-cookie-expiration-field
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-set
    any:
      - id: objectives/collection/monitor/tracking::extension-cookie-change-listener
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-get
  - id: runtime-tracked-newtab-search-extension
    desc: Runtime tracked new tab search extension
    crit: hostile
    conf: 0.95
    attack: T1176
    platforms: [windows, unix]
    for: [crx, xpi, zip]
    scope: archive
    all:
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: runtime-search-query-redirect
      - id: micro-behaviors/ui/controls/widget::jquery-search-input-value-read
    any:
      - id: micro-behaviors/communications/http/url/query::token-query-parameter
      - id: runtime-search-affiliate-param
      - id: micro-behaviors/communications/http/url/query::search-source-query-parameter

  # The new-tab "more extensions" cross-promotion catalog moved to
  # objectives/impact/ui/manipulation/core::newtab-remote-promo-catalog,
  # alongside newtab-override-promo-lifecycle. It does not belong here: the
  # catalog is a visible click-triggered panel rather than a hidden payload,
  # its links carry no affiliate or tracking parameters, and it has nothing to
  # do with search. It was also hostile for what is ordinary publisher
  # cross-promotion; see that rule for the rationale.
