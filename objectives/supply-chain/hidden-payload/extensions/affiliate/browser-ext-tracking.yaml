defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: profit-domain
    desc: Profit/monetization tracking domain
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: \b\d*x?profit\.(io|com|net|org)\b
      case_insensitive: true
  - id: affiliate-domain-pattern-1
    desc: Affiliate keyword domain
    crit: notable
    conf: 0.8
    # Require a URL/host context (matching the click/redir siblings) so member
    # access like `affiliate.method` (a property, not a hostname) does not match.
    if:
      type: string_literal
      regex: '(https?://|//|www\.)[^\s"'']{0,80}\baffiliate\.[a-z]{2,6}\b'
      case_insensitive: true
    not:
      - regex: \.(catch|then|finally)\b
      - regex: \.(call|apply|bind)\b
  - id: affiliate-domain-pattern-partner
    desc: Partner keyword domain
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(https?://|//|www\.)[^\s"'']{0,80}\bpartner\.[a-z]{2,6}\b'
      case_insensitive: true
    not:
      - regex: \.(catch|then|finally)\b
      - regex: \.(call|apply|bind)\b
  - id: affiliate-domain-pattern-track
    desc: Track keyword domain
    crit: notable
    conf: 0.8
    # Require a URL/host context (matching the click/redir siblings) so member
    # access like `Track.album` (an object property) is not mistaken for a host.
    if:
      type: string_literal
      regex: '(https?://|//|www\.)[^\s"'']{0,80}\btrack\.[a-z]{2,6}\b'
      case_insensitive: true
    not:
      - regex: \.(catch|then|finally)\b
      - regex: \.(call|apply|bind)\b
  - id: affiliate-domain-pattern-click
    desc: Click keyword domain
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(https?://|//|www\.)[^\s"'']{0,80}\bclick\.[a-z]{2,6}\b'
      case_insensitive: true
    not:
      - regex: \.(catch|then|finally)\b
      - regex: \.(call|apply|bind)\b
  - id: affiliate-domain-pattern-2
    desc: Redir keyword affiliate domain
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: 'https?://[^\s"'']{0,80}\bredir\.[a-z]{2,6}\b'
      case_insensitive: true
  - id: affiliate-domain-pattern-monetize
    desc: Monetize keyword affiliate domain
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: 'https?://[^\s"'']{0,80}\bmonetize\.[a-z]{2,6}\b'
      case_insensitive: true
  - id: affiliate-domain-pattern-revenue
    desc: Revenue keyword affiliate domain
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: 'https?://[^\s"'']{0,80}\brevenue\.[a-z]{2,6}\b'
      case_insensitive: true
  - id: affiliate-domain-pattern-earn
    desc: Earn keyword affiliate domain
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: 'https?://[^\s"'']{0,80}\bearn\.[a-z]{2,6}\b'
      case_insensitive: true
  - id: cashback-cookie-name
    desc: Cashback affiliate cookie name
    crit: notable
    conf: 0.92
    if:
      type: literal
      kind: string
      regex: '(\.TCB-BAS-V3|topcashback\.com)'
      case_insensitive: true
  - id: remote-cookie-config-url
    desc: Remote cookie config URL
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      kind: string
      regex: 'https?://[0-9.]+/[^"'']{0,80}(logco|cookie)'
      case_insensitive: true
  - id: cookie-import-name-field
    desc: Cookie import name field
    crit: component
    conf: 0.88
    if:
      type: symbol
      kind: member
      exact: c.name
  - id: cookie-import-value-field
    desc: Cookie import value field
    crit: component
    conf: 0.88
    if:
      type: symbol
      kind: member
      exact: c.value
  - id: cookie-import-domain-field
    desc: Cookie import domain field
    crit: component
    conf: 0.88
    if:
      type: symbol
      kind: member
      exact: c.domain
composite_rules:
  - id: cookie-import-object-fields
    desc: Cookie import object fields
    crit: notable
    conf: 0.9
    all:
      - id: cookie-import-name-field
      - id: cookie-import-value-field
      - id: cookie-import-domain-field
  - id: affiliate-domain-pattern
    desc: Affiliate tracking domain
    crit: notable
    conf: 0.75
    any:
      - id: affiliate-domain-pattern-1
      - id: affiliate-domain-pattern-partner
      - id: affiliate-domain-pattern-track
      - id: affiliate-domain-pattern-click
      - id: affiliate-domain-pattern-2
      - id: affiliate-domain-pattern-monetize
      - id: affiliate-domain-pattern-revenue
      - id: affiliate-domain-pattern-earn
  - id: affiliate-adware
    desc: Affiliate/adware extension
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/permission/runtime::is-extension
    any:
      - id: profit-domain
      - id: affiliate-domain-pattern
  - id: credentialed-affiliate-ad-injection
    desc: Credentialed affiliate adware browser extension
    crit: hostile
    conf: 0.97
    all:
      - id: affiliate-adware
      - id: micro-behaviors/communications/http/request/credentials::fetch-credentials-include
  - id: remote-affiliate-cookie-stuffing
    desc: Extension imports affiliate cookies
    crit: hostile
    conf: 0.98
    attack: T1195.002
    scope: archive
    all:
      - id: metadata/permission/runtime::is-extension
      - id: remote-cookie-config-url
      - id: cashback-cookie-name
      - id: cookie-import-object-fields
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-set
    any:
      - id: metadata/permission/manifest::host-permission-all-urls
      - id: objectives/supply-chain/hidden-payload/extensions/permission::broad-host-permission
