# Affiliate Link Hijacking Patterns
# Detection of affiliate ID injection and link manipulation
defaults:
  platforms: [unix, windows]
  for: [javascript]
traits:
  # === Affiliate Link Hijacking Patterns ===
  - id: amazon-product-url-pattern
    desc: Amazon product URL pattern
    crit: notable
    conf: 0.9
    if:
      # Require the 10-char ASIN that follows an Amazon product path. The bare
      # `/dp/` matched unrelated slash-delimited tokens (e.g. an Android units
      # list `float/dp/int/string/bool`, where `dp` is density-pixels).
      type: text
      regex: "/(dp|gp/product)/[A-Z0-9]{10}"
  - id: url-searchparams-api
    desc: Affiliate-style searchParams mutation
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "searchParams\\.(set|append|delete)\\(\\s*['\"](tag|ref)[-_a-z0-9]*['\"]"
      case_insensitive: true
  - id: url-params-mutator
    desc: URL params mutation call
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "params\\.(set|append)\\("
  - id: affiliate-param-name
    desc: Affiliate parameter name
    crit: component
    conf: 0.85
    # Affiliate-specific param prefixes only. Bare "tag"/"ref" are ubiquitous
    # generic field names (matched a Cypress reporter's `'tag', names` call).
    if:
      type: text
      regex: "['\"](utm_|affiliate|aff[_-]).{0,40}['\"]"
      case_insensitive: true
  - id: affiliate-tag-constant
    desc: Affiliate tag variable
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "[A-Z_]*(AFFILIATE|REFERRAL)[A-Z_]*TAG"
  - id: tag-param-literal
    desc: tag parameter string marker
    # Component: a bare "tag": / "tag"= literal is ubiquitous (config objects,
    # git ref parsing like `"tag"===o`, HTML tag handling). Affiliate-injection
    # meaning comes from the composites below that pair it with amazon/affiliate
    # URL context, so it is a fragment, not a standalone signal.
    crit: component
    conf: 0.7
    if:
      type: text
      regex: "['\"]tag['\"]\\s*[:=,)]"
  - id: ext-mutation-observer
    desc: MutationObserver DOM monitoring
    crit: component
    conf: 0.9
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/app/browser-extension::honey-popover-wallet-bundle
      - id: objectives/anti-static/obfuscation/code-metrics/structure/
    if:
      type: text
      substr: "MutationObserver"
  - id: amazon-retail-host-primary
    desc: Amazon retail host primary TLD
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "amazon\\.(com|co\\.uk|de)\\b"
      case_insensitive: true
  - id: amazon-retail-host-regional
    desc: Amazon retail host regional TLD
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "amazon\\.(fr|it|es|ca)\\b"
      case_insensitive: true
  - id: amazon-retail-host-other
    desc: Amazon retail host other TLD
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "amazon\\.(com\\.au|co\\.jp|in)\\b"
      case_insensitive: true
  - id: queryselector-link-targeting
    desc: Link element selection
    crit: component
    conf: 0.8
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: objectives/anti-static/obfuscation/code-metrics/structure/
    if:
      type: text
      regex: "querySelectorAll\\([^)]{0,120}a\\[href"
composite_rules:
  # === Affiliate Link Hijacking Detection ===

  # URL parameter modification capability
  - id: url-param-modification
    desc: URL parameter modification
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: url-searchparams-api
      - id: url-params-set
      - id: objectives/impact/ui/delivery::link-href-assignment
      - id: tag-param-literal
  - id: url-params-set
    desc: Affiliate URL params modification
    crit: notable
    conf: 0.88
    near_bytes: 120
    all:
      - id: url-params-mutator
      - id: affiliate-param-name
  # Amazon affiliate link targeting
  - id: amazon-hostname-check
    desc: Amazon hostname detection
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/os/sysinfo/hostname::hostname-field-token
    any:
      - id: amazon-retail-host-primary
      - id: amazon-retail-host-regional
      - id: amazon-retail-host-other
    near_bytes: 128
  - id: amazon-link-targeting
    desc: Amazon link targeting
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: amazon-product-url-pattern
      - id: amazon-hostname-check
      - id: queryselector-link-targeting
  # Generic affiliate link hijacking pattern (cross-platform)
  - id: affiliate-link-hijack
    desc: Affiliate link hijacking
    crit: suspicious
    conf: 0.9
    attack: "T1565.001"
    all:
      - id: url-param-modification
      - id: objectives/impact/ui/delivery::link-href-assignment
    any:
      - id: affiliate-tag-constant
      - id: tag-param-literal
    unless:
      - id: metadata/library/structure::js-large-module-bundle
  # Amazon affiliate hijacking (specific)
  - id: ext-amazon-affiliate-hijack
    desc: Amazon affiliate hijacking
    crit: hostile
    conf: 0.95
    attack: "T1565.001"
    all:
      - id: amazon-link-targeting
      - id: url-param-modification
      - id: objectives/impact/ui/delivery::link-href-assignment
  # Persistent affiliate hijack via MutationObserver (hostile - complexity 4+)
  - id: persistent-affiliate-hijack
    desc: Persistent affiliate hijacking
    crit: hostile
    conf: 0.95
    attack: "T1565.001"
    all:
      - id: ext-mutation-observer
      - id: objectives/impact/ui/delivery::link-href-assignment
      - id: url-param-modification
    any:
      - id: amazon-link-targeting
      - id: affiliate-tag-constant
    unless:
      - id: well-known/app/browser-extension::honey-popover-wallet-bundle
      - id: well-known/app/avast::avast-antitrack-extension
  # Chrome extension affiliate fraud
  - id: extension-affiliate-fraud
    desc: Extension affiliate fraud
    crit: hostile
    conf: 0.95
    attack: "T1565.001"
    all:
      - id: metadata/permission/runtime::is-extension
      - id: ext-mutation-observer
      - id: objectives/impact/ui/delivery::link-href-assignment
      - id: url-param-modification
    unless:
      - id: well-known/app/browser-extension::honey-popover-wallet-bundle
      - id: well-known/app/avast::avast-antitrack-extension
