defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
- id: session-cookie-name
  desc: Targets __session cookie name
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: "['\\\"]__session['\\\"]"

- id: cookie-domain-filter
  desc: Filters cookies by domain
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: "domain\\s*:\\s*['\\\"][A-Za-z0-9._-]+\\.[A-Za-z]{2,}['\\\"]"

- id: admin-security-url-targets--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: /\/(admin|security)\b
- id: admin-security-url-targets--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: /\/(mfa|sso)\b
- id: admin-security-url-targets--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: /\/(okta)\b
- id: extension-page-block
  desc: Blocks or redirects targeted pages
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (innerHTML\s*=\s*['"]{0,1}\s*['"]|location\.(href|replace)|document\.body\.innerHTML\s*=)

- id: management-id-comparison--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  not:
  - substr: "createCancellationTokenSource("
  - substr: "knownCanceledRequests.has(requestMessage.id)"

  if:
    type: text
    substr: management
    case_insensitive: true
- id: management-id-comparison--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  not:
  - substr: "createCancellationTokenSource("
  - substr: "knownCanceledRequests.has(requestMessage.id)"

  if:
    type: text
    substr: extension
    case_insensitive: true
- id: management-id-comparison--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  not:
  - substr: "createCancellationTokenSource("
  - substr: "knownCanceledRequests.has(requestMessage.id)"

  if:
    type: text
    substr: includes
    case_insensitive: true
- id: management-id-comparison--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  not:
  - substr: "createCancellationTokenSource("
  - substr: "knownCanceledRequests.has(requestMessage.id)"

  if:
    type: text
    substr: browser
    case_insensitive: true
- id: management-id-comparison--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  not:
  - substr: "createCancellationTokenSource("
  - substr: "knownCanceledRequests.has(requestMessage.id)"

  if:
    type: text
    substr: indexOf
    case_insensitive: true
- id: management-id-comparison--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  not:
  - substr: "createCancellationTokenSource("
  - substr: "knownCanceledRequests.has(requestMessage.id)"

  if:
    type: text
    substr: chrome
    case_insensitive: true
- id: management-id-comparison--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  not:
  - substr: "createCancellationTokenSource("
  - substr: "knownCanceledRequests.has(requestMessage.id)"

  if:
    type: text
    substr: plugin
    case_insensitive: true
- id: management-id-comparison--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  not:
  - substr: "createCancellationTokenSource("
  - substr: "knownCanceledRequests.has(requestMessage.id)"

  if:
    type: text
    substr: addon
    case_insensitive: true
composite_rules:
- id: extension-session-cookie-harvest
  desc: Extension harvests session cookies for remote reporting
  crit: suspicious
  conf: 0.96
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::cookies-get-all
  - id: session-cookie-name
  any:
  - id: micro-behaviors/communications/http/request::fetch-string
  - id: micro-behaviors/communications/http/request::request-import
  - id: cookie-domain-filter

- id: extension-session-cookie-monitor
  desc: Extension monitors session cookies with timers or change listeners
  crit: suspicious
  conf: 0.96
  all:
  - id: extension-session-cookie-harvest
  any:
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::cookies-on-changed-listener
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::alarms-create
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::alarms-on-alarm-listener

- id: extension-session-cookie-injection
  desc: Extension replays or injects session cookies
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::cookies-set
  - id: session-cookie-name
  any:
  - id: extension-session-cookie-harvest
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::dnr-cookie-header-mod

- id: extension-security-tool-enumeration
  desc: Extension enumerates installed security or privacy tools
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::management-get-all
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::extension-id-map
  - id: management-id-comparison

- id: extension-admin-page-blocker
  desc: Extension blocks or redirects admin and security pages
  crit: suspicious
  conf: 0.95
  all:
  - id: admin-security-url-targets
  - id: extension-page-block
  any:
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::tabs-update
  - id: objectives/supply-chain/hidden-payload/extensions::extension-dnr-header-bypass

- id: extension-dnr-cookie-injector
  desc: Extension uses DNR to inject Cookie headers
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::declarative-net-request-update
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::dnr-cookie-header-mod
  any:
  - id: session-cookie-name
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::cookies-set

- id: extension-devtools-evasion
  desc: Extension includes DisableDevtool anti-inspection logic
  crit: suspicious
  conf: 0.88
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::disable-devtools-lib
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::chrome-extension-context
- id: admin-security-url-targets
  desc: Targets admin or security pages
  crit: component
  conf: 0.88
  any:
  - id: admin-security-url-targets--rx-1
  - id: admin-security-url-targets--rx-2
  - id: admin-security-url-targets--rx-3
  needs: 1
  unless:
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-filename-pattern

- id: management-id-comparison
  desc: Compares installed extension IDs against hardcoded map
  crit: component
  conf: 0.9
  any:
  - id: management-id-comparison--rx-4
  - id: management-id-comparison--rx-5
  - id: management-id-comparison--rx-6
  - id: management-id-comparison--rx-7
  - id: management-id-comparison--rx-8
  - id: management-id-comparison--rx-9
  - id: management-id-comparison--rx-10
  - id: management-id-comparison--rx-11
  needs: 1
  not:
  - substr: "createCancellationTokenSource("
  - substr: "knownCanceledRequests.has(requestMessage.id)"

