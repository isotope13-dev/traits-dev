defaults:
  platforms: [windows, unix]
  for: [zip, jar]
  attack: T1195.002
traits:
  - id: curseforge-minecraft-modpack-manifest
    desc: CurseForge Minecraft modpack manifest
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: minecraftModpack
  - id: curseforge-overrides-mods-dir
    desc: CurseForge overrides mods directory
    crit: component
    conf: 0.84
    if:
      type: raw
      substr: overrides/mods/
  - id: overrides-mod-jar
    desc: JAR embedded under modpack overrides mods
    crit: component
    conf: 0.86
    if:
      type: raw
      regex: 'overrides/mods/[A-Za-z0-9_.-]{3,80}\.jar'
  - id: fabric-client-mod-manifest
    desc: Fabric client mod manifest
    crit: component
    conf: 0.84
    if:
      type: raw
      regex: 'fabric\.mod\.json.{0,400}"environment"\s*:\s*"client"'
  - id: fabric-client-entrypoint
    desc: Fabric client entrypoint
    crit: component
    conf: 0.84
    if:
      type: raw
      regex: '"entrypoints".{0,240}"client"'
composite_rules:
  - id: curseforge-overrides-hidden-mod
    desc: CurseForge modpack ships a mod through overrides
    crit: notable
    conf: 0.86
    all:
      - id: curseforge-minecraft-modpack-manifest
      - id: curseforge-overrides-mods-dir
      - id: overrides-mod-jar
  - id: curseforge-overrides-fabric-client-mod
    desc: CurseForge overrides include a Fabric client mod
    crit: suspicious
    conf: 0.9
    all:
      - id: curseforge-overrides-hidden-mod
    any:
      - id: fabric-client-mod-manifest
      - id: fabric-client-entrypoint
      - id: objectives/exfiltration/stealer/credential/token::fabric-mod-metadata
    needs: 1
  - id: curseforge-overrides-fabric-dropper
    desc: CurseForge overrides Fabric mod with Java payload dropper
    crit: hostile
    conf: 0.97
    all:
      - id: curseforge-overrides-fabric-client-mod
      - id: objectives/command-and-control/dropper/delivery/download::java-url-temp-exe-cmd-dropper
