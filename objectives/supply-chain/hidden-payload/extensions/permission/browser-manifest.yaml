defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
traits:
- id: permission-all-urls
  desc: Extension requests all-URL access
  crit: notable
  conf: 0.95
  size_min: 128
  not:
  - substr: '"name": "ui-page"'
  unless:
  - id: metadata/package/testing/
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: permissions
    exact: '<all_urls>'
- id: permission-cookies
  desc: Extension requests cookies permission
  crit: notable
  conf: 0.9
  if:
    type: value
    path: permissions
    exact: 'cookies'
- id: permission-history
  desc: Extension requests history permission
  crit: notable
  conf: 0.95
  if:
    type: value
    path: permissions
    exact: 'history'
- id: permission-bookmarks
  desc: Extension requests bookmarks permission
  crit: notable
  conf: 0.9
  if:
    type: value
    path: permissions
    exact: 'bookmarks'
- id: permission-contextual-identities
  desc: "Extension can manage Firefox contextual IDs"
  crit: notable
  conf: 0.94
  if:
    type: value
    path: permissions
    exact: 'contextualIdentities'
- id: permission-geolocation
  desc: Extension requests geolocation permission
  # A lone declared permission is a capability, not intent. Geolocation is less
  # sensitive than cookies/history (both notable) and is common in legitimate
  # map/weather/kiosk extensions; tier with its siblings, not above them.
  crit: notable
  conf: 0.9
  if:
    type: value
    path: permissions
    exact: 'geolocation'
- id: permission-clipboard-read
  desc: Declares clipboardRead permission
  crit: component
  conf: 0.95
  if:
    type: value
    path: permissions
    exact: 'clipboardRead'
- id: permission-clipboard-write
  desc: Declares clipboardWrite permission
  crit: notable
  conf: 0.9
  if:
    type: value
    path: permissions
    exact: 'clipboardWrite'
- id: permission-native-messaging
  desc: Extension uses native messaging
  crit: notable
  conf: 0.95
  if:
    type: value
    path: permissions
    exact: 'nativeMessaging'
- id: permission-debugger
  desc: Uses debugger API
  crit: notable
  conf: 0.98
  if:
    type: value
    path: permissions
    exact: 'debugger'
- id: permission-proxy
  desc: Extension can modify proxy settings
  crit: notable
  conf: 0.95
  if:
    type: value
    path: permissions
    exact: 'proxy'
- id: dnr-enabled-ruleset
  desc: Extension enables DNR ruleset
  crit: notable
  conf: 0.88
  if:
    type: value
    path: declarative_net_request.rule_resources[*].enabled
    exact: 'true'
- id: icon-cookie-stealer-label
  desc: Extension icon labels cookie stealer
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: cookies-stealer
- id: host-all-urls
  desc: Extension has all-URL host access
  crit: notable
  conf: 0.95
  size_min: 320
  not:
  - substr: '"name": "Console Log Extension"'
  unless:
  - id: metadata/package/testing/
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: host_permissions
    exact: '<all_urls>'
- id: host-roblox-sites
  desc: Extension targets Roblox hosts
  crit: notable
  conf: 0.88
  if:
    type: value
    path: host_permissions
    regex: 'roblox\.com'
- id: host-tiktok-sites
  desc: Extension targets TikTok hosts
  crit: notable
  conf: 0.9
  if:
    type: value
    path: host_permissions
    regex: 'tiktok(v|cdn)?\.com'
- id: host-webmail-main
  desc: Extension targets major webmail
  crit: notable
  conf: 0.9
  if:
    type: value
    path: host_permissions
    regex: 'mail\.google\.com|outlook\.(live|office)\.com|mail\.yahoo\.com'
- id: host-webmail-alt
  desc: Extension targets private webmail
  crit: notable
  conf: 0.86
  if:
    type: value
    path: host_permissions
    regex: 'proton\.me|icloud\.com'
- id: host-developer-code-sites
  desc: Extension targets code hosts
  crit: notable
  conf: 0.88
  if:
    type: value
    path: host_permissions
    regex: 'github\.com|gitlab\.com|bitbucket\.org'
- id: host-developer-package-sites
  desc: Extension targets package registries
  crit: notable
  conf: 0.86
  if:
    type: value
    path: host_permissions
    regex: 'npmjs\.com|pypi\.org'
- id: host-payment-processors
  desc: Extension targets payment processors
  crit: notable
  conf: 0.9
  if:
    type: value
    path: host_permissions
    regex: 'stripe\.com|paypal\.com|squareup\.com'
- id: host-commerce-admin
  desc: Extension targets commerce admin
  crit: notable
  conf: 0.88
  if:
    type: value
    path: host_permissions
    regex: 'shopify\.com|sellercentral\.amazon\.com'
- id: host-crypto-finance-major
  desc: Extension targets major exchanges
  crit: notable
  conf: 0.9
  if:
    type: value
    path: host_permissions
    regex: 'coinbase\.com|binance\.com|kraken\.com|okx\.com'
- id: host-crypto-finance-alt
  desc: Extension targets alt exchanges
  crit: notable
  conf: 0.88
  if:
    type: value
    path: host_permissions
    regex: 'bybit\.com|kucoin\.com|mexc\.com|gate\.io'
- id: host-messaging-work-sites
  desc: Extension targets work messaging
  crit: notable
  conf: 0.86
  if:
    type: value
    path: host_permissions
    regex: 'slack\.com|discord\.com|teams\.microsoft\.com|web\.telegram\.org'
- id: content-script-run-at-start
  desc: Content script runs at document_start
  crit: notable
  conf: 0.85
  unless:
  - id: metadata/package/testing/
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: 'content_scripts[*].run_at'
    exact: 'document_start'
- id: content-script-all-frames
  desc: Content script runs in all frames
  crit: notable
  conf: 0.8
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: 'content_scripts[*].all_frames'
    exact: 'true'
- id: content-script-match-about-blank
  desc: Content script runs in about:blank frames
  crit: notable
  conf: 0.84
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: 'content_scripts[*].match_about_blank'
    exact: 'true'
- id: content-script-roblox-sites
  desc: Content script targets Roblox hosts
  crit: notable
  conf: 0.88
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'roblox\.com'
- id: content-script-webmail-main
  desc: Content script targets webmail
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'mail\.google\.com|outlook\.(live|office)\.com|mail\.yahoo\.com'
- id: content-script-webmail-alt
  desc: Content script targets private mail
  crit: notable
  conf: 0.86
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'proton\.me|icloud\.com'
- id: content-script-cloud-docs-google
  desc: Content script targets Google docs
  crit: notable
  conf: 0.88
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'drive\.google\.com|docs\.google\.com'
- id: content-script-cloud-docs-enterprise
  desc: Content script targets SaaS docs
  crit: notable
  conf: 0.88
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'dropbox\.com|onedrive\.live\.com|sharepoint\.com'
- id: content-script-cloud-docs-saas
  desc: Content script targets wiki docs
  crit: notable
  conf: 0.84
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'box\.com|notion\.so'
- id: content-script-developer-code
  desc: Content script targets code hosts
  crit: notable
  conf: 0.88
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'github\.com|gitlab\.com|bitbucket\.org'
- id: content-script-developer-packages
  desc: Content script targets registries
  crit: notable
  conf: 0.86
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'npmjs\.com|pypi\.org'
- id: content-script-payment-processors
  desc: Content script targets payments
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'stripe\.com|paypal\.com|squareup\.com'
- id: content-script-commerce-admin
  desc: Content script targets commerce
  crit: notable
  conf: 0.88
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'shopify\.com|sellercentral\.amazon\.com'
- id: content-script-crypto-major
  desc: Content script targets exchanges
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'coinbase\.com|binance\.com|kraken\.com|okx\.com'
- id: content-script-crypto-alt
  desc: Content script targets alt exchanges
  crit: notable
  conf: 0.88
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'bybit\.com|kucoin\.com|mexc\.com|gate\.io'
- id: content-script-messaging-work
  desc: Content script targets work chat
  crit: notable
  conf: 0.86
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'slack\.com|discord\.com|teams\.microsoft\.com|web\.telegram\.org'
- id: background-persistent
  desc: Extension uses persistent background page
  crit: notable
  conf: 0.85
  unless:
  - id: metadata/package/testing/
  if:
    type: value
    path: 'background.persistent'
    exact: 'true'
- id: host-streaming-services-a
  desc: Targets streaming media hosts (set A)
  crit: notable
  conf: 0.92
  if:
    type: value
    path: host_permissions
    regex: 'netflix\.com|disneyplus\.com|hbomax\.com|hulu\.com'
- id: host-streaming-services-b
  desc: Targets streaming media hosts (set B)
  crit: notable
  conf: 0.92
  if:
    type: value
    path: host_permissions
    regex: 'primevideo\.com|peacocktv\.com|paramountplus\.com|apple\.com'
- id: content-script-streaming-services-a
  desc: Content script targets streaming sites (set A)
  crit: notable
  conf: 0.92
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'netflix\.com|disneyplus\.com|hbomax\.com|hulu\.com'
- id: content-script-streaming-services-b
  desc: Content script targets streaming sites (set B)
  crit: notable
  conf: 0.92
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'primevideo\.com|peacocktv\.com|paramountplus\.com|apple\.com'
- id: update-url-external
  desc: Non-official-store update URL
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: 'update_url'
  unless:
  - id: metadata/permission/manifest::extension-google-update-url
  - id: metadata/permission/manifest::extension-edge-update-url
- id: web-accessible-all-sites
  desc: Extension resources exposed to all sites
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'web_accessible_resources[*].matches'
    regex: '^\*://\*/\*$|^https?://\*/\*$'
- id: web-accessible-all
  desc: Exposes all extension resources
  crit: suspicious
  conf: 0.94
  if:
    type: value
    path: 'web_accessible_resources[*].resources'
    exact: '*'
- id: content-script-social-media-a
  desc: Targets social media domains (Twitter/X)
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: '(^|[/:*.])(twitter|x)\.com'
- id: content-script-social-media-a-meta
  desc: Targets social media domains (Meta)
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: '(^|[/:*.])(facebook|instagram)\.com'
- id: content-script-social-media-b
  desc: Targets social media domains (LinkedIn/Reddit)
  crit: notable
  conf: 0.9
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: '(^|[/:*.])(linkedin|reddit)\.com'
- id: content-script-social-media-b-tiktok
  desc: Targets social media domains (TikTok)
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: '(^|[/:*.])tiktok\.com'
- id: web-accessible-bridge-script
  desc: Exposes extension bridge script
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'web_accessible_resources[*].resources'
    regex: 'bridge(_script)?\.js'
- id: web-accessible-wasm-payload
  desc: Exposes extension WASM payload
  crit: suspicious
  conf: 0.92
  if:
    type: value
    path: 'web_accessible_resources[*].resources'
    regex: '\.wasm$'
- id: web-accessible-postex-script
  desc: Exposes postex extension script
  crit: suspicious
  conf: 0.94
  if:
    type: value
    path: 'web_accessible_resources[*].resources'
    regex: 'post[-_]?ex|postex'
    case_insensitive: true
- id: manifest-cookie-theft-description
  desc: Manifest declares cookie theft purpose
  crit: suspicious
  conf: 0.96
  if:
    type: value
    path: description
    regex: 'cookie theft|session token harvesting|form credential grabbing'
    case_insensitive: true
- id: manifest-dnr-redirect-description
  desc: Manifest declares DNR redirect abuse
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: description
    regex: 'DeclarativeNetRequest rule abuse|traffic redirection'
    case_insensitive: true
- id: manifest-misleading-simple-tool-description
  desc: Extension understates sensitive access
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: description
    regex: 'Counts your open tabs|Simple and minimal|Quick notes'
    case_insensitive: true
- id: manifest-lab-attack-description
  desc: Manifest declares lab attack demo
  crit: suspicious
  conf: 0.94
  if:
    type: value
    path: description
    regex: 'Security research demo|LAB USE ONLY'
    case_insensitive: true
- id: manifest-update-hijack-path
  desc: Manifest in update hijack path
  crit: suspicious
  conf: 0.9
  if:
    type: path
    substr: update-hijack
composite_rules:
- id: extension-lab-attack-manifest
  desc: Extension lab attack manifest
  crit: suspicious
  conf: 0.96
  all:
  - id: manifest-lab-attack-description
  any:
  - id: manifest-cookie-theft-description
  - id: manifest-dnr-redirect-description
  - id: broad-host-permission
  - id: all-site-content-script

- id: extension-lab-postex-wasm-payload
  desc: Extension lab postex WASM payload
  crit: hostile
  conf: 0.98
  all:
  - id: manifest-lab-attack-description
  - id: web-accessible-wasm-payload
  - id: web-accessible-postex-script
  any:
  - id: metadata/permission/manifest::permission-scripting
  - id: metadata/permission/manifest::web-accessible-resources

- id: extension-update-hijack-sensitive-manifest
  desc: Extension update hijack sensitive manifest
  crit: suspicious
  conf: 0.96
  all:
  - id: manifest-update-hijack-path
  - id: manifest-misleading-simple-tool-description
  any:
  - id: permission-cookies
  - id: broad-host-permission

- id: broad-host-permission
  desc: Extension requests broad host access
  crit: notable
  conf: 0.95
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  any:
  - id: host-all-urls
  - id: metadata/permission/host::host-permission-all-http
  - id: metadata/permission/manifest::host-permission-all-urls
- id: all-site-content-script
  desc: Extension injects content across all sites
  crit: notable
  conf: 0.95
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  any:
  - id: metadata/permission/host::content-script-all-urls
  - id: metadata/permission/host::content-script-all-http
- id: content-script-social-media
  desc: Content script targets social media sites
  crit: notable
  conf: 0.9
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  any:
  - id: content-script-social-media-a
  - id: content-script-social-media-a-meta
  - id: content-script-social-media-b
  - id: content-script-social-media-b-tiktok
- id: host-streaming-services
  desc: Extension targets streaming media hosts
  crit: notable
  conf: 0.92
  any:
  - id: host-streaming-services-a
  - id: host-streaming-services-b
- id: content-script-streaming-services
  desc: Content script targets streaming sites
  crit: notable
  conf: 0.92
  any:
  - id: content-script-streaming-services-a
  - id: content-script-streaming-services-b
- id: host-webmail-sites
  desc: Extension targets webmail hosts
  crit: notable
  conf: 0.9
  any:
  - id: host-webmail-main
  - id: host-webmail-alt
- id: host-developer-sites
  desc: Extension targets dev platforms
  crit: notable
  conf: 0.88
  any:
  - id: host-developer-code-sites
  - id: host-developer-package-sites
- id: host-payment-commerce-admin
  desc: Extension targets payment admin
  crit: notable
  conf: 0.9
  any:
  - id: host-payment-processors
  - id: host-commerce-admin
- id: host-crypto-finance-sites
  desc: Extension targets crypto finance
  crit: notable
  conf: 0.9
  any:
  - id: host-crypto-finance-major
  - id: host-crypto-finance-alt
- id: content-script-webmail
  desc: Content script targets webmail
  crit: notable
  conf: 0.9
  any:
  - id: content-script-webmail-main
  - id: content-script-webmail-alt
- id: content-script-cloud-docs
  desc: Content script targets cloud docs
  crit: notable
  conf: 0.88
  any:
  - id: content-script-cloud-docs-google
  - id: content-script-cloud-docs-enterprise
  - id: content-script-cloud-docs-saas
- id: content-script-developer-sites
  desc: Content script targets dev platforms
  crit: notable
  conf: 0.88
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  any:
  - id: content-script-developer-code
  - id: content-script-developer-packages
- id: content-script-payment-admin
  desc: Content script targets payment admin
  crit: notable
  conf: 0.9
  any:
  - id: content-script-payment-processors
  - id: content-script-commerce-admin
- id: content-script-crypto-finance
  desc: Content script targets crypto finance
  crit: notable
  conf: 0.9
  any:
  - id: content-script-crypto-major
  - id: content-script-crypto-alt
- id: overprivileged
  desc: Extension combines broad sensitive permissions
  crit: notable
  conf: 0.9
  needs: 3
  unless:
  - id: metadata/package/testing/
  - id: well-known/app/browser-extension::adblock-extension-bundle
  any:
  - id: permission-all-urls
  - id: host-all-urls
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: metadata/permission/network::network-request-modification
  - id: metadata/permission/active-tab::permission-active-tab
  - id: metadata/permission/network::permission-declarative-net-request
  - id: metadata/permission/identity::identity-get-auth-token
  - id: permission-cookies
  - id: permission-history
  - id: permission-clipboard-read
  - id: permission-native-messaging
  - id: permission-debugger
  - id: permission-proxy
- id: streaming-media-targeting
  desc: Extension targets streaming media accounts
  crit: notable
  conf: 0.94
  any:
  - id: host-streaming-services
  - id: content-script-streaming-services
- id: webmail-targeting
  desc: Extension targets webmail sites
  crit: notable
  conf: 0.9
  any:
  - id: host-webmail-sites
  - id: content-script-webmail
- id: cloud-docs-targeting
  desc: Content scripts access cloud-document hosts
  crit: notable
  conf: 0.88
  all:
  - id: micro-behaviors/os/security/webextension::host-cloud-docs-storage
  - id: content-script-cloud-docs
- id: developer-platform-targeting
  desc: Extension targets developer platforms
  crit: notable
  conf: 0.88
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  any:
  - id: host-developer-sites
  - id: content-script-developer-sites
- id: payment-admin-targeting
  desc: Extension targets payment admin
  crit: notable
  conf: 0.9
  any:
  - id: host-payment-commerce-admin
  - id: content-script-payment-admin
- id: crypto-finance-targeting
  desc: Extension targets crypto finance
  crit: notable
  conf: 0.9
  any:
  - id: host-crypto-finance-sites
  - id: content-script-crypto-finance
  - id: metadata/permission/host::crypto-exchange-sites
- id: work-messaging-targeting
  desc: Extension targets work messaging
  crit: notable
  conf: 0.86
  any:
  - id: host-messaging-work-sites
  - id: content-script-messaging-work
- id: personal-data-targeting
  desc: Extension targets personal data
  crit: notable
  conf: 0.9
  any:
  - id: webmail-targeting
  - id: cloud-docs-targeting
  - id: work-messaging-targeting
- id: financial-dev-targeting
  desc: Extension targets financial/dev sites
  crit: notable
  conf: 0.9
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  any:
  - id: developer-platform-targeting
  - id: payment-admin-targeting
  - id: crypto-finance-targeting
- id: broad-programmatic-injection-permission
  desc: Scripting permission with broad host access
  crit: component
  conf: 0.8
  all:
  - id: metadata/permission/manifest::is-chrome-manifest
  - id: metadata/permission/manifest::permission-scripting
  any:
  - id: permission-all-urls
  - id: host-all-urls
  - id: metadata/permission/host::host-permission-all-http
- id: early-exposed-injection-surface
  desc: Early content injection with exposed resources
  crit: suspicious
  conf: 0.93
  all:
  - id: metadata/permission/manifest::is-chrome-manifest
  - id: content-script-run-at-start
  - id: web-accessible-all
  any:
  - id: metadata/permission/host::content-script-all-urls
  - id: metadata/permission/host::content-script-all-http
  - id: host-all-urls
  - id: metadata/permission/network::network-filtering
- id: data-theft-permissions
  desc: Privacy-sensitive data access permissions
  crit: notable
  conf: 0.95
  all:
  - id: metadata/permission/manifest::is-chrome-manifest
  needs: 2
  any:
  - id: permission-cookies
  - id: permission-history
  - id: permission-clipboard-read
  - id: metadata/permission/network::network-request-modification
- id: deprecated-with-dangerous
  desc: MV2 extension with dangerous permissions
  crit: notable
  conf: 0.9
  all:
  - id: metadata/permission/manifest::manifest-v2
  unless:
  - id: metadata/package/testing/
  - id: well-known/app/browser-extension::adblock-extension-bundle
  any:
  - id: permission-all-urls
  - id: host-all-urls
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: metadata/permission/network::network-request-modification
  - id: permission-debugger
- id: all-url-request-download-extension
  desc: All-URL request interception with downloads
  crit: notable
  conf: 0.92
  all:
