defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
traits:
- id: permission-contextual-identities
  desc: "Extension can manage Firefox contextual IDs"
  crit: notable
  conf: 0.94
  if:
    type: value
    path: permissions
    exact: 'contextualIdentities'
- id: permission-geolocation
  desc: Extension requests geolocation permission
  # A lone declared permission is a capability, not intent. Geolocation is less
  # sensitive than cookies/history (both notable) and is common in legitimate
  # map/weather/kiosk extensions; tier with its siblings, not above them.
  crit: notable
  conf: 0.9
  if:
    type: value
    path: permissions
    exact: 'geolocation'
- id: icon-cookie-stealer-label
  desc: Extension icon labels cookie stealer
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: cookies-stealer
- id: host-roblox-sites
  desc: Extension targets Roblox hosts
  crit: notable
  conf: 0.88
  if:
    type: value
    path: host_permissions
    regex: 'roblox\.com'
- id: host-webmail-main
  desc: Extension targets major webmail
  crit: notable
  conf: 0.9
  if:
    type: value
    path: host_permissions
    regex: 'mail\.google\.com|outlook\.(live|office)\.com|mail\.yahoo\.com'
- id: host-webmail-alt
  desc: Extension targets private webmail
  crit: notable
  conf: 0.86
  if:
    type: value
    path: host_permissions
    regex: 'proton\.me|icloud\.com'
- id: host-payment-processors
  desc: Extension targets payment processors
  crit: notable
  conf: 0.9
  if:
    type: value
    path: host_permissions
    regex: 'stripe\.com|paypal\.com|squareup\.com'
- id: host-commerce-admin
  desc: Extension targets commerce admin
  crit: notable
  conf: 0.88
  if:
    type: value
    path: host_permissions
    regex: 'shopify\.com|sellercentral\.amazon\.com'
- id: host-crypto-finance-major
  desc: Extension targets major exchanges
  crit: notable
  conf: 0.9
  if:
    type: value
    path: host_permissions
    regex: 'coinbase\.com|binance\.com|kraken\.com|okx\.com'
- id: host-crypto-finance-alt
  desc: Extension targets alt exchanges
  crit: notable
  conf: 0.88
  if:
    type: value
    path: host_permissions
    regex: 'bybit\.com|kucoin\.com|mexc\.com|gate\.io'
- id: host-messaging-work-a
  desc: Extension targets team-chat hosts
  crit: notable
  conf: 0.86
  if:
    type: value
    path: host_permissions
    regex: '^(https?|\*)://(\*\.)?(slack\.com|discord\.com|teams\.microsoft\.com)/\*$'
- id: host-messaging-work-b
  desc: Extension targets IM web-app hosts
  crit: notable
  conf: 0.86
  if:
    type: value
    path: host_permissions
    regex: 'web\.telegram\.org|web\.whatsapp\.com'
- id: content-script-roblox-sites
  desc: Content script targets Roblox hosts
  crit: notable
  conf: 0.88
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'roblox\.com'
- id: content-script-webmail-main
  desc: Content script targets webmail
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'mail\.google\.com|outlook\.(live|office)\.com|mail\.yahoo\.com'
- id: content-script-webmail-alt
  desc: Content script targets private mail
  crit: notable
  conf: 0.86
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'proton\.me|icloud\.com'
- id: content-script-cloud-docs-google
  desc: Content script targets Google docs
  crit: notable
  conf: 0.88
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'drive\.google\.com|docs\.google\.com'
- id: content-script-cloud-docs-enterprise
  desc: Content script targets SaaS docs
  crit: notable
  conf: 0.88
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'dropbox\.com|onedrive\.live\.com|sharepoint\.com'
- id: content-script-cloud-docs-saas
  desc: Content script targets wiki docs
  crit: notable
  conf: 0.84
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'box\.com|notion\.so'
- id: content-script-payment-processors
  desc: Content script targets payments
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'stripe\.com|paypal\.com|squareup\.com'
- id: content-script-commerce-admin
  desc: Content script targets commerce
  crit: notable
  conf: 0.88
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'shopify\.com|sellercentral\.amazon\.com'
- id: content-script-crypto-major
  desc: Content script targets exchanges
  crit: notable
  conf: 0.9
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'coinbase\.com|binance\.com|kraken\.com|okx\.com'
- id: content-script-crypto-alt
  desc: Content script targets alt exchanges
  crit: notable
  conf: 0.88
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'bybit\.com|kucoin\.com|mexc\.com|gate\.io'
- id: content-script-messaging-work-a
  desc: Content script targets team chat
  crit: notable
  conf: 0.86
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'slack\.com|discord\.com|teams\.microsoft\.com'
- id: content-script-messaging-work-b
  desc: Content script targets IM web apps
  crit: notable
  conf: 0.86
  if:
    type: value
    path: 'content_scripts[*].matches'
    regex: 'web\.telegram\.org|web\.whatsapp\.com'
- id: update-url-external
  desc: Non-official-store update URL
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: 'update_url'
  unless:
  - id: metadata/permission/manifest::extension-google-update-url
  - id: metadata/permission/manifest::extension-edge-update-url
- id: web-accessible-postex-script
  desc: Exposes postex extension script
  crit: suspicious
  conf: 0.94
  if:
    type: value
    path: 'web_accessible_resources[*].resources'
    regex: 'post[-_]?ex|postex'
    case_insensitive: true
- id: manifest-cookie-theft-description
  desc: Manifest declares cookie theft purpose
  crit: suspicious
  conf: 0.96
  if:
    type: value
    path: description
    regex: 'cookie theft|session token harvesting|form credential grabbing'
    case_insensitive: true
- id: manifest-dnr-redirect-description
  desc: Manifest declares DNR redirect abuse
  crit: suspicious
  conf: 0.95
  if:
    type: value
    path: description
    regex: 'DeclarativeNetRequest rule abuse|traffic redirection'
    case_insensitive: true
- id: manifest-misleading-simple-tool-description
  desc: Extension understates sensitive access
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: description
    regex: 'Counts your open tabs|Simple and minimal|Quick notes'
    case_insensitive: true
- id: manifest-lab-attack-description
  desc: Manifest declares lab attack demo
  crit: suspicious
  conf: 0.94
  if:
    type: value
    path: description
    regex: 'Security research demo|LAB USE ONLY'
    case_insensitive: true
- id: manifest-update-hijack-path
  desc: Manifest in update hijack path
  crit: suspicious
  conf: 0.9
  if:
    type: path
    substr: update-hijack
composite_rules:
- id: extension-lab-attack-manifest
  desc: Extension lab attack manifest
  crit: suspicious
  conf: 0.96
  all:
  - id: manifest-lab-attack-description
  any:
  - id: manifest-cookie-theft-description
  - id: manifest-dnr-redirect-description
  - id: metadata/permission/host::broad-host-access
  - id: micro-behaviors/process/inject/webextension::broad-content-script-injection

- id: extension-lab-postex-wasm-payload
  desc: Extension lab postex WASM payload
  crit: hostile
  conf: 0.98
  all:
  - id: manifest-lab-attack-description
  - id: metadata/permission/extension-api::web-accessible-wasm-resource
  - id: web-accessible-postex-script
  any:
  - id: metadata/permission/manifest::permission-scripting
  - id: metadata/permission/manifest::web-accessible-resources

- id: extension-update-hijack-sensitive-manifest
  desc: Extension update hijack sensitive manifest
  crit: suspicious
  conf: 0.96
  all:
  - id: manifest-update-hijack-path
  - id: manifest-misleading-simple-tool-description
  any:
  - id: metadata/permission/cookie::permission-cookies
  - id: metadata/permission/host::broad-host-access

- id: host-webmail-sites
  desc: Extension targets webmail hosts
  crit: notable
  conf: 0.9
  any:
  - id: host-webmail-main
  - id: host-webmail-alt
- id: host-payment-commerce-admin
  desc: Extension targets payment admin
  crit: notable
  conf: 0.9
  any:
  - id: host-payment-processors
  - id: host-commerce-admin
- id: host-crypto-finance-sites
  desc: Extension targets crypto finance
  crit: notable
  conf: 0.9
  any:
  - id: host-crypto-finance-major
  - id: host-crypto-finance-alt
- id: content-script-webmail
  desc: Content script targets webmail
  crit: notable
  conf: 0.9
  any:
  - id: content-script-webmail-main
  - id: content-script-webmail-alt
- id: content-script-cloud-docs
  desc: Content script targets cloud docs
  crit: notable
  conf: 0.88
  any:
  - id: content-script-cloud-docs-google
  - id: content-script-cloud-docs-enterprise
  - id: content-script-cloud-docs-saas
- id: content-script-payment-admin
  desc: Content script targets payment admin
  crit: notable
  conf: 0.9
  any:
  - id: content-script-payment-processors
  - id: content-script-commerce-admin
- id: content-script-crypto-finance
  desc: Content script targets crypto finance
  crit: notable
  conf: 0.9
  any:
  - id: content-script-crypto-major
  - id: content-script-crypto-alt
- id: webmail-targeting
  desc: Extension targets webmail sites
  crit: notable
  conf: 0.9
  any:
  - id: host-webmail-sites
  - id: content-script-webmail
- id: cloud-docs-targeting
  desc: Content scripts access cloud-document hosts
  crit: notable
  conf: 0.88
  all:
  - id: micro-behaviors/os/security/webextension::host-cloud-docs-storage
  - id: content-script-cloud-docs
- id: payment-admin-targeting
  desc: Extension targets payment admin
  crit: notable
  conf: 0.9
  any:
  - id: host-payment-commerce-admin
  - id: content-script-payment-admin
- id: crypto-finance-targeting
  desc: Extension targets crypto finance
  crit: notable
  conf: 0.9
  any:
  - id: host-crypto-finance-sites
  - id: content-script-crypto-finance
  - id: metadata/permission/host::crypto-exchange-sites
- id: host-messaging-work-sites
  desc: Extension targets messaging web apps
  crit: notable
  conf: 0.86
  any:
  - id: host-messaging-work-a
  - id: host-messaging-work-b
- id: content-script-messaging-work
  desc: Content script targets messaging apps
  crit: notable
  conf: 0.86
  any:
  - id: content-script-messaging-work-a
  - id: content-script-messaging-work-b
- id: work-messaging-targeting
  desc: Extension targets messaging web apps
  crit: notable
  conf: 0.86
  any:
  - id: host-messaging-work-sites
  - id: content-script-messaging-work
- id: personal-data-targeting
  desc: Extension targets personal data
  crit: notable
  conf: 0.9
  any:
  - id: webmail-targeting
  - id: cloud-docs-targeting
  - id: work-messaging-targeting
- id: financial-dev-targeting
  desc: Extension targets multiple financial or developer categories
  crit: suspicious
  conf: 0.9
  scope: archive
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  - id: well-known/app/onekeypass::manifest-identity
  - id: ad-measurement-extension-context
  needs: 2
  any:
  - id: metadata/permission/host::developer-platform-targeting
  - id: payment-admin-targeting
  - id: crypto-finance-targeting
- id: ad-measurement-extension-context
  desc: Ad measurement extension with declarative filtering
  crit: exception
  conf: 0.94
  all:
  - id: metadata/permission/manifest::description-ad-carbon-measurement
  - id: metadata/permission/network::network-filtering
- id: early-exposed-injection-surface
  desc: Early content injection with exposed resources
  crit: suspicious
  conf: 0.93
  all:
  - id: metadata/permission/manifest::is-chrome-manifest
  - id: metadata/permission/activation::content-script-run-at-start
  - id: metadata/permission/extension-api::wildcard-resources
  any:
  - id: metadata/permission/host::content-script-all-urls
  - id: metadata/permission/host::content-script-all-http
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: metadata/permission/network::network-filtering
  unless:
  - id: well-known/app/ruffle::ruffle-extension-context
- id: crypto-social-media-injection
  desc: Crypto extension injects into social media
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/permission/host::content-script-social-media
  any:
  - id: metadata/permission/manifest::crypto-finance-name
  - id: metadata/permission/manifest::crypto-finance-description
- id: tiktok-network-injection
  desc: TikTok injection with network controls
  crit: suspicious
  conf: 0.92
  all:
  - id: metadata/permission/host::host-permission-tiktok-sites
  - id: micro-behaviors/process/inject/webextension::content-script-all-frames
  - id: metadata/permission/network::network-request-modification
- id: tiktok-bridge-network-extension
  desc: TikTok bridge extension with request controls
  crit: hostile
  conf: 0.96
  all:
  - id: metadata/permission/host::host-permission-tiktok-sites
  - id: metadata/permission/host::content-script-social-tiktok
  - id: micro-behaviors/process/inject/webextension::content-script-all-frames
  - id: micro-behaviors/process/inject/webextension::web-accessible-bridge-script
  any:
  - id: metadata/permission/network::web-request
  - id: metadata/permission/network::declarative-net-request-with-host
  - id: metadata/permission/network::dnr-enabled-ruleset
- id: all-url-cookie-all-frame-bridge
  desc: All-URL cookie-capable all-frame extension
  crit: notable
  conf: 0.92
  all:
  - id: metadata/permission/manifest::is-chrome-manifest
  - id: metadata/permission/cookie::permission-cookies
  - id: metadata/permission/manifest::background-service-worker
  - id: micro-behaviors/process/inject/webextension::content-script-all-frames
  - id: metadata/permission/extension-api::all-site-resources
  unless:
  - id: well-known/app/browser-extension-known/
  - id: metadata/package/testing/
  - id: well-known/app/keepassxc-browser::source-extension
  - id: well-known/app/did-wallet::did-wallet-extension-context
  any:
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: metadata/permission/host::host-permission-all-http
  - id: metadata/permission/manifest::host-permission-all-urls
- id: all-url-about-blank-dnr-injection
  desc: All-URL about:blank frame DNR injection
  crit: notable
  conf: 0.94
  all:
  - id: metadata/permission/host::broad-host-access
  - id: micro-behaviors/process/inject/webextension::broad-content-script-injection
  - id: metadata/permission/activation::content-script-run-at-start
  - id: micro-behaviors/process/inject/webextension::content-script-all-frames
  - id: metadata/permission/activation::content-script-match-about-blank
  any:
  - id: metadata/permission/network::declarative-net-request-with-host
  - id: metadata/permission/manifest::permission-scripting
  - id: metadata/permission/network::dnr-enabled-ruleset
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
- id: roblox-dnr-content-injection
  desc: Roblox content injection with DNR controls
  crit: suspicious
  conf: 0.9
  all:
  - id: host-roblox-sites
  - id: content-script-roblox-sites
  - id: metadata/permission/manifest::permission-scripting
  any:
  - id: metadata/permission/network::declarative-net-request-with-host
  - id: metadata/permission/network::dnr-enabled-ruleset
  - id: micro-behaviors/process/inject/webextension::content-script-all-frames
- id: roblox-extension-exfil-ad-injection
  desc: Browser extension injects Roblox content with exfil or ad abuse
  crit: hostile
  conf: 0.96
  scope: archive
  for: [chrome-manifest, crx, archives]
  all:
  - id: roblox-dnr-content-injection
  any:
  - id: objectives/supply-chain/trojanized/app/package::suspicious-stealer-discovery
  - id: objectives/impact/ui/delivery
  needs: 2
- id: all-url-capture-request-extension
  desc: All-URL capture extension with request access
  crit: hostile
  conf: 0.95
  all:
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: metadata/permission/capture::permission-tab-capture
  - id: metadata/permission/network::web-request
  - id: metadata/permission/manifest::background-service-worker
  any:
  - id: metadata/permission/extension-api::all-site-resources
  - id: metadata/permission/manifest::permission-tabs
- id: dnr-redirect-all-url-ruleset
  desc: All-URL DNR redirect ruleset extension
  crit: hostile
  conf: 0.96
  all:
  - id: manifest-dnr-redirect-description
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: metadata/permission/network::declarative-net-request-with-host
  - id: metadata/permission/network::dnr-enabled-ruleset
- id: manifest-declared-credential-theft-extension
  desc: Manifest declares credential or session theft extension
  crit: hostile
  conf: 0.97
  all:
  - id: manifest-cookie-theft-description
  any:
  - id: metadata/permission/cookie::permission-cookies
  - id: metadata/permission/host::content-script-all-urls
  - id: metadata/permission/manifest::host-permission-all-urls
  - id: micro-behaviors/process/inject/webextension::content-script-all-frames
- id: sensitive-network-injection
  desc: Sensitive site network injection
  crit: notable
  conf: 0.92
  all:
  - id: metadata/permission/network::network-request-modification
  unless:
  - id: well-known/app/browser-extension::adblock-extension-bundle
  any:
  - id: personal-data-targeting
  - id: financial-dev-targeting
- id: ecommerce-network-injection
  desc: E-commerce site network injection
  crit: notable
  conf: 0.9
  all:
  - id: metadata/permission/network::network-request-modification
  - id: metadata/permission/host::ecommerce-targeting
- id: exposed-sensitive-bridge
  desc: Sensitive site exposes bridge
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/process/inject/webextension::web-accessible-bridge-script
  any:
  - id: personal-data-targeting
  - id: payment-admin-targeting
  - id: crypto-finance-targeting
  - id: metadata/permission/host::ecommerce-targeting
- id: fake-adblocker-mv3
  desc: Claims ad blocking without declarativeNetRequest
  crit: suspicious
  conf: 0.95
  all:
  - id: metadata/permission/manifest::manifest-v3
  - id: metadata/permission/host::ecommerce-targeting
  any:
  - id: metadata/permission/manifest::adblocker-name
  - id: metadata/permission/manifest::adblocker-description
  unless:
  - id: metadata/permission/network/
- id: crypto-api-theft-target
  desc: Extension targets crypto exchange API key pages
  crit: hostile
  conf: 0.95
  all:
  # The crypto-exchange gate is what turns a generic account/settings page
  # match into an API-key-page match: that is where exchanges issue keys.
  - id: metadata/permission/host::crypto-exchange-sites
  - id: metadata/permission/host::account-settings-pages
  any:
  - id: metadata/permission/manifest::permission-scripting
  - id: metadata/permission/active-tab::permission-active-tab
  - id: metadata/permission/network::network-request-modification
