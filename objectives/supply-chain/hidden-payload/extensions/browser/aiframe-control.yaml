    type: text
    substr: none
  count_max: 1029580
- id: shadow-dom-iframe--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (attachShadow|\.shadowRoot)[\s\S]{0,700}iframe
  count_max: 1029581
- id: shadow-dom-iframe--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: iframe[\s\S]{0,700}(attachShadow|\.shadowRoot)
  count_max: 1029582
- id: iframe-paywall-path
  desc: Remote paywall iframe path
  crit: component
  conf: 0.9
  if:
    type: text
    regex: /paywall/\d{2,6}
- id: postmessage-listener
  desc: Window postMessage listener
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: addEventListener\(['"]message['"]
- id: postmessage-to-iframe
  desc: Sends postMessage to iframe
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: (contentWindow|iframe\.contentWindow)[\s\S]{0,160}\.postMessage\s*\(
- id: message-origin-validation--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.origin\s*={2,3}\s*['"]https?://
  count_max: 1029586
- id: message-origin-validation--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.82
