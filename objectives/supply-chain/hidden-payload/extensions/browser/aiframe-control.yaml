defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002
traits:
- id: runtime-onmessage-accept-all
  desc: Extension message listener accepts all
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: runtime\.onMessage\.addListener\s*\(\s*\(.{0,80}\)\s*=>\s*(!0|true)
- id: hidden-zero-iframe--rx-2
  desc: 'display:none CSS declaration (hides element)'
  crit: component
  conf: 0.9
  unless:
  - id: metadata/file/extension::css-extension
  if:
    type: text
    regex: \bdisplay\s*:\s*none\b
- id: hidden-zero-iframe--rx-3
  desc: 'opacity:0 CSS declaration (visually hides element)'
  crit: component
  conf: 0.9
  unless:
  - id: metadata/file/extension::css-extension
  if:
    type: text
    regex: \bopacity\s*:\s*0\b
- id: hidden-zero-iframe--rx-7
  desc: 'visibility:hidden CSS declaration'
  crit: component
  conf: 0.9
  unless:
  - id: metadata/file/extension::css-extension
  if:
    type: text
    regex: \bvisibility\s*:\s*hidden\b
- id: shadow-dom-iframe--rx-8
  desc: 'attachShadow/.shadowRoot followed by iframe'
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (attachShadow|\.shadowRoot)[\s\S]{0,700}iframe
- id: shadow-dom-iframe--rx-9
  desc: 'iframe followed by attachShadow/.shadowRoot'
  crit: component
  conf: 0.92
  if:
    type: text
    regex: iframe[\s\S]{0,700}(attachShadow|\.shadowRoot)
- id: iframe-paywall-path
  desc: Remote paywall iframe path
  crit: component
  conf: 0.9
  if:
    type: text
    regex: /paywall/\d{2,6}
# NOTE: postMessage sender/receiver traits live in
# micro-behaviors/communications/ipc/message. They are neutral capabilities
# used by normal pages, workers, iframes, and extensions.
- id: message-origin-validation--rx-10
  desc: 'event.origin === "https?://..." string compare'
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.origin\s*={2,3}\s*['"]https?://
- id: message-origin-validation--rx-11
  desc: 'event.origin !== "https?://..." string compare'
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.origin\s*!={1,2}\s*['"]https?://
- id: message-origin-validation--rx-12
  desc: allowedOrigins.includes(event.origin) check
  crit: component
  conf: 0.82
  if:
    type: text
    regex: allowedOrigins?\.includes\(.{0,80}\.origin
- id: extension-local-ui-iframe-prompt-src
  desc: iframe.src points to extension prompt.html
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'iframe\.src\s*=\s*.{0,80}runtime\.getURL\(["'']prompt\.html["'']\)'
- id: extension-local-ui-iframe-savebar-src
  desc: iframe.src points to extension savebar.html
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'iframe\.src\s*=\s*.{0,80}runtime\.getURL\(["'']savebar\.html["'']\)'
- id: extension-local-ui-passa-marker
  desc: PASSA prompt or bar marker constant
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '\b(PASSA_PROMPT|PASSA_BAR|extensionOrigin)\b'
- id: extension-origin-slice
  desc: runtime.getURL empty path slice trick
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'runtime\.getURL\(["''][''"]\)\.slice\(0,\s*-1\)'
- id: extension-storage-proxy-ops--rx-13
  desc: chrome.storage namespace access
  crit: component
  conf: 0.9
  if:
    type: symbol
    regex: ^chrome\.storage
- id: extension-storage-proxy-ops--rx-14
  desc: chrome.storage.(local|sync).remove call
  crit: component
  conf: 0.9
  if:
    type: text
    regex: chrome\.storage\.(local|sync)\.remove
- id: extension-storage-proxy-ops--rx-15
  desc: chrome.storage.local API access
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \bchrome\.storage\.local\b
- id: extension-storage-proxy-ops--rx-16
  desc: chrome.storage.sync API access
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \bchrome\.storage\.sync\b
- id: storage-proxy-command-words--rx-17
  desc: 'storageGet/storageSet command words'
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: \b(storageGet|storageSet)\b
- id: storage-proxy-command-words--rx-18
  desc: storageRemove/storageDelete command words (>=3)
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: \b(storageRemove|storageDelete)\b
- id: storage-proxy-command-words--rx-19
  desc: getStorage/setStorage command words (>=3)
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: \b(getStorage|setStorage)\b
- id: storage-proxy-command-words--rx-20
  desc: removeStorage/deleteStorage command words (>=3)
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: \b(removeStorage|deleteStorage)\b
# `chrome.debugger.attach` is a neutral capability that lives in
# micro-behaviors/process/attach/webextension::chrome-debugger-attach; the
# extension-debugger-pdf-capture composite below references it cross-tier
# instead of re-declaring a suspicious objective atom that surfaced standalone
# on legitimate Chrome-automation tools.
- id: debugger-print-to-pdf
  desc: Debugger Page.printToPDF call
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: Page.printToPDF
  unless:
  - type: text
    regex: 'node_modules/\.pnpm/puppeteer(-core)?@|puppeteer-core/lib/.{0,80}/puppeteer/cdp/'
- id: ai-chat-dom-scrape--rx-21
  desc: 'ai chat dom scrape rx 21'
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (chatgpt|claude)[\s\S]{0,500}(MutationObserver|querySelectorAll)
- id: ai-chat-dom-scrape--rx-22
  desc: 'ai chat dom scrape rx 22'
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (gemini|copilot)[\s\S]{0,500}(MutationObserver|querySelectorAll)
- id: ai-chat-dom-scrape--rx-23
  desc: 'ai chat dom scrape rx 23'
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (perplexity|poe\.com)[\s\S]{0,500}(MutationObserver|querySelectorAll)
- id: ai-chat-dom-scrape--rx-24
  desc: 'ai chat dom scrape rx 24'
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (character\.ai|data-message-author-role)[\s\S]{0,500}(MutationObserver|querySelectorAll)
- id: ai-chat-dom-scrape--rx-25
  desc: 'ai chat dom scrape rx 25'
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (conversation-turn)[\s\S]{0,500}(MutationObserver|querySelectorAll)
- id: ai-chat-dom-scrape--rx-26
  desc: 'ai chat dom scrape rx 26'
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (MutationObserver|querySelectorAll)[\s\S]{0,500}(chatgpt|claude)
- id: ai-chat-dom-scrape--rx-27
  desc: 'ai chat dom scrape rx 27'
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (MutationObserver|querySelectorAll)[\s\S]{0,500}(gemini|copilot)
- id: ai-chat-dom-scrape--rx-28
  desc: 'ai chat dom scrape rx 28'
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (MutationObserver|querySelectorAll)[\s\S]{0,500}(perplexity|poe\.com)
- id: ai-chat-dom-scrape--rx-29
  desc: 'ai chat dom scrape rx 29'
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (MutationObserver|querySelectorAll)[\s\S]{0,500}(character\.ai|data-message-author-role)
- id: ai-chat-dom-scrape--rx-30
  desc: 'ai chat dom scrape rx 30'
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (MutationObserver|querySelectorAll)[\s\S]{0,500}(conversation-turn)
composite_rules:
- id: extension-sleeper-message-scaffold
  desc: Dormant extension message scaffold
  crit: suspicious
  conf: 0.95
  all:
  - id: runtime-onmessage-accept-all
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::chrome-extension-context
- id: extension-hidden-iframe-message-channel
  desc: Extension hidden iframe message channel
  crit: suspicious
  conf: 0.92
  unless:
  - id: extension-local-ui-iframe
  - id: extension-local-ui-passa-marker
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::chrome-extension-context
  - id: hidden-zero-iframe
  - id: micro-behaviors/communications/ipc/message::postmessage-listener
  - id: micro-behaviors/communications/ipc/message::postmessage-to-iframe
  any:
  - id: iframe-paywall-path
  - id: shadow-dom-iframe
  - id: message-origin-validation
- id: extension-shadow-iframe-message-channel
  desc: Shadow DOM iframe message channel
  crit: suspicious
  conf: 0.92
  unless:
  - id: extension-local-ui-iframe
  - id: extension-local-ui-passa-marker
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::chrome-extension-context
  - id: shadow-dom-iframe
  - id: micro-behaviors/communications/ipc/message::postmessage-listener
  any:
  - id: iframe-paywall-path
  - id: micro-behaviors/communications/ipc/message::postmessage-to-iframe
  - id: message-origin-validation
- id: extension-remote-storage-proxy
  desc: Extension storage remote-control proxy
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::chrome-extension-context
  - id: extension-storage-proxy-ops
  - id: storage-proxy-command-words
  - id: micro-behaviors/communications/ipc/message::postmessage-listener
  any:
  - id: message-origin-validation
  - id: micro-behaviors/communications/ipc/message::postmessage-to-iframe
  - id: micro-behaviors/communications/http/request/client::fetch-string
- id: extension-debugger-pdf-capture
  desc: Extension captures page via debugger
  crit: suspicious
  conf: 0.94
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::chrome-extension-context
  - id: micro-behaviors/process/attach/webextension::chrome-debugger-attach
  - id: debugger-print-to-pdf
  any:
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-query
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-update
  - id: ai-chat-dom-scrape
- id: extension-ai-chat-monitor
  desc: Extension monitors AI chat DOM
  crit: suspicious
  conf: 0.94
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::chrome-extension-context
  - id: ai-chat-dom-scrape
  any:
  - id: micro-behaviors/communications/ipc/message::chrome-runtime-send-message
  - id: objectives/impact/ui/delivery::dom-mutation-observer
- id: extension-ai-chat-exfil
  desc: Extension scrapes AI chat and rewrites CORS for cross-origin exfil
  crit: hostile
  conf: 0.95
  # A content script that scrapes AI chat conversation DOM AND builds a
  # declarativeNetRequest rule rewriting Access-Control-Allow-Origin is
  # exfiltrating those conversations cross-origin (the koi AI-chat-stealer
  # campaign). A legitimate AI tool that reads its own page never needs to
  # forge CORS response headers. scope: outer pools evidence across the
  # extension's bundled scripts.
  scope: outer
  all:
  - id: ai-chat-dom-scrape
  - id: micro-behaviors/communications/http/headers::dnr-cors-origin-rewrite
- id: vscode-chat-cookie-file-exfil
  desc: VS Code chat cookie file exfiltration
  crit: hostile
  conf: 0.98
  near_bytes: 8192
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::chrome-extension-context
  - id: objectives/supply-chain/hidden-payload/extensions/browser::cookie-domain-filter
  - id: objectives/credential-access/files/config::node-project-secret-file-targets
  any:
  - id: debugger-print-to-pdf
  - id: micro-behaviors/communications/http/headers::file-upload-headers
  - id: micro-behaviors/communications/http/upload::form-data-append
- id: hidden-zero-iframe
  desc: Hidden iframe reference
  crit: component
  conf: 0.9
  all:
  - id: micro-behaviors/ui/window/manage/dom::browser-iframe-element
  any:
  - id: hidden-zero-iframe--rx-2
  - id: hidden-zero-iframe--rx-3
  - id: hidden-zero-iframe--rx-7
- id: shadow-dom-iframe
  desc: Shadow DOM iframe hiding
  crit: component
  conf: 0.92
  any:
  - id: shadow-dom-iframe--rx-8
  - id: shadow-dom-iframe--rx-9
- id: message-origin-validation
  desc: Validates postMessage origin
  crit: notable
  conf: 0.82
  any:
  - id: message-origin-validation--rx-10
  - id: message-origin-validation--rx-11
  - id: message-origin-validation--rx-12
- id: extension-storage-proxy-ops
  desc: Multiple extension storage operations
  crit: notable
  conf: 0.9
  any:
  - id: extension-storage-proxy-ops--rx-13
  - id: extension-storage-proxy-ops--rx-14
  - id: extension-storage-proxy-ops--rx-15
  - id: extension-storage-proxy-ops--rx-16
- id: storage-proxy-command-words
  desc: Storage proxy command words
  crit: component
  conf: 0.86
  any:
  - id: storage-proxy-command-words--rx-17
  - id: storage-proxy-command-words--rx-18
  - id: storage-proxy-command-words--rx-19
  - id: storage-proxy-command-words--rx-20
- id: extension-local-ui-iframe
  desc: Extension local UI iframe with PASSA marker
  crit: component
  conf: 0.88
  near_bytes: 1800
  all:
  - id: extension-local-ui-passa-marker
  any:
  - id: extension-local-ui-iframe-prompt-src
  - id: extension-local-ui-iframe-savebar-src
  - id: extension-origin-slice
- id: ai-chat-dom-scrape
  desc: AI chat DOM scraping
  crit: component
  conf: 0.88
  any:
  - id: ai-chat-dom-scrape--rx-21
  - id: ai-chat-dom-scrape--rx-22
  - id: ai-chat-dom-scrape--rx-23
  - id: ai-chat-dom-scrape--rx-24
  - id: ai-chat-dom-scrape--rx-25
  - id: ai-chat-dom-scrape--rx-26
  - id: ai-chat-dom-scrape--rx-27
  - id: ai-chat-dom-scrape--rx-28
  - id: ai-chat-dom-scrape--rx-29
  - id: ai-chat-dom-scrape--rx-30
