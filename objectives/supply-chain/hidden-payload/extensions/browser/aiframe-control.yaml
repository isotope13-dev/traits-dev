defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002
traits:
- id: runtime-onmessage-accept-all
  desc: Extension message listener accepts all
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: runtime\.onMessage\.addListener\s*\(\s*\(.{0,80}\)\s*=>\s*(!0|true)
- id: hidden-zero-iframe--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: display
  count_max: 1029575
- id: hidden-zero-iframe--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: opacity
  count_max: 1029576
- id: hidden-zero-iframe--rx-7
