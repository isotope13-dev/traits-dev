defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
- id: session-cookie-name
  desc: Targets __session cookie name
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: "['\\\"]__session['\\\"]"

- id: cookie-domain-filter
  desc: Filters cookies by domain
  crit: component
  conf: 0.82
  if:
    type: text
    regex: "domain\\s*:\\s*['\\\"][A-Za-z0-9._-]+\\.[A-Za-z]{2,}['\\\"]"

- id: admin-security-url-targets--rx-1
  desc: '"/admin" or "/security" URL path (>=3 occurrences)'
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: /\/(admin|security)\b
- id: admin-security-url-targets--rx-2
  desc: '"/mfa" or "/sso" URL path (>=3 occurrences)'
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: /\/(mfa|sso)\b
- id: admin-security-url-targets--rx-3
  desc: '"/okta" URL path (>=3 occurrences)'
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: /\/(okta)\b
- id: extension-page-block
  desc: innerHTML/location.href rewrite (page blocker shape)
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (innerHTML\s*=\s*['"]{0,1}\s*['"]|location\.(href|replace)|document\.body\.innerHTML\s*=)

- id: management-id-comparison--rx-4
  desc: chrome.management.* API access (extension enumeration)
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \bchrome\.management\.
- id: management-id-comparison--rx-5
  desc: extensionId / extensionIds / extensionMap identifier
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \bextension(Id|Ids|Map)\b
- id: management-id-comparison--rx-7
  desc: browser.management.* API access (Firefox/MV3)
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \bbrowser\.management\.
- id: management-id-comparison--rx-8
  desc: '.indexOf() call against extension/id identifier'
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(ext|id|extension|installed)\w*\.indexOf\s*\(
- id: management-id-comparison--rx-9
  desc: chrome.management.getAll(...) callback iterating extensions
  crit: component
  conf: 0.9
  if:
    type: text
    regex: chrome\.management\.getAll\s*\(
- id: management-id-comparison--rx-10
  desc: plugin/addon vocabulary in extension-enum context
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(plugin|addon)\.(id|name|type)\b
- id: management-id-comparison--rx-11
  desc: '"addon" Firefox WebExtension identifier'
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \baddon\.(getAll|id|name|enabled)\b
composite_rules:
- id: extension-session-cookie-harvest
  desc: Extension harvests session cookies for remote reporting
  crit: suspicious
  conf: 0.96
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::cookies-get-all
  - id: session-cookie-name
  any:
  - id: micro-behaviors/communications/http/request/client::fetch-string
  - id: micro-behaviors/communications/http/request/client::request-import
  - id: cookie-domain-filter

- id: extension-session-cookie-monitor
  desc: Extension monitors session cookies with timers or change listeners
  crit: suspicious
  conf: 0.96
  all:
  - id: extension-session-cookie-harvest
  any:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::cookies-on-changed-listener
  - id: micro-behaviors/ui/window/manage/browser-extension::chrome-alarms-create
  - id: micro-behaviors/ui/window/manage/browser-extension::chrome-alarms-on-alarm

- id: extension-session-cookie-injection
  desc: Extension replays or injects session cookies
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::cookies-set
  - id: session-cookie-name
  any:
  - id: extension-session-cookie-harvest
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::dnr-cookie-header-mod

- id: extension-security-tool-enumeration
  desc: Extension enumerates installed security or privacy tools
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::management-get-all
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::extension-id-map
  - id: management-id-comparison

- id: extension-admin-page-blocker
  desc: Extension blocks or redirects admin and security pages
  crit: suspicious
  conf: 0.95
  all:
  - id: admin-security-url-targets
  - id: extension-page-block
  any:
  - id: micro-behaviors/ui/window/manage/browser-extension::chrome-tabs-update
  - id: objectives/supply-chain/hidden-payload/extensions/browser::extension-dnr-header-bypass

- id: extension-dnr-cookie-injector
  desc: Extension uses DNR to inject Cookie headers
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::declarative-net-request-update
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::dnr-cookie-header-mod
  any:
  - id: session-cookie-name
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::cookies-set

- id: extension-devtools-evasion
  desc: Extension includes DisableDevtool anti-inspection logic
  crit: suspicious
  conf: 0.88
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::disable-devtools-lib
  - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::chrome-extension-context
- id: admin-security-url-targets
  desc: Targets admin or security pages
  crit: component
  conf: 0.88
  any:
  - id: admin-security-url-targets--rx-1
  - id: admin-security-url-targets--rx-2
  - id: admin-security-url-targets--rx-3
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern

- id: management-id-comparison
  desc: Compares installed extension IDs against hardcoded map
  crit: component
  conf: 0.9
  any:
  - id: management-id-comparison--rx-4
  - id: management-id-comparison--rx-5
  - id: metadata/lang/scripted::includes-method
  - id: management-id-comparison--rx-7
  - id: management-id-comparison--rx-8
  - id: management-id-comparison--rx-9
  - id: management-id-comparison--rx-10
  - id: management-id-comparison--rx-11
  not:
  - substr: "createCancellationTokenSource("
  - substr: "knownCanceledRequests.has(requestMessage.id)"
