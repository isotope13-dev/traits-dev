defaults:
  platforms:
    - unix
    - windows
  crit: notable
  conf: 1.0
  for: [scripts, manifests]
traits:
  - id: inject-script-element__any_1
    desc: Derived string condition
    unless:
      - id: metadata/signed/platform::microsoft-corporation
    if:
      type: text
      regex: createElement\(['"]script['"]\)
  - id: inject-script-element__any_2
    desc: Derived string condition
    unless:
      - id: metadata/signed/platform::microsoft-corporation
    if:
      type: text
      regex: appendChild\([^)]{0,30}script
  - id: inject-script-element__any_3
    desc: Derived string condition
    unless:
      - id: metadata/signed/platform::microsoft-corporation
    if:
      type: text
      regex: insertBefore\([^)]{0,30}script
