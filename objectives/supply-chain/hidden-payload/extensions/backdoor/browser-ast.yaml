defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
- id: runtime-id-post-body
  desc: Posts extension runtime identifier
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: JSON\.stringify\s*\([^)]{0,260}(ext|extension_id)\s*:\s*(chrome\.)?runtime\.id

- id: response-json-then-tab-open
  desc: Opens tab from response object URL
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(?i)tabs\.create.{0,80}url\s*:\s*(response|result|data|json)\.'
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern

- id: remote-decision-navigation-fields
  desc: Reads response mode and navigation URL fields
  crit: component
  conf: 0.94
  count_min: 2
  if:
    type: symbol
    kind: member
    regex: '^[A-Za-z_$][A-Za-z0-9_$]*\.(mode|url|link)$'

- id: server-mode-navigation-decision
  desc: Remote mode selects a navigation URL
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'mode\s*===\s*2[\s\S]{0,320}(url|link)'

- id: remote-html-assignment--rx-1
  desc: innerHTML set from .html/.body property
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.innerHTML\s*=\s*\w+\.(html|body)\b
  count_max: 1029557
- id: remote-html-assignment--rx-2
  desc: innerHTML set from .content/.payload property
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.innerHTML\s*=\s*\w+\.(content|payload)\b
  count_max: 1029558
- id: remote-html-assignment--rx-3
  desc: innerHTML set from .markup/.responseText
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.innerHTML\s*=\s*\w+\.(markup|responseText)\b
  count_max: 1029559
- id: remote-html-assignment--rx-4
  desc: innerHTML set from .data property
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.innerHTML\s*=\s*\w+\.(data)\b
  count_max: 1029560
- id: dnr-allow-origin-all--rx-5
  desc: DNR modifyHeaders sets CORS wildcard
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (declarativeNetRequest|modifyHeaders).{0,400}Access-Control-Allow-Origin.{0,40}\*
  count_max: 1029563
- id: dnr-allow-origin-all--rx-6
  desc: responseHeaders set CORS wildcard
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (responseHeaders).{0,400}Access-Control-Allow-Origin.{0,40}\*
  count_max: 1029564
- id: dnr-allow-origin-all--rx-7
  desc: CORS wildcard then DNR modifyHeaders
  crit: component
  conf: 0.88
  if:
    type: text
    regex: Access-Control-Allow-Origin.{0,80}\*.{0,400}(declarativeNetRequest|modifyHeaders)
  count_max: 1029565
- id: dnr-allow-origin-all--rx-8
  desc: CORS wildcard then responseHeaders
  crit: component
  conf: 0.88
  if:
    type: text
    regex: Access-Control-Allow-Origin.{0,80}\*.{0,400}(responseHeaders)
  count_max: 1029566
- id: dnr-websocket-permit--rx-9
  desc: declarativeNetRequest API reference
  crit: component
  conf: 0.86
  if:
    type: text
    substr: declarativeNetRequest
  count_max: 1029567
- id: dnr-websocket-permit--rx-10
  desc: responseHeaders field reference
  crit: component
  conf: 0.86
  if:
    type: text
    substr: responseHeaders
  count_max: 1029568
- id: dnr-websocket-permit--rx-11
  desc: requestHeaders field reference
  crit: component
  conf: 0.86
  if:
    type: text
    substr: requestHeaders
  count_max: 1029569
- id: dnr-websocket-permit--rx-12
  desc: DNR modifyHeaders action reference
  crit: component
  conf: 0.86
  if:
    type: text
    substr: modifyHeaders
  count_max: 1029570
- id: dnr-websocket-permit--rx-13
  desc: websocket keyword reference
  crit: component
  conf: 0.86
  if:
    type: text
    substr: websocket
  count_max: 1029571
- id: dnr-websocket-permit--rx-14
  desc: HTTP Upgrade header keyword
  crit: component
  conf: 0.86
  if:
    type: text
    substr: Upgrade
  count_max: 1029572
composite_rules:
- id: extension-remote-tab-backdoor
  desc: Extension opens tabs from C2 response
  crit: suspicious
  conf: 0.96
  near_bytes: 4096
  all:
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-create
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: response-json-then-tab-open
  any:
  - id: runtime-id-post-body
  - id: micro-behaviors/communications/http/endpoints::user-info-endpoint

- id: extension-remote-window-open-backdoor
  desc: Extension opens a server-directed browser URL
  crit: hostile
  conf: 0.98
  attack: T1176,T1071.001
  for: [javascript]
  near_bytes: 4096
  all:
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: micro-behaviors/communications/http/client/response-body::js-response-text-read
  - id: remote-decision-navigation-fields
  - id: server-mode-navigation-decision
  - id: micro-behaviors/ui/window/manage/dom::browser-window-open

- id: extension-remote-html-backdoor
  desc: Extension renders remote HTML payload
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: remote-html-assignment
  - id: micro-behaviors/communications/http/endpoints::user-info-endpoint

- id: extension-dnr-header-bypass
  desc: Extension strips security headers for injection
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/process/hook/webextension::declarative-net-request-update
  - id: micro-behaviors/communications/http/headers::dnr-security-header-remove
  any:
  - id: dnr-allow-origin-all
  - id: dnr-websocket-permit
- id: remote-html-assignment
  desc: Assigns remote field to innerHTML
  crit: notable
  conf: 0.9
  any:
  - id: remote-html-assignment--rx-1
  - id: remote-html-assignment--rx-2
  - id: remote-html-assignment--rx-3
  - id: remote-html-assignment--rx-4
  not:
  - substr: ".innerHTML=e.html"
  - substr: ".innerHTML = e.css"
  - substr: ".innerHTML = state.css"
  - substr: ".innerHTML = block.innerHTML"
  - substr: ".innerHTML = obj.outerHTML"
  - substr: ".innerHTML = result.value"
  - substr: ".innerHTML = headerData.description"
  - substr: ".innerHTML = item.description"
  - substr: ".innerHTML = templateEl.innerHTML"
  - substr: ".innerHTML=nb.highlighter"
  - substr: ".innerHTML=this._maybeSanitize"
  - substr: ".innerHTML=this.content"
  - substr: ".innerHTML=e.innerHTML"
  - substr: ".innerHTML=a.value"
  - substr: ".innerHTML=r.html"
  - substr: ".innerHTML=g.html"
  - substr: ".innerHTML = w.html"
  - substr: ".innerHTML = goog.html"
  - substr: ".innerHTML =\n          goog.html"
  - substr: ".innerHTML=goog.html"

- id: dnr-allow-origin-all
  desc: DNR allows cross-origin wildcard
  crit: suspicious
  conf: 0.88
  any:
  - id: dnr-allow-origin-all--rx-5
  - id: dnr-allow-origin-all--rx-6
  - id: dnr-allow-origin-all--rx-7
  - id: dnr-allow-origin-all--rx-8
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  not:
  - substr: "res.setHeader('Access-Control-Allow-Origin'"
  - substr: "res.setHeader(\"Access-Control-Allow-Origin\""
  - substr: "setHeader('Access-Control-Allow-Origin'"
  - substr: "setHeader('Access-Control-Allow-Origin', '*'"
  - substr: "Access-Control-Allow-Origin'), '*'"
  - substr: "Access-Control-Allow-Origin': req.headers.origin"
  - substr: "Access-Control-Allow-Origin': '*'"
  - substr: "Access-Control-Allow-Origin'], '*'"

- id: dnr-websocket-permit
  desc: DNR permits broad WebSocket traffic
  crit: notable
  conf: 0.86
  all:
  - id: dnr-websocket-permit--rx-9
  - id: dnr-websocket-permit--rx-10
  - id: dnr-websocket-permit--rx-11
  - id: dnr-websocket-permit--rx-12
  - id: dnr-websocket-permit--rx-13
  - id: dnr-websocket-permit--rx-14
