defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1176

traits:
  - id: extension-native-host-name
    desc: Extension native messaging host name
    crit: component
    conf: 0.92
    attack: T1559
    if:
      type: string_literal
      # Reverse-DNS-shaped: first segment must start with a letter so version
      # strings like "0.0.0" / "1.2.3" don't match.
      regex: '^[a-z][a-z0-9]*(\.[a-z0-9_-]+){2,}$'

  - id: extension-custom-uri-launch
    desc: Extension opens custom URI scheme
    crit: notable
    conf: 0.88
    attack: T1202
    if:
      type: text
      regex: chrome\.tabs\.(create|update)\s*\([^)]{0,260}(url\s*:\s*)?['"][a-z][a-z0-9+.-]{2,24}://
    # T1202 is about custom native-protocol handlers (steam://, tg://, ...).
    # The scheme class also matches standard web schemes, so opening a plain
    # web page is not protocol-handler abuse — filter those matches out.
    not:
      - regex: https?://
      - regex: wss?://
      - regex: (ftps?|file|chrome|chrome-extension|moz-extension)://
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern

  - id: extension-helper-uri-page
    desc: Extension helper URI launcher
    crit: component
    conf: 0.86
    if:
      type: text
      regex: helper\.html|dream\.(html|js)

  - id: extension-download-danger-monitor
    desc: Extension monitors dangerous downloads
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: chrome\.downloads\.onChanged[\s\S]{0,600}(FILE_VIRUS_INFECTED|danger)

  - id: extension-push-or-alarm-keepalive
    desc: Extension push alarm keepalive
    crit: component
    conf: 0.84
    if:
      type: text
      regex: chrome\.(alarms|gcm|pushMessaging)\.

composite_rules:
  - id: extension-native-host-bridge
    desc: Extension bridges to native host
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/communications/ipc/native-host::browser-extension-native-connect
      - id: extension-native-host-name
      - id: micro-behaviors/communications/ipc/native-host::browser-extension-native-message
    any:
      - id: micro-behaviors/communications/http/websocket::websocket
      - id: extension-push-or-alarm-keepalive
    unless:
      - id: well-known/app/bitwarden::bitwarden-browser-extension
      - id: well-known/app/keepassxc-browser::source-extension

  - id: extension-protocol-handler-abuse
    desc: Extension launches external protocol
    crit: notable
    conf: 0.93
    all:
      - id: extension-custom-uri-launch
    any:
      - id: extension-helper-uri-page
      - id: micro-behaviors/communications/ipc/message::chrome-runtime-on-message
      - id: micro-behaviors/browser-extension/tabs::chrome-tabs-create

  - id: extension-download-security-feedback
    desc: Extension reports dangerous download status
    crit: suspicious
    conf: 0.94
    all:
      - id: extension-download-danger-monitor
    any:
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/websocket::websocket
      - id: objectives/exfiltration/cloud/object-store::s3-amazonaws-domain
