defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: profit-domain
    desc: Profit/monetization tracking domain
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: \b\d*x?profit\.(io|com|net|org)\b
      case_insensitive: true
  - id: affiliate-domain-pattern-1
    desc: Affiliate keyword domain
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: \baffiliate\.[a-z]{2,6}\b
      case_insensitive: true
    not:
      - regex: \.(catch|then|finally)\b
      - regex: \.(call|apply|bind)\b
  - id: affiliate-domain-pattern-partner
    desc: Partner keyword domain
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: \bpartner\.[a-z]{2,6}\b
      case_insensitive: true
    not:
      - regex: \.(catch|then|finally)\b
      - regex: \.(call|apply|bind)\b
  - id: affiliate-domain-pattern-track
    desc: Track keyword domain
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: \btrack\.[a-z]{2,6}\b
      case_insensitive: true
    not:
      - regex: \.(catch|then|finally)\b
      - regex: \.(call|apply|bind)\b
  - id: affiliate-domain-pattern-click
    desc: Click keyword domain
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(https?://|//|www\.)[^\s"'']{0,80}\bclick\.[a-z]{2,6}\b'
      case_insensitive: true
    not:
      - regex: \.(catch|then|finally)\b
      - regex: \.(call|apply|bind)\b
  - id: affiliate-domain-pattern-2
    desc: Affiliate domain (redir/monetize/revenue/earn)
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: (redir|monetize|revenue|earn)\.[a-z]{2,6}\b
      case_insensitive: true
composite_rules:
  - id: tracking-utm-params
    desc: UTM tracking parameters
    crit: notable
    conf: 0.7
    any:
      - id: metadata/package::utm-source-medium-campaign
      - id: metadata/package::utm-content-term
  - id: affiliate-domain-pattern
    desc: Affiliate tracking domain
    crit: notable
    conf: 0.75
    any:
      - id: affiliate-domain-pattern-1
      - id: affiliate-domain-pattern-partner
      - id: affiliate-domain-pattern-track
      - id: affiliate-domain-pattern-click
      - id: affiliate-domain-pattern-2
  - id: affiliate-adware
    desc: Affiliate/adware extension
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::chrome-extension-context
    any:
      - id: profit-domain
      - id: affiliate-domain-pattern
  - id: credentialed-affiliate-ad-injection
    desc: Credentialed affiliate adware browser extension
    crit: hostile
    conf: 0.97
    all:
      - id: affiliate-adware
      - id: micro-behaviors/communications/http/headers::credentialed-fetch-include
