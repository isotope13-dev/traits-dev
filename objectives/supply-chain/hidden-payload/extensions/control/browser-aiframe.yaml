defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002
traits:
- id: runtime-onmessage-accept-all
  desc: Extension message listener accepts all
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: runtime\.onMessage\.addListener\s*\(\s*\(.{0,80}\)\s*=>\s*(!0|true)
- id: shadow-dom-iframe--rx-8
  desc: 'attachShadow/.shadowRoot followed by iframe'
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (attachShadow|\.shadowRoot)[\s\S]{0,700}iframe
- id: shadow-dom-iframe--rx-9
  desc: 'iframe followed by attachShadow/.shadowRoot'
  crit: component
  conf: 0.92
  if:
    type: text
    regex: iframe[\s\S]{0,700}(attachShadow|\.shadowRoot)
- id: iframe-paywall-path
  desc: Remote paywall iframe path
  crit: component
  conf: 0.9
  if:
    type: text
    regex: /paywall/\d{2,6}
# NOTE: postMessage sender/receiver traits live in
# micro-behaviors/communications/ipc/message. They are neutral capabilities
# used by normal pages, workers, iframes, and extensions.
- id: message-origin-validation--rx-10
  desc: 'event.origin === "https?://..." string compare'
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.origin\s*={2,3}\s*['"]https?://
- id: message-origin-validation--rx-11
  desc: 'event.origin !== "https?://..." string compare'
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.origin\s*!={1,2}\s*['"]https?://
- id: message-origin-validation--rx-12
  desc: allowedOrigins.includes(event.origin) check
  crit: component
  conf: 0.82
  if:
    type: text
    regex: allowedOrigins?\.includes\(.{0,80}\.origin
- id: extension-local-ui-iframe-prompt-src
  desc: iframe.src points to extension prompt.html
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'iframe\.src\s*=\s*.{0,80}runtime\.getURL\(["'']prompt\.html["'']\)'
- id: extension-local-ui-iframe-savebar-src
  desc: iframe.src points to extension savebar.html
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'iframe\.src\s*=\s*.{0,80}runtime\.getURL\(["'']savebar\.html["'']\)'
- id: extension-origin-slice
  desc: runtime.getURL empty path slice trick
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'runtime\.getURL\(["''][''"]\)\.slice\(0,\s*-1\)'
- id: storage-proxy-command-words--rx-17
  desc: 'storageGet/storageSet command words'
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: \b(storageGet|storageSet)\b
- id: storage-proxy-command-words--rx-18
  desc: "storageRemove/storageDelete command words"
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: \b(storageRemove|storageDelete)\b
- id: storage-proxy-command-words--rx-19
  desc: getStorage/setStorage command words (>=3)
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: \b(getStorage|setStorage)\b
- id: storage-proxy-command-words--rx-20
  desc: "removeStorage/deleteStorage command words"
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: text
    regex: \b(removeStorage|deleteStorage)\b
# `chrome.debugger.attach` is a neutral capability that lives in
# micro-behaviors/process/attach/webextension::chrome-debugger-attach; the
# extension-debugger-pdf-capture composite below references it cross-tier
# instead of re-declaring a suspicious objective atom that surfaced standalone
# on legitimate Chrome-automation tools.
- id: debugger-print-to-pdf
  desc: Debugger Page.printToPDF call
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: Page.printToPDF
  unless:
  - type: text
    regex: 'node_modules/\.pnpm/puppeteer(-core)?@|puppeteer-core/lib/.{0,80}/puppeteer/cdp/'
- id: extension-local-ui-passa-marker--passa-prompt
  desc: PASSA prompt or bar marker (PASSA_PROMPT)
  crit: component
  conf: 0.85
  if:
    type: text
    word: PASSA_PROMPT
- id: extension-local-ui-passa-marker--passa-bar
  desc: PASSA prompt or bar marker constant (PASSA_BAR)
  crit: component
  conf: 0.85
  if:
    type: text
    word: PASSA_BAR
- id: extension-local-ui-passa-marker--extensionorigin
  desc: PASSA prompt or bar marker (extensionOrigin)
  crit: component
  conf: 0.85
  if:
    type: text
    word: extensionOrigin
composite_rules:
- id: extension-local-ui-passa-marker
  desc: PASSA prompt or bar marker constant
  crit: component
  conf: 0.85
  any:
  - id: extension-local-ui-passa-marker--passa-prompt
  - id: extension-local-ui-passa-marker--passa-bar
  - id: extension-local-ui-passa-marker--extensionorigin
- id: extension-sleeper-message-scaffold
  desc: Dormant extension message scaffold
  crit: suspicious
  conf: 0.95
  all:
  - id: runtime-onmessage-accept-all
  - id: metadata/permission/runtime::is-extension
- id: extension-hidden-iframe-message-channel
  desc: Extension hidden iframe message channel
  crit: suspicious
  conf: 0.92
  unless:
  - id: objectives/supply-chain/hidden-payload/extensions/control/
  - id: objectives/supply-chain/hidden-payload/extensions/control/
  all:
  - id: metadata/permission/runtime::is-extension
  - id: hidden-zero-iframe
  - id: micro-behaviors/communications/ipc/message::postmessage-listener
  - id: micro-behaviors/communications/ipc/message::postmessage-to-iframe
  any:
  - id: iframe-paywall-path
  - id: shadow-dom-iframe
  - id: message-origin-validation
- id: extension-shadow-iframe-message-channel
  desc: Shadow DOM iframe message channel
  crit: suspicious
  conf: 0.92
  unless:
  - id: objectives/supply-chain/hidden-payload/extensions/control/
  - id: objectives/supply-chain/hidden-payload/extensions/control/
  all:
  - id: metadata/permission/runtime::is-extension
  - id: shadow-dom-iframe
  - id: micro-behaviors/communications/ipc/message::postmessage-listener
  any:
  - id: iframe-paywall-path
  - id: micro-behaviors/communications/ipc/message::postmessage-to-iframe
  - id: message-origin-validation
- id: extension-remote-storage-proxy
  desc: Extension storage remote-control proxy
  crit: hostile
  conf: 0.97
  all:
  - id: metadata/permission/runtime::is-extension
  - id: micro-behaviors/data/db/web-storage::chrome-storage-api
  - id: storage-proxy-command-words
  - id: micro-behaviors/communications/ipc/message::postmessage-listener
  any:
  - id: message-origin-validation
  - id: micro-behaviors/communications/ipc/message::postmessage-to-iframe
  unless:
  - id: well-known/app/browser-extension/
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
- id: extension-debugger-pdf-capture
  desc: Extension captures page via debugger
  crit: suspicious
  conf: 0.94
  all:
  - id: metadata/permission/runtime::is-extension
  - id: micro-behaviors/process/attach/webextension::chrome-debugger-attach
  - id: debugger-print-to-pdf
  any:
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-query
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-update
  - id: objectives/collection/messaging/app::ai-chat-dom-scrape
- id: extension-ai-chat-exfil
  desc: Extension scrapes AI chat and rewrites CORS for cross-origin exfil
  crit: hostile
  conf: 0.95
  # A content script that scrapes AI chat conversation DOM AND builds a
  # declarativeNetRequest rule rewriting Access-Control-Allow-Origin is
  # exfiltrating those conversations cross-origin (the koi AI-chat-stealer
  # campaign). A legitimate AI tool that reads its own page never needs to
  # forge CORS response headers. scope: outer pools evidence across the
  # extension's bundled scripts.
  scope: outer
  all:
  - id: objectives/collection/messaging/app::ai-chat-dom-scrape
  - id: micro-behaviors/communications/http/headers::dnr-cors-origin-rewrite
- id: vscode-chat-cookie-file-exfil
  desc: VS Code chat cookie file exfiltration
  crit: hostile
  conf: 0.98
  near_bytes: 8192
  all:
  - id: metadata/permission/runtime::is-extension
  - id: objectives/supply-chain/hidden-payload/extensions/session::cookie-domain-filter
  - id: objectives/credential-access/files/config::node-project-secret-file-targets
  any:
  - id: debugger-print-to-pdf
  - id: micro-behaviors/communications/http/headers::file-upload-headers
  - id: micro-behaviors/communications/http/upload::form-data-append
- id: hidden-zero-iframe
  desc: Hidden iframe reference
  crit: component
  conf: 0.9
  unless:
  - id: well-known/app/google-web::official-google-web-asset
  all:
  - id: micro-behaviors/ui/window/manage/dom::browser-iframe-element
  any:
  - id: micro-behaviors/ui/window/manage/dom::css-display-none
  - id: micro-behaviors/ui/window/manage/dom::css-opacity-zero
  - id: micro-behaviors/ui/window/manage/dom::css-visibility-hidden
- id: shadow-dom-iframe
  desc: Shadow DOM iframe hiding
  crit: component
  conf: 0.92
  any:
  - id: shadow-dom-iframe--rx-8
  - id: shadow-dom-iframe--rx-9
- id: message-origin-validation
  desc: Validates postMessage origin
  crit: notable
  conf: 0.82
  any:
  - id: message-origin-validation--rx-10
  - id: message-origin-validation--rx-11
  - id: message-origin-validation--rx-12
- id: storage-proxy-command-words
  desc: Storage proxy command words
  crit: component
  conf: 0.86
  any:
  - id: storage-proxy-command-words--rx-17
  - id: storage-proxy-command-words--rx-18
  - id: storage-proxy-command-words--rx-19
  - id: storage-proxy-command-words--rx-20
- id: extension-local-ui-iframe
  desc: Extension local UI iframe with PASSA marker
  crit: component
  conf: 0.88
  near_bytes: 1800
  all:
  - id: extension-local-ui-passa-marker
  any:
  - id: extension-local-ui-iframe-prompt-src
  - id: extension-local-ui-iframe-savebar-src
  - id: extension-origin-slice
