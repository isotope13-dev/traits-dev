defaults:
  platforms: [unix, windows]
  for: [ruby]
composite_rules:
  - id: deeply-nested-extconf
    desc: "Deeply nested extension configuration (evasion technique)"
    crit: hostile
    conf: 0.95
    attack: T1027.001
    mbc: B0001
    any:
      - id: metadata/package/config::deeply-nested-extconf-metadata
      - id: metadata/package/config::deeply-nested-extconf-gemspec
      - id: metadata/package/config::deeply-nested-extconf-gemspec-assign
  - id: hidden-ruby-xmrig-dropper
    desc: Hidden RubyGems member downloads and launches XMRig
    crit: hostile
    conf: 0.99
    attack: T1105,T1496
    mbc: B0024
    all:
      - id: metadata/package/files/rubygems::hidden-ruby-dotfile-member
      - id: objectives/command-and-control/dropper/execution/download::ruby-xmrig-fetch-extract-exec
