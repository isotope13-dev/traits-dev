defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002

traits:
  - id: generated-chunk-version-sequence
    desc: Generates package versions from chunk indexes
    crit: component
    conf: 0.96
    if:
      type: literal
      kind: string
      regex: '^1\.\$\{[A-Za-z_$][A-Za-z0-9_$]*\}\.\$\{[A-Za-z_$][A-Za-z0-9_$]*\}$'

composite_rules:
  - id: npm-binary-chunk-registry-publish
    desc: Publishes generated binary chunks as npm versions
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/os/package-manager/publish::npm-binary-data-package-construction
      - id: micro-behaviors/os/package-manager/publish::npm-publish-command
      - id: generated-chunk-version-sequence
