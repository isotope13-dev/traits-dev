- id: cargo-feature-patch-etw
  desc: Cargo feature patches ETW
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: features.patch_etw
    regex: '.*'
- id: cargo-windows-wifi-feature
  desc: Cargo requests Windows WiFi APIs
  crit: suspicious
  conf: 0.86
  if:
    type: text
    substr: Win32_NetworkManagement_WiFi
  unless:
  - id: metadata/package/files/system-package::debian-missing-sources-vendored-crate
      # The official windows-rs umbrella crate enumerates every Win32 feature as
      # a feature DEFINITION, not as a third-party request — not an anomaly.
  - id: well-known/lib/rust-system-bindings/
- id: cargo-windows-wdk-feature
  desc: Cargo requests Windows WDK APIs
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: 'Wdk_(Foundation|System|Storage)'
  unless:
  - id: well-known/tool/sysadmin/rustdesk::rustdesk-source-tree
- id: cargo-windows-winsock-feature
