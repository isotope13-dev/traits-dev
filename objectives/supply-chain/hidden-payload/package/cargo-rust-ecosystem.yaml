- id: cargo-dependency-confusion-poc
  desc: Cargo package self-identifies depconf
  crit: hostile
  conf: 0.98
  attack: T1195.001
  all:
  - id: metadata/package/manifest/description::cargo-description-dependency-confusion
  - id: metadata/package/manifest/description::cargo-description-security-poc
  any:
  - id: metadata/package/manifest/description::cargo-description-ownership-transfer
- id: cargo-stripped-size-optimized-release
  desc: Cargo stripped size-optimized release
  crit: notable
  conf: 0.88
  needs: 3
  any:
  - id: cargo-release-strip-true
  - id: cargo-release-lto-true
  - id: cargo-release-panic-abort
  - id: cargo-release-opt-size
  - id: cargo-release-strip-symbols
  - id: cargo-release-opt-small
  unless:
  - id: well-known/tool/sysadmin/rustdesk::rustdesk-source-tree
