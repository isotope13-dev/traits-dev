- id: cargo-feature-api-hash-algorithms
  desc: Cargo feature exposes API hashing
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: '(hash-djb2|hash-fnv1a|hash-crc32)'
- id: cargo-feature-win32u
  desc: Cargo feature enables Win32u
  crit: suspicious
  conf: 0.84
  if:
    type: value
    path: features.win32u
    regex: '.*'
- id: cargo-release-strip-symbols
  desc: Cargo release strips symbols
  crit: component
  conf: 0.9
