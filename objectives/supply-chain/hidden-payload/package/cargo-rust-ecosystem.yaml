composite_rules:
- id: cargo-feature-sandbox-triggers
  desc: Cargo feature references sandbox triggers
  crit: suspicious
  conf: 0.84
  any:
  - id: cargo-feature-sandbox-triggers--sandbox-trig
  - id: cargo-feature-sandbox-triggers--sandbox-mem
- id: cargo-winapi-loader-feature
  desc: Cargo feature includes loader APIs
  crit: component
  conf: 0.86
