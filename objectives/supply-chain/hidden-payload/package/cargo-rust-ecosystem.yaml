  crit: component
  conf: 0.8
  any:
  - id: cargo-windows-process-status-feature--win32-system-processstatus
  - id: cargo-windows-process-status-feature--win32-system-diagnostics-toolhelp
- id: cargo-winapi-network-discovery-feature
  desc: Cargo includes workstation APIs
  crit: notable
  conf: 0.78
  any:
  - id: cargo-winapi-network-discovery-feature--lmwksta
