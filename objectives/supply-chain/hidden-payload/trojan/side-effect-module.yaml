# Supply Chain - Side-Effect Module Detection
# Detects modules that auto-execute code on import but export nothing useful
# Common in crypto drainers and data stealers distributed via npm
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
traits:
  - id: js-iife-async-invoke
    desc: Async IIFE auto-executes on import
    crit: notable
    conf: 0.7
    count_min: 2
    unless:
      - type: text
        substr: '"version":3,"file":'
      - type: basename
        regex: ^(\.map|rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/package/testing/harness::is-test
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
    if:
      type: text
      regex: '\(async\s*\(\)\s*=>'
    not:
      - substr: this.writeOperation = (async () =>
      - substr: builtin-plugins/tabby-
  - id: js-empty-export-default
    desc: Module exports empty object (ESM)
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "export default {}"
  - id: js-empty-module-exports
    desc: Module exports empty object (CJS)
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'module\.exports\s*=\s*\{\s*\}'
composite_rules:
  - id: empty-export
    desc: Module exports empty object
    crit: notable
    conf: 0.8
    any:
      - id: js-empty-export-default
      - id: js-empty-module-exports
  - id: side-effect-only-module
    desc: Module auto-executes with empty export
    crit: suspicious
    conf: 0.88
    all:
      - id: js-iife-async-invoke
    any:
      - id: js-empty-export-default
      - id: js-empty-module-exports
    unless:
      - id: metadata/package/testing/harness::is-test
