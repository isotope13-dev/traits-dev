# Supply Chain - Side-Effect Module Detection
# Detects modules that auto-execute code on import but export nothing useful
# Common in crypto drainers and data stealers distributed via npm
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
  # NOTE: async-IIFE auto-execute moved to
  # micro-behaviors/data/control-flow/module-exec/javascript::async-iife-invoke
  # (a neutral capability — composites reference it for intent).
traits:
  - id: js-empty-export-default
    desc: Module exports empty object (ESM)
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "export default {}"
  - id: js-empty-module-exports
    desc: Module exports empty object (CJS)
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'module\.exports\s*=\s*\{\s*\}'
  - id: cjs-side-effect-local-require
    desc: CommonJS local side-effect require
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'require\(["'']\./logger["'']\)'
composite_rules:
  - id: empty-export
    desc: Module exports empty object
    crit: notable
    conf: 0.8
    any:
      - id: js-empty-export-default
      - id: js-empty-module-exports
  - id: side-effect-only-module
    desc: Module auto-executes with empty export
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/data/control-flow/module-exec::async-iife-invoke
    any:
      - id: js-empty-export-default
      - id: js-empty-module-exports
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: well-known/lib/pdfjs::pdfjs-bundle
  - id: npm-obfuscated-import-time-stealer
    desc: NPM module imports obfuscated stealer
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/exfiltration/stealer/file::node-import-time-file-stealer
      - id: objectives/supply-chain/hidden-payload/trojan::a0-string-decoder-entrypoint
    any:
      - id: cjs-side-effect-local-require
      - id: metadata/package/fields/main::has-index-entry
  - id: npm-obfuscated-bundle-indirect-command
    desc: Obfuscated npm bundle invokes indirect command
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::decoder-loop-keyword-triad
      - id: objectives/anti-static/pack/section-anomaly::packed-string-decryptor
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-indirect
    any:
      - id: objectives/anti-static/obfuscation/syntax::js-fragmented-prop-single
      - id: objectives/anti-static/obfuscation/encoding/hex::hex-concatenation
      - id: micro-behaviors/data/encode/base64::btoa-symbol
    needs: 2
