# Supply-chain: npm packages shipping native Node-API addons with shellcode
# injection capabilities. A legitimate compression library should not need
# W^X memory transitions or string obfuscation.
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  platforms: [windows]
  attack: "T1195.002"

composite_rules:
  # npm package ships a PE native addon with shellcode injection.
  # The package.json signals an npm package; the .node file signals
  # a native addon; shellcode injection signals malware.
  - id: npm-package-shellcode-injection
    desc: npm package ships native addon with shellcode injection
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/binary/framework::node-api-addon-export
      - id: objectives/evasion/process/injection/shellcode::w-xor-x-injection-x64
      - id: metadata/package/fields/main::pkg-main-native-node
    any:
      - id: objectives/anti-static/obfuscation/string/anomaly::many-stack-strings
      - id: objectives/anti-analysis/self-modify/runtime::xor-loop-pattern
    unless:
      - id: metadata/signed/platform::microsoft
