# Python package auto-runs a credential stealer on import
# A trojanized PyPI package whose __init__.py invokes a stealer function at
# import time (silenced by try/except) so merely importing the package steals
# credentials and exfiltrates them. The trigger and the payload live in
# separate package modules, so evidence is pooled at archive scope.
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  for: [python, archives]
  platforms: [windows, macos]
  attack: T1195.002
composite_rules:
  - id: python-import-time-stealer
    desc: Package auto-runs credential stealer on import
    crit: hostile
    conf: 0.95
    scope: archive
    all:
      - id: micro-behaviors/data/control-flow/module-exec::try-wrapped-module-call
      - id: objectives/command-and-control/channel/messaging::discord-webhook-url
    any:
      - id: objectives/credential-access/browser/dpapi::python-dpapi-unprotect
      - id: micro-behaviors/fs/path/sensitive/credentials::roblox-cookie-file
