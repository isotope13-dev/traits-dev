# Python package auto-runs a credential stealer on import
# A trojanized PyPI package whose __init__.py invokes a stealer function at
# import time (silenced by try/except) so merely importing the package steals
# credentials and exfiltrates them. The trigger and the payload live in
# separate package modules, so evidence is pooled at archive scope.
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  for: [python, archives]
  platforms: [windows, macos]
  attack: T1195.002
composite_rules:
  - id: python-import-time-stealer
    desc: Package auto-runs credential stealer on import
    crit: hostile
    conf: 0.95
    scope: archive
    all:
      - id: micro-behaviors/data/control-flow/module-exec::try-wrapped-module-call
      - id: objectives/command-and-control/channel/messaging::discord-webhook-url
    any:
      - id: objectives/credential-access/browser/dpapi::python-dpapi-unprotect
      - id: micro-behaviors/fs/path/sensitive/credentials::roblox-cookie-file

  # A package import that writes a generated native agent into a hidden user
  # directory and registers it with cron is an install-time persistence path,
  # not ordinary module initialization.  Keep the evidence on the same
  # Python source file so a benign package that merely contains a payload
  # helper does not match.
  - id: python-import-time-native-agent-persistence
    desc: Import-time hidden native agent with cron persistence
    crit: hostile
    conf: 0.99
    platforms: [unix]
    for: [python]
    attack: "T1195.002,T1053.003,T1027.009"
    all:
      - id: python-embedded-payload-helper
      - id: python-hidden-agent-path
      - id: micro-behaviors/fs/file/write/direct::py-open-write-mode
      - id: micro-behaviors/fs/chmod/modify::python-os-chmod
      - id: micro-behaviors/os/autorun/scheduled::crontab-keyword
    near_lines: 80

traits:
  - id: python-embedded-payload-helper
    desc: Imports a private embedded payload helper
    crit: component
    conf: 0.92
    platforms: [unix]
    for: [python]
    if:
      type: text
      regex: 'from\s+\._[A-Za-z0-9_]+\s+import\s+[A-Za-z0-9_]+'

  - id: python-hidden-agent-path
    desc: Builds hidden user config agent path
    crit: component
    conf: 0.9
    platforms: [unix]
    for: [python]
    if:
      type: text
      regex: 'os\.path\.join\([^\n]{0,180}["'']\.[A-Za-z0-9_.-]{3,}["'']\)'
