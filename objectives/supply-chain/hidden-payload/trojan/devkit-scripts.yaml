defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1195.002
traits:
- id: computed-child-process-destructure-ast
  desc: "Computed destructuring child_process require"
  crit: suspicious
  conf: 0.92
  mbc: C0017
  attack: T1059
  if:
    type: tree-sitter
    language: javascript
    query: |
      (variable_declarator
        name: (object_pattern) @pattern
        value: (call_expression
          function: (identifier) @fn
          arguments: (arguments (string) @module))
        (#eq? @fn "require")
        (#match? @module "'(node:)?child_process'|\"(node:)?child_process\"")
        (#match? @pattern "\\[")
      )
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure/
  - id: metadata/library/runtime::core-js-runtime-bundle
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/library/structure::vscode-extension-generated-asset
- id: computed-child-process-require-text
  desc: child_process require assignment text
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "\\}\\s*=\\s*require\\s*\\(\\s*[\"'](node:)?child_process[\"']"
- id: computed-bracket-key-text
  desc: "Computed destructuring {[expr]: ...} key"
  crit: component
  conf: 0.7
  if:
    type: text
    regex: "\\{[^}\\n]{0,120}\\[[^\\]]{1,80}\\]\\s*:[^}\\n]{0,120}\\}\\s*="
  not:
    - regex: '\[[^\]]*:[^\]]*\]'
- id: computed-child-process-quoted-exec-key
  desc: Quoted exec destructuring key
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "[\"']exec(Sync)?[\"']\\s*:"
- id: computed-child-process-quoted-spawn-key
  desc: Quoted spawn destructuring key
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "[\"']spawn(Sync)?[\"']\\s*:"
- id: computed-child-process-quoted-fork-key
  desc: Quoted fork destructuring key
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "[\"']fork[\"']\\s*:"
  count_max: 1029919
- id: node-e-array-argument-ast
  desc: Indexed node -e launch args (AST)
  crit: suspicious
  conf: 0.86
  mbc: C0017
  attack: T1059.007
  count_min: 3
  if:
    type: tree-sitter
    language: javascript
    query: |
      (call_expression
        function: (identifier) @callee
        arguments: (arguments
          (_)
          (array
            (subscript_expression
              object: (identifier) @table
              index: (number) @index)
            (_)))
        (#match? @index "^(0x16|22)$")
      )
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure::js-webpack-bundle
- id: decoder-indexof-ast
  desc: Decoder table indexOf operations (AST)
  crit: component
  conf: 0.78
  mbc: B0032
  count_min: 2
  if:
    # Migrated from a tree-sitter query to a `kind: call` match on
    # the pre-extracted call fact (no per-member cursor walk).
    type: symbol
    kind: call
    regex: '\.indexOf$'
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure/
- id: decoder-array-push-ast
  desc: Decoder array push reconstruction (AST)
  crit: component
  conf: 0.76
  mbc: B0032
  count_min: 4
  if:
    # Migrated from a tree-sitter query to a `kind: call` match on
    # the pre-extracted call fact (no per-member cursor walk).
    type: symbol
    kind: call
    regex: '\.push$'
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure/
- id: indexed-node-e-spawn-args
  desc: Obfuscated indexed node -e launches
  crit: suspicious
  conf: 0.9
  mbc: C0017
  attack: T1059.007
  count_min: 3
  if:
    type: text
    regex: \b[A-Za-z_$][\w$]*\s*\([^,\n]{1,80},\s*\[\s*[A-Za-z_$][\w$]*\s*\[\s*0x16\s*\]
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure::js-webpack-bundle
  # NOTE: pure structural string/import counts live in metadata/file/metrics
  # (script-many-shell-command-strings-100, script-many-imports-300). FP
  # suppression for those counts lives on the composites below, not on the
  # metric itself.
- id: single-line-packed-loader-metrics
  desc: Single-line packed JavaScript loader profile
  crit: component
  conf: 0.88
  mbc: B0032
  attack: T1027
  if:
    type: metrics
    field: text.max_line_length
    min: 20000
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/library/structure::vscode-vendor-output-path
  - id: metadata/library/structure::vscode-vendor-output-path
  - id: metadata/library/structure::vscode-extension-generated-asset
  - id: metadata/package/quality/source/
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
- id: decoded-property-function-alias
  desc: Aliases a computed property to a variable
  crit: component
  conf: 0.5
  mbc: B0032
  attack: T1027
  if:
    type: text
    regex: 'var\s+\w+\s*=\s*\w+\[\w+\]'
  unless:
  - id: metadata/build/bundler::babel-transpiled
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: metadata/package/quality/source/
- id: nested-decoder-function-build
  desc: Nested decoder builds function
  crit: component
  conf: 0.86
  mbc: B0032
  attack: T1027
  if:
    type: text
    regex: 'var\s+\w+\s*=\s*\w+\(\w+,\s*\w+\(\w+\)\)'
- id: numeric-stage-function-run
  desc: Numeric stage function run
  crit: component
  conf: 0.82
  mbc: B0032
  attack: T1027
  if:
    type: text
    regex: '\w+\(\s*\d{3,6}\s*\);return\s+\d{3,6}'
