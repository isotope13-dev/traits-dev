defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1195.002
traits:
- id: computed-child-process-destructure-ast
  desc: Computed destructuring of child_process require
  crit: suspicious
  conf: 0.92
  mbc: C0017
  attack: T1059
  if:
    type: ast
    language: javascript
    query: |
      (variable_declarator
        name: (object_pattern) @pattern
        value: (call_expression
          function: (identifier) @fn
          arguments: (arguments (string) @module))
        (#eq? @fn "require")
        (#match? @module "'(node:)?child_process'|\"(node:)?child_process\"")
        (#match? @pattern "\\[")
      )
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/library/structure::js-webpack-bundle
- id: computed-child-process-require-text
  desc: child_process require assignment text
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "\\}\\s*=\\s*require\\s*\\(\\s*[\"'](node:)?child_process[\"']"
- id: computed-child-process-bracket-key-text
  desc: "Computed destructuring bracket key"
  crit: component
  conf: 0.7
  if:
    type: text
    regex: "\\{\\s*\\[[^\\]]{1,80}\\]\\s*:"
- id: computed-child-process-quoted-exec-key
  desc: Quoted exec destructuring key
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "[\"']exec(Sync)?[\"']\\s*:"
- id: computed-child-process-quoted-spawn-key
  desc: Quoted spawn destructuring key
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "[\"']spawn(Sync)?[\"']\\s*:"
- id: computed-child-process-quoted-fork-key
  desc: Quoted fork destructuring key
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "[\"']fork[\"']\\s*:"
  count_max: 1029919
- id: computed-call-property-access-ast
  desc: Computed property access through decoder calls (AST)
  crit: baseline
  conf: 0.95
  mbc: B0032
  attack: T1027
  count_min: 3
  if:
    type: ast
    language: javascript
    query: |
      (subscript_expression
        index: (call_expression
          function: (identifier) @decoder
          arguments: (arguments (_))))
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure::js-known-bundler-output
  - type: basename
    regex: "\\.scrbl$"
- id: node-e-array-argument-ast
  desc: Indexed node -e launch args (AST)
  crit: suspicious
  conf: 0.86
  mbc: C0017
  attack: T1059.007
  count_min: 3
  if:
    type: ast
    language: javascript
    query: |
      (call_expression
        function: (identifier) @callee
        arguments: (arguments
          (_)
          (array
            (subscript_expression
              object: (identifier) @table
              index: (number) @index)
            (_)))
        (#match? @index "^(0x16|22)$")
      )
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure::js-webpack-bundle
- id: function-return-this-iife-ast
  desc: Immediate new Function return-this global discovery (AST)
  crit: notable
  conf: 0.82
  mbc: B0007
  if:
    type: ast
    language: javascript
    query: |
      (call_expression
        function: (new_expression
          constructor: (identifier) @ctor
          arguments: (arguments
            (string (string_fragment) @body)))
        (#eq? @ctor "Function")
        (#match? @body "return\\s+this")
      )
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
- id: decoder-indexof-ast
  desc: Decoder table indexOf operations (AST)
  crit: component
  conf: 0.78
  mbc: B0032
  count_min: 2
  if:
    type: ast
    language: javascript
    query: |
      (call_expression
        function: (member_expression
          property: (property_identifier) @prop)
        arguments: (arguments (_))
        (#eq? @prop "indexOf")
      )
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure::js-known-bundler-output
- id: decoder-array-push-ast
  desc: Decoder array push reconstruction (AST)
  crit: component
  conf: 0.76
  mbc: B0032
  count_min: 4
  if:
    type: ast
    language: javascript
    query: |
      (call_expression
        function: (member_expression
          property: (property_identifier) @prop)
        arguments: (arguments (_))
        (#eq? @prop "push")
      )
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure::js-known-bundler-output
- id: indexed-node-e-spawn-args
  desc: Obfuscated indexed node -e launches
  crit: suspicious
  conf: 0.9
  mbc: C0017
  attack: T1059.007
  count_min: 3
  if:
    type: text
    regex: \b[A-Za-z_$][\w$]*\s*\([^,\n]{1,80},\s*\[\s*[A-Za-z_$][\w$]*\s*\[\s*0x16\s*\]
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure::js-webpack-bundle
- id: shell-command-string-heavy-metrics
  desc: Very high shell command string count
  crit: notable
  conf: 0.88
  mbc: C0017
  attack: T1059
  if:
    type: metrics
    field: strings.shell_command_strings
    min: 100
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
  - id: metadata/library/structure::js-large-module-bundle
  # NOTE: huge-import count moved to metadata/file/text/metrics::script-many-imports-300
  # (a pure structural measurement). FP suppression for that count lives on the
  # composites below, not on the metric itself.
- id: single-line-packed-loader-metrics
  desc: Single-line packed JavaScript loader profile
  crit: component
  conf: 0.88
  mbc: B0032
  attack: T1027
  if:
    type: metrics
    field: text.max_line_length
    min: 20000
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/quality::terser-output
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
- id: decoded-property-function-alias
  desc: Decoded property function alias
  crit: component
  conf: 0.84
  mbc: B0032
  attack: T1027
  if:
    type: text
    regex: 'var\s+\w+\s*=\s*\w+\[\w+\]'
- id: nested-decoder-function-build
  desc: Nested decoder builds function
  crit: component
  conf: 0.86
  mbc: B0032
  attack: T1027
  if:
    type: text
    regex: 'var\s+\w+\s*=\s*\w+\(\w+,\s*\w+\(\w+\)\)'
- id: numeric-stage-function-run
  desc: Numeric stage function run
  crit: component
  conf: 0.82
  mbc: B0032
  attack: T1027
  if:
    type: text
    regex: '\w+\(\s*\d{3,6}\s*\);return\s+\d{3,6}'
