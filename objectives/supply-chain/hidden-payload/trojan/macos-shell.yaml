defaults:
  platforms: [unix]
  for: [shell]
  attack: T1027

traits:
  - id: shell-hidden-config-payload
    desc: Shell hidden config payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: CONFIG_BLOCK=

  - id: shell-base64-hidden-stage
    desc: Shell base64 hidden stage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'base64 -d > "\$PAYLOAD_BIN"[\s\S]{0,220}nohup bash'

  - id: shell-launchd-hidden-stage
    desc: Shell launchd hidden stage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'com\.apple\.sysmaint\.auto[\s\S]{0,260}PAYLOAD_BIN'

composite_rules:
  - id: shell-macos-hidden-payload
    desc: Shell macOS hidden payload
    crit: hostile
    conf: 0.98
    all:
      - id: shell-hidden-config-payload
      - id: shell-base64-hidden-stage
    any:
      - id: shell-launchd-hidden-stage
