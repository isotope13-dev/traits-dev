defaults:
  platforms: [unix, windows]
  attack: T1195.002

traits:
  - id: vant-support-sidecar-archive-member
    desc: Vant archive contains unexpected utils support.js member
    crit: suspicious
    conf: 0.93
    for: [zip]
    if:
      type: text
      substr: "vant/package/lib/utils/support.js"

  - id: hardcoded-vant-token-exfil-url
    desc: Hardcoded Vant token exfiltration endpoint
    crit: suspicious
    conf: 0.99
    for: [javascript]
    if:
      type: text
      substr: "https://80.78.28.72/tokens"

  - id: a0-string-decoder-entrypoint
    desc: a0_0x JavaScript string decoder entrypoint
    crit: suspicious
    conf: 0.92
    for: [javascript]
    if:
      type: text
      regex: "function a0_0x[0-9a-f]{4}\\("

  - id: vant-tarball-stage-name
    desc: Vant tarball staging filename
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: "vant.tar.gz"

  - id: npm-proxy-env-string
    desc: NPM proxy environment variable string
    crit: component
    conf: 0.8
    for: [javascript]
    if:
      type: text
      substr: "npm_config_proxy"

  - id: ci-env-marker-string
    desc: CI environment marker string
    crit: component
    conf: 0.75
    for: [javascript]
    if:
      type: text
      substr: "TEAMCITY_VERSION"

  - id: vant-xmrig-string
    desc: Vant payload references XMRig
    crit: component
    conf: 0.9
    for: [javascript]
    count_min: 3
    if:
      id: metadata/file/text/string::xmrig-product

  - id: vant-supportxmr-pool-endpoint
    desc: Vant payload supportxmr pool endpoint
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: "pool.supportxmr.com:443"

  - id: hardcoded-vant-monero-wallet
    desc: Vant payload hardcoded Monero wallet
    crit: component
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: "475NBZygwEajj4YP2Bdu7yg6XnaphiFjxTFPkvzg5xAjLGPSakE68nyGavn8r1BYqB44xTEyKQhueeqAyGy8RaYc73URL1j"

composite_rules:
  - id: vant-encrypted-support-sidecar-archive
    desc: Vant archive carries encrypted support sidecar
    crit: hostile
    conf: 0.985
    for: [zip]
    all:
      - id: vant-support-sidecar-archive-member
      - id: micro-behaviors/data/archive/zip::zipcrypto-many-encrypted-entries

  - id: vant-obfuscated-token-exfil-payload
    desc: Obfuscated Vant token exfiltration payload
    crit: hostile
    conf: 0.99
    for: [javascript]
    all:
      - id: hardcoded-vant-token-exfil-url
      - id: a0-string-decoder-entrypoint
      - id: vant-tarball-stage-name
    any:
      - id: npm-proxy-env-string
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
      - id: ci-env-marker-string

  - id: vant-xmrig-miner-config
    desc: Obfuscated Vant payload carries XMRig miner config
    crit: suspicious
    conf: 0.98
    for: [javascript]
    all:
      - id: a0-string-decoder-entrypoint
      - id: vant-xmrig-string
      - id: vant-supportxmr-pool-endpoint
      - id: hardcoded-vant-monero-wallet
