defaults:
  platforms: [unix, windows]
  attack: T1195.002

traits:
  - id: vant-support-sidecar-archive-member
    desc: Vant archive contains unexpected utils support.js member
    crit: suspicious
    conf: 0.93
    for: [zip]
    if:
      type: raw
      substr: "vant/package/lib/utils/support.js"

  - id: hardcoded-vant-token-exfil-url
    desc: Hardcoded Vant token exfiltration endpoint
    crit: suspicious
    conf: 0.99
    for: [javascript]
    if:
      type: text
      substr: "https://80.78.28.72/tokens"

  - id: a0-string-decoder-entrypoint
    desc: a0_0x JavaScript string decoder entrypoint
    crit: notable
    conf: 0.92
    for: [javascript]
    if:
      type: text
      regex: "function a0_0x[0-9a-f]{4}\\("

  - id: vant-tarball-stage-name
    desc: Vant tarball staging filename
    crit: notable
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: "vant.tar.gz"

  - id: npm-proxy-env-string
    desc: NPM proxy environment variable string
    crit: component
    conf: 0.8
    for: [javascript]
    if:
      type: text
      substr: "npm_config_proxy"

  - id: node-child-process-string
    desc: Node child_process module string
    crit: component
    conf: 0.8
    for: [javascript]
    if:
      type: text
      substr: "child_process"

  - id: ci-env-marker-string
    desc: CI environment marker string
    crit: component
    conf: 0.75
    for: [javascript]
    if:
      type: text
      substr: "TEAMCITY_VERSION"

composite_rules:
  - id: vant-encrypted-support-sidecar-archive
    desc: Vant archive carries encrypted support sidecar
    crit: hostile
    conf: 0.985
    for: [zip]
    all:
      - id: vant-support-sidecar-archive-member
      - id: micro-behaviors/data/archive/zip::zipcrypto-many-encrypted-entries

  - id: vant-obfuscated-token-exfil-payload
    desc: Obfuscated Vant token exfiltration payload
    crit: hostile
    conf: 0.99
    for: [javascript]
    all:
      - id: hardcoded-vant-token-exfil-url
      - id: a0-string-decoder-entrypoint
      - id: vant-tarball-stage-name
    any:
      - id: npm-proxy-env-string
      - id: node-child-process-string
      - id: ci-env-marker-string
