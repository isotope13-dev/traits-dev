defaults:
  platforms:
    - unix
    - windows
  for:
    - php
traits:
  - id: remote-prop-callback-exec
    desc: Dynamic callback over object properties
    crit: component
    conf: 0.95
    attack: T1505.003
    if:
      type: text
      regex: '@?\$\w+\s*\(\s*\$this->\w+\s*,\s*\$this->\w+\s*\)'
  - id: wp-config-basename
    desc: wp-config.php file target
    crit: component
    conf: 0.85
    if:
      type: path
      basename: true
      exact: wp-config.php
  - id: wp-config-path
    desc: wp-config.php path reference
    crit: component
    conf: 0.82
    if:
      type: text
      regex: \bwp-config\.php\b
  - id: wp-comments-posts-masquerade
    desc: wp-comments-posts.php core-lookalike
    crit: suspicious
    conf: 0.98
    attack: T1036
    if:
      type: text
      regex: \bwp-comments-posts\.php\b
  - id: php-include-abspath-implant
    desc: Injected ABSPATH include fragment
    crit: suspicious
    conf: 0.92
    attack: T1505.003
    if:
      type: text
      regex: <\?php\s+include\s+ABSPATH
  - id: googlebot-token
    desc: Googlebot token reference
    crit: component
    conf: 0.75
    if:
      type: text
      substr: Googlebot
composite_rules:
  - id: wordpress-plugin-remote-callback-backdoor
    desc: WordPress plugin remote callback backdoor
    crit: suspicious
    conf: 0.99
    attack: T1505.003
    all:
      - id: micro-behaviors/data/serialize/object::remote-unserialize
      - id: micro-behaviors/communications/http/request/wordpress::unauthenticated-rest-route
      - id: remote-prop-callback-exec
  - id: wordpress-config-dropper
    desc: WordPress config implant dropper
    crit: suspicious
    conf: 0.98
    attack: T1105
    all:
      - id: micro-behaviors/communications/http/client/file-read::file-get-contents-url
      - id: micro-behaviors/fs/file/write/direct::php-file-write
      - id: wp-config-path
    any:
      - id: wp-comments-posts-masquerade
      - id: php-include-abspath-implant
  - id: wordpress-googlebot-blockchain-cloak
    desc: Googlebot cloaked blockchain-resolved implant
    crit: suspicious
    conf: 0.97
    attack: T1102
    all:
      - id: googlebot-token
      - id: objectives/command-and-control/infrastructure/blockchain/multi-chain::eth-call
      - id: micro-behaviors/communications/http/client/file-read::file-get-contents-url
      - id: wp-config-basename
    any:
      - id: objectives/command-and-control/infrastructure/blockchain/multi-chain::public-evm-rpc-endpoint
      - id: objectives/command-and-control/infrastructure/blockchain/multi-chain::contract-address-encoded
