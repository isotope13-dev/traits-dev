# Build-artifact injection in an impersonating npm library.
# A side-effect-only external require in a Node dist entrypoint is not enough
# to call a package malicious. It becomes hostile here only when the archive
# also impersonates EthereumJS and carries parallel source/browser entrypoints,
# which exposes a Node-only shipped modification.
defaults:
  platforms: [unix, windows]
  for: [npm, tar, zip]
  attack: T1195.002, T1059.007
  mbc: B0024

traits:
  - id: dist-tree-artifact
    desc: JavaScript distribution tree artifact
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|/)dist/'

  - id: source-tree-artifact
    desc: TypeScript source tree artifact
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|/)src/'

  - id: browser-dist-tree-artifact
    desc: Browser distribution tree artifact
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: path
      regex: '(^|/)dist\.browser/'

composite_rules:
  - id: npm-node-dist-side-effect-build
    desc: Node dist entrypoint has a package side effect beside source and browser builds
    crit: suspicious
    conf: 0.92
    scope: archive
    all:
      - id: micro-behaviors/os/module/load::cjs-side-effect-package-require
      - id: dist-tree-artifact
      - id: source-tree-artifact
      - id: browser-dist-tree-artifact
      - id: metadata/package/manifest/entrypoint::main-dist-entrypoint

  - id: ethereumjs-util-node-artifact-injection
    desc: EthereumJS impersonator has a Node-only injected package require
    crit: hostile
    conf: 0.995
    scope: archive
    all:
      - id: npm-node-dist-side-effect-build
      - id: objectives/supply-chain/impersonation/brand::ethereumjs-util-identity-impersonation
