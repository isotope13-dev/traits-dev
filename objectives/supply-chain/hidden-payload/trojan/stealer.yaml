# npm supply-chain stealer family (Shai-Hulud / s1ngularity-style variants).
# Detects the convention pattern: postinstall lifecycle guard + cloud-sandbox
# bail-out + dunder-prefixed credential globals.  Each --rx-N component
# requires a *structural* dunder context (var-decl, global.__, or `__x = `)
# AND a credential keyword — never the bare keyword alone.  Bare-substring
# matches were producing false positives on benign packages that mentioned
# words like "secret" or "github" in rule names, ABI strings, or descriptions.
defaults:
  platforms:
    - unix
    - windows
  attack: T1195.002
  for:
    - javascript
    - typescript
traits:
  - id: stealer-string
    desc: require('./stealer*') local module import
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: require\s*\(\s*['"]\./stealer
  - id: grabber-string
    desc: require('./grabber*') local module import
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: require\s*\(\s*['"]\./grabber
  - id: homedir-app-check
    desc: 'os.homedir === ''/app'' cloud-sandbox guard'
    crit: suspicious
    conf: 0.9
    mbc: B0007
    attack: T1497.001
    if:
      type: text
      regex: homedir\(\)\s*===?\s*['"]/?app['"]
  - id: app-path-string
    desc: '"/app" string literal'
    # Composite fragment only: "/app" is a hugely common container/app path
    # (WASM fs roots, Docker workdirs). It carries no signal without the
    # adjacent os.homedir() guard required by cloud-sandbox-check.
    crit: component
    conf: 0.5
    if:
      type: literal
      exact: /app
  - id: global-dunder-assignment
    desc: globalThis.__ dunder global reference
    crit: notable
    conf: 0.75
    mbc: B0024
    if:
      type: symbol
      regex: ^global(This)?\.__[a-z_]+
    # Bundled apps legitimately coordinate via globalThis.__<name> globals
    # (e.g. an extension's __privacyOffscreen / __whisperOffscreen offscreen
    # handles); suppress on recognized bundler/minified output.
    unless:
      - id: metadata/library/structure/
      - id: well-known/app/electron-auth::electron-ml-parity-runner
  - id: global-postinstall-flag
    desc: 'global.__<name>postinstall ID'
    crit: suspicious
    conf: 0.85
    mbc: B0024
    if:
      type: symbol
      regex: ^global(This)?\.__[a-z_]*postinstall
  - id: dunder-postinstall-decl
    desc: "__<name>postinstall ID anywhere in source"
    crit: suspicious
    conf: 0.85
    mbc: B0024
    if:
      type: text
      regex: __[a-z_]*postinstall
      case_insensitive: true
  - id: stealer-basename
    desc: Local stealer module literal
    crit: suspicious
    conf: 0.9
    mbc: E1059
    if:
      type: string_literal
      regex: ^(\./)?stealer\.(js|mjs|cjs|ts)$
      case_insensitive: true
  - id: grabber-basename
    desc: Local grabber module literal
    crit: suspicious
    conf: 0.9
    mbc: E1059
    if:
      type: string_literal
      regex: ^(\./)?grabber\.(js|mjs|cjs|ts)$
      case_insensitive: true
  - id: react-do-not-use-fired
    desc: React internal global state
    crit: component
    conf: 0.9
    if:
      type: text
      substr: _DO_NOT_USE_OR_YOU_WILL_BE_FIRED
  - id: profiler-refresh-toolbar-marker
    desc: Profiler refresh toolbar global marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: __PROFILER_REFRESH_TOOLBAR__
composite_rules:
  - id: stealer-import
    desc: Local ./stealer or ./grabber module imported via require
    crit: suspicious
    conf: 0.9
    any:
      - id: objectives/supply-chain/recon-exfil/host-profile/install-context::local-stealer-import
      - id: stealer-string
      - id: grabber-string
  - id: cloud-sandbox-check
    desc: Cloud-environment bail-out via os.homedir() comparison to '/app'
    crit: suspicious
    conf: 0.85
    mbc: B0007
    attack: T1497.001
    all:
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: app-path-string
  - id: supply-chain-stealer
    desc: npm supply-chain stealer (stealer module + postinstall guard + cloud probe)
    crit: hostile
    conf: 0.98
    mbc: E1059
    all:
      - id: stealer-import
      - id: micro-behaviors/process/argument/lifecycle::postinstall-argv-check
      - id: micro-behaviors/process/user/query::os-homedir-call
  - id: stealer-sandbox-evasion
    desc: Stealer with cloud-sandbox guard followed by process.exit
    crit: hostile
    conf: 0.98
    mbc: B0007
    attack: T1497.001
    all:
      - id: stealer-import
      - id: cloud-sandbox-check
      - id: micro-behaviors/process/exit/terminate::process-exit
  - id: stealer-declaration
    desc: stealer.* file containing dunder credential vars and a postinstall flag
    crit: hostile
    conf: 0.95
    mbc: E1059
    attack: T1528
    all:
      - id: stealer-basename
      - id: micro-behaviors/data/source/syntax/credential::dunder-credential-variable-declaration
      - id: dunder-postinstall-decl
  - id: stealer-postinstall-tracking
    desc: stealer.* file containing a dunder postinstall state flag
    crit: suspicious
    conf: 0.9
    mbc: B0024
    all:
      - id: stealer-basename
      - id: dunder-postinstall-decl
  - id: token-theft-declaration
    desc: Dunder credential vars co-occur with postinstall state flag
    crit: suspicious
    conf: 0.88
    mbc: E1059
    attack: T1528
    all:
      - id: micro-behaviors/data/source/syntax/credential::dunder-credential-variable-declaration
      - id: dunder-postinstall-decl
    unless:
      - id: metadata/library/structure/
      - id: profiler-refresh-toolbar-marker
      - id: react-do-not-use-fired
      - id: well-known/lib/tina4ruby::dev-admin-js
      - id: well-known/lib/aws-sdk-js/
      - id: metadata/library/structure/
