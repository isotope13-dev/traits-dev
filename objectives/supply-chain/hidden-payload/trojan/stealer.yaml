composite_rules:
- id: stealer-import
  desc: Local stealer/grabber module import
  crit: suspicious
  conf: 0.9
  any:
  - id: objectives/supply-chain/metadata-anomaly/markers/npm::local-stealer-import
  - id: stealer-string
  - id: grabber-string
- id: cloud-sandbox-check
  desc: Cloud environment sandbox detection
  crit: suspicious
  conf: 0.85
  mbc: B0007
  attack: T1497.001
  all:
  - id: objectives/discovery/system/fingerprint/hardware::os-homedir-call
  - id: app-path-string
- id: postinstall-abuse
  desc: NPM postinstall hook abuse
  crit: suspicious
  conf: 0.85
  mbc: B0024
  any:
  - id: postinstall-argv-check
  - id: postinstall-flag-string
- id: dunder-token-decl
  desc: Dunder token storage variable
  crit: suspicious
  conf: 0.85
  mbc: E1059
  attack: T1528
  any:
  - id: dunder-token-var-decl
  - id: global-dunder-token
  - id: dunder-token-assignment
- id: supply-chain-stealer
  desc: NPM supply chain stealer package
  crit: hostile
  conf: 0.98
  mbc: E1059 - javascript - typescript
  all:
  - id: stealer-import
  - id: postinstall-abuse
  - id: objectives/discovery/system/fingerprint/hardware::os-homedir-call
- id: stealer-sandbox-evasion
  desc: Stealer with sandbox evasion
  crit: hostile
  conf: 0.98
  mbc: B0007
  attack: T1497.001 - javascript - typescript
  all:
  - id: stealer-import
  - id: cloud-sandbox-check
  - id: micro-behaviors/process/exit/terminate::process-exit
- id: stealer-declaration
  desc: Stealer module declaration with token storage
  crit: hostile
  conf: 0.95
  mbc: E1059
  attack: T1528 - javascript - typescript
  all:
  - id: stealer-basename
  - id: dunder-token-decl
  - id: dunder-postinstall-decl
- id: stealer-postinstall-tracking
  desc: Stealer file with postinstall state
  crit: suspicious
  conf: 0.9
  mbc: B0024 - javascript - typescript
  all:
  - id: stealer-basename
  - id: dunder-postinstall-decl
- id: token-theft-declaration
