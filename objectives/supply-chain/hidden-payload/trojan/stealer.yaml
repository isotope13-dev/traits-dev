# npm supply-chain stealer family (Shai-Hulud / s1ngularity-style variants).
# Detects the convention pattern: postinstall lifecycle guard + cloud-sandbox
# bail-out + dunder-prefixed credential globals.  Each --rx-N component
# requires a *structural* dunder context (var-decl, global.__, or `__x = `)
# AND a credential keyword — never the bare keyword alone.  Bare-substring
# matches were producing false positives on benign packages that mentioned
# words like "secret" or "github" in rule names, ABI strings, or descriptions.
defaults:
  platforms:
    - unix
    - windows
  attack: T1195.002
  for:
    - javascript
    - typescript
traits:
  - id: stealer-string
    desc: require('./stealer*') local module import
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: require\s*\(\s*['"]\./stealer
  - id: grabber-string
    desc: require('./grabber*') local module import
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: require\s*\(\s*['"]\./grabber
  - id: homedir-app-check
    desc: 'os.homedir === ''/app'' cloud-sandbox guard'
    crit: suspicious
    conf: 0.9
    mbc: B0007
    attack: T1497.001
    if:
      type: text
      regex: homedir\(\)\s*===?\s*['"]/?app['"]
  - id: app-path-string
    desc: '"/app" string literal'
    # Composite fragment only: "/app" is a hugely common container/app path
    # (WASM fs roots, Docker workdirs). It carries no signal without the
    # adjacent os.homedir() guard required by cloud-sandbox-check.
    crit: component
    conf: 0.5
    if:
      type: literal
      exact: /app
  - id: postinstall-argv-check
    desc: process.argv check for --postinstall flag
    crit: suspicious
    conf: 0.9
    mbc: B0024
    if:
      type: string_literal
      regex: process\.argv\.(includes|indexOf)\(['"]--postinstall['"]\)
  - id: postinstall-flag-string
    desc: '"--postinstall" CLI flag string literal'
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: --postinstall
  - id: global-dunder-assignment
    desc: "global.__<name> ID"
    crit: notable
    conf: 0.75
    mbc: B0024
    if:
      type: symbol
      regex: ^global(This)?\.__[a-z_]+
    # Bundled apps legitimately coordinate via globalThis.__<name> globals
    # (e.g. an extension's __privacyOffscreen / __whisperOffscreen offscreen
    # handles); suppress on recognized bundler/minified output.
    unless:
      - id: metadata/library/structure/
  - id: global-postinstall-flag
    desc: 'global.__<name>postinstall ID'
    crit: suspicious
    conf: 0.85
    mbc: B0024
    if:
      type: symbol
      regex: ^global(This)?\.__[a-z_]*postinstall
  - id: dunder-postinstall-decl
    desc: "__<name>postinstall ID anywhere in source"
    crit: suspicious
    conf: 0.85
    mbc: B0024
    if:
      type: text
      regex: __[a-z_]*postinstall
      case_insensitive: true
  # ---- dunder-shape × credential-keyword components ----
  # Each component requires the structural shape *and* the keyword in one
  # regex. Numbering preserved for backward compatibility.
  # Shape 1: `var/let/const __<name><keyword>` declarations
  - id: dunder-token-var-decl--rx-1
    desc: "var/let/const __<name>discord<name> decl"
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b(var|let|const)\s+__\w*discord
      case_insensitive: true
  - id: dunder-token-var-decl--rx-2
    desc: "var/let/const __<name>refresh<name> decl"
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b(var|let|const)\s+__\w*refresh
      case_insensitive: true
  - id: dunder-token-var-decl--rx-3
    desc: "var/let/const __<name>session<name> decl"
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b(var|let|const)\s+__\w*session
      case_insensitive: true
  - id: dunder-token-var-decl--rx-5
    desc: var/let/const __<name>bearer<name> declaration
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b(var|let|const)\s+__\w*bearer
      case_insensitive: true
  - id: dunder-token-var-decl--rx-6
    desc: var/let/const __<name>github<name> declaration
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b(var|let|const)\s+__\w*github
      case_insensitive: true
  - id: dunder-token-var-decl--rx-7
    desc: var/let/const __<name>secret<name> declaration
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b(var|let|const)\s+__\w*secret
      case_insensitive: true
  - id: dunder-token-var-decl--rx-8
    desc: var/let/const __<name>token<name> declaration
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b(var|let|const)\s+__\w*token
      case_insensitive: true
  # Shape 2: `global.__<name><keyword>` / `globalThis.__<name><keyword>`
  # Symbol search keeps the dunders (underscores aren't leading once prefixed).
  - id: global-dunder-token--rx-9
    desc: "global(This) Discord token property"
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: ^global(This)?\.__\w*discord
  - id: global-dunder-token--rx-10
    desc: "global(This) refresh token property"
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: ^global(This)?\.__\w*refresh
  - id: global-dunder-token--rx-11
    desc: "global(This) session token property"
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: ^global(This)?\.__\w*session
  - id: global-dunder-token--rx-13
    desc: "global(This) bearer token property"
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: ^global(This)?\.__\w*bearer
  - id: global-dunder-token--rx-14
    desc: "global(This) GitHub token property"
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: ^global(This)?\.__\w*github
  - id: global-dunder-token--rx-16
    desc: "global(This) secret token property"
    crit: component
    conf: 0.85
    if:
      type: symbol
      regex: ^global(This)?\.__\w*secret
  # Shape 3: `__<name><keyword> = <expr>` re-assignment after declaration
  - id: dunder-token-assignment--rx-17
    desc: __<name>discord<name> = <expr> assignment
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b__\w*discord\w*\s*=
      case_insensitive: true
  - id: dunder-token-assignment--rx-18
    desc: __<name>refresh<name> = <expr> assignment
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b__\w*refresh\w*\s*=
      case_insensitive: true
  - id: dunder-token-assignment--rx-19
    desc: __<name>session<name> = <expr> assignment
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b__\w*session\w*\s*=
      case_insensitive: true
  - id: dunder-token-assignment--rx-21
    desc: __<name>bearer<name> = <expr> assignment
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b__\w*bearer\w*\s*=
      case_insensitive: true
  - id: dunder-token-assignment--rx-22
    desc: __<name>github<name> = <expr> assignment
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b__\w*github\w*\s*=
      case_insensitive: true
  - id: dunder-token-assignment--rx-23
    desc: __<name>secret<name> = <expr> assignment
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b__\w*secret\w*\s*=
      case_insensitive: true
  - id: dunder-token-assignment--rx-24
    desc: __<name>token<name> = <expr> assignment
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b__\w*token\w*\s*=
      case_insensitive: true
    not:
      - regex: \b__[A-Z0-9_]+__\s*=
  - id: stealer-basename
    desc: File basename starts with "stealer."
    crit: suspicious
    conf: 0.9
    mbc: E1059
    if:
      type: string_literal
      regex: ^[Ss]tealer\.
  - id: grabber-basename
    desc: File basename starts with "grabber."
    crit: suspicious
    conf: 0.9
    mbc: E1059
    if:
      type: string_literal
      regex: ^grabber\.
      case_insensitive: true
  - id: react-do-not-use-fired
    desc: React internal global state
    crit: component
    conf: 0.9
    if:
      type: text
      substr: _DO_NOT_USE_OR_YOU_WILL_BE_FIRED
  - id: profiler-refresh-toolbar-marker
    desc: Profiler refresh toolbar global marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: __PROFILER_REFRESH_TOOLBAR__
composite_rules:
  - id: stealer-import
    desc: Local ./stealer or ./grabber module imported via require
    crit: suspicious
    conf: 0.9
    any:
      - id: objectives/supply-chain/recon-exfil/host-profile/install-context::local-stealer-import
      - id: stealer-string
      - id: grabber-string
  - id: cloud-sandbox-check
    desc: Cloud-environment bail-out via os.homedir() comparison to '/app'
    crit: suspicious
    conf: 0.85
    mbc: B0007
    attack: T1497.001
    all:
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: app-path-string
  - id: postinstall-abuse
    desc: npm postinstall lifecycle abused as malicious execution trigger
    crit: suspicious
    conf: 0.85
    mbc: B0024
    any:
      - id: postinstall-argv-check
      - id: postinstall-flag-string
  - id: dunder-token-decl
    desc: Dunder-prefixed credential variable (decl, global access, or assignment)
    crit: suspicious
    conf: 0.85
    mbc: E1059
    attack: T1528
    any:
      - id: dunder-token-var-decl
      - id: global-dunder-token
      - id: dunder-token-assignment
  - id: supply-chain-stealer
    desc: npm supply-chain stealer (stealer module + postinstall guard + cloud probe)
    crit: hostile
    conf: 0.98
    mbc: E1059
    all:
      - id: stealer-import
      - id: postinstall-abuse
      - id: micro-behaviors/process/user/query::os-homedir-call
  - id: stealer-sandbox-evasion
    desc: Stealer with cloud-sandbox guard followed by process.exit
    crit: hostile
    conf: 0.98
    mbc: B0007
    attack: T1497.001
    all:
      - id: stealer-import
      - id: cloud-sandbox-check
      - id: micro-behaviors/process/exit/terminate::process-exit
  - id: stealer-declaration
    desc: stealer.* file containing dunder credential vars and a postinstall flag
    crit: hostile
    conf: 0.95
    mbc: E1059
    attack: T1528
    all:
      - id: stealer-basename
      - id: dunder-token-decl
      - id: dunder-postinstall-decl
  - id: stealer-postinstall-tracking
    desc: stealer.* file containing a dunder postinstall state flag
    crit: suspicious
    conf: 0.9
    mbc: B0024
    all:
      - id: stealer-basename
      - id: dunder-postinstall-decl
  - id: token-theft-declaration
    desc: Dunder credential vars co-occur with postinstall state flag
    crit: suspicious
    conf: 0.88
    mbc: E1059
    attack: T1528
    all:
      - id: dunder-token-decl
      - id: dunder-postinstall-decl
  - id: dunder-token-var-decl
    desc: __dunder var/let/const declaration containing a credential keyword
    crit: notable
    conf: 0.85
    mbc: E1059
    attack: T1528
    any:
      - id: dunder-token-var-decl--rx-1
      - id: dunder-token-var-decl--rx-2
      - id: dunder-token-var-decl--rx-3
      - id: dunder-token-var-decl--rx-5
      - id: dunder-token-var-decl--rx-6
      - id: dunder-token-var-decl--rx-7
      - id: dunder-token-var-decl--rx-8
  - id: global-dunder-token
    desc: global(This).__dunder property access containing a credential keyword
    crit: notable
    conf: 0.85
    mbc: E1059
    attack: T1528
    any:
      - id: global-dunder-token--rx-9
      - id: global-dunder-token--rx-10
      - id: global-dunder-token--rx-11
      - id: global-dunder-token--rx-13
      - id: global-dunder-token--rx-14
      - id: global-dunder-token--rx-16
  - id: dunder-token-assignment
    desc: __dunder = <expr> assignment containing a credential keyword
    crit: suspicious
    conf: 0.85
    mbc: E1059
    attack: T1528
    any:
      - id: dunder-token-assignment--rx-17
      - id: dunder-token-assignment--rx-18
      - id: dunder-token-assignment--rx-19
      - id: dunder-token-assignment--rx-21
      - id: dunder-token-assignment--rx-22
      - id: dunder-token-assignment--rx-23
      - id: dunder-token-assignment--rx-24
    unless:
      - id: metadata/library/structure/
      - id: profiler-refresh-toolbar-marker
      - id: react-do-not-use-fired
      - id: well-known/lib/tina4ruby::dev-admin-js
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::wine-include-path
