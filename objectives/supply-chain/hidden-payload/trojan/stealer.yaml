defaults:
  platforms:
  - unix
  - windows
  attack: T1195.002
  for:
  - javascript
  - typescript
traits:
- id: stealer-string
  desc: Stealer module string reference
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: require\s*\(\s*['"]\./stealer
- id: grabber-string
  desc: Grabber module string reference
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: require\s*\(\s*['"]\./grabber
- id: homedir-app-check
  desc: Homedir /app sandbox check
  crit: suspicious
  conf: 0.9
  mbc: B0007
  attack: T1497.001
  if:
    type: text
    regex: homedir\(\)\s*===?\s*['"]/?app['"]
- id: app-path-string
  desc: Cloud sandbox /app path marker
  crit: notable
  conf: 0.5
  if:
    type: string_literal
    exact: /app
- id: postinstall-argv-check
  desc: Check for --postinstall in argv
  crit: suspicious
  conf: 0.9
  mbc: B0024
  if:
    type: string_literal
    regex: process\.argv\.(includes|indexOf)\(['"]--postinstall['"]\)
- id: postinstall-flag-string
  desc: --postinstall flag string
  crit: notable
  conf: 0.7
  if:
    type: string_literal
    substr: --postinstall
- id: global-dunder-assignment
  desc: Global double-underscore variable assignment pattern
  crit: notable
  conf: 0.75
  mbc: B0024
  if:
    type: string_literal
    regex: global\.__[a-z_]+
    case_insensitive: true
- id: global-postinstall-flag
  desc: Global postinstall state flag
  crit: suspicious
  conf: 0.85
  mbc: B0024
  if:
    type: string_literal
    regex: global\.__[a-z_]*postinstall
    case_insensitive: true
- id: dunder-postinstall-decl
  desc: Dunder postinstall variable declaration
  crit: suspicious
  conf: 0.85
  mbc: B0024
  if:
    type: text
    regex: __[a-z_]*postinstall
    case_insensitive: true
- id: dunder-token-var-decl--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    case_insensitive: true
    substr: discord
