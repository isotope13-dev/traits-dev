defaults:
  platforms: [windows, unix]
  for: [php]
  attack: T1195.002

traits:
  - id: php-config-payload-field
    # Building block only: a `'payload' => base64_encode(...)` array entry is the
    # standard way frameworks persist an encoded blob under a field named "payload"
    # (e.g. Laravel's DatabaseSessionHandler writing the session column). It carries
    # no standalone intent — the trojan verdict comes from the hostile
    # `php-config-hidden-payload-loader` composite, which also requires the
    # `include $payloadFile` decode-and-execute leg.
    desc: PHP config payload field (base64 value)
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']payload["'']\s*=>\s*base64_encode'
  - id: php-hidden-payload-include
    desc: PHP includes decoded payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'base64_decode[\s\S]{0,900}include\s+\$payloadFile'

composite_rules:
  - id: php-config-hidden-payload-loader
    desc: PHP config hidden payload loader
    crit: hostile
    conf: 0.98
    all:
      - id: php-config-payload-field
      - id: php-hidden-payload-include
