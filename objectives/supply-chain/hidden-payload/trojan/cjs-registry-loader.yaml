# Import-time loaders hidden behind a string-selected transitive function.
# The registry lookup is neutral by itself; the archive composite requires the
# unusual registry dependency, dual package entrypoints, and module-scope call.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, archives]
  attack: T1195.002,T1059.007
  mbc: B0024

composite_rules:
  - id: cjs-indirect-registry-import-loader
    desc: CJS import-time registry loader
    crit: hostile
    conf: 0.98
    scope: archive
    for: [archives]
    all:
      - id: metadata/import/package::require-url-func-registry
      - id: micro-behaviors/data/control-flow/module-exec::module-scope-string-registry-call
      - id: metadata/package/manifest/entrypoint::pkg-exports-field-entry
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/tool/detection/
