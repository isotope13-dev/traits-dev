- id: node-addon-embedded-shell-stage
  desc: Native Node addon embedded shell stage
  crit: suspicious
  conf: 0.93
  platforms:
  - linux
  for:
  - elf
  all:
  - id: metadata/binary/framework::node-api-addon-export
  - id: micro-behaviors/data/embedded/payload::embedded-shell-stage
- id: node-addon-daemonized-shell-stage
  desc: Native Node addon daemonized shell stage
  crit: suspicious
  conf: 0.95
  platforms:
  - linux
  for:
  - elf
  all:
  - id: node-addon-shell-stage
  - id: objectives/persistence/system/daemon/init::unix-daemon-persistence
- id: hidden-temp-shell-native-addon-dropper
  desc: Native Node addon hidden temp shell dropper
  crit: hostile
  conf: 0.97
  platforms:
  - linux
  for:
  - elf
  all:
  - id: node-addon-shell-stage
  - id: node-addon-hidden-temp-writer
