defaults:
  platforms:
  - macos
  - linux
  for:
  - macho
  - elf
  attack: T1195.002

composite_rules:
- id: node-addon-solana-network-backdoor
  desc: Native Node addon Solana network implant
  crit: hostile
  conf: 0.96
  all:
  - id: metadata/binary/framework::node-api-native-addon
  - id: micro-behaviors/communications/http/url::solana-rpc-url
  - id: micro-behaviors/communications/http/lib::rust-http-client
  - id: micro-behaviors/process/create/direct::posix-spawn-with-fd-actions
  any:
  - id: micro-behaviors/process/identity/setuid::setuid-dup
  - id: micro-behaviors/process/identity/setuid::setgid
  - id: micro-behaviors/dylib/load::dlopen
  needs: 2
- id: node-addon-network-privilege-capabilities
  desc: Native Node addon with network privilege controls
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/binary/framework::node-api-native-addon
  - id: micro-behaviors/communications/http/lib::rust-http-client
  any:
  - id: micro-behaviors/process/create/direct::posix-spawn-with-fd-actions
  - id: micro-behaviors/process/identity/setuid::setuid-dup
  - id: micro-behaviors/process/identity/setuid::setgid
  - id: micro-behaviors/communications/proxy/library::macos-system-proxy-config
  needs: 2
- id: node-addon-shell-stage
  desc: Native Node addon shell stage
  crit: suspicious
  conf: 0.92
  platforms:
  - linux
  for:
  - elf
  all:
  - id: metadata/binary/framework::node-api-addon-export
  - id: micro-behaviors/process/create/shell/encoded::bin-sh-binary-text
  - id: micro-behaviors/process/create/execv::c-exec-variants
- id: node-addon-hidden-temp-writer
  desc: Native Node addon hidden tmp writer
  crit: suspicious
  conf: 0.92
  platforms:
  - linux
  for:
  - elf
  all:
  - id: metadata/binary/framework::node-api-addon-export
  - id: micro-behaviors/fs/path/temp::tmp-hidden-file
  - id: micro-behaviors/fs/file/write::write
  - id: micro-behaviors/fs/chmod::syscall-chmod
- id: node-addon-env-gated-stage
  desc: Native Node addon env gated stage
  crit: suspicious
  conf: 0.9
  platforms:
  - linux
  for:
  - elf
  all:
  - id: metadata/binary/framework::node-api-addon-export
  - id: objectives/command-and-control/infrastructure/config::uppercase-config-env
