defaults:
  platforms:
  - macos
  - linux
  for:
  - macho
  - elf
  attack: T1195.002

composite_rules:
- id: node-addon-solana-network-backdoor
  desc: Native Node addon Solana network implant
  crit: hostile
  conf: 0.96
  all:
  - id: metadata/binary/framework::node-api-native-addon
  - id: micro-behaviors/communications/http/url/rpc::solana-rpc-url
  - id: micro-behaviors/communications/http/lib/crate
  - id: micro-behaviors/process/create/direct::posix-spawn-with-fd-actions
  any:
  - id: micro-behaviors/process/identity/setuid::setuid-dup
  - id: micro-behaviors/process/identity/setuid::setgid
  - id: micro-behaviors/dylib/load/runtime::dlopen
  needs: 2
- id: node-addon-shell-stage
  desc: Native Node addon shell stage
  crit: suspicious
  conf: 0.92
  platforms:
  - linux
  for:
  - elf
  all:
  - id: metadata/binary/framework::node-api-addon-export
  - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
  - id: micro-behaviors/process/create/execv::c-exec-variants
  unless:
  - id: well-known/app/nx::nx-native-addon
  - id: well-known/tool/reverse-engineering/frida/
- id: node-addon-hidden-temp-writer
  desc: Native Node addon hidden tmp writer
  crit: suspicious
  conf: 0.92
  platforms:
  - linux
  for:
  - elf
  all:
  - id: metadata/binary/framework::node-api-addon-export
  - id: micro-behaviors/fs/path/temp::tmp-hidden-file
  - id: micro-behaviors/fs/file/write/direct::write
  - id: micro-behaviors/fs/chmod/modify::syscall-chmod
  unless:
  - id: well-known/tool/reverse-engineering/frida/
- id: node-addon-env-gated-stage
  desc: Native Node addon env gated stage
  crit: suspicious
  conf: 0.9
  platforms:
  - linux
  for:
  - elf
  all:
  - id: metadata/binary/framework::node-api-addon-export
  - id: metadata/file/policy/config/env::uppercase-config-env
  - id: micro-behaviors/os/env/vars/access::getenv
  unless:
  - id: well-known/tool/reverse-engineering/frida/
- id: node-addon-embedded-shell-stage
  desc: Native Node addon embedded shell stage
  crit: suspicious
  conf: 0.93
  platforms:
  - linux
  for:
  - elf
  all:
  - id: metadata/binary/framework::node-api-addon-export
  - id: micro-behaviors/data/embedded/payload/native::embedded-shell-stage
  unless:
  - id: well-known/tool/reverse-engineering/frida/
- id: node-addon-daemonized-shell-stage
  desc: Native Node addon daemonized shell stage
  crit: suspicious
  conf: 0.95
  platforms:
  - linux
  for:
  - elf
  all:
  - id: node-addon-shell-stage
  - id: micro-behaviors/process/daemonize/detach::fork-new-session
  unless:
  - id: well-known/tool/reverse-engineering/frida/
- id: hidden-temp-shell-native-addon-dropper
  desc: Native Node addon hidden temp shell dropper
  crit: hostile
  conf: 0.97
  platforms:
  - linux
  for:
  - elf
  all:
  - id: node-addon-shell-stage
  - id: node-addon-hidden-temp-writer
  any:
  - id: node-addon-env-gated-stage
  - id: node-addon-embedded-shell-stage
  - id: micro-behaviors/process/daemonize/detach::fork-new-session
- id: embedded-shell-native-addon-dropper
  desc: Native Node addon embedded shell dropper
  crit: hostile
  conf: 0.98
  platforms:
  - linux
  for:
  - elf
  all:
  - id: node-addon-embedded-shell-stage
  - id: node-addon-hidden-temp-writer
  any:
  - id: node-addon-env-gated-stage
  - id: micro-behaviors/process/daemonize/detach::fork-new-session
- id: daemonized-native-addon-dropper
  desc: Daemonized native Node addon dropper
  crit: hostile
  conf: 0.98
  platforms:
  - linux
  for:
  - elf
  all:
  - id: hidden-temp-shell-native-addon-dropper
  - id: micro-behaviors/process/daemonize/detach::fork-new-session
- id: unsigned-windows-loader-anti-analysis
  desc: Unsigned Windows loader with anti-analysis surfaces
  crit: hostile
  conf: 0.97
  platforms:
  - windows
  for:
  - pe
  attack: T1027,T1622,T1195.002
  all:
  - id: metadata/binary/metrics/structural::minimal-exports
  - id: metadata/binary/debug::pdb-desktop-path
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: micro-behaviors/mem/protect/modify::virtual-protect
