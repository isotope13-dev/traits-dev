defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, npm]
  attack: T1195.002

composite_rules:
  - id: package-entrypoint-bytecode-loader
    desc: Package entrypoint loads hidden bytecode
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: objectives/supply-chain/hidden-payload/encoding::require-bytenode
      - id: objectives/supply-chain/hidden-payload/encoding::require-local-jsc
      - id: metadata/package/manifest/entrypoint::main-js-file-entry
