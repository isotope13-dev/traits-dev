defaults:
  platforms: [windows, unix]
  for: [php]
  attack: T1195.002
  mbc: B0024
composite_rules:
  - id: laravel-package-autoloaded-routes
    desc: Laravel package auto-loads web routes
    crit: notable
    conf: 0.88
    all:
      - id: micro-behaviors/communications/http/server::laravel-load-routes-from
      - id: micro-behaviors/fs/path/application::laravel-package-web-routes-path

