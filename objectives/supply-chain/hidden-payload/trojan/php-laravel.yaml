defaults:
  platforms: [windows, unix]
  for: [php]
  attack: T1195.002
  mbc: B0024
composite_rules:
  - id: laravel-package-autoloaded-routes
    desc: Laravel package auto-loads web routes
    crit: notable
    conf: 0.88
    all:
      - id: micro-behaviors/communications/http/server/route::laravel-load-routes-from
      - id: micro-behaviors/fs/path/application/webapp::laravel-package-web-routes-path

  - id: laravel-autoloaded-destructive-route
    desc: Laravel package auto-loads destructive route
    crit: hostile
    conf: 0.96
    for: [none]
    all:
      - id: laravel-package-autoloaded-routes
      - id: objectives/command-and-control/backdoor/webshell/exec::laravel-destructive-route-backdoor
