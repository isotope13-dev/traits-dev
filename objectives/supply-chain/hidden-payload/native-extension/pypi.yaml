defaults:
  platforms: [windows, unix]
  attack: T1195.002
composite_rules:
  - id: pypi-massive-native-extension-minimal-metadata
    desc: PyPI package ships massive native extension with minimal metadata
    crit: suspicious
    conf: 0.92
    for: [python, pkginfo, zip, archives]
    all:
      - id: metadata/file/extension::cpython-native-extension-module
      - id: metadata/binary/metrics/size::massive-executable
      - id: metadata/package/fields/dependencies::pypi-no-runtime-deps
    any:
      - id: objectives/supply-chain/metadata-anomaly/description::pkginfo-no-summary
      - id: objectives/supply-chain/metadata-anomaly/description::pkginfo-missing-description
      - id: metadata/package/fields/author::pkginfo-no-author
      - id: metadata/package/fields/author::pkginfo-no-author-email
    scope: archive
  - id: native-extension-anti-debug-file-enum
    desc: Native Python extension combines anti-debug and file enumeration
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    all:
      - id: metadata/file/extension::cpython-native-extension-module
      - id: objectives/collection/file-targeting/enumeration::file-enumeration-with-access
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
    unless:
      # pyca/cryptography's _openssl extension scans cert paths and pulls
      # IsDebuggerPresent via the MSVC CRT — both benign for OpenSSL.
      - id: well-known/lib/openssl::openssl-cryptogams
  - id: pypi-native-anti-debug-file-enum
    desc: PyPI package includes native extension with anti-debug file enumeration
    crit: suspicious
    conf: 0.92
    for: [python, pkginfo, zip, archives]
    all:
      - id: native-extension-anti-debug-file-enum
      - id: metadata/package/fields/dependencies::pypi-no-runtime-deps
    scope: archive
