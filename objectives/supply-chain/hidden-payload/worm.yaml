defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
  mbc: F0001
traits:
  - id: npm-owner-add-exec
    desc: Executes npm owner add command
    crit: suspicious
    attack: T1098
    if:
      type: string_value
      regex: npm\s+owner\s+add
  - id: npm-whoami-exec
    desc: Executes npm whoami command
    crit: notable
    attack: T1098
    if:
      type: string_value
      regex: npm\s+whoami
  - id: npm-profile-url
    desc: NPM user profile URL pattern
    crit: notable
    attack: T1098
    if:
      type: string_value
      regex: npmjs\.org/~
  - id: remove-postinstall
    desc: Removes postinstall script
    crit: suspicious
    attack: T1098
    if:
      type: string_value
      regex: delete\s+\w+\.scripts\.postinstall
  - id: npm-publish-exec
    desc: Executes npm publish command
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    size_max: 500000
    if:
      type: raw
      regex: '(exec|spawn).{0,40}npm\s+publish'
    not:
      - substr: "broken `npm publish`"
    unless:
      - type: raw
        substr: "broken `npm publish`. Please report to https://github.com/babel/babel/issues"
  - id: delete-private-field
    desc: Deletes private field from package data
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    if:
      type: raw
      regex: delete\s+\w+\.private
    not:
      - substr: "delete e.private"
      - substr: "delete connection.private"
composite_rules:
  - id: npm-package-worm
    desc: NPM package worm (adds owner to packages)
    crit: hostile
    all:
      - id: npm-owner-add-exec
      - id: npm-whoami-exec
    any:
      - id: npm-profile-url
      - id: remove-postinstall
  - id: npm-package-spam
    desc: Modifies and mass-publishes npm packages
    crit: hostile
    conf: 0.95
    attack: T1195.002
    all:
      - id: npm-publish-exec
      - id: micro-behaviors/process/create/shell/lang::js-exec
    any:
      - id: delete-private-field
      - id: npm-owner-add-exec
      - id: remove-postinstall
