defaults:
  platforms: [unix, windows]
  for: [npm]
  attack: T1195.002

composite_rules:
  - id: hollow-npm-package-with-encoded-payload
    desc: Hollow npm package carries an encoded payload
    crit: suspicious
    conf: 0.94
    scope: archive
    all:
      - id: objectives/supply-chain/impersonation/manifest/placeholder::mature-hollow-index-package
      - id: micro-behaviors/data/decode/base64::decoded-text-carrier
