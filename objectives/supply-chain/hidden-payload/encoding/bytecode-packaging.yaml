defaults:
  platforms: [unix, windows]
traits:
  - id: dependency-bytenode
    desc: Package depends on bytenode
    crit: notable
    conf: 0.95
    for: [package.json]
    if:
      type: value
      path: "dependencies.bytenode"
      exists: true
  - id: files-publish-jsc
    desc: Package publishes .jsc payloads
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: value
      path: "files"
      regex: \.jsc
  - id: dual-jsc-payloads
    desc: Package publishes multiple jsc payloads
    crit: suspicious
    conf: 0.93
    for: [package.json]
    if:
      type: text
      regex: '"files"\s*:\s*\[[^]]*\.jsc[^]]*\.jsc'
  - id: dual-js-loaders
    desc: Package ships multiple tiny js loaders
    crit: notable
    conf: 0.9
    for: [package.json]
    if:
      type: text
      regex: '"files"\s*:\s*\[[^]]*\.jsc[^]]*\.js"[^]]*\.js"'
    not:
      - substr: '"inherits.js"'
  - id: require-bytenode
    desc: Requires bytenode runtime
    crit: notable
    conf: 0.95
    for: [javascript]
    if:
      type: symbol
      kind: import
      exact: bytenode
  - id: require-local-jsc
    desc: Requires local .jsc payload
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: require\(['"]\./[^'"\n]{1,80}\.jsc['"]\)
  - id: opaque-bytecode-atob-marker
    desc: Opaque payload contains atob marker
    crit: suspicious
    conf: 0.9
    for: [data]
    if:
      type: text
      substr: atob
    unless:
      - id: well-known/app/1password::onepassword-v8-snapshot-name
      - id: well-known/app/wordpress-plugins::bitfire-plugin-path
      # WebPerl's Emscripten data blob (emperl.data) bundles a Perl filesystem
      # that contains the token "atob"; it is a legit engine, not a payload.
      - id: well-known/app/exiftool::webperl-emscripten-engine
      # ExifTool's Geolocation.dat database likewise contains the token "atob".
      - id: well-known/app/exiftool::exiftool-perl-tree
      # Ente's KDT1 geolocation database stores city names in a concatenated
      # string table; "atob" can occur across adjacent city names.
      - id: metadata/file/magic/identity::kdt1-geospatial-tree
      # Bruno's shipped Electron V8 snapshot is opaque data, not a decoded
      # JavaScript payload; its string table happens to contain "atob".
      - id: well-known/app/bruno::v8-context-snapshot
      # Electron's V8 context snapshot format is likewise opaque runtime data.
      - id: well-known/lib/electron::v8-context-snapshot-name
  - id: opaque-bytecode-compile-marker
    desc: Opaque Node module._compile call
    crit: suspicious
    conf: 0.92
    for: [data]
    if:
      type: text
      regex: '(?i)\bmodule\s*\.\s*_compile\s*\('
composite_rules:
  - id: jsc-runtime-loader
    desc: bytenode loader for local bytecode
    crit: suspicious
    conf: 0.96
    for: [javascript]
    all:
      - id: require-bytenode
      - id: require-local-jsc
      - id: metadata/file/metrics::tiny-javascript-file-lines
      - id: metadata/file/metrics::tiny-javascript-file-size
  - id: try-catch-bytecode-loader
    desc: Package probes local bytecode through bytenode
    crit: hostile
    conf: 0.98
    for: [javascript]
    all:
      - id: require-bytenode
      - id: require-local-jsc
      - id: objectives/supply-chain/trojanized/library/hidden-dep::fallback-try-require
  - id: opaque-bytecode-decoder-compiler
    desc: Opaque payload decodes and compiles code
    crit: hostile
    conf: 0.98
    for: [data]
    all:
      - id: opaque-bytecode-atob-marker
      - id: opaque-bytecode-compile-marker
  - id: package-ships-bytenode-bytecode
    desc: npm package ships bytenode bytecode
    crit: suspicious
    conf: 0.97
    for: [package.json]
    all:
      - id: dependency-bytenode
      - id: files-publish-jsc
    any:
      - id: metadata/package/manifest/entrypoint::bin-js-entry
      - id: metadata/package/manifest/entrypoint::main-js-file-entry
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
  - id: postinstall-bytenode-bytecode
    desc: Postinstall package launches bytecode payload
    crit: hostile
    conf: 0.98
    for: [package.json]
    all:
      - id: dependency-bytenode
      - id: files-publish-jsc
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: metadata/package/manifest/entrypoint::bin-js-entry
  - id: dual-loader-bytecode-package
    desc: Dual-loader bytenode bytecode package
    crit: hostile
    conf: 0.99
    for: [package.json]
    all:
      - id: dependency-bytenode
      - id: dual-jsc-payloads
      - id: dual-js-loaders
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
    any:
      - id: metadata/package/manifest/entrypoint::bin-js-entry
      - id: metadata/package/manifest/entrypoint::main-js-file-entry
