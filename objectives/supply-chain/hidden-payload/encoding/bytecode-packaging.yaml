defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: dependency-bytenode
    desc: Package depends on bytenode
    crit: notable
    conf: 0.95
    for: [package.json]
    if:
      type: kv
      path: "dependencies.bytenode"
      exists: true
  - id: files-publish-jsc
    desc: Package publishes .jsc payloads
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: kv
      path: "files"
      regex: \.jsc
  - id: bin-js-loader
    desc: Package bin points to js loader
    crit: component
    conf: 0.8
    for: [package.json]
    if:
      type: kv
      path: "bin"
      regex: \.js
  - id: postinstall-node-loader
    desc: Postinstall runs local node loader
    crit: notable
    conf: 0.9
    for: [package.json]
    if:
      type: kv
      path: "scripts.postinstall"
      regex: ^node\s+[^"\n]{1,120}\.js$
  - id: main-js-loader
    desc: Package main points to js loader
    crit: component
    conf: 0.82
    for: [package.json]
    if:
      type: kv
      path: "main"
      regex: ^[^"\n]{1,120}\.js$
    unless:
      - id: metadata/package/fields::has-index-entry
      - id: metadata/package/fields::official-react-native-package
  - id: dual-jsc-payloads
    desc: Package publishes multiple jsc payloads
    crit: suspicious
    conf: 0.93
    for: [package.json]
    if:
      type: raw
      regex: '"files"\s*:\s*\[[^]]*\.jsc[^]]*\.jsc'
  - id: dual-js-loaders
    desc: Package ships multiple tiny js loaders
    crit: notable
    conf: 0.9
    for: [package.json]
    if:
      type: raw
      regex: '"files"\s*:\s*\[[^]]*\.js"[^]]*\.js"'
  - id: require-bytenode
    desc: Requires bytenode runtime
    crit: notable
    conf: 0.95
    for: [javascript]
    if:
      type: ast
      kind: import
      exact: bytenode
  - id: require-local-jsc
    desc: Requires local .jsc payload
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: raw
      regex: require\(['"]\./[^'"\n]{1,80}\.jsc['"]\)
  - id: tiny-loader-lines
    desc: Tiny JavaScript sidecar loader
    crit: component
    conf: 0.9
    for: [javascript]
    size_max: 8192
    if:
      type: metrics
      field: "text.total_lines"
      max: 5
  - id: tiny-loader-size
    desc: Tiny JavaScript loader file
    crit: component
    conf: 0.9
    for: [javascript]
    size_max: 256
    if:
      type: basename
      regex: ^.{1,120}\.(js|cjs|mjs)$
composite_rules:
  - id: jsc-runtime-loader
    desc: bytenode loader for local bytecode
    crit: suspicious
    conf: 0.96
    for: [javascript]
    all:
      - id: require-bytenode
      - id: require-local-jsc
      - id: tiny-loader-lines
      - id: tiny-loader-size
  - id: package-ships-bytenode-bytecode
    desc: npm package ships bytenode bytecode
    crit: suspicious
    conf: 0.97
    for: [package.json]
    all:
      - id: dependency-bytenode
      - id: files-publish-jsc
    any:
      - id: bin-js-loader
      - id: main-js-loader
      - id: postinstall-node-loader
  - id: postinstall-bytenode-bytecode
    desc: Postinstall package launches bytecode payload
    crit: hostile
    conf: 0.98
    for: [package.json]
    all:
      - id: dependency-bytenode
      - id: files-publish-jsc
      - id: postinstall-node-loader
      - id: bin-js-loader
  - id: dual-loader-bytecode-package
    desc: Dual-loader bytenode bytecode package
    crit: hostile
    conf: 0.99
    for: [package.json]
    all:
      - id: dependency-bytenode
      - id: dual-jsc-payloads
      - id: dual-js-loaders
      - id: postinstall-node-loader
    any:
      - id: bin-js-loader
      - id: main-js-loader
