# Remote encrypted Python source is fetched and compiled into a live module.
# This is an executable hidden payload even when the package's visible CLI is
# presented as a social-media automation tool.
defaults:
  platforms: [unix, windows]
  for: [python, whl]
  attack: T1027,T1059.006,T1105

traits:
  - id: python-encrypted-script-endpoint
    desc: Python references remote script endpoint
    crit: component
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '/(api/)?v[0-9]+/scripts?/(platform|plugin|extension)(/|\b)'

composite_rules:
  - id: python-remote-encrypted-source-execution
    desc: Python package decrypts fetched source and compiles it in memory
    crit: hostile
    conf: 0.99
    for: [whl]
    scope: archive
    all:
      - id: python-encrypted-script-endpoint
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-aes-cbc-mode
      - id: micro-behaviors/process/interpreter/python::compile-exec-mode
      - id: micro-behaviors/os/api-resolution/dynamic::python-types-moduletype-create
    any:
      - id: micro-behaviors/crypto/symmetric/decrypt::python-decrypt-method-call
      - id: micro-behaviors/crypto/symmetric/decrypt::python-decrypt-helper-call
