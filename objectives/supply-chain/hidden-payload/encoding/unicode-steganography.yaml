# Unicode Steganography & Eval-of-Decoded-Buffer Attack Patterns
# Detects supply-chain attacks that hide payloads in invisible Unicode
# characters (variation selectors, zero-width, tag chars) or use
# eval(Buffer.from(...)) to execute dynamically decoded data.
#
# ATT&CK: T1027 (Obfuscated Files) + T1195.002 (Supply Chain: Software)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
traits:
  # ── Unicode Steganography Components ─────────────────────────────────

  # Variation selector decoding: codePointAt + VS hex constants
- id: codepoint-vs-decoder
  desc: codePointAt with variation selector hex ranges
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'codePointAt[\s\S]{0,160}0x[Ff][Ee]0[0F]'
  # Supplementary Variation Selector hex range (U+E0100–E01EF)
- id: vs-hex-range-supplementary
  desc: 'vs hex range supplementary'
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '0x[Ee]010[0F]'
- id: vs-decoder-low-range
  desc: Code-point variation selector range check
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: 'codePointAt[\s\S]{0,120}0x[Ff][Ee]00[\s\S]{0,120}0x[Ff][Ee]0[Ff]'
  unless:
  - id: well-known/lib/pdfjs/
- id: vs-decoder-supp-range
  desc: Variation selector supplementary range decoder
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: '0x[Ee]0100[\s\S]{0,120}0x[Ee]01[Ee][Ff]'
  unless:
  - id: well-known/lib/pdfjs/
  # eval(Buffer.from(...)) — eval of data decoded from any source
- id: eval-buffer-from
    # ── eval(Buffer.from(...)) Patterns ──────────────────────────────────

  desc: eval() of Buffer.from() decoded data
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'eval\(Buffer\.from\('
  # AST: eval() with any call expression argument (catches deeply nested
  # decode chains like eval(Buffer.from(s(x)).toString('utf-8')))
- id: eval-call-expr-arg
  desc: "eval() decoder-like call argument"
  crit: notable
  conf: 0.8
  if:
    type: tree-sitter
    query: |
      [
        (call_expression
          function: (identifier) @fn
          arguments: (arguments
            (call_expression
              function: (identifier) @callee))
          (#eq? @fn "eval")
          (#match? @callee "^(atob|decodeURI|decodeURIComponent|unescape)$"))
        (call_expression
          function: (identifier) @fn
          arguments: (arguments
            (call_expression
              function: (member_expression
                property: (property_identifier) @callee_prop)))
          (#eq? @fn "eval")
          (#match? @callee_prop "^(from|fromCharCode|fromCodePoint|toString|charCodeAt|codePointAt)$"))
      ]
  unless:
  - id: metadata/lang/compiled::erlang-module-marker
  - id: metadata/package/testing/
  # eval(atob(...)) — base64 decode and eval
- id: eval-atob
  desc: eval() of atob() decoded data
  crit: suspicious
  conf: 0.95
  unless:
  - id: well-known/tool/detection/
  if:
    type: text
    regex: 'eval\(\s*atob\s*\('
  # eval(decodeURIComponent(...)) — URL-encoded payload eval
- id: eval-decode-uri
  desc: eval() of URL-decoded data
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'eval\(\s*decodeURIComponent\s*\('
  # new Function(Buffer.from(...).toString(...))() — Function constructor variant
- id: function-ctor-buffer-from
  desc: "func ctor w/ Buffer.from() decoded body"
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'new Function\(Buffer\.from\('
  # new Function(atob(...))() — Function constructor with base64
- id: function-ctor-atob
  desc: Function constructor with atob() decoded body
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'new Function\(\s*atob\s*\('
  # (0, eval)(...) — indirect eval (avoids direct eval detection)
- id: indirect-eval-comma
    # ── Indirect / Disguised eval ────────────────────────────────────────

  # Building block for indirect-eval-decoded (which adds a buffer/base64 arg)
  # and the packed-payload dropper composite. Bare `(0,eval)(` is a common
  # bundler idiom, so on its own it is not a supply-chain signal — the notable
  # indirect-eval *capability* lives at micro-behaviors/process/interpreter/eval.
  desc: Indirect eval comma-operator fragment
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\(0\s*,\s*eval\)\s*\('
  # (0, eval)(Buffer. — indirect eval immediately receiving a Buffer argument;
  # this is the actual attack payload: (0,eval)(Buffer.from(s,'base64').toString())
- id: indirect-eval-buffer-arg
  desc: Indirect eval with Buffer argument
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\(0\s*,\s*eval\)\s*\(\s*Buffer\s*\.'
  # setTimeout/setInterval with decoded string — timer-based eval
- id: settimeout-decoded
  desc: setTimeout with Buffer.from decoded code
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'setTimeout\(\s*Buffer\.from\('
- id: settimeout-atob
  desc: setTimeout with atob decoded code
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'setTimeout\(\s*atob\s*\('
  # module._compile — direct module compilation of arbitrary code
- id: module-compile
  desc: Node module compile call
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: 'module\._compile\s*\('
  unless:
  - id: metadata/binary/framework::electron-framework-binary
  - type: text
    regex: 'electron/js2c/|process\._linkedBinding\("electron_'
  - type: basename
    regex: '(^|!!).{0,200}/Electron Framework\.framework/Versions/A/Electron Framework$'
  - type: basename
    exact: Electron Framework
  - type: basename
    regex: compile[-_]?cache
  - id: objectives/supply-chain/hidden-payload/encoding/
- id: module-compile-unless-cond-5--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: babel.transform
- id: module-compile-unless-cond-5--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: module._compile
- id: module-compile-unless-cond-5--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: ).code
composite_rules:
  # ── Hostile: Unicode Steganography + Eval ────────────────────────────

  # eval(Buffer.from(decoder(...))) + variation selector constants
- id: eval-unicode-stego-payload
  desc: eval() of Unicode steganography decoded payload
  crit: hostile
  conf: 0.95
  attack: T1027
  mbc: B0032
  all:
  - id: eval-buffer-from
  - id: codepoint-vs-decoder
  any:
  - id: vs-decoder-low-range
  - id: vs-decoder-supp-range
  - id: metadata/file/invisible-unicode::multiple
  # eval(Buffer.from(...)) in minified code — dropper pattern
- id: eval-decoded-buffer-obfuscated
    # ── Hostile: eval(Buffer.from) + Obfuscation ────────────────────────

  desc: Executes a Base64-decoded UTF-8 payload through eval()
  crit: hostile
  conf: 0.97
  all:
  - id: eval-buffer-from
  - id: micro-behaviors/data/decode/base64::buffer-from-base64-to-utf8
  # Appended long line in a normal file + eval + data decoding = hostile
  # This catches the classic "append one minified payload line" attack.
- id: long-line-eval-injection
    # ── Hostile: Long-Line Injection + Eval ──────────────────────────────

  desc: Eval injection via appended long line
  crit: hostile
  conf: 0.9
  attack: T1027
  all:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::appended-long-line
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  any:
  - id: eval-buffer-from
  - id: eval-atob
  - id: function-ctor-buffer-from
  - id: function-ctor-atob
  - id: micro-behaviors/data/encode/charcode
  unless:
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/library/structure/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  # new Function(Buffer.from(...)) in minified code
- id: function-ctor-decoded-obfuscated
    # ── Hostile: Function Constructor + Decoded Payload ──────────────────

  desc: Function constructor with decoded payload in obfuscated code
  crit: hostile
  conf: 0.9
  all:
  - id: function-ctor-buffer-from
  - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
  # Indirect eval (0,eval) immediately receiving a decoded buffer or base64 arg.
  # Uses indirect-eval-buffer-arg (raw co-occurrence) instead of buffer-keyword
  # (which matches any identifier containing "Buffer", causing false positives
  # in code that defines functions like resolveBuffer).
- id: indirect-eval-decoded
    # ── Suspicious: Indirect Eval Composites ─────────────────────────────

  desc: Indirect eval of decoded buffer
  crit: suspicious
  conf: 0.9
  all:
  - id: indirect-eval-comma
  any:
  - id: objectives/supply-chain/hidden-payload/encoding::indirect-eval-buffer-arg
  - id: objectives/supply-chain/hidden-payload/staging::base64-str
  # Timer-based code execution with decoded payload
- id: timer-decoded-exec
  desc: setTimeout/setInterval with decoded payload
  crit: suspicious
  conf: 0.9
  any:
  - id: settimeout-decoded
  - id: settimeout-atob
  # codePointAt + charCodeAt/fromCharCode decoder pattern (no eval needed
  # as a standalone signal — the decoder function itself is suspicious)
- id: unicode-decoder-function
  desc: Unicode code point decoder function
  crit: suspicious
  conf: 0.85
  size_max: 200000
  all:
  - id: micro-behaviors/data/encode/charcode::codepoint-at
  - id: vs-hex-range-supplementary
  any:
  - id: micro-behaviors/data/encode/charcode::charcode-at
  - id: micro-behaviors/data/encode/char-code::fromcharcode-call
  unless:
  - id: well-known/lib/blessed::blessed-terminal-unicode-module
  - id: well-known/tool/development/socket-cli::socket-dev-cli-vendored-path
  # Terminal string-width logic embedded in JS source maps is not stego.
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/file/format::sourcemap-context
- id: module-compile-unless-cond-5--rx-helper-5
  desc: Regex component marker
  crit: component
  conf: 1.0
  all:
  - id: module-compile-unless-cond-5--rx-1
  - id: module-compile-unless-cond-5--rx-2
  - id: micro-behaviors/fs/file/read-write::filesync-api-suffix
  - id: module-compile-unless-cond-5--rx-4
  near_bytes: 4096
