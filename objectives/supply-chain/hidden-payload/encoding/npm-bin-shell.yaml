defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: "T1027, T1195.002"
traits:
  - id: npm-bin-shell-separator
    desc: npm bin name injects shell command
    crit: suspicious
    conf: 0.96
    if:
      type: kv
      path: bin
      regex: "\";\\s*echo\\b"
  - id: npm-bin-long-base64-echo
    desc: npm bin echoes base64 payload
    crit: suspicious
    conf: 0.94
    if:
      type: kv
      path: bin
      regex: "\\becho\\s+[A-Za-z0-9+/=]{80,}"
  - id: npm-bin-base64-pipe-shell
    desc: npm bin decodes payload to shell
    crit: suspicious
    conf: 0.98
    attack: "T1059.004"
    if:
      type: kv
      path: bin
      regex: "\\|\\s*base64\\s+-d\\s*\\|\\s*(ba)?sh\\b"
  - id: npm-bin-b64-curl-http
    desc: npm bin payload decodes curl URL
    crit: suspicious
    conf: 0.95
    attack: "T1105"
    if:
      type: kv
      path: bin
      substr: "Y3VybCAtcyBodHRw"
  - id: npm-bin-b64-tmp-hidden-path
    desc: npm bin payload decodes hidden tmp path
    crit: suspicious
    conf: 0.94
    if:
      type: kv
      path: bin
      substr: "IC90bXAvLn"
  - id: npm-bin-b64-chmod-plus-x
    desc: npm bin payload decodes chmod executable
    crit: suspicious
    conf: 0.94
    attack: "T1222"
    if:
      type: kv
      path: bin
      substr: "IGNobW9kICt4"
  - id: npm-bin-b64-devnull-background
    desc: npm bin payload decodes silent background
    crit: suspicious
    conf: 0.94
    attack: "T1059.004"
    if:
      type: kv
      path: bin
      substr: "L2Rldi9udWxsIDI+JjEgJg"
composite_rules:
  - id: npm-bin-base64-shell-payload
    desc: npm bin hides base64 shell payload
    crit: hostile
    conf: 0.99
    attack: "T1027, T1059.004, T1195.002"
    all:
      - id: npm-bin-shell-separator
      - id: npm-bin-long-base64-echo
      - id: npm-bin-base64-pipe-shell
