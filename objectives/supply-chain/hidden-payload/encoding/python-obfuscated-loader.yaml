# A package-level interpretation of an opaque Python source loader.  The
# implementation-level chain is defined in the anti-static tier; this rule
# adds the distribution context without duplicating its atomic matchers.
defaults:
  platforms: [unix, windows]
  for: [whl]
  attack: T1195.002

composite_rules:
  - id: pypi-obfuscated-python-module-loader
    desc: PyPI wheel hides executable Python source
    crit: suspicious
    conf: 0.98
    attack: T1195.002,T1027
    scope: archive
    all:
      - id: metadata/package/quality/source::wheel-contains-python-source
      - id: objectives/anti-static/obfuscation/eval/scripting::base85-zlib-module-loader
    unless:
      - id: metadata/package/quality/recognized-contexts::clokai-opaque-engine-context
      - id: metadata/package/quality/recognized-contexts::clokai-model-runtime-context

  - id: pypi-multilayer-python-carrier
    desc: PyPI wheel embeds a large XOR-obfuscated Python execution carrier
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1027,T1140,T1059.006
    scope: archive
    all:
      - id: metadata/package/quality/source::wheel-contains-python-source
      - id: objectives/anti-static/obfuscation/control-flow/logic::b64decode-exec
      - id: objectives/anti-static/obfuscation/multi-layer::python-large-base64-carrier
      - id: micro-behaviors/crypto/symmetric/xor/loop::xor-modulo-key-loop
    unless:
      - id: metadata/package/testing/
      - id: metadata/library/runtime/

  - id: pypi-large-encoded-python-exec-carrier
    desc: PyPI wheel ships a large encoded Python exec carrier
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1027,T1140,T1059.006
    mbc: B0032
    scope: archive
    all:
      - id: metadata/package/quality/source::wheel-contains-python-source
      - id: objectives/anti-static/obfuscation/multi-layer::python-large-base64-decode-exec
    unless:
      - id: metadata/package/testing/
      - id: metadata/library/runtime/
