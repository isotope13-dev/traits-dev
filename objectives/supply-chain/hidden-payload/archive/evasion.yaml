defaults:
  platforms:
    - unix
    - windows
traits:
  - id: nested-archive-tgz
    desc: Nested .tgz archive in package
    crit: suspicious
    conf: 0.85
    for:
      - javascript
    if:
      type: string_literal
      regex: (^|/)node_modules/[^/]{1,120}/[^/]{1,120}\.tgz$|package/[^/]{1,120}\.tgz
    unless:
      - id: metadata/package/testing/harness/runtime::test-basename-suffix
