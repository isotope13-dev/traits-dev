defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
composite_rules:
  - id: spawn-bash-detached
    desc: Spawns detached bash shell process
    crit: suspicious
    conf: 0.85
    attack: "T1059.004"
    all:
      - id: micro-behaviors/process/create/spawn::spawn-bash
    any:
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::detached-dynamic
  - id: detached-node-sidecar-loader
    desc: Detached Node sidecar launches remote loader
    crit: hostile
    conf: 0.97
    attack: "T1195.002"
    for: [none]
    all:
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/create/spawn::child-unref-call
      - id: micro-behaviors/process/create/spawn::process-execpath-spawn
      - id: micro-behaviors/fs/path/construct::local-script-path
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
    any:
      - id: objectives/anti-static/obfuscation/eval/dynamic::axios-get
      - id: micro-behaviors/communications/http/request::https-get
      - id: micro-behaviors/communications/http/request::node-https-get-dynamic
      - id: micro-behaviors/communications/http/request::fetch-string
      - id: micro-behaviors/process/interpreter/vm::base64-url
      - id: objectives/command-and-control/infrastructure::jsonkeeper
      - id: objectives/anti-static/obfuscation/eval/dynamic::env-atob-decode
      - id: objectives/anti-static/obfuscation/eval/dynamic::data-dot-cookie-extract
  - id: axios-cookie-remote-eval-loader
    desc: Axios JSON cookie field eval loader
    crit: hostile
    conf: 0.99
    attack: "T1195.002"
    all:
      - id: objectives/supply-chain/trojanized/library::require-axios
      - id: objectives/anti-static/obfuscation/eval/dynamic::axios-get
      - id: objectives/anti-static/obfuscation/eval/dynamic::data-dot-cookie-extract
      - id: objectives/execution/interpreter/eval/dynamic::eval-symbol
    any:
      - id: micro-behaviors/communications/http/response::http-response-data-eval
      - id: objectives/supply-chain/hidden-payload/encoding::tiny-loader-size
      - id: objectives/command-and-control/infrastructure::npoint
