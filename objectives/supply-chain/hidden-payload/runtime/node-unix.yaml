defaults:
  platforms: [unix]
  for: [javascript]
  attack: T1027

traits:
  - id: node-base64-checksum-payload
    desc: Node base64 checksum payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: PAYLOAD_CHECKSUM

  - id: node-vm-decoded-payload
    desc: Node VM decoded payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Buffer\.from[\s\S]{0,180}vm\.runInNewContext'

composite_rules:
  - id: node-runtime-hidden-payload
    desc: Node runtime hidden payload
    crit: hostile
    conf: 0.98
    all:
      - id: node-base64-checksum-payload
      - id: node-vm-decoded-payload

  - id: node-checksum-decoded-payload
    desc: Node checksum decoded payload
    crit: hostile
    conf: 0.98
    all:
      - id: node-base64-checksum-payload
      - id: objectives/anti-static/pack/archive::node-decode-payload-import

  - id: node-encoded-stage-detached-launcher
    desc: Node decodes embedded content, stages it as a file, and launches it detached
    crit: hostile
    conf: 0.98
    attack: "T1027, T1059.007, T1105"
    mbc: "B0032, F0011"
    for: [javascript, typescript]
    near_bytes: 8192
    all:
      - id: micro-behaviors/data/decode/base64::buffer-from-base64-to-utf8
      - id: micro-behaviors/fs/file/write/direct::node-write-file-sync
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
