defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1195.002, T1059.007"

traits:
  - id: node-self-eval-argument
    desc: Node self-spawn runs inline eval
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'spawn\s*\(\s*process\.execPath[\s\S]{0,260}[''"]-e[''"]'
  - id: detached-hidden-node-spawn
    desc: Detached hidden Node child process
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'detached\s*:\s*true[\s\S]{0,180}stdio\s*:\s*[''"]ignore[''"][\s\S]{0,180}windowsHide\s*:\s*true|windowsHide\s*:\s*true[\s\S]{0,180}stdio\s*:\s*[''"]ignore[''"][\s\S]{0,180}detached\s*:\s*true'
  - id: pages-dev-output-fetch
    desc: Fetches Cloudflare Pages output path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'fetch\s*\(\s*["'']https://.{1,80}\.pages\.dev/output-[0-9]+["'']\s*\)'
  - id: workers-dev-stage-url
    desc: Cloudflare Workers stage URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'https://.{1,80}\.workers\.dev/'
  - id: fetched-text-function-param
    desc: Fetched text becomes parameterized Function
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\.text\(\)[\s\S]{0,180}new Function\(\s*["''][A-Za-z0-9_$]{1,40}["'']\s*,\s*[A-Za-z_$][A-Za-z0-9_$]*\s*\)'
  - id: year-seeded-xor-decrypt
    desc: Year-seeded XOR decrypt loop
    crit: suspicious
    conf: 0.94
    attack: T1027
    if:
      type: text
      regex: 'getFullYear\(\)[\s\S]{0,220}1103515245[\s\S]{0,160}12345[\s\S]{0,220}\^\s*\w+\(\)'
  - id: worker-assessment-gated-download
    desc: Worker assessment gates payload download
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'start-assessment[\s\S]{0,400}api/invited-ids/add|api/invited-ids/add[\s\S]{0,400}start-assessment'
  - id: camdriver-var-tmp-launch
    desc: camDriver launched from var tmp
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: /var/tmp/camDriver.sh
  - id: platform-patch-literal-url
    desc: Platform patch payload literal URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'https://[^"'']{1,120}/(?:pver|pmac|li)-[^"'']{1,80}\.patch'
  - id: platform-patch-concat-url
    desc: Platform patch payload concat URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'https://[^"'']{1,120}/(?:pver|pmac|li)-[\s\S]{0,120}\+[\s\S]{0,120}\.patch'
  - id: windows-tar-vbs-payload-stage
    desc: Windows tar stage launches VBS
    crit: suspicious
    conf: 0.92
    platforms: [windows]
    if:
      type: text
      regex: 'tar(?:\.exe)?[\s\S]{0,220}wscript(?:\.exe)?[\s\S]{0,160}\.vbs'
  - id: worker-host-serial-assessment
    desc: Worker receives host serial assessment
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'start-assessment[\s\S]{0,500}(wmic\s+diskdrive\s+get\s+serialnumber|IOPlatformSerialNumber|lsblk\s+-o\s+NAME,SERIAL)|(wmic\s+diskdrive\s+get\s+serialnumber|IOPlatformSerialNumber|lsblk\s+-o\s+NAME,SERIAL)[\s\S]{0,500}start-assessment'

composite_rules:
  - id: npm-runtime-cloudflare-eval-loader
    desc: npm runtime loads Cloudflare eval stage
    crit: hostile
    conf: 0.99
    all:
      - id: node-self-eval-argument
      - id: pages-dev-output-fetch
      - id: fetched-text-function-param
    any:
      - id: detached-hidden-node-spawn
      - id: objectives/anti-static/obfuscation/syntax::js-char-stacked-global-eval
  - id: cloudflare-worker-gated-payload-launch
    desc: Worker response gates payload launch
    crit: hostile
    conf: 0.99
    all:
      - id: worker-assessment-gated-download
      - id: camdriver-var-tmp-launch
    any:
      - id: year-seeded-xor-decrypt
      - id: workers-dev-stage-url
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
      - id: platform-patch-payload-url
  - id: platform-patch-payload-url
    desc: Platform patch payload URL construction
    crit: suspicious
    conf: 0.92
    any:
      - id: platform-patch-literal-url
      - id: platform-patch-concat-url
  - id: cloudflare-worker-host-profile-stage
    desc: Worker gates payload by hardware serial
    crit: hostile
    conf: 0.99
    all:
      - id: worker-assessment-gated-download
      - id: worker-host-serial-assessment
    any:
      - id: objectives/discovery/system/fingerprint/disk::fp-disk-serial
      - id: objectives/discovery/system/fingerprint::macos-command-hardware-serial
      - id: platform-patch-payload-url
  - id: cloudflare-patch-archive-execution
    desc: Cloudflare patch archive payload execution
    crit: hostile
    conf: 0.99
    all:
      - id: platform-patch-payload-url
    any:
      - id: windows-tar-vbs-payload-stage
      - id: camdriver-var-tmp-launch
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
    needs: 2
  - id: npm-cloudflare-pylangghost-style-chain
    desc: npm Cloudflare staged payload chain
    crit: hostile
    conf: 0.995
    all:
      - id: npm-runtime-cloudflare-eval-loader
      - id: cloudflare-worker-gated-payload-launch
    any:
      - id: cloudflare-worker-host-profile-stage
      - id: cloudflare-patch-archive-execution
