defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1195.002, T1059.007"

traits:
  - id: node-self-eval-argument
    desc: Node self-spawn runs inline eval
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'spawn\s*\(\s*process\.execPath[\s\S]{0,260}[''"]-e[''"]'
  - id: detached-hidden-node-spawn
    desc: Detached hidden Node child process
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'detached\s*:\s*true[\s\S]{0,180}stdio\s*:\s*[''"]ignore[''"][\s\S]{0,180}windowsHide\s*:\s*true|windowsHide\s*:\s*true[\s\S]{0,180}stdio\s*:\s*[''"]ignore[''"][\s\S]{0,180}detached\s*:\s*true'
  - id: pages-dev-output-fetch
    desc: Fetches Cloudflare Pages output path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'fetch\s*\(\s*["'']https://.{1,80}\.pages\.dev/output-[0-9]+["'']\s*\)'
  - id: workers-dev-stage-url
    desc: Cloudflare Workers stage URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'https://.{1,80}\.workers\.dev/'
  - id: fetched-text-function-param
    desc: Fetched text becomes parameterized Function
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\.text\(\)[\s\S]{0,180}new Function\(\s*["''][A-Za-z0-9_$]{1,40}["'']\s*,\s*[A-Za-z_$][A-Za-z0-9_$]*\s*\)'
  - id: year-seeded-xor-decrypt
    desc: Year-seeded XOR decrypt loop
    crit: suspicious
    conf: 0.94
    attack: T1027
    if:
      type: text
      regex: 'getFullYear\(\)[\s\S]{0,220}1103515245[\s\S]{0,160}12345[\s\S]{0,220}\^\s*\w+\(\)'
  - id: worker-assessment-gated-download
    desc: Worker assessment gates payload download
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'start-assessment[\s\S]{0,400}api/invited-ids/add|api/invited-ids/add[\s\S]{0,400}start-assessment'
  - id: camdriver-var-tmp-launch
    desc: camDriver launched from var tmp
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: /var/tmp/camDriver.sh

composite_rules:
  - id: npm-runtime-cloudflare-eval-loader
    desc: npm runtime loads Cloudflare eval stage
    crit: hostile
    conf: 0.99
    all:
      - id: node-self-eval-argument
      - id: pages-dev-output-fetch
      - id: fetched-text-function-param
    any:
      - id: detached-hidden-node-spawn
      - id: objectives/anti-static/obfuscation/syntax::js-char-stacked-global-eval
  - id: cloudflare-worker-gated-payload-launch
    desc: Worker response gates payload launch
    crit: hostile
    conf: 0.99
    all:
      - id: worker-assessment-gated-download
      - id: camdriver-var-tmp-launch
    any:
      - id: year-seeded-xor-decrypt
      - id: workers-dev-stage-url
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
  - id: npm-cloudflare-pylangghost-style-chain
    desc: npm Cloudflare staged payload chain
    crit: hostile
    conf: 0.995
    all:
      - id: npm-runtime-cloudflare-eval-loader
      - id: cloudflare-worker-gated-payload-launch
