defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1195.002, T1059.007"

traits:
- id: node-self-eval-argument
  desc: Node self-spawn runs inline eval
  crit: suspicious
  conf: 0.94
  # Building block for the hostile npm-runtime-cloudflare-eval-loader chain
  # (self-eval + pages.dev fetch + Function param). On its own, spawning node
  # with `-e` is common in test harnesses and build tooling, so suppress in
  # test context.
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/testing/scripted::js-bdd-suite-text
  if:
    type: text
    regex: 'spawn\s*\(\s*process\.execPath[\s\S]{0,260}[''"]-e[''"]'
- id: pages-dev-output-fetch
  desc: Fetches Cloudflare Pages output path
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'fetch\s*\(\s*["'']https://.{1,80}\.pages\.dev/output-[0-9]+["'']\s*\)'
- id: fetched-text-function-param--rx-6
  desc: Function constructor text parameter
  crit: component
  conf: 0.96
  if:
    type: text
    regex: 'new\s+Function\s*\([^)\n]{0,160}\btext\b'
  count_max: 1030113
- id: year-seeded-xor-decrypt
  desc: Year-seeded XOR decrypt loop
  crit: suspicious
  conf: 0.94
  attack: T1027
  if:
    type: text
    regex: 'getFullYear\(\)[\s\S]{0,220}1103515245[\s\S]{0,160}12345[\s\S]{0,220}\^\s*\w+\(\)'
- id: worker-assessment-gated-download--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'start-assessment[\s\S]{0,400}api/invited-ids/add'
  count_max: 1030115
- id: worker-assessment-gated-download--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'api/invited-ids/add[\s\S]{0,400}start-assessment'
  count_max: 1030116
- id: camdriver-var-tmp-launch
  desc: camDriver launched from var tmp
  crit: suspicious
  conf: 0.96
  if:
    type: text
    substr: /var/tmp/camDriver.sh
- id: platform-patch-literal-url
  desc: Platform patch payload literal URL
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'https://[^"'']{1,120}/(pver|pmac|li)-[^"'']{1,80}\.patch'
- id: platform-patch-concat-url
  desc: Platform patch payload concat URL
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'https://[^"'']{1,120}/(pver|pmac|li)-[\s\S]{0,120}\+[\s\S]{0,120}\.patch'
- id: windows-tar-vbs-payload-stage
  desc: Windows tar stage launches VBS
  crit: suspicious
  conf: 0.92
  platforms: [windows]
  if:
    type: text
    regex: 'tar(\.exe)?[\s\S]{0,220}wscript(\.exe)?[\s\S]{0,160}\.vbs'
- id: worker-host-serial-assessment--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: IOPlatformSerialNumber
  count_max: 1030121
- id: worker-host-serial-assessment--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: start-assessment
  count_max: 1030122
- id: worker-host-serial-assessment--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: diskdrive
  count_max: 1030123
- id: worker-host-serial-assessment--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: lsblk
  count_max: 1030124
- id: worker-host-serial-assessment--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: NAME
  count_max: 1030125
- id: worker-host-serial-assessment--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: wmic
  count_max: 1030126
composite_rules:
- id: npm-runtime-cloudflare-eval-loader
  desc: npm runtime loads Cloudflare eval stage
  crit: hostile
  conf: 0.99
  all:
  - id: node-self-eval-argument
  - id: pages-dev-output-fetch
  - id: fetched-text-function-param
  any:
  - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
  - id: objectives/anti-static/obfuscation/syntax::js-char-stacked-global-eval
- id: cloudflare-worker-gated-payload-launch
  desc: Worker response gates payload launch
  crit: hostile
  conf: 0.99
  all:
  - id: worker-assessment-gated-download
  - id: camdriver-var-tmp-launch
  any:
  - id: year-seeded-xor-decrypt
  - id: objectives/command-and-control/infrastructure/domain/hosting::workers-dev-url
  - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
  - id: platform-patch-payload-url
- id: platform-patch-payload-url
  desc: Platform patch payload URL construction
  crit: suspicious
  conf: 0.92
  any:
  - id: platform-patch-literal-url
  - id: platform-patch-concat-url
- id: cloudflare-worker-host-profile-stage
  desc: Worker gates payload by hardware serial
  crit: hostile
  conf: 0.99
  all:
  - id: worker-assessment-gated-download
  - id: worker-host-serial-assessment
  any:
  - id: objectives/discovery/system/fingerprint/disk::fp-disk-serial
  - id: objectives/discovery/system/fingerprint/machine-id::macos-command-hardware-serial
  - id: platform-patch-payload-url
- id: cloudflare-patch-archive-execution
  desc: Cloudflare patch archive payload execution
  crit: hostile
  conf: 0.99
  all:
  - id: platform-patch-payload-url
  any:
  - id: windows-tar-vbs-payload-stage
  - id: camdriver-var-tmp-launch
  - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
  needs: 2
- id: npm-cloudflare-pylangghost-style-chain
  desc: npm Cloudflare staged payload chain
  crit: hostile
  conf: 0.995
  all:
  - id: npm-runtime-cloudflare-eval-loader
  - id: cloudflare-worker-gated-payload-launch
  any:
  - id: cloudflare-worker-host-profile-stage
  - id: cloudflare-patch-archive-execution
- id: fetched-text-function-param
  desc: Fetched text becomes parameterized Function
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/process/interpreter/eval::js-new-function-constructor
  - id: fetched-text-function-param--rx-6
  near_bytes: 4096
- id: worker-assessment-gated-download
  desc: Worker assessment gates payload download
  crit: suspicious
  conf: 0.94
  any:
  - id: worker-assessment-gated-download--rx-7
  - id: worker-assessment-gated-download--rx-8
- id: worker-host-serial-assessment
  desc: Worker receives host serial assessment
  crit: suspicious
  conf: 0.94
  any:
  - id: worker-host-serial-assessment--rx-9
  - id: worker-host-serial-assessment--rx-10
  - id: worker-host-serial-assessment--rx-11
  - id: worker-host-serial-assessment--rx-12
  - id: worker-host-serial-assessment--rx-13
  - id: worker-host-serial-assessment--rx-14
