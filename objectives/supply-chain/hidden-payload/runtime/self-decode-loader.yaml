# Published library that silently executes a hidden self-decoded payload at
# import. The supply-chain framing of the obfuscation/eval self-decoding loader:
# the dynamic-execution sink is reached indirectly (prototype-chain Function
# constructor, immediately invoked) and wrapped in an empty catch so a decode or
# execution failure is swallowed with no log — the package keeps working as a
# clean decoy while the payload runs (or silently no-ops off-target).
#
# Seen in the avatar-forge -> dom-weave -> sync-logger npm decoy chain (2026-06),
# where sync-logger's loader gates on `process.platform === "win32"`, resolves a
# C2 endpoint from a steganographic dead-drop marker, and spawns a hidden
# powershell/node stager. The swallowed catch around an indirect decode-and-exec
# sink is the discriminator: no maintained library ships one.
#
# ATT&CK: T1195.002 (Compromise Software Supply Chain), T1059.007
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002
  mbc: B0032
traits:
  - id: env-aes-key-access
    desc: Runtime reads AES key from environment
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(process\.env|import\.meta\.env)\.[A-Z0-9_]{0,40}AES[A-Z0-9_]{0,40}KEY'
composite_rules:
  - id: node-env-key-aes-decrypt
    desc: Node AES decrypts with environment key
    crit: component
    conf: 0.92
    all:
      - id: env-aes-key-access
      - id: micro-behaviors/crypto/symmetric/aes/runtime-library::createDecipheriv
      - id: micro-behaviors/crypto/symmetric/aes/runtime-library::aes-256-gcm-dash
  - id: browser-env-key-webcrypto-decrypt
    desc: Browser WebCrypto decrypts with environment key
    crit: component
    conf: 0.92
    all:
      - id: env-aes-key-access
      - id: micro-behaviors/crypto/library/provider::subtle-encrypt-decrypt
      - id: micro-behaviors/crypto/library/provider::subtle-key-ops
  - id: library-silent-self-decode
    desc: Library silently runs a self-decoded payload via indirect eval
    crit: hostile
    conf: 0.95
    attack: T1059.007
    all:
      - id: objectives/anti-static/obfuscation/eval/loader::indirect-ctor-transform-iife
      - id: objectives/anti-static/obfuscation/control-flow/exception::silent-catch-with-side-effect
    any:
      - id: micro-behaviors/crypto/symmetric/xor/loop::xor-modulo-key-loop
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
      - id: micro-behaviors/data/decode/base64::atob-decode
    # No bundle-output unless — see self-decode.yaml: sourcemap/minified shape
    # does not excuse an empty catch wrapped around an indirect decode-and-exec.
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/tool/detection/security-scanner/
      - id: well-known/tool/detection/llm-scanner/
  - id: exported-library-file-base64-eval
    desc: Exported library reads packaged file and evals decoded payload
    crit: hostile
    conf: 0.96
    attack: T1027, T1059.007
    all:
      - id: metadata/library/runtime::js-module-exports
      - id: micro-behaviors/fs/file/read::read-package-relative-file
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
      - id: micro-behaviors/process/interpreter/eval::js-eval-tostring-result
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/tool/detection/security-scanner/
      - id: well-known/app/google-web::official-google-web-asset
  - id: node-env-key-encrypted-import-exec
    desc: Node import decrypts and executes encrypted payload
    crit: hostile
    conf: 0.98
    attack: T1027.013, T1059.007
    all:
      - id: node-env-key-aes-decrypt
      - id: micro-behaviors/fs/file/read::read-node
      - id: micro-behaviors/process/interpreter/vm::vm-runInThisContext
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-module-bundle
  - id: browser-env-key-encrypted-import-exec
    desc: Browser import decrypts and executes encrypted payload
    crit: hostile
    conf: 0.98
    attack: T1027.013, T1059.007
    all:
      - id: browser-env-key-webcrypto-decrypt
      - id: micro-behaviors/data/decode/base64::atob-decode
      - id: micro-behaviors/process/interpreter/eval::js-new-function-constructor
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-module-bundle
  - id: package-env-key-encrypted-import-exec
    desc: Package imports encrypted payload executor
    crit: hostile
    conf: 0.99
    for: [javascript, typescript, archives, package.json]
    scope: archive
    all:
      - id: micro-behaviors/data/encode/payload::large-encoded-blob-literal
    any:
      - id: node-env-key-encrypted-import-exec
      - id: browser-env-key-encrypted-import-exec
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-module-bundle
  - id: exported-codec-chain-require-exec
    desc: Exported codec chain executes decoded payload
    crit: hostile
    conf: 0.98
    attack: T1195.002, T1027.013, T1059.007
    all:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
      - id: objectives/anti-static/obfuscation/multi-layer::aes-gcm-decrypt-call
      - id: objectives/anti-static/obfuscation/multi-layer::decode-codec-call
      - id: objectives/anti-static/obfuscation/multi-layer::decode-position-call
      - id: metadata/library/runtime::js-module-exports
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-module-bundle
