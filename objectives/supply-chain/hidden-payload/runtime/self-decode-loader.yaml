# Published library that silently executes a hidden self-decoded payload at
# import. The supply-chain framing of the obfuscation/eval self-decoding loader:
# the dynamic-execution sink is reached indirectly (prototype-chain Function
# constructor, immediately invoked) and wrapped in an empty catch so a decode or
# execution failure is swallowed with no log — the package keeps working as a
# clean decoy while the payload runs (or silently no-ops off-target).
#
# Seen in the avatar-forge -> dom-weave -> sync-logger npm decoy chain (2026-06),
# where sync-logger's loader gates on `process.platform === "win32"`, resolves a
# C2 endpoint from a steganographic dead-drop marker, and spawns a hidden
# powershell/node stager. The swallowed catch around an indirect decode-and-exec
# sink is the discriminator: no maintained library ships one.
#
# ATT&CK: T1195.002 (Compromise Software Supply Chain), T1059.007
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002
  mbc: B0032
composite_rules:
  - id: library-silent-self-decode
    desc: Library silently runs a self-decoded payload via indirect eval
    crit: hostile
    conf: 0.95
    attack: T1059.007
    all:
      - id: objectives/anti-static/obfuscation/eval/loader::indirect-ctor-transform-iife
      - id: objectives/supply-chain/install-hook/dropper/obfuscation::top-level-try-catch-empty
    any:
      - id: micro-behaviors/data/encode/xor::js-xor-cyclic-pattern
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
      - id: micro-behaviors/data/decode/base64::atob-decode
    # No bundle-output unless — see self-decode.yaml: sourcemap/minified shape
    # does not excuse an empty catch wrapped around an indirect decode-and-exec.
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
