defaults:
  platforms: [panos, appliance, windows]
  for: [csharp, pe]
  attack: T1027

traits:
  - id: csharp-panos-assembly-load
    desc: C# PAN-OS Assembly.Load payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Assembly.Load(payload)

  - id: csharp-panos-hidden-execute-method
    desc: C# PAN-OS hidden execute method
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: ExecuteHiddenPayload

  - id: csharp-panos-download-execute-method
    desc: C# PAN-OS download execute method
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: DownloadAndExecutePayload

composite_rules:
  - id: csharp-panos-hidden-payload-loader
    desc: C# PAN-OS hidden payload loader
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-panos-assembly-load
      - id: csharp-panos-hidden-execute-method

  - id: csharp-panos-download-hidden-loader
    desc: C# PAN-OS download hidden loader
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-panos-download-execute-method
      - id: csharp-panos-hidden-execute-method
