# A package that retrieves extension code or extension configuration from mutable
# remote locations, stores it locally, and executes it through a dynamic loader.
# The combination is a runtime supply-chain staging path: the wheel can change
# behavior after installation without shipping the extension code itself.
#
# Kept SUSPICIOUS rather than HOSTILE because plugin systems can legitimately
# support user-selected extensions.  The URL, local write, and dynamic module
# execution together are materially riskier than any one capability alone.
defaults:
  platforms: [unix, windows]
  for: [whl]
  attack: T1195.002,T1105
  mbc: E1105

traits:
  - id: extension-sync-method
    desc: Remote provider synchronizer reference
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: ensure_download_providers

  - id: extension-download-method
    desc: References remote extension URL downloader
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: install_from_url

  - id: zip-member-path-write
    desc: Writes files for ZIP member names
    crit: notable
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: 'for\s+member\s+in\s+names[\s\S]{0,260}write_bytes\s*\('

composite_rules:
  - id: python-remote-plugin-loader
    desc: Wheel stages remotely supplied extension code for dynamic execution
    crit: suspicious
    conf: 0.95
    scope: archive
    all:
      - id: micro-behaviors/communications/http/url/github::github-raw-plugin-repository-url
      - id: micro-behaviors/os/api-resolution/dynamic::python-importlib-spec-exec-module
      - id: micro-behaviors/fs/file/write/direct::py-open-write-mode

  - id: remote-extension-auto-install
    desc: Automatically installs remote extensions
    # The manager performs this during construction/startup: it trusts a
    # mutable remote registry, downloads every entry classified as a download
    # provider, and installs the ZIP without a user-selected extension or an
    # integrity check.  That is a materially risky supply-chain behavior even
    # when the surrounding application documents a plugin system.
    crit: suspicious
    conf: 0.94
    for: [python]
    near_lines: 120
    all:
      - id: extension-sync-method
      - id: extension-download-method
    unless:
      - id: well-known/app/spotiflac::package-identity
      - id: well-known/app/spotiflac::recognized-extension-file-context

  - id: remote-javascript-extension-archive
    desc: Installs ZIP JavaScript extension
    crit: notable
    conf: 0.95
    for: [python]
    near_lines: 120
    all:
      - id: extension-download-method
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-class

  - id: python-remote-javascript-extension-loader
    desc: Wheel auto-installs and evaluates remote JavaScript extensions
    crit: suspicious
    conf: 0.97
    scope: archive
    all:
      - id: micro-behaviors/communications/http/url/github::github-raw-extension-registry-url
      - id: remote-extension-auto-install
      - id: remote-javascript-extension-archive
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
    unless:
      - id: well-known/app/spotiflac::package-identity
      - id: well-known/app/spotiflac::recognized-extension-file-context

  - id: remote-extension-unsafe-archive-write
    desc: Remote extension archive writes ZIP members directly
    crit: suspicious
    conf: 0.97
    for: [python]
    near_lines: 120
    all:
      - id: extension-download-method
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-class
      - id: zip-member-path-write
    unless:
      - id: well-known/app/spotiflac::package-identity
      - id: well-known/app/spotiflac::recognized-extension-file-context

  - id: remote-extension-privileged-javascript-bridge
    desc: Auto-installed extension combines evaluation, HTTP, and file writes
    crit: suspicious
    conf: 0.97
    scope: archive
    all:
      - id: python-remote-javascript-extension-loader
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
      - id: micro-behaviors/communications/http/post::http-post-call
      - id: micro-behaviors/fs/file/write/direct::node-write-file-sync
    unless:
      - id: well-known/app/spotiflac::package-identity
      - id: well-known/app/spotiflac::recognized-extension-file-context

  - id: remote-encrypted-endpoint-registry
    desc: Downloads encrypted JSON endpoint registry from GitHub Gist
    crit: suspicious
    conf: 0.95
    scope: file
    near_lines: 160
    all:
      - id: micro-behaviors/communications/http/url/github::gist-githubusercontent-raw-url
      - id: micro-behaviors/crypto/symmetric/aes/library::cryptography-aesgcm-api
      - id: micro-behaviors/crypto/symmetric/decrypt::python-decrypt-method-call
      - id: micro-behaviors/data/serialize/json::json-loads-call
    unless:
      - id: well-known/app/spotiflac::package-identity
      - id: well-known/app/spotiflac::recognized-core-file-context
