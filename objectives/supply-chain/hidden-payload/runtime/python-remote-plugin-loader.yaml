# A package that retrieves Python plugin source from a remote GitHub repository,
# stores it locally, and executes it through importlib.  The combination is a
# runtime supply-chain staging path: the wheel can change behavior after
# installation without shipping the plugin code itself.
#
# Kept SUSPICIOUS rather than HOSTILE because plugin systems can legitimately
# support user-selected extensions.  The URL, local write, and dynamic module
# execution together are materially riskier than any one capability alone.
defaults:
  platforms: [unix, windows]
  for: [whl]
  attack: T1195.002,T1105
  mbc: E1105

traits:
  - id: extension-sync-method
    desc: Remote extension synchronization method
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: ensure_download_providers

  - id: extension-download-method
    desc: Remote extension download method
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      substr: install_from_url

composite_rules:
  - id: python-remote-plugin-loader
    desc: Wheel fetches and executes remote Python plugins
    crit: suspicious
    conf: 0.95
    scope: archive
    all:
      - id: micro-behaviors/communications/http/url/github::github-raw-plugin-repository-url
      - id: micro-behaviors/os/api-resolution/dynamic::python-importlib-spec-exec-module
      - id: micro-behaviors/fs/file/write/direct::py-open-write-mode

  - id: remote-extension-auto-install
    desc: Automatically installs remote extensions
    crit: notable
    conf: 0.96
    for: [python]
    near_lines: 120
    all:
      - id: extension-sync-method
      - id: extension-download-method

  - id: remote-javascript-extension-archive
    desc: Installs ZIP JavaScript extension
    crit: notable
    conf: 0.95
    for: [python]
    near_lines: 120
    all:
      - id: extension-download-method
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-class

  - id: python-remote-javascript-extension-loader
    desc: Wheel auto-installs and evaluates remote JavaScript extensions
    crit: suspicious
    conf: 0.97
    scope: archive
    all:
      - id: micro-behaviors/communications/http/url/github::github-raw-extension-registry-url
      - id: remote-extension-auto-install
      - id: remote-javascript-extension-archive
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
