# A package that retrieves Python plugin source from a remote GitHub repository,
# stores it locally, and executes it through importlib.  The combination is a
# runtime supply-chain staging path: the wheel can change behavior after
# installation without shipping the plugin code itself.
#
# Kept SUSPICIOUS rather than HOSTILE because plugin systems can legitimately
# support user-selected extensions.  The URL, local write, and dynamic module
# execution together are materially riskier than any one capability alone.
defaults:
  platforms: [unix, windows]
  for: [whl]
  attack: T1195.002,T1105
  mbc: E1105

composite_rules:
  - id: python-remote-plugin-loader
    desc: Wheel fetches and executes remote Python plugins
    crit: suspicious
    conf: 0.95
    scope: archive
    all:
      - id: micro-behaviors/communications/http/url/github::github-raw-plugin-repository-url
      - id: micro-behaviors/os/api-resolution/dynamic::python-importlib-spec-exec-module
      - id: micro-behaviors/fs/file/write/direct::py-open-write-mode
