defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1105

traits:
  - id: zguard-raw-github-binary-source
    desc: Raw GitHub zguard binary source
    crit: component
    conf: 0.98
    if:
      type: literal
      substr: 'raw.githubusercontent.com/ZoloAi/zOS/main/zguard_bin'

composite_rules:
  - id: remote-binary-provision-into-import-path
    desc: Downloads binary files and places them on Python's import path
    crit: hostile
    conf: 0.98
    all:
      - id: zguard-raw-github-binary-source
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/fs/file/write/direct::python-pathlib-write-bytes-call
      - id: micro-behaviors/os/module/search-path::sys-path-mutate
