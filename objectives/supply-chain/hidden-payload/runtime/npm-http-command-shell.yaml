---
# Supply-chain context for packages whose advertised entrypoint is a
# network-exposed command shell. Generic HTTP, request-body, and process
# capabilities remain in micro-behaviors; this composite adds package intent.
defaults:
  platforms: [unix, windows]
  for: [npm]
  attack: "T1195.002,T1059.007,T1505.003"
  mbc: B0030

composite_rules:
  - id: npm-package-http-command-shell
    desc: NPM package ships HTTP command shell
    crit: hostile
    conf: 0.995
    scope: archive
    all:
      - id: objectives/command-and-control/backdoor/tasking/http::node-public-post-command-shell
      - id: metadata/package/manifest/entrypoint::pkg-main-field
      - id: metadata/package/manifest/entrypoint::bin-js-entry
