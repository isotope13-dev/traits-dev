defaults:
  platforms: [unix, windows]
  for: [whl]
  attack: T1195.002,T1105,T1129

traits:
  - id: python-github-release-native-wheel-url
    desc: GitHub release download base URL
    crit: notable
    conf: 0.97
    for: [python]
    if:
      type: text
      regex: '_DEFAULT_BASE_URL\s*=\s*["'']https://github\.com/.{0,80}/releases/download["'']'

  - id: python-hash-bypass-environment-name
    desc: Hash verification bypass environment name
    crit: notable
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: SKIP_HASH_CHECK

  - id: python-native-manifest-reference
    desc: Native wheel manifest URL reference
    crit: component
    conf: 0.94
    for: [python]
    if:
      type: text
      substr: python-native-manifest.json

  - id: python-bootstrap-error-handler
    desc: Catches bootstrap download errors
    crit: component
    conf: 0.94
    for: [python]
    if:
      type: text
      substr: except BootstrapError

  - id: python-manifest-returns-none
    desc: Returns no manifest digest
    crit: component
    conf: 0.94
    for: [python]
    if:
      type: text
      substr: return None

composite_rules:
  - id: python-explicit-hash-check-bypass
    desc: Hash verification bypass environment control
    crit: notable
    conf: 0.96
    for: [python]
    all:
      - id: python-hash-bypass-environment-name
      - id: micro-behaviors/os/env/vars/access::python-os-getenv-call

  - id: python-manifest-integrity-fails-open
    desc: Manifest failure skips integrity verification
    crit: notable
    conf: 0.94
    for: [python]
    all:
      - id: python-manifest-fetch-failure-branch
      - id: python-manifest-failure-return-none

  - id: python-manifest-fetch-failure-branch
    desc: Manifest fetch failure branch
    crit: notable
    conf: 0.94
    for: [python]
    near_lines: 20
    all:
      - id: python-native-manifest-reference
      - id: python-bootstrap-error-handler

  - id: python-manifest-failure-return-none
    desc: Manifest failure returns no digest
    crit: notable
    conf: 0.94
    for: [python]
    near_lines: 24
    all:
      - id: python-native-manifest-reference
      - id: python-bootstrap-error-handler
      - id: python-manifest-returns-none

  - id: python-remote-native-extension-bootstrap
    desc: Wheel downloads and loads remote native extension
    crit: notable
    conf: 0.96
    scope: archive
    all:
      - id: python-github-release-native-wheel-url
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/data/archive/extract/zip::python-native-extension-archive-extraction
      - id: micro-behaviors/process/create/load/extension::python-extension-file-loader

  - id: python-unverified-native-extension-bootstrap
    desc: Wheel loads remote native code without reliable integrity verification
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: python-github-release-native-wheel-url
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/data/archive/extract/zip::python-native-extension-archive-extraction
      - id: micro-behaviors/process/create/load/extension::python-extension-file-loader
    any:
      - id: python-explicit-hash-check-bypass
      - id: python-manifest-integrity-fails-open

  - id: python-explicit-unverified-native-stage
    desc: Remote native stage has explicit integrity bypass
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: python-github-release-native-wheel-url
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/data/archive/extract/zip::python-native-extension-archive-extraction
      - id: micro-behaviors/process/create/load/extension::python-extension-file-loader
      - id: python-hash-bypass-environment-name
      - id: micro-behaviors/os/env/vars/access::python-os-getenv-call

  - id: python-fail-open-unverified-native-stage
    desc: Remote native stage fails open on manifest errors
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: python-github-release-native-wheel-url
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/data/archive/extract/zip::python-native-extension-archive-extraction
      - id: micro-behaviors/process/create/load/extension::python-extension-file-loader
      - id: python-native-manifest-reference
      - id: python-bootstrap-error-handler
      - id: python-manifest-returns-none
