defaults:
  platforms: [unix, windows]
  for: [whl]
  attack: T1195.002,T1105,T1129

traits:
  - id: python-github-release-native-wheel-url
    desc: Python constructs GitHub native release URL
    crit: notable
    conf: 0.97
    for: [python]
    if:
      type: text
      regex: '_DEFAULT_BASE_URL\s*=\s*["'']https://github\.com/.{0,80}/releases/download["'']'

  - id: python-explicit-hash-check-bypass
    desc: Python exposes native download hash bypass
    crit: suspicious
    conf: 0.98
    for: [python]
    if:
      type: text
      substr: SKIP_HASH_CHECK

composite_rules:
  - id: python-remote-native-extension-bootstrap
    desc: Wheel downloads and loads native extension at import
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: python-github-release-native-wheel-url
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/data/archive/extract/zip::python-native-extension-archive-extraction
      - id: micro-behaviors/process/create/load/extension::python-extension-file-loader

  - id: python-unverified-native-extension-bootstrap
    desc: Wheel can load remote native code without hash verification
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: python-github-release-native-wheel-url
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/data/archive/extract/zip::python-native-extension-archive-extraction
      - id: micro-behaviors/process/create/load/extension::python-extension-file-loader
      - id: python-explicit-hash-check-bypass
