defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059.006
composite_rules:
  - id: hidden-bootstrap-shell-reexec
    desc: Hidden bootstrap shell re-executes Python
    crit: hostile
    conf: 0.95
    mbc: E1059
    all:
      - id: micro-behaviors/fs/path/location::tilde-hidden-home-path
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: micro-behaviors/process/create/subprocess::os-execve
    # Benign self-patch context: bootstrapping the OFFICIAL Astral uv installer
    # (astral.sh/uv/install.sh) to re-launch under a supported Python is a
    # recognized, non-malicious pattern. Malicious bootstraps pipe an attacker
    # script to the shell, not the official uv installer, so this suppresses the
    # FP without weakening real hidden-bootstrap-reexec detection.
    unless:
      - id: well-known/tool/development/uv::uv-install-sh-bootstrap-url
