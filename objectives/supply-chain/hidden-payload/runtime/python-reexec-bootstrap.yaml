defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059.006
composite_rules:
  - id: hidden-bootstrap-shell-reexec
    desc: Hidden bootstrap shell re-executes Python
    crit: hostile
    conf: 0.95
    mbc: E1059
    all:
      - id: micro-behaviors/fs/path/location::tilde-hidden-home-path
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: micro-behaviors/process/create/subprocess::os-execve
