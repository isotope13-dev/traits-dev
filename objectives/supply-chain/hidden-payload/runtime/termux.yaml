defaults:
  platforms: [android, unix]
  for: [javascript, python]
  attack: T1105
traits:
  - id: termux-prefix-bin-path
    desc: Termux PREFIX bin path construction
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'path\.join\(\s*PREFIX\s*,\s*["'']bin["'']\s*\)'
  - id: termux-utils-self-heal-string
    desc: Termux utility self-heal message
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Missing core, reinstalling"
composite_rules:
  - id: termux-command-symlink-shadowing
    desc: Termux package symlinks commands into PATH
    crit: suspicious
    conf: 0.95
    all:
      - id: termux-prefix-bin-path
      - id: micro-behaviors/fs/link/symlink::node-symlink-sync
      - id: micro-behaviors/fs/directory/traverse::traverse-readdir-walk-find
  - id: runtime-self-update-from-github-raw
    desc: Runtime self-update from GitHub raw
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-scripting-lang
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
      - id: micro-behaviors/fs/chmod/modify::node-chmod
  - id: termux-self-healing-updater
    desc: Termux package self-heals updater binary
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-scripting-lang
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
      - id: micro-behaviors/fs/chmod/modify::node-chmod
      - id: termux-utils-self-heal-string
      - id: termux-prefix-bin-path
  - id: termux-libpython-remote-replacement
    desc: Downloads and replaces Termux libpython
    crit: hostile
    conf: 0.97
    for: [python]
    all:
      - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-native-library
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/fs/path/application/prefix::termux-usr-prefix
      - id: micro-behaviors/fs/path/library::libpython-shared-object
      - id: micro-behaviors/fs/file/write/direct::py-open-write-mode
      - id: micro-behaviors/fs/chmod/executable/mode::python-executable
