defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1027,T1059.007,T1195.002"

traits:
  - id: package-database-path
    desc: Dependency database path from working directory
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'process\.cwd\(\)[\s\S]{0,120}["'']node_modules["''][\s\S]{0,120}\.[A-Za-z0-9_-]{1,12}["'']'

composite_rules:
  - id: package-database-read
    desc: Reads a dependency database file
    crit: suspicious
    conf: 0.94
    all:
      - id: package-database-path
      - id: micro-behaviors/fs/file/read::read-node
    near_bytes: 220

  - id: encrypted-package-data-to-detached-node
    desc: Decrypted dependency data fed to detached Node
    crit: hostile
    conf: 0.99
    all:
      - id: package-database-path
      - id: micro-behaviors/fs/file/read::read-node
      - id: micro-behaviors/crypto/symmetric/decrypt::cryptojs-block-cipher-decrypt-call
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/create/spawn::child-unref-call
      - id: micro-behaviors/process/fd/stdio::js-stdin-write
    scope: archive
