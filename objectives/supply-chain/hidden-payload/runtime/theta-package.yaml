defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1027,T1059.007,T1195.002"

composite_rules:
  - id: encrypted-package-data-to-detached-node
    desc: Decrypted dependency data fed to detached Node
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/fs/path/construct::node-modules-database-path-reference
      - id: micro-behaviors/fs/file/read::readfilesync-call
      - id: micro-behaviors/crypto/symmetric/decrypt::cryptojs-block-cipher-decrypt-call
      - id: micro-behaviors/process/create/spawn::node-interpreter-target
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/daemonize/detach::node-handle-unref-call
      - id: micro-behaviors/process/fd/stdio::js-stdin-write
  - id: imported-ciphertext-to-detached-node
    desc: Imported ciphertext decrypted into detached Node
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/shell/bridge::child-process-import-runtime
      - id: micro-behaviors/crypto/symmetric/decrypt::cryptojs-block-cipher-decrypt-call
      - id: micro-behaviors/process/create/spawn::node-interpreter-target
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: micro-behaviors/process/fd/stdio::js-stdin-write
  # UMD output keeps the same behavior but often loses import/call facts.
  # Require the package-data path, cipher operation, hidden Node launch, and
  # payload feed together so ordinary UMD SDKs do not match.
  - id: bundled-ciphertext-to-detached-node-text
    desc: Bundled package data decrypted and fed to a hidden Node process
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/library/structure::js-umd-wrapper
      - id: micro-behaviors/process/create/shell/bridge::child-process-require-call
      - id: micro-behaviors/fs/path/construct::node-modules-database-path-reference
      - id: micro-behaviors/fs/file/read::readfilesync-text
      - id: micro-behaviors/crypto/symmetric/decrypt::cryptojs-block-cipher-decrypt-text
      - id: micro-behaviors/process/create/script/file::spawn-node-process
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/daemonize/detach::node-handle-unref-text
      - id: micro-behaviors/process/fd/stdio::js-stdin-write
