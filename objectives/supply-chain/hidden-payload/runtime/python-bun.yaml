defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1195.002
  mbc: B0024

traits:
- id: import-thread-daemon-start
  desc: Import starts daemon background thread
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'threading\.Thread\(.{0,160}daemon\s*=\s*True.{0,80}\)\.start\(\)'
  unless:
  - id: metadata/package/quality::has-tests
- id: import-runtime-startpy-path
  desc: Package runtime start.py sidecar
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '("_runtime"|''_runtime'').{0,160}("start\.py"|''start\.py'')'
- id: python-popen-devnull-runtime--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: subprocess.DEVNULL
- id: python-popen-devnull-runtime--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: stderr
- id: python-popen-devnull-runtime--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: stdout
- id: python-downloads-bun-release
  desc: Python downloads Bun release archive
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: github.com/oven-sh/bun/releases/download/bun-v
- id: python-bun-router-sidecar
  desc: Python runs JS via Bun
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'subprocess\.(run|Popen|call)\([\s\S]{0,240}(bun|bun\.exe)[\s\S]{0,160}router_runtime\.js'
- id: python-runtime-js-sidecar-name
  desc: Python references router JS sidecar
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: router_runtime.js

composite_rules:
- id: import-time-hidden-runtime-launch
  desc: Import silently launches runtime sidecar
  crit: hostile
  conf: 0.98
  all:
  - id: import-thread-daemon-start
  - id: import-runtime-startpy-path
  - id: python-popen-devnull-runtime
  unless:
  - id: metadata/package/quality::has-tests
- id: python-bun-js-sidecar-loader
  desc: Python downloads Bun for JS sidecar
  crit: hostile
  conf: 0.98
  all:
  - id: python-downloads-bun-release
  - id: python-bun-router-sidecar
  any:
  - id: python-runtime-js-sidecar-name
  - id: objectives/command-and-control/dropper/execution/payload::devnull-redirect
- id: python-popen-devnull-runtime
  desc: Python silently launches runtime sidecar
  crit: suspicious
  conf: 0.94
  all:
  - id: python-popen-devnull-runtime--rx-1
  - id: micro-behaviors/process/create/subprocess::popen-content
  - id: python-popen-devnull-runtime--rx-3
  - id: python-popen-devnull-runtime--rx-4
  near_bytes: 4096
