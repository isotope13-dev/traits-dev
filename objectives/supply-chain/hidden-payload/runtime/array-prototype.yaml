defaults:
  platforms: [unix, windows]
  for: [javascript]
  attack: T1195.002

traits: []

composite_rules:
  - id: import-time-array-prototype-tampering
    desc: Import-time global Array API tampering
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: micro-behaviors/data/source/prototype::array-push-disabled
      - id: micro-behaviors/data/source/prototype::array-prototype-freeze
    any:
      - id: metadata/package/manifest/entrypoint::pkg-main-field
