# A Python package that, at runtime, downloads remote content from a host,
# writes it to disk, and inserts that location onto sys.path so the fetched
# code is importable. This "fetch native code, then import it" pattern sidesteps
# the wheel's declared contents: whatever the server returns runs in-process on
# the next `import`, and the fetch here carries no signature/checksum check.
#
# Kept SUSPICIOUS, not hostile: some legitimate projects provision their own
# prebuilt native component this way (an ABI-specific .so too large or too
# numerous to ship in the wheel), so the pattern alone is not proof of malice.
# It is, however, the same staging primitive a supply-chain implant uses to pull
# a second-stage native payload, so it warrants surfacing. Composites that add a
# malicious context leg (obfuscation, hidden/detached exec, credential exfil)
# elsewhere in this tier escalate the same primitive to hostile.
#
# Deliberately generic — matches the download+write+import-path shape by
# behavior, with no per-package URL or package-name hardcoding, so it detects
# future variants rather than one sample.
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1105
traits:
  - id: manifest-txt-filename-reference
    desc: MANIFEST.txt filename reference
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bMANIFEST\.txt\b'

composite_rules:
  - id: runtime-remote-content-onto-import-path
    desc: Downloads response content into the import path
    crit: suspicious
    conf: 0.9
    mbc: E1105
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/fs/file/write/direct::python-pathlib-write-bytes-call
      - id: micro-behaviors/os/module/search-path::sys-path-mutate

  # A manifest-driven remote stage is more specific than an ordinary file
  # download: the server controls the set of files that become importable.
  # Keep the manifest token as a component because it is only meaningful in
  # combination with the download/write/import-path behavior above.
  - id: runtime-remote-manifest-import-path-stage
    desc: Fetches a manifest and imports staged files
    crit: notable
    conf: 0.94
    mbc: E1105
    all:
      - id: runtime-remote-content-onto-import-path
      - id: manifest-txt-filename-reference

  # A remote import-path stage is not by itself proof of a trojan: some
  # projects provision optional native components this way.  Escalate when
  # the wheel also executes module-scope bootstrap code that replaces the
  # current process.  This combination makes the server-controlled stage run
  # as part of importing the package, without relying on a package name or
  # provider URL.
  - id: wheel-import-time-remote-code-process-replacement
    desc: Wheel import-time remote stage replaces the current process
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: runtime-remote-content-onto-import-path
      - id: micro-behaviors/data/control-flow/module-exec::module-level-bare-call
      - id: micro-behaviors/process/create/direct::python-os-execve-call

  # A package that combines a manifest-controlled import stage with a shell
  # package installation and process replacement has an end-to-end bootstrap
  # path capable of changing the runtime after installation.  Keep this as a
  # separate hostile trait so triage can distinguish the remote stage itself
  # from the install/relaunch behavior that turns it into a supply-chain
  # bootstrap.
  - id: wheel-remote-stage-shell-reinstall-relaunch
    desc: Wheel remotely stages code, shell-installs, and relaunches
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: runtime-remote-manifest-import-path-stage
      - id: micro-behaviors/process/create/subprocess::shell-true-call
      - id: micro-behaviors/os/package-manager/install::subprocess-pip-install-list
      - id: micro-behaviors/process/create/direct::python-os-execve-call
