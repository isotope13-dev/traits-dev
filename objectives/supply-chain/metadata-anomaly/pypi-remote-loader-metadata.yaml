defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  attack: T1195.002

traits:
  - id: pypi-metadata-fetches-runs-phrase
    desc: PyPI metadata fetches-runs phrase
    crit: component
    conf: 0.88
    if:
      type: text
      substr: fetches and runs
      case_insensitive: true
  - id: pypi-metadata-remotely-phrase
    desc: PyPI metadata remotely phrase
    crit: component
    conf: 0.86
    if:
      type: text
      word: remotely
      case_insensitive: true

composite_rules:
  - id: pypi-metadata-remote-fetch-run-claim
    desc: PyPI metadata claims remote fetch-run
    crit: suspicious
    conf: 0.9
    all:
      - id: pypi-metadata-fetches-runs-phrase
      - id: pypi-metadata-remotely-phrase
  - id: empty-wheel-remote-loader-claim
    desc: Empty wheel claims remote loader
    crit: suspicious
    conf: 0.92
    for: [whl]
    scope: archive
    all:
      - id: pypi-metadata-remote-fetch-run-claim
      - id: metadata/package/metrics::tiny-wheel-archive-content
