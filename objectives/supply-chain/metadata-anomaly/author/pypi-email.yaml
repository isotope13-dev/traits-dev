defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  attack: T1036.005
  mbc: F0004
  for: [python, pkginfo, pyproject.toml]
traits:
  - id: generic-email
    desc: Generic email address
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: author_email.{0,50}@(gmail|outlook|yahoo|hotmail)\.com
  - id: unknown-author-email
    desc: PKG-INFO has UNKNOWN author email
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: author-email
      exact: UNKNOWN
  - id: pkginfo-free-email-gmail
    desc: PKG-INFO author uses Gmail
    crit: component
    conf: 0.75
    for:
      - pkginfo
    if:
      type: kv
      path: author-email
      regex: '@gmail\.'
      case_insensitive: true
  - id: pkginfo-free-email-outlook
    desc: PKG-INFO author uses Outlook family
    crit: component
    conf: 0.75
    for:
      - pkginfo
    if:
      type: kv
      path: author-email
      regex: '@(outlook|hotmail|live)\.'
      case_insensitive: true
  - id: pkginfo-free-email-yahoo
    desc: PKG-INFO author uses Yahoo
    crit: component
    conf: 0.75
    for:
      - pkginfo
    if:
      type: kv
      path: author-email
      regex: '@yahoo\.'
      case_insensitive: true
  - id: pkginfo-no-author-email
    desc: PKG-INFO missing Author-email field
    crit: notable
    conf: 0.7
    if:
      type: kv
      path: metadata-version
    unless:
      - type: kv
        path: author-email
  - id: pkginfo-privacy-email-1
    desc: PKG-INFO privacy email (proton/tutanota)
    if:
      type: kv
      path: author-email
      regex: '@(proton|tutanota)\.'
      case_insensitive: true
  - id: pkginfo-privacy-email-2
    desc: PKG-INFO privacy email (mailinator/tempmail/throwaway)
    if:
      type: kv
      path: author-email
      regex: '@(mailinator|tempmail|throwaway)\.'
      case_insensitive: true
  - id: pyproject-privacy-email-1
    desc: pyproject.toml privacy email (proton/tutanota/tutamail/guerrillamail)
    if:
      type: kv
      path: project.authors
      regex: '@(proton|tutanota|tutamail|guerrillamail)\.'
      case_insensitive: true
  - id: pyproject-privacy-email-2
    desc: pyproject.toml privacy email (mailinator/yopmail/sharklasers)
    if:
      type: kv
      path: project.authors
      regex: '@(mailinator|yopmail|sharklasers)\.'
      case_insensitive: true
composite_rules:
  - id: pkginfo-free-email-provider
    desc: PKG-INFO author uses free email
    crit: component
    conf: 0.78
    for:
      - pkginfo
    any:
      - id: pkginfo-free-email-gmail
      - id: pkginfo-free-email-outlook
      - id: pkginfo-free-email-yahoo
  - id: pkginfo-privacy-email
    desc: PKG-INFO author uses privacy email provider
    crit: notable
    conf: 0.75
    any:
      - id: pkginfo-privacy-email-1
      - id: pkginfo-privacy-email-2
  - id: pyproject-privacy-email
    desc: pyproject.toml author uses privacy email
    crit: notable
    conf: 0.75
    any:
      - id: pyproject-privacy-email-1
      - id: pyproject-privacy-email-2
