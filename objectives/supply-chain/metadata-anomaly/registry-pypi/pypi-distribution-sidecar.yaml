defaults:
  for: [manifests, data]
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"
traits:
  - id: meta-json-sidecar
    desc: PyPI meta.json sidecar filename
    crit: component
    conf: 0.95
    if:
      type: basename
      exact: "meta.json"
    unless:
      - type: raw
        regex: "\"dist-tags\"\\s*:|\"_npmVersion\"\\s*:|\"publishConfig\"\\s*:|\"maintainers\"\\s*:"
  - id: wheel-filename
    desc: PyPI wheel filename in metadata
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "urls[*].filename"
      regex: "\\.whl$"
  - id: wheel-filename-raw
    desc: PyPI wheel filename in raw metadata
    crit: baseline
    conf: 0.9
    if:
      type: raw
      substr: '.whl"'
  - id: sdist-filename
    desc: PyPI source distribution filename
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "urls[*].filename"
      regex: "\\.tar\\.gz$"
  - id: sdist-filename-raw
    desc: PyPI sdist filename in raw metadata
    crit: baseline
    conf: 0.9
    if:
      type: raw
      substr: '.tar.gz"'
  - id: wheel-packagetype
    desc: Wheel package type metadata
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "urls[*].packagetype"
      exact: "bdist_wheel"
  - id: wheel-packagetype-raw
    desc: Wheel package type in raw metadata
    crit: baseline
    conf: 0.9
    if:
      type: raw
      substr: '"packagetype": "bdist_wheel"'
  - id: tiny-wheel-size
    desc: Tiny wheel payload under 3KB
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: "urls[*].size"
      regex: "^[0-9]{1,3}$|^[12][0-9]{3}$"
  - id: tiny-wheel-size-raw-10xx
    desc: Tiny wheel size prefix 10xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 10'
  - id: tiny-wheel-size-raw-11xx
    desc: Tiny wheel size prefix 11xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 11'
  - id: tiny-wheel-size-raw-12xx
    desc: Tiny wheel size prefix 12xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 12'
  - id: tiny-wheel-size-raw-13xx
    desc: Tiny wheel size prefix 13xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 13'
  - id: tiny-wheel-size-raw-14xx
    desc: Tiny wheel size prefix 14xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 14'
  - id: tiny-wheel-size-raw-15xx
    desc: Tiny wheel size prefix 15xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 15'
  - id: empty-description-sidecar
    desc: Empty package description in sidecar
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: '"description":\s*""'
    unless:
      - type: raw
        regex: "\"dist-tags\"\\s*:|\"_npmVersion\"\\s*:|\"publishConfig\"\\s*:|\"maintainers\"\\s*:"
  - id: null-summary-sidecar
    desc: Null package summary in sidecar
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: '"summary":\s*null'
  - id: null-author-sidecar
    desc: Null package author in sidecar
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: '"author":\s*null'
  - id: null-author-email-sidecar
    desc: Null author email in sidecar
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: '"author_email":\s*null'
  - id: empty-classifiers-sidecar
    desc: Empty classifiers list in sidecar
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: '"classifiers":\s*\[\s*\]'
  - id: null-project-urls-sidecar
    desc: Null project URLs in sidecar
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: '"project_urls":\s*null'
  - id: null-homepage-sidecar
    desc: Null homepage in sidecar
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: '"home_page":\s*null'
  - id: discord-webhook-in-description-sidecar
    desc: Discord webhook mention in sidecar description
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '"description":\s*"[^"\n]{0,400}[Dd]iscord.{0,30}(webhook|embed)'
  - id: dynamic-requires-dist-sidecar
    desc: Dynamic Requires-Dist metadata
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: '"dynamic":\s*\[[^\]]{0,200}"Requires-Dist"'
  - id: no-runtime-deps-sidecar
    desc: Sidecar declares no runtime dependencies
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: '"requires_dist":\s*null'
  - id: requests-runtime-dependency-sidecar
    desc: Requests runtime dependency in sidecar
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: '"requires_dist":\s*\[\s*"requests"\s*\]'
  - id: multi-version-release-history-sidecar
    desc: Multiple release versions in sidecar
    crit: notable
    conf: 0.86
    count_min: 3
    if:
      type: raw
      regex: '"[0-9]+\.[0-9]+\.[0-9]+":\s*\['
  - id: empty-wheel-dist-info-only
    desc: Wheel contains only dist-info files
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: ".dist-info/"
  - id: depconf-explicit-summary
    desc: Summary references dependency confusion attack
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      regex: '"summary":\s*"[^"]{0,200}dependency confusion'
      case_insensitive: true
  - id: malicious-self-identify-summary
    desc: Summary self-identifies package as malicious
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      regex: '"summary":\s*"[^"]{0,100}[Mm]alicious package'
  - id: hackerone-email-sidecar
    desc: Author email at HackerOne platform domain
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: '"author_email":\s*"[^"]{0,100}@wearehackerone\.com'
  - id: bugbounty-platform-email-sidecar
    desc: Author email from bug bounty platform
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: '"author_email":\s*"[^"]{0,100}@(hackerone|synack|cobalt\.io|bugcrowd)\.'
      case_insensitive: true
  - id: tiny-wheel-size-raw-16xx
    desc: Tiny wheel size prefix 16xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 16'
  - id: tiny-wheel-size-raw-17xx
    desc: Tiny wheel size prefix 17xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 17'
  - id: tiny-wheel-size-raw-18xx
    desc: Tiny wheel size prefix 18xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 18'
  - id: tiny-wheel-size-raw-19xx
    desc: Tiny wheel size prefix 19xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 19'
  - id: tiny-wheel-size-raw-20xx
    desc: Tiny wheel size prefix 20xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 20'
  - id: tiny-wheel-size-raw-21xx
    desc: Tiny wheel size prefix 21xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 21'
  - id: tiny-wheel-size-raw-22xx
    desc: Tiny wheel size prefix 22xx
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: '"size": 22'
  - id: summary-exe-download-sidecar
    desc: Sidecar summary mentions EXE download
    crit: suspicious
    conf: 0.95
    attack: T1204.002
    if:
      type: raw
      regex: '"summary":\s*"[^"]{0,200}(exe|execut)'
      case_insensitive: true
  - id: non-latin-summary-sidecar
    desc: Sidecar summary contains non-Latin script
    crit: notable
    conf: 0.8
    attack: T1204.001
    if:
      type: raw
      regex: '"summary":\s*".{0,50}\\u0[4-9a-f]'
  - id: non-latin-author-sidecar
    desc: Sidecar author contains non-Latin script
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: '"author":\s*".{0,50}\\u0[4-9a-f]'
  - id: depconf-version-10x-sidecar
    desc: Sidecar package version in 10.x range
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: '"version":\s*"1[0-9]\.'
  - id: telegram-premium-fix-name-sidecar
    desc: Sidecar package name lures Telegram premium fix
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: '"name":\s*"TelegramPremiumFix"'
  - id: telegram-premium-fix-summary-sidecar
    desc: Sidecar summary advertises Telegram premium fix
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '"summary":\s*"Use this library for add Premium to your telegram"'
  - id: repeated-same-day-uploads-sidecar
    desc: Sidecar contains repeated same-day upload timestamps
    crit: notable
    conf: 0.88
    count_min: 6
    if:
      type: raw
      regex: '"upload_time":\s*"2025-07-26T'
  - id: dynamic-author-summary-sidecar
    desc: Sidecar marks author and summary as dynamic
    crit: notable
    conf: 0.86
    if:
      type: raw
      regex: '"dynamic":\s*\[[^\]]{0,80}"Author"[^\]]{0,80}"Summary"'
  - id: pypi-project-url-sidecar
    desc: Sidecar references PyPI project URLs
    crit: baseline
    conf: 0.86
    if:
      type: raw
      regex: '"(package|project|release)_url":\s*"https://pypi\.org/project/'
  - id: pythonhosted-download-url-sidecar
    desc: Sidecar includes pythonhosted download URL
    crit: baseline
    conf: 0.88
    if:
      type: raw
      regex: '"url":\s*"https://files\.pythonhosted\.org/packages/'
composite_rules:
  - id: tiny-wheel-with-sdist-kv
    desc: Tiny wheel paired with source sdist
    crit: suspicious
    conf: 0.93
    all:
      - id: wheel-filename
      - id: sdist-filename
      - id: wheel-packagetype
      - id: tiny-wheel-size
  - id: tiny-wheel-size-raw
    desc: Tiny wheel size in raw metadata
    crit: suspicious
    conf: 0.9
    any:
      - id: tiny-wheel-size-raw-10xx
      - id: tiny-wheel-size-raw-11xx
      - id: tiny-wheel-size-raw-12xx
      - id: tiny-wheel-size-raw-13xx
      - id: tiny-wheel-size-raw-14xx
      - id: tiny-wheel-size-raw-15xx
      - id: tiny-wheel-size-raw-16xx
      - id: tiny-wheel-size-raw-17xx
      - id: tiny-wheel-size-raw-18xx
      - id: tiny-wheel-size-raw-19xx
      - id: tiny-wheel-size-raw-20xx
      - id: tiny-wheel-size-raw-21xx
      - id: tiny-wheel-size-raw-22xx
  - id: tiny-wheel-with-sdist-raw
    desc: Tiny wheel paired with source sdist
    crit: suspicious
    conf: 0.93
    all:
      - id: wheel-filename-raw
      - id: sdist-filename-raw
      - id: wheel-packagetype-raw
      - id: tiny-wheel-size-raw
  - id: tiny-bdist-wheel-sidecar
    desc: Tiny bdist wheel in sidecar
    crit: suspicious
    conf: 0.91
    all:
      - id: wheel-filename-raw
      - id: wheel-packagetype-raw
      - id: tiny-wheel-size-raw
  - id: wheel-and-sdist-sidecar
    desc: Wheel and sdist pair in sidecar
    crit: suspicious
    conf: 0.88
    all:
      - id: meta-json-sidecar
      - id: wheel-filename-raw
      - id: sdist-filename-raw
  - id: tiny-wheel-with-sdist
    desc: Tiny wheel paired with source sdist
    crit: suspicious
    conf: 0.93
    all:
      - id: meta-json-sidecar
    any:
      - id: tiny-wheel-with-sdist-kv
      - id: tiny-wheel-with-sdist-raw
  - id: stripped-metadata-sidecar
    desc: Stripped PyPI metadata sidecar
    crit: suspicious
    conf: 0.9
    all:
      - id: meta-json-sidecar
      - id: empty-description-sidecar
      - id: null-summary-sidecar
      - id: null-author-sidecar
      - id: null-author-email-sidecar
      - id: empty-classifiers-sidecar
  - id: dynamic-requests-sidecar
    desc: Dynamic requests dependency in sidecar
    crit: suspicious
    conf: 0.88
    all:
      - id: dynamic-requires-dist-sidecar
      - id: requests-runtime-dependency-sidecar
  - id: throwaway-release-history-sidecar
    desc: Multi-version throwaway release history
    crit: suspicious
    conf: 0.89
    all:
      - id: meta-json-sidecar
      - id: multi-version-release-history-sidecar
      - id: tiny-wheel-with-sdist-raw
  - id: pypi-sidecar-malware-profile
    desc: Suspicious PyPI metadata sidecar profile
    crit: suspicious
    conf: 0.94
    all:
      - id: throwaway-release-history-sidecar
      - id: stripped-metadata-sidecar
      - id: dynamic-requests-sidecar
  - id: sparse-sidecar-metadata
    desc: Sparse PyPI sidecar with missing metadata
    crit: suspicious
    conf: 0.9
    all:
      - id: meta-json-sidecar
      - id: null-author-email-sidecar
      - id: empty-classifiers-sidecar
    any:
      - id: null-project-urls-sidecar
      - id: null-homepage-sidecar
    needs: 1
  - id: discord-webhook-sidecar-profile
    desc: Discord webhook in sparse PyPI sidecar
    crit: hostile
    conf: 0.93
    all:
      - id: meta-json-sidecar
      - id: discord-webhook-in-description-sidecar
      - id: sparse-sidecar-metadata
  - id: dist-info-only-wheel
    desc: Wheel distribution is dist-info only
    crit: suspicious
    conf: 0.92
    all:
      - id: wheel-filename
      - id: empty-wheel-dist-info-only
  - id: depconf-self-identified-sidecar
    desc: PyPI sidecar summary self-identifies as dependency confusion
    crit: hostile
    conf: 0.99
    all:
      - id: meta-json-sidecar
      - id: depconf-explicit-summary
  - id: malicious-package-self-identified-sidecar
    desc: PyPI sidecar summary self-identifies as malicious package
    crit: hostile
    conf: 0.99
    all:
      - id: meta-json-sidecar
      - id: malicious-self-identify-summary
  - id: hackerone-depconf-sidecar
    desc: HackerOne email with dependency confusion version profile
    crit: suspicious
    conf: 0.93
    all:
      - id: meta-json-sidecar
      - id: hackerone-email-sidecar
      - id: empty-classifiers-sidecar
  - id: bugbounty-depconf-sidecar
    desc: Bug bounty platform email with sparse metadata
    crit: suspicious
    conf: 0.9
    all:
      - id: meta-json-sidecar
      - id: empty-classifiers-sidecar
    any:
      - id: hackerone-email-sidecar
      - id: bugbounty-platform-email-sidecar
  - id: exe-download-sidecar-profile
    desc: Sidecar advertises EXE download with sparse metadata
    crit: hostile
    conf: 0.95
    all:
      - id: meta-json-sidecar
      - id: summary-exe-download-sidecar
      - id: sparse-sidecar-metadata
  - id: no-deps-tiny-wheel-sidecar
    desc: Tiny PyPI wheel with no runtime dependencies
    crit: suspicious
    conf: 0.93
    all:
      - id: meta-json-sidecar
      - id: tiny-wheel-with-sdist
      - id: no-runtime-deps-sidecar
  - id: non-latin-author-sparse-sidecar
    desc: Non-Latin author in sparse PyPI sidecar
    crit: suspicious
    conf: 0.9
    all:
      - id: meta-json-sidecar
      - id: non-latin-author-sidecar
      - id: sparse-sidecar-metadata
  - id: tiny-exe-dropper-sidecar-profile
    desc: Tiny no-dependency EXE downloader sidecar
    crit: hostile
    conf: 0.97
    all:
      - id: meta-json-sidecar
      - id: tiny-wheel-with-sdist
      - id: summary-exe-download-sidecar
      - id: sparse-sidecar-metadata
    any:
      - id: no-runtime-deps-sidecar
      - id: dynamic-author-summary-sidecar
    needs: 1
  - id: non-latin-sparse-sidecar
    desc: Non-Latin sidecar with sparse metadata
    crit: suspicious
    conf: 0.88
    all:
      - id: meta-json-sidecar
      - id: non-latin-summary-sidecar
      - id: empty-classifiers-sidecar
      - id: null-author-email-sidecar
  - id: telegram-premium-fix-lure-sidecar
    desc: Telegram premium fix lure in PyPI sidecar
    crit: suspicious
    conf: 0.95
    all:
      - id: meta-json-sidecar
      - id: telegram-premium-fix-name-sidecar
      - id: telegram-premium-fix-summary-sidecar
  - id: rapid-release-lure-sidecar
    desc: Tiny PyPI lure with same-day release burst
    crit: suspicious
    conf: 0.94
    all:
      - id: telegram-premium-fix-lure-sidecar
      - id: repeated-same-day-uploads-sidecar
    any:
      - id: tiny-wheel-with-sdist
      - id: sparse-sidecar-metadata
      - id: dynamic-author-summary-sidecar
