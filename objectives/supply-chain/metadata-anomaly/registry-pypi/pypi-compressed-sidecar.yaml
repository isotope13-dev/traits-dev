defaults:
  platforms: [unix, windows]
  for: [data]
  attack: T1195.002

traits:
  - id: zstd-magic-header
    desc: ZSTD archive magic header
    crit: baseline
    conf: 1.0
    if:
      type: hex
      pattern: "28 B5 2F FD"
      offset: 0

  - id: compact-sidecar-size
    desc: Compact compressed sidecar size
    crit: suspicious
    conf: 0.92
    size_min: 1200
    size_max: 2048
    if:
      type: hex
      pattern: "28 B5 2F FD"
      offset: 0

  - id: throwaway-sidecar-size
    desc: Throwaway compressed sidecar size
    crit: suspicious
    conf: 0.95
    size_min: 1400
    size_max: 1600
    if:
      type: hex
      pattern: "28 B5 2F FD"
      offset: 0

composite_rules:
  - id: pypi-zstd-sidecar
    desc: ZSTD-compressed PyPI metadata sidecar
    crit: notable
    conf: 0.97
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry-pypi::meta-json-zst-sidecar
      - id: zstd-magic-header

  - id: compact-pypi-zstd-sidecar
    desc: Compact PyPI metadata sidecar artifact
    crit: suspicious
    conf: 0.95
    all:
      - id: pypi-zstd-sidecar
      - id: compact-sidecar-size

  - id: throwaway-pypi-zstd-sidecar
    desc: Throwaway PyPI compressed sidecar artifact
    crit: suspicious
    conf: 0.97
    all:
      - id: compact-pypi-zstd-sidecar
      - id: throwaway-sidecar-size
