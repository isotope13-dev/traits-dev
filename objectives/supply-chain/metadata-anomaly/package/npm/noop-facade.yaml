defaults:
  platforms:
    - unix
    - windows
  attack: T1195.002
traits:
  - id: name-claims-nothing
    desc: Package name claims to do nothing
    crit: notable
    conf: 0.94
    for:
      - package.json
    if:
      type: kv
      path: name
      regex: (^|-)nothing(-|$)
  - id: keyword-nothing
    desc: Package keyword markets no-op behavior
    crit: notable
    conf: 0.92
    for:
      - package.json
    if:
      type: kv
      path: keywords[*]
      exact: nothing
composite_rules:
  - id: no-op-facade-manifest
    desc: No-op package facade with empty main
    crit: suspicious
    conf: 0.95
    all:
      - id: name-claims-nothing
      - id: keyword-nothing
      - id: metadata/package/fields/main::main-js-file-entry
      - id: metadata/package/files::empty-javascript-file
  - id: no-op-facade-with-branding
    desc: No-op facade with branding asset
    crit: suspicious
    conf: 0.96
    all:
      - id: no-op-facade-manifest
      - id: metadata/package/files::npm-package-with-image
