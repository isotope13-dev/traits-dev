defaults:
  platforms:
  - unix
  - windows
  for:
  - package.json
traits:
- id: js-test-basename-a
  desc: JS test basename pattern
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: basename
    regex: test[-_].{0,220}\.[jt]s$|.{0,220}[-_]test\.[jt]s$
  unless:
  - type: basename
    regex: '^test-api\.[jt]s$'
- id: js-test-basename-b
  desc: JS spec basename pattern
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: basename
    regex: .{0,220}\.spec\.[jt]s$
- id: tabby-builtin-keyword
  desc: Tabby builtin plugin keyword
  crit: baseline
  conf: 0.9
  if:
    type: value
    path: keywords
    exact: tabby-builtin-plugin
- id: playwright-test-plugin-fixture
  desc: Playwright test plugin package fixture
  crit: baseline
  conf: 0.99
  if:
    type: text
    substr: '"name": "playwright-test-plugin"'
- id: playwright-runtime-dependency
  desc: Playwright runtime dependency
  crit: baseline
  conf: 0.95
  if:
    type: value
    path: dependencies.playwright
    exists: true
- id: playwright-test-dev-dependency
  desc: Playwright test dev dependency
  crit: baseline
  conf: 0.95
  if:
    type: value
    path: devDependencies.@playwright/test
    exists: true
  # Universal JS export/import idioms — component only. These feed
  # `has-exports-comp` / `dangerous-requires` composites, which surface
  # the real signal at notable. Standalone they fire on every benign file.
- id: module-exports-pattern
  desc: CommonJS module.exports pattern
  crit: component
  conf: 0.8
  for:
  - javascript
  if:
    type: tree-sitter
    kind: assignment
    exact: module.exports
- id: exports-dot-pattern
  desc: CommonJS exports.{0,50} pattern
  crit: component
  conf: 0.8
  for:
  - javascript
  if:
    type: tree-sitter
    kind: assignment
    exact: exports.
- id: esm-export-pattern-key
  desc: ESM export statement
  crit: component
  conf: 0.8
  for:
  - javascript
  if:
    type: tree-sitter
    node: export_statement
    exact: export
- id: require-os-dup
  desc: require('os') import
  crit: component
  conf: 0.7
  for:
  - javascript
  if:
    type: tree-sitter
    kind: import
    exact: os
- id: package-resolved-field
  desc: Reads package ___resolved field
  crit: notable
  conf: 0.85
  for:
  - javascript
  if:
    type: text
    substr: .___resolved
- id: querystring-msg-field
  desc: URL-encodes msg field for POST
  crit: notable
  conf: 0.85
  for:
  - javascript
  if:
    type: text
    regex: 'querystring\.stringify\s*\(\s*\{\s*msg\s*:'
- id: dirname-tracking-field
  desc: Includes __dirname in tracking data
  crit: notable
  conf: 0.8
  for:
  - javascript
  if:
    type: text
    regex: \bc\s*:\s*__dirname\b
- id: npm-init-default-test
  desc: Default-style npm init placeholder test script
  crit: component
  conf: 0.95
  if:
    type: value
    path: scripts.test
    regex: '^echo "Error: ([A-Za-z]{1,24}|no test) specified" && exit 1$'
- id: test-fixture-package-json-path
  desc: package.json under test fixture path
  crit: component
  conf: 0.9
  if:
    type: basename
    regex: (_{0,2}tests?_{0,2}).{0,300}(fixtures|components).{0,80}package\.json$
- id: constants-js-basename
  desc: constants JavaScript module basename
  crit: baseline
  conf: 0.9
  for:
  - javascript
  if:
    type: basename
    regex: '(?i)(^|/)constants\.[jt]sx?$'
- id: npm-init-default-license
  desc: Default npm init ISC license
  crit: baseline
  conf: 0.95
  if:
    type: value
    path: license
    exact: ISC
- id: pkg-version-001
  desc: Package version 0.0.1 (brand new)
  crit: notable
  conf: 0.6
  if:
    type: value
    path: version
    exact: 0.0.1
  unless:
  - type: value
    path: name
    exact: concat-map
- id: version-only-package-export
  desc: Exports version facade only
  crit: suspicious
  conf: 0.88
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: "module.exports = { version: require('./package.json').version }"
- id: spawn-unref
  desc: spawn().unref() call (orphan process)
  crit: notable
  conf: 0.75
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: spawn\(.{1,220}\)\.unref\(\)
- id: stdio-ignore-array
  desc: 'stdio: [...ignore...] pattern'
  crit: notable
  conf: 0.7
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: stdio:\s*\[.{0,50}ignore
- id: placeholder-author-no-repo
  desc: Placeholder author without repository URL
  crit: suspicious
  conf: 0.85
  if:
    type: value
    path: author
    exact: Your Name
  unless:
  - id: metadata/package/fields/repository::has-repository-field
- id: pkg-no-description-short
  desc: Very short/empty description
  crit: notable
  conf: 0.7
  unless:
  - type: value
    path: description
    exact: Tabby core
  if:
    type: value
    path: description
    regex: ^.{0,15}$
- id: desc-test-package
  desc: Description is npm test placeholder
  crit: component
  conf: 0.82
  if:
    type: value
    path: description
    regex: ^test package$
    case_insensitive: true
- id: name-ui-style-unscoped
  desc: Unscoped company-style UI style package name
  crit: component
  conf: 0.82
  if:
    type: value
    path: name
    regex: ^[a-z0-9][a-z0-9-]{3,40}-ui-style$
- id: pkg-junk-meme-description-laugh
  desc: Description is a laugh meme string (hehe/haha/hihi)
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  if:
    type: value
    path: description
    regex: ^(hehe|haha|hihi|huhu)$
    case_insensitive: true
- id: pkg-junk-meme-description-slang
  desc: Description is internet slang (lol/lmao/yolo/xd)
  crit: suspicious
  conf: 0.88
  attack: T1195.002
  if:
    type: value
    path: description
    regex: ^(lol|lmao|yolo|xd)$
    case_insensitive: true
- id: pkg-junk-meme-description-keyboard
  desc: Description is keyboard mashing (asdf/qwerty)
  crit: suspicious
  conf: 0.88
  attack: T1195.002
  if:
    type: value
    path: description
    regex: ^(asdf|qwerty|aaaa|zzzz)$
    case_insensitive: true
- id: desc-auto-generated
  desc: Description says package is auto-generated
  crit: suspicious
  conf: 0.85
  attack: T1195.002
  count_min: 1
  if:
    id: objectives/supply-chain/metadata-anomaly/package-code/npm::desc-auto-generated
- id: keywords-single-entry
  desc: Keywords array has exactly one entry
  crit: notable
  conf: 0.7
  if:
    type: value
    path: keywords
    size_min: 1
    size_max: 1
  unless:
  - id: tabby-builtin-keyword
  - id: metadata/package/fields/repository::has-repository-evidence
- id: pkg-main-resp-path
  desc: Main uses resp/ directory
  crit: notable
  conf: 0.7
  count_min: 1
  if:
    id: objectives/supply-chain/metadata-anomaly/package-code/npm::pkg-main-resp-path
- id: cdn-keyword-jsdelivr
  desc: jsdelivr keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: jsdelivr
- id: cdn-keyword-cdn
  desc: cdn keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: cdn
- id: browser-keyword
  desc: browser keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: browser
- id: html-keyword
  desc: html keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: html
- id: desc-public-cdn-html
  desc: Description claims public CDN HTML page
  crit: suspicious
  conf: 0.92
  if:
    type: value
    path: description
    regex: static html page.{0,20}public cdn
    case_insensitive: true
- id: files-index-favicon-only
  desc: Package publishes only index and favicon
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: '"files"\s*:\s*\[\s*"index\.html"\s*,\s*"favicon\.ico"\s*\]'
- id: cdn-keyword-cloudflare
  desc: cloudflare keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: cloudflare
- id: cdn-keyword-unpkg
  desc: unpkg keyword
  crit: notable
  conf: 0.6
  if:
    type: value
    path: keywords
    exact: unpkg
- id: template-keyword
  desc: Template keyword in package
  crit: notable
  conf: 0.5
  if:
    type: value
    path: keywords
    exact: template
- id: desc-attack-technique-a
  desc: Description names attack technique (ssrf/xss/rce/lfi)
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  if:
    type: value
    path: "description"
    regex: ^(ssrf|xss|rce|lfi)$
    case_insensitive: true
- id: desc-attack-technique-b
  desc: Description names attack technique (rfi/sqli/idor/ssti)
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  if:
    type: value
    path: "description"
    regex: ^(rfi|sqli|idor|ssti)$
    case_insensitive: true
- id: desc-attack-technique-c
  desc: Description names attack technique (xxe/csrf)
  crit: suspicious
  conf: 0.9
  attack: T1195.002
  if:
    type: value
    path: "description"
    regex: ^(xxe|csrf)$
    case_insensitive: true
- id: main-html-entry
  desc: Package main entry points to HTML file
  crit: notable
  conf: 0.85
  attack: T1195.002
  if:
    type: value
    path: "main"
    regex: \.(html|htm)$
    case_insensitive: true
- id: test-script-trivial-shell-a
  desc: Trivial test script (ls/true/echo/pwd)
  crit: component
  conf: 0.85
  if:
    type: value
    path: "scripts.test"
    regex: ^(ls|true|echo|pwd)(\s.{0,80})?$
    case_insensitive: true
- id: test-script-trivial-shell-b
  desc: Trivial test script (cat/date/whoami)
  crit: component
  conf: 0.85
  if:
    type: value
    path: "scripts.test"
    regex: ^(cat|date|whoami)(\s.{0,80})?$
    case_insensitive: true
- id: desc-dependency-confusion
  desc: Description mentions dependency confusion
  crit: notable
  conf: 0.8
  if:
    type: value
    path: description
    regex: dependency\s*confusion
    case_insensitive: true
- id: desc-dependency-resolution-verify
  desc: Description mentions dependency resolution verification
  crit: notable
  conf: 0.8
  if:
    type: value
    path: description
    regex: dependency\s+resolution\s+verif
    case_insensitive: true
- id: desc-passive-poc
  desc: Description mentions passive PoC
  crit: notable
  conf: 0.85
  if:
    type: value
    path: description
    substr: "passive PoC"
- id: desc-package-poc
  desc: Description labels package as PoC
  crit: notable
  conf: 0.84
  if:
    type: value
    path: description
    regex: \b[a-z0-9._ -]{0,40}\bPoC\b
    case_insensitive: true
- id: desc-placeholder-package
  desc: Description mentions placeholder package
  crit: notable
  conf: 0.75
  if:
    type: value
    path: description
    substr: placeholder
    case_insensitive: true
- id: desc-prevent-squat-1
  desc: Description claims to prevent squatting (prevent/protect)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: description
    regex: (prevent|protect).{0,100}(squat|confusion|typo)
    case_insensitive: true
- id: desc-prevent-squat-2
  desc: Description claims to prevent squatting (reserve/claim)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: description
    regex: (reserve|claim).{0,100}(squat|confusion|typo)
    case_insensitive: true
- id: scoped-typosquat-1
  desc: '@<scope>/(react|vue|angular) scoped package name'
  crit: component
  conf: 0.75
  # Downgraded from notable to component: `@<scope>/react` is the ecosystem
  # convention for "React bindings for X" (e.g. @tanstack/react-query,
  # @livequery/react, @reduxjs/react-redux). Cannot distinguish malicious
  # typosquats from legitimate ecosystem packages without a reputation
  # signal. Useful only as a co-evidence atom in higher composites.
  if:
    type: text
    regex: '"name":\s*"@[^/]{1,80}/(react|vue|angular)"'
- id: scoped-typosquat-2
  desc: '@<scope>/(express|lodash|axios) scoped package name'
  crit: component
  conf: 0.75
  # Same rationale as scoped-typosquat-1 — convention vs typosquat is
  # indistinguishable here without external reputation data.
  if:
    type: text
    regex: '"name":\s*"@[^/]{1,80}/(express|lodash|axios)'
- id: js-placeholder-announcement-1a
  desc: Code announces placeholder/fake package (pkg)
  crit: notable
  conf: 0.8
  for:
  - javascript
  unless:
  - id: metadata/package/testing/harness/fourslash/
  if:
    type: text
    regex: \b(placeholder|fake|demo)\b.{0,30}\bpackage\b
    case_insensitive: true
  not:
  - regex: '(?i)placeholder\s+for\s+'
- id: js-placeholder-announcement-1b
  desc: Code announces placeholder/fake package (module)
  crit: notable
  conf: 0.8
  for:
  - javascript
  unless:
  - id: metadata/package/testing/harness/fourslash/
  if:
    type: text
    regex: \b(placeholder|fake|demo)\b.{0,30}\bmodule\b
    case_insensitive: true
- id: js-placeholder-announcement-2
  desc: Code announces placeholder/fake package (npm)
  crit: notable
  conf: 0.8
  for:
  - javascript
  unless:
  - id: metadata/package/testing/harness/fourslash/
  if:
    type: text
    regex: \b(placeholder|fake|demo)\b.{0,30}\bnpm\b
    case_insensitive: true
- id: js-placeholder-announcement-3
  desc: Code says "do not use" this package/module
  crit: notable
  conf: 0.8
  for:
  - javascript
  size_max: 1024
  unless:
  - id: metadata/package/testing/harness/fourslash/
  if:
    type: string_literal
    regex: do\s+not\s+use\b.{0,40}\b(package|module|npm)\b
    case_insensitive: true
- id: js-hijacked-package-message
  desc: Code announces hijacked package
  crit: suspicious
  conf: 0.98
  attack: T1195.002
  for:
  - javascript
  if:
    type: string_literal
    substr: hijacked package
    case_insensitive: true
- id: js-malicious-code-executed
  desc: Code prints "Malicious code executed"
  crit: suspicious
  conf: 0.98
  attack: T1195.002
  for:
  - javascript
  if:
    type: string_literal
    exact: Malicious code executed
- id: bug-bounty-marker-1
  desc: Bug bounty marker 1
  crit: notable
  conf: 0.75
  if:
    type: text
    case_insensitive: true
    regex: bug\s*bounty|hackerone|bugcrowd
- id: bug-bounty-marker-2
  desc: Bug bounty marker 2
  crit: notable
  conf: 0.75
  if:
    type: text
    case_insensitive: true
    regex: proof\s*of\s*concept|\bPoC\b
- id: local-stealer-import-1
  desc: Local stealer import pattern 1
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (from|require\()\s*\./stealer
- id: local-stealer-import-2
  desc: Local stealer import pattern 2
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (from|require\()\s*\./(logger|exfil)
- id: license-unlicensed
  desc: Package is UNLICENSED on public registry
  crit: notable
  conf: 0.72
  attack: T1195.002
  if:
    type: value
    path: license
    exact: UNLICENSED
- id: zero-byte-js-entry
  desc: Zero-byte JavaScript main entry file
  crit: suspicious
  conf: 0.90
  attack: T1195.002
  for: [javascript]
  size_max: 0
  if:
    id: objectives/supply-chain/metadata-anomaly/package-code/npm::zero-byte-js-entry
- id: author-corp-email-dropbox
  desc: Author uses Dropbox corporate email
  crit: notable
  conf: 0.72
  attack: T1195.002
  if:
    type: value
    path: author
    substr: "@dropbox.com"
- id: placeholder-author-test-handle
  desc: Package author uses testNNN handle
  crit: notable
  conf: 0.82
  if:
    type: value
    path: author
    regex: ^test[0-9]{2,8}$
composite_rules:
- id: playwright-test-package-context
  desc: Playwright test package context
  crit: baseline
  conf: 0.99
  any:
  - id: playwright-runtime-dependency
  - id: playwright-test-dev-dependency
  - id: playwright-test-plugin-fixture
- id: npm-install-tracking-object
  desc: NPM hook builds install tracking object
  crit: suspicious
  conf: 0.93
  attack: T1082
  for:
  - javascript
  all:
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  - id: objectives/discovery/system/fingerprint/hardware::node-dirname
  - id: micro-behaviors/fs/file/read::require-local-package-json
  any:
  - id: querystring-msg-field
  - id: package-resolved-field
  - id: dirname-tracking-field
  needs: 2
- id: npm-node-host-metadata-exfil
  desc: NPM hook exfiltrates host package metadata
  crit: hostile
  conf: 0.99
  mbc: E1041
  attack: T1041
  for:
  - javascript
  all:
  - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
  - id: micro-behaviors/process/user/query::os-homedir-call
  - id: micro-behaviors/communications/dns/lookup/resolver::require-dns
  - id: micro-behaviors/fs/file/read::require-local-package-json
  - id: micro-behaviors/communications/http/request/client::https-request
  - id: micro-behaviors/communications/http/post::post-form
  any:
  - id: objectives/exfiltration/oob/endpoint::pipedream
  - id: querystring-msg-field
  - id: package-resolved-field
  - id: npm-install-tracking-object
  needs: 2
- id: local-stealer-import
  desc: Imports local stealer module
  crit: suspicious
  conf: 0.8
  for:
  - javascript
  - typescript
  any:
  - id: local-stealer-import-1
  - id: local-stealer-import-2
- id: bug-bounty-marker
  desc: Bug bounty or security research
  crit: notable
  conf: 0.9
  for:
  - javascript
  - package.json
  any:
  - id: bug-bounty-marker-1
  - id: bug-bounty-marker-2
- id: scoped-typosquat
  desc: '@<scope>/<framework> scoped package name'
  crit: component
  conf: 0.85
  # Downgraded to component — see scoped-typosquat-1/-2 rationale.
  # Reference from hostile composites that already have other evidence.
  any:
  - id: scoped-typosquat-1
  - id: scoped-typosquat-2
- id: placeholder-author-generic-1-comp
  desc: Author field contains generic placeholder (set 1)
  crit: notable
  conf: 0.7
  any:
  - id: objectives/supply-chain/metadata-anomaly/package-code/npm::placeholder-author-generic-1a-dup
  - id: objectives/supply-chain/metadata-anomaly/package-code/npm::placeholder-author-generic-1b-dup
- id: placeholder-author-generic-2-comp
  desc: Author field contains generic placeholder (set 2)
  crit: notable
  conf: 0.7
  any:
  - id: objectives/supply-chain/metadata-anomaly/package-code/npm::placeholder-author-generic-2a-dup
  - id: objectives/supply-chain/metadata-anomaly/package-code/npm::placeholder-author-generic-2b-dup
- id: placeholder-author-generic-comp
  desc: Author field contains generic placeholder
  crit: notable
  conf: 0.75
  any:
  - id: placeholder-author-generic-1-comp
  - id: placeholder-author-generic-2-comp
- id: js-placeholder-announcement-1
  desc: Code announces placeholder or fake package (set 1)
  crit: notable
  conf: 0.7
  for:
  - javascript
  unless:
  - id: metadata/package/testing/harness/fourslash/
  any:
  - id: js-placeholder-announcement-1a
  - id: js-placeholder-announcement-1b
- id: js-placeholder-announcement
  desc: Code announces placeholder or fake package
  crit: suspicious
  conf: 0.85
  mbc: B0024
  attack: T1195.002
  for:
  - javascript
  unless:
  - id: metadata/package/testing/harness/fourslash/
  any:
  - id: js-placeholder-announcement-1
  - id: js-placeholder-announcement-1a
  - id: js-placeholder-announcement-1b
  - id: js-placeholder-announcement-2
  - id: js-placeholder-announcement-3
  - id: js-hijacked-package-message
- id: desc-prevent-squat
  desc: Description claims to prevent squatting
  crit: notable
  conf: 0.75
  any:
  - id: desc-prevent-squat-1
  - id: desc-prevent-squat-2
- id: cdn-keyword-facade
  desc: CDN-related keywords
  crit: notable
  conf: 0.6
  any:
  - id: cdn-keyword-jsdelivr
  - id: cdn-keyword-cdn
  - id: cdn-keyword-cloudflare
  - id: cdn-keyword-unpkg
- id: static-html-cdn-keywords
  desc: Static HTML browser facade keywords
  crit: suspicious
  conf: 0.82
  needs: 2
  any:
  - id: cdn-keyword-cdn
  - id: browser-keyword
  - id: html-keyword
- id: public-cdn-html-facade
  desc: Public CDN HTML facade package
  crit: suspicious
  conf: 0.95
  attack: T1195.002
  all:
  - id: main-html-entry
  - id: desc-public-cdn-html
  - id: files-index-favicon-only
  - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-no-deps-at-all
  - id: objectives/supply-chain/recon-exfil/metadata::public-access-config
  any:
  - id: static-html-cdn-keywords
  - id: objectives/supply-chain/metadata-anomaly/manifest/npm::desc-lightweight
- id: npm-data-exfil
  desc: NPM package exfiltrates system info via HTTP
  crit: notable
  conf: 0.95
  attack: T1020
  mbc: E1041
  all:
  - id: micro-behaviors/communications/http/post::post
  - id: metadata/file/text/metrics::javascript-small-file-5k
  any:
  - id: objectives/discovery/system/fingerprint/hardware::js-sysinfo-multi
  - id: objectives/discovery/system/fingerprint/hardware::process-fingerprint-multi
- id: npm-victim-exfil
  desc: NPM package sends victim ID via HTTP POST
  crit: notable
  conf: 0.92
  attack: T1020
  mbc: E1041
  all:
  - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
  - id: micro-behaviors/communications/http/post::post
  - id: metadata/file/text/metrics::javascript-small-file-5k
- id: has-exports-comp
  desc: Module has exports
