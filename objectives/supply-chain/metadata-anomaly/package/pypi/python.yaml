defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1195.002

traits:
  - id: python-pip-list-metadata
    desc: Python pip list metadata
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: --format=json

  - id: python-pypi-metadata-compare
    desc: Python PyPI JSON metadata reference
    crit: component
    conf: 0.94
    if:
      type: text
      substr: https://pypi.org/pypi/

  - id: python-metadata-report-post
    desc: Python metadata report POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: packages_with_anomalies

composite_rules:
  - id: python-package-metadata-exfil
    desc: Python package metadata exfil
    crit: hostile
    conf: 0.98
    all:
      - id: python-pip-list-metadata
      - id: python-pypi-metadata-compare
      - id: python-metadata-report-post
