defaults:
  platforms: [unix, windows]
  attack: T1195.002
traits:
  - id: python-placeholder-future-logic
    desc: Python module explicitly marks future placeholder logic
    crit: component
    conf: 0.9
    for: [python]
    size_max: 20000
    if:
      type: text
      substr: Placeholder for future logic
  - id: python-placeholder-pass
    desc: Python placeholder implementation uses pass
    crit: component
    conf: 0.85
    for: [python]
    size_max: 20000
    if:
      type: text
      regex: '(?i)placeholder[\s\S]{0,300}\bpass\b'
  - id: test-package-readme
    desc: README identifies package as a test package
    crit: component
    conf: 0.84
    for: [text]
    size_max: 2000
    if:
      type: text
      regex: '(?i)^test package\b'
composite_rules:
  - id: placeholder-noop-python-module
    desc: Python package contains placeholder no-op module
    crit: suspicious
    conf: 0.9
    for: [python]
    all:
      - id: python-placeholder-future-logic
      - id: python-placeholder-pass
  - id: pypi-placeholder-noop-sparse-metadata
    desc: PyPI package has placeholder no-op code with sparse metadata
    crit: suspicious
    conf: 0.92
    for: [python, pkginfo, archives, zip]
    all:
      - id: placeholder-noop-python-module
      - id: objectives/supply-chain/metadata-anomaly/manifest/pypi::pypi-no-runtime-deps
      - id: objectives/supply-chain/metadata-anomaly/author::pkginfo-no-author-email
    scope: archive
  - id: pypi-placeholder-claimed-functionality
    desc: PyPI package claims functionality but only ships placeholder code
    crit: suspicious
    conf: 0.9
    for: [python, pkginfo, archives, zip]
    all:
      - id: placeholder-noop-python-module
      - id: objectives/supply-chain/metadata-anomaly/manifest/pypi::from-setuptools-import
      - id: objectives/supply-chain/metadata-anomaly/description::pkginfo-single-word-summary
    scope: archive
  - id: pypi-empty-skeleton-sparse-metadata
    desc: Tiny PyPI skeleton package with sparse metadata
    crit: suspicious
    conf: 0.93
    for: [pkginfo, archives, zip]
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/pypi::pkginfo-tiny
      - id: objectives/supply-chain/metadata-anomaly/description::pkginfo-no-summary
      - id: objectives/supply-chain/metadata-anomaly/manifest/pypi::pypi-no-runtime-deps
      - id: objectives/supply-chain/metadata-anomaly/author::pkginfo-no-author-email
    scope: archive
  - id: pypi-empty-test-package-facade
    desc: Empty PyPI test-package facade
    crit: suspicious
    conf: 0.9
    for: [python, pkginfo, text, archives, zip]
    all:
      - id: pypi-empty-skeleton-sparse-metadata
      - id: test-package-readme
    scope: archive
  - id: pypi-empty-skeleton-lowest-version
    desc: Tiny PyPI skeleton package at initial placeholder version
    crit: suspicious
    conf: 0.9
    for: [pkginfo, archives, zip]
    all:
      - id: pypi-empty-skeleton-sparse-metadata
      - id: objectives/supply-chain/metadata-anomaly/versioning::pkginfo-lowest-version
    scope: archive
