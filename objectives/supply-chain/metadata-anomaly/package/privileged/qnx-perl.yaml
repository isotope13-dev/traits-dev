defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1036

traits:
  - id: qnx-perl-hidden-package-dir
    desc: QNX Perl hidden package dir
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .qnx_pkg

  - id: qnx-perl-suid-package-mode
    desc: QNX Perl suid package mode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: mode="04755"

  - id: qnx-perl-dash-symlink-meta
    desc: QNX Perl dash symlink meta
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: symlink="/bin/dash"

composite_rules:
  - id: qnx-perl-suid-package-metadata
    desc: QNX Perl suid package metadata
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-hidden-package-dir
      - id: qnx-perl-suid-package-mode
      - id: qnx-perl-dash-symlink-meta
