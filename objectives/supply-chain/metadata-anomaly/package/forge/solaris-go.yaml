defaults:
  platforms: [solaris, unix]
  for: [go, elf]
  attack: T1036.005

traits:
  - id: go-solaris-repo-meta-dir
    desc: Go Solaris repo metadata dir
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.repo_meta

  - id: go-solaris-fake-pkg-catalog
    desc: Go Solaris fake pkg catalog
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'pkg\.fmri[\s\S]{0,220}pkg://solaris/'

  - id: go-fake-module-checksums
    desc: Go fake module checksums
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: FAKEHASH

  - id: go-elf-metadata-anomaly-func
    desc: Go ELF metadata anomaly function
    crit: suspicious
    conf: 0.88
    for: [elf]
    if:
      type: text
      substr: main.injectMetadataAnomaly

composite_rules:
  - id: go-solaris-package-metadata-forge
    desc: Go Solaris package metadata forge
    crit: hostile
    conf: 0.98
    all:
      - id: go-solaris-repo-meta-dir
    any:
      - id: go-solaris-fake-pkg-catalog
      - id: go-fake-module-checksums
      - id: go-elf-metadata-anomaly-func
