defaults:
  platforms:
    - unix
    - windows
  for:
    - package.json
traits:
  - id: js-test-basename-a
    desc: JS test basename pattern
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: basename
      regex: test[-_].{0,220}\.[jt]s$|.{0,220}[-_]test\.[jt]s$
  - id: js-test-basename-b
    desc: JS spec basename pattern
    crit: baseline
    conf: 0.9
    for:
      - javascript
    if:
      type: basename
      regex: .{0,220}\.spec\.[jt]s$
  - id: tabby-builtin-keyword
    desc: Tabby builtin plugin keyword
    crit: baseline
    conf: 0.9
    if:
      type: kv
      path: keywords
      exact: tabby-builtin-plugin
  - id: playwright-test-plugin-fixture
    desc: Playwright test plugin package fixture
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: '"name": "playwright-test-plugin"'
  # Universal JS export/import idioms — component only. These feed
  # `has-exports-comp` / `dangerous-requires` composites, which surface
  # the real signal at notable. Standalone they fire on every benign file.
  - id: module-exports-pattern
    desc: CommonJS module.exports pattern
    crit: component
    conf: 0.8
    for:
      - javascript
    if:
      type: ast
      kind: assignment
      exact: module.exports
  - id: exports-dot-pattern
    desc: CommonJS exports.{0,50} pattern
    crit: component
    conf: 0.8
    for:
      - javascript
    if:
      type: ast
      kind: assignment
      exact: exports.
  - id: esm-export-pattern-key
    desc: ESM export statement
    crit: component
    conf: 0.8
    for:
      - javascript
    if:
      type: ast
      node: export_statement
      exact: export
  - id: require-os-dup
    desc: require('os') import
    crit: component
    conf: 0.7
    for:
      - javascript
    if:
      type: ast
      kind: import
      exact: os
  - id: package-resolved-field
    desc: Reads package ___resolved field
    crit: notable
    conf: 0.85
    for:
      - javascript
    if:
      type: text
      substr: .___resolved
  - id: querystring-msg-field
    desc: URL-encodes msg field for POST
    crit: notable
    conf: 0.85
    for:
      - javascript
    if:
      type: text
      regex: 'querystring\.stringify\s*\(\s*\{\s*msg\s*:'
  - id: dirname-tracking-field
    desc: Includes __dirname in tracking data
    crit: notable
    conf: 0.8
    for:
      - javascript
    if:
      type: text
      regex: \bc\s*:\s*__dirname\b
  - id: npm-init-default-test
    desc: Default npm init test script
    crit: component
    conf: 0.95
    if:
      type: kv
      path: scripts.test
      substr: "no test specified"
  - id: test-fixture-package-json-path
    desc: package.json under test fixture path
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: (^|[\\/])tests?.{0,80}(fixtures|components).{0,80}package\.json$
  - id: npm-init-default-license
    desc: Default npm init ISC license
    crit: baseline
    conf: 0.95
    if:
      type: kv
      path: license
      exact: ISC
  - id: pkg-version-001
    desc: Package version 0.0.1 (brand new)
    crit: notable
    conf: 0.6
    if:
      type: kv
      path: version
      exact: 0.0.1
    unless:
      - type: kv
        path: name
        exact: concat-map
  - id: child-dot-unref
    desc: child.unref() call (orphan process)
    crit: notable
    conf: 0.75
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: \b(child|proc|process)\w*\.unref\(\)
    unless:
      - id: metadata/package/testing/harness::browser-benchmark-harness
  - id: spawn-unref
    desc: spawn().unref() call (orphan process)
    crit: notable
    conf: 0.75
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: spawn\(.{1,220}\)\.unref\(\)
  - id: stdio-ignore-array
    desc: 'stdio: [...ignore...] pattern'
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: stdio:\s*\[.{0,50}ignore
  - id: small-file-5k
    desc: Small file under 5KB
    crit: component
    conf: 0.7
    for:
      - javascript
    size_max: 5120
    unless:
      - id: js-test-basename-a
      - id: js-test-basename-b
      - id: metadata/package/testing/harness::go-test
  - id: placeholder-author-your-name
    desc: Author field is "Your Name"
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: author
      exact: Your Name
  - id: pkg-no-description-short
    desc: Very short/empty description
    crit: notable
    conf: 0.7
    unless:
      - type: kv
        path: description
        exact: Tabby core
    if:
      type: kv
      path: description
      regex: ^.{0,15}$
  - id: pkg-junk-meme-description-laugh
    desc: Description is a laugh meme string (hehe/haha/hihi)
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: kv
      path: description
      regex: ^(hehe|haha|hihi|huhu)$
      case_insensitive: true
  - id: pkg-junk-meme-description-slang
    desc: Description is internet slang (lol/lmao/yolo/xd)
    crit: suspicious
    conf: 0.88
    attack: T1195.002
    if:
      type: kv
      path: description
      regex: ^(lol|lmao|yolo|xd)$
      case_insensitive: true
  - id: pkg-junk-meme-description-keyboard
    desc: Description is keyboard mashing (asdf/qwerty)
    crit: suspicious
    conf: 0.88
    attack: T1195.002
    if:
      type: kv
      path: description
      regex: ^(asdf|qwerty|aaaa|zzzz)$
      case_insensitive: true
  - id: desc-auto-generated
    desc: Description says package is auto-generated
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    count_min: 1
    if:
      id: objectives/supply-chain/metadata-anomaly/package-code/npm::desc-auto-generated
  - id: keywords-single-entry
    desc: Keywords array has exactly one entry
    crit: notable
    conf: 0.7
    if:
      type: kv
      path: keywords
      size_min: 1
      size_max: 1
    unless:
      - id: tabby-builtin-keyword
  - id: pkg-main-resp-path
    desc: Main uses resp/ directory
    crit: notable
    conf: 0.7
    count_min: 1
    if:
      id: objectives/supply-chain/metadata-anomaly/package-code/npm::pkg-main-resp-path
  - id: cdn-keyword-jsdelivr
    desc: jsdelivr keyword
    crit: notable
    conf: 0.6
    if:
      type: kv
      path: keywords
      exact: jsdelivr
  - id: cdn-keyword-cdn
    desc: cdn keyword
    crit: notable
    conf: 0.6
    if:
      type: kv
      path: keywords
      exact: cdn
  - id: browser-keyword
    desc: browser keyword
    crit: notable
    conf: 0.6
    if:
      type: kv
      path: keywords
      exact: browser
  - id: html-keyword
    desc: html keyword
    crit: notable
    conf: 0.6
    if:
      type: kv
      path: keywords
      exact: html
  - id: desc-public-cdn-html
    desc: Description claims public CDN HTML page
    crit: suspicious
    conf: 0.92
    if:
      type: kv
      path: description
      regex: static html page.{0,20}public cdn
      case_insensitive: true
  - id: files-index-favicon-only
    desc: Package publishes only index and favicon
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '"files"\s*:\s*\[\s*"index\.html"\s*,\s*"favicon\.ico"\s*\]'
  - id: cdn-keyword-cloudflare
    desc: cloudflare keyword
    crit: notable
    conf: 0.6
    if:
      type: kv
      path: keywords
      exact: cloudflare
  - id: cdn-keyword-unpkg
    desc: unpkg keyword
    crit: notable
    conf: 0.6
    if:
      type: kv
      path: keywords
      exact: unpkg
  - id: template-keyword
    desc: Template keyword in package
    crit: notable
    conf: 0.5
    if:
      type: kv
      path: keywords
      exact: template
  - id: desc-attack-technique-a
    desc: Description names attack technique (ssrf/xss/rce/lfi)
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: kv
      path: "description"
      regex: ^(ssrf|xss|rce|lfi)$
      case_insensitive: true
  - id: desc-attack-technique-b
    desc: Description names attack technique (rfi/sqli/idor/ssti)
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: kv
      path: "description"
      regex: ^(rfi|sqli|idor|ssti)$
      case_insensitive: true
  - id: desc-attack-technique-c
    desc: Description names attack technique (xxe/csrf)
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: kv
      path: "description"
      regex: ^(xxe|csrf)$
      case_insensitive: true
  - id: main-html-entry
    desc: Package main entry points to HTML file
    crit: notable
    conf: 0.85
    attack: T1195.002
    if:
      type: kv
      path: "main"
      regex: \.(html|htm)$
      case_insensitive: true
  - id: test-script-trivial-shell-a
    desc: Trivial test script (ls/true/echo/pwd)
    crit: component
    conf: 0.85
    if:
      type: kv
      path: "scripts.test"
      regex: ^(ls|true|echo|pwd)(\s.{0,80})?$
      case_insensitive: true
  - id: test-script-trivial-shell-b
    desc: Trivial test script (cat/date/whoami)
    crit: component
    conf: 0.85
    if:
      type: kv
      path: "scripts.test"
      regex: ^(cat|date|whoami)(\s.{0,80})?$
      case_insensitive: true
  - id: desc-dependency-confusion
    desc: Description mentions dependency confusion
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: description
      regex: dependency\s*confusion
      case_insensitive: true
  - id: desc-dependency-resolution-verify
    desc: Description mentions dependency resolution verification
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: description
      regex: dependency\s+resolution\s+verif
      case_insensitive: true
  - id: desc-passive-poc
    desc: Description mentions passive PoC
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: description
      substr: "passive PoC"
  - id: desc-placeholder-package
    desc: Description mentions placeholder package
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: description
      substr: placeholder
      case_insensitive: true
  - id: desc-prevent-squat-1
    desc: Description claims to prevent squatting (prevent/protect)
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: description
      regex: (prevent|protect).{0,100}(squat|confusion|typo)
      case_insensitive: true
  - id: desc-prevent-squat-2
    desc: Description claims to prevent squatting (reserve/claim)
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: description
      regex: (reserve|claim).{0,100}(squat|confusion|typo)
      case_insensitive: true
  - id: scoped-typosquat-1
    desc: Scoped typosquat pattern 1
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '"name":\s*"@[^/]{1,80}/(react|vue|angular)'
  - id: scoped-typosquat-2
    desc: Scoped typosquat pattern 2
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '"name":\s*"@[^/]{1,80}/(express|lodash|axios)'
  - id: js-placeholder-announcement-1a
    desc: Code announces placeholder/fake package (pkg)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (placeholder|fake|demo).{0,30}package
      case_insensitive: true
  - id: js-placeholder-announcement-1b
    desc: Code announces placeholder/fake package (module)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (placeholder|fake|demo).{0,30}module
      case_insensitive: true
  - id: js-placeholder-announcement-2
    desc: Code announces placeholder/fake package (npm)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (placeholder|fake|demo).{0,30}npm
      case_insensitive: true
  - id: js-placeholder-announcement-3
    desc: Code mentions "do not use"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: do\s+not\s+use
      case_insensitive: true
  - id: bug-bounty-marker-1
    desc: Bug bounty marker 1
    crit: notable
    conf: 0.75
    if:
      type: text
      case_insensitive: true
      regex: bug\s*bounty|hackerone|bugcrowd
  - id: bug-bounty-marker-2
    desc: Bug bounty marker 2
    crit: notable
    conf: 0.75
    if:
      type: text
      case_insensitive: true
      regex: proof\s*of\s*concept|\bPoC\b
  - id: local-stealer-import-1
    desc: Local stealer import pattern 1
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (from|require\()\s*\./stealer
  - id: local-stealer-import-2
    desc: Local stealer import pattern 2
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (from|require\()\s*\./(logger|exfil)
  - id: license-unlicensed
    desc: Package is UNLICENSED on public registry
    crit: notable
    conf: 0.72
    attack: T1195.002
    if:
      type: kv
      path: license
      exact: UNLICENSED
  - id: zero-byte-js-entry
    desc: Zero-byte JavaScript main entry file
    crit: suspicious
    conf: 0.90
    attack: T1195.002
    for: [javascript]
    size_max: 0
    if:
      id: objectives/supply-chain/metadata-anomaly/package-code/npm::zero-byte-js-entry
  - id: author-corp-email-dropbox
    desc: Author uses Dropbox corporate email
    crit: notable
    conf: 0.72
    attack: T1195.002
    if:
      type: kv
      path: author
      substr: "@dropbox.com"
composite_rules:
  - id: npm-install-tracking-object
    desc: NPM hook builds install tracking object
    crit: suspicious
    conf: 0.93
    attack: T1082
    for:
      - javascript
    all:
      - id: micro-behaviors/data/serialize/json::json-stringify-call
      - id: objectives/discovery/system/fingerprint/hardware::node-dirname
      - id: micro-behaviors/fs/file/read::require-local-package-json
    any:
      - id: querystring-msg-field
      - id: package-resolved-field
      - id: dirname-tracking-field
    needs: 2
  - id: npm-node-host-metadata-exfil
    desc: NPM hook exfiltrates host package metadata
    crit: hostile
    conf: 0.99
    mbc: E1041
    attack: T1041
    for:
      - javascript
    all:
      - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
      - id: objectives/discovery/system/fingerprint/hardware::os-homedir-call
      - id: micro-behaviors/communications/dns/lookup::require-dns
      - id: micro-behaviors/fs/file/read::require-local-package-json
      - id: micro-behaviors/communications/http/request::https-request
      - id: micro-behaviors/communications/http/post::post-form
    any:
      - id: objectives/exfiltration/oob::pipedream
      - id: querystring-msg-field
      - id: package-resolved-field
      - id: npm-install-tracking-object
    needs: 2
  - id: local-stealer-import
    desc: Imports local stealer module
    crit: suspicious
    conf: 0.8
    for:
      - javascript
      - typescript
    any:
      - id: local-stealer-import-1
      - id: local-stealer-import-2
  - id: bug-bounty-marker
    desc: Bug bounty or security research
    crit: notable
    conf: 0.9
    for:
      - javascript
      - package.json
    any:
      - id: bug-bounty-marker-1
      - id: bug-bounty-marker-2
  - id: scoped-typosquat
    desc: Scoped package mimicking well-known package
    crit: suspicious
    conf: 0.85
    any:
      - id: scoped-typosquat-1
      - id: scoped-typosquat-2
  - id: placeholder-author-generic-1-comp
    desc: Author field contains generic placeholder (set 1)
    crit: notable
    conf: 0.7
    any:
      - id: objectives/supply-chain/metadata-anomaly/package-code/npm::placeholder-author-generic-1a-dup
      - id: objectives/supply-chain/metadata-anomaly/package-code/npm::placeholder-author-generic-1b-dup
  - id: placeholder-author-generic-2-comp
    desc: Author field contains generic placeholder (set 2)
    crit: notable
    conf: 0.7
    any:
      - id: objectives/supply-chain/metadata-anomaly/package-code/npm::placeholder-author-generic-2a-dup
      - id: objectives/supply-chain/metadata-anomaly/package-code/npm::placeholder-author-generic-2b-dup
  - id: placeholder-author-generic-comp
    desc: Author field contains generic placeholder
    crit: notable
    conf: 0.75
    any:
      - id: objectives/supply-chain/metadata-anomaly/markers::placeholder-author-generic-1
      - id: objectives/supply-chain/metadata-anomaly/markers::placeholder-author-generic-2
  - id: js-placeholder-announcement-1
    desc: Code announces placeholder or fake package (set 1)
    crit: notable
    conf: 0.7
    any:
      - id: js-placeholder-announcement-1a
      - id: js-placeholder-announcement-1b
  - id: js-placeholder-announcement
    desc: Code announces placeholder or fake package
    crit: suspicious
    conf: 0.85
    mbc: B0024
    attack: T1195.002
    any:
      - id: js-placeholder-announcement-1
      - id: js-placeholder-announcement-2
      - id: js-placeholder-announcement-3
  - id: desc-prevent-squat
    desc: Description claims to prevent squatting
    crit: notable
    conf: 0.75
    any:
      - id: desc-prevent-squat-1
      - id: desc-prevent-squat-2
  - id: cdn-keyword-facade
    desc: CDN-related keywords
    crit: notable
    conf: 0.6
    any:
      - id: cdn-keyword-jsdelivr
      - id: cdn-keyword-cdn
      - id: cdn-keyword-cloudflare
      - id: cdn-keyword-unpkg
  - id: static-html-cdn-keywords
    desc: Static HTML browser facade keywords
    crit: suspicious
    conf: 0.82
    needs: 2
    any:
      - id: cdn-keyword-cdn
      - id: browser-keyword
      - id: html-keyword
  - id: public-cdn-html-facade
    desc: Public CDN HTML facade package
    crit: suspicious
    conf: 0.95
    attack: T1195.002
    all:
      - id: main-html-entry
      - id: desc-public-cdn-html
      - id: files-index-favicon-only
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-no-deps-at-all
      - id: objectives/supply-chain/recon-exfil::public-access-config
    any:
      - id: static-html-cdn-keywords
      - id: objectives/supply-chain/metadata-anomaly/manifest::desc-lightweight
  - id: npm-data-exfil
    desc: NPM package exfiltrates system info via HTTP
    crit: notable
    conf: 0.95
    attack: T1020
    mbc: E1041
    all:
      - id: micro-behaviors/communications/http/post::post
      - id: small-file-5k
    any:
      - id: objectives/discovery/system/fingerprint/hardware::js-sysinfo-multi
      - id: objectives/discovery/system/fingerprint/hardware::process-fingerprint-multi
  - id: npm-victim-exfil
    desc: NPM package sends victim ID via HTTP POST
    crit: notable
    conf: 0.92
    attack: T1020
    mbc: E1041
    all:
      - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
      - id: micro-behaviors/communications/http/post::post
      - id: small-file-5k
  - id: has-exports-comp
    desc: Module has exports
    crit: notable
    conf: 0.8
    for:
      - javascript
    any:
      - id: module-exports-pattern
      - id: exports-dot-pattern
      - id: esm-export-pattern-key
  - id: dangerous-requires
    desc: Dangerous Node.js API imports
    crit: notable
    conf: 0.8
    for:
      - javascript
    needs: 3
    any:
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::require-os-dup
      - id: metadata/import/builtin/node::require-child-process
      - id: objectives/supply-chain/metadata-anomaly/package-code/npm::require-https-dup
      - id: metadata/import/builtin/node::require-fs
  - id: single-file-dangerous
    desc: Tiny npm package using dangerous
    crit: suspicious
    conf: 0.85
    for:
      - javascript
    all:
      - id: small-file-5k
      - id: dangerous-requires
    downgrade:
      any:
        - id: metadata/package/testing/presence::test-fixtures
  - id: no-deps-with-hooks
    desc: Package has install hooks but
    crit: notable
    conf: 0.85
    all:
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-no-deps-at-all
    unless:
      - id: metadata/package/fields::has-bin-field
      - id: metadata/package/fields::is-private
  - id: multiple-hooks
    desc: Package has multiple install lifecycle
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: metadata/package/fields::has-preinstall-script
      - id: objectives/supply-chain/metadata-anomaly/manifest::postinstall-hook-key
      - id: objectives/supply-chain/install-hook/scripts::has-install
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest::npm-has-repository
  - id: new-version-hooks
    desc: Brand new version (0.0.1) with
    crit: suspicious
    conf: 0.8
    all:
      - id: pkg-version-001
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
  - id: missing-metadata-hooks
    desc: Package missing standard metadata but
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest::repository-key
      - id: metadata/package/fields::has-bin-field
      - id: metadata/package/fields::is-private
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-monorepo-workspace-dep
      - id: objectives/supply-chain/metadata-anomaly/manifest::tabby-builtin-plugin-keyword
    downgrade:
      any:
        - id: metadata/package/fields::pkg-skeleton-small
  - id: child-unref
    desc: Orphan child process (unref pattern)
    crit: suspicious
    conf: 0.85
    for:
      - javascript
      - typescript
    any:
      - id: child-dot-unref
      - id: spawn-unref
  - id: stdio-ignore-comp
    desc: Silent process execution (stdio ignored)
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: stdio-ignore-array
  - id: multi-oob
    desc: Multiple OOB exfiltration endpoints
    crit: suspicious
    conf: 0.9
    for:
      - javascript
      - typescript
      - package.json
    needs: 2
    any:
      - id: objectives/exfiltration/oob/
      - id: objectives/discovery/network/ip-tracker/
      - id: objectives/exfiltration/oob/shortener/
