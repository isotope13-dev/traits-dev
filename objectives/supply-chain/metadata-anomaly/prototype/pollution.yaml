# Generic Exploitation Terminology
# Detects terms related to exploitation and vulnerability research
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
composite_rules:
  - id: js-proto-pollution-gadget
    desc: Prototype pollution gadget without guards
    crit: notable
    conf: 0.9
    attack: "T1195.002"
    near_lines: 20
    all:
      - id: micro-behaviors/data/source/prototype::js-path-split
      - id: micro-behaviors/data/source/prototype::js-dynamic-key-create
    unless:
      - id: micro-behaviors/data/source/prototype::js-proto-pollution-guard
      - id: metadata/library/structure::js-emscripten-generated-bundle
