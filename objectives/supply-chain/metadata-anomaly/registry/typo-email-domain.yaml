# Detects npm/PyPI/registry metadata where author or maintainer email domain is
# a well-known typosquat of a major free webmail provider (gamil.com, gnail.com,
# hotmial.com, outlok.com, etc.). Real publishers don't host on these domains —
# they exist only because attackers register them to look like gmail/hotmail/
# outlook for throwaway accounts. Pairs with `registry-metadata-json` to keep
# precision tight.
defaults:
  for: [pkginfo, package.json]
  platforms: [unix, windows]
  attack: T1195.002
traits:
  - id: typo-email-gmail-domain
    desc: Author/maintainer email uses gmail typosquat domain
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '"email"\s*:\s*"[^"\n]{1,80}@(gamil|gmial|gmaill|gnail|gmal|gmali|gemail)\.com"'
      case_insensitive: true
  - id: typo-email-hotmail-domain
    desc: Author/maintainer email uses hotmail typosquat domain
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '"email"\s*:\s*"[^"\n]{1,80}@(hotmial|hotmali|hotnail|hotmal|hotmaill)\.com"'
      case_insensitive: true
  - id: typo-email-outlook-domain
    desc: Author/maintainer email uses outlook typosquat domain
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '"email"\s*:\s*"[^"\n]{1,80}@(outlok|outloook|outloook|outllook|outlock)\.com"'
      case_insensitive: true
  - id: typo-email-yahoo-domain
    desc: Author/maintainer email uses yahoo typosquat domain
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '"email"\s*:\s*"[^"\n]{1,80}@(yaho|yhoo|yahooo|yhao)\.com"'
      case_insensitive: true
composite_rules:
  - id: registry-typo-email-domain
    desc: Registry metadata uses typosquatted webmail domain
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
    any:
      - id: typo-email-gmail-domain
      - id: typo-email-hotmail-domain
      - id: typo-email-outlook-domain
      - id: typo-email-yahoo-domain
