# Detects npm/PyPI/registry metadata where author or maintainer email domain is
# a well-known typosquat of a major free webmail provider (gamil.com, gnail.com,
# hotmial.com, outlok.com, etc.). Real publishers don't host on these domains —
# they exist only because attackers register them to look like gmail/hotmail/
# outlook for throwaway accounts. Pairs with `registry-metadata-json` to keep
# precision tight.
defaults:
  for: [pkginfo, package.json]
  platforms: [unix, windows]
  attack: T1195.002
traits:
- id: typo-email-gmail-domain--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(gamil|gmial)\.com"'
    case_insensitive: true
- id: typo-email-gmail-domain--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(gmaill|gnail)\.com"'
    case_insensitive: true
- id: typo-email-gmail-domain--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(gmal|gmali)\.com"'
    case_insensitive: true
- id: typo-email-gmail-domain--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(gemail)\.com"'
    case_insensitive: true
- id: typo-email-hotmail-domain--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(hotmial|hotmali)\.com"'
    case_insensitive: true
- id: typo-email-hotmail-domain--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(hotnail|hotmal)\.com"'
    case_insensitive: true
- id: typo-email-hotmail-domain--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(hotmaill)\.com"'
    case_insensitive: true
- id: typo-email-outlook-domain--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(outlok|outloook)\.com"'
    case_insensitive: true
- id: typo-email-outlook-domain--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(outloook|outllook)\.com"'
    case_insensitive: true
- id: typo-email-outlook-domain--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(outlock)\.com"'
    case_insensitive: true
- id: typo-email-yahoo-domain
  desc: Author/maintainer email uses yahoo typosquat domain
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '"email"\s*:\s*"[^"\n]{1,80}@(yaho|yhoo|yahooo|yhao)\.com"'
    case_insensitive: true
composite_rules:
- id: registry-typo-email-domain
  desc: Registry metadata uses typosquatted webmail domain
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
  any:
  - id: typo-email-gmail-domain
  - id: typo-email-hotmail-domain
  - id: typo-email-outlook-domain
  - id: typo-email-yahoo-domain
- id: typo-email-gmail-domain
  desc: Author/maintainer email uses gmail typosquat domain
  crit: suspicious
  conf: 0.94
  any:
  - id: typo-email-gmail-domain--rx-1
  - id: typo-email-gmail-domain--rx-2
  - id: typo-email-gmail-domain--rx-3
  - id: typo-email-gmail-domain--rx-4
  needs: 1
- id: typo-email-hotmail-domain
  desc: Author/maintainer email uses hotmail typosquat domain
  crit: suspicious
  conf: 0.94
  any:
  - id: typo-email-hotmail-domain--rx-5
  - id: typo-email-hotmail-domain--rx-6
  - id: typo-email-hotmail-domain--rx-7
  needs: 1
- id: typo-email-outlook-domain
  desc: Author/maintainer email uses outlook typosquat domain
  crit: suspicious
  conf: 0.94
  any:
  - id: typo-email-outlook-domain--rx-8
  - id: typo-email-outlook-domain--rx-9
  - id: typo-email-outlook-domain--rx-10
  needs: 1
