defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [manifests]
traits:
  - id: versioned-dist-tags-latest
    desc: Registry metadata has dist-tags latest field
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: "\"dist-tags\"\\s*:\\s*\\{\\s*\"latest\""
  - id: versioned-empty-author
    desc: Registry metadata has empty author field
    crit: notable
    conf: 0.82
    attack: "T1195.002"
    if:
      type: raw
      substr: "\"author\": \"\""
  - id: versioned-dist-bloated-unpacked
    desc: Registry package has bloated unpacked size
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "\"unpackedSize\"\\s*:\\s*[5-9][0-9]{4}\\b"
  - id: versioned-empty-readme-filename
    desc: Registry metadata keeps empty readme filename
    crit: notable
    conf: 0.86
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"readmeFilename\"\\s*:\\s*\"\""
composite_rules:
  - id: registry-package-takeover
    desc: Registry metadata shows package takeover indicators
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
      - id: versioned-dist-tags-latest
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-dist-tarball-url
    any:
      - id: versioned-empty-author
      - id: versioned-dist-bloated-unpacked
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-readme-error
      - id: versioned-empty-readme-filename
    needs: 1
