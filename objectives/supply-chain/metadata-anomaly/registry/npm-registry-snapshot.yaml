defaults:
  for: [binaries, scripts, source, manifests, documents, media, data]
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: registry-metadata-json
    desc: npm registry metadata filename
    crit: component
    conf: 0.7
    if:
      type: basename
      regex: "^(meta|metadata)\\.json(\\.zst)?$"
  - id: package-info-sidecar-json
    desc: npm package_info sidecar JSON filename
    crit: component
    conf: 0.8
    if:
      type: basename
      regex: "^package_info-[^/]{1,120}\\.json$"
  - id: package-info-basename
    desc: npm package_info sidecar basename
    crit: component
    conf: 0.8
    if:
      type: basename
      regex: "^package_info-"
  - id: versioned-maintainer-npm-prefix-email
    desc: Maintainer email impersonates npm@ address
    crit: suspicious
    conf: 0.88
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"email\"\\s*:\\s*\"npm@[a-z0-9][a-z0-9.-]{3,60}\""
  - id: versioned-preinstall-hook
    desc: Registry metadata has preinstall hook
    crit: component
    conf: 0.88
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"preinstall\"\\s*:\\s*\""
  - id: versioned-postinstall-hook-raw
    desc: Registry metadata raw postinstall hook
    crit: component
    conf: 0.88
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\""
  - id: versioned-install-hook
    desc: Registry metadata has install hook
    crit: notable
    conf: 0.88

    attack: "T1195.002"
    if:
      type: raw
      regex: "\"install\"\\s*:\\s*\""
  - id: versioned-preupdate-hook
    desc: Registry metadata has preupdate hook
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"preupdate\"\\s*:\\s*\""
  - id: versioned-test-hook
    desc: Registry metadata has test hook
    crit: component
    conf: 0.82
    if:
      type: raw
      regex: "\"test\"\\s*:\\s*\""
  - id: versioned-preinstall-node-entry
    desc: preinstall runs node local script
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: "\"preinstall\"\\s*:\\s*\"node\\s+[^\"\\n]{1,80}\\.(m|c)?js(\\s+>\\s*/dev/null(\\s+2>&1)?)?\""
  - id: versioned-postinstall-node-entry
    desc: postinstall runs node local script (.js)
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\"node\\s+[^\"\\n]{1,80}\\.js(\\s+>\\s*/dev/null(\\s+2>&1)?)?\""
  - id: versioned-postinstall-mjs-entry
    desc: postinstall runs node ESM script (.mjs/.cjs)
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\"node\\s+[^\"\\n]{1,60}\\.(mjs|cjs)\""
  - id: versioned-install-node-entry
    desc: install runs node local script
    crit: notable
    conf: 0.93

    attack: "T1195.002"
    if:
      type: raw
      regex: "\"install\"\\s*:\\s*\"node\\s+[^\"\\n]{1,80}\\.(m|c)?js(\\s+>\\s*/dev/null(\\s+2>&1)?)?\""
  - id: versioned-postinstall-node-index
    desc: postinstall runs node index entry
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\"node\\s+index\\.js(\\s+>\\s*/dev/null(\\s+2>&1)?)?\""
  - id: versioned-lifecycle-node-e
    desc: Lifecycle hook runs node -e
    crit: suspicious
    conf: 0.96
    attack: "T1059.007"
    if:
      type: raw
      regex: "\"(preinstall|preupdate|test)\"\\s*:\\s*\"node\\s+-e\\s+\\\\?\""
  - id: versioned-lifecycle-child-process-exec
    desc: Lifecycle hook uses child_process exec
    crit: suspicious
    conf: 0.95
    attack: "T1059.007"
    if:
      type: raw
      regex: "child_process.{0,32}\\.exec\\("
  - id: versioned-lifecycle-recon-chain
    desc: Lifecycle hook runs whoami hostname pwd ls
    crit: suspicious
    conf: 0.98
    attack: "T1082"
    if:
      type: raw
      regex: "whoami\\s*&&\\s*hostname\\s*&&\\s*pwd\\s*&&\\s*ls"
  - id: versioned-lifecycle-wget-quiet
    desc: Lifecycle hook uses quiet wget (external IP)
    crit: suspicious
    conf: 0.94
    attack: "T1041"
    if:
      type: raw
      regex: "wget\\s+--quiet\\s+\"?https?://[0-9]{1,3}(\\.[0-9]{1,3}){3}"
      is: external_ip
  - id: versioned-lifecycle-wget-quiet-any
    desc: Lifecycle hook uses quiet wget
    crit: notable
    conf: 0.88
    attack: "T1041"
    if:
      type: raw
      regex: "\"(preinstall|preupdate|test)\"\\s*:\\s*\"wget\\s+--quiet\\s"
  - id: versioned-http-ip-url
    desc: Registry tarball uses external IP URL
    crit: suspicious
    conf: 0.95
    attack: "T1071.001"
    if:
      type: kv
      path: "dist.tarball"
      regex: "https?://[0-9]{1,3}(\\.[0-9]{1,3}){3}(:[0-9]{2,5})?"
  - id: versioned-shell-param-exfil
    desc: Lifecycle hook exfiltrates shell params
    crit: suspicious
    conf: 0.94
    attack: "T1041"
    if:
      type: raw
      regex: "token=\\$\\(whoami\\)"
  - id: versioned-uri-query-exfil
    desc: Lifecycle hook exfiltrates encoded output
    crit: suspicious
    conf: 0.95
    attack: "T1041"
    if:
      type: raw
      regex: "\\?data=['\"]?\\+encodeURIComponent\\("
  - id: versioned-hackerbot-author
    desc: Registry metadata author is hackerbot
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: "\"author\"\\s*:\\s*\\{\\s*\"name\"\\s*:\\s*\"hackerbot\"\\s*\\}|\"author\"\\s*:\\s*\"hackerbot\""
  - id: versioned-fayoum-maintainer
    desc: Registry metadata references Fayoum maintainer
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: "am4171@fayoum\\.edu\\.eg"
  - id: versioned-dist-minimal-filecount
    desc: Registry package ships one-two files
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: "\"fileCount\"\\s*:\\s*[12]\\b"
  - id: versioned-dist-very-small-filecount
    desc: Registry package ships three-four files
    crit: notable
    conf: 0.8

    if:
      type: raw
      regex: "\"fileCount\"\\s*:\\s*[34]\\b"
  - id: versioned-readme-eval-disclosure
    desc: Registry README discloses eval execution
    crit: suspicious
    conf: 0.97
    attack: "T1059.007"
    if:
      type: raw
      regex: '"readme":\s*"[^"]{0,400}uses eval\(\)[^"]{0,220}execute received code'
      case_insensitive: true
  - id: versioned-readme-trusted-endpoint-warning
    desc: Registry README warns to trust endpoint
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: raw
      regex: '"readme":\s*"[^"]{0,500}Only use trusted grid endpoints'
      case_insensitive: true
  - id: versioned-readme-custom-vercel-endpoint
    desc: Registry README embeds Vercel grid endpoint
    crit: notable
    conf: 0.9
    attack: "T1071.001"
    if:
      type: raw
      regex: '"readme":\s*"[^"]{0,900}ip-api-check-nine\.vercel\.app/icons/'
  - id: versioned-dist-tarball-url
    desc: Registry metadata has tarball URL
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: "\"tarball\": \"https://registry.npmjs.org/"
  - id: versioned-install-output-suppression
    desc: Install hook suppresses output to /dev/null
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"(pre|post)?install\"\\s*:\\s*\"[^\"]{0,120}>\\s*/dev/null(\\s+2>&1)?"
  - id: versioned-readme-error
    desc: Registry metadata has broken README
    crit: notable
    conf: 0.75
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"readme\"\\s*:\\s*\"ERROR:"
  - id: versioned-hostile-hijack-description
    desc: Registry description declares hijack
    crit: suspicious
    conf: 0.97
    attack: "T1195.002"
    if:
      type: raw
      substr: "\"description\": \"Hijack by "
  - id: versioned-malicious-deprecation
    desc: Registry metadata marks malicious version
    crit: suspicious
    conf: 0.99
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"deprecated\"\\s*:\\s*\"[^\"]{0,160}malicious[^\"]{0,160}(don't use|do not use)"
  - id: versioned-from-tmp-path
    desc: Registry package published from tmp directory
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"_from\"\\s*:\\s*\"file:/tmp/[^\"]{5,80}\\.tgz\""
  - id: versioned-resolved-tmp-path
    desc: Registry package resolved from tmp directory
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"_resolved\"\\s*:\\s*\"/tmp/[^\"]{5,80}\\.tgz\""
  - id: versioned-dist-multi-mb-unpacked
    desc: Registry package unpacks to multi-MB size
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: "\"unpackedSize\"\\s*:\\s*[1-9][0-9]{6,7}\\b"
  - id: versioned-dist-tiny-unpacked-size
    desc: Registry package unpacks under 4KB
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: "\"unpackedSize\"\\s*:\\s*([1-9][0-9]{0,2}|[1-3][0-9]{3}|40[0-8][0-9]|409[0-6])\\b"
  - id: versioned-empty-readme
    desc: Registry metadata has empty readme
    crit: notable
    conf: 0.78
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"readme\"\\s*:\\s*\"\""
  - id: versioned-protonmail-maintainer
    desc: Registry maintainer uses ProtonMail
    crit: component
    conf: 0.65
    if:
      type: raw
      regex: "@proton(mail)?\\.(com|ch|me)"
  - id: versioned-internal-utility-description
    desc: Registry metadata claims internal utility package
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: "\"description\"\\s*:\\s*\"[^\"]{0,40}internal utility package[^\"]{0,40}\""
      case_insensitive: true
  - id: versioned-maintainer-list-single
    desc: Registry metadata has single maintainer list
    crit: component
    conf: 0.7

    if:
      type: raw
      regex: "\"maintainers\"\\s*:\\s*\\[\\s*\\{[^\\]\\n]{1,320}\\}\\s*\\]"
  - id: versioned-maintainer-list-multi
    desc: Registry metadata has multi maintainer list
    crit: component
    conf: 0.72
    if:
      type: raw
      regex: "\"maintainers\"\\s*:\\s*\\[\\s*\\{[^\\]\\n]{1,320}\\}\\s*,\\s*\\{"
  - id: versioned-gibberish-maintainer-name
    desc: Maintainer name is consonant-heavy (likely generated)
    crit: notable
    conf: 0.78
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"name\":\\s*\"[a-z]{0,6}[b-df-hj-np-tv-z]{7,}[a-z]{0,6}\""
    unless:
      - type: raw
        regex: "\"type\"\\s*:\\s*\"rpm\"|\"osCpe\"\\s*:"
  - id: versioned-gibberish-email-local
    desc: Maintainer email local-part is consonant-heavy (likely generated)
    crit: notable
    conf: 0.78
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"email\":\\s*\"[a-z]{0,6}[b-df-hj-np-tv-z]{7,}[a-z]{0,6}@"
  - id: versioned-inflated-version-raw
    desc: Registry metadata version is inflated (9x.x.x)
    crit: notable
    conf: 0.82

    attack: "T1195.002"
    if:
      type: raw
      regex: "\"version\":\\s*\"9[0-9]\\.[0-9]"
  - id: versioned-inflated-version-100plus-raw
    desc: Registry metadata version 100+ major number
    crit: notable
    conf: 0.85

    attack: "T1195.002"
    if:
      type: raw
      regex: "\"version\":\\s*\"[1-9][0-9]{2,}\\."
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest::vscode-extension
  - id: versioned-inflated-minor-version-raw
    desc: Registry metadata version has inflated minor (x.9x.y)
    crit: notable
    conf: 0.75
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"version\":\\s*\"[0-9]+\\.9[0-9]\\."
  - id: versioned-install-hook-or-true
    desc: Install hook suppresses errors with || true
    crit: notable
    conf: 0.8

    attack: "T1195.002"
    if:
      type: raw
      substr: "|| true"
  - id: versioned-deceptive-analytics-hook
    desc: Install hook runs metrics/telemetry script
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"(pre|post)?install\"[^\\n]{0,100}node\\s+[./]{0,4}(metrics|telemetry)/"
  - id: versioned-deceptive-analytics-hook2
    desc: Install hook runs analytics/stats script
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"(pre|post)?install\"[^\\n]{0,100}node\\s+[./]{0,4}(analytics|stats)/"
  - id: versioned-obfuscator-prod-dep
    desc: javascript-obfuscator as production dependency
    crit: suspicious
    conf: 0.88
    attack: "T1027"
    if:
      type: raw
      substr: "\"javascript-obfuscator\""
  - id: versioned-obfuscator-build-script
    desc: Build script invokes javascript-obfuscator
    crit: notable
    conf: 0.82
    attack: "T1027"
    if:
      type: raw
      substr: "javascript-obfuscator ./dist"
  - id: versioned-internal-path-leak
    desc: Build script leaks internal path
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    if:
      type: raw
      regex: "cp .{1,60}/home/.{1,60}node_modules/"
  - id: versioned-repo-type-mismatch
    desc: Git repo URL points to gitbook
    crit: component
    conf: 0.72
    if:
      type: raw
      regex: "\"type\"\\s*:\\s*\"git\"\\s*,\\s*\"url\"\\s*:\\s*\"https://.{0,80}gitbook"
  - id: versioned-desc-poc-depconf
    desc: Registry description is dependency confusion PoC
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"description\"[^\"]{0,20}\"[^\"]{0,60}PoC.{0,40}[Dd]ependency [Cc]onfusion"
  - id: versioned-desc-scoped-pkg-target
    desc: Registry description names scoped package target
    crit: notable
    conf: 0.88
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"description\"[^\"]{0,20}\"[^\"]{0,120}@[a-z][a-z0-9-]{0,60}/[a-z]"
  - id: versioned-unscoped-depconf-squatter
    desc: Registry desc names depconf scoped target
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"description\"[^\"]{0,20}\"[^\"]{0,40}[Dd]ependency [Cc]onfusion[^\"]{0,60}@[a-z]"
  - id: versioned-postinstall-curl
    desc: Postinstall hook runs curl command
    crit: notable
    conf: 0.87
    attack: "T1041"
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\"curl\\s[^\"]{0,20}https?://"
  - id: versioned-postinstall-curl-oob-webhook
    desc: Postinstall curl to webhook/pipedream callback service
    crit: suspicious
    conf: 0.95
    attack: "T1041"
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\"curl\\s+https?://[^\"]{0,60}(webhook\\.site|pipedream\\.net)"
  - id: versioned-postinstall-curl-oob-oast
    desc: Postinstall curl to OAST/interactsh callback service
    crit: suspicious
    conf: 0.95
    attack: "T1041"
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\"curl\\s+https?://[^\"]{0,60}(oastify\\.com|interactsh\\.com)"
  - id: versioned-postinstall-curl-oob-misc
    desc: Postinstall curl to OOB canary/requestbin service
    crit: suspicious
    conf: 0.93
    attack: "T1041"
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\"curl\\s+https?://[^\"]{0,60}(requestbin\\.com|hookbin\\.com)"
  - id: versioned-postinstall-curl-oob-canary
    desc: Postinstall curl to canarytokens callback service
    crit: suspicious
    conf: 0.93
    attack: "T1041"
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\"curl\\s+https?://[^\"]{0,60}canarytokens\\.com"
  - id: versioned-internal-description-common
    desc: Registry description is generic internal placeholder
    crit: notable
    conf: 0.80
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"description\"\\s*:\\s*\"(internal|placeholder|test|poc)\""
      case_insensitive: true
  - id: versioned-internal-description-depconf
    desc: Registry description is dependency confusion test marker
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"description\"\\s*:\\s*\"(dep.?conf|private|internal package|internal module)\""
      case_insensitive: true
  - id: versioned-postinstall-both-versions
    desc: Registry postinstall and preinstall in versions
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"postinstall\"\\s*:[^}]{0,2000}\"preinstall\""
composite_rules:
  - id: versioned-postinstall-hook
    desc: Registry metadata has postinstall hook
    crit: notable
    conf: 0.88
    attack: "T1195.002"
    all:
      - id: registry-metadata-json
      - id: versioned-postinstall-hook-raw
  - id: obfuscated-registry-package
    desc: Registry package uses code obfuscation tooling
    crit: suspicious
    conf: 0.9
    attack: "T1027"
    all:
      - id: registry-metadata-json
      - id: versioned-obfuscator-prod-dep
    any:
      - id: versioned-obfuscator-build-script
      - id: versioned-internal-path-leak
      - id: versioned-repo-type-mismatch
      - id: versioned-maintainer-list-single
  - id: install-hooked-registry-package
    desc: Registry metadata package has install hook
    crit: notable
    conf: 0.82
    all:
      - id: registry-metadata-json
    any:
      - id: versioned-preinstall-hook
      - id: versioned-postinstall-hook
      - id: versioned-install-hook
  - id: tiny-install-hook-bootstrap
    desc: Tiny package uses install-time script bootstrap
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    all:
      - id: registry-metadata-json
    any:
      - id: versioned-dist-minimal-filecount
      - id: versioned-dist-very-small-filecount
      - id: versioned-preinstall-node-entry
      - id: versioned-postinstall-node-entry
      - id: versioned-postinstall-mjs-entry
      - id: versioned-install-node-entry
    needs: 2
  - id: throwaway-preinstall-sidecar
    desc: Throwaway registry preinstall bootstrap
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    all:
      - id: registry-metadata-json
      - id: versioned-preinstall-hook
      - id: versioned-preinstall-node-entry
    any:
      - id: versioned-dist-minimal-filecount
      - id: versioned-dist-very-small-filecount
      - id: versioned-dist-tiny-unpacked-size
      - id: versioned-readme-error
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-empty-author
      - id: versioned-protonmail-maintainer
      - id: versioned-internal-utility-description
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-version-inflated-major
      - id: versioned-inflated-version-100plus-raw
      - id: versioned-inflated-minor-version-raw
    needs: 2
  - id: lifecycle-hook-registry-metadata
    desc: Registry metadata includes multiple lifecycle hooks
    crit: suspicious
    conf: 0.94
    attack: "T1195.002"
    all:
      - id: registry-metadata-json
      - id: versioned-preinstall-hook
      - id: versioned-preupdate-hook
    any:
      - id: versioned-test-hook
      - id: versioned-dist-minimal-filecount
  - id: postinstall-node-or-mjs-entry
    desc: postinstall runs node script (.js, .mjs, or .cjs)
    crit: notable
    conf: 0.88
    attack: "T1195.002"
    any:
      - id: versioned-postinstall-node-entry
      - id: versioned-postinstall-mjs-entry
  - id: postinstall-registry-bootstrap
    desc: Registry metadata uses postinstall bootstrap
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    all:
      - id: registry-metadata-json
      - id: versioned-postinstall-hook
      - id: postinstall-node-or-mjs-entry
    any:
      - id: versioned-dist-minimal-filecount
      - id: versioned-readme-error
      - id: versioned-dist-tarball-url
  - id: install-registry-bootstrap
    desc: Registry metadata uses install bootstrap
    crit: suspicious
    conf: 0.97
    attack: "T1195.002"
    all:
      - id: registry-metadata-json
      - id: versioned-install-hook
      - id: versioned-install-node-entry
    any:
      - id: versioned-dist-tarball-url
      - id: versioned-malicious-deprecation
      - id: versioned-test-hook
  - id: malicious-deprecated-registry-package
    desc: Registry metadata explicitly flags malicious package
    crit: hostile
    conf: 0.995
    attack: "T1195.002"
    all:
      - id: registry-metadata-json
      - id: versioned-malicious-deprecation
    any:
      - id: versioned-install-hook
      - id: versioned-postinstall-hook
      - id: versioned-preinstall-hook
  - id: hostile-hijack-registry-package
    desc: Registry metadata declares hijack via install hook
    crit: hostile
    conf: 0.995
    attack: "T1195.002"
    all:
      - id: install-hooked-registry-package
      - id: versioned-hostile-hijack-description
    any:
      - id: versioned-postinstall-node-index
      - id: versioned-dist-minimal-filecount
      - id: versioned-readme-error
      - id: versioned-dist-tarball-url
      - id: versioned-maintainer-list-single
    needs: 2
  - id: stealthy-install-hook
    desc: Install hook with output suppression in minimal package
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    all:
      - id: versioned-preinstall-hook
      - id: versioned-install-output-suppression
    any:
      - id: versioned-dist-minimal-filecount
      - id: versioned-readme-error
      - id: versioned-protonmail-maintainer
      - id: registry-maintainer-mismatch
  - id: lifecycle-inline-exec-registry
    desc: Registry lifecycle hook runs inline node exec
    crit: suspicious
    conf: 0.97
    attack: "T1059.007"
    all:
