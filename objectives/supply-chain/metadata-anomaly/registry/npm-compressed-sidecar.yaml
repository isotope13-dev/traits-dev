# Compressed npm metadata sidecars
# These files appear in malware corpora as registry metadata snapshots rather than
# unpacked package.json files. Without structured decompression support, we focus on
# the unusual artifact shape that still carries analytical value.
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python, javascript, powershell, pe, elf]
traits:
  - id: meta-json-zstd-basename
    desc: npm metadata sidecar basename
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: "meta.json.zst"
      case_insensitive: true
  - id: few-lines-sidecar
    desc: Few-line compressed sidecar text
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: "text.total_lines"
      max: 12
  - id: high-char-entropy-sidecar
    desc: High character entropy sidecar
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: "text.char_entropy"
      min: 5.0
    unless:
      - type: structure
        feature: "source/language/javascript"
  - id: non-ascii-heavy-sidecar
    desc: Non-ASCII heavy compressed sidecar
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: "text.non_ascii_ratio"
      min: 0.68
  - id: long-line-sidecar
    desc: Long-line compressed sidecar text
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: "text.lines_over_500"
      min: 1
composite_rules:
  - id: zstd-json-sidecar
    desc: ZSTD-compressed JSON metadata sidecar
    crit: notable
    conf: 0.9
    all:
      - id: meta-json-zstd-basename
      - id: metadata/file/text/json::zstd-json
  - id: compact-zstd-json-sidecar
    desc: Compact ZSTD JSON metadata sidecar
    crit: suspicious
    conf: 0.92
    all:
      - id: zstd-json-sidecar
      - id: few-lines-sidecar
      - id: long-line-sidecar
  - id: high-entropy-zstd-json-sidecar
    desc: High entropy text ZSTD sidecar
    crit: suspicious
    conf: 0.9
    all:
      - id: zstd-json-sidecar
      - id: high-char-entropy-sidecar
  - id: opaque-zstd-json-sidecar
    desc: Opaque ZSTD metadata sidecar
    crit: suspicious
    conf: 0.88
    all:
      - id: zstd-json-sidecar
      - id: non-ascii-heavy-sidecar
      - id: long-line-sidecar
  - id: compact-opaque-zstd-sidecar
    desc: Compact opaque ZSTD metadata sidecar
    crit: suspicious
    conf: 0.93
    all:
      - id: compact-zstd-json-sidecar
      - id: high-entropy-zstd-json-sidecar
      - id: opaque-zstd-json-sidecar
