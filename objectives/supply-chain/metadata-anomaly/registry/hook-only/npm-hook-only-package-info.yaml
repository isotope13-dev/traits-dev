defaults:
  for: [pkginfo]
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"
traits:
  - id: registry-single-file-tiny-dist
    desc: Registry sidecar tiny one-file dist
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '"fileCount"\s*:\s*1\b.{0,80}"unpackedSize"\s*:\s*(19[0-9]|2[0-4][0-9]|25[0-6])\b'
  - id: registry-major-version-90plus
    desc: Registry sidecar uses inflated major version
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"version"\s*:\s*"9[0-9]\.[0-9]+\.[0-9]+"'
  - id: registry-preinstall-oast-pro
    desc: Registry sidecar references oast.pro
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '[a-z0-9]{12,}\.oast\.pro\b'
  - id: registry-preinstall-hostname-field
    desc: Registry preinstall posts hostname field
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: 'hostname=${os.hostname()}'
  - id: registry-preinstall-user-field
    desc: Registry preinstall posts username field
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: 'user=${os.userInfo().username}'
  - id: registry-preinstall-pwd-field
    desc: Registry preinstall posts working directory
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: 'pwd=${process.cwd()}'
  - id: registry-preinstall-post-method
    desc: Registry preinstall uses POST method
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'method":"POST'
composite_rules:
  - id: registry-hook-only-single-file-package
    desc: Registry sidecar describes hook-only single-file npm package
    crit: suspicious
    conf: 0.97
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::package-info-sidecar-json
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-preinstall-hook
      - id: metadata/package/fields::preinstall-curl-data-urlencode
      - id: registry-single-file-tiny-dist
  - id: registry-single-file-hook-anomaly
    desc: Registry sidecar shows minimal package whose only purpose is install-hook execution
    crit: hostile
    conf: 0.985
    mbc: "B0024"
    all:
      - id: registry-hook-only-single-file-package
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-version-inflated-major
    any:
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-readme-error
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-dist-minimal-filecount
    needs: 1
  - id: registry-node-inline-oast-recon-exfil
    desc: Registry sidecar describes inline node OAST host-profile exfil
    crit: hostile
    conf: 0.995
    mbc: "E1041"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::package-info-sidecar-json
      - id: registry-single-file-tiny-dist
      - id: registry-major-version-90plus
      - id: objectives/supply-chain/metadata-anomaly/registry/untyped::preinstall-node-inline-eval
      - id: registry-preinstall-oast-pro
      - id: registry-preinstall-hostname-field
      - id: registry-preinstall-user-field
      - id: registry-preinstall-pwd-field
      - id: registry-preinstall-post-method
      - id: micro-behaviors/communications/http/post::url-encoded-content-type
