defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
traits:
  - id: readme-alt-install-name
    desc: Registry README installs alternate package name
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    if:
      type: text
      substr: "npm install sha256-validator-uploader"
  - id: readme-bonkfun-upload
    desc: Registry README advertises letsbonk upload API
    crit: notable
    conf: 0.9
    attack: "T1071.001"
    if:
      type: text
      regex: 'storage\.letsbonk\.fun/upload/(img|meta)'
  - id: readme-bonkfun-platform
    desc: Registry README references bonkfun platform ID
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: 'platformId: \"bonkfun\"'
  - id: repo-bonkfun-slug
    desc: Repository URL uses bonk.fun-ipfs slug
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    if:
      type: kv
      path: "repository.url"
      substr: "bonk.fun-ipfs"
  - id: raw-repo-bonkfun-url
    desc: Metadata embeds bonk.fun-ipfs repository URL
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    if:
      type: text
      substr: 'git+https://github.com/metadata-ipfs/bonk.fun-ipfs.git'
  - id: homepage-bonkfun-slug
    desc: Homepage uses bonk.fun-ipfs slug
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    if:
      type: kv
      path: "homepage"
      substr: "bonk.fun-ipfs"
  - id: raw-homepage-bonkfun-url
    desc: Metadata embeds bonk.fun-ipfs homepage URL
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    if:
      type: text
      substr: 'https://github.com/metadata-ipfs/bonk.fun-ipfs#readme'
  - id: bugs-bonkfun-slug
    desc: Bugs URL uses bonk.fun-ipfs slug
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    if:
      type: kv
      path: "bugs.url"
      substr: "bonk.fun-ipfs"
  - id: raw-bugs-bonkfun-url
    desc: Metadata embeds bonk.fun-ipfs issues URL
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    if:
      type: text
      substr: 'https://github.com/metadata-ipfs/bonk.fun-ipfs/issues'
composite_rules:
  - id: bonkfun-brand-switch
    desc: Registry metadata rebrands package to bonkfun uploader
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
      - id: readme-alt-install-name
    any:
      - id: readme-bonkfun-upload
      - id: readme-bonkfun-platform
      - id: repo-bonkfun-slug
      - id: homepage-bonkfun-slug
      - id: bugs-bonkfun-slug
      - id: raw-repo-bonkfun-url
      - id: raw-homepage-bonkfun-url
      - id: raw-bugs-bonkfun-url
    needs: 2
