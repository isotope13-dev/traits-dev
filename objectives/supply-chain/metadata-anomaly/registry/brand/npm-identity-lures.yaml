defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  attack: "T1195.002"

traits:
  - id: versioned-btrez-logger-name
    desc: Registry metadata names btrez-logger
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "\"name\": \"btrez-logger\""
  - id: versioned-betterez-author-claim
    desc: Registry metadata claims Betterez author
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "\"author\": {\"name\": \"Betterez\"}"
  - id: versioned-betterez-github-repo
    desc: Registry metadata references Betterez GitHub
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "github.com/Betterez/btrez-logger"
  - id: versioned-melnikoleg-maintainer
    desc: Registry metadata references melnikoleg maintainer
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "melnikoleg995@gmail.com"
  - id: versioned-btrez-githead-ioc
    desc: btrez registry gitHead IOC
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "\"gitHead\": \"892d9b80fbc44ed5a68a55513358ee5f5da6bff4\""

composite_rules:
  - id: betterez-btrez-registry-typosquat
    desc: Betterez npm registry typosquat package
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
      - id: versioned-btrez-logger-name
      - id: versioned-betterez-author-claim
      - id: versioned-betterez-github-repo
      - id: versioned-melnikoleg-maintainer
    any:
      - id: versioned-btrez-githead-ioc
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-maintainer-list-single
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-dist-tarball-url
    needs: 1
