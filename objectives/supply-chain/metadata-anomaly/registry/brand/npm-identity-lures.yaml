defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  attack: "T1195.002"

traits:
  - id: versioned-sha256-validator-pro-name
    desc: Registry metadata names sha256-validator-pro
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: "\"name\": \"sha256-validator-pro\""
  - id: versioned-readme-b64-path-resolution
    desc: README advertises base64 path resolution
    crit: suspicious
    conf: 0.93
    attack: "T1027"
    if:
      type: text
      substr: "Base64-encoded path resolution"
  - id: versioned-readme-sync-sha256-api
    desc: README documents syncSha256Validation API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "syncSha256Validation(options)"
  - id: versioned-readme-resolve-from-cwd
    desc: README exposes resolveFromCwd option
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "resolveFromCwd"
  - id: versioned-readme-validation-content
    desc: README says validation returns content
    crit: suspicious
    conf: 0.9
    attack: "T1552.001"
    if:
      type: text
      substr: "Validation result content"
  - id: versioned-readme-encoded-path-error
    desc: README exposes encoded path error
    crit: suspicious
    conf: 0.92
    attack: "T1027"
    if:
      type: text
      substr: "Failed to validate SHA256 hash '[encoded_path]'"
  - id: versioned-readme-path-fallbacks
    desc: README claims path fallback mechanisms
    crit: suspicious
    conf: 0.9
    attack: "T1552.001"
    if:
      type: text
      substr: "multiple path resolution strategies"
  - id: versioned-btrez-logger-name
    desc: Registry metadata names btrez-logger
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "\"name\": \"btrez-logger\""
  - id: versioned-betterez-author-claim
    desc: Registry metadata claims Betterez author
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "\"author\": {\"name\": \"Betterez\"}"
  - id: versioned-betterez-github-repo
    desc: Registry metadata references Betterez GitHub
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "github.com/Betterez/btrez-logger"
  - id: versioned-melnikoleg-maintainer
    desc: Registry metadata references melnikoleg maintainer
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "melnikoleg995@gmail.com"
  - id: versioned-btrez-githead-ioc
    desc: btrez registry gitHead IOC
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "\"gitHead\": \"892d9b80fbc44ed5a68a55513358ee5f5da6bff4\""
  - id: versioned-btrez-seven-minute-window
    desc: btrez registry rapid publish window
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "\"modified\": \"2025-08-08T08:02:37.960Z\""

composite_rules:
  - id: sha256-validator-b64-path-access
    desc: SHA256 validator advertises obfuscated path access
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
      - id: versioned-sha256-validator-pro-name
      - id: versioned-readme-b64-path-resolution
      - id: versioned-readme-sync-sha256-api
    any:
      - id: versioned-readme-resolve-from-cwd
      - id: versioned-readme-validation-content
      - id: versioned-readme-encoded-path-error
      - id: versioned-readme-path-fallbacks
    needs: 2
  - id: betterez-btrez-registry-typosquat
    desc: Betterez npm registry typosquat package
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
      - id: versioned-btrez-logger-name
      - id: versioned-betterez-author-claim
      - id: versioned-betterez-github-repo
      - id: versioned-melnikoleg-maintainer
    any:
      - id: versioned-btrez-githead-ioc
      - id: versioned-btrez-seven-minute-window
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-maintainer-list-single
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-dist-tarball-url
    needs: 1
