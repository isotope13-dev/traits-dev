defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  attack: "T1195.002"

traits:
- id: versioned-sha256-validator-pro-name
  desc: Registry metadata names sha256-validator-pro
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: "\"name\": \"sha256-validator-pro\""
- id: versioned-readme-b64-path-resolution
  desc: README advertises base64 path resolution
  crit: suspicious
  conf: 0.93
  attack: "T1027"
  if:
    type: text
    substr: "Base64-encoded path resolution"
- id: versioned-readme-sync-sha256-api
  desc: README documents syncSha256Validation API
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: "syncSha256Validation(options)"
- id: versioned-readme-resolve-from-cwd
  desc: README exposes resolveFromCwd option
  crit: notable
  conf: 0.88
  if:
    type: text
    substr: "resolveFromCwd"
- id: versioned-readme-validation-content
  desc: README says validation returns content
  crit: suspicious
  conf: 0.9
  attack: "T1552.001"
  if:
    type: text
    substr: "Validation result content"
- id: versioned-readme-encoded-path-error
  desc: README exposes encoded path error
  crit: suspicious
  conf: 0.92
  attack: "T1027"
  if:
    type: text
    substr: "Failed to validate SHA256 hash '[encoded_path]'"
- id: versioned-readme-path-fallbacks
  desc: README claims path fallback mechanisms
  crit: suspicious
  conf: 0.9
  attack: "T1552.001"
  if:
    type: text
    substr: "multiple path resolution strategies"
- id: versioned-btrez-logger-name
  desc: Registry metadata names btrez-logger
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: "\"name\": \"btrez-logger\""
- id: versioned-betterez-author-claim
  desc: Registry metadata claims Betterez author
  crit: component
  conf: 0.88
  if:
    type: text
    substr: "\"author\": {\"name\": \"Betterez\"}"
- id: versioned-betterez-github-repo
  desc: Registry metadata references Betterez GitHub
  crit: component
  conf: 0.86
  if:
    type: text
    substr: "github.com/Betterez/btrez-logger"
- id: versioned-melnikoleg-maintainer
  desc: Registry metadata references melnikoleg maintainer
  crit: suspicious
  conf: 0.99
  if:
    type: text
    substr: "melnikoleg995@gmail.com"
- id: versioned-btrez-githead-ioc
  desc: btrez registry gitHead IOC
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: "\"gitHead\": \"892d9b80fbc44ed5a68a55513358ee5f5da6bff4\""
- id: versioned-btrez-seven-minute-window
  desc: btrez registry rapid publish window
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: "\"modified\": \"2025-08-08T08:02:37.960Z\""
- id: pino-final-package-name
  desc: Registry package named pino-final
  crit: suspicious
  conf: 0.98
  if:
    type: text
    regex: '"name"\s*:\s*"pino-final"'
- id: pinojs-upstream-repository
  desc: Registry metadata points to pinojs/pino
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: "github.com/pinojs/pino"
- id: pino-upstream-author
  desc: Registry metadata retains Pino author
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: '"name": "Matteo Collina"'
- id: pino2-main-entrypoint
  desc: Registry package main points to pino2
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '"main"\s*:\s*"pino2\.js"'
- id: pino2-cli-bin
  desc: Registry package exposes pino2 binary
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: '"bin"\s*:\s*\{\s*"pino2"\s*:'
- id: pino-final-throwaway-publisher
  desc: pino-final publisher is numeric Gmail
  crit: suspicious
  conf: 0.98
  if:
    type: text
    regex: '"_npmUser"\s*:\s*\{"name"\s*:\s*"klaus237192"'
- id: express-typosquat-name
  desc: Registry metadata name is express typosquat
  crit: suspicious
  conf: 0.95
  if:
    type: text
      # Matches epxresso, expres, expresss, etc.
    regex: '"name"\s*:\s*"(epxresso|expres|expresss)"'
- id: express-upstream-repository
  desc: Registry metadata points to expressjs/express
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: "github.com/expressjs/express"
- id: express-upstream-author
  desc: Registry metadata retains Express author
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: '"name": "TJ Holowaychuk"'
- id: miltonsanders-maintainer
  desc: 'Registry metadata refs miltonsanders maintainer'
  crit: suspicious
  conf: 0.99
  if:
    type: text
    substr: "miltonsanders1234@gmail.com"
- id: kleur-tagline-readme
  desc: README copies the kleur project tagline
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: "fastest Node.js library for formatting terminal text with ANSI colors"
- id: terminalcolor256-package-name
  desc: Registry package name is terminalcolor256
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: '"name"\s*:\s*"terminalcolor256"'
- id: hugohahn31-maintainer
  desc: Registry metadata references hugohahn31 maintainer
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: "hugohahn31@"
- id: kleur-package-name
  desc: Registry package name is kleur
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '"name"\s*:\s*"kleur"'

composite_rules:
- id: express-registry-impersonation
  desc: Registry metadata impersonates Express framework
  crit: hostile
  conf: 0.998
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
  - id: express-typosquat-name
  - id: express-upstream-repository
  - id: express-upstream-author
  any:
  - id: miltonsanders-maintainer
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-maintainer-list-single
- id: sha256-validator-b64-path-access
  desc: SHA256 validator advertises obfuscated path access
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
  - id: versioned-sha256-validator-pro-name
  - id: versioned-readme-b64-path-resolution
  - id: versioned-readme-sync-sha256-api
  any:
  - id: versioned-readme-resolve-from-cwd
  - id: versioned-readme-validation-content
  - id: versioned-readme-encoded-path-error
  - id: versioned-readme-path-fallbacks
  needs: 2
- id: betterez-btrez-registry-typosquat
  desc: Betterez npm registry typosquat package
  crit: hostile
  conf: 0.995
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
  - id: versioned-btrez-logger-name
  - id: versioned-betterez-author-claim
  - id: versioned-betterez-github-repo
  - id: versioned-melnikoleg-maintainer
  any:
  - id: versioned-btrez-githead-ioc
  - id: versioned-btrez-seven-minute-window
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-maintainer-list-single
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-dist-tarball-url
- id: terminalcolor256-kleur-impersonation
  desc: terminalcolor256 npm registry typosquat impersonating kleur
  crit: hostile
  conf: 0.99
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
  - id: terminalcolor256-package-name
  - id: kleur-tagline-readme
  any:
  - id: hugohahn31-maintainer
  - id: objectives/supply-chain/metadata-anomaly/registry/maintainer::typo-email-gmail-domain
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-maintainer-list-single

- id: kleur-tagline-impersonation
  desc: Registry README lifts kleur tagline into a non-kleur package
  crit: suspicious
  conf: 0.94
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
  - id: kleur-tagline-readme
  unless:
  - id: kleur-package-name

- id: pino-final-registry-impersonation
  desc: pino-final registry metadata impersonates Pino
  crit: hostile
  conf: 0.998
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
  - id: pino-final-package-name
  - id: pinojs-upstream-repository
  - id: pino-upstream-author
  - id: pino2-main-entrypoint
  any:
  - id: pino2-cli-bin
  - id: pino-final-throwaway-publisher
