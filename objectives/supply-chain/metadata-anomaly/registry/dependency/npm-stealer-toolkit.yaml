defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  attack: "T1195.002"

traits:
  - id: dep-better-sqlite3
    desc: Registry metadata depends on better-sqlite3
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "\"better-sqlite3\""

  - id: dep-node-machine-id
    desc: Registry metadata depends on node-machine-id
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "\"node-machine-id\""

  - id: dep-socket-io-client
    desc: Registry metadata depends on socket.io-client
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "\"socket.io-client\""

composite_rules:
  - id: npm-registry-stealer-toolkit
    desc: Registry metadata has stealer dependency toolkit
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
      - id: dep-better-sqlite3
      - id: dep-node-machine-id
    any:
      - id: dep-socket-io-client
      - id: objectives/supply-chain/metadata-anomaly/registry/untyped::dep-axios
    needs: 1
