defaults:
  for: [pkginfo]
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"

traits:
  - id: sidecar-filecount-3
    desc: Registry sidecar ships three files
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"fileCount"\s*:\s*3\b'

  - id: sidecar-unpacked-260
    desc: Registry sidecar unpacks to 260B
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '"unpackedSize"\s*:\s*260\b'

  - id: sidecar-90-major-staircase
    desc: Registry sidecar repeats 90-92 majors
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '"90\.0\.0"[\s\S]{0,160}"91\.0\.0"[\s\S]{0,160}"92\.0\.0"'

  - id: sidecar-1x90-minor-staircase
    desc: Registry sidecar mirrors 1.90-1.92
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '"1\.90\.0"[\s\S]{0,160}"1\.91\.0"[\s\S]{0,160}"1\.92\.0"'

  - id: sidecar-latest-100-tag
    desc: Registry sidecar latest tag is 100
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"latest"\s*:\s*"100\.0\.0"'

composite_rules:
  - id: sidecar-three-file-260b-dist
    desc: Registry sidecar has 3 files, 260B
    crit: suspicious
    conf: 0.97
    all:
      - id: sidecar-filecount-3
      - id: sidecar-unpacked-260

  - id: sidecar-mirrored-version-churn
    desc: Registry sidecar mirrors inflated versions
    crit: suspicious
    conf: 0.97
    all:
      - id: sidecar-90-major-staircase
      - id: sidecar-1x90-minor-staircase
      - id: sidecar-latest-100-tag

  - id: sidecar-throwaway-version-squat
    desc: Throwaway registry sidecar uses version churn
    crit: hostile
    conf: 0.992
    mbc: "B0024"
    all:
      - id: sidecar-three-file-260b-dist
      - id: sidecar-mirrored-version-churn
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-empty-readme
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-maintainer-list-single
    any:
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-inflated-version-100plus-raw
      - id: objectives/supply-chain/metadata-anomaly/registry/untyped::readme-and-filename-empty
    needs: 1
