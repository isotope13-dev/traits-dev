defaults:
  for: [data]
  platforms: [unix, windows]
  attack: "T1195.002"

traits:
- id: sidecar-scoped-package-name
  desc: Registry sidecar names scoped package
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '"name"\s*:\s*"@[a-z0-9][a-z0-9-]{1,80}/[a-z0-9][a-z0-9._-]{0,80}"'

- id: sidecar-single-file-238
  desc: Registry sidecar reports one 238B file
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '"fileCount"\s*:\s*1\b.{0,60}"unpackedSize"\s*:\s*238\b'

- id: sidecar-single-file-375
  desc: Registry sidecar reports one tiny file
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '"fileCount"\s*:\s*1\b.{0,60}"unpackedSize"\s*:\s*375\b'

- id: sidecar-missing-readme-error
  desc: Registry sidecar reports missing README
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: '"readme":"ERROR: No README data found!"'

- id: sidecar-empty-author
  desc: Registry sidecar has empty author field
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: '"author": ""'

- id: sidecar-main-index-js
  desc: Registry sidecar points main to index.js
  crit: notable
  conf: 0.88
  if:
    type: text
    substr: '"main": "index.js"'

- id: sidecar-npm-init-test
  desc: Registry sidecar keeps npm init test script
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: '"test": "echo \\"Error: no test specified\\" && exit 1"'

- id: sidecar-major-99-version
  desc: Registry sidecar uses major 99 versioning
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '"version"\s*:\s*"99\.[0-9]+\.[0-9]+"'

- id: sidecar-latest-9905
  desc: Registry sidecar latest tag is 99.0.5
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '"dist-tags"\s*:\s*\{[^}]{0,80}"latest"\s*:\s*"99\.0\.5"'

- id: sidecar-repeated-99-releases
  desc: Registry sidecar includes repeated 99.x releases
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '"99\.0\.0"[\s\S]{0,400}"99\.0\.3"[\s\S]{0,400}"99\.0\.4"[\s\S]{0,400}"99\.0\.5"'

composite_rules:
- id: sfdc-placeholder-sidecar
  desc: sfdc sidecar describes a tiny placeholder squatter
  crit: hostile
  conf: 0.991
  mbc: "B0024"
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::package-info-basename
  - id: objectives/supply-chain/metadata-anomaly/naming::npm-name-sfdc-prefix
  - id: sidecar-single-file-238
  any:
  - id: sidecar-main-index-js
  - id: sidecar-npm-init-test
  - id: sidecar-empty-author
  - id: sidecar-missing-readme-error
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-maintainer-list-single
  needs: 2

- id: throwaway-hook-only-sidecar
  desc: Registry sidecar describes a throwaway hook-only package
  crit: hostile
  conf: 0.992
  mbc: "B0024"
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::package-info-basename
  - id: sidecar-single-file-375
  - id: sidecar-major-99-version
  - id: sidecar-latest-9905
  any:
  - id: sidecar-missing-readme-error
  - id: sidecar-repeated-99-releases
- id: scoped-placeholder-sidecar
  desc: Registry sidecar shows scoped placeholder squatter
  crit: suspicious
  conf: 0.95
  mbc: "B0024"
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::package-info-basename
  - id: sidecar-scoped-package-name
  - id: sidecar-main-index-js
  any:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-dist-minimal-filecount
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-dist-tiny-unpacked-size
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-readme-error
  - id: sidecar-empty-author
  needs: 3
