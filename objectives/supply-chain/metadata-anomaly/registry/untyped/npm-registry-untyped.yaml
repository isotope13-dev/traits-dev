# npm registry metadata detection for files typed as unknown
# meta.json files from npm registry are not classified as package.json
# No for: default means traits match any file type including unknown
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [data, manifests, scripts]
traits:
  # ── Registry metadata identification ──
  - id: meta-json-basename
    desc: npm registry metadata JSON filename
    crit: component
    conf: 0.75
    if:
      type: basename
      regex: "^(meta|metadata)\\.json$"

  - id: npm-operational-internal
    desc: npm registry _npmOperationalInternal marker
    crit: component
    conf: 0.85
    if:
      type: raw
      substr: "\"_npmOperationalInternal\""

  - id: npm-user-field
    desc: npm registry _npmUser publisher field
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: "\"_npmUser\"\\s*:\\s*\\{"

  - id: dist-tarball-npmjs
    desc: npm registry tarball URL present
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: "\"tarball\"\\s*:\\s*\"https://registry\\.npmjs\\.org/"

  # ── Install hook patterns ──
  - id: preinstall-hook-present
    desc: Registry metadata has preinstall hook entry
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: "\"preinstall\"\\s*:\\s*\"[^\"]{1,200}\""

  - id: preinstall-node-script
    desc: Preinstall invokes node on JS file
    crit: component
    conf: 0.88
    if:
      type: raw
      regex: "\"preinstall\"\\s*:\\s*\"node\\s+[a-zA-Z0-9_./-]{1,60}\\.js\""

  - id: postinstall-hook-present
    desc: Registry metadata has postinstall hook entry
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\"[^\"]{1,200}\""

  - id: postinstall-npm-run-fallback
    desc: Postinstall chains npm run with OR fallbacks
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"postinstall\"\\s*:\\s*\"npm run [^\"]{1,40}\\|\\|"

  # ── Version anomalies ──
  - id: inflated-version-9999
    desc: Registry version starts with 9999
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: "\"version\"\\s*:\\s*\"9999\\."

  - id: inflated-version-100plus
    desc: Registry version major 100+
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: "\"version\"\\s*:\\s*\"[1-9][0-9]{2,}\\."

  - id: inflated-version-90plus
    desc: Registry version major 90+
    crit: component
    conf: 0.82
    if:
      type: raw
      regex: "\"version\"\\s*:\\s*\"9[0-9]\\.[0-9]"

  # ── Package metadata anomalies ──
  - id: readme-and-filename-empty
    desc: Registry readme and readmeFilename both empty
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: "\"readme\"\\s*:\\s*\"\"[^}]{0,60}\"readmeFilename\"\\s*:\\s*\"\""

  - id: dist-filecount-1-to-4
    desc: Registry package ships 1-4 files
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: "\"fileCount\"\\s*:\\s*[1-4]\\b"

  - id: dist-unpacked-under-4kb
    desc: Registry package unpacks under 4KB
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: "\"unpackedSize\"\\s*:\\s*([1-9][0-9]{0,2}|[1-3][0-9]{3})\\b"

  # ── Description anomalies ──
  - id: desc-security-research-claim
    desc: Description claims security research purpose
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: "\"description\"\\s*:\\s*\"[^\"]{0,80}security research"
      case_insensitive: true

  - id: desc-harmless-canary-claim
    desc: Description claims harmless or canary purpose
    crit: component
    conf: 0.92
    if:
      type: raw
      regex: "\"description\"\\s*:\\s*\"[^\"]{0,60}(canary|[Hh]armless)"

  # ── Hardcoded IP in decoded strings ──
  - id: external-ip-port-in-strings
    desc: Hardcoded external IP with port in strings
    crit: notable
    conf: 0.88
    if:
      type: string_value
      regex: "[0-9]{1,3}(\\.[0-9]{1,3}){3}:[0-9]{2,5}"
      is: external_ip

  # ── Eval directory execution ──
  - id: script-node-eval-dir
    desc: Script executes node on eval directory path
    crit: suspicious
    conf: 0.94
    attack: "T1059.007"
    if:
      type: raw
      regex: "\"node\\s+[^\"]{0,40}eval/"

  # ── Dependency anomalies ──
  - id: dep-socket-io-plus-sqlite3
    desc: Dependencies include socket.io-client and sqlite3
    crit: notable
    conf: 0.82
    attack: "T1195.002"
    if:
      type: raw
      regex: "\"socket.io-client\"[^}]{0,600}\"sqlite3\""

composite_rules:
  # ── Registry metadata indicator for untyped files ──
  - id: untyped-registry-metadata
    desc: Untyped file is npm registry metadata
    crit: component
    conf: 0.8
    all:
      - id: meta-json-basename
    any:
      - id: npm-operational-internal
      - id: npm-user-field
      - id: dist-tarball-npmjs

  # ── Install hooks in untyped registry metadata ──
  - id: untyped-registry-preinstall
    desc: Registry metadata has preinstall hook
    crit: notable
    conf: 0.88
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: preinstall-hook-present

  - id: untyped-registry-postinstall
    desc: Registry metadata has postinstall hook
    crit: notable
    conf: 0.88
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: postinstall-hook-present

  # ── Inflated version in registry metadata ──
  - id: inflated-version-registry
    desc: Registry metadata has inflated version number
    crit: suspicious
    conf: 0.88
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
    any:
      - id: inflated-version-9999
      - id: inflated-version-100plus
      - id: inflated-version-90plus

  # ── Dependency confusion: inflated version + preinstall ──
  - id: depconf-preinstall-inflated
    desc: Dependency confusion preinstall with inflated version
    crit: hostile
    conf: 0.96
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: preinstall-hook-present
    any:
      - id: inflated-version-9999
      - id: inflated-version-100plus
      - id: inflated-version-90plus
    needs: 1

  # ── Dependency confusion: inflated version + postinstall ──
  - id: depconf-postinstall-inflated
    desc: Dependency confusion postinstall with inflated version
    crit: hostile
    conf: 0.96
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: postinstall-hook-present
    any:
      - id: inflated-version-9999
      - id: inflated-version-100plus
      - id: inflated-version-90plus
    needs: 1

  # ── Fake research claim + install hook ──
  - id: fake-research-with-hook
    desc: Fake security research claim with install hook
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
    any:
      - id: preinstall-hook-present
      - id: postinstall-hook-present
      - id: desc-security-research-claim
      - id: desc-harmless-canary-claim
    needs: 2

  # ── Preinstall node bootstrap in tiny package ──
  - id: preinstall-node-bootstrap-tiny
    desc: Preinstall node script in tiny registry package
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: preinstall-node-script
    any:
      - id: dist-filecount-1-to-4
      - id: dist-unpacked-under-4kb
      - id: readme-and-filename-empty
    needs: 1

  # ── Throwaway preinstall package (comprehensive) ──
  - id: throwaway-preinstall-registry
    desc: Throwaway preinstall bootstrap in sparse package
    crit: hostile
    conf: 0.95
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: preinstall-node-script
    any:
      - id: dist-filecount-1-to-4
      - id: dist-unpacked-under-4kb
      - id: readme-and-filename-empty
      - id: inflated-version-9999
      - id: inflated-version-100plus
      - id: desc-harmless-canary-claim
      - id: desc-security-research-claim
    needs: 3

  # ── Postinstall fallback chain ──
  - id: postinstall-fallback-chain
    desc: Registry postinstall chains npm run with fallbacks
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: postinstall-npm-run-fallback

  # ── Eval directory execution in registry metadata ──
  - id: eval-dir-in-registry
    desc: Registry script runs node in eval directory
    crit: suspicious
    conf: 0.95
    attack: "T1059.007"
    all:
      - id: untyped-registry-metadata
      - id: script-node-eval-dir

  # ── Hostile: postinstall fallback + eval dir ──
  - id: postinstall-eval-dropper
    desc: Postinstall fallback chain triggers eval payload
    crit: hostile
    conf: 0.96
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: postinstall-npm-run-fallback
      - id: script-node-eval-dir

  # ── Suspicious deps + install hook ──
  - id: stealer-deps-with-postinstall
    desc: Stealer dependency combo with postinstall hook
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: dep-socket-io-plus-sqlite3
      - id: postinstall-hook-present
