# npm registry metadata detection for files typed as unknown
# meta.json files from npm registry are not classified as package.json
# Use data pending a scanner-side fix to classify registry sidecars into a routable file type.
defaults:
  for: [data]
  platforms: [windows, unix]
traits:
  # ── Registry metadata identification ──
  - id: meta-json-basename
    desc: npm registry metadata JSON filename
    crit: component
    conf: 0.75
    if:
      type: basename
      regex: "^(meta|metadata)\\.json$"
  - id: npm-operational-internal
    desc: npm registry _npmOperationalInternal marker
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "\"_npmOperationalInternal\""

  - id: npm-user-field
    desc: npm registry _npmUser publisher field
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "\"_npmUser\"\\s*:\\s*\\{"

  - id: dist-tarball-npmjs
    desc: npm registry tarball URL present
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "\"tarball\"\\s*:\\s*\"https://registry\\.npmjs\\.org/"

  # ── Install hook patterns ──
  - id: preinstall-hook-present
    desc: Registry metadata has preinstall hook entry
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "\"preinstall\"\\s*:\\s*\"[^\"]{1,200}\""

  - id: preinstall-node-script
    desc: Preinstall invokes node on JS file
    crit: component
    conf: 0.88
    if:
      type: text
      regex: "\"preinstall\"\\s*:\\s*\"node\\s+[a-zA-Z0-9_./-]{1,60}\\.js\""

  - id: postinstall-hook-present
    desc: Registry metadata has postinstall hook entry
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "\"postinstall\"\\s*:\\s*\"[^\"]{1,200}\""
    unless:
      - type: kv
        path: name
        exists: true

  - id: install-hook-present
    desc: Registry metadata has install hook entry
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "\"install\"\\s*:\\s*\"[^\"]{1,200}\""

  - id: install-node-script
    desc: Install hook invokes node on JS file
    crit: component
    conf: 0.88
    if:
      type: text
      regex: "\"install\"\\s*:\\s*\"node\\s+[a-zA-Z0-9_./-]{1,60}\\.js"

  - id: install-hook-error-suppressed
    desc: Install hook suppresses errors with exit 0
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "|| exit 0\""

  - id: postinstall-npm-run-fallback
    desc: Postinstall chains npm run with OR fallbacks
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: text
      regex: "\"postinstall\"\\s*:\\s*\"npm run [^\"]{1,40}\\|\\|"

  # ── Readme anomalies ──
  - id: readme-mentions-exfil-metadata
    desc: Readme describes sending host metadata
    crit: component
    conf: 0.92
    if:
      type: text
      regex: "\"readme\"[^}]{0,200}(hostname|OS|cwd|Node version)"

  - id: readme-dep-confusion-self-id
    desc: Readme self-identifies as dependency confusion
    crit: component
    conf: 0.95
    if:
      type: text
      regex: "\"readme\"[^}]{0,100}dependency confusion"
      case_insensitive: true

  # ── Version anomalies ──
  - id: inflated-version-9999
    desc: Registry version starts with 9999
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "\"version\"\\s*:\\s*\"9999\\."

  - id: inflated-version-100plus
    desc: Registry version major 100+
    crit: component
    conf: 0.85
    if:
      id: objectives/supply-chain/metadata-anomaly/registry::versioned-inflated-version-100plus-raw

  - id: inflated-version-90plus
    desc: Registry version major 90+
    crit: component
    conf: 0.82
    if:
      type: text
      regex: "\"version\"\\s*:\\s*\"9[0-9]\\.[0-9]"

  # ── Package metadata anomalies ──
  - id: readme-and-filename-empty
    desc: Registry readme and readmeFilename both empty
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "\"readme\"\\s*:\\s*\"\"[^}]{0,60}\"readmeFilename\"\\s*:\\s*\"\""

  - id: dist-filecount-1-to-4
    desc: Registry package ships 1-4 files
    crit: component
    conf: 0.75
    if:
      type: text
      regex: "\"fileCount\"\\s*:\\s*[1-4]\\b"

  - id: dist-unpacked-under-4kb
    desc: Registry package unpacks under 4KB
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "\"unpackedSize\"\\s*:\\s*([1-9][0-9]{0,2}|[1-3][0-9]{3})\\b"

  # ── Description anomalies ──
  - id: desc-security-research-claim
    desc: Description claims security research purpose
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "\"description\"\\s*:\\s*\"[^\"]{0,80}security research"
      case_insensitive: true

  - id: desc-harmless-canary-claim
    desc: Description claims harmless or canary purpose
    crit: component
    conf: 0.92
    if:
      type: text
      regex: "\"description\"\\s*:\\s*\"[^\"]{0,60}(canary|[Hh]armless)"

  # ── Hardcoded IP in decoded strings ──
  - id: external-ip-port-in-strings
    desc: Hardcoded external IP with port in strings
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: "[0-9]{1,3}(\\.[0-9]{1,3}){3}:[0-9]{2,5}"
      is: external_ip
    unless:
      - type: basename
        regex: (^|[\\/]).*_test\.go$

  # ── Eval directory execution ──
  - id: script-node-eval-dir
    desc: Script executes node on eval directory path
    crit: suspicious
    conf: 0.94
    attack: "T1059.007"
    if:
      type: text
      regex: "\"node\\s+[^\"]{0,40}eval/"

  # ── Dependency anomalies ──
  - id: dep-socket-io-plus-sqlite3
    desc: Dependencies include socket.io-client and sqlite3
    crit: notable
    conf: 0.82
    attack: "T1195.002"
    if:
      type: text
      regex: "\"socket.io-client\"[^}]{0,600}\"sqlite3\""
  - id: vite-facade-description
    desc: Vite chunking facade description
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    if:
      type: text
      substr: chunk splitting and bundle optimization
  - id: vite-frontend-keywords
    desc: Vite frontend plugin keyword cluster
    crit: notable
    conf: 0.89
    attack: "T1195.002"
    if:
      type: text
      regex: '"vite"[^]]{0,120}"code splitting"[^]]{0,120}"frontend"'
  - id: dep-public-ip
    desc: Dependency includes public-ip
    crit: notable
    conf: 0.86
    attack: "T1082"
    if:
      type: text
      regex: '"public-ip"\s*:\s*"'
  - id: dep-dotenv
    desc: Dependency includes dotenv
    crit: notable
    conf: 0.82
    attack: "T1552.001"
    if:
      type: text
      regex: '"dotenv"\s*:\s*"'
  - id: dep-axios
    desc: Dependency includes axios
    crit: notable
    conf: 0.8
    attack: "T1071.001"
    if:
      type: text
      regex: '"axios"\s*:\s*"'
    unless:
      - type: kv
        path: name
        exists: true
  - id: dep-request
    desc: Dependency includes request
    crit: notable
    conf: 0.8
    attack: "T1071.001"
    if:
      type: text
      regex: '"request"\s*:\s*"'
  - id: dep-sqlite3
    desc: Dependency includes sqlite3
    crit: notable
    conf: 0.84
    attack: "T1555.003"
    if:
      type: text
      regex: '"sqlite3"\s*:\s*"'

  # ── Exfil tool in lifecycle hooks ──
  - id: hook-curl-exfil-core
    desc: Core lifecycle hooks run curl command
    crit: component
    conf: 0.9
    attack: "T1041"
    if:
      type: text
      regex: "\"(preinstall|install|postinstall)\"\\s*:\\s*\"curl\\s"
  - id: hook-data-urlencode
    desc: Lifecycle hook URL-encodes POST fields
    crit: suspicious
    conf: 0.96
    attack: "T1041"
    if:
      type: text
      regex: '"(preinstall|install|postinstall)"\s*:\s*"[^"\n]{0,160}--data-urlencode'
  - id: hook-oast-domain-main
    desc: Lifecycle hook references common OAST TLDs
    crit: component
    conf: 0.97
    attack: "T1048"
    if:
      type: text
      regex: 'oast\.(pro|live|fun)\b'
  - id: hook-oast-domain-alt
    desc: Lifecycle hook references alternate OAST TLDs
    crit: component
    conf: 0.97
    attack: "T1048"
    if:
      type: text
      regex: 'oast\.(site|online|me)\b'
  - id: hook-hostname-fqdn
    desc: Hook resolves FQDN with hostname -f
    crit: notable
    conf: 0.95
    attack: "T1082"
    if:
      type: text
      substr: "fqdn=$(hostname -f"
  - id: hook-dnsdomainname
    desc: Hook resolves DNS domain name
    crit: notable
    conf: 0.95
    attack: "T1082"
    if:
      type: text
      substr: "domain=$(dnsdomainname"

  - id: hook-curl-exfil-extra
    desc: Extra lifecycle hooks run curl command
    crit: component
    conf: 0.9
    attack: "T1041"
    if:
      type: text
      regex: "\"(preupdate|test)\"\\s*:\\s*\"curl\\s"

  - id: hook-wget-exfil-core
    desc: Core lifecycle hooks run wget command
    crit: component
    conf: 0.9
    attack: "T1041"
    if:
      type: text
      regex: "\"(preinstall|install|postinstall)\"\\s*:\\s*\"wget\\s"

  - id: hook-wget-exfil-extra
    desc: Extra lifecycle hooks run wget command
    crit: component
    conf: 0.9
    attack: "T1041"
    if:
      type: text
      regex: "\"(preupdate|test)\"\\s*:\\s*\"wget\\s"

  - id: maintainer-hackerone-proxy-email
    desc: Maintainer uses HackerOne proxy email
    crit: notable
    conf: 0.78
    attack: "T1195.002"
    if:
      type: kv
      path: maintainers[*].email
      regex: '@wearehackerone\.com$'

  # ── Command substitution in hooks ──
  - id: hook-whoami-sub
    desc: Hook uses $(whoami) command substitution
    crit: component
    conf: 0.93
    attack: "T1082"
    if:
      type: text
      substr: "$(whoami)"

  - id: hook-whoami-backticks-core
    desc: Core hook uses `whoami` command substitution
    crit: component
    conf: 0.95
    attack: "T1033"
    if:
      type: text
      regex: '"(preinstall|install|postinstall)"\s*:\s*"[^"\n]{0,160}`whoami`'
  - id: hook-whoami-backticks-extra
    desc: Extra hook uses `whoami` command substitution
    crit: component
    conf: 0.93
    attack: "T1033"
    if:
      type: text
      regex: '"(preupdate|test)"\s*:\s*"[^"\n]{0,160}`whoami`'

  - id: hook-hostname-sub
    desc: Hook uses $(hostname) command substitution
    crit: component
    conf: 0.93
    attack: "T1082"
    if:
      type: text
      substr: "$(hostname)"

  - id: hook-hostname-backticks-core
    desc: Core hook uses `hostname` command substitution
    crit: component
    conf: 0.95
    attack: "T1082"
    if:
      type: text
      regex: '"(preinstall|install|postinstall)"\s*:\s*"[^"\n]{0,160}`hostname`'
  - id: hook-hostname-backticks-extra
    desc: Extra hook uses `hostname` command substitution
    crit: component
    conf: 0.93
    attack: "T1082"
    if:
      type: text
      regex: '"(preupdate|test)"\s*:\s*"[^"\n]{0,160}`hostname`'

  - id: hook-pwd-sub
    desc: Hook uses $(pwd) command substitution
    crit: component
    conf: 0.88
    attack: "T1083"
    if:
      type: text
      substr: "$(pwd)"
  - id: hook-host-user-pwd-chain
    desc: Hook chains host user cwd collection
    crit: suspicious
    conf: 0.99
    attack: "T1082"
    if:
      type: text
      substr: "$(hostname && whoami && pwd)"

  - id: hook-id-sub
    desc: Hook uses $(id) command substitution
    crit: component
    conf: 0.93
    attack: "T1033"
    if:
      type: text
      substr: "$(id)"

  - id: hook-user-host-path-exfil
    desc: Hook exfils user host via path
    crit: suspicious
    conf: 0.97
    attack: "T1041"
    if:
      type: text
      regex: "/`whoami`/`hostname`|/\\$\\(whoami\\)/\\$\\(hostname\\)"

  - id: hook-cmd-query-exfil
    desc: Hook exfils via cmd= query parameter
    crit: component
    conf: 0.95
    attack: "T1041"
    if:
      type: text
      regex: "\\?cmd=\\$\\((whoami|hostname|id|pwd)\\)"

  # ── webhook.site OOB callback ──
  - id: webhook-site-url
    desc: webhook.site OOB callback URL
    crit: component
    conf: 0.95
    attack: "T1041"
    if:
      type: text
      substr: "webhook.site/"

  - id: ngrok-free-url
    desc: Lifecycle hook uses ngrok-free tunnel URL
    crit: suspicious
    conf: 0.96
    attack: "T1041"
    if:
      type: text
      regex: "https://[a-z0-9-]+\\.ngrok-free\\.app"

  - id: external-ip-http-url
    # High-value trait: keep criticality at suspicious. Add precise benign-context exceptions instead.
    desc: External IP HTTP URL with port
    crit: suspicious
    conf: 0.95
    attack: "T1071.001"
    if:
      type: text
      regex: "http://[0-9]{1,3}(\\.[0-9]{1,3}){3}:[0-9]{2,5}"
      is: external_ip
    not:
      - substr: http://192.99.219.222:82
    unless:
      - type: basename
        exact: api-test.js
      - type: basename
        regex: (?i)^(third-party-licenses|third_party_licenses|licenses?|notice)(\.[^.]+)?$

  # ── Postinstall node bootstrap ──
  - id: postinstall-node-script
    desc: Postinstall invokes node on JS file
    crit: component
    conf: 0.88
    if:
      type: text
      regex: "\"postinstall\"\\s*:\\s*\"node\\s+[a-zA-Z0-9_./-]{1,60}\\.js\""

  # ── Registry readme error ──
  - id: readme-error-no-data
    desc: Registry README reports no data found
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "\"readme\": \"ERROR: No README data found!\""

  # ── Empty description ──
  - id: empty-description
    desc: Registry metadata has empty description
    crit: component
    conf: 0.75
    if:
      type: text
      substr: "\"description\": \"\""

  # empty-author removed - use objectives/supply-chain/metadata-anomaly/registry::versioned-empty-author instead

  # ── Inflated version 10-89 range ──
  - id: inflated-version-10plus
    desc: Registry version major 10+
    crit: component
    conf: 0.7
    if:
      type: text
      regex: "\"version\"\\s*:\\s*\"[1-8][0-9]\\.[0-9]"

composite_rules:
  - id: hook-whoami-backticks
    desc: Hook uses `whoami` command substitution
    crit: component
    conf: 0.95
    any:
      - id: hook-whoami-backticks-core
      - id: hook-whoami-backticks-extra
  - id: hook-hostname-backticks
    desc: Hook uses `hostname` command substitution
    crit: component
    conf: 0.95
    any:
      - id: hook-hostname-backticks-core
      - id: hook-hostname-backticks-extra
  - id: hook-curl-exfil
    desc: Lifecycle hook runs curl command
    crit: component
    conf: 0.9
    attack: "T1041"
    any:
      - id: hook-curl-exfil-core
      - id: hook-curl-exfil-extra
  - id: hook-oast-domain
    desc: Lifecycle hook references OAST callback
    crit: suspicious
    conf: 0.97
    attack: "T1048"
    all:
      - id: untyped-registry-metadata
    any:
      - id: hook-oast-domain-main
      - id: hook-oast-domain-alt

  - id: hook-wget-exfil
    desc: Lifecycle hook runs wget command
    crit: component
    conf: 0.9
    attack: "T1041"
    any:
      - id: hook-wget-exfil-core
      - id: hook-wget-exfil-extra

  # ── Registry metadata indicator for untyped files ──
  - id: untyped-registry-metadata
    desc: Untyped file is npm registry metadata
    crit: component
    conf: 0.8
    any:
      - id: meta-json-basename
      - id: objectives/supply-chain/metadata-anomaly/registry::package-info-basename
      - id: npm-operational-internal
      - id: npm-user-field
      - id: dist-tarball-npmjs
    needs: 2

  # ── Install hooks in untyped registry metadata ──
  - id: untyped-registry-preinstall
    desc: Registry metadata has preinstall hook
    crit: notable
    conf: 0.88
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: preinstall-hook-present

  - id: untyped-registry-postinstall
    desc: Registry metadata has postinstall hook
    crit: notable
    conf: 0.88
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: postinstall-hook-present

  # ── Inflated version in registry metadata ──
  - id: inflated-version-registry
    desc: Registry metadata has inflated version number
    crit: suspicious
    conf: 0.88
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
    any:
      - id: inflated-version-9999
      - id: inflated-version-100plus
      - id: inflated-version-90plus

  # ── Dependency confusion: inflated version + preinstall ──
  - id: depconf-preinstall-inflated
    desc: Dependency confusion preinstall with inflated version
    crit: hostile
    conf: 0.96
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: preinstall-hook-present
    any:
      - id: inflated-version-9999
      - id: inflated-version-100plus
      - id: inflated-version-90plus
    needs: 1

  # ── Dependency confusion: inflated version + postinstall ──
  - id: depconf-postinstall-inflated
    desc: Dependency confusion postinstall with inflated version
    crit: hostile
    conf: 0.96
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: postinstall-hook-present
    any:
      - id: inflated-version-9999
      - id: inflated-version-100plus
      - id: inflated-version-90plus
    needs: 1

  # ── Install hook in untyped registry metadata ──
  - id: untyped-registry-install
    desc: Registry metadata has install hook
    crit: notable
    conf: 0.88
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: install-hook-present

  - id: untyped-registry-preinstall-install
    desc: Registry metadata duplicates install hooks
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: preinstall-hook-present
      - id: install-hook-present

  # ── Dependency confusion: inflated version + install hook ──
  - id: depconf-install-inflated
    desc: Dependency confusion install hook with inflated version
    crit: hostile
    conf: 0.96
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: install-hook-present
    any:
      - id: inflated-version-9999
      - id: inflated-version-100plus
      - id: inflated-version-90plus
    needs: 1

  # ── Install node bootstrap in tiny package ──
  - id: install-node-bootstrap-tiny
    desc: Install node script in tiny registry package
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: install-node-script
    any:
      - id: dist-filecount-1-to-4
      - id: dist-unpacked-under-4kb
    needs: 1

  # ── Self-identifying dependency confusion ──
  - id: dep-conf-registry-self-identified
    desc: Package self-identifies as dependency confusion
    crit: hostile
    conf: 0.99
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: readme-dep-confusion-self-id
    any:
      - id: install-hook-present
      - id: preinstall-hook-present
      - id: postinstall-hook-present
    needs: 1

  # ── Canary with exfil and ngrok ──
  - id: canary-exfil-ngrok
    desc: Canary beacon package with ngrok tunnel
    crit: hostile
    conf: 0.97
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: objectives/command-and-control/channel/tunnel/proxy::ngrok-name
    any:
      - id: readme-mentions-exfil-metadata
      - id: desc-harmless-canary-claim
      - id: readme-dep-confusion-self-id
    needs: 1

  # ── Fake research claim + install hook ──
  - id: fake-research-with-hook
    desc: Fake security research claim with install hook
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
    any:
      - id: preinstall-hook-present
      - id: postinstall-hook-present
      - id: install-hook-present
      - id: desc-security-research-claim
      - id: desc-harmless-canary-claim
    needs: 2

  # ── Preinstall node bootstrap in tiny package ──
  - id: preinstall-node-bootstrap-tiny
    desc: Preinstall node script in tiny registry package
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: preinstall-node-script
    any:
      - id: dist-filecount-1-to-4
      - id: dist-unpacked-under-4kb
      - id: readme-and-filename-empty
    needs: 1

  # ── Throwaway preinstall package (comprehensive) ──
  - id: throwaway-preinstall-registry
    desc: Throwaway preinstall bootstrap in sparse package
    crit: hostile
    conf: 0.95
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: preinstall-node-script
    any:
      - id: dist-filecount-1-to-4
      - id: dist-unpacked-under-4kb
      - id: readme-and-filename-empty
      - id: inflated-version-9999
      - id: inflated-version-100plus
      - id: desc-harmless-canary-claim
      - id: desc-security-research-claim
    needs: 3

  # ── Postinstall fallback chain ──
  - id: postinstall-fallback-chain
    desc: Registry postinstall chains npm run with fallbacks
    crit: suspicious
    conf: 0.93
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: postinstall-npm-run-fallback

  # ── Eval directory execution in registry metadata ──
  - id: eval-dir-in-registry
    desc: Registry script runs node in eval directory
    crit: suspicious
    conf: 0.95
    attack: "T1059.007"
    all:
      - id: untyped-registry-metadata
      - id: script-node-eval-dir

  # ── Hostile: postinstall fallback + eval dir ──
  - id: postinstall-eval-dropper
    desc: Postinstall fallback chain triggers eval payload
    crit: hostile
    conf: 0.96
    attack: "T1195.002"
    all:
      - id: untyped-registry-metadata
      - id: postinstall-npm-run-fallback
      - id: script-node-eval-dir

  # ── Suspicious deps + install hook ──
  - id: stealer-deps-with-postinstall
    desc: Stealer dependency combo with postinstall hook
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
