# PKGBUILD source-URL provenance anomalies (T1195.002) — the Arch/AUR analog of
# the npm repository-suspicious-urls atoms in this directory. A legitimate AUR
# package fetches from the upstream project's release page or a VCS forge; it
# never sources from a raw IP, an ephemeral file host, or a URL shortener.
# Those hosts point at attacker-controlled, mutable, or destination-hiding
# content and are high-signal that the source is not the genuine upstream.
defaults:
  platforms: [linux]
  for: [shell]
  attack: T1195.002

traits:
  - id: pkgbuild-source-ip-address
    desc: PKGBUILD sources from a raw IP address
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'source=[^)]{0,300}https?://(\d{1,3}\.){3}\d{1,3}'
      is: valid_ip

  - id: pkgbuild-source-ephemeral-host
    # 0x0.st / transfer.sh / file.io / termbin are throwaway upload services —
    # legitimate upstream tarballs never live there.
    desc: PKGBUILD sources from an ephemeral file host
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'source=[^)]{0,300}https?://[^)\s"'']{0,40}(0x0\.st|transfer\.sh|file\.io|termbin)'

  - id: pkgbuild-source-url-shortener
    desc: PKGBUILD sources via a URL shortener
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'source=[^)]{0,300}https?://[^)\s"'']{0,30}(bit\.ly|tinyurl|is\.gd|t\.co)/'
