# Manifest-vs-build version skew (T1195.002).
#
# A normal npm release is produced by one build: `package.json` is bumped and
# the build tool re-emits the dist artifacts, so every version string the build
# stamps agrees with the manifest. When a publish-account is hijacked the
# attacker edits `package.json` directly (bump the version, append a dependency)
# and republishes WITHOUT rebuilding -- so the dist artifacts still carry the
# previous version. The June 2026 Mastra scope-takeover is exactly this shape:
# the code and docs stayed at 1.0.2 while package.json jumped to 1.0.3 to ship
# the injected easy-day-js dropper dependency.
#
# Skew alone is only notable -- a maintainer who bumps the manifest but forgets
# to rebuild produces the same divergence (benign staleness). It becomes a
# strong tamper signal when paired with a freshly injected dependency, which is
# the manifest-only-edit fingerprint a real rebuild could not produce.
#
# Cross-file: the trait evaluates on the npm package archive (a .tgz, typed tar;
# the forager transport wrapper is a zip) and reaches each member's value tree
# through the `<basename>::` sibling prefix. It no-ops whenever either side is
# absent, so a package that ships no build-stamped version never fires.
defaults:
  platforms: [unix, windows]
  attack: T1195.002
  # npm = real .tgz package; tar = bare tarball; zip = forager transport
  # wrapper. Three concrete types -- at the value-matcher file-type cap.
  for: [npm, tar, zip]

traits:
  - id: npm-manifest-build-version-skew
    desc: package.json version differs from built doc
    crit: notable
    conf: 0.6
    if:
      type: value
      path: package.json::version
      ne: SOURCE_MAP.json::version
