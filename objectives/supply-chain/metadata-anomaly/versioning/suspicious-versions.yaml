defaults:
  platforms:
    - unix
    - windows
  for:
    - package.json
    - python
    - javascript
    - ruby
    - go
  crit: notable
  conf: 0.8
  attack: T1195.002
traits:
  - id: npm-version-0-0-0
    desc: npm package version is 0.0.0
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: version
      regex: ^0\.0(\.0)?$
    unless:
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-zero-version-benign-context
  - id: pypi-version-zero
    desc: PyPI package version is 0.0.0 or 0.0
    crit: notable
    conf: 0.85
    size_max: 50000
    if:
      type: text
      regex: version\s*=\s*['"]0\.0(\.0)?['"]
    unless:
      - type: basename
        regex: ^test_[^/]+\.py$
      - id: metadata/package/testing/presence::python-test-file
      - id: metadata/package/testing/presence::test-directory
      - type: text
        substr: "CPYTHON_TEST_"
  - id: gem-version-zero
    desc: RubyGem version is 0.0.0 or 0.0
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \.version\s*=\s*['"]0\.0(\.0)?['"]
  - id: npm-version-99-99-99
    desc: npm package version is 99.99.99
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: version
      exact: 99.99.99
  - id: npm-version-9999
    desc: npm package version starts with 9999
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: version
      regex: ^9999\.
  - id: npm-version-999
    desc: npm package version starts with 999
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: version
      regex: ^999\.
  - id: npm-version-test-suffix-a
    desc: npm version has test/dev suffix (set A)
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: version
      regex: -(test|dev|debug|local)$
      case_insensitive: true
  - id: npm-version-test-suffix-b
    desc: npm version has test/dev suffix (set B)
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: version
      regex: -(temp|tmp|placeholder)$
      case_insensitive: true
  - id: npm-version-many-zeros
    desc: npm package version has many zeros
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: version
      regex: ^0(\.0){3,}$
  - id: npm-version-exactly-1-0-0
    desc: npm package version is exactly 1.0.0
    crit: notable
    conf: 0.6
    if:
      type: kv
      path: version
      exact: 1.0.0
    unless:
      - type: kv
        path: repository.url
        regex: github\.com/
  - id: npm-version-inflated-major
    desc: npm package version has inflated major number
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: version
      regex: ^9[0-9]\.[0-9]+\.[0-9]+
  - id: npm-version-major-40-plus
    desc: npm package version major 40+
    crit: suspicious
    conf: 0.82
    if:
      type: kv
      path: version
      regex: ^([4-9][0-9]|[1-9][0-9]{2,})\.
    unless:
      - type: kv
        path: version
        regex: ^20[0-9]{2}\.[0-9]+\.[0-9]+$
      - id: metadata/package/fields::is-private
      - id: metadata/package/fields::official-react-native-package
      - id: metadata/package/testing/presence::test-fixture-directory
      - id: metadata/package/testing/presence::component-test-package-json
      - id: metadata/package/testing/presence::react-native-release-fixture-package
  - id: pypi-version-placeholder
    desc: PyPI package has placeholder version
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: version\s*=\s*['"]9+\.9+\.9+['"]
  - id: gem-version-placeholder
    desc: RubyGem has placeholder version
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \.version\s*=\s*['"]9+\.9+\.9+['"]
composite_rules:
  - id: npm-zero-version-benign-context
    desc: npm zero version with benign package context
    crit: baseline
    conf: 0.8
    any:
      - id: objectives/supply-chain/metadata-anomaly/scoring::npm-ct-fixture-name
      - id: metadata/package/testing/presence::component-test-package-json
      - id: metadata/package/testing/presence::install-fixture-package-json
      - id: objectives/supply-chain/metadata-anomaly/scoring::npm-native-addon-wrapper
      - id: metadata/package/fields::has-workspaces
      - id: metadata/package/fields::is-private
      - id: objectives/supply-chain/metadata-anomaly/manifest::npm-has-repository
      - id: objectives/supply-chain/metadata-anomaly/manifest::has-bugs-url
  - id: release-zero
    desc: Package version is 0.0.0 (placeholder)
    crit: suspicious
    conf: 0.85
    any:
      - id: npm-version-0-0-0
      - id: pypi-version-zero
      - id: gem-version-zero
  - id: npm-version-test-suffix
    desc: npm package version has test/dev suffix
    any:
      - id: npm-version-test-suffix-a
      - id: npm-version-test-suffix-b
  - id: fake-version-number
    desc: Package has fake or inflated version number
    crit: suspicious
    conf: 0.9
    any:
      - id: npm-version-99-99-99
      - id: npm-version-9999
      - id: npm-version-999
      - id: npm-version-many-zeros
      - id: pypi-version-placeholder
      - id: gem-version-placeholder
  - id: suspicious-version-patterns
    desc: Package has suspicious version patterns
    crit: suspicious
    conf: 0.85
    any:
      - id: release-zero
      - id: fake-version-number
      - id: npm-version-inflated-major
      - id: npm-version-major-40-plus
