defaults:
  platforms:
    - unix
    - windows
  for:
    - package.json
    - python
    - javascript
    - ruby
    - go
  crit: notable
  conf: 0.8
  attack: T1195.002
traits:
  - id: npm-version-0-0-0
    desc: npm package version is 0.0.0
    for: [package.json]
    crit: notable
    conf: 0.85
    if:
      type: value
      path: version
      regex: ^0\.0(\.0)?$
    unless:
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-zero-version-benign-context
  - id: npm-version-zero-prerelease
    desc: npm version 0.0.0 with prerelease tag
    for: [package.json]
    crit: notable
    conf: 0.8
    if:
      type: value
      path: version
      regex: ^0\.0\.0-
    unless:
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-zero-version-benign-context
  - id: pypi-version-zero
    desc: Python version assignment is 0.0.0 or 0.0
    crit: notable
    conf: 0.85
    size_max: 50000
    if:
      type: text
      regex: version\s*=\s*['"]0\.0(\.0)?['"]
    unless:
      - type: basename
        regex: ^test_[^/]+\.py$
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
      - id: micro-behaviors/os/service/legitimate::release-template-version-fallback
      - type: text
        substr: "CPYTHON_TEST_"
  - id: gem-version-zero
    desc: RubyGem version is 0.0.0 or 0.0
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \.version\s*=\s*['"]0\.0(\.0)?['"]
  - id: npm-version-99-99-99
    desc: npm package version is 99.99.99
    for: [package.json]
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: version
      exact: 99.99.99
  - id: npm-version-9999
    desc: npm package version starts with 9999
    for: [package.json]
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: version
      regex: ^9999\.
  - id: npm-version-999
    desc: npm package version starts with 999
    for: [package.json]
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: version
      regex: ^999\.
  - id: npm-version-test-suffix-a
    desc: npm version has test/dev suffix (set A)
    for: [package.json]
    crit: notable
    conf: 0.75
    if:
      type: value
      path: version
      regex: -(test|dev|debug|local)$
      case_insensitive: true
  - id: npm-version-test-suffix-b
    desc: npm version has test/dev suffix (set B)
    for: [package.json]
    crit: notable
    conf: 0.75
    if:
      type: value
      path: version
      regex: -(temp|tmp|placeholder)$
      case_insensitive: true
  - id: npm-version-exactly-1-0-0
    desc: npm package version is exactly 1.0.0
    for: [package.json]
    crit: notable
    conf: 0.6
    if:
      type: value
      path: version
      exact: 1.0.0
    unless:
      - type: value
        path: repository.url
        regex: github\.com/
  - id: npm-version-inflated-major
    desc: npm package version has inflated major number
    for: [package.json]
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: version
      regex: ^9[0-9]\.[0-9]+\.[0-9]+
  - id: npm-version-major-40-plus
    desc: npm package version major 40+
    for: [package.json]
    crit: suspicious
    conf: 0.82
    if:
      type: value
      path: version
      regex: ^([4-9][0-9]|[1-9][0-9]{2,})\.
    unless:
      - id: metadata/package/fields/version::calendar-version-date
      - id: metadata/package/fields/private::is-private
      - id: metadata/package/fields/freeform::official-react-native-package
      - id: metadata/package/testing/presence/harness::test-fixture-directory
      - id: metadata/package/testing/presence/fixture::component-test-package-json
      - id: metadata/package/testing/presence/fixture::react-native-release-fixture-package
  - id: pypi-version-placeholder
    desc: PyPI package has placeholder version
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: version\s*=\s*['"]9+\.9+\.9+['"]
  - id: gem-version-placeholder
    desc: RubyGem has placeholder version
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \.version\s*=\s*['"]9+\.9+\.9+['"]
  - id: archive-name-sentinel-version
    desc: package archive filename carries a sentinel version
    # Dependency-confusion tarballs are often hand-built with no inner
    # package.json, so the version-field traits above (type: value path:
    # version) have nothing to read. npm's canonical tarball naming —
    # <name>-<semver>.(tgz|zip) — still carries the version in the filename,
    # so flag the sentinel-high version (9999, 99.99.99, 999.x) there. The
    # engine should additionally decompose the stem into package.name /
    # package.version facts so the manifest traits can fire.
    crit: suspicious
    conf: 0.88
    for: [tar, zip]
    if:
      type: path
      basename: true
      regex: -(9999|999|99\.99\.99)(\.\d+)*\.(tgz|zip)$
composite_rules:
  - id: npm-zero-version-benign-context
    desc: npm zero version with benign package context
    crit: baseline
    conf: 0.8
    any:
      - id: objectives/supply-chain/metadata-anomaly/scoring
      - id: metadata/package/testing/presence/fixture::component-test-package-json
      - id: metadata/package/testing/presence/fixture::install-fixture-package-json
      - id: metadata/package/fields/workspaces::has-workspaces
      - id: metadata/package/fields/private::is-private
      - id: metadata/package/fields/repository::has-repository-evidence
      - id: metadata/package/fields/bugs::has-bugs-url-field
  - id: release-zero
    desc: Package version is 0.0.0 (placeholder)
    crit: suspicious
    conf: 0.85
    any:
      - id: npm-version-0-0-0
      - id: npm-version-zero-prerelease
      - id: pypi-version-zero
      - id: gem-version-zero
  - id: npm-version-test-suffix
    desc: npm package version has test/dev suffix
    any:
      - id: npm-version-test-suffix-a
      - id: npm-version-test-suffix-b
  - id: fake-version-number
    desc: Package has fake or inflated version number
    crit: suspicious
    conf: 0.9
    any:
      - id: npm-version-99-99-99
      - id: npm-version-9999
      - id: npm-version-999
      - id: pypi-version-placeholder
      - id: gem-version-placeholder
      - id: archive-name-sentinel-version
  - id: suspicious-version-patterns
    desc: Package has suspicious version patterns
    crit: suspicious
    conf: 0.85
    any:
      - id: release-zero
      - id: fake-version-number
      - id: npm-version-inflated-major
      - id: npm-version-major-40-plus
