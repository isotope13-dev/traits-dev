defaults:
  platforms:
    - unix
    - windows
  crit: notable
  attack: T1195.002
  mbc: E1195
  for:
    - python
    - pkginfo
traits:
  - id: suspicious-version-pattern
    desc: Suspicious version number
    crit: suspicious
    conf: 0.55
    for:
      - pkginfo
    size_max: 50000
    if:
      type: text
      regex: version.{0,50}=.{0,50}['"]0\.[0-9]{1,2}['"]
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::pytest-module
  - id: pkginfo-lowest-version
    desc: PKG-INFO with lowest possible version
    crit: notable
    conf: 0.65
    if:
      type: value
      path: version
      regex: ^0\.0(\.[0-9]+)?$
    unless:
      - id: metadata/package/testing/presence/fixture::piot-canary-fixture-package
  - id: setup-py-zero-minor-version
    desc: setup.py starts at 0.x version
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: version\s*=\s*['"]0\.[1-9][0-9]?['"]
  - id: pkginfo-zero-minor-version
    desc: PKG-INFO starts at 0.x version
    crit: notable
    conf: 0.72
    if:
      type: value
      path: version
      regex: ^0\.[1-9][0-9]?$
  - id: depconf-high-version-1
    desc: PKG version (100-999)
    if:
      type: value
      path: version
      regex: ^([1-9][0-9]{2})\.
  - id: depconf-high-version-2
    desc: PKG version (1000+)
    if:
      type: value
      path: version
      regex: ^([1-9][0-9]{3,})\.
    unless:
      - type: value
        path: version
        regex: ^20[0-9]{2}\.
  - id: setup-py-high-version
    desc: setup.py with abnormally high version number
    crit: suspicious
    conf: 0.85
    size_max: 50000
    if:
      type: text
      regex: (^|[\s(,])version.{0,30}=.{0,30}['"]([1-9][0-9]{2}|[1-9][0-9]{3,})\.
    not:
      - regex: "['\"]20[12][0-9]\\."
  - id: pkginfo-dev-version-1
    desc: PKG-INFO version contains dev/alpha/beta segment
    if:
      type: value
      path: version
      regex: (dev|alpha|beta)
      case_insensitive: true
  - id: pkginfo-dev-version-2
    desc: PKG-INFO version contains rc/pre/post release segment
    if:
      type: value
      path: version
      regex: (\brc\d|pre|post)
      case_insensitive: true
  - id: pkginfo-dev-version-3
    desc: PKG-INFO short alpha/beta marker
    if:
      type: value
      path: version
      regex: (^|[0-9.])(a|b)[0-9]
      case_insensitive: true
  - id: pkginfo-inflated-version
    desc: PKG-INFO with inflated version number
    crit: notable
    conf: 0.75
    if:
      type: value
      path: version
      regex: ^([5-9][0-9]|[1-9][0-9]{2,})\.
    unless:
      - type: value
        path: version
        regex: ^20[0-9]{2}\.
  - id: pkginfo-999-version
    desc: PKG-INFO with 999 version
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: version
      regex: ^999\.
  - id: pyproject-inflated-version
    desc: pyproject.toml with inflated version number
    crit: notable
    conf: 0.75
    if:
      type: value
      path: project.version
      regex: ^([5-9][0-9]|[1-9][0-9]{2,})\.
composite_rules:
  - id: depconf-high-version
    desc: PKG-INFO version with abnormally high major number
    crit: suspicious
    conf: 0.85
    any:
      - id: depconf-high-version-1
      - id: depconf-high-version-2
  - id: pkginfo-dev-version
    desc: PKG-INFO declares a pre-release or development version
    crit: notable
    conf: 0.8
    any:
      - id: pkginfo-dev-version-1
      - id: pkginfo-dev-version-2
      - id: pkginfo-dev-version-3
