defaults:
  platforms: [unix, windows]
  for: [manifests, scripts]

traits:
  - id: npm-ct-fixture-name
    for: [text]
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      type: string_literal
      exact: __cleave_missing_npm_ct_fixture_name__
  - id: npm-native-addon-wrapper
    for: [text]
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      type: string_literal
      exact: __cleave_missing_npm_native_addon_wrapper__
