defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [python, pkginfo, pyproject.toml]
composite_rules:
  - id: depconf-victim-indicators
    desc: Dependency confusion victim-targeting language
    crit: notable
    conf: 0.9
    attack: T1195.002
    platforms:
      - unix
      - windows
    any:
      - id: objectives/supply-chain/impersonation/depconf
  - id: pkginfo-no-description
    desc: PKG-INFO with empty or missing description
    crit: notable
    conf: 0.7
    platforms:
      - unix
      - windows
    any:
      - id: objectives/supply-chain/metadata-anomaly/description::pkginfo-no-description-body
      - id: objectives/supply-chain/metadata-anomaly/description::pkginfo-missing-description
  - id: pkginfo-low-effort-indicators
    desc: PKG-INFO with low-effort package indicators
    crit: notable
    conf: 0.7
    attack: T1036.005
    platforms:
      - unix
      - windows
    any:
      - id: objectives/supply-chain/metadata-anomaly/description::pkginfo-free-hosting-homepage
      - id: objectives/supply-chain/metadata-anomaly/description::pkginfo-security-claim
  - id: pkginfo-cloned-readme-body
    desc: PKG-INFO body with cloned library README content
    crit: notable
    conf: 0.8
    attack: T1036.005
    mbc: F0004
    platforms:
      - unix
      - windows
    any:
      - id: objectives/supply-chain/impersonation/cloned-body
  - id: suspicious-setup-metadata
    desc: Suspicious setup.py metadata
    crit: suspicious
    conf: 0.8
    attack: T1036.005
    needs: 3
    any:
      - id: objectives/supply-chain/metadata-anomaly/description::minimal-description
      - id: objectives/supply-chain/metadata-anomaly/author::placeholder-author
      - id: objectives/supply-chain/metadata-anomaly/author::generic-email
      - id: objectives/supply-chain/metadata-anomaly/versioning::suspicious-version-pattern
      - id: objectives/supply-chain/metadata-anomaly/description::typosquatting-keyword
      - id: objectives/supply-chain/metadata-anomaly/manifest::minimal-placeholder-setup
  - id: malware-setup-profile
    desc: Malicious setup.py profile
    crit: suspicious
    conf: 0.85
    attack: T1036.005
    mbc: F0004
    platforms:
      - unix
      - windows
    needs: 4
    any:
      - id: suspicious-setup-metadata
      - id: objectives/supply-chain/metadata-anomaly/description::empty-keywords
      - id: objectives/supply-chain/metadata-anomaly/manifest::empty-classifiers
      - id: objectives/supply-chain/metadata-anomaly/description::single-word-description
  - id: pkg-info-unknown-fields
    desc: PKG-INFO with UNKNOWN metadata fields
    crit: notable
    conf: 0.75
    attack: T1036.005
    mbc: F0004
    platforms:
      - unix
      - windows
    needs: 3
    any:
      - id: objectives/supply-chain/metadata-anomaly/description::unknown-summary
      - id: objectives/supply-chain/metadata-anomaly/description::unknown-homepage
      - id: objectives/supply-chain/metadata-anomaly/author::unknown-author
      - id: objectives/supply-chain/metadata-anomaly/manifest::unknown-license
      - id: objectives/supply-chain/metadata-anomaly/manifest::unknown-platform
      - id: objectives/supply-chain/metadata-anomaly/description::unknown-description
      - id: objectives/supply-chain/metadata-anomaly/author::unknown-author-email
  - id: pkginfo-all-unknown-metadata
    desc: PKG-INFO with all metadata fields UNKNOWN
    crit: notable
    conf: 0.9
    attack: T1195.002
    mbc: F0004
    platforms:
      - unix
      - windows
    all:
