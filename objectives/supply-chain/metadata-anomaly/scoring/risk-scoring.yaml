# Supply Chain Package Risk Scoring
# Combines multiple quality and security indicators for high-confidence detection
# Based on GuardDog methodology - multiple weak signals create strong detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"
  mbc: "E1195"
traits:
  - id: npm-ct-fixture-name
    desc: npm package uses ct fixture naming
    crit: component
    conf: 0.9
    for: [package.json]
    if:
      type: kv
      path: name
      regex: ^ct-[a-z0-9-]{1,40}$
  - id: npm-scoped-name
    desc: npm package uses a scoped name
    crit: baseline
    conf: 0.8
    for: [package.json]
    if:
      type: kv
      path: name
      regex: ^@.{1,50}/
composite_rules:
  - id: npm-dev-only-scoped-package
    desc: Scoped package with only dev dependencies
    crit: baseline
    conf: 0.8
    all:
      - id: npm-scoped-name
      - id: metadata/package/fields::has-dev-deps
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-no-runtime-dependencies
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
      - id: objectives/supply-chain/metadata-anomaly/dependency::direct-url-dependency
  - id: npm-low-quality-benign-context
    desc: Benign npm low-quality package context
    crit: baseline
    conf: 0.8
    any:
      - id: npm-ct-fixture-name
      - id: npm-dev-only-scoped-package
      - id: metadata/package/fields::is-private
      - id: metadata/package/fields::has-workspaces
      - id: objectives/supply-chain/metadata-anomaly/naming::npm-name-example
      - id: metadata/package/testing/presence::component-test-package-json
  # === Critical Risk: Multiple Major Red Flags (3+) ===

  # Requires name field to avoid FP on monorepo subpackage package.json files
  - id: npm-critical-risk-package
    desc: npm package with 4+ critical risk indicators
    crit: hostile
    conf: 0.98
    for: [package.json]
    size_min: 200
    all:
      - id: metadata/package/quality::npm-has-name
      - id: metadata/package/fields::npm-has-version
    any:
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
      - id: objectives/supply-chain/metadata-anomaly/versioning::release-zero
      - id: metadata/package/quality::npm-empty-description-any
      - id: objectives/supply-chain/metadata-anomaly/author::npm-generic-author-name
      - id: objectives/supply-chain/metadata-anomaly/author::npm-suspicious-email-domain
      - id: objectives/supply-chain/metadata-anomaly/dependency::direct-url-dependency
      - id: metadata/package/quality::npm-no-author
    needs: 4
    unless:
      - id: objectives/supply-chain/metadata-anomaly/scoring::npm-native-addon-wrapper
    downgrade:
      any:
        - id: objectives/supply-chain/metadata-anomaly/scoring::npm-optional-deps-orchestrator
        - id: metadata/package/fields::is-private
        - id: metadata/package/fields::minimal-cli-stub
  # === High Risk: Install Hooks + 2 Quality Issues ===
  - id: npm-install-hooks-low-quality
    desc: Install hooks with 2+ quality issues
    crit: hostile
    conf: 0.96
    for: [package.json]
    size_min: 200
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
    any:
      - id: objectives/supply-chain/metadata-anomaly/versioning::release-zero
      - id: metadata/package/quality::npm-empty-description-any
      - id: objectives/supply-chain/metadata-anomaly/author::npm-generic-author-name
      - id: objectives/supply-chain/metadata-anomaly/author::npm-free-email-provider
    needs: 2
    downgrade:
      any:
        - id: metadata/package/fields::minimal-cli-stub
  # === High Risk: URL Dependency + Quality Issues ===
  - id: npm-url-dependency-low-quality
    desc: Direct URL dependency with quality issues
    crit: hostile
    conf: 0.94
    for: [package.json]
    all:
      - id: objectives/supply-chain/metadata-anomaly/dependency::direct-url-dependency
    any:
      - id: objectives/supply-chain/metadata-anomaly/versioning::release-zero
      - id: metadata/package/quality::npm-empty-description-any
      - id: objectives/supply-chain/metadata-anomaly/author::npm-generic-author-name
      - id: objectives/supply-chain/metadata-anomaly/author::npm-suspicious-email-domain
    needs: 2
  # === High Risk: Fake Version + Multiple Issues ===
  - id: npm-fake-version-suspicious
    desc: Fake version number with suspicious patterns
    crit: hostile
    conf: 0.93
    for: [package.json]
    all:
      - id: objectives/supply-chain/metadata-anomaly/versioning::fake-version-number
    any:
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
      - id: metadata/package/quality::npm-empty-description-any
      - id: objectives/supply-chain/metadata-anomaly/author::npm-generic-author-name
      - id: objectives/supply-chain/metadata-anomaly/author::npm-free-email-provider
      - id: objectives/supply-chain/metadata-anomaly/dependency::direct-url-dependency
    needs: 2
  # Requires name field to avoid FP on monorepo subpackage package.json files
  - id: npm-low-quality-package
    # === Suspicious: Multiple Quality Issues (no hooks) ===

    desc: npm package with 4+ quality issues
    crit: suspicious
    conf: 0.88
    for: [package.json]
    all:
      - id: metadata/package/quality::npm-has-name
      - id: metadata/package/fields::npm-has-version
    any:
      - id: objectives/supply-chain/metadata-anomaly/versioning::suspicious-version-patterns
      - id: metadata/package/quality::npm-empty-description-any
      - id: objectives/supply-chain/metadata-anomaly/author::npm-generic-author-name
      - id: objectives/supply-chain/metadata-anomaly/author::npm-free-email-provider
      - id: metadata/package/quality::npm-no-author
      - id: metadata/package/quality::npm-no-license
      - id: metadata/package/quality::npm-empty-homepage
      - id: metadata/package/quality::npm-no-keywords
    needs: 4
    unless:
      - id: npm-low-quality-benign-context
    downgrade:
      any:
        - id: metadata/package/fields::pkg-skeleton-small
  # === Typosquatting Combinations ===
  - id: npm-typosquat-with-hooks
    desc: Typosquatting indicators with install hooks
    crit: hostile
    conf: 0.98
    for: [package.json]
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming::name-theft-target-combo
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
  # === Typosquatting with low quality metadata ===
  - id: npm-typosquat-low-quality
    desc: Typosquatting with low quality metadata
    crit: hostile
    conf: 0.95
    for: [package.json]
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming::name-theft-target-combo
    any:
      - id: objectives/supply-chain/metadata-anomaly/versioning::release-zero
      - id: metadata/package/quality::npm-empty-description-any
      - id: objectives/supply-chain/metadata-anomaly/author::npm-generic-author-name
      - id: objectives/supply-chain/metadata-anomaly/author::npm-suspicious-email-domain
    needs: 2
  # === PyPI Risk Scoring ===
  - id: pypi-critical-risk-package
    desc: PyPI package with 3+ critical risk indicators
    crit: hostile
    conf: 0.96
    for: [python]
    any:
      - id: objectives/supply-chain/metadata-anomaly/dependency::pypi-install-hooks-any
      - id: objectives/supply-chain/metadata-anomaly/versioning::release-zero
      - id: metadata/package/quality::pypi-empty-description
      - id: objectives/supply-chain/metadata-anomaly/author::pypi-generic-author-name
      - id: objectives/supply-chain/metadata-anomaly/author::pypi-author-temp-mail
      - id: metadata/package/quality::pypi-empty-author
    needs: 3
  # === PyPI install hooks with quality issues ===
  - id: pypi-install-hooks-low-quality
    desc: PyPI install hooks with quality issues
    crit: hostile
    conf: 0.94
    for: [python]
    all:
      - id: objectives/supply-chain/metadata-anomaly/dependency::pypi-install-hooks-any
    any:
      - id: objectives/supply-chain/metadata-anomaly/versioning::release-zero
      - id: metadata/package/quality::pypi-empty-description
      - id: objectives/supply-chain/metadata-anomaly/author::pypi-generic-author-name
      - id: objectives/supply-chain/metadata-anomaly/author::pypi-free-email-provider
    needs: 2
  # === PyPI typosquatting with install hooks ===
  - id: pypi-typosquat-with-hooks
    desc: PyPI typosquatting with install hooks
    crit: hostile
    conf: 0.98
    for: [python]
    all:
      - id: objectives/supply-chain/impersonation::pypi-typosquat-attack
      - id: objectives/supply-chain/metadata-anomaly/dependency::pypi-install-hooks-any
  # === RubyGems Risk Scoring ===
  - id: gem-critical-risk-package
    desc: RubyGem with 3+ critical risk indicators
    crit: hostile
    conf: 0.96
    for: [ruby]
    any:
      - id: objectives/supply-chain/metadata-anomaly/versioning::release-zero
      - id: metadata/package/quality::gem-empty-description
      - id: objectives/supply-chain/metadata-anomaly/author::gem-generic-author-name
      - id: objectives/supply-chain/metadata-anomaly/author::gem-free-email-provider
      - id: metadata/package/quality::gem-empty-author
    needs: 3
  # === Stealth Package Indicators ===
  - id: npm-stealth-malware-indicators
    desc: Skeletal 1.0.0 package with install hooks
    crit: notable
    conf: 0.92
    for: [package.json]
    size_min: 200
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
      - id: metadata/package/quality::npm-empty-description-any
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-version-exactly-1-0-0
      - id: metadata/package/quality::npm-no-author
    downgrade:
      any:
        - id: metadata/package/fields::minimal-cli-stub
  # === Throwaway Package Indicators ===
  - id: npm-throwaway-package
    desc: Throwaway/test package with hooks
    crit: hostile
    conf: 0.96
    for: [package.json]
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
    any:
      - id: objectives/supply-chain/metadata-anomaly/author::pypi-author-temp-mail
      - id: objectives/supply-chain/metadata-anomaly/versioning::release-zero
      - id: objectives/supply-chain/metadata-anomaly/author::npm-generic-author-name
    unless:
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-monorepo-workspace-dep
  # === Professional Malware Indicators ===
  - id: npm-sophisticated-supply-chain-attack
    desc: Sophisticated supply chain attack patterns
    crit: hostile
    conf: 0.99
    for: [package.json]
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
      - id: objectives/supply-chain/metadata-anomaly/dependency::direct-url-dependency
    any:
      - id: objectives/supply-chain/metadata-anomaly/naming::name-theft-target-combo
      - id: objectives/supply-chain/metadata-anomaly/author::npm-suspicious-email-domain
  # === Dependency Confusion Attack Patterns ===
  - id: npm-dependency-confusion-candidate
    desc: Potential dependency confusion attack
    crit: hostile
    conf: 0.92
    for: [package.json]
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-version-inflated-major
      - id: metadata/package/quality::npm-empty-description-any
  # === Helper: Platform-Specific Native Addon Wrapper ===
  # Packages that publish a single native .node payload for one platform often use
  # thin metadata manifests and placeholder versions inside a monorepo release flow.
  - id: npm-native-addon-wrapper
    desc: Platform-specific native Node addon wrapper package
    crit: component
    conf: 0.9
    for: [package.json]
    all:
      - id: metadata/package/fields::pkg-main-native-node
      - id: metadata/package/fields::has-files-field
      - id: metadata/package/fields::has-platform-restrictions
      - id: metadata/package/fields::has-engines
    any:
      - id: objectives/supply-chain/metadata-anomaly/manifest::repository-key
      - id: objectives/supply-chain/metadata-anomaly/manifest::repo-url-git-host
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
      - id: objectives/supply-chain/metadata-anomaly/dependency::direct-url-dependency
  # === Helper: Optional-Deps Orchestration Package ===
  # Platform-specific native module wrappers (e.g., @esbuild/win32-x64, @rollup/darwin-arm64)
  # declare only optionalDependencies and no install hooks. They are legitimate packages
  # that merely coordinate which platform-specific binary gets installed.
  - id: npm-optional-deps-orchestrator
    desc: Platform-specific optional-deps orchestrator package
    crit: notable
    conf: 0.85
    for: [package.json]
    all:
      - id: metadata/package/fields::has-optional-deps
      - id: metadata/package/fields::has-platform-restrictions
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
      - id: objectives/supply-chain/metadata-anomaly/dependency::direct-url-dependency
    any:
      - id: objectives/supply-chain/metadata-anomaly/manifest::npm-has-repository
      - id: objectives/supply-chain/metadata-anomaly/manifest::has-homepage
      - id: metadata/package/fields::has-author-email
      - id: metadata/package/fields::has-keywords
