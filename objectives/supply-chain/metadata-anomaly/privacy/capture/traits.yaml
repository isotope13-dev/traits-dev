defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.92

composite_rules:
  - id: broad-extension-injection-surface
    desc: Extension exposes broad injection surface
    crit: component
    conf: 0.94
    any:
      - id: objectives/supply-chain/metadata-anomaly/permissions/content-injection::content-script-all-http-sites
      - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::broad-content-injection
  - id: browser-media-capture-permission
    desc: Extension requests browser capture permission
    crit: component
    conf: 0.94
    any:
      - id: objectives/supply-chain/metadata-anomaly/permissions/tab-capture::permission-tab-capture
      - id: objectives/supply-chain/metadata-anomaly/permissions/desktop-capture::permission-desktop-capture
  - id: broad-capture-extension
    desc: Extension combines broad injection and capture
    crit: notable
    conf: 0.94
    all:
      - id: metadata/package/chrome-extension::is-chrome-manifest
      - id: broad-extension-injection-surface
      - id: browser-media-capture-permission
  - id: broad-capture-cloud-extension
    desc: Extension combines broad capture and cloud identity
    crit: notable
    conf: 0.95
    all:
      - id: broad-capture-extension
      - id: objectives/supply-chain/metadata-anomaly/permissions/identity::google-drive-identity-permission
    any:
      - id: metadata/package/chrome-extension::externally-connectable
      - id: objectives/supply-chain/metadata-anomaly/permissions/dnr::permission-declarative-net-request
