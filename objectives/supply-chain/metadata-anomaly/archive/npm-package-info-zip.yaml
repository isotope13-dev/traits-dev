defaults:
  for: [data]
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"

traits:
  - id: npm-package-info-member
    desc: Archive contains npm sidecar snapshot
    crit: suspicious
    conf: 0.95
    if:
      type: basename
      regex: '^package_info-[a-z0-9-]{1,80}-[0-9]+\.[0-9]+\.[0-9]+\.json$'

  - id: npm-index-member
    desc: Archive contains index entrypoint
    crit: component
    conf: 0.88
    if:
      type: basename
      exact: index.js

  - id: npm-writer-member
    desc: Archive contains writer helper
    crit: suspicious
    conf: 0.95
    if:
      type: basename
      exact: writer.js

  - id: npm-private-prepare-writer-member
    desc: Archive contains prepare-writer helper
    crit: suspicious
    conf: 0.98
    if:
      type: basename
      regex: '(^|/)prepare-writer\.js$'

  - id: npm-commitlint-member
    desc: Archive contains commitlint config
    crit: notable
    conf: 0.9
    if:
      type: basename
      exact: commitlint.config.js

  - id: npm-private-helper-layout
    desc: Archive hides helper in private tree
    crit: suspicious
    conf: 0.97
    if:
      type: basename
      regex: 'package/lib/private/prepare-writer\.js$'

  - id: npm-writer-layout
    desc: Archive exposes writer helper path
    crit: suspicious
    conf: 0.94
    if:
      type: basename
      regex: 'package/lib/writer\.js$'

  - id: macos-temp-staging-path
    desc: Archive preserves macOS temp staging path
    crit: suspicious
    conf: 0.96
    if:
      type: basename
      regex: 'var/folders/[a-z]{2}/[A-Za-z0-9_]+/T/tmp[a-z0-9]+/.{1,80}/package/'

composite_rules:
  - id: npm-package-info-archive
    desc: Archive pairs npm package with sidecar snapshot
    crit: suspicious
    conf: 0.97
    all:
      - id: npm-package-info-member
      - id: metadata/package/files::package-json-basename
      - id: npm-index-member

  - id: npm-private-helper-chain
    desc: Archive exposes writer to private helper chain
    crit: suspicious
    conf: 0.985
    all:
      - id: npm-package-info-archive
      - id: npm-writer-member
      - id: npm-private-prepare-writer-member
      - id: npm-private-helper-layout
      - id: npm-writer-layout

  - id: npm-camouflaged-private-helper-chain
    desc: Archive preserves staged helper-chain npm package
    crit: hostile
    conf: 0.992
    mbc: "B0024"
    all:
      - id: npm-private-helper-chain
      - id: macos-temp-staging-path
    any:
      - id: npm-commitlint-member
      - id: metadata/package/files::package-json-basename
    needs: 1
