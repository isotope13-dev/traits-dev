# Cargo crate package-name anomalies (offensive-tooling / malware-themed names).
defaults:
  platforms:
  - unix
  - windows
  for:
  - cargo.toml
traits:
- id: cargo-package-name-amsi
  desc: Cargo package named AMSI
  crit: component
  conf: 0.9
  if:
    type: value
    path: package.name
    exact: amsi
- id: cargo-package-name-syscalls
  desc: Cargo package named syscalls
  crit: component
  conf: 0.88
  if:
    type: value
    path: package.name
    exact: syscalls
- id: cargo-package-name-apc
  desc: Cargo package named APC
  crit: component
  conf: 0.88
  if:
    type: value
    path: package.name
    exact: apc
- id: cargo-package-name-thread-hijack
  desc: Cargo package names thread hijacking
  crit: component
  conf: 0.88
  if:
    type: value
    path: package.name
    regex: '(?i)thread.?hijack'
- id: cargo-package-name-function-stomp
  desc: Cargo package names function stomping
  crit: component
  conf: 0.88
  if:
    type: value
    path: package.name
    regex: '(?i)function.?stomp'
- id: cargo-package-name-hidden-vnc
  desc: Cargo package named hidden VNC
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: package.name
    exact: hidden-vnc
- id: cargo-package-name-ransomware
  desc: Cargo package names ransomware
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: package.name
    regex: '(?i)ransomware'
- id: cargo-package-name-encrypt
  desc: Cargo package name references encryption
  crit: component
  conf: 0.84
  if:
    type: value
    path: package.name
    regex: '(?i)encrypt'
