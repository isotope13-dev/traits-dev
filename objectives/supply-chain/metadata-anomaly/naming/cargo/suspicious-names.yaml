      - id: cargo-name-anti-av-patch
      - id: cargo-name-anti-av-surface
      - id: cargo-name-defender-uac-bypass
      - id: cargo-name-anti-debug
      - id: cargo-name-process-injection
      - id: cargo-name-dll-injection
      - id: cargo-name-apc-queue
