      - id: cargo-name-credential-dumper
      - id: cargo-name-rootkit
      - id: cargo-name-offensive-windows-internals
      - id: cargo-name-pe-loader-internals
      - id: cargo-name-iat-or-function-stomping
      - id: cargo-name-nt-process-control
      - id: cargo-name-windows-internals-profile
      - id: cargo-name-nt-networking
      - id: cargo-name-patchless-bypass
      - id: cargo-name-dll-evasion
      - id: cargo-name-hook-evasion
      - id: cargo-name-self-delete
      - id: cargo-name-polymorphic-evasion
      - id: cargo-name-payload-obfuscation
