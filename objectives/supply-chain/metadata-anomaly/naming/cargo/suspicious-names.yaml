# Cargo Package Naming - Suspicious Patterns
defaults:
  platforms: [unix, windows]
  for: [cargo.toml]
  crit: notable
  conf: 0.75
  attack: "T1195.002"
traits:
  # === Cargo package names ===
  - id: cargo-name-anti-av-bypass
    desc: Cargo name references AMSI or ETW bypass
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: package.name
      regex: '(?i)amsi.{0,40}(bypass|hbp)|bypass.{0,40}amsi'
  - id: cargo-name-anti-av-patch
    desc: Cargo name references AV patching
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: package.name
      regex: '(?i)(amsi|etw).{0,40}(patch|muffle)'
  - id: cargo-name-anti-av-surface
    desc: Cargo name references AV surface
    crit: component
    conf: 0.84
    if:
      type: value
      path: package.name
      regex: '(?i)^(amsi|etw)$'
  - id: cargo-name-defender-uac-bypass
    desc: Cargo name references UAC bypass
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)(undefend|uac.{0,20}bypass)'
  - id: cargo-name-anti-debug
    desc: Cargo name references anti-debugging
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)(processdebugport|debug.?teb|kiuserexception)'
  - id: cargo-name-process-injection
    desc: Cargo name references process injection
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: package.name
      regex: '(?i)(process.?hollow|apc.{0,30}inject|local.?mapping.?injection)'
  - id: cargo-name-dll-injection
    desc: Cargo name references DLL injection
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: package.name
      regex: '(?i)dll.?inject(or)?'
  - id: cargo-name-apc-queue
    desc: Cargo name references APC queueing
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)(apc.?queue|rfs.?ebapc.?rmi)'
  - id: cargo-name-remote-thread-hijack
    desc: Cargo name references thread hijacking
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: package.name
      regex: '(?i)remote.?process.?thread.?hijack'
  - id: cargo-name-module-stomping
    desc: Cargo name references module stomping
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)module.?stomp'
  - id: cargo-name-direct-process-inject
    desc: Cargo name references process injection
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)inject.{0,20}(local|remote)process'
  - id: cargo-name-shellcode-api-exec
    desc: Cargo name references shellcode execution API
    crit: suspicious
    conf: 0.84
    if:
      type: value
      path: package.name
      regex: '(?i)(ldrenumerate|enumwindows|copyfileex|cdeffoldermenu)'
  - id: cargo-name-shellcode-exec
    desc: Cargo name references shellcode execution
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: package.name
      regex: '(?i)(shellcode|certenum|threadpoolwait)'
  - id: cargo-name-fiber-shellcode-exec
    desc: Cargo name references fiber shellcode
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)(rtlfiber|rtluserfiber)'
  - id: cargo-name-syscall-evasion
    desc: Cargo name references syscall evasion
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: package.name
      regex: '(?i)(syscall|tartarusgate|recycledgate|hell.?gate)'
  - id: cargo-name-credential-dumper
    desc: Cargo name references credential dumping
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: package.name
      regex: '(?i)(password.?dumper|creds?.?dumper)'
  - id: cargo-name-rootkit
    desc: Cargo name references rootkit
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: package.name
      regex: '(?i)rootkit'
  - id: cargo-name-offensive-windows-internals
    desc: Cargo name references Windows internals
    crit: suspicious
    conf: 0.84
    if:
      type: value
      path: package.name
      regex: '(?i)(api.?hook|dynamic.?resolver|peb.?offset|ppid.?spoof)'
  - id: cargo-name-pe-loader-internals
    desc: Cargo name references PE loader internals
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)(pe.?mapper|pe.?fluctuation)'
  - id: cargo-name-iat-or-function-stomping
    desc: Cargo name references IAT stomping
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)(iat.?obfuscation|function.?stomp)'
  - id: cargo-name-nt-process-control
    desc: Cargo name references NT process control APIs
    crit: suspicious
    conf: 0.82
    if:
      type: value
      path: package.name
      regex: '(?i)(ntsetinformationprocess|ntquerysysteminformation)'
  - id: cargo-name-process-enumeration
    desc: Cargo name references process enumeration
    crit: component
    conf: 0.82
    if:
      type: value
      path: package.name
      regex: '(?i)process.?enumerat'
  - id: cargo-name-nt-networking
    desc: Cargo name references NT socket APIs
    crit: suspicious
    conf: 0.82
    if:
      type: value
      path: package.name
      regex: '(?i)^nt.?sockets?$'
  - id: cargo-name-patchless-bypass
    desc: Cargo name references patchless bypass
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)patchless.{0,20}bypass|bypass.{0,20}patchless'
  - id: cargo-name-dll-evasion
    desc: Cargo name references DLL evasion
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)(hide.?dll|proxy.?dll|dll.?proxy|winhttps?dll)'
  - id: cargo-name-hook-evasion
    desc: Cargo package name references hook discovery
    crit: suspicious
    conf: 0.84
    if:
      type: value
      path: package.name
      regex: '(?i)hook.?finder'
  - id: cargo-name-self-delete
    desc: Cargo package name references self deletion
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)self.?erase'
  - id: cargo-name-polymorphic-evasion
    desc: Cargo name references polymorphic evasion
    crit: suspicious
    conf: 0.84
    if:
      type: value
      path: package.name
      regex: '(?i)(poly.?rust|stack.?encrypt|silent.?fart|vectored.?overloading)'
  - id: cargo-name-payload-obfuscation
    desc: Cargo name references payload obfuscation
    crit: suspicious
    conf: 0.84
    if:
      type: value
      path: package.name
      regex: '(?i)(payload.?shuffling|link.?obfuscator|dirty.?vanity)'
  - id: cargo-name-payload-shuffling
    desc: Cargo name references payload shuffling
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)payload.?shuffling'
  - id: cargo-name-api-hashing
    desc: Cargo name references API hashing
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)api.?hash(er|ing)?'
  - id: cargo-name-manual-map
    desc: Cargo name references manual mapping
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)manual.?map'
  - id: cargo-name-dinvoke
    desc: Cargo name references DInvoke
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.name
      regex: '(?i)dinvoke'
  - id: cargo-name-collection-tooling
    desc: Cargo name references collection tooling
    crit: suspicious
    conf: 0.84
    if:
      type: value
      path: package.name
      regex: '(?i)(wifi.?dump|clipbo.{0,4}d.?mon|hash.?miner|usb.?mon)'
  - id: cargo-name-keylogger
    desc: Cargo name references keylogging
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: package.name
      regex: '(?i)key.?logg?er'
  - id: cargo-name-resource-payload-fetch
    desc: Cargo name references manual resource payload fetching
    crit: suspicious
    conf: 0.82
    if:
      type: value
      path: package.name
      regex: '(?i)manual.?rsrc.?data.?fetch'
  - id: cargo-name-whoami-probe
    desc: Cargo name references whoami probing
    crit: component
    conf: 0.82
    if:
      type: value
      path: package.name
      regex: '(?i)^whoami([-_].{1,20})?$'
composite_rules:
  # === Cargo Composites ===
  - id: cargo-name-process-injection-profile
    desc: Cargo name references injection technique
    crit: suspicious
    conf: 0.88
    any:
      - id: cargo-name-process-injection
      - id: cargo-name-dll-injection
      - id: cargo-name-apc-queue
      - id: cargo-name-remote-thread-hijack
      - id: cargo-name-module-stomping
      - id: cargo-name-direct-process-inject
  - id: cargo-name-windows-internals-profile
    desc: Cargo name references Windows internals
    crit: suspicious
    conf: 0.86
    any:
      - id: cargo-name-offensive-windows-internals
      - id: cargo-name-pe-loader-internals
      - id: cargo-name-iat-or-function-stomping
      - id: cargo-name-nt-process-control
  - id: cargo-maldev-name
    desc: Cargo name suggests malware development
