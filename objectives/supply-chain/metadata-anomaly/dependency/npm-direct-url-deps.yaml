# Direct URL Dependencies - npm
# GuardDog-inspired: Detects packages with direct URL/Git dependencies
# These dependencies are not immutable and can be used to inject untrusted code
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# MBC: E1195 (Supply Chain Compromise)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
  crit: suspicious
  conf: 0.85
  attack: "T1195.002"
  mbc: "E1195"
traits:
  - id: dep-https-url-kv
    desc: Dependency value uses HTTPS URL
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: dependencies.*
      regex: '^https://'
  - id: devdep-https-url-kv
    desc: DevDependency value uses HTTPS URL
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: devDependencies.*
      regex: '^https://'
  - id: dep-http-url-kv
    desc: Dependency value uses HTTP URL
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: dependencies.*
      regex: '^http://'
  - id: devdep-http-url-kv
    desc: DevDependency value uses HTTP URL
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: devDependencies.*
      regex: '^http://'
  # Direct HTTP URL in dependencies
  - id: dep-http-url
    desc: Dependency using HTTPS URL
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}https://'
  - id: devdep-http-url
    desc: DevDependency using HTTPS URL
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '"devDependencies"\s*:\s*\{[^}]{0,1000}https://'
    downgrade:
      any:
        - id: metadata/package/fields::is-private
  # git:// protocol
  - id: dep-git-url
    desc: Dependency using git:// URL
    crit: suspicious
    conf: 0.90
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}git://'
  # git+ssh://
  - id: dep-git-ssh-url
    desc: Dependency using git+ssh:// URL
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}git\+ssh://'
  # git+http:// or git+https://
  - id: dep-git-http-url
    desc: Dependency using git+http(s):// URL
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}git\+https?://'
  # git+file://
  - id: dep-git-file-url
    desc: Dependency using git+file:// URL
    crit: suspicious
    conf: 0.90
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}git\+file://'
  # GitHub shorthand: "user/repo"
  - id: dep-github-shorthand
    desc: Dependency using GitHub shorthand
    crit: suspicious
    conf: 0.80
    if:
      type: text
      regex: '"dependencies".{0,5}\{.{0,200}:\s*"[a-zA-Z0-9_.-]+/'
    not:
      - substr: "http"
      - substr: "git://"
  - id: devdep-github-shorthand
    desc: DevDependency using GitHub shorthand
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '"devDependencies".{0,5}\{.{0,200}:\s*"[a-zA-Z0-9_.-]+/'
    not:
      - substr: "http"
      - substr: "git://"
  # Direct tarball URLs
  - id: dep-tarball-url
    desc: Dependency using direct tarball URL
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{.{0,1000}\.tgz"'
  # file:// protocol
  - id: dep-file-protocol
    desc: Dependency using file:// protocol
    crit: notable
    conf: 0.70
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}file://'
  # Relative paths
  - id: dep-relative-path
    desc: Dependency using relative path
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: '"dependencies".{0,5}\{.{0,500}:\s*"\.\.?/'
  # Plain HTTP (not HTTPS) dependency
  - id: dep-plaintext-http
    desc: Dependency fetched over plain HTTP
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{[^}]{0,1000}"http://'
  - id: devdep-plaintext-http
    desc: DevDependency fetched over plain HTTP
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"devDependencies"\s*:\s*\{[^}]{0,1000}"http://'
  - id: dep-securityctrl-url
    desc: Dependency URL uses securityctrl host
    crit: suspicious
    conf: 0.98
    if:
      type: kv
      path: dependencies.*
      regex: '^https://.{0,40}securityctrl\.com/'
  - id: dep-single-https-url
    desc: Dependencies contain single HTTPS URL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{\s*".{1,80}"\s*:\s*"https://.{1,160}"\s*\}'
composite_rules:
  # Any HTTP/HTTPS URL in dependencies
  - id: http-url-dependency
    desc: Package depends on HTTPS URL
    crit: notable
    conf: 0.8
    any:
      - id: dep-https-url-kv
      - id: devdep-https-url-kv
      - id: dep-http-url
      - id: dep-tarball-url
  # Any Git URL
  - id: git-url-dependency
    desc: Package depends on Git URL
    crit: suspicious
    conf: 0.85
    any:
      - id: dep-git-url
      - id: dep-git-ssh-url
      - id: dep-git-http-url
      - id: dep-git-file-url
  # Direct URL Dependency (all types)
  - id: direct-url-dependency
    desc: Package has direct URL dependencies
    crit: suspicious
    conf: 0.85
    any:
      - id: http-url-dependency
      - id: git-url-dependency
      - id: dep-github-shorthand
  # Multiple URL dependencies
  - id: multiple-url-dependencies
    desc: Package has multiple direct URL deps
    crit: hostile
    conf: 0.90
    needs: 2
    any:
      - id: dep-http-url
      - id: dep-git-url
      - id: dep-git-ssh-url
      - id: dep-git-http-url
      - id: dep-github-shorthand
      - id: dep-tarball-url
  # URL dependency with install hooks
  - id: url-dependency-with-hooks
    desc: Direct URL dependency with install hooks
    crit: hostile
    conf: 0.98
    all:
      - id: direct-url-dependency
      - id: objectives/supply-chain/metadata-anomaly/manifest::install-hooks
  # Plain HTTP dep composite
  - id: plaintext-http-dependency
    desc: Dependency fetched over plain HTTP
    crit: suspicious
    conf: 0.95
    any:
      - id: dep-http-url-kv
      - id: devdep-http-url-kv
      - id: dep-plaintext-http
      - id: devdep-plaintext-http
  - id: runtime-url-dependency
    desc: Runtime dependency uses remote URL
    crit: component
    conf: 0.95
    any:
      - id: dep-http-url-kv
      - id: dep-https-url-kv
      - id: dep-plaintext-http
      - id: dep-http-url
  - id: dev-url-dependency
    desc: Dev dependency uses remote URL
    crit: component
    conf: 0.95
    any:
      - id: devdep-http-url-kv
      - id: devdep-https-url-kv
      - id: devdep-plaintext-http
      - id: devdep-http-url
  - id: runtime-and-dev-url-dependency
    desc: Remote dependency appears in runtime and dev scopes
    crit: suspicious
    conf: 0.95
    all:
      - id: runtime-url-dependency
      - id: dev-url-dependency
  - id: duplicated-plaintext-http-dependency
    desc: Plain HTTP dependency in runtime and dev scopes
    crit: hostile
    conf: 0.985
    all:
      - id: dep-plaintext-http
      - id: devdep-plaintext-http
    unless:
      - id: metadata/package/fields::is-private
  - id: inflated-version-anomaly
    desc: Package shows inflated version anomaly
    crit: component
    conf: 0.9
    any:
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-version-major-40-plus
      - id: metadata/package/fields::npm-unrealistic-major-version
  - id: duplicated-plaintext-http-minimal
    desc: Minimal package duplicates plain HTTP dependency
    crit: hostile
    conf: 0.995
    all:
      - id: duplicated-plaintext-http-dependency
      - id: inflated-version-anomaly
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::pkg-no-description-short
  - id: url-dep-minimal-metadata
    desc: URL dependency with minimal package metadata
    crit: hostile
    conf: 0.95
    all:
      - id: direct-url-dependency
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::pkg-no-description-short
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest::npm-has-repository
  - id: inflated-single-url-dependency
    desc: Inflated version with single URL dependency
    crit: hostile
    conf: 0.98
    all:
      - id: dep-single-https-url
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-version-major-40-plus
    any:
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::dependency-confusion-claim
      - id: dep-securityctrl-url
      - id: metadata/package/quality::npm-empty-author
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest::repository-key
