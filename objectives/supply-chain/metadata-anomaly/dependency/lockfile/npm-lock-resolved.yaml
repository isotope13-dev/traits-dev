defaults:
  platforms: [unix, windows]
  for: [package-lock.json]
  attack: "T1195.002"

traits:
  - id: package-lock-resolved-url
    desc: Lockfile dependency resolved URL
    crit: component
    conf: 0.86
    if:
      type: kv
      path: packages.*.resolved
      regex: '^https?://'
  - id: package-lock-off-registry-tarball
    desc: Lockfile resolves dependency off registry
    crit: suspicious
    conf: 0.94
    if:
      type: kv
      path: packages.*.resolved
      regex: '^https?://[^"]{1,220}\.tgz$'
    unless:
      - type: kv
        path: packages.*.resolved
        regex: '^https?://registry\.npmjs\.org/'
      - type: kv
        path: packages.*.resolved
        regex: '^https?://npm\.pkg\.github\.com/'
      - type: kv
        path: packages.*.resolved
        regex: 'localhost|127\.0\.0\.1|verdaccio'
      - type: kv
        path: packages.*.resolved
        substr: 'artifactory'
      - type: kv
        path: packages.*.resolved
        substr: 'nexus'
      - type: kv
        path: packages.*.resolved
        substr: 'jfrog'
  - id: package-lock-has-install-script
    desc: Lockfile dependency has install script
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: packages.*.hasInstallScript
      exact: "true"

composite_rules:
  - id: npm-lock-off-registry-dependency
    desc: npm lockfile off-registry dependency
    crit: suspicious
    conf: 0.95
    all:
      - id: package-lock-resolved-url
      - id: package-lock-off-registry-tarball
  - id: npm-lock-off-registry-install-script
    desc: lockfile off-registry install script
    crit: suspicious
    conf: 0.96
    all:
      - id: package-lock-off-registry-tarball
      - id: package-lock-has-install-script
