# npm credential stealer dependency patterns
# Detects combinations of npm dependencies commonly used in browser credential stealers
defaults:
  platforms: [linux, macos, windows, unix]
  for: [package.json]
  crit: notable
  conf: 0.8
  attack: T1195.002
traits:
  - id: npm-dep-dpapi
    desc: npm dependency on DPAPI library
    crit: suspicious
    conf: 0.9
    attack: T1555.003
    if:
      type: kv
      path: dependencies.@primno/dpapi
  - id: npm-dep-better-sqlite3
    desc: npm dependency on better-sqlite3
    crit: component
    conf: 0.7
    if:
      type: kv
      path: dependencies.better-sqlite3
  - id: npm-dep-sqlite3
    desc: npm dependency on sqlite3
    crit: component
    conf: 0.7
    if:
      type: kv
      path: dependencies.sqlite3
  - id: npm-dep-node-machine-id
    desc: npm dependency on node-machine-id
    crit: notable
    conf: 0.8
    attack: T1082
    if:
      type: kv
      path: dependencies.node-machine-id
  - id: npm-dep-socket-io-client
    desc: npm dependency on socket.io-client
    crit: component
    conf: 0.6
    if:
      type: kv
      path: dependencies.socket.io-client
composite_rules:
  - id: npm-sqlite-dep
    desc: npm package depends on SQLite library
    crit: notable
    conf: 0.75
    any:
      - id: npm-dep-better-sqlite3
      - id: npm-dep-sqlite3
  - id: npm-credential-stealer-deps
    desc: Credential stealer dependency combination
    crit: suspicious
    conf: 0.92
    attack: T1555.003
    all:
      - id: npm-dep-dpapi
    any:
      - id: npm-dep-better-sqlite3
      - id: npm-dep-sqlite3
      - id: npm-dep-node-machine-id
      - id: npm-dep-socket-io-client
  - id: npm-browser-stealer-toolkit
    desc: Full browser credential stealer toolkit
    crit: hostile
    conf: 0.95
    attack: T1555.003
    all:
      - id: npm-dep-dpapi
      - id: npm-sqlite-dep
      - id: npm-dep-node-machine-id
