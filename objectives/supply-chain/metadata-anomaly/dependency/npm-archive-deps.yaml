# npm archive/upload dependency patterns
# Detects npm packages with dependencies commonly used for data exfiltration
defaults:
  platforms: [linux, macos, windows, unix]
  for: [package.json]
  attack: T1195.002
traits:
  - id: npm-dep-archiver
    desc: npm dependency on archiver module
    crit: notable
    conf: 0.8
    attack: T1560.001
    if:
      type: kv
      path: dependencies.archiver
