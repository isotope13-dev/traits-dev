defaults:
  platforms:
    - unix
    - windows
  crit: notable
  conf: 0.75
  attack: T1195.002
traits:
  - id: npm-no-dependencies
    desc: npm package has no dependencies
    crit: baseline
    conf: 0.6
    for:
      - package.json
    if:
      type: kv
      path: dependencies
      exists: false
    not:
      - substr: "inflight.js"
      - substr: '"name":"tabby"'
      - substr: '"tabby-builtin-plugin"'
      - substr: '"author": "Tabby Developers"'
    unless:
      - id: npm-benign-missing-deps-context
  - id: npm-empty-dependencies-object
    desc: npm package has empty dependencies object
    crit: notable
    conf: 0.65
    for:
      - package.json
    not:
      - substr: '"tabby-builtin-plugin"'
    if:
      type: text
      regex: '"dependencies"\s*:\s*\{\s*\}'
    unless:
      - id: npm-benign-missing-devdeps-context
      - type: kv
        path: peerDependencies
        exists: true
      - type: kv
        path: scripts.test
        exists: true
      - type: kv
        path: scripts.lint
        exists: true
  - id: npm-wildcard-dependency
    desc: npm package uses wildcard version dependency
    crit: notable
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: dependencies.*
      exact: '*'
  - id: npm-wildcard-devdependency
    desc: npm package uses wildcard version in devDependencies
    crit: notable
    conf: 0.7
    for:
      - package.json
    if:
      type: kv
      path: devDependencies.*
      exact: '*'
  - id: npm-latest-tag-dependency
    desc: npm package uses 'latest' tag for dependency
    crit: notable
    conf: 0.8
    for:
      - package.json
    if:
      type: kv
      path: dependencies.*
      exact: latest
  - id: npm-benign-axios-proxy-builder
    desc: benign axios-proxy-builder in serverless installer
    crit: baseline
    conf: 0.99
    for:
      - package.json
    if:
      type: text
      regex: '"(serverless|serverless-sf-core)"[\s\S]{0,700}"axios-proxy-builder"'
  - id: npm-package-serverless
    desc: serverless package name
    crit: baseline
    conf: 0.95
    for:
      - package.json
    if:
      type: kv
      path: name
      exact: serverless
  - id: npm-file-dependency
    desc: npm package depends on local file
    crit: notable
    conf: 0.7
    for:
      - package.json
    if:
      type: kv
      path: dependencies.*
      regex: '^file:'
  - id: npm-workspace-dependency
    desc: npm package uses workspace protocol
    crit: notable
    conf: 0.65
    for:
      - package.json
    if:
      type: kv
      path: dependencies.*
      regex: '^workspace:'
  - id: npm-catalog-dependency
    desc: npm package uses pnpm catalog protocol
    crit: notable
    conf: 0.65
    for:
      - package.json
    if:
      type: text
      substr: '"catalog:'
  - id: npm-link-dependency
    desc: npm package uses link protocol
    crit: notable
    conf: 0.7
    for:
      - package.json
    if:
      type: kv
      path: dependencies.*
      regex: '^link:'
  - id: npm-portal-dependency
    desc: npm package uses portal protocol
    crit: notable
    conf: 0.7
    for:
      - package.json
    if:
      type: kv
      path: dependencies.*
      regex: '^portal:'
  - id: npm-pack-hooks
    desc: npm package has prepack or postpack hooks
    crit: notable
    conf: 0.7
    for:
      - package.json
    if:
      type: kv
      path: scripts
      regex: ^(prepack|postpack)$
  - id: npm-prepare-hook
    desc: npm package has prepare hook
    crit: notable
    conf: 0.65
    for:
      - package.json
    if:
      type: kv
      path: scripts.prepare
    unless:
      - type: kv
        path: scripts.prepare
        exact: patch-package
      # `prepare` that just invokes a known bundler/compiler is benign
      # package authoring — `prepare` only runs on git-installs and at
      # publish, not on registry installs.
      - id: objectives/supply-chain/install-hook/scripts/prepare::prepare-is-build-tool
  - id: npm-prepublish-hook
    desc: npm package has prepublish hook
    crit: notable
    conf: 0.7
    for:
      - package.json
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]package\.json$
      - type: kv
        path: keywords
        regex: tabby-builtin-plugin
      - type: kv
        path: scripts.prepublish
        exact: npm run build
      - type: kv
        path: scripts.prepublish
        exact: npm run benchclean
      - type: text
        substr: '"_from":'
      - type: text
        substr: '"_resolved":'
    if:
      type: kv
      path: scripts.prepublish
      exists: true
  - id: npm-prepublish-only-hook
    desc: npm package has prepublishOnly hook
    crit: notable
    conf: 0.7
    for:
      - package.json
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]package\.json$
      - type: kv
        path: keywords
        regex: tabby-builtin-plugin
      - type: text
        substr: '"_from":'
      - type: text
        substr: '"_resolved":'
    if:
      type: kv
      path: scripts.prepublishOnly
      exists: true
  - id: npm-postpublish-hook
    desc: npm package has postpublish hook
    crit: notable
    conf: 0.7
    for:
      - package.json
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]package\.json$
      - type: kv
        path: keywords
        regex: tabby-builtin-plugin
      - type: text
        substr: '"_from":'
      - type: text
        substr: '"_resolved":'
    if:
      type: kv
      path: scripts.postpublish
      exists: true
  - id: npm-script-download
    desc: npm package has 'download' script
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: scripts.download
    unless:
      - type: kv
        path: scripts.download
        regex: --mdfile=README
  - id: npm-script-exec
    desc: npm package has 'exec' or 'execute' script
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    if:
      type: kv
      path: scripts
      regex: ^(exec|execute)$
  - id: npm-script-backdoor
    desc: npm package has 'backdoor' script
    crit: suspicious
    conf: 0.95
    for:
      - package.json
    if:
      type: kv
      path: scripts.backdoor
  - id: pypi-no-dependencies
    desc: PyPI package has no install_requires
    crit: notable
    conf: 0.6
    for:
      - python
    if:
      type: string_literal
      regex: install_requires\s*=\s*\[\s*\]
  - id: pypi-unpinned-dependency
    desc: PyPI package uses unpinned dependency
    crit: notable
    conf: 0.7
    for:
      - python
    if:
      type: string_literal
      regex: install_requires.{0,100}['"][a-zA-Z0-9_-]{1,100}['"]
    not:
      - regex: '[''"][a-zA-Z0-9_-]+[><=]'
  - id: gem-no-dependencies
    desc: RubyGem has no runtime dependencies
    crit: notable
    conf: 0.6
    for:
      - ruby
    if:
      type: string_literal
      regex: \.add_runtime_dependency\s*\(
  - id: npm-package-under-node-modules
    desc: package.json is under node_modules
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: basename
      regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]package\.json$
  - id: npm-has-runtime-dependencies-field
    desc: npm package declares dependencies field
    crit: component
    conf: 1.0
    for:
      - package.json
    unless:
      - id: metadata/package/testing/presence/fixture::types-private-fixture-package
      - id: metadata/package/testing/presence/fixture::preact-declaration-helper-fixture
      - id: metadata/package/testing/presence/fixture::definitelytyped-types-helper-package
    if:
      type: kv
      path: dependencies
      exists: true
  - id: npm-dep-next-runtimejs
    desc: npm dependency on next-runtimejs
    crit: suspicious
    conf: 0.98
    for:
      - package.json
    if:
      type: kv
      path: dependencies.next-runtimejs
  - id: npm-dep-agnolia-string-argv
    desc: npm dependency on agnolia string-argv clone
    crit: suspicious
    conf: 0.99
    for:
      - package.json
    if:
      type: kv
      path: dependencies.@agnoliaarisian7180/string-argv
      exists: true
  - id: npm-dep-agnolia-string-argv-latest
    desc: agnolia string-argv dependency uses latest
    crit: suspicious
    conf: 0.99
    for:
      - package.json
    if:
      type: kv
      path: dependencies.@agnoliaarisian7180/string-argv
      exact: latest
  - id: npm-has-bundled-dependencies
    desc: npm package has bundled dependencies
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: kv
      path: bundledDependencies
      exists: true
  - id: npm-has-peer-dependencies
    desc: npm package declares peerDependencies
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: kv
      path: peerDependencies
      exists: true
  - id: npm-has-lint-script
    desc: npm package declares lint script
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: kv
      path: scripts.lint
      exists: true
  - id: tabby-electron-main
    desc: Tabby Electron package main marker
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: text
      substr: '"main":"./dist/electron/main.js"'
  - id: tabby-raw-package-marker
    desc: Tabby package raw metadata marker
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: text
      regex: '"name":"tabby"|"author": "Tabby Developers"'
  - id: known-no-devdeps-package-name
    desc: Known benign no-devDependencies package name
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: text
      regex: '"name"\s*:\s*"(cycle|@luminati-io/socksv5|fs\.realpath)"'
  - id: npm-no-deps-devdependencies
    desc: npm package has no devDependencies field
    crit: baseline
    conf: 0.6
    for:
      - package.json
    if:
      type: kv
      path: devDependencies
      exists: false
    unless:
      - id: npm-benign-missing-devdeps-context
      - id: npm-benign-no-devdeps-legacy-lib
  - id: npm-many-dev-deps
    desc: npm package has many devDependencies
    crit: component
    conf: 0.6
    for:
      - package.json
    if:
      type: kv
      path: devDependencies.*
    count_min: 5
  - id: npm-legacy-lib-eyes
    desc: Package is legacy npm library eyes
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: text
      substr: '"name"          : "eyes"'
  - id: npm-legacy-lib-colors
    desc: Package is legacy npm library colors
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: text
      substr: '"name": "colors"'
  - id: npm-legacy-lib-run-script-os
    desc: Package is run-script-os
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: text
      substr: '"name": "run-script-os"'
composite_rules:
  - id: npm-publish-hooks
    desc: npm package has prepublish or postpublish hooks
    crit: notable
    conf: 0.7
    for:
      - package.json
    any:
      - id: npm-prepublish-hook
      - id: npm-prepublish-only-hook
      - id: npm-postpublish-hook
  - id: npm-benign-missing-deps-context
    desc: Benign missing-dependencies context
    crit: component
    conf: 1.0
    for:
      - package.json
    any:
      - id: metadata/package/fields/description::npm-security-holder-description
      - id: npm-has-peer-dependencies
      - id: metadata/package/fields/dependencies::has-dev-deps
      - id: objectives/impact/destroy/file-deletion::has-test-script
      - id: npm-has-lint-script
      - id: metadata/package/fields/repository::has-repository-url
      - id: metadata/package/fields/name::npm-no-name-field
      - id: metadata/package/fields/freeform::pkg-skeleton-small
      - id: tabby-electron-main
  - id: npm-benign-missing-devdeps-context
    desc: Benign contexts for missing devDependencies
    crit: component
    conf: 1.0
    for:
      - package.json
    any:
      - id: npm-package-under-node-modules
      - id: npm-has-runtime-dependencies-field
      - id: objectives/supply-chain/metadata-anomaly/package/npm::tabby-builtin-keyword
      - id: metadata/package/fields/dependencies::has-peer-deps
      - id: metadata/package/fields/dependencies::has-optional-deps
      - id: npm-has-bundled-dependencies
      - id: metadata/package/fields/freeform::official-react-native-package
      - id: metadata/package/fields/description::npm-security-holder-description
      - id: tabby-raw-package-marker
      - id: known-no-devdeps-package-name
      - id: metadata/package/fields/name::npm-no-name-field
      - id: metadata/package/fields/freeform::pkg-skeleton-small
  - id: npm-benign-no-devdeps-legacy-lib
    desc: Legacy npm library without devDependencies
    crit: component
    conf: 1.0
    for:
      - package.json
    any:
      - id: npm-legacy-lib-eyes
      - id: npm-legacy-lib-colors
      - id: npm-legacy-lib-run-script-os
  - id: pypi-install-hooks-any
    desc: Any PyPI install hook detected
    crit: notable
    conf: 0.6
    for:
      - python
    any:
      - id: metadata/build/package::setuptools-run-override
      - id: metadata/build/package::setup-cmdclass-install
      - id: objectives/supply-chain/metadata-anomaly/manifest/pypi::install-class-inherit
  - id: npm-no-deps-at-all
    desc: npm package has no dependencies or devDependencies
    crit: notable
    conf: 0.65
    for:
      - package.json
    all:
      - id: npm-no-runtime-dependencies
      - id: npm-no-deps-devdependencies
    unless:
      - id: metadata/package/fields/name::npm-no-name-field
      - id: metadata/package/fields/freeform::pkg-skeleton-small
  - id: npm-no-runtime-dependencies
    desc: npm package has no runtime dependencies
    crit: notable
    conf: 0.65
    for:
      - package.json
    any:
      - id: npm-no-dependencies
      - id: npm-empty-dependencies-object
  - id: npm-runtime-dep-next-runtimejs
    desc: npm runtime depends on next-runtimejs
    crit: suspicious
    conf: 0.99
    for:
      - package.json
    all:
      - id: npm-has-runtime-dependencies-field
      - id: npm-dep-next-runtimejs
  - id: npm-known-malicious-string-argv-dependency
    desc: npm package depends on malicious string-argv clone
    crit: hostile
    conf: 0.995
    for:
      - package.json
    all:
      - id: npm-dep-agnolia-string-argv
      - id: npm-dep-agnolia-string-argv-latest
  - id: npm-unsafe-dependency-versions
    desc: npm package uses unsafe dependency versions
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    any:
      - id: npm-wildcard-dependency
      - id: npm-latest-tag-dependency
  - id: npm-local-dependencies
    desc: npm package uses local or development-only dependencies
    crit: notable
    conf: 0.7
    for:
      - package.json
    any:
      - id: npm-file-dependency
      - id: npm-workspace-dependency
      - id: npm-link-dependency
      - id: npm-portal-dependency
  - id: npm-monorepo-workspace-dep
    desc: Package has workspace or catalog dependencies
    crit: component
    conf: 0.7
    for:
      - package.json
    any:
      - id: npm-workspace-dependency
      - id: metadata/package/fields/dependencies::workspace-devdependency
      - id: npm-catalog-dependency
  - id: npm-benign-serverless-axios-proxy-builder
    desc: Benign Serverless axios-proxy-builder dependency
    crit: component
    conf: 1.0
    for:
      - package.json
    all:
      - id: npm-benign-axios-proxy-builder
      - id: npm-package-serverless
  - id: npm-no-runtime-many-devdeps
    desc: npm package has no runtime deps but many devDependencies
    crit: suspicious
    conf: 0.8
    for:
      - package.json
    all:
      - id: npm-no-runtime-dependencies
      - id: npm-many-dev-deps
    unless:
      - id: metadata/package/quality::has-tests
  - id: npm-suspicious-script-names
    desc: npm package has suspicious script names
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    any:
      - id: npm-script-download
      - id: npm-script-exec
      - id: npm-script-backdoor
