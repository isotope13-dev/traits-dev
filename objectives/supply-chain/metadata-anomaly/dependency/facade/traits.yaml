defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
traits:
  - id: npm-dep-express-eval
    desc: npm dependency on express-eval
    crit: suspicious
    conf: 0.97
    if:
      type: value
      path: dependencies.express-eval
  - id: npm-dep-child-process
    desc: npm dependency on child_process stub
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.child_process
  - id: npm-dep-fs-security-stub
    desc: npm dependency on fs security stub
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: dependencies.fs
      exact: "^0.0.1-security"
  - id: npm-dep-execp
    desc: npm dependency on execp shell helper
    crit: suspicious
    conf: 0.93
    if:
      type: value
      path: dependencies.execp
      exists: true
  - id: npm-dep-types-winreg
    desc: npm dependency on @types/winreg
    crit: notable
    conf: 0.84
    if:
      type: value
      path: dependencies.@types/winreg
  - id: npm-dep-eslint-plugin-supertest
    desc: npm runtime dependency on eslint-plugin-supertest
    crit: suspicious
    conf: 0.96
    if:
      type: value
      path: dependencies.eslint-plugin-supertest
  - id: npm-dep-ts-tweetnacl-utils
    desc: npm dependency on ts-tweetnacl-utils (malicious stealer)
    crit: suspicious
    conf: 0.99
    if:
      type: value
      path: dependencies.ts-tweetnacl-utils
  - id: npm-dep-byteboxlab
    desc: npm dependency on byteboxlab
    crit: suspicious
    conf: 0.995
    if:
      type: value
      path: dependencies.byteboxlab
