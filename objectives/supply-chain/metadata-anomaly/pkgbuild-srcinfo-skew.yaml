# PKGBUILD/.SRCINFO reviewed metadata drift (T1195.002).
#
# AUR review surfaces commonly render .SRCINFO while makepkg executes PKGBUILD.
# If the same package's PKGBUILD and .SRCINFO disagree on version and checksum,
# and the PKGBUILD fetches a remote release archive, the build input is not the
# source release that review metadata advertised.
defaults:
  platforms: [linux]
  for: [tar]
  attack: T1195.002

composite_rules:
  - id: pkgbuild-remote-source-srcinfo-silent-swap
    desc: Remote PKGBUILD source checksum differs from .SRCINFO
    crit: notable
    conf: 0.92
    ref: sha256:2c3ecf2b4d859ea153ffdaf14155f7147276f8e375a9f44556d1aab46c47831a
    scope: archive
    all:
      - id: objectives/supply-chain/impersonation/package/pkgbuild::srcinfo-checksum-mismatch
      - id: objectives/supply-chain/impersonation/package/pkgbuild::srcinfo-pkgver-match
      - id: metadata/build/package::pkgbuild-remote-archive-source
    unless:
      - id: well-known/app/vmware-workstation::vmware-workstation-pkgbuild

  - id: pkgbuild-remote-source-srcinfo-drift
    desc: Remote PKGBUILD source diverges from .SRCINFO
    crit: notable
    conf: 0.9
    ref: sha256:becf18abc2cca2ec49a4f0c22537be11d85ecea9221f85d0f8780030701a6642
    scope: archive
    all:
      - id: objectives/supply-chain/impersonation/package/pkgbuild::srcinfo-checksum-mismatch
      - id: metadata/build/package::pkgbuild-remote-archive-source
    unless:
      - id: objectives/supply-chain/impersonation/package/pkgbuild::srcinfo-pkgver-match
      - id: objectives/supply-chain/impersonation/package/pkgbuild::srcinfo-pkgbase-mismatch
      - id: well-known/app/vmware-workstation::vmware-workstation-pkgbuild
