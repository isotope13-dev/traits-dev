defaults:
  platforms:
    - unix
    - windows
  for:
    - package.json
traits:
  - id: autogenerated-package-comment
    desc: Package entry file has auto-generated comment
    crit: notable
    conf: 0.82
    attack: T1195.002
    for:
      - javascript
    if:
      type: text
      regex: "//\\s*Auto-generated package"
      case_insensitive: true
  - id: require-https-dup
    desc: require('https') import
    crit: notable
    conf: 0.7
    for:
      - javascript
    if:
      type: ast
      kind: import
      exact: https
  - id: node-modules-write
    desc: Package writes to node_modules directory
    crit: suspicious
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: (writeFile|writeFileSync|appendFile)\s*\(.{0,220}node_modules
  - id: npmrc-read
    desc: Reads .npmrc file (token theft)
    crit: suspicious
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: (readFile|readFileSync)\s*\(.{0,220}\.npmrc
  - id: package-json-write
    desc: Writes to package.json file
    crit: suspicious
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: writeFileSync\s*\(.{0,220}package\.json|writeFile\s*\(.{0,220}package\.json
  - id: placeholder-author-generic-1a-dup
    desc: Author field contains generic placeholder (author/your name)
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: author
      regex: ^(author|your name)$
      case_insensitive: true
  - id: placeholder-author-generic-1b-dup
    desc: Author field contains generic placeholder (name/test/user)
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: author
      regex: ^(name|test|user)$
      case_insensitive: true
  - id: placeholder-author-generic-2a-dup
    desc: Author field contains generic placeholder (admin/example/sample)
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: author
      regex: ^(admin|example|sample)$
      case_insensitive: true
  - id: placeholder-author-generic-2b-dup
    desc: Author field contains generic placeholder (anonymous)
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: author
      regex: ^(anonymous)$
      case_insensitive: true
  - id: author-very-short
    desc: Author name very short (1-4 chars)
    crit: notable
    conf: 0.7
    if:
      type: kv
      path: author
      regex: ^.{1,4}$
  - id: desc-filler-placeholder
    desc: Description is generic filler text
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: description
      regex: \bpack(age)?\s+here\b
      case_insensitive: true
  - id: desc-auto-generated
    desc: Description says package is auto-generated
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    if:
      type: kv
      path: description
      regex: generated\s+automatically
      case_insensitive: true
  - id: pkg-main-resp-path
    desc: Main uses resp/ directory
    crit: notable
    conf: 0.7
    if:
      type: kv
      path: main
      substr: resp/
  - id: zero-byte-js-entry
    desc: Zero-byte JavaScript main entry file
    crit: suspicious
    conf: 0.90
    attack: T1195.002
    for: [javascript]
    size_max: 0
    if:
      type: basename
      regex: ^index\.(js|mjs|cjs)$
  - id: author-corp-email-dropbox
    desc: Author uses Dropbox corporate email
    crit: notable
    conf: 0.72
    attack: T1195.002
    if:
      type: kv
      path: author
      regex: "@dropbox\\.com"
      case_insensitive: true
