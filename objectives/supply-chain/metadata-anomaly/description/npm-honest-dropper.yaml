# Package descriptions that openly state the package downloads/installs a
# binary on install. Combined with a postinstall hook this is a smoking gun.
defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
traits:
  - id: pkg-description-downloads-windows-binary
    desc: Description downloads Windows binary
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: description
      regex: '(?i)\bdownloads?\b[^\n]{0,80}\.(exe|dll)\b'
  - id: pkg-description-downloads-unix-binary
    desc: Description downloads Unix binary
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: description
      regex: '(?i)\bdownloads?\b[^\n]{0,80}\.(bin|so|dylib)\b'
  - id: pkg-description-installs-binary
    desc: 'pkg description installs binary'
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: description
      regex: '(?i)\binstalls?\b[^\n]{0,80}\b(binary|executable)\b'
