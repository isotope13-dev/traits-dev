defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
traits:
  - id: npm-ctf-description
    desc: Package description references CTF
    crit: suspicious
    conf: 0.95
    attack: T1195.002
    if:
      type: kv
      path: "description"
      regex: "(?i)ctf"
  - id: readme-md
    desc: README.md file
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: README.md
  - id: placeholder-confusion-claim
    desc: README claims confusion prevention
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: placeholder.{0,80}prevent dependency confusion
      case_insensitive: true
  - id: no-usable-code-claim
    desc: README claims no usable code
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: does not contain usable code
      case_insensitive: true
  - id: npm-security-team-removal-readme
    desc: README cites npm security removal
    crit: component
    conf: 0.98
    if:
      type: raw
      regex: removed from the registry by the npm security team
      case_insensitive: true
  - id: npm-advisory-search-readme
    desc: README links npm advisory search
    crit: component
    conf: 0.97
    if:
      type: raw
      substr: npmjs.com/advisories?search=
composite_rules:
  - id: placeholder-readme-misdirection
    desc: README markets placeholder confusion decoy
    crit: notable
    conf: 0.92
    all:
      - id: readme-md
      - id: placeholder-confusion-claim
  - id: placeholder-readme-decoy
    desc: README denies usable code in decoy
    crit: suspicious
    conf: 0.95
    all:
      - id: readme-md
      - id: placeholder-confusion-claim
      - id: no-usable-code-claim
  - id: npm-security-holder-readme
    desc: README documents npm security placeholder
    crit: notable
    conf: 0.98
    all:
      - id: readme-md
      - id: npm-security-team-removal-readme
      - id: npm-advisory-search-readme
