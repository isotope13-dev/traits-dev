defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: readme-md
    desc: README.md file
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: README.md
      case_insensitive: true
  - id: placeholder-confusion-claim
    desc: README claims confusion prevention
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: placeholder.{0,80}prevent dependency confusion
      case_insensitive: true
  - id: no-usable-code-claim
    desc: README claims no usable code
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: does not contain usable code
      case_insensitive: true
  - id: does-nothing-claim
    desc: README says package does nothing
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: does absolutely nothing|does nothing
      case_insensitive: true
  - id: just-for-fun-claim
    desc: README markets package as joke
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: just for fun|for fun
      case_insensitive: true
  - id: malicious-version-claim
    desc: README calls package malicious version
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: malicious version
      case_insensitive: true
  - id: steal-passwords-keys-claim
    desc: README claims password or key theft
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: steal (passwords|keys)|steal passwords and keys
      case_insensitive: true
  - id: post-install-stealer-claim
    desc: README admits post install stealing
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: post install script.{0,40}steal
      case_insensitive: true
composite_rules:
  - id: placeholder-readme-misdirection
    desc: README markets placeholder confusion decoy
    crit: notable
    conf: 0.92
    all:
      - id: readme-md
      - id: placeholder-confusion-claim
  - id: placeholder-readme-decoy
    desc: README denies usable code in decoy
    crit: suspicious
    conf: 0.95
    all:
      - id: readme-md
      - id: placeholder-confusion-claim
      - id: no-usable-code-claim
  - id: noop-readme-joke
    desc: README markets inert joke package
    crit: notable
    conf: 0.94
    all:
      - id: readme-md
      - id: does-nothing-claim
      - id: just-for-fun-claim
  - id: readme-openly-malicious
    desc: README openly admits malicious theft
    crit: hostile
    conf: 0.995
    attack: T1195.002
    all:
      - id: readme-md
      - id: malicious-version-claim
    any:
      - id: steal-passwords-keys-claim
      - id: post-install-stealer-claim
  - id: inert-package-facade
    desc: Package hides behind inert README facade
    crit: suspicious
    conf: 0.95
    all:
      - id: noop-readme-joke
      - id: metadata/package/files::empty-javascript-file
      - id: objectives/supply-chain/hidden-payload/encoding::main-js-loader
