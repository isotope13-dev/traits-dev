defaults:
  platforms:
    - unix
    - windows
  crit: notable
  attack: T1036.005
  mbc: F0004
  for: [pkginfo]
traits:
  - id: explicit-malicious-declaration
    desc: Summary explicitly declares malicious intent
    crit: suspicious
    conf: 0.98
    attack: T1195.002
    mbc: E1195
    if:
      type: value
      path: summary
      regex: malicious.{0,40}(packag|attack|exploit|malware)
      case_insensitive: true
  - id: unknown-summary
    desc: PKG-INFO has UNKNOWN summary
    crit: notable
    conf: 0.75
    if:
      type: value
      path: summary
      exact: UNKNOWN
  - id: pkginfo-low-effort-summary
    desc: PKG-INFO summary contains minimal-effort description
    crit: notable
    conf: 0.8
    if:
      type: value
      path: summary
      regex: (?i)((a |my )?very basic \w+|\w+pyapp\b)
  - id: pkginfo-demo-release-summary
    desc: PKG-INFO summary describes demo release
    crit: notable
    conf: 0.75
    if:
      type: value
      path: summary
      regex: \b(demo|simulation)\b.{0,50}\brelease action\b|\brelease action\b.{0,50}\bsimulation\b
      case_insensitive: true
  - id: pkginfo-single-word-summary
    desc: PKG-INFO with single-word summary
    crit: notable
    conf: 0.75
    unless:
      - id: unknown-summary
    if:
      type: value
      path: summary
      regex: ^\S{1,30}$
  - id: pkginfo-security-claim-1
    desc: Package summary uses security/protection terminology
    crit: component
    conf: 0.65
    if:
      type: value
      path: summary
      regex: (secur|protect)
      case_insensitive: true
  - id: pkginfo-security-claim-2
    desc: Package summary references antivirus or malware scanning
    crit: component
    conf: 0.65
    if:
      type: value
      path: summary
      regex: (antivirus|anti-virus|malware.scanner)
      case_insensitive: true
  - id: summary-requests-admin-1
    desc: Admin request (admin/root/sudo/elevat)
    # Building block only: the substring matches benign words like
    # "administration"/"administrator" and is far too common in legitimate
    # sysadmin/privilege package summaries to surface alone. It is meaningful
    # solely inside the summary-requests-admin composite (paired with an
    # install/permission request), so keep it component-level.
    crit: component
    conf: 0.75
    if:
      type: value
      path: summary
      regex: (admin|root|sudo|elevat)
      case_insensitive: true
  - id: summary-requests-admin-2
    desc: Admin request (install/permiss)
    crit: component
    conf: 0.75
    if:
      type: value
      path: summary
      regex: (install|permiss)
      case_insensitive: true
  - id: summary-misspelled-privilege-request-1
    desc: Misspelled privilege (evoid/administative/permisions/adminstrat)
    crit: notable
    conf: 0.75
    if:
      type: value
      path: summary
      regex: (evoid|administative|permisions|adminstrat)
      case_insensitive: true
  - id: summary-misspelled-privilege-request-2
    desc: Misspelled privilege (privileg|instaling|elavat)
    crit: notable
    conf: 0.75
    if:
      type: value
      path: summary
      regex: (privileg|instaling|elavat)
      case_insensitive: true
  - id: pkginfo-non-latin-summary
    desc: PKG-INFO summary in Latin-confusable non-Latin script
    crit: notable
    conf: 0.75
    attack: T1204.001
    if:
      type: value
      path: summary
      # Cyrillic / accented-Latin / Arabic only — scripts that can host
      # Latin homoglyph masquerades. East-Asian scripts (Han, Kana, Hangul)
      # were removed: a CJK summary is ordinary localization, not a
      # masquerade signal, and tripped legitimate Chinese/Japanese/Korean
      # packages.
      regex: "[А-яЁёÀ-ÖØ-öø-ÿ؀-ۿ]"
  - id: summary-exe-download-1
    desc: Summary mentions EXE with download
    crit: suspicious
    conf: 0.95
    attack: T1204.002
    if:
      type: value
      path: summary
      regex: (\.exe|execut).{0,30}(download|run)
      case_insensitive: true
  - id: summary-exe-download-2
    desc: Summary mentions EXE with link or URL
    crit: suspicious
    conf: 0.95
    attack: T1204.002
    if:
      type: value
      path: summary
      regex: (\.exe|execut).{0,30}(link|url)
      case_insensitive: true
  - id: summary-exe-download-rev
    desc: Summary advertises downloading and running EXE
    crit: suspicious
    conf: 0.95
    attack: T1204.002
    if:
      type: value
      path: summary
      regex: (download|run|fetch).{0,30}(\.exe|execut)
      case_insensitive: true
  - id: summary-stealer-collect-send
    desc: Summary describes collect-and-send behavior
    crit: suspicious
    conf: 0.95
    attack: T1005
    mbc: B0010
    if:
      type: value
      path: summary
      regex: (collect|harvest).{0,40}send
      case_insensitive: true
  - id: summary-stealer-exfil-host
    desc: Summary describes exfiltration of host info
    crit: suspicious
    conf: 0.95
    attack: T1005
    mbc: B0010
    if:
      type: value
      path: summary
      regex: (send|exfil).{0,40}hostname
      case_insensitive: true
  - id: summary-stealer-exfil-secret
    desc: Summary describes exfiltration of secrets
    crit: suspicious
    conf: 0.95
    attack: T1005
    mbc: B0010
    if:
      type: value
      path: summary
      regex: (send|exfil).{0,40}(credential|password)
      case_insensitive: true
  - id: pkginfo-no-summary
    desc: PKG-INFO missing Summary field
    crit: notable
    conf: 0.75
    if:
      type: value
      path: metadata-version
    unless:
      - type: value
        path: summary
  - id: pkginfo-placeholder-summary-test
    desc: Placeholder summary (test)
    crit: notable
    conf: 0.75
    if:
      type: value
      path: summary
      regex: ^\s*(test|example)\s*$
      case_insensitive: true
  - id: pkginfo-placeholder-summary-placeholder
    desc: Placeholder summary (placeholder)
    crit: notable
    conf: 0.75
    if:
      type: value
      path: summary
      regex: ^\s*placeholder\s*$
      case_insensitive: true
  - id: pkginfo-placeholder-summary-todo
    desc: Placeholder summary (todo)
    crit: notable
    conf: 0.75
    if:
      type: value
      path: summary
      regex: ^\s*(todo|fixme)\s*$
      case_insensitive: true
  - id: pkginfo-placeholder-summary-2
    desc: Placeholder summary (description/empty/dummy)
    crit: notable
    conf: 0.75
    if:
      type: value
      path: summary
      regex: ^\s*(description|empty|dummy)\s*$
      case_insensitive: true
  - id: pkginfo-dummy-package-summary
    desc: PKG-INFO dummy package summary
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: summary
      regex: '^Dummy .{1,80} package for PyPI$'
      case_insensitive: true
  - id: summary-trading-bot-term
    desc: Summary advertises trading bot functionality
    crit: component
    conf: 0.88
    attack: T1204.001
    if:
      type: value
      path: summary
      regex: '(trading bot|automated trading)'
      case_insensitive: true
  - id: summary-telegram-term
    desc: Summary references Telegram
    crit: component
    conf: 0.86
    attack: T1204.001
    if:
      type: value
      path: summary
      regex: '\bTelegram\b'
      case_insensitive: true
  - id: summary-quotex-martingale-term
    desc: Summary references Quotex or Martingale trading
    crit: component
    conf: 0.86
    attack: T1204.001
    if:
      type: value
      path: summary
      regex: '(Quotex|Martingale)'
      case_insensitive: true
  - id: requires-telethon
    desc: Package requires Telethon
    crit: component
    conf: 0.86
    attack: T1204.001
    if:
      type: text
      regex: 'Requires-Dist:\s*telethon'
      case_insensitive: true
  - id: requires-websocket-client
    desc: Package requires websocket-client
    crit: component
    conf: 0.84
    attack: T1204.001
    if:
      type: text
      regex: 'Requires-Dist:\s*websocket-client'
      case_insensitive: true
  - id: requires-pysocks
    desc: Package requires PySocks
    crit: component
    conf: 0.84
    attack: T1204.001
    if:
      type: text
      regex: 'Requires-Dist:\s*pysocks'
      case_insensitive: true
  - id: requires-httpx
    desc: Package requires httpx
    crit: component
    conf: 0.84
    attack: T1204.001
    if:
      type: text
      regex: 'Requires-Dist:\s*httpx'
      case_insensitive: true
  - id: summary-ctf-security-tool
    desc: Summary advertises CTF security tool
    crit: suspicious
    conf: 0.86
    attack: T1204.001
    if:
      type: value
      path: summary
      regex: '\bsecurity tool\b.{0,80}\bCTF\b|\bCTF\b.{0,80}\bsecurity tool\b'
      case_insensitive: true
  - id: ctf-security-tool-requests-dep
    desc: CTF security tool package depends on requests
    crit: suspicious
    conf: 0.88
    attack: T1204.001
    if:
      type: text
      regex: 'Summary:\s*[^\n]{0,120}(security tool|CTF)[\s\S]{0,500}Requires-Dist:\s*requests'
      case_insensitive: true
  - id: pkginfo-cloned-package-version-body
    desc: PKG-INFO dummy version package body
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'dummy Python package version of [A-Za-z0-9_.-]+'
      case_insensitive: true
composite_rules:
  - id: summary-telegram-trading-bot
    desc: Summary advertises Telegram trading bot integration
    crit: suspicious
    conf: 0.92
    attack: T1204.001
    all:
      - id: summary-trading-bot-term
    any:
      - id: summary-telegram-term
      - id: summary-quotex-martingale-term
  - id: telegram-trading-network-deps
    desc: Telegram trading package declares network automation dependencies
    crit: suspicious
    conf: 0.9
    attack: T1204.001
    all:
      - id: requires-telethon
    any:
      - id: requires-websocket-client
      - id: requires-pysocks
      - id: requires-httpx
  - id: pkginfo-placeholder-summary-1
    desc: Placeholder summary collection 1
    crit: notable
    conf: 0.75
    any:
      - id: pkginfo-placeholder-summary-test
      - id: pkginfo-placeholder-summary-placeholder
      - id: pkginfo-placeholder-summary-todo
  - id: pkginfo-security-claim
    desc: PKG-INFO summary claims security functionality
    crit: notable
    conf: 0.5
    any:
      - id: pkginfo-security-claim-1
      - id: pkginfo-security-claim-2
  - id: summary-requests-admin
    desc: Summary requests admin privileges for install
    crit: suspicious
    conf: 0.9
    attack: T1204.001
    all:
      - id: summary-requests-admin-1
      - id: summary-requests-admin-2
  - id: summary-misspelled-privilege-request
    desc: Misspelled social engineering in PKG-INFO summary
    crit: suspicious
    conf: 0.9
    attack: T1204.001
    any:
      - id: summary-misspelled-privilege-request-1
      - id: summary-misspelled-privilege-request-2
  - id: pkginfo-placeholder-summary
    desc: PKG-INFO summary contains placeholder text
    crit: notable
    conf: 0.8
    any:
      - id: pkginfo-placeholder-summary-1
      - id: pkginfo-placeholder-summary-2
  - id: pypi-stealer-disclosure-any
    desc: PyPI metadata discloses stealer behavior
    crit: suspicious
    conf: 0.96
    any:
      - id: summary-stealer-collect-send
      - id: summary-stealer-exfil-host
      - id: summary-stealer-exfil-secret
      - id: desc-stealer-collect-send-server
      - id: desc-stealer-exfil-host
      - id: desc-stealer-exfil-secret
  - id: pypi-self-disclosed-stealer
    desc: PyPI package self-discloses stealer functionality
    crit: hostile
    conf: 0.98
    attack: T1005
    mbc: B0010
    all:
      - id: pypi-stealer-disclosure-any
    any:
      - id: objectives/supply-chain/metadata-anomaly/author::pkginfo-short-author
      - id: objectives/supply-chain/metadata-anomaly/author::pkginfo-free-email-gmail
      - id: objectives/supply-chain/metadata-anomaly/manifest/pypi::pypi-no-author-email
