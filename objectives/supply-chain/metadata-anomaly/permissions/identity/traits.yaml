defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.92

traits:
  - id: permission-identity
    desc: Extension requests identity permission
    if:
      type: value
      path: permissions
      exact: identity
  - id: oauth2-client-id
    desc: Extension declares OAuth2 client
    if:
      type: value
      path: oauth2.client_id
  - id: oauth2-openid-scope
    desc: Extension OAuth2 openid scope
    crit: component
    conf: 0.95
    if:
      type: value
      path: oauth2.scopes
      exact: openid
  - id: oauth2-email-scope
    desc: Extension OAuth2 email scope
    crit: component
    conf: 0.95
    if:
      type: value
      path: oauth2.scopes
      exact: email
  - id: oauth2-profile-scope
    desc: Extension OAuth2 profile scope
    crit: component
    conf: 0.95
    if:
      type: value
      path: oauth2.scopes
      exact: profile
  - id: oauth2-no-fourth-scope
    desc: Extension OAuth2 has no fourth scope
    crit: component
    conf: 0.95
    if:
      type: value
      path: oauth2.scopes
      size_max: 3
  - id: oauth2-drive-file-scope
    desc: Extension requests Google Drive file scope
    if:
      type: value
      path: oauth2.scopes
      exact: https://www.googleapis.com/auth/drive.file

composite_rules:
  - id: oauth2-basic-identity-scopes
    desc: Extension OAuth2 scopes limited to openid/email/profile
    crit: baseline
    conf: 0.95
    all:
      - id: oauth2-openid-scope
      - id: oauth2-email-scope
      - id: oauth2-profile-scope
      - id: oauth2-no-fourth-scope
  - id: google-drive-identity-permission
    desc: Extension identity permission with Drive scope
    crit: notable
    conf: 0.94
    all:
      - id: permission-identity
      - id: oauth2-client-id
      - id: oauth2-drive-file-scope
