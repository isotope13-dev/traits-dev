defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
  crit: notable
  conf: 0.94

traits:
  - id: content-script-all-http-sites
    desc: Content script runs on HTTP sites
    if:
      type: value
      path: 'content_scripts[*].matches'
      regex: '^https?://\*/\*$'
  - id: web-accessible-all-http-sites
    desc: Web resources exposed to HTTP sites
    conf: 0.9
    if:
      type: value
      path: 'web_accessible_resources[*].matches'
      regex: '^https?://\*/\*$'
