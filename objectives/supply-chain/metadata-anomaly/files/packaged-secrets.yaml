defaults:
  platforms: [windows, unix]
  for: [zip]
  attack: T1195.002

traits:
  - id: packaged-dotenv-file
    desc: Archive packages dotenv file
    crit: notable
    conf: 0.88
    if:
      type: value
      path: "archive.members[*].path"
      regex: '(^|/)\.env$'
    unless:
      - type: value
        path: "archive.members[*].path"
        regex: '(^|/)\.env\.(example|sample|template)$'
