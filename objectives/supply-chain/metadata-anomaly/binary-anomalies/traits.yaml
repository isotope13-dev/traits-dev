defaults:
  platforms:
    - windows
    - unix
    - android
    - ios
traits:
  - id: duplicati-dotnet-deps-json-basename
    desc: Duplicati .NET deps manifest
    crit: component
    conf: 0.95
    for:
      - source
    if:
      type: basename
      regex: ^Duplicati\..{0,64}\.deps\.json$
  - id: benign-brackets-helper-exe
    desc: Brackets app helper executable
    crit: component
    conf: 0.98
    for:
      - pe
    if:
      type: basename
      exact: CodeHelper.exe
  - id: benign-test-invalidphp-exe
    desc: PHP tooling test executable
    crit: component
    conf: 0.98
    for:
      - pe
    if:
      type: basename
      exact: invalidphp.exe
composite_rules:
  - id: npm-package-with-exe
    desc: NPM package contains Windows executable
    crit: notable
    conf: 0.9
    unless:
      - id: duplicati-dotnet-deps-json-basename
      - id: benign-brackets-helper-exe
      - id: benign-test-invalidphp-exe
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
    all:
      - id: metadata/package/files::package-json-basename
      - id: metadata/package/quality::npm-has-name
    any:
      - id: metadata/package/files::exe-extension-basename
  - id: npm-package-with-dll
    desc: NPM package contains Windows DLL
    crit: suspicious
    conf: 0.9
    unless:
      - id: duplicati-dotnet-deps-json-basename
      - id: benign-brackets-helper-exe
      - id: benign-test-invalidphp-exe
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
    all:
      - id: metadata/package/files::package-json-basename
      - id: metadata/package/quality::npm-has-name
    any:
      - id: metadata/package/files::dll-extension-basename
  - id: npm-package-with-native-binary
    desc: NPM package contains native binary (exe/dll/so/dylib)
    crit: notable
    conf: 0.85
    unless:
      - id: duplicati-dotnet-deps-json-basename
      - id: benign-brackets-helper-exe
      - id: benign-test-invalidphp-exe
    all:
      - id: metadata/package/files::package-json-basename
      - id: metadata/package/quality::npm-has-name
    any:
      - id: metadata/package/files::exe-extension-basename
      - id: metadata/package/files::dll-extension-basename
      - id: metadata/package/files::so-extension-basename
      - id: metadata/package/files::dylib-extension-basename
  - id: npm-package-with-image
    desc: NPM package contains PNG image (potential steganography)
    crit: notable
    conf: 0.7
    unless:
      - id: duplicati-dotnet-deps-json-basename
    all:
      - id: metadata/package/files::package-json-basename
    any:
      - id: metadata/package/files::png-extension-basename
      - id: metadata/package/files::ico-extension-basename
  - id: python-package-with-exe
    desc: Python package contains Windows executable
    crit: suspicious
    conf: 0.9
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
    all:
      - id: metadata/package/files::setup-py-basename
    any:
      - id: metadata/package/files::exe-extension-basename
  - id: python-package-with-exe-pyproject
    desc: Python package (pyproject.toml) contains Windows executable
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/package/files::pyproject-toml-basename
    any:
      - id: metadata/package/files::exe-extension-basename
  - id: python-package-with-dll
    desc: Python package contains Windows DLL
    crit: suspicious
    conf: 0.9
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
    all:
      - id: metadata/package/files::setup-py-basename
    any:
      - id: metadata/package/files::dll-extension-basename
  - id: python-package-with-dll-pyproject
    desc: Python package (pyproject.toml) contains Windows DLL
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/package/files::pyproject-toml-basename
    any:
      - id: metadata/package/files::dll-extension-basename
  - id: python-package-with-native-binary
    desc: Python package contains native binary (exe/dll)
    crit: suspicious
    conf: 0.85
    any:
      - id: python-package-with-exe
      - id: python-package-with-exe-pyproject
      - id: python-package-with-dll
      - id: python-package-with-dll-pyproject
  - id: python-package-with-image
    desc: Python package contains PNG image (potential steganography)
    crit: notable
    conf: 0.7
    all:
      - id: metadata/package/files::setup-py-basename
    any:
      - id: metadata/package/files::png-extension-basename
      - id: metadata/package/files::ico-extension-basename
  - id: script-package-with-windows-binary
    desc: Script-based package contains Windows binary (highly suspicious)
    crit: suspicious
    conf: 0.9
    any:
      - id: npm-package-with-exe
      - id: npm-package-with-dll
      - id: python-package-with-exe
      - id: python-package-with-exe-pyproject
      - id: python-package-with-dll
      - id: python-package-with-dll-pyproject
