defaults:
  platforms: [windows]
composite_rules:
  - id: nuget-package-with-build-hook
    desc: NuGet package with MSBuild execution hook
    crit: suspicious
    conf: 0.97
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
      - id: objectives/supply-chain/install-hook/build::msbuild-prebuild-exec

  - id: nuget-package-with-placeholder-dotnet-dll
    desc: NuGet package with placeholder .NET DLL
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
      - id: metadata/package/files::dll-extension-basename
      - id: metadata/binary/framework::dotnet-assembly
    any:
      - id: metadata/binary/metrics::small-pe
      - id: metadata/binary/metrics::no-functions
      - id: metadata/binary/symbols::single-import-raw
      - id: metadata/binary/layout::low-overall-entropy
    needs: 3

  - id: nuget-package-with-loader-dll
    desc: NuGet package with staged loader DLL
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::nuspec-file
      - id: metadata/package/files::dll-extension-basename
    any:
      - id: objectives/command-and-control/dropper/execution/loader::dotnet-resource-zip-stage-loader
      - id: objectives/command-and-control/dropper/execution/loader::dotnet-admin-batch-stage-loader
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: objectives/command-and-control/infrastructure/domain::http-url-binary
  - id: nuget-package-hollow-metadata-loader
    desc: NuGet loader with hollow metadata
    crit: suspicious
    conf: 0.95
    all:
      - id: nuget-package-with-loader-dll
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::hollow-nuget-metadata

  - id: nuget-prebuild-recon-package
    desc: NuGet package executes prebuild recon callback
    crit: hostile
    conf: 0.995
    attack: T1195.002
    all:
      - id: nuget-package-with-build-hook
      - id: objectives/supply-chain/install-hook/build::msbuild-curl-whoami-callback
    any:
      - id: nuget-package-with-placeholder-dotnet-dll
      - id: objectives/supply-chain/metadata-anomaly/manifest/registry::hollow-nuget-metadata
