defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: setUninstallURL
    desc: Extension uninstall URL callback
    crit: notable
    conf: 0.95
    if:
      type: string_value
      substr: setUninstallURL
  - id: chrome-management
    desc: Extension management API
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: chrome.management
  - id: chrome-debugger
    desc: Browser debugger API
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: chrome.debugger
  - id: chrome-downloads
    desc: chrome.downloads API
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: chrome.downloads
  - id: chrome-cookies-dup
    desc: chrome.cookies API
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: chrome.cookies
  - id: chrome-history-dup
    desc: chrome.history API
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: chrome.history
  - id: chrome-bookmarks
    desc: chrome.bookmarks API
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: chrome.bookmarks
  - id: external-url-on-install
    desc: External URL on install
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: onInstalled[\s\S]{0,50}(https?://[^"'\s]{1,120})
composite_rules:
  - id: ext-uninstall-tracking
    desc: Uninstall tracking callback
    crit: suspicious
    conf: 0.9
    mbc: B0030
    attack: T1071.001
    all:
      - id: setUninstallURL
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::chrome-runtime
  - id: sensitive-data-access
    desc: Sensitive browser data access
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::chrome-extension-context
    needs: 2
    any:
      - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::chrome-cookies-dup
      - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::chrome-history-dup
      - id: chrome-bookmarks
      - id: chrome-downloads
