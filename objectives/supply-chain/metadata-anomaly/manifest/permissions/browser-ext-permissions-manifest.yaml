defaults:
  platforms: [unix, windows]
  for: [chrome-manifest]
traits:
- id: permission-all-urls
  desc: Requests all URLs access
  crit: notable
  conf: 0.95
  size_min: 128
  not:
  - substr: '"name": "ui-page"'
  unless:
  - id: metadata/package/testing/harness::is-test
  if:
    type: kv
    path: permissions
    exact: '<all_urls>'
- id: permission-active-tab
  desc: Extension requests activeTab permission
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: permissions
    exact: 'activeTab'
- id: permission-cookies
  desc: Extension requests cookies permission
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: permissions
    exact: 'cookies'
- id: permission-history
  desc: Extension requests history permission
  crit: suspicious
  conf: 0.95
  if:
    type: kv
    path: permissions
    exact: 'history'
- id: permission-bookmarks
  desc: Extension requests bookmarks permission
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: permissions
    exact: 'bookmarks'
- id: permission-geolocation
  desc: Extension requests geolocation permission
  crit: suspicious
  conf: 0.9
  if:
    type: kv
    path: permissions
    exact: 'geolocation'
- id: permission-clipboard-read
  desc: Extension can read clipboard
  crit: suspicious
  conf: 0.95
  if:
    type: kv
    path: permissions
    exact: 'clipboardRead'
- id: permission-clipboard-write
  desc: Extension can write clipboard
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: permissions
    exact: 'clipboardWrite'
- id: permission-native-messaging
  desc: Extension uses native messaging
  crit: suspicious
  conf: 0.95
  if:
    type: kv
    path: permissions
    exact: 'nativeMessaging'
- id: permission-debugger
  desc: Uses debugger API
  crit: suspicious
  conf: 0.98
  if:
    type: kv
    path: permissions
    exact: 'debugger'
- id: permission-proxy
  desc: Extension can modify proxy settings
  crit: suspicious
  conf: 0.95
  if:
    type: kv
    path: permissions
    exact: 'proxy'
- id: permission-scripting
  desc: Extension requests scripting permission (MV3)
  crit: notable
  conf: 0.9
  unless:
  - id: metadata/package/testing/harness::is-test
  if:
    type: kv
    path: permissions
    exact: 'scripting'
- id: host-all-urls
  desc: Host permission for all URLs
  crit: notable
  conf: 0.95
  size_min: 320
  not:
  - substr: '"name": "Console Log Extension"'
  unless:
  - id: metadata/package/testing/harness::is-test
  if:
    type: kv
    path: host_permissions
    exact: '<all_urls>'
- id: host-all-http
  desc: Access to all HTTP sites
  crit: notable
  conf: 0.95
  if:
    type: kv
    path: host_permissions
    regex: '^\*://\*/\*$|^https?://\*/\*$'
- id: host-shopping-sites
  desc: Extension targets e-commerce sites
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: host_permissions
    regex: 'amazon\.|ebay\.|walmart\.|aliexpress\.'
- id: host-tiktok-sites
  desc: Extension targets TikTok hosts
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: host_permissions
    regex: 'tiktok(v|cdn)?\.com'
- id: host-webmail-main
  desc: Extension targets major webmail
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: host_permissions
    regex: 'mail\.google\.com|outlook\.(live|office)\.com|mail\.yahoo\.com'
- id: host-webmail-alt
  desc: Extension targets private webmail
  crit: notable
  conf: 0.86
  if:
    type: kv
    path: host_permissions
    regex: 'proton\.me|icloud\.com'
- id: host-cloud-docs-google
  desc: Extension targets Google docs
  crit: notable
  conf: 0.88
  if:
    type: kv
    path: host_permissions
    regex: 'drive\.google\.com|docs\.google\.com'
- id: host-cloud-docs-enterprise
  desc: Extension targets enterprise docs
  crit: notable
  conf: 0.88
  if:
    type: kv
    path: host_permissions
    regex: 'dropbox\.com|onedrive\.live\.com|sharepoint\.com'
- id: host-cloud-docs-saas
  desc: Extension targets SaaS docs
  crit: notable
  conf: 0.84
  if:
    type: kv
    path: host_permissions
    regex: 'box\.com|notion\.so'
- id: host-developer-code-sites
  desc: Extension targets code hosts
  crit: notable
  conf: 0.88
  if:
    type: kv
    path: host_permissions
    regex: 'github\.com|gitlab\.com|bitbucket\.org'
- id: host-developer-package-sites
  desc: Extension targets package registries
  crit: notable
  conf: 0.86
  if:
    type: kv
    path: host_permissions
    regex: 'npmjs\.com|pypi\.org'
- id: host-payment-processors
  desc: Extension targets payment processors
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: host_permissions
    regex: 'stripe\.com|paypal\.com|squareup\.com'
- id: host-commerce-admin
  desc: Extension targets commerce admin
  crit: notable
  conf: 0.88
  if:
    type: kv
    path: host_permissions
    regex: 'shopify\.com|sellercentral\.amazon\.com'
- id: host-crypto-finance-major
  desc: Extension targets major exchanges
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: host_permissions
    regex: 'coinbase\.com|binance\.com|kraken\.com|okx\.com'
- id: host-crypto-finance-alt
  desc: Extension targets alt exchanges
  crit: notable
  conf: 0.88
  if:
    type: kv
    path: host_permissions
    regex: 'bybit\.com|kucoin\.com|mexc\.com|gate\.io'
- id: host-messaging-work-sites
  desc: Extension targets work messaging
  crit: notable
  conf: 0.86
  if:
    type: kv
    path: host_permissions
    regex: 'slack\.com|discord\.com|teams\.microsoft\.com|web\.telegram\.org'
- id: content-script-all-urls
  desc: Content script on all URLs
  crit: notable
  conf: 0.95
  size_min: 320
  unless:
  - id: metadata/package/testing/harness::is-test
  if:
    type: kv
    path: 'content_scripts[*].matches'
    exact: '<all_urls>'
- id: content-script-run-at-start
  desc: Content script runs at document_start
  crit: notable
  conf: 0.85
  unless:
  - id: metadata/package/testing/harness::is-test
  if:
    type: kv
    path: 'content_scripts[*].run_at'
    exact: 'document_start'
- id: content-script-all-frames
  desc: Content script runs in all frames
  crit: notable
  conf: 0.8
  if:
    type: kv
    path: 'content_scripts[*].all_frames'
    exact: 'true'
- id: content-script-shopping
  desc: Content script targets shopping sites
  crit: notable
  conf: 0.85
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'amazon\.|ebay\.|walmart\.|aliexpress\.'
- id: content-script-webmail-main
  desc: Content script targets webmail
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'mail\.google\.com|outlook\.(live|office)\.com|mail\.yahoo\.com'
- id: content-script-webmail-alt
  desc: Content script targets private mail
  crit: notable
  conf: 0.86
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'proton\.me|icloud\.com'
- id: content-script-cloud-docs-google
  desc: Content script targets Google docs
  crit: notable
  conf: 0.88
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'drive\.google\.com|docs\.google\.com'
- id: content-script-cloud-docs-enterprise
  desc: Content script targets SaaS docs
  crit: notable
  conf: 0.88
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'dropbox\.com|onedrive\.live\.com|sharepoint\.com'
- id: content-script-cloud-docs-saas
  desc: Content script targets wiki docs
  crit: notable
  conf: 0.84
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'box\.com|notion\.so'
- id: content-script-developer-code
  desc: Content script targets code hosts
  crit: notable
  conf: 0.88
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'github\.com|gitlab\.com|bitbucket\.org'
- id: content-script-developer-packages
  desc: Content script targets registries
  crit: notable
  conf: 0.86
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'npmjs\.com|pypi\.org'
- id: content-script-payment-processors
  desc: Content script targets payments
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'stripe\.com|paypal\.com|squareup\.com'
- id: content-script-commerce-admin
  desc: Content script targets commerce
  crit: notable
  conf: 0.88
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'shopify\.com|sellercentral\.amazon\.com'
- id: content-script-crypto-major
  desc: Content script targets exchanges
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'coinbase\.com|binance\.com|kraken\.com|okx\.com'
- id: content-script-crypto-alt
  desc: Content script targets alt exchanges
  crit: notable
  conf: 0.88
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'bybit\.com|kucoin\.com|mexc\.com|gate\.io'
- id: content-script-messaging-work
  desc: Content script targets work chat
  crit: notable
  conf: 0.86
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'slack\.com|discord\.com|teams\.microsoft\.com|web\.telegram\.org'
- id: background-persistent
  desc: Extension uses persistent background page
  crit: notable
  conf: 0.85
  unless:
  - id: metadata/package/testing/harness::is-test
  if:
    type: kv
    path: 'background.persistent'
    exact: 'true'
- id: background-service-worker
  desc: Extension uses service worker (MV3)
  crit: notable
  conf: 0.9
  unless:
  - id: metadata/package/testing/harness::is-test
  if:
    type: kv
    path: 'background.service_worker'
- id: host-amazon-global
  desc: Targets many Amazon regional domains
  crit: notable
  conf: 0.9
  count_min: 15
  if:
    type: text
    substr: amazon.
- id: externally-connectable
  desc: Extension allows external connections
  crit: suspicious
  conf: 0.9
  if:
    type: kv
    path: 'externally_connectable'
- id: update-url-external
  desc: Non-Google update URL
  crit: suspicious
  conf: 0.9
  if:
    type: kv
    path: 'update_url'
  unless:
  - id: update-url-google
- id: update-url-google
  desc: Uses Google update URL
  crit: notable
  conf: 0.95
  if:
    type: kv
    path: 'update_url'
    substr: 'clients2.google.com'
- id: web-accessible-resources
  desc: Exposes resources to web
  crit: notable
  conf: 0.85
  if:
    type: kv
    path: 'web_accessible_resources'
- id: web-accessible-all
  desc: Exposes all extension resources
  crit: suspicious
  conf: 0.94
  if:
    type: kv
    path: 'web_accessible_resources[*].resources'
    exact: '*'
- id: content-script-social-media-a
  desc: Targets social media domains (set A)
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'twitter\.com|x\.com|facebook\.com|instagram\.com'
- id: content-script-social-media-b
  desc: Targets social media domains (set B)
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: 'content_scripts[*].matches'
    regex: 'linkedin\.com|reddit\.com|tiktok\.com'
- id: web-accessible-bridge-script
  desc: Exposes extension bridge script
  crit: notable
  conf: 0.9
  if:
    type: kv
    path: 'web_accessible_resources[*].resources'
    regex: 'bridge(_script)?\.js'
composite_rules:
- id: content-script-social-media
  desc: Content script targets social media sites
  crit: notable
  conf: 0.9
  any:
  - id: content-script-social-media-a
  - id: content-script-social-media-b
- id: host-webmail-sites
  desc: Extension targets webmail hosts
  crit: notable
  conf: 0.9
  any:
  - id: host-webmail-main
  - id: host-webmail-alt
- id: host-cloud-docs-storage
  desc: Extension targets cloud docs
  crit: notable
  conf: 0.88
  any:
  - id: host-cloud-docs-google
  - id: host-cloud-docs-enterprise
  - id: host-cloud-docs-saas
- id: host-developer-sites
  desc: Extension targets dev platforms
  crit: notable
  conf: 0.88
  any:
  - id: host-developer-code-sites
  - id: host-developer-package-sites
- id: host-payment-commerce-admin
  desc: Extension targets payment admin
  crit: notable
  conf: 0.9
  any:
  - id: host-payment-processors
  - id: host-commerce-admin
- id: host-crypto-finance-sites
  desc: Extension targets crypto finance
  crit: notable
  conf: 0.9
  any:
  - id: host-crypto-finance-major
  - id: host-crypto-finance-alt
- id: content-script-webmail
  desc: Content script targets webmail
  crit: notable
  conf: 0.9
  any:
  - id: content-script-webmail-main
  - id: content-script-webmail-alt
- id: content-script-cloud-docs
  desc: Content script targets cloud docs
  crit: notable
  conf: 0.88
  any:
  - id: content-script-cloud-docs-google
  - id: content-script-cloud-docs-enterprise
  - id: content-script-cloud-docs-saas
- id: content-script-developer-sites
  desc: Content script targets dev platforms
  crit: notable
  conf: 0.88
  any:
  - id: content-script-developer-code
  - id: content-script-developer-packages
- id: content-script-payment-admin
  desc: Content script targets payment admin
  crit: notable
  conf: 0.9
  any:
  - id: content-script-payment-processors
  - id: content-script-commerce-admin
- id: content-script-crypto-finance
  desc: Content script targets crypto finance
  crit: notable
  conf: 0.9
  any:
  - id: content-script-crypto-major
  - id: content-script-crypto-alt
- id: overprivileged
  desc: Extension requests excessive permissions
  crit: notable
  conf: 0.9
  needs: 3
  unless:
  - id: metadata/package/testing/harness::is-test
  any:
  - id: permission-all-urls
  - id: host-all-urls
  - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::network-request-modification
  - id: permission-cookies
  - id: permission-history
  - id: permission-clipboard-read
  - id: permission-native-messaging
  - id: permission-debugger
  - id: permission-proxy
- id: ecommerce-targeting
  desc: Extension specifically targets shopping sites
  crit: notable
  conf: 0.85
  all:
  - id: metadata/package/chrome-extension::is-chrome-manifest
  any:
  - id: host-shopping-sites
  - id: content-script-shopping
  - id: host-amazon-global
- id: webmail-targeting
  desc: Extension targets webmail sites
  crit: notable
  conf: 0.9
  any:
  - id: host-webmail-sites
  - id: content-script-webmail
- id: cloud-docs-targeting
  desc: Extension targets cloud documents
  crit: notable
  conf: 0.88
  any:
  - id: host-cloud-docs-storage
  - id: content-script-cloud-docs
- id: developer-platform-targeting
  desc: Extension targets developer platforms
  crit: notable
  conf: 0.88
  any:
  - id: host-developer-sites
  - id: content-script-developer-sites
- id: payment-admin-targeting
  desc: Extension targets payment admin
  crit: notable
  conf: 0.9
  any:
  - id: host-payment-commerce-admin
  - id: content-script-payment-admin
- id: crypto-finance-targeting
  desc: Extension targets crypto finance
  crit: notable
  conf: 0.9
  any:
  - id: host-crypto-finance-sites
  - id: content-script-crypto-finance
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::crypto-exchange-sites
- id: work-messaging-targeting
  desc: Extension targets work messaging
  crit: notable
  conf: 0.86
  any:
  - id: host-messaging-work-sites
  - id: content-script-messaging-work
- id: personal-data-targeting
  desc: Extension targets personal data
  crit: suspicious
  conf: 0.9
  any:
  - id: webmail-targeting
  - id: cloud-docs-targeting
  - id: work-messaging-targeting
- id: financial-dev-targeting
  desc: Extension targets financial/dev sites
  crit: suspicious
  conf: 0.9
  any:
  - id: developer-platform-targeting
  - id: payment-admin-targeting
  - id: crypto-finance-targeting
- id: broad-content-injection
  desc: Extension can inject content into many sites
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/package/chrome-extension::is-chrome-manifest
  unless:
  - id: metadata/package/testing/harness::is-test
  any:
  - id: content-script-all-urls
  - id: permission-all-urls
  - id: host-all-urls
  - id: host-all-http
- id: early-exposed-injection-surface
  desc: Early content injection with exposed resources
  crit: suspicious
  conf: 0.93
  all:
  - id: metadata/package/chrome-extension::is-chrome-manifest
  - id: content-script-run-at-start
  - id: web-accessible-all
  any:
  - id: content-script-all-urls
  - id: host-all-urls
  - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::network-filtering
- id: data-theft-permissions
  desc: Extension has privacy-sensitive data access permissions
  crit: notable
  conf: 0.95
  all:
  - id: metadata/package/chrome-extension::is-chrome-manifest
  needs: 2
  any:
  - id: permission-cookies
  - id: permission-history
  - id: permission-clipboard-read
  - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::network-request-modification
- id: deprecated-with-dangerous
  desc: MV2 extension with dangerous permissions
  crit: notable
  conf: 0.9
  all:
  - id: metadata/package/chrome-extension::manifest-v2
  unless:
  - id: metadata/package/testing/harness::is-test
  any:
  - id: permission-all-urls
  - id: host-all-urls
  - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::network-request-modification
  - id: permission-debugger
- id: crypto-social-media-injection
  desc: Crypto extension injects into social media
  crit: suspicious
  conf: 0.9
  all:
  - id: content-script-social-media
  any:
  - id: metadata/package/chrome-extension::crypto-finance-name
  - id: metadata/package/chrome-extension::crypto-finance-description
- id: tiktok-network-injection
  desc: TikTok injection with network controls
  crit: suspicious
  conf: 0.92
  all:
  - id: host-tiktok-sites
  - id: content-script-all-frames
  - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::network-request-modification
- id: exposed-social-bridge
  desc: Social content exposes bridge script
  crit: suspicious
  conf: 0.9
  all:
  - id: content-script-social-media
  - id: web-accessible-bridge-script
  any:
  - id: content-script-all-frames
  - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::network-filtering
- id: sensitive-network-injection
  desc: Sensitive site network injection
  crit: suspicious
  conf: 0.92
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::network-request-modification
  any:
  - id: personal-data-targeting
  - id: financial-dev-targeting
  - id: ecommerce-targeting
- id: exposed-sensitive-bridge
  desc: Sensitive site exposes bridge
  crit: suspicious
  conf: 0.9
  all:
  - id: web-accessible-bridge-script
  any:
  - id: personal-data-targeting
  - id: financial-dev-targeting
  - id: ecommerce-targeting
- id: fake-adblocker-mv3
  desc: MV3 Ad Blocker using content scripts without declarativeNetRequest
  crit: suspicious
  conf: 0.95
  all:
  - id: metadata/package/chrome-extension::manifest-v3
  - id: ecommerce-targeting
  any:
  - id: metadata/package/chrome-extension::adblocker-name
  - id: metadata/package/chrome-extension::adblocker-description
  unless:
  - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::network-filtering
- id: crypto-api-theft-target
  desc: Extension targets crypto exchange API key pages
  crit: hostile
  conf: 0.95
  all:
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::crypto-exchange-sites
  - id: objectives/supply-chain/metadata-anomaly/manifest/markers::api-key-pages
  any:
  - id: permission-scripting
  - id: permission-active-tab
  - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::network-request-modification
