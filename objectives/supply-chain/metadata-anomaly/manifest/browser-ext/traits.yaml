defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
traits:
  - id: onInstalled
    desc: chrome.runtime.onInstalled listener
    crit: baseline
    conf: 0.9
    if:
      type: string_literal
      substr: onInstalled
  - id: executeScript
    desc: chrome.scripting.executeScript call
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: symbol
      exact: executeScript
  - id: insertCSS
    desc: chrome.scripting.insertCSS call
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: symbol
      exact: insertCSS
composite_rules:
  - id: chrome-extension-context
    desc: Chrome extension API context
    crit: baseline
    conf: 0.95
    any:
      - id: micro-behaviors/ui/window/manage/browser-extension
