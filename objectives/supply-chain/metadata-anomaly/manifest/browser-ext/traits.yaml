defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
traits:
  - id: executeScript
    desc: chrome.scripting.executeScript call
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: symbol
      exact: executeScript
  - id: insertCSS
    desc: chrome.scripting.insertCSS call
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: symbol
      exact: insertCSS
composite_rules:
  - id: chrome-extension-context
    desc: Chrome extension API context
    crit: baseline
    conf: 0.95
    any:
      # Chrome/WebExtension API surface migrated out of the old monolith into
      # per-technique homes; reference the broad presence traits.
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-api
      - id: micro-behaviors/browser-extension/tabs::chrome-tabs-api
      - id: micro-behaviors/data/db/web-storage::chrome-storage-api
      - id: micro-behaviors/communications/ipc/message::chrome-runtime-send-message
