defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
traits:
  - id: runtime-set-uninstall-url
    desc: Sets uninstall tracking URL
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: call
      regex: chrome\.runtime\.setUninstallURL|setUninstallURL\(
  - id: identity-get-auth-token
    desc: Requests browser identity auth token
    crit: notable
    conf: 0.92
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.identity\.getAuthToken|identity\.getAuthToken\(
  - id: chrome-dnr-update-dynamic-rules
    desc: Chrome updates dynamic DNR rules
    crit: notable
    conf: 0.92
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: tree-sitter
      kind: call
      exact: chrome.declarativeNetRequest.updateDynamicRules
  - id: browser-dnr-update-dynamic-rules
    desc: Browser updates dynamic DNR rules
    crit: notable
    conf: 0.92
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: tree-sitter
      kind: call
      exact: browser.declarativeNetRequest.updateDynamicRules
  - id: bare-dnr-update-dynamic-rules
    desc: Updates dynamic DNR rules
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: tree-sitter
      kind: call
      exact: declarativeNetRequest.updateDynamicRules
  - id: chrome-dnr-update-session-rules
    desc: Chrome updates session DNR rules
    crit: notable
    conf: 0.92
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: tree-sitter
      kind: call
      exact: chrome.declarativeNetRequest.updateSessionRules
  - id: browser-dnr-update-session-rules
    desc: Browser updates session DNR rules
    crit: notable
    conf: 0.92
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: tree-sitter
      kind: call
      exact: browser.declarativeNetRequest.updateSessionRules
  - id: bare-dnr-update-session-rules
    desc: Updates session DNR rules
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: tree-sitter
      kind: call
      exact: declarativeNetRequest.updateSessionRules
  - id: extension-debugger-attach
    desc: Chrome debugger attaches to tab
    crit: notable
    conf: 0.92
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: tree-sitter
      kind: call
      regex: chrome\.debugger\.attach|debugger\.attach\(
  - id: webrequest-on-before-request
    desc: Intercepts web requests before sending
    crit: notable
    conf: 0.95
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.webRequest\.onBeforeRequest(\.addListener)?\s*\(
  - id: webrequest-on-before-send-headers
    desc: Modifies request headers
    crit: notable
    conf: 0.95
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.webRequest\.onBeforeSendHeaders(\.addListener)?\s*\(
  - id: webrequest-on-headers-received
    desc: Modifies response headers
    crit: notable
    conf: 0.95
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.webRequest\.onHeadersReceived(\.addListener)?\s*\(
  - id: cookies-get
    desc: Reads browser cookies
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.cookies\.get\s*\(
  - id: cookies-get-all
    desc: Reads all cookies matching filter
    crit: suspicious
    conf: 0.9
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.cookies\.getAll\s*\(
    downgrade:
      any:
      - id: metadata/signed/platform::mozilla-extension
  - id: cookies-set
    desc: Sets browser cookies
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.cookies\.set\s*\(
  - id: cookies-on-changed-listener
    desc: Watches browser cookie changes
    crit: notable
    conf: 0.92
    if:
      type: tree-sitter
      kind: call
      regex: cookies\.onChanged\.addListener
  - id: management-get-all
    desc: Enumerates installed extensions
    crit: notable
    conf: 0.92
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.management\.getAll|management\.getAll\(
  - id: history-search
    desc: Searches browser history
    crit: suspicious
    conf: 0.95
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.history\.search
  - id: history-get-visits
    desc: Gets visit history for URL
    crit: suspicious
    conf: 0.95
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.history\.getVisits
  - id: bookmarks-get-tree
    desc: Gets entire bookmark tree
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      kind: call
      regex: (chrome|browser)\.bookmarks\.getTree
  - id: mutation-observer
    desc: Observes DOM mutations
    crit: baseline
    conf: 0.9
    if:
      type: tree-sitter
      kind: call
      regex: new MutationObserver|MutationObserver\(
  - id: observe-document-body-call
    desc: .observe(document.body) call
    # Component: any observer (Resize/Intersection/Performance/Mutation) can call
    # .observe(document.body). Only meaningful as the body half of the
    # mutation-observer-body composite, which also requires a MutationObserver.
    # type:text (not string_literal) so it matches whether the observer code is
    # inline or embedded in an HTML/JS template string (e.g. a webview/injection).
    crit: component
    conf: 0.85
    if:
      type: text
      regex: observer\.observe\(document\.body|observe\(document\.body
  - id: external-url-io-domain
    desc: URL to .io domain
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: https?://[a-zA-Z0-9][-a-zA-Z0-9]*\.io/
  - id: chrome-namespace-extra
    desc: Uses extended chrome.* namespace APIs
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: chrome\.(alarms|notifications)
  - id: disable-devtools-lib
    desc: Uses DisableDevtool anti-inspection library
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: DisableDevtool|disable-devtool
  - id: dnr-cookie-header-mod
    desc: DNR rule modifies Cookie header
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: modifyHeaders[\s\S]{0,220}(header|name)\s*:\s*['"]Cookie['"]
  - id: extension-id-map
    desc: Hardcoded extension ID map or list
    crit: component
    conf: 0.86
    count_min: 3
    if:
      type: text
      regex: \b[a-z]{32}\b
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: tabs-execute-script-tabs
    desc: Executes script via tabs API
    crit: notable
    conf: 0.95
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: tree-sitter
      kind: call
      regex: chrome\.tabs\.executeScript|tabs\.executeScript\(
  - id: tabs-execute-script-scripting
    desc: Executes script via scripting API
    crit: notable
    conf: 0.95
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      type: tree-sitter
      kind: call
      regex: chrome\.scripting\.executeScript
composite_rules:
  - id: mutation-observer-body
    desc: Observes mutations on document body
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-mutation-observer
      - id: observe-document-body-call
  - id: chrome-namespace-core
    desc: Uses core chrome.* namespace APIs
    crit: notable
    conf: 0.95
    any:
      # Chrome/WebExtension API surface migrated out of the old monolith into
      # per-technique homes; reference the broad presence traits.
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-api
      - id: micro-behaviors/browser-extension/tabs::chrome-tabs-api
      - id: micro-behaviors/data/db/web-storage::chrome-storage-api
      - id: micro-behaviors/communications/ipc/message::chrome-runtime-send-message
      - id: objectives/supply-chain/metadata-anomaly/manifest/permissions::chrome-cookies-dup
  - id: chrome-namespace
    desc: Uses chrome.* namespace
    crit: notable
    conf: 0.95
    any:
      - id: chrome-namespace-core
      - id: chrome-namespace-extra
  - id: tabs-execute-script
    desc: Executes script in tab context
    crit: suspicious
    conf: 0.95
    any:
      - id: tabs-execute-script-tabs
      - id: tabs-execute-script-scripting
  - id: is-extension
    desc: File is part of a browser extension
    crit: notable
    conf: 0.9
    any:
      - id: chrome-namespace
      - id: micro-behaviors/browser-extension/lifecycle::browser-namespace
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-installed
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-get-url
      - id: identity-get-auth-token
  - id: uninstall-tracking
    desc: Extension tracks user uninstalls to external domain
    crit: suspicious
    conf: 0.9
    all:
      - id: runtime-set-uninstall-url
      - id: external-url-io-domain
  - id: data-collection
    desc: Extension can collect sensitive browsing data
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: cookies-get-all
      - id: history-search
      - id: history-get-visits
      - id: bookmarks-get-tree
  - id: request-interception
    desc: Extension intercepts/modifies web requests
    crit: suspicious
    conf: 0.9
    any:
      - id: webrequest-on-before-request
      - id: webrequest-on-before-send-headers
      - id: webrequest-on-headers-received
      - id: declarative-net-request-update
  - id: declarative-net-request-update
    desc: Updates declarativeNetRequest rules
    crit: notable
    conf: 0.92
    any:
      - id: chrome-dnr-update-dynamic-rules
      - id: browser-dnr-update-dynamic-rules
      - id: bare-dnr-update-dynamic-rules
      - id: chrome-dnr-update-session-rules
      - id: browser-dnr-update-session-rules
      - id: bare-dnr-update-session-rules
