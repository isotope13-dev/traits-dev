defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: chrome-runtime
    desc: chrome.runtime API usage
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: text
      regex: chrome\.runtime\.[A-Za-z_]
  - id: chrome-tabs
    desc: chrome.tabs API usage
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: text
      regex: chrome\.tabs\.[A-Za-z_]
  - id: chrome-storage
    desc: chrome.storage API usage
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: text
      regex: chrome\.storage\.[A-Za-z_]
  - id: chrome-webRequest
    desc: chrome.webRequest API usage
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: text
      regex: chrome\.webRequest\.[A-Za-z_]
  - id: chrome-scripting
    desc: chrome.scripting API usage
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: text
      regex: chrome\.scripting\.[A-Za-z_]
  - id: onInstalled
    desc: chrome.runtime.onInstalled listener
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: onInstalled
  - id: sendMessage
    desc: chrome.runtime.sendMessage
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: chrome\.runtime\.sendMessage|runtime\.sendMessage
  - id: onMessage
    desc: chrome.runtime.onMessage listener
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (chrome\.)?runtime\.onMessage(\.addListener)?
  - id: executeScript
    desc: chrome.scripting.executeScript call
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: text
      regex: \bexecuteScript\s*\(
  - id: insertCSS
    desc: chrome.scripting.insertCSS call
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: text
      regex: \binsertCSS\s*\(
composite_rules:
  - id: chrome-extension-context
    desc: Chrome extension API context
    crit: notable
    conf: 0.95
    any:
      - id: chrome-runtime
      - id: chrome-tabs
      - id: chrome-storage
      - id: chrome-webRequest
