defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: "T1195.002"
traits:
  - id: installation-method-deb
    desc: Debian installation method marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '"installationMethod"\s*:\s*"deb"'
composite_rules:
  - id: preinstall-only-package-entrypoints
    desc: Package exposes runtime entrypoints
    crit: component
    conf: 0.9
    any:
      - id: objectives/supply-chain/metadata-anomaly/manifest/npm::postinstall-hook-key
      - id: metadata/package/fields/main::pkg-main-field
      - id: metadata/package/fields/files::has-files-field
      - id: metadata/package/fields/bin::has-bin-field
      - id: metadata/package/fields/exports::pkg-module-field
  - id: preinstall-only-package-activity
    desc: Package exposes install or test activity
    crit: component
    conf: 0.9
    any:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-install
      - id: metadata/package/fields/exports::pkg-exports-field-entry
      - id: metadata/package/testing/presence/manifest::pkg-test-script-field
  - id: preinstall-only-package-surface
    desc: Package exposes behavior beyond preinstall
    crit: component
    conf: 0.9
    any:
      - id: preinstall-only-package-entrypoints
      - id: preinstall-only-package-activity
  - id: tiny-preinstall-only-package
    desc: Tiny package with only preinstall
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/package/fields/freeform::pkg-skeleton-small
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
    unless:
      - id: preinstall-only-package-surface
      - id: installation-method-deb
  - id: manifest-only-preinstall-package
    desc: Tiny manifest-only package with preinstall
    crit: suspicious
    conf: 0.97
    all:
      - id: tiny-preinstall-only-package
      - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-no-deps-at-all
      - id: objectives/supply-chain/hidden-payload/staging::no-build-script
  - id: manifest-only-preinstall-recon-exfil
    desc: Manifest-only preinstall package exfils host identity
    crit: hostile
    conf: 0.995
    mbc: "E1041"
    all:
      - id: manifest-only-preinstall-package
      - id: objectives/supply-chain/recon-exfil/oast
  # A pure type-definitions package (main → .d.ts) ships no runtime code, so it
  # has nothing to legitimately execute on install. Declaring any lifecycle
  # script in that shape is the Shai-Hulud trojanized-types tell — detectable
  # from package.json alone, so it fires whether the package is loose on disk or
  # inside its tarball (unlike the archive-scoped payload composite).
  - id: types-package-runs-install-hook
    desc: Types-only package executes code on install
    crit: hostile
    conf: 0.97
    mbc: "B0024"
    all:
      - id: metadata/package/fields/main::pkg-main-is-dts
    any:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-install
    needs: 1
