defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
  - id: desc-run-command-tool
    desc: Description mentions run_command tool
    crit: notable
    conf: 0.85
    if:
      type: value
      path: description
      regex: run[_ -]?command
      case_insensitive: true
  - id: name-mcp-runcommand
    desc: Package name mentions MCP runcommand
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: name
      regex: mcp[-_]?runcommand|mcp[-_].{0,12}run[-_]?command
      case_insensitive: true
composite_rules:
  - id: npm-mcp-run-command-package
    desc: npm package markets MCP run-command service
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/import/npm::modelcontextprotocol/sdk
      - id: metadata/package/fields/bin::bin-js-entry
    any:
      - id: desc-run-command-tool
      - id: name-mcp-runcommand
