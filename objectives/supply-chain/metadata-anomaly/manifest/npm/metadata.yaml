# npm Package Metadata Patterns
# Detects suspicious metadata patterns in package.json
# These patterns often indicate malicious or typosquatting packages
defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
  # === Install Hooks ===
  # preinstall detection lives at metadata/package/fields/scripts::has-preinstall-script
  # (identical kv match, slightly broader platforms). Composites reference it
  # directly — no local duplicate needed.
  - id: postinstall-hook-key
    desc: Package has postinstall script
    crit: notable
    conf: 0.85
    if:
      type: value
      path: "scripts.postinstall"
    unless:
      - type: value
        path: "name"
        exact: "run-script-os"
      - type: value
        path: "scripts.postinstall"
        exact: "run-script-os"
      - type: value
        path: "scripts.postinstall"
        exact: "prisma generate"
      # === Install Hook Installs Package ===
      # This is highly suspicious: legitimate packages declare dependencies in package.json,
      # they don't install packages via commands in hooks
  - id: postinstall-runs-npm-install
    desc: postinstall hook runs npm install
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.postinstall"
      regex: "\\bnpm\\s+(install|i|add)\\s"
  - id: postinstall-runs-yarn-add
    desc: postinstall hook runs yarn add
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.postinstall"
      regex: "\\byarn\\s+(add|global add)\\s"
  - id: postinstall-runs-pnpm-add
    desc: postinstall hook runs pnpm add
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.postinstall"
      regex: "\\bpnpm\\s+(add|install)\\s"
  - id: postinstall-runs-node-script
    desc: postinstall runs local node script
    crit: notable
    conf: 0.92
    if:
      type: value
      path: "scripts.postinstall"
      regex: "^node\\s+(\\./)?[A-Za-z0-9_./-]{1,80}\\.js$"
    unless:
      - type: value
        path: "description"
        substr: "build scripts"
      - id: metadata/package/fields/repository::has-repository-evidence
  - id: preinstall-runs-npm-install
    desc: preinstall hook runs npm install
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.preinstall"
      regex: "\\bnpm\\s+(install|i|add)\\s"
  - id: preinstall-runs-yarn-add
    desc: preinstall hook runs yarn add
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.preinstall"
      regex: "\\byarn\\s+(add|global add)\\s"
  - id: preinstall-runs-pnpm-add
    desc: preinstall hook runs pnpm add
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.preinstall"
      regex: "\\bpnpm\\s+(add|install)\\s"
  - id: build-runs-shell-sidecar
    desc: Build script launches shell sidecar
    crit: notable
    conf: 0.88
    if:
      type: value
      path: "scripts.build"
      regex: "\\b(bash|sh)\\s+(\\./)?[A-Za-z0-9_./-]{1,120}\\.sh\\b"
  - id: healthcheck-runs-shell-sidecar
    desc: Health check launches shell sidecar
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: "scripts.health-check"
      regex: "\\b(bash|sh)\\s+(\\./)?[A-Za-z0-9_./-]{1,120}\\.sh\\b"
  - id: npm-script-background-shell
    desc: npm script backgrounds shell sidecar
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: "scripts"
      regex: "\\.sh\\b.{0,80}(/dev/null|2>&1|&)"
      # === Repository/Homepage Patterns ===
  - id: npm-homepage-url
    desc: Package homepage points to npm
    crit: notable
    conf: 0.75
    if:
      type: value
      path: "homepage"
      substr: "npmjs.com"
    unless:
      - type: value
        path: "homepage"
        exact: "https://npmjs.com/package/libnpm"
      - type: value
        path: "homepage"
        regex: "https://npmjs\\.com/package/libnpm[a-z]+"
  - id: npm-repo-url
    desc: Repository URL points to npm
    crit: notable
    conf: 0.75
    if:
      type: value
      path: "repository.url"
      substr: "npmjs.com"
      # === Repository Format Patterns ===
  - id: repo-shorthand-format
    # GitHub shorthand: "User/repo-name" (no full URL)
    desc: Repository uses GitHub shorthand format
    crit: component
    conf: 0.8
    if:
      type: value
      path: "repository"
      regex: "^[A-Za-z0-9_.-]+/[a-z0-9][a-z0-9._-]*$"
    unless:
      - type: value
        path: "repository"
        exact: "npm/security-holder"
      # Package name is a hyphenated multi-word name
  - id: version-mature
    desc: Package version is past 1.0
    crit: component
    conf: 0.6
    if:
      id: metadata/package/fields/version::mature-version
  - id: main-index-js
    desc: Package main points to index.js
    crit: component
    conf: 0.84
    if:
      type: value
      path: main
      exact: index.js
  - id: scoped-package-name
    desc: Package uses npm scope name
    crit: component
    conf: 0.84
    if:
      type: value
      path: name
      regex: "^@[a-z0-9][a-z0-9-]{1,80}/[a-z0-9][a-z0-9._-]{0,80}$"
  - id: npm-version-inflated-90plus
    desc: npm package version major 90+
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: version
      regex: "^9[0-9]\\.[0-9]+\\.[0-9]+$"
    attack: "T1195.002"
      # === Description Patterns ===
  - id: desc-lightweight
    desc: Description mentions lightweight
    crit: component
    conf: 0.5
    if:
      type: value
      path: "description"
      substr: "lightweight"
      case_insensitive: true
  - id: desc-modern-web-apps
    desc: Description mentions modern web apps
    crit: component
    conf: 0.5
    if:
      type: value
      path: "description"
      regex: "modern.{0,100}(web|app)"
      case_insensitive: true
  - id: desc-universal
    desc: Description mentions universal
    crit: component
    conf: 0.5
    if:
      type: value
      path: "description"
      substr: "universal"
      case_insensitive: true
  - id: desc-powerful-library
    desc: Description mentions powerful library
    crit: component
    conf: 0.5
    if:
      type: value
      path: "description"
      regex: "powerful.{0,100}(library|framework)"
      case_insensitive: true
  - id: desc-simple
    desc: Description contains "simple"
    crit: component
    conf: 0.5
    if:
      type: value
      path: "description"
      substr: "simple"
      case_insensitive: true
  - id: desc-hijack-secrets
    desc: Description advertises hijacking secrets
    crit: suspicious
    conf: 0.99
    attack: "T1195.002"
    if:
      type: value
      path: "description"
      regex: "hijack.{0,20}secret"
      case_insensitive: true
  - id: desc-easy
    desc: Description contains "easy"
    crit: component
    conf: 0.5
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: repository.url
        exists: true
    if:
      type: value
      path: "description"
      substr: "easy"
      case_insensitive: true
      # === Security Research Patterns ===
  - id: desc-whitehat-research
    desc: Description claims to be for security research/whitehat
    crit: notable
    conf: 0.8
    if:
      type: value
      path: "description"
      regex: "whitehat|bug.?bounty|security.?research|pentest"
      case_insensitive: true
  - id: desc-generic-js-utility
    desc: Generic JS utility placeholder phrase
    crit: notable
    conf: 0.78
    attack: T1195.002
    if:
      type: value
      path: "description"
      regex: "(?i)some useful (js|javascript) (lib|libs|utilities)"
  - id: desc-generic-js-utility-helpers
    desc: Generic JS helper placeholder phrase
    crit: notable
    conf: 0.78
    attack: T1195.002
    if:
      type: value
      path: "description"
      regex: "(?i)some useful (js|javascript) (utils|helper|helpers)"
  - id: desc-generic-useful-lib
    desc: Generic useful JS library placeholder
    crit: notable
    conf: 0.72
    if:
      type: value
      path: "description"
      regex: "(?i)^(a )?(useful|handy) (js|javascript) (lib|library)$"
  - id: desc-generic-useful-node-pkg
    desc: Generic useful node package placeholder
    crit: notable
    conf: 0.72
    if:
      type: value
      path: "description"
      regex: "(?i)^(a )?(useful|handy) (node|npm) (package|module)$"
  - id: desc-analyst-server
    desc: Description references "analyst server" (malware C2 indicator)
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "description"
      regex: "analyst server"
      case_insensitive: true
    attack: "T1195.002"
  - id: cross-ecosystem-cocoapods-name
    desc: CocoaPods reverse-domain package name in npm
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: value
      path: name
      regex: "^org\\.cocoapods\\."
  - id: cross-ecosystem-java-name
    desc: Java/Maven reverse-domain package name in npm
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: value
      path: name
      regex: "^(com|org|io|net)\\.[a-z][a-z0-9]*\\.[a-z]"
  - id: tabby-builtin-plugin-keyword
    desc: Tabby builtin plugin package marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: tabby-builtin-plugin
# === Composite Rules ===
composite_rules:
  - id: npm-secret-hijack-hook
    desc: Postinstall package advertises secret hijack
    crit: hostile
    conf: 0.995
    attack: "T1195.002"
    all:
      - id: postinstall-hook-key
      - id: postinstall-runs-node-script
      - id: desc-hijack-secrets
  # Install hook group
  - id: install-hooks-comp
    desc: Package has install hook
    crit: notable
    conf: 0.6
    any:
      - id: metadata/package/fields/scripts::has-preinstall-script
      - id: postinstall-hook-key
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-install
        # Install hook that installs packages (highly suspicious)
        # Legitimate packages declare dependencies in package.json - running install commands
        # in hooks is a supply chain attack indicator
  - id: install-hook-runs-pkg-install
    desc: Install hook runs npm/yarn/pnpm install command
    crit: hostile
    conf: 0.98
    attack: "T1195.002"
    any:
      - id: postinstall-runs-npm-install
      - id: postinstall-runs-yarn-add
      - id: postinstall-runs-pnpm-add
      - id: preinstall-runs-npm-install
      - id: preinstall-runs-yarn-add
      - id: preinstall-runs-pnpm-add
        # Version 1.0.0 with install hooks
  - id: version-1-0-0-with-hooks
    desc: Version 1.0.0 with install hooks
    crit: suspicious
    conf: 0.75
    all:
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-version-exactly-1-0-0
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    downgrade:
      any:
        - id: metadata/package/fields/freeform::pkg-skeleton-small
        - id: metadata/package/fields/freeform::npm-template-manifest-placeholder
        # npm URL as homepage/repository
  - id: npm-as-homepage
    desc: Package uses npmjs.com as homepage
    crit: notable
    conf: 0.8
    any:
      - id: npm-homepage-url
      - id: npm-repo-url
        # Missing repository with install hooks
  - id: no-repo-with-hooks
    desc: Package has install hooks but no repo
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    unless:
      - id: metadata/package/fields/repository::has-repository-evidence
      - id: metadata/package/testing/presence/harness::test-fixture-directory
      - id: metadata/package/testing/presence/fixture::npm-fixture-package-name
      - id: metadata/package/fields/freeform::npm-metadata-benign-context
      - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-monorepo-workspace-dep
      - id: tabby-builtin-plugin-keyword
    downgrade:
      any:
        - id: metadata/package/fields/freeform::pkg-skeleton-small
  - id: desc-simple-easy
    desc: Description mentions simple/easy
    crit: component
    conf: 0.5
    any:
      - id: desc-simple
      - id: desc-easy
        # Generic descriptions group
  - id: generic-descriptions
    desc: Package has generic marketing description
    crit: notable
    conf: 0.5
    needs: 2
    any:
      - id: desc-lightweight
      - id: desc-modern-web-apps
      - id: desc-universal
      - id: desc-powerful-library
      - id: desc-simple-easy
        # Generic description with hooks
  - id: generic-desc-with-hooks
    desc: Generic description with install hooks
    crit: suspicious
    conf: 0.8
    all:
      - id: generic-descriptions
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    unless:
      - id: objectives/supply-chain/install-hook/scripts/prepare::prepare-is-build-tool
        # === Cloned/Copied Package Identity ===
  - id: cloned-package-identity
    desc: Package with shorthand repo but missing bugs/homepage (possible copy)
    crit: notable
    conf: 0.75
    attack: "T1195.002"
    all:
      - id: repo-shorthand-format
      - id: metadata/package/fields/name::npm-hyphenated-multiword-name
    unless:
      - id: metadata/package/fields/freeform::npm-security-holder-package
      - id: metadata/package/fields/bugs::has-bugs-url-field
      - id: metadata/package/fields/homepage::has-homepage-field
      - id: metadata/package/fields/files::has-files-field
      - id: metadata/package/fields/engines::has-engines
      - id: metadata/package/fields/contributors::has-contributors
  - id: mature-cloned-package
    desc: Mature version package with incomplete copied metadata
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    mbc: "F0004"
    all:
      - id: version-mature
      - id: repo-shorthand-format
      - id: metadata/package/fields/name::npm-hyphenated-multiword-name
    unless:
      - id: metadata/package/fields/bugs::has-bugs-url-field
      - id: metadata/package/fields/homepage::has-homepage-field
      - id: metadata/package/fields/files::has-files-field
      - id: metadata/package/fields/engines::has-engines
      - id: metadata/package/fields/contributors::has-contributors
        # === Fake Security Research ===
  - id: fake-security-research
    desc: Package claims security research but runs install hooks
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: desc-whitehat-research
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
  - id: fake-security-research-with-exfil
    desc: Security research claim paired with exfiltration endpoint
    crit: hostile
    conf: 0.97
    attack: "T1195.002"
    all:
      - id: fake-security-research
    any:
      - id: objectives/supply-chain/recon-exfil/oast/env::oast-fun-url
      - id: objectives/exfiltration/messaging/telegram::api-endpoint
      - id: objectives/supply-chain/recon-exfil/oast
      - id: objectives/exfiltration/oob/endpoint
      - id: objectives/supply-chain/recon-exfil/oast/secret::npm-postinstall-oastify-profile-query-exfil
      - id: objectives/supply-chain/recon-exfil/oast/secret::npm-postinstall-oastify-dns-whoami-exfil
  - id: scoped-public-access-hooks
    desc: Scoped package with public access and install hooks
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
      - id: objectives/supply-chain/recon-exfil/metadata::public-access-config
    unless:
      - id: metadata/package/fields/repository::has-repository-evidence
  - id: dependency-confusion-candidate
    desc: Mature install-hook package lacks provenance
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: version-mature
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    unless:
      - id: objectives/supply-chain/install-hook/scripts/prepare::prepare-is-build-tool
      - id: metadata/package/fields/repository::has-repository-evidence
      - id: metadata/package/fields/bin::has-bin-field
      - id: metadata/package/fields/private::is-private
      - id: metadata/package/testing/presence/fixture::npm-fixture-package-name
      - id: tabby-builtin-plugin-keyword
    downgrade:
      any:
        - id: metadata/package/fields/freeform::pkg-skeleton-small
  - id: sfdc-placeholder-package
    desc: sfdc package looks like placeholder squatter
    crit: hostile
    conf: 0.985
    attack: "T1195.002"
    mbc: "B0024"
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/package::npm-name-sfdc-prefix
      - id: metadata/package/fields/freeform::pkg-skeleton-small
      - id: main-index-js
    any:
      - id: objectives/supply-chain/metadata-anomaly/package/npm::npm-init-default-test
      - id: metadata/package/quality::npm-empty-description-any
      - id: metadata/package/quality::npm-no-author
      - id: metadata/package/quality::npm-no-keywords
    needs: 2
    unless:
      - id: metadata/package/fields/repository::has-repository-evidence
      - id: metadata/package/fields/files::has-files-field
      - id: metadata/package/fields/engines::has-engines
      - id: metadata/package/fields/bin::has-bin-field
      - id: metadata/package/fields/private::is-private
      - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-monorepo-workspace-dep
  - id: scoped-placeholder-squatter
    desc: Scoped package looks like placeholder squatter
    crit: notable
    conf: 0.94
    attack: "T1195.002"
    mbc: "B0024"
    all:
      - id: scoped-package-name
      - id: main-index-js
      - id: metadata/package/quality::npm-empty-description-any
      - id: metadata/package/quality::npm-empty-author
      - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-no-deps-devdependencies
      - id: objectives/supply-chain/metadata-anomaly/package/npm::npm-init-default-test
    unless:
      - id: metadata/package/fields/name::scoped-known-org
      - id: metadata/package/fields/freeform::official-react-native-package
      - id: metadata/package/fields/files::has-files-field
      - id: metadata/package/fields/engines::has-engines
      - id: metadata/package/fields/bin::has-bin-field
      - id: metadata/package/fields/private::is-private
      - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-monorepo-workspace-dep
  - id: tiny-postinstall-node-loader
    desc: Tiny package runs postinstall node loader
    crit: hostile
    conf: 0.97
    attack: "T1195.002"
    all:
      - id: postinstall-hook-key
      - id: postinstall-runs-node-script
      - id: metadata/package/fields/freeform::pkg-skeleton-small
      - id: objectives/supply-chain/metadata-anomaly/dependency/manifest::npm-no-deps-at-all
      - id: objectives/supply-chain/hidden-payload/staging::no-build-script
    unless:
      - id: metadata/package/fields/repository::has-repository-evidence
      - id: metadata/package/fields/bin::has-bin-field
      - id: metadata/package/fields/private::is-private
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/testing/presence/harness::test-fixture-directory
      - id: metadata/package/testing/presence/fixture::npm-fixture-package-name
      - id: metadata/package/testing/presence/fixture::install-fixture-package-json
