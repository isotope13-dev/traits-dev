defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
  crit: notable
traits:
  - id: from-setuptools-import
    desc: from setuptools import statement
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: from\s+setuptools\s+import
  - id: import-setuptools
    desc: import setuptools statement
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: import\s+setuptools
  - id: distutils
    desc: Python package distribution (distutils)
    conf: 0.8
    if:
      type: raw
      substr: import distutils
  - id: setup-call
    desc: Python package setup() definition
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: setup(
  - id: metadata-author
    desc: author= metadata field
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: author\s*=
  - id: metadata-version
    desc: version= metadata field
    crit: component
    conf: 0.5
    if:
      type: string_value
      regex: version\s*=
  - id: metadata-description
    desc: description= metadata field
    crit: notable
    conf: 0.5
    size_max: 50000
    if:
      type: string_value
      regex: description\s*=
  - id: metadata-packages
    desc: packages= metadata field
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: packages\s*=
  - id: directory-masquerade-dup
    desc: Directory masquerading as file (e.g.
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: os\.path\.join\(.{0,50}\.py.{0,30}\)
  - id: cmdclass-dict
    desc: cmdclass dict assignment
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: cmdclass\s*=\s*\{
  - id: install-class-inherit
    desc: class inheriting from install
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: class\s+\w+\(install\)
composite_rules:
  - id: setuptools
    desc: Python package distribution (setuptools)
    crit: notable
    conf: 0.8
    any:
      - id: from-setuptools-import
      - id: import-setuptools
  - id: metadata
    desc: Python package metadata definition
    crit: notable
    conf: 0.7
    any:
      - id: metadata-author
      - id: metadata-version
      - id: metadata-description
      - id: metadata-packages
  - id: cmdclass-override
    desc: Custom install command class override
    crit: suspicious
    conf: 0.85
    any:
      - id: cmdclass-dict
      - id: install-class-inherit
