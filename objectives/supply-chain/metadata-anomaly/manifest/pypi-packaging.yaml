defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
  crit: notable
traits:
  - id: from-setuptools-import
    desc: from setuptools import statement
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: from\s+setuptools\s+import
  - id: import-setuptools
    desc: import setuptools statement
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: import\s+setuptools
  - id: distutils
    desc: Python package distribution (distutils)
    conf: 0.8
    if:
      type: raw
      substr: import distutils
  - id: setup-call
    desc: Python package setup() definition
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: setup(
  - id: setup-packages-find-packages
    desc: setup() uses find_packages()
    crit: notable
    conf: 0.86
    if:
      type: ast
      query: |
        (call
          function: (identifier) @func (#eq? @func "setup")
          arguments: (argument_list
            (keyword_argument
              name: (identifier) @arg_name (#eq? @arg_name "packages")
              value: (call
                function: (identifier) @pkg_fn (#eq? @pkg_fn "find_packages")
              )
            )
          )
        )
  - id: setup-find-packages-exclude-tests
    desc: find_packages() excludes only tests
    crit: component
    conf: 0.84
    if:
      type: ast
      query: |
        (call
          function: (identifier) @func (#eq? @func "find_packages")
          arguments: (argument_list
            (keyword_argument
              name: (identifier) @arg_name (#eq? @arg_name "exclude")
              value: (list
                (string) @exclude (#match? @exclude "['\"]tests['\"]")
              )
            )
          )
        )
  - id: setup-zip-safe-false
    desc: setup() sets zip_safe False
    crit: component
    conf: 0.8
    if:
      type: ast
      query: |
        (call
          function: (identifier) @func (#eq? @func "setup")
          arguments: (argument_list
            (keyword_argument
              name: (identifier) @arg_name (#eq? @arg_name "zip_safe")
              value: (false)
            )
          )
        )
  - id: setup-entry-points-field
    desc: setup.py declares entry_points
    crit: component
    conf: 0.78
    if:
      type: raw
      regex: entry_points\s*=
  - id: setup-scripts-field
    desc: setup.py declares scripts
    crit: component
    conf: 0.78
    if:
      type: raw
      regex: scripts\s*=
  - id: metadata-author
    desc: author= metadata field
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: author\s*=
  - id: metadata-version
    desc: version= metadata field
    crit: component
    conf: 0.5
    if:
      type: string_value
      regex: version\s*=
  - id: metadata-description
    desc: description= metadata field
    crit: notable
    conf: 0.5
    size_max: 50000
    if:
      type: string_value
      regex: description\s*=
  - id: metadata-packages
    desc: packages= metadata field
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: packages\s*=
  - id: directory-masquerade-dup
    desc: Directory masquerading as file (e.g.
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: os\.path\.join\(.{0,50}\.py.{0,30}\)
  - id: cmdclass-dict
    desc: cmdclass dict assignment
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: cmdclass\s*=\s*\{
  - id: install-class-inherit
    desc: class inheriting from install
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: class\s+\w+\(install\)
  - id: setup-py-crlf-padding
    desc: setup.py ends with CRLF padding
    crit: component
    conf: 0.72
    size_max: 4096
    if:
      type: raw
      regex: \r\n[ \t]+$
  - id: setup-py-trailing-whitespace
    desc: setup.py has trailing whitespace
    crit: component
    conf: 0.72
    size_max: 4096
    if:
      type: metrics
      field: "text.trailing_whitespace_lines"
      min: 1
composite_rules:
  - id: setuptools
    desc: Python package distribution (setuptools)
    crit: notable
    conf: 0.8
    any:
      - id: from-setuptools-import
      - id: import-setuptools
  - id: metadata
    desc: Python package metadata definition
    crit: notable
    conf: 0.7
    any:
      - id: metadata-author
      - id: metadata-version
      - id: metadata-description
      - id: metadata-packages
  - id: cmdclass-override
    desc: Custom install command class override
    crit: suspicious
    conf: 0.85
    any:
      - id: cmdclass-dict
      - id: install-class-inherit
  - id: minimal-find-packages-setup
    desc: Minimal find_packages setuptools setup
    crit: notable
    conf: 0.82
    all:
      - id: setup-packages-find-packages
      - id: setup-find-packages-exclude-tests
      - id: setup-zip-safe-false
  - id: minimal-placeholder-setup
    desc: Minimal placeholder-style setup.py
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/build/pip::setup-py
      - id: minimal-find-packages-setup
      - id: metadata/package/metrics::file-under-12-lines
    unless:
      - id: objectives/supply-chain/install-hook/dropper::install-requires-assignment
      - id: metadata/build::setup-cmdclass-install
      - id: install-class-inherit
      - id: setup-entry-points-field
      - id: setup-scripts-field
  - id: setup-crlf-whitespace-layout
    desc: setup.py has CRLF padded whitespace
    crit: notable
    conf: 0.76
    all:
      - id: setup-py-crlf-padding
      - id: setup-py-trailing-whitespace
