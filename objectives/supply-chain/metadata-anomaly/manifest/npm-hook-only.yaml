defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
  attack: "T1195.002"
composite_rules:
  - id: tiny-preinstall-only-package
    desc: Tiny package with only preinstall
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/package/fields::pkg-skeleton-small
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
    unless:
      - id: metadata/package/fields::pkg-main-field
      - id: metadata/package/fields::has-bin-field
      - id: metadata/package::pkg-module-field
      - id: metadata/package::pkg-exports-field-entry
      - id: metadata/package/scripts::has-build-script
      - id: metadata/package/testing/presence::pkg-test-script-field
      - id: metadata/package/fields::has-dev-deps
  - id: manifest-only-preinstall-package
    desc: Tiny manifest-only package with preinstall
    crit: suspicious
    conf: 0.97
    all:
      - id: tiny-preinstall-only-package
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-no-deps-at-all
      - id: objectives/supply-chain/hidden-payload/staging::no-build-script
  - id: manifest-only-preinstall-recon-exfil
    desc: Manifest-only preinstall package exfils host identity
    crit: hostile
    conf: 0.995
    mbc: "E1041"
    all:
      - id: manifest-only-preinstall-package
      - id: objectives/supply-chain/recon-exfil/oast
