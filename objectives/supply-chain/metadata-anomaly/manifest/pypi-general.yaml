defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  attack: T1036.005
  mbc: F0004
  for:
    - python
    - package.json
    - pkginfo
traits:
  - id: empty-classifiers
    desc: Empty classifiers list
    crit: notable
    conf: 0.85
    for: [pkginfo]
    if:
      type: kv
      path: classifiers
      size_max: 0
  - id: unknown-license
    desc: PKG-INFO has UNKNOWN license
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: license
      exact: UNKNOWN
  - id: unknown-platform
    desc: PKG-INFO has UNKNOWN platform
    crit: notable
    conf: 0.7
    if:
      type: kv
      path: platform
      exact: UNKNOWN
  - id: is-pkginfo-file
    desc: Python PKG-INFO metadata file
    crit: notable
    conf: 1.0
    if:
      type: kv
      path: metadata-version
  - id: setup-py-file
    desc: Python setup.py file
    crit: notable
    conf: 0.9
    for:
      - python
    if:
      type: string_value
      regex: \bsetup\s*\(
  - id: pkginfo-tiny
    desc: Extremely small PKG-INFO file
    crit: notable
    conf: 0.7
    size_max: 200
    if:
      type: kv
      path: metadata-version
  - id: empty-description
    desc: Package has empty description field
    crit: notable
    conf: 0.8
    for: [pkginfo]
    if:
      type: kv
      path: description
      exact: ""
  - id: suspicious-single-dependency
    desc: Package with suspicious single dependency pattern
    crit: suspicious
    conf: 0.75
    for: [pkginfo]
    if:
      type: kv
      path: requires_dist
      size_min: 1
      size_max: 1
  - id: missing-maintainer
    desc: Package missing maintainer field
    crit: notable
    conf: 0.7
    for: [pkginfo]
    if:
      type: kv
      path: maintainer
      exists: false
  - id: missing-homepage
    desc: Package missing homepage URL
    crit: notable
    conf: 0.65
    for: [pkginfo]
    if:
      type: kv
      path: home_page
      exact: null
composite_rules:
  - id: empty-description-and-classifiers
    desc: Package has empty description and empty classifiers
    crit: suspicious
    conf: 0.85
    for: [pkginfo]
    all:
      - id: empty-description
      - id: empty-classifiers
