defaults:
  platforms: [unix, windows]
  for: [cargo.toml]
traits:
  - id: cargo-description-dependency-confusion
    desc: "Cargo description mentions depconf"
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: package.description
      regex: dependency\s+confusion
      case_insensitive: true
  - id: cargo-description-security-poc
    desc: Cargo description claims security PoC
    crit: notable
    conf: 0.88
    if:
      type: value
      path: package.description
      regex: (security\s+research|proof.of.concept|\bpoc\b)
      case_insensitive: true
  - id: cargo-description-ownership-transfer
    desc: Cargo description offers ownership transfer
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: package.description
      regex: ownership\s+transfer
      case_insensitive: true
  - id: cargo-description-malicious-purpose
    desc: Cargo description names malicious purpose
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.description
      regex: malicious\s+purpose
      case_insensitive: true
  - id: cargo-package-name-amsi
    desc: Cargo package named AMSI
    crit: component
    conf: 0.9
    if:
      type: value
      path: package.name
      exact: amsi
  - id: cargo-package-name-syscalls
    desc: Cargo package named syscalls
    crit: component
    conf: 0.88
    if:
      type: value
      path: package.name
      exact: syscalls
  - id: cargo-package-name-apc
    desc: Cargo package named APC
    crit: component
    conf: 0.88
    if:
      type: value
      path: package.name
      exact: apc
  - id: cargo-package-name-thread-hijack
    desc: Cargo package names thread hijacking
    crit: component
    conf: 0.88
    if:
      type: value
      path: package.name
      regex: '(?i)thread.?hijack'
  - id: cargo-package-name-function-stomp
    desc: Cargo package names function stomping
    crit: component
    conf: 0.88
    if:
      type: value
      path: package.name
      regex: '(?i)function.?stomp'
  - id: cargo-package-name-hidden-vnc
    desc: Cargo package named hidden VNC
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: package.name
      exact: hidden-vnc
  - id: cargo-package-name-ransomware
    desc: Cargo package names ransomware
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: package.name
      regex: '(?i)ransomware'
  - id: cargo-package-name-encrypt
    desc: Cargo package name references encryption
    crit: component
    conf: 0.84
    if:
      type: value
      path: package.name
      regex: '(?i)encrypt'
  - id: cargo-release-strip-true
    desc: Cargo release profile strips symbols
    crit: component
    conf: 0.95
    if:
      type: value
      path: profile.release.strip
      exact: "true"
  - id: cargo-release-lto-true
    desc: Cargo release profile enables LTO
    crit: component
    conf: 0.9
    if:
      type: value
      path: profile.release.lto
      exact: "true"
  - id: cargo-release-panic-abort
    desc: Cargo release aborts on panic
    crit: component
    conf: 0.9
    if:
      type: value
      path: profile.release.panic
      exact: abort
  - id: cargo-release-opt-size
    desc: Cargo release optimizes for size
    crit: component
    conf: 0.9
    if:
      type: value
      path: profile.release.opt-level
      exact: z
  - id: cargo-dep-ntapi
    desc: Cargo depends on ntapi
    crit: suspicious
    conf: 0.82
    if:
      type: value
      path: dependencies.ntapi
      regex: '.+'
  - id: cargo-dep-rusb
    desc: Cargo depends on rusb
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.rusb
      regex: '.+'
  - id: cargo-dep-rand
    desc: Cargo depends on rand
    crit: component
    conf: 0.82
    if:
      type: value
      path: dependencies.rand
      regex: '.+'
  - id: cargo-dep-libaes
    desc: Cargo depends on libaes
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.libaes
      regex: '.+'
  - id: cargo-dep-remoteprocess
    desc: Cargo depends on remoteprocess
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.remoteprocess
      regex: '.+'
  - id: cargo-dep-teloxide
    desc: Cargo depends on Telegram bot crate
    crit: notable
    conf: 0.84
    if:
      type: value
      path: dependencies.teloxide
      regex: '.+'
  - id: cargo-dep-hwbp
    desc: Cargo depends on breakpoints
    crit: notable
    conf: 0.84
    if:
      type: value
      path: dependencies.hwbp.path
      regex: '.+'
  - id: cargo-dep-litcrypt
    desc: Cargo depends on litcrypt
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.litcrypt
      regex: '.+'
  - id: cargo-dep-chacha20poly1305
    desc: Cargo depends on ChaCha20Poly1305
    crit: notable
    conf: 0.84
    if:
      type: value
      path: dependencies.chacha20poly1305
      regex: '.+'
  - id: cargo-build-dep-chacha20poly1305
    desc: Cargo build depends on ChaCha20Poly1305
    crit: notable
    conf: 0.84
    if:
      type: value
      path: build-dependencies.chacha20poly1305
      regex: '.+'
  - id: cargo-build-dep-rand
    desc: Cargo build depends on rand
    crit: component
    conf: 0.8
    if:
      type: value
      path: build-dependencies.rand
      regex: '.+'
  - id: cargo-dep-p256-ecdh
    desc: Cargo depends on P256 ECDH
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(?s)p256.{0,120}ecdh'
  - id: cargo-dep-russh
    desc: Cargo depends on Rust SSH
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.russh.workspace
      exact: "true"
  - id: cargo-dep-russh-sftp
    desc: Cargo depends on Rust SFTP
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.russh-sftp.workspace
      exact: "true"
  - id: cargo-dep-pnet
    desc: Cargo depends on pnet
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.pnet.workspace
      exact: "true"
  - id: cargo-dep-winapi
    desc: Cargo depends on winapi
    crit: component
    conf: 0.86
    if:
      type: value
      path: dependencies.winapi
      regex: '.+'
  - id: cargo-dep-api-hasher
    desc: Cargo depends on API hasher
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: dependencies.api_hasher.path
      regex: '.+'
  - id: cargo-dep-trampoline
    desc: Cargo depends on trampoline helper
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.trampoline.path
      regex: '.+'
  - id: cargo-dep-rdev
    desc: Cargo depends on rdev input
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.rdev
      regex: '.+'
  - id: cargo-dep-aes-gcm
    desc: Cargo depends on AES-GCM
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.aes-gcm
      regex: '.+'
  - id: cargo-dep-walkdir
    desc: Cargo depends on walkdir
    crit: component
    conf: 0.82
    if:
      type: value
      path: dependencies.walkdir
      regex: '.+'
  - id: cargo-dep-dpapi
    desc: Cargo requests DPAPI feature
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: '"dpapi"'
  - id: cargo-dep-rusqlite
    desc: Cargo depends on rusqlite
    crit: component
    conf: 0.82
    if:
      type: value
      path: dependencies.rusqlite.version
      regex: '.+'
  - id: cargo-dep-screenshots
    desc: Cargo depends on screenshots
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.screenshots
      regex: '.+'
  - id: cargo-dep-nokhwa
    desc: Cargo depends on camera crate
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.nokhwa.version
      regex: '.+'
  - id: cargo-dep-wmi
    desc: Cargo depends on WMI
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.wmi
      regex: '.+'
  - id: cargo-dep-rs-leveldb
    desc: Cargo depends on LevelDB
    crit: component
    conf: 0.8
    if:
      type: value
      path: dependencies.rs-leveldb
      regex: '.+'
  - id: cargo-dep-encrypt-macro
    desc: Cargo depends on encrypt macro
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.encrypt-macro.path
      regex: '.+'
  - id: cargo-dep-cbc
    desc: Cargo depends on CBC
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.cbc.version
      regex: '.+'
  - id: cargo-dep-aes
    desc: Cargo depends on AES
    crit: notable
    conf: 0.82
    if:
      type: value
      path: dependencies.aes
      regex: '.+'
  # cargo-lib-proc-macro and cargo-lib-cdylib relocated to
  # metadata/package/fields/cargo::{cargo-lib-proc-macro,cargo-lib-cdylib}.
  # They are neutral manifest facts (cdylib = any PyO3/FFI/WASM lib), not
  # anomalies; the rootkit/loader composites below reference them cross-file.
  - id: cargo-feature-api-hash-algorithms
    desc: Cargo feature exposes API hashing
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(hash-djb2|hash-fnv1a|hash-crc32)'
  - id: cargo-description-lazy-importer
    desc: Cargo description references lazy importer
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.description
      regex: lazy_importer
      case_insensitive: true
  - id: cargo-feature-win32u
    desc: Cargo feature enables Win32u
    crit: suspicious
    conf: 0.84
    if:
      type: value
      path: features.win32u
      regex: '.*'
  - id: cargo-release-strip-symbols
    desc: Cargo release strips symbols
    crit: component
    conf: 0.9
    if:
      type: value
      path: profile.release.strip
      exact: symbols
  - id: cargo-release-opt-small
    desc: Cargo release optimizes small
    crit: component
    conf: 0.86
    if:
      type: value
      path: profile.release.opt-level
      exact: s
  - id: cargo-feature-patch-etw
    desc: Cargo feature patches ETW
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: features.patch_etw
      regex: '.*'
  - id: cargo-feature-sandbox-triggers
    desc: Cargo feature references sandbox triggers
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: '(sandbox_trig|sandbox_mem)'
  - id: cargo-windows-wifi-feature
    desc: Cargo requests Windows WiFi APIs
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: Win32_NetworkManagement_WiFi
    unless:
      # The official windows-rs umbrella crate enumerates every Win32 feature as
      # a feature DEFINITION, not as a third-party request — not an anomaly.
      - id: well-known/lib/rust-system-bindings::windows-rs-binding-crate
  - id: cargo-winapi-loader-feature
    desc: Cargo feature includes loader APIs
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(libloaderapi|Win32_System_LibraryLoader)'
  - id: cargo-winapi-memory-feature
    desc: Cargo feature includes memory APIs
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(memoryapi|Win32_System_Memory)'
  - id: cargo-winapi-thread-feature
    desc: Cargo feature includes thread APIs
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(processthreadsapi|threadpoolapiset|threadpoollegacyapiset|Win32_System_Threading)'
  - id: cargo-windows-debug-feature
    desc: Cargo requests Windows debug APIs
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(debugapi|Win32_System_Diagnostics_Debug)'
  - id: cargo-windows-wdk-feature
    desc: Cargo requests Windows WDK APIs
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'Wdk_(Foundation|System|Storage)'
  - id: cargo-windows-winsock-feature
    desc: Cargo requests Windows Winsock APIs
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: Win32_Networking_WinSock
  - id: cargo-windows-desktop-feature
    desc: Cargo requests Windows desktop APIs
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(Win32_System_StationsAndDesktops|Win32_Graphics_Gdi)'
  - id: cargo-windows-etw-feature
    desc: Cargo requests Windows ETW APIs
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: Win32_System_Diagnostics_Etw
  - id: cargo-windows-antimalware-feature
    desc: Cargo requests Windows Antimalware APIs
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: Win32_System_Antimalware
    unless:
      - id: well-known/lib/rust-system-bindings::windows-rs-binding-crate
  - id: cargo-windows-service-feature
    desc: Cargo requests Windows service APIs
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(Win32_System_Services|Win32_System_SystemServices)'
  - id: cargo-windows-wininet-feature
    desc: Cargo requests Windows WinInet APIs
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: Win32_Networking_WinInet
  - id: cargo-windows-environment-feature
    desc: Cargo requests Windows environment APIs
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Win32_System_Environment
  - id: cargo-windows-process-status-feature
    desc: Cargo requests process status APIs
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(Win32_System_ProcessStatus|Win32_System_Diagnostics_ToolHelp)'
  - id: cargo-windows-crypto-feature
    desc: Cargo requests Windows crypto APIs
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(Win32_Security_Cryptography|\bbcrypt\b)'
  - id: cargo-winapi-network-discovery-feature
    desc: Cargo includes workstation APIs
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '(lmwksta|winnetwk|lmcons)'
  - id: cargo-winapi-collection-feature
    desc: Cargo feature supports collection
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(winuser|shellapi|securitybaseapi|tlhelp32)'

composite_rules:
  - id: cargo-dependency-confusion-poc
    desc: Cargo package self-identifies depconf
    crit: hostile
    conf: 0.98
    attack: T1195.001
    all:
      - id: cargo-description-dependency-confusion
      - id: cargo-description-security-poc
    any:
      - id: cargo-description-ownership-transfer
  - id: cargo-stripped-size-optimized-release
    desc: Cargo stripped size-optimized release
    crit: notable
    conf: 0.88
    needs: 3
    any:
      - id: cargo-release-strip-true
      - id: cargo-release-lto-true
      - id: cargo-release-panic-abort
      - id: cargo-release-opt-size
      - id: cargo-release-strip-symbols
      - id: cargo-release-opt-small
  - id: cargo-lowlevel-windows-api-profile
    desc: Cargo low-level Windows API profile
    crit: suspicious
    conf: 0.86
    any:
      - id: cargo-dep-ntapi
      - id: cargo-winapi-loader-feature
      - id: cargo-winapi-memory-feature
      - id: cargo-winapi-thread-feature
      - id: cargo-windows-debug-feature
      - id: cargo-windows-wdk-feature
  - id: cargo-maldev-name-with-release-hardening
    desc: Cargo maldev name with hardening
    crit: suspicious
    conf: 0.9
    all:
      - id: cargo-stripped-size-optimized-release
    any:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-maldev-name
  - id: cargo-maldev-name-with-lowlevel-windows-api
    desc: Cargo maldev name with low-level APIs
    crit: suspicious
    conf: 0.9
    all:
      - id: cargo-lowlevel-windows-api-profile
    any:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-maldev-name
  - id: cargo-maldev-name-with-loader-api
    desc: Cargo maldev name with loader API
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-maldev-name
      - id: cargo-winapi-loader-feature
  - id: cargo-maldev-name-with-memory-api
    desc: Cargo maldev name with memory API
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-maldev-name
      - id: cargo-winapi-memory-feature
  - id: cargo-maldev-name-with-thread-api
    desc: Cargo maldev name with thread API
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-maldev-name
      - id: cargo-winapi-thread-feature
  - id: cargo-maldev-name-with-debug-api
    desc: Cargo maldev name with debug API
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-maldev-name
      - id: cargo-windows-debug-feature
  - id: cargo-collection-name-with-device-or-network-api
    desc: Cargo collection name with device API
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-collection-tooling
    any:
      - id: cargo-dep-rusb
      - id: cargo-windows-wifi-feature
      - id: cargo-winapi-network-discovery-feature
      - id: cargo-winapi-collection-feature
      - id: cargo-windows-winsock-feature
  - id: cargo-keylogger-with-input-api
    desc: Cargo keylogger name with input API
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-keylogger
      - id: cargo-winapi-collection-feature
  - id: cargo-payload-obfuscation-with-rand
    desc: Cargo payload obfuscation with rand
    crit: suspicious
    conf: 0.84
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-payload-obfuscation
      - id: cargo-dep-rand
  - id: cargo-nt-name-with-wdk-network-api
    desc: Cargo NT name with WDK APIs
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-nt-networking
      - id: cargo-windows-wdk-feature
    any:
      - id: cargo-windows-winsock-feature
      - id: cargo-winapi-memory-feature
      - id: cargo-winapi-thread-feature
  - id: cargo-malicious-purpose-with-network-deps
    desc: Cargo malicious purpose with network deps
    crit: suspicious
    conf: 0.88
    all:
      - id: cargo-description-malicious-purpose
    any:
      - id: cargo-windows-winsock-feature
      - id: cargo-winapi-network-discovery-feature
      - id: cargo-winapi-loader-feature
      - id: metadata/import/cargo::dep-reqwest
      - id: cargo-dep-teloxide
  - id: cargo-malicious-purpose-with-bot-dep
    desc: Cargo malicious purpose uses bot
    crit: suspicious
    conf: 0.88
    all:
      - id: cargo-description-malicious-purpose
      - id: cargo-dep-teloxide
  - id: cargo-amsi-name-with-hwbp
    desc: Cargo AMSI name with breakpoints
    crit: suspicious
    conf: 0.86
    all:
      - id: cargo-dep-hwbp
    any:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-anti-av-bypass
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-anti-av-patch
  - id: cargo-amsi-package-with-hwbp
    desc: Cargo AMSI package uses breakpoints
    crit: suspicious
    conf: 0.88
    all:
      - id: cargo-package-name-amsi
      - id: cargo-dep-hwbp
  - id: cargo-anti-av-name-with-antimalware-api
    desc: Cargo AV surface with antimalware API
    crit: suspicious
    conf: 0.86
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-anti-av-surface
      - id: cargo-windows-antimalware-feature
  - id: cargo-etw-name-with-etw-api
    desc: Cargo ETW name with ETW API
    crit: suspicious
    conf: 0.84
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-anti-av-surface
      - id: cargo-windows-etw-feature
  - id: cargo-api-hasher-with-hash-features
    desc: Cargo API hasher exposes hashes
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-api-hashing
      - id: cargo-feature-api-hash-algorithms
  - id: cargo-syscall-package-with-api-hasher
    desc: Cargo syscall package uses API hasher
    crit: suspicious
    conf: 0.88
    all:
      - id: cargo-package-name-syscalls
      - id: cargo-dep-api-hasher
  - id: cargo-syscall-package-with-trampoline
    desc: Cargo syscall package uses trampoline
    crit: suspicious
    conf: 0.86
    all:
      - id: cargo-package-name-syscalls
      - id: cargo-dep-trampoline
  - id: cargo-apc-with-memory-thread-api
    desc: Cargo APC uses memory thread APIs
    crit: suspicious
    conf: 0.86
    all:
      - id: cargo-package-name-apc
      - id: cargo-winapi-memory-feature
      - id: cargo-winapi-thread-feature
  - id: cargo-apc-with-debug-api
    desc: Cargo APC uses debug APIs
    crit: suspicious
    conf: 0.84
    all:
      - id: cargo-package-name-apc
      - id: cargo-windows-debug-feature
  - id: cargo-apc-with-environment-api
    desc: Cargo APC uses environment APIs
    crit: suspicious
    conf: 0.82
    all:
      - id: cargo-package-name-apc
      - id: cargo-windows-environment-feature
  - id: cargo-thread-hijack-with-thread-api
    desc: Cargo thread hijack with APIs
    crit: suspicious
    conf: 0.88
    all:
      - id: cargo-package-name-thread-hijack
      - id: cargo-winapi-thread-feature
  - id: cargo-function-stomp-with-loader-api
    desc: Cargo function stomping with loader
    crit: suspicious
    conf: 0.88
    all:
      - id: cargo-package-name-function-stomp
      - id: cargo-winapi-loader-feature
  - id: cargo-injection-name-with-memory-loader
    desc: Cargo injection name with loader
    crit: suspicious
    conf: 0.88
    all:
      - id: cargo-winapi-memory-feature
      - id: cargo-winapi-loader-feature
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-process-injection-profile
  - id: cargo-injection-name-with-thread-debug
    desc: Cargo injection name with debug APIs
    crit: suspicious
    conf: 0.86
    all:
      - id: cargo-winapi-thread-feature
      - id: cargo-windows-debug-feature
      - id: objectives/supply-chain/metadata-anomaly/naming/cargo::cargo-name-process-injection-profile
  - id: cargo-internals-name-with-lowlevel-apis
    desc: Cargo internals name with low-level APIs
    crit: suspicious
    conf: 0.86
    all:
      - id: cargo-winapi-memory-feature
