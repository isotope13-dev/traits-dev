defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002

traits:
  - id: ai-tool-name-ai-agent
    desc: Package name says AI agent
    crit: notable
    conf: 0.82
    if:
      type: kv
      path: name
      regex: '(^|[-_/])(ai|agent)([-_/]|$)'
      case_insensitive: true
  - id: ai-tool-name-coder
    desc: Package name says AI coder
    crit: notable
    conf: 0.84
    if:
      type: kv
      path: name
      regex: '(^|[-_/])(coder|copilot)([-_/]|$)'
      case_insensitive: true
  - id: ai-tool-name-ide
    desc: Package name says AI IDE
    crit: notable
    conf: 0.86
    if:
      type: kv
      path: name
      regex: '(^|[-_/])(codeium|cursor)([-_/]|$)'
      case_insensitive: true
  - id: ai-tool-name-editor
    desc: Package name says AI editor
    crit: notable
    conf: 0.84
    if:
      type: kv
      path: name
      regex: '(^|[-_/])(windsurf|cline)([-_/]|$)'
      case_insensitive: true
  - id: ai-tool-name-assistant
    desc: Package name says AI assistant
    crit: notable
    conf: 0.84
    if:
      type: kv
      path: name
      regex: '(^|[-_/])(supermaven|tabnine)([-_/]|$)'
      case_insensitive: true
  - id: ai-tool-name-ml-platform
    desc: Package name says ML platform
    crit: notable
    conf: 0.84
    if:
      type: kv
      path: name
      exact: huggingface
      case_insensitive: true
  - id: ai-tool-name-short-editor
    desc: Package name says AI editor
    crit: notable
    conf: 0.82
    if:
      type: kv
      path: name
      regex: '(^|[-_/])(zed|v0)([-_/]|$)'
      case_insensitive: true
  - id: official-ai-tool-repository
    desc: Official AI tool repository URL
    crit: baseline
    conf: 0.94
    if:
      type: kv
      path: repository.url
      regex: 'github\.com/(huggingface|codium-ai|zed-industries)/'
      case_insensitive: true
  - id: official-ai-tool-domain
    desc: Official AI tool domain URL
    crit: baseline
    conf: 0.94
    if:
      type: kv
      path: repository.url
      regex: '(cursor|windsurf)\.com'
      case_insensitive: true

composite_rules:
  - id: ai-tool-name-lure
    desc: Package name impersonates AI tooling
    crit: notable
    conf: 0.86
    any:
      - id: ai-tool-name-ai-agent
      - id: ai-tool-name-coder
      - id: ai-tool-name-ide
      - id: ai-tool-name-editor
      - id: ai-tool-name-assistant
      - id: ai-tool-name-ml-platform
      - id: ai-tool-name-short-editor
    unless:
      - id: official-ai-tool-repository
      - id: official-ai-tool-domain
  - id: ai-tool-install-hook-lure
    desc: AI tool package with install hook
    crit: suspicious
    conf: 0.93
    all:
      - id: ai-tool-name-lure
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
    unless:
      - id: objectives/supply-chain/metadata-anomaly/manifest/npm::npm-has-repository
      - id: metadata/package/fields/private::is-private
      - id: metadata/package/testing/presence::npm-fixture-package-name
