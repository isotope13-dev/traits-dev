defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
  - id: desc-run-command-tool
    desc: Description mentions run_command tool
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: description
      regex: run[_ -]?command
      case_insensitive: true
  - id: dep-modelcontextprotocol-sdk
    desc: Depends on modelcontextprotocol sdk
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: dependencies.@modelcontextprotocol/sdk
  - id: bin-js-entry
    desc: Package bin points to js entry
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: bin
      regex: \.js"
    unless:
      - type: kv
        path: name
        exact: ipv6
  - id: name-mcp-runcommand
    desc: Package name mentions MCP runcommand
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: name
      regex: mcp[-_]?runcommand|mcp[-_].{0,12}run[-_]?command
      case_insensitive: true
composite_rules:
  - id: npm-mcp-run-command-package
    desc: npm package markets MCP run-command service
    crit: suspicious
    conf: 0.96
    all:
      - id: dep-modelcontextprotocol-sdk
      - id: bin-js-entry
    any:
      - id: desc-run-command-tool
      - id: name-mcp-runcommand
