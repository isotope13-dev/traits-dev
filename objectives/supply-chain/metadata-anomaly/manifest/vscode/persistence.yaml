defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
  crit: suspicious
  conf: 0.88
traits:
  - id: description-persistence-keywords
    desc: VSCode manifest advertises persistence
    if:
      type: kv
      path: description
      regex: startup folder|scheduled tasks
composite_rules:
  - id: wildcard-persistence-extension
    desc: VSCode wildcard activation with persistence
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/vscode::activate-all-events
      - id: description-persistence-keywords
