defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: activate-all-events
    desc: VSCode wildcard activation event
    crit: notable
    conf: 0.95
    for:
      - package.json
    if:
      type: kv
      path: activationEvents[*]
      exact: "*"
  - id: on-uri-activation
    desc: VSCode onUri activation event
    crit: notable
    conf: 0.95
    for:
      - package.json
    if:
      type: kv
      path: activationEvents
      regex: onUri
  - id: main-extension-js
    desc: Main entry points to extension.js
    crit: notable
    conf: 0.9
    for:
      - package.json
    if:
      type: kv
      path: main
      exact: ./extension.js
  - id: workspace-findFiles
    desc: VSCode workspace.findFiles API call (file
    crit: notable
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: workspace.findFiles
  - id: fs-readFile
    desc: VSCode workspace.fs.readFile API call (file
    crit: notable
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: workspace.fs.readFile
  - id: openTextDocument
    desc: VSCode workspace.openTextDocument API call
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: openTextDocument
  - id: async-function-activate
    desc: async function activate definition
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: async function activate
  - id: export-activate
    desc: export activate pattern
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: export.{0,30}activate
  - id: function-deactivate
    desc: function deactivate definition
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: function deactivate
  - id: export-deactivate
    desc: export deactivate pattern
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: export.{0,30}deactivate
  - id: vscode-commands
    desc: vscode.commands reference
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: vscode.commands
  - id: vscode-window
    desc: vscode.window reference
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: vscode.window
  - id: register-uri-handler
    desc: VSCode registerUriHandler call
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: vscode.window.registerUriHandler
  - id: handle-uri-method
    desc: handleUri method in handler
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: handleUri(uri)
  - id: url-search-params
    desc: URLSearchParams parses URI query
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: new URLSearchParams(uri.query)
  - id: oauth-code-param
    desc: Reads OAuth code query param
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: params.get('code')
  - id: oauth-state-param
    desc: Reads OAuth state query param
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: params.get('state')
  - id: intercepted-uri-stringify
    desc: Converts intercepted URI to string
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: uri.toString()
  - id: oauth-intercept-notice
    desc: Warns OAuth code intercepted
    crit: notable
    conf: 0.95
    if:
      type: string_value
      substr: OAuth code intercepted
  - id: vscode-workspace
    desc: vscode.workspace reference
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: vscode.workspace
  - id: vscode-extensions
    desc: vscode.extensions reference
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: vscode.extensions
  - id: clipboard-write
    desc: VSCode clipboard write access
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: clipboard.writeText
  - id: clipboard-read
    desc: VSCode clipboard read access
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: clipboard.readText
  - id: telemetry-event
    desc: VSCode telemetry event sending
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: sendTelemetryEvent
composite_rules:
  - id: vscode-context
    desc: VSCode API context markers
    crit: notable
    conf: 0.9
    any:
      - id: activate-all-events
      - id: on-uri-activation
      - id: main-extension-js
      - id: vscode-commands
      - id: vscode-window
      - id: vscode-workspace
      - id: vscode-extensions
      - id: micro-behaviors/process/create/shell/host::activate-function
  - id: uri-handler
    desc: VSCode URI handler registration
    crit: suspicious
    conf: 0.92
    all:
      - id: register-uri-handler
      - id: handle-uri-method
  - id: oauth-code-capture
    desc: VSCode URI handler captures OAuth code
    crit: suspicious
    conf: 0.97
    all:
      - id: uri-handler
      - id: url-search-params
      - id: oauth-code-param
      - id: oauth-state-param
  - id: env-access-comp
    desc: Access to process.env in VSCode
    crit: notable
    conf: 0.85
    mbc: E1592
    attack: T1082
    all:
      - id: vscode-context
      - id: micro-behaviors/os/env/access::javascript
  - id: external-request
    desc: HTTP request in VSCode extension
    crit: suspicious
    conf: 0.7
    all:
      - id: vscode-context
      - id: micro-behaviors/communications/http/request/
  - id: activate-comp
    desc: VSCode extension activate function
    crit: notable
    conf: 1.0
    any:
      - id: micro-behaviors/process/create/shell/host::activate-function
      - id: async-function-activate
      - id: export-activate
  - id: deactivate
    desc: VSCode extension deactivate function
    crit: notable
    conf: 1.0
    any:
      - id: function-deactivate
      - id: export-deactivate
