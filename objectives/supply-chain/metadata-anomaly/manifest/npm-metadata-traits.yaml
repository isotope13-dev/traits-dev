# npm Package Metadata Patterns
# Detects suspicious metadata patterns in package.json
# These patterns often indicate malicious or typosquatting packages
defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
  # === VSCode Extension Detection ===
  - id: vscode-extension
    desc: Package is a VSCode extension
    crit: notable
    conf: 0.95
    if:
      type: kv
      path: "engines.vscode"
  # === Install Hooks ===
  - id: preinstall-hook-key
    desc: Package has preinstall script
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '"scripts"\s*:\s*\{[\s\S]{0,600}"preinstall"\s*:'
  - id: postinstall-hook-key
    desc: Package has postinstall script
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: "scripts.postinstall"
    unless:
      - type: kv
        path: "name"
        exact: "run-script-os"
      - type: kv
        path: "scripts.postinstall"
        exact: "run-script-os"
      - type: kv
        path: "scripts.postinstall"
        exact: "prisma generate"
      # === Install Hook Installs Package ===
      # This is highly suspicious: legitimate packages declare dependencies in package.json,
      # they don't install packages via commands in hooks
  - id: postinstall-runs-npm-install
    desc: postinstall hook runs npm install
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: "scripts.postinstall"
      regex: "\\bnpm\\s+(install|i|add)\\s"
  - id: postinstall-runs-yarn-add
    desc: postinstall hook runs yarn add
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: "scripts.postinstall"
      regex: "\\byarn\\s+(add|global add)\\s"
  - id: postinstall-runs-pnpm-add
    desc: postinstall hook runs pnpm add
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: "scripts.postinstall"
      regex: "\\bpnpm\\s+(add|install)\\s"
  - id: postinstall-runs-node-script
    desc: postinstall runs local node script
    crit: suspicious
    conf: 0.92
    if:
      type: kv
      path: "scripts.postinstall"
      regex: "^node\\s+(\\./)?[A-Za-z0-9_./-]{1,80}\\.js$"
    unless:
      - type: kv
        path: "description"
        substr: "build scripts"
  - id: preinstall-runs-npm-install
    desc: preinstall hook runs npm install
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: "scripts.preinstall"
      regex: "\\bnpm\\s+(install|i|add)\\s"
  - id: preinstall-runs-yarn-add
    desc: preinstall hook runs yarn add
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: "scripts.preinstall"
      regex: "\\byarn\\s+(add|global add)\\s"
  - id: preinstall-runs-pnpm-add
    desc: preinstall hook runs pnpm add
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: "scripts.preinstall"
      regex: "\\bpnpm\\s+(add|install)\\s"
      # === Repository/Homepage Patterns ===
  - id: npm-homepage-url
    desc: Package homepage points to npm
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: "homepage"
      substr: "npmjs.com"
    unless:
      - type: kv
        path: "homepage"
        exact: "https://npmjs.com/package/libnpm"
      - type: kv
        path: "homepage"
        regex: "https://npmjs\\.com/package/libnpm[a-z]+"
  - id: npm-repo-url
    desc: Repository URL points to npm
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: "repository.url"
      substr: "npmjs.com"
  - id: repository-key
    desc: Package has repository field
    crit: component
    conf: 0.9
    if:
      type: kv
      path: "repository"
    unless:
      - id: metadata/package/fields::official-react-native-package
  - id: has-bugs-url
    desc: Package has bugs URL
    crit: component
    conf: 0.5
    if:
      type: kv
      path: "bugs.url"
  - id: has-homepage
    desc: Package has homepage URL
    crit: component
    conf: 0.5
    if:
      type: kv
      path: "homepage"
  - id: repo-url-git-host
    desc: Repository on GitHub/GitLab/Bitbucket
    crit: component
    conf: 0.9
    if:
      type: kv
      path: "repository.url"
      regex: "github\\.com|gitlab\\.com|bitbucket\\.org"
    unless:
      - id: metadata/package/fields::official-react-native-package
      # === Repository Format Patterns ===
  - id: repo-shorthand-format
    # GitHub shorthand: "User/repo-name" (no full URL)
    desc: Repository uses GitHub shorthand format
    crit: component
    conf: 0.8
    if:
      type: kv
      path: "repository"
      regex: "^[A-Za-z0-9_.-]+/[a-z0-9][a-z0-9._-]*$"
      # Package name is a hyphenated multi-word name
  - id: name-hyphenated-multiword
    desc: Package name has hyphenated multi-word format
    crit: component
    conf: 0.7
    if:
      type: kv
      path: "name"
      regex: "^[a-z][a-z0-9]{0,60}(-[a-z][a-z0-9]{0,60}){1,8}$"
      # Package version suggests maturity (>= 0.2.0 or >= 1.0.0)
  - id: version-mature
    desc: Package version suggests maturity
    crit: component
    conf: 0.6
    if:
      type: kv
      path: version
      regex: "^0\\.[2-9]\\.|^[1-9]"
  - id: main-index-js
    desc: Package main points to index.js
    crit: component
    conf: 0.84
    if:
      type: kv
      path: main
      exact: index.js
  - id: npm-version-inflated-90plus
    desc: npm package version major 90+
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: version
      regex: "^9[0-9]\\.[0-9]+\\.[0-9]+$"
    attack: "T1195.002"
      # === Description Patterns ===
  - id: desc-lightweight
    desc: Description mentions lightweight
    crit: notable
    conf: 0.5
    if:
      type: kv
      path: "description"
      substr: "lightweight"
      case_insensitive: true
  - id: desc-modern-web-apps
    desc: Description mentions modern web apps
    crit: notable
    conf: 0.5
    if:
      type: kv
      path: "description"
      regex: "modern.{0,100}(web|app)"
      case_insensitive: true
  - id: desc-universal
    desc: Description mentions universal
    crit: notable
    conf: 0.5
    if:
      type: kv
      path: "description"
      substr: "universal"
      case_insensitive: true
  - id: desc-powerful-library
    desc: Description mentions powerful library
    crit: notable
    conf: 0.5
    if:
      type: kv
      path: "description"
      regex: "powerful.{0,100}(library|framework)"
      case_insensitive: true
  - id: desc-simple
    desc: Description contains "simple"
    crit: notable
    conf: 0.5
    if:
      type: kv
      path: "description"
      substr: "simple"
      case_insensitive: true
  - id: desc-hijack-secrets
    desc: Description advertises hijacking secrets
    crit: suspicious
    conf: 0.99
    attack: "T1195.002"
    if:
      type: kv
      path: "description"
      regex: "hijack.{0,20}secret"
      case_insensitive: true
  - id: desc-easy
    desc: Description contains "easy"
    crit: notable
    conf: 0.5
    unless:
      - type: kv
        path: devDependencies
        exists: true
      - type: kv
        path: repository.url
        exists: true
    if:
      type: kv
      path: "description"
      substr: "easy"
      case_insensitive: true
      # === Security Research Patterns ===
  - id: desc-whitehat-research
    desc: Description claims to be for security research/whitehat
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: "description"
      regex: "whitehat|bug.?bounty|security.?research|pentest"
      case_insensitive: true
  - id: desc-generic-js-utility
    desc: Generic JS utility placeholder phrase
    crit: notable
    conf: 0.78
    attack: T1195.002
    if:
      type: kv
      path: "description"
      regex: "(?i)some useful (js|javascript) (lib|libs|utilities)"
  - id: desc-generic-js-utility-helpers
    desc: Generic JS helper placeholder phrase
    crit: notable
    conf: 0.78
    attack: T1195.002
    if:
      type: kv
      path: "description"
      regex: "(?i)some useful (js|javascript) (utils|helper|helpers)"
  - id: desc-generic-useful-lib
    desc: Generic useful JS library placeholder
    crit: notable
    conf: 0.72
    if:
      type: kv
      path: "description"
      regex: "(?i)^(a )?(useful|handy) (js|javascript) (lib|library)$"
  - id: desc-generic-useful-node-pkg
    desc: Generic useful node package placeholder
    crit: notable
    conf: 0.72
    if:
      type: kv
      path: "description"
      regex: "(?i)^(a )?(useful|handy) (node|npm) (package|module)$"
  - id: desc-analyst-server
    desc: Description references "analyst server" (malware C2 indicator)
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: "description"
      regex: "analyst server"
      case_insensitive: true
    attack: "T1195.002"
  - id: cross-ecosystem-cocoapods-name
    desc: CocoaPods reverse-domain package name in npm
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: kv
      path: name
      regex: "^org\\.cocoapods\\."
  - id: cross-ecosystem-java-name
    desc: Java/Maven reverse-domain package name in npm
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: kv
      path: name
      regex: "^(com|org|io|net)\\.[a-z][a-z0-9]*\\.[a-z]"
  - id: tabby-builtin-plugin-keyword
    desc: Tabby builtin plugin package marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: tabby-builtin-plugin
# === Composite Rules ===
composite_rules:
  - id: npm-secret-hijack-hook
    desc: Postinstall package advertises secret hijack
    crit: hostile
    conf: 0.995
    attack: "T1195.002"
    all:
      - id: postinstall-hook-key
      - id: postinstall-runs-node-script
      - id: desc-hijack-secrets
  # Install hook group
  - id: install-hooks-comp
    desc: Package has install hook
    crit: notable
    conf: 0.6
    any:
      - id: preinstall-hook-key
      - id: postinstall-hook-key
      - id: objectives/supply-chain/install-hook/scripts::has-install
        # Install hook that installs packages (highly suspicious)
        # Legitimate packages declare dependencies in package.json - running install commands
        # in hooks is a supply chain attack indicator
  - id: install-hook-runs-pkg-install
    desc: Install hook runs npm/yarn/pnpm install command
    crit: hostile
    conf: 0.98
    attack: "T1195.002"
    any:
      - id: postinstall-runs-npm-install
      - id: postinstall-runs-yarn-add
      - id: postinstall-runs-pnpm-add
      - id: preinstall-runs-npm-install
      - id: preinstall-runs-yarn-add
      - id: preinstall-runs-pnpm-add
        # Version 1.0.0 with install hooks
  - id: version-1-0-0-with-hooks
    desc: Version 1.0.0 with install hooks
    crit: suspicious
    conf: 0.75
    all:
      - id: objectives/supply-chain/metadata-anomaly/versioning::npm-version-exactly-1-0-0
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
    downgrade:
      any:
        - id: metadata/package/fields::pkg-skeleton-small
        # npm URL as homepage/repository
  - id: npm-as-homepage
    desc: Package uses npmjs.com as homepage
    crit: notable
    conf: 0.8
    any:
      - id: npm-homepage-url
      - id: npm-repo-url
        # Repository presence check
  - id: npm-has-repository
    desc: Package has repository URL
    crit: notable
    conf: 0.5
    any:
      - id: repository-key
      - id: repo-url-git-host
        # Missing repository with install hooks
  - id: no-repo-with-hooks
    desc: Package has install hooks but no repo
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
    unless:
      - id: npm-has-repository
      - id: metadata/package/fields::has-bin-field
      - id: metadata/package/fields::is-private
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-monorepo-workspace-dep
      - id: tabby-builtin-plugin-keyword
    downgrade:
      any:
        - id: metadata/package/fields::pkg-skeleton-small
  - id: desc-simple-easy
    desc: Description mentions simple/easy
    crit: notable
    conf: 0.5
    any:
      - id: desc-simple
      - id: desc-easy
        # Generic descriptions group
  - id: generic-descriptions
    desc: Package has generic marketing description
    crit: notable
    conf: 0.5
    needs: 2
    any:
      - id: desc-lightweight
      - id: desc-modern-web-apps
      - id: desc-universal
      - id: desc-powerful-library
      - id: desc-simple-easy
        # Generic description with hooks
  - id: generic-desc-with-hooks
    desc: Generic description with install hooks
    crit: suspicious
    conf: 0.8
    all:
      - id: generic-descriptions
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
        # === Cloned/Copied Package Identity ===
  - id: cloned-package-identity
    desc: Package with shorthand repo but missing bugs/homepage (possible copy)
    crit: notable
    conf: 0.75
    attack: "T1195.002"
    all:
      - id: repo-shorthand-format
      - id: name-hyphenated-multiword
    unless:
      - id: has-bugs-url
      - id: has-homepage
      - id: metadata/package/fields::has-files-field
      - id: metadata/package/fields::has-engines
      - id: metadata/package/fields::has-contributors
  - id: mature-cloned-package
    desc: Mature version package with incomplete copied metadata
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    mbc: "F0004"
    all:
      - id: version-mature
      - id: repo-shorthand-format
      - id: name-hyphenated-multiword
    unless:
      - id: has-bugs-url
      - id: has-homepage
      - id: metadata/package/fields::has-files-field
      - id: metadata/package/fields::has-engines
      - id: metadata/package/fields::has-contributors
        # === Fake Security Research ===
  - id: fake-security-research
    desc: Package claims security research but runs install hooks
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: desc-whitehat-research
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
  - id: scoped-public-access-hooks
    desc: Scoped package with public access and install hooks
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
      - id: objectives/supply-chain/recon-exfil::public-access-config
    unless:
      - id: npm-has-repository
  - id: dependency-confusion-candidate
    desc: Possible dependency confusion attack package
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: version-mature
      - id: objectives/supply-chain/install-hook/scripts::install-hook-exists
    unless:
      - id: npm-has-repository
      - id: metadata/package/fields::has-bin-field
      - id: metadata/package/fields::is-private
      - id: tabby-builtin-plugin-keyword
    downgrade:
      any:
        - id: metadata/package/fields::pkg-skeleton-small
  - id: sfdc-placeholder-package
    desc: sfdc package looks like placeholder squatter
    crit: hostile
    conf: 0.985
    attack: "T1195.002"
    mbc: "B0024"
    all:
      - id: objectives/supply-chain/metadata-anomaly/naming::npm-name-sfdc-prefix
      - id: metadata/package/fields::pkg-skeleton-small
      - id: main-index-js
    any:
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::npm-init-default-test
      - id: metadata/package/quality::npm-empty-description-any
      - id: metadata/package/quality::npm-no-author
      - id: metadata/package/quality::npm-no-keywords
    needs: 2
    unless:
      - id: npm-has-repository
      - id: metadata/package/fields::has-files-field
      - id: metadata/package/fields::has-engines
      - id: metadata/package/fields::has-bin-field
      - id: metadata/package/fields::is-private
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-monorepo-workspace-dep
  - id: tiny-postinstall-node-loader
    desc: Tiny package runs postinstall node loader
    crit: hostile
    conf: 0.97
    attack: "T1195.002"
    all:
      - id: postinstall-hook-key
      - id: postinstall-runs-node-script
      - id: metadata/package/fields::pkg-skeleton-small
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-no-deps-at-all
      - id: objectives/supply-chain/hidden-payload/staging::no-build-script
    unless:
      - id: npm-has-repository
      - id: metadata/package/fields::has-bin-field
      - id: metadata/package/fields::is-private
