defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - rust
traits:
  - id: sha-rust-crate
    desc: sha_rust suspicious crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    if:
      type: raw
      substr: 'sha_rust::'
  - id: rust-sha-crate
    desc: rust_sha suspicious crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    if:
      type: raw
      substr: 'rust_sha::'
  - id: reqwest-rust-crate
    desc: reqwest_rust suspicious crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    if:
      type: raw
      substr: 'reqwest_rust::'
  - id: tokio-rust-crate
    desc: tokio_rust suspicious crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    if:
      type: raw
      substr: 'tokio_rust::'
  - id: base64-rust-crate
    desc: base64_rust suspicious crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    if:
      type: raw
      substr: 'base64_rust::'
  - id: filte-var-typo
    desc: filte_var misspelling
    crit: notable
    conf: 0.7
    if:
      type: raw
      substr: filte_var
  - id: connecion-typo
    desc: connecion misspelling
    crit: notable
    conf: 0.7
    if:
      type: raw
      substr: connecion
  - id: payloaad-typo
    desc: payloaad misspelling
    crit: notable
    conf: 0.7
    if:
      type: raw
      substr: payloaad
  - id: exfiltrat-word
    desc: exfiltrat word fragment
    crit: notable
    conf: 0.7
    if:
      type: raw
      substr: exfiltrat
  - id: dummy-key-word
    desc: dummy_key reference
    crit: notable
    conf: 0.5
    if:
      type: string_value
      substr: dummy_key
  - id: dummy-value-word
    desc: dummy_value reference
    crit: notable
    conf: 0.5
    if:
      type: string_value
      substr: dummy_value
composite_rules:
  - id: suspicious-crate-call
    desc: Call to suspicious-looking crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    any:
      - id: sha-rust-crate
      - id: rust-sha-crate
      - id: reqwest-rust-crate
      - id: tokio-rust-crate
      - id: base64-rust-crate
  - id: misspelled-common-words
    desc: Misspelled common words in identifiers
    crit: notable
    conf: 0.7
    any:
      - id: filte-var-typo
      - id: connecion-typo
      - id: payloaad-typo
      - id: exfiltrat-word
  - id: dummy-keys-hashmap
    desc: Usage of dummy keys in HashMap
    crit: notable
    conf: 0.6
    any:
      - id: dummy-key-word
      - id: dummy-value-word
  - id: trojanized-lib
    desc: Trojanized Rust library
    crit: hostile
    conf: 0.85
    attack: T1195.001
    mbc: B0024
    all:
      - id: suspicious-crate-call
      - id: misspelled-common-words
