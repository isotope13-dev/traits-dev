defaults:
  platforms:
    - unix
    - windows
  for:
    - rust
    - cargo.toml
traits:
  - id: sha-rust-crate
    desc: sha_rust suspicious crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    if:
      type: text
      substr: 'sha_rust::'
  - id: rust-sha-crate
    desc: rust_sha suspicious crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    if:
      type: text
      substr: 'rust_sha::'
  - id: reqwest-rust-crate
    desc: reqwest_rust suspicious crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    if:
      type: text
      substr: 'reqwest_rust::'
  - id: tokio-rust-crate
    desc: tokio_rust suspicious crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    if:
      type: text
      substr: 'tokio_rust::'
  - id: base64-rust-crate
    desc: base64_rust suspicious crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    if:
      type: text
      substr: 'base64_rust::'
  - id: filte-var-typo
    desc: filte_var misspelling
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: filte_var
  - id: connecion-typo
    desc: connecion misspelling
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: connecion
  - id: payloaad-typo
    desc: payloaad misspelling
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: payloaad
  - id: exfiltrat-word
    desc: exfiltrat word fragment
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: exfiltrat
  - id: dummy-key-word
    desc: dummy_key reference
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      substr: dummy_key
  - id: dummy-value-word
    desc: dummy_value reference
    crit: notable
    conf: 0.5
    for: [rust]
    if:
      type: string_literal
      substr: dummy_value
  - id: cargo-description-dependency-confusion
    desc: Cargo description mentions dependency confusion
    crit: suspicious
    conf: 0.9
    for: [cargo.toml]
    if:
      type: kv
      path: package.description
      regex: dependency\s+confusion
      case_insensitive: true
  - id: cargo-description-security-poc
    desc: Cargo description claims security research PoC
    crit: notable
    conf: 0.88
    for: [cargo.toml]
    if:
      type: kv
      path: package.description
      regex: (security\s+research|proof.of.concept|\bpoc\b)
      case_insensitive: true
  - id: cargo-description-ownership-transfer
    desc: Cargo description offers ownership transfer
    crit: suspicious
    conf: 0.94
    for: [cargo.toml]
    if:
      type: kv
      path: package.description
      regex: ownership\s+transfer
      case_insensitive: true
composite_rules:
  - id: suspicious-crate-call
    desc: Call to suspicious-looking crate
    crit: suspicious
    conf: 0.8
    attack: T1195
    any:
      - id: sha-rust-crate
      - id: rust-sha-crate
      - id: reqwest-rust-crate
      - id: tokio-rust-crate
      - id: base64-rust-crate
  - id: misspelled-common-words
    desc: Misspelled common words in identifiers
    crit: notable
    conf: 0.7
    any:
      - id: filte-var-typo
      - id: connecion-typo
      - id: payloaad-typo
      - id: exfiltrat-word
  - id: dummy-keys-hashmap
    desc: Usage of dummy keys in HashMap
    crit: notable
    conf: 0.6
    any:
      - id: dummy-key-word
      - id: dummy-value-word
  - id: trojanized-lib
    desc: Trojanized Rust library
    crit: hostile
    conf: 0.85
    attack: T1195.001
    mbc: B0024
    all:
      - id: suspicious-crate-call
      - id: misspelled-common-words
  - id: cargo-dependency-confusion-poc
    desc: Cargo package self-identifies as dependency confusion PoC
    crit: hostile
    conf: 0.98
    attack: T1195.001
    all:
      - id: cargo-description-dependency-confusion
      - id: cargo-description-security-poc
    any:
      - id: cargo-description-ownership-transfer
