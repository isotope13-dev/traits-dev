defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  crit: notable
traits:
  - id: from-setuptools-import
    desc: from setuptools import statement
    crit: component
    conf: 0.7
    if:
      type: text
      regex: from\s+setuptools\s+import
  - id: import-setuptools
    desc: import setuptools statement
    crit: component
    conf: 0.7
    if:
      type: text
      regex: import\s+setuptools
  - id: distutils
    desc: Python package distribution (distutils)
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: import distutils
  - id: setup-call
    desc: Python package setup() definition
    crit: baseline
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: setup(
  - id: setup-packages-find-packages
    desc: setup() uses find_packages()
    crit: component
    conf: 0.86
    # `packages=find_packages()` keyword argument — distinctive as source text.
    if:
      type: text
      regex: 'packages\s*=\s*find_packages\s*\('
  - id: setup-find-packages-exclude-tests
    desc: find_packages() excludes only tests
    crit: component
    conf: 0.84
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      exact: 'find_packages'
  - id: setup-zip-safe-false
    desc: setup() sets zip_safe False
    crit: component
    conf: 0.8
    # `zip_safe=False` keyword argument.
    if:
      type: text
      regex: 'zip_safe\s*=\s*False\b'
  - id: setup-entry-points-field
    desc: setup.py declares entry_points
    crit: component
    conf: 0.78
    if:
      type: text
      regex: entry_points\s*=
  - id: entry-points-file
    desc: Python entry_points.txt file
    crit: component
    conf: 0.95
    for: [text]
    if:
      type: basename
      exact: entry_points.txt
  - id: console-scripts-entry
    desc: Python console_scripts entry point
    crit: component
    conf: 0.88
    for: [text]
    if:
      type: text
      substr: "[console_scripts]"
  - id: setup-scripts-field
    desc: setup.py declares scripts
    crit: component
    conf: 0.78
    if:
      type: text
      regex: scripts\s*=
  - id: metadata-author
    desc: author= metadata field
    crit: component
    conf: 0.5
    if:
      type: string_literal
      regex: author\s*=
  - id: metadata-version
    desc: version= metadata field
    crit: component
    conf: 0.5
    if:
      type: string_literal
      regex: version\s*=
  - id: metadata-description
    desc: description= metadata field
    crit: component
    conf: 0.5
    for: [pyproject.toml, pkginfo]
    size_max: 50000
    if:
      type: string_literal
      regex: description\s*=
  - id: metadata-packages
    desc: packages= metadata field
    crit: component
    conf: 0.5
    if:
      type: string_literal
      regex: packages\s*=
  - id: directory-masquerade-dup
    desc: Directory masquerading as file (e.g.
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: os\.path\.join\(.{0,50}\.py.{0,30}\)
  - id: cmdclass-dict
    desc: cmdclass dict assignment
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: cmdclass\s*=\s*\{
  - id: install-class-inherit
    desc: class inheriting from install
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: class\s+\w+\(install\)
  - id: setup-py-crlf-padding
    desc: setup.py ends with CRLF padding
    crit: component
    conf: 0.72
    size_max: 4096
    if:
      type: text
      regex: '(\r\n[ \t]+){10,}$'
  - id: setup-py-trailing-whitespace
    desc: setup.py has trailing whitespace
    crit: component
    conf: 0.72
    size_max: 4096
    unless:
      - type: basename
        regex: '(^|[\\/])[^\\/]*(TOOL|tool)\.py$'
    if:
      type: metrics
      field: "text.trailing_whitespace_lines"
      min: 10
composite_rules:
  - id: setuptools
    desc: Python package distribution (setuptools)
    crit: component
    conf: 0.8
    any:
      - id: from-setuptools-import
      - id: import-setuptools
  - id: metadata
    desc: Python package metadata definition
    crit: component
    conf: 0.7
    any:
      - id: metadata-author
      - id: metadata-version
      - id: metadata-description
      - id: metadata-packages
  - id: cmdclass-override
    desc: Custom install command class override
    crit: suspicious
    conf: 0.85
    any:
      - id: cmdclass-dict
      - id: install-class-inherit
  - id: minimal-find-packages-setup
    desc: Minimal find_packages setuptools setup
    crit: notable
    conf: 0.82
    all:
      - id: setup-packages-find-packages
      - id: setup-find-packages-exclude-tests
      - id: setup-zip-safe-false
  - id: minimal-placeholder-setup
    desc: Minimal placeholder-style setup.py
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/build/pip::setup-py
      - id: minimal-find-packages-setup
      - id: metadata/file/text/metrics::file-under-12-lines
    unless:
      - id: objectives/supply-chain/install-hook/dropper/dependency::install-requires-assignment
      - id: metadata/build/package::setup-cmdclass-install
      - id: install-class-inherit
      - id: setup-entry-points-field
      - id: setup-scripts-field
  - id: setup-crlf-whitespace-layout
    desc: setup.py has CRLF padded whitespace
    crit: notable
    conf: 0.76
    all:
      - id: metadata/build/pip::setup-py
      - id: setup-py-crlf-padding
      - id: setup-py-trailing-whitespace
  - id: wheel-console-entrypoint
    desc: Wheel exposes console script entry point
    crit: component
    conf: 0.9
    for: [text]
    all:
      - id: entry-points-file
      - id: console-scripts-entry
