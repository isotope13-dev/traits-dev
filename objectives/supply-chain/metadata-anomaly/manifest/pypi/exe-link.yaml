defaults:
  platforms: [unix, windows]
  for: [source, pkginfo]
  conf: 0.9
traits:
  # Sparse-metadata signals are notable on their own — private/internal/dev
  # packages commonly have missing fields. The `pypi-minimal-malware-facade-metadata`
  # composite combines them with a registry sidecar for the suspicious conclusion.
  - id: pypi-empty-description
    desc: PyPI metadata has empty description
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: "info.description"
      exact: ""
  - id: pypi-no-homepage
    desc: PyPI metadata omits homepage
    crit: notable
    conf: 0.7
    for: [pkginfo]
    if:
      type: kv
      path: "info.home_page"
      exists: false
    unless:
      - type: kv
        path: "info.project_urls"
        exists: true
      - type: kv
        path: "resources.homepage"
        exists: true
      - type: text
        substr: '"releases_url"'
      - type: basename
        exact: metadata.json
      - type: text
        regex: "Repository-Browse:|Project-URL:|Home-page:|https?://(github|gitlab)\\.com/|https?://codeberg\\.org/"
      - type: text
        substr: "--- !ruby/object:Gem::Specification"
      - type: text
        regex: "\"dist-tags\"\\s*:|\"_npmVersion\"\\s*:"
  - id: pypi-no-author-email
    desc: PyPI metadata omits author email
    crit: component
    for: [pkginfo]
    if:
      type: kv
      path: "info.author_email"
      exists: false
    unless:
      - type: basename
        regex: "^(META|meta)\\.json$"
      - type: text
        regex: "\"dist-tags\"\\s*:|\"_npmVersion\"\\s*:|\"maintainers\"\\s*:"
  - id: pypi-no-runtime-deps
    desc: PyPI metadata omits runtime dependencies
    crit: notable
    conf: 0.7
    for: [pkginfo]
    if:
      type: kv
      path: "info.requires_dist"
      exists: false
    unless:
      - type: kv
        path: "info.requires_python"
        exists: true
      - type: basename
        regex: "^(META|meta)\\.json$"
      - type: basename
        exact: metadata.json
      - type: kv
        path: "prereqs.runtime.requires"
        exists: true
      - type: text
        substr: '"releases_url"'
      - type: text
        regex: "Repository-Browse:|Project-URL:|Requires-Dist:|Home-page:|--- !ruby/object:Gem::Specification"
  - id: pypi-dynamic-metadata-triad
    desc: Dynamic PyPI metadata triad
    crit: suspicious
    if:
      type: kv
      path: "info.dynamic"
      regex: 'Author'
  - id: pypi-arabic-exe-download-summary
    desc: Arabic EXE download lure
    crit: suspicious
    conf: 0.98
    if:
      type: kv
      path: "info.summary"
      regex: 'تحميل.{0,40}تشغيل.{0,24}exe.{0,24}رابط'
  - id: pypi-tiny-wheel
    desc: Tiny PyPI wheel artifact
    crit: component
    if:
      type: kv
      path: "urls[0].size"
      regex: '^2[0-2][0-9]{2}$'
  - id: pypi-tiny-sdist
    desc: Tiny PyPI source distribution artifact
    crit: component
    if:
      type: kv
      path: "urls[1].size"
      regex: '^1[5-6][0-9]{2}$'
composite_rules:
  - id: pypi-minimal-malware-facade-metadata
    desc: Sparse PyPI metadata consistent with throwaway malware facade package
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry-pypi::meta-json-sidecar
      - id: pypi-empty-description
      - id: pypi-no-runtime-deps
    any:
      - id: pypi-no-homepage
      - id: pypi-no-author-email
      - id: pypi-dynamic-metadata-triad
  - id: pypi-exe-link-dropper-lure
    desc: PyPI metadata markets downloading and running EXE from URL
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry-pypi::meta-json-sidecar
      - id: pypi-arabic-exe-download-summary
    any:
      - id: pypi-minimal-malware-facade-metadata
      - id: pypi-tiny-wheel
      - id: pypi-tiny-sdist
