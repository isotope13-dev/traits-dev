defaults:
  platforms: [unix, windows]
  for: [source, pkginfo]
  conf: 0.9
traits:
  # Sparse-metadata signals are notable on their own — private/internal/dev
  # packages commonly have missing fields. The `pypi-minimal-malware-facade-metadata`
  # composite combines them with a registry sidecar for the suspicious conclusion.
- id: pypi-empty-description
  desc: PyPI metadata has empty description
  crit: notable
  conf: 0.75
  if:
    type: kv
    path: "info.description"
    exact: ""
- id: pypi-no-homepage
  desc: PyPI metadata omits homepage
  crit: notable
  conf: 0.7
  for: [pkginfo]
  if:
    type: kv
    path: "info.home_page"
    exists: false
  unless:
  - type: kv
    path: "info.project_urls"
    exists: true
  - type: kv
    path: "resources.homepage"
    exists: true
  - type: text
    substr: '"releases_url"'
  - type: basename
    exact: metadata.json
  - id: pypi-no-homepage-unless-cond-4--rx-helper-6
  - type: text
    substr: "--- !ruby/object:Gem::Specification"
  - type: text
    regex: "\"dist-tags\"\\s*:|\"_npmVersion\"\\s*:"
- id: pypi-no-author-email
  desc: PyPI metadata omits author email
  crit: component
  for: [pkginfo]
  if:
    type: kv
    path: "info.author_email"
    exists: false
  unless:
  - type: basename
    regex: "^(META|meta)\\.json$"
  - type: text
    regex: "\"dist-tags\"\\s*:|\"_npmVersion\"\\s*:|\"maintainers\"\\s*:"
- id: pypi-no-runtime-deps
  desc: PyPI metadata omits runtime dependencies
  crit: notable
  conf: 0.7
  for: [pkginfo]
  if:
    type: kv
    path: "info.requires_dist"
    exists: false
  unless:
  - type: kv
    path: "info.requires_python"
    exists: true
  - type: basename
    regex: "^(META|meta)\\.json$"
  - type: basename
    exact: metadata.json
  - type: kv
    path: "prereqs.runtime.requires"
    exists: true
  - type: text
    substr: '"releases_url"'
  - id: pypi-no-runtime-deps-unless-cond-5--rx-helper-12
- id: pypi-dynamic-metadata-triad
  desc: Dynamic PyPI metadata triad
  crit: suspicious
  if:
    type: kv
    path: "info.dynamic"
    substr: Author
- id: pypi-arabic-exe-download-summary
  desc: Arabic EXE download lure
  crit: suspicious
  conf: 0.98
  if:
    type: kv
    path: "info.summary"
    regex: 'تحميل.{0,40}تشغيل.{0,24}exe.{0,24}رابط'
- id: pypi-no-homepage-unless-cond-4--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Repository-Browse:'
  count_max: 1022215
- id: pypi-no-homepage-unless-cond-4--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Project-URL:'
  count_max: 1022216
- id: pypi-no-homepage-unless-cond-4--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Home-page:'
  count_max: 1022217
- id: pypi-no-homepage-unless-cond-4--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    regex: "https?://(github|gitlab)\\.com/"
  count_max: 1022218
- id: pypi-no-homepage-unless-cond-4--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    regex: "https?://codeberg\\.org/"
  count_max: 1022219
- id: pypi-no-runtime-deps-unless-cond-5--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Repository-Browse:'
  count_max: 1022220
- id: pypi-no-runtime-deps-unless-cond-5--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Project-URL:'
  count_max: 1022221
- id: pypi-no-runtime-deps-unless-cond-5--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Requires-Dist:'
  count_max: 1022222
- id: pypi-no-runtime-deps-unless-cond-5--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: 'Home-page:'
  count_max: 1022223
- id: pypi-no-runtime-deps-unless-cond-5--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.7
  for: [pkginfo]
  if:
    type: text
    substr: '--- !ruby/object:Gem::Specification'
  count_max: 1022224
composite_rules:
- id: pypi-minimal-malware-facade-metadata
  desc: Sparse PyPI metadata consistent with throwaway malware facade package
  crit: suspicious
  conf: 0.94
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry-pypi::meta-json-sidecar
  - id: pypi-empty-description
  - id: pypi-no-runtime-deps
  any:
  - id: pypi-no-homepage
  - id: pypi-no-author-email
  - id: pypi-dynamic-metadata-triad
- id: pypi-exe-link-dropper-lure
  desc: PyPI metadata markets downloading and running EXE from URL
  crit: hostile
  conf: 0.99
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry-pypi::meta-json-sidecar
  - id: pypi-arabic-exe-download-summary
  any:
  - id: pypi-minimal-malware-facade-metadata
- id: pypi-no-homepage-unless-cond-4--rx-helper-6
  desc: Regex component marker
  crit: component
  conf: 1.0
  for: [pkginfo]
  any:
  - id: pypi-no-homepage-unless-cond-4--rx-1
  - id: pypi-no-homepage-unless-cond-4--rx-2
  - id: pypi-no-homepage-unless-cond-4--rx-3
  - id: pypi-no-homepage-unless-cond-4--rx-4
  - id: pypi-no-homepage-unless-cond-4--rx-5
- id: pypi-no-runtime-deps-unless-cond-5--rx-helper-12
  desc: Regex component marker
  crit: component
  conf: 1.0
  for: [pkginfo]
  any:
  - id: pypi-no-runtime-deps-unless-cond-5--rx-7
  - id: pypi-no-runtime-deps-unless-cond-5--rx-8
  - id: pypi-no-runtime-deps-unless-cond-5--rx-9
  - id: pypi-no-runtime-deps-unless-cond-5--rx-10
  - id: pypi-no-runtime-deps-unless-cond-5--rx-11
