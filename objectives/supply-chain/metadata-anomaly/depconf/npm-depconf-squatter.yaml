# npm registry metadata: dependency confusion squatter detection
# Targets packages that self-identify as dependency confusion probes/squatters
# via keywords, descriptions, or bug bounty attribution.
# ATT&CK: T1195.002 (Supply Chain Compromise)
defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  attack: "T1195.002"

traits:
- id: versioned-keyword-depconf
  desc: Registry keywords include "dependency confusion"
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: "\"dependency confusion\""
- id: versioned-keyword-bugcrowd
  desc: Registry keywords include "bugcrowd"
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: "\"bugcrowd\""
- id: versioned-keyword-hackerone
  desc: Registry keywords include "hackerone"
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: "\"hackerone\""
- id: versioned-keyword-placeholder
  desc: Registry keywords include "placeholder"
  crit: notable
  conf: 0.75
  if:
    type: text
    substr: "\"placeholder\""
- id: versioned-deprecated-field
  desc: Registry metadata has deprecated field
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '"deprecated"\s*:\s*"'
- id: versioned-do-not-use-desc
  desc: Registry description says "do not use"
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: '"description"[^"]{0,20}"[^"]{0,80}[Dd]o [Nn]ot [Uu]se'
- id: versioned-depconf-near-bugcrowd
  desc: Registry keywords have depconf near bugcrowd
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '"dependency confusion"[^"]{0,200}"bugcrowd"'
- id: versioned-bugcrowd-near-depconf
  desc: Registry keywords have bugcrowd near depconf
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '"bugcrowd"[^"]{0,200}"dependency confusion"'

composite_rules:
- id: versioned-keyword-bb-platform
  desc: Registry keywords name a bug bounty platform
  crit: notable
  conf: 0.88
  any:
  - id: versioned-keyword-bugcrowd
  - id: versioned-keyword-hackerone
- id: versioned-depconf-self-identify
  desc: Registry metadata self-identifies as depconf
  crit: suspicious
  conf: 0.95
  any:
  - id: versioned-keyword-depconf
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-desc-poc-depconf
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-unscoped-depconf-squatter
- id: depconf-squatter-anomalies
  desc: Registry metadata shows squatter anomalies
  crit: component
  conf: 0.88
  any:
  - id: registry-sparse-package-meta
  - id: versioned-keyword-placeholder
  - id: versioned-do-not-use-desc
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-desc-scoped-pkg-target
  - id: versioned-keyword-bb-platform
  needs: 2
- id: depconf-squatter-registry-meta
  desc: Registry metadata self-identifies as depconf squatter
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
  - id: versioned-depconf-self-identify
  - id: depconf-squatter-anomalies
- id: depconf-bugcrowd-adjacent
  desc: Depconf and bugcrowd keywords co-occur in registry
  crit: suspicious
  conf: 0.92
  any:
  - id: versioned-depconf-near-bugcrowd
  - id: versioned-bugcrowd-near-depconf
- id: depconf-bounty-squatter
  desc: Registry depconf squatter with bug bounty attribution
  crit: hostile
  conf: 0.97
  mbc: "B0024"
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
  - id: versioned-keyword-depconf
  - id: versioned-keyword-bb-platform
  any:
  - id: registry-sparse-package-meta
  - id: versioned-keyword-placeholder
- id: registry-sparse-package-meta
  desc: Sparse registry package metadata
  crit: component
  conf: 0.88
  any:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-dist-tiny-unpacked-size
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-dist-minimal-filecount
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-empty-readme
- id: depconf-poc-targeted-support
  desc: Registry PoC has targeted support signals
  crit: component
  conf: 0.88
  any:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-postinstall-hook
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-postinstall-node-index
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-inflated-version-100plus-raw
  needs: 2
- id: depconf-poc-targeted-squatter
  desc: Registry depconf PoC targets internal scoped package
  crit: hostile
  conf: 0.98
  mbc: "B0024"
  all:
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-desc-poc-depconf
  - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-desc-scoped-pkg-target
  - id: depconf-poc-targeted-support
