defaults:
  platforms: [unix, windows]
  for: [package.json]

traits:
  - id: node-inline-eval
    desc: Lifecycle hook executes inline Node.js code
    crit: notable
    conf: 0.92
    size_max: 200000
    if:
      type: trait
      id: objectives/supply-chain/recon-exfil/more::node-inline-eval
    unless:
      - id: metadata/package/testing/harness::is-test

  - id: js-client-request-post
    desc: JavaScript client POST request
    crit: suspicious
    conf: 0.9
    size_max: 200000
    if:
      type: trait
      id: objectives/supply-chain/recon-exfil/more::js-client-request-post
    unless:
      - id: metadata/package/testing/harness::is-test

  - id: node-inline-cloud-env-fingerprint
    desc: Inline Node cloud env fingerprint
    crit: suspicious
    conf: 0.95
    size_max: 200000
    if:
      type: trait
      id: objectives/supply-chain/recon-exfil/more::node-inline-cloud-env-fingerprint
    unless:
      - id: metadata/package/testing/harness::is-test
