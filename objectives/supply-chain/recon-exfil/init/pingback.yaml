defaults:
  platforms: [unix, windows]
  attack: "T1195.002"
  for: [python, pkginfo]
composite_rules:
  - id: init-network-pingback
    desc: Import time network pingback
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/recon-exfil/install-hook::init-py-file
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: objectives/exfiltration/oob/endpoint::interact-sh-me-fun
    any:
      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
      - id: micro-behaviors/communications/http/request/client::url-literal
  - id: init-encoded-url-callback
    desc: Init-time base64 encoded URL callback
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/supply-chain/recon-exfil/install-hook::init-py-file
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/communications/http/request/client::request-python
    any:
      - id: objectives/exfiltration/oob/endpoint::https-b64
      - id: objectives/anti-static/obfuscation/encoding/content::encoded-http-url
      - id: objectives/exfiltration/oob/
  - id: init-oob-callback
    desc: Init-time OOB domain callback
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/recon-exfil/install-hook::init-py-file
      - id: micro-behaviors/communications/http/request/client::request-python
    any:
      - id: objectives/exfiltration/oob/
      - id: objectives/exfiltration/oob/endpoint::oob-domains
  - id: dependency-confusion-pingback
    desc: Dependency confusion package with OAST pingback
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/supply-chain/metadata-anomaly/versioning::pkginfo-inflated-version
      - id: objectives/supply-chain/impersonation/depconf::summary-poc-research
      - id: init-network-pingback
    any:
      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
      - id: micro-behaviors/communications/http/request/client::url-literal
