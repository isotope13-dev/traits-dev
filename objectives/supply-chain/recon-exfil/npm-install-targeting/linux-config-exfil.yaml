defaults:
  platforms: [linux, unix]
  for: [javascript, package.json]

traits:
  - id: linux-hostname-target
    desc: Targets /etc/hostname file
    crit: suspicious
    conf: 0.96
    attack: T1005
    for: [javascript]
    if:
      type: text
      substr: /etc/hostname
  - id: linux-crontab-target
    desc: Targets /etc/crontab file
    crit: suspicious
    conf: 0.97
    attack: T1005
    for: [javascript]
    if:
      type: text
      substr: /etc/crontab
  - id: linux-config-batch-separator
    desc: Uses custom file batch separator
    crit: suspicious
    conf: 0.98
    attack: T1041
    for: [javascript]
    if:
      type: text
      substr: $###############$
  - id: upload-path
    desc: Posts data to /upload path
    crit: suspicious
    conf: 0.95
    attack: T1041
    for: [javascript]
    if:
      type: text
      substr: /upload
  - id: https-request-call
    desc: Calls https.request for exfil
    crit: suspicious
    conf: 0.95
    attack: T1071.001
    for: [javascript]
    if:
      type: text
      substr: https.request(
  - id: node-readfile-utf8-callback
    desc: Node readFile utf8 callback
    crit: suspicious
    conf: 0.9
    attack: T1005
    for: [javascript]
    if:
      type: text
      regex: 'readFile\([^)]{0,80}"utf8",\s*\('

composite_rules:
  - id: linux-config-file-set
    desc: Reads Linux config and identity files
    crit: suspicious
    conf: 0.98
    attack: T1005
    for: [javascript]
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/config::config-hosts
      - id: linux-hostname-target
      - id: linux-crontab-target
    needs: 3
  - id: urlencoded-msg-batch-exfil
    desc: URL encoded batch exfil payload
    crit: suspicious
    conf: 0.98
    attack: T1041
    for: [javascript]
    all:
      - id: objectives/supply-chain/metadata-anomaly/behavior/npm::querystring-msg-field
      - id: linux-config-batch-separator
    any:
      - id: upload-path
      - id: micro-behaviors/communications/http/post::url-encoded-content-type
      - id: micro-behaviors/communications/http/post::post
  - id: npm-postinstall-linux-config-exfil
    desc: Postinstall exfiltrates Linux config files
    crit: hostile
    conf: 0.995
    attack: T1041
    mbc: E1041
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: https-request-call
      - id: linux-config-file-set
      - id: urlencoded-msg-batch-exfil
    any:
      - id: objectives/supply-chain/install-hook/scripts::has-postinstall
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-postinstall-node-entry
      - id: node-readfile-utf8-callback
    needs: 1
