defaults:
  platforms: [unix]
  for: [javascript, package.json]

traits:
- id: linux-hostname-target
  desc: References /etc/hostname file
  crit: notable
  conf: 0.96
  attack: T1005
  for: [javascript]
  unless:
  - id: metadata/package/testing/presence/harness::spec-test-filename
  if:
    type: text
    substr: "/etc/hostname"
- id: linux-config-batch-separator
  desc: Uses custom file batch separator
  crit: suspicious
  conf: 0.98
  attack: T1041
  for: [javascript]
  if:
    type: text
    substr: "$###############$"
- id: upload-path-fragment
  desc: /upload path literal
  crit: component
  conf: 0.95
  attack: T1041
  for: [javascript]
  if:
    type: text
    regex: '["'']/upload["'']'
  unless:
  - type: basename
    regex: '\.d\.(ts|cts|mts)$'
  - type: path
    regex: '(^|[\\/])routes?[\\/]'
  - type: basename
    regex: '.{0,50}[-_.]tests?\.(c|m)?[jt]sx?(\.snap)?$'
  - type: text
    substr: "page.route('**/upload'"
  - type: text
    substr: "icons/upload.svg"
  - type: text
    regex: 'setRoute\(["'']/upload["'']'
  - type: text
    substr: "test.describe"
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/file/format::sourcemap-inline-base64
- id: express-multer-upload-route
  desc: Express multer upload route declaration
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: '(app|router)\.post\(\s*["'']/upload["''][\s\S]{0,160}\.upload\.single\('
composite_rules:
- id: linux-config-file-set
  desc: Reads Linux config and identity files
  crit: suspicious
  conf: 0.98
  attack: T1005
  for: [javascript]
  any:
  - id: micro-behaviors/fs/path/config/accounts::etc-passwd
  - id: micro-behaviors/fs/path/config/system::config-hosts
  - id: linux-hostname-target
  - id: micro-behaviors/fs/path/config/system::config-crontab
  needs: 3
- id: urlencoded-msg-batch-exfil
  desc: URL encoded batch exfil payload
  crit: suspicious
  conf: 0.98
  attack: T1041
  for: [javascript]
  all:
  - id: objectives/supply-chain/recon-exfil/host-profile/install-context::querystring-msg-field
  - id: linux-config-batch-separator
  any:
  - id: upload-path
  - id: micro-behaviors/communications/http/post::url-encoded-content-type
  - id: micro-behaviors/communications/http/post::post
- id: upload-path
  desc: Posts data to /upload path
  crit: suspicious
  conf: 0.95
  attack: T1041
  for: [javascript]
  all:
  - id: upload-path-fragment
  - id: micro-behaviors/communications/http/keywords::http-verb-keyword
  near_bytes: 120
  unless:
  - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
  - id: express-multer-upload-route
  - id: metadata/package/documentation::package-doc-reference-basename
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/file/format::sourcemap-inline-base64
- id: npm-postinstall-linux-config-exfil
  desc: Node payload exfiltrates Linux config files
  crit: hostile
  conf: 0.995
  attack: T1041
  mbc: E1041
  for: [javascript]
  all:
  - id: micro-behaviors/communications/http/request/client::https-request
  - id: linux-config-file-set
  - id: urlencoded-msg-batch-exfil
  any:
  - id: micro-behaviors/fs/file/read::read-file-utf8-callback
  - id: micro-behaviors/fs/file/read::read-node
  - id: metadata/file/metrics::javascript-small-file-5k
