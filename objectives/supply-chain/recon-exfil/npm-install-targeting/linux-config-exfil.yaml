defaults:
  platforms: [linux, macos, windows, unix, android, ios]

traits:
  - id: postinstall-node-indexjs
    desc: postinstall runs local index.js
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    for: [package.json]
    if:
      type: kv
      path: scripts.postinstall
      regex: "^node\\s+[./]?index\\.js$"

  - id: js-target-etc-passwd
    desc: JavaScript targets /etc/passwd
    crit: notable
    conf: 0.94
    attack: "T1005"
    for: [javascript]
    if:
      type: text
      exact: /etc/passwd

  - id: js-target-etc-hosts
    desc: JavaScript targets /etc/hosts
    crit: notable
    conf: 0.92
    attack: "T1005"
    for: [javascript]
    if:
      type: text
      exact: /etc/hosts

  - id: js-target-etc-hostname
    desc: JavaScript targets /etc/hostname
    crit: notable
    conf: 0.92
    attack: "T1005"
    for: [javascript]
    if:
      type: text
      exact: /etc/hostname

  - id: js-target-etc-crontab
    desc: JavaScript targets /etc/crontab
    crit: suspicious
    conf: 0.95
    attack: "T1005"
    for: [javascript]
    if:
      type: text
      exact: /etc/crontab

  - id: js-querystring-body
    desc: JavaScript URL-encodes HTTP body
    crit: notable
    conf: 0.9
    attack: "T1041"
    for: [javascript]
    if:
      type: text
      substr: querystring.stringify(

  - id: js-upload-path
    desc: JavaScript posts to /upload path
    crit: suspicious
    conf: 0.94
    attack: "T1041"
    for: [javascript]
    if:
      type: text
      exact: /upload

  - id: js-record-separator
    desc: JavaScript uses custom record separator
    crit: suspicious
    conf: 0.96
    attack: "T1005"
    for: [javascript]
    if:
      type: text
      exact: $###############$

composite_rules:
  - id: js-linux-config-harvest
    desc: JavaScript reads multiple Linux config files
    crit: suspicious
    conf: 0.97
    attack: "T1005"
    for: [javascript]
    all:
      - id: micro-behaviors/fs/file/read::read-node
    any:
      - id: js-target-etc-passwd
      - id: js-target-etc-hosts
      - id: js-target-etc-hostname
      - id: js-target-etc-crontab
    needs: 3

  - id: npm-postinstall-linux-config-exfil
    desc: postinstall exfiltrates Linux config files
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
    all:
      - id: postinstall-node-indexjs
      - id: js-linux-config-harvest
      - id: micro-behaviors/communications/http/request::https-request
      - id: micro-behaviors/communications/ip::external-ipv4-script
    any:
      - id: js-querystring-body
      - id: js-upload-path
      - id: js-record-separator
      - id: micro-behaviors/communications/http/post::url-encoded-content-type
      - id: micro-behaviors/communications/http/request::req-write
    needs: 2

  - id: npm-postinstall-upload-endpoint-stealer
    desc: postinstall steals Linux config to upload endpoint
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
    all:
      - id: postinstall-node-indexjs
      - id: js-linux-config-harvest
      - id: js-upload-path
      - id: micro-behaviors/communications/http/request::https-request
    any:
      - id: micro-behaviors/communications/ip::external-ipv4-script
      - id: js-querystring-body
      - id: js-record-separator
      - id: micro-behaviors/communications/http/request::req-write
    needs: 2
