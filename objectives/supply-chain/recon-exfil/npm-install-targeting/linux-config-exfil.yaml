defaults:
  platforms: [unix]
  for: [javascript, package.json]

traits:
- id: linux-hostname-target
  desc: Targets /etc/hostname file
  crit: suspicious
  conf: 0.96
  attack: T1005
  for: [javascript]
  if:
    type: text
    substr: "/etc/hostname"
- id: linux-config-batch-separator
  desc: Uses custom file batch separator
  crit: suspicious
  conf: 0.98
  attack: T1041
  for: [javascript]
  if:
    type: text
    substr: "$###############$"
- id: upload-path-fragment
  desc: /upload path literal
  crit: component
  conf: 0.95
  attack: T1041
  for: [javascript]
  if:
    type: text
    regex: '["'']/upload["'']'
  unless:
  - type: basename
    regex: '\.d\.(ts|cts|mts)$'
  - type: path
    regex: '(^|[\\/])routes?[\\/]'
  - type: basename
    regex: '.{0,50}[-_.]tests?\.(c|m)?[jt]sx?(\.snap)?$'
  - type: text
    substr: "page.route('**/upload'"
  - type: text
    substr: "icons/upload.svg"
  - type: text
    regex: 'setRoute\(["'']/upload["'']'
  - type: text
    substr: "test.describe"
- id: express-multer-upload-route
  desc: Express multer upload route declaration
  crit: baseline
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: '(app|router)\.post\(\s*["'']/upload["''][\s\S]{0,160}\.upload\.single\('
- id: node-readfile-utf8-callback
  desc: Node readFile utf8 callback
  crit: suspicious
  conf: 0.9
  attack: T1005
  for: [javascript]
  if:
    type: text
    regex: 'readFile\([^)]{0,80}"utf8",\s*\('
  unless:
  - type: text
    substr: 'page.exposeFunction("readfile"'
  - type: text
    substr: 'readFile(q,re?void 0:"utf8",('
  - type: text
    substr: 'readFile(k,ae?void 0:"utf8",('
  - type: text
    regex: 'export\s+function\s+readFile\([^)]*filePath:\s*string\)\s*:\s*Promise<string>'
  - type: text
    substr: MathJax.loader&&MathJax.loader.checkVersion(
  - id: well-known/app/tencent-codebuddy::codebuddy-marker

composite_rules:
- id: linux-config-file-set
  desc: Reads Linux config and identity files
  crit: suspicious
  conf: 0.98
  attack: T1005
  for: [javascript]
  any:
  - id: micro-behaviors/fs/path/config/accounts::etc-passwd
  - id: micro-behaviors/fs/path/config/system::config-hosts
  - id: linux-hostname-target
  - id: micro-behaviors/fs/path/config/system::config-crontab
  needs: 3
- id: urlencoded-msg-batch-exfil
  desc: URL encoded batch exfil payload
  crit: suspicious
  conf: 0.98
  attack: T1041
  for: [javascript]
  all:
  - id: objectives/supply-chain/metadata-anomaly/package/npm::querystring-msg-field
  - id: linux-config-batch-separator
  any:
  - id: upload-path
  - id: micro-behaviors/communications/http/post::url-encoded-content-type
  - id: micro-behaviors/communications/http/post::post
- id: upload-path
  desc: Posts data to /upload path
  crit: suspicious
  conf: 0.95
  attack: T1041
  for: [javascript]
  all:
  - id: upload-path-fragment
  - id: micro-behaviors/data/text/keywords/lexicon::http-verb-keyword
  near_bytes: 120
  unless:
  - id: express-multer-upload-route
- id: npm-postinstall-linux-config-exfil
  desc: Node payload exfiltrates Linux config files
  crit: hostile
  conf: 0.995
  attack: T1041
  mbc: E1041
  for: [javascript]
  all:
  - id: https-request-call
  - id: linux-config-file-set
  - id: urlencoded-msg-batch-exfil
  any:
  - id: node-readfile-utf8-callback
  - id: micro-behaviors/fs/file/read::read-node
  - id: metadata/file/text/metrics::javascript-small-file-5k
