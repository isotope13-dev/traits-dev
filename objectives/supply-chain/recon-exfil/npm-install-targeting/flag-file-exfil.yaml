defaults:
  platforms: [unix]
  for: [javascript]

traits:
  - id: container-flag-path
    desc: Targets container flag file
    crit: suspicious
    conf: 0.99
    attack: T1005
    if:
      type: text
      substr: /usr/src/app/flag

  - id: passwd-fallback-read
    desc: Reads /etc/passwd as fallback
    crit: suspicious
    conf: 0.96
    attack: T1005
    if:
      type: text
      regex: readFileSync\([^)]{0,80}/etc/passwd

  - id: req-write-data
    desc: Writes stolen data to HTTP body
    crit: suspicious
    conf: 0.95
    attack: T1041
    if:
      type: text
      substr: req.write(data)

  - id: req-write-postdata
    desc: Writes JSON payload to HTTP body
    crit: suspicious
    conf: 0.92
    attack: T1041
    if:
      type: text
      substr: req.write(postData)
    unless:
      - id: metadata/lang/scripted::dts-declaration-file

  - id: recursive-root-ctf-flag-grep
    desc: Greps root filesystem for CTF flag
    crit: suspicious
    conf: 0.98
    attack: T1005
    if:
      type: text
      regex: "grep\\s+-R\\s+[\"']RM\\{\\s*[\"']\\s+/"

  - id: command-output-result-object
    desc: Captures command output fields
    crit: notable
    conf: 0.88
    attack: T1041
    if:
      type: text
      regex: "stdout\\s*:\\s*stdout[\\s\\S]{0,120}stderr\\s*:\\s*stderr"

  - id: node-http-request-call
    desc: Uses Node http.request API
    crit: component
    conf: 0.95
    attack: T1071.001
    unless:
      - type: text
        substr: "require('supertest')"
      - type: text
        substr: 'createProxy(server?: http.Server)'
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - type: text
        substr: registry.yarnpkg.com
      - type: text
        substr: registry.npmjs.org
      - type: text
        substr: 'localhost'
    if:
      type: text
      substr: http.request(

  - id: external-ip-http-host
    desc: HTTP host field uses IPv4
    crit: suspicious
    conf: 0.95
    attack: T1071.001
    if:
      type: text
      regex: host['"]?\s*:\s*['"][0-9]{1,3}(\.[0-9]{1,3}){3}
      is: external_ip

  - id: uncommon-http-port-8009
    desc: HTTP exfil targets port 8009
    crit: suspicious
    conf: 0.94
    attack: T1571
    if:
      type: text
      regex: port['"]?\s*:\s*8009\b

  - id: plain-text-body-header
    desc: Sends text/plain body data
    crit: suspicious
    conf: 0.92
    attack: T1041
    if:
      type: text
      regex: Content-Type['"]\s*:\s*['"]text/plain
    unless:
      - type: text
        substr: "require('supertest')"
      - id: metadata/package/testing/harness::is-test
      - type: text
        regex: writeHead\([^)]{0,40}Content-Type['"]\s*:\s*['"]text/plain
      - type: text
        substr: X-Crowdin-Project

  - id: small-postinstall-sidecar
    desc: Tiny postinstall sidecar payload
    crit: notable
    conf: 0.88
    size_max: 2048
    if:
      type: basename
      exact: postinstall.js

composite_rules:
  - id: local-file-fallback-targeting
    desc: Targets flag file with passwd fallback
    crit: suspicious
    conf: 0.99
    attack: T1005
    all:
      - id: container-flag-path
      - id: passwd-fallback-read

  - id: raw-http-body-exfil
    desc: Raw Node HTTP body exfiltration
    crit: suspicious
    conf: 0.97
    attack: T1041
    all:
      - id: node-http-request-call
      - id: micro-behaviors/communications/http/post::post
      - id: req-write-data
    any:
      - id: plain-text-body-header
      - id: micro-behaviors/communications/http/request::req-write

  - id: direct-ip-http-post
    desc: Node POST exfil to direct IP
    crit: suspicious
    conf: 0.98
    attack: T1041
    all:
      - id: node-http-request-call
      - id: external-ip-http-host
      - id: req-write-data
    any:
      - id: uncommon-http-port-8009
      - id: plain-text-body-header

  - id: npm-flag-file-http-exfil
    desc: npm sidecar steals local file via HTTP
    crit: hostile
    conf: 0.995
    attack: T1041
    mbc: E1041
    all:
      - id: local-file-fallback-targeting
      - id: direct-ip-http-post
    any:
      - id: small-postinstall-sidecar
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::small-file-5k

  - id: npm-root-ctf-flag-webhook-exfil
    desc: npm package exfiltrates CTF flag search
    crit: hostile
    conf: 0.995
    attack: T1041
    mbc: E1041
    all:
      - id: recursive-root-ctf-flag-grep
      - id: command-output-result-object
      - id: req-write-postdata
      - id: objectives/exfiltration/oob::requestcatcher
    any:
      - id: micro-behaviors/process/create/shell/lang::child-process-destructure-require
      - id: metadata/import/builtin::require-child-process
      - id: micro-behaviors/process/create/shell/lang::child-process-require-call

  - id: npm-container-flag-exfil
    desc: npm postinstall exfiltrates container flag
    crit: hostile
    conf: 0.995
    attack: T1005
    mbc: E1041
    all:
      - id: container-flag-path
      - id: direct-ip-http-post
    any:
      - id: small-postinstall-sidecar
      - id: objectives/supply-chain/install-hook/scripts::postinstall-js-filename
