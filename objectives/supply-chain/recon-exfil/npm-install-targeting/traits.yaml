defaults:
  platforms: [unix, windows, macos]
  for: [javascript, package.json]

traits:
  - id: opt-dir-enum
    desc: Enumerates /opt directory
    crit: suspicious
    conf: 0.97
    attack: T1083
    if:
      type: text
      regex: "readdirSync\\(\\s*['\\\"]?/opt['\\\"]?\\s*\\)"
  - id: opt-root-explore-call
    desc: Starts recursive /opt traversal
    crit: suspicious
    conf: 0.98
    attack: T1083
    if:
      type: text
      substr: exploreDirectory('/opt');
  - id: async-readdir-filetypes
    desc: Async readdir with file types
    crit: suspicious
    conf: 0.95
    attack: T1083
    if:
      type: text
      substr: 'fs.readdir(dirPath, { withFileTypes: true })'
  - id: recursive-dirent-check
    desc: Checks directory entries recursively
    crit: suspicious
    conf: 0.93
    attack: T1083
    if:
      type: text
      substr: entry.isDirectory()
  - id: file-dirent-check
    desc: Checks regular file entries
    crit: suspicious
    conf: 0.93
    attack: T1083
    if:
      type: text
      substr: entry.isFile()
  - id: santa-list-file-read
    desc: Reads santa list file names
    crit: suspicious
    conf: 0.98
    attack: T1005
    if:
      type: text
      regex: "readFileSync\\(.{0,80}santas?[_-]list\\.txt"
  - id: santa-list-path
    desc: References /opt santa list path
    crit: suspicious
    conf: 0.98
    attack: T1005
    if:
      type: text
      regex: "/opt/santas?[_-]list\\.txt"
  - id: webhook-get-type-data
    desc: webhook GET with type/data
    crit: suspicious
    conf: 0.98
    attack: T1041
    if:
      type: text
      regex: "webhook\\.site/[0-9a-f-]{36}/\\?type=.{0,80}&data="
  - id: dockerfile-hunt-root
    desc: Finds Dockerfiles from root
    crit: suspicious
    conf: 0.98
    attack: T1083
    if:
      type: text
      exact: 'find / -name "Dockerfile" -type f 2>/dev/null | head -5'
  - id: dockerfile-workdir-parse
    desc: Parses Dockerfile WORKDIR
    crit: suspicious
    conf: 0.94
    attack: T1083
    unless:
      - type: text
        substr: "Dockerfile"
    if:
      type: text
      exact: WORKDIR
  - id: usr-src-app-target
    desc: Targets /usr/src/app
    crit: suspicious
    conf: 0.97
    attack: T1083
    if:
      type: text
      exact: /usr/src/app
  - id: target-dir-file-inventory
    desc: Lists target directory files
    crit: suspicious
    conf: 0.97
    attack: T1083
    if:
      type: text
      exact: 'find ${TARGET_DIR} -type f -exec ls -lh {} \; 2>/dev/null | head -20'
  - id: flag-file-hunt
    desc: Hunts *flag* files
    crit: suspicious
    conf: 0.98
    attack: T1005
    if:
      type: text
      regex: "\\*flag\\*\"\\s+-o\\s+-name\\s+\"\\*FLAG\\*"
  - id: filter-keyword-list
    desc: Filters filenames for list
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: list
  - id: filter-keyword-santa
    desc: Filters filenames for santa
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: santa
  - id: filter-keyword-flag
    desc: Filters filenames for flag
    crit: component
    conf: 0.96
    if:
      type: string_literal
      exact: flag
  - id: filter-keyword-markdown
    desc: Filters filenames for markdown
    crit: component
    conf: 0.91
    if:
      type: string_literal
      exact: .md
  - id: filter-keyword-html
    desc: Filters filenames for html
    crit: component
    conf: 0.91
    if:
      type: string_literal
      exact: .html
  - id: fileskipped-path-marker
    desc: Marks skipped file path
    crit: suspicious
    conf: 0.96
    attack: T1041
    if:
      type: string_literal
      exact: /FILESKIPPED
  - id: scanstarted-marker
    desc: Emits scanstarted callback
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: scanstarted
  - id: scanended-marker
    desc: Emits scanended callback
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: scanended
  - id: xmasrootme-path
    desc: Exfiltrates to xmasrootme path
    crit: suspicious
    conf: 0.99
    attack: T1041
    if:
      type: string_literal
      substr: /ping/xmasrootme-day3/
  - id: fullpath-base64-exfil
    desc: Exfiltrates path plus base64
    crit: suspicious
    conf: 0.99
    attack: T1041
    if:
      type: text
      substr: exfiltred(fullPath + "/" + base64Content);
  - id: callback-label-directory-error
    desc: directory error label
    crit: component
    conf: 0.9
    if:
      type: text
      exact: directory_error
  - id: callback-label-detailed-file-list
    desc: detailed file list label
    crit: component
    conf: 0.9
    if:
      type: text
      exact: detailed_file_list
  - id: callback-label-cwd
    desc: cwd callback label
    crit: component
    conf: 0.9
    if:
      type: text
      exact: current_working_directory
  - id: callback-label-dockerfile-info
    desc: Dockerfile info label
    crit: component
    conf: 0.9
    if:
      type: text
      exact: dockerfile_info
  - id: callback-label-flag-file
    desc: flag file label
    crit: component
    conf: 0.92
    if:
      type: text
      exact: flag_file_content

composite_rules:
  - id: opt-santa-file-targeting
    desc: Targets /opt Santa list files
    crit: suspicious
    conf: 0.985
    attack: T1005
    all:
      - id: opt-dir-enum
    any:
      - id: santa-list-file-read
      - id: santa-list-path
  - id: async-recursive-opt-enum
    desc: Recursively enumerates file tree
    crit: suspicious
    conf: 0.97
    attack: T1083
    all:
      - id: async-readdir-filetypes
      - id: recursive-dirent-check
      - id: file-dirent-check
  - id: challenge-file-keyword-targeting
    desc: Targets challenge file name patterns
    crit: suspicious
    conf: 0.985
    attack: T1005
    any:
      - id: filter-keyword-list
      - id: filter-keyword-santa
      - id: filter-keyword-flag
      - id: filter-keyword-markdown
      - id: filter-keyword-html
    needs: 4
  - id: scan-lifecycle-markers
    desc: Emits scan lifecycle callbacks
    crit: suspicious
    conf: 0.96
    attack: T1041
    all:
      - id: scanstarted-marker
      - id: scanended-marker
  - id: typed-recon-callback-labels
    desc: Typed recon callback labels
    crit: suspicious
    conf: 0.97
    needs: 3
    any:
      - id: callback-label-directory-error
      - id: callback-label-detailed-file-list
      - id: callback-label-cwd
      - id: callback-label-dockerfile-info
      - id: callback-label-flag-file
  - id: npm-install-container-recon-exfil
    desc: Install hook exfils container recon
    crit: hostile
    conf: 0.995
    attack: T1041
    mbc: E1041
    all:
      - id: objectives/supply-chain/install-hook/scripts::install-runs-node-local-script
      - id: objectives/exfiltration/oob::webhook-site
      - id: micro-behaviors/communications/http/request::https-get
      - id: webhook-get-type-data
      - id: usr-src-app-target
    any:
      - id: target-dir-file-inventory
      - id: dockerfile-hunt-root
      - id: typed-recon-callback-labels
    needs: 1
  - id: npm-install-dockerfile-profile
    desc: Install hook profiles Dockerfiles
    crit: suspicious
    conf: 0.98
    attack: T1083
    all:
      - id: objectives/supply-chain/install-hook/scripts::install-runs-node-local-script
      - id: dockerfile-hunt-root
    any:
      - id: dockerfile-workdir-parse
      - id: micro-behaviors/fs/file/read::read-node
      - id: typed-recon-callback-labels
  - id: js-container-recon-exfil
    desc: JS exfils container recon
    crit: hostile
    conf: 0.995
    attack: T1041
    mbc: E1041
    all:
      - id: objectives/exfiltration/oob::webhook-site
      - id: micro-behaviors/communications/http/request::https-get
      - id: dockerfile-hunt-root
      - id: typed-recon-callback-labels
    any:
      - id: usr-src-app-target
      - id: flag-file-hunt
      - id: micro-behaviors/fs/file/read::read-node
    needs: 1
  - id: npm-install-flag-harvest-exfil
    desc: Install hook exfils flag files
    crit: hostile
    conf: 0.995
    attack: T1005
    mbc: E1041
    all:
      - id: objectives/supply-chain/install-hook/scripts::install-runs-node-local-script
      - id: objectives/exfiltration/oob::webhook-site
      - id: flag-file-hunt
    any:
      - id: callback-label-flag-file
      - id: micro-behaviors/fs/file/read::read-node
      - id: webhook-get-type-data
    needs: 1
  - id: js-flag-harvest-exfil
    desc: JS exfils flag file data
    crit: hostile
    conf: 0.995
    attack: T1005
    mbc: E1041
    all:
      - id: objectives/exfiltration/oob::webhook-site
      - id: flag-file-hunt
      - id: callback-label-flag-file
    any:
      - id: micro-behaviors/fs/file/read::read-node
      - id: micro-behaviors/communications/http/request::https-get
      - id: typed-recon-callback-labels
    needs: 1
  - id: npm-install-opt-file-theft
    desc: Install hook steals /opt file data
    crit: hostile
    conf: 0.995
    attack: T1005
    mbc: E1041
    all:
      - id: objectives/supply-chain/install-hook/scripts::install-runs-node-local-script
      - id: opt-santa-file-targeting
      - id: objectives/exfiltration/oob::webhook-site
    any:
      - id: micro-behaviors/communications/http/request::https-request
      - id: micro-behaviors/communications/http/request::req-write
      - id: micro-behaviors/fs/file/read::read-node
    needs: 1
  - id: js-opt-file-theft-exfil
    desc: JS steals /opt file data
    crit: hostile
    conf: 0.99
    attack: T1005
    mbc: E1041
    all:
      - id: opt-santa-file-targeting
      - id: objectives/exfiltration/oob::webhook-site
    any:
      - id: micro-behaviors/communications/http/request::https-request
      - id: micro-behaviors/communications/http/request::req-write
      - id: micro-behaviors/fs/file/read::read-node
    needs: 1
  - id: js-opt-recursive-content-exfil
    desc: JS recursively exfiltrates /opt content
    crit: hostile
    conf: 0.995
    attack: T1005
    mbc: E1041
    all:
      - id: opt-root-explore-call
      - id: async-recursive-opt-enum
      - id: challenge-file-keyword-targeting
      - id: fullpath-base64-exfil
      - id: xmasrootme-path
    any:
      - id: micro-behaviors/communications/http/request::fetch-string
      - id: micro-behaviors/fs/file/read::read-text-utf8
      - id: micro-behaviors/data/encode/base64::tostring-base64
    needs: 2
  - id: js-opt-recursive-filemap-exfil
    desc: JS exfiltrates /opt file map
    crit: hostile
    conf: 0.992
    attack: T1041
    mbc: E1041
    all:
      - id: opt-root-explore-call
      - id: async-recursive-opt-enum
      - id: fileskipped-path-marker
      - id: xmasrootme-path
    any:
      - id: scan-lifecycle-markers
      - id: micro-behaviors/communications/http/request::fetch-string
      - id: challenge-file-keyword-targeting
    needs: 2
