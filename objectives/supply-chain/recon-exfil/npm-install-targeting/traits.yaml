defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]

traits:
- id: opt-dir-enum
  desc: Enumerates /opt directory
  crit: suspicious
  conf: 0.97
  attack: T1083
  if:
    type: text
    regex: "readdirSync\\(\\s*['\\\"]?/opt['\\\"]?\\s*\\)"
- id: opt-root-explore-call
  desc: Starts recursive /opt traversal
  crit: suspicious
  conf: 0.98
  attack: T1083
  if:
    type: text
    substr: exploreDirectory('/opt');
- id: async-readdir-filetypes
  desc: Async readdir with file types
  crit: suspicious
  conf: 0.95
  attack: T1083
  if:
    type: text
    substr: 'fs.readdir(dirPath, { withFileTypes: true })'
- id: santa-list-file-read
  desc: Reads santa list file names
  crit: suspicious
  conf: 0.98
  attack: T1005
  if:
    type: text
    regex: "readFileSync\\(.{0,80}santas?[_-]list\\.txt"
- id: santa-list-path
  desc: References /opt santa list path
  crit: suspicious
  conf: 0.98
  attack: T1005
  if:
    type: text
    regex: "/opt/santas?[_-]list\\.txt"
- id: webhook-get-type-data
  desc: webhook GET with type/data
  crit: suspicious
  conf: 0.98
  attack: T1041
  if:
    type: text
    regex: "webhook\\.site/[0-9a-f-]{36}/\\?type=.{0,80}&data="
- id: dockerfile-hunt-root
  desc: Finds Dockerfiles from root
  crit: suspicious
  conf: 0.98
  attack: T1083
  if:
    type: text
    regex: "find\\s+/\\s+-name\\s+[\"']Dockerfile[\"'].{0,50}-type\\s+f\\s+2>/dev/null\\s*\\|\\s*head"
- id: dockerfile-workdir-parse
  desc: Parses Dockerfile WORKDIR
  crit: component
  conf: 0.94
  attack: T1083
  unless:
  - type: text
    substr: "Dockerfile"
  if:
    type: text
    word: WORKDIR
- id: usr-src-app-target
  desc: Targets /usr/src/app
  crit: suspicious
  conf: 0.97
  attack: T1083
  if:
    type: text
    exact: /usr/src/app
- id: target-dir-file-inventory
  desc: Lists target directory files
  crit: suspicious
  conf: 0.97
  attack: T1083
  if:
    type: text
    exact: 'find ${TARGET_DIR} -type f -exec ls -lh {} \; 2>/dev/null | head -20'
- id: flag-file-hunt
  desc: Hunts *flag* files
  crit: suspicious
  conf: 0.98
  attack: T1005
  if:
    type: text
    regex: "\\*flag\\*\"\\s+-o\\s+-name\\s+\"\\*FLAG\\*"
- id: filter-keyword-list
  desc: Filters filenames for list
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: list
- id: filter-keyword-santa
  desc: Filters filenames for santa
  crit: component
  conf: 0.92
  if:
    type: string_literal
    exact: santa
- id: filter-keyword-flag
  desc: Filters filenames for flag
  crit: component
  conf: 0.96
  if:
    type: string_literal
    exact: flag
- id: filter-keyword-foggy
  desc: Filters filenames for foggy
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: foggy
- id: filter-keyword-markdown
  desc: Filters filenames for markdown
  crit: component
  conf: 0.91
  if:
    type: string_literal
    exact: .md
- id: filter-keyword-html
  desc: Filters filenames for html
  crit: component
  conf: 0.91
  if:
    type: string_literal
    exact: .html
- id: filter-keyword-text
  desc: Filters filenames for text
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: txt
- id: fileskipped-path-marker
  desc: Marks skipped file path
  crit: suspicious
  conf: 0.96
  attack: T1041
  if:
    type: string_literal
    exact: /FILESKIPPED
- id: scanstarted-marker
  desc: Emits scanstarted callback
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: scanstarted
- id: scanended-marker
  desc: Emits scanended callback
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: scanended
- id: xmasrootme-path
  desc: Exfiltrates to xmasrootme path
  crit: suspicious
  conf: 0.99
  attack: T1041
  if:
    type: string_literal
    substr: /ping/xmasrootme-day3/
- id: fullpath-base64-exfil
  desc: Exfiltrates path plus base64
  crit: suspicious
  conf: 0.99
  attack: T1041
  if:
    type: text
    substr: exfiltred(fullPath + "/" + base64Content);
- id: utf8-buffer-base64-encode
  desc: Converts utf8 file data to base64
  crit: suspicious
  conf: 0.97
  attack: T1027
  if:
    type: text
    substr: Buffer.from(data, 'utf8').toString('base64')
- id: fullpath-fileskipped-exfil
  desc: Exfiltrates skipped file path
  crit: suspicious
  conf: 0.97
  attack: T1041
  if:
    type: text
    substr: exfiltred(fullPath + "/FILESKIPPED");
- id: callback-label-directory-error
  desc: directory error label
  crit: component
  conf: 0.9
  if:
    type: text
    word: directory_error
- id: callback-label-detailed-file-list
  desc: detailed file list label
  crit: component
  conf: 0.9
  if:
    type: text
    word: detailed_file_list
- id: callback-label-cwd
  desc: cwd callback label
  crit: component
  conf: 0.9
  if:
    type: text
    word: current_working_directory
- id: callback-label-dockerfile-info
  desc: Dockerfile info label
  crit: component
  conf: 0.9
  if:
    type: text
    word: dockerfile_info
- id: callback-label-flag-file
  desc: flag file label
  crit: component
  conf: 0.92
  if:
    type: text
    word: flag_file_content
- id: ls-la-command-literal
  desc: Captures directory listing command
  crit: suspicious
  conf: 0.97
  attack: T1083
  for: [javascript]
  if:
    type: string_literal
    exact: ls -la
  downgrade:
    any:
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    - id: metadata/library/structure::js-large-module-bundle
- id: exec-cmd-timeout
  desc: Executes captured shell command
  crit: suspicious
  conf: 0.96
  attack: T1059.004
  for: [javascript]
  if:
    type: text
    regex: "\\bexec\\(cmd,\\s*\\{\\s*timeout:\\s*\\d+\\s*\\}"
- id: json-content-exfil-body
  desc: Serializes content field for exfil
  crit: suspicious
  conf: 0.97
  attack: T1041
  for: [javascript]
  if:
    type: text
    substr: "JSON.stringify({ content: data })"
- id: webhook-site-uuid-path
  desc: webhook.site UUID callback path
  crit: suspicious
  conf: 0.98
  attack: T1041
  for: [javascript]
  if:
    type: string_literal
    regex: "^/[0-9a-f]{8}-[0-9a-f-]{27}$"

composite_rules:
- id: opt-santa-file-targeting
  desc: Targets /opt Santa list files
  crit: suspicious
  conf: 0.985
  attack: T1005
  all:
  - id: opt-dir-enum
  any:
  - id: santa-list-file-read
  - id: santa-list-path
- id: async-recursive-opt-enum
  desc: Recursively enumerates file tree
  crit: suspicious
  conf: 0.97
  attack: T1083
  all:
  - id: async-readdir-filetypes
  - id: micro-behaviors/fs/directory/traverse::node-dirent-isdirectory
  - id: micro-behaviors/fs/directory/traverse::node-dirent-isfile
- id: challenge-file-keyword-targeting
  desc: Targets challenge file name patterns
  crit: suspicious
  conf: 0.985
  attack: T1005
  size_max: 1000000
  any:
  - id: filter-keyword-list
  - id: filter-keyword-santa
  - id: filter-keyword-flag
  - id: filter-keyword-foggy
  - id: filter-keyword-markdown
  - id: filter-keyword-html
  - id: filter-keyword-text
  needs: 4
- id: scan-lifecycle-markers
  desc: Emits scan lifecycle callbacks
  crit: suspicious
  conf: 0.96
  attack: T1041
  all:
  - id: scanstarted-marker
  - id: scanended-marker
- id: typed-recon-callback-labels
  desc: Typed recon callback labels
  crit: suspicious
  conf: 0.97
  needs: 3
  any:
  - id: callback-label-directory-error
  - id: callback-label-detailed-file-list
  - id: callback-label-cwd
  - id: callback-label-dockerfile-info
  - id: callback-label-flag-file
- id: npm-install-container-recon-exfil
  desc: Install hook exfils container recon
  crit: hostile
  conf: 0.995
  attack: T1041
  mbc: E1041
  for: [archives]
