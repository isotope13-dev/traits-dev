defaults:
  platforms: [unix]
  for: [javascript]

traits:
  - id: https-request-call
    desc: Calls https.request for exfil
    crit: suspicious
    conf: 0.95
    attack: T1071.001
    count_min: 2
    if:
      type: text
      substr: "https.request("
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
