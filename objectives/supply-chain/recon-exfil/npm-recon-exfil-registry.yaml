defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
traits:
  - id: registry-recon-user-host-cwd
    desc: Registry hook collects user host cwd
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    if:
      type: text
      regex: "whoami\\s*&&\\s*hostname\\s*&&\\s*pwd|hostname\\s*&&\\s*pwd\\s*&&\\s*whoami"
  - id: registry-http-get-query-exfil
    desc: Registry hook uses HTTP GET exfil
    crit: suspicious
    conf: 0.95
    attack: "T1041"
    if:
      type: text
      regex: "https?://[0-9]{1,3}(\\.[0-9]{1,3}){3}(:[0-9]{2,5})?/[^\"'\\s]{0,120}\\?data="
      is: external_ip
composite_rules:
  - id: install-hook-recon-exfil
    desc: Lifecycle hook fingerprints and exfiltrates host
    crit: hostile
    conf: 0.98
    attack: "T1041"
    mbc: "E1041"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-lifecycle-node-e
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-lifecycle-child-process-exec
      - id: registry-recon-user-host-cwd
    any:
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-uri-query-exfil
      - id: registry-http-get-query-exfil
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-lifecycle-wget-quiet
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-http-ip-url
  - id: repeated-install-hook-recon-exfil
    desc: Multiple lifecycle hooks repeat recon exfil
    crit: hostile
    conf: 0.98
    attack: "T1195.002"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::lifecycle-hook-registry-metadata
      - id: install-hook-recon-exfil
