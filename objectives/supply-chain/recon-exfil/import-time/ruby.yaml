defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1195.002

traits:
  - id: ruby-dependency-confusion-marker
    desc: Ruby dependency confusion marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)dependency[- ]confusion|depconf'

  - id: ruby-hostname-json-field
    desc: Ruby hostname JSON field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'hostname:\s*hostname'

  - id: ruby-username-json-field
    desc: Ruby username JSON field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'username:\s*username'

  - id: ruby-local-ip-json-field
    desc: Ruby local IP JSON field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'local_ip:\s*local_ip'

  - id: ruby-home-dir-json-field
    desc: Ruby home directory JSON field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'home_dir:\s*home'

  - id: ruby-oast-host-profile-url
    desc: Ruby OAST URL embeds host and user
    crit: component
    conf: 0.99
    attack: T1041
    if:
      type: literal
      kind: string
      regex: '(?i)oastify\.com/[^\s]{0,180}#\{safe_host\}/#\{safe_user\}'

  - id: ruby-oast-home-presence-url
    desc: Ruby OAST URL encodes HOME presence
    crit: component
    conf: 0.99
    attack: T1041
    if:
      type: literal
      kind: string
      substr: "ENV['HOME'] ? '?home=1' : ''"

composite_rules:
  - id: ruby-host-profile-json-fields
    desc: Ruby host profile JSON fields
    crit: suspicious
    conf: 0.92
    all:
      - id: ruby-hostname-json-field
      - id: ruby-username-json-field
      - id: ruby-local-ip-json-field
      - id: ruby-home-dir-json-field

  - id: ruby-host-profile-oob-callback
    desc: Ruby host profile OOB callback
    crit: hostile
    conf: 0.98
    mbc: E1041
    all:
      - id: ruby-host-profile-json-fields
      - id: micro-behaviors/communications/http/post::net-http-post
      - id: micro-behaviors/data/serialize/object::json-generate
      - id: objectives/exfiltration/oob/endpoint::oastify
    any:
      - id: micro-behaviors/os/sysinfo/hostname::gethostname
      - id: micro-behaviors/os/network/interface::socket-ip-address
      - id: micro-behaviors/os/sysinfo/platform/runtime::ruby-platform-const

  - id: ruby-depconf-host-profile-callback
    desc: Ruby dependency confusion host profile callback
    crit: hostile
    conf: 0.98
    mbc: E1041
    all:
      - id: ruby-dependency-confusion-marker
      - id: ruby-host-profile-oob-callback

  - id: ruby-import-time-oast-host-profile
    desc: Ruby import-time HTTP GET sends host identity to an OAST endpoint
    crit: hostile
    conf: 0.99
    mbc: E1041
    attack: "T1041,T1195.002"
    all:
      - id: ruby-oast-host-profile-url
      - id: micro-behaviors/communications/http/lib/netlib::net-http-get
      - id: micro-behaviors/os/env/vars/cicd::rb-socket-gethostname
