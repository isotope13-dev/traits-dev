defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1195.002

traits:
  - id: ruby-dependency-confusion-marker
    desc: Ruby dependency confusion marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)dependency[- ]confusion|depconf'

  - id: ruby-rescue-standard-error
    desc: Ruby StandardError rescue block
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'rescue\s+StandardError\b'

  - id: ruby-hostname-json-field
    desc: Ruby hostname JSON field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'hostname:\s*hostname'

  - id: ruby-username-json-field
    desc: Ruby username JSON field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'username:\s*username'

  - id: ruby-local-ip-json-field
    desc: Ruby local IP JSON field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'local_ip:\s*local_ip'

  - id: ruby-home-dir-json-field
    desc: Ruby home directory JSON field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'home_dir:\s*home'

  - id: ruby-net-http-json-post
    desc: Ruby Net::HTTP JSON POST
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Net::HTTP::Post\.new.{0,80}application/json'

composite_rules:
  - id: ruby-host-profile-json-fields
    desc: Ruby host profile JSON fields
    crit: suspicious
    conf: 0.92
    all:
      - id: ruby-hostname-json-field
      - id: ruby-username-json-field
      - id: ruby-local-ip-json-field
      - id: ruby-home-dir-json-field

  - id: ruby-json-net-http-post-body
    desc: Ruby JSON Net::HTTP POST body
    crit: suspicious
    conf: 0.9
    all:
      - id: ruby-net-http-json-post
      - id: micro-behaviors/data/serialize/object::json-generate
    unless:
      - id: well-known/lib/tina4ruby::tina4-module-declaration

  - id: ruby-import-silent-callback-wrapper
    desc: Ruby silent callback wrapper
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/command-and-control/infrastructure/domain/tld::ruby-net-http-start
      - id: ruby-rescue-standard-error
    unless:
      - id: well-known/lib/tina4ruby::tina4-module-declaration

  - id: ruby-import-host-profile-oob-callback
    desc: Ruby import-time host profile OOB callback
    crit: hostile
    conf: 0.98
    mbc: E1041
    all:
      - id: ruby-host-profile-json-fields
      - id: ruby-json-net-http-post-body
      - id: ruby-import-silent-callback-wrapper
      - id: objectives/exfiltration/oob/endpoint::oastify
    any:
      - id: micro-behaviors/os/sysinfo/hostname::gethostname
      - id: micro-behaviors/os/network/interface::socket-ip-address
      - id: micro-behaviors/os/sysinfo/platform/runtime::ruby-platform-const

  - id: ruby-depconf-host-profile-callback
    desc: Ruby dependency confusion host profile callback
    crit: hostile
    conf: 0.98
    mbc: E1041
    all:
      - id: ruby-dependency-confusion-marker
      - id: ruby-import-host-profile-oob-callback
