defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1195.002
traits:
  - id: compact-recon-host-field
    desc: Compact host field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["''](host|hostname)["'']\s*:'
  - id: compact-recon-env-field
    desc: Compact environment field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["''](env|ev)["'']\s*:'
  - id: compact-recon-passwd-field
    desc: Compact passwd field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["''](pwd|passwd)["'']\s*:'
  - id: compact-recon-path-field
    desc: Compact home path field
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '["''](home|home_directory|current_directory)["'']\s*:'
  - id: compact-recon-user-field
    desc: Compact user field
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '["''](user|username|whoami)["'']\s*:'
  - id: compact-recon-python-field
    desc: Compact Python runtime field
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '["''](py|python|python_version)["'']\s*:'
  - id: compact-recon-ip-field
    desc: Compact IP address field
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '["''](ip|addr|address)["'']\s*:'
  - id: compact-recon-platform-field
    desc: Compact platform field
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '["''](platform|os|os_info)["'']\s*:'
  - id: oob-research-canary-marker-confusion
    desc: Dependency confusion marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)dep(endency)?-?confusion'
  - id: oob-research-canary-marker-canary
    desc: Dependency canary marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)dep-canary'
  - id: oob-research-canary-marker-reward
    desc: Vulnerability reward marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)vulnerability reward'
  - id: oob-research-canary-marker-google
    desc: Google bughunters marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)bughunters\.google\.com'
  - id: import-time-env-command
    desc: Import-time env command collection
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'os\.(system|popen)\s*,\s*["'']env["'']|os\.(system|popen)\s*\(\s*["'']env["'']'
  - id: pypi-fastly-host-override
    desc: PyPI Fastly Host header override
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: psec.forward.io.global.prod.fastly.net
  - id: import-time-hello-beacon
    desc: Import-time HelloBeacon marker
    crit: notable
    conf: 0.94
    if:
      type: string_literal
      exact: HelloBeacon
  - id: import-time-requests-post-data
    desc: Import-time requests.post data payload
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'requests\.post\s*\([^\n]{0,220}\bdata\s*='
  - id: canarytokens-traffic-path
    desc: CanaryTokens traffic callback path
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'canarytokens\.com/tags/traffic/[A-Za-z0-9_-]{8,}'
composite_rules:
  - id: compact-recon-dict-fields
    desc: Compact host recon dictionary fields
    crit: component
    conf: 0.9
    needs: 3
    any:
      - id: compact-recon-host-field
      - id: compact-recon-env-field
      - id: compact-recon-passwd-field
      - id: compact-recon-path-field
      - id: compact-recon-user-field
      - id: compact-recon-python-field
      - id: compact-recon-ip-field
      - id: compact-recon-platform-field
  - id: oob-callback-endpoint
    desc: OOB callback endpoint
    crit: suspicious
    conf: 0.94
    any:
      - id: objectives/exfiltration/oob/endpoint
      - id: canarytokens-traffic-path
  - id: init-base64-http-profile-exfil
    desc: Import-time base64 host profile exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: compact-recon-dict-fields
      - id: micro-behaviors/data/encode/base64::base64-encoding
      - id: micro-behaviors/communications/http/request/client::request-python
  - id: init-env-file-http-exfil
    desc: Import-time env file HTTP exfiltration
    crit: hostile
    conf: 0.99
    mbc: E1041
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/communications/http/request/client::request-python
  - id: init-host-header-profile-exfil
    desc: Import-time host-header profile exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: compact-recon-dict-fields
      - id: micro-behaviors/communications/http/headers::host-header-override
      - id: micro-behaviors/communications/http/request/client::request-python
  - id: init-pypi-fastly-profile-exfil
    desc: Import-time PyPI Fastly exfiltration
    crit: hostile
    conf: 0.995
    mbc: E1041
    all:
      - id: init-host-header-profile-exfil
      - id: pypi-fastly-host-override
  - id: init-env-command-http-exfil
    desc: Import-time env command HTTP exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: import-time-env-command
      - id: micro-behaviors/communications/http/request/client::request-python
  - id: init-fastly-env-command-exfil
    desc: Import-time Fastly env command exfiltration
    crit: hostile
    conf: 0.99
    mbc: E1041
    all:
      - id: init-env-command-http-exfil
      - id: pypi-fastly-host-override
  - id: init-oob-callback
    desc: Import-time OOB callback
    crit: hostile
    conf: 0.97
    mbc: E1041
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: micro-behaviors/communications/http/request/client::request-python
    any:
      - id: objectives/exfiltration/oob/endpoint::canarytokens-com
      - id: canarytokens-traffic-path
  - id: init-canarytokens-traffic-callback
    desc: Import-time CanaryTokens traffic callback
    crit: hostile
    conf: 0.98
    mbc: E1041
    all:
      - id: init-oob-callback
      - id: canarytokens-traffic-path
  - id: init-canarytokens-http-callback
    desc: Import-time CanaryTokens HTTP callback
    crit: suspicious
    conf: 0.96
    mbc: E1041
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: objectives/exfiltration/oob/endpoint::canarytokens-com
  - id: init-oob-host-profile-callback
    desc: Import-time OOB host profile callback
    crit: suspicious
    conf: 0.96
    mbc: E1041
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: compact-recon-dict-fields
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: oob-callback-endpoint
  - id: init-subprocess-oob-profile-exfil
    desc: Import-time command output OOB exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    all:
      - id: init-oob-host-profile-callback
      - id: micro-behaviors/process/create/subprocess::getoutput-content
  - id: init-research-canary-profile-callback
    desc: Import-time dependency confusion canary callback
    crit: suspicious
    conf: 0.95
    mbc: E1041
    all:
      - id: init-oob-host-profile-callback
    any:
      - id: oob-research-canary-marker-confusion
      - id: oob-research-canary-marker-canary
      - id: oob-research-canary-marker-reward
      - id: oob-research-canary-marker-google
  - id: init-external-post-beacon
    desc: Import-time external POST beacon
    crit: suspicious
    conf: 0.94
    mbc: E1041
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: import-time-requests-post-data
      - id: micro-behaviors/communications/http/request/client::requests-post-url-literal
    any:
      - id: import-time-hello-beacon
      - id: micro-behaviors/communications/http/request/client::user-agent-header
  - id: init-literal-beacon-post
    desc: Import-time literal beacon POST
    crit: hostile
    conf: 0.96
    mbc: E1041
    all:
      - id: init-external-post-beacon
      - id: import-time-hello-beacon
  - id: init-hello-beacon-post
    desc: Import-time HelloBeacon POST
    crit: hostile
    conf: 0.97
    mbc: E1041
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: import-time-hello-beacon
      - id: import-time-requests-post-data

  - id: init-background-credential-archive-exfil
    desc: Import-time background credential archive exfiltration
    crit: hostile
    conf: 0.99
    mbc: E1041
    attack: T1195.002,T1005,T1041
    for: [python, archives]
    scope: archive
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: micro-behaviors/process/create/thread::python-daemon-thread
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: micro-behaviors/data/encode/base64::base64-encoding
    any:
      - id: objectives/credential-access/cloud/devops-bundle::developer-credential-sweep
      - id: objectives/credential-access/wallet/desktop::doteth-keystore
      - id: micro-behaviors/fs/path/sensitive/ssh::keys
      - id: micro-behaviors/fs/path/sensitive/credentials::container-credentials
