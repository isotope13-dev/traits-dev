defaults:
  platforms: [unix, windows]
  for: [package.json, javascript]
composite_rules:
- id: npm-victim-id-recon
  desc: NPM package collects victim identifiers
  crit: notable
  conf: 0.9
  all:
  - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
  - id: metadata/file/text/metrics::javascript-small-file-5k
  unless:
  - id: metadata/lang/compiler/systems::rust-binary
  - id: metadata/lang/compiler/systems::go-version-string
  - id: metadata/package/fields/repository::has-repository-evidence
  - id: objectives/supply-chain/recon-exfil/install-hook::parcel-cpu-count-worker
- id: npm-victim-id-exfil
  desc: NPM victim identifiers with exfiltration
  crit: suspicious
  conf: 0.98
  attack: T1020
  mbc: E1041
  all:
  - id: npm-victim-id-recon
  - id: objectives/exfiltration/
  unless:
  - id: metadata/package/fields/private::is-private
  - id: metadata/package/fields/name::official-pm2-package
  - id: metadata/library/structure::js-large-module-bundle
  - id: objectives/supply-chain/trojanized/app/context::large-minified-js-bundle
