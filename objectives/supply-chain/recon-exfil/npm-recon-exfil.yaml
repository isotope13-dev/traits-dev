defaults:
  platforms: [unix, windows]
# NPM Recon and Exfiltration Patterns
# High-confidence malicious patterns combining info gathering and exfil
traits:
  - id: js-hostname-pwd-whoami-chain
    desc: JS exec chain gathers hostname pwd whoami
    crit: suspicious
    conf: 0.97
    attack: T1082
    for: [javascript]
    if:
      type: text
      regex: 'hostname\s*;\s*pwd\s*;\s*whoami'

  - id: js-curl-ifconfig-me
    desc: JS exec queries ifconfig.me
    crit: suspicious
    conf: 0.95
    attack: T1016
    for: [javascript]
    if:
      type: text
      regex: 'curl\s+https://ifconfig\.me'

  - id: js-xxd-nslookup-loop
    desc: JS exec hex chunks into nslookup loop
    crit: suspicious
    conf: 0.98
    attack: T1048.003
    for: [javascript]
    if:
      type: text
      regex: 'xxd\s+-p.{0,40}\|\s*while\s+read\s+\w+;do\s+nslookup'

  - id: js-nslookup-oast-site
    desc: JS exec nslookup sends data to oast.site
    crit: suspicious
    conf: 0.97
    attack: T1048.003
    for: [javascript]
    if:
      type: text
      regex: 'nslookup\s+\$\w+\.[a-z0-9.-]+\.oast\.site'

  - id: npm-preinstall-nslookup
    desc: NPM preinstall invokes nslookup
    crit: suspicious
    conf: 0.94
    attack: T1048.003
    for: [package.json]
    if:
      type: kv
      path: scripts.preinstall
      regex: '\bnslookup\b'

  - id: npm-preinstall-hostname-base64
    desc: NPM preinstall base64 encodes hostname
    crit: suspicious
    conf: 0.97
    attack: T1082
    for: [package.json]
    if:
      type: kv
      path: scripts.preinstall
      regex: 'hostname\s*\|\s*base64'

  - id: npm-preinstall-collaborator-tempest
    desc: NPM preinstall uses Tempest Collaborator
    crit: suspicious
    conf: 0.98
    attack: T1048.003
    for: [package.json]
    if:
      type: kv
      path: scripts.preinstall
      regex: 'collaborator\.tempest\.net\.br\b'
  - id: parcel-cpu-count-worker
    desc: Parcel CPU count worker
    crit: baseline
    conf: 0.98
    for: [javascript]
    if:
      type: basename
      exact: cpuCount.js

composite_rules:
  - id: npm-exfil-method
    desc: NPM exfiltration network method markers
    crit: notable
    conf: 0.7
    any:
      - id: objectives/supply-chain/install-hook/scripts::script-curl
      - id: objectives/supply-chain/install-hook/scripts::script-wget
      - id: micro-behaviors/communications/http/post::post
  - id: npm-victim-id-recon
    desc: NPM package collects victim identifiers
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::small-file-5k
    unless:
      - id: metadata/lang/compiler/systems::rust-binary
      - id: metadata/lang/compiler/systems::go-version-string
      - id: objectives/supply-chain/metadata-anomaly/manifest::npm-has-repository
      - id: parcel-cpu-count-worker
  - id: npm-victim-stealer-hostile
    desc: Hostile NPM victim identifier stealer (Recon + Exfil)
    crit: hostile
    conf: 0.98
    attack: T1020
    mbc: E1041
    all:
      - id: npm-victim-id-recon
      - id: npm-exfil-method
    unless:
      - id: metadata/package/fields::is-private
  - id: npm-install-recon-dns-exfil-combo
    desc: NPM script sysinfo recon and DNS exfil (combo)
    crit: hostile
    conf: 0.95
    attack: T1048.003
    all:
      - id: micro-behaviors/process/user/query::hostname-pwd-whoami
      - id: objectives/exfiltration/side-channel/dns::dns-exfil-curl
  - id: npm-install-recon-dns-exfil-parts
    desc: NPM script sysinfo recon and DNS exfil (parts)
    crit: hostile
    conf: 0.95
    attack: T1048.003
    all:
      - id: micro-behaviors/process/user/query::whoami-cmd
      - id: micro-behaviors/data/text/keywords::pwd
      - id: micro-behaviors/os/sysinfo/hostname::hostname-cmd
      - id: objectives/exfiltration/side-channel/dns::dns-exfil-curl
  - id: npm-preinstall-sysinfo-dns-exfil
    desc: NPM preinstall hex-encodes sysinfo into DNS labels
    crit: hostile
    conf: 0.98
    attack: T1048.003
    all:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: metadata/package/fields::preinstall-hostname-whoami-pwd
      - id: metadata/package/fields::preinstall-hex-subdomain-exfil
  - id: npm-preinstall-path-segment-dns-exfil
    desc: NPM preinstall exfils path segments as DNS labels
    crit: hostile
    conf: 0.99
    attack: T1048.003
    all:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: metadata/package/fields::preinstall-looped-path-segment-dns-exfil
  - id: npm-oob-callback-recon
    desc: NPM package enumerates files and contacts OOB service
    crit: suspicious
    conf: 0.9
    attack: T1083
    mbc: E1041
    all:
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::small-file-5k
      - id: objectives/exfiltration/oob/
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
  - id: npm-oob-recon-exfil-hostile
    desc: NPM package exfils recon data to OOB callback service
    crit: hostile
    conf: 0.95
    attack: T1041
    mbc: E1041
    all:
      - id: npm-oob-callback-recon
      - id: objectives/supply-chain/impersonation::js-fetch-call-dup
  - id: npm-js-recon-dns-oast-exfil
    desc: Node exec recons host and exfils via OAST DNS
    crit: hostile
    conf: 0.995
    attack: T1048.003
    mbc: E1041
    all:
      - id: micro-behaviors/process/create/shell/lang::child-process-destructure-require
      - id: js-hostname-pwd-whoami-chain
      - id: js-curl-ifconfig-me
      - id: js-xxd-nslookup-loop
      - id: js-nslookup-oast-site
  - id: js-container-secret-oast-curl
    desc: Node curl exfils container secrets to OAST
    crit: suspicious
    conf: 0.97
    attack: T1041
    mbc: E1041
    for: [javascript]
    all:
      - id: micro-behaviors/process/create/shell/lang::child-process-destructure-require
      - id: objectives/exfiltration/http::curl-post-flag
      - id: objectives/exfiltration/oob::oastify
      - id: micro-behaviors/os/container/runtime::serviceaccount-files
    any:
      - id: micro-behaviors/os/container/runtime::docker-sock
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
  - id: npm-preinstall-container-secret-exfil
    desc: NPM preinstall exfils container secrets
    crit: hostile
    conf: 0.99
    attack: T1195.002
    mbc: E1041
    all:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: js-container-secret-oast-curl
  - id: npm-preinstall-dns-hostname-exfil
    desc: NPM preinstall exfils hostname via DNS
    crit: hostile
    conf: 0.995
    attack: T1048.003
    mbc: E1041
    all:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: npm-preinstall-nslookup
      - id: npm-preinstall-hostname-base64
      - id: npm-preinstall-collaborator-tempest
