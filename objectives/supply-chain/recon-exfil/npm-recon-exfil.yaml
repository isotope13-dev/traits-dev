defaults:
  platforms: [unix, windows]
# NPM Recon and Exfiltration Patterns
# High-confidence malicious patterns combining info gathering and exfil
composite_rules:
  - id: npm-exfil-method
    desc: Network tools used for exfiltration in NPM package
    crit: notable
    conf: 0.7
    any:
      - id: objectives/supply-chain/install-hook/scripts::script-curl
      - id: objectives/supply-chain/install-hook/scripts::script-wget
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/communications/http/post::axios-post-call
  - id: npm-victim-id-recon
    desc: NPM package collects victim identifiers
    crit: suspicious
    conf: 0.9
    size_max: 20000
    all:
      - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::small-file-5k
    any:
      - id: objectives/discovery/system/fingerprint/hardware::process-fingerprint-multi
      - id: objectives/discovery/system/fingerprint/hardware::node-cwd
      - id: objectives/discovery/system/fingerprint/hardware::node-comp
    unless:
      - id: metadata/lang/compiler/systems::rust-binary
      - id: metadata/lang/compiler/systems::go-version-string
      - id: objectives/supply-chain/install-hook/scripts::preinstall-js-filename
      - id: objectives/supply-chain/install-hook/scripts::postinstall-js-filename
      - id: objectives/supply-chain/trojanized/application/benign::benign-gemini-sandbox-context
    downgrade:
      any:
        - id: metadata/package::has-tests
  - id: npm-victim-stealer-hostile
    desc: Hostile NPM victim identifier stealer (Recon + Exfil)
    crit: hostile
    conf: 0.98
    attack: T1020
    mbc: E1041
    all:
      - id: npm-victim-id-recon
      - id: npm-exfil-method
  - id: npm-install-recon-dns-exfil-combo
    desc: NPM script sysinfo recon and DNS exfil (combo)
    crit: hostile
    conf: 0.95
    attack: T1048.003
    all:
      - id: micro-behaviors/process/user/query::hostname-pwd-whoami
      - id: objectives/exfiltration/side-channel/dns::dns-exfil-curl
  - id: npm-install-recon-dns-exfil-parts
    desc: NPM script sysinfo recon and DNS exfil (parts)
    crit: hostile
    conf: 0.95
    attack: T1048.003
    all:
      - id: micro-behaviors/process/user/query::whoami-cmd
      - id: micro-behaviors/data/text/keywords::pwd
      - id: micro-behaviors/os/sysinfo/hostname::hostname-cmd
      - id: objectives/exfiltration/side-channel/dns::dns-exfil-curl
  - id: npm-oob-callback-recon
    desc: NPM package enumerates files and contacts OOB service
    crit: suspicious
    conf: 0.9
    attack: T1083
    mbc: E1041
    all:
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::small-file-5k
      - id: objectives/exfiltration/oob/
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
  - id: npm-oob-recon-exfil-hostile
    desc: NPM package exfils recon data to OOB callback service
    crit: hostile
    conf: 0.95
    attack: T1041
    mbc: E1041
    all:
      - id: npm-oob-callback-recon
      - id: objectives/supply-chain/impersonation::js-fetch-call-dup
  - id: npm-dns-pingback-sidecar
    desc: Tiny npm sidecar issues tracked DNS pingback
    crit: suspicious
    conf: 0.94
    attack: T1048.003
    all:
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::small-file-5k
      - id: micro-behaviors/communications/dns/lookup::require-dns
      - id: micro-behaviors/communications/dns/lookup::dns-lookup-call
      - id: objectives/discovery/network/ip-tracker::mhzmhz-cloud-analytics
  - id: npm-import-dns-pingback
    desc: npm package import triggers tracked DNS pingback
    crit: suspicious
    conf: 0.95
    attack: T1048.003
    all:
      - id: npm-dns-pingback-sidecar
      - id: metadata/package/fields::pkg-main-field
      - id: metadata/package/fields::has-index-entry
  - id: npm-preinstall-dns-pingback
    desc: npm preinstall and import beacon via tracked DNS
    crit: hostile
    conf: 0.985
    attack: T1195.002
    mbc: E1041
    all:
      - id: npm-import-dns-pingback
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
