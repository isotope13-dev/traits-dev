defaults:
  for: [manifests, data]
  platforms: [unix, windows]
  attack: "T1195.002"

traits:
- id: versioned-install-node-exit0
  desc: Install hook runs node then exits cleanly
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: '"install"\s*:\s*"node\s+[A-Za-z0-9_./-]{1,80}\.js\s+\|\|\s+exit\s+0"'

- id: readme-beacon-url-env
  desc: Readme documents BEACON_URL exfil endpoint
  crit: suspicious
  conf: 0.95
  attack: "T1071.001"
  if:
    type: text
    substr: "BEACON_URL=https://"

- id: readme-collector-token-env
  desc: Readme documents collector token env var
  crit: suspicious
  conf: 0.94
  attack: "T1528"
  if:
    type: text
    substr: "CALLCENTER_COLLECTOR_TOKEN="

- id: readme-host-profile-fields
  desc: Readme lists host profiling fields
  crit: suspicious
  conf: 0.96
  attack: "T1082"
  if:
    type: text
    substr: "hostname, OS, cwd, Node version, timestamp"

- id: readme-install-and-require-beacon
  desc: Readme says telemetry runs on require too
  crit: suspicious
  conf: 0.97
  attack: "T1041"
  if:
    type: text
    substr: "on install and require"

- id: desc-security-canary-nonbreaking
  desc: "desc markets non-breaking security canary"
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: "Security canary.{0,80}non-breaking"
    case_insensitive: true

composite_rules:
- id: install-beacon-env-docs
  desc: Registry metadata documents install beacon endpoint and token
  crit: suspicious
  conf: 0.98
  all:
  - id: readme-beacon-url-env
  - id: readme-collector-token-env
  - id: readme-host-profile-fields

- id: dependency-confusion-install-canary
  desc: Dependency confusion canary with install-time telemetry
  crit: hostile
  conf: 0.995
  mbc: "E1041"
  all:
  - id: versioned-install-node-exit0
  - id: install-beacon-env-docs
  - id: readme-install-and-require-beacon
  any:
  - id: desc-security-canary-nonbreaking
  - id: objectives/supply-chain/metadata-anomaly/registry/untyped::readme-dep-confusion-self-id
  - id: objectives/supply-chain/metadata-anomaly/registry/untyped::desc-harmless-canary-claim
- id: tiny-public-install-probe
  desc: Tiny public package whose install hook acts as a probe
  crit: suspicious
  conf: 0.98
  all:
  - id: versioned-install-node-exit0
  - id: desc-security-canary-nonbreaking
  any:
  - id: objectives/supply-chain/recon-exfil/metadata::public-access-config
  - id: objectives/supply-chain/metadata-anomaly/registry/untyped::dist-filecount-1-to-4
  - id: objectives/supply-chain/metadata-anomaly/registry/untyped::dist-unpacked-under-4kb
  - id: objectives/supply-chain/metadata-anomaly/registry/untyped::inflated-version-90plus
  needs: 2
