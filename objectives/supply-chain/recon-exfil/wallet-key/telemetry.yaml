defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041

composite_rules:
  - id: wallet-key-material-fetch-exfil
    desc: Exfiltrates wallet key material through fetch in a request header
    crit: hostile
    conf: 0.995
    scope: file
    all:
      - id: micro-behaviors/crypto/library/blockchain/wallet::wallet-key-derivation-entrypoint
      - id: objectives/supply-chain/credential-theft/wallet::key-material-reporting-call
      - id: micro-behaviors/communications/http/post::fetch-post-call
      - id: micro-behaviors/communications/http/header/custom::x-request-id-header-map-entry
      - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode
    any:
      - id: micro-behaviors/data/encode/base64::tostring-base64
      - id: micro-behaviors/communications/http/header/content-type::grpc-web-protobuf-content-type

  - id: wallet-key-material-https-exfil
    desc: Exfiltrates wallet key material through an HTTPS POST fallback
    crit: hostile
    conf: 0.995
    scope: file
    all:
      - id: micro-behaviors/crypto/library/blockchain/wallet::wallet-key-derivation-entrypoint
      - id: objectives/supply-chain/credential-theft/wallet::key-material-reporting-call
      - id: micro-behaviors/communications/http/post::node-https-request-post
      - id: micro-behaviors/communications/http/header/custom::x-request-id-header-map-entry
      - id: micro-behaviors/communications/http/header/content-type::grpc-web-protobuf-content-type
      - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode

  - id: wallet-key-material-https-alias-exfil
    desc: Wallet key exfiltration via HTTPS alias
    crit: hostile
    conf: 0.995
    scope: file
    all:
      - id: micro-behaviors/crypto/library/blockchain/wallet::wallet-key-derivation-entrypoint
      - id: objectives/supply-chain/credential-theft/wallet::key-material-reporting-call
      - id: micro-behaviors/communications/http/request/client::node-https-alias-binding
      - id: micro-behaviors/communications/http/request/client::h-request-call
      - id: micro-behaviors/communications/http/post::request-options-post-method
      - id: micro-behaviors/communications/http/header/custom::x-request-id-header-map-entry
      - id: micro-behaviors/communications/http/header/content-type::grpc-web-protobuf-content-type
      - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode
