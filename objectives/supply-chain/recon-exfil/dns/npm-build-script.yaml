defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1048.003
  mbc: E1041
traits:
  - id: npm-build-hostname-ping
    desc: build script pings hostname subdomain
    crit: component
    conf: 0.99
    if:
      type: value
      path: scripts.build
      regex: \bping\s+\$\(hostname\)\.[A-Za-z0-9.-]+
composite_rules:
  - id: npm-build-hostname-dns-exfil
    desc: npm build script exfils hostname via DNS
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/supply-chain/recon-exfil/dns::npm-build-hostname-ping
      - id: metadata/package/fields/scripts::has-build-script-build
