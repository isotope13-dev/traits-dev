defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
  mbc: E1041
traits:
  - id: tines-apps-import
    desc: Tines apps package import
    crit: component
    conf: 0.9
    if:
      type: import
      exact: "@tines/apps"
  - id: invoke-endpoint-call
    desc: Automation endpoint invocation
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: invokeEndpoint
  - id: endpoint-result-callback-body
    desc: Endpoint result in callback body
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'JSON\.stringify\s*\(\s*\{[^}]{0,160}endpoint(Result|Error)'
  - id: top-level-exploit-call
    desc: Top-level exploit function call
    crit: component
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: exploit
composite_rules:
  - id: tines-package-endpoint-exploit
    desc: Package invokes Tines endpoint exploit
    crit: hostile
    conf: 0.965
    all:
      - id: tines-apps-import
      - id: invoke-endpoint-call
      - id: endpoint-result-callback-body
      - id: top-level-exploit-call

  - id: tines-endpoint-oob-callback
    desc: Tines endpoint result sent to OOB callback
    crit: hostile
    conf: 0.98
    all:
      - id: tines-apps-import
      - id: invoke-endpoint-call
      - id: endpoint-result-callback-body
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
      - id: micro-behaviors/communications/http/request/client::post-method-text
    any:
      - id: top-level-exploit-call
      - id: micro-behaviors/data/serialize/json::json-stringify-call
