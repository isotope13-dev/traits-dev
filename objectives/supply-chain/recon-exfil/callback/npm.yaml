defaults:
  platforms:
  - unix
  - windows
  for:
  - package.json
composite_rules:
- id: oob-endpoint-indicators
  desc: OOB exfiltration endpoint indicators
  crit: suspicious
  conf: 0.9
  size_max: 500000
  for:
  - javascript
  - typescript
  - package.json
  needs: 2
  any:
  - id: objectives/exfiltration/oob/endpoint::oob-domains
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-file-exfil
  - id: objectives/exfiltration/oob/interactsh/
  - id: objectives/exfiltration/oob/oast/
  - id: objectives/exfiltration/oob/system-profile/
  - id: objectives/exfiltration/oob/timing/
  - id: objectives/exfiltration/oob/tunnel/
  - id: objectives/discovery/network/ip-tracker/
  - id: objectives/exfiltration/messaging/webhook::discord-exfiltration
  unless:
  - id: metadata/package/testing/presence/harness/
  - id: metadata/package/testing/presence/harness/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/presence/scripted::dot-spec-filename
  - id: objectives/supply-chain/trojanized/app/package/
  - id: metadata/library/structure/
- id: depconf-beacon-package
  desc: Dependency confusion beacon with HTTPS callback
  crit: suspicious
  conf: 0.92
  attack: T1195.002
  for:
  - javascript
  all:
  - id: micro-behaviors/communications/http/request/client::https-get
  - id: metadata/file/metrics::javascript-small-file-5k
  any:
  - id: objectives/supply-chain/hidden-payload/trojan::empty-export
  - id: objectives/supply-chain/impersonation/package/manifest::npm-no-deps-at-all
  - id: objectives/supply-chain/impersonation/manifest/attack-label::dependency-confusion-claim
  needs: 2
- id: npm-interactsh-beacon
  desc: NPM package beaconing to interact.sh
  crit: hostile
  conf: 0.95
  attack: T1048
  mbc: B0030
  for:
  - javascript
  all:
  - id: objectives/exfiltration/oob/endpoint::interact-sh-me-fun
  - id: metadata/file/metrics::javascript-small-file-5k
- id: npm-oob-https-callback-sidecar
  desc: NPM package sidecar sends HTTPS callback to OOB endpoint
  crit: hostile
  conf: 0.96
  attack: T1048
  mbc: B0030
  for:
  - javascript
  all:
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  - id: micro-behaviors/communications/http/request/client::https-get
  - id: metadata/file/metrics::javascript-small-file-5k
  unless:
  - id: metadata/package/testing/harness/runtime/
- id: npm-preinstall-oob-host-profile
  desc: npm preinstall sidecar exfiltrates host profile to OOB endpoint
  crit: hostile
  conf: 0.99
  attack: "T1195.002, T1041, T1082"
  mbc: E1041
  for: [npm]
  scope: archive
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
  - id: npm-oob-https-callback-sidecar
  - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
  any:
  - id: micro-behaviors/communications/ip/address::ipify-org
  - id: micro-behaviors/communications/dns/lookup/resolver::node-dns-lookup
  - id: micro-behaviors/os/env/vars/cicd/
  needs: 1
- id: depconf-preinstall-oob-callback-package
  desc: Dependency confusion package preinstall phones home to OOB endpoint
  crit: hostile
  conf: 0.98
  attack: "T1195.002, T1048"
  mbc: E1041
  for:
  - npm
  - tgz
  all:
  - id: objectives/supply-chain/recon-exfil/registry/probe::dependency-confusion-description
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
  - id: npm-oob-https-callback-sidecar
