defaults:
  platforms: [windows, unix]
  for: [python, pkginfo, archives]
  attack: T1041
  mbc: E1041

traits:
  - id: python-cycle-callback-url-param
    desc: Python cycle callback URL parameter
    crit: component
    conf: 0.9
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: text
      regex: 'callback_url:\s*str\s*\|\s*None\s*=\s*None'

  - id: python-posts-cycle-data-callback
    desc: Python posts cycle data callback
    crit: component
    conf: 0.94
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: text
      substr: requests.post(callback_url, json=cycle_data

  - id: python-cycle-complete-callback-hook
    desc: Python cycle completion callback hook
    crit: component
    conf: 0.9
    for: [python]
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    if:
      type: text
      substr: sprint.on_cycle_complete = _cycle_callback

composite_rules:
  - id: python-ai-agent-cycle-callback-post
    desc: Python AI agent posts cycle callback
    crit: suspicious
    conf: 0.96
    scope: archive
    ref: sha256:cb80b116928df7b01cff82895a0df1ed6cad5e7898ed431bf9d4ddc4dbaf7cc0
    all:
      - id: objectives/supply-chain/trojanized/app/ai-agent-tools::pypi-autonomous-ai-deploy-tool
      - id: python-cycle-callback-url-param
      - id: python-cycle-complete-callback-hook
      - id: python-posts-cycle-data-callback
      - id: micro-behaviors/communications/http/lib/requests::requests-post
