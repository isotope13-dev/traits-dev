defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
  attack: "T1195.002"
traits:
  - id: unix-seconds-cache-buster
    desc: UNIX-seconds cache buster
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: Math\.floor\(Date\.now\(\)\s*/\s*1000\)
  - id: dns-ipv4-bias
    desc: DNS lookup prefers IPv4
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: family:\s*4|dns\.ADDRCONFIG\s*\|\s*dns\.V4MAPPED
  - id: got-here-dns-beacon
    desc: Install beacon gotHere label
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: lookup\('gotHere'\s*\+\s*[A-Za-z_][A-Za-z0-9_]*
  - id: exit-when-secret-missing
    desc: Exits cleanly when secret missing
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: if\s*\(![A-Za-z_][A-Za-z0-9_]*\)[\s\S]{0,120}process\.exit\(0\)
  - id: debug-postinstall-banner
    desc: POSTINSTALL debug log banner
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: "[POSTINSTALL DEBUG]"
composite_rules:
  - id: dns-install-beacon
    desc: Install-time DNS beacon behavior
    crit: suspicious
    conf: 0.95
    attack: "T1048.003"
    all:
      - id: metadata/import/builtin::require-dns
      - id: micro-behaviors/communications/dns/lookup::dns-lookup-call
    any:
      - id: got-here-dns-beacon
      - id: unix-seconds-cache-buster
      - id: dns-ipv4-bias
  - id: dns-secret-env-exfil
    desc: Secret env value exfiltrated via DNS
    crit: hostile
    conf: 0.995
    attack: "T1048.003"
    mbc: "E1041"
    size_max: 2048
    all:
      - id: metadata/import/builtin::require-dns
      - id: micro-behaviors/communications/dns/lookup::dns-lookup-call
      - id: objectives/exfiltration/oob::collab-digi-ninja
      - id: objectives/credential-access/env/secrets/custom::env-my-secret-api-key
    any:
      - id: got-here-dns-beacon
      - id: unix-seconds-cache-buster
      - id: exit-when-secret-missing
      - id: dns-ipv4-bias
    needs: 2
