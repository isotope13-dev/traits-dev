defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
composite_rules:
  - id: npm-install-analytics
    desc: Uses Google Analytics in npm install script
    crit: suspicious
    conf: 0.9
    attack: T1592
    mbc: B0045
    all:
      - id: micro-behaviors/fs/path/sensitive/browser::google-analytics-id
      - id: micro-behaviors/os/env/vars::npm-lifecycle
  - id: npm-install-git-check
    desc: Checks for .git during npm install script
    crit: suspicious
    conf: 0.8
    attack: T1497.001
    mbc: B0009
    all:
      - id: micro-behaviors/fs/path/check::check-git-dir
      - id: micro-behaviors/os/env/vars::npm-lifecycle
  - id: npm-package-telemetry
    desc: Collects npm package metadata for telemetry
    crit: suspicious
    conf: 0.7
    all:
      - id: micro-behaviors/os/env/vars::npm-package-info
      - id: micro-behaviors/communications/http/post/
  - id: repo-package-metadata-post
    desc: Collects git revision and local package metadata for HTTP POST
    crit: suspicious
    conf: 0.9
    attack: T1041
    size_max: 12000
    all:
      - id: micro-behaviors/revision-control/git/query::git-rev-parse-head
      - id: objectives/discovery/system/fingerprint/hardware::node-cwd
      - id: micro-behaviors/fs/file/read::require-cwd-package-json
      - id: micro-behaviors/communications/http/request::http-post-config
  - id: repo-package-metadata-post-alt-http
    desc: Reports local repo metadata to alternate HTTP service
    crit: suspicious
    conf: 0.92
    attack: T1041
    all:
      - id: repo-package-metadata-post
      - id: objectives/command-and-control/infrastructure/ip::port-8080
  - id: npm-publish-repo-metadata-telemetry
    desc: npm publish helper reports local repo and package metadata
    crit: suspicious
    conf: 0.93
    attack: T1195.002
    all:
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-publish-hooks
      - id: repo-package-metadata-post
    any:
      - id: objectives/command-and-control/infrastructure/ip::port-8080
      - id: metadata/import/builtin::require-child-process
  - id: npm-postpublish-git-tag-push
    desc: npm publish helper creates and pushes git tags
    crit: suspicious
    conf: 0.88
    attack: T1195.002
    all:
      - id: objectives/supply-chain/metadata-anomaly/dependency::npm-publish-hooks
      - id: micro-behaviors/revision-control/git/push::git-tag-and-push
