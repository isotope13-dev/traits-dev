defaults:
  platforms: [unix, windows]
  for: [jar]
  attack: "T1195.002"

traits:
  - id: processor-service-descriptor
    desc: Annotation processor service descriptor
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: META-INF/services/javax.annotation.processing.Processor

  - id: processor-implementation
    desc: Annotation processor implementation path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: tools/base/debug/model/annotation/DebugBuildConfigProcessor

  - id: annotation-processor-api
    desc: Java annotation processor API
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: javax/annotation/processing/AbstractProcessor
    unless:
      - id: well-known/app/ankidroid::package-member
      - type: text
        substr: com/ichi2/anki

  - id: annotation-processor-trigger
    desc: Annotation processor trigger label
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: annotation-processor

  - id: debug-model-class
    desc: Debug model class path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: tools/base/debug/model/DebugModel

  - id: callback-helper-class
    desc: Build callback helper class
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: tools/base/debug/model/BuildSystemCallback

  - id: callback-report-method
    desc: Callback report method marker
    crit: component
    conf: 0.92
    if:
      type: text
      exact: report

  - id: static-init-trigger
    desc: Static init trigger label
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: static-init

  - id: thread-class
    desc: Java thread class reference
    crit: component
    conf: 0.92
    if:
      type: text
      substr: java/lang/Thread

  - id: sleep-method
    desc: Sleep method reference
    crit: component
    conf: 0.92
    if:
      type: text
      exact: sleep

  - id: callback-reported-guard
    desc: Callback reported guard field
    crit: component
    conf: 0.95
    if:
      type: text
      exact: reported

  - id: callback-doreport-method
    desc: Callback doReport method
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: doReport

  - id: callback-endpoint-field
    desc: Callback diagnostics endpoint field
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: DIAGNOSTICS_ENDPOINT


  - id: callback-open-connection
    desc: URL openConnection method
    crit: component
    conf: 0.93
    if:
      type: text
      exact: openConnection

  - id: callback-connect-timeout
    desc: HTTP connect timeout setter
    crit: component
    conf: 0.93
    if:
      type: text
      exact: setConnectTimeout

  - id: callback-read-timeout
    desc: HTTP read timeout setter
    crit: component
    conf: 0.93
    if:
      type: text
      exact: setReadTimeout

  - id: callback-no-redirects
    desc: HTTP no redirects setter
    crit: component
    conf: 0.93
    if:
      type: text
      exact: setInstanceFollowRedirects

  - id: callback-response-code
    desc: HTTP response code getter
    crit: component
    conf: 0.93
    if:
      type: text
      exact: getResponseCode

  - id: callback-disconnect
    desc: HTTP disconnect method
    crit: component
    conf: 0.9
    if:
      type: text
      exact: disconnect

  - id: callback-package-id
    desc: Hardcoded callback package identifier
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: tools.base.build-system.debug:model

  - id: callback-query-status
    desc: Callback status query parameter
    crit: component
    conf: 0.95
    if:
      type: text
      substr: ?status=

  - id: callback-query-trigger
    desc: Callback trigger query parameter
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "&trigger="

  - id: callback-query-source
    desc: Callback source query parameter
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "&src="

  - id: callback-query-package
    desc: Callback package query parameter
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "&pkg="

  - id: callback-status-none
    desc: Callback none status fallback
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: ?status=none&trigger=

  - id: callback-encode-java
    desc: Java URL encoding API
    crit: component
    conf: 0.95
    if:
      type: text
      substr: java/net/URLEncoder

  - id: callback-google-uberproxy
    desc: Google-themed uberproxy probe URL
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: https://uberproxy.corp.google.com/procz

  - id: callback-google-pack
    desc: Google-themed pack probe URL
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: https://r2---sn-5goenes.c.pack.google.com/statusz

  - id: callback-google-sandbox
    desc: Google-themed sandbox probe URL
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: https://test-scone-pa-googleapis.sandbox.google.com

composite_rules:
  - id: auto-loaded-annotation-processor
    desc: Auto-loaded build annotation processor
    crit: suspicious
    conf: 0.995
    all:
      - id: processor-service-descriptor
      - id: processor-implementation
      - id: annotation-processor-api
      - id: annotation-processor-trigger

  - id: build-static-init-hook
    desc: Build library static initializer hook
    crit: suspicious
    conf: 0.99
    all:
      - id: debug-model-class
      - id: callback-helper-class
      - id: callback-report-method
      - id: static-init-trigger

  - id: build-classload-delay
    desc: Build callback delays after class load
    crit: suspicious
    conf: 0.985
    all:
      - id: debug-model-class
      - id: micro-behaviors/data/source/dynamic/reflect::java-class-forname-bytecode
      - id: thread-class
      - id: sleep-method

  - id: build-single-shot-report
    desc: Build callback reports only once
    crit: suspicious
    conf: 0.985
    all:
      - id: callback-helper-class
      - id: callback-reported-guard
      - id: callback-doreport-method
      - id: callback-endpoint-field
      - id: callback-status-none

  - id: build-http-probe
    desc: Build callback performs HTTP probes
    crit: notable
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/lib/urlconnection::java-url-class-bytecode
      - id: micro-behaviors/communications/http/lib/urlconnection::request-java-bytecode
      - id: callback-open-connection
      - id: callback-connect-timeout
      - id: callback-read-timeout
      - id: callback-no-redirects
      - id: callback-response-code
      - id: callback-disconnect

  - id: build-google-probe-masquerade
    desc: Build callback masquerades as Google
    crit: suspicious
    conf: 0.995
    all:
      - id: build-http-probe
      - id: callback-google-uberproxy
      - id: callback-google-pack
      - id: callback-google-sandbox

  - id: build-query-exfil-shape
    desc: Build callback assembles exfil query
    crit: suspicious
    conf: 0.99
    all:
      - id: callback-query-status
      - id: callback-query-trigger
      - id: callback-query-source
      - id: callback-query-package
      - id: callback-encode-java
      - id: callback-package-id

  - id: build-oob-pingback
    desc: Build-time OOB beacon callback
    crit: hostile
    conf: 0.998
    attack: T1041
    all:
      - id: auto-loaded-annotation-processor
      - id: build-static-init-hook
      - id: build-classload-delay
      - id: build-single-shot-report
      - id: build-google-probe-masquerade
      - id: build-query-exfil-shape
      - id: objectives/exfiltration/oob/endpoint::pipedream

  - id: java-build-recon-exfil
    desc: Java build processor recon exfiltration
    crit: hostile
    conf: 0.995
    attack: T1041
    all:
      - id: auto-loaded-annotation-processor
      - id: build-static-init-hook
      - id: build-google-probe-masquerade
      - id: build-query-exfil-shape
      - id: objectives/exfiltration/oob/endpoint::pipedream
