  - id: micro-behaviors/fs/proc/info/path::process-var-environ
  - id: objectives/credential-access/env/secrets/npm-registry::npmrc-access
  - id: objectives/credential-access/env/secrets/ctf::env-ctf-flag
  - id: objectives/credential-access/env/harvesting::grep-secrets-pattern
- id: npm-preinstall-dns-hostname-exfil
  desc: NPM preinstall exfils hostname via DNS
