defaults:
  platforms: [unix, windows]
# NPM Recon and Exfiltration Patterns
# High-confidence malicious patterns combining info gathering and exfil
traits:
- id: js-hostname-pwd-whoami-chain
  desc: JS exec chain gathers hostname pwd whoami
  crit: suspicious
  conf: 0.97
  attack: T1082
  for: [javascript]
  if:
    type: text
    regex: 'hostname\s*;\s*pwd\s*;\s*whoami'
- id: js-recon-json-template
  desc: JS exec gathers recon in JSON template
  crit: suspicious
  conf: 0.96
  attack: T1082
  for: [javascript]
  if:
    type: text
    regex: 'hostname.{0,80}pwd.{0,80}whoami'
- id: js-nslookup-exec
  desc: JS exec invokes nslookup for DNS exfil
  crit: suspicious
  conf: 0.95
  attack: T1048.003
  for: [javascript]
  if:
    type: text
    regex: 'nslookup\s+\$\{'

- id: js-curl-ifconfig-me
  desc: JS exec queries ifconfig.me
  crit: suspicious
  conf: 0.95
  attack: T1016
  for: [javascript]
  if:
    type: text
    regex: 'curl\s+https://ifconfig\.me'
- id: js-http-query-exfil
  desc: JS exec sends shell data in query
  crit: suspicious
  conf: 0.97
  attack: T1041
  for: [javascript]
  if:
    type: text
    regex: '(?i)\bcurl\b.{0,60}https?://[^\s"&]{1,80}\?\w{1,16}=[^"\s;&]{0,8}\$[A-Za-z_]\w*\b'

- id: js-xxd-nslookup-loop
  desc: JS exec hex chunks into nslookup loop
  crit: suspicious
  conf: 0.98
  attack: T1048.003
  for: [javascript]
  if:
    type: text
    regex: 'xxd\s+-p.{0,40}\|\s*while\s+read\s+\w+;do\s+nslookup'

- id: js-nslookup-oast-site
  desc: JS exec nslookup sends data to oast.site
  crit: suspicious
  conf: 0.97
  attack: T1048.003
  for: [javascript]
  if:
    type: text
    regex: 'nslookup\s+\$\w+\.[a-z0-9.-]+\.oast\.site'

- id: npm-preinstall-nslookup
  desc: NPM preinstall invokes nslookup
  crit: suspicious
  conf: 0.94
  attack: T1048.003
  for: [package.json]
  if:
    type: value
    path: scripts.preinstall
    regex: '\bnslookup\b'

- id: npm-preinstall-hostname-base64
  desc: NPM preinstall base64 encodes hostname
  crit: suspicious
  conf: 0.97
  attack: T1082
  for: [package.json]
  if:
    type: value
    path: scripts.preinstall
    regex: 'hostname\s*\|\s*base64'

- id: npm-preinstall-collaborator-tempest
  desc: NPM preinstall uses Tempest Collaborator
  crit: suspicious
  conf: 0.98
  attack: T1048.003
  for: [package.json]
  if:
    type: value
    path: scripts.preinstall
    regex: 'collaborator\.tempest\.net\.br\b'
- id: parcel-cpu-count-worker
  desc: Parcel CPU count worker
  crit: notable
  conf: 0.98
  for: [javascript]
  if:
    type: path
    basename: true
    exact: cpuCount.js

# === Cross-file composites (evaluated at tarball/package aggregate level) ===
# These combine signals from different files within the same package.

composite_rules:
- id: npm-preinstall-oob-beacon
  desc: npm preinstall hooks into OOB callback service
  crit: hostile
  conf: 0.97
  attack: T1195.002
  mbc: "E1041"
  for: [package.json, javascript]
  all:
  - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
  - id: objectives/exfiltration/oob/

- id: npm-install-recon-dns-exfil-combo
  desc: NPM script sysinfo recon and DNS exfil (combo)
  crit: hostile
  conf: 0.95
  attack: T1048.003
  near_lines: 80
  all:
  - id: micro-behaviors/process/user/query::hostname-pwd-whoami
  - id: objectives/exfiltration/side-channel/dns::dns-exfil-curl
- id: npm-install-recon-dns-exfil-parts
  desc: NPM script sysinfo recon and DNS exfil (parts)
  crit: hostile
  conf: 0.95
  attack: T1048.003
  near_lines: 80
  all:
  - id: micro-behaviors/process/user/query::whoami-cmd
  - id: micro-behaviors/process/user/query::pwd-command
  - id: micro-behaviors/os/sysinfo/hostname::hostname-cmd
  - id: objectives/exfiltration/side-channel/dns::dns-exfil-curl
- id: npm-preinstall-sysinfo-dns-exfil
  desc: NPM preinstall hex-encodes sysinfo into DNS labels
  crit: hostile
  conf: 0.98
  attack: T1048.003
  all:
  - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
  - id: metadata/package/scripts::preinstall-hostname-whoami-pwd
  - id: metadata/package/scripts::preinstall-hex-subdomain-exfil
- id: npm-preinstall-path-segment-dns-exfil
  desc: NPM preinstall exfils path segments as DNS labels
  crit: hostile
  conf: 0.99
  attack: T1048.003
  all:
  - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
  - id: metadata/package/scripts::preinstall-looped-path-segment-dns-exfil
- id: npm-oob-callback-recon
  desc: NPM package enumerates files and contacts OOB service
  crit: suspicious
  conf: 0.9
  attack: T1083
  mbc: E1041
  scope: leaf
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
  - id: metadata/file/metrics::javascript-small-file-5k
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  - id: micro-behaviors/fs/enumerate/directory::fs-readdir
  unless:
  - id: well-known/app/qwen-code::qwen-code-benign-bundle-context
  - id: well-known/app/qwen-code::qwen-code-bundle-text
  - id: well-known/app/qwen-code::qwen-code-cli-bundle-path
- id: npm-oob-recon-exfil-hostile
  desc: NPM package exfils recon data to OOB callback service
  crit: hostile
  conf: 0.95
  attack: T1041
  mbc: E1041
  all:
  - id: npm-oob-callback-recon
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  unless:
  - id: well-known/lib/benign-runtime-bundles/
  - id: well-known/app/qwen-code::qwen-code-benign-bundle-context
  - id: well-known/app/qwen-code::qwen-code-bundle-text
  - id: well-known/app/qwen-code::qwen-code-cli-bundle-path
- id: npm-js-recon-dns-oast-exfil
  desc: Node exec recons host and exfils via OAST DNS
  crit: hostile
  conf: 0.995
  attack: T1048.003
  mbc: E1041
  all:
  - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
  - id: js-hostname-pwd-whoami-chain
  - id: js-curl-ifconfig-me
  - id: js-xxd-nslookup-loop
  - id: js-nslookup-oast-site
- id: js-container-secret-oast-curl
  desc: Node curl exfils container secrets to OAST
  crit: suspicious
  conf: 0.97
  attack: T1041
  mbc: E1041
  for: [javascript]
  all:
  - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
  - id: micro-behaviors/communications/http/curl::curl-post-flag
  - id: objectives/exfiltration/oob/endpoint::oastify
  - id: micro-behaviors/os/container/runtime::serviceaccount-files
  any:
  - id: micro-behaviors/os/container/runtime::docker-sock
  - id: micro-behaviors/fs/path/config/accounts::etc-passwd
- id: npm-preinstall-container-secret-exfil
  desc: NPM preinstall exfils container secrets
  crit: hostile
  conf: 0.99
  attack: T1195.002
  mbc: E1041
  all:
