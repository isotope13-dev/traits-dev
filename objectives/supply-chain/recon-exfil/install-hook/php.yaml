# Composer install-hook host profiling and OOB exfiltration.
defaults:
  platforms: [unix, windows]
  for: [php, composer.json]
  attack: T1195.002
  mbc: E1041

composite_rules:
  - id: composer-hook-host-profile-oob-exfil
    desc: Composer hook exfiltrates a PHP host profile
    crit: hostile
    conf: 0.995
    attack: "T1195.002, T1041, T1082, T1033"
    for: [archives]
    scope: archive
    all:
      - id: metadata/package/scripts::composer-lifecycle-hook
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
      - id: micro-behaviors/communications/http/post::php-stream-context-http-post
      - id: micro-behaviors/data/serialize/object::json-encode
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::php-uname-call
      - id: micro-behaviors/fs/directory/cwd::php-getcwd
      - id: micro-behaviors/os/user/account::php-get-current-user
    needs: 2
    unless:
      - id: metadata/package/testing/harness/runtime/
