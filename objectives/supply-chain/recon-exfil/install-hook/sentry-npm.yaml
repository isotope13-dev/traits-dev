defaults:
  platforms: [unix, windows]
  attack: "T1195.002, T1041"
  mbc: "E1041"

traits:
- id: package-preinstall-sentry-verify-sidecar
  desc: package preinstall Sentry verifier sidecar
  crit: suspicious
  conf: 0.94
  for: [package.json]
  if:
    type: value
    path: "scripts.preinstall"
    regex: "node\\s+[A-Za-z0-9_./-]*verify[A-Za-z0-9_./-]*\\.js\\b"

- id: npm-archive-preinstall-sentry-verify-sidecar
  desc: npm archive preinstall Sentry verifier sidecar
  crit: suspicious
  conf: 0.94
  for: [npm]
  if:
    type: value
    path: "npm.scripts.preinstall"
    regex: "node\\s+[A-Za-z0-9_./-]*verify[A-Za-z0-9_./-]*\\.js\\b"

composite_rules:
- id: package-preinstall-sentry-verifier-beacon
  desc: preinstall runs Sentry verifier beacon
  crit: hostile
  conf: 0.98
  for: [package.json]
  all:
  - id: objectives/supply-chain/install-hook/package/manifest::preinstall-installs-sentry-node
  - id: package-preinstall-sentry-verify-sidecar

- id: npm-archive-preinstall-sentry-verifier-beacon
  desc: preinstall runs Sentry verifier beacon
  crit: hostile
  conf: 0.98
  for: [npm]
  all:
  - id: objectives/supply-chain/install-hook/package/manifest::npm-archive-preinstall-installs-sentry-node
  - id: objectives/supply-chain/install-hook/package/manifest::npm-archive-preinstall-runs-node-sidecar
  - id: npm-archive-preinstall-sentry-verify-sidecar
