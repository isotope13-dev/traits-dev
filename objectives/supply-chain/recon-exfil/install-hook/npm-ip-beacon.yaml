# JavaScript install-time public IP beacon.
# Pattern: a Node script performs public-IP discovery via a third-party
# lookup service, then POSTs the result to a hardcoded external IP. Used by
# droppers to register a victim with C2 the moment the package installs.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1041
composite_rules:
  - id: js-public-ip-beacon
    desc: Script discovers public IP and POSTs to hardcoded external endpoint
    crit: hostile
    conf: 0.96
    mbc: E1041
    all:
      - id: objectives/discovery/system/fingerprint/network::ipify-org
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
    unless:
      - id: metadata/package/testing/harness/runtime/
