defaults:
  platforms: [unix, windows]
  for: [javascript, package.json, shell]
  attack: T1195.002
  mbc: E1041

traits:
  - id: curl-cloud-metadata
    desc: curl queries cloud metadata service
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\bcurl\b.{0,80}latest/meta-data'
  - id: alibaba-metadata-url
    desc: Alibaba cloud metadata URL
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 100.100.100.200/latest/meta-data
  - id: aws-iam-metadata-url
    desc: AWS IAM metadata URL
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: 169.254.169.254/latest/meta-data/iam
  - id: tencent-metadata-host-url
    desc: Tencent cloud metadata hostname URL
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: metadata.tencentyun.com/latest/meta-data
  - id: tencent-metadata-ip-url
    desc: Tencent cloud metadata IP URL
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 169.254.0.23/latest/meta-data
  - id: oastify-metadata-path
    desc: OASTify metadata exfil path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: .oastify.com/metadata
  - id: oastify-data-path
    desc: OASTify data exfil path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: .oastify.com/data
  - id: curl-cat-temp-files-post
    desc: curl POSTs concatenated temp files
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '-d\s*"?\$\(cat\s+/tmp/[^)]{1,80}\)'
  - id: data-dir-listing-command-substitution
    desc: Shell substitution lists /data directory
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: $(ls -la /data/)

composite_rules:
  - id: cloud-metadata-url
    desc: Cloud provider metadata endpoint URL
    crit: suspicious
    conf: 0.97
    any:
      - id: alibaba-metadata-url
      - id: aws-iam-metadata-url
      - id: tencent-metadata-host-url
      - id: tencent-metadata-ip-url
      - id: objectives/discovery/cloud/metadata::aws-metadata-endpoint
  - id: curl-cloud-metadata-oast-exfil
    desc: curl exfils cloud metadata to OASTify
    crit: hostile
    conf: 0.995
    attack: T1041
    all:
      - id: curl-cloud-metadata
      - id: cloud-metadata-url
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: micro-behaviors/communications/http/curl::curl-post-flag
    any:
      - id: oastify-metadata-path
      - id: curl-cat-temp-files-post
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: curl-data-dir-oast-exfil
    desc: curl exfils /data directory listing to OASTify
    crit: hostile
    conf: 0.99
    attack: T1041
    all:
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: micro-behaviors/communications/http/curl::curl-post-flag
      - id: data-dir-listing-command-substitution
      - id: oastify-data-path
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: npm-postinstall-cloud-metadata-oast-exfil
    desc: npm postinstall exfils cloud metadata to OASTify
    crit: hostile
    conf: 0.995
    scope: archive
    for: [javascript, package.json, archives]
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: curl-cloud-metadata-oast-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: npm-postinstall-data-dir-oast-exfil
    desc: npm postinstall exfils /data directory listing to OASTify
    crit: hostile
    conf: 0.99
    scope: archive
    for: [javascript, package.json, archives]
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: curl-data-dir-oast-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
