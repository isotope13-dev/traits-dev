defaults:
  platforms: [unix, windows]
  for: [javascript, package.json, shell]
  attack: T1195.002
  mbc: E1041

traits:
  - id: curl-cloud-metadata
    desc: curl cloud metadata query
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '\bcurl\b.{0,80}latest/meta-data'
  - id: alibaba-metadata-url
    desc: Alibaba cloud metadata URL
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 100.100.100.200/latest/meta-data
  - id: aws-iam-metadata-url
    desc: AWS IAM instance-metadata endpoint reference
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: 169.254.169.254/latest/meta-data/iam
    unless:
      - id: well-known/tool/offensive/pentestkit::local-storage-panel
      - id: well-known/tool/detection/llm-scanner::mvar-security-context
  - id: tencent-metadata-host-url
    desc: Tencent cloud metadata hostname URL
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: metadata.tencentyun.com/latest/meta-data
  - id: tencent-metadata-ip-url
    desc: Tencent cloud metadata IP URL
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 169.254.0.23/latest/meta-data
  - id: oastify-metadata-path
    desc: OASTify metadata exfil path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: .oastify.com/metadata
  - id: oastify-data-path
    desc: OASTify data exfil path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: .oastify.com/data
  - id: curl-cat-temp-files-post
    desc: curl POSTs concatenated temp files
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '-d\s*"?\$\(cat\s+/tmp/[^)]{1,80}\)'
  - id: data-dir-listing-command-substitution
    desc: Shell substitution reads /data command output
    crit: suspicious
    conf: 0.97
    unless:
      - id: metadata/package/testing/presence/harness/
    if:
      type: text
      regex: '\$\((ls\s+-[A-Za-z0-9]*R?\s+/data/?|cat\s+/data/[^)]{1,120})\)'
  - id: root-file-search
    desc: Searches files from root
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'find\s+/\s+-type\s+f'
    unless:
    - id: well-known/app/aui-agent-builder/
    - id: well-known/app/stirling-pdf::source-tree
  - id: mysql-client-name
    desc: postinstall names mysql client
    crit: component
    conf: 0.92
    if:
      type: value
      path: scripts.postinstall
      substr: mysql
  - id: mongo-client-name
    desc: postinstall names mongo client
    crit: component
    conf: 0.92
    if:
      type: value
      path: scripts.postinstall
      regex: '\bmongosh?\b'
  - id: psql-client-name
    desc: postinstall names psql client
    crit: component
    conf: 0.92
    if:
      type: value
      path: scripts.postinstall
      substr: psql
  - id: redis-client-name
    desc: postinstall names redis client
    crit: component
    conf: 0.92
    if:
      type: value
      path: scripts.postinstall
      substr: redis-cli
  - id: sqlite-client-name
    desc: postinstall names sqlite client
    crit: component
    conf: 0.92
    if:
      type: value
      path: scripts.postinstall
      substr: sqlite3
  - id: elasticsearch-client-name
    desc: postinstall names elasticsearch
    crit: component
    conf: 0.92
    if:
      type: value
      path: scripts.postinstall
      substr: elasticsearch
  - id: js-shell-sysinfo-commands
    desc: Node shell host-profile discovery chain
    crit: suspicious
    conf: 0.94
    for: [javascript]
    if:
      # Documentation literals can contain example shell commands.  Restrict
      # this intent atom to an actual call expression so those examples do not
      # become a supply-chain finding.
      type: tree-sitter
      kind: call
      regex: 'hostname[\s\S]{0,320}(whoami|id)[\s\S]{0,700}ps\s+aux'
  - id: js-shell-curl-query-exfil
    desc: Silent curl sends variable query data
    crit: suspicious
    conf: 0.95
    for: [javascript]
    attack: T1041
    if:
      type: text
      regex: 'curl\s+-s[\s\S]{0,120}[?&][A-Za-z_][A-Za-z0-9_]*=\$[A-Za-z_][A-Za-z0-9_]*'
  - id: curl-post-temp-json
    desc: curl POSTs temporary JSON file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\bcurl\b.{0,120}-X\s+POST.{0,120}-d\s+@(/tmp|/var/tmp)/[^ \t\r\n;|]{1,80}\.json'
  - id: postinstall-aws-iam-metadata-script
    desc: postinstall queries AWS IAM metadata
    crit: suspicious
    conf: 0.97
    for: [package.json]
    if:
      type: value
      path: scripts.postinstall
      regex: "169\\.254\\.169\\.254[\\s\\S]{0,220}/latest/meta-data/iam/security-credentials/?"
  - id: postinstall-aws-imdsv2-token-script
    desc: postinstall requests AWS IMDSv2 token
    crit: suspicious
    conf: 0.97
    for: [package.json]
    if:
      type: value
      path: scripts.postinstall
      regex: "/latest/api/token[\\s\\S]{0,260}X-aws-ec2-metadata-token-ttl-seconds"
  - id: postinstall-npmrc-file-read
    desc: postinstall reads npmrc credentials
    crit: suspicious
    conf: 0.96
    for: [package.json]
    if:
      type: value
      path: scripts.postinstall
      regex: "readFileSync\\s*\\([\\s\\S]{0,180}\\.npmrc\\b"
  - id: postinstall-proc-init-environ-read
    desc: postinstall reads init environment
    crit: suspicious
    conf: 0.96
    for: [package.json]
    if:
      type: value
      path: scripts.postinstall
      substr: /proc/1/environ

composite_rules:
  - id: cloud-metadata-url
    desc: Cloud provider metadata endpoint reference
    crit: notable
    conf: 0.97
    any:
      - id: alibaba-metadata-url
      - id: aws-iam-metadata-url
      - id: tencent-metadata-host-url
      - id: tencent-metadata-ip-url
      - id: metadata/file/string/cloud::aws-metadata-endpoint
  - id: npm-hook-cloud-metadata-http-exfil
    desc: npm hook exfiltrates cloud metadata via HTTP
    crit: hostile
    conf: 0.98
    attack: "T1195.002, T1552.005, T1041"
    all:
      - id: objectives/supply-chain/install-hook/scripts/hook-file::hook-script-filename
      - id: curl-cloud-metadata
      - id: cloud-metadata-url
      - id: objectives/exfiltration/http/upload::node-collect-exfil
  - id: curl-cloud-metadata-oast-exfil
    desc: curl exfils cloud metadata to OASTify
    crit: hostile
    conf: 0.995
    attack: T1041
    all:
      - id: curl-cloud-metadata
      - id: cloud-metadata-url
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: micro-behaviors/communications/http/curl::curl-post-flag
    any:
      - id: oastify-metadata-path
      - id: curl-cat-temp-files-post
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: curl-cloud-metadata-oob-exfil
    desc: curl exfils cloud metadata to OOB
    crit: hostile
    conf: 0.99
    attack: T1041
    all:
      - id: curl-cloud-metadata
      - id: cloud-metadata-url
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
    any:
      - id: curl-post-temp-json
      - id: micro-behaviors/communications/http/curl::curl-post-flag
      - id: micro-behaviors/communications/http/curl::curl-post-custom-header
    unless:
      - id: well-known/tool/offensive/pentestkit/
      - id: metadata/package/testing/harness/runtime/
  - id: postinstall-system-profile-oob-exfil
    desc: postinstall exfils system profile to OOB
    crit: hostile
    conf: 0.98
    attack: T1041
    for: [javascript]
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-js-file
      - id: js-shell-sysinfo-commands
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
    any:
      - id: curl-post-temp-json
      - id: micro-behaviors/communications/http/curl::curl-post-custom-header
      - id: js-shell-curl-query-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: postinstall-cloud-metadata-oob-exfil
    desc: postinstall exfils cloud metadata to OOB
    crit: hostile
    conf: 0.99
    attack: T1041
    for: [javascript]
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-js-file
      - id: cloud-metadata-url
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
    any:
      - id: curl-post-temp-json
      - id: micro-behaviors/communications/http/curl::curl-post-custom-header
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: postinstall-aws-iam-metadata-oob-exfil
    desc: postinstall exfils AWS IAM metadata
    crit: hostile
    conf: 0.995
    attack: T1195.002,T1552.005,T1041
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
      - id: postinstall-aws-iam-metadata-script
      - id: micro-behaviors/communications/http/post::npm-script-node-http-post
      - id: objectives/exfiltration/oob/endpoint::pipedream-npm-script
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: postinstall-aws-imdsv2-oob-exfil
    desc: postinstall exfils AWS IMDSv2 credentials
    crit: hostile
    conf: 0.995
    attack: T1195.002,T1552.005,T1041
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
      - id: postinstall-aws-iam-metadata-script
      - id: postinstall-aws-imdsv2-token-script
      - id: micro-behaviors/communications/http/post::npm-script-node-http-post
      - id: objectives/exfiltration/oob/endpoint::pipedream-npm-script
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: postinstall-aws-imdsv2-ngrok-exfil
    desc: postinstall exfils AWS metadata via OOB
    crit: hostile
    conf: 0.995
    attack: T1195.002,T1552.005,T1041
    for: [package.json]
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
      - id: postinstall-aws-iam-metadata-script
      - id: postinstall-aws-imdsv2-token-script
      - id: micro-behaviors/communications/http/post::npm-script-node-http-post
      - id: objectives/exfiltration/oob/endpoint::ngrok-free
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: npm-aws-credential-oob-post
    desc: AWS metadata posted to OOB endpoint
    crit: hostile
    conf: 0.99
    attack: T1552.005,T1041
    for: [package.json]
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
      - id: postinstall-aws-iam-metadata-script
      - id: micro-behaviors/communications/http/post::npm-script-node-http-post
      - id: objectives/exfiltration/oob/endpoint::ngrok-free
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: postinstall-dev-secret-oob-exfil
    desc: postinstall exfils developer secrets
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1552.001,T1041
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
      - id: postinstall-npmrc-file-read
      - id: postinstall-proc-init-environ-read
      - id: micro-behaviors/communications/http/post::npm-script-node-http-post
      - id: objectives/exfiltration/oob/endpoint::pipedream-npm-script
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: curl-data-dir-oast-exfil
    desc: curl exfils /data command output to OASTify
    crit: hostile
    conf: 0.99
    attack: T1041
    all:
      - id: objectives/supply-chain/recon-exfil/oast/secret::oastify-url
      - id: objectives/supply-chain/install-hook/scripts/postinstall::curl-http-post
      - id: data-dir-listing-command-substitution
      - id: oastify-data-path
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: database-client-root-discovery
    desc: Root search for database clients
    crit: suspicious
    conf: 0.97
    all:
      - id: root-file-search
    any:
      - id: mysql-client-name
      - id: mongo-client-name
      - id: psql-client-name
      - id: redis-client-name
      - id: sqlite-client-name
      - id: elasticsearch-client-name
    needs: 3
  - id: database-query-output-to-data
    desc: Database query output to /data
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/fs/file/write/redirect::shell-output-redirect-to-data
    any:
      - id: mysql-client-name
      - id: mongo-client-name
      - id: psql-client-name
      - id: redis-client-name
      - id: sqlite-client-name
  - id: curl-database-recon-oast-exfil
    desc: curl exfils database reconnaissance output to OASTify
    crit: hostile
    conf: 0.99
    attack: T1041
    all:
      - id: objectives/supply-chain/recon-exfil/oast/secret::oastify-url
      - id: objectives/supply-chain/install-hook/scripts/postinstall::curl-http-post
      - id: oastify-data-path
    any:
      - id: database-client-root-discovery
      - id: database-query-output-to-data
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: npm-postinstall-cloud-metadata-oast-exfil
    desc: npm postinstall exfils cloud metadata to OASTify
    crit: hostile
    conf: 0.995
    scope: archive
    for: [javascript, package.json, archives]
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: curl-cloud-metadata-oast-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: npm-postinstall-cloud-metadata-oob-exfil
    desc: npm postinstall exfils cloud metadata to OOB
    crit: hostile
    conf: 0.99
    scope: archive
    for: [javascript, package.json, archives]
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: curl-cloud-metadata-oob-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: npm-postinstall-cloud-url-oob-exfil
    desc: npm postinstall reports cloud metadata to OOB
    crit: hostile
    conf: 0.99
    scope: archive
    for: [javascript, package.json, archives]
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: postinstall-cloud-metadata-oob-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: npm-postinstall-cloud-secret-file-stage
    desc: npm postinstall stages cloud and container secrets
    crit: hostile
    conf: 0.995
    attack: T1552.005
    scope: archive
    for: [javascript, package.json, archives]
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: objectives/credential-access/cloud/token/files::aws-imds-access
      - id: micro-behaviors/os/container/runtime::serviceaccount-files
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/os/env/access::javascript
      - id: micro-behaviors/fs/path/sensitive/credentials::container-credentials
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: npm-postinstall-data-dir-oast-exfil
    desc: npm postinstall exfils /data directory listing to OASTify
    crit: hostile
    conf: 0.99
    scope: archive
    for: [javascript, package.json, archives]
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: curl-data-dir-oast-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: npm-postinstall-database-recon-oast-exfil
    desc: npm postinstall exfils database reconnaissance to OASTify
    crit: hostile
    conf: 0.99
    scope: archive
    for: [javascript, package.json, archives]
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: curl-database-recon-oast-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
