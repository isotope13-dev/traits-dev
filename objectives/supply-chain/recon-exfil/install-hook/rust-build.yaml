defaults:
  platforms: [unix, windows]

traits:
  - id: rust-build-host-user-path-recon
    desc: Rust build.rs gathers host user path
    crit: suspicious
    conf: 0.98
    attack: T1082
    for: [rust]
    if:
      type: text
      regex: 'Command::new\("hostname"\).{0,240}Command::new\("whoami"\).{0,240}current_dir'
  - id: rust-build-hostname-command
    desc: Rust build.rs runs hostname
    crit: component
    conf: 0.9
    attack: T1082
    for: [rust]
    if:
      type: text
      substr: 'Command::new("hostname")'
  - id: rust-build-whoami-command
    desc: Rust build.rs runs whoami
    crit: component
    conf: 0.9
    attack: T1082
    for: [rust]
    if:
      type: text
      substr: 'Command::new("whoami")'

  - id: rust-build-powershell-base64-utf8
    desc: Rust build.rs PowerShell UTF8 base64 encode
    crit: suspicious
    conf: 0.99
    attack: T1027
    for: [rust]
    if:
      type: text
      exact: "[Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes('{}'))"

  - id: rust-build-supabase-webhook-oob
    desc: Rust build.rs Supabase webhook OOB
    crit: suspicious
    conf: 0.99
    attack: T1041
    for: [rust]
    if:
      type: literal
      kind: string
      exact: "https://baoreqygjveumkkxydcd.supabase.co/functions/v1/Webhook_OOB"

  - id: rust-build-restmethod-useragent
    desc: Rust build.rs Invoke-RestMethod user-agent
    crit: suspicious
    conf: 0.97
    attack: T1041
    for: [rust]
    if:
      type: literal
      kind: string
      exact: "Invoke-RestMethod -Uri '{}' -Method Get -UserAgent '{}'"

  - id: rust-build-mystenlabs-audit-ua
    desc: Rust build.rs MystenLabs audit user-agent
    crit: suspicious
    conf: 0.98
    attack: T1036
    for: [rust]
    if:
      type: literal
      kind: string
      exact: "MystenLabs-Audit-Cut-{}"

  - id: rust-build-fake-security-warning
    desc: Rust build.rs fake security validation warning
    crit: suspicious
    conf: 0.99
    attack: T1036
    for: [rust]
    if:
      type: literal
      kind: string
      exact: "cargo:warning=MystenLabs Security Research: Validating Sui Execution Pipeline..."
  - id: rust-build-git-log-author-email
    desc: Rust build.rs collects git author email
    crit: component
    conf: 0.9
    attack: T1083
    for: [rust]
    if:
      type: text
      substr: '--pretty=format:{"commit":"%H","author":"%an","email":"%ae"'
  - id: rust-build-git-diff-head
    desc: Rust build.rs collects git patch diff
    crit: suspicious
    conf: 0.94
    attack: T1083
    for: [rust]
    if:
      type: text
      substr: '&["diff", "HEAD^", "HEAD"]'
  - id: rust-build-curl-post-body
    desc: Rust build.rs posts body with curl
    crit: component
    conf: 0.9
    attack: T1041
    for: [rust]
    if:
      type: text
      substr: '.arg("-d").arg(body)'
  - id: rust-build-sentry-envelope
    desc: Rust build.rs sends Sentry envelope
    crit: suspicious
    conf: 0.94
    attack: T1041
    for: [rust]
    if:
      type: text
      regex: 'ingest\.[a-z0-9.-]*sentry\.io/.{0,160}/envelope/'
  - id: rust-build-source-patch-payload
    desc: Rust build.rs embeds source patch payload
    crit: suspicious
    conf: 0.92
    attack: T1083
    for: [rust]
    if:
      type: text
      regex: '"patch"[\s\S]{0,160}patch\.replace'

composite_rules:
  - id: rust-build-host-user-command-recon
    desc: Rust build.rs gathers host user
    crit: suspicious
    conf: 0.96
    attack: T1082
    all:
      - id: objectives/supply-chain/install-hook/build/behavioral::rust-build-rs-file
      - id: rust-build-hostname-command
      - id: rust-build-whoami-command

  - id: rust-build-git-patch-curl-exfil
    desc: Rust build.rs exfils git patch via curl
    crit: hostile
    conf: 0.99
    attack: T1195.002
    mbc: E1041
    all:
      - id: objectives/supply-chain/install-hook/build/behavioral::rust-build-rs-file
      - id: rust-build-git-diff-head
      - id: rust-build-curl-post-body
    any:
      - id: rust-build-git-log-author-email
      - id: rust-build-source-patch-payload
      - id: rust-build-sentry-envelope

  - id: rust-build-sentry-source-patch-exfil
    desc: Rust build.rs exfils source patch to Sentry
    crit: hostile
    conf: 0.995
    attack: T1195.002
    mbc: E1041
    all:
      - id: rust-build-git-patch-curl-exfil
      - id: rust-build-sentry-envelope
      - id: rust-build-source-patch-payload

  - id: cargo-build-hook-git-patch-exfil
    desc: Cargo build hook exfils git patch
    crit: hostile
    conf: 0.99
    attack: T1195.002
    mbc: E1041
    for: [rust, archives]
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/build/behavioral::cargo-build-script-declared
      - id: rust-build-git-patch-curl-exfil

  - id: cargo-archive-build-rs-git-patch-exfil
    desc: Cargo archive build.rs exfils git patch
    crit: hostile
    conf: 0.99
    attack: T1195.002
    mbc: E1041
    for: [rust, archives]
    scope: archive
    all:
      - id: metadata/build/archive::archive-cargo-crate-build-script
      - id: rust-build-git-patch-curl-exfil
    unless:
      - id: objectives/supply-chain/install-hook/build/behavioral::cargo-build-script-declared

  - id: rust-build-supabase-recon-exfil
    desc: Rust build.rs recons host then exfils to Supabase
    crit: hostile
    conf: 0.995
    attack: T1195.002
    mbc: E1041
    all:
      - id: objectives/supply-chain/install-hook/build/behavioral::rust-build-rs-file
      - id: rust-build-supabase-webhook-oob
      - id: rust-build-mystenlabs-audit-ua
      - id: micro-behaviors/process/create/direct::rust-process-command
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword

  - id: rust-build-dual-channel-telemetry-exfil
    desc: Rust build.rs sends telemetry in URL and user-agent
    crit: hostile
    conf: 0.99
    attack: T1041
    mbc: E1041
    all:
      - id: objectives/supply-chain/install-hook/build/behavioral::rust-build-rs-file
      - id: rust-build-supabase-webhook-oob
      - id: rust-build-mystenlabs-audit-ua
      - id: rust-build-fake-security-warning
      - id: micro-behaviors/process/create/shell/lang::invoke-prefix
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword

  - id: cargo-build-hook-supabase-recon-exfil
    desc: Cargo build hook recons host and exfils telemetry
    crit: hostile
    conf: 0.995
    attack: T1195.002
    mbc: E1041
    for: [rust, archives]
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/build/behavioral::cargo-build-script-declared
      - id: rust-build-supabase-recon-exfil

  - id: cargo-archive-build-rs-supabase-recon-exfil
    desc: Cargo archive build.rs recons host and exfils telemetry
    crit: hostile
    conf: 0.995
    attack: T1195.002
    mbc: E1041
    for: [rust, archives]
    scope: archive
    all:
      - id: metadata/build/archive::archive-cargo-crate-build-script
      - id: rust-build-supabase-recon-exfil
    unless:
      - id: objectives/supply-chain/install-hook/build/behavioral::cargo-build-script-declared

  - id: cargo-build-hook-masked-telemetry-exfil
    desc: Cargo build hook masks telemetry as security validation
    crit: hostile
    conf: 0.99
    attack: T1195.002
    mbc: E1041
    for: [rust, archives]
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/build/behavioral::cargo-build-script-declared
      - id: rust-build-dual-channel-telemetry-exfil
      - id: rust-build-fake-security-warning

  - id: rust-build-telegram-recon-exfil
    desc: Rust build.rs exfils host profile to Telegram
    crit: hostile
    conf: 0.995
    attack: T1195.002
    mbc: E1041
    for: [rust]
    all:
      - id: objectives/supply-chain/install-hook/build/behavioral::rust-build-rs-file
      - id: rust-build-host-user-command-recon
      - id: micro-behaviors/communications/http/services/telegram::rust-telegram-bot-api-client
      - id: micro-behaviors/communications/http/download/curl::rust-curl-wget-command
    any:
      - id: micro-behaviors/communications/ip/address::ifconfig-me
      - id: objectives/supply-chain/install-hook/build/behavioral::rust-build-rs-command-output

  - id: cargo-archive-build-rs-telegram-recon-exfil
    desc: Cargo archive build.rs exfils host profile
    crit: hostile
    conf: 0.995
    attack: T1195.002
    mbc: E1041
    for: [rust, archives]
    scope: archive
    all:
      - id: metadata/build/archive::archive-cargo-crate-build-script
      - id: rust-build-telegram-recon-exfil
    unless:
      - id: objectives/supply-chain/install-hook/build/behavioral::cargo-build-script-declared

  - id: cargo-archive-build-rs-masked-telemetry-exfil
    desc: Cargo archive build.rs masks telemetry as security validation
    crit: hostile
    conf: 0.99
    attack: T1195.002
    mbc: E1041
    for: [rust, archives]
    scope: archive
    all:
      - id: metadata/build/archive::archive-cargo-crate-build-script
      - id: rust-build-dual-channel-telemetry-exfil
      - id: rust-build-fake-security-warning
    unless:
      - id: objectives/supply-chain/install-hook/build/behavioral::cargo-build-script-declared
