# NPM install-hook host profiling and exfiltration.
#
# This covers the install-time pattern of collecting several host, network,
# process, and CI identifiers and sending a serialized report over HTTPS.
# Individual OS and HTTP capabilities remain neutral traits; the supply-chain
# intent is inferred only by this archive-scoped composite.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1195.002,T1082,T1041"

traits:
  - id: js-network-interface-query
    desc: Queries Node network interfaces
    crit: notable
    conf: 0.97
    attack: T1082
    if:
      type: symbol
      kind: call
      exact: os.networkInterfaces

  - id: js-hostname-query
    desc: Queries host hostname
    crit: notable
    conf: 0.97
    attack: T1082
    if:
      type: symbol
      kind: call
      exact: os.hostname

  - id: js-architecture-query
    desc: Queries host architecture
    crit: notable
    conf: 0.97
    attack: T1082
    if:
      type: symbol
      kind: call
      exact: os.arch

  - id: js-ci-job-marker
    desc: References CI job identifier
    crit: notable
    conf: 0.94
    attack: T1082
    if:
      type: text
      word: CI_JOB_ID

  - id: js-github-run-marker
    desc: References GitHub run identifier
    crit: notable
    conf: 0.94
    attack: T1082
    if:
      type: text
      word: GITHUB_RUN_ID

  - id: js-ci-project-marker
    desc: References CI project identifier
    crit: notable
    conf: 0.94
    attack: T1082
    if:
      type: text
      word: CI_PROJECT_NAME

  - id: js-github-repository-marker
    desc: References GitHub repository identifier
    crit: notable
    conf: 0.94
    attack: T1082
    if:
      type: text
      word: GITHUB_REPOSITORY

  - id: js-serialized-http-post-body
    desc: Writes serialized HTTPS payload
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'https\.request[\s\S]{0,900}req\.write\s*\(\s*JSON\.stringify\s*\(\s*payload'

composite_rules:
  - id: js-install-host-profile
    desc: Collects host and CI profile fields
    crit: notable
    conf: 0.98
    attack: T1082
    near_bytes: 2400
    all:
      - id: js-network-interface-query
      - id: js-hostname-query
      - id: js-architecture-query
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-cwd-call
    any:
      - id: js-ci-job-marker
      - id: js-github-run-marker
      - id: js-ci-project-marker
      - id: js-github-repository-marker

  - id: npm-postinstall-host-profile-exfiltration
    desc: NPM postinstall exfiltrates host and CI profile
    crit: hostile
    conf: 0.99
    mbc: E1041
    for: [archives]
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: js-install-host-profile
      - id: js-serialized-http-post-body
      - id: micro-behaviors/communications/http/request/client::https-request
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: micro-behaviors/data/serialize/json::json-stringify-call
