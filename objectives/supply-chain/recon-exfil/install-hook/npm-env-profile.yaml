# NPM install-hook host profiling and exfiltration.
#
# This covers the install-time pattern of collecting several host, network,
# process, and CI identifiers and sending a serialized report over HTTPS.
# Individual OS and HTTP capabilities remain neutral traits; the supply-chain
# intent is inferred only by this archive-scoped composite.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1195.002,T1082,T1041"

# Neutral host-query capabilities (os.hostname / os.arch / os.networkInterfaces)
# are NOT defined here: a bare host query carries no supply-chain intent and
# fires on any runtime that reports its own machine identity. They live in their
# capability homes under micro-behaviors/os/, and the composite below references
# them cross-directory; the install-hook intent comes from the postinstall and
# serialized-POST legs, not from the queries themselves.
composite_rules:
  - id: js-install-host-profile
    desc: Collects host and CI profile fields
    crit: notable
    conf: 0.98
    attack: T1082
    near_bytes: 2400
    all:
      - id: micro-behaviors/os/network/interface::node-network-interfaces-call
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::os-arch-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-cwd-call
    any:
      - id: micro-behaviors/os/env/vars/cicd

  - id: npm-postinstall-host-profile-exfiltration
    desc: NPM postinstall exfiltrates host and CI profile
    crit: hostile
    conf: 0.99
    mbc: E1041
    for: [archives]
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: js-install-host-profile
      - id: micro-behaviors/data/serialize/json::json-stringify-payload-call
      - id: micro-behaviors/communications/http/request/client::https-request
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: micro-behaviors/data/serialize/json::json-stringify-call
