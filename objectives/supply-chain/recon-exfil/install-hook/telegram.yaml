defaults:
  platforms: [unix, windows]
  for: [npm]
  attack: "T1195.002,T1041,T1082"
  mbc: E1041

composite_rules:
  - id: npm-preinstall-telegram-host-profile-exfil
    desc: npm preinstall sends host profile to Telegram
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
      - id: objectives/exfiltration/messaging/telegram::telegram-system-profile-exfil
