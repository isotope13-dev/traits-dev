      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
  - id: pypi-install-obfuscated-host-profile-exfil
    desc: PyPI install hook exfils host profile via decoded URL
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/build/pip::root-setup-py
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: objectives/discovery/system/fingerprint/hardware::python-mac-discovery
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: b64-http-url-decode
    any:
      - id: urlencode-recon-params
      - id: objectives/exfiltration/oob/endpoint::oob-domains
      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
