defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  attack: T1195.002
traits:
  - id: print-installed-string
    desc: Prints "installed" confirmation
    crit: component
    conf: 0.85
    size_max: 50000
    if:
      type: text
      regex: \bprint\s*\(\s*["'][^"']{0,50}\binstalled\b[^"']{0,20}["']\s*\)
    unless:
      - type: text
        substr: not installed
      - type: text
        substr: is installed
      - type: text
        substr: pip install
      - type: text
        substr: "Package may be partially installed"
  - id: placeholder-ellipsis
    desc: Placeholder ellipsis string literal
    crit: component
    conf: 0.4
    size_max: 2000
    if:
      type: string_literal
      regex: ^\.{2,}$
  - id: empty-file
    desc: Empty file (0 bytes)
    crit: component
    conf: 1.0
    size_max: 0
  - id: webhook-package-name
    desc: Package name contains webhook
    crit: component
    conf: 0.9
    if:
      type: string_literal
      exact: webhook
      case_insensitive: true
  - id: post-install-package-import
    desc: setup.py imports package after install
    crit: suspicious
    conf: 0.9
    for: [python, pkginfo]
    if:
      type: text
      regex: 'install\.run\s*\(\s*self\s*\)[\s\S]{0,800}\bimport\s+[A-Za-z_][A-Za-z0-9_]*\b'
  # A string literal beginning with "test " is ubiquitous in benign test code
  # (pytest fixtures like "test googlebot/2.0 test"), so it is meaningless on
  # its own. It is a building block for the `pypi-probe-package` composite
  # below (setup.py + HTTP request + probe string); keep it component so it
  # contributes there without surfacing standalone.
  - id: probe-print-test
    desc: Probe print with test prefix string
    crit: component
    conf: 0.75
    size_max: 10000
    if:
      type: string_literal
      regex: ^test\s
  - id: suspicious-php-endpoint
    desc: PHP endpoint URL with beacon parameters
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      substr: .php?live=
    unless: null
  - id: version-check-url
    desc: Suspicious version check URL
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: https?://[^/]{1,120}/[Vv]ersion\.php|https?://[^/]{1,120}/[Cc]heck\.php
  - id: install-scripts-class
    desc: install_scripts command subclass
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: class\s+\w+\(install_scripts\)
  - id: cmdclass-install-scripts
    desc: cmdclass install_scripts hook
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: >-
        ["']install_scripts["']\s*:\s*InstallScripts
  - id: hardcoded-dns-nameserver
    desc: Hardcoded Google DNS literal
    crit: component
    conf: 0.95
    if:
      type: text
      regex: >-
        ["']8\.8\.8\.8["']
    unless:
      - type: string_literal
        exact: --dns
  - id: ord-hex-join-encode
    desc: ord hex join encoder
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "join\\(hex\\(ord\\(x\\)\\)\\[2:\\]\\s+for\\s+x\\s+in"
  - id: pip3-console-script
    desc: pip3 console script entry
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: "pip3 ="
  - id: b64-http-url-decode
    desc: Base64 decodes HTTP URL prefix
    crit: component
    conf: 0.8
    if:
      type: text
      substr: aHR0cDov
  - id: urlencode-recon-field-names
    desc: Host profile field pair
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "hostname[\\s\\S]{0,400}username|username[\\s\\S]{0,400}hostname"
  - id: setup-py-bin-env-dump
    desc: setup.py dumps env via /bin/env
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: os.popen('/bin/env')
  - id: recon-env-field-names
    desc: Recon-style pwd/env/file field names
    crit: component
    conf: 0.96
    count_min: 2
    if:
      type: text
      regex: "[\"'](pwd|env|files2w)[\"']\\s*:"
  - id: setup-py-urlencode-fs-snapshot
    desc: URL-encodes repeated directory snapshots
    crit: suspicious
    conf: 0.97
    count_min: 3
    if:
      type: text
      regex: "[\"'](files2|files3|files4|files5)[\"']\\s*:"
  - id: traktrain-req-endpoint
    desc: Traktrain req.php beacon endpoint
    crit: suspicious
    conf: 0.99
    if:
      type: string_literal
      exact: http://pt.traktrain.com/req.php
composite_rules:
  - id: urlencode-recon-params
    desc: URL-encodes host user dir fields
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/build/pip::root-setup-py
      - id: urlencode-recon-field-names
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
    unless:
      - id: well-known/app/calvyn-code
  - id: empty-init-webhook-package
    desc: Empty __init__.py in webhook-focused package
    crit: suspicious
    conf: 0.9
    all:
      - id: empty-file
      - id: webhook-package-name
  - id: tiny-py-by-name
    desc: Tiny .py file (by extension)
    crit: notable
    conf: 0.8
    all:
      - id: metadata/file/extension/identity::py
      - id: empty-file
  - id: init-py-no-code
    desc: Empty __init__.py stub module
    crit: notable
    conf: 0.8
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: metadata/file/extension/identity::py
      - id: empty-file
  - id: empty-init-py
    desc: Empty __init__.py in published package
    crit: notable
    conf: 0.5
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: empty-file
  - id: decoy-init-py
    desc: Decoy __init__.py with install confirmation
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/file/profile/identity::init-py-file
      - id: metadata/file/profile/identity::tiny-python-file
      - id: print-installed-string
  - id: stub-placeholder-file
    desc: Stub Python file with placeholder content
    crit: notable
    conf: 0.85
    size_max: 200
    all:
      - id: metadata/file/profile/identity::tiny-python-file
      - id: placeholder-ellipsis
  - id: stub-squatter-module
    desc: Stub Python module with no imports
    crit: notable
    conf: 0.85
    size_max: 200
    all:
      - id: metadata/file/profile/identity::small-no-imports
      - id: micro-behaviors/data/control-flow/analysis::for-loop-content
  - id: fingerprint-payload-concat
    desc: Fingerprint data concatenation
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/data/string/concat::hash-delimited-string-concat
      - id: metadata/package/files/included::setup-py-basename
    any:
      - id: objectives/discovery/system/
    unless:
      - id: metadata/library/finance::dartlab-finance-context
  - id: install-scripts-exec-hook
    desc: install_scripts execution hook
    crit: suspicious
    conf: 0.94
    all:
      - id: install-scripts-class
      - id: cmdclass-install-scripts
  - id: pypi-pip3-entrypoint-hijack
    desc: PyPI pip3 entry point hijack
    crit: suspicious
    conf: 0.97
    all:
      - id: pip3-console-script
      - id: metadata/package/scripts::setup-entry-points-field
  - id: setup-py-domain-http-fallback
    desc: setup.py DNS plus HTTP fallback
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-lookup-capability
      - id: micro-behaviors/communications/http/request/client::request-python
  - id: setup-py-dns-exfiltration
    desc: setup.py performs DNS exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: objectives/exfiltration/dns/lookup::dns-exfiltration
  - id: username-hex-header-exfil
    desc: Username hex exfil over HTTP header
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/discovery/account/enum::whoami-via-rot13-subprocess
      - id: micro-behaviors/data/encode/hex::string-encode-hex
      - id: micro-behaviors/communications/http/headers::x-header-single-letter
      - id: micro-behaviors/communications/http/request/client::request-python
  - id: pypi-install-exfil
    desc: PyPI install-time system exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request/client::request-python
  - id: pypi-install-host-cwd-exfil
    desc: PyPI install host/cwd exfiltration
    crit: hostile
    conf: 0.96
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/lib/requests::requests-post
    any:
      - id: micro-behaviors/process/create/subprocess::check-call-content
      - id: objectives/anti-analysis/sandbox-detect/script::cwd-sandbox-keyword-check
  - id: pypi-atexit-exfil
    desc: PyPI atexit deferred system exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: micro-behaviors/process/exit/handler::atexit-register
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request/client::request-python
  - id: python-sysinfo-exfil
    desc: Python system info exfiltration
    crit: hostile
    conf: 0.92
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request/client::request-python
    near_bytes: 4096
    unless:
      - id: metadata/build/pip/
  - id: python-envvar-exfil
    desc: Python environment variable exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request/client::request-python
    unless:
      - id: metadata/build/pip/
  - id: pypi-vid-exfil
    desc: PyPI VID exfiltration pattern
    crit: suspicious
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/communications/http/request/params::vid-param
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request/client::request-python
  - id: pypi-oob-user-exfil
    desc: PyPI OOB callback exfiltrating user info
    crit: hostile
    conf: 0.95
    mbc: E1041
    all:
      - id: objectives/exfiltration/oob/endpoint::oob-domains
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: objectives/discovery/account/enum::username-env
  - id: pypi-install-import-webhook-exfil
    desc: PyPI install hook imports webhook payload
    crit: hostile
    conf: 0.98
    mbc: E1041
    scope: archive
    for: [python, pkginfo, archives]
    all:
      - id: post-install-package-import
      - id: metadata/build/package::setuptools-run-override
      - id: objectives/exfiltration/oob/endpoint::webhook-site
      - id: micro-behaviors/communications/http/request/client::requests-post-json-payload
  - id: pypi-install-import-host-profile-exfil
    desc: PyPI install hook imports host profile exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    scope: archive
    for: [python, pkginfo, archives]
    all:
      - id: post-install-package-import
      - id: metadata/build/package::setuptools-run-override
      - id: objectives/exfiltration/oob/system-profile::python-webhook-host-profile-post
  - id: pypi-install-beacon
    desc: PyPI install-time system beacon
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/build/pip::root-setup-py
      - id: suspicious-php-endpoint
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: objectives/supply-chain/install-hook/dropper/setup-hook::windows-computername-env
  - id: pypi-install-dns-oob-exfil
    desc: PyPI install hook DNS OOB exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/build/pip::root-setup-py
      - id: install-scripts-class
      - id: hardcoded-dns-nameserver
      - id: objectives/exfiltration/oob/endpoint::burpcollaborator
      - id: metadata/file/string/domain::long-alphanumeric-third-level-label
    any:
      - id: ord-hex-join-encode
      - id: pypi-pip3-entrypoint-hijack
      - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
  - id: pypi-probe-package
    desc: PyPI typosquat probe package
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: probe-print-test
  - id: pypi-install-username-exfil
    desc: PyPI install-time username exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: metadata/build/package::setup-cmdclass-install
      - id: objectives/discovery/account/enum::whoami-via-rot13-subprocess
      - id: micro-behaviors/data/encode/hex::string-encode-hex
      - id: setup-py-domain-http-fallback
    any:
      - id: objectives/exfiltration/dns/prep::subdomain-data-encoding
      - id: username-hex-header-exfil
  - id: pypi-install-obfuscated-network-exfil
    desc: Obfuscated PyPI install-time network exfiltration
    crit: hostile
    conf: 0.97
    mbc: E1041
    attack: T1020
    all:
      - id: pypi-install-username-exfil
      - id: micro-behaviors/data/encode/rot13::python-rot13-decoder
    any:
      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
      - id: micro-behaviors/data/control-flow/error-handling::silent-socket-error-pass
  - id: pypi-sdist-fallback-stager
    desc: PyPI package relies on sdist fallback
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/impersonation/registry/wheel-sdist::tiny-wheel-with-sdist-sidecar
      - id: metadata/build/package::setup-cmdclass-install
  - id: python-envvar-urlencode-exfil
    desc: Python environment variable urlencoded exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
      - id: micro-behaviors/communications/http/request/client::request-python
  - id: pypi-env-fs-snapshot-exfil
    desc: PyPI setup exfiltrates env and directory snapshots
    crit: hostile
    conf: 0.99
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: setup-py-bin-env-dump
      - id: recon-env-field-names
      - id: setup-py-urlencode-fs-snapshot
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-data
  - id: pypi-system-env-exfil
    desc: PyPI install-time system and environment exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
      - id: micro-behaviors/communications/http/request/client::request-python
    any:
      - id: micro-behaviors/os/privilege/check::os-getuid-admin
      - id: micro-behaviors/os/privilege/check::ctypes-is-admin
      - id: objectives/discovery/system/fingerprint/network::geo-lookup-service
  - id: pypi-traktrain-env-fs-exfil
    desc: PyPI setup exfiltrates env and file listings to Traktrain
    crit: hostile
    conf: 0.995
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: setup-py-bin-env-dump
      - id: recon-env-field-names
      - id: setup-py-urlencode-fs-snapshot
      - id: traktrain-req-endpoint
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-data
  - id: python-obfuscated-urlencode-recon-exfil
    desc: Obfuscated Python system recon exfiltration
    crit: hostile
    conf: 0.97
    mbc: E1041
    attack: T1020
    all:
      - id: metadata/build/pip::root-setup-py
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: objectives/discovery/system/fingerprint/hardware::python-mac-discovery
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: b64-http-url-decode
