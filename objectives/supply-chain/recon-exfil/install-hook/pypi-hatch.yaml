defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1195.002

traits:
  - id: hatch-build-hook-interface
    desc: Hatch build hook interface
    crit: notable
    conf: 0.9
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    if:
      type: import
      exact: BuildHookInterface

  - id: hatch-build-hook-initialize
    desc: Hatch build hook initialize method
    crit: suspicious
    conf: 0.93
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    if:
      type: text
      regex: 'class\s+\w+\s*\(\s*BuildHookInterface\s*\)\s*:[\s\S]{0,420}def\s+initialize\s*\('

composite_rules:
  - id: hatch-build-hook-host-profile-post
    desc: Hatch build hook posts host profile
    crit: hostile
    conf: 0.99
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    all:
      - id: hatch-build-hook-interface
      - id: hatch-build-hook-initialize
      - id: objectives/exfiltration/stealer/host-profile/http::python-device-profile-checkin-post
    any:
      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
      - id: objectives/command-and-control/beacon/network/periodic::python-api-checkin-path
    needs: 1
