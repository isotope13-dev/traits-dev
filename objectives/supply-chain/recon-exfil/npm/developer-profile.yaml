defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1552.001,T1082,T1041"
traits:
- id: console-output-silenced--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: console
- id: console-output-silenced--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: debug
- id: console-output-silenced--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: error
- id: console-output-silenced--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: info
- id: console-output-silenced--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: warn
- id: developer-email-source-harvest--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(GIT_AUTHOR_EMAIL|GIT_COMMITTER_EMAIL)[\s\S]{0,900}(\.gitconfig|\.npmrc|package\.json)'
- id: developer-email-source-harvest--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(npm_config_email)[\s\S]{0,900}(\.gitconfig|\.npmrc|package\.json)'
- id: cicd-runtime-fingerprint--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: GITHUB_REPOSITORY
- id: cicd-runtime-fingerprint--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: process.execPath
- id: cicd-runtime-fingerprint--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: process.version
- id: cicd-runtime-fingerprint--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: GITHUB_ACTIONS
- id: cicd-runtime-fingerprint--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: process.argv
- id: cicd-runtime-fingerprint--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: JENKINS_URL
- id: cicd-runtime-fingerprint--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: os.hostname
- id: cicd-runtime-fingerprint--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: GITLAB_CI
- id: npm-profile-json-post--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: npm_config_user_agent
- id: npm-profile-json-post--rx-17
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: npm_lifecycle_event
- id: npm-profile-json-post--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: application/json
- id: npm-profile-json-post--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: npm_package_name
- id: npm-profile-json-post--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: JSON.stringify
- id: npm-profile-json-post--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Content-Type
- id: npm-profile-json-post--rx-22
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: runtimeInfo
- id: npm-profile-json-post--rx-23
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: userEmail
composite_rules:
- id: npm-install-profile-exfil
  desc: npm install developer profile exfil
  crit: hostile
  conf: 0.99
  all:
  - id: developer-email-source-harvest
  - id: cicd-runtime-fingerprint
  - id: npm-profile-json-post
  any:
  - id: console-output-silenced
  - id: objectives/discovery/host/geo::ipify-api-comp
  - id: micro-behaviors/communications/http/ip-discovery::ipify-api
  needs: 1
- id: console-output-silenced
  desc: Silences all console output methods
  crit: suspicious
  conf: 0.94
  any:
  - id: console-output-silenced--rx-1
  - id: console-output-silenced--rx-2
  - id: console-output-silenced--rx-3
  - id: console-output-silenced--rx-4
  - id: console-output-silenced--rx-5
  needs: 1
- id: developer-email-source-harvest
  desc: Harvests developer email identity sources
  crit: suspicious
  conf: 0.96
  any:
  - id: developer-email-source-harvest--rx-6
  - id: developer-email-source-harvest--rx-7
  needs: 1
- id: cicd-runtime-fingerprint
  desc: Collects CI runtime env context
  crit: suspicious
  conf: 0.94
  any:
  - id: cicd-runtime-fingerprint--rx-8
  - id: cicd-runtime-fingerprint--rx-9
  - id: cicd-runtime-fingerprint--rx-10
  - id: cicd-runtime-fingerprint--rx-11
  - id: cicd-runtime-fingerprint--rx-12
  - id: cicd-runtime-fingerprint--rx-13
  - id: cicd-runtime-fingerprint--rx-14
  - id: cicd-runtime-fingerprint--rx-15
  needs: 1
- id: npm-profile-json-post
  desc: POSTs npm install profile JSON
  crit: suspicious
  conf: 0.94
  any:
  - id: npm-profile-json-post--rx-16
  - id: npm-profile-json-post--rx-17
  - id: npm-profile-json-post--rx-18
  - id: npm-profile-json-post--rx-19
  - id: npm-profile-json-post--rx-20
  - id: npm-profile-json-post--rx-21
  - id: npm-profile-json-post--rx-22
  - id: npm-profile-json-post--rx-23
  needs: 1
