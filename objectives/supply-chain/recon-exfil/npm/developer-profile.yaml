defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1552.001,T1082,T1041"
traits:
- id: console-output-silenced--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: debug
  count_max: 1023462
- id: console-output-silenced--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: error
  count_max: 1023463
- id: console-output-silenced--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: info
  count_max: 1023464
- id: console-output-silenced--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: warn
  count_max: 1023465
- id: developer-email-source-harvest--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(GIT_AUTHOR_EMAIL|GIT_COMMITTER_EMAIL)[\s\S]{0,900}(\.gitconfig|\.npmrc|package\.json)'
  count_max: 1023466
- id: developer-email-source-harvest--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '(npm_config_email)[\s\S]{0,900}(\.gitconfig|\.npmrc|package\.json)'
  count_max: 1023467
- id: cicd-runtime-fingerprint--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: GITHUB_ACTIONS
  count_max: 1023471
- id: cicd-runtime-fingerprint--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: JENKINS_URL
  count_max: 1023473
- id: cicd-runtime-fingerprint--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: GITLAB_CI
  count_max: 1023475
- id: npm-profile-json-post--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: application/json
  count_max: 1023478
- id: npm-profile-json-post--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: npm_package_name
  count_max: 1023479
- id: npm-profile-json-post--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Content-Type
  count_max: 1023481
- id: npm-profile-json-post--rx-22
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: runtimeInfo
  count_max: 1023482
- id: npm-profile-json-post--rx-23
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: userEmail
  count_max: 1023483
composite_rules:
- id: npm-install-profile-exfil
  desc: npm install developer profile exfil
  crit: hostile
  conf: 0.99
  all:
  - id: developer-email-source-harvest
  - id: cicd-runtime-fingerprint
  - id: npm-profile-json-post
  any:
  - id: console-output-silenced
  - id: objectives/discovery/host/geo::ipify-api-comp
  - id: micro-behaviors/communications/http/ip-discovery::ipify-api
- id: console-output-silenced
  desc: Silences all console output methods
  crit: suspicious
  conf: 0.94
  any:
  - id: micro-behaviors/os/console/io::js-console-object
  - id: console-output-silenced--rx-2
  - id: console-output-silenced--rx-3
  - id: console-output-silenced--rx-4
  - id: console-output-silenced--rx-5
- id: developer-email-source-harvest
  desc: Harvests developer email identity sources
  crit: suspicious
  conf: 0.96
  any:
  - id: developer-email-source-harvest--rx-6
  - id: developer-email-source-harvest--rx-7
- id: cicd-runtime-fingerprint
  desc: Collects CI runtime env context
  crit: suspicious
  conf: 0.94
  any:
  - id: micro-behaviors/os/env/vars/cicd::github-repository
  - id: micro-behaviors/process/create/spawn::process-execpath-spawn
  - id: micro-behaviors/os/sysinfo/platform/runtime::process-version-access
  - id: cicd-runtime-fingerprint--rx-11
  - id: micro-behaviors/process/info/commandline::check-argv
  - id: cicd-runtime-fingerprint--rx-13
  - id: cicd-runtime-fingerprint--rx-15
- id: npm-profile-json-post
  desc: POSTs npm install profile JSON
  crit: suspicious
  conf: 0.94
  any:
  - id: micro-behaviors/os/env/vars/access::npm-config-user-agent
  - id: micro-behaviors/os/env/vars/access::npm-lifecycle
  - id: npm-profile-json-post--rx-18
  - id: npm-profile-json-post--rx-19
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  - id: npm-profile-json-post--rx-21
  - id: npm-profile-json-post--rx-22
  - id: npm-profile-json-post--rx-23
