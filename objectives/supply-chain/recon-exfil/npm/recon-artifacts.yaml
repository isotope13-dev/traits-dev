# Supply-chain recon artifacts shipped in packages
# Detects when attacker reconnaissance tooling is accidentally
# or intentionally shipped inside a package archive.
# ATT&CK: T1195.002 (Supply Chain Compromise)
defaults:
  platforms: [unix, windows]
  attack: "T1195.002"

traits:
  # Vulnerability report JSON — attacker's recon output
  - id: vuln-report-json
    desc: Vulnerability report JSON shipped in package
    crit: suspicious
    conf: 0.95
    for: [scripts, manifests]
    if:
      type: basename
      regex: 'vuln[_-]?report\.json\b'

  # Sourcemaps list — attacker's recon input
  - id: sourcemaps-list
    desc: Sourcemaps URL list shipped in package
    crit: notable
    conf: 0.9
    for: [scripts, manifests]
    if:
      type: basename
      regex: 'sourcemaps\.txt\b'

  # TLS impersonation via tls_client with browser fingerprint
  - id: tls-client-browser-impersonation
    desc: TLS client browser fingerprint impersonation
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'tls_client\.Session\s*\(\s*client_identifier\s*=\s*["''](chrome)'

  # npm registry enumeration pattern in Python
  - id: npm-registry-enumeration
    desc: npm registry enumeration for unclaimed packages
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'registry\.npmjs\.org\s*/\s*\{'

composite_rules:
  # All three recon artifacts shipped together = attacker's working directory
  - id: recon-artifacts-shipped
    desc: Attacker recon artifacts shipped in package
    crit: suspicious
    conf: 0.98
    all:
      - id: vuln-report-json
      - id: sourcemaps-list
    any:
      - id: tls-client-browser-impersonation
      - id: npm-registry-enumeration

  # TLS impersonation + npm enumeration = dep-confusion recon tool
  - id: dep-confusion-recon-tool
    desc: Dependency confusion reconnaissance tooling
    crit: suspicious
    conf: 0.97
    all:
      - id: tls-client-browser-impersonation
      - id: npm-registry-enumeration
