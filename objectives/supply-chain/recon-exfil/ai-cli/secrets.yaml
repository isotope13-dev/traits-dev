  crit: suspicious
  conf: 0.96
  any:
  - id: child-process-llm-secret-search--rx-9
  - id: micro-behaviors/process/create/shell/bridge::js-execfilesync
  - id: objectives/credential-access/env/secrets/named-access::github-token-var
  - id: child-process-llm-secret-search--rx-12
  - id: child-process-llm-secret-search--rx-13
  - id: micro-behaviors/process/create/shell/bridge::js-spawnsync
  - id: micro-behaviors/process/create/shell/bridge::js-execsync
  - id: child-process-llm-secret-search--rx-16
  unless:
