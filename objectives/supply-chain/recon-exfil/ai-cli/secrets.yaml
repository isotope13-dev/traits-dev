defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell]
  attack: "T1552.001, T1041"
  mbc: E1552

traits:
  - id: llm-cli-secret-search-prompt
    desc: LLM CLI secret discovery prompt
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(?:claude|gemini|amazon\s+q|q\s+chat)\b[\s\S]{0,600}\b(?:find|search|locate|scan)\b[\s\S]{0,600}\b(?:GITHUB_TOKEN|GH_TOKEN|NPM_TOKEN|NODE_AUTH_TOKEN|\.npmrc|\.env|id_rsa|private\s+keys?|wallets?|keystore|IndexedDB)\b'
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures

  - id: child-process-llm-secret-search
    desc: Child process LLM secret search
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)(?:execFileSync|execSync|spawnSync|spawn|exec)\s*\([\s\S]{0,300}\b(?:claude|gemini|q)\b[\s\S]{0,800}\b(?:GITHUB_TOKEN|GH_TOKEN|NPM_TOKEN|NODE_AUTH_TOKEN|\.npmrc|\.env|id_rsa|private\s+keys?|wallets?|keystore|IndexedDB)\b'
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures

  - id: llm-cli-dangerous-flags
    desc: LLM CLI dangerous permission flags
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(--dangerously-skip-permissions|--yolo|--trust-all-tools|--no-interactive)'
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures

  - id: llm-cli-inventory-file-prompt
    desc: LLM CLI inventory file prompt
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(?:claude|gemini|amazon\s+q|q\s+chat)\b[\s\S]{0,900}\b(?:search|locate|enumerate)\b[\s\S]{0,900}/tmp/inventory\.txt'
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures

  - id: llm-inventory-file-instructions
    desc: LLM filesystem inventory instructions
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b(?:search|locate|enumerate)\b[\s\S]{0,900}\b(?:configuration|environment-definition|wallet|keystore|secret)\b[\s\S]{0,900}/tmp/inventory\.txt'
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures

  - id: github-public-repo-flag
    desc: GitHub public repository creation flag
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bprivate\s*:\s*false\b'
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures

  - id: github-content-base64-upload
    desc: GitHub contents base64 data upload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?:createOrUpdateFileContents|/contents/)[\s\S]{0,900}\b(?:content|data)\s*:[\s\S]{0,360}(?:toString\s*\(\s*["'']base64["'']|base64)'
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures

composite_rules:
  - id: github-repo-secret-exfiltration
    desc: GitHub repository secret exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/services::github-repo-file-write
      - id: github-content-base64-upload
    any:
      - id: llm-cli-secret-search-prompt
      - id: child-process-llm-secret-search
      - id: objectives/credential-access/env/secrets::json-stringify-env
      - id: objectives/credential-access/env/secrets::npmrc-access
      - id: objectives/credential-access/api-harvest/token::github-token-pattern-harvest
      - id: objectives/credential-access/api-harvest/token::git-and-registry-token-harvest

  - id: public-github-secret-dump
    desc: Public GitHub secret dump
    crit: hostile
    conf: 0.985
    all:
      - id: github-repo-secret-exfiltration
      - id: github-public-repo-flag

  - id: llm-cli-filesystem-inventory
    desc: LLM CLI filesystem inventory
    crit: hostile
    conf: 0.985
    all:
      - id: llm-cli-dangerous-flags
    any:
      - id: llm-cli-inventory-file-prompt
      - id: llm-inventory-file-instructions

  - id: vscode-extension-llm-secret-harvest
    desc: VSCode extension runs LLM secret search
    crit: hostile
    conf: 0.99
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/process/create/shell/host::require-vscode
      - id: child-process-llm-secret-search

  - id: vscode-extension-llm-secret-exfil-chain
    desc: VSCode LLM secret exfil chain
    crit: hostile
    conf: 0.99
    for: [javascript, typescript]
    all:
      - id: vscode-extension-llm-secret-harvest
      - id: micro-behaviors/communications/http/upload::form-data-append
    any:
      - id: objectives/credential-access/ssh/key::id-rsa
      - id: objectives/credential-access/env/secrets::npmrc-access
      - id: objectives/credential-access/api-harvest/token::github-token-pattern-harvest
      - id: objectives/credential-access/api-harvest/token::git-and-registry-token-harvest
