# LLM-CLI driven secret-harvesting prompts embedded in supply-chain payloads.
# Detects the s1ngularity / Shai-Hulud pattern where a JS/TS dropper invokes
# a local LLM CLI (claude, gemini, aider) with a prompt that instructs it
# to enumerate the filesystem, locate tokens/keys, and write the results
# to a known scratch path for later exfiltration.
#
# Atom design:
#   - Distinctive tokens (NODE_AUTH_TOKEN, NPM_TOKEN, GH_TOKEN, IndexedDB,
#     "/tmp/inventory.txt") use `type: text substr` — they're unique enough
#     to be self-gating and they need to work on shell payloads too
#     (string_literal is AST-only and won't fire on shell).
#   - Generic English words (search, chat, enumerate, configuration, secret,
#     private, wallets, keystore, amazon) use `type: string_literal word`
#     so they only match when the word appears inside a quoted prompt
#     string — not anywhere in code, doc-strings, or rule names.
#   - The prompt-assembly composites require `needs: 2` so a single
#     stray word in a scanner / linter / lint-rule library does not fire
#     them.
#   - One atom per pattern; composites that share evidence reference the
#     same atom from multiple sites.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell]
  attack: "T1552.001, T1041"
  mbc: E1552

traits:
  # ---- Distinctive env-var / store tokens (text — work on shell too) ----
  - id: prompt-node-auth-token
    desc: '"NODE_AUTH_TOKEN" env-var name'
    crit: component
    conf: 0.94
    if:
      type: text
      substr: NODE_AUTH_TOKEN
      case_insensitive: true
  - id: prompt-npm-token
    desc: '"NPM_TOKEN" env-var name'
    crit: component
    conf: 0.94
    if:
      type: text
      substr: NPM_TOKEN
      case_insensitive: true
  - id: prompt-gh-token
    desc: '"GH_TOKEN" env-var name'
    crit: component
    conf: 0.94
    if:
      type: text
      substr: GH_TOKEN
      case_insensitive: true
  - id: prompt-indexeddb
    desc: '"IndexedDB" browser credential store name'
    crit: component
    conf: 0.94
    if:
      type: text
      substr: IndexedDB
      case_insensitive: true
  - id: prompt-tmp-inventory-path
    desc: '"tmp/inventory.txt" scratch-file path'
    crit: component
    conf: 0.94
    if:
      type: text
      substr: tmp/inventory.txt
      case_insensitive: true
  # ---- LLM-prompt-only English words (string_literal — JS/TS only) ----
  - id: prompt-keystore-word
    desc: '"keystore" word inside a string literal'
    crit: component
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: string_literal
      word: keystore
      case_insensitive: true
  - id: prompt-wallets-word
    desc: '"wallets" word inside a string literal'
    crit: component
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: string_literal
      word: wallets
      case_insensitive: true
  - id: prompt-enumerate-word
    desc: '"enumerate" verb inside a string literal'
    crit: component
    conf: 0.7
    for: [javascript, typescript]
    if:
      type: string_literal
      word: enumerate
      case_insensitive: true
  - id: prompt-environment-definition-phrase
    desc: '"environment-definition" prompt phrase'
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: environment-definition
      case_insensitive: true
  # ---- LLM-CLI permission-bypass flags ----
  - id: llm-cli-dangerous-flags
    desc: LLM CLI flags that bypass user confirmation
    crit: component
    conf: 0.96
    # --no-interactive was removed: it's a generic non-TTY flag used by
    # ssh, gpg, npm, and most scanners. It does not imply LLM-agent
    # permission bypass. The retained flags are LLM-agent-specific:
    # --dangerously-skip-permissions (Claude Code), --yolo (Aider),
    # --trust-all-tools (other LLM CLIs).
    if:
      type: trait
      id: micro-behaviors/process/create/agent::ai-agent-dangerous-permission-flag
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/package/quality/false-positives::benign-app-fp-context
      - id: metadata/library/github-actions/
  # ---- GitHub-API upload of harvested secrets ----
  - id: github-public-repo-flag
    desc: "GitHub public-repo creation flag"
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bprivate\s*:\s*false\b'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/library/github-actions/
      - id: metadata/build/bundler::rolldown-bundled
composite_rules:
  - id: prompt-private-credential-phrase
    desc: Private term near credential prompt words
    crit: component
    conf: 0.9
    near_bytes: 80
    needs: 2
    any:
      - id: objectives/credential-access/theft/keywords::private-word
      - id: objectives/credential-access/theft/keywords::secret
      - id: prompt-keystore-word
      - id: prompt-wallets-word

  - id: prompt-chat-inventory-phrase
    desc: Chat term near inventory verbs
    crit: component
    conf: 0.9
    near_bytes: 80
    needs: 2
    any:
      - id: objectives/evasion/security-bypass/llm/keywords::chat-word
      - id: prompt-enumerate-word
      - id: objectives/evasion/security-bypass/llm/keywords::search-word

  - id: prompt-amazon-credential-phrase
    desc: Amazon term near secret prompt words
    crit: component
    conf: 0.9
    near_bytes: 80
    needs: 2
    any:
      - id: objectives/discovery/cloud/keywords::amazon-word
      - id: objectives/credential-access/theft/keywords::secret
      - id: prompt-keystore-word
      - id: metadata/file/string/file::configuration-word

  - id: llm-inventory-prompt-anchor
    desc: Distinctive LLM inventory prompt anchor
    crit: component
    conf: 0.93
    needs: 2
    any:
      - id: prompt-tmp-inventory-path
      - id: prompt-environment-definition-phrase
      - id: prompt-amazon-credential-phrase
      - id: prompt-chat-inventory-phrase

  - id: llm-inventory-action-cluster
    desc: Filesystem inventory action cluster
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: prompt-enumerate-word
      - id: objectives/evasion/security-bypass/llm/keywords::search-word
      - id: micro-behaviors/fs/search::locate-token
      - id: prompt-tmp-inventory-path
      - id: prompt-environment-definition-phrase

  - id: llm-inventory-instruction-anchor
    desc: Filesystem inventory instruction anchor
    crit: component
    conf: 0.92
    any:
      - id: prompt-environment-definition-phrase
      - id: prompt-tmp-inventory-path
      - id: metadata/file/string/file::configuration-word
      - id: prompt-keystore-word
      - id: objectives/credential-access/theft/keywords::secret

  - id: github-repo-secret-exfiltration
    desc: GitHub-API secret-blob exfiltration chain
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/services/github::github-repo-file-write
      - id: github-content-base64-upload
    any:
      - id: llm-cli-secret-search-prompt
      - id: child-process-llm-secret-search
      - id: micro-behaviors/data/serialize/json::process-env-json-stringify
      - id: objectives/credential-access/env/secrets/npm-registry::npmrc-access
      - id: objectives/credential-access/api-harvest/token::github-token-pattern-harvest
      - id: objectives/credential-access/api-harvest/token::git-and-registry-token-harvest

  - id: public-github-secret-dump
    desc: Public GitHub repo used as secret dump
    crit: hostile
    conf: 0.985
    all:
      - id: github-repo-secret-exfiltration
      - id: github-public-repo-flag

  - id: llm-cli-filesystem-inventory
    desc: LLM CLI driven filesystem inventory of secrets
    crit: hostile
    conf: 0.985
    all:
      - id: llm-cli-dangerous-command
    any:
      - id: llm-cli-inventory-file-prompt
      - id: llm-inventory-file-instructions

  - id: llm-cli-dangerous-command
    desc: Executed LLM CLI permission bypass
    crit: suspicious
    conf: 0.96
    near_bytes: 300
    all:
      - id: llm-cli-dangerous-flags
    any:
      - id: micro-behaviors/process/create/shell/bridge::js-execfilesync
      - id: micro-behaviors/process/create/shell/bridge::js-spawnsync
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: micro-behaviors/process/create/shell/spawn::sh-c-exec

  - id: vscode-extension-llm-secret-harvest
    desc: VSCode extension spawns LLM secret search
    crit: hostile
    conf: 0.99
    for: [javascript, typescript]
    all:
      - id: metadata/library/vscode::require-vscode
      - id: child-process-llm-secret-search

  - id: vscode-extension-llm-secret-exfil-chain
    desc: VSCode LLM secret-search exfil chain
    crit: hostile
    conf: 0.99
    for: [javascript, typescript]
    all:
      - id: vscode-extension-llm-secret-harvest
      - id: micro-behaviors/communications/http/upload::form-data-append
    any:
      - id: objectives/credential-access/ssh/key::id-rsa
      - id: objectives/credential-access/env/secrets/npm-registry::npmrc-access
      - id: objectives/credential-access/api-harvest/token::github-token-pattern-harvest
      - id: objectives/credential-access/api-harvest/token::git-and-registry-token-harvest

  - id: llm-cli-secret-search-prompt
    desc: LLM CLI prompt enumerates credentials
    crit: suspicious
    conf: 0.94
    near_bytes: 240
    # Require both an inventory action and >=2 credential fragments so a
    # report template saying "wallets" and "keystore" is not enough.
    all:
      - id: llm-inventory-action-cluster
    needs: 2
    any:
      - id: prompt-node-auth-token
      - id: prompt-npm-token
      - id: prompt-gh-token
      - id: prompt-indexeddb
      - id: prompt-keystore-word
      - id: prompt-private-credential-phrase
      - id: prompt-wallets-word
      - id: objectives/credential-access/env/secrets/source-control::github-token-var
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/library/ai/
      - id: well-known/tool/detection/security-scanner/
      - id: well-known/tool/detection/security-scanner::security-posture-scanner-doc
      - id: well-known/tool/detection/security-scanner/

  - id: child-process-llm-secret-search
    desc: Child-process invocation of LLM secret search
    crit: suspicious
    conf: 0.96
    near_bytes: 400
    # Pairs distinctive credential-store tokens and inventory/prompt language
    # with a child_process spawn API. This avoids benign token resolvers that
    # call `gh auth token` or similar CLIs without an LLM search prompt.
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-sync-child-process-api
      - id: llm-inventory-action-cluster
    any:
      - id: prompt-node-auth-token
      - id: prompt-npm-token
      - id: prompt-gh-token
      - id: prompt-indexeddb
      - id: objectives/credential-access/env/secrets/source-control::github-token-var
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/library/ai/
      - id: well-known/tool/detection/security-scanner/
      - id: well-known/tool/detection/security-scanner::security-posture-scanner-doc
      - id: metadata/package/quality/false-positives::benign-app-fp-context

  - id: llm-cli-inventory-file-prompt
    desc: LLM CLI prompt assembles file inventory
    crit: suspicious
    conf: 0.94
    near_bytes: 240
    # Require both a distinctive inventory/LLM anchor and a filesystem
    # action cue so ambient API words like "search" or event names like
    # "locate" in declaration files do not self-satisfy the composite.
    all:
      - id: llm-inventory-prompt-anchor
      - id: llm-inventory-action-cluster
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures

  - id: llm-inventory-file-instructions
    desc: LLM filesystem-inventory instruction prompt
    crit: notable
    conf: 0.9
    near_bytes: 240
    # Require an inventory-specific anchor in addition to the action cue.
    all:
      - id: llm-inventory-instruction-anchor
      - id: llm-inventory-action-cluster
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures

  - id: github-content-base64-upload
    desc: Base64 secret material uploaded via GitHub contents API
    crit: suspicious
    conf: 0.92
    near_bytes: 800
    all:
      - id: micro-behaviors/communications/http/services/github::github-create-or-update-file-contents
      - id: github-secret-source
    any:
      - id: micro-behaviors/data/encode/tostring::tostring-token
      - id: micro-behaviors/data/encoded::base64-token
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/library/structure::vscode-js-distribution-bundle
      - id: well-known/tool/development/action-download-artifact::source-tree

  - id: github-secret-source
    desc: Secret-material source near GitHub upload
    crit: component
    conf: 0.92
    any:
      - id: llm-cli-secret-search-prompt
      - id: child-process-llm-secret-search
      - id: micro-behaviors/data/serialize/json::process-env-json-stringify
      - id: objectives/credential-access/env/secrets/npm-registry::npmrc-access
      - id: objectives/credential-access/api-harvest/token::github-token-pattern-harvest
      - id: objectives/credential-access/api-harvest/token::git-and-registry-token-harvest
