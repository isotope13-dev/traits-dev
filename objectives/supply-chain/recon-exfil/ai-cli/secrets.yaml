  - id: llm-cli-inventory-file-prompt--rx-18
  - id: llm-cli-inventory-file-prompt--rx-19
  - id: micro-behaviors/data/text/llm/action::llm-path-navigation-action--rx-25
  - id: micro-behaviors/data/text/llm/action::llm-path-navigation-action--rx-26
