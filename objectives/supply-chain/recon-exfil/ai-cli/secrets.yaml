defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell]
  attack: "T1552.001, T1041"
  mbc: E1552

traits:
- id: llm-cli-secret-search-prompt--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: NODE_AUTH_TOKEN
    case_insensitive: true
  count_max: 1025374
- id: llm-cli-secret-search-prompt--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: IndexedDB
    case_insensitive: true
  count_max: 1025376
- id: llm-cli-secret-search-prompt--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
