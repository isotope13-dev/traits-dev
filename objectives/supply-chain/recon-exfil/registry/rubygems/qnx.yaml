defaults:
  platforms: [qnx, unix]
  for: [ruby]
  attack: T1592

traits:
  - id: qnx-ruby-package-inventory
    desc: QNX Ruby package inventory
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'pip list[\s\S]{0,180}npm list[\s\S]{0,180}gem list'

  - id: qnx-ruby-repo-ci-inventory
    desc: QNX Ruby repo CI inventory
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.git/config[\s\S]{0,180}\.github/workflows'

  - id: qnx-ruby-recon-exfil-api
    desc: QNX Ruby recon exfil API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/exfil/

composite_rules:
  - id: qnx-ruby-supply-chain-recon-exfil
    desc: QNX Ruby supply-chain recon exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-ruby-package-inventory
      - id: qnx-ruby-repo-ci-inventory
      - id: qnx-ruby-recon-exfil-api
