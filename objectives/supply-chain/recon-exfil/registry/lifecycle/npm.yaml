# npm registry metadata exfiltration via lifecycle hooks
# Detects curl/wget-based sysinfo exfiltration in npm lifecycle scripts.
# Extends npm-registry-snapshot.yaml with curl/wget-specific patterns.
# Covers preupdate/test hooks and pipedream OOB service, not just postinstall.
# ATT&CK: T1195.002 (Supply Chain), T1041 (Exfiltration over C2)
defaults:
  platforms: [windows, unix]
  for: [binaries, scripts, source, manifests, documents, media, data]


traits:
  # === Curl in Non-standard Lifecycle Hooks ===
  # (existing traits cover preinstall/postinstall/install but not preupdate/test)
- id: meta-preupdate-curl
  desc: Preupdate hook runs curl for exfil
  crit: suspicious
  conf: 0.92
  attack: T1041
  for: [manifests]
  if:
    type: text
    regex: "\"preupdate\"\\s*:\\s*\"curl\\s"

- id: meta-test-hook-curl
  desc: Test hook uses curl (likely exfil)
  crit: suspicious
  conf: 0.9
  attack: T1041
  for: [manifests]
  if:
    type: text
    regex: "\"test\"\\s*:\\s*\"curl\\s"

- id: meta-preinstall-curl
  desc: Preinstall hook runs curl for exfil
  crit: suspicious
  conf: 0.9
  attack: T1041
  for: [manifests]
  if:
    type: text
    regex: "\"preinstall\"\\s*:\\s*\"curl\\s"

  # Removed duplicate wget traits and composites to avoid overlap with npm-registry-snapshot.yaml
- id: meta-preinstall-wget
  desc: Preinstall hook runs wget for exfil
  crit: suspicious
  conf: 0.9
  attack: T1041
  for: [manifests]
  if:
    type: text
    regex: "\"preinstall\"\\s*:\\s*\"wget\\s"

- id: meta-preinstall-wget-quiet-kv
  desc: Versioned preinstall uses quiet wget
  crit: suspicious
  conf: 0.93
  attack: T1041
  for: [pkginfo]
  if:
    type: value
    path: "versions.*.scripts.preinstall"
    substr: "wget --quiet"

- id: meta-preupdate-wget
  desc: Preupdate hook runs wget for exfil
  crit: suspicious
  conf: 0.92
  attack: T1041
  for: [manifests]
  if:
    type: text
    regex: "\"preupdate\"\\s*:\\s*\"wget\\s"

- id: meta-preupdate-wget-quiet-kv
  desc: Versioned preupdate uses quiet wget
  crit: suspicious
  conf: 0.95
  attack: T1041
  for: [pkginfo]
  if:
    type: value
    path: "versions.*.scripts.preupdate"
    substr: "wget --quiet"

- id: meta-test-hook-wget
  desc: Test hook uses wget (likely exfil)
  crit: suspicious
  conf: 0.9
  attack: T1041
  for: [manifests]
  if:
    type: text
    regex: "\"test\"\\s*:\\s*\"wget\\s"

- id: meta-test-wget-quiet-kv
  desc: Versioned test hook uses quiet wget
  crit: suspicious
  conf: 0.93
  for: [pkginfo]
  attack: T1041
  if:
    type: value
    path: "versions.*.scripts.test"
    substr: "wget --quiet"

  # === Postinstall Curl ===
- id: meta-postinstall-curl
  desc: Postinstall hook runs curl for exfil
  crit: suspicious
  conf: 0.9
  attack: T1041
  for: [manifests]
  if:
    type: text
    regex: "\"postinstall\"\\s*:\\s*\"curl\\s"

- id: meta-postinstall-bash-curl-ip
  desc: Postinstall bash curl IP fallback
  crit: suspicious
  conf: 0.96
  attack: T1041
  for: [pkginfo]
  if:
    type: text
    regex: "bash\\s+-c\\s+'curl\\s+https?://[0-9]{1,3}(\\.[0-9]{1,3}){3}"
    is: external_ip

  # === Shell Command Substitution in Hooks ===
- id: meta-hook-whoami-sub
  desc: Hook uses $(whoami) for identity exfil
  crit: suspicious
  conf: 0.93
  attack: T1082
  for: [manifests]
  if:
    type: text
    regex: "\"(preinstall|postinstall|preupdate|test)\"[^\"]{0,20}\"[^\"]{0,220}\\$\\(whoami\\)"

- id: meta-hook-hostname-sub
  desc: Hook uses $(hostname) for host exfil
  crit: suspicious
  conf: 0.93
  attack: T1082
  for: [manifests]
  if:
    type: text
    regex: "\"(preinstall|postinstall|preupdate|test)\"[^\"]{0,20}\"[^\"]{0,220}\\$\\(hostname\\)"

- id: meta-hook-pwd-sub
  desc: Hook uses $(pwd) for path exfil
  crit: suspicious
  conf: 0.88
  attack: T1083
  for: [manifests]
  if:
    type: text
    regex: "\"(preinstall|postinstall|preupdate|test)\"[^\"]{0,20}\"[^\"]{0,220}\\$\\(pwd\\)"

  # === Install hook curl (non-pre/post) ===
- id: meta-install-curl
  desc: Install hook runs curl for exfil
  crit: suspicious
  conf: 0.9
  attack: T1041
  for: [manifests]
  if:
    type: text
    regex: "\"install\"\\s*:\\s*\"curl\\s"

  # === $(id) command substitution in hooks ===
- id: meta-hook-id-sub
  desc: Hook uses $(id) for identity exfil
  crit: suspicious
  conf: 0.93
  attack: T1033
  for: [manifests]
  if:
    type: text
    regex: "\"(preinstall|install|postinstall)\"[^\"]{0,20}\"[^\"]{0,220}\\$\\(id\\)"

- id: meta-hook-ls-data-logs-sub
  desc: Hook exfils /data/logs listing
  crit: suspicious
  conf: 0.96
  attack: T1083
  for: [manifests]
  if:
    type: text
    regex: "\\$\\(ls\\s+-la\\s+/data/logs/?\\)"

  # === Specific Triple Exfil Pattern ===
- id: meta-hook-user-path-host-exfil
  desc: Hook triple exfil user/path/hostname params
  crit: suspicious
  conf: 0.99
  attack: T1041
  for: [manifests]
  if:
    type: text
    substr: user=$(whoami)&path=$(pwd)&hostname=$(hostname)
- id: meta-preinstall-query-recon-kv
  desc: Versioned preinstall exfils user path host
  crit: suspicious
  conf: 0.99
  attack: T1041
  for: [pkginfo]
  if:
    type: value
    path: "versions.*.scripts.preinstall"
    substr: "?user=$(whoami)&path=$(pwd)&hostname=$(hostname)"

- id: meta-preupdate-query-recon-kv
  desc: Versioned preupdate exfils user path host
  crit: suspicious
  conf: 0.99
  attack: T1041
  for: [pkginfo]
  if:
    type: value
    path: "versions.*.scripts.preupdate"
    substr: "?user=$(whoami)&path=$(pwd)&hostname=$(hostname)"

- id: meta-test-query-recon-kv
  desc: Versioned test exfils user path host
  crit: suspicious
  conf: 0.99
  attack: T1041
  for: [pkginfo]
  if:
    type: value
    path: "versions.*.scripts.test"
    substr: "?user=$(whoami)&path=$(pwd)&hostname=$(hostname)"

- id: meta-versioned-small-single-file
  desc: Versioned package ships one file
  crit: notable
  conf: 0.84
  for: [pkginfo]
  if:
    type: value
    path: "versions.*.dist.fileCount"
    exact: "1"

- id: meta-preinstall-node-sidecar-kv
  desc: Versioned preinstall runs local Node script
  crit: notable
  conf: 0.95
  for: [manifests]
  if:
    type: text
    regex: "\"preinstall\"\\s*:\\s*\"node\\s+\\./[^\"\\n]{1,80}\\.js(\\s+\\|\\|\\s+true)?\""
  unless:
  - id: metadata/package/scripts::preinstall-engine-requirements-script
  - id: metadata/package/scripts::preinstall-runtime-guard-help

- id: meta-postinstall-node-sidecar-kv
  desc: Versioned postinstall runs local Node sidecar
  crit: suspicious
  conf: 0.95
  for: [manifests]
  if:
    type: text
    regex: "\"postinstall\"\\s*:\\s*\"node\\s+\\./[^\"\\n]{1,80}\\.js(\\s+\\|\\|\\s+true)?\""
  not:
  - substr: redownload-
  - substr: postinstall.
  - substr: install-deps
  unless:
  - id: metadata/package/manifest/repository/

- id: meta-dual-node-sidecar-true-kv
  desc: Versioned hooks repeat Node sidecar fallback
  crit: suspicious
  conf: 0.96
  for: [manifests]
  count_min: 2
  if:
    type: text
    regex: "node\\s+\\./[A-Za-z0-9_./-]{1,80}\\.js\\s+\\|\\|\\s+true"

  # === Pipedream in Lifecycle Hooks ===
  # (existing trait only checks postinstall; this covers preinstall/preupdate/test)
- id: meta-hook-pipedream
  desc: Lifecycle hook calls pipedream OOB service
  crit: suspicious
  conf: 0.96
  attack: T1041
  for: [manifests]
  if:
    type: text
    regex: "\"(preinstall|preupdate|test)\"[^\"]{0,20}\"[^\"]{0,120}pipedream\\.net"

  # === Metadata Quality Anomalies ===
- id: meta-internal-app-desc
  desc: Package description is "Internal App"
  crit: notable
  conf: 0.85
  for: [manifests]
  if:
    type: text
    regex: "\"description\"\\s*:\\s*\"Internal App\""
    case_insensitive: true

- id: meta-internal-app-author
  desc: Package author is "Internal App"
  crit: notable
  conf: 0.85
  for: [manifests]
  if:
    type: text
    regex: "\"author\"[^\"]{0,20}\"name\"[^\"]{0,20}\"Internal App\""
    case_insensitive: true

- id: meta-single-file-dist
  desc: Package ships exactly one file
  crit: notable
  conf: 0.72
  for: [manifests]
  if:
    type: text
    regex: "\"fileCount\"\\s*:\\s*1\\b"

composite_rules:
  # === Preinstall Curl Sysinfo Exfil ===
- id: meta-preinstall-sysinfo-exfil
  desc: Preinstall hook exfils sysinfo via curl
  crit: hostile
  conf: 0.99
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-preinstall-curl
  - id: meta-hook-whoami-sub
  any:
  - id: meta-hook-hostname-sub
  - id: meta-hook-pipedream

  # === Preinstall Wget Sysinfo Exfil ===
- id: meta-preinstall-wget-sysinfo-exfil
  desc: Preinstall hook exfils sysinfo via wget
  crit: hostile
  conf: 0.99
  attack: T1041
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-preinstall-wget
  - id: meta-hook-whoami-sub
  any:
  - id: meta-hook-hostname-sub
  - id: meta-hook-pipedream

  # === Preupdate Curl Sysinfo Exfil ===
- id: meta-preupdate-sysinfo-exfil
  desc: Preupdate hook exfils sysinfo via curl
  crit: hostile
  conf: 0.99
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-preupdate-curl
  - id: meta-hook-whoami-sub

  # === Preupdate Wget Sysinfo Exfil ===
- id: meta-preupdate-wget-sysinfo-exfil
  desc: Preupdate hook exfils sysinfo via wget
  crit: hostile
  conf: 0.99
  attack: T1041
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-preupdate-wget
  - id: meta-hook-whoami-sub

  # === Multi-hook Redundant Exfil (curl) ===
- id: meta-multi-hook-redundant-exfil
  desc: Multiple lifecycle hooks repeat same curl exfil
  crit: hostile
  conf: 0.995
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-preinstall-curl
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-preupdate-hook
  - id: meta-hook-whoami-sub
  any:
  - id: meta-test-hook-curl
  - id: meta-hook-pipedream
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-readme-error

  # === Multi-hook Redundant Exfil (wget) ===
- id: meta-multi-hook-redundant-wget-exfil
  desc: Multiple lifecycle hooks repeat same wget exfil
  crit: hostile
  conf: 0.995
  attack: T1041
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-preinstall-wget
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-preupdate-hook
  - id: meta-hook-whoami-sub
  any:
  - id: meta-test-hook-wget
  - id: meta-hook-pipedream
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-readme-error

  # === Postinstall Curl Sysinfo Exfil ===
- id: meta-postinstall-sysinfo-exfil
  desc: Postinstall hook exfils sysinfo via curl
  crit: hostile
  conf: 0.99
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-postinstall-curl
  - id: meta-hook-whoami-sub
  any:
  - id: meta-hook-hostname-sub
  - id: meta-hook-pwd-sub

- id: meta-postinstall-node-curl-fallback-beacon
  desc: Postinstall Node sidecar falls back to curl beacon
  crit: hostile
  conf: 0.98
  attack: T1041
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-postinstall-hook-raw
  - id: meta-postinstall-bash-curl-ip

  # === Triple Exfil Hostile ===
- id: meta-hook-triple-exfil
  desc: Hook exfils user/path/hostname via URL params
  crit: hostile
  conf: 0.999
  attack: T1041
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-hook-user-path-host-exfil
  any:
  - id: meta-preinstall-curl
  - id: meta-preupdate-curl
  - id: meta-preinstall-wget
  - id: meta-preupdate-wget
  - id: meta-test-hook-curl
  - id: meta-test-hook-wget
  - id: meta-postinstall-curl

- id: meta-oastify-data-logs-exfil
  desc: Lifecycle hook exfils /data/logs to OASTify
  crit: hostile
  conf: 0.99
  attack: T1041
  mbc: E1041
  all:
  - id: meta-hook-ls-data-logs-sub
  - id: objectives/supply-chain/recon-exfil/oast/secret::oastify-url
  any:
  - id: meta-postinstall-curl
  - id: meta-preinstall-curl
  - id: meta-install-curl
  - id: meta-test-hook-curl

- id: meta-triple-hook-wget-query-exfil
  desc: Three hooks reuse wget query exfil
  crit: hostile
  conf: 0.999
  attack: T1041
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-preinstall-wget-quiet-kv
  - id: meta-preupdate-wget-quiet-kv
  - id: meta-test-wget-quiet-kv
  - id: meta-preinstall-query-recon-kv
  - id: meta-preupdate-query-recon-kv
  - id: meta-test-query-recon-kv
  any:
  - id: meta-versioned-small-single-file
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-readme-error

  # === Internal App Placeholder with Malicious Hooks ===
- id: meta-internal-app-with-hooks
  desc: Generic "Internal App" package with malicious hooks
  crit: hostile
  conf: 0.95
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-internal-app-desc
  - id: meta-hook-whoami-sub
  any:
  - id: meta-preupdate-curl
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-readme-error
  - id: meta-single-file-dist
  - id: meta-hook-pipedream
  needs: 2

  # === Test Script Abused for Exfil ===
- id: meta-test-hook-exfil
  desc: Test script abused to exfil sysinfo
  crit: hostile
  conf: 0.97
  attack: T1041
  mbc: E1041
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-test-hook-curl
  - id: meta-hook-whoami-sub
  any:
  - id: meta-hook-hostname-sub
  - id: meta-hook-pipedream

  # === Curl webhook OOB exfil (no basename gate) ===
- id: meta-curl-webhook-sysinfo-exfil
  desc: Curl exfils sysinfo to webhook/OOB service
  crit: hostile
  conf: 0.98
  attack: T1041
  mbc: E1041
  all:
  - id: meta-hook-whoami-sub
  any:
  - id: meta-preinstall-curl
  - id: meta-postinstall-curl
  - id: meta-install-curl
  - id: meta-hook-hostname-sub
  - id: meta-hook-id-sub
  - id: objectives/supply-chain/impersonation/registry/manifest::hook-cmd-query-exfil
  needs: 2

  # === Multi-hook curl sysinfo exfil (no basename gate) ===
- id: meta-multi-hook-curl-exfil
  desc: Multiple hooks run curl with command subs
  crit: hostile
  conf: 0.99
  attack: T1041
  mbc: E1041
  all:
  - id: meta-preinstall-curl
  - id: meta-postinstall-curl
  any:
  - id: meta-hook-whoami-sub
  - id: meta-hook-hostname-sub
  - id: meta-hook-id-sub

- id: meta-dual-node-sidecar-exfil
  desc: Dual lifecycle hooks repeat local Node exfil sidecar
  crit: hostile
  conf: 0.98
  mbc: E1041
  all:
  - id: meta-preinstall-node-sidecar-kv
  - id: meta-postinstall-node-sidecar-kv
  - id: meta-dual-node-sidecar-true-kv
  any:
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-readme-error
