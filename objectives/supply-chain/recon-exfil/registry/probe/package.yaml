defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
  - id: pingback-postinstall
    desc: postinstall runs local pingback script
    crit: suspicious
    conf: 0.98
    attack: "T1195.002"
    if:
      type: text
      regex: "\"postinstall\"\\s*:\\s*\"node\\s+pingback\\.js\""
  - id: dependency-confusion-description
    desc: Description mentions dependency confusion
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "\"description\"\\s*:\\s*\".{0,220}dependency confusion.{0,220}\""
  - id: placeholder-description
    desc: Description presents public placeholder
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: "\"description\"\\s*:\\s*\".{0,220}public placeholder.{0,220}\""
      case_insensitive: true
  - id: private-package-readme
    desc: README warns about private package
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "\"readme\"\\s*:\\s*\".{0,220}public placeholder for the private package.{0,220}\""
      case_insensitive: true
  - id: private-registry-warning
    desc: README warns about private registry
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "\"readme\"\\s*:\\s*\".{0,300}installed this package.{0,160}private.{0,120}\""
      case_insensitive: true
  - id: public-access-config
    desc: 'public access config'
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "\"publishConfig\"\\s*:\\s*\\{\\s*\"access\"\\s*:\\s*\"public\""
  - id: placeholder-release-line
    desc: "Registry includes placeholder releases"
    crit: component
    conf: 0.88
    count_min: 3
    if:
      type: text
      regex: "\"0\\.0\\.[0-9]+-placeholder\""
  - id: maintainer-exviry
    desc: Registry metadata references exviry maintainer
    crit: component
    conf: 0.95
    if:
      type: text
      regex: "\"exviry\"|\"exviry@gmail\\.com\""
composite_rules:
  - id: placeholder-install-pingback-package
    desc: Registry metadata shows placeholder install pingback
    crit: suspicious
    conf: 0.98
    attack: "T1195.002"
    all:
      - id: pingback-postinstall
      - id: dependency-confusion-description
    any:
      - id: private-package-readme
      - id: private-registry-warning
      - id: placeholder-description
      - id: placeholder-release-line
  - id: placeholder-install-pingback-registry-metadata
    desc: Placeholder package metadata drives install pingback
    crit: hostile
    conf: 0.995
    attack: "T1195.002"
    all:
      - id: pingback-postinstall
      - id: dependency-confusion-description
      - id: private-package-readme
    any:
      - id: public-access-config
      - id: placeholder-release-line
      - id: maintainer-exviry
      - id: private-registry-warning
  - id: dependency-confusion-install-hook-recon-exfil
    desc: Dependency confusion package exfils host profile during install
    crit: hostile
    conf: 0.98
    attack: "T1195.002, T1041"
    mbc: E1041
    all:
      - id: dependency-confusion-description
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-script-exfil
      - id: objectives/supply-chain/recon-exfil/oast/env::postinstall-curl-ip-recon-exfil
  - id: dependency-confusion-preinstall-oob-callback
    desc: Dependency confusion package phones home from preinstall sidecar
    crit: hostile
    conf: 0.98
    attack: "T1195.002, T1048"
    mbc: E1041
    all:
      - id: dependency-confusion-description
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
      - id: objectives/supply-chain/recon-exfil/callback::npm-oob-https-callback-sidecar
