defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002

traits:
  - id: node-trycloudflare-c2-host
    desc: Node references trycloudflare hostname
    crit: notable
    conf: 0.92
    attack: "T1195.002,T1102"
    if:
      type: text
      substr: "trycloudflare.com"

  - id: node-trycloudflare-c2-post
    desc: Node posts beacons to trycloudflare
    crit: suspicious
    conf: 0.94
    attack: "T1195.002,T1102"
    if:
      type: text
      regex: "trycloudflare\\.com[\\s\\S]{0,220}method:\\s*'POST'"

  - id: node-c2host-post-request
    desc: Node posts to C2 host variable
    crit: suspicious
    conf: 0.93
    attack: "T1195.002,T1041"
    if:
      type: text
      regex: "host:\\s*C2_HOST[\\s\\S]{0,90}method:\\s*'POST'"

  - id: node-ci-token-map-capture
    desc: Node captures CI package tokens
    crit: suspicious
    conf: 0.95
    attack: "T1195.002,T1552"
    if:
      type: text
      regex: "\\bGITHUB_TOKEN\\b[\\s\\S]{0,90}\\bNPM_TOKEN\\b[\\s\\S]{0,180}payload\\.ci_creds"

  - id: node-ci-token-name-list
    desc: Node lists CI package tokens
    crit: suspicious
    conf: 0.93
    attack: "T1195.002,T1552"
    if:
      type: text
      regex: "GITHUB_TOKEN',\\s*'NPM_TOKEN"

  - id: node-ci-credential-payload-map
    desc: Node stores CI credentials in payload
    crit: suspicious
    conf: 0.93
    attack: "T1195.002,T1552"
    if:
      type: text
      substr: "payload.ci_creds"

  - id: node-ecs-credential-endpoint-capture
    desc: Node captures ECS task credentials
    crit: suspicious
    conf: 0.96
    attack: "T1195.002,T1552.005"
    unless:
      - id: metadata/library/data::aws-sdk-js-v3-bundle
    if:
      type: text
      regex: "AWS_CONTAINER_CREDENTIALS_RELATIVE_URI[\\s\\S]{0,220}169\\.254\\.170\\.2"

  - id: node-iam-secret-fields-captured
    desc: Node records IAM secret fields
    crit: suspicious
    conf: 0.96
    attack: "T1552.005"
    if:
      type: text
      regex: "payload\\.iam_creds[\\s\\S]{0,180}SecretAccessKey[\\s\\S]{0,120}\\bToken\\b"

  - id: node-runner-container-proc-recon
    desc: Node probes runner container internals
    crit: suspicious
    conf: 0.92
    attack: "T1082,T1611"
    if:
      type: text
      regex: "(/proc/1/cgroup|/proc/1/cmdline)[\\s\\S]{0,220}/var/run/docker\\.sock"

  - id: node-proc1-fd-script-probe
    desc: Node probes process-one script fd
    crit: suspicious
    conf: 0.92
    attack: "T1082"
    if:
      type: text
      substr: "/proc/1/fd/255"

  - id: node-windows-finding-verdict-tamper
    desc: Node overwrites sandbox findings
    crit: suspicious
    conf: 0.96
    attack: "T1565.001"
    if:
      type: text
      regex: "findings\\.xml[\\s\\S]{0,260}RESEARCHER_POISONED_VERDICT[\\s\\S]{0,180}writeFileSync"

  - id: node-findings-xml-target
    desc: Node targets findings XML
    crit: suspicious
    conf: 0.93
    attack: "T1565.001"
    if:
      type: text
      substr: "findings.xml"

  - id: node-poisoned-verdict-marker
    desc: Node carries poisoned verdict marker
    crit: suspicious
    conf: 0.95
    attack: "T1565.001"
    if:
      type: text
      substr: "RESEARCHER_POISONED_VERDICT"

  - id: node-ms-settings-hijack-key
    desc: Node targets ms-settings hijack key
    crit: suspicious
    conf: 0.94
    attack: "T1548.002"
    if:
      type: text
      regex: "HKCU\\\\Software\\\\Classes\\\\ms-settings"

  - id: node-delegateexecute-fodhelper-launch
    desc: Node links DelegateExecute to fodhelper
    crit: suspicious
    conf: 0.95
    attack: "T1548.002"
    if:
      type: text
      regex: "DelegateExecute[\\s\\S]{0,220}fodhelper\\.exe"

  - id: node-system-task-webrequest-confirm
    desc: Node creates SYSTEM task beacon
    crit: suspicious
    conf: 0.94
    attack: "T1053.005,T1041"
    if:
      type: text
      regex: "New-ScheduledTaskPrincipal[\\s\\S]{0,140}NT AUTHORITY\\\\SYSTEM[\\s\\S]{0,260}Invoke-WebRequest"

  - id: node-remote-tasking-pattern-endpoints
    desc: Node fetches remote file collection tasking
    crit: suspicious
    conf: 0.94
    attack: "T1195.002,T1102,T1083"
    if:
      type: text
      regex: "/api/(ssh-key|scan-patterns|block-patterns)"
    unless:
      - id: well-known/app/bitwarden::bitwarden-app
      - id: well-known/app/bitwarden::bitwarden-text-marker

  - id: node-authorized-keys-persistence
    desc: Node writes SSH authorized_keys persistence
    crit: suspicious
    conf: 0.96
    attack: "T1098.004,T1195.002"
    if:
      type: text
      regex: "authorized_keys[\\s\\S]{0,260}(appendFileSync|writeFileSync)"

  - id: node-file-upload-form-stream
    desc: Node uploads local files as multipart streams
    crit: notable
    conf: 0.94
    attack: "T1041"
    unless:
      - id: well-known/app/aui-agent-builder/
    if:
      type: text
      regex: "FormData\\([\\s\\S]{0,260}createReadStream|createReadStream[\\s\\S]{0,260}form\\.append"

composite_rules:
  - id: node-install-ci-cloud-credential-exfil
    desc: Install script exfils CI cloud credentials
    crit: hostile
    conf: 0.98
    attack: "T1195.002,T1552.005,T1041"
    all:
      - id: node-trycloudflare-c2-host
      - id: node-c2host-post-request
    any:
      - id: node-ci-token-map-capture
      - id: node-ci-token-name-list
      - id: node-ci-credential-payload-map
      - id: node-ecs-credential-endpoint-capture
      - id: node-iam-secret-fields-captured

  - id: node-install-ecs-iam-credential-exfil
    desc: Install script exfils ECS IAM credentials
    crit: hostile
    conf: 0.98
    attack: "T1195.002,T1552.005,T1041"
    all:
      - id: node-trycloudflare-c2-host
      - id: node-c2host-post-request
      - id: node-ecs-credential-endpoint-capture
      - id: node-iam-secret-fields-captured

  - id: node-install-container-runner-c2-recon
    desc: Install script beacons container runner profile
    crit: hostile
    conf: 0.96
    attack: "T1195.002,T1082,T1041"
    all:
      - id: node-trycloudflare-c2-host
      - id: node-c2host-post-request
    any:
      - id: node-runner-container-proc-recon
      - id: micro-behaviors/os/container/runtime::docker-var-run-sock
      - id: node-proc1-fd-script-probe

  - id: node-install-windows-verdict-uac-beacon
    desc: Install script tampers verdict and UAC
    crit: hostile
    conf: 0.98
    attack: "T1195.002,T1548.002,T1565.001,T1041"
    all:
      - id: node-trycloudflare-c2-host
      - id: node-ms-settings-hijack-key
      - id: node-delegateexecute-fodhelper-launch
      - id: node-system-task-webrequest-confirm
    any:
      - id: node-windows-finding-verdict-tamper
      - id: node-findings-xml-target
      - id: node-poisoned-verdict-marker

  - id: node-remote-ssh-key-file-exfil-package
    desc: NPM package fetches tasking, uploads files, and installs SSH persistence
    crit: hostile
    conf: 0.98
    attack: "T1195.002,T1041,T1098.004"
    all:
      - id: node-remote-tasking-pattern-endpoints
      - id: node-file-upload-form-stream
      - id: node-authorized-keys-persistence
