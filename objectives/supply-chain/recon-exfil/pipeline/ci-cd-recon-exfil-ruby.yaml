# CI/CD Reconnaissance + Exfiltration - Ruby
# Detects RubyGems supply chain attacks targeting CI/CD environments
# ATT&CK: T1195.001 (Supply Chain Compromise: Compromise Software Dependencies)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: hostile
  attack: "T1195.001"
  for: [ruby]
composite_rules:
  # =====================================================
  # HTTP EXFILTRATION (Net::HTTP, HTTParty, etc.)
  # =====================================================
  - id: gem-runner-recon-http
    desc: Ruby gem exfiltrates CI/CD info via HTTP
    conf: 0.95
    attack: "T1041"
    all:
      - id: objectives/discovery/system/fingerprint/cicd::ruby-runner-fingerprinting
    any:
      - id: micro-behaviors/communications/http/request/client::net-http-post
      - id: micro-behaviors/communications/http/request/client::net-http-get-dup
  # =====================================================
  # DNS EXFILTRATION (Resolv)
  # =====================================================
  - id: gem-runner-recon-dns
    desc: Ruby gem exfiltrates CI/CD info via DNS
    conf: 0.95
    attack: "T1048.003"
    all:
      - id: objectives/discovery/system/fingerprint/cicd::ruby-runner-fingerprinting
    any:
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-resolve
  # =====================================================
  # GEM CREDENTIAL THEFT
  # =====================================================
  - id: gem-credential-theft
    desc: Ruby gem steals RubyGems/GitHub credentials
    conf: 0.98
    attack: "T1552.001"
    all:
      - id: objectives/credential-access/env/secrets/cicd::ruby-gem-credential-access
    any:
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/dns/lookup/
  - id: gem-supply-chain-signal
    desc: Ruby gem CI/CD targeting signal
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: objectives/discovery/system/fingerprint/cicd::ruby-runner-fingerprinting
      - id: objectives/credential-access/env/secrets/cicd::ruby-gem-credential-access
      - id: micro-behaviors/os/env/vars/cicd::ruby-system-fingerprinting
    unless:
      - id: well-known/lib/jruby::archive-basename
      - id: well-known/lib/jruby::embedded-runtime-path
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::nested-member-path
  - id: gem-supply-chain-egress
    desc: Ruby gem outbound egress signal
    crit: suspicious
    conf: 0.95
    any:
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/dns/lookup/
      - id: gem-runner-recon-http
      - id: gem-runner-recon-dns
      - id: gem-credential-theft
  # =====================================================
  # COMBINED DETECTION
  # =====================================================
  - id: gem-supply-chain-attack
    desc: RubyGems supply chain attack targeting CI/CD
    conf: 0.95
    all:
      - id: gem-supply-chain-signal
      - id: gem-supply-chain-egress
    unless:
      - id: well-known/lib/jruby::runtime-context
      - id: well-known/lib/jruby::bundler-thor-open-uri-helper
