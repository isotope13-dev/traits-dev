defaults:
  platforms:
    - unix
    - windows
composite_rules:
  - id: github-actions-targeting
    desc: Targets GitHub Actions environment
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/data/text/keywords/lexicon::github-actions-targeting-shell
      - id: micro-behaviors/data/text/keywords/credential::github-actions-token-regex
  - id: github-actions-memdump-downloader
    desc: Downloads and executes GitHub Actions memory dumper
    crit: hostile
    conf: 0.97
    attack: T1003
    for:
      - shell
    all:
      - id: well-known/tool/offensive/memdump::memdump-py-download
      - id: micro-behaviors/process/create/shell/invoke::sudo-piped-script-exec
  - id: github-actions-memdump-webhook-exfil
    desc: GitHub Actions memory dump webhook exfiltration
    crit: hostile
    conf: 0.99
    attack: "T1003, T1041"
    for:
      - shell
    all:
      - id: github-actions-memdump-downloader
      - id: objectives/supply-chain/credential-theft/cli/webhook::curl-webhook-post
      - id: micro-behaviors/data/encode/base64::double-base64-encode
  - id: github-runner-memory-dumper
    desc: Dumps GitHub Actions Runner memory
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    any:
      - id: github-actions-memdump-downloader
    all:
      - id: github-actions-targeting
  - id: github-actions-secret-marker-helper
    desc: Helper for secret or memory access
    crit: suspicious
    any:
      - id: objectives/evasion/masquerade/naming/posix::secret
      - id: micro-behaviors/fs/proc/info/path::process-pid-mem
      - id: micro-behaviors/data/text/keywords/lexicon::github-actions-targeting-shell
  - id: github-actions-secret-harvest
    desc: Harvests secrets from GitHub Actions
    crit: hostile
    conf: 0.95
    for: [scripts, binaries]
    any:
      - id: github-actions-memdump-downloader
    all:
      - id: github-actions-targeting
      - id: github-actions-secret-marker-helper
