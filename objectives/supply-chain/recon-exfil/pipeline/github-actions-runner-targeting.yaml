# GitHub Actions Runner Secret Extraction
# Combines runner process targeting with memory/environ scraping.
# Observed in trivy-gha supply chain attack.
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  for: [shell, python]
  platforms: [linux, unix, macos]
  attack: T1195.002
composite_rules:
  - id: runner-secret-extraction
    desc: Extracts secrets from GitHub Actions runner
    crit: hostile
    conf: 0.95
    near_lines: 80
    all:
      - id: objectives/supply-chain/recon-exfil/pipeline::github-actions-targeting
    any:
      - id: micro-behaviors/fs/proc/info/path::process-memory-dumper
      - id: micro-behaviors/fs/proc/info/path::process-arbitrary
      - id: objectives/exfiltration/http/upload::hybrid-encrypt-exfil
      - id: micro-behaviors/communications/http/upload::github-release-asset-publisher
