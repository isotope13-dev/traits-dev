# CI/CD Reconnaissance + Exfiltration - Shell
# Detects CI/CD pipeline injection attacks via shell scripts
# ATT&CK: T1195.002 (Supply Chain Compromise: Compromise Software Supply Chain)
defaults:
  platforms: [linux, unix, macos, android, ios]
  crit: suspicious
  attack: "T1195.002"
  for: [shell]
composite_rules:
  # =====================================================
  # CURL/WGET EXFILTRATION
  # =====================================================
  - id: shell-runner-recon-curl
    desc: Shell script exfiltrates CI/CD info via curl
    conf: 0.95
    attack: "T1041"
    all:
      - id: objectives/discovery/system/fingerprint/cicd::shell-runner-fingerprinting
    any:
      - id: metadata/library/socketio::client
      - id: micro-behaviors/communications/http/curl::curl-short-data-option
      - id: micro-behaviors/communications/http/curl::curl-data-option
      - id: micro-behaviors/communications/http/curl::curl-post-flag
    unless:
      - id: well-known/tool/development/codecov::official-bash-uploader
      - id: well-known/app/lightdash::lightdash-anonymous-install-tracking
  # =====================================================
  # ENV DUMP TO EXTERNAL
  # =====================================================
  - id: shell-env-dump-exfil
    desc: Shell dumps environment to external server
    conf: 0.95
    attack: "T1552.001"
    any:
      - id: objectives/credential-access/env/secrets/cicd::sh-github-token
    all:
      - id: metadata/library/socketio::client
  # =====================================================
  # SYSTEM FINGERPRINT + EXFIL
  # =====================================================
  - id: shell-fingerprint-exfil
    desc: Shell fingerprints system and exfiltrates
    conf: 0.90
    attack: "T1082"
    all:
      - id: micro-behaviors/os/sysinfo/process::shell-system-fingerprinting
    any:
      - id: metadata/library/socketio::client
      - id: micro-behaviors/communications/http/curl::curl-short-data-option
      - id: micro-behaviors/communications/http/curl::curl-data-option
      - id: micro-behaviors/communications/http/curl::curl-post-flag
  # =====================================================
  # CI/CD PIPELINE INJECTION
  # =====================================================
  - id: cicd-pipeline-injection
    desc: CI/CD shell evaluates a variable-backed command
    conf: 0.95
    crit: suspicious
    all:
      - id: micro-behaviors/process/create/eval::shell-eval-variable
    any:
      - id: micro-behaviors/os/env/vars/cicd/
      - id: objectives/credential-access/env/secrets/cicd::sh-github-token
    unless:
      - id: well-known/tool/development/codecov::official-bash-uploader
