defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, npm, archives]
  attack: T1041
  mbc: E1041

composite_rules:
  - id: multiple-credential-store-sources
    desc: Multiple developer credential store sources
    crit: suspicious
    conf: 0.95
    any:
      - id: objectives/credential-access/env/secrets/filtered-access::js-secret-keyword-list
      - id: objectives/credential-access/env/secrets/bulk-access::node-config
      - id: objectives/credential-access/browser/chromium::browser-creds-table-sql
      - id: objectives/exfiltration/stealer/credential/multi-source::node-shell-history-collection
      - id: objectives/exfiltration/stealer/credential/platform::node-ssh-private-key-command
    needs: 2
    unless:
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: well-known/lib/stacksjs-ts-cloud::ts-cloud-package-context

  - id: package-credential-store-audit-upload
    desc: Package audits multiple developer credential stores and sends data by HTTP
    crit: hostile
    conf: 0.99
    scope: outer
    all:
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: multiple-credential-store-sources
    unless:
      - id: well-known/lib/stacksjs-ts-cloud::ts-cloud-package-context
