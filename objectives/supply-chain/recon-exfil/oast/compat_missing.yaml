defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json, pkginfo, scripts, source, manifests, documents, data]
composite_rules:
  - id: npm-preinstall-node-oast-profile
    desc: npm preinstall inline node OAST profiling
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/supply-chain/recon-exfil::node-inline-eval
    any:
      - id: npm-preinstall-oast-pro-host-recon
      - id: objectives/supply-chain/metadata-anomaly/registry/hook-only::registry-node-inline-oast-recon-exfil
    needs: 1
  - id: preinstall-node-inline
    desc: preinstall uses inline node execution
    crit: suspicious
    conf: 0.94
    any:
      - id: objectives/supply-chain/recon-exfil::node-inline-eval
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-lifecycle-node-e
