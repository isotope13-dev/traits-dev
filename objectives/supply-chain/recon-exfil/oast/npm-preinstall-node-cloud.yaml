defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [package.json]
  attack: T1195.002

composite_rules:
  - id: npm-preinstall-node-oast-cloud-env-exfil
    desc: npm preinstall exfils cloud and env profile
    crit: hostile
    conf: 0.997
    attack: T1041
    mbc: "E1041"
    all:
      - id: objectives/supply-chain/recon-exfil/oast::npm-preinstall-node-oast-profile
      - id: objectives/supply-chain/recon-exfil::node-inline-cloud-env-fingerprint
      - id: objectives/supply-chain/recon-exfil::js-client-request-post

  - id: npm-inline-hook-only-recon-package
    desc: Tiny inflated manifest-only recon package
    crit: suspicious
    conf: 0.992
    size_max: 1200
    all:
      - id: objectives/supply-chain/recon-exfil/oast::preinstall-node-inline
      - id: metadata/package/fields::npm-unrealistic-major-version
