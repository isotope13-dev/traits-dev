defaults:
  for: [pkginfo]
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1041"

traits:
  - id: sidecar-curl-data-urlencode
    desc: Registry sidecar preinstall curl form post
    crit: notable
    conf: 0.96
    if:
      type: raw
      regex: '"preinstall"\s*:\s*"[^"]{0,260}curl[^"]{0,260}--data-urlencode'

  - id: sidecar-hostname-field
    desc: Registry sidecar collects hostname
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      substr: 'hostname=$(hostname)'

  - id: sidecar-fqdn-field
    desc: Registry sidecar collects fqdn
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      substr: 'fqdn=$(hostname -f 2>/dev/null || hostname)'

  - id: sidecar-fqdn-fallback
    desc: Registry sidecar falls back from hostname -f
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      substr: 'hostname -f 2>/dev/null || hostname'

  - id: sidecar-dnsdomainname-devnull
    desc: Registry sidecar suppresses dnsdomainname errors
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      substr: 'dnsdomainname 2>/dev/null'

composite_rules:
  - id: sidecar-host-profile-fields
    desc: Registry sidecar collects host profile fields
    crit: suspicious
    conf: 0.985
    all:
      - id: sidecar-hostname-field
      - id: sidecar-fqdn-field
      - id: objectives/supply-chain/recon-exfil/oast::user-field-raw
      - id: objectives/supply-chain/recon-exfil/oast::pwd-field-raw

  - id: curl-oast-host-profiling
    desc: Registry sidecar form-posts host profile to OAST
    crit: hostile
    conf: 0.995
    mbc: "E1041"
    all:
      - id: sidecar-curl-data-urlencode
      - id: objectives/supply-chain/metadata-anomaly/registry/hook-only::registry-preinstall-oast-pro
      - id: sidecar-host-profile-fields
    any:
      - id: sidecar-fqdn-fallback
      - id: sidecar-dnsdomainname-devnull
    needs: 1
