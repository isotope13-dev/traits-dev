    crit: hostile
    conf: 0.97
    attack: "T1041"
    for: [javascript]
    all:
      - id: js-curl-post-command
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
      - id: objectives/supply-chain/trojanized/app/package::suspicious-stealer-discovery
  - id: ruby-dependency-confusion-oast-home-beacon
    desc: Dependency-confusion Ruby OAST home beacon
    crit: hostile
    conf: 0.99
    attack: "T1041,T1195.002"
    mbc: E1041
    for: [ruby]
    scope: archive
    all:
      - id: objectives/supply-chain/recon-exfil/import-time::ruby-dependency-confusion-marker
      - id: objectives/supply-chain/recon-exfil/import-time::ruby-oast-home-presence-url
      - id: objectives/supply-chain/recon-exfil/import-time::ruby-import-time-oast-host-profile
  # Import-time (no install hook): hex-truncated labels + Oastify DNS callback.
  - id: node-hex-label-oastify-dns-exfil
    desc: Hex-truncated labels exfiltrated via Oastify DNS
    crit: hostile
    conf: 0.98
    attack: "T1048.003,T1071.004"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: objectives/supply-chain/recon-exfil/dns::hex-encode-dns-label
      - id: node-oastify-dns-callback
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-resolve-call
  # Dual-channel OAST: same encoded label via DNS resolve and HTTP GET.
  - id: node-hex-label-oastify-dns-http-exfil
    desc: Hex-truncated labels sent over Oastify DNS and HTTP
    crit: hostile
    conf: 0.99
    attack: "T1048.003,T1071.001,T1071.004"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: objectives/supply-chain/recon-exfil/dns::hex-encode-dns-label
