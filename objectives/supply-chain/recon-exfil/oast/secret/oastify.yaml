    attack: "T1195.002"
    mbc: "E1041"
    scope: archive
    for: [javascript, package.json, archives]
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::fake-security-research
    any:
      - id: npm-postinstall-oastify-profile-query-exfil
      - id: npm-postinstall-oastify-dns-whoami-exfil
  - id: node-oastify-hostname-query-exfil
    desc: Node.js exfiltrates hostname to OASTify query path
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
