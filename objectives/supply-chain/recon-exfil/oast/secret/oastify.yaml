defaults:
  platforms: [windows, unix]
  for: [package.json]
traits:
  - id: repeated-preinstall-hooks
    desc: Registry metadata repeats preinstall hook
    crit: suspicious
    conf: 0.94
    attack: "T1195.002"
    count_min: 2
    if:
      id: metadata/package/scripts::raw-preinstall-key
  - id: curl-post
    desc: Lifecycle hook posts with curl
    crit: notable
    conf: 0.96
    attack: "T1041"
    if:
      type: text
      regex: "curl\\s+(-[a-zA-Z]+\\s+){0,4}-X\\s+POST\\b"
    unless:
      - id: well-known/tool/detection/llm-scanner/
  - id: data-urlencode
    desc: Lifecycle hook URL-encodes POST fields
    crit: suspicious
    conf: 0.97
    attack: "T1041"
    if:
      type: text
      substr: "--data-urlencode"
  - id: hostname-postfield
    desc: Lifecycle hook posts hostname field
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    if:
      type: text
      substr: "HOSTNAME=$(hostname)"
  - id: whoami-postfield
    desc: Lifecycle hook posts whoami field
    crit: suspicious
    conf: 0.97
    attack: "T1033"
    if:
      type: text
      substr: "WHOAMI=$(whoami)"
  - id: uname-postfield
    desc: Lifecycle hook posts uname field
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    if:
      type: text
      substr: "UNAME=$(uname -a)"
  - id: passwd-postfield
    desc: Lifecycle hook exfiltrates passwd field
    crit: suspicious
    conf: 0.995
    attack: "T1041"
    if:
      type: text
      substr: "PASSWD=$(cat /etc/passwd)"
  - id: hostname-oastify-subdomain
    desc: Lifecycle hook uses hostname OASTify subdomain
    crit: suspicious
    conf: 0.995
    attack: "T1048.003"
    if:
      type: text
      regex: "https?://\\$\\(hostname\\)\\.[a-z0-9]+\\.oastify\\.com"
  - id: oastify-url
    desc: Lifecycle hook posts to OASTify endpoint
    crit: suspicious
    conf: 0.96
    attack: "T1048.003"
    if:
      type: text
      regex: "https?://[a-z0-9]+\\.oastify\\.com"
  - id: passwd-file-exfil
    desc: Lifecycle hook exfiltrates /etc/passwd file
    crit: suspicious
    conf: 0.98
    attack: "T1005"
    if:
      type: text
      regex: "(content@|--upload-file\\s+|<\\s*)/etc/passwd"
  - id: curl-post-ssilent
    desc: Lifecycle hook uses silent curl POST
    crit: suspicious
    conf: 0.95
    attack: "T1041"
    if:
      type: text
      regex: "curl.{0,32}-X\\s+POST.{0,24}(-[A-Za-z]*s[A-Za-z]*S|-s\\s+-S|-S\\s+-s)"
  # Node.js inline exfil patterns (node -e with https.request)
  - id: node-oastify-hostname
    desc: Lifecycle hook references OASTify endpoint
    crit: suspicious
    conf: 0.96
    attack: "T1567"
    if:
      type: text
      substr: "oastify.com"
  - id: node-oastify-b64
    desc: "Lifecycle has base64 OASTify artifact"
    crit: suspicious
    conf: 0.97
    attack: "T1048.003"
    for: [javascript]
    if:
      type: text
      regex: "Buffer\\.from\\(.{0,40}b2FzdGlmeS5jb20"
  # execSync with system recon commands (cross-platform)
  - id: node-exec-sync-passwd
    desc: "Lifecycle uses execSync to read /etc/passwd"
    crit: suspicious
    conf: 0.98
    attack: "T1082"
    if:
      type: text
      regex: "execSync\\s*\\(['\"]cat /etc/passwd['\"]"
  - id: node-exec-sync-systeminfo
    desc: Lifecycle hook uses execSync to run systeminfo
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    if:
      type: text
      regex: "execSync\\s*\\(['\"]systeminfo['\"]"
  - id: node-payload-whoami-field
    desc: whoami field in object literal
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '\bwhoami\s*:'
  - id: node-payload-id-field
    desc: id field in object literal
    crit: component
    conf: 0.3
    for: [javascript]
    if:
      type: text
      regex: '\bid\s*:'
  - id: node-payload-platform-field
    desc: platform field in object literal
    crit: component
    conf: 0.5
    for: [javascript]
    if:
      type: text
      regex: '\bplatform\s*:'
  - id: node-payload-cwd-field
    desc: cwd field in object literal
    crit: component
    conf: 0.7
    for: [javascript]
    if:
      type: text
      regex: '\bcwd\s*:'
  - id: node-cicd-payload-fields
    desc: Payload object collects CI repository context
    crit: suspicious
    conf: 0.96
    attack: "T1082"
    for: [javascript]
    if:
      type: text
      regex: 'payload\s*=\s*\{[\s\S]{0,700}process\.env\.CI[\s\S]{0,180}process\.env\.GITHUB_REPOSITORY'
  - id: node-oastify-shopify-path
    desc: Oastify callback uses Shopify lure path
    crit: suspicious
    conf: 0.96
    attack: "T1041"
    for: [javascript]
    if:
      type: string_literal
      exact: /shopify?
  - id: node-host-query-param
    desc: URL host query parameter
    crit: component
    conf: 0.96
    attack: "T1041"
    for: [javascript]
    if:
      type: text
      substr: "?host="
  - id: node-inline-os-hostname-encode
    desc: Lifecycle script encodes inline os hostname
    crit: suspicious
    conf: 0.98
    attack: "T1082"
    for: [javascript]
    if:
      type: text
      regex: "encodeURIComponent\\(require\\(['\"]os['\"]\\)\\.hostname\\(\\)\\)"
  - id: node-config-harvest-find
    desc: Lifecycle hook hunts config and INI files
    crit: suspicious
    conf: 0.98
    attack: "T1005"
    if:
      type: value
      path: "scripts.preinstall"
      substr: 'find /tmp/home -maxdepth 4 -name "*config*" -o -name "*.json" -o -name "*.ini"'
  - id: node-config-harvest-grep
    desc: Lifecycle hook greps files for secret keywords
    crit: suspicious
    conf: 0.98
    attack: "T1005"
    if:
      type: value
      path: "scripts.preinstall"
      substr: 'grep -lE "password|pwd|connection|key"'
  - id: node-secrets-leak-post
    desc: Lifecycle hook posts to secrets leak path
    crit: suspicious
    conf: 0.97
    attack: "T1041"
    if:
      type: text
      substr: "path:'/secrets_leak',method:'POST'"
  - id: node-buffer-base64-fallback
    desc: Lifecycle hook base64 encodes captured output
    crit: suspicious
    conf: 0.96
    attack: "T1027"
    if:
      type: text
      substr: "Buffer.from(o || 'No Configs Found').toString('base64')"
  - id: js-curl-post-command
    desc: JavaScript shell curl POST command
    crit: component
    conf: 0.96
    attack: "T1041"
    for: [javascript]
    if:
      type: string_literal
      regex: "\\bcurl(\\s+-[a-zA-Z]+){0,4}\\s+-X\\s+POST\\b"
  - id: js-curl-oastify-whoami
    desc: Curl exfils whoami to OASTify
    crit: suspicious
    conf: 0.98
    attack: "T1041"
    for: [javascript]
    if:
      type: string_literal
      regex: "curl\\b.{0,240}https?://[a-z0-9-]+\\.oastify\\.com[^`'\"]{0,240}\\$\\(whoami\\)"
  - id: js-cat-etc-files-b64
    desc: Shell base64 encodes etc files
    crit: suspicious
    conf: 0.98
    attack: "T1005"
    for: [javascript]
    if:
      type: text
      regex: "cat /etc/(hosts|passwd|group).{0,360}\\|\\s*base64"
composite_rules:
  - id: node-host-profile-payload-fields
    desc: Payload object collects host identity fields
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    for: [javascript]
    all:
      - id: micro-behaviors/data/serialize/json::js-payload-object-assignment
      - id: node-payload-whoami-field
      - id: node-payload-id-field
      - id: micro-behaviors/communications/ip/endpoint::js-hostname-field
      - id: node-payload-platform-field
      - id: node-payload-cwd-field
    near_lines: 24
  - id: oastify-recon
    desc: Registry metadata exfiltrates host recon to OASTify
    crit: hostile
    conf: 0.995
    attack: "T1041"
    all:
      - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
      - id: objectives/supply-chain/impersonation/registry/snapshot::install-hooked-registry-package
      - id: curl-post
      - id: hostname-postfield
      - id: whoami-postfield
      - id: uname-postfield
      - id: hostname-oastify-subdomain
    any:
      - id: data-urlencode
      - id: repeated-preinstall-hooks
  - id: passwd-oastify-exfil
    desc: Registry metadata exfiltrates passwd to OASTify
    crit: hostile
    conf: 0.999
    attack: "T1041"
    all:
      - id: oastify-recon
      - id: passwd-postfield
  - id: curl-oastify-passwd-exfil
    desc: Preinstall curl exfiltrates passwd to OASTify
    crit: hostile
    conf: 0.998
    attack: "T1041"
    all:
      - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
      - id: objectives/supply-chain/impersonation/registry/snapshot::install-hooked-registry-package
      - id: curl-post
      - id: oastify-url
      - id: passwd-file-exfil
    any:
      - id: data-urlencode
      - id: curl-post-ssilent
  - id: node-oastify-recon
    desc: Node.js preinstall exfiltrates sysinfo to OASTify
    crit: hostile
    conf: 0.98
    attack: "T1041"
    mbc: "E1041"
    all:
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-lifecycle-node-e
      - id: node-oastify-hostname
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::os-platform-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::os-arch-call
      - id: micro-behaviors/process/user/query::os-userinfo-call
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-lookup-call
      - id: micro-behaviors/communications/http/request/client::https-request
      - id: micro-behaviors/data/encode/url::querystring-stringify-call
    needs: 2
  - id: node-oastify-dns-sidecar
    desc: Node.js sidecar resolves base64 OASTify domain
    crit: hostile
    conf: 0.99
    attack: "T1195.002"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: node-oastify-b64
      - id: micro-behaviors/communications/dns/lookup/resolver::require-dns
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-resolve4
    any:
      - id: metadata/file/metrics::javascript-small-file-5k
      - id: objectives/exfiltration/oob/endpoint::oastify
  - id: node-json-base64-profile-payload
    desc: Node encodes host-identifying JSON as base64
    crit: suspicious
    conf: 0.96
    attack: "T1027"
    for: [javascript]
    near_bytes: 800
    needs: 2
    all:
      - id: micro-behaviors/data/serialize/json::json-stringify-call
      - id: micro-behaviors/data/encode/base64::node-buffer-base64-encode
    any:
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: micro-behaviors/process/user/query::os-userinfo-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::process-cwd-call
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-node-read
  - id: node-oastify-https-profile-exfil
    desc: Node exfiltrates base64 host profile to Oastify over HTTPS
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: micro-behaviors/communications/http/request/client::https-get
      - id: node-json-base64-profile-payload
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-node-read
      - id: micro-behaviors/process/user/query::os-userinfo-call
      - id: objectives/discovery/system/fingerprint/user::user-info
  - id: node-oastify-http-profile-query-exfil
    desc: Node sends host profile query to Oastify
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: micro-behaviors/communications/http/request/client::http-request
      - id: micro-behaviors/communications/http/request/client::request-end-call
      - id: objectives/discovery/system/fingerprint/hardware::node-data-aggregation
    any:
      - id: objectives/supply-chain/recon-exfil/host-profile/victim::npm-victim-id-recon
      - id: micro-behaviors/process/user/query::os-userinfo-call
      - id: micro-behaviors/process/user/query::os-userinfo-call
  - id: node-oastify-dns-callback
    desc: Node sends DNS callback to Oastify
    crit: suspicious
    conf: 0.94
    attack: "T1071.004"
    for: [javascript]
    all:
      - id: objectives/exfiltration/oob/endpoint::oastify
    any:
      - id: micro-behaviors/communications/dns/lookup/resolver::require-dns-inline-lookup-ast
      - id: micro-behaviors/communications/dns/lookup/resolver::node-dns-lookup
  - id: npm-preinstall-oast-dns-hostname
    desc: npm preinstall sends hostname through OAST DNS callback
    crit: hostile
    conf: 0.995
    attack: "T1195.002, T1048.003, T1082"
    mbc: E1041
    for: [npm]
    scope: archive
    all:
    - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
    - id: node-oastify-dns-callback
    - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
  - id: npm-postinstall-node-oastify-profile-exfil
    desc: npm postinstall sidecar exfiltrates host profile to Oastify
    crit: hostile
    conf: 0.995
    attack: "T1195.002"
    mbc: "E1041"
    scope: archive
    for: [javascript, package.json, npm]
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: node-oastify-https-profile-exfil
    any:
      - id: node-oastify-dns-callback
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-node-read
  - id: npm-postinstall-node-oastify-query-exfil
    desc: npm postinstall exfils host profile to Oastify
    crit: hostile
    conf: 0.995
    attack: "T1195.002"
    mbc: "E1041"
    scope: archive
    for: [javascript, package.json, npm]
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: node-oastify-http-profile-query-exfil
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: npm-postinstall-node-oastify-dns-profile-exfil
    desc: npm postinstall exfils host profile through Oastify DNS
    crit: hostile
    conf: 0.995
    attack: "T1195.002,T1071.004"
    mbc: "E1041"
    scope: archive
    for: [javascript, package.json, npm]
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: node-oastify-dns-callback
      - id: micro-behaviors/os/sysinfo/hostname::os-hostname-call
      - id: micro-behaviors/process/user/query::os-userinfo-call
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: node-oastify-config-secret-exfil
    desc: Inline npm hook steals config secrets to OASTify
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
    all:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: node-oastify-hostname
      - id: node-config-harvest-find
      - id: node-config-harvest-grep
    any:
      - id: node-secrets-leak-post
      - id: node-buffer-base64-fallback
  - id: node-oob-sysinfo-exfil
    desc: Node.js preinstall collects system fingerprint
    crit: suspicious
    conf: 0.94
    attack: "T1082"
    all:
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-lifecycle-node-e
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::os-platform-call
      - id: micro-behaviors/os/sysinfo/platform/runtime::os-arch-call
      - id: micro-behaviors/process/user/query::os-userinfo-call
    needs: 2
  - id: node-exec-sync-cross-platform-recon
    desc: Node.js preinstall runs cross-platform system recon via execSync
    crit: hostile
    conf: 0.97
    attack: "T1082"
    mbc: "E1041"
    all:
      - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
      - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-lifecycle-node-e
      - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
      - id: micro-behaviors/os/sysinfo/platform/runtime::js-platform-win32-check
    any:
      - id: node-exec-sync-passwd
      - id: node-exec-sync-systeminfo
  - id: npm-postinstall-oastify-host-identity-exfil
    desc: npm postinstall exfils host identity to OASTify
    crit: hostile
    conf: 0.99
    attack: "T1041"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: metadata/package/files/included::postinstall-js-basename
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: micro-behaviors/os/sysinfo/hostname::hostname-cmd
      - id: objectives/discovery/account/enum::whoami
      - id: micro-behaviors/communications/http/request/client::https-get
  - id: npm-postinstall-oastify-profile-query-exfil
