    attack: "T1041"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: metadata/package/files/included::postinstall-js-basename
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: micro-behaviors/communications/http/request/client::https-get
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: micro-behaviors/data/encode/url::urlsearchparams-constructor
      - id: node-host-profile-payload-fields
    any:
      - id: node-cicd-payload-fields
      - id: node-oastify-shopify-path
      - id: micro-behaviors/os/env/vars/cicd/
  - id: npm-postinstall-oastify-dns-whoami-exfil
    desc: npm postinstall exfils whoami through Oastify DNS
    crit: hostile
    conf: 0.995
    attack: "T1048.003"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: metadata/package/files/included::postinstall-js-basename
      - id: objectives/exfiltration/dns/encoded::js-oastify-template-subdomain-exfil
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
    any:
      - id: node-host-profile-payload-fields
      - id: micro-behaviors/os/env/vars/cicd/
  - id: npm-security-research-oastify-exfil
    desc: Security research npm package exfils to Oastify
