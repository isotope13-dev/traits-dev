defaults:
  platforms: [windows, unix]
  for: [package.json, pkginfo]
traits:
  - id: repeated-preinstall-hooks
    desc: Registry metadata repeats preinstall hook
    crit: suspicious
    conf: 0.94
    attack: "T1195.002"
    count_min: 2
    if:
      id: metadata/package/fields/scripts::raw-preinstall-key
  - id: curl-post
    desc: Lifecycle hook posts with curl
    crit: suspicious
    conf: 0.96
    attack: "T1041"
    if:
      type: text
      regex: "curl\\s+(-[a-zA-Z]+\\s+){0,4}-X\\s+POST\\b"
  - id: data-urlencode
    desc: Lifecycle hook URL-encodes POST fields
    crit: suspicious
    conf: 0.97
    attack: "T1041"
    if:
      type: text
      substr: "--data-urlencode"
  - id: hostname-postfield
    desc: Lifecycle hook posts hostname field
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    if:
      type: text
      substr: "HOSTNAME=$(hostname)"
  - id: whoami-postfield
    desc: Lifecycle hook posts whoami field
    crit: suspicious
    conf: 0.97
    attack: "T1033"
    if:
      type: text
      substr: "WHOAMI=$(whoami)"
  - id: uname-postfield
    desc: Lifecycle hook posts uname field
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    if:
      type: text
      substr: "UNAME=$(uname -a)"
  - id: passwd-postfield
    desc: Lifecycle hook exfiltrates passwd field
    crit: suspicious
    conf: 0.995
    attack: "T1041"
    if:
      type: text
      substr: "PASSWD=$(cat /etc/passwd)"
  - id: hostname-oastify-subdomain
    desc: Lifecycle hook uses hostname OASTify subdomain
    crit: suspicious
    conf: 0.995
    attack: "T1048.003"
    if:
      type: text
      regex: "https?://\\$\\(hostname\\)\\.[a-z0-9]+\\.oastify\\.com"
  - id: oastify-url
    desc: Lifecycle hook posts to OASTify endpoint
    crit: suspicious
    conf: 0.96
    attack: "T1048.003"
    if:
      type: text
      regex: "https?://[a-z0-9]+\\.oastify\\.com"
  - id: passwd-file-exfil
    desc: Lifecycle hook exfiltrates /etc/passwd file
    crit: suspicious
    conf: 0.98
    attack: "T1005"
    if:
      type: text
      regex: "(content@|--upload-file\\s+|<\\s*)/etc/passwd"
  - id: curl-post-ssilent
    desc: Lifecycle hook uses silent curl POST
    crit: suspicious
    conf: 0.95
    attack: "T1041"
    if:
      type: text
      regex: "curl.{0,32}-X\\s+POST.{0,24}(-[A-Za-z]*s[A-Za-z]*S|-s\\s+-S|-S\\s+-s)"
  # Node.js inline exfil patterns (node -e with https.request)
  - id: node-oastify-hostname
    desc: Lifecycle hook references oastify.com hostname
    crit: suspicious
    conf: 0.96
    attack: "T1567"
    if:
      type: text
      substr: "oastify.com"
  - id: node-os-platform
    desc: Lifecycle script calls os.platform()
    crit: component
    conf: 0.88
    attack: "T1082"
    if:
      type: text
      substr: "os.platform()"
  - id: node-os-arch
    desc: Lifecycle script calls os.arch()
    crit: component
    conf: 0.88
    attack: "T1082"
    if:
      type: text
      substr: "os.arch()"
  - id: node-os-userinfo
    desc: Lifecycle script calls os.userInfo()
    crit: component
    conf: 0.9
    attack: "T1033"
    if:
      type: text
      substr: "os.userInfo()"
  - id: node-dns-lookup
    desc: Lifecycle script performs dns.lookup()
    crit: suspicious
    conf: 0.88
    attack: "T1071.004"
    if:
      type: text
      substr: "dns.lookup("
  - id: node-dns-resolve4
    desc: Lifecycle script performs dns.resolve4()
    crit: suspicious
    conf: 0.9
    attack: "T1071.004"
    for: [javascript]
    if:
      type: text
      substr: "dns.resolve4("
  - id: node-oastify-b64
    desc: Lifecycle script contains base64 OASTify marker
    crit: suspicious
    conf: 0.97
    attack: "T1048.003"
    for: [javascript]
    if:
      type: text
      regex: "Buffer\\.from\\(.{0,40}b2FzdGlmeS5jb20"
  - id: node-https-request
    desc: Lifecycle script makes https.request()
    crit: component
    conf: 0.85
    attack: "T1071.001"
    if:
      type: text
      substr: ".request({hostname:"
  # execSync with system recon commands (cross-platform)
  - id: node-exec-sync-passwd
    desc: Lifecycle hook uses execSync to read /etc/passwd
    crit: suspicious
    conf: 0.98
    attack: "T1082"
    if:
      type: text
      regex: "execSync\\s*\\(['\"]cat /etc/passwd['\"]"
  - id: node-exec-sync-systeminfo
    desc: Lifecycle hook uses execSync to run systeminfo
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    if:
      type: text
      regex: "execSync\\s*\\(['\"]systeminfo['\"]"
  - id: node-win32-platform-branch
    desc: Lifecycle hook branches on win32 platform check
    crit: component
    conf: 0.85
    attack: "T1082"
    if:
      type: text
      substr: "platform==='win32'"
  - id: node-exec-sync-require
    desc: Lifecycle hook destructures execSync from child_process
    crit: suspicious
    conf: 0.92
    attack: "T1059.007"
    if:
      type: text
      regex: "\\{execSync\\}\\s*=\\s*require\\('child_process'\\)"
  - id: node-querystring-post
    desc: Lifecycle hook encodes POST data with querystring.stringify
    crit: component
    conf: 0.87
    attack: "T1041"
    if:
      type: text
      substr: "querystring.stringify("
  - id: node-host-query-param
    desc: Lifecycle script exfils hostname query field
    crit: suspicious
    conf: 0.96
    attack: "T1041"
    for: [javascript]
    if:
      type: text
      substr: "?host="
  - id: node-inline-os-hostname-encode
    desc: Lifecycle script encodes inline os hostname
    crit: suspicious
    conf: 0.98
    attack: "T1082"
    for: [javascript]
    if:
      type: text
      regex: "encodeURIComponent\\(require\\(['\"]os['\"]\\)\\.hostname\\(\\)\\)"
  - id: node-config-harvest-find
    desc: Lifecycle hook hunts config and INI files
    crit: suspicious
    conf: 0.98
    attack: "T1005"
    if:
      type: kv
      path: "scripts.preinstall"
      substr: 'find /tmp/home -maxdepth 4 -name "*config*" -o -name "*.json" -o -name "*.ini"'
  - id: node-config-harvest-grep
    desc: Lifecycle hook greps files for secret keywords
    crit: suspicious
    conf: 0.98
    attack: "T1005"
    if:
      type: kv
      path: "scripts.preinstall"
      substr: 'grep -lE "password|pwd|connection|key"'
  - id: node-secrets-leak-post
    desc: Lifecycle hook posts to secrets leak path
    crit: suspicious
    conf: 0.97
    attack: "T1041"
    if:
      type: text
      substr: "path:'/secrets_leak',method:'POST'"
  - id: node-buffer-base64-fallback
    desc: Lifecycle hook base64 encodes captured output
    crit: suspicious
    conf: 0.96
    attack: "T1027"
    if:
      type: text
      substr: "Buffer.from(o || 'No Configs Found').toString('base64')"
  - id: js-curl-post-command
    desc: JavaScript shell curl POST command
    crit: suspicious
    conf: 0.96
    attack: "T1041"
    for: [javascript]
    if:
      type: string_literal
      regex: "\\bcurl\\s+-X\\s+POST\\b"
  - id: js-shell-subst-user-pwd
    desc: Shell substitution leaks user and cwd
    crit: suspicious
    conf: 0.97
    attack: "T1033"
    for: [javascript]
    if:
      type: string_literal
      regex: "\\$\\(whoami\\).{0,160}\\$\\(pwd\\)"
  - id: js-curl-oastify-whoami
    desc: Curl exfils whoami to OASTify
    crit: suspicious
    conf: 0.98
    attack: "T1041"
    for: [javascript]
    if:
      type: string_literal
      regex: "curl\\b.{0,240}https?://[a-z0-9-]+\\.oastify\\.com[^`'\"]{0,240}\\$\\(whoami\\)"
  - id: js-cat-etc-files-b64
    desc: Shell base64 encodes etc files
    crit: suspicious
    conf: 0.98
    attack: "T1005"
    for: [javascript]
    if:
      type: text
      regex: "cat /etc/(hosts|passwd|group).{0,360}\\|\\s*base64"
composite_rules:
  - id: oastify-recon
    desc: Registry metadata exfiltrates host recon to OASTify
    crit: hostile
    conf: 0.995
    attack: "T1041"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
      - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::install-hooked-registry-package
      - id: curl-post
      - id: hostname-postfield
      - id: whoami-postfield
      - id: uname-postfield
      - id: hostname-oastify-subdomain
    any:
      - id: data-urlencode
      - id: repeated-preinstall-hooks
  - id: passwd-oastify-exfil
    desc: Registry metadata exfiltrates passwd to OASTify
    crit: hostile
    conf: 0.999
    attack: "T1041"
    all:
      - id: oastify-recon
      - id: passwd-postfield
  - id: curl-oastify-passwd-exfil
    desc: Preinstall curl exfiltrates passwd to OASTify
    crit: hostile
    conf: 0.998
    attack: "T1041"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
      - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::install-hooked-registry-package
      - id: curl-post
      - id: oastify-url
      - id: passwd-file-exfil
    any:
      - id: data-urlencode
      - id: curl-post-ssilent
  - id: node-oastify-recon
    desc: Node.js preinstall exfiltrates sysinfo to OASTify
    crit: hostile
    conf: 0.98
    attack: "T1041"
    mbc: "E1041"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-lifecycle-node-e
      - id: node-oastify-hostname
    any:
      - id: node-os-platform
      - id: node-os-arch
      - id: node-os-userinfo
      - id: node-dns-lookup
      - id: node-https-request
      - id: node-querystring-post
    needs: 2
  - id: node-oastify-dns-sidecar
    desc: Node.js sidecar resolves base64 OASTify domain
    crit: hostile
    conf: 0.99
    attack: "T1195.002"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: node-oastify-b64
      - id: micro-behaviors/communications/dns/lookup/resolver::require-dns
      - id: node-dns-resolve4
    any:
      - id: objectives/supply-chain/metadata-anomaly/package/npm::small-file-5k
      - id: objectives/exfiltration/oob/endpoint::oastify
  - id: node-oastify-config-secret-exfil
    desc: Inline npm hook steals config secrets to OASTify
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
    all:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: node-oastify-hostname
      - id: node-config-harvest-find
      - id: node-config-harvest-grep
    any:
      - id: node-secrets-leak-post
      - id: node-buffer-base64-fallback
  - id: node-oob-sysinfo-exfil
    desc: Node.js preinstall collects system fingerprint
    crit: suspicious
    conf: 0.94
    attack: "T1082"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-lifecycle-node-e
    any:
      - id: node-os-platform
      - id: node-os-arch
      - id: node-os-userinfo
    needs: 2
  - id: node-exec-sync-cross-platform-recon
    desc: Node.js preinstall runs cross-platform system recon via execSync
    crit: hostile
    conf: 0.97
    attack: "T1082"
    mbc: "E1041"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::registry-metadata-json
      - id: objectives/supply-chain/metadata-anomaly/registry/snapshot::versioned-lifecycle-node-e
      - id: node-exec-sync-require
      - id: node-win32-platform-branch
    any:
      - id: node-exec-sync-passwd
      - id: node-exec-sync-systeminfo
  - id: npm-postinstall-oastify-host-identity-exfil
    desc: npm postinstall exfils host identity to OASTify
    crit: hostile
    conf: 0.99
    attack: "T1041"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: objectives/supply-chain/install-hook/scripts/hook-file::postinstall-js-filename
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: micro-behaviors/os/sysinfo/hostname::hostname-cmd
      - id: objectives/discovery/account/enum::whoami
      - id: micro-behaviors/communications/http/request/client::https-get
  - id: node-oastify-hostname-query-exfil
    desc: Node.js exfiltrates hostname to OASTify query path
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: micro-behaviors/communications/http/request/client::https-request
      - id: node-host-query-param
      - id: node-inline-os-hostname-encode
  - id: node-curl-oastify-container-secret-exfil
    desc: Node curl exfils container secrets to OASTify
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: js-curl-post-command
      - id: js-cat-etc-files-b64
    any:
      - id: micro-behaviors/os/container/runtime::serviceaccount-files
      - id: js-shell-subst-user-pwd
  - id: node-curl-oastify-whoami-exfil
    desc: Node child_process exfils whoami to OASTify
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
    for: [javascript]
    all:
      - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
      - id: objectives/exfiltration/oob/endpoint::oastify
      - id: js-curl-oastify-whoami
