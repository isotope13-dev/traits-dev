defaults:
  for: [manifests]
  platforms: [unix, windows]
traits:
  - id: preinstall-curl-data-urlencode-info
    desc: Preinstall hook posts info via curl --data-urlencode
    crit: suspicious
    conf: 0.96
    attack: "T1041"
    if:
      type: text
      regex: 'preinstall"\s*:\s*"curl\s+.{0,80}--data-urlencode\s+\\"info='
  - id: preinstall-oast-pro-http
    desc: Preinstall hook targets cleartext oast.pro callback
    crit: suspicious
    conf: 0.98
    attack: "T1048.003"
    if:
      type: text
      regex: 'http://[a-z0-9]{12,}\.oast\.pro'
  - id: preinstall-hostname-whoami-pwd
    desc: Preinstall hook collects hostname, whoami, and pwd
    crit: suspicious
    conf: 0.97
    attack: "T1082"
    if:
      type: text
      regex: '"preinstall"\s*:\s*"[^"\n]{0,120}hostname\s*&&\s*whoami\s*&&\s*pwd'
  - id: preinstall-info-field-hostname-whoami-pwd
    desc: Preinstall info field captures host user cwd
    crit: suspicious
    conf: 0.99
    attack: "T1082"
    if:
      type: text
      substr: 'info=$(hostname && whoami && pwd)'
  - id: preinstall-shell-subst-oast-pro
    desc: Shell-subst oast.pro callback
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\$\(hostname\s*&&\s*whoami\s*&&\s*pwd\).{0,120}oast\.pro'
composite_rules:
  - id: npm-preinstall-oast-probe
    desc: npm preinstall performs OAST callback during install
    crit: suspicious
    conf: 0.97
    attack: "T1195.002"
    all:
      - id: preinstall-curl-data-urlencode-info
      - id: preinstall-oast-pro-http
      - id: preinstall-shell-subst-oast-pro
  - id: npm-preinstall-oast-system-info-exfil
    desc: npm preinstall exfiltrates host identity and working directory to OAST
    crit: hostile
    conf: 0.995
    attack: "T1041"
    mbc: "E1041"
    all:
      - id: npm-preinstall-oast-probe
    any:
      - id: preinstall-hostname-whoami-pwd
      - id: preinstall-info-field-hostname-whoami-pwd
