# Detect npm install-hook payloads that beacon via fetch() to OAST/Collaborator
# endpoints (e.g. ZivyeLab collaborator hosts used in bug-bounty PoC drops).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json]
  attack: T1195.002
  mbc: E1041

composite_rules:
  # Archive-scope: lifecycle hook runs a local Node script that also beacons
  # to a known OOB/collaborator endpoint — classic install-time reachability PoC.
  - id: npm-preinstall-node-fetch-oob-beacon
    desc: npm preinstall Node script beacons to OOB endpoint
    crit: hostile
    conf: 0.97
    scope: archive
    for: [javascript, typescript, package.json, npm]
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
    unless:
      - id: metadata/package/testing/harness/runtime/

  # Same surface labeled as research/PoC in the manifest — still an install-time
  # hostile beacon, not a legitimate dependency.
  - id: npm-poc-preinstall-oob-beacon
    desc: PoC-labeled package beacons to OOB via preinstall
    crit: hostile
    conf: 0.96
    scope: archive
    for: [javascript, typescript, package.json, npm]
    all:
      - id: objectives/supply-chain/impersonation/manifest/attack-label::bug-bounty-marker-2
      - id: objectives/supply-chain/install-hook/package/direct-url::preinstall-node-index-hook
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
    unless:
      - id: metadata/package/testing/harness/runtime/
