defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
- id: host-user-chain
  desc: Shell chains hostname and whoami
  crit: suspicious
  conf: 0.94
  attack: "T1082"
  if:
    type: value
    path: scripts.preinstall
    regex: 'hostname\s*&&\s*whoami'
- id: host-user-pwd-chain
  desc: Shell chains hostname whoami and pwd
  crit: suspicious
  conf: 0.97
  attack: "T1082"
  if:
    type: value
    path: scripts.preinstall
    regex: 'hostname\s*&&\s*whoami\s*&&\s*pwd'
- id: interactsh-oast-domain-main
  desc: Preinstall references common OAST TLDs
  crit: suspicious
  conf: 0.96
  attack: "T1048"
  if:
    type: value
    path: scripts.preinstall
    regex: 'oast\.(pro|live|fun)\b'
- id: interactsh-oast-domain-alt
  desc: Preinstall references alternate OAST TLDs
  crit: suspicious
  conf: 0.96
  attack: "T1048"
  if:
    type: value
    path: scripts.preinstall
    regex: 'oast\.(site|online|me)\b'
- id: curl-command
  desc: Preinstall invokes curl
  crit: suspicious
  conf: 0.9
  attack: "T1041"
  if:
    type: value
    path: scripts.preinstall
    regex: 'curl\b'
  unless:
  - id: metadata/package/scripts/
- id: curl-data-urlencode-info-host-user
  desc: Preinstall posts host user info
  crit: suspicious
  conf: 0.98
  attack: "T1041"
  if:
    type: value
    path: scripts.preinstall
    regex: '--data-urlencode\s+"?info=\$\(hostname\s*&&\s*whoami\)'
- id: curl-data-urlencode-info-field
  desc: Preinstall posts aggregated info field
  crit: component
  conf: 0.94
  attack: "T1041"
  if:
    type: value
    path: scripts.preinstall
    regex: '--data-urlencode\s+"?info=\$\('
- id: curl-data-urlencode-hostname-field
  desc: Preinstall posts hostname field
  crit: suspicious
  conf: 0.98
  attack: "T1082"
  if:
    type: value
    path: scripts.preinstall
    regex: '--data-urlencode\s+"?hostname=\$\(hostname\)'
- id: curl-data-urlencode-user-field
  desc: Preinstall posts user field
  crit: suspicious
  conf: 0.98
  attack: "T1033"
  if:
    type: value
    path: scripts.preinstall
    regex: '--data-urlencode\s+"?user=\$\(whoami\)'
- id: curl-data-urlencode-pwd-field
  desc: Preinstall posts cwd field
  crit: suspicious
  conf: 0.98
  attack: "T1083"
  if:
    type: value
    path: scripts.preinstall
    regex: '--data-urlencode\s+"?pwd=\$\(pwd\)'
- id: curl-data-urlencode-fqdn-field
  desc: Preinstall posts FQDN field
  crit: suspicious
  conf: 0.98
  attack: "T1082"
  if:
    type: value
    path: scripts.preinstall
    regex: '--data-urlencode\s+"?fqdn=\$\(hostname\s+-f'
- id: curl-data-urlencode-domain-field
  desc: Preinstall posts DNS domain field
  crit: suspicious
  conf: 0.98
  attack: "T1082"
  if:
    type: value
    path: scripts.preinstall
    regex: '--data-urlencode\s+"?domain=\$\(dnsdomainname'
- id: hostname-fqdn-fallback
  desc: Preinstall falls back from FQDN to hostname
  crit: suspicious
  conf: 0.96
  attack: "T1082"
  if:
    type: value
    path: scripts.preinstall
    regex: 'hostname\s+-f.{0,20}\|\|.{0,20}hostname'
- id: dnsdomainname-devnull
  desc: Preinstall hides dnsdomainname errors
  crit: suspicious
  conf: 0.95
  attack: "T1082"
  if:
    type: value
    path: scripts.preinstall
    regex: 'dnsdomainname\s+2>/dev/null'
- id: curl-stderr-devnull
  desc: Curl suppresses stderr to devnull
  crit: suspicious
  conf: 0.9
  attack: "T1562"
  if:
    type: value
    path: scripts.preinstall
    regex: 'curl.{0,220}2>/dev/null'
- id: powershell-fallback
  desc: Preinstall falls back to PowerShell
  crit: suspicious
  conf: 0.96
  attack: "T1059.001"
  if:
    type: value
    path: scripts.preinstall
    regex: '\|\|\s*powershell\s+-Command\b'
- id: curl-to-powershell-fallback
  desc: Preinstall chains curl to PowerShell
  crit: suspicious
  conf: 0.97
  attack: "T1059.001"
  if:
    type: value
    path: scripts.preinstall
    regex: 'curl.{0,180}\|\|\s*powershell\s+-Command\b'
- id: invoke-webrequest
  desc: Preinstall invokes web request
  crit: suspicious
  conf: 0.9
  attack: "T1041"
  if:
    type: value
    path: scripts.preinstall
    substr: Invoke-WebRequest
- id: powershell-post-method
  desc: PowerShell request uses POST
  crit: component
  conf: 0.9
  attack: "T1041"
  if:
    type: value
    path: scripts.preinstall
    regex: '-Method\s+POST'
- id: powershell-hostname-call
  desc: PowerShell calls hostname command
  crit: component
  conf: 0.88
  attack: "T1082"
  if:
    type: value
    path: scripts.preinstall
    substr: hostname)
- id: powershell-whoami-call
  desc: PowerShell calls whoami command
  crit: component
  conf: 0.88
  attack: "T1033"
  if:
    type: value
    path: scripts.preinstall
    substr: whoami)
- id: powershell-info-body
  desc: PowerShell posts info body
  crit: component
  conf: 0.92
  attack: "T1041"
  if:
    type: value
    path: scripts.preinstall
    regex: "-Body\\s+\\('info='\\s*\\+\\s*\\$info\\)"
- id: powershell-usebasicparsing
  desc: PowerShell request uses basic parsing
  crit: suspicious
  conf: 0.92
  attack: "T1071.001"
  if:
    type: value
    path: scripts.preinstall
    regex: '-UseBasicParsing\b'
composite_rules:
- id: interactsh-oast-domain
  desc: Preinstall references interactsh OAST
  crit: suspicious
  conf: 0.96
  any:
  - id: interactsh-oast-domain-main
  - id: interactsh-oast-domain-alt
- id: cross-platform-preinstall-http-exfil
  desc: Preinstall uses shell and PowerShell HTTP exfil
  crit: suspicious
  conf: 0.98
  attack: "T1041"
  all:
  - id: curl-to-powershell-fallback
  - id: invoke-webrequest
  - id: powershell-post-method
  any:
  - id: curl-stderr-devnull
  - id: powershell-usebasicparsing
- id: curl-host-user-oob-exfil
  desc: Curl exfiltrates host user to OOB
  crit: suspicious
  conf: 0.96
  attack: "T1041"
  all:
  - id: curl-command
  - id: host-user-chain
  - id: interactsh-oast-domain
- id: curl-host-profile-oob-exfil
  desc: Curl exfiltrates host profile to OOB
  crit: hostile
  conf: 0.98
  attack: "T1041"
  all:
  - id: curl-command
  - id: interactsh-oast-domain
  - id: curl-data-urlencode-info-field
  - id: host-user-pwd-chain
- id: powershell-host-user-post-exfil
  desc: PowerShell posts host user info
  crit: suspicious
  conf: 0.97
  attack: "T1041"
  all:
  - id: invoke-webrequest
  - id: powershell-post-method
  - id: powershell-hostname-call
  - id: powershell-whoami-call
  - id: powershell-info-body
- id: npm-preinstall-interactsh-host-recon
  desc: npm preinstall exfiltrates host user to OOB
  crit: hostile
  conf: 0.995
  attack: "T1195.002"
  mbc: "E1041"
  all:
  - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
  - id: interactsh-oast-domain
  - id: host-user-chain
  - id: curl-data-urlencode-info-host-user
  any:
  - id: curl-host-user-oob-exfil
  - id: powershell-host-user-post-exfil
  - id: powershell-fallback
- id: npm-preinstall-urlencoded-host-profile-oob
  desc: npm preinstall exfiltrates host profile to OOB
  crit: hostile
  conf: 0.998
  attack: "T1195.002"
  mbc: "E1041"
  all:
  - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
  - id: interactsh-oast-domain
  - id: curl-command
  any:
  - id: curl-data-urlencode-hostname-field
  - id: curl-data-urlencode-user-field
  - id: curl-data-urlencode-pwd-field
  - id: curl-data-urlencode-fqdn-field
  - id: curl-data-urlencode-domain-field
  needs: 4
- id: npm-preinstall-cross-platform-oob-exfil
  desc: npm preinstall uses shell and PowerShell exfil
  crit: hostile
  conf: 0.995
  attack: "T1195.002"
  mbc: "E1041"
  all:
  - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
  - id: interactsh-oast-domain
  - id: host-user-chain
  - id: curl-data-urlencode-info-host-user
  - id: cross-platform-preinstall-http-exfil
  - id: powershell-host-user-post-exfil
  any:
  - id: curl-stderr-devnull
  - id: powershell-usebasicparsing
- id: npm-preinstall-host-profile-oob
  desc: npm preinstall exfiltrates hostname username and cwd to OOB
  crit: hostile
  conf: 0.998
  attack: "T1195.002"
  mbc: "E1041"
  all:
  - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
  - id: interactsh-oast-domain
  - id: curl-command
  - id: curl-data-urlencode-info-field
  - id: host-user-pwd-chain
  - id: curl-host-profile-oob-exfil
# Node variant of the OAST host-profile beacon: the preinstall references an
# interactsh OAST callback domain and reads hostname + username via the Node os
# module, then leaks them over https.get or a dns.lookup subdomain. Anchored on
# the OAST domain + recon + exfil channel (not the `node -e "const` text shape),
# so it catches the same attack written with --eval, var, or a wrapper script.
- id: npm-preinstall-node-oast-host-profile-exfil
  desc: npm preinstall exfiltrates host user to OAST via Node
  crit: hostile
  conf: 0.99
  attack: "T1195.002, T1041, T1082, T1033"
  mbc: "E1041"
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
  - id: interactsh-oast-domain
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-node-os-hostname
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-node-os-userinfo
  any:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-node-https-get
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-node-dns-lookup
