defaults:
  platforms: [unix, windows]
  for: [package.json, pkginfo]
traits:
  - id: preinstall-ip-port-url
    desc: preinstall contains IPv4 URL with port
    crit: suspicious
    conf: 0.95
    attack: "T1571"
    if:
      type: value
      path: scripts.preinstall
      regex: "https?://(\\d{1,3}\\.){3}\\d{1,3}:[1-9][0-9]{1,4}"
composite_rules:
  - id: npm-preinstall-ip-callback
    desc: npm preinstall sends callback to an IP address
    crit: hostile
    conf: 0.98
    attack: "T1195.002"
    mbc: "E1041"
    all:
      - id: metadata/package/scripts::has-preinstall-script
      - id: preinstall-ip-port-url
      - id: metadata/package/scripts::preinstall-curl
