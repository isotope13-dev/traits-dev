defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, source, manifests, documents, data]

traits:
  - id: oast-pro-callback-raw
    desc: Raw content references oast.pro callback
    crit: suspicious
    conf: 0.97
    attack: "T1048.003"
    if:
      type: raw
      regex: '[a-z0-9]{8,64}\.oast\.pro\b'

  - id: user-field-raw
    desc: Raw lifecycle content posts user field
    crit: notable
    conf: 0.96
    attack: "T1033"
    if:
      type: raw
      substr: "user=$(whoami)"

  - id: uid-field-raw
    desc: Raw lifecycle content posts numeric uid
    crit: notable
    conf: 0.96
    attack: "T1033"
    if:
      type: raw
      substr: "uid=$(id -u)"

  - id: home-field-raw
    desc: Raw lifecycle content posts HOME path
    crit: notable
    conf: 0.95
    attack: "T1083"
    if:
      type: raw
      substr: "home=$(echo $HOME)"

  - id: pwd-field-raw
    desc: Raw lifecycle content posts working directory
    crit: notable
    conf: 0.96
    attack: "T1083"
    if:
      type: raw
      substr: "pwd=$(pwd)"

composite_rules:
  - id: preinstall-host-profile-fields
    desc: Preinstall collects multiple host profile fields
    crit: suspicious
    conf: 0.985
    attack: "T1082"
    all:
      - id: user-field-raw
      - id: pwd-field-raw
    any:
      - id: uid-field-raw
      - id: home-field-raw
    needs: 1

  - id: npm-preinstall-oast-pro-host-recon
    desc: npm preinstall exfiltrates host profile to oast.pro
    crit: hostile
    conf: 0.997
    attack: "T1041"
    mbc: "E1041"
    all:
      - id: objectives/supply-chain/install-hook/scripts::has-preinstall-raw
      - id: objectives/supply-chain/recon-exfil/oast::data-urlencode
      - id: oast-pro-callback-raw
      - id: user-field-raw
      - id: pwd-field-raw
      - id: uid-field-raw
    any:
      - id: home-field-raw
