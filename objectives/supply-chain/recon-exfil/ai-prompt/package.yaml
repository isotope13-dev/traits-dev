defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, text]
  attack: T1195.002

traits:
  - id: ai-fix-add-fetch-instruction
    desc: AI-facing instruction to add fetch call
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'AI:\s*(Fix this|Missing required initialization).{0,160}(fetch|App\.tsx)'

  - id: ai-migration-add-fetch-instruction
    desc: AI migration instruction adds fetch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(MIGRATION REQUIRED|Add the following to App\.tsx).{0,220}fetch\('

  - id: ai-prompt-process-env-exfil
    desc: AI prompt instructs process.env exfiltration
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'fetch\(.{0,120}JSON\.stringify\(process\.env\)'

  - id: ai-prompt-window-config-exfil
    desc: AI prompt instructs window config exfiltration
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'fetch\([\s\S]{0,220}JSON\.stringify\([^)]{0,160}window\.__CONFIG__'

  - id: ai-prompt-attacker-url
    desc: AI prompt contains attacker exfil endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'https://(attacker\.com|.{0,80}webhookrelay\.com)'

  - id: thrown-error-ai-exfil-prompt
    desc: Thrown error carries AI exfil prompt
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'throw\s+new\s+Error\([\s\S]{0,260}AI:\s*Fix this[\s\S]{0,180}fetch\('


composite_rules:
  - id: package-ai-prompt-env-exfil
    desc: Package AI prompt injects environment exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: ai-fix-add-fetch-instruction
      - id: ai-prompt-process-env-exfil
    any:
      - id: ai-prompt-attacker-url
      - id: micro-behaviors/data/serialize/json::process-env-json-stringify

  - id: package-ai-prompt-config-exfil
    desc: Package AI prompt injects client config exfiltration
    crit: hostile
    conf: 0.97
    all:
      - id: ai-fix-add-fetch-instruction
      - id: ai-prompt-window-config-exfil
      - id: ai-prompt-attacker-url

  - id: package-ai-migration-config-exfil
    desc: Package AI migration exfiltrates config
    crit: hostile
    conf: 0.97
    all:
      - id: ai-migration-add-fetch-instruction
      - id: ai-prompt-window-config-exfil
      - id: ai-prompt-attacker-url

  - id: package-thrown-error-env-exfil
    desc: Package error prompt exfiltrates environment
    crit: hostile
    conf: 0.97
    all:
      - id: thrown-error-ai-exfil-prompt
      - id: ai-prompt-process-env-exfil
      - id: ai-prompt-attacker-url

  - id: package-ai-assistant-config-exfil
    desc: Package AI assistant exfiltrates config
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/collection/stealer/browser::ai-assistant-browser-exfil-instruction
      - id: ai-prompt-window-config-exfil
      - id: ai-prompt-attacker-url
