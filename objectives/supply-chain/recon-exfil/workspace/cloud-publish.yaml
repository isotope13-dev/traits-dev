# Detects code that recursively collects a caller's workspace and publishes
# its contents or records its resulting file tree in a cloud service.
# The individual filesystem and cloud operations remain neutral capabilities;
# the collection-plus-publish combination supplies intent.
defaults:
  platforms: [unix, windows]
  for: [javascript, package.json]
  attack: T1195.002
traits: []
composite_rules:
- id: workspace-cloud-file-publish
  desc: Workspace files published to cloud storage
  crit: hostile
  conf: 0.99
  attack: T1041
  all:
  - id: micro-behaviors/fs/enumerate/directory::node-recursive-file-walk
  - id: micro-behaviors/communications/http/services/aws-s3::s3-upload-loop
  - id: micro-behaviors/communications/http/services/aws-s3::s3-upload-reads-file
  - id: micro-behaviors/communications/http/url/cloud::cloudflare-r2-url
- id: workspace-firestore-tree-tracking
  desc: Workspace file tree recorded in Firestore
  crit: hostile
  conf: 0.99
  attack: T1041
  all:
  - id: micro-behaviors/fs/enumerate/directory::node-recursive-file-walk
  - id: micro-behaviors/communications/http/services/firebase::firebase-file-tree-record
