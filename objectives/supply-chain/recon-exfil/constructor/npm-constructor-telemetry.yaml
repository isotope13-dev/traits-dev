defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
  attack: T1195.002
traits:
  - id: preparewriter-basename
    desc: Package ships hidden prepare-writer helper file
    crit: suspicious
    conf: 0.9
    if:
      type: basename
      exact: prepare-writer.js
  - id: private-preparewriter-import
    desc: Imports hidden prepare-writer helper
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "require('./private/prepare-writer')"
  - id: constructor-preparewriter-call
    desc: Constructor invokes prepareWriter helper
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: constructor\s*\([^)]{0,160}\)\s*\{[\s\S]{0,320}\bprepareWriter\s*\(
  - id: npm-package-version-env
    desc: Reads npm package version from env
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: process['env']['npm_package_version']
  - id: npm-package-version-fragment-a
    desc: Obfuscated npm_package_version fragment prefix
    crit: component
    conf: 0.84
    if:
      type: string_literal
      exact: "npm_packag"
  - id: npm-package-version-fragment-b
    desc: Obfuscated npm_package_version fragment suffix
    crit: component
    conf: 0.84
    if:
      type: string_literal
      exact: "e_version"
  - id: public-ip-publicipv4
    desc: Calls publicIpv4 address lookup
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      exact: publicIpv4
  - id: public-ip-module
    desc: Imports public-ip module
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: public-ip
  - id: dotenv-module
    desc: Imports dotenv module
    crit: notable
    conf: 0.86
    if:
      type: string_literal
      exact: dotenv
  - id: dotenv-config-call
    desc: Calls dotenv.config helper
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "\\bdotenv\\s*\\.\\s*config\\s*\\(|require\\(\\s*[\"']dotenv[\"']\\s*\\)\\s*\\.\\s*config\\s*\\("
  - id: ipapi-prefix-fragment
    desc: ipapi HTTPS prefix fragment
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: "https://ip"
  - id: ipapi-domain-fragment
    desc: ipapi geolocation domain fragment
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: api.co/
  - id: ipapi-json-fragment
    desc: ipapi geolocation JSON path fragment
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: /json/
  - id: process-log-prefix
    desc: Hardcoded process-log prefix
    crit: component
    conf: 0.88
    if:
      type: string_literal
      exact: "https://pr"
  - id: process-log-middle
    desc: Hardcoded process-log Vercel domain
    crit: component
    conf: 0.88
    if:
      type: string_literal
      exact: "ocess-log.vercel.app"
  - id: ipcheck-path-fragment
    desc: Hardcoded IP check path fragment
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: /api/ipche
  - id: geo-country-name
    desc: Reads country_name geolocation field
    crit: notable
    conf: 0.88
    if:
      type: string_literal
      exact: '"country_name"'
  - id: backend-cover-message
    desc: Backend server cover message
    crit: suspicious
    conf: 0.92
    if:
      type: string_literal
      substr: Sorry, backend server is not working now
  - id: backend-cover-fragment-a
    desc: Backend cover message prefix fragment
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: "Sorry,\\x20bac"
  - id: backend-cover-fragment-b
    desc: Backend cover message middle fragment
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: "kend\\x20serve"
  - id: backend-cover-fragment-c
    desc: Backend cover message suffix fragment
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: "ing\\x20now"
  - id: backend-cover-fragment-d
    desc: Backend cover message working fragment
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: "orking"
  - id: internet-cover-message
    desc: Internet connection cover message
    crit: suspicious
    conf: 0.92
    if:
      type: string_literal
      substr: Sorry, check your internet connection
  - id: internet-cover-fragment-a
    desc: Internet cover message prefix fragment
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: "Sorry,\\x20che"
  - id: internet-cover-fragment-b
    desc: Internet cover message middle fragment
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: "ck\\x20your\\x20in"
  - id: internet-cover-fragment-c
    desc: Internet cover message connection fragment
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: "ternet\\x20con"
  - id: internet-cover-fragment-d
    desc: Internet cover message suffix fragment
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: "nection:"
composite_rules:
  - id: constructor-hidden-side-effect
    desc: Constructor triggers hidden helper side effect
    crit: suspicious
    conf: 0.98
    all:
      - id: private-preparewriter-import
      - id: constructor-preparewriter-call
  - id: npm-public-ip-profiling
    desc: NPM package resolves public IP and geolocation
    crit: suspicious
    conf: 0.97
    all:
      - id: public-ip-module
      - id: public-ip-publicipv4
      - id: ipapi-prefix-fragment
      - id: ipapi-domain-fragment
      - id: ipapi-json-fragment
  - id: process-log-vercel-endpoint
    desc: Hardcoded process-log Vercel endpoint
    crit: suspicious
    conf: 0.97
    all:
      - id: process-log-prefix
      - id: process-log-middle
    any:
      - id: ipcheck-path-fragment
      - id: geo-country-name
  - id: npm-package-version-env-obfuscated
    desc: Obfuscated npm package version read from environment
    crit: notable
    conf: 0.91
    all:
      - id: micro-behaviors/os/env/access::javascript
      - id: npm-package-version-fragment-a
      - id: npm-package-version-fragment-b
  - id: backend-cover-message-obfuscated
    desc: Obfuscated backend server cover message
    crit: suspicious
    conf: 0.9
    all:
      - id: backend-cover-fragment-a
      - id: backend-cover-fragment-b
      - id: backend-cover-fragment-c
      - id: backend-cover-fragment-d
  - id: internet-cover-message-obfuscated
    desc: Obfuscated internet connection cover message
    crit: suspicious
    conf: 0.9
    all:
      - id: internet-cover-fragment-a
      - id: internet-cover-fragment-b
      - id: internet-cover-fragment-c
      - id: internet-cover-fragment-d
  - id: npm-obfuscated-profile-exec
    desc: Obfuscated host profiling with remote eval
    crit: hostile
    conf: 0.99
    mbc: E1041
    all:
      - id: npm-public-ip-profiling
      - id: objectives/discovery/system/fingerprint/hardware::node-userinfo
      - id: process-log-vercel-endpoint
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: objectives/execution/interpreter/eval/dynamic::eval-symbol
    any:
      - id: objectives/anti-static/obfuscation/control-flow::string-table-rotator-loop
      - id: objectives/anti-static/obfuscation/string/array::constructor-string-split
  - id: npm-constructor-telemetry-exec
    desc: Constructor-triggered npm telemetry with remote eval
    crit: hostile
    conf: 0.995
    mbc: E1041
    all:
      - id: constructor-hidden-side-effect
      - id: npm-obfuscated-profile-exec
  - id: npm-hidden-helper-telemetry-stack
    desc: Hidden npm helper pairs telemetry dependencies with constructor trigger
    crit: hostile
    conf: 0.985
    all:
      - id: preparewriter-basename
      - id: constructor-hidden-side-effect
      - id: micro-behaviors/communications/http/lib/axios::axios
      - id: public-ip-module
    any:
      - id: dotenv-module
      - id: dotenv-config-call
  - id: npm-constructor-telemetry-camouflage
    desc: Logging package hides constructor telemetry
    crit: hostile
    conf: 0.99
    all:
      - id: npm-constructor-telemetry-exec
    any:
      - id: backend-cover-message
      - id: backend-cover-message-obfuscated
      - id: internet-cover-message
      - id: internet-cover-message-obfuscated
  - id: npm-hidden-helper-telemetry-camouflage
    desc: Hidden helper telemetry stack uses cover-story logging
    crit: hostile
    conf: 0.985
    all:
      - id: npm-hidden-helper-telemetry-stack
    any:
      - id: backend-cover-message
      - id: backend-cover-message-obfuscated
      - id: internet-cover-message
      - id: internet-cover-message-obfuscated
