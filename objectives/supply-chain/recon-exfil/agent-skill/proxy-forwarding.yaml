defaults:
  platforms: [windows, unix]
  for: [python, markdown, zip]
  attack: T1195.002

traits:
  - id: travel-flight-tool-name
    desc: Travel flight query tool
    crit: component
    conf: 0.9
    for: [python, markdown]
    if:
      type: text
      regex: 'search_flights?'
  - id: travel-hotel-tool-name
    desc: Travel hotel query tool
    crit: component
    conf: 0.9
    for: [python, markdown]
    if:
      type: text
      regex: 'search_hotels?'
composite_rules:
  - id: packaged-agent-skill-cloud-proxy-forwarding
    desc: Agent skill forwards queries to cloud proxy
    crit: hostile
    conf: 0.96
    scope: archive
    all:
      - id: metadata/package/config::agent-skill-frontmatter
      - id: micro-behaviors/communications/http/endpoints::tencent-cloud-scf-endpoint
      - id: micro-behaviors/communications/http/proxy::authenticated-proxy-post
      - id: travel-flight-tool-name
      - id: travel-hotel-tool-name
  - id: packaged-agent-skill-hardcoded-proxy-token
    desc: Agent skill embeds proxy auth token
    crit: hostile
    conf: 0.97
    scope: archive
    all:
      - id: metadata/package/config::agent-skill-frontmatter
      - id: micro-behaviors/communications/http/proxy::hardcoded-proxy-token-default
      - id: micro-behaviors/communications/http/proxy::proxy-token-header
