defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  attack: T1195.002
traits:
  - id: print-installed-string
    desc: Prints "installed" confirmation
    crit: suspicious
    conf: 0.85
    size_max: 50000
    if:
      type: text
      regex: \bprint\s*\(\s*["'][^"']{0,50}\binstalled\b[^"']{0,20}["']\s*\)
    unless:
      - type: text
        substr: not installed
      - type: text
        substr: is installed
      - type: text
        substr: pip install
  - id: placeholder-ellipsis
    desc: Placeholder ellipsis string
    crit: component
    conf: 0.75
    size_max: 2000
    if:
      type: string_literal
      regex: ^\.{2,}$
  - id: tiny-python-file
    desc: Tiny Python file
    crit: component
    conf: 0.8
    size_max: 100
    if:
      type: basename
      regex: \.py$
    unless:
      - type: text
        regex: ^(from\s+\S+\s+import|import\s+\S+)
      - type: text
        substr: "import *"
  - id: small-no-imports
    desc: Small Python file with no imports
    crit: component
    conf: 0.75
    size_min: 20
    size_max: 500
    if:
      type: basename
      regex: \.pyw?$
    unless:
      - type: basename
        exact: __init__.py
      - type: text
        substr: 'import '
      - type: text
        substr: 'def '
  - id: empty-file
    desc: Empty file (0 bytes)
    crit: component
    conf: 1.0
    size_max: 0
  - id: webhook-package-name
    desc: Package name contains webhook
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: webhook
      case_insensitive: true
  - id: init-py-file
    desc: __init__.py file
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: __init__.py
  - id: setup-py-file-dup
    desc: setup.py file
    crit: notable
    conf: 1.0
    if:
      type: basename
      regex: (^|_)setup\.py$
  - id: setuptools-setup-call
    desc: setuptools setup() call
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: setup
  - id: probe-print-test
    desc: Probe print with test prefix string
    crit: notable
    conf: 0.75
    size_max: 10000
    if:
      type: string_literal
      regex: ^test\s
  - id: suspicious-php-endpoint
    desc: PHP endpoint URL with beacon parameters
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      substr: .php?live=
    unless: null
  - id: version-check-url
    desc: Suspicious version check URL
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: https?://[^/]{1,120}/[Vv]ersion\.php|https?://[^/]{1,120}/[Cc]heck\.php
  - id: atexit-register-callback
    desc: atexit.register deferred execution callback
    crit: notable
    conf: 0.85
    size_max: 10000
    if:
      type: text
      regex: atexit\.register\s*\(
  - id: triple-hash-delimiter
    desc: Triple hash data delimiter
    crit: notable
    conf: 0.85
    size_max: 5000
    if:
      type: string_literal
      exact: '###'
  - id: data-concat-pattern
    desc: String concatenation with delimiter
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: =\s*\w+\s*\+\s*['\"]###['\"]\s*\+\s*\w+
  - id: urlopen-with-data
    desc: urllib.urlopen with data parameter
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: urlopen\s*\([^)]{0,120}\bdata\s*=
  - id: vid-parameter
    desc: vid= POST parameter
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      exact: vid=
  - id: install-scripts-class
    desc: install_scripts command subclass
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: class\s+\w+\(install_scripts\)
  - id: cmdclass-install-scripts
    desc: cmdclass install_scripts hook
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: >-
        ["']install_scripts["']\s*:\s*InstallScripts
  - id: hardcoded-dns-nameserver
    desc: Hardcoded Google DNS literal
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: >-
        ["']8\.8\.8\.8["']
    unless:
      - type: string_literal
        exact: --dns
  - id: dnspython-configure-false
    desc: dnspython resolver local config bypass
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: Resolver\s*\(\s*configure\s*=\s*False\s*\)
  - id: ord-hex-join-encode
    desc: ord hex join encoder
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "join\\(hex\\(ord\\(x\\)\\)\\[2:\\]\\s+for\\s+x\\s+in"
  - id: pip3-console-script
    desc: pip3 console script entry
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: "pip3 ="
  - id: b64-http-url-decode
    desc: Base64 decodes HTTP URL prefix
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: aHR0cDov
  - id: urlencode-recon-field-names
    desc: Host user directory field names
    crit: component
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: "[\"'](hostname|username|dir|mac_address)[\"']\\s*:"
  - id: setup-py-bin-env-dump
    desc: setup.py dumps env via /bin/env
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: os.popen('/bin/env')
  - id: setup-py-urlencode-env-fields
    desc: URL-encodes pwd and env fields
    crit: suspicious
    conf: 0.96
    count_min: 2
    if:
      type: text
      regex: "[\"'](pwd|env|files2w)[\"']\\s*:"
  - id: setup-py-urlencode-fs-snapshot
    desc: URL-encodes repeated directory snapshots
    crit: suspicious
    conf: 0.97
    count_min: 3
    if:
      type: text
      regex: "[\"'](files2|files3|files4|files5)[\"']\\s*:"
  - id: traktrain-req-endpoint
    desc: Traktrain req.php beacon endpoint
    crit: suspicious
    conf: 0.99
    if:
      type: string_literal
      exact: http://pt.traktrain.com/req.php
composite_rules:
  - id: urlencode-recon-params
    desc: URL-encodes host user dir fields
    crit: suspicious
    conf: 0.9
    all:
      - id: urlencode-recon-field-names
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
  - id: empty-init-webhook-package
    desc: Empty __init__.py in webhook-focused package
    crit: suspicious
    conf: 0.9
    all:
      - id: empty-file
      - id: webhook-package-name
  - id: tiny-py-by-name
    desc: Tiny .py file (by extension)
    crit: component
    conf: 0.8
    all:
      - id: metadata/file/extension::py
      - id: empty-file
  - id: init-py-no-code
    desc: Empty __init__.py stub module
    crit: component
    conf: 0.8
    all:
      - id: init-py-file
      - id: metadata/file/extension::py
      - id: empty-file
  - id: empty-init-py
    desc: Empty __init__.py in published package
    crit: component
    conf: 0.85
    all:
      - id: init-py-file
      - id: empty-file
  - id: decoy-init-py
    desc: Decoy __init__.py with install confirmation
    crit: suspicious
    conf: 0.85
    all:
      - id: init-py-file
      - id: tiny-python-file
      - id: print-installed-string
  - id: stub-placeholder-file
    desc: Stub Python file with placeholder content
    crit: suspicious
    conf: 0.85
    size_max: 200
    all:
      - id: tiny-python-file
      - id: placeholder-ellipsis
  - id: stub-squatter-module
    desc: Stub Python module with no imports
    crit: suspicious
    conf: 0.85
    size_max: 200
    all:
      - id: small-no-imports
      - id: micro-behaviors/data/control-flow/analysis::for-loop-ast
  - id: fingerprint-payload-concat
    desc: Fingerprint data concatenation
    crit: suspicious
    conf: 0.9
    all:
      - id: triple-hash-delimiter
    any:
      - id: objectives/discovery/system/
  - id: install-scripts-exec-hook
    desc: install_scripts execution hook
    crit: suspicious
    conf: 0.94
    all:
      - id: install-scripts-class
      - id: cmdclass-install-scripts
  - id: pypi-pip3-entrypoint-hijack
    desc: PyPI pip3 entry point hijack
    crit: suspicious
    conf: 0.97
    all:
      - id: pip3-console-script
      - id: objectives/supply-chain/metadata-anomaly/manifest::setup-entry-points-field
  - id: setup-py-domain-http-fallback
    desc: setup.py DNS plus HTTP fallback
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: micro-behaviors/communications/dns/lookup::dns-lookup-capability
      - id: micro-behaviors/communications/http/request::request-python
  - id: username-hex-header-exfil
    desc: Username hex exfil over HTTP header
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/discovery/account::whoami-via-rot13-subprocess
      - id: micro-behaviors/data/encode/hex::string-encode-hex
      - id: micro-behaviors/communications/http/headers::x-header-single-letter
      - id: micro-behaviors/communications/http/request::request-python
  - id: pypi-install-exfil
    desc: PyPI install-time system exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request::request-python
  - id: pypi-atexit-exfil
    desc: PyPI atexit deferred system exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: atexit-register-callback
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request::request-python
  - id: python-sysinfo-exfil
    desc: Python system info exfiltration
    crit: hostile
    conf: 0.92
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request::request-python
    unless:
      - id: metadata/build/pip::pip
  - id: python-envvar-exfil
    desc: Python environment variable exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request::request-python
    unless:
      - id: metadata/build/pip::pip
  - id: pypi-vid-exfil
    desc: PyPI VID exfiltration pattern
    crit: suspicious
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: vid-parameter
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request::request-python
  - id: pypi-oob-user-exfil
    desc: PyPI OOB callback exfiltrating user info
    crit: hostile
    conf: 0.95
    mbc: E1041
    all:
      - id: objectives/exfiltration/oob::oob-domains
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: objectives/discovery/account::username-env
  - id: pypi-install-beacon
    desc: PyPI install-time system beacon
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/install-hook/dropper::robust-setup-py
      - id: suspicious-php-endpoint
      - id: micro-behaviors/communications/http/request::request-python
      - id: objectives/supply-chain/install-hook/dropper::windows-computername-env
  - id: pypi-install-dns-oob-exfil
    desc: PyPI install hook DNS OOB exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/install-hook/dropper::robust-setup-py
      - id: install-scripts-class
      - id: hardcoded-dns-nameserver
      - id: objectives/exfiltration/oob::burpcollaborator
      - id: objectives/exfiltration/dns/tunnel::subdomain-encode
    any:
      - id: ord-hex-join-encode
      - id: pypi-pip3-entrypoint-hijack
      - id: micro-behaviors/communications/socket/connect::socket-gethostname
  - id: pypi-probe-package
    desc: PyPI typosquat probe package
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: micro-behaviors/communications/http/request::request-python
      - id: probe-print-test
  - id: pypi-install-username-exfil
    desc: PyPI install-time username exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: objectives/supply-chain/install-hook/dropper::cmdclass-install
      - id: objectives/discovery/account::whoami-via-rot13-subprocess
      - id: micro-behaviors/data/encode/hex::string-encode-hex
      - id: setup-py-domain-http-fallback
    any:
      - id: objectives/exfiltration/dns/prep::subdomain-data-encoding
      - id: username-hex-header-exfil
  - id: pypi-install-obfuscated-network-exfil
    desc: Obfuscated PyPI install-time network exfiltration
    crit: hostile
    conf: 0.97
    mbc: E1041
    attack: T1020
    all:
      - id: pypi-install-username-exfil
      - id: micro-behaviors/data/encode/rot13::python-rot13-decoder
    any:
      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
      - id: micro-behaviors/data/control-flow/error-handling::silent-socket-error-pass
  - id: pypi-sdist-fallback-stager
    desc: PyPI package relies on sdist fallback
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry-pypi::tiny-wheel-with-sdist-sidecar
      - id: objectives/supply-chain/install-hook/dropper::cmdclass-install
  - id: python-envvar-urlencode-exfil
    desc: Python environment variable urlencoded exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
      - id: micro-behaviors/communications/http/request::request-python
  - id: pypi-env-fs-snapshot-exfil
    desc: PyPI setup exfiltrates env and directory snapshots
    crit: hostile
    conf: 0.99
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: setup-py-bin-env-dump
      - id: setup-py-urlencode-env-fields
      - id: setup-py-urlencode-fs-snapshot
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-data
  - id: pypi-system-env-exfil
    desc: PyPI install-time system and environment exfiltration
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
      - id: micro-behaviors/communications/http/request::request-python
    any:
      - id: micro-behaviors/os/privilege/check::os-getuid-admin
      - id: micro-behaviors/os/privilege/check::ctypes-is-admin
      - id: objectives/discovery/network/scan::geo-lookup-service
  - id: pypi-traktrain-env-fs-exfil
    desc: PyPI setup exfiltrates env and file listings to Traktrain
    crit: hostile
    conf: 0.995
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: setup-py-bin-env-dump
      - id: setup-py-urlencode-env-fields
      - id: setup-py-urlencode-fs-snapshot
      - id: traktrain-req-endpoint
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-data
  - id: python-obfuscated-urlencode-recon-exfil
    desc: Obfuscated Python system recon exfiltration
    crit: hostile
    conf: 0.97
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: objectives/discovery/system/fingerprint/hardware::python-mac-discovery
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
      - id: micro-behaviors/communications/http/request::request-python
      - id: b64-http-url-decode
    any:
      - id: urlencode-recon-params
      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
  - id: pypi-install-obfuscated-host-profile-exfil
    desc: PyPI install hook exfils host profile via decoded URL
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/supply-chain/install-hook/dropper::robust-setup-py
      - id: objectives/discovery/system/fingerprint/hardware::python-sysinfo-multi
      - id: objectives/discovery/system/fingerprint/hardware::python-mac-discovery
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/communications/http/request::request-python
      - id: b64-http-url-decode
    any:
      - id: urlencode-recon-params
      - id: objectives/exfiltration/oob::oob-domains
      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
