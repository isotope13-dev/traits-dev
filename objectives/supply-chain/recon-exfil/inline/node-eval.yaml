# Node.js Inline Runtime Reconnaissance and Exfil
# Detects Node.js code in npm lifecycle hooks that performs system recon + exfiltration
# ATT&CK: T1059.007, T1082, T1041
# MBC: E1041
defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: suspicious
  conf: 0.85

traits:
  # === Node.js Runtime Detection in Lifecycle Hooks ===
- id: node-inline-eval
  desc: Lifecycle hook executes inline Node.js code
  crit: suspicious
  conf: 0.92
  attack: "T1059.007"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "node\\s+-e\\s*['\"]const"

- id: node-inline-eval-postinstall
  desc: postinstall executes inline Node.js code
  crit: suspicious
  conf: 0.92
  attack: "T1059.007"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "node\\s+-e\\s*['\"]const"
  unless:
  - id: metadata/package/scripts::postinstall-local-ts-subpackage-build

  # === System Reconnaissance APIs ===
- id: js-os-platform
  desc: JavaScript detects operating system platform
  crit: component
  conf: 0.88
  attack: "T1082"
  if:
    type: value
    path: "scripts.preinstall"
    substr: "os.platform()"

- id: js-os-arch
  desc: JavaScript detects CPU architecture
  crit: component
  conf: 0.88
  attack: "T1082"
  if:
    type: value
    path: "scripts.preinstall"
    substr: "os.arch()"

- id: js-require-child-process
  desc: JavaScript requires child_process module
  crit: component
  conf: 0.85
  attack: "T1059.007"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "require\\(['\"]child_process['\"]\\)"

- id: js-require-https
  desc: JavaScript requires https module
  crit: suspicious
  conf: 0.82
  attack: "T1071.001"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "require\\(['\"]https['\"]\\)"

  # === Command Execution Patterns ===
- id: js-execsync-command
  desc: JavaScript executes system command
  crit: suspicious
  conf: 0.93
  attack: "T1059.007"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "execSync\\s*\\([^)]{0,100}"

  # Cross-platform system info commands
- id: js-execsync-systeminfo
  desc: JavaScript runs Windows systeminfo command
  crit: suspicious
  conf: 0.96
  attack: "T1082"
  if:
    type: value
    path: "scripts.preinstall"
    substr: "systeminfo"

- id: js-execsync-passwd
  desc: JavaScript reads /etc/passwd file
  crit: suspicious
  conf: 0.98
  attack: "T1005"
  if:
    type: value
    path: "scripts.preinstall"
    substr: "cat /etc/passwd"

- id: js-execsync-whoami
  desc: JavaScript runs whoami command
  crit: component
  conf: 0.9
  attack: "T1033"
  if:
    type: value
    path: "scripts.preinstall"
    substr: "whoami"

  # Platform-based branching
- id: js-platform-win32-check
  desc: JavaScript branches on Windows platform
  crit: component
  conf: 0.85
  attack: "T1082"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "platform\\s*===\\s*['\"]win32['\"]"

- id: js-arch-x64-check
  desc: JavaScript checks for x64 architecture
  crit: suspicious
  conf: 0.85
  if:
    type: value
    path: "scripts.preinstall"
    regex: "arch\\s*===\\s*['\"]x64['\"]"

- id: js-require-package-json
  desc: JavaScript reads package.json for metadata
  crit: notable
  conf: 0.8
  if:
    type: value
    path: "scripts.preinstall"
    regex: "require\\(['\"]\\./package\\.json['\"]\\)"

  # === Data Exfiltration Patterns ===
- id: js-https-request
  desc: "JS makes HTTPS request for exfiltration"
  crit: suspicious
  conf: 0.92
  attack: "T1071.001"
  if:
    type: value
    path: "scripts.preinstall"
    substr: "https.request"

- id: js-querystring-stringify
  desc: JavaScript encodes data for POST
  crit: suspicious
  conf: 0.87
  attack: "T1041"
  if:
    type: value
    path: "scripts.preinstall"
    substr: "querystring.stringify"

- id: js-post-params-recon
  desc: JavaScript POSTs reconnaissance data
  crit: suspicious
  conf: 0.95
  attack: "T1041"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "package:.{0,50}platform:.{0,50}arch:"

  # === OOB Callback Detection ===
- id: js-oastify-host
  desc: JavaScript references OASTify OOB service
  crit: suspicious
  conf: 0.96
  attack: "T1048.003"
  if:
    type: value
    path: "scripts.preinstall"
    substr: oastify.com
- id: desc-dependency-confusion
  desc: 'desc dependency confusion'
  crit: suspicious
  conf: 0.92
  attack: "T1195.002"
  if:
    type: value
    path: "description"
    regex: "(dependency\\.confusion|dep.confusion|dependendency.confusion)"
    case_insensitive: true

  # === Typosquatting / Namespace Impersonation ===
- id: jscom-unity-impersonation
  desc: "Package impersonates Unity namespace"
  crit: suspicious
  conf: 0.94
  attack: "T1195.002"
  if:
    type: value
    path: "name"
    regex: "^com\\.unity\\."

composite_rules:
  # Hostile: Cross-platform recon + OOB exfiltration
- id: node-cross-platform-recon-exfil
  desc: Cross-platform system recon with OOB exfiltration
  crit: hostile
  conf: 0.97
  attack: "T1041"
  mbc: "E1041"
  all:
  - id: node-inline-eval
  - id: js-require-child-process
  - id: js-require-https
  - id: js-platform-win32-check
  - id: js-https-request
  - id: js-oastify-host
  any:
  - id: js-execsync-systeminfo
  - id: js-execsync-passwd
  - id: js-execsync-whoami
- id: node-inline-exec-sysinfo
  desc: Inline Node.js execution collects system info
  crit: hostile
  conf: 0.95
  attack: "T1082"
  mbc: "E1041"
  all:
  - id: node-inline-eval
  - id: js-os-platform
  any:
  - id: js-execsync-systeminfo
  - id: js-execsync-passwd
  - id: js-execsync-whoami
- id: node-oob-recon
  desc: Node.js code performs recon with OOB callback
  crit: suspicious
  conf: 0.94
  attack: "T1048.003"
  all:
  - id: node-inline-eval
  - id: js-oastify-host
  any:
  - id: js-os-platform
  - id: js-os-arch
  - id: js-execsync-command
  # Inline node -e preinstall that reads hostname AND username and references an
  # out-of-band callback domain (interactsh/oastify/webhook) is a host-profile
  # exfiltration beacon — the canonical dependency-confusion recon payload. The
  # OOB domain is matched across all OAST TLDs (oast.me/pro/live/fun/site/online)
  # so swapping the collaborator host does not evade it.
- id: node-inline-host-user-oob-exfil
  desc: Inline node preinstall exfiltrates hostname and username to OOB callback
  crit: hostile
  conf: 0.985
  attack: "T1195.002, T1041, T1082, T1033"
  mbc: "E1041"
  all:
  - id: node-inline-eval
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-node-os-hostname
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-node-os-userinfo
  any:
  - id: js-oastify-host
  - id: objectives/supply-chain/recon-exfil/oast/host-profile::interactsh-oast-domain
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-webhook-site-url
- id: depconf-exfil
  desc: Dependency confusion package with data exfiltration
  crit: hostile
  conf: 0.96
  attack: "T1195.002"
  all:
  - id: desc-dependency-confusion
  - id: jscom-unity-impersonation
  any:
  - id: node-inline-eval
  - id: js-https-request
  - id: js-oastify-host
  - id: js-querystring-stringify
  - id: js-require-package-json
  - id: js-arch-x64-check
- id: unity-oob-callback
  desc: Impersonated Unity package with OOB callback
  crit: hostile
  conf: 0.93
  attack: "T1195.002"
  all:
  - id: jscom-unity-impersonation
  - id: js-oastify-host
  # Postinstall variant: same detection on postinstall hook
- id: postinstall-inline-exec-recon
  desc: Postinstall hook executes inline Node.js with system recon
  crit: hostile
  conf: 0.95
  attack: "T1059.007"
  all:
  - id: node-inline-eval-postinstall
  - id: js-require-child-process
  any:
  - id: js-execsync-systeminfo
  - id: js-execsync-passwd
