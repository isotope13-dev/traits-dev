defaults:
  platforms: [windows, unix]
  for: [xml]
  attack: T1041
traits:
  - id: msbuild-host-pod-query-fields
    desc: Exports host and pod query fields
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(host|hostname)=\$\(.{1,40}\).{0,80}(pod|container)=\$\(.{1,40}\)'
composite_rules:
  - id: nuget-msbuild-host-profile-exfil
    desc: NuGet build hook sends host and container identifiers to an OOB service
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: metadata/build/manifest::nuspec-file
      - id: metadata/build/manifest::msbuild-targets-file
      - id: msbuild-host-pod-query-fields
      - id: micro-behaviors/os/sysinfo/hostname::dotnet-machine-name-read
      - id: micro-behaviors/communications/http/download/package::msbuild-downloadfile-task
      - id: objectives/exfiltration/oob/endpoint::webhook-site
