defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1552.001,T1082,T1041"

composite_rules:
- id: npm-install-profile-exfil
  desc: npm install developer profile exfil
  crit: hostile
  conf: 0.99
  all:
  - id: developer-email-source-harvest
  - id: cicd-runtime-fingerprint
  - id: npm-profile-json-post
  any:
  - id: micro-behaviors/os/console/io::js-console-output-silenced
  - id: objectives/discovery/host/geo::ipify-api-comp
  - id: micro-behaviors/communications/http/ip-discovery::ipify-api
- id: developer-email-source-harvest
  desc: Developer email identity source strings
  crit: component
  conf: 0.96
  any:
  - id: metadata/file/string/identity
- id: cicd-runtime-fingerprint
  desc: Collects CI runtime env marker
  crit: suspicious
  conf: 0.94
  needs: 3
  any:
  - id: micro-behaviors/os/env/vars/cicd::github-repository
  - id: micro-behaviors/process/create/spawn::process-execpath-spawn
  - id: micro-behaviors/os/sysinfo/platform/runtime::process-version-access
  - id: micro-behaviors/process/info/commandline::check-argv
  - id: metadata/file/string/cicd
  unless:
  - id: metadata/library/structure/
  - id: metadata/library/structure/
  - id: metadata/package/files/dependency::node-modules-path
  - id: well-known/tool/development/yarn::yarn-cli-bundle-marker
- id: npm-profile-json-post
  desc: POSTs npm install profile JSON
  crit: suspicious
  conf: 0.94
  all:
  - id: objectives/supply-chain/recon-exfil/host-profile/developer::npm-install-env-marker
  - id: micro-behaviors/communications/http/request/client::application-json
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  - id: metadata/package/keywords/profile::npm-install-profile-fields
- id: npm-install-env-marker
  desc: npm install environment marker
  crit: component
  conf: 0.9
  any:
  - id: micro-behaviors/os/env/vars/access::npm-config-user-agent
  - id: micro-behaviors/os/env/vars/access::npm-lifecycle
