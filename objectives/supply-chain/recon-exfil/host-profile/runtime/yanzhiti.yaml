# YanZhiTi-specific endpoints anchor both rules. Generic host profiling and
# HTTP primitives remain notable in their own directories; they become hostile
# only when the repack transmits the profile to its replacement infrastructure.
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1041
  mbc: E1041

composite_rules:
  - id: yanzhiti-runtime-host-profile-telemetry
    desc: YanZhiTi repack uploads runtime host profile
    crit: hostile
    conf: 0.995
    ref: sha256:d456dc01ed76a5c64fdfab354573fdd7627d73fff1358a2ce0cdf0411ddf7c76
    all:
      - id: micro-behaviors/communications/http/endpoints::replacement-telemetry-endpoint
      - id: objectives/discovery/system/profile::python-runtime-profile-fields
      - id: micro-behaviors/communications/http/request/client::httpx-client-post-request

  - id: yanzhiti-plaintext-device-fingerprint-export
    desc: YanZhiTi sends device fingerprint over plaintext HTTP
    crit: hostile
    conf: 0.995
    ref: sha256:d456dc01ed76a5c64fdfab354573fdd7627d73fff1358a2ce0cdf0411ddf7c76
    all:
      - id: micro-behaviors/communications/http/endpoints::plaintext-activation-endpoint
      - id: micro-behaviors/os/sysinfo/machine-id::python-hardware-fingerprint-call
      - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
      - id: micro-behaviors/communications/http/request/httpx::httpx-async-client-post
