# RubyGems Supply Chain Credential Theft
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects malicious patterns in gemspec and Ruby packages
# Covers rest-client hijacking style attacks
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [ruby]
  crit: suspicious
  attack: "T1195.002"
traits:
  # ============================================================
  # GEMSPEC TROJANS
  # ============================================================
  - id: gemspec-post-install
    desc: Gemspec with post_install_message abuse
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'post_install_message.{0,50}(http|eval|system)'
  - id: gemspec-extensions-exec
    desc: Gemspec extensions with execution
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'spec\.extensions.{0,50}(extconf|Rakefile)'
  - id: extconf-system-call
    desc: extconf.rb with system call
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'system\s*\(.{0,50}(curl|wget|sh|shell)'
  # ============================================================
  # CREDENTIAL ACCESS
  # ============================================================
  # Note: gem-credentials-path and gem-host-api-key-var are defined
  # in package-manager.yaml and referenced in composite rules below
  - id: bundler-config-read
    desc: Reads bundler config
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '\.bundle/config|BUNDLE_'
  - id: rubygems-api-domain
    desc: References api.rubygems.org domain
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'api\.rubygems\.org'
  # ============================================================
  # HTTP EXFILTRATION
  # ============================================================
  - id: ruby-net-http-post
    desc: Ruby Net::HTTP POST
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'Net::HTTP\.(post|put|request)'
  - id: ruby-open-uri-fetch
    desc: Ruby open-uri fetch
    crit: component
    conf: 0.6
    if:
      type: text
      regex: 'open\s*\(.{0,30}http'
  - id: ruby-httparty-post
    desc: Ruby HTTParty POST
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'HTTParty\.(post|put)'
  # ============================================================
  # HOMEBREW CASK/FORMULA
  # ============================================================
  - id: cask-url-suspicious
    desc: Homebrew cask with suspicious URL
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'url\s+["\''](http|ftp).{0,50}(pastebin|github\.io|raw\.)'
  - id: formula-system-exec
    desc: Homebrew formula with system execution
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'def install[\s\S]{0,300}system\s*["\''](curl|wget|shell)'
  - id: formula-env-access
    desc: Homebrew formula accessing env
    crit: component
    conf: 0.75
    if:
      type: text
      regex: 'ENV\[.{0,30}(TOKEN|SECRET|KEY|PASS)'
  - id: cask-postflight-exec
    desc: Homebrew cask postflight with execution
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'postflight[\s\S]{0,200}(system|exec|\`)'
composite_rules:
  # === RubyGems Credential Theft ===
  - id: rubygems-credential-theft
    desc: RubyGems credential theft
    crit: hostile
    conf: 0.95
    attack: "T1552.001"
    any:
      - id: objectives/supply-chain/credential-theft/registry::gem-credentials-path
      - id: objectives/supply-chain/credential-theft/registry::gem-host-api-key-var
      - id: rubygems-api-domain
      - id: objectives/supply-chain/credential-theft/registry::rubygems-api-key-var
    all:
      - id: ruby-net-http-post
  # === Gemspec Trojan ===
  - id: gemspec-trojan
    desc: Trojanized gemspec
    crit: hostile
    conf: 0.9
    any:
      - id: gemspec-extensions-exec
      - id: extconf-system-call
      - id: ruby-open-uri-fetch
    all:
      - id: ruby-net-http-post
  # === Homebrew Formula Attack ===
  - id: homebrew-formula-attack
    desc: Malicious Homebrew formula
    crit: hostile
    conf: 0.9
    any:
      - id: formula-system-exec
      - id: formula-env-access
      - id: cask-postflight-exec
    all:
      - id: cask-url-suspicious
  # === Ruby Supply Chain Attack ===
  - id: ruby-supply-chain-attack
    desc: Ruby supply chain attack
    crit: hostile
    conf: 0.95
    mbc: "E1552"
    any:
      - id: rubygems-credential-theft
      - id: gemspec-trojan
      - id: homebrew-formula-attack
