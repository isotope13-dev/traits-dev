# Supply Chain Environment Variable Harvesting
# ATT&CK: T1552.001 (Credentials In Files)
# Detects packages that harvest sensitive environment variables during install
# Common in npm/pypi supply chain attacks
#
# NOTE: This file focuses on supply-chain specific patterns. Individual env var
# access patterns are defined in:
#   - objectives/credential-access/env/secret-access/node.yaml (JS)
#   - objectives/credential-access/env/secret-access/python.yaml (Python)
#   - objectives/credential-access/env/secret-access/generic.yaml (all)
defaults:
  platforms: [unix, windows]
  crit: notable
  attack: "T1552.001"
traits:
  # ============================================================
  # BULK ENVIRONMENT HARVESTING
  # ============================================================

  # --- Python ---
  # Note: Iterating environ.items/keys/values is in micro-behaviors/os/env/vars::python-environ-iteration
  # This trait covers dict() conversion only; use micro-behaviors/os/env/vars::python-environ-iteration
  # for iteration patterns
  - id: py-environ-dict
    desc: Python converts environ to dict
    crit: notable
    conf: 0.7
    for: [python]
    if:
      type: text
      regex: 'dict\(os\.environ\)'
  - id: py-environ-to-json
    desc: Python serializes environ to JSON
    crit: suspicious
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: 'json\.(dumps|dump)\s*\(.{0,50}os\.environ'
  # --- Shell ---
  # NOTE: printenv detection moved to micro-behaviors/os/env/vars::printenv
  # Shell-specific bulk env access is handled via shell-export-pipe below
  - id: shell-export-pipe
    desc: Shell pipes env to command
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '(env|printenv)\s*\|'
  # --- API Keys (Python/Shell only) ---
  - id: py-harvest-api-key
    # ============================================================
    # TARGETED SECRET HARVESTING (Python/Shell specific)
    # NOTE: JavaScript patterns use existing traits from node.yaml
    # ============================================================

    desc: Python reads API key env vars
    crit: baseline
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: '(getenv|environ\.get)\(.{0,20}API.{0,20}KEY'
      case_insensitive: true
  - id: py-harvest-secret-key
    desc: Python harvests secret key env vars
    crit: component
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: '(getenv|environ\.get)\(.{0,20}SECRET.{0,20}KEY'
      case_insensitive: true
  # --- Cloud Provider: GCP (Python/Shell specific) ---
  - id: py-harvest-gcp-app-creds
    desc: Python harvests GCP application credentials env var
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}GOOGLE_APPLICATION_CREDENTIALS'
  - id: py-harvest-gcp-service-account
    desc: Python harvests GCP service account env var
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}GCP_SERVICE_ACCOUNT'
  # --- Cloud Provider: Azure (Python/Shell specific) ---
  - id: py-harvest-azure-client-secret
    desc: Python harvests Azure client secret env var
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}AZURE_CLIENT_SECRET'
  - id: py-harvest-azure-tenant-id
    desc: Python harvests Azure tenant ID env var
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}AZURE_TENANT_ID'
  # --- Database (Python specific) ---
  - id: py-harvest-db-password
    desc: Python harvests database password env var
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}DB_PASSWORD'
    unless:
      - id: legitimate-python-db-config-context
  - id: py-harvest-database-url
    desc: Python harvests database URL env var
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}DATABASE_URL'
    unless:
      - id: legitimate-python-db-config-context
      - id: legitimate-python-env-config-context
    downgrade:
      any:
        - id: micro-behaviors/data/db/conn/postgresql::postgresql
        - id: micro-behaviors/data/db/conn/orm::sqlalchemy
  - id: py-harvest-mongo-uri
    desc: Python harvests MongoDB URI env var
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}MONGO_URI'
  - id: py-harvest-redis-url
    desc: Python harvests Redis URL env var
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}REDIS_URL'
    unless:
      - id: legitimate-python-env-config-context
  # --- GitHub/Git (Python specific) ---
  - id: py-harvest-github-token
    desc: Python reads GITHUB_TOKEN env var
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(getenv|environ\.get)\(.{0,30}GITHUB_TOKEN'
  - id: py-harvest-gh-token
    desc: Python reads GH_TOKEN env var
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}GH_TOKEN'
    not:
      - substr: 'os.environ["GITHUB_ENV"]'
      - substr: 'os.environ["GITHUB_OUTPUT"]'
  - id: py-harvest-github-pat
    desc: Python harvests GITHUB_PAT env var
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}GITHUB_PAT'
  # --- NPM (Python specific - unusual but seen in supply chain attacks) ---
  - id: py-harvest-npm-token
    desc: Python harvests NPM_TOKEN env var
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}NPM_TOKEN'
  # --- PyPI (Python specific) ---
  - id: py-harvest-pypi-token
    desc: Python harvests PYPI_TOKEN env var
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}PYPI_TOKEN'
  - id: py-harvest-twine-password
    desc: Python harvests TWINE_PASSWORD env var
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(getenv|environ).{0,30}TWINE_PASSWORD'
  # ============================================================
  # EXFILTRATION OF HARVESTED DATA
  # ============================================================
  - id: py-env-to-post
    desc: Python POSTs env data
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'os\.environ[\s\S]{0,200}requests\.(post|put)'
  - id: js-env-token-to-fetch
    desc: JS sends token/secret env var via fetch/axios
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.env\.[A-Z_]*(TOKEN|SECRET)[A-Z_]*[\s\S]{0,200}(fetch|axios)\s*\('
    not:
      - substr: "process.env.ACTIONS_ID_TOKEN_REQUEST_URL"
      - substr: "Authorization"
      - substr: COREPACK_NPM_TOKEN
      - substr: AUTH_TOKEN}@github
    unless:
      - id: objectives/supply-chain/trojanized/application/context::benign-npm-oidc-token-exchange
      - id: objectives/supply-chain/trojanized/application/context::hcaptcha-siteverify-secret-context
    downgrade:
      any:
        - id: metadata/library/web-frameworks::uses-web-framework-b
  - id: js-env-key-to-fetch
    desc: JS sends key/password env var via fetch/axios
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'process\.env\.[A-Z_]*(KEY|PASSWORD)[A-Z_]*[\s\S]{0,200}(fetch|axios)\s*\('
    unless:
      - id: objectives/supply-chain/trojanized/application/context::hcaptcha-siteverify-secret-context
    downgrade:
      any:
        - id: metadata/library/web-frameworks::uses-web-framework-b
  - id: js-env-key-copy-to-object
    desc: JS copies env keys into object
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: '\w+\s*\[\s*\w+\s*\]\s*=\s*process\.env\s*\[\s*\w+\s*\]'
  - id: js-app-env-prefix-filter
    desc: JS filters application env prefixes
    crit: notable
    conf: 0.86
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']APP_["''].{0,40}["'']API_["''].{0,40}["'']DB_["'']'
  - id: js-env-object-post-body
    desc: JS POST body includes env object
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'axios\.post\s*\([\s\S]{0,260}\benv\b'
    downgrade:
      any:
        - id: metadata/library/web-frameworks::uses-web-framework-b
  # Atomic traits for shell env exfiltration
  - id: shell-env-pipe-to-http
    desc: Shell env piped to HTTP client
    crit: notable
    conf: 0.7
    for: [shell]
    if:
      type: text
      regex: '[^|]\|\s*(curl|wget)\b'
  - id: shell-env-command-pipe
    desc: Shell env command with pipe
    crit: component
    conf: 0.7
    for: [shell]
    if:
      type: text
      regex: '\benv\s*\|'
  - id: python-db-config-filename
    desc: Python database config filename
    crit: component
    conf: 0.85
    for: [python]
    if:
      type: basename
      exact: config.py
  - id: python-db-config-persistent
    desc: Python persistent config structure
    crit: component
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: 'class\s+Config\b|PersistentConfig\s*\('
  - id: python-env-module-filename
    desc: Python environment config filename
    crit: component
    conf: 0.85
    for: [python]
    if:
      type: basename
      regex: '(^|[\\/])(env|config)\.py$'
  - id: python-many-env-getters
    desc: Python many environment getters
    crit: component
    conf: 0.85
    for: [python]
    count_min: 10
    if:
      type: text
      regex: 'os\.environ\.get\s*\('
  - id: python-dotenv-load
    desc: Python dotenv loading
    crit: component
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: '\bload_dotenv\s*\('
composite_rules:
  - id: legitimate-python-db-config-context
    desc: Legitimate Python database configuration
    crit: baseline
    conf: 0.85
    for: [python]
    all:
      - id: micro-behaviors/data/db/conn/orm::sqlalchemy
    any:
      - id: python-db-config-filename
      - id: python-db-config-persistent
    needs: 1
  - id: legitimate-python-env-config-context
    desc: Legitimate Python environment configuration
    crit: baseline
    conf: 0.86
    for: [python]
    all:
      - id: python-many-env-getters
      - id: python-env-module-filename
    any:
      - id: python-dotenv-load
      - id: legitimate-python-db-config-context
    needs: 1
  # ============================================================
  # HELPER COMPOSITES - Group related atomic traits
  # ============================================================
  - id: pypi-install-secret-key-harvest
    desc: Install-time Python secret key harvesting
    crit: suspicious
    conf: 0.9
    all:
      - id: py-harvest-secret-key
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
  - id: pypi-install-database-url-harvest
    desc: Install-time Python database URL harvesting
    crit: suspicious
    conf: 0.9
    all:
      - id: py-harvest-database-url
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
  - id: pypi-install-redis-url-harvest
    desc: Install-time Python Redis URL harvesting
    crit: suspicious
    conf: 0.9
    all:
      - id: py-harvest-redis-url
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
  # Python bulk env access indicators
  - id: python-bulk-env-access
    desc: Python bulk environment access
    crit: notable
    conf: 0.8
    for: [python]
    any:
      - id: py-environ-dict
      - id: py-environ-to-json
      - id: micro-behaviors/os/env/vars::python-environ-iteration
  # Shell bulk env access
  - id: shell-bulk-env-access
    # NOTE: javascript-bulk-env-access removed - use node-env-dump directly
    # The existing composite objectives/credential-access/env/secrets::node-env-dump
    # provides the same functionality

    desc: Shell bulk environment access
    crit: notable
    conf: 0.8
    for: [shell]
    any:
      - id: micro-behaviors/os/env/vars::printenv
      - id: shell-export-pipe
  # Python cloud credential indicators
  # NOTE: Cannot reference composite aws-credentials-access from python.yaml
  # Instead, define indicators locally
  - id: python-cloud-creds
    desc: Python cloud credential access
    crit: suspicious
    conf: 0.9
    for: [python]
    any:
      - id: py-harvest-gcp-app-creds
      - id: py-harvest-gcp-service-account
      - id: py-harvest-azure-client-secret
      - id: py-harvest-azure-tenant-id
      - id: micro-behaviors/fs/path/sensitive/credentials::aws-credentials-dup
  # JavaScript cloud credential indicators - reference existing composite rules
  - id: javascript-cloud-creds
    desc: JavaScript cloud credential access
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    any:
      - id: objectives/credential-access/env/secrets::node-aws
      - id: objectives/credential-access/env/secrets::node-cloud
  # Python package registry token indicators
  - id: python-package-tokens
    desc: Python package registry tokens
    crit: suspicious
    conf: 0.9
    for: [python]
    any:
      - id: py-harvest-github-token
      - id: py-harvest-gh-token
      - id: py-harvest-github-pat
      - id: py-harvest-npm-token
      - id: py-harvest-pypi-token
      - id: py-harvest-twine-password
  # JavaScript package registry token indicators - reference existing composite rules
  - id: javascript-package-tokens
    desc: JavaScript package registry tokens
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    any:
      - id: objectives/credential-access/env/secrets::node-git-token
      - id: objectives/credential-access/env/secrets::node-npm-token
  # === Python Env Harvesting ===
  - id: python-env-harvest
    # ============================================================
    # HOSTILE COMPOSITES - Harvesting + Exfiltration
    # ============================================================

    desc: Python harvests and sends env vars
    crit: hostile
    conf: 0.95
    mbc: "E1552"
    for: [python]
    any:
      - id: python-bulk-env-access
    all:
      - id: py-env-to-post
  # === JavaScript Credential Env to Fetch ===
  - id: js-env-to-fetch
    desc: JS sends credential env var via fetch/axios
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    any:
      - id: js-env-token-to-fetch
      - id: js-env-key-to-fetch
  - id: js-node-request-stream-post
    desc: Native HTTP request body POST
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/communications/http/request::node-http-request-stream-body
      - id: micro-behaviors/communications/http/request::http-post-config
  - id: js-prefixed-env-http-exfil
    desc: JavaScript exfils prefixed env vars
    crit: hostile
    conf: 0.97
    attack: T1041
    mbc: E1041
    for: [javascript, typescript]
    all:
      - id: objectives/credential-access/env/secrets::node-env-dump
      - id: js-env-key-copy-to-object
      - id: js-app-env-prefix-filter
      - id: js-env-object-post-body
      - id: micro-behaviors/communications/http/headers::bearer-token
    any:
      - id: micro-behaviors/communications/http/ip-discovery::ip-sb-geoip
      - id: micro-behaviors/communications/http/ip-discovery::ipify-api
    needs: 1
  # === JavaScript Env Harvesting ===
  - id: javascript-env-harvest
    desc: JavaScript harvests and sends env vars
    crit: hostile
    conf: 0.95
    for: [javascript, typescript]
    any:
      - id: objectives/credential-access/env/secrets::node-env-dump
      - id: objectives/credential-access/env/secrets::node-filtered-secret-scan
    all:
      - id: js-env-to-http
  - id: js-env-to-http
    desc: JS sends environment data over HTTP
    crit: suspicious
    conf: 0.93
    for: [javascript, typescript]
    any:
      - id: js-env-to-fetch
      - id: js-node-request-stream-post
  # === Shell Env Harvesting ===
  # Composite: env/printenv piped to curl/wget
  - id: shell-env-to-curl
    desc: Shell pipes env to curl/wget
    crit: suspicious
    conf: 0.95
    for: [shell]
    all:
      - id: shell-env-command-pipe
      - id: shell-env-pipe-to-http
  - id: shell-env-harvest
    desc: Shell harvests and sends env vars
    crit: hostile
    conf: 0.98
    for: [shell]
    any:
      - id: shell-bulk-env-access
    all:
      - id: shell-env-to-curl
  # === Cloud Credential Harvesting (multi-cloud = hostile) ===
  - id: cloud-credential-harvest
    desc: Multi-cloud provider credential harvesting
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: python-cloud-creds
      - id: javascript-cloud-creds
  # === Package Manager Token Harvesting ===
  - id: package-token-harvest
    desc: Package manager token harvesting
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: python-package-tokens
      - id: javascript-package-tokens
  # === Any Supply Chain Env Theft ===
  - id: supply-chain-env-theft
    desc: Supply chain environment credential theft
    crit: hostile
    conf: 0.98
    mbc: "E1552"
    any:
      - id: python-env-harvest
      - id: javascript-env-harvest
      - id: js-prefixed-env-http-exfil
      - id: shell-env-harvest
      - id: cloud-credential-harvest
      - id: package-token-harvest
