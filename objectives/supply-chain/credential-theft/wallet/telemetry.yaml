defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1552.001

traits:
  - id: key-material-reporting-call
    desc: Key or seed reporting call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      # Require Key/Seed/Mnemonic/Deriv as a camelCase segment (not mid-token
      # like addKeyword → "Key"+"word"), then a short string literal first arg.
      regex: '\b\w*(Key|Seed|Mnemonic|Deriv)(?![a-z])\w*\s*\(\s*["'']\w{1,8}["'']\s*,'
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
    not:
      - substr: addKeyword
      - substr: removeKeyword
      - substr: getKeyword
