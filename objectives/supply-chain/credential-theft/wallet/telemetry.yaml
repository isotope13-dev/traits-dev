defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1552.001

traits:
  - id: key-material-reporting-call
    desc: Key or seed reporting call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\b\w*(Key|Seed|Mnemonic|Deriv)\w*\s*\(\s*["'']\w{1,8}["'']\s*,'
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
