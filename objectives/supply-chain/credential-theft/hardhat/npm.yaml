defaults:
  for: [javascript, typescript]
  platforms: [windows, linux, macos]
  attack: T1195.002

composite_rules:
  - id: hardhat-config-stealer-heuristics
    desc: "Malicious Hardhat configuration theft heuristics"
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/data/embedded/hardhat::hardhat-config-networksFilter
      - id: micro-behaviors/data/embedded/hardhat::hardhat-config-hreConfig
      - id: micro-behaviors/data/embedded/hardhat::hardhat-config-hreInit
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::aes-256-cbc-dash
      - id: micro-behaviors/communications/http/post::axios-post-call
