defaults:
  for: [javascript, typescript]
  platforms: [windows, linux, macos]
  attack: T1195.002

traits:
  - id: hardhat-config-networksFilter
    desc: "filters hardhat networks config"
    crit: component
    if:
      type: text
      word: "networksFilter"

  - id: hardhat-config-hreConfig
    desc: "accesses hardhat config"
    crit: component
    if:
      type: text
      word: "hreConfig"

  - id: hardhat-config-hreInit
    desc: "hardhat init pattern"
    crit: component
    if:
      type: text
      word: "hreInit"

composite_rules:
  - id: hardhat-config-stealer-heuristics
    desc: "Malicious Hardhat configuration theft heuristics"
    crit: suspicious
    conf: 0.9
    all:
      - id: hardhat-config-networksFilter
      - id: hardhat-config-hreConfig
      - id: hardhat-config-hreInit
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::aes-256-cbc-dash
      - id: micro-behaviors/communications/http/post::axios-post-call
