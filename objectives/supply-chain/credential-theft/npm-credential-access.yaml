defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - package.json
    - shell
  attack: T1528
traits:
  - id: gh-auth-token
    desc: gh auth token command
    crit: suspicious
    conf: 0.98
    for:
      - package.json
    if:
      type: text
      substr: gh auth token
  - id: curl-webhook-post
    desc: curl post to webhook.site
    crit: suspicious
    conf: 0.98
    attack: T1567.002
    if:
      type: text
      regex: curl\s+-d.{0,200}webhook\.site/[0-9a-f-]{36}
