defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: suspicious
  attack: T1552.001
traits:
  - id: pypirc-path
    desc: .pypirc credential file reference
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: \.pypirc
    unless:
      - id: metadata/file/text::neovim-filetype-registry
    downgrade:
      any:
        - id: metadata/build/pip::pip
  - id: pypirc-read
    desc: Reads .pypirc file
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: open\s*\(.{0,50}\.pypirc
  - id: pip-conf-path
    desc: pip.conf credential file reference
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: (pip\.conf|pip/pip\.conf)
    unless:
      - id: metadata/file/text::neovim-filetype-registry
  - id: cargo-credentials-path
    desc: Cargo credentials file reference
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: \.cargo/credentials
    unless:
      - id: metadata/file/text::neovim-filetype-registry
  - id: cargo-registry-token
    desc: Cargo registry token reference
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: registry\.token|CARGO_REGISTRY_TOKEN
  - id: gem-credentials-path
    desc: Gem credentials file reference
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: \.gem/credentials
  - id: rubygems-api-key-var
    desc: RubyGems API key variable
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      word: rubygems_api_key
  - id: gem-host-api-key-var
    desc: GEM_HOST_API_KEY variable
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      word: GEM_HOST_API_KEY
  - id: goprivate-netrc
    desc: Go private module auth via netrc
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: GOPRIVATE
  - id: composer-auth-json
    desc: Composer auth.json reference
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: (\.composer|composer)/auth\.json|composer.{0,20}token
  - id: maven-settings-path
    desc: Maven settings.xml reference
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \.m2/settings\.xml
  - id: maven-server-password-open
    desc: Maven server block with password
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: <server>[\s\S]{0,200}<password>
  - id: maven-server-password-close
    desc: Maven password closed in server block
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: <password>[\s\S]{0,200}</server>
  - id: gradle-properties
    desc: Gradle properties with credentials
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: gradle\.properties|systemProp\.(http|https)\.proxyPassword
  - id: nuget-config
    desc: NuGet.Config credential reference
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: NuGet\.Config|<packageSourceCredentials>
  - id: circleci-token-var
    desc: CIRCLECI_TOKEN variable
    crit: suspicious
    conf: 0.9
    for: [python, javascript, ruby, go]
    if:
      type: text
      regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}CIRCLECI_TOKEN
  - id: circle-token-var
    desc: CIRCLE_TOKEN variable
    crit: suspicious
    conf: 0.9
    for: [python, javascript, ruby, go]
    if:
      type: text
      regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}CIRCLE_TOKEN
  - id: travis-token-var
    desc: TRAVIS_TOKEN variable
    crit: suspicious
    conf: 0.9
    for: [python, javascript, ruby, go]
    if:
      type: text
      regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}TRAVIS_TOKEN
  - id: jenkins-token-var
    desc: JENKINS_TOKEN variable
    crit: suspicious
    conf: 0.9
    for: [python, javascript, ruby, go]
    if:
      type: text
      regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}JENKINS_TOKEN
  - id: jenkins-api-token-var
    desc: JENKINS_API_TOKEN variable
    crit: suspicious
    conf: 0.9
    for: [python, javascript, ruby, go]
    if:
      type: text
      regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}JENKINS_API_TOKEN
  - id: gitlab-token-var
    desc: GITLAB_TOKEN variable
    crit: suspicious
    conf: 0.9
    for: [python, javascript, ruby, go]
    if:
      type: text
      regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}GITLAB_TOKEN
  - id: ci-job-token-var
    desc: CI_JOB_TOKEN variable
    crit: suspicious
    conf: 0.9
    for: [python, javascript, ruby, go]
    if:
      type: text
      regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}CI_JOB_TOKEN
  - id: gitlab-private-token-var
    desc: GITLAB_PRIVATE_TOKEN variable
    crit: suspicious
    conf: 0.9
    for: [python, javascript, ruby, go]
    if:
      type: text
      regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}GITLAB_PRIVATE_TOKEN
  - id: codecov-token-var
    desc: CODECOV_TOKEN variable
    crit: suspicious
    conf: 0.85
    for: [python, javascript, ruby, go]
    if:
      type: text
      regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}CODECOV_TOKEN
  - id: vscode-settings
    desc: VS Code settings with potential secrets
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: \.vscode/settings\.json
  - id: jetbrains-secrets
    desc: JetBrains IDE secrets
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: \.idea/.{1,30}\.(xml|iml)|jetbrains.{0,20}token
      case_insensitive: true
  - id: py-home-expand-cred
    desc: Python expands home dir for credential file
    crit: component
    conf: 0.85
    if:
      type: text
      regex: expanduser\s*\(.{0,30}(\.pypirc|\.netrc|\.git-credentials|credentials)
    downgrade:
      any:
        - id: metadata/build/pip::pip
  - id: py-pathlib-cred
    desc: Python pathlib access to credential file
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: Path\s*\(.{0,50}(\.pypirc|\.netrc|\.aws|\.ssh)
  - id: js-homedir-cred
    desc: JS accesses credential file via homedir
    crit: suspicious
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      regex: (read|open).{0,80}(homedir|HOME).{0,50}(\.npmrc|\.git-credentials)
    not:
      - substr: "homedir(), '.npmrc'"
      - substr: "path.join(homedir(), '.npmrc')"
      - substr: "HOME']}/.npmrc"
      - substr: "userconfig: { default: path.join(os.homedir(), '.npmrc') }"
      - substr: "configNames: { default: ['npmrc', '.npmrc'] }"
  - id: js-env-home-cred
    desc: JS uses env HOME for credential access
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?:readFile|readFileSync|createReadStream|openSync|fetch|axios|request|http).{0,120}process\.env\.(HOME|USERPROFILE).{0,80}(\.npmrc|credentials)|process\.env\.(HOME|USERPROFILE).{0,80}(\.npmrc|credentials).{0,120}(?:readFile|readFileSync|createReadStream|openSync|fetch|axios|request|http)
    not:
      - substr: 'userconfig:{default:be.join(process.env.HOME||nr.homedir(),".npmrc")}'
      - substr: 'cache:{default:be.join(process.env.HOME||nr.homedir(),".npm")}'
      - substr: 'configNames:{default:["npmrc",".npmrc"]}'
  - id: shell-cat-npmrc
    desc: Shell reads .npmrc file
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: cat\s+[^<\n]{0,30}\.npmrc
    not:
      - substr: 'cat << EOF > "$HOME/.npmrc"'
      - regex: 'cat\s+<<\s*EOF\s*>\s*"\$HOME/\.npmrc"'
      - regex: 'cat\s*<<\s*\w+\s*>\s*"\$HOME/\.npmrc"'
  - id: shell-cat-pypirc
    desc: Shell reads .pypirc file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: cat\s+[^<\n]{0,30}\.pypirc
  - id: shell-cat-netrc
    desc: Shell reads .netrc file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: cat\s+[^<\n]{0,30}\.netrc
  - id: shell-cat-git-credentials
    desc: Shell reads .git-credentials file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: cat\s+[^<\n]{0,30}\.git-credentials
  - id: shell-cat-credentials
    desc: Shell reads credentials file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: cat\s+[^<\n]{0,30}credentials
  - id: shell-curl-cred
    desc: Shell curls with credential file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: curl[^|\n]{0,30}--netrc|curl[^|\n]{0,30}-n\s
  - id: cred-to-http-py
    desc: Python sends credentials via HTTP
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (\.pypirc|\.netrc|credentials)[\s\S]{0,300}requests\.(post|put)
  - id: js-npmrc-to-fetch
    desc: JS sends .npmrc via fetch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \.npmrc[\s\S]{0,300}fetch
  - id: js-npmrc-to-axios
    desc: JS sends .npmrc via axios
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \.npmrc[\s\S]{0,300}axios
  - id: js-npmrc-to-http
    desc: JS sends .npmrc via http.request
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \.npmrc[\s\S]{0,300}http\.request
  - id: js-netrc-to-fetch
    desc: JS sends .netrc via fetch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \.netrc[\s\S]{0,300}fetch
  - id: js-netrc-to-axios
    desc: JS sends .netrc via axios
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \.netrc[\s\S]{0,300}axios
  - id: js-netrc-to-http
    desc: JS sends .netrc via http.request
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \.netrc[\s\S]{0,300}http\.request
  - id: js-creds-to-fetch
    desc: JS sends credentials via fetch
    crit: suspicious
    conf: 0.9
    for: [javascript]
    unless:
      - id: metadata/package/testing/presence::jest-test-file
      - id: metadata/package/testing/presence::test-directory
    if:
      type: text
      regex: '(?:[/\\]\.?credentials\b|\.git-credentials|\.cargo/credentials|\.gem/credentials)[\s\S]{0,300}\bfetch\b'
    not:
      - substr: credentialsInUrl
      - regex: RequestCredentials\s*=
      - regex: \bthis\.credentials\s*=\s*credentials\b
      - regex: \bcredentials\s*:\s*credentials\s*\?\?\s*this\.credentials\b
      - regex: '[\./]credentials\s*=\s*["''](?:include|same-origin|omit)["'']'
      - regex: '[\./]credentials\s*:\s*["''](?:include|same-origin|omit)["'']'
      - regex: '[\./]credentials\s*,\s*headers'
      - regex: '\.credentials\s*&&[\s\S]{0,300}fetch'
      - regex: crossOrigin\s*=\s*["'']use-credentials["'']
      - regex: /\.d\.ts["'`]?[\s\S]{0,80}fetch
  - id: js-creds-to-axios
    desc: JS sends credentials via axios
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?:[/\\]\.?credentials\b|\.git-credentials|\.cargo/credentials|\.gem/credentials)[\s\S]{0,300}\baxios\b'
  - id: js-creds-to-http
    desc: JS sends credentials via http.request
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?:[/\\]\.?credentials\b|\.git-credentials|\.cargo/credentials|\.gem/credentials)[\s\S]{0,300}http\.request'
  - id: creds-base64-encode
    desc: credentials base64 encoded
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '[/\\]credentials\b[\s\S]{0,200}(base64|btoa|b64encode)'
  - id: npmrc-base64-encode
    desc: .npmrc base64 encoded
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \.npmrc[\s\S]{0,200}(base64|btoa|b64encode)
  - id: pypirc-base64-encode
    desc: .pypirc base64 encoded
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \.pypirc[\s\S]{0,200}(base64|btoa|b64encode)
composite_rules:
  - id: maven-settings-xml
    desc: Maven settings.xml with credentials
    crit: suspicious
    conf: 0.85
    any:
      - id: maven-settings-path
      - id: maven-server-password-open
      - id: maven-server-password-close
  - id: shell-cat-cred
    desc: Shell reads credential file
    crit: suspicious
    conf: 0.9
    any:
      - id: shell-cat-npmrc
      - id: shell-cat-pypirc
      - id: shell-cat-netrc
      - id: shell-cat-git-credentials
      - id: shell-cat-credentials
  - id: cred-base64-encode
    desc: Credentials base64 encoded before send
    crit: suspicious
    conf: 0.85
    any:
      - id: creds-base64-encode
      - id: npmrc-base64-encode
      - id: pypirc-base64-encode
  - id: pypi-credential-theft
    desc: PyPI credential theft
    crit: hostile
    conf: 0.95
    mbc: E1552
    any:
      - id: pypirc-read
      - id: py-home-expand-cred
    all:
      - id: cred-to-http-py
  - id: cred-to-http-js
    desc: JS sends credentials via HTTP
    crit: suspicious
    conf: 0.9
    any:
      - id: js-npmrc-to-fetch
      - id: js-npmrc-to-axios
      - id: js-npmrc-to-http
      - id: js-netrc-to-fetch
      - id: js-netrc-to-axios
      - id: js-netrc-to-http
      - id: js-creds-to-fetch
      - id: js-creds-to-axios
      - id: js-creds-to-http
  - id: npm-credential-theft
    desc: NPM credential theft (supplemental)
    crit: hostile
    conf: 0.95
    any:
      - id: js-homedir-cred
      - id: js-env-home-cred
    all:
      - id: cred-to-http-js
  - id: cargo-credential-theft
    desc: Cargo credential theft
    crit: hostile
    conf: 0.95
    all:
      - id: cargo-credentials-path
      - id: cargo-registry-token
  - id: gem-credential-theft-comp
    desc: RubyGems credential theft
    crit: hostile
    conf: 0.95
    all:
      - id: gem-credentials-path
    any:
      - id: rubygems-api-key-var
      - id: gem-host-api-key-var
  - id: ci-credential-theft
    desc: CI/CD credential theft
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: circleci-token-var
      - id: circle-token-var
      - id: travis-token-var
      - id: jenkins-token-var
      - id: jenkins-api-token-var
      - id: gitlab-token-var
      - id: ci-job-token-var
      - id: gitlab-private-token-var
      - id: codecov-token-var
  - id: supply-chain-credential-theft
    desc: Supply chain credential theft attack
    crit: hostile
    conf: 0.98
    mbc: E1552
    any:
      - id: pypi-credential-theft
      - id: npm-credential-theft
      - id: cargo-credential-theft
      - id: gem-credential-theft-comp
      - id: ci-credential-theft
