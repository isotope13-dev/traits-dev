defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
  crit: suspicious
  attack: T1552.001
traits:
- id: pypirc-path
  desc: .pypirc credential file reference
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: .pypirc
  unless:
  - id: metadata/file/catalog/identity/
  - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
  - id: metadata/build/pip::setuptools-package-index
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - id: metadata/package/config::sensitive-file-exclusion-list
  downgrade:
    any:
    - id: metadata/build/pip/
- id: pypirc-read
  desc: Reads .pypirc file
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: open\s*\(.{0,50}\.pypirc
- id: pip-conf-path
  desc: pip.conf credential file reference
  crit: notable
  conf: 0.75
  if:
    type: string_literal
    regex: (pip\.conf|pip/pip\.conf)
  unless:
  - id: metadata/file/catalog/identity/
  - id: metadata/package/quality/false-positives-scanner::installtime-audit-defensive-scanner-context
- id: cargo-registry-token
  desc: Cargo registry token reference
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    # Do not treat a registry hostname such as registry.tokenade.dev as a
    # Cargo credential. Match the documented environment variable or the
    # exact Cargo config key instead.
    regex: '(?i)\bCARGO_REGISTRY_TOKEN\b|\bregistry\.token\b'
  unless:
  - id: micro-behaviors/os/service/legitimate/
  - id: micro-behaviors/os/service/legitimate/
  - id: micro-behaviors/os/service/legitimate/
- id: rubygems-api-key-var
  desc: RubyGems API key variable
  crit: notable
  conf: 0.85
  if:
    type: string_literal
    word: rubygems_api_key
- id: gem-host-api-key-var
  desc: GEM_HOST_API_KEY variable
  crit: notable
  conf: 0.85
  if:
    type: string_literal
    word: GEM_HOST_API_KEY
- id: maven-server-password-open
  desc: Maven server block with password
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: <server>[\s\S]{0,200}<password>
- id: maven-server-password-close
  desc: Maven password closed in server block
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: <password>[\s\S]{0,200}</server>
- id: gradle-properties
  desc: Gradle properties proxy password
  crit: notable
  conf: 0.8
  unless:
  - id: metadata/library/structure/
  if:
    # The bare `gradle.properties` filename is a routine Gradle build file that
    # every Gradle-based tool reads — not credential theft. The credential is the
    # stored proxy password.
    type: string_literal
    regex: systemProp\.(http|https)\.proxyPassword
- id: nuget-config
  desc: NuGet.Config credential reference
  crit: notable
  conf: 0.85
  if:
    type: string_literal
    regex: NuGet\.Config|<packageSourceCredentials>
- id: gitlab-api-client-gl-got-require
  desc: GitLab gl-got client require
  crit: notable
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: text
    regex: 'require\([''"]gl-got[''"]\)'
- id: gitlab-api-client-wrapper-require
  desc: GitLab gl-got wrapper require
  crit: notable
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: text
    regex: 'require\([''"]\.\/gl-got-wrapper[''"]\)'
- id: gitlab-api-client-glgot-call
  desc: GitLab glGot call marker
  crit: notable
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: symbol
    exact: glGot
- id: gitlab-api-client-init-platform
  desc: GitLab initPlatform call marker
  crit: notable
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: symbol
    exact: initPlatform
- id: gitlab-api-client-set-base-url
  desc: GitLab client sets its API base URL
  crit: notable
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: text
    regex: '(?i)(glGot|gl-got|gitlab)[^;\n]{0,160}setBaseUrl'
# NOTE: the bare "secret"/"password"/"credential" keyword atoms were removed —
# generic keywords belong in the neutral lexicon, not a credential-theft objective
# dir (they surfaced standalone as credential-theft component findings on any code
# mentioning those words, e.g. a DB driver). The cluster below references
# micro-behaviors/data/keywords/<concept>::{secret,password,credential}.
- id: jetbrains-secrets
  desc: JetBrains credential token or secret reference
  crit: notable
  conf: 0.75
  if:
    type: string_literal
    regex: '\\bjetbrains\\b.{0,20}\\b(token|password|secret)\\b'
    case_insensitive: true
- id: py-home-expand-cred
  desc: Python expands home dir for credential file
  crit: component
  conf: 0.85
  if:
    type: text
    regex: expanduser\s*\(.{0,30}(\.pypirc|\.netrc|\.git-credentials|credentials)
  downgrade:
    any:
    - id: metadata/build/pip/
- id: py-pathlib-pypirc
  desc: Python pathlib reads pypirc
  crit: notable
  conf: 0.85
  for: [python]
  if:
    type: text
    regex: 'Path\s*\(.{0,50}\.pypirc.{0,40}\)\.read_'
- id: py-pathlib-netrc
  desc: Python pathlib reads netrc
  crit: notable
  conf: 0.85
  for: [python]
  if:
    type: text
    regex: 'Path\s*\(.{0,50}\.netrc.{0,40}\)\.read_'
- id: py-pathlib-aws-creds
  desc: Python pathlib reads AWS credentials
  crit: notable
  conf: 0.85
  for: [python]
  if:
    type: text
    regex: 'Path\s*\(.{0,50}\.aws/credentials.{0,40}\)\.read_'
- id: py-pathlib-ssh-private-key
  desc: Python pathlib reads SSH private key
  crit: notable
  conf: 0.85
  unless:
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  for: [python]
  if:
    type: text
    regex: 'Path\s*\(.{0,50}\.ssh/id_[a-z0-9_]{2,16}.{0,40}\)\.read_'
- id: js-homedir-cred
  desc: JS directly reads package credential file
  crit: suspicious
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    regex: '(?i)(readFile(Sync)?|createReadStream)\s*\([^)]{0,80}(\.npmrc|\.git-credentials)'
  not:
  - substr: "homedir(), '.npmrc'"
  - substr: "path.join(homedir(), '.npmrc')"
  - substr: "HOME']}/.npmrc"
  - substr: "userconfig: { default: path.join(os.homedir(), '.npmrc') }"
  - substr: "configNames: { default: ['npmrc', '.npmrc'] }"
  unless:
  - id: well-known/app/qwen-code::qwen-code-bundle-text
- id: js-env-home-cred-npmrc
  desc: npmrc credential path marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(^|[/\\~''"\s])\.npmrc\b'
  count_max: 1030683
- id: js-env-home-cred-git
  desc: Git credentials path marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(^|[/\\~''"\s])\.git-credentials\b'
- id: js-env-home-cred-cargo
  desc: Cargo credentials path marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(^|[/\\~''"\s])[/\\]cargo[/\\]credentials\b'
- id: js-env-home-cred-gem
  desc: Gem credentials path marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(^|[/\\~''"\s])[/\\]gem[/\\]credentials\b'
- id: shell-cat-npmrc
  desc: Shell reads .npmrc file
  crit: suspicious
  conf: 0.9
  for: [shell]
  unless:
  - id: well-known/tool/development/aube::aube-package-test-fixture
  if:
    type: text
    regex: cat\s+[^<\n]{0,30}\.npmrc
  not:
  - substr: 'cat << EOF > "$HOME/.npmrc"'
  - regex: 'cat\s+<<\s*EOF\s*>\s*"\$HOME/\.npmrc"'
  - regex: 'cat\s*<<\s*\w+\s*>\s*"\$HOME/\.npmrc"'
- id: shell-cat-pypirc
  desc: Shell reads .pypirc file
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: cat\s+[^<\n]{0,30}\.pypirc
- id: shell-cat-netrc
  desc: Shell reads .netrc file
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: cat\s+[^<\n]{0,30}\.netrc
- id: shell-cat-git-credentials
  desc: Shell reads .git-credentials file
  crit: suspicious
  conf: 0.9
  unless:
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  if:
    type: text
    regex: cat\s+[^<\n]{0,30}\.git-credentials
- id: shell-curl-netrc-long
  desc: Shell curl uses netrc
  crit: suspicious
  conf: 0.9
  for: [shell]
  if:
    type: symbol
    kind: call
    exact: curl
    arg:
      kind: identifier
      name: --netrc
  unless:
  - type: raw
    regex: '\bcomplete\s+(--command|-c)\s+curl\b|#compdef\s+curl\b'
  - id: metadata/package/files/system-package::julia-runtime-path
  - id: metadata/package/files/system-package::shell-completion-script
  - id: well-known/tool/sysadmin/fish-bash-zsh/
  - id: well-known/tool/sysadmin/alpine-packages::alpine-parseable-binary
  - id: well-known/tool/sysadmin/alpine-packages::parseable-binary-name
  downgrade:
    any:
    - id: metadata/binary/metrics/text-density::shell-high-import-density
- id: shell-curl-netrc-short
  desc: Shell curl uses -n
  crit: suspicious
  conf: 0.9
  for: [shell]
  if:
    type: symbol
    kind: call
    exact: curl
    arg:
      kind: identifier
      name: -n
  unless:
  - type: raw
    regex: '\bcomplete\s+(--command|-c)\s+curl\b|#compdef\s+curl\b'
  - id: metadata/package/files/system-package::julia-runtime-path
  - id: metadata/package/files/system-package::shell-completion-script
  - id: well-known/tool/sysadmin/fish-bash-zsh/
  - id: well-known/tool/sysadmin/alpine-packages::alpine-parseable-binary
  - id: well-known/tool/sysadmin/alpine-packages::parseable-binary-name
  downgrade:
    any:
    - id: metadata/binary/metrics/text-density::shell-high-import-density
- id: js-npmrc-to-fetch
  desc: JS references .npmrc near a fetch call
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  unless:
  - id: well-known/tool/detection/
  - id: well-known/tool/development/aube::aube-package-test-fixture
  - id: well-known/app/qwen-code::qwen-code-bundle-text
  if:
    type: text
    regex: \.npmrc[\s\S]{0,300}fetch
- id: js-npmrc-to-axios
  desc: JS sends .npmrc via axios
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  unless:
  - id: well-known/tool/detection/
  - id: well-known/tool/development/aube::aube-package-test-fixture
  if:
    type: text
    regex: \.npmrc[\s\S]{0,300}axios
- id: js-npmrc-to-http
  desc: JS sends .npmrc via http.request
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  unless:
  - id: well-known/tool/development/aube::aube-package-test-fixture
  if:
    type: text
    regex: \.npmrc[\s\S]{0,300}http\.request
- id: js-netrc-to-fetch
  desc: JS sends .netrc via fetch
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  unless:
  - id: well-known/tool/detection/
  if:
    type: text
    regex: \.netrc[\s\S]{0,300}fetch
- id: js-netrc-to-axios
  desc: JS sends .netrc via axios
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: \.netrc[\s\S]{0,300}axios
- id: js-netrc-to-http
  desc: JS sends .netrc via http.request
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: \.netrc[\s\S]{0,300}http\.request
- id: js-creds-to-axios--rx-13
  desc: Cargo credentials path marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(^|[./\\''"`])\.cargo/credentials\b'
  count_max: 1030706
- id: js-creds-to-axios--rx-14
  desc: RubyGems credentials path marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(^|[./\\''"`])\.gem/credentials\b'
  count_max: 1030707
- id: js-creds-to-axios--rx-15
  desc: Git credentials path marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(^|[./\\''"`])\.git-credentials\b'
  count_max: 1030708
- id: credentials-file-basename-marker
  desc: Credentials filename marker
  crit: component
  conf: 0.4
  if:
    type: text
    regex: '(^|[/\\])credentials([''"\s,)]|$)'
  unless:
  - type: text
    regex: '\.aws[/\\]credentials'
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: npmrc-base64-encode
  desc: .npmrc base64 encoded
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: \.npmrc[\s\S]{0,200}(base64|btoa|b64encode)
  unless:
  - id: metadata/package/testing/
- id: pypirc-base64-encode
  desc: .pypirc base64 encoded
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: \.pypirc[\s\S]{0,200}(base64|btoa|b64encode)
composite_rules:
- id: gitlab-api-client-token-marker
  desc: GitLab API client token marker
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  any:
  - id: gitlab-api-client-gl-got-require
  - id: gitlab-api-client-wrapper-require
  - id: gitlab-api-client-glgot-call
- id: py-pathlib-cred
  desc: Python pathlib credential file
  crit: suspicious
  conf: 0.85
  for: [python]
  any:
  - id: py-pathlib-pypirc
  - id: py-pathlib-netrc
  - id: py-pathlib-aws-creds
  - id: py-pathlib-ssh-private-key
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness/
- id: shell-cat-cred
  desc: Shell reads credential file
  crit: suspicious
  conf: 0.9
  any:
  - id: shell-cat-npmrc
  - id: shell-cat-pypirc
  - id: shell-cat-netrc
  - id: shell-cat-git-credentials
- id: shell-curl-cred
  desc: Shell curls with credential file
  crit: suspicious
  conf: 0.9
  any:
  - id: shell-curl-netrc-long
  - id: shell-curl-netrc-short
- id: creds-base64-encode
  desc: Credentials base64 encoded
  crit: suspicious
  conf: 0.85
  all:
  - id: credentials-file-basename-marker
  any:
  - id: micro-behaviors/data/encode/base64::base64-encoding
  - id: micro-behaviors/data/encode/base64::btoa-symbol
  near_bytes: 300
  unless:
  - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
  - id: metadata/package/testing/
  - id: well-known/lib/benign-runtime-bundles::bundled-npm-source
- id: cred-base64-encode
  desc: Credentials base64 encoded before send
  crit: suspicious
  conf: 0.85
  any:
  - id: creds-base64-encode
  - id: npmrc-base64-encode
  - id: pypirc-base64-encode
  unless:
  - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
- id: pypi-credential-theft
  desc: PyPI credential theft
  crit: hostile
  conf: 0.95
  mbc: E1552
  any:
  - id: pypirc-read
  - id: py-home-expand-cred
  all:
  - id: micro-behaviors/communications/http/request/credentials::python-credential-file-near-http-upload
- id: cred-to-http-js
  desc: JS credential path plus HTTP
  crit: suspicious
  conf: 0.9
  any:
  - id: js-npmrc-to-fetch
  - id: js-npmrc-to-axios
  - id: js-npmrc-to-http
  - id: js-netrc-to-fetch
  - id: js-netrc-to-axios
  - id: js-netrc-to-http
  - id: js-creds-to-fetch
  - id: js-creds-to-axios
  - id: js-creds-to-http
- id: npm-script-npmrc-token-theft
  desc: npm script exfiltrates .npmrc
  crit: hostile
  conf: 0.97
  for: [package.json]
  mbc: E1552
  attack: T1195.002,T1552.001,T1041
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::script-credential-dotfile
  - id: micro-behaviors/communications/http/post::npm-script-node-http-post
  - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
  - id: objectives/exfiltration/oob/endpoint::ngrok-free
- id: cargo-credential-theft
  desc: Cargo credential theft
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/fs/path/sensitive/credentials::cargo-credentials-file
  - id: cargo-registry-token
- id: gem-credential-theft-comp
  desc: RubyGems credential access
  crit: notable
  conf: 0.95
  all:
  - id: micro-behaviors/fs/path/sensitive/credentials::gem-credentials-file
  any:
  - id: rubygems-api-key-var
  - id: gem-host-api-key-var
- id: ci-credential-theft
  desc: CI/CD credential theft
  crit: hostile
  conf: 0.95
  needs: 2
  any:
  - id: micro-behaviors/os/env/vars/ci-credentials
  unless:
  - id: metadata/package/quality/gitlab-release::gitlab-release-client-context
- id: supply-chain-credential-theft
  desc: Supply chain credential theft attack
  crit: hostile
  conf: 0.98
  mbc: E1552
  any:
  - id: pypi-credential-theft
  - id: cargo-credential-theft
  - id: gem-credential-theft-comp
  - id: ci-credential-theft
- id: js-env-home-cred
  desc: JS reads credential file from user home directory
  crit: suspicious
  conf: 0.85
  near_bytes: 512
  all:
  - id: js-env-home-read-api
  - id: js-env-home-var
  any:
  - id: js-env-home-cred-npmrc
  - id: js-env-home-cred-git
  - id: js-env-home-cred-cargo
  - id: js-env-home-cred-gem
  not:
  - substr: 'userconfig:{default:be.join(process.env.HOME||nr.homedir(),".npmrc")}'
  - substr: 'cache:{default:be.join(process.env.HOME||nr.homedir(),".npm")}'
  - substr: 'configNames:{default:["npmrc",".npmrc"]}'
  unless:
  - id: micro-behaviors/process/interpreter/vm/
  - id: well-known/tool/detection/sast/
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/lib/bun-runtime/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/
  - id: metadata/library/runtime/
- id: js-env-home-read-api
  desc: JS home credential read API
  crit: component
  conf: 0.85
  any:
  - id: micro-behaviors/fs/file/read::create-read-stream
  - id: micro-behaviors/fs/file/read::read-node
  - id: micro-behaviors/fs/file/read::node-open-sync
- id: js-env-home-var
  desc: JS home environment variable
  crit: component
  conf: 0.85
  any:
  - id: micro-behaviors/os/env/vars/access::js-process-env-home
  - id: micro-behaviors/process/user/query::os-homedir-call
  - id: micro-behaviors/os/env/vars/user-paths::userprofile-var
- id: js-creds-to-fetch
  desc: JS credential path with fetch
  crit: suspicious
  conf: 0.9
  for: [javascript]
  near_lines: 60
  all:
  - id: js-creds-path
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  any:
  - id: metadata/import/builtin::require-fs
  - id: micro-behaviors/fs/file/read::read-node
  - id: micro-behaviors/fs/file/read::read-text-utf8
  - id: js-env-home-read-api
  unless:
  - id: metadata/package/testing/presence/fixture/
  - id: metadata/package/testing/presence/harness/
  not:
  - substr: credentialsInUrl
  - regex: RequestCredentials\s*=
  - regex: \bthis\.credentials\s*=\s*credentials\b
  - regex: \bcredentials\s*:\s*credentials\s*\?\?\s*this\.credentials\b
  - regex: '[\./]credentials\s*=\s*["''](include|same-origin|omit)["'']'
  - regex: '[\./]credentials\s*:\s*["''](include|same-origin|omit)["'']'
  - regex: '[\./]credentials\s*,\s*headers'
  - regex: '\.credentials\s*&&[\s\S]{0,300}fetch'
  - regex: crossOrigin\s*=\s*["'']use-credentials["'']
  - regex: /\.d\.ts["'`]?[\s\S]{0,80}fetch
- id: js-creds-to-axios
  desc: JS credential path with axios
  crit: suspicious
  conf: 0.9
  unless:
  - id: well-known/tool/detection/
  all:
  - id: js-creds-path
  - id: micro-behaviors/communications/http/lib/axios::request-axios
  any:
  - id: metadata/import/builtin::require-fs
  - id: micro-behaviors/fs/file/read::read-node
  - id: micro-behaviors/fs/file/read::read-text-utf8
  - id: js-env-home-read-api
- id: js-creds-to-http
  desc: JS credential path with http.request
  crit: suspicious
  conf: 0.9
  all:
  - id: js-creds-path
  - id: micro-behaviors/communications/http/request/client::http-request
  any:
  - id: metadata/import/builtin::require-fs
  - id: micro-behaviors/fs/file/read::read-node
  - id: micro-behaviors/fs/file/read::read-text-utf8
  - id: js-env-home-read-api
- id: js-creds-path
  desc: JS package credential path
  crit: component
  conf: 0.9
  any:
  - id: objectives/supply-chain/credential-theft/registry::js-creds-to-axios--rx-13
  - id: objectives/supply-chain/credential-theft/registry::js-creds-to-axios--rx-14
  - id: objectives/supply-chain/credential-theft/registry::js-creds-to-axios--rx-15
  - id: js-creds-to-axios--rx-13
  - id: js-creds-to-axios--rx-14
