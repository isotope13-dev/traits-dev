defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
  crit: suspicious
  attack: T1552.001
traits:
- id: pypirc-path
  desc: .pypirc credential file reference
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: .pypirc
  unless:
  - id: metadata/file/catalog/identity/
  - id: metadata/build/pip::setuptools-package-index
  downgrade:
    any:
    - id: metadata/build/pip/
- id: pypirc-read
  desc: Reads .pypirc file
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: open\s*\(.{0,50}\.pypirc
- id: pip-conf-path
  desc: pip.conf credential file reference
  crit: notable
  conf: 0.75
  if:
    type: string_literal
    regex: (pip\.conf|pip/pip\.conf)
  unless:
  - id: metadata/file/catalog/identity/
- id: cargo-credentials-path
  desc: Cargo credentials file reference
  crit: suspicious
  conf: 0.9
  if:
    type: string_literal
    substr: .cargo/credentials
  unless:
  - id: metadata/file/catalog/identity/
- id: cargo-registry-token
  desc: Cargo registry token reference
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    regex: registry\.token|CARGO_REGISTRY_TOKEN
  unless:
  - id: micro-behaviors/os/service/legitimate/
  - id: micro-behaviors/os/service/legitimate/
  - id: micro-behaviors/os/service/legitimate/
- id: gem-credentials-path
  desc: Gem credentials file reference
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: .gem/credentials
- id: rubygems-api-key-var
  desc: RubyGems API key variable
  crit: notable
  conf: 0.85
  if:
    type: string_literal
    word: rubygems_api_key
- id: gem-host-api-key-var
  desc: GEM_HOST_API_KEY variable
  crit: notable
  conf: 0.85
  if:
    type: string_literal
    word: GEM_HOST_API_KEY
- id: goprivate-netrc
  desc: Go private module auth via netrc
  crit: notable
  conf: 0.8
  if:
    type: string_literal
    substr: GOPRIVATE
- id: composer-auth-json
  desc: Composer auth.json reference
  crit: suspicious
  conf: 0.9
  if:
    type: string_literal
    regex: (\.composer|composer)/auth\.json|composer.{0,20}token
- id: maven-settings-path
  desc: Maven settings.xml reference
  crit: component
  conf: 0.85
  if:
    type: text
    substr: .m2/settings.xml
- id: maven-server-password-open
  desc: Maven server block with password
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: <server>[\s\S]{0,200}<password>
- id: maven-server-password-close
  desc: Maven password closed in server block
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: <password>[\s\S]{0,200}</server>
- id: gradle-properties
  desc: Gradle properties proxy password
  crit: notable
  conf: 0.8
  unless:
  - id: metadata/library/structure/
  if:
    # The bare `gradle.properties` filename is a routine Gradle build file that
    # every Gradle-based tool reads — not credential theft. The credential is the
    # stored proxy password.
    type: string_literal
    regex: systemProp\.(http|https)\.proxyPassword
- id: nuget-config
  desc: NuGet.Config credential reference
  crit: notable
  conf: 0.85
  if:
    type: string_literal
    regex: NuGet\.Config|<packageSourceCredentials>
- id: circleci-token-var
  desc: CIRCLECI_TOKEN variable
  crit: suspicious
  conf: 0.9
  for: [python, javascript, ruby, go]
  if:
    type: text
    regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}CIRCLECI_TOKEN
- id: circle-token-var
  desc: CIRCLE_TOKEN variable
  crit: suspicious
  conf: 0.9
  for: [python, javascript, ruby, go]
  if:
    type: text
    regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}CIRCLE_TOKEN
- id: travis-token-var
  desc: TRAVIS_TOKEN variable
  crit: suspicious
  conf: 0.9
  for: [python, javascript, ruby, go]
  if:
    type: text
    regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}TRAVIS_TOKEN
- id: jenkins-token-var
  desc: JENKINS_TOKEN variable
  crit: suspicious
  conf: 0.9
  for: [python, javascript, ruby, go]
  if:
    type: text
    regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}JENKINS_TOKEN
- id: jenkins-api-token-var
  desc: JENKINS_API_TOKEN variable
  crit: suspicious
  conf: 0.9
  for: [python, javascript, ruby, go]
  if:
    type: text
    regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}JENKINS_API_TOKEN
- id: gitlab-token-var
  desc: GITLAB_TOKEN variable
  crit: suspicious
  conf: 0.9
  for: [python, javascript, ruby, go]
  if:
    type: text
    regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}GITLAB_TOKEN
  unless:
  - id: objectives/supply-chain/credential-theft/registry/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/
- id: gitlab-api-client-gl-got-require
  desc: GitLab gl-got client require
  crit: component
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: text
    regex: 'require\([''"]gl-got[''"]\)'
- id: gitlab-api-client-wrapper-require
  desc: GitLab gl-got wrapper require
  crit: component
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: text
    regex: 'require\([''"]\.\/gl-got-wrapper[''"]\)'
- id: gitlab-api-client-glgot-call
  desc: GitLab glGot call context
  crit: component
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: symbol
    exact: glGot
- id: gitlab-api-client-init-platform
  desc: GitLab initPlatform call context
  crit: component
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: symbol
    exact: initPlatform
- id: gitlab-api-client-set-base-url
  desc: GitLab setBaseUrl call context
  crit: component
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: symbol
    exact: setBaseUrl
- id: ci-job-token-var
  desc: CI_JOB_TOKEN variable
  crit: suspicious
  conf: 0.9
  for: [python, javascript, ruby, go]
  if:
    type: text
    regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}CI_JOB_TOKEN
- id: gitlab-private-token-var
  desc: GITLAB_PRIVATE_TOKEN variable
  crit: suspicious
  conf: 0.9
  for: [python, javascript, ruby, go]
  if:
    type: text
    regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}GITLAB_PRIVATE_TOKEN
- id: codecov-token-var
  desc: CODECOV_TOKEN variable
  crit: suspicious
  conf: 0.85
  for: [python, javascript, ruby, go]
  if:
    type: text
    regex: (process\.env\.|os\.getenv\(|ENV\[|getenv\().{0,24}CODECOV_TOKEN
# NOTE: the bare "secret"/"password"/"credential" keyword atoms were removed —
# generic keywords belong in the neutral lexicon, not a credential-theft objective
# dir (they surfaced standalone as credential-theft component findings on any code
# mentioning those words, e.g. a DB driver). The cluster below references
# micro-behaviors/data/keywords/<concept>::{secret,password,credential}.
- id: settings-api-keyword
  desc: Settings API key keyword
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)settings[^\n]{0,80}api[_-]?key
- id: jetbrains-secrets
  desc: JetBrains IDE secrets
  crit: notable
  conf: 0.75
  if:
    type: string_literal
    regex: \.idea/.{1,30}\.(xml|iml)|jetbrains.{0,20}token
    case_insensitive: true
- id: py-home-expand-cred
  desc: Python expands home dir for credential file
  crit: component
  conf: 0.85
  if:
    type: text
    regex: expanduser\s*\(.{0,30}(\.pypirc|\.netrc|\.git-credentials|credentials)
  downgrade:
    any:
    - id: metadata/build/pip/
- id: py-pathlib-pypirc
  desc: Python pathlib reads pypirc
  crit: notable
  conf: 0.85
  for: [python]
  if:
    type: text
    regex: 'Path\s*\(.{0,50}\.pypirc.{0,40}\)\.read_'
- id: py-pathlib-netrc
  desc: Python pathlib reads netrc
  crit: notable
  conf: 0.85
  for: [python]
  if:
    type: text
    regex: 'Path\s*\(.{0,50}\.netrc.{0,40}\)\.read_'
- id: py-pathlib-aws-creds
  desc: Python pathlib reads AWS credentials
  crit: notable
  conf: 0.85
  for: [python]
  if:
    type: text
    regex: 'Path\s*\(.{0,50}\.aws/credentials.{0,40}\)\.read_'
- id: py-pathlib-ssh-private-key
  desc: Python pathlib reads SSH private key
  crit: notable
  conf: 0.85
  for: [python]
  if:
    type: text
    regex: 'Path\s*\(.{0,50}\.ssh/id_[a-z0-9_]{2,16}.{0,40}\)\.read_'
- id: js-homedir-cred
  desc: JS accesses credential file via homedir
  crit: suspicious
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    regex: (read|open).{0,80}(homedir|HOME).{0,50}(\.npmrc|\.git-credentials)
  not:
  - substr: "homedir(), '.npmrc'"
  - substr: "path.join(homedir(), '.npmrc')"
  - substr: "HOME']}/.npmrc"
  - substr: "userconfig: { default: path.join(os.homedir(), '.npmrc') }"
  - substr: "configNames: { default: ['npmrc', '.npmrc'] }"
- id: js-env-home-cred--rx-1
  desc: createReadStream file-read call
  crit: component
  conf: 0.85
  if:
    type: text
    substr: createReadStream
  count_max: 1030681
- id: js-env-home-cred--rx-2
  desc: readFileSync file-read call
  crit: component
  conf: 0.85
  if:
    type: text
    substr: readFileSync
  count_max: 1030682
- id: js-env-home-cred-npmrc
  desc: npmrc credential path marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(^|[/\\~''"\s])\.npmrc\b'
  count_max: 1030683
- id: js-env-home-cred-git
  desc: Git credentials path marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(^|[/\\~''"\s])\.git-credentials\b'
- id: js-env-home-cred-cargo
  desc: Cargo credentials path marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(^|[/\\~''"\s])[/\\]cargo[/\\]credentials\b'
- id: js-env-home-cred-gem
  desc: Gem credentials path marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(^|[/\\~''"\s])[/\\]gem[/\\]credentials\b'
- id: js-env-home-cred--rx-6
  desc: openSync file-open call
  crit: component
  conf: 0.85
  if:
    type: text
    substr: openSync
  count_max: 1030686
- id: shell-cat-npmrc
  desc: Shell reads .npmrc file
  crit: suspicious
  conf: 0.9
  for: [shell]
  if:
    type: text
    regex: cat\s+[^<\n]{0,30}\.npmrc
  not:
  - substr: 'cat << EOF > "$HOME/.npmrc"'
  - regex: 'cat\s+<<\s*EOF\s*>\s*"\$HOME/\.npmrc"'
  - regex: 'cat\s*<<\s*\w+\s*>\s*"\$HOME/\.npmrc"'
- id: shell-cat-pypirc
  desc: Shell reads .pypirc file
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: cat\s+[^<\n]{0,30}\.pypirc
- id: shell-cat-netrc
  desc: Shell reads .netrc file
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: cat\s+[^<\n]{0,30}\.netrc
- id: shell-cat-git-credentials
  desc: Shell reads .git-credentials file
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: cat\s+[^<\n]{0,30}\.git-credentials
- id: shell-cat-credentials
  desc: Shell reads credentials file
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (?m)(^|[;&|]\s*)cat\s+[^<\n]{0,30}credentials
  unless:
    # Security scanners list `cat … credentials` as a threat signature.
  - id: well-known/tool/detection/ai-guardrail/
- id: shell-curl-cred
  desc: Shell curls with credential file
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: curl[^|\n]{0,30}--netrc|curl[^|\n]{0,30}-n\s
  downgrade:
    any:
    - id: metadata/binary/metrics/text-density::shell-high-import-density
  unless:
  - id: well-known/tool/sysadmin/fish-bash-zsh/
- id: cred-to-http-py
  desc: Python sends credentials via HTTP
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (\.pypirc|\.netrc|\.aws/credentials)[\s\S]{0,300}requests\.(post|put)
- id: js-npmrc-to-fetch
  desc: JS sends .npmrc via fetch
  crit: suspicious
  conf: 0.9
  unless:
  - id: well-known/tool/detection/
  if:
    type: text
    regex: \.npmrc[\s\S]{0,300}fetch
- id: js-npmrc-to-axios
  desc: JS sends .npmrc via axios
  crit: suspicious
  conf: 0.9
  unless:
  - id: well-known/tool/detection/
  if:
    type: text
    regex: \.npmrc[\s\S]{0,300}axios
- id: js-npmrc-to-http
  desc: JS sends .npmrc via http.request
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \.npmrc[\s\S]{0,300}http\.request
- id: js-netrc-to-fetch
  desc: JS sends .netrc via fetch
  crit: suspicious
  conf: 0.9
  unless:
  - id: well-known/tool/detection/
  if:
    type: text
    regex: \.netrc[\s\S]{0,300}fetch
- id: js-netrc-to-axios
  desc: JS sends .netrc via axios
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \.netrc[\s\S]{0,300}axios
- id: js-netrc-to-http
  desc: JS sends .netrc via http.request
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \.netrc[\s\S]{0,300}http\.request
- id: js-creds-to-fetch--rx-12
  desc: fetch marker for credential exfil
  crit: component
  conf: 0.9
  for: [javascript]
  if:
    type: text
    substr: fetch
  count_max: 1030705
- id: js-creds-to-axios--rx-13
  desc: Cargo credentials path marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(^|[./\\''"`])\.cargo/credentials\b'
  count_max: 1030706
- id: js-creds-to-axios--rx-14
  desc: RubyGems credentials path marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(^|[./\\''"`])\.gem/credentials\b'
  count_max: 1030707
- id: js-creds-to-axios--rx-15
  desc: Git credentials path marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(^|[./\\''"`])\.git-credentials\b'
  count_max: 1030708
- id: js-creds-to-axios--rx-16
  desc: axios HTTP client call
  crit: component
  conf: 0.9
  if:
    type: text
    substr: axios
  count_max: 1030709
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: js-creds-to-http--rx-20
  desc: http.request network call
  crit: component
  conf: 0.9
  if:
    type: text
    substr: http.request
  count_max: 1030713
- id: credentials-file-basename-context
  desc: Credentials filename context
  crit: component
  conf: 0.4
  if:
    type: text
    regex: '(^|[/\\])credentials([''"\s,)]|$)'
  unless:
  - type: text
    regex: '\.aws[/\\]credentials'
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: npmrc-base64-encode
  desc: .npmrc base64 encoded
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: \.npmrc[\s\S]{0,200}(base64|btoa|b64encode)
- id: pypirc-base64-encode
  desc: .pypirc base64 encoded
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: \.pypirc[\s\S]{0,200}(base64|btoa|b64encode)
composite_rules:
- id: gitlab-api-client-token-context
  desc: GitLab API client token context
  crit: baseline
  conf: 0.9
  for: [javascript, typescript]
  any:
  - id: gitlab-api-client-gl-got-require
  - id: gitlab-api-client-wrapper-require
  - id: gitlab-api-client-glgot-call
  - id: gitlab-api-client-init-platform
  - id: gitlab-api-client-set-base-url
- id: settings-secret-keyword-cluster
  desc: Settings secret keyword
  crit: component
  conf: 0.75
  any:
  - id: objectives/credential-access/theft/keywords::credential-keywords
  - id: settings-api-keyword
- id: vscode-settings
  desc: VS Code settings with potential secrets
  crit: notable
  conf: 0.75
  near_bytes: 240
  all:
  - id: micro-behaviors/fs/path/application/config::vscode-settings-json-filename
  - id: settings-secret-keyword-cluster
- id: py-pathlib-cred
  desc: Python pathlib credential file
  crit: suspicious
  conf: 0.85
  for: [python]
  any:
  - id: py-pathlib-pypirc
  - id: py-pathlib-netrc
  - id: py-pathlib-aws-creds
  - id: py-pathlib-ssh-private-key
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness/
- id: maven-settings-xml
  desc: Maven settings.xml with credentials
  crit: suspicious
  conf: 0.85
  any:
  - id: maven-settings-path
  - id: maven-server-password-open
  - id: maven-server-password-close
- id: shell-cat-cred
  desc: Shell reads credential file
  crit: suspicious
  conf: 0.9
  any:
  - id: shell-cat-npmrc
  - id: shell-cat-pypirc
  - id: shell-cat-netrc
  - id: shell-cat-git-credentials
  - id: shell-cat-credentials
- id: creds-base64-encode
  desc: Credentials base64 encoded
  crit: suspicious
  conf: 0.85
  all:
  - id: credentials-file-basename-context
  any:
  - id: micro-behaviors/data/encode/base64::base64-encoding
  - id: micro-behaviors/data/encode/base64::btoa-symbol
  near_bytes: 300
  unless:
  - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
- id: cred-base64-encode
  desc: Credentials base64 encoded before send
  crit: suspicious
  conf: 0.85
  any:
  - id: creds-base64-encode
  - id: npmrc-base64-encode
  - id: pypirc-base64-encode
  unless:
  - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
- id: pypi-credential-theft
  desc: PyPI credential theft
  crit: hostile
  conf: 0.95
  mbc: E1552
  any:
  - id: pypirc-read
  - id: py-home-expand-cred
  all:
  - id: cred-to-http-py
- id: cred-to-http-js
  desc: JS credential path plus HTTP
  crit: suspicious
  conf: 0.9
  any:
  - id: js-npmrc-to-fetch
  - id: js-npmrc-to-axios
  - id: js-npmrc-to-http
  - id: js-netrc-to-fetch
  - id: js-netrc-to-axios
  - id: js-netrc-to-http
  - id: js-creds-to-fetch
  - id: js-creds-to-axios
  - id: js-creds-to-http
- id: cargo-credential-theft
  desc: Cargo credential theft
  crit: hostile
  conf: 0.95
  all:
  - id: cargo-credentials-path
  - id: cargo-registry-token
- id: gem-credential-theft-comp
  desc: RubyGems credential access
  crit: notable
  conf: 0.95
  all:
  - id: gem-credentials-path
  any:
  - id: rubygems-api-key-var
  - id: gem-host-api-key-var
- id: ci-credential-theft
  desc: CI/CD credential theft
  crit: hostile
  conf: 0.95
  needs: 2
  any:
  - id: circleci-token-var
  - id: circle-token-var
  - id: travis-token-var
  - id: jenkins-token-var
  - id: jenkins-api-token-var
  - id: gitlab-token-var
  - id: ci-job-token-var
  - id: gitlab-private-token-var
  - id: codecov-token-var
- id: supply-chain-credential-theft
  desc: Supply chain credential theft attack
  crit: hostile
  conf: 0.98
  mbc: E1552
  any:
  - id: pypi-credential-theft
  - id: cargo-credential-theft
  - id: gem-credential-theft-comp
  - id: ci-credential-theft
- id: js-env-home-cred
  desc: JS reads credential file from user home directory
  crit: suspicious
  conf: 0.85
  near_bytes: 512
  all:
  - id: js-env-home-read-api
  - id: js-env-home-var
  any:
  - id: js-env-home-cred-npmrc
  - id: js-env-home-cred-git
  - id: js-env-home-cred-cargo
  - id: js-env-home-cred-gem
  not:
  - substr: 'userconfig:{default:be.join(process.env.HOME||nr.homedir(),".npmrc")}'
  - substr: 'cache:{default:be.join(process.env.HOME||nr.homedir(),".npm")}'
  - substr: 'configNames:{default:["npmrc",".npmrc"]}'
  unless:
  - id: micro-behaviors/process/create/shell/host/
  - id: well-known/tool/detection/sast/
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/lib/bun-runtime/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/
  - id: metadata/library/runtime/
- id: js-env-home-read-api
  desc: JS home credential read API
  crit: component
  conf: 0.85
  any:
  - id: js-env-home-cred--rx-1
  - id: js-env-home-cred--rx-2
  - id: js-env-home-cred--rx-6
- id: js-env-home-var
  desc: JS home environment variable
  crit: component
  conf: 0.85
  any:
