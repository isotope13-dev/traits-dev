defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
traits:
  - id: rubygems-push-api-path
    desc: RubyGems push API path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /api/v1/gems
  - id: hardcoded-rubygems-token
    desc: Hardcoded RubyGems API token
    crit: suspicious
    conf: 0.98
    attack: T1552.001
    if:
      type: text
      regex: 'rubygems_[A-Za-z0-9]{32,}'
  - id: gem-specification-yaml
    desc: RubyGems specification YAML
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Gem::Specification
  - id: gem-metadata-gz-name
    desc: RubyGems metadata.gz member
    crit: component
    conf: 0.9
    if:
      type: text
      substr: metadata.gz
  - id: gem-data-tar-gz-name
    desc: RubyGems data.tar.gz member
    crit: component
    conf: 0.9
    if:
      type: text
      substr: data.tar.gz
  - id: js-octet-stream-upload
    desc: JavaScript uploads octet-stream body
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'Content-Type.{0,40}application/octet-stream'
composite_rules:
  - id: js-gem-archive-builder
    desc: JavaScript builds RubyGems archive
    crit: component
    conf: 0.96
    all:
      - id: gem-specification-yaml
      - id: gem-metadata-gz-name
      - id: gem-data-tar-gz-name
  - id: rubygems-token-publish-upload
    desc: RubyGems publish API upload with hardcoded token
    crit: hostile
    conf: 0.99
    attack: "T1195.002, T1552.001"
    mbc: E1552
    all:
      - id: hardcoded-rubygems-token
      - id: rubygems-push-api-path
      - id: js-octet-stream-upload
    any:
      - id: js-gem-archive-builder
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
