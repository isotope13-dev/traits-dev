defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1528
traits:
  - id: gh-auth-token
    desc: Extracts GitHub token via gh CLI
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: gh auth token
    # Release automation commonly obtains the maintainer's own GitHub token
    # for release-it.  Keep this rule for token access elsewhere, but do not
    # convict a package merely because its explicit `release` script invokes
    # the documented GitHub CLI helper.
    unless:
      - type: value
        path: scripts.release
        regex: '(?i)\bgh\s+auth\s+token\b'
      - type: text
        regex: '(?i)"release"\s*:\s*"[^"\r\n]{0,240}\bgh\s+auth\s+token\b'
