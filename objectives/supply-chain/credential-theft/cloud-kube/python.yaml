defaults:
  platforms: [unix]
  for: [python]
  attack: "T1552.001, T1041"
  mbc: E1552

traits:
- id: python-ai-provider-env-harvest--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'os\.(getenv|environ(\.get)?)\s*\(.{0,40}(OPENAI_API_KEY|ANTHROPIC_API_KEY)'
  count_max: 1031024
- id: python-ai-provider-env-harvest--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'os\.(getenv|environ(\.get)?)\s*\(.{0,40}(AZURE_OPENAI_API_KEY|AZURE_API_KEY)'
  count_max: 1031025
- id: python-kube-serviceaccount-read--rx-3
  desc: Kubernetes service-account token path cluster
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '/var/run/secrets/kubernetes\.io/serviceaccount[\s\S]{0,700}\b(token|namespace|ca\.crt)\b'
  count_max: 1031026
- id: python-kube-serviceaccount-read--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'open\s*\(.{0,120}/var/run/secrets/kubernetes\.io/serviceaccount/(token|namespace|ca\.crt)'
  count_max: 1031027
- id: python-kubectl-secret-dump
  desc: Python runs kubectl secret dump
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'kubectl.{0,80}get.{0,50}secrets'
  unless:
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness::test-directory
  - id: micro-behaviors/crypto/library/blockchain::crypto-exchange-sdk-benign-context
- id: python-secretsmanager-sweep--rx-5
  desc: AWS get_secret_value helper marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: get_secret_value
  count_max: 1031029
- id: python-secretsmanager-sweep--rx-6
  desc: AWS Secrets Manager client marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: secretsmanager
  count_max: 1031030
- id: python-secretsmanager-sweep--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: symbol
    exact: client
  count_max: 1031031
- id: python-secretsmanager-sweep--rx-8
  desc: AWS list_secrets helper marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: list_secrets
  count_max: 1031032
- id: python-secret-archive-cloud-config-path
  desc: Python archives cloud config path
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(\.aws/credentials|\.kube/config)'
- id: python-secret-archive-serviceaccount-token
  desc: Python archives Kubernetes serviceaccount token
  crit: component
  conf: 0.9
  if:
    type: text
    substr: serviceaccount/token
- id: python-secret-archive-ai-provider-key
  desc: Python archives AI provider key
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(OPENAI_API_KEY|ANTHROPIC_API_KEY)'
- id: python-secret-archive-targz-write
  desc: Python tar.gz archive writer
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'tarfile\.open\s*\(.{0,160}w:gz'
- id: python-encrypted-archive-post--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '(Fernet|AES|encrypt\s*\()[\s\S]{0,900}requests\.post\s*\('
  count_max: 1031039
- id: python-encrypted-archive-post--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'requests\.post\s*\([\s\S]{0,900}(Fernet|AES|encrypt\s*\()'
  count_max: 1031040
- id: python-user-systemd-unit-install
  desc: Python writes user systemd unit
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: '\.config/systemd/user[\s\S]{0,500}(ExecStart|systemctl\s+--user|daemon-reload|enable)'
  unless:
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness::test-directory

composite_rules:
- id: pypi-aws-shared-credentials-http-theft
  desc: PyPI package exfiltrates AWS shared credentials
  crit: hostile
  conf: 0.99
  for: [python, pkginfo, zip]
  platforms: [unix, windows]
  all:
  - id: objectives/exfiltration/http/upload::aws-shared-credentials-http-exfil
  any:
  - id: metadata/build/pip::setup-py
  - id: metadata/build/pip::pyproject-toml
  - id: metadata/package/scripts::wheel-console-entrypoint
  scope: archive
- id: python-cloud-kube-secret-harvest
  desc: Python cloud Kubernetes secret harvest
  crit: hostile
  conf: 0.98
  all:
  - id: python-kube-serviceaccount-read
  any:
  - id: python-ai-provider-env-harvest
  - id: objectives/supply-chain/credential-theft/env::python-cloud-creds
  - id: objectives/supply-chain/credential-theft/env::python-package-tokens
  - id: python-kubectl-secret-dump
  - id: python-secretsmanager-sweep
  - id: micro-behaviors/os/container/runtime::api-secrets-path
  - id: micro-behaviors/fs/path/sensitive/credentials::kube-config
  - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
  needs: 2

- id: python-encrypted-secret-bundle-exfil
  desc: Python encrypted secret bundle exfiltration
  crit: hostile
  conf: 0.985
  all:
  - id: python-cloud-kube-secret-harvest
  - id: python-secret-tar-archive
  - id: python-encrypted-archive-post

- id: python-cloud-kube-archive-upload
  desc: Python cloud secrets archive upload
  crit: hostile
  conf: 0.985
  all:
  - id: python-cloud-kube-secret-harvest
  - id: python-secret-tar-archive
  any:
  - id: objectives/exfiltration/http/upload::python-targz-requests-post
  - id: objectives/exfiltration/http/upload::python-header-archive-post

- id: python-secret-exfil-systemd-backdoor
  desc: Python secret exfiltration systemd backdoor
  crit: hostile
  conf: 0.99
  all:
  - id: python-encrypted-secret-bundle-exfil
  - id: python-user-systemd-backdoor-install
- id: python-user-systemd-backdoor-install
  desc: Python systemd persistence with secret context
  crit: suspicious
  conf: 0.94
  all:
  - id: python-user-systemd-unit-install
  any:
  - id: python-cloud-kube-secret-harvest
  - id: python-secret-tar-archive
  - id: python-kubectl-secret-dump
  - id: python-secretsmanager-sweep
- id: python-ai-provider-env-harvest
  desc: Python AI provider key harvest
  crit: suspicious
  conf: 0.9
  any:
  - id: python-ai-provider-env-harvest--rx-1
  - id: python-ai-provider-env-harvest--rx-2
  unless:
  - id: objectives/supply-chain/credential-theft/env::legitimate-python-env-config-context
  - id: micro-behaviors/communications/http/llm::llm-provider-host-allowlist

- id: python-kube-serviceaccount-read
  desc: Python reads Kubernetes serviceaccount files
  crit: suspicious
  conf: 0.94
  any:
  - id: python-kube-serviceaccount-read--rx-3
  - id: python-kube-serviceaccount-read--rx-4
  unless:
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness::test-directory
- id: python-secretsmanager-sweep
  desc: Python sweeps AWS Secrets Manager
  crit: suspicious
  conf: 0.95
  any:
  - id: python-secretsmanager-sweep--rx-5
  - id: python-secretsmanager-sweep--rx-6
  - id: python-secretsmanager-sweep--rx-7
  - id: python-secretsmanager-sweep--rx-8
  unless:
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness::test-directory
  - id: micro-behaviors/crypto/library/blockchain::crypto-exchange-sdk-benign-context

- id: python-secret-tar-archive
  desc: Python archives harvested secret files
  crit: suspicious
  conf: 0.9
  all:
  - id: python-secret-archive-targz-write
  any:
  - id: python-secret-archive-cloud-config-path
  - id: python-secret-archive-serviceaccount-token
  - id: python-secret-archive-ai-provider-key
  near_bytes: 1600
  unless:
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness::test-directory

- id: python-encrypted-archive-post
  desc: Python posts encrypted secret archive
  crit: suspicious
  conf: 0.94
  any:
  - id: python-encrypted-archive-post--rx-15
  - id: python-encrypted-archive-post--rx-16
  unless:
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness::test-directory
