defaults:
  platforms: [unix]
  for: [python]
  attack: "T1552.001, T1041"
  mbc: E1552

traits:
- id: python-ai-provider-env-harvest--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'os\.(?:getenv|environ(?:\.get)?)\s*\(.{0,40}(OPENAI_API_KEY|ANTHROPIC_API_KEY)'
- id: python-ai-provider-env-harvest--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'os\.(?:getenv|environ(?:\.get)?)\s*\(.{0,40}(AZURE_OPENAI_API_KEY|AZURE_API_KEY)'
- id: python-kube-serviceaccount-read--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '/var/run/secrets/kubernetes\.io/serviceaccount[\s\S]{0,700}\b(token|namespace|ca\.crt)\b'
- id: python-kube-serviceaccount-read--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'open\s*\(.{0,120}/var/run/secrets/kubernetes\.io/serviceaccount/(token|namespace|ca\.crt)'
- id: python-kubectl-secret-dump
  desc: Python runs kubectl secret dump
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'kubectl.{0,80}get.{0,50}secrets'
  unless:
  - id: metadata/package/testing/presence::python-test-file
  - id: metadata/package/testing/presence::test-directory
- id: python-secretsmanager-sweep--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: get_secret_value
- id: python-secretsmanager-sweep--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: secretsmanager
- id: python-secretsmanager-sweep--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: boto3.client(
- id: python-secretsmanager-sweep--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: list_secrets
- id: python-secret-tar-archive--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(\.aws/credentials|\.kube/config)[\s\S]{0,1600}tarfile\.open\s*\(.{0,160}w:gz'
- id: python-secret-tar-archive--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(serviceaccount/token|OPENAI_API_KEY)[\s\S]{0,1600}tarfile\.open\s*\(.{0,160}w:gz'
- id: python-secret-tar-archive--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(ANTHROPIC_API_KEY)[\s\S]{0,1600}tarfile\.open\s*\(.{0,160}w:gz'
- id: python-secret-tar-archive--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'tarfile\.open\s*\(.{0,160}w:gz[\s\S]{0,1600}(\.aws/credentials|\.kube/config)'
- id: python-secret-tar-archive--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'tarfile\.open\s*\(.{0,160}w:gz[\s\S]{0,1600}(serviceaccount/token|OPENAI_API_KEY)'
- id: python-secret-tar-archive--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'tarfile\.open\s*\(.{0,160}w:gz[\s\S]{0,1600}(ANTHROPIC_API_KEY)'
- id: python-encrypted-archive-post--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '(?:Fernet|AES|encrypt\s*\()[\s\S]{0,900}requests\.post\s*\('
- id: python-encrypted-archive-post--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'requests\.post\s*\([\s\S]{0,900}(?:Fernet|AES|encrypt\s*\()'
- id: python-user-systemd-backdoor-install
  desc: Python installs user systemd backdoor
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '\.config/systemd/user[\s\S]{0,500}(ExecStart|systemctl\s+--user|daemon-reload|enable)'
  unless:
  - id: metadata/package/testing/presence::python-test-file
  - id: metadata/package/testing/presence::test-directory

composite_rules:
- id: python-cloud-kube-secret-harvest
  desc: Python cloud Kubernetes secret harvest
  crit: hostile
  conf: 0.98
  all:
  - id: python-kube-serviceaccount-read
  any:
  - id: python-ai-provider-env-harvest
  - id: objectives/supply-chain/credential-theft::python-cloud-creds
  - id: objectives/supply-chain/credential-theft::python-package-tokens
  - id: python-kubectl-secret-dump
  - id: python-secretsmanager-sweep
  - id: micro-behaviors/os/container/runtime::api-secrets-path
  - id: micro-behaviors/fs/path/sensitive/credentials::kube-config
  - id: micro-behaviors/fs/path/sensitive/credentials::aws-credentials-dup
  needs: 2

- id: python-encrypted-secret-bundle-exfil
  desc: Python encrypted secret bundle exfiltration
  crit: hostile
  conf: 0.985
  all:
  - id: python-cloud-kube-secret-harvest
  - id: python-secret-tar-archive
  - id: python-encrypted-archive-post

- id: python-cloud-kube-archive-upload
  desc: Python cloud secrets archive upload
  crit: hostile
  conf: 0.985
  all:
  - id: python-cloud-kube-secret-harvest
  - id: python-secret-tar-archive
  any:
  - id: objectives/exfiltration/http::python-targz-requests-post
  - id: objectives/exfiltration/http::python-header-archive-post

- id: python-secret-exfil-systemd-backdoor
  desc: Python secret exfiltration systemd backdoor
  crit: hostile
  conf: 0.99
  all:
  - id: python-encrypted-secret-bundle-exfil
  - id: python-user-systemd-backdoor-install
- id: python-ai-provider-env-harvest
  desc: Python AI provider key harvest
  crit: suspicious
  conf: 0.9
  any:
  - id: python-ai-provider-env-harvest--rx-1
  - id: python-ai-provider-env-harvest--rx-2
  needs: 1
  unless:
  - id: objectives/supply-chain/credential-theft::legitimate-python-env-config-context

- id: python-kube-serviceaccount-read
  desc: Python reads Kubernetes serviceaccount files
  crit: suspicious
  conf: 0.94
  any:
  - id: python-kube-serviceaccount-read--rx-3
  - id: python-kube-serviceaccount-read--rx-4
  needs: 1
  unless:
  - id: metadata/package/testing/presence::python-test-file
  - id: metadata/package/testing/presence::test-directory
- id: python-secretsmanager-sweep
  desc: Python sweeps AWS Secrets Manager
  crit: suspicious
  conf: 0.95
  any:
  - id: python-secretsmanager-sweep--rx-5
  - id: python-secretsmanager-sweep--rx-6
  - id: python-secretsmanager-sweep--rx-7
  - id: python-secretsmanager-sweep--rx-8
  needs: 1
  unless:
  - id: metadata/package/testing/presence::python-test-file
  - id: metadata/package/testing/presence::test-directory

- id: python-secret-tar-archive
  desc: Python archives harvested secret files
  crit: suspicious
  conf: 0.9
  any:
  - id: python-secret-tar-archive--rx-9
  - id: python-secret-tar-archive--rx-10
  - id: python-secret-tar-archive--rx-11
  - id: python-secret-tar-archive--rx-12
  - id: python-secret-tar-archive--rx-13
  - id: python-secret-tar-archive--rx-14
  needs: 1
  unless:
  - id: metadata/package/testing/presence::python-test-file
  - id: metadata/package/testing/presence::test-directory

- id: python-encrypted-archive-post
  desc: Python posts encrypted secret archive
  crit: suspicious
  conf: 0.94
  any:
  - id: python-encrypted-archive-post--rx-15
  - id: python-encrypted-archive-post--rx-16
  needs: 1
  unless:
  - id: metadata/package/testing/presence::python-test-file
  - id: metadata/package/testing/presence::test-directory

