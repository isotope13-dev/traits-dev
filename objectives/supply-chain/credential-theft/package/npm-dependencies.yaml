# npm credential stealer dependency patterns
# Detects combinations of npm dependencies commonly used in browser credential stealers
defaults:
  platforms: [windows, unix]
  for: [package.json]
  crit: notable
  conf: 0.8
  attack: T1195.002
traits:
  - id: npm-dep-dpapi
    desc: npm dependency on DPAPI library
    crit: suspicious
    conf: 0.9
    attack: T1555.003
    if:
      type: value
      path: dependencies.@primno/dpapi
  - id: npm-dep-better-sqlite3
    desc: npm dependency on better-sqlite3
    crit: component
    conf: 0.7
    if:
      type: value
      path: dependencies.better-sqlite3
  - id: npm-dep-sqlite3
    desc: npm dependency on sqlite3
    crit: component
    conf: 0.7
    if:
      type: value
      path: dependencies.sqlite3
  - id: npm-dep-socket-io-client
    desc: npm dependency on socket.io-client
    crit: component
    conf: 0.6
    if:
      type: value
      path: dependencies.socket.io-client
  - id: npm-script-install-axios
    desc: npm script installs axios at runtime
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: scripts
      regex: \bnpm\s+(i|install|add)\b.{0,80}\baxios\b
  - id: npm-script-install-request
    desc: npm script installs request at runtime
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: scripts
      regex: \bnpm\s+(i|install|add)\b.{0,80}\brequest\b
  - id: npm-script-install-sqlite3
    desc: npm script installs sqlite3 at runtime
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: scripts
      regex: \bnpm\s+(i|install|add)\b.{0,80}\bsqlite3\b
  - id: npm-script-install-socket-io-client
    desc: npm script installs socket.io-client
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: scripts
      regex: \bnpm\s+(i|install|add)\b.{0,80}\bsocket\.io-client\b
composite_rules:
  - id: npm-sqlite-dep
    desc: npm package depends on SQLite library
    crit: component
    conf: 0.75
    any:
      - id: npm-dep-better-sqlite3
      - id: npm-dep-sqlite3
  - id: npm-credential-stealer-deps
    desc: Credential stealer dependency combination
    crit: suspicious
    conf: 0.92
    attack: T1555.003
    all:
      - id: npm-dep-dpapi
    any:
      - id: npm-dep-better-sqlite3
      - id: npm-dep-sqlite3
      - id: metadata/package/dependencies::node-machine-id-dep
      - id: npm-dep-socket-io-client
  - id: npm-runtime-installed-stealer-deps
    desc: Runtime npm install of stealer deps
    crit: suspicious
    conf: 0.95
    all:
      - id: npm-script-install-sqlite3
    any:
      - id: npm-script-install-axios
      - id: npm-script-install-request
      - id: npm-script-install-socket-io-client
  - id: npm-postinstall-runtime-stealer-toolkit
    desc: Postinstall fetches stealer dependency toolkit
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
      - id: npm-runtime-installed-stealer-deps
      - id: metadata/package/files/package-json::has-src-directory
  - id: npm-browser-stealer-toolkit
    desc: Full browser credential stealer toolkit
    crit: hostile
    conf: 0.95
    attack: T1555.003
    all:
      - id: npm-dep-dpapi
      - id: npm-sqlite-dep
      - id: metadata/package/dependencies::node-machine-id-dep
