defaults:
  platforms:
    - unix
    - windows
  crit: notable
  attack: T1195.001
  mbc: B0030
  for:
    - python
traits:
  - id: dependency-gitpython
    desc: GitPython dependency
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: install_requires.{0,50}gitpython|gitpython.{0,50}install
  - id: dependency-sockets
    desc: sockets library dependency
    crit: notable
    conf: 0.65
    if:
      type: string_literal
      regex: '\binstall_requires\b.{0,80}\bsockets\b|\bsockets\b.{0,80}\binstall\b'
  - id: dependency-dhooks
    desc: dhooks Discord webhook library
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: '''dhooks''|"dhooks"|install_requires.{0,50}dhooks'
  - id: dependency-mss
    desc: Python setup metadata declares mss dependency
    crit: notable
    conf: 0.7
    if:
      # A bare "mss" string also occurs in ordinary import errors and
      # documentation.  Keep this dependency fragment tied to setup metadata.
      type: text
      regex: '(?is)\binstall_requires\b.{0,100}\bmss\b'
  - id: dependency-requests-sockets
    desc: requests and sockets combo
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: requests.{0,50}sockets|sockets.{0,50}requests
  - id: suspicious-dep-combo-1
    desc: 'Suspicious combo'
    if:
      type: string_literal
      regex: (sockets|aiohttp).{0,50}discord
  - id: suspicious-dep-combo-2
    desc: Suspicious combo (discord/request with pynput)
    if:
      type: string_literal
      regex: (discord|requests).{0,50}pynput

  - id: python-user-agent-helper-import
    desc: Imports external user-agent formatting helper
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '(?im)from\s+\w[\w.]*\s+import\s+\w+\s+as\s+\w*user_agent\w*'

  - id: python-user-agent-helper-key-pair
    desc: Passes cloud key pair to helper
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '(?is)user_agent\w*\.\w+\s*\(\s*self\._public_key_id\s*,\s*self\._private_key\b'
composite_rules:
  - id: suspicious-dep-combo
    desc: Suspicious dependency combination
    crit: suspicious
    conf: 0.8
    all:
      - id: suspicious-dep-combo-1
      - id: suspicious-dep-combo-2
  - id: pypi-suspicious-deps
    desc: Suspicious PyPI dependencies
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: dependency-gitpython
      - id: dependency-sockets
      - id: dependency-requests-sockets
    unless:
      - id: well-known/app/calvyn-code
  - id: stealer-dep-pattern
    desc: Token stealer dependency pattern
    crit: suspicious
    conf: 0.9
    needs: 3
    any:
      - id: dependency-gitpython
      - id: dependency-sockets
      - id: suspicious-dep-combo
  - id: discord-stealer-bot
    desc: Discord stealer bot with webhook exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: dependency-dhooks
      - id: dependency-mss
      - id: well-known/lib/discord-py::import

  - id: pypi-package-credentials-to-user-agent-helper
    desc: Python package leaks cloud key pair to imported helper
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1552.001,T1041
    for: [python-sdist]
    scope: archive
    all:
      - id: python-user-agent-helper-import
      - id: python-user-agent-helper-key-pair
      - id: metadata/build/pip::setup-py
