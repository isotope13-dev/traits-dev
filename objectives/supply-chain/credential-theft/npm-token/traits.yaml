defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
  attack: T1195.002
traits:
  - id: hardcoded-npm-auth-token
    desc: Hardcoded npm registry _authToken in script
    crit: suspicious
    conf: 0.97
    for: [scripts]
    if:
      type: encoded
      regex: '//registry\.npmjs\.org/:_authToken=npm_[A-Za-z0-9]{16,}'
  - id: encoded-npm-auth-token
    desc: Base64-encoded npm registry _authToken
    crit: suspicious
    conf: 0.97
    for: [scripts]
    if:
      type: encoded
      encoding: base64
      regex: '_authToken=npm_'
  - id: shell-base64-pipe-to-npmrc
    desc: Shell pipes base64-decoded data into .npmrc
    crit: suspicious
    conf: 0.97
    for: [shell]
    if:
      type: text
      regex: 'base64\s+-d\s*>\s*\S{0,40}\.npmrc'

  - id: process-env-token-1
    desc: Reads npm registry token env property
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: process\.env\.(NPM_TOKEN|NODE_AUTH_TOKEN|NPMRC_TOKEN|COREPACK_NPM_TOKEN)
  - id: process-env-token-2
    desc: Reads npm registry token env index
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: 'process\.env\[["''](NPM_TOKEN|NODE_AUTH_TOKEN|NPMRC_TOKEN|COREPACK_NPM_TOKEN)["'']\]'
  - id: process-env-npmrc-token
    desc: Accesses process.env for NPMRC token
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: process.env.NPMRC_TOKEN
  - id: encoded-id-exfil
    desc: Encoded victim identifier
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: btoa\(os\.hostname\(\)\)|Buffer\.from\(os\.userInfo\(\)\.username\)
composite_rules:
  - id: process-env-token
    desc: Reads npm registry token environment variable
    crit: notable
    conf: 0.95
    any:
      - id: process-env-token-1
      - id: process-env-token-2
  - id: lifecycle-hook
    desc: Lifecycle hook with system access
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
    any:
      - id: micro-behaviors/process/user/query::os-homedir-call
      - id: objectives/discovery/system/fingerprint/hardware::js-sysinfo-multi
  - id: npm-token-env-access
    desc: Accesses NPM registry token environment variables
    crit: component
    conf: 0.85
    any:
      - id: objectives/credential-access/env/secrets/npm-registry::env-npm-token
      - id: objectives/supply-chain/credential-theft/npm-token::process-env-npmrc-token
  - id: env-token-stealer
    desc: Environment token stealer
    crit: hostile
    conf: 0.95
    mbc: E1555
    attack: T1555.003
    all:
      - id: process-env-token
      - id: micro-behaviors/communications/http/post::post
    unless:
      - id: well-known/tool/detection/tyre-kicker/
      - id: well-known/tool/development/corepack::corepack-registry-client-context
    downgrade:
      any:
        - id: micro-behaviors/process/interpreter/vm/
  - id: npm-token-stealer-comp
    desc: NPM registry token stealer
    crit: hostile
    conf: 0.98
    mbc: E1555
    attack: T1555.003
    all:
      - id: npm-token-env-access
      - id: micro-behaviors/communications/http/post::post
  - id: hardcoded-npm-token-republish
    desc: Hardcoded npm token injected into .npmrc
    crit: hostile
    conf: 0.97
    for: [shell]
    all:
      - id: encoded-npm-auth-token
      - id: shell-base64-pipe-to-npmrc
