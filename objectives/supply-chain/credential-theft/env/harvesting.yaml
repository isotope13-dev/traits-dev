# Supply Chain Environment Variable Harvesting
# ATT&CK: T1552.001 (Credentials In Files)
# Detects packages that harvest sensitive environment variables during install
# Common in npm/pypi supply chain attacks
#
# NOTE: This file focuses on supply-chain specific patterns. Individual env var
# access patterns are defined in:
#   - objectives/credential-access/env/secret-access/node.yaml (JS)
#   - objectives/credential-access/env/secret-access/python.yaml (Python)
#   - objectives/credential-access/env/secret-access/generic.yaml (all)
defaults:
  platforms: [unix, windows]
  crit: notable
  attack: "T1552.001"
traits:
- id: npm-postinstall-env-iteration
  desc: npm postinstall iterates process.env
  crit: suspicious
  conf: 0.98
  for: [package.json]
  if:
    type: value
    path: "scripts.postinstall"
    regex: 'Object\.entries\s*\(\s*process\.env\s*\)'
- id: npm-postinstall-jwt-pattern
  desc: npm hook matches a JWT pattern
  crit: suspicious
  conf: 0.98
  for: [package.json]
  if:
    type: value
    path: "scripts.postinstall"
    substr: 'ey[a-zA-Z0-9_-]{10,}'
  # ============================================================
  # BULK ENVIRONMENT HARVESTING
  # ============================================================

  # --- Python ---
  # Note: Iterating environ.items/keys/values is in micro-behaviors/os/env/vars/access::python-environ-iteration
  # This trait covers dict() conversion only; use micro-behaviors/os/env/vars/access::python-environ-iteration
  # for iteration patterns
  # --- Shell ---
  # NOTE: printenv detection moved to micro-behaviors/os/env/vars/access::printenv
  # Shell-specific bulk env access lives in the generic micro-behavior tree.
  # --- API Keys (Python/Shell only) ---
  # ============================================================
  # TARGETED SECRET HARVESTING (Python/Shell specific)
  # NOTE: JavaScript patterns use existing traits from node.yaml
  # ============================================================
- id: py-harvest-secret-key
  desc: Python harvests secret key env vars
  crit: component
  conf: 0.85
  for: [python]
  if:
    type: text
    regex: '(getenv|environ\.get)\(.{0,20}SECRET.{0,20}KEY'
    case_insensitive: true
  # --- Cloud Provider: GCP (Python/Shell specific) ---
  # --- Database (Python specific) ---
- id: py-harvest-db-password
  desc: Python harvests database password env var
  crit: notable
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: '(getenv|environ).{0,30}DB_PASSWORD'
  unless:
  - id: objectives/supply-chain/credential-theft/env/
- id: py-harvest-database-url
  desc: Python harvests database URL env var
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: '(getenv|environ).{0,30}DATABASE_URL'
  unless:
  - id: objectives/supply-chain/credential-theft/env/
  - id: objectives/supply-chain/credential-theft/env/
  downgrade:
    any:
    - id: micro-behaviors/data/db/postgresql
    - id: micro-behaviors/data/db/orm::sqlalchemy
- id: py-mongo-uri-env-name
  desc: Python MongoDB URI env var
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    exact: MONGO_URI
- id: py-harvest-redis-url
  desc: Python harvests Redis URL env var
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: '(getenv|environ).{0,30}REDIS_URL'
  unless:
  - id: objectives/supply-chain/credential-theft/env/
  # --- GitHub/Git (Python specific) ---
- id: py-harvest-github-pat
  desc: Python harvests GITHUB_PAT env var
  crit: suspicious
  conf: 0.95
  for: [python]
  if:
    type: text
    regex: '(getenv|environ).{0,30}GITHUB_PAT\b'
  # --- NPM (Python specific - unusual but seen in supply chain attacks) ---
- id: py-harvest-npm-token
  desc: Python harvests NPM_TOKEN env var
  crit: suspicious
  conf: 0.95
  for: [python]
  if:
    type: text
    regex: '(getenv|environ).{0,30}NPM_TOKEN'
  # --- PyPI (Python specific) ---
- id: py-harvest-pypi-token
  desc: Python reads PYPI_TOKEN env var
  crit: suspicious
  conf: 0.95
  for: [python]
  if:
    type: text
    regex: '(getenv|environ).{0,30}PYPI_TOKEN'
  unless:
  - id: micro-behaviors/os/service/legitimate/
- id: py-harvest-twine-password
  desc: Python reads TWINE_PASSWORD env var
  crit: suspicious
  conf: 0.95
  for: [python]
  if:
    type: text
    regex: '(getenv|environ).{0,30}TWINE_PASSWORD'
  unless:
  - id: micro-behaviors/os/service/legitimate/
  # ============================================================
  # EXFILTRATION OF HARVESTED DATA
  # ============================================================
- id: py-env-to-post
  desc: Python POSTs environ body
  crit: suspicious
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: 'requests\.(post|put)\s*\([^)]{0,140}(json|data|files)\s*=\s*(dict\s*\(\s*)?os\.environ\b'
  not:
  - substr: 'Authorization'
  - substr: '"Authorization"'
  - substr: "'Authorization'"
  unless:
  - id: well-known/tool/detection/llm-scanner::ai-skill-scanner-report-doc
  - id: micro-behaviors/communications/http/services/github/
  - id: well-known/tool/offensive/sic-security/
  - id: metadata/package/files/ecosystem::openclaw-weiyun-safe-uploader
composite_rules:
- id: npm-postinstall-jwt-env-harvest
  desc: npm hook extracts JWT-like env secrets
  crit: hostile
  conf: 0.99
  for: [package.json]
  all:
  - id: npm-postinstall-env-iteration
  - id: npm-postinstall-jwt-pattern

- id: py-harvest-mongo-uri
  desc: Python harvests MongoDB URI env var
  crit: suspicious
  conf: 0.9
  for: [python]
  near_lines: 1
  all:
  - id: py-mongo-uri-env-name
  any:
  - id: micro-behaviors/os/env/vars/access::python-os-getenv-call
  - id: micro-behaviors/os/env/access::os-environ-symbol
  unless:
  - id: objectives/supply-chain/credential-theft/env/
- id: pypi-install-secret-key-harvest
  desc: Install-time Python secret key harvesting
  crit: suspicious
  conf: 0.9
  scope: leaf
  all:
  - id: py-harvest-secret-key
  - id: metadata/build/pip::root-setup-py
  unless:
  - id: metadata/file/magic/identity::zip-archive
  - id: metadata/package/files/included::archive-container-path
  - id: well-known/app/aws-sam-cli/
  - id: well-known/app/aws-elasticbeanstalk::awsebcli-source-tree
- id: pypi-install-database-url-harvest
  desc: Install-time Python database URL harvesting
  crit: suspicious
  conf: 0.9
  scope: leaf
  all:
  - id: py-harvest-database-url
  - id: metadata/build/pip::root-setup-py
  unless:
  - id: metadata/file/magic/identity::zip-archive
  - id: metadata/package/files/included::archive-container-path
- id: pypi-install-redis-url-harvest
  desc: Install-time Python Redis URL harvesting
  crit: suspicious
  conf: 0.9
  scope: leaf
  all:
  - id: py-harvest-redis-url
  - id: metadata/build/pip::root-setup-py
  unless:
  - id: metadata/file/magic/identity::zip-archive
  - id: metadata/package/files/included::archive-container-path
  # Python cloud credential indicators
  # NOTE: Cannot reference composite aws-credentials-access from python.yaml
  # Instead, define indicators locally
- id: python-cloud-creds
  desc: Python cloud credential access
  crit: notable
  conf: 0.9
  for: [python]
  any:
  - id: micro-behaviors/os/env/vars/credentials::python-gcp-app-creds-env-read
  - id: micro-behaviors/os/env/vars/credentials::python-gcp-service-account-env-read
  - id: micro-behaviors/os/env/vars/credentials::python-azure-client-secret-env-read
  - id: micro-behaviors/os/env/vars/cloud::python-azure-tenant-id-env-read
  - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
  # JavaScript cloud credential indicators - reference existing composite rules
- id: javascript-cloud-creds
  desc: JavaScript cloud credential access
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  any:
  - id: objectives/credential-access/env/secrets/cloud-access::node-aws
  - id: objectives/credential-access/env/secrets/cloud-access::node-cloud
  # Python package registry token indicators
- id: python-package-tokens
  desc: Python package registry tokens
  crit: notable
  conf: 0.9
  for: [python]
  any:
  - id: micro-behaviors/os/env/vars/credentials::python-github-token-env-read
  - id: micro-behaviors/os/env/vars/credentials::python-gh-token-env-read
  - id: py-harvest-github-pat
  - id: py-harvest-npm-token
  - id: py-harvest-pypi-token
  - id: py-harvest-twine-password
  # JavaScript package registry token indicators - reference existing composite rules
- id: javascript-package-tokens
  desc: JavaScript package registry tokens
  crit: notable
  conf: 0.9
  for: [javascript, typescript]
  any:
  - id: objectives/credential-access/env/secrets/source-control::node-git-token
  - id: objectives/credential-access/env/secrets/npm-registry::node-npm-token
  # === Python Env Harvesting ===
- id: python-env-harvest
    # ============================================================
    # HOSTILE COMPOSITES - Harvesting + Exfiltration
    # ============================================================

  desc: Python harvests and sends env vars
  crit: hostile
  conf: 0.95
  mbc: "E1552"
  for: [python]
  any:
  - id: micro-behaviors/os/env/vars/access::python-environ-dict
  - id: micro-behaviors/data/serialize/json::python-environ-json
  - id: micro-behaviors/os/env/vars/access::python-environ-iteration
  all:
  - id: py-env-to-post
  # === JavaScript Credential Env to Fetch ===
- id: js-prefixed-env-http-exfil
  desc: JavaScript exfils prefixed env vars
  crit: hostile
  conf: 0.97
  attack: T1041
  mbc: E1041
  for: [javascript, typescript]
  all:
  - id: objectives/credential-access/env/secrets/bulk-access
  - id: micro-behaviors/os/env/vars/access::js-env-index-copy-to-object
  - id: micro-behaviors/communications/http/request/credentials::js-app-env-prefix-filter
  - id: micro-behaviors/communications/http/request/credentials::js-env-object-post-body
  - id: micro-behaviors/communications/http/headers::bearer-token
  any:
  - id: micro-behaviors/communications/http/ip-discovery::ip-sb-geoip
  - id: micro-behaviors/communications/http/ip-discovery::ipify-api
- id: javascript-env-harvest
  desc: JavaScript harvests and sends env vars
  crit: hostile
  conf: 0.95
  for: [javascript, typescript]
  all:
  - id: micro-behaviors/communications/http/request/credentials::js-env-http-send
  any:
  - id: objectives/credential-access/env/secrets/bulk-access
  - id: objectives/credential-access/env/secrets/filtered-access::node-filtered-secret-scan
  - id: javascript-cloud-creds
  - id: javascript-package-tokens
  unless:
  - id: metadata/package/quality/recognized-contexts::aube-external-tools-download-context
  - id: well-known/app/jinicode::provider-user-agent
  # === Shell Env Harvesting ===
  # Composite: env/printenv piped to curl/wget
- id: shell-env-to-curl
  desc: Shell pipes env to curl/wget
  crit: notable
  conf: 0.95
  for: [shell]
  near_lines: 3
  all:
  - id: micro-behaviors/os/env/vars/pipeline::shell-env-pipe
  - id: micro-behaviors/process/create/shell/pipeline::pipe-to-http-client
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/package/quality/recognized-contexts::ci-source-context
- id: shell-env-harvest
  desc: Shell harvests and sends env vars
  crit: hostile
  conf: 0.98
  for: [shell]
  any:
  - id: micro-behaviors/os/env/vars/access::printenv
  - id: micro-behaviors/os/env/vars/pipeline::shell-env-pipe
  all:
  - id: shell-env-to-curl
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/package/quality/recognized-contexts::ci-source-context
  # === Cloud Credential Harvesting (multi-cloud = hostile) ===
- id: cloud-credential-harvest
  desc: Multi-cloud provider credential harvesting
  crit: hostile
  conf: 0.95
  needs: 2
  any:
  - id: python-cloud-creds
  - id: javascript-cloud-creds
  # === Package Manager Token Harvesting ===
- id: package-token-harvest
  desc: Package manager token harvesting
  crit: hostile
  conf: 0.95
  needs: 2
  any:
  - id: python-package-tokens
  - id: javascript-package-tokens
  # === Any Supply Chain Env Theft ===
- id: supply-chain-env-theft
  desc: Supply chain environment credential theft
  crit: hostile
  conf: 0.98
  mbc: "E1552"
  any:
  - id: python-env-harvest
  - id: javascript-env-harvest
  - id: js-prefixed-env-http-exfil
  - id: shell-env-harvest
  - id: cloud-credential-harvest
  - id: package-token-harvest
