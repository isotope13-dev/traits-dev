# NPM install-hook environment harvesting.
#
# A package that removes ordinary process variables, retains the rest, and
# later sends those values outside the host is harvesting the installer's
# environment.  The atomic is deliberately scoped to this install-time
# package context; generic environment access remains under micro-behaviors.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1195.002,T1552.001"

composite_rules:
  - id: npm-install-hook-environment-exfiltration
    desc: NPM install hook exfiltrates filtered environment values
    crit: hostile
    conf: 0.99
    attack: "T1195.002,T1552.001,T1041"
    mbc: E1041
    for: [archives]
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: micro-behaviors/os/env/vars/access::js-object-keys-env
      - id: micro-behaviors/os/env/vars/access::js-env-index-copy-to-object
      - id: objectives/credential-access/env/secrets/filtered-access::env-filter-method
      - id: micro-behaviors/communications/http/request/client::https-request
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: micro-behaviors/data/serialize/json::json-stringify-call
