# Disposable / freshly-registered package infrastructure — the throwaway names
# attackers stand up to drop malware: days-old, near-zero adoption, a release or
# two (or, conversely, dozens of rapid republishes to outrun a takedown). On
# their own these are review flags (benign new packages look the same on day
# one), strongest when an objective composite pairs them with artifact behavior.
defaults:
  for: [all]
  platforms: [unix, windows, android, ios]

composite_rules:
- id: freshly-published-unestablished-package
  desc: Brand-new registry release with near-zero adoption — a classic malware drop window
  crit: suspicious
  conf: 0.7
  # A package published in the last week that essentially nobody installs. Most
  # supply-chain malware is caught in exactly this window: a fresh version, no
  # community vetting yet. An established, widely-installed package is not a drop.
  all:
    - id: metadata/registry::freshly-published
    - id: metadata/registry::low-adoption
  unless:
    - id: metadata/registry::widely-installed

- id: freshly-published-deprecated-install
  desc: Installing a freshly-changed release the registry marks deprecated
  crit: notable
  conf: 0.65
  # A deprecated package that also just changed — abandoned code being pulled
  # in, or a deprecated name revived to ship something new under it.
  all:
    - id: metadata/registry::deprecated
    - id: metadata/registry::freshly-published

- id: fresh-unestablished-throwaway
  desc: Brand-new low-adoption throwaway package
  crit: notable
  conf: 0.6
  # The majority shape in the malicious-npm sweep: a package first seen in the
  # last week, only a release or two, essentially no installs.
  all:
    - id: metadata/registry::brand-new-package
    - id: metadata/registry::few-releases
    - id: metadata/registry::low-adoption

- id: fresh-package-with-install-hook
  desc: Brand-new package that runs an install-time script
  crit: notable
  conf: 0.65
  # A name that only just appeared and already wants to run code at install time.
  all:
    - id: metadata/registry::brand-new-package
    - id: metadata/registry::registry-install-hook

- id: new-package-publish-burst
  desc: A brand-new package bursting out several releases in 24h — a campaign drop cadence
  crit: notable
  conf: 0.6
  # Typosquat and dependency-confusion campaigns publish a fresh name and then
  # rev it repeatedly within hours (chasing an install, evading a takedown).
  all:
    - id: metadata/registry::brand-new-package
    - id: metadata/registry::publish-burst-24h

- id: young-package-release-churn
  desc: Young package with abnormal release churn
  crit: notable
  conf: 0.6
  # A name only weeks old that has already published 20+ versions — rapid
  # re-publish to chase an install window or outrun a takedown (e.g. 300+ in a
  # month). A genuinely popular fast-shipping project is excluded by widely-installed.
  all:
    - id: metadata/registry::recent-package
    - id: metadata/registry::many-releases
  unless:
    - id: metadata/registry::widely-installed
