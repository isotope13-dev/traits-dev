defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json]

traits:
  - id: postinstall-host-entry-list
    desc: Install helper lists host entry files
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'src/(main|index)\.[a-z]+'

composite_rules:
  - id: postinstall-host-project-rewrite
    desc: Install hook rewrites host project source or config
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    scope: outer
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
      - id: postinstall-host-entry-list
    unless:
      - id: well-known/app/codeam-cli::codeam-cli-benign-remote-agent
  - id: postinstall-project-rewrite-with-browser-exfil
    desc: Install hook rewrites host project and installs browser identity exfiltration
    crit: hostile
    conf: 0.99
    attack: "T1195.002,T1119,T1041"
    scope: archive
    all:
      - id: postinstall-host-project-rewrite
      - id: objectives/collection/stealer/browser::browser-auth-response-identity-interception
      - id: objectives/exfiltration/sensitive-data::browser-identity-upload-fields
      - id: objectives/exfiltration/sensitive-data::browser-activity-upload-path
      - id: micro-behaviors/communications/http/request/client::post-method-text
