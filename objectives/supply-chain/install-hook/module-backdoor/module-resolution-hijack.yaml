# Module Resolution Hijacking
# Detects package/runtime search-order hijacks through hidden module paths.
defaults:
  platforms: [windows, unix]
  for: [javascript, python, shell]
traits:
- id: hidden-module-directory--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: python_modules
  count_max: 1025725
- id: hidden-module-directory--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: site-packages
  count_max: 1025726
- id: hidden-module-directory--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: node_modules
  count_max: 1025727
- id: hidden-module-directory--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: pkgs
  count_max: 1025728
- id: hidden-module-directory--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: venv
  count_max: 1025729
- id: runtime-path-manipulation-hidden--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, python]
  if:
    type: text
    substr: module.paths
  count_max: 1025730
- id: runtime-path-manipulation-hidden--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, python]
  if:
    type: text
    substr: sys.path
  count_max: 1025731
- id: runtime-path-manipulation-hidden--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, python]
  if:
    type: text
    substr: unshift
  count_max: 1025732
- id: runtime-path-manipulation-hidden--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, python]
  if:
    type: text
    substr: append
  count_max: 1025733
- id: runtime-path-manipulation-hidden--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, python]
  if:
    type: text
    substr: extend
  count_max: 1025734
- id: runtime-path-manipulation-hidden--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, python]
  if:
    type: text
    substr: insert
  count_max: 1025735
- id: env-path-hijack-hidden
  desc: Hidden module path env
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(?i)(?:export\s+)?(NODE_PATH|PYTHONPATH)=.{0,120}/\.[\w-]{1,20}(?:/|[:;]|$)'

- id: require-from-hidden-path
  desc: Import from hidden module directory
  crit: notable
  conf: 0.85
  for: [javascript, python]
  if:
    type: text
    regex: '(?:require\(|import\s+).{0,40}/\.[\w-]{1,20}/'

composite_rules:
- id: module-resolution-hijack
  desc: Module resolution hijack
  crit: hostile
  conf: 0.95
  any:
  - id: runtime-path-manipulation-hidden
  - id: env-path-hijack-hidden
  - id: require-from-hidden-path
  all:
  - id: hidden-module-directory
  downgrade:
    any:
    - id: metadata/library/structure::js-large-module-bundle
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
- id: hidden-module-directory
  desc: Hidden module directory path reference
  crit: notable
  conf: 0.8
  any:
  - id: hidden-module-directory--rx-1
  - id: hidden-module-directory--rx-2
  - id: hidden-module-directory--rx-3
  - id: hidden-module-directory--rx-4
  - id: hidden-module-directory--rx-5
- id: runtime-path-manipulation-hidden
  desc: Hidden runtime path insertion
  crit: suspicious
  conf: 0.9
  for: [javascript, python]
  any:
  - id: runtime-path-manipulation-hidden--rx-6
  - id: runtime-path-manipulation-hidden--rx-7
  - id: runtime-path-manipulation-hidden--rx-8
  - id: runtime-path-manipulation-hidden--rx-9
  - id: runtime-path-manipulation-hidden--rx-10
  - id: runtime-path-manipulation-hidden--rx-11
