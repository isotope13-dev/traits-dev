defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1195.002
  mbc: B0024
composite_rules:
  - id: pypi-setup-callback-beacon
    desc: PyPI setup callback beacon exfiltration
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/dropper/delivery/http::http-ip-port-url
      - id: objectives/discovery/network/scan/external::ipify-org
      - id: metadata/package/files/wheel-sdist::from-setuptools-import
    any:
      - id: objectives/command-and-control/channel/deaddrop/url::py-urllib-chain
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen
      - id: metadata/package/versioning::pypi-version-placeholder
  - id: python-module-backdoor
    desc: Cross-platform Python module backdoor
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/sysinfo/platform/runtime::python-osname-nt-check
      - id: objectives/command-and-control/dropper/delivery/http::http-ip-port-url
      - id: objectives/anti-static/obfuscation/eval/scripting::b64decode-exec-pattern-dup
    any:
      - id: micro-behaviors/process/create/subprocess::sys-executable-popen
      - id: micro-behaviors/process/create/subprocess::popen-content
    unless:
      - id: metadata/package/testing/
