defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1195.002
  mbc: B0024
composite_rules:
  - id: python-module-backdoor
    desc: Cross-platform Python module backdoor
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/sysinfo/platform::python-osname-nt-check
      - id: objectives/command-and-control/dropper/delivery/http::http-ip-port-url
      - id: objectives/anti-static/obfuscation/eval/scripting::b64decode-exec-pattern-dup
    any:
      - id: micro-behaviors/process/create/subprocess::sys-executable-popen
      - id: micro-behaviors/process/create/subprocess::popen-content
    unless:
      - id: metadata/package::has-tests
