defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json]
  attack: "T1195.002"

traits:
  - id: npx-skills-add-global
    desc: Installs AI agent skill globally via npx
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '\bnpx\s+(-y\s+)?skills\s+add\b.{0,160}(--global|-g)\b'

  - id: npx-skills-remove-global
    desc: Removes AI agent skill globally via npx
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bnpx\s+(-y\s+)?skills\s+remove\b.{0,160}(--global|-g)\b'

  - id: ai-agent-skill-registration-action
    desc: AI agent skill registration action text
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(registering|installing).{0,80}(agent skill|ai agent)'

  - id: ai-agent-runtime-names
    desc: AI agent CLI names
    crit: component
    conf: 0.5
    if:
      type: text
      regex: '(?i)\b(claude[- ]code|cursor|codex)\b'

composite_rules:
  - id: postinstall-registers-ai-agent-skill
    desc: npm install hook registers global AI agent skill
    crit: suspicious
    conf: 0.94
    for: [javascript, typescript, package.json, archives]
    scope: archive
    near_bytes: 12000
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
      - id: npx-skills-add-global
    any:
      - id: ai-agent-skill-registration-action
      - id: ai-agent-runtime-names
      - id: objectives/evasion/security-bypass/llm/target::llm-agent-target
    unless:
      - id: well-known/app/olares
