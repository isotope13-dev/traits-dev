defaults:
  platforms: [qnx, unix]
  for: [java, class, java_class]
  attack: T1195.002

traits:
  - id: qnx-java-security-jar-path
    desc: QNX Java security jar path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.java-security.jar

  - id: qnx-java-fake-loginmodule
    desc: QNX Java fake LoginModule
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])LoginModule\.class'
    unless:
      - id: well-known/lib/benign-runtime-bundles::openjdk-source-archive-path

  - id: qnx-java-security-provider-hook
    desc: QNX Java security provider hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: login.configuration.provider
    unless:
      - id: well-known/lib/benign-runtime-bundles::openjdk-source-archive-path

  - id: qnx-java-bytecode-security-jar
    desc: QNX Java bytecode security jar
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2f 74 6d 70 2f 2e 6a 61 76 61 2d 73 65 63 75 72 69 74 79 2e 6a 61 72

  - id: qnx-java-bytecode-provider-hook
    desc: QNX Java bytecode provider hook
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 6c 6f 67 69 6e 2e 63 6f 6e 66 69 67 75 72 61 74 69 6f 6e 2e 70 72 6f 76 69 64 65 72
    unless:
      - id: well-known/lib/benign-runtime-bundles::openjdk-rt-jar
      - type: basename
        exact: rt.jar

composite_rules:
  - id: qnx-java-runtime-install-hook
    desc: QNX Java runtime install hook
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-java-security-jar-path
      - id: qnx-java-fake-loginmodule
      - id: qnx-java-security-provider-hook

  - id: qnx-java-bytecode-install-hook
    desc: QNX Java bytecode install hook
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: qnx-java-bytecode-security-jar
      - id: qnx-java-bytecode-provider-hook
