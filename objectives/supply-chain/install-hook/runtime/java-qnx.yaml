defaults:
  platforms: [qnx, unix]
  for: [java, class, java_class]
  attack: T1195.002

traits:
  - id: qnx-java-security-jar-path
    desc: QNX Java security jar path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.java-security.jar

  - id: qnx-java-bytecode-security-jar
    desc: QNX Java bytecode security jar
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2f 74 6d 70 2f 2e 6a 61 76 61 2d 73 65 63 75 72 69 74 79 2e 6a 61 72

composite_rules:
  - id: qnx-java-runtime-install-hook
    desc: QNX Java runtime install hook
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-java-security-jar-path
      - id: micro-behaviors/os/security/policy::java-loginmodule-class-reference
      - id: micro-behaviors/os/security/policy::java-login-configuration-provider-property

  - id: qnx-java-bytecode-install-hook
    desc: QNX Java bytecode install hook
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: qnx-java-bytecode-security-jar
      - id: micro-behaviors/os/security/policy::java-login-configuration-provider-property-bytecode
