defaults:
  platforms: [unix, windows]
composite_rules:
  - id: obfuscated-shortcut-hijacker
    desc: Obfuscated shortcut hijacker via supply-chain dropper
    mbc: E1014
    attack: T1547.009
    crit: hostile
    conf: 1.0
    all:
      - id: objectives/anti-static/obfuscation/multi-layer::supply-chain-obfuscation-patterns
    any:
      - id: objectives/persistence/login/startup/registry::windows-shortcut-walk-argument-inject
      - id: objectives/persistence/login/startup/registry::windows-shortcut-walk-modify
      - id: objectives/supply-chain/install-hook/dropper/setup-hook::pypi-com-extension-dropper
