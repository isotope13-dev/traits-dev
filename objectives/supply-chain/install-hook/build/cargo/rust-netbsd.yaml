defaults:
  platforms: [netbsd, unix]
  for: [rust, elf]
  attack: T1195.002

traits:
  - id: rust-cargo-prebuild-script
    desc: Rust Cargo prebuild script
    crit: suspicious
    conf: 0.94
    for: [elf]
    if:
      type: hex
      section: .rodata..Lanon.9c9c55e1fbc96921dfca14b07bf74aee.117
      pattern: 70 72 65 2d 62 75 69 6c 64 2d 73 63 72 69 70 74 20 3d 20 22 2f 74 6d 70 2f 65 6e 76 70 72 6f 62 65 5f 62 75 69 6c 64 5f 68 6f 6f 6b 2e 73 68 22

  - id: rust-cargo-prebuild-script-source
    desc: Rust Cargo prebuild script src
    crit: suspicious
    conf: 0.94
    for: [rust]
    if:
      type: text
      substr: pre-build-script = "/tmp/envprobe_build_hook.sh"

  - id: rust-cargo-registry-hijack
    desc: Rust Cargo registry hijack
    crit: suspicious
    conf: 0.94
    for: [elf]
    if:
      type: hex
      section: .rodata..Lanon.9c9c55e1fbc96921dfca14b07bf74aee.117
      pattern: 63 72 61 74 65 73 2e 69 6f 2d 69 6e 64 65 78

  - id: rust-cargo-registry-hijack-source
    desc: Rust Cargo registry hijack src
    crit: suspicious
    conf: 0.94
    for: [rust]
    if:
      type: text
      substr: crates.io-index

composite_rules:
  - id: rust-cargo-build-install-hook
    desc: Rust Cargo build install hook
    crit: hostile
    conf: 0.98
    all:
      - id: rust-cargo-prebuild-script
      - id: rust-cargo-registry-hijack

  - id: rust-cargo-build-install-hook-src
    desc: Rust Cargo build install hook src
    crit: hostile
    conf: 0.98
    all:
      - id: rust-cargo-prebuild-script-source
      - id: rust-cargo-registry-hijack-source
