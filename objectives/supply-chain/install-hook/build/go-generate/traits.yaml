# Go //go:generate build-time execution hooks.
# Go has no install hooks (`go get`/`go build` never run package code), so the
# install-hook dropper shape does not map. The one place attacker-controlled
# commands run during a Go build/dev cycle is `go generate`, which executes the
# shell command on each `//go:generate` directive. A directive that fetches a
# remote payload and pipes it to a shell, or decodes an embedded blob and execs
# it, is the Go-ecosystem analog of an npm preinstall dropper.
# Directives are source comments; for source files `type: text` scans raw text
# (including comments). Legit go:generate uses (stringer, mockgen, protoc,
# go run) never fetch-and-pipe-to-shell or decode-and-exec.
# ATT&CK: T1195.002 (Supply Chain Compromise)
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1195.002
  mbc: B0024
traits:
  - id: go-generate-curl-pipe-shell
    desc: go:generate fetches remote and pipes to shell
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '//go:generate[^\n]{0,80}(curl|wget)[^\n]{0,60}\|\s*(ba)?sh\b'
  - id: go-generate-decode-pipe-shell
    desc: "go:generate decodes payload then pipes shell"
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '//go:generate[^\n]{0,80}(base64|xxd|openssl)[^\n]{0,40}\|\s*(ba)?sh\b'
composite_rules:
  - id: go-generate-obfuscated-command
    desc: go:generate runs a fetch/decode shell command
    crit: hostile
    conf: 0.95
    any:
      - id: go-generate-curl-pipe-shell
      - id: go-generate-decode-pipe-shell
