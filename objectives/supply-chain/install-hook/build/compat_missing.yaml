defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [source, data, scripts, manifests]
traits:
  - id: msbuild-prebuild-exec
    desc: MSBuild PreBuild event executes command
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '(?is)<PreBuildEvent>[^<]{0,200}(powershell|mshta)'
  - id: msbuild-curl-whoami-callback
    desc: MSBuild prebuild callback with curl and whoami
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: '(?is)curl.{0,120}whoami|whoami.{0,120}curl'
