defaults:
  platforms: [windows, unix]
  for: [xml]
composite_rules:
  - id: nuget-msbuild-precompile-oob-beacon
    desc: NuGet package runs an OOB network beacon before compilation
    crit: hostile
    conf: 0.99
    attack: T1195.002
    scope: archive
    all:
      - id: metadata/build/manifest::nuspec-file
      - id: metadata/build/manifest::msbuild-targets-file
      - id: micro-behaviors/time/schedule/callback/lifecycle::msbuild-before-compile-target
      - id: micro-behaviors/communications/http/download/package::msbuild-downloadfile-task
      - id: objectives/exfiltration/oob/endpoint::webhook-site
