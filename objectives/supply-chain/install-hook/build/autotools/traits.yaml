defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
  crit: suspicious
  attack: T1195.002
traits:
  - id: configure-curl-exec
    desc: curl downloads and pipes to shell
    crit: notable
    conf: 0.95
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: objectives/command-and-control/channel/deaddrop/url::security-rule-runtime-script-floating-url
      - type: basename
        regex: '^(METADATA|PKG-INFO)$'
      - id: metadata/file/extension/identity::markdown-file-basename
      - type: basename
        regex: '.*\.(ya?ml|json|toml)$'
        case_insensitive: true
      - type: basename
        regex: '^[Jj]ustfile$'
    if:
      type: text
      regex: curl.{0,120}(\|\s*(sh|shell)\b|\b(sh|shell)\s+-c\b)
    not:
      - substr: "curl http://npmjs.org/install.sh"
      - substr: "https://install.fuel.sh"
      - substr: "https://install.fuel.network"
      - substr: "https://rustwasm.github.io/wasm-pack/installer/init.sh"
      - substr: astral.sh
      - substr: aka.ms/apm-unix
      - substr: golangci-lint.run/install.sh
      - substr: raw.githubusercontent.com/golangci/golangci-lint
      - substr: rustup.rs
      # Toolchain-bootstrap getter/installer hosts piped to a shell
      # (`https://get.haskellstack.org/ | sh`, get.rvm.io, get.docker.com).
      # A `not:` evidence filter reaches the embedded-shell layer of a workflow
      # where a basename `unless:` cannot. Generic curl|sh stays covered by
      # dropper/pipe; the trojanized-configure identity needs configure-context.
      - regex: '//(get|install|setup)[\w.-]*/?\s*\|\s*(sh|bash)'
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
  - id: configure-curl-eval
    desc: curl downloads and evals
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \bcurl\b.{0,120}\|\s*\beval\b|\beval\b.{0,120}\bcurl\b
    unless:
      - id: well-known/tool/detection/clawker::adversarial-payload-fixture
  - id: configure-wget-exec
    desc: wget downloads and pipes to shell
    crit: suspicious
    conf: 0.95
    unless:
      - id: objectives/command-and-control/channel/deaddrop/url::security-rule-runtime-script-floating-url
      - type: basename
        regex: (?i)(^|[\\/!])(METADATA|PKG-INFO|README(\..*)?)$
      - type: basename
        regex: '.*\.(ya?ml|json|toml|md)$'
        case_insensitive: true
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
    if:
      type: text
      regex: wget.{0,120}(\|\s*(sh|shell)\b|\b(sh|shell)\s+-c\b)
    not:
      - substr: apt.u.doover.com/install.sh
      # Toolchain-bootstrap getter/installer hosts piped to a shell
      # (`wget -qO- https://get.haskellstack.org/ | sh` documented in
      # get-stack.sh). A `not:` evidence filter reaches the embedded-shell layer
      # of a workflow where a basename `unless:` cannot. Generic wget|sh stays
      # covered by dropper/pipe::wget-pipe-sh; the trojanized-configure identity
      # needs configure-context (configure / configure.ac / Makefile.in / AC_INIT).
      - regex: '//(get|install|setup)[\w.-]*/?\s*\|\s*(sh|bash)'
  - id: configure-wget-eval
    desc: wget downloads and evals
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: wget.{0,120}\|\s*eval\b|eval.{0,120}wget
  - id: configure-hidden-cmd
    desc: configure with hidden command execution
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: AC_INIT[\s\S]{0,500}(system|exec|popen)\s*\(
  # A genuine autotools build script: the file is named configure / configure.ac
  # / configure.in / Makefile.in / Makefile.am, OR carries an autoconf hallmark
  # (AC_INIT, the "Generated by GNU Autoconf" banner, ac_config_*). The
  # "trojanized configure" identity requires THIS context — a plain installer
  # (get-stack.sh) or a CI workflow (*-tests.yml) running `wget|sh` is not a
  # tampered configure script; the generic wget/curl-pipe coverage lives in the
  # dropper/pipe objectives, not here.
  - id: configure-context-name
    desc: Autotools configure script filename
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: '^(configure(\.(ac|in))?|Makefile\.(in|am))$'
  - id: configure-context-marker
    desc: Autoconf-generated configure script marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bAC_INIT\b|\bac_config_(headers|files)\b'
  - id: nc-cmd
    desc: netcat command
    crit: notable
    conf: 0.5
    unless:
      - id: metadata/package/testing/presence/harness/
    if:
      type: text
      regex: \bnc\s+(-[A-Za-z]+\s+){0,3}[A-Za-z0-9._-]+\s+\d{1,5}\b
  # AC_DEFUN / m4_define are the fundamental autoconf macro-definition
  # primitives present in every autotools project (configure.ac, aclocal.m4,
  # every *.m4 macro file). Bare, they carry no supply-chain signal — they only
  # matter combined with command-exec/encoding in the m4-macro-def -> m4-backdoor
  # composite chain below. Keep them `component` so they feed those composites
  # without surfacing standalone on benign autotools sources.
  - id: m4-define-keyword
    desc: m4_define macro keyword
    crit: component
    conf: 0.6
    if:
      type: text
      word: m4_define
  - id: ac-defun-keyword
    desc: AC_DEFUN macro keyword
    crit: component
    conf: 0.6
    if:
      type: text
      word: AC_DEFUN
  - id: m4-system-call
    desc: system() call in M4 macro context
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: (\bAC_DEFUN\b|\bm4_define\b|\bm4_ifdef\b)[\s\S]{0,200}\bsystem\s*\(
  - id: m4-exec-call
    desc: exec call in M4 macro context
    crit: component
    conf: 0.75
    if:
      type: text
      regex: (\bAC_DEFUN\b|\bm4_define\b|\bm4_ifdef\b)[\s\S]{0,200}\bexec\s*\(
  - id: m4-popen-call
    desc: popen call in M4 macro context
    crit: suspicious
    conf: 0.75
    if:
      type: symbol
      exact: popen
  - id: m4-esyscmd
    desc: M4 esyscmd (shell execution)
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      exact: m4_esyscmd
    unless:
      - id: metadata/build/autotools/
  - id: m4-xxd-tool
    desc: xxd tool reference
    crit: component
    conf: 0.6
    if:
      type: text
      word: xxd
  - id: m4-od-tool
    desc: od tool with decode flags
    crit: notable
    conf: 0.6
    unless:
      - id: metadata/package/tooling::autoconf-generated-script
    if:
      type: text
      regex: \bod\s+-
  - id: makefile-basename
    desc: Makefile filename
    crit: component
    conf: 1.0
    if:
      type: path
      basename: true
      exact: Makefile.am
      case_insensitive: true
  - id: makefile-curl-wget
    desc: curl/wget download in build file
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (curl|wget)\s+.{0,50}(http|ftp)://
  - id: makefile-install-hook
    desc: Suspicious install hook
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: install-(exec|data)-hook.{0,100}(curl|wget|sh\s+-c)
  - id: test-fixture-binary-common
    desc: "Binary blob in test fixtures"
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: tests?/(fixtures?|data).{0,30}\.(bin|dat|raw)
  - id: test-fixture-binary-compressed
    desc: Compressed blob in test fixtures
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: tests?/(fixtures?|data).{0,30}\.(xz|gz|bz2)
  - id: test-samples-binary
    desc: Binary blob in test samples
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: tests?/samples?.{0,30}\.(bin|dat|raw)
  - id: test-samples-compressed
    desc: Compressed blob in test samples
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: tests?/samples?.{0,30}\.(xz|gz|bz2)
  - id: test-fixture-exec-xz
    desc: Test fixture decompressed with xz and executed
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: 'test.{0,50}xz[\s\S]{0,100}(sh|shell|\|)'
    unless:
      - type: text
        regex: test -f '[^']+' \|\| echo '\$\(srcdir\)/'
      - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
      - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
  - id: test-fixture-exec-gzip
    desc: 'test fixture exec gzip'
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: 'test.{0,50}(gzip|gunzip)[\s\S]{0,100}(sh|shell|\|)'
    unless:
      - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
      - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
  - id: test-fixture-exec-bzcat
    desc: "Test fixture decompressed w/ bzcat & executed"
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'test.{0,50}bzcat[\s\S]{0,100}(sh|shell|\|)'
    unless:
      - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
      - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
  - id: object-file-in-source-unix
    desc: Pre-compiled Unix object in source tree
    crit: notable
    conf: 0.8
    size_max: 200000
    if:
      type: path
      regex: '(^|[\\/])[^\\/]{1,80}\.(o|lo)$'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: micro-behaviors/process/create/shell/git::git-operations-1
      - id: micro-behaviors/process/create/shell/git::git-operations-2
      - type: text
        regex: Generated by GNU Autoconf|ac_config_headers|exec_prefix=
  - id: object-file-in-source-win
    desc: Pre-compiled Windows object in source tree
    crit: notable
    conf: 0.8
    for:
      - shell
      - batch
    size_max: 10000
    if:
      type: text
      regex: '[/\\][^/\\\s*]{1,80}\.(obj|lib)\s*$'
    unless:
      - type: basename
        regex: "\\.mk$"
    not:
      - substr: "$lib.dll.lib"
      - substr: "/$lib.lib"
  - id: libtool-la-injection
    desc: Suspicious .la file manipulation
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: \.la.{0,50}(dlopen|RTLD_)
composite_rules:
  - id: makefile-am-curl
    desc: Makefile.am with curl/wget download
    crit: suspicious
    conf: 0.85
    all:
      - id: makefile-basename
      - id: makefile-curl-wget
  - id: env-dump-cmd
    desc: Environment dump command
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/os/env/vars/access::env-cmd-bare
      - id: micro-behaviors/os/env/vars/access::printenv
  - id: network-exfil-tool
    desc: Network exfiltration tool
    crit: suspicious
    conf: 0.6
    any:
      - id: configure-curl-exec
      - id: configure-wget-exec
      - id: nc-cmd
    unless:
      - id: well-known/app/calvyn-code
  - id: configure-env-exfil
    desc: Configure script prints environment remotely
    crit: notable
    conf: 0.9
    all:
      - id: env-dump-cmd
      - id: network-exfil-tool
  - id: configure-context
    desc: Autotools configure build context
    crit: component
    conf: 0.9
    any:
      - id: configure-context-name
      - id: configure-context-marker
      - id: metadata/package/tooling::autoconf-generated-script
  - id: configure-network-exec-in-context
    desc: Network-exec injected into a configure script
    crit: suspicious
    conf: 0.9
    all:
      - id: configure-context
    any:
      - id: configure-curl-exec
      - id: configure-curl-eval
      - id: configure-wget-exec
      - id: configure-wget-eval
  - id: configure-trojan
    desc: Trojanized configure script
    crit: suspicious
    conf: 0.9
    any:
      # Generic curl/wget-to-shell only counts as "trojanized configure" when it
      # lands inside an actual configure script (configure-context). Standalone
      # installers and CI workflows that pipe a download to a shell are covered
      # by the dropper/pipe objectives, not by this autotools-tamper identity.
      - id: configure-network-exec-in-context
      - id: configure-env-exfil
    unless:
      - id: well-known/app/calvyn-code
      - id: configure-hidden-cmd
  - id: m4-macro-def
    desc: M4 macro definition keyword
    crit: notable
    conf: 0.6
    any:
      - id: m4-define-keyword
      - id: ac-defun-keyword
  - id: m4-cmd-exec
    desc: Command execution in M4 context
    crit: suspicious
    conf: 0.8
    any:
      - id: m4-system-call
      - id: m4-exec-call
      - id: m4-popen-call
  - id: m4-encoding-tool
    desc: Encoding tool reference
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/data/decode/base64::base64-tool
      - id: m4-xxd-tool
      - id: m4-od-tool
  - id: m4-define-exec
    desc: M4 macro with command execution
    crit: suspicious
    conf: 0.85
    all:
      - id: m4-macro-def
      - id: m4-cmd-exec
  - id: m4-hidden-payload
    desc: M4 macro with encoded payload
    crit: suspicious
    conf: 0.85
    all:
      - id: m4-macro-def
      - id: m4-encoding-tool
  - id: m4-backdoor
    desc: Backdoored M4 macro
    crit: hostile
    conf: 0.9
    any:
      - id: m4-define-exec
      - id: m4-hidden-payload
    all:
      - id: m4-esyscmd
  - id: test-fixture-binary
    desc: Any binary blob in test directory
    crit: notable
    conf: 0.7
    any:
      - id: test-fixture-binary-common
      - id: test-fixture-binary-compressed
      - id: test-samples-binary
      - id: test-samples-compressed
  - id: test-fixture-exec
    desc: Any test fixture execution pattern
    crit: suspicious
    conf: 0.85
    any:
      - id: test-fixture-exec-xz
      - id: test-fixture-exec-gzip
      - id: test-fixture-exec-bzcat
  - id: test-fixture-attack
    desc: Malicious test fixture pattern (XZ-style)
    crit: hostile
    conf: 0.9
    all:
      - id: test-fixture-binary
      - id: test-fixture-exec
  - id: autotools-supply-chain-attack
    desc: Autotools build system supply chain attack
    crit: suspicious
    conf: 0.9
    any:
      - id: configure-trojan
      - id: m4-backdoor
      - id: test-fixture-attack
