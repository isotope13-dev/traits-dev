      - id: micro-behaviors/process/create/system::python-os-system
    if:
      type: text
      regex: 'os\.system\([^\n]{0,80}rm\s+-[^\n]{0,80}(\./)?build[^\n]{0,80}(\./)?dist[^\n]{0,120}\.egg-info'
