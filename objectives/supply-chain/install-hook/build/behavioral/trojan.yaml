# Build System Trojan Detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects malicious code in build scripts that run automatically during install/build
defaults:
  platforms: [unix, windows]
  crit: suspicious
  attack: "T1195.002"
traits:
  # ============================================================
  # PYTHON: setup.py / pyproject.toml trojans
  # ============================================================
  - id: setup-py-os-system
    desc: setup.py with os.system call
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(setup\.py|pyproject|setup\.cfg)[\s\S]{0,100}os\.system\s*\('
    unless:
      - id: micro-behaviors/data/text/llm/scanner::ai-skill-scanner-report-doc
  - id: setup-py-subprocess-run
    desc: setup.py cmdclass/build_ext with subprocess.run
    crit: suspicious
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: '(cmdclass|build_ext)[\s\S]{0,500}subprocess\.run'
  - id: setup-py-subprocess-popen
    desc: setup.py cmdclass/build_ext with subprocess.Popen
    crit: suspicious
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: '(cmdclass|build_ext)[\s\S]{0,500}subprocess\.Popen'
  - id: setup-py-subprocess-call
    desc: setup.py install class with subprocess
    crit: suspicious
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: 'class\s+\w+install[\s\S]+subprocess\.'
    unless:
      - id: metadata/lang/javascript-features::sourcemap-sources-content
  - id: setup-call-subprocess
    desc: setup() call near subprocess usage
    crit: notable
    conf: 0.85
    size_max: 30000
    for: [python]
    if:
      type: text
      regex: 'setup\s*\([\s\S]{0,500}subprocess\.'
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::pytest-module
  # Atomic: setup.py curl/wget with exec
  - id: setup-py-curl-exec-call
    desc: setup.py curl/wget downloads then exec()
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}(curl|wget)[\s\S]{0,200}exec'
  # Atomic: setup.py curl/wget with eval
  - id: setup-py-curl-eval-call
    desc: setup.py curl/wget downloads then eval()
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}(curl|wget)[\s\S]{0,200}eval'
  # Atomic: setup.py urlopen with exec
  - id: setup-py-urlopen-exec-call
    desc: setup.py urlopen downloads then exec()
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}urlopen[\s\S]{0,200}exec'
  # Atomic: setup.py urlopen with eval
  - id: setup-py-urlopen-eval-call
    desc: setup.py urlopen downloads then eval()
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}urlopen[\s\S]{0,200}eval'
  # Atomic: setup.py urlopen with os.system
  - id: setup-py-urlopen-ossystem-call
    desc: setup.py urlopen downloads then os.system()
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}urlopen[\s\S]{0,200}os\.system'
  - id: setup-py-requests-exec
    desc: setup.py requests.get then exec
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}requests\.get[\s\S]{0,200}exec'
  - id: setup-py-requests-eval
    desc: setup.py requests.get then eval
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}requests\.get[\s\S]{0,200}eval'
  - id: setup-py-network-in-install
    desc: Network call during install
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'class.{0,50}(install|build)[\s\S]{0,500}(requests\.|urllib|socket\.)'
    unless:
      - type: text
        substr: when installed with an OpenerDirector
  - id: setup-py-wget-tmp-sh
    desc: setup.py wget downloads shell script to /tmp
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'wget\s+https?://.{1,60}\.sh\s+-O\s+/tmp/.{1,40}\.sh'
  - id: setup-py-chmod-bash-tmp-sh
    desc: setup.py chmods and runs /tmp shell script
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'chmod\s+777\s+/tmp/.{1,40}\.sh\s+&&\s+bash\s+/tmp/.{1,40}\.sh'
  # ============================================================
  # JAVASCRIPT: package.json script trojans
  # ============================================================
  - id: npm-preinstall-curl
    desc: preinstall script with curl/wget
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: text
      regex: '"preinstall"\s*:\s*"[^"]{0,200}(curl|wget|fetch)'
  - id: npm-postinstall-curl
    desc: postinstall script with curl/wget
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: text
      regex: '"postinstall"\s*:\s*"[^"]{0,200}(curl|wget|fetch)'
  - id: npm-install-exec
    desc: install script executes external code
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: text
      regex: '"(pre|post)?install"\s*:\s*"[^"]{0,100}(eval|sh -c)'
  - id: npm-script-pipe-sh
    desc: npm script pipes to shell
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: text
      regex: '"(pre|post)?install"\s*:\s*"[^"]{0,200}\|\s*(sh|shell|zsh)'
  - id: npm-script-base64
    desc: npm script with base64 decode
    crit: notable
    conf: 0.9
    for: [package.json]
    if:
      type: text
      regex: '"scripts"[\s\S]{0,500}(base64 -d|atob|Buffer\.from)'
  # ============================================================
  # RUST: build.rs trojans
  # ============================================================
  - id: rust-build-rs-shell-command
    desc: build.rs with shell Command execution
    crit: suspicious
    conf: 0.75
    for: [rust]
    if:
      type: text
      regex: '(build\.rs|fn main)[\s\S]{0,300}Command::new\s*\(\s*"(sh|shell)"'
  - id: rust-build-rs-network
    desc: build.rs with network call
    crit: suspicious
    conf: 0.8
    for: [rust]
    if:
      type: text
      regex: '(build\.rs|build script)[\s\S]{0,500}(reqwest|hyper|curl)::get'
  - id: rust-build-rs-file
    desc: Rust build script filename
    crit: component
    conf: 0.99
    for: [rust]
    if:
      type: path
      basename: true
      exact: build.rs
  - id: cargo-build-script-declared
    desc: Cargo build script declared
    crit: component
    conf: 0.9
    for: [cargo.toml]
    if:
      type: text
      regex: '(?m)^\s*build\s*=\s*["'']build\.rs["'']'
  - id: rust-build-rs-env-reqwest-http
    desc: build.rs sends environment via reqwest
    crit: component
    conf: 0.92
    for: [rust]
    if:
      type: text
      regex: 'std::env::(vars|var(_os)?)[\s\S]{0,300}reqwest[\s\S]{0,120}(post|put|send)'
  - id: rust-build-rs-env-curl-command
    desc: build.rs shells env to curl
    crit: component
    conf: 0.92
    for: [rust]
    if:
      type: text
      regex: >-
        std::env::(vars|var(_os)?)[\s\S]{0,300}Command::new\s*\(\s*"curl"
  - id: rust-build-rs-env-wget-command
    desc: build.rs shells env to wget
    crit: component
    conf: 0.92
    for: [rust]
    if:
      type: text
      regex: >-
        std::env::(vars|var(_os)?)[\s\S]{0,300}Command::new\s*\(\s*"wget"
  - id: rust-build-rs-target-dir
    desc: build.rs target directory reference
    crit: component
    conf: 0.9
    for: [rust]
    if:
      type: text
      substr: '.join("target")'
  - id: rust-build-rs-command-path
    desc: build.rs runs computed binary path
    crit: component
    conf: 0.95
    for: [rust]
    if:
      type: text
      substr: "Command::new(&binary_path)"
  - id: rust-build-rs-start-arg
    desc: build.rs launches start mode
    crit: component
    conf: 0.9
    for: [rust]
    if:
      type: text
      substr: '.arg("start")'
  - id: rust-build-rs-wait-loop-start
    desc: build.rs waits for binary then starts
    crit: suspicious
    conf: 0.95
    for: [rust]
    if:
      type: text
      substr: "while [ ! -f '{b}' ]; do sleep 1; done; sleep 2; '{b}' start"
  - id: rust-build-rs-command-output
    desc: build.rs captures command output
    crit: component
    conf: 0.88
    for: [rust]
    if:
      type: text
      substr: ".output()"
  # ============================================================
  # MAKEFILE: trojan targets
  # ============================================================
  # Atomic: Makefile curl/wget piped to sh
  - id: makefile-curl-pipe-sh
    desc: Makefile downloads and pipes to sh
    crit: suspicious
    conf: 0.9
    for: [shell]
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/file/extension::markdown-file-basename
      - type: text
        regex: '^#!'
      - type: basename
        regex: '.*\.(ya?ml|json|toml)$'
        case_insensitive: true
      - type: basename
        regex: '^[Jj]ustfile$'
    if:
      type: text
      regex: '(^|\n)\t(curl|wget).{0,50}\|.{0,20}sh'
    not:
      - substr: "uses: actions/"
      - substr: "curl http://npmjs.org/install.sh"
      - substr: astral.sh # uv installer (well-known Python package manager)
      - substr: rustup.rs # rustup bootstrap installer
      - substr: "curl -sS https://webinstall.dev/k9s | bash"
      - substr: "curl https://getmic.ro | bash"
      - substr: "https://dot.net/v1/dotnet-install.sh | bash"
    downgrade:
      any:
        - {id: 'metadata/package/testing/harness/runtime::is-test'}
  # Atomic: Makefile curl/wget piped to shell
  - id: makefile-curl-pipe-shell
    desc: Makefile downloads and pipes to shell
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '(curl|wget).{0,50}\|.{0,20}shell'
    unless:
      - type: text
        regex: '^#!'
      - type: basename
        regex: '.*\.(ya?ml|json|toml)$'
        case_insensitive: true
  # Atomic: Makefile curl/wget piped to eval
  - id: makefile-curl-pipe-eval
    desc: Makefile downloads and pipes to eval
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '(curl|wget).{0,50}\|.{0,20}eval'
    unless:
      - type: text
        regex: '^#!'
      - type: basename
        regex: '.*\.(ya?ml|json|toml)$'
        case_insensitive: true
  - id: makefile-hidden-target
    desc: Makefile with suspicious hidden command
    crit: suspicious
    conf: 0.8
    for: [shell]
    if:
      type: text
      regex: '^\.[a-z]+:[\s\S]{0,100}(curl|wget|nc )'
    unless:
      - type: text
        regex: '^#!'
composite_rules:
  # Decomposed from a windowed regex `(setup\.py|cmdclass)[\s\S]{0,500}requests\.get
  # [\s\S]{0,200}os\.system`. The common `requests.get` literal forced a ±4096 PikeVM
  # window at every occurrence; substr/symbol/path atoms gate via single Aho-Corasick
  # passes instead. File-scoped on setup.py (same idiom as setup-py-wget-tmp-bash).
  # Proximity belongs only on the two positional calls; the setup.py path atom is a
  # file-level gate with no byte offset, so keeping it out of the near_bytes group
  # avoids inflating the span (the original coupled requests.get -> os.system <=200B).
  - id: requests-get-near-os-system
    desc: requests.get result executed via os.system nearby
    crit: component
    conf: 0.9
    for: [python]
    near_bytes: 300
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/process/create/system::python-os-system
  - id: setup-py-requests-ossystem
    desc: setup.py requests.get then os.system
    crit: suspicious
    conf: 0.95
    for: [python]
    all:
      - id: metadata/build/pip::root-setup-py
      - id: requests-get-near-os-system
  - id: setup-py-os-system-file
    desc: setup.py invokes os.system
    crit: suspicious
    conf: 0.95
    near_bytes: 4096
    all:
      - id: metadata/build/pip::root-setup-py
    any:
      - id: micro-behaviors/process/create/system::python-os-system
      - id: micro-behaviors/process/interpreter/python::dunder-import-call
  # === Composite: setup.py curl/wget execution ===
  - id: setup-py-curl-exec
    desc: setup.py curl/wget downloads then executes
    crit: suspicious
    conf: 0.95
    any:
      - id: setup-py-curl-exec-call
      - id: setup-py-curl-eval-call
  # === Composite: setup.py urlopen execution ===
  - id: setup-py-urlopen-exec
    desc: setup.py urlopen downloads then executes
    crit: suspicious
    conf: 0.95
    any:
      - id: setup-py-urlopen-exec-call
      - id: setup-py-urlopen-eval-call
      - id: setup-py-urlopen-ossystem-call
  - id: setup-py-wget-tmp-bash
    desc: setup.py downloads shell script to /tmp and runs it
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/build/pip::setup-py
      - id: setup-py-wget-tmp-sh
      - id: setup-py-chmod-bash-tmp-sh
    any:
      - id: micro-behaviors/process/create/system::python-os-system
      - id: micro-behaviors/process/interpreter/python::dunder-import-call
  # === Composite: Makefile curl/wget execution ===
  - id: makefile-curl-exec
    desc: Makefile downloads and executes
    crit: suspicious
    conf: 0.9
    any:
      - id: makefile-curl-pipe-sh
      - id: makefile-curl-pipe-shell
      - id: makefile-curl-pipe-eval
  # === Python Build Trojan ===
  - id: python-setup-trojan
    desc: Python setup.py trojan
    crit: hostile
    conf: 0.95
    any:
      - id: setup-py-os-system
      - id: setup-py-os-system-file
      - id: setup-py-curl-exec
      - id: setup-py-urlopen-exec
      - id: setup-py-wget-tmp-bash
      - id: setup-py-requests-exec
      - id: setup-py-requests-eval
      - id: setup-py-requests-ossystem
      - id: setup-py-network-in-install
  # === NPM Build Trojan ===
  - id: npm-install-trojan
    desc: NPM package install trojan
    crit: hostile
    conf: 0.95
    any:
      - id: npm-preinstall-curl
      - id: npm-postinstall-curl
      - id: npm-install-exec
      - id: npm-script-pipe-sh
      - id: npm-script-base64
  # === Rust Build Trojan ===
  - id: rust-build-rs-download-command
    desc: build.rs invokes curl or wget
    crit: suspicious
    conf: 0.86
    for: [rust]
    all:
      - id: rust-build-rs-file
      - id: micro-behaviors/communications/http/download/curl::rust-curl-wget-command
  - id: rust-build-trojan
    desc: Rust build.rs trojan
    crit: suspicious
    conf: 0.85
    for: [rust]
    all:
      - id: rust-build-rs-file
    any:
      - id: rust-build-rs-shell-command
      - id: rust-build-rs-download-command
      - id: rust-build-rs-network
      - id: rust-build-rs-env-exfil
      - id: rust-build-rs-target-start
      - id: rust-build-rs-delayed-target-start
  - id: rust-build-rs-target-start
    desc: build.rs executes package binary
    crit: suspicious
    conf: 0.96
    for: [rust]
    all:
      - id: rust-build-rs-file
      - id: rust-build-rs-target-dir
      - id: rust-build-rs-command-path
      - id: rust-build-rs-start-arg
  - id: rust-build-rs-delayed-target-start
    desc: build.rs delays package binary execution
    crit: suspicious
    conf: 0.98
    for: [rust]
    all:
      - id: rust-build-rs-file
      - id: rust-build-rs-target-dir
      - id: rust-build-rs-wait-loop-start
    any:
      - id: micro-behaviors/process/daemonize/detach::background-ampersand-hidden
      - id: micro-behaviors/process/daemonize/detach::redirect-dev-null
  - id: rust-build-rs-env-exfil
    desc: build.rs exfiltrates environment
    crit: suspicious
    conf: 0.9
    for: [rust]
    all:
      - id: rust-build-rs-file
    any:
      - id: rust-build-rs-env-reqwest-http
      - id: rust-build-rs-env-curl-command
      - id: rust-build-rs-env-wget-command
  - id: rust-build-rs-telegram-curl-beacon
    desc: build.rs curl Telegram beacon
    crit: hostile
    conf: 0.99
    for: [rust]
    all:
      - id: rust-build-rs-file
      - id: rust-build-rs-command-output
      - id: objectives/exfiltration/messaging/telegram::api-endpoint
      - id: objectives/exfiltration/messaging/telegram::send-message
    any:
      - id: rust-build-rs-download-command
      - id: micro-behaviors/communications/http/download/curl::curl-keyword
  # === Any Build System Trojan ===
  - id: build-system-trojan
    desc: Build system trojan (any language)
    crit: hostile
    conf: 0.95
    mbc: "E1059"
    any:
      - id: python-setup-trojan
      - id: npm-install-trojan
      - id: rust-build-trojan
      - id: rust-build-rs-telegram-curl-beacon
      - id: makefile-curl-exec
