# Build System Trojan Detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects malicious code in build scripts that run automatically during install/build
defaults:
  platforms: [unix, windows]
  crit: suspicious
  attack: "T1195.002"
traits:
  # ============================================================
  # PYTHON: setup.py / pyproject.toml trojans
  # ============================================================
  - id: setup-codex-environment-script
    desc: Codex environment setup helper
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'Set up ignored files that should be shared with Codex worktrees|Codex environment setup:'
  - id: setup-py-subprocess-run
    desc: "Custom build_ext class runs subprocess.run"
    crit: suspicious
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: 'class\s+\w+\s*\([^)]{0,80}\bbuild_ext\b[^)]{0,80}\):[\s\S]{0,400}subprocess\.run\('
  - id: setup-py-subprocess-popen
    desc: "setup.py build_ext runs subprocess.Popen"
    crit: suspicious
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: '(\bcmdclass\b|\bbuild_ext\b)[\s\S]{0,500}subprocess\.Popen'
    unless:
      - id: metadata/package/files/system-package::os-python-runtime-path
  - id: setup-py-subprocess-call
    desc: setup.py install class with subprocess
    crit: suspicious
    conf: 0.85
    for: [python]
    if:
      type: text
      regex: 'class\s+\w*Install\w*\s*\([^)]{0,160}\binstall\b[^)]{0,160}\)[\s\S]{0,600}subprocess\.'
    unless:
      - id: metadata/lang/javascript-features::sourcemap-sources-content
      - id: metadata/package/testing/presence/harness/
      - id: metadata/build/pip::python-packaging-tool-tests
      - id: metadata/build/pip::setuptools-package-index
      - id: metadata/build/pip::setuptools-easy-install-source
  - id: setup-call-subprocess
    desc: setup() call near subprocess usage
    crit: notable
    conf: 0.85
    size_max: 30000
    for: [python]
    if:
      type: text
      regex: 'setup\s*\([\s\S]{0,500}subprocess\.'
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::pytest-module
    unless:
      - id: well-known/app/open-webui-computer/
  # Atomic: setup.py curl/wget with exec
  - id: setup-py-curl-exec-call
    desc: setup.py curl/wget downloads then exec()
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}(curl|wget)[\s\S]{0,200}exec'
    unless:
      - id: well-known/tool/detection/
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/lib/conda-package/
      - id: well-known/tool/sysadmin/alpine-packages/
      - id: well-known/tool/sysadmin/alpine-packages::alpine-datadog-agent-package
      - id: well-known/tool/sysadmin/alpine-packages::alpine-datadog-gitlab-projects-py
  # Atomic: setup.py curl/wget with eval
  - id: setup-py-curl-eval-call
    desc: setup.py curl/wget downloads then eval()
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}(curl|wget)[\s\S]{0,200}eval'
  # Atomic: setup.py urlopen with exec
  - id: setup-py-urlopen-exec-call
    desc: setup.py urlopen downloads then exec()
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}urlopen[\s\S]{0,200}exec'
    unless:
      - id: well-known/tool/detection/pipguard::pipguard-defensive-scanner-source
  # Atomic: setup.py urlopen with eval
  - id: setup-py-urlopen-eval-call
    desc: setup.py urlopen downloads then eval()
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}urlopen[\s\S]{0,200}eval'
  # Atomic: setup.py urlopen with os.system
  - id: setup-py-urlopen-ossystem-call
    desc: setup.py urlopen downloads then os.system()
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}urlopen[\s\S]{0,200}os\.system'
  - id: setup-py-requests-exec
    desc: setup.py requests.get then exec
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}requests\.get[\s\S]{0,200}exec'
  - id: setup-py-requests-eval
    desc: setup.py requests.get then eval
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(setup\.py|cmdclass)[\s\S]{0,500}requests\.get[\s\S]{0,200}eval'
  - id: setup-py-or-cmdclass-marker
    desc: setup.py path marker
    crit: component
    conf: 0.86
    for: [python]
    if:
      type: path
      regex: '(^|[\\/])setup\.py$'
  - id: setup-platform-computed-command-branch
    desc: setup hook branches to computed command
    crit: component
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: '\w+\s*=\s*\[[^\]]{0,120}\(\)[^\]]{0,120}\]\s+if\s+\w+\s+else\s+\[[^\]]{0,160}\]'
  - id: setup-install-or-build-class
    desc: setup.py install or build class
    crit: component
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: '(?m)^\s*class\s+\w+\s*\(.{0,80}\b(install|build(_ext)?)\b.{0,80}\)\s*:'
  - id: setup-requests-network-api
    desc: setup.py requests network API
    crit: component
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: 'requests\.(get|post|request)'
  - id: setup-urllib-network-api
    desc: setup.py urllib network API
    crit: component
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: 'urllib\.request|urlopen'
  - id: setup-socket-network-api
    desc: setup.py socket network API
    crit: component
    conf: 0.86
    for: [python]
    if:
      type: text
      regex: 'socket\.(socket|create_connection|connect)'
  - id: setup-py-wget-tmp-sh
    desc: setup.py wget downloads shell script to /tmp
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'wget\s+https?://.{1,60}\.sh\s+-O\s+/tmp/.{1,40}\.sh'
  - id: setup-py-chmod-bash-tmp-sh
    desc: setup.py chmods and runs /tmp shell script
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'chmod\s+777\s+/tmp/.{1,40}\.sh\s+&&\s+bash\s+/tmp/.{1,40}\.sh'
  # ============================================================
  # JAVASCRIPT: package.json script trojans
  # ============================================================
  - id: npm-preinstall-curl
    desc: preinstall script with curl/wget
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: text
      regex: '"preinstall"\s*:\s*"[^"]{0,200}(curl|wget|fetch)'
    unless:
      - id: well-known/app/vscode-marketplace::oxc-vscode-package-name
      - id: metadata/package/testing/presence/manifest::has-karma
  - id: npm-postinstall-curl
    desc: postinstall script with curl/wget
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: text
      regex: '"postinstall"\s*:\s*"[^"]{0,200}(curl|wget|fetch)'
    unless:
      - type: value
        path: scripts.postinstall
        substr: stackpath.bootstrapcdn.com/twitter-bootstrap
      - id: metadata/package/scripts/
  - id: npm-install-exec
    desc: install script executes external code
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: text
      regex: '"(pre|post)?install"\s*:\s*"[^"]{0,100}(eval|sh -c)'
    unless:
      - id: well-known/app/vscode-marketplace::oxc-vscode-package-name
      - id: metadata/package/testing/presence/manifest::has-karma
  - id: npm-script-pipe-sh
    desc: npm script pipes to shell
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: text
      regex: '"(pre|post)?install"\s*:\s*"[^"]{0,200}\|\s*(sh|shell|zsh)'
    unless:
      - id: well-known/app/vscode-marketplace::oxc-vscode-package-name
      - id: metadata/package/testing/presence/manifest::has-karma
  - id: npm-preinstall-base64
    desc: preinstall script decodes base64 data
    crit: notable
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: scripts.preinstall
      regex: '(?i)(base64\s*(-d|--decode)|atob\s*\(|Buffer\.from\s*\([^,]+,\s*["'']base64["''])'
  - id: npm-install-base64
    desc: install script decodes base64 data
    crit: notable
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: scripts.install
      regex: '(?i)(base64\s*(-d|--decode)|atob\s*\(|Buffer\.from\s*\([^,]+,\s*["'']base64["''])'
  - id: npm-postinstall-base64
    desc: postinstall script decodes base64 data
    crit: notable
    conf: 0.9
    for: [package.json]
    if:
      type: value
      path: scripts.postinstall
      regex: '(?i)(base64\s*(-d|--decode)|atob\s*\(|Buffer\.from\s*\([^,]+,\s*["'']base64["''])'
  # ============================================================
  # RUST: build.rs trojans
  # ============================================================
  - id: rust-build-rs-shell-command
    desc: build.rs with shell Command execution
    crit: suspicious
    conf: 0.75
    for: [rust]
    if:
      type: text
      regex: '(build\.rs|fn main)[\s\S]{0,300}Command::new\s*\(\s*"(sh|shell)"'
  - id: rust-build-rs-network
    desc: build.rs with network call
    crit: suspicious
    conf: 0.8
    for: [rust]
    if:
      type: text
      regex: '(build\.rs|build script)[\s\S]{0,500}(reqwest|hyper|curl)::get'
  - id: rust-build-rs-file
    desc: File is named build.rs
    crit: component
    conf: 0.99
    for: [rust]
    if:
      type: value
      path: file.basename
      exact: build.rs
  - id: cargo-build-script-declared
    desc: Cargo build script declared
    crit: component
    conf: 0.9
    for: [cargo.toml]
    if:
      type: text
      regex: '(?m)^\s*build\s*=\s*["'']build\.rs["'']'
  - id: rust-build-rs-env-reqwest-http
    desc: build.rs sends environment via reqwest
    crit: component
    conf: 0.92
    for: [rust]
    if:
      type: text
      regex: 'std::env::(vars|var(_os)?)[\s\S]{0,300}reqwest[\s\S]{0,120}(post|put|send)'
  - id: rust-build-rs-env-curl-command
    desc: build.rs shells env to curl
    crit: component
    conf: 0.92
    for: [rust]
    if:
      type: text
      regex: >-
        std::env::var\w*(?!\s*\(\s*"OUT_DIR"\s*\))[\s\S]{0,290}Command::new\s*\(\s*"curl"
  - id: rust-build-rs-env-wget-command
    desc: build.rs shells env to wget
    crit: component
    conf: 0.92
    for: [rust]
    if:
      type: text
      regex: >-
        std::env::(vars|var(_os)?)[\s\S]{0,300}Command::new\s*\(\s*"wget"
  - id: rust-build-rs-target-dir
    desc: build.rs target directory reference
    crit: component
    conf: 0.9
    for: [rust]
    if:
      type: text
      substr: '.join("target")'
  - id: rust-build-rs-command-path
    desc: build.rs runs computed binary path
    crit: component
    conf: 0.95
    for: [rust]
    if:
      type: text
      substr: "Command::new(&binary_path)"
  - id: rust-build-rs-start-arg
    desc: build.rs launches start mode
    crit: component
    conf: 0.9
    for: [rust]
    if:
      type: text
      substr: '.arg("start")'
  - id: rust-build-rs-wait-loop-start
    desc: build.rs waits for binary then starts
    crit: suspicious
    conf: 0.95
    for: [rust]
    if:
      type: text
      substr: "while [ ! -f '{b}' ]; do sleep 1; done; sleep 2; '{b}' start"
  - id: rust-build-rs-command-output
    desc: build.rs captures command output
    crit: component
    conf: 0.88
    for: [rust]
    if:
      type: text
      substr: ".output()"
  - id: rust-build-rs-command-status
    desc: build.rs waits on command status
    crit: component
    conf: 0.86
    for: [rust]
    if:
      type: text
      regex: 'Command::new.{0,200}\.status\s*\('
  - id: rust-build-out-dir-reference
    desc: build.rs references Cargo OUT_DIR
    crit: component
    conf: 0.9
    for: [rust]
    if:
      type: text
      regex: '(std::)?env::var\s*\(\s*"OUT_DIR"\s*\)|\bOUT_DIR\b'
  - id: rust-build-rs-oob-endpoint
    desc: build.rs references OOB endpoint
    crit: component
    conf: 0.9
    for: [rust]
    if:
      type: text
      regex: 'https?://[a-z0-9-]+\.(oastify\.com|interactsh\.com|burpcollaborator\.net|webhook\.site)\b'
  - id: rust-build-rs-host-profile-fields
    desc: build.rs builds host profile fields
    crit: component
    conf: 0.9
    for: [rust]
    count_min: 3
    if:
      type: literal
      kind: string
      regex: '^(hostname|user|cwd|manifest_dir|project_name|git_remote|internal_ips|dns_servers)$'
  - id: rust-build-rs-include-bytes-call
    desc: build.rs embeds file bytes
    crit: component
    conf: 0.86
    for: [rust]
    if:
      type: text
      substr: "include_bytes!("
  - id: rust-build-rs-include-windows-binary
    desc: build.rs embeds Windows binary bytes
    crit: component
    conf: 0.9
    for: [rust]
    if:
      type: text
      regex: '(?i)include_bytes!\s*\(\s*".{0,180}\.(exe|dll)"'
  - id: rust-build-rs-include-unix-library
    desc: build.rs embeds Unix library bytes
    crit: component
    conf: 0.88
    for: [rust]
    if:
      type: text
      regex: 'include_bytes!\s*\(\s*".{0,180}\.(so|dylib)"'
  - id: rust-build-rs-include-payload-name
    desc: build.rs embeds named payload bytes
    crit: component
    conf: 0.88
    for: [rust]
    if:
      type: text
      regex: '(?i)include_bytes!\s*\(\s*".{0,180}(payload|stage|loader)'
  - id: rust-build-rs-file-create
    desc: build.rs creates file
    crit: component
    conf: 0.86
    for: [rust]
    if:
      type: text
      substr: "File::create("
  - id: rust-build-rs-copy-call
    desc: build.rs copies file
    crit: component
    conf: 0.84
    for: [rust]
    if:
      type: text
      substr: "fs::copy("
  - id: rust-build-rs-command-new-path-var
    desc: build.rs executes path variable
    crit: component
    conf: 0.86
    for: [rust]
    if:
      type: text
      regex: 'Command::new\s*\(\s*&?[A-Za-z0-9_]{1,40}_path\s*\)'
  - id: rust-build-rs-payload-path-var
    desc: build.rs references payload path variable
    crit: component
    conf: 0.86
    for: [rust]
    if:
      type: text
      regex: '\b(payload|stage|loader)_path\b'
  - id: rust-build-rs-binary-path-var
    desc: build.rs references binary path variable
    crit: component
    conf: 0.86
    for: [rust]
    if:
      type: text
      regex: '\b(binary|exe|tool)_path\b'
  - id: rust-build-rs-rustc-link-search-native
    desc: build.rs emits native link search path
    crit: component
    conf: 0.9
    for: [rust]
    if:
      type: text
      substr: "cargo:rustc-link-search=native="
  - id: rust-build-rs-rustc-link-lib
    desc: build.rs emits native link library
    crit: component
    conf: 0.9
    for: [rust]
    if:
      type: text
      substr: "cargo:rustc-link-lib="
  - id: rust-proc-macro-entrypoint
    # Require a real attribute at line start so comments like
    # `// ... a #[proc_macro] is not allowed ...` in build.rs do not count.
    desc: Rust proc macro entrypoint
    crit: component
    conf: 0.92
    for: [rust]
    if:
      type: text
      regex: '(?m)^\s*#\s*\[\s*proc_macro(_derive|_attribute)?\s*\]|proc_macro::TokenStream'
  # ============================================================
  # MAKEFILE: trojan targets
  # ============================================================
  # Atomic: Makefile curl/wget piped to a shell interpreter. Keep one
  # canonical matcher for sh, bash, and shell rather than overlapping atoms.
  - id: makefile-curl-pipe-shell
    desc: Makefile pipes download to shell
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '(?m)^\t(curl|wget).{0,50}\|.{0,20}\b(shell|bash|sh)\b'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: objectives/command-and-control/channel/deaddrop/url::security-rule-runtime-script-floating-url
      - id: metadata/file/extension/identity::markdown-file-basename
      - type: text
        regex: '^#!'
      - type: text
        substr: golangci-lint.run/install.sh
      - type: basename
        regex: '^[Jj]ustfile$'
      - type: basename
        regex: '.*\.(ya?ml|json|toml)$'
        case_insensitive: true
    not:
      - substr: "uses: actions/"
      - substr: "curl http://npmjs.org/install.sh"
      - substr: golangci-lint.run/install.sh
      - substr: astral.sh # uv installer (well-known Python package manager)
      - substr: rustup.rs # rustup bootstrap installer
      - substr: "curl -sS https://webinstall.dev/k9s | bash"
      - substr: "curl https://getmic.ro | bash"
      - substr: "https://dot.net/v1/dotnet-install.sh | bash"
  # Atomic: Makefile curl/wget piped to eval
  - id: makefile-curl-pipe-eval
    desc: Makefile downloads and pipes to eval
    crit: suspicious
    conf: 0.9
    for: [shell]
    if:
      type: text
      # Require a Makefile recipe tab so embedded docs/regex corpora in
      # native binaries (e.g. package-manager content sniffers) do not match.
      regex: '(^|\n)\t(curl|wget).{0,50}\|.{0,20}eval'
    unless:
      - type: text
        regex: '^#!'
      - type: basename
        regex: '.*\.(ya?ml|json|toml)$'
        case_insensitive: true
      - id: well-known/tool/development/aube::aube-node-platform-package-loader
  - id: makefile-hidden-target
    desc: Makefile with suspicious hidden command
    crit: suspicious
    conf: 0.8
    for: [shell]
    if:
      type: text
      regex: '^\.[a-z]+:[\s\S]{0,100}(curl|wget|nc )'
    unless:
      - type: text
        regex: '^#!'
  - id: rust-build-sha256-pin-constant
    desc: build.rs declares pinned SHA-256 archive hash
    crit: component
    conf: 0.92
    for: [rust]
    if:
      type: text
      regex: '(?m)\bconst\s+\w*SHA256\w*\s*:\s*&str\s*=\s*"[0-9a-fA-F]{64}"'
  - id: rust-build-sha256-checksum-compare
    desc: build.rs compares downloaded archive SHA-256
    crit: component
    conf: 0.92
    for: [rust]
    if:
      type: text
      regex: 'assert_eq!\s*\(\s*\w*(digest|hash|checksum)\w*\s*,\s*\w*SHA256\w*'
  - id: rust-build-tar-extract-command
    desc: build.rs extracts tar archive
    crit: component
    conf: 0.88
    for: [rust]
    if:
      type: text
      regex: 'Command::new\s*\(\s*"tar"\s*\)'
  - id: openrewrite-python-package-marker
    desc: OpenRewrite Python package marker
    crit: component
    conf: 0.95
    for: [python]
    if:
      type: text
      substr: "openrewrite"
composite_rules:
  - id: npm-script-base64
    desc: NPM lifecycle script decodes base64 data
    crit: notable
    conf: 0.9
    for: [package.json]
    any:
      - id: npm-preinstall-base64
      - id: npm-install-base64
      - id: npm-postinstall-base64

  - id: setup-obfuscated-shell-check-output
    desc: setup hook executes obfuscated shell command
    crit: hostile
    conf: 0.96
    scope: leaf
    unless:
      - id: metadata/package/testing/presence/harness::test-fixture-directory
    all:
      - id: setup-py-or-cmdclass-marker
      - id: micro-behaviors/process/create/subprocess::check-output
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: micro-behaviors/data/string/conversion::python-chr-loop-string-builder
    any:
      - id: metadata/build/package::setup-cmdclass-install
      - id: metadata/build/package::setup-cmdclass-build-py
      - id: metadata/build/package::setup-cmdclass-develop
  - id: setup-computed-platform-shell-command
    desc: setup hook runs computed platform shell command
    crit: hostile
    conf: 0.95
    for: [python]
    scope: leaf
    all:
      - id: setup-py-or-cmdclass-marker
      - id: micro-behaviors/process/create/subprocess::check-output
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: setup-platform-computed-command-branch
    any:
      - id: metadata/build/package::setup-cmdclass-install
      - id: metadata/build/package::setup-cmdclass-build-py
      - id: metadata/build/package::setup-cmdclass-develop
  # Decomposed from a windowed regex `(setup\.py|cmdclass)[\s\S]{0,500}requests\.get
  # [\s\S]{0,200}os\.system`. The common `requests.get` literal forced a ±4096 PikeVM
  # window at every occurrence; substr/symbol/path atoms gate via single Aho-Corasick
  # passes instead. File-scoped on setup.py (same idiom as setup-py-wget-tmp-bash).
  # Proximity belongs only on the two positional calls; the setup.py path atom is a
  # file-level gate with no byte offset, so keeping it out of the near_bytes group
  # avoids inflating the span (the original coupled requests.get -> os.system <=200B).
  - id: requests-get-near-os-system
    desc: requests.get result executed via os.system nearby
    crit: component
    conf: 0.9
    for: [python]
    near_bytes: 300
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/process/create/system::python-os-system
  - id: setup-py-requests-ossystem
    desc: setup.py requests.get then os.system
    crit: suspicious
    conf: 0.95
    for: [python]
    all:
      - id: metadata/build/pip::root-setup-py
      - id: requests-get-near-os-system
  - id: setup-py-os-system-file
    desc: setup.py invokes os.system
    crit: suspicious
    conf: 0.95
    for: [python]
    scope: leaf
    near_bytes: 4096
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: metadata/build/pip::python-packaging-tool-tests
      - id: setup-py-clean-command-removes-build-artifacts
    # `python-os-system` already covers both `os.system(...)` and the obfuscated
    # `__import__("os").system(...)` form (see its regex). The bare
    # `dunder-import-call` leg (any `__import__`) was removed: it fired on the
    # benign `__import__("os").path.exists("README.md")` idiom common in setup.py
    # long_description handling, mislabeling it as an os.system invocation.
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/process/create/system::python-os-system
