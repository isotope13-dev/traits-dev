defaults:
  platforms: [unix, windows]
  for: [ruby]
traits:
  - id: extconf-psych-create-makefile
    desc: Psych extconf create_makefile
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "create_makefile 'psych'"

composite_rules:
  - id: extconf-process-replacement
    desc: "extconf.rb replaces process via exec() (hostile behavior)"
    crit: hostile
    conf: 1.0
    all:
      - id: metadata/build/package::filename-extconf
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
  - id: extconf-shell-exec
    desc: "extconf.rb performs shell execution (suspicious in build scripts)"
    crit: suspicious
    unless:
      - id: metadata/package/files::ruby-vendor-bundle-gem-path
      - id: extconf-psych-create-makefile
    downgrade:
      any:
        - id: well-known/lib/nokogiri::native-extension-bundle
    all:
      - id: metadata/build/package::filename-extconf
    any:
      - id: micro-behaviors/process/create/shell/lang::ruby-system-dup
      - id: objectives/supply-chain/metadata-anomaly/rubygems::shell-exec-imports
