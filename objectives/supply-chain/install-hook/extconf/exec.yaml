defaults:
  platforms: [unix, windows]
  for: [ruby]
traits:
  - id: extconf-psych-create-makefile
    desc: Psych extconf create_makefile
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "create_makefile 'psych'"
  - id: extconf-local-rust-build
    desc: extconf.rb builds local Rust source
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'cargo --version[\s\S]{0,800}cargo build --release[\s\S]{0,800}FileUtils\.cp'
  - id: extconf-local-ruby-delegation
    desc: extconf.rb delegates local native build
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'system\s*\(\s*ruby\s*,\s*["'']-C["'']\s*,[\s\S]{0,160}extconf_rb_path\.to_s'

composite_rules:
  - id: extconf-process-replacement
    desc: "extconf.rb replaces process via exec() (hostile behavior)"
    crit: hostile
    conf: 1.0
    all:
      - id: metadata/build/package::filename-extconf
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
  - id: extconf-shell-exec
    desc: "extconf.rb performs shell execution (suspicious in build scripts)"
    crit: suspicious
    unless:
      - id: metadata/package/files/dependency::ruby-vendor-bundle-gem-path
      - id: metadata/build/package::filename-extconf
      - id: extconf-psych-create-makefile
      - id: extconf-local-rust-build
      - id: extconf-local-ruby-delegation
    downgrade:
      any:
        - id: well-known/lib/nokogiri::library-reference
    all:
      - id: metadata/build/package::filename-extconf
    any:
      - id: micro-behaviors/process/create/system::ruby-system
      - id: micro-behaviors/process/create/shell/lang::ruby-shell-exec-imports
  - id: extconf-windows-persistence
    desc: "extconf.rb installs Windows persistence"
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/build/package::filename-extconf
    any:
      - id: objectives/persistence/login/registry/run-key::ruby-reg-add-run-key-persistence
      - id: objectives/persistence/login/startup/folder::ruby-copy-to-startup-folder
