# Supply Chain: Dummy Makefile Detection
# Detects pre-packaged Makefiles designed to bypass build failures
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  platforms: [unix, windows, macos]
  crit: suspicious
  conf: 0.9
composite_rules:
  - id: dummy-makefile
    desc: Dummy Makefile with empty install/all/clean targets (masks dropper failures)
    all:
      - id: metadata/build/make::makefile-basename
      - id: metadata/build/make::dummy-makefile-targets
