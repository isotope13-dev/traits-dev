# An npm install hook that connects to MongoDB and writes application data is
# materially different from a package that merely uses a database at runtime.
# Keep the capability atoms neutral; the install-time combination is hostile.
defaults:
  platforms: [unix, windows]
  for: [archives, npm, javascript, typescript]
  attack: T1195.002

composite_rules:
  - id: install-hook-mongodb-database-seed
    desc: npm install hook connects to MongoDB and seeds a database
    crit: hostile
    conf: 0.99
    for: [archives, npm]
    scope: archive
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: micro-behaviors/data/db/mongodb::mongodb-client-import
      - id: micro-behaviors/data/db/mongodb::mongodb-client-connect
    any:
      - id: micro-behaviors/data/db/mongodb::mongodb-update-write
      - id: micro-behaviors/data/db/mongodb::mongodb-insert-write
      - id: micro-behaviors/data/db/mongodb::mongodb-replace-write
