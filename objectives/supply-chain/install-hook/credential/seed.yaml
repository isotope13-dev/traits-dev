# Default administrator credentials seeded from an npm postinstall hook are a
# supply-chain persistence and access-control hazard, even when the package
# presents the action as application setup.
defaults:
  platforms: [unix, windows]
  for: [archives, npm, javascript, typescript]
  attack: T1195.002,T1098

composite_rules:
  - id: install-hook-default-admin-credential-seed
    desc: npm install hook seeds MongoDB with a known-weak password hash
    crit: hostile
    conf: 0.99
    for: [archives, npm]
    scope: archive
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: micro-behaviors/data/db/mongodb::mongodb-client-connect
      - id: objectives/credential-access/theft/keywords::well-known-bcrypt-of-password
    any:
      - id: micro-behaviors/data/db/mongodb::mongodb-update-write
      - id: micro-behaviors/data/db/mongodb::mongodb-insert-write
      - id: micro-behaviors/data/db/mongodb::mongodb-replace-write
