defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: hostile
  attack: T1195.002
  mbc: E1195
  for: [python]
composite_rules:
  # Helper: Any start process method
  - id: win32-start-process-combo
    desc: Windows start process method
    crit: suspicious
    conf: 0.8
    any:
      - id: micro-behaviors/process/create/launch::python-start-process
      - id: micro-behaviors/process/create/launch::os-startfile-call
  # Helper: Windows platform check (any method)
  - id: python-windows-check-combo
    desc: Windows platform check (any method)
    crit: suspicious
    conf: 0.8
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::python-win32-check
      - id: micro-behaviors/os/sysinfo/platform/runtime::python-osname-nt-check

  # Helper: Install context
  - id: pypi-install-context-combo
    desc: PyPI install context
    crit: component
    conf: 1.0
    any:
      - id: metadata/package/files::setup-py-basename
      - id: metadata/file/text/profile::init-py-file
  # Main Rule
  - id: windows-target-dropper
    desc: PyPI setup/init script targeting Windows with payload delivery
    conf: 0.95
    all:
      - id: python-windows-check-combo
      - id: win32-start-process-combo
      - id: micro-behaviors/communications/http/request/client::python-network-any
      - id: pypi-install-context-combo
