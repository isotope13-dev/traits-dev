defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: "T1195.002"
traits:
- id: hidden-windowstyle-args
  desc: PowerShell uses WindowStyle Hidden
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: '["'']-WindowStyle["''],\s*["'']Hidden["'']'
- id: iwr-temp-cmd-drop
  desc: Invoke-WebRequest drops TEMP cmd payload
  crit: suspicious
  conf: 0.97
  attack: "T1105"
  if:
    type: text
    regex: 'Invoke-WebRequest.{0,60}\$env:TEMP\\\\\w+\.cmd'
- id: temp-cmd-exec
  desc: cmd.exe runs TEMP cmd payload
  crit: suspicious
  conf: 0.97
  attack: "T1059.003"
  if:
    type: text
    regex: '["'']/c["''],\s*["'']%TEMP%\\\\\w+\.cmd["'']'
- id: spawn-on-exit-chain
  desc: Download process exit triggers second spawn
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '\.on\(\s*["'']exit["''],\s*\(\)\s*=>\s*\{\s*spawn\('
composite_rules:
- id: hidden-powershell-batch-dropper
  desc: Hidden PowerShell drops TEMP batch payload
  crit: hostile
  conf: 0.98
  attack: "T1105"
  all:
  - id: micro-behaviors/process/create/shell/invoke::powershell-exe-spawn
  - id: hidden-windowstyle-args
  - id: iwr-temp-cmd-drop
  any:
  - id: micro-behaviors/process/create/spawn::windowshide-option
  - id: micro-behaviors/process/create/spawn::stdio-ignore
  - id: objectives/command-and-control/infrastructure/domain/hosting::catbox-moe
- id: windows-temp-cmd-dropper-chain
  desc: Downloads then executes TEMP cmd payload
  crit: hostile
  conf: 0.995
  mbc: "B0024"
  all:
  - id: hidden-powershell-batch-dropper
  - id: micro-behaviors/process/create/shell/invoke::cmd-exe-spawn
  - id: temp-cmd-exec
  any:
  - id: spawn-on-exit-chain
  - id: metadata/package/files::postinstall-js-basename
  - id: metadata/file/text/metrics::javascript-small-file-5k
- id: npm-postinstall-windows-dropper
  desc: npm postinstall launches Windows batch dropper
  crit: hostile
  conf: 0.995
  for: [archives]
  scope: archive
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
  - id: windows-temp-cmd-dropper-chain
  any:
  - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
