defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: "T1195.002"
traits:
# Dual-use: malware hides its dropper console, but background helpers (audio
# players, updaters) also suppress the window. Notable on its own; the dropper
# composites below escalate when paired with IWR temp-drop + cmd exec.
- id: hidden-windowstyle-args
  desc: PowerShell uses WindowStyle Hidden
  crit: notable
  conf: 0.93
  if:
    type: text
    regex: '["'']-WindowStyle["''],\s*["'']Hidden["'']'
- id: iwr-temp-cmd-drop
  desc: Invoke-WebRequest drops TEMP cmd payload
  crit: suspicious
  conf: 0.97
  attack: "T1105"
  if:
    type: text
    regex: 'Invoke-WebRequest.{0,60}\$env:TEMP\\\\\w+\.cmd'
- id: temp-cmd-exec
  desc: cmd.exe runs TEMP cmd payload
  crit: suspicious
  conf: 0.97
  attack: "T1059.003"
  if:
    type: text
    regex: '["'']/c["''],\s*["'']%TEMP%\\\\\w+\.cmd["'']'
- id: spawn-on-exit-chain
  desc: Download process exit triggers second spawn
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '\.on\(\s*["'']exit["''],\s*\(\)\s*=>\s*\{\s*spawn\('
- id: encoded-hidden-powershell-hook
  desc: Git hook runs hidden encoded PowerShell
  crit: suspicious
  conf: 0.96
  attack: "T1059.001"
  if:
    type: text
    regex: '(?i)powershell\s+-NoP\s+-NonI\s+-W\s+Hidden\s+-Enc'
- id: ps-webclient-xor-temp-exe
  desc: PowerShell downloads XOR temp EXE
  crit: suspicious
  conf: 0.97
  attack: "T1105"
  if:
    type: text
    regex: 'DownloadData\(\$url\)[\s\S]{0,220}-bxor[\s\S]{0,220}WriteAllBytes\(\$tmp'
- id: ps-temp-exe-hidden-exec
  desc: PowerShell starts hidden temp EXE
  crit: suspicious
  conf: 0.96
  attack: "T1059.001"
  if:
    type: text
    regex: 'Start-Process\s+\$tmp\s+-WindowStyle\s+Hidden'
- id: node-spawns-powershell
  desc: Node spawns PowerShell process
  crit: suspicious
  conf: 0.95
  attack: "T1059.001"
  if:
    type: text
    regex: 'spawn\(\s*["'']powershell["'']'
- id: temp-cleanup-script-name
  desc: Creates dated temp cleanup script
  crit: suspicious
  conf: 0.9
  attack: "T1070"
  if:
    type: text
    substr: 'cleanup_${Date.now()}.js'
- id: cleanup-edits-package-lock
  desc: Cleanup edits package lock
  crit: notable
  conf: 0.88
  attack: "T1070"
  if:
    type: text
    substr: package-lock.json
composite_rules:
- id: hidden-powershell-batch-dropper
  desc: Hidden PowerShell drops TEMP batch payload
  crit: hostile
  conf: 0.98
  attack: "T1105"
  all:
  - id: micro-behaviors/process/create/shell/script-host::powershell-exe-spawn
  - id: hidden-windowstyle-args
  - id: iwr-temp-cmd-drop
  any:
  - id: micro-behaviors/process/create/spawn::windowshide-option
  - id: micro-behaviors/process/create/spawn::stdio-ignore
  - id: objectives/command-and-control/infrastructure/domain/hosting::catbox-moe
- id: windows-temp-cmd-dropper-chain
  desc: Downloads then executes TEMP cmd payload
  crit: hostile
  conf: 0.995
  mbc: "B0024"
  all:
  - id: hidden-powershell-batch-dropper
  - id: micro-behaviors/process/create/shell/script-host::cmd-exe-spawn
  - id: temp-cmd-exec
  any:
  - id: spawn-on-exit-chain
  - id: metadata/package/files/included::postinstall-js-basename
  - id: metadata/file/metrics::javascript-small-file-5k
- id: npm-postinstall-windows-dropper
  desc: npm postinstall launches Windows batch dropper
  crit: hostile
  conf: 0.995
  for: [archives]
  scope: archive
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
  - id: windows-temp-cmd-dropper-chain
  any:
  - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
- id: npm-git-hook-encoded-powershell
  desc: npm installs encoded PowerShell git hook
  crit: hostile
  conf: 0.995
  attack: "T1546.004"
  all:
  - id: encoded-hidden-powershell-hook
  - id: objectives/persistence/system/git-hooks::direct-executable-git-hook-installer
- id: npm-hidden-encoded-powershell-loader
  desc: npm hidden encoded PowerShell loader
  crit: hostile
  conf: 0.99
  attack: "T1059.001"
  all:
  - id: encoded-hidden-powershell-hook
  - id: metadata/import/builtin::require-child-process
  - id: objectives/anti-static/obfuscation/payload/encrypted::large-ciphertext-blob-literal
- id: npm-powershell-xor-exe-loader
  desc: npm PowerShell XOR EXE loader
  crit: hostile
  conf: 0.995
  attack: "T1105"
  all:
  - id: ps-webclient-xor-temp-exe
  - id: ps-temp-exe-hidden-exec
  - id: node-spawns-powershell
  - id: micro-behaviors/process/create/spawn::detached-true
  - id: micro-behaviors/process/create/spawn::stdio-ignore
  any:
  - id: micro-behaviors/communications/url/external/github::github-release-download
  - id: micro-behaviors/fs/directory/delete::fs-rm-recursive
- id: npm-hidden-loader-with-cleanup
  desc: npm hidden loader removes package traces
  crit: hostile
  conf: 0.99
  attack: "T1070"
  all:
  - id: node-spawns-powershell
  - id: temp-cleanup-script-name
  - id: cleanup-edits-package-lock
  - id: micro-behaviors/fs/directory/delete::fs-rm-recursive
  any:
  - id: ps-webclient-xor-temp-exe
  - id: micro-behaviors/process/create/spawn::child-unref-call
- id: npm-encoded-loader-with-cleanup
  desc: npm encoded loader cleans package traces
  crit: hostile
  conf: 0.985
  attack: "T1070"
  all:
  - id: encoded-hidden-powershell-hook
  - id: cleanup-edits-package-lock
  any:
  - id: micro-behaviors/fs/directory/delete::fs-rm-recursive
  - id: temp-cleanup-script-name
  - id: objectives/evasion/process/hidden/execution::hidden-process-execution
