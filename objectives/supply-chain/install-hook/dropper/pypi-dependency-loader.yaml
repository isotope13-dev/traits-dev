defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1195.002
traits:
  - id: install-requires-assignment
    desc: setup.py assigns install_requires
    crit: component
    conf: 0.85
    if:
      type: text
      regex: install_requires\s*=
  - id: install-requires-list-open
    desc: install_requires uses literal list
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "install_requires=["
  - id: install-requires-comma
    desc: install_requires contains dependency pair
    crit: component
    conf: 0.8
    if:
      type: text
      regex: install_requires.{0,80}[''"].{1,40}[''"]\s*,\s*[''"]
  - id: import-tests-from-dependency
    desc: Runtime imports tests from dependency
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: (?m)^\s*from\s+[a-z_][a-z0-9_]*(\.[a-z_][a-z0-9_]*)?\s+import\s+tests\b
composite_rules:
  - id: install-requires-multi-dependency
    desc: setup.py declares multiple bare dependencies
    crit: suspicious
    conf: 0.84
    all:
      - id: install-requires-assignment
      - id: install-requires-comma
    any:
      - id: install-requires-list-open
      - id: objectives/supply-chain/metadata-anomaly/dependency::pypi-unpinned-dependency
  - id: import-time-dependency-loader
    desc: Package loads dependency during import
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/supply-chain/recon-exfil::setup-py-file-dup
      - id: install-requires-multi-dependency
      - id: import-tests-from-dependency
    any:
      - id: objectives/supply-chain/recon-exfil::tiny-init-module
      - id: objectives/supply-chain/metadata-anomaly/manifest::unknown-platform
      - id: micro-behaviors/communications/http/lib/requests::requests-get
  - id: hidden-dependency-loader
    desc: Concealed dependency executes at import
    crit: suspicious
    conf: 0.97
    all:
      - id: import-time-dependency-loader
      - id: import-tests-from-dependency
    any:
      - id: objectives/supply-chain/install-hook/dropper/setup-hook::distutils-import-content
      - id: objectives/supply-chain/recon-exfil::tiny-python-file
      - id: micro-behaviors/communications/http/request::url-literal
