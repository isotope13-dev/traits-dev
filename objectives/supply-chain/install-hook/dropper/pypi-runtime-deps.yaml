defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
  attack: T1059.006
  crit: suspicious
traits:
  - id: hub-sdk-string
    desc: hub-sdk string reference
    conf: 0.8
    if:
      type: string_value
      regex: hub-sdk
composite_rules:
  - id: runtime-pip-install-hub
    desc: Runtime installation of hub-sdk
    conf: 0.9
    all:
      - id: objectives/execution/autoinstall/pip::check-requirements-call
      - id: hub-sdk-string
