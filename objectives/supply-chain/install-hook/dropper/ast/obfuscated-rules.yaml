defaults:
  platforms: [unix, windows]
  for: [python]

composite_rules:
  - id: python-obfuscated-multi-stage-dropper
    desc: "Python multi-stage dropper using arithmetic obfuscation and COM automation"
    crit: hostile
    all:
      - id: objectives/anti-static/obfuscation/arithmetic::python-obfuscated-constants-arithmetic
      - id: objectives/supply-chain/install-hook/dropper/setup-hook::pypi-com-extension-dropper
    scope: leaf

  - id: env-aware-stealth-execution
    desc: "Stealth execution triggered by environment-aware branching"
    crit: notable
    all:
      - id: objectives/anti-static/obfuscation/arithmetic::python-env-aware-execution
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
    scope: leaf
