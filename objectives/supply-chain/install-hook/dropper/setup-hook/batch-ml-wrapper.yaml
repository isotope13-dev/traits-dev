defaults:
  platforms: [windows]
  for: [batch]
  attack: "T1059.003, T1059.006"

traits:
  - id: loader-py-script-variable
    desc: Batch sets loader.py script variable
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bset\s+SCRIPT=loader\.py\b'

  - id: python-percent-script-run
    desc: Batch runs configured Python script
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: python %SCRIPT%

  - id: hf-transformers-dep
    desc: transformers dependency token
    crit: component
    conf: 0.88
    if:
      type: text
      word: transformers

  - id: hf-datasets-dep
    desc: datasets dependency token
    crit: component
    conf: 0.88
    if:
      type: text
      word: datasets

  - id: hf-tokenizers-dep
    desc: tokenizers dependency token
    crit: component
    conf: 0.88
    if:
      type: text
      word: tokenizers

  - id: hf-accelerate-dep
    desc: accelerate dependency token
    crit: component
    conf: 0.88
    if:
      type: text
      word: accelerate

  - id: hf-hub-dep
    desc: huggingface_hub dependency token
    crit: component
    conf: 0.88
    if:
      type: text
      word: huggingface_hub

  - id: hf-safetensors-dep
    desc: safetensors dependency token
    crit: component
    conf: 0.88
    if:
      type: text
      word: safetensors

  - id: project-setup-title
    desc: Generic project setup title
    crit: component
    conf: 0.86
    if:
      type: text
      substr: title Project Setup

composite_rules:
  - id: huggingface-pip-cluster
    desc: Hugging Face dependency install cluster
    crit: suspicious
    conf: 0.92
    needs: 4
    any:
      - id: hf-transformers-dep
      - id: hf-datasets-dep
      - id: hf-tokenizers-dep
      - id: hf-accelerate-dep
      - id: hf-hub-dep
      - id: hf-safetensors-dep

  - id: fake-ml-setup-runs-loader
    desc: Fake ML setup runs loader script
    crit: hostile
    conf: 0.96
    all:
      - id: loader-py-script-variable
      - id: python-percent-script-run
      - id: huggingface-pip-cluster

  - id: project-setup-loader-before-deps
    desc: Project setup wrapper runs loader
    crit: hostile
    conf: 0.95
    all:
      - id: project-setup-title
      - id: loader-py-script-variable
      - id: python-percent-script-run
      - id: huggingface-pip-cluster
