defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  attack: T1195.002
traits:
  - id: appdata-local-temp-exe
    desc: "Win AppData Local Temp exe drop path"
    crit: suspicious
    conf: 0.85
    attack: T1074.001
    if:
      type: string_literal
      regex: AppData[/\\\\]Local[/\\\\]Temp[/\\\\][A-Za-z0-9_{} -]+\.exe
      case_insensitive: true
  - id: dropper-class-name
    desc: Python class literally named Dropper
    crit: suspicious
    conf: 0.9
    attack: T1204.002
    if:
      type: text
      regex: \bclass\s+Dropper\s*[:(]
  - id: computername-env-access
    desc: Reads the COMPUTERNAME environment variable
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "os\\.(environ\\[['\"]COMPUTERNAME['\"]\\]|getenv\\(['\"]COMPUTERNAME['\"]\\))"
    unless:
      - type: basename
        regex: ^test_
  - id: scr-file-extension
    desc: .scr file extension (screensaver/executable)
    # The extension alone is only an incomplete dropper indicator; the
    # hostile composite requires a write/rename execution chain as well.
    crit: component
    conf: 0.95
    if:
      type: text
      regex: \.scr['"]
    unless:
      - id: well-known/tool/detection/
      - type: text
        substr: "_BLOCKED_EXECUTABLE_SUFFIXES"
      - type: text
        substr: "executable file type is not allowed"
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: content-addressed-cache-marker
    desc: Content-addressed cache marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Content-addressed cache
  - id: inline-chr-loader-exec
    desc: Inline exec join(map(chr, [..])) loader
    crit: suspicious
    conf: 0.95
    attack: T1027
    if:
      type: text
      substr: exec("".join(map(chr, [
  - id: inline-chr-loader-array
    desc: Large decimal chr array loader
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: join\(map\(chr,\s*\[(\d{1,3},\s*){50,}
  - id: encoded-powershell-exe-path
    desc: Base64-encoded PowerShell executable path
    crit: notable
    conf: 0.9
    if:
      type: encoded
      encoding: base64
      regex: '(?i)(~[/\\]|[A-Za-z]:[/\\])[^\r\n]{1,120}\.exe\b'
  - id: deceptive-install-message
    desc: Deceptive install progress message
    crit: suspicious
    conf: 0.85
    attack: T1204.001
    if:
      type: string_literal
      regex: '[Ii]nstalling dependencies.{0,50}(please wait|please be patient)'
  - id: surveillance-dependency-name-1
    desc: Pip names screen/input library
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bpip\s+install\b.{0,80}\b(pyscreenshot|pynput|pydirectinput)\b'
      case_insensitive: true
  - id: surveillance-dependency-name-2
    desc: Pip names clipboard/keyboard library
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bpip\s+install\b.{0,80}\b(pyperclip|keyboard)\b'
      case_insensitive: true
  - id: cmd-move-rename
    desc: Windows cmd /c move file rename
    crit: suspicious
    conf: 0.85
    attack: T1036.005
    if:
      type: string_literal
      regex: cmd /c move\b
  - id: cmd-del-cleanup
    desc: Windows cmd /c del artifact cleanup
    crit: suspicious
    conf: 0.85
    attack: T1070.004
    if:
      type: string_literal
      regex: cmd /c del\b
  - id: net-session-admin-check
    desc: Windows net session command string
    crit: suspicious
    conf: 0.9
    attack: T1033
    if:
      type: text
      regex: '(?i)["'']net\s+session(["'']|\s+[>&|;])'
    unless:
      - id: metadata/package/files/dependency::bundled-python-library-path
      - id: metadata/file/profile/identity::generated-attack-map-context
  - id: python-release-impersonation-url-1
    desc: Fake Python release (exe/scr/msi)
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: https?://[a-z0-9-]*python[a-z0-9-]*\.[a-z]+/[^\s]{0,50}\.(exe|scr|msi)
  - id: python-release-impersonation-url-2
    desc: Fake Python release (bat/cmd)
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: https?://[a-z0-9-]*python[a-z0-9-]*\.[a-z]+/[^\s]{0,50}\.(bat|cmd)
  - id: powershell-download-cmd-b
    desc: PowerShell download command in string
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    if:
      type: string_literal
      regex: Start-BitsTransfer.{0,100}
      case_insensitive: true
  - id: powershell-download-source
    desc: PowerShell download source marker
    crit: component
    conf: 0.9
    attack: T1059.001
    if:
      type: string_literal
      regex: '\$env:'
      case_insensitive: true
  - id: powershell-invoke-webrequest
    desc: PowerShell request command in Python string
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    if:
      type: literal
      kind: string
      regex: '(?i)\b(powershell(\.exe)?\b.{0,80})?(Invoke-WebRequest|iwr)\b\s+(-|https?://)'
    unless:
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
  - id: powershell-outfile-exe
    desc: PowerShell OutFile writes EXE
    crit: suspicious
    conf: 0.92
    attack: T1105
    unless:
      - id: well-known/app/telegram::telegram-desktop-build-prepare-script
    if:
      type: text
      regex: (?i)-OutFile\s+["'~/$\\A-Za-z0-9._ -]+\.exe\b
  - id: powershell-invoke-expression-exe
    desc: PowerShell Invoke-Expression runs EXE
    crit: suspicious
    conf: 0.95
    attack: T1059.001
    if:
      type: text
      regex: (?i)\bInvoke-Expression\b.{0,80}\.exe\b
  - id: setup-input-call-literal
    desc: setup.py input with literal prompt
    crit: component
    conf: 0.9
    attack: T1204.001
    if:
      type: text
      regex: (?i)\binput\s*\(\s*f?["']
  - id: setup-install-prompt-word
    desc: input prompt contains installer-themed keyword
    crit: component
    conf: 0.9
    attack: T1204.001
    if:
      type: text
      regex: (?i)\binput\s*\(\s*f?["'][^"'\n]{0,120}\b(install|package|requests|pip)\b
  - id: setup-pip-install-requests
    desc: setup.py installs requests via pip
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'pip install requests\b'
    downgrade:
      none:
        - type: basename
          exact: setup.py
        - type: basename
          exact: setup.cfg
  - id: setup-randomized-oob-callback
    desc: setup.py randomizes OOB callback URL
    crit: suspicious
    conf: 0.94
    attack: T1041
    if:
      type: text
      regex: 'webhook\.site/[A-Za-z0-9-]{20,}[^\\n]{0,120}randint\s*\('
  - id: setup-discord-gitpython-deps
    desc: 'setup discord gitpython deps'
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'install_requires\s*=\s*\[[\s\S]{0,300}discord\.py[\s\S]{0,300}gitpython'
  - id: copies-python-pth-site-hook
    desc: Copies .pth startup hook into site-packages
    crit: suspicious
    conf: 0.98
    attack: T1546
    if:
      type: text
      regex: '(?is)telemetry\.pth[\s\S]{0,240}shutil\.copy2\s*\('
composite_rules:
  - id: pypi-install-python-pth-telemetry-hook
    desc: Install hook adds telemetry .pth startup import
    crit: hostile
    conf: 0.99
    scope: archive
    for: [archives]
    attack: "T1195.002,T1546"
    all:
      - id: metadata/build/package::setuptools-run-override
      - id: copies-python-pth-site-hook
      - id: objectives/persistence/login/python-startup::pth-import-exec
      - id: objectives/persistence/login/python-startup::pth-telemetry-initializer-import

  - id: windows-computername-env
    desc: setup.py reads the COMPUTERNAME environment variable
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/package/files/included::setup-py-basename
      - id: computername-env-access

  - id: setup-py-win32com-import
    desc: COM automation import in setup.py
    crit: notable
    conf: 0.8
    attack: T1559.001
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/communications/ipc/win32com::import-win32com

  - id: powershell-download-cmd-a
    desc: PowerShell download command in string
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    any:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::invoke-webrequest
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-download
      - id: powershell-invoke-webrequest
    unless:
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
  - id: surveillance-deps-install
    desc: Surveillance library mass installation
    crit: suspicious
    conf: 0.9
    attack: T1059.006
    all:
      - id: surveillance-deps-install-1
      - id: surveillance-deps-install-2
  - id: surveillance-deps-install-1
    desc: Python executes a pip install for a screen or input library
    crit: suspicious
    conf: 0.9
    attack: T1059.006
    all:
      - id: surveillance-dependency-name-1
    any:
      - id: micro-behaviors/process/create/exec::python-subprocess-string-command
      - id: micro-behaviors/process/create/exec::python-os-system-string-command
      - id: micro-behaviors/process/create/exec::python-os-popen-string-command
    near_lines: 4
    unless:
      - id: well-known/tool/detection/security-scanner/
  - id: surveillance-deps-install-2
    desc: Python executes a pip install for a clipboard or keyboard library
    crit: suspicious
    conf: 0.9
    attack: T1059.006
    all:
      - id: surveillance-dependency-name-2
    any:
      - id: micro-behaviors/process/create/exec::python-subprocess-string-command
      - id: micro-behaviors/process/create/exec::python-os-system-string-command
      - id: micro-behaviors/process/create/exec::python-os-popen-string-command
    near_lines: 4
    unless:
      - id: well-known/tool/detection/security-scanner/
  - id: python-release-impersonation-url
    desc: Fake Python release URL
    crit: suspicious
    conf: 0.95
    any:
      - id: python-release-impersonation-url-1
      - id: python-release-impersonation-url-2
  - id: curl-subprocess-exec-chain
    desc: curl subprocess download + os.system execute dropper
    crit: suspicious
    conf: 0.9
    attack: T1059.003
    all:
      - id: micro-behaviors/process/create/subprocess::call
      - id: micro-behaviors/communications/http/download/curl::curl-invoked-with-url-or-option
      - id: micro-behaviors/process/create/system::python-os-system
  - id: pastebin-url-resolver-dropper
    desc: Paste site URL resolver to stage download-execute
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1204.002
    all:
      - id: objectives/command-and-control/infrastructure/paste::pastebin
      - id: micro-behaviors/communications/http/lib/urllib::urllib-request-symbol
      - id: micro-behaviors/process/create/subprocess::call
      - id: micro-behaviors/process/create/system::python-os-system
  - id: powershell-download-cmd
    desc: PowerShell download command in string
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
    any:
      - id: powershell-download-cmd-a
      - id: powershell-download-cmd-b
  - id: powershell-download-in-string
    desc: PowerShell download cradle in Python string
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
      - id: well-known/tool/detection/repo-trust-scan::repo-trust-scan-context
    all:
      - id: powershell-download-cmd
      - id: powershell-download-source
  - id: setup-obfuscated-decoded-exec-payload
    desc: setup.py executes decoded payload
    crit: hostile
    conf: 0.96
    mbc: "E1059"
    all:
      - id: metadata/build/pip::setup-py
      - id: objectives/anti-static/obfuscation/eval/scripting::python-decode-decrypt-dynamic-exec
    any:
      - id: objectives/anti-static/obfuscation/payload/encoded::decoded-shell-command
      - id: objectives/anti-static/obfuscation/payload/encoded::decoded-python-import-b
  - id: encoded-powershell-exe-path-use
    desc: Encoded PowerShell references executable path
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/command-and-control/dropper/download::powershell-encoded-command-in-string
      - id: encoded-powershell-exe-path
  - id: inline-chr-loader
    desc: Inline decimal chr loader
    crit: suspicious
    conf: 0.96
    all:
      - id: inline-chr-loader-exec
      - id: inline-chr-loader-array

  - id: pypi-install-autoinstall-dropper
    desc: PyPI setup.py executes pip install command
    crit: hostile
    conf: 0.95
    mbc: B0024
    all:
      - id: metadata/build/pip::root-setup-py
      - id: metadata/build/package::python-install-hook
      - id: micro-behaviors/process/create/launch::python-command-exec-any
    any:
      - id: micro-behaviors/os/package-manager/install::pip-install
      - id: micro-behaviors/os/package-manager/install::python-pip-module-command
    unless:
      - id: metadata/build/pip/
    downgrade:
      any:
        - id: metadata/package/quality/profile/
  - id: windows-start-exec
    desc: Windows start command with executable
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/process/create/launch::windows-start-command
      - id: micro-behaviors/process/create/launch::python-command-exec-any
  - id: executable-download
    desc: Downloads executable file
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/request/client::request-python
      # A URL ending in .dll/.exe is not by itself a download: POST-based
      # service endpoints commonly use executable-looking names. This leg
      # proves a GET/urlretrieve call with the executable URL as its argument.
      - id: micro-behaviors/communications/http/request/client::python-http-executable-url
    near_lines: 40
    downgrade:
      any:
        - id: well-known/app/ollama::official-download-url
  - id: binary-file-drop
    desc: Binary file write to disk
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: micro-behaviors/fs/file/write/direct::py-open-write-inline
    any:
      - id: micro-behaviors/process/create/launch::python-command-exec-any
      - id: micro-behaviors/communications/http/request/client::request-python
    unless:
      - id: well-known/app/aws-elasticbeanstalk::awsebcli-source-tree
      - id: metadata/build/pip::setuptools-package-index
      - id: content-addressed-cache-marker
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::unittest-module
  - id: scr-to-exe-mismatch
    desc: .scr to .exe extension mismatch (dropper pattern)
    crit: hostile
    conf: 0.98
    all:
      - id: scr-file-extension
      - id: micro-behaviors/fs/path/extension::exe-dup
    any:
      - id: micro-behaviors/fs/file/write/direct::py-open-write-inline
  - id: pypi-install-dropper
    desc: PyPI install-time dropper
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1204.002
    all:
      - id: metadata/build/pip::root-setup-py
      - id: metadata/build/package::python-install-hook
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: micro-behaviors/process/create/launch::python-command-exec-any
    unless:
      - id: metadata/build/pip/
  - id: download-execute-chain
    desc: Downloads and executes file
    crit: hostile
    conf: 0.92
    mbc: E1204
    attack: T1204.002
    all:
      - id: metadata/build/pip::root-setup-py
      - id: executable-download
      - id: micro-behaviors/process/create/launch::python-command-exec-any
    near_lines: 120
  - id: pypi-executable-download-command
    desc: PyPI setup downloads executable and commands execution
    crit: hostile
    conf: 0.96
    mbc: E1204
    attack: T1204.002
    all:
      - id: download-execute-chain
      - id: micro-behaviors/communications/http/download/url::executable-url-reference
    any:
      - id: metadata/build/package::python-install-hook
      - id: metadata/build/pip::root-setup-py
    needs: 1
  - id: pypi-c2-dropper
    desc: PyPI setup.py downloads and executes C2 payload
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1204.002
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/process/create/subprocess::process-execution
  - id: pypi-curl-pipe-bash-dropper
    desc: PyPI setup.py pipes curl into shell
    crit: hostile
    conf: 0.98
    mbc: E1204
    attack: T1204.002
    scope: leaf
    all:
      - id: metadata/build/pip::root-setup-py
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-bash
      - id: micro-behaviors/process/create/subprocess::process-execution
  - id: windows-rename-execute-delete
    desc: Windows file rename-execute-delete dropper chain
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1059.003
    all:
      - id: micro-behaviors/process/create/shell/spawn::cmd-exe
      - id: cmd-move-rename
      - id: cmd-del-cleanup
  - id: pypi-browser-extension-dropper
    desc: PyPI package drops browser extension via shortcut hijack
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1176
    all:
      - id: metadata/build/pip::root-setup-py
      - id: objectives/execution/autoinstall/pip::main-call-content
      - id: objectives/persistence/login/startup/shortcut::windows-shortcut-argument-injection
      - id: objectives/anti-static/obfuscation/eval/scripting::advanced-python-obfuscation
  - id: pypi-shortcut-hijack-dropper
    desc: PyPI package enumerates and hijacks browser shortcuts
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1176
    all:
      - id: metadata/build/pip::root-setup-py
      - id: objectives/execution/autoinstall/pip::main-call-content
      - id: objectives/persistence/login/startup/shortcut::windows-shortcut-walk-modify
      - id: micro-behaviors/fs/directory/mkdir::mkdir-python
  - id: pypi-com-extension-dropper
    desc: PyPI setup.py uses COM automation to drop extension
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1176
    all:
      - id: setup-py-win32com-import
      - id: objectives/supply-chain/install-hook/setup::setup-py-getenv
      - id: micro-behaviors/os/wsh/file::create-shortcut
  - id: shortcut-target-browser-fingerprint
    desc: Browser fingerprinting via shortcut TargetPath
    crit: suspicious
    conf: 0.9
    attack: T1518
    all:
      - id: micro-behaviors/fs/path/basename::os-path-basename
      - id: micro-behaviors/os/wsh/file::shortcut-target-path
    any:
      - id: micro-behaviors/os/wsh/file::shortcut-arguments
      - id: micro-behaviors/os/wsh/file::create-shortcut
  - id: install-time-gated-execution
    desc: Platform-gated install-time execution in setup.py
    crit: hostile
    conf: 0.9
    mbc: B0024
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/os/sysinfo/platform/runtime::sys-platform-check
      - id: micro-behaviors/os/sysinfo/platform/runtime::sys-argv-access
      - id: objectives/execution/autoinstall/pip::main-call-content
    downgrade:
      any:
        - id: metadata/package/quality/profile/
  - id: obfuscated-setup-py-file-dropper
    desc: Obfuscated setup.py writes payload files to disk
    crit: hostile
    conf: 0.95
    mbc: E1204
    all:
      - id: metadata/build/pip::root-setup-py
      - id: objectives/anti-static/obfuscation/eval/scripting::advanced-python-obfuscation
      - id: micro-behaviors/fs/directory/mkdir::mkdir-python
  - id: pypi-inline-chr-loader
    desc: setup.py inline chr-array exec loader
    crit: hostile
    conf: 0.97
    mbc: B0024
    all:
      - id: metadata/build/pip::root-setup-py
      - id: inline-chr-loader
    downgrade:
      any:
        - id: metadata/package/testing/
  - id: pypi-powershell-dropper
    desc: PyPI setup.py PowerShell download-execute chain
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1059.001
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/process/create/subprocess::popen-ast
      - id: powershell-download-in-string
      - id: micro-behaviors/process/daemonize/spawn::powershell-hidden
  - id: pypi-powershell-encoded-dropper
    desc: PyPI setup.py encoded PowerShell download-execute
    crit: hostile
    conf: 0.98
    mbc: E1204
    attack: T1059.001
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/process/create/subprocess::popen-content
      - id: objectives/command-and-control/dropper/download::powershell-encoded-command-in-string
      - id: micro-behaviors/process/daemonize/spawn::powershell-hidden
  - id: pypi-encoded-powershell-dropper
    desc: PyPI setup.py launches hidden encoded PowerShell
    crit: hostile
    conf: 0.96
    mbc: E1204
    attack: T1059.001
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/process/create/subprocess::popen-ast
      - id: objectives/command-and-control/dropper/download::powershell-encoded-command-in-string
      - id: micro-behaviors/process/daemonize/spawn::powershell-hidden
      - id: micro-behaviors/process/create/flags::creationflags
  - id: pypi-powershell-stager
    desc: PyPI setup.py downloads and stages hidden payload
    crit: hostile
    conf: 0.95
    mbc: B0024
    all:
      - id: metadata/build/pip::root-setup-py
      - id: powershell-download-in-string
      - id: micro-behaviors/data/archive/extract/zip::powershell-expand-archive
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-powershell-launch
  - id: pypi-extension-dropper-admin-gated
    desc: PyPI setup.py drops extension with admin gating
    crit: hostile
    conf: 0.95
    mbc: E1204
    all:
      - id: metadata/build/pip::root-setup-py
      - id: objectives/supply-chain/install-hook/setup::setup-py-getenv
