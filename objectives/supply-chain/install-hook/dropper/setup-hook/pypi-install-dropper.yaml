defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  attack: T1195.002
traits:
  - id: windows-start-command-a
    desc: Windows start command execution
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: \bstart\s+['"]?[a-zA-Z0-9._\\/-]+\.(exe|bat|cmd|ps1)
    unless:
      - type: basename
        regex: \.pyc$
  - id: windows-start-command-b
    desc: Windows start command execution
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: \bstart\s+['"]?[a-zA-Z0-9._\\/-]+\.(scr|msi|com)
    unless:
      - type: basename
        regex: \.pyc$
  - id: os-system-start-concat
    desc: os.system('start ' + ...) pattern
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: os\.system\s*\(\s*['"]start\s+['"]\s*\+
  - id: os-system-start-fstring
    desc: os.system f-string Windows start
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: os\.system\s*\(\s*f['"]start\s+\{
  - id: create-no-window-hex
    desc: "CREATE_NO_WINDOW flag as hex (0x08000000)"
    crit: suspicious
    conf: 0.9
    attack: T1564.003
    if:
      type: text
      regex: creationflags\s*=\s*0x[0O]8000000
    unless:
      - id: well-known/app/calvyn-code
  - id: appdata-local-temp-exe
    desc: "Win AppData Local Temp exe drop path"
    crit: suspicious
    conf: 0.85
    attack: T1074.001
    if:
      type: string_literal
      regex: AppData[/\\\\]Local[/\\\\]Temp[/\\\\][A-Za-z0-9_{} -]+\.exe
      case_insensitive: true
  - id: dropper-class-name
    desc: Python class literally named Dropper
    crit: suspicious
    conf: 0.9
    attack: T1204.002
    if:
      type: text
      regex: \bclass\s+Dropper\s*[:(]
  - id: windows-computername-env
    desc: COMPUTERNAME environment access
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: "os\\.(environ\\[['\"]COMPUTERNAME['\"]\\]|getenv\\(['\"]COMPUTERNAME['\"]\\))"
    unless:
      - type: basename
        regex: ^test_
  - id: exe-file-extension
    desc: .exe file extension reference
    crit: component
    conf: 0.9
    if:
      type: string_literal
      regex: '[a-zA-Z0-9_-]+\.exe\b'
    unless:
      - type: basename
        regex: '^(common_ship|ship|make_msvc_package)\.py$'
    not:
      - explorer.exe
      - python.exe
      - pip.exe
      - powershell.exe
      - git.exe
      - 7z.exe
      - mimikatz.exe
      - calc.exe
      - convert.exe
      - magick.exe
      - chrome.exe
      - regex: \bwhich\b.{0,100}\.exe
      - regex: \bfind\b.{0,100}\.exe
  - id: scr-file-extension
    desc: .scr file extension (screensaver/executable)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \.scr['"]
    unless:
      - id: well-known/tool/detection/
  - id: executable-download-url-a
    desc: URL ending in executable extension
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: https?://[^\s'"$\\{}]{1,120}\.(exe|scr|msi|bat)\b([?#][^\s'"]{0,120})?
    unless:
      - id: metadata/file/string/identity::microsoft-vcredist-context
      - id: micro-behaviors/os/service/legitimate/
      - id: well-known/tool/detection/
    downgrade:
      any:
        - id: well-known/app/ollama::official-download-url
  - id: executable-download-url-b
    desc: URL ending in executable extension
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: https?://[^\s'"]{1,120}\.(cmd|ps1|dll)([?#][^\s'"]{0,120})?$
    unless:
      - id: micro-behaviors/os/service/legitimate/
      - id: well-known/tool/detection/
      - id: metadata/library/finance::dartlab-finance-context
    not:
      # Native library (.dll) artifacts hosted on the major model/code CDNs are
      # ordinary runtime dependencies (e.g. opencv_world.dll, libpatchmatch),
      # not install-time droppers.
      - substr: huggingface.co
      - substr: modelscope.cn
      - substr: githubusercontent.com
      - regex: github\.com/[^/]+/[^/]+/releases/
  - id: install-run-override
    desc: Install command run() override
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: install.run
    unless:
      - id: metadata/library/python-stdlib
  - id: cmdclass-install
    desc: cmdclass install hook
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: cmdclass.{0,50}['"]install['"]
    unless:
      - type: basename
        regex: ^test_
  - id: distutils-import-content
    desc: Deprecated distutils import in source
    crit: notable
    conf: 0.8
    if:
      type: text
      # Match old-style packaging/setup distutils imports (the "is this a setup
      # file?" signal for robust-setup-py), NOT generic utility submodules like
      # distutils.spawn.find_executable / distutils.version / distutils.util,
      # which are ordinary runtime helpers and not install-hook evidence.
      regex: from distutils\S{0,6} import[\w,\s]{0,60}\bsetup\b|distutils\.command
    unless:
      - type: basename
        exact: common_ship.py
      - id: metadata/package/tooling::autoconf-generated-script
  - id: inline-chr-loader-exec
    desc: Inline exec join(map(chr, [..])) loader
    crit: suspicious
    conf: 0.95
    attack: T1027
    if:
      type: text
      substr: exec("".join(map(chr, [
  - id: inline-chr-loader-array
    desc: Large decimal chr array loader
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: join\(map\(chr,\s*\[(\d{1,3},\s*){50,}
  - id: encoded-windowscache-exe-utf16le
    desc: UTF16LE encoded WindowsCache executable
    crit: component
    conf: 0.9
    attack: T1036.005
    if:
      type: text
      substr: AFcAaQBuAGQAbwB3AHMAQwBhAGMAaABl
  - id: programdata-drop-path
    desc: ProgramData directory as drop location
    crit: notable
    conf: 0.85
    attack: T1074.001
    if:
      type: string_literal
      regex: C:[/\\\\]ProgramData[/\\\\]
      case_insensitive: true
    unless:
      - type: text
        substr: 'Vista:      (Fail! "C:\ProgramData" is a hidden *system* directory on Vista.)'
      - type: text
        substr: 'C:\ProgramData\<AppAuthor>\<AppName>   # Hidden, but writeable on Win 7.'
      - id: metadata/build/pip::setuptools-windows-msvc-helper
  - id: deceptive-install-message
    desc: Deceptive install progress message
    crit: suspicious
    conf: 0.85
    attack: T1204.001
    if:
      type: string_literal
      regex: '[Ii]nstalling dependencies.{0,50}(please wait|please be patient)'
  - id: surveillance-deps-install-1
    desc: Surveillance library (screens/input)
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: pip install.{0,200}(pyscreenshot|pynput|pydirectinput)
  - id: surveillance-deps-install-2
    desc: Surveillance library (clip/key)
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: pip install.{0,200}(pyperclip|keyboard)
  - id: cmd-move-rename
    desc: Windows cmd /c move file rename
    crit: suspicious
    conf: 0.85
    attack: T1036.005
    if:
      type: string_literal
      regex: cmd /c move\b
  - id: cmd-del-cleanup
    desc: Windows cmd /c del artifact cleanup
    crit: suspicious
    conf: 0.85
    attack: T1070.004
    if:
      type: string_literal
      regex: cmd /c del\b
  - id: net-session-admin-check
    desc: Windows admin check via net session
    crit: suspicious
    conf: 0.9
    attack: T1033
    if:
      type: text
      substr: net session
  - id: setup-py-win32com-import
    desc: COM automation import in setup.py
    crit: notable
    conf: 0.8
    attack: T1559.001
    if:
      type: text
      substr: from win32com.client import Dispatch
  - id: python-os-getenv-call
    desc: Python os.getenv call
    crit: component
    conf: 0.85
    attack: T1082
    if:
      type: text
      substr: os.getenv
    unless:
      - type: basename
        regex: '\.pyc$'
  - id: pip-module-string
    desc: pip module reference string
    crit: notable
    conf: 0.7
    unless:
      - id: well-known/app/crunr/
      - id: micro-behaviors/os/package-manager/install::pip-install
    if:
      type: string_literal
      regex: -m\s+pip
  - id: python-release-impersonation-url-1
    desc: Fake Python release (exe/scr/msi)
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: https?://[a-z0-9-]*python[a-z0-9-]*\.[a-z]+/[^\s]{0,50}\.(exe|scr|msi)
  - id: python-release-impersonation-url-2
    desc: Fake Python release (bat/cmd)
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: https?://[a-z0-9-]*python[a-z0-9-]*\.[a-z]+/[^\s]{0,50}\.(bat|cmd)
  - id: powershell-download-cmd-b
    desc: PowerShell download command in string
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    if:
      type: string_literal
      regex: Start-BitsTransfer.{0,100}
      case_insensitive: true
  - id: powershell-download-source
    desc: PowerShell download source marker
    crit: component
    conf: 0.9
    attack: T1059.001
    if:
      type: string_literal
      regex: '\$env:'
      case_insensitive: true
  - id: powershell-invoke-webrequest
    desc: PowerShell Invoke-WebRequest in Python string
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    if:
      type: text
      regex: (?i)\bpowershell\b.{0,40}\bInvoke-WebRequest\b
  - id: powershell-outfile-exe
    desc: PowerShell OutFile writes EXE
    crit: suspicious
    conf: 0.92
    attack: T1105
    if:
      type: text
      regex: (?i)-OutFile\s+["'~/$\\A-Za-z0-9._ -]+\.exe\b
  - id: powershell-invoke-expression-exe
    desc: PowerShell Invoke-Expression runs EXE
    crit: suspicious
    conf: 0.95
    attack: T1059.001
    if:
      type: text
      regex: (?i)\bInvoke-Expression\b.{0,80}\.exe\b
  - id: setup-input-call-literal
    desc: setup.py input with literal prompt
    crit: component
    conf: 0.9
    attack: T1204.001
    if:
      type: text
      regex: (?i)\binput\s*\(\s*f?["']
  - id: setup-install-prompt-word
    desc: input prompt contains installer-themed keyword
    crit: component
    conf: 0.9
    attack: T1204.001
    if:
      type: text
      regex: (?i)\binput\s*\(\s*f?["'][^"'\n]{0,120}\b(install|package|requests|pip)\b
  - id: setup-pip-install-requests
    desc: setup.py installs requests via pip
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'pip install requests\b'
    downgrade:
      none:
        - type: basename
          exact: setup.py
        - type: basename
          exact: setup.cfg
  - id: setup-randomized-oob-callback
    desc: setup.py randomizes OOB callback URL
    crit: suspicious
    conf: 0.94
    attack: T1041
    if:
      type: text
      regex: 'webhook\.site/[A-Za-z0-9-]{20,}[^\\n]{0,120}randint\s*\('
  - id: setup-discord-gitpython-deps
    desc: 'setup discord gitpython deps'
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'install_requires\s*=\s*\[[\s\S]{0,300}discord\.py[\s\S]{0,300}gitpython'
composite_rules:
  - id: powershell-download-cmd-a
    desc: PowerShell download command in string
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    any:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::invoke-webrequest
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-download
      - id: powershell-invoke-webrequest
  - id: surveillance-deps-install
    desc: Surveillance library mass installation
    crit: suspicious
    conf: 0.9
    attack: T1059.006
    all:
      - id: surveillance-deps-install-1
      - id: surveillance-deps-install-2
  - id: python-release-impersonation-url
    desc: Fake Python release URL
    crit: suspicious
    conf: 0.95
    any:
      - id: python-release-impersonation-url-1
      - id: python-release-impersonation-url-2
  - id: windows-start-command
    desc: Windows start command execution
    crit: notable
    conf: 0.85
    any:
      - id: windows-start-command-a
      - id: windows-start-command-b
      - id: os-system-start-fstring
      - id: os-system-start-concat
  - id: curl-subprocess-exec-chain
    desc: curl subprocess download + os.system execute dropper
    crit: suspicious
    conf: 0.9
    attack: T1059.003
    all:
      - id: micro-behaviors/process/create/subprocess::call
      - id: micro-behaviors/communications/http/download/curl::curl-cmd-dup
      - id: micro-behaviors/process/create/system::python-os-system
  - id: pastebin-url-resolver-dropper
    desc: Paste site URL resolver to stage download-execute
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1204.002
    all:
      - id: objectives/command-and-control/infrastructure/paste::pastebin
      - id: micro-behaviors/communications/http/lib/urllib::urllib-request-symbol
      - id: micro-behaviors/process/create/subprocess::call
      - id: micro-behaviors/process/create/system::python-os-system
  - id: executable-download-url
    desc: URL ending in executable extension
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/library/finance::dartlab-finance-context
    any:
      - id: executable-download-url-a
      - id: executable-download-url-b
  - id: powershell-download-cmd
    desc: PowerShell download command in string
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    any:
      - id: powershell-download-cmd-a
      - id: powershell-download-cmd-b
  - id: powershell-download-in-string
    desc: PowerShell download cradle in Python string
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    all:
      - id: powershell-download-cmd
      - id: powershell-download-source
  - id: setup-obfuscated-decoded-exec-payload
    desc: setup.py executes decoded payload
    crit: hostile
    conf: 0.96
    mbc: "E1059"
    all:
      - id: metadata/build/pip::setup-py
      - id: objectives/anti-static/obfuscation/eval/scripting::python-decode-decrypt-dynamic-exec
    any:
      - id: objectives/anti-static/obfuscation/payload/encoded::decoded-shell-command
      - id: objectives/anti-static/obfuscation/payload/encoded::decoded-python-import-b
  - id: encoded-windowscache-masquerade
    desc: Encoded WindowsCache executable masquerade
    crit: suspicious
    conf: 0.92
    attack: T1036.005
    all:
      - id: objectives/command-and-control/dropper/download::powershell-encoded-command-in-string
      - id: encoded-windowscache-exe-utf16le
  - id: robust-setup-py
    desc: setup.py installation file
    crit: notable
    conf: 1.0
    any:
      - id: metadata/build/pip::root-setup-py
      - id: objectives/supply-chain/recon-exfil/install-hook::setuptools-setup-call
  - id: setup-py-getenv
    desc: Environment variable access in setup.py
    crit: notable
    conf: 0.85
    attack: T1082
    all:
      - id: robust-setup-py
      - id: python-os-getenv-call
  - id: inline-chr-loader
    desc: Inline decimal chr loader
    crit: suspicious
    conf: 0.96
    all:
      - id: inline-chr-loader-exec
      - id: inline-chr-loader-array

  - id: pypi-install-hook
    desc: setup.py install hook
    crit: suspicious
    conf: 0.85
    any:
      - id: install-run-override
      - id: cmdclass-install
  - id: pypi-install-autoinstall-dropper
    desc: PyPI setup.py executes pip install command
    crit: hostile
    conf: 0.95
    mbc: B0024
    all:
      - id: robust-setup-py
      - id: pypi-install-hook
      - id: micro-behaviors/process/create/launch::python-command-exec-any
    any:
      - id: micro-behaviors/os/package-manager/install::pip-install
      - id: pip-module-string
    unless:
      - id: metadata/build/pip/
    downgrade:
      any:
        - id: metadata/package/quality/profile/
  - id: windows-start-exec
    desc: Windows start command with executable
    crit: suspicious
    conf: 0.9
    all:
      - id: windows-start-command
      - id: micro-behaviors/process/create/launch::python-command-exec-any
  - id: executable-download
    desc: Downloads executable file
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: executable-download-url
    near_lines: 40
    downgrade:
      any:
        - id: well-known/app/ollama::official-download-url
  - id: binary-file-drop
    desc: Binary file write to disk
    crit: suspicious
    conf: 0.85
    all:
      - id: exe-file-extension
      - id: micro-behaviors/fs/file/write/direct::py-open-write-inline
    any:
      - id: micro-behaviors/process/create/launch::python-command-exec-any
      - id: micro-behaviors/communications/http/request/client::request-python
    unless:
      - id: metadata/build/pip::setuptools-package-index
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::unittest-module
  - id: scr-to-exe-mismatch
    desc: .scr to .exe extension mismatch (dropper pattern)
    crit: hostile
    conf: 0.98
    all:
      - id: scr-file-extension
      - id: exe-file-extension
    any:
      - id: micro-behaviors/fs/file/write/direct::py-open-write-inline
  - id: pypi-install-dropper
    desc: PyPI install-time dropper
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1204.002
    all:
      - id: robust-setup-py
      - id: pypi-install-hook
      - id: micro-behaviors/communications/http/request/client::request-python
      - id: micro-behaviors/process/create/launch::python-command-exec-any
    unless:
      - id: metadata/build/pip/
  - id: download-execute-chain
    desc: Downloads and executes file
    crit: hostile
    conf: 0.92
    mbc: E1204
    attack: T1204.002
    all:
      - id: robust-setup-py
      - id: executable-download
      - id: micro-behaviors/process/create/launch::python-command-exec-any
    near_lines: 120
  - id: pypi-executable-download-command
    desc: PyPI setup downloads executable and commands execution
    crit: hostile
    conf: 0.96
    mbc: E1204
    attack: T1204.002
    all:
      - id: download-execute-chain
      - id: executable-download-url
    any:
      - id: install-run-override
      - id: cmdclass-install
      - id: robust-setup-py
    needs: 1
  - id: pypi-c2-dropper
    desc: PyPI setup.py downloads and executes C2 payload
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1204.002
    all:
      - id: robust-setup-py
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/process/create/subprocess::methods
  - id: pypi-curl-pipe-bash-dropper
    desc: PyPI setup.py pipes curl into shell
    crit: hostile
    conf: 0.98
    mbc: E1204
    attack: T1204.002
    scope: leaf
    all:
      - id: metadata/build/pip::root-setup-py
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-bash
      - id: micro-behaviors/process/create/subprocess::methods
  - id: windows-rename-execute-delete
    desc: Windows file rename-execute-delete dropper chain
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1059.003
    all:
      - id: micro-behaviors/process/create/shell/invoke::cmd-exe
      - id: cmd-move-rename
      - id: cmd-del-cleanup
  - id: pypi-browser-extension-dropper
    desc: PyPI package drops browser extension via shortcut hijack
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1176
    all:
      - id: robust-setup-py
      - id: objectives/execution/autoinstall/pip::main-call-content
      - id: objectives/persistence/login/startup/shortcut::windows-shortcut-argument-injection
      - id: objectives/anti-static/obfuscation/eval/scripting::advanced-python-obfuscation
  - id: pypi-shortcut-hijack-dropper
    desc: PyPI package enumerates and hijacks browser shortcuts
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1176
    all:
      - id: robust-setup-py
      - id: objectives/execution/autoinstall/pip::main-call-content
      - id: objectives/persistence/login/startup/shortcut::windows-shortcut-walk-modify
      - id: micro-behaviors/fs/directory/mkdir::mkdir-python
  - id: pypi-com-extension-dropper
    desc: PyPI setup.py uses COM automation to drop extension
    crit: hostile
    conf: 0.95
    mbc: E1204
    attack: T1176
    all:
      - id: setup-py-win32com-import
      - id: setup-py-getenv
      - id: objectives/persistence/login/startup/shortcut::create-shortcut
  - id: shortcut-target-browser-fingerprint
    desc: Browser fingerprinting via shortcut TargetPath
    crit: suspicious
    conf: 0.9
    attack: T1518
    all:
      - id: micro-behaviors/fs/path/basename::os-path-basename
      - id: objectives/persistence/login/startup/shortcut::shortcut-target-path
    any:
      - id: objectives/persistence/login/startup/shortcut::shortcut-arguments
      - id: objectives/persistence/login/startup/shortcut::create-shortcut
  - id: install-time-gated-execution
    desc: Platform-gated install-time execution in setup.py
    crit: hostile
    conf: 0.9
    mbc: B0024
    all:
      - id: robust-setup-py
      - id: micro-behaviors/os/sysinfo/platform/runtime::sys-platform-check
      - id: micro-behaviors/os/sysinfo/platform/runtime::sys-argv-access
      - id: objectives/execution/autoinstall/pip::main-call-content
    downgrade:
      any:
        - id: metadata/package/quality/profile/
  - id: obfuscated-setup-py-file-dropper
    desc: Obfuscated setup.py writes payload files to disk
    crit: hostile
    conf: 0.95
    mbc: E1204
    all:
      - id: robust-setup-py
      - id: objectives/anti-static/obfuscation/eval/scripting::advanced-python-obfuscation
      - id: micro-behaviors/fs/directory/mkdir::mkdir-python
  - id: pypi-inline-chr-loader
    desc: setup.py inline chr-array exec loader
    crit: hostile
    conf: 0.97
    mbc: B0024
    all:
      - id: robust-setup-py
      - id: inline-chr-loader
    downgrade:
      any:
        - id: metadata/package/testing/
  - id: pypi-powershell-dropper
    desc: PyPI setup.py PowerShell download-execute chain
    crit: hostile
    conf: 0.95
    mbc: E1204
