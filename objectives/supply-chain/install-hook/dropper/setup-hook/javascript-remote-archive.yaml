# Postinstall scripts that fetch an archive over cleartext HTTP, unpack it,
# and start the extracted payload in a detached process.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002,T1105,T1059.007

traits:
  - id: js-cleartext-remote-archive-url
    desc: Cleartext HTTP archive URL
    crit: notable
    conf: 0.95
    attack: T1105
    if:
      type: string_literal
      regex: 'http://[^"''\s]{1,240}(\.zip([/?#]|["''\s]|$)|/install/[^"''\s]*)'
    unless:
      # Static web-page snapshots contain cited archive URLs but do not run
      # package lifecycle code.
      - id: metadata/file/profile/identity::static-html-shell

  - id: js-detached-silent-payload-spawn
    desc: Detached silent payload spawn
    crit: notable
    conf: 0.95
    attack: T1059.007
    if:
      type: text
      regex: 'spawn\s*\([^;\n]{0,280}detached\s*:\s*!\s*0[^;\n]{0,120}stdio\s*:\s*["'']ignore'

composite_rules:
  - id: npm-postinstall-cleartext-archive-dropper
    desc: npm postinstall downloads and launches a cleartext archive payload
    crit: hostile
    conf: 0.99
    scope: archive
    for: [archives]
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
      - id: js-cleartext-remote-archive-url
      - id: micro-behaviors/data/archive/extract/zip::js-archive-extraction-command
      - id: js-detached-silent-payload-spawn
