# npm preinstall-hook droppers that either (a) silently elevate to admin or
# (b) hand off to an obfuscator.io-obfuscated payload. A package whose install
# lifecycle runs a local node script is already unusual; combining that with
# UAC elevation or a heavily-obfuscated sibling payload is hostile — no
# legitimate package needs admin during `npm install`, and legitimate install
# scripts are not run through javascript-obfuscator. Evidence spans package.json
# (the hook) and the sibling scripts (the behavior); `for: [archives]` +
# `scope: archive` evaluates on the package and pools both entries' findings.
defaults:
  platforms: [windows, unix]
  for: [archives]
  attack: T1195.002
composite_rules:
  - id: npm-preinstall-host-profile-query-exfil
    desc: npm hook profiles host and exfiltrates via HTTP
    crit: hostile
    conf: 0.995
    attack: T1195.002,T1041,T1016,T1082
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
      - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
      - id: objectives/supply-chain/recon-exfil/install-hook::js-host-profile-command-sequence
      - id: objectives/supply-chain/recon-exfil/install-hook::js-http-query-exfil

  # The install hook re-launches with admin rights (RunAs) — silently when
  # paired with a hidden window / windowsHide.
  - id: npm-preinstall-silent-elevation
    desc: npm preinstall hook elevates to admin via PowerShell RunAs
    crit: hostile
    conf: 0.96
    mbc: F0015
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
      - id: micro-behaviors/os/privilege/elevation::runas-verb
    any:
      - id: micro-behaviors/process/create/spawn::windowshide-option
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
      - id: micro-behaviors/process/create/start-process::start-process-filepath
  # The install hook hands off to an obfuscator.io-obfuscated sibling payload.
  - id: npm-preinstall-obfuscator-payload
    desc: npm preinstall hook executes an obfuscator.io-obfuscated payload
    crit: hostile
    conf: 0.95
    mbc: B0032
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::strong-js-obfuscation
