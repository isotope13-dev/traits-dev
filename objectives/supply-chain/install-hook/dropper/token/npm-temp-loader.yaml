defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1195.002,T1105,T1059.007"
traits: []
composite_rules:
- id: npm-token-gated-temp-loader
  desc: Token-gated npm temporary script loader
  crit: hostile
  conf: 0.99
  all:
  - id: micro-behaviors/os/env/vars/access::npm-lifecycle-fingerprint-context
  - id: micro-behaviors/communications/http/request/client::fetch-token-query-parameter
  - id: objectives/command-and-control/dropper/delivery/fetch-eval::temporary-javascript-module-loader
