defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1195.002,T1105,T1059.007"
traits:
- id: npm-install-header-fingerprint--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: config_user_agent
  count_max: 1027031
- id: npm-install-header-fingerprint--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Lifecycle-Event
  count_max: 1027032
- id: npm-install-header-fingerprint--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: lifecycle_event
  count_max: 1027033
- id: npm-install-header-fingerprint--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: process.env.npm
  count_max: 1027034
- id: npm-install-header-fingerprint--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: NPM-User-Agent
  count_max: 1027035
- id: npm-install-header-fingerprint--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Package-Name
  count_max: 1027036
- id: npm-install-header-fingerprint--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: package_name
  count_max: 1027037
- id: npm-install-header-fingerprint--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: NPM-Command
  count_max: 1027038
- id: short-lived-token-route-fetch
  desc: Fetches token-gated remote route payload
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'token[\s\S]{0,240}(route|payload|script)[\s\S]{0,240}\?token='
- id: temp-javascript-require-unlink--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: writeFileSync
  count_max: 1027040
- id: temp-javascript-require-unlink--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: unlinkSync
  count_max: 1027041
- id: temp-javascript-require-unlink--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: tempFile
  count_max: 1027042
composite_rules:
- id: npm-token-gated-temp-loader
  desc: Token-gated npm temporary script loader
  crit: hostile
  conf: 0.99
  all:
  - id: npm-install-header-fingerprint
  - id: short-lived-token-route-fetch
  - id: temp-javascript-require-unlink
- id: npm-install-header-fingerprint
  desc: Sends npm lifecycle fingerprint headers
  crit: component
  conf: 0.95
  needs: 2
  any:
  - id: npm-install-header-fingerprint--rx-1
  - id: npm-install-header-fingerprint--rx-2
  - id: npm-install-header-fingerprint--rx-3
  - id: npm-install-header-fingerprint--rx-4
  - id: npm-install-header-fingerprint--rx-5
  - id: npm-install-header-fingerprint--rx-6
  - id: npm-install-header-fingerprint--rx-7
  - id: npm-install-header-fingerprint--rx-8
- id: temp-javascript-require-unlink
  desc: Requires then deletes temp JavaScript
  crit: suspicious
  conf: 0.96
  scope: leaf
  near_bytes: 1000
  all:
  - id: metadata/lang/scripted::require-symbol
  any:
  - id: temp-javascript-require-unlink--rx-9
  - id: temp-javascript-require-unlink--rx-10
  - id: temp-javascript-require-unlink--rx-11
