defaults:
  platforms: [linux, macos, windows, unix]
  attack: T1195.002
  mbc: B0024
traits:
  - id: github-maintainer-enumeration
    desc: Enumerates packages by GitHub maintainer
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: getPackagesByMaintainer
  - id: github-package-update-loop
    desc: Updates packages in maintainer loop
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: text
      substr: updatePackage'](
  - id: cloud-secret-harvest-api
    desc: Harvests cloud secret manager contents
    crit: suspicious
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: listAndRetrieveAllSecrets
  - id: github-savecontents-write
    desc: Saves stolen data through GitHub API
    crit: suspicious
    conf: 0.94
    for: [javascript]
    count_min: 2
    if:
      type: text
      substr: saveContents'](
  - id: postinstall-bg-respawn
    desc: Background postinstall respawn flag
    crit: suspicious
    conf: 0.94
    for: [javascript]
    if:
      type: text
      substr: POSTINSTALL_BG
  - id: home-shred-command
    desc: Shreds writable home files recursively
    crit: suspicious
    conf: 0.98
    for: [javascript]
    if:
      type: text
      substr: xargs\x20-0\x20-r\x20shred\x20-uvz\x20-n\x201
  - id: empty-dir-delete-chain
    desc: Deletes emptied directories after wipe
    crit: suspicious
    conf: 0.96
    for: [javascript]
    if:
      type: text
      substr: -depth\x20-type\x20d\x20-empty\x20-delete
composite_rules:
  - id: cross-cloud-secret-exfil-payload
    desc: Obfuscated payload harvests multi-cloud secrets
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/supply-chain/install-hook/bun-bootstrap::js-megabyte-single-line-payload
      - id: cloud-secret-harvest-api
    any:
      - id: objectives/supply-chain/install-hook/bun-bootstrap::gcp-secretmanager-v1-marker
      - id: github-savecontents-write
      - id: objectives/supply-chain/install-hook/bun-bootstrap::trufflehog-release-marker
  - id: maintainer-takeover-publisher
    desc: Obfuscated payload hijacks maintainer packages
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/supply-chain/install-hook/bun-bootstrap::npm-publish-token-env
      - id: github-maintainer-enumeration
      - id: github-package-update-loop
    any:
      - id: github-savecontents-write
      - id: objectives/supply-chain/install-hook/bun-bootstrap::trufflehog-release-marker
  - id: postinstall-home-wiper
    desc: Postinstall sidecar shreds writable home files
    crit: hostile
    conf: 0.98
    all:
      - id: home-shred-command
      - id: empty-dir-delete-chain
    any:
      - id: postinstall-bg-respawn
      - id: objectives/supply-chain/install-hook/bun-bootstrap::bun-env-sidecar-name
