defaults:
  platforms: [linux, macos, windows]
  for: [shell, batch, text]
  attack: T1059.004

traits:
  - id: git-precommit-hook-path
    desc: Git pre-commit hook path
    crit: component
    conf: 0.9
    if:
      type: path
      regex: '(^|[\\/])?pre-commit$'

  - id: git-postcheckout-hook-path
    desc: Git post-checkout hook path
    crit: component
    conf: 0.9
    if:
      type: path
      regex: '(^|[\\/])?post-checkout$'

  - id: curl-wget-pipe-cmd
    desc: Download piped into cmd
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: '\b(curl|wget)\b[^|\n]{1,220}\|\s*cmd(\.exe)?\b'

  - id: vercel-download-command
    desc: Vercel download command
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\b(curl|wget)\b[^\n]{1,220}vercel\.app'
    # fnm (Fast Node Manager) hosts its official installer at fnm.vercel.app
    not:
      - substr: fnm.vercel.app

  - id: shell-pipe-null-marker
    desc: Shell pipe output suppressed
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '\|\s*(sh|bash|zsh|cmd)\b[^\n]{0,80}>'
    not:
      - substr: get-ghcup.haskell.org
      - substr: rustup.rs
      - substr: astral.sh
      - substr: install.fuel.sh

composite_rules:
  - id: vercel-download-pipe-shell
    desc: Vercel download piped to shell
    crit: suspicious
    conf: 0.88
    all:
      - id: vercel-download-command
    any:
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-sh
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-bash
      - id: objectives/command-and-control/dropper/delivery/pipe::wget-pipe-sh
      - id: curl-wget-pipe-cmd

  - id: download-pipe-null-redirection
    desc: Download pipe shell output suppressed
    crit: component
    conf: 0.84
    all:
      - id: shell-pipe-null-marker
      - id: micro-behaviors/os/console/io::null-redirect-stdout-stderr
    any:
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-sh
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-bash
      - id: objectives/command-and-control/dropper/delivery/pipe::wget-pipe-sh
      - id: curl-wget-pipe-cmd

  - id: git-hook-download-pipe-shell
    desc: Git hook pipes download to shell
    crit: hostile
    conf: 0.96
    all:
      - id: git-precommit-hook-path
    any:
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-sh
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-bash
      - id: objectives/command-and-control/dropper/delivery/pipe::wget-pipe-sh
      - id: curl-wget-pipe-cmd

  - id: git-postcheckout-download-pipe-shell
    desc: Git checkout pipes download shell
    crit: hostile
    conf: 0.97
    all:
      - id: git-postcheckout-hook-path
    any:
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-sh
      - id: objectives/command-and-control/dropper/delivery/pipe::curl-pipe-bash
      - id: objectives/command-and-control/dropper/delivery/pipe::wget-pipe-sh
      - id: curl-wget-pipe-cmd

  - id: git-hook-vercel-download-pipe
    desc: Git hook Vercel shell loader
    crit: hostile
    conf: 0.97
    all:
      - id: vercel-download-pipe-shell
    any:
      - id: git-precommit-hook-path
      - id: git-postcheckout-hook-path

  - id: git-hook-silent-download-pipe
    desc: Git hook suppresses download execution
    crit: hostile
    conf: 0.98
    all:
      - id: download-pipe-null-redirection
    any:
      - id: git-precommit-hook-path
      - id: git-postcheckout-hook-path
