# Obfuscated npm Install Hook Dropper
# Generic detection for supply chain attacks using npm postinstall hooks
# combined with obfuscated payloads — catches the attack class without IOCs.
# Inspired by: axios hijack (plain-crypto-js), netstruct, and similar attacks.
# ATT&CK: T1195.002 (Supply Chain Compromise)
defaults:
  platforms:
  - windows
  - unix
  for:
  - javascript
  - typescript
  attack: T1195.002
  mbc: B0024
traits:
- id: xor-charcode-decode-func
  desc: XOR charCodeAt decode function
  crit: component
  conf: 0.85
  attack: T1027
  if:
    type: text
    regex: "charCodeAt\\s*\\([^)]{0,30}\\)\\s*\\^\\s*[^;]{1,40}"
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/file/magic/identity::macho-32
  - id: metadata/file/magic/identity::macho-64
- id: xor-fromcharcode-rebuild
  desc: XOR fromCharCode string rebuild
  crit: component
  conf: 0.85
  attack: T1027
  if:
    type: text
    regex: "String\\.fromCharCode\\s*\\([^)]{0,60}\\^"
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/file/magic/identity::macho-32
  - id: metadata/file/magic/identity::macho-64
- id: encoded-string-array
  desc: Array of short encoded strings
  crit: component
  conf: 0.8
  attack: T1027
  if:
    type: text
    regex: "(var|let|const)\\s+\\w{1,10}\\s*=\\s*\\[\\s*\"[A-Za-z0-9+/=_]{8,40}\""
- id: modular-key-index
  desc: Modular arithmetic key index
  crit: suspicious
  conf: 0.8
  attack: T1027
  if:
    type: text
    regex: "\\[\\s*\\d+\\s*\\*\\s*\\w+\\s*\\*\\s*\\w+\\s*%\\s*\\d+\\s*\\]"
- id: base64-then-xor-chain
  desc: Base64 decode chained with XOR
  crit: component
  conf: 0.9
  attack: T1027
  for:
  - package.json
  if:
    type: text
    regex: "(atob|Buffer\\.from).{0,80}charCodeAt.{0,40}\\^"
- id: top-level-try-catch-empty
  desc: JavaScript empty catch handler
  crit: component
  conf: 0.7
  for:
  - javascript
  unless:
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/manifest::test-fixtures
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/presence/harness/
  - id: metadata/signed/platform::microsoft-corporation
  if:
    type: text
    regex: "catch\\s*\\(\\w*\\)\\s*\\{\\s*\\}"
composite_rules:
- id: install-hook-charcode-concealed-module
  desc: Install hook loads concealed character-code module
  crit: hostile
  conf: 0.99
  for: [javascript, typescript, package.json, npm]
  scope: archive
  all:
  - id: any-install-lifecycle-hook
  - id: micro-behaviors/process/create/load/local::cjs-caught-local-require
  - id: objectives/anti-static/obfuscation/imports::node-charcode-decoded-require
  - id: top-level-try-catch-empty
- id: xor-string-decode-infra
  desc: XOR string decoding infrastructure in an install hook
  crit: notable
  conf: 0.9
  attack: T1027
  mbc: B0032
  all:
  - id: any-install-lifecycle-hook
  any:
  - id: xor-charcode-decode-func
  - id: xor-fromcharcode-rebuild
  - id: micro-behaviors/crypto/symmetric/xor/loop::js-xor-loop
  - id: micro-behaviors/crypto/symmetric/xor/loop::js-xor-charcode-assignment
  - id: micro-behaviors/crypto/symmetric/xor/loop::xor-modulo-key-loop
  unless:
  - id: metadata/library/structure::dart-flutter-js-bundle
- id: obfuscated-postinstall-dropper
  desc: Obfuscated npm postinstall dropper
  crit: hostile
  conf: 0.95
  for:
  - package.json
  all:
  - id: xor-string-decode-infra
  any:
  - id: encoded-string-array
  - id: base64-then-xor-chain
  - id: modular-key-index
  - id: objectives/anti-static/obfuscation/string/encoding::js-strong-obfuscation
  - id: micro-behaviors/data/encode/xor::js-xor-dynamic-char-at
- id: arithmetic-encoded-dropper
  desc: Arithmetic-decoded payload executed via Function constructor
  # Sibling of obfuscated-postinstall-dropper for the arithmetic/Caesar decoder
  # family (rot-n via charCodeAt + fromCharCode), wired into a dynamic execution
  # sink. Triangle of `encoded array literal + custom decoder + Function/eval`
  # only exists to ship and execute a hidden payload.
  crit: hostile
  conf: 0.96
  attack: T1027
  mbc: B0032
  near_lines: 60
  all:
  - id: encoded-string-array
  - id: micro-behaviors/data/encode/char-code::fromcharcode-call
  - id: objectives/anti-static/obfuscation/encoding/arithmetic::js-rot-n-charcode--rx-4
  any:
  - id: micro-behaviors/process/interpreter/eval::js-function-constructor
  - id: micro-behaviors/process/interpreter/eval::js-new-function-constructor
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  unless:
  - id: metadata/package/testing/
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/tool/detection/llm-scanner/
  - id: metadata/library/structure/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
- id: self-cleaning-dropper
  desc: Self-cleaning obfuscated dropper
  crit: hostile
  conf: 0.95
  attack: T1070.004
  all:
  - id: xor-string-decode-infra
  any:
  - id: objectives/evasion/self-delete/file/script::node-self-delete
  - id: objectives/evasion/self-delete/file/script::manifest-swap
- id: obfuscated-postinstall-cmd-exe
  desc: Obfuscated postinstall references cmd exe
  crit: suspicious
  conf: 0.93
  all:
  - id: metadata/package/files/included::postinstall-js-basename
  - id: micro-behaviors/process/create/shell/spawn::cmd-name
  - id: micro-behaviors/fs/path/extension::exe-dup
  any:
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-variable-names
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-function-names
  - id: metadata/lang/javascript-features::js-obfuscator-while-loop
  needs: 2
- id: npm-hidden-exec-embed-dropper
  desc: Obfuscated npm postinstall cmd exe dropper
  crit: hostile
  conf: 0.98
  all:
  - id: obfuscated-postinstall-cmd-exe
  - id: micro-behaviors/communications/http/post::post
  any:
  - id: objectives/supply-chain/install-hook/dropper/obfuscation::top-level-try-catch-empty
  - id: objectives/supply-chain/trojanized/library/framework::two-suspicious-requires
- id: npm-obfuscated-hidden-shell-dropper
  desc: Obfuscated npm postinstall hidden shell dropper
  crit: hostile
  conf: 0.98
  all:
  - id: obfuscated-postinstall-cmd-exe
  - id: micro-behaviors/process/create/shell/bridge::js-execsync-destructure
  - id: micro-behaviors/process/create/spawn::shell-obfuscated-dynamic
  - id: micro-behaviors/process/create/spawn::windowshide-obfuscated-true
  - id: micro-behaviors/communications/http/post::post
# Shai-Hulud shape: a package whose install hook executes a local Node script,
# and that script is a bundled, obfuscated eval-dropper (single megabyte line +
# Caesar/char-code self-decoder feeding eval). The two halves live in different
# archive entries (package.json + index.js), so this is archive-scoped — the
# per-file obfuscated-dropper composites above cannot bridge them, and the
# megabyte minified blob is otherwise suppressed by js-large-minified-bundle.
# What makes a megabyte obfuscated eval blob hostile is that npm runs it on
# install: no legitimate build step ships a Caesar-ciphered eval payload as its
# preinstall target.
- id: preinstall-obfuscated-bundle-dropper
  desc: Preinstall executes obfuscated bundled eval dropper
  crit: hostile
  conf: 0.97
  for: [javascript, typescript, package.json, archives]
  scope: archive
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
  - id: objectives/supply-chain/hidden-payload/eval::eval-of-transform
  any:
  - id: objectives/anti-static/obfuscation/code-metrics/line-shape::js-megabyte-single-line
  - id: objectives/supply-chain/hidden-payload/trojan::single-line-packed-loader-metrics
  - id: micro-behaviors/data/encode/charcode::charcodeat-arithmetic
  - id: micro-behaviors/data/decode/custom::fromcharcode-map-array
  needs: 1
# obfuscator.io-packed install hook. A package whose install lifecycle runs a
# bundled script, and that script is obfuscator.io output (string-array
# rotation + decoder dispatch, hex/dollar name mangling). Unlike the eval- and
# XOR-decoder droppers above, this family hides ALL of its behavior — including
# the require()/spawn/child_process/URL strings — inside the base64 string
# table (`require(a0_0x45c122(0x159))`), so no behavioral atom (shell-exec,
# http, tmpfile) can see it. The two halves live in different archive entries
# (package.json declares the hook; the obfuscated body is the target .js), so
# this is archive-scoped. obfuscator.io packing is already standalone-hostile;
# pairing it with an install hook only raises precision — no maintained library
# ships an obfuscator.io-packed install script as its published artifact.
- id: any-install-lifecycle-hook
  desc: Package declares an install lifecycle hook
  crit: component
  for: [package.json, archives]
  any:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-install
- id: install-hook-obfuscator-io-dropper
  desc: Install hook runs obfuscator.io-packed script
  crit: hostile
  conf: 0.97
  for: [javascript, typescript, package.json, archives]
  scope: archive
  all:
  - id: any-install-lifecycle-hook
  any:
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::advanced-array-shuffling
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::strong-js-obfuscation
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::obfuscated-eval-npm-trojan
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
