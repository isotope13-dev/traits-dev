# Obfuscated npm Install Hook Dropper
# Generic detection for supply chain attacks using npm postinstall hooks
# combined with obfuscated payloads — catches the attack class without IOCs.
# Inspired by: axios hijack (plain-crypto-js), netstruct, and similar attacks.
# ATT&CK: T1195.002 (Supply Chain Compromise)
defaults:
  platforms:
    - windows
    - unix
  for:
    - javascript
    - typescript
  attack: T1195.002
  mbc: B0024
traits:
  - id: xor-charcode-decode-func
    desc: XOR charCodeAt decode function
    crit: notable
    conf: 0.85
    attack: T1027
    if:
      type: text
      regex: "charCodeAt\\s*\\([^)]{0,30}\\)\\s*\\^\\s*[^;]{1,40}"
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/file/magic::macho-32
      - id: metadata/file/magic::macho-64
  - id: xor-fromcharcode-rebuild
    desc: XOR fromCharCode string rebuild
    crit: notable
    conf: 0.85
    attack: T1027
    if:
      type: text
      regex: "String\\.fromCharCode\\s*\\([^)]{0,60}\\^"
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/file/magic::macho-32
      - id: metadata/file/magic::macho-64
  - id: encoded-string-array
    desc: Array of short encoded strings
    crit: notable
    conf: 0.8
    attack: T1027
    if:
      type: text
      regex: "(var|let|const)\\s+\\w{1,10}\\s*=\\s*\\[\\s*\"[A-Za-z0-9+/=_]{4,40}\""
  - id: modular-key-index
    desc: Modular arithmetic key index
    crit: notable
    conf: 0.8
    attack: T1027
    if:
      type: text
      regex: "\\[\\s*\\d+\\s*\\*\\s*\\w+\\s*\\*\\s*\\w+\\s*%\\s*\\d+\\s*\\]"
  - id: base64-then-xor-chain
    desc: Base64 decode chained with XOR
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: "(atob|Buffer\\.from).{0,80}charCodeAt.{0,40}\\^"
  - id: top-level-try-catch-empty
    desc: Top-level try/catch empty handler
    crit: notable
    conf: 0.7
    for:
      - javascript
    unless:
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
    if:
      type: text
      regex: "catch\\s*\\(\\w*\\)\\s*\\{\\s*\\}"
composite_rules:
  - id: xor-string-decode-infra
    desc: XOR string decoding infrastructure
    crit: suspicious
    conf: 0.9
    attack: T1027
    mbc: B0032
    any:
      - id: xor-charcode-decode-func
      - id: xor-fromcharcode-rebuild
      - id: micro-behaviors/crypto/symmetric/xor/loop::js-xor-loop
      - id: micro-behaviors/crypto/symmetric/xor/loop::js-xor-charcode-assignment
      - id: micro-behaviors/data/encode/xor::js-xor-cyclic-pattern
  - id: obfuscated-postinstall-dropper
    desc: Obfuscated npm postinstall dropper
    crit: hostile
    conf: 0.95
    for:
      - package.json
    all:
      - id: xor-string-decode-infra
    any:
      - id: encoded-string-array
      - id: base64-then-xor-chain
      - id: modular-key-index
      - id: objectives/anti-static/obfuscation/string/encoding::js-strong-obfuscation
      - id: micro-behaviors/data/encode/xor::js-xor-dynamic-char-at
  - id: self-cleaning-dropper
    desc: Self-cleaning obfuscated dropper
    crit: hostile
    conf: 0.95
    attack: T1070.004
    all:
      - id: xor-string-decode-infra
    any:
      - id: objectives/evasion/self-delete/file::node-self-delete
      - id: objectives/evasion/self-delete/file::manifest-swap
