composite_rules:
  - id: npm-install-curl-nohup-dropper
    criticality: hostile
    desc: "A npm package that uses an install hook to download and execute a payload"
    platforms: [linux, macos]
    for: [javascript, "package.json"]
    all:
      - id: objectives/supply-chain/install-hook/scripts::has-preinstall
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
      - id: micro-behaviors/process/daemonize::nohup-command
