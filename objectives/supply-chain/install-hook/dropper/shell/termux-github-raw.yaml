defaults:
  platforms: [android, unix]
  for: [shell]
  attack: T1105
  mbc: B0030
traits:
- id: termux-install-sh-name
  desc: Termux install shell script
  crit: component
  conf: 0.85
  if:
    type: basename
    exact: "install.sh"
- id: termux-raw-github-base-url
  desc: Termux GitHub raw base URL
  crit: component
  conf: 0.95
  if:
    type: text
    substr: 'BASE_URL="https://raw.githubusercontent.com/'
- id: termux-curl-bin-output
  desc: curl downloads Termux bin payload
  crit: component
  conf: 0.98
  if:
    type: text
    substr: 'curl -fsSL "$BASE_URL/$cmd" -o "$BIN_DIR/$cmd"'
- id: termux-chmod-bin-payload
  desc: chmod makes Termux payload executable
  crit: component
  conf: 0.98
  if:
    type: text
    substr: 'chmod +x "$BIN_DIR/$cmd"'
- id: termux-curl-library-output
  desc: curl downloads Termux shared library
  crit: component
  conf: 0.95
  if:
    type: text
    substr: "curl -fsSL $BASE_URL/$so -o $SODIR/$so"
- id: termux-lfs-tool-list
  desc: Termux LFS utility payload list
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "lfsls lfsrm lfsdu lfsmkdir lfstouch"
- id: termux-short-tool-list
  desc: Termux short utility payload list
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'FILES="c cdt exe! lock ns r su tc tct x'
composite_rules:
- id: termux-github-raw-bin-dropper
  desc: Termux installer downloads GitHub raw executables
  crit: hostile
  conf: 0.98
  all:
  - id: termux-install-sh-name
  - id: termux-raw-github-base-url
  - id: termux-curl-bin-output
  - id: termux-chmod-bin-payload
  - id: micro-behaviors/fs/path/application/prefix
  - id: termux-short-tool-list
  any:
  - id: termux-lfs-tool-list
  - id: objectives/command-and-control/channel/deaddrop/github::raw-githubusercontent-any
  - id: micro-behaviors/communications/http/download/curl::curl-silent
- id: termux-github-raw-library-dropper
  desc: Termux installer downloads GitHub raw library
  crit: suspicious
  conf: 0.94
  all:
  - id: termux-install-sh-name
  - id: termux-raw-github-base-url
  - id: termux-curl-library-output
  - id: micro-behaviors/fs/path/application/prefix
