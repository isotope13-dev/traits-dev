defaults:
  platforms: [unix]
  for: [shell]
  attack: T1195.002

traits:
  - id: hermit-dist-url-variable
    desc: Hermit distribution URL variable
    crit: suspicious
    conf: 0.94
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    if:
      type: text
      substr: 'HERMIT_DIST_URL'
  - id: hermit-install-hash-script
    desc: Hermit hash-pinned install script
    crit: suspicious
    conf: 0.95
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    if:
      type: text
      substr: 'install-${INSTALL_SCRIPT_SHA256}.sh'
  - id: hermit-exe-tail-exec
    desc: Hermit executable tail exec
    crit: suspicious
    conf: 0.95
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    if:
      type: text
      substr: 'exec "${HERMIT_EXE}"'

composite_rules:
  - id: hermit-bootstrap-download-exec
    desc: Hermit bootstrap downloads then execs
    crit: suspicious
    conf: 0.96
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    all:
      - id: hermit-dist-url-variable
      - id: hermit-install-hash-script
      - id: hermit-exe-tail-exec
  - id: hermit-github-bootstrap-exec
    desc: Hermit GitHub bootstrap exec
    crit: suspicious
    conf: 0.94
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    all:
      - id: hermit-bootstrap-download-exec
      - id: micro-behaviors/communications/url/external/github::github-release-download
  - id: mixedcase-archive-bootstrap-member
    desc: Case-variant archive carries bootstrapper
    crit: hostile
    conf: 0.94
    ref: sha256:8b2c4bd9fc25f8e5a22479d4220da36adb1840f8ad61a537e8793862b841a687
    for: [zip]
    scope: archive
    all:
      - id: metadata/package/quality/source::github-versioned-go-mod-member
      - id: metadata/package/quality/source::github-versioned-hermit-bootstrap-member
    any:
      - id: metadata/package/quality/source::github-versioned-uppercase-namespace-member
      - id: metadata/package/quality/source::github-versioned-uppercase-repo-member
