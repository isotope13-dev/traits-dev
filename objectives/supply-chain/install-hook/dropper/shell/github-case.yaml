defaults:
  platforms: [unix]
  for: [shell]
  attack: T1195.002

traits:
  - id: hermit-dist-url-variable
    desc: Hermit distribution URL variable
    crit: suspicious
    conf: 0.94
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    if:
      type: text
      substr: 'HERMIT_DIST_URL'
  - id: hermit-install-hash-script
    desc: Hermit hash-pinned install script
    crit: suspicious
    conf: 0.95
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    if:
      type: text
      substr: 'install-${INSTALL_SCRIPT_SHA256}.sh'
  - id: hermit-exe-tail-exec
    desc: Hermit executable tail exec
    crit: suspicious
    conf: 0.95
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    if:
      type: text
      substr: 'exec "${HERMIT_EXE}"'
  - id: tbd54566975-case-variant-hermit-path
    desc: Case-variant Hermit bootstrap path
    crit: suspicious
    conf: 0.99
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    if:
      type: path
      regex: 'ftl@v[0-9][0-9A-Za-z_.-]+[\\/]bin[\\/]hermit$'

composite_rules:
  - id: hermit-bootstrap-download-exec
    desc: Hermit bootstrap downloads then execs
    crit: suspicious
    conf: 0.96
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    all:
      - id: hermit-dist-url-variable
      - id: hermit-install-hash-script
      - id: hermit-exe-tail-exec
  - id: case-variant-source-bootstrap-exec
    desc: Case-variant source archive bootstrap exec
    crit: hostile
    conf: 0.99
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    all:
      - id: hermit-bootstrap-download-exec
      - id: tbd54566975-case-variant-hermit-path
      - id: micro-behaviors/communications/url/external/github::github-release-download
  - id: case-variant-archive-bootstrap-member
    desc: Case-variant archive carries bootstrapper
    crit: hostile
    conf: 0.99
    ref: sha256:357466d8e6ab80e6662140a860223018dcbf14b3712e1c9999184e08f11aaf1f
    for: [zip]
    scope: archive
    all:
      - id: metadata/package/quality/source::tbd54566975-case-variant-archive-member
      - id: metadata/package/quality/source::tbd54566975-case-variant-bootstrap-member
