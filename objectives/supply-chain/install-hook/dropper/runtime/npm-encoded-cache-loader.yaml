# An encoded downloader that is executed by npm's lifecycle hook is an
# install-time supply-chain dropper.  The delivery composite is intentionally
# separate so the same loader shape remains useful outside npm archives.
defaults:
  platforms: [unix, windows]
  for: [javascript, package.json, npm]
  attack: T1195.002,T1027,T1059.007,T1105

composite_rules:
  - id: npm-postinstall-encoded-cache-loader
    desc: npm postinstall runs encoded cache downloader
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: objectives/command-and-control/dropper/delivery/download-execute::node-encoded-cache-download-loader
