defaults:
  platforms: [unix, windows]
  attack: T1195.002

traits:
  - id: npm-audit-cache-path
    desc: npm audit cache path
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: text
      substr: audit-cache
  - id: node-main-preinstall-chain
    desc: preinstall chains npm install to node main
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: value
      path: scripts.preinstall
      regex: '\bnpm\s+(install|i|add)\b.{0,80}\bnode\s+(\./)?main\.js\b'
  - id: npm-global-install-array
    desc: npm global install array
    crit: notable
    conf: 0.88
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']npm["'']\s*,\s*["'']install["'']\s*,\s*["'']-g["'']'
  - id: rtcli-keyed-api-config
    desc: rtcli keyed API config
    crit: suspicious
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '["'']setup["'']\s*,\s*["'']--api-base["''][\s\S]{0,160}["'']--download-key["'']'
  - id: exported-child-process-exec
    desc: JavaScript exports child_process exec helper
    crit: component
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'exports\.[A-Za-z_$][\w$]*\s*=\s*child_process_\d+\.default\.exec\b'
  - id: rtcli-hidden-start-process
    desc: hidden rtcli Start-Process
    crit: suspicious
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)Start-Process\s+-FilePath\s+.{0,80}rtcli\.cmd'
  - id: rtcli-nohup-background
    desc: nohup rtcli background launch
    crit: suspicious
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: 'nohup\s+rtcli[^\r\n]{0,80}2>&1\s+&'

composite_rules:
  - id: npm-audit-cache-ip-php-stage
    desc: Node writes external IP PHP response to npm cache
    crit: hostile
    conf: 0.98
    for: [javascript]
    all:
      - id: objectives/command-and-control/infrastructure/ip-url-php::external-ip-php-endpoint
      - id: objectives/evasion/security-bypass/tls::node-tls-reject-disabled
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
      - id: npm-audit-cache-path
  - id: npm-preinstall-external-ip-php-stage
    desc: npm preinstall stages external IP PHP response
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: node-main-preinstall-chain
      - id: objectives/command-and-control/infrastructure/ip-url-php::external-ip-php-endpoint
      - id: npm-audit-cache-ip-php-stage
  - id: hidden-rtcli-background-launch
    desc: hidden rtcli background launch
    crit: suspicious
    conf: 0.96
    any:
      - id: rtcli-hidden-start-process
      - id: rtcli-nohup-background
  - id: keyed-rtcli-global-install-loader
    desc: npm package installs and launches keyed rtcli loader
    crit: hostile
    conf: 0.985
    for: [javascript, typescript, archives]
    scope: archive
    attack: "T1195.002,T1059.007,T1105"
    mbc: "B0024"
    all:
      - id: npm-global-install-array
      - id: rtcli-keyed-api-config
      - id: hidden-rtcli-background-launch
      - id: exported-child-process-exec
