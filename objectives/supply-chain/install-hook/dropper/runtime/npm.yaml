defaults:
  platforms: [unix, windows]
  attack: T1195.002

traits:
  - id: npm-audit-cache-path
    desc: npm audit cache path
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: text
      substr: audit-cache
  - id: node-main-preinstall-chain
    desc: preinstall chains npm install to node main
    crit: suspicious
    conf: 0.95
    for: [package.json]
    if:
      type: kv
      path: scripts.preinstall
      regex: '\bnpm\s+(install|i|add)\b.{0,80}\bnode\s+(\./)?main\.js\b'

composite_rules:
  - id: npm-audit-cache-ip-php-stage
    desc: Node writes external IP PHP response to npm cache
    crit: hostile
    conf: 0.98
    for: [javascript]
    all:
      - id: objectives/command-and-control/infrastructure/ip-url-php::external-ip-php-endpoint
      - id: objectives/evasion/security-bypass/tls::node-tls-reject-disabled
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
      - id: npm-audit-cache-path
  - id: npm-preinstall-external-ip-php-stage
    desc: npm preinstall stages external IP PHP response
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: node-main-preinstall-chain
      - id: objectives/command-and-control/infrastructure/ip-url-php::external-ip-php-endpoint
      - id: npm-audit-cache-ip-php-stage
