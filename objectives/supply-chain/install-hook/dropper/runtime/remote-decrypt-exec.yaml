# An npm lifecycle hook that decrypts a remotely supplied value and executes it
# is an install-time command loader.  The behavior atoms remain neutral; this
# rule supplies the install-hook context and attack interpretation.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, npm]
  attack: T1195.002,T1105,T1059.007,T1027.013
  mbc: B0024,B0032

composite_rules:
  - id: npm-postinstall-remote-decrypt-shell-loader
    desc: npm postinstall decrypts and executes remote command data
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::remote-decrypt-shell-execution
