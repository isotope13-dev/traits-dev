defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  attack: T1059.006
  crit: suspicious
traits:
  - id: hub-sdk-string
    desc: hub-sdk string reference
    conf: 0.8
    if:
      type: string_literal
      substr: hub-sdk
    unless:
      - id: well-known/lib/ultralytics::official-source-header
composite_rules:
  - id: runtime-pip-install-hub
    desc: Runtime installation of hub-sdk
    conf: 0.9
    all:
      - id: objectives/execution/autoinstall/pip::check-requirements-call
      - id: hub-sdk-string
    unless:
      - id: well-known/lib/ultralytics::official-source-header
