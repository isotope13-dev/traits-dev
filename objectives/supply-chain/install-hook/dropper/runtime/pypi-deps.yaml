defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  attack: T1059.006
  crit: suspicious
traits:
  - id: hub-sdk-requirements-check
    desc: Checks for hub-sdk at runtime
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: check_requirements
      arg:
        kind: string
        substr: hub-sdk
    unless:
      - id: well-known/lib/ultralytics::official-source-header
composite_rules:
  - id: runtime-hub-sdk-dependency-check
    desc: Runtime hub-sdk dependency check
    conf: 0.9
    all:
      - id: micro-behaviors/os/package-manager/install::requirements-check-call
      - id: hub-sdk-requirements-check
    unless:
      - id: well-known/lib/ultralytics::official-source-header
