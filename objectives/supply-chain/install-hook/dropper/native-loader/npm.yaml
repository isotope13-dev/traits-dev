defaults:
  platforms: [unix, windows]
  for: [archives]
  attack: T1195.002

composite_rules:
  - id: npm-throwaway-native-loader-stub
    desc: Tiny throwaway npm native-loader install stub
    crit: hostile
    conf: 0.9
    scope: archive
    size_max: 16384
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
      - id: metadata/package/fields/dependencies::platform-optional-native-wrapper
      - id: objectives/supply-chain/metadata-anomaly/versioning::release-zero
    unless:
      - id: metadata/package/fields/repository::has-repository-evidence
      - id: metadata/package/fields/private::is-private
      - id: metadata/package/testing/presence/fixture::npm-fixture-package-name
