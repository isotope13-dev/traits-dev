defaults:
  platforms: [unix, windows]
  for: [archives]
  attack: T1195.002

traits:
  # A postinstall script that imports a platform bootstrapper and then relinks
  # the CLI/native assets is the visible install-time loader stage. The
  # behavior is intentionally split into atomic source observations so the
  # composite below requires the lifecycle hook as well as both loader actions.
  - id: postinstall-platform-bootstrap-reference
    desc: Imports and invokes platform binary bootstrapper
    crit: notable
    conf: 0.94
    for: [javascript]
    if:
      type: text
      regex: '(?is)\bplatform-bootstrap\.mjs\b[\s\S]{0,320}\bensure(Platform|Native)Binary\b'
  # An npm lifecycle hook whose command is a single bare relative/absolute path
  # with no interpreter and no script extension is directly executing a
  # committed file as a program — i.e. a bundled native binary. Legitimate hooks
  # invoke an interpreter (`node x.js`, `bash x.sh`), a tool (`husky`,
  # `node-gyp rebuild`, `prebuild-install`), or a `.bin` shim — none of which
  # match a bare `./src/hooks/deps`-style path. The `not:` list drops script
  # targets and `.bin` shims so only direct-executable hooks remain.
  - id: preinstall-runs-bundled-executable
    desc: Executes bundled payload from preinstall
    crit: suspicious
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: scripts.preinstall
      regex: '^\s*\.{0,2}/[\w.-]+(/[\w.-]+)*\s*$'
    not:
      - regex: '\.(c?js|mjs|ts|tsx|sh|bash|py|rb|ps1|cmd|bat|exe|dll)$'
      - substr: 'node_modules/.bin'
    unless:
      - type: value
        path: scripts.preinstall
        substr: 'node_modules/.bin/'
  - id: install-runs-bundled-executable
    desc: install hook directly executes a bundled file
    crit: suspicious
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: scripts.install
      regex: '^\s*\.{0,2}/[\w.-]+(/[\w.-]+)*\s*$'
    not:
      - regex: '\.(c?js|mjs|ts|tsx|sh|bash|py|rb|ps1|cmd|bat|exe|dll)$'
      - substr: 'node_modules/.bin'
    unless:
      - type: value
        path: scripts.install
        substr: 'node_modules/.bin/'
  - id: postinstall-runs-bundled-executable
    desc: "postinstall hook directly executes a bundled"
    crit: suspicious
    conf: 0.85
    for: [package.json]
    if:
      type: value
      path: scripts.postinstall
      regex: '^\s*\.{0,2}/[\w.-]+(/[\w.-]+)*\s*$'
    not:
      - regex: '\.(c?js|mjs|ts|tsx|sh|bash|py|rb|ps1|cmd|bat|exe|dll)$'
      - substr: 'node_modules/.bin'
    unless:
      - type: value
        path: scripts.postinstall
        substr: 'node_modules/.bin/'

composite_rules:
  - id: npm-install-bundled-native-binary
    # The supply-chain dropper shape behind the AUR/ALVR `atomic-lockfile`
    # attack: a package whose install hook directly runs a relative path AND
    # ships a native ELF/Mach-O/PE binary. A JS library has no reason to execute
    # a committed machine-code binary at install time — this is a native payload
    # disguised as a build/dependency step. `metadata/binary/` fires only on real
    # compiled members, never on JS/JSON/manifests.
    desc: npm install hook executes a bundled native binary
    crit: hostile
    conf: 0.95
    scope: archive
    all:
      # The archive itself is a binary container, so a directory reference to
      # metadata/binary/ would match every ZIP/WHL/CRX. Require the archive
      # fact that a member was actually classified as executable.
      - id: metadata/file/metrics::archive-contains-executable-member
    any:
      - id: preinstall-runs-bundled-executable
      - id: install-runs-bundled-executable
      - id: postinstall-runs-bundled-executable

  - id: npm-install-hook-native-credential-stealer
    # A package that runs an install-time hook AND ships a native binary that
    # harvests credentials from many apps (browsers, Discord, Telegram, SSH,
    # shells) is a trojanized supply-chain stealer — the lifecycle hook
    # auto-detonates the bundled stealer on every `npm install`.
    desc: npm install hook detonates a bundled native credential stealer
    crit: hostile
    conf: 0.97
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    any:
      - id: objectives/credential-access/theft/multi-app::multi-app-credential-stealer
      - id: objectives/credential-access/discord/token::native-discord-token-grabber

  - id: npm-install-hook-native-rootkit
    # A package that runs an install-time hook AND ships an eBPF directory- or
    # connection-hiding rootkit installs a kernel-level implant the moment the
    # package is installed — there is no benign reason for a JS package to carry
    # a getdents/connection-hiding eBPF rootkit.
    desc: npm install hook deploys a bundled eBPF hiding rootkit
    crit: hostile
    conf: 0.98
    scope: archive
    attack: T1014
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    any:
      - id: objectives/evasion/kernel-hide/ebpf::getdents-offset-rewrite-hide-rootkit
      - id: objectives/evasion/kernel-hide/ebpf::ebpf-connection-hide-rootkit

  - id: npm-install-hook-tor-c2-implant
    # A package that runs an install-time hook AND ships a binary that pulls down
    # the Tor Expert Bundle to anonymize its C2/exfil is an install-triggered
    # onion-routed implant.
    desc: npm install hook deploys a bundled Tor-anonymized implant
    crit: hostile
    conf: 0.97
    scope: archive
    attack: T1090.003
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    any:
      - id: objectives/command-and-control/channel/tor/bundle::credential-stealer-tor-exfil
      - id: objectives/command-and-control/channel/tor/bundle::tor-expert-bundle

  - id: npm-postinstall-downloads-and-hides-native-payload
    desc: npm postinstall downloads and hides a native payload
    crit: hostile
    conf: 0.97
    scope: archive
    attack: "T1195.002,T1105,T1564.003"
    mbc: "B0024,F0011"
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: objectives/command-and-control/dropper/execution/native-binary::node-fetch-chmod-exec-stealth-dropper

  - id: npm-throwaway-native-loader-stub
    desc: Tiny throwaway npm native-loader install stub
    crit: hostile
    conf: 0.9
    scope: archive
    size_max: 16384
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
      - id: metadata/package/dependencies::platform-optional-native-wrapper
      - id: metadata/package/versioning::release-zero
    unless:
      - id: metadata/package/manifest/repository/
      - id: metadata/package/manifest/publishing::is-private
      - id: metadata/package/testing/presence/fixture/

  - id: npm-postinstall-platform-binary-bootstrap
    desc: npm postinstall invokes a platform binary bootstrap and relinks CLI assets
    crit: hostile
    conf: 0.96
    scope: archive
    attack: "T1195.002,T1105"
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: postinstall-platform-bootstrap-reference
      - id: micro-behaviors/fs/link/symlink::node-symlink-sync
    unless:
      - id: metadata/package/manifest/repository/
      - id: metadata/package/testing/presence/fixture/

  # A sparse npm manifest that runs this loader has no ordinary library body to
  # audit: install-time bootstrap is its substantive behavior. Keep this
  # provenance-plus-behavior finding separate from the link-refresh finding so
  # minimal repacked releases remain visible.
  - id: npm-sparse-platform-bootstrap-loader
    desc: Sparse npm package uses install-time platform bootstrap
    crit: hostile
    conf: 0.95
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: postinstall-platform-bootstrap-reference
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
    unless:
      - id: metadata/package/manifest/repository/
      - id: metadata/package/testing/presence/fixture/

  # Require the complete delivery chain, not merely a lifecycle hook and a
  # helper name: an install-time script contacts an external raw-IP endpoint
  # with certificate verification disabled, extracts the response as a tar
  # archive, and makes the extracted file executable. This is the reusable
  # behavior chain behind the Onecode incident, independent of its IP or
  # package name.
  - id: npm-postinstall-insecure-tar-native-loader
    desc: npm postinstall installs an unverified native tar payload
    crit: hostile
    conf: 0.99
    scope: archive
    attack: "T1195.002,T1105,T1027"
    mbc: "B0024,F0011"
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: micro-behaviors/communications/http/request/client::https-get
      - id: objectives/evasion/security-bypass/tls::reject-unauthorized-false-generic
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
      - id: micro-behaviors/data/archive/extract/tar::tar-extract
      - id: micro-behaviors/fs/chmod/executable/mode::node-chmod-exec-mode-755
