defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002

traits:
  - id: curl-pipe-shell
    desc: postinstall pipes curl output to shell
    crit: suspicious
    conf: 0.96
    attack: T1105
    if:
      type: value
      path: scripts.postinstall
      regex: "\\bcurl\\b[^\"\\n]{0,120}\\|\\s*(sh|bash)\\b"
  - id: wget-pipe-shell
    desc: postinstall pipes wget output to shell
    crit: suspicious
    conf: 0.96
    attack: T1105
    if:
      type: value
      path: scripts.postinstall
      regex: "\\bwget\\b[^\"\\n]{0,120}\\|\\s*(sh|bash)\\b"
  - id: curl-pipe-node
    desc: postinstall pipes curl output to Node
    crit: suspicious
    conf: 0.95
    attack: T1105
    if:
      type: value
      path: scripts.postinstall
      regex: "\\bcurl\\b[^\"\\n]{0,120}\\|\\s*node\\b"
  - id: wget-pipe-node
    desc: postinstall pipes wget output to Node
    crit: suspicious
    conf: 0.95
    attack: T1105
    if:
      type: value
      path: scripts.postinstall
      regex: "\\bwget\\b[^\"\\n]{0,120}\\|\\s*node\\b"
  - id: inline-node-network
    desc: postinstall runs inline Node network code
    crit: suspicious
    conf: 0.96
    if:
      type: value
      path: scripts.postinstall
      regex: "\\bnode\\s+-e\\b[^\"\\n]{0,180}https?://"
  - id: network-command-substitution
    desc: postinstall sends command output to network endpoint
    crit: suspicious
    conf: 0.97
    attack: T1041
    if:
      type: value
      path: scripts.postinstall
      regex: "https?://[^\"'\\s]{0,180}\\$\\("
  - id: postinstall-download-tool
    desc: postinstall invokes curl or wget
    crit: component
    conf: 0.85
    if:
      type: value
      path: scripts.postinstall
      regex: "\\b(curl|wget)\\b"
  # An install-time hook that runs on the consumer's machine sending an HTTP
  # POST (explicit -X POST / --request POST, or a data-bearing -d/--data flag)
  # is the recon-exfil shape — install hooks legitimately download, but rarely
  # need to push a body outward. Author-side hooks (postpublish/prepublishOnly)
  # never reach this file, so a benign Netlify build-hook trigger is unaffected.
  - id: curl-http-post
    desc: postinstall sends HTTP POST via curl
    crit: suspicious
    conf: 0.8
    attack: T1041
    if:
      type: value
      path: scripts.postinstall
      regex: "\\bcurl\\b[^\"\\n]{0,200}((-X\\s*|--request\\s+)POST|--data[\\w-]*|\\s-d\\b)"
  - id: eval-word
    desc: postinstall invokes eval
    crit: suspicious
    conf: 0.92
    attack: T1027
    if:
      type: value
      path: scripts.postinstall
      regex: "\\beval\\b"
  - id: base64-decode
    desc: postinstall decodes base64
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: value
      path: scripts.postinstall
      regex: "\\bbase64\\s+(-d|--decode)\\b"
  - id: atob-decode
    desc: postinstall uses atob decode
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: value
      path: scripts.postinstall
      substr: atob
  - id: buffer-from
    desc: postinstall uses Buffer.from
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: value
      path: scripts.postinstall
      substr: Buffer.from
  - id: temp-path
    desc: postinstall references temp path
    crit: suspicious
    conf: 0.9
    attack: T1564
    if:
      type: value
      path: scripts.postinstall
      regex: "(/tmp/|\\$TMPDIR|%TEMP%)"
  - id: hidden-dot-path
    desc: postinstall references hidden dot path
    crit: suspicious
    conf: 0.9
    attack: T1564
    if:
      type: value
      path: scripts.postinstall
      regex: "(^|[\\s;&])~?/\\."

composite_rules:
  # A postinstall hook whose fetched URL embeds a shell command substitution
  # (`curl https://…$(…)`) is conclusively exfil — no legitimate installer
  # interpolates command output into a URL. Mirrors the preinstall
  # `install-script-exfil` (all: network-exfil + download-tool) so it emits.
  - id: postinstall-network-exfil
    desc: postinstall exfiltrates command output to network endpoint
    crit: hostile
    conf: 0.97
    attack: T1041
    all:
      - id: network-command-substitution
      - id: postinstall-download-tool
  - id: download-execute
    desc: postinstall downloads and executes a script
    crit: suspicious
    conf: 0.97
    attack: T1105
    any:
      - id: curl-pipe-shell
      - id: wget-pipe-shell
      - id: curl-pipe-node
      - id: wget-pipe-node
  - id: shell-obfuscation
    desc: postinstall uses shell obfuscation or inline evaluation
    crit: suspicious
    conf: 0.93
    attack: T1027
    any:
      - id: eval-word
      - id: base64-decode
      - id: atob-decode
      - id: buffer-from
  - id: hidden-temp-path
    desc: postinstall stages hidden or temporary path
    crit: suspicious
    conf: 0.9
    attack: T1564
    any:
      - id: temp-path
      - id: hidden-dot-path
