# npm Lifecycle Hook Script Detection
# Detects JavaScript files that serve as npm lifecycle hooks (preinstall.js, postinstall.js)
# and exhibit supply-chain dropper behavior
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  platforms: [unix, windows]
  for: [javascript]
  attack: "T1195.002"
traits:
  # === Hook Script Filename Detection ===
- id: init-js-filename
  desc: File named init.js
  crit: component
  conf: 0.75
  if:
    type: basename
    exact: "init.js"
  # === Cross-platform script execution indicators ===
- id: shell-script-ref
  desc: References shell script file (.sh)
  crit: component
  conf: 0.7
  for: [javascript, typescript]
  unless:
  - id: metadata/library/structure::vscode-icon-theme-catalog
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_./-])[A-Za-z0-9_./-]+\\.sh([\"' ),]|$)"
- id: batch-script-ref
  desc: References batch script file (.bat/.cmd)
  crit: component
  conf: 0.7
  for: [javascript, typescript]
  unless:
  - id: metadata/library/structure::vscode-icon-theme-catalog
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_./-])[A-Za-z0-9_./-]+\\.(bat|cmd)([\"' ),]|$)"
- id: chrome-browser-path
  desc: References Chrome browser executable path
  crit: component
  conf: 0.86
  if:
    type: text
    substr: Google/Chrome/Application/chrome.exe
- id: windows-start-url-template
  desc: Launches URL via Windows start command
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'exec(`start "'
- id: dep-confusion-env-knobs
  desc: dependency confusion control env vars
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: "DEP_CONFUSION_(URL|PAYLOAD|SECRET|RECON_ONLY)"
- id: oob-moika-endpoint
  desc: oob.moika callback or payload endpoint
  crit: suspicious
  conf: 0.98
  attack: "T1041"
  if:
    type: text
    regex: "https?://oob\\.moika\\.tech/(report|payload)"
- id: postinstall-sensitive-env-report
  desc: postinstall collects sensitive and full environment
  crit: suspicious
  conf: 0.96
  attack: "T1552.001"
  if:
    type: text
    regex: "sensitive_vars[\\s\\S]{0,120}all_env_vars|all_env_vars[\\s\\S]{0,120}sensitive_vars"
- id: postinstall-npmrc-harvest
  desc: postinstall harvests npmrc credentials
  crit: suspicious
  conf: 0.96
  attack: "T1552.001"
  if:
    type: text
    regex: "npmrcPaths[\\s\\S]{0,500}(\\.npmrc|/etc/npmrc)"
- id: postinstall-project-secret-harvest
  desc: postinstall project secret harvest marker
  crit: component
  conf: 0.9
  attack: "T1552.001"
  if:
    type: text
    substr: "collectProjectContext"
- id: postinstall-git-config-harvest
  desc: postinstall reads project git config
  crit: suspicious
  conf: 0.95
  attack: "T1552.001"
  if:
    type: text
    regex: "git_config[\\s\\S]{0,220}\\.git"
- id: postinstall-git-log-harvest
  desc: postinstall reads recent project git log
  crit: suspicious
  conf: 0.93
  attack: "T1552.001"
  if:
    type: text
    substr: "git -C ../.. log --oneline"
- id: postinstall-parent-env-harvest
  desc: postinstall reads parent project env file
  crit: suspicious
  conf: 0.96
  attack: "T1552.001"
  if:
    type: text
    substr: "parent_env_file"
- id: postinstall-network-context-harvest
  desc: postinstall network context harvest marker
  crit: component
  conf: 0.9
  attack: "T1016"
  if:
    type: text
    substr: "collectNetwork"
- id: postinstall-ip-command-marker
  desc: IP interface command string in hook-like JavaScript
  crit: component
  conf: 0.92
  attack: "T1016"
  if:
    type: text
    regex: "(ip a|ifconfig -a|ipconfig /all)"
- id: postinstall-resolv-conf-harvest
  desc: postinstall reads resolver configuration
  crit: suspicious
  conf: 0.92
  attack: "T1016"
  if:
    type: text
    substr: "/etc/resolv.conf"
- id: postinstall-hosts-file-harvest
  desc: postinstall reads hosts file
  crit: suspicious
  conf: 0.9
  attack: "T1016"
  if:
    type: text
    substr: "/etc/hosts"
- id: postinstall-hidden-temp-payload
  desc: postinstall writes hidden temp payload
  crit: suspicious
  conf: 0.96
  attack: "T1105"
  if:
    type: text
    regex: "\\._polka-ui_init(\\$\\{ext\\}|\\.sh|\\.bat)?"
- id: postinstall-download-and-detached-run
  desc: postinstall download and run function marker
  crit: component
  conf: 0.92
  attack: "T1105, T1059.004"
  if:
    type: text
    substr: "downloadAndRun"
- id: postinstall-payload-http-get
  desc: postinstall downloads payload base URL
  crit: suspicious
  conf: 0.95
  attack: "T1105"
  if:
    type: text
    substr: "PAYLOAD_BASE"
- id: detached-payload-exec-marker
  desc: Detached payload execution marker
  crit: component
  conf: 0.95
  attack: "T1059.004"
  if:
    type: text
    regex: "(chmodSync|cmd\\.exe|nohup|\\.unref\\()"
- id: postinstall-json-http-post
  desc: postinstall HTTP POST function marker
  crit: component
  conf: 0.9
  attack: "T1041"
  if:
    type: text
    substr: "httpPost"
- id: postinstall-json-stringify-report
  desc: postinstall serializes report JSON
  crit: component
  conf: 0.9
  attack: "T1041"
  if:
    type: text
    substr: "JSON.stringify"
- id: postinstall-http-method-post
  desc: postinstall uses HTTP POST method
  crit: component
  conf: 0.9
  attack: "T1041"
  if:
    type: text
    regex: "method:\\s*['\"]POST"
composite_rules:
  # === Hook script filename detection ===
- id: hook-script-filename
  desc: npm lifecycle hook-like filename
  crit: component
  conf: 0.9
  any:
  - id: metadata/package/files::preinstall-js-basename
  - id: metadata/package/files::postinstall-js-basename
  - id: metadata/package/files::install-js-basename
  # === Cross-platform script dropper ===
- id: cross-platform-script-exec
  desc: Executes both shell and batch scripts
  crit: suspicious
  conf: 0.85
  for: [javascript, typescript]
  all:
  - id: shell-script-ref
  - id: batch-script-ref
  - id: metadata/import/builtin/node::require-child-process
  any:
  - id: micro-behaviors/process/create/script/file::shell-script-execution-any
  - id: micro-behaviors/process/create/script/file::batch-script-execution
- id: postinstall-project-secret-harvest-cluster
  desc: postinstall harvests project git and env files
  crit: suspicious
  conf: 0.96
  attack: "T1552.001"
  all:
  - id: postinstall-project-secret-harvest
  any:
  - id: postinstall-git-config-harvest
  - id: postinstall-git-log-harvest
  - id: postinstall-parent-env-harvest
  needs: 2
- id: postinstall-ip-command-harvest
  desc: postinstall runs IP interface discovery commands
  crit: suspicious
  conf: 0.92
  attack: "T1016"
  scope: leaf
  all:
  - id: hook-script-filename
  - id: postinstall-ip-command-marker
  any:
  - id: metadata/import/builtin::require-child-process
  - id: metadata/import/builtin/node::require-child-process
- id: postinstall-network-context-harvest-cluster
  desc: postinstall collects network configuration files
  crit: suspicious
  conf: 0.93
  attack: "T1016"
  all:
  - id: postinstall-network-context-harvest
  any:
  - id: postinstall-ip-command-harvest
  - id: postinstall-resolv-conf-harvest
  - id: postinstall-hosts-file-harvest
  needs: 2
- id: postinstall-download-and-detached-run-cluster
  desc: postinstall downloads and detached-runs stage payload
  crit: suspicious
  conf: 0.97
  attack: "T1105, T1059.004"
  all:
  - id: postinstall-download-and-detached-run
  - id: postinstall-payload-http-get
  - id: postinstall-detached-payload-exec
- id: postinstall-detached-payload-exec
  desc: postinstall detached-executes payload
  crit: suspicious
  conf: 0.95
  attack: "T1059.004"
  scope: leaf
  all:
  - id: hook-script-filename
  - id: detached-payload-exec-marker
  any:
  - id: metadata/import/builtin::require-child-process
  - id: metadata/import/builtin/node::require-child-process
  - id: micro-behaviors/process/create/spawn::detached-true
- id: postinstall-json-http-post-cluster
  desc: postinstall sends JSON report via HTTP POST
  crit: suspicious
  conf: 0.94
  attack: "T1041"
  all:
  - id: postinstall-json-http-post
  - id: postinstall-json-stringify-report
  any:
  - id: micro-behaviors/communications/http/request/client::application-json
  - id: postinstall-http-method-post
  # === Supply chain hook dropper composite ===
- id: hook-script-dropper
  desc: npm hook script executes platform-specific payloads
  crit: suspicious
  conf: 0.90
  mbc: "B0024"
  size_max: 10240
  all:
  - id: hook-script-filename
  - id: metadata/import/builtin::require-child-process
  any:
  - id: cross-platform-script-exec
  - id: objectives/execution/condition/platform::os-specific-execution
  - id: objectives/discovery/system/fingerprint/os::multi-os-targeting
  unless:
  - id: objectives/command-and-control/dropper/execution/script-dropper::verified-github-binary-installer
- id: hook-script-sidecar-launcher
  desc: npm hook launches platform specific sidecars
  crit: suspicious
  conf: 0.92
  mbc: "B0024"
  size_max: 10240
  all:
  - id: hook-script-filename
  - id: metadata/import/builtin::require-child-process
  - id: objectives/execution/condition/platform::os-specific-execution
  any:
  - id: cross-platform-script-exec
  - id: micro-behaviors/process/create/script/file::shell-script-execution-any
  - id: micro-behaviors/process/create/script/file::batch-script-execution
- id: hook-script-browser-launcher
  desc: npm hook silently launches browser
  crit: hostile
  conf: 0.97
  mbc: "B0024"
  size_max: 10240
  all:
  - id: hook-script-filename
  - id: metadata/import/builtin::require-child-process
  - id: micro-behaviors/process/create/spawn::detached-true
  - id: micro-behaviors/process/create/spawn::stdio-ignore
  any:
  - id: chrome-browser-path
  - id: windows-start-url-template
- id: hook-script-telemetry-beacon
  desc: npm hook sends install analytics beacon
  crit: hostile
  conf: 0.95
  size_max: 10240
  all:
  - id: hook-script-filename
  - id: micro-behaviors/os/telemetry/logging/analytics::analytics-install-beacon
- id: hook-depconf-credential-project-exfil
  desc: dependency-confusion hook exfiltrates env npmrc git project context
  crit: hostile
  conf: 0.995
  attack: "T1195.002, T1552.001, T1041"
  mbc: "E1041"
  size_max: 20000
  all:
  - id: hook-script-filename
  - id: dep-confusion-env-knobs
  - id: oob-moika-endpoint
  - id: postinstall-sensitive-env-report
  - id: postinstall-npmrc-harvest
  - id: postinstall-project-secret-harvest-cluster
  - id: postinstall-json-http-post-cluster
  any:
  - id: postinstall-network-context-harvest-cluster
  - id: objectives/supply-chain/recon-exfil/pipeline::npm-runner-recon-http
- id: hook-oob-second-stage-dropper
  desc: postinstall downloads and detached-runs OOB second stage
  crit: hostile
  conf: 0.995
  attack: "T1195.002, T1105, T1059.004"
  mbc: "B0024"
  size_max: 20000
  all:
  - id: hook-script-filename
  - id: dep-confusion-env-knobs
  - id: oob-moika-endpoint
  - id: postinstall-hidden-temp-payload
  - id: postinstall-download-and-detached-run-cluster
  - id: metadata/import/builtin::require-child-process
  any:
  - id: postinstall-detached-payload-exec
  - id: objectives/supply-chain/install-hook/scripts/hook-file::hook-script-dropper
