# npm Lifecycle Hook Script Detection
# Detects JavaScript files that serve as npm lifecycle hooks (preinstall.js, postinstall.js)
# and exhibit supply-chain dropper behavior
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  platforms: [unix, windows]
  for: [javascript]
  attack: "T1195.002"
traits:
  # === Hook Script Filename Detection ===
- id: init-js-filename
  desc: File named init.js
  crit: component
  conf: 0.75
  if:
    type: path
    basename: true
    exact: "init.js"
  # === Cross-platform script execution indicators ===
- id: shell-script-ref
  desc: References shell script file (.sh)
  crit: component
  conf: 0.7
  for: [javascript, typescript]
  unless:
  - id: metadata/library/structure/
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_./-])[A-Za-z0-9_./-]+\\.sh([\"' ),]|$)"
- id: batch-script-ref
  desc: References batch script file (.bat/.cmd)
  crit: component
  conf: 0.7
  for: [javascript, typescript]
  unless:
  - id: metadata/library/structure/
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_./-])[A-Za-z0-9_./-]+\\.(bat|cmd)([\"' ),]|$)"
- id: chrome-browser-path
  desc: References Chrome browser executable path
  crit: component
  conf: 0.86
  if:
    type: text
    substr: Google/Chrome/Application/chrome.exe
- id: dep-confusion-env-knobs
  desc: dependency confusion control env vars
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: "DEP_CONFUSION_(URL|PAYLOAD|SECRET|RECON_ONLY)"
- id: oob-moika-endpoint
  desc: oob.moika callback or payload endpoint
  crit: suspicious
  conf: 0.98
  attack: "T1041"
  if:
    type: text
    regex: "https?://oob\\.moika\\.tech/(report|payload)"
- id: postinstall-sensitive-env-report
  desc: 'postinstall collects sensitive and full env'
  crit: suspicious
  conf: 0.96
  attack: "T1552.001"
  if:
    type: text
    regex: "sensitive_vars[\\s\\S]{0,120}all_env_vars|all_env_vars[\\s\\S]{0,120}sensitive_vars"
- id: postinstall-full-process-env-report
  desc: 'postinstall full process env report'
  crit: component
  conf: 0.94
  attack: "T1552.001"
  if:
    type: text
    regex: "\\benv:\\s*process\\.env"
- id: postinstall-req-write-report
  desc: postinstall writes report to request body
  crit: component
  conf: 0.86
  attack: "T1041"
  if:
    type: text
    substr: "req.write"
- id: postinstall-dns-resolve-report
  desc: postinstall resolves report through DNS
  crit: component
  conf: 0.86
  attack: "T1041"
  if:
    type: text
    substr: "dns.resolve"
- id: postinstall-npmrc-harvest
  desc: npmrc path-list access marker
  crit: component
  conf: 0.96
  attack: "T1552.001"
  if:
    type: text
    regex: "npmrcPaths[\\s\\S]{0,500}(\\.npmrc|/etc/npmrc)"
- id: postinstall-project-secret-harvest
  desc: postinstall project secret harvest marker
  crit: component
  conf: 0.9
  attack: "T1552.001"
  if:
    type: text
    substr: "collectProjectContext"
- id: postinstall-git-config-harvest
  desc: postinstall reads project git config
  crit: suspicious
  conf: 0.95
  attack: "T1552.001"
  if:
    type: text
    regex: "git_config[\\s\\S]{0,220}\\.git"
  unless:
  - id: well-known/tool/detection/tyre-kicker/
- id: postinstall-git-log-harvest
  desc: postinstall reads recent project git log
  crit: suspicious
  conf: 0.93
  attack: "T1552.001"
  if:
    type: text
    substr: "git -C ../.. log --oneline"
- id: git-branch-delete-command
  desc: Git branch delete command
  crit: component
  conf: 0.94
  if:
    type: literal
    kind: string
    regex: '\bgit\s+branch\s+-d\s+\$\{[^}]{1,80}\}'
- id: git-pull-origin-command
  desc: Git pull origin command
  crit: component
  conf: 0.9
  if:
    type: literal
    kind: string
    regex: '\bgit\s+pull\s+origin\b'
- id: postinstall-parent-env-harvest
  desc: postinstall reads parent project env file
  crit: suspicious
  conf: 0.96
  attack: "T1552.001"
  if:
    type: text
    substr: "parent_env_file"
- id: postinstall-network-context-harvest
  desc: postinstall network marker harvest marker
  crit: component
  conf: 0.9
  attack: "T1016"
  if:
    type: text
    substr: "collectNetwork"
- id: postinstall-ip-command-marker
  desc: 'IP interface command string in hook-like JS'
  crit: component
  conf: 0.92
  attack: "T1016"
  if:
    type: text
    regex: "(ip a|ifconfig -a|ipconfig /all)"
- id: hosts-file-path
  desc: Hosts file path reference
  crit: component
  conf: 0.9
  attack: "T1016"
  if:
    type: text
    substr: "/etc/hosts"
- id: postinstall-hidden-temp-payload
  desc: postinstall writes hidden temp payload
  crit: suspicious
  conf: 0.96
  attack: "T1105"
  if:
    type: text
    regex: "\\._polka-ui_init(\\$\\{ext\\}|\\.sh|\\.bat)?"
- id: postinstall-hidden-temp-js-payload
  desc: postinstall writes hidden temp JS payload
  crit: suspicious
  conf: 0.96
  attack: "T1105"
  if:
    type: string_literal
    regex: "\\._[A-Za-z0-9_-]+_init\\.js"
- id: postinstall-download-and-detached-run
  desc: postinstall download and run function marker
  crit: component
  conf: 0.92
  attack: "T1105, T1059.004"
  if:
    type: text
    substr: "downloadAndRun"
- id: postinstall-js-payload-template
  desc: postinstall downloads OS-specific JS stage
  crit: component
  conf: 0.94
  attack: "T1105"
  if:
    type: string_literal
    regex: "\\$\\{PAYLOAD_BASE\\}/\\$\\{osType\\}\\.js"
- id: postinstall-payload-http-get
  desc: postinstall downloads payload base URL
  crit: suspicious
  conf: 0.95
  attack: "T1105"
  if:
    type: text
    substr: "PAYLOAD_BASE"
- id: detached-payload-exec-marker
  desc: Detached payload execution marker
  crit: component
  conf: 0.95
  attack: "T1059.004"
  if:
    type: text
    regex: "(detached\\s*:\\s*true|nohup\\b|\\.unref\\s*\\()"
- id: postinstall-json-http-post
  desc: postinstall HTTP POST function marker
  crit: component
  conf: 0.9
  attack: "T1041"
  if:
    type: text
    substr: "httpPost"
- id: tar-gzip-extract-spawn
  desc: postinstall spawns tar gzip extraction
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: 'spawn\(\s*["'']tar["''][\s\S]{0,120}["'']-xzf["'']'
- id: postinstall-binary-url-env-override
  desc: 'postinstall binary download URL env override'
  crit: component
  conf: 0.82
  for: [javascript, typescript]
  if:
    type: text
    regex: 'process\.env\.[A-Z0-9_]*BINARY[A-Z0-9_]*URL'
- id: postinstall-versioned-targz-asset
  desc: postinstall versioned tar.gz asset name
  crit: component
  conf: 0.84
  for: [javascript, typescript]
  if:
    type: text
    regex: '\$\{[^}]{1,32}version[^}]{0,32}\}[\s\S]{0,80}\.tar\.gz'
- id: hermes-agent-postinstall-marker
  desc: Hermes agent postinstall marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: hermes-agent
- id: calvyn-postinstall-marker
  desc: Calvyn npm postinstall marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: '[calvyn]'
- id: install-hook-package-compromise-banner
  desc: Install hook declares package compromise
  crit: suspicious
  conf: 0.94
  if:
    type: string_literal
    case_insensitive: true
    regex: '\b(this|your) package is (hacked|compromised|pwned)\b'
  unless:
  - id: well-known/tool/detection/tyre-kicker/
  - id: well-known/lib/jszip/
  - id: metadata/library/structure::js-large-minified-bundle
- id: install-hook-unauthorized-code-banner
  desc: Install hook declares unauthorized code
  crit: suspicious
  conf: 0.94
  if:
    type: text
    case_insensitive: true
    regex: "executou c[oó]digo n[aã]o autorizado"
- id: install-hook-supply-chain-attack-banner
  desc: Install hook declares supply-chain attack
  crit: suspicious
  conf: 0.94
  if:
    type: string_literal
    case_insensitive: true
    regex: '\b(package|module) is a supply[- ]chain attack\b'
- id: install-hook-hacked-filename-marker
  desc: Install hook hacked filename marker
  crit: suspicious
  conf: 0.94
  if:
    type: text
    case_insensitive: true
    regex: "vo(c|ç)e_foi_hackeado"
# Sibling of the compromise-banner atoms above: a hook writing a file whose
# content is the "foi hackeado" defacement marker. Anchored to that localized
# phrase only — bare "hacked"/"pwned" were dropped because they are neutral
# terms (pwntools, CTF `echo pwned`, HaveIBeenPwned, path-traversal selftests
# like this sample's `../../../pwned.txt`), not compromise declarations.
- id: install-hook-hacked-marker-file
  desc: Writes a "foi hackeado" defacement marker
  crit: suspicious
  conf: 0.94
  if:
    type: text
    case_insensitive: true
    regex: "writeFileSync[\\s\\S]{0,260}foi[_ -]?hackeado"
  unless:
  - id: metadata/package/testing/
composite_rules:
  # === Hook script filename detection ===
- id: hook-script-filename
  desc: npm lifecycle hook-like filename
  crit: component
  conf: 0.9
  any:
  - type: trait
    id: metadata/package/files/included::preinstall-js-basename
  - type: trait
    id: metadata/package/files/included::postinstall-js-basename
  - type: trait
    id: metadata/package/files/included::install-js-basename
- id: postinstall-resolv-conf-harvest
  desc: postinstall reads resolver configuration
  crit: suspicious
  conf: 0.92
  attack: "T1016"
  all:
  - id: hook-script-filename
  - id: micro-behaviors/fs/path/config/system::config-resolv
- id: postinstall-hosts-file-harvest
  desc: postinstall reads hosts file
  crit: suspicious
  conf: 0.9
  attack: "T1016"
  all:
  - id: hook-script-filename
  - id: hosts-file-path
  # === Cross-platform script dropper ===
- id: cross-platform-script-exec
  desc: Executes both shell and batch scripts
  crit: suspicious
  conf: 0.85
  for: [javascript, typescript]
  all:
  - id: shell-script-ref
  - id: batch-script-ref
  - id: metadata/import/builtin::require-child-process
  any:
  - id: micro-behaviors/process/create/script/file::shell-script-execution-any
  - id: micro-behaviors/process/create/script/file::batch-script-execution
- id: postinstall-project-secret-harvest-cluster
  desc: postinstall harvests project git and env files
  crit: suspicious
  conf: 0.96
  attack: "T1552.001"
  all:
  - id: postinstall-project-secret-harvest
  any:
  - id: postinstall-git-config-harvest
  - id: postinstall-git-log-harvest
  - id: postinstall-parent-env-harvest
  needs: 2
- id: postinstall-vcs-project-update
  desc: postinstall mutates project checkout
  crit: hostile
  conf: 0.95
  all:
  - id: hook-script-filename
  - id: git-pull-origin-command
  - id: micro-behaviors/process/create/shell/build::npm-install-command
  any:
  - id: micro-behaviors/process/create/shell/bridge::child-process-require
  - id: micro-behaviors/process/create/shell/bridge::js-execsync
- id: postinstall-vcs-branch-cleanup
  desc: postinstall deletes local branches
  crit: hostile
  conf: 0.94
  all:
  - id: hook-script-filename
  - id: git-branch-delete-command
  any:
  - id: micro-behaviors/process/create/shell/bridge::child-process-require
  - id: micro-behaviors/process/create/shell/bridge::js-execsync
- id: postinstall-self-declared-compromise
  desc: npm postinstall declares compromise
  crit: hostile
  conf: 0.98
  all:
  - id: hook-script-filename
  - id: micro-behaviors/fs/write/file/direct::js-file-write
  any:
  - id: install-hook-package-compromise-banner
  - id: install-hook-supply-chain-attack-banner
  - id: install-hook-unauthorized-code-banner
  - id: install-hook-hacked-filename-marker
  - id: install-hook-hacked-marker-file
- id: postinstall-hacked-marker-write
  desc: npm postinstall writes hacked marker
  crit: hostile
  conf: 0.98
  all:
  - id: hook-script-filename
  - id: install-hook-hacked-marker-file
  - id: micro-behaviors/fs/write/file/direct::js-file-write
- id: postinstall-ip-command-harvest
  desc: postinstall runs IP interface discovery commands
  crit: suspicious
  conf: 0.92
  attack: "T1016"
  scope: leaf
  all:
  - id: hook-script-filename
  - id: postinstall-ip-command-marker
  any:
  - id: metadata/import/builtin::require-child-process
  - id: metadata/import/builtin::require-child-process
- id: postinstall-network-context-harvest-cluster
  desc: postinstall collects network configuration files
  crit: suspicious
  conf: 0.93
  attack: "T1016"
  all:
  - id: postinstall-network-context-harvest
  any:
  - id: postinstall-ip-command-harvest
  - id: postinstall-resolv-conf-harvest
  - id: postinstall-hosts-file-harvest
  needs: 2
- id: postinstall-download-and-detached-run-cluster
  desc: postinstall downloads and detached-runs stage payload
  crit: suspicious
  conf: 0.97
  attack: "T1105, T1059.004"
  all:
  - id: postinstall-download-and-detached-run
  - id: postinstall-payload-http-get
  - id: install-hook-detached-payload-exec
- id: postinstall-js-download-detached-run-cluster
  desc: postinstall downloads and detached-runs JS stage
  crit: suspicious
  conf: 0.97
  attack: "T1105, T1059.007"
  scope: leaf
  all:
  - id: postinstall-payload-http-get
  - id: postinstall-js-payload-template
  - id: postinstall-hidden-temp-js-payload
  - id: install-hook-detached-payload-exec
- id: install-hook-detached-payload-exec
  desc: npm install hook detached-executes payload
  crit: suspicious
  conf: 0.95
  attack: "T1059.004"
  scope: leaf
  all:
  - id: hook-script-filename
  - id: detached-payload-exec-marker
  any:
  - id: metadata/import/builtin::require-child-process
  - id: metadata/import/builtin::require-child-process
  - id: micro-behaviors/process/create/spawn::detached-true
- id: postinstall-json-http-post-cluster
  desc: postinstall sends JSON report via HTTP POST
  crit: suspicious
  conf: 0.94
  attack: "T1041"
  all:
  - id: hook-script-filename
  - id: postinstall-json-http-post
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  any:
  - id: micro-behaviors/communications/http/header/content-type::application-json
  - id: micro-behaviors/communications/http/request/client::post-method-text
- id: hook-full-env-report-cluster
  desc: npm hook reports full process.env
  crit: suspicious
  conf: 0.96
  attack: "T1552.001, T1041"
  all:
  # Gate on an actual lifecycle-hook filename: `env: process.env` + JSON.stringify
  # is the ordinary way to forward the environment to a spawned child process and
  # appears in countless legitimate build/deploy scripts. Without the hook
  # context there is no "hook reports the environment" claim to make.
  - id: hook-script-filename
  - id: postinstall-full-process-env-report
  any:
  - id: postinstall-json-http-post
  - id: micro-behaviors/data/serialize/json::json-stringify-call
  - id: micro-behaviors/data/buffer::buffer-from-call
  - id: postinstall-req-write-report
  - id: postinstall-dns-resolve-report
- id: hook-full-env-http-exfil
  desc: npm hook exfiltrates full process.env
  crit: hostile
  conf: 0.98
  attack: "T1195.002, T1552.001, T1041"
  all:
  - id: hook-full-env-report-cluster
  - id: objectives/exfiltration/http/upload::node-collect-exfil
  # === Install-time binary archive bootstrapper ===
- id: postinstall-unverified-binary-archive-installer
  desc: npm postinstall downloads unverified binary archive
  crit: suspicious
  conf: 0.9
  attack: "T1195.002, T1105"
  for: [javascript, typescript]
  size_max: 20000
  all:
  - id: hook-script-filename
  - id: micro-behaviors/communications/http/download/handler::node-http-stream-to-file
  - id: tar-gzip-extract-spawn
  - id: micro-behaviors/fs/chmod/modify::node-chmod
  any:
  - id: postinstall-binary-url-env-override
  - id: postinstall-versioned-targz-asset
  unless:
  - id: objectives/command-and-control/dropper/execution/script-dropper/
- id: hook-script-dropper
  desc: npm hook script executes platform-specific payloads
  crit: suspicious
  conf: 0.90
  mbc: "B0024"
  size_max: 10240
  all:
  - id: hook-script-filename
  - id: metadata/import/builtin::require-child-process
  any:
  - id: cross-platform-script-exec
  - id: objectives/execution/condition/platform::os-specific-execution
  - id: objectives/discovery/system/fingerprint/os::multi-os-targeting
  unless:
  - id: objectives/command-and-control/dropper/execution/script-dropper/
  - id: hermes-agent-postinstall-marker
  - id: calvyn-postinstall-marker
- id: hook-script-sidecar-launcher
  desc: npm hook launches platform specific sidecars
  crit: suspicious
  conf: 0.92
  mbc: "B0024"
  size_max: 10240
  all:
  - id: hook-script-filename
  - id: metadata/import/builtin::require-child-process
  - id: objectives/execution/condition/platform::os-specific-execution
  any:
  - id: cross-platform-script-exec
  - id: micro-behaviors/process/create/script/file::shell-script-execution-any
  - id: micro-behaviors/process/create/script/file::batch-script-execution
- id: hook-script-browser-launcher
  desc: npm hook silently launches browser
  crit: hostile
  conf: 0.97
  mbc: "B0024"
  size_max: 10240
  all:
  - id: hook-script-filename
  - id: metadata/import/builtin::require-child-process
  - id: micro-behaviors/process/create/spawn::detached-true
  - id: micro-behaviors/process/create/spawn::stdio-ignore
  any:
  - id: chrome-browser-path
  - id: micro-behaviors/process/create/shell/bridge::node-starts-browser-url
- id: hook-script-telemetry-beacon
  desc: npm hook sends install analytics beacon
  crit: hostile
  conf: 0.95
  size_max: 10240
  all:
  - id: hook-script-filename
  - id: micro-behaviors/os/telemetry/logging/analytics::analytics-install-beacon
- id: hook-depconf-credential-project-exfil
  desc: dependency-confusion hook exfiltrates env npmrc git project marker
  crit: hostile
  conf: 0.995
  attack: "T1195.002, T1552.001, T1041"
  mbc: "E1041"
  size_max: 20000
  all:
  - id: hook-script-filename
  - id: dep-confusion-env-knobs
  - id: oob-moika-endpoint
  - id: postinstall-sensitive-env-report
  - id: postinstall-npmrc-harvest
  - id: postinstall-project-secret-harvest-cluster
  - id: postinstall-json-http-post-cluster
  any:
  - id: postinstall-network-context-harvest-cluster
  - id: objectives/supply-chain/recon-exfil/pipeline::npm-runner-recon-http
- id: hook-depconf-full-env-oob-exfil
  desc: dependency-confusion hook exfiltrates full env to OOB
  crit: hostile
  conf: 0.99
  attack: "T1195.002, T1552.001, T1041"
  mbc: "E1041"
  size_max: 20000
  scope: leaf
  all:
  - id: hook-script-filename
  - id: dep-confusion-env-knobs
  - id: oob-moika-endpoint
  - id: hook-full-env-report-cluster
  - id: postinstall-json-http-post-cluster
  any:
  - id: objectives/discovery/system/fingerprint/hardware::js-victim-id
  - id: objectives/supply-chain/recon-exfil/host-profile/victim::npm-victim-id-recon
- id: postinstall-full-env-oast-exfil
  desc: postinstall exfiltrates full env to OAST
  crit: hostile
  conf: 0.99
  attack: "T1195.002, T1552.001, T1041"
  mbc: "E1041"
  scope: leaf
  all:
  - id: hook-script-filename
  - id: hook-full-env-report-cluster
  - id: objectives/exfiltration/oob/endpoint::oastify
  any:
  - id: micro-behaviors/communications/http/request/client::post-method-text
  - id: objectives/supply-chain/recon-exfil/oast/secret::node-oastify-dns-callback
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-file-exfil
- id: hook-oob-second-stage-dropper
  desc: postinstall downloads and detached-runs OOB second stage
  crit: hostile
  conf: 0.995
  attack: "T1195.002, T1105, T1059.004"
  mbc: "B0024"
  size_max: 20000
  all:
  - id: hook-script-filename
  - id: dep-confusion-env-knobs
  - id: oob-moika-endpoint
  - id: postinstall-hidden-temp-payload
  - id: postinstall-download-and-detached-run-cluster
  - id: metadata/import/builtin::require-child-process
  any:
  - id: install-hook-detached-payload-exec
  - id: objectives/supply-chain/install-hook/scripts/hook-file::hook-script-dropper
- id: hook-oob-js-second-stage-dropper
  desc: postinstall downloads and detached-runs OOB JS stage
  crit: hostile
  conf: 0.995
  attack: "T1195.002, T1105, T1059.007"
  mbc: "B0024"
  size_max: 20000
  scope: leaf
  all:
  - id: hook-script-filename
  - id: dep-confusion-env-knobs
  - id: oob-moika-endpoint
  - id: postinstall-js-download-detached-run-cluster
  any:
  - id: micro-behaviors/process/create/spawn::process-execpath-spawn
  - id: metadata/import/builtin::require-child-process
