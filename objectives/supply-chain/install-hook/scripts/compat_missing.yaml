defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: has-preinstall-raw
    desc: Raw content contains preinstall hook
    crit: notable
    conf: 0.88
    for: [package.json, pkginfo, javascript, source, manifests, data]
    if:
      type: raw
      regex: '"preinstall"\s*:|preinstall\s*='
  - id: encoded-npm-cmd
    desc: Encoded or node-inline npm command
    crit: suspicious
    conf: 0.93
    for: [package.json]
    if:
      type: text
      regex: '(?i)"(preinstall|install|postinstall)"\s*:\s*".{0,120}node\s+-e'
    unless:
      - type: text
        regex: 'process\.exit\(0\)'
  - id: silent-obfuscated-npm-dropper
    desc: Silent obfuscated npm lifecycle dropper
    crit: suspicious
    conf: 0.95
    for: [package.json, javascript, pkginfo]
    if:
      type: text
      regex: '(?is)(preinstall|postinstall).{0,200}(/dev/null|silent:\s*true|node\s+-e)'
    unless:
      - type: text
        regex: 'process\.exit\(0\)'
      - type: text
        regex: '"installationMethod"\s*:\s*"deb"'
