# Dynamic NPM Install from Code
# Detects runtime npm install executed via child_process
# ATT&CK: T1059.007 (JavaScript), T1195.002 (Supply Chain)
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: npm-install-build-combo
    desc: npm install followed by npm run build
    crit: component
    conf: 0.95
    if:
      type: text
      regex: "npm\\s+install.{0,40}npm\\s+run\\s+build"
  - id: exec-npm-install
    desc: Dynamic npm install via exec/spawn
    crit: notable
    conf: 0.9
    attack: "T1059.007"
    if:
      type: text
      regex: "(execSync|exec|spawn)\\s*\\([^)]{0,60}npm\\s+install[^'\")]{0,40}(\\$|--)"
    not:
      - substr: "// 'npm install --"
    downgrade:
      any:
        - id: npm-install-build-combo
  - id: exec-npm-install-package
    desc: Dynamic npm package install
    crit: component
    conf: 0.92
    attack: "T1195.002"
    if:
      type: string_literal
      regex: "^npm\\s+install\\s+(@?[a-z0-9._-]+/)?[a-z0-9._-]+$"
  - id: runtime-clx-cookie-signature-install
    desc: 'runtime clx cookie sig install'
    crit: suspicious
    conf: 0.99
    attack: "T1195.002"
    if:
      type: string_literal
      regex: "npm\\s+install\\s+clx-cookie-signature(\\s|$)"
  - id: runtime-install-stealth-flags
    desc: Runtime npm install uses stealth/no-save flags
    crit: component
    conf: 0.94
    attack: "T1195.002"
    if:
      type: string_literal
      substr: "--no-save"
  - id: runtime-install-silent-loglevel
    desc: Runtime npm install suppresses npm logs
    crit: component
    conf: 0.92
    attack: "T1195.002"
    if:
      type: string_literal
      substr: "--loglevel silent"
  - id: runtime-install-no-progress
    desc: Runtime npm install disables progress output
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: string_literal
      substr: "--no-progress"
  - id: runtime-install-no-audit-fund
    desc: Runtime npm install disables audit
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: string_literal
      regex: 'npm\s+install[\s\S]{0,120}--no-audit[\s\S]{0,80}--no-fund'
  - id: runtime-install-omit-dev
    desc: Runtime npm install omits dev
    crit: component
    conf: 0.88
    attack: "T1195.002"
    if:
      type: string_literal
      substr: "--omit=dev"
  - id: node-tar-gzip-strip-extract
    desc: Node extracts gzipped tarball
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: text
      regex: 'tar\s+-xzf[\s\S]{0,160}--strip-components=1'
  # The array form is how child_process.execFileSync normally invokes the
  # platform tar utility: the executable and each option are separate source
  # literals, so the shell-style matcher above cannot see the operation.
  - id: node-tar-extract-call
    desc: Node invokes tar for archive extraction
    crit: notable
    conf: 0.94
    attack: "T1105"
    if:
      type: text
      substr: "execFileSync('tar'"
  - id: node-tar-gzip-flag
    desc: Tar extraction uses gzip flag
    crit: component
    conf: 0.95
    if:
      type: string_literal
      exact: "-xzf"
  - id: node-tar-strip-components-flag
    desc: Tar extraction strips archive directory
    crit: component
    conf: 0.95
    if:
      type: string_literal
      exact: "--strip-components=1"
  - id: node-downloaded-tgz-write
    desc: Node writes downloaded tgz
    crit: component
    conf: 0.88
    attack: "T1105"
    if:
      type: text
      regex: 'writeFileSync\s*\([\s\S]{0,120}Buffer\.concat\(chunks\)|\.tgz["'']'
  - id: exec-npm-install-array
    desc: Node executes npm with argument array
    crit: notable
    conf: 0.94
    attack: "T1059.007"
    if:
      type: text
      substr: "execFileSync('npm'"
  - id: node-dynamic-require-destructure
    desc: Destructures export from dynamic require
    crit: component
    conf: 0.9
    attack: "T1059.007"
    if:
      type: text
      regex: 'const\s*\{\s*\w+\s*\}\s*=\s*require\(\s*\w+\s*\)'
  - id: encoded-npm-install
    desc: Base64-encoded npm install command
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    size_max: 200000
    if:
      type: encoded
      encoding: base64
      word: "npm install"
    unless:
    - id: micro-behaviors/process/interpreter/vm/
    - id: metadata/library/runtime::acquire-vscode-api
    - id: metadata/file/format::sourcemap-inline-base64
    - id: metadata/file/format::astrojs-package-reference
  - id: encoded-stealth-no-save
    desc: Encoded stealth flag --no-save
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: encoded
      substr: "--no-save"
    unless:
    - id: metadata/file/format::sourcemap-inline-base64
  - id: encoded-stealth-silent
    desc: Encoded stealth flag --silent
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: encoded
      substr: "--silent"
    unless:
    - id: metadata/file/format::sourcemap-inline-base64
  - id: encoded-stealth-no-audit
    desc: Encoded stealth flag --no-audit
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: encoded
      substr: "--no-audit"
    unless:
    - id: metadata/file/format::sourcemap-inline-base64
  - id: split-spawn-decoded-cmd
    desc: Split and spawn decoded command string
    crit: notable
    conf: 0.85
    attack: "T1059.007"
    if:
      type: text
      regex: "(execSync|exec|spawn)\\s*\\([^\\n)]{0,200}\\.split\\(['\"] ['\"]\\)"
  - id: base64-decoded-module-const
    desc: Module name from base64 decode
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Buffer\.from\(\s*["''][A-Za-z0-9+/=]{6,}["'']\s*,\s*["'']base64["'']\)\.toString'
  # Programmatic install API: `npm().install("pkg", { ... })` via a package
  # manager's JS API (not a child_process command string). Stealth options are
  # passed as object properties ("no-save": true, loglevel: "silent"), so the
  # CLI-flag matchers above miss them — these capture the object-property form.
  - id: api-install-package-call
    desc: Programmatic package install API call
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    if:
      type: text
      regex: '\.install\s*\(\s*["''][@a-z0-9][\w@/.-]{1,60}["'']\s*,\s*\{'
  - id: install-opt-no-save-prop
    desc: Install option no-save hides from manifest
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: text
      regex: '["'']no-save["'']\s*:\s*true'
  - id: install-opt-silent-loglevel-prop
    desc: Install option silences npm log output
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: text
      regex: 'loglevel\s*:\s*["'']silent["'']'
  - id: install-opt-no-warnings-prop
    desc: Install option suppresses warnings
    crit: component
    conf: 0.88
    attack: "T1195.002"
    if:
      type: text
      regex: '["'']no-warnings["'']\s*:\s*true'
  - id: install-opt-no-progress-prop
    desc: Install option hides progress output
    crit: component
    conf: 0.86
    attack: "T1195.002"
    if:
      type: text
      regex: '["'']no-progress["'']\s*:\s*true'
  - id: pkgmgr-aliased-as-npm
    desc: Third-party import aliased as npm
    crit: notable
    conf: 0.85
    attack: "T1036"
    if:
      type: text
      regex: '\{\s*\w+\s*:\s*npm\s*\}\s*=\s*require'
  # Normal code never invokes a bare `npm(...)` — the npm CLI is a process you
  # spawn, not a function you call. A callable `npm` is a programmatic install
  # API (npm-programmatic, or a third-party one aliased to `npm` to blend in).
  - id: npm-invoked-as-function
    desc: npm called as a programmatic function
    crit: notable
    conf: 0.8
    attack: "T1195.002"
    if:
      type: text
      regex: '\bnpm\s*\(\s*\)\s*\.'
  # Importing the `npm` package itself pulls the CLI in as a runtime library —
  # rare outside build tooling, and the prerequisite for a programmatic install.
  - id: npm-cli-as-require-target
    desc: Imports the npm CLI as a library
    crit: notable
    conf: 0.82
    attack: "T1195.002"
    if:
      type: text
      regex: 'require\(\s*["'']npm["'']\s*\)|\bfrom\s+["'']npm["'']'
  - id: pkg-install-in-catch
    desc: Package install inside catch handler
    crit: notable
    conf: 0.88
    attack: "T1195.002"
    if:
      type: text
      regex: 'catch\s*\([^)]{0,20}\)\s*\{[\s\S]{0,150}\.install\s*\('
composite_rules:
  - id: node-tar-gzip-strip-array
    desc: Node extracts gzipped tarball with tar flags
    crit: notable
    conf: 0.98
    attack: "T1105"
    all:
      - id: node-tar-extract-call
      - id: node-tar-gzip-flag
      - id: node-tar-strip-components-flag
  - id: runtime-npm-install-process-call
    desc: Runtime npm install through child process
    crit: notable
    conf: 0.95
    attack: "T1059.007"
    all:
      - id: micro-behaviors/process/create/system::js-execfile-call
    any:
      - id: exec-npm-install
      - id: exec-npm-install-array
      - id: exec-npm-install-package
  - id: runtime-npm-install-comp
    desc: Runtime npm package installation
    crit: suspicious
    conf: 0.93
    attack: "T1059.007"
    all:
      # Use the structured source fact for destructured imports. The metadata
      # import rule intentionally suppresses package-manager helper contexts,
      # which made this composite miss a direct `const { spawn } =
      # require('child_process')` launcher.
      - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
    any:
      - id: exec-npm-install
      - id: micro-behaviors/process/create/shell/build::js-npm-install-alias-via-child-process
      - id: exec-npm-install-package
      - id: micro-behaviors/process/create/shell/build::npm-install-save-command
    downgrade:
      any:
        - id: npm-install-build-combo
        - id: micro-behaviors/process/interpreter/vm/
        - id: metadata/library/structure::js-large-module-bundle
    unless:
      - id: metadata/package/files/dependency::node-modules-path
  - id: stealth-runtime-npm-install
    desc: Runtime npm install uses stealth flags
    crit: hostile
    conf: 0.97
    attack: "T1195.002,T1059.007"
    mbc: "B0024"
    all:
      - id: runtime-npm-install-comp
    any:
      - id: runtime-install-stealth-flags
      - id: runtime-install-silent-loglevel
      - id: runtime-install-no-progress
      - id: micro-behaviors/process/create/spawn::windowshide-option
    needs: 2
    unless:
      - id: npm-install-build-combo
      - id: micro-behaviors/process/interpreter/vm/
  - id: secondary-tgz-npm-bootstrap
    desc: Secondary tgz npm bootstrap
    crit: hostile
    conf: 0.97
    attack: "T1195.002,T1059.007,T1105"
    mbc: "B0024"
    all:
      - id: runtime-npm-install-process-call
      - id: node-tar-gzip-strip-array
    any:
      - id: node-tar-gzip-strip-extract
      - id: node-downloaded-tgz-write
      - id: runtime-install-no-audit-fund
      - id: runtime-install-omit-dev
    needs: 2
    unless:
      - id: npm-install-build-combo
      - id: micro-behaviors/process/interpreter/vm/
  - id: secondary-tgz-extracted-module-exec
    desc: Secondary tgz bootstrap executes dynamically required staged module
    crit: hostile
    conf: 0.98
    attack: "T1195.002,T1059.007,T1105"
    mbc: "B0024"
    all:
      - id: secondary-tgz-npm-bootstrap
      - id: node-dynamic-require-destructure
    unless:
      - id: npm-install-build-combo
      - id: micro-behaviors/process/interpreter/vm/
  - id: clx-cookieparser-runtime-stage-install
    desc: clx-cookieparser silently installs companion stage at runtime
    crit: hostile
    conf: 0.995
    attack: "T1195.002,T1059.007"
    mbc: "B0024"
    all:
      - id: runtime-npm-install-comp
      - id: runtime-clx-cookie-signature-install
    any:
      - id: runtime-install-stealth-flags
      - id: runtime-install-silent-loglevel
      - id: micro-behaviors/process/create/spawn::windowshide-option
  - id: encoded-stealth-npm-install
    desc: Encoded npm install with stealth flags
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    all:
      - id: encoded-npm-install
    any:
      - id: encoded-stealth-no-save
      - id: encoded-stealth-silent
      - id: encoded-stealth-no-audit
  - id: obfuscated-npm-dropper
    desc: Obfuscated npm package dropper chain
    crit: hostile
    conf: 0.95
    attack: "T1195.002"
    mbc: "B0024"
    size_max: 200000
    scope: leaf
    near_bytes: 4096
    all:
      - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
      - id: encoded-npm-install
      - id: micro-behaviors/process/create/spawn::stdio-ignore
  - id: runtime-api-stealth-install
    desc: Covert runtime package install via API
    crit: hostile
    conf: 0.96
    attack: "T1195.002,T1059.007"
    mbc: "B0024"
    near_bytes: 400
    all:
      - id: api-install-package-call
    any:
      - id: install-opt-no-save-prop
      - id: install-opt-silent-loglevel-prop
      - id: install-opt-no-warnings-prop
      - id: install-opt-no-progress-prop
    needs: 2
  - id: require-failure-covert-dropper
    desc: Installs missing package on require failure
    crit: hostile
    conf: 0.95
    attack: "T1195.002,T1059.007"
    mbc: "B0024"
    near_bytes: 400
    all:
      - id: pkg-install-in-catch
    any:
      - id: install-opt-no-save-prop
      - id: install-opt-silent-loglevel-prop
      - id: install-opt-no-warnings-prop
      - id: install-opt-no-progress-prop
    needs: 1
  - id: silent-decoded-module-loader
    desc: Silent spawn + decoded module name require chain
    crit: hostile
    conf: 0.97
    attack: "T1195.002,T1027"
    mbc: "B0024"
    near_bytes: 1600
    all:
      - id: metadata/import/builtin::require-child-process
      - id: base64-decoded-module-const
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/create/spawn::windowshide-option
      - id: encoded-npm-install
  - id: postinstall-serverless-body-pingback
    desc: Postinstall hook posts body to serverless endpoint
    crit: hostile
    conf: 0.96
    attack: "T1195.002,T1041"
    mbc: "B0024"
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-js-file
      - id: micro-behaviors/communications/http/request/configuration::node-http-request-configured
      - id: micro-behaviors/communications/http/endpoints::serverless-function
    any:
      - id: encoded-npm-install
      - id: micro-behaviors/crypto/library/provider::require-crypto
  - id: postinstall-remote-bundle-bootstrap
    desc: npm postinstall remote bundle bootstrap
    crit: hostile
    conf: 0.995
    scope: archive
    for: [javascript, typescript, package.json, npm]
    attack: "T1195.002,T1105,T1059.007"
    mbc: "B0024"
    all:
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: runtime-npm-install-comp
      - id: micro-behaviors/communications/http/request/client::node-scheme-selected-http-client
      - id: micro-behaviors/fs/file/write/direct::node-write-file-sync
      - id: micro-behaviors/data/source/dynamic/load::node-variable-require-call
      - id: node-tar-gzip-strip-extract
