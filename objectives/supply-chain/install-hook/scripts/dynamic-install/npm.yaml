# Dynamic NPM Install from Code
# Detects runtime npm install executed via child_process
# ATT&CK: T1059.007 (JavaScript), T1195.002 (Supply Chain)
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: npm-install-build-combo
    desc: npm install followed by npm run build
    crit: component
    conf: 0.95
    if:
      type: text
      regex: "npm\\s+install.{0,40}npm\\s+run\\s+build"
  - id: exec-npm-install
    desc: Dynamic npm install via exec/spawn
    crit: notable
    conf: 0.9
    attack: "T1059.007"
    if:
      type: text
      regex: "(execSync|exec|spawn)\\s*\\([^)]{0,60}npm\\s+install[^'\")]{0,40}(\\$|--)"
    not:
      - substr: "// 'npm install --"
    downgrade:
      any:
        - id: npm-install-build-combo
  - id: exec-npm-install-alias
    desc: Dynamic npm i package install
    crit: notable
    conf: 0.92
    attack: "T1059.007"
    if:
      type: string_literal
      regex: "^npm\\s+i\\s+(@?[a-z0-9._-]+/)?[a-z0-9._-]+"
    downgrade:
      any:
        - id: npm-install-build-combo
  - id: exec-npm-install-package
    desc: Dynamic npm package install
    crit: component
    conf: 0.92
    attack: "T1195.002"
    if:
      type: string_literal
      regex: "^npm\\s+install\\s+(@?[a-z0-9._-]+/)?[a-z0-9._-]+$"
  - id: npm-install-save
    desc: npm install with --save flag from code
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: string_literal
      regex: "npm\\s+install\\s+[a-z@][a-z0-9._@/-]{1,60}\\s+--save(\\s|$)"
    # Tutorial/doc placeholders ("npm install some-package --save") are examples,
    # not a runtime install hook.
    unless:
      - type: string_literal
        regex: "npm\\s+install\\s+(some-package|your-package|package-name|my-package)\\s+--save"
  - id: runtime-clx-cookie-signature-install
    desc: 'runtime clx cookie sig install'
    crit: suspicious
    conf: 0.99
    attack: "T1195.002"
    if:
      type: string_literal
      regex: "npm\\s+install\\s+clx-cookie-signature(\\s|$)"
  - id: runtime-install-stealth-flags
    desc: Runtime npm install uses stealth/no-save flags
    crit: component
    conf: 0.94
    attack: "T1195.002"
    if:
      type: string_literal
      substr: "--no-save"
  - id: runtime-install-silent-loglevel
    desc: Runtime npm install suppresses npm logs
    crit: component
    conf: 0.92
    attack: "T1195.002"
    if:
      type: string_literal
      substr: "--loglevel silent"
  - id: runtime-install-no-progress
    desc: Runtime npm install disables progress output
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: string_literal
      substr: "--no-progress"
  - id: encoded-npm-install
    desc: Base64-encoded npm install command
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    size_max: 200000
    if:
      type: encoded
      word: "npm install"
    unless:
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    - id: metadata/library/runtime::acquire-vscode-api
    - id: metadata/file/format::sourcemap-inline-base64
  - id: encoded-stealth-no-save
    desc: Encoded stealth flag --no-save
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: encoded
      substr: "--no-save"
    unless:
    - id: metadata/file/format::sourcemap-inline-base64
  - id: encoded-stealth-silent
    desc: Encoded stealth flag --silent
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: encoded
      substr: "--silent"
    unless:
    - id: metadata/file/format::sourcemap-inline-base64
  - id: encoded-stealth-no-audit
    desc: Encoded stealth flag --no-audit
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: encoded
      substr: "--no-audit"
    unless:
    - id: metadata/file/format::sourcemap-inline-base64
  - id: require-dynamic-variable
    desc: Dynamic require with variable argument
    crit: notable
    conf: 0.8
    attack: "T1059.007"
    if:
      type: text
      regex: "require\\([A-Z][A-Z_]{2,}\\)"
  - id: split-spawn-decoded-cmd
    desc: Split and spawn decoded command string
    crit: notable
    conf: 0.85
    attack: "T1059.007"
    if:
      type: text
      regex: "(execSync|exec|spawn)\\s*\\([^\\n)]{0,200}\\.split\\(['\"] ['\"]\\)"
  - id: base64-decoded-module-const
    desc: Module name from base64 decode
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Buffer\.from\(\s*["''][A-Za-z0-9+/=]{6,}["'']\s*,\s*["'']base64["'']\)\.toString'
  - id: stdio-windowshide-spawn
    desc: spawn with stdio ignore and windowsHide
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'stdio:\s*["'']ignore["''][\s\S]{0,200}windowsHide:\s*true'
composite_rules:
  - id: runtime-npm-install-comp
    desc: Runtime npm package installation
    crit: suspicious
    conf: 0.93
    attack: "T1059.007"
    all:
      - id: metadata/import/builtin::require-child-process
    any:
      - id: exec-npm-install
      - id: exec-npm-install-alias
      - id: exec-npm-install-package
      - id: npm-install-save
    downgrade:
      any:
        - id: npm-install-build-combo
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: metadata/library/structure::js-large-module-bundle
  - id: stealth-runtime-npm-install
    desc: Runtime npm install uses stealth flags
    crit: hostile
    conf: 0.97
    attack: "T1195.002,T1059.007"
    mbc: "B0024"
    all:
      - id: runtime-npm-install-comp
    any:
      - id: runtime-install-stealth-flags
      - id: runtime-install-silent-loglevel
      - id: runtime-install-no-progress
      - id: micro-behaviors/process/create/spawn::windowshide-option
    needs: 2
    unless:
      - id: npm-install-build-combo
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: clx-cookieparser-runtime-stage-install
    desc: clx-cookieparser silently installs companion stage at runtime
    crit: hostile
    conf: 0.995
    attack: "T1195.002,T1059.007"
    mbc: "B0024"
    all:
      - id: runtime-npm-install-comp
      - id: runtime-clx-cookie-signature-install
    any:
      - id: runtime-install-stealth-flags
      - id: runtime-install-silent-loglevel
      - id: micro-behaviors/process/create/spawn::windowshide-option
  - id: encoded-stealth-npm-install
    desc: Encoded npm install with stealth flags
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    all:
      - id: encoded-npm-install
    any:
      - id: encoded-stealth-no-save
      - id: encoded-stealth-silent
      - id: encoded-stealth-no-audit
  - id: obfuscated-npm-dropper
    desc: Obfuscated npm package dropper chain
    crit: hostile
    conf: 0.95
    attack: "T1195.002"
    mbc: "B0024"
    size_max: 200000
    scope: leaf
    near_bytes: 4096
    all:
      - id: metadata/import/builtin::require-child-process
      - id: encoded-npm-install
      - id: micro-behaviors/process/create/spawn::stdio-ignore
  - id: silent-decoded-module-loader
    desc: Silent spawn + decoded module name require chain
    crit: hostile
    conf: 0.97
    attack: "T1195.002,T1027"
    mbc: "B0024"
    near_bytes: 1600
    all:
      - id: metadata/import/builtin::require-child-process
      - id: base64-decoded-module-const
      - id: stdio-windowshide-spawn
      - id: encoded-npm-install
