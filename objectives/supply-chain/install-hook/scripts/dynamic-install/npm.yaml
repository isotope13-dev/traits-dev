# Dynamic NPM Install from Code
# Detects runtime npm install executed via child_process
# ATT&CK: T1059.007 (JavaScript), T1195.002 (Supply Chain)
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: npm-install-build-combo
    desc: npm install followed by npm run build
    crit: component
    conf: 0.95
    if:
      type: text
      regex: "npm\\s+install.{0,40}npm\\s+run\\s+build"
  - id: exec-npm-install
    desc: Dynamic npm install via exec/spawn
    crit: notable
    conf: 0.9
    attack: "T1059.007"
    if:
      type: text
      regex: "(execSync|exec|spawn)\\s*\\([^)]{0,60}npm\\s+install[^'\")]{0,40}(\\$|--)"
    not:
      - substr: "// 'npm install --"
    downgrade:
      any:
        - id: npm-install-build-combo
  - id: exec-npm-install-package
    desc: Dynamic npm package install
    crit: component
    conf: 0.92
    attack: "T1195.002"
    if:
      type: string_literal
      regex: "^npm\\s+install\\s+(@?[a-z0-9._-]+/)?[a-z0-9._-]+$"
  - id: npm-install-save
    desc: npm install with --save flag from code
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: string_literal
      regex: "npm\\s+install\\s+[a-z@][a-z0-9._@/-]{1,60}\\s+--save(\\s|$)"
  - id: encoded-npm-install
    desc: Base64-encoded npm install command
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    if:
      type: encoded
      word: "npm install"
    unless:
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    - id: metadata/library/runtime::acquire-vscode-api
  - id: encoded-stealth-no-save
    desc: Encoded stealth flag --no-save
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: encoded
      substr: "--no-save"
  - id: encoded-stealth-silent
    desc: Encoded stealth flag --silent
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: encoded
      substr: "--silent"
  - id: encoded-stealth-no-audit
    desc: Encoded stealth flag --no-audit
    crit: component
    conf: 0.9
    attack: "T1195.002"
    if:
      type: encoded
      substr: "--no-audit"
  - id: require-dynamic-variable
    desc: Dynamic require with variable argument
    crit: notable
    conf: 0.8
    attack: "T1059.007"
    if:
      type: text
      regex: "require\\([A-Z][A-Z_]{2,}\\)"
  - id: split-spawn-decoded-cmd
    desc: Split and spawn decoded command string
    crit: notable
    conf: 0.85
    attack: "T1059.007"
    if:
      type: text
      regex: "(execSync|exec|spawn)\\s*\\([^\\n)]{0,200}\\.split\\(['\"] ['\"]\\)"
composite_rules:
  - id: runtime-npm-install-comp
    desc: Runtime npm package installation
    crit: suspicious
    conf: 0.93
    attack: "T1059.007"
    all:
      - id: metadata/import/builtin::require-child-process
    any:
      - id: exec-npm-install
      - id: exec-npm-install-package
      - id: npm-install-save
    downgrade:
      any:
        - id: npm-install-build-combo
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: metadata/library/structure::js-large-module-bundle
  - id: encoded-stealth-npm-install
    desc: Encoded npm install with stealth flags
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    all:
      - id: encoded-npm-install
    any:
      - id: encoded-stealth-no-save
      - id: encoded-stealth-silent
      - id: encoded-stealth-no-audit
  - id: obfuscated-npm-dropper
    desc: Obfuscated npm package dropper chain
    crit: hostile
    conf: 0.95
    attack: "T1195.002"
    mbc: "B0024"
    all:
      - id: metadata/import/builtin::require-child-process
      - id: encoded-npm-install
      - id: micro-behaviors/process/create/spawn::stdio-ignore
