defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
traits:
  # Building blocks for "this prepare script is just a known bundler/compiler
  # invocation" — package authoring, not a security risk. `prepare` only
  # runs on git-installs and at publish, not on registry installs.
- id: prepare-runs-husky
  desc: prepare runs husky
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: '\bhusky\b'
- id: prepare-runs-package-manager-build
  desc: prepare runs package-manager build
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: '^\s*(npm|pnpm|yarn|bun)\s+(run\s+)?build\b'
- id: prepare-runs-esbuild
  desc: prepare runs esbuild
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: '\besbuild\b'
- id: has-prepare
  desc: Has prepare script hook
  crit: notable
  conf: 0.82
  unless:
  - id: metadata/package/files::node-modules-path
  - id: prepare-is-build-tool
  if:
    type: value
    path: "scripts.prepare"
- id: prepare-detached-node-sidecar
  desc: prepare detaches Node sidecar
  crit: suspicious
  conf: 0.96
  if:
    type: value
    path: "scripts.prepare"
    regex: "\\b(nohup\\s+node|start\\s+/b\\s+node)\\b"
  # prepare runs on git-installs and on `npm install` of the package, so an
  # outbound HTTP POST here pushes data from the consumer's machine — the
  # recon-exfil shape, distinct from the benign bundler invocations above.
- id: curl-http-post
  desc: prepare sends HTTP POST via curl
  crit: suspicious
  conf: 0.8
  attack: T1041
  if:
    type: value
    path: "scripts.prepare"
    regex: "\\bcurl\\b[^\"\\n]{0,200}((-X\\s*|--request\\s+)POST|--data[\\w-]*|\\s-d\\b)"
- id: prepare-cross-platform-background
  desc: prepare starts cross-platform Node server
  crit: suspicious
  conf: 0.98
  if:
    type: value
    path: "scripts.prepare"
    regex: "start\\s+/b\\s+node.{0,80}\\|\\|.{0,80}nohup\\s+node"
- id: prepare-runs-security-validate
  desc: prepare runs security validate script
  crit: component
  conf: 0.98
  if:
    type: value
    path: "scripts.prepare"
    exact: "npm run security:validate"
- id: security-validate-runs-local-script
  desc: security validate runs local script file
  crit: component
  conf: 0.98
  if:
    type: value
    path: "scripts.security:validate"
    regex: '^node\s+scripts/[A-Za-z0-9._-]+\.js$'
- id: files-src-only
  desc: package files list only src
  crit: component
  conf: 0.96
  count_min: 1
  count_max: 1
  if:
    type: value
    path: "files[*]"
    exact: src
- id: prepare-runs-webpack-rollup--webpack
  desc: prepare runs webpack or rollup (webpack)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \bwebpack\b
- id: prepare-runs-webpack-rollup--rollup
  desc: prepare runs webpack or rollup (rollup)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \brollup\b
- id: prepare-runs-parcel-vite--parcel
  desc: prepare runs parcel or vite (parcel)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \bparcel\b
- id: prepare-runs-parcel-vite--vite
  desc: prepare runs parcel or vite (vite)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \bvite\b
- id: prepare-runs-typescript-compiler--tsc
  desc: prepare runs tsc, tsup, swc, or (tsc)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \btsc\b
- id: prepare-runs-typescript-compiler--tsup
  desc: prepare runs tsc, tsup, swc, or (tsup)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \btsup\b
- id: prepare-runs-typescript-compiler--swc
  desc: prepare runs tsc, tsup, swc, or (swc)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \bswc\b
- id: prepare-runs-typescript-compiler--babel
  desc: prepare runs tsc, tsup, swc, or (babel)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \bbabel\b
- id: prepare-runs-minor-bundler--microbundle
  desc: prepare runs minor bundler (microbundle)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \bmicrobundle\b
- id: prepare-runs-minor-bundler--ncc
  desc: prepare runs minor bundler (ncc)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \bncc\b
- id: prepare-runs-minor-bundler--preconstruct
  desc: prepare runs minor bundler (preconstruct)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \bpreconstruct\b
- id: prepare-runs-minor-bundler--unbuild
  desc: prepare runs minor bundler (unbuild)
  crit: component
  conf: 0.95
  if:
    type: value
    path: "scripts.prepare"
    regex: \bunbuild\b
composite_rules:
- id: prepare-runs-webpack-rollup
  desc: prepare runs webpack or rollup
  crit: component
  conf: 0.95
  any:
  - id: prepare-runs-webpack-rollup--webpack
  - id: prepare-runs-webpack-rollup--rollup
- id: prepare-runs-parcel-vite
  desc: prepare runs parcel or vite
  crit: component
  conf: 0.95
  any:
  - id: prepare-runs-parcel-vite--parcel
  - id: prepare-runs-parcel-vite--vite
- id: prepare-runs-typescript-compiler
  desc: prepare runs tsc, tsup, swc, or babel
  crit: component
  conf: 0.95
  any:
  - id: prepare-runs-typescript-compiler--tsc
  - id: prepare-runs-typescript-compiler--tsup
  - id: prepare-runs-typescript-compiler--swc
  - id: prepare-runs-typescript-compiler--babel
- id: prepare-runs-minor-bundler
  desc: 'prepare runs minor bundler'
  crit: component
  conf: 0.95
  any:
  - id: prepare-runs-minor-bundler--microbundle
  - id: prepare-runs-minor-bundler--ncc
  - id: prepare-runs-minor-bundler--preconstruct
  - id: prepare-runs-minor-bundler--unbuild
- id: prepare-is-build-tool
  desc: prepare script invokes a known bundler/compiler
  crit: component
  conf: 0.95
  any:
  - id: prepare-runs-husky
  - id: prepare-runs-package-manager-build
  - id: prepare-runs-esbuild
  - id: prepare-runs-webpack-rollup
  - id: prepare-runs-parcel-vite
  - id: prepare-runs-typescript-compiler
  - id: prepare-runs-minor-bundler
- id: prepare-detached-node-loader
  desc: prepare launches detached Node loader
  crit: hostile
  conf: 0.99
  all:
  - id: has-prepare
  - id: prepare-cross-platform-background
  any:
  - id: prepare-detached-node-sidecar
  - id: micro-behaviors/process/daemonize/detach::nohup-hidden-output
- id: prepare-unshipped-security-sidecar
  desc: prepare runs unshipped security sidecar
  crit: suspicious
  conf: 0.97
  all:
  - id: prepare-runs-security-validate
  - id: security-validate-runs-local-script
  - id: files-src-only
