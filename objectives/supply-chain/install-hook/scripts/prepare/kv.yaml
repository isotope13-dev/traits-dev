defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
traits:
  # Building blocks for "this prepare script is just a known bundler/compiler
  # invocation" — package authoring, not a security risk. `prepare` only
  # runs on git-installs and at publish, not on registry installs.
  - id: prepare-runs-husky
    desc: prepare runs husky
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "scripts.prepare"
      regex: '\bhusky\b'
  - id: prepare-runs-package-manager-build
    desc: prepare runs `npm/pnpm/yarn run build`
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "scripts.prepare"
      regex: '^\s*(npm|pnpm|yarn)\s+(run\s+)?build\b'
  - id: prepare-runs-esbuild
    desc: prepare runs esbuild
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "scripts.prepare"
      regex: '\besbuild\b'
  - id: prepare-runs-webpack-rollup
    desc: prepare runs webpack or rollup
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "scripts.prepare"
      regex: '\b(webpack|rollup)\b'
  - id: prepare-runs-parcel-vite
    desc: prepare runs parcel or vite
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "scripts.prepare"
      regex: '\b(parcel|vite)\b'
  - id: prepare-runs-typescript-compiler
    desc: prepare runs tsc, tsup, swc, or babel
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "scripts.prepare"
      regex: '\b(tsc|tsup|swc|babel)\b'
  - id: prepare-runs-minor-bundler
    desc: prepare runs microbundle, ncc, preconstruct, or unbuild
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "scripts.prepare"
      regex: '\b(microbundle|ncc|preconstruct|unbuild)\b'
  - id: has-prepare
    desc: Has prepare script hook
    crit: notable
    conf: 0.82
    unless:
      - type: basename
        regex: '[\\/]node_modules[\\/]'
      - id: prepare-is-build-tool
    if:
      type: kv
      path: "scripts.prepare"
  - id: prepare-detached-node-sidecar
    desc: prepare detaches Node sidecar
    crit: suspicious
    conf: 0.96
    if:
      type: kv
      path: "scripts.prepare"
      regex: "\\b(nohup\\s+node|start\\s+/b\\s+node)\\b"
  - id: prepare-cross-platform-background
    desc: prepare starts cross-platform Node server
    crit: suspicious
    conf: 0.98
    if:
      type: kv
      path: "scripts.prepare"
      regex: "start\\s+/b\\s+node.{0,80}\\|\\|.{0,80}nohup\\s+node"
composite_rules:
  - id: prepare-is-build-tool
    desc: prepare script invokes a known bundler/compiler
    crit: component
    conf: 0.95
    any:
      - id: prepare-runs-husky
      - id: prepare-runs-package-manager-build
      - id: prepare-runs-esbuild
      - id: prepare-runs-webpack-rollup
      - id: prepare-runs-parcel-vite
      - id: prepare-runs-typescript-compiler
      - id: prepare-runs-minor-bundler
  - id: prepare-detached-node-loader
    desc: prepare launches detached Node loader
    crit: hostile
    conf: 0.99
    all:
      - id: has-prepare
      - id: prepare-cross-platform-background
    any:
      - id: prepare-detached-node-sidecar
      - id: micro-behaviors/process/daemonize/detach::nohup-hidden-output
