defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: T1195.002
traits:
  - id: has-prepare
    desc: Has prepare script hook
    crit: notable
    conf: 0.82
    unless:
      - type: basename
        regex: '[\\/]node_modules[\\/]'
      - type: kv
        path: "scripts.prepare"
        exact: "husky install"
      - type: kv
        path: "scripts.prepare"
        exact: "npm run build"
      - type: kv
        path: "scripts.prepare"
        exact: "yarn build"
    if:
      type: kv
      path: "scripts.prepare"
  - id: prepare-detached-node-sidecar
    desc: prepare detaches Node sidecar
    crit: suspicious
    conf: 0.96
    if:
      type: kv
      path: "scripts.prepare"
      regex: "\\b(nohup\\s+node|start\\s+/b\\s+node)\\b"
  - id: prepare-cross-platform-background
    desc: prepare starts cross-platform Node server
    crit: suspicious
    conf: 0.98
    if:
      type: kv
      path: "scripts.prepare"
      regex: "start\\s+/b\\s+node.{0,80}\\|\\|.{0,80}nohup\\s+node"
composite_rules:
  - id: prepare-detached-node-loader
    desc: prepare launches detached Node loader
    crit: hostile
    conf: 0.99
    all:
      - id: has-prepare
      - id: prepare-cross-platform-background
    any:
      - id: prepare-detached-node-sidecar
      - id: micro-behaviors/process/daemonize::nohup-hidden-output
