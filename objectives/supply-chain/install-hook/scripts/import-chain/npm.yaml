defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
  attack: T1195.002
traits:
  - id: vm-run-context
    desc: vm.runInContext call
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: vm\.runInContext
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::is-test
        - id: metadata/package/testing/harness/runtime::node-inspector-harness
  - id: buffer-from-b64
    desc: Buffer.from with large base64
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: Buffer\.from\(['"][A-Za-z0-9+/=]{100,}['"]
    unless:
      - type: basename
        regex: ^yarn-[0-9][0-9.]*\.cjs$
  - id: atob-large
    desc: atob with large base64
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: atob\(['"][A-Za-z0-9+/=]{100,}['"]

  - id: chrome-windows-userdata
    desc: Chrome Windows User Data path
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      substr: Local/Google/Chrome/User Data
  - id: chrome-appdata
    desc: Chrome AppData path
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      substr: AppData/Local/Google/Chrome
  - id: chrome-linux-config
    desc: Chrome Linux config path
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      substr: .config/google-chrome
  - id: chrome-macos-support
    desc: Chrome macOS Application Support path
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      substr: Application Support/Google/Chrome
  - id: scripts-preinstall-pipe-1
    desc: preinstall pipe (curl/wget with |/;/&&)
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: scripts.preinstall
      regex: (curl|wget).{0,50}(\||;|&&)
  - id: scripts-preinstall-pipe-2
    desc: preinstall pipe (executors node/sh/shell/eval)
    crit: notable
    conf: 0.75
    if:
      type: value
      path: scripts.preinstall
      regex: (node|sh|shell|eval)
  - id: scripts-postinstall-pipe-1
    desc: postinstall pipe (curl/wget with |/;/&&)
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: scripts.postinstall
      regex: (curl|wget).{0,50}(\||;|&&)
  - id: scripts-postinstall-pipe-2
    desc: postinstall pipe (executors node/sh/shell/eval)
    crit: notable
    conf: 0.75
    if:
      type: value
      path: scripts.postinstall
      regex: (node|sh|shell|eval)
  - id: scripts-preinstall-node-e
    desc: preinstall node -e with URL
    crit: suspicious
    conf: 0.95
    for:
      - package.json
    if:
      type: value
      path: scripts.preinstall
      regex: node\s+-e\s+['"].{0,100}https?://
  - id: scripts-postinstall-node-e
    desc: postinstall node -e with URL
    crit: suspicious
    conf: 0.95
    for:
      - package.json
    if:
      type: value
      path: scripts.postinstall
      regex: node\s+-e\s+['"].{0,100}https?://
  - id: scripts-preinstall-shell-1
    desc: preinstall runs shell command (network)
    crit: notable
    conf: 0.7
    if:
      type: value
      path: scripts.preinstall
      regex: \b(curl|wget)\b
  - id: scripts-preinstall-shell-2
    desc: preinstall runs shell command (interpreters)
    crit: notable
    conf: 0.6
    if:
      type: value
      path: scripts.preinstall
      regex: \b(sh|shell|powershell)\b
  - id: scripts-postinstall-shell-1
    desc: postinstall runs shell command (network)
    crit: notable
    conf: 0.7
    if:
      type: value
      path: scripts.postinstall
      regex: \b(curl|wget)\b
  - id: scripts-postinstall-shell-2
    desc: postinstall runs shell command (interpreters)
    crit: notable
    conf: 0.5
    if:
      type: value
      path: scripts.postinstall
      regex: \b(sh|shell|powershell)\b
composite_rules:
  - id: scripts-preinstall-pipe
    desc: preinstall download-execute pipe
    crit: suspicious
    conf: 0.95
    for:
      - package.json
    all:
      - id: scripts-preinstall-pipe-1
      - id: scripts-preinstall-pipe-2
  - id: scripts-postinstall-pipe
    desc: postinstall download-execute pipe
    crit: suspicious
    conf: 0.95
    for:
      - package.json
    all:
      - id: scripts-postinstall-pipe-1
      - id: scripts-postinstall-pipe-2
  - id: scripts-preinstall-shell
    desc: preinstall runs shell command
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    any:
      - id: scripts-preinstall-shell-1
      - id: scripts-preinstall-shell-2
  - id: scripts-postinstall-shell
    desc: postinstall runs shell command
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    any:
      - id: scripts-postinstall-shell-1
      - id: scripts-postinstall-shell-2
  - id: http-client-imports
    desc: HTTP client imports
    crit: notable
    conf: 0.5
    any:
      - id: metadata/import/npm/axios
      - id: metadata/import/npm/node-fetch
      - id: metadata/import/npm/got
      - id: metadata/import/npm/request
      - id: objectives/supply-chain/metadata-anomaly/package-code/npm::require-https-dup
  - id: fs-imports
    desc: File system imports
    crit: notable
    conf: 0.5
    any:
      - id: metadata/import/npm/fs
      - id: metadata/import/npm/fs-extra
      - id: metadata/import/builtin/node::require-fs
  - id: child-process-imports
    desc: Child process execution imports
    crit: notable
    conf: 0.7
    any:
      - id: metadata/import/npm/child_process
      - id: metadata/import/builtin/node::require-child-process
      - id: micro-behaviors/process/create/shell/bridge::child-process-member-exec-call
  - id: dynamic-eval-imports
    desc: Dynamic code evaluation patterns
    crit: notable
    conf: 0.75
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: vm-run-context
  - id: install-hook-exec
    desc: Install hook with command execution
    crit: suspicious
    conf: 0.85
    for:
      - package.json
    any:
      - id: scripts-preinstall-shell
      - id: scripts-postinstall-shell
  - id: obfuscated-payload
    desc: Obfuscated payload in package
    crit: suspicious
    conf: 0.85
    any:
      - id: buffer-from-b64
      - id: atob-large
      - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
  - id: network-eval-exec-chain
    desc: Network fetch with eval and exec
    crit: suspicious
    conf: 0.9
    near_lines: 80
    all:
      - id: http-client-imports
      - id: dynamic-eval-imports
      - id: child-process-imports
  - id: browser-data-access
    desc: Accesses browser data directories
    crit: suspicious
    conf: 0.9
    any:
      - id: chrome-windows-userdata
      - id: chrome-appdata
      - id: chrome-linux-config
      - id: chrome-macos-support
      - id: objectives/credential-access/browser/firefox::profiles-path
  - id: install-hook-dropper
    desc: Install hook downloads and executes payload
    crit: hostile
    conf: 0.95
    mbc: B0024
    any:
      - id: scripts-preinstall-pipe
      - id: scripts-postinstall-pipe
      - id: scripts-preinstall-node-e
      - id: scripts-postinstall-node-e
  - id: browser-credential-stealer
    desc: Steals browser credentials
    crit: hostile
    conf: 0.95
    mbc: E1555
    attack: T1555.003
    near_lines: 120
    all:
      - id: browser-data-access
      - id: fs-imports
      - id: http-client-imports
    any:
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
      - id: objectives/credential-access/browser/firefox::logins
      - id: objectives/credential-access/browser/firefox::cookies-dup
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
