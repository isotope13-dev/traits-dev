  - id: manifest-node-inline-eval
  - id: manifest-inline-decoder
  any:
  - id: manifest-charcode-numeric-array
  - id: manifest-charcode-hex-array
  - id: manifest-node-execpath-respawn
  # Install hook that decodes module names dynamically. Even when the payload is
  # fetched at runtime rather than embedded, an obfuscated hook must require the
  # network/exec module (https/net/child_process) by a decoded name to hide it.
  # node -e + inline decoder + require(fn([...])) is a definitive obfuscated
  # loader regardless of whether the second stage is embedded or downloaded.
- id: install-hook-encoded-dynamic-require
