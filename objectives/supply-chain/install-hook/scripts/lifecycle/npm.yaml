# npm package.json Script Patterns
# Detects suspicious patterns in npm package scripts
# MBC: B0024 (Execution), C0002 (Download)
# ATT&CK: T1059 (Command Interpreter), T1105 (Ingress Tool Transfer)
defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
  # === Hook Existence Detection ===
  # GuardDog: Detect the existence of install hooks
- id: has-preinstall
  desc: Has preinstall script hook
  crit: notable
  conf: 0.85
  attack: "T1195.002"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
  - type: value
    path: "name"
    exact: "civicrm"
  - id: well-known/app/civicrm/
  - type: path
    substr: civicrm-civicrm-core-
  - id: well-known/app/civicrm/
  - id: metadata/package/manifest/runtime::vscode-extension
  - type: value
    path: "keywords"
    regex: tabby-builtin-plugin
  - type: value
    path: "scripts.preinstall"
    exact: "npx only-allow pnpm"
  if:
    type: value
    path: "scripts.preinstall"
  not:
  - exact: "npx patch-package"
  - exact: "nuxt prepare"
  - exact: "npx only-allow pnpm"
  - exact: "prisma generate"
  - exact: "ibmtelemetry --config=telemetry.yml"
  - exact: "husky install"
  - substr: "tsc || exit 0"
  - exact: "patch-package"
  - exact: "husky"
  - exact: "node -e 'process.exit(0)'"
- id: has-postinstall
  desc: Has postinstall script hook
  crit: notable
  conf: 0.85
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.postinstall"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
  - id: metadata/package/manifest/runtime::vscode-extension
  - type: value
    path: "keywords"
    regex: tabby-builtin-plugin
  - id: metadata/package/scripts::postinstall-protobuf-codegen-download
  - id: metadata/package/scripts/
  - id: metadata/library/automation::playwright-browser-install-script
  not:
  - exact: "run-script-os"
  - exact: "npx patch-package"
  - exact: "husky install"
  - exact: "patch-package"
  - exact: "husky"
  - exact: "node -e 'process.exit(0)'"
- id: postinstall-windows-program
  desc: Postinstall invokes a Windows executable
  crit: suspicious
  conf: 0.96
  attack: "T1195.002,T1059.003"
  if:
    type: value
    path: "scripts.postinstall"
    regex: '(?i)(^|[;&|[:space:]])([A-Za-z]:[\\/])?[A-Za-z0-9_.-]+\.exe\b'
- id: has-install
  desc: Has install script hook
  crit: notable
  conf: 0.85
  attack: "T1195.002"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
  if:
    type: text
    regex: '"scripts"\s*:\s*\{[\s\S]{0,600}"install"\s*:'
- id: install-runs-node-local-script
  desc: install hook runs a local Node.js script
  crit: notable
  conf: 0.95
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.install"
    regex: "(^|[;&]{1,2})\\s*node\\s+(\\./?)?[A-Za-z0-9_./-]{1,80}\\.([cm]?js)(\\s|$)"
  downgrade:
    any:
    - id: metadata/package/dependencies::has-optional-deps
- id: preinstall-runs-node-local-script
  desc: preinstall hook runs a local Node.js script
  crit: notable
  conf: 0.97
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "(^|[;&]{1,2})\\s*node\\s+(\\./?)?[A-Za-z0-9_./-]{1,80}\\.([cm]?js)(\\s|$)"
  downgrade:
    any:
    - id: metadata/package/dependencies::has-optional-deps
- id: postinstall-runs-ts-node-local-script
  desc: postinstall runs local ts-node script
  crit: suspicious
  conf: 0.96
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "^ts-node\\s+(\\./)?[A-Za-z0-9_./-]{1,80}\\.(js|ts)$"
  unless:
  - type: value
    path: "scripts.postinstall"
    substr: "node_modules/"
  - type: value
    path: "scripts.postinstall"
    substr: "--transpile-only"
- id: postinstall-runs-init-js
  desc: postinstall runs init.js
  crit: suspicious
  conf: 0.96
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.postinstall"
    exact: "node init.js"
- id: postinstall-supervisor-start-local-js-marker
  desc: postinstall starts local JavaScript daemon
  crit: suspicious
  conf: 0.97
  attack: "T1195.002,T1053"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "^forever\\s+start\\s+(\\./)?[A-Za-z0-9_./-]{1,120}\\.(c?js|mjs)$"
- id: files-list-init-js
  desc: files array lists init.js
  crit: component
  conf: 0.9
  if:
    type: value
    path: "files[*]"
    regex: "^(\\./)?init\\.(c?js|mjs)$"
- id: has-files-array
  desc: package.json defines files array
  crit: component
  conf: 0.9
  if:
    type: value
    path: "files"
- id: postinstall-runs-shell-local-script
  desc: postinstall runs local shell script
  crit: suspicious
  conf: 0.95
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "^(bash|sh)\\s+(\\./)?[A-Za-z0-9_./-]{1,120}\\.sh$"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
  - type: value
    path: "name"
    exact: "civicrm"
- id: postinstall-node-script-suppressed
  desc: postinstall runs suppressed Node script
  crit: notable
  conf: 0.96
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "^node\\s+(\\./)?[A-Za-z0-9_./-]{1,120}\\.(c?js|mjs)\\s*\\|\\|\\s*true$"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: postinstall-js-file
  desc: JavaScript file named npm postinstall hook
  crit: component
  conf: 0.84
  for: [javascript, typescript]
  if:
    type: path
    regex: 'postinstall\.(c?js|mjs)$'
- id: postinstall-runs-inject-js
  desc: postinstall runs injector script
  crit: suspicious
  conf: 0.97
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "^node\\s+(\\./)?scripts/inject\\.(c?js|mjs)$"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: inject-js-basename
  desc: JavaScript injector filename
  crit: component
  conf: 0.8
  for: [javascript, typescript]
  if:
    type: path
    basename: true
    regex: '(?i)(^|[\\/])inject\.(c?js|mjs)$'
- id: preinstall-rundll32-dll
  desc: preinstall executes DLL via rundll32
  crit: suspicious
  conf: 0.98
  attack: "T1195.002, T1218.011"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\brundll32(\\.exe)?\\b[^\"\\n]{0,180}\\.dll\\b"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: preinstall-taskkill-process
  desc: preinstall kills Windows processes
  crit: suspicious
  conf: 0.96
  attack: "T1195.002, T1489"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\btaskkill\\b.{0,120}/(F|PID|IM)\\b"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: preinstall-process-kill-signal
  desc: preinstall kills processes by signal
  crit: suspicious
  conf: 0.95
  attack: "T1195.002, T1489"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "process\\.kill\\([^\\n]{0,160}SIG(KILL|TERM)"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: preinstall-heartbeat-pid-files
  desc: preinstall references heartbeat PID files
  crit: component
  conf: 0.9
  if:
    type: value
    path: "scripts.preinstall"
    substr: heartbeats
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: preinstall-rename-sync-call
  desc: preinstall renames files
  crit: component
  conf: 0.9
  if:
    type: value
    path: "scripts.preinstall"
    substr: fs.renameSync
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: preinstall-native-module-file-ref
  desc: "preinstall references DLL or native mod files"
  crit: component
  conf: 0.9
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\.(dll|node)\\b"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: preinstall-locked-file-suffix
  desc: preinstall creates locked file suffix
  crit: component
  conf: 0.92
  if:
    type: value
    path: "scripts.preinstall"
    substr: locked-
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: install-rundll32-dll
  desc: install executes DLL via rundll32
  crit: suspicious
  conf: 0.98
  attack: "T1195.002, T1218.011"
  if:
    type: value
    path: "scripts.install"
    regex: "\\brundll32(\\.exe)?\\b[^\"\\n]{0,180}\\.dll\\b"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: postinstall-rundll32-dll
  desc: postinstall executes DLL via rundll32
  crit: suspicious
  conf: 0.98
  attack: "T1195.002, T1218.011"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "\\brundll32(\\.exe)?\\b[^\"\\n]{0,180}\\.dll\\b"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
  # === Notify-based Pingback Detection ===
  # Detect notify.js as postinstall target (pingback variant)
- id: postinstall-notify-js
  desc: postinstall runs notify.js script
  crit: suspicious
  conf: 0.96
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.postinstall"
    substr: "notify.js"
- id: postinstall-notify-js-path
  desc: postinstall runs notify.js with path
  crit: suspicious
  conf: 0.94
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "node\\s+[^\"\\n]{0,50}notify\\.js"
  # === Test Script Abuse ===
      # Detect test scripts that perform network exfil instead of testing
- id: test-script-exfil
  desc: Test script with command substitution
  crit: suspicious
  conf: 0.95
  attack: "T1041"
  if:
    type: value
    path: "scripts.test"
    regex: "https?://[^\"'\\s]{0,120}\\$\\("
      # === Script Content Patterns ===
      # Detect dangerous commands in install scripts
- id: script-curl
  desc: Script uses curl
  crit: notable
  conf: 0.8
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\bcurl\\b"
- id: script-wget
  desc: Script uses wget
  crit: notable
  conf: 0.8
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\bwget\\b"
- id: script-pipe-sh
  desc: Script pipes to sh
  crit: suspicious
  conf: 0.85
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\|\\s*sh\\b"
- id: script-pipe-shell
  desc: Script pipes to shell
  crit: suspicious
  conf: 0.85
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\|\\s*shell\\b"
- id: script-pipe-node
  desc: Script pipes to node
  crit: suspicious
  conf: 0.85
  if:
    type: value
    path: "scripts.preinstall"
    regex: "(^|[^|])\\|\\s*node\\b"
- id: wasm-pack-installer-script-url
  desc: wasm-pack installer script URL
  crit: baseline
  conf: 0.98
  if:
    type: text
    substr: rustwasm.github.io/wasm-pack/installer/init.sh
- id: postinstall-pipe-node
  desc: postinstall pipes output to node
  crit: suspicious
  conf: 0.94
  attack: "T1195.002, T1059.007"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "(^|[^|])\\|\\s*node\\b"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: postinstall-node-loader-pipe
  desc: postinstall node loader pipe
  crit: suspicious
  conf: 0.95
  attack: "T1195.002, T1059.007"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "^node\\s+(\\./)?[A-Za-z0-9_.-]{1,80}\\s*\\|\\s*node\\b"
  unless:
  - id: metadata/package/files/dependency::node-modules-path
- id: script-eval
  desc: Script uses eval
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\beval\\b"
- id: script-base64-word
  desc: Script uses base64
  crit: notable
  conf: 0.8
  if:
    type: value
    path: "scripts.preinstall"
    substr: "base64"
- id: script-atob-word
  desc: Script uses atob
  crit: notable
  conf: 0.8
  if:
    type: value
    path: "scripts.preinstall"
    substr: "atob"
- id: script-btoa-word
  desc: Script uses btoa
  crit: notable
  conf: 0.8
  if:
    type: value
    path: "scripts.preinstall"
    substr: "btoa"
- id: script-hidden-file-1
  desc: Script hidden file (base)
  crit: notable
  conf: 0.75
  if:
    type: value
    path: "scripts"
    regex: "\"(preinstall|postinstall|install)\":\".{0,220}/\\.[ac-z]"
  unless:
  # Build pipelines commonly place generated CSS/assets below a dot-prefixed
  # scratch directory. That is not hidden-payload staging when the same hook
  # creates the directory and invokes a stylesheet/build tool for the output.
  - type: value
    path: "scripts[*]"
    regex: '(?i)(mkdir|sass)[^\n]{0,160}/\.tmp(?:/|\s|$)'
- id: script-credential-dotfile
  desc: npm script references credential dotfile
  crit: notable
  conf: 0.9
  attack: "T1552.001"
  if:
    type: value
    path: "scripts[*]"
    regex: '[/~]?\.(npmrc|pypirc|netrc)\b'
- id: script-tmp-dir
  desc: Script uses /tmp directory
  crit: notable
  conf: 0.7
  if:
    type: value
    path: "scripts.preinstall"
    substr: "/tmp/"
- id: script-http-url
  desc: Script contains HTTP URL
  crit: notable
  conf: 0.75
  if:
    type: value
    path: "scripts.preinstall"
    regex: "https?://"
- id: preinstall-webhook-site-url
  desc: preinstall targets webhook.site
  crit: suspicious
  conf: 0.96
  attack: "T1041"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "https?://webhook\\.site/[A-Fa-f0-9-]{20,}"
- id: postinstall-webhook-site-url
  desc: postinstall targets webhook.site
  crit: suspicious
  conf: 0.96
  attack: "T1041"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "https?://webhook\\.site/[A-Fa-f0-9-]{20,}"
- id: install-webhook-site-url
  desc: install targets webhook.site
  crit: suspicious
  conf: 0.96
  attack: "T1041"
  if:
    type: value
    path: "scripts.install"
    regex: "https?://webhook\\.site/[A-Fa-f0-9-]{20,}"
- id: preinstall-node-https-get
  desc: preinstall uses Node HTTPS GET
  crit: suspicious
  conf: 0.95
  attack: "T1041"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "require\\([\"']https[\"']\\).{0,80}\\.get\\("
- id: preinstall-node-os-hostname
  desc: preinstall reads os.hostname
  crit: suspicious
  conf: 0.94
  attack: "T1082"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "require\\([\"']os[\"']\\)\\.hostname\\("
- id: preinstall-node-os-userinfo
  desc: preinstall reads os.userInfo
  crit: suspicious
  conf: 0.96
  attack: "T1033"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "require\\([\"']os[\"']\\)\\.userInfo\\(\\)\\.username"
- id: preinstall-node-os-platform
  desc: preinstall reads os.platform
  crit: suspicious
  conf: 0.92
  attack: "T1082"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "require\\([\"']os[\"']\\)\\.platform\\("
- id: preinstall-node-dns-lookup
  desc: preinstall resolves DNS via Node dns
    # DNS resolution inside an install hook is abnormal and is the OAST/canary
    # DNS-exfil channel: host data is encoded into a subdomain of the callback
    # domain and leaked via the resolver even when egress HTTP is filtered.
  crit: suspicious
  conf: 0.9
  attack: "T1048.003"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "require\\([\"']dns[\"']\\)\\.(lookup|resolve)"
- id: preinstall-url-query-profile-keys
  desc: preinstall sends host user platform params
  crit: suspicious
  conf: 0.95
  attack: "T1041"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\?(pkg|h)="
- id: script-sysinfo-cmd-2
  desc: Script runs system info (ifconfig/ip addr)
  crit: notable
  conf: 0.8
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\b(ifconfig|ip\\s+addr)\\b"
- id: script-sysinfo-cmd-3
  desc: Script runs pwd or env discovery
  crit: notable
  conf: 0.8
  attack: "T1083"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\$\\(pwd\\)|\\bpwd\\b|\\$\\(id\\)"
- id: script-network-exfil-vars
  desc: 'Network request with command substitution'
  crit: suspicious
  conf: 0.95
  attack: "T1041"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "https?://[^\"'\\s]{0,120}\\$\\("
- id: script-multi-param-exfil
  desc: "URL with multiple command substitution params"
  crit: suspicious
  conf: 0.95
  attack: "T1041"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\$\\([a-z]{2,15}\\).{0,80}\\$\\([a-z]{2,15}\\)"
- id: preinstall-netcat-shell
  desc: preinstall uses netcat shell exec
  crit: suspicious
  conf: 0.97
  attack: "T1059.004"
  if:
    type: value
    path: "scripts.preinstall"
    substr: "nc -c sh"
- id: preinstall-external-ip
  desc: preinstall embeds external IPv4
  crit: notable
  conf: 0.9
  attack: "T1071"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "(\\d{1,3}\\.){3}\\d{1,3}"
- id: preinstall-ip-port-endpoint
  desc: preinstall contains IPv4 endpoint
  crit: suspicious
  conf: 0.93
  attack: "T1571"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "(\\d{1,3}\\.){3}\\d{1,3}\\s+[1-9][0-9]{1,4}"
- id: preinstall-nohup-node
  desc: preinstall detaches node sidecar
  crit: suspicious
  conf: 0.95
  attack: "T1195.002"
  if:
    type: value
    path: "scripts.preinstall"
    regex: "\\bnohup\\s+node\\s+[^\"\\n]{1,80}\\.js\\b"
- id: preinstall-devnull-redir
  desc: preinstall suppresses output to devnull
  crit: suspicious
  conf: 0.92
  attack: "T1564"
  if:
    type: value
    path: "scripts.preinstall"
    regex: ">/dev/null\\s+2>&1"
- id: postinstall-find-dot-ssh
  desc: postinstall enumerates ~/.ssh
  crit: suspicious
  conf: 0.96
  attack: "T1552.004"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "\\bfind\\s+~/?\\.ssh\\b"
- id: postinstall-xargs-cat
  desc: postinstall pipes file list to cat
  crit: suspicious
  conf: 0.93
  attack: "T1552.004"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "\\|\\s*xargs\\s+cat\\b"
- id: postinstall-ssh-key-dump-pipeline
  desc: postinstall dumps ~/.ssh files
  crit: suspicious
  conf: 0.98
  attack: "T1552.004"
  if:
    type: value
    path: "scripts.postinstall"
    regex: "\\bfind\\s+~/?\\.ssh\\b[^\\n|]{0,40}\\|\\s*xargs\\s+cat\\b"
- id: has-preinstall-raw
  desc: Raw content contains preinstall hook
  crit: notable
  conf: 0.88
  unless:
  - type: text
    regex: '"preinstall"\s*:\s*"npx only-allow pnpm"'
  - id: metadata/package/scripts::preinstall-root-install-guard-script
  if:
    type: text
    regex: '"preinstall"\s*:|preinstall\s*='
- id: encoded-npm-cmd
  desc: Encoded or node-inline npm command
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: '(?i)"(preinstall|install|postinstall)"\s*:\s*".{0,120}node\s+-e'
  unless:
  - type: text
    regex: 'process\.exit\(0\)'
  - type: text
    regex: 'node\s+-e\s+\\?"try\s*\{\s*require\('
  - id: well-known/tool/development/aube::aube-package-test-fixture
  - type: value
    path: "scripts.preinstall"
    regex: 'node\s+-e\s+\\?["''][^"\n]{0,120}\.(copyFileSync|mkdirSync)\('
  - type: value
    path: "scripts.install"
    regex: 'node\s+-e\s+\\?["''][^"\n]{0,120}\.(copyFileSync|mkdirSync)\('
  - type: value
    path: "scripts.postinstall"
    regex: 'node\s+-e\s+\\?["''][^"\n]{0,120}\.(copyFileSync|mkdirSync)\('
  - id: metadata/package/scripts/
  - id: metadata/package/manifest/runtime::vscode-extension
  # === Obfuscated program embedded in a lifecycle command ===
  # An install hook that runs `node -e`/`--eval` and reconstructs its program
  # from an inline decoder is decoding an obfuscated payload at install time. No
  # legitimate lifecycle command encodes the code it executes; the decoder
  # defeats static review of the manifest. These primitives anchor on the
  # decode-and-run shape (not IOCs) and are split so the composites survive
  # decoder-swap, radix-swap, and bracket-notation evasions.
  #
  # Primitive: an inline node program in a manifest script.
- id: manifest-node-inline-eval
  desc: Manifest script runs an inline node program
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'node\s+(-e|--eval)\b'
  # Primitive: char-code decoder reached by dot OR bracket notation
  # (String["fromCharCode"]), so bracket-notation cannot hide the decoder.
- id: manifest-decoder-charcode
  desc: Manifest builds strings from character codes
  crit: component
  conf: 0.85
  attack: "T1027"
  if:
    type: text
    regex: 'from(CharCode|CodePoint)'
  # Primitive: the other inline decoders an obfuscated hook may swap in instead
  # of char codes (base64, percent/URI escape). Covers the decoder-swap evasion.
- id: manifest-decoder-encoded
  desc: Manifest decodes base64 or escaped data inline
  crit: component
  conf: 0.8
  attack: "T1027"
  if:
    type: text
    regex: '(atob\(|Buffer\.from\(|unescape\(|decodeURIComponent\()'
  # A long all-numeric array literal in the manifest is a byte-packed program
  # (each element a character code). Manifests never carry 80+ element arrays.
- id: manifest-charcode-numeric-array
  desc: Manifest embeds a long char-code numeric array
  crit: notable
  conf: 0.9
  attack: "T1027"
  if:
    type: text
    regex: '\[\d{1,3}(,\d{1,3}){80,}\]'
  # Radix-swap evasion: the same byte-packed program written as a hex array
  # (`[0x28,0x66,...]`) rather than decimal.
- id: manifest-charcode-hex-array
  desc: Manifest embeds a long hex char-code array
  crit: notable
  conf: 0.9
  attack: "T1027"
  if:
    type: text
    regex: '\[0x[0-9a-fA-F]{1,2}(,\s?0x[0-9a-fA-F]{1,2}){80,}\]'
  # process.execPath in a manifest = the install command respawns the Node
  # interpreter on itself (self-spawn loader), almost always paired with a
  # decoded `--eval` body and detached/ignored stdio to survive the install.
  # Dot or bracket notation (process["execPath"]).
- id: manifest-node-execpath-respawn
  desc: Manifest command respawns the Node interpreter
  crit: notable
  conf: 0.9
  attack: "T1059.007"
  if:
    type: text
    regex: 'process\s*[.\[]\s*["'']?execPath'
  # require() of a decoder applied to an array literal — require(fn([99,104,..]))
  # loads a module (child_process/https/net/fs) by a char-code-decoded name, the
  # standard way an obfuscated hook hides which capability it pulls in. This is
  # the signal that survives a runtime-fetch variant: even when the payload is
  # downloaded rather than embedded, the network/exec module must be required by
  # a decoded name. No legitimate manifest computes a module name from an array.
- id: manifest-encoded-require
  desc: Manifest requires a decoded module name
  crit: notable
  conf: 0.9
  attack: "T1027"
  if:
    type: text
    regex: 'require\s*\(\s*\w+\s*\(\s*\['
- id: silent-npm-lifecycle-dropper
  desc: Silent npm lifecycle dropper
  crit: suspicious
  conf: 0.95
  for: [package.json, javascript]
  if:
    type: text
    regex: '(?is)"(preinstall|postinstall)"\s*:\s*"[^"\n]{0,200}(/dev/null|silent:\s*true)'
  unless:
  - type: value
    path: "scripts.preinstall"
    exact: ":; (node ./preinstall.js > /dev/null 2>&1 || true)"
  - type: text
    regex: 'process\.exit\(0\)'
  - type: text
    regex: '"installationMethod"\s*:\s*"deb"'
  - id: metadata/package/manifest/freeform::npm-template-manifest-placeholder
  - type: text
    regex: 'node\s+-e\s+\\?"try\s*\{\s*require\('
      # Canonical native-module rebuilders legitimately silence stderr in a
      # postinstall (electron-rebuild -f -w … 2>/dev/null; exit 0). Not a dropper.
  - type: text
    regex: '(electron-rebuild|node-gyp-build|prebuild-install|node-pre-gyp)'
  - type: text
    regex: 'node-gyp\s+(rebuild|configure|build)'
- id: lifecycle-script-basename
  desc: npm lifecycle script basename
  crit: component
  for: [shell]
  if:
    type: path
    basename: true
    regex: '(install|prepare)\.(sh|bash)$'
