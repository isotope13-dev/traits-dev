  desc: Manifest decodes obfuscated data inline
  crit: component
  any:
  - id: manifest-decoder-charcode
  - id: manifest-decoder-encoded
  # Standalone signal: a manifest script runs an inline node program AND decodes
  # data inside it. Suspicious on its own (no benign hook decodes its command);
  # the hostile composites add a second packed-program/respawn signal. Kept under
  # this id because metadata-anomaly and stealth-spawn reference it.
- id: lifecycle-node-eval-charcode-program
  desc: Manifest node program decodes data inline
  crit: suspicious
  conf: 0.95
  attack: "T1027, T1195.002"
  mbc: "E1027, B0032"
  all:
  - id: manifest-node-inline-eval
  - id: manifest-inline-decoder
  # Install hook that decodes and runs an encoded program. The hook encodes its
  # payload (defeating manifest review) and either ships the program as a long
  # numeric/hex array or respawns Node on the decoded body. Either pairing is a
  # definitive obfuscated install-time loader.
- id: install-hook-charcode-encoded-loader
  desc: Install hook decodes and runs an encoded program
  crit: hostile
  conf: 0.98
  attack: "T1027, T1059.007, T1195.002"
  mbc: "E1027, B0032"
