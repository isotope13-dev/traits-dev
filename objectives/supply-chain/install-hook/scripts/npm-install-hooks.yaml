# npm package.json Script Patterns
# Detects suspicious patterns in npm package scripts
# MBC: B0024 (Execution), C0002 (Download)
# ATT&CK: T1059 (Command Interpreter), T1105 (Ingress Tool Transfer)
defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
  # === Hook Existence Detection ===
  # GuardDog: Detect the existence of install hooks
  - id: has-preinstall
    desc: Has preinstall script hook
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    unless:
      - type: basename
        regex: '[\\/]node_modules[\\/]'
      - type: kv
        path: "keywords"
        regex: tabby-builtin-plugin
      - type: kv
        path: "scripts.preinstall"
        exact: "npx only-allow pnpm"
    if:
      type: kv
      path: "scripts.preinstall"
    not:
      - exact: "npx patch-package"
      - exact: "nuxt prepare"
      - exact: "npx only-allow pnpm"
      - exact: "prisma generate"
      - exact: "ibmtelemetry --config=telemetry.yml"
      - exact: "husky install"
      - substr: "tsc || exit 0"
      - exact: "patch-package"
      - exact: "husky"
      - exact: "node -e 'process.exit(0)'"
  - id: has-postinstall
    desc: Has postinstall script hook
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    if:
      type: kv
      path: "scripts.postinstall"
    unless:
      - type: basename
        regex: '[\\/]node_modules[\\/]'
      - type: kv
        path: "keywords"
        regex: tabby-builtin-plugin
      - type: kv
        path: "scripts.postinstall"
        exact: "run-script-os"
      - type: kv
        path: "scripts.postinstall"
        exact: "npx patch-package"
      - type: kv
        path: "scripts.postinstall"
        exact: "husky install"
      - type: kv
        path: "scripts.postinstall"
        exact: "patch-package"
      - type: kv
        path: "scripts.postinstall"
        exact: "husky"
    not:
      - exact: "node -e 'process.exit(0)'"
  - id: has-install
    desc: Has install script hook
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    unless:
      - type: basename
        regex: '[\\/]node_modules[\\/]'
    if:
      type: text
      regex: '"scripts"\s*:\s*\{[\s\S]{0,600}"install"\s*:'
  - id: install-runs-node-local-script
    desc: install hook runs a local Node.js script
    crit: notable
    conf: 0.95
    attack: "T1195.002"
    if:
      type: kv
      path: "scripts.install"
      regex: "^node\\s+(\\./?)?[A-Za-z0-9_.-]{1,80}\\.js$"
    downgrade:
      any:
        - id: metadata/package/fields::has-optional-deps
  - id: preinstall-runs-node-local-script
    desc: preinstall hook runs a local Node.js script
    crit: suspicious
    conf: 0.97
    attack: "T1195.002"
    if:
      type: kv
      path: "scripts.preinstall"
      regex: "^node\\s+(\\./?)?[A-Za-z0-9_.-]{1,80}\\.js$"
    downgrade:
      any:
        - id: metadata/package/fields::has-optional-deps
  - id: postinstall-runs-ts-node-local-script
    desc: postinstall runs local ts-node script
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    if:
      type: kv
      path: "scripts.postinstall"
      regex: "^ts-node\\s+(\\./)?[A-Za-z0-9_./-]{1,80}\\.(js|ts)$"
    unless:
      - type: kv
        path: "scripts.postinstall"
        substr: "node_modules/"
      - type: kv
        path: "scripts.postinstall"
        substr: "--transpile-only"
  # === Notify-based Pingback Detection ===
  # Detect notify.js as postinstall target (pingback variant)
  - id: postinstall-notify-js
    desc: postinstall runs notify.js script
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    if:
      type: kv
      path: "scripts.postinstall"
      substr: "notify.js"
  - id: postinstall-notify-js-path
    desc: postinstall runs notify.js with path
    crit: suspicious
    conf: 0.94
    attack: "T1195.002"
    if:
      type: kv
      path: "scripts.postinstall"
      regex: "node\\s+[^\"\\n]{0,50}notify\\.js"
  # === Test Script Abuse ===
      # Detect test scripts that perform network exfil instead of testing
  - id: test-script-network
    desc: Test script performs network request
    crit: suspicious
    conf: 0.9
    attack: "T1059"
    if:
      type: kv
      path: "scripts.test"
      regex: "\\b(curl|wget)\\b"
    not:
      - substr: "jest"
      - substr: "mocha"
      - substr: "vitest"
  - id: test-script-exfil
    desc: Test script with command substitution
    crit: suspicious
    conf: 0.95
    attack: "T1041"
    if:
      type: kv
      path: "scripts.test"
      regex: "https?://[^\"'\\s]{0,120}\\$\\("
      # === Script Content Patterns ===
      # Detect dangerous commands in install scripts
  - id: script-curl
    desc: Script uses curl
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: "scripts"
      regex: "\"(preinstall|postinstall|install)\":\".{0,220}\\bcurl\\b"
  - id: script-wget
    desc: Script uses wget
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: "scripts"
      regex: "\"(preinstall|postinstall|install)\":\".{0,220}\\bwget\\b"
  - id: script-pipe-sh
    desc: Script pipes to sh
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: "scripts"
      regex: "\"(preinstall|postinstall|install)\":\".{0,220}\\|\\s*sh\\b"
  - id: script-pipe-shell
    desc: Script pipes to shell
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: "scripts"
      regex: "\"(preinstall|postinstall|install)\":\".{0,220}\\|\\s*shell\\b"
  - id: script-pipe-node
    desc: Script pipes to node
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: "scripts"
      regex: "\"(preinstall|postinstall|install)\":\".{0,220}\\|\\s*node\\b"
  - id: script-eval
    desc: Script uses eval
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: "scripts"
      regex: "\\beval\\b"
  - id: script-base64-word
    desc: Script uses base64
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: "scripts"
      substr: "base64"
  - id: script-atob-word
    desc: Script uses atob
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: "scripts"
      substr: "atob"
  - id: script-btoa-word
    desc: Script uses btoa
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: "scripts"
      substr: "btoa"
  - id: script-hidden-file-1
    desc: Script hidden file (base)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '"(preinstall|postinstall|install)"\s*:\s*"[^"\n]{0,220}/\.[ac-z]'
  - id: script-hidden-file-2
    desc: Script hidden file (bin/bi)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '"(preinstall|postinstall|install)"\s*:\s*"[^"\n]{0,220}/\.bi?([^n]|$)'
  - id: script-tmp-dir
    desc: Script uses /tmp directory
    crit: notable
    conf: 0.7
    if:
      type: kv
      path: "scripts"
      regex: "\"(preinstall|postinstall|install)\":\".{0,220}/tmp/"
  - id: script-http-url
    desc: Script contains HTTP URL
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: "scripts"
      regex: "\"(preinstall|postinstall|install)\":\".{0,220}https?://"
  - id: script-sysinfo-cmd-1
    desc: Script runs system info (uname/whoami/hostname)
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: "scripts"
      regex: "\\b(uname|whoami|hostname)\\b"
  - id: script-sysinfo-cmd-2
    desc: Script runs system info (ifconfig/ip addr)
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: "scripts"
      regex: "\\b(ifconfig|ip\\s+addr)\\b"
  - id: script-sysinfo-cmd-3
    desc: Script runs pwd or env discovery
    crit: notable
    conf: 0.8
    attack: "T1083"
    if:
      type: kv
      path: "scripts"
      regex: "\\$\\(pwd\\)|\\bpwd\\b|\\$\\(id\\)"
  - id: script-network-exfil-vars
    desc: Network request with command substitution (exfiltration)
    crit: suspicious
    conf: 0.95
    attack: "T1041"
    if:
      type: kv
      path: "scripts"
      regex: "https?://[^\"'\\s]{0,120}\\$\\("
  - id: script-multi-param-exfil
    desc: URL with multiple command substitution parameters
    crit: suspicious
    conf: 0.95
    attack: "T1041"
    if:
      type: kv
      path: "scripts"
      regex: "\\$\\([a-z]{2,15}\\).{0,80}\\$\\([a-z]{2,15}\\)"
  - id: preinstall-netcat-shell
    desc: preinstall uses netcat shell exec
    crit: suspicious
    conf: 0.97
    attack: "T1059.004"
    if:
      type: kv
      path: "scripts.preinstall"
      substr: "nc -c sh"
  - id: preinstall-external-ip
    desc: preinstall embeds external IPv4
    crit: notable
    conf: 0.9
    attack: "T1071"
    if:
      type: kv
      path: "scripts.preinstall"
      regex: "(\\d{1,3}\\.){3}\\d{1,3}"
  - id: preinstall-ip-port-endpoint
    desc: preinstall contains IPv4 endpoint
    crit: suspicious
    conf: 0.93
    attack: "T1571"
    if:
      type: kv
      path: "scripts.preinstall"
      regex: "(\\d{1,3}\\.){3}\\d{1,3}\\s+[1-9][0-9]{1,4}"
  - id: preinstall-nohup-node
    desc: preinstall detaches node sidecar
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    if:
      type: kv
      path: "scripts.preinstall"
      regex: "\\bnohup\\s+node\\s+[^\"\\n]{1,80}\\.js\\b"
  - id: preinstall-devnull-redir
    desc: preinstall suppresses output to devnull
    crit: suspicious
    conf: 0.92
    attack: "T1564"
    if:
      type: kv
      path: "scripts.preinstall"
      regex: ">/dev/null\\s+2>&1"
  - id: postinstall-find-dot-ssh
    desc: postinstall enumerates ~/.ssh
    crit: suspicious
    conf: 0.96
    attack: "T1552.004"
    if:
      type: kv
      path: "scripts.postinstall"
      regex: "\\bfind\\s+~/?\\.ssh\\b"
  - id: postinstall-xargs-cat
    desc: postinstall pipes file list to cat
    crit: suspicious
    conf: 0.93
    attack: "T1552.004"
    if:
      type: kv
      path: "scripts.postinstall"
      regex: "\\|\\s*xargs\\s+cat\\b"
  - id: postinstall-ssh-key-dump-pipeline
    desc: postinstall dumps ~/.ssh files
    crit: suspicious
    conf: 0.98
    attack: "T1552.004"
    if:
      type: kv
      path: "scripts.postinstall"
      regex: "\\bfind\\s+~/?\\.ssh\\b[^\\n|]{0,40}\\|\\s*xargs\\s+cat\\b"
  - id: has-preinstall-raw
    desc: Raw content contains preinstall hook
    crit: notable
    conf: 0.88
    for: [package.json, pkginfo]
    unless:
      - type: text
        regex: '"preinstall"\s*:\s*"npx only-allow pnpm"'
    if:
      type: text
      regex: '"preinstall"\s*:|preinstall\s*='
  - id: encoded-npm-cmd
    desc: Encoded or node-inline npm command
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)"(preinstall|install|postinstall)"\s*:\s*".{0,120}node\s+-e'
    unless:
      - type: text
        regex: 'process\.exit\(0\)'
  - id: silent-obfuscated-npm-dropper
    desc: Silent obfuscated npm lifecycle dropper
    crit: suspicious
    conf: 0.95
    for: [package.json, javascript, pkginfo]
    if:
      type: text
      regex: '(?is)"(preinstall|postinstall)"\s*:\s*"[^"\n]{0,200}(/dev/null|silent:\s*true|node\s+-e)'
    unless:
      - type: kv
        path: "scripts.preinstall"
        exact: ":; (node ./preinstall.js > /dev/null 2>&1 || true)"
      - type: text
        regex: 'process\.exit\(0\)'
      - type: text
        regex: '"installationMethod"\s*:\s*"deb"'
# === Composite Rules ===
composite_rules:
  - id: script-base64
    desc: Script uses base64
    crit: notable
    conf: 0.8
    any:
      - id: script-base64-word
      - id: script-atob-word
      - id: script-btoa-word
  - id: script-hidden-file
    desc: Script references hidden file
    crit: notable
    conf: 0.75
    any:
      - id: script-hidden-file-1
      - id: script-hidden-file-2
  - id: script-sysinfo-cmd
    desc: Script runs system info command
    crit: notable
    conf: 0.8
    attack: "T1082"
    any:
      - id: script-sysinfo-cmd-1
      - id: script-sysinfo-cmd-2
      - id: script-sysinfo-cmd-3
  - id: install-script-exfil
    desc: Install script performs data exfiltration
    crit: hostile
    conf: 0.95
    attack: "T1041"
    all:
      - id: script-network-exfil-vars
      - id: download-tools
        # Download tools
  - id: download-tools
    desc: Script uses download tools
    crit: notable
    conf: 0.6
    any:
      - id: script-curl
      - id: script-wget
        # Pipe to interpreter patterns
  - id: pipe-to-interpreters
    desc: Script pipes to interpreter
    crit: suspicious
    conf: 0.85
    any:
      - id: script-pipe-sh
      - id: script-pipe-shell
      - id: script-pipe-node
        # Download and execute composite
  - id: download-execute-comp
    desc: npm script downloads and executes
    crit: suspicious
    conf: 0.95
    mbc: "B0024"
    attack: "T1105"
    all:
      - id: download-tools
      - id: pipe-to-interpreters
        # Obfuscated script
  - id: obfuscated-script
    desc: Script uses obfuscation techniques
    crit: suspicious
    conf: 0.85
    any:
      - id: script-eval
      - id: script-base64
        # Test script abuse: test hook used for exfiltration
  - id: test-hook-exfil
    desc: Test script abused for exfiltration
    crit: suspicious
    conf: 0.9
    attack: "T1059"
    all:
      - id: test-script-exfil
      - id: install-script-exfil
        # Redundancy pattern: multiple hooks all have network commands
  - id: redundant-hook-network
    desc: Multiple hooks with network commands (redundancy)
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: script-network-exfil-vars
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::multiple-hooks
        # GuardDog: Install hook existence (supply chain risk)
  - id: install-hook-exists
    desc: Package has install-time script hooks
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    any:
      - id: has-preinstall
      - id: has-postinstall
      - id: has-install
  # Notify-based pingback composite
  - id: notify-pingback-install
    desc: Install hook runs notify.js pingback script
    crit: suspicious
    conf: 0.95
    attack: "T1195.002"
    any:
      - id: postinstall-notify-js
      - id: postinstall-notify-js-path
  - id: preinstall-netcat-reverse-shell
    desc: preinstall launches netcat reverse shell
    crit: hostile
    conf: 0.99
    mbc: "B0022"
    attack: "T1059.004"
    all:
      - id: has-preinstall
      - id: preinstall-netcat-shell
      - id: preinstall-external-ip
      - id: preinstall-ip-port-endpoint
  - id: preinstall-nohup-node-dropper
    desc: preinstall launches detached node dropper
    crit: suspicious
    conf: 0.98
    attack: "T1195.002"
    all:
      - id: has-preinstall
      - id: preinstall-nohup-node
      - id: preinstall-devnull-redir
  - id: postinstall-ssh-credential-dump
    desc: postinstall dumps SSH credential files
    crit: hostile
    conf: 0.99
    attack: "T1552.004"
    mbc: "E1552"
    all:
      - id: has-postinstall
      - id: postinstall-ssh-key-dump-pipeline
    any:
      - id: objectives/credential-access/ssh/key::dot-ssh-path
      - id: postinstall-find-dot-ssh
      - id: postinstall-xargs-cat
  - id: preinstall-temp-fetch-chmod-exec
    desc: preinstall stages temp payload then executes it
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    for: [javascript]
    all:
      - id: objectives/command-and-control/channel/deaddrop::suspicious-github-fetch
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
      - id: micro-behaviors/fs/path/temp::temp-var-tmp
    any:
      - id: micro-behaviors/process/create/script::shell-script-execution-any
      - id: micro-behaviors/process/daemonize::nohup-hidden-output
      - id: micro-behaviors/process/create/spawn::detached-true
  - id: preinstall-detached-temp-dropper
    desc: preinstall detaches staged temp payload dropper
    crit: hostile
    conf: 0.99
    attack: "T1195.002"
    for: [javascript]
    all:
      - id: objectives/supply-chain/install-hook/scripts::preinstall-temp-fetch-chmod-exec
      - id: micro-behaviors/process/daemonize::stealthy-background
      - id: micro-behaviors/communications/http/download/curl::curl-silent
    any:
      - id: objectives/command-and-control/channel/deaddrop::raw-githubusercontent-script-file
      - id: objectives/command-and-control/channel/deaddrop::fetch-github-raw-curl
      - id: micro-behaviors/process/create/spawn::detached-true
