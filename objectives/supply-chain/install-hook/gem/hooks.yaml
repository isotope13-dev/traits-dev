# RubyGems Installation Hooks
# GuardDog: Detects Gem installation hooks that execute code during install
# ATT&CK: T1195.002 (Supply Chain Compromise)
defaults:
  platforms: [unix, windows]
  for: [ruby]
  crit: suspicious
  conf: 0.95
  attack: "T1195.002"
traits:
  # === Post-install Hooks ===
  - id: gem-post-install
    desc: Gem.post_install hook
    if:
      # Migrated from a tree-sitter call query to a `kind: member`
      # match on the pre-extracted member fact (no per-member
      # tree-sitter cursor walk; same name semantics).
      type: symbol
      kind: member
      exact: 'Gem.post_install'
  - id: gem-installer-post-install
    desc: Gem::Installer.post_install hook
    if:
      type: symbol
      regex: 'Gem::Installer\.post_install'
  # === Pre-install Hooks ===
  - id: gem-pre-install
    desc: Gem.pre_install hook
    if:
      # Migrated from a tree-sitter call query to a `kind: member`
      # match on the pre-extracted member fact (no per-member
      # tree-sitter cursor walk; same name semantics).
      type: symbol
      kind: member
      exact: 'Gem.pre_install'
  - id: gem-installer-pre-install
    desc: Gem::Installer.pre_install hook
    if:
      type: symbol
      regex: 'Gem::Installer\.pre_install'
  # === Uninstall Hooks ===
  - id: gem-post-uninstall
    desc: Gem.post_uninstall hook
    if:
      # Migrated from a tree-sitter call query to a `kind: member`
      # match on the pre-extracted member fact (no per-member
      # tree-sitter cursor walk; same name semantics).
      type: symbol
      kind: member
      exact: 'Gem.post_uninstall'
  - id: gem-pre-uninstall
    desc: Gem.pre_uninstall hook
    if:
      # Migrated from a tree-sitter call query to a `kind: member`
      # match on the pre-extracted member fact (no per-member
      # tree-sitter cursor walk; same name semantics).
      type: symbol
      kind: member
      exact: 'Gem.pre_uninstall'
  # === Extension Building ===
  - id: gem-extensions
    desc: Gem specification extensions attribute
    conf: 0.85
    if:
      type: symbol
      substr: ".extensions"
  - id: ruby-gemrc-post-install-hook
    desc: Ruby writes gemrc post-install hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "post_install:"
  - id: ruby-gem-wrapper-replacement
    desc: Ruby replaces gem command wrapper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/usr/local/bin/gem[\s\S]{0,220}\.real'
  - id: ruby-gem-sources-cache-write
    desc: Ruby writes RubyGems sources cache
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: cached_sources
composite_rules:
  # Ruby port of the npm "Shai-Hulud" install-hook dropper shape: a gem whose
  # install-time hook (extconf.rb native-build script, or a Gem pre/post-install
  # hook) carries an obfuscated, self-decoding payload that it feeds to eval/
  # instance_eval/class_eval. Mirrors objectives/supply-chain/install-hook/
  # dropper/obfuscation::preinstall-obfuscated-bundle-dropper for npm. The
  # existing gemspec-remote-eval requires a remote fetch; this catches the
  # self-contained encoded-blob variant with no network leg.
  - id: gem-install-hook-obfuscated-eval
    desc: Gem install hook runs obfuscated eval payload
    crit: hostile
    conf: 0.96
    mbc: B0024
    all:
      - id: objectives/supply-chain/metadata-anomaly/rubygems::obfuscated-payload-comp
      - id: objectives/supply-chain/metadata-anomaly/rubygems::eval-imports
    any:
      - id: gem-post-install
      - id: gem-pre-install
      - id: gem-installer-post-install
      - id: metadata/build/package::filename-extconf
    needs: 1
  - id: rubygems-config-install-hook
    desc: RubyGems config install hook persistence
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-gemrc-post-install-hook
    any:
      - id: ruby-gem-wrapper-replacement
      - id: ruby-gem-sources-cache-write
  # GuardDog: Any gem installation hook
