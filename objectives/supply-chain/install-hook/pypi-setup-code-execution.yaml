# Setup.py Code Execution During Installation
# Detects setup.py hooks combined with code execution — the primary
# mechanism for PyPI supply-chain attacks.
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# MBC: E1059.006 (Command and Scripting Interpreter)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
composite_rules:
  - id: setup-code-execution
    desc: Code execution during package installation
    crit: hostile
    conf: 0.95
    attack: "T1195.002"
    mbc: "E1059.006"
    all:
      - id: objectives/supply-chain/install-hook/dropper::install-run-override
    any:
      # Direct execution
      - id: objectives/execution/interpreter/eval/invoke::exec-call-python
      - id: objectives/execution/interpreter/eval/invoke::eval-call-python
      - id: objectives/execution/interpreter/eval/invoke::compile-call-python
      # Process creation
      - id: micro-behaviors/process/create/subprocess::process-execution
      # Obfuscated execution
      - id: objectives/anti-static/obfuscation/eval/scripting::builtins-obfuscation
    downgrade:
      # Legitimate setup.py may check versions with eval
      any:
        - id: metadata/quality::has-tests
        - id: metadata/signed/platform/
