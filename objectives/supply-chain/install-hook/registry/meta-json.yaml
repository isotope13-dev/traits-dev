defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
- id: meta-json-readme-stealth-claims
  desc: "README claims silent background operation"
  crit: suspicious
  conf: 0.92
  attack: "T1564"
  if:
    type: text
    regex: "completely hidden|[Ss]ilent [Oo]peration|without user awareness"
- id: meta-json-readme-env-targeting
  desc: README mentions .env file prioritization
  crit: suspicious
  conf: 0.93
  attack: "T1552.001"
  if:
    type: text
    regex: "\\.env files? first"
    case_insensitive: true
- id: meta-json-form-data-dep
  desc: Registry metadata depends on form-data
  crit: notable
  conf: 0.8
  if:
    type: value
    path: dependencies.form-data
    exists: true
- id: meta-json-postinstall-node
  desc: Registry metadata postinstall runs node script
  crit: notable
  conf: 0.85
  attack: "T1195.002"
  if:
    type: text
    regex: "\"postinstall\"\\s*:\\s*\"node\\s+[^\"\\n]{1,80}\\.js"
- id: meta-json-empty-test-script
  desc: Registry metadata has no-op test script
  crit: component
  conf: 0.75
  if:
    type: text
    regex: "\"test\"\\s*:\\s*\"echo\\s+.{0,40}No tests"
composite_rules:
- id: meta-json-stealth-exfil-package
  desc: Registry metadata with stealth claims and install hook
  crit: hostile
  conf: 0.96
  attack: "T1195.002"
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-json-postinstall-node
  - id: meta-json-readme-stealth-claims
  any:
  - id: meta-json-readme-env-targeting
  - id: meta-json-form-data-dep
  - id: metadata/package/quality/registry/package-json::versioned-empty-author
- id: meta-json-postinstall-bootstrap
  desc: Registry metadata with postinstall node bootstrap
  crit: suspicious
  conf: 0.92
  attack: "T1195.002"
  all:
  - id: objectives/supply-chain/impersonation/registry/snapshot::registry-metadata-json
  - id: meta-json-postinstall-node
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-dist-tarball-url
  any:
  - id: metadata/package/quality/registry/package-json::versioned-empty-author
  - id: meta-json-empty-test-script
  - id: meta-json-form-data-dep
  - id: objectives/supply-chain/impersonation/registry/snapshot::versioned-maintainer-list-single
