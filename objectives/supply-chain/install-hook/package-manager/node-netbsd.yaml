defaults:
  platforms: [netbsd, unix]
  for: [javascript, typescript]
  attack: T1195.002

traits:
  - id: node-npm-script-shell-hook
    desc: Node npm script-shell hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: npm config set script-shell

  - id: node-npm-postinstall-hook-file
    desc: Node npm postinstall hook file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .npm-postinstall-hook.js

  - id: node-pkgsrc-post-install-hook
    desc: Node pkgsrc post-install hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST_INSTALL+=

  - id: node-pkgsrc-defaults-write
    desc: Node pkgsrc defaults write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/pkgsrc/mk/defaults.mk

composite_rules:
  - id: node-npm-global-install-hook
    desc: Node npm global install hook
    crit: hostile
    conf: 0.98
    all:
      - id: node-npm-script-shell-hook
      - id: node-npm-postinstall-hook-file

  - id: node-pkgsrc-install-hook
    desc: Node pkgsrc install hook
    crit: hostile
    conf: 0.98
    all:
      - id: node-pkgsrc-post-install-hook
      - id: node-pkgsrc-defaults-write
