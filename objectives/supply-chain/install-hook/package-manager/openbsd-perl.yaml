defaults:
  platforms: [openbsd, bsd, unix]
  for: [perl]
  attack: T1546.016

traits:
  - id: perl-openbsd-pkg-scripts-dir
    desc: Perl OpenBSD pkg scripts dir
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/local/etc/pkg_scripts

  - id: perl-pkg-preinstall-hook
    desc: Perl package preinstall hook
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: .pre_install

composite_rules:
  - id: perl-openbsd-package-install-hook
    desc: Perl package install hook
    crit: hostile
    conf: 0.98
    all:
      - id: perl-openbsd-pkg-scripts-dir
      - id: perl-pkg-preinstall-hook
