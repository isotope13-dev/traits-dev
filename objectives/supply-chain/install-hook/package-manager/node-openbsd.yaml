defaults:
  platforms: [openbsd, bsd, unix]
  for: [javascript]
  attack: T1546.016

traits:
  - id: node-npmrc-fake-registry
    desc: Node writes fake npm registry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: fake-registry

  - id: node-npm-preinstall-hook
    desc: Node references an npm preinstall script
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: scripts.preinstall
    unless:
      - id: well-known/lib/benign-runtime-bundles::bundled-npm-source
      - id: well-known/app/windows-desktop-tools::hyper-release-path
      - id: well-known/tool/development/yarn::yarn-cli-bundle-marker
      - id: well-known/app/qwen-code::qwen-code-bundle-text
      - id: well-known/tool/development/socket-cli::socket-dev-cli-bundle
      - id: well-known/tool/development/socket-cli::socket-dev-cli-vendored-path
      - type: text
        substr: 'data.scripts.install === "node-gyp rebuild"'

  - id: node-npm-init-hook-file
    desc: Node writes npm init hook
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: .npm-init.js
    unless:
      - id: well-known/lib/benign-runtime-bundles::bundled-npm-source
      - id: well-known/app/qwen-code::qwen-code-bundle-text
      - id: well-known/tool/development/socket-cli::socket-dev-cli-bundle
      - id: well-known/tool/development/socket-cli::socket-dev-cli-vendored-path

composite_rules:
  - id: node-openbsd-npm-install-hook
    desc: Node OpenBSD npm install hook
    crit: hostile
    conf: 0.98
    all:
      - id: node-npmrc-fake-registry
      - id: node-npm-preinstall-hook
      - id: node-npm-init-hook-file
