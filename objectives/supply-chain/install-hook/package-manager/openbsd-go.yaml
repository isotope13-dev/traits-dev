defaults:
  platforms: [openbsd, bsd, unix]
  for: [go, elf]
  attack: T1546.016

traits:
  - id: openbsd-pkg-hooks-dir-go
    desc: Go references OpenBSD pkg hooks
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/local/etc/pkg/hooks

  - id: go-pkg-hook-beacon-script
    desc: Go writes pkg hook beacon
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: beacon.sh

  - id: go-pkg-hook-curl-content
    desc: Go pkg hook curls beacon
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: curl -s http://%s/beacon

composite_rules:
  - id: openbsd-go-package-hook-beacon
    desc: OpenBSD Go package hook beacon
    crit: hostile
    conf: 0.98
    all:
      - id: openbsd-pkg-hooks-dir-go
      - id: go-pkg-hook-beacon-script
      - id: go-pkg-hook-curl-content

