defaults:
  platforms: [aix, unix]
  for: [rust]
  attack: T1195.002
traits:
  - id: aix-lpp-source-hook-path
    desc: AIX lpp_source install hook path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/lpp_source/.install_hook.sh
  - id: aix-swinstall-wrapper-write
    desc: AIX swinstall wrapper write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/local/bin/swinstall
  - id: aix-installp-hook-marker
    desc: AIX installp hook marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'installp invoked|/var/adm/ras/lpp_bundles'
composite_rules:
  - id: aix-package-install-hook
    desc: AIX package install hook
    crit: hostile
    conf: 0.97
    all:
      - id: aix-lpp-source-hook-path
    any:
      - id: aix-swinstall-wrapper-write
      - id: aix-installp-hook-marker
    needs: 1
