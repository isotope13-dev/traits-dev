defaults:
  platforms: [unix]
  for: [java, class, jar]
  attack: T1195.002

traits:
  - id: java-apt-alias-hook
    desc: Aliases apt to malicious hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'alias apt=[^;\n]{0,80}_supply_hook'

  - id: java-supply-hook-function
    desc: Defines _supply_hook shell function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: _supply_hook() {

  - id: java-npm-alias-hook
    desc: Aliases npm to malicious hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'alias npm=[^;\n]{0,80}_supply_hook'

  - id: java-localbin-apt-wrapper
    desc: Shadows apt via ~/.local/bin wrapper
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: $HOME/.local/bin/apt

  - id: java-supply-hook-profile
    desc: Persists hook in bashrc/profile
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.bashrc[\s\S]{0,260}\.profile[\s\S]{0,260}_supply_hook'

composite_rules:
  - id: java-package-manager-install-hook
    desc: Package-manager alias hook persistence
    crit: hostile
    conf: 0.98
    all:
      - id: java-supply-hook-function
    any:
      - id: java-apt-alias-hook
      - id: java-npm-alias-hook
      - id: java-localbin-apt-wrapper
      - id: java-supply-hook-profile
