defaults:
  platforms: [openwrt]
  for: [php, shell, javascript, typescript]
  attack: T1195.002

traits:
  - id: openwrt-opkg-post-install-dir
    desc: OpenWrt opkg post-install hook directory
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /etc/opkg/post-install.d/

  - id: openwrt-opkg-pre-install-dir
    desc: OpenWrt opkg pre-install hook directory
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /etc/opkg/pre-install.d/

  - id: openwrt-opkg-wrapper-rewrite
    desc: OpenWrt opkg hook rewrites binary
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'cat\s*>\s*"?\$BINPATH"?'

  - id: openwrt-opkg-remote-preinstall
    desc: "OpenWrt opkg pre-install remote cmd staging"
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.preinstall_cmd

  - id: openwrt-opkg-preinstall-exec
    desc: "OpenWrt opkg pre-install staged cmd exec"
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: sh /tmp/.preinstall_cmd

  - id: openwrt-opkg-force-overwrite
    desc: OpenWrt opkg forced package overwrite
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: opkg install --force-overwrite

  - id: openwrt-opkg-list-installed
    desc: OpenWrt opkg installed package enumeration
    crit: component
    conf: 0.82
    if:
      type: text
      substr: opkg list-installed

composite_rules:
  - id: openwrt-opkg-install-hook-interceptor
    desc: OpenWrt opkg post-install package wrapper hook
    crit: hostile
    conf: 0.96
    all:
      - id: openwrt-opkg-post-install-dir
      - id: openwrt-opkg-wrapper-rewrite

  - id: openwrt-opkg-preinstall-remote-exec
    desc: OpenWrt opkg pre-install remote execution hook
    crit: hostile
    conf: 0.96
    all:
      - id: openwrt-opkg-pre-install-dir
      - id: openwrt-opkg-remote-preinstall
      - id: openwrt-opkg-preinstall-exec

  - id: openwrt-opkg-self-install
    desc: OpenWrt opkg self-install with forced overwrite
    crit: suspicious
    conf: 0.9
    all:
      - id: openwrt-opkg-list-installed
      - id: openwrt-opkg-force-overwrite
