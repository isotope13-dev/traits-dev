defaults:
  platforms: [netscaler, appliance, unix]
  for: [json, javascript, typescript]
  attack: T1195.002

traits:
  - id: node-postinstall-base64-write
    desc: Node postinstall base64 write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '"postinstall"[\s\S]{0,220}Buffer\.from'

  - id: node-trojan-drop-call
    desc: Node trojan drop call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: dropTrojan()

  - id: node-dependency-inject-call
    desc: Node dependency inject call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: injectDependency()

composite_rules:
  - id: node-netscaler-install-hook
    desc: Node NetScaler install hook
    crit: hostile
    conf: 0.98
    all:
      - id: node-postinstall-base64-write
    any:
      - id: node-trojan-drop-call
      - id: node-dependency-inject-call
