defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, javascript]
  attack: T1195.002

traits:
  - id: routeros-package-update-set
    desc: RouterOS package update setting
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /system package update set

  - id: routeros-update-hook-fetch
    desc: RouterOS update hook fetch
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/tool fetch[\s\S]{0,260}/hooks/[A-Za-z0-9_.-]+\.rsc'

  - id: routeros-hook-import-run
    desc: RouterOS hook import or run
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/import\s+"?[A-Za-z0-9_.-]+\.rsc"?|/system script run\s+"?[A-Za-z0-9_.-]+"?)'

composite_rules:
  - id: routeros-package-update-hook
    desc: RouterOS package update hook
    crit: hostile
    conf: 0.97
    all:
      - id: routeros-package-update-set
      - id: routeros-update-hook-fetch
      - id: routeros-hook-import-run
