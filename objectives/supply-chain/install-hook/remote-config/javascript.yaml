# npm install hooks that turn an attacker-controlled remote YAML endpoint into
# persistent package configuration. The neutral HTTP, YAML, and file-operation
# atoms live in micro-behaviors; this file supplies the install-time intent.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, package.json, archives]
  attack: "T1195.002,T1105"

composite_rules:
  - id: npm-postinstall-remote-yaml-config
    desc: npm postinstall fetches and persists remote YAML configuration
    crit: hostile
    conf: 0.99
    for: [archives]
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: micro-behaviors/communications/http/endpoints::remote-config-endpoint
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/data/serialize/yaml::javascript-yaml-load
      - id: micro-behaviors/fs/write/file/direct::node-writes-serialized-yaml
