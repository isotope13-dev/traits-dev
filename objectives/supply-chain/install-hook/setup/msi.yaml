defaults:
  platforms: [windows]
  for: [documents]
  attack: "T1059.001,T1059.005,T1564.003,T1195.002"

traits:
- id: msi-hidden-powershell-action
  desc: MSI hidden PowerShell custom action
  crit: suspicious
  conf: 0.99
  for: [ole]
  if:
    type: yara
    source: |
      rule msi_hidden_encoded_powershell_custom_action {
        strings:
          $ps = /powershell(\.exe)?/ nocase ascii wide
          $wsh = /CreateObject\(\s*["'']WScript\.Shell["'']\s*\)\s*\.Run/ nocase ascii wide
          $hidden = /-w\s+h(hidden)?/ nocase ascii wide
        condition:
          uint32(0) == 0xe011cfd0 and $ps and $wsh and $hidden
      }
- id: msi-encoded-bypass-action
  desc: MSI encoded PowerShell bypass action
  crit: suspicious
  conf: 0.99
  for: [ole]
  if:
    type: yara
    source: |
      rule msi_encoded_bypass_action {
        strings:
          $ps = /powershell(\.exe)?/ nocase ascii wide
          $encoded = /-(enc|encodedcommand)/ nocase ascii wide
          $bypass = /-(ep|executionpolicy)\s+bypass/ nocase ascii wide
        condition:
          uint32(0) == 0xe011cfd0 and $ps and $encoded and $bypass
      }
- id: msi-encoded-payload
  desc: MSI contains an encoded command payload
  crit: notable
  conf: 0.95
  for: [ole]
  if:
    type: yara
    source: |
      rule msi_encoded_payload {
        strings:
          $encoded = /-(enc|encodedcommand)/ nocase ascii wide
        condition:
          uint32(0) == 0xe011cfd0 and $encoded
      }
- id: custom-action-table-marker
  desc: Installer custom-action table marker
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: CustomAction
- id: wscript-powershell-run
  desc: WScript.Shell launches PowerShell
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '(?i)CreateObject\(\s*["'']WScript\.Shell["'']\s*\)\s*\.Run\s+["'']powershell(\.exe)?\b'
- id: hidden-powershell-command
  desc: PowerShell command uses a hidden window
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '(?i)\bpowershell(\.exe)?\b[^\r\n]{0,180}-w\s+h(hidden)?\b'
- id: encoded-powershell-command
  desc: PowerShell command uses EncodedCommand
  crit: notable
  conf: 0.96
  if:
    type: text
    regex: '(?i)\bpowershell(\.exe)?\b[^\r\n]{0,220}-(encodedcommand|enc)\b'
- id: powershell-policy-bypass
  desc: PowerShell command bypasses execution policy
  crit: notable
  conf: 0.96
  if:
    type: text
    regex: '(?i)\bpowershell(\.exe)?\b[^\r\n]{0,180}-(ep|executionpolicy)\s+bypass\b'

composite_rules:
- id: hidden-encoded-powershell-setup-action
  desc: Setup action launches hidden encoded PowerShell with bypass
  crit: hostile
  conf: 0.99
  all:
  - id: msi-hidden-powershell-action
  - id: msi-encoded-bypass-action
  - id: msi-encoded-payload
