defaults:
  platforms: [windows]
  for: [ole]
  attack: "T1059.001,T1059.005,T1564.003,T1195.002"

traits:
  - id: msi-wscript-shell-run
    desc: MSI WScript Shell Run call
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: '(?i)CreateObject\(\s*["'']Wscript\.Shell["'']\s*\)\s*\.Run'
  - id: msi-hidden-powershell
    desc: PowerShell hidden window flag
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: '(?i)-(w|windowstyle)\s+hidden\b'
  - id: msi-policy-bypass
    desc: PowerShell execution-policy bypass
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: '(?i)-(ep|executionpolicy)\s+bypass\b'
  - id: msi-encoded-command
    desc: PowerShell encoded command flag
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: '(?i)-(enc|encodedcommand)\b'
  - id: msi-currentversion-run
    desc: Installer references CurrentVersion Run
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: '(?i)CurrentVersion\\Run'

composite_rules:
  - id: hidden-encoded-powershell-setup-action
    desc: Setup action launches encoded PowerShell
    crit: hostile
    conf: 0.99
    all:
      - id: msi-wscript-shell-run
      - id: msi-hidden-powershell
      - id: msi-policy-bypass
      - id: msi-encoded-command
  - id: msi-run-key-hidden-powershell
    desc: MSI Run key launches hidden PowerShell
    crit: hostile
    conf: 0.995
    attack: "T1547.001,T1059.001"
    all:
      - id: msi-currentversion-run
      - id: hidden-encoded-powershell-setup-action
  - id: msi-run-key-encoded-bypass
    desc: MSI Run key launches encoded bypass
    crit: hostile
    conf: 0.995
    attack: "T1547.001,T1059.001"
    all:
      - id: msi-currentversion-run
      - id: msi-policy-bypass
      - id: msi-encoded-command
