# Setup.py Code Execution During Installation
# Detects setup.py hooks combined with code execution — the primary
# mechanism for PyPI supply-chain attacks.
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# MBC: E1059.006 (Command and Scripting Interpreter)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
composite_rules:
  - id: pypi-security-research-claim-with-install-execution
    desc: PyPI package claims security research and executes at install
    crit: hostile
    conf: 0.94
    attack: "T1195.002"
    mbc: "E1059.006"
    scope: outer
    all:
      - id: metadata/package/manifest/description::pkginfo-security-research-claim
      - id: setup-code-execution
  - id: setup-py-getenv
    desc: Environment variable access in setup.py
    crit: notable
    conf: 0.9
    all:
      - id: metadata/build/pip::root-setup-py
      - id: micro-behaviors/os/env/vars/access::python-os-getenv-call
  - id: setup-local-helper-execution
    desc: Setup hook runs local Python helper
    crit: suspicious
    conf: 0.9
    any:
      - id: metadata/build/package::setup-cmdclass-install
      - id: metadata/build/package::setup-cmdclass-build-py
    all:
      - id: metadata/build/package::run-override-calls-helper
  - id: setup-code-execution
    desc: Code execution during package installation
    crit: hostile
    conf: 0.95
    attack: "T1195.002"
    mbc: "E1059.006"
    near_lines: 10
    all:
      - id: metadata/build/package::setuptools-run-override
    any:
      # Direct execution
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: micro-behaviors/process/interpreter/python::eval-builtin
      - id: micro-behaviors/process/interpreter/python::compile-builtin
      # Process creation
      - id: micro-behaviors/process/create/subprocess::process-execution
      # Obfuscated execution
      - id: objectives/anti-static/obfuscation/eval/scripting::builtins-obfuscation
    downgrade:
      # Legitimate setup.py may check versions with eval
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
