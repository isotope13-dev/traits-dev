defaults:
  platforms: [unix, windows]
  for: [package.json]
  crit: suspicious
  conf: 0.88
traits:
  - id: description-persistence-keywords
    desc: VSCode manifest advertises persistence
    if:
      type: value
      path: description
      regex: startup folder|scheduled tasks
  - id: repo-vscode-url
    desc: VSCode manifest claims vscode repo
    if:
      type: value
      path: repository.url
      exact: https://github.com/microsoft/vscode
composite_rules:
  - id: wildcard-persistence-extension
    desc: VSCode wildcard activation with persistence
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/permission/activation::activate-all-events
      - id: description-persistence-keywords
  - id: wildcard-persistence-impostor
    desc: Wildcard persistence extension spoofs vscode repo
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/permission/activation::activate-all-events
      - id: description-persistence-keywords
      - id: repo-vscode-url
