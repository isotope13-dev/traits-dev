defaults:
  platforms:
    - unix
    - windows
  for:
    - ruby
  attack: T1195.002
traits:
  - id: require-net-http
    desc: Requires net/http
    crit: component
    conf: 0.6
    if:
      type: text
      regex: require\s+['"]net/http['"]
  - id: base64-decode-dup
    desc: Base64 decode call
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: Base64\.(decode64|encode64)
  - id: eval-base64-decode
    desc: eval with Base64 decode
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: eval\s*\(\s*Base64\.decode64
  - id: hex-escape-dense-dup
    desc: Dense hex escape sequences
    crit: baseline
    conf: 0.85
    count_min: 10
    if:
      type: string_literal
      regex: \\x[0-9a-f]{2}\\x[0-9a-f]{2}
  - id: load-call
    desc: load() dynamic load
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: \bload\s*\(
  - id: netrc-path
    desc: .netrc file path
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: .netrc
  - id: chrome-config-path
    desc: Chrome config path
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: \.config/(google-chrome|chromium)
  - id: remote-binary-url-1
    desc: Remote binary (so/dll/dylib)
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: 'https?://[^\\s''"()<>]{1,120}/[^\\s''"()<>]{1,80}\.(so|dll|dylib)\b'
  - id: remote-binary-url-2
    desc: Remote binary (exe/sh/rb)
    crit: suspicious
    conf: 0.9
    unless:
      - type: text
        regex: 'spec\.(homepage|metadata\["(homepage_uri|source_code_uri|changelog_uri)"\])'
      - type: text
        substr: download.virtualbox.org/virtualbox/
      - id: well-known/app/homebrew::source-tree
    if:
      type: string_literal
      regex: 'https?://[^\\s''"()<>]{1,120}/[^\\s''"()<>]{1,80}\.(exe|sh|rb)\b'
  - id: tcpsocket-exec
    desc: TCPSocket with exec
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: TCPSocket\.new.{0,50}(exec|system|spawn|`)
  - id: socket-stdin
    desc: Socket redirecting stdin
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: Socket\.tcp.{0,100}\$stdin
  - id: stdin-reopen
    desc: STDIN reopen pattern
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: dup2.{0,30}STDIN|STDIN.{0,30}reopen
composite_rules:
  - id: remote-binary-url
    desc: Remote binary URL
    crit: suspicious
    conf: 0.85
    any:
      - id: remote-binary-url-1
      - id: remote-binary-url-2
  - id: http-client-imports-comp
    desc: HTTP client imports
    crit: notable
    conf: 0.5
    any:
      - id: metadata/import/ruby::net/http
      - id: metadata/import/ruby::faraday
      - id: metadata/import/ruby::httparty
      - id: metadata/import/ruby::rest-client
      - id: require-net-http
  - id: file-imports
    desc: File operation imports
    crit: notable
    conf: 0.5
    any:
      - id: metadata/import/ruby::fileutils
      - id: micro-behaviors/fs/file/read::ruby-file-read-content
      - id: micro-behaviors/fs/write/file/direct::ruby-file-write-content
  - id: eval-imports
    desc: Dynamic code evaluation
    crit: notable
    conf: 0.75
    any:
      - id: micro-behaviors/process/interpreter/eval::ruby-eval
      - id: micro-behaviors/process/interpreter/eval::ruby-instance-eval
      - id: micro-behaviors/process/interpreter/eval::ruby-class-eval
  - id: gemspec-shell-exec
    desc: Gemspec executes shell commands
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/package/files/rubygems::gemspec-file
      - id: micro-behaviors/process/create/shell/lang::ruby-shell-exec-imports
    downgrade:
      any:
        - id: metadata/lang/shebang::ruby
    unless:
      - id: metadata/build/package::gemspec-git-file-list
      - id: metadata/build/package::gemspec-find-file-list
  - id: extconf-remote-download
    desc: Native extension downloads remote code
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/build/package::filename-extconf
      - id: http-client-imports-comp
    any:
      - id: remote-binary-url
      - id: micro-behaviors/process/create/shell/lang::ruby-shell-exec-imports
  - id: extconf-tracking-pixel
    desc: Native extension contacts tracking pixel or logging service
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/build/package::filename-extconf
      - id: http-client-imports-comp
      - id: objectives/discovery/system/fingerprint/network::tracking-service-lookup
  - id: extconf-http-fetch
    desc: extconf.rb performs HTTParty GET during build
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/build/package::filename-extconf
      - id: micro-behaviors/communications/http/request/client::httparty-get
  - id: network-eval-exec-chain-comp
    desc: Network fetch with eval and exec
    crit: suspicious
    conf: 0.9
    all:
      - id: http-client-imports-comp
      - id: eval-imports
    any:
      - id: micro-behaviors/process/create/shell/lang::ruby-shell-exec-imports
      - id: load-call
  - id: credential-path-access
    desc: Accesses credential storage paths
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
      - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
      - id: netrc-path
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
      - id: chrome-config-path
  - id: webhook-exfil-comp
    desc: Webhook data exfiltration
    crit: suspicious
    conf: 0.85
    all:
      - id: http-client-imports-comp
    any:
      - id: micro-behaviors/communications/http/webhook::discord-webhook-path
      - id: objectives/exfiltration/messaging/webhook::telegram-bot-api
  - id: gemspec-remote-eval
    desc: Gemspec downloads and evaluates remote code
    crit: hostile
    conf: 0.95
    mbc: B0024
    all:
      - id: metadata/package/files/rubygems::gemspec-file
      - id: http-client-imports-comp
      - id: eval-imports
  - id: credential-stealer
    desc: Steals and exfiltrates credentials
    crit: hostile
    conf: 0.95
    mbc: E1555
    attack: T1555
    all:
      - id: credential-path-access
      - id: file-imports
      - id: http-client-imports-comp
  - id: reverse-shell-pattern-comp
    desc: Ruby reverse shell pattern
    crit: hostile
    conf: 0.95
    mbc: B0030
    attack: T1059.004
    all:
      - id: metadata/import/ruby/socket
    any:
      - id: tcpsocket-exec
      - id: socket-stdin
      - id: stdin-reopen
  - id: extconf-dropper
    desc: Ruby native extension performs dropper behavior
    crit: hostile
    conf: 0.98
    mbc: B0024
    all:
      - id: metadata/build/package::filename-extconf
      - id: objectives/command-and-control/dropper/execution/rename-exec::ruby-dropper-rename-exec
  - id: rubygem-dropper-rename-exec
    desc: Malicious installer renames and executes dropped payload
    crit: hostile
    conf: 0.95
    attack: T1059
    all:
      - id: metadata/build/package::filename-extconf
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-rename-to-exe
    any:
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
  - id: extconf-http-fetch-rename-exec
    desc: extconf.rb fetches remote content then renames and executes payload
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/build/package::filename-extconf
      - id: extconf-http-fetch
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-rename-to-exe
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
  - id: extconf-rename-exec-generic
    desc: extconf.rb renames a file and executes a command (generic)
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/build/package::filename-extconf
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-file-rename
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
