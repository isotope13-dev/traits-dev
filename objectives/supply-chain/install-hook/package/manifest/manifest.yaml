# npm Package Metadata Patterns
# Detects suspicious metadata patterns in package.json
# These patterns often indicate malicious or typosquatting packages
defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
  - id: npm-main-parent-entrypoint
    desc: npm main escapes package root
    crit: suspicious
    conf: 0.94
    attack: T1195.002
    if:
      type: value
      path: main
      regex: '(^|/)\.\.(/|$)'
    unless:
      - id: metadata/package/files/dependency::node-modules-path
      - type: path
        regex: '(^|/)package/(?:[^/]+/)+package\.json$'
  # === Install Hooks ===
  # preinstall detection lives with the install-time behavior rules. Composites
  # reference that objective trait directly rather than duplicating metadata.
  - id: postinstall-hook-key
    desc: Declares a package postinstall hook
    crit: component
    conf: 0.85
    if:
      type: value
      path: "scripts.postinstall"
    unless:
      - type: value
        path: "name"
        exact: "run-script-os"
      - id: metadata/package/manifest/runtime::vscode-extension
      - type: value
        path: "scripts.postinstall"
        exact: "run-script-os"
      - type: value
        path: "scripts.postinstall"
        exact: "prisma generate"
      - type: value
        path: "scripts.postinstall"
        substr: "stackpath.bootstrapcdn.com/twitter-bootstrap"
      - type: value
        path: "scripts.postinstall"
        substr: "installed! Run:"
      - id: metadata/package/scripts::postinstall-protobuf-codegen-download
      - id: metadata/library/automation::playwright-browser-install-script
      # === Install Hook Installs Package ===
      # This is highly suspicious: legitimate packages declare dependencies in package.json,
      # they don't install packages via commands in hooks
  - id: postinstall-runs-npm-install
    desc: postinstall hook runs npm install
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.postinstall"
      regex: "\\bnpm\\s+(install|i|add)\\s"
    unless:
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: metadata/package/config::vscode-workspace-install-extension
      - id: metadata/package/scripts::postinstall-local-prefix-install
  - id: postinstall-runs-yarn-add
    desc: postinstall hook runs yarn add
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.postinstall"
      regex: "\\byarn\\s+(add|global add)\\s"
  - id: postinstall-runs-pnpm-add
    desc: postinstall hook runs pnpm add
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.postinstall"
      regex: "\\bpnpm\\s+(add|install)\\s"
  - id: postinstall-runs-node-script
    desc: postinstall runs a local Node.js script
    crit: notable
    conf: 0.92
    if:
      type: value
      path: "scripts.postinstall"
      regex: "^node\\s+(\\./)?[A-Za-z0-9_./-]{1,80}\\.(c?js|mjs)$"
    unless:
      - type: value
        path: "description"
        substr: "build scripts"
  - id: preinstall-runs-npm-install
    desc: preinstall hook runs npm install
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.preinstall"
      regex: "\\bnpm\\s+(install|i|add)\\s"
  - id: preinstall-installs-sentry-node
    desc: preinstall hook installs Sentry SDK
    crit: suspicious
    conf: 0.96
    if:
      type: value
      path: "scripts.preinstall"
      regex: "\\bnpm\\s+(install|i|add)\\s+@sentry/node\\b"
  - id: description-mentions-sentry
    desc: Package description mentions Sentry
    crit: component
    conf: 0.92
    if:
      type: value
      path: description
      substr: Sentry
  - id: preinstall-runs-yarn-add
    desc: preinstall hook runs yarn add
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.preinstall"
      regex: "\\byarn\\s+(add|global add)\\s"
  - id: preinstall-runs-pnpm-add
    desc: preinstall hook runs pnpm add
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.preinstall"
      regex: "\\bpnpm\\s+(add|install)\\s"
  - id: build-runs-shell-sidecar
    desc: Build script launches shell sidecar
    crit: notable
    conf: 0.88
    if:
      type: value
      path: "scripts.build"
      regex: "\\b(bash|sh)\\s+(\\./)?[A-Za-z0-9_./-]{1,120}\\.sh\\b"
  - id: healthcheck-runs-shell-sidecar
    desc: Health check launches shell sidecar
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: "scripts.health-check"
      regex: "\\b(bash|sh)\\s+(\\./)?[A-Za-z0-9_./-]{1,120}\\.sh\\b"
  - id: npm-script-background-shell
    desc: npm script backgrounds shell sidecar
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: "scripts"
      # Require an actual shell script invocation followed by a background
      # ampersand. Redirections alone (for example `test.sh 2>/dev/null`) are
      # ordinary package test scripts, not background sidecars.
      regex: "(^|[;&|])\\s*(bash|sh)\\s+(\\./)?[A-Za-z0-9_./-]{1,120}\\.sh\\b[^&]{0,80}&(\\s|$)"
    unless:
      - id: well-known/app/neurolink::benign-archive-context
      # === Repository/Homepage Patterns ===
  - id: npm-homepage-url
    desc: Package homepage points to npm
    crit: notable
    conf: 0.75
    if:
      type: value
      path: "homepage"
      substr: "npmjs.com"
    unless:
      - type: value
        path: "homepage"
        exact: "https://npmjs.com/package/libnpm"
      - type: value
        path: "homepage"
        regex: "https://npmjs\\.com/package/libnpm[a-z]+"
  - id: npm-repo-url
    desc: Repository URL points to npm
    crit: notable
    conf: 0.75
    if:
      type: value
      path: "repository.url"
      substr: "npmjs.com"
      # === Repository Format Patterns ===
  - id: repo-shorthand-format
    # GitHub shorthand: "User/repo-name" (no full URL)
    desc: Repository uses GitHub shorthand format
    crit: component
    conf: 0.8
    if:
      type: value
      path: "repository"
      regex: "^[A-Za-z0-9_.-]+/[a-z0-9][a-z0-9._-]*$"
    unless:
      - type: value
        path: "repository"
        exact: "npm/security-holder"
      # Package name is a hyphenated multi-word name
  - id: npm-version-inflated-90plus
    desc: npm package version major 90+
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: version
      regex: "^9[0-9]\\.[0-9]+\\.[0-9]+$"
    attack: "T1195.002"
      # === Description Patterns ===
  - id: desc-lightweight
    desc: Description mentions lightweight
    crit: component
    conf: 0.5
    if:
      type: value
      path: "description"
      substr: "lightweight"
      case_insensitive: true
  - id: desc-modern-web-apps
    desc: Description mentions modern web apps
    crit: component
    conf: 0.5
    if:
      type: value
      path: "description"
      regex: "modern.{0,100}(web|app)"
      case_insensitive: true
  - id: desc-universal
    desc: Description mentions universal
    crit: component
    conf: 0.5
    if:
      type: value
      path: "description"
      substr: "universal"
      case_insensitive: true
  - id: desc-powerful-library
    desc: Description mentions powerful library
    crit: component
    conf: 0.5
    if:
      type: value
      path: "description"
      regex: "powerful.{0,100}(library|framework)"
      case_insensitive: true
  - id: desc-simple
    desc: Description contains "simple"
    crit: component
    conf: 0.5
    if:
      type: value
      path: "description"
      substr: "simple"
      case_insensitive: true
  - id: desc-hijack-secrets
    desc: Description advertises hijacking secrets
    crit: suspicious
    conf: 0.99
    attack: "T1195.002"
    if:
      type: value
      path: "description"
      regex: "hijack.{0,20}secret"
      case_insensitive: true
  - id: desc-easy
    desc: Description contains "easy"
    crit: component
    conf: 0.5
    unless:
      - type: value
        path: devDependencies
        exists: true
      - type: value
        path: repository.url
        exists: true
    if:
      type: value
      path: "description"
      substr: "easy"
      case_insensitive: true
  - id: desc-generic-js-utility
    desc: Generic JS utility placeholder phrase
    crit: notable
    conf: 0.78
    attack: T1195.002
    if:
      type: value
      path: "description"
      regex: "(?i)some useful (js|javascript) (lib|libs|utilities)"
  - id: desc-generic-js-utility-helpers
    desc: Generic JS helper placeholder phrase
    crit: notable
    conf: 0.78
    attack: T1195.002
    if:
      type: value
      path: "description"
      regex: "(?i)some useful (js|javascript) (utils|helper|helpers)"
  - id: desc-generic-useful-lib
    desc: Generic useful JS library placeholder
    crit: notable
    conf: 0.72
    if:
      type: value
      path: "description"
      regex: "(?i)^(a )?(useful|handy) (js|javascript) (lib|library)$"
  - id: desc-generic-useful-node-pkg
    desc: Generic useful node package placeholder
    crit: notable
    conf: 0.72
    if:
      type: value
      path: "description"
      regex: "(?i)^(a )?(useful|handy) (node|npm) (package|module)$"
  - id: desc-analyst-server
    desc: 'Description refs "analyst server"'
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "description"
      regex: "analyst server"
      case_insensitive: true
    attack: "T1195.002"
  - id: cross-ecosystem-cocoapods-name
    desc: CocoaPods reverse-domain package name in npm
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: value
      path: name
      regex: "^org\\.cocoapods\\."
  - id: cross-ecosystem-java-name
    desc: Java/Maven reverse-domain package name in npm
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    if:
      type: value
      path: name
      regex: "^(com|org|io|net)\\.[a-z][a-z0-9]*\\.[a-z]"
    unless:
      - id: metadata/package/manifest/ecosystem::unity-package-manager-manifest
  - id: tabby-builtin-plugin-keyword
    desc: Tabby builtin plugin package marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: tabby-builtin-plugin
# === Composite Rules ===
composite_rules:
  - id: npm-secret-hijack-hook
    desc: Postinstall package advertises secret hijack
    crit: hostile
    conf: 0.995
    attack: "T1195.002"
    all:
      - id: postinstall-hook-key
      - id: postinstall-runs-node-script
      - id: desc-hijack-secrets
  # Install hook group
  - id: install-hooks-comp
    desc: Package has install hook
    crit: notable
    conf: 0.6
    any:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
      - id: postinstall-hook-key
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-install
        # Install hook that installs packages (highly suspicious)
        # Legitimate packages declare dependencies in package.json - running install commands
        # in hooks is a supply chain attack indicator
  - id: install-hook-runs-pkg-install
    desc: Install hook runs npm/yarn/pnpm install command
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    any:
      - id: postinstall-runs-npm-install
      - id: postinstall-runs-yarn-add
      - id: postinstall-runs-pnpm-add
      - id: preinstall-runs-npm-install
      - id: preinstall-runs-yarn-add
      - id: preinstall-runs-pnpm-add
  - id: preinstall-sentry-autoinstall
    desc: Install hook auto-installs Sentry SDK
    crit: suspicious
    conf: 0.96
    attack: "T1195.002"
    all:
      - id: preinstall-installs-sentry-node
      - id: description-mentions-sentry
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
    unless:
      - id: metadata/package/manifest/repository/
      - id: metadata/package/manifest/publishing::is-private
  - id: preinstall-executes-public-ip-telemetry
    desc: Install hook executes code that exfiltrates public IP via Sentry
    crit: hostile
    conf: 0.99
    attack: "T1195.002,T1041"
    mbc: "E1041"
    for: [javascript, package.json, archives]
    scope: outer
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-preinstall
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::preinstall-runs-node-local-script
      - id: objectives/collection/monitor/telemetry::sentry-ingest-dsn
      - id: objectives/collection/stealer/host-profile::sentry-default-pii-enabled
      - id: objectives/collection/stealer/host-profile::sentry-set-user-call
      - id: objectives/collection/stealer/host-profile::sentry-ip-address-user-field
      - id: micro-behaviors/communications/http/endpoints::cloudflare-trace-ip-endpoint
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: broad-floating-deps-with-hooks
    desc: Install-hook package has broad floating dependencies
    crit: suspicious
    conf: 0.86
    attack: "T1195.002"
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
      - id: metadata/package/dependencies::many-runtime-deps
      - id: objectives/supply-chain/impersonation/package/manifest::npm-unsafe-dependency-versions
    unless:
      - id: metadata/package/manifest/publishing::is-private
      - id: metadata/package/testing/presence/fixture/
  # Version 1.0.0 with install hooks
  - id: version-1-0-0-with-hooks
    desc: Version 1.0.0 with install hooks
    crit: suspicious
    conf: 0.75
    all:
      - id: metadata/package/versioning::npm-version-exactly-1-0-0
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    unless:
      - id: objectives/supply-chain/install-hook/scripts/prepare/
      - id: metadata/package/quality/scoring::npm-source-native-addon-wrapper
    downgrade:
      any:
        - id: metadata/package/manifest/freeform::pkg-skeleton-small
        - id: metadata/package/manifest/freeform::npm-template-manifest-placeholder
        # npm URL as homepage/repository
  - id: npm-as-homepage
    desc: Package uses npmjs.com as homepage
    crit: notable
    conf: 0.8
    any:
      - id: npm-homepage-url
      - id: npm-repo-url
  - id: npm-registry-provenance-with-hooks
    desc: Install-hook package points provenance to npm
    crit: suspicious
    conf: 0.86
    attack: "T1195.002"
    all:
      - id: npm-as-homepage
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    unless:
      - id: metadata/package/manifest/repository::repo-url-git-host
      - id: metadata/package/scripts::postinstall-protobuf-codegen-download
      - id: metadata/package/scripts/
        # Missing repository with install hooks
  - id: no-repo-with-hooks
    desc: Package has install hooks but no repo
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    unless:
      - id: metadata/package/manifest/repository/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture/
      - id: metadata/package/manifest/freeform/
      - id: objectives/supply-chain/impersonation/package/manifest/
      - id: tabby-builtin-plugin-keyword
    downgrade:
      any:
        - id: metadata/package/manifest/freeform::pkg-skeleton-small
  # An anonymous, no-provenance package (no repository) whose install hook is a
  # char-code-encoded program is an unambiguous malicious supply-chain package:
  # the only code it ships runs hidden at install time and there is no source to
  # audit it against. Distinct from the loader/obfuscation findings — this keys
  # on the provenance anomaly that accompanies the encoded hook.
  - id: obfuscated-hook-no-provenance-package
    desc: Anonymous package hides a char-code-encoded install hook
    crit: hostile
    conf: 0.97
    attack: "T1027, T1195.002"
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::lifecycle-node-eval-charcode-program
      - id: no-repo-with-hooks
  - id: desc-simple-easy
    desc: Description mentions simple/easy
    crit: component
    conf: 0.5
    any:
      - id: desc-simple
      - id: desc-easy
        # Generic descriptions group
  - id: generic-descriptions
    desc: Package has generic marketing description
    crit: notable
    conf: 0.5
    needs: 2
    any:
      - id: desc-lightweight
      - id: desc-modern-web-apps
      - id: desc-universal
      - id: desc-powerful-library
      - id: desc-simple-easy
        # Generic description with hooks
  - id: generic-desc-with-hooks
    desc: Generic description with install hooks
    crit: suspicious
    conf: 0.8
    all:
      - id: generic-descriptions
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    unless:
      - id: objectives/supply-chain/install-hook/scripts/prepare/
        # === Cloned/Copied Package Identity ===
  - id: cloned-package-identity
    desc: Package with shorthand repo but missing bugs/homepage (possible copy)
    crit: notable
    conf: 0.75
    attack: "T1195.002"
    all:
      - id: repo-shorthand-format
      - id: metadata/package/manifest/name::npm-hyphenated-multiword-name
    unless:
      - id: metadata/package/manifest/freeform/
      - id: metadata/package/manifest/repository::has-bugs-url-field
      - id: metadata/package/manifest/homepage::has-homepage-field
      - id: metadata/package/files/package-json::has-files-field
      - id: metadata/package/manifest/runtime::has-engines
      - id: metadata/package/manifest/author/identity::has-contributors
  - id: mature-cloned-package
    desc: Mature version package with incomplete copied metadata
    crit: notable
    conf: 0.85
    attack: "T1195.002"
    mbc: "F0004"
    all:
      - id: metadata/package/versioning::mature-version
      - id: repo-shorthand-format
      - id: metadata/package/manifest/name::npm-hyphenated-multiword-name
    unless:
      - id: metadata/package/manifest/repository::has-bugs-url-field
      - id: metadata/package/manifest/homepage::has-homepage-field
      - id: metadata/package/files/package-json::has-files-field
      - id: metadata/package/manifest/runtime::has-engines
      - id: metadata/package/manifest/author/identity::has-contributors
        # === Fake Security Research ===
  - id: fake-security-research
    desc: Package claims security research but runs install hooks
    crit: hostile
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: metadata/package/manifest/description::claims-security-research
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
  - id: fake-security-research-with-exfil
    desc: Security research claim paired with exfiltration endpoint
    crit: hostile
    conf: 0.97
    attack: "T1195.002"
    all:
      - id: fake-security-research
    any:
      - id: objectives/supply-chain/recon-exfil/oast/env::oast-fun-url
      - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
      - id: objectives/supply-chain/recon-exfil/oast
      - id: objectives/exfiltration/oob/endpoint
      - id: objectives/supply-chain/recon-exfil/oast/secret::npm-postinstall-oastify-profile-query-exfil
      - id: objectives/supply-chain/recon-exfil/oast/secret::npm-postinstall-oastify-dns-whoami-exfil
  - id: public-access-install-hooks
    desc: Public package with install hooks
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
      - id: metadata/package/manifest/publishing::npm-public-publish-access
    unless:
      - id: metadata/package/manifest/repository/
  - id: dependency-confusion-recognized-marker
    desc: Dependency confusion recognized provenance marker
    crit: component
    conf: 0.9
    any:
      - id: objectives/supply-chain/install-hook/scripts/prepare::prepare-is-build-tool
      - id: metadata/package/manifest/repository::has-repository-evidence
      - id: metadata/package/manifest/entrypoint::has-bin-field
      - id: metadata/package/manifest/publishing::is-private
      - id: metadata/package/testing/presence/fixture::npm-fixture-package-name
      - id: metadata/package/scripts::postinstall-local-ts-subpackage-build
      - id: metadata/package/scripts::postinstall-protobuf-codegen-download
      - id: tabby-builtin-plugin-keyword
  - id: dependency-confusion-candidate
    desc: Stable-version install-hook package lacks provenance
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: metadata/package/versioning::mature-version
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
    unless:
      - id: objectives/supply-chain/install-hook/package/manifest/
  - id: junk-package-postinstall-webhook
    desc: Junk npm package sends install callback to webhook.site
    crit: hostile
    conf: 0.99
    attack: "T1195.002, T1041"
    mbc: "E1041"
    all:
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::postinstall-webhook-install-beacon
    any:
      - id: metadata/package/testing/presence/manifest::npm-init-default-test
      - id: metadata/package/manifest/description::short-description
      - id: metadata/package/quality/empty::npm-empty-description-any
      - id: metadata/package/quality/empty::npm-no-keywords
    needs: 2
    unless:
      - id: objectives/supply-chain/install-hook/package/manifest/
  - id: sfdc-placeholder-package
    desc: sfdc package looks like placeholder squatter
    crit: hostile
    conf: 0.985
    attack: "T1195.002"
    mbc: "B0024"
    all:
      - id: metadata/package/manifest/name::npm-name-sfdc-prefix
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
      - id: metadata/package/manifest/entrypoint::has-index-entry
    any:
      - id: metadata/package/testing/presence/manifest::npm-init-default-test
      - id: metadata/package/quality/empty::npm-empty-description-any
      - id: metadata/package/quality/empty::npm-no-author
      - id: metadata/package/quality/empty::npm-no-keywords
    needs: 2
    unless:
      - id: metadata/package/manifest/repository/
      - id: metadata/package/files/package-json::has-files-field
      - id: metadata/package/manifest/runtime::has-engines
      - id: metadata/package/manifest/entrypoint::has-bin-field
      - id: metadata/package/manifest/publishing::is-private
      - id: objectives/supply-chain/impersonation/package/manifest/
  - id: scoped-placeholder-squatter
    desc: Scoped package looks like placeholder squatter
    crit: notable
    conf: 0.94
    attack: "T1195.002"
    mbc: "B0024"
    all:
      - id: metadata/package/manifest/name::scoped-package-name
      - id: metadata/package/manifest/entrypoint::has-index-entry
      - id: metadata/package/quality/empty::npm-empty-description-any
      - id: metadata/package/quality/empty::npm-empty-author
      - id: metadata/package/dependencies::npm-no-deps-devdependencies
      - id: metadata/package/testing/presence/manifest::npm-init-default-test
    unless:
      - id: metadata/package/manifest/name/
      - id: metadata/package/manifest/freeform/
      - id: metadata/package/files/package-json::has-files-field
      - id: metadata/package/manifest/runtime::has-engines
      - id: metadata/package/manifest/entrypoint::has-bin-field
      - id: metadata/package/manifest/publishing::is-private
      - id: objectives/supply-chain/impersonation/package/manifest/
  - id: tiny-postinstall-node-loader
    desc: Tiny package runs postinstall node loader
    crit: hostile
    conf: 0.97
    attack: "T1195.002"
    all:
      - id: postinstall-hook-key
      - id: postinstall-runs-node-script
      - id: metadata/package/manifest/freeform::pkg-skeleton-small
