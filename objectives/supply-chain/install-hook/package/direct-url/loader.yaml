defaults:
  platforms: [unix, windows]
  for: [package.json]
  attack: "T1195.002"
traits:
  - id: remote-http-dependency
    desc: Package depends on remote HTTP tarball
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "dependencies"
      regex: 'http://'
  - id: preinstall-node-index-hook
    desc: preinstall runs Node index script
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "scripts.preinstall"
      regex: "^node\\s+(\\./)?index\\.(c?js|mjs)$"
composite_rules:
  - id: remote-dependency-install-loader
    desc: Remote dependency triggers install loader
    crit: hostile
    conf: 0.98
    all:
      - id: remote-http-dependency
      - id: preinstall-node-index-hook
