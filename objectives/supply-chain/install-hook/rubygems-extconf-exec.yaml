defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [ruby]
composite_rules:
  - id: extconf-process-replacement
    desc: "extconf.rb replaces process via exec() (hostile behavior)"
    crit: hostile
    conf: 1.0
    all:
      - id: objectives/supply-chain/metadata-anomaly/behavior::extconf-file
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
  - id: extconf-shell-exec
    desc: "extconf.rb performs shell execution"
    crit: notable
    all:
      - id: objectives/supply-chain/metadata-anomaly/behavior::extconf-file
    any:
      - id: micro-behaviors/process/create/shell/lang::ruby-system-dup
      - id: objectives/supply-chain/metadata-anomaly/behavior::shell-exec-imports
