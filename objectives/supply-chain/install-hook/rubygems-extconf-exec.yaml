defaults:
  platforms: [unix, windows]
  for: [ruby]
composite_rules:
  - id: extconf-process-replacement
    desc: "extconf.rb replaces process via exec() (hostile behavior)"
    crit: hostile
    conf: 1.0
    all:
      - id: metadata/build::filename-extconf
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
  - id: extconf-shell-exec
    desc: "extconf.rb performs shell execution (suspicious in build scripts)"
    crit: suspicious
    downgrade:
      any:
        - id: well-known/lib/nokogiri::native-extension-bundle
    all:
      - id: metadata/build::filename-extconf
    any:
      - id: micro-behaviors/process/create/shell/lang::ruby-system-dup
      - id: objectives/supply-chain/metadata-anomaly/markers::shell-exec-imports
