defaults:
  platforms: [windows, unix]
  attack: T1195.002
  mbc: B0024
traits:
- id: preinstall-node-setup-bun
  desc: preinstall launches setup_bun.js
  crit: suspicious
  conf: 0.96
  for: [package.json]
  if:
    type: value
    path: "scripts.preinstall"
    exact: "node setup_bun.js"
- id: bun-install-pipe-shell
  desc: Installs Bun via piped installer
  crit: suspicious
  conf: 0.95
  for: [javascript]
  unless:
  - id: metadata/package/quality/false-positives::benign-app-fp-context
  if:
    type: text
    substr: https://bun.sh/install | bash
- id: bun-install-powershell-iex
  desc: Installs Bun via PowerShell IEX
  crit: suspicious
  conf: 0.95
  for: [javascript]
  if:
    type: text
    substr: irm bun.sh/install.ps1|iex
- id: bun-path-reload
  desc: Reloads PATH from shell profiles
  crit: suspicious
  conf: 0.9
  for: [javascript]
  if:
    type: text
    substr: source ${profileFile} && echo $PATH
- id: bun-which-where-probe
  desc: Bun availability probe command
  crit: notable
  conf: 0.88
  for: [javascript]
  if:
    type: text
    regex: '(?m)(^|[;&|''"`])\s*(where|which)\s+bun\b'
- id: bun-env-sidecar-name
  desc: References bun_environment.js payload
  crit: suspicious
  conf: 0.95
  for: [javascript]
  if:
    type: text
    substr: bun_environment.js
- id: js-megabyte-single-line-payload
  desc: Ten megabyte single-line JS payload
  crit: component
  conf: 0.97
  for: [javascript]
  size_min: 8000000
  if:
    type: metrics
    field: text.max_line_length
    min: 8000000
- id: js-heavy-xor-string-decode
  desc: Thousands of XOR-decoded strings
  crit: suspicious
  conf: 0.93
  for: [javascript]
  if:
    type: metrics
    field: binary.string_count
    min: 2000
- id: gcp-secretmanager-v1-marker
  desc: Google Secret Manager API namespace
  crit: component
  conf: 0.97
  for: [javascript]
  if:
    type: text
    substr: google.cloud.secretmanager.v1
- id: trufflehog-release-marker
  desc: Downloads latest trufflehog release
  crit: suspicious
  conf: 0.95
  for: [javascript]
  if:
    type: text
    substr: trufflesecurity/trufflehog/releases/latest
- id: npm-publish-token-env
  desc: Publishes npm package with token env
  crit: suspicious
  conf: 0.95
  for: [javascript]
  if:
    type: text
    substr: NPM_CONFIG_TOKEN
- id: bun-release-zip-download--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript]
  if:
    type: text
    regex: 'github\.com/oven-sh/bun/releases/download/bun-v.{0,40}/\$\{?asset\}?\.zip'
  count_max: 1026613
- id: bun-temp-runtime-staging--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [javascript]
  if:
    type: text
    regex: 'mkdtempSync\(.{0,120}os\.tmpdir\(\).{0,120}bun-dl-'
  count_max: 1026615
- id: bun-temp-runtime-staging--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [javascript]
  if:
    type: text
    regex: 'bun-dl-.{0,120}mkdtempSync\(.{0,120}os\.tmpdir\(\)'
  count_max: 1026616
- id: bun-downloaded-binary-exec--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [javascript]
  if:
    type: text
    regex: 'execFileSync\(\s*binPath\s*,\s*\[\s*entryScriptPath\s*\]'
  count_max: 1026617
- id: bun-downloaded-binary-exec--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [javascript]
  if:
    type: text
    regex: 'execFileSync\(\s*binPath\s*,\s*\[\s*path\.join\('
  count_max: 1026618
- id: bun-execution-js-sidecar
  desc: Bun launches execution.js sidecar
  crit: suspicious
  conf: 0.96
  for: [javascript]
  if:
    type: text
    regex: 'ENTRY_SCRIPT\s*=\s*["'']execution\.js["'']|["'']execution\.js["''].{0,160}execFileSync\('
- id: bun-temp-runtime-cleanup
  desc: Deletes temporary Bun runtime
  crit: component
  conf: 0.86
  for: [javascript]
  if:
    type: text
    regex: 'fs\.rmSync\(\s*tmpDir\s*,\s*\{\s*recursive:\s*true,\s*force:\s*true\s*\}'
composite_rules:
- id: bun-runtime-install-hook
  desc: Install hook bootstraps Bun sidecar runtime
  crit: hostile
  conf: 0.98
  all:
  - id: bun-env-sidecar-name
  - id: micro-behaviors/process/exit/terminate::process-exit-zero-repeat
  any:
  - id: bun-install-pipe-shell
  - id: bun-install-powershell-iex
  - id: bun-path-reload
  - id: micro-behaviors/os/env/modify::bun-path-setup-reference
  unless:
  - id: well-known/app/cloudflare/
- id: bun-path-stealth-bootstrap
  desc: Bun bootstrap mutates PATH and hides errors
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/process/exit/terminate::process-exit-zero-repeat
  any:
  - id: micro-behaviors/os/env/modify::bun-path-setup-reference
  - id: bun-path-reload
  unless:
  - id: well-known/app/cloudflare/
- id: cloud-secret-theft-payload
  desc: Obfuscated payload targets cloud secrets
  crit: hostile
  conf: 0.97
  all:
  - id: js-megabyte-single-line-payload
  - id: gcp-secretmanager-v1-marker
  any:
  - id: trufflehog-release-marker
  - id: npm-publish-token-env
  - id: js-heavy-xor-string-decode
- id: bun-temp-runtime-sidecar-loader
  desc: Temp Bun runtime executes local sidecar
  crit: suspicious
  conf: 0.97
  all:
  - id: bun-release-zip-download
  - id: bun-temp-runtime-staging
  - id: bun-downloaded-binary-exec
  any:
  - id: micro-behaviors/fs/chmod/modify::node-chmod
  - id: micro-behaviors/data/archive/extract/zip::unzip-tool-reference
  - id: bun-temp-runtime-cleanup
  unless:
  - id: well-known/app/cloudflare/
- id: cap-style-bun-execution-loader
  desc: Bun loader launches execution.js payload
  crit: hostile
  conf: 0.98
  all:
  - id: bun-temp-runtime-sidecar-loader
  - id: bun-execution-js-sidecar
  any:
  - id: bun-temp-runtime-cleanup
  - id: micro-behaviors/communications/http/download/handler::node-http-stream-to-file
  unless:
  - id: well-known/app/cloudflare/
- id: bun-release-zip-download
  desc: Downloads Bun release archive
  crit: notable
  conf: 0.9
  for: [javascript]
  any:
  - id: bun-release-zip-download--rx-1
  - id: micro-behaviors/communications/http/download/github::bun-release-archive-url
- id: bun-temp-runtime-staging
  desc: Stages Bun runtime in temp directory
  crit: suspicious
  conf: 0.94
  for: [javascript]
  any:
  - id: bun-temp-runtime-staging--rx-3
  - id: bun-temp-runtime-staging--rx-4
- id: bun-downloaded-binary-exec
  desc: Executes downloaded Bun binary
  crit: suspicious
  conf: 0.94
  for: [javascript]
  any:
  - id: bun-downloaded-binary-exec--rx-5
  - id: bun-downloaded-binary-exec--rx-6
