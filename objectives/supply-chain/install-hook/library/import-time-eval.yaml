# Library that evaluates a decrypted blob at import time.
#
# A npm package's main entry point invokes a module function at module
# top-level (`pkg.run()`) which decrypts a hardcoded ciphertext and runs
# the result via `new Function(require, decoded)(require)`. The kill
# chain fires on `require('<package-name>')` alone — no install hook
# required, no postinstall script. Used by aes-decode-runner-pro and
# similar npm encrypted-payload dropper families.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, archives, package.json]
  attack: T1195.002, T1027.013, T1059.007
  mbc: B0024
composite_rules:
  - id: python-import-time-user-path-modification
    desc: Python import-time user PATH modification
    crit: suspicious
    conf: 0.95
    attack: T1195.002
    for: [python]
    all:
      - id: micro-behaviors/data/control-flow/module-exec::module-level-bare-call
    any:
      - id: objectives/persistence/login/shell/profile::python-appends-path-to-login-profile
      - id: objectives/persistence/system/registry/surface::python-user-path-registry-write

  - id: library-import-time-encrypted-eval
    desc: Library decrypts and runs payload on import
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/init::top-level-require-method-call
      - id: objectives/anti-static/obfuscation/payload/encrypted::hardcoded-key-with-large-blob
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
    unless:
      - id: metadata/package/testing/harness/runtime/
