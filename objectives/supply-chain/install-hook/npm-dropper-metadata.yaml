defaults:
  platforms: [unix, windows]
  for: [package.json]
traits:
  - id: versioned-postinstall-node-src-index
    desc: postinstall runs node src index
    crit: suspicious
    conf: 0.95
    attack: "T1059.007"
    if:
      type: text
      regex: "\"postinstall\"\\s*:\\s*\"node\\s+src/index\\.js\""
  - id: versioned-postinstall-open-dot
    desc: postinstall opens current directory
    crit: notable
    conf: 0.88
    attack: "T1195.002"
    if:
      type: text
      regex: "\"postinstall\"\\s*:\\s*\"open\\s+\\.\""
  - id: versioned-lifecycle-curl-download-temp
    desc: Lifecycle hook curls payload to tmp
    crit: suspicious
    conf: 0.97
    attack: "T1105"
    if:
      type: text
      regex: "curl\\s+https?://[^\"\\s]{1,220}\\s+-o\\s+/tmp/[^\"\\s&;]{1,80}"
  - id: versioned-lifecycle-fastly-lookalike
    desc: Lifecycle hook uses Fastly-lookalike host
    crit: suspicious
    conf: 0.97
    attack: "T1036.005"
    if:
      type: text
      regex: "https://[a-z0-9.-]+\\.global\\.ssl\\.fastly\\.net/[^\"]{1,200}"
  - id: versioned-lifecycle-telemetry-uv-path
    desc: Lifecycle hook fetches telemetry uv path
    crit: suspicious
    conf: 0.98
    attack: "T1105"
    if:
      type: text
      substr: "/telemetry/image/uv"
  - id: versioned-lifecycle-chmod-temp-payload
    desc: Lifecycle hook chmods tmp payload
    crit: suspicious
    conf: 0.97
    attack: "T1222"
    if:
      type: text
      regex: "chmod\\s+\\+x\\s+/tmp/[^\"\\s&;]{1,80}"
  - id: versioned-lifecycle-temp-payload-exec
    desc: Lifecycle hook executes tmp payload
    crit: suspicious
    conf: 0.98
    attack: "T1059.004"
    if:
      type: text
      regex: "(/tmp/[^\"\\s&;]{1,80})\\s*&"
    not:
      - substr: "/tmp/docs/"
  - id: versioned-lifecycle-background-exec
    desc: Lifecycle hook backgrounds payload
    crit: suspicious
    conf: 0.93
    attack: "T1059.004"
    if:
      type: text
      regex: "(&&\\s*)?/tmp/[^\"\\s&;]{1,80}\\s*&"
    not:
      - substr: "/tmp/docs/"
  - id: versioned-dist-large-filecount
    desc: Registry package ships hundreds of files
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: "\"fileCount\"\\s*:\\s*4[0-9]{2}\\b"
  - id: versioned-dist-massive-unpacked-size
    desc: Registry package unpacks over 100MB
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "\"unpackedSize\"\\s*:\\s*1[0-9]{8}\\b"
  - id: versioned-publish-time-010
    desc: Registry metadata records version 0.1.0 time
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "\"0.1.0\": \"2025-08-12T11:15:43.963Z\""
  - id: versioned-publish-time-011
    desc: Registry metadata records version 0.1.1 time
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "\"0.1.1\": \"2025-08-12T12:31:01.303Z\""
  - id: versioned-publish-time-012
    desc: Registry metadata records version 0.1.2 time
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "\"0.1.2\": \"2025-08-12T13:57:22.479Z\""
composite_rules:
  - id: versioned-publish-window-hours
    desc: Registry metadata versions publish within hours
    crit: notable
    conf: 0.9
    all:
      - id: versioned-publish-time-010
      - id: versioned-publish-time-011
      - id: versioned-publish-time-012
  - id: postinstall-temp-dropper
    desc: Registry metadata drops and runs tmp payload
    crit: hostile
    conf: 0.995
    attack: "T1105"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-postinstall-hook
      - id: versioned-lifecycle-curl-download-temp
      - id: versioned-lifecycle-chmod-temp-payload
      - id: versioned-lifecycle-temp-payload-exec
    any:
      - id: versioned-lifecycle-fastly-lookalike
      - id: versioned-lifecycle-telemetry-uv-path
      - id: versioned-lifecycle-background-exec
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-dist-tarball-url
    needs: 1
  - id: camouflaged-postinstall-package
    desc: Large registry package hides install hook
    crit: suspicious
    conf: 0.94
    attack: "T1195.002"
    all:
      - id: objectives/supply-chain/metadata-anomaly/registry::registry-metadata-json
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-postinstall-hook
      - id: versioned-dist-large-filecount
      - id: versioned-dist-massive-unpacked-size
    any:
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-postinstall-node-entry
      - id: versioned-postinstall-open-dot
      - id: versioned-publish-window-hours
      - id: objectives/supply-chain/metadata-anomaly/registry::versioned-maintainer-list-single
    needs: 1
