# A hook-only stub: a package that ships an empty main module (module.exports={})
# yet declares a lifecycle install hook, under an "Unofficial <name> SDK" typosquat
# cover. It provides zero library functionality — its sole reason to exist is to
# run code at install time — while masquerading as a legitimate SDK. No real SDK
# is an empty object with an install hook; the pairing has no benign use.
defaults:
  platforms: [unix, windows]
  for: [package.json, javascript, npm]
  attack: "T1195.002"
composite_rules:
  - id: unofficial-sdk-empty-main-install-hook
    desc: Empty-stub SDK typosquat runs an install hook
    crit: hostile
    conf: 0.9
    scope: archive
    all:
      - id: objectives/supply-chain/impersonation/typosquat::unofficial-sdk-cover-description
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-hook-key
      - id: metadata/package/files/package-json::js-empty-object-export
