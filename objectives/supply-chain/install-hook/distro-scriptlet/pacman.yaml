defaults:
  platforms: [linux]
  for: [shell]
  attack: T1195.002

traits:
  - id: pacman-scriptlet-hook
    # Reuses the metadata capability atom (the line-anchored `^...() {`
    # lifecycle-hook declaration) and frames it as the supply-chain install
    # vector: pacman/AUR `.install` scriptlets run post_install/pre_upgrade/
    # post_remove/... as root during `pacman -U`/AUR build. Referencing the
    # shared atom avoids a second near-identical regex and inherits its anchored
    # `(){` form, so a bare `post_install()` mention in prose or a comment cannot
    # trip the hostile composites below.
    desc: Defines a pacman install scriptlet hook
    crit: notable
    conf: 0.85
    if:
      id: metadata/build/package::pacman-scriptlet-hook-fn

composite_rules:
  - id: pacman-scriptlet-remote-file-download
    desc: pacman scriptlet downloads remote files
    crit: suspicious
    conf: 0.9
    all:
      - id: pacman-scriptlet-hook
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: micro-behaviors/communications/http/download/curl::curl-output-staging-path
    near_lines: 40

  # These package-install objectives deliberately include the pacman lifecycle
  # hook in the same file. A PKGBUILD build() can legitimately run `npm install`;
  # the supply-chain concern here is a root-level pacman scriptlet shelling into
  # a second package manager during package install/upgrade/removal.
  - id: scriptlet-npm-install-package
    desc: Scriptlet installs a named npm package
    crit: notable
    conf: 0.8
    all:
      - id: pacman-scriptlet-hook
      - id: micro-behaviors/process/create/shell/build::npm-named-package-install-command

  - id: scriptlet-pip-install-package
    desc: Scriptlet installs a pip package
    crit: notable
    conf: 0.8
    all:
      - id: pacman-scriptlet-hook
      - id: micro-behaviors/process/create/shell/build::pip-named-package-install-command
    unless:
      - id: well-known/app/localai/

  - id: scriptlet-gem-install-package
    desc: Scriptlet installs a RubyGems package
    crit: notable
    conf: 0.8
    all:
      - id: pacman-scriptlet-hook
      - id: micro-behaviors/process/create/shell/build::gem-named-package-install-command

  - id: scriptlet-js-runtime-install-package
    # bun/pnpm/yarn install named npm packages just like `npm install`; the
    # downloaded package's own lifecycle scripts then run as root. Anchored to
    # shell command position, same as the npm/pip/gem legs above.
    desc: "Scriptlet sets a JS package via bun/pnpm/yarn"
    crit: notable
    conf: 0.8
    all:
      - id: pacman-scriptlet-hook
      - id: micro-behaviors/process/create/shell/build::js-runtime-named-package-install-command

  - id: scriptlet-runtime-fetch-install
    # deno/pipx/uv fetch and run arbitrary remote code at install time the same
    # way npm/bun do. Anchored to shell command position like the other legs.
    desc: Scriptlet installs via deno/pipx/uv
    crit: notable
    conf: 0.8
    all:
      - id: pacman-scriptlet-hook
      - id: micro-behaviors/process/create/shell/build::runtime-fetch-install-command

  - id: scriptlet-native-toolchain-install
    # cargo/go fetch+build+install arbitrary remote code at the named target's
    # discretion (cargo runs the crate's build.rs; `go install …@latest` pulls
    # and compiles a module). A legitimate AUR package builds in the PKGBUILD's
    # build() with declared makedepends — it never shells into a language
    # toolchain from a root install scriptlet. The compiled-language pivot the
    # npm→bun wave implies.
    desc: Scriptlet installs via cargo/go toolchain
    crit: notable
    conf: 0.8
    all:
      - id: pacman-scriptlet-hook
      - id: micro-behaviors/process/create/shell/build::native-toolchain-install-command

  - id: pacman-scriptlet-foreign-package-bootstrap
    # The AUR/ALVR supply-chain vector: a distro package's root-level install
    # scriptlet pulls a foreign-ecosystem package (npm/pip/gem), whose own
    # install hooks then execute as root. A legitimate package declares its
    # dependencies through the PKGBUILD and pacman — it does not shell out to a
    # second package manager to fetch arbitrary code at install time.
    desc: pacman scriptlet bootstraps a foreign-ecosystem package install
    crit: hostile
    conf: 0.95
    all:
      - id: pacman-scriptlet-hook
    any:
      - id: scriptlet-npm-install-package
      - id: scriptlet-pip-install-package
      - id: scriptlet-gem-install-package
      - id: scriptlet-js-runtime-install-package
      - id: scriptlet-native-toolchain-install
      - id: scriptlet-runtime-fetch-install
      - id: objectives/command-and-control/dropper/execution/pipe::curl-download-pipe-shell

  - id: pacman-scriptlet-obfuscated-command
    # A distro install scriptlet runs as root during `pacman -U`/AUR install. A
    # legitimate `.install` file runs plain shell (user/group setup, cache
    # refreshes); it has no reason to shatter its commands into ANSI-C octal/hex
    # escapes or single-character string fragments. Obfuscation inside an
    # install hook is concealment of what executes as root — unambiguously
    # malicious, regardless of the (hidden) payload. This catches the obfuscated
    # `bun add` bootstrap even though its literal text never appears as plain.
    desc: pacman install scriptlet conceals its command with string obfuscation
    crit: hostile
    conf: 0.96
    attack: T1195.002, T1027
    all:
      - id: pacman-scriptlet-hook
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::sh-dense-octal-escapes
      - id: objectives/anti-static/obfuscation/code-metrics/structure::sh-dense-hex-escapes
      - id: objectives/anti-static/obfuscation/code-metrics/structure::sh-char-split-concatenation

  - id: pacman-scriptlet-shell-rc-persistence
    # A pacman/AUR install scriptlet that runs as root during `pacman -U`/AUR
    # build and writes into a LIVE system-wide shell rc (/etc/bash.bashrc,
    # /etc/zsh/zshrc, /etc/profile[.d], /etc/fish/...). A legitimate package
    # ships files into "$pkgdir" via install(1); it has no reason to append to
    # the running host's global shell startup from post_install. This is
    # root-level persistence/defacement injected through the package lifecycle,
    # hostile regardless of the (here merely abusive) payload. Catches the
    # gimp-plugin-beautify "albanian virus" trojanized-AUR family and any
    # future variant that smuggles persistence into a distro scriptlet.
    desc: pacman install scriptlet writes persistence into system shell rc
    crit: hostile
    conf: 0.96
    attack: T1195.002, T1546.004
    all:
      - id: pacman-scriptlet-hook
      - id: objectives/persistence/login/shell/rc::system-shell-rc-write

  - id: pacman-scriptlet-privilege-backdoor
    # A pacman/AUR scriptlet runs as root during install. Injecting an SSH key
    # into authorized_keys, granting NOPASSWD sudo, or adding the install user
    # to wheel/sudo from that hook are root-level backdoor primitives with no
    # legitimate packaging use (a package declares users via sysusers.d and
    # never hands out remote access or passwordless root at install time). Each
    # leg is an independent, generic capability detected elsewhere; the
    # supply-chain intent is the root-at-install context this composite adds.
    desc: pacman install scriptlet installs a root backdoor
    crit: hostile
    conf: 0.95
    attack: T1195.002, T1098.004
    all:
      - id: pacman-scriptlet-hook
    any:
      - id: objectives/persistence/login/ssh/backdoor::authorized-keys-append
      - id: micro-behaviors/fs/config/sudo::sudo-nopasswd
      - id: objectives/persistence/login/account/create::privilege-escalation-setup

  - id: pacman-scriptlet-disables-firewall-services
    desc: pacman scriptlet disables firewall services
    crit: suspicious
    conf: 0.92
    ref: sha256:4f2559adefb2c0f7a7efa5d9395565bb1a0e4e9f5ce62a8b8be433facbb2d3be
    attack: T1195.002, T1562.004
    all:
      - id: pacman-scriptlet-hook
      - id: objectives/impact/degrade/firewall::iptables-service-disable

  - id: pacman-scriptlet-persists-empty-firewall
    desc: pacman scriptlet persists cleared firewall
    crit: suspicious
    conf: 0.92
    ref: sha256:4f2559adefb2c0f7a7efa5d9395565bb1a0e4e9f5ce62a8b8be433facbb2d3be
    attack: T1195.002, T1562.004
    all:
      - id: pacman-scriptlet-hook
      - id: objectives/impact/degrade/firewall::persisted-empty-dualstack-firewall

  - id: pacman-foreign-runtime-bootstrap
    # The supply-chain anomaly across the whole package: the PKGBUILD pulls in a
    # JS runtime AND the install scriptlet either obfuscates its command or
    # invokes that runtime to fetch packages at root install time. A genuine
    # C/C++ AUR package (nano-node here) has no reason to depend on `bun` and
    # then shell into it from post_install. Pooled across the archive's PKGBUILD
    # and .install members; survives future variants that change obfuscation
    # style as long as the foreign-runtime dependency stays declared.
    desc: pacman package pairs a JS-runtime dependency with a foreign-bootstrap scriptlet
    crit: hostile
    conf: 0.95
    for: [shell, archives]
    scope: archive
    all:
      - id: metadata/build/package::pkgbuild-js-runtime-dependency
    any:
      - id: pacman-scriptlet-obfuscated-command
      - id: pacman-scriptlet-foreign-package-bootstrap
