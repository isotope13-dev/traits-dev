# npm / Node.js auto-execute-on-require patterns.
# When a package's main entry point invokes the loaded module at top level
# (e.g., `const pkg = require("./x"); pkg.run();`), every downstream
# consumer who imports the package fires the loader on `require()`. This
# is the JS equivalent of Python's __init__.py-side-effect dropper trigger.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002
  mbc: B0024
traits:
  # These three are building blocks for the `js-auto-exec-on-require` composite
  # below (which carries the bundle/test unless: exclusions). On their own,
  # "require a module then call a method on it" is the universal CommonJS idiom
  # (`const v8 = require("v8"); v8.takeCoverage();`), so keep them component —
  # the dropper signal is the composite, not any single require+call.
  - id: top-level-require-method-call
    desc: Top-level method call on require() result
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*(const|let|var)\s+\w+\s*=\s*require\s*\(.{1,80}\)\s*;?[ \t]*\n[ \t]*\w+\.\w+\s*\('
    # Transpiled CommonJS re-export barrels emit `var X_1 = require("./X");`
    # immediately followed by `Object.defineProperty(exports, ...)` getters —
    # not a call on the require() result. Rust regex lacks backreferences, so
    # filter the universal tsc/babel re-export idiom by evidence content.
    not:
      - substr: 'Object.defineProperty'
      - substr: '__createBinding'
  - id: top-level-require-immediate-call
    desc: Immediate call on require() result
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*require\s*\(.{1,80}\)\s*\.\s*\w+\s*\(\s*\)'
  - id: top-level-require-iife
    desc: IIFE invocation of require() result
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?m)^\s*\(\s*require\s*\(.{1,80}\)\s*\)\s*\('
composite_rules:
  - id: js-auto-exec-on-require
    desc: Package auto-executes loaded module on require
    crit: suspicious
    conf: 0.92
    any:
      - id: top-level-require-method-call
      - id: top-level-require-immediate-call
      - id: top-level-require-iife
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure/
      - id: metadata/package/quality/recognized-contexts-extra::libnpx-package-context
