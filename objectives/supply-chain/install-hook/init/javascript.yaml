# npm / Node.js auto-execute-on-require patterns.
# When a package's main entry point invokes the loaded module at top level
# (e.g., `const pkg = require("./x"); pkg.run();`), every downstream
# consumer who imports the package fires the loader on `require()`. This
# is the JS equivalent of Python's __init__.py-side-effect dropper trigger.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1195.002
  mbc: B0024
traits:
  - id: top-level-require-method-call
    desc: Top-level method call on require() result
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*(const|let|var)\s+\w+\s*=\s*require\s*\(.{1,80}\)\s*;?\s*\n\s*\w+\s*\.\s*\w+\s*\('
  - id: top-level-require-immediate-call
    desc: Immediate call on require() result
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*require\s*\(.{1,80}\)\s*\.\s*\w+\s*\(\s*\)'
  - id: top-level-require-iife
    desc: IIFE invocation of require() result
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?m)^\s*\(\s*require\s*\(.{1,80}\)\s*\)\s*\('
composite_rules:
  - id: js-auto-exec-on-require
    desc: Package auto-executes loaded module on require
    crit: suspicious
    conf: 0.92
    any:
      - id: top-level-require-method-call
      - id: top-level-require-immediate-call
      - id: top-level-require-iife
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-webpack-bundle
