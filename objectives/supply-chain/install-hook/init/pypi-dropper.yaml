defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  mbc: B0024
  attack: T1195.002
composite_rules:
  - id: download-exec-indicators
    desc: Download or execution staging indicators
    crit: component
    conf: 0.8
    any:
      - id: micro-behaviors/communications/http/download/helper::safe-download-import
      - id: objectives/command-and-control/dropper/lifecycle::download-with-delete-param
      - id: micro-behaviors/process/create/wrapper::safe-run-call
      - id: micro-behaviors/process/create/system::python-os-system
      - id: objectives/command-and-control/dropper/execution/script::inline-wget-download-exec
      - id: micro-behaviors/process/daemonize/detach::nohup-string-command
  - id: platform-checks
    desc: Combined platform.system and platform.machine
    crit: component
    conf: 0.75
    all:
      - id: micro-behaviors/os/sysinfo/platform/runtime::platform-system
      - id: micro-behaviors/os/sysinfo/platform/runtime::python-platform-machine
  - id: platform-targeted-download
    desc: Platform-targeted binary download
    crit: suspicious
    conf: 0.9
    near_lines: 80
    needs: 2
    all:
      - id: micro-behaviors/fs/path/temp::unix-temp
      - id: download-exec-indicators
    any:
      - id: platform-checks
      - id: micro-behaviors/os/sysinfo/platform/string
      - id: micro-behaviors/os/sysinfo/platform/runtime::python-platform-machine
  - id: init-dropper
    desc: Supply chain dropper in module init
    crit: suspicious
    conf: 0.95
    near_lines: 120
    needs: 2
    all:
      - id: objectives/supply-chain/recon-exfil/install-hook::init-py-file
    any:
      - id: objectives/command-and-control/dropper/lifecycle::download-with-delete-param
      - id: micro-behaviors/process/create/wrapper::safe-run-call
      - id: micro-behaviors/communications/http/download/helper::safe-download-import
      - id: micro-behaviors/process/create/system::python-os-system
      - id: objectives/execution/condition/platform::os-specific-execution
      - id: objectives/command-and-control/dropper/execution/script::inline-wget-download-exec
      - id: micro-behaviors/process/daemonize/detach::nohup-string-command
    unless:
      - id: metadata/package/files::configure-script
