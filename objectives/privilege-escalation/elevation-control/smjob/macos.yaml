# macOS SMJobBless Privileged Helper Declaration
# SMPrivilegedExecutables in Info.plist declares that the app installs
# a privileged (root) helper tool via SMJobBless. The helper runs as root
# persistently after installation.
# ATT&CK: T1548.004 (Abuse Elevation Control Mechanism: Elevated Execution with Prompt)
defaults:
  platforms: [macos]
  for: [plist]
  attack: "T1548.004"

traits:
  - id: sm-privileged-executables
    desc: Declares privileged SMJobBless helper
    crit: notable
    conf: 0.9
    if:
      type: value
      path: "SMPrivilegedExecutables"
      exists: true

composite_rules:
  - id: smjob-arbitrary-loads
    desc: Privileged helper with ATS bypass
    crit: suspicious
    conf: 0.9
    all:
      - id: sm-privileged-executables
      - id: micro-behaviors/communications/http/ats::allows-arbitrary-loads
