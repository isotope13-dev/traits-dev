defaults:
  platforms: [solaris, unix]
  for: [c, cpp, objc, elf]
  attack: T1548

traits:
  - id: solaris-psetpriv-add-effective
    desc: Solaris adds effective privs
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'psetpriv\s*\(\s*PRIV_ADD[\s\S]{0,120}PRIV_EFFECTIVE'

  - id: solaris-dangerous-priv-list
    desc: Solaris dangerous priv list
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'priv_(file_link_any|proc_info|net_rawaccess|sys_netconfig)'

composite_rules:
  - id: solaris-native-privilege-add
    desc: Solaris native privilege add
    crit: hostile
    conf: 0.98
    all:
      - id: solaris-psetpriv-add-effective
      - id: solaris-dangerous-priv-list
