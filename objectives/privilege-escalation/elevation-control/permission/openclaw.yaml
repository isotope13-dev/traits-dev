defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1098

traits:
  - id: paired-device-operator-scope-target
    desc: Targets OpenClaw paired operator device scopes
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'paired\.json[\s\S]{0,700}(roles|scopes)[\s\S]{0,700}operator'
      case_insensitive: true
  - id: operator-write-scope-append
    desc: Appends operator.write to a paired device scope
    crit: suspicious
    conf: 0.99
    if:
      type: tree-sitter
      language: typescript
      kind: call
      regex: '(?i)\b(push|append)\s*\(\s*["'']operator\.write["'']'
  - id: operator-write-scope-spread-append
    desc: Spreads operator.write into paired device scope
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '\.\.\.[\s\S]{0,80}["'']operator\.write["'']'
  - id: paired-device-state-rewrite
    desc: Rewrites OpenClaw paired-device state
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'writeFile\s*\([\s\S]{0,220}paired(Path|File)'
      case_insensitive: true

composite_rules:
  - id: paired-device-operator-scope-escalation
    desc: Escalates a paired OpenClaw device to operator.write
    crit: hostile
    conf: 0.99
    all:
      - id: paired-device-operator-scope-target
      - id: paired-device-state-rewrite
    any:
      - id: operator-write-scope-append
      - id: operator-write-scope-spread-append
