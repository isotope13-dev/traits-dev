defaults:
  platforms: [android]
  for: [kotlin]
  attack: T1548

traits:
  - id: kotlin-pm-grant-command
    desc: Kotlin pm grant command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '"pm",\s*"grant"|pm grant'

  - id: kotlin-dpm-admin-command
    desc: Kotlin DPM admin command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'dpm",\s*"set-active-admin"|set-active-admin'

composite_rules:
  - id: kotlin-android-permission-elevation
    desc: Kotlin Android permission elevation
    crit: hostile
    conf: 0.97
    all:
      - id: kotlin-pm-grant-command
    any:
      - id: kotlin-dpm-admin-command
      - id: objectives/privilege-escalation/elevation-control/sudo::kotlin-android-su-execution
