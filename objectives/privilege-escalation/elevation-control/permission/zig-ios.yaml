defaults:
  platforms: [ios]
  for: [zig]
  attack: T1548

traits:
  - id: zig-ios-sandbox-extension-create
    desc: Zig iOS sandbox extension create
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sandbox_extension_create

  - id: zig-ios-private-sandbox-filesystem
    desc: Zig iOS private sandbox entitlement
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: com.apple.private.sandbox.filesystem

composite_rules:
  - id: zig-ios-sandbox-extension-escalation
    desc: Zig iOS sandbox extension escalation
    crit: hostile
    conf: 0.98
    all:
      - id: zig-ios-sandbox-extension-create
      - id: zig-ios-private-sandbox-filesystem
