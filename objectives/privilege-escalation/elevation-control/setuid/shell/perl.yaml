defaults:
  platforms: [unix, openwrt]
  for: [perl]
  attack: T1548.001

traits:
  - id: perl-suid-find-command
    desc: Perl SUID find command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'find / -perm -4000 -type f'
  - id: perl-temp-suid-shell-path
    desc: Perl temporary SUID shell path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "/tmp/.su_"
  - id: perl-netcheck-helper-path
    desc: Perl netcheck helper path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.netcheck
  - id: perl-chmod-4755-helper
    desc: Perl chmod 4755 helper
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'chmod 4755,\s*\$helper'

composite_rules:
  - id: perl-temp-setuid-shell
    desc: Perl temporary setuid shell
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-setuid-file
    any:
      - id: perl-temp-suid-shell-path
      - id: perl-suid-find-command
    needs: 1
  - id: perl-netcheck-setuid-helper
    desc: Perl netcheck setuid helper
    crit: hostile
    conf: 0.97
    all:
      - id: perl-netcheck-helper-path
      - id: perl-chmod-4755-helper
      - id: micro-behaviors/os/privilege/paths::etc-shadow
