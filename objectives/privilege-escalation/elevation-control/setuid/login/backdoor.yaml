defaults:
  platforms: [unix]
  for: [c]
  crit: suspicious
  conf: 0.9
  attack: T1548.001
traits:
  - id: encoded-magic-password
    desc: Decodes embedded magic password
    conf: 0.92
    if:
      type: text
      substr: code(magic)
  - id: magic-password-bypass
    desc: Magic password bypasses login check
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: strcmp\(passwd,magic\)
  - id: elite-auth-gate
    desc: Elite flag skips normal auth checks
    conf: 0.94
    if:
      type: text
      substr: elite==0
  - id: captured-password-buffer
    desc: Hidden password capture buffer path
    conf: 0.86
    if:
      type: string_literal
      exact: /usr/spool/lpd/.login
composite_rules:
  - id: trojaned-login-backdoor
    desc: Login binary accepts hidden root password
    crit: hostile
    conf: 0.99
    all:
      - id: encoded-magic-password
      - id: magic-password-bypass
      - id: elite-auth-gate
