defaults:
  attack: T1548.001
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries, c]
composite_rules:
  - id: setuid-shell-exec
    desc: Setuid with shell execution
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/process/identity/setuid::setuid-dup
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
    unless:
      - id: metadata/signed/platform::apple
    downgrade:
      any:
        - id: micro-behaviors/process/fork/clone::daemon-dup
        - id: micro-behaviors/process/identity/setuid::drop-privs
  - id: setgid-shell-exec
    desc: Setgid with shell execution
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/process/identity/setuid::setgid
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
    unless:
      - id: metadata/signed/platform::apple
    downgrade:
      any:
        - id: micro-behaviors/process/fork/clone::daemon-dup
        - id: micro-behaviors/process/identity/setuid::drop-privs
