# Ruby GTFOBins Abuse Detection
# Detects Ruby being abused for various system-level operations
# GTFOBins: https://gtfobins.github.io/
# ATT&CK: T1059 (Command and Scripting Interpreter), T1068 (Exploitation for Privilege Escalation)
defaults:
  for: [ruby]
  platforms: [unix, windows]
traits:
  - id: fiddle-stdlib-loader
    desc: Ruby stdlib Fiddle loader
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: "if RUBY_ENGINE == 'ruby'\\s*\\n\\s*require 'fiddle\\.so'"
composite_rules:
  - id: setuid-privilege-escalation
    desc: Setuid privilege escalation
    crit: notable
    conf: 0.95
    attack: "T1068"
    any:
      - id: micro-behaviors/process/identity/setuid::ruby-setuid
      - id: micro-behaviors/os/security/capabilities::cap-setuid
  - id: gtfobins-library-load
    desc: GTFOBins shared library loading
    crit: suspicious
    conf: 0.93
    attack: "T1059"
    needs: 2
    unless:
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::embedded-runtime-path
      - id: well-known/lib/jruby::jruby-home-path
      - id: well-known/lib/jruby::module-marker
      - id: fiddle-stdlib-loader
    any:
      - id: micro-behaviors/dylib/load/ffi::fiddle-dlopen
      - id: micro-behaviors/dylib/load/ffi::shared-lib-exec
  - id: gtfobins-privilege-escalation
    desc: GTFOBins privilege escalation
    crit: suspicious
    conf: 0.95
    attack: "T1068"
    needs: 2
    any:
      - id: setuid-privilege-escalation
      - id: objectives/privilege-escalation/elevation-control/setuid/runtime::ruby-root-shell
      - id: micro-behaviors/process/create/shell/lang::ruby-shell-exec
  - id: gtfobins-file-ops
    desc: Setuid Ruby file operations
    crit: suspicious
    conf: 0.9
    attack: "T1083"
    all:
      - id: setuid-privilege-escalation
    any:
      - id: micro-behaviors/fs/file/read::ruby-file-read-content
      - id: micro-behaviors/fs/file/read::ruby-file-read-open
      - id: micro-behaviors/fs/write/file/direct::ruby-file-write-content

# Note: gtfobins-reverse-shell moved to objectives/command-and-control/reverse-shell/technique/gtfobins.yaml
# as it infers objective (reverse shell) rather than just capability
