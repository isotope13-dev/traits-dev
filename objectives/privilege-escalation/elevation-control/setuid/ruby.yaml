defaults:
  attack: T1068
  for:
    - ruby
  platforms:
    - unix
traits:
  - id: ruby-setuid-zero
    desc: Ruby setuid to root (UID 0)
    crit: suspicious
    conf: 0.92
    if:
      type: string_literal
      regex: setuid\(0\)|Process::Sys\.setuid\(0\)
composite_rules:
  - id: ruby-setuid-exec
    desc: Ruby setuid with command execution
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/identity/setuid::ruby-setuid
    any:
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
      - id: ruby-setuid-zero
  - id: ruby-root-shell
    desc: Root shell execution via setuid
    crit: hostile
    conf: 0.95
    all:
      - id: ruby-setuid-zero
    any:
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
  - id: ruby-capability-privesc
    desc: Capability-based privilege escalation
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/os/security/capabilities::cap-setuid
      - id: micro-behaviors/process/identity/setuid::ruby-setuid
