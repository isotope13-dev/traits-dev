defaults:
  platforms: [freebsd, unix]
  for: [objc]
  attack: T1548.001

traits:
  - id: objc-suid-binary-search
    desc: ObjC searches for SUID binaries
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: find %s -perm -4000 -type f

  - id: objc-suid-shell-setuid-root
    desc: ObjC attempts SUID shell setuid root
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'S_ISUID[\s\S]{0,180}setuid\s*\(\s*0\s*\)'

composite_rules:
  - id: objc-freebsd-suid-escalation-probe
    desc: ObjC FreeBSD SUID escalation probe
    crit: hostile
    conf: 0.98
    all:
      - id: objc-suid-binary-search
      - id: objc-suid-shell-setuid-root
