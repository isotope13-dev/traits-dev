defaults:
  platforms: [android]
  for: [c, cpp, elf]
  attack: T1548

traits:
  - id: android-root-setid-source
    desc: Android root setid attempt
    crit: suspicious
    conf: 0.94
    for: [c, cpp]
    if:
      type: text
      regex: '\b(setuid|setgid|setresuid|setresgid)\s*\(\s*0\s*,?\s*0?\s*,?\s*0?\s*\)'

  - id: android-uid-map-write
    desc: Android UID map write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc/self/(uid_map|gid_map|setgroups)'

  - id: android-system-aid-setid
    desc: Android system AID setid
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'AID_SYSTEM|aid_system|uid=1000'

  - id: android-system-gid-setid
    desc: Android system GID setid
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'gid=1000|setres(uid|gid)\(1000'

composite_rules:
  - id: android-root-identity-escalation
    desc: Android root identity escalation
    crit: hostile
    conf: 0.98
    all:
      - id: android-root-setid-source
      - id: android-uid-map-write
    any:
      - id: android-system-aid-setid
      - id: android-system-gid-setid
      - id: micro-behaviors/process/identity/setuid::setuid-dup
      - id: micro-behaviors/process/identity/setuid::setgid
