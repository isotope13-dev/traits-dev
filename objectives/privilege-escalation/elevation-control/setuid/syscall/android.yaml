defaults:
  platforms: [android]
  for: [c, cpp, elf]
  attack: T1548

traits:
  - id: uid-map-write-path
    desc: User-namespace uid/gid map write path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/proc/self/(uid_map|gid_map|setgroups)'

  - id: android-aid-platform-marker
    desc: Android AID platform marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'AID_[A-Z]'

  - id: android-system-path-marker
    desc: Android system path marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/system/(bin|etc)/'

  - id: android-property-platform-marker
    desc: Android property platform marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: __system_property_

  - id: android-getprop-platform-marker
    desc: Android getprop platform marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: getprop

  - id: android-lib-platform-marker
    desc: Android library platform marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: libandroid

  - id: android-java-platform-marker
    desc: Android Java platform marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: android.os.

  - id: android-system-aid-setid
    desc: Android system AID setid
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'AID_SYSTEM|aid_system|uid=1000'

  - id: android-system-gid-setid
    desc: Android system GID setid
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'gid=1000|setres(uid|gid)\(1000'

composite_rules:
  - id: android-platform-marker
    desc: Android platform marker
    crit: component
    conf: 0.92
    any:
      - id: android-aid-platform-marker
      - id: android-system-path-marker
      - id: android-property-platform-marker
      - id: android-getprop-platform-marker
      - id: android-lib-platform-marker
      - id: android-java-platform-marker

  - id: android-uid-map-write
    desc: Android UID map write
    crit: suspicious
    conf: 0.94
    all:
      - id: uid-map-write-path
      - id: android-platform-marker
    unless:
      - id: well-known/app/nekobox::android-apk
      - id: well-known/app/nekobox::sing-box-runtime-text

  - id: android-root-identity-escalation
    desc: Android root identity escalation
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/privilege-escalation/elevation-control/setuid/syscall::unix-root-setid-source
      - id: android-uid-map-write
    any:
      - id: android-system-aid-setid
      - id: android-system-gid-setid
      - id: micro-behaviors/process/identity/setuid::setuid-dup
      - id: micro-behaviors/process/identity/setuid::setgid
