defaults:
  platforms: [android]
  for: [c, cpp, elf]
  attack: T1548

traits:
  - id: android-system-aid-setid
    desc: Android system AID setid
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'AID_SYSTEM|aid_system|uid=1000'

  - id: android-system-gid-setid
    desc: Android system GID setid
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'gid=1000|setres(uid|gid)\(1000'

composite_rules:
  - id: android-platform-marker
    desc: Android platform marker
    crit: component
    conf: 0.92
    any:
      - id: metadata/file/string/identity::android-aid-platform-marker
      - id: metadata/file/string/identity::android-system-path-marker
      - id: metadata/file/string/identity::android-property-platform-marker
      - id: metadata/file/string/identity::android-getprop-platform-marker
      - id: metadata/file/string/identity::android-lib-platform-marker
      - id: metadata/file/string/identity::android-java-platform-marker
    needs: 2

  - id: android-root-identity-escalation
    desc: Android root identity escalation
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/privilege-escalation/elevation-control/setuid/syscall::unix-root-setid-source
      - id: micro-behaviors/fs/proc/info/path::user-namespace-id-map-path
      - id: android-platform-marker
    any:
      - id: android-system-aid-setid
      - id: android-system-gid-setid
      - id: micro-behaviors/process/identity/setuid::setuid-dup
      - id: micro-behaviors/process/identity/setuid::setgid
