# Identity Change Syscalls - Privilege Escalation Composites
# Atomic syscall traits in micro-behaviors/process/identity/syscall/linux.yaml
# ATT&CK: T1548.001 (Setuid and Setgid)
defaults:
  platforms: [linux, unix]
  attack: "T1548.001"
composite_rules:
  - id: setuid-to-root-shell
    desc: Identity change syscall with shell execution
    crit: suspicious
    conf: 0.85
    for: [elf, shell, python]
    all:
      - id: micro-behaviors/process/identity/syscall::setuid-comp
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
    downgrade:
      any:
        - id: micro-behaviors/process/fork/clone::daemon-dup
        - id: micro-behaviors/process/identity/setuid::drop-privs
  - id: capset-shell-exec
    desc: Capability change with shell execution
    crit: suspicious
    conf: 0.88
    for: [elf, c]
    all:
      - id: micro-behaviors/process/identity/syscall::capset-syscall
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
