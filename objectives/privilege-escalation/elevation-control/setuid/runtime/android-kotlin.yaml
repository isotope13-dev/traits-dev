defaults:
  platforms: [android]
  for: [kotlin]
  attack: T1548.001

traits:
  - id: kotlin-chmod-setuid-su
    desc: Kotlin chmod setuid su staging
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'chmod (6755|4755).{0,80}/data/local/tmp/su'

composite_rules:
  - id: kotlin-setuid-su-staging
    desc: Kotlin setuid su staging
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-chmod-setuid-su
      - id: objectives/privilege-escalation/elevation-control/sudo::kotlin-android-su-execution
