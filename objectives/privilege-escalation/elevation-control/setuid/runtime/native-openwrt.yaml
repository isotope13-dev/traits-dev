defaults:
  platforms: [openwrt]
  for: [c, cpp, elf]
  attack: T1548.001
traits:
  - id: native-setid-root-source
    desc: Native source sets root IDs
    crit: notable
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      regex: '\b(setuid|setgid|setreuid|setregid)\s*\(\s*0'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: native-root-useradd-command
    desc: Native payload creates UID 0 shell account
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\b(useradd|adduser)\b.{0,160}(-u\s+0|-o).{0,160}/bin/sh'
  - id: native-chpasswd-command
    desc: Native payload changes account password
    crit: notable
    conf: 0.88
    if:
      type: text
      word: chpasswd
  - id: native-suid-shell-abuse
    desc: Native payload attempts SUID shell abuse
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/bin/busybox sh -p|find / -exec /bin/sh -p)'
composite_rules:
  - id: openwrt-native-root-account-privesc
    desc: OpenWrt native root account privilege escalation
    crit: hostile
    conf: 0.96
    scope: outer
    all:
      - id: native-root-useradd-command
    any:
      - id: native-chpasswd-command
      - id: native-setid-root-source
      - id: native-suid-shell-abuse
      - id: micro-behaviors/process/identity/setuid::setuid-dup
      - id: micro-behaviors/process/identity/setuid::setgid
    needs: 1
  - id: openwrt-native-setid-shell-privesc
    desc: OpenWrt native setuid shell privilege escalation
    crit: hostile
    conf: 0.95
    scope: outer
    all:
      - id: native-suid-shell-abuse
    any:
      - id: native-setid-root-source
      - id: micro-behaviors/process/identity/setuid::setuid-dup
      - id: micro-behaviors/process/identity/setuid::setgid
    needs: 1
