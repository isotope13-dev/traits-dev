defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1548

traits:
  - id: csharp-sudo-n-id-check
    desc: C# checks sudo -n id
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'ProcessStartInfo\("sudo", "-n id"\)'

  - id: csharp-suid-candidate-list
    desc: C# SUID candidate list
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/usr/bin/su[\s\S]{0,220}/usr/bin/passwd[\s\S]{0,220}/bin/ping'

  - id: csharp-temp-root-payload
    desc: C# writes temp root payload
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\.sysupdate[\s\S]{0,220}chmod'

composite_rules:
  - id: csharp-linux-elevation-probe
    desc: C# Linux elevation probe
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-sudo-n-id-check
      - id: csharp-suid-candidate-list
    any:
      - id: csharp-temp-root-payload
