defaults:
  platforms: [unix]
  for: [php]
  attack: T1548.001

traits:
  - id: php-setuid-helper-source
    desc: PHP writes setuid helper source
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'setuid\(0\);[\s\S]{0,160}setgid\(0\);[\s\S]{0,160}/bin/sh'

  - id: php-chmod-setuid-helper
    desc: PHP chmods setuid helper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'chmod \+s[\s\S]{0,180}\$helper_path'

composite_rules:
  - id: php-linux-setuid-helper
    desc: PHP Linux setuid helper
    crit: hostile
    conf: 0.98
    all:
      - id: php-setuid-helper-source
      - id: php-chmod-setuid-helper
