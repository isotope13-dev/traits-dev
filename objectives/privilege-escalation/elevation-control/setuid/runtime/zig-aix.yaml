defaults:
  platforms: [aix, unix]
  for: [zig, elf]
  attack: T1548.001
traits:
  - id: zig-root-setid-calls
    desc: Zig attempts root setid calls
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'setuid\(0\)[\s\S]{0,260}setresuid\(0,\s*0,\s*0\)[\s\S]{0,260}setgid\(0\)'
  - id: zig-suid-shell-helper
    desc: Zig writes SUID shell helper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'SUID privilege escalation helper[\s\S]{0,120}/bin/sh -p'
  - id: zig-passwd-backdoor-entry
    desc: Zig prepares passwd backdoor entry
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'backdoor:x:0:0:backdoor:/root:/bin/sh'
composite_rules:
  - id: zig-setid-suid-helper-privesc
    desc: Zig setid SUID helper privesc
    crit: hostile
    conf: 0.98
    all:
      - id: zig-root-setid-calls
      - id: zig-suid-shell-helper
    any:
      - id: zig-passwd-backdoor-entry
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
    needs: 1
