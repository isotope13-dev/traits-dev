defaults:
  platforms: [netbsd, unix]
  for: [kotlin]
  attack: T1068

traits:
  - id: kotlin-suid-find-command
    desc: Kotlin finds SUID binaries
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '"find"[\s\S]{0,120}"-perm"[\s\S]{0,120}"-4000"'

  - id: kotlin-suid-helper-probe
    desc: Kotlin probes SUID helpers
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'binary\.contains\("su"\)[\s\S]{0,160}binary\.contains\("passwd"\)'

composite_rules:
  - id: kotlin-suid-helper-exploit-probe
    desc: Kotlin SUID helper exploit probe
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-suid-find-command
      - id: kotlin-suid-helper-probe
