defaults:
  platforms: [unix]
  for: [c, cpp, go, kotlin, objc, elf, class]
  attack: T1548.001

traits:
  - id: unix-hidden-root-useradd
    desc: Unix hidden root useradd
    crit: suspicious
    conf: 0.94
    for: [go, elf]
    if:
      type: text
      substr: .hidden_root

  - id: native-setresuid-root
    desc: Native setresuid root
    crit: suspicious
    conf: 0.94
    for: [c, elf, kotlin, class]
    if:
      type: text
      substr: setresuid(0,0,0)
    unless:
      - id: well-known/app/samba::samba-source-tree
      # Cursor's agent sandbox calls setresuid(0,0,0) inside a user namespace
      # to drop to "root" in the sandbox — not host privilege escalation.
      - id: well-known/app/cursor-sandbox::linux-sandbox-context
  - id: unix-uid-map-write
    desc: Unix uid map write
    crit: suspicious
    conf: 0.94
    for: [kotlin, class]
    if:
      type: text
      substr: /proc/self/uid_map
    unless:
      - id: well-known/app/util-linux::util-linux-translation-path

  - id: unix-sudo-n-id
    desc: Unix sudo noninteractive id
    crit: suspicious
    conf: 0.94
    for: [c, objc, elf]
    if:
      type: text
      substr: sudo -n id

composite_rules:
  - id: unix-hidden-root-escalation
    desc: Unix hidden root escalation
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/privilege-escalation/elevation-control/setuid/syscall::unix-root-setid-source
      - id: unix-hidden-root-useradd

  - id: native-setresuid-escalation
    desc: Native setresuid escalation
    crit: hostile
    conf: 0.98
    all:
      - id: native-setresuid-root
    any:
      - id: micro-behaviors/process/identity/setuid::setuid-dup
      - id: micro-behaviors/process/identity/setuid::setgid
      - id: micro-behaviors/fs/proc/info/memory::c-procfs-mem-template
    needs: 1

  - id: unix-uid-map-escalation
    desc: Unix uid map escalation
    crit: hostile
    conf: 0.98
    all:
      - id: native-setresuid-root
      - id: unix-uid-map-write

  - id: native-setuid-sudo-escalation
    desc: Native setuid sudo escalation
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/identity/setuid::setuid-root-retention-diagnostic
      - id: unix-sudo-n-id

  - id: native-setuid-shell-escalation
    desc: Native setuid shell escalation
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/identity/setuid::setuid-dup
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
    any:
      - id: micro-behaviors/process/create/direct::execve-import
      - id: micro-behaviors/process/create/execv::exec-variant-symbol-text
    needs: 1
