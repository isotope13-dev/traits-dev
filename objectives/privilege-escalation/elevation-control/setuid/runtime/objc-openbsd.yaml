defaults:
  platforms: [openbsd, bsd, unix]
  for: [objc, elf]
  attack: T1548.001

traits:
  - id: objc-openbsd-root-setid-source
    desc: ObjC OpenBSD root setid source
    crit: suspicious
    conf: 0.94
    for: [objc]
    if:
      type: text
      regex: 'setuid\(0\)[\s\S]{0,160}/bin/sh[\s\S]{0,520}setresuid\(0, 0, 0\)'

  - id: setid-call-chain-binary
    desc: setid call chain binary
    crit: suspicious
    conf: 0.92
    for: [elf]
    if:
      type: raw
      regex: 'setgid[\s\S]{0,180}setuid[\s\S]{0,180}setgroups'

composite_rules:
  - id: objc-runtime-setid-root-shell
    desc: ObjC runtime setid root shell
    crit: suspicious
    conf: 0.94
    for: [elf]
    all:
      - id: metadata/lang/compiled::objc-runtime-marker
      - id: setid-call-chain-binary
      - id: micro-behaviors/process/create/shell/invoke::bin-sh

  - id: objc-openbsd-setid-root-shell
    desc: ObjC OpenBSD setid root shell
    crit: hostile
    conf: 0.98
    any:
      - id: objc-openbsd-root-setid-source
      - id: objc-runtime-setid-root-shell
