defaults:
  platforms: [openbsd, bsd, unix]
  for: [python]
  attack: T1548.001

traits:
  - id: python-hidden-suid-shell-path
    desc: Python hidden SUID shell path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.suid_shell

  - id: python-suid-mode-chmod
    desc: Python SUID chmod mode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: os.chmod(SUID_BACKDOOR, 0o4755)

composite_rules:
  - id: python-openbsd-hidden-suid-shell
    desc: Python hidden SUID shell
    crit: hostile
    conf: 0.98
    all:
      - id: python-hidden-suid-shell-path
      - id: python-suid-mode-chmod
