defaults:
  attack: T1548.001
  platforms: [openwrt]
traits:
  - id: jvm-source-temp-payload-path
    desc: JVM source references temp payload path
    crit: component
    conf: 0.9
    for: [java, kotlin]
    if:
      type: text
      substr: /tmp/.payload
  - id: jvm-source-chmod-setuid-mode
    desc: JVM source runs chmod with setuid mode
    crit: notable
    conf: 0.92
    for: [java, kotlin]
    if:
      type: text
      regex: '\bchmod\b.{0,120}\b4755\b|\b4755\b.{0,120}\bchmod\b'
  - id: jvm-source-processbuilder
    desc: JVM source uses ProcessBuilder
    crit: notable
    conf: 0.9
    for: [java, kotlin]
    if:
      type: text
      regex: '\b(new\s+)?ProcessBuilder\s*\('
  - id: jvm-bytecode-temp-payload-path
    desc: JVM bytecode references temp payload path
    crit: component
    conf: 0.92
    for: [class, jar, zip]
    if:
      type: hex
      pattern: "2F 74 6D 70 2F 2E 70 61 79 6C 6F 61 64"
  - id: jvm-bytecode-chmod-command
    desc: JVM bytecode references chmod command
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: "63 68 6D 6F 64"
  - id: jvm-bytecode-setuid-mode
    desc: JVM bytecode references setuid chmod mode
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: "34 37 35 35"
  - id: jvm-bytecode-set-executable
    desc: JVM bytecode references setExecutable
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: "73 65 74 45 78 65 63 75 74 61 62 6C 65"
composite_rules:
  - id: openwrt-jvm-temp-setuid-payload-source
    desc: OpenWrt JVM source stages setuid temp payload
    crit: hostile
    conf: 0.94
    for: [java, kotlin]
    all:
      - id: jvm-source-temp-payload-path
      - id: jvm-source-chmod-setuid-mode
      - id: jvm-source-processbuilder
    any:
      - id: micro-behaviors/fs/write/file/executable::java-set-executable-source
      - id: micro-behaviors/fs/write/file/direct::kotlin-write-executable-file-source
    needs: 1
  - id: openwrt-jvm-temp-setuid-payload-bytecode
    desc: OpenWrt JVM bytecode stages setuid temp payload
    crit: hostile
    conf: 0.94
    for: [class, jar, zip]
    scope: outer
    all:
      - id: jvm-bytecode-temp-payload-path
      - id: jvm-bytecode-chmod-command
      - id: jvm-bytecode-setuid-mode
      - id: micro-behaviors/process/create/spawn::java-processbuilder-init-bytecode-symbol
    any:
      - id: jvm-bytecode-set-executable
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode-symbol
    needs: 1
