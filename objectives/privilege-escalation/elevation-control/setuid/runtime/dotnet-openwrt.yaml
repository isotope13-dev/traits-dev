defaults:
  platforms: [openwrt, windows]
  for: [csharp, pe, dll]
  attack: T1548.001
traits:
  - id: dotnet-privilege-escalation-method
    desc: .NET privilege escalation method
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: PrivilegeEscalation
  - id: csharp-passwd-write-label
    desc: C# passwd write log label
    crit: notable
    conf: 0.9
    for: [csharp]
    if:
      type: text
      substr: "[elevation] wrote backdoor user"
  - id: dotnet-appendalltext-token
    desc: .NET AppendAllText token
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'AppendAllText|File\.AppendAllText'
  - id: dotnet-writealltext-token
    desc: .NET WriteAllText token
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'WriteAllText|File\.WriteAllText'
  - id: csharp-suid-sgid-enum
    desc: C# SUID SGID enumeration
    crit: notable
    conf: 0.9
    for: [csharp]
    if:
      type: text
      regex: 'find / -perm -[42]000'
composite_rules:
  - id: dotnet-privilege-escalation-context
    desc: .NET privilege escalation context
    crit: notable
    conf: 0.9
    any:
      - id: dotnet-privilege-escalation-method
      - id: csharp-passwd-write-label
  - id: dotnet-passwd-backdoor-write
    desc: .NET passwd backdoor write
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-privilege-escalation-context
      - id: dotnet-appendalltext-token
      - id: dotnet-writealltext-token
    any:
      - id: micro-behaviors/data/text/malware/terms::backdoor-comp
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/config/privesc::etc-sudoers
      - id: csharp-suid-sgid-enum
