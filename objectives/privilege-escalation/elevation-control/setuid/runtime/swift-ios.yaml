defaults:
  platforms: [ios]
  for: [swift]
  attack: T1548

traits:
  - id: swift-ios-setuid-root
    desc: Swift iOS setuid root attempt
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'setuid\(0\)|setreuid\(0,\s*0\)'

  - id: swift-ios-root-shell-exec
    desc: Swift iOS root shell exec
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'execl\("/bin/sh"|/usr/bin/su'

composite_rules:
  - id: swift-ios-setuid-shell-privesc
    desc: Swift iOS setuid shell privesc
    crit: hostile
    conf: 0.98
    all:
      - id: swift-ios-setuid-root
      - id: swift-ios-root-shell-exec
