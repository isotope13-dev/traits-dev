defaults:
  attack: T1548.001
  platforms: [unix]
  for: [java, class]

traits:
  - id: java-temp-suid-agent-path
    desc: Java temp suid agent path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/suid_agent

  - id: java-sh-p-suid-script
    desc: Java writes /bin/sh -p
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /bin/sh -p

  - id: jvm-temp-suid-agent-path
    desc: JVM temp suid agent path
    crit: suspicious
    conf: 0.94
    for: [class, jar, zip]
    if:
      type: hex
      pattern: "2F 74 6D 70 2F 73 75 69 64 5F 61 67 65 6E 74"

  - id: jvm-sh-p-suid-script
    desc: JVM writes /bin/sh -p
    crit: suspicious
    conf: 0.94
    for: [class, jar, zip]
    if:
      type: hex
      pattern: "2F 62 69 6E 2F 73 68 20 2D 70"

composite_rules:
  - id: java-linux-suid-shell-staging
    desc: Java Linux SUID shell staging
    crit: hostile
    conf: 0.98
    all:
      - id: java-temp-suid-agent-path
      - id: java-sh-p-suid-script
      - id: objectives/privilege-escalation/elevation-control/setuid/runtime::jvm-source-chmod-setuid-mode

  - id: jvm-linux-suid-shell-staging
    desc: JVM Linux SUID shell staging
    crit: hostile
    conf: 0.97
    for: [class, jar, zip]
    all:
      - id: jvm-temp-suid-agent-path
      - id: jvm-sh-p-suid-script
      - id: objectives/privilege-escalation/elevation-control/setuid/runtime::jvm-bytecode-chmod-command
      - id: objectives/privilege-escalation/elevation-control/setuid/runtime::jvm-bytecode-setuid-mode
