defaults:
  platforms: [ios, unix]
  for: [zig]
  attack: T1548

traits:
  - id: zig-ios-seteuid-root
    desc: Zig iOS seteuid root attempt
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: seteuid(0)

  - id: zig-ios-setuid-root
    desc: Zig iOS setuid root attempt
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: setuid(0)

  - id: zig-ios-setgid-root
    desc: Zig iOS setgid root attempt
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: setgid(0)

composite_rules:
  - id: zig-ios-setuid-root-escalation
    desc: Zig iOS setuid root escalation
    crit: hostile
    conf: 0.98
    all:
      - id: zig-ios-seteuid-root
      - id: zig-ios-setuid-root
    any:
      - id: zig-ios-setgid-root
      - id: micro-behaviors/process/identity/setuid::setid-call-source
