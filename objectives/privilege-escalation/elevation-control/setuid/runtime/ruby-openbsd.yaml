defaults:
  platforms: [openbsd, bsd, unix]
  for: [ruby]
  attack: T1548.001

traits:
  - id: ruby-openbsd-root-id-switch
    desc: Ruby OpenBSD root ID switch
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Process\.seteuid\(0\)[\s\S]{0,260}Process\.setegid\(0\)'

  - id: ruby-doas-master-passwd-read
    desc: Ruby doas reads master.passwd
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "elevate_via_doas\\('cat /etc/master\\.passwd"

  - id: ruby-gid-initgroups-call
    desc: Ruby GID initgroups call
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Process::GID.initgroups

composite_rules:
  - id: ruby-openbsd-root-id-escalation
    desc: Ruby OpenBSD root ID escalation
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-openbsd-root-id-switch
      - id: ruby-doas-master-passwd-read
    any:
      - id: ruby-gid-initgroups-call
      - id: micro-behaviors/process/identity/setuid::ruby-setuid
    needs: 1
