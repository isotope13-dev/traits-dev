defaults:
  platforms: [netbsd, unix]
  for: [javascript, typescript]
  attack: T1548.001

traits:
  - id: node-suid-shell-copy
    desc: Node SUID shell copy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'cp /bin/sh[\s\S]{0,120}chmod 4755'

  - id: node-master-passwd-backdoor
    desc: Node master.passwd backdoor
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/master\.passwd[\s\S]{0,260}backdoor:\$6\$'

composite_rules:
  - id: node-netbsd-root-backdoor-escalation
    desc: Node NetBSD root backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: node-master-passwd-backdoor
    any:
      - id: node-suid-shell-copy
      - id: micro-behaviors/fs/path/config/privesc::etc-sudoers
