defaults:
  platforms: [panos, appliance, unix]
  for: [python]
  attack: T1548.001

traits:
  - id: python-panos-backdoor-suid-path
    desc: Python PAN-OS backdoor suid path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/local/bin/.libupdate

  - id: python-panos-suid-chmod-copy
    desc: Python PAN-OS suid chmod copy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: '"sudo", "chmod", "4755"'

composite_rules:
  - id: python-panos-hidden-suid-backdoor
    desc: Python PAN-OS hidden suid backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: python-panos-backdoor-suid-path
      - id: python-panos-suid-chmod-copy
