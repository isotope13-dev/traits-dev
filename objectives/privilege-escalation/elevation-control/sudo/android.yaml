defaults:
  platforms: [android, unix]
  for: [shell]
  attack: T1548.003
traits:
  - id: exec-found-su-path
    desc: Executes discovered su binary
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bexec\s+\$[A-Za-z_][A-Za-z0-9_]*\s+"\$@"'
composite_rules:
  - id: android-su-wrapper
    desc: Android su wrapper searches root paths
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/fs/path/binary::android-su-root-binary-paths
      - id: exec-found-su-path
  - id: npm-package-ships-su-wrapper
    desc: npm package ships Android su wrapper
    crit: hostile
    conf: 0.98
    for: [package.json, shell]
    all:
      - id: micro-behaviors/fs/path/binary::android-su-root-binary-paths
      - id: exec-found-su-path
      - id: metadata/package/files::package-json-basename
      - id: metadata/package/quality::npm-has-name
      - id: metadata/package/files::su-basename
