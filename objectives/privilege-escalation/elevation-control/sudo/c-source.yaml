defaults:
  platforms: [unix]
  for: [c]
  attack: "T1548.003"
traits:
  - id: sudo-binary-path
    desc: sudo binary path
    crit: component
    conf: 0.85
    if:
      type: string_literal
      exact: /usr/bin/sudo
  - id: sudo-argv-name
    desc: sudo argv program name
    crit: component
    conf: 0.75
    if:
      type: string_literal
      exact: sudo
composite_rules:
  - id: c-sudo-self-reexec
    desc: C sudo self re-execution
    crit: suspicious
    conf: 0.92
    all:
      - id: sudo-binary-path
      - id: sudo-argv-name
      - id: micro-behaviors/os/privilege/query::geteuid
      - id: micro-behaviors/process/create/direct::execve-import
