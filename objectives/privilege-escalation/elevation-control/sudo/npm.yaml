defaults:
  platforms:
    - unix
  for:
    - package.json
  attack: T1548.003
traits:
  - id: test-script-sudo
    desc: test script invokes sudo
    crit: notable
    conf: 0.96
    if:
      type: value
      path: scripts.test
      regex: (^|[;&|]\s*|\s)sudo\s+
  - id: test-script-sudo-root-wipe
    desc: test script runs sudo root wipe
    crit: suspicious
    conf: 0.99
    if:
      type: value
      path: scripts.test
      regex: ^sudo\s+rm\s+-rf\s+/\*$
composite_rules:
  - id: npm-test-sudo
    desc: npm test requests sudo privileges
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/package/scripts::has-test-script
      - id: test-script-sudo
  - id: privileged-keyserver-install
    desc: Privileged install for a keyboard server
    crit: hostile
    conf: 0.98
    for: [archives]
    scope: archive
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::node-sudo-prompt-chmod-executable
      - id: objectives/collection/keylog/capture::js-bundled-keyserver-launch
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
