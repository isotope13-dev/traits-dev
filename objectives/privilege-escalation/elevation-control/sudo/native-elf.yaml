defaults:
  platforms: [unix, android]
  for: [elf]
  attack: T1548.003

traits:
  - id: native-sudo-relaunch-marker
    desc: Non-root sudo relaunch marker
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)not running as root[^\n]{0,160}sudo|attempting to escalate privileges[^\n]{0,160}sudo'
