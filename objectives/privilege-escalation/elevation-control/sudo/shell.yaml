# Sudo Privilege Escalation Detection for Shell Scripts
# ATT&CK: T1548.003 (Abuse Elevation Control Mechanism: Sudo and Sudo Caching)
# Detects suspicious sudo usage patterns in dropper scripts
defaults:
  for: [shell]
  crit: suspicious
  attack: "T1548.003"
  platforms: [unix]
traits:
  # === Bare sudo keyword ===
  - id: sudo-keyword
    desc: sudo command keyword
    crit: component
    conf: 0.7
    if:
      type: text
      word: sudo
    not:
      - substr: apt.u.doover.com/install.sh
      - substr: doover-pydoover
    unless:
      - type: basename
        regex: '(?i)^readme(\.|$)'
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
  # === Sudo Privilege Enumeration ===
  - id: sudo-list
    desc: sudo -l privilege enumeration
    crit: notable
    conf: 0.85
    attack: "T1033"
    if:
      type: text
      word: sudo -l
  # === Sudo with Execution Permissions ===
  - id: sudo-chmod-777-tmp
    desc: sudo chmod 777 in temp paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'sudo\s+chmod\s+777\s+(/tmp/|/var/tmp/|/dev/shm/|\./)'
  - id: sudo-chmod-777-user
    desc: sudo chmod 777 in user-writable paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'sudo\s+chmod\s+777\s+(/home/|/root/|/usr/local/bin/)'
  # === Sudo with Background Execution ===
  - id: sudo-nohup
    desc: sudo nohup background execution
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'sudo\s+nohup\s+'
  # === Sudo with Direct Execution ===
  - id: sudo-tmp-exec
    desc: sudo execution from /tmp directory
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'sudo\s+/tmp/'
    # Bootstrap installers commonly `sudo /tmp/*.sh`; those are not the
    # dropped-binary elevation pattern this trait targets.
    not:
      - regex: 'sudo\s+/tmp/\S+\.sh\b'
    unless:
      - id: well-known/app/skypilot::skypilot-source-file
  - id: sudo-rm-rf
    desc: sudo rm -rf (force recursive delete)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'sudo\s+rm\s+-rf\s+'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: ansible-role-files-path
    desc: Ansible role path
    crit: notable
    conf: 0.9
    if:
      type: path
      dirname: true
      regex: '(^|[\\/])roles[\\/]'
composite_rules:
  - id: sudo-chmod-777
    desc: sudo chmod 777 on writable execution paths
    crit: suspicious
    conf: 0.9
    any:
      - id: sudo-chmod-777-tmp
      - id: sudo-chmod-777-user
