defaults:
  platforms: [android]
  for: [kotlin]
  attack: T1548.003

traits:
  - id: kotlin-su-c-exec
    desc: Kotlin executes su -c
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'arrayOf\s*\(\s*"su"\s*,\s*"-c"'

  - id: kotlin-su-shell-exec
    desc: Kotlin executes su shell
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Runtime\.getRuntime\(\)\.exec\s*\(\s*"su"\s*\)'

composite_rules:
  - id: kotlin-android-su-execution
    desc: Kotlin Android su execution
    crit: suspicious
    conf: 0.95
    any:
      - id: kotlin-su-c-exec
      - id: kotlin-su-shell-exec
