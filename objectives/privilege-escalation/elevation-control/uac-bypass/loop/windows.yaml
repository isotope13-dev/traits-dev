defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
    - csharp
traits:
  - id: uac-cancelled-code
    desc: Handles ERROR_CANCELLED (1223) from UAC
    crit: component
    if:
      type: text
      regex: "\b1223\b|ERROR_CANCELLED"
composite_rules:
  - id: uac-elevation-loop
    desc: Recursive UAC elevation loop (traps user)
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/privilege-escalation/token-manipulation::runas-verb
      - id: uac-cancelled-code
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
