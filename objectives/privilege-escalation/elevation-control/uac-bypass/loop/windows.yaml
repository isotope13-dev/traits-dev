# UAC Elevation Loop
# Detects recursive UAC elevation requests until success
# ATT&CK: T1548.002
defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
traits:
  - id: uac-cancelled-code
    desc: Handles ERROR_CANCELLED (1223) from UAC
    crit: component
    if:
      type: string_value
      regex: "\b1223\b|ERROR_CANCELLED"
composite_rules:
  - id: uac-elevation-loop
    desc: Recursive UAC elevation loop (traps user)
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/privilege/escalation::runas-verb
      - id: uac-cancelled-code
