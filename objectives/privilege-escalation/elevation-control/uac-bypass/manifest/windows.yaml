# Windows Manifest Privilege Escalation
# ATT&CK: T1548.002 (Abuse Elevation Control Mechanism: UAC)
#
# Atomic manifest string traits in micro-behaviors/os/privilege/manifest/windows.yaml
# Composites detect suspicious use of manifest attributes combined with other indicators.
defaults:
  attack: T1548.002
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: unsigned-auto-elevate
    desc: Auto-elevation without trusted signature
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/privilege/manifest::auto-elevate
    none:
      - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
      - id: metadata/vendor/microsoft::microsoft-corp-marker-rdata
      - id: metadata/signed/platform::microsoft
  - id: admin-manifest-network
    desc: Admin manifest with network activity
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: micro-behaviors/communications/http/request::http-client
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - id: metadata/package/versioning::pe-version-resource
  - id: admin-manifest-shell-no-version
    desc: Admin manifest with shell and no version info
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: micro-behaviors/process/create/shell::bin-sh
    none:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
