# UAC Bypass via __COMPACT_LAYER Environment Variable
# Setting __COMPACT_LAYER=RunAsInvoker bypasses UAC elevation prompts
# ATT&CK: T1548.002 (Abuse Elevation Control Mechanism: Bypass User Account Control)
defaults:
  for: [pe, powershell, batch, vbs]
  platforms: [windows]
  attack: T1548.002
traits:
  - id: uac-bypass-compact-layer
    desc: UAC bypass via __COMPACT_LAYER=RunAsInvoker
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: "__COMPACT_LAYER=RunAsInvoker"
      case_insensitive: true
