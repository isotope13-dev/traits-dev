defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1548.002
traits:
  - id: cmstplua-clsid
    desc: CMSTPLUA COM CLSID for UAC bypass
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "{3E5FC7F9-9A51-4367-9063-A120244FBEC7}"
  
  - id: elevation-moniker
    desc: Elevation COM moniker
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "Elevation:Administrator!new"
  - id: elevation-administrator-moniker
    desc: Elevation Administrator COM moniker
    crit: component
    conf: 0.88
    if:
      type: hex
      section: .rdata
      pattern: "45 00 6c 00 65 00 76 00 61 00 74 00 69 00 6f 00 6e 00 3a 00 41 00 64 00 6d 00 69 00 6e 00 69 00 73 00 74 00 72 00 61 00 74 00 6f 00 72 00 21 00"

composite_rules:
  - id: com-elevation-moniker-binding
    desc: COM elevation moniker binding
    crit: suspicious
    conf: 0.93
    all:
      - id: elevation-administrator-moniker
      - id: micro-behaviors/os/com/invoke::co-get-object
      - id: micro-behaviors/os/com/invoke::co-initialize-ex
    any:
      - id: micro-behaviors/os/com/invoke::string-from-guid2
      - id: elevation-moniker
    unless:
      - id: metadata/signed/platform::microsoft-windows

  - id: cmstplua-uac-bypass
    desc: CMSTPLUA UAC bypass via COM moniker
    crit: hostile
    conf: 0.98
    all:
      - id: cmstplua-clsid
      - id: elevation-moniker
    unless:
      - id: metadata/signed/platform::microsoft-windows
