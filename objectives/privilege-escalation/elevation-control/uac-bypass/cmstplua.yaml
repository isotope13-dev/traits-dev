defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1548.002
traits:
  - id: cmstplua-clsid
    desc: CMSTPLUA COM CLSID for UAC bypass
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "{3E5FC7F9-9A51-4367-9063-A120244FBEC7}"
  
  - id: elevation-moniker
    desc: Elevation COM moniker
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: "Elevation:Administrator!new"

composite_rules:
  - id: cmstplua-uac-bypass
    desc: CMSTPLUA UAC bypass via COM moniker
    crit: hostile
    conf: 0.98
    all:
      - id: cmstplua-clsid
      - id: elevation-moniker
    unless:
      - id: metadata/signed/platform::microsoft-windows
