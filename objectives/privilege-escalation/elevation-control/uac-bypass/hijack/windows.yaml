# Windows UAC Bypass Detection
# ATT&CK: T1548.002 (Abuse Elevation Control Mechanism: Bypass User Account Control)
#
# Detects common Windows UAC bypass techniques including:
# - fodhelper.exe abuse
# - ms-settings protocol hijacking
# - Auto-elevating binary exploitation
defaults:
  attack: "T1548.002"
  crit: suspicious
  for: [batch, vbs, powershell, pe]
  platforms: [windows]
traits:
  - id: fodhelper-exe
    desc: fodhelper.exe invocation (UAC bypass binary)
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: '(?i)fodhelper\.exe'
    downgrade:
      any:
        - id: metadata/format/pe::resource-only-dll
  - id: ms-settings-curver
    desc: ms-settings CurVer registry modification
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '(?i)HKCU\\\\?Software\\\\?Classes\\\\?ms-settings\\\\?CurVer'
  - id: shell-open-command-reg
    desc: Shell Open command registry key
    crit: notable
    conf: 0.7
    size_max: 10485760
    if:
      type: raw
      regex: '(?i)\\\\?Shell\\\\?Open\\\\?command'
  - id: eventvwr-exe
    desc: eventvwr.exe invocation (UAC bypass binary)
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '(?i)eventvwr\.exe'
    downgrade:
      any:
        - id: metadata/format/pe::resource-only-dll
  - id: mscfile-curver
    desc: mscfile CurVer registry modification
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '(?i)HKCU\\\\?Software\\\\?Classes\\\\?mscfile\\\\?CurVer'
  - id: computerdefaults-exe
    desc: computerdefaults.exe (UAC bypass binary)
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '(?i)computerdefaults\.exe'
    downgrade:
      any:
        - id: metadata/format/pe::resource-only-dll
  - id: sdclt-exe
    desc: sdclt.exe invocation (UAC bypass binary)
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '(?i)sdclt\.exe'
    downgrade:
      any:
        - id: metadata/format/pe::resource-only-dll
composite_rules:
  - id: fodhelper-uac-bypass
    desc: fodhelper.exe UAC bypass technique
    crit: hostile
    conf: 0.98
    mbc: "E1548"
    all:
      - id: fodhelper-exe
      - id: ms-settings-curver
  - id: protocol-hijack-ms-settings
    desc: ms-settings protocol UAC bypass
    crit: suspicious
    conf: 0.9
    all:
      - id: ms-settings-curver
      - id: shell-open-command-reg
  - id: protocol-hijack-mscfile
    desc: mscfile protocol UAC bypass
    crit: suspicious
    conf: 0.9
    all:
      - id: mscfile-curver
      - id: shell-open-command-reg
  - id: eventvwr-uac-bypass
    desc: eventvwr.exe UAC bypass technique
    crit: hostile
    conf: 0.95
    mbc: "E1548"
    all:
      - id: eventvwr-exe
      - id: mscfile-curver
  - id: computerdefaults-uac-bypass
    desc: ComputerDefaults.exe UAC bypass technique
    crit: hostile
    conf: 0.98
    mbc: "E1548"
    all:
      - id: computerdefaults-exe
      - id: shell-open-command-reg
