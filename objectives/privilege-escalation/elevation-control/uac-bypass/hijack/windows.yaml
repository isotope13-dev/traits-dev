# Windows UAC Bypass Detection
# ATT&CK: T1548.002 (Abuse Elevation Control Mechanism: Bypass User Account Control)
#
# Detects common Windows UAC bypass techniques including:
# - fodhelper.exe abuse
# - ms-settings protocol hijacking
# - Auto-elevating binary exploitation
defaults:
  attack: "T1548.002"
  crit: suspicious
  for: [batch, vbs, powershell, pe, python, rust]
  platforms: [windows]
traits:
  - id: fodhelper-exe
    desc: fodhelper.exe invocation (UAC bypass binary)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)fodhelper\.exe'
    unless:
      - id: well-known/app/aui-agent-builder/
      - type: raw
        substr: "%windir%/winsxs/amd64_microsoft-"
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
      - id: metadata/package/quality/source::security-tracker-cve-leaf
      - id: metadata/file/profile/identity::generated-attack-map-context
      - id: metadata/file/profile/identity::generated-attack-map-context
    downgrade:
      any:
        - id: metadata/binary/resource/
  - id: ms-settings-curver
    desc: ms-settings CurVer registry modification
    crit: suspicious
    conf: 0.95
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    if:
      type: text
      regex: '(?i)HKCU\\\\?Software\\\\?Classes\\\\?ms-settings\\\\?CurVer'
  - id: shell-open-command-reg
    desc: Shell Open command registry key
    crit: component
    conf: 0.7
    size_max: 10485760
    if:
      type: text
      regex: '(?i)\\\\?Shell\\\\?Open\\\\?command'
  - id: ms-settings-shell-open-command
    desc: ms-settings Shell Open command key
    crit: suspicious
    conf: 0.95
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    if:
      type: text
      regex: '(?i)Software\\Classes\\ms-settings\\Shell\\Open\\Command'
  - id: delegateexecute-value
    desc: DelegateExecute registry value
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)(HKCU|Classes).{0,80}DelegateExecute'
  - id: delegateexecute-value-name
    desc: DelegateExecute value name
    crit: component
    conf: 0.88
    if:
      type: text
      word: DelegateExecute
  - id: launcher-systemsettings-command
    desc: Launcher.SystemSettings Shell Open command key
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: Software\\Classes\\Launcher.SystemSettings\\Shell\\Open\\Command
  - id: slui-exe
    desc: slui.exe auto-elevated binary reference
    crit: component
    conf: 0.86
    if:
      type: text
      exact: C:\\Windows\\System32\\slui.exe
  - id: eventvwr-exe
    desc: eventvwr.exe invocation (UAC bypass binary)
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: '(?i)eventvwr\.exe'
    unless:
      - id: well-known/app/aui-agent-builder/
      - type: raw
        substr: "%windir%/winsxs/amd64_microsoft-"
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
      - id: metadata/package/quality/source::security-tracker-cve-leaf
      - id: metadata/file/profile/identity::generated-attack-map-context
    downgrade:
      any:
        - id: metadata/binary/resource/
  - id: mscfile-curver
    desc: mscfile CurVer registry modification
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)HKCU\\\\?Software\\\\?Classes\\\\?mscfile\\\\?CurVer'
  - id: computerdefaults-exe
    desc: computerdefaults.exe (UAC bypass binary)
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: '(?i)computerdefaults\.exe'
    unless:
      - type: raw
        substr: "%windir%/winsxs/amd64_microsoft-"
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    downgrade:
      any:
        - id: metadata/binary/resource/
  - id: wsreset-exe
    desc: WSReset.exe auto-elevated binary reference
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bwsreset\.exe\b'
    unless:
      - type: raw
        substr: "%windir%/winsxs/amd64_microsoft-"
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    downgrade:
      any:
        - id: metadata/binary/resource/
        - id: metadata/signed/platform/
  - id: wsreset-python-method-label
    desc: Python WSReset UAC bypass method label
    crit: suspicious
    conf: 0.9
    for: [python, scripts, text]
    if:
      type: text
      regex: '(?i)UAC bypass using wsreset\.exe|uacMethod\d+'
  - id: python-delegateexecute-registry-write
    desc: Python DelegateExecute registry write
    crit: suspicious
    conf: 0.94
    for: [python, scripts, text]
    if:
      type: text
      regex: 'registry\(\)\.modify_key[\s\S]{0,260}DelegateExecute'
  - id: python-appx-command-hijack-path
    desc: Python AppX command hijack path
    crit: suspicious
    conf: 0.95
    for: [python, scripts, text]
    if:
      type: text
      regex: 'Software\\\\Classes\\\\AppX[0-9A-Za-z]{12,64}\\\\Shell\\\\open\\\\command'
  - id: appx-shell-open-command
    desc: AppX Shell Open command hijack key
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)Software[\\]+Classes[\\]+AppX[0-9a-z]{12,64}[\\]+Shell[\\]+open[\\]+command'
  - id: sysprep-exe
    desc: sysprep.exe invocation in UAC chain
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)sysprep\\sysprep\.exe|sysprep\.exe'
    unless:
      - id: well-known/app/aui-agent-builder/
      - type: raw
        substr: "%windir%/winsxs/amd64_microsoft-"
    downgrade:
      any:
        - id: metadata/binary/resource/
        - id: metadata/signed/platform/
  - id: wusa-extract-sysprep
    desc: wusa extracts CAB into sysprep directory
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: /extract:%s\System32\sysprep\
  - id: makecab-dll-cab
    desc: makecab builds DLL CAB package
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)makecab(\.exe)?.{0,40}\.cab'
  - id: cryptbase-shifted-string
    desc: Shift-obfuscated cryptbase DLL string
    crit: suspicious
    conf: 0.97
    if:
      type: text
      word: dszqucbtf/eml
  - id: elevation-moniker-admin
    desc: COM elevation moniker string
    crit: component
    conf: 0.85
    if:
      type: text
      exact: Elevation:Administrator!new:%s
composite_rules:
  - id: fodhelper-uac-bypass
    desc: fodhelper.exe UAC bypass technique
    crit: hostile
    conf: 0.98
    mbc: "E1548"
    all:
      - id: fodhelper-exe
      - id: ms-settings-curver
  - id: fodhelper-ms-settings-hijack
    desc: fodhelper ms-settings protocol hijack
    crit: hostile
    conf: 0.98
    mbc: "E1548"
    all:
      - id: fodhelper-exe
      - id: ms-settings-shell-open-command
      - id: delegateexecute-value
  - id: fodhelper-delegateexecute-hijack
    desc: fodhelper DelegateExecute hijack
    crit: hostile
    conf: 0.98
    mbc: "E1548"
    all:
      - id: fodhelper-exe
      - id: ms-settings-shell-open-command
      - id: delegateexecute-value-name
  - id: protocol-hijack-ms-settings
    desc: ms-settings protocol UAC bypass
    crit: suspicious
    conf: 0.9
    all:
      - id: ms-settings-curver
      - id: shell-open-command-reg
  - id: protocol-hijack-ms-settings-shell
    desc: ms-settings Shell Open command hijack
    crit: suspicious
    conf: 0.93
    all:
      - id: ms-settings-shell-open-command
      - id: delegateexecute-value
  - id: protocol-hijack-mscfile
    desc: mscfile protocol UAC bypass
    crit: suspicious
    conf: 0.9
    all:
      - id: mscfile-curver
      - id: shell-open-command-reg
  - id: wsreset-appx-uac-bypass
    desc: WSReset AppX class hijack UAC bypass
    crit: hostile
    conf: 0.98
    mbc: "E1548"
    all:
      - id: wsreset-exe
      - id: appx-shell-open-command
      - id: delegateexecute-value-name
  - id: wsreset-delegateexecute-payload-launch
    desc: WSReset DelegateExecute payload launch
    crit: hostile
    conf: 0.98
    mbc: "E1548"
    all:
      - id: wsreset-exe
      - id: appx-shell-open-command
      - id: delegateexecute-value-name
      - id: micro-behaviors/process/create/
  - id: python-wsreset-delegateexecute-uac-bypass
    desc: Python WSReset DelegateExecute UAC bypass
    crit: hostile
    conf: 0.98
    mbc: "E1548"
    for: [python, scripts, text]
    all:
      - id: wsreset-exe
      - id: python-appx-command-hijack-path
      - id: python-delegateexecute-registry-write
    any:
      - id: wsreset-python-method-label
      - id: delegateexecute-value-name
  - id: eventvwr-uac-bypass
    desc: eventvwr.exe UAC bypass technique
    crit: hostile
    conf: 0.95
    mbc: "E1548"
    all:
      - id: eventvwr-exe
      - id: mscfile-curver
  - id: computerdefaults-uac-bypass
    desc: ComputerDefaults.exe UAC bypass technique
    crit: hostile
    conf: 0.98
    mbc: "E1548"
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    all:
      - id: computerdefaults-exe
      - id: shell-open-command-reg
  - id: sysprep-wusa-uac-bypass
    desc: sysprep cryptbase WUSA UAC bypass
    crit: hostile
    conf: 0.99
    mbc: "E1548"
    all:
      - id: sysprep-exe
      - id: wusa-extract-sysprep
    any:
      - id: makecab-dll-cab
      - id: cryptbase-shifted-string
      - id: objectives/command-and-control/dropper/sideload::sideload-target-cryptbase
    needs: 2
    unless:
      - id: metadata/signed/platform/
  - id: com-elevation-moniker-bypass
    desc: COM elevation moniker UAC bypass
    crit: suspicious
    conf: 0.85
    all:
      - id: elevation-moniker-admin
      - id: micro-behaviors/os/com/invoke::co-get-object
    any:
      - id: micro-behaviors/os/com/invoke::co-initialize-security
      - id: micro-behaviors/os/com/invoke::co-set-proxy-blanket
      - id: micro-behaviors/os/com/invoke::privileged-com-activation
    needs: 3
  - id: launcher-systemsettings-slui-bypass
    desc: Launcher.SystemSettings slui UAC bypass
    crit: hostile
    conf: 0.98
    mbc: "E1548"
    all:
      - id: launcher-systemsettings-command
      - id: delegateexecute-value-name
      - id: slui-exe
      - id: micro-behaviors/os/privilege/elevation::runas-string
      - id: objectives/privilege-escalation/token-manipulation::shell-execute-call
