# .NET/C# UAC Elevation via Start-Process -Verb RunAs
# Detects the pattern of checking admin status and re-launching with elevated privileges.
# ATT&CK: T1548.002 (Abuse Elevation Control: Bypass UAC)
defaults:
  for: [csharp, pe]
  platforms: [windows]
  attack: T1548.002
  crit: notable
  conf: 0.85

traits:
  - id: start-process-verb-runas
    desc: PowerShell Start-Process with -Verb RunAs
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: Start-Process.{0,60}-Verb\s+RunAs

  - id: shell-execute-runas
    desc: ShellExecute with runas verb
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: (?i)(ShellExecute|ProcessStartInfo).{0,60}runas

  - id: is-in-role-admin
    desc: WindowsIdentity IsInRole administrator check
    conf: 0.85
    if:
      type: text
      regex: (?i)IsInRole.{0,40}(Administrator|BuiltinAdministrator)

  - id: windows-principal-check
    desc: WindowsPrincipal administrator check
    conf: 0.85
    if:
      type: text
      regex: (?i)WindowsPrincipal.{0,60}(IsInRole|Administrator)

  - id: is-elevated-property
    desc: Checks if current process is elevated
    conf: 0.82
    if:
      type: text
      regex: (?i)(IsElevated|isAdmin|RunAsAdmin|IsAdministrator)

  - id: relaunch-self-elevated
    desc: Re-launches current process with elevation
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (?i)(GetCurrentProcess|ExecutablePath|GetEntryAssembly).{0,80}(RunAs|runas|Elevat)

composite_rules:
  - id: admin-check-then-elevate
    desc: Checks admin status then requests elevation
    crit: suspicious
    conf: 0.93
    all:
      - id: admin-check
    any:
      - id: start-process-verb-runas
      - id: shell-execute-runas
      - id: relaunch-self-elevated

  - id: admin-check
    desc: Administrator privilege verification
    crit: notable
    conf: 0.85
    any:
      - id: is-in-role-admin
      - id: windows-principal-check
      - id: is-elevated-property
