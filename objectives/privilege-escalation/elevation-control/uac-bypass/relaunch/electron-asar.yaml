defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1548.002

traits:
- id: start-process-runas-hidden-raw
  desc: Hidden Start-Process RunAs
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(?i)Start-Process.{0,220}-Verb\\x20RunAs.{0,120}-WindowStyle\\x20Hidden'
- id: electron-self-relaunch-execpath
  desc: Electron relaunches execPath
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'process\[''execPath''\].{0,420}Start-Process'

composite_rules:
- id: electron-hidden-self-elevation
  desc: Electron hidden self elevation
  crit: hostile
  conf: 0.98
  all:
  - id: start-process-runas-hidden-raw
  - id: electron-self-relaunch-execpath
  - id: micro-behaviors/os/privilege/check::net-session-admin-check-hex
  - id: micro-behaviors/process/create/hidden::encodedcommand-flag-raw
