defaults:
  for: [python]
  platforms: [windows]
  attack: T1548.002
  conf: 0.9

traits:
- id: py-admin-launch-import
  desc: Python admin-launch library import
  crit: suspicious
  ref: sha256:ecf20a98afad77070e569863859939ea86c29941d53d602825da71ac7fd437a9
  if:
    type: import
    regex: 'py_admin_launch|py_admin_launch\.(AdminLaunchError|launch)'
- id: sys-executable-module-relaunch
  desc: Python relaunches module executable
  crit: notable
  ref: sha256:ecf20a98afad77070e569863859939ea86c29941d53d602825da71ac7fd437a9
  if:
    type: text
    regex: 'sys\.executable\s*,\s*["'']-m["'']'
- id: elevation-attempt-flag
  desc: Elevation attempt guard flag
  crit: component
  ref: sha256:ecf20a98afad77070e569863859939ea86c29941d53d602825da71ac7fd437a9
  if:
    type: literal
    exact: --elevation-attempted

composite_rules:
- id: python-admin-relaunch-loop
  desc: Python self-relaunches for admin
  crit: suspicious
  conf: 0.94
  ref: sha256:ecf20a98afad77070e569863859939ea86c29941d53d602825da71ac7fd437a9
  all:
  - id: py-admin-launch-import
  - id: sys-executable-module-relaunch
  - id: elevation-attempt-flag
  - id: micro-behaviors/os/privilege/check::ctypes-is-admin
- id: python-admin-defender-exclusion
  desc: Elevated Python Defender exclusion
  crit: hostile
  conf: 0.97
  ref: sha256:ecf20a98afad77070e569863859939ea86c29941d53d602825da71ac7fd437a9
  all:
  - id: python-admin-relaunch-loop
  - id: objectives/evasion/anti-av/platform/defender::defender-exclusion-builder-python
  - id: objectives/evasion/anti-av/platform/defender::defender-powershell-runner-python
