defaults:
  platforms: [windows]
  for: [java, class, java_class]
  attack: T1548.002

traits:
composite_rules:
  - id: jvm-uac-bypass-attempt
    desc: JVM administrator-aware process execution
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/os/privilege/check::jvm-is-admin-method
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
