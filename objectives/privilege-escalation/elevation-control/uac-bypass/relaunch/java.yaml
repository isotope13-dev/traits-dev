defaults:
  platforms: [windows]
  for: [java, class, java_class, jar]
  attack: T1548.002

traits:
  - id: jvm-admin-check-call
    desc: JVM administrator status check
    crit: notable
    conf: 0.96
    if:
      type: import
      exact: isAdmin

composite_rules:
  - id: jvm-uac-bypass-attempt
    desc: JVM administrator-aware process execution
    crit: suspicious
    conf: 0.98
    all:
      - id: jvm-admin-check-call
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
