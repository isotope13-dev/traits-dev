defaults:
  mbc: E1134
  attack: T1548.002
  platforms:
    - windows
    - linux
    - macos
traits:
  - id: go-escalate-import
    desc: lu4p/go-escalate privilege escalation library
    crit: suspicious
    conf: 0.95
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: lu4p/go-escalate|go-escalate
  - id: go-escalate-string
    desc: go-escalate library string in binary
    crit: suspicious
    conf: 0.9
    for:
      - pe
    if:
      type: text
      regex: lu4p/go-escalate|escalate\.Elevate
  - id: go-escalate-dependency
    desc: go-escalate module dependency
    crit: suspicious
    conf: 0.9
    for: [go.mod]
    if:
      type: text
      substr: github.com/lu4p/go-escalate
  - id: is-elevated-call
    desc: Checks if running elevated (IsElevated)
    crit: suspicious
    conf: 0.8
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: IsElevated
  - id: is-admin-call
    desc: Checks for admin rights (isAdmin)
    crit: suspicious
    conf: 0.8
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: isAdmin
  - id: check-elevate-call
    desc: Calls CheckElevate before escalating
    crit: suspicious
    conf: 0.8
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: CheckElevate
  - id: is-elevated-string
    desc: IsElevated elevation-check string
    crit: notable
    conf: 0.75
    for:
      - pe
    if:
      type: text
      word: IsElevated
  - id: check-elevate-string
    desc: CheckElevate escalation string
    crit: suspicious
    conf: 0.75
    for:
      - pe
    if:
      type: text
      word: CheckElevate
  - id: elevate-call
    desc: Elevates via escalate.Escalate
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: escalate.Escalate
  - id: elevate-call-bare
    desc: Calls Elevate to gain privileges
    crit: suspicious
    conf: 0.85
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: Elevate
  - id: uac-bypass-pattern
    desc: UAC bypass string pattern
    crit: suspicious
    conf: 0.9
    for:
      - go
      - pe
    if:
      type: text
      regex: UAC.{0,20}\bbypass\b|\bbypass\b.{0,20}UAC
  - id: fodhelper-bypass
    desc: fodhelper.exe UAC-bypass technique
    crit: suspicious
    conf: 0.95
    for:
      - go
    if:
      type: text
      word: fodhelper
    unless:
      - id: metadata/binary/resource/
  - id: eventvwr-bypass
    desc: eventvwr.exe UAC-bypass technique
    crit: suspicious
    conf: 0.95
    for:
      - go
      - pe
    if:
      type: text
      word: eventvwr
    unless:
      - id: metadata/binary/resource/
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/binary/vendor/
  - id: computerdefaults-bypass
    desc: computerdefaults.exe UAC-bypass technique
    crit: suspicious
    conf: 0.95
    for:
      - go
    if:
      type: text
      word: computerdefaults
    unless:
      - id: metadata/binary/resource/
  - id: sudo-path
    desc: sudo binary path
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    platforms:
      - linux
      - macos
    if:
      type: text
      exact: /usr/bin/sudo
composite_rules:
  - id: escalate-library
    desc: Privilege escalation library
    crit: suspicious
    conf: 0.9
    any:
      - id: go-escalate-import
      - id: go-escalate-string
      - id: go-escalate-dependency
  - id: is-elevated-check
    desc: Elevation check operations
    crit: suspicious
    conf: 0.8
    any:
      - id: is-elevated-call
      - id: is-admin-call
      - id: check-elevate-call
  - id: escalate-operations
    desc: Escalation operations
    crit: suspicious
    conf: 0.85
    any:
      - id: is-elevated-check
      - id: elevate-call
      - id: elevate-call-bare
  - id: uac-bypass-string
    desc: UAC bypass indicators combined
    crit: suspicious
    conf: 0.9
    any:
      - id: uac-bypass-pattern
      - id: fodhelper-bypass
      - id: eventvwr-bypass
  - id: uac-indicators
    desc: UAC bypass indicators
    crit: suspicious
    conf: 0.9
    any:
      - id: uac-bypass-string
      - id: objectives/privilege-escalation/token-manipulation::runas-verb
  - id: privilege-escalation
    desc: Privilege escalation attempt
    crit: suspicious
    conf: 0.9
    all:
      - id: escalate-library
    any:
      - id: escalate-operations
      - id: micro-behaviors/process/create/shell/guard::sudo-exec
  - id: uac-bypass
    desc: UAC bypass technique
    crit: suspicious
    conf: 0.95
    all:
      - id: uac-indicators
      - id: escalate-operations
