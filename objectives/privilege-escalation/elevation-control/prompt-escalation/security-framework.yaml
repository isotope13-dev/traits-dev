# macOS Security Framework Privilege Escalation
# Detects privilege escalation via Apple's Security Framework APIs
# ATT&CK: T1548.004 (Abuse Elevation Control Mechanism)
#
# AuthorizationExecuteWithPrivileges is deprecated but still abused by malware.
# AuthorizationCreate + AuthorizationCopyRights can request admin rights.
# Atomic API traits are in micro-behaviors/process/identity/uid/macos-auth.yaml
defaults:
  for: [macho, dylib, c]
  platforms: [macos]
  attack: "T1548.004"
composite_rules:
  - id: auth-execute-privesc
    desc: Privilege escalation via AuthorizationExecuteWithPrivileges
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/identity/uid::auth-execute-with-privileges
    any:
      - id: micro-behaviors/process/identity/uid::auth-create
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/binary/framework/
        - id: metadata/binary/framework/
    unless:
      - id: well-known/app/macos-benign/
  - id: auth-rights-request
    desc: Authorization rights request chain
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/process/identity/uid::auth-create
      - id: micro-behaviors/process/identity/uid::auth-copy-rights
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: auth-execute-network
    desc: Privileged execution with network activity
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/process/identity/uid::auth-execute-with-privileges
      - id: micro-behaviors/communications/http/request/client::http-client
    downgrade:
      any:
        - id: metadata/signed/platform::apple
    unless:
      - id: well-known/app/macos-benign/
      - id: well-known/app/securew2-joinnow::recognized-securew2-joinnow
  - id: hidden-privileged-execution
    desc: Hidden application with privileged execution
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/identity/uid::auth-execute-with-privileges
    any:
      - id: micro-behaviors/ui/window/manage/activation::macos-set-activation-policy
    unless:
      - id: well-known/app/securew2-joinnow::recognized-securew2-joinnow
