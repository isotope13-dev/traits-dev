defaults:
  attack: T1548
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: admin-manifest-packed-loader
    desc: Admin manifest in packed loader
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: objectives/anti-static/pack/detect::themida-sparse-import-loader
      - id: metadata/signed/trust-level::unsigned
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
