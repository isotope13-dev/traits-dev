defaults:
  attack: T1548
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: admin-manifest-packed-loader
    desc: Admin manifest in packed loader
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: objectives/anti-static/pack/detect::themida-sparse-import-loader
      - id: metadata/signed/trust-level::unsigned
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
  - id: admin-nuitka-encrypted-loader
    desc: Admin-elevated Nuitka encrypted one-file loader
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: micro-behaviors/data/embedded/payload/packer::nuitka-onefile-strings
      - id: metadata/binary/section/metrics::high-entropy-rodata
      - id: metadata/binary/metrics/structural::malformed-pe-structure
    any:
      - id: metadata/binary/layout::low-overlay-entropy
      - id: micro-behaviors/process/create/launch::create-process-api-name
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/family/
  - id: opaque-admin-token-network-manipulator
    desc: Opaque admin PE enables token and network manipulation
    crit: hostile
    conf: 0.98
    attack: T1027,T1134,T1049,T1087.002
    all:
      - id: metadata/binary/layout::large-high-entropy-overlay
      - id: metadata/binary/section/names::blank-section-name-cluster
      - id: metadata/binary/section/metrics::multiple-nonstandard-section-names
      - id: metadata/build/manifest::pe-requires-admin
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
    any:
      - id: micro-behaviors/os/network/connections::set-tcp-entry
      - id: micro-behaviors/os/service/remote::net-user-enum-source
    needs: 1
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity::pe-signature-verified
      - id: metadata/binary/installer/family/
