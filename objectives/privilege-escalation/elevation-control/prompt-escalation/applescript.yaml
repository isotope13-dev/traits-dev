defaults:
  for:
    - shell
    - python
    - javascript
  platforms:
    - macos
  attack: T1548.004
traits:
  - id: admin-privileges
    desc: Requests administrator privileges
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: administrator privileges
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: with-admin-privileges
    desc: do shell script with admin
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: with administrator privileges
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/quality/false-positives::benign-app-fp-context
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
      - id: well-known/app/gns3::gns3-gui-package-member
  - id: sudo-in-script
    desc: Uses sudo in shell script
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: do shell script.{0,50}sudo
  - id: run-as-root
    desc: Attempts to run as root
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)\brun\s+as\s+(the\s+)?root\b
    not:
      - regex: (?i)non[-_ ]root
      - regex: (?i)trying\s+to\s+run
    downgrade:
      any:
        - id: metadata/signed/platform::apple
composite_rules:
  - id: admin-privilege-escalation
    desc: AppleScript admin privilege escalation
    crit: suspicious
    conf: 0.9
    any:
      - id: admin-privileges
      - id: with-admin-privileges
  - id: shell-admin
    desc: Shell execution with admin privileges
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/create/script/apple-event::shell-dup-cmd
      - id: with-admin-privileges
  - id: macos-admin-prompt-persistence
    desc: AppleScript admin prompt with persistence
    crit: suspicious
    conf: 0.93
    all:
      - id: objectives/privilege-escalation/elevation-control/prompt-escalation::admin-privilege-escalation
    any:
      - id: objectives/persistence/system/launchd/core::launchd
      - id: objectives/persistence/login/items::loginhook-persistence
      - id: objectives/persistence/login/items::tal-persistence
  - id: admin-prompt-loginhook
    desc: AppleScript admin prompt installs LoginHook
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/privilege-escalation/elevation-control/prompt-escalation::admin-privilege-escalation
      - id: objectives/persistence/login/items::loginhook-persistence
