defaults:
  platforms: [windows]
  for: [pe]
  attack: T1548.002

traits:
  - id: italian-admin-required-message
    desc: Italian admin required message
    crit: component
    conf: 0.93
    if:
      type: text
      substr: richiede privilegi di amministratore
  - id: italian-admin-relaunch-message
    desc: Italian admin relaunch message
    crit: component
    conf: 0.93
    if:
      type: text
      substr: Riavvio con diritti di amministratore
  - id: go-default-uac-relaunch-function
    desc: Go default UAC relaunch function
    crit: component
    conf: 0.97
    if:
      type: text
      substr: /uac.RunDefaultUAC
  - id: go-runas-admin-function
    desc: Go run-as-administrator function
    crit: component
    conf: 0.97
    if:
      type: text
      substr: /uac.runAsAdmin

composite_rules:
  - id: windows-runas-admin-relaunch
    desc: Windows runas admin relaunch
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/os/privilege/elevation::runas-string
      - id: italian-admin-required-message
      - id: italian-admin-relaunch-message
      - id: micro-behaviors/process/create/system::shell-execute-ex-a
    any:
      - id: micro-behaviors/os/privilege/token::open-process-token
      - id: micro-behaviors/os/privilege/token::get-token-information

  - id: runas-relaunch-with-persistent-task
    desc: Runas relaunch with persistent task
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/privilege/elevation::runas-elevation-token
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: objectives/persistence/login/scheduled-task/cli::elevated-logon-self-persistence
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor::microsoft-corp-versioninfo

  - id: go-payload-runas-relaunch
    desc: Go dropper requests UAC elevation and relaunches its payload as administrator
    crit: hostile
    conf: 0.99
    all:
      - id: go-default-uac-relaunch-function
      - id: go-runas-admin-function
      - id: micro-behaviors/os/privilege/elevation::runas-string
      - id: objectives/command-and-control/dropper/execution/native::payload-container-type
      - id: objectives/anti-analysis/sandbox-detect/suite::stealth-check-runner

  - id: unsigned-runas-explorer-launch
    desc: Unsigned native binary requests runas and launches Windows Explorer
    crit: hostile
    conf: 0.98
    attack: T1548.002,T1059.003
    all:
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/os/privilege/elevation::runas-string
      - id: micro-behaviors/process/create/hcom::launch-explorer
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
