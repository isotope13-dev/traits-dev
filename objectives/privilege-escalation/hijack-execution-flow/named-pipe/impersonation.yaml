defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  conf: 0.9
  for: [scripts, binaries]
traits:
  - id: system-pipe-lsass
    desc: Impersonating LSASS named pipe
    if:
      type: text
      regex: \\pipe\\lsass
    unless:
      - type: symbol
        exact: RpcImpersonateClient
  - id: system-pipe-generic
    desc: Impersonating system named pipe
    if:
      type: text
      regex: \\pipe\\(ntsvcs|epmapper|samr)
    unless:
      - type: symbol
        exact: NdrClientCall
      - type: symbol
        exact: RpcServerListen
