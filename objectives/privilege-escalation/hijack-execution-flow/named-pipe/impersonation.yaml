defaults:
  platforms:
    - windows
  crit: suspicious
  conf: 0.9
  for: [pe, dll]
traits:
  - id: lsass-pipe-name
    desc: LSASS named pipe path
    crit: component
    if:
      type: text
      regex: \\pipe\\lsass
    unless:
      - type: symbol
        exact: LsaIImpersonateClient
  - id: impersonate-named-pipe-client-symbol
    desc: ImpersonateNamedPipeClient symbol
    crit: notable
    if:
      type: symbol
      exact: ImpersonateNamedPipeClient
  - id: system-pipe-generic
    desc: Impersonating system named pipe
    if:
      type: text
      regex: \\pipe\\(ntsvcs|epmapper|samr)
    unless:
      - type: symbol
        exact: NdrClientCall
      - type: symbol
        exact: RpcServerListen

composite_rules:
  - id: system-pipe-lsass
    desc: Impersonating LSASS named pipe
    all:
      - id: lsass-pipe-name
    any:
      - id: micro-behaviors/communications/ipc/named-pipe::create-named-pipe
      - id: impersonate-named-pipe-client-symbol
