defaults:
  platforms:
    - unix
    - windows
    - macos
  crit: suspicious
  conf: 0.9
  for: [scripts, binaries]
traits:
  - id: system-pipe-lsass
    desc: Impersonating LSASS named pipe
    if:
      type: string_value
      regex: \\pipe\\lsass
  - id: system-pipe-generic
    desc: Impersonating system named pipe
    if:
      type: string_value
      regex: \\pipe\\(ntsvcs|epmapper|samr)
    unless:
      - type: symbol
        exact: NdrClientCall
      - type: symbol
        exact: RpcServerListen
