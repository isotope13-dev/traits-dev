# Hijack Execution Flow for Privilege Escalation - LD_PRELOAD/DYLD_INSERT
# MBC: F0015 (Hijack Execution Flow)
# ATT&CK: T1574.006 (Dynamic Linker Hijacking)
#
# When LD_PRELOAD or DYLD_INSERT_LIBRARIES is used to inject a library
# into a setuid binary or privileged daemon, it becomes privilege escalation.
# General linker hijacking is in objectives/evasion/hijack-execution-flow/env/.
# These composites detect the privilege-escalation specific patterns.
defaults:
  mbc: "F0015"
  attack: "T1574.006"
  platforms: [linux, unix, macos]
composite_rules:
  # LD_PRELOAD + setuid binary = privilege escalation
  - id: preload-setuid-privesc
    desc: LD_PRELOAD injection into setuid context
    crit: suspicious
    conf: 0.75
    for: [shell, python]
    all:
      - id: objectives/evasion/hijack-execution-flow/env/preload::ld-hijack-env
    any:
      - id: micro-behaviors/process/identity/setuid::setuid-dup
      - id: micro-behaviors/process/identity/syscall::setuid-comp
      - id: micro-behaviors/os/privilege/paths::root-access
    unless:
      - id: well-known/lib/electron/
  # DYLD_INSERT_LIBRARIES + sudo/privileged execution = macOS privesc
  - id: dyld-insert-privesc
    desc: DYLD_INSERT_LIBRARIES with privileged execution
    crit: hostile
    conf: 0.9
    platforms: [macos]
    for: [shell, python, macho]
    all:
      - id: objectives/evasion/hijack-execution-flow/env/preload::dyld-insert-libraries-string
    any:
      - id: micro-behaviors/process/identity/uid::auth-execute-with-privileges
      - id: micro-behaviors/os/privilege/paths::root-access
