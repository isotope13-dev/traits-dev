# Hijack Execution Flow for Privilege Escalation - Windows Services
# MBC: F0015 (Hijack Execution Flow)
# ATT&CK: T1574.001 (DLL Search Order Hijacking), T1574.002 (DLL Side-Loading)
#
# When a privileged service loads a DLL from a writable location, or when
# the service binary path is replaced, the attacker's code runs with the
# service's elevated privileges.
# General hijack execution flow is in objectives/evasion/hijack-execution-flow/.
# These composites specifically detect service-targeting hijack patterns.
defaults:
  mbc: "F0015"
  platforms: [windows]
composite_rules:
  # DLL hijacking + service context = service DLL hijack
  - id: service-dll-hijack
    desc: DLL hijacking targeting a Windows service
    crit: hostile
    conf: 0.92
    for: [pe, dll]
    all:
      - id: micro-behaviors/os/service/control::open-sc-manager
    any:
      - id: objectives/evasion/hijack-execution-flow/dll-hijacking::js-dll-side-loading
      - id: objectives/evasion/hijack-execution-flow/dll-hijacking::python-dll-side-loading
      - id: micro-behaviors/os/service/control::change-service-config
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  # Service binary path + writable path write = path hijack
  - id: service-path-hijack
    desc: Service binary path hijack
    crit: hostile
    conf: 0.95
    for: [batch, powershell, pe]
    all:
      - id: objectives/privilege-escalation/modify-service::sc-config-binpath
    any:
      - id: micro-behaviors/process/create/shell::cmd-exe
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
