defaults:
  platforms: [unix]
  for: [java, class, java_class, jar]
  attack: T1553.004

traits:
  - id: java-keytool-trust-import
    desc: Java keytool trust import
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'keytool[\s\S]{0,220}-importcert[\s\S]{0,220}-trustcacerts'

  - id: java-keytool-import-bytes
    desc: Java keytool import bytes
    crit: suspicious
    conf: 0.94
    for: [java_class]
    if:
      type: hex
      pattern: 6B 65 79 74 6F 6F 6C

  - id: java-cacerts-storepass
    desc: Java cacerts storepass
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'cacerts[\s\S]{0,180}changeit'

  - id: java-cacerts-changeit-bytes
    desc: Java cacerts changeit bytes
    crit: suspicious
    conf: 0.92
    for: [java_class]
    if:
      type: hex
      pattern: 63 68 61 6E 67 65 69 74

composite_rules:
  - id: java-keytool-cacerts-import
    desc: Java cacerts cert import
    crit: hostile
    conf: 0.98
    all:
      - id: java-keytool-trust-import
      - id: java-cacerts-storepass

  - id: java-bytecode-cacerts-import
    desc: Java bytecode cert import
    crit: hostile
    conf: 0.98
    for: [java_class]
    all:
      - id: java-keytool-import-bytes
      - id: java-cacerts-changeit-bytes
