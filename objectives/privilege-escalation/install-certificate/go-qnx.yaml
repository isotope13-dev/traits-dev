defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1553.004

traits:
  # Building-block legs. Each is individually neutral — the CA name also ships in
  # legitimate trust bundles, the anchors dir is what update-ca-trust writes to,
  # and /ca-install is a generic endpoint. Only the combination is hostile, so
  # these are component-tier and surface via the composite below.
  - id: qnx-go-root-ca-template
    desc: Embedded root CA certificate name
    crit: component
    conf: 0.94
    if:
      type: text
      substr: GlobalTrust Root CA

  - id: qnx-go-ca-install-post
    desc: CA install POST endpoint path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /ca-install

composite_rules:
  # Crafts a root CA, drops it into the system trust anchors, and beacons the
  # install to a /ca-install endpoint — rogue CA install for TLS interception.
  - id: qnx-go-root-ca-install-exfil
    desc: Rogue root CA install into system trust
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-root-ca-template
      - id: micro-behaviors/fs/path/config/security::system-ca-trust-anchor-directory-reference
      - id: qnx-go-ca-install-post
