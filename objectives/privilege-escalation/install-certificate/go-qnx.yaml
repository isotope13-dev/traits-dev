defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1553.004

traits:
  - id: qnx-go-root-ca-template
    desc: QNX Go root CA template
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: GlobalTrust Root CA

  - id: qnx-go-ca-trust-path
    desc: QNX Go CA trust path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/pki/ca-trust/source/anchors/

  - id: qnx-go-ca-install-post
    desc: QNX Go CA install POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /ca-install

composite_rules:
  - id: qnx-go-root-ca-install-exfil
    desc: QNX Go root CA install exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-root-ca-template
      - id: qnx-go-ca-trust-path
      - id: qnx-go-ca-install-post
