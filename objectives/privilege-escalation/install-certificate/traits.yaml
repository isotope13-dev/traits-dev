# Install Certificate - Privilege Escalation / Trust Subversion
# MBC: F0016 (Install Certificate)
# ATT&CK: T1553.004 (Subvert Trust Controls: Install Root Certificate)
#
# Installing a root CA certificate enables MITM interception of TLS traffic,
# code signing trust bypass, or suppressing security warnings.
# The atomic install operations are in micro-behaviors/crypto/certificate/install/.
# These composites detect when installation is combined with indicators of abuse.
defaults:
  mbc: "F0016"
  attack: "T1553.004"
composite_rules:
  # === Windows: root cert install to trusted store ===
  - id: windows-root-cert-install
    desc: Root certificate installation to trusted store
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    for: [batch, powershell, pe]
    all:
      - id: micro-behaviors/crypto/certificate/install::cert-install-cmd
    any:
      - id: micro-behaviors/communications/http/request::http-client
      - id: micro-behaviors/process/create/shell::cmd-exe
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
  # === Windows: API-based cert install + network ===
  - id: windows-cert-install-network
    desc: Certificate install via API with network activity
    crit: suspicious
    conf: 0.88
    platforms: [windows]
    for: [pe, dll]
    all:
      - id: micro-behaviors/crypto/certificate/install::cert-install-api
      - id: micro-behaviors/communications/http/request::http-client
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  # === macOS: trusted cert install ===
  - id: macos-root-cert-install
    desc: macOS trusted root certificate installation
    crit: suspicious
    conf: 0.9
    platforms: [macos]
    for: [shell, python, ruby, macho]
    any:
      - id: micro-behaviors/crypto/certificate/install::security-add-trusted-cert
      - id: micro-behaviors/crypto/certificate/install::sec-trust-settings-api
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  # === macOS: cert install + proxy = MITM ===
  - id: macos-cert-proxy-mitm
    desc: Certificate install with proxy configuration (MITM)
    crit: hostile
    conf: 0.95
    platforms: [macos]
    for: [shell, python, ruby]
    all:
      - id: macos-root-cert-install
      - id: objectives/evasion/anti-av/platform::macos-set-web-proxy
  # === Linux: CA cert install + download ===
  - id: linux-ca-cert-install
    desc: Linux CA certificate installation
    crit: suspicious
    conf: 0.85
    platforms: [linux, unix]
    for: [shell, python, elf]
    all:
      - id: micro-behaviors/crypto/certificate/install::update-ca-certificates
    any:
      - id: micro-behaviors/communications/http/request::http-client
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: micro-behaviors/communications/http/download/curl::wget-cmd
