defaults:
  platforms: [unix]
  for: [ruby, shell]
  attack: T1553.004

traits:
  - id: ruby-mitm-server-cert
    desc: Ruby MITM server cert
    crit: suspicious
    conf: 0.94
    for: [ruby]
    if:
      type: text
      regex: 'subjectAltName[\s\S]{0,220}extendedKeyUsage[\s\S]{0,120}serverAuth'

  - id: shell-certutil-user-ca
    desc: Shell certutil user CA install
    crit: suspicious
    conf: 0.94
    for: [shell]
    if:
      type: text
      regex: 'certutil -A[\s\S]{0,160}Custom Root CA'

composite_rules:
  - id: ruby-unix-root-ca-mitm
    desc: Ruby Unix root CA MITM
    crit: hostile
    conf: 0.98
    for: [ruby]
    all:
      - id: micro-behaviors/crypto/certificate/install::update-ca-certificates
    any:
      - id: micro-behaviors/crypto/certificate/install::ca-certificates-path
      - id: micro-behaviors/crypto/certificate/usage::ssl-certs-path
      - id: ruby-mitm-server-cert
    needs: 2

  - id: shell-unix-root-ca-install
    desc: Shell Unix root CA installation pattern
    crit: suspicious
    conf: 0.98
    for: [shell]
    all:
      - id: micro-behaviors/crypto/certificate/install::update-ca-certificates
    any:
      - id: micro-behaviors/crypto/certificate/install::ca-certificates-path
      - id: micro-behaviors/crypto/certificate/usage::ssl-certs-path
      - id: shell-certutil-user-ca
      - id: micro-behaviors/crypto/certificate/usage::self-signed-cert-generation
    needs: 2
    unless:
      - id: well-known/lib/deb-package::ca-certificates-postinst
      - id: well-known/app/aui-agent-builder/
      - id: well-known/tool/development/keploy::keploy-source-tree-path
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/harness::go-test-helper-file
      # Leaf server certs (CA:FALSE) installed for local HTTPS registries / CI —
      # not a signing root CA. Keeps MITM CA:TRUE installs suspicious.
      - id: micro-behaviors/crypto/certificate/usage::openssl-ca-false-leaf
