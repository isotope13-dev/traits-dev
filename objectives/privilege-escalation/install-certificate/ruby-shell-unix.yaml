defaults:
  platforms: [unix]
  for: [ruby, shell]
  attack: T1553.004

traits:
  - id: unix-local-ca-cert-path
    desc: Unix local CA cert path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/local/share/ca-certificates
    unless:
      - id: well-known/tool/development/stoobly-agent/
      - id: well-known/app/egroupware/
      - id: well-known/app/aui-agent-builder/
      - id: metadata/package/files/system-package::os-ca-cert-hook-script
      - id: well-known/app/azure-dev-cli::azure-dev-cli-source-path
      - id: well-known/tool/offensive/pwn/
      - id: metadata/package/testing/presence/harness::go-test-helper-file
      - type: text
        substr: /etc/gitlab-runner
      - type: text
        substr: arachni_ca_root

  - id: unix-pki-ca-anchor-path
    desc: Unix PKI CA anchor path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/pki/ca-trust/source/anchors
    unless:
      - id: well-known/app/aui-agent-builder/

  - id: ruby-mitm-server-cert
    desc: Ruby MITM server cert
    crit: suspicious
    conf: 0.94
    for: [ruby]
    if:
      type: text
      regex: 'subjectAltName[\s\S]{0,220}extendedKeyUsage[\s\S]{0,120}serverAuth'

  - id: shell-certutil-user-ca
    desc: Shell certutil user CA install
    crit: suspicious
    conf: 0.94
    for: [shell]
    if:
      type: text
      regex: 'certutil -A[\s\S]{0,160}Custom Root CA'

composite_rules:
  - id: ruby-unix-root-ca-mitm
    desc: Ruby Unix root CA MITM
    crit: hostile
    conf: 0.98
    for: [ruby]
    all:
      - id: micro-behaviors/crypto/certificate/install::update-ca-certificates
    any:
      - id: unix-local-ca-cert-path
      - id: unix-pki-ca-anchor-path
      - id: micro-behaviors/crypto/certificate/usage::ssl-certs-path
      - id: ruby-mitm-server-cert
    needs: 2

  - id: shell-unix-root-ca-install
    desc: Shell Unix root CA install
    crit: hostile
    conf: 0.98
    for: [shell]
    all:
      - id: micro-behaviors/crypto/certificate/install::update-ca-certificates
    any:
      - id: unix-local-ca-cert-path
      - id: unix-pki-ca-anchor-path
      - id: micro-behaviors/crypto/certificate/usage::ssl-certs-path
      - id: shell-certutil-user-ca
      - id: micro-behaviors/crypto/certificate/usage::self-signed-cert-generation
    needs: 2
    unless:
      - id: well-known/lib/deb-package::ca-certificates-postinst
      - id: well-known/app/aui-agent-builder/
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/harness::go-test-helper-file
