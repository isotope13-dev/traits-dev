defaults:
  platforms: [unix]
  for: [rust, binaries]
  attack: T1553.004

traits:
  - id: rust-openssl-rogue-ca
    desc: Generates X509 cert via openssl req
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'req -x509'
    unless:
      - type: basename
        regex: '\.ko$'
      - id: objectives/evasion/kernel-hide/module::vermagic
      - type: section
        exact: .modinfo
      - id: metadata/package/testing/harness/unit/
      - id: metadata/package/testing/presence/harness::rust-crate-example-path


  - id: rust-ca-true-basic-constraints
    desc: Cert marked CA:TRUE (signing CA)
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: basicConstraints=critical,CA:TRUE

composite_rules:
  - id: rust-rogue-ca-install
    desc: Installs rogue root CA into trust
    crit: hostile
    conf: 0.98
    all:
      - id: rust-openssl-rogue-ca
      - id: micro-behaviors/crypto/certificate/install::ca-certificates-path
    any:
      - id: micro-behaviors/crypto/certificate/install::update-ca-certificates
      - id: rust-ca-true-basic-constraints
