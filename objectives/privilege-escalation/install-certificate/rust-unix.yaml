defaults:
  platforms: [unix]
  for: [rust, binaries]
  attack: T1553.004

traits:
  - id: rust-openssl-rogue-ca
    desc: Rust OpenSSL rogue CA
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'req -x509'

  - id: rust-ca-true-basic-constraints
    desc: Rust CA true constraints
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: basicConstraints=critical,CA:TRUE

  - id: rust-ca-cert-install-path
    desc: Rust CA cert install path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /usr/local/share/ca-certificates

  - id: rust-update-ca-certificates
    desc: Rust update CA certificates
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: update-ca-certificates

composite_rules:
  - id: rust-rogue-ca-install
    desc: Rust rogue CA install
    crit: hostile
    conf: 0.98
    all:
      - id: rust-openssl-rogue-ca
      - id: rust-ca-cert-install-path
    any:
      - id: rust-update-ca-certificates
      - id: rust-ca-true-basic-constraints
