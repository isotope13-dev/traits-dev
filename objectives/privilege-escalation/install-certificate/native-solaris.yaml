defaults:
  platforms: [solaris, unix]
  for: [c, cpp, objc, elf]
  attack: T1553.004

traits:
  - id: native-openssl-root-ca-command
    desc: Native openssl root CA cmd
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'openssl req -x509[\s\S]{0,180}-subj'
    unless:
      - id: well-known/app/openvpn::openvpn-source-tree

  - id: solaris-certutil-trust-add
    desc: Solaris certutil trust add
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: CTu,CTu,CTu

  - id: solaris-certificate-store-path
    desc: Solaris CA trust-anchor store path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/(var/certificates|etc/certs)/CA/'
    unless:
      - id: well-known/app/virtualbox::package-member

composite_rules:
  - id: solaris-native-root-ca-install
    desc: Solaris native root CA install
    crit: hostile
    conf: 0.98
    all:
      - id: native-openssl-root-ca-command
    any:
      - id: solaris-certutil-trust-add
      - id: solaris-certificate-store-path
