defaults:
  platforms: [windows]
  for: [kotlin]
  attack: T1553.004

traits:
  - id: kotlin-keytool-genkeypair
    desc: Kotlin keytool genkeypair
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: keytool -genkeypair

  - id: kotlin-certutil-root-addstore
    desc: Kotlin certutil root addstore
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'certutil\s+-addstore\s+-f\s+(ROOT|TRUST)'
      case_insensitive: true

composite_rules:
  - id: kotlin-windows-root-cert-install
    desc: Kotlin Windows root cert install
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-keytool-genkeypair
      - id: kotlin-certutil-root-addstore
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
