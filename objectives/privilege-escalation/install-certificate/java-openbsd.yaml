defaults:
  platforms: [openbsd, bsd, unix]
  for: [java, class]
  attack: T1553.004

traits:
  - id: java-rogue-ca-generation
    desc: Java generates rogue CA
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: Generating rogue CA certificate

  - id: java-keytool-importcert
    desc: Java invokes keytool importcert
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bkeytool(\.exe)?\b[^\n]{0,120}\b-importcert\b'

  - id: java-openbsd-cert-pem
    desc: Java targets OpenBSD cert.pem
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: /etc/ssl/cert.pem

composite_rules:
  - id: java-openbsd-rogue-ca-install
    desc: Java OpenBSD rogue CA install
    crit: hostile
    conf: 0.98
    all:
      - id: java-rogue-ca-generation
      - id: java-keytool-importcert
      - id: java-openbsd-cert-pem
