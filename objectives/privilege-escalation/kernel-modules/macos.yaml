# Kernel Extensions - macOS Privilege Escalation
# MBC: F0010 (Kernel Modules and Extensions)
# ATT&CK: T1547.006 (Kernel Modules and Extensions)
#
# macOS kernel extensions (kexts) run with kernel privileges.
# Modern macOS requires SIP disabled or signed kexts, but malware
# may attempt to load unsigned kexts or abuse system extensions.
defaults:
  mbc: "F0010"
  attack: "T1547.006"
  platforms: [macos]
composite_rules:
  # kextload + shell exec = suspicious kext-based privesc
  - id: kext-shell-exec
    desc: Kernel extension load with shell execution
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/os/kernel/module::macos-kext-load
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  # kextload from non-standard path
  - id: kext-from-temp
    desc: Kernel extension loaded with temp path reference
    crit: suspicious
    conf: 0.9
    for: [shell, python, macho]
    all:
      - id: micro-behaviors/os/kernel/module::macos-kext-load
    any:
      - id: micro-behaviors/fs/path/temp::any-temp-path
    downgrade:
      any:
        - id: metadata/signed/platform::apple
