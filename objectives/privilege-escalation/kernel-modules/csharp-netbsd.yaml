defaults:
  platforms: [netbsd, unix, windows]
  for: [csharp, pe]
  attack: T1547.006

traits:
  - id: csharp-netbsd-modctl-load
    desc: C# NetBSD modctl load
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: modctl -a /usr/modules/if_tap.ko

  - id: csharp-rootkit-fetch-script
    desc: C# rootkit fetch script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /rootkit.sh

composite_rules:
  - id: csharp-netbsd-kmod-rootkit-load
    desc: C# NetBSD kmod rootkit load
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-netbsd-modctl-load
      - id: csharp-rootkit-fetch-script
