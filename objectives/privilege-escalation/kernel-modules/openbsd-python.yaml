defaults:
  platforms: [openbsd, bsd, unix]
  for: [python, pyc]
  attack: T1547.006

traits:
  - id: python-openbsd-kernel-module
    desc: Python OpenBSD kernel module
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: kernel diagnostic module - OpenBSD

  - id: python-kernel-module-load-attempt
    desc: Python kmod load attempt
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: attempt_load_kernel_module

composite_rules:
  - id: python-openbsd-kmod-load
    desc: Python OpenBSD kmod load
    crit: hostile
    conf: 0.98
    all:
      - id: python-openbsd-kernel-module
      - id: python-kernel-module-load-attempt
