defaults:
  platforms: [solaris, unix]
  for: [python, pyc]
  attack: T1547.006

traits:
  - id: python-solaris-kmod-source
    desc: Python Solaris kmod source
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.sysmon_kmod.c

  - id: python-solaris-modload
    desc: Python Solaris modload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/sbin/modload

  - id: python-solaris-etc-system
    desc: Python Solaris etc system
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/etc/system($|[^A-Za-z0-9_-])'
    unless:
      - id: metadata/file/profile/identity::ansible-python-package-path

composite_rules:
  - id: python-solaris-kmod-load
    desc: Python Solaris kmod load
    crit: hostile
    conf: 0.98
    all:
      - id: python-solaris-kmod-source
      - id: python-solaris-modload
    any:
      - id: python-solaris-etc-system
