defaults:
  mbc: F0010
  attack: T1547.006
  platforms: [unix]
  for: [csharp]

traits:
  - id: csharp-kbuild-makefile
    desc: C# writes kbuild makefile
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'obj-m \+= backdoor_kmod\.o[\s\S]{0,140}make -C'

  - id: csharp-loads-kernel-module
    desc: C# runs insmod and modprobe
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'FileName = "(insmod|modprobe)"'

  - id: csharp-lsmod-verify-module
    desc: C# verifies module with lsmod
    crit: component
    conf: 0.92
    if:
      type: text
      substr: verified_loaded

composite_rules:
  - id: csharp-kernel-module-loader
    desc: C# kernel module loader
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-kbuild-makefile
      - id: csharp-loads-kernel-module
    any:
      - id: csharp-lsmod-verify-module
