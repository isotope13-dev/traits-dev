defaults:
  platforms: [linux, android]
  for: [c, cpp]
  attack: T1547.006
  mbc: F0010

traits:
  - id: kernelsu-ioctl-root-grant
    desc: KernelSU ioctl root grant interface
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: KSU_IOCTL_GRANT_ROOT
  - id: kernelsu-sepolicy-ioctl
    desc: KernelSU sepolicy ioctl interface
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: KSU_IOCTL_SET_SEPOLICY
  - id: kernelsu-setuid-hook
    desc: KernelSU setuid hook handler
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ksu_handle_setresuid
  - id: kernelsu-mount-namespace-control
    desc: KernelSU mount namespace control
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: KSU_NS_INDIVIDUAL
  - id: kernelsu-mount-namespace-taskwork
    desc: KernelSU mount namespace task work
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'struct\s+ksu_mns_tw[\s\S]{0,120}callback_head'
  - id: kernelsu-selinux-domain-marker
    desc: KernelSU SELinux domain marker
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'KERNEL_SU_(DOMAIN|CONTEXT)[\s\S]{0,160}u:r:'
  - id: kernelsu-selinux-policy-functions
    desc: KernelSU SELinux policy functions
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(setup_selinux|handle_sepolicy|apply_kernelsu_rules|setup_ksu_cred)'
    count_min: 3
  - id: kernelsu-syscall-tracepoint-flags
    desc: KernelSU syscall tracepoint flag control
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(set_task_syscall_work|TIF_SYSCALL_TRACEPOINT|SYSCALL_TRACEPOINT)'
    count_min: 2
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: kernelsu-task-mark-controls
    desc: KernelSU task mark controls
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'ksu_(mark|unmark|get_task_mark|set_task_mark)'
    count_min: 2
  - id: kernelsu-supercall-command-table
    desc: KernelSU supercall command table
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: ksu_ioctl_cmd_map

composite_rules:
  - id: kernelsu-root-control-interface
    desc: KernelSU root-control kernel interface
    crit: hostile
    conf: 0.96
    any:
      - id: kernelsu-ioctl-root-grant
      - id: kernelsu-setuid-hook
    all:
      - id: metadata/binary/license::linux-kernel-gpl2-spdx-header
  - id: kernelsu-supercall-policy-control
    desc: KernelSU supercall and policy-control interface
    crit: hostile
    conf: 0.96
    all:
      - id: kernelsu-supercall-command-table
      - id: kernelsu-sepolicy-ioctl
  - id: kernelsu-mount-namespace-task-control
    desc: KernelSU mount namespace task control
    crit: suspicious
    conf: 0.92
    all:
      - id: kernelsu-mount-namespace-control
      - id: kernelsu-mount-namespace-taskwork
  - id: kernelsu-selinux-policy-control
    desc: KernelSU SELinux policy control
    crit: suspicious
    conf: 0.94
    all:
      - id: kernelsu-selinux-domain-marker
      - id: kernelsu-selinux-policy-functions
  - id: kernelsu-syscall-tracepoint-control
    desc: KernelSU syscall tracepoint control
    crit: suspicious
    conf: 0.94
    all:
      - id: kernelsu-syscall-tracepoint-flags
      - id: kernelsu-task-mark-controls
