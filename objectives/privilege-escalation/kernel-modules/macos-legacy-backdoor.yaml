defaults:
  platforms: [macos]
  for: [macho, c]
  attack: T1068

traits:
  - id: macos-hooked-setuid
    desc: macOS hooked setuid export
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: _hooked_setuid
  - id: macos-uid0-backdoor-export
    desc: macOS uid0 backdoor export
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\buid0\b.{0,80}\bsetuid\b|\bsetuid\b.{0,80}\buid0\b'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/lang/source::linux-kernel-source-tree-path
  - id: macos-r00t-backdoor-export
    desc: macOS r00t backdoor export
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\br00t\b.{0,80}\bsetuid\b|\bsetuid\b.{0,80}\br00t\b'
    unless:
      - id: well-known/lib/wine::wine-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
      - id: well-known/tool/reverse-engineering/cutter::cutter-release-member
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: macos-security-token-import
    desc: macOS security token import
    crit: suspicious
    conf: 0.86
    if:
      type: text
      word: _set_security_token
  - id: macos-credential-copy-import
    desc: macOS credential copy import
    crit: suspicious
    conf: 0.82
    if:
      type: text
      word: _crcopy
  - id: macos-process-lookup-import
    desc: macOS process lookup import
    crit: notable
    conf: 0.7
    if:
      type: text
      word: _pfind

composite_rules:
  - id: macos-kext-setuid-backdoor
    desc: macOS kernel setuid backdoor
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/evasion/kernel-hide/rootkit::macos-kext-binary
      - id: macos-hooked-setuid
    any:
      - id: macos-uid0-backdoor-export
      - id: macos-r00t-backdoor-export
      - id: macos-security-token-import
      - id: macos-credential-copy-import
      - id: macos-process-lookup-import
