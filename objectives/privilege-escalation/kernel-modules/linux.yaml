# Kernel Modules and Extensions - Privilege Escalation
# MBC: F0010 (Kernel Modules and Extensions)
# ATT&CK: T1547.006 (Kernel Modules and Extensions)
#
# Malicious kernel module loading for privilege escalation.
# Legitimate kernel modules are loaded by package managers, DKMS, or
# hardware drivers - typically signed and from known paths.
# Suspicious patterns: loading from /tmp, combining with cred manipulation,
# or loading modules that hook the syscall table.
defaults:
  mbc: "F0010"
  attack: "T1547.006"
  platforms: [linux]
traits:
  - id: kmod-from-temp
    desc: Kernel module loaded from temporary path
    crit: suspicious
    conf: 0.9
    for: [shell, python, elf]
    if:
      type: text
      regex: '\b(insmod|modprobe)\b.{0,80}(/tmp|/var/tmp|/dev/shm)/'
  - id: become-root-module-obj
    desc: Build includes become_root module
    crit: component
    conf: 0.98
    for: [none]
    if:
      type: text
      exact: modules/become_root.o
composite_rules:
  # Kernel module load + credential manipulation = kernel LPE
  - id: kmod-cred-escalation
    desc: Kernel module with credential manipulation
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/kernel/module::kernel-module-load
    any:
      - id: objectives/privilege-escalation/exploit/kernel::commit-creds
      - id: objectives/privilege-escalation/exploit/kernel::prepare-creds
  # Kernel module load + syscall table hook = rootkit-style privesc
  - id: kmod-syscall-hook
    desc: Kernel module with syscall table hook
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/kernel/module::kernel-module-load
      - id: objectives/evasion/kernel-hide/hook::syscall-table-ref
  # User-space tool loading kernel module + shell execution
  - id: insmod-shell-exec
    desc: Kernel module load tool with shell execution
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/os/kernel/module::linux-kmod-load
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: micro-behaviors/os/service/control::service-control
  - id: kbuild-become-root-rootkit
    desc: Kernel module build with root helper
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/kernel/module::linux-kbuild-module-build
      - id: become-root-module-obj
    any:
      - id: objectives/evasion/kernel-hide/lkm/rootkit::hidden-pids-module-obj
      - id: objectives/evasion/kernel-hide/lkm/rootkit::hide-module-obj
      - id: objectives/evasion/kernel-hide/lkm/rootkit::clear-taint-dmesg-module-obj
