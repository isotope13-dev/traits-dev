defaults:
  platforms: [dragonflybsd, freebsd, unix]
  for: [swift, shell, c, cpp, elf]
  mbc: "F0010"
  attack: "T1547.006"

traits:
  - id: bsd-kldload-tool
    desc: BSD kldload tool path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /sbin/kldload

  - id: bsd-kldstat-tool
    desc: BSD kldstat module list
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: /sbin/kldstat

  - id: rootkit-ko-module-names
    desc: Rootkit-like kernel module names
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(rootkit_driver|backdoor_net|keylogger|priv_esc_helper)\.ko'

composite_rules:
  - id: bsd-suspicious-kmod-load
    desc: BSD suspicious kernel module load
    crit: hostile
    conf: 0.97
    all:
      - id: bsd-kldload-tool
      - id: rootkit-ko-module-names
