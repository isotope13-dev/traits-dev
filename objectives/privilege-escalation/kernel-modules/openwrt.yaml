defaults:
  platforms: [openwrt]
  for: [c, cpp, elf, python]
  attack: T1547.006
  mbc: F0010
traits:
- id: openwrt-temp-kmod-path
  desc: OpenWrt temp kernel module path
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '/tmp/[A-Za-z0-9_.-]{1,64}\.ko\b'
- id: kprobe-execve-target
  desc: Kprobe execve target
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: sys_execve
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: metadata/binary/vendor/
  - id: well-known/app/gitea::gitea-server-binary
  - id: well-known/tool/
  - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: metadata/file/string/artifact::linux-syscall-note-license
  - id: metadata/lang/source::linux-kernel-header-source-path
- id: openwrt-kmod-build-command
  desc: OpenWrt kernel module build command
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: 'make -C /lib/modules/.{0,80}/build.{0,80}\bmodules\b'
- id: openwrt-prepare-kernel-cred-string
  desc: OpenWrt kernel credential escalation symbol
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'commit_creds.{0,80}prepare_kernel_cred'
composite_rules:
- id: openwrt-kprobe-registration
  desc: OpenWrt kprobe registration
  crit: suspicious
  conf: 0.9
  any:
  - id: micro-behaviors/os/kernel/module::linux-register-kprobe
  - id: micro-behaviors/os/kernel/module::linux-unregister-kprobe
- id: openwrt-kprobe-kmod-source
  desc: OpenWrt kprobe kernel module source
  crit: hostile
  conf: 0.95
  for: [c, cpp]
  all:
  - id: openwrt-kprobe-registration
  - id: kprobe-execve-target
  any:
  - id: micro-behaviors/os/kernel/module::linux-module-init-macro
  - id: micro-behaviors/os/kernel/module::linux-module-init-symbol
  - id: micro-behaviors/os/syscall/invoke::kernel-module-include-detect
  needs: 1
- id: openwrt-kprobe-kmod-load
  desc: OpenWrt kprobe kernel module loading
  crit: hostile
  conf: 0.96
  scope: outer
  all:
  - id: openwrt-temp-kmod-path
  - id: openwrt-kprobe-registration
  - id: kprobe-execve-target
  any:
  - id: micro-behaviors/os/kernel/module::linux-kmod-load
  - id: micro-behaviors/os/kernel/module::linux-kbuild-module-build
  - id: openwrt-kmod-build-command
  - id: micro-behaviors/os/syscall/invoke::kernel-module-include-detect
  needs: 1
- id: openwrt-python-kprobe-cred-kmod
  desc: OpenWrt Python-generated kprobe credential module
  crit: hostile
  conf: 0.97
  for: [python]
  all:
  - id: openwrt-kprobe-registration
  - id: openwrt-prepare-kernel-cred-string
  any:
  - id: micro-behaviors/os/kernel/module::insmod-cmd
  - id: micro-behaviors/os/kernel/module::modprobe-cmd
  - id: openwrt-kmod-build-command
  - id: micro-behaviors/os/syscall/invoke::kernel-module-include-detect
  needs: 2
