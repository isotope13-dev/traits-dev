defaults:
  platforms: [openbsd, bsd, unix]
  for: [perl]
  attack: T1547.006

traits:
  - id: perl-openbsd-kldload
    desc: Perl OpenBSD kldload use
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: kldload $module_path

  - id: perl-hidden-kernel-module
    desc: Perl hidden kernel module
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.cache/.backdoor.ko

composite_rules:
  - id: perl-openbsd-hidden-kmod-load
    desc: Perl hidden kmod load
    crit: hostile
    conf: 0.98
    all:
      - id: perl-openbsd-kldload
      - id: perl-hidden-kernel-module
