defaults:
  mbc: E1055
  attack: T1055
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: lsass-target
    desc: lsass.exe target reference
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)lsass\.exe
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - type: metrics
          field: binary.import_count
          min: 100
  - id: winlogon-target
    desc: winlogon.exe target reference
    crit: component
    conf: 0.75
    if:
      type: text
      regex: (?i)winlogon\.exe
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: csrss-target
    desc: csrss.exe target reference
    crit: component
    conf: 0.75
    if:
      type: text
      regex: (?i)csrss\.exe
    unless:
      - type: text
        substr: DXGPROCESS for CSRSS.exe
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: services-target
    desc: services.exe target reference
    crit: component
    conf: 0.75
    if:
      type: text
      regex: (?i)services\.exe
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
composite_rules:
  - id: privileged-target
    desc: References a privileged system process
    crit: component
    conf: 0.8
    any:
      - id: objectives/evasion/process/injection/hollowing::svchost-target
      - id: winlogon-target
      - id: csrss-target
      - id: services-target
  - id: inject-privileged-process
    desc: Process injection targeting privileged process
    crit: hostile
    conf: 0.95
    all:
      - id: privileged-target
      - id: micro-behaviors/process/inject/dll::create-remote-thread
    any:
      - id: micro-behaviors/process/inject/dll::write-process-memory
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
    unless:
      - id: well-known/app/drivers::nvidia-streamer-rxcore
      - id: well-known/tool/reverse-engineering/scyllahide::reverse-engineering-tool
  - id: hollow-privileged-process
    desc: Process hollowing of privileged process
    crit: hostile
    conf: 0.95
    all:
      - id: privileged-target
      - id: objectives/evasion/process/injection/hollowing::hollowing-primitives
  - id: debug-privilege-injection
    desc: Debug privilege with process injection
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/privilege-escalation/token-manipulation::dangerous-privilege-name
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
      - id: micro-behaviors/process/inject/dll::create-remote-thread
    any:
      - id: micro-behaviors/process/inject/dll::write-process-memory
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex

    unless:
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/build/openra::openra-system-library-helper
      - id: metadata/binary/symbols/plugin::debugger-plugin-export
      - id: well-known/tool/reverse-engineering/scyllahide::reverse-engineering-tool
      - id: well-known/app/installer::openra-installer
