# Process Injection for Privilege Escalation
# MBC: E1055 (Process Injection)
# ATT&CK: T1055 (Process Injection)
#
# Process injection becomes a privilege escalation technique when the target
# process runs with higher privileges. Injecting into SYSTEM-level processes
# (svchost, lsass, winlogon, csrss) grants attacker code those privileges.
# General injection techniques are in objectives/evasion/process/injection/.
# These composites specifically detect injection targeting privileged processes.
defaults:
  mbc: "E1055"
  attack: "T1055"
  platforms: [windows]
  for: [pe, dll]
traits:
  # === Privileged process targets ===
  - id: lsass-target
    desc: lsass.exe target reference
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(?i)lsass\.exe'
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - type: metrics
          field: binary.import_count
          min: 100
  - id: winlogon-target
    desc: winlogon.exe target reference
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: '(?i)winlogon\.exe'
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: csrss-target
    desc: csrss.exe target reference
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: '(?i)csrss\.exe'
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: services-target
    desc: services.exe target reference
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: '(?i)services\.exe'
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
composite_rules:
  # Privileged process target set
  - id: privileged-target
    desc: References a privileged system process
    crit: notable
    conf: 0.8
    any:
      - id: objectives/evasion/process/injection::svchost-target
      - id: lsass-target
      - id: winlogon-target
      - id: csrss-target
      - id: services-target
  # Injection APIs + privileged target = privilege escalation
  - id: inject-privileged-process
    desc: Process injection targeting privileged process
    crit: hostile
    conf: 0.95
    all:
      - id: privileged-target
    any:
      - id: micro-behaviors/process/inject/dll::write-process-memory
      - id: micro-behaviors/process/inject/dll::create-remote-thread
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
  # Hollowing + privileged target = privesc via hollowing
  - id: hollow-privileged-process
    desc: Process hollowing of privileged process
    crit: hostile
    conf: 0.95
    all:
      - id: privileged-target
      - id: objectives/evasion/process/injection::hollowing-primitives
  # SeDebugPrivilege + injection = targeting cross-privilege-boundary
  - id: debug-privilege-injection
    desc: Debug privilege with process injection
    crit: hostile
    conf: 0.92
    all:
      - id: micro-behaviors/os/privilege/escalation::dangerous-privilege-name
      - id: micro-behaviors/os/privilege/escalation::adjust-token-privileges
    any:
      - id: micro-behaviors/process/inject/dll::write-process-memory
      - id: micro-behaviors/process/inject/dll::create-remote-thread
