defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: duplicate-token-basic
    desc: Create duplicate of access token
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: DuplicateToken
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/vendor/bitdefender::version-resource-product
      - id: metadata/signed/developer::vmware
  - id: duplicate-token
    desc: Create extended duplicate of access token
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: DuplicateTokenEx
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/vendor/bitdefender::version-resource-product
  - id: dangerous-privilege-name
    desc: High-risk token privilege name
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Se(Debug|Tcb|AssignPrimaryToken|Impersonate)Privilege
  - id: runas-word
    desc: runas elevation verb
    crit: component
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      word: runas
  - id: lpverb-field
    desc: lpVerb field for ShellExecute
    crit: component
    conf: 0.85
    if:
      type: text
      exact: lpVerb
  - id: shell-execute-call
    desc: ShellExecute API call
    crit: component
    conf: 0.85
    if:
      type: text
      word: ShellExecute
  - id: shell-executeex-call
    desc: ShellExecuteEx API call
    crit: component
    conf: 0.85
    if:
      type: text
      word: ShellExecuteEx
  - id: wts-query-user-token-symbol
    desc: WTS session user token query
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: WTSQueryUserToken
composite_rules:
  - id: runas-verb
    desc: ShellExecute or Start-Process runas elevation
    crit: notable
    conf: 0.9
    all:
      - id: runas-word
    any:
      - id: lpverb-field
      - id: shell-execute-call
      - id: shell-executeex-call
      - id: micro-behaviors/process/create::start-process-dup
  - id: dynamic-token-privilege-chain
    desc: Dynamic token privilege adjustment chain
    crit: notable
    conf: 0.88
    attack: T1134.001
    all:
      - id: micro-behaviors/os/privilege/token::open-process-token
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
    any:
      - id: micro-behaviors/os/privilege/token::lookup-privilege-value
      - id: dangerous-privilege-name
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
    unless:
      - type: trait
        id: metadata/vendor/microsoft-taskkill::taskkill-marker
      - type: trait
        id: metadata/binary/installer/script::nsis
      - type: trait
        id: micro-behaviors/os/privilege/token::nsis7z-dll-basename
      - type: trait
        id: metadata/vendor/microsoft::advanced-inf-setup-context
      - type: trait
        id: metadata/signed/developer::vmware
      - type: trait
        id: metadata/vendor/armnf::marker
  - id: privilege-adjustment-indicator
    desc: Token privilege adjustment indicator
    crit: notable
    conf: 0.82
    any:
      - id: micro-behaviors/os/privilege/token::lookup-privilege-value
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
      - id: runas-verb
  - id: token-spawn-api-chain
    desc: User-token process spawn chain
    crit: notable
    conf: 0.84
    attack: T1134
    all:
      - id: micro-behaviors/os/privilege/token::open-process-token
      - id: duplicate-token
    any:
      - id: micro-behaviors/process/create/spawn::create-process-as-user
      - id: micro-behaviors/process/create/spawn::create-process-with-token
  - id: token-manipulation-cluster
    desc: Token access and duplication cluster
    crit: notable
    conf: 0.86
    attack: T1134
    all:
      - id: micro-behaviors/os/privilege/token::open-process-token
    needs: 2
    any:
      - id: duplicate-token
      - id: duplicate-token-basic
      - id: micro-behaviors/os/privilege/token::open-thread-token
      - id: micro-behaviors/os/privilege/token::get-token-information
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
    unless:
      - type: trait
        id: metadata/vendor/microsoft-taskkill::taskkill-marker
      - type: trait
        id: metadata/signed/developer::vmware
  - id: token-spawn-privilege-adjust
    desc: Token spawn with privilege manipulation
    crit: notable
    conf: 0.9
    attack: T1134
    all:
      - id: token-spawn-api-chain
      - id: privilege-adjustment-indicator
      - id: dangerous-privilege-name
    downgrade:
      any:
        - id: metadata/package::licensed
        - id: metadata/signed/platform::microsoft
        - id: metadata/lang/compiled::autoit-compiled-script
  - id: interactive-user-token-spawn-cluster
    desc: Interactive user token spawn cluster
    crit: suspicious
    conf: 0.93
    attack: T1134
    all:
      - id: token-spawn-api-chain
      - id: micro-behaviors/os/env/access::create-environment-block
      - id: privilege-adjustment-indicator
    any:
      - id: micro-behaviors/os/env/access::destroy-environment-block
      - id: micro-behaviors/os/privilege/token::open-thread-token
      - id: micro-behaviors/os/privilege/token::get-token-information
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/lang/compiled::autoit-compiled-script
    unless:
      - id: objectives/privilege-escalation/token-manipulation::wts-query-user-token-symbol
      - id: metadata/signed/developer::opera-norway-as
      - id: metadata/signed/developer::google-llc
      - id: metadata/signed/developer::adobe-inc.
