defaults:
  for:
  - pe
  - rust
  platforms:
  - windows
traits:
- id: duplicate-token-basic
  desc: Create duplicate of access token
  crit: notable
  conf: 0.75
  if:
    type: symbol
    exact: DuplicateToken
  unless:
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: metadata/binary/vendor::bitdefender-product-marker
  - id: metadata/signed/developer::vmware
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: duplicate-token
  desc: Create extended duplicate of access token
  crit: notable
  conf: 0.8
  if:
    type: symbol
    exact: DuplicateTokenEx
  unless:
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: metadata/binary/vendor::bitdefender-product-marker
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: dangerous-privilege-name
  desc: High-risk token privilege name
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: Se(Debug|Tcb|AssignPrimaryToken|Impersonate)Privilege
- id: lpverb-field
  desc: lpVerb field for ShellExecute
  crit: component
  conf: 0.85
  if:
    type: text
    word: lpVerb
- id: shell-execute-call
  desc: ShellExecute API call
  crit: component
  conf: 0.85
  if:
    type: text
    word: ShellExecute
- id: shell-executeex-call
  desc: ShellExecuteEx API call
  crit: component
  conf: 0.85
  if:
    type: text
    word: ShellExecuteEx
- id: wts-query-user-token-symbol
  desc: WTS session user token query
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: WTSQueryUserToken
- id: urlmon-dll-basename
  desc: URLMon DLL filename
  crit: component
  conf: 0.95
  if:
    type: path
    basename: true
    exact: urlmon.dll
- id: duplicate-token-basic-source
  desc: DuplicateToken API in Rust source
  for:
  - rust
  crit: notable
  conf: 0.88
  if:
    type: text
    word: DuplicateToken
- id: duplicate-token-source
  desc: DuplicateTokenEx API in Rust source
  for:
  - rust
  crit: notable
  conf: 0.9
  if:
    type: text
    word: DuplicateTokenEx
- id: token-impersonation-module-source
  desc: Token impersonation command module in source
  crit: notable
  conf: 0.95
  for: [c, cpp]
  if:
    type: text
    substr: token manipulation and impersonation
- id: token-vault-steal-command-source
  desc: Token vault steal or impersonate command
  crit: notable
  conf: 0.94
  attack: T1134.001
  for: [c, cpp]
  if:
    type: text
    regex: steal token from specified process|impersonate stolen token
- id: token-credential-logon-command-source
  desc: Token creation from user credentials
  crit: notable
  conf: 0.94
  attack: T1134.003
  for: [c, cpp]
  if:
    type: text
    regex: make token from user credentials|LOGON_NEW_CREDENTIALS
- id: token-privilege-command-source
  desc: Token privilege enable or enumeration command
  crit: notable
  conf: 0.9
  attack: T1134
  for: [c, cpp]
  if:
    type: text
    regex: list all privileges from current token|enable a privilege
- id: kerberos-ticket-command-source
  desc: Kerberos ticket abuse command set in source
  crit: notable
  conf: 0.94
  attack: T1550.003
  for: [c, cpp]
  if:
    type: text
    regex: list Kerberos tickets|purge a Kerberos ticket|import Kerberos ticket into a logon session
composite_rules:
- id: duplicate-token-any
  desc: Access token duplication API
  crit: notable
  conf: 0.84
  any:
  - id: duplicate-token
  - id: duplicate-token-source
- id: duplicate-token-basic-any
  desc: Basic access token duplication API
  crit: notable
  conf: 0.8
  any:
  - id: duplicate-token-basic
  - id: duplicate-token-basic-source
- id: runas-verb
  desc: ShellExecute or Start-Process runas elevation
  crit: notable
  conf: 0.9
  all:
  - id: micro-behaviors/os/privilege/elevation::runas-string
  any:
  - id: lpverb-field
  - id: shell-execute-call
  - id: shell-executeex-call
  - id: micro-behaviors/process/create/start-process::start-process-dup
  unless:
  - id: dynamic-token-privilege-benign-context
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: dynamic-token-privilege-benign-context
  desc: Benign token privilege context
  crit: component
  conf: 0.8
  any:
  - id: well-known/tool/sysadmin/taskkill::taskkill-marker
  - id: metadata/binary/installer/script::nsis
  - id: micro-behaviors/os/privilege/token::nsis7z-dll-basename
  - id: well-known/lib/advanced-inf::advanced-inf-setup-context
  - id: metadata/package/quality/context::benign-token-privilege-context
  - id: metadata/binary/installer/family::known-benign-installer
  - id: well-known/app/drivers::nvidia-streamer-rxcore
  - id: well-known/tool/sysadmin/sandboxie::signed-sandboxie-component
- id: dynamic-token-privilege-chain
  desc: Dynamic token privilege adjustment chain
  crit: notable
  conf: 0.88
  attack: T1134.001
  all:
  - id: dangerous-privilege-name
  needs: 3
  any:
  - id: micro-behaviors/os/privilege/token
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: well-known/app/startallback::startallback-basename
  unless:
  - id: dynamic-token-privilege-benign-context
  - id: metadata/binary/metrics/threshold::many-exports-100
  - id: metadata/library/python-runtime::python-runtime
- id: privilege-adjustment-indicator
  desc: Token privilege adjustment indicator
  crit: component
  conf: 0.82
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
  any:
  - id: micro-behaviors/os/privilege/token::lookup-privilege-value-any
  - id: micro-behaviors/os/privilege/token::adjust-token-privileges-any
  - id: micro-behaviors/os/privilege/token::rtl-adjust-privilege
  - id: runas-verb
- id: direct-ntdll-privilege-adjustment
  desc: Direct ntdll privilege adjustment
  crit: suspicious
  conf: 0.9
  attack: T1134.001
  all:
  - id: micro-behaviors/os/privilege/token::rtl-adjust-privilege
  - id: micro-behaviors/os/syscall/invoke::ntdll-import
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
  unless:
  - id: dynamic-token-privilege-benign-context
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: token-spawn-api-chain
  desc: User-token process spawn chain
  crit: notable
  conf: 0.84
  attack: T1134
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-100
  all:
  - id: micro-behaviors/os/privilege/token::open-process-token-source
  - id: duplicate-token-source
  - id: micro-behaviors/process/create/spawn::create-process-with-token-source
- id: token-manipulation-cluster-benign-context
  desc: Benign token manipulation context
  crit: component
  conf: 0.86
  any:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: well-known/lib/windows-vault::windows-vaultcli-component
  - id: metadata/signed/developer::vmware
  - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: metadata/binary/installer/script::inno-setup
  - id: urlmon-dll-basename
- id: source-token-impersonation-suite
  desc: Source code implements stolen-token impersonation
  crit: suspicious
  conf: 0.95
  attack: T1134
  for: [c, cpp]
  all:
  - id: token-impersonation-module-source
  any:
  - id: token-vault-steal-command-source
  - id: token-credential-logon-command-source
  - id: token-privilege-command-source
  needs: 2
- id: source-token-and-kerberos-abuse-suite
  desc: Source code combines token abuse with Kerberos ticket actions
  crit: hostile
  conf: 0.97
  attack: T1134
  for: [c, cpp]
  all:
  - id: source-token-impersonation-suite
  - id: kerberos-ticket-command-source
- id: token-manipulation-cluster
  desc: Token access and duplication cluster
  crit: notable
  conf: 0.86
  attack: T1134
  all:
  - id: micro-behaviors/os/privilege/token::open-process-token-any
  needs: 2
  any:
  - id: duplicate-token-any
  - id: duplicate-token-basic-any
  - id: micro-behaviors/os/privilege/token::open-thread-token-any
  - id: micro-behaviors/os/privilege/token::get-token-information-any
  unless:
  - id: token-manipulation-cluster-benign-context
- id: token-spawn-privilege-adjust
  desc: Token spawn with privilege manipulation
  crit: notable
  conf: 0.9
  attack: T1134
  all:
  - id: token-spawn-api-chain
  - id: privilege-adjustment-indicator
  - id: dangerous-privilege-name
  downgrade:
    any:
    - id: metadata/package/license
    - id: metadata/signed/platform::microsoft
    - id: metadata/lang/compiled::autoit-compiled-script
- id: interactive-user-token-spawn-cluster
  desc: Interactive user token spawn cluster
  crit: suspicious
  conf: 0.93
  attack: T1134
  all:
  - id: token-spawn-api-chain
  - id: micro-behaviors/os/env/access::create-environment-block
  - id: privilege-adjustment-indicator
  any:
  - id: micro-behaviors/os/env/access::destroy-environment-block
  - id: micro-behaviors/os/privilege/token::open-thread-token-any
  - id: micro-behaviors/os/privilege/token::get-token-information-any
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft-windows
    - id: metadata/lang/compiled::autoit-compiled-script
  unless:
  - id: objectives/privilege-escalation/token-manipulation::wts-query-user-token-symbol
  - id: metadata/signed/developer::opera-norway-as
  - id: metadata/signed/developer::google-llc
  - id: metadata/signed/developer::adobe-inc.
  - id: well-known/tool/browser::chromium-browser-main
- id: system-token-theft-winlogon
  desc: SYSTEM token theft via winlogon
  crit: hostile
  conf: 0.97
  attack: T1134
  all:
  - id: token-spawn-api-chain
  - id: dynamic-token-privilege-chain
  - id: objectives/evasion/masquerade/process/name::winlogon-name
  - id: dangerous-privilege-name
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
