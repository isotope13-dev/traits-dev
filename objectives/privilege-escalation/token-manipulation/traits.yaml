defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: open-process-token
    desc: Open process access token
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: OpenProcessToken
    downgrade:
      any:
        - type: raw
          substr: ApiSet Stub DLL
  - id: lookup-privilege-value
    desc: Lookup privilege name to LUID
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: LookupPrivilegeValueW
    downgrade:
      any:
        - type: raw
          substr: ApiSet Stub DLL
  - id: adjust-token-privileges
    desc: Enable/disable privileges in access token
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: AdjustTokenPrivileges
    downgrade:
      any:
        - type: raw
          substr: ApiSet Stub DLL
  - id: open-thread-token
    desc: Open thread access token
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: OpenThreadToken
    downgrade:
      any:
        - type: raw
          substr: ApiSet Stub DLL
  - id: duplicate-token-basic
    desc: Create duplicate of access token
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: DuplicateToken
  - id: duplicate-token
    desc: Create extended duplicate of access token
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: DuplicateTokenEx
  - id: dangerous-privilege-name
    desc: High-risk token privilege name
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: Se(Debug|Tcb|AssignPrimaryToken|Impersonate)Privilege
  - id: runas-verb
    desc: ShellExecute runas verb for elevation
    crit: notable
    conf: 0.9
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    platforms:
      - windows
      - macos
      - linux
      - unix
      - android
      - ios
    if:
      type: string_value
      substr: runas
composite_rules:
  - id: dynamic-token-privilege-chain
    desc: Dynamic token privilege escalation chain
    crit: suspicious
    conf: 0.88
    attack: T1134.001
    all:
      - id: open-process-token
      - id: adjust-token-privileges
    any:
      - id: lookup-privilege-value
      - id: dangerous-privilege-name
  - id: privilege-adjustment-indicator
    desc: Token privilege adjustment indicator
    crit: notable
    conf: 0.82
    any:
      - id: lookup-privilege-value
      - id: adjust-token-privileges
      - id: runas-verb
  - id: token-spawn-api-chain
    desc: User-token process spawn chain
    crit: notable
    conf: 0.84
    attack: T1134
    all:
      - id: open-process-token
      - id: duplicate-token
      - id: micro-behaviors/process/create/spawn::create-process-as-user
  - id: token-manipulation-cluster
    desc: Token access and duplication cluster
    crit: suspicious
    conf: 0.86
    attack: T1134
    all:
      - id: open-process-token
    needs: 2
    any:
      - id: duplicate-token
      - id: duplicate-token-basic
      - id: open-thread-token
      - id: micro-behaviors/os/privilege::get-token-information
    downgrade:
      any:
        - type: raw
          substr: ApiSet Stub DLL
        - id: metadata/signed/platform::microsoft
  - id: token-spawn-privilege-adjust
    desc: Token spawn with privilege manipulation
    crit: suspicious
    conf: 0.9
    attack: T1134
    all:
      - id: token-spawn-api-chain
      - id: privilege-adjustment-indicator
      - id: dangerous-privilege-name
    downgrade:
      any:
        - id: micro-behaviors/os/env/access::create-environment-block
        - type: symbol
          exact: WTSQueryUserToken
