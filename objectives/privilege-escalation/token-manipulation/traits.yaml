defaults:
  for:
  - pe
  - dll
  - rust
  platforms:
  - windows
traits:
- id: duplicate-token-basic
  desc: Create duplicate of access token
  crit: notable
  conf: 0.75
  if:
    type: symbol
    exact: DuplicateToken
  unless:
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: metadata/binary/vendor::bitdefender-product-marker
  - id: metadata/signed/developer::vmware
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: duplicate-token
  desc: Create extended duplicate of access token
  crit: notable
  conf: 0.8
  if:
    type: symbol
    exact: DuplicateTokenEx
  unless:
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: metadata/binary/vendor::bitdefender-product-marker
  - id: metadata/binary/metrics/threshold::many-exports-100
- id: lpverb-field
  desc: lpVerb field for ShellExecute
  crit: component
  conf: 0.85
  if:
    type: text
    word: lpVerb
- id: shell-execute-call
  desc: ShellExecute API call
  crit: component
  conf: 0.85
  if:
    type: text
    word: ShellExecute
- id: shell-executeex-call
  desc: ShellExecuteEx API call
  crit: component
  conf: 0.85
  if:
    type: text
    word: ShellExecuteEx
- id: wts-query-user-token-symbol
  desc: WTS session user token query
  crit: notable
  conf: 0.9
  if:
    type: symbol
    exact: WTSQueryUserToken
- id: urlmon-dll-basename
  desc: URLMon DLL filename
  crit: notable
  conf: 0.95
  if:
    type: path
    basename: true
    exact: urlmon.dll
- id: duplicate-token-basic-source
  desc: DuplicateToken API in Rust source
  for:
  - rust
  crit: notable
  conf: 0.88
  if:
    type: text
    word: DuplicateToken
- id: duplicate-token-source
  desc: DuplicateTokenEx API in Rust source
  for:
  - rust
  crit: notable
  conf: 0.9
  if:
    type: text
    word: DuplicateTokenEx
- id: token-impersonation-module-source
  desc: Token impersonation command module in source
  crit: notable
  conf: 0.95
  for: [c, cpp]
  if:
    type: text
    substr: token manipulation and impersonation
- id: token-vault-steal-command-source
  desc: Token vault steal or impersonate command
  crit: notable
  conf: 0.94
  attack: T1134.001
  for: [c, cpp]
  if:
    type: text
    regex: steal token from specified process|impersonate stolen token
- id: token-credential-logon-command-source
  desc: Token creation from user credentials
  crit: notable
  conf: 0.94
  attack: T1134.003
  for: [c, cpp]
  if:
    type: text
    regex: make token from user credentials|LOGON_NEW_CREDENTIALS
- id: token-privilege-command-source
  desc: Token privilege enable or enumeration command
  crit: notable
  conf: 0.9
  attack: T1134
  for: [c, cpp]
  if:
    type: text
    regex: list all privileges from current token|enable a privilege
- id: kerberos-ticket-command-source
  desc: Kerberos ticket abuse command set in source
  crit: notable
  conf: 0.94
  attack: T1550.003
  for: [c, cpp]
  if:
    type: text
    regex: list Kerberos tickets|purge a Kerberos ticket|import Kerberos ticket into a logon session
composite_rules:
- id: privilege-adjusted-process-launch
  desc: Adjusts token privileges then launches a process
  crit: hostile
  conf: 0.96
  attack: T1134.001,T1106
  all:
  - id: micro-behaviors/os/privilege/token::open-process-token
  - id: micro-behaviors/os/privilege/token::lookup-privilege-value
  - id: micro-behaviors/os/privilege/token::adjust-token-privileges
  - id: micro-behaviors/os/privilege/token::high-risk-privilege-name
  any:
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/process/create/exec::shell-execute
  - id: micro-behaviors/process/create/shell/spawn::win-shellexecute
  needs: 1
  unless:
  - id: metadata/signed/platform/
  - id: well-known/tool/sysadmin/
  # NativeAOT statically links the .NET runtime, whose startup/import surface
  # contains token-adjustment and process-launch APIs plus privilege strings.
  # Keep the hostile chain for ordinary PE code, but do not convict a
  # recognizable NativeAOT runtime solely on those shared implementation
  # details.
  - id: metadata/lang/compiler/aot

- id: token-impersonation-assisted-process-injection
  desc: Process-token impersonation combined with targeted remote injection
  crit: hostile
  conf: 0.99
  attack: T1134.001,T1055,T1057
  mbc: B0033
  all:
  - id: micro-behaviors/os/privilege/token::dynamic-process-token-impersonation
  - id: micro-behaviors/process/enumerate/snapshot::dynamic-toolhelp-process-traversal
  - id: objectives/evasion/process/injection/memory::process-inject-api
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/leaf::microsoft-corporation
  - id: well-known/tool/reverse-engineering/
  - id: well-known/tool/sysadmin/

- id: packed-anti-debug-token-adjustment
  desc: Packed PE adjusts token privileges while performing anti-debug loader setup
  crit: hostile
  conf: 0.97
  attack: T1134.001,T1027,T1622
  all:
  - id: micro-behaviors/os/privilege/token::lookup-privilege-value-any
  - id: micro-behaviors/os/privilege/token::adjust-token-privileges-any
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: objectives/anti-static/pack/runtime::unpacking-api-pattern
  - id: objectives/anti-static/obfuscation/payload/section::large-high-entropy-gfx-section
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: well-known/tool/sysadmin/

- id: anti-analysis-token-manipulation-suite
  desc: Elevated anti-analysis token manipulation suite
  crit: hostile
  conf: 0.98
  attack: T1134,T1622
  all:
  - id: duplicate-token
  - id: micro-behaviors/os/privilege/token::high-risk-privilege-name
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: objectives/anti-analysis/sandbox-detect/suite::named-native-anti-analysis-check-cluster

