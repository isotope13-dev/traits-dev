defaults:
  platforms: [windows]
  for: [java, class, jar]
traits:
  - id: java-lsass-process-reference
    desc: Java references LSASS process
    crit: suspicious
    conf: 0.9
    attack: T1003.001
    if:
      type: text
      regex: '(?i)\blsass\.exe\b'
  - id: java-rtl-adjust-privilege
    desc: Java calls RtlAdjustPrivilege
    crit: suspicious
    conf: 0.92
    attack: T1134.001
    if:
      type: text
      substr: RtlAdjustPrivilege
  - id: java-duplicate-token-api
    desc: Java uses token duplication API
    crit: suspicious
    conf: 0.9
    attack: T1134
    if:
      type: text
      regex: 'DuplicateToken(Ex)?'
    unless:
      - id: well-known/lib/jna
  - id: java-impersonate-user-api
    desc: Java impersonates logged-on user
    crit: suspicious
    conf: 0.9
    attack: T1134
    if:
      type: text
      substr: ImpersonateLoggedOnUser
    unless:
      - id: well-known/lib/jna
  - id: java-runas-ppl-registry
    desc: Java checks RunAsPPL registry
    crit: suspicious
    conf: 0.9
    attack: T1003.001
    if:
      type: text
      substr: RunAsPPL
composite_rules:
  - id: java-lsass-token-impersonation
    desc: Java LSASS token impersonation chain
    crit: hostile
    conf: 0.98
    attack: T1134
    all:
      - id: java-lsass-process-reference
    needs: 2
    any:
      - id: java-rtl-adjust-privilege
      - id: java-duplicate-token-api
      - id: java-impersonate-user-api
      - id: java-runas-ppl-registry
