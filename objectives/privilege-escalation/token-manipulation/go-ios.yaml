defaults:
  platforms: [ios]
  for: [go]
  attack: T1134

traits:
  - id: go-jwt-none-algorithm
    desc: Go creates JWT none algorithm
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '"alg"\s*:\s*"none"|none-algorithm JWT'

  - id: go-oauth-token-forgery
    desc: Go attempts OAuth token forgery
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'grant_type|forged-jwt|oauth_forgery'

composite_rules:
  - id: go-ios-token-manipulation
    desc: Go iOS token manipulation
    crit: hostile
    conf: 0.98
    near_bytes: 256
    all:
      - id: go-jwt-none-algorithm
      - id: go-oauth-token-forgery
