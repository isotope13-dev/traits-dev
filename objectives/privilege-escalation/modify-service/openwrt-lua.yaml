defaults:
  platforms: [openwrt]
  for: [lua]
  attack: T1543
traits:
  - id: lua-openwrt-backdoor-init
    desc: Lua OpenWrt backdoor init script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/init\.d/backdoor|backdoor_service'
  - id: lua-openwrt-dropbear-backdoor
    desc: Lua OpenWrt dropbear backdoor
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "config dropbear 'backdoor'|RootLogin 'on'|Port '2222'"
composite_rules:
  - id: openwrt-lua-service-backdoor-escalation
    desc: OpenWrt Lua service backdoor escalation
    crit: hostile
    conf: 0.98
    all:
      - id: lua-openwrt-backdoor-init
    any:
      - id: lua-openwrt-dropbear-backdoor
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-setuid-system-binary
      - id: objectives/privilege-escalation/modify-service::init-script-hijack
    needs: 2
