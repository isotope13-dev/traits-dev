defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1543.002

traits:
  - id: python-systemd-dropin-override
    desc: Python systemd drop-in override
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.d[\s\S]{0,220}override\.conf'

  - id: python-service-capabilities
    desc: Python service capabilities
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'AmbientCapabilities=CAP_SYS_ADMIN[\s\S]{0,260}CapabilityBoundingSet='

  - id: python-service-ld-preload
    desc: Python service LD_PRELOAD
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Environment="LD_PRELOAD=/tmp/.cache/libhelper.so"

composite_rules:
  - id: python-systemd-service-escalation
    desc: Python systemd service escalation
    crit: hostile
    conf: 0.98
    all:
      - id: python-systemd-dropin-override
    any:
      - id: python-service-capabilities
      - id: python-service-ld-preload
    needs: 1

  - id: python-systemd-capability-preload
    desc: Python systemd cap preload
    crit: hostile
    conf: 0.98
    all:
      - id: python-service-capabilities
      - id: python-service-ld-preload
