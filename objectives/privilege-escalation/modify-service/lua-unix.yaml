defaults:
  platforms: [unix, fortios]
  for: [lua]
  attack: T1543.002

traits:
  - id: lua-sshd-weaken-config
    desc: Lua weakens SSHD config
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'PermitRootLogin yes[\s\S]{0,160}PasswordAuthentication yes'

  - id: lua-pam-permit-sshd
    desc: Lua appends pam_permit to sshd
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '/etc/pam\.d/sshd[\s\S]{0,260}pam_permit\.so'

  - id: lua-systemd-backdoor-service
    desc: Lua writes systemd backdoor service
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'backdoor-update\.service[\s\S]{0,360}ExecStart=.*?/dev/tcp/'
