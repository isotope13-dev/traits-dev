defaults:
  platforms: [panos, appliance, unix]
  for: [shell]
  attack: T1543

traits:
  - id: panos-candidate-service-inject
    desc: PAN-OS candidate service inject
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/candidate\.conf[\s\S]{0,220}set service \$_svc_name'

  - id: sshd-root-password-login-enable
    desc: SSH root password login enabled
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'PermitRootLogin yes[\s\S]{0,180}PasswordAuthentication yes'

  - id: pam-permit-login-rule
    desc: PAM permit login rule
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: auth sufficient pam_permit.so

composite_rules:
  - id: panos-shell-backdoor-service
    desc: PAN-OS shell backdoor service
    crit: hostile
    conf: 0.98
    all:
      - id: panos-candidate-service-inject
    any:
      - id: sshd-root-password-login-enable
      - id: pam-permit-login-rule
    needs: 1
