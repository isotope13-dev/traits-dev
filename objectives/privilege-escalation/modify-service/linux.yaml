# Modify Existing Service - Linux Privilege Escalation
# MBC: F0011 (Modify Existing Service)
# ATT&CK: T1543.002 (Create or Modify System Process: Systemd Service)
#
# Modifying an existing systemd service or init script to execute
# attacker-controlled code with root privileges.
# Atomic service path/config traits are in micro-behaviors/os/service/config/linux.yaml
defaults:
  mbc: "F0011"
  attack: "T1543.002"
  platforms: [unix]
traits:
- id: systemd-temp-exec-payload--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [shell, python]
  if:
    type: text
    substr: etc/systemd/system
  count_max: 1015971
- id: systemd-temp-exec-payload--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [shell, python]
  if:
    type: text
    substr: ExecStart
  count_max: 1015972
- id: systemd-temp-exec-payload--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [shell, python]
  if:
    type: text
    substr: service
  count_max: 1015974
- id: systemd-temp-exec-payload--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [shell, python]
  if:
    type: text
    substr: '1200'
  count_max: 1015976
- id: systemd-download-exec-payload--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [shell, python]
  if:
    type: text
    substr: etc/systemd/system
  count_max: 1015977
- id: systemd-download-exec-payload--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [shell, python]
  if:
    type: text
    substr: ExecStart
  count_max: 1015978
- id: systemd-download-exec-payload--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [shell, python]
  if:
    type: text
    substr: service
  count_max: 1015979
- id: systemd-download-exec-payload--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [shell, python]
  if:
    type: text
    substr: '1200'
  count_max: 1015980
- id: installer-uninstaller-basename
  desc: Project installer/uninstaller script basename
  crit: component
  conf: 0.95
  for: [shell]
  if:
    type: basename
    regex: '(?i)(uninstall|installer|install)\.sh$'
composite_rules:
  # Service path + daemon reload + systemctl: modifying system service state.
- id: systemd-service-modification
  desc: Systemd service modification and reload
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/os/service/config::systemd-service-path
  - id: micro-behaviors/os/service/config::daemon-reload
  any:
  - id: systemd-temp-exec-payload
  - id: systemd-download-exec-payload
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: objectives/anti-analysis/emulator-detect/heuristics::virtualization-manager-context
    - type: text
      substr: "docker.service"
  # Init script write + shell execution
- id: init-script-hijack
  desc: Init script modification with execution
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/os/service/config::init-script-path
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  unless:
  - id: objectives/persistence/system/init/boot::init-script-header
  - id: installer-uninstaller-basename
- id: systemd-temp-exec-payload
  desc: Systemd unit executes temp payload
  crit: suspicious
  conf: 0.85
  for: [shell, python]
  any:
  - id: systemd-temp-exec-payload--rx-1
  - id: systemd-temp-exec-payload--rx-2
  - id: micro-behaviors/fs/path/temp::dev-shm-hidden--rx-1
  - id: systemd-temp-exec-payload--rx-4
  - id: micro-behaviors/fs/path/temp::unix-var-temp-fragment
  - id: systemd-temp-exec-payload--rx-6
- id: systemd-download-exec-payload
  desc: Systemd unit downloads payload
  crit: suspicious
  conf: 0.85
  for: [shell, python]
  any:
  - id: systemd-download-exec-payload--rx-7
  - id: systemd-download-exec-payload--rx-8
  - id: systemd-download-exec-payload--rx-9
  - id: systemd-download-exec-payload--rx-10
  - id: micro-behaviors/communications/http/download/curl::curl-cmd
  - id: micro-behaviors/communications/http/download/curl::wget-cmd
