defaults:
  mbc: F0011
  attack: T1543.003
  platforms:
    - windows
traits:
  - id: sc-config-binpath
    desc: sc config with binpath modification
    crit: suspicious
    conf: 0.9
    for:
      - batch
      - powershell
      - pe
    if:
      type: text
      regex: (?i)sc(\.exe)?\s+config\s+\S+\s+binpath=
  - id: service-imagepath-reg
    desc: Service ImagePath registry modification
    crit: suspicious
    conf: 0.85
    for:
      - pe
      - dll
      - batch
      - powershell
    if:
      type: text
      regex: (?i)SYSTEM\\\\CurrentControlSet\\\\Services\\\\.{1,50}\\\\ImagePath
  - id: sc-failure-command
    desc: sc failure with command execution
    crit: suspicious
    conf: 0.9
    for:
      - batch
      - powershell
      - pe
    if:
      type: text
      regex: (?i)sc(\.exe)?\s+failure\s+\S+\s+[^\n]{0,60}command=
composite_rules:
  - id: known-service-reconfig-signer
    desc: Known benign service reconfig signer
    crit: component
    conf: 0.8
    any:
      - id: metadata/signed/developer::python-software-foundation
      - id: metadata/signed/developer::epic-games-inc.
      - id: metadata/signed/developer::paradox-interactive-ab-publ
      - id: metadata/signed/developer::wix-toolset-.net-foundation
      - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
      - id: metadata/signed/developer::google-llc
      - id: metadata/signed/developer::broadcom-inc
      - id: metadata/signed/developer::iobit-co.
  - id: api-service-reconfig
    desc: Service reconfiguration with privilege indicators
    crit: notable
    conf: 0.9
    unless:
      - id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
      - id: objectives/privilege-escalation/modify-service/
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: metadata/binary/vendor::bitdefender-product-marker
    all:
      - id: micro-behaviors/os/service/control::change-service-config
      - id: micro-behaviors/os/service/control::open-service
    any:
      - id: objectives/privilege-escalation/token-manipulation::dangerous-privilege-name
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/signed/platform::intel-corporation
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
  - id: sc-config-start-chain
    desc: Service binary path change then start
    crit: suspicious
    conf: 0.92
    for:
      - batch
      - powershell
    all:
      - id: sc-config-binpath
    any:
      - id: micro-behaviors/os/service/control::sc-start-timeout
      - id: micro-behaviors/os/service/control::service-control
  - id: service-imagepath-hijack
    desc: Service ImagePath registry hijack
    crit: hostile
    conf: 0.95
    all:
      - id: service-imagepath-reg
    any:
      - id: micro-behaviors/process/create/shell/invoke::cmd-exe
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
