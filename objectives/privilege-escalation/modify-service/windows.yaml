defaults:
  mbc: F0011
  attack: T1543.003
  platforms:
    - windows
traits:
  - id: sc-config-binpath
    desc: sc config with binpath modification
    crit: suspicious
    conf: 0.9
    for:
      - batch
      - powershell
      - pe
    if:
      type: text
      regex: (?i)sc(\.exe)?\s+config\s+\S+\s+binpath=
  - id: service-imagepath-reg
    desc: Service ImagePath registry modification
    crit: suspicious
    conf: 0.85
    for:
      - pe
      - batch
      - powershell
    if:
      type: text
      regex: (?i)SYSTEM\\\\CurrentControlSet\\\\Services\\\\.{1,50}\\\\ImagePath
  - id: sc-failure-command
    desc: sc failure with command execution
    crit: suspicious
    conf: 0.9
    for:
      - batch
      - powershell
      - pe
    if:
      type: text
      regex: (?i)sc(\.exe)?\s+failure\s+\S+\s+[^\n]{0,60}command=
composite_rules:
  - id: api-service-reconfig
    desc: Service reconfiguration with privilege indicators
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/os/service/control::change-service-config
      - id: micro-behaviors/os/service/control::open-service
    any:
      - id: objectives/privilege-escalation/token-manipulation::dangerous-privilege-name
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - id: metadata/signed/platform::adobe
        - id: metadata/signed/platform::adobe-systems
        - id: metadata/signed/platform::nvidia-corporation
  - id: sc-config-start-chain
    desc: Service binary path change then start
    crit: suspicious
    conf: 0.92
    for:
      - batch
      - powershell
    all:
      - id: sc-config-binpath
    any:
      - id: micro-behaviors/os/service/control::sc-start-timeout
      - id: micro-behaviors/os/service/control::service-control
  - id: service-imagepath-hijack
    desc: Service ImagePath registry hijack
    crit: hostile
    conf: 0.95
    all:
      - id: service-imagepath-reg
    any:
      - id: micro-behaviors/process/create/shell::cmd-exe
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
