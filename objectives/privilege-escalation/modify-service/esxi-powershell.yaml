defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1562.007

traits:
  - id: powershell-start-vmhostservice
    desc: PowerShell starts VMHost service
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Start-VMHostService

  - id: powershell-vmhostservice-policy-on
    desc: PowerShell VMHost service on
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Set-VMHostService[\s\S]{0,140}-Policy\s+["'']?on'

  - id: powershell-esxi-tsm-services
    desc: PowerShell ESXi TSM services
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)TSM(-SSH)?[\s\S]{0,100}VMHostService|VMHostService[\s\S]{0,100}TSM(-SSH)?'

composite_rules:
  - id: powershell-esxi-service-enablement
    desc: PowerShell ESXi service enablement
    crit: hostile
    conf: 0.98
    all:
      - id: powershell-start-vmhostservice
      - id: powershell-vmhostservice-policy-on
      - id: powershell-esxi-tsm-services
