defaults:
  platforms: [netscaler, appliance, unix]
  for: [java, class, jar]
  attack: T1543

traits:
  - id: java-netscaler-acl-paths
    desc: Java NetScaler ACL paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/netscaler/(flash/nsconfig|etc)|/var/netscaler'

  - id: java-world-readable-change
    desc: Java world-readable change
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: setReadable(true, false)

  - id: java-world-executable-change
    desc: Java world-exec change
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: setExecutable(true, false)

  - id: jvm-netscaler-acl-path
    desc: JVM NetScaler ACL path
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: text
      substr: /netscaler/flash/nsconfig

  - id: jvm-setreadable-bytecode
    desc: JVM setReadable bytecode
    crit: suspicious
    conf: 0.92
    for: [class, jar]
    if:
      type: text
      substr: setReadable

  - id: jvm-setexecutable-bytecode
    desc: JVM setExecutable bytecode
    crit: suspicious
    conf: 0.92
    for: [class, jar]
    if:
      type: text
      substr: setExecutable

composite_rules:
  - id: java-netscaler-acl-weakening
    desc: Java NetScaler ACL weakening
    crit: hostile
    conf: 0.98
    all:
      - id: java-netscaler-acl-paths
      - id: java-world-readable-change
    any:
      - id: java-world-executable-change

  - id: jvm-netscaler-acl-weakening
    desc: JVM NetScaler ACL weakening
    crit: hostile
    conf: 0.97
    for: [class, jar]
    all:
      - id: jvm-netscaler-acl-path
      - id: jvm-setreadable-bytecode
    any:
      - id: jvm-setexecutable-bytecode
