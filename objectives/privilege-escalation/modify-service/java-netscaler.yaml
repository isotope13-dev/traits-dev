defaults:
  platforms: [netscaler, appliance, unix]
  for: [java, class, jar]
  attack: T1543

traits:
  - id: java-netscaler-acl-paths
    desc: Java NetScaler ACL paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/netscaler/(flash/nsconfig|etc)|/var/netscaler'

  - id: jvm-netscaler-acl-path
    desc: JVM NetScaler ACL path
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: text
      substr: /netscaler/flash/nsconfig

composite_rules:
  - id: java-netscaler-acl-weakening
    desc: Java NetScaler ACL weakening
    crit: hostile
    conf: 0.98
    all:
      - id: java-netscaler-acl-paths
      - id: micro-behaviors/fs/write/file/direct::java-world-readable-permission
    any:
      - id: micro-behaviors/fs/write/file/direct::java-world-executable-permission

  - id: jvm-netscaler-acl-weakening
    desc: JVM NetScaler ACL weakening
    crit: hostile
    conf: 0.97
    for: [class, jar]
    all:
      - id: jvm-netscaler-acl-path
      - id: micro-behaviors/fs/write/file/direct::jvm-file-setreadable-bytecode
    any:
      - id: micro-behaviors/fs/write/file/direct::jvm-file-setexecutable-bytecode
