defaults:
  platforms: [netscaler, appliance, unix]
  for: [scripts, binaries, go, java, kotlin, csharp, swift]
  attack: T1543

traits:
  - id: netscaler-nsroot-systemuser-api
    desc: NetScaler nsroot systemuser API
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: /nitro/v1/config/systemuser/nsroot

  - id: netscaler-nsroot-shell-field
    desc: NetScaler nsroot shell field
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(NSROOT|userType)[\s\S]{0,180}(shell|/bin/bash)'

  - id: netscaler-sudoers-nsroot
    desc: NetScaler nsroot sudoers change
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'nsroot.{0,80}(NOPASSWD|sudo)'

composite_rules:
  - id: netscaler-nsroot-shell-change
    desc: NetScaler nsroot shell change
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-nsroot-systemuser-api
      - id: netscaler-nsroot-shell-field

  - id: netscaler-nsroot-sudoers-change
    desc: NetScaler nsroot sudoers change
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-sudoers-nsroot
      - id: micro-behaviors/fs/path/config/privesc::etc-sudoers
