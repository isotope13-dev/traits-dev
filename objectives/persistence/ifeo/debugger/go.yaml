# Image File Execution Options (IFEO) Persistence
# Detects IFEO debugger hijacking for persistence/privilege escalation
# MBC: F0012 (Persistence)
# ATT&CK: T1546.012 (Image File Execution Options Injection)
defaults:
  mbc: "F0012"
  attack: "T1546.012"
  platforms: [windows]
traits:
  # IFEO registry path
  - id: ifeo-registry-path
    desc: IFEO registry path
    crit: component
    conf: 0.9
    for: [go, pe, vbs, powershell, batch]
    if:
      type: string
      regex: "Image File Execution Options|IFEO"
  - id: ifeo-full-path
    desc: Full IFEO registry key path
    crit: component
    conf: 0.95
    for: [go, pe]
    if:
      type: string
      regex: "SOFTWARE\\\\Microsoft\\\\Windows NT\\\\CurrentVersion\\\\Image File Execution Options"
  # Debugger value
  - id: ifeo-debugger-value
    desc: IFEO Debugger registry value
    crit: component
    conf: 0.9
    for: [go, pe, powershell]
    if:
      type: string
      exact: "Debugger"
  # Accessibility feature targets - atomic traits
  - id: ifeo-magnify
    desc: IFEO hijack of magnify.exe
    crit: suspicious
    conf: 0.95
    for: [go, pe]
    if:
      type: string
      regex: "IFEO.{0,50}magnify\\.exe|magnify\\.exe.{0,30}Debugger"
  - id: ifeo-sethc
    desc: IFEO hijack of sethc.exe (sticky keys)
    crit: suspicious
    conf: 0.95
    for: [go, pe]
    if:
      type: string
      regex: "IFEO.{0,50}sethc\\.exe|sethc\\.exe.{0,30}Debugger"
  - id: ifeo-utilman
    desc: IFEO hijack of utilman.exe
    crit: suspicious
    conf: 0.95
    for: [go, pe]
    if:
      type: string
      regex: "IFEO.{0,50}utilman\\.exe|utilman\\.exe.{0,30}Debugger"
  - id: ifeo-osk
    desc: IFEO hijack of osk.exe (on-screen keyboard)
    crit: suspicious
    conf: 0.95
    for: [go, pe]
    if:
      type: string
      regex: "IFEO.{0,50}osk\\.exe|osk\\.exe.{0,30}Debugger"
  - id: ifeo-narrator
    desc: IFEO hijack of narrator.exe
    crit: suspicious
    conf: 0.95
    for: [go, pe]
    if:
      type: string
      regex: "IFEO.{0,50}narrator\\.exe|narrator\\.exe.{0,30}Debugger"
  # Accessibility tools - atomic traits
  - id: magnify-exe
    desc: magnify.exe reference
    crit: notable
    conf: 0.75
    for: [go, pe]
    if:
      type: string
      word: "magnify"
  - id: sethc-exe
    desc: sethc.exe reference (sticky keys)
    crit: notable
    conf: 0.75
    for: [go, pe]
    if:
      type: string
      word: "sethc"
  - id: utilman-exe
    desc: utilman.exe reference
    crit: notable
    conf: 0.75
    for: [go, pe]
    if:
      type: string
      word: "utilman"
composite_rules:
  # Helper: IFEO accessibility targets
  - id: ifeo-accessibility-target
    desc: IFEO accessibility tool target
    crit: suspicious
    conf: 0.9
    for: [go, pe]
    any:
      - id: ifeo-magnify
      - id: ifeo-sethc
      - id: ifeo-utilman
      - id: ifeo-osk
      - id: ifeo-narrator
  # IFEO debugger hijacking
  # Complexity: all(3) + for(1) = 4 >= 4 HOSTILE
  - id: ifeo-persistence
    desc: IFEO debugger persistence
    crit: hostile
    conf: 0.95
    for: [go, pe]
    all:
      - id: ifeo-full-path
      - id: ifeo-debugger-value
      - id: ifeo-accessibility-target
  # Accessibility feature abuse
  # Complexity: all(2) + for(1) = 3
  - id: accessibility-backdoor
    desc: Accessibility feature backdoor
    crit: suspicious
    conf: 0.9
    for: [go, pe]
    all:
      - id: ifeo-registry-path
      - id: ifeo-accessibility-target
