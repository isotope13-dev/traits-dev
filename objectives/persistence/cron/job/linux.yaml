defaults:
  attack: T1053.003
  mbc: B0028
  platforms: [unix, windows, macos]
  for: [elf, shell, python]
traits:
  - id: etc-cron-path
    desc: /etc/cron directory path (system cron
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: /etc/cron
  - id: var-spool-cron-path
    desc: /var/spool/cron directory path (user cron
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: /var/spool/cron
  - id: cron-d-path-dup
    desc: /etc/cron.d directory path (additional system
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: /etc/cron.d
composite_rules:
  - id: cron
    desc: Cron job persistence (command or
    crit: notable
    conf: 0.66
    any:
      - id: micro-behaviors/os/schedule/cron/keywords::crontab-keyword
      - id: etc-cron-path
      - id: var-spool-cron-path
      - id: objectives/persistence/cron/job::cron-d-path-dup
