defaults:
  for:
    - all
  attack: T1053.003
traits:
  - id: crontab-dash
    desc: crontab command with dash
    crit: notable
    conf: 0.6
    if:
      type: string
      substr: crontab -
composite_rules:
  - id: cron-paths-comp
    desc: Cron file paths
    crit: notable
    any:
      - id: objectives/persistence/cron/job::cron-d-path-dup
      - id: objectives/persistence/cron/job::var-spool-cron-path
      - id: crontab-dash
  - id: cron-keywords
    desc: Cron-related keywords
    crit: notable
    any:
      - id: micro-behaviors/os/schedule/cron/keywords::crontab-keyword
      - id: objectives/persistence/cron/job::etc-cron-path
  - id: cron-with-base64
    desc: Cron with base64 decode
    crit: notable
    all:
      - id: cron-keywords
      - id: micro-behaviors/data/encode/base64::base64-decode-shell
  - id: cron-with-hidden
    desc: Cron with hidden file paths
    crit: notable
    all:
      - id: cron-keywords
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
  - id: cron-with-download
    desc: Cron with download cradle
    crit: suspicious
    conf: 0.85
    all:
      - id: cron-keywords
    any:
      - id: objectives/command-and-control/network/client::curl-s-flag
      - id: objectives/command-and-control/network/client::wget-q-flag
  - id: cron-hidden
    desc: Hidden or obfuscated cron entries
    crit: suspicious
    conf: 0.8
    any:
      - id: cron-with-base64
      - id: cron-with-hidden
