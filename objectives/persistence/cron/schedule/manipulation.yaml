# Crontab Manipulation Patterns
# ATT&CK: T1053.003
defaults:
  for: [all]
  attack: "T1053.003"
traits:
  # Crontab commands
  - id: crontab-list-flag
    desc: crontab -l list command
    crit: notable
    conf: 0.6
    if:
      type: string
      regex: "\\bcrontab\\s+-l\\b"
  - id: pipe-crontab
    desc: Pipe to crontab stdin
    crit: notable
    conf: 0.6
    if:
      type: string
      regex: "\\|\\s*crontab\\s+-"
  - id: echo-reboot
    desc: echo @reboot cron command
    crit: component
    conf: 0.5
    for: [shell, python, ruby, perl, php, javascript]
    if:
      type: string
      regex: (?i)\becho\s+["']?@reboot\s+
  - id: echo-cron-fields
    desc: echo cron numeric schedule command
    crit: component
    conf: 0.5
    for: [shell, python, ruby, perl, php, javascript]
    if:
      type: string
      regex: \becho\s+["']?([0-9\*/,\-]+\s+){4}[0-9\*/,\-]+\s+
  - id: grep-v
    desc: grep -v (inverse match/filter)
    crit: notable
    conf: 0.6
    if:
      type: string
      regex: "grep\\s+-v"
composite_rules:
  - id: echo-command
    desc: echo cron schedule command
    crit: component
    conf: 0.5
    any:
      - id: echo-reboot
      - id: echo-cron-fields
  # Blind append pattern: echo | crontab -
  - id: blind_append
    desc: Appends to crontab by piping
    crit: suspicious
    conf: 0.9
    all:
      - id: crontab-list-flag
      - id: echo-command
      - id: pipe-crontab
  # Filtered rewrite: crontab -l | grep -v | crontab -
  - id: filtered_rewrite
    desc: Rewrites crontab by filtering output
    crit: suspicious
    conf: 0.9
    all:
      - id: crontab-list-flag
      - id: grep-v
      - id: pipe-crontab
