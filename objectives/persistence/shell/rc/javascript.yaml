# Shell Configuration - JavaScript/Node.js
# ATT&CK: T1546.004 (Event Triggered Execution: Unix Shell Configuration Modification)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  # === Shell profile source atomic indicators ===
  - id: source-bashrc
    desc: source .bashrc
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: 'source\s+\.bashrc'
  - id: source-shell-profile
    desc: source .bash_profile
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: 'source\s+\.bash_profile'
  - id: source-profile
    desc: source .profile
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: 'source\s+\.profile'
  - id: source-zshrc
    desc: source .zshrc
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: 'source\s+\.zshrc'
  - id: js-path-manipulation
    desc: Manually manipulates PATH environment variable
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: 'process\.env\.PATH\s*='
composite_rules:
  - id: js-source-profile
    desc: Sources shell profile files to
    crit: suspicious
    conf: 0.85
    attack: "T1546.004"
    any:
      - id: source-bashrc
      - id: source-shell-profile
      - id: source-profile
      - id: source-zshrc
