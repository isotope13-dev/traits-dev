# Legacy Windows boot-script persistence from source code
defaults:
  platforms: [windows]
composite_rules:
  - id: autoexec-vbs-persistence
    desc: AUTOEXEC.BAT launches dropped VBS
    crit: hostile
    conf: 0.97
    attack: T1547.014
    all:
      - id: micro-behaviors/fs/path/system::legacy-boot-config
      - id: micro-behaviors/fs/read/self::append-call
    any:
      - id: well-known/malware/worm/serab::sera-vbs-path
      - id: well-known/malware/worm/serab::autoexec-launch-line
