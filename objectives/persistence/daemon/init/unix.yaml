defaults:
  platforms: [unix, linux, macos]
# Unix Daemon Persistence
# Detects daemon/background process behavior common in malware
# ATT&CK: T1543 (Create or Modify System Process)
traits:
  # === daemon-fork atomic indicators ===
  - id: fork-symbol
    desc: fork syscall symbol
    crit: baseline
    conf: 0.3
    for: [elf, macho]
    platforms: [unix, macos]
    if:
      type: symbol
      exact: "fork"
  # NOTE: setsid is commonly used by legitimate system tools, shells, and
  # terminal multiplexers. Alone it's just process group management.
  # setsid pattern moved to micro-behaviors/process/create/setsid::import
  - id: daemon-umask
    desc: "umask syscall (daemon initialization)"
    crit: notable
    conf: 0.4
    for: [elf, macho]
    platforms: [unix, macos]
    if:
      type: symbol
      exact: "umask"
  # NOTE: chdir is a basic filesystem operation used by countless legitimate tools.
  # Too common to be notable.
  - id: daemon-chdir-root
    # NOTE: /dev/null is extremely common in legitimate software - build tools,
    # compilers, system utilities all use it for I/O redirection. Too broad to
    # be notable on its own.
    # Removed daemon-dev-null duplicate - use micro-behaviors/fs/path/device::dev-null

    desc: "Change directory to root (daemon"
    crit: baseline
    conf: 0.2
    for: [elf, macho]
    platforms: [unix, macos]
    if:
      type: symbol
      exact: "chdir"
  # NOTE: Signal ignore patterns are common in many legitimate binaries
  # that need robust signal handling (shells, daemons, servers).
  - id: sig-ign-sighup-x64
    # daemon-proc-self removed - use micro-behaviors/fs/proc/info composite instead
    # (process-self-exe-path, process-self-status, process-self-cmdline)

    desc: SIGHUP signal ignore pattern (x86_64)
    crit: notable
    conf: 0.4
    for: [elf, macho]
    platforms: [unix, macos]
    size_max: 10485760
    if:
      type: hex
      section: ".text"
      pattern: "BF 01 00 00 00 BE 01 00 00 00"
  - id: sig-ign-sigpipe-x64
    desc: SIGPIPE signal ignore pattern (x86_64)
    crit: notable
    conf: 0.4
    for: [elf, macho]
    platforms: [unix, macos]
    if:
      type: hex
      section: ".text"
      pattern: "BF 0D 00 00 00 BE 01 00 00 00"
  # === sigchld-handler atomic indicators ===
  - id: sigchild-underscore
    desc: _sigchild string
    crit: notable
    conf: 0.5
    for: [elf, macho]
    platforms: [unix, macos]
    if:
      type: string
      substr: "_sigchild"
  - id: sigchld-handler-string
    desc: sigchld_handler string
    crit: notable
    conf: 0.5
    for: [elf, macho]
    platforms: [unix, macos]
    if:
      type: string
      substr: "sigchld_handler"
  - id: handle-sigchld-string
    desc: handle_sigchld string
    crit: notable
    conf: 0.5
    for: [elf, macho]
    platforms: [unix, macos]
    if:
      type: string
      substr: "handle_sigchld"
composite_rules:
  # NOTE: fork/daemon are basic process primitives used by many legitimate
  # system tools, servers, and build utilities. Downgraded to baseline.
  - id: daemon-fork
    desc: "Process forking for daemon behavior"
    crit: notable
    conf: 0.4
    attack: "T1543"
    for: [elf, macho]
    platforms: [unix, macos]
    any:
      - id: fork-symbol
      - id: micro-behaviors/process/fork/clone::daemon-dup
  # Signal function composite - references micro-behaviors/ instead of duplicating
  # NOTE: signal/sigaction are universal in C programs, not persistence indicators alone
  - id: signal-function
    desc: Signal handling function
    crit: notable
    conf: 0.2
    for: [elf, macho]
    platforms: [unix, macos]
    any:
      - id: micro-behaviors/os/signal/handler::signal
      - id: micro-behaviors/os/signal/handler::sigaction
  # NOTE: Signal ignore patterns are common in legitimate binaries.
  - id: sig-ign-pattern
    desc: Signal ignore byte pattern (x86_64)
    crit: notable
    conf: 0.4
    for: [elf, macho]
    platforms: [unix, macos]
    any:
      - id: sig-ign-sighup-x64
      - id: sig-ign-sigpipe-x64
  # Signal ignore for daemon (migrated from YARA)
  - id: signal-ignore-pattern
    desc: "Signal handler setup (daemon persistence"
    crit: notable
    conf: 0.3
    attack: "T1543"
    for: [elf, macho]
    platforms: [unix, macos]
    all:
      - id: signal-function
      - id: sig-ign-pattern
  - id: sigchld-handler
    desc: "Custom SIGCHLD handler (child process"
    crit: notable
    conf: 0.6
    attack: "T1543"
    for: [elf, macho]
    platforms: [unix, macos]
    any:
      - id: sigchild-underscore
      - id: sigchld-handler-string
      - id: handle-sigchld-string
  # NOTE: Daemon behavior is extremely common in legitimate software - system
  # services, build tools, compilers, servers, shells. The individual components
  # (/dev/null, fork, setsid) are universal primitives. Downgraded to baseline.
  # For truly malicious daemon activity, combine with C2, credential access,
  # or other hostile indicators in a separate composite.
  - id: full-daemon
    desc: "Full daemon behavior (fork +"
    crit: notable
    conf: 0.3
    attack: "T1543"
    mbc: "F0006"
    for: [elf]
    platforms: [linux]
    all:
      - id: micro-behaviors/fs/path/device::dev-null
    any:
      - id: daemon-fork
      - id: micro-behaviors/process/create/setsid::import
    downgrade:
      any:
        - id: metadata/lang/compiler::rust-binary
  # Stealthy daemon with process introspection
  - id: stealth-daemon
    desc: "Stealthy daemon (daemon + proc"
    crit: notable
    conf: 0.5
    attack: "T1543"
    mbc: "F0006"
    for: [elf]
    platforms: [linux]
    all:
      - id: micro-behaviors/fs/proc/info::process-self-exe-path
    any:
      - id: daemon-fork
      - id: micro-behaviors/process/create/setsid::import
    downgrade:
      any:
        - id: metadata/lang/compiler::rust-binary
  # Fork + system() + randomized timing = persistent daemon with randomized execution
  # Complexity: all(3) + for(1) = 4 (meets hostile threshold)
  - id: fork-random-exec-daemon
    desc: Forked daemon with randomized command execution
    crit: suspicious
    conf: 0.85
    attack: "T1543"
    for: [elf, macho, c, objective-c]
    all:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/shell::sleep-format-exec
      - id: micro-behaviors/os/random/crypto::seeded-random
  # macOS double-fork daemon pattern
  # This is the classic fork() -> setsid() -> fork() -> umask() -> chdir() pattern
  - id: macos-double-fork-daemon
    desc: "macOS double-fork daemon pattern (fork"
    crit: suspicious
    conf: 0.85
    attack: "T1543"
    mbc: "F0006"
    for: [macho]
    platforms: [macos]
    all:
      - id: fork-symbol
      - id: micro-behaviors/process/create/setsid::import
    any:
      - id: daemon-umask
      - id: daemon-chdir-root
    unless:
      # Go programs (e.g. minikube, Docker) routinely use fork+setsid+chdir to
      # create background daemon processes as a standard process management pattern.
      - id: metadata/lang/compiler::go-version-string
    downgrade:
      any:
        - id: metadata/apple::system-component
        - id: metadata/signed/platform::apple
  - id: macos-daemon-setup
    desc: macOS daemon setup sequence
    crit: suspicious
    conf: 0.88
    attack: "T1543"
    mbc: "F0006"
    for: [macho, dylib]
    platforms: [macos]
    all:
      - id: micro-behaviors/process/create/setsid::import
      - id: daemon-umask
      - id: daemon-chdir-root
    any:
      - id: micro-behaviors/process/create/direct::execve-with-fd-redirect-macos
      - id: micro-behaviors/process/create/direct::execve-import
    unless:
      # Go programs use fork+setsid+umask+chdir+execve as standard runtime primitives
      - id: metadata/lang/compiler::go-version-string
    downgrade:
      any:
        - id: metadata/apple::system-component
        - id: metadata/signed/platform::apple
  # GAP #8: Properly link fork + setsid as persistence mechanism
  # The combination of fork + setsid is the standard Unix daemon pattern
  # This is persistence, not just process management
  - id: unix-daemon-persistence
    desc: "Unix daemon persistence mechanism"
    crit: notable
    conf: 0.75
    attack: "T1543"
    mbc: "F0006"
    for: [elf, macho]
    platforms: [unix, macos]
    all:
      - id: daemon-fork
      - id: micro-behaviors/process/create/setsid::import
    downgrade:
      any:
        - id: metadata/format::many-imports
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: metadata/apple::system-component
        - id: metadata/signed/platform::apple
        - id: metadata/hardening::pledge
        - id: metadata/hardening::unveil
