defaults:
  platforms: [netscaler, appliance, unix]
  for: [c, elf]
  attack: T1053

traits:
  - id: native-hidden-service-path
    desc: Native hidden service path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.hidden_service

  - id: native-system-helper-path
    desc: Native system helper path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /var/tmp/.system_helper

  - id: native-hidden-service-chmod
    desc: Native hidden service chmod
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'chmod\(locations\[i\], 0755\)|chmod[^\n]{0,80}\.hidden_service'

composite_rules:
  - id: native-hidden-daemon-persistence
    desc: Native hidden daemon persistence
    crit: hostile
    conf: 0.98
    all:
      - id: native-hidden-service-path
      - id: native-system-helper-path
    any:
      - id: native-hidden-service-chmod
