defaults:
  platforms: [openbsd, bsd, unix]
  for: [csharp]
  attack: T1543

traits:
  - id: dotnet-setsid-import
    desc: .NET imports setsid
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: extern int setsid()

  - id: dotnet-detaches-session
    desc: .NET detaches process session
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: setsid();

  - id: dotnet-clears-working-dir
    desc: .NET clears working directory
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: chdir("/");

composite_rules:
  - id: dotnet-openbsd-daemon-detach
    desc: .NET OpenBSD daemon detach
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-setsid-import
      - id: dotnet-detaches-session
      - id: dotnet-clears-working-dir

