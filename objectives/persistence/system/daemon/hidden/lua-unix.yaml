defaults:
  platforms: [routeros, appliance, unix]
  for: [lua]
  attack: T1053.003

traits:
  - id: lua-writes-shell-loop-script
    desc: Lua writes shell loop script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'f:write\("#!/bin/sh\\n"\)[\s\S]{0,220}while true; do'

  - id: lua-chmod-temp-script
    desc: Lua chmods temp script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'script_path = "/tmp/[\s\S]{0,260}chmod \+x'

  - id: lua-nohup-background-script
    desc: Lua nohup background script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'nohup .{0,80}script_path.{0,80}&>/dev/null &'

  - id: lua-heartbeat-bot-id
    desc: Lua heartbeat bot id
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /heartbeat?bot_id=

composite_rules:
  - id: lua-temp-keepalive-daemon
    desc: Lua temp keepalive daemon
    crit: hostile
    conf: 0.98
    all:
      - id: lua-writes-shell-loop-script
      - id: lua-chmod-temp-script
      - id: lua-nohup-background-script
      - id: lua-heartbeat-bot-id
