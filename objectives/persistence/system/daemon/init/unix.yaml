defaults:
  platforms:
    - linux
    - macos
traits:
  # daemon-umask moved to micro-behaviors/fs/chmod/modify::umask
  - id: sig-ign-sighup-x64
    desc: SIGHUP signal ignore pattern (x86_64)
    crit: notable
    conf: 0.4
    for:
      - elf
      - macho
    size_max: 10485760
    if:
      type: hex
      section: .text
      pattern: BF 01 00 00 00 BE 01 00 00 00
  - id: sig-ign-sigpipe-x64
    desc: SIGPIPE signal ignore pattern (x86_64)
    crit: notable
    conf: 0.4
    for:
      - elf
      - macho
    if:
      type: hex
      section: .text
      pattern: BF 0D 00 00 00 BE 01 00 00 00
  - id: sigchild-underscore
    desc: _sigchild string
    crit: notable
    conf: 0.5
    for:
      - elf
      - macho
    if:
      type: text
      substr: _sigchild
  - id: sigchld-handler-string
    desc: sigchld_handler string
    crit: notable
    conf: 0.5
    for:
      - elf
      - macho
    if:
      type: text
      substr: sigchld_handler
  - id: handle-sigchld-string
    desc: handle_sigchld string
    crit: notable
    conf: 0.5
    for:
      - elf
      - macho
    if:
      type: text
      substr: handle_sigchld
composite_rules:
  - id: daemon-fork
    desc: Process forking for daemon behavior
    crit: notable
    conf: 0.4
    attack: T1543
    for:
      - elf
      - macho
    any:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/fork/clone::daemon-dup
  - id: signal-function
    desc: Signal handling function
    crit: notable
    conf: 0.2
    for:
      - elf
      - macho
    any:
      - id: micro-behaviors/os/signal/handler::signal
      - id: micro-behaviors/os/signal/handler::sigaction
  - id: sig-ign-pattern
    desc: Signal ignore byte pattern (x86_64)
    crit: notable
    conf: 0.4
    for:
      - elf
      - macho
    any:
      - id: sig-ign-sighup-x64
      - id: sig-ign-sigpipe-x64
  - id: signal-ignore-pattern
    desc: Signal handler setup (daemon persistence
    crit: notable
    conf: 0.3
    attack: T1543
    for:
      - elf
      - macho
    all:
      - id: signal-function
      - id: sig-ign-pattern
  - id: sigchld-handler
    desc: Custom SIGCHLD handler (child process
    crit: notable
    conf: 0.6
    attack: T1543
    for:
      - elf
      - macho
    any:
      - id: sigchild-underscore
      - id: sigchld-handler-string
      - id: handle-sigchld-string
  - id: full-daemon
    desc: Full daemon behavior (fork +
    crit: notable
    conf: 0.3
    attack: T1543
    mbc: F0006
    for:
      - elf
    platforms:
      - linux
    all:
      - id: micro-behaviors/fs/path/device::dev-null
    any:
      - id: daemon-fork
      - id: micro-behaviors/process/create/setsid::import
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::rust-binary
  - id: stealth-daemon
    desc: Stealthy daemon (daemon + proc
    crit: notable
    conf: 0.5
    attack: T1543
    mbc: F0006
    for:
      - elf
    platforms:
      - linux
    all:
      - id: micro-behaviors/fs/proc/info::process-self-exe-path
    any:
      - id: daemon-fork
      - id: micro-behaviors/process/create/setsid::import
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::rust-binary
  - id: fork-random-exec-daemon
    desc: Forked daemon with randomized command execution
    crit: suspicious
    conf: 0.85
    attack: T1543
    for: [scripts, binaries]
    all:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/shell::sleep-format-exec
      - id: micro-behaviors/os/random/crypto::seeded-random
  - id: macos-double-fork-daemon
    desc: macOS double-fork daemon pattern (fork
    crit: suspicious
    conf: 0.85
    attack: T1543
    mbc: F0006
    for:
      - macho
    platforms:
      - macos
    all:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/setsid::import
    any:
      - id: micro-behaviors/fs/chmod/modify::umask
      - id: micro-behaviors/fs/directory/mkdir::chdir-symbol
    unless:
      - id: metadata/lang/compiler/systems::go-version-string
    downgrade:
      any:
        - id: metadata/vendor/apple::system-component
        - id: metadata/signed/platform::apple
        - id: metadata/binary/metrics::many-imports
        - id: metadata/lang/compiler/systems::rust-binary
  - id: macos-daemon-setup
    desc: macOS daemon setup sequence
    crit: suspicious
    conf: 0.88
    attack: T1543
    mbc: F0006
    for:
      - macho
    platforms:
      - macos
    all:
      - id: micro-behaviors/process/create/setsid::import
      - id: micro-behaviors/fs/chmod/modify::umask
      - id: micro-behaviors/fs/directory/mkdir::chdir-symbol
    any:
      - id: micro-behaviors/process/create/direct::execve-with-fd-redirect-macos
      - id: micro-behaviors/process/create/direct::execve-import
    unless:
      - id: metadata/lang/compiler/systems::go-version-string
    downgrade:
      any:
        - id: metadata/signed/anchor-apple
        - id: metadata/vendor/apple::system-component
        - id: metadata/signed/platform::apple
        - id: metadata/binary/metrics::many-imports
        - id: metadata/lang/compiler/systems::rust-binary
  - id: unix-daemon-persistence
    desc: Unix daemon persistence mechanism
    crit: notable
    conf: 0.75
    attack: T1543
    mbc: F0006
    for:
      - elf
      - macho
    all:
      - id: daemon-fork
      - id: micro-behaviors/process/create/setsid::import
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: metadata/vendor/apple::system-component
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/os/security/sandbox::pledge
        - id: micro-behaviors/os/security/sandbox::unveil
