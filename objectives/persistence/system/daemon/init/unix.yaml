defaults:
  platforms:
    - linux
    - macos
traits:
  # daemon-umask moved to micro-behaviors/fs/chmod/modify::umask
  - id: sig-ign-sighup-x64
    desc: SIGHUP signal ignore pattern (x86_64)
    # Component-only: the 10-byte pattern `mov edi, 1; mov esi, 1` is common
    # compiler-generated code — two small immediate loads that collide with
    # arbitrary function prologues in large binaries. Only meaningful paired
    # with a signal-handler import inside `signal-ignore-pattern`.
    crit: component
    conf: 0.4
    for:
      - elf
      - macho
    size_max: 10485760
    if:
      type: hex
      section: .text
      pattern: BF 01 00 00 00 BE 01 00 00 00
    unless:
      - id: metadata/file/text/string::system-shell-basename
      - id: micro-behaviors/os/event/library/tokio::tokio-crate-path
      - type: trait
        id: metadata/file/extension::linux-kernel-package-artifact-basename
      - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: sig-ign-sigpipe-x64
    desc: SIGPIPE signal ignore pattern (x86_64)
    # Component-only: same 10-byte `mov edi, 13; mov esi, 1` is small-immediate
    # compiler code that collides with arbitrary function prologues.
    crit: component
    conf: 0.4
    for:
      - elf
      - macho
    if:
      type: hex
      section: .text
      pattern: BF 0D 00 00 00 BE 01 00 00 00
  - id: sigchild-underscore
    desc: _sigchild child-reaper symbol
    crit: notable
    conf: 0.5
    for:
      - elf
      - macho
    if:
      type: text
      substr: _sigchild
  - id: sigchld-handler-string
    desc: sigchld_handler child-reaper function
    crit: component
    conf: 0.5
    for:
      - elf
      - macho
    if:
      type: text
      substr: sigchld_handler
    unless:
      - id: micro-behaviors/communications/ssh/connect::openssh
      - id: metadata/file/text/string::system-shell-basename
  - id: handle-sigchld-string
    desc: handle_sigchld child-reaper function
    crit: suspicious
    conf: 0.5
    for:
      - elf
      - macho
    if:
      # Whole-token match: a bare `handle_sigchld` child-reaper function name.
      # `\b` excludes legit decorated helpers like sudo's `handle_sigchld_pty`,
      # `handle_sigchld_nopty`, and `mon_handle_sigchld` (the `_` adjacent to the
      # token is a word char, so no boundary exists there).
      type: text
      word: handle_sigchld
composite_rules:
  - id: daemon-fork
    desc: Forks process to run as detached daemon
    crit: suspicious
    conf: 0.4
    attack: T1543
    for:
      - elf
      - macho
    any:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/fork/clone::daemon-dup
  - id: signal-function
    desc: Signal handling function
    crit: suspicious
    conf: 0.2
    for:
      - elf
      - macho
    any:
      - id: micro-behaviors/os/signal/handler::signal
      - id: micro-behaviors/os/signal/handler::sigaction
  - id: sig-ign-pattern
    desc: Signal ignore byte pattern (x86_64)
    crit: suspicious
    conf: 0.4
    for:
      - elf
      - macho
    any:
      - id: sig-ign-sighup-x64
      - id: sig-ign-sigpipe-x64
  - id: signal-ignore-pattern
    desc: Signal handler setup for daemon persistence
    crit: notable
    conf: 0.3
    attack: T1543
    for:
      - elf
      - macho
    all:
      - id: signal-function
      - id: sig-ign-pattern
    unless:
      - id: metadata/file/text/string::system-shell-basename
      - id: metadata/library/data::rust-cloud-object-store-sdk
      # `sigaction` + the `mov edi,1; mov esi,1` prologue are ubiquitous in Go
      # runtime code; on a Go binary this pattern is not daemon signal setup.
      - id: metadata/lang/compiler/systems::go-binary-macho
  - id: sigchld-handler
    desc: Custom SIGCHLD child-reaper handler
    crit: suspicious
    conf: 0.6
    attack: T1543
    for:
      - elf
      - macho
    any:
      - id: sigchild-underscore
      - id: sigchld-handler-string
      - id: handle-sigchld-string
  - id: stealth-daemon
    desc: Stealthy daemon using prctl
    crit: notable
    conf: 0.5
    attack: T1543
    mbc: F0006
    for:
      - elf
    platforms:
      - linux
    all:
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
    any:
      - id: daemon-fork
      - id: micro-behaviors/process/create/setsid::import
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::rust-binary
  - id: fork-random-exec-daemon
    desc: Forked daemon with randomized command execution
    crit: suspicious
    conf: 0.85
    attack: T1543
    for: [scripts, binaries]
    all:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/shell/invoke::sleep-format-exec
      - id: micro-behaviors/os/random/crypto::seeded-random
  - id: macos-double-fork-daemon
    desc: macOS double-fork daemon syscall pattern
    crit: suspicious
    conf: 0.85
    attack: T1543
    mbc: F0006
    for:
      - macho
    platforms:
      - macos
    all:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/setsid::import
    any:
      - id: micro-behaviors/fs/chmod/modify::umask
      - id: micro-behaviors/fs/directory/mkdir::chdir-symbol
    unless:
      - id: metadata/lang/compiler/systems::go-binary-macho
    downgrade:
      any:
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/lang/compiler/systems::rust-binary
  - id: macos-daemon-setup
    desc: macOS daemon setup sequence
    crit: suspicious
    conf: 0.88
    attack: T1543
    mbc: F0006
    for:
      - macho
    platforms:
      - macos
    all:
      - id: micro-behaviors/process/create/setsid::import
      - id: micro-behaviors/fs/chmod/modify::umask
      - id: micro-behaviors/fs/directory/mkdir::chdir-symbol
    any:
      - id: micro-behaviors/process/create/direct::execve-with-fd-redirect-macos
      - id: micro-behaviors/process/create/direct::execve-import
    unless:
      - id: metadata/lang/compiler/systems::go-version-string
    downgrade:
      any:
        - id: metadata/signed/anchor-apple
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/lang/compiler/systems::rust-binary
  - id: benign-fork-setsid-context
    desc: Benign runtime ships fork+setsid
    crit: component
    for:
      - elf
      - macho
    any:
      # Go runtime / Rust std ship fork+setsid symbols in every binary.
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::rust-binary
      # SigmaShake governance tool forks/setsid's to run its eval daemon.
      - id: well-known/tool/detection/sigmashake::sigmashake-governance-marker

  - id: unix-daemon-persistence
    desc: Unix daemon persistence mechanism
    crit: suspicious
    conf: 0.75
    attack: T1543
    mbc: F0006
    for:
      - elf
      - macho
    all:
      - id: daemon-fork
      - id: micro-behaviors/process/create/setsid::import
    unless:
      - id: metadata/library/data::rust-cloud-object-store-sdk
      # Go runtime / Rust std / the SigmaShake governance tool all ship or call
      # `fork`/`setsid` without daemon-persistence intent — consolidated into one
      # ref to stay under the unless/downgrade clause cap.
      - id: benign-fork-setsid-context
    downgrade:
      any:
        # (many-imports structural downgrade dropped: the go-version-string
        # unless above now precisely skips the Go-binary case it softened.)
        - id: micro-behaviors/dylib/library/family::system-lib-marker
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/os/security/sandbox::pledge
        - id: micro-behaviors/os/security/sandbox::unveil
