defaults:
  platforms: [unix]
  for: [shell, scripts, binaries, elf]
  attack: "T1543"
traits:
- id: rc-local-hidden-system-bin--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: etc/rc.local
  count_max: 1031861
- id: rc-local-hidden-system-bin--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: d/local.sh
  count_max: 1031862
- id: reboot-hidden-system-bin-cron
  desc: Reboot cron hidden system binary
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '@reboot.{0,120}/(usr/)?(s?bin|usr/sbin|usr/local/bin)/\.[A-Za-z0-9][A-Za-z0-9_-]*'
- id: write-hidden-system-bin--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (cp|mv).{0,120}/(usr/)?(s?bin|usr/sbin|usr/local/bin)/\.[A-Za-z0-9][A-Za-z0-9_-]*
  count_max: 1031865
- id: write-hidden-system-bin--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (install|dd).{0,120}/(usr/)?(s?bin|usr/sbin|usr/local/bin)/\.[A-Za-z0-9][A-Za-z0-9_-]*
  count_max: 1031866
- id: write-hidden-system-bin--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (tee|cat).{0,120}/(usr/)?(s?bin|usr/sbin|usr/local/bin)/\.[A-Za-z0-9][A-Za-z0-9_-]*
  count_max: 1031867
- id: write-hidden-system-bin--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (printf|echo).{0,120}/(usr/)?(s?bin|usr/sbin|usr/local/bin)/\.[A-Za-z0-9][A-Za-z0-9_-]*
  count_max: 1031868
- id: write-hidden-system-bin-cond-0--inline-31868
  desc: Regex component marker
  crit: notable
  conf: 0.9
  for: [perl, shell]
  if:
    type: path
    basename: true
    regex: '\.t$'
  count_max: 1031869
composite_rules:
- id: hidden-system-daemon-persistence
  desc: Hidden system binary persistence
  crit: hostile
  conf: 0.96
  all:
  - id: objectives/evasion/file-hiding/system-path::hidden-system-binary-path
  any:
  - id: rc-local-hidden-system-bin
  - id: reboot-hidden-system-bin-cron
  - id: write-hidden-system-bin
- id: rc-local-hidden-system-bin
  desc: rc.local hidden system binary
  crit: suspicious
  conf: 0.92
  any:
  - id: rc-local-hidden-system-bin--rx-2
  - id: rc-local-hidden-system-bin--rx-3
- id: write-hidden-system-bin
  desc: Writes hidden system binary
  crit: suspicious
  conf: 0.9
  any:
  - id: write-hidden-system-bin--rx-5
  - id: write-hidden-system-bin--rx-6
  - id: write-hidden-system-bin--rx-7
  - id: write-hidden-system-bin--rx-8
  unless:
  - id: write-hidden-system-bin-cond-0--inline-31868
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
