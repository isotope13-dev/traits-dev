defaults:
  platforms: [unix]
  for: [shell, scripts, binaries, elf]
  attack: "T1543"
traits:
  - id: rc-local-hidden-system-bin
    desc: rc.local hidden system binary
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: /etc/rc\.local(\.d/local\.sh)?[\s\S]{0,160}/(usr/)?(s?bin|usr/sbin|usr/local/bin)/\.[A-Za-z0-9][A-Za-z0-9_-]*
  - id: reboot-hidden-system-bin-cron
    desc: Reboot cron hidden system binary
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '@reboot.{0,120}/(usr/)?(s?bin|usr/sbin|usr/local/bin)/\.[A-Za-z0-9][A-Za-z0-9_-]*'
  - id: write-hidden-system-bin
    desc: Writes hidden system binary
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (cp|mv|install|dd|tee|cat|printf|echo).{0,120}/(usr/)?(s?bin|usr/sbin|usr/local/bin)/\.[A-Za-z0-9][A-Za-z0-9_-]*
    unless:
      - type: basename
        regex: '\.t$'
      - id: metadata/package/testing/presence::test-filename-pattern
composite_rules:
  - id: hidden-system-daemon-persistence
    desc: Hidden system binary persistence
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/evasion/file-hiding/system-path::hidden-system-binary-path
    any:
      - id: rc-local-hidden-system-bin
      - id: reboot-hidden-system-bin-cron
      - id: write-hidden-system-bin
