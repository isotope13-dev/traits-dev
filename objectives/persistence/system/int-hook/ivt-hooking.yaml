defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: ivt-direct-write-asm
    desc: Direct IVT entry modification (Assembly)
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: (?i)(ds:\[13h\*4\]|13h\*4|int 13h vector)
  - id: int-b4-call
    desc: Calls interrupt B4h (uncommon/reserved) (ASM)
    crit: suspicious
    if:
      type: text
      regex: (?i)\bint\s+0?B4h\b
  - id: ivt-self-check
    desc: Checks for specific byte (60h/pusha) in IVT
    crit: suspicious
    if:
      type: text
      regex: (?i)cmp\s+byte\s+ptr\s+es:\[di\],60h
composite_rules:
  - id: dos-residency-check
    desc: DOS TSR residency check
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/msdos/interrupt::ivt-segment-val
      - id: micro-behaviors/os/msdos/interrupt::ivt-segment-reg
    any:
      - id: int-b4-call
      - id: ivt-self-check
