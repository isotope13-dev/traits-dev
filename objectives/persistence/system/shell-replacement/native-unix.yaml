defaults:
  platforms: [unix]
  for: [c, cpp, shell, text]
  attack: T1547

traits:
  - id: bash-source-download-command
    desc: Bash source download command
    crit: suspicious
    conf: 0.9
    for: [c, cpp, shell]
    if:
      type: text
      substr: ftp://ftp.gnu.org/gnu/bash/bash-

  - id: bash-shell-c-patch-command
    desc: Bash shell.c patch command
    crit: suspicious
    conf: 0.94
    for: [c, cpp, shell]
    if:
      type: text
      regex: 'patch\s+shell\.c\s+[A-Za-z0-9_.-]+'

  - id: bash-build-install-over-bin
    desc: Builds and installs bash over bin
    crit: suspicious
    conf: 0.95
    for: [c, cpp, shell]
    if:
      type: text
      regex: 'make install.{0,80}mv -f \./bash /bin'

  - id: secshell-temp-compile
    desc: Compiles secure shell helper to tmp
    crit: suspicious
    conf: 0.91
    for: [c, cpp, shell]
    if:
      type: text
      regex: 'gcc\s+SeCshell\.c\s+-o\s+/tmp/'

  - id: bash-backdoored-status-string
    desc: Bash backdoored status string
    crit: suspicious
    conf: 0.96
    for: [c, cpp, shell]
    if:
      type: text
      substr: /bin/bash has successfully been backdoored

  - id: shell-patch-suid-trigger
    desc: Shell patch SUID trigger
    crit: suspicious
    conf: 0.92
    for: [c, cpp, text]
    if:
      type: text
      regex: 'stat\("/tmp/.{1,40}".{0,120}chmod\("/tmp/'

  - id: shell-patch-chown-root
    desc: Shell patch chowns helper to root
    crit: suspicious
    conf: 0.92
    for: [c, cpp, text]
    if:
      type: text
      regex: 'chown\("/tmp/.{1,40}",\s*0,\s*0\)'

  - id: shell-patch-sisuid-mode
    desc: Shell patch applies SUID mode bit
    crit: notable
    conf: 0.9
    for: [c, cpp, text]
    if:
      type: text
      regex: 'chmod[\s\S]{0,80}S_ISUID|S_ISUID\s*\||\|\s*S_ISUID'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: metadata/lang/source::wine-compat-source
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
      - id: well-known/app/telegram::telegram-desktop-third-party-source

composite_rules:
  - id: bash-source-replacement-backdoor
    desc: Bash source replacement backdoor
    crit: hostile
    conf: 0.98
    for: [c, cpp, shell]
    all:
      - id: bash-source-download-command
      - id: bash-shell-c-patch-command
      - id: bash-build-install-over-bin
      - id: bash-backdoored-status-string

  - id: bashdoor-helper-install
    desc: Bashdoor helper install
    crit: hostile
    conf: 0.96
    for: [c, cpp, shell]
    all:
      - id: bash-source-replacement-backdoor
      - id: secshell-temp-compile

  - id: suid-shell-source-patch
    desc: SUID shell source patch
    crit: hostile
    conf: 0.97
    for: [c, cpp, text]
    all:
      - id: shell-patch-suid-trigger
      - id: shell-patch-chown-root
      - id: shell-patch-sisuid-mode
