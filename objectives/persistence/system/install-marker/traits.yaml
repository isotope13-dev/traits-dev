# Host-keyed install marker pattern: write a file in the system temp dir
# whose name is a hash of (constant_payload + gethostname()) and gate
# subsequent behavior on file_exists() of that marker. Classic
# "beacon once per host, ever" supply-chain implant pattern — avoids
# duplicate telemetry that would tip off defenders and survives across
# multiple library imports per process.
defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: B0046
  attack: T1547
traits:
  - id: hidden-initialized-marker-path
    desc: Hidden .initialized state marker path
    crit: suspicious
    conf: 0.92
    platforms: [macos]
    for: [macho, c]
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])/\.initialized\b'
  - id: create-initialized-file-symbol
    desc: createInitializedFile helper symbol
    crit: suspicious
    conf: 0.94
    platforms: [macos]
    for: [macho, c]
    if:
      type: symbol
      substr: createInitializedFile
  - id: hidden-launchagent-plist-name
    desc: Hidden LaunchAgent plist name
    crit: suspicious
    conf: 0.92
    platforms: [macos]
    for: [macho, c]
    if:
      type: text
      exact: .launcher.plist
  - id: plist-bash-program
    desc: Embedded ProgramArguments uses bash
    crit: suspicious
    conf: 0.93
    platforms: [macos]
    for: [macho, c]
    if:
      type: text
      substr: <string>/bin/bash</string>
  - id: plist-bash-c-arg
    desc: Embedded ProgramArguments uses -c
    crit: suspicious
    conf: 0.88
    platforms: [macos]
    for: [macho, c]
    if:
      type: text
      substr: <string>-c</string>
  - id: localbin-source
    desc: Embedded local-bin payload source
    crit: suspicious
    conf: 0.9
    platforms: [macos]
    for: [macho, c]
    if:
      type: text
      substr: 'BINARY_SRC="$HOME/.local/bin/'
  - id: launchctl-bootout-gui
    desc: launchctl bootout gui service
    crit: suspicious
    conf: 0.86
    platforms: [macos]
    for: [macho, c, shell]
    if:
      type: text
      substr: launchctl bootout gui/
  - id: launchctl-bootstrap-gui
    desc: launchctl bootstrap gui service
    crit: suspicious
    conf: 0.86
    platforms: [macos]
    for: [macho, c, shell]
    if:
      type: text
      substr: launchctl bootstrap gui/
composite_rules:
  - id: php-hostname-tmp-marker
    desc: Per-host single-shot install marker
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/discovery/system/fingerprint/info::gethostname-call
      - id: micro-behaviors/crypto/hash/digest::md5-php
      - id: micro-behaviors/fs/file/write/direct::php-file-write-func
      - id: micro-behaviors/fs/temp/directory::sys-get-temp-dir-symbol
    near_bytes: 4096
  - id: hidden-install-state-marker
    desc: Hidden install-state marker file
    crit: suspicious
    conf: 0.96
    platforms: [macos]
    for: [macho, c]
    all:
      - id: hidden-initialized-marker-path
      - id: create-initialized-file-symbol
  - id: launchctl-refresh-gui-service
    desc: launchctl bootout and bootstrap refresh
    crit: suspicious
    conf: 0.9
    platforms: [macos]
    for: [macho, c]
    all:
      - id: launchctl-bootout-gui
      - id: launchctl-bootstrap-gui
  - id: hidden-bash-temp-stager
    desc: Hidden LaunchAgent bash temp stager
    crit: hostile
    conf: 0.97
    platforms: [macos]
    for: [macho, c]
    attack: T1543.004,T1059.004,T1105
    all:
      - id: objectives/persistence/system/launchd/core::launch-agents
      - id: objectives/persistence/system/launchd/core::embedded-plist-runatload
      - id: objectives/persistence/system/launchd/core::embedded-plist-programarguments
      - id: hidden-launchagent-plist-name
      - id: plist-bash-program
      - id: plist-bash-c-arg
      - id: localbin-source
      - id: objectives/command-and-control/dropper/delivery/download-execute::tmpdir-copy-binary-src
      - id: objectives/command-and-control/dropper/delivery/download-execute::tmpdir-chmod-path
      - id: objectives/command-and-control/dropper/delivery/download-execute::tmpdir-exec-path
    any:
      - id: launchctl-refresh-gui-service
      - id: objectives/persistence/system/launchd/core::launchctl-command
