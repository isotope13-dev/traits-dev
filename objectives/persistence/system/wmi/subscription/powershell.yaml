# WMI Event Subscription Persistence (PowerShell)
# Mirrors go.yaml's composite for PowerShell / batch delivery vectors.
# ATT&CK: T1546.003 (Event Triggered Execution: WMI Event Subscription)
defaults:
  platforms: [windows]
  for: [powershell, batch, vbs]
  attack: T1546.003
  mbc: F0012
traits:
  - id: set-wmiinstance-eventfilter
    desc: Set-WmiInstance creates __EventFilter
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)Set-WmiInstance\b[^\n]{0,200}__EventFilter
  - id: set-wmiinstance-commandline-consumer
    desc: "Set-WmiInstance CommandLineEventConsumer"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)Set-WmiInstance\b[^\n]{0,200}CommandLineEventConsumer
  - id: set-wmiinstance-filter-binding
    desc: "Set-WmiInstance __FilterToConsumerBinding"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)Set-WmiInstance\b[^\n]{0,200}__FilterToConsumerBinding
composite_rules:
  - id: ps-wmi-event-subscription-install
    desc: PowerShell installs WMI event-subscription persistence
    crit: hostile
    conf: 0.97
    all:
      - id: set-wmiinstance-eventfilter
      - id: set-wmiinstance-filter-binding
    any:
      - id: set-wmiinstance-commandline-consumer
      - id: set-wmiinstance-commandline-consumer
      - id: objectives/persistence/system/wmi/subscription::wmi-process-start-trace
  - id: ps-wmi-processstart-kill
    desc: WMI subscription kills process on start
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/persistence/system/wmi/subscription::wmi-process-start-trace
      - id: set-wmiinstance-commandline-consumer
    any:
      - id: micro-behaviors/os/wmi/query::subscription-namespace
      - id: set-wmiinstance-filter-binding
