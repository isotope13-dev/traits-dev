defaults:
  mbc: F0012
  attack: T1546.003
  platforms:
    - windows
traits:
  - id: wmi-subscription-namespace
    desc: root\subscription WMI persistence namespace
    crit: suspicious
    conf: 0.8
    for:
      - go
      - powershell
      - vbs
    if:
      type: string_literal
      regex: root\\subscription|ROOT\\SUBSCRIPTION
  - id: wmi-event-filter
    desc: __EventFilter WMI subscription trigger
    crit: suspicious
    conf: 0.9
    for:
      - go
      - powershell
      - vbs
    if:
      type: string_literal
      word: __EventFilter
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform/
  - id: wmi-eventfilter-create
    desc: Creates WMI EventFilter trigger
    crit: suspicious
    conf: 0.9
    for:
      - go
      - powershell
      - vbs
    if:
      type: string_literal
      regex: EventFilter.{0,20}CREATE|CREATE.{0,20}EventFilter
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform/
  - id: wmi-commandline-consumer
    desc: WMI consumer that runs a command
    crit: suspicious
    conf: 0.95
    for:
      - go
      - powershell
      - vbs
    if:
      type: string_literal
      word: CommandLineEventConsumer
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform/
  - id: wmi-activescript-consumer
    desc: WMI consumer that runs a script
    crit: suspicious
    conf: 0.95
    for:
      - go
      - powershell
      - vbs
    if:
      type: string_literal
      word: ActiveScriptEventConsumer
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform/
  - id: wmi-filter-binding
    desc: Binds WMI filter to consumer
    crit: suspicious
    conf: 0.9
    for:
      - go
      - powershell
      - vbs
    if:
      type: string_literal
      word: __FilterToConsumerBinding
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform/
  - id: wmic-namespace-create
    desc: Creates WMI namespace via wmic
    crit: suspicious
    conf: 0.85
    for:
      - go
      - powershell
      - vbs
      - batch
    if:
      type: string_literal
      regex: wmic.{0,30}/NAMESPACE.{0,30}CREATE
  - id: wmic-process-create
    desc: Spawns process via wmic call create
    crit: suspicious
    conf: 0.85
    for:
      - go
      - powershell
      - vbs
      - batch
    if:
      type: string_literal
      regex: wmic.{0,30}process.{0,20}call.{0,20}create
  - id: wmi-instance-modification
    desc: WMI event trigger on instance change
    crit: suspicious
    conf: 0.9
    for:
      - go
      - powershell
      - vbs
    if:
      type: string_literal
      word: __InstanceModificationEvent
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform/
  - id: wmi-process-start-trace
    desc: WMI trigger on process start
    crit: suspicious
    conf: 0.9
    for:
      - go
      - powershell
      - vbs
    if:
      type: string_literal
      word: Win32_ProcessStartTrace
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform/
  - id: wmi-interval-timer
    desc: WMI timer-based periodic trigger
    crit: suspicious
    conf: 0.8
    for:
      - go
    if:
      type: string_literal
      word: __IntervalTimerInstruction
composite_rules:
  - id: wmi-startup-query
    desc: WMI startup trigger queries
    crit: suspicious
    conf: 0.9
    for:
      - go
      - powershell
      - vbs
    any:
      - id: wmi-instance-modification
      - id: wmi-process-start-trace
      - id: wmi-interval-timer
  - id: wmic-create
    desc: wmic CREATE commands
    crit: suspicious
    conf: 0.85
    for:
      - go
      - powershell
      - vbs
      - batch
    any:
      - id: wmic-namespace-create
      - id: wmic-process-create
  - id: wmi-persistence
    desc: WMI event subscription persistence
    crit: hostile
    conf: 0.95
    for:
      - go
    all:
      - id: wmi-event-filter
      - id: wmi-filter-binding
    any:
      - id: wmi-commandline-consumer
      - id: wmi-activescript-consumer
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform/
  - id: wmi-command-persistence
    desc: WMI persistence with command execution
    crit: hostile
    conf: 0.95
    for:
      - go
    all:
      - id: wmi-subscription-namespace
      - id: wmi-commandline-consumer
    any:
      - id: wmi-event-filter
      - id: wmi-startup-query
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform/
