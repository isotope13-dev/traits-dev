# macOS persistence surfaces inspired by the macOS Persistence Cheatsheet.
# Atoms here are objective-level because each names a durable persistence
# location, policy surface, or registration mechanism.
defaults:
  platforms: [macos]
  for: [scripts, binaries]
  attack: T1547
traits:
  - id: btm-store
    desc: Background Task Management store
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: 'BackgroundItems-v[0-9]+\.btm|sfltool\s+dumpbtm'
  - id: smappservice-api
    desc: ServiceManagement login item API
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'SMAppService|SMLoginItemSetEnabled|kLSSharedFileListSessionLoginItems'
  - id: embedded-loginitems-path
    desc: Embedded LoginItems helper path
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: Contents/Library/LoginItems
  - id: privileged-helper-tools-path
    desc: PrivilegedHelperTools persistence path
    crit: suspicious
    conf: 0.9
    attack: T1543.004
    if:
      type: text
      substr: /Library/PrivilegedHelperTools
  - id: app-bundled-launchd-path
    desc: App-bundled launchd job path
    crit: suspicious
    conf: 0.88
    attack: T1543.004
    if:
      type: text
      regex: 'Contents/Library/Launch(Daemons|Agents)'
  - id: launchd-disabled-override
    desc: launchd disabled-state override
    crit: suspicious
    conf: 0.86
    attack: T1543.004
    if:
      type: text
      regex: '/var/db/com\.apple\.xpc\.launchd|launchctl\s+(enable|disable)\b'
  - id: ssh-authorized-keys-macos
    desc: macOS authorized_keys persistence path
    crit: suspicious
    conf: 0.86
    attack: T1098.004
    if:
      type: text
      regex: '(/Users/[^/\s]{1,80}|/var/root|~)/\.ssh/authorized_keys\b'
  - id: ssh-rc-path
    desc: SSH rc session hook
    crit: suspicious
    conf: 0.9
    attack: T1037.004
    if:
      type: text
      regex: '(/Users/[^/\s]{1,80}|/var/root|~)/\.ssh/rc\b|/etc/ssh/sshrc\b'
  - id: sudoers-policy-path
    desc: sudoers policy persistence path
    crit: suspicious
    conf: 0.86
    attack: T1548.003
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_.-])/etc/sudoers(?:\.d/)?|!authenticate'
  - id: authorizationdb-rule
    desc: AuthorizationDB persistence surface
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'authorizationdb|/var/db/auth\.db|SecurityAgentPlugins'
  - id: hidden-local-account
    desc: Hidden local account persistence
    crit: suspicious
    conf: 0.88
    attack: T1136.001
    if:
      type: text
      regex: 'dscl\s+\.\s+-create\s+/Users/\S+\s+IsHidden\s+1|Hide500Users'
  - id: remote-login-enabled
    desc: Remote Login service enabled
    crit: suspicious
    conf: 0.84
    attack: T1021.004
    if:
      type: text
      regex: 'systemsetup\s+-setremotelogin\s+on|com\.apple\.access_ssh'
  - id: shell-init-zsh
    desc: zsh shell init file reference
    crit: notable
    conf: 0.84
    attack: T1037.004
    if:
      type: text
      regex: '(\.zshrc|\.zprofile|\.zlogin|/etc/zshrc|/etc/zprofile)\b'
  - id: shell-init-bash
    desc: bash shell init file reference
    crit: notable
    conf: 0.84
    attack: T1037.004
    if:
      type: text
      regex: '(\.bash_profile|\.bashrc|\.profile|/etc/profile)\b'
  - id: at-atrun-job
    desc: at atrun scheduled job
    crit: suspicious
    conf: 0.86
    attack: T1053
    if:
      type: text
      regex: '\batrun\b|/var/at/(jobs|spool)|\bat\s+\d{1,2}:\d{2}\b'
  - id: periodic-job-path
    desc: periodic job persistence path
    crit: suspicious
    conf: 0.88
    attack: T1053
    if:
      type: text
      regex: '/etc/periodic|/usr/libexec/periodic|\bperiodic\s+(daily|weekly|monthly)'
  - id: emond-rule-path
    desc: emond rule persistence path
    crit: suspicious
    conf: 0.9
    attack: T1546.014
    if:
      type: text
      regex: '/etc/emond\.d|/var/db/emondClients|emond\.plist'
  - id: calendar-alert-script
    desc: Calendar alert script hook
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: 'Calendar[/ ].{0,40}(Alert|Script)|com\.apple\.iCal'
  - id: system-extension-persistence
    desc: System Extension persistence
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'SystemExtensions|systemextensionsctl|OSSystemExtensionRequest'
  - id: kext-persistence-path
    desc: kernel extension persistence
    crit: suspicious
    conf: 0.88
    attack: T1547.006
    if:
      type: text
      regex: '/Library/Extensions/[^\s]{1,120}\.kext|\bkext(load|util)\b'
  - id: native-messaging-host
    desc: browser native messaging host
    crit: suspicious
    conf: 0.88
    attack: T1176
    if:
      type: text
      regex: 'NativeMessagingHosts|native-messaging-hosts|allowed_origins'
  - id: browser-extension-policy
    desc: browser extension policy persistence
    crit: suspicious
    conf: 0.84
    attack: T1176
    if:
      type: text
      regex: 'ExtensionInstallForcelist|ExtensionSettings|policies\.json'
  - id: safari-extension-surface
    desc: Safari extension persistence
    crit: suspicious
    conf: 0.82
    attack: T1176
    if:
      type: text
      regex: 'Safari(App|Web)Extension|SFSafariExtension|Safari/Extensions'
  - id: finder-sync-extension
    desc: Finder Sync extension
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: 'com\.apple\.FinderSync|FIFinderSync'
  - id: application-plugin-path
    desc: application plug-in path
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: 'Contents/PlugIns|/Library/(QuickLook|Spotlight|Internet Plug-Ins)'
  - id: application-support-helper
    desc: Application Support helper persistence path
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: '(/Library|~/Library)/Application Support/[^\n]{1,120}(Helper|Agent|Daemon|Updater)'
  - id: application-startup-script
    desc: Application startup script persistence
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(Startup|Login|Launch)[ -]?Script|Contents/Resources/Scripts/[^\s]{1,120}\.(sh|scpt|js|py)'
  - id: app-preference-trigger
    desc: App preference trigger persistence
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: 'Preferences/[A-Za-z0-9_.-]+\.plist.{0,120}(Script|Path|Command|Executable)'
  - id: launchservices-handler
    desc: LaunchServices handler registration
    crit: suspicious
    conf: 0.86
    attack: T1546
    if:
      type: text
      regex: 'CFBundleURLTypes|CFBundleDocumentTypes|LSHandlers|LSHandlerURLScheme'
  - id: input-method-path
    desc: Input Method persistence path
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(/Library|~/Library)/Input Methods|\.inputplugin\b'
  - id: screen-saver-bundle
    desc: Screen Saver bundle persistence
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(/Library|~/Library)/Screen Savers|\.saver\b'
  - id: installer-package-script
    desc: installer package script hook
    crit: notable
    conf: 0.86
    attack: T1546.016
    if:
      type: text
      regex: 'Scripts/(preinstall|postinstall)|\b(preinstall|postinstall)\b'
  - id: folder-action-script
    desc: Folder Action script persistence
    crit: suspicious
    conf: 0.88
    attack: T1546
    if:
      type: text
      regex: 'Folder Action Scripts|FolderActionsDispatcher|com\.apple\.FolderActions'
  - id: automator-service-workflow
    desc: Automator service workflow
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: 'Automator|\.workflow\b|/Library/Services/[^\s]{1,120}\.workflow'
  - id: mail-applescript-rule
    desc: Mail AppleScript rule
    crit: suspicious
    conf: 0.88
    attack: T1546
    if:
      type: text
      regex: 'SyncedRules\.plist|RulesActiveState\.plist|Apply AppleScript'
  - id: tcc-accessibility-grant
    desc: TCC accessibility grant
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'kTCCServiceAccessibility|com\.apple\.TCC|TCC\.db'
  - id: dyld-lsenvironment-injection
    desc: DYLD LSEnvironment injection
    crit: suspicious
    conf: 0.9
    attack: T1574.006
    for: [macho, dylib, shell, plist]
    if:
      type: text
      regex: 'LSEnvironment|DYLD_(INSERT_LIBRARIES|LIBRARY_PATH|FRAMEWORK_PATH)'
  - id: lc-load-dylib
    desc: LC_LOAD_DYLIB persistence
    crit: suspicious
    conf: 0.86
    attack: T1546.006
    if:
      type: text
      regex: 'LC_LOAD_DYLIB|install_name_tool.{0,80}-add_rpath'
  - id: application-binary-modification
    desc: Application binary modification
    crit: suspicious
    conf: 0.86
    attack: T1546.006
    if:
      type: text
      regex: 'codesign\s+--remove-signature|install_name_tool.{0,80}(-change|-add_rpath|-delete_rpath)'
  - id: dylib-hijack-proxy
    desc: Dylib hijacking or proxying
    crit: suspicious
    conf: 0.86
    attack: T1574.006
    if:
      type: text
      regex: 'DYLD_FALLBACK_LIBRARY_PATH|@rpath/[^\s]{1,80}\.dylib|__DATA,__interpose'
  - id: startupitems-path
    desc: StartupItems legacy persistence
    crit: suspicious
    conf: 0.88
    attack: T1037.005
    if:
      type: text
      regex: '/Library/StartupItems|/System/Library/StartupItems'
  - id: rc-script-path
    desc: macOS rc script persistence
    crit: suspicious
    conf: 0.84
    attack: T1037
    if:
      type: text
      regex: '/etc/(rc\.common|rc\.local|rc\.netboot)\b'
  - id: configuration-profile
    desc: macOS configuration profile
    crit: suspicious
    conf: 0.84
    for: [plist, xml]
    if:
      type: text
      regex: '\.mobileconfig\b|PayloadContent|PayloadIdentifier'
  - id: managed-login-items-payload
    desc: Managed Login Items payload
    crit: suspicious
    conf: 0.88
    for: [plist, xml]
    if:
      type: text
      regex: 'com\.apple\.servicemanagement|Managed Login Items'
  - id: declarative-background-task
    desc: Declarative managed background task
    crit: suspicious
    conf: 0.84
    for: [plist, xml]
    if:
      type: text
      regex: 'Declarative Device Management|Managed background task|backgroundtaskmanagementagent'
  - id: mdm-pppc-payload
    desc: MDM PPPC payload
    crit: suspicious
    conf: 0.88
    for: [plist, xml]
    if:
      type: text
      regex: 'PrivacyPreferencesPolicyControl|com\.apple\.TCC\.configuration-profile-policy'
  - id: mdm-certificate-payload
    desc: MDM certificate payload
    crit: suspicious
    conf: 0.82
    for: [plist, xml]
    if:
      type: text
      regex: 'com\.apple\.security\.root|PayloadType.{0,80}com\.apple\.security'

composite_rules:
  - id: macos-persistence-surface
    desc: macOS persistence surface
    crit: suspicious
    conf: 0.84
    any:
      - id: btm-store
      - id: smappservice-api
      - id: embedded-loginitems-path
      - id: privileged-helper-tools-path
      - id: app-bundled-launchd-path
      - id: launchd-disabled-override
      - id: ssh-rc-path
      - id: authorizationdb-rule
      - id: hidden-local-account
      - id: remote-login-enabled
      - id: shell-init-zsh
      - id: shell-init-bash
      - id: at-atrun-job
      - id: periodic-job-path
      - id: emond-rule-path
      - id: calendar-alert-script
      - id: system-extension-persistence
      - id: kext-persistence-path
      - id: native-messaging-host
      - id: browser-extension-policy
      - id: safari-extension-surface
      - id: finder-sync-extension
      - id: application-plugin-path
      - id: application-support-helper
      - id: application-startup-script
      - id: app-preference-trigger
      - id: launchservices-handler
      - id: input-method-path
      - id: screen-saver-bundle
      - id: installer-package-script
      - id: folder-action-script
      - id: automator-service-workflow
      - id: mail-applescript-rule
      - id: lc-load-dylib
      - id: application-binary-modification
      - id: dylib-hijack-proxy
      - id: startupitems-path
      - id: rc-script-path
      - id: configuration-profile
      - id: managed-login-items-payload
      - id: declarative-background-task
    downgrade:
      any:
        - id: metadata/signed/platform
        - id: metadata/signed/developer
        - id: metadata/signed/app-store
  - id: non-apple-high-value-persistence
    desc: Non-Apple high-value persistence
    crit: suspicious
    conf: 0.88
    any:
      - id: privileged-helper-tools-path
      - id: app-bundled-launchd-path
      - id: sudoers-policy-path
      - id: authorizationdb-rule
      - id: hidden-local-account
      - id: system-extension-persistence
      - id: kext-persistence-path
      - id: tcc-accessibility-grant
      - id: dyld-lsenvironment-injection
      - id: application-binary-modification
      - id: dylib-hijack-proxy
      - id: mdm-pppc-payload
    unless:
      - id: metadata/signed/platform::apple
  - id: applescript-persistence
    desc: AppleScript-backed persistence
    crit: suspicious
    conf: 0.9
    all:
      - id: macos-persistence-surface
    any:
      - id: micro-behaviors/process/create/script/
      - id: mail-applescript-rule
      - id: folder-action-script
