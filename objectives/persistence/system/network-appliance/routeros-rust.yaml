defaults:
  platforms: [routeros, appliance, unix]
  for: [rust, elf]
  attack: T1053.003

traits:
  - id: rust-routeros-agent-temp-path
    desc: Rust RouterOS agent temp path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.routeros-agent

  - id: rust-routeros-script-source
    desc: Rust RouterOS script source
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/system/script[\s\S]{0,160}routeros-agent'

  - id: rust-routeros-login-paths
    desc: Rust RouterOS login persistence
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/etc/rc\.d/rc\.local[\s\S]{0,160}/root/\.bashrc'

  - id: rust-routeros-crontab-persistence
    desc: Rust RouterOS crontab persistence
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/etc/crontab|/var/spool/cron/crontabs/root)[\s\S]{0,220}routeros-agent'

  - id: rust-systemd-cache-execstart
    desc: Rust systemd cache ExecStart
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: ExecStart=/tmp/.cache_data

  - id: rust-systemd-rtel-service
    desc: Rust rtel systemd service
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: rtel-agent.service

composite_rules:
  - id: rust-systemd-cache-service
    desc: Rust systemd cache service
    crit: suspicious
    conf: 0.94
    all:
      - id: rust-systemd-cache-execstart
      - id: rust-systemd-rtel-service

  - id: rust-routeros-login-persistence
    desc: Rust RouterOS login persistence
    crit: hostile
    conf: 0.98
    all:
      - id: rust-routeros-agent-temp-path
      - id: rust-routeros-login-paths
      - id: rust-routeros-crontab-persistence
    any:
      - id: rust-routeros-script-source
      - id: rust-systemd-cache-service
    needs: 1

  - id: rust-routeros-cache-service
    desc: Rust RouterOS cache service
    crit: hostile
    conf: 0.97
    all:
      - id: rust-systemd-cache-service
      - id: rust-routeros-crontab-persistence
      - id: objectives/exfiltration/stealer/credential/network-appliance::rust-cache-data-credential-stash
