defaults:
  platforms: [openwrt]
  for: [c, cpp, elf, php, shell, javascript, typescript, lua, python, pyc]
  attack: T1543.002

traits:
  - id: openwrt-rc-common-init
    desc: OpenWrt rc.common init script shebang
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "#!/bin/sh /etc/rc.common"

  - id: openwrt-initd-enable-command
    desc: OpenWrt init.d service enable command
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: '/etc/init\.d/[A-Za-z0-9_.-]{1,48}\s+enable'

  - id: openwrt-root-crontab-path
    desc: OpenWrt root crontab path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /etc/crontabs/root

  - id: openwrt-uci-system-change
    desc: OpenWrt UCI system configuration change
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'uci (set|commit) system'

  - id: openwrt-agent-usrbin-path
    desc: OpenWrt agent installed under /usr/bin
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: /usr/bin/openwrt-agent

  - id: openwrt-agent-config-path
    desc: OpenWrt agent UCI config path
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: /etc/config/openwrt-agent

  - id: openwrt-overlay-upper-path
    desc: OpenWrt overlay upper filesystem path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /overlay/upper

  - id: openwrt-hotplug-iface-path
    desc: OpenWrt interface hotplug persistence path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /etc/hotplug.d/iface

  - id: openwrt-sysupgrade-preserve
    desc: OpenWrt sysupgrade preservation configuration
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /etc/sysupgrade.conf

  - id: openwrt-rc-common-bytecode
    desc: OpenWrt rc.common init script in JVM bytecode
    crit: notable
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 23 21 2F 62 69 6E 2F 73 68 20 2F 65 74 63 2F 72 63 2E 63 6F 6D 6D 6F 6E

  - id: openwrt-hidden-v05cmt-data-bytecode
    desc: OpenWrt hidden staged data path
    crit: notable
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 74 6D 70 2F 2E 76 30 35 63 6D 74 5F 64 61 74 61

  - id: openwrt-healthmon-path-bytecode
    desc: OpenWrt healthmon agent path in JVM bytecode
    crit: notable
    conf: 0.86
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 75 73 72 2F 62 69 6E 2F 68 65 61 6C 74 68 6D 6F 6E 2E 73 68

  - id: openwrt-root-crontab-bytecode
    desc: OpenWrt root crontab path in JVM bytecode
    crit: notable
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 65 74 63 2F 63 72 6F 6E 74 61 62 73 2F 72 6F 6F 74

  - id: openwrt-wget-bytecode
    desc: OpenWrt wget command in JVM bytecode
    crit: notable
    conf: 0.84
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 77 67 65 74 20 2D 71

composite_rules:
  - id: openwrt-initd-service-persistence
    desc: OpenWrt init.d service persistence
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/persistence/system/init/boot::etc-init-d
      - id: openwrt-rc-common-init
      - id: openwrt-initd-enable-command
    any:
      - id: openwrt-uci-system-change

  - id: openwrt-initd-hidden-payload-persistence
    desc: OpenWrt init.d hidden payload persistence
    crit: hostile
    conf: 0.95
    scope: outer
    all:
      - id: objectives/persistence/system/init/boot::etc-init-d
      - id: openwrt-rc-common-init
    any:
      - id: micro-behaviors/process/create/local-exec::tmp-path-execution
      - id: micro-behaviors/process/daemonize/detach::background-ampersand-hidden
      - id: objectives/command-and-control/beacon/network/periodic::openwrt-while-true-loop

  - id: openwrt-cron-hidden-service-persistence
    desc: OpenWrt root crontab hidden service persistence
    crit: hostile
    conf: 0.95
    all:
      - id: openwrt-root-crontab-path
    any:
      - id: objectives/persistence/system/cron/schedule::cron-hidden-tmp-entry
      - id: objectives/persistence/system/init/boot::etc-init-d
    unless:
      - id: well-known/tool/sysadmin/openwrt/passwall/

  - id: openwrt-cron-init-filewrite-persistence
    desc: OpenWrt cron and init.d persistence file write
    crit: hostile
    conf: 0.95
    all:
      - id: openwrt-root-crontab-path
      - id: openwrt-rc-common-init
    any:
      - id: micro-behaviors/fs/write/file/direct
      - id: micro-behaviors/process/create/shell/spawn::sh-c-exec
    needs: 1

  - id: openwrt-cron-root-ca-persistence
    desc: OpenWrt cron root CA persistence
    crit: hostile
    conf: 0.95
    scope: outer
    all:
      - id: openwrt-root-crontab-path
      - id: micro-behaviors/crypto/certificate/usage::ssl-certs-path
      - id: micro-behaviors/crypto/certificate/install::update-ca-certificates
    any:
      - id: micro-behaviors/crypto/certificate/usage::self-signed-cert-generation
      - id: micro-behaviors/crypto/certificate/install::openssl-rehash
      - id: micro-behaviors/crypto/certificate/usage::ca-certificates
    needs: 1

  - id: openwrt-agent-initd-self-install
    desc: OpenWrt agent init.d self-install persistence
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/persistence/system/init/boot::etc-init-d
      - id: openwrt-rc-common-init
      - id: openwrt-initd-enable-command
      - id: openwrt-agent-usrbin-path
    any:
      - id: openwrt-agent-config-path
      - id: objectives/supply-chain/install-hook/package-manager::openwrt-opkg-self-install

  - id: openwrt-firmware-overlay-persistence
    desc: OpenWrt firmware overlay persistence
    crit: hostile
    conf: 0.96
    all:
      - id: openwrt-overlay-upper-path
      - id: openwrt-hotplug-iface-path
      - id: openwrt-sysupgrade-preserve

  - id: openwrt-jvm-initd-service-persistence
    desc: OpenWrt JVM init.d service persistence
    crit: hostile
    conf: 0.96
    for: [class, jar, zip]
    all:
      - id: objectives/persistence/system/init/boot::jvm-initd-path-bytecode
      - id: openwrt-rc-common-bytecode
      - id: openwrt-wget-bytecode
    any:
      - id: openwrt-hidden-v05cmt-data-bytecode
      - id: openwrt-healthmon-path-bytecode
      - id: openwrt-root-crontab-bytecode
    needs: 1
