defaults:
  platforms: [fortios]
  for: [javascript, typescript]
  attack: T1053
  mbc: OB0007

traits:
  - id: fortios-system-task-api
    desc: FortiOS system task API
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /cmdb/system/task
  - id: fortios-system-cron-api
    desc: FortiOS system cron API
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /cmdb/system/cron
  - id: fortios-run-on-boot-enable
    desc: FortiOS run-on-boot enabled
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '"run-on-boot": "enable"'

composite_rules:
  - id: fortios-autoinstall-persistence
    desc: FortiOS boot task persistence
    crit: hostile
    conf: 0.97
    all:
      - id: fortios-system-task-api
      - id: fortios-run-on-boot-enable
    any:
      - id: fortios-system-cron-api
