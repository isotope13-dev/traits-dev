defaults:
  platforms: [iosxe, appliance, windows]
  for: [ruby, kotlin, java, jar, class, java_class, batch]
  attack: T1543

traits:
  - id: iosxe-priv15-user
    desc: IOS-XE privilege 15 user
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'username [A-Za-z0-9_.-]{1,32} privilege 15 secret'

  - id: iosxe-restconf-local-user
    desc: IOS-XE RESTCONF local user
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Cisco-IOS-XE-local_user:local-user[\s\S]{0,180}"privilege"\s*:\s*15'

  - id: iosxe-event-manager-applet
    desc: IOS-XE event manager applet
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: event manager applet

  - id: iosxe-http-server-enable
    desc: IOS-XE HTTP server enable
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'ip http (secure-)?server'

  - id: jvm-iosxe-priv15-user-const
    desc: JVM IOS-XE privilege 15 user
    crit: suspicious
    conf: 0.94
    for: [jar, class, java_class, zip]
    if:
      type: hex
      pattern: 75 73 65 72 6E 61 6D 65 20 62 61 63 6B 64 6F 6F 72 20 70 72 69 76 69 6C 65 67 65 20 31 35 20 73 65 63 72 65 74

  - id: jvm-iosxe-event-manager-const
    desc: JVM IOS-XE event manager const
    crit: suspicious
    conf: 0.93
    for: [jar, class, java_class, zip]
    if:
      type: hex
      pattern: 65 76 65 6E 74 20 6D 61 6E 61 67 65 72 20 61 70 70 6C 65 74

composite_rules:
  - id: iosxe-privileged-user-persistence
    desc: IOS-XE privileged user persistence
    crit: hostile
    conf: 0.97
    any:
      - id: iosxe-priv15-user
      - id: iosxe-restconf-local-user
    all:
      - id: objectives/execution/interpreter/network-device::iosxe-cli-config-command
    needs: 1

  - id: iosxe-eem-backdoor-persistence
    desc: IOS-XE EEM backdoor persistence
    crit: hostile
    conf: 0.97
    all:
      - id: iosxe-event-manager-applet
    any:
      - id: iosxe-priv15-user
      - id: iosxe-http-server-enable
      - id: objectives/credential-access/files/config::iosxe-include-credential-filter

  - id: jvm-iosxe-eem-backdoor-persistence
    desc: JVM IOS-XE EEM persistence
    crit: hostile
    conf: 0.97
    for: [jar, class, java_class, zip]
    all:
      - id: jvm-iosxe-event-manager-const
    any:
      - id: jvm-iosxe-priv15-user-const
      - id: objectives/credential-access/files/config::jvm-iosxe-credential-filter-const
