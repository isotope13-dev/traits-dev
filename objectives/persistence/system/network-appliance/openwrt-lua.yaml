defaults:
  platforms: [openwrt]
  for: [lua]
  attack: T1037
traits:
  - id: lua-hidden-cache-update-path
    desc: Lua hidden cache update path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.cache_update
  - id: lua-rc-local-file-write
    desc: Lua writes through a file API
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'io\.open.{0,80}rc\.local|rc\.local.{0,80}:write\('
  - id: lua-rc-local-shell-write
    desc: Shell command modifies rc.local
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '>>\s*/etc/rc\.local|sed\s+-i.{0,80}rc\.local'
  - id: lua-crontab-install
    desc: Lua crontab install
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'crontab\s+-|crontab\s+-l'
    unless:
      - id: well-known/app/neovim::runtime-code
composite_rules:
  - id: lua-rc-local-inject
    desc: Lua rc.local boot injection
    crit: suspicious
    conf: 0.9
    near_lines: 12
    all:
      - id: objectives/persistence/system/init/boot::etc-rc-local
    any:
      - id: lua-rc-local-file-write
      - id: lua-rc-local-shell-write
  - id: openwrt-lua-firmware-boot-persistence
    desc: OpenWrt Lua firmware boot persistence
    crit: hostile
    conf: 0.97
    all:
      - id: lua-hidden-cache-update-path
    any:
      - id: lua-rc-local-inject
      - id: lua-crontab-install
      - id: objectives/persistence/system/network-appliance::openwrt-sysupgrade-preserve
    needs: 2
