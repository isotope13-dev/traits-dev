defaults:
  platforms: [routeros, appliance, unix]
  for: [go]
  attack: T1098

traits:
  - id: routeros-go-service-set-call
    desc: Go RouterOS service set call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'RunSynt\([\s\S]{0,260}resolveCmd\("service"\)'

  - id: routeros-go-public-service-bind
    desc: Go RouterOS public service bind
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 0.0.0.0/0

  - id: routeros-go-vpn-cert-disabled
    desc: Go RouterOS VPN cert disabled
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: require-client-certificate

composite_rules:
  - id: routeros-go-service-exposure
    desc: Go RouterOS service exposure
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-go-service-set-call
      - id: routeros-go-public-service-bind

  - id: routeros-go-vpn-auth-weakening
    desc: Go RouterOS VPN auth weakening
    crit: hostile
    conf: 0.97
    all:
      - id: routeros-go-service-set-call
      - id: routeros-go-vpn-cert-disabled
