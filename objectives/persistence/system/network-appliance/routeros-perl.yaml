defaults:
  platforms: [routeros, appliance, unix]
  for: [perl]
  attack: T1053.003

traits:
  - id: perl-routeros-scheduler-file
    desc: Perl RouterOS scheduler file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/routeros/scheduler.d/miner.sch

  - id: perl-root-crontab-self-run
    desc: Perl root crontab self run
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/var/spool/cron/crontabs/root[\s\S]{0,260}/usr/bin/perl \$self'

  - id: perl-miner-init-script
    desc: Perl miner init script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/init.d/S99miner

composite_rules:
  - id: perl-routeros-miner-persistence
    desc: Perl RouterOS miner persistence
    crit: hostile
    conf: 0.98
    all:
      - id: perl-routeros-scheduler-file
      - id: perl-root-crontab-self-run
      - id: perl-miner-init-script
