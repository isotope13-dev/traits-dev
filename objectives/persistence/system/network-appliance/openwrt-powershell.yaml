defaults:
  platforms: [openwrt, windows]
  for: [powershell]
  attack: T1543.002

traits:
  - id: openwrt-powershell-init-script-write
    desc: OpenWrt PowerShell writes init script
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\|\s*Set-Content\s+\$[A-Za-z0-9_]*(BootScript|InitScript|Service)'
  - id: openwrt-powershell-initd-enable
    desc: OpenWrt PowerShell enables init.d service
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: '&\s*/etc/init\.d/[A-Za-z0-9_.-]{1,48}\s+enable'
  - id: openwrt-powershell-hidden-service
    desc: OpenWrt PowerShell hidden service path
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '/tmp/\.[A-Za-z0-9_.-]{3,48}/\.[A-Za-z0-9_.-]{3,48}\.sh'
  - id: openwrt-powershell-rc-local-profile
    desc: "OpenWrt PS rc.local profile persistence"
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(Add-Content|Set-Content)[\s\S]{0,160}(/etc/rc\.local|/etc/profile)'

composite_rules:
  - id: openwrt-powershell-initd-persistence
    desc: OpenWrt PowerShell init.d persistence
    crit: hostile
    conf: 0.96
    all:
      - id: openwrt-powershell-init-script-write
      - id: openwrt-powershell-initd-enable
      - id: openwrt-powershell-hidden-service
    any:
      - id: micro-behaviors/fs/file/write/direct::powershell-set-content-call
      - id: openwrt-powershell-rc-local-profile
    needs: 1
