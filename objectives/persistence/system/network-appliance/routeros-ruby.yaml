defaults:
  platforms: [routeros, appliance, unix]
  for: [ruby]
  attack: T1053.003

traits:
  - id: ruby-routeros-scheduler-paths
    desc: Ruby RouterOS scheduler paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/\.routeros/scheduler\.conf[\s\S]{0,120}/etc/cron\.d/routeros-agent'

  - id: ruby-routeros-login-script-paths
    desc: Ruby RouterOS login script paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/\.routeros/login-script\.rsc[\s\S]{0,120}/etc/profile\.d/99-system-check\.sh'

  - id: ruby-routeros-agent-config
    desc: Ruby RouterOS agent config
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /.routeros_agent.conf

composite_rules:
  - id: ruby-routeros-scheduler-persistence
    desc: Ruby RouterOS scheduler persistence
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-routeros-scheduler-paths
      - id: ruby-routeros-login-script-paths
      - id: ruby-routeros-agent-config
