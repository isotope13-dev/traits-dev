defaults:
  platforms: [unix]
  for: [shell]
  attack: T1547

traits:
  - id: csp-mount-script-path
    desc: Cisco CSP mount script path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /etc/rc.d/rc.local.d/CSP_MOUNT
  - id: cisco-lina-cs-launch
    desc: Cisco lina_cs payload launch
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(/usr/bin/)?lina_cs\b'
  - id: samcore-log-source
    desc: Cisco samcore log payload source
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: /opt/cisco/platform/logs/var/log/svc_samcore.log

composite_rules:
  - id: cisco-csp-mount-payload-install
    desc: Cisco boot hook installs lina payload
    crit: hostile
    conf: 0.99
    all:
      - id: csp-mount-script-path
      - id: cisco-lina-cs-launch
    any:
      - id: samcore-log-source
      - id: micro-behaviors/fs/file/move::mv-log-to-system-bin
      - id: micro-behaviors/fs/file/move::quiet-mv-chmod-executable
    needs: 2
