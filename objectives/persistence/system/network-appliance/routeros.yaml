defaults:
  platforms: [routeros]
  for: [javascript, typescript]
  attack: T1053
  mbc: OB0007

traits:
  - id: routeros-system-script-add
    desc: RouterOS system script creation
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/system script add|api\.menu\([''"]/system/script[''"]\)\.add)'
  - id: routeros-system-scheduler-add
    desc: RouterOS scheduler creation
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/system scheduler add|api\.menu\([''"]/system/scheduler[''"]\)\.add)'
  - id: routeros-fetch-command
    desc: RouterOS tool fetch command
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: /tool fetch
  - id: routeros-script-run-event
    desc: RouterOS scheduler runs script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /system/script run

composite_rules:
  - id: routeros-script-scheduler-backdoor
    desc: RouterOS script scheduler backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-system-script-add
      - id: routeros-system-scheduler-add
    any:
      - id: routeros-fetch-command
      - id: routeros-script-run-event
