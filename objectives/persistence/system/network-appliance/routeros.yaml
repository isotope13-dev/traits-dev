defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, pyc, javascript]
  attack: T1053
  mbc: OB0007

composite_rules:
  - id: routeros-script-scheduler-backdoor
    desc: RouterOS script scheduler backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/autorun/scheduled::routeros-system-script-add
      - id: micro-behaviors/os/autorun/scheduled::routeros-system-scheduler-add
    any:
      - id: micro-behaviors/communications/http/download/routeros::routeros-fetch-command
      - id: micro-behaviors/os/autorun/scheduled::routeros-script-run

  - id: routeros-privileged-scheduler-backdoor
    desc: RouterOS privileged scheduler backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/autorun/scheduled::routeros-system-script-add
      - id: micro-behaviors/os/autorun/scheduled::routeros-system-scheduler-add
      - id: micro-behaviors/os/security/policy::routeros-privileged-script-policy
