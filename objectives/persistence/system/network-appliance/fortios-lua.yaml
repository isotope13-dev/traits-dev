defaults:
  platforms: [fortios]
  for: [lua]
  attack: T1053

traits:
  - id: fortios-task-edit-config
    desc: FortiOS task-edit config
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: config system task-edit

  - id: fortios-task-execute-action
    desc: FortiOS task execute action
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: set action execute

composite_rules:
  - id: fortios-lua-task-persistence
    desc: FortiOS Lua task persistence
    crit: hostile
    conf: 0.98
    all:
      - id: fortios-task-edit-config
      - id: fortios-task-execute-action
      - id: objectives/evasion/hijack-execution-flow/loader::lua-persist-loader-path
