defaults:
  platforms: [netscaler, appliance, unix]
  for: [scripts, binaries, go, java, kotlin, csharp, swift]
  attack: T1053

traits:
  - id: netscaler-startupscript-directive
    desc: NetScaler startupScript directive
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: add ns startupScript

  - id: netscaler-flash-config-path
    desc: NetScaler flash config path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/flash/(ns_?config|boot|ns\.conf)'

  - id: netscaler-rc-nsf-path
    desc: NetScaler rc.nsf path
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: /nsconfig/rc.nsf

  - id: netscaler-rc-nsf-interpreter
    desc: NetScaler rc.nsf interpreter
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/bin/(perl|sh|bash)[\s\S]{0,120}netscaler'

  - id: netscaler-nsroot-cron-path
    desc: NetScaler nsroot cron path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/var/spool/cron/crontabs/(root|nsroot)'

  - id: netscaler-hidden-agent-path
    desc: NetScaler hidden agent path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tmp/\.(netscaler_update|netscaler_health|ns-health)'

composite_rules:
  - id: netscaler-rc-nsf-persistence
    desc: NetScaler rc.nsf persistence
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-rc-nsf-path
      - id: netscaler-rc-nsf-interpreter

  - id: netscaler-flash-startup-persistence
    desc: NetScaler flash startup persistence
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-startupscript-directive
      - id: netscaler-flash-config-path
    any:
      - id: netscaler-hidden-agent-path

  - id: netscaler-nsroot-cron-persistence
    desc: NetScaler nsroot cron persistence
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-nsroot-cron-path
    any:
      - id: netscaler-hidden-agent-path
      - id: objectives/exfiltration/stealer/credential/network-appliance::netscaler-nsconfig-path
