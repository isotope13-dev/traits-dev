defaults:
  platforms: [routeros, appliance, unix]
  for: [objc, elf]
  attack: T1053.003

traits:
  - id: objc-routeros-rsc-persistence-path
    desc: ObjC RouterOS RSC persistence path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .routeros-persistence.rsc

  - id: objc-routeros-script-scheduler
    desc: ObjC RouterOS script scheduler
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/system script[\s\S]{0,300}/system scheduler'

  - id: objc-routeros-base64-script
    desc: ObjC RouterOS base64 script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/system script[\s\S]{0,300}base64 -d'

composite_rules:
  - id: objc-routeros-rsc-persistence
    desc: ObjC RouterOS RSC persistence
    crit: hostile
    conf: 0.98
    all:
      - id: objc-routeros-rsc-persistence-path
      - id: objc-routeros-script-scheduler
      - id: objc-routeros-base64-script
