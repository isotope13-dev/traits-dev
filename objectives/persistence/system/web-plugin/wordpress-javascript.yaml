# Silent WordPress plugin installation from client-side JavaScript.
#
# After taking over an admin session, supply-chain payloads drop a self-hiding
# PHP backdoor by programmatically driving the wp-admin plugin uploader:
# a fetch() POST of a FormData body to `update.php?action=upload-plugin`.
# The legitimate uploader is a user-initiated <form> submit with a page reload;
# a delivered script that uploads a plugin via fetch+FormData is installing a
# backdoor (T1505.003 web shell persistence).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1505.003
  mbc: F0000

traits:
  - id: wp-plugin-upload-action
    desc: WordPress plugin upload action endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'action=upload-plugin'

composite_rules:
  - id: js-wordpress-silent-plugin-install
    desc: Client JS uploads WordPress plugin via fetch+FormData
    crit: hostile
    conf: 0.95
    all:
      - id: wp-plugin-upload-action
      - id: micro-behaviors/communications/http/upload::form-data-new
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
    near_bytes: 1500
