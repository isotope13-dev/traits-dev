defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1546.004

traits:
  - id: node-backdoor-monitor-alias-text
    desc: Backdoor shell alias text
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'alias\s+[A-Za-z0-9_-]+\s*=\s*[^\n]{0,100}\bbackdoor\b'
      case_insensitive: true

composite_rules:
  - id: node-bashrc-backdoor-install
    desc: Node persists monitored backdoor alias in bashrc
    crit: hostile
    conf: 0.99
    all:
      - id: node-backdoor-monitor-alias-text
      - id: micro-behaviors/process/interpreter/shell::shell-init-path
      - id: micro-behaviors/fs/write/file/direct::append-file-sync
