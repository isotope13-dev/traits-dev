defaults:
  platforms: [freebsd, unix]
  for: [php]
  attack: T1553.004

traits:
  - id: freebsd-ca-cert-store-path
    desc: FreeBSD CA certificate store path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /usr/local/etc/ssl/certs

  - id: php-openssl-ca-generation
    desc: PHP generates self-signed CA cert
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: openssl req -new -x509

  - id: php-cert-store-rehash-command
    desc: PHP rehashes CA certificate store
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: c_rehash

composite_rules:
  - id: php-freebsd-ca-trust-persistence
    desc: PHP persists CA in FreeBSD trust store
    crit: hostile
    conf: 0.98
    all:
      - id: freebsd-ca-cert-store-path
      - id: php-openssl-ca-generation
      - id: php-cert-store-rehash-command

