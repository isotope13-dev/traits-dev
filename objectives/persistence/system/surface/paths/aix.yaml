defaults:
  platforms: [aix, unix]
  for: [php, shell, c, cpp, elf]
  attack: T1543
composite_rules:
  - id: aix-inittab-persistence
    desc: AIX persistence via /etc/inittab
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/path/config/system::etc-inittab
      - id: micro-behaviors/fs/file/write/direct::php-file-write
  - id: aix-rclocal-persistence
    desc: AIX persistence via /etc/rc.local
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/path/config/system::etc-rc-local
      - id: micro-behaviors/fs/file/write/direct::php-file-write
