# macOS persistence surfaces inspired by the macOS Persistence Cheatsheet.
# Atoms here are objective-level because each names a durable persistence
# location, policy surface, or registration mechanism.
defaults:
  platforms: [macos]
  for: [scripts, binaries]
  attack: T1547
traits:
- id: btm-store
  desc: Background Task Management store
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: 'BackgroundItems-v[0-9]+\.btm|sfltool\s+dumpbtm'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/macos-benign/
  - id: well-known/app/macos-benign/
  - id: well-known/app/gitbucket
  - id: well-known/app/lulu
  - id: metadata/file/string/artifact::vagrant-machine-communicate-marker
- id: smappservice-api--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: SMAppService
  count_max: 1031911
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/openssl/
  - id: well-known/app/openssl::shlib-wrap-basename
  - id: well-known/app/macos-benign/
- id: smappservice-api--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: SMLoginItemSetEnabled
  count_max: 1031912
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: embedded-loginitems-path
  desc: Embedded LoginItems helper path
  crit: suspicious
  conf: 0.88
  if:
    type: text
    substr: Contents/Library/LoginItems
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
- id: privileged-helper-tools-path
  desc: PrivilegedHelperTools persistence path
  crit: suspicious
  conf: 0.9
  attack: T1543.004
  if:
    type: text
    substr: /Library/PrivilegedHelperTools
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/ukelele::ukelele-release-member
  - type: text
    substr: '"/Library/PreferencePanes"'
- id: app-bundled-launchd-path
  desc: App-bundled launchd job path
  crit: suspicious
  conf: 0.88
  attack: T1543.004
  if:
    type: text
    regex: 'Contents/Library/Launch(Daemons|Agents)'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: ssh-authorized-keys-macos
  desc: macOS authorized_keys persistence path
  crit: suspicious
  conf: 0.86
  attack: T1098.004
  if:
    type: text
    regex: '(/Users/[^/\s]{1,80}|/var/root)/\.ssh/authorized_keys\b'
  not:
  - substr: machine.communicate
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/calvyn-code
  - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
- id: ssh-rc-path
  desc: SSH rc session hook
  crit: suspicious
  conf: 0.9
  attack: T1037.004
  if:
    type: text
    regex: '(/Users/[^/\s]{1,80}|/var/root|~)/\.ssh/rc\b|/etc/ssh/sshrc\b'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: authorizationdb-rule
  desc: AuthorizationDB persistence surface
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'authorizationdb|/var/db/auth\.db|SecurityAgentPlugins'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/ukelele::ukelele-release-member
- id: hidden-local-account
  desc: Hidden local account persistence
  crit: suspicious
  conf: 0.88
  attack: T1136.001
  if:
    type: text
    regex: 'dscl\s+\.\s+-create\s+/Users/\S+\s+IsHidden\s+1|Hide500Users'
  unless:
  - id: metadata/file/profile/identity::generated-attack-map-context
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: remote-login-enabled
  desc: Remote Login service enabled
  crit: suspicious
  conf: 0.84
  attack: T1021.004
  if:
    type: text
    regex: 'systemsetup\s+-setremotelogin\s+on|com\.apple\.access_ssh'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
- id: at-scheduled-jobs-path
  desc: macOS at/atrun job spool path
  crit: suspicious
  conf: 0.86
  attack: T1053
  if:
    type: text
    regex: '(?i)/var/at/(jobs|spool)'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: atrun-command
  desc: Invokes the macOS atrun scheduler service
  crit: suspicious
  conf: 0.86
  attack: T1053
  if:
    type: text
    regex: '(?i)(^|[;&|])\s*(/usr/sbin/)?atrun(\s|$)'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: at-schedule-command
  desc: Schedules a command with macOS at
  crit: suspicious
  conf: 0.86
  # `at HH:MM` is shell command syntax; timestamps in HTML/JavaScript prose
  # are not scheduler invocations.
  for: [shell]
  attack: T1053
  if:
    type: text
    regex: '(?i)(^|[;&|])\s*at\s+[0-9]{1,2}:[0-9]{2}\b'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: periodic-job-path--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '(?i)(cp|mv|install|mkdir|touch|tee|cat|echo|printf).{0,80}/etc/periodic'
  count_max: 1031929
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: periodic-job-path--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '(?i)(cp|mv|install|mkdir|touch|tee|cat|echo|printf).{0,80}/usr/libexec/periodic'
  count_max: 1031930
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: periodic-job-path--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\bperiodic\s+(daily|weekly|monthly)'
  count_max: 1031931
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: emond-rule-path
  desc: emond rule persistence path
  crit: suspicious
  conf: 0.9
  attack: T1546.014
  if:
    type: text
    regex: '/etc/emond\.d|/var/db/emondClients|emond\.plist'
  unless:
  - id: metadata/file/profile/identity::generated-attack-map-context
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: calendar-alert-script-fragment
  desc: Calendar alert script marker
  crit: component
  conf: 0.84
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - type: basename
    regex: '.{0,50}[-_.]tests?\.(c|m)?[jt]sx?(\.snap)?$'
  if:
    type: text
    regex: 'Calendar[/ ].{0,40}(Alert|Script)'
- id: ical-bundle-id
  desc: Apple Calendar bundle identifier
  crit: component
  conf: 0.88
  if:
    type: text
    substr: com.apple.iCal
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: system-extension-persistence--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: systemextensionsctl
  count_max: 1031935
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: system-extension-persistence--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: OSSystemExtensionRequest
  count_max: 1031936
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: user-kext-persistence-path
  desc: user-writable kernel extension path
  crit: component
  conf: 0.88
  attack: T1547.006
  if:
    type: text
    regex: '(^|[^A-Za-z0-9_./~-])(/Library|~/Library)/Extensions/[^\s]{1,120}\.kext\b'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - type: text
    substr: kextfind
- id: kext-management-command
  desc: kernel extension management command
  crit: component
  conf: 0.86
  attack: T1547.006
  if:
    type: text
    regex: '\bkext(load|util)\b'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - type: text
    substr: kextfind
- id: application-support-helper--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(?i)(/Library|~/Library)/Application Support/[^\n/]{1,80}/(Helper|Agent)([/\\s]|$)'
  count_max: 1031943
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: application-support-helper--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(?i)(/Library|~/Library)/Application Support/[^\n/]{1,80}/(Daemon|Updater)([/\\s]|$)'
  count_max: 1031944
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: application-startup-script--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(Startup|Login|Launch)[ -]?Script'
  count_max: 1031945
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: application-startup-script--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: 'Contents/Resources/Scripts/[^\s]{1,120}\.(sh|scpt|js|py)'
  count_max: 1031946
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: app-preference-trigger
  desc: App preference trigger persistence
  crit: suspicious
  conf: 0.82
  if:
    type: text
    regex: 'Preferences/[A-Za-z0-9_.-]+\.plist.{0,120}(Script|Path|Command|Executable)'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: launchservices-handler--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: CFBundleDocumentTypes
  count_max: 1031949
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: launchservices-handler--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: LSHandlers
  count_max: 1031950
  unless:
  - type: text
    substr: LSHandlerRoleAll
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: launchservices-handler--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: LSHandlerURLScheme
  count_max: 1031951
- id: installer-package-script
  desc: installer package script hook
  crit: notable
  conf: 0.86
  attack: T1546.016
  # macOS Installer (.pkg) flat-package layout runs `Scripts/preinstall` and
  # `Scripts/postinstall` as root at install time (T1546.016). Anchor on that
  # path form: a bare `postinstall` word also matches the npm package.json
  # lifecycle key, an unrelated mechanism already covered by
  # supply-chain/install-hook.
  if:
    type: text
    regex: 'Scripts/(preinstall|postinstall)'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: folder-action-script
  desc: Folder Action script persistence
  crit: suspicious
  conf: 0.88
  attack: T1546
  if:
    type: text
    regex: 'Folder Action Scripts|FolderActionsDispatcher|com\.apple\.FolderActions'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: automator-service-workflow
  desc: References Automator workflow bundle
  crit: notable
  conf: 0.84
  if:
    type: text
    regex: 'Automator|/Library/Services/[^\s]{1,120}\.workflow'
  downgrade:
    any:
    - id: metadata/library/structure::js-large-module-bundle
    - id: micro-behaviors/process/interpreter/vm/
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: mail-applescript-rule
  desc: Mail AppleScript rule
  crit: suspicious
  conf: 0.88
  attack: T1546
  if:
    type: text
    regex: 'SyncedRules\.plist|RulesActiveState\.plist|Apply AppleScript'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: dyld-lsenvironment-injection--rx-21
  desc: DYLD injection variable in LSEnvironment
  crit: suspicious
  conf: 0.9
  for: [plist]
  if:
    type: text
    regex: '(?i)\bDYLD_[A-Z_]+\b'
  count_max: 1031959
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: dyld-lsenvironment-injection--rx-22
  desc: DYLD insertion environment assignment
  crit: component
  conf: 0.9
  for: [shell, plist]
  if:
    type: text
    regex: '(^|[;\n]\s*)(export\s+)?DYLD_INSERT_LIBRARIES\s*=\s*[^\s;]{1,160}'
  count_max: 1031960
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: dylib-hijack-proxy
  desc: Mach-O dynamic library interposition marker
  crit: notable
  conf: 0.86
  attack: T1574.006
  if:
    type: text
    substr: '__DATA,__interpose'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: metadata/build/make/
  downgrade:
    any:
    - id: well-known/tool/development/mozilla::crash-helper-server
    - id: metadata/build/make/
- id: startupitems-path
  desc: StartupItems legacy persistence
  crit: suspicious
  conf: 0.88
  attack: T1037.005
  if:
    type: text
    regex: '/Library/StartupItems|/System/Library/StartupItems'
  unless:
  - id: metadata/file/profile/identity::generated-attack-map-context
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - type: text
    substr: GitBucket
  - id: well-known/app/homebrew::source-tree
  - id: well-known/app/homebrew::source-tree-macos
  - id: well-known/app/wazuh/
- id: rc-script-path
  desc: macOS rc script path reference
  crit: notable
  conf: 0.84
  attack: T1037
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/homebrew::source-tree
  - id: well-known/app/homebrew::source-tree-macos
  - type: path
    substr: linuxbrew
  - type: text
    substr: Homebrew
  - id: well-known/app/adguardhome::release-path
  - type: text
    substr: "#!/bin/sh /etc/rc.common"
  if:
    type: text
    regex: '/etc/(rc\.common|rc\.netboot)\b'

composite_rules:
- id: macos-persistence-surface
  desc: macOS persistence surface
  crit: notable
  conf: 0.84
  any:
  - id: btm-store
  - id: smappservice-api
  - id: embedded-loginitems-path
  - id: privileged-helper-tools-path
  - id: app-bundled-launchd-path
  - id: ssh-rc-path
  - id: authorizationdb-rule
  - id: hidden-local-account
  - id: remote-login-enabled
  - id: at-scheduled-jobs-path
  - id: atrun-command
  - id: at-schedule-command
  - id: periodic-job-path
  - id: emond-rule-path
  - id: calendar-alert-script
  - id: system-extension-persistence
  - id: kext-persistence-path
  - id: objectives/persistence/system/surface/extension
  - id: application-support-helper
  - id: application-startup-script
  - id: app-preference-trigger
  - id: launchservices-handler
  - id: installer-package-script
  - id: folder-action-script
  - id: automator-service-workflow
  - id: mail-applescript-rule
  - id: dylib-hijack-proxy
  - id: startupitems-path
  - id: rc-script-path
  - id: objectives/persistence/system/surface/policy::configuration-profile
  - id: objectives/persistence/system/surface/policy::managed-login-items-payload
  - id: objectives/persistence/system/surface/policy::declarative-background-task
  downgrade:
    any:
    - id: metadata/signed/platform
    - id: metadata/signed/developer
    - id: metadata/signed/app-store
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/tool/detection/
  - id: well-known/tool/development/anthropic-claude-agent/
- id: non-apple-high-value-persistence
  desc: Non-Apple high-value persistence
  crit: suspicious
  conf: 0.88
  any:
  - id: privileged-helper-tools-path
  - id: app-bundled-launchd-path
  - id: authorizationdb-rule
  - id: hidden-local-account
  - id: system-extension-persistence
  - id: kext-persistence-path
  - id: objectives/persistence/system/surface/policy::tcc-accessibility-grant
  - id: dyld-lsenvironment-injection
  - id: dylib-hijack-proxy
  - id: objectives/persistence/system/surface/policy::mdm-pppc-payload
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: metadata/signed/platform::apple
  - id: well-known/app/ukelele::ukelele-release-member
  - id: well-known/app/google-santa::source-tree
- id: kext-persistence-path
  desc: kernel extension persistence
  crit: suspicious
  conf: 0.88
  attack: T1547.006
  any:
  - id: user-kext-persistence-path
  - id: kext-management-command
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
  - id: well-known/app/google-santa::source-tree
  # Wikipedia / docs prose citing kextload is not a persistence implant.
  - id: metadata/file/profile/identity::static-html-shell
- id: applescript-persistence
  desc: AppleScript alongside macOS autorun management
  crit: notable
  conf: 0.9
  all:
  - id: macos-persistence-surface
  any:
  - id: micro-behaviors/process/create/script/osascript
  - id: micro-behaviors/process/create/script/apple-event
  - id: mail-applescript-rule
  - id: folder-action-script
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: objectives/supply-chain/trojanized/app/debug-probe/
  - id: micro-behaviors/os/sysinfo/platform/browser::launchservices-default-browser-read
  - id: well-known/app/password-store::applescript-example-helper
- id: calendar-alert-script
  desc: Calendar alert script hook
  crit: suspicious
  conf: 0.88
  all:
  - id: calendar-alert-script-fragment
  - id: ical-bundle-id
  near_bytes: 200
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: objectives/supply-chain/trojanized/app/debug-probe/
- id: smappservice-api
  desc: ServiceManagement login item API
  crit: notable
  conf: 0.88
  any:
  - id: smappservice-api--rx-1
  - id: smappservice-api--rx-2
  - id: objectives/persistence/login/items::session-loginitems-key
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: periodic-job-path
  desc: periodic job persistence path
  crit: suspicious
  conf: 0.88
  attack: T1053
  any:
  - id: periodic-job-path--rx-7
  - id: periodic-job-path--rx-8
  - id: periodic-job-path--rx-9
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: metadata/package/quality/false-positives::opg-htmltopdf-dockerfile-path
  - id: metadata/package/quality/false-positives::opg-hardening-script-path
- id: system-extension-persistence
  desc: System Extension persistence
  crit: suspicious
  conf: 0.88
  any:
  - id: system-extension-persistence--rx-11
  - id: system-extension-persistence--rx-12
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: application-support-helper
  desc: Application Support helper persistence path
  crit: suspicious
  conf: 0.82
  any:
  - id: application-support-helper--rx-13
  - id: application-support-helper--rx-14
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: application-startup-script
  desc: Application startup script persistence
  crit: notable
  conf: 0.82
  any:
  - id: application-startup-script--rx-15
  - id: application-startup-script--rx-16
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: launchservices-handler
  desc: LaunchServices handler registration
  crit: notable
  conf: 0.86
  attack: T1546
  any:
  - id: metadata/file/policy/config/deeplink::ios-url-types-config
  - id: launchservices-handler--rx-18
  - id: launchservices-handler--rx-19
  - id: launchservices-handler--rx-20
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: objectives/supply-chain/trojanized/app/debug-probe/
  - id: micro-behaviors/os/sysinfo/platform/browser::launchservices-default-browser-read
- id: dyld-lsenvironment-injection
  desc: DYLD LSEnvironment injection
  crit: suspicious
  conf: 0.9
  attack: T1574.006
  # A raw DYLD string in a native runtime is only a string-table marker, not
  # an injection.  Treat the configuration/script surfaces as the behavior.
  for: [shell, plist]
  any:
  - id: dyld-lsenvironment-injection--rx-21
  - id: dyld-lsenvironment-injection--rx-22
  downgrade:
    any:
    - id: well-known/lib/nokogiri::library-reference
    - id: objectives/supply-chain/trojanized/app/debug-probe/
    - id: well-known/lib/xml2
    - id: well-known/lib/xslt
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/openssl::shlib-wrap-basename
  - id: metadata/build/autotools::xorg-macros-m4
  - id: well-known/tool/development/go-toolchain::go-toolchain-distribution
  - id: well-known/app/sudo::source-tree
