# macOS persistence surfaces inspired by the macOS Persistence Cheatsheet.
# Atoms here are objective-level because each names a durable persistence
# location, policy surface, or registration mechanism.
defaults:
  platforms: [macos]
  for: [scripts, binaries]
  attack: T1547
traits:
- id: btm-store
  desc: Background Task Management store
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: 'BackgroundItems-v[0-9]+\.btm|sfltool\s+dumpbtm'
- id: smappservice-api--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: SMAppService
  count_max: 1031911
- id: smappservice-api--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: SMLoginItemSetEnabled
  count_max: 1031912
- id: smappservice-api--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: kLSSharedFileListSessionLoginItems
  count_max: 1031913
- id: embedded-loginitems-path
  desc: Embedded LoginItems helper path
  crit: suspicious
  conf: 0.88
  if:
    type: text
    substr: Contents/Library/LoginItems
- id: privileged-helper-tools-path
  desc: PrivilegedHelperTools persistence path
  crit: suspicious
  conf: 0.9
  attack: T1543.004
  if:
    type: text
    substr: /Library/PrivilegedHelperTools
- id: app-bundled-launchd-path
  desc: App-bundled launchd job path
  crit: suspicious
  conf: 0.88
  attack: T1543.004
  if:
    type: text
    regex: 'Contents/Library/Launch(Daemons|Agents)'
- id: launchd-disabled-override
  desc: launchd disabled-state override
  crit: suspicious
  conf: 0.86
  attack: T1543.004
  if:
    type: text
    regex: '/var/db/com\.apple\.xpc\.launchd|launchctl\s+(enable|disable)\b'
- id: ssh-authorized-keys-macos
  desc: macOS authorized_keys persistence path
  crit: suspicious
  conf: 0.86
  attack: T1098.004
  if:
    type: text
    regex: '(/Users/[^/\s]{1,80}|/var/root|~)/\.ssh/authorized_keys\b'
- id: ssh-rc-path
  desc: SSH rc session hook
  crit: suspicious
  conf: 0.9
  attack: T1037.004
  if:
    type: text
    regex: '(/Users/[^/\s]{1,80}|/var/root|~)/\.ssh/rc\b|/etc/ssh/sshrc\b'
- id: sudoers-policy-path
  desc: sudoers policy persistence path
  crit: suspicious
  conf: 0.86
  attack: T1548.003
  if:
    type: text
    regex: '(^|[^A-Za-z0-9_.-])/etc/sudoers(\.d/)?|!authenticate'
- id: authorizationdb-rule
  desc: AuthorizationDB persistence surface
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'authorizationdb|/var/db/auth\.db|SecurityAgentPlugins'
- id: hidden-local-account
  desc: Hidden local account persistence
  crit: suspicious
  conf: 0.88
  attack: T1136.001
  if:
    type: text
    regex: 'dscl\s+\.\s+-create\s+/Users/\S+\s+IsHidden\s+1|Hide500Users'
- id: remote-login-enabled
  desc: Remote Login service enabled
  crit: suspicious
  conf: 0.84
  attack: T1021.004
  if:
    type: text
    regex: 'systemsetup\s+-setremotelogin\s+on|com\.apple\.access_ssh'
- id: shell-init-zsh--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '(\.zshrc|\.zprofile)\b'
  count_max: 1031924
- id: shell-init-zsh--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '(\.zlogin|/etc/zshrc)\b'
  count_max: 1031925
- id: shell-init-zsh--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '(/etc/zprofile)\b'
  count_max: 1031926
- id: shell-init-bash
  desc: bash shell init file reference
  crit: notable
  conf: 0.84
  attack: T1037.004
  if:
    type: text
    regex: '(\.bash_profile|\.bashrc|\.profile|/etc/profile)\b'
- id: at-atrun-job
  desc: at atrun scheduled job
  crit: suspicious
  conf: 0.86
  attack: T1053
  if:
    type: text
    regex: '\batrun\b|/var/at/(jobs|spool)|\bat\s+\d{1,2}:\d{2}\b'
- id: periodic-job-path--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: /etc/periodic
  count_max: 1031929
- id: periodic-job-path--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: /usr/libexec/periodic
  count_max: 1031930
- id: periodic-job-path--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\bperiodic\s+(daily|weekly|monthly)'
  count_max: 1031931
- id: emond-rule-path
  desc: emond rule persistence path
  crit: suspicious
  conf: 0.9
  attack: T1546.014
  if:
    type: text
    regex: '/etc/emond\.d|/var/db/emondClients|emond\.plist'
- id: calendar-alert-script
  desc: Calendar alert script hook
  crit: suspicious
  conf: 0.84
  if:
    type: text
    regex: 'Calendar[/ ].{0,40}(Alert|Script)|com\.apple\.iCal'
- id: system-extension-persistence--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: SystemExtensions
  count_max: 1031934
- id: system-extension-persistence--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: systemextensionsctl
  count_max: 1031935
- id: system-extension-persistence--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: OSSystemExtensionRequest
  count_max: 1031936
- id: kext-persistence-path
  desc: kernel extension persistence
  crit: suspicious
  conf: 0.88
  attack: T1547.006
  if:
    type: text
    regex: '/Library/Extensions/[^\s]{1,120}\.kext|\bkext(load|util)\b'
- id: application-support-helper--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(/Library|~/Library)/Application Support/[^\n]{1,120}(Helper|Agent)'
  count_max: 1031943
- id: application-support-helper--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(/Library|~/Library)/Application Support/[^\n]{1,120}(Daemon|Updater)'
  count_max: 1031944
- id: application-startup-script--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(Startup|Login|Launch)[ -]?Script'
  count_max: 1031945
- id: application-startup-script--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: 'Contents/Resources/Scripts/[^\s]{1,120}\.(sh|scpt|js|py)'
  count_max: 1031946
- id: app-preference-trigger
  desc: App preference trigger persistence
  crit: suspicious
  conf: 0.82
  if:
    type: text
    regex: 'Preferences/[A-Za-z0-9_.-]+\.plist.{0,120}(Script|Path|Command|Executable)'
- id: launchservices-handler--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: CFBundleDocumentTypes
  count_max: 1031949
- id: launchservices-handler--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: LSHandlers
  count_max: 1031950
- id: launchservices-handler--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: LSHandlerURLScheme
  count_max: 1031951
- id: installer-package-script
  desc: installer package script hook
  crit: notable
  conf: 0.86
  attack: T1546.016
  if:
    type: text
    regex: 'Scripts/(preinstall|postinstall)|\b(preinstall|postinstall)\b'
- id: folder-action-script
  desc: Folder Action script persistence
  crit: suspicious
  conf: 0.88
  attack: T1546
  if:
    type: text
    regex: 'Folder Action Scripts|FolderActionsDispatcher|com\.apple\.FolderActions'
- id: automator-service-workflow
  desc: References Automator workflow bundle
  crit: notable
  conf: 0.84
  if:
    type: text
    regex: 'Automator|/Library/Services/[^\s]{1,120}\.workflow'
  downgrade:
    any:
    - id: metadata/library/structure::js-large-module-bundle
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
- id: mail-applescript-rule
  desc: Mail AppleScript rule
  crit: suspicious
  conf: 0.88
  attack: T1546
  if:
    type: text
    regex: 'SyncedRules\.plist|RulesActiveState\.plist|Apply AppleScript'
- id: dyld-lsenvironment-injection--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [macho, dylib, shell, plist]
  if:
    type: text
    substr: LSEnvironment
  count_max: 1031959
- id: dyld-lsenvironment-injection--rx-22
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [macho, dylib, shell, plist]
  if:
    type: text
    substr: DYLD_INSERT_LIBRARIES
  count_max: 1031960
- id: lc-load-dylib
  desc: LC_LOAD_DYLIB persistence
  crit: suspicious
  conf: 0.86
  attack: T1546.006
  if:
    type: text
    regex: 'LC_LOAD_DYLIB|install_name_tool.{0,80}-add_rpath'
- id: application-binary-modification
  desc: Application binary modification
  crit: suspicious
  conf: 0.86
  attack: T1546.006
  if:
    type: text
    regex: 'codesign\s+--remove-signature|install_name_tool.{0,80}(-change|-add_rpath|-delete_rpath)'
- id: dylib-hijack-proxy
  desc: Dylib hijacking or proxying
  crit: suspicious
  conf: 0.86
  attack: T1574.006
  if:
    type: text
    regex: 'DYLD_FALLBACK_LIBRARY_PATH|@rpath/[^\s]{1,80}\.dylib|__DATA,__interpose'
- id: startupitems-path
  desc: StartupItems legacy persistence
  crit: suspicious
  conf: 0.88
  attack: T1037.005
  if:
    type: text
    regex: '/Library/StartupItems|/System/Library/StartupItems'
- id: rc-script-path
  desc: macOS rc script persistence
  crit: suspicious
  conf: 0.84
  attack: T1037
  unless:
  - id: well-known/app/adguardhome::release-path
  if:
    type: text
    regex: '/etc/(rc\.common|rc\.local|rc\.netboot)\b'

composite_rules:
- id: macos-persistence-surface
  desc: macOS persistence surface
  crit: suspicious
  conf: 0.84
  any:
  - id: btm-store
  - id: smappservice-api
  - id: embedded-loginitems-path
  - id: privileged-helper-tools-path
  - id: app-bundled-launchd-path
  - id: launchd-disabled-override
  - id: ssh-rc-path
  - id: authorizationdb-rule
  - id: hidden-local-account
  - id: remote-login-enabled
  - id: shell-init-zsh
  - id: shell-init-bash
  - id: at-atrun-job
  - id: periodic-job-path
  - id: emond-rule-path
  - id: calendar-alert-script
  - id: system-extension-persistence
  - id: kext-persistence-path
  - id: objectives/persistence/system/surface/extension
  - id: application-support-helper
  - id: application-startup-script
  - id: app-preference-trigger
  - id: launchservices-handler
  - id: installer-package-script
  - id: folder-action-script
  - id: automator-service-workflow
  - id: mail-applescript-rule
  - id: lc-load-dylib
  - id: application-binary-modification
  - id: dylib-hijack-proxy
  - id: startupitems-path
  - id: rc-script-path
  - id: objectives/persistence/system/surface/policy::configuration-profile
  - id: objectives/persistence/system/surface/policy::managed-login-items-payload
  - id: objectives/persistence/system/surface/policy::declarative-background-task
  downgrade:
    any:
    - id: metadata/signed/platform
    - id: metadata/signed/developer
    - id: metadata/signed/app-store
- id: non-apple-high-value-persistence
  desc: Non-Apple high-value persistence
  crit: suspicious
  conf: 0.88
  any:
  - id: privileged-helper-tools-path
  - id: app-bundled-launchd-path
  - id: sudoers-policy-path
  - id: authorizationdb-rule
  - id: hidden-local-account
  - id: system-extension-persistence
  - id: kext-persistence-path
  - id: objectives/persistence/system/surface/policy::tcc-accessibility-grant
  - id: dyld-lsenvironment-injection
  - id: application-binary-modification
  - id: dylib-hijack-proxy
  - id: objectives/persistence/system/surface/policy::mdm-pppc-payload
  unless:
  - id: metadata/signed/platform::apple
- id: applescript-persistence
  desc: AppleScript-backed persistence
  crit: suspicious
  conf: 0.9
  all:
  - id: macos-persistence-surface
  any:
  - id: micro-behaviors/process/create/script/
  - id: mail-applescript-rule
  - id: folder-action-script
- id: smappservice-api
  desc: ServiceManagement login item API
  crit: suspicious
  conf: 0.88
  any:
  - id: smappservice-api--rx-1
  - id: smappservice-api--rx-2
  - id: smappservice-api--rx-3
- id: shell-init-zsh
  desc: zsh shell init file reference
  crit: notable
  conf: 0.84
  attack: T1037.004
  any:
  - id: shell-init-zsh--rx-4
  - id: shell-init-zsh--rx-5
  - id: shell-init-zsh--rx-6
- id: periodic-job-path
  desc: periodic job persistence path
  crit: suspicious
  conf: 0.88
  attack: T1053
  any:
  - id: periodic-job-path--rx-7
  - id: periodic-job-path--rx-8
  - id: periodic-job-path--rx-9
- id: system-extension-persistence
  desc: System Extension persistence
  crit: suspicious
  conf: 0.88
  any:
  - id: system-extension-persistence--rx-10
  - id: system-extension-persistence--rx-11
  - id: system-extension-persistence--rx-12
- id: application-support-helper
  desc: Application Support helper persistence path
  crit: suspicious
  conf: 0.82
  any:
  - id: application-support-helper--rx-13
  - id: application-support-helper--rx-14
- id: application-startup-script
  desc: Application startup script persistence
  crit: notable
  conf: 0.82
  any:
  - id: application-startup-script--rx-15
  - id: application-startup-script--rx-16
- id: launchservices-handler
  desc: LaunchServices handler registration
  crit: suspicious
  conf: 0.86
  attack: T1546
  any:
  - id: micro-behaviors/data/text/config/deeplink::ios-url-types-config
  - id: launchservices-handler--rx-18
  - id: launchservices-handler--rx-19
  - id: launchservices-handler--rx-20
- id: dyld-lsenvironment-injection
  desc: DYLD LSEnvironment injection
  crit: suspicious
  conf: 0.9
  attack: T1574.006
  for: [macho, dylib, shell, plist]
  any:
  - id: dyld-lsenvironment-injection--rx-21
  - id: dyld-lsenvironment-injection--rx-22
  downgrade:
    any:
    - id: well-known/lib/nokogiri::native-extension-bundle
    - id: well-known/lib/xml2
    - id: well-known/lib/xslt
