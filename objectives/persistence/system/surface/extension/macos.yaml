defaults:
  platforms: [macos]
  for: [scripts, binaries]
  attack: T1547
traits:
- id: native-messaging-host
  desc: browser native messaging host
  crit: suspicious
  conf: 0.88
  attack: T1176
  if:
    type: text
    regex: 'NativeMessagingHosts|native-messaging-hosts|allowed_origins'
- id: browser-extension-policy
  desc: browser extension policy persistence
  crit: suspicious
  conf: 0.84
  attack: T1176
  if:
    type: text
    regex: 'ExtensionInstallForcelist|policies\.json'
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
- id: safari-extension-surface
  desc: Safari extension surface path
  crit: suspicious
  conf: 0.82
  attack: T1176
  if:
    id: micro-behaviors/fs/path/application/browser::safari-extensions
- id: safari-extension-class-mention
  desc: Safari extension API class name
  crit: notable
  conf: 0.7
  attack: T1176
  if:
    type: text
    regex: 'Safari(App|Web)Extension|SFSafariExtension'
- id: finder-sync-extension
  desc: Finder Sync extension
  crit: suspicious
  conf: 0.84
  if:
    type: text
    regex: 'com\.apple\.FinderSync|FIFinderSync'
- id: application-plugin-path
  desc: application plug-in path
  crit: suspicious
  conf: 0.82
  if:
    type: text
    regex: 'Contents/PlugIns|/Library/(QuickLook|Spotlight|Internet Plug-Ins)'
- id: input-method-path
  desc: Input Method persistence path
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: '(/Library|~/Library)/Input Methods|\.inputplugin\b'
- id: screen-saver-bundle
  desc: Screen Saver bundle persistence
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: '(/Library|~/Library)/Screen Savers|\.saver\b'
