defaults:
  platforms: [macos]
  for: [scripts, binaries]
  attack: T1547
traits:
- id: safari-extension-surface
  desc: Safari extension surface path
  crit: suspicious
  conf: 0.82
  attack: T1176
  if:
    id: micro-behaviors/fs/path/application/browser::safari-extensions
  unless:
  - id: well-known/app/macos-benign/
- id: finder-sync-extension
  desc: Finder Sync extension
  crit: suspicious
  conf: 0.84
  if:
    type: text
    regex: 'com\.apple\.FinderSync|FIFinderSync'
- id: app-bundle-plugin-path
  desc: app bundle plug-in path
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(/Applications|~/Applications)/[^\n]{1,180}/Contents/PlugIns\b'
- id: library-bundle-plugin-path
  desc: Library bundle plug-in path
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '(^|[^A-Za-z])(/Library|~/Library)/[^\n]{1,180}/Contents/PlugIns\b'
- id: library-plugin-surface
  desc: Library plug-in persistence surface
  crit: component
  conf: 0.82
  if:
    type: text
    regex: '/Library/(QuickLook|Spotlight|Internet Plug-Ins)'
- id: screen-saver-bundle
  desc: Screen Saver bundle persistence
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: '(/Library|~/Library)/Screen Savers|[/\\][^/\\\s]{1,80}\.saver\b'
  unless:
  - id: metadata/library/finance::dartlab-finance-context
  - id: well-known/app/homebrew::source-tree
  - id: well-known/app/homebrew::source-tree-macos
  - type: path
    substr: linuxbrew
composite_rules:
- id: application-plugin-path
  desc: application plug-in path
  crit: suspicious
  conf: 0.82
  any:
  - id: app-bundle-plugin-path
  - id: library-bundle-plugin-path
  - id: library-plugin-surface
  unless:
  - id: well-known/app/macos-system-binaries
  - id: well-known/app/homebrew::source-tree
  - id: well-known/app/homebrew::source-tree-macos
