defaults:
  platforms: [macos]
  for: [scripts, binaries]
  attack: T1547
traits:
- id: tcc-accessibility-grant
  desc: TCC accessibility grant
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: 'kTCCServiceAccessibility|com\.apple\.TCC|TCC\.db'
  unless:
  - id: metadata/library/ai/
- id: apple-profile-identifier-field
  desc: Apple profile identifier field
  crit: component
  conf: 0.93
  for: [plist, xml]
  if:
    type: text
    substr: PayloadIdentifier
- id: apple-profile-type-field
  desc: Apple profile type field
  crit: component
  conf: 0.93
  for: [plist, xml]
  if:
    type: text
    substr: PayloadType
- id: apple-profile-uuid-field
  desc: Apple profile UUID field
  crit: component
  conf: 0.93
  for: [plist, xml]
  if:
    type: text
    substr: PayloadUUID

- id: managed-login-items-payload
  desc: Managed Login Items payload
  crit: suspicious
  conf: 0.88
  for: [plist, xml]
  if:
    type: text
    regex: 'com\.apple\.servicemanagement|Managed Login Items'
- id: declarative-background-task
  desc: Declarative managed background task
  crit: suspicious
  conf: 0.84
  for: [plist, xml]
  if:
    type: text
    regex: 'Declarative Device Management|Managed background task|backgroundtaskmanagementagent'
- id: mdm-pppc-payload
  desc: MDM PPPC payload
  crit: suspicious
  conf: 0.88
  for: [plist, xml]
  if:
    type: text
    regex: 'PrivacyPreferencesPolicyControl|com\.apple\.TCC\.configuration-profile-policy'
- id: mdm-certificate-payload
  desc: MDM certificate payload
  crit: suspicious
  conf: 0.82
  for: [plist, xml]
  if:
    type: text
    regex: 'com\.apple\.security\.root|PayloadType.{0,80}com\.apple\.security'
  unless:
  - id: well-known/app/packetfence::source-tree-path
  - type: text
    regex: 'Fleet conditional access|com\.fleetdm\.conditional-access'

composite_rules:
- id: configuration-profile
  desc: Apple configuration profile
  crit: suspicious
  conf: 0.92
  for: [plist, xml]
  all:
  - id: apple-profile-identifier-field
  - id: apple-profile-type-field
  - id: apple-profile-uuid-field
  unless:
  - id: well-known/app/anthropic-claude-code
  - id: well-known/app/packetfence::source-tree-path
  - id: metadata/package/quality/recognized-contexts::fleet-conditional-access-profile-marker
  - id: metadata/package/quality/false-positives::ios-proxy-template-profile
