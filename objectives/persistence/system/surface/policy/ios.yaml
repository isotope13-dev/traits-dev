defaults:
  platforms: [ios]
  for: [plist]
  attack: T1547

traits:
  - id: ios-proxy-mobileconfig
    desc: iOS proxy mobileconfig payload
    crit: suspicious
    conf: 0.92
    # Require the iOS configuration-profile plist context: `HTTPProxy` as a
    # `<key>` (or the com.apple proxy payload domain). Bare `HTTPProxy` matched
    # generic XML like Apigee's `<HTTPProxyConnection>` element, which is not an
    # Apple mobileconfig.
    if:
      type: text
      regex: '<key>\s*HTTPProxy|com\.apple\.(networksettings|proxy)'
    unless:
      - id: metadata/package/quality/false-positives::ios-proxy-template-profile

  - id: jvm-ios-config-profile-const
    desc: JVM iOS profile path constant
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 76 61 72 2F 6D 6F 62 69 6C 65 2F 4C 69 62 72 61 72 79 2F 43 6F 6E 66 69 67 75 72 61 74 69 6F 6E 50 72 6F 66 69 6C 65 73

  - id: jvm-ios-http-proxy-const
    desc: JVM HTTPProxy key constant
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 48 54 54 50 50 72 6F 78 79
    unless:
      - id: well-known/tool/reverse-engineering/frida/
      - type: text
        substr: HTTPProxyHost
      - type: text
        substr: HTTPProxyPort
      - type: hex
        pattern: 48 54 54 50 50 72 6F 78 79 48 6F 73 74
      - type: hex
        pattern: 48 54 54 50 50 72 6F 78 79 50 6F 72 74

composite_rules:
  - id: ios-proxy-configuration-profile
    desc: iOS proxy configuration profile
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/file/format::mobileconfig-profile
      - id: ios-proxy-mobileconfig

  - id: jvm-ios-proxy-configuration-profile
    desc: JVM iOS proxy config profile
    crit: hostile
    conf: 0.97
    all:
      - id: jvm-ios-config-profile-const
      - id: jvm-ios-http-proxy-const
