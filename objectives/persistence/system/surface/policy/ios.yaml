defaults:
  platforms: [ios]
  for: [java, class, plist, xml]
  attack: T1547

traits:
  - id: ios-mobileconfig-profile
    desc: iOS mobileconfig profile
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.mobileconfig|ConfigurationProfiles'

  - id: ios-proxy-mobileconfig
    desc: iOS proxy mobileconfig payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'HTTPProxy|com\.apple\.networksettings'

  - id: jvm-ios-config-profile-const
    desc: JVM iOS config profile const
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 76 61 72 2F 6D 6F 62 69 6C 65 2F 4C 69 62 72 61 72 79 2F 43 6F 6E 66 69 67 75 72 61 74 69 6F 6E 50 72 6F 66 69 6C 65 73

  - id: jvm-ios-http-proxy-const
    desc: JVM iOS HTTPProxy const
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 48 54 54 50 50 72 6F 78 79

composite_rules:
  - id: ios-proxy-configuration-profile
    desc: iOS proxy configuration profile
    crit: hostile
    conf: 0.97
    all:
      - id: ios-mobileconfig-profile
      - id: ios-proxy-mobileconfig

  - id: jvm-ios-proxy-configuration-profile
    desc: JVM iOS proxy config profile
    crit: hostile
    conf: 0.97
    all:
      - id: jvm-ios-config-profile-const
      - id: jvm-ios-http-proxy-const
