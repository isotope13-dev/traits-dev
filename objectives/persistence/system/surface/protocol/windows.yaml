defaults:
  platforms: [windows]
  for: [scripts, source]
  attack: T1546
composite_rules:
  - id: url-protocol-handler-registration
    desc: Windows URL protocol handler registration
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/os/registry/manipulate::hkcu-software-classes-path
      - id: micro-behaviors/os/registry/manipulate::url-protocol-registry-value
      - id: micro-behaviors/os/registry/manipulate::shell-open-command-key
  - id: postinstall-url-protocol-handler
    desc: npm install registers URL protocol handler
    crit: suspicious
    conf: 0.9
    all:
      - id: url-protocol-handler-registration
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
    any:
      - id: micro-behaviors/os/registry/manipulate::reg-exe-add-command
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-host-exec
