# Linux modprobe persistence hooks.
defaults:
  platforms: [linux]
  for: [scripts, binaries]
  attack: T1547.006

traits:
  - id: modprobe-install-command-line
    desc: modprobe install command line
    crit: component
    conf: 0.8
    # modprobe.d `install <module> <command>`: the module token is a kernel
    # module name, which never starts with a dash. Anchoring the first char to a
    # module-name char rejects the coreutils `install` command invoked with flags
    # (e.g. PKGBUILD `install -Dm644 /dev/stdin ...`), which is not a modprobe hook.
    if:
      type: text
      regex: '(?m)^[ \t]*(install|remove)[ \t]+[A-Za-z0-9_.][\w.-]{0,63}[ \t]+/[^ \t\n]{1,99}'

  - id: modprobe-ignore-install-flag
    desc: modprobe ignore-install flag
    crit: component
    conf: 0.82
    if:
      type: text
      substr: --ignore-install

  - id: modprobe-shell-metachar
    desc: modprobe hooks chain shell commands
    crit: component
    conf: 0.82
    if:
      type: text
      # Require the complete modprobe.d directive shape.  The old expression
      # also matched JavaScript identifiers such as `removeShortcut(...)`.
      regex: '(?m)^[ \t]*(install|remove)[ \t]+[A-Za-z0-9_.-]+[ \t]+/[^\n]{1,220}[;&|]'

composite_rules:
  - id: modprobe-install-hook
    desc: modprobe install command hook
    crit: suspicious
    conf: 0.86
    all:
      - id: modprobe-install-command-line
    any:
      - id: modprobe-ignore-install-flag
      - id: modprobe-shell-metachar
    unless:
      - id: metadata/package/files/system-package::container-runtime-binary
