# Linux modprobe persistence hooks.
defaults:
  platforms: [linux]
  for: [scripts, binaries]
  attack: T1547.006

traits:
  - id: modprobe-install-command-line
    desc: modprobe install command line
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?m)^[ \t]*(install|remove)[ \t]+[A-Za-z0-9_.-]+[ \t]+/[^ \t\n]{1,160}'

  - id: modprobe-ignore-install-flag
    desc: modprobe ignore-install flag
    crit: component
    conf: 0.82
    if:
      type: text
      substr: --ignore-install

  - id: modprobe-shell-metachar
    desc: modprobe hook shell metachar
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?m)^[ \t]*(install|remove)[^\n]{0,180}[;&|]'

composite_rules:
  - id: modprobe-install-hook
    desc: modprobe install command hook
    crit: suspicious
    conf: 0.86
    all:
      - id: modprobe-install-command-line
    any:
      - id: modprobe-ignore-install-flag
      - id: modprobe-shell-metachar
