# Persistence and foothold via pacman's own hooks and config (T1546).
#
# An ALPM hook in /usr/share/libalpm/hooks or /etc/pacman.d/hooks runs a command
# on EVERY future pacman transaction — durable root persistence triggered by
# ordinary system updates. Adding a repository to /etc/pacman.conf gives the
# attacker a permanent package source. Legitimate packages SHIP hooks by
# installing them into "$pkgdir/..." during package(); the malicious tell is a
# write/redirect to the LIVE /usr or /etc path (no $pkgdir) — i.e. mutating the
# running host, the same discriminator used for system shell rc writes.
defaults:
  platforms: [linux]
  for: [shell]
  attack: T1546

traits:
  - id: alpm-hook-live-write
    desc: Writes ALPM hook to live system
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '>>?\s*["'']?/(usr/share/libalpm|etc/pacman\.d)/hooks/'

  - id: pacman-conf-live-write
    desc: Writes to the live /etc/pacman.conf
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    if:
      type: text
      regex: '>>?\s*["'']?/etc/pacman\.conf'
    unless:
      - id: well-known/app/kpango-dotfiles::kpango-dotfiles-source-path

  - id: makepkg-conf-write
    desc: Writes to a makepkg.conf build config
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '>>?\s*["'']?(/etc/makepkg\.conf|~/\.makepkg)'

composite_rules:
  - id: pacman-scriptlet-alpm-hook-persistence
    desc: Install scriptlet drops a live ALPM hook
    crit: hostile
    conf: 0.93
    all:
      - id: objectives/supply-chain/install-hook/distro-scriptlet::pacman-scriptlet-hook
      - id: alpm-hook-live-write

  - id: pacman-scriptlet-rogue-config
    desc: Install scriptlet rewrites pacman/makepkg config
    crit: hostile
    conf: 0.92
    attack: T1195.002
    all:
      - id: objectives/supply-chain/install-hook/distro-scriptlet::pacman-scriptlet-hook
    any:
      - id: pacman-conf-live-write
      - id: makepkg-conf-write
