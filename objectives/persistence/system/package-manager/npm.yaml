defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002

traits:
  - id: npm-global-install-command
    desc: npm global install command
    crit: notable
    conf: 0.9
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    unless:
      - id: well-known/app/aui-agent-builder/
    if:
      type: literal
      regex: 'npm\s+i(nstall)?\s+-g\s+\$\{?[A-Za-z0-9_.@-]+'

  - id: pm2-global-install-command
    desc: Embeds a global PM2 install command
    crit: notable
    conf: 0.98
    if:
      type: literal
      regex: 'npm\s+i\s+-g\s+pm2\b'

  - id: remote-update-event-handler
    desc: Remote update event handler
    crit: suspicious
    conf: 0.94
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    if:
      type: text
      regex: 'connection\.on\(\s*["'']UpdateHost["''][\s\S]{0,320}performSelfUpdate'
    unless:
      - id: well-known/app/pixcode::benign-runtime-context
      - id: well-known/app/pixcode::benign-archive-context

  - id: npm-registry-latest-version-fetch
    desc: Fetches npm latest package metadata
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'fetch\(\s*["'']https://registry\.npmjs\.org/[^"'']{1,80}/latest["'']'

  - id: npx-target-version-command
    desc: Versioned npx replacement command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'defaultCmd\s*=\s*`npx\s+-y\s+[A-Za-z0-9_.@/-]+@\$\{targetVersion\}'

composite_rules:
  - id: npx-versioned-replacement-spawn
    desc: Versioned npx replacement is spawned
    crit: suspicious
    conf: 0.95
    near_bytes: 1200
    all:
      - id: npx-target-version-command
      - id: micro-behaviors/process/create/construction::spawn-command-variable

  - id: detached-npx-self-update
    desc: Remote npm self-update spawns detached shell
    crit: hostile
    conf: 0.98
    scope: archive
    attack: "T1195.002,T1059,T1547"
    all:
      - id: npm-registry-latest-version-fetch
      - id: npx-versioned-replacement-spawn
      - id: micro-behaviors/process/create/spawn::shell-true
      - id: micro-behaviors/process/create/spawn::detached-true
  - id: remote-npm-self-update
    desc: Remote npm self-update command
    crit: hostile
    conf: 0.97
    scope: archive
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    all:
      - id: remote-update-event-handler
      - id: npm-global-install-command
      - id: micro-behaviors/process/create/spawn::shell-true
      - id: micro-behaviors/process/create/spawn::detached-true
    unless:
      - id: well-known/app/pixcode::benign-runtime-context
      - id: well-known/app/pixcode::benign-archive-context
      - id: well-known/app/pixcode::archive-member-context

  - id: detached-pm2-install-and-boot-persistence
    desc: Detached PM2 agent persistence setup
    crit: hostile
    conf: 0.99
    scope: file
    all:
      - id: pm2-global-install-command
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: objectives/persistence/system/supervised::pm2-startup-command
      - id: objectives/persistence/system/supervised::pm2-autonomous-node-start
