defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002

traits:
  - id: npm-global-install-command
    desc: npm global install command
    crit: notable
    conf: 0.9
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    unless:
      - id: well-known/app/aui-agent-builder/
    if:
      type: literal
      regex: 'npm\s+i(nstall)?\s+-g\s+\$\{?[A-Za-z0-9_.@-]+'

  - id: remote-update-event-handler
    desc: Remote update event handler
    crit: suspicious
    conf: 0.94
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    if:
      type: text
      regex: 'connection\.on\(\s*["'']UpdateHost["''][\s\S]{0,320}performSelfUpdate'
    unless:
      - id: well-known/app/pixcode::benign-runtime-context
      - id: well-known/app/pixcode::benign-archive-context

composite_rules:
  - id: remote-npm-self-update
    desc: Remote npm self-update command
    crit: hostile
    conf: 0.97
    scope: archive
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    all:
      - id: remote-update-event-handler
      - id: npm-global-install-command
      - id: micro-behaviors/process/create/spawn::shell-true
      - id: micro-behaviors/process/create/spawn::detached-true
    unless:
      - id: well-known/app/pixcode::benign-runtime-context
      - id: well-known/app/pixcode::benign-archive-context
      - id: well-known/app/pixcode::archive-member-context
