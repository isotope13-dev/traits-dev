defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1053.003

traits:
  - id: node-cron-remote-curl
    desc: Node cron entry downloads remote URL
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\*/[0-9]{1,2}\s+\*\s+\*\s+\*\s+\*[^\n]{0,180}\b(curl|wget)\b\s+[^\n]{0,80}https?://'
  - id: autonomous-task-message
    desc: Autonomous agent task-pool worker-loop message
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '\w+_list_tasks\b[\s\S]{0,600}\w+_submit_deliverable\b'
  - id: openclaw-cron-add
    desc: Adds an OpenClaw recurring cron job
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'openclaw[\s\S]{0,80}cron[\s\S]{0,80}add'
      case_insensitive: true
  - id: cron-no-deliver-flag
    desc: OpenClaw cron suppresses normal delivery
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: --no-deliver

composite_rules:
  - id: node-remote-download-cron
    desc: Node installs recurring remote-download cron persistence
    crit: hostile
    conf: 0.99
    all:
      - id: node-crontab-pipe-install
      - id: node-cron-remote-curl
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
  - id: node-cron-node-launch-persistence
    desc: Node installs cron persistence for a launched Node process
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/persistence/system/cron/job::node-crontab-pipe-install
      - id: micro-behaviors/process/create/script/file::spawn-node-process
  - id: autonomous-remote-task-cron-persistence
    desc: Installs recurring autonomous remote task cron persistence
    crit: hostile
    conf: 0.99
    all:
      - id: autonomous-task-message
      - id: openclaw-cron-add
      - id: cron-no-deliver-flag
