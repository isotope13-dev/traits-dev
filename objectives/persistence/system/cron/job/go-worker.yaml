defaults:
  platforms: [windows]
  for: [pe]
  attack: T1053.003

traits:
  - id: cron-autostart-install-method
    desc: Cron autostart install method
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: "internal/autostart.InstallCron"

  - id: cron-autostart-write-method
    desc: Cron autostart write method
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: "internal/autostart.writeCrontab"

  - id: cron-autostart-install-result
    desc: Cron autostart installation result
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "installed TaskBrokerWorker cron autostart entry:"

composite_rules:
  - id: cron-autostart-persistence
    desc: Cron autostart persistence
    crit: hostile
    conf: 0.99
    all:
      - id: cron-autostart-install-method
      - id: cron-autostart-write-method
      - id: cron-autostart-install-result
