defaults:
  platforms: [unix]
  for: [swift]
  attack: T1053.003

traits:
  - id: swift-persist-path-crontab
    desc: Swift persist path crontab
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'PERSIST_PATH[\s\S]{0,260}/usr/bin/crontab'

  - id: swift-crontab-stdin-pipe
    desc: Swift crontab stdin pipe
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'proc\.standardInput = inputPipe[\s\S]{0,220}handle\.write\(crontab'

composite_rules:
  - id: swift-hidden-crontab-persist
    desc: Swift hidden crontab persist
    crit: hostile
    conf: 0.98
    all:
      - id: swift-persist-path-crontab
      - id: swift-crontab-stdin-pipe
