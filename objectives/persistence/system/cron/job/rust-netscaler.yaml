defaults:
  platforms: [netscaler, appliance, unix]
  for: [rust, binaries]
  attack: T1053.003

traits:
  - id: rust-crontab-update-temp
    desc: Rust crontab temp update
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.cron_update

  - id: rust-netscaler-beacon-cron
    desc: Rust NetScaler beacon cron
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\*/5 \* \* \* \*[\s\S]{0,180}/beacon'

  - id: rust-crontab-install
    desc: Rust crontab install
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Command::new\("crontab"\)[\s\S]{0,120}\.arg\(cron_tmp\)'

composite_rules:
  - id: rust-netscaler-cron-persistence
    desc: Rust NetScaler cron persistence
    crit: hostile
    conf: 0.98
    all:
      - id: rust-crontab-update-temp
      - id: rust-crontab-install
    any:
      - id: rust-netscaler-beacon-cron
