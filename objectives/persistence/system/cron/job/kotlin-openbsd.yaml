defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1053.003

traits:
  - id: kotlin-dev-tcp-reverse-shell
    desc: Kotlin crontab dev-tcp shell
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: /dev/tcp/openbsd-kotlin-dns-trojanize

composite_rules:
  - id: kotlin-openbsd-crontab-reverse-shell
    desc: Kotlin OpenBSD crontab reverse shell
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/config/system::config-crontab
      - id: kotlin-dev-tcp-reverse-shell
