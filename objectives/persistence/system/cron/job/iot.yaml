# Root cron reconnect/watchdog job keeping a remotely reachable shell alive.
defaults:
  platforms: [linux, unix]
  for: [shell]
  attack: T1053.003,T1059.004,T1090
  mbc: B0030

composite_rules:
  - id: root-cron-remote-shell-watchdog
    desc: Root cron watchdog maintains downloaded remote shell
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/fs/path/config/system::root-crontab-spool-path
      - id: micro-behaviors/os/service/daemon::telnetd
      - id: micro-behaviors/communications/proxy/tunnel::reverse-tunnel-term
      - id: micro-behaviors/communications/http/download/shell::shell-curl-wget-url-fetch
