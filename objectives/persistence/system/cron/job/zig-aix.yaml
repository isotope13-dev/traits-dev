defaults:
  platforms: [aix, unix]
  for: [zig, elf]
  attack: T1053.003
traits:
  - id: zig-hidden-crontab-entry
    desc: Zig hidden crontab entry
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\*/5 \* \* \* \* /tmp/\.sysmon_update'
  - id: zig-crontab-install-shell
    desc: Zig installs crontab via shell
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "echo '*/5 * * * * /tmp/.sysmon_update' | crontab -"
composite_rules:
  - id: zig-hidden-cron-persistence
    desc: Zig hidden cron persistence
    crit: hostile
    conf: 0.97
    all:
      - id: zig-hidden-crontab-entry
    any:
      - id: zig-crontab-install-shell
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
    needs: 1
