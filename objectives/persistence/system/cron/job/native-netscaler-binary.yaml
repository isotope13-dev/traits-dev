defaults:
  platforms: [netscaler, appliance, unix]
  for: [elf]
  attack: T1053.003

traits:
  - id: native-netscaler-svc-path
    desc: Native NetScaler svc path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.netscaler_svc

composite_rules:
  - id: native-netscaler-cron-service
    desc: Native NetScaler cron service
    crit: hostile
    conf: 0.98
    all:
      - id: native-netscaler-svc-path
      - id: micro-behaviors/os/autorun/scheduled::crontab-option
    any:
      - id: objectives/exfiltration/stealer/system-info::native-netscaler-http-beacon
