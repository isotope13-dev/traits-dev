defaults:
  platforms: [aix, unix]
  for: [javascript, typescript]
  attack: T1053.003
traits:
  - id: node-crontab-pipe-install
    desc: Node pipes hidden job into crontab
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'crontab -l[\s\S]{0,240}\|\s*crontab -'
  - id: node-hidden-ksh-cron-entry
    desc: Node cron entry runs hidden ksh script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\* \* \* \* \* /bin/ksh \$\{[A-Za-z0-9_]+\}'
composite_rules:
  - id: aix-node-hidden-cron-persistence
    desc: AIX Node hidden cron persistence
    crit: hostile
    conf: 0.96
    all:
      - id: node-crontab-pipe-install
      - id: node-hidden-ksh-cron-entry
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
