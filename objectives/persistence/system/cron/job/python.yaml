defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1053.003
traits:
  - id: python-crontab-install-command
    desc: Python installs crontab via subprocess
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\["crontab",\s*"-"\]'
  - id: python-self-cron-entry
    desc: Python cron entry runs current file
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(__file__|script_path).{0,120}cron_entry|cron_entry.{0,120}(__file__|script_path)'
  - id: python-pyc-self-cron-entry
    desc: Python bytecode self cron entry
    crit: suspicious
    conf: 0.88
    for: [pyc]
    if:
      type: text
      substr: __file__
  - id: python-crontab-shell-pipe
    desc: Python shell pipes into crontab
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'crontab -l[\s\S]{0,220}\|\s*crontab -'
  - id: python-health-check-cron-script
    desc: Python health-check cron script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: health_check.sh
composite_rules:
  - id: python-self-cron-persistence
    desc: Python self crontab persistence
    crit: hostile
    conf: 0.96
    all:
      - id: python-crontab-install-command
    any:
      - id: python-self-cron-entry
      - id: python-pyc-self-cron-entry
    needs: 1
  - id: python-shell-pipe-cron-persistence
    desc: Python shell-piped cron persistence
    crit: hostile
    conf: 0.96
    all:
      - id: python-crontab-shell-pipe
      - id: python-health-check-cron-script
  - id: python-pyc-health-cron-persistence
    desc: Python bytecode health cron persistence
    crit: hostile
    conf: 0.94
    for: [pyc]
    all:
      - id: python-health-check-cron-script
      - id: python-pyc-self-cron-entry
