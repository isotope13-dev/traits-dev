defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1053.003
traits:
  - id: python-crontab-install-command
    desc: Python installs crontab via subprocess
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\["crontab",\s*"-"\]'
  - id: python-self-cron-entry
    desc: Python cron entry runs current file
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(__file__|script_path).{0,120}cron_entry|cron_entry.{0,120}(__file__|script_path)'
  - id: python-pyc-self-cron-entry
    desc: Python bytecode self cron entry
    crit: suspicious
    conf: 0.88
    for: [pyc]
    if:
      type: text
      substr: __file__
composite_rules:
  - id: python-self-cron-persistence
    desc: Python self crontab persistence
    crit: hostile
    conf: 0.96
    all:
      - id: python-crontab-install-command
    any:
      - id: python-self-cron-entry
      - id: python-pyc-self-cron-entry
    needs: 1
