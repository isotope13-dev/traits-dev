defaults:
  platforms: [unix, fortios]
  for: [perl]
  attack: T1053.003

traits:
  - id: perl-cron-rc-local-self-copy
    desc: Perl cron rc.local self copy
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '/etc/crontab[\s\S]{0,260}/etc/rc\.local[\s\S]{0,260}\$0'

  - id: perl-hidden-helper-cron-entry
    desc: Perl hidden helper cron entry
    crit: suspicious
    conf: 0.94
    platforms: [zos]
    if:
      type: text
      regex: '\*/5 \* \* \* \* /usr/lpp/perl/bin/perl /tmp/\.[A-Za-z0-9._-]+'

composite_rules:
  - id: perl-root-cron-hidden-persistence
    desc: Perl root cron hidden persistence
    crit: hostile
    conf: 0.98
    platforms: [zos]
    all:
      - id: perl-hidden-helper-cron-entry
      - id: micro-behaviors/fs/path/config/system::root-crontab-spool-path
