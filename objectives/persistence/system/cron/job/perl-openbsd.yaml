defaults:
  platforms: [openbsd, bsd, unix]
  for: [perl]
  attack: T1053.003

traits:
  - id: perl-hidden-periodic-cron
    desc: Perl hidden periodic cron
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "*/5 * * * * /tmp/.cache/.periodic_update"

  - id: perl-hidden-update-script
    desc: Perl hidden update script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.cache/.periodic_update

composite_rules:
  - id: perl-openbsd-hidden-cron-job
    desc: Perl hidden cron job
    crit: hostile
    conf: 0.98
    all:
      - id: perl-hidden-periodic-cron
      - id: perl-hidden-update-script
