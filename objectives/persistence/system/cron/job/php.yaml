defaults:
  platforms: [unix]
  for: [php]
  attack: T1053.003
composite_rules:
  - id: php-cron-persistence
    desc: PHP script installs a cron job for persistence
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/file/write/direct::php-file-write
      - id: micro-behaviors/data/text/keywords/lexicon::cron-dup-aix
