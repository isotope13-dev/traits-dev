defaults:
  platforms: [unix]
  for: [php]
  attack: T1053.003
traits:
  - id: php-crontab-pipe-command
    desc: PHP text pipes into crontab command
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(?i)\|\s*crontab\b'
  - id: php-crontab-absolute-command
    desc: PHP text references absolute crontab command
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(?i)/usr/(local/)?bin/crontab\b'
  - id: php-crontab-argument-command
    desc: PHP text invokes crontab with command arguments
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(?i)\bcrontab\s+(-|/|\w+\.)'
composite_rules:
  - id: php-crontab-install-command
    desc: PHP crontab install command
    crit: notable
    conf: 0.86
    any:
      - id: objectives/persistence/system/cron/job::etc-cron-path
      - id: objectives/persistence/system/cron/job::var-spool-cron-path
      - id: objectives/persistence/system/cron/job::cron-d-path-dup
      - id: php-crontab-command-text
  - id: php-crontab-command-text
    desc: PHP crontab command text
    crit: notable
    conf: 0.82
    any:
      - id: php-crontab-pipe-command
      - id: php-crontab-absolute-command
      - id: php-crontab-argument-command
  - id: php-cron-persistence
    desc: PHP script installs a cron job for persistence
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/file/write/direct::php-file-write
      # Require a real crontab install target (/etc/cron*, /var/spool/cron,
      # crontab command) — not the bare substring "cron", which matches any
      # scheduler column name or test fixture.
      - id: php-crontab-install-command
