defaults:
  platforms: [macos]
  for: [swift]
  attack: T1053.003
traits:
  - id: cron-spool-path
    desc: References cron spool directory
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: /var/spool/cron/crontabs
composite_rules:
  - id: swift-cron-persistence
    desc: Swift script installing a cron job
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/text/keywords/lexicon::cron-keyword
    any:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: cron-spool-path
