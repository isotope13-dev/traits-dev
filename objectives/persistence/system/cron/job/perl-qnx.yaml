defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1053.003

traits:
  - id: qnx-perl-staged-crond-path
    desc: QNX Perl staged cron.d path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /cron.d/

  - id: qnx-perl-hidden-tmp-cron
    desc: QNX Perl hidden tmp cron
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\*/15 \* \* \* \* /tmp/\.[^"\n]{1,120} >/dev/null 2>&1'

  - id: qnx-perl-quarter-hour-cron
    desc: QNX Perl quarter hour cron
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '*/15 * * * *'

composite_rules:
  - id: qnx-perl-staged-hidden-cron
    desc: QNX Perl staged hidden cron
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-staged-crond-path
      - id: qnx-perl-hidden-tmp-cron
      - id: qnx-perl-quarter-hour-cron
