defaults:
  platforms: [esxi, unix]
  for: [swift]
  attack: T1053.003

traits:
  - id: swift-crontab-pipe-install
    desc: Swift crontab pipe install
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'crontab -l[\s\S]{0,120}\| crontab -'

  - id: swift-hidden-tmp-cron-script
    desc: Swift hidden tmp cron script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tmp/\.[A-Za-z0-9._-]{1,80}\.sh'
  - id: swift-crontab-stdin-install
    desc: Swift installs crontab from stdin
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'crontab[\s\S]{0,120}arguments\s*=\s*\["-"\]'
  - id: swift-crontab-tempfile-install
    desc: Swift installs temp crontab
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'crontab"[\s\S]{0,100}args:\s*\[.{0,80}tmpCrontab'
  - id: swift-etc-crond-path
    desc: Swift writes /etc/cron.d path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/cron.d
  - id: swift-cron-devtcp-shell
    desc: Swift cron /dev/tcp shell
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '/etc/cron\.d[\s\S]{0,260}/dev/tcp/'

composite_rules:
  - id: swift-hidden-cron-persistence
    desc: Swift hidden cron persistence
    crit: hostile
    conf: 0.97
    all:
      - id: swift-hidden-tmp-cron-script
    any:
      - id: swift-crontab-pipe-install
      - id: swift-crontab-stdin-install
      - id: swift-crontab-tempfile-install
  - id: swift-crond-reverse-shell
    desc: Swift cron reverse shell persistence
    crit: hostile
    conf: 0.98
    all:
      - id: swift-etc-crond-path
      - id: swift-cron-devtcp-shell
