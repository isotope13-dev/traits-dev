defaults:
  platforms: [unix, appliance]
  for: [javascript, typescript]
  attack: T1053.003

traits:
  - id: node-root-cron-self-entry
    desc: Node root cron self entry
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/var/spool/cron/crontabs/root[\s\S]{0,240}__filename'

composite_rules:
  - id: node-root-cron-persistence
    desc: Node root cron persistence
    crit: hostile
    conf: 0.98
    all:
      - id: node-root-cron-self-entry
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
