defaults:
  platforms: [openwrt, unix]
  for: [perl]
  attack: T1053.003

traits:
  - id: perl-cron-payload-variable
    desc: Perl cron payload variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "$cron_payload"

composite_rules:
  - id: perl-openwrt-root-cron-persistence
    desc: Perl OpenWrt root cron persistence
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/persistence/system/network-appliance::openwrt-root-crontab-path
      - id: micro-behaviors/os/autorun/scheduled::crontab-wildcard-entry
    any:
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
      - id: perl-cron-payload-variable
    needs: 1
