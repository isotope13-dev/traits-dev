defaults:
  attack: T1053.003
  mbc: B0028
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: etc-cron-path
    desc: /etc/cron directory path (system cron
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: \b/etc/cron(/|$)
    unless:
      - id: metadata/file/format::roff-document
      - id: metadata/file/catalog/identity::neovim-filetype-registry
  - id: var-spool-cron-path
    desc: /var/spool/cron directory path (user cron
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: /var/spool/cron
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/tool/detection/security-scanner::defensive-scanner-tool-context
  - id: cron-d-path-dup
    desc: /etc/cron.d directory path (additional system
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: /etc/cron.d
    unless:
      - id: well-known/tool/detection/security-scanner::defensive-evidence-collector
      - id: well-known/tool/detection/security-scanner::wpsecscan-cli-context
      - id: well-known/app/context::akm-cron-user-task-scheduler
      - type: text
        regex: /etc/cron\.d/(glusterfs_snap_cron_tasks|gcron_update_task)
  - id: crontab-at-reboot
    desc: Crontab @reboot directive
    crit: suspicious
    conf: 0.9
    for: [go, elf, macho, shell, python]
    if:
      type: text
      word: '@reboot'
  - id: crontab-edit
    desc: Crontab edit operation
    crit: suspicious
    conf: 0.8
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: crontab.{0,10}-e
    unless:
      - id: well-known/tool/detection/security-scanner::defensive-evidence-collector
composite_rules:
  - id: cron
    desc: Cron job persistence (command or
    crit: suspicious
    conf: 0.66
    any:
      - id: micro-behaviors/os/autorun/scheduled::crontab-keyword
      - id: etc-cron-path
      - id: var-spool-cron-path
      - id: objectives/persistence/system/cron/job::cron-d-path-dup
  - id: crontab-reboot
    desc: Crontab reboot persistence
    crit: suspicious
    conf: 0.9
    for: [go, elf, macho, shell, python]
    any:
      - id: crontab-at-reboot
      - id: crontab-edit
