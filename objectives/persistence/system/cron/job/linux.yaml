defaults:
  attack: T1053.003
  mbc: B0028
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: etc-cron-path
    desc: /etc/cron directory path (system cron
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /etc/cron
    unless:
      - id: metadata/file/text::neovim-filetype-registry
  - id: var-spool-cron-path
    desc: /var/spool/cron directory path (user cron
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /var/spool/cron
  - id: cron-d-path-dup
    desc: /etc/cron.d directory path (additional system
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /etc/cron.d
composite_rules:
  - id: cron
    desc: Cron job persistence (command or
    crit: notable
    conf: 0.66
    any:
      - id: micro-behaviors/os/autorun/scheduled::crontab-keyword
      - id: etc-cron-path
      - id: var-spool-cron-path
      - id: objectives/persistence/system/cron/job::cron-d-path-dup
