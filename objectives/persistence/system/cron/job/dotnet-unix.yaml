defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1053.003

traits:
  - id: dotnet-piped-crontab-install
    desc: .NET piped crontab install
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '| crontab -'

  - id: dotnet-hidden-agent-cron
    desc: .NET hidden agent cron
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tmp/\.(agent_loader|solaris_agent_svc)'

composite_rules:
  - id: dotnet-hidden-cron-persistence
    desc: .NET hidden cron persistence
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-piped-crontab-install
      - id: dotnet-hidden-agent-cron
