defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1053.003
traits:
  - id: crontab-dash
    desc: crontab command with dash
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: crontab -
composite_rules:
  - id: cron-paths-comp
    desc: Cron file paths
    crit: suspicious
    any:
      - id: objectives/persistence/system/cron/job::cron-d-path-dup
      - id: objectives/persistence/system/cron/job::var-spool-cron-path
      - id: crontab-dash
  - id: cron-keywords
    desc: Cron-related keywords
    crit: suspicious
    any:
      - id: micro-behaviors/os/autorun/scheduled::crontab-keyword
      - id: objectives/persistence/system/cron/job::etc-cron-path
  - id: cron-with-base64
    desc: Cron with base64 decode
    crit: suspicious
    all:
      - id: cron-keywords
      - id: micro-behaviors/data/decode/base64::base64-decode-shell
  - id: cron-with-hidden
    desc: Cron with hidden file paths
    crit: suspicious
    all:
      - id: cron-keywords
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
  - id: cron-with-download
    desc: Cron with download cradle
    crit: suspicious
    conf: 0.85
    all:
      - id: cron-keywords
    any:
      - id: micro-behaviors/communications/http/download/cli::curl-s-flag
      - id: micro-behaviors/communications/http/download/cli::wget-q-flag
  - id: cron-hidden
    desc: Hidden or obfuscated cron entries
    crit: suspicious
    conf: 0.8
    any:
      - id: cron-with-base64
      - id: cron-with-hidden
