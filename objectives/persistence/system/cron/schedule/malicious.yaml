defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1053.003
traits:
  - id: crontab-dash
    desc: crontab command with dash
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: crontab -
  - id: cron-pidof-remote-restart
    desc: Cron restarts process with remote host argument
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: "pidof -s %s.{0,80}then %s [0-9]{1,3}(\\.[0-9]{1,3}){3}"
  - id: cron-hidden-tmp-entry
    desc: Cron launches hidden tmp payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\*/[0-9]{1,2} \* \* \* \* /tmp/\.'
composite_rules:
  - id: cron-paths-comp
    desc: Cron file paths
    crit: suspicious
    any:
      - id: objectives/persistence/system/cron/job::cron-d-path-dup
      - id: objectives/persistence/system/cron/job::var-spool-cron-path
      - id: crontab-dash
  - id: cron-keywords
    desc: Cron-related keywords
    crit: suspicious
    any:
      - id: micro-behaviors/os/autorun/scheduled::crontab-keyword
      - id: objectives/persistence/system/cron/job::etc-cron-path
  - id: cron-with-base64
    desc: Cron with base64 decode
    crit: suspicious
    all:
      - id: cron-keywords
      - id: micro-behaviors/data/decode/base64::base64-decode-shell
  - id: cron-with-hidden
    desc: Cron with hidden file paths
    crit: suspicious
    all:
      - id: cron-keywords
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
  - id: cron-with-download
    desc: Cron with download cradle
    crit: suspicious
    conf: 0.85
    near_lines: 6
    all:
      - id: cron-paths-comp
    any:
      - id: micro-behaviors/communications/http/download/cli::curl-s-flag
      - id: micro-behaviors/communications/http/download/cli::wget-q-flag
  - id: cron-hidden
    desc: Hidden or obfuscated cron entries
    crit: suspicious
    conf: 0.8
    any:
      - id: cron-with-base64
      - id: cron-with-hidden
  - id: cron-remote-payload-persistence
    desc: Cron self-restart persistence for remote payload
    crit: hostile
    conf: 0.97
    all:
      - id: cron-with-download
      - id: cron-pidof-remote-restart
    any:
      - id: objectives/command-and-control/beacon/network/http::direct-http-c2-ip-url
      - id: objectives/command-and-control/dropper/execution/eval::download-url-hardcoded
