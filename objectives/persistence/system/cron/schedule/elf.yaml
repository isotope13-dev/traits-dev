defaults:
  platforms:
    - unix
    - android
    - ios
  crit: suspicious
  attack: T1053.003
  mbc: B0030
  for: [scripts, binaries]
traits:
  - id: crontab-string
    desc: Crontab manipulation string
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (\\bcrontab\\s*-[lr]\\b|[|]\\s*crontab\\s*-$)
  - id: crontab-schedule-format
    desc: Crontab schedule format string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '%d\\s+%d\\s+\\*\\s+\\*\\s+\\*\\s+%s'
  - id: crontab-grep-remove
    desc: Crontab removal via grep
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: crontab\s+-l\s*\|\s*grep\s+-v.{0,50}\|\s*crontab
  - id: crontab-echo-pipe
    desc: Crontab echo pipe pattern
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: echo.{0,80}\|\s*crontab|crontab.{0,40}echo
  - id: crontab-file-install
    desc: Crontab install from file (temp-file pattern)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: crontab\s+/[^\s|]{3,60}
  - id: crontab-schedule-literal
    desc: Cron schedule format literal string
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \*\s+\*\s+\*\s+\*\s+\*\s+
composite_rules:
  - id: elf-cron-persistence-full
    desc: ELF with cron persistence
    crit: suspicious
    conf: 0.95
    all:
      - id: crontab-string
      - id: crontab-grep-remove
  - id: elf-cron-scheduled
    desc: ELF with cron scheduling
    crit: suspicious
    conf: 0.9
    all:
      - id: crontab-string
      - id: crontab-schedule-format
  - id: cron-tempfile-installer
    desc: Cron persistence via temp-file install (C-code pattern)
    crit: suspicious
    conf: 0.9
    all:
      - id: crontab-string
      - id: crontab-file-install
    any:
      - id: crontab-schedule-literal
      - id: crontab-schedule-format
      - id: micro-behaviors/process/create/shell::system-fn
