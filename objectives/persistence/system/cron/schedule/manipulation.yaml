defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1053.003
traits:
  - id: crontab-list-flag
    desc: crontab -l list command
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: \bcrontab\s+-l\b
  - id: pipe-crontab
    desc: Pipe to crontab stdin
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: \|\s*crontab\s+-
  - id: echo-reboot
    desc: echo @reboot cron command
    crit: component
    conf: 0.5
    if:
      type: text
      regex: (?i)\becho\s+["']?@reboot\s+
  - id: echo-cron-fields
    desc: echo cron numeric schedule command
    crit: component
    conf: 0.5
    if:
      type: text
      regex: \becho\s+["']?([0-9\*/,\-]+\s+){4}[0-9\*/,\-]+\s+
  - id: grep-v
    desc: grep -v (inverse match/filter)
    crit: component
    conf: 0.6
    if:
      type: text
      regex: grep\s+-v
composite_rules:
  - id: echo-command
    desc: echo cron schedule command
    crit: component
    conf: 0.5
    any:
      - id: echo-reboot
      - id: echo-cron-fields
  - id: blind_append
    desc: Appends to crontab by piping
    crit: suspicious
    conf: 0.9
    all:
      - id: crontab-list-flag
      - id: echo-command
      - id: pipe-crontab
  - id: filtered_rewrite
    desc: Rewrites crontab by filtering output
    crit: suspicious
    conf: 0.9
    all:
      - id: crontab-list-flag
      - id: grep-v
      - id: pipe-crontab
