defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1053.003
traits:
  - id: jenkins-cron-installer-path
    desc: Jenkins cron installer path
    crit: notable
    conf: 0.95
    for: [shell]
    if:
      type: path
      regex: 'jenkins[\\/]installers[\\/].*crons?\.sh$'
  - id: home-cleanup-cron-script
    desc: Home cleanup cron helper script
    crit: notable
    conf: 0.95
    for: [shell]
    if:
      type: text
      regex: '\$HOME/cleanup_(and_reboot|go_modules)\.sh'
  - id: crontab-list-flag
    desc: crontab -l list command
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bcrontab\s+-l\b
  - id: pipe-crontab
    desc: Pipe to crontab stdin
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \|\s*crontab\s+-
  - id: echo-reboot
    desc: echo @reboot cron command
    crit: component
    conf: 0.5
    if:
      type: text
      regex: (?i)\becho\s+["']?@reboot\s+
  - id: echo-cron-fields
    desc: echo cron numeric schedule command
    crit: component
    conf: 0.5
    if:
      type: text
      regex: \becho\s+["']?([0-9\*/,\-]+\s+){4}[0-9\*/,\-]+\s+
  - id: guarded-reboot-check
    desc: Guards against duplicate @reboot entry
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: "grep '@reboot"
  - id: xenserver-telemetry-cron-context
    desc: XenServer telemetry cron context
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '/opt/plusclouds/(rrd|ipmi)\.py'
composite_rules:
  - id: echo-command
    desc: echo cron schedule command
    crit: component
    conf: 0.5
    any:
      - id: echo-reboot
      - id: echo-cron-fields
  - id: blind_append
    desc: Appends to crontab by piping
    crit: suspicious
    conf: 0.9
    all:
      - id: crontab-list-flag
      - id: echo-command
      - id: pipe-crontab
    unless:
      - id: jenkins-cron-installer-path
      - id: home-cleanup-cron-script
      - id: guarded-reboot-check
      - id: xenserver-telemetry-cron-context
  - id: filtered_rewrite
    desc: Rewrites crontab by filtering output
    crit: suspicious
    conf: 0.9
    all:
      - id: crontab-list-flag
      - id: micro-behaviors/fs/search::grep-invert
      - id: pipe-crontab
