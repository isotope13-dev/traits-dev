defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1114.003
traits:
  - id: managesieve-settings-action
    desc: Requests ManageSieve settings action
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: plugin\.managesieve-action
  - id: managesieve-save-action
    desc: Saves ManageSieve server-side rule
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: plugin\.managesieve-save
  - id: managesieve-availability-check
    desc: Checks ManageSieve availability message
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: SERVICE CURRENTLY NOT AVAILABLE|ManageSieve
  - id: mail-forwarding-action
    desc: Creates redirect or forwarding rule
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(redirect|forward)\s+["''][^"'']{1,120}@'
    not:
      - substr: "libFileMap['lib.dom.d.ts']"

composite_rules:
  - id: managesieve-forwarding-persistence
    desc: Webmail forwarding persistence via ManageSieve
    crit: hostile
    conf: 0.96
    all:
      - id: managesieve-settings-action
      - id: managesieve-save-action
      - id: mail-forwarding-action
    any:
      - id: managesieve-availability-check
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/client::fetch-string
