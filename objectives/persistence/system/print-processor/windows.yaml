defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
- id: unsigned-microsoft-print-processor-loader
  desc: Unsigned Microsoft print processor loader
  crit: hostile
  conf: 0.97
  attack: T1547.012
  all:
  - id: micro-behaviors/os/service/export::print-processor-proxy-surface
  - id: objectives/command-and-control/backdoor/loader/native-reflect::loader-api-surface
  - id: micro-behaviors/os/registry/access::registry-read-api-chain
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
  any:
  - id: micro-behaviors/os/compat/wow64::is-wow64-process
  - id: micro-behaviors/os/sysinfo/platform/locale::get-version-ex
  - id: micro-behaviors/fs/shell-ops::shell-get-folder-path
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::microsoft-corporation
  - id: metadata/binary/vendor::is-microsoft-named
