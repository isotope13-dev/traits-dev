defaults:
  for: [scripts, binaries]
  attack: T1547.013
  crit: suspicious
  platforms:
    - linux
traits:
  - id: config-autostart
    desc: .config/autostart directory
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: .config/autostart
  - id: etc-xdg-autostart
    desc: /etc/xdg/autostart directory
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: /etc/xdg/autostart
  - id: xdg-config-autostart
    desc: XDG_CONFIG_HOME autostart
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: XDG_CONFIG_HOME.{0,50}autostart
  - id: desktop-entry-header
    desc: '[Desktop Entry] header'
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: '[Desktop Entry]'
  - id: x-gnome-autostart
    desc: X-GNOME-Autostart directive
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: X-GNOME-Autostart
  - id: config-systemd-user
    desc: .config/systemd/user directory
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: .config/systemd/user
  - id: local-share-systemd-user
    desc: .local/share/systemd/user directory
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: .local/share/systemd/user
  - id: systemctl-user-enable
    desc: systemctl --user enable
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: systemctl.{0,30}--user.{0,30}enable
  - id: etc-rc-local
    desc: /etc/rc.local file reference
    crit: notable
    conf: 0.8
    attack: T1037.004
    if:
      type: text
      substr: /etc/rc.local
  - id: etc-rc-d-rc-local
    desc: /etc/rc.d/rc.local file
    crit: notable
    conf: 0.8
    attack: T1037.004
    if:
      type: text
      substr: /etc/rc.d/rc.local
  - id: etc-init-d
    desc: /etc/init.d/ directory
    crit: notable
    conf: 0.6
    attack: T1037.004
    if:
      type: text
      substr: /etc/init.d/
    not:
      - regex: __fish_print_debian_services|__fish_print_service_names|path filter -fxZ /etc/init\.d/\*|string replace '/etc/init\.d/' '' -- /etc/init\.d/\*
  - id: init-script-header
    desc: LSB init script header
    crit: notable
    conf: 0.85
    attack: T1037.004
    if:
      type: text
      substr: BEGIN INIT INFO
  - id: update-rc-d-cmd
    desc: update-rc.d command
    crit: notable
    conf: 0.7
    attack: T1037.004
    if:
      type: text
      substr: update-rc.d
  - id: chkconfig-cmd
    desc: chkconfig --add/--del/--level
    crit: notable
    conf: 0.85
    attack: T1037.004
    if:
      type: raw
      regex: chkconfig\s+--(add|del|level)\b
  - id: chkconfig-service-state
    desc: chkconfig service state change
    crit: notable
    conf: 0.85
    attack: T1037.004
    if:
      type: raw
      regex: chkconfig\s+[A-Za-z0-9_.-]+\s+(on|off|reset)\b
  - id: exec-eq-directive
    desc: Exec= directive
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: Exec=
  - id: hidden-false-directive
    desc: Hidden=false directive
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: Hidden=false
  - id: type-application-directive
    desc: Type=Application directive
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: Type=Application
composite_rules:
  - id: linux-xdg-autostart
    desc: XDG autostart directory access
    conf: 0.85
    crit: suspicious
    any:
      - id: config-autostart
      - id: etc-xdg-autostart
      - id: xdg-config-autostart
  - id: linux-desktop-entry
    desc: Desktop entry file creation (.desktop)
    conf: 0.8
    any:
      - id: desktop-entry-header
      - id: x-gnome-autostart
  - id: linux-user-systemd
    desc: User-level systemd service persistence
    conf: 0.85
    attack: T1543.002
    any:
      - id: config-systemd-user
      - id: local-share-systemd-user
      - id: systemctl-user-enable
  - id: linux-rc-local
    desc: rc.local persistence mechanism
    conf: 0.9
    crit: suspicious
    attack: T1037.004
    any:
      - id: etc-rc-local
      - id: etc-rc-d-rc-local
  - id: linux-init-script
    desc: init.d script interaction or persistence
    conf: 0.85
    crit: notable
    attack: T1037.004
    any:
      - id: etc-init-d
      - id: update-rc-d-cmd
      - id: chkconfig-cmd
      - id: chkconfig-service-state
      - id: init-script-header
  - id: linux-xdg-autostart-dir
    desc: XDG autostart directory path
    conf: 0.8
    crit: notable
    any:
      - id: config-autostart
      - id: etc-xdg-autostart
  - id: linux-desktop-entry-exec
    desc: Desktop entry executable directive
    conf: 0.8
    crit: notable
    any:
      - id: exec-eq-directive
      - id: hidden-false-directive
      - id: type-application-directive
  - id: linux-xdg-executable
    desc: XDG autostart with executable command
    crit: suspicious
    conf: 0.95
    mbc: F0006
    all:
      - id: linux-xdg-autostart-dir
      - id: linux-desktop-entry-exec
