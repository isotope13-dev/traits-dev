defaults:
  platforms:
    - windows
  for:
    - pe
  attack: T1547
traits:
  - id: reboot-replacement-marker
    desc: Legacy reboot replacement marker
    crit: component
    conf: 0.72
    if:
      type: text
      exact: Rename\File%d

composite_rules:
  - id: wininit-reboot-file-replacement
    desc: Reboot-time file replacement via WININIT
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/config/system::wininit-file-replacement-config
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: micro-behaviors/os/sysinfo/directories::get-windows-directory
    any:
      - id: reboot-replacement-marker
      - id: objectives/persistence/login/registry/autostart::run-once-key
      - id: objectives/persistence/login/startup/registry::runonce-word
  - id: wininit-runonce-launch-persistence
    desc: WININIT and RunOnce launch persistence
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/config/system::wininit-file-replacement-config
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: micro-behaviors/os/sysinfo/directories::get-windows-directory
      - id: objectives/persistence/login/registry/autostart::run-once-key
      - id: micro-behaviors/process/create/exec::winexec
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/binary/installer/family::known-benign-installer
