# Legacy Windows boot-script persistence from source code
defaults:
  platforms: [windows]
  for: [pe, dll, source]
traits:
  - id: vbs-script-marker
    desc: VBScript filename or interpreter reference
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\.vbs\b|\b(?:wscript|cscript)(?:\.exe)?\b'
      case_insensitive: true
composite_rules:
  - id: autoexec-vbs-persistence
    desc: AUTOEXEC.BAT launches dropped VBS
    crit: suspicious
    conf: 0.95
    attack: T1547.014
    near_lines: 50
    all:
      - id: micro-behaviors/fs/path/system::legacy-boot-config
      - id: micro-behaviors/fs/read/self::append-call
      - id: vbs-script-marker
