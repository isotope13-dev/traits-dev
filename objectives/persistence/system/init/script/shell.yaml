defaults:
  platforms: [unix]
  crit: notable
  attack: T1037
  for: [shell]
traits:
  - id: sysv-runlevel-start-name
    desc: SysV runlevel start script name
    crit: notable
    conf: 0.95
    attack: T1037.004
    if:
      type: path
      basename: true
      regex: '^S[0-9]{2}[A-Za-z0-9._+-]{1,64}$'
  - id: chkconfig-header
    desc: SysV init script header
    crit: notable
    conf: 0.95
    unless:
      - id: well-known/app/adguardhome::release-path
      - id: metadata/lang/compiler/systems::go-buildinfo-elf
      - id: metadata/lang/compiler/systems::go-buildinfo
    if:
      type: text
      regex: '#\s*chkconfig:\s*[-0-9]+\s+[0-9]+\s+[0-9]+'
  - id: chkconfig-all-runlevels
    desc: Init runs in all runlevels
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '#\s*chkconfig:\s*-?(0?123456|[0-6]{5,})\s+[0-9]+\s+[0-9]+'
  - id: chkconfig-early-start
    desc: Init with very early start
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '#\s*chkconfig:\s*[-0-9]+\s+0[0-9]\s+[0-9]+'
  - id: source-init-functions
    desc: Sources init.d functions
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \.\s+/etc/rc\.d/init\.d/functions|source\s+/etc/rc\.d/init\.d/functions
  - id: source-sysconfig
    desc: Sources sysconfig file
    crit: notable
    conf: 0.8
    unless:
      - id: well-known/app/adguardhome::release-path
      - id: metadata/lang/compiler/systems::go-buildinfo-elf
      - id: metadata/lang/compiler/systems::go-buildinfo
    if:
      type: text
      regex: \.\s+/etc/sysconfig/|source\s+/etc/sysconfig/
  - id: source-selinux-config
    desc: Sources SELinux config
    crit: suspicious
    conf: 0.85
    attack: T1562.001
    if:
      type: text
      regex: \.\s+/etc/selinux/|source\s+/etc/selinux/
  - id: lockfile-subsys
    desc: Uses subsys lockfile
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /var/lock/subsys/
  - id: daemon-function
    desc: Calls daemon function
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: \bdaemon\s+\$
  - id: daemon-check-masquerade
    desc: daemon --check splits lock name from binary
    crit: suspicious
    conf: 0.8
    attack: T1036
    if:
      type: text
      regex: \bdaemon\s+--check\s+\$\w+
  - id: varrun-pidfile-mgmt
    desc: PID file referenced in /var/run
    crit: component
    conf: 0.7
    attack: T1543
    if:
      type: text
      regex: /var/run/[a-zA-Z0-9_-]+\.pid
  - id: process-group-kill
    desc: Kills entire process group
    crit: suspicious
    conf: 0.9
    attack: T1489
    if:
      type: text
      regex: \bkill\b\s+(-9|-SIGKILL|-KILL)\s+-\$?\{?[a-zA-Z_][a-zA-Z0-9_]*\}?
    not:
      - substr: kill -9 -$pid
  - id: kernel-module-load-dynamic
    desc: Init dynamically selects module
    crit: component
    conf: 0.8
    attack: T1547.006
    if:
      type: text
      regex: \bmodprobe\s+\$[A-Za-z_][A-Za-z0-9_]*
    unless:
      - id: well-known/tool/sysadmin/kubernetes::kubernetes-shell-tooling
      - id: well-known/app/ventoy::runtime-hook-script
      - id: well-known/app/ventoy::livecd-gui-init-script
      - id: well-known/app/ventoy::livecd-init-script
    not:
      - regex: \bmodprobe\s+\$[A-Za-z_][A-Za-z0-9_]*FSTYPE\b
      - regex: \bmodprobe\s+\$driver\b
  - id: kernel-module-load-path
    desc: Init insmods module from path
    crit: component
    conf: 0.75
    attack: T1547.006
    if:
      type: text
      regex: \binsmod\s+([/$"]|\$\{?[A-Za-z_][A-Za-z0-9_]*\}?/)
    not:
      - regex: \binsmod\s+/ventoy/drivers/\$\{?[A-Za-z_][A-Za-z0-9_]*\}?\.ko\b
  - id: kernel-module-load-ko
    desc: Init insmods explicit ko file
    crit: component
    conf: 0.75
    attack: T1547.006
    if:
      type: text
      regex: \binsmod\s+[^ \n]{1,80}\.ko\b
    not:
      - regex: \binsmod\s+/ventoy/drivers/\$\{?[A-Za-z_][A-Za-z0-9_]*\}?\.ko\b
  # `device-node-create` relocated to micro-behaviors/fs/device/mknod as
  # `mknod-char-device-shell` — a bare shell `mknod ... c N` is a neutral
  # capability (tar test-fixture generators use it), not init persistence.
  # The init-context intent is supplied by the chkconfig-header leg of the
  # init-kernel-device-manipulation composite below.
  - id: source-nonstandard-init-helper
    desc: Sources non-standard init helper
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \.\s+/etc/init\.d/(modules|status)|source\s+/etc/init\.d/(modules|status)
  - id: root-binary-quoted-path
    desc: Quoted binary path under /root
    crit: component
    conf: 0.82
    attack: T1543
    if:
      type: text
      regex: '"/root/[^"\n]{1,120}"'
  - id: root-binary-launcher
    desc: Launch helper used with /root binary
    crit: component
    conf: 0.82
    attack: T1543
    if:
      type: text
      regex: '\b(exec|daemon|runuser\s+-c|su\s+-c)\s+'
  - id: start-stop-daemon-root-exec
    desc: start-stop-daemon launches binary from /root
    crit: suspicious
    conf: 0.9
    attack: T1543
    if:
      type: text
      regex: 'start-stop-daemon\s+--start[^\n]{0,80}--exec\s+"/root/'
  - id: root-binary-envvar
    desc: PROGNAME or DAEMON points to /root binary
    crit: suspicious
    conf: 0.9
    attack: T1543
    if:
      type: text
      regex: '(PROGNAME|DAEMON)="/root/'
  - id: processname-mismatch-lib
    desc: processname references library-like name
    crit: suspicious
    conf: 0.85
    attack: T1036
    if:
      type: text
      regex: '#\s*processname:\s*lib[a-z_]+[._][aso]'
  - id: proc-cmdline-read
    desc: Reads /proc process cmdline
    crit: suspicious
    conf: 0.85
    attack: T1057
    if:
      type: text
      regex: /proc/\$\{?[a-zA-Z_][a-zA-Z0-9_]*\}?/cmdline
    unless:
      - type: basename
        regex: '(?i)(^|[\\/]).*(example|sample)[^\\/]*\.(sh|bash)$'
composite_rules:
  - id: init-script-selinux-bypass
    desc: Init script with SELinux bypass
    crit: suspicious
    conf: 0.9
    attack: T1562.001
    all:
      - id: chkconfig-header
      - id: objectives/impact/degrade/mac::selinux-setsebool
  - id: aggressive-init-persistence
    desc: Aggressive init persistence
    crit: suspicious
    conf: 0.9
    attack: T1037.004
    all:
      - id: chkconfig-all-runlevels
      - id: chkconfig-early-start
  - id: init-process-group-killer
    desc: Init script with process group kill
    crit: suspicious
    conf: 0.9
    attack: T1489
    all:
      - id: chkconfig-header
      - id: process-group-kill
  - id: init-process-hunter
    desc: Init script with process hunting
    crit: hostile
    conf: 0.9
    all:
      - id: chkconfig-header
      - id: micro-behaviors/process/enumerate/shell::ps-grep-filter
      - id: proc-cmdline-read
      - id: process-group-kill
  - id: init-aggressive-process-control
    desc: Init script aggressive process mgmt
    crit: hostile
    conf: 0.9
    all:
      - id: chkconfig-all-runlevels
      - id: micro-behaviors/process/enumerate/shell::pgrep-cmd
      - id: micro-behaviors/process/enumerate/shell::ps-grep-filter
      - id: process-group-kill
  - id: init-kernel-device-manipulation
    desc: Init with kernel/device manipulation
    crit: hostile
    conf: 0.85
    attack: T1547.006
    all:
      - id: chkconfig-header
      - id: objectives/persistence/system/init/script::kernel-module-load-dup
      - id: micro-behaviors/fs/device/mknod::mknod-char-device-shell
  - id: kernel-module-load-dup
    desc: Init loads kernel module
    crit: suspicious
    conf: 0.8
    attack: T1547.006
    unless:
      - id: well-known/tool/sysadmin/kubernetes::kubernetes-shell-tooling
      - id: well-known/app/ventoy::runtime-hook-script
      - id: well-known/app/ventoy::livecd-gui-init-script
    any:
      - id: kernel-module-load-dynamic
      - id: kernel-module-load-path
      - id: kernel-module-load-ko
    not:
      - regex: \bmodprobe\s+uvesafb\b
      - regex: \bmodprobe\s+vbox(guest|sf)\b
  - id: init-backdoor-pattern
    desc: Init with backdoor characteristics
    crit: hostile
    conf: 0.9
    all:
      - id: chkconfig-header
      - id: source-nonstandard-init-helper
    any:
      - id: start-stop-daemon-root-exec
      - id: root-binary-envvar
      - id: binary-from-root-dir
  - id: binary-from-root-dir
    desc: Runs binary from /root
    crit: suspicious
    conf: 0.9
    attack: T1543
    unless:
      - id: metadata/build/docker::dockerfile-basename
    all:
      - id: root-binary-quoted-path
    any:
      - id: root-binary-launcher
      - id: root-binary-envvar
      - id: start-stop-daemon-root-exec
  - id: runlevel-hidden-payload-launcher
    desc: SysV init launches hidden system payload
    crit: suspicious
    conf: 0.95
    attack: T1037.004
    all:
      - id: sysv-runlevel-start-name
      - id: objectives/evasion/file-hiding/system-path::hidden-system-binary-path
  - id: init-full-persistence-chain
    desc: Complete SysV init persistence chain with process masquerade
    crit: suspicious
    conf: 0.8
    attack: T1037.004
    mbc: F0006
    all:
      - id: chkconfig-header
      - id: objectives/persistence/system/init/boot::init-script-header
      - id: lockfile-subsys
      - id: daemon-check-masquerade
      - id: varrun-pidfile-mgmt
  - id: init-deceptive-service
    desc: Deceptive init service masquerade
    crit: hostile
    conf: 0.9
    attack: T1036
    all:
      - id: chkconfig-header
      - id: chkconfig-all-runlevels
      - id: processname-mismatch-lib
