defaults:
  platforms: [freebsd, unix]
  for: [java, class]
  attack: T1037.004

traits:
  - id: freebsd-local-rcd-service-path
    desc: FreeBSD local rc.d service path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /usr/local/etc/rc.d/

  - id: jvm-freebsd-profile-persistence
    desc: JVM writes FreeBSD shell profiles
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.(profile|cshrc)[\s\S]{0,80}/agent\.jar'

  - id: jvm-freebsd-rc-local-persistence
    desc: JVM writes FreeBSD rc.local payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/etc/rc\.local[\s\S]{0,120}/agent\.jar'

  - id: jvm-freebsd-rcd-agent-service
    desc: JVM FreeBSD rc.d agent service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'PROVIDE: sysupdate[\s\S]{0,180}/agent\.jar'

composite_rules:
  - id: jvm-freebsd-login-service-persistence
    desc: JVM FreeBSD login and rc.d persistence
    crit: hostile
    conf: 0.98
    any:
      - id: jvm-freebsd-profile-persistence
      - id: jvm-freebsd-rc-local-persistence
      - id: jvm-freebsd-rcd-agent-service

