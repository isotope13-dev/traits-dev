defaults:
  platforms: [unix, appliance]
  for: [rust, elf]
  attack: T1037

traits:
  - id: rust-hidden-cache-init
    desc: Rust hidden cache init
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/etc/init\.d/S[0-9]{2}cache_update'

  - id: rust-hidden-cache-payload
    desc: Rust hidden cache payload
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /tmp/.cache_update

  - id: rust-crontab-hidden-cache
    desc: Rust crontab hidden cache
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'crontab -l[\s\S]{0,180}/tmp/\.cache_update'

composite_rules:
  - id: rust-hidden-cache-persistence
    desc: Rust hidden cache persistence
    crit: hostile
    conf: 0.98
    all:
      - id: rust-hidden-cache-payload
    any:
      - id: rust-hidden-cache-init
      - id: rust-crontab-hidden-cache
