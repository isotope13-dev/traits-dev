defaults:
  platforms: [netscaler, appliance, unix]
  for: [ruby]
  attack: T1037

traits:
  - id: ruby-ns-health-init-path
    desc: Ruby ns health init path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/init.d/ns-system-health

  - id: ruby-init-script-persistence
    desc: Ruby init script persistence
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Init script persistence[\s\S]{0,160}init_path'

  - id: ruby-crontab-self-path
    desc: Ruby crontab self path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'crontab -l[\s\S]{0,180}SELF_PATH'

composite_rules:
  - id: ruby-netscaler-init-persistence
    desc: Ruby NetScaler init persistence
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-ns-health-init-path
      - id: ruby-init-script-persistence
    any:
      - id: ruby-crontab-self-path
