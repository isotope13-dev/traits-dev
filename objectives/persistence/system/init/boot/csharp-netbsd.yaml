defaults:
  platforms: [netbsd, unix, windows]
  for: [csharp, pe]
  attack: T1037.004

traits:
  - id: csharp-netbsd-rcd-script
    desc: C# NetBSD rc.d script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/rc\.subr[\s\S]{0,260}rcvar='
    unless:
      - id: metadata/lang/compiler/systems::go-pe-binary-context

  - id: csharp-netbsd-rcd-path
    desc: C# NetBSD rc.d path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/rc.d/
    unless:
      - id: metadata/lang/compiler/systems::go-pe-binary-context

composite_rules:
  - id: csharp-netbsd-rcd-persistence
    desc: C# NetBSD rc.d persistence
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-netbsd-rcd-script
      - id: csharp-netbsd-rcd-path
    unless:
      - id: metadata/lang/compiler/systems::go-pe-binary-context
