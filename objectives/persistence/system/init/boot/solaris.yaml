defaults:
  platforms: [solaris, unix]
  for: [shell, javascript, typescript, swift, c, cpp, objc]
  attack: T1037

traits:
  - id: solaris-rc2-script-write
    desc: Solaris rc2 startup script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/rc2.d/S
    unless:
      - id: well-known/app/wazuh/
      - id: well-known/app/clonezilla::package-context
      - id: well-known/app/clonezilla::archive-name
      - id: well-known/app/clonezilla::clonezilla-script-context

composite_rules:
  - id: solaris-boot-persistence
    desc: Solaris boot persistence
    crit: hostile
    conf: 0.98
    all:
      - id: solaris-rc2-script-write
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-make-executable
    unless:
      - id: well-known/app/wazuh/
      - id: well-known/app/clonezilla::package-context
      - id: well-known/app/clonezilla::clonezilla-script-context
