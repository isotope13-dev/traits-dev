defaults:
  platforms: [qnx, unix]
  for: [javascript, typescript]
  attack: T1037

traits:
  - id: qnx-node-config-sysinit
    desc: QNX Node config sysinit
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'S[0-9]{2}qnx-[A-Za-z0-9_.-]{3,48}'

  - id: qnx-node-rcd-autostart
    desc: QNX Node rc.d autostart
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/rc.d
    unless:
      - id: metadata/library/generated::sphinx-searchindex-js
      - id: metadata/package/documentation::documentation-dir-path
      - type: path
        basename: true
        exact: +MANIFEST

  - id: qnx-node-photon-service
    desc: QNX Node Photon service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/photon/services/qnx-[A-Za-z0-9_.-]{3,48}\.service'

composite_rules:
  - id: qnx-node-autoinstall-persistence
    desc: QNX Node autoinstall persistence
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-config-sysinit
      - id: qnx-node-rcd-autostart
      - id: qnx-node-photon-service
    unless:
      - id: well-known/app/meshcentral::meshcentral-package-context
