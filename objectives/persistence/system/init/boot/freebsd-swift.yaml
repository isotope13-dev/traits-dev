defaults:
  platforms: [freebsd, unix]
  for: [swift]
  attack: T1037.004

traits:
  - id: swift-freebsd-local-rcd-script
    desc: Swift writes FreeBSD local rc.d script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/local/etc/rc.d

  - id: swift-freebsd-rc-conf-enable
    desc: Swift enables service in rc.conf
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/rc\.conf[\s\S]{0,120}_enable="YES"'

composite_rules:
  - id: swift-freebsd-rcd-persistence
    desc: Swift FreeBSD rc.d persistence
    crit: hostile
    conf: 0.98
    all:
      - id: swift-freebsd-local-rcd-script
      - id: swift-freebsd-rc-conf-enable

