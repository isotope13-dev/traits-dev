defaults:
  platforms: [freebsd, netbsd, unix]
  for: [swift]
  attack: T1037.004

traits:
  - id: swift-freebsd-local-rcd-script
    desc: Swift writes FreeBSD rc.d script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/local/etc/rc.d

  - id: swift-freebsd-rc-conf-enable
    desc: Swift enables service in rc.conf
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/rc\.conf[\s\S]{0,120}_enable="YES"'
  - id: swift-netbsd-rcd-path
    desc: Swift NetBSD rc.d path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/rc.d/
  - id: swift-netbsd-rcsubr-write
    desc: Swift writes rc.subr script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/rc\.subr[\s\S]{0,260}write\(toFile: rcPath'

composite_rules:
  - id: swift-freebsd-rcd-persistence
    desc: Swift FreeBSD rc.d persistence
    crit: hostile
    conf: 0.98
    all:
      - id: swift-freebsd-local-rcd-script
      - id: swift-freebsd-rc-conf-enable
  - id: swift-netbsd-rcd-persistence
    desc: Swift NetBSD rc.d persistence
    crit: hostile
    conf: 0.98
    all:
      - id: swift-netbsd-rcd-path
      - id: swift-netbsd-rcsubr-write
