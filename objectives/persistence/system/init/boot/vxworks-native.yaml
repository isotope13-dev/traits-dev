defaults:
  platforms: [appliance, unix]
  for: [c, cpp, objc, elf]
  attack: T1037

traits:
  - id: vxworks-usrappinit-hook
    desc: VxWorks usrAppInit hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: usrAppInit

  - id: vxworks-taskspawn-malicious-task
    desc: VxWorks taskSpawn task
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'taskSpawn\("?(mal|backdoor|payload|agent)[A-Za-z0-9_]*'

  - id: native-hidden-init-script
    desc: Native hidden init script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/etc/init\.d/S[0-9]{2}[A-Za-z0-9_-]+[\s\S]{0,260}/tmp/\.[A-Za-z0-9_-]+'

  - id: native-s-number-init-script
    desc: Native S-number init script
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: '/etc/init\.d/S[0-9]{2}[A-Za-z0-9_-]+'

  - id: native-hidden-monitor-path
    desc: Native hidden monitor path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tmp/\.(sysmon|cache_update)'

  - id: native-systemd-unit-path
    desc: Native systemd unit path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/etc/systemd/system/\.?[A-Za-z0-9_-]+\.(service|timer|socket|target)\b'
    unless:
      - id: well-known/tool/sysadmin/kubernetes/minikube
      - id: well-known/tool/sysadmin/virtualization::lima-virtualization-tool

  - id: native-initd-agent-path
    desc: Native init.d agent path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /etc/init.d/vxworks-agent

  - id: native-hidden-agent-execstart
    desc: Native hidden agent ExecStart
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ExecStart=/tmp/\.[A-Za-z0-9_-]+'

composite_rules:
  - id: vxworks-boot-task-persistence
    desc: VxWorks boot task persistence
    crit: hostile
    conf: 0.98
    any:
      - id: vxworks-usrappinit-hook
      - id: vxworks-taskspawn-malicious-task
    all:
      - id: micro-behaviors/fs/file/write/direct::write

  - id: native-hidden-init-persistence
    desc: Native hidden init persistence
    crit: hostile
    conf: 0.98
    all:
      - id: native-hidden-init-script
      - id: micro-behaviors/fs/file/write/direct::write

  - id: native-hidden-monitor-init
    desc: Native hidden monitor init
    crit: hostile
    conf: 0.98
    all:
      - id: native-s-number-init-script
      - id: native-hidden-monitor-path

  - id: native-multi-init-persistence
    desc: Native multi-init persistence
    crit: hostile
    conf: 0.98
    all:
      - id: native-systemd-unit-path
      - id: native-initd-agent-path
      - id: native-hidden-agent-execstart
