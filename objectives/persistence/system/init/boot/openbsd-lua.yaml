defaults:
  platforms: [openbsd, bsd, unix]
  for: [lua]
  attack: T1037

traits:
  - id: lua-rc-local-path
    desc: Lua writes rc.local
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /etc/rc.local

  - id: lua-syscheck-copy
    desc: Lua copies syscheck payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.syscheck

composite_rules:
  - id: lua-openbsd-rc-local-persistence
    desc: Lua OpenBSD rc.local persistence
    crit: hostile
    conf: 0.98
    all:
      - id: lua-rc-local-path
      - id: lua-syscheck-copy

