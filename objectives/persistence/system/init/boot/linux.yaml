defaults:
  for:
    - elf
    - shell
    - python
    - go
  attack: T1547.013
  crit: suspicious
  platforms:
    - linux
traits:
  - id: config-autostart
    desc: .config/autostart directory
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\.config.{0,40}autostart'
  - id: etc-xdg-autostart
    desc: /etc/xdg/autostart directory
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: /etc/xdg/autostart
  - id: xdg-config-autostart
    desc: XDG_CONFIG_HOME autostart
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: XDG_CONFIG_HOME.{0,50}autostart
  - id: desktop-entry-header
    desc: '[Desktop Entry] header'
    crit: component
    conf: 0.6
    if:
      type: text
      substr: '[Desktop Entry]'
  - id: x-gnome-autostart
    desc: X-GNOME-Autostart directive
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: X-GNOME-Autostart
  - id: local-share-systemd-user
    desc: .local/share/systemd/user directory
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: .local/share/systemd/user
  - id: systemctl-user-enable
    desc: systemctl --user enable
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: systemctl.{0,30}--user.{0,30}enable
  - id: etc-rc-local
    desc: /etc/rc.local file reference
    crit: notable
    conf: 0.8
    attack: T1037.004
    if:
      type: raw
      substr: /etc/rc.local
  - id: etc-rc-d-rc-local
    desc: /etc/rc.d/rc.local file
    crit: suspicious
    conf: 0.8
    attack: T1037.004
    if:
      type: text
      substr: /etc/rc.d/rc.local
  - id: etc-init-d
    desc: /etc/init.d/ directory
    crit: suspicious
    conf: 0.6
    attack: T1037.004
    if:
      type: text
      substr: /etc/init.d/
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - type: basename
        regex: '(?i)(^|[\\/]).*(example|sample)[^\\/]*\.(sh|bash)$'
    not:
      - regex: __fish_print_debian_services|__fish_print_service_names|path filter -fxZ /etc/init\.d/\*|string replace '/etc/init\.d/' '' -- /etc/init\.d/\*
    downgrade:
      any:
        - id: well-known/app/adguardhome::release-path
  - id: init-script-header
    desc: LSB init script header
    crit: suspicious
    conf: 0.85
    attack: T1037.004
    unless:
      - id: well-known/app/adguardhome::release-path
      - id: metadata/lang/compiler/systems::go-buildinfo-elf
      - id: metadata/lang/compiler/systems::go-buildinfo
      - type: basename
        regex: '(?i)(^|[\\/]).*(example|sample)[^\\/]*\.(sh|bash)$'
    if:
      type: raw
      substr: BEGIN INIT INFO
  - id: update-rc-d-cmd
    desc: update-rc.d command
    crit: suspicious
    conf: 0.7
    attack: T1037.004
    if:
      type: text
      substr: update-rc.d
  - id: chkconfig-cmd
    desc: chkconfig command (persistence context)
    crit: suspicious
    conf: 0.7
    attack: T1037.004
    if:
      type: text
      substr: chkconfig --add
  - id: initd-path-before-service-action
    desc: init.d path before service action
    crit: suspicious
    conf: 0.85
    attack: T1037.004
    if:
      type: text
      regex: /etc/init\.d/[^\s"'`|;]{1,96}.{0,20}\s(start|stop|restart)\b
    not:
      - substr: complete -x -p "/etc/init.d/*"
      - substr: -a start --description
      - substr: -a restart --description
      - regex: /etc/init\.d/\*" -a (start|restart) --description
  - id: initd-path-before-install-action
    desc: init.d path before install action
    crit: suspicious
    conf: 0.85
    attack: T1037.004
    if:
      type: text
      regex: /etc/init\.d/[^\s"'`|;]{1,96}.{0,40}\b(install|enable|disable)\b
  - id: install-action-before-initd-path
    desc: Install action before init.d path
    crit: suspicious
    conf: 0.85
    attack: T1037.004
    unless:
      - id: objectives/persistence/system/init/boot::debhelper-installinit-maintainer-block
    if:
      type: text
      regex: \b(install|enable|disable)\b.{0,40}/etc/init\.d/[^\s"'`|;]{1,96}
  - id: write-action-before-initd-path
    desc: Write action before init.d path
    crit: suspicious
    conf: 0.85
    attack: T1037.004
    unless:
      - id: metadata/build/docker::dockerfile-basename
      - id: objectives/persistence/system/init/boot::debhelper-installinit-maintainer-block
    if:
      type: text
      regex: \b(copy|write|chmod|chown)\b.{0,40}/etc/init\.d/[^\s"'`|;]{1,96}
  - id: debhelper-dh-installinit-marker
    desc: Debhelper dh_installinit marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Automatically added by dh_installinit/"
  - id: debhelper-auto-section-end
    desc: Debhelper section end marker
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "End automatically added section"
  - id: exec-eq-directive
    desc: Exec= directive
    crit: component
    conf: 0.6
    if:
      type: text
      substr: Exec=
  - id: hidden-false-directive
    desc: Hidden=false directive
    crit: component
    conf: 0.5
    if:
      type: text
      substr: Hidden=false
  - id: type-application-directive
    desc: Type=Application directive
    crit: component
    conf: 0.5
    if:
      type: text
      substr: Type=Application
composite_rules:
  - id: linux-xdg-autostart
    desc: XDG autostart directory access
    conf: 0.85
    crit: suspicious
    any:
      - id: config-autostart
      - id: etc-xdg-autostart
      - id: xdg-config-autostart
  - id: linux-desktop-entry
    desc: Desktop entry file creation (.desktop)
    conf: 0.8
    any:
      - id: desktop-entry-header
      - id: x-gnome-autostart
  - id: linux-user-systemd
    desc: User-level systemd service persistence
    conf: 0.85
    attack: T1543.002
    for: [elf, shell, python]
    any:
      - id: objectives/persistence/system/service/systemd::systemd-user-service-path
      - id: local-share-systemd-user
      - id: systemctl-user-enable
  - id: linux-rc-local
    desc: rc.local persistence mechanism
    conf: 0.9
    crit: suspicious
    attack: T1037.004
    any:
      - id: etc-rc-local
      - id: etc-rc-d-rc-local
  - id: linux-init-script
    desc: init.d script interaction or persistence
    conf: 0.85
    crit: suspicious
    attack: T1037.004
    any:
      - id: etc-init-d
      - id: update-rc-d-cmd
      - id: chkconfig-cmd
      - id: init-script-header
      - id: initd-path-before-service-action
      - id: initd-path-before-install-action
      - id: install-action-before-initd-path
      - id: write-action-before-initd-path
  - id: debhelper-installinit-maintainer-block
    desc: Debhelper init maintainer block
    crit: baseline
    conf: 0.95
    all:
      - id: debhelper-dh-installinit-marker
      - id: debhelper-auto-section-end
  - id: linux-xdg-autostart-dir
    desc: XDG autostart directory path
    conf: 0.8
    crit: suspicious
    any:
      - id: config-autostart
      - id: etc-xdg-autostart
  - id: linux-desktop-entry-exec
    desc: Desktop entry executable directive
    conf: 0.8
    crit: suspicious
    any:
      - id: exec-eq-directive
      - id: hidden-false-directive
      - id: type-application-directive
  - id: linux-xdg-executable
    desc: XDG autostart with executable command
    crit: suspicious
    conf: 0.95
    mbc: F0006
    all:
      - id: linux-xdg-autostart-dir
      - id: linux-desktop-entry-exec
