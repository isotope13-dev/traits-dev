defaults:
  platforms: [dragonflybsd, unix]
  for: [kotlin, class, jar, zip]
  attack: T1037.004

traits:
  - id: bsd-rcd-service-dir
    desc: BSD rc.d service path
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: /etc/rc.d/

  - id: bsd-rcd-service-dir-bytecode
    desc: BSD rc.d path in JVM bytecode
    crit: notable
    conf: 0.86
    for: [class]
    if:
      type: hex
      pattern: 2F 65 74 63 2F 72 63 2E 64 2F
    unless:
      - type: basename
        regex: '\.(jar|zip)$'

  - id: bsd-root-cron-tabs-path
    desc: BSD root cron tabs path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /var/cron/tabs/root

  - id: bsd-root-cron-tabs-bytecode
    desc: BSD root cron path in bytecode
    crit: suspicious
    conf: 0.9
    for: [class]
    if:
      type: hex
      pattern: 2F 76 61 72 2F 63 72 6F 6E 2F 74 61 62 73 2F 72 6F 6F 74
    unless:
      - type: basename
        regex: '\.(jar|zip)$'

  - id: jvm-temp-jar-boot-command
    desc: JVM temp jar boot command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'java -jar /tmp/\.[A-Za-z0-9._-]{1,80}'

  - id: jvm-temp-jar-boot-bytecode
    desc: JVM temp jar boot in bytecode
    crit: suspicious
    conf: 0.92
    for: [class]
    if:
      type: hex
      pattern: 6A 61 76 61 20 2D 6A 61 72 20 2F 74 6D 70 2F 2E
    unless:
      - type: basename
        regex: '\.(jar|zip)$'

composite_rules:
  - id: jvm-bsd-rcd-service-persistence
    desc: JVM BSD rc.d service persistence
    crit: hostile
    conf: 0.97
    all:
      - id: bsd-rcd-service-dir
      - id: micro-behaviors/fs/write/file/direct::kotlin-files-write-source
    any:
      - id: jvm-temp-jar-boot-command
      - id: micro-behaviors/fs/write/file/direct::java-owner-execute-permission

  - id: jvm-bsd-rcd-service-bytecode
    desc: JVM bytecode rc.d persistence
    crit: hostile
    conf: 0.97
    for: [class]
    all:
      - id: bsd-rcd-service-dir-bytecode
      - id: micro-behaviors/fs/write/file/direct::jvm-files-writestring-bytecode
    any:
      - id: jvm-temp-jar-boot-bytecode
      - id: micro-behaviors/fs/write/file/direct::jvm-owner-execute-permission

  - id: jvm-bsd-root-cron-persistence
    desc: JVM BSD root cron persistence
    crit: hostile
    conf: 0.97
    all:
      - id: bsd-root-cron-tabs-path
      - id: jvm-temp-jar-boot-command

  - id: jvm-bsd-root-cron-bytecode
    desc: JVM bytecode root cron persistence
    crit: hostile
    conf: 0.97
    for: [class]
    all:
      - id: bsd-root-cron-tabs-bytecode
      - id: jvm-temp-jar-boot-bytecode
