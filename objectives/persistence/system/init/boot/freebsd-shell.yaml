defaults:
  platforms: [freebsd, unix]
  for: [shell]
  attack: T1037.004

traits:
  - id: shell-freebsd-rcd-service-write
    desc: Shell writes FreeBSD rc.d service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/usr/local/etc/rc\.d[\s\S]{0,180}PROVIDE:'

  - id: shell-freebsd-rcconf-enable
    desc: Shell enables FreeBSD rc.conf service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '>>\s*/etc/rc\.conf'
    unless:
      - type: text
        regex: '(?i)setup\.py\s+(build|install)'
      - type: text
        regex: '(?i)\bsshd_enable\s*=\s*yes\b'

composite_rules:
  - id: shell-freebsd-rcd-persistence
    desc: Shell FreeBSD rc.d persistence
    crit: hostile
    conf: 0.98
    all:
      - id: shell-freebsd-rcd-service-write
      - id: shell-freebsd-rcconf-enable
