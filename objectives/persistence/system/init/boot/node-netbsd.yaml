defaults:
  platforms: [netbsd, unix]
  for: [javascript, typescript]
  attack: T1037

traits:
  - id: node-netbsd-rcd-script-path
    desc: Node NetBSD rc.d script path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/local/etc/rc.d/system-health-check

  - id: node-rcsubr-service-body
    desc: Node rc.subr service body
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\. /etc/rc\.subr[\s\S]{0,260}run_rc_command'

composite_rules:
  - id: node-netbsd-rcd-persistence
    desc: Node NetBSD rc.d persistence
    crit: hostile
    conf: 0.98
    all:
      - id: node-netbsd-rcd-script-path
      - id: node-rcsubr-service-body
