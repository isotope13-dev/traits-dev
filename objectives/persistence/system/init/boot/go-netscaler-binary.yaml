defaults:
  platforms: [netscaler, appliance, unix]
  for: [elf, binaries]
  attack: T1037

traits:
  - id: go-netscaler-fw-service
    desc: Go NetScaler fw service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: netscaler-fw-update.service

  - id: go-netscaler-update-exec
    desc: Go NetScaler update exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ExecStart=/bin/sh /tmp/.netscaler_update

  - id: go-ns-startupscript-cli
    desc: Go ns startupScript CLI
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: add ns startupScript netscaler_fw_update

composite_rules:
  - id: go-netscaler-firmware-persistence
    desc: Go NetScaler firmware persist
    crit: hostile
    conf: 0.98
    all:
      - id: go-netscaler-fw-service
      - id: go-netscaler-update-exec
    any:
      - id: go-ns-startupscript-cli
