defaults:
  platforms: [solaris, unix, windows]
  for: [csharp, pe]
  attack: T1037

traits:
  - id: dotnet-solaris-rc3-script
    desc: .NET Solaris rc3 script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/rc3.d/S99solaris_agent

  - id: dotnet-solaris-init-script
    desc: .NET Solaris init script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /etc/init.d/solaris_agent_svc

composite_rules:
  - id: dotnet-solaris-init-persistence
    desc: .NET Solaris init persistence
    crit: hostile
    conf: 0.98
    any:
      - id: dotnet-solaris-rc3-script
      - id: dotnet-solaris-init-script
