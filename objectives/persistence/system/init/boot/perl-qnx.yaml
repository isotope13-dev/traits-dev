defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1037

traits:
  - id: qnx-perl-systemd-init-script
    desc: QNX Perl system.d init script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/system\.d/qnx_[A-Za-z0-9_-]{3,40}\.sh'

  - id: qnx-perl-config-service-path
    desc: QNX Perl config service path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/config/qnx_[A-Za-z0-9_-]{3,40}'

  - id: qnx-perl-hidden-beacon-script
    desc: QNX Perl hidden beacon script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .beacon.pl

composite_rules:
  - id: qnx-perl-boot-beacon-persistence
    desc: QNX Perl boot beacon persistence
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-systemd-init-script
      - id: qnx-perl-config-service-path
      - id: qnx-perl-hidden-beacon-script
