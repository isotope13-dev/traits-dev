defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1037.004

traits:
  - id: ruby-rc-local-append
    desc: Ruby appends rc.local
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "rc_local = '/etc/rc\\.local'[\\s\\S]{0,500}File\\.write\\(rc_local"
  - id: ruby-bashrcd-backdoor
    desc: Ruby writes bashrc.d backdoor
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: .bashrc.d/backdoor_init.sh

composite_rules:
  - id: ruby-rc-local-beacon-persistence
    desc: Ruby rc.local beacon persistence
    crit: hostile
    conf: 0.96
    all:
      - id: ruby-rc-local-append
      - id: ruby-bashrcd-backdoor
