defaults:
  platforms: [unix]
  for: [class, jar, zip]
  attack: T1037.004

traits:
  - id: jvm-initd-path-bytecode
    desc: JVM bytecode init.d path
    crit: notable
    conf: 0.88
    unless:
      - id: metadata/file/extension::python-wheel-basename
    if:
      type: hex
      pattern: 2F 65 74 63 2F 69 6E 69 74 2E 64 2F
