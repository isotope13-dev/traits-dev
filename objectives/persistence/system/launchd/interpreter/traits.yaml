defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: abandon-process-group
    desc: AbandonProcessGroup key
    crit: notable
    conf: 0.76
    if:
      type: value
      path: AbandonProcessGroup
  - id: progargs-shell-interpreter
    desc: ProgramArguments shell interpreter
    crit: component
    conf: 0.82
    attack: T1059.004
    if:
      type: value
      path: ProgramArguments[0]
      regex: ^/(bin|usr/bin)/(ba)?sh$|^/bin/zsh$
  - id: progargs-python-interpreter
    desc: ProgramArguments Python interpreter
    crit: component
    conf: 0.78
    attack: T1059.006
    if:
      type: value
      path: ProgramArguments[0]
      regex: ^(/usr/bin|/usr/local/bin|/opt/homebrew/bin)/python[0-9.]*$
  - id: progargs-ruby-interpreter
    desc: ProgramArguments Ruby interpreter
    crit: component
    conf: 0.78
    attack: T1059.004
    if:
      type: value
      path: ProgramArguments[0]
      exact: /usr/bin/ruby
  - id: progargs-perl-interpreter
    desc: ProgramArguments Perl interpreter
    crit: component
    conf: 0.78
    attack: T1059.006
    if:
      type: value
      path: ProgramArguments[0]
      exact: /usr/bin/perl
  - id: progargs-osascript-interpreter
    desc: ProgramArguments osascript interpreter
    crit: component
    conf: 0.78
    attack: T1059.002
    if:
      type: value
      path: ProgramArguments[0]
      exact: /usr/bin/osascript
  - id: progargs-inline-flag
    desc: ProgramArguments inline execution flag
    crit: component
    conf: 0.82
    attack: T1059
    if:
      type: value
      path: ProgramArguments[*]
      regex: ^-(c|e)$
composite_rules:
  - id: progargs-script-interpreter
    desc: ProgramArguments script interpreter
    crit: component
    conf: 0.78
    attack: T1059
    any:
      - id: progargs-python-interpreter
      - id: progargs-ruby-interpreter
      - id: progargs-perl-interpreter
      - id: progargs-osascript-interpreter
  - id: launchd-inline-interpreter
    desc: Launchd inline interpreter execution
    crit: suspicious
    conf: 0.88
    attack: T1059,T1543.004
    all:
      - id: progargs-inline-flag
    any:
      - id: progargs-shell-interpreter
      - id: progargs-script-interpreter
  - id: launchd-abandon-inline-interpreter
    desc: Launchd abandons inline interpreter
    crit: suspicious
    conf: 0.86
    attack: T1059,T1543.004
    all:
      - id: abandon-process-group
      - id: launchd-inline-interpreter
