defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: env-dyld-insert-libraries
    desc: Launchd injects DYLD library
    crit: suspicious
    conf: 0.9
    attack: T1574.006
    if:
      type: value
      path: EnvironmentVariables.DYLD_INSERT_LIBRARIES
  - id: env-dyld-library-path-var
    desc: Launchd DYLD_LIBRARY_PATH variable
    crit: component
    conf: 0.84
    attack: T1574.006
    if:
      type: value
      path: EnvironmentVariables.DYLD_LIBRARY_PATH
  - id: env-dyld-fallback-library-path-var
    desc: Launchd DYLD fallback library path
    crit: component
    conf: 0.82
    attack: T1574.006
    if:
      type: value
      path: EnvironmentVariables.DYLD_FALLBACK_LIBRARY_PATH
  - id: env-path-override
    desc: Launchd overrides PATH
    crit: notable
    conf: 0.78
    if:
      type: value
      path: EnvironmentVariables.PATH
  - id: env-http-proxy-var
    desc: Launchd HTTP proxy variable
    crit: component
    conf: 0.76
    if:
      type: value
      path: EnvironmentVariables.HTTP_PROXY
  - id: env-https-proxy-var
    desc: Launchd HTTPS proxy variable
    crit: component
    conf: 0.76
    if:
      type: value
      path: EnvironmentVariables.HTTPS_PROXY
  - id: env-all-proxy-var
    desc: Launchd ALL_PROXY variable
    crit: component
    conf: 0.76
    if:
      type: value
      path: EnvironmentVariables.ALL_PROXY
  - id: env-lower-http-proxy-var
    desc: Launchd lowercase http proxy
    crit: component
    conf: 0.74
    if:
      type: value
      path: EnvironmentVariables.http_proxy
  - id: env-lower-https-proxy-var
    desc: Launchd lowercase https proxy
    crit: component
    conf: 0.74
    if:
      type: value
      path: EnvironmentVariables.https_proxy
  - id: env-lower-all-proxy-var
    desc: Launchd lowercase all proxy
    crit: component
    conf: 0.74
    if:
      type: value
      path: EnvironmentVariables.all_proxy
composite_rules:
  - id: env-dyld-library-path
    desc: Launchd sets DYLD library path
    crit: notable
    conf: 0.84
    attack: T1574.006
    any:
      - id: env-dyld-library-path-var
      - id: env-dyld-fallback-library-path-var
  - id: env-proxy-variable
    desc: Launchd sets proxy variable
    crit: notable
    conf: 0.76
    any:
      - id: env-http-proxy-var
      - id: env-https-proxy-var
      - id: env-all-proxy-var
      - id: env-lower-http-proxy-var
      - id: env-lower-https-proxy-var
      - id: env-lower-all-proxy-var
  - id: launchd-env-injection-unusual
    desc: Launchd env injection with unusual program
    crit: suspicious
    conf: 0.9
    attack: T1574.006,T1543.004
    all:
      - id: objectives/persistence/system/launchd/core::program-unusual-location
    any:
      - id: env-dyld-insert-libraries
      - id: env-dyld-library-path
      - id: env-path-override
