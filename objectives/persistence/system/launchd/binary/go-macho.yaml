defaults:
  platforms: [unix]
  for: [macho]
  attack: T1543.004

traits:
  - id: go-macho-update-agent-plist
    desc: Go Mach-O update agent plist
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: com.apple.update.agent.plist

  - id: go-macho-launchctl-string
    desc: Go Mach-O launchctl string
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: launchctl
    unless:
      - id: well-known/tool/reverse-engineering/frida/
      - id: objectives/supply-chain/trojanized/app/debug-probe/

  - id: go-macho-runatload-true
    desc: Go Mach-O RunAtLoad true
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '<key>RunAtLoad</key>[\s\S]{0,80}<true'
    unless:
      - id: objectives/supply-chain/trojanized/app/debug-probe/

composite_rules:
  - id: go-macho-launchd-persistence
    desc: Go Mach-O launchd persistence
    crit: hostile
    conf: 0.98
    all:
      - id: go-macho-update-agent-plist
      - id: go-macho-launchctl-string
