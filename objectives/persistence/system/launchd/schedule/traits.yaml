defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: start-interval-short
    desc: Short StartInterval schedule
    crit: notable
    conf: 0.84
    mbc: B0028
    attack: T1053.003
    if:
      type: kv
      path: StartInterval
      regex: ^([1-9]|[1-5][0-9]|60)$
composite_rules:
  - id: launchd-short-interval-unusual
    desc: Short-interval Launchd unusual program
    crit: suspicious
    conf: 0.88
    attack: T1053.003,T1543.004
    all:
      - id: start-interval-short
      - id: objectives/persistence/system/launchd/core::program-unusual-location
