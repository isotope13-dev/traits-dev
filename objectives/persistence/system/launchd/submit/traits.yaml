defaults:
  platforms: [macos]
  for: [scripts, binaries]
  attack: T1543.001,T1059.004
  mbc: B0028
traits:
  - id: launchctl-submit-command
    desc: launchctl submit service command
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\blaunchctl\s+submit\s+-l\b'
    unless:
      - id: metadata/signed/platform::apple
      - id: well-known/app/mastergo::mastergo-application-context
  - id: launchctl-submit-zsh
    desc: launchctl submit starts zsh
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\blaunchctl\s+submit\b.{0,120}\bzsh\b'
    unless:
      - id: metadata/signed/platform::apple
      - id: well-known/app/mastergo::mastergo-application-context
  - id: launchctl-profiler-label
    desc: launchctl profiler service label
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b[a-z0-9_.-]{1,40}\.profiler\b'
    unless:
      - id: metadata/signed/platform::apple
composite_rules:
  - id: launchctl-submit-profiler
    desc: launchctl submit profiler service
    crit: suspicious
    conf: 0.9
    all:
      - id: launchctl-submit-command
      - id: launchctl-profiler-label
    unless:
      - id: metadata/signed/platform::apple
  - id: launchctl-tls-bypass-detached-loader
    desc: launchd submission paired with Electron TLS bypass and detached spawn
    crit: hostile
    conf: 0.97
    attack: T1543.001,T1105,T1553.004
    for: [javascript, typescript]
    near_lines: 180
    all:
      - id: launchctl-submit-command
      - id: objectives/evasion/security-bypass/tls::electron-ignore-certificate-errors
      - id: micro-behaviors/process/create/spawn::detached-true
    unless:
      - id: metadata/package/testing/
      - id: well-known/app/mastergo::mastergo-application-context
