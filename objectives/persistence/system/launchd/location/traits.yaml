defaults:
  platforms: [macos]
  for: [plist]
traits:
- id: program-user-home
  desc: Program in user home
  crit: notable
  conf: 0.76
  if:
    type: value
    path: Program
    regex: ^/Users/[^/]{1,80}/
- id: args-user-home
  desc: ProgramArguments[0] in user home
  crit: notable
  conf: 0.76
  if:
    type: value
    path: ProgramArguments[0]
    regex: ^/Users/[^/]{1,80}/
- id: progargs-relative-executable
  desc: ProgramArguments[0] relative executable
  crit: notable
  conf: 0.78
  if:
    type: value
    path: ProgramArguments[0]
    regex: ^[A-Za-z0-9_.-][A-Za-z0-9_./ -]{0,160}$
  not:
  - regex: ^true$
  - regex: ^false$
  - regex: ^yes$
  - regex: ^no$
  - regex: ^on$
  - regex: ^off$
- id: working-directory-tmp
  desc: WorkingDirectory in temp path
  crit: notable
  conf: 0.78
  if:
    type: value
    path: WorkingDirectory
    regex: ^/(tmp|private/tmp)(/|$)
- id: working-directory-var-tmp
  desc: WorkingDirectory in var tmp
  crit: notable
  conf: 0.78
  if:
    type: value
    path: WorkingDirectory
    regex: ^/var/tmp(/|$)
- id: working-directory-shared
  desc: WorkingDirectory in Users Shared
  crit: notable
  conf: 0.76
  if:
    type: value
    path: WorkingDirectory
    regex: ^/Users/Shared(/|$)
- id: working-directory-user-dotdir
  desc: WorkingDirectory under user dotdir
  crit: notable
  conf: 0.8
  if:
    type: value
    path: WorkingDirectory
    regex: ^/Users/[^/]{1,80}/\.[^/]{1,80}(/|$)
composite_rules:
- id: program-user-writable-location
  desc: Launchd program in user-writable location
  crit: notable
  conf: 0.8
  any:
  - id: objectives/persistence/system/launchd/core::program-unusual-location
  - id: program-user-home
  - id: args-user-home
- id: launchd-relative-exec-writable-cwd
  desc: Launchd relative exec from writable directory
  crit: suspicious
  conf: 0.9
  attack: T1543.004,T1574.007
  all:
  - id: progargs-relative-executable
  any:
  - id: working-directory-tmp
  - id: working-directory-var-tmp
  - id: working-directory-shared
  - id: working-directory-user-dotdir
