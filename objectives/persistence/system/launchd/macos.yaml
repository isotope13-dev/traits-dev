defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: launch-agents
    desc: LaunchAgents directory (user-level services)
    crit: notable
    conf: 0.7
    mbc: B0028
    attack: T1543.004
    for: [plist, shell, applescript, python, javascript, macho]
    if:
      type: text
      substr: LaunchAgents
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: launch-daemons
    desc: LaunchDaemons directory (system-level services)
    crit: notable
    conf: 0.7
    mbc: B0028
    attack: T1543.004
    for: [plist, shell, applescript, python, javascript, macho]
    if:
      type: text
      substr: LaunchDaemons
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: launchctl-command
    desc: launchctl command (manage launchd services)
    crit: notable
    conf: 0.7
    mbc: B0028
    attack: T1543.004
    for: [shell, applescript, python, javascript, c, macho]
    if:
      type: text
      regex: (^|[\s;&|(/])(/bin/)?launchctl(\s|$)
    not:
      - regex: completions/launchctl\.fish|complete --command launchctl|Opens the launchctl daemon file
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: plist-extension
    desc: .plist file extension (property list)
    crit: component
    conf: 0.6
    attack: T1543.004
    if:
      type: text
      regex: Launch(Agents|Daemons)/.{1,96}\.plist
  - id: run-at-load
    desc: RunAtLoad key (start service at load)
    crit: notable
    conf: 0.8
    mbc: B0028
    attack: T1543.004
    if:
      type: kv
      path: RunAtLoad
  - id: keep-alive
    desc: KeepAlive key (ensure service is always running)
    crit: notable
    conf: 0.8
    mbc: B0028
    attack: T1543.004
    if:
      type: kv
      path: KeepAlive
  - id: throttle-interval
    desc: ThrottleInterval key (min time between spawns)
    crit: notable
    conf: 0.5
    if:
      type: kv
      path: ThrottleInterval
  - id: start-interval
    desc: StartInterval key (scheduled execution)
    crit: notable
    conf: 0.8
    mbc: B0028
    attack: T1053.003
    if:
      type: kv
      path: StartInterval
  - id: start-calendar-interval
    desc: StartCalendarInterval key (scheduled execution)
    crit: notable
    conf: 0.8
    mbc: B0028
    attack: T1053.003
    if:
      type: kv
      path: StartCalendarInterval
  - id: stdout-path
    desc: StandardOutPath key (log redirection)
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: StandardOutPath
  - id: stderr-path
    desc: StandardErrorPath key (log redirection)
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: StandardErrorPath
  - id: env-vars-dup
    desc: EnvironmentVariables key
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: EnvironmentVariables
  - id: mach-services
    desc: MachServices key (XPC service registration)
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: MachServices
  - id: sockets
    desc: Sockets key (network socket activation)
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: Sockets
  - id: service-ipc
    desc: ServiceIPC key
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: ServiceIPC
  - id: process-type
    desc: ProcessType key (Background, App, etc.)
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: ProcessType
  - id: associated-bundles
    desc: AssociatedBundleIdentifiers key
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: AssociatedBundleIdentifiers
  - id: working-directory
    desc: WorkingDirectory key
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: WorkingDirectory
  - id: launch-events
    desc: LaunchEvents key (event-based activation)
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: LaunchEvents
  - id: spawn-type
    desc: POSIXSpawnType key
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: POSIXSpawnType
  - id: soft-resource-limits
    desc: SoftResourceLimits key
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: SoftResourceLimits
  - id: hard-resource-limits
    desc: HardResourceLimits key
    crit: notable
    conf: 0.8
    if:
      type: kv
      path: HardResourceLimits
  - id: sock-service-name
    desc: SockServiceName key (launchd socket activation)
    crit: notable
    conf: 0.8
    mbc: B0028
    attack: T1543.004
    if:
      type: kv
      path: SockServiceName
  - id: inetd-compat
    desc: inetdCompatibility key (socket handoff)
    crit: notable
    conf: 0.8
    mbc: B0028
    attack: T1543.004
    if:
      type: text
      substr: inetdCompatibility
  - id: shell-program
    desc: Shell as launchd Program (/bin/sh)
    crit: notable
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: <key>Program</key>\s*<string>/bin/(sh|shell|zsh)</string>
  - id: embedded-plist-shell
    desc: Embedded plist template with shell program
    crit: notable
    conf: 0.8
    for:
      - c
      - macho
    if:
      type: text
      regex: <key>Program</key>\s*<string>/bin/(?:sh|zsh|shell)</string>
  - id: embedded-plist-shell-sh
    desc: Embedded plist /bin/sh string element
    crit: notable
    conf: 0.8
    for:
      - c
      - macho
    if:
      type: text
      substr: <string>/bin/sh</string>
  - id: embedded-sock-service
    desc: Embedded SockServiceName plist key
    crit: notable
    conf: 0.8
    for:
      - c
      - macho
    if:
      type: text
      substr: SockServiceName
  - id: embedded-plist-osascript
    desc: Embedded plist with osascript program
    crit: suspicious
    conf: 0.85
    for:
      - macho
    if:
      type: text
      regex: <string>(/usr/bin/)?osascript</string>
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: embedded-plist-runatload
    desc: Embedded RunAtLoad plist key in binary
    crit: notable
    conf: 0.8
    for:
      - javascript
      - macho
    if:
      type: text
      substr: <key>RunAtLoad</key>
  - id: embedded-plist-programarguments
    desc: Embedded ProgramArguments plist key
    crit: notable
    conf: 0.8
    for:
      - macho
      - c
    if:
      type: text
      substr: <key>ProgramArguments</key>
  - id: embedded-plist-zsh-programargs
    desc: Embedded launchd ProgramArguments uses zsh
    crit: suspicious
    conf: 0.9
    for:
      - macho
      - c
    if:
      type: text
      regex: <key>ProgramArguments</key>.{0,120}<string>/bin/zsh</string>
  - id: embedded-plist-keepalive
    desc: Embedded KeepAlive plist key in source
    crit: notable
    conf: 0.8
    for:
      - javascript
      - macho
    if:
      type: text
      substr: <key>KeepAlive</key>
  - id: build-plist-symbol
    desc: build_plist helper symbol
    crit: notable
    conf: 0.82
    for:
      - c
      - macho
    if:
      type: symbol
      exact: build_plist
  - id: construct-plist-path-symbol
    desc: construct_plist_path helper symbol
    crit: notable
    conf: 0.8
    for:
      - c
      - macho
    if:
      type: symbol
      exact: construct_plist_path
  - id: install-daemon-symbol
    desc: install_daemon routine symbol
    crit: suspicious
    conf: 0.9
    for:
      - c
      - macho
    if:
      type: symbol
      exact: install_daemon
  - id: fake-apple-label
    desc: Launchd Label uses com.apple namespace
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: Label
      regex: ^com\.apple\.[A-Z][A-Za-z]+
    not:
      - substr: com.apple.HIToolbox
      - substr: com.apple.WebKit
      - substr: com.apple.CoreFoundation
      - substr: com.apple.Foundation
      - substr: com.apple.Security
      - substr: com.apple.CFNetwork
      - substr: com.apple.CoreServices
      - substr: com.apple.CoreData
      - substr: com.apple.AppKit
      - substr: com.apple.ReportCrash
      - substr: com.apple.ServiceManagement
      - substr: com.apple.UIKit
      - substr: com.apple.decmpfs
      - substr: com.apple.ResourceFork
      - substr: com.apple.WindowShadowDensity
    unless:
      - id: metadata/signed/anchor-apple
      - id: metadata/signed/platform::apple
    downgrade:
      any:
        - id: metadata/vendor/apple::system-framework
  - id: fake-homebrew-label
    desc: Fake homebrew identifier (com.homebrew)
    crit: suspicious
    conf: 0.9
    for:
      - macho
      - c
    if:
      type: text
      substr: com.homebrew
  - id: label-apple
    desc: Launchd Label starting with com.apple
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: Label
      regex: ^com\.apple\.
  - id: label-zoom
    desc: Launchd Label starting with com.zoom
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: Label
      regex: ^com\.zoom\.
  - id: label-google
    desc: Launchd Label starting with com.google
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: Label
      regex: ^com\.google\.
  - id: label-microsoft
    desc: Launchd Label starting with com.microsoft
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: Label
      regex: ^com\.microsoft\.
  - id: label-adobe
    desc: Launchd Label starting with com.adobe
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: Label
      regex: ^com\.adobe\.
  - id: label-oracle
    desc: Launchd Label starting with com.oracle
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: Label
      regex: ^com\.oracle\.
  - id: stdout-tmp
    desc: StandardOutPath in /tmp/
    crit: suspicious
    conf: 0.8
    if:
      type: kv
      path: StandardOutPath
      regex: ^/(tmp|var/tmp|private/tmp)/
    unless:
      - type: kv
        path: WorkingDirectory
        regex: ^/Applications/[^/]{1,120}\.app/Contents/(MacOS|Library)(/|$)
  - id: stderr-tmp
    desc: StandardErrorPath in /tmp/
    crit: suspicious
    conf: 0.8
    if:
      type: kv
      path: StandardErrorPath
      regex: ^/(tmp|var/tmp|private/tmp)/
    unless:
      - type: kv
        path: WorkingDirectory
        regex: ^/Applications/[^/]{1,120}\.app/Contents/(MacOS|Library)(/|$)
  - id: program-tmp
    desc: Program in /tmp/
    crit: suspicious
    conf: 0.8
    if:
      type: kv
      path: Program
      regex: ^/(tmp|var/tmp|private/tmp)/
  - id: args-tmp
    desc: ProgramArguments[0] in /tmp/
    crit: suspicious
    conf: 0.8
    if:
      type: kv
      path: ProgramArguments[0]
      regex: ^/(tmp|var/tmp|private/tmp)/
  - id: program-shared
    desc: Program in /Users/Shared/
    crit: suspicious
    conf: 0.7
    if:
      type: kv
      path: Program
      regex: ^/Users/Shared/
  - id: args-shared
    desc: ProgramArguments[0] in /Users/Shared/
    crit: suspicious
    conf: 0.7
    if:
      type: kv
      path: ProgramArguments[0]
      regex: ^/Users/Shared/
  - id: program-hidden
    desc: Hidden Program executable
    crit: suspicious
    conf: 0.7
    if:
      type: kv
      path: Program
      regex: /\.[^/]{1,120}$
  - id: args-hidden
    desc: Hidden ProgramArguments[0] executable
    crit: suspicious
    conf: 0.7
    if:
      type: kv
      path: ProgramArguments[0]
      regex: /\.[^/]{1,120}$
  - id: program-system
    desc: LaunchAgent Program in /System/
    crit: component
    if:
      type: kv
      path: Program
      regex: '^/System/'
  - id: program-usr
    desc: LaunchAgent Program in /usr/
    crit: component
    if:
      type: kv
      path: Program
      regex: '^/usr/'
  - id: progargs-system
    desc: LaunchAgent ProgramArguments[0] in /System/
    crit: component
    if:
      type: kv
      path: ProgramArguments[0]
      regex: '^/System/'
  - id: progargs-usr
    desc: LaunchAgent ProgramArguments[0] in /usr/
    crit: component
    if:
      type: kv
      path: ProgramArguments[0]
      regex: '^/usr/'
  - id: program-zoom
    desc: LaunchAgent Program is Zoom app
    crit: component
    if:
      type: kv
      path: Program
      regex: '^/Applications/zoom\.us\.app/'
  - id: progargs-zoom
    desc: LaunchAgent ProgramArguments[0] is Zoom app
    crit: component
    if:
      type: kv
      path: ProgramArguments[0]
      regex: '^/Applications/zoom\.us\.app/'
  - id: program-google
    desc: LaunchAgent Program is Google app
    crit: component
    if:
      type: kv
      path: Program
      regex: '^(/Library/Google/|/Applications/Google)'
  - id: progargs-google
    desc: LaunchAgent ProgramArguments[0] is Google app
    crit: component
    if:
      type: kv
      path: ProgramArguments[0]
      regex: '^(/Library/Google/|/Applications/Google)'
  - id: program-microsoft
    desc: LaunchAgent Program is Microsoft app
    crit: component
    if:
      type: kv
      path: Program
      regex: '^(/Library/Application Support/Microsoft/|/Applications/Microsoft)'
  - id: progargs-microsoft
    desc: LaunchAgent ProgramArguments[0] is Microsoft app
    crit: component
    if:
      type: kv
      path: ProgramArguments[0]
      regex: '^(/Library/Application Support/Microsoft/|/Applications/Microsoft)'
  - id: program-oracle-java
    desc: LaunchAgent Program is Oracle Java plugin
    crit: component
    if:
      type: kv
      path: Program
      regex: '^/Library/Internet Plug-Ins/JavaAppletPlugin\.plugin/'
  - id: progargs-oracle-java
    desc: LaunchAgent ProgramArguments[0] is Oracle Java plugin
    crit: component
    if:
      type: kv
      path: ProgramArguments[0]
      regex: '^/Library/Internet Plug-Ins/JavaAppletPlugin\.plugin/'
composite_rules:
  - id: launchd
    desc: macOS launchd persistence (2+ indicators)
    crit: notable
    conf: 0.66
    mbc: B0028
    attack: T1543.004
    for: [plist, shell, applescript, python, javascript, macho]
    needs: 2
    any:
      - id: launch-agents
      - id: launch-daemons
      - id: launchctl-command
      - id: plist-extension
      - id: run-at-load
      - id: keep-alive
      - id: start-interval
      - id: start-calendar-interval
      - id: stdout-path
      - id: stderr-path
      - id: objectives/persistence/system/launchd::env-vars-dup
      - id: mach-services
      - id: sockets
      - id: service-ipc
      - id: process-type
      - id: associated-bundles
      - id: working-directory
      - id: launch-events
      - id: spawn-type
      - id: soft-resource-limits
      - id: hard-resource-limits
      - id: sock-service-name
      - id: inetd-compat
      - id: embedded-plist-runatload
      - id: embedded-plist-keepalive
      - id: embedded-plist-programarguments
      - id: embedded-plist-shell
      - id: embedded-plist-zsh-programargs
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: launchd-bind-shell
    desc: Launchd socket-activated bind shell
    crit: suspicious
    conf: 0.9
    mbc: B0028
    attack: T1543.004
    all:
      - id: sock-service-name
      - id: inetd-compat
    any:
      - id: shell-program
      - id: micro-behaviors/process/create/shell::bin-sh-interactive
  - id: embedded-plist-bind-shell
    desc: Embedded plist bind-shell template in binary
    crit: suspicious
    conf: 0.85
    mbc: B0028
    attack: T1543.004
    for:
      - c
      - macho
    all:
      - id: embedded-plist-shell-sh
      - id: embedded-sock-service
  - id: launchd-embedded-zsh-agent
    desc: Embedded RunAtLoad LaunchAgent starts zsh
    crit: hostile
    conf: 0.95
    mbc: B0028
    attack: T1543.004,T1059.004
    for:
      - macho
      - c
    all:
      - id: launch-agents
      - id: embedded-plist-runatload
      - id: embedded-plist-programarguments
      - id: micro-behaviors/process/create/shell::bin-zsh-binary
    unless:
      - id: metadata/signed/platform::apple
  - id: launchd-dropper
    desc: Launchd persistence installer via system commands
    crit: hostile
    conf: 0.9
    mbc: B0028
    attack: T1543.004
    for:
      - c
      - macho
    all:
      - id: launch-agents
      - id: launchctl-command
      - id: micro-behaviors/process/create/shell::system-fn
      - id: objectives/evasion/fileless/memory::exec-function
  - id: embedded-launchdaemon-installer
    desc: Embedded LaunchDaemon install routine
    crit: suspicious
    conf: 0.91
    for:
      - c
      - macho
    any:
      - id: build-plist-symbol
      - id: construct-plist-path-symbol
      - id: install-daemon-symbol
    needs: 2
  - id: launchd-admin-daemon-installer
    desc: LaunchDaemon install with admin rights
    crit: hostile
    conf: 0.96
    for:
      - c
      - macho
    all:
      - id: embedded-launchdaemon-installer
      - id: objectives/privilege-escalation/elevation-control/prompt-escalation::auth-rights-request
    any:
      - id: micro-behaviors/process/create/shell::system-fn
      - id: objectives/collection/keylog/capture::macos-eventtap
      - id: micro-behaviors/communications/socket/connect::connect
  - id: launchd-embedded-bind-shell
    desc: Embedded plist bind-shell dropped to LaunchAgents
    crit: hostile
    conf: 0.95
    mbc: B0028
    attack: T1543.004
    for:
      - c
      - macho
    all:
      - id: embedded-plist-bind-shell
      - id: launch-agents
      - id: micro-behaviors/process/create/shell::system-fn
  - id: launchd-app-trojan
    desc: Launchd persistence with app bundle hijacking
    crit: hostile
    conf: 0.95
    mbc: B0028
    attack: T1543.004
    for:
      - c
      - macho
    all:
      - id: launchd
      - id: objectives/lateral-movement/trojanize/app::app-bundle-hijack
      - id: micro-behaviors/process/create/shell::system-fn
  - id: output-suspicious-location
    desc: Launchd StandardOutPath/StandardErrorPath in unusual location
    crit: suspicious
    conf: 0.8
    any:
      - id: stdout-tmp
      - id: stderr-tmp
  - id: program-unusual-location
    desc: Launchd Program/ProgramArguments in unusual location
    crit: notable
    conf: 0.7
    any:
      - id: program-tmp
      - id: args-tmp
      - id: program-shared
      - id: args-shared
      - id: program-hidden
      - id: args-hidden
  - id: launchd-masquerading-apple
    desc: Apple-labeled Launchd item launching from unusual location
    crit: hostile
    conf: 0.9
    all:
      - id: label-apple
      - id: program-unusual-location
    unless:
      - id: program-system
      - id: program-usr
      - id: progargs-system
      - id: progargs-usr
  - id: launchd-masquerading-zoom
    desc: Zoom-labeled Launchd item launching from unusual location
    crit: hostile
    conf: 0.9
    all:
      - id: label-zoom
      - id: program-unusual-location
    unless:
      - id: program-zoom
      - id: progargs-zoom
  - id: launchd-masquerading-google
    desc: Google-labeled Launchd item launching from unusual location
    crit: hostile
    conf: 0.9
    all:
      - id: label-google
      - id: program-unusual-location
    unless:
      - id: program-google
      - id: progargs-google
  - id: launchd-masquerading-microsoft
    desc: Microsoft-labeled Launchd item launching from unusual location
    crit: hostile
    conf: 0.9
    all:
      - id: label-microsoft
      - id: program-unusual-location
    unless:
      - id: program-microsoft
      - id: progargs-microsoft
  - id: launchd-masquerading-oracle
    desc: Oracle-labeled Launchd item launching from unusual location
    crit: hostile
    conf: 0.9
    all:
      - id: label-oracle
      - id: program-unusual-location
    unless:
      - id: program-oracle-java
      - id: progargs-oracle-java
  - id: launchd-persistent-unusual
    desc: Persistent Launchd item (KeepAlive) launching from unusual location
    crit: suspicious
    conf: 0.8
    all:
      - id: keep-alive
      - id: program-unusual-location
  - id: launchd-osascript-dropper
    desc: LaunchAgent persistence with osascript payload
    crit: hostile
    conf: 0.9
    mbc: B0028
    attack: T1543.004
    for:
      - macho
    all:
      - id: launch-agents
      - id: launchctl-command
      - id: embedded-plist-osascript
    any:
      - id: micro-behaviors/process/create/script::do-shell-script-binary
      - id: micro-behaviors/process/create/script::pipe-osascript
      - id: embedded-plist-runatload
  - id: npm-launchagent-installer
    desc: npm install hook drops persistent LaunchAgent
    crit: hostile
    conf: 0.97
    mbc: B0028
    attack: T1543.004
    for:
      - javascript
    all:
      - id: launch-agents
      - id: embedded-plist-runatload
      - id: embedded-plist-keepalive
      - id: micro-behaviors/fs/write/file::js-file-write
      - id: objectives/supply-chain/install-hook/scripts::install-js-filename
    any:
      - id: micro-behaviors/process/create/shell/lang::js-execsync
      - id: micro-behaviors/fs/chmod/executable::any
      - id: launchctl-command
