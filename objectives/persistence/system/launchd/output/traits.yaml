defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: stdout-dev-null
    desc: StandardOutPath suppresses output
    crit: notable
    conf: 0.76
    if:
      type: value
      path: StandardOutPath
      exact: /dev/null
  - id: stderr-dev-null
    desc: StandardErrorPath suppresses output
    crit: notable
    conf: 0.76
    if:
      type: value
      path: StandardErrorPath
      exact: /dev/null
composite_rules:
  - id: launchd-output-suppressed-unusual
    desc: Launchd suppresses unusual program output
    crit: suspicious
    conf: 0.84
    attack: T1543.004
    all:
      - id: objectives/persistence/system/launchd/output
      - id: objectives/persistence/system/launchd/core::program-unusual-location
