defaults:
  platforms: [macos, linux]
  for: [c, objc, elf]
  attack: T1543.004

traits:
  - id: macos-launchdaemon-path-text
    desc: macOS LaunchDaemon path text
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /Library/LaunchDaemons
    unless:
      - id: well-known/tool/development/ipsw

  - id: macos-embedded-launchd-keys
    desc: macOS embedded launchd keys
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '<key>RunAtLoad</key>[\s\S]{0,360}<key>StartInterval</key>[\s\S]{0,360}<key>KeepAlive</key>'

  - id: macos-launchctl-load-command
    desc: macOS launchctl load command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /bin/launchctl load

  - id: macos-fake-apple-service-name
    desc: macOS fake Apple service name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: com.apple.systemservice

composite_rules:
  - id: macos-embedded-launchd-persistence
    desc: macOS embedded launchd persistence
    crit: hostile
    conf: 0.97
    all:
      - id: macos-launchdaemon-path-text
      - id: macos-embedded-launchd-keys
    any:
      - id: macos-launchctl-load-command
      - id: macos-fake-apple-service-name
