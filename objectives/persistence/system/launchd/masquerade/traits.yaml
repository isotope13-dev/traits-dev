defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: suspicious-label
    desc: Masqueraded LaunchDaemon label
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "Label"
      regex: '(?i)com\.(google\.webkit\.service|apple\.cli)'
  - id: accountsd-helper-label
    desc: Masqueraded accountsd helper label
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "Label"
      exact: com.apple.accountsd.helper
  - id: apple-helper-label
    desc: Apple-style helper label
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "Label"
      regex: 'com\.apple\.[a-z0-9.-]{2,30}\.(helper|service|agent|daemon)'
  - id: suspicious-program-path
    desc: LaunchDaemon in non-standard directory
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "ProgramArguments[*]"
      regex: '(?i)/Users/Shared/|/Library/Application Support/iCloud/|/Library/Google/'
  - id: accountsd-program-path
    desc: 'AccountsHelper in hidden app Support dir'
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: "ProgramArguments[*]"
      substr: /Library/Application Support/.com.apple.accountsd/AccountsHelper
  - id: hidden-apple-appsupport-path
    desc: Hidden Apple Application Support path
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "ProgramArguments[*]"
      regex: /Application Support/\.com\.apple\.[a-z0-9.-]{2,40}/
composite_rules:
  - id: sapphire-sleet-persistence
    desc: Sapphire Sleet persistence via LaunchDaemon
    crit: hostile
    attack: T1543.004
    all:
      - id: suspicious-label
      - id: suspicious-program-path
  - id: accountsd-helper-persistence
    desc: Masqueraded accountsd LaunchDaemon persistence
    crit: hostile
    attack: T1543.004
    all:
      - id: accountsd-helper-label
      - id: accountsd-program-path
  - id: hidden-apple-helper-persistence
    desc: Hidden Apple helper LaunchDaemon persistence
    crit: hostile
    attack: T1543.004
    all:
      - id: apple-helper-label
      - id: hidden-apple-appsupport-path
