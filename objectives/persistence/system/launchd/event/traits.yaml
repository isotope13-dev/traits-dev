defaults:
  platforms: [macos]
  for: [plist]
  attack: T1543.004
traits:
  - id: watch-paths
    desc: WatchPaths key (event trigger)
    crit: notable
    conf: 0.78
    mbc: B0028
    if:
      type: value
      path: WatchPaths
  - id: queue-directories
    desc: QueueDirectories key (event trigger)
    crit: notable
    conf: 0.78
    mbc: B0028
    if:
      type: value
      path: QueueDirectories
  - id: start-on-mount
    desc: StartOnMount key (mount trigger)
    crit: notable
    conf: 0.78
    mbc: B0028
    if:
      type: value
      path: StartOnMount
  - id: watchpath-user-home
    desc: WatchPaths monitors user home
    crit: component
    conf: 0.82
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/
  - id: watchpath-users-shared
    desc: WatchPaths monitors Users Shared
    crit: component
    conf: 0.82
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/Shared(/|$)
  - id: watchpath-tmp
    desc: WatchPaths monitors temp path
    crit: component
    conf: 0.82
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/(private/)?tmp/
  - id: watchpath-var-tmp
    desc: WatchPaths monitors var tmp
    crit: component
    conf: 0.82
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/var/tmp/
  - id: queuedir-user-home
    desc: QueueDirectories monitors user home
    crit: component
    conf: 0.82
    if:
      type: value
      path: QueueDirectories[*]
      regex: ^/Users/[^/]{1,80}/
  - id: queuedir-users-shared
    desc: QueueDirectories monitors Users Shared
    crit: component
    conf: 0.82
    if:
      type: value
      path: QueueDirectories[*]
      regex: ^/Users/Shared(/|$)
  - id: queuedir-tmp
    desc: QueueDirectories monitors temp path
    crit: component
    conf: 0.82
    if:
      type: value
      path: QueueDirectories[*]
      regex: ^/(private/)?tmp/
  - id: queuedir-var-tmp
    desc: QueueDirectories monitors var tmp
    crit: component
    conf: 0.82
    if:
      type: value
      path: QueueDirectories[*]
      regex: ^/var/tmp/
  - id: watchpath-keychains
    desc: WatchPaths monitors Keychains
    crit: component
    conf: 0.86
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/Library/Keychains(/|$)
  - id: watchpath-cookies
    desc: WatchPaths monitors Cookies
    crit: component
    conf: 0.84
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/Library/Cookies(/|$)
  - id: watchpath-safari
    desc: WatchPaths monitors Safari data
    crit: component
    conf: 0.84
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/Library/Safari(/|$)
  - id: watchpath-mail
    desc: WatchPaths monitors Mail data
    crit: component
    conf: 0.84
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/Library/Mail(/|$)
  - id: watchpath-messages
    desc: WatchPaths monitors Messages data
    crit: component
    conf: 0.84
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/Library/Messages(/|$)
  - id: watchpath-ssh
    desc: WatchPaths monitors SSH directory
    crit: component
    conf: 0.84
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/\.ssh(/|$)
  - id: watchpath-chrome
    desc: WatchPaths monitors Chrome data
    crit: component
    conf: 0.84
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/Library/Application Support/Google/Chrome(/|$)
  - id: watchpath-firefox
    desc: WatchPaths monitors Firefox data
    crit: component
    conf: 0.84
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/Library/Application Support/Firefox(/|$)
  - id: watchpath-brave
    desc: WatchPaths monitors Brave data
    crit: component
    conf: 0.84
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/Library/Application Support/BraveSoftware(/|$)
  - id: watchpath-edge
    desc: WatchPaths monitors Edge data
    crit: component
    conf: 0.84
    if:
      type: value
      path: WatchPaths[*]
      regex: ^/Users/[^/]{1,80}/Library/Application Support/Microsoft Edge(/|$)
composite_rules:
  - id: watchpath-user-writable
    desc: WatchPaths monitors writable path
    crit: notable
    conf: 0.82
    any:
      - id: watchpath-user-home
      - id: watchpath-users-shared
      - id: watchpath-tmp
      - id: watchpath-var-tmp
  - id: queuedir-user-writable
    desc: QueueDirectories monitors writable path
    crit: notable
    conf: 0.82
    any:
      - id: queuedir-user-home
      - id: queuedir-users-shared
      - id: queuedir-tmp
      - id: queuedir-var-tmp
  - id: watchpath-sensitive-user-data
    desc: WatchPaths monitors sensitive user data
    crit: suspicious
    conf: 0.86
    any:
      - id: watchpath-keychains
      - id: watchpath-cookies
      - id: watchpath-safari
      - id: watchpath-mail
      - id: watchpath-messages
      - id: watchpath-ssh
      - id: watchpath-chrome
      - id: watchpath-firefox
      - id: watchpath-brave
      - id: watchpath-edge
  - id: launchd-event-trigger-user-writable
    desc: Launchd event trigger watches writable path
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/persistence/system/launchd/location::program-user-writable-location
    any:
      - id: watchpath-user-writable
      - id: queuedir-user-writable
