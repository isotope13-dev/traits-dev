defaults:
  platforms: [ios, unix]
  for: [perl, ruby, java, class]
  attack: T1543.004

traits:
  - id: ios-launchagents-path
    desc: iOS LaunchAgents path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Library/LaunchAgents
    unless:
      - id: well-known/app/homebrew::source-tree

  - id: ios-launchdaemons-path
    desc: iOS LaunchDaemons path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Library/LaunchDaemons
    unless:
      - type: text
        substr: com.apple.smb.preferences
      - id: well-known/app/homebrew::source-tree

  - id: ios-launchd-keepalive-source
    desc: iOS launchd KeepAlive source
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: <key>KeepAlive</key>
    unless:
      - id: metadata/package/testing/presence/harness::test-fixture-directory-path
      - id: well-known/app/homebrew::source-tree

  - id: ios-launchd-runatload-source
    desc: iOS launchd RunAtLoad source
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '<key>RunAtLoad</key>.{0,80}<true/>'
    unless:
      - id: metadata/package/testing/presence/harness::test-fixture-directory-path

  - id: jvm-ios-launchdaemons-const
    desc: JVM iOS LaunchDaemons const
    crit: suspicious
    conf: 0.9
    for: [class, jar]
    if:
      type: hex
      pattern: 2F 4C 69 62 72 61 72 79 2F 4C 61 75 6E 63 68 44 61 65 6D 6F 6E 73
    unless:
      - type: hex
        pattern: CF FA ED FE

  - id: jvm-ios-keepalive-const
    desc: JVM iOS KeepAlive const
    crit: suspicious
    conf: 0.9
    for: [class, jar]
    if:
      type: hex
      pattern: 3C 6B 65 79 3E 4B 65 65 70 41 6C 69 76 65 3C 2F 6B 65 79 3E
    unless:
      - type: hex
        pattern: CF FA ED FE

composite_rules:
  - id: ios-launchd-persistence-source
    desc: iOS launchd persistence source
    crit: hostile
    conf: 0.98
    any:
      - id: ios-launchagents-path
      - id: ios-launchdaemons-path
    all:
      - id: ios-launchd-keepalive-source
      - id: ios-launchd-runatload-source

  - id: jvm-ios-launchd-persistence
    desc: JVM iOS launchd persistence
    crit: hostile
    conf: 0.97
    all:
      - id: jvm-ios-launchdaemons-const
      - id: jvm-ios-keepalive-const
