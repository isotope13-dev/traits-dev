defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: launch-agents
    desc: LaunchAgents directory (user-level services)
    crit: component
    conf: 0.7
    mbc: B0028
    attack: T1543.004
    for: [plist, shell, applescript, javascript, macho]
    if:
      type: text
      substr: LaunchAgents
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: native-launchagent-plist-template
    desc: Native LaunchAgent plist template
    crit: suspicious
    conf: 0.94
    for: [macho]
    if:
      type: text
      regex: '<key>ProgramArguments</key>[\s\S]{0,240}<key>KeepAlive</key>'
  - id: native-launchagent-write-marker
    desc: Native LaunchAgent write marker
    crit: suspicious
    conf: 0.92
    for: [macho]
    if:
      type: text
      regex: '(?i)Cannot write plist:'
  - id: plist-extension
    desc: .plist file extension (property list)
    crit: component
    conf: 0.6
    attack: T1543.004
    if:
      type: text
      regex: Launch(Agents|Daemons)/.{1,96}\.plist
  - id: run-at-load
    desc: RunAtLoad key (start service at load)
    crit: component
    conf: 0.8
    mbc: B0028
    attack: T1543.004
    if:
      type: value
      path: RunAtLoad
  - id: keep-alive
    desc: "KeepAlive key"
    crit: component
    conf: 0.8
    mbc: B0028
    attack: T1543.004
    if:
      type: value
      path: KeepAlive
  - id: throttle-interval
    desc: ThrottleInterval key (min time between spawns)
    crit: component
    conf: 0.5
    if:
      type: value
      path: ThrottleInterval
  - id: start-interval
    desc: StartInterval key (scheduled execution)
    crit: component
    conf: 0.8
    mbc: B0028
    attack: T1053.003
    if:
      type: value
      path: StartInterval
  - id: start-calendar-interval
    desc: "StartCalendarInterval key"
    crit: component
    conf: 0.8
    mbc: B0028
    attack: T1053.003
    if:
      type: value
      path: StartCalendarInterval
  - id: stdout-path
    desc: StandardOutPath key (log redirection)
    crit: component
    conf: 0.8
    if:
      type: value
      path: StandardOutPath
  - id: stderr-path
    desc: StandardErrorPath key (log redirection)
    crit: component
    conf: 0.8
    if:
      type: value
      path: StandardErrorPath
  - id: env-vars-dup
    desc: EnvironmentVariables key
    crit: component
    conf: 0.8
    if:
      type: value
      path: EnvironmentVariables
  - id: mach-services
    desc: MachServices key (XPC service registration)
    crit: component
    conf: 0.8
    if:
      type: value
      path: MachServices
  - id: sockets
    desc: Sockets key (network socket activation)
    crit: component
    conf: 0.8
    if:
      type: value
      path: Sockets
  - id: service-ipc
    desc: Launchd ServiceIPC configuration key
    crit: component
    conf: 0.8
    if:
      type: value
      path: ServiceIPC
  - id: process-type
    desc: ProcessType key (Background, App, etc.)
    crit: component
    conf: 0.8
    if:
      type: value
      path: ProcessType
  - id: associated-bundles
    desc: AssociatedBundleIdentifiers key
    crit: component
    conf: 0.8
    if:
      type: value
      path: AssociatedBundleIdentifiers
  - id: working-directory
    desc: WorkingDirectory key
    crit: component
    conf: 0.8
    if:
      type: value
      path: WorkingDirectory
  - id: launch-events
    desc: LaunchEvents key (event-based activation)
    crit: component
    conf: 0.8
    if:
      type: value
      path: LaunchEvents
  - id: spawn-type
    desc: POSIXSpawnType key
    crit: component
    conf: 0.8
    if:
      type: value
      path: POSIXSpawnType
  - id: soft-resource-limits
    desc: SoftResourceLimits key
    crit: component
    conf: 0.8
    if:
      type: value
      path: SoftResourceLimits
  - id: hard-resource-limits
    desc: HardResourceLimits key
    crit: component
    conf: 0.8
    if:
      type: value
      path: HardResourceLimits
  - id: sock-service-name
    desc: "SockServiceName key"
    crit: component
    conf: 0.8
    mbc: B0028
    attack: T1543.004
    if:
      type: value
      path: SockServiceName
  - id: inetd-compat
    desc: inetdCompatibility key (socket handoff)
    crit: component
    conf: 0.8
    mbc: B0028
    attack: T1543.004
    if:
      type: value
      path: inetdCompatibility
  - id: shell-program
    desc: Shell as launchd Program (/bin/sh)
    crit: component
    conf: 0.7
    attack: T1059.004
    if:
      type: value
      path: Program
      regex: ^/bin/(sh|shell|zsh)$
  - id: embedded-plist-shell
    desc: Embedded plist template with shell program
    crit: component
    conf: 0.8
    for:
      - c
      - macho
    if:
      type: text
      regex: <key>Program</key>\s*<string>/bin/(sh|zsh|shell)</string>
  - id: embedded-plist-shell-sh
    desc: Embedded plist /bin/sh string element
    crit: component
    conf: 0.8
    for:
      - c
      - macho
    if:
      type: text
      substr: <string>/bin/sh</string>
  - id: embedded-sock-service
    desc: Embedded SockServiceName plist key
    crit: component
    conf: 0.8
    for:
      - c
      - macho
    if:
      type: text
      substr: SockServiceName
  - id: embedded-plist-osascript
    desc: Embedded plist with osascript program
    crit: component
    conf: 0.85
    for:
      - macho
    if:
      type: text
      regex: <string>(/usr/bin/)?osascript</string>
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: embedded-plist-runatload
    desc: Embedded RunAtLoad enabled value
    crit: component
    conf: 0.8
    for:
      - javascript
      - macho
    if:
      type: text
      regex: '<key>RunAtLoad</key>\s*<true\s*/>'
  - id: embedded-plist-programarguments
    desc: Embedded ProgramArguments plist key
    crit: component
    conf: 0.8
    for:
      - javascript
      - macho
      - c
    if:
      type: text
      substr: <key>ProgramArguments</key>
  - id: embedded-plist-zsh-programargs
    desc: Embedded launchd ProgramArguments uses zsh
    crit: component
    conf: 0.9
    for:
      - macho
      - c
    if:
      type: text
      regex: <key>ProgramArguments</key>.{0,120}<string>/bin/zsh</string>
  - id: embedded-plist-keepalive
    desc: Embedded KeepAlive plist key in source
    crit: component
    conf: 0.8
    for:
      - javascript
      - macho
    if:
      type: text
      substr: <key>KeepAlive</key>
  - id: build-plist-symbol
    desc: build_plist helper symbol
    crit: component
    conf: 0.82
    for:
      - c
      - macho
    if:
      type: symbol
      exact: build_plist
  - id: construct-plist-path-symbol
    desc: construct_plist_path helper symbol
    crit: component
    conf: 0.8
    for:
      - c
      - macho
    if:
      type: symbol
      exact: construct_plist_path
  - id: install-daemon-symbol
    desc: install_daemon routine symbol
    crit: component
    conf: 0.9
    for:
      - c
      - macho
    if:
      type: symbol
      exact: install_daemon
  - id: fake-apple-label
    desc: Launchd Label uses com.apple namespace
    crit: notable
    conf: 0.85
    if:
      type: value
      path: Label
      regex: ^com\.apple\.[A-Z][A-Za-z]+
    not:
      - substr: com.apple.HIToolbox
      - substr: com.apple.WebKit
      - substr: com.apple.CoreFoundation
      - substr: com.apple.Foundation
      - substr: com.apple.Security
      - substr: com.apple.CFNetwork
      - substr: com.apple.CoreServices
      - substr: com.apple.CoreData
      - substr: com.apple.AppKit
      - substr: com.apple.ReportCrash
      - substr: com.apple.ServiceManagement
      - substr: com.apple.UIKit
      - substr: com.apple.decmpfs
      - substr: com.apple.ResourceFork
      - substr: com.apple.WindowShadowDensity
    unless:
      - id: metadata/signed/anchor-apple
      - id: metadata/signed/platform::apple
    downgrade:
      any:
        - id: metadata/import/framework::system-framework
  - id: fake-homebrew-label
    desc: Fake homebrew identifier (com.homebrew)
    crit: notable
    conf: 0.9
    for:
      - macho
      - c
    if:
      type: text
      substr: com.homebrew
  - id: label-apple
    desc: Launchd Label starting with com.apple
    crit: component
    conf: 0.9
    if:
      type: value
      path: Label
      regex: ^com\.apple\.
  - id: label-zoom
    desc: Launchd Label starting with com.zoom
    crit: component
    conf: 0.9
    if:
      type: value
      path: Label
      regex: ^com\.zoom\.
  - id: label-google
    desc: Launchd Label starting with com.google
    crit: component
    conf: 0.9
    if:
      type: value
      path: Label
      regex: ^com\.google\.
  - id: label-finder-helper
    desc: Launchd Label mimics Finder helper
    crit: component
    conf: 0.9
    if:
      type: value
      path: Label
      regex: ^com\.finder\.(helper|agent|service|daemon)$
  - id: label-microsoft
    desc: Launchd Label starting with com.microsoft
    crit: component
    conf: 0.9
    if:
      type: value
      path: Label
      regex: ^com\.microsoft\.
  - id: label-adobe
    desc: Launchd Label starting with com.adobe
    crit: component
    conf: 0.9
    if:
      type: value
      path: Label
      regex: ^com\.adobe\.
  - id: label-oracle
    desc: Launchd Label starting with com.oracle
    crit: component
    conf: 0.9
    if:
      type: value
      path: Label
      regex: ^com\.oracle\.
  - id: stdout-tmp
    desc: StandardOutPath in /tmp/
    crit: component
    conf: 0.8
    if:
      type: value
      path: StandardOutPath
      regex: ^/(tmp|var/tmp|private/tmp)/
    unless:
      - type: value
        path: WorkingDirectory
        regex: ^/Applications/[^/]{1,120}\.app/Contents/(MacOS|Library)(/|$)
  - id: stderr-tmp
    desc: StandardErrorPath in /tmp/
    crit: component
    conf: 0.8
    if:
      type: value
      path: StandardErrorPath
      regex: ^/(tmp|var/tmp|private/tmp)/
    unless:
      - type: value
        path: WorkingDirectory
        regex: ^/Applications/[^/]{1,120}\.app/Contents/(MacOS|Library)(/|$)
  - id: program-tmp
    desc: Program in /tmp/
    crit: component
    conf: 0.8
    if:
      type: value
      path: Program
      regex: ^/(tmp|var/tmp|private/tmp)/
  - id: args-tmp
    desc: ProgramArguments[0] in /tmp/
    crit: component
    conf: 0.8
    if:
      type: value
      path: ProgramArguments[0]
      regex: ^/(tmp|var/tmp|private/tmp)/
  - id: program-shared
    desc: Program in /Users/Shared/
    crit: component
    conf: 0.7
    if:
      type: value
      path: Program
      regex: ^/Users/Shared/
  - id: args-shared
    desc: ProgramArguments[0] in /Users/Shared/
    crit: component
    conf: 0.7
    if:
      type: value
      path: ProgramArguments[0]
      regex: ^/Users/Shared/
  - id: program-hidden
    desc: Hidden Program executable
    crit: component
    conf: 0.7
    if:
      type: value
      path: Program
      regex: /\.[^/]{1,120}$
  - id: args-hidden
    desc: Hidden ProgramArguments[0] executable
    crit: component
    conf: 0.7
    if:
      type: value
      path: ProgramArguments[0]
      regex: /\.[^/]{1,120}$
  - id: progargs-user-dotdir
    desc: ProgramArguments[0] under user dot directory
    crit: notable
    conf: 0.82
    if:
      type: value
      path: ProgramArguments[0]
      regex: ^/Users/[^/]{1,80}/\.[^/]{1,80}/
  - id: program-user-dotdir
    desc: Program under user dot directory
    crit: notable
    conf: 0.82
    if:
      type: value
      path: Program
      regex: ^/Users/[^/]{1,80}/\.[^/]{1,80}/
  - id: progargs-python-script
    desc: ProgramArguments[0] Python script
    crit: component
    conf: 0.84
    if:
      type: value
      path: ProgramArguments[0]
      regex: (?i)\.py$
  - id: progargs-python-interpreter
    desc: ProgramArguments[0] Python interpreter
    crit: component
    conf: 0.84
    if:
      type: value
      path: ProgramArguments[0]
      regex: (^|/)python[0-9.]*$
  - id: progargs1-user-dotdir-python
    desc: "ProgramArguments[1] Python in user dot dir"
    crit: component
    conf: 0.82
    if:
      type: value
      path: ProgramArguments[1]
      regex: ^/Users/[^/]{1,80}/\.[^/]{1,80}/.{1,160}\.py$
  - id: program-system
    desc: LaunchAgent Program in /System/
    crit: component
    if:
      type: value
      path: Program
      regex: '^/System/'
  - id: program-usr
    desc: LaunchAgent Program in /usr/
    crit: component
    if:
      type: value
      path: Program
      regex: '^/usr/'
  - id: progargs-system
    desc: LaunchAgent ProgramArguments[0] in /System/
    crit: component
    if:
      type: value
      path: ProgramArguments[0]
      regex: '^/System/'
  - id: progargs-usr
    desc: LaunchAgent ProgramArguments[0] in /usr/
    crit: component
    if:
      type: value
      path: ProgramArguments[0]
      regex: '^/usr/'
  - id: program-zoom
    desc: LaunchAgent Program is Zoom app
    crit: component
    if:
      type: value
      path: Program
      regex: '^/Applications/zoom\.us\.app/'
  - id: progargs-zoom
    desc: LaunchAgent ProgramArguments[0] is Zoom app
    crit: component
    if:
      type: value
      path: ProgramArguments[0]
      regex: '^/Applications/zoom\.us\.app/'
  - id: program-google
    desc: LaunchAgent Program is Google app
    crit: component
    if:
      type: value
      path: Program
      regex: '^(/Library/Google/|/Applications/Google)'
  - id: progargs-google
    desc: LaunchAgent ProgramArguments[0] is Google app
    crit: component
    if:
      type: value
      path: ProgramArguments[0]
      regex: '^(/Library/Google/|/Applications/Google)'
  - id: program-microsoft
    desc: LaunchAgent Program is Microsoft app
    crit: component
    if:
      type: value
      path: Program
      regex: '^(/Library/Application Support/Microsoft/|/Applications/Microsoft)'
  - id: progargs-microsoft
    desc: "LaunchAgent ProgramArguments[0] is MS app"
    crit: component
    if:
      type: value
      path: ProgramArguments[0]
      regex: '^(/Library/Application Support/Microsoft/|/Applications/Microsoft)'
  - id: program-adobe
    desc: LaunchAgent Program is Adobe app
    crit: component
    if:
      type: value
      path: Program
      regex: '^(/Library/Application Support/Adobe/|/Applications/Adobe)'
  - id: progargs-adobe
    desc: LaunchAgent ProgramArguments[0] is Adobe app
    crit: component
    if:
      type: value
      path: ProgramArguments[0]
      regex: '^(/Library/Application Support/Adobe/|/Applications/Adobe)'
  - id: program-oracle-java
    desc: LaunchAgent Program is Oracle Java plugin
    crit: component
    if:
      type: value
      path: Program
      regex: '^/Library/Internet Plug-Ins/JavaAppletPlugin\.plugin/'
  - id: progargs-oracle-java
    desc: 'progargs oracle java'
    crit: component
    if:
      type: value
      path: ProgramArguments[0]
      regex: '^/Library/Internet Plug-Ins/JavaAppletPlugin\.plugin/'
composite_rules:
  - id: launchd
    desc: macOS launchd persistence (2+ indicators)
    crit: component
    conf: 0.66
    mbc: B0028
    attack: T1543.004
    for: [plist, shell, applescript, python, javascript, macho]
    needs: 2
    any:
      - id: launch-agents
      - id: micro-behaviors/os/service/config::launchdaemons-path
      - id: micro-behaviors/os/service/control::launchctl-command
      - id: plist-extension
      - id: run-at-load
      - id: keep-alive
      - id: throttle-interval
      - id: start-interval
      - id: start-calendar-interval
      - id: stdout-path
      - id: stderr-path
      - id: objectives/persistence/system/launchd/event::watch-paths
      - id: objectives/persistence/system/launchd/event::queue-directories
      - id: objectives/persistence/system/launchd/event::start-on-mount
      - id: objectives/persistence/system/launchd/core::env-vars-dup
      - id: mach-services
      - id: sockets
      - id: service-ipc
      - id: process-type
      - id: associated-bundles
      - id: working-directory
      - id: launch-events
      - id: spawn-type
      - id: soft-resource-limits
      - id: hard-resource-limits
      - id: sock-service-name
      - id: inetd-compat
      - id: embedded-plist-runatload
      - id: embedded-plist-keepalive
      - id: embedded-plist-programarguments
      - id: embedded-plist-shell
      - id: embedded-plist-zsh-programargs
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: launchd-bind-shell
    desc: Launchd socket-activated bind shell
    crit: component
    conf: 0.9
    mbc: B0028
    attack: T1543.004
    all:
      - id: sock-service-name
      - id: inetd-compat
    any:
      - id: shell-program
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-interactive
  - id: embedded-plist-bind-shell
    desc: Embedded plist bind-shell template in binary
    crit: component
    conf: 0.85
    mbc: B0028
    attack: T1543.004
    for:
      - c
      - macho
    all:
      - id: embedded-plist-shell-sh
      - id: embedded-sock-service
  - id: launchd-embedded-zsh-agent
    desc: Embedded RunAtLoad LaunchAgent starts zsh
    crit: hostile
    conf: 0.95
    mbc: B0028
    attack: T1543.004,T1059.004
    for:
      - macho
      - c
    all:
      - id: launch-agents
      - id: embedded-plist-runatload
      - id: embedded-plist-programarguments
      - id: micro-behaviors/process/create/shell/spawn::bin-zsh-binary
    unless:
      - id: metadata/signed/platform::apple
      - id: objectives/supply-chain/trojanized/app/debug-probe/
  - id: launchd-js-runatload-installer
    desc: JavaScript installs RunAtLoad LaunchAgent
    crit: notable
    conf: 0.93
    mbc: B0028
    attack: T1543.004
    for: [javascript]
    scope: archive
    all:
      - id: launch-agents
      - id: embedded-plist-runatload
      - id: embedded-plist-programarguments
    any:
      - id: micro-behaviors/os/service/control::launchctl-command
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
    unless:
      - id: well-known/app/freddie::benign-archive-context
      - id: well-known/app/freddie::gateway-service-context
      - id: well-known/app/pixcode::benign-runtime-context
      - id: well-known/app/pixcode::benign-archive-context
      - id: well-known/app/pixcode::daemon-manager-source
      - id: well-known/app/pixcode::archive-member-context
      - id: well-known/app/neurolink::benign-archive-context
  - id: launchd-dropper
    desc: Launchd persistence installer via system commands
    crit: hostile
    conf: 0.9
    mbc: B0028
    attack: T1543.004
    for:
      - c
      - macho
    all:
      - id: launch-agents
      - id: micro-behaviors/os/service/control::launchctl-command
      - id: micro-behaviors/process/create/shell/spawn::system-fn
      - id: objectives/evasion/fileless/memory::exec-function
  - id: embedded-launchdaemon-installer
    desc: Embedded LaunchDaemon install routine
    crit: component
    conf: 0.91
    for:
      - c
      - macho
    any:
      - id: build-plist-symbol
      - id: construct-plist-path-symbol
      - id: install-daemon-symbol
    needs: 2
  - id: launchd-admin-daemon-installer
    desc: LaunchDaemon install with admin rights
    crit: hostile
    conf: 0.96
    for:
      - c
      - macho
    all:
      - id: embedded-launchdaemon-installer
      - id: objectives/privilege-escalation/elevation-control/prompt-escalation::auth-rights-request
    any:
      - id: micro-behaviors/process/create/shell/spawn::system-fn
      - id: micro-behaviors/hardware/input/event::macos-cgevent-tap-create
      - id: micro-behaviors/communications/socket/connect::connect
  - id: launchd-embedded-bind-shell
    desc: Embedded plist bind-shell dropped to LaunchAgents
    crit: hostile
    conf: 0.95
    mbc: B0028
    attack: T1543.004
    for:
      - c
      - macho
    all:
      - id: embedded-plist-bind-shell
      - id: launch-agents
      - id: micro-behaviors/process/create/shell/spawn::system-fn
  - id: launchd-app-trojan
    desc: Launchd persistence with app bundle hijacking
    crit: hostile
    conf: 0.95
    mbc: B0028
    attack: T1543.004
    for:
      - c
      - macho
    all:
      - id: launchd
      - id: objectives/lateral-movement/trojanize/app::app-bundle-hijack
      - id: micro-behaviors/process/create/shell/spawn::system-fn
  - id: output-suspicious-location
    desc: Launchd StandardOutPath/StandardErrorPath in unusual location
    crit: component
    conf: 0.8
    any:
      - id: stdout-tmp
      - id: stderr-tmp
  - id: program-unusual-location
    desc: Launchd Program/ProgramArguments in unusual location
    crit: component
    conf: 0.7
    any:
      - id: program-tmp
      - id: args-tmp
      - id: program-shared
      - id: args-shared
      - id: program-hidden
      - id: args-hidden
      - id: progargs-user-dotdir
      - id: program-user-dotdir
  - id: progargs-user-dotdir-python-script
    desc: Launchd Python script from user dot directory
    crit: notable
    conf: 0.88
    all:
      - id: progargs-user-dotdir
      - id: progargs-python-script
  - id: launchd-user-dotdir
    desc: Launchd program in user dot directory
    crit: notable
    conf: 0.86
    any:
      - id: progargs-user-dotdir
      - id: program-user-dotdir
  - id: progargs-user-dotdir-python-arg
    desc: Launchd Python interpreter with user dot-directory script
    crit: component
    conf: 0.88
    all:
      - id: progargs-python-interpreter
      - id: progargs1-user-dotdir-python
  - id: launchd-scheduled-user-dotdir-python
    desc: Scheduled LaunchAgent runs Python from user dot directory
    crit: suspicious
    conf: 0.92
    attack: T1543.004,T1053.003
    all:
      - id: run-at-load
      - id: start-interval
    any:
      - id: progargs-user-dotdir-python-script
      - id: progargs-user-dotdir-python-arg
  - id: launchd-user-dotdir-temp-output
    desc: LaunchAgent from user dot directory logs to temp
    crit: suspicious
    conf: 0.9
    attack: T1543.004
    all:
      - id: launchd-user-dotdir
      - id: output-suspicious-location
    any:
      - id: run-at-load
      - id: keep-alive
      - id: start-interval
      - id: start-calendar-interval
  - id: launchd-masquerading-apple
    desc: Apple-labeled Launchd item launching from unusual location
    crit: hostile
    conf: 0.9
    all:
      - id: label-apple
      - id: program-unusual-location
    unless:
      - id: program-system
      - id: program-usr
      - id: progargs-system
