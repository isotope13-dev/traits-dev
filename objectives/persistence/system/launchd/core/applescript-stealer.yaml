# Root LaunchDaemon persistence installed with a phished password.
#
# AMOS (Atomic macOS Stealer) and kin phish the user's login password through a
# fake authorization dialog, validate it with `dscl . authonly`, then pipe it
# into `sudo -S` to drop and bootstrap a root LaunchDaemon:
#   echo <pw> | sudo -S cp /tmp/starter /Library/LaunchDaemons/<x>.plist
#   echo <pw> | sudo -S launchctl bootstrap system /Library/LaunchDaemons/<x>.plist
# Co-occurrence of a dscl-validated password and a sudo-piped LaunchDaemon
# install is the discriminator: legitimate installers obtain privilege through
# Authorization Services / `with administrator privileges` / signed pkgs, never
# by replaying a directory-service-validated password into `sudo -S`.
#
# ATT&CK: T1543.004 (Launch Daemon), T1056.002 (GUI input capture)
defaults:
  platforms: [macos]
  for: [applescript, shell]
  attack: T1543.004
composite_rules:
  - id: phished-password-root-launchdaemon
    desc: Phished password installs root LaunchDaemon
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/collection/stealer/workflow::sudo-pipe-launchdaemon
      - id: objectives/credential-access/validation/check::dscl-authonly-comp
