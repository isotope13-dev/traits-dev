defaults:
  platforms: [macos]
  for: [plist]
  attack: T1543.004
traits:
  - id: sockpath-tmp
    desc: SockPathName in temp path
    crit: notable
    conf: 0.82
    if:
      type: value
      path: Sockets.*.SockPathName
      regex: ^/(private/)?tmp/
  - id: sockpath-var-tmp
    desc: SockPathName in var tmp
    crit: notable
    conf: 0.82
    if:
      type: value
      path: Sockets.*.SockPathName
      regex: ^/var/tmp/
  - id: sockpath-user-dotdir
    desc: SockPathName under user dotdir
    crit: notable
    conf: 0.84
    if:
      type: value
      path: Sockets.*.SockPathName
      regex: ^/Users/[^/]{1,80}/\.[^/]{1,80}/
composite_rules:
  - id: launchd-user-socket-path
    desc: Launchd socket in writable location
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/persistence/system/launchd/core::sockets
    any:
      - id: sockpath-tmp
      - id: sockpath-var-tmp
      - id: sockpath-user-dotdir
