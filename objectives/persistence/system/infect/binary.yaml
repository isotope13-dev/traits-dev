defaults:
  platforms: [linux]
  for: [elf, rust, shell]
  crit: suspicious
  conf: 0.9
traits:
  - id: elf-backup-dir
    desc: Reference to ELF backup directory
    if:
      type: text
      substr: "elf_backup"
  - id: elf-work-dir
    desc: Reference to ELF working directory
    if:
      type: text
      substr: "elf_workdir"
composite_rules:
  - id: linux-binary-infection-orchestrator
    desc: Orchestrates ELF binary infection for persistence
    crit: hostile
    conf: 0.9
    attack: T1574.001
    unless:
      - id: metadata/build/autotools::autoconf-generated-script
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
    all:
      - id: micro-behaviors/fs/shell-ops::cp-command
      - id: micro-behaviors/fs/directory/mkdir::mkdir-command
    any:
      - id: objectives/persistence/system/infect::elf-backup-dir
      - id: objectives/persistence/system/infect::elf-work-dir
