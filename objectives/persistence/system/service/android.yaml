defaults:
  platforms: [android]
  for: [apk, zip]

composite_rules:
  - id: android-device-admin-accessibility
    desc: Android device admin accessibility control
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/privilege/manifest::device-admin-policy-resource
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-service-config

  - id: android-accessibility-autostart-coercion
    desc: Android accessibility autostart coercion
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-service-config
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-request-layout
    any:
      - id: micro-behaviors/hardware/input/accessibility::android-miui-accessibility-layout
      - id: micro-behaviors/os/privilege/check::android-oppo-battery-settings-layout

  - id: android-boot-jobservice-persistence
    desc: Android boot JobService persistence
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/service/daemon::android-job-service
      - id: micro-behaviors/os/service/daemon::android-background-service-names
    any:
      - id: micro-behaviors/os/service/daemon::android-boot-completed-action
      - id: micro-behaviors/os/privilege/manifest::package-usage-stats
