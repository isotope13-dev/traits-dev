# Persistent Python agents that expose a remote terminal control channel.
defaults:
  platforms: [unix, windows]
  for: [python, pyc, whl]
  attack: T1543.002

composite_rules:
  - id: persistent-python-remote-terminal-agent
    desc: Persistent Python remote terminal agent
    crit: hostile
    conf: 0.995
    scope: archive
    attack: "T1543.002,T1059,T1071.001"
    all:
      - id: objectives/command-and-control/backdoor/rat/remote-agent::python-remote-terminal-control
    any:
      - id: objectives/persistence/system/service/systemd::systemd-user-persistence
      - id: objectives/persistence/login/scheduled-task/cli::windows-schtasks-create
      - id: objectives/persistence/system/launchd/source::source-launchd-user-persistence
