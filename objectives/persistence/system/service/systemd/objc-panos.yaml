defaults:
  platforms: [panos, appliance, unix]
  for: [objc, c, elf]
  attack: T1543.002

traits:
  - id: objc-panos-cron-payload-install
    desc: ObjC PAN-OS cron payload install
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: crontab /tmp/.cron_payload

  - id: objc-panos-systemctl-user-enable
    desc: ObjC PAN-OS systemctl user enable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: systemctl --user enable panos-update

composite_rules:
  - id: objc-panos-cron-systemd-persist
    desc: ObjC PAN-OS cron systemd persist
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-cron-payload-install
      - id: objc-panos-systemctl-user-enable
