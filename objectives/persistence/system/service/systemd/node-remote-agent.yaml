# A systemd-installed agent whose socket protocol can launch shell commands.
defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1059.007,T1543.002,T1071.001

composite_rules:
  - id: systemd-installed-node-remote-shell-agent
    desc: Node systemd service exposes remote shell tasking
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/backdoor/dispatch/websocket::node-remote-command-event-dispatch
      - id: micro-behaviors/os/service/config::systemd-etc-service-path
      - id: micro-behaviors/process/create/spawn-minified::shell-bang-true
