# Systemd Persistence (Linux)
# MBC: B0028 (Scheduled Task/Job)
# ATT&CK: T1543.002
defaults:
  attack: T1543.002
  platforms: [linux, macos, windows, unix, android, ios]
  for: [elf, shell, python]
traits:
  - id: systemd-keyword
    desc: systemd init system keyword
    crit: notable
    conf: 0.7
    if:
      type: string_value
      word: "systemd"
  - id: systemctl-command
    desc: systemctl command (persistence context)
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      id: micro-behaviors/os/service/control::systemctl-word
  - id: etc-systemd-path
    desc: /etc/systemd directory path (system services)
    crit: notable
    conf: 0.7
    mbc: B0028
    if:
      type: string_value
      substr: "/etc/systemd"
  - id: lib-systemd-path
    desc: /lib/systemd directory path (default services)
    crit: notable
    conf: 0.7
    mbc: B0028
    if:
      type: string_value
      substr: "/lib/systemd"
  - id: service-extension
    desc: .service file extension (systemd unit)
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: "/.service"
  - id: systemctl-enable
    desc: systemctl enable command (persistent service)
    crit: notable
    conf: 0.8
    mbc: B0028
    if:
      type: string_value
      substr: "systemctl enable"
composite_rules:
  - id: systemd
    desc: Linux systemd persistence (2+ indicators)
    crit: notable
    conf: 0.66
    mbc: B0028
    needs: 2
    any:
      - id: systemd-keyword
      - id: systemctl-command
      - id: etc-systemd-path
      - id: lib-systemd-path
      - id: service-extension
      - id: systemctl-enable
