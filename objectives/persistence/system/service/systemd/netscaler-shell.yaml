defaults:
  platforms: [netscaler, appliance, unix]
  for: [shell]
  attack: T1543.002

traits:
  - id: shell-ns-healthcheck-service
    desc: Shell ns-healthcheck service
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: ns-healthcheck.service

  - id: shell-systemd-service-write
    desc: Shell systemd service write
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /etc/systemd/system

  - id: shell-hidden-update-execstart
    desc: Shell hidden update ExecStart
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ExecStart=.{0,120}\.netscaler_updates'

composite_rules:
  - id: shell-netscaler-systemd-persistence
    desc: Shell NetScaler systemd persistence
    crit: hostile
    conf: 0.98
    all:
      - id: shell-ns-healthcheck-service
      - id: shell-systemd-service-write
    any:
      - id: shell-hidden-update-execstart
