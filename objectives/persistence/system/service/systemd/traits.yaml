defaults:
  attack: T1543.002
  platforms: [linux, unix]
  for: [shell, python, systemd]

traits:
  - id: systemd-keyword
    desc: systemd init system keyword
    crit: notable
    conf: 0.6
    if:
      type: text
      word: "systemd"
  - id: systemctl-command
    desc: systemctl command (persistence context)
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      id: micro-behaviors/os/service/control::systemctl-word
  - id: etc-systemd-path
    desc: /etc/systemd directory path (system services)
    crit: notable
    conf: 0.7
    mbc: B0028
    if:
      type: text
      substr: "/etc/systemd"
  - id: lib-systemd-path
    desc: /lib/systemd directory path (default services)
    crit: notable
    conf: 0.7
    mbc: B0028
    if:
      type: text
      substr: "/lib/systemd"
  - id: service-extension
    desc: .service file extension (systemd unit)
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: "/.service"
  - id: systemctl-enable
    desc: systemctl enable command (persistent service)
    crit: notable
    conf: 0.8
    mbc: B0028
    if:
      type: text
      substr: "systemctl enable"

  - id: exec-start-text
    desc: ExecStart directive (extracted strings)
    crit: component
    if:
      type: text
      word: "ExecStart"

  - id: exec-start-kv
    desc: ExecStart directive (structured service data)
    crit: component
    if:
      type: kv
      path: "service.exec_start"

  - id: restart-always-text
    desc: Restart=always directive (extracted strings)
    crit: component
    if:
      type: text
      word: "Restart=always"

  - id: restart-always-kv
    desc: Restart=always directive (structured service data)
    crit: component
    if:
      type: kv
      path: "service.restart"
      exact: "always"

  - id: wanted-by-target-text
    desc: WantedBy=default.target directive (extracted strings)
    crit: component
    if:
      type: text
      word: "WantedBy=default.target"

  - id: wanted-by-target-kv
    desc: WantedBy=default.target directive (structured service data)
    crit: component
    if:
      type: kv
      path: "install.wanted_by"
      exact: "default.target"

  - id: systemd-user-service-path
    desc: Systemd user service path reference
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \.config/systemd/user

  - id: exec-start-boot
    desc: ExecStart from /boot
    crit: component
    if:
      type: kv
      path: "service.exec_start"
      regex: "^/boot/"

  - id: exec-start-var
    desc: ExecStart from /var
    crit: component
    if:
      type: kv
      path: "service.exec_start"
      regex: "^/var/"

  - id: exec-start-tmp
    desc: ExecStart from /tmp
    crit: component
    if:
      type: kv
      path: "service.exec_start"
      regex: "^/tmp/"

  - id: exec-start-dev
    desc: ExecStart from /dev
    crit: component
    if:
      type: kv
      path: "service.exec_start"
      regex: "^/dev/"

  - id: exec-start-root
    desc: ExecStart from /root
    crit: component
    if:
      type: kv
      path: "service.exec_start"
      regex: "^/root/"

  - id: exec-start-expected-core
    desc: ExecStart from core system path
    crit: baseline
    if:
      type: kv
      path: "service.exec_start"
      regex: "^/(bin|sbin|usr/bin)/"

  - id: exec-start-expected-system
    desc: ExecStart from system library path
    crit: baseline
    if:
      type: kv
      path: "service.exec_start"
      regex: "^/(usr/sbin|usr/lib)/"

  - id: exec-start-unexpected-path
    desc: ExecStart from unusual path
    crit: notable
    conf: 0.7
    if:
      type: kv
      path: "service.exec_start"
      regex: "^/"
    unless:
      - id: exec-start-expected-core
      - id: exec-start-expected-system
    not:
      - regex: "^/(bin|sbin|usr/bin|usr/sbin)/"
      - regex: "^/(etc/(rc|update)|lib/|usr/(bin|sbin))/"
      - regex: "^/(bin|run|sbin|nix|usr/lib)/"

  - id: exec-stop-unexpected-path
    desc: ExecStop from unusual path
    crit: suspicious
    conf: 0.7
    if:
      type: kv
      path: "service.exec_stop"
      regex: "^/"
    unless:
      - id: exec-stop-casaos-shell
    not:
      - regex: "^/(usr/bin|usr/sbin|bin|usr/lib)/"

  - id: exec-stop-bin-sh
    desc: Shell script execution at service stop
    crit: suspicious
    conf: 0.8
    if:
      type: kv
      path: "service.exec_stop"
      regex: "^/bin/sh"

  - id: exec-stop-casaos-shell
    desc: ExecStop uses CasaOS packaged shell helper
    crit: baseline
    if:
      type: kv
      path: "service.exec_stop"
      regex: "^/casaOS/server/shell/"

  - id: systemd-before-exists
    desc: Unit Before= exists
    crit: component
    if:
      type: kv
      path: "unit.before"
      exists: true

  - id: blank-line-separator
    desc: Unit file blank line separator
    crit: component
    count_min: 2
    if:
      type: text
      regex: '[\r\n]{2,}'

  - id: documentation-exists
    desc: Unit Documentation= exists
    crit: component
    if:
      type: kv
      path: "unit.documentation"
      exists: true

  - id: unit-description-exists
    desc: Unit Description= exists
    crit: component
    if:
      type: kv
      path: "unit.description"
      exists: true

  - id: comment-exists
    desc: Unit file comment exists
    crit: component
    count_min: 2
    if:
      type: text
      regex: '^\s*#[ a-zA-Z0-9]{3,}'

  - id: after-exists
    desc: Unit After= exists
    crit: component
    if:
      type: kv
      path: "unit.after"
      exists: true

  - id: condition-exists
    desc: Unit Condition exists
    crit: component
    if:
      type: kv
      path: "unit.condition"
      exists: true

  - id: standard-output-exists
    desc: Service StandardOutput= exists
    crit: component
    if:
      type: kv
      path: "service.standard_output"
      exists: true

  - id: requires-exists
    desc: Unit Requires= exists
    crit: baseline
    if:
      type: kv
      path: "unit.requires"
      exists: true

  - id: install-wanted-by-exists
    desc: Install WantedBy= exists
    crit: component
    if:
      type: kv
      path: "install.wanted_by"
      exists: true

  - id: environment-file-exists
    desc: Service EnvironmentFile= exists
    crit: component
    if:
      type: kv
      path: "service.environment_file"
      exists: true

  - id: environment-list-exists
    desc: Service Environment= exists
    crit: component
    if:
      type: kv
      path: "service.environment_list"
      exists: true

  - id: bus-name-exists
    desc: Service BusName= exists
    crit: baseline
    if:
      type: kv
      path: "service.bus_name"
      exists: true

  - id: service-type-forking
    desc: Service Type=forking
    crit: component
    if:
      type: kv
      path: "service.type"
      exact: "forking"

  - id: service-type-minimal
    desc: Suspiciously simple service type
    crit: baseline
    if:
      type: kv
      path: "service.type"
      regex: "^(oneshot|idle)$"

  - id: default-deps-no
    desc: Service DefaultDependencies=no
    crit: baseline
    if:
      type: kv
      path: "service.default_dependencies"
      exact: "no"

composite_rules:
  - id: exec-start
    desc: ExecStart directive
    crit: notable
    any:
      - id: exec-start-text
      - id: exec-start-kv

  - id: restart-always
    desc: Restart=always directive
    crit: notable
    any:
      - id: restart-always-text
      - id: restart-always-kv

  - id: wanted-by-target
    desc: WantedBy=default.target directive
    crit: notable
    any:
      - id: wanted-by-target-text
      - id: wanted-by-target-kv

  - id: service-environment-exists
    desc: Service environment is configured
    crit: component
    any:
      - id: environment-file-exists
      - id: environment-list-exists

  - id: systemd
    desc: Linux systemd persistence (2+ indicators)
    crit: notable
    conf: 0.66
    mbc: B0028
    needs: 2
    any:
      - id: systemd-keyword
      - id: systemctl-command
      - id: etc-systemd-path
      - id: lib-systemd-path
      - id: service-extension
      - id: systemctl-enable
      - id: exec-start
      - id: restart-always
      - id: wanted-by-target

  - id: systemd-service-file
    desc: Systemd service file with persistence directives
    crit: notable
    conf: 0.9
    all:
      - id: exec-start
    any:
      - id: restart-always
      - id: wanted-by-target
      - id: systemd-keyword

  - id: systemd-user-persistence
    desc: User-level systemd persistence
    crit: suspicious
    conf: 0.9
    all:
      - id: systemd-user-service-path
    any:
      - id: systemctl-command
      - id: systemctl-enable
      - id: service-extension

  - id: exec-start-dangerous-path
    desc: ExecStart from dangerous-looking path
    crit: suspicious
    conf: 0.9
    any:
      - id: exec-start-boot
      - id: exec-start-var
      - id: exec-start-tmp
      - id: exec-start-dev
      - id: exec-start-root

  - id: systemd-no-blank-lines
    desc: Systemd unit with no blank lines (Kinsing-like)
    crit: suspicious
    conf: 0.85
    all:
      - id: exec-start
    unless:
      - id: blank-line-separator
      - id: unit-description-exists
      - id: metadata/package/testing/harness::go-test
      - id: metadata/package/testing/harness::is-test

  - id: systemd-no-docs-or-comments
    desc: Systemd unit is undocumented and lacks comments
    crit: suspicious
    conf: 0.7
    all:
      - id: exec-start
    unless:
      - id: unit-description-exists
      - id: documentation-exists
      - id: comment-exists
      - id: after-exists
      - id: condition-exists
      - id: standard-output-exists
      - id: metadata/package/testing/harness::go-test
      - id: metadata/package/testing/harness::is-test

  - id: unit-dependency-exists
    desc: Unit has structural dependencies
    crit: component
    any:
      - id: after-exists
      - id: systemd-before-exists
      - id: requires-exists

  - id: systemd-has-dependency-or-env
    desc: Systemd unit declares dependencies or environment
    crit: component
    any:
      - id: install-wanted-by-exists
      - id: after-exists
      - id: systemd-before-exists
      - id: requires-exists
      - id: service-type-minimal
      - id: default-deps-no
      - id: service-environment-exists
      - id: bus-name-exists

  - id: systemd-not-in-dependency-tree
    desc: Systemd unit has no dependencies or environment
    crit: suspicious
    conf: 0.7
    all:
      - id: exec-start
    unless:
      - id: systemd-has-dependency-or-env
      - id: metadata/package::has-tests

  - id: systemd-forking-no-deps
    desc: Forking service with no dependencies
    crit: suspicious
    conf: 0.85
    all:
      - id: service-type-forking
    unless:
      - id: after-exists
      - id: systemd-before-exists
      - id: metadata/package/testing/harness::go-test
      - id: metadata/package/testing/harness::is-test

  - id: systemd-suspicious-service-file
    desc: Suspiciously minimal or obfuscated systemd service
    crit: suspicious
    conf: 0.9
    any:
      - id: exec-start-dangerous-path
      - id: systemd-no-blank-lines
      - id: systemd-no-docs-or-comments
      - id: systemd-not-in-dependency-tree
      - id: systemd-forking-no-deps
