defaults:
  platforms: [unix]
  for: [csharp]
  attack: T1543.002

traits:
  - id: csharp-user-systemd-service
    desc: C# writes user systemd service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'worm-automation\.service[\s\S]{0,520}ExecStart='

  - id: csharp-user-systemctl-enable
    desc: C# enables user systemd unit
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'systemctl --user daemon-reload[\s\S]{0,160}enable worm-automation\.service'

  - id: csharp-bashrc-nohup-persist
    desc: C# appends bashrc nohup
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.bashrc"[\s\S]{0,220}nohup \{exePath\}'

composite_rules:
  - id: csharp-user-service-persistence
    desc: C# user service persistence
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-user-systemd-service
      - id: csharp-user-systemctl-enable
    any:
      - id: csharp-bashrc-nohup-persist
