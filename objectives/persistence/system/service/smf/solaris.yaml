defaults:
  platforms: [solaris, unix]
  for: [shell, javascript, typescript, swift, go, objc, perl, ruby, elf]
  attack: T1543

traits:
  - id: solaris-smf-manifest-path
    desc: Solaris SMF manifest path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /var/svc/manifest/

  - id: solaris-smf-service-bundle
    desc: Solaris SMF service bundle
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: <service_bundle type='manifest'

  - id: solaris-smf-service-bundle-dq
    desc: Solaris SMF service bundle
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: <service_bundle type="manifest"

  - id: solaris-smf-service-fmri
    desc: Solaris SMF service FMRI
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/package/files/dependency::os-image-root-file-path
      - id: well-known/app/mysqltuner::mysqltuner-source-path
    if:
      type: text
      substr: 'svc:/'

  - id: solaris-svccfg-setprop
    desc: Solaris svccfg setprop
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: svccfg -s
    unless:
      - id: metadata/file/string/artifact::vagrant-machine-communicate-marker

  - id: solaris-svcadm-refresh
    desc: Solaris svcadm refresh
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: svcadm refresh

  - id: solaris-svcadm-enable
    desc: Solaris svcadm enable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: svcadm enable

  - id: solaris-svccfg-import
    desc: Solaris svccfg import
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: svccfg import

  - id: solaris-smf-root-method
    desc: Solaris SMF root method
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: method_credential user='root'

  - id: solaris-go-elf-modify-service-func
    desc: Solaris Go ELF modify service function
    crit: suspicious
    conf: 0.88
    for: [elf]
    if:
      type: text
      substr: main.modifyService

composite_rules:
  - id: solaris-smf-persistence
    desc: Solaris SMF persistence
    crit: hostile
    conf: 0.98
    all:
      - id: solaris-smf-manifest-path
    any:
      - id: solaris-svccfg-import
      - id: solaris-smf-root-method
      - id: solaris-smf-service-bundle-dq

  - id: solaris-smf-service-import
    desc: Solaris SMF service import
    crit: hostile
    conf: 0.98
    unless:
      - id: well-known/app/pm2::pm2-startup-api-path
    all:
      - id: solaris-svccfg-import
    any:
      - id: solaris-smf-service-bundle
      - id: solaris-smf-service-bundle-dq
      - id: solaris-svcadm-enable
      - id: solaris-go-elf-modify-service-func

  - id: solaris-smf-service-modify
    desc: Solaris SMF service modify
    crit: hostile
    conf: 0.98
    all:
      - id: solaris-smf-service-fmri
      - id: solaris-svccfg-setprop
    any:
      - id: solaris-svcadm-refresh
      - id: solaris-svcadm-enable
