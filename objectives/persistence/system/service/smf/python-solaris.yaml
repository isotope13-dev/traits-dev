defaults:
  platforms: [solaris, unix]
  for: [python, pyc]
  attack: T1543

traits:
  - id: python-solaris-smf-manifest
    desc: Python Solaris SMF manifest
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: service_bundle
    unless:
      - id: metadata/package/quality/recognized-contexts::package-context
      - id: metadata/package/quality/recognized-contexts::package-source-path

  - id: python-solaris-smf-path
    desc: Python Solaris SMF path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /var/svc/manifest/system/system-monitor.xml

composite_rules:
  - id: python-solaris-smf-persistence
    desc: Python Solaris SMF persistence
    crit: hostile
    conf: 0.98
    all:
      - id: python-solaris-smf-manifest
      - id: python-solaris-smf-path
