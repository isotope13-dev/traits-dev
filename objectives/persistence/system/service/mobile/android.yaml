defaults:
  platforms: [android]
  for: [apk, zip]

composite_rules:
  - id: android-device-admin-accessibility
    desc: Android device admin accessibility control
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/privilege/manifest::device-admin-policy-resource
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-service-config

  - id: android-accessibility-autostart-coercion
    desc: Android accessibility autostart coercion
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-service-config
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-request-layout
    any:
      - id: micro-behaviors/hardware/input/accessibility::android-miui-accessibility-layout
      - id: micro-behaviors/os/privilege/check::android-oppo-battery-settings-layout

  - id: android-boot-jobservice-persistence
    desc: Android boot JobService persistence
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/service/daemon::android-job-service
      - id: micro-behaviors/os/service/daemon::android-background-service-names
    any:
      - id: micro-behaviors/os/service/daemon::android-boot-completed-action
      - id: micro-behaviors/os/privilege/manifest::package-usage-stats

  - id: android-boot-foreground-battery-persistence
    desc: Android boot foreground battery persistence
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/os/service/daemon::android-boot-completed-action
      - id: micro-behaviors/os/service/daemon::android-foreground-service-permission
      - id: micro-behaviors/os/privilege/manifest::ignore-battery-optimizations
    any:
      - id: micro-behaviors/time/schedule/interval::android-alarm-manager-reference
      - id: micro-behaviors/time/schedule/interval::android-scheduled-pending-intent
      - id: objectives/command-and-control/dropper/staged-loader::cleartext-traffic-enabled

  - id: android-tasker-boot-foreground-persistence
    desc: Android Tasker boot foreground persistence
    crit: suspicious
    conf: 0.93
    scope: archive
    all:
      - id: metadata/build/framework::tasker-exported-apk
      - id: micro-behaviors/os/service/daemon::android-boot-completed-permission
      - id: micro-behaviors/os/service/daemon::android-foreground-service-permission-text

  - id: android-fox-boot-heartbeat-persistence
    desc: Android Fox boot service heartbeat persistence
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/service/daemon::android-fox-component-names
      - id: micro-behaviors/os/service/daemon::android-fox-start-persistence
      - id: micro-behaviors/os/service/daemon::android-job-service
      - id: micro-behaviors/time/schedule/interval::android-scheduled-pending-intent

  - id: android-install-boot-foreground-loader
    desc: Android install boot foreground loader
    crit: hostile
    conf: 0.96
    attack: "T1631, T1624.001"
    all:
      - id: micro-behaviors/os/package-manager/install::android-request-install-packages-permission
      - id: micro-behaviors/os/service/daemon::android-boot-completed-permission
      - id: micro-behaviors/os/service/daemon::android-foreground-service-permission-text

  - id: android-install-boot-loader
    desc: Android install boot loader
    crit: hostile
    conf: 0.95
    attack: "T1631, T1624.001"
    all:
      - id: micro-behaviors/os/package-manager/install::android-request-install-packages-permission
      - id: micro-behaviors/os/service/daemon::android-boot-completed-permission

  - id: android-install-foreground-loader
    desc: Android install foreground loader
    crit: hostile
    conf: 0.95
    attack: "T1631, T1624.001"
    all:
      - id: micro-behaviors/os/package-manager/install::android-request-install-packages-permission
      - id: micro-behaviors/os/service/daemon::android-foreground-service-permission-text

  - id: android-install-boot-wakelock
    desc: Android install boot wakelock persistence
    crit: hostile
    conf: 0.96
    attack: "T1631, T1624.001"
    all:
      - id: micro-behaviors/os/package-manager/install::android-install-permission-boot-foreground
      - id: objectives/command-and-control/dropper/staged-loader::wake-lock-permission

  - id: android-fox-workmanager-persistence
    desc: Android Fox WorkManager persistence
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/service/daemon::android-fox-component-names
      - id: micro-behaviors/os/service/daemon::android-job-service
      - id: micro-behaviors/time/schedule/interval::android-scheduled-pending-intent

  - id: android-source-battery-exemption-control
    desc: Android source battery exemption control
    crit: suspicious
    conf: 0.94
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    all:
      - id: micro-behaviors/os/privilege/manifest::ignore-battery-optimizations
      - id: micro-behaviors/os/privilege/check::android-battery-optimization-status
      - id: micro-behaviors/os/privilege/check::android-request-ignore-battery-action
    unless:
      - id: well-known/lib/react-native-noti-sdk::archive-notification-context
      - id: well-known/lib/react-native-noti-sdk/
