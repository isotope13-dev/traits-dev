defaults:
  attack: T1543.003
  platforms: [windows]
composite_rules:
  - id: service-startup
    desc: Windows Service Startup
    crit: notable
    conf: 0.8
    mbc: F0003
    any:
      - id: micro-behaviors/os/service/control::start-service
      - id: micro-behaviors/os/service/control::create-service
  - id: service-dll-registry-hijack
    desc: ServiceDll registry-backed service persistence
    crit: suspicious
    conf: 0.92
    mbc: B0011.003
    for: [pe]
    all:
      - id: micro-behaviors/os/service/control::create-service
      - id: micro-behaviors/os/registry/access::registry-set-value-api
      - id: micro-behaviors/os/service/host::service-dll-value-name
      - id: micro-behaviors/os/service/host::service-parameters-registry-path
    any:
      - id: micro-behaviors/os/service/control::open-sc-manager
      - id: micro-behaviors/os/service/control::open-service
      - id: micro-behaviors/os/service/host::system32-service-dll-target
    downgrade:
      any:
        - id: micro-behaviors/os/service/host::legit-service-host-registration
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: lanmanserver-service-dll-hijack
    desc: LanmanServer ServiceDll hijack persistence
    crit: hostile
    conf: 0.98
    mbc: B0011.003
    for: [pe]
    all:
      - id: micro-behaviors/os/service/host::lanmanserver-service-dll-pathing
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    any:
      - id: micro-behaviors/os/service/control::create-service
      - id: micro-behaviors/os/service/control::open-service
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/fs/file/copy::copyfile-a
    needs: 2
