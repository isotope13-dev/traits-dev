defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1197
traits:
- id: bits-notify-command--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '(?i)bitsadmin\s+/SetNotifyCmdLine'

- id: bits-notify-command--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'IBackgroundCopyJob[0-9]*::SetNotifyCmdLine'

- id: bits-notify-command--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'SetNotifyCmdLine'

- id: bits-resume-persistent-job
  desc: Persistent BITS transfer job
  crit: suspicious
  conf: 0.82
  if:
    type: text
    regex: '(?i)bitsadmin\s+/(create|resume|complete)\b|Start-BitsTransfer\b'

composite_rules:
- id: bits-notify-persistence
  desc: BITS job command persistence
  crit: suspicious
  conf: 0.9
  all:
  - id: bits-notify-command
  any:
  - id: bits-resume-persistent-job
  - id: objectives/command-and-control/dropper/execution/batch::bitsadmin-download
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::bitstransfer
- id: bits-notify-command
  desc: BITS notify command persistence
  crit: suspicious
  conf: 0.88
  any:
  - id: bits-notify-command--rx-1
  - id: bits-notify-command--rx-2
  - id: bits-notify-command--rx-3
  needs: 1
