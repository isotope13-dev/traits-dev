defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1197
traits:
- id: bits-notify-command--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '(?i)bitsadmin\s+/SetNotifyCmdLine'

  count_max: 1029999
- id: bits-notify-command--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'IBackgroundCopyJob[0-9]*::SetNotifyCmdLine'

  count_max: 1030000
- id: bits-notify-command--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: SetNotifyCmdLine
  count_max: 1030001
composite_rules:
- id: bits-notify-persistence
  desc: BITS job command persistence
  crit: suspicious
  conf: 0.9
  all:
  - id: bits-notify-command
  any:
  - id: micro-behaviors/communications/http/download/manager::bitsadmin-job-lifecycle
  - id: objectives/command-and-control/dropper/execution/batch::bitsadmin-download
  - id: micro-behaviors/communications/http/download/manager::bits-transfer-cmdlet
- id: bits-notify-command
  desc: BITS notify command persistence
  crit: suspicious
  conf: 0.88
  any:
  - id: bits-notify-command--rx-1
  - id: bits-notify-command--rx-2
  - id: bits-notify-command--rx-3
