defaults:
  platforms: [windows]
  for: [batch, powershell, pe, dll, csharp]
  attack: "T1543.003"

traits:
  - id: safeboot-network-service-key
    desc: SafeBoot Network service persistence
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'SafeBoot[\\/]+Network[\\/]+[^''"\r\n]{3,80}'
    unless:
      - id: metadata/signed/leaf::malwarebytes-inc
  - id: remote-access-service-name
    desc: Remote Access Service name
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Remote Access Service
  - id: rmm-service-config-file
    desc: RMM service config file
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(serviceconfig\.xml|simplegateway\.service)'

composite_rules:
  - id: rmm-safeboot-service-persistence
    desc: RMM SafeBoot service persistence
    crit: hostile
    conf: 0.98
    all:
      - id: safeboot-network-service-key
    any:
      - id: remote-access-service-name
      - id: rmm-service-config-file
