defaults:
  platforms: [windows]
  for: [php]
  attack: T1543.003

traits:
  - id: php-win32-service-create
    desc: PHP Win32_Service.Create call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Win32_Service[\s\S]{0,180}->Create\s*\('
  - id: php-system-account-service
    desc: PHP service runs as System
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: NT AUTHORITY

composite_rules:
  - id: php-wmi-service-persistence
    desc: PHP WMI service persistence
    crit: hostile
    conf: 0.97
    all:
      - id: php-win32-service-create
      - id: php-system-account-service
