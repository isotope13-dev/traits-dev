# Windows Service Persistence
# Detects tactics used to maintain persistence via Windows Services
# ATT&CK: T1543.003 (Create or Modify System Process: Windows Service)
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1543.003"
  mbc: "B0011.003" # Persistence::Service
traits:
  - id: office-source-engine-service-name
    desc: Office Source Engine service name
    crit: component
    conf: 0.99
    if:
      type: text
      exact: HeavyH2O_Source64Engine_V1_0
  - id: office-source-engine-registry-settings
    desc: Office Delivery SourceEngine settings path
    crit: component
    conf: 0.99
    if:
      type: text
      exact: SOFTWARE\Microsoft\Office\Delivery\SourceEngine\Settings
  - id: office-source-engine-registry-downloads
    desc: Office Delivery SourceEngine downloads path
    crit: component
    conf: 0.99
    if:
      type: text
      exact: SOFTWARE\Microsoft\Office\Delivery\SourceEngine\Downloads
  - id: office-source-engine-mutex
    desc: Office Source Engine global mutex
    crit: component
    conf: 0.99
    if:
      type: text
      exact: Global\OfficeSourceEngine64Mutex
  - id: office-source-engine-running-mutex
    desc: Office Source Engine running mutex
    crit: component
    conf: 0.98
    if:
      type: text
      exact: Global\Office64SourceEngineRunning
  - id: standalone-service-launch
    desc: Service standalone launch template
    crit: component
    conf: 0.97
    if:
      type: text
      exact: '"%s" -standalone'
composite_rules:
  - id: windows-service-persistence
    desc: Maintains persistence via Windows Service DLL
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/service/export::win-service-export
      - id: micro-behaviors/os/service/host::advapi32-link
  - id: suspicious-packed-service
    desc: Highly suspicious packed Windows Service
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/service/export::win-service-export
      - id: objectives/anti-static/obfuscation/instruction/junk::high-entropy-generic
  - id: service-install-and-start
    desc: Installs and starts Windows service
    crit: notable
    conf: 0.94
    all:
      - id: micro-behaviors/os/service/control::open-sc-manager
      - id: micro-behaviors/os/service/control::create-service
      - id: micro-behaviors/os/service/control::start-service
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rdata
        - id: metadata/signed/platform::microsoft
  - id: service-self-copy-install
    desc: Copies binary then installs service
    crit: suspicious
    conf: 0.95
    all:
      - id: service-install-and-start
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/fs/directory/mkdir::create-directory-a
    any:
      - id: micro-behaviors/fs/path/check::get-module-filename
      - id: micro-behaviors/os/service/control::service-control-dispatch
  - id: service-reconfigure-and-start
    desc: Reconfigures existing service for persistence
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/service/control::open-sc-manager
      - id: micro-behaviors/os/service/control::open-service
      - id: micro-behaviors/os/service/control::change-service-config
      - id: micro-behaviors/os/service/control::start-service
    unless:
      - id: micro-behaviors/os/service/control::service-control-dispatch
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/vendor/microsoft
        - id: metadata/signed/platform
        - id: metadata/signed/developer
        - id: well-known/tools/reverse-engineering::ollydbg-plugin-export
  - id: service-install-dispatch-chain
    desc: Installs service and dispatches
    crit: notable
    conf: 0.96
    all:
      - id: micro-behaviors/os/service/control::open-sc-manager
      - id: micro-behaviors/os/service/control::create-service
      - id: micro-behaviors/os/service/control::service-control-dispatch
    any:
      - id: micro-behaviors/os/service/control::open-service
      - id: micro-behaviors/os/service/control::set-service-status
      - id: micro-behaviors/os/service/control::query-service-status
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/signed/platform::microsoft
        - id: metadata/package::virtualbox-platform-component
  - id: office-delivery-registry-write-chain
    desc: Writes Office Delivery SourceEngine state
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    any:
      - id: office-source-engine-registry-settings
      - id: office-source-engine-registry-downloads
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
  - id: office-source-engine-service-persistence
    desc: Office Source Engine service persistence
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/evasion/masquerade/version-resource::unsigned-office-source-engine-masquerade
      - id: micro-behaviors/os/service/control::service-dispatch-triad
    any:
      - id: office-source-engine-service-name
      - id: office-source-engine-mutex
      - id: office-source-engine-running-mutex
      - id: standalone-service-launch
      - id: office-delivery-registry-write-chain
      - id: objectives/anti-static/pack::rwx-reloc-service-loader
      - id: micro-behaviors/communications/ipc/rpc::local-rpc-impersonation-server
    needs: 2
