# Windows Service Persistence
# Detects tactics used to maintain persistence via Windows Services
# ATT&CK: T1543.003 (Create or Modify System Process: Windows Service)
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1543.003"
  mbc: "B0011.003" # Persistence::Service
composite_rules:
- id: windows-service-persistence
  desc: Maintains persistence via Windows Service DLL
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/os/service/export::win-service-export
  - id: micro-behaviors/os/service/host::advapi32-link
- id: suspicious-packed-service
  desc: Highly suspicious packed Windows Service
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/os/service/export::win-service-export
  - id: objectives/anti-static/obfuscation/instruction/junk::high-entropy-generic
- id: service-install-and-start
  desc: Installs and starts Windows service
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/os/service/control::open-sc-manager-import
  - id: micro-behaviors/os/service/control::create-service
  - id: micro-behaviors/os/service/control::start-service-import
  any:
  - id: service-key-template
  - id: objectives/privilege-escalation/modify-service::service-imagepath-reg
  - id: objectives/privilege-escalation/modify-service::sc-config-binpath
  - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-import-chain
  unless:
  - id: well-known/app/ventoy/
- id: service-install-recognized-marker
  desc: Recognized service installer marker
  crit: notable
  conf: 0.9
  any:
  - id: metadata/signed/leaf::malwarebytes-inc
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
  - id: metadata/binary/vendor::bitdefender-product-marker
  - id: metadata/signed/platform::microsoft
  - id: metadata/signed/platform::intel-corporation
  - id: metadata/binary/framework::dotnet-assembly
  - id: well-known/app/dlink-wlan::dlink-wlan-application
  - id: well-known/app/ventoy::ventoy-imdisk-helper
- id: service-admin-import-lifecycle
  desc: Service admin imports with lifecycle control
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/os/service/control::service-admin-import-cluster
  - id: micro-behaviors/os/service/host::service-config-change
  any:
  - id: micro-behaviors/os/service/control::delete-service
  - id: micro-behaviors/os/service/control::query-service-status
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/process/create/spawn::create-process-a
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/binary/vendor/
    - id: metadata/signed/platform/
    - id: metadata/signed/developer
  unless:
  - id: metadata/binary/framework/
- id: nativeaot-service-admin-dll
  desc: NativeAOT DLL with service administration
  crit: suspicious
  conf: 0.94
  all:
  - id: metadata/lang/compiler/aot::system-private-corelib
  - id: metadata/lang/compiler/aot::managed-executable-section
  - id: metadata/binary/metrics/pe-details::pe-dll-characteristics
  - id: micro-behaviors/os/service/control::service-admin-import-cluster
  any:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::low-entropy-overlay-inflation
  - id: metadata/binary/layout::pe-checksum-mismatch
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: micro-behaviors/fs/volume/admin::delete-volume-mount-point-w
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/signed/platform/
- id: service-self-copy-install
  desc: Copies binary then installs service
  crit: suspicious
  conf: 0.95
  all:
  - id: service-install-and-start
  - id: micro-behaviors/fs/file/copy::copyfile-a
  - id: micro-behaviors/fs/directory/mkdir::create-directory-a
  any:
  - id: micro-behaviors/fs/path/check::get-module-filename
  - id: micro-behaviors/os/service/control::service-control-dispatch
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: well-known/tool/sysadmin/sandboxie/
  unless:
  - id: well-known/app/ventoy/
- id: service-copy-install-chain
  desc: Copies binary then installs service
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/os/service/control::open-sc-manager
  - id: micro-behaviors/os/service/control::create-service
  - id: micro-behaviors/fs/file/copy::copyfile-a
  any:
  - id: micro-behaviors/os/service/control::start-service
  - id: micro-behaviors/os/service/control::service-control-dispatch
  - id: micro-behaviors/fs/path/check::get-module-filename
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
  - id: well-known/app/ventoy/
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/signed/developer
- id: random-root-service-self-copy
  desc: Copies to random root path and installs service
  crit: hostile
  conf: 0.98
  all:
  - id: service-copy-install-chain
  - id: micro-behaviors/fs/path/location::hash-subdir-executable-in-root
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor/
- id: service-reconfigure-and-start
  desc: Reconfigures existing service for persistence
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/os/service/control::open-sc-manager
  - id: micro-behaviors/os/service/control::open-service
  - id: micro-behaviors/os/service/control::change-service-config
  - id: micro-behaviors/os/service/control::start-service
  any:
  - id: service-key-template
  - id: objectives/privilege-escalation/modify-service::service-imagepath-reg
  - id: objectives/privilege-escalation/modify-service::sc-config-binpath
  downgrade:
    any:
    - id: objectives/persistence/system/service/install/
    - id: metadata/signed/developer
    - id: metadata/lang/compiler/systems/
  unless:
  - id: metadata/binary/vendor::bitdefender-product-marker
  - id: metadata/binary/framework/
- id: offline-files-service-reconfigure
  desc: Reconfigures Offline Files service
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/os/service/control::reconfigure-and-start-service
  - id: micro-behaviors/os/service/control::cscservice-name
- id: service-install-dispatch-chain
  desc: Installs service and dispatches
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/os/service/control::open-sc-manager
  - id: micro-behaviors/os/service/control::create-service
  - id: micro-behaviors/os/service/control::service-control-dispatch
  any:
  - id: service-key-template
  - id: objectives/privilege-escalation/modify-service::service-imagepath-reg
  - id: objectives/privilege-escalation/modify-service::sc-config-binpath
  - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-import-chain
  downgrade:
    any:
    - id: objectives/persistence/system/service/install/
    - id: metadata/package/manifest/compat::virtualbox-platform-component
  unless:
  - id: metadata/signed/developer::brave-software
- id: service-dll-registry-persistence
  desc: Persists DLL through Windows service
  crit: suspicious
  conf: 0.94
  all:
  - id: service-registry-key-fragment
  - id: micro-behaviors/os/registry/access::service-dll-value
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  any:
  - id: micro-behaviors/os/service/control::create-service
  - id: micro-behaviors/os/service/control::service-control-dispatch
  - id: micro-behaviors/os/service/control::start-service
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/metrics/threshold::many-exports-100
- id: service-dll-drop-persistence
  desc: Drops DLL and persists via Windows service
  crit: suspicious
  conf: 0.93
  all:
  - id: micro-behaviors/os/service/control::open-sc-manager
  - id: micro-behaviors/os/service/control::create-service
  - id: micro-behaviors/os/service/control::service-control-dispatch
  - id: micro-behaviors/os/service/host::service-dll-value-name
  - id: micro-behaviors/fs/file/write/direct::write-file
  any:
  - id: micro-behaviors/os/sysinfo/directories::get-system-directory
  - id: micro-behaviors/os/service/host::system32-service-dll-target
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/signed/platform/
    - id: metadata/binary/vendor/
