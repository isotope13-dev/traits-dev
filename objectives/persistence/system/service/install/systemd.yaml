defaults:
  platforms: [linux]
  for: [systemd]
  attack: T1543.002
  mbc: F0012

traits:
  - id: systemd-hidden-workingdir
    desc: Systemd unit uses hidden working dir
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'WorkingDirectory=.{0,120}/\\.[^\\r\\n]{1,80}'

  - id: systemd-root-hidden-service
    desc: Root systemd hidden-path service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?s)User=root.{0,160}(WorkingDirectory|ExecStart)=.{0,120}/\\.'

  - id: systemd-var-tmp-exec
    desc: Systemd unit executes from var tmp
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ExecStart=/var/tmp/[^\\r\\n]{1,160}'

  - id: systemd-copy-run-delete-bin
    desc: Systemd copies runs deletes binary
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'ExecStart=/bin/bash -c .{0,80}cp -f -r.{0,160}rm -rf'

  - id: systemd-sudo-root-local-script
    desc: Systemd sudo root local script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ExecStart=/usr/bin/sudo /bin/bash /root/\\.local/'

  - id: systemd-sidedoor-service
    desc: Sidedoor systemd service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)(Description=.{0,80}sidedoor|ExecStart=/usr/bin/sidedoor)'

  - id: systemd-curl-tmp-sshd
    desc: Systemd downloads tmp sshd payload
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: 'curl -skL .{0,120} -o /tmp/\\.sshd.{0,80}chmod \\+x /tmp/\\.sshd'
