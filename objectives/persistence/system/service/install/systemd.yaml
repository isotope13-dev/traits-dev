defaults:
  platforms: [linux]
  for: [systemd]
  attack: T1543.002
  mbc: F0012

traits:
  - id: systemd-hidden-workingdir
    desc: Systemd unit uses a hidden working directory
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'WorkingDirectory=.{0,120}/\.[^\r\n]{1,80}'

  - id: systemd-root-hidden-service
    desc: Root systemd hidden-path service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?s)User=root.{0,160}(WorkingDirectory|ExecStart)=.{0,120}/\.'
    unless:
      - id: well-known/tool/offensive/pwn/
      - type: text
        substr: PWN_ROOT

  - id: systemd-var-tmp-exec
    desc: Systemd unit executes from var tmp
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ExecStart=/var/tmp/[^\r\n]{1,160}'

  - id: systemd-copy-run-delete-bin
    desc: Systemd copies runs deletes binary
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'ExecStart=/bin/bash -c .{0,80}cp -f -r.{0,160}rm -rf'

  - id: systemd-sudo-root-local-script
    desc: Systemd sudo root local script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ExecStart=/usr/bin/sudo /bin/bash /root/\.local/'

  - id: systemd-sidedoor-service
    desc: Sidedoor systemd service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)(Description=.{0,80}sidedoor|ExecStart=/usr/bin/sidedoor)'

  - id: systemd-curl-tmp-sshd
    desc: Systemd downloads tmp sshd payload
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: 'curl -skL .{0,120} -o /tmp/\.sshd.{0,80}chmod \+x /tmp/\.sshd'

  - id: systemd-hidden-execstart
    desc: Systemd ExecStart uses hidden executable path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'ExecStart=.{0,120}/\.[^\r\n]{1,80}'

  - id: systemd-connect-ip-port
    desc: ExecStart connect IP port
    crit: component
    if:
      type: text
      regex: '\s-connect\s+[0-9]{1,3}(\.[0-9]{1,3}){3}:[0-9]{2,5}'

  - id: systemd-ignore-cert-flag
    desc: ExecStart ignore-cert flag
    crit: component
    if:
      type: text
      substr: '-ignore-cert'

  - id: systemd-root-user
    desc: Systemd service runs as root
    crit: component
    if:
      type: text
      regex: '(?m)^User=root$'

  - id: systemd-backdoor-description
    desc: Systemd service self-identifies as backdoor
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)^Description=.{0,80}backdoor'

  - id: systemd-forking-service
    desc: Systemd forking service
    crit: component
    if:
      type: text
      regex: '(?m)^Type=forking$'

composite_rules:
  - id: systemd-hidden-root-autorestart
    desc: Hidden root systemd service with autorestart
    crit: hostile
    conf: 0.97
    all:
      - id: systemd-root-hidden-service
      - id: objectives/persistence/system/service/systemd::restart-always

  - id: systemd-hidden-connect-ignore-cert-persistence
    desc: Hidden systemd helper ignores TLS
    crit: hostile
    conf: 0.98
    all:
      - id: systemd-hidden-workingdir
      - id: systemd-hidden-connect-ignore-cert
    any:
      - id: objectives/persistence/system/service/systemd::restart-always
      - id: objectives/persistence/system/service/systemd::wanted-by-target

  - id: systemd-var-tmp-autostart-payload
    desc: Systemd autostarts var-tmp payload
    crit: hostile
    conf: 0.96
    all:
      - id: systemd-var-tmp-exec
      - id: objectives/persistence/system/service/systemd::restart-always
      - id: objectives/persistence/system/service/systemd::wanted-by-target

  - id: systemd-root-var-tmp-autorestart
    desc: Root systemd service restarts var-tmp payload
    crit: hostile
    conf: 0.97
    all:
      - id: systemd-root-user
      - id: systemd-var-tmp-exec
      - id: objectives/persistence/system/service/systemd::restart-always

  - id: systemd-copy-run-delete-autorestart
    desc: Systemd copy-run-delete payload with autorestart
    crit: hostile
    conf: 0.97
    all:
      - id: systemd-copy-run-delete-bin
      - id: objectives/persistence/system/service/systemd::restart-always

  - id: systemd-forking-copy-run-delete
    desc: Forking systemd service stages and deletes payload
    crit: hostile
    conf: 0.97
    all:
      - id: systemd-forking-service
      - id: systemd-copy-run-delete-bin

  - id: systemd-root-local-sudo-persistence
    desc: Systemd launches sudo root-local script
    crit: hostile
    conf: 0.96
    all:
      - id: systemd-sudo-root-local-script
    any:
      - id: objectives/persistence/system/service/systemd::restart-always
      - id: objectives/persistence/system/service/systemd::wanted-by-target

  - id: systemd-backdoor-autorestart
    desc: Self-described backdoor systemd service with autorestart
    crit: hostile
    conf: 0.97
    all:
      - id: systemd-backdoor-description
      - id: objectives/persistence/system/service/systemd::restart-always

  - id: systemd-sidedoor-autostart
    desc: Sidedoor systemd autostart persistence
    crit: hostile
    conf: 0.97
    all:
      - id: systemd-sidedoor-service
    any:
      - id: objectives/persistence/system/service/systemd::restart-always
      - id: objectives/persistence/system/service/systemd::wanted-by-target

  - id: systemd-curl-tmp-sshd-autorestart
    desc: Systemd downloads and restarts hidden tmp sshd payload
    crit: hostile
    conf: 0.98
    all:
      - id: systemd-curl-tmp-sshd
      - id: objectives/persistence/system/service/systemd::restart-always

  - id: systemd-hidden-connect-ignore-cert
    desc: Hidden ExecStart ignores TLS
    crit: suspicious
    conf: 0.96
    all:
      - id: systemd-hidden-execstart
      - id: systemd-connect-ip-port
      - id: systemd-ignore-cert-flag

  - id: remote-agent-systemd-command-channel
    desc: Systemd-persistent Python agent with remote shell tasking
    crit: hostile
    conf: 0.99
    for: [python, shell, systemd]
    scope: archive
    unless:
      - id: well-known/app/remotepower::documented-rmm-release-context
    attack: "T1059.004,T1071.001,T1543.002"
    all:
      - id: objectives/command-and-control/backdoor/rat/remote-agent::python-remote-agent-shell-channel
    any:
      - id: objectives/persistence/system/service/systemd::systemctl-enable
      - id: micro-behaviors/os/service/config::systemd-etc-service-path
