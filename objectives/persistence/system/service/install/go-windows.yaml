defaults:
  platforms: [windows]
  for: [go]
  attack: T1543.003

traits:
  - id: go-windows-auto-start-service
    desc: Go uses auto-start service flag
    crit: component
    conf: 0.9
    if:
      type: text
      substr: SERVICE_AUTO_START

  - id: go-temp-service-payload-path
    desc: Go temp service payload path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'filepath\.Join\(.{0,80}"TEMP".{0,80}"payload\.exe"'

  - id: go-service-registration-helper
    desc: Controls Windows service lifecycle
    crit: notable
    conf: 0.92
    for: [pe]
    if:
      type: text
      regex: 'main\.(silentRegisterService|ensureServiceRunning|serviceStart)\b'

  - id: go-tap-driver-install-helper
    desc: Installs TAP network driver
    crit: notable
    conf: 0.93
    for: [pe]
    if:
      type: text
      exact: main.installTapDrivers

  - id: go-softether-server-setup
    desc: Sets up SoftEther server component
    crit: suspicious
    conf: 0.94
    for: [pe]
    if:
      type: text
      exact: main.ensureServerPresentAndStart

composite_rules:
  - id: go-service-autostart-install
    desc: Go installs auto-start service
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/service/control::go-service-install-control
      - id: go-windows-auto-start-service
    any:
      - id: go-temp-service-payload-path
      - id: micro-behaviors/fs/file/write/direct::os-write-file

  - id: go-service-reconfigure-persistence
    desc: Go reconfigures service persistence
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/service/control::go-service-reconfigure-control
      - id: go-windows-auto-start-service
    any:
      - id: go-temp-service-payload-path
      - id: micro-behaviors/fs/path/system::system32-substr

  - id: go-remote-vpn-service-installer
    desc: SoftEther service staging with admin
    crit: hostile
    conf: 0.99
    for: [pe]
    all:
      - id: go-service-registration-helper
      - id: go-tap-driver-install-helper
      - id: go-softether-server-setup
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
