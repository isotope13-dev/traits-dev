defaults:
  attack: T1543.003
  mbc: B0011.003
  for:
    - c
    - cpp
  platforms:
    - windows
traits:
  - id: installservice-call
    desc: InstallService source routine
    crit: component
    conf: 0.94
    if:
      type: function
      exact: InstallService
    unless:
      - id: metadata/package/testing/presence/harness::rostests-directory-path
      - id: metadata/package/testing/presence/harness::winetests-directory-path
      - id: well-known/app/ventoy::ventoy-imdisk-source-helper
  - id: create-service-api
    desc: CreateServiceA API call
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: CreateServiceA
    unless:
      - id: metadata/lang/source::windows-dll-ordinal-lookup-source
      - id: metadata/lang/source::wine-compat-source
      - id: well-known/app/ventoy::ventoy-imdisk-source-helper
  - id: create-service-wrapper
    desc: fCreateService wrapper symbol
    crit: suspicious
    conf: 0.93
    if:
      type: string_literal
      exact: fCreateService
    unless:
      - id: well-known/app/ventoy::ventoy-imdisk-source-helper
  - id: default-service-name
    desc: Reptile service name marker
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: servicename\[\].{0,16}"virus"
  - id: default-display-name
    desc: Reptile display name marker
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: servicedisplayname\[\].{0,16}"change me"
composite_rules:
  - id: source-service-persistence
    desc: Source installs persistent Windows service
    crit: suspicious
    conf: 0.98
    all:
      - id: installservice-call
    needs: 2
    any:
      - id: create-service-api
      - id: create-service-wrapper
      - id: default-service-name
      - id: default-display-name
    unless:
      - id: metadata/package/testing/presence/harness::rostests-directory-path
      - id: metadata/package/testing/presence/harness::winetests-directory-path
      - id: well-known/app/ventoy::ventoy-imdisk-source-helper
