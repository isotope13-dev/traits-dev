defaults:
  platforms: [windows]
  for: [pe]
  attack: T1543.003
  mbc: B0011.003
traits:
  - id: driver-image-template
    desc: System drivers path template
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: system32\drivers\%s.sys
  - id: service-key-template
    desc: Service registry key template
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: SYSTEM\CurrentControlSet\Services\%s
  - id: grouporderlist-key
    desc: Service GroupOrderList registry path
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: SYSTEM\CurrentControlSet\Control\GroupOrderList
  - id: tcpip6-parameters-key
    desc: Tcpip6 parameters registry path
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: SYSTEM\CurrentControlSet\Services\Tcpip6\Parameters
  - id: disabled-components-value
    desc: DisabledComponents registry value
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: DisabledComponents
composite_rules:
  - id: driver-service-registry-persistence
    desc: Driver service registry persistence
    crit: suspicious
    conf: 0.96
    all:
      - id: driver-image-template
      - id: service-key-template
      - id: grouporderlist-key
    any:
      - id: objectives/persistence/system/service/install::service-install-and-start
      - id: micro-behaviors/os/registry/access::registry-open-key-api
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-a
  - id: service-network-stack-registry-mod
    desc: Service network stack registry modification
    crit: notable
    conf: 0.92
    all:
      - id: tcpip6-parameters-key
      - id: disabled-components-value
    any:
      - id: micro-behaviors/os/registry/access::registry-open-key-api
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-a
