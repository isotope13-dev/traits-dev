defaults:
  platforms: [windows]
  for: [pe]
  attack: T1543.003
  mbc: B0011.003
traits:
  - id: driver-image-template
    desc: System drivers path template
    crit: suspicious
    conf: 0.88
    if:
      type: text
      exact: system32\drivers\%s.sys
  - id: service-key-template
    desc: Service registry key template
    crit: component
    conf: 0.9
    if:
      type: text
      exact: SYSTEM\CurrentControlSet\Services\%s
  - id: grouporderlist-key
    desc: Service GroupOrderList registry path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      exact: SYSTEM\CurrentControlSet\Control\GroupOrderList
  - id: tcpip6-parameters-key
    desc: Tcpip6 parameters registry path
    crit: component
    conf: 0.84
    if:
      type: text
      exact: SYSTEM\CurrentControlSet\Services\Tcpip6\Parameters
    unless:
      - id: well-known/lib/electron::v8-isolate-marker
  - id: disabled-components-value
    desc: DisabledComponents registry value
    crit: suspicious
    conf: 0.84
    if:
      type: text
      exact: DisabledComponents
  - id: winpkfilter-x64-msi
    desc: WinpkFilter x64 MSI reference
    crit: component
    conf: 0.96
    if:
      type: text
      substr: WinpkFilter-x64.msi
  - id: ndisrd-driver-name
    desc: NDISRD driver name reference
    crit: component
    conf: 0.9
    if:
      type: text
      word: NDISRD
  - id: swifttunnel-driver-path
    desc: SwiftTunnel local driver path
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "%LOCALAPPDATA%\\SwiftTunnel\\drivers\\"
  - id: winpkfilter-driver-installer-log
    desc: WinpkFilter driver installer log
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "[driver-installer] Starting WinpkFilter driver installation..."
  - id: msiexec-quiet-norestart-log
    desc: Silent msiexec no-restart log
    crit: component
    conf: 0.94
    if:
      type: text
      exact: "[driver-installer] Running msiexec /i ... /qn /norestart"
  - id: service-registry-key-fragment
    desc: Services registry key fragment
    crit: component
    conf: 0.86
    if:
      type: text
      substr: SYSTEM\CurrentControlSet\Services\
  - id: service-parameters-subkey
    desc: Service Parameters subkey string
    crit: component
    conf: 0.8
    if:
      type: text
      exact: \Parameters
composite_rules:
  - id: driver-service-registry-persistence
    desc: Driver service registry persistence
    crit: suspicious
    conf: 0.96
    all:
      - id: driver-image-template
      - id: service-key-template
      - id: grouporderlist-key
    any:
      - id: objectives/persistence/system/service/install::service-install-and-start
      - id: micro-behaviors/os/registry/access::registry-open-key-api
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-a
    unless:
      - id: well-known/app/swifttunnel_vpn::swifttunnel
      - id: well-known/app/swifttunnel_vpn::swifttunnel-driver-backed-tunnel
  - id: service-network-stack-registry-mod
    desc: Service network stack registry modification
    crit: suspicious
    conf: 0.92
    all:
      - id: tcpip6-parameters-key
      - id: disabled-components-value
    any:
      - id: micro-behaviors/os/registry/access::registry-open-key-api
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-a
  - id: winpkfilter-silent-driver-msi-install
    desc: Silent WinpkFilter driver MSI install
    crit: suspicious
    conf: 0.98
    all:
      - id: winpkfilter-x64-msi
      - id: ndisrd-driver-name
      - id: msiexec-quiet-norestart-log
    any:
      - id: swifttunnel-driver-path
      - id: winpkfilter-driver-installer-log
    unless:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-msi-downloader
  - id: driver-service-parameters-targeting
    desc: Driver service Parameters registry targeting
    crit: suspicious
    conf: 0.9
    all:
      - id: service-registry-key-fragment
      - id: service-parameters-subkey
    any:
      - id: ndisrd-driver-name
      - id: winpkfilter-x64-msi
    unless:
      - id: well-known/app/swifttunnel_vpn::swifttunnel-msi-downloader
      - id: well-known/app/swifttunnel_vpn::swifttunnel-driver-service-lifecycle
  - id: swifttunnel-winpkfilter-driver-persistence
    desc: Masqueraded WinpkFilter driver persistence
    crit: hostile
    conf: 0.99
    all:
      - id: winpkfilter-silent-driver-msi-install
      - id: driver-service-parameters-targeting
      - id: objectives/evasion/masquerade/identity/fabricated::swifttunnel-fpsbooster-manifest
    any:
      - id: metadata/binary/debug::pdb-driver-installer-basename
      - id: metadata/lang/compiler/systems::rust-binary

  - id: kernel-driver-bundled-installer
    desc: Bundled kernel driver installer pattern
    crit: suspicious
    conf: 0.9
    size_min: 32768
    size_max: 8388608
    all:
      - id: driver-image-template
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: micro-behaviors/os/service/control::start-service
    any:
      - id: micro-behaviors/os/service/control::open-sc-manager
      - id: micro-behaviors/os/service/control::query-service-status
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/certificate/identity::pe-signature-verified
      - id: metadata/binary/installer/family::known-benign-installer
      - id: well-known/app/swifttunnel_vpn::swifttunnel
      - id: well-known/app/swifttunnel_vpn::swifttunnel-driver-backed-tunnel
