defaults:
  for: [pe]
  platforms: [windows]
  attack: T1543.003
  mbc: B0011.003

traits:
  - id: drv-install-argument
    desc: Driver install command argument
    crit: component
    conf: 0.97
    if:
      type: text
      exact: /drv:install

  - id: system-drivers-target
    desc: System drivers path target
    crit: component
    conf: 0.9
    if:
      type: text
      exact: '%SystemRoot%\System32\Drivers\'

composite_rules:
  - id: starforce-driver-service-install
    desc: StarForce driver service installation
    crit: suspicious
    conf: 0.97
    all:
      - id: well-known/lib/protection/starforce::protect-sdk-wrapper
    any:
      - id: micro-behaviors/os/service/control::service-admin-import-cluster
      - id: micro-behaviors/os/service/control::reconfigure-and-start-service
      - id: objectives/persistence/system/service/install::service-install-and-start
      - id: drv-install-argument
      - id: well-known/lib/protection/starforce::driverinstaller-template
      - id: system-drivers-target
    needs: 3
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/signed/certificate::pe-signature-verified
        - id: metadata/binary/installer/family::known-benign-installer
