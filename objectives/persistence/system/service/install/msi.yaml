defaults:
  attack: "T1543.003"
  platforms: [windows]
  for: [oledoc]
traits:
  - id: msi-serviceinstall-table
    desc: MSI ServiceInstall table present
    crit: suspicious
    conf: 0.94
    if:
      type: text
      exact: ServiceInstall
  - id: msi-service-wrapper-binaries
    desc: MSI embeds service wrapper binaries
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: raw
      regex: "ServiceExe(With|Without)Service"
composite_rules:
  - id: msi-service-installer-custom-action
    desc: MSI installs service via custom action
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: msi-serviceinstall-table
      - id: msi-service-wrapper-binaries
      - id: metadata/binary/installer/database::embedded-managed-custom-action
      - id: micro-behaviors/process/create/exec::wix-ca-quietexec
