defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1543.003

traits:
  - id: powershell-svchost-service-create
    desc: PowerShell creates svchost service
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'sc\.exe\s+create\s+\$name'
      case_insensitive: true

  - id: powershell-service-dll-value
    desc: PowerShell sets ServiceDll value
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'New-ItemProperty[\s\S]{0,160}-name\s+ServiceDll'
      case_insensitive: true

  - id: powershell-svchost-group-registry
    desc: PowerShell edits svchost group
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: 'Windows NT\CurrentVersion\svchost'

composite_rules:
  - id: powershell-svchost-servicedll-persistence
    desc: PowerShell svchost ServiceDll persistence
    crit: suspicious
    conf: 0.94
    all:
      - id: powershell-svchost-service-create
      - id: powershell-service-dll-value
    any:
      - id: powershell-svchost-group-registry
      - id: micro-behaviors/os/service/host::svchost-k-service-group
