defaults:
  platforms: [unix]
  for: [scripts, source]
  attack: "T1611, T1053.006"

composite_rules:
  - id: kube-incluster-privileged-node-pod
    desc: Kubernetes serviceaccount privileged node pod
    crit: suspicious
    conf: 0.96
    any:
      - id: micro-behaviors/os/container/runtime::serviceaccount-files
      - id: objectives/supply-chain/credential-theft/cloud-kube::python-kube-serviceaccount-read
    all:
      - id: micro-behaviors/os/container/runtime::api-nodes-path
      - id: micro-behaviors/os/container/runtime::privileged-hostpath-pod

  - id: kube-privileged-node-systemd-persistence
    desc: Kubernetes privileged pod systemd persistence
    crit: hostile
    conf: 0.985
    all:
      - id: kube-incluster-privileged-node-pod
    any:
      - id: objectives/persistence/system/service/systemd::systemd-user-persistence
      - id: objectives/supply-chain/credential-theft/cloud-kube::python-user-systemd-backdoor-install

  - id: kube-incluster-workload-reconciler
    desc: Kubernetes serviceaccount workload reconciler
    crit: hostile
    conf: 0.97
    ref: sha256:4eb19d990c31e47db5e857d5943f24c203dbb243277a1ccce761d8d657c33647
    all:
      - id: micro-behaviors/os/container/runtime::incluster-apply-client
      - id: micro-behaviors/os/container/runtime::workload-write-api
    any:
      - id: micro-behaviors/os/container/runtime::api-cronjobs-path
      - id: micro-behaviors/os/container/runtime::operator-rbac-bundle
