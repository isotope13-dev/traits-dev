defaults:
  platforms: [windows]
  for: [pe, dll, source]
  attack: T1547
  mbc: F0004

composite_rules:
  - id: application-restart-persistence
    desc: Windows application restart persistence APIs
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/os/event/shutdown::register-application-restart
      - id: micro-behaviors/os/event/shutdown::set-process-shutdown-parameters
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
    unless:
      - id: metadata/lang/source::windows-compat-api-source
  - id: shutdown-hijack-restart-persistence
    desc: Shutdown hijack restart persistence chain
    crit: hostile
    conf: 0.98
    all:
      - id: application-restart-persistence
    any:
      - id: micro-behaviors/os/event/shutdown::abort-system-shutdown-w
      - id: micro-behaviors/os/event/shutdown::abort-system-shutdown-text
      - id: micro-behaviors/os/event/shutdown::ewx-restartapps-flag
