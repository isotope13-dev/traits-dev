defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1053

traits:
  - id: restart-mode-check
    desc: Restart mode check
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      substr: "command.Run == domain.RunModeRestart"

  - id: restart-sleep-call
    desc: Restart supervisor sleep call
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: symbol
      kind: call
      exact: time.Sleep

composite_rules:
  - id: restart-backoff-sleep
    desc: Restart-mode backoff sleep
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    all:
      - id: restart-mode-check
      - id: restart-sleep-call
    near_bytes: 300

  - id: lock-file-queued-command-dispatch
    desc: Lock file queued command dispatch
    crit: hostile
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    all:
      - id: micro-behaviors/process/create/command-handler::lock-file-queue-replay
      - id: micro-behaviors/process/create/command-handler::queued-command-process-dispatch
      - id: micro-behaviors/process/create/command-handler::dependency-triggered-queue-expansion

  - id: lock-file-persistent-command-replay
    desc: Lock file persistent command replay
    crit: hostile
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    all:
      - id: micro-behaviors/process/create/command-handler::lock-file-queue-replay
      - id: micro-behaviors/process/create/command-handler::queued-command-process-dispatch
      - id: micro-behaviors/data/config/schema::persistent-restart-run-modes

  - id: queued-command-restart-supervisor
    desc: Queued command restart supervisor
    crit: suspicious
    conf: 0.92
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    near_lines: 50
    all:
      - id: restart-mode-check
      - id: restart-backoff-sleep
      - id: micro-behaviors/process/create/command-handler::channel-backed-command-queue
      - id: micro-behaviors/process/create/command-handler::queued-command-process-dispatch
