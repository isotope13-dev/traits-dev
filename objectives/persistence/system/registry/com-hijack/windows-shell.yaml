defaults:
  for: [pe]
  platforms: [windows]
  attack: T1546.015
traits:
  - id: shellexecutehooks-registry-path
    desc: ShellExecuteHooks registry persistence path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)Explorer\\shellexecutehooks
    unless:
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
  - id: clsid-percent-s-template
    desc: Runtime CLSID format-string template
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (?i)CLSID\\\{%s\}
    unless:
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
composite_rules:
  - id: shellexecutehooks-com-hijack
    desc: ShellExecuteHooks COM hijack persistence
    crit: hostile
    conf: 0.97
    all:
      - id: shellexecutehooks-registry-path
      - id: objectives/persistence/system/registry/com::threadingmodel-word
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    any:
      - id: clsid-percent-s-template
      - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
      - id: objectives/persistence/system/registry/com::inprocserver32-word
  - id: explorer-shell-hijack-persistence
    desc: Explorer shell namespace hijack persistence
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/os/registry/access::reg-create-key-a
      - id: micro-behaviors/fs/shell-ops/commands::shell-icon-customization
    any:
      - id: micro-behaviors/fs/shell-ops/commands::explorer-shell-namespace-control
      - id: micro-behaviors/os/registry/manipulate::reg-delete-key-a-symbol
      - id: micro-behaviors/ui/window/notify::shell-notify-icon
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/exec::shell-execute-ex
    needs: 2
  - id: privileged-shell-hijack-registration
    desc: Privileged Explorer shell hijack registration
    crit: suspicious
    conf: 0.95
    all:
      - id: explorer-shell-hijack-persistence
      - id: objectives/privilege-escalation/token-manipulation::dynamic-token-privilege-chain
    any:
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/process/create/exec::shell-execute-ex-a
