defaults:
  platforms: [windows]
  attack: T1546.015
  crit: suspicious
  conf: 0.95
  for: [scripts, binaries]
traits:
  - id: web-browser-clsid
    desc: Microsoft Web Browser CLSID reference
    crit: notable
    if:
      type: text
      substr: "{EAB22AC0-30C1-11CF-A7EB-0000C05BAE0B}"
  - id: typelib-registry-path
    desc: TypeLib registry key path
    crit: notable
    if:
      type: text
      regex: '(?i)CLSID\\\{[0-9A-F-]{36}\}\\TypeLib'
  - id: typelib-zipline-marker-1
    desc: ZipLine marker in scriptlet (1)
    if:
      type: text
      substr: "Udate_Srv.sct"
  - id: typelib-zipline-marker-2
    desc: ZipLine marker in scriptlet (2)
    if:
      type: text
      regex: '(?i)\.sct\b'
composite_rules:
  - id: typelib-hijack
    desc: Persistence via TypeLib registry hijacking
    all:
      - id: web-browser-clsid
      - id: typelib-registry-path
  - id: typelib-zipline-markers
    desc: ZipLine scriptlet markers
    any:
      - id: typelib-zipline-marker-1
      - id: typelib-zipline-marker-2
  - id: typelib-hijack-zipline
    desc: Persistence via TypeLib hijacking (ZipLine)
    crit: hostile
    all:
      - id: typelib-hijack
      - id: typelib-zipline-markers
