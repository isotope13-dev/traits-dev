defaults:
  platforms: [windows]
  attack: T1546.015
  crit: suspicious
  conf: 0.95
  for: [scripts, binaries]
traits:
  - id: web-browser-clsid
    # A bare CLSID reference is a neutral COM fact — the SHDocVw Web Browser
    # control is embedded by legitimate COM clients (pywin32, MFC CHtmlView, IE
    # automation) as well as TypeLib-hijack malware. The hijack intent lives in
    # the `typelib-hijack` composite (CLSID + a CLSID\{guid}\TypeLib registry
    # write), so this building block belongs at component, not suspicious.
    desc: SHDocVw Web Browser control CLSID
    crit: component
    if:
      type: text
      substr: "{EAB22AC0-30C1-11CF-A7EB-0000C05BAE0B}"
  - id: typelib-registry-path
    desc: TypeLib registry key path
    crit: suspicious
    if:
      type: text
      regex: '(?i)CLSID\\\{[0-9A-F-]{36}\}\\TypeLib'
  - id: typelib-zipline-marker-1
    desc: ZipLine marker in scriptlet (1)
    if:
      type: text
      substr: "Udate_Srv.sct"
  - id: typelib-executable-path
    desc: Executable path in TypeLib redirection
    crit: component
    if:
      type: text
      regex: '(?i)[a-z]:\\.{0,100}\.(sct|dll|ocx)\b'
    unless:
      - type: text
        substr: "C:\\Project\\YourLibName.dll"
      - type: basename
        regex: \.(md|mdx)$
composite_rules:
  - id: typelib-hijack
    desc: Persistence via TypeLib registry hijacking
    all:
      - id: web-browser-clsid
      - id: typelib-registry-path
  - id: typelib-hijack-zipline
    desc: Persistence via TypeLib hijacking (ZipLine)
    crit: hostile
    all:
      - id: typelib-hijack
      - id: typelib-zipline-marker-1
  - id: typelib-redirection-generic
    desc: Generic TypeLib redirection to file
    crit: suspicious
    all:
      - id: typelib-registry-path
      - id: typelib-executable-path
