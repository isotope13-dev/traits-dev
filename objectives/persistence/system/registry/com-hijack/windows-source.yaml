defaults:
  for:
    - c
    - cpp
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: inprocserver32-path
    desc: InprocServer32 registry path
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (?i)CLSID\\(?:%s|\{[0-9A-F-]{36}\})\\InprocServer32
    not:
      - regex: '%MODULE%'
      - substr: DefaultIcon
      - substr: ContextMenuHandlers
      - substr: ShellEx
      - substr: DragDropHandlers
  - id: inprocserver32-rot13
    desc: ROT13-encoded InprocServer32 path
    crit: suspicious
    conf: 0.97
    attack: T1546.015
    for:
      - c
      - cpp
    if:
      type: text
      substr: VacebpFreire32
  - id: clsid-registry-path
    desc: CLSID registry path manipulation
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: (?i)CLSID\\(?:%s|\{[0-9A-F-]{36}\})\\(?:InprocServer32|TreatAs)
  - id: clsid-registry-path-rot13
    desc: ROT13-encoded CLSID registry path
    crit: suspicious
    conf: 0.95
    for:
      - c
      - cpp
    if:
      type: text
      word: PYFVQ
  - id: reg-set-value-ex-source
    desc: RegSetValueEx write call
    crit: component
    conf: 0.9
    for:
      - c
      - cpp
    if:
      type: text
      regex: (?i)\bRegSetValueEx(A|W)?\b
  - id: sh-set-value-source
    desc: SHSetValue write call
    crit: component
    conf: 0.9
    for:
      - c
      - cpp
    if:
      type: text
      regex: (?i)\bSHSetValue(A|W)?\b
composite_rules:
  - id: inprocserver32-write
    desc: InprocServer32 registry write
    crit: notable
    conf: 0.9
    attack: T1546.015
    all:
      - id: inprocserver32-path
    any:
      - id: micro-behaviors/os/registry/access::registry-set-value-api
      - id: reg-set-value-ex-source
      - id: sh-set-value-source
    unless:
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
