defaults:
  for:
    - c
    - cpp
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: inprocserver32-write
    desc: InprocServer32 registry write
    crit: notable
    conf: 0.82
    attack: T1546.015
    if:
      type: text
      regex: (?i)CLSID\\(%s|\{[0-9A-F-]{36}\})\\InprocServer32
    not:
      - regex: '%MODULE%'
      - substr: DefaultIcon
      - substr: ContextMenuHandlers
      - substr: ShellEx
      - substr: DragDropHandlers
    unless:
      - id: metadata/binary/installer/sfx::7zip-shell-extension-clsid
      - type: text
        substr: Java Plug-in %VERSION%
      - type: text
        substr: shellex\ContextMenuHandlers
      - type: text
        substr: Shell Extensions\Approved
  - id: inprocserver32-rot13
    desc: ROT13-encoded InprocServer32 path
    crit: suspicious
    conf: 0.97
    attack: T1546.015
    for:
      - c
      - cpp
    if:
      type: text
      substr: VacebpFreire32
  - id: clsid-registry-path
    desc: CLSID registry path manipulation
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: (?i)CLSID\\(%s|\{[0-9A-F-]{36}\})
    unless:
      - id: metadata/binary/installer/sfx::7zip-shell-extension-clsid
      - id: objectives/persistence/system/registry/com::com-inproc-self-registration
      - type: text
        substr: Java Plug-in %VERSION%
      - type: text
        substr: shellex\ContextMenuHandlers
      - type: text
        substr: Shell Extensions\Approved
  - id: clsid-registry-path-rot13
    desc: ROT13-encoded CLSID registry path
    crit: suspicious
    conf: 0.95
    for:
      - c
      - cpp
    if:
      type: text
      word: PYFVQ
composite_rules:
  - id: clsid-inprocserver32-write-chain
    desc: CLSID InprocServer32 ProxyStub chain
    crit: suspicious
    conf: 0.95
    attack: T1546.015
    all:
      - id: clsid-registry-path
      - id: inprocserver32-write
      - id: objectives/command-and-control/dropper/execution/inject::proxystubclsid32-registry-fragment
  - id: active-setup-com-hijack-persistence
    desc: Active Setup MigHost COM hijack
    crit: hostile
    conf: 0.98
    attack: T1547.014
    all:
      - id: clsid-inprocserver32-write-chain
      - id: micro-behaviors/os/registry/access::active-setup-fragment
      - id: objectives/command-and-control/dropper/execution/inject::mighost-command-template
