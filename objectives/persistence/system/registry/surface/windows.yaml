# Specialized Windows system-level registry persistence surfaces.
defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1547
traits:
- id: appinit-dlls-registry--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)Windows( NT)?\\CurrentVersion\\Windows.{0,80}AppInit_DLLs'

  count_max: 1031262

- id: appinit-dlls-registry--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\\AppInit_DLLs\b'

  count_max: 1031263
- id: appinit-dlls-registry--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    word: AppInit_DLLs

  count_max: 1031264
- id: appinit-dlls-registry--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: LoadAppInit_DLLs
  count_max: 1031265
- id: appcertdlls-registry
  desc: AppCert DLLs registry persistence
  crit: suspicious
  conf: 0.9
  attack: T1546.009
  if:
    type: text
    regex: '(?i)\\Control\\Session Manager\\AppCertDlls\b|\\AppCertDlls\b'
  downgrade:
    any:
    - id: well-known/tool/sysadmin/sysinternals/
  unless:
  - id: well-known/tool/sysadmin/sysinternals/

- id: lsa-auth-package-registry
  desc: LSA authentication package registry
  crit: suspicious
  conf: 0.9
  attack: T1547.002
  if:
    type: text
    regex: '(?i)\\Control\\Lsa\\(Authentication Packages|Security Packages|Notification Packages)\b'

- id: lsa-control-path
  desc: LSA registry control path
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '(?i)\\Control\\Lsa\\'

- id: lsa-package-value-name
  desc: LSA package value name
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '(?i)\b(Authentication Packages|Security Packages|Notification Packages)\b'

- id: print-monitor-registry
  desc: Print monitor registry persistence
  crit: suspicious
  conf: 0.88
  attack: T1547.010
  unless:
  - type: text
    substr: Disable Printer bloat
  - id: well-known/lib/wine/
  if:
    type: text
    regex: '(?i)\\Control\\Print\\Monitors\\|\\Print\\Monitors\\[^\\\n]{1,80}\\Driver\b'

- id: print-processor-registry
  desc: Print processor registry persistence
  crit: suspicious
  conf: 0.88
  attack: T1547.012
  unless:
  - id: well-known/lib/wine/
  if:
    type: text
    regex: '(?i)\\Control\\Print\\Environments\\[^\\\n]{1,160}\\Print Processors\\'

- id: time-provider-registry
  desc: Windows Time Provider persistence
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: '(?i)\\Services\\W32Time\\TimeProviders\\|\\TimeProviders\\[^\\\n]{1,80}\\DllName\b'

- id: netsh-helper-registry
  desc: Netsh helper DLL persistence
  crit: suspicious
  conf: 0.88
  attack: T1546
  if:
    type: text
    regex: '(?i)\\Microsoft\\NetSh\\|netsh\s+add\s+helper\b'

- id: winsock-provider-catalog
  desc: Winsock provider catalog persistence
  crit: notable
  conf: 0.86
  attack: T1546
  if:
    type: text
    regex: '(?i)\\WinSock2\\Parameters\\(Protocol_Catalog9|Namespace_Catalog5)\b'
  downgrade:
    any:
    - id: well-known/tool/sysadmin/sysinternals/
  unless:
  - id: well-known/tool/sysadmin/sysinternals/

- id: network-provider-order-path
  desc: NetworkProvider order registry path
  crit: component
  conf: 0.9
  if:
    type: text
    substr: '\NetworkProvider\Order'

- id: network-provider-service-path
  desc: NetworkProvider service registry path
  crit: component
  conf: 0.9
  if:
    type: text
    substr: '\NetworkProvider'

- id: network-provider-order-value
  desc: Network provider order value
  crit: component
  conf: 0.9
  if:
    type: text
    word: PROVIDERORDER
    case_insensitive: true

- id: network-provider-dll-value
  desc: NetworkProvider DLL path value
  crit: component
  conf: 0.9
  if:
    type: text
    word: ProviderPath
    case_insensitive: true

- id: screensaver-registry--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)\\Control Panel\\Desktop.{0,120}SCRNSAVE\.EXE'

  count_max: 1031274
- id: screensaver-registry--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\\SCRNSAVE\.EXE\b'

  count_max: 1031275
- id: screensaver-registry--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\bSCRNSAVE\.EXE\b'

  count_max: 1031276
- id: screensaver-registry--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: ScreenSaveActive
  count_max: 1031277
- id: silentprocessexit-registry--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)\\SilentProcessExit\\'

  count_max: 1031278
- id: silentprocessexit-registry--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\\Image File Execution Options\\[^\\\n]{1,80}\\GlobalFlag\b'

  count_max: 1031279
- id: silentprocessexit-registry--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: MonitorProcess
  count_max: 1031280
composite_rules:
- id: python-user-path-registry-write
  desc: Python writes user PATH registry value
  crit: notable
  conf: 0.96
  for: [python]
  all:
  - id: micro-behaviors/os/registry/keys::user-environment-path-regpath
  - id: micro-behaviors/os/registry/manipulate::winreg-setvalue

- id: network-provider-registry
  desc: NetworkProvider DLL registry persistence
  crit: suspicious
  conf: 0.9
  attack: T1556
  all:
  - id: network-provider-dll-value
  unless:
  - id: well-known/lib/wine/
  - id: well-known/tool/sysadmin/sysinternals/
  - id: metadata/library/win32-bindings::win32more-generated-bindings
  any:
  - id: network-provider-order-path
  - id: network-provider-service-path
  - id: network-provider-order-value

- id: registry-write-to-windows-system-persistence
  desc: Registry write to Windows system persistence
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  unless:
  - id: well-known/app/installer::idman-installer
  - id: well-known/lib/wine/
  any:
  - id: appinit-dlls-registry
  - id: appcertdlls-registry
  - id: lsa-auth-package-registry
  - id: lsa-package-value
  - id: print-monitor-registry
  - id: print-processor-registry
  - id: time-provider-registry
  - id: netsh-helper-registry
  - id: winsock-provider-catalog
  - id: network-provider-registry
  - id: screensaver-registry
  - id: silentprocessexit-registry
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/signed/platform::microsoft-corporation
    - id: metadata/binary/installer/family/
    - id: well-known/tool/browser/

- id: high-risk-dll-registry-persistence
  desc: High-risk DLL registry persistence
  crit: notable
  conf: 0.9
  any:
  - id: appinit-dlls-registry
  - id: appcertdlls-registry
  - id: lsa-auth-package-registry
  - id: print-monitor-registry
  - id: print-processor-registry
  - id: time-provider-registry
  - id: netsh-helper-registry
  - id: winsock-provider-catalog
- id: lsa-package-value
  desc: LSA package value name
  crit: suspicious
  conf: 0.84
  attack: T1547.002
  all:
  - id: lsa-control-path
  - id: lsa-package-value-name
  near_bytes: 128
  downgrade:
    any:
    - id: well-known/tool/sysadmin/sysinternals/
  unless:
  - id: well-known/tool/sysadmin/sysinternals/
  - id: well-known/lib/electron/
- id: appinit-dlls-registry
  desc: AppInit DLLs registry persistence
  crit: suspicious
  conf: 0.9
  attack: T1546.010
  unless:
  - id: metadata/file/profile/identity::generated-attack-map-context
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  any:
  - id: appinit-dlls-registry--rx-1
  - id: appinit-dlls-registry--rx-2
  - id: appinit-dlls-registry--rx-3
  - id: appinit-dlls-registry--rx-4
- id: screensaver-registry
  desc: Screensaver executable persistence
  crit: suspicious
  conf: 0.86
  attack: T1546
  any:
  - id: screensaver-registry--rx-5
  - id: screensaver-registry--rx-6
  - id: screensaver-registry--rx-7
  - id: screensaver-registry--rx-8
- id: silentprocessexit-registry
  desc: SilentProcessExit monitor persistence
  crit: notable
  conf: 0.9
  attack: T1546.012
  any:
  - id: silentprocessexit-registry--rx-9
  - id: silentprocessexit-registry--rx-10
  - id: silentprocessexit-registry--rx-11
