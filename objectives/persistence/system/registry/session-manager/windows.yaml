defaults:
  platforms: [windows]
  for: [pe]
  attack: T1112
traits:
  - id: session-manager-key
    desc: Session Manager registry key path
    crit: component
    conf: 0.92
    if:
      type: text
      exact: System\CurrentControlSet\Control\Session Manager
    unless:
      - id: objectives/evasion/self-delete/cleanup/heartbeat::advanced-inf-setup-regpath
      - id: metadata/signed/platform::microsoft-corporation
  - id: pending-file-rename-ops
    desc: PendingFileRenameOperations value path
    crit: component
    conf: 0.97
    if:
      type: text
      exact: System\CurrentControlSet\Control\Session Manager\PendingFileRenameOperations
    unless:
      - id: objectives/evasion/self-delete/cleanup/heartbeat::advanced-inf-setup-regpath
      - id: metadata/signed/platform::microsoft-corporation
  - id: file-rename-ops
    desc: FileRenameOperations value path
    crit: component
    conf: 0.95
    if:
      type: text
      exact: System\CurrentControlSet\Control\Session Manager\FileRenameOperations
    unless:
      - id: objectives/evasion/self-delete/cleanup/heartbeat::advanced-inf-setup-regpath
      - id: metadata/signed/platform::microsoft-corporation
  - id: bootexecute-registry
    desc: BootExecute registry persistence
    crit: notable
    conf: 0.9
    attack: T1547
    for: [scripts, binaries]
    if:
      type: text
      regex: '(?i)\bBootExecute\b'
composite_rules:
  - id: boot-rename-persistence
    desc: Boot-time file rename persistence
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    any:
      - id: objectives/persistence/system/registry/session-manager::pending-file-rename-ops
      - id: objectives/persistence/system/registry/session-manager::file-rename-ops
      - id: objectives/persistence/system/registry/session-manager::session-manager-key
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/binary/installer/family/
    downgrade:
      any:
        - id: objectives/command-and-control/dropper/execution/installer::inf-install-entrypoint
        - id: objectives/command-and-control/dropper/execution/installer::rundll32-inf-install
        - id: objectives/command-and-control/dropper/execution/installer::do-inf-install
  - id: bootexecute-write-persistence
    desc: BootExecute registry write persistence
    crit: suspicious
    conf: 0.95
    all:
      - id: bootexecute-registry
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    unless:
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/binary/installer/family/
