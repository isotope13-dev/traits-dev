defaults:
  platforms: [windows, unix]
  for: [perl]
  attack: T1547

traits:
  - id: perl-bootexecute-registry-path
    desc: Perl BootExecute registry path
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      substr: 'Session Manager\\BootExecute'

  - id: perl-bootexecute-autocheck
    desc: Perl BootExecute autocheck
    crit: component
    conf: 0.9
    if:
      type: literal
      substr: autocheck auto

  - id: perl-bootexecute-batch-command
    desc: Perl BootExecute batch command
    crit: component
    conf: 0.9
    if:
      type: literal
      regex: 'autocheck auto.{0,120}\.bat'

composite_rules:
  - id: perl-bootexecute-persistence
    desc: Perl BootExecute persistence
    crit: hostile
    conf: 0.98
    all:
      - id: perl-bootexecute-registry-path
      - id: micro-behaviors/os/registry/access::perl-reg-add-reg-sz
      - id: perl-bootexecute-autocheck
      - id: perl-bootexecute-batch-command
