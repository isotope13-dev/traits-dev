defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1112"
composite_rules:
- id: registry-hive-replacement
  desc: Registry hive replacement persistence
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/os/registry/manipulate::registry-hive-swap-apis
  any:
  - id: micro-behaviors/os/registry/access::registry-create-key-api
  - id: micro-behaviors/os/registry/access::registry-open-key-api
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  needs: 2
  unless:
  - id: metadata/lang/compiler/systems::haskell-binary
  downgrade:
    any:
    - id: metadata/binary/metrics/threshold::many-exports-200
    - id: metadata/lang/compiler/managed/
