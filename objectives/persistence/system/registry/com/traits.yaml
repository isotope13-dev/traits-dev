defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
  - id: inprocserver32-word
    desc: InprocServer32 registry word
    crit: component
    if:
      type: text
      word: InprocServer32
  - id: localserver32-word
    desc: LocalServer32 registry word
    crit: component
    if:
      type: text
      word: LocalServer32
  - id: appid-word
    desc: AppID registry word
    crit: component
    if:
      type: text
      word: AppID
  - id: temp-user-binary-path
    desc: Temp user binary path fragment
    crit: component
    if:
      type: text
      regex: '(?i)%TEMP%\\.{0,64}\.(dll|ocx|cpl|exe)\b'
  - id: appdata-user-binary-path
    desc: AppData user binary path fragment
    crit: component
    if:
      type: text
      regex: '(?i)%APPDATA%\\.{0,64}\.(dll|ocx|cpl|exe)\b'
  - id: localappdata-user-binary-path
    desc: LocalAppData user binary path fragment
    crit: component
    if:
      type: text
      regex: '(?i)%LOCALAPPDATA%\\.{0,64}\.(dll|ocx|cpl|exe)\b'
  - id: roaming-user-binary-path
    desc: Roaming AppData binary path fragment
    crit: component
    if:
      type: text
      regex: '(?i)\\AppData\\Roaming\\.{0,64}\.(dll|ocx|cpl|exe)\b'
  - id: local-temp-user-binary-path
    desc: Local temp binary path fragment
    crit: component
    if:
      type: text
      regex: '(?i)\\AppData\\Local\\Temp\\.{0,64}\.(dll|ocx|cpl|exe)\b'
composite_rules:
  - id: com-hijack-user-path
    desc: COM registration in user-writable directory
    all:
      - id: inprocserver32-word
    any:
      - id: temp-user-binary-path
      - id: appdata-user-binary-path
      - id: localappdata-user-binary-path
      - id: roaming-user-binary-path
      - id: local-temp-user-binary-path
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
  - id: outofproc-com-server-registration
    desc: Out-of-proc COM server registration
    crit: notable
    conf: 0.92
    all:
      - id: localserver32-word
    any:
      - id: appid-word
      - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
    needs: 2
