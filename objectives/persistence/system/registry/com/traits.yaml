defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
  - id: inprocserver32-word
    desc: InprocServer32 registry word
    crit: component
    if:
      type: text
      word: InprocServer32
  - id: localserver32-word
    desc: LocalServer32 registry word
    crit: component
    if:
      type: text
      word: LocalServer32
  - id: appid-word
    desc: AppID registry word
    crit: component
    if:
      type: text
      word: AppID
  - id: writable-user-path-fragment
    desc: Writable user path fragment
    crit: component
    if:
      type: text
      regex: '(?i)(%TEMP%|%APPDATA%|%LOCALAPPDATA%|\\AppData\\Local\\Temp)'
  - id: threadingmodel-word
    desc: COM ThreadingModel registry value
    crit: component
    if:
      type: text
      word: ThreadingModel
  - id: threadingmodel-both-word
    desc: COM Both threading model
    crit: component
    if:
      type: text
      word: Both
composite_rules:
  - id: com-hijack-user-path
    desc: COM registration in user-writable directory
    all:
      - id: inprocserver32-word
      - id: writable-user-path-fragment
      - id: threadingmodel-word
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
  - id: outofproc-com-server-registration
    desc: Out-of-proc COM server registration
    crit: notable
    conf: 0.92
    all:
      - id: localserver32-word
    any:
      - id: appid-word
      - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
    needs: 2
  - id: inproc-threadingmodel-registration
    desc: COM in-proc server registration
    crit: notable
    conf: 0.92
    attack: T1546.015
    all:
      - id: inprocserver32-word
      - id: threadingmodel-word
      - id: threadingmodel-both-word
      - id: writable-user-path-fragment
    downgrade:
      any:
        - id: well-known/app::startallback-basename
        - id: well-known/app::darkmagic-basename
