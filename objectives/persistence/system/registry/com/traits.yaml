defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85
traits:
  - id: inprocserver32-word
    desc: InprocServer32 registry word
    crit: component
    if:
      type: string_value
      word: InprocServer32
  - id: writable-user-path-fragment
    desc: Writable user path fragment
    crit: component
    if:
      type: string_value
      regex: '(?i)(%TEMP%|%APPDATA%|%LOCALAPPDATA%|\\AppData\\Local\\Temp)'
composite_rules:
  - id: com-hijack-user-path
    desc: COM registration in user-writable directory
    all:
      - id: inprocserver32-word
      - id: writable-user-path-fragment
