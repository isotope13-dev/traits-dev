# Specialized Windows system-level registry persistence surfaces.
defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1547
traits:
  - id: appinit-dlls-registry
    desc: AppInit DLLs registry persistence
    crit: notable
    conf: 0.9
    attack: T1546.010
    if:
      type: text
      regex: '(?i)Windows(?: NT)?\\CurrentVersion\\Windows.{0,80}AppInit_DLLs|\\AppInit_DLLs\b|\bAppInit_DLLs\b|LoadAppInit_DLLs'

  - id: appcertdlls-registry
    desc: AppCert DLLs registry persistence
    crit: notable
    conf: 0.9
    attack: T1546.009
    if:
      type: text
      regex: '(?i)\\Control\\Session Manager\\AppCertDlls\b|\\AppCertDlls\b'

  - id: lsa-auth-package-registry
    desc: LSA authentication package registry
    crit: notable
    conf: 0.9
    attack: T1547.002
    if:
      type: text
      regex: '(?i)\\Control\\Lsa\\(Authentication Packages|Security Packages|Notification Packages)\b'

  - id: lsa-package-value
    desc: LSA package value name
    crit: notable
    conf: 0.84
    attack: T1547.002
    if:
      type: text
      regex: '(?i)\b(Authentication Packages|Security Packages|Notification Packages)\b'

  - id: print-monitor-registry
    desc: Print monitor registry persistence
    crit: notable
    conf: 0.88
    attack: T1547.010
    if:
      type: text
      regex: '(?i)\\Control\\Print\\Monitors\\|\\Print\\Monitors\\[^\\\n]{1,80}\\Driver\b'

  - id: print-processor-registry
    desc: Print processor registry persistence
    crit: notable
    conf: 0.88
    attack: T1547.012
    if:
      type: text
      regex: '(?i)\\Control\\Print\\Environments\\[^\\\n]{1,160}\\Print Processors\\'

  - id: time-provider-registry
    desc: Windows Time Provider persistence
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)\\Services\\W32Time\\TimeProviders\\|\\TimeProviders\\[^\\\n]{1,80}\\DllName\b'

  - id: netsh-helper-registry
    desc: Netsh helper DLL persistence
    crit: notable
    conf: 0.88
    attack: T1546
    if:
      type: text
      regex: '(?i)\\Microsoft\\NetSh\\|netsh\s+add\s+helper\b'

  - id: winsock-provider-catalog
    desc: Winsock provider catalog persistence
    crit: notable
    conf: 0.86
    attack: T1546
    if:
      type: text
      regex: '(?i)\\WinSock2\\Parameters\\(Protocol_Catalog9|Namespace_Catalog5)\b'

  - id: screensaver-registry
    desc: Screensaver executable persistence
    crit: notable
    conf: 0.86
    attack: T1546
    if:
      type: text
      regex: '(?i)\\Control Panel\\Desktop.{0,120}SCRNSAVE\.EXE|\\SCRNSAVE\.EXE\b|\bSCRNSAVE\.EXE\b|ScreenSaveActive'

  - id: silentprocessexit-registry
    desc: SilentProcessExit monitor persistence
    crit: notable
    conf: 0.9
    attack: T1546.012
    if:
      type: text
      regex: '(?i)\\SilentProcessExit\\|\\Image File Execution Options\\[^\\\n]{1,80}\\GlobalFlag\b|MonitorProcess'

composite_rules:
  - id: registry-write-to-windows-system-persistence
    desc: Registry write to Windows system persistence
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    unless:
      - id: well-known/app/installer::idman-installer
      - id: well-known/lib/wine::wine-runtime-component
    any:
      - id: appinit-dlls-registry
      - id: appcertdlls-registry
      - id: lsa-auth-package-registry
      - id: lsa-package-value
      - id: print-monitor-registry
      - id: print-processor-registry
      - id: time-provider-registry
      - id: netsh-helper-registry
      - id: winsock-provider-catalog
      - id: screensaver-registry
      - id: silentprocessexit-registry
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/binary/installer::known-benign-installer
        - id: well-known/tool/browser::idm-browser-integration

  - id: high-risk-dll-registry-persistence
    desc: High-risk DLL registry persistence
    crit: suspicious
    conf: 0.9
    any:
      - id: appinit-dlls-registry
      - id: appcertdlls-registry
      - id: lsa-auth-package-registry
      - id: print-monitor-registry
      - id: print-processor-registry
      - id: time-provider-registry
      - id: netsh-helper-registry
      - id: winsock-provider-catalog
