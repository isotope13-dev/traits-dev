defaults:
  platforms: [netscaler, appliance, unix]
  for: [ruby]
  attack: T1543.002

traits:
  - id: ruby-netscaler-agent-service
    desc: netscaler-agent.service masquerade unit
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: netscaler-agent.service

  - id: ruby-systemd-service-write
    desc: Writes systemd unit to /etc/systemd
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/systemd/system/netscaler-agent.service

  - id: ruby-systemctl-enable-start
    desc: Enables and starts systemd service
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'systemctl enable[\s\S]{0,160}systemctl start'
    unless:
      - type: text
        substr: VagrantPlugins
      - id: metadata/file/string/artifact::vagrant-machine-communicate-marker
      - id: metadata/package/testing/presence/harness::ruby-spec-file
      - id: well-known/lib/specinfra/
      - id: well-known/tool/offensive/pwn/

composite_rules:
  - id: ruby-netscaler-systemd-persistence
    desc: NetScaler systemd service persistence
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-netscaler-agent-service
      - id: ruby-systemd-service-write
    any:
      - id: ruby-systemctl-enable-start
