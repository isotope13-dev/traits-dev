defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: pm2-keyword
    desc: PM2 process manager keyword
    crit: suspicious
    conf: 0.6
    if:
      type: string_literal
      exact: pm2
  - id: detached-option
    desc: Detached process option
    crit: suspicious
    conf: 0.6
    if:
      type: string_literal
      substr: 'detached:'
  - id: pm2-spawn
    desc: Spawns PM2 process manager
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: spawn\(.{0,220}pm2
  - id: pm2-start
    desc: Starts process via PM2
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: pm2\s+start|exec\(.{0,220}pm2\s+start
  - id: forever-spawn
    desc: Uses forever process manager
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: forever\s+start|spawn\(.{0,220}forever
  - id: nodemon-spawn
    desc: Uses nodemon process manager
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: spawn\(.{0,220}nodemon
composite_rules:
  - id: pm2-detached
    desc: PM2 spawned in detached mode
    crit: suspicious
    conf: 0.9
    all:
      - id: pm2-keyword
      - id: micro-behaviors/process/create/shell/bridge::spawn-call
      - id: detached-option
