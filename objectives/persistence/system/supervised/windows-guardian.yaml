defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: guardian-mutex-name
    desc: Global Guardian mutex name
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: Global\\Guardian[A-Za-z]*Mutex
  - id: main-program-mutex-name
    desc: Global MainProgram mutex name
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: Global\\MainProgram[A-Za-z]*Mutex
  - id: run-guardian-mode
    desc: RunGuardianMode log marker
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: RunGuardianMode
  - id: monitor-guardian-marker
    desc: MonitorGuardian log marker
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: MonitorGuardian
composite_rules:
  - id: guardian-watchdog-self-protection
    desc: Guardian watchdog self-protection mechanism
    crit: hostile
    conf: 0.95
    attack: T1543
    all:
      - id: micro-behaviors/process/info/commandline::guard-flag-pair
      - id: micro-behaviors/process/sync/mutex::create-mutex
    any:
      - id: guardian-mutex-name
      - id: main-program-mutex-name
      - id: run-guardian-mode
      - id: monitor-guardian-marker
    needs: 2
