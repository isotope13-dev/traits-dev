defaults:
  platforms: [unix]
  for: [zig, elf]
  attack: T1543.002

traits:
  - id: zig-systemd-health-service
    desc: Zig writes health systemd unit
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ExecStart=/tmp/.cache/agent

  - id: zig-systemctl-enable-unit
    desc: Zig enables systemd unit
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'systemctl", "enable"[\s\S]{0,120}health-monitor\.service'

  - id: zig-cron-system-health
    desc: Zig writes system cron agent
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/tmp/\.cache/agent[\s\S]{0,260}/etc/cron\.d/system-health'

  - id: zig-hidden-systemd-unit-paths
    desc: Zig hidden systemd unit paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/systemd/system/\.[A-Za-z0-9._-]+\.service'

  - id: zig-hidden-systemd-timer-path
    desc: Zig hidden systemd timer path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/systemd/system/\.[A-Za-z0-9._-]+\.timer'

  - id: zig-systemctl-enable-timer
    desc: Zig enables systemd timer
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '"systemctl"[\s\S]{0,80}"enable"[\s\S]{0,120}\.timer'

  - id: zig-profiled-hidden-launcher
    desc: Zig profile.d hidden launcher
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/etc/profile\.d/\.[A-Za-z0-9._-]+\.sh'

composite_rules:
  - id: zig-systemd-cron-persistence
    desc: Zig systemd cron persistence
    crit: hostile
    conf: 0.98
    any:
      - id: zig-systemd-health-service
      - id: zig-systemctl-enable-unit
      - id: zig-cron-system-health
    needs: 2

  - id: zig-hidden-systemd-timer-persistence
    desc: Zig hidden systemd timer persistence
    crit: hostile
    conf: 0.98
    all:
      - id: zig-hidden-systemd-unit-paths
      - id: zig-hidden-systemd-timer-path
      - id: zig-systemctl-enable-timer

  - id: zig-profiled-hidden-persistence
    desc: Zig profile.d hidden persistence
    crit: hostile
    conf: 0.98
    all:
      - id: zig-profiled-hidden-launcher
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
