defaults:
  platforms: [unix]
  for: [zig, elf]
  attack: T1543.002

traits:
  - id: zig-systemd-health-service
    desc: Zig writes health systemd unit
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ExecStart=/tmp/.cache/agent

  - id: zig-systemctl-enable-unit
    desc: Zig enables systemd unit
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'systemctl", "enable"[\s\S]{0,120}health-monitor\.service'

  - id: zig-cron-system-health
    desc: Zig writes system cron agent
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/tmp/\.cache/agent[\s\S]{0,260}/etc/cron\.d/system-health'

composite_rules:
  - id: zig-systemd-cron-persistence
    desc: Zig systemd cron persistence
    crit: hostile
    conf: 0.98
    any:
      - id: zig-systemd-health-service
      - id: zig-systemctl-enable-unit
      - id: zig-cron-system-health
    needs: 2
