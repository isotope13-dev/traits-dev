defaults:
  platforms: [unix]
  for: [shell]
  attack: T1053.003

traits:
  - id: shell-hidden-task-scheduler
    desc: Shell hidden task scheduler
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.cache_sync/tasks/*.sh

  - id: shell-nohup-hidden-scheduler
    desc: Shell nohup hidden scheduler
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'nohup "\$STAGING_DIR/scheduler\.sh"[\s\S]{0,120}/dev/null'

composite_rules:
  - id: shell-hidden-task-persistence
    desc: Shell hidden task persistence
    crit: hostile
    conf: 0.98
    all:
      - id: shell-hidden-task-scheduler
      - id: shell-nohup-hidden-scheduler
