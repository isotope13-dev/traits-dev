defaults:
  platforms: [unix]
  for: [shell]
  attack: T1053.003

traits:
  - id: shell-hidden-task-scheduler
    desc: Shell hidden task scheduler
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.cache_sync/tasks/*.sh

  - id: shell-nohup-hidden-scheduler
    desc: Shell nohup hidden scheduler
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'nohup "\$STAGING_DIR/scheduler\.sh"[\s\S]{0,120}/dev/null'

composite_rules:
  - id: shell-ps-comm-local-relauncher
    desc: Shell process-name relauncher
    crit: suspicious
    conf: 0.93
    attack: T1543
    all:
      - id: micro-behaviors/process/enumerate/shell::ps-stat-comm-listing
      - id: micro-behaviors/process/enumerate/shell::awk-comm-name-filter
      - id: micro-behaviors/process/create/local-exec::local-execution
    near_bytes: 360

  - id: shell-zombie-local-relauncher
    desc: Shell zombie-state relauncher
    crit: suspicious
    conf: 0.93
    attack: T1543
    all:
      - id: micro-behaviors/process/enumerate/shell::awk-zombie-state-filter
      - id: micro-behaviors/process/create/local-exec::local-execution
    near_bytes: 260

  - id: shell-hidden-task-persistence
    desc: Shell hidden task persistence
    crit: hostile
    conf: 0.98
    all:
      - id: shell-hidden-task-scheduler
      - id: shell-nohup-hidden-scheduler
