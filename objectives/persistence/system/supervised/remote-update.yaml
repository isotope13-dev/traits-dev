defaults:
  platforms: [unix, windows]
  for: [javascript]
  attack: T1105,T1543

traits:
  - id: remote-agent-upgrade-message
    desc: Server message dispatches agent upgrade
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'case\s+["'']upgrade_agent["'']\s*:[\s\S]{0,100}handleUpgradeAgent\s*\('

  - id: npm-agent-upgrade-command
    desc: Upgrade script reinstalls npm package
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '\$NPM["'']?\s+install\s+(-g\s+)?["'']?\$PKG'

composite_rules:
  - id: remote-agent-upgrade-persistence
    desc: Server-triggered detached agent update persistence
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: remote-agent-upgrade-message
      - id: npm-agent-upgrade-command
      - id: micro-behaviors/process/create/spawn::spawn-bash
    any:
      - id: micro-behaviors/os/service/control::javascript-systemctl-user-service-command
      - id: micro-behaviors/os/service/control::javascript-launchctl-service-command
