defaults:
  platforms: [unix, windows]
  for: [javascript]
  attack: T1105,T1543

traits:
  - id: remote-agent-upgrade-message
    desc: Server message dispatches agent upgrade
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'case\s+["'']upgrade_agent["'']\s*:[\s\S]{0,100}handleUpgradeAgent\s*\('

  - id: npm-agent-upgrade-command
    desc: Upgrade script reinstalls npm package
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '\$NPM["'']?\s+install\s+(-g\s+)?["'']?\$PKG'

  - id: systemd-upgrade-service-restart
    desc: Upgrade script restarts systemd service
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'systemctl\s+--user\s+(stop|restart|start)'

  - id: launchd-upgrade-service-restart
    desc: Upgrade script restarts launchd service
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'launchctl\s+(unload|load)'

composite_rules:
  - id: remote-agent-upgrade-persistence
    desc: Server-triggered detached agent update persistence
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: remote-agent-upgrade-message
      - id: npm-agent-upgrade-command
      - id: micro-behaviors/process/create/spawn::spawn-bash
    any:
      - id: systemd-upgrade-service-restart
      - id: launchd-upgrade-service-restart
