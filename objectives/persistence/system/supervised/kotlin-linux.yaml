defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1543.002

traits:
  - id: kotlin-firmware-health-service
    desc: Kotlin firmware service unit
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/systemd/system/firmware-health.service

  - id: kotlin-sysinit-service-enable
    desc: Kotlin sysinit service enable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'WantedBy=sysinit\.target[\s\S]{0,260}firmware-health\.service'

  - id: kotlin-firmware-loader-path
    desc: Kotlin firmware loader path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/lib/systemd/system-preset/.firmware-loader

composite_rules:
  - id: kotlin-firmware-systemd-persistence
    desc: Kotlin firmware service persistence
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-firmware-health-service
      - id: kotlin-sysinit-service-enable
    any:
      - id: kotlin-firmware-loader-path
