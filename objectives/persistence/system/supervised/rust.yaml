defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1543
traits:
  - id: rust-agent-argument
    desc: Rust hidden agent argument
    crit: component
    conf: 0.9
    if:
      type: text
      substr: --agent
  - id: rust-windows-hkcu-run-key
    desc: Rust HKCU Run key persistence
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'HKCU\Software\Microsoft\Windows\CurrentVersion\Run'
  - id: rust-winreg-hkcu-run-key
    desc: Rust winreg HKCU Run key persistence
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'HKEY_CURRENT_USER[\s\S]{0,360}Software\\Microsoft\\Windows\\CurrentVersion\\Run'
  - id: rust-schtasks-onlogon
    desc: Rust creates login scheduled task
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'Command::new\("schtasks"\)[\s\S]{0,900}"/create"[\s\S]{0,240}"/sc"[\s\S]{0,80}"onlogon"'
  - id: rust-systemd-user-enable
    desc: Rust systemd user enable
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'systemctl").args(["--user", "enable"'
  - id: rust-launchagents-runatload
    desc: Rust LaunchAgent RunAtLoad plist
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '<key>RunAtLoad</key><true/>'
composite_rules:
  - id: rust-cross-platform-agent-autostart
    desc: Rust cross-platform agent autostart
    crit: suspicious
    conf: 0.98
    all:
      - id: rust-agent-argument
    any:
      - id: rust-windows-hkcu-run-key
      - id: rust-winreg-hkcu-run-key
      - id: rust-schtasks-onlogon
      - id: rust-systemd-user-enable
      - id: rust-launchagents-runatload
