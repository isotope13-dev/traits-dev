defaults:
  platforms: [unix]
  for: [c, elf]
  attack: T1543.002

traits:
  - id: c-system-health-service-unit
    desc: C system health service unit
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/systemd/system/system-health-monitor.service

  - id: c-systemctl-health-enable
    desc: C enables health service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: systemctl enable system-health-monitor.service

  - id: c-service-restart-always
    desc: C service restart always
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ExecStart=%s[\s\S]{0,180}Restart=always'

composite_rules:
  - id: c-linux-systemd-persistence
    desc: C Linux systemd persistence
    crit: hostile
    conf: 0.98
    all:
      - id: c-system-health-service-unit
    any:
      - id: c-systemctl-health-enable
      - id: c-service-restart-always
