defaults:
  platforms: [unix]
  for: [php]
  attack: T1543.002

traits:
  - id: php-systemd-health-service
    desc: PHP systemd health service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'sysmon-health-check\.service[\s\S]{0,520}systemctl enable'

  - id: php-cron-self-persistence
    desc: PHP cron self persistence
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'crontab -l[\s\S]{0,520}(__FILE__|\$script_path)'

  - id: php-rc-local-self-persistence
    desc: PHP rc.local persistence
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/etc/rc\.local[\s\S]{0,260}/usr/bin/php'

composite_rules:
  - id: php-multi-system-persistence
    desc: PHP multi-system persistence
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: php-systemd-health-service
      - id: php-cron-self-persistence
      - id: php-rc-local-self-persistence
