defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1547.001,T1053.005

traits:
  - id: persistence-watchdog-restoration-log
    desc: Watchdog restores startup persistence
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '^watchdog: (primary|startup folder|runkey|task) restored$'

  - id: defender-exclusion-registry-log
    desc: Defender exclusion registry log
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: 'persist: defender exclusion set via registry'

  - id: wmi-subscription-persistence-log
    desc: WMI subscription persistence log
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: 'persist: WMI subscription created'

composite_rules:
  - id: rat-multi-surface-logon-persistence
    desc: RAT restores registry and scheduled-task logon persistence
    crit: hostile
    conf: 0.995
    attack: T1547.001,T1053.005,T1112
    all:
      - id: persistence-watchdog-restoration-log
      - id: defender-exclusion-registry-log
      - id: objectives/persistence/login/registry/autostart::currentversion-run-key-path
      - id: objectives/persistence/login/scheduled-task/cli::schtasks-create-task-name
      - id: objectives/persistence/login/scheduled-task/cli::schtasks-onlogon-trigger
      - id: micro-behaviors/os/registry/access::registry-set-value-api
  - id: rat-redundant-persistence-watchdog
    desc: Hidden RAT watchdog restores multiple login persistence mechanisms
    crit: hostile
    conf: 0.99
    attack: T1547.001,T1053.005,T1546.003
    all:
      - id: objectives/command-and-control/backdoor/rat/control::hidden-copy-c2-loop-log
      - id: persistence-watchdog-restoration-log
      - id: objectives/persistence/login/startup/registry::logon-script-registry-write
      - id: objectives/persistence/login/scheduled-task/masquerade::schtask-persistence
      - id: objectives/evasion/masquerade/identity/fabricated::unsigned-security-health-manifest-masquerade
    any:
      - id: defender-exclusion-registry-log
      - id: wmi-subscription-persistence-log
    unless:
      - id: metadata/signed/platform/
