defaults:
  platforms: [unix, appliance]
  for: [java, kotlin, class, java_class, jar]
  attack: T1037

traits:
  - id: jvm-pam-permit-login
    desc: JVM PAM permit login
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/pam\.d/login[\s\S]{0,220}pam_permit\.so'

  - id: jvm-pam-permit-bytecode
    desc: JVM PAM permit bytecode
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 70 61 6D 5F 70 65 72 6D 69 74 2E 73 6F

  - id: jvm-rhosts-trust-login
    desc: JVM rhosts trust login
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: /root/.rhosts

  - id: jvm-rhosts-bytecode
    desc: JVM rhosts bytecode
    crit: suspicious
    conf: 0.91
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 72 6F 6F 74 2F 2E 72 68 6F 73 74 73

  - id: jvm-devtcp-cron-shell
    desc: JVM devtcp cron shell
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/etc/crontab[\s\S]{0,260}/dev/tcp'

  - id: jvm-devtcp-bytecode
    desc: JVM devtcp bytecode
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 64 65 76 2F 74 63 70

  - id: jvm-profile-backdoor-script
    desc: JVM profile backdoor script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/profile.d/backdoor.sh

  - id: jvm-profile-backdoor-bytecode
    desc: JVM profile backdoor bytecode
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 65 74 63 2F 70 72 6F 66 69 6C 65 2E 64 2F 62 61 63 6B 64 6F 6F 72 2E 73 68

composite_rules:
  - id: jvm-pam-rhosts-cron-backdoor
    desc: JVM PAM rhosts cron backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-pam-permit-login
      - id: jvm-rhosts-trust-login
    any:
      - id: jvm-devtcp-cron-shell
      - id: jvm-profile-backdoor-script

  - id: jvm-devtcp-profile-backdoor
    desc: JVM devtcp profile backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-devtcp-cron-shell
      - id: jvm-profile-backdoor-script

  - id: jvm-bytecode-login-backdoor
    desc: JVM bytecode login backdoor
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-pam-permit-bytecode
      - id: jvm-rhosts-bytecode
    any:
      - id: jvm-devtcp-bytecode
      - id: jvm-profile-backdoor-bytecode
