defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1547.001

composite_rules:
  - id: csharp-schtasks-onlogon-highest
    desc: C# elevated logon scheduled task
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/persistence/login/scheduled-task/cli::schtasks-exe-token
      - id: objectives/persistence/login/scheduled-task/cli::schtasks-onlogon-trigger
      - id: micro-behaviors/os/autorun/scheduled::schtasks-runlevel-highest

  - id: csharp-run-key-and-schtask-persistence
    desc: C# Run key and schtask persistence
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/persistence/login/registry/run-key::csharp-run-key-persistence
      - id: csharp-schtasks-onlogon-highest
