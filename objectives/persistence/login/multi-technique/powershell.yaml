defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1547.001

traits:
  - id: ps-run-key-powershell-hidden
    desc: PowerShell hidden Run key
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CurrentVersion\\Run[\s\S]{0,520}powershell\.exe -ep bypass -w hidden'

  - id: ps-startup-shortcut-hidden
    desc: PowerShell hidden startup shortcut
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'CreateShortcut[\s\S]{0,420}powershell\.exe[\s\S]{0,220}-ep bypass -w hidden'

  - id: ps-wmi-event-consumer-hidden
    desc: PowerShell hidden WMI consumer
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CommandLineEventConsumer[\s\S]{0,520}powershell\.exe -ep bypass -w hidden'

  - id: ps-removal-protection-task
    desc: PowerShell removal protection task
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'SystemIntegrityCheck[\s\S]{0,260}Register-ScheduledTask'

composite_rules:
  - id: ps-multi-surface-persistence
    desc: PowerShell multi-surface persistence
    crit: hostile
    conf: 0.98
    all:
      - id: ps-run-key-powershell-hidden
      - id: ps-startup-shortcut-hidden
    any:
      - id: ps-wmi-event-consumer-hidden
      - id: ps-removal-protection-task
      - id: micro-behaviors/os/autorun/scheduled::new-scheduledtaskaction

  - id: ps-wmi-event-persistence
    desc: PowerShell WMI event persistence
    crit: hostile
    conf: 0.98
    all:
      - id: ps-wmi-event-consumer-hidden
      - id: micro-behaviors/os/autorun/scheduled::new-scheduledtaskaction
