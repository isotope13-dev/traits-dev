defaults:
  platforms: [windows]
  for: [batch, powershell, csharp, pe]
  attack: T1547.001

composite_rules:
  - id: multi-location-windows-startup
    desc: Multiple Windows startup persistence mechanisms
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/persistence/login/scheduled-task/legacy::network-event-appdata-task
    any:
      - id: objectives/persistence/login/startup/registry::software-run-key
      - id: objectives/persistence/login/startup/registry::start-menu-startup
      - id: objectives/persistence/login/startup/shortcut::create-shortcut
    needs: 2

  - id: elevated-logon-embedded-proxy-installer
    desc: Elevated logon task launches hidden embedded proxy
    crit: hostile
    conf: 0.98
    attack: T1053.005,T1027.009,T1564.003
    all:
      - id: objectives/persistence/login/scheduled-task/cli::schtasks-onlogon-highest-flags
      - id: micro-behaviors/process/create/hidden::dotnet-create-no-window
      - id: micro-behaviors/process/create/spawn::dotnet-redirected-stdio
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-getmanifestresourcestream
      - id: metadata/binary/resource::clr-resource-large
      - id: micro-behaviors/communications/proxy/reverse::reverse-proxy
