defaults:
  platforms:
    - unix
    - android
    - ios
traits:
  - id: useradd-command-base
    desc: useradd/adduser base command
    crit: suspicious
    conf: 0.75
    for:
      - elf
      - shell
    if:
      type: text
      regex: '(^|[\n;&|`$({])\s*(/usr/sbin/)?(useradd|adduser)[ \t]+(-|[A-Za-z0-9_./])'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    attack: T1136.001
  - id: useradd-command-flags
    desc: useradd/adduser with creation flags
    crit: notable
    conf: 0.75
    for:
      - elf
      - shell
    if:
      type: text
      regex: (useradd -m|adduser --disabled-password)
    attack: T1136.001
  - id: user-shell-shell
    desc: User creation shell flag
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - shell
    if:
      type: text
      regex: (useradd|adduser).{0,80}(-s /bin/shell|--shell /bin/shell|-s /bin/sh)
    attack: T1136.001
  - id: user-creation-ok
    desc: User creation success indicator
    crit: suspicious
    conf: 0.7
    for:
      - elf
      - shell
    if:
      type: text
      substr: useradd OK
  - id: usermod-wheel
    desc: usermod add to wheel group
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    if:
      type: text
      regex: (usermod -aG wheel|usermod -G wheel|usermod\s+.{0,80}wheel)
    unless:
      - id: metadata/build/docker::dockerfile-basename
    attack: T1548.004
  - id: usermod-sudo
    desc: usermod add to sudo group
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    if:
      type: text
      regex: (usermod -aG sudo|usermod -G sudo|usermod\s+.{0,80}sudo)
    unless:
      # TensorFlow-style CI Docker wrapper creates a matching in-container user.
      - id: metadata/build/ci::tensorflow-user-wrapper
    attack: T1548.004
  - id: chpasswd-command
    desc: chpasswd password change command
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - shell
    if:
      type: text
      regex: "(^|[\\n;&|`$({])\\s*((/usr/sbin/)?chpasswd\\b|echo '%s:%s' \\| chpasswd)"
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    attack: T1136.001
  - id: dscl-create-user
    desc: macOS dscl user creation
    crit: suspicious
    conf: 0.85
    for:
      - shell
      - macho
    platforms:
      - macos
    if:
      type: text
      regex: dscl\s+\.\s+-create\s+/Users/[A-Za-z0-9._-]+
    attack: T1136.001
  - id: dscl-user-shell
    desc: macOS dscl login shell set
    crit: suspicious
    conf: 0.85
    for:
      - shell
      - macho
    platforms:
      - macos
    if:
      type: text
      regex: dscl\s+\.\s+-create\s+/Users/\S+\s+UserShell\s+/bin/(ba)?sh
    attack: T1136.001
  - id: dscl-user-password
    desc: macOS dscl password set
    crit: suspicious
    conf: 0.85
    for:
      - shell
      - macho
    platforms:
      - macos
    if:
      type: text
      regex: dscl\s+\.\s+-passwd\s+/Users/[A-Za-z0-9._-]+\s+\S+
    attack: T1136.001
  - id: dscl-root-uid
    desc: macOS dscl UID 0 assignment
    crit: suspicious
    conf: 0.95
    for:
      - shell
      - macho
    platforms:
      - macos
    if:
      type: text
      regex: dscl\s+\.\s+-create\s+/Users/\S+\s+UniqueID\s+0
    attack: T1548.004
  - id: dscl-root-group
    desc: macOS dscl GID 0 assignment
    crit: suspicious
    conf: 0.95
    for:
      - shell
      - macho
    platforms:
      - macos
    if:
      type: text
      regex: dscl\s+\.\s+-create\s+/Users/\S+\s+PrimaryGroupID\s+0
    attack: T1548.004
  - id: passwd-command
    desc: passwd password change command
    crit: component
    conf: 0.5
    for:
      - elf
      - shell
    if:
      type: string_literal
      word: passwd
  - id: visudo-check
    desc: visudo configuration check
    crit: suspicious
    conf: 0.7
    for:
      - elf
      - shell
    if:
      type: text
      regex: (visudo -c|visudo -q)
    attack: T1548.004
  - id: openssl-passwd
    desc: openssl password hashing
    crit: suspicious
    conf: 0.7
    for:
      - elf
      - shell
    if:
      type: text
      regex: (openssl passwd|openssl passwd -6)
    attack: T1136.001
  - id: skel-profile-setup
    desc: User profile skeleton setup
    crit: suspicious
    conf: 0.75
    for:
      - elf
      - shell
    if:
      type: text
      substr: cp -r /etc/skel
composite_rules:
  - id: useradd-command
    desc: useradd user creation command
    crit: suspicious
    any:
      - id: useradd-command-base
      - id: useradd-command-flags
  - id: account-creation
    desc: User account creation
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - shell
    attack: T1136.001
    needs: 2
    any:
      - id: useradd-command
      - id: user-shell-shell
      - id: chpasswd-command
      - id: openssl-passwd
      - id: dscl-create-user
      - id: dscl-user-shell
      - id: dscl-user-password
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/build/docker::dockerfile-basename
    downgrade:
      any:
        - id: objectives/command-and-control/botnet/iot::busybox
  - id: privilege-escalation-setup
    desc: Privilege escalation configuration
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    attack: T1548.004
    needs: 2
    any:
      - id: usermod-wheel
      - id: usermod-sudo
      - id: micro-behaviors/fs/config/sudo::sudo-nopasswd
      - id: visudo-check
      - id: dscl-root-uid
      - id: dscl-root-group
    unless:
      # TensorFlow-style CI Docker wrapper creates a matching in-container user.
      - id: metadata/build/ci::tensorflow-user-wrapper
      - id: metadata/build/docker::dockerfile-basename
  - id: account-privilege-escalation-combo
    desc: Account creation + privilege escalation
    crit: hostile
    conf: 0.9
    for:
      - elf
      - shell
    attack: T1136.001
    mbc: E1015
    all:
      - id: account-creation
      - id: privilege-escalation-setup
