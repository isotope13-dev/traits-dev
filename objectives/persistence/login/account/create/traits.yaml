defaults:
  platforms:
    - unix
    - android
    - ios
traits:
  - id: user-creation-ok
    desc: User creation success indicator
    crit: suspicious
    conf: 0.7
    for:
      - elf
      - shell
    if:
      type: text
      substr: useradd OK
  - id: usermod-wheel
    desc: usermod adds account to wheel group
    crit: notable
    conf: 0.85
    for:
      - elf
      - shell
    if:
      type: text
      regex: (usermod -aG wheel|usermod -G wheel|usermod\s+.{0,80}wheel)
    unless:
      - id: metadata/build/docker::dockerfile-basename
    attack: T1548.004
  - id: usermod-sudo
    desc: usermod add to sudo group
    crit: notable
    conf: 0.85
    for:
      - elf
      - shell
    if:
      type: text
      regex: (usermod -aG sudo|usermod -G sudo|usermod\s+.{0,80}sudo)
    unless:
      # TensorFlow-style CI Docker wrapper creates a matching in-container user.
      - id: metadata/build/ci::tensorflow-user-wrapper
      - id: metadata/build/docker::dockerfile-basename
    attack: T1548.004
  - id: dscl-create-user
    desc: macOS dscl user creation
    crit: suspicious
    conf: 0.85
    for:
      - shell
      - macho
    platforms:
      - macos
    if:
      type: text
      regex: dscl\s+\.\s+-create\s+/Users/[A-Za-z0-9._-]+
    attack: T1136.001
  - id: dscl-user-shell
    desc: macOS dscl login shell set
    crit: suspicious
    conf: 0.85
    for:
      - shell
      - macho
    platforms:
      - macos
    if:
      type: text
      regex: dscl\s+\.\s+-create\s+/Users/\S+\s+UserShell\s+/bin/(ba)?sh
    unless:
      - id: well-known/app/sudo::source-tree
    attack: T1136.001
  - id: dscl-user-password
    desc: macOS dscl password set
    crit: suspicious
    conf: 0.85
    for:
      - shell
      - macho
    platforms:
      - macos
    if:
      type: text
      regex: dscl\s+\.\s+-passwd\s+/Users/[A-Za-z0-9._-]+\s+\S+
    attack: T1136.001
  - id: dscl-root-uid
    desc: macOS dscl UID 0 assignment
    crit: suspicious
    conf: 0.95
    for:
      - shell
      - macho
    platforms:
      - macos
    if:
      type: text
      regex: dscl\s+\.\s+-create\s+/Users/\S+\s+UniqueID\s+0
    attack: T1548.004
  - id: dscl-root-group
    desc: macOS dscl GID 0 assignment
    crit: suspicious
    conf: 0.95
    for:
      - shell
      - macho
    platforms:
      - macos
    if:
      type: text
      regex: dscl\s+\.\s+-create\s+/Users/\S+\s+PrimaryGroupID\s+0
    attack: T1548.004
  - id: skel-profile-setup
    desc: Copies /etc/skel into user profile
    crit: suspicious
    conf: 0.75
    for:
      - elf
      - shell
    if:
      type: text
      substr: cp -r /etc/skel
composite_rules:
  - id: account-creation
    desc: Creates a local user account
    crit: notable
    conf: 0.8
    for:
      - elf
      - shell
    attack: T1136.001
    needs: 2
    any:
      - id: micro-behaviors/os/user/account::useradd-command
      - id: micro-behaviors/os/user/account::useradd-login-shell
      - id: micro-behaviors/os/user/account::chpasswd-command
      - id: micro-behaviors/crypto/kdf/password::openssl-passwd
      - id: dscl-create-user
      - id: dscl-user-shell
      - id: dscl-user-password
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/build/docker::dockerfile-basename
      - id: metadata/package/quality/recognized-contexts::pvetui-ansible-bootstrap-context
    downgrade:
      any:
        - id: micro-behaviors/fs/path/binary::bin-busybox-path
  - id: privilege-escalation-setup
    desc: Privilege escalation configuration
    crit: notable
    conf: 0.85
    for:
      - elf
      - shell
    attack: T1548.004
    needs: 2
    any:
      - id: usermod-wheel
      - id: usermod-sudo
      - id: micro-behaviors/fs/config/sudo::sudo-nopasswd
      - id: micro-behaviors/fs/config/sudo::visudo-validate
      - id: dscl-root-uid
      - id: dscl-root-group
    unless:
      # TensorFlow-style CI Docker wrapper creates a matching in-container user.
      - id: metadata/build/ci::tensorflow-user-wrapper
      - id: metadata/build/docker::dockerfile-basename
      - id: metadata/package/quality/recognized-contexts::pvetui-ansible-bootstrap-context
  - id: account-privilege-escalation-combo
    desc: Creates an account and grants it elevated privileges
    crit: notable
    conf: 0.9
    for:
      - elf
      - shell
    attack: T1136.001
    mbc: E1015
    all:
      - id: account-creation
      - id: privilege-escalation-setup
    unless:
      - id: metadata/package/quality/recognized-contexts::pvetui-ansible-bootstrap-context
      - id: well-known/app/gns3::gns3-remote-install-context

  - id: root-equivalent-useradd
    desc: Creates UID/GID-zero login account
    crit: hostile
    conf: 0.98
    for: [shell, python, elf]
    attack: T1136.001,T1548.001
    all:
      - id: micro-behaviors/os/user/account::useradd-uid-zero
      - id: micro-behaviors/os/user/account::useradd-gid-zero
      - id: micro-behaviors/os/user/account::useradd-login-shell
