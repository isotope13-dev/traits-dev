defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1136

traits:
  - id: node-passwd-root-user-add
    desc: Node passwd root user add
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: backdoor:x:0:0:Backdoor User

  - id: node-shadow-backdoor-write
    desc: Node shadow backdoor write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: shadow-modified:true

composite_rules:
  - id: node-root-backdoor-account
    desc: Node root backdoor account
    crit: hostile
    conf: 0.98
    all:
      - id: node-passwd-root-user-add
      - id: node-shadow-backdoor-write
