defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: hostile-account-takeover
    desc: Revokes admin rights from users while creating a new backdoor admin account
    crit: hostile
    conf: 0.95
    attack: "T1531"
    all:
      - id: micro-behaviors/os/user/account::new-local-user
      - id: micro-behaviors/os/user/account::add-local-group-member
      - id: micro-behaviors/os/user/account::remove-local-group-member
    unless:
      - id: metadata/package/quality/false-positives-powershell::owasp-crs-powershell-catalog-context
  - id: backdoor-admin-account
    desc: Creates backdoor administrator account via net commands
    crit: hostile
    conf: 0.97
    attack: "T1136.001"
    platforms: [windows]
    all:
      - id: micro-behaviors/os/user/account::net-user-create
      - id: micro-behaviors/os/user/account::net-localgroup-administrators-add
