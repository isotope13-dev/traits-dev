# A weak application administrator created by an npm lifecycle hook provides
# durable login access through the victim application.
defaults:
  platforms: [unix, windows]
  for: [archives, npm, javascript, typescript]
  attack: T1136

traits:
  - id: well-known-bcrypt-of-password
    desc: Known bcrypt hash of password
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      substr: "$2a$10$N9qo8uLOickgx2ZMRZoMye"
  - id: default-admin-login-disclosure
    desc: Discloses default admin email and password
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: 'admin@example\.com\s*/\s*password'

composite_rules:
  - id: install-hook-weak-mongodb-admin-account
    desc: npm hook creates weak MongoDB admin account
    crit: hostile
    conf: 0.99
    for: [archives, npm]
    scope: archive
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: micro-behaviors/data/db/mongodb::mongodb-admin-seed-function
      - id: micro-behaviors/data/db/mongodb::mongodb-client-connect
      - id: well-known-bcrypt-of-password
    any:
      - id: micro-behaviors/data/db/mongodb::mongodb-update-write
      - id: micro-behaviors/data/db/mongodb::mongodb-insert-write
      - id: micro-behaviors/data/db/mongodb::mongodb-replace-write
