# An npm install hook that seeds an administrator document into an application
# database establishes a durable privileged account on the install host.
defaults:
  platforms: [unix, windows]
  for: [archives, npm, javascript, typescript]
  attack: T1136.001,T1195.002

composite_rules:
  - id: install-hook-mongodb-admin-account-seed
    desc: npm install hook seeds a MongoDB administrator account
    crit: hostile
    conf: 0.98
    for: [archives, npm]
    scope: archive
    all:
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
      - id: micro-behaviors/data/db/mongodb::mongodb-admin-seed-function
      - id: micro-behaviors/data/db/mongodb::mongodb-client-connect
    any:
      - id: objectives/credential-access/theft/keywords::well-known-bcrypt-of-password
      - id: objectives/credential-access/theft/keywords::default-admin-login-disclosure
      - id: micro-behaviors/data/db/mongodb::mongodb-update-write
      - id: micro-behaviors/data/db/mongodb::mongodb-insert-write
      - id: micro-behaviors/data/db/mongodb::mongodb-replace-write
