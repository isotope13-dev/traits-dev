# Rogue WordPress administrator creation from client-side JavaScript.
#
# Injected CDN/skimmer payloads (e.g. the OptinMonster supply-chain attack,
# Sansec 2026) silently mint an attacker-controlled administrator by POSTing
# to the WordPress REST users endpoint with the harvested admin nonce. A
# browser script that hits `/wp-json/wp/v2/users` and assigns the
# `administrator` role is account takeover — legitimate WordPress UIs create
# users server-side through wp-admin forms, never by hardcoding the role next
# to the REST endpoint in a delivered script.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1136.001
  mbc: F0011

traits:
  # Attack-context-specific fragments: the REST user-creation endpoint and an
  # explicit administrator-role assignment carry no benign meaning together in
  # a client-delivered script, so they live here rather than micro-behaviors.
  - id: wp-rest-users-endpoint
    desc: WordPress REST users endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'wp-json/wp/v2/users'

  - id: assign-administrator-role
    desc: Assigns WordPress administrator role
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'roles["''\s:=\[]{1,6}administrator'

composite_rules:
  - id: js-wordpress-rogue-admin-create
    desc: Client JS creates rogue WordPress admin via REST
    crit: hostile
    conf: 0.96
    all:
      - id: wp-rest-users-endpoint
      - id: assign-administrator-role
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
    near_bytes: 1200
