defaults:
  platforms: [netscaler, appliance, unix]
  for: [php]
  attack: T1136

traits:
  - id: php-nsapppasswd-backdoor
    desc: PHP nsapppasswd backdoor
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /nsconfig/nsapppasswd

  - id: php-backdoor-user-constant
    desc: PHP backdoor user constant
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: BACKDOOR_USER

  - id: php-peer-config-persistence
    desc: PHP peer config persistence
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /flash/nsconfig/nspeers.conf

composite_rules:
  - id: php-netscaler-account-backdoor
    desc: PHP NetScaler account backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: php-nsapppasswd-backdoor
      - id: php-backdoor-user-constant
    any:
      - id: php-peer-config-persistence
