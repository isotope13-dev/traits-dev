defaults:
  platforms: [fortios, windows]
  for: [csharp, pe]
  attack: T1136

traits:
  - id: fortios-admin-api-dotnet
    desc: FortiOS admin API in .NET
    crit: suspicious
    conf: 0.9
    for: [csharp]
    if:
      type: text
      substr: /api/v2/cmdb/system/admin

  - id: fortios-admin-api-dotnet-pe
    desc: FortiOS admin API in .NET PE
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: encoded
      substr: /api/v2/cmdb/system/admin

  - id: fortios-super-admin-dotnet
    desc: FortiOS super_admin in .NET
    crit: suspicious
    conf: 0.9
    for: [csharp]
    if:
      type: text
      substr: super_admin

  - id: fortios-super-admin-dotnet-pe
    desc: FortiOS super_admin in .NET PE
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: encoded
      substr: super_admin

  - id: fortios-fortiteksession-dotnet
    desc: FortiOS FORTITEKSESSIONID in .NET
    crit: suspicious
    conf: 0.88
    if:
      type: encoded
      exact: FORTITEKSESSIONID

  - id: fortios-phpsessid-dotnet
    desc: FortiOS PHPSESSID in .NET
    crit: suspicious
    conf: 0.86
    if:
      type: encoded
      exact: PHPSESSID

  - id: fortios-local-persist-dotnet
    desc: FortiOS local persistence in .NET
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      regex: 'fortios-persist|/etc/rc\.local'

composite_rules:
  - id: fortios-dotnet-admin-persistence
    desc: FortiOS .NET admin persistence
    crit: hostile
    conf: 0.98
    needs: 3
    any:
      - id: fortios-admin-api-dotnet
      - id: fortios-admin-api-dotnet-pe
      - id: fortios-super-admin-dotnet
      - id: fortios-super-admin-dotnet-pe
      - id: fortios-fortiteksession-dotnet
      - id: fortios-phpsessid-dotnet
      - id: fortios-local-persist-dotnet
