defaults:
  platforms: [netbsd, unix]
  for: [objc, elf]
  attack: T1136.001

traits:
  - id: objc-useradd-chpasswd-wheel
    desc: ObjC useradd chpasswd wheel
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'useradd -m[\s\S]{0,220}chpasswd'

composite_rules:
  - id: objc-netbsd-backdoor-account
    desc: ObjC NetBSD backdoor account
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/lateral-movement/ssh/backdoor::native-backdoor-user-name
      - id: objc-useradd-chpasswd-wheel
