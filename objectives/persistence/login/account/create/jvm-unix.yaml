defaults:
  platforms: [unix, appliance]
  for: [java, kotlin, class, java_class, jar]
  attack: T1136

traits:
  - id: jvm-root-uid-passwd-entry
    desc: JVM root UID passwd entry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ":x:0:0:"

  - id: jvm-root-uid-passwd-bytecode
    desc: JVM root UID passwd bytes
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 3A 78 3A 30 3A 30 3A

  - id: jvm-passwd-shadow-append
    desc: JVM passwd shadow append
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/etc/passwd[\s\S]{0,260}/etc/shadow'

composite_rules:
  - id: jvm-root-equivalent-account
    desc: JVM root-equivalent account
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-root-uid-passwd-entry
      - id: jvm-passwd-shadow-append

  - id: jvm-root-account-bytecode
    desc: JVM root account bytecode
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-root-uid-passwd-bytecode
      - id: objectives/exfiltration/http/upload::jvm-master-passwd-hex
