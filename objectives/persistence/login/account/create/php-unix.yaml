defaults:
  platforms: [unix]
  for: [php]
  attack: T1136

traits:
  - id: php-uid0-passwd-entry
    desc: PHP UID0 passwd entry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: ':x:\{?\$BACKDOOR_UID\}?:\{?\$BACKDOOR_GID\}?'

  - id: php-shadow-hash-inject
    desc: PHP shadow hash inject
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: shadow_entry

  - id: php-sudoers-nopasswd
    desc: PHP sudoers NOPASSWD
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: NOPASSWD

composite_rules:
  - id: php-unix-backdoor-account
    desc: PHP Unix backdoor account
    crit: hostile
    conf: 0.98
    all:
      - id: php-backdoor-user-constant
      - id: php-shadow-hash-inject
    any:
      - id: php-uid0-passwd-entry
      - id: php-sudoers-nopasswd
