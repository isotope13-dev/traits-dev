defaults:
  platforms: [fortios, unix]
  for: [shell]
  attack: T1136

traits:
  - id: fortios-cli-admin-config
    desc: FortiOS CLI admin config
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: config system admin

  - id: fortios-cli-super-admin
    desc: FortiOS CLI super_admin profile
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: set profile "super_admin"

  - id: fortios-cli-trusthost-all
    desc: FortiOS CLI trusthost all
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: set trusthost "0.0.0.0 0.0.0.0"

composite_rules:
  - id: fortios-cli-admin-backdoor
    desc: FortiOS CLI admin backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: fortios-cli-admin-config
      - id: fortios-cli-super-admin
      - id: fortios-cli-trusthost-all

