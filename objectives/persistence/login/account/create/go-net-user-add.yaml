defaults:
  platforms: [windows]
  for: [go]
traits:
  - id: go-net-user-add
    desc: Uses net user to add an account
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)net\s+user\s+.*?\s+/ADD'
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
