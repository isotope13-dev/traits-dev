defaults:
  platforms: [openwrt]
  for: [python]
  attack: T1136.001

traits:
  - id: python-root-passwd-entry-build
    desc: Python builds root-UID passwd entry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'uid\s*=\s*0.{0,120}/bin/sh|:0:0:[^\n]{0,80}/bin/sh'
  - id: python-passwd-binsh-entry-format
    desc: Python builds passwd entry with shell login
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'passwd_entry\s*=.{0,220}/root:/bin/sh'
  - id: python-shadow-entry-build
    desc: Python builds shadow password entry
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/etc/shadow.{0,200}19000:0:99999|shadow_entry'

composite_rules:
  - id: openwrt-python-root-login-backdoor
    desc: OpenWrt Python root login backdoor user creation
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: python-shadow-entry-build
    any:
      - id: python-root-passwd-entry-build
      - id: python-passwd-binsh-entry-format
      - id: micro-behaviors/fs/path/config/system::openwrt-uci-config-access
      - id: micro-behaviors/fs/path/sensitive/credentials::dropbear-key-path
    needs: 1
