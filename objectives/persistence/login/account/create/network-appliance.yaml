defaults:
  platforms: [appliance]
  for: [javascript, typescript, text, python, pyc, go]
  attack: T1136
  mbc: OB0007

traits:
  - id: routeros-user-add
    desc: RouterOS user creation
    crit: suspicious
    conf: 0.9
    platforms: [routeros]
    if:
      type: text
      regex: '(/user[ /]add|api\.menu\([''"]/user[''"]\)\.add)'
  - id: routeros-full-group
    desc: RouterOS full admin group
    crit: suspicious
    conf: 0.9
    platforms: [routeros]
    if:
      type: text
      regex: 'group\s*[:=]\s*[''"]?full'
  - id: fortios-admin-api
    desc: FortiOS admin API path
    crit: suspicious
    conf: 0.9
    platforms: [fortios]
    if:
      type: text
      substr: /cmdb/system/admin
  - id: fortios-super-admin
    desc: FortiOS super-admin profile
    crit: suspicious
    conf: 0.92
    platforms: [fortios]
    if:
      type: text
      substr: super_admin
  - id: appliance-password-field
    desc: Appliance password field
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: 'password\s*[:=]\s*([''"][^''"]{4,80}[''"]|[A-Z_][A-Z0-9_]{2,})'
  - id: routeros-go-user-add-call
    desc: Go RouterOS user add call
    crit: suspicious
    conf: 0.94
    platforms: [routeros]
    for: [go]
    if:
      type: text
      regex: 'RunSynt\([\s\S]{0,260}resolveCmd\("add"\)'
  - id: routeros-go-full-group-arg
    desc: Go RouterOS full group arg
    crit: suspicious
    conf: 0.94
    platforms: [routeros]
    for: [go]
    if:
      type: text
      regex: 'argEq\(resolveCmd\("group"\),\s*"full"\)'
  - id: routeros-go-password-arg
    desc: Go RouterOS password arg
    crit: suspicious
    conf: 0.94
    platforms: [routeros]
    for: [go]
    if:
      type: text
      regex: 'argRaw\(resolveCmd\("password"\)'

composite_rules:
  - id: routeros-full-admin-account
    desc: RouterOS full admin account creation
    crit: hostile
    conf: 0.98
    platforms: [routeros]
    all:
      - id: routeros-user-add
      - id: routeros-full-group
      - id: appliance-password-field
  - id: fortios-super-admin-account
    desc: FortiOS super-admin account creation
    crit: hostile
    conf: 0.98
    platforms: [fortios]
    all:
      - id: fortios-admin-api
      - id: fortios-super-admin
      - id: appliance-password-field
  - id: routeros-go-full-admin-account
    desc: Go RouterOS full admin account
    crit: hostile
    conf: 0.98
    platforms: [routeros]
    for: [go]
    all:
      - id: routeros-go-user-add-call
      - id: routeros-go-full-group-arg
      - id: routeros-go-password-arg
