defaults:
  platforms: [unix]
  for: [go]
  attack: T1098.004

traits:
  - id: go-generates-ssh-rsa-key
    desc: Go generates ssh-rsa key
    crit: component
    conf: 0.94
    if:
      type: text
      substr: rsa.GenerateKey

  - id: go-writes-ssh-rsa-prefix
    desc: Go writes ssh-rsa key prefix
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'WriteString("ssh-rsa ")'

  - id: go-appends-authorized-keys
    desc: Go appends authorized_keys
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'authorized_keys[\s\S]{0,220}os\.O_APPEND'

composite_rules:
  - id: go-ssh-authorized-key-backdoor
    desc: Go SSH authorized key backdoor
    crit: hostile
    conf: 0.98
    near_bytes: 256
    all:
      - id: go-generates-ssh-rsa-key
      - id: go-writes-ssh-rsa-prefix
      - id: go-appends-authorized-keys
