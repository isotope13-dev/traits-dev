defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1098.004

traits:
  - id: qnx-perl-ssh-key-chmod
    desc: QNX Perl SSH key chmod
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/app/windows-desktop-tools::cmder-vendor-member
    if:
      type: text
      substr: chmod 0600

composite_rules:
  - id: qnx-perl-ssh-authorized-key-backdoor
    desc: QNX Perl SSH key backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/sensitive/credentials::authorized-keys-token
      - id: objectives/persistence/login/ssh/backdoor::ssh-rsa-key
      - id: qnx-perl-ssh-key-chmod
