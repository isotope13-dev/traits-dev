defaults:
  platforms: [netscaler, appliance, unix]
  for: [ruby]
  attack: T1098.004

traits:
  - id: ruby-nitro-sshpubkey-api
    desc: Ruby NITRO SSH pubkey API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: sshpubkey
    unless:
      - id: well-known/app/homebrew::source-tree

  - id: ruby-generated-ns-key
    desc: Ruby generated NS key
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.netscaler_key

  - id: ruby-health-monitor-key
    desc: Ruby health monitor key
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: NetScaler Health Monitor Key

composite_rules:
  - id: ruby-netscaler-ssh-key-backdoor
    desc: Ruby NetScaler SSH key backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-nitro-sshpubkey-api
      - id: ruby-generated-ns-key
    any:
      - id: ruby-health-monitor-key
