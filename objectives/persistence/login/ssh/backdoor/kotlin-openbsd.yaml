defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1098.004

traits:
  - id: kotlin-root-authorized-keys
    desc: Kotlin root SSH path marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /root/.ssh

  - id: kotlin-backdoor-c2-key
    desc: Kotlin embeds C2 backdoor key
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: backdoor@c2

composite_rules:
  - id: kotlin-openbsd-ssh-backdoor-key
    desc: Kotlin OpenBSD SSH backdoor key
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-root-authorized-keys
      - id: kotlin-backdoor-c2-key
