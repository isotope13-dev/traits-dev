defaults:
  platforms: [unix]
  for: [perl]
  attack: T1098.004

traits:
  - id: perl-authorized-keys-backdoor
    desc: Perl authorized_keys backdoor
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: backdoor_persistence_key_material

  - id: perl-cron-backdoor-command
    desc: Perl cron backdoor command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.backdoor.sh

composite_rules:
  - id: perl-ssh-cron-backdoor
    desc: Perl SSH cron backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: perl-authorized-keys-backdoor
      - id: perl-cron-backdoor-command
