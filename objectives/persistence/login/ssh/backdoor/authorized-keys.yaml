defaults:
  crit: suspicious
  attack: T1098.004
  for: [scripts, binaries]
  platforms:
  - unix
  size_max: 104857600
traits:
- id: vagrant-user-marker
  desc: Vagrant user marker
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: Vagrant User
- id: vagrant-insecure-key-marker
  desc: Vagrant insecure public key marker
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: vagrant insecure public key
  unless:
  - id: well-known/app/kiwi::kiwi-vagrant-image-bootstrap
  - id: well-known/app/kiwi::kiwi-appliance-builder-package
- id: authorized-keys-append
  desc: Append to SSH authorized_keys
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: (>>|>).{0,100}authorized_keys
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
  - id: objectives/persistence/login/ssh/backdoor/
  - type: text
    substr: machine.communicate
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: well-known/tool/sysadmin/automatedlab/
  - id: well-known/app/kiwi::kiwi-build-helper-context
  # Qt Creator RemoteLinux deploys the developer's pubkey to a device (ssh-copy-id
  # idiom) — legitimate IDE remote-deployment, not a backdoor.
  - id: well-known/app/qtcreator/
  - id: well-known/app/vscode/
- id: authorized-keys-shell-append
  desc: Shell command appends to SSH authorized_keys
  crit: notable
  conf: 0.94
  for: [shell, javascript, typescript]
  if:
    type: text
    regex: 'echo\s+.{0,240}(>>|>)\s*[^\n]{0,100}authorized_keys\b'
  unless:
  - id: metadata/package/testing/
  - id: well-known/app/vscode/
- id: authorized-keys-echo-append
  desc: Echo to authorized_keys file
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: echo.{0,200}>>.{0,50}authorized_keys
  unless:
  - id: metadata/package/testing/
  - id: well-known/tool/sysadmin/virtualization::lima-virtualization-tool
  - type: basename
    exact: limactl.exe
  - id: objectives/persistence/login/ssh/backdoor/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: well-known/tool/sysadmin/automatedlab/
  - id: well-known/app/vscode/
  - id: well-known/tool/development/runspec-console/
- id: mkdir-ssh
  desc: Creates .ssh directory
  crit: component
  conf: 0.7
  if:
    type: text
    regex: mkdir.{0,30}\.ssh
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: well-known/tool/sysadmin/automatedlab/
  - id: well-known/app/dropbear::source-tree
  - id: well-known/tool/development/runspec-console/
- id: reset-ssh-dir
  desc: Recreates .ssh after deletion
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: rm\s+-rf\s+\.ssh\s*&&\s*mkdir\s+\.ssh
- id: chmod-ssh-dir
  desc: Sets permissions on .ssh directory
  crit: component
  conf: 0.7
  if:
    type: text
    regex: chmod\s+[0-9]+.{0,30}\.ssh
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
  - id: well-known/tool/sysadmin/automatedlab/
  - id: well-known/app/dropbear::source-tree
- id: chmod-ssh-go-eq
  desc: Restricts group other SSH perms
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: chmod\s+-R\s+go=\s+~?/?\.ssh
- id: js-authorized-keys-write
  desc: Node.js writes to SSH authorized_keys
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: (appendFile|writeFile|appendFileSync|writeFileSync)\s*\(.{0,200}authorized_keys
- id: js-authorized-keys-short-variable-append
  desc: Node writes short authorized_keys var
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "(appendFile|writeFile)(Sync)?\\s*\\(\\s*(authKeys|authorizedKeys)\\b"
- id: js-authorized-keys-join-variable
  desc: Node builds authorized_keys path variable
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "\\b(authKeys|authorizedKeys)\\s*=\\s*path\\.join\\("
- id: js-fetch-ssh-key-task
  desc: Node fetches SSH key task
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: '/api/ssh-key([/?#"''`]|$)'
  unless:
  - id: well-known/app/bitwarden::bitwarden-app
  - id: well-known/app/bitwarden::bitwarden-text-marker
- id: js-ufw-open-ssh-port
  desc: Node opens SSH port with ufw
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "ufw\\s+allow\\s+22(/tcp)?"
- id: js-public-key-variable
  desc: JavaScript public key variable
  crit: component
  conf: 0.82
  for: [javascript, typescript]
  if:
    type: text
    substr: fullPublicKey
- id: js-linux-gated-ssh-backdoor
  desc: Linux-gated SSH key install logic
  crit: component
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    substr: os.platform() === 'linux'
- id: js-unix-ssh-home-path
  desc: JavaScript Unix SSH home path marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "(/home|/Users)"
- id: js-windows-drive-enumeration
  desc: Contains Windows drive-letter enumeration string
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: CDEFGHIJKLMNOPQRSTUVWXYZ
- id: js-chmod-ssh-path
  desc: Node chmod targets SSH path
  crit: component
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    regex: "chmodSync\\s*\\([^)]{0,120}(\\.ssh|authorized_keys|ssh)"
- id: js-chmod-ssh-mode
  desc: Node chmod sets SSH mode
  crit: component
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    regex: "chmodSync\\s*\\([^)]{0,220}(448|384|0o700|0o600)"
- id: swift-backdoor-key-comment
  desc: Swift backdoor SSH key comment
  crit: suspicious
  conf: 0.9
  for: [swift]
  if:
    type: text
    substr: backdoor@
- id: swift-authkeys-path
  desc: Swift authorized_keys path
  crit: suspicious
  conf: 0.86
  for: [swift]
  if:
    type: text
    substr: authorized_keys

composite_rules:
# Consolidated benign build/test contexts (test harnesses, pip/setuptools
# packaging fixtures) so the append rules can reference one id instead of four.
- id: authorized-keys-append-recognized-build-test
  desc: Recognized build or test marker
  crit: notable
  conf: 0.9
  any:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/build/pip::python-packaging-tool-tests
  - id: metadata/build/pip::setuptools-package-index
  - id: well-known/tool/development/runspec-console::runspec-console-context
- id: vagrant-base-box-bootstrap
  desc: Vagrant base box SSH bootstrap
  crit: notable
  conf: 0.98
  all:
  - id: vagrant-user-marker
  - id: vagrant-insecure-key-marker
  near_bytes: 4096
- id: js-cross-platform-ssh-homes
  desc: JavaScript references SSH paths across home roots
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
  - id: micro-behaviors/fs/path/sensitive/credentials::js-ssh-homedir-path
  any:
  - id: js-unix-ssh-home-path
  - id: js-windows-drive-enumeration
  near_bytes: 1200
- id: ssh-backdoor-comp
  desc: SSH authorized_keys backdoor injection
  crit: hostile
  conf: 0.95
  mbc: E1098
  near_lines: 10
  all:
  - id: micro-behaviors/crypto/asymmetric/ssh::hardcoded-public-key
  any:
  - id: authorized-keys-append
  - id: authorized-keys-shell-append
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
- id: ssh-trust-store-reset
  desc: SSH trust store reset with key
  crit: hostile
  conf: 0.96
  mbc: E1098
  all:
  - id: reset-ssh-dir
  - id: authorized-keys-append
  - id: micro-behaviors/crypto/asymmetric/ssh::hardcoded-public-key
  any:
  - id: chmod-ssh-go-eq
  - id: chmod-ssh-dir
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
- id: js-ssh-backdoor
  desc: JavaScript SSH key backdoor
  crit: hostile
  conf: 0.97
  all:
  - id: js-authorized-keys-write
  - id: micro-behaviors/crypto/asymmetric/ssh::hardcoded-public-key
- id: js-authorized-key-literal-backdoor
  desc: JavaScript installs embedded SSH key
  crit: hostile
  conf: 0.98
  mbc: E1098
  for: [javascript, typescript]
  all:
  - id: micro-behaviors/fs/path/sensitive/credentials::js-authorized-keys-path-variable
  - id: micro-behaviors/fs/write/file/direct::js-authorized-keys-variable-write
  - id: micro-behaviors/fs/path/sensitive/credentials::js-ssh-homedir-path
  - id: micro-behaviors/crypto/asymmetric/ssh::hardcoded-public-key
  near_bytes: 1400
- id: js-variable-ssh-backdoor
  desc: JavaScript variable SSH key backdoor
  crit: hostile
  conf: 0.96
  mbc: E1098
  for: [javascript, typescript]
  all:
  - id: micro-behaviors/fs/path/sensitive/credentials::js-authorized-keys-path-variable
  - id: micro-behaviors/fs/write/file/direct::js-authorized-keys-variable-write
  - id: micro-behaviors/fs/path/sensitive/credentials::js-ssh-homedir-path
  - id: js-public-key-variable
  any:
  - id: js-linux-gated-ssh-backdoor
  - id: js-ssh-permission-hardening
- id: js-remote-authorized-keys-backdoor
  desc: Node installs remote SSH key into authorized_keys
  crit: hostile
  conf: 0.97
  mbc: E1098
  for: [javascript, typescript]
  all:
  - id: js-fetch-ssh-key-task
  - id: js-authorized-keys-join-variable
  - id: js-authorized-keys-short-variable-append
  any:
  - id: js-ufw-open-ssh-port
  - id: js-ssh-permission-hardening
  unless:
  - id: metadata/package/testing/harness/runtime/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
- id: js-cross-platform-ssh-backdoor
  desc: Cross-platform JavaScript SSH backdoor
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/crypto/asymmetric/ssh::hardcoded-public-key
  - id: js-cross-platform-ssh-homes
  - id: micro-behaviors/fs/path/sensitive/credentials::js-authorized-keys-path-variable
  any:
  - id: js-ssh-permission-hardening
  - id: mkdir-ssh
- id: js-ssh-permission-hardening
  desc: Hardens SSH file permissions in Node
  crit: suspicious
  conf: 0.86
  for: [javascript, typescript]
  all:
  - id: js-chmod-ssh-path
  - id: js-chmod-ssh-mode
- id: swift-ssh-backdoor-key
  desc: Swift SSH backdoor key injection
  crit: hostile
  conf: 0.96
  for: [swift]
  all:
  - id: swift-authkeys-path
  - id: swift-backdoor-key-comment
  - id: micro-behaviors/crypto/asymmetric/ssh::hardcoded-public-key
- id: ssh-key-dir-write
  desc: SSH public key with write to .ssh directory
  crit: hostile
  conf: 0.92
  mbc: E1098
  all:
  - id: authorized-keys-append
  - id: micro-behaviors/crypto/asymmetric/ssh::hardcoded-public-key
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
- id: ssh-persistence-setup
  desc: SSH authorized_keys access setup
  crit: notable
  conf: 0.85
  all:
  - id: authorized-keys-append
  - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
  any:
  - id: mkdir-ssh
  - id: reset-ssh-dir
  - id: chmod-ssh-dir
  - id: chmod-ssh-go-eq
  unless:
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: metadata/file/string/artifact::vagrant-machine-communicate-marker
  - id: well-known/tool/development/runspec-console/
  - id: well-known/tool/sysadmin/automatedlab/
