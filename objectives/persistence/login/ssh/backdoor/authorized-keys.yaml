defaults:
  crit: suspicious
  attack: T1098.004
  for: [scripts, binaries]
  platforms:
  - unix
  size_max: 104857600
traits:
- id: vagrant-user-marker
  desc: Vagrant user marker
  crit: component
  conf: 0.98
  if:
    type: raw
    substr: Vagrant User
- id: vagrant-insecure-key-marker
  desc: Vagrant insecure public key marker
  crit: component
  conf: 0.98
  if:
    type: raw
    substr: vagrant insecure public key
- id: authorized-keys-append
  desc: Append to SSH authorized_keys
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: (>>|>).{0,100}authorized_keys
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: vagrant-base-box-bootstrap
  - id: metadata/package/tooling::ssh-copy-id-utility
  - id: well-known/tool/sysadmin/automatedlab::automatedlab-worker-module
- id: authorized-keys-echo-append
  desc: Echo to authorized_keys file
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: echo.{0,200}>>.{0,50}authorized_keys
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: vagrant-base-box-bootstrap
  - id: metadata/package/tooling::ssh-copy-id-utility
  - id: well-known/tool/sysadmin/automatedlab::automatedlab-worker-module
- id: ssh-rsa-key
  desc: SSH RSA public key
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: ssh-rsa\s+AAAA[A-Za-z0-9+/]{100,}
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: vagrant-base-box-bootstrap
  - type: text
    regex: '(github\.com|gitlab\.com|bitbucket\.org)\s+ssh-rsa\s+AAAA'
  downgrade:
    any:
    - type: text
      regex: 'vagrant insecure public key'
- id: ssh-ed25519-key
  desc: SSH ed25519 public key
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: ssh-ed25519\s+AAAA[A-Za-z0-9+/]{40,}
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: vagrant-base-box-bootstrap
  downgrade:
    any:
    - type: text
      regex: 'vagrant insecure public key'
- id: ssh-ecdsa-key
  desc: SSH ECDSA public key
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: ssh-ecdsa\s+AAAA[A-Za-z0-9+/]{80,}
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
- id: mkdir-ssh
  desc: Creates .ssh directory
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: mkdir.{0,30}\.ssh
  unless:
  - id: vagrant-base-box-bootstrap
  - id: metadata/package/tooling::ssh-copy-id-utility
  - id: well-known/tool/sysadmin/automatedlab::automatedlab-worker-module
- id: reset-ssh-dir
  desc: Recreates .ssh after deletion
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: rm\s+-rf\s+\.ssh\s*&&\s*mkdir\s+\.ssh
- id: chmod-ssh-dir
  desc: Sets permissions on .ssh directory
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: chmod\s+[0-9]+.{0,30}\.ssh
  unless:
  - id: vagrant-base-box-bootstrap
  - id: well-known/tool/sysadmin/automatedlab::automatedlab-worker-module
- id: chown-ssh-path
  desc: Changes ownership on authorized_keys path
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: chown.{0,120}\.ssh/(authorized_keys|authorized_keys2)\b|chown.{0,120}authorized_keys\b
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
- id: chmod-ssh-go-eq
  desc: Restricts group other SSH perms
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: chmod\s+-R\s+go=\s+~?/?\.ssh
- id: home-ssh-path
  desc: Home .ssh authorized_keys path
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: (/home/.{1,50}|/root|~)/\.ssh/(authorized_keys|authorized_keys2)\b
  unless:
  - type: text
    regex: 'authorized_keys type=file uid='
  - id: metadata/package/tooling::ssh-copy-id-utility
  - id: well-known/tool/sysadmin/automatedlab::automatedlab-worker-module
  downgrade:
    any:
    - type: text
      regex: 'vagrant insecure public key'
- id: ssh-dir-write--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (>>|>)\s*.{0,100}\.ssh/
  count_max: 1026819
- id: ssh-dir-write--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (write|append)\s*.{0,100}\.ssh/
  count_max: 1026820
- id: ssh-dir-write--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (open)\s*.{0,100}\.ssh/
  count_max: 1026821
- id: js-authorized-keys-write
  desc: Node.js writes to SSH authorized_keys
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: (appendFile|writeFile|appendFileSync|writeFileSync)\s*\(.{0,200}authorized_keys
- id: js-authorized-keys-path-variable
  desc: Stores authorized_keys path variable
  crit: suspicious
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    regex: "(const|let|var)\\s+\\w+\\s*=.{0,100}authorized_keys"
- id: js-ssh-pubkey
  desc: SSH public key string literal in JavaScript
  crit: suspicious
  conf: 0.8
  for: [javascript, typescript]
  if:
    type: text
    regex: (ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp256)\s+AAAA[A-Za-z0-9+/]{40,}
- id: js-unix-ssh-home-path
  desc: JavaScript Unix SSH home path marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "(/home|/Users)"
- id: js-windows-drive-enumeration
  desc: JavaScript Windows drive enumeration marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: CDEFGHIJ
- id: js-chmod-ssh-path
  desc: Node chmod targets SSH path
  crit: component
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    regex: "chmodSync\\s*\\([^)]{0,120}(\\.ssh|authorized_keys|ssh)"
- id: js-chmod-ssh-mode
  desc: Node chmod sets SSH mode
  crit: component
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    regex: "chmodSync\\s*\\([^)]{0,220}(448|384|0o700|0o600)"

composite_rules:
- id: vagrant-base-box-bootstrap
  desc: Vagrant base box SSH bootstrap
  crit: component
  conf: 0.98
  all:
  - id: vagrant-user-marker
  - id: vagrant-insecure-key-marker
  near_bytes: 4096
- id: js-cross-platform-ssh-homes
  desc: Enumerates cross-platform SSH home paths
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
  any:
  - id: js-unix-ssh-home-path
  - id: js-windows-drive-enumeration
  near_bytes: 1200
- id: ssh-pubkey-injection
  desc: SSH public key injection pattern
  crit: suspicious
  conf: 0.9
  any:
  - id: ssh-rsa-key
  - id: ssh-ed25519-key
  - id: ssh-ecdsa-key
- id: ssh-backdoor-comp
  desc: SSH authorized_keys backdoor injection
  crit: hostile
  conf: 0.95
  mbc: E1098
  near_lines: 10
  all:
  - id: authorized-keys-append
  any:
  - id: ssh-pubkey-injection
  - id: ssh-rsa-key
  - id: ssh-ed25519-key
  - id: ssh-ecdsa-key
  unless:
  - id: vagrant-base-box-bootstrap
  - id: metadata/package/tooling::ssh-copy-id-utility
- id: ssh-trust-store-reset
  desc: SSH trust store reset with key
  crit: hostile
  conf: 0.96
  mbc: E1098
  all:
  - id: reset-ssh-dir
  - id: authorized-keys-append
  - id: ssh-rsa-key
  any:
  - id: chmod-ssh-go-eq
  - id: chmod-ssh-dir
  unless:
  - id: vagrant-base-box-bootstrap
  - id: metadata/package/tooling::ssh-copy-id-utility
- id: js-ssh-backdoor
  desc: JavaScript npm package injects SSH public key into authorized_keys
  crit: hostile
  conf: 0.97
  all:
  - id: js-authorized-keys-write
  - id: js-ssh-pubkey
- id: js-cross-platform-ssh-backdoor
  desc: Cross-platform JavaScript SSH backdoor
  crit: hostile
  conf: 0.98
  all:
  - id: js-ssh-pubkey
  - id: js-cross-platform-ssh-homes
  - id: js-authorized-keys-path-variable
  any:
  - id: js-ssh-permission-hardening
  - id: mkdir-ssh
- id: js-ssh-permission-hardening
  desc: Hardens SSH file permissions in Node
  crit: suspicious
  conf: 0.86
  for: [javascript, typescript]
  all:
  - id: js-chmod-ssh-path
  - id: js-chmod-ssh-mode
- id: ssh-key-dir-write
  desc: SSH public key with write to .ssh directory
  crit: hostile
  conf: 0.92
  mbc: E1098
  all:
  - id: ssh-dir-write
  any:
  - id: ssh-pubkey-injection
  - id: ssh-rsa-key
  - id: ssh-ed25519-key
  - id: ssh-ecdsa-key
  unless:
  - id: vagrant-base-box-bootstrap
- id: ssh-persistence-setup
  desc: SSH persistence infrastructure setup
  crit: suspicious
  conf: 0.85
  all:
  - id: authorized-keys-append
  - id: home-ssh-path
  any:
  - id: mkdir-ssh
  - id: reset-ssh-dir
  - id: chmod-ssh-dir
  - id: chmod-ssh-go-eq
  unless:
  - id: metadata/package/tooling::ssh-copy-id-utility
  - id: well-known/tool/sysadmin/automatedlab::automatedlab-worker-module
- id: ssh-dir-write
  desc: Write operation targeting .ssh directory
  crit: suspicious
  conf: 0.75
  any:
  - id: ssh-dir-write--rx-1
  - id: ssh-dir-write--rx-2
  - id: ssh-dir-write--rx-3
  unless:
  - id: vagrant-base-box-bootstrap
  - id: metadata/package/tooling::ssh-copy-id-utility
  - id: well-known/tool/sysadmin/automatedlab::automatedlab-worker-module
