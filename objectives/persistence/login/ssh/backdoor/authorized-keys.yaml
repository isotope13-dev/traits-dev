defaults:
  crit: suspicious
  attack: T1098.004
  for: [scripts, binaries]
  platforms:
    - unix
  size_max: 104857600
traits:
  - id: vagrant-base-box-bootstrap
    desc: Vagrant base box SSH bootstrap
    crit: component
    conf: 0.98
    if:
      type: raw
      regex: 'Vagrant User[\s\S]{0,4096}vagrant insecure public key'
  - id: authorized-keys-append
    desc: Append to SSH authorized_keys
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (>>|>).{0,100}authorized_keys
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: vagrant-base-box-bootstrap
  - id: authorized-keys-echo-append
    desc: Echo to authorized_keys file
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: echo.{0,200}>>.{0,50}authorized_keys
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: vagrant-base-box-bootstrap
  - id: ssh-rsa-key
    desc: SSH RSA public key
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: ssh-rsa\s+AAAA[A-Za-z0-9+/]{100,}
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: vagrant-base-box-bootstrap
    downgrade:
      any:
        - type: text
          regex: 'vagrant insecure public key'
  - id: ssh-ed25519-key
    desc: SSH ed25519 public key
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: ssh-ed25519\s+AAAA[A-Za-z0-9+/]{40,}
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: vagrant-base-box-bootstrap
    downgrade:
      any:
        - type: text
          regex: 'vagrant insecure public key'
  - id: ssh-ecdsa-key
    desc: SSH ECDSA public key
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: ssh-ecdsa\s+AAAA[A-Za-z0-9+/]{80,}
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: mkdir-ssh
    desc: Creates .ssh directory
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: mkdir.{0,30}\.ssh
    unless:
      - id: vagrant-base-box-bootstrap
  - id: reset-ssh-dir
    desc: Recreates .ssh after deletion
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: rm\s+-rf\s+\.ssh\s*&&\s*mkdir\s+\.ssh
  - id: chmod-ssh-dir
    desc: Sets permissions on .ssh directory
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: chmod\s+[0-9]+.{0,30}\.ssh
    unless:
      - id: vagrant-base-box-bootstrap
  - id: chmod-ssh-go-eq
    desc: Restricts group other SSH perms
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: chmod\s+-R\s+go=\s+~?/?\.ssh
  - id: home-ssh-path
    desc: Home .ssh authorized_keys path
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (/home/.{1,50}|/root|~)/\.ssh/(authorized_keys|authorized_keys2)\b
    unless:
      - type: text
        regex: 'authorized_keys type=file uid='
    downgrade:
      any:
        - type: text
          regex: 'vagrant insecure public key'
  - id: ssh-dir-write
    desc: Write operation targeting .ssh directory
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (>>|>|write|append|open)\s*.{0,100}\.ssh/
    unless:
      - id: vagrant-base-box-bootstrap
  - id: js-authorized-keys-write
    desc: Node.js writes to SSH authorized_keys
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: (appendFile|writeFile|appendFileSync|writeFileSync)\s*\(.{0,200}authorized_keys
  - id: js-ssh-pubkey
    desc: SSH public key string literal in JavaScript
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: (ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp256)\s+AAAA[A-Za-z0-9+/]{40,}
composite_rules:
  - id: ssh-pubkey-injection
    desc: SSH public key injection pattern
    crit: suspicious
    conf: 0.9
    any:
      - id: ssh-rsa-key
      - id: ssh-ed25519-key
      - id: ssh-ecdsa-key
  - id: ssh-backdoor-comp
    desc: SSH authorized_keys backdoor injection
    crit: hostile
    conf: 0.95
    mbc: E1098
    near_lines: 10
    all:
      - id: authorized-keys-append
    any:
      - id: ssh-pubkey-injection
      - id: ssh-rsa-key
      - id: ssh-ed25519-key
      - id: ssh-ecdsa-key
    unless:
      - id: vagrant-base-box-bootstrap
  - id: ssh-trust-store-reset
    desc: SSH trust store reset with key
    crit: hostile
    conf: 0.96
    mbc: E1098
    all:
      - id: reset-ssh-dir
      - id: authorized-keys-append
      - id: ssh-rsa-key
    any:
      - id: chmod-ssh-go-eq
      - id: chmod-ssh-dir
    unless:
      - id: vagrant-base-box-bootstrap
  - id: js-ssh-backdoor
    desc: JavaScript npm package injects SSH public key into authorized_keys
    crit: hostile
    conf: 0.97
    all:
      - id: js-authorized-keys-write
      - id: js-ssh-pubkey
  - id: ssh-key-dir-write
    desc: SSH public key with write to .ssh directory
    crit: hostile
    conf: 0.92
    mbc: E1098
    all:
      - id: ssh-dir-write
    any:
      - id: ssh-pubkey-injection
      - id: ssh-rsa-key
      - id: ssh-ed25519-key
      - id: ssh-ecdsa-key
    unless:
      - id: vagrant-base-box-bootstrap
  - id: ssh-persistence-setup
    desc: SSH persistence infrastructure setup
    crit: suspicious
    conf: 0.85
    all:
      - id: authorized-keys-append
      - id: home-ssh-path
    any:
      - id: mkdir-ssh
      - id: reset-ssh-dir
      - id: chmod-ssh-dir
      - id: chmod-ssh-go-eq
