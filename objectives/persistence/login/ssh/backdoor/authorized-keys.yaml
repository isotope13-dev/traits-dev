defaults:
  crit: suspicious
  attack: T1098.004
  for:
    - shell
    - python
    - elf
    - macho
    - go
  platforms:
    - linux
    - unix
    - macos
  size_max: 104857600
traits:
  - id: authorized-keys-append
    desc: Append to SSH authorized_keys
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: (>>|>).{0,100}authorized_keys
  - id: authorized-keys-echo-append
    desc: Echo to authorized_keys file
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: echo.{0,200}>>.{0,50}authorized_keys
  - id: ssh-rsa-key
    desc: SSH RSA public key
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: ssh-rsa\s+AAAA[A-Za-z0-9+/]{100,}
  - id: ssh-ed25519-key
    desc: SSH ed25519 public key
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: ssh-ed25519\s+AAAA[A-Za-z0-9+/]{40,}
  - id: ssh-ecdsa-key
    desc: SSH ECDSA public key
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: ssh-ecdsa\s+AAAA[A-Za-z0-9+/]{80,}
  - id: mkdir-ssh
    desc: Creates .ssh directory
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: mkdir.{0,30}\.ssh
  - id: reset-ssh-dir
    desc: Recreates .ssh after deletion
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: rm\s+-rf\s+\.ssh\s*&&\s*mkdir\s+\.ssh
  - id: chmod-ssh-dir
    desc: Sets permissions on .ssh directory
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: chmod\s+[0-9]+.{0,30}\.ssh
  - id: chmod-ssh-go-eq
    desc: Restricts group other SSH perms
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: chmod\s+-R\s+go=\s+~?/?\.ssh
  - id: home-ssh-path
    desc: Home .ssh authorized_keys path
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: (/home/.{1,50}|/root|~)/\.ssh/(authorized_keys|authorized_keys2)\b
composite_rules:
  - id: ssh-pubkey-injection
    desc: SSH public key injection pattern
    crit: suspicious
    conf: 0.9
    any:
      - id: ssh-rsa-key
      - id: ssh-ed25519-key
      - id: ssh-ecdsa-key
  - id: ssh-backdoor-comp
    desc: SSH authorized_keys backdoor injection
    crit: hostile
    conf: 0.95
    mbc: E1098
    near_lines: 10
    all:
      - id: authorized-keys-append
    any:
      - id: ssh-pubkey-injection
      - id: ssh-rsa-key
      - id: ssh-ed25519-key
      - id: ssh-ecdsa-key
  - id: ssh-trust-store-reset
    desc: SSH trust store reset with key
    crit: hostile
    conf: 0.96
    mbc: E1098
    all:
      - id: reset-ssh-dir
      - id: authorized-keys-append
      - id: ssh-rsa-key
    any:
      - id: chmod-ssh-go-eq
      - id: chmod-ssh-dir
  - id: ssh-persistence-setup
    desc: SSH persistence infrastructure setup
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: mkdir-ssh
      - id: reset-ssh-dir
      - id: chmod-ssh-dir
      - id: chmod-ssh-go-eq
      - id: authorized-keys-append
      - id: home-ssh-path
