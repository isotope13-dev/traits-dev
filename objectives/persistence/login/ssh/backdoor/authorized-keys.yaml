defaults:
  crit: suspicious
  attack: T1098.004
  for: [scripts, binaries]
  platforms:
  - unix
  size_max: 104857600
traits:
- id: vagrant-user-marker
  desc: Vagrant user marker
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: Vagrant User
- id: vagrant-insecure-key-marker
  desc: Vagrant insecure public key marker
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: vagrant insecure public key
- id: authorized-keys-append
  desc: Append to SSH authorized_keys
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: (>>|>).{0,100}authorized_keys
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
  - id: objectives/persistence/login/ssh/backdoor/
  - type: text
    substr: machine.communicate
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: well-known/tool/sysadmin/automatedlab/
  # Qt Creator RemoteLinux deploys the developer's pubkey to a device (ssh-copy-id
  # idiom) — legitimate IDE remote-deployment, not a backdoor.
  - id: well-known/app/qtcreator/
  - id: well-known/app/vscode/
- id: authorized-keys-echo-append
  desc: Echo to authorized_keys file
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: echo.{0,200}>>.{0,50}authorized_keys
  unless:
  - id: metadata/package/testing/
  - id: well-known/tool/sysadmin/virtualization::lima-virtualization-tool
  - type: basename
    exact: limactl.exe
  - id: objectives/persistence/login/ssh/backdoor/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: well-known/tool/sysadmin/automatedlab/
  - id: well-known/app/vscode/
  - id: well-known/tool/development/runspec-console/
- id: ssh-rsa-key
  desc: SSH RSA public key
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: ssh-rsa\s+AAAA[A-Za-z0-9+/]{100,}
  unless:
  - id: metadata/package/testing/
  - id: objectives/persistence/login/ssh/backdoor/
  - type: text
    regex: '(github\.com|gitlab\.com|bitbucket\.org)\s+ssh-rsa\s+AAAA'
  - type: text
    regex: 'known_hosts.{0,120}ssh-rsa|>>.{0,40}\.ssh/known_hosts'
  downgrade:
    any:
    - type: text
      regex: 'vagrant insecure public key'
- id: ssh-ed25519-key
  desc: SSH ed25519 public key
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: ssh-ed25519\s+AAAA[A-Za-z0-9+/]{40,}
  unless:
  - id: metadata/package/testing/
  - id: objectives/persistence/login/ssh/backdoor/
  - id: micro-behaviors/fs/path/sensitive/credentials/
  - type: text
    regex: 'known_hosts.{0,120}ssh-ed25519|>>.{0,40}\.ssh/known_hosts'
  - id: well-known/tool/development/runspec-console/
  downgrade:
    any:
    - type: text
      regex: 'vagrant insecure public key'
- id: ssh-ecdsa-key
  desc: SSH ECDSA public key
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: ssh-ecdsa\s+AAAA[A-Za-z0-9+/]{80,}
  unless:
  - id: metadata/package/testing/
  - type: text
    regex: 'known_hosts.{0,120}ssh-ecdsa|>>.{0,40}\.ssh/known_hosts'
- id: mkdir-ssh
  desc: Creates .ssh directory
  crit: component
  conf: 0.7
  if:
    type: text
    regex: mkdir.{0,30}\.ssh
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: well-known/tool/sysadmin/automatedlab/
  - id: well-known/app/dropbear::source-tree
  - id: well-known/tool/development/runspec-console/
- id: reset-ssh-dir
  desc: Recreates .ssh after deletion
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: rm\s+-rf\s+\.ssh\s*&&\s*mkdir\s+\.ssh
- id: chmod-ssh-dir
  desc: Sets permissions on .ssh directory
  crit: component
  conf: 0.7
  if:
    type: text
    regex: chmod\s+[0-9]+.{0,30}\.ssh
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
  - id: well-known/tool/sysadmin/automatedlab/
  - id: well-known/app/dropbear::source-tree
- id: chown-ssh-path
  desc: Changes ownership on authorized_keys path
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: chown.{0,120}\.ssh/(authorized_keys|authorized_keys2)\b|chown.{0,120}authorized_keys\b
  unless:
  - id: metadata/package/testing/
  - id: well-known/tool/sysadmin/virtualization::lima-tool-path
- id: chmod-ssh-go-eq
  desc: Restricts group other SSH perms
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: chmod\s+-R\s+go=\s+~?/?\.ssh
- id: home-ssh-path
  desc: Home .ssh authorized_keys path
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: (/home/.{1,50}|/root|~)/\.ssh/(authorized_keys|authorized_keys2)\b
  unless:
  - type: text
    regex: 'authorized_keys type=file uid='
  - type: text
    regex: '(?i)blocks path traversal.{0,80}\.ssh/authorized_keys'
  - type: text
    regex: '(?i)overwriting arbitrary files.{0,80}\.ssh/authorized_keys'
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: well-known/tool/sysadmin/automatedlab/
  - id: well-known/app/dropbear::source-tree
  - type: text
    substr: "SshPublicKey("
  downgrade:
    any:
    - type: text
      regex: 'vagrant insecure public key'
- id: ssh-dir-write--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (>>|>)\s*.{0,100}\.ssh/
  count_max: 1026819
- id: ssh-dir-write--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (write|append)\s*.{0,100}\.ssh/
  count_max: 1026820
- id: ssh-dir-write--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (open)\s*.{0,100}\.ssh/
  count_max: 1026821
- id: js-authorized-keys-write
  desc: Node.js writes to SSH authorized_keys
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: (appendFile|writeFile|appendFileSync|writeFileSync)\s*\(.{0,200}authorized_keys
- id: js-authorized-keys-path-variable
  desc: Stores authorized_keys path variable
  crit: suspicious
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    regex: "(const|let|var)\\s+\\w+\\s*=.{0,100}authorized_keys"
  unless:
  - id: well-known/tool/development/runspec-console/
  - type: path
    regex: '(^|[^A-Za-z0-9_])runspec_console([\\/]|-|$)'
- id: js-authorized-keys-variable-append
  desc: Node appends to authorized_keys path variable
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "(appendFile(Sync)?|writeFile(Sync)?)\\s*\\(\\s*(authKeys|authorizedKeys)"
- id: js-authorized-keys-short-variable-append
  desc: Node writes short authorized_keys var
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "(appendFile|writeFile)(Sync)?\\s*\\(\\s*(authKeys|authorizedKeys)\\b"
- id: js-authorized-keys-join-variable
  desc: Node builds authorized_keys path variable
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "\\b(authKeys|authorizedKeys)\\s*=\\s*path\\.join\\("
- id: js-fetch-ssh-key-task
  desc: Node fetches SSH key task
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: /api/ssh-key
  unless:
  - id: well-known/app/bitwarden::bitwarden-app
  - id: well-known/app/bitwarden::bitwarden-text-marker
- id: js-ufw-open-ssh-port
  desc: Node opens SSH port with ufw
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "ufw\\s+allow\\s+22(/tcp)?"
- id: js-ssh-homedir-path
  desc: Node builds user SSH directory path
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: path.join(os.homedir(), '.ssh')
- id: js-public-key-variable
  desc: JavaScript public key variable
  crit: component
  conf: 0.82
  for: [javascript, typescript]
  if:
    type: text
    substr: fullPublicKey
- id: js-linux-gated-ssh-backdoor
  desc: Linux-gated SSH key install logic
  crit: component
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    substr: os.platform() === 'linux'
- id: js-ssh-pubkey
  desc: SSH public key string literal in JavaScript
  crit: notable
  conf: 0.8
  for: [javascript, typescript]
  if:
    type: text
    regex: (ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp256)\s+AAAA[A-Za-z0-9+/]{40,}
  not:
  - regex: MockPublicKeyForDevModeonlyrunspec-console
- id: js-unix-ssh-home-path
  desc: JavaScript Unix SSH home path marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: "(/home|/Users)"
- id: js-windows-drive-enumeration
  desc: JavaScript Windows drive enumeration marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: CDEFGHIJ
- id: js-chmod-ssh-path
  desc: Node chmod targets SSH path
  crit: component
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    regex: "chmodSync\\s*\\([^)]{0,120}(\\.ssh|authorized_keys|ssh)"
- id: js-chmod-ssh-mode
  desc: Node chmod sets SSH mode
  crit: component
  conf: 0.86
  for: [javascript, typescript]
  if:
    type: text
    regex: "chmodSync\\s*\\([^)]{0,220}(448|384|0o700|0o600)"
- id: swift-backdoor-key-comment
  desc: Swift backdoor SSH key comment
  crit: suspicious
  conf: 0.9
  for: [swift]
  if:
    type: text
    substr: backdoor@
- id: swift-authkeys-path
  desc: Swift authorized_keys path
  crit: suspicious
  conf: 0.86
  for: [swift]
  if:
    type: text
    substr: authorized_keys

composite_rules:
# Consolidated benign build/test contexts (test harnesses, pip/setuptools
# packaging fixtures) so the append rules can reference one id instead of four.
- id: authorized-keys-append-recognized-build-test
  desc: Recognized build or test marker
  crit: notable
  conf: 0.9
  any:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/build/pip::python-packaging-tool-tests
  - id: metadata/build/pip::setuptools-package-index
  - id: well-known/tool/development/runspec-console::runspec-console-context
- id: vagrant-base-box-bootstrap
  desc: Vagrant base box SSH bootstrap
  crit: notable
  conf: 0.98
  all:
  - id: vagrant-user-marker
  - id: vagrant-insecure-key-marker
  near_bytes: 4096
- id: js-cross-platform-ssh-homes
  desc: Enumerates cross-platform SSH home paths
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
  any:
  - id: js-unix-ssh-home-path
  - id: js-windows-drive-enumeration
  near_bytes: 1200
- id: ssh-pubkey-injection
  desc: SSH public key injection pattern
  crit: suspicious
  conf: 0.9
  any:
  - id: ssh-rsa-key
  - id: ssh-ed25519-key
  - id: ssh-ecdsa-key
- id: ssh-backdoor-comp
  desc: SSH authorized_keys backdoor injection
  crit: hostile
  conf: 0.95
  mbc: E1098
  near_lines: 10
  all:
  - id: authorized-keys-append
  any:
  - id: ssh-pubkey-injection
  - id: ssh-rsa-key
  - id: ssh-ed25519-key
  - id: ssh-ecdsa-key
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
- id: ssh-trust-store-reset
  desc: SSH trust store reset with key
  crit: hostile
  conf: 0.96
  mbc: E1098
  all:
  - id: reset-ssh-dir
  - id: authorized-keys-append
  - id: ssh-rsa-key
  any:
  - id: chmod-ssh-go-eq
  - id: chmod-ssh-dir
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
- id: js-ssh-backdoor
  desc: JavaScript SSH key backdoor
  crit: hostile
  conf: 0.97
  all:
  - id: js-authorized-keys-write
  - id: js-ssh-pubkey
- id: js-authorized-key-literal-backdoor
  desc: JavaScript installs embedded SSH key
  crit: hostile
  conf: 0.98
  mbc: E1098
  for: [javascript, typescript]
  all:
  - id: js-authorized-keys-path-variable
  - id: js-authorized-keys-variable-append
  - id: js-ssh-homedir-path
  - id: js-ssh-pubkey
  near_bytes: 1400
- id: js-variable-ssh-backdoor
  desc: JavaScript variable SSH key backdoor
  crit: hostile
  conf: 0.96
  mbc: E1098
  for: [javascript, typescript]
  all:
  - id: js-authorized-keys-path-variable
  - id: js-authorized-keys-variable-append
  - id: js-ssh-homedir-path
  - id: js-public-key-variable
  any:
  - id: js-linux-gated-ssh-backdoor
  - id: js-ssh-permission-hardening
- id: js-remote-authorized-keys-backdoor
  desc: Node installs remote SSH key into authorized_keys
  crit: hostile
  conf: 0.97
  mbc: E1098
  for: [javascript, typescript]
  all:
  - id: js-fetch-ssh-key-task
  - id: js-authorized-keys-join-variable
  - id: js-authorized-keys-short-variable-append
  any:
  - id: js-ufw-open-ssh-port
  - id: js-ssh-permission-hardening
  unless:
  - id: metadata/package/testing/harness/runtime/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
- id: npm-archive-ssh-backdoor
  desc: npm archive ships SSH backdoor
  crit: hostile
  conf: 0.97
  for: [archives]
  scope: archive
  all:
  - id: js-variable-ssh-backdoor
  - id: metadata/package/files/included::package-json-basename
- id: js-cross-platform-ssh-backdoor
  desc: Cross-platform JavaScript SSH backdoor
  crit: hostile
  conf: 0.98
  all:
  - id: js-ssh-pubkey
  - id: js-cross-platform-ssh-homes
  - id: js-authorized-keys-path-variable
  any:
  - id: js-ssh-permission-hardening
  - id: mkdir-ssh
- id: js-ssh-permission-hardening
  desc: Hardens SSH file permissions in Node
  crit: suspicious
  conf: 0.86
  for: [javascript, typescript]
  all:
  - id: js-chmod-ssh-path
  - id: js-chmod-ssh-mode
- id: swift-ssh-backdoor-key
  desc: Swift SSH backdoor key injection
  crit: hostile
  conf: 0.96
  for: [swift]
  all:
  - id: swift-authkeys-path
  - id: swift-backdoor-key-comment
  any:
  - id: ssh-ed25519-key
  - id: ssh-rsa-key
- id: ssh-key-dir-write
  desc: SSH public key with write to .ssh directory
  crit: hostile
  conf: 0.92
  mbc: E1098
  all:
  - id: authorized-keys-append
  any:
  - id: ssh-pubkey-injection
  - id: ssh-rsa-key
  - id: ssh-ed25519-key
  - id: ssh-ecdsa-key
  unless:
  - id: objectives/persistence/login/ssh/backdoor/
- id: ssh-persistence-setup
  desc: SSH persistence infrastructure setup
  crit: suspicious
  conf: 0.85
  all:
  - id: authorized-keys-append
  - id: home-ssh-path
  any:
  - id: mkdir-ssh
  - id: reset-ssh-dir
  - id: chmod-ssh-dir
  - id: chmod-ssh-go-eq
  unless:
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: metadata/file/string/artifact::vagrant-machine-communicate-marker
  - id: well-known/tool/development/runspec-console/
  - id: well-known/tool/sysadmin/automatedlab/
- id: ssh-dir-write
  desc: Write operation targeting .ssh directory
  crit: suspicious
  conf: 0.75
  any:
  - id: ssh-dir-write--rx-1
  - id: ssh-dir-write--rx-2
  - id: ssh-dir-write--rx-3
  unless:
  - id: metadata/package/quality/false-positives::container-libs-ci-runner-path
  - id: vagrant-base-box-bootstrap
  - id: well-known/app/kilocode::kilo-code-js-bundle
  - id: well-known/app/kilocode::kilo-theme-marker
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: well-known/tool/sysadmin/automatedlab/
