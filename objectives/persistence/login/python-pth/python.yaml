defaults:
  platforms: [windows, unix]
  for:
    - python
    - shell
traits:
  - id: pth-file-write
    desc: Writing to a Python .pth file (persistence)
    crit: suspicious
    conf: 0.9
    mbc: E1546
    attack: T1546
    if:
      type: string_literal
      regex: /site-packages/[\w\.-]+\.pth|system\.pth
composite_rules:
  - id: encoded-pth-startup-loader
    desc: Encoded Python pth startup loader
    crit: hostile
    conf: 0.98
    mbc: B0024
    all:
      - id: pth-file-write
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/process/interpreter/python::exec-builtin
