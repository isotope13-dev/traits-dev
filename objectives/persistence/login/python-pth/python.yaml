defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python, shell]
traits:
  - id: pth-file-write
    desc: Writing to a Python .pth file (persistence)
    crit: suspicious
    conf: 0.9
    mbc: E1546
    attack: T1546
    if:
      type: string_value
      regex: '/site-packages/[\w\.-]+\.pth|system\.pth'
  - id: pth-exec-pattern
    desc: Malicious .pth file execution pattern (import; exec)
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'import\s+base64\s*;\s*exec\('
