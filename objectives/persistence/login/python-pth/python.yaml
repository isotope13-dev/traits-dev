defaults:
  platforms: [windows, unix]
  for:
    - python
    - shell
traits:
  - id: pth-file-write
    desc: Writing to a Python .pth file (persistence)
    crit: suspicious
    conf: 0.9
    mbc: E1546
    attack: T1546
    if:
      type: string_literal
      regex: /site-packages/[\w\.-]+\.pth|system\.pth
  - id: pth-exec-pattern
    desc: Malicious .pth file execution pattern (import; exec)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: import\s+base64\s*;\s*exec\(
  - id: pth-encoded-exec-line
    desc: Encoded Python .pth exec loader
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?m)^import\s+.{0,160}(base64|marshal|zlib).{0,240}exec\s*\('
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory

composite_rules:
  - id: encoded-pth-startup-loader
    desc: Encoded Python pth startup loader
    crit: hostile
    conf: 0.98
    attack: T1546
    mbc: B0024
    all:
      - id: objectives/persistence/login/python-startup::pth-import-exec
      - id: pth-encoded-exec-line
