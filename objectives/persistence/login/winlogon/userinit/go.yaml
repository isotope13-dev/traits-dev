# Winlogon Userinit Persistence
# Detects persistence via Winlogon Userinit registry modification
# MBC: F0012 (Persistence)
# ATT&CK: T1547.004 (Winlogon Helper DLL)
defaults:
  mbc: "F0012"
  attack: "T1547.004"
  platforms: [windows]
  for: [go, pe, dll]
traits:
  # Winlogon registry path
  - id: winlogon-path
    desc: Winlogon registry path
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: "Microsoft\\Windows NT\\CurrentVersion\\Winlogon"
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rdata
        - id: metadata/signed/platform::microsoft
  - id: winlogon-short
    desc: Winlogon key reference
    crit: notable
    conf: 0.8
    if:
      type: string_value
      word: "Winlogon"
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/format::many-imports
        - id: metadata/vendor/microsoft
        - id: metadata/signed/platform
  # Userinit value
  - id: userinit-value
    desc: Userinit registry value
    crit: notable
    conf: 0.95
    if:
      type: string_value
      word: "Userinit"
  # Shell value (alternative persistence)
  - id: shell-value
    desc: Shell registry value
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "Winlogon.{0,50}Shell"
  # Notify value
  - id: notify-value
    desc: Winlogon Notify subkey
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: "Winlogon.{0,30}Notify"
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rdata
        - id: metadata/signed/platform::microsoft
composite_rules:
  # Winlogon registry access
  - id: winlogon-access
    desc: Winlogon registry access
    crit: suspicious
    conf: 0.85
    all:
      - id: winlogon-path
    any:
      - id: userinit-value
      - id: shell-value
    downgrade:
      any:
        - id: micro-behaviors/os/registry/access::reg-notify-change-key-value
        - id: micro-behaviors/os/registry/access::registry-read-api-chain
  # Winlogon Userinit persistence
  # Complexity: all(2) + for(1) = 3
  - id: winlogon-userinit-persistence
    desc: Winlogon Userinit persistence
    crit: hostile
    conf: 0.95
    all:
      - id: winlogon-path
      - id: userinit-value
    any:
      - id: objectives/persistence/login/registry/run-key::registry-set-string
      - id: objectives/persistence/login/registry/run-key::masquerade-name
