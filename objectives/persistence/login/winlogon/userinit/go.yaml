defaults:
  mbc: F0012
  attack: T1547.004
  platforms:
    - windows
  for:
    - go
    - pe
    - dll
traits:
  - id: winlogon-path
    desc: Winlogon registry path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Microsoft\Windows NT\CurrentVersion\Winlogon
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform::microsoft
  - id: winlogon-short
    desc: Winlogon key reference
    crit: suspicious
    conf: 0.8
    if:
      type: text
      word: Winlogon
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/signed/platform/
  - id: userinit-value
    desc: Userinit registry value
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: Userinit
    downgrade:
      any:
        - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
    unless:
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
  - id: encoded-userinit-value
    desc: Encoded Userinit executable value
    crit: component
    conf: 0.98
    if:
      type: text
      exact: 8vAC8fb99vO9AucCnw==
  - id: encoded-winlogon-path
    desc: Encoded Winlogon registry path
    crit: component
    conf: 0.98
    if:
      type: text
      exact: 0Nzl09Te0eLL2vYA8fzw/AXzy9T2/QP89PC/3dPL4PLx8QL989UC8fD2/P3L1Pb9+/wE/P2f
  - id: shell-value
    desc: Shell registry value
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: Winlogon.{0,50}Shell
    downgrade:
      any:
        - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
    unless:
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
  - id: notify-value
    desc: Winlogon Notify subkey
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: Winlogon.{0,30}Notify
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform::microsoft
composite_rules:
  - id: winlogon-access
    desc: Winlogon registry access
    crit: suspicious
    conf: 0.85
    all:
      - id: winlogon-path
    any:
      - id: userinit-value
      - id: shell-value
    downgrade:
      any:
        - id: micro-behaviors/os/registry/access::reg-notify-change-key-value
        - id: micro-behaviors/os/registry/access::registry-read-api-chain
        - id: metadata/binary/metrics/structural::many-imports
  - id: winlogon-userinit-persistence
    desc: Winlogon Userinit persistence
    crit: hostile
    conf: 0.95
    all:
      - id: winlogon-path
      - id: userinit-value
    any:
      - id: objectives/persistence/login/registry/run-key::registry-set-string
      - id: objectives/persistence/login/registry/run-key::masquerade-name
  - id: encoded-winlogon-userinit-persistence
    desc: Encoded Winlogon Userinit persistence
    crit: hostile
    conf: 0.98
    all:
      - id: encoded-winlogon-path
      - id: encoded-userinit-value
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
    any:
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::base64-arithmetic-xor-decoder
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-a
