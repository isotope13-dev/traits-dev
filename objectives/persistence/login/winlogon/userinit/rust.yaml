defaults:
  mbc: F0012
  attack: T1547.004
  platforms: [windows]
  for: [rust]

traits:
  # Bare registry path/value names are capabilities, not intent — every Windows
  # API binding crate (windows-sys, winapi) and registry helper names them. The
  # persistence intent lives in the composite below, which additionally requires
  # the Userinit value AND a registry write. Keep these as component so they feed
  # the composite without surfacing standalone false positives.
  - id: rust-winlogon-path
    desc: Winlogon registry path
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'Winlogon|Microsoft\\Windows NT\\CurrentVersion\\Winlogon'

  - id: rust-userinit-value
    desc: Userinit registry value
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'Userinit|userinit\.exe'

  # Generic Rust idiom for building a `dir\name.exe` path — a capability, not
  # intent (every Windows installer/updater formats its own exe path this way).
  # Kept component so it feeds the self-copy composite without standalone FPs.
  - id: localappdata-exe-format-path
    desc: Formats a Windows exe path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'format!\("\{\}\\\\\{\}\.exe"'

composite_rules:
  - id: rust-winlogon-userinit-persistence
    desc: Winlogon Userinit persistence
    crit: hostile
    conf: 0.97
    all:
      - id: rust-winlogon-path
      - id: rust-userinit-value
      - id: micro-behaviors/os/registry/manipulate::rust-winreg-write

  - id: localappdata-self-copy-userinit
    desc: LocalAppData self-copy Userinit persistence
    crit: hostile
    conf: 0.98
    all:
      - id: rust-winlogon-userinit-persistence
      - id: micro-behaviors/os/env/vars/access::rust-localappdata-env-var
      - id: localappdata-exe-format-path
      - id: micro-behaviors/process/info/selfpath::current-exe-path
      - id: micro-behaviors/fs/file/copy::current-exe-copy
