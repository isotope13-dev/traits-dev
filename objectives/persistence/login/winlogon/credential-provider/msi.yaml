defaults:
  for: [oledoc]
  platforms: [windows]
  attack: T1547.004
  mbc: F0012

traits:
  - id: msi-credential-provider-registry
    desc: MSI credential provider registry
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: Software\Microsoft\Windows\CurrentVersion\Authentication\Credential Providers\
  - id: msi-credential-provider-inproc
    desc: MSI credential provider DLL
    crit: component
    conf: 0.94
    if:
      type: raw
      regex: InprocServer32.{0,80}CredentialProvider.{0,24}\.dll
  - id: msi-lsa-authentication-package
    desc: MSI LSA authentication package
    crit: component
    conf: 0.94
    if:
      type: raw
      substr: SYSTEM\CurrentControlSet\Control\LsaAuthentication Packages

composite_rules:
  - id: msi-credential-provider-persistence
    desc: MSI installs credential provider
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: msi-credential-provider-registry
      - id: msi-credential-provider-inproc
  - id: msi-logon-provider-auth-package
    desc: MSI installs logon auth package
    crit: suspicious
    conf: 0.99
    all:
      - id: msi-credential-provider-persistence
      - id: msi-lsa-authentication-package
