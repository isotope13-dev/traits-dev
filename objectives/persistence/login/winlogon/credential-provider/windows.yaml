defaults:
  for: [pe]
  platforms: [windows]
  attack: T1547.004
  mbc: F0012
traits:
- id: credprovcommoncore-component
  desc: CredProvCommonCore provider ref
  crit: suspicious
  conf: 0.95
  if:
    type: text
    exact: CredProvCommonCore.DLL
    section: .rdata
- id: picture-password-logonui
  desc: LogonUI picture password registry path
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: Authentication\LogonUI\PicturePassword
- id: picture-password-word
  desc: PicturePassword credential surface
  crit: component
  conf: 0.84
  if:
    type: text
    exact: PicturePassword
- id: credential-providers-registry-path
  desc: Credential Providers registry path
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: Software\Microsoft\Windows\CurrentVersion\Authentication\Credential Providers\
    case_insensitive: true
- id: wlid-credential-provider-class
  desc: WLID credential provider class
  crit: component
  conf: 0.97
  if:
    type: text
    exact: CWLIDCredProvCredential::GetSerialization
- id: wlid-password-auth-data
  desc: WLID password auth extraction
  crit: component
  conf: 0.97
  if:
    type: text
    exact: CWLIDCredProvCredential::_GetPasswordAuthData
- id: sspi-credential-encryption
  desc: SSPI credential encryption routines
  crit: component
  conf: 0.96
  if:
    type: text
    exact: SspiEncryptAuthIdentityEx
composite_rules:
- id: credential-provider-targeting
  desc: Targets Winlogon credential provider stack
  crit: suspicious
  conf: 0.97
  needs: 2
  any:
  - id: credprovcommoncore-component
  - id: picture-password-logonui
  - id: picture-password-word
  - id: objectives/evasion/masquerade/debug::credprovslegacy-dll
  unless:
  - id: metadata/signed/platform::microsoft
- id: credential-provider-service-loader
  desc: Credential provider aware service loader
  crit: suspicious
  conf: 0.98
  all:
  - id: credential-provider-targeting
  any:
  - id: micro-behaviors/os/service/control::service-dispatch-name-cluster
  - id: micro-behaviors/os/service/control::service-reconfig-api-name-cluster
  - id: objectives/evasion/masquerade/debug::mixed-windows-component-decoys
  unless:
  - id: metadata/signed/platform::microsoft
- id: credential-provider-registration-hijack
  desc: Credential provider registry hijack
  crit: hostile
  conf: 0.98
  all:
  - id: credential-providers-registry-path
  - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
  any:
  - id: wlid-credential-provider-class
  - id: wlid-password-auth-data
  - id: sspi-credential-encryption
  needs: 2
  unless:
  - id: metadata/signed/platform::microsoft
