defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1176
  conf: 0.9
traits:
- id: extension-all-urls-permissions
  desc: Extension requests all URLs
  crit: component
  count_min: 2
  if:
    type: hex
    pattern: "3C 00 61 00 6C 00 6C 00 5F 00 75 00 72 00 6C 00 73 00 3E 00"
    section: text
- id: extension-host-access-dnr
  desc: Extension DNR host access
  crit: component
  conf: 0.92
  if:
    type: hex
    pattern: "64 00 65 00 63 00 6C 00 61 00 72 00 61 00 74 00 69 00 76 00 65 00 4E 00 65 00 74 00 52 00 65 00 71 00 75 00 65 00 73 00 74 00 57 00 69 00 74 00 68 00 48 00 6F 00 73 00 74 00 41 00 63 00 63 00 65 00 73 00 73 00"
    section: text
- id: extension-clipboard-read
  desc: Extension clipboard read
  crit: component
  conf: 0.9
  if:
    type: hex
    pattern: "63 00 6C 00 69 00 70 00 62 00 6F 00 61 00 72 00 64 00 52 00 65 00 61 00 64 00"
    section: text
- id: chromium-from-webstore-false
  desc: Chromium extension not webstore
  crit: component
  conf: 0.9
  if:
    type: hex
    pattern: "22 00 66 00 72 00 6F 00 6D 00 5F 00 77 00 65 00 62 00 73 00 74 00 6F 00 72 00 65 00 22 00 3A 00 20 00 66 00 61 00 6C 00 73 00 65 00"
    section: text
- id: chromium-extension-location-external
  desc: Chromium extension external location
  crit: component
  conf: 0.86
  if:
    type: hex
    pattern: "22 00 6C 00 6F 00 63 00 61 00 74 00 69 00 6F 00 6E 00 22 00 3A 00 20 00 34 00"
    section: text
- id: chromium-extension-installer-symbols--installbaseextension
  desc: Chromium extension (InstallBaseExtension)
  crit: component
  conf: 0.95
  if:
    type: text
    word: InstallBaseExtension
- id: chromium-extension-installer-symbols--addextensiontoprefs
  desc: Chromium extension (AddExtensionToPrefs)
  crit: component
  conf: 0.95
  if:
    type: text
    word: AddExtensionToPrefs
- id: chromium-extension-installer-symbols--extensionunpacker
  desc: Chromium extension installer (ExtensionUnpacker)
  crit: component
  conf: 0.95
  if:
    type: text
    word: ExtensionUnpacker
composite_rules:
- id: chromium-extension-installer-symbols
  desc: Chromium extension installer symbols
  crit: component
  conf: 0.95
  any:
  - id: chromium-extension-installer-symbols--installbaseextension
  - id: chromium-extension-installer-symbols--addextensiontoprefs
  - id: chromium-extension-installer-symbols--extensionunpacker
- id: high-risk-extension-permissions
  desc: High-risk extension permissions
  crit: suspicious
  conf: 0.93
  all:
  - id: extension-all-urls-permissions
  any:
  - id: extension-host-access-dnr
  - id: extension-clipboard-read
- id: chromium-local-extension-prefs
  desc: Chromium local extension prefs
  crit: component
  conf: 0.9
  all:
  - id: chromium-from-webstore-false
  - id: chromium-extension-location-external
- id: chromium-local-extension-install
  desc: Local Chromium extension installation
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/fs/path/sensitive/browser::chromium-profile-extension-files
  - id: chromium-extension-installer-symbols
  any:
  - id: chromium-local-extension-prefs
  - id: high-risk-extension-permissions
- id: chromium-secure-prefs-extension-persistence
  desc: Forced Chromium extension persistence
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/fs/path/sensitive/browser::chromium-secure-prefs-mac-fields
  - id: chromium-local-extension-install
  any:
  - id: high-risk-extension-permissions
  - id: micro-behaviors/communications/http/client/managed::downloaddata
  - id: objectives/evasion/self-delete/file/batch::batch-ping-delay-delete
  needs: 2
