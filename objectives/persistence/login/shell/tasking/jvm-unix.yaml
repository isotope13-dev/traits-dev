defaults:
  platforms: [unix]
  for: [java, kotlin, class, java_class, jar]
  attack: T1546.004

traits:
  - id: jvm-hidden-update-bytecode
    desc: JVM hidden update bytecode
    crit: suspicious
    conf: 0.93
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 74 6D 70 2F 2E 73 79 73 6D 6F 6E 5F 75 70 64 61 74 65

  - id: jvm-curl-shell-task-bytecode
    desc: JVM curl shell task bytecode
    crit: suspicious
    conf: 0.93
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 43 4D 44 3D 24 28 63 75 72 6C 20 2D 73

composite_rules:
  - id: jvm-profile-curl-task-persistence
    desc: JVM profile curl task persist
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: objectives/persistence/login/shell/config::jvm-profile-bytecode
      - id: jvm-hidden-update-bytecode
      - id: jvm-curl-shell-task-bytecode
