defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1546.004

traits:
  - id: native-profile-curl-beacon
    desc: Native profile curl beacon
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.(profile|bashrc)[\s\S]{0,260}curl -s http://'

  - id: native-crontab-curl-task
    desc: Native crontab curl task
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'crontab -[\s\S]{0,220}curl -s http://'

  - id: native-pipe-crontab-install
    desc: Native piped crontab install
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: '| crontab -'

composite_rules:
  - id: native-profile-curl-persistence
    desc: Native profile curl persist
    crit: hostile
    conf: 0.98
    all:
      - id: native-profile-curl-beacon
    any:
      - id: native-crontab-curl-task

  - id: native-login-profile-curl-task
    desc: Native login profile curl task
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/path/config/system::native-login-profile-target
      - id: micro-behaviors/communications/http/download/curl::curl-silent-http-command
    any:
      - id: native-crontab-curl-task

  - id: native-crontab-curl-persistence
    desc: Native crontab curl persist
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-silent-http-command
      - id: native-pipe-crontab-install

  - id: native-multi-surface-persistence
    desc: Native binary installs both cron and systemd persistence
    crit: hostile
    conf: 0.97
    attack: T1053.003,T1543.002
    mbc: B0012
    for: [elf]
    all:
      - id: native-pipe-crontab-install
      - id: objectives/persistence/system/service/systemd::native-unit-authoring
