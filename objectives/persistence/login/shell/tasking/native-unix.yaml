defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1546.004

traits:
  - id: native-profile-curl-beacon
    desc: Native profile curl beacon
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.(profile|bashrc)[\s\S]{0,260}curl -s http://'

  - id: native-login-profile-target
    desc: Native login profile target
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\.(profile|bashrc)'

    unless:
    - type: trait
      id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: native-curl-beacon-payload
    desc: Native curl beacon payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: curl -s http://

  - id: native-crontab-curl-task
    desc: Native crontab curl task
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'crontab -[\s\S]{0,220}curl -s http://'

  - id: native-pipe-crontab-install
    desc: Native piped crontab install
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: '| crontab -'

composite_rules:
  - id: native-profile-curl-persistence
    desc: Native profile curl persist
    crit: hostile
    conf: 0.98
    all:
      - id: native-profile-curl-beacon
    any:
      - id: native-crontab-curl-task

  - id: native-login-profile-curl-task
    desc: Native login profile curl task
    crit: hostile
    conf: 0.97
    all:
      - id: native-login-profile-target
      - id: native-curl-beacon-payload
    any:
      - id: native-crontab-curl-task

  - id: native-crontab-curl-persistence
    desc: Native crontab curl persist
    crit: hostile
    conf: 0.98
    all:
      - id: native-curl-beacon-payload
      - id: native-pipe-crontab-install
