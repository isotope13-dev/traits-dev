# Writes into LIVE system-wide shell startup files (T1546.004).
#
# The config/ sibling detects *references* to system shell rc paths
# (/etc/bash.bashrc, /etc/zsh/zshrc, /etc/profile[.d], /etc/fish/config.fish).
# This file detects the *write* — a redirect or tee into the running host's
# /etc shell rc. Legitimate packaging stages files into "$pkgdir/etc/..."
# during package() and never touches the live /etc; a write straight to /etc
# (no $pkgdir, no quote-wrapped prefix) is the discriminator that turns a path
# mention into host-wide persistence affecting every user's interactive shell.
defaults:
  platforms: [unix]
  for: [shell]
  attack: T1546.004

traits:
  # --- System-wide /etc shell rc path references ---
  # These detect a reference to a host-wide shell startup file. A `text` matcher
  # (not string_literal) is required because shell redirect targets and other
  # bare paths are not parsed as string literals — `>> /etc/bash.bashrc` would
  # otherwise be invisible. User-level dotfile references (~/.bashrc, .zshrc)
  # live in the config/ sibling; these are the /etc system-wide variants.
  - id: etc-profile
    desc: /etc/profile system-wide shell configuration
    crit: notable
    conf: 0.75
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout
      - type: text
        regex: 'install\s+-Dm[0-9]+\s+[^\n]{0,160}/etc/profile\.d/'
      - type: text
        regex: 'install\s+-v?Dm[0-9]+\s+-t\s+["'']?\$pkgdir[^\n]{0,120}/etc/profile\.d'
    if:
      type: text
      substr: /etc/profile

  - id: etc-profiled
    desc: /etc/profile.d shell script path
    crit: notable
    conf: 0.8
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout
      - type: text
        regex: 'install\s+-Dm[0-9]+\s+[^\n]{0,160}/etc/profile\.d/'
      - type: text
        regex: 'install\s+-v?Dm[0-9]+\s+-t\s+["'']?\$pkgdir[^\n]{0,120}/etc/profile\.d'
    if:
      type: text
      substr: /etc/profile.d/

  - id: etc-bashrc
    # Covers the RHEL path (/etc/bashrc) and the Arch/Debian system bash rc
    # (/etc/bash.bashrc); both are world-affecting interactive-shell startups.
    desc: System-wide bash rc file (/etc/bash.bashrc)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: /etc/(bash\.)?bashrc
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: etc-zshrc
    # Covers /etc/zshrc and the Arch path /etc/zsh/zshrc — the system-wide zsh
    # startup file sourced for every interactive zsh.
    desc: System-wide zsh rc file (/etc/zsh/zshrc)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: /etc/(zsh/)?zshrc
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: etc-fish-config
    desc: "System-wide fish config"
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: /etc/fish/config\.fish
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  # --- Writes into those system-wide rc files ---
  - id: system-shell-rc-redirect-write
    # A `>>`/`>` redirect whose target is a system-wide shell rc under /etc.
    # Covers bash (/etc/bash.bashrc, /etc/bashrc), zsh (/etc/zsh/zshrc), fish
    # (/etc/fish/...), and /etc/profile[.d]. The leading `/etc` immediately
    # after the redirect (optionally one quote) excludes "$pkgdir/etc/..."
    # staging writes that legitimate package() functions perform.
    desc: Redirect write into a system-wide shell rc
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '>>?\s*["'']?/etc/(bash|zsh|fish|profile)'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: system-shell-rc-tee-write
    # `echo x | sudo tee -a /etc/bash.bashrc` is the privilege-friendly variant
    # of the redirect write above; same destination, different mechanism.
    desc: tee write into a system-wide shell rc
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'tee\s+(-a\s+)?["'']?/etc/(bash|zsh|fish|profile)'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

composite_rules:
  - id: system-shell-rc-write
    # Any mechanism (redirect or tee) that writes to a live system-wide shell
    # rc. Reusable building block for the hostile composites below and in other
    # objectives (supply-chain install hooks, login-banner defacement).
    desc: Write to a system-wide shell rc file
    crit: suspicious
    conf: 0.85
    any:
      - id: system-shell-rc-redirect-write
      - id: system-shell-rc-tee-write
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: global-shell-rc-mass-persistence
    # Carpet-bombing every shell's global startup file (bash + zsh + fish +
    # /etc/profile) is deliberate, broad persistence affecting every user on
    # the host — no benign installer rewrites three or more different
    # system-wide shell rc files via raw redirects. The write leg keeps this
    # from firing on mere path mentions; needs:3 keeps it off env-setup scripts
    # that touch one or two locations.
    desc: Persistence across multiple system-wide shell rc files
    crit: hostile
    conf: 0.95
    needs: 3
    all:
      - id: system-shell-rc-write
    any:
      - id: etc-bashrc
      - id: etc-zshrc
      - id: etc-fish-config
      - id: etc-profile
      - id: etc-profiled
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout
