# Writes into LIVE system-wide shell startup files (T1546.004).
#
# The config/ sibling detects *references* to system shell rc paths
# (/etc/bash.bashrc, /etc/zsh/zshrc, /etc/profile[.d], /etc/fish/config.fish).
# This file detects the *write* — a redirect or tee into the running host's
# /etc shell rc. Legitimate packaging stages files into "$pkgdir/etc/..."
# during package() and never touches the live /etc; a write straight to /etc
# (no $pkgdir, no quote-wrapped prefix) is the discriminator that turns a path
# mention into host-wide persistence affecting every user's interactive shell.
#
# Writes under /etc/profile.d/ are env drop-in scripts used by normal
# provisioners; they are not treated as system-wide shell rc persistence here.
defaults:
  platforms: [unix]
  for: [shell]
  attack: T1546.004

traits:
  - id: system-shell-rc-bash-redirect
    desc: Redirect write into bash system rc
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '>>?\s*["'']?/etc/(bash\.bashrc|bashrc)\b'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: system-shell-rc-zsh-redirect
    desc: Redirect write into zsh system rc
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '>>?\s*["'']?/etc/zsh/'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: system-shell-rc-fish-redirect
    desc: Redirect write into fish system rc
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '>>?\s*["'']?/etc/fish/'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: system-shell-rc-profile-redirect
    desc: Redirect write into /etc/profile
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '>>?\s*["'']?/etc/profile(?!\.d)\b'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: system-shell-rc-bash-tee
    desc: tee write into bash system rc
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'tee\s+(-a\s+)?["'']?/etc/(bash\.bashrc|bashrc)\b'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: system-shell-rc-zsh-tee
    desc: tee write into zsh system rc
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'tee\s+(-a\s+)?["'']?/etc/zsh/'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: system-shell-rc-fish-tee
    desc: tee write into fish system rc
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'tee\s+(-a\s+)?["'']?/etc/fish/'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: system-shell-rc-profile-tee
    desc: tee write into /etc/profile
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'tee\s+(-a\s+)?["'']?/etc/profile(?!\.d)\b'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

composite_rules:
  - id: system-shell-rc-redirect-write
    desc: Redirect write into a system-wide shell rc
    crit: notable
    conf: 0.85
    any:
      - id: system-shell-rc-bash-redirect
      - id: system-shell-rc-zsh-redirect
      - id: system-shell-rc-fish-redirect
      - id: system-shell-rc-profile-redirect
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: system-shell-rc-tee-write
    desc: tee write into a system-wide shell rc
    crit: notable
    conf: 0.85
    any:
      - id: system-shell-rc-bash-tee
      - id: system-shell-rc-zsh-tee
      - id: system-shell-rc-fish-tee
      - id: system-shell-rc-profile-tee
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout

  - id: system-shell-rc-write
    # Any mechanism (redirect or tee) that writes to a live system-wide shell
    # rc. Reusable building block for the hostile composites below and in other
    # objectives (supply-chain install hooks, login-banner defacement).
    desc: Write to a system-wide shell rc file
    crit: suspicious
    conf: 0.85
    any:
      - id: system-shell-rc-redirect-write
      - id: system-shell-rc-tee-write
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout
      - id: well-known/tool/offensive/pwn::pwn-framework-context

  - id: system-shell-rc-bash-write
    desc: Write into bash system-wide rc
    crit: component
    conf: 0.9
    any:
      - id: system-shell-rc-bash-redirect
      - id: system-shell-rc-bash-tee

  - id: system-shell-rc-zsh-write
    desc: Write into zsh system-wide rc
    crit: component
    conf: 0.9
    any:
      - id: system-shell-rc-zsh-redirect
      - id: system-shell-rc-zsh-tee

  - id: system-shell-rc-fish-write
    desc: Write into fish system-wide rc
    crit: component
    conf: 0.9
    any:
      - id: system-shell-rc-fish-redirect
      - id: system-shell-rc-fish-tee

  - id: system-shell-rc-profile-write
    desc: Write into /etc/profile
    crit: component
    conf: 0.9
    any:
      - id: system-shell-rc-profile-redirect
      - id: system-shell-rc-profile-tee

  - id: global-shell-rc-mass-persistence
    # Carpet-bombing every shell's global startup file (bash + zsh + fish +
    # /etc/profile) is deliberate, broad persistence affecting every user on
    # the host — no benign installer rewrites three or more different
    # system-wide shell rc families via raw redirects.
    desc: Persistence across multiple system-wide shell rc files
    crit: hostile
    conf: 0.95
    needs: 3
    all:
      - id: system-shell-rc-write
    any:
      - id: system-shell-rc-bash-write
      - id: system-shell-rc-zsh-write
      - id: system-shell-rc-fish-write
      - id: system-shell-rc-profile-write
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout
      - id: well-known/tool/offensive/pwn::pwn-framework-context
