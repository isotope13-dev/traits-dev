defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
traits:
  - id: source-bashrc
    desc: Sources bash startup configuration file
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: source\s+\.bashrc
  - id: source-shell-profile
    desc: source .bash_profile
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: source\s+\.bash_profile
  - id: source-profile
    desc: source .profile
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: source\s+\.profile
  - id: source-zshrc
    desc: Sources zsh startup configuration file
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: source\s+\.zshrc
  - id: js-path-manipulation
    desc: Manually manipulates PATH environment variable
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: process\.env\.PATH\s*=
composite_rules:
  - id: js-source-profile
    desc: Sources shell profile files to
    crit: suspicious
    conf: 0.85
    attack: T1546.004
    any:
      - id: source-bashrc
      - id: source-shell-profile
      - id: source-profile
      - id: source-zshrc
