# Writes into the *current user's* HOME shell rc (T1546.004). The system-wide.yaml
# sibling covers /etc; this covers ~/.bashrc, ~/.zshrc, ~/.profile. The high-value
# case is a PKGBUILD build()/prepare() (which runs as the developer, not in
# fakeroot) appending to the builder's own shell rc — persistence on the machine
# of everyone who builds the package, before install and without root.
defaults:
  platforms: [unix]
  for: [shell]
  attack: T1546.004

traits:
  - id: home-shell-rc-write
    desc: Redirect write into HOME shell rc
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?m)^[ \t]*(?!#).{0,160}>>?\s*["'']?(\$HOME|~)/\.(bashrc|zshrc|profile)'
    unless:
      - id: metadata/package/files/ecosystem::conda-shell-activation-layout
