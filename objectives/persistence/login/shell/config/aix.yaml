defaults:
  platforms: [aix, unix]
  for: [c, cpp, elf, php]
  attack: T1546.004
traits:
  - id: etc-profile-aix
    desc: /etc/profile system-wide shell configuration (AIX)
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: '/etc/profile.{0,120}(LIBPATH|ODMDIR|/usr/bin/ksh)'
composite_rules:
  - id: aix-login-persistence
    desc: AIX login persistence via /etc/profile
    crit: hostile
    conf: 0.95
    all:
      - id: etc-profile-aix
    any:
      - id: micro-behaviors/process/create/shell/invoke::system-fn
      - id: micro-behaviors/process/create/shell/invoke::sh-c-exec
      - id: micro-behaviors/fs/file/write/direct::js-file-write
      - id: micro-behaviors/process/create/shell/invoke::zig-child-run
