defaults:
  platforms: [openbsd, bsd, unix]
  for: [cpp, elf]
  attack: T1546.004

traits:
  - id: native-profile-login-beacon
    desc: Native profile login beacon
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/v1/login

  - id: native-cshrc-write-target
    desc: Native writes cshrc file
    crit: component
    conf: 0.9
    if:
      type: text
      substr: .cshrc

composite_rules:
  - id: openbsd-native-login-shell-beacon
    desc: OpenBSD native login shell beacon
    crit: hostile
    conf: 0.98
    all:
      - id: native-profile-login-beacon
      - id: native-cshrc-write-target
