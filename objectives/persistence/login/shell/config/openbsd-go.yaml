defaults:
  platforms: [openbsd, bsd, unix]
  for: [go, elf]
  attack: T1546.004

traits:
  - id: go-hidden-agent-path
    desc: Go hidden agent path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.agent_96ab3

  - id: go-shrc-persistence
    desc: Go shrc persistence path
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: .shrc

composite_rules:
  - id: go-openbsd-login-shell-agent
    desc: Go OpenBSD login shell agent
    crit: hostile
    conf: 0.98
    all:
      - id: go-hidden-agent-path
      - id: go-shrc-persistence
