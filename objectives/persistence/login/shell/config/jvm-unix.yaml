defaults:
  platforms: [unix, appliance, routeros]
  for: [java, kotlin, class, java_class, jar]
  attack: T1546.004

traits:
  - id: jvm-java-jar-payload-line
    desc: JVM java -jar payload line
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: java -jar

  - id: jvm-profile-append-call
    desc: JVM shell profile append call
    crit: suspicious
    conf: 0.91
    for: [java, kotlin]
    if:
      type: text
      regex: '\.(bashrc|profile)[\s\S]{0,180}appendText'

  - id: jvm-crontab-install-line
    desc: JVM crontab install line
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: crontab -l

  - id: jvm-java-jar-bytecode
    desc: JVM java -jar bytecode
    crit: component
    conf: 0.93
    for: [class, jar]
    if:
      type: hex
      pattern: 6A 61 76 61 20 2D 6A 61 72

  - id: jvm-crontab-bytecode
    desc: JVM crontab bytecode
    crit: suspicious
    conf: 0.93
    for: [class, jar]
    if:
      type: hex
      pattern: 63 72 6F 6E 74 61 62 20 2D 6C

  - id: jvm-rc-bashrc-bytecode
    desc: JVM bashrc bytecode
    crit: suspicious
    conf: 0.93
    for: [class, jar]
    if:
      type: hex
      pattern: 2E 62 61 73 68 72 63

  - id: jvm-profile-bytecode
    desc: JVM profile bytecode
    crit: component
    conf: 0.93
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2E 70 72 6F 66 69 6C 65


composite_rules:
  - id: jvm-shell-profile-jar-persistence
    desc: JVM shell profile jar persist
    crit: hostile
    conf: 0.98
    for: [java, kotlin]
    all:
      - id: jvm-java-jar-payload-line
      - id: jvm-profile-append-call
    any:
      - id: jvm-crontab-install-line

  - id: jvm-shell-profile-jar-bytecode
    desc: JVM shell profile jar bytecode
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-java-jar-bytecode
      - id: jvm-crontab-bytecode
    any:
      - id: jvm-rc-bashrc-bytecode
      - id: jvm-profile-bytecode
