defaults:
  platforms:
  - unix
  - windows
  for:
  - shell
traits:
- id: shell-profile
  desc: .bash_profile shell configuration file
  crit: notable
  conf: 0.7
  attack: T1546.004
  if:
    type: string_literal
    substr: .bash_profile
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/nvidia-nvcf::developer-setup-script
  # GNU Autoconf configure scripts print advice like "set PYTHONPATH in your
  # .profile or .bash_profile" — that's build guidance text, not a write that
  # establishes persistence.
  - id: metadata/build/autotools::autoconf-generated-script
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family/
- id: bashrc
  desc: .bashrc shell configuration file
  crit: notable
  conf: 0.7
  attack: T1546.004
  if:
    type: string_literal
    substr: .bashrc
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: metadata/file/extension/identity::dart-source-basename
  - id: well-known/app/opencode-router
  - type: text
    substr: "Add it by appending this line to your shell profile"
  - type: text
    substr: "Add this to your shell config"
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family/
- id: shell-login
  desc: .bash_login shell configuration file
  crit: notable
  conf: 0.75
  attack: T1546.004
  if:
    type: string_literal
    substr: .bash_login
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: shell-logout
  desc: .bash_logout shell configuration file
  crit: suspicious
  conf: 0.85
  attack: T1546.004
  if:
    type: string_literal
    substr: .bash_logout
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: profile
  desc: .profile shell configuration file
  crit: notable
  conf: 0.7
  attack: T1546.004
  if:
    type: string_literal
    regex: '(^|[/~\s])\.profile(\s|$)'
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family/
    - id: micro-behaviors/dylib/library/family/
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - type: string_literal
    regex: runtime\.profile
  # Autoconf configure-script PATH advice mentions .profile; not persistence.
  - id: metadata/build/autotools::autoconf-generated-script
- id: zshrc
  desc: .zshrc shell configuration file
  crit: notable
  conf: 0.7
  attack: T1546.004
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: well-known/app/nvidia-nvcf::developer-setup-script
  - id: well-known/app/opencode-router
  - type: text
    substr: "Add it by appending this line to your shell profile"
  - type: text
    substr: "Add this to your shell config"
  - type: text
    substr: .zshrc.d/
  if:
    type: string_literal
    substr: .zshrc
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family/
- id: zprofile
  desc: .zprofile shell configuration file
  crit: notable
  conf: 0.7
  attack: T1546.004
  if:
    type: string_literal
    substr: .zprofile
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family/
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: zlogin
  desc: .zlogin shell configuration file
  crit: suspicious
  conf: 0.75
  attack: T1546.004
  if:
    type: string_literal
    substr: .zlogin
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: metadata/package/files/system-package::zsh-function-script
- id: zlogout
  desc: .zlogout shell configuration file
  crit: suspicious
  conf: 0.85
  attack: T1546.004
  if:
    type: string_literal
    substr: .zlogout
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: hardcoded-profile
  desc: Hardcoded path to .profile file
  crit: notable
  conf: 0.9
  attack: T1546.004
  if:
    type: string_literal
    regex: /[\w./]{0,32}/\.profile
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: hardcoded-bashrc
  desc: Hardcoded path to .bashrc file
  crit: notable
  conf: 0.9
  attack: T1546.004
  if:
    type: string_literal
    regex: /[\w./]{0,32}/\.bashrc
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: hardcoded-zshrc
  desc: Hardcoded path to .zshrc file
  crit: suspicious
  conf: 0.9
  attack: T1546.004
  if:
    type: string_literal
    regex: /[\w./]{0,32}/\.zshrc
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: hex-profile
  desc: Hex-escaped .profile path
  crit: suspicious
  conf: 0.95
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x2F\x2E\x70\x72\x6F\x66\x69\x6C\x65
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: hex-bashrc
  desc: Hex-escaped .bashrc path
  crit: suspicious
  conf: 0.95
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x2F\x2E\x62\x61\x73\x68\x72\x63
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: hex-zshrc
  desc: Hex-escaped .zshrc path
  crit: suspicious
  conf: 0.95
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x2F\x2E\x7A\x73\x68\x72\x63
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: hex-bash-profile
  desc: Hex-escaped .bash_profile path
  crit: suspicious
  conf: 0.95
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x2F\x2E\x62\x61\x73\x68\x5F\x70\x72\x6F\x66\x69\x6C\x65
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: hex-nohup-perl
  desc: Hex-escaped nohup perl command
  crit: suspicious
  conf: 0.98
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x6E\x6F\x68\x75\x70\x20\x70\x65\x72\x6C
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: hidden-system-pl
  desc: Hidden .system.pl payload path
  crit: suspicious
  conf: 0.97
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x2E\x73\x79\x73\x74\x65\x6D\x2E\x70\x6C
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: posixly-correct
  desc: POSIXLY_CORRECT environment variable
  crit: notable
  conf: 0.3
  if:
    type: string_literal
    substr: POSIXLY_CORRECT
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: cshrc-file
  desc: C shell startup file reference
  crit: notable
  conf: 1.0
  if:
    type: string_literal
    substr: .cshrc
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: tcsh-keyword
  desc: tcsh keyword (shell name)
  crit: notable
  conf: 1.0
  if:
    type: string_literal
    word: tcsh
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: shell-rc-target-text--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.(bashrc|bash_profile)\b
  count_max: 1027809
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: shell-rc-target-text--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.(bash_login|profile)\b
  count_max: 1027810
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: shell-rc-target-text--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.(zshrc|zprofile)\b
  count_max: 1027811
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: apm-runtime-path-update
  desc: APM runtime PATH setup marker
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: "Added by APM runtime setup"
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: shell-env-file-source-line
  desc: Shell env source line
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(source|\.)\s+["'']?\$[A-Za-z_][A-Za-z0-9_]*\/env'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: shell-profile-source-append
  desc: Appends sourced command to shell profile
  crit: notable
  conf: 0.94
  attack: T1546.004
  if:
    type: text
    regex: 'source[^\n>]{0,120}>>[^\n]{0,40}\.(bash_profile|zprofile|zshrc|profile)\b'
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
composite_rules:
- id: shell-files
  desc: Bash shell configuration files
  crit: notable
  conf: 0.7
  attack: T1546.004
  any:
  - id: shell-profile
  - id: shell-login
  - id: profile
  - id: bashrc
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: multi-file-access
  desc: Multiple shell config files accessed
  crit: notable
  conf: 0.9
  attack: T1546.004
  needs: 3
  any:
  - id: shell-profile
  - id: shell-login
  - id: profile
  - id: bashrc
  - id: zshrc
  - id: zprofile
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
  - id: posixly-correct
  - id: cshrc-file
  - id: tcsh-keyword
  - id: apm-runtime-path-update
  - id: objectives/persistence/login/shell/config/
  - id: metadata/package/testing/presence/harness::shell-crate-test-path
- id: shell-rc-remote-bootstrap
  desc: Shell profile modification after remote bootstrap
  crit: notable
  conf: 0.94
  attack: T1546.004
  near_lines: 40
  all:
  - id: shell-rc-target-text
  any:
  - id: objectives/command-and-control/dropper/execution/eval::fetch-eval
  - id: objectives/command-and-control/dropper/execution/eval::process-substitution
  - id: micro-behaviors/process/create/shell/spawn::curl-pipe-exec
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: elf-hardcoded
  desc: Binary with hardcoded shell config
  crit: suspicious
  conf: 0.95
  attack: T1546.004
  any:
  - id: hardcoded-profile
  - id: hardcoded-bashrc
  - id: hardcoded-zshrc
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: hex-multi-file-access
  desc: Multiple hex-escaped shell rc files
  crit: suspicious
  conf: 0.98
  attack: T1546.004
  for: [perl]
  needs: 3
  any:
  - id: hex-profile
  - id: hex-bashrc
  - id: hex-zshrc
  - id: hex-bash-profile
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: perl-shell-rc-persistence
  desc: Perl shell rc persistence chain
  crit: hostile
  conf: 0.99
  attack: T1546.004
  for: [perl]
  all:
  - id: hex-nohup-perl
  - id: hidden-system-pl
  - id: hex-multi-file-access
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: perl-shell-rc-c2-persistence
  desc: Perl shell rc persistence with HTTP C2 bootstrap
  crit: hostile
  conf: 0.98
  attack: T1546.004
  for: [perl]
  all:
  - id: perl-shell-rc-persistence
  - id: micro-behaviors/communications/http/lib/lwp::perl-lwp-useragent
  any:
  - id: objectives/command-and-control/infrastructure/ip::port-number-constant
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: shell-rc-target-text
  desc: Shell RC file path reference
  crit: component
  conf: 0.82
  any:
  - id: shell-rc-target-text--rx-1
  - id: shell-rc-target-text--rx-2
  - id: shell-rc-target-text--rx-3
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
- id: shell-profile-env-installer-setup
  desc: Installer shell env setup
  crit: notable
  conf: 0.9
  all:
  - id: shell-env-file-source-line
  any:
  - id: shell-profile
  - id: shell-login
  - id: profile
  - id: bashrc
  - id: zshrc
  - id: zprofile
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
