defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - shell
traits:
  - id: shell-profile
    desc: .bash_profile shell configuration file
    crit: notable
    conf: 0.7
    attack: T1546.004
    if:
      type: string_literal
      substr: .bash_profile
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::system-lib-marker
  - id: bashrc
    desc: .bashrc shell configuration file
    crit: notable
    conf: 0.7
    attack: T1546.004
    if:
      type: string_literal
      substr: .bashrc
    unless:
      - type: basename
        regex: \.dart$
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::system-lib-marker
  - id: shell-login
    desc: .bash_login shell configuration file
    crit: notable
    conf: 0.75
    attack: T1546.004
    if:
      type: string_literal
      substr: .bash_login
  - id: shell-logout
    desc: .bash_logout shell configuration file
    crit: notable
    conf: 0.85
    attack: T1546.004
    if:
      type: string_literal
      substr: .bash_logout
  - id: profile
    desc: .profile shell configuration file
    crit: notable
    conf: 0.7
    attack: T1546.004
    if:
      type: string_literal
      word: .profile
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: micro-behaviors/dylib/library::video-lib-marker
    unless:
      - type: string_literal
        regex: runtime\.profile
  - id: etc-profile
    desc: /etc/profile system-wide shell configuration
    crit: notable
    conf: 0.75
    attack: T1546.004
    if:
      type: string_literal
      substr: /etc/profile
  - id: etc-profiled
    desc: /etc/profile.d shell script path
    crit: notable
    conf: 0.8
    attack: T1546.004
    if:
      type: string_literal
      substr: /etc/profile.d/
  - id: etc-bashrc
    desc: /etc/bashrc system-wide shell configuration
    crit: notable
    conf: 0.75
    attack: T1546.004
    if:
      type: string_literal
      substr: /etc/bashrc
  - id: zshrc
    desc: .zshrc shell configuration file
    crit: notable
    conf: 0.7
    attack: T1546.004
    if:
      type: string_literal
      substr: .zshrc
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::system-lib-marker
  - id: zprofile
    desc: .zprofile shell configuration file
    crit: notable
    conf: 0.7
    attack: T1546.004
    if:
      type: string_literal
      substr: .zprofile
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::system-lib-marker
  - id: zlogin
    desc: .zlogin shell configuration file
    crit: notable
    conf: 0.75
    attack: T1546.004
    if:
      type: string_literal
      substr: .zlogin
  - id: zlogout
    desc: .zlogout shell configuration file
    crit: notable
    conf: 0.85
    attack: T1546.004
    if:
      type: string_literal
      substr: .zlogout
  - id: etc-zshrc
    desc: /etc/zshrc system-wide shell configuration
    crit: notable
    conf: 0.75
    attack: T1546.004
    if:
      type: string_literal
      substr: /etc/zshrc
  - id: hardcoded-profile
    desc: Hardcoded path to .profile file
    crit: notable
    conf: 0.9
    attack: T1546.004
    if:
      type: string_literal
      regex: /[\w./]{0,32}/\.profile
  - id: hardcoded-bashrc
    desc: Hardcoded path to .bashrc file
    crit: notable
    conf: 0.9
    attack: T1546.004
    if:
      type: string_literal
      regex: /[\w./]{0,32}/\.bashrc
  - id: hardcoded-zshrc
    desc: Hardcoded path to .zshrc file
    crit: notable
    conf: 0.9
    attack: T1546.004
    if:
      type: string_literal
      regex: /[\w./]{0,32}/\.zshrc
  - id: posixly-correct
    desc: POSIXLY_CORRECT environment variable
    crit: component
    conf: 0.3
    if:
      type: string_literal
      substr: POSIXLY_CORRECT
  - id: cshrc-file
    desc: .cshrc file (C shell, not
    crit: notable
    conf: 1.0
    if:
      type: string_literal
      substr: .cshrc
  - id: tcsh-keyword
    desc: tcsh keyword (shell name)
    crit: component
    conf: 1.0
    if:
      type: string_literal
      word: tcsh
composite_rules:
  - id: shell-files
    desc: Bash shell configuration files
    crit: notable
    conf: 0.7
    attack: T1546.004
    any:
      - id: shell-profile
      - id: shell-login
      - id: profile
      - id: bashrc
  - id: multi-file-access
    desc: Multiple shell config files accessed
    crit: notable
    conf: 0.9
    attack: T1546.004
    needs: 3
    any:
      - id: shell-profile
      - id: shell-login
      - id: profile
      - id: bashrc
      - id: zshrc
      - id: zprofile
    unless:
      - id: posixly-correct
      - id: cshrc-file
      - id: tcsh-keyword
  - id: elf-hardcoded
    desc: Binary with hardcoded shell config
    crit: notable
    conf: 0.95
    attack: T1546.004
    any:
      - id: hardcoded-profile
      - id: hardcoded-bashrc
      - id: hardcoded-zshrc
