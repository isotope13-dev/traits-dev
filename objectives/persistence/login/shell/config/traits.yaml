defaults:
  platforms:
  - unix
  - windows
  for:
  - shell
traits:
- id: shell-profile
  desc: .bash_profile shell configuration file
  crit: suspicious
  conf: 0.7
  attack: T1546.004
  if:
    type: string_literal
    substr: .bash_profile
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family::system-lib-marker
- id: bashrc
  desc: .bashrc shell configuration file
  crit: suspicious
  conf: 0.7
  attack: T1546.004
  if:
    type: string_literal
    substr: .bashrc
  unless:
  - type: basename
    regex: \.dart$
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family::system-lib-marker
- id: shell-login
  desc: .bash_login shell configuration file
  crit: suspicious
  conf: 0.75
  attack: T1546.004
  if:
    type: string_literal
    substr: .bash_login
- id: shell-logout
  desc: .bash_logout shell configuration file
  crit: suspicious
  conf: 0.85
  attack: T1546.004
  if:
    type: string_literal
    substr: .bash_logout
- id: profile
  desc: .profile shell configuration file
  crit: suspicious
  conf: 0.7
  attack: T1546.004
  if:
    type: string_literal
    word: .profile
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family::system-lib-marker
    - id: micro-behaviors/dylib/library/family::video-lib-marker
  unless:
  - type: string_literal
    regex: runtime\.profile
- id: etc-profile
  desc: /etc/profile system-wide shell configuration
  crit: suspicious
  conf: 0.75
  attack: T1546.004
  if:
    type: string_literal
    substr: /etc/profile
- id: etc-profiled
  desc: /etc/profile.d shell script path
  crit: suspicious
  conf: 0.8
  attack: T1546.004
  if:
    type: string_literal
    substr: /etc/profile.d/
- id: etc-bashrc
  desc: /etc/bashrc system-wide shell configuration
  crit: suspicious
  conf: 0.75
  attack: T1546.004
  if:
    type: string_literal
    substr: /etc/bashrc
- id: zshrc
  desc: .zshrc shell configuration file
  crit: suspicious
  conf: 0.7
  attack: T1546.004
  if:
    type: string_literal
    substr: .zshrc
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family::system-lib-marker
- id: zprofile
  desc: .zprofile shell configuration file
  crit: suspicious
  conf: 0.7
  attack: T1546.004
  if:
    type: string_literal
    substr: .zprofile
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family::system-lib-marker
- id: zlogin
  desc: .zlogin shell configuration file
  crit: suspicious
  conf: 0.75
  attack: T1546.004
  if:
    type: string_literal
    substr: .zlogin
- id: zlogout
  desc: .zlogout shell configuration file
  crit: suspicious
  conf: 0.85
  attack: T1546.004
  if:
    type: string_literal
    substr: .zlogout
- id: etc-zshrc
  desc: /etc/zshrc system-wide shell configuration
  crit: suspicious
  conf: 0.75
  attack: T1546.004
  if:
    type: string_literal
    substr: /etc/zshrc
- id: hardcoded-profile
  desc: Hardcoded path to .profile file
  crit: suspicious
  conf: 0.9
  attack: T1546.004
  if:
    type: string_literal
    regex: /[\w./]{0,32}/\.profile
- id: hardcoded-bashrc
  desc: Hardcoded path to .bashrc file
  crit: suspicious
  conf: 0.9
  attack: T1546.004
  if:
    type: string_literal
    regex: /[\w./]{0,32}/\.bashrc
- id: hardcoded-zshrc
  desc: Hardcoded path to .zshrc file
  crit: suspicious
  conf: 0.9
  attack: T1546.004
  if:
    type: string_literal
    regex: /[\w./]{0,32}/\.zshrc
- id: hex-profile
  desc: Hex-escaped .profile path
  crit: suspicious
  conf: 0.95
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x2F\x2E\x70\x72\x6F\x66\x69\x6C\x65
- id: hex-bashrc
  desc: Hex-escaped .bashrc path
  crit: suspicious
  conf: 0.95
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x2F\x2E\x62\x61\x73\x68\x72\x63
- id: hex-zshrc
  desc: Hex-escaped .zshrc path
  crit: suspicious
  conf: 0.95
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x2F\x2E\x7A\x73\x68\x72\x63
- id: hex-bash-profile
  desc: Hex-escaped .bash_profile path
  crit: suspicious
  conf: 0.95
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x2F\x2E\x62\x61\x73\x68\x5F\x70\x72\x6F\x66\x69\x6C\x65
- id: hex-nohup-perl
  desc: Hex-escaped nohup perl command
  crit: suspicious
  conf: 0.98
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x6E\x6F\x68\x75\x70\x20\x70\x65\x72\x6C
- id: hidden-system-pl
  desc: Hidden .system.pl payload path
  crit: suspicious
  conf: 0.97
  attack: T1546.004
  for: [perl]
  if:
    type: text
    substr: \x2E\x73\x79\x73\x74\x65\x6D\x2E\x70\x6C
- id: posixly-correct
  desc: POSIXLY_CORRECT environment variable
  crit: component
  conf: 0.3
  if:
    type: string_literal
    substr: POSIXLY_CORRECT
- id: cshrc-file
  desc: .cshrc file (C shell, not
  crit: suspicious
  conf: 1.0
  if:
    type: string_literal
    substr: .cshrc
- id: tcsh-keyword
  desc: tcsh keyword (shell name)
  crit: component
  conf: 1.0
  if:
    type: string_literal
    word: tcsh
- id: shell-rc-target-text--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.(bashrc|bash_profile)\b
  count_max: 1027809
- id: shell-rc-target-text--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.(bash_login|profile)\b
  count_max: 1027810
- id: shell-rc-target-text--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \.(zshrc|zprofile)\b
  count_max: 1027811
composite_rules:
- id: shell-files
  desc: Bash shell configuration files
  crit: suspicious
  conf: 0.7
  attack: T1546.004
  any:
  - id: shell-profile
  - id: shell-login
  - id: profile
  - id: bashrc
- id: multi-file-access
  desc: Multiple shell config files accessed
  crit: suspicious
  conf: 0.9
  attack: T1546.004
  needs: 3
  any:
  - id: shell-profile
  - id: shell-login
  - id: profile
  - id: bashrc
  - id: zshrc
  - id: zprofile
  unless:
  - id: posixly-correct
  - id: cshrc-file
  - id: tcsh-keyword
- id: shell-rc-remote-bootstrap
  desc: Shell RC persistence with remote bootstrap
  crit: hostile
  conf: 0.94
  attack: T1546.004
  all:
  - id: shell-rc-target-text
  any:
  - id: objectives/command-and-control/dropper/execution/eval::fetch-eval
  - id: objectives/command-and-control/dropper/execution/eval::process-substitution
  - id: objectives/command-and-control/dropper/execution/eval::download-execute-dup
- id: elf-hardcoded
  desc: Binary with hardcoded shell config
  crit: suspicious
  conf: 0.95
  attack: T1546.004
  any:
  - id: hardcoded-profile
  - id: hardcoded-bashrc
  - id: hardcoded-zshrc
- id: hex-multi-file-access
  desc: Multiple hex-escaped shell rc files
  crit: suspicious
  conf: 0.98
  attack: T1546.004
  for: [perl]
  needs: 3
  any:
  - id: hex-profile
  - id: hex-bashrc
  - id: hex-zshrc
  - id: hex-bash-profile
- id: perl-shell-rc-persistence
  desc: Perl shell rc persistence chain
  crit: hostile
  conf: 0.99
  attack: T1546.004
  for: [perl]
  all:
  - id: hex-nohup-perl
  - id: hidden-system-pl
  - id: hex-multi-file-access
- id: perl-shell-rc-c2-persistence
  desc: Perl shell rc persistence with HTTP C2 bootstrap
  crit: hostile
  conf: 0.98
  attack: T1546.004
  for: [perl]
  all:
  - id: perl-shell-rc-persistence
  - id: micro-behaviors/communications/http/xmlrpc::perl-lwp-useragent
  any:
  - id: objectives/command-and-control/infrastructure/ip::port-number-constant
- id: shell-rc-target-text
  desc: Shell RC file path in script text
  crit: suspicious
  conf: 0.82
  any:
  - id: shell-rc-target-text--rx-1
  - id: shell-rc-target-text--rx-2
  - id: shell-rc-target-text--rx-3
