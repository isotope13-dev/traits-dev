defaults:
  platforms: [qnx, unix]
  for: [java, class, java_class]
  attack: T1037.004

traits:
  - id: qnx-java-profiled-script
    desc: QNX Java profile.d script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/profile.d/99-system-update.sh

  - id: qnx-java-login-jar-command
    desc: QNX Java login jar command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /bin/java -cp /tmp/.java-security.jar

  - id: qnx-java-loginmodule-command
    desc: QNX Java LoginModule command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: com.sun.security.auth.LoginModule

  - id: qnx-java-bytecode-profile-script
    desc: QNX Java class profile script
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2f 65 74 63 2f 70 72 6f 66 69 6c 65 2e 64 2f 39 39 2d 73 79 73 74 65 6d 2d 75 70 64 61 74 65 2e 73 68

composite_rules:
  - id: qnx-java-login-shell-persistence
    desc: QNX Java login shell persistence
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-java-profiled-script
      - id: qnx-java-login-jar-command
      - id: qnx-java-loginmodule-command

  - id: qnx-java-bytecode-login-persist
    desc: QNX Java class login persist
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: qnx-java-bytecode-profile-script
      - id: objectives/supply-chain/install-hook/runtime::qnx-java-bytecode-security-jar
