defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1037.004

traits:
  - id: qnx-go-hidden-sysmon-path
    desc: QNX Go hidden sysmon path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/tmp/\.[A-Za-z0-9_-]{0,32}qnx[A-Za-z0-9_-]{0,32}'

  - id: qnx-go-profile-persist-entry
    desc: QNX Go profile persist entry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: created .profile with persistence

  - id: qnx-go-shrc-persist-entry
    desc: QNX Go shrc persist entry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: created .shrc with persistence

  - id: qnx-go-startup-cfg-path
    desc: QNX Go startup cfg path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/config/startup.cfg

composite_rules:
  - id: qnx-go-login-shell-persistence
    desc: QNX Go login shell persistence
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-hidden-sysmon-path
      - id: qnx-go-profile-persist-entry
      - id: qnx-go-shrc-persist-entry
    any:
      - id: qnx-go-startup-cfg-path
