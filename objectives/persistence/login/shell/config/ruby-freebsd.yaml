defaults:
  platforms: [freebsd, unix]
  for: [ruby]
  attack: T1037.004

traits:
  - id: ruby-login-shell-config-targets
    desc: Ruby targets login shell configs
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '\.(cshrc|profile|login)'

  - id: ruby-login-backdoor-agent
    desc: Ruby writes login backdoor agent
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: BACKDOOR_SCRIPT

composite_rules:
  - id: ruby-login-shell-backdoor
    desc: Ruby login shell backdoor persistence
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-login-shell-config-targets
      - id: ruby-login-backdoor-agent

