defaults:
  platforms: [netscaler, appliance, unix]
  for: [swift]
  attack: T1546.004

traits:
  - id: swift-shell-profile-list
    desc: Swift shell profile list
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.bashrc[\s\S]{0,120}\.zshrc[\s\S]{0,120}\.profile'

  - id: swift-netscaler-telemetry-hook
    desc: Swift NetScaler telemetry hook
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: netscaler telemetry

  - id: swift-curl-beacon-profile
    desc: Swift curl beacon profile
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'curl -s https://\\\(C2_HOST\)/beacon'

composite_rules:
  - id: swift-profile-beacon-persistence
    desc: Swift profile beacon persistence
    crit: hostile
    conf: 0.98
    all:
      - id: swift-shell-profile-list
      - id: swift-netscaler-telemetry-hook
    any:
      - id: swift-curl-beacon-profile
