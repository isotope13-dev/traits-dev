defaults:
  platforms: [netscaler, appliance, unix]
  for: [java, kotlin, class, jar]
  attack: T1546.004

traits:
  - id: jvm-login-shell-profile-paths
    desc: JVM login shell profile paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\.bashrc|\.profile)[\s\S]{0,160}appendLineIfNotPresent'

  # NOTE: the generic `java -cp` launch form used to be an alternation branch
  # here. It carries no intent on its own — it appears in the `Usage: java -cp
  # ...` line of virtually every Java CLI — and matching it made this trait fire
  # `suspicious` on ordinary library sources. It now lives as a neutral
  # capability at micro-behaviors/process/create/launch/jvm and is composed in
  # below, where the profile-write legs supply the persistence intent.
  - id: jvm-generate-payload-line-method
    desc: generatePayloadLine persistence helper method
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: generatePayloadLine

  - id: jvm-login-cron-fallback
    desc: JVM login cron fallback
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'crontab[\s\S]{0,160}payloadLine'

  - id: jvm-login-profiled-script-write
    desc: JVM profile.d script write
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/etc/profile\.d[\s\S]{0,160}Files\.write'

  - id: jvm-bashrc-bytecode
    desc: JVM .bashrc path constant
    crit: component
    conf: 0.94
    for: [class, jar]
    if:
      type: text
      regex: '\.bashrc'

  - id: jvm-profiled-bytecode
    desc: JVM profile.d bytecode
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: text
      regex: '/etc/profile\.d'

composite_rules:
  - id: jvm-login-shell-persistence
    desc: JVM login shell persistence
    crit: hostile
    conf: 0.97
    all:
      - id: jvm-login-shell-profile-paths
    any:
      - id: jvm-generate-payload-line-method
      - id: micro-behaviors/process/create/launch::java-classpath-command-line
      - id: jvm-login-cron-fallback
      - id: jvm-login-profiled-script-write
    needs: 2

  - id: jvm-login-persistence-bytecode
    desc: JVM login persistence bytecode
    crit: hostile
    conf: 0.97
    for: [class, jar]
    all:
      - id: jvm-bashrc-bytecode
      - id: jvm-profiled-bytecode
    any:
      - id: jvm-generate-payload-line-method
      - id: micro-behaviors/process/create/launch::java-classpath-command-line
