defaults:
  platforms: [netscaler, appliance, unix]
  for: [shell]
  attack: T1546.004

traits:
  - id: shell-netscaler-hidden-update
    desc: Shell NetScaler hidden update
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.netscaler_updates/.ns_update

  - id: shell-login-rcfile-list
    desc: Shell login rcfile list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\.bashrc|\.bash_profile|\.profile)[\s\S]{0,160}/root/\.profile'

  - id: shell-zshrc-root-path
    desc: Shell zshrc root path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /root/.zshrc

composite_rules:
  - id: shell-netscaler-login-persistence
    desc: Shell NetScaler login persistence
    crit: hostile
    conf: 0.98
    all:
      - id: shell-netscaler-hidden-update
      - id: shell-login-rcfile-list
    any:
      - id: shell-zshrc-root-path
