defaults:
  platforms: [windows, unix, netbsd]
  for: [scripts, binaries, powershell]
  attack: T1546.013
traits:
- id: powershell-profile-path--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)(\$PROFILE\b|Microsoft\.PowerShell_profile\.ps1)'

  count_max: 1027776
- id: powershell-profile-path--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)(profile\.ps1|\\WindowsPowerShell\\Profile\.ps1)'

  count_max: 1027777
- id: powershell-profile-path--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)(\\PowerShell\\[0-9]+\\Profile\.ps1)'

  count_max: 1027778
- id: powershell-profile-write--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)(>>?|Set-Content).{0,160}(\$PROFILE\b|Microsoft\.PowerShell_profile\.ps1|profile\.ps1)'
  count_max: 1027779
- id: powershell-profile-write--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)(Add-Content|Out-File).{0,160}(\$PROFILE\b|Microsoft\.PowerShell_profile\.ps1)'
  count_max: 1027780
- id: powershell-profile-write--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)(Add-Content|Out-File).{0,160}(profile\.ps1)'
  count_max: 1027781
- id: powershell-profile-write--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)(New-Item).{0,160}(\$PROFILE\b|Microsoft\.PowerShell_profile\.ps1|profile\.ps1)'
  count_max: 1027782
composite_rules:
- id: powershell-profile-path
  desc: PowerShell profile persistence path
  crit: notable
  conf: 0.86
  any:
  - id: powershell-profile-path--rx-1
  - id: powershell-profile-path--rx-2
  - id: powershell-profile-path--rx-3
- id: powershell-profile-write
  desc: PowerShell profile write persistence
  crit: suspicious
  conf: 0.9
  any:
  - id: powershell-profile-write--rx-4
  - id: powershell-profile-write--rx-5
  - id: powershell-profile-write--rx-6
  - id: powershell-profile-write--rx-7
  unless:
  - id: well-known/tool/sysadmin/kubernetes

- id: powershell-profile-base64-persistence
  desc: PowerShell profile base64 persistence
  crit: hostile
  conf: 0.98
  all:
  - id: powershell-profile-write
  - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
  any:
  - id: objectives/execution/interpreter/eval/invoke::encoded-iex
