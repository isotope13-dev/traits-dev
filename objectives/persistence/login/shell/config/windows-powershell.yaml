defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1546.013
traits:
  - id: powershell-profile-path
    desc: PowerShell profile persistence path
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)(\$PROFILE\b|Microsoft\.PowerShell_profile\.ps1|profile\.ps1|\\WindowsPowerShell\\Profile\.ps1|\\PowerShell\\[0-9]+\\Profile\.ps1)'

  - id: powershell-profile-write
    desc: PowerShell profile write persistence
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)(>>?|Set-Content|Add-Content|Out-File|New-Item).{0,160}(\$PROFILE\b|Microsoft\.PowerShell_profile\.ps1|profile\.ps1)'
