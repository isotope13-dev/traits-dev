defaults:
  platforms: [unix]
  for: [csharp]
  attack: T1546.004

traits:
  - id: dotnet-hidden-login-script
    desc: .NET hidden login script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.system-health-check\.sh[\s\S]{0,160}FileAttributes\.Hidden'

  - id: dotnet-bashrc-health-hook
    desc: .NET bashrc health hook
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.bashrc[\s\S]{0,220}netscaler-health-check'

  - id: dotnet-autostart-desktop-entry
    desc: .NET autostart desktop entry
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: system-health-monitor.desktop

composite_rules:
  - id: dotnet-login-shell-persistence
    desc: .NET login shell persistence
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-hidden-login-script
      - id: dotnet-bashrc-health-hook
    any:
      - id: dotnet-autostart-desktop-entry
