defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1037.004

traits:
  - id: qnx-perl-hidden-agent-path
    desc: QNX Perl hidden agent path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.X11-unix/.agent_

  - id: qnx-perl-profiled-hook
    desc: QNX Perl profiled hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/profile.d/.system-update.sh

  - id: qnx-perl-crontab-reaper
    desc: QNX Perl crontab reaper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.X11-unix/.agent_*/reaper

composite_rules:
  - id: qnx-perl-login-cron-persistence
    desc: QNX Perl login cron persistence
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-hidden-agent-path
      - id: qnx-perl-profiled-hook
      - id: qnx-perl-crontab-reaper
