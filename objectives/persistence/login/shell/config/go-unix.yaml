defaults:
  platforms: [netbsd, unix]
  for: [go]
  attack: T1037.004

traits:
  - id: go-profile-hook-files
    desc: Go shell profile hook files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.profile[\s\S]{0,160}\.shrc[\s\S]{0,160}\.cshrc'

  - id: go-hidden-sysmon-launcher
    desc: Go hidden sysmon launcher
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.sysmon

composite_rules:
  - id: go-shell-profile-hook
    desc: Go shell profile hook
    crit: hostile
    conf: 0.98
    all:
      - id: go-profile-hook-files
      - id: go-hidden-sysmon-launcher
