# PATH-hijack persistence (T1574.007). A payload staged in a hidden home
# directory is prepended to $PATH via a shell rc file, so the dropped binary
# shadows real system commands (e.g. a fake `sudo`) in every future shell.
# Fetching to a dotdir + prepending it is also what some legitimate installers
# do (rustup → ~/.cargo/bin), so that pairing is only *suspicious*; the
# definitively-hostile evasion (hiding the line mid-file) lives in
# objectives/evasion/masquerade/config-insert.
defaults:
  platforms: [unix]
  for: [shell]
  attack: T1574.007
traits:
  - id: shell-path-prepend-export
    desc: Prepends a directory ahead of $PATH
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'export\s+PATH=\S*:\$PATH'
  # The hijack proper: the dir prepended ahead of $PATH is itself a hidden home
  # dotdir (the dropped-payload location), e.g. `export PATH=$HOME/.evil:$PATH`.
  # This is the load-bearing signal -- build scripts that prepend a *visible*
  # toolchain dir (/opt/flutter/bin, /usr/lib/jvm/.../bin, ./flutter/bin) do not
  # match, which removes the dominant false-positive class.
  - id: shell-path-prepend-hidden-dotdir
    desc: Prepends hidden dotdir to $PATH
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: 'export\s+PATH=["'']?(~|\$HOME)/\.[\w./-]+:\$PATH'
composite_rules:
  - id: hidden-dropper-path-hijack
    desc: Fetches payload to hidden dir, prepends PATH
    crit: suspicious
    conf: 0.8
    # Both legs must land in ONE script: a real dropper fetches a payload and
    # prepends its hidden dir to $PATH in the same place. scope: leaf stops an
    # archive (source repo) from pooling the legs across unrelated build files.
    scope: leaf
    all:
      - id: shell-path-prepend-hidden-dotdir
      - id: micro-behaviors/communications/http/download/curl::wget-cmd
