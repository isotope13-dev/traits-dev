defaults:
  platforms: [unix, appliance]
  for: [javascript, typescript]
  attack: T1037.004

traits:
  - id: node-bashrc-nohup-self
    desc: Node bashrc nohup self
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.bashrc[\s\S]{0,220}nohup /usr/bin/node[\s\S]{0,120}__filename'
  - id: node-shell-rc-targets
    desc: Node references user shell rc files
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.bashrc[\s\S]{0,180}\.zshrc[\s\S]{0,180}\.profile'
  - id: node-e-require-activation-hook
    desc: Node inline require activation hook
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'node\s+-e\s+"try\{require\(\\"[^"\\]{1,80}\\"\)\.[A-Za-z0-9_$.]{1,80}\('

composite_rules:
  - id: node-shell-profile-persistence
    desc: Node shell profile persistence
    crit: hostile
    conf: 0.98
    all:
      - id: node-bashrc-nohup-self
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
  - id: node-shell-rc-require-persistence
    desc: Node shell rc require persistence
    crit: hostile
    conf: 0.98
    all:
      - id: node-shell-rc-targets
      - id: node-e-require-activation-hook
      - id: micro-behaviors/fs/write/file/direct::append-file-sync
