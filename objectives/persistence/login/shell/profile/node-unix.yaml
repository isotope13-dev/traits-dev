defaults:
  platforms: [unix, appliance]
  for: [javascript, typescript]
  attack: T1037.004

traits:
  - id: node-bashrc-nohup-self
    desc: Node bashrc nohup self
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.bashrc[\s\S]{0,220}nohup /usr/bin/node[\s\S]{0,120}__filename'

composite_rules:
  - id: node-shell-profile-persistence
    desc: Node shell profile persistence
    crit: hostile
    conf: 0.98
    all:
      - id: node-bashrc-nohup-self
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
