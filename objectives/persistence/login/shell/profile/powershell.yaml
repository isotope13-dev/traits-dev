defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1037

traits:
  - id: ps-hook-c2-profile-script
    desc: PowerShell profile hook C2 script
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: hookC2

  - id: ps-hook-c2-invoke-rest
    desc: PowerShell hookC2 REST call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'Invoke-RestMethod -Uri `$hookC2'

  - id: ps-hidden-encoded-logon-task
    desc: PowerShell hidden encoded logon task
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: EncodedCommand $encodedHook

composite_rules:
  - id: ps-profile-c2-hook-persistence
    desc: PowerShell profile C2 hook
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/write/file/direct::powershell-profile-write
      - id: ps-hook-c2-profile-script
      - id: ps-hook-c2-invoke-rest
    any:
      - id: ps-hidden-encoded-logon-task
      - id: micro-behaviors/os/autorun/scheduled::schtask-trigger-at-logon
      - id: micro-behaviors/os/autorun/scheduled::register-scheduledtask
