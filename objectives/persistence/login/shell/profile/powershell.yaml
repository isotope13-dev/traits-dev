defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1037

traits:
  - id: ps-profile-hook-target
    desc: PowerShell profile hook target
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: $PROFILE.CurrentUserCurrentHost

  - id: ps-hook-c2-profile-script
    desc: PowerShell profile hook C2 script
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: hookC2

  - id: ps-hook-c2-invoke-rest
    desc: PowerShell hookC2 REST call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'Invoke-RestMethod -Uri `$hookC2'

  - id: ps-hidden-encoded-logon-task
    desc: PowerShell hidden encoded logon task
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: EncodedCommand $encodedHook

  - id: ps-logon-task-trigger
    desc: PowerShell logon task trigger
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: New-ScheduledTaskTrigger -AtLogOn

composite_rules:
  - id: ps-profile-c2-hook-persistence
    desc: PowerShell profile C2 hook
    crit: hostile
    conf: 0.98
    all:
      - id: ps-profile-hook-target
      - id: ps-hook-c2-profile-script
      - id: ps-hook-c2-invoke-rest
    any:
      - id: ps-hidden-encoded-logon-task
      - id: ps-logon-task-trigger
      - id: objectives/persistence/login/scheduled-task/cmdlet::register-scheduledtask
