defaults:
  platforms: [unix, appliance]
  for: [python, pyc]
  attack: T1037

traits:
  - id: python-login-profile-targets
    desc: Python login profile targets
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '~/.bashrc[\s\S]{0,220}~/.profile'
    unless:
      - id: well-known/app/calvyn-code

  - id: python-pam-login-hook
    desc: Python PAM login hook
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: pam_exec.so expose_authtok

  - id: python-cron-callback-entry
    desc: Python cron callback entry
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'crontab[\s\S]{0,260}(heartbeat|keepalive|beacon)'

  - id: python-profile-backdoor-script
    desc: Python profile backdoor script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'backdoor\.sh|system health check daemon'


composite_rules:
  - id: python-login-profile-persistence
    desc: Python login profile persistence
    crit: hostile
    conf: 0.98
    all:
      - id: python-login-profile-targets
    any:
      - id: python-pam-login-hook
      - id: python-cron-callback-entry
      - id: python-profile-backdoor-script

  - id: python-pyc-login-persistence
    desc: Python bytecode login persistence
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: python-profile-backdoor-script
    any:
      - id: python-pam-login-hook
      - id: objectives/persistence/system/cron/job::python-pyc-self-cron-entry
