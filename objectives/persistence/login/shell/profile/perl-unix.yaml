defaults:
  platforms: [unix]
  for: [perl]
  attack: T1546.004

traits:
  - id: perl-login-profile-targets
    desc: Perl login profile targets
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "'/etc/profile', '/etc/.profile'"

  - id: perl-login-payload-line
    desc: Perl login payload line
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "perl '$SELF' >/dev/null 2>&1"

  - id: perl-etc-profile-helper-append
    desc: Perl appends /etc/profile helper
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/etc/profile[\s\S]{0,420}/usr/lpp/perl/bin/perl /tmp/\.[A-Za-z0-9._-]+'

  - id: perl-zos-login-command-files
    desc: Perl z/OS login command files
    crit: suspicious
    conf: 0.94
    platforms: [zos]
    if:
      type: text
      regex: '/etc/logincl[\s\S]{0,180}/etc/loginuc[\s\S]{0,180}/etc/loginre'

  - id: perl-zos-call-hidden-helper
    desc: Perl z/OS CALL hidden helper
    crit: suspicious
    conf: 0.94
    platforms: [zos]
    if:
      type: text
      regex: "CALL '/tmp/\\.[A-Za-z0-9._-]+'"

composite_rules:
  - id: perl-etc-profile-helper-persistence
    desc: Perl /etc/profile helper persistence
    crit: hostile
    conf: 0.98
    all:
      - id: perl-etc-profile-helper-append
      - id: objectives/command-and-control/dropper/delivery/download-execute::stage-path-tmp

  - id: perl-login-shell-persistence
    desc: Perl login shell persistence
    crit: hostile
    conf: 0.98
    all:
      - id: perl-login-profile-targets
      - id: perl-login-payload-line

  - id: perl-zos-login-command-persistence
    desc: Perl z/OS login command persistence
    crit: hostile
    conf: 0.98
    platforms: [zos]
    all:
      - id: perl-zos-login-command-files
      - id: perl-zos-call-hidden-helper
