# freedesktop.org Desktop Entry persistence signals.
#
# The neutral structural fields (Type, Exec, Terminal, OnlyShowIn/NotShowIn,
# session-definition path) live in metadata/file/format::desktop-*; the
# atoms here are the ones that carry persistence/conceal intent. Composites
# assemble user-session autostart behavior from both.
defaults:
  platforms: [linux]
  for: [desktop-entry]
  mbc: F0012
  attack: T1547.013

traits:
  - id: hidden-true
    desc: Desktop entry Hidden=true
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: desktop_entry.hidden
      exact: "true"
    unless:
      # Session-definition entries under wayland-sessions/ or xsessions/ are read
      # by the display manager, not the autostart system. Hidden=true there means
      # "don't offer as a separately selectable session" (treeland launches via
      # dde-session as a single wayland session) — a normal packaging idiom, not
      # an attempt to conceal an autostarted payload from the user.
      - id: metadata/file/format::desktop-session-definition-path

  - id: no-display-true
    desc: Desktop entry NoDisplay=true
    crit: notable
    conf: 0.7
    if:
      type: value
      path: desktop_entry.no_display
      exact: "true"

  - id: gnome-autostart-enabled
    desc: GNOME autostart explicitly enabled
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: desktop_entry.x_gnome_autostart_enabled
      exact: "true"

  - id: gnome-autostart-delay
    desc: GNOME autostart delay configured
    crit: suspicious
    conf: 0.75
    if:
      type: value
      path: desktop_entry.x_gnome_autostart_delay
      exists: true

  - id: kde-autostart-script
    desc: KDE autostart script path
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: desktop_entry.x_kde_autostart_script
      exists: true

  - id: kde-autostart-after
    desc: KDE autostart ordering directive
    crit: suspicious
    conf: 0.75
    if:
      type: value
      path: desktop_entry.x_kde_autostart_after
      exists: true

  - id: kde-autostart-condition
    desc: KDE autostart conditional activation
    crit: suspicious
    conf: 0.75
    if:
      type: value
      path: desktop_entry.x_kde_autostart_condition
      exists: true

  - id: kde-substitute-uid-true
    desc: KDE SubstituteUID=true
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: desktop_entry.x_kde_substitute_uid
      exact: "true"

  - id: kde-username-root
    desc: Desktop entry runs as root
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: desktop_entry.x_kde_username
      exact: root

composite_rules:
  - id: desktop-launcher
    desc: Desktop Entry headless launcher
    crit: component
    all:
      - id: metadata/file/format::desktop-type-application
      - id: metadata/file/format::desktop-exec-present
      - id: metadata/file/format::desktop-terminal-hidden

  - id: autostart-enabled
    desc: Desktop Entry autostart configured
    crit: suspicious
    conf: 0.9
    any:
      - id: gnome-autostart-enabled
      - id: kde-autostart-script
      - id: kde-autostart-after
      - id: kde-autostart-condition
      - id: gnome-autostart-delay

  - id: desktop-privilege-change
    desc: Desktop Entry changes user context
    crit: suspicious
    conf: 0.9
    any:
      - id: kde-substitute-uid-true
      - id: kde-username-root

  - id: desktop-hidden-entry
    desc: Desktop Entry hidden from user
    crit: suspicious
    conf: 0.8
    all:
      - id: hidden-true
      - id: metadata/file/format::desktop-exec-present
    unless:
      # See hidden-true: a display-manager session file legitimately carries both
      # Exec= and Hidden=true; that combination is the session-launch idiom, not a
      # concealed launcher. The composite must also exclude it (a composite leg
      # bypasses the referenced atom's own unless).
      - id: metadata/file/format::desktop-session-definition-path

  - id: desktop-de-scoped
    desc: Desktop Entry scoped to a DE
    crit: component
    any:
      - id: metadata/file/format::desktop-only-show-in
      - id: metadata/file/format::desktop-not-show-in

  - id: desktop-link-with-exec
    desc: Desktop Link entry has Exec
    crit: suspicious
    conf: 0.8
    all:
      - id: metadata/file/format::desktop-type-link
      - id: metadata/file/format::desktop-exec-present
