# freedesktop.org Desktop Entry persistence signals.
#
# Atoms expose key fields from .desktop files (parsed as kv paths under
# `desktop_entry.*` and `desktop_action_*.*`) so composites can assemble
# user-session autostart behavior.
defaults:
  platforms: [linux]
  for: [desktop-entry]
  mbc: F0012
  attack: T1547.013

traits:
  - id: type-application
    desc: Desktop entry Type=Application
    crit: component
    if:
      type: kv
      path: desktop_entry.type
      exact: Application

  - id: type-link
    desc: Desktop entry Type=Link
    crit: component
    if:
      type: kv
      path: desktop_entry.type
      exact: Link

  - id: exec-present
    desc: Desktop entry has Exec directive
    crit: component
    if:
      type: kv
      path: desktop_entry.exec
      exists: true

  - id: terminal-hidden
    desc: Desktop entry Terminal=false
    crit: component
    if:
      type: kv
      path: desktop_entry.terminal
      exact: "false"

  - id: hidden-true
    desc: Desktop entry Hidden=true
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: desktop_entry.hidden
      exact: "true"

  - id: no-display-true
    desc: Desktop entry NoDisplay=true
    crit: notable
    conf: 0.7
    if:
      type: kv
      path: desktop_entry.no_display
      exact: "true"

  - id: gnome-autostart-enabled
    desc: GNOME autostart explicitly enabled
    crit: notable
    conf: 0.9
    if:
      type: kv
      path: desktop_entry.x_gnome_autostart_enabled
      exact: "true"

  - id: gnome-autostart-delay
    desc: GNOME autostart delay configured
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: desktop_entry.x_gnome_autostart_delay
      exists: true

  - id: kde-autostart-script
    desc: KDE autostart script path
    crit: notable
    conf: 0.85
    if:
      type: kv
      path: desktop_entry.x_kde_autostart_script
      exists: true

  - id: kde-autostart-after
    desc: KDE autostart ordering directive
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: desktop_entry.x_kde_autostart_after
      exists: true

  - id: kde-autostart-condition
    desc: KDE autostart conditional activation
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: desktop_entry.x_kde_autostart_condition
      exists: true

  - id: kde-substitute-uid-true
    desc: KDE SubstituteUID=true
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: desktop_entry.x_kde_substitute_uid
      exact: "true"

  - id: kde-username-root
    desc: Desktop entry runs as root
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: desktop_entry.x_kde_username
      exact: root

  - id: only-show-in-desktop
    desc: OnlyShowIn restricts desktop environment
    crit: component
    if:
      type: kv
      path: desktop_entry.only_show_in
      exists: true

  - id: not-show-in-desktop
    desc: NotShowIn hides from desktop environment
    crit: component
    if:
      type: kv
      path: desktop_entry.not_show_in
      exists: true

composite_rules:
  - id: desktop-launcher
    desc: Desktop Entry headless launcher
    crit: component
    all:
      - id: type-application
      - id: exec-present
      - id: terminal-hidden

  - id: autostart-enabled
    desc: Desktop Entry autostart configured
    crit: notable
    conf: 0.9
    any:
      - id: gnome-autostart-enabled
      - id: kde-autostart-script
      - id: kde-autostart-after
      - id: kde-autostart-condition
      - id: gnome-autostart-delay

  - id: desktop-privilege-change
    desc: Desktop Entry changes user context
    crit: suspicious
    conf: 0.9
    any:
      - id: kde-substitute-uid-true
      - id: kde-username-root

  - id: desktop-hidden-entry
    desc: Desktop Entry hidden from user
    crit: notable
    conf: 0.8
    any:
      - id: hidden-true
      - id: no-display-true

  - id: desktop-de-scoped
    desc: Desktop Entry scoped to a DE
    crit: component
    any:
      - id: only-show-in-desktop
      - id: not-show-in-desktop

  - id: desktop-link-with-exec
    desc: Desktop Link entry has Exec
    crit: notable
    conf: 0.8
    all:
      - id: type-link
      - id: exec-present
