defaults:
  platforms: [unix]
  for: [c, ruby, elf, python]
  attack: T1547.013

traits:
  - id: source-xdg-autostart-path
    desc: Source XDG autostart path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: .config/autostart

  - id: source-desktop-entry-exec
    desc: Source embeds Desktop Exec
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\[Desktop Entry\][\s\S]{0,260}Type=Application[\s\S]{0,260}Exec='
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: metadata/package/testing/presence/harness/
      - id: well-known/tool/offensive/pwn/
      - id: well-known/app/homebrew::source-tree

  - id: source-nodisplay-desktop-entry
    desc: Source hidden desktop entry
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'NoDisplay=true[\s\S]{0,260}Exec='
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: well-known/app/homebrew::source-tree

  # Terminal=false is the stealth signal used by many Linux droppers that
  # skip NoDisplay (govapkg / similar PyPI persistors).
  - id: source-terminal-false-desktop-entry
    desc: Source desktop entry hides terminal
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\[Desktop Entry\][\s\S]{0,400}Terminal=false'
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: well-known/app/homebrew::source-tree

composite_rules:
  - id: source-xdg-autostart-write
    desc: Source writes XDG autostart
    crit: suspicious
    conf: 0.94
    near_bytes: 512
    all:
      - id: source-xdg-autostart-path
      - id: objectives/persistence/system/init/boot::desktop-entry-header

  - id: source-xdg-autostart-persistence
    desc: Source XDG autostart persistence
    crit: hostile
    conf: 0.98
    all:
      - id: source-xdg-autostart-write
      - id: source-desktop-entry-exec
    any:
      - id: source-nodisplay-desktop-entry
      - id: source-terminal-false-desktop-entry
    unless:
      - id: metadata/package/testing/presence/harness/
