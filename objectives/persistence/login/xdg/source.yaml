defaults:
  platforms: [unix]
  for: [c, ruby, elf]
  attack: T1547.013

traits:
  - id: source-xdg-autostart-write
    desc: Source writes XDG autostart
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.config/autostart[\s\S]{0,260}\.desktop'

  - id: source-desktop-entry-exec
    desc: Source embeds Desktop Exec
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\[Desktop Entry\][\s\S]{0,260}Type=Application[\s\S]{0,260}Exec='

  - id: source-nodisplay-desktop-entry
    desc: Source hidden desktop entry
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'NoDisplay=true[\s\S]{0,260}Exec='

composite_rules:
  - id: source-xdg-autostart-persistence
    desc: Source XDG autostart persistence
    crit: hostile
    conf: 0.98
    all:
      - id: source-xdg-autostart-write
      - id: source-desktop-entry-exec
    any:
      - id: source-nodisplay-desktop-entry
