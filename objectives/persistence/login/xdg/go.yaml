defaults:
  mbc: F0012
  attack: T1547.013
  platforms:
    - linux
    - macos
traits:
  - id: xdg-autostart-user
    desc: XDG user autostart directory with tilde
    crit: suspicious
    conf: 0.8
    for:
      - go
      - elf
      - macho
    if:
      type: text
      substr: ~/.config/autostart
  - id: xdg-autostart-dir-text
    desc: XDG autostart directory text
    crit: component
    conf: 0.8
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: '(\.config/autostart|/etc/xdg/autostart)'
  - id: desktop-file-suffix
    desc: Desktop file suffix
    crit: component
    conf: 0.75
    for: [go, elf, macho, shell, python]
    if:
      type: text
      substr: .desktop
  - id: file-write-word
    desc: File write word
    crit: component
    conf: 0.75
    for: [go, elf, macho, shell, python]
    if:
      type: text
      word: write
  - id: desktop-entry-exec
    desc: Desktop entry Exec directive
    crit: component
    conf: 0.75
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: Exec=.{0,100}/
  - id: kde-autostart-scripts
    desc: KDE Plasma autostart scripts directory
    crit: suspicious
    conf: 0.8
    for: [go, elf, macho, shell, python]
    if:
      type: text
      substr: .config/autostart-scripts
  - id: plasma-autostart
    desc: Plasma autostart pattern
    crit: suspicious
    conf: 0.8
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: plasma.{0,20}autostart
composite_rules:
  - id: desktop-file-write
    desc: XDG autostart desktop file creation
    crit: suspicious
    conf: 0.8
    for: [go, elf, macho, shell, python]
    all:
      - id: xdg-autostart-dir-text
      - id: desktop-file-suffix
      - id: file-write-word
    near_bytes: 160
  - id: xdg-autostart-path
    desc: XDG autostart directory
    crit: suspicious
    conf: 0.8
    for:
      - go
      - elf
    any:
      - id: xdg-autostart-user
      - id: objectives/persistence/system/init/boot::etc-xdg-autostart
  - id: desktop-file-ops
    desc: Desktop file operations
    crit: suspicious
    conf: 0.75
    for:
      - go
      - elf
    any:
      - id: desktop-file-write
      - id: desktop-entry-exec
      - id: objectives/persistence/system/init/boot::desktop-entry-header
  - id: xdg-persistence
    desc: XDG autostart persistence
    crit: suspicious
    conf: 0.9
    for:
      - go
      - elf
    all:
      - id: xdg-autostart-path
      - id: desktop-file-ops
