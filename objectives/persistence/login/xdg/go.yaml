defaults:
  mbc: F0012
  attack: T1547.013
  platforms:
    - linux
    - macos
traits:
  - id: xdg-autostart-user
    desc: XDG user autostart directory with tilde
    crit: notable
    conf: 0.8
    for:
      - go
      - elf
      - macho
    if:
      type: text
      substr: ~/.config/autostart
  - id: desktop-file-write
    desc: Desktop file creation for autostart
    crit: notable
    conf: 0.8
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: \.desktop.{0,30}write|write.{0,30}\.desktop
  - id: desktop-entry-exec
    desc: Desktop entry Exec directive
    crit: notable
    conf: 0.75
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: Exec=.{0,100}/
  - id: kde-autostart-scripts
    desc: KDE Plasma autostart scripts directory
    crit: notable
    conf: 0.8
    for: [go, elf, macho, shell, python]
    if:
      type: text
      substr: .config/autostart-scripts
  - id: plasma-autostart
    desc: Plasma autostart pattern
    crit: notable
    conf: 0.8
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: plasma.{0,20}autostart
  - id: update-rcd
    desc: update-rc.d invocation
    crit: suspicious
    conf: 0.85
    for:
      - shell
    if:
      type: string_literal
      regex: update-rc\.d\b
  - id: initd-path-before-service-action
    desc: init.d path before service action
    crit: notable
    conf: 0.85
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: /etc/init\.d/[^\s"'`|;]{1,96}.{0,20}\s(start|stop|restart)\b
    not:
      - substr: complete -x -p "/etc/init.d/*"
      - substr: -a start --description
      - substr: -a restart --description
      - regex: /etc/init\.d/\*" -a (start|restart) --description
  - id: initd-path-before-install-action
    desc: init.d path before install action
    crit: suspicious
    conf: 0.85
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: /etc/init\.d/[^\s"'`|;]{1,96}.{0,40}\b(install|enable|disable)\b
  - id: install-action-before-initd-path
    desc: Install action before init.d path
    crit: suspicious
    conf: 0.85
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: \b(install|enable|disable)\b.{0,40}/etc/init\.d/[^\s"'`|;]{1,96}
  - id: write-action-before-initd-path
    desc: Write action before init.d path
    crit: suspicious
    conf: 0.85
    for: [go, elf, macho, shell, python]
    unless:
      - id: metadata/build/docker::dockerfile-basename
    if:
      type: text
      regex: \b(copy|write|chmod|chown)\b.{0,40}/etc/init\.d/[^\s"'`|;]{1,96}
  - id: crontab-at-reboot
    desc: Crontab @reboot directive
    crit: suspicious
    conf: 0.9
    for: [go, elf, macho, shell, python]
    if:
      type: text
      word: '@reboot'
  - id: crontab-edit
    desc: Crontab edit operation
    crit: notable
    conf: 0.8
    for: [go, elf, macho, shell, python]
    if:
      type: text
      regex: crontab.{0,10}-e
  - id: hidden-cache-install
    desc: Dot-hidden cache payload path
    crit: suspicious
    conf: 0.85
    for:
      - go
      - elf
    if:
      type: text
      regex: \.cache/\.[a-z][a-z0-9_-]{2,32}(/|$)|\.local/share/\.[a-z][a-z0-9_-]{2,32}(/|$)
    not:
      - substr: .cache/fish/completions
      - substr: .cache/fish/generated
      - substr: .cache/etc/headscale
      - substr: .cache/rust/aarch
      - substr: .local/share/.cache
  - id: masquerade-libssh
    desc: Masquerade as libssh in cache
    crit: suspicious
    conf: 0.85
    for:
      - go
      - elf
    if:
      type: text
      substr: .cache/libssh
  - id: masquerade-libssl
    desc: Masquerade as libssl in cache
    crit: suspicious
    conf: 0.85
    for:
      - go
      - elf
    if:
      type: text
      substr: .cache/libssl
  - id: masquerade-libcrypto
    desc: Masquerade as libcrypto in cache
    crit: suspicious
    conf: 0.85
    for:
      - go
      - elf
    if:
      type: text
      substr: .cache/libcrypto
composite_rules:
  - id: initd-script
    desc: init.d script installation
    crit: suspicious
    conf: 0.85
    for: [go, elf, macho, shell, python]
    any:
      - id: update-rcd
      - id: initd-path-before-service-action
      - id: initd-path-before-install-action
      - id: install-action-before-initd-path
      - id: write-action-before-initd-path
  - id: masquerade-lib
    desc: Masquerade as system library
    crit: suspicious
    conf: 0.85
    for:
      - go
      - elf
    any:
      - id: masquerade-libssh
      - id: masquerade-libssl
      - id: masquerade-libcrypto
  - id: crontab-reboot
    desc: Crontab reboot persistence
    crit: suspicious
    conf: 0.9
    for: [go, elf, macho, shell, python]
    any:
      - id: crontab-at-reboot
      - id: crontab-edit
  - id: xdg-autostart-path
    desc: XDG autostart directory
    crit: notable
    conf: 0.8
    for:
      - go
      - elf
    any:
      - id: xdg-autostart-user
      - id: objectives/persistence/system/init::etc-xdg-autostart
  - id: desktop-file-ops
    desc: Desktop file operations
    crit: notable
    conf: 0.75
    for:
      - go
      - elf
    any:
      - id: desktop-file-write
      - id: desktop-entry-exec
      - id: objectives/persistence/system/init::desktop-entry-header
  - id: system-persistence-path
    desc: System persistence locations
    crit: suspicious
    conf: 0.85
    for:
      - go
      - elf
    any:
      - id: initd-script
      - id: objectives/persistence/login/shell/config::etc-profiled
      - id: objectives/persistence/system/init::etc-xdg-autostart
  - id: linux-evasion
    desc: Linux persistence evasion
    crit: suspicious
    conf: 0.85
    for:
      - go
      - elf
    any:
      - id: hidden-cache-install
      - id: masquerade-lib
      - id: crontab-reboot
  - id: user-autostart
    desc: User-level autostart
    crit: notable
    conf: 0.75
    for:
      - go
      - elf
    any:
      - id: xdg-autostart-user
      - id: crontab-reboot
      - id: kde-autostart-scripts
  - id: xdg-persistence
    desc: XDG autostart persistence
    crit: suspicious
    conf: 0.9
    for:
      - go
      - elf
    all:
      - id: xdg-autostart-path
      - id: desktop-file-ops
  - id: linux-system-persistence
    desc: Linux system-level persistence
    crit: suspicious
    conf: 0.9
    for:
      - go
      - elf
    all:
      - id: system-persistence-path
      - id: linux-evasion
  - id: hidden-linux-persistence
    desc: Hidden Linux persistence with masquerading
    crit: hostile
    conf: 0.95
    for:
      - go
      - elf
    all:
      - id: hidden-cache-install
      - id: masquerade-lib
      - id: user-autostart
