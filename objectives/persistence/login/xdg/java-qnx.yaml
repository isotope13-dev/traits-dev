defaults:
  platforms: [qnx, unix]
  for: [java, class, java_class]
  attack: T1547.013

traits:
  - id: qnx-java-autostart-desktop
    desc: QNX Java autostart desktop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.config/autostart/[^"''\s]{1,80}\.desktop'

  - id: qnx-java-jar-autostart-exec
    desc: QNX Java jar autostart exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Exec=java -jar [^"''\n]{1,120}\.jar'

  - id: qnx-java-gnome-autostart-enabled
    desc: QNX Java GNOME autostart flag
    crit: component
    conf: 0.9
    if:
      type: text
      substr: X-GNOME-Autostart-enabled=true

  - id: qnx-java-bytecode-xdg-autostart
    desc: QNX Java bytecode XDG autostart
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2E 63 6F 6E 66 69 67 2F 61 75 74 6F 73 74 61 72 74

  - id: qnx-java-bytecode-jar-exec
    desc: QNX Java bytecode jar exec
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 45 78 65 63 3D 6A 61 76 61 20 2D 6A 61 72

  - id: qnx-java-bytecode-gnome-autostart
    desc: QNX Java bytecode GNOME autostart
    crit: component
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 58 2D 47 4E 4F 4D 45 2D 41 75 74 6F 73 74 61 72 74

composite_rules:
  - id: qnx-java-xdg-miner-persistence
    desc: QNX Java XDG miner persistence
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-java-autostart-desktop
      - id: qnx-java-jar-autostart-exec
      - id: qnx-java-gnome-autostart-enabled

  - id: qnx-java-bytecode-xdg-persistence
    desc: QNX Java bytecode XDG persistence
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: qnx-java-bytecode-xdg-autostart
      - id: qnx-java-bytecode-jar-exec
      - id: qnx-java-bytecode-gnome-autostart
