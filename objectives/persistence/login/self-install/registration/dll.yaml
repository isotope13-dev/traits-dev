defaults:
  platforms: [windows]
  for: [dll]
  crit: suspicious
  conf: 0.85
composite_rules:
  - id: complex-dll-registration
    desc: COM registration export performs complex actions
    crit: suspicious
    conf: 0.82
    all:
      - id: metadata/binary/symbols/exports::export-dll-register-server
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
    any:
      - id: micro-behaviors/fs/file/copy::copy
      - id: micro-behaviors/process/create/shell/spawn::cmd-exe
    unless:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/binary/installer/sfx/
      - id: well-known/app/internet-explorer/
    downgrade:
      any:
        - id: metadata/signed/platform/
