# Commercial remote-access tools installed as Windows services to gain
# persistent SYSTEM-context access. AnyDesk's --service flag and
# TeamViewer's service-mode install are routinely abused by ransomware
# affiliates (Qilin, BlackBasta, Akira, etc.) to maintain access for
# weeks without endpoint security alerting on what looks like
# legitimate remote-support software.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell]
  attack: T1219
  mbc: B0030
traits:
  - id: anydesk-service-arg
    desc: AnyDesk --service install flag
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'AnyDesk(\.exe)?[^\n]{0,40}--service\b'
      case_insensitive: true
  - id: anydesk-service-registry
    desc: AnyDesk service registered with --service
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'Services\\AnyDesk\b[^\n]{0,400}--service'
      case_insensitive: true
  - id: anydesk-control-arg
    desc: AnyDesk --control unattended-access flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'AnyDesk(\.exe)?[^\n]{0,40}--control\b'
      case_insensitive: true
  - id: teamviewer-service-registry
    desc: TeamViewer service registry entry
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'Services\\TeamViewer\b'
      case_insensitive: true
  - id: teamviewer-service-binary
    desc: TeamViewer_Service.exe binary reference
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'TeamViewer_Service(\.exe)?'
      case_insensitive: true
composite_rules:
  - id: commercial-rat-service-mode
    desc: Commercial RAT installed as Windows service
    crit: hostile
    conf: 0.95
    any:
      - id: anydesk-service-arg
      - id: anydesk-service-registry
      - id: teamviewer-service-registry
      - id: teamviewer-service-binary
