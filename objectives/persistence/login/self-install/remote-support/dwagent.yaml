defaults:
  platforms: [windows]
  for: [pe, batch, powershell]
  attack: T1219
  mbc: B0030

traits:
  - id: dwagent-windows-service-binary
    desc: DWAgent Windows service binary
    crit: component
    conf: 0.97
    if:
      type: text
      regex: '(?i)\bdwagsvc\.exe\b'
  - id: dwagent-windows-launcher-binary
    desc: DWAgent Windows launcher binary
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bdwaglnc\.exe\b'
  - id: dwagent-windows-agent-binary
    desc: DWAgent Windows agent binary
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bdwagent\.exe\b'
composite_rules:
  - id: dwagent-remote-support-install
    desc: DWAgent remote support installed
    crit: suspicious
    conf: 0.96
    all:
      - id: dwagent-windows-agent-binary
      - id: dwagent-windows-service-binary
      - id: dwagent-windows-launcher-binary
