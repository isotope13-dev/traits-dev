defaults:
  platforms: [windows]
  for: [dll]
  crit: suspicious
  conf: 0.85
composite_rules:
  - id: complex-dll-registration
    desc: COM registration export performs complex actions
    all:
      - id: metadata/binary/symbols::export-dll-register-server
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
    any:
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/fs/file/copy::copy
      - id: micro-behaviors/process/create/shell::cmd-exe
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
