defaults:
  for: [pe]
  platforms: [windows]
  attack: T1547.001
  mbc: F0012

traits:
  - id: uimgrbroker-aboutsettingshandlers-path
    desc: UIMgrBroker AboutSettingsHandlers path
    crit: component
    conf: 0.98
    if:
      type: text
      substr: \UIMgrBroker\AboutSettingsHandlers.exe

composite_rules:
  - id: packed-autoit-roaming-self-install-path
    desc: Packed AutoIt Roaming self-install path
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: micro-behaviors/fs/path/location::roaming-appdata-executable-path
      - id: uimgrbroker-aboutsettingshandlers-path
    any:
      - id: metadata/binary/metrics/structural::dominant-section
      - id: metadata/hardening/memory::wx-section
      - id: metadata/binary/symbols/imports::few-import-count
      - id: objectives/anti-static/obfuscation/binary-metrics::max-25-imports
    needs: 2
