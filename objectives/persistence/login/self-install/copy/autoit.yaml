defaults:
  for: [pe]
  platforms: [windows]
  attack: T1547.001
  mbc: F0012

traits:
  - id: uimgrbroker-aboutsettingshandlers-path
    desc: UIMgrBroker AboutSettingsHandlers path
    crit: component
    conf: 0.98
    if:
      type: text
      substr: \UIMgrBroker\AboutSettingsHandlers.exe

composite_rules:
  - id: packed-autoit-roaming-self-install-path
    desc: Packed AutoIt Roaming self-install path
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics/section-names::packed-autoit-encrypted-resource
      - id: micro-behaviors/fs/path/location::roaming-appdata-executable-path
      - id: uimgrbroker-aboutsettingshandlers-path
    any:
      - id: objectives/anti-static/pack/pecompact::pecompact-packer
      - id: objectives/anti-static/obfuscation/binary-metrics::pecompact-artifact
    needs: 1
