# C# self-copy installation patterns
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1547.001"
traits:
  - id: appdata-folder-local
    desc: Local AppData special folder
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "SpecialFolder.LocalApplicationData"
  - id: appdata-folder-common
    desc: Common AppData special folder
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "SpecialFolder.CommonApplicationData"
  - id: file-copy-call
    desc: File.Copy API call
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "File.Copy("
  - id: file-move-call
    desc: File.Move API call
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "File.Move("
  - id: file-copy-current
    desc: File.Copy of current executable
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'File\.Copy\s*\(\s*Configuration\.\w*(Filename|Path)'
  - id: file-copy-self-assembly
    desc: File.Copy via Assembly self-reference
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'File\.Copy\s*\(\s*\w+\.self\.'
  - id: mutex-hwid
    desc: Mutex creation with hardware ID
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'new\s+Mutex\s*\(\s*true\s*,'
  - id: registry-setvalue
    desc: Registry SetValue for persistence
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\.SetValue\s*\(\s*Configuration\.\w+'
  - id: environment-exit
    desc: Environment.Exit after self-restart
    crit: component
    conf: 0.75
    if:
      type: text
      substr: "Environment.Exit(0)"
composite_rules:
  - id: appdata-folder-reference
    desc: AppData special folder reference
    crit: component
    conf: 0.85
    any:
      - id: objectives/persistence/login/startup/registry::specialfolder-appdata
      - id: appdata-folder-local
      - id: appdata-folder-common
  - id: file-copy-or-move-call
    desc: File copy or move API call
    crit: component
    conf: 0.85
    any:
      - id: file-copy-call
      - id: file-move-call
  - id: self-copy-appdata
    desc: Self-copy install into AppData
    crit: suspicious
    conf: 0.9
    all:
      - id: appdata-folder-reference
      - id: file-copy-or-move-call
  - id: self-install-persistence
    desc: Self-copy with registry persistence
    crit: hostile
    conf: 0.95
    any:
      - id: self-copy-appdata
      - id: file-copy-current
      - id: registry-setvalue
      - id: environment-exit
      - id: micro-behaviors/fs/file/attributes::hidden-attribute-usage
    needs: 3
