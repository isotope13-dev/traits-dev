defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1547.001

composite_rules:
  - id: windows-appdata-self-copy
    desc: Self-copy into Windows AppData
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/fs/path/check::get-module-filename
      - id: micro-behaviors/fs/shell-ops::shell-get-folder-path
      - id: micro-behaviors/time/query::get-tick-count
    unless:
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/signed/platform::microsoft
      - id: metadata/package/versioning::pe-version-resource
    downgrade:
      any:
        - id: metadata/signed/developer
        - id: metadata/binary/metrics/structural::many-imports

  - id: windows-systemdir-self-copy-run-key
    desc: Self-copy into Windows system directory
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/fs/path/check::get-module-filename
      - id: micro-behaviors/fs/path/system::windows-system-drop-template
      - id: objectives/persistence/login/startup/registry::software-run-key
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker

  - id: windir-copy-winexec-dropper
    desc: Drop into Windows directory and WinExec
    crit: suspicious
    conf: 0.92
    size_max: 1048576
    all:
      - id: micro-behaviors/os/sysinfo/directories::get-windows-directory
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/process/create/exec::winexec
    any:
      - id: micro-behaviors/fs/file/delete::deletefile-a
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/write/direct::write-file
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/binary/installer/family::known-benign-installer
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics/structural::many-imports

  - id: windir-dropper-registry-persist
    desc: Windows-directory dropper with registry persistence
    crit: hostile
    conf: 0.95
    size_max: 1048576
    all:
      - id: windir-copy-winexec-dropper
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/binary/installer/family::known-benign-installer
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/binary/metrics/threshold::many-exports-100
