defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1547.001

composite_rules:
  - id: windows-systemdir-self-copy-run-key
    desc: Self-copy into Windows system directory
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/fs/path/check::get-module-filename
      - id: micro-behaviors/fs/path/system::windows-system-drop-template
      - id: objectives/persistence/login/startup/registry::software-run-key
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::microsoft-corp-marker
