# Batch File Self-Installation/Persistence
# ATT&CK: T1547.001 (Boot or Logon Autostart Execution)
#
# Detects batch files that copy themselves for persistence
defaults:
  attack: "T1547.001"
  crit: suspicious
  for: [batch]
  platforms: [windows]
traits:
  # Self-copy using %~f0 (full path to current script)
  - id: batch-self-copy
    desc: Batch script copies itself for persistence
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)copy\s+(/[a-z]\s+)?"?%~f0"?'
  # Copy to AppData location
  - id: batch-copy-to-appdata
    desc: Copies file to AppData directory
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)%AppData%[\\\/]'
  # Copy to ProgramData
  - id: batch-copy-to-programdata
    desc: Copies file to ProgramData directory
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)%ProgramData%[\\\/]'
  - id: batch-copy-to-windows-templates
    desc: Copies script into Windows Templates path
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)%AppData%[\\\/]Microsoft[\\\/]Windows[\\\/]Templates[\\\/].{0,80}\.bat'
  # Output suppression (>nul redirects stdout to null device)
  - id: batch-output-suppression
    desc: Output suppression (hiding activity)
    crit: notable
    conf: 0.6
    attack: "T1564.003"
    count_min: 2
    size_max: 10000
    unless:
      - type: basename
        regex: ^GetCommitHash\.bat$
      - type: basename
        regex: ^build-pty4j-libpty\.bat$
    if:
      type: text
      regex: '(?i)>\s*nul'
composite_rules:
  # Self-copy to AppData persistence
  - id: batch-self-install-appdata
    desc: Batch self-installs to AppData
    crit: suspicious
    conf: 0.95
    mbc: "F0004"
    all:
      - id: batch-self-copy
      - id: batch-copy-to-appdata
  - id: batch-hidden-self-install-templates
    desc: Batch self-installs hidden in Templates
    crit: suspicious
    conf: 0.96
    mbc: "F0004"
    all:
      - id: batch-self-copy
      - id: batch-copy-to-windows-templates
      - id: micro-behaviors/fs/file/attributes::attrib-hidden-system
    any:
      - id: batch-output-suppression
      - id: objectives/persistence/login/startup/registry::runonce-cmd-batch-launcher
