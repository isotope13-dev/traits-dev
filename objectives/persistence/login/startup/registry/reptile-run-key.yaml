defaults:
  attack: "T1547.001"
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: reptile-run-key-path
    desc: Reptile Run key path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Run'
  - id: reptile-run-value
    desc: Reptile Run value name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'runkey.{0,48}"virus"'
composite_rules:
  - id: reptile-run-key-persistence
    desc: Reptile registry Run persistence
    crit: suspicious
    conf: 0.98
    all:
      - id: reptile-run-key-path
      - id: reptile-run-value
