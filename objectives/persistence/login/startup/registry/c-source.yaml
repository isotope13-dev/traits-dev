# Windows Registry Run key persistence - C/C++ source
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1547.001
traits:
  - id: currentversion-run-string
    desc: CurrentVersion Run registry path
    crit: notable
    conf: 0.92
    if:
      type: raw
      substr: 'CurrentVersion\Run'
  - id: reg-set-value-ex-source
    desc: RegSetValueEx registry write API
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: "RegSetValueEx"
  - id: reg-open-key-ex-source
    desc: RegOpenKeyEx registry access API
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: "RegOpenKeyEx"
  - id: hklm-hkcu-pair
    desc: Both HKLM and HKCU registry hives
    crit: component
    conf: 0.85
    if:
      type: raw
      substr: "HKEY_LOCAL_MACHINE"
  - id: copy-to-sysdir-source
    desc: Copy file to system directory
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: "GetSystemDirectory"
composite_rules:
  - id: registry-run-persistence-source
    desc: Registry Run key persistence in source
    crit: suspicious
    conf: 0.93
    all:
      - id: reg-set-value-ex-source
      - id: reg-open-key-ex-source
    any:
      - id: currentversion-run-string
      - id: hklm-hkcu-pair
    needs: 1
  - id: self-install-persistence
    desc: Self-copy and registry persistence
    crit: suspicious
    conf: 0.94
    all:
      - id: registry-run-persistence-source
      - id: copy-to-sysdir-source
