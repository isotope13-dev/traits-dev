# Windows Registry Run key persistence - C/C++ source
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1547.001
traits:
  - id: hklm-registry-hive
    desc: HKLM registry hive string
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "HKEY_LOCAL_MACHINE"
  - id: hkcu-registry-hive
    desc: HKCU registry hive string
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "HKEY_CURRENT_USER"

  - id: reg-set-value-ex-source
    desc: RegSetValueEx registry write API
    crit: component
    conf: 0.88
    if:
      type: symbol
      exact: "RegSetValueExA"
    unless:
      - type: text
        substr: 'CurrentVersion\\Uninstall'
  - id: reg-open-key-ex-source
    desc: RegOpenKeyEx registry access API
    crit: component
    conf: 0.88
    if:
      type: symbol
      exact: "RegOpenKeyExA"
    unless:
      - type: text
        substr: 'CurrentVersion\\Uninstall'
  - id: reg-notify-change-key-value-source
    desc: RegNotifyChangeKeyValue registry watch API
    crit: component
    conf: 0.88
    if:
      type: symbol
      exact: "RegNotifyChangeKeyValueA"
  - id: copy-to-sysdir-source
    desc: Copy file to system directory
    crit: component
    conf: 0.88
    if:
      type: symbol
      exact: "GetSystemDirectoryA"
composite_rules:
  - id: hklm-hkcu-pair
    desc: Both HKLM and HKCU registry hives
    crit: component
    conf: 0.85
    all:
      - id: hklm-registry-hive
      - id: hkcu-registry-hive
  - id: registry-run-persistence-source
    desc: Registry Run key persistence in source
    crit: suspicious
    conf: 0.93
    all:
      - id: reg-set-value-ex-source
      - id: reg-open-key-ex-source
      - id: micro-behaviors/os/registry/keys::currentversion-run
    unless:
      - id: reg-notify-change-key-value-source
  - id: self-install-persistence
    desc: Self-copy and registry persistence
    crit: suspicious
    conf: 0.94
    all:
      - id: registry-run-persistence-source
      - id: copy-to-sysdir-source
      - id: hklm-hkcu-pair
