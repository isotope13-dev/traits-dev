defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1037.001
traits:
  - id: logon-script-registry
    desc: Windows logon script persistence
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)UserInitMprLogonScript|\\Group Policy\\Scripts\\Logon|\\Scripts\\Logon|\\Policies\\System\\Scripts'

composite_rules:
  - id: logon-script-registry-write
    desc: Windows logon script registry write
    crit: suspicious
    conf: 0.9
    all:
      - id: logon-script-registry
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/signed/platform::microsoft-corporation
