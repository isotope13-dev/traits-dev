defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1037.001
traits:
- id: logon-script-registry--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)UserInitMprLogonScript'

  count_max: 1023654
- id: logon-script-registry--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: \Group Policy\Scripts\Logon
  count_max: 1023655
- id: logon-script-registry--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: \Scripts\Logon
  count_max: 1023656
- id: logon-script-registry--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: \Policies\System\Scripts
  count_max: 1023657
composite_rules:
- id: logon-script-registry-write
  desc: Windows logon script registry write
  crit: suspicious
  conf: 0.9
  all:
  - id: logon-script-registry
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/signed/platform::microsoft-corporation
- id: logon-script-registry
  desc: Windows logon script persistence
  crit: suspicious
  conf: 0.86
  any:
  - id: logon-script-registry--rx-1
  - id: logon-script-registry--rx-2
  - id: logon-script-registry--rx-3
  - id: logon-script-registry--rx-4
