defaults:
  attack: T1547.001
  crit: suspicious
  for:
    - pe
    - oledoc
    - powershell
    - batch
    - csharp
  platforms:
    - windows
traits:
  - id: start-menu-startup
    desc: Start Menu Programs Startup path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \\{1,2}Start Menu\\{1,2}Programs\\{1,2}Startup
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: appdata-startup
    desc: AppData Roaming Startup path
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: Roaming.{1,50}Programs.{1,20}Startup
  - id: shell-startup
    desc: shell:startup special folder
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: shell:startup
  - id: software-run-key
    desc: SOFTWARE CurrentVersion Run path
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: SOFTWARE\Microsoft\Windows\CurrentVersion\Run
  - id: startupapproved-run-key
    desc: StartupApproved Run registry path
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: Software\Microsoft\Windows\CurrentVersion\Explorer\StartupApproved\Run
  - id: hkcu-run
    desc: HKCU Run key reference
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: HKCU.{0,50}Run
  - id: hklm-run
    desc: HKLM Run key reference
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: HKLM.{0,50}Run
  - id: currentversion-run
    desc: CurrentVersion Run path
    crit: component
    conf: 0.7
    if:
      type: text
      substr: CurrentVersion\Run
  - id: windows-registry-run-access
    desc: Accesses Windows registry Run key
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: (?i)currentversion\\run
  - id: script-style-run-value
    desc: Script-like Run value name
    crit: component
    conf: 0.78
    if:
      type: text
      regex: (?i)\b[a-z]{4,}[_-]script\d{2,}\b
  - id: run-key-wscript-vbs-launcher
    desc: Run key launches WScript VBS
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: (?is)CurrentVersion\\Run.{0,120}wscript\.exe.{0,220}\.vbs
  - id: currentversion-windows-key
    desc: CurrentVersion Windows key path
    crit: notable
    conf: 0.72
    if:
      type: text
      exact: \Software\Microsoft\Windows NT\CurrentVersion\Windows
  - id: run-value-name
    desc: Run value name string
    crit: component
    conf: 0.6
    if:
      type: text
      exact: Run
  - id: runonce-word
    desc: RunOnce keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)(\\|/)RunOnce(\\|$)
  - id: import-winreg
    desc: import winreg statement
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: import winreg
  - id: from-winreg
    desc: from winreg import
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: from winreg
  - id: underscore-winreg
    desc: _winreg module (Python 2)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: _winreg
  - id: openkey-hkey
    desc: OpenKey HKEY call
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: OpenKey.{0,30}HKEY
  - id: setvalueex
    desc: SetValueEx call
    crit: component
    conf: 0.6
    for:
      - powershell
      - batch
    if:
      type: text
      regex: SetValueEx\b
  - id: createkey
    desc: CreateKey call
    crit: component
    conf: 0.6
    for:
      - powershell
      - batch
    if:
      type: text
      substr: CreateKey
  - id: schtasks-create-cmd
    desc: schtasks /create command
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: schtasks\s*/create
  - id: schtasks-exe-create
    desc: schtasks.exe create
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: schtasks\.exe.{0,30}create
  - id: itaskscheduler-iface
    desc: ITaskScheduler interface
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: ITaskScheduler
  - id: taskscheduler-word
    desc: TaskScheduler keyword
    crit: component
    conf: 0.6
    if:
      type: text
      word: TaskScheduler
  - id: sc-create-cmd
    desc: sc create command
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: sc\s+create
  - id: createservice-api
    desc: CreateService API
    crit: notable
    conf: 0.7
    if:
      type: text
      word: CreateService
  - id: installservice-fn
    desc: InstallService function
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: InstallService\s*\(
  - id: win32serviceutil-mod
    desc: win32serviceutil module
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: win32serviceutil
  - id: lnk-endswith-filter
    desc: Filters files by .lnk extension
    crit: component
    conf: 0.8
    if:
      type: text
      substr: .lnk
  - id: endswith-filter-content
    desc: Python endswith file extension filter
    crit: component
    conf: 0.65
    if:
      type: text
      substr: .endswith(
  - id: create-shortcut
    desc: COM CreateShortcut method call
    crit: notable
    conf: 0.75
    for:
      - pe
      - powershell
      - batch
      - csharp
    not:
      - id: metadata/binary/installer/script::nsis
    if:
      type: text
      substr: CreateShortcut
  - id: shortcut-target-path
    desc: Shortcut TargetPath property access
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: .TargetPath
  - id: shortcut-arguments-property
    desc: Shortcut Arguments property access
    crit: component
    conf: 0.72
    if:
      type: text
      substr: .Arguments
  - id: iwshshortcut-type
    desc: IWshShortcut type reference
    crit: component
    conf: 0.72
    if:
      type: text
      exact: IWshShortcut
  - id: shortcut-save
    desc: Shortcut Save method call
    crit: component
    conf: 0.6
    if:
      type: text
      substr: .Save()
  - id: windows-powershell-registry
    desc: Modifies registry for persistence via
    conf: 0.9
    crit: notable
    if:
      type: trait
      id: objectives/persistence/login/registry/autostart::run-key-write-ps
  - id: six-py-basename
    desc: six.py compatibility file
    crit: component
    if:
      type: basename
      exact: six.py
composite_rules:
  - id: windows-startup-folder
    desc: Targets Windows Startup folder for persistence
    conf: 0.85
    crit: suspicious
    any:
      - id: start-menu-startup
      - id: appdata-startup
      - id: shell-startup
  - id: windows-registry-run
    desc: Accesses Windows registry Run key
    conf: 0.9
    crit: notable
    any:
      - id: software-run-key
      - id: hkcu-run
  - id: windows-run-key-script-launcher
    desc: Run key persists script launcher
    crit: suspicious
    conf: 0.96
    all:
      - id: windows-registry-run
      - id: run-key-wscript-vbs-launcher
      - id: hklm-run
      - id: currentversion-run
      - id: windows-registry-run-access
    any:
      - id: script-style-run-value
    downgrade:
      any:
        - id: metadata/package::versioned
  - id: windows-registry-windows-run-value
    desc: Writes Run value in Windows key
    conf: 0.9
    crit: suspicious
    all:
      - id: currentversion-windows-key
      - id: run-value-name
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-w
  - id: windows-registry-runonce
    desc: Accesses Windows registry RunOnce key
    conf: 0.9
    crit: suspicious
    any:
      - id: objectives/persistence/login/registry/autostart::run-once-key
      - id: runonce-word
  - id: windows-python-winreg-import
    desc: Imports Python winreg module for
    conf: 0.7
    crit: notable
    any:
      - id: import-winreg
      - id: from-winreg
      - id: underscore-winreg
  - id: windows-python-winreg
    desc: Accesses Windows registry via Python
    conf: 0.8
    crit: notable
    size_max: 5000
    any:
      - id: import-winreg
      - id: from-winreg
      - id: underscore-winreg
      - id: openkey-hkey
      - id: setvalueex
      - id: createkey
    unless:
      - id: six-py-basename
  - id: windows-schtasks
    desc: Creates scheduled task for persistence
    conf: 0.85
    crit: notable
    attack: T1053.005
    size_max: 500000
    any:
      - id: schtasks-create-cmd
      - id: schtasks-exe-create
      - id: itaskscheduler-iface
      - id: taskscheduler-word
  - id: windows-schtasks-create
    desc: Creates Windows scheduled task
    conf: 0.8
    crit: notable
    attack: T1053.005
    size_max: 500000
    any:
      - id: schtasks-create-cmd
      - id: schtasks-exe-create
  - id: shortcut-arguments
    desc: Shortcut Arguments used with shortcut API
    conf: 0.8
    crit: notable
    all:
      - id: shortcut-arguments-property
    any:
      - id: create-shortcut
      - id: iwshshortcut-type
  - id: windows-service-install
    desc: Installs Windows service for persistence
    conf: 0.85
    attack: T1543.003
    any:
      - id: sc-create-cmd
      - id: createservice-api
      - id: installservice-fn
      - id: win32serviceutil-mod
  - id: windows-wmi-persistence
    desc: Sets up WMI event subscription
    conf: 0.9
    crit: suspicious
    attack: T1546.003
    any:
      - id: objectives/persistence/system/wmi/subscription::wmi-event-filter
      - id: objectives/persistence/system/wmi/subscription::wmi-commandline-consumer
      - id: objectives/persistence/system/wmi/subscription::wmi-activescript-consumer
  - id: windows-python-reg-persistence
    desc: Python Windows registry persistence
    crit: suspicious
    conf: 0.95
    mbc: F0006
    all:
      - id: windows-python-winreg-import
      - id: windows-registry-run-access
  - id: windows-shortcut-hijack
    desc: Windows shortcut hijacking via COM
    crit: suspicious
    conf: 0.9
    attack: T1547.009
    all:
      - id: create-shortcut
      - id: shortcut-target-path
      - id: shortcut-save
  - id: windows-shortcut-argument-injection
    desc: Shortcut argument injection via COM
    crit: suspicious
    conf: 0.9
    attack: T1547.009
    all:
      - id: create-shortcut
      - id: shortcut-arguments
      - id: shortcut-save
  - id: windows-shortcut-walk-modify
    desc: Enumerates and modifies shortcut files
    crit: suspicious
    conf: 0.9
    attack: T1547.009
    all:
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
      - id: create-shortcut
    any:
      - id: lnk-endswith-filter
      - id: endswith-filter-content
  - id: windows-native-shortcut-startup-tamper
    desc: Native startup shortcut and registry tamper chain
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/persistence/login/startup/folder::startup-folder-shell-api-chain
      - id: lnk-endswith-filter
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    any:
      - id: micro-behaviors/os/registry/access::internet-settings-autodial-tamper
      - id: micro-behaviors/process/create/spawn::create-process-a
  - id: pe-startup-folder-registry-persistence
    desc: Startup folder persistence with registry fingerprinting
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/persistence/login/startup/folder::startup-folder-shell-path-composition-chain
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    any:
      - id: micro-behaviors/process/sync/mutex::guid-mutex
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/process/create/spawn::create-process-w
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::msvc
  - id: pe-run-key-self-install
    desc: PE self-copies and persists via Run key
    crit: suspicious
    conf: 0.92
    for: [pe, dll]
    all:
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: software-run-key
    any:
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
      - id: micro-behaviors/fs/path/check::get-module-filename
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/binary/metrics::many-imports
  - id: windows-shortcut-walk-argument-inject
    desc: Enumerates shortcuts and injects arguments
    crit: hostile
    conf: 0.95
    attack: T1547.009
    mbc: F0012
    all:
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
      - id: create-shortcut
      - id: shortcut-arguments
      - id: shortcut-save
  - id: windows-schtasks-payload
    desc: Scheduled task with executable payload
    crit: suspicious
    conf: 0.95
    attack: T1053.005
    mbc: F0006
    all:
      - id: windows-schtasks-create
      - id: micro-behaviors/process/create/shell::cmd-exe
