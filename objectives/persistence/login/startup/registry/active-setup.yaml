defaults:
  for:
    - pe
    - dll
    - csharp
    - vbs
    - batch
    - powershell
  platforms:
    - windows
  crit: suspicious
  conf: 0.85
traits:
  - id: active-setup-key
    desc: Windows Active Setup registry key
    attack: T1547.014
    if:
      type: text
      case_insensitive: true
      substr: Active Setup\Installed Components
    unless:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/signed/platform::microsoft-code-signing-pca-2011
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
  - id: active-setup-stubpath
    desc: Active Setup StubPath value name
    crit: component
    conf: 0.95
    attack: T1547.014
    if:
      type: text
      exact: stubpath
composite_rules:
  - id: active-setup-persistence-indicator
    desc: Active Setup registry persistence indicator
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/os/registry/access::active-setup-fragment
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    unless:
      - id: well-known/lib/advanced-inf::advanced-inf-setup-context
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: active-setup-stubpath-persistence
    desc: Active Setup StubPath persistence
    crit: suspicious
    conf: 0.93
    all:
      - id: active-setup-key
      - id: active-setup-stubpath
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
