defaults:
  for:
    - pe
    - pe
  platforms:
    - windows
  attack: T1547.001
traits:
  - id: windows-error-reporting-value
    desc: WindowsErrorReporting Run value
    crit: component
    conf: 0.95
    if:
      type: text
      exact: WindowsErrorReporting
      section: .rdata
composite_rules:
  - id: windows-error-reporting-run-key
    desc: WindowsErrorReporting Run key persistence
    crit: suspicious
    conf: 0.96
    all:
      - id: windows-error-reporting-value
    any:
      - id: objectives/persistence/login/startup/registry::software-run-key
      - id: objectives/persistence/login/startup/registry::currentversion-run
      - id: objectives/persistence/login/startup/registry::windows-registry-run-access
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-a
