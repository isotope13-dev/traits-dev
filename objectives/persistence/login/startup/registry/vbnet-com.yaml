defaults:
  platforms: [windows]
  for: [csharp]
  attack: "T1547.001"
traits:
  - id: createobject-wscript-shell
    desc: WScript.Shell COM object creation
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'CreateObject\(.{1,60}WScript\.Shell'
      case_insensitive: true
  - id: interaction-createobject
    desc: VB.NET COM object creation
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: "Interaction.CreateObject("
  - id: late-bound-regwrite
    desc: Late-bound registry write call
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: '"regwrite"'
      case_insensitive: true
  - id: vbnet-filecopy
    desc: VB.NET FileSystem.FileCopy operation
    crit: notable
    conf: 0.80
    if:
      type: text
      substr: "FileSystem.FileCopy"
  - id: specialfolder-appdata
    desc: SpecialFolder.ApplicationData path
    crit: component
    conf: 0.80
    if:
      type: text
      substr: "SpecialFolder.ApplicationData"
  - id: convert-frombase64
    desc: Convert.FromBase64String decoding
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: "Convert.FromBase64String"
  - id: newlatebinding-latecall
    desc: VB.NET late-bound method invocation
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: "NewLateBinding.LateCall("
composite_rules:
  - id: com-registry-persistence
    desc: COM interop registry persistence
    crit: suspicious
    conf: 0.92
    all:
      - id: late-bound-regwrite
    any:
      - id: createobject-wscript-shell
      - id: interaction-createobject
  - id: appdata-self-copy
    desc: Self-copy to AppData directory
    crit: suspicious
    conf: 0.90
    all:
      - id: specialfolder-appdata
    any:
      - id: vbnet-filecopy
      - id: micro-behaviors/fs/read/self::executable-path-self-reference
