defaults:
  platforms:
    - windows
  for:
    - csharp
  attack: T1547.001
traits:
  - id: explorer-run-key
    desc: Explorer policies run key
    crit: suspicious
    conf: 0.98
    if:
      type: string_literal
      exact: SOFTWARE\Microsoft\Windows\CurrentVersion\policies\explorer\run
  - id: localmachine-create-subkey
    desc: HKLM CreateSubKey usage
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Registry.LocalMachine.CreateSubKey
  - id: shutdown-value-name
    desc: Shutdown registry value name
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Program.decrypt("c2h1dGRvd24=")
  - id: currentuser-tracker-key
    desc: Current-user tracking key for Parvalus
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: Software\Retro\Parvalus
  - id: active-value-name
    desc: Activity tracking value name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Program.decrypt("QWN0aXZl")
composite_rules:
  - id: explorer-run-shutdown-persistence
    desc: Registry startup persistence that forces system shutdown on boot
    crit: hostile
    conf: 0.99
    all:
      - id: explorer-run-key
      - id: localmachine-create-subkey
      - id: shutdown-value-name
      - id: objectives/impact/system/shutdown::shutdown-run-command
  - id: parvalus-state-tracking
    desc: Malware state-tracking key under current user hive
    crit: suspicious
    conf: 0.97
    all:
      - id: currentuser-tracker-key
      - id: active-value-name
