defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1547.001

traits:
  - id: encoded-currentversion-run-path
    desc: XOR-obfuscated Windows Run key path
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\\Microsoft\\Windows\\CurrentVersion\\Run(\\|$)'

  - id: encoded-run-key-install-status
    desc: XOR-obfuscated Run key install status
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(Run key registered|installing persistence|Run key is primary|Run key open FAIL)\b'

composite_rules:
  - id: encoded-run-key-persistence
    desc: Encoded Run key persistence setup
    crit: hostile
    conf: 0.99
    all:
      - id: encoded-currentversion-run-path
      - id: encoded-run-key-install-status
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain

