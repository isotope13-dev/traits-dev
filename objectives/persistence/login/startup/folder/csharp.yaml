defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1547.001"
traits:
  - id: startup-folder-drop
    desc: SpecialFolder.Startup persistence
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: "SpecialFolder.Startup"
    unless:
      - type: text
        substr: "AutoStartup"
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/signed/developer
