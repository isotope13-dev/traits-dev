defaults:
  platforms:
    - windows
traits:
  - id: wsh-specialfolders-startup
    desc: WSH Startup folder lookup
    crit: notable
    conf: 0.9
    for:
      - vbs
      - javascript
    if:
      type: text
      substr: 'SpecialFolders("Startup")'
  - id: powershell-copyitem-self-to-startup
    desc: PowerShell copies script to Startup
    crit: suspicious
    conf: 0.95
    for:
      - vbs
      - powershell
    if:
      type: text
      regex: Copy-Item.{0,80}-LiteralPath.{0,80}-Destination
  - id: wscript-scriptfullname-self
    desc: WScript self path reference
    crit: notable
    conf: 0.9
    for:
      - vbs
      - javascript
    if:
      type: text
      substr: WScript.ScriptFullName
  - id: win-startup-path
    desc: Windows Startup folder path reference
    crit: notable
    conf: 0.8
    for:
      - pe
      - powershell
      - batch
      - vbs
    if:
      type: text
      regex: (?i)Microsoft[/\\]Windows[/\\]Start Menu
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
composite_rules:
  - id: vbs-self-copy-startup-folder
    desc: VBScript self-copies to Startup
    crit: hostile
    conf: 0.98
    for:
      - vbs
    attack: T1547.001
    all:
      - id: wsh-specialfolders-startup
      - id: powershell-copyitem-self-to-startup
      - id: wscript-scriptfullname-self
  - id: startup-folder-shell-api-chain
    desc: Resolve startup-like folder via Shell APIs
    crit: notable
    conf: 0.85
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/fs/shell-ops/commands::shell-get-special-folder-location
      - id: micro-behaviors/fs/shell-ops/commands::shell-get-path-from-idlist-a
      - id: win-startup-path
  - id: startup-folder-shell-path-composition-chain
    desc: Resolve startup path and compose file destination
    crit: suspicious
    conf: 0.88
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/fs/shell-ops/commands::shell-get-folder-path
      - id: win-startup-path
    any:
      - id: micro-behaviors/fs/path/construct::path-combine
      - id: micro-behaviors/fs/path/construct::path-append
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::msvc
