defaults:
  platforms:
  - windows
traits:
- id: wsh-specialfolders-startup
  desc: WSH Startup folder lookup
  crit: suspicious
  conf: 0.9
  for:
  - vbs
  - javascript
  if:
    type: text
    substr: 'SpecialFolders("Startup")'
- id: powershell-copyitem-self-to-startup
  desc: PowerShell copies file to Startup
  crit: suspicious
  conf: 0.95
  for:
  - vbs
  - powershell
  if:
    type: text
    regex: (?i)Copy-Item.{0,120}-Destination.{0,120}Startup
  unless:
  - id: well-known/app/openai-codex/
  - id: well-known/tool/sysadmin/alpine-packages::alpine-ansible-core-package
  - id: well-known/app/businessdev-albuild/
- id: win-startup-path
  desc: Windows Startup folder path reference
  crit: notable
  conf: 0.8
  for:
  - pe
  - powershell
  - batch
  - vbs
  if:
    type: text
    regex: (?i)Microsoft[/\\]Windows[/\\]Start Menu[/\\](Programs[/\\])?Startup([/\\]|["']|$)
  downgrade:
    any:
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
  unless:
  - id: objectives/command-and-control/dropper/execution/resource/
  - id: well-known/lib/node-notifier/
- id: batch-copy-self-to-startup
  desc: Batch self-copy to Startup
  crit: suspicious
  conf: 0.96
  for:
  - batch
  if:
    type: text
    regex: (?i)copy\s+"?%~f0"?[^\r\n]{0,160}Start Menu\\Programs\\Startup
- id: batch-echo-startup-script
  desc: Batch writes Startup script
  crit: suspicious
  conf: 0.92
  for:
  - batch
  if:
    type: text
    regex: (?i)echo\s+.{1,120}>>?\s+"?%APPDATA%\\Microsoft\\Windows\\Start Menu
- id: batch-echo-startup-redirect-var
  desc: Batch echoes into Startup-pointing variable
  crit: notable
  conf: 0.85
  for:
  - batch
  if:
    type: text
    regex: (?i)>>?\s*"?%[A-Za-z_][A-Za-z0-9_]{0,30}%"?\s+echo\b
  not:
  - substr: GITHUB_PATH
  - substr: GITHUB_
  - substr: HEADER_OUT_FILE
  unless:
  - id: objectives/persistence/login/startup/folder/
- id: batch-unzipfile-label
  desc: Batch UnZipFile helper label
  crit: notable
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: ":UnZipFile"
- id: batch-vbs-filesystemobject-echo
  desc: Batch emits FileSystemObject VBScript
  crit: notable
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: Scripting.FileSystemObject
- id: batch-vbs-shell-application-echo
  desc: Batch emits Shell.Application VBScript
  crit: notable
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: Shell.Application
- id: batch-vbs-namespace-items
  desc: Batch emits Zip Namespace items call
  crit: notable
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: NameSpace(%2).items
- id: batch-vbs-copyhere
  desc: Batch emits CopyHere extraction call
  crit: notable
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: CopyHere
- id: batch-startup-var-assignment--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: Microsoft\Windows\Start Menu\Programs\Startup
    case_insensitive: true
  count_max: 1023845
- id: batch-startup-var-assignment--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: APPDATA
    case_insensitive: true
  count_max: 1023846
- id: legacy-docume-startup-path
  desc: Legacy DOCUME~1 Startmenu Startup path
  crit: suspicious
  conf: 0.9
  for: [pe, dll]
  if:
    type: text
    substr: \DOCUME~1\All Users\Startmenu\Programs\Startup
- id: german-localized-startup-path
  desc: German DOKUME~1 Startmenu localized path
  crit: suspicious
  conf: 0.9
  for: [pe, dll]
  if:
    type: text
    substr: \DOKUME~1\All Users\Startmen
- id: german-programme-autostart-path
  desc: German Programme Autostart folder path
  crit: suspicious
  conf: 0.9
  for: [pe, dll]
  if:
    type: text
    substr: \Programme\Autostart\
composite_rules:
- id: powershell-downloaded-startup-launcher
  desc: PowerShell downloads hidden Startup launcher
  crit: hostile
  conf: 0.99
  for: [powershell]
  attack: "T1105,T1547.001,T1564.003"
  all:
  - id: objectives/command-and-control/dropper/execution/fileless::ps-downloader-execute
  - id: objectives/persistence/login/startup/shortcut::powershell-startup-special-folder
  - id: micro-behaviors/fs/file/write/direct::powershell-set-content-call
  - id: micro-behaviors/process/create/hidden::start-process-windowstyle-hidden
- id: batch-temp-vbs-unzip-helper
  desc: Batch temp VBScript unzip helper
  crit: notable
  conf: 0.96
  for:
  - batch
  all:
  - id: batch-unzipfile-label
  - id: batch-vbs-filesystemobject-echo
  - id: batch-vbs-shell-application-echo
  - id: batch-vbs-namespace-items
  - id: batch-vbs-copyhere
- id: multilingual-startup-folder-targets
  desc: Hardcoded multilingual Startup folder targets
  crit: suspicious
  conf: 0.95
  for: [pe, dll]
  attack: T1547.001
  all:
  - id: legacy-docume-startup-path
  any:
  - id: german-localized-startup-path
  - id: german-programme-autostart-path
- id: batch-self-copy-startup-folder
  desc: Batch persists itself in Startup
  crit: hostile
  conf: 0.98
  for:
  - batch
  attack: T1547.001
  all:
  - id: batch-copy-self-to-startup
  - id: win-startup-path
- id: batch-hidden-startup-script
  desc: Batch writes hidden Startup script
  crit: hostile
  conf: 0.98
  for:
  - batch
  attack: T1547.001
  all:
  - id: batch-echo-startup-script
  - id: micro-behaviors/process/create/hidden::powershell-windowstyle-hidden
  - id: micro-behaviors/process/create/start-process::batch-start-process-self-arg
- id: batch-echo-startup-via-var
  desc: Batch writes Startup script via redirected variable
  crit: suspicious
  conf: 0.94
  for:
  - batch
  attack: T1547.001
  all:
  - id: batch-startup-var-assignment
  - id: batch-echo-startup-redirect-var
  near_lines: 30
- id: vbs-self-copy-startup-folder
  desc: VBScript self-copies to Startup
  crit: hostile
  conf: 0.98
  for:
  - vbs
  attack: T1547.001
  all:
  - id: wsh-specialfolders-startup
  - id: powershell-copyitem-self-to-startup
  - id: objectives/execution/interpreter/script/wsh::wscript-scriptfullname

- id: js-fso-self-copy-startup-folder
  desc: JavaScript self-copies to Startup
  crit: hostile
  conf: 0.98
  for:
  - javascript
  attack: T1547.001
  all:
  - id: wsh-specialfolders-startup
  - id: objectives/execution/interpreter/script/wsh::wscript-scriptfullname
  - id: micro-behaviors/fs/file/copy::fso-copyfile

- id: vbs-self-copy-startup-variable-destination
  desc: VBScript copies its own script to Startup through a variable destination
  crit: hostile
  conf: 0.99
  for:
  - vbs
  attack: T1547.001
  all:
  - id: wsh-specialfolders-startup
  - id: micro-behaviors/fs/file/copy::powershell-copy-item-command
  - id: objectives/execution/interpreter/script/wsh::wscript-scriptfullname
  near_bytes: 4096
- id: startup-folder-shell-api-chain
  desc: Resolve startup-like folder via Shell APIs
  crit: suspicious
  conf: 0.85
  for:
  - pe
  - dll
  all:
  - id: micro-behaviors/fs/shell-ops::shell-get-special-folder-location
  - id: micro-behaviors/fs/shell-ops::shell-get-path-from-idlist-a
  - id: win-startup-path
  unless:
  - id: well-known/lib/wine/
- id: startup-folder-shell-path-composition-chain
  desc: Resolve startup path and compose file destination
  crit: suspicious
  conf: 0.88
  for:
  - pe
  - dll
  all:
  - id: micro-behaviors/fs/shell-ops::shell-get-folder-path
  - id: win-startup-path
  any:
  - id: micro-behaviors/fs/path/construct::path-combine
  - id: micro-behaviors/fs/path/construct::path-append
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/lang/compiler/native/

- id: startup-folder-dropper-chain
  desc: Startup folder persistence via shell API chain
  crit: suspicious
  conf: 0.9
  for:
  - pe
  - dll
  attack: T1547.001
  all:
  - id: micro-behaviors/fs/shell-ops::shell-get-folder-path-a
  - id: micro-behaviors/fs/directory/mkdir::create-directory-a
  - id: micro-behaviors/fs/file/attributes::set-file-attributes-a
  any:
  - id: micro-behaviors/process/create/exec::shell-execute-a
  - id: micro-behaviors/process/create/spawn::create-process-a
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/metrics/threshold::many-imports-100

- id: packed-startup-folder-loader
  desc: Packed PE establishing startup-folder persistence
  crit: hostile
  conf: 0.97
  for:
  - pe
  attack: T1547.001
  all:
  - id: startup-folder-dropper-chain
  - id: objectives/anti-static/obfuscation/payload/section::empty-text-section
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay-raw
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/
  - id: metadata/binary/framework/
- id: batch-startup-var-assignment
  desc: Variable assigned the Windows Startup folder path
  crit: notable
  conf: 0.9
  for:
  - batch
  all:
  - id: batch-startup-var-assignment--rx-1
  - id: batch-startup-var-assignment--rx-2
  near_bytes: 4096
