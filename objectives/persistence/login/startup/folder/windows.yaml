defaults:
  platforms:
    - windows
traits:
  - id: win-startup-path
    desc: Windows Startup folder path reference
    crit: notable
    conf: 0.8
    for:
      - pe
      - powershell
      - batch
      - vbs
    if:
      type: text
      regex: (?i)Microsoft[/\\]Windows[/\\]Start Menu
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: startup-specialfolders
    desc: Startup folder via SpecialFolders
    crit: notable
    conf: 0.92
    for:
      - vbs
    if:
      type: text
      substr: 'SpecialFolders("Startup")'
  - id: startup-copyitem-literalpath
    desc: PowerShell Startup self copy
    crit: suspicious
    conf: 0.97
    for:
      - powershell
      - vbs
    if:
      type: text
      regex: Copy-Item.{0,40}-LiteralPath.{0,80}-Destination
composite_rules:
  - id: startup-folder-shell-api-chain
    desc: Resolve startup-like folder via Shell APIs
    crit: notable
    conf: 0.85
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/fs/shell-ops/commands::shell-get-special-folder-location
      - id: micro-behaviors/fs/shell-ops/commands::shell-get-path-from-idlist-a
      - id: win-startup-path
  - id: startup-folder-shell-path-composition-chain
    desc: Resolve startup path and compose file destination
    crit: suspicious
    conf: 0.88
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/fs/shell-ops/commands::shell-get-folder-path
      - id: win-startup-path
    any:
      - id: micro-behaviors/fs/path/construct::path-combine
      - id: micro-behaviors/fs/path/construct::path-append
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::msvc
  - id: startup-self-copy-via-powershell
    desc: Self copy to Startup folder
    crit: suspicious
    conf: 0.99
    for:
      - vbs
    all:
      - id: startup-copyitem-literalpath
      - id: objectives/execution/interpreter/script/wsh::wscript-scriptfullname
    any:
      - id: win-startup-path
      - id: startup-specialfolders
