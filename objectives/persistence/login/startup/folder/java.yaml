defaults:
  platforms:
    - unix
    - windows
  for:
    - java
    - class
traits:
  - id: java-startup-enum
    desc: Java Startup folder path literal
    crit: suspicious
    if:
      type: literal
      regex: '(?i)(^|[/\\])startup([/\\]|$)'
  - id: java-common-startup-enum
    desc: Java common Startup folder path literal
    crit: suspicious
    if:
      type: literal
      regex: '(?i)(^|[/\\])common[_-]?startup([/\\]|$)'
