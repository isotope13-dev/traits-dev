defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - java
    - class
traits:
  - id: java-startup-enum
    desc: Presence of STARTUP string in Java
    crit: notable
    if:
      type: string_value
      word: STARTUP
  - id: java-common-startup-enum
    desc: Presence of COMMON_STARTUP string in Java
    crit: notable
    if:
      type: string_value
      word: COMMON_STARTUP
