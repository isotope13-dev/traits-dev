defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1547.001
traits:
  - id: encoded-startup-path-py
    desc: Encoded Windows Startup folder path
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      substr: "Start Menu\\Programs\\Startup"
composite_rules:
  - id: encoded-startup-persistence-dropper
    desc: Encoded Windows Startup persistence dropper
    crit: hostile
    conf: 0.95
    mbc: B0024
    all:
      - id: encoded-startup-path-py
      - id: micro-behaviors/process/create/subprocess::popen-content
      - id: micro-behaviors/fs/write/file/direct::python-open-write-binary
    unless:
      - id: metadata/package/quality::has-tests
