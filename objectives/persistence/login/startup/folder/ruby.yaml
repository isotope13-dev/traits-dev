defaults:
  platforms: [windows]
  for: [ruby]
  attack: T1547.001

traits:
  - id: ruby-startup-folder-path
    desc: Ruby Windows Startup folder path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\\+Microsoft\\+Windows\\+Start Menu\\+Programs\\+StartUp\\+'

composite_rules:
  - id: ruby-copy-to-startup-folder
    desc: Ruby copies file into Startup
    crit: hostile
    conf: 0.97
    all:
      - id: ruby-startup-folder-path
      - id: micro-behaviors/fs/file/copy::ruby-fileutils-copy
    any:
      - id: micro-behaviors/os/env/vars/user-paths::userprofile-var
      - id: micro-behaviors/process/create/system::ruby-system
