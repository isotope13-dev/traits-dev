# Windows Startup Persistence - JavaScript
# Composed objectives for JS startup persistence
defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: T1547.001
traits:
  - id: copy-file-sync-call
    desc: JavaScript copyFileSync call
    crit: notable
    conf: 0.86
    unless:
      - type: text
        substr: "path.resolve(Utils.getSavePath()"
      - type: basename
        exact: post-install.js
    if:
      type: text
      substr: fs.copyFileSync(
  - id: startup-path-from-homedir
    desc: Startup path built from homedir
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: os\.homedir\(\).{0,24}AppData.{0,24}Roaming
  - id: startup-bat-path-join
    desc: Startup BAT destination path join
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: path\.join\(\w+,\s*['"].{1,32}\.bat['"]\)
composite_rules:
  - id: js-win-startup-persistence
    desc: JavaScript copies BAT into Startup
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/persistence/login/startup/folder::js-win-startup-path
      - id: micro-behaviors/fs/write/file::write-file-sync
      - id: copy-file-sync-call
      - id: micro-behaviors/fs/path/extension::bat-dup
  - id: js-win-startup-path-copy
    desc: JavaScript builds and copies Startup BAT
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/persistence/login/startup/folder::js-win-startup-path
      - id: startup-path-from-homedir
      - id: startup-bat-path-join
      - id: copy-file-sync-call
  - id: js-startup-script-dropper
    desc: JavaScript writes BAT before Startup copy
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/fs/write/file::write-file-sync
      - id: copy-file-sync-call
      - id: micro-behaviors/fs/path/extension::bat-dup
  - id: vscode-dual-login-persistence
    desc: VSCode extension adds dual login persistence
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: js-win-startup-persistence
      - id: objectives/persistence/login/scheduled-task::js-schtasks-daily-persistence
