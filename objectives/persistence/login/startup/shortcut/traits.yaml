defaults:
  platforms: [windows]
composite_rules:
  - id: ps-startup-indicators
    desc: Helper for startup shortcut indicators
    crit: suspicious
    any:
      - id: micro-behaviors/os/env/vars::env-appdata
      - id: micro-behaviors/os/env/vars::env-temp-dup
      - id: micro-behaviors/os/sysinfo/directories::special-folder
  - id: startup-shortcut-persistence
    desc: "Persists payload via Startup folder shortcut"
    crit: hostile
    conf: 0.95
    for: [powershell, javascript]
    all:
      - id: objectives/persistence/login/startup/registry::create-shortcut
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: objectives/persistence/login/startup/shortcut::ps-startup-indicators
    any:
      - id: objectives/persistence/login/startup/registry::shortcut-target-path
      - id: objectives/persistence/login/startup/registry::shortcut-save
    needs: 1
