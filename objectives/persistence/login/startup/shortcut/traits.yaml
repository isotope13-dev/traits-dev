defaults:
  platforms: [windows]
traits:
- id: powershell-startup-special-folder
  desc: PowerShell resolves Startup special folder
  crit: notable
  conf: 0.9
  for: [powershell]
  if:
    type: text
    regex: '(?i)GetFolderPath\(\s*["'']Startup["'']\s*\)|Environment\+SpecialFolder\]::Startup'
composite_rules:
- id: ps-startup-indicators
  desc: Helper for startup shortcut indicators
  crit: component
  any:
  - id: powershell-startup-special-folder
  - id: objectives/persistence/login/startup/registry::windows-startup-folder
  - id: objectives/persistence/login/startup/folder::wsh-specialfolders-startup
- id: startup-shortcut-persistence
  desc: "Persists payload via Startup folder shortcut"
  crit: hostile
  conf: 0.95
  for: [powershell, javascript]
  all:
  - id: objectives/persistence/login/startup/shortcut::create-shortcut
  - id: micro-behaviors/os/wsh/file::wscript-shell-object
  - id: objectives/persistence/login/startup/shortcut::ps-startup-indicators
  any:
  - id: objectives/persistence/login/startup/shortcut::shortcut-target-path
  - id: objectives/persistence/login/startup/shortcut::shortcut-save
