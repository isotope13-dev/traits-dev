defaults:
  attack: T1547.001
  crit: suspicious
  for:
  - pe
  - oledoc
  - powershell
  - batch
  - csharp
  - python
  platforms:
  - windows
traits:
- id: endswith-filter-content
  desc: Python filters files by .lnk extension
  crit: component
  conf: 0.65
  if:
    type: text
    regex: \.endswith\(\s*['"]\.lnk['"]\s*\)
composite_rules:
- id: windows-shortcut-hijack
  desc: Windows shortcut hijacking via COM
  crit: suspicious
  conf: 0.9
  attack: T1547.009
  all:
  - id: objectives/persistence/login/startup/registry::windows-startup-folder
  - id: micro-behaviors/os/wsh/file::create-shortcut
  - id: micro-behaviors/os/wsh/file::shortcut-target-path
- id: windows-shortcut-argument-injection
  desc: Shortcut argument injection via COM
  crit: suspicious
  conf: 0.9
  attack: T1547.009
  all:
  - id: objectives/persistence/login/startup/registry::windows-startup-folder
  - id: micro-behaviors/os/wsh/file::create-shortcut
  - id: micro-behaviors/os/wsh/file::shortcut-arguments
  - id: micro-behaviors/os/wsh/file::shortcut-save
- id: windows-shortcut-walk-modify
  desc: Enumerates and modifies shortcut files
  crit: suspicious
  conf: 0.9
  attack: T1547.009
  all:
  - id: micro-behaviors/fs/directory/traverse::traverse-walk
  - id: micro-behaviors/os/wsh/file::create-shortcut
  any:
  - id: metadata/file/extension/identity::lnk-endswith-filter
  - id: endswith-filter-content
- id: windows-native-shortcut-startup-tamper
  desc: Native startup shortcut and registry tamper chain
  crit: suspicious
  conf: 0.92
  all:
  - id: objectives/persistence/login/startup/folder::startup-folder-shell-api-chain
  - id: metadata/file/extension/identity::lnk-endswith-filter
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  any:
  - id: micro-behaviors/os/registry/access::internet-settings-autodial-tamper
  - id: micro-behaviors/process/create/spawn::create-process-a
- id: windows-shortcut-walk-argument-inject
  desc: Enumerates shortcuts and injects arguments
  crit: hostile
  conf: 0.95
  attack: T1547.009
  mbc: F0012
  all:
  - id: micro-behaviors/fs/directory/traverse::traverse-walk
  - id: micro-behaviors/os/wsh/file::create-shortcut
  - id: micro-behaviors/os/wsh/file::shortcut-arguments
  - id: micro-behaviors/os/wsh/file::shortcut-save

- id: windows-shortcut-obfuscated-argument-inject
  desc: Obfuscated code enumerates shortcuts and saves altered launch arguments
  crit: hostile
  conf: 0.95
  attack: T1547.009
  mbc: F0012
  all:
  - id: micro-behaviors/fs/directory/traverse::traverse-walk-call
  - id: micro-behaviors/os/wsh/file::shortcut-arguments
  - id: micro-behaviors/os/wsh/file::shortcut-target-path
  - id: micro-behaviors/os/wsh/file::shortcut-save-symbol
  - id: objectives/anti-static/obfuscation/eval/scripting::join-map-getattr-chr

- id: python-startup-shortcut-persistence
  desc: Python creates a Startup-folder shortcut
  crit: suspicious
  conf: 0.9
  for: [python]
  near_lines: 20
  all:
  - id: micro-behaviors/os/autorun/keyword::startup-keyword
  - id: micro-behaviors/os/wsh/file::create-shortcut
  - id: micro-behaviors/os/wsh/file::shortcut-target-path
  - id: micro-behaviors/os/wsh/file::shortcut-save
