defaults:
  platforms: [windows]
  for: [pe]
  attack: T1547.009
traits:
  - id: create-shortcut-exception
    desc: Shortcut creation exception class
    crit: notable
    conf: 0.96
    if:
      type: string_value
      substr: CreateShortcutException
composite_rules:
  - id: binary-shortcut-staging
    desc: Binary supports shortcut creation and launch staging
    crit: suspicious
    conf: 0.9
    all:
      - id: create-shortcut-exception
      - id: objectives/persistence/login/startup/registry::lnk-endswith-filter
    any:
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/os/registry/access::reg-create-key-ex-w
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-w
    needs: 1
