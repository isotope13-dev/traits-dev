defaults:
  platforms: [panos, appliance, unix]
  for: [rust, elf]
  attack: T1547.001

traits:
  - id: rust-panos-system-update-desktop
    desc: Rust PAN-OS system update desktop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .system_update.desktop

  - id: rust-panos-hidden-desktop-entry
    desc: Rust PAN-OS hidden desktop entry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Hidden=true

composite_rules:
  - id: rust-panos-hidden-startup-entry
    desc: Rust PAN-OS hidden startup entry
    crit: hostile
    conf: 0.98
    all:
      - id: rust-panos-system-update-desktop
      - id: rust-panos-hidden-desktop-entry
