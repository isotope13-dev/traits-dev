defaults:
  platforms: [windows]
  attack: T1547.009

composite_rules:
  - id: rar-ads-traversal-startup-shortcut
    desc: RAR ADS traversal drops Startup shortcut
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/magic/identity::rar-v5
      - id: micro-behaviors/data/archive/rar::ads-parent-traversal
      - id: micro-behaviors/data/archive/rar::startup-member-path
      - id: micro-behaviors/data/archive/rar::lnk-member-extension

  - id: rar-ads-traversal-startup-script
    desc: RAR ADS traversal drops Startup script
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/magic/identity::rar-v5
      - id: micro-behaviors/data/archive/rar::repeated-ads-parent-traversal
      - id: micro-behaviors/data/archive/rar::startup-member-path
    any:
      - id: micro-behaviors/data/archive/rar::wsh-script-member-extension
      - id: micro-behaviors/data/archive/rar::shell-script-member-extension
