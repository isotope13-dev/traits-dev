defaults:
  platforms: [windows, unix]
  for: [swift]
  attack: T1547.009

traits:
  - id: swift-startup-folder-path
    desc: Swift Startup folder path
    crit: component
    conf: 0.88
    if:
      type: text
      substr: /Microsoft/Windows/Start Menu/Programs/Startup

  - id: swift-startup-lnk-save
    desc: Swift Startup LNK save
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'startupLNK[\s\S]{0,180}save\(pRaw'

composite_rules:
  - id: swift-startup-lnk-dropper
    desc: Swift Startup LNK dropper
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/com/object::swift-shelllink-shortcut-builder
      - id: objectives/command-and-control/dropper/lnk/source-builder::swift-lnk-curl-drop-execute
      - id: swift-startup-folder-path
      - id: swift-startup-lnk-save
