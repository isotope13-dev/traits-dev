defaults:
  platforms: [routeros, appliance]
  for: [javascript]
  attack: T1546

traits:
  - id: routeros-js-system-script-set
    desc: RouterOS JS system script set
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: 'api\.menu\([''"]/system/script[''"]\)\.set'

composite_rules:
  - id: routeros-js-login-hook-backdoor
    desc: RouterOS JS login hook backdoor
    crit: hostile
    conf: 0.98
    near_lines: 80
    all:
      - id: routeros-js-system-script-set
      - id: micro-behaviors/os/autorun/scheduled::routeros-script-run
      - id: micro-behaviors/communications/http/download/routeros::routeros-fetch-command
