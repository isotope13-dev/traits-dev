defaults:
  platforms: [panos, appliance, unix]
  for: [objc, macho]
  attack: T1543.001

traits:
  - id: objc-panos-launchagents-path
    desc: ObjC PAN-OS LaunchAgents path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Library/LaunchAgents

  - id: objc-panos-runatload-keepalive
    desc: ObjC PAN-OS RunAtLoad KeepAlive
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'RunAtLoad[\s\S]{0,80}KeepAlive'

composite_rules:
  - id: objc-panos-launchagent-persist
    desc: ObjC PAN-OS LaunchAgent persist
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-launchagents-path
      - id: objc-panos-runatload-keepalive
