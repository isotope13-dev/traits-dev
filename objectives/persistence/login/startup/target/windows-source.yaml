defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1547.001
traits:
  - id: explorer-startup-target
    desc: Targets explorer.exe for startup
    crit: suspicious
    conf: 0.97
    if:
      type: string_literal
      exact: explorer.exe
  - id: explorer-findfirst-source
    desc: Looks up explorer.exe before infection
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: findfirst("explorer.exe",&fl,FA_SYSTEM+FA_HIDDEN)
composite_rules:
  - id: explorer-startup-infector-source
    desc: Infects explorer.exe for boot persistence
    crit: hostile
    conf: 0.99
    all:
      - id: explorer-startup-target
      - id: explorer-findfirst-source
      - id: objectives/persistence/login/startup/registry::copy-to-sysdir-source
      - id: objectives/impact/infect/binary/source::prepending-exe-scr-infector-source
