# Aggressive scheduled-task beacons (sub-10-min interval with HIGHEST runlevel).
# Observed in SHADOW-EARTH-053's M1onltor task running every 5 minutes with
# /rl HIGHEST. Legitimate periodic tasks are typically hourly or daily and
# rarely require highest privileges; sub-10-minute beacons combined with
# elevated privs are a strong loader-persistence signal.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell]
  attack: T1053.005
  mbc: F0012
traits:
  - id: schtasks-minute-short-interval
    desc: schtasks /sc MINUTE with sub-10-min interval
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'schtasks[^\n]{0,80}/sc\s+MINUTE[^\n]{0,80}/mo\s+[1-9]\b'
      case_insensitive: true
  - id: m1onltor-task-name
    desc: M1onltor SHADOW-EARTH-053 task name
    crit: suspicious
    conf: 0.97
    if:
      type: text
      word: M1onltor
composite_rules:
  - id: aggressive-task-beacon
    desc: Sub-10-min scheduled task with elevated privileges
    crit: hostile
    conf: 0.95
    all:
      - id: schtasks-minute-short-interval
    any:
      - id: micro-behaviors/os/autorun/scheduled::schtasks-runlevel-highest
      - id: micro-behaviors/os/autorun/scheduled::schtasks-system-runas
