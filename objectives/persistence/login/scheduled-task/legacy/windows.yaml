defaults:
  platforms: [windows]
  for: [pe, batch, powershell]
  attack: T1053.002
  mbc: F0012
traits:
- id: at-exe-command
  desc: at.exe scheduler command
  crit: suspicious
  conf: 0.9
  if:
    type: text
    exact: at.exe djhfjshdf937826457862398347
- id: at-exe-random-job-token
  desc: at.exe with opaque job token
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: (?i)^at\.exe [a-z0-9]{16,}$
- id: tpmprofiler-task
  desc: TPMProfiler scheduled task name (QEMU abuse)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: TPMProfiler
- id: enterprise-mgmt-queued-alerts-uri
  desc: EnterpriseMgmt queued alerts task URI
  crit: component
  conf: 0.99
  for: [pe]
  if:
    type: text
    substr: \Microsoft\Windows\EnterpriseMgmt\Queued Schedule created for queued alerts
- id: deviceenroller-task-command
  desc: deviceenroller scheduled task command
  crit: notable
  conf: 0.96
  for: [pe]
  if:
    type: text
    substr: <Command>%windir%\system32\deviceenroller.exe</Command>
- id: wnf-network-state-task-trigger
  desc: WNF network state task trigger
  crit: component
  conf: 0.98
  for: [pe]
  if:
    type: text
    substr: WNF_SEB_FREE_NETWORK_PRESENT
- id: wnf-datasense-state-task-trigger
  desc: WNF DataSense state task trigger
  crit: component
  conf: 0.98
  for: [pe]
  if:
    type: text
    substr: WNF_CNET_DPU_GLOBAL_STATE_UNDER_TRACK
- id: scheduled-task-system-highestavailable
  desc: Scheduled task runs as SYSTEM elevated
  crit: component
  conf: 0.9
  for: [pe]
  if:
    type: text
    regex: <UserId>S-1-5-18</UserId>.{0,80}<RunLevel>HighestAvailable</RunLevel>
- id: windows-defrag-task-path
  desc: Windows Defrag scheduled task path
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(?i)(\\Windows\\Defrag\\|/tn\s+["'']?\\?Windows\\Defrag\\)'
- id: defrag-suffixed-task-name
  desc: Application-named Defrag scheduled task
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: '(?i)\\Windows\\Defrag\\[A-Za-z][A-Za-z0-9_-]{2,40}Defrag\b'
- id: schtasks-onevent-trigger
  desc: schtasks ON EVENT trigger
  crit: notable
  conf: 0.84
  for: [batch, powershell]
  if:
    type: text
    regex: '(?i)\bschtasks(\.exe)?\s+/CREATE[^\r\n]{0,220}/SC\s+ONEVENT\b'
- id: networkprofile-event-filter
  desc: NetworkProfile event subscription filter
  crit: component
  conf: 0.86
  for: [batch, powershell]
  if:
    type: text
    regex: '(?i)Microsoft-Windows-NetworkProfile/Operational|Microsoft-Windows-NetworkProfile'
- id: schtasks-tr-appdata-exe
  desc: Scheduled task runs AppData executable
  crit: suspicious
  conf: 0.9
  for: [batch, powershell]
  if:
    type: text
    regex: '(?i)\bschtasks(\.exe)?[^\r\n]{0,320}/TR\s+"?%LocalAppData%\\[^"\r\n]{1,180}\.exe\b'
composite_rules:
- id: legacy-at-scheduled-execution
  desc: Legacy AT scheduled task persistence
  crit: suspicious
  conf: 0.95
  any:
  - id: objectives/persistence/login/scheduled-task/legacy::at-exe-command
  - id: objectives/persistence/login/scheduled-task/legacy::at-exe-random-job-token
- id: enterprise-mgmt-deviceenroller-wnf-task
  desc: EnterpriseMgmt deviceenroller WNF persistence
  crit: hostile
  conf: 0.99
  for: [pe]
  all:
  - id: enterprise-mgmt-queued-alerts-uri
  - id: deviceenroller-task-command
  - id: scheduled-task-system-highestavailable
  any:
  - id: wnf-network-state-task-trigger
  - id: wnf-datasense-state-task-trigger
- id: windows-defrag-scheduled-persistence
  desc: Masqueraded Defrag scheduled task persistence
  crit: hostile
  conf: 0.96
  all:
  - id: windows-defrag-task-path
  any:
  - id: defrag-suffixed-task-name
  - id: micro-behaviors/os/autorun/scheduled::schtasks-create-cmd
  - id: micro-behaviors/os/autorun/scheduled::schtasks-exe-create
  needs: 2
- id: network-event-appdata-task
  desc: Network event launches AppData executable
  crit: suspicious
  conf: 0.94
  attack: T1053.005
  all:
  - id: schtasks-onevent-trigger
  - id: networkprofile-event-filter
  - id: schtasks-tr-appdata-exe
