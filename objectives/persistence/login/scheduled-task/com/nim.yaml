defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1053.005
  mbc: F0012
traits:
- id: create-hidden-task-path-log
  desc: Hidden task path log
  crit: component
  conf: 0.96
  if:
    type: text
    exact: "@[createHiddenTask] path="
- id: create-hidden-task-registered-log
  desc: Hidden task registered log
  crit: component
  conf: 0.96
  if:
    type: text
    exact: "@[createHiddenTask] registered:"
- id: task-scheduler-register-method
  desc: Task Scheduler register method
  crit: notable
  conf: 0.9
  if:
    type: text
    exact: "@RegisterTaskDefinition"
- id: task-scheduler-service-progid
  desc: Task Scheduler COM ProgID
  crit: component
  conf: 0.9
  if:
    type: text
    exact: "@Schedule.Service"
- id: task-scheduler-builder-methods--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    substr: Connect
  count_max: 1026953
- id: task-scheduler-builder-methods--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    substr: NewTask
  count_max: 1026954
- id: task-scheduler-builder-methods--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    substr: GetFolder
  count_max: 1026955
- id: hidden-task-property
  desc: Hidden task property
  crit: component
  conf: 0.9
  if:
    type: text
    word: "Hidden"
- id: task-action-principal-properties--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: Actions
  count_max: 1026957
- id: task-action-principal-properties--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: Principal
  count_max: 1026959
- id: task-action-principal-properties--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: RunLevel
  count_max: 1026960
- id: task-action-principal-properties--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: LogonType
  count_max: 1026961
- id: task-action-principal-properties--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: UserId
  count_max: 1026962
- id: task-settings-property-cluster--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: StartWhenAvailable
  count_max: 1026963
- id: task-settings-property-cluster--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: AllowDemandStart
  count_max: 1026964
- id: task-settings-property-cluster--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: StopIfGoingOnBatteries
  count_max: 1026965
- id: task-settings-property-cluster--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: DisallowStartIfOnBatteries
  count_max: 1026966
composite_rules:
- id: hidden-task-com-persistence
  desc: Hidden COM scheduled task persistence
  crit: hostile
  conf: 0.97
  all:
  - id: create-hidden-task-path-log
  - id: create-hidden-task-registered-log
  - id: task-scheduler-register-method
  - id: task-settings-property-cluster
  unless:
  - id: metadata/signed/platform/
- id: hidden-task-scheduler-com-persistence
  desc: Hidden Task Scheduler COM persistence
  crit: hostile
  conf: 0.97
  all:
  - id: task-scheduler-service-progid
  - id: task-scheduler-register-method
  - id: hidden-task-property
  - id: task-action-principal-properties
  any:
  - id: task-scheduler-builder-methods
  - id: task-settings-property-cluster
- id: task-scheduler-com-dropper-persistence
  desc: Task Scheduler COM dropper persistence
  crit: hostile
  conf: 0.96
  all:
  - id: task-scheduler-service-progid
  - id: task-scheduler-register-method
  - id: task-settings-property-cluster
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  any:
  - id: objectives/execution/wmi::com-wmi-process-create
  - id: micro-behaviors/process/create/exec::shell-execute
  - id: micro-behaviors/process/create/spawn::create-process-w
- id: task-scheduler-builder-methods
  desc: Task Scheduler builder methods
  crit: component
  conf: 0.9
  any:
  - id: task-scheduler-builder-methods--rx-1
  - id: task-scheduler-builder-methods--rx-2
  - id: task-scheduler-builder-methods--rx-3
- id: task-action-principal-properties
  desc: Task action principal properties
  crit: component
  conf: 0.88
  any:
  - id: task-action-principal-properties--rx-4
  - id: task-action-principal-properties--rx-6
  - id: task-action-principal-properties--rx-7
  - id: task-action-principal-properties--rx-8
  - id: task-action-principal-properties--rx-9
- id: task-settings-property-cluster
  desc: Task settings property cluster
  crit: component
  conf: 0.88
  any:
  - id: task-settings-property-cluster--rx-10
  - id: task-settings-property-cluster--rx-11
  - id: task-settings-property-cluster--rx-12
  - id: task-settings-property-cluster--rx-13
