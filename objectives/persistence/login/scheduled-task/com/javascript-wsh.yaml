defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1053.005
traits:
  - id: schedule-service-fragment
    desc: Task Scheduler COM service fragment
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Schedule.S
  - id: register-task-fragment
    desc: RegisterTaskDefinition fragment
    crit: component
    conf: 0.9
    if:
      type: text
      substr: RegisterTa
  - id: new-task-token
    desc: NewTask task scheduler token
    crit: component
    conf: 0.88
    if:
      type: text
      word: NewTask
  - id: task-triggers-token
    desc: Task Scheduler Triggers token
    crit: component
    conf: 0.86
    if:
      type: text
      word: Triggers
  - id: task-actions-token
    desc: Task Scheduler Actions token
    crit: component
    conf: 0.86
    if:
      type: text
      word: Actions
  - id: task-startwhenavailable-fragment
    desc: StartWhenAvailable task setting fragment
    crit: component
    conf: 0.88
    if:
      type: text
      substr: StartWhenA
composite_rules:
  - id: obfuscated-jscript-hidden-scheduled-task
    desc: Obfuscated JScript creates a PowerShell scheduled task
    crit: hostile
    conf: 0.97
    attack: T1053.005, T1059.001
    mbc: F0012
    all:
      - id: schedule-service-fragment
      - id: register-task-fragment
      - id: new-task-token
      - id: task-triggers-token
      - id: task-actions-token
      - id: task-startwhenavailable-fragment
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::token-array-powershell-nop-ep-bypass-escaped
      - id: micro-behaviors/process/interpreter/jscript::activex-object
    any:
      - id: objectives/anti-static/obfuscation/syntax::js-while-switch-state-machine
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::cfg-flatten-state-list
