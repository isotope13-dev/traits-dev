# PowerShell ScheduledTasks cmdlet persistence
# ATT&CK: T1053.005 (Scheduled Task/Job: Scheduled Task)
defaults:
  platforms: [windows]
  for: [powershell, batch]
  attack: T1053.005
  mbc: F0012
traits:
- id: register-scheduledtask
  desc: Register-ScheduledTask cmdlet
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '(^|[^\{A-Za-z0-9_-])Register-ScheduledTask\b'
    case_insensitive: true
- id: new-scheduledtaskaction
  desc: New-ScheduledTaskAction cmdlet
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: New-ScheduledTaskAction
    case_insensitive: true
- id: new-scheduledtasktrigger
  desc: New-ScheduledTaskTrigger cmdlet
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: New-ScheduledTaskTrigger
    case_insensitive: true
- id: unregister-scheduledtask-silent
  desc: Silent Unregister-ScheduledTask
  crit: suspicious
  conf: 0.9
  unless:
  - id: well-known/tool/sysadmin/kubernetes
  if:
    type: text
    regex: Unregister-ScheduledTask\b[^\n]{0,120}-Confirm:\s*\$false
    case_insensitive: true
- id: schtask-daily-fixed-hour
  desc: Daily scheduled-task trigger at fixed hour
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: New-ScheduledTaskTrigger\b[^\n]{0,80}-Daily\b[^\n]{0,80}-At\s+\d{1,2}(:\d{2})?(AM|PM)?
    case_insensitive: true
- id: schtask-launches-explorer-arg--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    case_insensitive: true
    substr: New-ScheduledTaskAction
  count_max: 1026920
- id: schtask-launches-explorer-arg--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    case_insensitive: true
    substr: explorer.exe
  count_max: 1026921
- id: schtask-launches-explorer-arg--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    case_insensitive: true
    substr: Argument
  count_max: 1026922
- id: schtask-launches-explorer-arg--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    case_insensitive: true
    substr: Execute
  count_max: 1026923
- id: new-scheduledtask-principal-system--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    case_insensitive: true
    substr: New-ScheduledTaskPrincipal
  count_max: 1026924
- id: new-scheduledtask-principal-system--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    case_insensitive: true
    substr: AUTHORITY\SYSTEM
  count_max: 1026925
- id: new-scheduledtask-principal-system--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    case_insensitive: true
    substr: LocalSystem
  count_max: 1026926
- id: new-scheduledtask-principal-system--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    case_insensitive: true
    substr: UserId
  count_max: 1026927
- id: schtask-runlevel-highest
  desc: Scheduled task RunLevel Highest
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: -RunLevel\s+Highest\b
    case_insensitive: true
- id: schtask-trigger-at-startup
  desc: Scheduled task -AtStartup trigger
  crit: component
  conf: 0.8
  if:
    type: text
    regex: New-ScheduledTaskTrigger\b[^\n]{0,80}-AtStartup\b
    case_insensitive: true
- id: schtask-trigger-at-logon
  desc: Scheduled task -AtLogon trigger
  crit: component
  conf: 0.8
  if:
    type: text
    regex: New-ScheduledTaskTrigger\b[^\n]{0,80}-AtLogon\b
    case_insensitive: true
- id: schtask-trigger-periodic-repeat
  desc: Scheduled task short -RepetitionInterval
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: -RepetitionInterval\b[^\n]{0,80}-Minutes\s+([1-9]|[12]?\d|3\d)\b
    case_insensitive: true
- id: software-protection-task-name--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Register-ScheduledTask
    case_insensitive: true
  count_max: 1026932
- id: software-protection-task-name--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Software Protection
    case_insensitive: true
  count_max: 1026933
- id: software-protection-task-name--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: schtasks.exe
    case_insensitive: true
  count_max: 1026934
- id: software-protection-task-name--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: TaskName
    case_insensitive: true
  count_max: 1026935
composite_rules:
- id: schtask-cmdlet-persistence
  desc: PowerShell scheduled-task persistence cmdlets
  crit: suspicious
  conf: 0.92
  all:
  - id: register-scheduledtask
  any:
  - id: new-scheduledtaskaction
  - id: new-scheduledtasktrigger
  unless:
  - id: well-known/tool/sysadmin/kubernetes
- id: schtask-explorer-lnk-launcher
  desc: Scheduled task proxies via explorer.exe LNK launcher
  crit: hostile
  conf: 0.95
  all:
  - id: schtask-launches-explorer-arg
  - id: register-scheduledtask
- id: schtask-system-multi-trigger
  desc: Scheduled task as SYSTEM with multiple triggers
  crit: hostile
  conf: 0.95
  all:
  - id: register-scheduledtask
  - id: new-scheduledtask-principal-system
  any:
  - id: schtask-trigger-at-startup
  - id: schtask-trigger-at-logon
  - id: schtask-trigger-periodic-repeat
  needs: 2
- id: software-protection-periodic-task
  desc: Software Protection periodic task
  crit: suspicious
  conf: 0.93
  all:
  - id: software-protection-task-name
  - id: schtask-trigger-periodic-repeat
  any:
  - id: register-scheduledtask
  - id: new-scheduledtaskaction
- id: schtask-launches-explorer-arg
  desc: Scheduled task launches explorer.exe with argument
  crit: suspicious
  conf: 0.92
  attack: T1202
  all:
  - id: schtask-launches-explorer-arg--rx-1
  - id: schtask-launches-explorer-arg--rx-2
  - id: schtask-launches-explorer-arg--rx-3
  - id: schtask-launches-explorer-arg--rx-4
  near_bytes: 4096
- id: new-scheduledtask-principal-system
  desc: Scheduled task principal NT AUTHORITY\SYSTEM
  crit: suspicious
  conf: 0.93
  any:
  - id: new-scheduledtask-principal-system--rx-5
  - id: new-scheduledtask-principal-system--rx-6
  - id: new-scheduledtask-principal-system--rx-7
  - id: new-scheduledtask-principal-system--rx-8
- id: software-protection-task-name
  desc: Software Protection task name
  crit: component
  conf: 0.9
  any:
  - id: software-protection-task-name--rx-9
  - id: software-protection-task-name--rx-10
  - id: software-protection-task-name--rx-11
  - id: software-protection-task-name--rx-12
