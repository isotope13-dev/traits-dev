defaults:
  platforms: [windows]
  for: [powershell, batch, pe, csharp]
  attack: T1053.005
  mbc: F0012
traits:
- id: regasm-text-loader-argument
  desc: regasm runs text loader
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(?i)regasm(\.exe)?[^\r\n]{0,180}(update|msupdate)\.txt'
- id: systemwindowsapis-task-name
  desc: SystemWindowsApis scheduled task name
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: SystemWindowsApis
composite_rules:
- id: regasm-text-loader-startup-task
  desc: regasm text-loader startup task
  crit: hostile
  conf: 0.98
  all:
  - id: regasm-text-loader-argument
  - id: objectives/persistence/login/scheduled-task/cli::windows-schtasks-onstart-highest
  any:
  - id: systemwindowsapis-task-name
  - id: micro-behaviors/os/autorun/scheduled::schtasks-runlevel-highest
  - id: objectives/execution/lolbin/os::regasm-execution
