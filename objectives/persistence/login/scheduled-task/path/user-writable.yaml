# Scheduled-task creation pointing into a user-writable path.
#
# `schtasks /create` (or `Register-ScheduledTask`, or `ITaskService::*`)
# creating a task whose action runs a binary out of a user-writable
# directory — %TEMP%, %APPDATA%, %ProgramData%, C:\Users\Public\, or
# raw C:\Users\<name>\... — is post-exploitation persistence.
#
# Legitimate scheduled tasks live under C:\Program Files, C:\Windows,
# or are MSI-managed. A task whose action references a user-writable
# directory is a classic loader/dropper persistence pattern.
defaults:
  platforms: [windows]
  for: [pe, batch, powershell, scripts]
  attack: "T1053.005"
  mbc: "F0012"

traits:
  - id: schtasks-action-temp-path
    desc: schtasks action under TEMP path
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "(?i)/tr\\s+\"?[^\"\\n]{0,160}(%TEMP%|\\\\Temp\\\\|\\\\Windows\\\\Temp\\\\)"

  - id: schtasks-action-appdata-path
    desc: schtasks action under APPDATA path
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "(?i)/tr\\s+\"?[^\"\\n]{0,160}(%APPDATA%|\\\\AppData\\\\)"

  - id: schtasks-action-programdata-path
    desc: schtasks action under ProgramData path
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "(?i)/tr\\s+\"?[^\"\\n]{0,160}(%ProgramData%|\\\\ProgramData\\\\)"

  - id: schtasks-action-public-path
    desc: schtasks action under Users\Public
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "(?i)/tr\\s+\"?[^\"\\n]{0,160}(C:\\\\Users\\\\Public\\\\|\\\\Users\\\\Public\\\\)"

  - id: register-scheduledtask-temp-target
    desc: Register-ScheduledTask TEMP target
    crit: notable
    conf: 0.85
    for: [powershell, scripts, pe]
    if:
      type: text
      regex: "(?i)Register-ScheduledTask[^\\n]{0,400}\\$env:TEMP"

  - id: register-scheduledtask-appdata-target
    desc: Register-ScheduledTask APPDATA target
    crit: notable
    conf: 0.85
    for: [powershell, scripts, pe]
    if:
      type: text
      regex: "(?i)Register-ScheduledTask[^\\n]{0,400}\\$env:APPDATA"

  - id: register-scheduledtask-public-target
    desc: Register-ScheduledTask Users\Public target
    crit: notable
    conf: 0.85
    for: [powershell, scripts, pe]
    if:
      type: text
      regex: "(?i)Register-ScheduledTask[^\\n]{0,400}\\\\Users\\\\Public"

composite_rules:
  - id: schtasks-create-user-writable-path
    desc: Schtasks creates task with user-writable target
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/autorun/scheduled::schtasks-create-cmd
    any:
      - id: objectives/persistence/login/scheduled-task/path::register-scheduledtask-appdata-target
      - id: objectives/persistence/login/scheduled-task/path::register-scheduledtask-public-target
      - id: objectives/persistence/login/scheduled-task/path::register-scheduledtask-temp-target
      - id: objectives/persistence/login/scheduled-task/path::schtasks-action-appdata-path
      - id: objectives/persistence/login/scheduled-task/path::schtasks-action-programdata-path
      - id: objectives/persistence/login/scheduled-task/path::schtasks-action-public-path
      - id: objectives/persistence/login/scheduled-task/path::schtasks-action-temp-path
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/family/
