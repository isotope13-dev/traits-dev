# SYSTEM-level scheduled task creation tokens.
#
# A binary that uses the Task Scheduler 2.0 API (ITaskService /
# RegisterTaskDefinition) AND references the elevation tokens
# `TASK_LOGON_SERVICE_ACCOUNT` + `TASK_RUNLEVEL_HIGHEST` is
# programmatically creating a scheduled task that runs as
# NT AUTHORITY\SYSTEM. Combined with a `TASK_TRIGGER_BOOT` or
# `TASK_TRIGGER_LOGON` trigger this is SYSTEM-level boot persistence.
#
# Legitimate installers (MSI, Inno, NSIS, Squirrel) do this — the
# composite excludes those contexts. Anything else creating a SYSTEM
# task at install time is a malware-class persistence pattern.
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1053.005"
  mbc: "F0012"

traits:
  - id: task-logon-service-account-token
    desc: TASK_LOGON_SERVICE_ACCOUNT enum reference
    crit: notable
    conf: 0.93
    if:
      type: text
      word: TASK_LOGON_SERVICE_ACCOUNT

  - id: task-runlevel-highest-token
    desc: TASK_RUNLEVEL_HIGHEST elevation token
    crit: notable
    conf: 0.92
    if:
      type: text
      word: TASK_RUNLEVEL_HIGHEST

  - id: task-trigger-boot-token
    desc: TASK_TRIGGER_BOOT trigger token
    crit: notable
    conf: 0.92
    if:
      type: text
      word: TASK_TRIGGER_BOOT

  - id: task-trigger-logon-token
    desc: TASK_TRIGGER_LOGON trigger token
    crit: notable
    conf: 0.9
    if:
      type: text
      word: TASK_TRIGGER_LOGON

  - id: itaskservice-com-token
    desc: ITaskService COM interface reference
    crit: notable
    conf: 0.85
    if:
      type: text
      word: ITaskService

  - id: register-task-definition-token
    desc: RegisterTaskDefinition COM call
    crit: notable
    conf: 0.92
    if:
      type: text
      word: RegisterTaskDefinition

composite_rules:
  - id: system-scheduled-task-creation
    desc: Programmatic SYSTEM-level scheduled-task creation
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: task-logon-service-account-token
      - id: task-runlevel-highest-token
      - id: task-trigger-boot-token
      - id: task-trigger-logon-token
      - id: itaskservice-com-token
      - id: register-task-definition-token
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/binary/installer/sfx::winrar-sfx-footprint

  - id: non-installer-system-task-boot-persistence
    desc: Non-installer binary creates SYSTEM boot-persisted task
    crit: hostile
    conf: 0.97
    all:
      - id: system-scheduled-task-creation
      - id: task-logon-service-account-token
    any:
      - id: task-trigger-boot-token
      - id: task-trigger-logon-token
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/binary/installer/sfx::winrar-sfx-footprint
