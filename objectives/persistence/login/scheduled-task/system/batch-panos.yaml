defaults:
  platforms: [panos, appliance, windows]
  for: [batch]
  attack: T1053.005

traits:
  - id: batch-panos-system-logon-task
    desc: Batch PAN-OS SYSTEM logon task
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'schtasks(\.exe)? /create[\s\S]{0,160}/sc onlogon[\s\S]{0,80}/ru SYSTEM'

  - id: batch-panos-highest-task-runlevel
    desc: Batch PAN-OS highest task level
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/rl (highest|HIGHEST)'
    unless:
      - id: well-known/app/virtualbox::unattended-template

composite_rules:
  - id: batch-panos-elevated-logon-task
    desc: Batch PAN-OS elevated logon task
    crit: hostile
    conf: 0.98
    all:
      - id: batch-panos-system-logon-task
      - id: batch-panos-highest-task-runlevel
