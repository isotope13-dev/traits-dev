defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1053.005
  mbc: F0012
traits:
  - id: create-hidden-task-path-log
    desc: Hidden task path log
    crit: component
    conf: 0.96
    if:
      type: text
      exact: "@[createHiddenTask] path="
  - id: create-hidden-task-registered-log
    desc: Hidden task registered log
    crit: component
    conf: 0.96
    if:
      type: text
      exact: "@[createHiddenTask] registered:"
  - id: task-scheduler-register-method
    desc: Task Scheduler register method
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "@RegisterTaskDefinition"
  - id: task-scheduler-service-progid
    desc: Task Scheduler COM ProgID
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "@Schedule.Service"
  - id: task-scheduler-builder-methods
    desc: Task Scheduler builder methods
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: 'Connect|NewTask|GetFolder'
  - id: hidden-task-property
    desc: Hidden task property
    crit: component
    conf: 0.9
    if:
      type: text
      word: "Hidden"
  - id: task-action-principal-properties
    desc: Task action principal properties
    crit: component
    conf: 0.88
    count_min: 3
    if:
      type: text
      regex: 'Actions|Path|Principal|RunLevel|LogonType|UserId'
  - id: task-settings-property-cluster
    desc: Task settings property cluster
    crit: component
    conf: 0.88
    count_min: 3
    if:
      type: text
      regex: 'StartWhenAvailable|AllowDemandStart|StopIfGoingOnBatteries|DisallowStartIfOnBatteries'
composite_rules:
  - id: hidden-task-com-persistence
    desc: Hidden COM scheduled task persistence
    crit: hostile
    conf: 0.97
    all:
      - id: create-hidden-task-path-log
      - id: create-hidden-task-registered-log
      - id: task-scheduler-register-method
      - id: task-settings-property-cluster
    unless:
      - id: metadata/signed/platform::microsoft
  - id: hidden-task-scheduler-com-persistence
    desc: Hidden Task Scheduler COM persistence
    crit: hostile
    conf: 0.97
    all:
      - id: task-scheduler-service-progid
      - id: task-scheduler-register-method
      - id: hidden-task-property
      - id: task-action-principal-properties
    any:
      - id: task-scheduler-builder-methods
      - id: task-settings-property-cluster
    needs: 1
  - id: task-scheduler-com-dropper-persistence
    desc: Task Scheduler COM dropper persistence
    crit: hostile
    conf: 0.96
    all:
      - id: task-scheduler-service-progid
      - id: task-scheduler-register-method
      - id: task-settings-property-cluster
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
    any:
      - id: objectives/execution/wmi::com-wmi-process-create
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/spawn::create-process-w-string
    needs: 1
