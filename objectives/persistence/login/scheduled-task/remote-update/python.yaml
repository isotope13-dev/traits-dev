defaults:
  platforms: [unix, windows]
  for: [python, whl]
  attack: T1053,T1105
  mbc: B0024

traits:
  - id: python-one-shot-schtasks
    desc: Python one-shot scheduled task
    crit: notable
    conf: 0.96
    for: [python]
    if:
      type: text
      regex: '(?is)\bschtasks(\.exe)?\b.{0,120}/create.{0,120}/sc\s+ONCE\b'

  - id: python-delayed-at-job
    desc: Python delayed at job
    crit: notable
    conf: 0.96
    for: [python]
    if:
      type: text
      regex: '(?is)\bat\s+now\s*\+\s*\d+\s+minutes?\s+-f\b'

  - id: python-package-self-update
    desc: Python package self-update
    crit: notable
    conf: 0.96
    for: [python]
    if:
      type: text
      regex: '(?is)\bpip(3)?\s+uninstall\b.{0,260}\bpip(3)?\s+install\s+-U\b'

composite_rules:
  - id: python-delayed-self-update
    desc: Delayed Python self-update
    crit: hostile
    conf: 0.99
    for: [whl]
    scope: archive
    any:
      - id: python-one-shot-schtasks
      - id: python-delayed-at-job
    all:
      - id: python-package-self-update
      - id: micro-behaviors/process/create/subprocess::process-execution
