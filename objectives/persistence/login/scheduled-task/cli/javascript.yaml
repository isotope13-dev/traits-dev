defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: T1053.005
traits:
  - id: schtasks-create-daily
    desc: schtasks daily create command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)schtasks\s*/create.{0,32}/sc\s+daily
  - id: schtasks-task-name
    desc: schtasks task name field
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (?i)/tn\s+"[^"\n]{3,64}"
  - id: schtasks-target-command
    desc: schtasks target command field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?is)\bschtasks(\.exe)?\b[\s\S]{0,512}/tr\s+"
  - id: schtasks-force-start-time
    desc: schtasks force with start time
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)/f\s+/st\s+\d{2}:\d{2}
composite_rules:
  - id: js-schtasks-daily-persistence
    desc: JavaScript creates daily scheduled task
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: metadata/import/builtin::require-child-process
      - id: schtasks-create-daily
      - id: schtasks-task-name
      - id: schtasks-target-command
      - id: schtasks-force-start-time
