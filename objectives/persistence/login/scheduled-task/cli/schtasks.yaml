defaults:
  attack: T1547.001
  crit: suspicious
  for:
  - pe
  - oledoc
  - powershell
  - batch
  - csharp
  - python
  - java
  - class
  - java_class
  platforms:
  - windows
traits:
- id: schtasks-exe-token
  desc: schtasks.exe command token
  crit: component
  conf: 0.92
  if:
    type: text
    word: schtasks.exe
- id: schtasks-query-task-name
  desc: schtasks query task name
  crit: component
  conf: 0.96
  if:
    type: text
    exact: /query /TN "
- id: schtasks-create-task-name
  desc: Scheduled task creation name flag
  crit: component
  conf: 0.96
  if:
    type: text
    regex: (?i)/create\s+/tn\s+"
- id: schtasks-self-task-name-format
  desc: Scheduled task name format placeholder
  crit: component
  conf: 0.97
  if:
    type: text
    regex: (?i)schtasks\.exe\s+/create\s+/tn\s+"%s"
- id: schtasks-self-payload-format
  desc: Task action contains payload placeholder
  crit: component
  conf: 0.97
  if:
    type: text
    regex: (?i)/tr\s+".{0,24}%s.{0,24}"
- id: schtasks-self-logon-highest-force
  desc: Logon task uses highest run level
  crit: component
  conf: 0.97
  if:
    type: text
    regex: (?i)/sc\s+onlogon\s+/rl\s+highest\s+/f
- id: schtasks-onstart-trigger
  desc: Scheduled task ONSTART trigger
  crit: suspicious
  conf: 0.78
  if:
    type: text
    regex: (?i)/sc\s+onstart\b
  unless:
  - id: well-known/app/peazip::peazip-main-executable
- id: schtasks-onlogon-trigger
  desc: Scheduled task ONLOGON trigger
  crit: notable
  conf: 0.78
  if:
    type: text
    regex: (?i)/sc\s+onlogon\b
  unless:
  - id: well-known/app/calvyn-code
- id: schtasks-onlogon-highest-flags
  desc: Scheduled task ONLOGON highest flags
  crit: suspicious
  conf: 0.97
  if:
    type: text
    exact: '" /SC ONLOGON /RL HIGHEST /F'
- id: schtasks-runlevel-highest
  desc: Scheduled task highest runlevel
  crit: suspicious
  conf: 0.78
  unless:
  - type: text
    substr: Starts a hidden process and tries and gets its PID
  - id: well-known/app/virtualbox::unattended-template
  if:
    type: text
    regex: (?i)/rl\s+highest\b
- id: cleanup-reboot-task-name
  desc: cleanup_reboot scheduled task name
  crit: notable
  conf: 0.95
  if:
    type: text
    word: cleanup_reboot
- id: jenkins-cleanup-reboot-payload
  desc: Jenkins cleanup reboot payload path
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: windows_cleanup_and_reboot.ps1
- id: disable-cleanup-reboot-task
  desc: Disables cleanup_reboot scheduled task
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: Disable-ScheduledTask -TaskName cleanup_reboot
composite_rules:
# Loaders often keep schtasks.exe and "/create /tn ... /tr "%s" /sc onlogon
# /rl highest /f" as adjacent wide strings rather than one concatenated command.
- id: schtasks-split-exe-create
  desc: schtasks.exe with nearby create /tn args
  crit: notable
  conf: 0.92
  attack: T1053.005
  all:
  - id: schtasks-exe-token
  - id: schtasks-create-task-name
  near_bytes: 256
- id: schtasks-self-payload-command
  desc: Elevated logon task carries payload
  crit: suspicious
  conf: 0.97
  all:
  - id: schtasks-self-payload-format
  - id: schtasks-self-logon-highest-force
  any:
  - id: schtasks-self-task-name-format
  - id: schtasks-create-task-name
  near_bytes: 128
- id: jenkins-cleanup-reboot-task
  desc: Jenkins cleanup reboot scheduled task
  crit: notable
  conf: 0.95
  all:
  - id: cleanup-reboot-task-name
  - id: jenkins-cleanup-reboot-payload
  - id: disable-cleanup-reboot-task
- id: windows-schtasks-create
  desc: Creates a Windows scheduled task
  crit: notable
  conf: 0.85
  attack: T1053.005
  size_max: 500000
  any:
  - id: micro-behaviors/os/autorun/scheduled::schtasks-create-cmd
  - id: micro-behaviors/os/autorun/scheduled::schtasks-exe-create
  - id: schtasks-split-exe-create
- id: schtasks-logon-query-create
  desc: Queries then creates logon scheduled task
  crit: suspicious
  conf: 0.98
  attack: T1053.005
  all:
  - id: schtasks-exe-token
  - id: schtasks-query-task-name
  - id: schtasks-create-task-name
  any:
  - id: schtasks-onlogon-trigger
  - id: schtasks-onlogon-highest-flags
- id: windows-schtasks-onstart-highest
  desc: Creates elevated startup scheduled task
  conf: 0.95
  crit: suspicious
  attack: T1053.005
  all:
  - id: windows-schtasks-create
  - id: schtasks-onstart-trigger
  - id: schtasks-runlevel-highest
- id: windows-schtasks-onlogon-highest
  desc: Creates elevated logon scheduled task
  conf: 0.95
  crit: suspicious
  attack: T1053.005
  all:
  - id: windows-schtasks-create
  - id: schtasks-onlogon-trigger
  any:
  - id: schtasks-onlogon-highest-flags
  - id: schtasks-runlevel-highest
  unless:
  - id: well-known/app/calvyn-code
- id: windows-schtasks-payload
  desc: Scheduled task with executable payload
  crit: suspicious
  conf: 0.95
  scope: file
  attack: T1053.005
  mbc: F0006
  all:
  - id: windows-schtasks-create
  - id: micro-behaviors/process/create/shell/spawn::cmd-exe
- id: elevated-logon-self-persistence
  desc: Elevated logon task launches itself
  crit: hostile
  conf: 0.98
  attack: T1053.005
  mbc: F0012
  all:
  - id: schtasks-self-payload-command
  - id: micro-behaviors/os/autorun/scheduled::schtasks-utility-token
  - id: micro-behaviors/os/privilege/elevation::runas-elevation-token
  any:
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/process/create/spawn::create-process-w
