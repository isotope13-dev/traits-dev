defaults:
  attack: T1547.001
  crit: suspicious
  for:
  - pe
  - oledoc
  - powershell
  - batch
  - csharp
  - python
  platforms:
  - windows
traits:
- id: schtasks-create-cmd
  desc: schtasks /create command
  crit: suspicious
  conf: 0.7
  if:
    type: raw
    regex: (?i)schtasks\s*/create
- id: schtasks-exe-create
  desc: schtasks.exe create
  crit: notable
  conf: 0.7
  if:
    type: raw
    regex: (?i)schtasks\.exe.{0,30}create
- id: schtasks-exe-token
  desc: schtasks.exe command token
  crit: component
  conf: 0.92
  if:
    type: text
    word: schtasks.exe
- id: schtasks-query-task-name
  desc: schtasks query task name
  crit: component
  conf: 0.96
  if:
    type: text
    exact: /query /TN "
- id: schtasks-create-task-name
  desc: schtasks create task name
  crit: component
  conf: 0.96
  if:
    type: text
    exact: /create /TN "
- id: schtasks-onstart-trigger
  desc: Scheduled task ONSTART trigger
  crit: suspicious
  conf: 0.78
  if:
    type: raw
    regex: (?i)/sc\s+onstart\b
- id: schtasks-onlogon-trigger
  desc: Scheduled task ONLOGON trigger
  crit: suspicious
  conf: 0.78
  if:
    type: raw
    regex: (?i)/sc\s+onlogon\b
- id: schtasks-onlogon-highest-flags
  desc: Scheduled task ONLOGON highest flags
  crit: suspicious
  conf: 0.97
  if:
    type: text
    exact: '" /SC ONLOGON /RL HIGHEST /F'
- id: schtasks-runlevel-highest
  desc: Scheduled task highest runlevel
  crit: suspicious
  conf: 0.78
  if:
    type: raw
    regex: (?i)/rl\s+highest\b
- id: itaskscheduler-iface
  desc: ITaskScheduler interface
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: ITaskScheduler
- id: taskscheduler-word
  desc: TaskScheduler keyword
  crit: component
  conf: 0.6
  if:
    type: text
    word: TaskScheduler
composite_rules:
- id: windows-schtasks
  desc: Creates scheduled task for persistence
  conf: 0.85
  crit: suspicious
  attack: T1053.005
  size_max: 500000
  any:
  - id: schtasks-create-cmd
  - id: schtasks-exe-create
  - id: itaskscheduler-iface
  - id: taskscheduler-word
- id: windows-schtasks-create
  desc: Creates Windows scheduled task
  conf: 0.8
  crit: suspicious
  attack: T1053.005
  size_max: 500000
  any:
  - id: schtasks-create-cmd
  - id: schtasks-exe-create
  - id: schtasks-create-task-name
  - id: itaskscheduler-iface
- id: schtasks-logon-query-create
  desc: Queries then creates logon scheduled task
  crit: suspicious
  conf: 0.98
  attack: T1053.005
  all:
  - id: schtasks-exe-token
  - id: schtasks-query-task-name
  - id: schtasks-create-task-name
  any:
  - id: schtasks-onlogon-trigger
  - id: schtasks-onlogon-highest-flags
- id: windows-schtasks-onstart-highest
  desc: Creates elevated startup scheduled task
  conf: 0.95
  crit: suspicious
  attack: T1053.005
  all:
  - id: windows-schtasks-create
  - id: schtasks-onstart-trigger
  - id: schtasks-runlevel-highest
- id: windows-schtasks-onlogon-highest
  desc: Creates elevated logon scheduled task
  conf: 0.95
  crit: suspicious
  attack: T1053.005
  all:
  - id: windows-schtasks-create
  any:
  - id: schtasks-logon-query-create
  - id: schtasks-onlogon-trigger
  - id: schtasks-onlogon-highest-flags
  - id: schtasks-runlevel-highest
- id: windows-schtasks-payload
  desc: Scheduled task with executable payload
  crit: suspicious
  conf: 0.95
  attack: T1053.005
  mbc: F0006
  all:
  - id: windows-schtasks-create
  - id: micro-behaviors/process/create/shell/invoke::cmd-exe
