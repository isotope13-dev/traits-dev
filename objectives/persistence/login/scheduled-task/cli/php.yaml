defaults:
  platforms: [windows]
  for: [php]
  attack: T1053.005

traits:
  - id: php-schtasks-create-xml
    desc: PHP schtasks XML create
    crit: suspicious
    conf: 0.94
    if:
      type: literal
      regex: 'schtasks /[cC]reate.{0,120}/[xX][mM][lL]'
  - id: php-defender-update-task
    desc: PHP Defender update task name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: WindowsDefenderUpdate
  - id: php-task-runlevel-highest
    desc: PHP task highest runlevel
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: HighestAvailable
  - id: php-logon-task-trigger
    desc: PHP task logon trigger
    crit: component
    conf: 0.9
    if:
      type: text
      substr: <LogonTrigger>
  - id: php-task-runs-php-exe
    desc: PHP task runs php.exe
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: <Command>php.exe</Command>
  - id: php-windows-update-helper-task
    desc: PHP WindowsUpdateHelper task
    crit: component
    conf: 0.88
    if:
      type: literal
      substr: WindowsUpdateHelper_

composite_rules:
  - id: php-schtasks-xml-persistence
    desc: PHP schtasks XML persistence
    crit: hostile
    conf: 0.97
    all:
      - id: php-schtasks-create-xml
      - id: php-defender-update-task
      - id: php-task-runlevel-highest
  - id: php-schtasks-logon-persistence
    desc: PHP schtasks logon persistence
    crit: hostile
    conf: 0.98
    all:
      - id: php-schtasks-create-xml
      - id: php-task-runlevel-highest
      - id: php-logon-task-trigger
      - id: php-task-runs-php-exe
    any:
      - id: micro-behaviors/fs/read/self::self-file-reference
      - id: php-windows-update-helper-task
