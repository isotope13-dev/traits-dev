defaults:
  platforms: [windows]
  for: [php]
  attack: T1053.005

traits:
  - id: php-schtasks-create-xml
    desc: PHP schtasks XML create
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'schtasks\s+/Create[\s\S]{0,160}/XML'
  - id: php-defender-update-task
    desc: PHP Defender update task name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: WindowsDefenderUpdate
  - id: php-task-runlevel-highest
    desc: PHP task highest runlevel
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: HighestAvailable

composite_rules:
  - id: php-schtasks-xml-persistence
    desc: PHP schtasks XML persistence
    crit: hostile
    conf: 0.97
    all:
      - id: php-schtasks-create-xml
      - id: php-defender-update-task
      - id: php-task-runlevel-highest
