defaults:
  platforms: [windows, unix]
  for: [perl]
  attack: T1053.005

traits:
  - id: perl-schtasks-xml-system
    desc: Perl schtasks XML as SYSTEM
    crit: suspicious
    conf: 0.94
    if:
      type: literal
      regex: 'schtasks /create.{0,120}/xml.{0,120}/ru SYSTEM'

  - id: perl-task-boottrigger
    desc: Perl task BootTrigger XML
    crit: component
    conf: 0.9
    if:
      type: text
      substr: <BootTrigger>

  - id: perl-task-highestavailable
    desc: Perl task HighestAvailable
    crit: component
    conf: 0.9
    if:
      type: text
      substr: <RunLevel>HighestAvailable</RunLevel>

  - id: perl-task-temp-batch-action
    desc: Perl task runs temp batch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '%TEMP%\\[^"<]{1,80}\.bat'

composite_rules:
  - id: perl-system-boot-task
    desc: Perl SYSTEM boot task
    crit: hostile
    conf: 0.98
    all:
      - id: perl-schtasks-xml-system
      - id: perl-task-boottrigger
      - id: perl-task-highestavailable
      - id: perl-task-temp-batch-action
