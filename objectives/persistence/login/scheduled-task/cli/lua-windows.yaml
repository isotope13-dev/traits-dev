defaults:
  platforms: [windows]
  for: [lua]
  attack: T1053.005

traits:
  - id: lua-schtasks-create
    desc: Lua schtasks create command
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      substr: schtasks /create

  - id: lua-schtasks-onlogon
    desc: Lua schtasks onlogon trigger
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      substr: /sc onlogon

  - id: lua-schtasks-highest
    desc: Lua schtasks highest runlevel
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      substr: /rl highest

composite_rules:
  - id: lua-elevated-logon-task
    desc: Lua elevated logon task
    crit: suspicious
    conf: 0.96
    all:
      - id: lua-schtasks-create
      - id: lua-schtasks-onlogon
      - id: lua-schtasks-highest
