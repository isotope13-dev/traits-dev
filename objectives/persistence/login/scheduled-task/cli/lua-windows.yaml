defaults:
  platforms: [windows]
  for: [lua]
  attack: T1053.005

traits:
  - id: lua-schtasks-create
    desc: Creates a scheduled task via schtasks
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      substr: schtasks /create

  - id: lua-schtasks-onlogon
    desc: Task triggers at user logon (/sc onlogon)
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      substr: /sc onlogon

  - id: lua-schtasks-highest
    desc: Task runs at highest privilege (/rl)
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      substr: /rl highest

composite_rules:
  - id: lua-elevated-logon-task
    desc: Elevated logon-triggered scheduled task
    crit: suspicious
    conf: 0.96
    all:
      - id: lua-schtasks-create
      - id: lua-schtasks-onlogon
      - id: lua-schtasks-highest
