defaults:
  platforms: [windows]
  for: [ruby]
  attack: T1053.005

traits:
  - id: ruby-schtasks-onlogon-highest
    desc: Ruby schtasks onlogon highest
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'schtasks /create[\s\S]{0,220}/sc onlogon[\s\S]{0,120}/rl HIGHEST'

  - id: ruby-schtasks-program-name
    desc: Ruby schtasks program name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: command = config['command'] || $PROGRAM_NAME

composite_rules:
  - id: ruby-schtasks-logon-persistence
    desc: Ruby schtasks logon persistence
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-schtasks-onlogon-highest
      - id: ruby-schtasks-program-name
