defaults:
  platforms: [windows]
  for: [pe, batch, powershell]
  attack: T1053.002
  mbc: F0012
traits:
  - id: at-exe-command
    desc: at.exe scheduler command
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: at.exe djhfjshdf937826457862398347
  - id: at-exe-random-job-token
    desc: at.exe with opaque job token
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: (?i)^at\.exe [a-z0-9]{16,}$
  - id: tpmprofiler-task
    desc: TPMProfiler scheduled task name (QEMU abuse)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: TPMProfiler
  - id: enterprise-mgmt-queued-alerts-uri
    desc: EnterpriseMgmt queued alerts task URI
    crit: component
    conf: 0.99
    for: [pe]
    if:
      type: text
      substr: \Microsoft\Windows\EnterpriseMgmt\Queued Schedule created for queued alerts
  - id: deviceenroller-task-command
    desc: deviceenroller scheduled task command
    crit: component
    conf: 0.96
    for: [pe]
    if:
      type: text
      substr: <Command>%windir%\system32\deviceenroller.exe</Command>
  - id: wnf-network-state-task-trigger
    desc: WNF network state task trigger
    crit: component
    conf: 0.98
    for: [pe]
    if:
      type: text
      substr: WNF_SEB_FREE_NETWORK_PRESENT
  - id: wnf-datasense-state-task-trigger
    desc: WNF DataSense state task trigger
    crit: component
    conf: 0.98
    for: [pe]
    if:
      type: text
      substr: WNF_CNET_DPU_GLOBAL_STATE_UNDER_TRACK
  - id: scheduled-task-system-highestavailable
    desc: Scheduled task runs as SYSTEM elevated
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: text
      regex: <UserId>S-1-5-18</UserId>.{0,80}<RunLevel>HighestAvailable</RunLevel>
composite_rules:
  - id: legacy-at-scheduled-execution
    desc: Legacy AT scheduled task persistence
    crit: suspicious
    conf: 0.95
    any:
      - id: objectives/persistence/login/scheduled-task::at-exe-command
      - id: objectives/persistence/login/scheduled-task::at-exe-random-job-token
  - id: enterprise-mgmt-deviceenroller-wnf-task
    desc: EnterpriseMgmt deviceenroller WNF persistence
    crit: hostile
    conf: 0.99
    for: [pe]
    all:
      - id: enterprise-mgmt-queued-alerts-uri
      - id: deviceenroller-task-command
      - id: scheduled-task-system-highestavailable
    any:
      - id: wnf-network-state-task-trigger
      - id: wnf-datasense-state-task-trigger
    needs: 1
