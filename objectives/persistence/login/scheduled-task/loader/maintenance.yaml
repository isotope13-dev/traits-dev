# Persistence via Windows Maintenance scheduled task path combined with
# in-memory loader behavior. The [PERSIST:1] marker and
# \Microsoft\Windows\Maintenance\ path are attack-context-specific strings
# that have no meaning outside malware persistence mechanisms.
# Combined with a loader profile, this is a hostile persistence signal.
# ATT&CK: T1053.005 (Scheduled Task: Scheduled Task)
# MBC: F0012
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1053.005
  mbc: F0012
composite_rules:
  - id: loader-maintenance-persistence
    desc: In-memory loader with Windows Maintenance persistence path
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/autorun/scheduled::persist-marker
      - id: micro-behaviors/os/autorun/scheduled::windows-maintenance-path
      - id: objectives/command-and-control/backdoor/loader/native-reflect::in-memory-pe-loader-with-decryption
