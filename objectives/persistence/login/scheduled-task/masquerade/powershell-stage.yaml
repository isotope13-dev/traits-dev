defaults:
  platforms: [windows]
  for: [powershell, batch]
  attack: T1053.005
  mbc: F0012

composite_rules:
  - id: hidden-logon-wscript-task-stage
    desc: Hidden logon task launches a WScript stage
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/os/autorun/scheduled::powershell-schtasks-xml-create
      - id: objectives/persistence/login/scheduled-task/masquerade::task-hidden-xml
      - id: objectives/persistence/login/scheduled-task/masquerade::task-logon-trigger-xml
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-host-exec
