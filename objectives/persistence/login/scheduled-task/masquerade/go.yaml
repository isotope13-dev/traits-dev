defaults:
  mbc: F0012
  attack: T1053.005
  platforms:
    - windows
  for:
    - go
    - pe
    - dll
traits:
  - id: schtasks-create
    desc: schtasks /create command
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: schtasks.{0,20}/create|schtasks.{0,20}/CREATE
  - id: schtasks-xml
    desc: schtasks with XML definition
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: schtasks.{0,20}/xml|schtasks.{0,20}/XML
  - id: logon-trigger
    desc: Task triggers on user logon
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: /sc\s+onlogon|ONLOGON|LogonTrigger
  - id: boot-trigger
    desc: Task triggers on system boot
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: /sc\s+onstart|ONSTART|BootTrigger
  - id: task-hidden-xml
    desc: Hidden scheduled task XML
    crit: notable
    conf: 0.85
    if:
      type: string_value
      exact: <Hidden>true</Hidden>
  - id: task-hidden-pattern
    desc: Hidden task pattern
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: (?i)(schtasks|scheduledtask).{0,64}hidden.{0,10}(true|\$true)
    downgrade:
      all:
        - id: micro-behaviors/data/embedded/certificate::microsoft-timestamp-chain
        - id: metadata/vendor/microsoft::microsoft-corp-marker
  - id: task-runlevel-highest
    desc: Task RunLevel Highest
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: RunLevel.{0,10}Highest
  - id: task-highest-available
    desc: HighestAvailable privilege
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: <RunLevel>HighestAvailable</RunLevel>|RunLevel.{0,20}HighestAvailable
  - id: fake-microsoft-author-xml
    desc: Fake Microsoft Corporation author XML
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: <Author>Microsoft Corporation</Author>
  - id: fake-microsoft-author-string
    desc: Author Microsoft pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: (?i)(<Author>|Author[\\s:=<>"']{0,8})Microsoft( Corporation)?
      not:
        - substr: microsoft.com
        - substr: Root Authority
        - substr: Code Signing PCA
        - substr: Time-Stamp PCA
  - id: task-name-context
    desc: Scheduled task naming context
    crit: component
    conf: 0.8
    if:
      type: string_value
      regex: (?i)(/tn\s+|<URI>|TaskName.{0,16})
  - id: task-name-microsoft-edge
    desc: MicrosoftEdge task name
    crit: component
    conf: 0.8
    if:
      type: string_value
      regex: \\MicrosoftEdge\b
  - id: task-name-windows-defender
    desc: WindowsDefender task name
    crit: component
    conf: 0.8
    if:
      type: string_value
      regex: \\WindowsDefender\b
  - id: task-name-onedrive-update
    desc: OneDriveUpdate task name
    crit: component
    conf: 0.8
    if:
      type: string_value
      regex: \\OneDriveUpdate\b
  - id: task-name-security-health
    desc: SecurityHealth task name
    crit: component
    conf: 0.8
    if:
      type: string_value
      regex: \\SecurityHealth\b
  - id: task-restart-on-failure
    desc: Task restarts on failure
    crit: notable
    conf: 0.7
    if:
      type: string_value
      word: RestartOnFailure
  - id: task-restart-count
    desc: Task restart count setting
    crit: notable
    conf: 0.7
    if:
      type: string_value
      word: RestartCount
  - id: task-restart-interval
    desc: Task restart interval setting
    crit: notable
    conf: 0.7
    if:
      type: string_value
      word: RestartInterval
composite_rules:
  - id: task-trigger
    desc: Task startup trigger
    crit: notable
    conf: 0.75
    any:
      - id: logon-trigger
      - id: boot-trigger
  - id: task-hidden
    desc: Hidden scheduled task
    crit: notable
    conf: 0.85
    any:
      - id: task-hidden-xml
      - id: task-hidden-pattern
    downgrade:
      all:
        - id: micro-behaviors/data/embedded/certificate::microsoft-timestamp-chain
        - id: metadata/vendor/microsoft::microsoft-corp-marker
  - id: task-highest-privilege
    desc: Task runs with highest privileges
    crit: notable
    conf: 0.8
    any:
      - id: task-runlevel-highest
      - id: task-highest-available
  - id: fake-microsoft-author
    desc: Fake Microsoft Corporation author
    crit: suspicious
    conf: 0.9
    any:
      - id: fake-microsoft-author-xml
      - id: fake-microsoft-author-string
  - id: masquerade-task-name
    desc: Masqueraded scheduled task name
    crit: suspicious
    conf: 0.85
    all:
      - id: task-name-context
    any:
      - id: task-name-microsoft-edge
      - id: task-name-windows-defender
      - id: task-name-onedrive-update
      - id: task-name-security-health
  - id: task-evasion
    desc: Task evasion techniques
    crit: notable
    conf: 0.85
    any:
      - id: masquerade-task-name
      - id: task-hidden
      - id: task-restart-on-failure
      - id: task-restart-count
      - id: task-restart-interval
    downgrade:
      all:
        - id: micro-behaviors/data/embedded/certificate::microsoft-timestamp-chain
        - id: metadata/vendor/microsoft::microsoft-corp-marker
  - id: schtask-persistence
    desc: Scheduled task persistence
    crit: suspicious
    conf: 0.85
    all:
      - id: schtasks-create
      - id: task-trigger
  - id: schtask-masquerade
    desc: Scheduled task with Microsoft masquerading
    crit: hostile
    conf: 0.95
    all:
      - id: schtasks-create
      - id: fake-microsoft-author
      - id: task-evasion
  - id: schtask-elevated
    desc: Elevated scheduled task with persistence
    crit: hostile
    conf: 0.95
    all:
      - id: schtasks-create
      - id: task-highest-privilege
      - id: task-trigger
      - id: task-evasion
