defaults:
  mbc: F0012
  attack: T1053.005
  platforms: [windows]
  for: [go, pe, dll]
traits:
  - id: schtasks-create
    desc: schtasks /create command
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'schtasks.{0,20}/create|schtasks.{0,20}/CREATE'
    unless:
      - id: well-known/app/anthropic-claude-code::native-cli-member
      - id: well-known/app/peazip::peazip-main-executable
      - type: text
        substr: "nvm4w-regitration-"
  - id: schtasks-xml
    desc: schtasks with XML definition
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: 'schtasks.{0,20}/xml|schtasks.{0,20}/XML'
    unless:
      - id: well-known/app/anthropic-claude-code::native-cli-member
  - id: logon-trigger
    desc: Task triggers on user logon
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '/sc\s+onlogon|ONLOGON|LogonTrigger'
  - id: boot-trigger
    desc: Task triggers on system boot
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '/sc\s+onstart|ONSTART|BootTrigger'
    unless:
      - id: well-known/app/peazip::peazip-main-executable
      - type: text
        substr: "nvm4w-regitration-"
  - id: task-hidden-xml
    desc: Hidden scheduled task XML
    crit: notable
    conf: 0.85
    for: [powershell, batch, pe, dll, html]
    if:
      type: text
      substr: '<Hidden>true</Hidden>'
    unless:
      - id: metadata/signed/developer::johannes-schindelin
  - id: task-hidden-pattern
    desc: Hidden task pattern
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)(schtasks|scheduledtask).{0,64}hidden.{0,10}(true|\$true)'
    downgrade:
      all:
        - id: micro-behaviors/data/embedded/certificate::microsoft-timestamp-chain
        - id: metadata/binary/vendor/
  - id: task-runlevel-highest
    desc: Task RunLevel Highest
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'RunLevel.{0,10}Highest'
  - id: task-highest-available
    desc: HighestAvailable privilege
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '<RunLevel>HighestAvailable</RunLevel>|RunLevel.{0,20}HighestAvailable'
  - id: fake-microsoft-author-xml
    desc: Fake Microsoft Corporation author XML
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: '<Author>Microsoft Corporation</Author>'
    unless:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - type: text
        regex: '<(CodeSnippets?|CodeSnippetCollection|Shortcut|SnippetTypes?)>'
  - id: fake-microsoft-author-string
    desc: Author Microsoft pattern
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(?i)(<Author>|Author[\s:=<>"]{0,8})Microsoft( Corporation)?'
      not:
        - substr: microsoft.com
        - substr: Root Authority
        - substr: Code Signing PCA
        - substr: Time-Stamp PCA
    unless:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - type: text
        regex: '<(CodeSnippets?|CodeSnippetCollection|Shortcut|SnippetTypes?)>'
  - id: task-name-marker
    desc: schtasks task-name switch
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)/tn\s+'
  - id: task-name-microsoft-edge
    desc: MicrosoftEdge task name
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\\MicrosoftEdge\\b'
  - id: task-name-msedge-diagnostic
    desc: MsEdge diagnostic task name
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?i)(\\Diagnostic\\Microsoft\\MsEdgeDiagnostic\b|\bMsEdgeDiagnostic\b)'
  - id: task-name-windows-defender
    desc: WindowsDefender task name
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\\WindowsDefender\\b'
  - id: task-name-onedrive-update
    desc: OneDriveUpdate task name
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\\OneDriveUpdate\\b'
  - id: task-name-security-health
    desc: SecurityHealth task name
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\\SecurityHealth\\b'
  - id: task-restart-on-failure
    desc: Task restarts on failure
    crit: suspicious
    conf: 0.7
    if:
      type: text
      word: RestartOnFailure
    unless:
      - type: path
        regex: '\.go(?:\.|$)'
  - id: task-restart-count
    desc: Task restart count setting
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: '<RestartCount>\s*\d+\s*</RestartCount>|-RestartCount\s+\d'
    unless:
      - type: path
        regex: '(^|[\\/])KubernetesClient\.dll$'
  - id: task-restart-interval
    desc: Windows task restart interval markup or switch
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: '<RestartInterval>.{1,64}</RestartInterval>|-RestartInterval\s+\S+'
    unless:
      - type: text
        substr: outerleaf
      - type: text
        substr: leafPrefixRestartInterval
      - type: text
        substr: iteratorLeafRestartInterval
      - type: text
        regex: 'restart (key|table|offset)'
      - type: text
        regex: 'restart(Count|Raw)s?'
      - id: well-known/app/ze::ze-source-tree
  - id: task-logon-trigger-xml
    desc: Scheduled task logon trigger XML
    crit: component
    conf: 0.8
    for: [powershell, batch, pe, dll, html]
    if:
      type: text
      substr: '<LogonTrigger>'
  - id: task-conhost-command-xml
    desc: Scheduled task conhost command
    crit: component
    conf: 0.9
    for: [powershell, batch, pe, dll, html]
    if:
      type: text
      substr: '<Command>conhost</Command>'
  - id: task-headless-argument-xml
    desc: Scheduled task headless argument
    crit: suspicious
    conf: 0.9
    for: [powershell, batch, pe, dll, html]
    if:
      type: text
      regex: '<(Arguments|Command)>[^<]{0,200}--headless'
  - id: task-appdata-config-exe-xml
    desc: Task launches AppData configured EXE
    crit: suspicious
    conf: 0.88
    for: [powershell, batch, pe, dll, html]
    if:
      type: text
      regex: (?i)%AppData%.{0,80}\.exe\s+-f\s+
  - id: task-unlimited-runtime-xml
    desc: Scheduled task unlimited runtime
    crit: notable
    conf: 0.78
    for: [powershell, batch, pe, dll, html]
    if:
      type: text
      substr: '<ExecutionTimeLimit>PT0S</ExecutionTimeLimit>'
  - id: go-taskmaster-package
    desc: Go taskmaster scheduled-task package
    crit: component
    conf: 0.86
    for: [go, pe]
    if:
      type: text
      substr: github.com/capnspacehook/taskmaster
  - id: task-time-trigger
    desc: Scheduled task time trigger
    crit: component
    conf: 0.74
    if:
      type: text
      regex: 'TimeTrigger|<TimeTrigger>'
  - id: task-exec-action
    desc: Scheduled task executable action
    crit: component
    conf: 0.76
    if:
      type: text
      regex: 'ExecAction|<Exec>|<Command>'
  - id: task-repeat-30-minutes
    desc: Scheduled task 30 minute repeat interval
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '30\s*\*\s*time\.Minute|PT30M|30\s+minutes'
composite_rules:
  - id: task-trigger
    desc: Task startup trigger
    crit: component
    conf: 0.75
    any:
      - id: logon-trigger
      - id: boot-trigger
    unless:
      - id: well-known/app/peazip::peazip-main-executable
  - id: task-hidden
    desc: Hidden scheduled task
    crit: suspicious
    conf: 0.85
    any:
      - id: task-hidden-xml
      - id: task-hidden-pattern
    downgrade:
      all:
        - id: micro-behaviors/data/embedded/certificate::microsoft-timestamp-chain
        - id: metadata/binary/vendor/
  - id: task-highest-privilege
    desc: Task runs with highest privileges
    crit: suspicious
    conf: 0.8
    any:
      - id: task-runlevel-highest
      - id: task-highest-available
  - id: fake-microsoft-author
    desc: Fake Microsoft Corporation author
    crit: suspicious
    conf: 0.9
    any:
      - id: fake-microsoft-author-xml
      - id: fake-microsoft-author-string
    downgrade:
      any:
        - id: metadata/signed/platform/
  - id: masquerade-task-name
    desc: Masqueraded scheduled task name
    crit: suspicious
    conf: 0.85
    all:
      - id: task-name-marker
    any:
      - id: task-name-microsoft-edge
      - id: task-name-msedge-diagnostic
      - id: task-name-windows-defender
      - id: task-name-onedrive-update
      - id: task-name-security-health
  - id: task-evasion
    desc: Task evasion techniques
    crit: suspicious
    conf: 0.85
    any:
      - id: masquerade-task-name
      - id: task-hidden
      - id: task-restart-on-failure
      - id: task-restart-count
      - id: task-restart-interval
      - id: task-unlimited-runtime-xml
    downgrade:
      all:
        - id: micro-behaviors/data/embedded/certificate::microsoft-timestamp-chain
        - id: metadata/binary/vendor/
  - id: schtask-persistence
    desc: Scheduled task persistence
    crit: suspicious
    conf: 0.85
    all:
      - id: schtasks-create
      - id: task-trigger
    unless:
      - id: well-known/app/peazip::peazip-main-executable
  - id: go-taskmaster-hidden-logon-task
    desc: Go taskmaster hidden logon scheduled task
    crit: suspicious
    conf: 0.9
    for: [go, pe]
    all:
      - id: go-taskmaster-package
      - id: logon-trigger
      - id: task-hidden
    any:
      - id: task-time-trigger
      - id: task-exec-action
      - id: task-repeat-30-minutes
    needs: 1
  - id: schtask-masquerade
    desc: Scheduled task with Microsoft masquerading
    crit: hostile
    conf: 0.95
    all:
      - id: schtasks-create
      - id: fake-microsoft-author
      - id: task-evasion
  - id: schtask-elevated
    desc: Elevated scheduled task with persistence
    crit: hostile
    conf: 0.95
    all:
      - id: schtasks-create
      - id: task-highest-privilege
      - id: task-trigger
      - id: task-evasion
  - id: hidden-logon-headless-appdata-task
    desc: Hidden logon AppData headless task
    crit: hostile
    conf: 0.96
    for: [powershell, batch, pe, dll, html]
    all:
      - id: task-hidden-xml
      - id: task-logon-trigger-xml
      - id: task-conhost-command-xml
      - id: task-headless-argument-xml
      - id: task-appdata-config-exe-xml
