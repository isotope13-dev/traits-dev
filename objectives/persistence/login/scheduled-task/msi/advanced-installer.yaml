defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1053.005
  mbc: F0012
traits:
  - id: advanced-installer-task-schema
    desc: MSI scheduled task schema
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: AI_ScheduledTasksUser
  - id: advanced-installer-task-actions
    desc: MSI schedules local task
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: AI_ScheduledTasksUser.{0,40}local computer
  - id: named-update-config-tasks
    desc: Named update config tasks
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: AI_ScheduledTasksUser.{0,40}CheatSpaceUpdateTaskCheatSpaceConfigTask
composite_rules:
  - id: msi-named-scheduled-task-persistence
    desc: MSI persists with named tasks
    crit: suspicious
    conf: 0.99
    all:
      - id: metadata/binary/installer/database::msi-installer-database-title
      - id: advanced-installer-task-schema
      - id: advanced-installer-task-actions
      - id: named-update-config-tasks
