defaults:
  platforms: [windows]
  for: [python]
  size_max: 131072
  attack: T1546

traits:
  - id: sitecustomize-path
    desc: Python sitecustomize startup path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)(\\|/)Lib(\\|/)sitecustomize\.py\b'

  - id: py-getargcargv
    desc: CPython argv inspection API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Py_GetArgcArgv

  - id: runpy-run-path
    desc: runpy run_path execution
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: runpy.run_path

  - id: pythonw-launch
    desc: pythonw executable reference
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '(?i)\bpythonw(\.exe)?\b'

composite_rules:
  - id: sitecustomize-startup-hijack
    desc: Python sitecustomize startup hijack
    crit: hostile
    conf: 0.97
    all:
      - id: sitecustomize-path
      - id: py-getargcargv
      - id: runpy-run-path
    any:
      - id: pythonw-launch
      - id: objectives/anti-static/obfuscation/eval/scripting::pythonw-exe-replace-trick
    needs: 1
