defaults:
  for: [batch, powershell, vbs]
  platforms: [windows]
  attack: T1546.015

traits:
  - id: reg-add-clsid-script
    desc: reg add writes CLSID script path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)reg\s+add.{0,80}\\Software\\Classes\\CLSID\\\{[0-9A-F-]{36}\}'
  - id: inprocserver32-script-path
    desc: InProcServer32 path in script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: InProcServer32
  - id: rundll32-inprocserver32-value
    desc: InProcServer32 value set to rundll32
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)InProcServer32.{0,80}rundll32\.exe'
  - id: apartment-threading-model
    desc: Apartment threading model registration
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)ThreadingModel.{0,60}Apartment'

composite_rules:
  - id: script-clsid-rundll32-com-hijack
    desc: Script registers CLSID COM hijack
    crit: suspicious
    conf: 0.97
    all:
      - id: reg-add-clsid-script
      - id: inprocserver32-script-path
      - id: rundll32-inprocserver32-value
    any:
      - id: apartment-threading-model
