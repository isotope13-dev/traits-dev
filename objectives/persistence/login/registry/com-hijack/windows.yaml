defaults:
  for: [pe]
  platforms: [windows]
  attack: T1546.015

traits:
  - id: shellserviceobjectdelayload-key
    desc: ShellServiceObjectDelayLoad registry path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\ShellServiceObjectDelayLoad

  - id: clsid-inprocserver32-format
    desc: CLSID InProcServer32 format path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'CLSID\\\{[0-9A-Fa-f-]{36}\}\\InProcServer32'
    not:
      - exact: CLSID\{472083B0-C522-11CF-8763-00608CC02F24}\InProcServer32
      - substr: ContextMenuHandlers
      - substr: DropHandler
      - substr: PropertySheetHandlers
      - substr: WinRAR shell extension
      - substr: Shell Extensions\Approved

  - id: web-event-logger-name
    desc: Web Event Logger autoload name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: Web Event Logger

  - id: clsid-guid-string
    desc: Embedded CLSID persistence GUID
    crit: component
    conf: 0.86
    if:
      type: text
      exact: '{79FEACFF-FFCE-815E-A900-316290B5B738}'

composite_rules:
  - id: shellservice-com-hijack
    desc: Shell service COM hijack persistence
    crit: hostile
    conf: 0.97
    all:
      - id: shellserviceobjectdelayload-key
      - id: clsid-inprocserver32-format
      - id: micro-behaviors/os/registry/access::reg-create-key-ex-a
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-a
    any:
      - id: web-event-logger-name
      - id: clsid-guid-string
