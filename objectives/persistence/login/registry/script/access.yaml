defaults:
  platforms:
    - windows
  for:
    - javascript
    - vbs
traits:
  - id: script-regwrite
    desc: WScript RegWrite registry modification
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: RegWrite\s*\(
    attack: T1547.001
    mbc: F0006
  - id: script-regread
    desc: WScript RegRead registry query
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: RegRead\s*\(
    attack: T1012
    mbc: E1563
  - id: script-regdelete
    desc: WScript RegDelete registry removal
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: RegDelete\s*\(
    attack: T1562.004
    mbc: E1006
  - id: hkey-local-machine
    desc: HKLM system-wide registry hive ref
    crit: suspicious
    conf: 0.5
    if:
      type: string_literal
      exact: HKEY_LOCAL_MACHINE
    attack: T1012
  - id: hkey-current-user
    desc: HKCU per-user registry hive ref
    crit: suspicious
    conf: 0.5
    if:
      type: string_literal
      exact: HKEY_CURRENT_USER
    attack: T1012
  - id: run-key-reference
    desc: Registry Run key
    crit: suspicious
    conf: 0.8
    if:
      id: objectives/persistence/login/registry/autostart::common-persistence-keys
    attack: T1547.001
    mbc: F0006
composite_rules:
  - id: script-registry-operations
    desc: Script registry manipulation
    crit: suspicious
    conf: 0.8
    attack: T1012
    mbc: E1563
    needs: 2
    any:
      - id: script-regwrite
      - id: script-regread
      - id: script-regdelete
  - id: script-registry-persistence
    desc: Script registry persistence
    crit: suspicious
    conf: 0.85
    attack: T1547.001
    mbc: F0006
    all:
      - id: script-regwrite
      - id: run-key-reference
