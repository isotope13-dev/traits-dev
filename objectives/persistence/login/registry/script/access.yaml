defaults:
  platforms: [windows]
  for: [vbs]
traits:
  - id: run-key-reference
    desc: Registry Run key
    crit: suspicious
    conf: 0.8
    if:
      id: objectives/persistence/login/registry/autostart::common-persistence-keys
    attack: T1547.001
    mbc: F0006
composite_rules:
  - id: script-registry-operations
    desc: Script registry manipulation
    crit: suspicious
    conf: 0.8
    attack: T1012
    mbc: E1563
    needs: 2
    any:
      - id: micro-behaviors/os/registry/write/wsh::wscript-regwrite
      - id: micro-behaviors/os/registry/read::wscript-regread
      - id: micro-behaviors/os/registry/delete::wscript-regdelete
  - id: script-registry-persistence
    desc: Script registry persistence
    crit: suspicious
    conf: 0.85
    attack: T1547.001
    mbc: F0006
    all:
      - id: micro-behaviors/os/registry/write/wsh::wscript-regwrite
      - id: run-key-reference
