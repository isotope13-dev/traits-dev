# Suspicious registry Run key value names in C/C++ source
# Detects unusual value names used for registry persistence
defaults:
  platforms: [windows]
  for: [c, cpp]
  crit: suspicious
  conf: 0.85

traits:
  # Numeric-only registry value names (e.g., "666")
  - id: numeric-run-key-value
    desc: Numeric registry Run key value name
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: "RegSetValueEx\\s*\\(.{0,50},\\s*\"[0-9]{1,4}\"\\s*,"

  # Very short registry value names (1-3 chars)
  - id: short-run-key-value
    desc: Unusually short Run key value name
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: "RegSetValueEx\\s*\\(.{0,50},\\s*\".{1,3}\"\\s*,"
    unless:
      - id: well-known/app/samba::samba-source-tree
