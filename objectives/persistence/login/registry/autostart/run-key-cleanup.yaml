defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1547.001
composite_rules:
  - id: run-key-write-delete-cleanup
    desc: Run key write paired with cleanup delete
    crit: notable
    conf: 0.94
    size_max: 5242880
    all:
      - id: objectives/persistence/login/registry/autostart::run-key
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-w
      - id: micro-behaviors/os/registry/manipulate::reg-delete-value
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: persistence-with-shellcode-loader
    desc: Run key persistence combined with shellcode loader
    crit: hostile
    conf: 0.95
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: objectives/persistence/login/registry/autostart::run-key
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-w
    needs: 1
    any:
      - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
      - id: objectives/evasion/process/injection/shellcode::executable-heap-shellcode-loader
      - id: objectives/anti-static/obfuscation/imports::pe-walk-hash-resolver-x64
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/metrics::many-imports-50
