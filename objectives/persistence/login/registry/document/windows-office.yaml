defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1137
traits:
- id: office-addin-registry--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '(?i)\\Microsoft\\Office\\[0-9.]+\\(Word|Excel|PowerPoint|Outlook)\\Addins\\'

  count_max: 1025112
- id: office-addin-registry--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\\Office\\[^\\\n]{1,80}\\Addins\\'

  count_max: 1025113
- id: office-addin-registry--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    substr: \Outlook\Addins\
  count_max: 1025114
- id: outlook-form-region-registry
  desc: Outlook form region persistence
  crit: suspicious
  conf: 0.84
  if:
    type: text
    regex: '(?i)\\Outlook\\FormRegions\\|\\Office\\Outlook\\FormRegions\\'

composite_rules:
- id: office-addin-registry-write
  desc: Office add-in registry write
  crit: suspicious
  conf: 0.88
  all:
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  any:
  - id: office-addin-registry
  - id: outlook-form-region-registry
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/signed/platform::microsoft-corporation
- id: office-addin-registry
  desc: Office add-in persistence
  crit: suspicious
  conf: 0.84
  any:
  - id: office-addin-registry--rx-1
  - id: office-addin-registry--rx-2
  - id: office-addin-registry--rx-3
