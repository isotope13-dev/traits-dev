defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1547.001
traits:
  - id: wsh-slice-reg-add
    desc: Slice-obfuscated REG ADD command
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "'8957898ADD '.slice(7)"
  - id: wsh-slice-reg-sz
    desc: Slice-obfuscated REG_SZ value
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "'39967 REG_'.slice(5)"
  - id: wsh-slice-current-version
    desc: Slice-obfuscated CurrentVersion key
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "'7621906\"Curr'.slice(7)"
  - id: wsh-slice-run-value
    desc: Slice-obfuscated Run key value
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "'2558Run'.slice(4)"
  - id: wsh-slice-crypted-value
    desc: Slice-obfuscated Crypted registry value
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "'296848CRYPT'.slice(6)"
composite_rules:
  - id: wsh-slice-run-key-persistence
    desc: Obfuscated WSH Run key persistence
    crit: suspicious
    conf: 0.97
    all:
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::numeric-suffix-identifiers
      - id: wsh-slice-reg-add
      - id: wsh-slice-reg-sz
      - id: wsh-slice-current-version
      - id: wsh-slice-run-value
      - id: wsh-slice-crypted-value
