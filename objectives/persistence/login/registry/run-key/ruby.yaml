defaults:
  platforms: [windows]
  for: [ruby]
  attack: T1547.001

traits:
  - id: ruby-reg-add-run-key-command
    desc: Ruby reg add Run key command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\breg\s+add\s+HKCU\\+Software\\+Microsoft\\+Windows\\+CurrentVersion\\+Run\b'
  - id: ruby-currentversion-run-path
    desc: Ruby CurrentVersion Run path
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)HKCU\\+Software\\+Microsoft\\+Windows\\+CurrentVersion\\+Run\b'

composite_rules:
  - id: ruby-reg-add-run-key-persistence
    desc: Ruby writes Registry Run key
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-reg-add-run-key-command
      - id: micro-behaviors/process/create/system::ruby-system
    any:
      - id: ruby-currentversion-run-path
      - id: micro-behaviors/os/env/vars/user-paths::userprofile-var
