defaults:
  platforms: [windows]
  for: [all]
  attack: T1547.001

composite_rules:
  - id: msi-run-key-masqueraded-host
    desc: MSI persists a masqueraded Windows host payload
    crit: hostile
    conf: 0.99
    attack: T1547.001,T1036.005,T1027.009
    all:
      - id: objectives/command-and-control/dropper/execution/script::msi-run-key-persistence-reference
      - id: metadata/file/profile/identity::msi-run-value-executable-target
    any:
      - id: metadata/file/profile/identity::msi-application-frame-host-alias
      - id: metadata/file/profile/identity::msi-svchost-alias
      - id: metadata/file/profile/identity::msi-runtime-broker-alias
      - id: metadata/file/profile/identity::msi-search-host-alias
    unless:
      - id: metadata/binary/installer/family/
