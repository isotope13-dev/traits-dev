defaults:
  platforms: [windows]
  for: [php]
  attack: T1547.001

traits:
  - id: php-run-key-path
    desc: PHP Registry Run key path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'Microsoft\\Windows\\CurrentVersion\\Run'
  - id: php-reg-add-command
    desc: PHP reg add command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\breg add\b[\s\S]{0,220}/v'
  - id: php-temp-svchost-update
    desc: PHP Temp svchost payload path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'C:\\Windows\\Temp\\svchost_update.exe'
  - id: php-run-key-php-exe
    desc: PHP Run key php.exe command
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      substr: 'php.exe %s'
  - id: php-svchost-update-value
    desc: PHP SvcHost_Update value
    crit: component
    conf: 0.88
    if:
      type: literal
      substr: SvcHost_Update_

composite_rules:
  - id: php-run-key-temp-persistence
    desc: PHP Run key temp persistence
    crit: hostile
    conf: 0.97
    all:
      - id: php-run-key-path
      - id: php-reg-add-command
      - id: php-temp-svchost-update
  - id: php-run-key-script-persistence
    desc: PHP Run key script persistence
    crit: hostile
    conf: 0.98
    all:
      - id: php-run-key-path
      - id: php-reg-add-command
      - id: php-run-key-php-exe
    any:
      - id: micro-behaviors/fs/read/self::self-file-reference
      - id: php-svchost-update-value
