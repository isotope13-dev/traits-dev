defaults:
  platforms: [windows]
  for: [php]
  attack: T1547.001

traits:
  - id: php-run-key-path
    desc: PHP Registry Run key path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run'
  - id: php-reg-add-command
    desc: PHP reg add command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\breg add\b[\s\S]{0,220}/v'
  - id: php-temp-svchost-update
    desc: PHP Temp svchost payload path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'C:\\Windows\\Temp\\svchost_update.exe'

composite_rules:
  - id: php-run-key-temp-persistence
    desc: PHP Run key temp persistence
    crit: hostile
    conf: 0.97
    all:
      - id: php-run-key-path
      - id: php-reg-add-command
      - id: php-temp-svchost-update
