defaults:
  platforms: [windows]
  for: [java, class, java_class, jar]
  attack: T1547.001

traits:
  - id: java-currentversion-run-path
    desc: Java CurrentVersion Run path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'CurrentVersion\\\\Run(Once)?'

  - id: java-reg-add-run-command
    desc: Java reg add Run command
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'reg add[\s\S]{0,260}/t REG_SZ[\s\S]{0,260}/f'

composite_rules:
  - id: java-run-key-persistence
    desc: Java Run key persistence
    crit: hostile
    conf: 0.98
    all:
      - id: java-currentversion-run-path
      - id: java-reg-add-run-command
