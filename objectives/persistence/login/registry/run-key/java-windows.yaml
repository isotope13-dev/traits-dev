defaults:
  platforms: [windows]
  for: [java, class, java_class, jar]
  attack: T1547.001

traits:
  - id: java-currentversion-run-path
    desc: JVM CurrentVersion Run path
    crit: suspicious
    conf: 0.93
    for: [java, kotlin]
    if:
      type: text
      regex: 'CurrentVersion\\\\Run(Once)?'

  - id: java-reg-add-run-command
    desc: JVM reg add Run command
    crit: suspicious
    conf: 0.93
    for: [java, kotlin]
    if:
      type: text
      regex: 'reg add[\s\S]{0,260}/t REG_SZ[\s\S]{0,260}/f'

  - id: jvm-currentversion-run-bytes
    desc: JVM CurrentVersion Run bytes
    crit: suspicious
    conf: 0.93
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 43 75 72 72 65 6E 74 56 65 72 73 69 6F 6E 5C 52 75 6E

  - id: jvm-reg-sz-bytes
    desc: JVM REG_SZ bytes
    crit: component
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 52 45 47 5F 53 5A

composite_rules:
  - id: java-run-key-persistence
    desc: Java Run key persistence
    crit: hostile
    conf: 0.98
    all:
      - id: java-currentversion-run-path
      - id: java-reg-add-run-command

  - id: kotlin-run-key-persistence
    desc: Kotlin Run key persistence
    crit: hostile
    conf: 0.98
    for: [kotlin]
    all:
      - id: java-currentversion-run-path
      - id: java-reg-add-run-command

  - id: jvm-run-key-persistence
    desc: JVM Run key persistence
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-currentversion-run-bytes
      - id: jvm-reg-sz-bytes
    any:
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
    unless:
      - id: metadata/file/magic/identity::gzip
      - id: metadata/file/metrics::high-entropy-archive

  - id: jvm-runtimeexec-run-key-persistence
    desc: JVM Runtime.exec Run key persistence
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-currentversion-run-bytes
      - id: jvm-reg-sz-bytes
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
    unless:
      - id: metadata/file/magic/identity::gzip
      - id: metadata/file/metrics::high-entropy-archive
