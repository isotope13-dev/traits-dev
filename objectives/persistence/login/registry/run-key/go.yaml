defaults:
  mbc: F0012
  attack: T1547.001
  platforms:
    - windows
traits:
  - id: hkcu-run-key
    desc: HKCU Run registry key path
    crit: suspicious
    conf: 0.8
    for:
      - go
      - pe
      - dll
    if:
      type: text
      regex: HKCU.{0,20}\\Software\\Microsoft\\Windows\\CurrentVersion\\Run
    unless:
      - id: well-known/tool/sysadmin/conemu/
  - id: hklm-run-key
    desc: HKLM Run registry key path
    crit: suspicious
    conf: 0.8
    for:
      - go
      - pe
      - dll
    if:
      type: text
      regex: HKLM.{0,20}\\Software\\Microsoft\\Windows\\CurrentVersion\\Run
  - id: masquerade-windows-defender
    desc: WindowsDefender masquerade name
    crit: component
    conf: 0.8
    for:
      - go
      - pe
      - dll
    if:
      type: text
      regex: (?i)\bWindowsDefender(\.(exe|dll))?\b
      not:
        - substr: Windows Defender
        - substr: microsoft.com
        - substr: WindowsDefender.exe
        - substr: WindowsDefender.dll
        - substr: DefaultIcon
        - substr: ContextMenuHandlers
        - substr: ShellEx
  - id: masquerade-system-update
    desc: SystemUpdate masquerade name
    crit: notable
    conf: 0.8
    for:
      - go
      - pe
      - dll
    if:
      type: text
      word: SystemUpdate
  - id: masquerade-trusted-installer
    desc: TrustedInstaller masquerade name
    crit: notable
    conf: 0.8
    for:
      - go
      - pe
      - dll
    if:
      type: text
      word: TrustedInstaller
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
        - id: metadata/binary/vendor/
        - id: metadata/library/compression/
        - id: metadata/binary/installer/sfx/
        - id: metadata/binary/installer/sfx/
    unless:
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: legacy-app-lotus
    desc: "Legacy Lotus Approach registry path"
    crit: suspicious
    conf: 0.85
    for:
      - go
    if:
      type: string_literal
      regex: Software\\Lotus\\Approach
  - id: legacy-app-borland
    desc: "Legacy Borland Delphi registry path"
    crit: suspicious
    conf: 0.85
    for:
      - go
    if:
      type: string_literal
      regex: Software\\Borland\\Delphi
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::borland-rtl-regkey
  - id: legacy-app-netscape
    desc: 'Legacy Netscape Navigator registry path'
    crit: suspicious
    conf: 0.85
    for:
      - go
    if:
      type: string_literal
      regex: Software\\Netscape\\Netscape Navigator
  - id: windows-system-exe-masquerade-core-a
    desc: Windows core executable masquerade names
    crit: component
    conf: 0.8
    for:
      - go
      - pe
      - dll
    if:
      type: text
      regex: (?i)\b(explorer|svchost|lsass|csrss)\.exe\b
    unless:
      - id: metadata/signed/platform/
  - id: windows-system-exe-masquerade-core-b
    desc: Windows service executable masquerade names
    crit: component
    conf: 0.8
    for:
      - go
      - pe
      - dll
    if:
      type: text
      regex: (?i)\b(smss|services|wininit|spoolsv)\.exe\b
    unless:
      - id: metadata/signed/platform/
  - id: windows-system-exe-masquerade-core-c
    desc: Windows host executable masquerade names
    crit: component
    conf: 0.8
    for:
      - go
      - pe
      - dll
    if:
      type: text
      regex: (?i)\b(taskhostw|taskhost|audiodg|dwm)\.exe\b
    unless:
      - id: metadata/signed/platform/
composite_rules:
  - id: registry-open-key-run
    desc: Registry OpenKey Run key
    crit: suspicious
    conf: 0.84
    for:
      - go
    all:
      - id: micro-behaviors/os/registry/access::go-registry-openkey-call
      - id: run-key-path
  - id: run-key-path
    desc: Registry Run key path
    crit: suspicious
    conf: 0.8
    for:
      - go
    any:
      - id: hkcu-run-key
      - id: hklm-run-key
      - id: micro-behaviors/os/registry/keys::currentversion-run
  - id: run-key-set-value
    desc: Writes a value under a registry Run key
    crit: suspicious
    conf: 0.8
    for:
      - go
    all:
      - id: run-key-path
    any:
      - id: micro-behaviors/os/registry/manipulate::go-registry-set-string-value-call
      - id: micro-behaviors/os/registry/manipulate::go-registry-set-dword-value-call
  - id: masquerade-system-service
    desc: System service masquerade names
    crit: suspicious
    conf: 0.8
    for:
      - go
    any:
      - id: masquerade-system-update
      - id: masquerade-trusted-installer
    unless:
      - id: metadata/package/testing/harness/unit::go-test
      - id: metadata/lang/source::generated-do-not-edit-text
  - id: masquerade-name
    desc: Service masquerade name
    crit: suspicious
    conf: 0.85
    for:
      - go
    any:
      - id: masquerade-windows-defender
      - id: masquerade-system-service
      - id: windows-system-exe-masquerade-set
  - id: windows-system-exe-masquerade-set
    desc: Windows system executable masquerade name set
    crit: suspicious
    conf: 0.86
    for:
      - go
    needs: 2
    any:
      - id: windows-system-exe-masquerade-core-a
      - id: windows-system-exe-masquerade-core-b
      - id: windows-system-exe-masquerade-core-c
  - id: run-key-persistence
    desc: Registry Run key persistence
    crit: suspicious
    conf: 0.9
    for:
      - go
    all:
      - id: micro-behaviors/os/registry/access::go-registry-package-import
      - id: run-key-set-value
      - id: run-key-path
  - id: run-key-masquerade
    desc: Registry Run key with service masquerading
    crit: hostile
    conf: 0.95
    for:
      - go
    all:
      - id: micro-behaviors/os/registry/access::go-registry-package-import
      - id: run-key-set-value
      - id: run-key-path
      - id: masquerade-name
  - id: appdata-run-persistence
    desc: AppData installation with Run key persistence
    crit: hostile
    conf: 0.95
    for:
      - go
    all:
      - id: micro-behaviors/fs/path/location::roaming-appdata-executable-path
      - id: run-key-path
      - id: masquerade-name
