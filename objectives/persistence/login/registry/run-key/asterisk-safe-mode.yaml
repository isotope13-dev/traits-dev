# Asterisk-prefixed Run-key value names — Microsoft-documented behaviour
# where a value name starting with '*' under
# HKLM\Software\Microsoft\Windows\CurrentVersion\Run causes the entry to
# run in Safe Mode in addition to normal logon. Used by Qilin/Agenda and
# multiple other ransomware families to defeat reboot-into-Safe-Mode
# recovery attempts. Six lowercase characters after the asterisk is a
# distinct Qilin-style naming pattern.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell]
  attack: T1547.001
  mbc: F0012
  size_min: 64
  size_max: 500000000
traits:
  - id: run-key-asterisk-name
    desc: Run-key value name with asterisk prefix
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'CurrentVersion\\Run\\\\?\*[A-Za-z0-9]{4,16}\b'
      case_insensitive: true
  - id: run-key-asterisk-six-lowercase
    desc: Run-key with asterisk + 6-char lowercase name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\\Run\\\*[a-z]{6}\b'
  - id: run-key-with-perflogs-target
    desc: Run-key value pointing at C:\PerfLogs\
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Run\\\S{1,40}.{0,200}PerfLogs\\\\\S{1,40}\.exe'
      case_insensitive: true
composite_rules:
  - id: safemode-also-runs-persistence
    desc: Safe-Mode-also-runs Run-key persistence
    crit: hostile
    conf: 0.95
    any:
      - id: run-key-asterisk-name
      - id: run-key-asterisk-six-lowercase
