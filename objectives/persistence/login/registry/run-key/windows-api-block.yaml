defaults:
  for: [pe]
  platforms: [windows]
  attack: T1547.001
traits:
- id: currentversion-run-key-literal
  desc: CurrentVersion Run key literal
  crit: component
  conf: 0.94
  if:
    type: text
    substr: SOFTWARE\Microsoft\Windows\CurrentVersion\Run
  unless:
  - id: metadata/signed/platform::microsoft

- id: run-key-registry-api-block
  desc: Run key registry API block
  crit: component
  conf: 0.95
  if:
    type: text
    substr: RegCreateKeyExA|RegSetValueExA|RegCloseKey
  unless:
  - id: metadata/signed/platform::microsoft

composite_rules:
- id: run-key-persistence-api-block
  desc: Registry Run key persistence API block
  crit: suspicious
  conf: 0.94
  all:
  - id: currentversion-run-key-literal
  - id: run-key-registry-api-block
  any:
  - id: objectives/persistence/login/registry/autostart::run-key
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  unless:
  - id: metadata/signed/platform::microsoft
