defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1547.001
traits:
  - id: create-reg-autostart-path-log
    desc: Registry autostart path log
    crit: component
    conf: 0.96
    if:
      type: text
      exact: "@[createRegAutoStart] path="
  - id: create-reg-autostart-setvalue-log
    desc: Registry SetValue result log
    crit: component
    conf: 0.96
    if:
      type: text
      exact: "@[createRegAutoStart] SetValue result="
  - id: create-reg-autostart-verified-log
    desc: Registry autostart verified log
    crit: component
    conf: 0.96
    if:
      type: text
      exact: "@[createRegAutoStart] VERIFIED: value exists, type="
composite_rules:
  - id: run-key-autostart-log-persistence
    desc: Registry Run key autostart persistence
    crit: suspicious
    conf: 0.97
    all:
      - id: create-reg-autostart-path-log
      - id: create-reg-autostart-setvalue-log
      - id: create-reg-autostart-verified-log
    unless:
      - id: metadata/signed/platform/
