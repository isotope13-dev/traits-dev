defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1547.001

traits:
  - id: csharp-currentversion-run-path
    desc: C# CurrentVersion Run path
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'SOFTWARE\Microsoft\Windows\CurrentVersion\Run'

  - id: csharp-currentversion-run-path-escaped
    desc: C# escaped CurrentVersion Run path
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run'

  - id: csharp-registry-setvalue
    desc: C# registry SetValue call
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\.SetValue\s*\('

composite_rules:
  - id: csharp-currentversion-run-path-any
    desc: C# CurrentVersion Run path
    crit: notable
    conf: 0.93
    any:
      - id: csharp-currentversion-run-path
      - id: csharp-currentversion-run-path-escaped

  - id: csharp-run-key-persistence
    desc: C# Run key persistence
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-currentversion-run-path-any
      - id: csharp-registry-setvalue
    unless:
      - id: metadata/package/quality/profile::networkmanager-autostart-context
