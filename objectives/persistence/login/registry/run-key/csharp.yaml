defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1547.001

traits:
  - id: csharp-currentversion-run-path
    desc: C# CurrentVersion Run path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'SOFTWARE\Microsoft\Windows\CurrentVersion\Run'

  - id: csharp-registry-setvalue
    desc: C# registry SetValue call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.SetValue\s*\('

composite_rules:
  - id: csharp-run-key-persistence
    desc: C# Run key persistence
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-currentversion-run-path
      - id: csharp-registry-setvalue
