# Win32 Registry Persistence via API
# Detects PE binaries that write registry values and copy themselves
# ATT&CK: T1547.001 (Boot or Logon Autostart Execution: Registry Run Keys)
defaults:
  for: [pe]
  platforms: [windows]
composite_rules:
  - id: autoit-iexpress-runonce-persistence
    desc: IExpress AutoIt payload with RunOnce persistence
    crit: hostile
    conf: 0.98
    attack: "T1027,T1547.001"
    all:
      - id: metadata/binary/installer/sfx::cabinet-fdi-extraction
      - id: metadata/lang/compiled::autoit-script-resource-entry
      - id: metadata/lang/compiled::autoit-runtime-resource-entry
      - id: pe-registry-self-install
    unless:
      - id: metadata/signed/platform/
  - id: pe-registry-self-install
    desc: Registry write with self-copy pattern
    crit: suspicious
    conf: 0.85
    attack: "T1547.001"
    size_max: 1000000
    all:
      - id: micro-behaviors/os/registry/access::registry-set-value-api
      - id: micro-behaviors/os/registry/access::registry-create-key-api
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: objectives/persistence/login/registry/autostart/
    any:
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/move::move-file
      - id: micro-behaviors/fs/file/copy::copyfile-a
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
