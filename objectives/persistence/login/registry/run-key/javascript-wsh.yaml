defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1547.001
traits:
  - id: obfuscated-regwrite-call
    desc: Obfuscated JScript WSH RegWrite call token
    crit: component
    conf: 0.9
    if:
      type: text
      word: RegWrite
  - id: currentversion-run-escaped-tail
    desc: Escaped CurrentVersion Run key tail
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'ersion\x5cRun'
composite_rules:
  - id: obfuscated-jscript-regwrite-run-persistence
    desc: Obfuscated JScript writes PowerShell stager to Run key
    crit: hostile
    conf: 0.97
    attack: T1547.001, T1112, T1059.001
    mbc: F0012, C0036
    all:
      - id: obfuscated-regwrite-call
      - id: currentversion-run-escaped-tail
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::token-array-powershell-nop-ep-bypass-escaped
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::token-array-powershell-file-escaped
      - id: micro-behaviors/process/interpreter/jscript::activex-object
    any:
      - id: objectives/anti-static/obfuscation/syntax::js-while-switch-state-machine
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::cfg-flatten-state-list
