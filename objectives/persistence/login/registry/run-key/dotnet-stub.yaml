defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1547.001
traits:
- id: reg-add-command-token
  desc: REG ADD command token
  crit: component
  conf: 0.86
  if:
    type: text
    exact: "REG ADD "
- id: reg-add-hkcu-target
  desc: REG ADD HKCU target
  crit: component
  conf: 0.84
  if:
    type: text
    exact: '"HKCU\'
- id: reg-add-reg-sz-data
  desc: REG ADD REG_SZ data
  crit: component
  conf: 0.86
  if:
    type: text
    exact: " /t REG_SZ /d "
- id: dotnet-install-registry-path-accessor
  desc: Install registry path accessor
  crit: component
  conf: 0.9
  if:
    type: text
    word: get_InstallationRegisteryPath
- id: dotnet-install-key-name-accessor
  desc: Install key name accessor
  crit: component
  conf: 0.88
  if:
    type: text
    word: get_InstallationKeyName
- id: hidden-startup-registry-accessors
  desc: Hidden startup registry accessors
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: get_HiddenStartup(Reg|Key)
- id: shortcut-create-method
  desc: Shortcut create method
  crit: component
  conf: 0.82
  if:
    type: text
    word: CreateShortcut
- id: shortcut-target-fields--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  count_min: 2
  if:
    type: text
    substr: TargetPath
  count_max: 1025419
- id: shortcut-target-fields--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  count_min: 2
  if:
    type: text
    substr: WorkingDirectory
  count_max: 1025420
composite_rules:
- id: dotnet-reg-add-hkcu-persistence
  desc: .NET REG ADD HKCU persistence
  crit: suspicious
  conf: 0.96
  all:
  - id: metadata/binary/framework::dotnet-assembly
  - id: reg-add-command-token
  - id: reg-add-hkcu-target
  - id: reg-add-reg-sz-data
  any:
  - id: dotnet-install-registry-path-accessor
  - id: dotnet-install-key-name-accessor
  - id: hidden-startup-registry-accessors
  - id: objectives/command-and-control/dropper/staging/encrypted::dotnet-startup-persistence-token
  unless:
  - id: metadata/binary/installer/
  - id: metadata/signed/platform::microsoft
- id: dotnet-startup-shortcut-persistence
  desc: .NET Startup shortcut persistence
  crit: suspicious
  conf: 0.94
  all:
  - id: metadata/binary/framework::dotnet-assembly
  - id: shortcut-create-method
  - id: shortcut-target-fields
  - id: metadata/file/extension::lnk-endswith-filter
  any:
  - id: objectives/command-and-control/dropper/staging/encrypted::dotnet-startup-persistence-token
  - id: hidden-startup-registry-accessors
  - id: dotnet-install-key-name-accessor
  unless:
  - id: metadata/binary/installer/
  - id: metadata/signed/platform::microsoft
- id: shortcut-target-fields
  desc: Shortcut target fields
  crit: component
  conf: 0.8
  any:
  - id: shortcut-target-fields--rx-1
  - id: shortcut-target-fields--rx-2
