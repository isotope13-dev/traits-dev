defaults:
  platforms: [windows, unix]
  for: [perl]
  attack: T1547.001

traits:
  - id: perl-run-key-launcher-write
    desc: Perl Run key launcher write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\$run_key->\{[^}]{1,80}\}\s*=\s*\$launcher'

composite_rules:
  - id: perl-run-key-persistence
    desc: Perl Run key persistence
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/registry/access::perl-win32-tieregistry
      - id: micro-behaviors/os/registry/access::perl-registry-key-write
      - id: micro-behaviors/os/registry/keys::currentversion-run-perl-escaped
      - id: perl-run-key-launcher-write
