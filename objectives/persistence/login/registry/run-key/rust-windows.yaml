defaults:
  platforms: [windows]
  for: [rust]
  attack: T1547.001

traits:
  - id: rust-securityupdate-run-value
    desc: Rust SecurityUpdate Run value
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: SecurityUpdate

  - id: rust-reg-sz-token
    desc: Rust REG_SZ registry token
    crit: component
    conf: 0.9
    if:
      type: text
      substr: REG_SZ

composite_rules:
  - id: rust-run-key-persistence
    desc: Rust Run key persistence
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/persistence/system/supervised::rust-windows-hkcu-run-key
      - id: rust-securityupdate-run-value
      - id: rust-reg-sz-token
