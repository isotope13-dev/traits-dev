defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: obfuscated-sunjavaupdatesched-value
    desc: Obfuscated SunJavaUpdateSched Run value
    crit: suspicious
    conf: 0.96
    platforms:
      - windows
    for:
      - pe
    attack: T1547.001
    if:
      type: text
      regex: ^JUth(1)?naac[,_\.-]?uvdSdSapee$
      section: .rdata
composite_rules:
  - id: run-key-persistence-ps
    desc: Persists payload via Registry Run key (PowerShell)
    crit: hostile
    conf: 0.95
    for:
      - powershell
    all:
      - id: objectives/persistence/login/registry/autostart::run-key-write-ps
      - id: micro-behaviors/process/create/hidden::powershell-windowstyle-hidden-option
  - id: obfuscated-run-key-persistence
    desc: Obfuscated Registry Run key persistence
    crit: suspicious
    conf: 0.96
    platforms:
      - windows
    for:
      - pe
    attack: T1547.001
    all:
      - id: objectives/anti-static/obfuscation/string/hijack-gen::run-key-placeholder
      - id: obfuscated-sunjavaupdatesched-value
  - id: msi-hidden-powershell-run-key-persistence
    desc: MSI hides encoded PowerShell behind a Run key
    crit: hostile
    conf: 0.99
    for: [oledoc]
    platforms: [windows]
    attack: T1059.001,T1547.001
    all:
      - id: 'objectives/command-and-control/dropper/execution/script::msi-hidden-encoded-command-launch'
      - id: 'objectives/command-and-control/dropper/execution/script::msi-run-key-persistence-reference'
