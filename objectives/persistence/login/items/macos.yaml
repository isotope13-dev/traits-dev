defaults:
  platforms:
    - macos
  for:
    - macho
  attack: T1547.015
traits:
  - id: session-loginitems-key
    desc: Legacy macOS Login Items session key usage
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: kLSSharedFileListSessionLoginItems
      section: .text


  # === Legacy LoginHook persistence ===
  - id: loginhook-key
    desc: Legacy macOS LoginHook preference key
    crit: notable
    conf: 0.8
    attack: T1037.002
    for: [macho, c, shell, scripts, plist]
    if:
      type: text
      word: LoginHook
  - id: loginwindow-domain
    desc: com.apple.loginwindow preferences target
    crit: notable
    conf: 0.8
    attack: T1037.002
    for: [macho, c, shell, scripts, plist]
    if:
      type: text
      regex: com\.apple\.loginwindow(?:\.plist)?|/Library/Preferences/com\.apple\.loginwindow(?:\.plist)?|~/Library/Preferences/com\.apple\.loginwindow(?:\.plist)?
  - id: defaults-write-loginhook
    desc: defaults write loginwindow LoginHook command
    crit: suspicious
    conf: 0.9
    attack: T1037.002
    for: [shell, scripts, c, macho]
    if:
      type: text
      regex: defaults\s+write\s+["']?(com\.apple\.loginwindow|/Library/Preferences/com\.apple\.loginwindow(?:\.plist)?|~/Library/Preferences/com\.apple\.loginwindow(?:\.plist)?)["']?.{0,120}\bLoginHook\b

  # === TAL (Transparent App Laundering) / loginwindow restore state ===
  - id: tal-relaunch-key
    desc: TALAppsToRelaunchAtLogin plist key (loginwindow restore state)
    crit: suspicious
    conf: 0.9
    for: [macho, c, plist, shell, scripts]
    if:
      type: text
      substr: TALAppsToRelaunchAtLogin
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: loginwindow-byhost-path
    desc: com.apple.loginwindow ByHost plist path
    crit: notable
    conf: 0.8
    for: [macho, c, shell, scripts]
    if:
      type: text
      regex: com\.apple\.loginwindow\.[A-F0-9-]{36}\.plist
  - id: loginwindow-byhost-dir
    desc: ByHost preferences directory (loginwindow restore target)
    crit: notable
    conf: 0.7
    for: [macho, c, shell, scripts]
    if:
      type: text
      substr: Library/Preferences/ByHost
  - id: cfprefsd-flush
    desc: killall cfprefsd (flush preferences cache)
    crit: suspicious
    conf: 0.85
    attack: T1647
    for: [macho, c, shell, scripts]
    if:
      type: text
      regex: killall\s+cfprefsd
    downgrade:
      any:
        - id: metadata/signed/anchor-apple
  - id: ioreg-platform-uuid
    desc: ioreg IOPlatformExpertDevice UUID harvest
    crit: notable
    conf: 0.8
    for: [macho, c, shell, scripts]
    if:
      type: text
      regex: ioreg[^\n]{0,60}IOPlatformExpertDevice
  - id: ls-background-only-key
    desc: LSBackgroundOnly plist key (hide from Dock)
    crit: notable
    conf: 0.75
    for: [plist, macho, c]
    if:
      type: text
      substr: LSBackgroundOnly
  - id: tal-background-state
    desc: BackgroundState key in TAL entry
    crit: component
    conf: 0.7
    for: [macho, c, plist]
    if:
      type: text
      substr: BackgroundState

composite_rules:
  - id: loginhook-persistence
    desc: Legacy macOS LoginHook persistence
    crit: suspicious
    conf: 0.92
    attack: T1037.002
    for: [macho, c, shell, scripts, plist]
    all:
      - id: loginhook-key
    any:
      - id: loginwindow-domain
      - id: defaults-write-loginhook
  - id: tal-persistence
    desc: TAL loginwindow restore-state persistence
    crit: suspicious
    conf: 0.9
    all:
      - id: tal-relaunch-key
    any:
      - id: loginwindow-byhost-path
      - id: loginwindow-byhost-dir
      - id: cfprefsd-flush
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: tal-installer-binary
    desc: Binary that installs TAL persistence (C/Mach-O installer)
    crit: suspicious
    conf: 0.92
    for: [macho, c]
    all:
      - id: tal-relaunch-key
      - id: cfprefsd-flush
    any:
      - id: loginwindow-byhost-dir
      - id: ioreg-platform-uuid
      - id: tal-background-state
    downgrade:
      any:
        - id: metadata/signed/platform::apple
