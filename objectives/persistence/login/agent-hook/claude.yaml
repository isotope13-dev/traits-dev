# Persistence by hijacking an AI coding agent's hook system.
#
# Claude Code (and similar agents) run configured hooks on session lifecycle
# events. Writing a `SessionStart` hook whose entry runs a shell command makes
# that command execute every time the agent starts a session — a recurring,
# user-invisible re-execution trigger (event-triggered persistence). Seen in
# obfuscated npm droppers that assemble a settings.json hooks block at runtime.
# ATT&CK: T1546 (event-triggered execution)  MBC: B0024
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, shell]
  attack: T1546

composite_rules:
  - id: claude-session-hook-command-install
    desc: Installs Claude session hook that runs a command
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/ipc/agent-hook::claude-session-hook
      - id: micro-behaviors/communications/ipc/agent-hook::claude-hooks-config-key
      - id: micro-behaviors/data/text/keywords/lexicon::command-dup
    # Downgrade to notable inside a genuine Claude hook integration (one that
    # also implements the hook I/O protocol) — there a SessionStart command hook
    # is an expected, author-controlled capability rather than an injected one.
    downgrade:
      any:
        - id: micro-behaviors/communications/ipc/agent-hook::claude-hook-updated-input
        - id: micro-behaviors/communications/ipc/agent-hook::claude-hook-output-block
        - id: micro-behaviors/communications/ipc/agent-hook::claude-hook-permission-decision
