defaults:
  attack: "T1547.001"
  platforms: [windows]
  for: [c, cpp]
traits:
  - id: shell-extensions-key
    desc: Shell Extensions registry path
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      regex: 'SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Shell Extensions'
  - id: meltme-value
    desc: MeltMe registry state value
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      exact: "MeltMe"
  - id: record-value
    desc: Record registry state value
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: "Record"
  - id: installed-time-value
    desc: Installed Time state value
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      exact: "Installed Time"
composite_rules:
  - id: shell-extensions-state-persistence
    desc: Shell Extensions stateful persistence
    crit: suspicious
    conf: 0.97
    all:
      - id: shell-extensions-key
    needs: 2
    any:
      - id: meltme-value
      - id: record-value
      - id: installed-time-value
