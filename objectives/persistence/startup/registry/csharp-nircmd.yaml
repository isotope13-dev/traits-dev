defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1547.001"
  mbc: "F0012"
traits:
  - id: hklm-run-key-path
    desc: HKLM CurrentVersion Run path
    crit: notable
    conf: 0.94
    if:
      type: string
      exact: "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run"
  - id: adobe-arm-run-name
    desc: Adobe ARM Run value name
    crit: component
    conf: 0.96
    if:
      type: string
      exact: "Adobe ARM"
  - id: java-update-run-name
    desc: SunJavaUpdateSched Run value name
    crit: component
    conf: 0.96
    if:
      type: string
      exact: "SunJavaUpdateSched"
  - id: realplayer-run-name
    desc: TkBellExe Run value name
    crit: component
    conf: 0.96
    if:
      type: string
      exact: "TkBellExe"
  - id: unlocker-run-name
    desc: UnlockerAssistant Run value name
    crit: component
    conf: 0.96
    if:
      type: string
      exact: "UnlockerAssistant"
  - id: adobe-arm-install-path
    desc: Adobe ARM install path
    crit: notable
    conf: 0.93
    if:
      type: string
      exact: '~$folder.programfiles$\Common Files\Adobe\ARM\1.0\'
  - id: java-update-install-path
    desc: Java Update install path
    crit: notable
    conf: 0.93
    if:
      type: string
      exact: '~$folder.programfiles$\Common Files\Java\Java Update\'
  - id: real-update-install-path
    desc: Real Update install path
    crit: notable
    conf: 0.93
    if:
      type: string
      exact: '~$folder.programfiles$\Common Files\Real\Update_OB\'
  - id: unlocker-install-path
    desc: Unlocker install path
    crit: notable
    conf: 0.93
    if:
      type: string
      exact: '~$folder.programfiles$\Unlocker\'
composite_rules:
  - id: updater-run-name-masquerade
    desc: Multiple updater Run value names
    crit: suspicious
    conf: 0.97
    needs: 2
    any:
      - id: adobe-arm-run-name
      - id: java-update-run-name
      - id: realplayer-run-name
      - id: unlocker-run-name
  - id: updater-install-path-masquerade
    desc: Multiple updater install paths
    crit: suspicious
    conf: 0.97
    needs: 2
    any:
      - id: adobe-arm-install-path
      - id: java-update-install-path
      - id: real-update-install-path
      - id: unlocker-install-path
  - id: nircmd-run-key-persistence
    desc: NirCmd HKLM Run key persistence
    crit: hostile
    conf: 0.99
    all:
      - id: hklm-run-key-path
      - id: micro-behaviors/process/create/lolbin::run-key-regsetval
      - id: micro-behaviors/process/create/lolbin::nircmd-executable
      - id: updater-run-name-masquerade
  - id: redundant-updater-persistence
    desc: Multi-location updater persistence staging
    crit: hostile
    conf: 0.99
    all:
      - id: updater-install-path-masquerade
      - id: updater-run-name-masquerade
      - id: micro-behaviors/process/create/lolbin::nircmd-shellcopy
      - id: micro-behaviors/process/create/lolbin::nircmd-attrib-system-readonly
