defaults:
  for: [pe, dll, csharp, vbs, batch, powershell]
  platforms: [windows]
  crit: suspicious
  conf: 0.85

traits:
  - id: active-setup-key
    desc: Windows Active Setup registry key
    attack: T1547.014
    if:
      type: string
      case_insensitive: true
      substr: "Active Setup\\Installed Components"

  - id: active-setup-fragment
    desc: Active Setup registry key fragment
    crit: notable
    if:
      type: string
      case_insensitive: true
      substr: "Active Setup\\I"
