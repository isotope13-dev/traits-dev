defaults:
  platforms: [windows]
  for: [text]
  attack: T1547.001
traits:
  - id: currentversion-run-path-source
    desc: CurrentVersion Run registry path
    crit: notable
    conf: 0.92
    if:
      type: raw
      exact: 'szRegAutoPath           db      "SOFTWARE\Microsoft\Windows\CurrentVersion\Run",0'
  - id: run-key-value-write-source
    desc: Run key value write
    crit: notable
    conf: 0.93
    if:
      type: raw
      exact: "invoke  RegSetValueEx, hkHandle, offset szBglAutoKey, 0, REG_SZ, offset szSysDirFileName, eax"
  - id: run-key-create-source
    desc: Run key creation
    crit: notable
    conf: 0.9
    if:
      type: raw
      exact: "invoke  RegCreateKey, HKEY_CURRENT_USER, offset szRegAutoPath, addr hkHandle"
composite_rules:
  - id: registry-run-key-source
    desc: Registry Run key persistence
    crit: suspicious
    conf: 0.96
    all:
      - id: currentversion-run-path-source
      - id: run-key-value-write-source
    any:
      - id: run-key-create-source
