defaults:
  for: [batch]
  platforms: [windows]
composite_rules:
  - id: batch-boot-config-modify
    desc: Batch script modifies boot configuration
    crit: hostile
    conf: 0.95
    attack: T1542
    all:
      - id: micro-behaviors/fs/write/file/direct::batch-append-redirect
      - id: micro-behaviors/fs/path/system::legacy-boot-config
