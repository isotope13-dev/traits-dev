defaults:
  platforms: [solaris, unix, windows]
  for: [csharp, pe]
  attack: T1542

traits:
  - id: csharp-solaris-bootconf
    desc: C# Solaris bootconf path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/bootconf

  - id: csharp-solaris-agent-hook
    desc: C# Solaris agent hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: agent_hook=/tmp/.agent_loader

  - id: csharp-solaris-agent-loader
    desc: C# Solaris agent loader
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.agent_loader

composite_rules:
  - id: csharp-solaris-boot-persistence
    desc: C# Solaris boot persistence
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-solaris-bootconf
      - id: csharp-solaris-agent-hook

  - id: csharp-solaris-boot-loader
    desc: C# Solaris boot loader
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-solaris-bootconf
      - id: csharp-solaris-agent-loader
