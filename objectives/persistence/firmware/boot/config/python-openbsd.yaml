defaults:
  platforms: [openbsd, bsd, unix]
  for: [python, pyc]
  attack: T1542

traits:
  - id: python-openbsd-firmware-marker
    desc: Python OpenBSD firmware marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /boot/.firmware_update

  - id: python-openbsd-boot-config-hook
    desc: Python OpenBSD boot config hook
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: set firmware.check=0

composite_rules:
  - id: python-openbsd-firmware-boot-persist
    desc: Python firmware boot persist
    crit: hostile
    conf: 0.98
    all:
      - id: python-openbsd-firmware-marker
      - id: python-openbsd-boot-config-hook
