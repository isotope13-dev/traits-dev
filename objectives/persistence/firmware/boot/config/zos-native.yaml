defaults:
  platforms: [zos]
  for: [c, cpp, elf]
  attack: T1542

traits:
  - id: zos-ieasys-parmlib-write
    desc: z/OS IEASYS parmlib write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/parmlib/IEASYSxx

  - id: zos-bpxprm-daemon-config
    desc: z/OS BPXPRM daemon config
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: BPXDAEMON=(PROC=

  - id: zos-ipl-autoload-marker
    desc: z/OS IPL autoload marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: PERSISTENCE_TYPE=IPL_AUTOLOAD

  - id: zos-hsp-ipl-execute
    desc: z/OS HSP IPL execute
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: EXECUTE=ON_IPL

composite_rules:
  - id: zos-ipl-firmware-persistence
    desc: z/OS IPL firmware persistence
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: zos-ieasys-parmlib-write
      - id: zos-bpxprm-daemon-config
      - id: zos-ipl-autoload-marker
      - id: zos-hsp-ipl-execute
