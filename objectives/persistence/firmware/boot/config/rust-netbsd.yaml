defaults:
  platforms: [netbsd, unix]
  for: [rust, elf]
  attack: T1542

traits:
  - id: rust-netbsd-firmware-devices
    desc: Rust NetBSD firmware devices
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: '/dev/firmware[\s\S]{0,260}/dev/flash0'

  - id: rust-envprobe-firmware-marker
    desc: Rust envprobe firmware marker
    crit: suspicious
    conf: 0.94
    for: [elf]
    if:
      type: hex
      section: .rodata.str1.1
      pattern: 45 4e 56 50 52 4f 42 45 5f 50 45 52 53 49 53 54 45 4e 54 5f 48 4f 4f 4b 5f 41 43 54 49 56 45 3d 31

  - id: rust-envprobe-firmware-marker-source
    desc: Rust envprobe firmware marker src
    crit: suspicious
    conf: 0.94
    for: [rust]
    if:
      type: text
      substr: ENVPROBE_PERSISTENT_HOOK_ACTIVE=1

composite_rules:
  - id: rust-netbsd-firmware-persistence
    desc: Rust NetBSD firmware persistence
    crit: hostile
    conf: 0.98
    all:
      - id: rust-netbsd-firmware-devices
    any:
      - id: rust-envprobe-firmware-marker
      - id: rust-envprobe-firmware-marker-source
    needs: 1
