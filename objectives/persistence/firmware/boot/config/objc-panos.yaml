defaults:
  platforms: [panos, appliance, unix]
  for: [objc, macho]
  attack: T1542

traits:
  - id: objc-panos-sudo-nvram
    desc: ObjC PAN-OS sudo nvram
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sudo nvram
    unless:
      - id: well-known/tool/reverse-engineering/frida::frida-tool-context

  - id: objc-panos-recovery-boot-url
    desc: ObjC PAN-OS recovery boot URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: recovery-boot-url

composite_rules:
  - id: objc-panos-nvram-boot-config
    desc: ObjC PAN-OS NVRAM boot config
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-sudo-nvram
      - id: objc-panos-recovery-boot-url
