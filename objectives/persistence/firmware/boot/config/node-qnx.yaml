defaults:
  platforms: [qnx, unix]
  for: [javascript, typescript]
  attack: T1542.001

traits:
  - id: qnx-node-systemboot-persist
    desc: QNX Node systemboot persist
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/systemboot.conf

  - id: qnx-node-dev-boot-image
    desc: QNX Node dev boot image
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?is)(qnx[\s\S]{0,512}/dev/boot|/dev/boot[\s\S]{0,512}qnx)'

  - id: qnx-node-devicetree-overlay
    desc: QNX Node devicetree overlay
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /sys/firmware/devicetree/base/

composite_rules:
  - id: qnx-node-firmware-boot-persist
    desc: QNX Node firmware boot persist
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-systemboot-persist
      - id: qnx-node-dev-boot-image
      - id: qnx-node-devicetree-overlay
    unless:
      - id: well-known/app/meshcentral::meshcentral-package-context
