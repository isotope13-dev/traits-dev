defaults:
  platforms: [freebsd, unix]
  for: [php]
  attack: T1542

traits:
  - id: php-freebsd-loader-conf-write
    desc: PHP writes FreeBSD loader config
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /boot/loader.conf.local

  - id: php-freebsd-kld-list-persistence
    desc: PHP adds FreeBSD kld_list entry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: kld_list

  - id: php-freebsd-rcd-firmware-service
    desc: PHP writes FreeBSD firmware rc.d service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/local/etc/rc.d/firmware_persist

composite_rules:
  - id: php-freebsd-loader-rcd-persistence
    desc: PHP FreeBSD loader and rc.d persistence
    crit: hostile
    conf: 0.98
    all:
      - id: php-freebsd-loader-conf-write
      - id: php-freebsd-kld-list-persistence
    any:
      - id: php-freebsd-rcd-firmware-service
      - id: objectives/persistence/system/init/boot::bsd-root-cron-tabs-path

