defaults:
  platforms: [freebsd, unix]
  for: [kotlin, class, jar]
  attack: T1542

traits:
  - id: kotlin-freebsd-loader-config-source
    desc: Kotlin FreeBSD loader config strings
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/boot/(loader\.conf|device\.hints|config)'

  - id: kotlin-autoboot-delay-string
    desc: Kotlin autoboot_delay string
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: autoboot_delay

  - id: kotlin-loader-logo-string
    desc: Kotlin loader_logo string
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: loader_logo

  - id: kotlin-boot-serial-string
    desc: Kotlin boot_serial string
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: boot_serial

  - id: kotlin-custom-service-enable-bytecode
    desc: Kotlin bytecode custom service enable
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: text
      substr: custom_service_enable

  - id: kotlin-nvram-boot-args
    desc: Kotlin sets NVRAM boot args
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'set boot-args "-v debug=0x10"'

composite_rules:
  - id: kotlin-freebsd-firmware-persistence
    desc: Kotlin FreeBSD firmware persistence
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-freebsd-loader-config-source
      - id: kotlin-autoboot-delay-string
      - id: kotlin-loader-logo-string
    any:
      - id: kotlin-boot-serial-string
      - id: kotlin-nvram-boot-args
      - id: objectives/command-and-control/dropper/delivery/download-execute::chmod-hidden-stage

  - id: kotlin-bytecode-firmware-persistence
    desc: Kotlin bytecode firmware persistence
    crit: hostile
    conf: 0.98
    for: [class, jar]
    all:
      - id: kotlin-custom-service-enable-bytecode
      - id: kotlin-autoboot-delay-string
      - id: kotlin-nvram-boot-args
