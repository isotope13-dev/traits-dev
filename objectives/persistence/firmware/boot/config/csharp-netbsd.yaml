defaults:
  platforms: [netbsd, unix, windows]
  for: [csharp, pe]
  attack: T1542

traits:
  - id: csharp-netbsd-boot-config
    desc: C# NetBSD boot config
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /boot.config

  - id: csharp-agent-init-boot-var
    desc: C# agent init boot var
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: set agent_init=1

composite_rules:
  - id: csharp-netbsd-boot-persistence
    desc: C# NetBSD boot persistence
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-netbsd-boot-config
      - id: csharp-agent-init-boot-var
