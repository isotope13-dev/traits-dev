defaults:
  platforms: [unix, appliance]
  for: [php]
  attack: T1542

traits:
  - id: php-firmware-trigger-write
    desc: PHP firmware trigger write
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\.update_trigger[\s\S]{0,260}\.fw_update'

  - id: php-firmware-config-inject
    desc: PHP firmware config inject
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'firmware persistence hook[\s\S]{0,180}persistence_module='

  - id: php-firmware-boot-script
    desc: PHP firmware boot script
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /etc/init.d/S99firmware-update

composite_rules:
  - id: php-firmware-config-persistence
    desc: PHP firmware config persistence
    crit: hostile
    conf: 0.98
    all:
      - id: php-firmware-trigger-write
      - id: php-firmware-config-inject
      - id: php-firmware-boot-script
