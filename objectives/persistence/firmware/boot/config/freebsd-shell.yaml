defaults:
  platforms: [freebsd, unix]
  for: [shell]
  attack: T1542

traits:
  - id: shell-freebsd-loader-conf-write
    desc: FreeBSD loader persistence setting
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/boot/loader\.conf[\s\S]{0,120}(kld_list|module_path|rootdev)'

  - id: shell-freebsd-loader-boot-vars
    desc: Shell writes FreeBSD boot loader vars
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'autoboot_delay|vfs\.root\.mountfrom'

composite_rules:
  - id: shell-freebsd-loader-persistence
    desc: Shell FreeBSD loader persistence
    crit: hostile
    conf: 0.98
    all:
      - id: shell-freebsd-loader-conf-write
      - id: shell-freebsd-loader-boot-vars
