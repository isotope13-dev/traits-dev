defaults:
  platforms: [panos, appliance, windows]
  for: [csharp, pe]
  attack: T1542

traits:
  - id: csharp-panos-boot-config-path
    desc: PAN-OS rc.boot.local boot persistence file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: rc.boot.local

  - id: csharp-panos-firmware-dir
    desc: Hidden .panos-firmware implant directory
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .panos-firmware

  - id: csharp-panos-boot-beacon
    desc: boot-beacon C2 callback endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/boot-beacon

composite_rules:
  - id: csharp-panos-firmware-boot-persist
    desc: PAN-OS firmware boot persistence implant
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-panos-boot-config-path
      - id: csharp-panos-firmware-dir
      - id: csharp-panos-boot-beacon
