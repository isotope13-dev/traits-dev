defaults:
  platforms: [panos, appliance, windows]
  for: [csharp, pe]
  attack: T1542

traits:
  - id: csharp-panos-boot-config-path
    desc: C# PAN-OS boot config path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: rc.boot.local

  - id: csharp-panos-firmware-dir
    desc: C# PAN-OS firmware dir
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .panos-firmware

  - id: csharp-panos-boot-beacon
    desc: C# PAN-OS boot beacon
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/boot-beacon

composite_rules:
  - id: csharp-panos-firmware-boot-persist
    desc: C# PAN-OS firmware boot persist
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-panos-boot-config-path
      - id: csharp-panos-firmware-dir
      - id: csharp-panos-boot-beacon
