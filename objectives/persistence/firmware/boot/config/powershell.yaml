defaults:
  platforms: [windows, unix, appliance]
  for: [powershell]
  attack: T1542

traits:
  - id: ps-dd-flash-write
    desc: PowerShell dd flash write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Start-Process[\s\S]{0,260}"dd"[\s\S]{0,260}conv=notrunc'

  - id: ps-mtd-partition-write
    desc: PowerShell MTD partition write
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /dev/mtd

  - id: ps-boot-flash-config
    desc: PowerShell flash write config
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: FLASH_WRITE_ENABLED=1

  - id: ps-boot-image-path-config
    desc: PowerShell boot image config
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: IMAGE_PATH=

  - id: ps-vxworks-startup-script
    desc: PowerShell VxWorks startup script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /usr/local/vxworks/startup.d/

composite_rules:
  - id: ps-firmware-flash-persistence
    desc: PowerShell firmware flash persistence
    crit: hostile
    conf: 0.98
    all:
      - id: ps-dd-flash-write
      - id: ps-mtd-partition-write
      - id: ps-boot-flash-config
      - id: ps-boot-image-path-config
    any:
      - id: ps-vxworks-startup-script
      - id: micro-behaviors/process/create/start-process::start-process-call
