defaults:
  platforms: [solaris, unix]
  for: [go, elf]
  attack: T1542.001

traits:
  - id: go-solaris-firmware-persist-func
    desc: Go Solaris firmware persist function
    crit: suspicious
    conf: 0.9
    for: [elf]
    if:
      type: text
      substr: main.firmwarePersistence

  - id: go-solaris-etc-system-path
    desc: Go Solaris /etc/system path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/etc/system($|[^a-z-])'

  - id: go-efi-stage2-override
    desc: Go EFI stage2 override
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /mnt/EFI/BOOT/override.efi

  - id: go-solaris-boot-override-script
    desc: Go Solaris boot override script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Solaris boot configuration override

composite_rules:
  - id: go-solaris-firmware-persist
    desc: Go Solaris firmware persist
    crit: hostile
    conf: 0.98
    all:
      - id: go-solaris-etc-system-path
      - id: go-efi-stage2-override
      - id: go-solaris-boot-override-script
