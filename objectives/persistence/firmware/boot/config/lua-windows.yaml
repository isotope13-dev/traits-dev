defaults:
  platforms: [windows]
  for: [lua]
  attack: T1542.001

traits:
  - id: lua-bcdedit-osloader-create
    desc: Lua bcdedit osloader create
    crit: suspicious
    conf: 0.93
    if:
      type: literal
      substr: 'bcdedit /create'

  - id: lua-bcdedit-addfirst
    desc: Lua boot entry addfirst
    crit: suspicious
    conf: 0.93
    if:
      type: literal
      substr: '/addfirst'

composite_rules:
  - id: lua-uefi-variable-persistence
    desc: Lua UEFI variable persistence
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/kernel/routines::source-set-firmware-env-var
      - id: micro-behaviors/os/kernel/routines::wmi-set-nvram-variable
      - id: lua-bcdedit-osloader-create
    any:
      - id: lua-bcdedit-addfirst
