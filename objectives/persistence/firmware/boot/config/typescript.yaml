defaults:
  platforms: [windows, unix, appliance]
  for: [typescript, javascript]
  attack: T1542

traits:
  - id: ts-flash0-firmware-target
    desc: TS targets flash firmware device
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /dev/flash0

  - id: ts-firmware-persistence-image
    desc: TS firmware persistence image
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: VXWORKS_PERSISTENCE_V1

  - id: ts-bootenv-autoexec
    desc: TS writes boot autoexec setting
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: VXWORKS_AUTO_EXEC=yes

  - id: ts-firmware-boot-config
    desc: TS writes firmware boot config
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'boot_config\.json[\s\S]{0,520}bootenv'

composite_rules:
  - id: ts-firmware-boot-persistence
    desc: TS firmware boot persistence
    crit: hostile
    conf: 0.98
    all:
      - id: ts-flash0-firmware-target
      - id: ts-firmware-persistence-image
      - id: ts-bootenv-autoexec
    any:
      - id: ts-firmware-boot-config
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
