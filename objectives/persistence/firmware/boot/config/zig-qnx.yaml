defaults:
  platforms: [qnx, unix]
  for: [zig]
  attack: T1542

traits:
  - id: qnx-zig-firmware-device-list
    desc: QNX Zig firmware device list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/dev/mem[\s\S]{0,120}/dev/flash0'

  - id: qnx-zig-firmware-offset-seek
    desc: QNX Zig firmware offset seek
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'FIRMWARE_OFFSET[\s\S]{0,900}libc\.lseek'

  - id: qnx-zig-firmware-reverse-shell
    desc: QNX Zig firmware reverse shell
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: nc -e /bin/sh

composite_rules:
  - id: qnx-zig-firmware-persistence
    desc: QNX Zig firmware persistence
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-zig-firmware-device-list
      - id: qnx-zig-firmware-offset-seek
      - id: qnx-zig-firmware-reverse-shell
