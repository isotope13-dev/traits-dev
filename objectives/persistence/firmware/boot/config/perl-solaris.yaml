defaults:
  platforms: [solaris, unix]
  for: [perl]
  attack: T1542.001

traits:
  - id: perl-solaris-boot-init-path
    desc: Perl Solaris boot init path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /boot/solaris/.boot_init

  - id: perl-solaris-boot-init-name
    desc: Perl Solaris boot init name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /.boot_init

  - id: perl-solaris-nvram-path
    desc: Perl Solaris NVRAM path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /dev/nvram

  - id: perl-solaris-eeprom-boot-file
    desc: Perl Solaris eeprom boot file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "eeprom\\s+'boot-file="

composite_rules:
  - id: perl-solaris-firmware-persist
    desc: Perl Solaris firmware persist
    crit: hostile
    conf: 0.98
    all:
      - id: perl-solaris-nvram-path
      - id: perl-solaris-eeprom-boot-file
    any:
      - id: perl-solaris-boot-init-path
      - id: perl-solaris-boot-init-name
