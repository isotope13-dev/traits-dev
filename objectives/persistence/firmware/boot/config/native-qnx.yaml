defaults:
  platforms: [qnx, unix]
  for: [c, cpp, elf]
  attack: T1542

traits:
  - id: qnx-native-firmware-config-path
    desc: QNX native firmware config path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/config/firmware_update.cfg

  - id: qnx-native-preboot-exec
    desc: QNX native preboot exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: preboot_exec=/tmp/.firmware_agent

  - id: qnx-native-postboot-exec
    desc: QNX native postboot exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: postboot_exec=/tmp/.firmware_agent

composite_rules:
  - id: qnx-native-firmware-boot-persist
    desc: QNX native firmware boot persist
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-firmware-config-path
      - id: qnx-native-preboot-exec
      - id: qnx-native-postboot-exec
