defaults:
  platforms: [windows]
  for: [go]
  attack: T1542.001

traits:
  - id: go-firmware-guid-literal
    desc: Go firmware GUID literal
    crit: component
    conf: 0.85
    if:
      type: literal
      regex: '^[0-9a-fA-F]{8}(-[0-9a-fA-F]{4}){3}-[0-9a-fA-F]{12}$'

  - id: go-firmware-persistence-name
    desc: Go firmware persistence name
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      regex: '(?i)persist(en|ence)'

composite_rules:
  - id: go-uefi-variable-persistence
    desc: Go UEFI variable persistence
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/kernel/routines::go-set-firmware-env-var
      - id: go-firmware-guid-literal
      - id: go-firmware-persistence-name
