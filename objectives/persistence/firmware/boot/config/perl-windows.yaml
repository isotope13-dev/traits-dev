defaults:
  platforms: [windows, unix]
  for: [perl]
  attack: T1542.001

traits:
  - id: perl-bcdedit-osloader-create
    desc: Perl bcdedit osloader create
    crit: suspicious
    conf: 0.93
    if:
      type: literal
      regex: 'bcdedit /create.{0,120}/application osloader'

  - id: perl-bcdedit-boot-path
    desc: Perl bcdedit boot path set
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      regex: 'bcdedit /set .{1,120} path \\'

  - id: perl-bcdedit-displayorder
    desc: Perl bcdedit displayorder add
    crit: component
    conf: 0.88
    if:
      type: literal
      regex: 'bcdedit /displayorder .{1,120}/addlast'

  - id: perl-bcdedit-firmwareboot
    desc: Perl bcdedit firmwareboot yes
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      substr: firmwareboot yes

composite_rules:
  - id: perl-bcdedit-firmware-persist
    desc: Perl BCD firmware persistence
    crit: hostile
    conf: 0.98
    all:
      - id: perl-bcdedit-osloader-create
      - id: perl-bcdedit-boot-path
      - id: perl-bcdedit-displayorder
    any:
      - id: perl-bcdedit-firmwareboot
      - id: micro-behaviors/os/kernel/routines::perl-set-firmware-env-var
