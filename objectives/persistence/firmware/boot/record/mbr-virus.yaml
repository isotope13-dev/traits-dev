defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: mbr-virus
    desc: MBR Virus Code Pattern
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/disk/partition::mbr-mod-asm
    any:
      - id: micro-behaviors/mem/alloc::bios-mem-steal-asm
      - id: micro-behaviors/mem/alloc::bios-mem-size-reduce
      - id: micro-behaviors/os/msdos/interrupt::int-vector-calc-asm
      - id: objectives/persistence/system/int-hook::ivt-direct-write-asm
  - id: boot-sector-virus-source
    desc: Boot sector virus source code
    crit: hostile
    conf: 0.93
    any:
      - id: micro-behaviors/fs/disk/partition::boot-block-read
      - id: micro-behaviors/fs/disk/partition::partition-table-copy
      - id: micro-behaviors/os/msdos/interrupt::int13-disk-sector-io
      - id: micro-behaviors/mem/alloc::bios-mem-size-reduce
      - id: objectives/persistence/system/int-hook::ivt-direct-write-asm
    needs: 3
  - id: andropinis-virus
    desc: Andropinis Virus Detected (Source)
    crit: hostile
    conf: 1.0
    all:
      - id: micro-behaviors/fs/disk/partition::mbr-mod-asm
      - id: well-known/malware/virus/andropinis::andropinis-strings
