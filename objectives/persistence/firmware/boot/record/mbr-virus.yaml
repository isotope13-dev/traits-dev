defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: boot-sector-access-source
    desc: Boot sector or partition table access in source
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/fs/disk/partition::boot-block-read
      - id: micro-behaviors/fs/disk/partition::mbr-mod-asm
    unless:
      - id: well-known/app/kilocode::kilo-code-native-runtime
  - id: boot-sector-virus-lowlevel-source
    desc: Low-level boot-sector virus primitives in source
    crit: suspicious
    conf: 0.92
    any:
      - id: micro-behaviors/os/msdos/interrupt::int13-disk-sector-io
      - id: micro-behaviors/mem/alloc/bios::bios-mem-size-reduce
      - id: objectives/persistence/system/int-hook::ivt-direct-write-asm
  - id: mbr-virus
    desc: MBR Virus Code Pattern
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/disk/partition::mbr-mod-asm
    any:
      - id: micro-behaviors/mem/alloc/bios
      - id: micro-behaviors/os/msdos/interrupt::int-vector-calc-asm
      - id: objectives/persistence/system/int-hook::ivt-direct-write-asm
  - id: boot-sector-virus-source
    desc: Boot sector virus source code
    crit: hostile
    conf: 0.93
    for: [c, cpp]
    all:
      - id: boot-sector-access-source
      - id: boot-sector-virus-lowlevel-source
