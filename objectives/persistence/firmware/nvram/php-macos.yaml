defaults:
  platforms: [unix]
  for: [php]
  attack: T1542

traits:
  - id: php-nvram-command
    desc: Invokes /usr/sbin/nvram firmware tool
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/sbin/nvram

  - id: php-nvram-boot-args
    desc: Sets nvram boot-args for persistence
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: nvram boot-args

  - id: php-nvram-c2-variable
    desc: systemd-update masquerade nvram variable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: com.apple.systemd-update

composite_rules:
  - id: php-macos-nvram-persistence
    desc: macOS nvram firmware persistence
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: php-nvram-command
      - id: php-nvram-boot-args
      - id: php-nvram-c2-variable
