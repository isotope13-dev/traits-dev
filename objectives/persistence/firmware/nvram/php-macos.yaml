defaults:
  platforms: [unix]
  for: [php]
  attack: T1542

traits:
  - id: php-nvram-command
    desc: PHP nvram command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/sbin/nvram

  - id: php-nvram-boot-args
    desc: PHP nvram boot args
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: nvram boot-args

  - id: php-nvram-c2-variable
    desc: PHP nvram C2 variable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: com.apple.systemd-update

composite_rules:
  - id: php-macos-nvram-persistence
    desc: PHP macOS nvram persistence
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: php-nvram-command
      - id: php-nvram-boot-args
      - id: php-nvram-c2-variable
