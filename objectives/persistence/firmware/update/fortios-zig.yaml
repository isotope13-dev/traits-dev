defaults:
  platforms: [fortios, unix]
  for: [zig]
  attack: T1542

traits:
  - id: fortios-firmware-update-stage
    desc: FortiOS firmware update staging
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/(tmp|var/restore)/firmware_update\.bin'

  - id: zig-firmware-shellcode-copy
    desc: Zig copies shellcode into firmware
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '@memcpy\s*\(\s*trojanized\[128'

  - id: zig-firmware-elf-builder
    desc: Zig builds ELF firmware stub
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "ehdr\\[0\\] = 0x7f[\\s\\S]{0,220}ehdr\\[3\\] = 'F'"

composite_rules:
  - id: fortios-zig-firmware-backdoor
    desc: FortiOS Zig firmware backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: fortios-firmware-update-stage
    any:
      - id: zig-firmware-shellcode-copy
      - id: zig-firmware-elf-builder
