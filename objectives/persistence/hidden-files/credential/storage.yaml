defaults:
  crit: suspicious
  attack: T1564.001
  for: [shell, python, javascript, elf]
  platforms:
    - linux
    - unix
    - macos
traits:
  - id: hidden-nano-file
    desc: Hidden file in /usr/share/nano/
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: /usr/share/nano/\..{1,30}
  - id: hidden-usr-share-file
    desc: Hidden file in /usr/share/
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: '(^|[\s''"=])\/usr\/share\/[^:\/\s]{1,30}\/\.[^:\/\s]{1,30}($|[\s''":])'
  - id: hidden-usr-local-file
    desc: Hidden file in /usr/local/
    crit: suspicious
    conf: 0.8
    if:
      type: string
      regex: /usr/local/.{1,30}/\..{1,30}
  - id: tmp-hidden-lock
    desc: Hidden lock file in /tmp
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: /tmp/\.[a-z]{2,12}$
  - id: var-tmp-hidden-dup
    desc: Hidden file in /var/tmp
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: /var/tmp/\..{1,30}
  - id: dot-lock-file
    desc: Suspicious .lock file
    crit: suspicious
    conf: 0.8
    if:
      type: string
      regex: /usr/(share|lib)/.{1,30}/\.lock$
  - id: dot-config-file
    desc: Suspicious .config file in system dir
    crit: suspicious
    conf: 0.75
    if:
      type: string
      regex: /usr/(share|lib)/.{1,30}/\.config$
composite_rules:
  - id: hidden-credential-storage
    desc: Credentials stored in hidden location
    crit: hostile
    conf: 0.9
    any:
      - id: hidden-nano-file
      - id: dot-lock-file
  - id: suspicious-hidden-paths
    desc: Suspicious hidden files in system directories
    crit: suspicious
    conf: 0.85
    any:
      - id: hidden-usr-share-file
      - id: hidden-usr-local-file
      - id: tmp-hidden-lock
      - id: objectives/persistence/hidden-files/credential::var-tmp-hidden-dup
