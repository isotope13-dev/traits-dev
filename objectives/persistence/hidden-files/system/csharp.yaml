defaults:
  platforms: [windows]
  for: [csharp]
  attack: "T1564.001"
traits:
  - id: hidden-attribute-usage
    desc: FileAttributes.Hidden usage
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: "FileAttributes.Hidden"
  - id: self-copy-to-random-dir
    desc: Copies current module into a discovered directory
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: "System.IO.File.Copy(Program.me.FullyQualifiedName"
  - id: quarantine-filename-prefix
    desc: Quarantine filename prefix
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: 'Program.decrypt("aW1wZWRv")'
  - id: jpg-targeting
    desc: Targets JPG files for handling
    crit: notable
    conf: 0.85
    if:
      type: string
      exact: "*.jpg"
composite_rules:
  - id: hidden-self-staging-and-jpg-quarantine
    desc: Hidden self-staging with JPG quarantine behavior
    crit: suspicious
    conf: 0.98
    all:
      - id: hidden-attribute-usage
      - id: self-copy-to-random-dir
      - id: jpg-targeting
    any:
      - id: quarantine-filename-prefix
