# Registry change monitoring for persistence protection
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1547.001"
traits:
  - id: regnotify-pinvoke
    desc: RegNotifyChangeKeyValue P/Invoke declaration
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'RegNotifyChangeKeyValue\s*\('
  - id: advapi32-dllimport
    desc: DllImport for advapi32.dll
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: 'DllImport\s*\(\s*"advapi32"'
  - id: registry-watcher-class
    desc: Registry key watcher class
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      regex: 'class\s+Registry\w*Watcher'
composite_rules:
  - id: active-persistence-protection
    desc: Active registry monitoring for persistence
    crit: hostile
    conf: 0.95
    all:
      - id: regnotify-pinvoke
    any:
      - id: registry-watcher-class
      - id: advapi32-dllimport
