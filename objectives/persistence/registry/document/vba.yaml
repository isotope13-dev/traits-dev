defaults:
  attack: "T1547.001"
  for: [vbs]
  platforms: [windows]
traits: []
composite_rules:
  - id: vba-registry-run-persistence
    desc: VBA macro installs Run key persistence
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/registry/manipulate::regwrite-call
      - id: micro-behaviors/os/registry/manipulate::run-key-path
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
  - id: vba-autoclose-persistence
    desc: VBA auto-close installs persistence
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/registry/manipulate::regwrite-call
      - id: micro-behaviors/os/registry/manipulate::run-key-path
      - id: micro-behaviors/process/create/macro/office::auto-close-trigger
