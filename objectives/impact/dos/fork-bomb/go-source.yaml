defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1499.004
traits:
  - id: go-forkbomb-function-name
    desc: Go forkbomb function name
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: function
      regex: '(?i)^fork_?bomb$'
  - id: go-tight-unbounded-goroutine-spawn
    desc: Go tight infinite goroutine spawn
    crit: suspicious
    conf: 0.9
    if:
      # The goroutine launch must be the immediate body of the infinite loop.
      # [^{}] forbids any intervening block, so a blocking `for { select {...} }`
      # dispatcher, or two sibling goroutines (`for {...}()` then `go f()`), no
      # longer collapse into a spurious "spawn inside a tight loop" match. A real
      # bomb is `for { go f() }` with nothing but the spawn between the braces.
      type: text
      regex: 'for\s*\{[^{}]{0,160}\bgo\s+[A-Za-z_][A-Za-z0-9_]*\s*\('
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/presence/harness::go-test-helper-command-path
      - id: metadata/package/testing/harness/unit::go-test
      - type: text
        regex: 'for\s*\{[\s\S]{0,120}\b[A-Za-z_][A-Za-z0-9_]*\.?Accept\s*\('
composite_rules:
  - id: go-tight-goroutine-fork-bomb-source
    desc: Go tight goroutine fork bomb
    crit: hostile
    conf: 0.98
    near_lines: 8
    all:
      - id: go-tight-unbounded-goroutine-spawn
      - id: micro-behaviors/process/thread/create::go-goroutine-launch-call
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/presence/harness::go-test-helper-command-path
      - id: metadata/package/testing/harness/unit::go-test
