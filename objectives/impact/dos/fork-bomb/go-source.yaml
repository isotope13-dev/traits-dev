defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1499.004
traits:
  - id: go-forkbomb-function-name
    desc: Go forkbomb function name
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: function
      regex: '(?i)^fork_?bomb$'
  - id: go-tight-unbounded-goroutine-spawn
    desc: Go tight infinite goroutine spawn
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'for\s*\{[\s\S]{0,160}\bgo\s+[A-Za-z_][A-Za-z0-9_]*\s*\('
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
composite_rules:
  - id: go-tight-goroutine-fork-bomb-source
    desc: Go tight goroutine fork bomb
    crit: hostile
    conf: 0.98
    near_lines: 8
    all:
      - id: go-tight-unbounded-goroutine-spawn
      - id: micro-behaviors/process/thread/create::go-goroutine-launch-call
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
