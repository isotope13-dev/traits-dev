defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]
  attack: T1499.004

traits:
  - id: forkbomb-symbol-text
    desc: Forkbomb symbol text
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)fork_?bomb'

composite_rules:
  - id: forkbomb-goroutine-runtime
    desc: Forkbomb with goroutine runtime
    crit: hostile
    conf: 0.98
    all:
      - id: forkbomb-symbol-text
      - id: micro-behaviors/process/thread/create::go-runtime-newproc-binary
    unless:
      - id: well-known/tool/detection/
