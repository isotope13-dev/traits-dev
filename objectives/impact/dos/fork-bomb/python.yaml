defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1499.004

traits:
- id: multiprocessing
  desc: Multiprocessing module
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    regex: multiprocessing\.(Process|Pool)
- id: import-os
  desc: Import os module
  crit: component
  conf: 0.6
  if:
    type: text
    substr: import os
- id: while-1
  desc: Infinite loop with while 1
  crit: notable
  conf: 0.6
  if:
    type: text
    exact: 'while 1:'
- id: for-iter-int
  desc: iter(int,1) infinite loop
  crit: notable
  conf: 0.6
  if:
    type: text
    exact: 'for _ in iter(int, 1):'
- id: fork-bomb
  desc: Fork bomb DoS attack
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'while\s+True:[\s\S]{0,160}os\.fork\('
  unless:
  - id: legitimate-patterns
- id: large-range-loop
  desc: Large range loop
  crit: component
  conf: 0.6
  if:
    type: text
    regex: 'for\s+\w+\s+in\s+range\(\d{4,}\):'
- id: time-sleep-dup
  desc: time.sleep() rate limiting
  crit: component
  conf: 0.7
  if:
    type: string_literal
    substr: time.sleep
composite_rules:
- id: infinite-loops
  desc: Python infinite loop construct
  any:
  - id: micro-behaviors/data/control-flow/loop::python-while-true
  - id: while-1
  - id: for-iter-int
  crit: component
- id: legitimate-patterns
  desc: Legitimate fork patterns with rate limiting or daemon markers
  any:
  - id: time-sleep-dup
  - id: micro-behaviors/process/daemonize/
  - id: micro-behaviors/communications/socket/connect::socket-accept-call
  crit: baseline
- id: fork-with-loop
  desc: Fork with infinite loop
  all:
  - id: import-os
  - id: micro-behaviors/process/fork/clone::python-os-fork-string
  - id: infinite-loops
  crit: notable
- id: tight-loops
  desc: Python tight loop construct
  any:
  - id: micro-behaviors/data/control-flow/loop::python-while-true
  - id: while-1
  - id: large-range-loop
  crit: component
- id: fork-with-tight-loop
  desc: Fork in tight loop
  all:
  - id: micro-behaviors/process/fork/clone::python-os-fork-string
  - id: tight-loops
  crit: notable
- id: rapid-fork
  desc: Rapid process forking without delay
  crit: suspicious
  conf: 0.85
  all:
  - id: fork-with-tight-loop
  unless:
  - id: legitimate-patterns
