defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1499.004

traits:
- id: multiprocessing
  desc: Multiprocessing module
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    regex: multiprocessing\.(Process|Pool)
- id: for-iter-int
  desc: iter(int,1) infinite loop
  crit: component
  conf: 0.6
  if:
    type: text
    exact: 'for _ in iter(int, 1):'
- id: fork-bomb
  desc: Python os.fork call
  # Fork-call building block. The previous lenient migration matched `(True|1)`
  # — the literal "True"/"1" anywhere — and surfaced suspicious on virtually
  # every Python file. The fork-bomb pattern (fork inside an infinite loop) is
  # the fork-with-loop composite, which pairs this with infinite-loops.
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\bos\.fork\s*\('
- id: large-range-loop
  desc: Large range loop
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: 'for\s+\w+\s+in\s+range\(\d{4,}\):'
  unless:
  - id: metadata/library/data::aws-python-sdk-source
  - id: metadata/package/testing/presence/harness::python-test-file
- id: time-sleep-dup
  desc: time.sleep() rate limiting
  crit: notable
  conf: 0.7
  if:
    type: string_literal
    substr: time.sleep
composite_rules:
- id: infinite-loops
  desc: Python infinite loop construct
  any:
  - id: micro-behaviors/data/control-flow/loop::python-while-true
  - id: micro-behaviors/data/control-flow/loop::python-while-one
  - id: for-iter-int
  crit: component
- id: legitimate-patterns
  desc: Legitimate fork patterns with rate limiting or daemon markers
  any:
  - id: time-sleep-dup
  - id: micro-behaviors/process/daemonize/
  - id: micro-behaviors/communications/socket/connect::socket-accept-call
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/harness/runtime::is-test
  crit: notable
- id: fork-with-loop
  desc: Fork call inside infinite loop
  all:
  - id: fork-bomb
  - id: infinite-loops
  unless:
  - id: objectives/impact/dos/fork-bomb/
  crit: notable
- id: tight-loops
  desc: Python tight loop construct
  any:
  - id: micro-behaviors/data/control-flow/loop::python-while-true
  - id: micro-behaviors/data/control-flow/loop::python-while-one
  - id: large-range-loop
  crit: notable
- id: rapid-fork
  desc: Rapid process forking without delay
  crit: notable
  conf: 0.85
  all:
  - id: fork-with-loop
  unless:
  - id: objectives/impact/dos/fork-bomb/
