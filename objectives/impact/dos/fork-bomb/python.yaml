defaults:
  platforms: [unix, windows, macos]
  for: [python]
  attack: T1499.004
traits:
  - id: os-fork
    desc: os.fork() call
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: os.fork
  - id: multiprocessing
    desc: Multiprocessing module
    crit: notable
    conf: 0.9
    if:
      type: string
      regex: multiprocessing\.(Process|Pool)
  - id: import-os
    desc: Import os module
    crit: notable
    conf: 0.6
    if:
      type: string
      substr: import os
  - id: while-1
    desc: Infinite loop with while 1
    crit: notable
    conf: 0.6
    if:
      type: raw
      exact: 'while 1:'
  - id: for-iter-int
    desc: iter(int,1) infinite loop
    crit: notable
    conf: 0.6
    if:
      type: raw
      exact: 'for _ in iter(int, 1):'
  - id: os-fork-string
    desc: os.fork() call
    crit: notable
    conf: 0.6
    if:
      type: raw
      substr: os.fork()
  - id: large-range-loop
    desc: Large range loop
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: 'for\s+\w+\s+in\s+range\(\d{4,}\):'
  - id: time-sleep-dup
    desc: time.sleep() rate limiting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: time.sleep
  - id: worker-keyword-lower
    desc: worker keyword (lowercase)
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: worker
  - id: worker-keyword-upper
    desc: WORKER keyword (uppercase)
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: WORKER
  - id: worker-keyword-title
    desc: Worker keyword (titlecase)
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: Worker
  - id: pool-keyword
    desc: Pool keyword
    crit: notable
    conf: 0.7
    if:
      type: string
      exact: Pool
  - id: daemon-keyword-lower
    desc: daemon keyword (lowercase)
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: daemon
  - id: daemon-keyword-upper
    desc: DAEMON keyword (uppercase)
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: DAEMON
  - id: daemon-keyword-title
    desc: Daemon keyword (titlecase)
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: Daemon
composite_rules:
  - id: infinite-loops
    desc: Infinite loop patterns
    any:
      - id: objectives/command-and-control/network/beacon/periodic::infinite-while-true
      - id: while-1
      - id: for-iter-int
    crit: notable
  - id: worker-keywords
    desc: Worker/daemon keywords
    any:
      - id: worker-keyword-lower
      - id: worker-keyword-upper
      - id: worker-keyword-title
    crit: notable
  - id: daemon-keywords
    desc: Daemon keywords
    any:
      - id: daemon-keyword-lower
      - id: daemon-keyword-upper
      - id: daemon-keyword-title
    crit: notable
  - id: legitimate-patterns
    desc: Legitimate fork patterns
    any:
      - id: objectives/impact/dos/fork-bomb::time-sleep-dup
      - id: worker-keywords
      - id: pool-keyword
      - id: daemon-keywords
    crit: notable
  - id: fork-with-loop
    desc: Fork with infinite loop
    all:
      - id: import-os
      - id: os-fork-string
      - id: infinite-loops
    crit: notable
  - id: tight-loops
    desc: Tight loop patterns
    any:
      - id: objectives/command-and-control/network/beacon/periodic::infinite-while-true
      - id: while-1
      - id: large-range-loop
    crit: notable
  - id: fork-with-tight-loop
    desc: Fork in tight loop
    all:
      - id: os-fork-string
      - id: tight-loops
    crit: notable
  - id: rapid-fork
    desc: Rapid process forking without delay
    crit: suspicious
    conf: 0.85
    all:
      - id: fork-with-tight-loop
    none:
      - id: legitimate-patterns
  - id: infinite-while
    desc: Infinite while loop
    any:
      - id: objectives/command-and-control/network/beacon/periodic::infinite-while-true
      - id: while-1
    crit: notable
  - id: fork-bomb
    desc: Fork bomb DoS attack
    crit: hostile
    conf: 0.95
    all:
      - id: os-fork-string
      - id: infinite-while
    none:
      - id: objectives/impact/dos/fork-bomb::time-sleep-dup
