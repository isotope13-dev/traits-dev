defaults:
  platforms: [unix]
  for: [shell]
traits:
  - id: bomb
    desc: "Classic Bash fork bomb recursion pattern"
    crit: suspicious
    conf: 1.0
    if:
      type: text
      exact: ":(){:|:&};:"
  - id: bomb-regex
    desc: "Bash Fork Bomb with optional whitespace"
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "^\\s*:\\(\\s*\\)\\s*\\{\\s*:\\s*\\|\\s*:\\s*&\\s*\\}\\s*;\\s*:\\s*$"
