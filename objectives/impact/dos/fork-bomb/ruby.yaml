defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1499

traits:
  - id: ruby-loop-fork
    desc: Ruby loop forks child process
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'loop\s*\{[^\n]{0,80}fork\s*\{'

  - id: ruby-load-current-file
    desc: Ruby reloads current file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: load(__FILE__)

composite_rules:
  - id: ruby-fork-bomb
    desc: Ruby recursive fork bomb
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-loop-fork
      - id: ruby-load-current-file
