defaults:
  platforms: [unix]
  for: [swift]
  attack: T1499

traits:
  - id: swift-large-fork-loop
    desc: Swift large fork loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'maxChildren\s*=\s*\d{3,}[\s\S]{0,260}fork\s*\('

  - id: swift-infinite-memory-burn
    desc: Swift infinite memory burn
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'while\s+true[\s\S]{0,180}UnsafeMutablePointer<UInt8>\.allocate'

composite_rules:
  - id: swift-fork-bomb-memory-burn
    desc: Swift fork bomb memory burn
    crit: hostile
    conf: 0.97
    all:
      - id: swift-large-fork-loop
      - id: swift-infinite-memory-burn
