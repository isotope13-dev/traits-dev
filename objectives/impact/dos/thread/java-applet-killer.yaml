# Detects Java AppletKiller malware that terminates all threads
# Ref: https://github.com/MalwareSourceCode/Java/blob/master/Trojan.Java.AppletKiller
# Lang: java
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: applet-killer-strings
    desc: AppletKiller family strings
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: '(?i)(killer|killAllThreads|AppletKiller)'
composite_rules:
  - id: applet-killer-dos
    desc: Java AppletKiller thread termination logic
    crit: hostile
    conf: 1.0
    all:
      - id: micro-behaviors/process/thread/terminate::stop
      - id: micro-behaviors/process/thread/enumerate::get-group
      - id: micro-behaviors/process/thread/enumerate::enumerate-dup
      - id: applet-killer-strings
