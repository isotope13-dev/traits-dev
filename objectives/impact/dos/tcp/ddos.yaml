defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: syn-flood-dup
    desc: SYN flood attack reference
    crit: notable
    conf: 0.9
    mbc: B0042
    attack: T1499
    if:
      type: text
      regex: (?i)syn.?flood\b
    unless:
      - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
      - type: basename
        exact: pft_synflood.py
  - id: ack-flood
    desc: ACK flood attack reference
    crit: suspicious
    conf: 0.9
    mbc: B0042
    attack: T1499
    if:
      type: text
      regex: (?i)\back.?flood\b
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: well-known/lib/aws-sdk-js/
      - id: metadata/file/profile/identity::generated-attack-map-context
  - id: tcp-flood
    desc: TCP flood attack function
    crit: suspicious
    conf: 0.9
    mbc: B0042
    attack: T1499
    if:
      type: text
      substr: tcp_flood
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: tcpraw-flood
    desc: TCP raw flood attack function
    crit: suspicious
    conf: 0.9
    mbc: B0042
    attack: T1499
    if:
      type: text
      substr: tcpraw_flood
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: hydrasyn
    desc: HYDRASYN DDoS attack
    crit: suspicious
    conf: 0.95
    mbc: B0042
    attack: T1499
    if:
      type: text
      substr: HYDRASYN
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: hping3-flood-command
    desc: hping3 command enables packet flooding
    crit: suspicious
    conf: 0.98
    mbc: B0042
    attack: T1498.001
    for: [python, shell]
    if:
      type: text
      regex: '(?i)\bhping3\b[^\n]{0,240}\s--flood\b'
  - id: hping3-random-source-option
    desc: hping3 command randomizes source addresses
    crit: suspicious
    conf: 0.98
    mbc: B0042
    attack: T1498.001
    for: [python, shell]
    if:
      type: text
      regex: '(?i)\bhping3\b[^\n]{0,240}\s--rand-source\b'
composite_rules:
  - id: hping3-flood-implementation
    desc: hping3 command combines flooding with randomized source addresses
    crit: hostile
    conf: 0.98
    all:
      - id: hping3-flood-command
      - id: hping3-random-source-option
  - id: ddos-technique
    desc: DDoS technique indicators
    crit: suspicious
    any:
      - id: micro-behaviors/communications/socket/raw::raw-socket-creation-regex
      - id: objectives/impact/dos/tcp::syn-flood-dup
      - id: ack-flood
      - id: micro-behaviors/communications/ip/spoof::spoof
  - id: ddos-offensive-markers
    desc: Offensive markers for DDoS
    crit: suspicious
    any:
      - id: objectives/command-and-control/backdoor/keywords::cyber-warfare-marker
      - id: objectives/impact/dos/keywords/ddos::sending-packets-marker
      - id: objectives/impact/dos/keywords/ddos::got-root-marker
      - id: objectives/impact/degrade/keywords/aggressive::unprofessional-error-marker
  - id: ddos-tool-offensive
    desc: DDoS tool with offensive or aggressive indicators
    crit: hostile
    conf: 0.95
    all:
      - id: ddos-technique
      - id: ddos-offensive-markers
  - id: flood-bot-implementation
    desc: TCP and ACK flood implementation with external target
    crit: hostile
    conf: 0.98
    mbc: B0042
    attack: T1498
    for: [binaries]
    all:
      - id: tcp-flood
      - id: ack-flood
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
