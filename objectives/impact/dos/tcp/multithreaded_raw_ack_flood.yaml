defaults:
  platforms: [unix, windows]
traits:
  - id: tcp-syn-flag-source
    desc: TCP SYN flag assignment
    crit: suspicious
    conf: 0.92
    for: [c, cpp]
    size_max: 30000
    if:
      type: text
      regex: tcph->syn\s*=\s*1
  - id: ssyn-flooder-banner
    desc: SSYN flooder banner
    crit: suspicious
    conf: 0.97
    for: [c, cpp]
    size_max: 30000
    if:
      type: text
      substr: SSYN Flooder by LSDEV
  - id: pps-limiter-usage
    desc: PPS limiter usage string
    crit: suspicious
    conf: 0.9
    for: [c, cpp]
    size_max: 30000
    if:
      type: text
      substr: <pps limiter, -1 for no limit>
composite_rules:
  - id: multithreaded-raw-ack-flood
    crit: suspicious
    description: "Detects a multithreaded raw socket ACK flood attack combining raw socket creation, infinite send loop, ACK flag setting, and pthreads."
    size_max: 1000000
    all:
      - id: micro-behaviors/communications/socket/raw::raw-socket-creation-regex
      # - id: micro-behaviors/communications/socket/send::send-loop-infinite
      - id: micro-behaviors/process/threading/operations::pthread
    # - id: micro-behaviors/net/packet/tcp::tcp-ack-flag-set
  - id: raw-syn-flood-mechanics
    desc: Multithreaded raw SYN flood mechanics
    crit: suspicious
    conf: 0.95
    attack: T1498
    size_max: 30000
    for: [c, cpp]
    all:
      - id: micro-behaviors/communications/socket/raw::raw-socket-creation-regex
      - id: micro-behaviors/communications/socket/options::ip-hdrincl-option
      - id: micro-behaviors/communications/socket/send::sendto-symbol
      - id: micro-behaviors/process/threading/operations::pthread
      - id: micro-behaviors/communications/ip/spoof::bitwise-ip-rand-source
      - id: micro-behaviors/communications/ip/spoof::bitwise-ip-shift-mask
      - id: micro-behaviors/data/control-flow/loop::infinite-loop-header
      - id: tcp-syn-flag-source
  - id: ssyn-flooder-cli
    desc: SSYN flooder usage markers
    crit: suspicious
    conf: 0.95
    size_max: 30000
    for: [c, cpp]
    all:
      - id: ssyn-flooder-banner
      - id: pps-limiter-usage
  - id: multithreaded-raw-syn-flood
    desc: Multithreaded raw SYN flood tool
    crit: hostile
    conf: 0.98
    attack: T1498
    size_max: 30000
    for: [c, cpp]
    all:
      - id: micro-behaviors/communications/socket/raw::raw-socket-creation-regex
      - id: micro-behaviors/communications/socket/options::ip-hdrincl-option
      - id: micro-behaviors/communications/socket/send::sendto-symbol
      - id: micro-behaviors/process/threading/operations::pthread
      - id: micro-behaviors/communications/ip/spoof::bitwise-ip-rand-source
      - id: micro-behaviors/communications/ip/spoof::bitwise-ip-shift-mask
      - id: micro-behaviors/data/control-flow/loop::infinite-loop-header
      - id: tcp-syn-flag-source
      - id: ssyn-flooder-banner
      - id: pps-limiter-usage
