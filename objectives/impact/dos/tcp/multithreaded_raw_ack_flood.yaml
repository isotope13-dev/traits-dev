defaults:
  platforms: [unix, windows, macos]
  for: [c, cpp]
composite_rules:
  - id: multithreaded-raw-ack-flood
    crit: hostile
    description: "Multithreaded raw-socket ACK flood (raw socket + send loop + ACK + pthreads)"
    all:
      - id: micro-behaviors/communications/socket/raw::raw-socket-creation-regex
      - id: micro-behaviors/process/threading/concurrency::pthread
      - id: micro-behaviors/communications/socket/send::send-symbol
      - id: micro-behaviors/communications/ip/construct::tcp-ack-flag-set
