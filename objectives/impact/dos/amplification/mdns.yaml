defaults:
  platforms: [unix, windows, macos]
composite_rules:
- id: dnssd-any
  desc: DNS-SD service discovery probe (any form)
  crit: notable
  conf: 0.84
  any:
  - id: objectives/impact/dos/amplification::dnssd-udp-service-probe
  - id: objectives/impact/dos/amplification::dnssd-hex-encoded-payload
- id: mdns-amplification-attack
  desc: mDNS amplification DDoS attack tool
  crit: hostile
  conf: 0.95
  attack: T1498.002
  all:
  - id: dnssd-any
  - id: micro-behaviors/communications/socket/raw::raw-socket-creation-regex
  any:
  - id: micro-behaviors/communications/socket/options::ip-hdrincl-option
  - id: micro-behaviors/communications/ip/spoof::ip-hdrincl-constant
  - id: micro-behaviors/communications/dns/raw::mdns-port-5353
  - id: objectives/impact/dos/keywords/ddos::starting-flood-marker
- id: mdns-amplification-scanner
  desc: mDNS amplification reflector scanner
  crit: suspicious
  conf: 0.9
  attack: T1595.001
  all:
  - id: micro-behaviors/communications/dns/raw::mdns-port-5353
  - id: dnssd-any
  any:
  - id: micro-behaviors/communications/socket/send::sendto-symbol
  - id: micro-behaviors/communications/socket/receive::recvfrom-symbol
