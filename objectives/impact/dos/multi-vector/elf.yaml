defaults:
  platforms: [unix, android]
  for: [elf]
  mbc: B0042
  attack: T1498

traits:
  - id: multi-vector-attack-method-cluster
    desc: Multiple protocol-specific attack method names
    crit: suspicious
    conf: 0.98
    count_min: 4
    if:
      type: text
      regex: '(?i)\battack_method_(udp|tcp|gre|discord)[a-z0-9_]*\b'

  - id: attack-state-name
    desc: Attack-in-progress state name
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: attack_ongoing

composite_rules:
  - id: multi-vector-elf-flood-bot
    desc: ELF multi-vector flood bot with watchdog support
    crit: hostile
    conf: 0.99
    attack: T1498.001
    all:
      - id: multi-vector-attack-method-cluster
      - id: attack-state-name
      - id: micro-behaviors/fs/path/device/special::multi-watchdog-device-cluster
