defaults:
  platforms: [unix, android]
  for: [elf]
  mbc: B0042
  attack: T1498.001

traits:
  - id: native-flood-worker-symbol-cluster
    desc: Multiple protocol flood workers
    crit: suspicious
    conf: 0.97
    count_min: 4
    if:
      type: symbol
      regex: '(?i)^(udp|tcp|syn|ack|http)_?flood(_(thread|worker))?$'

  - id: native-special-flood-worker
    desc: Specialized flood worker symbols
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: '(?i)^(pps_attack_thread|minecraft_tcp_flood_thread)$'

  - id: native-attack-dispatcher-symbol
    desc: Multi-vector attack dispatcher
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: attack_main

  - id: native-attack-type-table
    desc: Multi-vector attack command table
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)Attack types:\s*udp,\s*http,\s*dns,\s*tcp,\s*pps,\s*'

composite_rules:
  - id: native-multi-vector-flooder
    desc: Multi-vector flooder with threaded packet sending
    crit: hostile
    conf: 0.99
    all:
      - id: native-flood-worker-symbol-cluster
      - id: native-attack-dispatcher-symbol
      - id: native-attack-type-table
      - id: micro-behaviors/communications/socket/send::send
      - id: micro-behaviors/process/threading/concurrency::pthread
