defaults:
  platforms: [linux, android]
  for: [elf]
  mbc: B0042
  attack: T1498.001

traits:
- id: minecraft-offline-uuid
  desc: Minecraft offline UUID format
  crit: suspicious
  conf: 0.96
  if:
    type: text
    substr: OfflinePlayer:%s

- id: minecraft-bighandshake
  desc: Minecraft big handshake mode
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: (?i)\b(MC_BIGHS|bighandshake)\b

- id: minecraft-flood-handler
  desc: Minecraft flood handler name
  crit: suspicious
  conf: 0.95
  if:
    type: text
    exact: attack_mcflood

- id: discord-flood-handler
  desc: Discord flood handler name
  crit: suspicious
  conf: 0.9
  if:
    type: text
    exact: attack_discord

- id: source-query-flood-handler
  desc: Source query flood handler
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: \b(attack_vse|vse_payload(_len)?)\b

- id: go-net-gaming-flood-symbols
  desc: go_net game flood modules
  crit: component
  conf: 0.98
  count_min: 4
  if:
    type: text
    regex: 'go_net/pkg/attacks/l4\.(MinecraftFlood|FiveMFlood|FortAttack|SAMPFlood)'

- id: tcp-flood-handler-cluster--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: \b(attack_tcpflood|attack_tcpplain)\b

  count_max: 1008283
- id: tcp-flood-handler-cluster--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: \b(attack_tcpboom|attack_tcpkiller)\b

  count_max: 1008284
- id: tcp-flood-handler-cluster--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: \b(attack_tcpbypass|attack_tcp_stomp)\b

  count_max: 1008285
- id: tcp-flood-handler-cluster--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: \b(attack_handshake)\b

  count_max: 1008286
- id: udp-flood-handler-cluster--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: \b(attack_udpflood|attack_udp_plain)\b

  count_max: 1008287
- id: udp-flood-handler-cluster--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: \b(attack_udp_std|attack_udp_hex)\b

  count_max: 1008288
- id: udp-flood-handler-cluster--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: \b(attack_udpbypass|attack_udp_ovh)\b

  count_max: 1008289
- id: multi-vector-ddos-surface--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: \b(attack_app_http|attack_icmpflood)\b

  count_max: 1008290
- id: multi-vector-ddos-surface--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: \b(attack_socket|attack_tcpflood)\b

  count_max: 1008291
- id: multi-vector-ddos-surface--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: \b(attack_udpflood)\b

  count_max: 1008292
composite_rules:
- id: minecraft-protocol-ddos
  desc: Minecraft protocol DDoS module
  crit: suspicious
  conf: 0.98
  any:
  - id: minecraft-offline-uuid
  - id: minecraft-bighandshake
  - id: minecraft-flood-handler
  needs: 2

- id: multi-vector-ddos-bot
  desc: Multi-vector DDoS bot handlers
  crit: suspicious
  conf: 0.97
  any:
  - id: tcp-flood-handler-cluster
  - id: udp-flood-handler-cluster
  - id: multi-vector-ddos-surface
  needs: 2

- id: gaming-platform-ddos
  desc: Gaming platform DDoS modules
  crit: suspicious
  conf: 0.97
  all:
  - id: multi-vector-ddos-bot
  any:
  - id: minecraft-protocol-ddos
  - id: discord-flood-handler
  - id: source-query-flood-handler
  needs: 2
- id: source-query-udp-flood-bot
  desc: Source query UDP flood bot
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/impact/dos/attack::source-engine-query-payload
  - id: objectives/impact/dos/attack::send-udp-attack-symbol
  any:
  - id: source-query-flood-handler
  - id: objectives/impact/dos/attack::init-connection-symbol
  - id: objectives/impact/dos/attack::useragent-pool-symbol
  - id: objectives/impact/dos/attack::random-target-ip
  needs: 2
- id: source-query-environment-aware-flood-bot
  desc: Environment-aware Source query flood bot
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/impact/dos/attack::source-engine-query-payload
  - id: micro-behaviors/os/sysinfo/platform/kernel::ptrace-debugger
  - id: micro-behaviors/os/sysinfo/cpu::sys-devices
  - id: micro-behaviors/fs/proc/system::system-cpuinfo
- id: source-query-ping-pong-bot
  desc: Source query PING/PONG DDoS bot
  crit: hostile
  conf: 0.97
  all:
  - id: source-query-flood-handler
  - id: objectives/command-and-control/botnet/iot::hardcoded-ip-ping-pong-elf-bot
- id: xor18-multivector-source-query-ddos
  desc: XOR18 multi-vector Source-query DDoS bot
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/impact/dos/attack::source-engine-query-xor18
  - id: multi-vector-ddos-bot
  any:
  - id: udp-flood-handler-cluster
  - id: tcp-flood-handler-cluster
- id: xor18-multivector-reverse-shell-ddos
  desc: XOR18 multi-vector DDoS bot with reverse shell marker
  crit: hostile
  conf: 0.98
  all:
  - id: xor18-multivector-source-query-ddos
  - id: objectives/command-and-control/backdoor/keywords::reverse-shell-match
- id: go-net-gaming-platform-ddos
  desc: go_net gaming platform DDoS
  crit: suspicious
  conf: 0.98
  all:
  - id: go-net-gaming-flood-symbols
  - id: objectives/impact/dos/attack::go-net-multi-vector-ddos
- id: tcp-flood-handler-cluster
  desc: TCP flood handler names
  crit: suspicious
  conf: 0.94
  any:
  - id: tcp-flood-handler-cluster--rx-1
  - id: tcp-flood-handler-cluster--rx-2
  - id: tcp-flood-handler-cluster--rx-3
  - id: tcp-flood-handler-cluster--rx-4
- id: udp-flood-handler-cluster
  desc: UDP flood handler names
  crit: suspicious
  conf: 0.94
  any:
  - id: udp-flood-handler-cluster--rx-5
  - id: udp-flood-handler-cluster--rx-6
  - id: udp-flood-handler-cluster--rx-7
- id: multi-vector-ddos-surface
  desc: Multi-vector DDoS handler set
  crit: suspicious
  conf: 0.95
  any:
  - id: multi-vector-ddos-surface--rx-8
  - id: multi-vector-ddos-surface--rx-9
  - id: multi-vector-ddos-surface--rx-10
