defaults:
  platforms: [unix]
  for: [elf]
  attack: T1498.001
  mbc: B0042

traits:
  - id: attack-cli-interface
    desc: Usage line with parameter list
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(?i)usage:.{0,120}\[[^]]{1,12}\].{0,120}\[[^]]{1,12}\]'

  - id: attack-status-banner
    desc: Packet attack or flood status
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(send|launch|start).{0,20}(attack|flood)\b'

  - id: flood-function-symbol
    desc: Flood or attack worker symbol
    crit: component
    conf: 0.9
    if:
      type: symbol
      regex: '(?i)(flood|ddos|dos|attack)'

composite_rules:
  - id: raw-udp-packet-flooder
    desc: Raw UDP packet flooding tool
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/ip/construct::setup-ip-header-func
      - id: micro-behaviors/communications/ip/construct::setup-udp-header-func
      - id: micro-behaviors/communications/socket/send::sendto-symbol
      - id: micro-behaviors/communications/socket/options::options-set
      - id: attack-cli-interface
    any:
      - id: attack-status-banner
      - id: flood-function-symbol

  - id: covert-raw-ip-packet-bot
    desc: Covert raw-IP packet bot with process reconnaissance
    crit: hostile
    conf: 0.99
    attack: T1498.001,T1071,T1057
    mbc: B0030
    all:
      - id: micro-behaviors/communications/socket/raw::raw-socket-error
      - id: micro-behaviors/communications/ip/spoof::ip-hdrincl-constant
      - id: objectives/command-and-control/channel/covert::covert-protocol-markers
      - id: attack-status-banner
    any:
      - id: objectives/discovery/network/scan/port::connection-status-messages
      - id: micro-behaviors/fs/proc/info/path::process-pid-cmdline-format
      - id: micro-behaviors/communications/url/host::dynamic-dns-hostname
    needs: 1
    unless:
      - id: well-known/tool/sysadmin/network::adbyby-package-binary
