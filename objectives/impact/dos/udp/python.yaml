defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1498
  mbc: B0042

traits:
  # The neutral UDP-socket capability now lives in
  # micro-behaviors/communications/socket/udp::sock-dgram-python; the flood
  # composite below references it instead of carrying it as a local objective
  # fragment (a datagram socket alone is not impact/dos).
  - id: flooding-string
    desc: Flooding status string printed during attack
    crit: component
    conf: 0.9
    unless:
      - type: text
        substr: "prevent flooding"
      - type: basename
        exact: pft_synflood.py
    if:
      type: string_literal
      substr: 'flooding'

  - id: random-urandom-payload
    desc: random._urandom() called for packet payload
    crit: component
    conf: 0.85
    if:
      type: text
      substr: 'random._urandom('

  - id: udp-max-payload-65500
    desc: UDP max payload constant 65500
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '65500'

  # Attack-context fragments; package-specific class and variable names are
  # intentionally avoided.
  - id: python-udp-variable-sized-payload
    desc: Python UDP payload sized by multiplication
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '(?s)\S+\s*=.{0,60}\*\s*(size|length|payload_size)\b.{0,480}\.sendto\('
  - id: python-udp-random-destination-port
    desc: Python UDP random destination port selection
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?s)\bport\s*=\s*(random|secrets)\.\w+.{0,160}\.sendto\('

composite_rules:
  - id: python-udp-random-payload-flood
    desc: Python UDP loop sends random payloads
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/data/control-flow/loop::python-while-true
      - id: micro-behaviors/communications/socket/connect::socket-socket-call
      - id: micro-behaviors/communications/socket/udp::sock-dgram-python
      - id: micro-behaviors/communications/socket/send::python-sendto
      - id: random-urandom-payload
  - id: python-udp-state-payload-flood
    desc: Python UDP loop sends variable payloads to random ports
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/communications/socket/connect::socket-socket-call
      - id: micro-behaviors/communications/socket/udp::sock-dgram-python
      - id: micro-behaviors/communications/socket/send::python-sendto
      - id: micro-behaviors/communications/socket/send::python-sendto-in-state-loop
      - id: python-udp-variable-sized-payload
      - id: python-udp-random-destination-port
  - id: python-udp-flood
    desc: Multi-threaded Python UDP flood DoS tool
    crit: hostile
    conf: 0.95
    any:
      - id: python-udp-random-payload-flood
      - id: python-udp-state-payload-flood

  - id: python-udp-flood-threaded
    desc: Threaded Python UDP flood with random payload
    crit: hostile
    conf: 0.97
    all:
      - id: python-udp-flood
      - id: random-urandom-payload
      - id: micro-behaviors/communications/socket/connect::socket-module-import
    any:
      - id: udp-max-payload-65500
      - id: flooding-string
