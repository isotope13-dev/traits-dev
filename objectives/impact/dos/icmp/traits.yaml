defaults:
  attack: T1499
  mbc: B0042
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: icmp-flood-dup
    desc: ICMP flood attack
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: ICMPFLOOD
  - id: blacknurse
    desc: BlackNurse ICMP attack
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: BLACKNURSE
