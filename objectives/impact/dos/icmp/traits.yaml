defaults:
  attack: T1499
  mbc: B0042
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: icmp-flood-dup
    desc: ICMP flood attack
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ICMPFLOOD
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: blacknurse
    desc: BlackNurse ICMP attack
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: BLACKNURSE
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
