# Thread-based HTTP flood DDoS attack in C source
# Worms like Mydoom launch multi-threaded HTTP floods against targets
defaults:
  for: [c, cpp]
  platforms: [windows, unix]
traits:
  - id: dos-thread-count
    desc: DDoS thread count constant
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "THREADS\\s+(32|64|128|256)"
  - id: dos-target-sco-site
    desc: DDoS target SCO_SITE constant
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "SCO_SITE"
  - id: dos-target-dos-site
    desc: DDoS target DOS_SITE constant
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "DOS_SITE"
  - id: dos-target-target-site
    desc: DDoS target TARGET_SITE constant
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "TARGET_SITE"
  - id: dos-flood-scodos
    desc: DDoS scodos flood function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "scodos_(main|th|thread)"
  - id: dos-flood-ddos
    desc: DDoS ddos flood function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "ddos_(main|th|thread)"
  - id: dos-flood-flood
    desc: Threaded socket flood worker function
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/package/testing/presence/harness/
    if:
      type: tree-sitter
      kind: function
      regex: '(?s)flood_thread.{0,800}\\b(socket|connect)\\b.{0,800}\\b(send|sendto)\\b'
  - id: threaded-connection-flood-status
    desc: Threaded connection flood status text
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: DoS flood completed
  - id: pthread-connection-flood-loop
    desc: pthread connection flood loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'pthread_create[\s\S]{0,260}DOS_CONNECTIONS'
  - id: raw-ip-syn-packet-source
    desc: Raw IP SYN packet builder
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "send_tcp.tcp.syn = 1"
  - id: raw-ipproto-raw-socket
    desc: Raw IPPROTO_RAW socket
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "socket(AF_INET, SOCK_RAW, IPPROTO_RAW)"
    unless:
      - id: well-known/app/samba::samba-source-tree
      - id: well-known/lib/wine::wine-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-spdx-source-context
  - id: raw-syn-sendto-loop
    desc: Raw SYN sendto loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "sendto(tcp_socket, &send_tcp, 40"
  - id: synflood-operator-command
    desc: SYN flood operator command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ".synflood"
composite_rules:
  - id: http-flood-ddos-source
    desc: Thread-based HTTP flood DDoS in C
    crit: suspicious
    conf: 0.95
    attack: T1498
    all:
      - id: dos-thread-count
    any:
      - id: dos-flood-scodos
      - id: dos-flood-ddos
      - id: dos-flood-flood
  - id: threaded-socket-connection-flood
    desc: Threaded socket connection flood
    crit: hostile
    conf: 0.98
    all:
      - id: threaded-connection-flood-status
    any:
      - id: pthread-connection-flood-loop
      - id: micro-behaviors/process/threading/concurrency::pthread
  - id: raw-syn-flood-source
    desc: Raw socket SYN flood source
    crit: hostile
    conf: 0.98
    attack: T1498
    all:
      - id: raw-ip-syn-packet-source
      - id: raw-ipproto-raw-socket
      - id: raw-syn-sendto-loop
