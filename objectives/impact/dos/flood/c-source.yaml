# Thread-based HTTP flood DDoS attack in C source
# Worms like Mydoom launch multi-threaded HTTP floods against targets
defaults:
  for: [c, cpp]
  platforms: [windows, linux, unix]
traits:
  - id: dos-thread-count
    desc: DDoS thread count constant
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "THREADS\\s+(32|64|128|256)"
  - id: dos-target-sco-site
    desc: DDoS target SCO_SITE constant
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "SCO_SITE"
  - id: dos-target-dos-site
    desc: DDoS target DOS_SITE constant
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "DOS_SITE"
  - id: dos-target-target-site
    desc: DDoS target TARGET_SITE constant
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "TARGET_SITE"
  - id: dos-flood-scodos
    desc: DDoS scodos flood function
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "scodos_(main|th|thread)"
  - id: dos-flood-ddos
    desc: DDoS ddos flood function
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "ddos_(main|th|thread)"
  - id: dos-flood-flood
    desc: DDoS flood function
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "flood_(main|th|thread)"
composite_rules:
  - id: http-flood-ddos-source
    desc: Thread-based HTTP flood DDoS in C
    crit: suspicious
    conf: 0.95
    attack: T1498
    all:
      - id: dos-thread-count
    any:
      - id: dos-flood-scodos
      - id: dos-flood-ddos
      - id: dos-flood-flood
