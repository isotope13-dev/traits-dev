# C# DDoS flooding patterns
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1498"
  mbc: "B0033"
traits:
  - id: flood-method
    desc: TCP flood method name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'void\s+FloodTCP'
  - id: dontlinger-zero-timeout
    desc: DontLinger with zero ReceiveTimeout
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "SocketOptionName.DontLinger"
  - id: ddos-class-name
    desc: DDoS helper class name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'class\s+DDoS'
  - id: abort-ddos-method
    desc: DDoS abort method
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "AbortDDoS"
  - id: loic-flooder-class-name
    desc: LOIC-style flooder class
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'class\s+(HTTPFlooder|XXPFlooder)\s*:\s*IFlooder'
  - id: isflooding-send-loop
    desc: IsFlooding socket send loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'while\s*\(\s*this\.IsFlooding\s*\)[\s\S]{0,700}socket\.(Send|SendTo)\s*\('
  - id: flood-count-loop
    desc: Flood counter send loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\+\+this\.FloodCount[\s\S]{0,220}socket\.(Send|SendTo)\s*\('
  - id: flooder-background-worker
    desc: Flooder background worker loop
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'BackgroundWorker[\s\S]{0,220}bw_DoWork'
  - id: smtp-proxy-connect-port-25
    desc: SMTP delivery through HTTP CONNECT proxy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CONNECT\s+"\s*\+\s*[^"\r\n]{1,80}\s*\+\s*":25\s+HTTP/1\.[01]'
  - id: smtp-rcpt-to-inline
    desc: Inline SMTP RCPT TO command
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "RCPT TO:"
  - id: smtp-data-inline
    desc: Inline SMTP DATA command
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "\"DATA\""
  - id: smtp-auth-login-base64
    desc: SMTP AUTH LOGIN base64 credentials
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'AUTH LOGIN[\s\S]{0,900}Convert\.ToBase64String\s*\(\s*Encoding\.(UTF8|ASCII)\.GetBytes'
  - id: smtp-listbox-recipient-drain
    desc: GUI recipient list drain during SMTP sending
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'ListBox\d+\.SelectedItem[\s\S]{0,260}ListBox\d+\.Items\.Remove'
  - id: smtp-sent-message-counter
    desc: Sent message counter updated from SMTP loop
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "MessagesSent"
  - id: async-tcp-beginconnect
    desc: Async TCP BeginConnect call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ".BeginConnect((EndPoint)"
  - id: socket-stream-tcp-client
    desc: Stream TCP socket constructor
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "SocketType.Stream, ProtocolType.Tcp"
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
  - id: poll-selectwrite-status
    desc: Poll SelectWrite connection status
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "Poll(10, SelectMode.SelectWrite)"
  - id: repeated-connection-threadstart
    desc: ThreadStart creates new connection
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "new ThreadStart(new Connection"
  - id: connection-arraylist-loop
    desc: ArrayList connection thread loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "arrayList2.Add((object) new Connection"
  - id: connection-flood-status-text
    desc: connection flood status counters
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "connected = "
  - id: dotnet-native-raw-socket-call
    desc: Decompiled native raw socket call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "socket(2, 3, (int) byte.MaxValue)"
  - id: dotnet-native-sendto-packet
    desc: Decompiled native sendto packet emission
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'sendto\s*\(\s*num\d+\s*,\s*\(sbyte\*\)\s*&'
  - id: dotnet-manual-ip-tcp-headers
    desc: Manual IPv4 and TCP header structures
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: 'public\s+static\s+ipv4\s+entete_ipv4;[\s\S]{0,260}public\s+static\s+tcp\s+entete_tcp;'
  - id: dotnet-infinite-loop-flag
    desc: Infinite flood loop flag
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "while_infini"
  - id: dotnet-randomize-packet-values
    desc: Packet randomization routine call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "Random_change_the_values();"
  - id: dotnet-send-trame-call
    desc: Raw packet send routine call
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "send_trame();"
composite_rules:
  - id: ddos-flood-capability
    desc: DDoS flood attack capability
    crit: hostile
    conf: 0.95
    any:
      - id: flood-method
      - id: dontlinger-zero-timeout
      - id: ddos-class-name
      - id: abort-ddos-method
    needs: 2
  - id: loic-style-dotnet-flooder
    desc: LOIC-style .NET flooder
    crit: hostile
    conf: 0.98
    all:
      - id: loic-flooder-class-name
      - id: isflooding-send-loop
    any:
      - id: flood-count-loop
      - id: flooder-background-worker
      - id: micro-behaviors/communications/socket/create::socket-protocol-type-selection
  - id: raw-smtp-mail-flooder
    desc: Raw SMTP mail flooder
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/email/send/direct::smtp-mail-from-raw
      - id: smtp-rcpt-to-inline
      - id: smtp-proxy-connect-port-25
    any:
      - id: smtp-data-inline
      - id: smtp-auth-login-base64
      - id: smtp-listbox-recipient-drain
      - id: smtp-sent-message-counter
    needs: 2
  - id: async-tcp-connect-flood-primitive
    desc: Async TCP connect flood primitive
    crit: suspicious
    conf: 0.94
    all:
      - id: socket-stream-tcp-client
      - id: async-tcp-beginconnect
      - id: poll-selectwrite-status
  - id: threaded-connect-flooder
    desc: Threaded TCP connect flooder
    crit: hostile
    conf: 0.97
    all:
      - id: repeated-connection-threadstart
    any:
      - id: connection-arraylist-loop
      - id: connection-flood-status-text
    needs: 2
  - id: dotnet-native-raw-packet-flooder
    desc: Decompiled .NET native raw packet flooder
    crit: hostile
    conf: 0.97
    all:
      - id: dotnet-native-raw-socket-call
      - id: dotnet-native-sendto-packet
    any:
      - id: dotnet-manual-ip-tcp-headers
      - id: dotnet-randomize-packet-values
      - id: dotnet-send-trame-call
      - id: dotnet-infinite-loop-flag
    needs: 2
