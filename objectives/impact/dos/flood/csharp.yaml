# C# DDoS flooding patterns
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1498"
  mbc: "B0033"
traits:
  - id: flood-method
    desc: TCP flood method name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'void\s+FloodTCP'
  - id: dontlinger-zero-timeout
    desc: DontLinger with zero ReceiveTimeout
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "SocketOptionName.DontLinger"
  - id: ddos-class-name
    desc: DDoS helper class name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'class\s+DDoS'
  - id: abort-ddos-method
    desc: DDoS abort method
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "AbortDDoS"
composite_rules:
  - id: ddos-flood-capability
    desc: DDoS flood attack capability
    crit: hostile
    conf: 0.95
    any:
      - id: flood-method
      - id: dontlinger-zero-timeout
      - id: ddos-class-name
      - id: abort-ddos-method
    needs: 2
