defaults:
  platforms: [windows, unix]
  for: [java]
  attack: T1498
  mbc: B0029

traits:
  - id: java-dos-start-attack-source
    desc: Java DoS start attack source
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: startAttack
  - id: java-dos-stop-attack-source
    desc: Java DoS stop attack source
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: stopAttack
  - id: java-dos-send-request-source
    desc: Java DoS send request source
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: sendRequest
  - id: java-dos-multi-protocol-source
    desc: Java DoS multi-protocol source
    crit: notable
    conf: 0.9
    count_min: 3
    if:
      type: symbol
      kind: function
      regex: '^send(Http|Socket|Udp)$'
  - id: java-dos-protocol-selector-source
    desc: Java DoS protocol selector source
    crit: component
    conf: 0.86
    count_min: 3
    if:
      type: literal
      regex: '^(GET|POST|SOCKET|UDP|LiteHTTP|LiteSocket|LiteUDP)$'
  - id: java-dos-datagram-source
    desc: Java DoS datagram send source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: DatagramPacket
  - id: java-dos-random-payload-source
    desc: Java DoS random payload source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: nextBytes
  - id: java-dos-user-agent-rotation-source
    desc: Java DoS user agent rotation
    crit: component
    conf: 0.84
    if:
      type: literal
      exact: User-Agent

composite_rules:
  - id: java-dos-attack-lifecycle-source
    desc: Java DoS attack lifecycle source
    crit: notable
    conf: 0.9
    any:
      - id: java-dos-start-attack-source
      - id: java-dos-stop-attack-source
      - id: java-dos-send-request-source
    needs: 2
  - id: java-http-socket-udp-dos-controller
    desc: Java HTTP socket UDP DoS
    crit: suspicious
    conf: 0.95
    all:
      - id: java-dos-attack-lifecycle-source
      - id: java-dos-multi-protocol-source
      - id: java-dos-protocol-selector-source
    any:
      - id: java-dos-datagram-source
      - id: java-dos-random-payload-source
      - id: java-dos-user-agent-rotation-source
      - id: micro-behaviors/communications/socket/create::java-datagramsocket-create
    needs: 2
