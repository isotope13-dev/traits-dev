# Rust source-path cluster for native flood implementations.
# A single source path is only a component; the hostile rule requires the
# flood module, a connection module, and explicit transport markers together.
defaults:
  platforms: [linux]
  for: [elf]
  attack: T1498.001

traits:
  - id: rust-flood-module-source-path
    desc: Rust flood-module source path
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(^|[/\\])src/(flood|floods|ddos)([/\\][^/\\]{1,64})+\.rs'

  - id: rust-connection-module-source-path
    desc: Rust network-connection module source path
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(^|[/\\])src/connection([/\\][^/\\]{1,64})+\.rs'

composite_rules:
  - id: rust-flood-network-source-cluster
    desc: Rust network flood source cluster
    crit: notable
    conf: 0.93
    all:
      - id: rust-connection-module-source-path
      - id: micro-behaviors/communications/socket/connect::connect-symbol
    any:
      - id: micro-behaviors/communications/socket/send::send-symbol
      - id: micro-behaviors/communications/socket/send::sendto-symbol
  - id: rust-flood-network-attack
    desc: Rust native flood implementation with network transport modules
    crit: hostile
    conf: 0.96
    all:
      - id: rust-flood-module-source-path
      - id: rust-flood-network-source-cluster
