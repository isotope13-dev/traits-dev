composite_rules:
  - any:
      - id: attack-metrics-a
      - id: attack-metrics-b
    unless:
      - id: metadata/library/finance
      - id: brave-free-provider-marker
      - id: well-known/lib/sharp-libvips/
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: well-known/tool/development/anthropic-claude-agent/
      - id: well-known/app/mysqltuner::mysqltuner-source-path
    conf: 0.7
    crit: notable
    desc: High-rate network performance metric text
    id: attack-metrics
  - any:
      - id: syn-flood
      - id: udp-flood
      - id: http-flood
      - id: icmp-flood
      - id: slowloris-flood
      - id: post-flood
      - id: get-flood
      - id: dns-flood
      - id: memcached-flood
      - id: ack-flood
    conf: 0.8
    crit: notable
    desc: Specific flood attack types
    id: flood-types
    unless:
      - id: metadata/library/cloud-sdk::tencentcloud-python-sdk
      - id: well-known/tool/detection/security-scanner::cloud-sdk-api-model
  - any:
      - id: attack-telemetry-a1
      - id: attack-telemetry-a2
      - id: attack-telemetry-b1
      - id: attack-telemetry-b2
    all:
      - id: ddos-attack-terminology
    conf: 0.7
    crit: notable
    desc: Telemetry counters for attack progress
    id: attack-telemetry
  - any:
      - id: ddos-attack-ddos
      - id: ddos-attack-syn
      - id: ddos-attack-target-mode-type
    conf: 0.7
    crit: component
    desc: Additional DDoS attack terminology
    id: ddos-attack-terminology
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-external-dns-binary
      - id: metadata/library/cloud-sdk::huaweicloud-dotnet-aad-sdk
      - id: well-known/tool/sysadmin/tccli::tccli-generated-service-client
      - id: metadata/library/cloud-sdk::tencentcloud-python-sdk
      - id: well-known/tool/detection/security-scanner::cloud-sdk-api-model
  - any:
      - id: flood-types
      - id: attack-metrics
    all:
      - id: ddos-attack-terminology
    crit: suspicious
    desc: DDoS-specific terminology detected
    id: ddos-terminology-comp
    unless:
      - id: metadata/file/format::asn1-module-definition
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: well-known/tool/development/anthropic-claude-agent/
      - id: well-known/app/mysqltuner::mysqltuner-source-path
      - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - id: well-known/lib/deb-package::firefox-omni-basename
      - id: metadata/library/cloud-sdk::tencentcloud-python-sdk
      - id: well-known/tool/detection/security-scanner::cloud-sdk-api-model
  - all:
      - id: ddos-terminology-comp
      - id: micro-behaviors/process/create/workers/
    any:
      - id: micro-behaviors/communications/
    crit: suspicious
    desc: DDoS-specific operational mechanics detected
    id: ddos-mechanics
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: well-known/tool/development/anthropic-claude-agent/
      - id: well-known/app/mysqltuner::mysqltuner-source-path
      - id: well-known/lib/deb-package::firefox-omni-basename
  - all:
      - id: ddos-terminology-comp
      - id: ddos-mechanics
      - id: micro-behaviors/communications/socket/create/
    conf: 0.9
    crit: suspicious
    desc: Probable DDoS attack tool
    id: ddos-capability
  - all:
      - id: micro-behaviors/communications/http/user-agent::hardcoded-user-agent-list
      - id: ddos-terminology-comp
    any:
      - id: micro-behaviors/communications/http/post/
      - id: micro-behaviors/communications/http/request/client::request-python
    conf: 0.95
    crit: suspicious
    desc: Layer 7 (HTTP) DDoS tool
    id: layer7-ddos
    unless:
      - id: well-known/lib/deb-package::firefox-omni-basename
  - all:
      - id: micro-behaviors/communications/benchmark/http::ab-high-volume-argv
      - id: micro-behaviors/process/create/thread
      - id: micro-behaviors/process/create/subprocess::run-content
    any:
      - id: micro-behaviors/communications/benchmark/http::ab-host-header-argv
      - id: micro-behaviors/communications/http/headers::headers-encoding
    conf: 0.95
    crit: hostile
    desc: Threaded ApacheBench HTTP flood
    id: threaded-apachebench-flood
defaults:
  attack: T1498
  for: [scripts, binaries]
  mbc: B0009
  platforms:
    - unix
    - windows
traits:
  - conf: 0.7
    crit: component
    desc: Performance metrics typical of DDoS
    id: attack-metrics-a
    if:
      case_insensitive: true
      regex: \b[0-9]+(\.[0-9]+)?(\s+|[=:]\s*)(pps|bps|qps)\b
      type: text
    unless:
      # In an H.264/AVC video codec, "PPS" is a Picture Parameter Set, not
      # packets-per-second — e.g. openh264's "Cannot write more than 255 PPS
      # into avcC box". Any binary bundling a video decoder (ImageMagick,
      # ffmpeg) has these strings.
      - id: objectives/impact/dos/attack/
      - type: text
        word: baudrate
      # Modem/telephony tables commonly enumerate V-series baud rates beside
      # values such as "300 bps (V.21)"; these are protocol metadata, not
      # packet-rate telemetry.
      - type: text
        regex: '\bV\.[0-9]{2}\b'
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: brave-free-provider-marker
      - id: well-known/lib/sharp-libvips/
  - id: brave-free-provider-marker
    desc: Brave provider performance metric marker
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: brave_free
  - conf: 0.7
    crit: component
    desc: Performance metrics typical of DDoS
    id: attack-metrics-b
    if:
      case_insensitive: true
      regex: \b(pps|bps|qps)\s*[=:]\s*[0-9]+
      type: text
    unless:
      # Modem/telephony tables commonly enumerate V-series baud rates beside
      # values such as "300 bps (V.21)"; these are protocol metadata, not
      # packet-rate telemetry.
      - type: text
        regex: '\bV\.[0-9]{2}\b'
  - conf: 0.8
    crit: notable
    desc: SYN flood terminology
    id: syn-flood
    if:
      regex: '[sS][yY][nN][_-]?flood'
      type: text
    unless:
      - type: basename
        exact: pft_synflood.py
  - conf: 0.8
    crit: notable
    desc: UDP flood terminology
    id: udp-flood
    if:
      regex: '[uU][dD][pP][_-]?[fF]lood'
      type: text
    unless:
      - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
  - conf: 0.8
    crit: suspicious
    desc: HTTP flood terminology
    id: http-flood
    unless:
      - id: metadata/file/profile/identity::generated-attack-map-context
    if:
      regex: '\bhttp[_-]?flood\b'
      case_insensitive: true
      type: text
  - conf: 0.8
    crit: notable
    desc: ICMP flood terminology
    id: icmp-flood
    unless:
      - id: metadata/library/cloud-sdk::tencentcloud-python-sdk
      - id: well-known/tool/detection/security-scanner::cloud-sdk-api-model
    if:
      regex: '\bicmp[_-]?flood\b'
      case_insensitive: true
      type: text
  - conf: 0.8
    crit: notable
    desc: Slowloris flood terminology
    id: slowloris-flood
    if:
      regex: (?i)\bslowloris[_-]?flood\b
      type: text
  - conf: 0.8
    crit: notable
    desc: POST flood terminology
    id: post-flood
    if:
      regex: (?i)\bpost[\s-]+flood\b
      type: text
  - conf: 0.8
    crit: notable
    desc: GET flood terminology
    id: get-flood
    if:
      regex: (?i)\bget[_-]?flood\b
      type: text
  - conf: 0.8
    crit: notable
    desc: DNS flood terminology
    id: dns-flood
    if:
      regex: (?i)\bdns[_-]?flood\b
      type: text
  - conf: 0.8
    crit: notable
    desc: Memcached flood terminology
    id: memcached-flood
    if:
      regex: (?i)\bmemcached[_-]?flood\b
      type: text
  - conf: 0.8
    crit: notable
    desc: ACK flood terminology
    id: ack-flood
    if:
      regex: (?i)\back[_-]?flood\b
      type: text
  - conf: 0.7
    crit: component
    desc: DDOS attack terminology
    id: ddos-attack-ddos
    if:
      regex: (?i)ddos[_-]?attack
      type: text
    unless:
      - id: metadata/file/profile/identity::static-html-shell
  - conf: 0.7
    crit: component
    desc: SYN attack terminology
    id: ddos-attack-syn
    if:
      regex: (?i)syn[_-]?attack
      type: text
  - conf: 0.7
    crit: component
    desc: Attack target/mode/type terminology
    id: ddos-attack-target-mode-type
    if:
      regex: (?i)\b(ddos|flood)[_-]?attack[_-]?(target|mode|type)\b
      type: text
  - conf: 0.7
    crit: component
    desc: Telemetry counters for attack progress
    id: attack-telemetry-a1
    if:
      case_insensitive: true
      regex: \b(ddos|attack|flood)[_-]?(packets|requests)[_-][a-z]{4,5}\b
      type: text
    unless:
      - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
  - conf: 0.7
    crit: component
    desc: Telemetry counters for attack progress
    id: attack-telemetry-a2
    if:
      case_insensitive: true
      regex: \b(ddos|attack|flood)[_-]?(bytes|payloads)[_-][a-z]{4,5}\b
      type: text
  - conf: 0.7
    crit: component
    desc: Telemetry counters for attack progress
    id: attack-telemetry-b1
    if:
      case_insensitive: true
      regex: \b(ddos|attack|flood)[_-]?(packets|requests)[_-][a-z]{4,7}\b
      type: text
  - conf: 0.7
    crit: component
    desc: Telemetry counters for attack progress
    id: attack-telemetry-b2
    if:
      case_insensitive: true
      regex: \b(ddos|attack|flood)[_-]?(bytes|payloads)[_-][a-z]{4,7}\b
      type: text
