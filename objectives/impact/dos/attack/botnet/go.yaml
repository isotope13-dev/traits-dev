defaults:
  platforms:
  - ios
  - unix
  - android
  for:
  - macho
  - elf
traits:
- id: attack-store-type
  desc: Go attack store type
  crit: component
  conf: 0.9
  if:
    type: text
    exact: '*main.AttackStore'
- id: execution-map-types
  desc: Go attack execution maps
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: 'main\.(External|Internal)Execution'
- id: attack-stats-tags--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: '\[(SSHHR|TCPHR)\] attk stats'
  count_max: 1008682
- id: attack-stats-tags--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: '\[(UDPHR|STDHEX)\] attk stats'
  count_max: 1008683
- id: attack-stats-tags--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: '\[(FSP|NWS)\] attk stats'
  count_max: 1008684
- id: attack-stats-tags--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: '\[(PAZ)\] attk stats'
  count_max: 1008685
- id: unknown-attack-method
  desc: Unknown attack method error
  crit: suspicious
  conf: 0.96
  if:
    type: text
    substr: Unknown attack method id has been passed
- id: target-addr
  desc: References targetAddr (Go DDoS pattern)
  crit: component
  conf: 0.7
  platforms: [unix, windows]
  for: [macho, elf, pe]
  if:
    type: text
    word: targetAddr
- id: packets-sent
  desc: References packetsSent counter (Go DDoS
  crit: component
  conf: 0.7
  platforms: [unix, windows]
  for: [macho, elf, pe]
  if:
    type: text
    word: packetsSent
- id: target-scheme
  desc: References targetScheme (Go DDoS pattern)
  crit: baseline
  conf: 0.7
  platforms: [unix, windows]
  for: [macho, elf, pe]
  if:
    type: text
    word: targetScheme
  unless:
  - type: text
    substr: checkPseudos
- id: go-ddos-attack-vocabulary
  desc: DDoS vocabulary in a Go network binary
  crit: component
  conf: 0.9
  platforms: [unix, windows]
  for: [macho, elf, pe]
  count_min: 1
  if:
    type: text
    regex: '(?i)\b(ddos|botnet|udp\s+flood|tcp\s+flood|http\s+flood|syn\s+flood|flood\s+attack)\b'
- id: connect-symbol
  desc: Go bot connect handler symbol
  crit: suspicious
  conf: 0.95
  if:
    type: symbol
    exact: main.Connect
- id: await-commands-symbol
  desc: Go bot command loop symbol
  crit: suspicious
  conf: 0.95
  if:
    type: symbol
    exact: main.AwaitCommands
- id: http-get-command
  desc: HTTP GET flood command token
  crit: notable
  conf: 0.92
  if:
    type: text
    exact: http-get
- id: http-post-command
  desc: HTTP POST flood command token
  crit: notable
  conf: 0.92
  if:
    type: text
    exact: http-post
- id: simple-get-symbol
  desc: Go HTTP GET flood handler symbol
  crit: suspicious
  conf: 0.96
  if:
    type: symbol
    exact: /root/bot/Methods.SimpleGet
- id: simple-post-symbol
  desc: Go HTTP POST flood handler symbol
  crit: suspicious
  conf: 0.96
  if:
    type: symbol
    exact: /root/bot/Methods.SimplePost
- id: bot-connected-banner
  desc: Bot connection banner string
  crit: suspicious
  conf: 0.92
  if:
    type: text
    exact: "[BOT] | Connected"
- id: go-net-attack-package
  desc: go_net attack package path
  crit: component
  conf: 0.97
  for: [elf]
  if:
    type: text
    exact: go_net/pkg/attacks/l4
- id: go-net-core-state
  desc: go_net core state module
  crit: component
  conf: 0.96
  for: [elf]
  if:
    type: text
    exact: go_net/pkg/core/state.go
- id: go-net-l4-flood-symbols
  desc: go_net L4 flood symbols
  crit: component
  conf: 0.98
  for: [elf]
  count_min: 8
  if:
    type: text
    regex: 'go_net/pkg/attacks/l4\.(DNSFlood|FiveMFlood|FortAttack|OVHAttack)'
- id: go-net-l4-specialized-floods
  desc: go_net game flood symbols
  crit: component
  conf: 0.98
  for: [elf]
  count_min: 4
  if:
    type: text
    regex: 'go_net/pkg/attacks/l4\.(MinecraftFlood|SAMPFlood|DiscordAttack)'
- id: go-net-l7-flood-symbols
  desc: go_net L7 flood symbols
  crit: component
  conf: 0.98
  for: [elf]
  count_min: 2
  if:
    type: text
    regex: 'go_net/pkg/attacks/l7\.(HTTPSFlood|TLSPlusBypass|Priv7Flood)'
- id: go-net-command-core
  desc: go_net core attack handlers
  crit: component
  conf: 0.98
  for: [elf]
  count_min: 4
  if:
    type: text
    regex: 'main\.handle(UDP|TCP|DNS|HTTPS)Command'
- id: go-net-command-volume
  desc: go_net volume attack handlers
  crit: component
  conf: 0.98
  for: [elf]
  count_min: 3
  if:
    type: text
    regex: 'main\.handle(OVH|PPS|GBPS|Hex)Command'
- id: go-net-command-game
  desc: go_net game attack handlers
  crit: component
  conf: 0.98
  for: [elf]
  count_min: 3
  if:
    type: text
    regex: 'main\.handle(SAMP|MC|FiveM|Fortnite)Command'
- id: go-net-udp-command-usage
  desc: go_net UDP command usage
  crit: component
  conf: 0.95
  for: [elf]
  if:
    type: text
    substr: 'Invalid !udp command. Usage:'
- id: go-net-dport-required
  desc: DDoS target port required
  crit: component
  conf: 0.9
  for: [elf]
  if:
    type: text
    substr: 'ERROR: Target port (dport) is required.'
- id: apex2-core-flood-symbols
  desc: Apex2 core flood functions
  crit: component
  conf: 0.98
  for: [elf]
  count_min: 3
  if:
    type: symbol
    regex: 'apex2/Methods\.(CF|PPSFlood|TLSFlood|UdpFlood)'
- id: apex2-specialized-flood-symbols
  desc: Apex2 specialized flood functions
  crit: component
  conf: 0.98
  for: [elf]
  count_min: 2
  if:
    type: symbol
    regex: 'apex2/Methods\.(GameFlood|DiscordFlood|TLSPlusFlood|TLSPlusBypassFlood)'
- id: apex2-flood-status-lines
  desc: Apex2 flood status strings
  crit: component
  conf: 0.97
  for: [elf]
  count_min: 2
  if:
    type: text
    regex: 'Starting (CF Flood|PPS attack|TLS attack|UDP attack)'
- id: apex2-tlsplus-proxy-file
  desc: Apex2 TLS proxy file
  crit: component
  conf: 0.96
  for: [elf]
  if:
    type: text
    substr: proxy/tlsplusbypass.txt
- id: go-pe-obfuscated-ddos-token
  desc: DDoS token in PE text
  crit: component
  conf: 0.78
  platforms: [windows]
  for: [pe]
  if:
    type: text
    word: ddos
- id: go-pe-obfuscated-network-tokens
  desc: Repeated PE network-protocol tokens
  crit: component
  conf: 0.72
  platforms: [windows]
  for: [pe]
  count_min: 8
  if:
    type: text
    regex: '(?i)\b(bot|tcp|udp)\b'
composite_rules:
- id: go-bot-attack-dispatch
  desc: Go bot DDoS attack dispatcher
  crit: hostile
  conf: 0.98
  all:
  - id: attack-store-type
  - id: execution-map-types
  - id: attack-stats-tags
  - id: unknown-attack-method
- id: go-ddos-indicators
  desc: Go target fields plus DDoS vocabulary
  crit: suspicious
  platforms: [unix, windows]
  for: [macho, elf, pe]
  all:
  - id: target-addr
  - id: packets-sent
  - id: target-scheme
  - id: go-ddos-attack-vocabulary
- id: http-flood-command-bot
  desc: Go HTTP flood bot command loop
  crit: hostile
  conf: 0.98
  all:
  - id: connect-symbol
  - id: await-commands-symbol
  - id: simple-get-symbol
  - id: simple-post-symbol
  - id: bot-connected-banner
  any:
  - id: http-get-command
  - id: http-post-command
- id: go-net-command-handlers
  desc: go_net attack command handlers
  crit: notable
  conf: 0.98
  for: [elf]
  any:
  - id: go-net-command-core
  - id: go-net-command-volume
  - id: go-net-command-game
  needs: 2
- id: go-net-multi-vector-ddos
  desc: go_net multi-vector DDoS bot
  crit: hostile
  conf: 0.99
  for: [elf]
  all:
  - id: go-net-attack-package
  - id: go-net-command-handlers
  - id: go-net-l4-flood-symbols
  any:
  - id: go-net-l4-specialized-floods
  - id: go-net-l7-flood-symbols
  - id: go-net-udp-command-usage
  - id: go-net-dport-required
  needs: 2
- id: go-net-flood-tasking
  desc: go_net DDoS tasking protocol
  crit: suspicious
  conf: 0.97
  for: [elf]
  all:
  - id: go-net-command-handlers
  any:
  - id: go-net-udp-command-usage
  - id: go-net-dport-required
  - id: go-net-core-state
  needs: 2
- id: apex2-multi-vector-ddos
  desc: Apex2 multi-vector DDoS bot
  crit: hostile
  conf: 0.99
  for: [elf]
  all:
  - id: apex2-core-flood-symbols
  - id: apex2-specialized-flood-symbols
  - id: apex2-flood-status-lines
  any:
  - id: apex2-tlsplus-proxy-file
  - id: micro-behaviors/communications/http/tls::go-utls-fingerprint-customization
- id: go-pe-obfuscated-ddos-vocabulary
  desc: Obfuscated Go PE DDoS vocabulary
  crit: suspicious
  conf: 0.84
  platforms: [windows]
  for: [pe]
  all:
  - id: go-pe-obfuscated-ddos-token
  - id: go-pe-obfuscated-network-tokens
  - id: objectives/anti-static/obfuscation/name-mangling/type-names::go-generated-main-eq-symbols
  any:
  - id: metadata/binary/section/metrics::inflated-data-section
  - id: metadata/lang/compiler/systems::go-pe-rich-symbols
  - id: objectives/anti-static/obfuscation/imports::go-sparse-dynamic-api-imports
  needs: 2
- id: attack-stats-tags
  desc: Bot flood attack stats tags
  crit: suspicious
  conf: 0.95
  any:
  - id: attack-stats-tags--rx-1
  - id: attack-stats-tags--rx-2
  - id: attack-stats-tags--rx-3
  - id: attack-stats-tags--rx-4
- id: go-iot-utls-ddos-bot
  desc: Go IoT DDoS bot with TLS fingerprint spoofing
  crit: hostile
  conf: 0.97
  for: [elf]
  platforms: [linux]
  all:
  - id: objectives/impact/dos/attack/flood::udp-flood
  - id: micro-behaviors/communications/http/tls::go-utls-fingerprint-customization
  - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
  - id: micro-behaviors/crypto/asymmetric/curve25519::x25519-key-exchange-term
  any:
  - id: metadata/arch/iot::mips
  - id: micro-behaviors/process/create/workers::worker-pool
  - id: micro-behaviors/communications/http/message::http2-preface
  needs: 2
