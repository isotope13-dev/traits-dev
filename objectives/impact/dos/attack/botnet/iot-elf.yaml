defaults:
  platforms: [linux, android]
  for: [elf]
  mbc: B0042
  attack: T1499

traits:
  - id: iot-attack-command-cluster
    desc: IoT bot multi-vector attack command cluster
    crit: suspicious
    conf: 0.98
    count_min: 3
    if:
      type: text
      regex: '\b(STOP_ALL|UDP_FLOOD|SYN_BYPASS|HTTP2_FLOOD|BROADCAST)\b'

  - id: source-engine-query-payload
    desc: Source Engine query payload
    crit: suspicious
    conf: 0.94
    attack: T1498.001
    if:
      type: text
      substr: TSource Engine Query
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context

  - id: source-engine-query-marker
    desc: Source Engine query-family payload marker
    crit: suspicious
    conf: 0.86
    attack: T1498.001
    if:
      type: text
      substr: TSource Engine
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context

  - id: source-engine-query-xor18-a
    desc: XOR-obfuscated Source Engine query
    crit: component
    conf: 0.95
    attack: T1498.001
    if:
      type: hex
      section: .rodata
      pattern: 4C 4B 77 6D 6A 7B 7D 38 5D 76
  - id: source-engine-query-xor18-b
    desc: XOR-obfuscated Source Engine query
    crit: component
    conf: 0.95
    attack: T1498.001
    if:
      type: hex
      section: .rodata
      pattern: 71 76 7D 38 49 6D 7D 6A 61

  - id: xor29-source-engine-query-payload
    desc: XOR-0x29-obfuscated Source Engine query payload
    crit: suspicious
    conf: 0.96
    attack: T1498.001
    if:
      type: hex
      section: .rodata
      pattern: 7D 7A 46 5C 5B 4A 4C 09 6C 47 4E 40 47 4C 09 78 5C 4C 5B 50
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context

  - id: xor07-source-engine-query-payload
    desc: XOR-0x07-obfuscated Source Engine query payload
    crit: suspicious
    conf: 0.96
    attack: T1498.001
    if:
      type: hex
      section: .rodata
      pattern: 53 54 68 72 75 64 62 27 42 69 60 6E 69 62 27 56 72 62 75 7E
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context

  - id: target-port-duration-format
    desc: Target port duration command format
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "%15s %63s %d %d"

  - id: stop-attack-command
    desc: STOP command with attack parser
    crit: component
    conf: 0.75
    if:
      type: text
      regex: 'STOP.{0,200}%15s %63s %d %d|%15s %63s %d %d.{0,200}STOP'

composite_rules:
  - id: iot-multivector-ddos-bot
    desc: IoT bot with multi-vector DDoS tasking
    crit: hostile
    conf: 0.99
    attack: T1498.001
    all:
      - id: iot-attack-command-cluster
      - type: trait
        id: objectives/command-and-control/channel/irc/bot::attack-udp
      - type: trait
        id: micro-behaviors/communications/http/message::http2-preface

  - id: source-query-anti-analysis-ddos-bot
    desc: Source query payload with debugger and CPU checks
    crit: hostile
    conf: 0.98
    attack: T1498.001
    all:
      - id: source-engine-query-payload
      - id: micro-behaviors/os/sysinfo/platform/kernel::ptrace-debugger
      - id: micro-behaviors/os/sysinfo/cpu::sys-devices
    any:
      - id: micro-behaviors/fs/proc/system::system-stat
      - id: micro-behaviors/fs/proc/system::system-stat-xor07
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context

  - id: source-marker-iot-process-profile
    desc: Source marker with IoT profiling and process launch
    crit: hostile
    conf: 0.98
    attack: T1498.001,T1082,T1106
    mbc: B0030
    all:
      - id: source-engine-query-marker
      - id: micro-behaviors/os/sysinfo/cpu::sys-devices
      - id: micro-behaviors/fs/proc/system::system-stat
      - id: micro-behaviors/process/create/direct::arm-eabi-execve
      - id: micro-behaviors/process/create/direct::arm-eabi-clone
      - id: micro-behaviors/os/sysinfo/platform/kernel::arm-eabi-uname
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context

  - id: source-query-arm-cipher-ddos-bot
    desc: Static ARM Source-query bot with stream-cipher support
    crit: hostile
    conf: 0.99
    attack: T1498.001,T1027
    mbc: B0030
    all:
      - id: source-engine-query-marker
      - id: metadata/arch/iot::arm
      - id: metadata/binary/linking/static::elf-needed-libs-zero
      - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context

  - id: source-query-mips-syscall-ddos-bot
    desc: Static MIPS Source-query bot using raw syscalls
    crit: hostile
    conf: 0.99
    attack: T1498.001,T1106
    mbc: B0030
    all:
      - id: source-engine-query-marker
      - id: metadata/arch/iot::mips
      - id: metadata/binary/linking/static::elf-needed-libs-zero
    any:
      - id: micro-behaviors/os/syscall/raw::mips-direct-syscall-instruction-be
      - id: micro-behaviors/os/syscall/raw::mips-direct-syscall-instruction-le
    needs: 1
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context

  - id: source-query-static-pty-iot-bot
    desc: Static embedded Source-query bot with PTY and entropy access
    crit: hostile
    conf: 0.99
    attack: T1498.001,T1059
    mbc: B0030
    all:
      - id: source-engine-query-marker
      - id: metadata/binary/linking/static::elf-needed-libs-zero
      - id: micro-behaviors/fs/path/device/terminal::dev-ptmx
      - id: micro-behaviors/os/random/crypto::urandom
    any:
      - id: metadata/arch/iot::arm
      - id: metadata/arch/iot::mips
    needs: 1
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context

  - id: source-engine-query-xor18
    desc: XOR-obfuscated Source Engine query
    crit: suspicious
    conf: 0.97
    attack: T1498.001
    all:
      - id: source-engine-query-xor18-a
      - id: source-engine-query-xor18-b

  - id: iot-ddos-attack-vector-set
    desc: IoT bot DDoS vector set
    crit: suspicious
    conf: 0.96
    any:
      - id: source-engine-query-payload
      - id: source-engine-query-xor18
      - id: xor07-source-engine-query-payload
      - id: xor29-source-engine-query-payload
      - id: micro-behaviors/communications/http/message::http2-preface
      - id: objectives/impact/dos/amplification::amplification-payload-common-any
    needs: 2

  # A DDoS vector set paired with a Mirai credential table and a raw-IP
  # endpoint identifies an IoT bot, rather than a game/networking client that
  # merely carries one protocol marker.
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: mirai-iot-ddos-bot
    desc: Mirai IoT bot with DDoS and raw-IP control
    crit: hostile
    conf: 0.99
    attack: "T1110.001,T1498.001,T1105"
    mbc: B0030
    all:
      - id: objectives/lateral-movement/brute-force/iot-creds::mirai-credential-access
      - id: iot-ddos-attack-vector-set
      - id: micro-behaviors/communications/ip/literal::http-ip-url

  - id: persistent-mips-source-query-bot
    desc: Persistent MIPS IoT bot with encoded Source-query flood payload
    crit: hostile
    conf: 0.99
    attack: T1498.001,T1543.002,T1059.004
    mbc: B0030
    platforms: [linux]
    all:
      - id: metadata/arch/iot::mips
      - id: objectives/persistence/system/service/systemd::native-unit-authoring
    any:
      - id: xor29-source-engine-query-payload
      - id: xor07-source-engine-query-payload
      - id: source-engine-query-payload

  - id: persistent-arm-source-query-bot
    desc: Persistent ARM IoT bot with encoded Source-query flood payload
    crit: hostile
    conf: 0.99
    attack: T1498.001,T1543.002,T1059.004
    mbc: B0030
    platforms: [linux]
    all:
      - id: xor29-source-engine-query-payload
      - id: metadata/arch/iot::arm
      - id: micro-behaviors/communications/socket/syscall::arm-direct-network-syscalls
      - id: objectives/persistence/system/service/systemd::native-unit-authoring

  - id: xor18-source-query-shell-ddos-bot
    desc: XOR18 Source-query shell DDoS bot
    crit: hostile
    conf: 0.98
    all:
      - id: source-engine-query-xor18
      - id: micro-behaviors/process/create/shell/encoded::unix-shell-paths-xor18
      - id: objectives/anti-static/obfuscation/encoding/xor::xor18-watchdog-paths
  - id: xor18-source-query-covert-shell-ddos-bot
    desc: XOR18 Source-query covert shell DDoS bot
    crit: hostile
    conf: 0.97
    all:
      - id: source-engine-query-xor18
      - id: micro-behaviors/fs/path/device/special::dev-misc-watchdog-xor18
    any:
      - id: objectives/command-and-control/channel/covert::covert-protocol-markers
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text

  - id: ddos-bot-bandwidth-tiering
    desc: DDoS bot bandwidth tiering logic
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/discovery/system/fingerprint/network::speedtest-bandwidth-profiling
    any:
      - id: source-engine-query-payload
      - id: source-engine-query-xor18
      - id: objectives/impact/dos/gaming-platform::gaming-platform-ddos
      - id: micro-behaviors/os/firewall/iptables::iptables-accept-dport

  - id: doh-backed-iot-ddos-bot
    desc: DoH-backed IoT DDoS bot
    crit: hostile
    conf: 0.97
    all:
      - id: iot-ddos-attack-vector-set
      - id: micro-behaviors/communications/dns/doh::doh-wireformat-client

  - id: rest-c2-iot-ddos-command-parser
    desc: REST C2 IoT DDoS command parser
    crit: hostile
    conf: 0.96
    all:
      - id: target-port-duration-format
      - id: objectives/command-and-control/botnet/iot::bot-heartbeat-endpoint
      - id: objectives/command-and-control/botnet/iot::bot-command-poll-endpoint
    any:
      - id: stop-attack-command

  - id: staged-iot-ddos-bot
    desc: IoT DDoS bot with direct-IP payload staging
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/botnet/network-device::multi-fetch-multi-arch-dropper
    any:
      - id: iot-ddos-attack-vector-set
      - id: objectives/impact/dos/gaming-platform::gaming-platform-ddos
      - id: objectives/command-and-control/beacon/network/http::direct-http-c2-ip-url
      - id: objectives/command-and-control/dropper/delivery/download::shell-silent-hardcoded-download-staging
    needs: 3
