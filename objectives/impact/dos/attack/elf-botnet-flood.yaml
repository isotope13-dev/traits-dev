defaults:
  platforms: [linux, unix, android]
  for: [elf]
  mbc: B0042
  attack: T1499
traits:
  - id: pget-method
    desc: PGET attack mode token
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: PGET
  - id: udpraw-mode
    desc: UDPRAW attack mode token
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: UDPRAW
  - id: sendhttphex-symbol
    desc: HTTP hex flood function
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: SendHTTPHex
  - id: sendhttptwo-symbol
    desc: Secondary HTTP flood function
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: sendHTTPtwo
  - id: random-target-ip
    desc: Random target IP generator
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: getRandomIP
  - id: useragent-pool-symbol
    desc: User-Agent pool symbol
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: useragents
composite_rules:
  - id: http-flood-bot-functions
    desc: HTTP flood bot function cluster
    crit: suspicious
    conf: 0.95
    any:
      - id: pget-method
      - id: sendhttphex-symbol
      - id: sendhttptwo-symbol
      - id: useragent-pool-symbol
      - id: micro-behaviors/communications/http/request::user-agent-header
    needs: 3
  - id: multi-vector-bot-flooder
    desc: Multi-vector botnet flood capability
    crit: hostile
    conf: 0.98
    all:
      - id: http-flood-bot-functions
      - id: udpraw-mode
      - id: random-target-ip
