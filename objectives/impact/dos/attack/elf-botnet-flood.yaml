defaults:
  platforms: [unix, android]
  for: [elf]
  mbc: B0042
  attack: T1499

traits:
  - id: attack-command-prefix
    desc: Attack tasking command prefix
    crit: component
    conf: 0.96
    if:
      type: hex
      section: .rodata
      pattern: "41 54 54 41 43 4B 3A 00"

  - id: attack-target-format
    desc: Attack target parser format
    crit: component
    conf: 0.92
    if:
      type: text
      exact: "%s %s %d %d"

  - id: attack-thread-symbol
    desc: Attack thread function symbol
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: attack_thread

  - id: start-attack-symbol
    desc: Attack dispatcher function symbol
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: start_attack

  - id: zerobot-v2-user-agent
    desc: ZeroBot flood User-Agent
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "User-Agent: ZeroBot/V2"

  - id: cloudflare-mode-token
    desc: Cloudflare flood mode token
    crit: component
    conf: 0.88
    if:
      type: text
      exact: CLOUDFLARE

  - id: fivem-mode-token
    desc: FiveM flood mode token
    crit: component
    conf: 0.88
    if:
      type: text
      exact: FIVEM

  - id: discord-mode-token
    desc: Discord flood mode token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: DISCORD

  - id: pget-method
    desc: PGET attack mode token
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: PGET

  - id: udpraw-mode
    desc: UDPRAW attack mode token
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: UDPRAW

  - id: sendhttphex-symbol
    desc: HTTP hex flood function
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: SendHTTPHex

  - id: sendhttptwo-symbol
    desc: Secondary HTTP flood function
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: sendHTTPtwo

  - id: random-target-ip
    desc: Random target IP generator
    crit: suspicious
    conf: 0.88
    if:
      type: symbol
      exact: getRandomIP

  - id: useragent-pool-symbol
    desc: User-Agent pool symbol
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      exact: useragents

  - id: vse-attack-symbol
    desc: Valve Source Engine attack function
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: vseattack

  - id: send-stdhex-symbol
    desc: SendSTDHEX flood function
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      exact: SendSTDHEX

  - id: send-udp-attack-symbol
    desc: SendUDP attack function
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      exact: SendUDP

  - id: init-connection-symbol
    desc: initConnection C2 setup
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      exact: initConnection

  - id: http-stomp-attack-name
    desc: HTTPSTOMP attack vector name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: HTTPSTOMP

  - id: cloudflare-chk-captcha-bypass
    desc: Cloudflare chk_captcha bypass URI
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /cdn-cgi/l/chk_captcha
  - id: udp-h-attack-name
    desc: UDPH botnet attack vector name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: UDPH

composite_rules:
  - id: android-flood-tasking-surface
    desc: Android flood tasking surface
    crit: suspicious
    conf: 0.97
    needs: 5
    any:
      - id: attack-command-prefix
      - id: attack-target-format
      - id: attack-thread-symbol
      - id: start-attack-symbol
      - id: zerobot-v2-user-agent
      - id: cloudflare-mode-token
      - id: fivem-mode-token
      - id: discord-mode-token

  - id: android-threaded-ddos-bot
    desc: Android threaded DDoS bot
    crit: hostile
    conf: 0.98
    all:
      - id: android-flood-tasking-surface
      - id: micro-behaviors/communications/socket/send::sendto-symbol
      - id: micro-behaviors/process/threading/concurrency::pthread
    any:
      - id: micro-behaviors/communications/http/request/client::user-agent-header
      - id: micro-behaviors/communications/socket/connect::connect

  - id: http-flood-bot-functions
    desc: HTTP flood bot function cluster
    crit: suspicious
    conf: 0.95
    any:
      - id: pget-method
      - id: sendhttphex-symbol
      - id: sendhttptwo-symbol
      - id: useragent-pool-symbol
      - id: micro-behaviors/communications/http/request/client::user-agent-header
    needs: 3

  - id: multi-vector-bot-flooder
    desc: Multi-vector botnet flood capability
    crit: hostile
    conf: 0.98
    all:
      - id: http-flood-bot-functions
      - id: udpraw-mode
      - id: random-target-ip

  - id: gafgyt-style-attack-toolkit
    desc: Gafgyt-style multi-vector attack toolkit
    crit: hostile
    conf: 0.97
    needs: 3
    any:
      - id: vse-attack-symbol
      - id: send-stdhex-symbol
      - id: send-udp-attack-symbol
      - id: sendhttphex-symbol
      - id: sendhttptwo-symbol
      - id: init-connection-symbol
      - id: http-stomp-attack-name
      - id: cloudflare-chk-captcha-bypass

  - id: gafgyt-http-attack-set
    desc: Gafgyt-style HTTP attack command set
    crit: hostile
    conf: 0.99
    attack: T1498.001
    all:
      - id: http-stomp-attack-name
      - id: udp-h-attack-name
      - id: cloudflare-chk-captcha-bypass

  - id: udp-c2-flood-bot-symbol-cluster
    desc: UDP flood bot C2 symbol cluster
    crit: hostile
    conf: 0.97
    all:
      - id: send-udp-attack-symbol
      - id: init-connection-symbol
      - id: useragent-pool-symbol
    any:
      - id: random-target-ip
      - id: objectives/impact/dos/attack::source-engine-query-payload
      - id: objectives/impact/dos/gaming-platform::source-query-flood-handler

  - id: c2-tasked-ddos-bot-daemon
    desc: C2 tasked DDoS bot daemon
    crit: hostile
    conf: 0.98
    all:
      - id: gafgyt-style-attack-toolkit
      - id: objectives/command-and-control/botnet/iot::ping-pong-keepalive
      - id: micro-behaviors/process/daemonize/detach::fork-new-session
