defaults:
  platforms:
    - macos
    - ios
    - linux
    - unix
    - android
  for:
    - macho
    - elf
traits:
  - id: target-addr
    desc: References targetAddr (Go DDoS pattern)
    crit: component
    conf: 0.7
    if:
      type: text
      word: targetAddr
  - id: packets-sent
    desc: References packetsSent counter (Go DDoS
    crit: component
    conf: 0.7
    if:
      type: text
      word: packetsSent
  - id: target-scheme
    desc: References targetScheme (Go DDoS pattern)
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: targetScheme
    unless:
      - type: text
        substr: checkPseudos
composite_rules:
  - id: go-ddos-indicators
    desc: Multiple Go-based DDoS indicators
    crit: suspicious
    size_max: 5000000
    all:
      - id: target-addr
      - id: packets-sent
      - id: target-scheme
