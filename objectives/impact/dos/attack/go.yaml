defaults:
  platforms:
    - macos
    - ios
    - linux
    - unix
    - android
  for:
    - macho
    - elf
traits:
  - id: target-addr
    desc: References targetAddr (Go DDoS pattern)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: targetAddr
  - id: packets-sent
    desc: References packetsSent counter (Go DDoS
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: packetsSent
  - id: target-scheme
    desc: References targetScheme (Go DDoS pattern)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: targetScheme
composite_rules:
  - id: go-ddos-indicators
    desc: Multiple Go-based DDoS indicators
    crit: suspicious
    all:
      - id: target-addr
      - id: packets-sent
      - id: target-scheme
