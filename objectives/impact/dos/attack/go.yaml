defaults:
  platforms:
    - ios
    - unix
    - android
  for:
    - macho
    - elf
traits:
  - id: attack-store-type
    desc: Go attack store type
    crit: component
    conf: 0.9
    if:
      type: text
      exact: '*main.AttackStore'
  - id: execution-map-types
    desc: Go attack execution maps
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: 'main\.(External|Internal)Execution'
  - id: attack-stats-tags
    desc: Bot flood attack stats tags
    crit: suspicious
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: '\[(SSHHR|TCPHR|UDPHR|STDHEX|FSP|NWS|PAZ)\] attk stats'
  - id: unknown-attack-method
    desc: Unknown attack method error
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: Unknown attack method id has been passed
  - id: target-addr
    desc: References targetAddr (Go DDoS pattern)
    crit: component
    conf: 0.7
    if:
      type: text
      word: targetAddr
  - id: packets-sent
    desc: References packetsSent counter (Go DDoS
    crit: component
    conf: 0.7
    if:
      type: text
      word: packetsSent
  - id: target-scheme
    desc: References targetScheme (Go DDoS pattern)
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: targetScheme
    unless:
      - type: text
        substr: checkPseudos
  - id: connect-symbol
    desc: Go bot connect handler symbol
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: main.Connect
  - id: await-commands-symbol
    desc: Go bot command loop symbol
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: main.AwaitCommands
  - id: http-get-command
    desc: HTTP GET flood command token
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: http-get
  - id: http-post-command
    desc: HTTP POST flood command token
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: http-post
  - id: simple-get-symbol
    desc: Go HTTP GET flood handler symbol
    crit: suspicious
    conf: 0.96
    if:
      type: symbol
      exact: /root/bot/Methods.SimpleGet
  - id: simple-post-symbol
    desc: Go HTTP POST flood handler symbol
    crit: suspicious
    conf: 0.96
    if:
      type: symbol
      exact: /root/bot/Methods.SimplePost
  - id: bot-connected-banner
    desc: Bot connection banner string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: "[BOT] | Connected"
composite_rules:
  - id: go-bot-attack-dispatch
    desc: Go bot DDoS attack dispatcher
    crit: hostile
    conf: 0.98
    all:
      - id: attack-store-type
      - id: execution-map-types
      - id: attack-stats-tags
      - id: unknown-attack-method
  - id: go-ddos-indicators
    desc: Multiple Go-based DDoS indicators
    crit: suspicious
    all:
      - id: target-addr
      - id: packets-sent
      - id: target-scheme
  - id: http-flood-command-bot
    desc: Go HTTP flood bot command loop
    crit: hostile
    conf: 0.98
    all:
      - id: connect-symbol
      - id: await-commands-symbol
      - id: simple-get-symbol
      - id: simple-post-symbol
      - id: bot-connected-banner
    any:
      - id: http-get-command
      - id: http-post-command
