composite_rules:
  - any:
      - id: micro-behaviors/communications/http/user-agent/
    conf: 0.8
    crit: notable
    desc: Large list of browser User-Agents
    id: ua-list-large
  - any:
      - id: attack-metrics-a
      - id: attack-metrics-b
    conf: 0.7
    crit: notable
    desc: Performance metrics typical of DDoS
    id: attack-metrics
  - any:
      - id: syn-flood
      - id: udp-flood
      - id: http-flood
      - id: icmp-flood
      - id: slowloris-flood
      - id: post-flood
      - id: get-flood
      - id: dns-flood
      - id: memcached-flood
    conf: 0.8
    crit: notable
    desc: Specific flood attack types
    id: flood-types
  - any:
      - id: attack-telemetry-a1
      - id: attack-telemetry-a2
      - id: attack-telemetry-b1
      - id: attack-telemetry-b2
    conf: 0.7
    crit: notable
    desc: Telemetry counters for attack progress
    id: attack-telemetry
  - any:
      - id: ddos-attack-ddos
      - id: ddos-attack-syn
      - id: ddos-attack-target-mode-type
    conf: 0.7
    crit: notable
    desc: Additional DDoS attack terminology
    id: ddos-attack-terminology
  - any:
      - id: flood-types
      - id: attack-metrics
    crit: notable
    desc: DDoS-specific terminology detected
    id: ddos-terminology-comp
  - any:
      - id: micro-behaviors/process/create/workers/
      - id: attack-telemetry
    crit: notable
    desc: DDoS-specific operational mechanics detected
    id: ddos-mechanics
  - any:
      - id: micro-behaviors/communications/http/post/
      - id: micro-behaviors/communications/http/request::request
      - id: micro-behaviors/communications/http/request::request-python
    conf: 0.4
    crit: component
    desc: HTTP request methods detected
    id: http-methods
  - all:
      - id: ddos-terminology-comp
      - id: ddos-mechanics
      - id: micro-behaviors/communications/socket/create/
    conf: 0.9
    crit: suspicious
    desc: Probable DDoS attack tool
    id: ddos-capability
  - all:
      - id: ua-list-large
      - id: http-methods
      - id: ddos-terminology-comp
    conf: 0.95
    crit: suspicious
    desc: Layer 7 (HTTP) DDoS tool
    id: layer7-ddos
  - all:
      - id: micro-behaviors/communications/benchmark/http::ab-high-volume-argv
      - id: micro-behaviors/process/create/thread::python-background-worker
      - id: micro-behaviors/process/create/subprocess::run-content
    any:
      - id: micro-behaviors/communications/benchmark/http::ab-host-header-argv
      - id: micro-behaviors/communications/http/headers::headers-encoding
    conf: 0.95
    crit: hostile
    desc: Threaded ApacheBench HTTP flood
    id: threaded-apachebench-flood
defaults:
  attack: T1498
  for: [scripts, binaries]
  mbc: B0009
  platforms:
    - unix
    - windows
traits:
  - conf: 0.7
    crit: notable
    desc: Performance metrics typical of DDoS
    id: attack-metrics-a
    if:
      case_insensitive: true
      regex: \b[0-9]+(?:\.[0-9]+)?(?:\s+|[=:]\s*)(pps|bps|qps)\b
      type: text
  - conf: 0.7
    crit: notable
    desc: Performance metrics typical of DDoS
    id: attack-metrics-b
    if:
      case_insensitive: true
      regex: \b(pps|bps|qps)\s*[=:]\s*[0-9]+
      type: text
  - conf: 0.8
    crit: notable
    desc: SYN flood terminology
    id: syn-flood
    if:
      regex: '[sS][yY][nN][_-]?flood'
      type: text
  - conf: 0.8
    crit: notable
    desc: UDP flood terminology
    id: udp-flood
    if:
      regex: '[uU][dD][pP][_-]?[fF]lood'
      type: text
    unless:
      - id: metadata/package::bitdefender-ecnet-telemetry
  - conf: 0.8
    crit: notable
    desc: HTTP flood terminology
    id: http-flood
    if:
      regex: '[hH][tT][tT][pP][_-]?flood'
      type: text
  - conf: 0.8
    crit: notable
    desc: ICMP flood terminology
    id: icmp-flood
    if:
      regex: '[iI][cC][mM][pP][_-]?flood'
      type: text
  - conf: 0.8
    crit: notable
    desc: Slowloris flood terminology
    id: slowloris-flood
    if:
      regex: (?i)slowloris[_-]?flood
      type: text
  - conf: 0.8
    crit: notable
    desc: POST flood terminology
    id: post-flood
    if:
      regex: (?i)post[_-]?flood
      type: text
  - conf: 0.8
    crit: notable
    desc: GET flood terminology
    id: get-flood
    if:
      regex: (?i)get[_-]?flood
      type: text
  - conf: 0.8
    crit: notable
    desc: DNS flood terminology
    id: dns-flood
    if:
      regex: (?i)dns[_-]?flood
      type: text
  - conf: 0.8
    crit: notable
    desc: Memcached flood terminology
    id: memcached-flood
    if:
      regex: (?i)memcached[_-]?flood
      type: text
  - conf: 0.7
    crit: notable
    desc: DDOS attack terminology
    id: ddos-attack-ddos
    if:
      regex: (?i)ddos[_-]?attack
      type: text
  - conf: 0.7
    crit: notable
    desc: SYN attack terminology
    id: ddos-attack-syn
    if:
      regex: (?i)syn[_-]?attack
      type: text
  - conf: 0.7
    crit: notable
    desc: Attack target/mode/type terminology
    id: ddos-attack-target-mode-type
    if:
      regex: (?i)attack[_-]?(target|mode|type)
      type: text
  - conf: 0.7
    crit: notable
    desc: Telemetry counters for attack progress
    id: attack-telemetry-a1
    if:
      case_insensitive: true
      regex: \b(packets|requests)[_-](sent|total|count)\b
      type: text
    unless:
      - id: metadata/package::bitdefender-ecnet-telemetry
  - conf: 0.7
    crit: notable
    desc: Telemetry counters for attack progress
    id: attack-telemetry-a2
    if:
      case_insensitive: true
      regex: \b(bytes|payloads)[_-](sent|total|count)\b
      type: text
  - conf: 0.7
    crit: notable
    desc: Telemetry counters for attack progress
    id: attack-telemetry-b1
    if:
      case_insensitive: true
      regex: \b(packets|requests)[_-](success|fail)\b
      type: text
  - conf: 0.7
    crit: notable
    desc: Telemetry counters for attack progress
    id: attack-telemetry-b2
    if:
      case_insensitive: true
      regex: \b(bytes|payloads)[_-](success|fail)\b
      type: text
