defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1498.001

traits:
  - id: js-random-ip-generator-name
    desc: JavaScript random IP generator
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: "const generateRandomIP=()=>"

  - id: js-http-loop-target-binding
    desc: JavaScript HTTP loop target binding
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "const bR='https://www.axis.co.id'"

  - id: js-fetch-random-ip-closure
    desc: JavaScript fetch random IP closure
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "['_$Gdz9rK']:[bR,fetch,generateRandomIP]"

  - id: js-one-second-http-interval
    desc: JavaScript one second HTTP interval
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "setInterval(vmM_5e368e['rH'],0x3e8)"

composite_rules:
  - id: import-time-random-ip-http-loop
    desc: Import-time random IP HTTP loop
    crit: hostile
    conf: 0.97
    all:
      - id: js-random-ip-generator-name
      - id: js-http-loop-target-binding
      - id: js-fetch-random-ip-closure
      - id: js-one-second-http-interval
