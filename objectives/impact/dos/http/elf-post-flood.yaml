defaults:
  platforms: [unix]
  for: [elf]
  attack: T1499
  mbc: B0042
traits:
  - id: maxint-http-post-content-length
    desc: Maximum-length HTTP POST flood header
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: 'Content-Length: 2147483647'
      section: rodata
  - id: random-data-post-body
    desc: Random-data HTTP POST flood body
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: data=random_data
      section: rodata
composite_rules:
  - id: maxint-random-body-http-post-flood
    desc: Max-length random-body HTTP POST flood
    crit: hostile
    conf: 0.98
    all:
      - id: maxint-http-post-content-length
      - id: random-data-post-body
    any:
      - id: micro-behaviors/communications/http/post::post-request-line
      - id: micro-behaviors/communications/http/post::native-post-request-line
