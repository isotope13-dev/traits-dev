defaults:
  platforms: [openbsd, bsd, unix]
  for: [lua]
  attack: T1498

traits:
  - id: lua-curl-http-flood-loop
    desc: Lua curl HTTP flood loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: curl -s -o /dev/null -m 2

  - id: lua-nc-http-flood-loop
    desc: Lua nc HTTP flood loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: nc -w 1

composite_rules:
  - id: lua-openbsd-http-flood
    desc: Lua OpenBSD HTTP flood
    crit: hostile
    conf: 0.98
    all:
      - id: lua-curl-http-flood-loop
      - id: lua-nc-http-flood-loop

