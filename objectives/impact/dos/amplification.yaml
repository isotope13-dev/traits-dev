defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: dnssd-udp-service-probe
    desc: DNS-SD UDP service discovery tuple
    crit: notable
    conf: 0.84
    attack: T1046
    if:
      type: raw
      regex: _dns-sd.{0,12}_udp.{0,12}local
  - id: dnssd-hex-encoded-payload
    desc: DNS-SD query payload in hex escapes
    crit: notable
    conf: 0.85
    attack: T1046
    for: [source, scripts]
    if:
      type: text
      regex: \\x5F\\x64\\x6E\\x73.{0,30}\\x5F\\x75\\x64\\x70
  - id: amplification-payload-common
    desc: Common amplification attack payloads (Quake3, Valve, Half-Life)
    crit: suspicious
    if:
      type: raw
      regex: (?x)(\xFF){4}(getstatus|rules|TSource\sEngine\sQuery|\x55)
  - id: amplification-payload-common-chr
    desc: Amplification payload constructed with chr() sequence
    crit: suspicious
    if:
      type: raw
      regex: chr\(255\)(\s*\.\s*chr\(255\)){3}\s*\.\s*
  - id: amplification-payload-common-chr-suffix
    desc: Amplification payload suffix after chr() sequence
    crit: component
    if:
      type: raw
      regex: ("getstatus"|"rules"|"TSource\sEngine\sQuery"|chr\(85\))
  - id: gamespy-payloads
    desc: GameSpy amplification payloads
    crit: suspicious
    if:
      type: raw
      regex: (?x)\\\\status\\\\
  - id: gamespy-status-chr-payload
    desc: GameSpy status payload built via chr()
    crit: suspicious
    if:
      type: raw
      regex: chr\(115\)\s*\.\s*chr\(116\)\s*\.\s*chr\(97\)\s*\.\s*chr\(116\)
  - id: gamespy-cory-hex-payload
    desc: GameSpy CORY magic payload in hex
    crit: suspicious
    if:
      type: text
      substr: \xFE\xFD\x00CORY
  - id: gamespy-cory-chr-payload
    desc: GameSpy CORY magic payload built via chr()
    crit: suspicious
    if:
      type: raw
      regex: chr\(254\)\s*\.\s*chr\(253\)\s*\.\s*chr\(0\)\s*\.\s*chr\(67\)
composite_rules:
  - id: ssdp-service-discovery
    desc: SSDP paired with service discovery markers
    crit: suspicious
    conf: 0.88
    any:
      - id: dnssd-udp-service-probe
      - id: micro-behaviors/communications/http/request/ssdp::upnp-dial-service-urn
  - id: ssdp-reflection-probe
    desc: SSDP reflection/amplification probe
    crit: suspicious
    conf: 0.94
    attack: T1498
    all:
      - id: micro-behaviors/communications/http/request/ssdp::m-search
      - id: micro-behaviors/communications/http/request/ssdp::discover-header
      - id: micro-behaviors/communications/http/request/ssdp::broadcast-host
  - id: service-discovery-reflection
    desc: Service discovery probe for reflection
    crit: suspicious
    conf: 0.9
    attack: T1498
    all:
      - id: ssdp-reflection-probe
      - id: ssdp-service-discovery
  - id: amplification-payload-chr-full
    desc: Amplification payload constructed with chr() prefix and command suffix
    crit: suspicious
    all:
      - id: amplification-payload-common-chr
      - id: amplification-payload-common-chr-suffix
  - id: amplification-payload-common-any
    desc: Common amplification attack payloads (Quake3, Valve, Half-Life)
    crit: suspicious
    any:
      - id: amplification-payload-common
      - id: amplification-payload-chr-full
  - id: gamespy-payloads-any
    desc: GameSpy amplification payloads
    crit: suspicious
    any:
      - id: gamespy-payloads
      - id: gamespy-status-chr-payload
      - id: gamespy-cory-hex-payload
      - id: gamespy-cory-chr-payload
