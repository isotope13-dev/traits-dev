defaults:
  platforms: [unix]
  for: [swift]
  attack: T1499

traits:
  - id: swift-dos-fill-path
    desc: Swift DoS fill path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ".dos_fill_"

  - id: swift-repeating-data-write
    desc: Swift repeating data write
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'Data\s*\(\s*repeating:[\s\S]{0,180}data\.write'

composite_rules:
  - id: swift-disk-fill-loop
    desc: Swift disk fill loop
    crit: hostile
    conf: 0.97
    all:
      - id: swift-dos-fill-path
      - id: swift-repeating-data-write
