defaults:
  platforms: [unix]
  for: [php]
  attack: T1499

traits:
  - id: php-cpu-burn-workers
    desc: PHP CPU burn workers
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'while\(true\) \{ \\\$x = sin[\s\S]{0,260}proc_get_status'

  - id: php-disk-inode-pressure
    desc: PHP disk inode pressure
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.disk_fill[\s\S]{0,220}\.inode_pressure_'

  - id: php-destructive-cache-delete
    desc: PHP destructive cache delete
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'RecursiveDirectoryIterator[\s\S]{0,520}@unlink\(\$file->getPathname\(\)\)'
    unless:
      - type: path
        regex: 'tools[\\/]infection\.php$'

composite_rules:
  - id: php-resource-degradation
    desc: PHP resource degradation
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: php-cpu-burn-workers
      - id: php-disk-inode-pressure
      - id: php-destructive-cache-delete
