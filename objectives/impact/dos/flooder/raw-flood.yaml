defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: raw-flood-tool
    desc: Raw socket flooding tool detected
    crit: hostile
    conf: 0.9
    mbc: T1498
    attack: T1498
    all:
      - id: micro-behaviors/communications/socket/options::ip-hdrincl-option
      - id: micro-behaviors/communications/socket/raw::raw
      - id: micro-behaviors/communications/socket/send::send
    unless:
      - id: well-known/app/samba::samba-source-tree
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: threaded-raw-udp-packet-flooder
    desc: Threaded raw UDP packet flooder
    crit: hostile
    conf: 0.99
    attack: T1498.001
    mbc: B0042
    for: [elf]
    platforms: [unix]
    all:
      - id: objectives/impact/dos/udp::raw-udp-packet-flooder
      - id: micro-behaviors/process/threading/concurrency::pthread
