defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: raw-flood-tool
    desc: Raw socket flooding tool detected
    crit: hostile
    conf: 0.9
    mbc: T1498
    attack: T1498
    all:
      - id: micro-behaviors/communications/socket/options::ip-hdrincl-option
      - id: micro-behaviors/communications/socket/raw::raw
      - id: micro-behaviors/communications/socket/send::send
    unless:
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
