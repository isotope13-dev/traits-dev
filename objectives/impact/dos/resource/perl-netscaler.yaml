defaults:
  platforms: [netscaler, appliance, unix]
  for: [perl]
  attack: T1499.004

traits:
  - id: perl-degrade-fork-loop
    desc: Perl degrade fork loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'while \(time\(\) < \$end_time\)[\s\S]{0,120}fork\(\) and next'

  - id: perl-cpu-md5-loop
    desc: Perl CPU MD5 loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'sqrt\(\$i\) \* log\(\$i \+ 1\)[\s\S]{0,120}md5_hex'

  - id: perl-temp-junk-files
    desc: Perl temp junk files
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: .ns_degrade_

composite_rules:
  - id: perl-resource-degradation
    desc: Perl resource degradation
    crit: hostile
    conf: 0.98
    all:
      - id: perl-degrade-fork-loop
      - id: perl-cpu-md5-loop
    any:
      - id: perl-temp-junk-files
