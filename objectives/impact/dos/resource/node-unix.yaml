defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1499

traits:
  - id: node-cpu-burner-loop
    desc: Node CPU burner loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: while true; do dd if=/dev/zero

  - id: node-temp-disk-fill
    desc: Node temp disk fill
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.system_cache_data

  - id: node-fd-exhaust-files
    desc: Node fd exhaust files
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.fd_exhaust_

composite_rules:
  - id: node-resource-degradation
    desc: Node resource degradation
    crit: hostile
    conf: 0.98
    any:
      - id: node-cpu-burner-loop
      - id: node-temp-disk-fill
      - id: node-fd-exhaust-files
    needs: 2
