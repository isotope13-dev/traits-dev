defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1499

traits:
  - id: native-fork-cpu-spin
    desc: Native fork CPU spin
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'fork\s*\(\s*\)[\s\S]{0,260}(while\s*\(\s*1\s*\)|while\s*\(counter\s*<|cpu_spin)'

  - id: native-fork-worker-exhaust
    desc: Native fork worker exhaustion
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'fork\s*\(\s*\)[\s\S]{0,360}(10000000L|worker processes|_exit\s*\(\s*0\s*\))'
    unless:
      - type: text
        substr: death_test_use_fork

  - id: native-memory-pressure
    desc: Native memory pressure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'malloc\s*\([\s\S]{0,120}(64\s*\*\s*1024\s*\*\s*1024|1024\s*\*\s*1024)[\s\S]{0,220}memset'

  - id: native-temp-disk-fill
    desc: Native temp disk fill
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tmp/\.(degrade|syslog_cache|beacon_payload|impact_marker)'

  - id: native-disk-fill-write-call
    desc: Native disk fill write call
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'for\s*\([^)]{0,80}\)[\s\S]{0,160}write\s*\('

composite_rules:
  - id: native-temp-disk-fill-write
    desc: Native temp disk fill write
    crit: hostile
    conf: 0.97
    all:
      - id: native-temp-disk-fill
      - id: micro-behaviors/fs/file/write/direct::write

  - id: native-resource-degradation
    desc: Native resource degradation
    crit: hostile
    conf: 0.98
    any:
      - id: native-fork-cpu-spin
      - id: native-fork-worker-exhaust
      - id: native-memory-pressure
      - id: native-temp-disk-fill
      - id: native-disk-fill-write-call
    needs: 2
    unless:
      - id: metadata/package/testing/presence/harness::c-source-testsuite-directory
      - id: well-known/app/openssl::http-server-c-basename
      - id: well-known/lib/hpc

  - id: native-fork-worker-dos
    desc: Native fork worker DoS
    crit: hostile
    conf: 0.98
    all:
      - id: native-fork-worker-exhaust
      - id: micro-behaviors/process/fork/clone::c-fork-call
    unless:
      - id: metadata/package/testing/presence/harness::c-source-testsuite-directory
      - id: well-known/app/openssl::http-server-c-basename
      - id: well-known/lib/hpc
