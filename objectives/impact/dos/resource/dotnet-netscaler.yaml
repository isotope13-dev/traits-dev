defaults:
  platforms: [netscaler, appliance, unix]
  for: [csharp]
  attack: T1499.004

traits:
  - id: dotnet-cpu-exhaustion-task
    desc: .NET CPU exhaustion task
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'CPU exhaustion[\s\S]{0,220}Task\.Run'

  - id: dotnet-memory-pressure-task
    desc: .NET memory pressure task
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Memory pressure[\s\S]{0,220}new byte\[1024 \* 1024\]'

  - id: dotnet-http-flood-loop
    desc: .NET HTTP flood loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /dos-target/

composite_rules:
  - id: dotnet-resource-dos-patterns
    desc: .NET resource DoS patterns
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-cpu-exhaustion-task
      - id: dotnet-memory-pressure-task
    any:
      - id: dotnet-http-flood-loop
