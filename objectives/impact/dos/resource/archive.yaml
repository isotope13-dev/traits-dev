defaults:
  platforms: [unix, windows]
  for: [archive, archives, zip]
  attack: T1499.004

composite_rules:
  - id: archive-compression-bomb
    desc: Archive compression bomb
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/file/metrics::archive-high-compression-expansion
      - id: metadata/file/metrics::archive-many-compressed-members
      - id: metadata/file/metrics::archive-large-uncompressed-total
