defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]
  attack: T1499.004

traits:
  - id: cpu-load-prefixed-function-symbol
    desc: Function name suggests CPU loading/burning
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      regex: '(?i)(^|\.)(gen|load|burn)[A-Za-z0-9]{0,12}cpu$'
    unless:
      - id: metadata/binary/framework/
      - id: well-known/app/luau-lsp/
      - type: text
        substr: cpuid_is_vendor

  - id: cpu-load-suffixed-function-symbol
    desc: Function name suggests CPU loading/burning
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      regex: '(?i)(^|\.)cpu[A-Za-z0-9]{0,12}(load|burn)$'
    unless:
      - id: metadata/binary/framework/
      - id: well-known/app/luau-lsp/
      - type: text
        substr: cpuid_is_vendor

composite_rules:
  - id: cpu-load-symbol-binary
    desc: CPU load/burn function symbol pattern
    crit: suspicious
    conf: 0.9
    unless:
      - id: well-known/tool/sysadmin/alpine-packages/
    any:
      - id: cpu-load-prefixed-function-symbol
      - id: cpu-load-suffixed-function-symbol
  - id: goroutine-cpu-exhaustion-runtime
    desc: Go runtime CPU control symbols
    crit: suspicious
    conf: 0.72
    all:
      - id: cpu-load-symbol-binary
      - id: micro-behaviors/process/threading/concurrency::go-runtime-lock-osthread-binary
      - id: micro-behaviors/process/threading/concurrency::go-runtime-gomaxprocs-text
    unless:
      - id: well-known/tool/sysadmin/alpine-packages/
      - id: well-known/tool/detection/
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/binary/framework/
