defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]
  attack: T1499.004

traits:
  - id: cpu-load-prefixed-symbol-text
    desc: CPU load prefixed symbol
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)(gen|load|burn)[A-Za-z0-9]{0,12}cpu'
    unless:
      - id: metadata/binary/framework/

  - id: cpu-load-suffixed-symbol-text
    desc: CPU load suffixed symbol
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)cpu[A-Za-z0-9]{0,12}(load|burn)'
    unless:
      - id: metadata/binary/framework/

composite_rules:
  - id: cpu-load-symbol-binary
    desc: CPU load symbol binary
    crit: suspicious
    conf: 0.9
    any:
      - id: cpu-load-prefixed-symbol-text
      - id: cpu-load-suffixed-symbol-text
  - id: goroutine-cpu-exhaustion-runtime
    desc: Go runtime CPU control symbols
    crit: suspicious
    conf: 0.72
    all:
      - id: cpu-load-symbol-binary
      - id: micro-behaviors/process/threading/concurrency::go-runtime-lock-osthread-binary
      - id: micro-behaviors/process/threading/concurrency::go-runtime-gomaxprocs-text
    unless:
      - id: well-known/tool/detection/
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/binary/framework/
  - id: go-human-size-memory-pressure-binary
    desc: Go human-size memory pressure binary
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/mem/alloc/heap::go-alloc-symbol-binary
      - id: micro-behaviors/data/string/conversion::go-size-to-bytes-symbol-binary
    unless:
      - id: well-known/tool/detection/
