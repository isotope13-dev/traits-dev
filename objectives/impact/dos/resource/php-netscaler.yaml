defaults:
  platforms: [netscaler, appliance, unix]
  for: [php]
  attack: T1499.004

traits:
  - id: php-nslog-flood-file
    desc: PHP nslog flood file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'NS_LOG_DIR[\s\S]{0,140}ns_syslog_'

  - id: php-fd-flood-loop
    desc: PHP FD flood loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'file descriptor flood[\s\S]{0,180}\$max_fds = 200'

  - id: php-degrade-status-post
    desc: PHP degrade status POST
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/ops/degrade/status

composite_rules:
  - id: php-netscaler-resource-degrade
    desc: PHP NetScaler resource degrade
    crit: hostile
    conf: 0.98
    all:
      - id: php-nslog-flood-file
      - id: php-fd-flood-loop
    any:
      - id: php-degrade-status-post
