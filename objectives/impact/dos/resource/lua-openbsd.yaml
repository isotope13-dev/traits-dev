defaults:
  platforms: [openbsd, bsd, unix]
  for: [lua]
  attack: T1499

traits:
  - id: lua-cpu-hog-loop
    desc: Lua CPU hog loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: while true; do

  - id: lua-memory-pressure-dd
    desc: Lua memory pressure dd
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.mem_pressure

  - id: lua-io-pressure-dd
    desc: Lua IO pressure dd
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.io_pressure

composite_rules:
  - id: lua-openbsd-resource-exhaustion
    desc: Lua OpenBSD resource exhaustion
    crit: hostile
    conf: 0.98
    all:
      - id: lua-cpu-hog-loop
      - id: lua-memory-pressure-dd
      - id: lua-io-pressure-dd

