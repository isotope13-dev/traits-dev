defaults:
  platforms: [unix]
  for: [php]
  attack: T1499

traits:
  - id: php-dos-cpu-function
    desc: PHP DoS CPU function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: function dos_cpu

  - id: php-dos-memory-function
    desc: PHP DoS memory function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: function dos_memory

  - id: php-dos-network-flood
    desc: PHP DoS network flood
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: function dos_network_flood

  - id: php-dos-disk-fill
    desc: PHP DoS disk fill
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: function dos_disk_fill

composite_rules:
  - id: php-multi-resource-dos
    desc: PHP multi-resource DoS
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: php-dos-cpu-function
      - id: php-dos-memory-function
      - id: php-dos-network-flood
      - id: php-dos-disk-fill
