defaults:
  platforms: [qnx, unix]
  for: [java, class, java_class]
  attack: T1499

traits:
  - id: qnx-java-dos-method
    desc: QNX Java dosFlood method
    crit: component
    conf: 0.94
    if:
      type: text
      substr: dosFlood

  - id: qnx-java-checkin-http-flood
    desc: QNX Java checkin HTTP flood
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /api/v1/checkin HTTP/1.1

  - id: qnx-java-bytecode-flood-post
    desc: QNX Java bytecode flood POST
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 50 4f 53 54 20 2f 61 70 69 2f 76 31 2f 63 68 65 63 6b 69 6e 20 48 54 54 50 2f 31 2e 31

composite_rules:
  - id: qnx-java-checkin-resource-flood
    desc: QNX Java checkin resource flood
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-java-dos-method
      - id: qnx-java-checkin-http-flood
      - id: micro-behaviors/communications/http/header/connection::java-connection-keepalive-header

  - id: qnx-java-bytecode-resource-flood
    desc: QNX Java class resource flood
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: qnx-java-bytecode-flood-post
      - id: micro-behaviors/communications/http/header/connection::java-bytecode-connection-keepalive-header
