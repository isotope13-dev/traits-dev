defaults:
  platforms: [unix]
  for: [shell, go, python, javascript, typescript, rust, c, cpp]
  attack: T1499.004

traits:
  - id: shell-true-busy-loop
    desc: Shell no-op busy loop
    crit: suspicious
    conf: 0.92
    ref: sha256:08296de3be194910931847709d8b0909836ed01961bc98d638f8fa7ed43378a8
    if:
      type: text
      regex: 'while\s+true\s*;\s*do\s+true\s*;\s*done'

composite_rules:
  - id: container-daemon-busy-loop-crash
    desc: Container daemon crash with busy loop
    crit: hostile
    conf: 0.98
    ref: sha256:08296de3be194910931847709d8b0909836ed01961bc98d638f8fa7ed43378a8
    all:
      - id: shell-true-busy-loop
      - id: micro-behaviors/os/container/runtime::docker-daemon-cli-start
      - id: micro-behaviors/process/terminate/kill::go-process-kill-method

  - id: docker-run-resource-exhaustion
    desc: Repeated Docker run resource exhaustion
    crit: hostile
    conf: 0.96
    ref: sha256:08296de3be194910931847709d8b0909836ed01961bc98d638f8fa7ed43378a8
    all:
      - id: shell-true-busy-loop
      - id: micro-behaviors/os/container/runtime::docker-cli-run-create
      - id: micro-behaviors/os/container/runtime::docker-daemon-cli-start
