defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1499.004
traits:
  - id: go-cpu-load-name
    desc: Go CPU load function name
    crit: notable
    conf: 0.78
    if:
      type: symbol
      kind: function
      regex: '(?i)cpu.{0,12}load'
  - id: go-load-cpu-name
    desc: Go load CPU function name
    crit: notable
    conf: 0.78
    if:
      type: symbol
      kind: function
      regex: '(?i)load.{0,12}cpu'
  - id: go-cpu-burn-name
    desc: Go CPU burn function name
    crit: notable
    conf: 0.78
    if:
      type: symbol
      kind: function
      regex: '(?i)cpu.{0,12}burn'
composite_rules:
  - id: go-cpu-load-function-name
    desc: Go CPU load function name
    crit: notable
    conf: 0.78
    any:
      - id: go-cpu-load-name
      - id: go-load-cpu-name
      - id: go-cpu-burn-name
  - id: go-goroutine-cpu-exhaustion-source
    desc: Go goroutine CPU exhaustion
    crit: hostile
    conf: 0.98
    near_lines: 40
    all:
      - id: micro-behaviors/process/thread/create::go-goroutine-launch-call
      - id: micro-behaviors/process/threading/concurrency::go-runtime-gomaxprocs-call
      - id: micro-behaviors/process/threading/concurrency::go-runtime-lock-osthread-call
      - id: micro-behaviors/time/timing/delay::go-time-since-poll-loop
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
  - id: go-human-size-memory-pressure-source
    desc: Go human size memory pressure
    crit: suspicious
    conf: 0.9
    near_lines: 50
    all:
      - id: micro-behaviors/mem/alloc/heap::go-byte-slice-make
      - id: micro-behaviors/mem/alloc/heap::go-global-byte-slice
      - id: micro-behaviors/data/string/conversion::go-human-size-parser
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
