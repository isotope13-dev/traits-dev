defaults:
  platforms: [netscaler, appliance]
  for: [scripts, binaries, go, java, kotlin, csharp, swift]
  attack: T1499

traits:
  - id: netscaler-fork-bomb-token
    desc: NetScaler fork bomb token
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: (:|:|:|:|:)&

  - id: netscaler-dd-zero-source
    desc: NetScaler dd zero source
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: dd if=/dev/zero

  - id: netscaler-dos-fill-path
    desc: NetScaler dos fill path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/(var/)?tmp/\.dos_fill_.{1,40}'

  - id: netscaler-background-busyloop
    desc: NetScaler background busy loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "while true; do :; done"

  - id: netscaler-dos-context
    desc: NetScaler DoS context
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: NetScaler appliance

composite_rules:
  - id: netscaler-shell-fork-bomb
    desc: NetScaler shell fork bomb
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-fork-bomb-token
      - id: netscaler-dos-context

  - id: netscaler-disk-fill-dd
    desc: NetScaler disk fill dd
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-dd-zero-source
      - id: netscaler-dos-fill-path

  - id: netscaler-cpu-busyloop
    desc: NetScaler CPU busy loop
    crit: hostile
    conf: 0.97
    all:
      - id: netscaler-background-busyloop
      - id: netscaler-dos-context
