defaults:
  platforms: [unix]
  for: [binaries]
  attack: T1498.001
  mbc: B0033
traits:
  - id: udp-flood-psize-param
    desc: UDP flood payload-size parameter
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bpsize\s*='
  - id: udp-flood-srcport-param
    desc: UDP flood source-port parameter
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bsrcport\s*='
  - id: udp-flood-proto-param
    desc: UDP flood protocol parameter
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bproto\s*='
  - id: udp-flood-payload-param
    desc: UDP flood payload-bytes parameter
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bpayload\s*='
  - id: udp-flood-gport-param
    desc: UDP flood generation-port parameter
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\bgport\s*='
composite_rules:
  - id: configurable-udp-flood
    desc: Operator-tunable UDP flood interface
    crit: hostile
    conf: 0.96
    # Mirai-style attack-vector dispatcher exposes per-attack tunables
    # for packet size, source port, transport, payload bytes, and
    # generation port. Three of five together is a near-deterministic
    # signal of an embedded UDP flooder.
    needs: 3
    any:
      - id: objectives/impact/dos/udp-flood
