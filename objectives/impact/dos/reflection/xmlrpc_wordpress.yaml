defaults:
  platforms: [unix, windows]
  mbc: B0009
  attack: T1498
composite_rules:
  - id: xmlrpc-pingback-client
    desc: XML-RPC pingback flood client
    crit: suspicious
    conf: 0.97
    any:
      - id: micro-behaviors/communications/http/xmlrpc::php-xmlrpc-client
      - id: micro-behaviors/communications/http/xmlrpc::perl-xmlrpc-client
  - id: xmlrpc-concurrent-workers
    desc: Concurrent XML-RPC flood workers
    crit: suspicious
    conf: 0.95
    any:
      - id: micro-behaviors/process/control/signal::pcntl-fork
      - id: micro-behaviors/process/fork/clone::fork-call
      - id: micro-behaviors/communications/http/xmlrpc::perl-forkmanager
  - id: xmlrpc-php-sync-loop
    desc: PHP synchronized request counters
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/sync/semaphore::semaphore-ops
      - id: micro-behaviors/mem/create/shared::shared-memory-ops
  - id: wordpress-pingback-reflection-tool
    desc: WordPress XML-RPC reflection DDoS tool
    crit: hostile
    conf: 0.99
    all:
      - id: xmlrpc-pingback-client
      - id: xmlrpc-concurrent-workers
    any:
      - id: xmlrpc-php-sync-loop
      - id: micro-behaviors/communications/http/xmlrpc::perl-xmlrpc-worker-pool
  - id: php-xmlrpc-reflection-worker
    desc: PHP XML-RPC reflection worker
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/xmlrpc::php-xmlrpc-client
      - id: micro-behaviors/process/control/signal::pcntl-fork
      - id: xmlrpc-php-sync-loop
  - id: perl-xmlrpc-reflection-worker
    desc: Perl XML-RPC reflection worker
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/xmlrpc::pingback-method
      - id: micro-behaviors/communications/http/xmlrpc::perl-lwp-useragent
      - id: micro-behaviors/communications/http/xmlrpc::perl-http-post-helper
      - id: micro-behaviors/communications/http/xmlrpc::perl-forkmanager
