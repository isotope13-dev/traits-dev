# Go-specific Wiper/Destruction Patterns
# Detects destructive patterns in Go source code and compiled binaries
defaults:
  for: [go, elf, macho, pe]
  attack: "T1485"
traits:
  # Go secure wipe components
  - id: go-openfile-rdwr
    desc: Go os.OpenFile with O_RDWR
    crit: component
    if:
      type: string
      regex: 'os\.OpenFile\(.{0,50}os\.O_RDWR'
  - id: go-write-call
    desc: Go Write/WriteAt call
    crit: component
    if:
      type: string
      regex: '\.Write(At)?\('
  # Known Wiper Standards components
  - id: gutmann-ref
    desc: Gutmann wipe standard reference
    crit: component
    if:
      type: string
      substr: "Gutmann"
      case_insensitive: true
  - id: dod-5220-ref
    desc: DoD 5220.22-M wipe standard
    crit: component
    if:
      type: string
      substr: "DoD 5220.22-M"
  - id: vsitr-ref
    desc: VSITR wipe standard
    crit: component
    if:
      type: string
      substr: "VSITR"
  - id: us-dod-ref
    desc: US DoD wipe reference
    crit: component
    if:
      type: string
      substr: "US DoD"
  # Gutmann byte patterns (hex)
  - id: gutmann-hex-1
    desc: Gutmann pattern 92 49 24
    crit: component
    if:
      type: hex
      section: ".text"
      pattern: "92 49 24 92 49 24"
  - id: gutmann-hex-2
    desc: Gutmann pattern 49 24 92
    crit: component
    if:
      type: hex
      section: ".text"
      pattern: "49 24 92 49 24 92"
  - id: gutmann-hex-3
    desc: Gutmann pattern 24 92 49
    crit: component
    if:
      type: hex
      section: ".text"
      pattern: "24 92 49 24 92 49"
  - id: gutmann-hex-4
    desc: Gutmann pattern 6D B6 DB
    crit: component
    if:
      type: hex
      section: ".text"
      pattern: "6D B6 DB 6D B6 DB"
  - id: gutmann-hex-5
    desc: Gutmann pattern B6 DB 6D
    crit: component
    if:
      type: hex
      section: ".text"
      pattern: "B6 DB 6D B6 DB 6D"
  - id: gutmann-hex-6
    desc: Gutmann pattern DB 92 49
    crit: component
    if:
      type: hex
      section: ".text"
      pattern: "DB 92 49 DB 92 49"
  # Go filesystem walk components
  - id: go-filepath-walkdir
    desc: Go filepath.WalkDir
    crit: component
    if:
      type: string
      substr: "filepath.WalkDir"
composite_rules:
  - id: secure-wipe-pattern
    desc: Opens file for read-write and removes
    crit: notable
    conf: 0.8
    all:
      - id: go-openfile-rdwr
      - id: go-write-call
      - id: micro-behaviors/fs/file/delete::os-Remove-string
  - id: standards-reference
    desc: References to secure wiping standards
    crit: notable
    conf: 0.9
    any:
      - id: gutmann-ref
      - id: dod-5220-ref
      - id: vsitr-ref
      - id: us-dod-ref
  - id: gutmann-patterns
    desc: Uses Gutmann secure deletion overwrite
    crit: notable
    conf: 0.95
    needs: 5
    any:
      - id: gutmann-hex-1
      - id: gutmann-hex-2
      - id: gutmann-hex-3
      - id: gutmann-hex-4
      - id: gutmann-hex-5
      - id: gutmann-hex-6
  - id: go-walk-capability
    desc: Go filesystem walk capability
    crit: component
    any:
      - id: micro-behaviors/fs/file/operations::filepath-walk
      - id: go-filepath-walkdir
  - id: go-remove-capability
    desc: Go file removal capability
    crit: component
    any:
      - id: micro-behaviors/fs/file/delete::os-Remove-string
      - id: micro-behaviors/fs/file/delete::os-RemoveAll-string
  - id: mass-destruction
    desc: Recursively walks filesystem and deletes
    crit: suspicious
    conf: 0.85
    all:
      - id: go-walk-capability
      - id: go-remove-capability
  # Secure wiper detection
  - id: secure-wiper
    desc: Highly confident secure wiper
    crit: suspicious
    conf: 0.99
    mbc: "B0031"
    needs: 2
    any:
      - id: secure-wipe-pattern
      - id: mass-destruction
      - id: standards-reference
      - id: gutmann-patterns
