defaults:
  for: [text, shell, ruby, python, javascript, typescript, php, powershell, vbs, applescript]
traits:
  - id: userprofile-desktop-join-python
    desc: USERPROFILE Desktop path construction (Python)
    crit: notable
    conf: 0.8
    attack: T1485
    for: [python]
    if:
      type: raw
      substr: "os.path.join(os.environ['USERPROFILE'], 'Desktop')"
  # Wiper-specific target directory patterns (quoted paths indicate targeting)
  - id: target-git
    desc: Targets .git directory (version control)
    crit: notable
    conf: 0.85
    attack: T1485
    for: [javascript, typescript, python, shell]
    if:
      type: string
      regex: '["'']\./?\.git["'']'
  - id: target-node-modules
    desc: Targets node_modules directory
    crit: notable
    conf: 0.8
    attack: T1485
    for: [javascript, typescript]
    if:
      type: string
      regex: '["'']/?(\./)?node_modules["'']'
  - id: target-src
    desc: Targets source code directory
    crit: notable
    conf: 0.85
    attack: T1485
    for: [javascript, typescript, python]
    if:
      type: string
      regex: '["'']/?(\./)?src["'']'
  - id: target-vscode-dir
    desc: Targets .vscode directory
    crit: notable
    conf: 0.7
    attack: T1485
    for: [javascript, typescript]
    if:
      type: string
      regex: '["'']/?(\./)?\.(vscode)["'']'
  - id: target-idea-dir
    desc: Targets .idea directory
    crit: notable
    conf: 0.7
    attack: T1485
    for: [javascript, typescript]
    if:
      type: string
      regex: '["'']/?(\./)?\.(idea)["'']'
  # Environment-based conditional destruction components
  - id: env-check-js
    desc: Node.js environment variable comparison
    crit: component
    for: [javascript, typescript]
    if:
      type: string
      regex: 'process\.env\[[^\]]{1,50}\]\s*(!=|!==|==|===)'
  - id: node-env-ref
    desc: NODE_ENV environment variable
    crit: component
    for: [javascript, typescript]
    if:
      type: string
      substr: "NODE_ENV"
  # Android storage targeting components
  - id: android-sdcard
    desc: Android /sdcard path
    crit: component
    for: [javascript, typescript, shell]
    if:
      type: string
      substr: "/sdcard"
  - id: android-storage-emulated
    desc: Android /storage/emulated path
    crit: component
    for: [javascript, typescript, shell]
    if:
      type: string
      substr: "/storage/emulated"
  - id: android-dcim
    desc: Android DCIM folder
    crit: component
    for: [javascript, typescript, shell]
    if:
      type: string
      substr: "DCIM"
  - id: android-pictures
    desc: Android Pictures folder
    crit: component
    for: [javascript, typescript, shell]
    if:
      type: string
      substr: "Pictures"
  - id: android-downloads
    desc: Android Download folder
    crit: component
    for: [javascript, typescript, shell]
    if:
      type: string
      regex: '(/sdcard|/storage/emulated/[0-9]+).{0,40}/Downloads?(/|$)'
      # spawn-call - use micro-behaviors/process/create/shell/lang::spawn-call instead
composite_rules:
  # Helper composites
  - id: target-dev-dirs
    desc: Targets development directories
    crit: notable
    conf: 0.9
    attack: T1485
    for: [javascript, typescript, python]
    needs: 3
    any:
      - id: target-git
      - id: target-node-modules
      - id: target-src
      - id: target-vscode-dir
      - id: target-idea-dir
  - id: env-conditional
    desc: Environment-based conditional check
    crit: component
    for: [javascript, typescript]
    any:
      - id: env-check-js
      - id: node-env-ref
  - id: recursive-delete
    desc: Recursive directory deletion function
    crit: notable
    conf: 0.85
    attack: T1485
    for: [javascript, typescript, python, shell]
    any:
      - id: micro-behaviors/fs/directory/delete::rimraf
      - id: micro-behaviors/fs/directory/delete::rm-rf
      - id: micro-behaviors/fs/directory/delete::shutil-rmtree
      - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
  - id: conditional-destroy
    desc: Conditional destruction based on environment
    crit: suspicious
    conf: 0.95
    attack: T1485
    for: [javascript, typescript]
    size_max: 50000
    all:
      - id: env-conditional
    any:
      - id: micro-behaviors/fs/file/delete::fs-unlinkSync
      - id: micro-behaviors/fs/file/delete::fs-rmdir
      - id: micro-behaviors/fs/directory/delete::rimraf
  - id: android-storage-path
    desc: Android storage directory reference
    crit: component
    for: [javascript, typescript, shell]
    any:
      - id: android-sdcard
      - id: android-storage-emulated
  - id: android-media-dirs
    desc: Android media directories
    crit: component
    for: [javascript, typescript, shell]
    any:
      - id: android-dcim
      - id: android-pictures
      - id: android-downloads
  - id: shell-exec-capability
    desc: Shell execution capability
    crit: component
    for: [javascript, typescript, shell]
    any:
      - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
      - id: micro-behaviors/process/create/shell/lang::spawn-call
  - id: target-android-storage
    desc: Targets Android storage directories
    crit: suspicious
    conf: 0.95
    attack: T1485
    for: [javascript, typescript, shell]
    all:
      - id: android-storage-path
      - id: android-media-dirs
      - id: shell-exec-capability
  # Main wiper detection composites
  - id: mass-delete-action
    desc: Mass deletion action primitive
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/fs/directory/traverse::delete-unlink-node-py
      - id: micro-behaviors/fs/directory/traverse::delete-shell
  - id: target-vscode
    desc: Targets .vscode configuration directory
    crit: notable
    conf: 0.85
    attack: T1485
    for: [javascript, typescript]
    any:
      - id: target-vscode-dir
      - id: target-idea-dir
  - id: mass-delete
    desc: Mass file deletion pattern
    crit: suspicious
    conf: 0.85
    attack: T1485
    size_max: 40000
    for: [javascript, typescript, python, shell]
    all:
      - id: micro-behaviors/fs/directory/traverse::traverse-readdir-walk-find
      - id: mass-delete-action
  - id: python-desktop-mass-delete
    desc: Python desktop-targeted mass file deletion
    crit: hostile
    conf: 0.97
    attack: T1485
    for: [python]
    all:
      - id: micro-behaviors/os/env/vars/user-info::userprofile-var
      - id: userprofile-desktop-join-python
      - id: micro-behaviors/fs/directory/readdir::readdir-python
      - id: micro-behaviors/fs/file/delete::py-remove
      - id: micro-behaviors/data/control-flow/analysis::for-loop-content
  - id: protestware
    desc: Protestware pattern - conditional destruction
    crit: suspicious
    conf: 0.98
    attack: T1485
    mbc: B0031
    for: [javascript, typescript]
    all:
      - id: conditional-destroy
      - id: target-dev-dirs
  - id: with-callback
    desc: Wiper with HTTP callback
    crit: suspicious
    conf: 0.95
    attack: T1485
    mbc: B0031
    for: [javascript, typescript]
    all:
      - id: recursive-delete
      - id: micro-behaviors/communications/http/request/
