# Java Impact Traits
# Detects destructive/impact patterns in Java bytecode
# MBC: Impact
# ATT&CK: T1529 (System Shutdown/Reboot)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [class]
traits:
  # System control
  - id: reboot-string
    desc: System reboot command
    crit: suspicious
    conf: 0.85
    mbc: "B0029"
    attack: "T1529"
    if:
      type: string_value
      substr: "reboot "
  - id: shutdown-string
    desc: System shutdown command
    crit: suspicious
    conf: 0.85
    mbc: "B0029"
    attack: "T1529"
    if:
      type: string_value
      substr: "shutdown"
  - id: uninstall-string
    desc: Self-uninstall command
    crit: suspicious
    conf: 0.9
    mbc: "F0007"
    attack: "T1070.004"
    if:
      type: string_value
      substr: "uninstall"
  - id: disconnect-string
    desc: Disconnect from C2 command
    crit: notable
    conf: 0.8
    mbc: "B0030"
    if:
      type: string_value
      substr: "disconnect"
  # Process management
  - id: processes-string
    desc: Process listing command
    crit: notable
    conf: 0.8
    mbc: "E1057"
    attack: "T1057"
    if:
      type: string_value
      substr: "processes"
  # Persistence
  - id: startup-list-string
    desc: Startup persistence command
    crit: suspicious
    conf: 0.9
    mbc: "F0004"
    attack: "T1547"
    if:
      type: string_value
      substr: "startup-list"
  # Privilege escalation
  - id: chk-priv-string
    desc: Check privileges command
    crit: suspicious
    conf: 0.85
    mbc: "B0014"
    attack: "T1134"
    if:
      type: string_value
      substr: "chk-priv"
  - id: req-priv-string
    desc: Request elevated privileges command
    crit: suspicious
    conf: 0.9
    mbc: "B0014"
    attack: "T1134"
    if:
      type: string_value
      substr: "req-priv"
