defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: vxstart-label
    conf: 0.95
    crit: suspicious
    desc: Virus entry point label in ASM
    if:
      type: text
      word: vxstart
  - id: worm-binary-label
    conf: 0.95
    crit: suspicious
    desc: Embedded worm binary label in ASM
    if:
      type: text
      word: WormBinary
  - id: leave-virus-code-label
    conf: 0.95
    crit: suspicious
    desc: Virus exit label in ASM
    if:
      type: text
      word: LeaveVirusCode
  - id: virus-base-addr-label
    conf: 0.92
    crit: notable
    desc: Virus base address label
    if:
      type: raw
      regex: \b(VirusBase|virus.?base|AddrOfVirus)\b
  - id: host-entry-offset-label
    conf: 0.93
    crit: notable
    desc: Host entry point offset label
    if:
      type: text
      word: HostEntryOffset
