defaults:
  platforms:
    - unix
  for: [source]
traits:
  - id: elf-magic-check
    desc: Checks ELF magic before infection
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: "0x464c457f"
  - id: entrypoint-mask-low16
    desc: Masks ELF entrypoint to low16
    crit: suspicious
    conf: 0.94
    if:
      type: text
      exact: "andl $0xffff,e_entry(%edi)"
  - id: infected-prologue-check
    desc: Compares viral prologue for reinfection
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "check if file infected"
  - id: append-virus-body
    desc: Appends virus body at eof
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "write virus body to end"
  - id: append-host-entry-bytes
    desc: Stores original entry bytes
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "pushl $main-vircode                   # write org bytes"
  - id: sync-after-infection
    desc: Syncs infected file to disk
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "call 36*4(%ebp)"
composite_rules:
  - id: elf-appending-infector-source
    desc: ELF appending infector source
    crit: suspicious
    conf: 0.98
    attack: T1204
    mbc: E1011
    all:
      - id: elf-magic-check
      - id: infected-prologue-check
      - id: append-virus-body
      - id: append-host-entry-bytes
    any:
      - id: entrypoint-mask-low16
      - id: sync-after-infection
