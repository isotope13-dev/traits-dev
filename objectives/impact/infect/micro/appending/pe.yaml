# PE Appending Infection
defaults:
  platforms: [unix, windows, macos]
  for: [binaries, scripts]
traits:
  - id: last-section-append-logic-1
    desc: Find last section in PE header
    crit: component
    if:
      type: raw
      regex: 'SH_NumberOfSections\s*\]\s*dec\s+ecx'
  - id: last-section-append-logic-2
    desc: Access last section RawData
    crit: component
    if:
      type: raw
      regex: 'lea\s+esi,\[esi\+eax\]\s+lea\s+edx,\[esi\.SH_SizeOfRawData\]'
  - id: pe-virus-size-macro
    desc: Virus size macro
    crit: component
    if:
      type: raw
      regex: 'add\s+dword\s+\[edx\],TAILLE_VIRUS'
  - id: pe-infection-marker-guard-offset
    desc: Checks infection marker at PE offset
    crit: component
    if:
      type: raw
      regex: "cmp\\s+dword ptr\\s+\\[esi\\+4Ch\\],\\s+'[^']{4}'"
  - id: pe-infection-marker-write-offset
    desc: Writes infection marker at PE offset
    crit: suspicious
    if:
      type: raw
      regex: "mov\\s+dword ptr\\s+\\[edi\\+4Ch\\],\\s+'[^']{4}'"
  - id: pe-virus-copy-loop-source
    desc: Copies virus body into mapped PE
    crit: suspicious
    if:
      type: raw
      regex: 'mov\s+ecx,\s+VirusSize|rep\s+movsb'
  - id: pe-reloc-last-section-source
    desc: Relocation insert or last-section append
    crit: suspicious
    conf: 0.95
    for: [c]
    if:
      type: string_value
      substr: "reloc section inserter/last section appender"
  - id: pe-tail-padding-source
    desc: Random tail padding to evade scanners
    crit: suspicious
    conf: 0.94
    for: [c]
    if:
      type: string_value
      substr: "padded by random amounts to confuse tail scanners"
  - id: pe-checksum-fix-source
    desc: Recomputes PE checksum after infection
    crit: notable
    conf: 0.92
    for: [c]
    if:
      type: string_value
      substr: "correct file checksum without using imagehlp.dll"
  - id: pe-append-last-section-source
    desc: Appends code into last PE section
    crit: suspicious
    conf: 0.94
    for: [c]
    if:
      type: string_value
      substr: "append to last section"
  - id: pe-outside-image-guard-source
    desc: Skips files with overlay data
    crit: suspicious
    conf: 0.93
    for: [c]
    if:
      type: string_value
      substr: "no infect files with data outside of image"
  - id: openmp-runtime-marker
    desc: OpenMP runtime marker string
    crit: component
    conf: 0.6
    if:
      type: string_value
      substr: "OpenMP Runtime"
composite_rules:
  - id: pe-last-section-append
    desc: Appends code to the last section of a PE file
    crit: suspicious
    conf: 0.95
    attack: "T1542.001"
    all:
      - id: objectives/impact/infect/micro/appending::last-section-append-logic-1
      - id: objectives/impact/infect/micro/appending::last-section-append-logic-2
      - id: objectives/impact/infect/micro/appending::pe-virus-size-macro
    unless:
      - id: openmp-runtime-marker
  - id: pe-last-section-append-source
    desc: Appends virus body into mapped PE section
    crit: suspicious
    conf: 0.95
    all:
      - id: pe-infection-marker-write-offset
      - id: pe-virus-copy-loop-source
    any:
      - id: pe-infection-marker-guard-offset
      - id: micro-behaviors/fs/file/section::asm-pe-section-growth-offset
  - id: pe-reloc-append-source
    desc: Reloc-section or last-section infection source
    crit: suspicious
    conf: 0.96
    for: [c]
    any:
      - id: pe-reloc-last-section-source
      - id: pe-append-last-section-source
