defaults:
  for:
    - c
  platforms:
    - windows
    - unix
    - linux
    - macos
    - android
    - ios
traits:
  - id: com-target-pattern
    desc: COM file target pattern
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: (?i)(\\*\\.COM|Targets \\.COM files)
  - id: path-environment-traversal
    desc: PATH environment traversal
    crit: notable
    conf: 0.93
    if:
      type: string_literal
      substr: search for PATH= in environment block
  - id: command-interpreter-target
    desc: DOS system file targets
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: (?i)(COMMAND\\.COM|(?:IBM)?BIOS\\.COM|(?:IBM)?DOS\\.COM)
  - id: reinfection-byte-guard
    desc: Reinfection byte guard
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: (?i)(compare first 7 bytes with own code|56 0A 03 59 00)
  - id: host-code-fragment
    desc: Host code fragment saved
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: part of victime code
  - id: host-restore-comment
    desc: Host restore trampoline
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      substr: restores the original host code in memory before jumping back
  - id: infection-counter-limit
    desc: Limited infection counter
    crit: component
    conf: 0.9
    if:
      type: string_literal
      regex: (?i)(infection counter|up to 5 files per execution)
  - id: appending-size-603h
    desc: 603h append size marker
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      regex: (?i)(603h|0603h|adds approximately 1539 bytes)
  - id: entry-jump-eb07
    desc: EB07 entry jump marker
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      regex: (?i)(JMP instruction \\(EB 07\\)|\\bEB 07\\b)
composite_rules:
  - id: direct-action-com-infector
    desc: Direct-action DOS COM infector
    crit: suspicious
    conf: 0.97
    all:
      - id: com-target-pattern
      - id: path-environment-traversal
      - id: reinfection-byte-guard
    any:
      - id: command-interpreter-target
      - id: infection-counter-limit
  - id: appending-com-infector
    desc: Non-destructive appending infector
    crit: suspicious
    conf: 0.97
    all:
      - id: direct-action-com-infector
    any:
      - id: host-code-fragment
      - id: host-restore-comment
      - id: appending-size-603h
      - id: entry-jump-eb07
