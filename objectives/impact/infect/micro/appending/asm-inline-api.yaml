defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: asm-inline-api-getprocaddress
    conf: 0.93
    crit: notable
    desc: Inline GetProcAddress string in ASM
    if:
      type: raw
      regex: db\s+'GetProcAddress',0
  - id: asm-inline-api-loadlibrary
    conf: 0.93
    crit: notable
    desc: Inline LoadLibraryA string in ASM
    if:
      type: raw
      regex: db\s+'LoadLibraryA',0
  - id: asm-inline-api-heapalloc
    conf: 0.9
    crit: notable
    desc: Inline HeapAlloc string in ASM
    if:
      type: raw
      regex: db\s+'HeapAlloc',0
  - id: asm-pe-getprocaddr-custom
    conf: 0.95
    crit: suspicious
    desc: Custom PEGetProcAddr routine
    if:
      type: text
      word: PEGetProcAddr
