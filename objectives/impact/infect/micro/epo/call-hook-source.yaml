defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: epo-support-label
    conf: 0.95
    crit: suspicious
    desc: EPO support label in virus source
    if:
      type: text
      word: EPOSupport
  - id: epo-comment
    conf: 0.93
    crit: suspicious
    desc: Entry Point Obscuring comment
    if:
      type: raw
      regex: \bEPO\b.{0,30}\b(hook|call|entry)\b
