defaults:
  for: [documents, vbs]
  platforms: [windows]
  attack: T1204.002
  mbc: B0009

traits:
  - id: ww6-infector-marker
    desc: WW6 macro virus self-marker string
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: WW6I(nfector|Instance)

  - id: vba-codemodule-access
    desc: VBA CodeModule self-access
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: (?i)VBProject\.VBComponents\.Item\(1\)\.CodeModule

  - id: vba-codemodule-rewrite
    desc: VBA CodeModule rewrite primitives
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: (?i)CodeModule\.(ReplaceLine|DeleteLines|AddFromString)\b

  - id: word-normaltemplate-infection
    desc: Word NormalTemplate macro infection
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      regex: (?i)NormalTemplate\.VBProject\.VBComponents\.Item\(1\)\.CodeModule

  - id: word-document-lifecycle-trigger
    desc: Word document lifecycle trigger
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      regex: (?i)Private\s+Sub\s+Document_(Open|Close)\s*\(

  - id: word-macro-security-suppression
    desc: Word macro security suppression
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: (?i)Options\.(VirusProtection|SaveNormalPrompt)\s*=\s*0

  - id: word-confirm-conversion-disable
    desc: Word conversion prompt suppression
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      regex: (?i)Options\.ConfirmConversions\s*=\s*0

  - id: word-document-self-save
    desc: Word active document self-save
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: (?i)ActiveDocument\.SaveAs\s+FileName:=ActiveDocument\.FullName

  - id: vba-codemodule-line-read
    desc: VBA CodeModule line read
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: (?i)CodeModule\.Lines\(\w+,\s*1\)

  - id: vba-char-xor-loop
    desc: VBA Chr Mid XOR loop
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: (?i)Asc\(Mid\(\w+,\s*\w+,\s*1\)\)\s+Xor\s+\w+

  - id: vba-random-xor-key
    desc: VBA random XOR key
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: (?i)Int\(Rnd\(\)\s*\*\s*8\)\s*\+\s*1

composite_rules:
  - id: word-macro-filesaveas-spreader
    desc: Word macro virus spreading via FileSaveAs and NORMAL.DOT
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/macro/office::wordbasic-autoopen
      - id: micro-behaviors/process/create/macro/office::wordbasic-filesaveas-hook
      - id: micro-behaviors/process/create/macro/office::wordbasic-normal-dot-ref

  - id: word-vba-normaltemplate-self-replicator
    desc: Word VBA self-replication into NormalTemplate
    crit: hostile
    conf: 0.99
    all:
      - id: word-document-lifecycle-trigger
      - id: vba-codemodule-access
      - id: vba-codemodule-rewrite
      - id: word-normaltemplate-infection
    any:
      - id: word-macro-security-suppression
      - id: word-confirm-conversion-disable
      - id: word-document-self-save
    needs: 1

  - id: word-vba-polymorphic-infector-source
    desc: Polymorphic Word VBA infector source
    crit: hostile
    conf: 0.98
    all:
      - id: word-document-lifecycle-trigger
      - id: vba-codemodule-access
      - id: vba-codemodule-line-read
      - id: vba-codemodule-rewrite
      - id: vba-char-xor-loop
    any:
      - id: word-normaltemplate-infection
      - id: word-document-self-save
      - id: word-macro-security-suppression
      - id: word-confirm-conversion-disable
      - id: vba-random-xor-key
    needs: 2
