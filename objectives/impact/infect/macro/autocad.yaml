defaults:
  for: [binaries, scripts, source, documents, manifests, data, media]
  platforms: [unix, windows]
  size_max: 16384
  attack: "T1204.002"
  mbc: "B0009"

traits: []

composite_rules:
  - id: autocad-vbe-self-replicator
    desc: AutoCAD macro self-replication via VBE
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/macro::acad-document-deactivate-trigger
      - id: micro-behaviors/data/source/function/macro::autocad-vbe-handle
      - id: micro-behaviors/data/source/function/macro::codepane-codemodule-access
      - id: micro-behaviors/data/source/function/macro::codemodule-self-copy-read
      - id: micro-behaviors/data/source/function/macro::codemodule-prepend-insertlines
      - id: micro-behaviors/fs/file/write/direct::thisdocument-save
    any:
      - id: micro-behaviors/data/source/function/macro::documents-count-loop
      - id: micro-behaviors/data/source/function/macro::line2-infection-marker-check
      - id: micro-behaviors/data/control-flow/error-handling::on-error-goto-runtonext
    needs: 2

  - id: autocad-event-driven-document-virus
    desc: Event-driven AutoCAD document infector
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/macro::acad-document-deactivate-trigger
      - id: micro-behaviors/data/source/function/macro::codemodule-prepend-insertlines
      - id: micro-behaviors/fs/file/write/direct::thisdocument-save
    any:
      - id: micro-behaviors/data/source/function/macro::line2-infection-marker-check
      - id: micro-behaviors/data/source/function/macro::documents-count-loop
      - id: micro-behaviors/data/control-flow/error-handling::on-error-goto-runtonext
    needs: 2
