defaults:
  platforms: [windows]
  for: [c, cpp, text, batch]
  attack: T1204

traits:
  - id: epoc-opl-system-app-copy
    desc: EPOC OPL copies app to system
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'COPY\s+".{0,40}\.app","C:\\System\\'

  - id: epoc-opl-irda-send
    desc: EPOC OPL sends file by IRDA
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'IRDACONNECTTOSEND[\s\S]{0,120}IRDAWRITE'

  - id: epoc-opl-infection-dialog
    desc: EPOC OPL infection dialog
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'dTEXT\s+"","You have been infected"'

  - id: epoc-opl-app-cleanup
    desc: EPOC OPL removes rival app
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: 'DELETE\s+"C:\\System\\Apps\\.{0,60}\*"'

  - id: symbian-sis-autostart-copy
    desc: Symbian copies app to autostart
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'CopyMeToAutostartableDir|C:\\SYSTEM\\SYMBIANSECUREDATA'

  - id: symbian-recog-mdl-install
    desc: Symbian installs recognizer MDL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'InstallMDL|C:\\SYSTEM\\RECOGS\\.{0,60}\.MDL'

  - id: symbian-create-sis-package
    desc: Symbian creates SIS package
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'CreateSis[\s\S]{0,160}sisheader'

  - id: symbian-bt-device-discovery
    desc: Symbian Bluetooth discovery
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'BTLinkManager[\s\S]{0,220}GetByAddress'

  - id: symbian-obex-sis-send
    desc: Symbian sends SIS by OBEX
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CObexFileObject[\s\S]{0,180}\.SIS'

  - id: symbian-sis-file-object
    desc: Symbian SIS OBEX file object
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.SIS[\s\S]{0,160}CObexFileObject'

  - id: symbian-bt-inquiry-action
    desc: Symbian Bluetooth inquiry action
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'SetIAC\(KGIAC\)[\s\S]{0,120}KHostResInquiry'

  - id: symbian-obex-put-rfcomm
    desc: Symbian OBEX RFCOMM put
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'RFCOMM[\s\S]{0,220}CObexClient'

composite_rules:
  - id: epoc-irda-app-worm
    desc: EPOC app propagates by infrared
    crit: hostile
    conf: 0.97
    all:
      - id: epoc-opl-system-app-copy
      - id: epoc-opl-irda-send
    any:
      - id: epoc-opl-infection-dialog
      - id: epoc-opl-app-cleanup

  - id: symbian-bluetooth-sis-worm
    desc: Symbian SIS spreads over Bluetooth
    crit: hostile
    conf: 0.98
    all:
      - id: symbian-sis-file-object
      - id: symbian-bt-inquiry-action
      - id: symbian-obex-put-rfcomm

  - id: symbian-autostart-sis-builder
    desc: Symbian autostart SIS builder
    crit: hostile
    conf: 0.97
    all:
      - id: symbian-sis-autostart-copy
      - id: symbian-recog-mdl-install
      - id: symbian-create-sis-package
