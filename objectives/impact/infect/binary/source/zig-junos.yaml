defaults:
  platforms: [junos, appliance, unix]
  for: [zig, elf]
  attack: T1096
  mbc: B0025

traits:
  - id: zig-proc-self-exe-copy
    desc: Zig copies /proc/self/exe
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc/self/exe[\s\S]{0,260}readToEndAlloc'

  - id: zig-junos-hidden-targets
    desc: Zig Junos hidden target paths
    crit: suspicious
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: '/var/tmp/\.(sys_health|mgd_helper|rpc_worker)|/config/\.hidden_svc'

  - id: zig-executable-copy-mode
    desc: Zig marks copy executable
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'std\.posix\.chmod[\s\S]{0,80}0o755'

  - id: zig-junos-health-config
    desc: Zig writes Junos health config
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '/var/tmp/system-health\.conf|health_check_binary=/var/tmp/\.sys_health'

composite_rules:
  - id: zig-junos-self-copy-infect
    desc: Zig Junos self-copy infection
    crit: hostile
    conf: 0.98
    all:
      - id: zig-junos-hidden-targets
      - id: zig-junos-health-config
    any:
      - id: zig-proc-self-exe-copy
      - id: zig-executable-copy-mode
