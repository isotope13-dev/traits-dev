defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: asm-infection-padding-check
    conf: 0.8
    crit: notable
    desc: "Assembly code checking for infection via"
    count_min: 1
    if:
      type: text
      regex: (div\s+ecx|size_pad|size_padding|infected_marker)
      section: .text
