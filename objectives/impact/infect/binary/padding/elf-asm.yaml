defaults:
  platforms: [unix]
  for: [c]

traits:
- id: asm-readdir-syscall-89
  desc: ASM readdir syscall scan
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'mov\s+eax\s*,\s*(89|SYS_READDIR)'

- id: asm-current-dir-open
  desc: ASM opens current directory
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'mov\s+ebx\s*,\s*(point|\[ebp\+point\])'

- id: asm-current-dir-open-lea
  desc: ASM loads current directory
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'lea ebx,[ebp+point]'

- id: asm-mmap-syscall-90
  desc: ASM maps target file
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'mov\s+eax\s*,\s*(90|SYS_MMAP)'

- id: asm-ftruncate-syscall
  desc: ASM grows file by truncate
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'mov\s+eax\s*,\s*SYS_FTRUNCATE'

- id: asm-et-exec-byte-filter
  desc: ASM filters ET_EXEC byte
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'cmp\s+byte\s*\[[^\]\n]{0,32}\+10h\]\s*,\s*0?2h'

- id: asm-text-data-segment-gap
  desc: ASM checks text-data gap
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'between the end of .text'

- id: asm-text-data-gap-phrased
  desc: ASM checks text data gap
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'between the end of the .text'

- id: asm-phdr-text-filesz-grow
  desc: ASM grows text p_filesz
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'patch p_filesz'

- id: asm-phdr-filesz-grow-direct
  desc: ASM grows PHDR filesz
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'add dword [esi+16],0x1000'

- id: asm-phdr-text-memsz-grow
  desc: ASM grows text p_memsz
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'patch p_memsz'

- id: asm-phdr-memsz-grow-direct
  desc: ASM grows PHDR memsz
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'add dword [esi+20],0x1000'

- id: asm-shdr-offset-patch
  desc: ASM patches section offsets
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'patch(ing)? sh_offset'

- id: asm-entry-patch-direct
  desc: ASM patches ELF entry
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'fix entry point'

- id: asm-entry-patch-symbolic
  desc: ASM writes new ELF entry
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'mov dword [esi+E_ENTRY],ecx'

- id: asm-insert-virus-at-gap
  desc: ASM inserts virus in gap
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'write the virus'

- id: asm-write-preserved-tail
  desc: ASM writes preserved tail
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'write the rest'
  unless:
  - id: well-known/lib/benign-runtime-bundles::php-source-tree

composite_rules:
- id: asm-current-dir-target-loop
  desc: ASM current directory target loop
  crit: suspicious
  conf: 0.94
  all:
  - id: asm-readdir-syscall-89
  any:
  - id: asm-current-dir-open-lea
  - id: asm-current-dir-open

- id: asm-phdr-filesz-growth
  desc: ASM PHDR filesz growth
  crit: suspicious
  conf: 0.94
  any:
  - id: asm-phdr-text-filesz-grow
  - id: asm-phdr-filesz-grow-direct

- id: asm-phdr-memsz-growth
  desc: ASM PHDR memsz growth
  crit: suspicious
  conf: 0.94
  any:
  - id: asm-phdr-text-memsz-grow
  - id: asm-phdr-memsz-grow-direct

- id: asm-entry-or-offset-patch
  desc: ASM entry or offset patch
  crit: suspicious
  conf: 0.94
  any:
  - id: asm-shdr-offset-patch
  - id: asm-entry-patch-direct
  - id: asm-entry-patch-symbolic

- id: asm-elf-target-gate
  desc: ASM ELF target gate
  crit: suspicious
  conf: 0.94
  any:
  - id: objectives/impact/infect/micro/appending::elf-magic-check
  - id: asm-et-exec-byte-filter

- id: asm-padding-writeback
  desc: ASM padding writeback
  crit: suspicious
  conf: 0.94
  any:
  - id: asm-ftruncate-syscall
  - id: asm-insert-virus-at-gap
  - id: asm-write-preserved-tail

- id: asm-segment-padding-patches
  desc: ASM segment padding patches
  crit: suspicious
  conf: 0.95
  all:
  - id: asm-phdr-filesz-growth
  - id: asm-phdr-memsz-growth
  - id: asm-entry-or-offset-patch
  any:
  - id: asm-text-data-segment-gap
  - id: asm-text-data-gap-phrased

- id: asm-segment-padding-elf-infector
  desc: ASM segment padding ELF infector
  crit: hostile
  conf: 0.98
  attack: T1204
  mbc: B0009
  all:
  - id: asm-current-dir-target-loop
  - id: asm-mmap-syscall-90
  - id: asm-segment-padding-patches
  - id: asm-elf-target-gate
  - id: asm-padding-writeback
