defaults:
  platforms: [unix]
  for: [c]

traits:
- id: asm-readdir-current-dir-scan
  desc: ASM scans local dir entries
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'mov\s+eax\s*,\s*0?59h\s*;?\s*readdir'

- id: asm-mmap-syscall-5a
  desc: ASM maps target via mmap
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'mov\s+eax\s*,\s*0x5a\b'

- id: asm-negated-elf-magic-const
  desc: ASM negated ELF magic
  crit: notable
  conf: 0.93
  if:
    type: text
    regex: '0x464[cC]457[fF]'

- id: asm-add-mapped-elf-word
  desc: ASM adds mapped ELF word
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'add\s+eax\s*,\s*dword\s*\[e[a-d]x\]'

- id: asm-et-exec-byte-check
  desc: ASM filters ET_EXEC
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'cmp\s+byte\s*\[e[a-d]x\s*\+\s*0x10\]\s*,\s*0?2h'

- id: asm-ei-data-marker-byte
  desc: ASM uses EI_DATA marker
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: '(cmp|mov)\s+byte\s*\[e[a-d]x\s*\+\s*5\]\s*,\s*c[lx]'

- id: asm-note-cavity-subtract
  desc: ASM derives note cavity offset
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'sub\s+eax\s*,\s*0?4[cC]h'

- id: asm-note-cavity-size-check
  desc: ASM checks note cavity size
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'cmp\s+word\s*\[eax\s*\+\s*10h\]\s*,\s*\('

- id: asm-copy-self-rep-movsb
  desc: ASM copies self into target
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'lea\s+esi\s*,\s*\[[^\]\n]{0,40}vir_start\][\s\S]{0,90}rep\s+movsb'

- id: asm-patch-entry-offset18
  desc: ASM patches ELF entry
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'mov\s+dword\s*\[e[a-d]x\s*\+\s*18h\]\s*,\s*e[a-d]x'

- id: asm-grow-data-filesz
  desc: ASM grows data filesz
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'add\s+dword\s*\[e[a-d]x\s*\+\s*0[Aa]4h\]\s*,\s*e[a-d]x'

- id: asm-grow-data-memsz
  desc: ASM grows data memsz
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'add\s+dword\s*\[e[a-d]x\s*\+\s*0[Aa]8h\]\s*,\s*e[a-d]x'

composite_rules:
- id: asm-mapped-elf-additive-check
  desc: ASM mapped ELF additive check
  crit: suspicious
  conf: 0.94
  all:
  - id: asm-negated-elf-magic-const
  - id: asm-add-mapped-elf-word

- id: asm-note-cavity-size-gate
  desc: ASM note cavity size gate
  crit: suspicious
  conf: 0.94
  all:
  - id: asm-note-cavity-subtract
  - id: asm-note-cavity-size-check

- id: asm-grow-data-segment-fields
  desc: ASM grows ELF data fields
  crit: suspicious
  conf: 0.94
  all:
  - id: asm-grow-data-filesz
  - id: asm-grow-data-memsz

- id: asm-note-cavity-elf-infector
  desc: ASM note cavity ELF infector
  crit: hostile
  conf: 0.98
  attack: T1204
  mbc: B0009
  all:
  - id: asm-readdir-current-dir-scan
  - id: asm-mmap-syscall-5a
  - id: asm-mapped-elf-additive-check
  - id: asm-et-exec-byte-check
  - id: asm-ei-data-marker-byte
  - id: asm-note-cavity-size-gate
  - id: asm-copy-self-rep-movsb
  - id: asm-patch-entry-offset18
  - id: asm-grow-data-segment-fields
