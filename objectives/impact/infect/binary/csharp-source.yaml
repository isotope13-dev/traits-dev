defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: mainmodule-filename
    desc: Self-executable path via MainModule
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "MainModule.FileName"
  - id: random-alnum-drop-name
    desc: Random alphanumeric drop name builder
    crit: suspicious
    conf: 0.91
    if:
      type: string_literal
      substr: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
    not:
      - exact: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
composite_rules:
  - id: csharp-file-infector
    desc: C# source file infection pattern
    crit: hostile
    conf: 0.95
    attack: "T1080"
    all:
      - id: micro-behaviors/fs/enumerate/directory::get-files-exe-filter
      - id: mainmodule-filename
    any:
      - id: micro-behaviors/crypto/symmetric/aes::rijndael-managed
      - id: micro-behaviors/crypto/symmetric/3des::triple-des-provider
      - id: objectives/execution/compile/runtime::compile-assembly-from-source
  - id: self-copy-drive-spreading-infector
    desc: Self-copy infector spreading across drives
    crit: hostile
    conf: 0.98
    attack: "T1091"
    all:
      - id: objectives/persistence/login/self-install/copy::assembly-location-self-source
      - id: micro-behaviors/fs/file/copy::self-copy-random-exe
      - id: micro-behaviors/fs/traversal/drives::directory-get-logical-drives-source
      - id: micro-behaviors/fs/file/write::self-read-then-overwrite
    any:
      - id: micro-behaviors/fs/enumerate/directory::get-directories
      - id: micro-behaviors/os/registry/manipulate::registry-share-enumeration-marker
      - id: random-alnum-drop-name
  - id: network-share-aware-infector
    desc: File infector aware of network shares
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/persistence/login/self-install/copy::assembly-location-self-source
      - id: micro-behaviors/fs/file/copy::self-copy-random-exe
      - id: micro-behaviors/os/registry/manipulate::registry-share-enumeration-marker
