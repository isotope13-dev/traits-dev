defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: elf-segment-growth
    desc: Grows an ELF program segment
    crit: notable
    conf: 0.8
    for:
      - elf
    if:
      type: text
      regex: p_filesz\s*(\+)?=\s*\w+
  - id: elf-section-growth
    desc: Grows an ELF section
    crit: notable
    conf: 0.8
    for:
      - elf
    if:
      type: raw
      regex: sh_size\s*(\+)?=\s*\w+
    not:
      - regex: sh_size=\d+$
  - id: elf-entry-point-redirection
    desc: Redirects ELF entry point
    crit: suspicious
    conf: 0.9
    for:
      - elf
    if:
      type: text
      regex: (^|[^a-zA-Z_])e_entry\s*=\s*\w+
    not:
      - substr: = unpack
      - regex: e_entry\s*=\s*0x%
    # ELF tools (debuggers, linkers, loaders like lldb-server) assign e_entry as
    # part of normal ELF handling. Suppress on debugger identity strings; downgrade
    # on documented/licensed userland tools.
    unless:
      - type: text
        substr: LLDB_DEBUGSERVER_PATH
      - type: text
        substr: GNU gdb
      - type: text
        substr: org.gnu.gdb.
    downgrade:
      any:
        - id: micro-behaviors/ui/help::benign-cli-tool
composite_rules:
  - id: elf-section-segment-growth
    desc: Grows both ELF sections and segments
    crit: suspicious
    conf: 0.9
    for:
      - elf
    all:
      - id: elf-segment-growth
      - id: elf-section-growth
  - id: elf-infection-behavior
    desc: Manipulates ELF headers to inject code or segments
    crit: suspicious
    conf: 1.0
    attack: T1542.001
    for:
      - elf
    any:
      - id: elf-section-segment-growth
      - id: elf-entry-point-redirection
