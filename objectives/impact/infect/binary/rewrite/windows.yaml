defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
traits:
- id: oep-restoration-patch-write
  desc: Writes OEP restoration jump stub
  crit: suspicious
  conf: 0.94
  if:
    type: hex
    pattern: C7 00 83 C4 04 E9
    offset_range: [11489280, 11509760]
- id: embedded-pe-mz-nop-scan
  desc: Scans for embedded MZ payload
  crit: notable
  conf: 0.9
  if:
    type: hex
    pattern: 81 38 4D 5A 90 00
    offset_range: [11489280, 11509760]
- id: stack-random-exe-drop-name
  desc: Stack-built random exe drop name
  crit: component
  conf: 0.92
  if:
    type: hex
    pattern: C7 45 ?? 52 4A 7A 4F C7 45 ?? 74 67 2E 65 C7 45 ?? 78 65
    offset_range: [11489280, 11509760]
- id: bak-extension-filter
  desc: Filters backup-style .bak targets
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)\.bak\b
- id: tmp-extension-staging
  desc: Uses temporary .tmp staging file
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)\.tmp\b
- id: ghost-image-filter
  desc: Excludes Ghost image extensions
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)\.gho\b
- id: cts-trailer-marker
  desc: CTS newline-terminated infection trailer marker
  crit: component
  conf: 0.95
  size_max: 1048576
  if:
    type: hex
    pattern: 43 54 53 0A
    section: UPX0
- id: skip-windows-install-dir--windows
  desc: Skips Windows installation directories (WINDOWS)
  crit: component
  conf: 0.85
  if:
    type: text
    word: WINDOWS
- id: skip-windows-install-dir--winnt
  desc: Skips Windows installation directories (WINNT)
  crit: component
  conf: 0.85
  if:
    type: text
    word: WINNT
composite_rules:
- id: skip-windows-install-dir
  desc: Skips Windows installation directories
  crit: component
  conf: 0.85
  any:
  - id: skip-windows-install-dir--windows
  - id: skip-windows-install-dir--winnt
- id: rewrite-executable-via-temp-and-backup
  desc: Rewrites executable via temp and backup files
  crit: suspicious
  conf: 0.92
  unless:
  - id: metadata/binary/installer/family/
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
  all:
  - id: micro-behaviors/fs/path/extension::exe-dup
  - id: bak-extension-filter
  - id: tmp-extension-staging
  - id: micro-behaviors/fs/file/rename/
  - id: micro-behaviors/fs/file/delete::deletefile-a
- id: recursive-pe-infector
  desc: Recursively infects PE files across drives
  crit: hostile
  conf: 0.95
  all:
  - id: rewrite-executable-via-temp-and-backup
  - id: micro-behaviors/fs/traversal/drives::get-logical-drives
  - id: micro-behaviors/dylib/library/legacy::mfc42-ref
  any:
  - id: skip-windows-install-dir
  - id: ghost-image-filter
  - id: objectives/evasion/self-delete/file/script::comspec-shortpath-self-delete
- id: windows-pe-copy-move-infector
  desc: Windows PE file copy move infector
  crit: hostile
  conf: 0.94
  size_max: 1048576
  all:
  - id: micro-behaviors/fs/path/extension::exe-dup
  - id: micro-behaviors/fs/enumerate/directory::find-file-walker
  - id: micro-behaviors/fs/file/copy::copyfile-a
  - id: micro-behaviors/fs/file/move::move-file
  - id: micro-behaviors/fs/file/open::file-create-win
  - id: micro-behaviors/fs/file/read::read-file
  - id: micro-behaviors/fs/file/write/direct::write-file
  - id: micro-behaviors/fs/file/handle::set-file-pointer
  any:
  - id: micro-behaviors/os/sysinfo/directories::get-windows-directory
  - id: micro-behaviors/os/sysinfo/directories::get-system-directory
  - id: micro-behaviors/fs/file/delete::deletefile-a
  - id: micro-behaviors/fs/file/attributes::set-file-attributes-a
  - id: micro-behaviors/fs/file/handle::flush-file-buffers
  needs: 3
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/binary/installer/script::nsis
  - id: metadata/signed/platform/
  - id: metadata/binary/metrics/threshold::many-exports-1000
- id: parasitic-pe-dropper-entrypoint
  desc: Parasitic PE dropper entrypoint
  crit: hostile
  conf: 0.96
  size_min: 131072
  all:
  - id: oep-restoration-patch-write
  - id: embedded-pe-mz-nop-scan
  - id: metadata/binary/section/metrics::pe-nonstandard-entry
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::wx-sections
  any:
  - id: stack-random-exe-drop-name
  - id: objectives/anti-static/obfuscation/payload/section::unusual-alignment-pe
  unless:
  - id: metadata/signed/platform/
- id: cts-prepending-pe-infector
  desc: CTS-style prepending PE infector
  crit: hostile
  conf: 0.96
  attack: T1204
  size_max: 1048576
  all:
  - id: cts-trailer-marker
  - id: micro-behaviors/fs/path/extension::exe-dup
  - id: micro-behaviors/fs/file/open::file-create-win
  - id: micro-behaviors/fs/file/read::read-file
  - id: micro-behaviors/fs/file/write/direct::write-file
  - id: micro-behaviors/fs/sync/fsync::get-file-size
  - id: micro-behaviors/fs/file/handle::set-file-pointer
  - id: micro-behaviors/process/create/spawn::create-process-w
  any:
  - id: micro-behaviors/fs/file/handle::flush-file-buffers
  - id: micro-behaviors/os/random/generator::crypt-gen-random
  - id: micro-behaviors/fs/enumerate/directory::find-file-walker-wide
  needs: 2
  unless:
  - id: metadata/signed/platform/
- id: legacy-win32-file-infector-scaffold
  desc: Legacy Win32 host file infector scaffold
  crit: hostile
  conf: 0.96
  attack: T1204
  ref: sha256:68fa7c436e293739e98bb04034db6d6a3e40a9b9991de5d147368fb696044499
  size_max: 1048576
  all:
  - id: micro-behaviors/fs/file/read-write::legacy-win32-file-rewrite
  - id: micro-behaviors/fs/enumerate/directory::find-first-file-a
  - id: micro-behaviors/fs/sync/fsync::set-file-time
  - id: metadata/binary/layout::pe-entry-debug-section
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::many-wx-sections
  any:
  - id: micro-behaviors/fs/traversal/drives::drive-context-switching
  - id: micro-behaviors/os/sysinfo/directories::get-windows-directory
  - id: micro-behaviors/fs/path/check::get-module-filename
  - id: micro-behaviors/process/create/exec::winexec
  needs: 2
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/binary/installer/script/
  - id: metadata/signed/platform/
  - id: metadata/binary/metrics/threshold::many-exports-1000
- id: repeated-pe-image-appender
  desc: Repeated PE image appending infector
  crit: hostile
  conf: 0.97
  attack: T1204
  ref: sha256:7c1b267db7d698a897d572cd41f2e5746a06bb1a512a69f1c629c7852b99c459
  all:
  - id: metadata/binary/layout::repeated-legacy-pe-images
  - id: metadata/binary/layout::large-overlay-1mb
  - id: metadata/binary/layout::overlay-dominates-third
  - id: micro-behaviors/fs/file/open::file-create-win
  - id: micro-behaviors/fs/file/read::read-file
  - id: micro-behaviors/fs/file/write/direct::write-file
  any:
  - id: micro-behaviors/fs/enumerate/directory::find-first-file-a
  - id: micro-behaviors/fs/file/handle::set-file-pointer
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  needs: 2
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/binary/installer/script/
  - id: metadata/binary/installer/sfx/
  - id: metadata/signed/platform/
