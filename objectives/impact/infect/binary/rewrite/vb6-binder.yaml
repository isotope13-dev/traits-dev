defaults:
  platforms: [windows]
  for: [pe]
  attack: T1554.001
  mbc: B0024

composite_rules:
  - id: packed-vb6-host-binder
    desc: Packed VB6 file-attribute binder around host sections
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/anti-static/pack/upx::single-bookend-renamed-upx-loader
      - id: metadata/binary/framework::vb6-application-framework
      - id: micro-behaviors/fs/file/attributes::vb6-set-file-attributes
      - id: metadata/binary/section/metrics::six-plus-writable-sections
    unless:
      - id: metadata/signed/trust-level::signer-evidence-present
