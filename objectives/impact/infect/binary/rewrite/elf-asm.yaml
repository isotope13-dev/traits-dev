defaults:
  platforms: [unix]
  for: [c]

traits:
- id: asm-recursive-dirsearch
  desc: ASM recursive directory search
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'call         DirSearch'

- id: asm-readdir-syscall-59
  desc: ASM readdir syscall loop
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'mov\s+eax\s*,\s*59'

- id: asm-exec-permission-filter
  desc: Executable-permission label in assembly text
  crit: component
  conf: 0.7
  if:
    type: text
    substr: 'owner exec permission'

- id: asm-elf-header-dword-check
  desc: ASM checks ELF header
  crit: notable
  conf: 0.93
  if:
    type: text
    substr: 'cmp          dword ptr [edi],464C457F'

- id: asm-elf-i386-exec-check
  desc: ASM checks i386 executable
  crit: notable
  conf: 0.93
  if:
    type: text
    substr: 'cmp          dword ptr [edi + 10],00030002'

- id: asm-entrypoint-offset-seek
  desc: ASM seeks entrypoint offset
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'Seek to Entrypoint Offset'

- id: asm-code-segment-rwx
  desc: ASM makes code writable
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'mov          byte ptr [esi + 18],07'

- id: asm-writes-virus-body
  desc: ASM writes virus body
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'Write Virus'

- id: asm-writes-host-backup
  desc: ASM writes host backup
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'Write Host Code'

composite_rules:
- id: asm-recursive-exec-file-scan
  desc: ASM recursive executable scan
  crit: suspicious
  conf: 0.94
  all:
  - id: asm-recursive-dirsearch
  - id: asm-readdir-syscall-59
  - id: asm-exec-permission-filter

- id: asm-entry-overwrite-host-backup
  desc: ASM entry overwrite host backup
  crit: hostile
  conf: 0.98
  attack: T1204
  mbc: B0009
  all:
  - id: asm-recursive-exec-file-scan
  - id: asm-elf-header-dword-check
  - id: asm-elf-i386-exec-check
  - id: asm-entrypoint-offset-seek
  - id: asm-code-segment-rwx
  - id: asm-writes-virus-body
  - id: asm-writes-host-backup
