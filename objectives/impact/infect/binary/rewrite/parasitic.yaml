# Parasitic file infector that replaces executables
# Copies original to .cab, deletes .exe, copies self as .exe
# Uses timestomping to hide modifications
defaults:
  platforms: [windows]
  for: [pe, dll]
  size_min: 100000
  size_max: 5000000
composite_rules:
- id: parasitic-exe-replace-infector
  desc: Parasitic PE infector replaces executables
  crit: hostile
  conf: 0.95
  attack: T1554.001
  mbc: B0024
  all:
  - id: micro-behaviors/fs/enumerate/directory::find-file-walker
  - id: micro-behaviors/fs/file/copy::copyfile-a
  - id: micro-behaviors/fs/file/delete::deletefile-a
  - id: micro-behaviors/fs/file/write/direct::write-file
  - id: micro-behaviors/fs/file/open::file-create-win
  - id: micro-behaviors/fs/file/copy::cab-backup-format-string
  any:
  - id: micro-behaviors/fs/file/write/writability::readme-writability-check
  - id: micro-behaviors/fs/sync/fsync::set-file-time
  - id: micro-behaviors/fs/traversal/drives::get-drive-type
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/signed/platform/
