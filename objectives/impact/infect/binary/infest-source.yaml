defaults:
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: findfirst-source
    desc: Uses findfirst for target discovery
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: findfirst
  - id: findnext-source
    desc: Uses findnext for target discovery
    crit: notable
    conf: 0.92
    if:
      type: symbol
      exact: findnext
  - id: prepended-host-mz-split
    desc: Splits prepended host at MZ
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: if (a == 'Z' && tmp == 'M' && p > 1)
  - id: write-virus-body-loop
    desc: Writes virus body into target
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: outputf.put(code[p]);
  - id: write-host-body-loop
    desc: Writes original host body back
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: outputf.put(hc[p]);
  - id: infect-exe-target-glob
    desc: Infects .exe target glob
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: "*.exe"
  - id: infect-scr-target-glob
    desc: Infects .scr target glob
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: "*.scr"
  - id: overwrite-com-target-glob
    desc: Overwrites .com target glob
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: "*.com"
  - id: overwrite-bat-target-glob
    desc: Overwrites .bat target glob
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: "*.bat"
  - id: overwrite-cmd-target-glob
    desc: Overwrites .cmd target glob
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: "*.cmd"
  - id: overwrite-pif-target-glob
    desc: Overwrites .pif target glob
    crit: component
    conf: 0.92
    if:
      type: string_literal
      exact: "*.pif"
  - id: argv-exe-scr-infection-logic
    desc: Infects executable arguments by extension
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: strcmp(ext,"exe") == 0 || strcmp(ext,"scr") == 0
  - id: parent-directory-switch
    desc: Switches into parent directory
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: "..\\\\"
  - id: root-directory-switch
    desc: Switches into root directory
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(chdir|_chdir|SetCurrentDirectory)\s*\(\s*"\\+"\s*\)'
    unless:
      - type: text
        substr: searchpath_save(
  - id: max-infections-150
    desc: Caps infections at 150 files
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "#define MAX_INFECTIONS 150"
  - id: max-droppings-150
    desc: Caps droppings at 150 files
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "#define MAX_DROPPINGS 150"
  - id: max-file-size-250k
    desc: Restricts infection to 250KB files
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "#define MAX_FILE_SIZE 250000"
composite_rules:
  - id: prepending-exe-scr-infector-source
    desc: Prepending executable infector source
    crit: hostile
    conf: 0.98
    all:
      - id: prepended-host-mz-split
      - id: write-virus-body-loop
      - id: write-host-body-loop
      - id: infect-exe-target-glob
      - id: infect-scr-target-glob
    any:
      - id: argv-exe-scr-infection-logic
      - id: micro-behaviors/process/create/exec::shell-execute-call-source
  - id: overwrite-script-and-loader-drops
    desc: Overwrites command script and loader targets
    crit: suspicious
    conf: 0.97
    all:
      - id: overwrite-com-target-glob
      - id: overwrite-bat-target-glob
      - id: overwrite-cmd-target-glob
      - id: overwrite-pif-target-glob
    any:
      - id: findfirst-source
      - id: findnext-source
  - id: local-system-root-propagation-source
    desc: Spreads across local and system directories
    crit: suspicious
    conf: 0.95
    all:
      - id: parent-directory-switch
      - id: root-directory-switch
      - id: objectives/persistence/login/startup/registry::copy-to-sysdir-source
    any:
      - id: findfirst-source
      - id: findnext-source
  - id: infector-bounded-spread-profile
    desc: Bounded spread profile for file infector
    crit: notable
    conf: 0.93
    all:
      - id: max-infections-150
      - id: max-droppings-150
      - id: max-file-size-250k
