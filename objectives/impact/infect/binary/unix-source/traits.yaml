defaults:
  for: [c, cpp, text]
  platforms: [unix]

traits:
  - id: unix-aout-header-source
    desc: Unix a.out header source
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(struct exec|<a\.out\.h>|N_TXTADDR|N_DATADDR)'

  - id: unix-coff-header-source
    desc: Unix COFF header source
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(struct filehdr|#ifdef COFF|scnptr\[[a-z]+\]\.s_)'

  - id: unix-self-state-machine
    desc: Unix self-write state machine
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'WRITE_SELF[\s\S]{0,120}ENTRY'

  - id: unix-sbeak-image-buffer
    desc: Unix sbeak image buffer
    crit: component
    conf: 0.88
    if:
      type: text
      word: sbeak

  - id: unix-write-infect-trunc
    desc: Unix truncates infection target
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'open\s*\(\s*infect\s*,\s*O_WRONLY\s*\|\s*O_TRUNC'

  - id: unix-infected-child-fork
    desc: Unix forks infected child
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'fork\s*\(\s*\)[\s\S]{0,120}child of infected file'

  - id: unix-dir-entry-infect
    desc: Unix dir entry infection
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'd_name[\s\S]{0,160}(not_infectd|infecting|already infected)'

  - id: unix-exec-header-implant
    desc: Unix exec header implant
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'read\([^;]{0,80}struct exec[\s\S]{0,220}write\([^;]{0,80}struct exec'

  - id: unix-companion-comment
    desc: Unix companion-virus infection comment
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)companion[ _-]?(virus|infect\w*)|infect\w*[ _-]?companion'

  - id: unix-dot-companion-rename
    desc: Unix dot companion rename
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(rename founded file|put the DOT before)'
    unless:
      - id: well-known/tool/development/valgrind::valgrind-tool
      - id: metadata/lang/source::linux-kernel-header-source-path
      - id: well-known/lib/modernc-libc::source-tree

  - id: unix-companion-create-exec
    desc: Unix creates and execs companion
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'O_WRONLY\|O_CREAT\|O_EXCL[\s\S]{0,260}SYS_execve'

  - id: unix-companion-create-exclusive
    desc: Unix creates companion file
    crit: notable
    conf: 0.9
    if:
      type: text
      word: O_WRONLY|O_CREAT|O_EXCL

composite_rules:
  - id: unix-file-infector-source
    desc: Unix file infector virus source code
    crit: hostile
    conf: 0.95
    attack: "T1204"
    all:
      - id: micro-behaviors/fs/read/self::argv0-self-read
      - id: micro-behaviors/fs/directory/readdir/
    any:
      - id: micro-behaviors/process/create/execv::c-exec-variants
      - id: micro-behaviors/fs/file/rename::rename-base
      - id: micro-behaviors/fs/chmod/modify::syscall-chmod
    needs: 2

  - id: unix-self-rewrite-infector-source
    desc: Unix self-rewrite file infector
    crit: hostile
    conf: 0.98
    attack: T1204
    all:
      - id: unix-self-state-machine
      - id: unix-sbeak-image-buffer
      - id: unix-write-infect-trunc
    any:
      - id: micro-behaviors/fs/read/self::opens-self-via-argv0
      - id: unix-infected-child-fork
      - id: unix-dir-entry-infect
      - id: unix-aout-header-source
      - id: unix-coff-header-source
    needs: 4

  - id: unix-exec-header-implant-source
    desc: Unix executable header implant
    crit: hostile
    conf: 0.97
    attack: T1204
    all:
      - id: unix-aout-header-source
      - id: unix-exec-header-implant

  - id: unix-companion-file-infector
    desc: Unix companion file infector
    crit: hostile
    conf: 0.98
    attack: T1204
    all:
      - id: unix-companion-comment
      - id: unix-dot-companion-rename
      - id: unix-companion-create-exclusive
      - id: micro-behaviors/process/create/execv::sys-execve-source-constant
