# .NET file infector detection
# Combines infection function names with .NET framework and embedded payload signals
defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
- id: dotnet-pe-file-infector
  desc: .NET-based PE file infector
  crit: hostile
  conf: 0.95
  attack: T1542.001
  mbc: B0016
  all:
  - id: objectives/impact/infect/binary::pe-infector-function-triad
  - id: metadata/binary/framework::dotnet-assembly
  any:
  - id: micro-behaviors/data/embedded/payload::pe-magic-embedded
  - id: metadata/binary/layout::has-overlay
  - id: micro-behaviors/ui/graphics/icon::icon-manipulation-for-masquerade
- id: dotnet-directory-infector
  desc: .NET directory-scanning PE infector
  crit: hostile
  conf: 0.93
  attack: T1542.001
  all:
  - id: micro-behaviors/data/source/function/names::infect-dir-function
  - id: metadata/binary/framework::dotnet-assembly
  any:
  - id: micro-behaviors/fs/watch::filesystemwatcher
  - id: micro-behaviors/fs/traversal/drives::get-logical-drives-text
  - id: micro-behaviors/time/schedule/callback::create-timer-queue-timer-sym
- id: dotnet-icon-masquerade-infector
  desc: .NET infector with icon masquerading
  crit: hostile
  conf: 0.94
  all:
  - id: micro-behaviors/data/source/function/names::infect-exe-function
  - id: micro-behaviors/ui/graphics/icon::icon-manipulation-for-masquerade
  - id: metadata/binary/framework::dotnet-assembly
