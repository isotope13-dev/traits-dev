defaults:
  platforms: [windows]
  for: [source]
traits:
  - id: file-mapping-pair-source
    desc: CreateFileMappingA and MapViewOfFile cluster in source
    crit: notable
    conf: 0.94
    if:
      type: raw
      regex: CreateFileMappingA.{0,64}MapViewOfFile
  - id: pe-image-size-field-source
    desc: PE image size field manipulation in source
    crit: component
    conf: 0.9
    if:
      type: raw
      word: pe_imagesize
  - id: pe-virt-size-field-source
    desc: PE section virtual size manipulation in source
    crit: component
    conf: 0.9
    if:
      type: raw
      word: oe_virt_size
  - id: pe-phys-size-field-source
    desc: PE section physical size manipulation in source
    crit: component
    conf: 0.9
    if:
      type: raw
      word: oe_phys_size
  - id: injofs-source
    desc: Injection offset tracking in source
    crit: component
    conf: 0.88
    if:
      type: raw
      word: injofs
  - id: jmpofs-source
    desc: Jump offset tracking in source
    crit: component
    conf: 0.88
    if:
      type: raw
      word: jmpofs
  - id: copy-to-stack-source
    desc: Copies virus body to stack before execution
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      word: copy_to_stack
  - id: locale-icountry-source
    desc: Locale country gate in source
    crit: notable
    conf: 0.9
    if:
      type: raw
      word: LOCALE_ICOUNTRY
  - id: get-locale-info-source
    desc: GetLocaleInfoA reference in source
    crit: notable
    conf: 0.9
    if:
      type: raw
      word: GetLocaleInfoA
  - id: rep-stosb-source
    desc: rep stosb memory wipe in source
    crit: component
    conf: 0.8
    if:
      type: raw
      word: rep stosb
  - id: rdtsc-source
    desc: RDTSC-based randomness in source
    crit: notable
    conf: 0.82
    if:
      type: raw
      word: rdtsc
  - id: cdrom-probe-dir-source
    desc: Temporary l0x directory probe in source
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: l0x
composite_rules:
  - id: mapped-last-section-pe-infector-source
    desc: Memory-mapped PE last-section appending infector source
    crit: suspicious
    conf: 0.98
    all:
      - id: file-mapping-pair-source
      - id: pe-image-size-field-source
      - id: pe-virt-size-field-source
      - id: pe-phys-size-field-source
      - id: injofs-source
      - id: jmpofs-source
  - id: locale-gated-file-wipe-source
    desc: Locale-gated destructive wipe logic in source
    crit: suspicious
    conf: 0.95
    all:
      - id: locale-icountry-source
      - id: get-locale-info-source
      - id: rep-stosb-source
  - id: drive-propagation-loop-source
    desc: Drive-jittered propagation loop with writable media probe
    crit: suspicious
    conf: 0.94
    all:
      - id: rdtsc-source
      - id: cdrom-probe-dir-source
      - id: copy-to-stack-source
