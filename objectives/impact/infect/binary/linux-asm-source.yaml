defaults:
  platforms: [unix]
  for: [c]

traits:
  - id: elf-magic-check-asm
    desc: Checks ELF magic before infection
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: "cmp eax,0x464c457f        ; hex for \".ELF\" "

  - id: local-executable-filter-asm
    desc: Regular file type check
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "cmp ebx,00008000h         ; REG_FILE !? "

  - id: owner-exec-filter-asm
    desc: Owner execute bit check
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "and eax,00000040h         ; eax = st_mode"

  - id: entry-overwrite-commentary
    desc: Writes virus at entry point
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "Write viral code at the entry point of"

  - id: host-entry-restore-commentary
    desc: Restores original entry point code
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "copy the original code to the original entry point"

  - id: eof-host-backup-commentary
    desc: Appends host code at EOF
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "Write host code at EOF"

  - id: eof-original-data-storage
    desc: Stores original data at EOF
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "original data will be stored at EOF"

  - id: reinfection-guard-asm
    desc: Already infected comment
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "already infected :("

  - id: entry-byte-compare-asm
    desc: Compares entry bytes with self
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "cmp dword [esi],eax"

  - id: phdr-entry-walk-asm
    desc: Searches program headers for entry
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "search for the PHDR entry"

  - id: phdr-entry-bounds-asm
    desc: Uses segment bounds around entry
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "p_paddr + p_memsz > entry point"

  - id: local-dir-elf-scope-marker
    desc: Targets local directory ELF files
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "Target     :  ELF (Executable and Linking Format) files in the local directory"

  - id: directory-search-routine-asm
    desc: Search routine over directory entries
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "searches for files in esi"

composite_rules:
  - id: local-executable-filter
    desc: Filters regular executable files
    crit: notable
    conf: 0.9
    all:
      - id: local-executable-filter-asm
      - id: owner-exec-filter-asm

  - id: entry-overwrite-host-restore
    desc: Overwrites entry and restores host
    crit: suspicious
    conf: 0.93
    all:
      - id: entry-overwrite-commentary
      - id: host-entry-restore-commentary

  - id: eof-host-backup
    desc: Backs up original host at EOF
    crit: suspicious
    conf: 0.94
    all:
      - id: eof-host-backup-commentary
      - id: eof-original-data-storage

  - id: reinfection-guard
    desc: Compares entry bytes to avoid reinfection
    crit: suspicious
    conf: 0.88
    all:
      - id: reinfection-guard-asm
      - id: entry-byte-compare-asm

  - id: phdr-entry-walk
    desc: Walks program headers for entry
    crit: notable
    conf: 0.87
    all:
      - id: phdr-entry-walk-asm
      - id: phdr-entry-bounds-asm

  - id: local-dir-elf-infection-scope
    desc: Targets local directory ELF files
    crit: suspicious
    conf: 0.93
    all:
      - id: local-dir-elf-scope-marker
      - id: directory-search-routine-asm

  - id: elf-entry-overwrite-infector-source
    desc: ELF entry overwrite file infector source
    crit: hostile
    conf: 0.98
    attack: T1204
    mbc: B0009
    all:
      - id: elf-magic-check-asm
      - id: local-executable-filter
      - id: entry-overwrite-host-restore
      - id: eof-host-backup
    any:
      - id: reinfection-guard
      - id: phdr-entry-walk
      - id: local-dir-elf-infection-scope
    needs: 1

  - id: local-elf-file-infector-profile
    desc: Local ELF executable infection workflow
    crit: suspicious
    conf: 0.95
    all:
      - id: local-executable-filter
      - id: local-dir-elf-infection-scope
    any:
      - id: phdr-entry-walk
      - id: reinfection-guard
      - id: eof-host-backup
    needs: 3
