defaults:
  platforms: [windows]
  for: [batch]
  attack: T1204

traits:
  - id: vxbody-section-linker
    desc: VX body writable executable section
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /SECTION:.vxbody,ERW

  - id: vxmain-entrypoint
    desc: VX main linker entrypoint
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /ENTRY:vxmain

  - id: merge-text-vxbody
    desc: Merges text into VX body
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /MERGE:.text=.vxbody

composite_rules:
  - id: batch-vxbody-pe-builder
    desc: Batch builds VX-body PE executable
    crit: hostile
    conf: 0.98
    all:
      - id: vxbody-section-linker
      - id: vxmain-entrypoint
      - id: merge-text-vxbody
