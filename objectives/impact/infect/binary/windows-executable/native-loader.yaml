defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: encrypted-pe-file-rewrite-loader
    desc: Encrypted native loader rewrites enumerated PE files
    crit: hostile
    conf: 0.97
    attack: T1027,T1140,T1485
    all:
      - id: objectives/anti-static/obfuscation/imports::pe-mz-compare-x64
      - id: objectives/anti-static/obfuscation/imports::pe-e-lfanew-walk-x64-text
      - id: micro-behaviors/data/decode/xor::x64-byte-xor-decode-loop
      - id: micro-behaviors/fs/enumerate/directory::find-file-walker-wide-ex
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/read::read-file
      - id: micro-behaviors/fs/file/write/direct::write-file
      - id: micro-behaviors/fs/file/handle::set-file-pointer-ex
      - id: micro-behaviors/fs/file/delete::deletefile-w
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/
      - id: well-known/tool/reverse-engineering/
