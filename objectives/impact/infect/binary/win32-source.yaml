defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: win32-virus-source-header
    desc: Win32 virus source PE patching
    crit: suspicious
    any:
      - id: micro-behaviors/fs/file/section::asm-pe-header-manipulation
      - id: micro-behaviors/fs/file/section::asm-pe-header-manipulation-offsets
  - id: win32-virus-source-propagation
    desc: Win32 virus source propagation logic
    crit: suspicious
    needs: 2
    any:
      - id: micro-behaviors/crypto/symmetric/xor::asm-rol-not-loop
      - id: micro-behaviors/fs/memory/mmap::win32-file-mapping
      - id: micro-behaviors/fs/infect/appending::pe-last-section-append-source
      - id: well-known/malware/virus/jacky::jacky-strings
  - id: win32-virus-source
    desc: Win32 Virus Source Code (Jacky/Cabanas style)
    crit: hostile
    all:
      - id: objectives/impact/infect/binary::win32-virus-source-header
      - id: micro-behaviors/process/create/load/manual-import::asm-manual-import-offset-parsing
      - id: objectives/impact/infect/binary::win32-virus-source-propagation
