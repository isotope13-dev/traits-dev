defaults:
  platforms:
    - unix
    - windows
    - macos
traits:
  - id: parasitic-direct-action-comment
    desc: Parasitic direct-action infector comment
    crit: suspicious
    conf: 0.95
    for:
      - c
    if:
      type: string_value
      substr: parasitic direct action infector of PE exe/dll
composite_rules:
  - id: parasitic-direct-action-source
    desc: Parasitic direct-action PE infector source
    crit: hostile
    conf: 0.97
    for:
      - c
    all:
      - id: parasitic-direct-action-comment
    any:
      - id: micro-behaviors/fs/traversal/drives::infector-directory-traversal-source
      - id: objectives/impact/infect/micro/epo::pe-tls-callback-infection-source
      - id: objectives/impact/infect/micro/appending::pe-reloc-append-source
  - id: win32-virus-source-header
    desc: Win32 virus source PE patching
    crit: suspicious
    any:
      - id: micro-behaviors/fs/file/section::asm-pe-header-manipulation
      - id: micro-behaviors/fs/file/section::asm-pe-header-manipulation-offsets
  - id: win32-virus-source-propagation
    desc: Win32 virus source propagation logic
    crit: suspicious
    needs: 2
    unless:
      - id: metadata/format/magic::pe-dos-stub
    downgrade:
      any:
        - id: metadata/format/installer::nsis
        - id: metadata/format/installer::known-benign-installer
        - id: metadata/quality/versioning::pe-version-resource
    any:
      - id: micro-behaviors/crypto/symmetric/xor::asm-rol-not-loop
      - id: micro-behaviors/fs/memory/mmap::win32-file-mapping
      - id: micro-behaviors/fs/memory/mmap::win32-file-mapping-source-cluster
      - id: objectives/impact/infect/micro/appending::pe-last-section-append-source
      - id: well-known/malware/virus/jacky::jacky-strings
  - id: win32-virus-source
    desc: Win32 Virus Source Code (Jacky/Cabanas style)
    crit: hostile
    all:
      - id: objectives/impact/infect/binary::win32-virus-source-header
      - id: objectives/evasion/process/injection::asm-manual-import-offset-parsing
      - id: objectives/impact/infect/binary::win32-virus-source-propagation
