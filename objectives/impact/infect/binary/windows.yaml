defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: bak-extension-filter
    desc: Filters backup-style .bak targets
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (?i)\.bak\b
  - id: tmp-extension-staging
    desc: Uses temporary .tmp staging file
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (?i)\.tmp\b
  - id: ghost-image-filter
    desc: Excludes Ghost image extensions
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: (?i)\.gho\b
  - id: skip-windows-install-dir
    desc: Skips Windows installation directories
    crit: component
    conf: 0.85
    if:
      type: text
      regex: \b(WINDOWS|WINNT)\b
composite_rules:
  - id: legacy-win32-file-infector-io
    desc: Legacy Win32 infector file I/O cluster
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/fs/enumerate/directory::find-first-file-a
      - id: micro-behaviors/fs/file/open::legacy-file-open-create
      - id: micro-behaviors/fs/file/read::lread
      - id: micro-behaviors/fs/file/write::lwrite
      - id: micro-behaviors/fs/file/truncate::llseek
    any:
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
  - id: rewrite-executable-via-temp-and-backup
    desc: Rewrites executable via temp and backup files
    crit: suspicious
    conf: 0.92
    unless:
      - id: metadata/binary/installer::known-benign-installer
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
    all:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: bak-extension-filter
      - id: tmp-extension-staging
      - id: micro-behaviors/fs/file/rename::any-rename
      - id: micro-behaviors/fs/file/delete::deletefile-a
  - id: recursive-pe-infector
    desc: Recursively infects PE files across drives
    crit: hostile
    conf: 0.95
    all:
      - id: rewrite-executable-via-temp-and-backup
      - id: micro-behaviors/fs/traversal/drives::get-logical-drives
      - id: micro-behaviors/dylib/library::mfc42-ref
    any:
      - id: skip-windows-install-dir
      - id: ghost-image-filter
      - id: objectives/evasion/self-delete/file::comspec-shortpath-self-delete
  - id: drive-spreading-file-infector
    desc: File infector enumerating drives and executables
    crit: suspicious
    conf: 0.94
    all:
      - id: legacy-win32-file-infector-io
      - id: micro-behaviors/fs/traversal/drives::drive-context-switching
    any:
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
