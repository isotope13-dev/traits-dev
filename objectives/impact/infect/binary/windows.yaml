defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: bak-extension-filter
    desc: Filters backup-style .bak targets
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)\.bak\b'
  - id: tmp-extension-staging
    desc: Uses temporary .tmp staging file
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)\.tmp\b'
  - id: ghost-image-filter
    desc: Excludes Ghost image extensions
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: '(?i)\.gho\b'
  - id: skip-windows-install-dir
    desc: Skips Windows installation directories
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\b(WINDOWS|WINNT)\b'
  - id: zombie-host-drop-path
    desc: Drops preserved host as Zombie
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: \Zombie
  - id: zombie-temp-drop-cluster
    desc: Temp staging adjacent to Zombie host
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: (?i)tmp.{0,8}\\zombie
  - id: gho-bak-whitelist-cluster
    desc: Adjacent GHO and BAK whitelist bytes
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: (?i)bak.{0,8}gho
  - id: exe-winnt-filter-cluster
    desc: EXE filter adjacent to WINNT skip
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: (?i)exe.{0,8}winnt

composite_rules:
  - id: legacy-win32-file-infector-io
    desc: Legacy Win32 infector file I/O cluster
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/fs/enumerate/directory::find-first-file-a
      - id: micro-behaviors/fs/file/open::legacy-file-open-create
      - id: micro-behaviors/fs/file/read::lread
      - id: micro-behaviors/fs/file/write::lwrite
      - id: micro-behaviors/fs/file/truncate::llseek
    any:
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
  - id: rewrite-executable-via-temp-and-backup
    desc: Rewrites executable via temp and backup files
    crit: suspicious
    conf: 0.92
    unless:
      - id: metadata/binary/installer::known-benign-installer
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
    all:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: bak-extension-filter
      - id: tmp-extension-staging
      - id: micro-behaviors/fs/file/rename::any-rename
      - id: micro-behaviors/fs/file/delete::deletefile-a
  - id: recursive-pe-infector
    desc: Recursively infects PE files across drives
    crit: hostile
    conf: 0.95
    all:
      - id: rewrite-executable-via-temp-and-backup
      - id: micro-behaviors/fs/traversal/drives::logical-drive-enumeration
      - id: micro-behaviors/dylib/library::mfc42-ref
    any:
      - id: skip-windows-install-dir
      - id: ghost-image-filter
      - id: objectives/evasion/self-delete/file::comspec-shortpath-self-delete
  - id: wait-and-run-dropped-host
    desc: Runs dropped host and waits
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/info/current::get-module-filename
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/spawn::wait-for-single-object
    any:
      - id: micro-behaviors/fs/file/attributes::set-file-attributes-a-any
      - id: objectives/evasion/self-delete/file::slash-c-del-fragment
    unless:
      - id: objectives/discovery/host/system::magick-native-dll-basename
      - id: metadata/binary/installer/script::nsis
  - id: packed-prepender-file-infector
    desc: Packed prepender infects files and preserves host
    crit: hostile
    conf: 0.97
    all:
      - id: rewrite-executable-via-temp-and-backup
      - id: micro-behaviors/fs/traversal/drives::logical-drive-enumeration
      - id: wait-and-run-dropped-host
      - id: objectives/anti-static/pack/detect::upx-marker
    any:
      - id: micro-behaviors/dylib/library::mfc42-ref
      - id: skip-windows-install-dir
      - id: ghost-image-filter
  - id: destructive-packed-prepender
    desc: Packed prepender infects files and wipes others
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/traversal/drives::logical-drive-enumeration
      - id: wait-and-run-dropped-host
      - id: objectives/anti-static/pack/detect::upx-marker
      - id: objectives/impact/destroy/file-deletion::exe-gho-bak-whitelist
    any:
      - id: micro-behaviors/fs/file/delete::delete-win
      - id: skip-windows-install-dir
      - id: ghost-image-filter
      - id: micro-behaviors/dylib/library::mfc42-ref
  - id: drive-spreading-file-infector
    desc: File infector enumerating drives and executables
    crit: suspicious
    conf: 0.94
    all:
      - id: legacy-win32-file-infector-io
      - id: micro-behaviors/fs/traversal/drives::drive-context-switching
    any:
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
  - id: zombie-host-preserving-prepender
    desc: Packed prepender preserves host as Zombie
    crit: suspicious
    conf: 0.97
    all:
      - id: objectives/anti-static/pack/detect::upx-marker
      - id: micro-behaviors/os/env/vars::comspec-env-var
      - id: objectives/evasion/self-delete/file::slash-c-del-fragment
      - id: zombie-temp-drop-cluster
    any:
      - id: zombie-host-drop-path
      - id: micro-behaviors/dylib/library::mfc42-ref
      - id: exe-winnt-filter-cluster
  - id: zombie-prepender-whitelist-wiper
    desc: Packed prepender whitelists exe and wipes rest
    crit: hostile
    conf: 0.99
    all:
      - id: zombie-host-preserving-prepender
      - id: gho-bak-whitelist-cluster
      - id: exe-winnt-filter-cluster
    any:
      - id: zombie-host-drop-path
      - id: skip-windows-install-dir
      - id: micro-behaviors/dylib/library::mfc42-ref
