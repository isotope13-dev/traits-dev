defaults:
  platforms: [windows, unix]
  for: [c, text]
  attack: T1204

traits:
  - id: dos-asm-find-first
    desc: DOS find-first file scan
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(\bah\s*,\s*0?4eh|\bax\s*,\s*0?4e00h|find first file)'

  - id: dos-asm-find-next
    desc: DOS find-next file scan
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(\bah\s*,\s*0?4fh|\bax\s*,\s*0?4f00h|find next file)'

  - id: dos-asm-set-dta
    desc: DOS sets local DTA
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)(mov\s+ah,0?1ah|\bDTA\b)'

  - id: dos-asm-com-mask
    desc: Quoted wildcard COM file mask
    crit: component
    conf: 0.93
    if:
      type: text
      regex: '(?i)["'']\*\.COM["'']'
    unless:
      - id: well-known/app/openssl/
      - id: well-known/app/nss::nss-crypto-test-data
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree

  - id: dos-asm-exe-mask
    desc: DOS EXE file mask
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '(?i)["'']\*\.EXE["'']'

  - id: dos-asm-open-rw
    desc: DOS opens file read-write
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(\bax\s*,\s*0?3d02h|open file for read/write)'

  - id: dos-asm-open-helper-rw
    desc: DOS opens target via helper
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bal\s*,\s*2[\s\S]{0,40}call\s+open'

  - id: dos-asm-read-handle
    desc: DOS reads target handle
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)(\bah\s*,\s*0?3fh|read file)'

  - id: dos-asm-write-handle
    desc: DOS writes target handle
    crit: suspicious
    conf: 0.9
    if:
      type: text
      # DOS INT 21h/40h requires loading AH (or AX) with the function
      # number.  Do not treat an unrelated instruction such as `test ah,40h`
      # in a C/C++ documentation comment as a file-write operation.
      regex: '(?i)\bmov\s+(ah\s*,\s*0?40h|ax\s*,\s*0?40[0-9a-f]{2}h)\b'

  - id: dos-asm-seek-eof
    desc: DOS seeks to file end
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bax\s*,\s*0?4202h'

  - id: dos-asm-get-file-time
    desc: DOS reads file timestamp
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)mov\s+ax,0?5700h'

  - id: dos-asm-set-file-time
    desc: DOS restores file timestamp
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)mov\s+ax,0?5701h'

  - id: dos-asm-get-attributes
    desc: DOS reads file attributes
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)mov\s+ax,0?4300h'

  - id: dos-asm-set-attributes
    desc: DOS restores file attributes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)mov\s+ax,0?4301h'

  - id: dos-asm-reinfection-marker
    desc: DOS source reinfection marker
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      regex: '(?i)already infected|check.{0,40}infected'
    unless:
      - id: objectives/impact/infect/binary/unix-source::unix-aout-header-source
      - id: objectives/impact/infect/binary/unix-source::unix-coff-header-source

  - id: dos-asm-save3-token
    desc: DOS save3 host-byte label
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bsave3\b'

  - id: dos-asm-original-host-token
    desc: DOS original-host byte marker
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)original host'

  - id: dos-asm-first-three-bytes-marker
    desc: DOS first-three-bytes host marker
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)first 3 bytes.{0,80}(host|entry|jmp|infect)'

  - id: dos-asm-exe-header-patch
    desc: DOS patches EXE header
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)(EXE_PG_SIZE|EXE_INFEC|EXEINFEC)'

  - id: dos-asm-int21-loadexec-hook
    desc: DOS hooks load-exec call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)CMP\s+AH,0?4BH'

  - id: dos-asm-resident-int21-label
    desc: DOS resident INT21 handler
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)(VIR_INT_21|GOTO_INT21)'

  - id: dos-asm-file-helper-labels
    desc: DOS file helper labels
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)(^|[\r\n])[ \t]*(OPEN_FILE|READ_FILE|WRITE_FILE)[ \t]*:'

  - id: dos-asm-com-exe-branch
    desc: DOS branches COM and EXE
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b(COM_INFEC|EXE_INFEC)\b'

composite_rules:
  - id: dos-asm-host-byte-save
    desc: DOS saves original host bytes
    crit: suspicious
    conf: 0.88
    any:
      - id: dos-asm-save3-token
      - id: dos-asm-original-host-token
      - id: dos-asm-first-three-bytes-marker
    unless:
      - id: well-known/app/obs-studio
      - id: well-known/lib/hpc

  - id: dos-asm-open-target-rw
    desc: DOS opens target read-write
    crit: component
    conf: 0.9
    any:
      - id: dos-asm-open-rw
      - id: dos-asm-open-helper-rw

  - id: dos-int21-file-infection-sequence
    desc: DOS INT21 file infection sequence
    crit: hostile
    conf: 0.97
    all:
      - id: dos-asm-find-first
      - id: dos-asm-open-target-rw
      - id: dos-asm-write-handle
    any:
      - id: dos-asm-find-next
      - id: dos-asm-set-dta
      - id: dos-asm-com-mask
      - id: dos-asm-exe-mask
      - id: dos-asm-read-handle

  - id: dos-asm-reinfection-guard
    desc: DOS source reinfection guard
    crit: suspicious
    conf: 0.92
    for: [c, cpp]
    all:
      - id: dos-asm-reinfection-marker
      - id: dos-int21-file-infection-sequence

  - id: dos-append-preserve-infector
    desc: DOS append infector preserving metadata
    crit: hostile
    conf: 0.98
    all:
      - id: dos-int21-file-infection-sequence
      - id: dos-asm-seek-eof
    any:
      - id: dos-asm-get-file-time
      - id: dos-asm-set-file-time
      - id: dos-asm-get-attributes
      - id: dos-asm-set-attributes
      - id: dos-asm-reinfection-guard
      - id: dos-asm-host-byte-save
    needs: 3

  - id: dos-com-exe-infector-source
    desc: DOS COM and EXE infector source
    crit: hostile
    conf: 0.98
    all:
      - id: dos-asm-com-mask
      - id: dos-asm-exe-mask
      - id: dos-asm-exe-header-patch
      - id: dos-asm-write-handle
    any:
      - id: dos-asm-reinfection-guard
      - id: dos-asm-host-byte-save
      - id: dos-asm-set-file-time

  - id: dos-resident-loadexec-infector
    desc: DOS resident load-exec infector
    crit: hostile
    conf: 0.97
    all:
      - id: dos-asm-int21-loadexec-hook
      - id: dos-asm-resident-int21-label
      - id: dos-asm-file-helper-labels
      - id: dos-asm-com-exe-branch
    any:
      - id: dos-asm-exe-header-patch
      - id: dos-asm-reinfection-guard
      - id: dos-asm-write-handle
