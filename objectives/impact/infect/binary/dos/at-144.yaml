defaults:
  platforms: [unix, windows]
  for: [batch]
traits:
  - id: qb-dir-exe-shell
    desc: QBasic lists EXE hosts
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'SHELL "DIR /b *.exe'

  - id: qb-copy-self-over-host
    desc: QBasic copies self over host
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: '"copy " + ProgramName$ + " " + host$'

  - id: qb-dos-psp-programname
    desc: QBasic reads DOS PSP name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Regs\.ax = &H5100.{0,80}Interrupt &H21'
composite_rules:
  - id: qb-exe-overwrite-infector
    desc: QBasic EXE overwrite infector
    crit: hostile
    conf: 0.98
    all:
      - id: qb-dir-exe-shell
      - id: qb-copy-self-over-host
      - id: qb-dos-psp-programname

  - id: at-144-virus
    desc: "Virus.MSDOS.Unknown.vir17 (AT 144) - Resident COM infector using IVT and INT B4h"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/msdos/interrupt::ivt-segment-val
      - id: micro-behaviors/os/msdos/interrupt::ivt-segment-reg
      - id: objectives/persistence/system/int-hook::int-b4-call
      - id: objectives/persistence/system/int-hook::ivt-self-check
