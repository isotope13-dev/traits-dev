# LNK Shortcut Infector Detection
# Detects malware that hijacks Windows .LNK shortcut files via IShellLink COM
# ATT&CK: T1547.009 - Shortcut Modification
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1547.009

traits:
- id: desktop-shell-folders-key
  desc: Reads desktop path from Shell Folders registry
  crit: notable
  conf: 0.88
  if:
    type: text
    substr: "Shell Folders"

- id: proxy-arg-encoding-format
  desc: Encodes original target path in argument string
  crit: component
  conf: 0.9
  if:
    type: string_literal
    substr: '*%s*%d'
composite_rules:
- id: lnk-shortcut-infector-source
  desc: LNK shortcut infector via IShellLink COM API
  crit: hostile
  conf: 0.96
  mbc: F0012
  all:
  - id: micro-behaviors/os/com/object::ishelllink-interface
  - id: micro-behaviors/os/com/object::clsid-shelllink-constant
  - id: micro-behaviors/fs/enumerate/directory::lnk-glob-pattern-source
  - id: micro-behaviors/os/com/object::ishelllink-set-path
  any:
  - id: objectives/persistence/login/startup/registry::copy-to-sysdir-source
  - id: micro-behaviors/os/com/object::ishelllink-set-arguments
- id: lnk-infector-proxy-execution
  desc: LNK infector with proxy execution of original target
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/os/com/object::ishelllink-set-path
  - id: proxy-arg-encoding-format
  any:
  - id: micro-behaviors/process/create/exec::shell-execute-source
  - id: micro-behaviors/process/create/exec::shell-execute-call-source
- id: lnk-desktop-target-enumeration
  desc: Enumerates desktop shortcuts via registry and wildcard
  crit: suspicious
  conf: 0.91
  all:
  - id: desktop-shell-folders-key
  - id: micro-behaviors/fs/enumerate/directory::lnk-glob-pattern-source
  any:
  - id: micro-behaviors/os/com/object::ishelllink-interface
  - id: micro-behaviors/os/com/object::ipersistfile-interface
