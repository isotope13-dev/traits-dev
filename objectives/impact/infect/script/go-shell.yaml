defaults:
  platforms: [unix]
  for: [go]
  attack: T1554

traits:
  - id: embedded-shell-self-append-tail
    desc: Embedded shell self-appends to target
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'tail\s+-n\s+\+2\s+\$0\s*>>\s*"\$file"'
    unless:
      - id: metadata/package/testing/

  - id: embedded-shell-self-append-tail-bytes
    desc: Embedded shell self-appends bytes
    crit: suspicious
    conf: 0.97
    platforms: [unix, windows]
    for: [elf, macho, pe]
    if:
      type: text
      substr: 'tail -n +2 $0 >> "$file"'
    unless:
      - id: metadata/package/testing/

composite_rules:
  - id: go-embedded-shell-script-infector
    desc: Go drops and executes shell script infector
    crit: hostile
    conf: 0.99
    near_lines: 90
    all:
      - id: micro-behaviors/process/create/shell/spawn::embedded-shebang-sh
      - id: micro-behaviors/fs/file/write/direct::ioutil-write-file
      - id: micro-behaviors/process/create/direct::exec-command
      - id: embedded-shell-self-append-tail
      - id: micro-behaviors/fs/file/read::head-first-line-file-variable
    any:
      - id: micro-behaviors/fs/chmod/modify::go-os-chmod
      - id: micro-behaviors/fs/directory/traverse::find-root-type-file-command
    needs: 1
    unless:
      - id: metadata/package/testing/

  - id: embedded-shell-script-infector-binary
    desc: Embedded shell script infector in binary
    crit: hostile
    conf: 0.99
    platforms: [unix, windows]
    for: [elf, macho, pe]
    all:
      - id: micro-behaviors/process/create/shell/spawn::embedded-shebang-sh-bytes
      - id: embedded-shell-self-append-tail-bytes
      - id: micro-behaviors/fs/file/read::head-first-line-file-variable-bytes
      - id: micro-behaviors/fs/directory/traverse::find-root-type-file-bytes
    unless:
      - id: metadata/package/testing/
