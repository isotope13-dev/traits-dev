defaults:
  platforms: [netscaler, appliance, unix]
  for: [php]
  attack: T1027.002

traits:
  - id: php-netscale-injection-marker
    desc: PHP NetScaler injection marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: NETSCALE_INJECTED

  - id: php-recursive-php-infect
    desc: PHP recursive file infect
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'RecursiveIteratorIterator[\s\S]{0,260}getExtension\(\) !== .php'

  - id: php-prepend-payload-write
    desc: PHP prepend payload write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'file_put_contents\(\$file->getPathname\(\), \$infected\)'

composite_rules:
  - id: php-recursive-script-infection
    desc: PHP recursive script infection
    crit: hostile
    conf: 0.98
    all:
      - id: php-netscale-injection-marker
      - id: php-recursive-php-infect
    any:
      - id: php-prepend-payload-write
