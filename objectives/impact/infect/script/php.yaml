defaults:
  platforms: [unix, openwrt]
  for: [php]
  attack: T1080

traits:
  - id: php-file-infection-marker-name
    desc: PHP file infection marker name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: INFECT_MARKER

composite_rules:
  - id: php-web-file-infector
    desc: PHP web file infector
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/enumerate/directory::php-recursive-directory-iterator
      - id: php-file-infection-marker-name
      - id: micro-behaviors/fs/write/file/direct::file-put-contents
    any:
      - id: objectives/command-and-control/backdoor/webshell/exec::php-shell-functional
      - id: objectives/command-and-control/beacon/label::backdoor-payload-marker
      - id: micro-behaviors/data/text/malware/terms::infected-marker
    needs: 2
