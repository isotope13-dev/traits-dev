defaults:
  platforms: [unix]
  for: [objc]
  attack: T1189

traits:
  - id: objc-source-infector-marker
    desc: ObjC source infector marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "OBJC_INFECTED::"

  - id: objc-source-extension-loop
    desc: ObjC source extension loop
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\.c", "\.m", "\.mm", "\.h", "\.sh"'

  - id: objc-injected-revshell-stub
    desc: ObjC injects revshell stub
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'INFECTED - callback stub[\s\S]{0,260}reverse shell'

composite_rules:
  - id: objc-source-file-infector
    desc: ObjC source file infector
    crit: hostile
    conf: 0.98
    all:
      - id: objc-source-infector-marker
      - id: objc-source-extension-loop
      - id: objc-injected-revshell-stub
