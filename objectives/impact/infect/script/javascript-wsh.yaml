defaults:
  platforms: [windows]
  for: [javascript, text]
  attack: T1080

traits:
  - id: wsh-script-full-name
    desc: WSH script references its own full path
    crit: component
    conf: 0.9
    if:
      type: text
      word: ScriptFullName

  - id: wsh-fso-file-exists-guard
    desc: WSH FileSystemObject checks target existence
    crit: component
    conf: 0.85
    if:
      type: text
      word: FileExists

  - id: wsh-fso-copyfile-call
    desc: WSH FileSystemObject CopyFile call
    crit: component
    conf: 0.9
    if:
      type: text
      word: CopyFile

  - id: js-random-script-name
    desc: JavaScript builds random .js filename
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'Math\.random\(\)[\s\S]{0,80}\.js'

  - id: js-string-table-random-copyfile
    desc: JS table random and CopyFile
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '["'']random["''][\s\S]{0,120}["'']CopyFile["'']'

  - id: js-string-table-self-fileexists
    desc: JS table self path guard
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '["'']ScriptFullName["''][\s\S]{0,120}["'']FileExists["'']'

composite_rules:
  - id: wsh-self-copy-random-js-worm
    desc: WSH script self-replicates into random JavaScript filenames
    crit: hostile
    conf: 0.98
    attack: T1080, T1059.007
    all:
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: wsh-fso-copyfile-call
      - id: wsh-script-full-name
      - id: js-random-script-name
    any:
      - id: wsh-fso-file-exists-guard
      - id: micro-behaviors/data/control-flow/loop::js-bounded-while-loop

  - id: wsh-string-table-self-copy-worm
    desc: Obfuscated WSH script self-replicates through string-table calls
    crit: hostile
    conf: 0.96
    attack: T1080, T1059.007, T1027
    all:
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: js-string-table-random-copyfile
      - id: js-string-table-self-fileexists
      - id: micro-behaviors/data/control-flow/loop::js-bounded-while-loop
