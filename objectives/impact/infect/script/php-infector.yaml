defaults:
  platforms: [windows, unix]
  for: [php]
traits:
  - id: wordpress-phpunit-test-case
    desc: WordPress PHPUnit test case context
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'extends\s+WP_UnitTestCase|WP_UnitTestCase'
  - id: php-extension-filter
    desc: Detects PHP file extension filtering via substr
    crit: suspicious
    conf: 0.95
    attack: T1083
    if:
      type: text
      regex: substr\s*\(\s*\$?\w+\s*,\s*-\s*3\s*\)\s*==?\s*["']php["']

  - id: php-append-file-mode
    desc: Detects append mode file opening for infection
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "fopen\\s*\\(.{0,80},\\s*[\"']a\\+[\"']\\)"
      case_insensitive: true
  - id: php-overwrite-file-mode
    desc: Detects overwrite-mode file open
    crit: component
    conf: 0.82
    if:
      type: text
      regex: "fopen\\s*\\(.{0,40},\\s*['\"](w|x|c)\\+?['\"]"

  - id: php-write-recreate-call
    desc: Detects PHP file recreation write call
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: file_put_contents
      not:
        - regex: 'file_put_contents\s*\(\s*\$temporaryFile\s*,\s*\$job->code\(\)'

  - id: php-copy-call
    desc: Detects PHP copy file recreation call
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: copy
  - id: php-rename-call
    desc: Detects PHP rename file recreation call
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: rename
  - id: reinfection-marker-check
    desc: Checks string content to avoid reinfection
    crit: suspicious
    conf: 0.9
    attack: T1554
    if:
      type: text
      regex: "strstr\\s*\\(\\s*\\$\\w+\\s*,\\s*[\"'](<\\?php|/\\*|@php_|//\\s*\\w+_infected|eval\\(|base64_decode)"

  - id: payload-body-extraction
    desc: Extracts fixed-size payload from source via substr
    crit: component
    conf: 0.85
    attack: T1554
    if:
      type: text
      regex: "substr\\s*\\(\\s*\\$\\w+\\s*,\\s*0\\s*,\\s*\\d{3,}"

  - id: php-tag-strip
    desc: Strips PHP opening tag from victim content
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "substr\\s*\\(\\s*\\$\\w+\\s*,\\s*5\\s*\\).{0,80}<\\?php|<\\?php.{0,80}substr\\s*\\(\\s*\\$\\w+\\s*,\\s*5\\s*\\)"

  - id: php-tempnam-phpunit
    desc: Creates phpunit temp file
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: "tempnam(sys_get_temp_dir(), 'phpunit_')"

  - id: php-temp-file-job-code-write
    desc: Writes job code to temp file
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: 'file_put_contents\s*\(\s*\$temporaryFile\s*,\s*\$job->code\(\)'

  - id: php-temp-file-cleanup
    desc: Cleans up temporary file
    crit: component
    conf: 0.99
    if:
      type: text
      regex: 'unlink\s*\(\s*\$temporaryFile\s*\)'

composite_rules:
  - id: php-temp-file-write-cleanup
    desc: Writes then cleans up temp file
    crit: baseline
    conf: 0.99
    all:
      - id: php-tempnam-phpunit
      - id: php-temp-file-job-code-write
      - id: php-temp-file-cleanup

  - id: php-unlink-recreate-pattern
    desc: Detects delete-and-recreate file pattern
    crit: notable
    conf: 0.92
    near_bytes: 500
    unless:
      - id: php-temp-file-write-cleanup
      - id: wordpress-phpunit-test-case
      - id: metadata/library/web-frameworks::wordpress-core-package-doc
      - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
      - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
      - id: metadata/library/web-frameworks::wordpress-core-api-symbols
    all:
      - id: micro-behaviors/fs/delete/file::php-unlink
    any:
      - id: php-overwrite-file-mode
      - id: php-write-recreate-call
      - id: php-copy-call
      - id: php-rename-call
      - id: php-append-file-mode

  - id: php-prepender-virus
    desc: PHP prepender virus infection chain
    crit: hostile
    conf: 0.95
    attack: T1554
    all:
      - id: micro-behaviors/fs/read/self::fopen-self-file
      - id: micro-behaviors/fs/directory/traverse::php-dir-traverse-fn
    any:
      - id: micro-behaviors/fs/delete/file::php-unlink
      - id: php-append-file-mode
      - id: php-overwrite-file-mode
    needs: 1
    unless:
      - id: wordpress-phpunit-test-case
      - id: metadata/package/testing/harness::phpunit-ref
      - id: metadata/library/web-frameworks::wordpress-core-package-doc
      - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
      - id: metadata/library/web-frameworks::wordpress-phpunit-test-case

  - id: php-file-infector-full
    desc: PHP file infector with marker avoidance
    crit: hostile
    conf: 0.97
    attack: T1554
    all:
      - id: micro-behaviors/fs/read/self::fopen-self-file
      - id: micro-behaviors/fs/directory/traverse::php-dir-traverse-fn
      - id: reinfection-marker-check
      - id: micro-behaviors/fs/write/file::fwrite
    any:
      - id: payload-body-extraction
      - id: php-tag-strip
    needs: 1
