defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
traits:
  - id: php-extension-filter
    desc: Detects PHP file extension filtering via substr
    crit: suspicious
    conf: 0.95
    attack: T1083
    if:
      type: raw
      regex: substr\s*\(\s*\$?\w+\s*,\s*-\s*3\s*\)\s*==?\s*["']php["']

  - id: php-append-file-mode
    desc: Detects append mode file opening for infection
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: "fopen\\s*\\(.{0,80},\\s*[\"']a\\+[\"']\\)"
      case_insensitive: true

  - id: unlink-call
    desc: Detects PHP unlink file deletion call
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: "unlink\\s*\\("

  - id: php-overwrite-file-mode
    desc: Detects overwrite-mode file open
    crit: component
    conf: 0.82
    if:
      type: raw
      regex: "fopen\\s*\\(.{0,40},\\s*['\"](w|x|c)\\+?['\"]"

  - id: php-write-recreate-call
    desc: Detects PHP file recreation write call
    crit: component
    conf: 0.82
    if:
      type: raw
      regex: "file_put_contents\\s*\\("

  - id: php-copy-call
    desc: Detects PHP copy file recreation call
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: "copy\\s*\\("

  - id: php-rename-call
    desc: Detects PHP rename file recreation call
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: "rename\\s*\\("

  - id: reinfection-marker-check
    desc: Checks string content to avoid reinfection
    crit: suspicious
    conf: 0.9
    attack: T1554
    if:
      type: raw
      regex: "strstr\\s*\\(\\s*\\$\\w+\\s*,\\s*[\"'][^\"']{3,}"

  - id: payload-body-extraction
    desc: Extracts fixed-size payload from source via substr
    crit: component
    conf: 0.85
    attack: T1554
    if:
      type: raw
      regex: "substr\\s*\\(\\s*\\$\\w+\\s*,\\s*0\\s*,\\s*\\d{3,}"

  - id: php-tag-strip
    desc: Strips PHP opening tag from victim content
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: "substr\\s*\\(\\s*\\$\\w+\\s*,\\s*5\\s*\\)"

composite_rules:
  - id: php-unlink-recreate-pattern
    desc: Detects delete-and-recreate file pattern
    crit: suspicious
    conf: 0.92
    all:
      - id: unlink-call
    any:
      - id: php-overwrite-file-mode
      - id: php-write-recreate-call
      - id: php-copy-call
      - id: php-rename-call
      - id: php-append-file-mode

  - id: php-prepender-virus
    desc: PHP prepender virus infection chain
    crit: hostile
    conf: 0.95
    attack: T1554
    all:
      - id: micro-behaviors/fs/read/self::fopen-self-file
      - id: micro-behaviors/fs/directory/traverse::php-dir-traverse-fn
    any:
      - id: unlink-call
      - id: php-append-file-mode
      - id: php-overwrite-file-mode
    needs: 1

  - id: php-file-infector-full
    desc: PHP file infector with marker avoidance
    crit: hostile
    conf: 0.97
    attack: T1554
    all:
      - id: micro-behaviors/fs/read/self::fopen-self-file
      - id: micro-behaviors/fs/directory/traverse::php-dir-traverse-fn
      - id: reinfection-marker-check
      - id: micro-behaviors/fs/write/file::fwrite
    any:
      - id: payload-body-extraction
      - id: php-tag-strip
    needs: 1
