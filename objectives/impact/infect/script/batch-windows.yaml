defaults:
  platforms: [windows]
  for: [batch]
  attack: T1059.003

traits:
  - id: batch-worm-infected-marker
    desc: Batch worm infected marker
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: WORM_INFECTED_MARKER

  - id: batch-recursive-script-infect-loop
    desc: Batch recursive script infect loop
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'for /r .{0,120}\(\*\.bat \*\.cmd\)'
      case_insensitive: true

  - id: batch-prepend-self-call
    desc: Batch prepends self-call payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'call "!_WORM_PATH!" ^& goto :eof'

  - id: batch-random-bat-name
    desc: Batch builds random BAT name
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bset\s+[A-Za-z0-9_]+\s*=\s*%random%[\s\S]{0,120}%[A-Za-z0-9_]+%\.bat\b'

  - id: batch-type-self-append
    desc: Batch appends self into BAT
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\btype\s+%0\s*>>\s*%[A-Za-z0-9_]+%\.bat\b'

  - id: batch-start-generated-bat
    desc: Batch starts generated BAT
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bstart\s+%[A-Za-z0-9_]+%\.bat\b'

  - id: batch-tight-label-loop
    desc: Batch tight label loop
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bgoto\s*:?[A-Za-z0-9_-]{1,12}\b'

  - id: batch-numbered-self-copy-chain
    desc: Batch numbered self-copy chain
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)copy\s+%0\s+%0\.[0-9]{4}\.bat'

  - id: batch-repeated-self-copy-append
    desc: Batch repeated self-copy append
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)copy\s+%0\s+%0\.[0-9]{4}\.bat\s*>>\s*[A-Za-z0-9_.-]+\.bat'

  - id: batch-ctty-nul-stealth
    desc: Batch hides console via ctty nul
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ctty nul

  - id: batch-for-bat-loop
    desc: Batch loops over BAT files
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)for\s+%%[A-Za-z]\s+in\s+\("\*\.bat"\)'

  - id: batch-copy-tmp-append
    desc: Batch appends tmp payload
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)copy\s+%%[A-Za-z]\+c:\\tmp\.bat\s+%%[A-Za-z]'

  - id: batch-autoexec-nt-target
    desc: Batch targets autoexec.NT
    crit: component
    conf: 0.9
    if:
      type: text
      substr: autoexec.NT

composite_rules:
  - id: batch-script-self-infection
    desc: Batch script self-infection
    crit: hostile
    conf: 0.98
    all:
      - id: batch-worm-infected-marker
      - id: batch-recursive-script-infect-loop
      - id: batch-prepend-self-call

  - id: batch-random-self-replication-loop
    desc: Batch random self-replication loop
    crit: hostile
    conf: 0.98
    attack: T1080
    all:
      - id: batch-random-bat-name
      - id: batch-type-self-append
      - id: batch-start-generated-bat
      - id: batch-tight-label-loop

  - id: batch-numbered-self-replication-engine
    desc: Batch numbered replication engine
    crit: hostile
    conf: 0.98
    all:
      - id: batch-numbered-self-copy-chain
      - id: batch-repeated-self-copy-append
      - id: batch-ctty-nul-stealth

  - id: batch-autoexec-script-infection
    desc: Batch autoexec script infection
    crit: suspicious
    conf: 0.96
    all:
      - id: batch-for-bat-loop
      - id: batch-copy-tmp-append
      - id: batch-autoexec-nt-target
