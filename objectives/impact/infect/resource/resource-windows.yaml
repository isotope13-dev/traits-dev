defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: guodong-marker-file
    desc: Guodong marker file path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: c:\guodongguodong.guodong
  - id: svchest-drop-name
    desc: svchost typosquat drop name
    crit: suspicious
    conf: 0.97
    attack: T1036.005
    if:
      type: text
      exact: \svchest.exe
  - id: c-program-files-scan-root
    desc: C drive Program Files scan root
    crit: component
    conf: 0.94
    if:
      type: text
      exact: c:\program files\
  - id: d-program-files-scan-root
    desc: D drive Program Files scan root
    crit: component
    conf: 0.94
    if:
      type: text
      exact: D:\program files\
composite_rules:
  - id: pe-resource-temp-infector
    desc: PE resource infector with temp staging
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/fs/file/write::begin-update-resource-a
      - id: micro-behaviors/fs/file/write::update-resource-a
      - id: micro-behaviors/fs/file/write::end-update-resource-a
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/fs/temp/directory::get-temp-file-name
    any:
      - id: micro-behaviors/fs/enumerate/directory::find-file-walker
      - id: micro-behaviors/data/embedded/payload::pe-magic-in-rsrc
    needs: 1
  - id: dual-program-files-scan
    desc: Dual Program Files infection roots
    crit: suspicious
    conf: 0.96
    all:
      - id: c-program-files-scan-root
      - id: d-program-files-scan-root
  - id: guodong-resource-file-infector
    desc: Guodong resource file infector
    crit: hostile
    conf: 0.99
    attack: T1554
    all:
      - id: pe-resource-temp-infector
      - id: guodong-marker-file
      - id: svchest-drop-name
    any:
      - id: dual-program-files-scan
      - id: micro-behaviors/data/embedded/payload::pe-magic-in-rsrc
      - id: micro-behaviors/fs/enumerate/directory::find-file-walker
    needs: 1
