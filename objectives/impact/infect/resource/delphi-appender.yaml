defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: wildcard-exe-mask
    desc: Literal *.exe*\0 pattern
    crit: component
    if:
      type: hex
      pattern: "2a 2e 65 78 65 2a 00"
      section: ".text"

composite_rules:
  - id: delphi-resource-appender
    desc: Delphi PE resource-section appender pattern
    crit: hostile
    attack: T1554
    all:
      - id: micro-behaviors/fs/file/write/direct::begin-update-resource-a
      - id: micro-behaviors/fs/file/write/direct::update-resource-a
      - id: micro-behaviors/fs/file/write/direct::end-update-resource-a
      - id: micro-behaviors/fs/traversal/drives::get-logical-drive-strings
      - id: wildcard-exe-mask
    any:
      - id: micro-behaviors/fs/enumerate/directory::find-first-file-a
      - id: micro-behaviors/fs/enumerate/directory::find-next-file-a
