defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [perl]
traits:
  - id: perl-shebang-target-check
    desc: Check target for Perl shebang
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'if\s*\(\s*/\(\\#!\.\*perl\)/\s*\)'
  - id: reinfection-guard
    desc: Guard against reinfecting target
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'if\s*\(\s*\$_\s+ne\s+"use File::Find;\\n"\s*\)'
  - id: prepend-virus-bootstrap
    desc: Prepend replication bootstrap lines
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: '\\nuse File::Find;\\n&virus();\\n'
  - id: append-self-subroutine
    desc: Append viral subroutine from self
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'while\s*\(\s*<[A-Za-z_][A-Za-z0-9_]*>\s+ne\s+"sub virus\\n"\s*\)\s*\{\s*\};'
composite_rules:
  - id: script-overwrite-infector
    desc: Overwrite script with self copy
    crit: suspicious
    conf: 0.97
    needs: 3
    any:
      - id: perl-shebang-target-check
      - id: reinfection-guard
      - id: prepend-virus-bootstrap
      - id: append-self-subroutine
