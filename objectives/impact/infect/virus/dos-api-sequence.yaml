# DOS File Infection API Sequence
# Composite detecting the classic DOS file infection pattern:
# find-first/find-next + open + read + write
defaults:
  for: [c]
  platforms: [unix, windows]
composite_rules:
  - id: dos-file-infection-api-sequence
    desc: DOS file infection API sequence
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/msdos/interrupt::int21-find-first
      - id: micro-behaviors/os/msdos/interrupt::int21-find-next
      - id: micro-behaviors/os/msdos/interrupt::int21-open-file
      - id: micro-behaviors/os/msdos/interrupt::int21-read-file
      - id: micro-behaviors/os/msdos/interrupt::int21-write-file
    any:
      - id: micro-behaviors/os/msdos/interrupt::int21-close-file
      - id: micro-behaviors/os/msdos/interrupt::int21-attributes
      - id: micro-behaviors/os/msdos/interrupt::int21-set-dta
