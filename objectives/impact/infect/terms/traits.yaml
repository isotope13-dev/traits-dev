defaults:
  platforms: [windows, unix]
  for: [elf, pe, shell, python, c]
traits:
  - id: infected-with
    desc: Infection notification pattern
    crit: suspicious
    conf: 0.9
    attack: T1204
    if:
      type: text
      regex: .{3,16} infected with .{3,16}
    not:
      - regex: became infected
      - regex: seems to be infected
  - id: infect-file-pattern
    desc: infect file/elf/binary pattern
    crit: component
    if:
      type: text
      regex: infect.{0,10}(file|elf|binary)
      case_insensitive: true
    not:
      - regex: infected_files?
  - id: virus-word
    desc: "Literal 'virus' string"
    crit: component
    for: [elf, pe, shell, python]
    if:
      type: text
      word: virus
      case_insensitive: true
  - id: parasite-word
    desc: "Parasitic-infector 'parasite' term"
    crit: component
    if:
      type: text
      word: parasite
      case_insensitive: true
    unless:
    - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
    - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: scan-elf-pattern
    desc: scan for elf pattern
    crit: component
    if:
      type: text
      regex: \bscan[_\s]+(for[_\s]+)?elf\b
      case_insensitive: true
  - id: find-target-pattern
    desc: find target pattern
    crit: component
    if:
      type: text
      regex: find.{0,10}target
      case_insensitive: true
    unless:
      - id: well-known/app/drivers::nvidia-linux-driver-component
      - id: well-known/app/drivers::gsp-firmware-binary-path
      - id: well-known/app/drivers::arch-nvidia-utils-package
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: objcopy-word
    desc: "objcopy binutils tool name"
    crit: component
    if:
      type: text
      word: objcopy
  - id: binutils-word
    desc: "GNU binutils toolchain name"
    crit: component
    if:
      type: text
      word: binutils
  - id: flex-word
    desc: "flex lexer-generator tool name"
    crit: component
    for: [elf, pe, shell, python]
    if:
      type: text
      word: flex
  - id: lex-word
    desc: "lex lexer-generator tool name"
    crit: component
    if:
      type: text
      substr: ' lex '
      case_insensitive: true
  - id: yacc-word
    desc: "yacc parser-generator tool name"
    crit: component
    if:
      type: text
      word: yacc
  - id: bison-word
    desc: "GNU Bison parser-generator name"
    crit: component
    if:
      type: text
      word: bison
  - id: infected-xor
    desc: XOR-encoded infected string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: infected
      case_insensitive: true
  - id: virus-xor
    desc: XOR-encoded virus string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: virus
  - id: trojan-xor
    desc: XOR-encoded trojan string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: trojan
  - id: worm-xor
    desc: XOR-encoded worm string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: worm
  - id: malware-xor
    desc: XOR-encoded malware string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: malware
  - id: win-error-virus
    desc: Windows ERROR_VIRUS_INFECTED constant
    crit: component
    if:
      type: text
      substr: ERROR_VIRUS_INFECTED
composite_rules:
  - id: infection-terminology
    desc: Infection terminology patterns
    crit: component
    any:
      - id: infect-file-pattern
      - id: virus-word
      - id: parasite-word
      - id: scan-elf-pattern
  - id: infection-specific-context
    desc: Infection context tied to ELF or files
    crit: component
    any:
      - id: infect-file-pattern
      - id: scan-elf-pattern
      - id: find-target-pattern
  - id: legitimate-tools
    desc: Legitimate development tool indicators
    crit: component
    any:
      - id: metadata/lang/compiler/native::llvm-string
      - id: metadata/lang/compiler/native::clang-string
      - id: objcopy-word
      - id: binutils-word
      - id: flex-word
      - id: lex-word
      - id: yacc-word
      - id: bison-word
      - id: micro-behaviors/data/parse/keywords::scanner-word
  - id: elf-infector
    desc: ELF file infector pattern
    crit: suspicious
    conf: 0.95
    for: [elf, shell, python, c]
    attack: T1204
    mbc: B0009
    size_max: 1048576
    all:
      - id: infection-terminology
      - id: scan-elf-pattern
    unless:
      - id: legitimate-tools
      - id: objectives/impact/infect/binary/dos::dos-asm-com-mask
      - id: objectives/impact/infect/binary/dos::dos-asm-exe-header-patch
      - id: objectives/impact/infect/binary/unix-source::unix-companion-comment
      - id: objectives/impact/infect/binary/unix-source::unix-self-state-machine
      - id: metadata/signed/certificate/identity::bitdefender-brand-text
      - id: metadata/binary/vendor::bitdefender-product-marker
  - id: malware-type-xor
    desc: XOR-encoded malware type string
    crit: component
    any:
      - id: virus-xor
      - id: trojan-xor
      - id: worm-xor
      - id: malware-xor
  - id: infected-xor-pattern
    desc: XOR obfuscated infection marker pattern
    crit: suspicious
    conf: 0.95
    attack: T1027
    size_max: 5242880
    all:
      - id: infected-xor
      - id: malware-type-xor
    unless:
      - id: win-error-virus
