defaults:
  platforms: [windows, unix]
  for: [elf, pe, shell, python, c]
traits:
  - id: infected-with
    desc: Infection notification pattern
    crit: suspicious
    conf: 0.9
    attack: T1204
    if:
      type: text
      regex: .{3,16} infected with .{3,16}
    unless:
      - id: well-known/tool/dual-use/rclone::rclone-package-path
    not:
      - regex: became infected
      - regex: seems to be infected
  - id: infect-file-pattern
    desc: infect file/elf/binary pattern
    crit: component
    if:
      type: text
      regex: infect.{0,10}(file|elf|binary)
      case_insensitive: true
    not:
      - regex: infected_files?
  - id: virus-word
    desc: "Literal 'virus' string"
    crit: component
    for: [elf, pe, shell, python]
    if:
      type: text
      word: virus
      case_insensitive: true
  - id: parasite-word
    desc: "Parasitic-infector 'parasite' term"
    crit: component
    if:
      type: text
      word: parasite
      case_insensitive: true
    unless:
    - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
    - id: well-known/app/drivers/
  - id: scan-elf-pattern
    desc: scan for elf pattern
    crit: component
    if:
      type: text
      regex: \bscan[_\s]+(for[_\s]+)?elf\b
      case_insensitive: true
  - id: infected-xor
    desc: XOR-encoded infected string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: infected
      case_insensitive: true
  - id: virus-xor
    desc: XOR-encoded virus string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: virus
  - id: trojan-xor
    desc: XOR-encoded trojan string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: trojan
  - id: worm-xor
    desc: XOR-encoded worm string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: worm
  - id: malware-xor
    desc: XOR-encoded malware string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: malware
composite_rules:
  - id: infection-terminology
    desc: Infection terminology patterns
    crit: component
    any:
      - id: infect-file-pattern
      - id: virus-word
      - id: parasite-word
      - id: scan-elf-pattern
  - id: infection-specific-marker
    desc: Infection marker tied to ELF or files
    crit: notable
    any:
      - id: infect-file-pattern
      - id: scan-elf-pattern
      - id: metadata/file/string/artifact::find-target-phrase
  - id: elf-infector
    desc: ELF file infector pattern
    crit: suspicious
    conf: 0.95
    for: [elf, shell, python, c]
    attack: T1204
    mbc: B0009
    size_max: 1048576
    all:
      - id: infection-terminology
      - id: scan-elf-pattern
    unless:
      - id: objectives/impact/infect/terms/
      - id: objectives/impact/infect/binary/dos::dos-asm-com-mask
      - id: objectives/impact/infect/binary/dos::dos-asm-exe-header-patch
      - id: objectives/impact/infect/binary/unix-source::unix-companion-comment
      - id: objectives/impact/infect/binary/unix-source::unix-self-state-machine
      - id: metadata/signed/certificate/identity::bitdefender-brand-text
      - id: metadata/binary/vendor::bitdefender-product-marker
  - id: malware-type-xor
    desc: XOR-encoded malware type string
    crit: component
    any:
      - id: virus-xor
      - id: trojan-xor
      - id: worm-xor
      - id: malware-xor
  - id: infected-xor-pattern
    desc: XOR obfuscated infection marker pattern
    crit: suspicious
    conf: 0.95
    attack: T1027
    size_max: 5242880
    all:
      - id: infected-xor
      - id: malware-type-xor
    unless:
      - id: micro-behaviors/os/exception/error-handling::virus-detected-error-code
