defaults:
  platforms: [windows, linux, macos]
  for: [data, pe]
  size_min: 512
  size_max: 8192

traits:
  - id: dos-boot-sector-jmp-instruction
    desc: DOS boot sector JMP instruction
    crit: notable
    conf: 1.0
    if:
      type: hex
      pattern: "EB ?? 90"
      offset: 0

  - id: dos-boot-sector-short-jmp
    desc: DOS boot sector short JMP instruction
    crit: notable
    conf: 0.95
    if:
      type: hex
      pattern: "EB ??"
      offset: 0

  - id: dos-boot-sector-near-jmp
    desc: DOS boot sector near JMP instruction
    crit: notable
    conf: 0.95
    if:
      type: hex
      pattern: "E9 ?? ??"
      offset: 0

  - id: dos-boot-sector-far-jmp
    desc: DOS boot sector far JMP instruction
    crit: notable
    conf: 0.95
    if:
      type: hex
      pattern: "EA ?? ?? ?? ??"
      offset: 0

  - id: dos-boot-sector-ending-signature
    desc: DOS boot sector ending signature
    crit: notable
    conf: 1.0
    if:
      type: hex
      pattern: "55 AA"
      offset: 510

  - id: int13h-disk-access
    desc: INT 13h BIOS disk interrupt
    crit: notable
    conf: 1.0
    if:
      type: hex
      pattern: "CD 13"
      offset_range: [0, 512]

composite_rules:
  - id: dos-boot-sector-virus
    desc: DOS boot sector virus pattern
    crit: hostile
    conf: 0.95
    all:
      - id: dos-boot-sector-jmp-instruction
      - id: dos-boot-sector-ending-signature
      - id: int13h-disk-access

  - id: dos-boot-sector-virus-short-jmp
    desc: DOS boot sector virus pattern with short jump
    crit: hostile
    conf: 0.95
    all:
      - id: dos-boot-sector-short-jmp
      - id: dos-boot-sector-ending-signature
      - id: int13h-disk-access

  - id: dos-boot-sector-virus-near-jmp
    desc: DOS boot sector virus pattern with near jump
    crit: hostile
    conf: 0.95
    all:
      - id: dos-boot-sector-near-jmp
      - id: dos-boot-sector-ending-signature
      - id: int13h-disk-access

  - id: dos-boot-sector-virus-far-jmp
    desc: DOS boot sector virus pattern with far jump
    crit: hostile
    conf: 0.95
    all:
      - id: dos-boot-sector-far-jmp
      - id: dos-boot-sector-ending-signature
      - id: int13h-disk-access
