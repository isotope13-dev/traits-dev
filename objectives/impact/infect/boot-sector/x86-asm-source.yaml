defaults:
  platforms: [unix, windows]
  for: [c]

traits:
- id: asm-boot-origin-7c00
  desc: ASM boot origin 7C00
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: 'ORG  0x7C00'

- id: asm-bios-disk-int13-read
  desc: ASM BIOS disk read
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'mov ah,0x02'

- id: asm-bios-disk-interrupt
  desc: ASM BIOS disk interrupt
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'int 0x13'
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-spdx-source-context

- id: asm-stage2-load-address
  desc: ASM loads second stage
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'mov  bx, 0x7E00'

- id: asm-stage2-jump
  desc: ASM jumps second stage
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'jmp 0x7E00'

- id: asm-boot-signature-aa55
  desc: ASM boot signature
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: 'DW 0xAA55'

composite_rules:
- id: asm-boot-sector-stage-loader
  desc: ASM boot sector stage loader
  crit: hostile
  conf: 0.97
  attack: T1542.003
  mbc: F0003
  all:
  - id: asm-boot-origin-7c00
  - id: asm-bios-disk-int13-read
  - id: asm-bios-disk-interrupt
  - id: asm-stage2-load-address
  - id: asm-stage2-jump
  - id: asm-boot-signature-aa55
