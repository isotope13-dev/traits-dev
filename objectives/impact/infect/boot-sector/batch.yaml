defaults:
  platforms: [windows, unix]
  for: [batch]
  attack: T1542.003

traits:
  - id: nasm-bootloader-assembly-build
    desc: NASM builds bootloader binary
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)nasm\s+-o\s+bootloader\.bin\s+bootloader\.asm'

  - id: nasm-kernel-assembly-build
    desc: NASM builds kernel binary
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)nasm\s+-o\s+kernel\.bin\s+kernel\.asm'

composite_rules:
  - id: batch-boot-sector-payload-image-builder
    desc: Batch boot-sector payload image builder
    crit: suspicious
    conf: 0.94
    all:
      - id: nasm-bootloader-assembly-build
      - id: nasm-kernel-assembly-build
      - id: micro-behaviors/data/format/disk-image::dd-bootloader-to-floppy
      - id: micro-behaviors/data/format/disk-image::qemu-floppy-boot-test
