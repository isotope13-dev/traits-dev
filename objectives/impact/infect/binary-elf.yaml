defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: elf-segment-growth
    desc: Grows an ELF program segment
    crit: suspicious
    conf: 0.8
    for:
      - elf
    if:
      type: raw
      regex: p_filesz\s*(\+)?=\s*\w+
  - id: elf-section-growth
    desc: Grows an ELF section
    crit: suspicious
    conf: 0.8
    for:
      - elf
    if:
      type: raw
      regex: sh_size\s*(\+)?=\s*\w+
    not:
      - regex: sh_size=\d+$
  - id: elf-entry-point-redirection
    desc: Redirects ELF entry point
    crit: suspicious
    conf: 0.9
    for:
      - elf
    if:
      type: raw
      regex: (^|[^a-zA-Z_])e_entry\s*=\s*\w+
    not:
      - substr: = unpack
composite_rules:
  - id: elf-section-segment-growth
    desc: Grows both ELF sections and segments
    crit: suspicious
    conf: 0.9
    for:
      - elf
    all:
      - id: elf-segment-growth
      - id: elf-section-growth
  - id: elf-infection-behavior
    desc: Manipulates ELF headers to inject code or segments
    crit: suspicious
    conf: 1.0
    attack: T1542.001
    for:
      - elf
    any:
      - id: elf-section-segment-growth
      - id: elf-entry-point-redirection
