defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1542.003

traits:
  - id: kotlin-grub-custom-entry
    desc: Kotlin GRUB custom entry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/grub\.d/40_custom[\s\S]{0,260}menuentry "Firmware Health Check"'

  - id: kotlin-grub-custom-path
    desc: Kotlin GRUB custom path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/grub.d/40_custom

  - id: kotlin-firmware-menuentry
    desc: Kotlin firmware menuentry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: menuentry "Firmware Health Check"

  - id: kotlin-grub-firmware-loader
    desc: Kotlin GRUB firmware loader
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'linux16 /usr/lib/systemd/system-preset/\.firmware-loader'

composite_rules:
  - id: kotlin-grub-firmware-persistence
    desc: Kotlin GRUB firmware persistence
    crit: hostile
    conf: 0.98
    any:
      - id: kotlin-grub-custom-entry
      - id: kotlin-grub-custom-path
      - id: kotlin-firmware-menuentry
      - id: kotlin-grub-firmware-loader
    needs: 2
