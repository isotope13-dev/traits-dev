defaults:
  platforms: [unix]
  for: [c]

traits:
- id: asm-zip-add-api
  desc: ASM ZIP append helper API
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '\b(extern|call)\s+izip_add\b'

- id: asm-zip-maxaddsize-api
  desc: ASM computes ZIP growth size
  crit: suspicious
  conf: 0.94
  if:
    type: text
    word: "izip_maxaddsize"

- id: asm-host-dropper-buffer
  desc: ASM buffers host payload for archive insertion
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'hostbuffer\s+resb\s+[0-9a-f]+h'

- id: asm-zip-current-dir-readdir
  desc: ASM scans current directory for archive targets
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'mov\s+ebx\s*,\s*dot[\s\S]{0,420}push\s+byte\s+59h[\s\S]{0,80}mov\s+ecx\s*,\s*dir_entry'

- id: asm-archive-grow-truncate
  desc: ASM pre-grows archive before in-place edit
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'push byte 93'

- id: asm-archive-mmap-edit
  desc: ASM mmaps archive for in-place edit
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'push\s+byte\s+90[\s\S]{0,80}mov\s+ebx\s*,\s*mapstruct'

- id: asm-zip-append-call
  desc: ASM appends payload into ZIP archive
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'mov\s+eax\s*,\s*hostbuffer[\s\S]{0,80}call\s+izip_add'

- id: asm-zip-local-central-header-insert
  desc: ASM inserts ZIP local header
  crit: suspicious
  conf: 0.94
  if:
    type: text
    word: "zip_local_sign"

- id: asm-zip-central-header-insert
  desc: ASM inserts ZIP central header
  crit: suspicious
  conf: 0.94
  if:
    type: text
    word: "zip_central_sign"

- id: asm-zip-end-header-update
  desc: ASM updates ZIP end header
  crit: suspicious
  conf: 0.93
  if:
    type: text
    word: "zip_end_sign"

- id: asm-zip-directory-count-bump
  desc: ASM bumps ZIP central directory entry count
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'add dword [esi+ttl_num_of_ent_on_this_disk], 00010001h'

composite_rules:
- id: asm-zip-insertion-library
  desc: ASM ZIP insertion routines
  crit: suspicious
  conf: 0.95
  all:
  - id: asm-zip-add-api
  - id: asm-zip-maxaddsize-api
  any:
  - id: asm-zip-local-central-header-insert
  - id: asm-zip-central-header-insert
  - id: asm-zip-end-header-update
  - id: asm-zip-directory-count-bump
  - id: asm-host-dropper-buffer

- id: asm-current-dir-zip-appender
  desc: ASM current directory ZIP archive appender
  crit: hostile
  conf: 0.98
  attack: T1204
  mbc: B0009
  all:
  - id: asm-zip-insertion-library
  - id: asm-host-dropper-buffer
  - id: asm-zip-current-dir-readdir
  - id: asm-archive-grow-truncate
  - id: asm-archive-mmap-edit
  - id: asm-zip-append-call
