# Windows pre-encryption DB-service-kill literals.
#
# Ransomware targeting Windows-hosted databases (MSSQL, Oracle,
# Exchange, Veeam) embeds the literal Windows service names so it
# can stop them via `net.exe stop` / `sc.exe stop` before
# encryption. Each individual service name in isolation is benign
# (DBA tools, monitoring, the OS itself); the *combination* of two
# or more vendor service names *adjacent to* `net.exe stop` text is
# a textbook ransomware-pre-encryption shape.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1489
  mbc: B0023

traits:
  - id: net-exe-stop-mssql
    desc: net.exe stop MSSQLSERVER literal
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: 'net.exestopMSSQLSERVER'

  - id: oracle-service-name
    desc: OracleServiceOrcl Windows service name
    # `OracleServiceOrcl` is the default Oracle Database service
    # for the `Orcl` instance. It appears in DBA tooling, but in
    # an encryptor binary alongside MSSQL/Exchange service names
    # it becomes a ransomware pre-encryption marker.
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: 'OracleServiceOrcl'

  - id: mssql-service-name
    desc: MSSQLSERVER Windows service name
    crit: notable
    conf: 0.78
    if:
      type: text
      substr: 'MSSQLSERVER'

  - id: exchange-service-name
    desc: Microsoft Exchange Windows service name
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: 'MSExchange[A-Za-z]+'

  - id: veeam-service-name
    desc: Veeam Backup Windows service name
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'Veeam(Backup|Catalog|Mount|Agent)'

composite_rules:
  - id: multi-db-service-kill-pe
    desc: Multi-vendor DB service-kill in PE
    # Two or more vendor service names embedded in a single PE
    # binary indicates a Windows ransomware service-kill stage
    # targeting whatever databases happen to be running on the
    # victim. The composite covers: SQL Server, Oracle, Exchange,
    # Veeam — the standard ransomware "kill before encrypt" set.
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: net-exe-stop-mssql
      - id: oracle-service-name
      - id: mssql-service-name
      - id: exchange-service-name
      - id: veeam-service-name
