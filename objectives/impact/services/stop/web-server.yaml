defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1489
  mbc: E1489
traits:
  - id: kill-httpd
    desc: Terminates httpd process
    crit: suspicious
    conf: 0.9
    if:
      type: text
      # HUP/USR signals reload or gracefully reconfigure httpd; they do not
      # terminate the service and must not satisfy this impact atom.
      regex: 'killall\s+(?!-(HUP|USR1|USR2|WINCH)\b).{0,50}httpd'
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: metadata/package/testing/presence/harness::test-directory
  - id: kill-apache
    desc: Kills apache service
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: killall.{0,50}apache2?
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
  - id: kill-nginx
    desc: Kills nginx service
    crit: suspicious
    conf: 0.9
    size_min: 256
    if:
      type: text
      regex: killall.{0,50}nginx
    not:
      - substr: "killall nginx  #"
    unless:
      - type: text
        substr: "before running the test suite"
      - type: raw
        substr: '#system("killall -9 nginx")'
composite_rules:
  - id: kill-web-server-cmd
    desc: Command to kill web server
    crit: suspicious
    conf: 0.8
    any:
      - id: kill-httpd
      - id: kill-apache
      - id: kill-nginx
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: suspicious-marker
    desc: Suspicious binary characteristics
    crit: notable
    conf: 0.1
    any:
      - id: metadata/binary/metrics/size::tiny-elf
      - id: metadata/binary/layout::binary-format-checked
      - id: micro-behaviors/process/create/shell/spawn::system-fn
      - id: micro-behaviors/process/terminate/command::killall
  - id: web-server-killer
    desc: Tool explicitly designed to kill web servers
    crit: hostile
    conf: 0.95
    all:
      - id: kill-web-server-cmd
      - id: suspicious-marker
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: metadata/package/testing/presence/harness::test-directory
