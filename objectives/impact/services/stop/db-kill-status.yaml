# Database-handle-release operational messages.
#
# Pre-encryption ransomware kills DB services (MSSQL, MySQL, Postgres,
# Oracle, Mongo) so the encryptor can lock open `.mdf`/`.ldf`/`.frm`
# files instead of getting denied by the running DB process. The
# operator-debug status messages "killing database processes…" /
# "error killing database processes: %v" / "killing database
# processes done" are characteristic of this pattern — they're
# format strings for an internal `kill_databases()` routine.
defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  attack: T1489
  mbc: B0023

traits:
  - id: db-kill-status-running
    desc: killing database processes status
    # The literal "killing database processes..." (with trailing
    # ellipsis) is a textbook ransomware-pre-encryption shape.
    # Legitimate DBA tools say stopping or shutting down, not
    # killing.
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      substr: 'killing database processes'

  - id: db-kill-status-done
    desc: database kill completion status
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: 'killing database processes done'

  - id: db-kill-error-fmt
    desc: database kill error format
    # Go-style %v error format — paired with a kill_databases
    # routine. The `%v` verb betrays Go origin without needing the
    # Go-version metadata.
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      substr: 'error killing database processes: %v'

composite_rules:
  - id: db-kill-routine-status
    desc: Pre-encryption database service-kill operational logging
    # Two of the three status messages together is the signature
    # for a structured `kill_databases()` ransomware routine.
    crit: hostile
    conf: 0.96
    needs: 2
    any:
      - id: db-kill-status-running
      - id: db-kill-status-done
      - id: db-kill-error-fmt
