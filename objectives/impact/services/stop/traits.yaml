      - id: kill-mssql-stop
  - id: kill-mongodb
    desc: MongoDB service termination
    crit: notable
    conf: 0.6
    any:
      - id: kill-mongodb-kill
      - id: kill-mongodb-stop
  - id: kill-database
    desc: Database service termination
    crit: notable
    conf: 0.9
    any:
      - id: kill-mysql
      - id: kill-postgres
      - id: kill-oracle
      - id: kill-mssql
      - id: kill-mongodb
  - id: esxi-ransomware-comp
    desc: VMware ESXi ransomware
    crit: suspicious
    conf: 0.99
    attack: "T1486"
    mbc: "B0040"
    all:
      - id: objectives/impact/ransom/esxi::esxcli-tool
      - id: objectives/command-and-control/infrastructure/domain::onion-domain
      - id: objectives/impact/ransom/encrypt::ransom-word
