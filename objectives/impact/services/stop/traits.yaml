defaults:
  platforms:
    - linux
    - macos
    - windows
  attack: T1489
  for: [shell, python, javascript, powershell, pe]
traits:
  - id: versioned-service-stop-context
    desc: Versioned service stop context
    crit: component
    conf: 0.7
    if:
      type: trait
      id: metadata/package/versioning::pe-version-resource
    downgrade:
      any:
        - id: objectives/persistence/system/service/install::service-install-and-start
        - id: micro-behaviors/os/service/control::service-control-dispatch
  - id: systemctl-stop
    desc: Systemd service stop
    crit: suspicious
    conf: 0.8
    platforms: [unix]
    for: [shell, python, javascript]
    if:
      type: text
      regex: systemctl\s+stop\s+\S+
    not:
      - substr: systemctl stop "$container_runtime_name"
      - regex: systemctl\s+stop\s+docker(\.socket)?\b
      - regex: systemctl\s+stop\s+containerd\.service\b
      - substr: systemctl stop devmon@devmon
  - id: systemctl-disable
    desc: Systemd service disable
    crit: suspicious
    conf: 0.8
    platforms: [unix]
    for: [shell, python, javascript]
    if:
      type: text
      regex: (?i)\bsystemctl\s+disable\s+(--now\s+)?\S+
    not:
      - substr: systemctl disable devmon@devmon
      - substr: 'systemctl disable "${SERVICE}"'
      - regex: (?i)machinectl|systemd-nspawn@XXX|wrapper around `systemctl disable
  - id: service-stop-dup
    desc: SysV service stop
    crit: suspicious
    conf: 0.8
    platforms: [unix]
    for: [shell, python, javascript]
    if:
      type: text
      regex: (?i)(^|[;&])\s*(/usr/sbin/)?service\s+[A-Za-z0-9_.@-]+\s+stop\b
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: sc-stop
    desc: Windows service control stop
    crit: notable
    conf: 0.8
    platforms: [windows]
    for: [powershell, pe, python, javascript]
    if:
      type: text
      regex: (?i)\bsc(\.exe)?\s+stop\s+[A-Za-z0-9_.-]{2,}
    not:
      - regex: '%[A-Za-z]'
      - substr: sc stop cloudflared
      - substr: sc stop igfxCUIService
      - substr: sc.exe stop LCD_Service
      - substr: sc stop sppsvc
    downgrade:
      any:
        - id: versioned-service-stop-context
        - id: metadata/binary/installer/family::known-benign-installer
    unless:
      - id: metadata/binary/installer/family::huawei-pcmanager-uninstaller
  - id: net-stop
    desc: Windows net stop command
    crit: notable
    conf: 0.8
    platforms: [windows]
    for: [powershell, pe, python, javascript]
    if:
      type: text
      regex: net\s+stop
  - id: sharedaccess-service-name
    desc: Windows firewall service name
    crit: notable
    conf: 0.94
    platforms: [windows]
    for: [powershell, pe, python, javascript]
    if:
      type: text
      exact: SharedAccess
  - id: sc-config-start-disabled
    desc: Disables Windows service via sc config
    crit: suspicious
    conf: 0.92
    platforms: [windows]
    for: [powershell, pe, python, javascript, batch]
    if:
      type: text
      regex: '(?i)sc\s+config\s+\S+\s+start=\s*disabled'
    downgrade:
      any:
        - id: metadata/binary/installer/family::known-benign-installer
  - id: vmsvc-getallvms
    desc: VMware VM enumeration
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: vmsvc/getallvms
  - id: kill-mysql-kill
    desc: MySQL kill command
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: (?i)kill.{0,30}mysql
  - id: kill-mysql-stop
    desc: MySQL stop command
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: (?i)stop.{0,30}mysql
  - id: kill-postgres-kill
    desc: PostgreSQL kill command
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: (?i)kill.{0,30}postgres
  - id: kill-postgres-stop
    desc: PostgreSQL stop command
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: (?i)stop.{0,30}postgres
  - id: kill-oracle-kill
    desc: Oracle kill command
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: (?i)kill.{0,30}oracle
  - id: kill-oracle-stop
    desc: Oracle stop command
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: (?i)stop.{0,30}oracle
  - id: kill-mssql-kill
    desc: MSSQL kill command
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: (?i)\bkill\b[^\n]{0,30}\bmssql\b
  - id: kill-mssql-stop
    desc: MSSQL stop command
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: (?i)\bstop\b[^\n]{0,30}\bmssql\b
  - id: kill-mongodb-kill
    desc: MongoDB kill command
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: (?i)kill.{0,30}mongodb
  - id: kill-mongodb-stop
    desc: MongoDB stop command
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: (?i)stop.{0,30}mongodb
  - id: tor-service-stop-systemctl
    desc: Tor service stop systemctl command
    crit: suspicious
    conf: 0.7
    platforms: [unix]
    for: [shell, python, javascript]
    if:
      type: text
      regex: systemctl.{0,30}(stop|disable).{0,30}tor
  - id: tor-service-stop-service
    desc: Tor service stop service command
    crit: suspicious
    conf: 0.7
    platforms: [unix]
    for: [shell, python, javascript]
    if:
      type: text
      regex: (?i)\bservice (tor stop|stop tor)\b
    unless:
      - id: metadata/binary/resource::resource-only-dll
  - id: tor-service-stop-launchctl
    desc: Tor service stop launchctl command
    crit: suspicious
    conf: 0.7
    platforms: [macos]
    for: [shell, python, javascript]
    if:
      type: text
      regex: launchctl.{0,30}(stop|disable).{0,30}tor
  - id: tor-service-stop-sc
    desc: Tor service stop sc command
    crit: suspicious
    conf: 0.7
    platforms: [windows]
    for: [powershell, pe, python, javascript]
    if:
      type: text
      regex: \bsc (stop|config).{0,20}\btor\b
  - id: tor-service-stop-suffix
    desc: Tor service stop suffix
    crit: suspicious
    conf: 0.7
    platforms: [unix]
    for: [shell, python, javascript]
    if:
      type: text
      regex: "\btor@?\\.service\b.{0,30}(stop|disable)"
  - id: tor-process-kill
    desc: Tor process termination
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)\b(killall|pkill|taskkill)\b.{0,50}\btor\b
  - id: tor-browser-kill
    desc: Tor Browser termination
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: tor[- ]?browser.{0,50}kill|kill.{0,50}tor[- ]?browser
composite_rules:
  - id: systemd-service-stop-disable
    desc: Systemd service stop and disable
    crit: suspicious
    conf: 0.9
    platforms: [unix]
    for: [shell, python, javascript]
    all:
      - id: systemctl-stop
      - id: systemctl-disable
  - id: versioned-sc-stop-context
    desc: Versioned Windows service stop context
    crit: component
    conf: 0.7
    all:
      - id: versioned-service-stop-context
      - id: sc-stop
  - id: kill-mysql
    desc: MySQL service termination
    crit: suspicious
    conf: 0.6
    any:
      - id: kill-mysql-kill
      - id: kill-mysql-stop
  - id: kill-postgres
    desc: PostgreSQL service termination
    crit: suspicious
    conf: 0.6
    any:
      - id: kill-postgres-kill
      - id: kill-postgres-stop
  - id: kill-oracle
    desc: Oracle service termination
    crit: suspicious
    conf: 0.6
    any:
      - id: kill-oracle-kill
      - id: kill-oracle-stop
  - id: kill-mssql
    desc: MSSQL service termination
    crit: suspicious
    conf: 0.6
    any:
      - id: kill-mssql-kill
      - id: kill-mssql-stop
  - id: sharedaccess-firewall-service-stop
    desc: Stop or tamper firewall service
    crit: suspicious
    conf: 0.97
    all:
      - id: sharedaccess-service-name
      - id: micro-behaviors/os/service/control::service-stop-control
    any:
      - id: micro-behaviors/os/service/control::service-control-dispatch
      - id: micro-behaviors/os/service/control::create-service
      - id: micro-behaviors/os/service/control::query-service-status
    needs: 3
  - id: kill-mongodb
    desc: MongoDB service termination
    crit: suspicious
    conf: 0.6
    any:
      - id: kill-mongodb-kill
      - id: kill-mongodb-stop
  - id: kill-database
    desc: Database service termination
    crit: suspicious
    conf: 0.9
    any:
      - id: kill-mysql
      - id: kill-postgres
      - id: kill-oracle
      - id: kill-mssql
      - id: kill-mongodb
  - id: security-service-disable
    desc: Disables Windows security services
    crit: hostile
    conf: 0.97
    platforms: [windows]
    for: [powershell, pe, python, javascript]
    all:
      - id: sc-config-start-disabled
      - id: sharedaccess-service-name
    any:
      - id: net-stop
      - id: sc-stop
    downgrade:
      any:
        - id: metadata/binary/installer/family::known-benign-installer
        - id: metadata/signed/platform::microsoft
  - id: esxi-ransomware-comp
    desc: VMware ESXi ransomware
    crit: suspicious
    conf: 0.99
    attack: T1486
    mbc: B0040
    all:
      - id: objectives/impact/ransom/esxi::esxcli-tool
      - id: objectives/command-and-control/infrastructure/domain/heuristic::onion-domain
      - id: objectives/impact/ransom/encrypt/threat-text::ransom-word
