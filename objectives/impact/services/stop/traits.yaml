# Impact - Service Manipulation
# ATT&CK: T1489 (Service Stop)
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  attack: "T1489"
  for: [binaries, scripts]
traits:
  - id: versioned-service-stop-context
    desc: Versioned service stop context
    crit: baseline
    conf: 0.7
    if:
      type: trait
      id: metadata/quality/versioning::pe-version-resource
    downgrade:
      any:
        - id: objectives/persistence/system/service/install::service-install-and-start
        - id: micro-behaviors/os/service/control::service-control-dispatch
  - id: systemctl-stop
    desc: Systemd service stop
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "systemctl\\s+stop"
  - id: systemctl-disable
    desc: Systemd service disable
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)\\bsystemctl\\s+disable\\s+(?:--now\\s+)?(?:[A-Za-z0-9_.@:-]{2,}|\".{1,64}\")"
    not:
      - regex: "(?i)machinectl|systemd-nspawn@XXX|wrapper around `systemctl disable"
  - id: service-stop-dup
    desc: SysV service stop
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)(?:^|[;&])\\s*(?:/usr/sbin/)?service\\s+[A-Za-z0-9_.@-]+\\s+stop\\b"
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: sc-stop
    desc: Windows service control stop
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)\\bsc(?:\\.exe)?\\s+stop\\s+[A-Za-z0-9_.-]{2,}"
    not:
      - regex: "%[A-Za-z]"
    downgrade:
      any:
        - id: versioned-service-stop-context
  - id: net-stop
    desc: Windows net stop command
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "net\\s+stop"
  - id: vmsvc-getallvms
    desc: VMware VM enumeration
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: "vmsvc/getallvms"
      # === Database service termination (atomic) ===
  - id: kill-mysql-kill
    desc: MySQL kill command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)kill.{0,30}mysql"
  - id: kill-mysql-stop
    desc: MySQL stop command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)stop.{0,30}mysql"
  - id: kill-postgres-kill
    desc: PostgreSQL kill command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)kill.{0,30}postgres"
  - id: kill-postgres-stop
    desc: PostgreSQL stop command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)stop.{0,30}postgres"
  - id: kill-oracle-kill
    desc: Oracle kill command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)kill.{0,30}oracle"
  - id: kill-oracle-stop
    desc: Oracle stop command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)stop.{0,30}oracle"
  - id: kill-mssql-kill
    desc: MSSQL kill command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)kill.{0,30}mssql"
  - id: kill-mssql-stop
    desc: MSSQL stop command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)stop.{0,30}mssql"
  - id: kill-mongodb-kill
    desc: MongoDB kill command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)kill.{0,30}mongodb"
  - id: kill-mongodb-stop
    desc: MongoDB stop command
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "(?i)stop.{0,30}mongodb"
  - id: tor-service-stop-systemctl
    desc: Tor service stop systemctl command
    crit: suspicious
    conf: 0.7
    if:
      type: string_value
      regex: "systemctl.{0,30}(stop|disable).{0,30}tor"
  - id: tor-service-stop-service
    desc: Tor service stop service command
    crit: suspicious
    conf: 0.7
    if:
      type: string_value
      regex: "(?i)\\bservice (?:tor stop|stop tor)\\b"
    unless:
      - id: metadata/format/pe::resource-only-dll
  - id: tor-service-stop-launchctl
    desc: Tor service stop launchctl command
    crit: suspicious
    conf: 0.7
    if:
      type: string_value
      regex: "launchctl.{0,30}(stop|disable).{0,30}tor"
  - id: tor-service-stop-sc
    desc: Tor service stop sc command
    crit: suspicious
    conf: 0.7
    if:
      type: string_value
      regex: "\\bsc (stop|config).{0,20}\\btor\\b"
  - id: tor-service-stop-suffix
    desc: Tor service stop suffix
    crit: suspicious
    conf: 0.7
    if:
      type: string_value
      regex: "\btor@?\\.service\b.{0,30}(stop|disable)"
  - id: tor-process-kill
    desc: Tor process termination
    crit: suspicious
    conf: 0.7
    if:
      type: string_value
      regex: "(killall|pkill|taskkill).{0,50}[tT]or"
  - id: tor-browser-kill
    desc: Tor Browser termination
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "tor[- ]?browser.{0,50}kill|kill.{0,50}tor[- ]?browser"
      # Removed word-bitcoin duplicate - use objectives/impact/ransom/encrypt::bitcoin-word
composite_rules:
  # Individual database kill composites
  - id: kill-mysql
    desc: MySQL service termination
    crit: notable
    conf: 0.6
    any:
      - id: kill-mysql-kill
      - id: kill-mysql-stop
  - id: kill-postgres
    desc: PostgreSQL service termination
    crit: notable
    conf: 0.6
    any:
      - id: kill-postgres-kill
      - id: kill-postgres-stop
  - id: kill-oracle
    desc: Oracle service termination
    crit: notable
    conf: 0.6
    any:
      - id: kill-oracle-kill
      - id: kill-oracle-stop
  - id: kill-mssql
    desc: MSSQL service termination
    crit: notable
    conf: 0.6
    any:
