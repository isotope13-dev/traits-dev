# Impact - Infection Markers
# ATT&CK: T1204 (User Execution)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: infected-with
    desc: Infection notification pattern
    crit: suspicious
    conf: 0.9
    attack: "T1204"
    if:
      type: string_value
      regex: ".{3,16} infected with .{3,16}"
  # === ELF infector atomic indicators ===
  - id: infect-file-pattern
    desc: infect file/elf/binary pattern
    crit: component
    if:
      type: string_value
      regex: "infect.{0,10}(file|elf|binary)"
      case_insensitive: true
    not:
      - regex: "infected_files?"
  - id: virus-word
    desc: virus word
    crit: component
    if:
      type: string_value
      word: "virus"
      case_insensitive: true
  - id: parasite-word
    desc: parasite word
    crit: component
    if:
      type: string_value
      word: "parasite"
      case_insensitive: true
  - id: scan-elf-pattern
    desc: scan for elf pattern
    crit: component
    if:
      type: string_value
      regex: "\\bscan[_\\s]+(for[_\\s]+)?elf\\b"
      case_insensitive: true
  - id: find-target-pattern
    desc: find target pattern
    crit: component
    if:
      type: string_value
      regex: "find.{0,10}target"
      case_insensitive: true
  # === Exclusion indicators for legitimate tools ===
  # Note: Use metadata/lang/compiler traits for compiler detection
  # These are kept for ELF infector exclusion only - references metadata tier traits
  # Removed llvm-word duplicate - use metadata/lang/compiler::llvm-string
  # Removed clang-word duplicate - use metadata/lang/compiler::clang-string
  - id: objcopy-word
    desc: objcopy word
    crit: component
    if:
      type: string_value
      word: "objcopy"
  - id: binutils-word
    desc: binutils word
    crit: component
    if:
      type: string_value
      word: "binutils"
  - id: flex-word
    desc: flex word
    crit: component
    if:
      type: string_value
      word: "flex"
  - id: lex-word
    desc: lex word
    crit: component
    if:
      type: string_value
      substr: " lex "
      case_insensitive: true
  - id: yacc-word
    desc: yacc word
    crit: component
    if:
      type: string_value
      word: "yacc"
  - id: bison-word
    desc: bison word
    crit: component
    if:
      type: string_value
      word: "bison"
  - id: scanner-word
    desc: scanner word
    crit: component
    if:
      type: string_value
      word: "scanner"
      case_insensitive: true
  # === XOR-encoded infection marker atomic indicators ===
  - id: infected-xor
    desc: XOR-encoded infected string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: "infected"
      case_insensitive: true
  - id: virus-xor
    desc: XOR-encoded virus string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: "virus"
  - id: trojan-xor
    desc: XOR-encoded trojan string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: "trojan"
  - id: worm-xor
    desc: XOR-encoded worm string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: "worm"
  - id: malware-xor
    desc: XOR-encoded malware string
    crit: component
    if:
      type: encoded
      encoding: xor
      word: "malware"
  - id: win-error-virus
    desc: Windows ERROR_VIRUS_INFECTED constant
    crit: component
    if:
      type: string_value
      substr: "ERROR_VIRUS_INFECTED"
composite_rules:
  # === ELF infector composites ===
  - id: infection-terminology
    desc: Infection terminology patterns
    crit: component
    any:
      - id: infect-file-pattern
      - id: virus-word
      - id: parasite-word
      - id: scan-elf-pattern
  - id: infection-specific-context
    desc: Infection context tied to ELF or files
    crit: component
    any:
      - id: infect-file-pattern
      - id: scan-elf-pattern
      - id: find-target-pattern
  - id: legitimate-tools
    desc: Legitimate development tool indicators
    crit: component
    any:
      - id: metadata/lang/compiler::llvm-string
      - id: metadata/lang/compiler::clang-string
      - id: objcopy-word
      - id: binutils-word
      - id: flex-word
      - id: lex-word
      - id: yacc-word
      - id: bison-word
      - id: scanner-word
  - id: elf-infector
    desc: ELF file infector pattern
    crit: suspicious
    conf: 0.95
    attack: "T1204"
    mbc: "B0009"
    size_max: 1048576
    all:
      - id: infection-terminology
      - id: infection-specific-context
    none:
      - id: legitimate-tools
      - id: metadata/sign/certificate::bitdefender-brand-text
  # XOR-encoded malware type indicators
  - id: malware-type-xor
    desc: XOR-encoded malware type string
    crit: component
    any:
      - id: virus-xor
      - id: trojan-xor
      - id: worm-xor
      - id: malware-xor
  # XOR-encoded infection markers composite
  - id: infected-xor-pattern
    desc: XOR obfuscated infection marker pattern
    crit: suspicious
    conf: 0.95
    attack: "T1027"
    size_max: 5242880
    all:
      - id: infected-xor
      - id: malware-type-xor
    none:
      - id: win-error-virus

# NOTE: Simple libc function references are too common in statically linked binaries
# Require explicit infection markers or embedded ELF payloads at non-zero offset
