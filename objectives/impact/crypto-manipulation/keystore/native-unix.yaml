defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1565.001

traits:
  - id: native-bitcoin-wallet-paths
    desc: Native Bitcoin wallet paths
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '\.(bitcoin|btcwallet)|wallet\.dat'

  - id: native-monero-wallet-paths
    desc: Native Monero wallet paths
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '\.(bitmonero|monero-core)'

  - id: native-keystore-corrupt-func
    desc: Native keystore corrupt func
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'corrupt_(ethereum_keystore|bitcoin_wallet|monero_wallet)'

  - id: native-wallet-xor-corrupt
    desc: XOR byte-mask constant
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\^\s*0x(AA|55|FF)'
    unless:
      - id: well-known/lib/spandsp
      - id: well-known/app/openssl/
      - type: text
        substr: GetDigest() const
      - type: text
        substr: CrcGetDigest
      - type: path
        regex: '(^|[\\/])is_utf8[\\/].*src[\\/]is_utf8\.cpp$'
      - type: path
        regex: '(^|[\\/])miniz\.c$'

composite_rules:
  - id: native-wallet-keystore-corrupt
    desc: Wallet keystore corruption pattern
    crit: hostile
    conf: 0.98
    all:
      - id: native-keystore-corrupt-func
    needs: 2
    any:
      - id: native-bitcoin-wallet-paths
      - id: native-monero-wallet-paths
      - id: native-wallet-xor-corrupt
