defaults:
  platforms: [ios]
  for: [rust]
  attack: T1486

traits:
  - id: rust-ios-aes-sensitive-file
    desc: Rust iOS AES sensitive-file encryption
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Aes256[\s\S]{0,180}benchmark_sensitive_data'

  - id: rust-ios-keystore-write
    desc: Rust iOS writes key-store artifact
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: benchmark_key_store.dat

composite_rules:
  - id: rust-ios-keystore-crypto-manipulation
    desc: Rust iOS key-store crypto manipulation
    crit: hostile
    conf: 0.98
    all:
      - id: rust-ios-aes-sensitive-file
      - id: rust-ios-keystore-write
