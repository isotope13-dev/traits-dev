defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1496

traits:
  - id: kotlin-bitcoin-conf-write
    desc: Kotlin bitcoin.conf write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: bitcoin.conf

  - id: kotlin-rpc-credential-change
    desc: Kotlin RPC credential change
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: rpcpassword

  - id: kotlin-bitcoin-sendtoaddress
    desc: Kotlin bitcoin sendtoaddress
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sendtoaddress

  - id: jvm-bitcoin-conf-const
    desc: JVM bitcoin.conf const
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 62 69 74 63 6F 69 6E 2E 63 6F 6E 66

  - id: jvm-bitcoin-sendtoaddress
    desc: JVM bitcoin sendtoaddress
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 73 65 6E 64 74 6F 61 64 64 72 65 73 73

composite_rules:
  - id: kotlin-bitcoin-wallet-manipulation
    desc: Kotlin Bitcoin wallet manipulation
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: kotlin-bitcoin-conf-write
      - id: kotlin-rpc-credential-change
      - id: kotlin-bitcoin-sendtoaddress

  - id: jvm-bitcoin-wallet-manipulation
    desc: JVM Bitcoin wallet manipulation
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-bitcoin-conf-const
      - id: jvm-bitcoin-sendtoaddress
