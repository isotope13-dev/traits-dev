defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: C0027
  crit: suspicious

traits:
  - id: encrypted-payload-bytes
    desc: Encrypted payload bytes staging
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \b(?:encrypt|seal|cipher)\w*\s*\(.{0,80}(payload|data|blob|message)
    not:
      - substr: "encrypt(self, data"

  - id: onchain-document-write
    desc: On-chain document write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: \b(?:addDocument|storeDocument|registerDocument|setContenthash)\s*\(

composite_rules:
  - id: encrypted-ipfs-staging-python
    desc: Encrypted data staged to IPFS
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/services/blockchain::ipfshttpclient-connect
      - id: micro-behaviors/communications/http/services/blockchain::ipfs-add-call
    any:
      - id: encrypted-payload-bytes
      - id: micro-behaviors/crypto/library/blockchain::sha3-keccak-hash
      - id: micro-behaviors/data/text/crypto::base58-or-cid-conversion

  - id: wallet-signed-ipfs-commit
    desc: Wallet-signed IPFS on-chain commit
    crit: hostile
    conf: 0.99
    all:
      - id: encrypted-ipfs-staging-python
      - id: micro-behaviors/crypto/library/blockchain::web3-account-sign
      - id: micro-behaviors/crypto/library/blockchain::web3-send-raw-transaction
    any:
      - id: onchain-document-write
      - id: micro-behaviors/crypto/library/blockchain::sha3-keccak-hash

  - id: wallet-signed-arweave-commit
    desc: Wallet-signed Arweave commit
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/crypto/library/blockchain::web3-account-sign
      - id: micro-behaviors/crypto/library/blockchain::web3-send-raw-transaction
    any:
      - id: micro-behaviors/communications/http/services/blockchain::arweave-channel
      - id: micro-behaviors/crypto/library/blockchain::sha3-keccak-hash
      - id: micro-behaviors/data/serialize/protobuf::protobuf-or-sign-doc

  - id: wallet-signed-presigned-staging
    desc: Wallet-signed presigned staging commit
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/crypto/library/blockchain::web3-account-sign
      - id: micro-behaviors/crypto/library/blockchain::web3-send-raw-transaction
      - id: micro-behaviors/communications/http/services/aws-s3::generate-presigned-url
    any:
      - id: encrypted-payload-bytes
      - id: micro-behaviors/crypto/library/blockchain::sha3-keccak-hash
