defaults:
  platforms: [windows, unix]
  for: [javascript]
  attack: T1027
  mbc: C0027
  crit: suspicious

traits:
  - id: hooked-web3-provider
    desc: Hooked Web3 provider usage
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: HookedWeb3Provider

  - id: transaction-signer-object
    desc: Custom transaction signer object
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\btransaction_signer\s*:'

  - id: keystore-sign-transaction
    desc: Keystore transaction signing
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: \bkeyStore\w*\.signTransaction\s*\(

  - id: lightwallet-keystore
    desc: Ethereum lightwallet keystore
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: \beth-lightwallet\b|lightwallet\.keystore

  - id: ipfs-localhost-api
    desc: Local IPFS API client
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \bIpfsApi\(\s*['"]localhost['"]\s*,\s*['"]5001['"]\s*\)

  - id: ipfs-add-buffer
    desc: IPFS add buffer call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: \bipfs\.add\s*\(

  - id: encryption-claim-fetch
    desc: Encryption claim retrieval
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: \bgetClaims\(\s*['"]encryption_key['"]\s*\)

  - id: asym-encrypt-string
    desc: Asymmetric string encryption
    crit: suspicious
    conf: 0.94
    if:
      type: symbol
      exact: asymEncryptString
  - id: blockchain-document-write
    desc: Blockchain document registration write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: \bdocumentRegistry\.addDocument\s*\(

  - id: sha3-buffer-hash
    desc: SHA3 buffer hash creation
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: \bbufferToHex\s*\(\s*utils\.sha3\s*\(

  - id: base58-hex-conversion
    desc: Base58 to hex conversion
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: \b(?:base58ToHex|hexToBase58)\s*\(

  - id: uport-persona-usage
    desc: uPort persona profile usage
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: \buport\.(?:Persona|MutablePersona)\b

composite_rules:
  - id: wallet-signed-transaction-provider
    desc: Wallet-signed custom transaction provider
    crit: suspicious
    conf: 0.97
    all:
      - id: hooked-web3-provider
      - id: transaction-signer-object
      - id: keystore-sign-transaction
    any:
      - id: lightwallet-keystore
      - id: uport-persona-usage

  - id: encrypted-ipfs-staging
    desc: Encrypted data staged to IPFS
    crit: suspicious
    conf: 0.97
    all:
      - id: ipfs-localhost-api
      - id: ipfs-add-buffer
      - id: asym-encrypt-string
    any:
      - id: encryption-claim-fetch
      - id: base58-hex-conversion

  - id: blockchain-document-channel
    desc: Blockchain document channel staging
    crit: hostile
    conf: 0.98
    all:
      - id: encrypted-ipfs-staging
      - id: blockchain-document-write
      - id: sha3-buffer-hash

  - id: wallet-signed-ipfs-document-drop
    desc: Wallet-signed IPFS document drop
    crit: hostile
    conf: 0.99
    all:
      - id: wallet-signed-transaction-provider
      - id: encrypted-ipfs-staging
      - id: blockchain-document-write
    any:
      - id: encryption-claim-fetch
      - id: sha3-buffer-hash
