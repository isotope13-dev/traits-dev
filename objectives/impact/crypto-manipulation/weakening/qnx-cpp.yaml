defaults:
  platforms: [qnx, unix]
  for: [cpp]
  attack: T1565.001

traits:
  - id: qnx-cpp-crypto-phase-decl
    desc: QNX C++ crypto phase decl
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "void crypto_manipulation(void);"

  - id: qnx-cpp-phase1-call
    desc: QNX C++ phase[1] call
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "phases[1]();"

composite_rules:
  - id: qnx-cpp-crypto-phase-call
    desc: QNX C++ crypto phase call
    crit: suspicious
    conf: 0.96
    all:
      - id: qnx-cpp-crypto-phase-decl
      - id: qnx-cpp-phase1-call

  - id: qnx-cpp-obfuscated-crypto-phase
    desc: QNX C++ obfuscated crypto phase
    crit: hostile
    conf: 0.97
    all:
      - id: qnx-cpp-crypto-phase-call
      - id: objectives/anti-static/obfuscation/control-flow/dispatch::qnx-cpp-opaque-predicate
      - id: objectives/anti-static/obfuscation/control-flow/dispatch::qnx-cpp-phase-fn-table
