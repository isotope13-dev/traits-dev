defaults:
  platforms: [panos, appliance, unix]
  for: [javascript, typescript]
  attack: T1565.001

traits:
  - id: node-createhash-monkeypatch
    desc: Node createHash monkeypatch
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'crypto\.createHash\s*=\s*\('

  - id: node-sha256-md5-downgrade
    desc: Node SHA256 downgraded to MD5
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "sha256'?:\\s*'md5'"

  - id: node-randombytes-bufferalloc
    desc: Node randomBytes Buffer.alloc
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'crypto\.randomBytes\s*=[\s\S]{0,220}Buffer\.alloc'

composite_rules:
  - id: node-crypto-downgrade-rng
    desc: Node crypto downgrade and RNG
    crit: hostile
    conf: 0.98
    all:
      - id: node-createhash-monkeypatch
      - id: node-sha256-md5-downgrade
      - id: node-randombytes-bufferalloc
