defaults:
  platforms: [windows, unix]
  attack: T1565.001
  mbc: E1485
  for: [python]
  crit: suspicious

traits:
  - id: ss58-address-hardcoded
    desc: Hardcoded Substrate/Polkadot SS58 address
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: \b5[1-9A-HJ-NP-Za-km-z]{47}\b
    not:
      - regex: ^[0-9a-fA-F]{48}$
      - regex: (?i)(example|test|sample|dummy|placeholder|fake)
      - substr: "5C4hrfjw9DjXZTzV3MwzrrAr9P1MJhSrvWGWqi1eSuyUpnhM"

  - id: substrate-dest-param-hardcoded
    desc: Hardcoded dest in blockchain call params
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '"dest"\s*:\s*"5[1-9A-HJ-NP-Za-km-z]{47}"'

  - id: transfer-dest-shown-not-used
    desc: Transfer destination shown in prompt but overridden
    crit: suspicious
    conf: 0.88
    if:
      type: string_literal
      regex: destination.{0,60}call_params|call_params.{0,200}destination
      case_insensitive: true

  - id: cosmos-withdraw-reward-msg-python
    desc: Cosmos reward withdrawal message
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: MsgWithdrawDelegationReward|withdraw[_-]?delegation[_-]?reward

  - id: cosmos-delegate-msg-python
    desc: Cosmos delegate message
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: \bMsgDelegate\b|delegate[_-]?tokens|delegate[_-]?tx

  - id: reward-claim-ui-text
    desc: Reward claim transaction text
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: (?i)(claim|withdraw).{0,40}reward|outstanding rewards

  - id: reward-recipient-override
    desc: Reward recipient override
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (withdraw|claim).{0,80}(validator|delegator|recipient|address).{0,120}(recipient|address)

composite_rules:
  - id: substrate-transfer-hijack
    desc: Substrate blockchain transfer destination hijacked
    crit: hostile
    conf: 0.95
    all:
      - id: substrate-dest-param-hardcoded
      - id: ss58-address-hardcoded

  - id: python-wallet-sign-and-broadcast
    desc: Python wallet sign and broadcast
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/crypto/library/blockchain::web3-sign-transaction
      - id: micro-behaviors/crypto/library/blockchain::web3-send-raw-transaction
    any:
      - id: micro-behaviors/crypto/library/blockchain::web3-build-transaction
      - id: micro-behaviors/crypto/library/blockchain::staking-sign-flow

  - id: python-staking-reward-claim-flow
    desc: Python staking reward claim flow
    crit: hostile
    conf: 0.97
    all:
      - id: cosmos-withdraw-reward-msg-python
      - id: micro-behaviors/crypto/library/blockchain::cosmos-broadcast-tx
    any:
      - id: reward-claim-ui-text
      - id: micro-behaviors/crypto/library/blockchain::staking-sign-flow

  - id: python-staking-reward-redirection
    desc: Python staking reward redirection
    crit: hostile
    conf: 0.98
    all:
      - id: python-staking-reward-claim-flow
    any:
      - id: cosmos-delegate-msg-python
      - id: reward-recipient-override
