defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1565.001
  mbc: B0020
  crit: suspicious

traits:
- id: swap-event-handler
  desc: DeFi swap event handler
  crit: notable
  conf: 0.5
  if:
    type: string_literal
    regex: \.on\(['"]Swap['"]

- id: sign-message-builder
  desc: Transaction sign message builder
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: \b(wallet\.)?createSignMessage\s*\(

- id: signed-tx-builder
  desc: Signed transaction builder
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: \b(wallet\.)?createSignedTx\s*\(

- id: tx-broadcast-body-builder
  desc: Transaction broadcast body builder
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: \b(wallet\.)?createBroadcastBody\s*\(

- id: wallet-sign-call
  desc: Wallet sign call chain
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '\b(ledger|wallet|keyStore\w*|this\.state\.ledger)\.sign(Transaction)?\s*\('
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern

- id: signature-import-secp256k1
  desc: secp256k1 signature import
  crit: suspicious
  conf: 0.88
  if:
    type: symbol
    exact: signatureImport
- id: tx-injection-call
  desc: Transaction injection call
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \b(lcd\.)?injectTx\s*\(

- id: web3-balance-read
  desc: Web3 account balance read
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: \b\w+\.eth\.getBalance\s*\(
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern

- id: web3-account-sign-call
  desc: Web3 account signTransaction call
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: \b\w+\.eth\.accounts\.signTransaction\s*\(
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern

- id: web3-send-signed-tx
  desc: Web3 sendSignedTransaction call
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: \b\w+\.eth\.sendSignedTransaction\s*\(
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern

- id: jshex-account-address-env
  desc: Hex-escaped ACCOUNT_ADDRESS env name
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: \x41\x43\x43\x4F\x55\x4E\x54\x5F\x41\x44\x44\x52\x45\x53\x53

- id: jshex-account-private-key-env
  desc: Hex-escaped ACCOUNT_PRIVATE_KEY env name
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: \x41\x43\x43\x4F\x55\x4E\x54\x5F\x50\x52\x49\x56\x41\x54\x45\x5F\x4B\x45\x59

- id: jshex-your-account-address-env
  desc: Hex-escaped YOUR_ACCOUNT_ADDRESS env
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: \x59\x4F\x55\x52\x5F\x41\x43\x43\x4F\x55\x4E\x54\x5F\x41\x44\x44\x52\x45\x53\x53

- id: jshex-your-account-private-key-env
  desc: Hex-escaped YOUR_ACCOUNT_PRIVATE_KEY env
  crit: suspicious
  conf: 0.99
  if:
    type: text
    substr: \x59\x4F\x55\x52\x5F\x41\x43\x43\x4F\x55\x4E\x54\x5F\x50\x52\x49\x56\x41\x54\x45\x5F\x4B\x45\x59

- id: jshex-getbalance
  desc: Hex-escaped getBalance string
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: \x67\x65\x74\x42\x61\x6C\x61\x6E\x63\x65

- id: jshex-sign-transaction
  desc: Hex-escaped signTransaction string
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: \x73\x69\x67\x6E\x54\x72\x61\x6E\x73\x61\x63\x74\x69\x6F\x6E

- id: jshex-send-signed-transaction
  desc: Hex-escaped sendSignedTransaction string
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: \x73\x65\x6E\x64\x53\x69\x67\x6E\x65\x64\x54\x72\x61\x6E\x73\x61\x63\x74\x69\x6F\x6E

- id: cosmos-delegate-msg
  desc: Cosmos delegate message type
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: cosmos-sdk/MsgDelegate

- id: cosmos-redelegate-msg
  desc: Cosmos redelegate message type
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: cosmos-sdk/MsgBeginRedelegate

- id: cosmos-withdraw-reward-msg
  desc: Cosmos reward withdrawal message
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: cosmos-sdk/MsgWithdrawDelegationReward

- id: reward-withdraw-cta
  desc: Reward withdrawal signing prompt
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: Generate\s*&\s*Sign\s*Withdraw\s*Transaction|outstanding rewards

- id: sync-broadcast-mode
  desc: Synchronous transaction broadcast mode
  crit: component
  conf: 0.86
  if:
    type: text
    regex: \bmode\s*:\s*[`'"]sync[`'"]

- id: browser-wallet-provider-hook--rx-1
  desc: '(window|globalThis).(ethereum|solana).(request|send) = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(window|globalThis)\.(ethereum|solana)\.(request|send)\s*='
- id: browser-wallet-provider-hook--rx-2
  desc: 'self.(ethereum|solana).(request|send) = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(self)\.(ethereum|solana)\.(request|send)\s*='
- id: browser-wallet-provider-hook--rx-3
  desc: '(window|globalThis|self).tronWeb.(request|send) = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(window|globalThis|self)\.(tronWeb)\.(request|send)\s*='
- id: browser-wallet-provider-hook--rx-4
  desc: '(window|globalThis).(ethereum|solana).(sendAsync|signAndSendTransaction) = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(window|globalThis)\.(ethereum|solana)\.(sendAsync|signAndSendTransaction)\s*='
- id: browser-wallet-provider-hook--rx-5
  desc: 'self.(ethereum|solana).(sendAsync|signAndSendTransaction) = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(self)\.(ethereum|solana)\.(sendAsync|signAndSendTransaction)\s*='
- id: browser-wallet-provider-hook--rx-6
  desc: '(window|globalThis|self).tronWeb.(sendAsync|signAndSendTransaction) = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(window|globalThis|self)\.(tronWeb)\.(sendAsync|signAndSendTransaction)\s*='
- id: provider-request-wrapper--rx-7
  desc: .sendAsync wallet-provider member access
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.sendAsync\b
- id: provider-request-wrapper--rx-8
  desc: window.ethereum / window.solana wallet-provider access
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \bwindow\.(ethereum|solana|tronWeb)\b
- id: provider-request-wrapper--rx-9
  desc: ethereum.request / solana.request / tronWeb.request access
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(ethereum|solana|tronWeb)\.request\b
- id: provider-request-wrapper--rx-10
  desc: .request({method:...}) RPC-style invocation
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.request\s*\(\s*\{[^}]{0,160}method
- id: provider-request-wrapper--rx-11
  desc: .request.bind / .sendAsync.bind capture
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.(request|sendAsync)\.bind\s*\(
- id: wallet-rpc-send-transaction--rx-12
  desc: '"eth_sendTransaction" / "wallet_sendTransaction" RPC method literal'
  crit: component
  conf: 0.9
  if:
    type: string_literal
    regex: '^(eth_sendTransaction|wallet_sendTransaction)$'
- id: wallet-rpc-send-transaction--rx-13
  desc: '"solana_signAndSendTransaction" / "tron_sendTransaction" RPC literal'
  crit: component
  conf: 0.9
  if:
    type: string_literal
    regex: '^(solana_signAndSendTransaction|tron_sendTransaction)$'
- id: wallet-account-discovery-probe--rx-14
  desc: provider.request({method:"eth_accounts"}) account probe
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(ethereum|provider)\.request\s*\([\s\S]{0,160}\bmethod\s*:\s*[''"]eth_accounts[''"]'
- id: wallet-account-discovery-probe--rx-15
  desc: '"eth_accounts" RPC literal call site'
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '[''"]eth_accounts[''"]\s*\)'
- id: transaction-data-address-rewrite--rx-16
  desc: .replace() over ETH/BTC-SegWit address regex
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.(replace|replaceAll)\s*\(.{0,140}(0x\[a-fA-F0-9\]|bc1\[)'
- id: transaction-data-address-rewrite--rx-17
  desc: .replace() over BitcoinCash/Tron address regex
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.(replace|replaceAll)\s*\(.{0,140}(bitcoincash:|\[T\]\[1-9A-HJ)'
- id: transaction-data-address-rewrite--rx-18
  desc: .replace() over LTC/Solana address regex
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.(replace|replaceAll)\s*\(.{0,140}(ltc1\[|\[1-9A-HJ-NP-Za-km-z\]\{32,44\})'
- id: hardcoded-eth-address-table
  desc: Hardcoded Ethereum wallet address table
  crit: suspicious
  conf: 0.9
  count_min: 3
  if:
    type: text
    regex: '\b0x[a-fA-F0-9]{40}\b'
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
  - id: metadata/library/structure::js-large-minified-bundle
  - id: metadata/library/web3::generated-contract-abi
  - type: raw
    regex: \b(BLOCKED_ADDRESSES|blockedAddresses)\b
  - type: raw
    regex: \b(OFAC|sanctioned?|blocklist)\b
- id: hardcoded-bitcoin-address-table
  desc: Hardcoded Bitcoin wallet address table
  crit: suspicious
  conf: 0.88
  count_min: 2
  if:
    type: text
    regex: '\b(bc1[ac-hj-np-z02-9]{20,87}|[13][a-km-zA-HJ-NP-Z1-9]{25,34})\b'
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
  - id: metadata/binary/metrics/encoded::large-embedded-b64-blob
  - id: objectives/anti-static/obfuscation/code-metrics/string-blob::js-multi-line-blob-benign-text
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: metadata/library/runtime::acquire-vscode-api
  - type: text
    word: tiktoken
- id: hardcoded-tron-address-table
  desc: Hardcoded Tron wallet address table
  crit: suspicious
  conf: 0.88
  count_min: 2
  if:
    type: text
    regex: '\bT[1-9A-HJ-NP-Za-km-z]{33}\b'
  not:
  - regex: '\bT[A-Z][a-z]+(?:[A-Z][a-z]+){2,}\b'
  - regex: '\bT[a-z]+(?:[A-Z][A-Za-z]+){2,}\b'
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
  - id: metadata/lang/scripted::dts-declaration-file
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: well-known/tool/detection/sast::sast-scanner-integration
- id: hardcoded-bch-address-table
  desc: Hardcoded Bitcoin Cash address table
  crit: notable
  conf: 0.86
  count_min: 1
  if:
    type: text
    regex: '\bbitcoincash:[qp][a-zA-Z0-9]{30,60}\b'
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
- id: hardcoded-litecoin-address-table
  desc: Hardcoded Litecoin wallet address table
  crit: notable
  conf: 0.86
  count_min: 1
  if:
    type: text
    regex: '\bltc1[ac-hj-np-z02-9]{20,87}\b'
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
- id: hardcoded-solana-address-table
  desc: Hardcoded Solana wallet address table
  crit: notable
  conf: 0.84
  count_min: 2
  if:
    type: text
    regex: '(?i)\bsolana\b[\s\S]{0,400}\b[1-9A-HJ-NP-Za-km-z]{32,44}\b'
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
- id: solana-config-dir-marker
  desc: Solana config directory marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: .config
- id: solana-cli-dir-marker
  desc: Solana CLI directory marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '[''"]solana[''"],\s*[''"]cli|solana/cli'
- id: solana-config-yml-name
  desc: Solana config.yml filename
  crit: component
  conf: 0.94
  if:
    type: text
    substr: config.yml
- id: solana-json-rpc-url-setting
  desc: Solana JSON RPC URL setting
  crit: component
  conf: 0.95
  if:
    type: text
    substr: json_rpc_url
- id: defi-platform-uniswap
  desc: Uniswap platform name reference
  crit: notable
  conf: 0.78
  if:
    type: text
    word: Uniswap
- id: defi-platform-pancakeswap
  desc: PancakeSwap platform name reference
  crit: notable
  conf: 0.78
  if:
    type: text
    word: PancakeSwap
- id: defi-platform-sushiswap
  desc: SushiSwap platform name reference
  crit: notable
  conf: 0.78
  if:
    type: text
    word: SushiSwap
- id: defi-platform-oneinch
  desc: 1inch platform name reference
  crit: notable
  conf: 0.78
  if:
    type: text
    word: 1inch
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern

composite_rules:
- id: wallet-transaction-build-chain
  desc: Wallet transaction build chain
  crit: suspicious
  conf: 0.96
  all:
  - id: sign-message-builder
  - id: signed-tx-builder
  - id: tx-broadcast-body-builder

- id: wallet-sign-and-broadcast
  desc: Wallet sign then broadcast flow
  crit: suspicious
  conf: 0.97
  all:
  - id: wallet-transaction-build-chain
  - id: wallet-sign-call
  - id: tx-injection-call
  any:
  - id: sync-broadcast-mode
  - id: signature-import-secp256k1
  - id: objectives/credential-access/wallet/provider::eth-send-transaction-method

- id: web3-balance-sign-broadcast
  desc: Web3 balance sign and broadcast
  crit: suspicious
  conf: 0.97
  all:
  - id: web3-balance-read
  - id: web3-account-sign-call
  - id: web3-send-signed-tx

- id: jshex-web3-balance-sign-broadcast
  desc: Hex-escaped Web3 balance sign and broadcast
  crit: suspicious
  conf: 0.99
  all:
  - id: jshex-getbalance
  - id: jshex-sign-transaction
  - id: jshex-send-signed-transaction

- id: blockchain-delegation-hijack
  desc: Blockchain delegation transaction hijack
  crit: hostile
  conf: 0.97
  all:
  - id: wallet-sign-and-broadcast
  any:
  - id: cosmos-delegate-msg
  - id: cosmos-redelegate-msg
  - id: objectives/credential-access/wallet/provider::eth-send-transaction-method

- id: staking-reward-redirection
  desc: Staking reward redirect transaction
  crit: hostile
  conf: 0.98
  all:
  - id: wallet-sign-and-broadcast
  - id: cosmos-withdraw-reward-msg
  any:
  - id: cosmos-delegate-msg
  - id: cosmos-redelegate-msg

- id: staking-reward-withdraw-broadcast
  desc: Staking reward withdrawal broadcast
  crit: hostile
  conf: 0.97
  all:
  - id: wallet-sign-and-broadcast
  - id: cosmos-withdraw-reward-msg
  - id: signature-import-secp256k1

- id: signed-reward-claim-flow
  desc: Signed staking reward claim flow
  crit: hostile
  conf: 0.97
  all:
  - id: wallet-sign-and-broadcast
  - id: cosmos-withdraw-reward-msg
  - id: reward-withdraw-cta

- id: env-wallet-transfer-drain
  desc: Env-backed wallet transfer drain
  crit: hostile
  conf: 0.98
  all:
  - id: web3-balance-sign-broadcast
  - id: objectives/credential-access/env/secrets/wallet::env-wallet-prefix
  - id: objectives/credential-access/env/secrets/wallet::env-private-key

- id: jshex-env-wallet-transfer-drain
  desc: Hex-escaped env wallet transfer drain
  crit: hostile
  conf: 0.995
  all:
  - id: jshex-web3-balance-sign-broadcast
  - id: jshex-account-address-env
  - id: jshex-account-private-key-env

- id: jshex-your-env-wallet-transfer-drain
  desc: Hex-escaped prefixed env wallet drain
  crit: hostile
  conf: 0.997
  all:
  - id: jshex-web3-balance-sign-broadcast
  - id: jshex-your-account-address-env
  - id: jshex-your-account-private-key-env
- id: solana-cli-config-path
  desc: Solana CLI config path
  crit: component
  conf: 0.94
  all:
  - id: solana-config-dir-marker
  - id: solana-cli-dir-marker
  - id: solana-config-yml-name
- id: solana-cli-rpc-hijack
  desc: Solana CLI RPC endpoint hijack
  crit: hostile
  conf: 0.97
  near_bytes: 8192
  all:
  - id: solana-cli-config-path
  - id: solana-json-rpc-url-setting
  - id: micro-behaviors/fs/file/write/direct::js-file-write
  any:
  - id: micro-behaviors/communications/http/url/external-ip::url-external-ip-script
  - id: micro-behaviors/communications/ip/literal::http-ip-url-source-literal
- id: multi-chain-hardcoded-address-table
  desc: Multi-chain hardcoded wallet address table
  crit: notable
  conf: 0.94
  needs: 3
  any:
  - id: hardcoded-eth-address-table
  - id: hardcoded-bitcoin-address-table
  - id: hardcoded-tron-address-table
  - id: hardcoded-bch-address-table
  - id: hardcoded-litecoin-address-table
  - id: hardcoded-solana-address-table
- id: defi-platform-name-cluster
  desc: Multiple DeFi platform name references
  crit: notable
  conf: 0.9
  needs: 2
  any:
  - id: defi-platform-uniswap
  - id: defi-platform-pancakeswap
  - id: defi-platform-sushiswap
  - id: defi-platform-oneinch
- id: browser-wallet-provider-drainer
  desc: Browser wallet transaction drainer
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/data/text/crypto::multi-crypto-regex
  - id: transaction-data-address-rewrite
  any:
  - id: browser-wallet-provider-hook
  - id: provider-request-wrapper
  - id: wallet-rpc-send-transaction
- id: browser-wallet-address-table-drainer
  desc: Browser wallet address table drainer
  crit: hostile
  conf: 0.98
  all:
  - id: multi-chain-hardcoded-address-table
  - id: wallet-account-discovery-probe
  any:
  - id: transaction-data-address-rewrite
  - id: browser-wallet-provider-hook
  - id: provider-request-wrapper
  - id: wallet-rpc-send-transaction
- id: browser-wallet-request-drainer
  desc: Browser wallet request drainer
  crit: hostile
  conf: 0.985
  all:
  - id: browser-wallet-provider-drainer
  any:
  - id: micro-behaviors/process/hook/xhr::request-interceptor
- id: defi-request-address-drainer
  desc: DeFi request address replacement drainer
  crit: hostile
  conf: 0.985
  all:
  - id: defi-platform-name-cluster
  - id: micro-behaviors/data/text/crypto::multi-crypto-regex
  - id: transaction-data-address-rewrite
  - id: micro-behaviors/process/hook/xhr::request-interceptor
- id: browser-wallet-provider-hook
  desc: Browser wallet provider method hook
  crit: suspicious
  conf: 0.94
  any:
  - id: browser-wallet-provider-hook--rx-1
  - id: browser-wallet-provider-hook--rx-2
  - id: browser-wallet-provider-hook--rx-3
  - id: browser-wallet-provider-hook--rx-4
  - id: browser-wallet-provider-hook--rx-5
  - id: browser-wallet-provider-hook--rx-6
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
- id: provider-request-wrapper
  desc: Wallet provider request wrapper
  crit: suspicious
  conf: 0.9
  any:
  - id: provider-request-wrapper--rx-7
  - id: provider-request-wrapper--rx-8
  - id: provider-request-wrapper--rx-9
  - id: provider-request-wrapper--rx-10
  - id: provider-request-wrapper--rx-11
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
- id: wallet-rpc-send-transaction
  desc: Wallet RPC send transaction method
  crit: suspicious
  conf: 0.9
  any:
  - id: wallet-rpc-send-transaction--rx-12
  - id: wallet-rpc-send-transaction--rx-13
- id: wallet-account-discovery-probe
  desc: Browser wallet account discovery probe
  crit: suspicious
  conf: 0.9
  any:
  - id: wallet-account-discovery-probe--rx-14
  - id: wallet-account-discovery-probe--rx-15
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
- id: transaction-data-address-rewrite
  desc: Transaction data address rewrite
  crit: suspicious
  conf: 0.94
  any:
  - id: transaction-data-address-rewrite--rx-16
  - id: transaction-data-address-rewrite--rx-17
  - id: transaction-data-address-rewrite--rx-18
  unless:
  - id: metadata/package/testing/harness/runtime::test-basename-pattern
