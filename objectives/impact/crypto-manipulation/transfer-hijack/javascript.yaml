defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1565.001
  mbc: B0020
  crit: suspicious

traits:
  - id: sign-message-builder
    desc: Transaction sign message builder
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: \b(?:wallet\.)?createSignMessage\s*\(

  - id: signed-tx-builder
    desc: Signed transaction builder
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: \b(?:wallet\.)?createSignedTx\s*\(

  - id: tx-broadcast-body-builder
    desc: Transaction broadcast body builder
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: \b(?:wallet\.)?createBroadcastBody\s*\(

  - id: wallet-sign-call
    desc: Wallet sign call chain
    crit: suspicious
    conf: 0.9
    unless:
      - type: basename
        regex: '\.(?:test|spec)\.[jt]sx?$'
    if:
      type: text
      regex: '\b(?:ledger|wallet|keyStore\w*|this\.state\.ledger)\.sign(?:Transaction)?\s*\('

  - id: signature-import-secp256k1
    desc: secp256k1 signature import
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: \bsignatureImport\s*\(

  - id: tx-injection-call
    desc: Transaction injection call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \b(?:lcd\.)?injectTx\s*\(

  - id: web3-balance-read
    desc: Web3 account balance read
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: \b\w+\.eth\.getBalance\s*\(

  - id: web3-account-sign-call
    desc: Web3 account signTransaction call
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: \b\w+\.eth\.accounts\.signTransaction\s*\(

  - id: web3-send-signed-tx
    desc: Web3 sendSignedTransaction call
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: \b\w+\.eth\.sendSignedTransaction\s*\(

  - id: jshex-account-address-env
    desc: Hex-escaped ACCOUNT_ADDRESS env name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: \x41\x43\x43\x4F\x55\x4E\x54\x5F\x41\x44\x44\x52\x45\x53\x53

  - id: jshex-account-private-key-env
    desc: Hex-escaped ACCOUNT_PRIVATE_KEY env name
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: \x41\x43\x43\x4F\x55\x4E\x54\x5F\x50\x52\x49\x56\x41\x54\x45\x5F\x4B\x45\x59

  - id: jshex-your-account-address-env
    desc: Hex-escaped YOUR_ACCOUNT_ADDRESS env
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: \x59\x4F\x55\x52\x5F\x41\x43\x43\x4F\x55\x4E\x54\x5F\x41\x44\x44\x52\x45\x53\x53

  - id: jshex-your-account-private-key-env
    desc: Hex-escaped YOUR_ACCOUNT_PRIVATE_KEY env
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: \x59\x4F\x55\x52\x5F\x41\x43\x43\x4F\x55\x4E\x54\x5F\x50\x52\x49\x56\x41\x54\x45\x5F\x4B\x45\x59

  - id: jshex-getbalance
    desc: Hex-escaped getBalance string
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: \x67\x65\x74\x42\x61\x6C\x61\x6E\x63\x65

  - id: jshex-sign-transaction
    desc: Hex-escaped signTransaction string
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: \x73\x69\x67\x6E\x54\x72\x61\x6E\x73\x61\x63\x74\x69\x6F\x6E

  - id: jshex-send-signed-transaction
    desc: Hex-escaped sendSignedTransaction string
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: \x73\x65\x6E\x64\x53\x69\x67\x6E\x65\x64\x54\x72\x61\x6E\x73\x61\x63\x74\x69\x6F\x6E

  - id: cosmos-delegate-msg
    desc: Cosmos delegate message type
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: cosmos-sdk/MsgDelegate

  - id: cosmos-redelegate-msg
    desc: Cosmos redelegate message type
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: cosmos-sdk/MsgBeginRedelegate

  - id: cosmos-withdraw-reward-msg
    desc: Cosmos reward withdrawal message
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: cosmos-sdk/MsgWithdrawDelegationReward

  - id: reward-withdraw-cta
    desc: Reward withdrawal signing prompt
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: Generate\s*&\s*Sign\s*Withdraw\s*Transaction|outstanding rewards

  - id: sync-broadcast-mode
    desc: Synchronous transaction broadcast mode
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: \bmode\s*:\s*[`'"]sync[`'"]

  - id: eth-send-transaction-method
    desc: Ethereum sendTransaction RPC method
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: eth_sendTransaction

composite_rules:
  - id: wallet-transaction-build-chain
    desc: Wallet transaction build chain
    crit: suspicious
    conf: 0.96
    all:
      - id: sign-message-builder
      - id: signed-tx-builder
      - id: tx-broadcast-body-builder

  - id: wallet-sign-and-broadcast
    desc: Wallet sign then broadcast flow
    crit: suspicious
    conf: 0.97
    all:
      - id: wallet-transaction-build-chain
      - id: wallet-sign-call
      - id: tx-injection-call
    any:
      - id: sync-broadcast-mode
      - id: signature-import-secp256k1
      - id: eth-send-transaction-method

  - id: web3-balance-sign-broadcast
    desc: Web3 balance sign and broadcast
    crit: suspicious
    conf: 0.97
    all:
      - id: web3-balance-read
      - id: web3-account-sign-call
      - id: web3-send-signed-tx

  - id: jshex-web3-balance-sign-broadcast
    desc: Hex-escaped Web3 balance sign and broadcast
    crit: suspicious
    conf: 0.99
    all:
      - id: jshex-getbalance
      - id: jshex-sign-transaction
      - id: jshex-send-signed-transaction

  - id: blockchain-delegation-hijack
    desc: Blockchain delegation transaction hijack
    crit: hostile
    conf: 0.97
    all:
      - id: wallet-sign-and-broadcast
    any:
      - id: cosmos-delegate-msg
      - id: cosmos-redelegate-msg
      - id: eth-send-transaction-method

  - id: staking-reward-redirection
    desc: Staking reward redirect transaction
    crit: hostile
    conf: 0.98
    all:
      - id: wallet-sign-and-broadcast
      - id: cosmos-withdraw-reward-msg
    any:
      - id: cosmos-delegate-msg
      - id: cosmos-redelegate-msg

  - id: staking-reward-withdraw-broadcast
    desc: Staking reward withdrawal broadcast
    crit: hostile
    conf: 0.97
    all:
      - id: wallet-sign-and-broadcast
      - id: cosmos-withdraw-reward-msg
      - id: signature-import-secp256k1

  - id: signed-reward-claim-flow
    desc: Signed staking reward claim flow
    crit: hostile
    conf: 0.97
    all:
      - id: wallet-sign-and-broadcast
      - id: cosmos-withdraw-reward-msg
      - id: reward-withdraw-cta

  - id: env-wallet-transfer-drain
    desc: Env-backed wallet transfer drain
    crit: hostile
    conf: 0.98
    all:
      - id: web3-balance-sign-broadcast
      - id: objectives/credential-access/env/secrets::env-wallet-prefix
      - id: objectives/credential-access/env/secrets::env-private-key

  - id: jshex-env-wallet-transfer-drain
    desc: Hex-escaped env wallet transfer drain
    crit: hostile
    conf: 0.995
    all:
      - id: jshex-web3-balance-sign-broadcast
      - id: jshex-account-address-env
      - id: jshex-account-private-key-env

  - id: jshex-your-env-wallet-transfer-drain
    desc: Hex-escaped prefixed env wallet drain
    crit: hostile
    conf: 0.997
    all:
      - id: jshex-web3-balance-sign-broadcast
      - id: jshex-your-account-address-env
      - id: jshex-your-account-private-key-env
