defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1565.001
  mbc: B0020
  crit: suspicious

traits:
- id: swap-event-handler
  desc: DeFi swap event handler
  crit: notable
  conf: 0.5
  if:
    type: string_literal
    regex: \.on\(['"]Swap['"]

- id: sign-message-builder
  desc: Transaction sign message builder
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: \b(wallet\.)?createSignMessage\s*\(

- id: signed-tx-builder
  desc: Signed transaction builder
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: \b(wallet\.)?createSignedTx\s*\(

- id: tx-broadcast-body-builder
  desc: Transaction broadcast body builder
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: \b(wallet\.)?createBroadcastBody\s*\(

- id: signature-import-secp256k1
  desc: secp256k1 signature import
  crit: suspicious
  conf: 0.88
  if:
    type: symbol
    exact: signatureImport
  unless:
  - id: well-known/app/browser-extension-known/
- id: tx-injection-call
  desc: Transaction injection call
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \b(lcd\.)?injectTx\s*\(

- id: jshex-account-address-env
  desc: Hex-escaped ACCOUNT_ADDRESS env name
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: \x41\x43\x43\x4F\x55\x4E\x54\x5F\x41\x44\x44\x52\x45\x53\x53

- id: jshex-account-private-key-env
  desc: Hex-escaped ACCOUNT_PRIVATE_KEY env name
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: \x41\x43\x43\x4F\x55\x4E\x54\x5F\x50\x52\x49\x56\x41\x54\x45\x5F\x4B\x45\x59

- id: jshex-your-account-address-env
  desc: Hex-escaped YOUR_ACCOUNT_ADDRESS env
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: \x59\x4F\x55\x52\x5F\x41\x43\x43\x4F\x55\x4E\x54\x5F\x41\x44\x44\x52\x45\x53\x53

- id: jshex-your-account-private-key-env
  desc: Hex-escaped YOUR_ACCOUNT_PRIVATE_KEY env
  crit: suspicious
  conf: 0.99
  if:
    type: text
    substr: \x59\x4F\x55\x52\x5F\x41\x43\x43\x4F\x55\x4E\x54\x5F\x50\x52\x49\x56\x41\x54\x45\x5F\x4B\x45\x59

- id: jshex-getbalance
  desc: Hex-escaped getBalance string
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: \x67\x65\x74\x42\x61\x6C\x61\x6E\x63\x65

- id: jshex-sign-transaction
  desc: Hex-escaped signTransaction string
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: \x73\x69\x67\x6E\x54\x72\x61\x6E\x73\x61\x63\x74\x69\x6F\x6E

- id: jshex-send-signed-transaction
  desc: Hex-escaped sendSignedTransaction string
  crit: suspicious
  conf: 0.97
  if:
    type: text
    substr: \x73\x65\x6E\x64\x53\x69\x67\x6E\x65\x64\x54\x72\x61\x6E\x73\x61\x63\x74\x69\x6F\x6E

- id: cosmos-delegate-msg
  desc: Cosmos delegate message type
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: cosmos-sdk/MsgDelegate

- id: cosmos-redelegate-msg
  desc: Cosmos redelegate message type
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: cosmos-sdk/MsgBeginRedelegate

- id: cosmos-withdraw-reward-msg
  desc: Cosmos reward withdrawal message
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: cosmos-sdk/MsgWithdrawDelegationReward

- id: reward-withdraw-cta
  desc: Wallet reward withdrawal signing prompt UI
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'Generate\s*&\s*Sign\s*Withdraw\s*Transaction|outstanding rewards'
  unless:
    - id: metadata/lang/scripted::dts-declaration-file
    - id: metadata/lang/source::codegen-source-path

- id: sync-broadcast-mode
  desc: Synchronous transaction broadcast mode
  crit: component
  conf: 0.86
  if:
    type: text
    regex: \bmode\s*:\s*[`'"]sync[`'"]

- id: browser-wallet-provider-hook--rx-1
  desc: '.. = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(window|globalThis)\.(ethereum|solana)\.(request|send)\s*='
- id: browser-wallet-provider-hook--rx-2
  desc: "self.(ethereum|solana).(req|send) = assignment"
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(self)\.(ethereum|solana)\.(request|send)\s*='
- id: browser-wallet-provider-hook--rx-3
  desc: '.tronWeb. = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(window|globalThis|self)\.(tronWeb)\.(request|send)\s*='
- id: browser-wallet-provider-hook--rx-4
  desc: '.. = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(window|globalThis)\.(ethereum|solana)\.(sendAsync|signAndSendTransaction)\s*='
- id: browser-wallet-provider-hook--rx-5
  desc: 'self.. = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(self)\.(ethereum|solana)\.(sendAsync|signAndSendTransaction)\s*='
- id: browser-wallet-provider-hook--rx-6
  desc: '.tronWeb. = assignment'
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\b(window|globalThis|self)\.(tronWeb)\.(sendAsync|signAndSendTransaction)\s*='
- id: provider-request-wrapper--rx-7
  desc: .sendAsync wallet-provider member access
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.sendAsync\b
- id: provider-request-wrapper--rx-8
  desc: Injected wallet provider (window.ethereum)
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \bwindow\.(ethereum|solana|tronWeb)\b
- id: provider-request-wrapper--rx-9
  desc: Wallet provider .request() call
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(ethereum|solana|tronWeb)\.request\b
- id: provider-request-wrapper--rx-10
  desc: .request({method:...}) RPC-style invocation
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.request\s*\(\s*\{[^}]{0,160}method
- id: provider-request-wrapper--rx-11
  desc: .request.bind / .sendAsync.bind capture
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.(request|sendAsync)\.bind\s*\(
- id: wallet-account-discovery-probe--rx-14
  desc: 'provider.request account probe'
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(ethereum|provider)\.request\s*\([\s\S]{0,160}\bmethod\s*:\s*[''"]eth_accounts[''"]'
- id: wallet-account-discovery-probe--rx-15
  desc: '"eth_accounts" RPC literal call site'
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '[''"]eth_accounts[''"]\s*\)'
- id: transaction-data-address-rewrite--rx-16
  desc: .replace() over ETH/BTC-SegWit address regex
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.(replace|replaceAll)\s*\(.{0,140}(0x\[a-fA-F0-9\]|bc1\[)'
- id: transaction-data-address-rewrite--rx-17
  desc: .replace() over BitcoinCash/Tron address regex
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.(replace|replaceAll)\s*\(.{0,140}(bitcoincash:|\[T\]\[1-9A-HJ)'
- id: transaction-data-address-rewrite--rx-18
  desc: .replace() over LTC/Solana address regex
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '\.(replace|replaceAll)\s*\(.{0,140}(ltc1\[|\[1-9A-HJ-NP-Za-km-z\]\{32,44\})'
  unless:
  - id: metadata/package/testing/harness/runtime/
- id: solana-config-dir-marker
  desc: Solana config directory marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '["'']?\.config[\\/]solana[\\/]cli[\\/]'
- id: solana-cli-dir-marker
  desc: Solana CLI directory marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '[''"]solana[''"],\s*[''"]cli|solana/cli'
- id: solana-config-yml-name
  desc: Solana config.yml filename
  crit: component
  conf: 0.94
  if:
    type: text
    substr: config.yml
- id: solana-json-rpc-url-setting
  desc: Solana JSON RPC URL setting
  crit: component
  conf: 0.95
  if:
    type: text
    substr: json_rpc_url
- id: defi-platform-uniswap
  desc: Uniswap platform name reference
  crit: notable
  conf: 0.78
  if:
    type: text
    word: Uniswap
- id: defi-platform-pancakeswap
  desc: PancakeSwap platform name reference
  crit: notable
  conf: 0.78
  if:
    type: text
    word: PancakeSwap
- id: defi-platform-sushiswap
  desc: SushiSwap platform name reference
  crit: notable
  conf: 0.78
  if:
    type: text
    word: SushiSwap
- id: defi-platform-oneinch
  desc: 1inch platform name reference
  crit: notable
  conf: 0.78
  if:
    type: text
    word: 1inch
  unless:
  - id: metadata/package/testing/harness/runtime/

composite_rules:
- id: wallet-transaction-build-chain
  desc: Wallet transaction build chain
  crit: suspicious
  conf: 0.96
  all:
  - id: sign-message-builder
  - id: signed-tx-builder
  - id: tx-broadcast-body-builder

- id: wallet-sign-and-broadcast
  desc: Wallet sign then broadcast flow
  crit: suspicious
  conf: 0.97
  all:
  - id: wallet-transaction-build-chain
  - id: micro-behaviors/crypto/library/blockchain/transaction::wallet-transaction-sign-call
  - id: tx-injection-call
  any:
  - id: sync-broadcast-mode
  - id: signature-import-secp256k1
  - id: micro-behaviors/communications/ipc/rpc::wallet-provider-send-method

- id: jshex-web3-balance-sign-broadcast
  desc: Hex-escaped Web3 balance sign and broadcast
  crit: suspicious
  conf: 0.99
  all:
  - id: jshex-getbalance
  - id: jshex-sign-transaction
  - id: jshex-send-signed-transaction

- id: blockchain-delegation-hijack
  desc: Blockchain delegation transaction hijack
  crit: hostile
  conf: 0.97
  all:
  - id: wallet-sign-and-broadcast
  any:
  - id: cosmos-delegate-msg
  - id: cosmos-redelegate-msg
  - id: micro-behaviors/communications/ipc/rpc::wallet-provider-send-method

- id: staking-reward-redirection
  desc: Staking reward redirect transaction
  crit: hostile
  conf: 0.98
  all:
  - id: wallet-sign-and-broadcast
  - id: cosmos-withdraw-reward-msg
  any:
  - id: cosmos-delegate-msg
  - id: cosmos-redelegate-msg

- id: staking-reward-withdraw-broadcast
  desc: Staking reward withdrawal broadcast
  crit: hostile
  conf: 0.97
  all:
  - id: wallet-sign-and-broadcast
  - id: cosmos-withdraw-reward-msg
  - id: signature-import-secp256k1

- id: signed-reward-claim-flow
  desc: Signed staking reward claim flow
  crit: hostile
  conf: 0.97
  all:
  - id: wallet-sign-and-broadcast
  - id: cosmos-withdraw-reward-msg
  - id: reward-withdraw-cta

- id: env-wallet-transfer-drain
  desc: Env-backed wallet transfer drain
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/crypto/library/blockchain/transaction::web3-balance-sign-broadcast
  - id: objectives/credential-access/env/secrets/wallet::env-wallet-prefix
  - id: micro-behaviors/os/env/vars/credentials::javascript-private-key-environment-variable

- id: env-wallet-local-signing-proxy
  desc: Env-backed local wallet signing proxy
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/credential-access/env/secrets/wallet::env-wallet-prefix
  - id: micro-behaviors/os/env/vars/credentials::javascript-private-key-environment-variable
  - id: micro-behaviors/crypto/library/blockchain/transaction::viem-private-key-account
  - id: micro-behaviors/crypto/library/blockchain/transaction::viem-wallet-client
  any:
  - id: micro-behaviors/crypto/library/blockchain/transaction::x402-fetch-payment-wrapper
  - id: micro-behaviors/crypto/library/blockchain/transaction::eip3009-transfer-authorization
  - id: micro-behaviors/crypto/library/blockchain/transaction::wallet-sign-typed-data

- id: env-wallet-private-key-loader
  desc: Env wallet private-key loader
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/credential-access/env/secrets/wallet::env-wallet-prefix
  - id: micro-behaviors/os/env/vars/credentials::javascript-private-key-environment-variable
  - id: objectives/credential-access/env/dotenv::js-dotenv-read
  - id: micro-behaviors/crypto/library/blockchain/transaction::viem-private-key-account

- id: env-wallet-fetch-payment-hook
  desc: Env wallet fetch payment hook
  crit: hostile
  conf: 0.98
  all:
  - id: env-wallet-local-signing-proxy
  - id: micro-behaviors/process/hook/xhr::fetch-hook
  - id: micro-behaviors/crypto/library/blockchain/transaction::x402-fetch-payment-wrapper

- id: persistent-env-wallet-signer
  desc: Persistent env wallet signer
  crit: hostile
  conf: 0.98
  scope: archive
  all:
  - id: env-wallet-local-signing-proxy
  - id: objectives/persistence/system/service/systemd::systemd
  any:
  - id: objectives/persistence/system/service/systemd::systemctl-enable
  - id: objectives/persistence/system/service/systemd::restart-always
  - id: micro-behaviors/process/daemonize/detach::nohup-hidden-output

- id: env-wallet-automatic-payment-signing
  desc: Env wallet automatic payment signing
  crit: hostile
  conf: 0.99
  all:
  - id: env-wallet-local-signing-proxy
  - id: micro-behaviors/crypto/library/blockchain/transaction::x402-fetch-payment-wrapper
  - id: micro-behaviors/crypto/library/blockchain/transaction::wallet-sign-typed-data

- id: jshex-env-wallet-transfer-drain
  desc: Hex-escaped env wallet transfer drain
  crit: hostile
  conf: 0.995
  all:
  - id: jshex-web3-balance-sign-broadcast
  - id: jshex-account-address-env
  - id: jshex-account-private-key-env

- id: jshex-your-env-wallet-transfer-drain
  desc: Hex-escaped prefixed env wallet drain
  crit: hostile
  conf: 0.997
  all:
  - id: jshex-web3-balance-sign-broadcast
  - id: jshex-your-account-address-env
  - id: jshex-your-account-private-key-env
- id: solana-cli-config-path
  desc: Solana CLI config path
  crit: component
  conf: 0.94
  all:
  - id: solana-config-dir-marker
  - id: solana-cli-dir-marker
  - id: solana-config-yml-name
- id: solana-cli-rpc-hijack
  desc: Solana CLI RPC endpoint hijack
  crit: hostile
  conf: 0.97
  near_bytes: 8192
  all:
  - id: solana-cli-config-path
  - id: solana-json-rpc-url-setting
  - id: micro-behaviors/fs/file/write/direct::js-file-write
  any:
  - id: micro-behaviors/communications/http/url/external-ip::url-external-ip-script
  - id: micro-behaviors/communications/ip/literal::http-ip-url-source-literal
- id: defi-platform-name-cluster
  desc: Multiple DeFi platform name references
  crit: notable
  conf: 0.9
  needs: 2
  any:
  - id: defi-platform-uniswap
  - id: defi-platform-pancakeswap
  - id: defi-platform-sushiswap
  - id: defi-platform-oneinch
- id: browser-wallet-provider-drainer
  desc: Browser wallet transaction drainer
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/credential-access/wallet/keywords::multi-crypto-regex
  - id: transaction-data-address-rewrite
  any:
  - id: browser-wallet-provider-hook
  - id: provider-request-wrapper
  - id: micro-behaviors/communications/ipc/rpc::wallet-provider-send-method
- id: browser-wallet-address-table-drainer
  desc: Browser wallet address table drainer
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/data/format/crypto-address::multi-chain-address-table
  - id: wallet-account-discovery-probe
  any:
  - id: transaction-data-address-rewrite
  - id: browser-wallet-provider-hook
  - id: provider-request-wrapper
  unless:
  - id: well-known/app/browser-extension/
  - id: objectives/impact/crypto-manipulation/transfer-hijack/
- id: obfuscated-wallet-address-stage
  desc: Obfuscated wallet address stage loader
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/data/format/crypto-address::hardcoded-tron-address-table
  - id: objectives/anti-static/obfuscation/eval/loader::permutation-fed-indirect-eval
- id: browser-wallet-request-drainer
  desc: Browser wallet request drainer
  crit: hostile
  conf: 0.985
  all:
  - id: browser-wallet-provider-drainer
  any:
  - id: micro-behaviors/process/hook/xhr::request-interceptor
- id: defi-request-address-drainer
  desc: DeFi request address replacement drainer
  crit: hostile
  conf: 0.985
  all:
  - id: defi-platform-name-cluster
  - id: objectives/credential-access/wallet/keywords::multi-crypto-regex
  - id: transaction-data-address-rewrite
  - id: micro-behaviors/process/hook/xhr::request-interceptor
- id: browser-wallet-provider-hook
  desc: Browser wallet provider method hook
  crit: suspicious
  conf: 0.94
  any:
  - id: browser-wallet-provider-hook--rx-1
  - id: browser-wallet-provider-hook--rx-2
  - id: browser-wallet-provider-hook--rx-3
  - id: browser-wallet-provider-hook--rx-4
  - id: browser-wallet-provider-hook--rx-5
  - id: browser-wallet-provider-hook--rx-6
  unless:
  - id: metadata/package/testing/harness/runtime/
- id: provider-request-wrapper
  desc: Wallet provider request wrapper
  crit: component
  conf: 0.9
  any:
  - id: provider-request-wrapper--rx-7
  - id: provider-request-wrapper--rx-8
  - id: provider-request-wrapper--rx-9
  - id: provider-request-wrapper--rx-10
  - id: provider-request-wrapper--rx-11
  unless:
  - id: metadata/package/testing/harness/runtime/
- id: wallet-account-discovery-probe
  desc: Browser wallet account discovery probe
  crit: suspicious
  conf: 0.9
  any:
  - id: wallet-account-discovery-probe--rx-14
  - id: wallet-account-discovery-probe--rx-15
  unless:
  - id: metadata/package/testing/harness/runtime/
- id: transaction-data-address-rewrite
  desc: Transaction data address rewrite
  crit: suspicious
  conf: 0.94
  any:
  - id: transaction-data-address-rewrite--rx-16
  - id: transaction-data-address-rewrite--rx-17
  - id: transaction-data-address-rewrite--rx-18
  unless:
  - id: metadata/package/testing/harness/runtime/
