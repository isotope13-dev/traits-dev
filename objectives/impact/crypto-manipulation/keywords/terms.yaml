---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - scripts
  - source
traits:
- id: crypto-word
  desc: crypto word in Rust source
  for: [rust]
  if:
    type: text
    word: crypto
  unless:
    - id: metadata/lang/compiler/systems/
- id: crypto-substr
  desc: crypto substring in Rust context
  for: [rust]
  if:
    type: text
    substr: crypto
  unless:
    - id: metadata/lang/compiler/systems/
- id: rust-bin-crypto-vocab
  desc: rust binary crypto module vocabulary
  count_min: 3
  if:
    type: text
    regex: "\\b(encrypt|csprng)\\b"
- id: rust-bin-fs-vocab
  desc: rust binary fs module vocabulary
  for: [rust, elf, macho, pe]
  count_min: 3
  if:
    type: text
    regex: "\\b(walker|icons|services)\\b"
