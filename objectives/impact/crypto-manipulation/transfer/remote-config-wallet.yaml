# A package that obtains its network configuration remotely while provisioning
# a plaintext private key and exposing a Viem transaction sender. This is an
# impact-level combination; each wallet and filesystem capability remains
# neutral in micro-behaviors.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, archives]
  attack: T1657

composite_rules:
  - id: remote-configured-wallet-transfer-path
    desc: Remote-configured package exposes a generated wallet transfer path
    crit: hostile
    conf: 0.99
    for: [archives]
    scope: archive
    all:
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
      - id: objectives/supply-chain/install-hook/package/manifest::postinstall-runs-node-script
      - id: micro-behaviors/communications/http/endpoints::remote-config-endpoint
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/data/serialize/yaml::javascript-yaml-load
      - id: micro-behaviors/fs/write/file/direct::node-writes-serialized-yaml
      - id: micro-behaviors/crypto/library/provider::generate-keypair-call
      - id: micro-behaviors/fs/path/config/environment::node-dotenv-file-path
      - id: micro-behaviors/crypto/library/blockchain/transaction::viem-private-key-account
      - id: micro-behaviors/crypto/library/blockchain/transaction::viem-wallet-client
      - id: micro-behaviors/crypto/library/blockchain/transaction::viem-send-transaction
      - id: micro-behaviors/crypto/library/blockchain/client::viem-http-rpc-transport
