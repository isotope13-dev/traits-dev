defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
    - javascript
    - powershell
    - shell
    - pe
    - macho
  crit: suspicious
  attack: T1565.001
traits:
  - id: btc-address-hardcoded
    desc: Hardcoded Bitcoin address
    crit: baseline
    conf: 0.7
    if:
      type: string_value
      regex: \b(1|3)[1-9A-HJ-NP-Za-km-z]{25,34}\b
      section: __cstring
    not:
      - regex: ^\\.\\?\\?@
      - regex: '[13][A-Fa-f0-9]{25,34}'
      - regex: ^[13](?:[A-Z][a-z0-9]+){2,}$
      - regex: (.)\1\1\1
      - substr: _ZN
      - substr: ::h
    unless:
      - id: metadata/signed/platform::apple
  - id: btc-address-bech32
    desc: Hardcoded Bitcoin bech32 address
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: \bbc1[ac-hj-np-z02-9]{39,59}\b
  - id: btc-address-multiple
    desc: Multiple Bitcoin addresses (legacy)
    crit: notable
    conf: 0.85
    count_min: 2
    if:
      id: btc-address-hardcoded
    unless:
      - id: metadata/signed/platform::apple
      - id: well-known/tools/reverse-engineering::scylla-unpacker
      - id: metadata/lang/compiler::core-fmt
      - type: string_value
        substr: ScyllaPluginExchange
      - type: string_value
        exact: Copy BTC Address
  - id: eth-address-hardcoded
    desc: Hardcoded Ethereum address
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: \b0x[a-fA-F0-9]{40}\b
  - id: eth-address-multiple
    desc: Multiple Ethereum addresses
    crit: suspicious
    conf: 0.85
    count_min: 2
    if:
      id: eth-address-hardcoded
    unless:
      - type: string_value
        regex: (?i)brainpoolp[0-9]{3}r1
      - type: string_value
        regex: \bNIST P-[0-9]{3}\b
      - type: string_value
        regex: \bsecp[0-9]{3}[kr]1\b
  - id: xmr-address-hardcoded
    desc: Hardcoded Monero address
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: \b4[0-9AB][1-9A-HJ-NP-Za-km-z]{93}\b
  - id: replace-wallet-address
    desc: Code replaces wallet address string
    crit: suspicious
    conf: 0.9
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: raw
      regex: \.replace\s*\(.{0,50}["'](0x[a-fA-F0-9]{10,}|[13][a-zA-HJ-NP-Z0-9]{25,})
  - id: address-swap-conditional-eth
    desc: Conditional Ethereum address swap
    crit: suspicious
    conf: 0.9
    for:
      - scripts
      - source
      - manifests
    if:
      type: string_value
      regex: \bif\b.{0,50}\b(address|wallet)\b[\s\S]{0,100}0x[a-fA-F0-9]{40}
  - id: address-swap-conditional-btc
    desc: Conditional Bitcoin address swap
    crit: suspicious
    conf: 0.9
    for:
      - scripts
      - source
      - manifests
    if:
      type: string_value
      regex: \bif\b.{0,50}\b(address|wallet)\b[\s\S]{0,100}[13][a-zA-HJ-NP-Z0-9]{25,}
  - id: address-var-reassign-eth
    desc: Address variable reassigned to Ethereum address
    crit: suspicious
    conf: 0.8
    for:
      - scripts
      - source
      - manifests
    if:
      type: string_value
      regex: address\s*=\s*["\'"]0x[a-fA-F0-9]{40}
  - id: address-var-reassign-btc
    desc: Address variable reassigned to Bitcoin address
    crit: suspicious
    conf: 0.8
    for:
      - scripts
      - source
      - manifests
    if:
      type: string_value
      regex: address\s*=\s*["\'"][13][a-zA-HJ-NP-Z0-9]{25,}
  - id: wallet-var-reassign-eth
    desc: Wallet variable reassigned to Ethereum address
    crit: suspicious
    conf: 0.8
    for:
      - scripts
      - source
      - manifests
    if:
      type: string_value
      regex: wallet\s*=\s*["\'"]0x[a-fA-F0-9]{40}
  - id: wallet-var-reassign-btc
    desc: Wallet variable reassigned to Bitcoin address
    crit: suspicious
    conf: 0.8
    for:
      - scripts
      - source
      - manifests
    if:
      type: string_value
      regex: wallet\s*=\s*["\'"][13][a-zA-HJ-NP-Z0-9]{25,}
  - id: py-clipboard-wallet-eth
    desc: Python clipboard with Ethereum address
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: raw
      regex: (pyperclip|clipboard|paste)[\s\S]{0,200}0x[a-fA-F0-9]{40}
  - id: py-clipboard-wallet-btc
    desc: Python clipboard with Bitcoin address
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: raw
      regex: (pyperclip|clipboard|paste)[\s\S]{0,200}[13][a-zA-HJ-NP-Z0-9]{25,}
  - id: py-clipboard-replace
    desc: Python clipboard content replacement
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: raw
      regex: (pyperclip|clipboard)\.copy[\s\S]{0,100}\.replace
  - id: js-clipboard-wallet
    desc: JavaScript clipboard with wallet address
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: navigator\.clipboard[\s\S]{0,200}(0x[a-fA-F0-9]{40}|[13][a-zA-HJ-NP-Z0-9]{25,})
  - id: js-clipboard-read-api
    desc: JavaScript clipboard read API
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: navigator\.clipboard\.readText|clipboardData\.getData
  - id: js-clipboard-paste-hook
    desc: JavaScript paste hook
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: addEventListener\s*\(\s*["']paste["']|onpaste\s*=
  - id: js-setinterval
    desc: JavaScript setInterval
    crit: component
    conf: 0.7
    for:
      - javascript
    if:
      type: string_value
      word: setInterval
  - id: js-settimeout
    desc: JavaScript setTimeout
    crit: component
    conf: 0.7
    for:
      - javascript
    if:
      type: string_value
      word: setTimeout
  - id: js-clipboard-write
    desc: JavaScript clipboard rewrite
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: (navigator\.)?clipboard\.writeText\s*\(|execCommand\s*\(\s*["']copy["']
  - id: wallet-dat-access
    desc: Accesses wallet.dat file
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: wallet\.dat
    downgrade:
      any:
        - id: well-known/tools/detection/
  - id: metamask-name-string
    desc: MetaMask name string
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      word: MetaMask
composite_rules:
  - id: keystore-access
    desc: Accesses Ethereum keystore
    crit: suspicious
    conf: 0.8
    any:
      - id: objectives/credential-access/wallet/desktop::ethereum-keystore
      - id: objectives/credential-access/wallet/desktop::doteth-keystore
      - id: objectives/credential-access/wallet/desktop::mist-keystore
  - id: address-variable-reassign
    desc: Wallet address variable reassigned
    crit: suspicious
    conf: 0.8
    any:
      - id: address-var-reassign-eth
      - id: address-var-reassign-btc
      - id: wallet-var-reassign-eth
      - id: wallet-var-reassign-btc
  - id: js-clipboard-observer-context
    desc: JavaScript clipboard observation context
    crit: component
    conf: 0.8
    any:
      - id: js-clipboard-paste-hook
      - id: js-clipboard-polling
      - id: js-clipboard-write
  - id: js-clipboard-polling
    desc: JavaScript clipboard polling
    crit: component
    conf: 0.7
    any:
      - id: js-setinterval
      - id: js-settimeout
  - id: js-clipboard-monitor
    desc: JavaScript clipboard monitoring
    crit: notable
    conf: 0.85
    near_lines: 40
    all:
      - id: js-clipboard-read-api
    any:
      - id: js-clipboard-observer-context
      - id: js-clipboard-wallet
  - id: metamask-access
    desc: Accesses MetaMask data
    crit: suspicious
    conf: 0.85
    any:
      - id: metamask-name-string
      - id: objectives/credential-access/wallet/extension::metamask
  - id: address-swap-conditional
    desc: Conditional wallet address swap
    crit: suspicious
    conf: 0.9
    any:
      - id: address-swap-conditional-eth
      - id: address-swap-conditional-btc
  - id: py-clipboard-wallet
    desc: Python clipboard with wallet address
    crit: suspicious
    conf: 0.85
    any:
      - id: py-clipboard-wallet-eth
      - id: py-clipboard-wallet-btc
  - id: crypto-address-swap
    desc: Cryptocurrency address swapping attack
    crit: hostile
    conf: 0.95
    mbc: E1485
    any:
      - id: replace-wallet-address
      - id: address-swap-conditional
  - id: clipboard-crypto-hijacker
    desc: Clipboard cryptocurrency hijacker
    crit: hostile
    conf: 0.95
    attack: T1115
    any:
      - id: py-clipboard-wallet
      - id: py-clipboard-replace
      - id: js-clipboard-wallet
    all:
      - id: btc-address-hardcoded
  - id: crypto-wallet-theft
    desc: Cryptocurrency wallet theft
    crit: hostile
    conf: 0.9
    attack: T1005
    any:
      - id: wallet-dat-access
      - id: metamask-access
    all:
      - id: eth-address-hardcoded
