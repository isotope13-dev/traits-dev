defaults:
  platforms: [unix, windows]
  for:
    - scripts
    - pe
  crit: suspicious
  attack: T1565.001
traits:
  - id: btc-address-hardcoded
    desc: Hardcoded Bitcoin address
    crit: baseline
    conf: 0.7
    if:
      type: text
      regex: \b(1|3)[1-9A-HJ-NP-Za-km-z]{25,34}\b
      section: __cstring
    not:
      - regex: ^\\.\\?\\?@
      - regex: '[13][A-Fa-f0-9]{25,34}'
      - regex: ^[13]([A-Z][a-z0-9]+){2,}$
      - regex: (.)\1\1\1
      - substr: _ZN
      - substr: ::h
    unless:
      - id: metadata/signed/platform::apple
      - id: well-known/tool/dual-use/hashcat::module-path
  - id: btc-address-multiple
    desc: Multiple Bitcoin addresses (legacy)
    crit: notable
    conf: 0.85
    count_min: 2
    if:
      id: btc-address-hardcoded
    unless:
      - id: metadata/signed/platform::apple
      - id: well-known/tool/reverse-engineering/scylla/
      - id: metadata/lang/compiler/systems::core-fmt
      - type: text
        substr: ScyllaPluginExchange
      - type: text
        substr: "describe('"
  - id: conditional-address-clipboard-forward
    desc: Conditional address test
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: '(?i)\b(if|while|switch)\s*\([^)]{0,80}\b(address|wallet)\b[^)]{0,80}\)'
  - id: clipboard-word-marker
    desc: Clipboard or paste keyword
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: '(?i)\b(clipboard|paste)\b'
  - id: clipboard-shell-marker
    desc: Clipboard shell utility marker
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: '(?i)\b(pbpaste|pbcopy|xclip|xsel)\b'
  - id: clipboard-command-marker
    desc: Clipboard command marker
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: '(?i)\b(clip\.exe|get-clipboard|set-clipboard)\b'
  - id: clipboard-browser-marker
    desc: Browser clipboard API marker
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: '(?i)navigator\.clipboard|clipboardData'
  - id: wallet-address-eth-marker
    desc: Ethereum wallet address literal
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: '\b(wallet|address)\b.{0,80}\b0x[a-fA-F0-9]{40}\b'
  - id: wallet-address-btc-marker
    desc: Bitcoin wallet address literal
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: '\b(wallet|address)\b.{0,80}\b[13][a-km-zA-HJ-NP-Z1-9]{25,34}\b'
      is: bitcoin_addr
  # A bare `address = "0x..."` / `wallet = "0x..."` assignment is ubiquitous in
  # benign web3 config (token/router/contract address registries). On its own it
  # is not clipboard hijacking — these are component building blocks gated behind
  # clipboard manipulation by the address-variable-reassign composite below.
  - id: address-var-reassign-eth
    desc: Address variable assigned an Ethereum address
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: address\s*=\s*["\'"]0x[a-fA-F0-9]{40}
  - id: address-var-reassign-btc
    desc: Address variable assigned a Bitcoin address
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: address\s*=\s*["\'"][13][a-zA-HJ-NP-Z0-9]{25,}
  - id: wallet-var-reassign-eth
    desc: Wallet variable assigned an Ethereum address
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: wallet\s*=\s*["\'"]0x[a-fA-F0-9]{40}
  - id: wallet-var-reassign-btc
    desc: Wallet variable assigned a Bitcoin address
    crit: component
    conf: 0.8
    for: [python, javascript, powershell, shell]
    if:
      type: text
      regex: wallet\s*=\s*["\'"][13][a-zA-HJ-NP-Z0-9]{25,}
  - id: ps1-clipboard-wallet-btc
    desc: PowerShell clipboard with Bitcoin address
    crit: suspicious
    conf: 0.85
    for:
      - powershell
    if:
      type: text
      regex: (Get-Clipboard|Set-Clipboard)[\s\S]{0,200}[13][a-zA-HJ-NP-Z0-9]{25,}
  - id: ps1-clipboard-wallet-eth
    desc: PowerShell clipboard with Ethereum address
    crit: suspicious
    conf: 0.85
    for:
      - powershell
    if:
      type: text
      regex: (Get-Clipboard|Set-Clipboard)[\s\S]{0,200}0x[a-fA-F0-9]{40}
  - id: ps1-clipboard-replace
    desc: PowerShell clipboard content replacement
    crit: suspicious
    conf: 0.85
    for:
      - powershell
    if:
      type: text
      regex: '(?is)\bGet-Clipboard\b(?=[\s;|)\r\n])[^\r\n]{0,400}\bSet-Clipboard\b(?=[\s;|)\r\n-])'
  - id: py-clipboard-wallet-eth
    desc: Python clipboard with Ethereum address
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: (pyperclip|clipboard|paste)[\s\S]{0,200}0x[a-fA-F0-9]{40}
  - id: py-clipboard-wallet-btc
    desc: Python clipboard with Bitcoin address
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: (pyperclip|clipboard|paste)[\s\S]{0,200}\b[13][a-zA-HJ-NP-Z0-9]{25,33}\b
    not:
      - substr: "pasted from https://github.com/"
  - id: py-clipboard-replace
    desc: Python clipboard content replacement
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: text
      regex: (pyperclip|clipboard)\.copy[\s\S]{0,100}\.replace
  - id: js-clipboard-wallet
    desc: JavaScript clipboard with wallet address
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: navigator\.clipboard[\s\S]{0,200}(0x[a-fA-F0-9]{40}|[13][a-zA-HJ-NP-Z0-9]{25,})
  - id: js-clipboard-read-api
    desc: JavaScript clipboard read API
    crit: component
    conf: 0.8
    if:
      type: text
      regex: navigator\.clipboard\.readText|clipboardData\.getData
  - id: js-clipboard-write
    desc: JavaScript clipboard rewrite
    crit: component
    conf: 0.75
    if:
      type: text
      regex: (navigator\.)?clipboard\.writeText\s*\(|execCommand\s*\(\s*["']copy["']
composite_rules:
  - id: clipboard-context-marker
    desc: Clipboard API context marker
    crit: component
    conf: 0.8
    any:
      - id: clipboard-word-marker
      - id: clipboard-shell-marker
      - id: clipboard-command-marker
      - id: clipboard-browser-marker
  - id: wallet-rewrite-operation
    desc: Clipboard write follows a replacement operation
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/os/clipboard/transform::browser-clipboard-write-transformed-text
      - id: py-clipboard-replace
      - id: ps1-clipboard-replace
  - id: conditional-address-clipboard
    desc: Conditional wallet address clipboard use
    crit: component
    conf: 0.85
    near_bytes: 256
    all:
      - id: conditional-address-clipboard-forward
      - id: clipboard-context-marker
  - id: replace-wallet-address
    desc: Clipboard-backed wallet address replacement
    crit: suspicious
    conf: 0.9
    near_lines: 80
    all:
      - id: clipboard-context-marker
      - id: wallet-rewrite-operation
    any:
      - id: wallet-address-eth-marker
      - id: wallet-address-btc-marker
  - id: address-swap-conditional-eth
    desc: Conditional ETH clipboard replacement
    crit: suspicious
    conf: 0.9
    near_lines: 80
    all:
      - id: conditional-address-clipboard
      - id: wallet-address-eth-marker
    unless:
      - id: well-known/app/browser-extension-known/
  - id: address-swap-conditional-btc
    desc: Conditional BTC clipboard replacement
    crit: suspicious
    conf: 0.9
    near_lines: 80
    all:
      - id: conditional-address-clipboard
      - id: wallet-address-btc-marker
  - id: keystore-access
    desc: Accesses Ethereum keystore
    crit: suspicious
    conf: 0.8
    any:
      - id: objectives/credential-access/wallet/desktop::ethereum-keystore
      - id: objectives/credential-access/wallet/desktop::doteth-keystore
      - id: objectives/credential-access/wallet/desktop::mist-keystore
  - id: address-reassign-bare
    desc: Address or wallet variable assigned a hardcoded crypto address
    crit: component
    conf: 0.8
    any:
      - id: address-var-reassign-eth
      - id: address-var-reassign-btc
      - id: wallet-var-reassign-eth
      - id: wallet-var-reassign-btc
  - id: clipboard-manipulation-marker
    desc: Clipboard read/write manipulation
    crit: component
    conf: 0.8
    any:
      - id: py-clipboard-replace
      - id: ps1-clipboard-replace
      - id: js-clipboard-write
      - id: js-clipboard-read-api
      - id: micro-behaviors/os/clipboard/access::browser-paste-event-handler
  - id: address-variable-reassign
    desc: Hardcoded crypto address paired with clipboard manipulation
    crit: suspicious
    conf: 0.85
    near_lines: 80
    all:
      - id: address-reassign-bare
      - id: clipboard-manipulation-marker
  - id: js-clipboard-observer-marker
    desc: JavaScript clipboard observation marker
    crit: component
    conf: 0.8
    any:
      - id: micro-behaviors/os/clipboard/access::browser-paste-event-handler
      - id: js-clipboard-write
      - id: js-clipboard-polling
  - id: js-clipboard-polling
    desc: Polls clipboard on a timer
    crit: notable
    conf: 0.82
    for: [javascript]
    all:
      - id: js-clipboard-read-api
    any:
      - id: micro-behaviors/time/schedule/interval::setInterval
      - id: micro-behaviors/time/schedule/interval::setTimeout
  - id: js-clipboard-monitor
    desc: JavaScript clipboard monitoring
    crit: notable
    conf: 0.85
    near_lines: 40
    all:
      - id: js-clipboard-read-api
      - id: js-clipboard-wallet
    any:
      - id: js-clipboard-observer-marker
      - id: js-clipboard-wallet
  - id: address-swap-conditional
    desc: Conditional wallet address swap
    crit: suspicious
    conf: 0.9
    any:
      - id: address-swap-conditional-eth
      - id: address-swap-conditional-btc
    unless:
    - id: well-known/app/browser-extension-known/
  - id: py-clipboard-wallet
    desc: Python clipboard with wallet address
    crit: suspicious
    conf: 0.85
    any:
      - id: py-clipboard-wallet-eth
      - id: py-clipboard-wallet-btc
  - id: crypto-address-swap
    desc: Cryptocurrency address swapping attack
    crit: hostile
    conf: 0.95
    mbc: E1485
    any:
      - id: replace-wallet-address
      - id: address-swap-conditional
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-langfuse-package
      - id: metadata/library/structure::js-large-module-bundle
  - id: ps1-clipboard-wallet
    desc: PowerShell clipboard with wallet address
    crit: suspicious
    conf: 0.85
    any:
      - id: ps1-clipboard-wallet-btc
      - id: ps1-clipboard-wallet-eth
  - id: clipboard-crypto-hijacker
    desc: Clipboard cryptocurrency hijacker
    crit: hostile
    conf: 0.95
    attack: T1115
    needs: 2
    any:
      - id: py-clipboard-wallet
      - id: py-clipboard-replace
      - id: js-clipboard-wallet
      - id: ps1-clipboard-wallet
      - id: ps1-clipboard-replace
      - id: btc-address-hardcoded
  # Node/CLI clippers (npm supply-chain trojans) neither touch `navigator.clipboard`
  # nor `clip.exe`; they shell out to pbpaste/xclip/Get-Clipboard to read and
  # pbcopy/xclip/Set-Clipboard to write. Read+write of the system clipboard via
  # these helpers, in a script that also embeds a hardcoded destination wallet
  # address, is the clipper shape — no legitimate clipboard utility ships a
  # hardcoded BTC/ETH/SOL address.
  - id: node-cli-clipboard-crypto-clipper
    desc: Node clipboard clipper rewrites copied wallet address
    crit: hostile
    conf: 0.95
    attack: T1115
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/os/clipboard/access::node-cli-clipboard-readwrite
      - id: micro-behaviors/data/format/crypto-address/
  # WSH/JScript clippers read the clipboard via the htmlfile COM object
  # (`clipboardData.getData`) and rewrite it by shelling out to `clip.exe`,
  # neither of which the browser-API composites above cover. A hardcoded
  # checksum-valid destination address + a clipboard write + a clipboard read in
  # one script is the clipper shape regardless of the exact APIs used.
  - id: wsh-clipboard-crypto-clipper
    desc: WSH clipboard crypto address clipper
    crit: hostile
    conf: 0.95
    attack: T1115
    for: [javascript, vbs, html]
    all:
      - id: micro-behaviors/data/format/crypto-address::hardcoded-btc-addr
      - id: micro-behaviors/os/clipboard/access::clip-exe-write
    any:
      - id: micro-behaviors/os/clipboard/access::browser-clipboarddata-get
      - id: micro-behaviors/os/clipboard/access::browser-clipboard-read
    needs: 1
