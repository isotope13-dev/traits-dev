defaults:
  platforms: [windows]
  for: [pe, go, javascript]
  attack: T1115

traits:
  - id: clipper-set-command
    desc: Clipper wallet replacement command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "clipper:set:"

  # CDP webSocketDebuggerUrl + Runtime.evaluate atoms live in
  # micro-behaviors/communications/cdp/client/traits.yaml. Composites below
  # reference them by qualified id to keep the CDP surface defined once.

  - id: chromium-load-extension-arg
    desc: Chromium extension load argument
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '--load-extension="'

  - id: chromium-extension-files
    desc: Chromium extension file pair
    crit: component
    conf: 0.85
    count_min: 2
    if:
      type: text
      regex: 'manifest\.json|content\.js'

  - id: edge-extsvc-directory
    desc: Edge ExtSvc extension directory
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ExtSvc

  - id: wallet-regex-cluster
    desc: Multi-wallet address regex cluster
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '\^0x\[0-9a-fA-F\]\{(40|64)\}\$|\^f1\[a-z2-7\]\{38\}\$|\^\[A-Z2-7\]\{58\}\$'

composite_rules:
  - id: chromium-extension-cdp-fragments
    desc: Chromium extension CDP fragments
    crit: component
    conf: 0.9
    any:
      - id: edge-extsvc-directory
      - id: chromium-load-extension-arg
      - id: micro-behaviors/communications/http/devtools/client::cdp-debugger-url-key
      - id: micro-behaviors/communications/http/devtools/client::cdp-method-runtime-evaluate

  - id: chromium-cdp-extension-clipper
    desc: Chromium CDP extension clipper
    crit: hostile
    conf: 0.97
    all:
      - id: clipper-set-command
      - id: chromium-load-extension-arg
    needs: 2
    any:
      - id: micro-behaviors/communications/http/devtools/client::cdp-debugger-url-key
      - id: micro-behaviors/communications/http/devtools/client::cdp-method-runtime-evaluate
      - id: chromium-extension-files
      - id: edge-extsvc-directory
      - id: wallet-regex-cluster
