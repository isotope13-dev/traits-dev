defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  # A lone 卐/卍 (U+5350/U+534D) is an ordinary CJK ideograph present in every
  # CJK font and Big5/GBK->Unicode encoding table, so a single occurrence is not
  # an offensive marker. Require repetition (intentional defacement art/banner)
  # to separate hate-defacement from legitimate CJK text and font data.
  - id: offensive-symbol
    desc: Repeated swastika defacement glyph
    crit: suspicious
    conf: 0.7
    count_min: 3
    if:
      type: text
      substr: 卐
    unless:
      - type: basename
        regex: "\\.jar$"
      - id: metadata/library/structure::js-webpack-bundle
      - id: micro-behaviors/process/create/shell/host::require-vscode
  - id: ransom-deface-phrase
    desc: Ransom or defacement text phrase
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: "hackend|encrypted your files"
      case_insensitive: true
  - id: ransomware-self-label
    desc: Binary self-identifies as ransomware
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      word: ransomware
      case_insensitive: true
    not:
      - substr: detect ransomware
      - substr: against ransomware
      - substr: from ransomware
      - substr: anti-ransomware
      - substr: Ransomware-proof
      - substr: ransomware-proof
      - substr: ransomware proof
      - substr: potential ransomware
      - substr: suspected ransomware
      - regex: (?i)ransomware[- ]proof
    unless:
      - type: text
        substr: Bitdefender
      - type: text
        substr: antivirus
      - type: text
        substr: anti-virus
      - type: text
        substr: CorrelationRule(
      - id: well-known/tool/detection/llm-scanner/
  - id: ransomware-banner-core
    desc: Ransomware tool marker
    crit: suspicious
    conf: 0.75
    if:
      type: text
      case_insensitive: true
      regex: decrypt.{0,40}(bitcoin|ransom|\bwallet\b)|your files.{0,50}encrypted
    unless:
      - type: text
        substr: lockWallet
      - type: text
        substr: unlockWallet
      - type: text
        substr: temporaryDecrypt
      - type: text
        substr: walletup_enc
    not:
      - substr: No credential to decrypt from on pass
      - substr: paymentApplication
      - substr: decrypted data from pass
      - substr: Failed to decrypt data for pass
      - substr: decrypt from on pass
  - id: ultimatum-filename-a
    desc: Ransom note filename (HOW_TO/README pattern)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (?i)(HOW_TO_DECRYPT|README_DECRYPT|READ_THIS)[._-]
  - id: ultimatum-filename-b
    desc: "Ransom note filename"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)(YOUR_FILES|RECOVER_FILE|RESTORE_FILE)[._-]
  - id: ultimatum-filename-c
    desc: Ransom note with ULTIMATUM keyword in filename
    crit: component
    conf: 0.88
    if:
      type: text
      word: ULTIMATUM
      case_insensitive: true
    unless:
      - id: metadata/file/catalog/identity/
      - id: objectives/supply-chain/trojanized/app/context/
      - id: metadata/build/pip::python-packaging-vendored-source
  - id: btc-address-label
    desc: Bitcoin address label in ransom text
    crit: suspicious
    conf: 0.85
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: well-known/tool/reverse-engineering/scylla/
      - id: micro-behaviors/crypto/library/blockchain/
    if:
      type: text
      regex: 'BTC Adres|BTC address:|bitcoin address:'
      case_insensitive: true
  - id: create-ransom-note-fn
    desc: Python function that creates a ransom note
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: def\s+create_ransom_note
  - id: readme-locked-note
    desc: README_LOCKED ransom note
    crit: suspicious
    conf: 0.9
    for: [python, pyc, scripts, binaries]
    if:
      type: text
      substr: README_LOCKED.txt
composite_rules:
  - id: ultimatum-filename
    desc: Ransom note filename detected
    crit: suspicious
    conf: 0.85
    any:
      - id: ultimatum-filename-a
      - id: ultimatum-filename-b
      - id: ultimatum-filename-c
  - id: ransomware-bitcoin-combo
    desc: Bitcoin demand with ransomware markers
    crit: suspicious
    conf: 0.85
    any:
      - id: objectives/impact/ransom/encrypt/threat-text::bitcoin-word
    all:
      - id: ransomware-self-label
    unless:
      - id: well-known/tool/detection/stng::xor-classify-corpus
  - id: ransomware-banner-comp
    desc: Ransomware tool marker
    crit: suspicious
    conf: 0.8
    any:
      - id: ransomware-banner-core
      - id: objectives/impact/ransom/keywords::pay-bitcoin-phrase
