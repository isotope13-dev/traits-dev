defaults:
  platforms:
    - unix
    - windows
  # Ransomware markers are searched in executable and script content, where
  # they are most useful and where raw binary payload noise is bounded.
  for: [scripts, binaries]
traits:
  # CJK fonts and Big5/GBK->Unicode encoding tables contain these code points as
  # ordinary data. Require adjacent/repeated glyphs, which is the observable
  # defacement-banner form, instead of counting scattered charset-table entries.
  - id: offensive-symbol
    desc: Adjacent repeated swastika defacement glyphs
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: '[卐卍][ \\t\\r\\n]*[卐卍][ \\t\\r\\n]*[卐卍]'
    unless:
      - type: basename
        regex: "\\.jar$"
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/vscode::require-vscode
      - type: path
        regex: '(?i)([\\/]enc[\\/]trans[\\/]|[\\/]share[\\/]figlet[\\/])'
      # A squashfs Snap is a compressed container, not the text source that
      # this marker describes; scanning its raw bytes produces codec noise.
      - type: basename
        regex: '(?i)\.snap$'
  - id: ransom-deface-phrase
    desc: Ransom or defacement text phrase
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: "hackend|encrypted your files"
      case_insensitive: true
  - id: ransomware-impact-before-label
    desc: Ransomware label follows impact language
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)(encrypt|decrypt|bitcoin|locked).{0,60}ransomware'
    not:
      - substr: detect ransomware
      - substr: against ransomware
      - substr: from ransomware
      - substr: anti-ransomware
      - substr: Ransomware-proof
      - substr: ransomware-proof
      - substr: ransomware proof
      - substr: potential ransomware
      - substr: suspected ransomware
      - regex: (?i)ransomware[- ]proof
    unless:
      - type: text
        regex: '\.search\(["'']ransomware["'']\)'
      - type: text
        substr: Ransomware Precursor
      - type: text
        substr: Bitdefender
      - type: text
        substr: antivirus
      - type: text
        substr: anti-virus
      - type: text
        substr: CorrelationRule(
      - id: well-known/tool/detection/llm-scanner/
  - id: ransomware-label-before-impact
    desc: Ransomware label precedes impact language
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)ransomware.{0,60}(encrypt|decrypt|bitcoin|locked)'
    unless:
      - type: text
        regex: '\.search\(["'']ransomware["'']\)'
      - type: text
        substr: Ransomware Precursor
      - type: text
        substr: Bitdefender
      - type: text
        substr: antivirus
      - type: text
        substr: anti-virus
      - type: text
        substr: CorrelationRule(
      - id: well-known/tool/detection/llm-scanner/
  - id: ransomware-banner-core
    desc: Decrypt-for-payment ransom demand text
    crit: suspicious
    conf: 0.75
    unless:
      - id: well-known/app/sidesail/
      - id: micro-behaviors/crypto/library/blockchain/
      - id: objectives/credential-access/wallet/mnemonic/
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
      - id: metadata/file/profile/identity::static-html-shell
    if:
      type: text
      case_insensitive: true
      regex: decrypt.{0,40}(bitcoin|ransom)
    not:
      - substr: No credential to decrypt from on pass
      - substr: paymentApplication
      - substr: decrypted data from pass
      - substr: Failed to decrypt data for pass
      - substr: decrypt from on pass
      - regex: (?i)decrypts?\s+a\s+passkey\s+wallet
      # A ransom note is prose; anti-malware/download scanners list these same
      # words inside regex-literal detection arrays (/decrypt|ransom/i,
      # /how.*decrypt/i, /ransom.*note/i). Reject spans carrying regex
      # alternation or a flagged-literal separator — never present in real notes.
      - substr: '|'
      - regex: /[gimsuy]*,
  - id: ultimatum-filename-a
    desc: Ransom note decrypt filename
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (?i)(HOW_TO_DECRYPT|README_DECRYPT|README_LOCKED)[._-]
    unless:
      - id: well-known/tool/sysadmin/unix-benign::flipper-firmware-elf
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: ultimatum-filename-b
    desc: "Ransom note filename"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)(YOUR_FILES|RECOVER_FILE|RESTORE_FILE)[._-]
  - id: ultimatum-filename-c
    desc: Ransom note with ULTIMATUM keyword in filename
    crit: component
    conf: 0.88
    if:
      type: text
      word: ULTIMATUM
      case_insensitive: true
    unless:
      - id: metadata/file/catalog/identity/
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
      - id: metadata/build/pip::python-packaging-vendored-source
      - id: well-known/lib/zxcvbn::zxcvbn-password-strength-library
  - id: btc-address-label-forward
    desc: Bitcoin address followed by payment term
    crit: suspicious
    conf: 0.85
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: well-known/tool/reverse-engineering/scylla/
      - id: micro-behaviors/crypto/library/blockchain/
    if:
      type: text
      regex: '(bitcoin|btc) address.{0,80}(ransom|decrypt)'
      case_insensitive: true
  - id: btc-address-label-reverse
    desc: Payment term followed by Bitcoin address
    crit: suspicious
    conf: 0.85
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: well-known/tool/reverse-engineering/scylla/
      - id: micro-behaviors/crypto/library/blockchain/
    if:
      type: text
      regex: '(ransom|decrypt).{0,80}(bitcoin|btc) address'
      case_insensitive: true
  - id: create-ransom-note-fn
    desc: Python function that creates a ransom note
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: def\s+create_ransom_note
  - id: readme-locked-note
    desc: README_LOCKED ransom note
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: README_LOCKED.txt
composite_rules:
  - id: ransomware-self-label
    desc: Ransomware impact or payment language
    crit: notable
    conf: 0.7
    any:
      - id: ransomware-impact-before-label
      - id: ransomware-label-before-impact
  - id: btc-address-label
    desc: Bitcoin address label in ransom text
    crit: suspicious
    conf: 0.85
    any:
      - id: btc-address-label-forward
      - id: btc-address-label-reverse
  - id: ultimatum-filename
    desc: Ransom note filename detected
    crit: suspicious
    conf: 0.85
    any:
      - id: ultimatum-filename-a
      - id: ultimatum-filename-b
      - id: ultimatum-filename-c
    unless:
      - id: well-known/lib/zxcvbn::zxcvbn-password-strength-library
      - id: well-known/tool/sysadmin/alpine-packages::alpine-filebrowser-binary
  - id: ransomware-bitcoin-combo
    desc: Bitcoin demand with ransomware markers
    crit: suspicious
    conf: 0.85
    any:
      - id: objectives/impact/ransom/encrypt/threat-text::bitcoin-word
    all:
      - id: ransomware-self-label
    unless:
      - id: well-known/tool/detection/stng::xor-classify-corpus
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: ransomware-banner-comp
    desc: Ransomware tool marker
    crit: suspicious
    conf: 0.8
    any:
      - id: ransomware-banner-core
      - id: objectives/impact/ransom/keywords
