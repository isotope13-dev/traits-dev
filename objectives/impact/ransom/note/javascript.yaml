defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1486
traits:
  - id: ransom-note-text
    desc: Ransom note encryption notice text
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: '(?i)ALL FILES HAVE BEEN ENCRYPTED'
composite_rules:
  - id: js-ransomware-encryption
    desc: Node.js ransomware-style encrypt-and-delete pattern
    crit: hostile
    conf: 0.98
    near_bytes: 4096
    all:
      - id: micro-behaviors/crypto/symmetric/aes/library::node-crypto-create-cipher
      - id: micro-behaviors/fs/file/delete::fs-unlinkSync
    any:
      - id: ransom-note-text
      - id: objectives/impact/ransom/encrypt/threat-text::explicit-ransom-msgs
      - id: objectives/impact/ransom/encrypt/threat-text::ransom-with-extensions
      - id: objectives/impact/ransom/encrypt/config::ransom-extension
  - id: js-ransom-note-drop
    desc: Node.js script dropping a ransom note
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/file/write/direct::js-file-write
      - id: ransom-note-text
