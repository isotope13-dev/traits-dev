# Sextortion/extortion content embedded in a compiled Windows executable.
defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
  - id: pe-camera-sextortion-threat
    desc: Recording-based sexual threat text
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: '(?i)recorded.{0,80}masturbat'
  - id: pe-usd-extortion-demand
    desc: USD extortion payment amount
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: '(?i)All you need is \$[0-9][0-9,]*\s+USD'
  - id: pe-bitcoin-transfer-demand
    desc: Bitcoin transfer instruction
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: '(?i)Bitcoin.{0,40}transferred to my wallet address'

composite_rules:
  - id: pe-bitcoin-extortion-demand
    desc: Bitcoin extortion payment demand
    crit: suspicious
    conf: 0.99
    all:
      - id: pe-usd-extortion-demand
      - id: pe-bitcoin-transfer-demand
  - id: pe-sextortion-payment-mailer
    desc: PE sends a direct-SMTP sextortion payment demand
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/email/send/direct::pe-direct-smtp-client
      - id: pe-camera-sextortion-threat
      - id: pe-bitcoin-extortion-demand
  - id: pe-sextortion-motw-removal-mailer
    desc: PE sextortion mailer removes download provenance
    crit: hostile
    conf: 0.995
    all:
      - id: micro-behaviors/communications/email/send/direct::pe-direct-smtp-client
      - id: pe-camera-sextortion-threat
      - id: pe-bitcoin-extortion-demand
      - id: objectives/evasion/indicator-removal/cleanup::pe-motw-removal
