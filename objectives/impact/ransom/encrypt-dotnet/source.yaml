defaults:
  platforms: [windows]
  for: [csharp]
  attack: "T1486"
  mbc: "C0027"
traits:
  - id: dotnet-file-readallbytes
    desc: .NET file read-all-bytes
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "File.ReadAllBytes(file)"
  - id: dotnet-file-writeallbytes
    desc: .NET file write-all-bytes
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "File.WriteAllBytes(file, bytes)"
  - id: dotnet-locked-extension-move
    desc: .NET appends locked extension
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'File.Move(file, file + ".locked")'
  - id: dotnet-recursive-encrypt-call
    desc: Recursive encryptDirectory call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "this.encryptDirectory(directories[j], password)"
  - id: dotnet-extension-allowlist-loop
    desc: Extension allowlist file loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "source.Contains(extension)"
  - id: dotnet-ransom-note-writealllines
    desc: .NET writes ransom note
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "File.WriteAllLines(path, contents)"
  - id: dotnet-ransom-wallpaper-text
    desc: Ransom wallpaper crypto text
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "All your files are encrypted"
  - id: dotnet-password-query-exfil
    desc: Password exfil in query string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '"&password="'
  - id: dotnet-webclient-downloadstring
    desc: WebClient DownloadString call
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "new WebClient().DownloadString"
composite_rules:
  - id: dotnet-recursive-file-encryptor
    desc: .NET recursive file encryptor
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-file-readallbytes
      - id: dotnet-file-writeallbytes
      - id: dotnet-locked-extension-move
    any:
      - id: dotnet-recursive-encrypt-call
      - id: dotnet-extension-allowlist-loop
      - id: dotnet-ransom-note-writealllines
      - id: dotnet-ransom-wallpaper-text
      - id: dotnet-password-query-exfil
      - id: dotnet-webclient-downloadstring
    needs: 2
