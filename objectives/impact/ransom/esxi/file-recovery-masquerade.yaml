defaults:
  platforms: [linux, unix, android]
  for: [elf]
  mbc: "C0027"
  attack: "T1486"
  crit: hostile
composite_rules:
  - id: esxi-ransomware-recovery-tool
    desc: ESXi ransomware masquerading as a file recovery tool
    all:
      - id: objectives/evasion/masquerade/identity/tool::file-recovery-tool
      - id: micro-behaviors/os/sysinfo/vmware::vmfs-path
  - id: esxi-ransomware-logs
    desc: ESXi ransomware logs combined with VMFS targeting
    all:
      - id: micro-behaviors/os/sysinfo/vmware::vmfs-path
      - id: metadata/file/profile/logs/
