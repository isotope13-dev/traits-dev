defaults:
  platforms: [unix]
  for: [shell, python, c, cpp, go, elf]
traits:
  - id: esxcli-formatter
    desc: esxcli --formatter flag
    crit: component
    conf: 0.7
    if:
      type: text
      substr: esxcli --formatter
  - id: world-id-str
    desc: WorldID string
    crit: component
    conf: 0.6
    if:
      type: text
      word: WorldID
  - id: display-name-str
    desc: DisplayName string
    crit: component
    conf: 0.5
    if:
      type: text
      word: DisplayName
  - id: vm-process-kill
    desc: vm process kill command
    crit: component
    conf: 0.9
    if:
      type: text
      substr: vm process kill
  - id: vmsvc-power-off
    desc: vmsvc/power.off command
    crit: component
    conf: 0.9
    if:
      type: text
      substr: vmsvc/power.off
  - id: type-force-flag
    desc: --type=force flag
    crit: component
    conf: 0.8
    if:
      type: text
      substr: --type=force
  - id: type-hard-flag
    desc: --type=hard flag
    crit: component
    conf: 0.8
    if:
      type: text
      substr: --type=hard
  - id: vminventory-xml
    desc: ESXi VM inventory XML path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /etc/vmware/hostd/vmInventory.xml

  - id: xpath-config-entry
    desc: VMware inventory XPath query
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "//ConfigEntry"

  - id: vmxcfgpath-field
    desc: VMware VMX config path XML field
    crit: component
    conf: 0.85
    if:
      type: text
      substr: vmxCfgPath

  - id: esxi-welcome-note
    desc: ESXi welcome screen ransom note path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /usr/lib/vmware/hostd/docroot/ui/welcome.txt

  - id: libxml2-dep
    desc: libxml2 shared library dependency
    crit: component
    conf: 0.7
    if:
      type: text
      substr: libxml2.so.2

  - id: power-off-cmd
    desc: power.off command
    crit: component
    conf: 0.7
    if:
      type: text
      substr: power.off
  - id: power-suspend-cmd
    desc: power.suspend command
    crit: component
    conf: 0.7
    if:
      type: text
      substr: power.suspend
  - id: snapshot-removeall
    desc: snapshot.removeall command
    crit: component
    conf: 0.9
    if:
      type: text
      substr: snapshot.removeall
  - id: snapshot-remove
    desc: snapshot.remove command
    crit: component
    conf: 0.85
    if:
      type: text
      substr: snapshot.remove
  - id: vmsvc-snapshot
    desc: vmsvc/snapshot command
    crit: component
    conf: 0.85
    if:
      type: text
      substr: vmsvc/snapshot
  - id: remove-all-snapshots
    desc: RemoveAllSnapshots function
    crit: component
    conf: 0.9
    if:
      type: text
      word: RemoveAllSnapshots
  - id: esxcfg-prefix
    desc: esxcfg- tool prefix
    crit: component
    conf: 0.8
    if:
      type: text
      substr: esxcfg-
  - id: vmkfstools-cmd
    desc: vmkfstools command
    crit: component
    conf: 0.8
    if:
      type: text
      word: vmkfstools
  - id: vmware-cmd-tool
    desc: vmware-cmd tool
    crit: component
    conf: 0.8
    if:
      type: text
      word: vmware-cmd
  - id: esxi-version-var
    desc: EsxiVersion variable
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '[Ee]sxi[_]?[Vv]ersion'
  - id: vmware-version-var
    desc: vmware_version variable
    crit: component
    conf: 0.7
    if:
      type: text
      regex: vmware[_]?version
      case_insensitive: true
  - id: esx-conf-path
    desc: /etc/vmware/esx.conf path
    crit: component
    conf: 0.8
    if:
      type: text
      substr: /etc/vmware/esx.conf
  - id: system-version-get
    desc: system version get command
    crit: component
    conf: 0.7
    if:
      type: text
      substr: system version get
  - id: storage-filesystem-list
    desc: storage filesystem list command
    crit: component
    conf: 0.8
    if:
      type: text
      substr: storage filesystem list
  - id: esxcli-storage
    desc: esxcli storage command
    crit: component
    conf: 0.8
    if:
      type: text
      substr: esxcli storage
  - id: buffer-cache-maxcapacity
    desc: VMFS buffer max capacity
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: /BufferCache/MaxCapacity
  - id: buffer-cache-flushinterval
    desc: VMFS buffer flush interval
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: /BufferCache/FlushInterval
  - id: eagerzeroedthick-disk
    desc: Creates eagerzeroedthick disk
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: eagerzeroedthick
  - id: autostart-clear
    desc: Clears ESXi autostart
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: hostsvc/autostartmanager/clear_autostart
  - id: autostart-disable
    desc: Disables ESXi autostart
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: hostsvc/autostartmanager/enable_autostart 0
composite_rules:
  - id: vmsvc-enum
    desc: vmsvc enumeration commands
    crit: component
    any:
      - id: micro-behaviors/os/sysinfo/vmware::vmsvc-getallvms
      - id: micro-behaviors/os/sysinfo/vmware::vim-cmd-vmsvc
  - id: world-display-combo
    desc: WorldID and DisplayName combo
    crit: component
    all:
      - id: world-id-str
      - id: display-name-str
  - id: xml-vm-enum
    desc: XML-based ESXi VM inventory enumeration
    crit: suspicious
    conf: 0.9
    mbc: C0027
    attack: T1518
    all:
      - id: vminventory-xml
    any:
      - id: xpath-config-entry
      - id: vmxcfgpath-field
      - id: libxml2-dep

  - id: vm-enumeration
    desc: ESXi virtual machine enumeration
    crit: suspicious
    conf: 0.85
    mbc: C0027
    attack: T1486
    any:
      - id: vmsvc-enum
      - id: micro-behaviors/os/sysinfo/vmware::esxcli-vm-list
      - id: esxcli-formatter
      - id: world-display-combo
      - id: xml-vm-enum
  - id: kill-commands
    desc: VM kill commands
    crit: component
    any:
      - id: vm-process-kill
      - id: vmsvc-power-off
      - id: type-force-flag
      - id: type-hard-flag
      - id: micro-behaviors/os/sysinfo/vmware::esxi-world-id-param
  - id: power-commands
    desc: VM power commands
    crit: component
    any:
      - id: power-off-cmd
      - id: power-suspend-cmd
  - id: vm-kill
    desc: ESXi virtual machine termination command
    crit: suspicious
    conf: 0.9
    mbc: C0027
    attack: T1489
    any:
      - id: kill-commands
      - id: power-commands
      - id: micro-behaviors/os/sysinfo/vmware::esxcli-vm-kill
  - id: snapshot
    desc: ESXi snapshot removal command (ransomware)
    crit: suspicious
    conf: 0.9
    mbc: C0027
    attack: T1490
    any:
      - id: snapshot-removeall
      - id: snapshot-remove
      - id: vmsvc-snapshot
      - id: remove-all-snapshots
      - id: micro-behaviors/os/sysinfo/vmware::vimcmd-snapshot-remove
  - id: file-targeting
    desc: ESXi-specific file extension targeting
    crit: suspicious
    conf: 0.85
    mbc: C0027
    attack: T1486
    any:
      - id: micro-behaviors/os/sysinfo/vmware::vmware-extensions
      - id: micro-behaviors/os/sysinfo/vmware::vmfs-path
  - id: cli-tools
    desc: ESXi CLI tools for attack
    crit: suspicious
    conf: 0.8
    mbc: C0027
    attack: T1486
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/vmware::esxcli-tool
      - id: micro-behaviors/os/sysinfo/vmware::vim-cmd-tool
      - id: esxcfg-prefix
      - id: vmkfstools-cmd
      - id: vmware-cmd-tool
  - id: version-detect
    desc: ESXi version detection for compatibility
    crit: suspicious
    conf: 0.7
    mbc: C0027
    attack: T1486
    any:
      - id: esxi-version-var
      - id: vmware-version-var
      - id: esx-conf-path
      - id: system-version-get
  - id: datastore-access
    desc: ESXi datastore enumeration and access
    crit: suspicious
    conf: 0.8
    mbc: C0027
    attack: T1486
    all:
      - id: micro-behaviors/os/sysinfo/vmware::vmfs-path
    any:
      - id: storage-filesystem-list
      - id: esxcli-storage
  - id: storage-pre-encryption-prep
    desc: ESXi storage pre-encryption prep
    crit: suspicious
    conf: 0.93
    all:
      - id: vmkfstools-cmd
      - id: eagerzeroedthick-disk
    any:
      - id: buffer-cache-maxcapacity
      - id: buffer-cache-flushinterval
      - id: autostart-clear
      - id: autostart-disable
  - id: esxi-autostart-suppression
    desc: ESXi VM autostart suppression
    crit: suspicious
    conf: 0.92
    all:
      - id: autostart-clear
      - id: autostart-disable
  - id: hidden-daemon-esxi-ransom-pattern
    desc: Hidden daemon ESXi ransomware
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/persistence/system/daemon/hidden-path::hidden-system-daemon-persistence
      - id: vm-kill
    any:
      - id: storage-pre-encryption-prep
      - id: datastore-access
      - id: objectives/impact/ransom/encrypt/cli::password-gated-ransomware-cli
  - id: full-attack
    desc: ESXi-targeted ransomware attack chain
    crit: suspicious
    conf: 0.95
    all:
      - id: file-targeting
    any:
      - id: vm-kill
      - id: snapshot
      - id: xml-vm-enum
