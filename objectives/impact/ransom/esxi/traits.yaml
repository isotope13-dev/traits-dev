defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: vim-cmd-tool
    desc: VMware vim-cmd tool
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: vim-cmd
  - id: esxcli-tool
    desc: ESXi CLI tool
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: esxcli
  - id: vim-cmd-vmsvc
    desc: vim-cmd vmsvc command
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: vim-cmd vmsvc
  - id: esxcli-formatter
    desc: esxcli --formatter flag
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: esxcli --formatter
  - id: world-id-str
    desc: WorldID string
    crit: component
    conf: 0.6
    if:
      type: string_value
      word: WorldID
  - id: display-name-str
    desc: DisplayName string
    crit: component
    conf: 0.5
    if:
      type: string_value
      word: DisplayName
  - id: vm-process-kill
    desc: vm process kill command
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: vm process kill
  - id: vmsvc-power-off
    desc: vmsvc/power.off command
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: vmsvc/power.off
  - id: type-force-flag
    desc: --type=force flag
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: --type=force
  - id: type-hard-flag
    desc: --type=hard flag
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: --type=hard
  - id: power-off-cmd
    desc: power.off command
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: power.off
  - id: power-suspend-cmd
    desc: power.suspend command
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: power.suspend
  - id: snapshot-removeall
    desc: snapshot.removeall command
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: snapshot.removeall
  - id: snapshot-remove
    desc: snapshot.remove command
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: snapshot.remove
  - id: vmsvc-snapshot
    desc: vmsvc/snapshot command
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: vmsvc/snapshot
  - id: remove-all-snapshots
    desc: RemoveAllSnapshots function
    crit: component
    conf: 0.9
    if:
      type: string_value
      word: RemoveAllSnapshots
  - id: esxcfg-prefix
    desc: esxcfg- tool prefix
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: esxcfg-
  - id: vmkfstools-cmd
    desc: vmkfstools command
    crit: component
    conf: 0.8
    if:
      type: string_value
      word: vmkfstools
  - id: vmware-cmd-tool
    desc: vmware-cmd tool
    crit: component
    conf: 0.8
    if:
      type: string_value
      word: vmware-cmd
  - id: esxi-version-var
    desc: EsxiVersion variable
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: '[Ee]sxi[_]?[Vv]ersion'
  - id: vmware-version-var
    desc: vmware_version variable
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: vmware[_]?version
      case_insensitive: true
  - id: esx-conf-path
    desc: /etc/vmware/esx.conf path
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: /etc/vmware/esx.conf
  - id: system-version-get
    desc: system version get command
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: system version get
  - id: storage-filesystem-list
    desc: storage filesystem list command
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: storage filesystem list
  - id: esxcli-storage
    desc: esxcli storage command
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: esxcli storage
composite_rules:
  - id: vmsvc-enum
    desc: vmsvc enumeration commands
    crit: component
    any:
      - id: objectives/impact/services/stop::vmsvc-getallvms
      - id: vim-cmd-vmsvc
  - id: world-display-combo
    desc: WorldID and DisplayName combo
    crit: component
    all:
      - id: world-id-str
      - id: display-name-str
  - id: vm-enumeration
    desc: ESXi virtual machine enumeration
    crit: suspicious
    conf: 0.85
    mbc: C0027
    attack: T1486
    any:
      - id: vmsvc-enum
      - id: micro-behaviors/os/sysinfo/vmware::esxcli-vm-list
      - id: esxcli-formatter
      - id: world-display-combo
  - id: kill-commands
    desc: VM kill commands
    crit: component
    any:
      - id: vm-process-kill
      - id: vmsvc-power-off
      - id: type-force-flag
      - id: type-hard-flag
      - id: micro-behaviors/os/sysinfo/vmware::esxi-world-id-param
  - id: power-commands
    desc: VM power commands
    crit: component
    any:
      - id: power-off-cmd
      - id: power-suspend-cmd
  - id: vm-kill
    desc: ESXi virtual machine termination command
    crit: suspicious
    conf: 0.9
    mbc: C0027
    attack: T1489
    any:
      - id: kill-commands
      - id: power-commands
      - id: micro-behaviors/os/sysinfo/vmware::esxcli-vm-kill
  - id: snapshot
    desc: ESXi snapshot removal command (ransomware)
    crit: suspicious
    conf: 0.9
    mbc: C0027
    attack: T1490
    any:
      - id: snapshot-removeall
      - id: snapshot-remove
      - id: vmsvc-snapshot
      - id: remove-all-snapshots
      - id: micro-behaviors/os/sysinfo/vmware::vimcmd-snapshot-remove
  - id: file-targeting
    desc: ESXi-specific file extension targeting
    crit: suspicious
    conf: 0.85
    mbc: C0027
    attack: T1486
    any:
      - id: micro-behaviors/os/sysinfo/vmware::vmware-extensions
      - id: micro-behaviors/os/sysinfo/vmware::vmfs-path
  - id: cli-tools
    desc: ESXi CLI tools for attack
    crit: suspicious
    conf: 0.8
    mbc: C0027
    attack: T1486
    needs: 2
    any:
      - id: esxcli-tool
      - id: vim-cmd-tool
      - id: esxcfg-prefix
      - id: vmkfstools-cmd
      - id: vmware-cmd-tool
  - id: version-detect
    desc: ESXi version detection for compatibility
    crit: notable
    conf: 0.7
    mbc: C0027
    attack: T1486
    any:
      - id: esxi-version-var
      - id: vmware-version-var
      - id: esx-conf-path
      - id: system-version-get
  - id: datastore-access
    desc: ESXi datastore enumeration and access
    crit: suspicious
    conf: 0.8
    mbc: C0027
    attack: T1486
    all:
      - id: micro-behaviors/os/sysinfo/vmware::vmfs-path
    any:
      - id: storage-filesystem-list
      - id: esxcli-storage
  - id: full-attack
    desc: ESXi-targeted ransomware attack chain
    crit: suspicious
    conf: 0.95
    all:
      - id: file-targeting
    any:
      - id: vm-kill
      - id: snapshot
