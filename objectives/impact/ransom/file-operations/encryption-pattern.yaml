# Ransomware file encryption patterns
# Detects drive enumeration + crypto + file operations characteristic of ransomware
defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  # === Helper rules for crypto capabilities ===
  - id: has-crypto-capability
    desc: Has cryptographic API capability
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/crypto/library::crypt-acquire-context
      - id: micro-behaviors/os/random/generator::crypt-gen-random
      - id: micro-behaviors/crypto/certificate/store::cert-open-store
  - id: has-volume-enumeration
    desc: Has volume enumeration capability
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/fs/enumerate/volume::find-first-volume
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
  # NOTE: This is an internal helper rule used by ransomware composites.
  # Set crit: notable so it doesn't show up in user output - it's not suspicious on its own.
  - id: has-file-operations
    desc: Has file operation capabilities
    crit: component
    conf: 0.8
    any:
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: micro-behaviors/fs/file/delete/
      - id: micro-behaviors/fs/enumerate/directory::find-first-file
    needs: 2
  # === Drive encryption targeting ===
  - id: volume-targeting-ransomware
    desc: Volume enumeration with encryption and file operations
    crit: hostile
    conf: 0.95
    attack: "T1486"
    mbc: "C0027"
    size_max: 1048576
    all:
      - id: micro-behaviors/fs/enumerate/volume::find-first-volume
      - id: has-crypto-capability
      - id: has-file-operations
    downgrade:
      any:
        - id: metadata/binary/metrics::many-exports
        - id: metadata/package/versioning::pe-version-resource
  # === File renaming pattern (ransomware appends extension) ===
  - id: mass-file-renaming
    desc: Bulk file renaming with crypto
    crit: notable
    conf: 0.85
    attack: "T1486"
    all:
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: micro-behaviors/fs/enumerate/directory::find-first-file
      - id: micro-behaviors/fs/enumerate/directory::find-next-file
    any:
      - id: micro-behaviors/crypto/library::crypt-encrypt
      - id: micro-behaviors/crypto/library::capi-keyed-buffer-crypto-chain
      - id: micro-behaviors/crypto/symmetric/aes::aes-sbox-bytes
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/package/versioning::pe-version-resource
