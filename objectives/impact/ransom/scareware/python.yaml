defaults:
  platforms: [windows]
  for: [python]
  attack: T1491.001

composite_rules:
  - id: audio-browser-ransom
    desc: Windows audio harassment with forced browser redirect and ransom text
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/ui/dialog::winsound-beep
      - id: micro-behaviors/process/create/launch::webbrowser-open
    any:
      - id: objectives/impact/ransom/note::ransomware-self-label
      - id: objectives/impact/ransom/note::ultimatum-filename
      - id: objectives/impact/ransom/encrypt::bitcoin-word
  - id: scareware-mass-spawn
    desc: Scareware mass process spawning with ransom note creation
    crit: hostile
    conf: 0.92
    all:
      - id: objectives/impact/ransom/note::create-ransom-note-fn
      - id: micro-behaviors/ui/dialog::winsound-beep
    any:
      - id: objectives/impact/ransom/note::ultimatum-filename
      - id: objectives/impact/ransom/note::ransomware-bitcoin-combo
      - id: objectives/impact/ransom/note::ransomware-self-label
