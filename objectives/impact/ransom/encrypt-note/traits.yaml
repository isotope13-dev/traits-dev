defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: pay-ransom
    desc: Ransom payment instruction phrase
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: pay the ransom
composite_rules:
  - id: generic_msg
    desc: Generic ransom note string
    crit: suspicious
    conf: 0.6
    any:
      - id: objectives/impact/ransom/encrypt/threat-text::files-encrypted-msg
      - id: objectives/impact/ransom/tactics::restore-files-msg
      - id: pay-ransom
