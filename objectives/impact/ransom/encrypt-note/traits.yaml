# Ransomware Encryption Note Indicators
# ATT&CK: T1486 (Data Encrypted for Impact)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: pay-ransom
    desc: "pay the ransom"
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: "pay the ransom"
composite_rules:
  - id: generic_msg
    desc: "Generic ransom note string"
    crit: notable
    conf: 0.6
    any:
      - id: objectives/impact/ransom/encrypt::files-encrypted-msg
      - id: objectives/impact/ransom/behavior::restore-files-msg
      - id: pay-ransom
