# Ransomware operator flag panel. Modern affiliate ransomware ships
# with command-line knobs for the operator: toggle GPO spread, mount
# network shares, force safe-mode reboot, enable/disable stealth
# (self-delete), choose target paths, override credentials. The
# cluster of flags is itself a fingerprint of the family-builder
# pattern, distinct from any specific family. Observed in VECT,
# Conti-derivatives, BlackBasta, Akira.
defaults:
  platforms: [windows, unix]
  for: [pe, dll]
  attack: T1486
  mbc: B0007
  size_min: 2048
  size_max: 500000000
traits:
  - id: flag-no-gpo
    desc: --no-gpo / --gpo CLI flag
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '--(no-)?gpo\b'
  - id: flag-force-safemode
    desc: --force-safemode CLI flag
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: '--force-safemode'
  - id: flag-stealth
    desc: --stealth / --no-stealth CLI flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '--(no-)?stealth\b'
  - id: flag-mount
    desc: --mount / --no-mount CLI flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '--(no-)?mount\b'
    unless:
      - id: well-known/tool/sysadmin/virtualization::lima-virtualization-tool
  - id: flag-creds-b64
    desc: --creds <b64> credential override
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '--creds\s+<b64>|--creds\s+\$|--credentials?\s+<b64>'
      case_insensitive: true
  - id: flag-target-path
    desc: --path <dir> target-directory flag
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '--path\s+<(dir|directory|path)>'
      case_insensitive: true
composite_rules:
  - id: ransomware-operator-flag-panel
    desc: Ransomware operator flag panel
    crit: hostile
    conf: 0.95
    needs: 3
    any:
      - id: flag-no-gpo
      - id: flag-force-safemode
      - id: flag-stealth
      - id: flag-mount
      - id: flag-creds-b64
      - id: flag-target-path
