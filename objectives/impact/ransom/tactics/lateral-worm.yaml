# Ransomware-with-lateral-spread (worm) hostile composites.
#
# Linux ransomware that bundles its own SSH credential brute-forcer
# is qualitatively more dangerous than a single-host file encryptor:
# one infected machine seeds the next. Each component in isolation
# is detectable but ambiguous (an SSH brute-forcer alone could be a
# pen-test tool, a ransomware extension blob alone could be a
# detection list). The *combination* is conclusive ransomware-worm
# shape — defensive tooling should escalate accordingly.
defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  attack: T1486
  mbc: B0040

composite_rules:
  # Conclusive Linux ransomware-worm. The SSH brute-force success
  # log + ransomware extension blob is the smoking-gun pair: the
  # brute-forcer is integrated with the encryptor, not invoked as a
  # separate stage.
  - id: ransomware-with-credential-spray
    desc: Ransomware with SSH credential spray (worm shape)
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/lateral-movement/brute-force/ssh::ssh-credential-spray-success-log
      - id: objectives/impact/ransom/encrypt/extension::ransomware-target-extension-blob

  # Same shape but keyed on DB-kill + brute-force + encryption — the
  # full ransomware-worm operational triad.
  - id: ransomware-worm-full-triad
    desc: Linux ransomware worm (DB-kill + brute + encrypt)
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/impact/services/stop::db-kill-routine-status
      - id: objectives/lateral-movement/brute-force/ssh::ssh-credential-spray-success-log
      - id: objectives/impact/ransom/encrypt/extension::ransomware-target-extension-blob

  # Encryption progress logger + extension blob = confirmed
  # file-encryptor (no lateral component required).
  - id: confirmed-file-encryptor
    desc: Confirmed file-encrypting ransomware
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/impact/ransom/encrypt/log::encryption-progress-logger
      - id: objectives/impact/ransom/encrypt/extension::ransomware-target-extension-blob
