# Encryption / write of Windows Recovery Environment (WinRE) artifacts.
# Ransomware that encrypts \Recovery\WindowsRE\Winre.wim and the boot
# configuration (boot.sdi, ReAgent.xml, BOOTNXT) blocks command-prompt
# recovery, BitLocker recovery, and BCD repair from WinRE — implementing
# T1490 Inhibit System Recovery at the strongest level. Observed in
# Qilin/Agenda detonations against domain controllers.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell]
  attack: T1490
  mbc: F0007
traits:
  - id: winre-wim-write
    desc: References Winre.wim recovery image
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'Winre\.wim(\.[A-Za-z0-9]{4,14})?'
      case_insensitive: true
  - id: winre-recovery-path
    desc: References Recovery\WindowsRE path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\\Recovery\\WindowsRE\\'
      case_insensitive: true
  - id: reagent-xml-write
    desc: References ReAgent.xml WinRE config
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'ReAgent\.xml(\.[A-Za-z0-9]{4,14})?'
      case_insensitive: true
composite_rules:
  - id: winre-encryption-recovery-block
    desc: Multiple WinRE recovery artifact references
    crit: suspicious
    conf: 0.97
    needs: 3
    any:
      - id: winre-wim-write
      - id: winre-recovery-path
      - id: reagent-xml-write
      - id: micro-behaviors/fs/path/system::boot-sdi-recovery-loader
    unless:
      - id: micro-behaviors/fs/disk/partition::partition-table-copy
    downgrade:
      any:
        - id: metadata/signed/leaf::bitdefender-srl
        - id: metadata/signed/platform/
