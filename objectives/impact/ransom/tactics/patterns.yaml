defaults:
  platforms: [unix, windows]
  for: [scripts, source, documents]
  attack: T1486
traits:
  - id: rsa-keyword
    desc: RSA keyword
    crit: notable
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      exact: RSA
  - id: generate-keypair
    desc: generateKeyPair function
    crit: notable
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: generateKeyPair
  - id: public-encrypt
    desc: publicEncrypt function
    crit: notable
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: publicEncrypt
  - id: private-decrypt
    desc: privateDecrypt function
    crit: notable
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: privateDecrypt
  - id: begin-rsa-key
    desc: BEGIN RSA key header
    crit: notable
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: '-----BEGIN RSA'
  - id: begin-public-key
    desc: BEGIN PUBLIC KEY header
    crit: notable
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: '-----BEGIN PUBLIC KEY'
  - id: readdir-sync
    desc: readdirSync function
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: readdirSync
  - id: walk-sync
    desc: walkSync function
    crit: notable
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: walkSync
  - id: glob-module
    desc: glob module
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      exact: glob
  - id: open-paren
    desc: open( function for file write
    crit: notable
    conf: 0.3
    for: [scripts, binaries]
    if:
      type: string_literal
      regex: open\([^)]{0,120}["'][wa]["']
  - id: pay-bitcoin-msg
    desc: Pay bitcoin message
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: pay bitcoin
      case_insensitive: true
  - id: pay-btc-msg
    desc: Pay BTC message
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: pay btc
      case_insensitive: true
  - id: decrypt-files-msg
    desc: Decrypt files message
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: decrypt your files
      case_insensitive: true
  - id: bitcoin-wallet-msg
    desc: Bitcoin wallet message
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: bitcoin wallet
      case_insensitive: true
  - id: restore-files-msg
    desc: Restore files message
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: restore your files
      case_insensitive: true
  - id: send-payment-msg
    desc: Send payment message
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: send payment
      case_insensitive: true
  - id: rename-sync
    desc: renameSync function
    crit: notable
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: renameSync
  - id: rename-fn
    desc: "rename( function"
    crit: component
    conf: 0.4
    count_min: 2
    for: [scripts, binaries]
    if:
      type: text
      substr: "rename("
  - id: os-rename
    desc: os.rename function
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: os.rename
  - id: ext-enc
    desc: .enc extension
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: string_literal
      exact: .enc
  - id: ext-crypt
    desc: .crypt extension
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: .crypt
  - id: mutate-keyword
    desc: mutate keyword (multiple occurrences)
    crit: notable
    conf: 0.4
    for:
      - javascript
      - typescript
    count_min: 3
    if:
      type: string_literal
      substr: mutate
  - id: vssadmin-delete
    desc: vssadmin delete shadows
    crit: notable
    conf: 0.7
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: vssadmin\s+delete\s+shadows
  - id: wmic-shadowcopy
    desc: wmic shadowcopy delete
    crit: notable
    conf: 0.7
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: wmic\s+shadowcopy\s+delete
  - id: bcdedit-recovery
    desc: bcdedit recoveryenabled no
    crit: notable
    conf: 0.7
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: bcdedit.{0,30}recoveryenabled.{0,30}no
  - id: python-open-rplusb
    desc: Python open with r+b mode
    crit: notable
    conf: 0.72
    for:
      - python
    if:
      type: text
      regex: open\([^)]{0,140}['"]r\+b['"]
    downgrade:
      any:
        - id: metadata/package/testing/presence::test-directory
        - id: metadata/package/testing/scripted::pytest
  - id: python-seek-write-truncate
    desc: Seek write truncate overwrite sequence
    crit: suspicious
    conf: 0.86
    for:
      - python
    size_max: 50000
    if:
      type: text
      regex: \.seek\(\s*0\s*\)[\s\S]{0,220}\.write\([\s\S]{0,220}\.truncate\(
    downgrade:
      any:
        - id: metadata/package/testing/presence::test-directory
        - id: metadata/package/testing/scripted::pytest
composite_rules:
  - id: rsa-key-operations
    desc: RSA key operations
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    needs: 2
    any:
      - id: rsa-keyword
      - id: generate-keypair
      - id: public-encrypt
      - id: private-decrypt
      - id: begin-rsa-key
      - id: begin-public-key
  - id: rsa-key-handling
    desc: RSA key generation or handling
    crit: notable
    conf: 0.8
    for: [scripts, binaries]
    all:
      - id: micro-behaviors/data/text/keywords::crypto-substr
      - id: rsa-key-operations
  - id: file-iteration
    desc: File iteration functions
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    any:
      - id: readdir-sync
      - id: walk-sync
      - id: glob-module
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
  - id: file-write-functions
    desc: File write functions
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    any:
      - id: micro-behaviors/fs/write/file::write-file-sync
      - id: micro-behaviors/fs/write/file::write-file-async
      - id: open-paren
  - id: file-encryption-loop-comp
    desc: File iteration with encryption (ransomware
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    unless:
      - id: micro-behaviors/process/interpreter/vm::yarn-release-bundle
      - id: metadata/library/structure::js-webpack-bundle
    all:
      - id: file-iteration
      - id: micro-behaviors/crypto/library::encryption-functions
      - id: file-write-functions
    any:
      - id: rename-functions
      - id: encrypted-extensions
      - id: ransom-note
      - id: rsa-key-handling
    downgrade:
      any:
        - id: objectives/supply-chain/metadata-anomaly/manifest::vscode-extension
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: metadata/package/tooling::has-sourcemap
  - id: ransom-note
    desc: Ransom note text patterns
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    needs: 2
    any:
      - id: objectives/impact/ransom/encrypt::files-encrypted-msg
      - id: pay-bitcoin-msg
      - id: pay-btc-msg
      - id: decrypt-files-msg
      - id: bitcoin-wallet-msg
      - id: restore-files-msg
      - id: send-payment-msg
  - id: rename-functions
    desc: File rename functions
    crit: notable
    conf: 0.4
    for: [scripts, binaries]
    any:
      - id: rename-sync
      - id: rename-fn
      - id: os-rename
  - id: encrypted-extensions
    desc: Encrypted file extensions
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    any:
      - id: objectives/impact/ransom/encrypt::ext-encrypted
      - id: objectives/impact/ransom/encrypt::ext-locked
      - id: ext-enc
      - id: ext-crypt
  - id: extension-change
    desc: Changes file extensions (potential ransomware)
    crit: suspicious
    conf: 0.85
    for: [scripts, binaries]
    all:
      - id: rename-functions
      - id: encrypted-extensions
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
        - id: objectives/supply-chain/metadata-anomaly/manifest::vscode-extension
    unless:
      - id: objectives/anti-static/obfuscation/payload::source-map-extension
      - id: objectives/anti-static/obfuscation/payload::sources-content-json
      - id: metadata/library/structure::js-webpack-bundle
  - id: shadow-delete
    desc: Shadow copy deletion (ransomware preparation)
    crit: suspicious
    conf: 0.95
    attack: T1490
    any:
      - id: vssadmin-delete
      - id: wmic-shadowcopy
      - id: bcdedit-recovery
  - id: script-ransomware
    desc: Script-based ransomware behavior
    crit: hostile
    conf: 0.95
    all:
      - id: shadow-delete
    any:
      - id: objectives/impact/services/stop::sc-stop
      - id: objectives/impact/services/stop::net-stop
      - id: objectives/impact/degrade/firewall::netsh-firewall-off
      - id: objectives/impact/ransom/encrypt::encrypt-comp
  - id: python-file-iteration
    desc: Python file iteration for encryption
    crit: component
    conf: 0.7
    for:
      - python
    any:
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
      - id: micro-behaviors/fs/directory/readdir::readdir-python
  - id: python-overwrite-path
    desc: Python overwrite sink for file encryption
    crit: component
    conf: 0.7
    for:
      - python
    any:
      - id: python-seek-write-truncate
      - id: micro-behaviors/fs/file/open::binary-write-mode
  - id: inplace-encrypt
    desc: Python file encryption overwrite workflow
    crit: hostile
    conf: 0.95
    for:
      - python
    all:
      - id: python-file-iteration
      - id: micro-behaviors/fs/read/file::file-open-content
      - id: python-overwrite-path
      - id: micro-behaviors/crypto/symmetric/fernet::encrypt
      - id: micro-behaviors/crypto/symmetric/fernet::keygen
