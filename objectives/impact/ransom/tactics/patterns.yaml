defaults:
  platforms: [unix, windows]
  for: [scripts, source, documents]
  attack: T1486
traits:
  - id: glob-module
    desc: glob module
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      exact: glob
  - id: open-paren
    desc: open( function for file write
    crit: component
    conf: 0.3
    for: [scripts, binaries]
    if:
      type: string_literal
      regex: open\([^)]{0,120}["'][wa]["']
  - id: pay-bitcoin-msg
    desc: Pay bitcoin message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: pay bitcoin
      case_insensitive: true
  - id: pay-btc-msg
    desc: Pay BTC message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: pay btc
      case_insensitive: true
  - id: decrypt-files-msg
    desc: Decrypt files message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: decrypt your files
      case_insensitive: true
  - id: bitcoin-wallet-msg
    desc: Bitcoin wallet payment-demand message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    unless:
    - id: well-known/app/sidesail/
    - id: well-known/app/blockstream::blockstream-branding
    if:
      type: string_literal
      regex: '(?i)bitcoin wallet.{0,60}(pay|ransom|decrypt)'
  - id: restore-files-msg
    desc: Restore files message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: restore your files
      case_insensitive: true
    unless:
      - id: well-known/app/wordpress-plugins::known-wordpress-plugin
  - id: send-payment-msg
    desc: Generic send payment text
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: send payment
      case_insensitive: true
  - id: rename-fn
    desc: "rename( function"
    crit: component
    conf: 0.4
    count_min: 2
    for: [scripts, binaries]
    if:
      type: text
      substr: "rename("
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: os-rename
    desc: os.rename function
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: os.rename

  - id: decrypt-readme-file
    desc: DECRYPT README note file
    crit: component
    conf: 0.9
    for: [scripts]
    if:
      type: literal
      substr: DECRYPT_README.txt
  - id: lua-os-remove-call
    desc: Lua removes original ransom target
    crit: component
    conf: 0.9
    for: [lua]
    if:
      type: text
      substr: os.remove(input_path)
  - id: lua-os-rename-call
    desc: Lua renames target to dfcrypt
    crit: component
    conf: 0.92
    for: [lua]
    if:
      type: text
      substr: os.rename(output_path, input_path .. ".dfcrypt")
  - id: lua-files-encrypted-msg
    desc: Lua files encrypted ransom message
    crit: component
    conf: 0.9
    for: [lua]
    if:
      type: text
      substr: your files have been encrypted
      case_insensitive: true
  - id: vssadmin-delete
    desc: vssadmin delete shadows
    crit: suspicious
    conf: 0.7
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: vssadmin\s+delete\s+shadows
  - id: wmic-shadowcopy
    desc: wmic shadowcopy delete
    crit: suspicious
    conf: 0.7
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: wmic\s+shadowcopy\s+delete
    unless:
      - id: well-known/app/peazip::peazip-zpaq-helper
  - id: bcdedit-recovery
    desc: bcdedit recoveryenabled no
    crit: suspicious
    conf: 0.7
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: bcdedit.{0,30}recoveryenabled.{0,30}no
  - id: wbadmin-delete-systemstate
    desc: wbadmin deletes system backups
    crit: suspicious
    conf: 0.8
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: (?i)wbadmin\s+delete\s+systemstatebackup
  - id: python-open-rplusb
    desc: Python read-write binary file open
    # open(..., "r+b") is ordinary in-place binary I/O (resumable downloads,
    # file patching). It is only a ransom signal combined with crypto +
    # overwrite-in-loop in the inplace-overwrite/inplace-encrypt composites,
    # so it carries no standalone objective signal.
    crit: component
    conf: 0.72
    for:
      - python
    if:
      type: text
      regex: open\([^)]{0,140}['"]r\+b['"]
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness/
        - id: metadata/package/testing/scripted/
  - id: python-seek-write-truncate
    desc: Seek write truncate overwrite sequence
    crit: component
    conf: 0.86
    for:
      - python
    size_max: 50000
    if:
      type: text
      regex: \.seek\(\s*0\s*\)[\s\S]{0,220}\.write\([\s\S]{0,220}\.truncate\(
    downgrade:
      any:
        - id: metadata/package/manifest/ecosystem::conda-index-metadata
        - id: metadata/package/manifest/ecosystem::conda-about-metadata
        - id: metadata/package/testing/presence/harness::python-test-file
        - id: metadata/package/testing/presence/harness/
        - id: metadata/package/testing/scripted/
    unless:
      - type: path
        regex: '(^|[\\/])site-packages[\\/]conda[\\/]'
  - id: python-loop-writeback
    desc: Loop variable reopened in wb mode
    crit: component
    conf: 0.83
    for:
      - python
    if:
      type: text
      regex: with\s+open\(\s*file\s*,\s*['"]wb['"]
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness/
        - id: metadata/package/testing/scripted/
  - id: python-local-key-file
    desc: Python opens literal .key for writing
    crit: suspicious
    conf: 0.8
    for:
      - python
    if:
      type: symbol
      kind: call
      exact: open
      arg:
        kind: string
        substr: .key
  - id: python-skip-self-and-key
    desc: Python skips script and key file
    crit: component
    conf: 0.82
    for:
      - python
    if:
      type: text
      regex: file == ['"][^"'\\]{1,32}\.py['"] or file == ['"][^"'\\]{1,32}\.key['"]
  - id: closure-css-name-mapping-text
    desc: Closure CSS name mapping text
    crit: notable
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      substr: CLOSURE_CSS_NAME_MAPPING
  - id: event-types-encrypted-marker
    desc: Recognized eventTypes encrypted state marker
    crit: notable
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      substr: "topEncrypted: eventTypes.encrypted"
composite_rules:

  - id: python-hidden-recovery-copy-before-encryption
    desc: Python hides a recovery copy before encryption
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/crypto/symmetric/encrypt::python-encrypt-file-call
      - id: micro-behaviors/crypto/symmetric/encrypt::python-pyencryptor-import
      - id: micro-behaviors/fs/file/copy::python-write-file-helper-call
      - id: micro-behaviors/fs/file/copy::python-pycopyer-import
      - id: micro-behaviors/fs/path/application/interpreter::python-multiple-windows-user-paths
  - id: rsa-key-handling
    desc: RSA operations combined with ransomware indicators
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    all:
      - id: micro-behaviors/crypto/asymmetric/rsa::rsa-operation-cluster
    any:
      - id: ransom-note
      - id: rename-functions
      - id: objectives/impact/ransom/encrypt/threat-text::encrypt-comp
  - id: file-iteration
    desc: File iteration functions
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    any:
      - id: micro-behaviors/fs/enumerate/directory::node-readdir-sync-call
      - id: micro-behaviors/fs/directory/traverse::js-walk-sync-call
      - id: glob-module
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
  - id: file-write-functions
    desc: File write functions
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    any:
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
      - id: micro-behaviors/fs/write/file/direct::write-file-async
      - id: open-paren
  - id: file-encryption-loop-comp
    desc: File iteration with encryption
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: micro-behaviors/process/interpreter/vm::yarn-release-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/lib/bun-runtime/
    all:
      - id: file-iteration
      - id: micro-behaviors/crypto/library/keyword::encryption-functions
      - id: file-write-functions
    any:
      - id: rename-functions
      - id: metadata/file/extension/encrypted::encrypted-extensions
      - id: ransom-note
      - id: rsa-key-handling
    downgrade:
      any:
        - id: metadata/package/manifest/runtime::vscode-extension
        - id: micro-behaviors/process/interpreter/vm/
        - id: metadata/build/bundler::has-sourcemap
  - id: ransom-note
    desc: Ransom note text patterns
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    needs: 2
    any:
      - id: objectives/impact/ransom/encrypt/threat-text::files-encrypted-msg
      - id: pay-bitcoin-msg
      - id: pay-btc-msg
      - id: decrypt-files-msg
      - id: bitcoin-wallet-msg
      - id: restore-files-msg
      - id: send-payment-msg
  - id: rename-functions
    desc: File rename primitive
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    any:
      - id: micro-behaviors/fs/file/rename::fs-rename-sync
      - id: rename-fn
      - id: os-rename
    unless:
      - id: well-known/app/kilocode::kilo-code-js-bundle
      - id: well-known/tool/reverse-engineering/frida/
      - id: metadata/library/structure::js-closure-compiled-bundle
      - id: metadata/library/structure/
      - id: closure-css-name-mapping-text
      - id: well-known/app/kilocode::kilo-code-native-runtime

  - id: extension-change
    desc: Renames files to encrypted extensions
    crit: suspicious
    conf: 0.85
    for: [scripts, binaries]
    all:
      - id: rename-functions
      - id: metadata/file/extension/encrypted::encrypted-extensions
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/code-metrics/structure/
        - id: metadata/package/manifest/runtime::vscode-extension
        # Documented/licensed runtimes (node) reference file extensions + rename
        # without being ransomware; real ransomware ships no help/license text.
        - id: micro-behaviors/ui/help/
    unless:
      - id: objectives/impact/ransom/tactics/
  - id: shadow-delete
    desc: Shadow copy deletion (ransomware preparation)
    crit: suspicious
    conf: 0.95
    attack: T1490
    any:
      - id: vssadmin-delete
      - id: wmic-shadowcopy
      - id: bcdedit-recovery
      - id: wbadmin-delete-systemstate
  - id: recovery-inhibition-with-log-clear
    desc: Recovery inhibition with log clearing
    crit: suspicious
    conf: 0.95
    attack: T1490,T1070.001
    all:
      - id: shadow-delete
    any:
      - id: objectives/evasion/indicator-removal/logs::log-clear-windows
      - id: objectives/evasion/indicator-removal/cleanup::windows-indicator-removal
  - id: script-ransomware
    desc: Script-based ransomware behavior
    crit: hostile
    conf: 0.95
    all:
      - id: shadow-delete
    any:
      - id: objectives/impact/services/stop::sc-stop
      - id: objectives/impact/services/stop::net-stop
      - id: objectives/impact/degrade/firewall::netsh-firewall-off
      - id: objectives/impact/ransom/encrypt/threat-text::encrypt-comp
  - id: lua-dfcrypt-ransomware
    desc: Lua dfcrypt ransomware workflow
    crit: hostile
    conf: 0.98
    for: [lua]
    all:
      - id: lua-os-remove-call
      - id: lua-os-rename-call
      - id: metadata/file/extension/encrypted::ext-dfcrypt
      - id: decrypt-readme-file
      - id: lua-files-encrypted-msg
  - id: python-file-iteration
    desc: Python file iteration for encryption
    crit: component
    conf: 0.7
    for:
      - python
    any:
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
      - id: micro-behaviors/fs/directory/readdir::readdir-python
  - id: python-overwrite-path
    desc: Python overwrite sink for file encryption
    crit: component
    conf: 0.7
    for:
      - python
    any:
      - id: python-seek-write-truncate
      - id: python-open-rplusb
      - id: python-loop-writeback
  - id: inplace-encrypt
    desc: Python file encryption overwrite workflow
    crit: hostile
    conf: 0.95
    for:
      - python
    all:
      - id: python-file-iteration
      - id: micro-behaviors/fs/read/file::file-open-content
      - id: python-overwrite-path
      - id: micro-behaviors/crypto/symmetric/fernet::encrypt
      - id: micro-behaviors/crypto/symmetric/fernet::keygen
  - id: inplace-encrypt-ransom-note
    desc: Python Fernet ransomware with note and key stash
    crit: hostile
    conf: 0.98
    for:
      - python
    all:
      - id: inplace-encrypt
      - id: objectives/impact/ransom/encrypt/threat-text::files-encrypted-msg
      - id: python-local-key-file
  - id: inplace-encrypt-skip-self-key
    desc: Python local-key ransomware exclusion workflow
    crit: hostile
    conf: 0.97
    for:
      - python
    all:
      - id: inplace-encrypt
      - id: python-local-key-file
      - id: python-skip-self-and-key
