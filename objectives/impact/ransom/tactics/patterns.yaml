defaults:
  platforms: [unix, windows]
  for: [scripts, source, documents]
  attack: T1486
traits:
  - id: rsa-keyword
    desc: RSA algorithm name string marker
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    unless:
      - id: micro-behaviors/communications/ssh/client::library-comp
      - id: micro-behaviors/crypto/certificate/usage::pem-begin
    if:
      type: string_literal
      exact: RSA
  - id: generate-keypair
    desc: generateKeyPair function
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: generateKeyPair
  - id: public-encrypt
    desc: publicEncrypt function
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: publicEncrypt
  - id: private-decrypt
    desc: privateDecrypt function
    crit: suspicious
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: privateDecrypt
  - id: begin-rsa-key
    desc: BEGIN RSA key header
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: '-----BEGIN RSA'
  - id: begin-public-key
    desc: BEGIN PUBLIC KEY header
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: '-----BEGIN PUBLIC KEY'
    unless:
      - type: text
        substr: LICENSE_PUBLIC_KEY
  - id: readdir-sync
    desc: readdirSync function
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: readdirSync
  - id: walk-sync
    desc: walkSync function
    crit: suspicious
    conf: 0.4
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: walkSync
  - id: glob-module
    desc: glob module
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      exact: glob
  - id: open-paren
    desc: open( function for file write
    crit: component
    conf: 0.3
    for: [scripts, binaries]
    if:
      type: string_literal
      regex: open\([^)]{0,120}["'][wa]["']
  - id: pay-bitcoin-msg
    desc: Pay bitcoin message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: pay bitcoin
      case_insensitive: true
  - id: pay-btc-msg
    desc: Pay BTC message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: pay btc
      case_insensitive: true
  - id: decrypt-files-msg
    desc: Decrypt files message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: decrypt your files
      case_insensitive: true
  - id: bitcoin-wallet-msg
    desc: Bitcoin wallet message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: bitcoin wallet
      case_insensitive: true
  - id: restore-files-msg
    desc: Restore files message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: restore your files
      case_insensitive: true
  - id: send-payment-msg
    desc: Send payment message
    crit: suspicious
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: send payment
      case_insensitive: true
  - id: rename-sync
    desc: renameSync file rename API reference
    crit: notable
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: renameSync
  - id: rename-fn
    desc: "rename( function"
    crit: component
    conf: 0.4
    count_min: 2
    for: [scripts, binaries]
    if:
      type: text
      substr: "rename("
  - id: os-rename
    desc: os.rename function
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: os.rename
  - id: ext-enc
    desc: Encrypted file extension marker
    crit: suspicious
    conf: 0.6
    for: [scripts, binaries]
    unless:
      - id: well-known/lib/active-support::module
    if:
      type: string_literal
      regex: '\b[A-Za-z0-9_.-]+\.enc\b'
  - id: ext-crypt
    desc: .crypt extension
    crit: suspicious
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: string_literal
      exact: .crypt
  - id: mutate-keyword
    desc: Repeated mutate keyword in source
    crit: notable
    conf: 0.4
    for:
      - javascript
      - typescript
    count_min: 3
    if:
      type: string_literal
      substr: mutate
    unless:
      - id: metadata/package/tooling::webpack-bundled
  - id: vssadmin-delete
    desc: vssadmin delete shadows
    crit: suspicious
    conf: 0.7
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: vssadmin\s+delete\s+shadows
  - id: wmic-shadowcopy
    desc: wmic shadowcopy delete
    crit: suspicious
    conf: 0.7
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: wmic\s+shadowcopy\s+delete
  - id: bcdedit-recovery
    desc: bcdedit recoveryenabled no
    crit: suspicious
    conf: 0.7
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: bcdedit.{0,30}recoveryenabled.{0,30}no
  - id: wbadmin-delete-systemstate
    desc: wbadmin deletes system backups
    crit: suspicious
    conf: 0.8
    attack: T1490
    platforms: [windows]
    for: [batch, powershell, pe]
    if:
      type: text
      regex: (?i)wbadmin\s+delete\s+systemstatebackup
  - id: python-open-rplusb
    desc: Python read-write binary file open
    crit: notable
    conf: 0.72
    for:
      - python
    if:
      type: text
      regex: open\([^)]{0,140}['"]r\+b['"]
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::test-directory
        - id: metadata/package/testing/scripted::pytest
  - id: python-seek-write-truncate
    desc: Seek write truncate overwrite sequence
    crit: suspicious
    conf: 0.86
    for:
      - python
    size_max: 50000
    if:
      type: text
      regex: \.seek\(\s*0\s*\)[\s\S]{0,220}\.write\([\s\S]{0,220}\.truncate\(
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::test-directory
        - id: metadata/package/testing/scripted::pytest
  - id: python-loop-writeback
    desc: Loop variable reopened in wb mode
    crit: component
    conf: 0.83
    for:
      - python
    if:
      type: text
      regex: with\s+open\(\s*file\s*,\s*['"]wb['"]
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::test-directory
        - id: metadata/package/testing/scripted::pytest
  - id: python-local-key-file
    desc: Python writes local .key file
    crit: suspicious
    conf: 0.8
    for:
      - python
    if:
      type: text
      regex: open\([^)]{0,120}['"][^"'\\]{1,32}\.key['"]\s*,\s*['"]wb['"]
  - id: python-skip-self-and-key
    desc: Python skips script and key file
    crit: component
    conf: 0.82
    for:
      - python
    if:
      type: text
      regex: file == ['"][^"'\\]{1,32}\.py['"] or file == ['"][^"'\\]{1,32}\.key['"]
composite_rules:
  - id: rsa-key-operations
    desc: RSA key operations
    crit: suspicious
    conf: 0.6
    for: [scripts, binaries]
    needs: 2
    any:
      - id: rsa-keyword
      - id: generate-keypair
      - id: public-encrypt
      - id: private-decrypt
      - id: begin-rsa-key
      - id: begin-public-key
  - id: rsa-key-handling
    desc: RSA key generation or handling
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    all:
      - id: micro-behaviors/data/text/keywords/lexicon::crypto-substr
      - id: rsa-key-operations
  - id: file-iteration
    desc: File iteration functions
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    any:
      - id: readdir-sync
      - id: walk-sync
      - id: glob-module
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
  - id: file-write-functions
    desc: File write functions
    crit: component
    conf: 0.4
    for: [scripts, binaries]
    any:
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
      - id: micro-behaviors/fs/write/file/direct::write-file-async
      - id: open-paren
  - id: file-encryption-loop-comp
    desc: File iteration with encryption (ransomware
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: micro-behaviors/process/interpreter/vm::yarn-release-bundle
      - id: metadata/library/structure::js-webpack-bundle
    all:
      - id: file-iteration
      - id: micro-behaviors/crypto/library/keyword::encryption-functions
      - id: file-write-functions
    any:
      - id: rename-functions
      - id: encrypted-extensions
      - id: ransom-note
      - id: rsa-key-handling
    downgrade:
      any:
        - id: objectives/supply-chain/metadata-anomaly/manifest/npm::vscode-extension
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: metadata/package/tooling::has-sourcemap
  - id: ransom-note
    desc: Ransom note text patterns
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    needs: 2
    any:
      - id: objectives/impact/ransom/encrypt/threat-text::files-encrypted-msg
      - id: pay-bitcoin-msg
      - id: pay-btc-msg
      - id: decrypt-files-msg
      - id: bitcoin-wallet-msg
      - id: restore-files-msg
      - id: send-payment-msg
  - id: rename-functions
    desc: File rename functions
    crit: suspicious
    conf: 0.4
    for: [scripts, binaries]
    any:
      - id: rename-sync
      - id: rename-fn
      - id: os-rename
  - id: encrypted-extensions
    desc: Encrypted file extensions
    crit: suspicious
    conf: 0.6
    for: [scripts, binaries]
    any:
      - id: objectives/impact/ransom/encrypt/threat-text::ext-encrypted
      - id: objectives/impact/ransom/encrypt/threat-text::ext-locked
      - id: ext-enc
      - id: ext-crypt
  - id: benign-extension-change-context
    desc: Benign extension change context
    crit: component
    conf: 0.9
    for: [scripts, binaries]
    any:
      - id: metadata/build/pip::site-packages
      - id: metadata/library/python-runtime::python-runtime
      - id: micro-behaviors/process/interpreter/vm::yarn-release-bundle
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/library/structure::js-webpack-bundle
  - id: extension-change
    desc: Renames files to encrypted extensions
    crit: suspicious
    conf: 0.85
    for: [scripts, binaries]
    all:
      - id: rename-functions
      - id: encrypted-extensions
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
        - id: objectives/supply-chain/metadata-anomaly/manifest/npm::vscode-extension
    unless:
      - id: benign-extension-change-context
  - id: shadow-delete
    desc: Shadow copy deletion (ransomware preparation)
    crit: suspicious
    conf: 0.95
    attack: T1490
    any:
      - id: vssadmin-delete
      - id: wmic-shadowcopy
      - id: bcdedit-recovery
      - id: wbadmin-delete-systemstate
  - id: recovery-inhibition-with-log-clear
    desc: Recovery inhibition with log clearing
    crit: suspicious
    conf: 0.95
    attack: T1490,T1070.001
    all:
      - id: shadow-delete
    any:
      - id: objectives/evasion/indicator-removal/logs::log-clear-windows
      - id: objectives/evasion/indicator-removal/cleanup::windows-indicator-removal
  - id: script-ransomware
    desc: Script-based ransomware behavior
    crit: hostile
    conf: 0.95
    all:
      - id: shadow-delete
    any:
      - id: objectives/impact/services/stop::sc-stop
      - id: objectives/impact/services/stop::net-stop
      - id: objectives/impact/degrade/firewall::netsh-firewall-off
      - id: objectives/impact/ransom/encrypt/threat-text::encrypt-comp
  - id: python-file-iteration
    desc: Python file iteration for encryption
    crit: component
    conf: 0.7
    for:
      - python
    any:
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
      - id: micro-behaviors/fs/directory/readdir::readdir-python
  - id: python-overwrite-path
    desc: Python overwrite sink for file encryption
    crit: component
    conf: 0.7
    for:
      - python
    any:
      - id: python-seek-write-truncate
      - id: python-open-rplusb
      - id: python-loop-writeback
  - id: inplace-encrypt
    desc: Python file encryption overwrite workflow
    crit: hostile
    conf: 0.95
    for:
      - python
    all:
      - id: python-file-iteration
      - id: micro-behaviors/fs/read/file::file-open-content
      - id: python-overwrite-path
      - id: micro-behaviors/crypto/symmetric/fernet::encrypt
      - id: micro-behaviors/crypto/symmetric/fernet::keygen
  - id: inplace-encrypt-ransom-note
    desc: Python Fernet ransomware with note and key stash
    crit: hostile
    conf: 0.98
    for:
      - python
    all:
      - id: inplace-encrypt
      - id: objectives/impact/ransom/encrypt/threat-text::files-encrypted-msg
      - id: python-local-key-file
  - id: inplace-encrypt-skip-self-key
    desc: Python local-key ransomware exclusion workflow
    crit: hostile
    conf: 0.97
    for:
      - python
    all:
      - id: inplace-encrypt
      - id: python-local-key-file
      - id: python-skip-self-and-key
