defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1486
  mbc: E1486
  size_min: 256
  size_max: 1048576

traits:
  - id: ps-filecryptography-module
    desc: PowerShell FileCryptography module import
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "FileCryptography.psm1"

  - id: ps-protect-file-aes
    desc: PowerShell AES Protect-File use
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Protect-File\s+\$file.{0,80}-Algorithm\s+AES'

  - id: ps-target-files-variable
    desc: PowerShell target file list variable
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "$TargetFiles"

  - id: ps-recursive-targetpath-enumeration
    desc: PowerShell recursive TargetPath enumeration
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'get-childitem\s+-path\s+\$TargetPath\\\*'

  - id: ps-encrypted-extension-default
    desc: PowerShell encrypted extension default
    crit: component
    conf: 0.88
    if:
      type: text
      substr: '$Extension = ".encrypted"'

  - id: ps-remove-source-after-encrypt
    desc: PowerShell RemoveSource parameter token
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '\-RemoveSource\b'

  - id: ps-ransomware-simulator-banner
    desc: PowerShell ransomware simulator banner
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "Ransomware Simulator using AES"

  - id: ps-ransom-note-write
    desc: PowerShell writes ransom note
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Set-Content\s+-path\s+\$ransomnote'
      case_insensitive: true

  - id: ps-ransom-extension-append
    desc: PowerShell appends ransom extension
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\$file\.Name\s*\+\s*["''][^"'']{2,32}["'']|Rename-Item[\s\S]{0,120}\$newname)'
      case_insensitive: true

  - id: ps-ransom-desktop-sweep
    desc: PowerShell sweeps user desktops
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'get-childitem\s+["'']C:\\users["''][\s\S]{0,240}\\desktop\\'
      case_insensitive: true

  - id: ps-ransom-note-threat
    desc: PowerShell ransom threat text
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(encrypted your systems|cost you [0-9.]+BTC|leak your data)'
      case_insensitive: true

composite_rules:
  - id: ps-ransomware-recursive-targeting
    desc: PowerShell recursive ransomware targeting
    crit: suspicious
    conf: 0.94
    all:
      - id: ps-recursive-targetpath-enumeration
      - id: ps-target-files-variable

  - id: ps-ransomware-suffix-source-removal
    desc: PowerShell encrypted suffix source removal
    crit: suspicious
    conf: 0.94
    all:
      - id: ps-encrypted-extension-default
      - id: ps-remove-source-after-encrypt

  - id: ps-ransomware-simulator-file-encryptor
    desc: PowerShell ransomware simulator encryptor
    crit: hostile
    conf: 0.98
    all:
      - id: ps-protect-file-aes
      - id: ps-ransomware-recursive-targeting
      - id: ps-ransomware-suffix-source-removal
    any:
      - id: ps-filecryptography-module
      - id: ps-ransomware-simulator-banner

  - id: ps-ransom-rename-and-note
    desc: PowerShell ransom rename and note
    crit: hostile
    conf: 0.96
    all:
      - id: ps-ransom-note-write
      - id: ps-ransom-extension-append
    any:
      - id: ps-ransom-desktop-sweep
      - id: ps-ransom-note-threat
