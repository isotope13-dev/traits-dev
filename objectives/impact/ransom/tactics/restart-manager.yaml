defaults:
  platforms:
    - windows
  for: [c, cpp, binaries]
traits:
  - id: rm-start-session
    desc: Restart Manager RmStartSession API
    crit: component
    conf: 0.9
    if:
      type: text
      substr: RmStartSession
  - id: rm-register-resources
    desc: Restart Manager RmRegisterResources API
    crit: component
    conf: 0.9
    if:
      type: text
      substr: RmRegisterResources
  - id: rm-shutdown
    desc: Restart Manager RmShutdown API
    crit: suspicious
    conf: 0.9
    for: [binaries, c]
    if:
      type: symbol
      exact: RmShutdown
  - id: setup-binary-name
    desc: Setup binary basename
    crit: notable
    conf: 0.99
    for: [binaries]
    if:
      type: path
      basename: true
      regex: (?i)(^|[_-])setup(\.exe)?$
  - id: setup-program-text
    desc: Setup program text marker
    crit: notable
    conf: 0.99
    for: [binaries]
    if:
      type: text
      substr: Setup Program
composite_rules:
  - id: installer-context
    desc: Setup installer context
    crit: notable
    conf: 0.99
    for: [binaries]
    all:
      - id: setup-binary-name
      - id: setup-program-text
  - id: restart-manager-file-unlock
    desc: Restart Manager used to force-close file locks
    crit: suspicious
    conf: 0.92
    attack: T1486
    all:
      - id: rm-shutdown
    any:
      - id: rm-start-session
      - id: rm-register-resources
    unless:
      - id: metadata/binary/vendor/
      - id: objectives/impact/ransom/tactics/
