defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: offensive-symbol
    desc: Offensive symbol marker
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: "卐|hackend|encrypted your files"
      case_insensitive: true
  - id: ransomware-self-label
    desc: Binary self-identifies as ransomware
    crit: notable
    conf: 0.7
    if:
      type: string
      word: ransomware
      case_insensitive: true
    not:
      - substr: "detect ransomware"
      - substr: "against ransomware"
      - substr: "from ransomware"
      - substr: "anti-ransomware"
    unless:
      - type: string
        substr: "Bitdefender"
      - type: string
        substr: "antivirus"
      - type: string
        substr: "anti-virus"
  - id: ransomware-banner-core
    desc: Ransomware tool marker
    crit: suspicious
    conf: 0.75
    if:
      type: string
      case_insensitive: true
      regex: decrypt.{0,50}payment|your files.{0,50}encrypted
composite_rules:
  - id: ransomware-banner-comp
    desc: Ransomware tool marker
    crit: suspicious
    conf: 0.8
    any:
      - id: ransomware-banner-core
      - id: micro-behaviors/data/text/malware::pay-bitcoin-phrase
