defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: offensive-symbol
    desc: Offensive symbol marker
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: "卐|hackend|encrypted your files"
      case_insensitive: true
  - id: ransomware-self-label
    desc: Binary self-identifies as ransomware
    crit: notable
    conf: 0.7
    if:
      type: text
      word: ransomware
      case_insensitive: true
    not:
      - substr: detect ransomware
      - substr: against ransomware
      - substr: from ransomware
      - substr: anti-ransomware
    unless:
      - type: text
        substr: Bitdefender
      - type: text
        substr: antivirus
      - type: text
        substr: anti-virus
  - id: ransomware-banner-core
    desc: Ransomware tool marker
    crit: suspicious
    conf: 0.75
    if:
      type: text
      case_insensitive: true
      regex: decrypt.{0,50}payment|your files.{0,50}encrypted
      not:
        - substr: No credential to decrypt from on pass
        - substr: paymentApplication
        - substr: decrypted data from pass
        - substr: Failed to decrypt data for pass
  - id: ultimatum-filename-a
    desc: Ransom note filename (HOW_TO/README pattern)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)(HOW_TO_DECRYPT|README_DECRYPT|READ_THIS)[._-]
  - id: ultimatum-filename-b
    desc: Ransom note filename (YOUR_FILES/RECOVER pattern)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)(YOUR_FILES|RECOVER_FILE|RESTORE_FILE)[._-]
  - id: ultimatum-filename-c
    desc: Ransom note with ULTIMATUM keyword in filename
    crit: notable
    conf: 0.88
    if:
      type: text
      word: ULTIMATUM
      case_insensitive: true
  - id: btc-address-label
    desc: Bitcoin address label in ransom text
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: BTC Adres|BTC address|bitcoin address
      case_insensitive: true
  - id: create-ransom-note-fn
    desc: Python function that creates a ransom note
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: def\s+create_ransom_note
composite_rules:
  - id: ultimatum-filename
    desc: Ransom note filename detected
    crit: notable
    conf: 0.85
    any:
      - id: ultimatum-filename-a
      - id: ultimatum-filename-b
      - id: ultimatum-filename-c
  - id: ransomware-bitcoin-combo
    desc: Bitcoin demand with ransomware markers
    crit: suspicious
    conf: 0.85
    any:
      - id: objectives/impact/ransom/encrypt::bitcoin-word
    all:
      - id: ransomware-self-label
    unless:
      - id: well-known/tools/detection/stng::xor-classify-corpus
  - id: ransomware-banner-comp
    desc: Ransomware tool marker
    crit: suspicious
    conf: 0.8
    any:
      - id: ransomware-banner-core
      - id: micro-behaviors/data/text/malware::pay-bitcoin-phrase
