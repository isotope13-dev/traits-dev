defaults:
  platforms:
  - unix
  - windows
  for: [binaries]
  attack: T1486
  mbc: C0027
traits:
- id: network-penetrated
  desc: Network penetration ransom message
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: network.{0,30}penetrated
    case_insensitive: true
- id: recover-files-msg
  desc: Recover files ransom message
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: \b(to\s+)?recover\b.{0,20}\b(your|all)\s+files?\b
    case_insensitive: true
  not:
  - substr: Failed to recover %s file ID
- id: encryption-technology-msg
  desc: Encryption technology claim
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: (encryption|encrypted).{0,30}technology
    case_insensitive: true
  unless:
  - id: well-known/tool/sysadmin/alpine-packages::alpine-datadog-agent
- id: strong-encryption-method-msg
  desc: Strong encryption method claim
  crit: suspicious
  conf: 0.78
  if:
    type: text
    regex: strong.{0,20}encryption.{0,20}method
    case_insensitive: true
- id: dont-interrupt-msg
  desc: Don't interrupt process warning
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: don.t.{0,30}interrupt.{0,30}process
    case_insensitive: true
- id: decrypt-sample-term
  desc: Decrypt sample phrase
  crit: component
  if:
    type: text
    regex: free.{0,20}decrypt.{0,40}(sample|test|trial)
    case_insensitive: true
- id: decrypt-proof-term
  desc: Decrypt proof phrase
  crit: component
  if:
    type: text
    regex: free.{0,20}decrypt.{0,40}(proof|guarantee)
    case_insensitive: true
- id: decrypt-file-term
  desc: Decrypt file-count phrase
  crit: component
  if:
    type: text
    regex: free.{0,20}decrypt.{0,40}(one\s+file|1\s+file)
    case_insensitive: true
- id: decrypt-few-files-term
  desc: Decrypt few-files phrase
  crit: component
  if:
    type: text
    regex: free.{0,20}decrypt.{0,40}few\s+files?
    case_insensitive: true
- id: sample-decrypt-term
  desc: Sample before decrypt phrase
  crit: component
  if:
    type: text
    regex: (sample|test|trial).{0,30}free.{0,20}decrypt
    case_insensitive: true
- id: proof-decrypt-term
  desc: Proof before decrypt phrase
  crit: component
  if:
    type: text
    regex: (proof|guarantee).{0,30}free.{0,20}decrypt
    case_insensitive: true
- id: file-decrypt-term
  desc: File-count before decrypt phrase
  crit: component
  if:
    type: text
    regex: (one\s+file|1\s+file).{0,30}free.{0,20}decrypt
    case_insensitive: true
- id: few-files-decrypt-term
  desc: Few-files before decrypt phrase
  crit: component
  if:
    type: text
    regex: few\s+files?.{0,30}free.{0,20}decrypt
    case_insensitive: true
- id: data-will-be-published
  desc: Data leak extortion threat
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: \bdata\b.{0,20}will\s+be.{0,20}(published|sold|leaked|posted)
    case_insensitive: true
  unless:
  - type: text
    regex: (?i)\b(order|sort|sorted|ordering)\b.{0,80}\bdata\b.{0,20}will\s+be\s+published
- id: protonmail-contact
  desc: ProtonMail contact address
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: '[a-zA-Z0-9._-]+@protonmail\.(com|ch)'
    case_insensitive: true
  unless:
  - id: well-known/app/sq::go-module-path
- id: onionmail-contact
  desc: OnionMail contact address
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: '[a-zA-Z0-9._-]+@onionmail\.org'
    case_insensitive: true
- id: mailinator-contact
  desc: Mailinator contact address
  crit: suspicious
  conf: 0.82
  if:
    type: text
    regex: '[a-zA-Z0-9._-]+@mailinator\.com'
    case_insensitive: true
  # John-the-Ripper bundles password-hash test vectors like
  # "$bitwarden$0*5000*lulu@mailinator.com..." and "$clipperz$<hex>*hackme@...".
  # A span-local `not:` can't see the `$...*` prefix (it's outside the matched
  # email), so exclude file-wide when such a hash-vector mailinator address exists.
  unless:
  - type: text
    regex: '\$[^\s@]{0,160}@mailinator\.com'
- id: tutanota-contact
  desc: Tutanota contact address
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: '[a-zA-Z0-9._-]+@tutanota\.(com|de)'
    case_insensitive: true
- id: secure-email-warning
  desc: Use secure email warning
  crit: suspicious
  conf: 0.65
  if:
    type: text
    regex: (don.t\s+use\s+gmail|\buse\b.{0,30}protonmail|secure\s+mail\s+service)
    case_insensitive: true
- id: extension-target-list-office-word
  desc: Pipe-delimited Word extension token
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\.(doc|docx)\|
    case_insensitive: true
- id: extension-target-list-office-excel
  desc: Pipe-delimited Excel extension token
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\.(xls|xlsx)\|
    case_insensitive: true
- id: extension-target-list-office-ppt
  desc: Pipe-delimited PowerPoint extension token
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\.(ppt|pptx)\|
    case_insensitive: true
- id: extension-target-list-data
  desc: Pipe-delimited data extension token
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\.(pdf|sql|db)\|
    case_insensitive: true
- id: extension-target-list-code
  desc: Pipe-delimited code extension token
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \|\.(java|cpp|py)\|
    case_insensitive: true
- id: ext-pdf
  desc: PDF file extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.pdf([|,; ]|$)
    case_insensitive: true
- id: ext-doc
  desc: Word doc extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.doc([|,; ]|$)
    case_insensitive: true
- id: ext-docx
  desc: Word docx extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.docx([|,; ]|$)
    case_insensitive: true
- id: ext-xls
  desc: Excel xls extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.xls([|,; ]|$)
    case_insensitive: true
- id: ext-xlsx
  desc: Excel xlsx extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.xlsx([|,; ]|$)
    case_insensitive: true
- id: ext-sql
  desc: SQL file extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.sql([|,; ]|$)
    case_insensitive: true
- id: ext-db
  desc: Database file extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.db([|,; ]|$)
    case_insensitive: true
- id: ext-sqlite
  desc: SQLite file extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.sqlite([|,; ]|$)
    case_insensitive: true
- id: ext-java
  desc: Java source extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.java([|,; ]|$)
    case_insensitive: true
- id: ext-cpp
  desc: C++ source extension
  crit: component
  if:
    type: text
    exact: '|.cpp|'
    case_insensitive: true
- id: ext-py
  desc: Python source extension
  crit: component
  if:
    type: text
    exact: '|.py|'
    case_insensitive: true
- id: ext-vhd
  desc: Virtual disk VHD extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.vhd([|,; ]|$)
    case_insensitive: true
- id: ext-vmdk
  desc: VMware disk extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.vmdk([|,; ]|$)
    case_insensitive: true
- id: ext-backup
  desc: Backup file extension
  crit: component
  if:
    type: text
    regex: (^|[|,; ])\.backup([|,; ]|$)
    case_insensitive: true
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: encrypt-decrypt-func
  desc: Encrypt/decrypt function artifact
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: encrypt_decrypt_(file|data|buffer)
    case_insensitive: true
- id: ransom-cmdline-flag
  desc: Ransomware command line flag
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: --(disable-ransomfile|disable-filerenaming|threads-count|e-size)
- id: custom-encrypted-ext
  desc: Custom encrypted file extension
  crit: notable
  conf: 0.7
  count_min: 2
  if:
    type: text
    regex: \b\.[a-z]{3,10}-[a-z]*[0-9][a-z0-9]{5,}\b
  not:
  - substr: application-identifier
  - substr: temporary-exception
  - substr: com.apple
  - substr: github.com
  - substr: .com-1ecc6299db9ec823
  - substr: pkgs.dev.azure.com
  - substr: .removed-20060102
  - regex: '\.(css|js|mjs|txt|html?|json|woff2?|ttf|otf|svg|map|wasm|png|jpe?g|gif|ico)-[0-9a-f]{6,}'
  - regex: '^\.(com|net|org|io|dev|gov|edu|info|cloud|co|app)-'
  - regex: '\.removed-\d{8}\b'
  downgrade:
    any:
    - id: metadata/signed/platform::apple
- id: readme-note-file--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    case_insensitive: true
    regex: (README!\.txt|readme(_to_|-)[a-zA-Z0-9_]+\.txt)
  count_max: 1011229
- id: readme-note-file--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    case_insensitive: true
    regex: (HOW_TO_DECRYPT\.txt|READ_ME_NOW\.txt)
  count_max: 1011230
composite_rules:
- id: decrypt-free-sample
  desc: Free decryption sample offer
  crit: suspicious
  conf: 0.85
  any:
  - id: decrypt-sample-term
  - id: decrypt-proof-term
  - id: decrypt-file-term
  - id: decrypt-few-files-term
  - id: sample-decrypt-term
  - id: proof-decrypt-term
  - id: file-decrypt-term
  - id: few-files-decrypt-term
- id: multi-extension-pattern
  desc: Multiple file extensions in pattern
  crit: suspicious
  conf: 0.7
  not:
  - substr: <filename>*.sql</filename>
  unless:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-string-density-large-pe
  - id: well-known/app/cliproxyapi/
  - id: well-known/app/peazip::peazip-linux-main-executable
  - id: well-known/app/peazip::peazip-linux-pea-helper
  - id: well-known/app/peazip::peazip-macos-context
  needs: 8
  any:
  - id: ext-pdf
  - id: ext-doc
  - id: ext-docx
  - id: ext-xls
  - id: ext-xlsx
  - id: ext-sql
  - id: ext-db
  - id: ext-sqlite
  - id: ext-java
  - id: ext-cpp
  - id: ext-py
  - id: ext-vhd
  - id: ext-vmdk
  - id: ext-backup
  downgrade:
    any:
    - id: metadata/binary/metrics/size::massive-executable
    - id: metadata/lang/compiler/systems::go-binary
    - id: metadata/binary/vendor::is-microsoft-named
    - id: metadata/package/versioning::pe-version-resource
- id: extension-target-list
  desc: Multiple pipe-delimited target extensions
  crit: suspicious
  conf: 0.85
  needs: 3
  any:
  - id: extension-target-list-office-word
  - id: extension-target-list-office-excel
  - id: extension-target-list-office-ppt
  - id: extension-target-list-data
  - id: extension-target-list-code
- id: ransom-note-msg
  desc: Ransom note message patterns
  crit: suspicious
  conf: 0.85
  needs: 2
  any:
  - id: network-penetrated
  - id: recover-files-msg
  - id: encryption-technology-msg
  - id: strong-encryption-method-msg
  - id: dont-interrupt-msg
  - id: decrypt-free-sample
  - id: data-will-be-published
- id: ransom-contact
  desc: Ransomware contact patterns
  crit: suspicious
  conf: 0.75
  any:
  - id: mailinator-contact
  - id: protonmail-contact
  - id: onionmail-contact
  - id: tutanota-contact
  - id: secure-email-warning
- id: file-targeting-comp
  desc: Ransomware file targeting
  crit: suspicious
  conf: 0.75
  any:
  - id: extension-target-list
  - id: multi-extension-pattern
- id: encryption-artifacts
  desc: Encryption code artifacts
  crit: suspicious
  conf: 0.75
  any:
  - id: encrypt-decrypt-func
  - id: ransom-cmdline-flag
- id: native-ransomware
  desc: Native binary ransomware
  crit: hostile
  conf: 0.95
  all:
  - id: ransom-note-msg
  - id: ransom-contact
  any:
  - id: file-targeting-comp
  - id: encryption-artifacts
  - id: readme-note-file
- id: file-encryptor
  desc: File encryption with targeting
  crit: suspicious
  conf: 0.85
  all:
  - id: encryption-artifacts
  - id: file-targeting-comp
  any:
  - id: micro-behaviors/fs/directory/traverse::traverse-fts
  - id: micro-behaviors/fs/directory/traverse::fts-open
  - id: micro-behaviors/process/threading/concurrency::pthread
- id: readme-note-file
  desc: Readme ransom note filename
  crit: suspicious
  conf: 0.7
  any:
  - id: readme-note-file--rx-1
  - id: readme-note-file--rx-2
  not:
  - regex: (?i)[\\/][^\r\n]{0,200}(README!\.txt|readme(_to_|-)[a-zA-Z0-9_]+\.txt|how_to_decrypt\.txt|read_me_now\.txt)
