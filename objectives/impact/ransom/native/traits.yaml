defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
  attack: T1486
  mbc: C0027
traits:
  - id: network-penetrated
    desc: Network penetration ransom message
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: network.{0,30}penetrated
      case_insensitive: true
  - id: recover-files-msg
    desc: Recover files ransom message
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \brecover\b.{0,20}\b(your|all)\s+files?\b|\bto\s+recover\b.{0,20}\bfiles?\b
      case_insensitive: true
    not:
      - substr: Failed to recover %s file ID
  - id: encryption-technology-msg
    desc: Encryption technology claim
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (encryption|encrypted).{0,30}technology
      case_insensitive: true
  - id: dont-interrupt-msg
    desc: Don't interrupt process warning
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: don.t.{0,30}interrupt.{0,30}process
      case_insensitive: true
  - id: decrypt-sample-term
    desc: Decrypt sample phrase
    crit: component
    if:
      type: text
      regex: free.{0,20}decrypt.{0,40}(sample|test|trial)
      case_insensitive: true
  - id: decrypt-proof-term
    desc: Decrypt proof phrase
    crit: component
    if:
      type: text
      regex: free.{0,20}decrypt.{0,40}(proof|guarantee)
      case_insensitive: true
  - id: decrypt-file-term
    desc: Decrypt file-count phrase
    crit: component
    if:
      type: text
      regex: free.{0,20}decrypt.{0,40}(one\s+file|1\s+file)
      case_insensitive: true
  - id: decrypt-few-files-term
    desc: Decrypt few-files phrase
    crit: component
    if:
      type: text
      regex: free.{0,20}decrypt.{0,40}few\s+files?
      case_insensitive: true
  - id: sample-decrypt-term
    desc: Sample before decrypt phrase
    crit: component
    if:
      type: text
      regex: (sample|test|trial).{0,30}free.{0,20}decrypt
      case_insensitive: true
  - id: proof-decrypt-term
    desc: Proof before decrypt phrase
    crit: component
    if:
      type: text
      regex: (proof|guarantee).{0,30}free.{0,20}decrypt
      case_insensitive: true
  - id: file-decrypt-term
    desc: File-count before decrypt phrase
    crit: component
    if:
      type: text
      regex: (one\s+file|1\s+file).{0,30}free.{0,20}decrypt
      case_insensitive: true
  - id: few-files-decrypt-term
    desc: Few-files before decrypt phrase
    crit: component
    if:
      type: text
      regex: few\s+files?.{0,30}free.{0,20}decrypt
      case_insensitive: true
  - id: data-will-be-published
    desc: Data leak extortion threat
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \bdata\b.{0,20}will\s+be.{0,20}(published|sold|leaked|posted)
      case_insensitive: true
  - id: protonmail-contact
    desc: ProtonMail contact address
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '[a-zA-Z0-9._-]+@protonmail\.(com|ch)'
      case_insensitive: true
  - id: onionmail-contact
    desc: OnionMail contact address
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '[a-zA-Z0-9._-]+@onionmail\.org'
      case_insensitive: true
  - id: tutanota-contact
    desc: Tutanota contact address
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '[a-zA-Z0-9._-]+@tutanota\.(com|de)'
      case_insensitive: true
  - id: secure-email-warning
    desc: Use secure email warning
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: (don.t\s+use\s+gmail|use.{0,30}protonmail|secure\s+mail\s+service)
      case_insensitive: true
  - id: extension-target-list-office-word
    desc: File extension targeting (Word)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \|\.(doc|docx)\|
      case_insensitive: true
  - id: extension-target-list-office-excel
    desc: File extension targeting (Excel)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \|\.(xls|xlsx)\|
      case_insensitive: true
  - id: extension-target-list-office-ppt
    desc: File extension targeting (PowerPoint)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \|\.(ppt|pptx)\|
      case_insensitive: true
  - id: extension-target-list-data
    desc: File extension targeting (Data/PDF)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \|\.(pdf|sql|db)\|
      case_insensitive: true
  - id: extension-target-list-code
    desc: File extension targeting (Code)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \|\.(java|cpp|py)\|
      case_insensitive: true
  - id: ext-pdf
    desc: PDF file extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.pdf([|,; ]|$)
      case_insensitive: true
  - id: ext-doc
    desc: Word doc extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.doc([|,; ]|$)
      case_insensitive: true
  - id: ext-docx
    desc: Word docx extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.docx([|,; ]|$)
      case_insensitive: true
  - id: ext-xls
    desc: Excel xls extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.xls([|,; ]|$)
      case_insensitive: true
  - id: ext-xlsx
    desc: Excel xlsx extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.xlsx([|,; ]|$)
      case_insensitive: true
  - id: ext-sql
    desc: SQL file extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.sql([|,; ]|$)
      case_insensitive: true
  - id: ext-db
    desc: Database file extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.db([|,; ]|$)
      case_insensitive: true
  - id: ext-sqlite
    desc: SQLite file extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.sqlite([|,; ]|$)
      case_insensitive: true
  - id: ext-java
    desc: Java source extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.java([|,; ]|$)
      case_insensitive: true
  - id: ext-cpp
    desc: C++ source extension
    crit: component
    if:
      type: text
      exact: '|.cpp|'
      case_insensitive: true
  - id: ext-py
    desc: Python source extension
    crit: component
    if:
      type: text
      exact: '|.py|'
      case_insensitive: true
  - id: ext-vhd
    desc: Virtual disk VHD extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.vhd([|,; ]|$)
      case_insensitive: true
  - id: ext-vmdk
    desc: VMware disk extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.vmdk([|,; ]|$)
      case_insensitive: true
  - id: ext-backup
    desc: Backup file extension
    crit: component
    if:
      type: text
      regex: (^|[|,; ])\.backup([|,; ]|$)
      case_insensitive: true
  - id: encrypt-decrypt-func
    desc: Encrypt/decrypt function artifact
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: encrypt_decrypt_(file|data|buffer)
      case_insensitive: true
  - id: mbedtls-aes-encrypt
    desc: mbedtls AES encryption
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: mbedtls_aes_crypt
  - id: ransom-cmdline-flag
    desc: Ransomware command line flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: --(disable-ransomfile|disable-filerenaming|threads-count|e-size)
  - id: custom-encrypted-ext
    desc: Custom encrypted file extension
    crit: notable
    conf: 0.7
    count_min: 2
    if:
      type: text
      regex: \b\.[a-z]{3,10}-[a-z]*[0-9][a-z0-9]{5,}\b
    not:
      - substr: application-identifier
      - substr: temporary-exception
      - substr: com.apple
      - substr: github.com
      - substr: .com-1ecc6299db9ec823
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: readme-note-file
    desc: Readme ransom note filename
    crit: notable
    conf: 0.7
    if:
      type: text
      case_insensitive: true
      regex: (readme(_to_|-)[a-zA-Z0-9_]+\.txt|HOW_TO_DECRYPT\.txt|READ_ME_NOW\.txt)
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}(readme(_to_|-)[a-zA-Z0-9_]+\.txt|how_to_decrypt\.txt|read_me_now\.txt)
composite_rules:
  - id: decrypt-free-sample
    desc: Free decryption sample offer
    crit: suspicious
    conf: 0.85
    any:
      - id: decrypt-sample-term
      - id: decrypt-proof-term
      - id: decrypt-file-term
      - id: decrypt-few-files-term
      - id: sample-decrypt-term
      - id: proof-decrypt-term
      - id: file-decrypt-term
      - id: few-files-decrypt-term
  - id: multi-extension-pattern
    desc: Multiple file extensions in pattern
    crit: suspicious
    conf: 0.7
    not:
      - substr: <filename>*.sql</filename>
    unless:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-string-density-large-pe
    needs: 8
    any:
      - id: ext-pdf
      - id: ext-doc
      - id: ext-docx
      - id: ext-xls
      - id: ext-xlsx
      - id: ext-sql
      - id: ext-db
      - id: ext-sqlite
      - id: ext-java
      - id: ext-cpp
      - id: ext-py
      - id: ext-vhd
      - id: ext-vmdk
      - id: ext-backup
    downgrade:
      any:
        - id: metadata/binary/metrics::massive-executable
        - id: metadata/lang/compiler/systems::go-binary
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/package/versioning::pe-version-resource
  - id: extension-target-list
    desc: File extension targeting list
    crit: suspicious
    conf: 0.85
    any:
      - id: extension-target-list-office-word
      - id: extension-target-list-office-excel
      - id: extension-target-list-office-ppt
      - id: extension-target-list-data
      - id: extension-target-list-code
  - id: ransom-note-msg
    desc: Ransom note message patterns
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: network-penetrated
      - id: recover-files-msg
      - id: encryption-technology-msg
      - id: dont-interrupt-msg
      - id: decrypt-free-sample
      - id: data-will-be-published
  - id: ransom-contact
    desc: Ransomware contact patterns
    crit: notable
    conf: 0.75
    any:
      - id: protonmail-contact
      - id: onionmail-contact
      - id: tutanota-contact
      - id: secure-email-warning
  - id: file-targeting-comp
    desc: Ransomware file targeting
    crit: notable
    conf: 0.75
    any:
      - id: extension-target-list
      - id: multi-extension-pattern
  - id: encryption-artifacts
    desc: Encryption code artifacts
    crit: notable
    conf: 0.75
    any:
      - id: encrypt-decrypt-func
      - id: mbedtls-aes-encrypt
      - id: ransom-cmdline-flag
  - id: native-ransomware
    desc: Native binary ransomware
    crit: hostile
    conf: 0.95
    all:
      - id: ransom-note-msg
      - id: ransom-contact
    any:
      - id: file-targeting-comp
      - id: encryption-artifacts
      - id: readme-note-file
  - id: file-encryptor
    desc: File encryption with targeting
    crit: suspicious
    conf: 0.85
    all:
      - id: encryption-artifacts
      - id: file-targeting-comp
    any:
      - id: micro-behaviors/fs/directory/traverse::traverse-fts
      - id: micro-behaviors/fs/directory/traverse::fts-open
      - id: micro-behaviors/process/threading/operations::pthread
