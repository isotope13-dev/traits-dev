defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
traits:
  - id: encryption-complete-msg
    desc: Ransomware completion status message
    crit: component
    conf: 0.95
    if:
      type: text
      regex: \bencryption complete\b
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: encrypt-func-symbol-1
    desc: File encryption function symbols (file/dir/folder)
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: ^encrypt_(file|directory|folder)s?$
    unless:
      - type: metrics
        field: binary.func_count
        min: 500
  - id: encrypt-func-symbol-2
    desc: File encryption function symbols (data/content)
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      regex: ^encrypt_(data|content)s?$

  - id: ransomware-source-path-1a
    desc: Ransomware source file path (ransomware/ransom .c/.cpp)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (ransomware|ransom)\.(c|cpp)$
      case_insensitive: true
  - id: ransomware-source-path-1c
    desc: Ransomware source file path (locker .c/.cpp)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '[/\\]locker\.(c|cpp)$'
      case_insensitive: true
  - id: ransomware-source-path-go-rs
    desc: Ransom source file path (.rs/.go)
    crit: suspicious
    conf: 0.95
    for: [go, rust]
    if:
      type: text
      regex: '[/\\]ransom(ware)?\.(rs|go)$'
      case_insensitive: true
  - id: ransomware-module-path-go-rs
    desc: Ransom module path (.rs/.go)
    crit: suspicious
    conf: 0.95
    for: [go, rust]
    if:
      type: text
      regex: '[/\\]ransom(ware)?[/\\].{0,80}\.(rs|go)$'
      case_insensitive: true
  - id: locker-module-path-go-rs
    desc: Locker module path (.rs/.go)
    crit: suspicious
    conf: 0.95
    for: [go, rust]
    if:
      type: text
      regex: '[/\\](ransom|encrypt)[/\\].{0,80}[/\\]locker[/\\].{0,60}\.(rs|go)$'
      case_insensitive: true
  - id: ransomware-source-path-2
    desc: Ransomware source file path (crypter)
    crit: suspicious
    conf: 0.95
    for: [go, rust]
    if:
      type: text
      regex: '[/\\](ransom|locker|encrypt)[/\\].{0,80}[/\\]crypter\.(go|rs)$'
      case_insensitive: true
  - id: locker-namespace
    desc: Ransomware locker module namespace
    crit: suspicious
    conf: 0.95
    for: [rust]
    if:
      type: text
      regex: 'locker::(core|lib|app)::'
  - id: encrypt-lib-path
    desc: Encryption library source paths
    crit: suspicious
    conf: 0.9
    for: [go, rust]
    if:
      type: text
      regex: library/(encrypt-lib|locker)/src/
  - id: config-note-field-name
    desc: note_file_name config field
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: note_file_name
  - id: config-note-field-full
    desc: note_full_text config field
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: note_full_text
  - id: config-note-field-short
    desc: note_short_text config field
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: note_short_text
  - id: config-cipher-field-cipher
    desc: default_file_cipher config field
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: default_file_cipher
  - id: config-cipher-field-mode
    desc: default_file_mode config field
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: default_file_mode
  - id: template-placeholders
    desc: Ransomware config template variables (EXTENSION, NOTE_FILE_NAME, ACCESS_KEY)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \$\{(EXTENSION|NOTE_FILE_NAME|ACCESS_KEY)\}
  - id: vm-kill-config-1
    desc: enable_esxi_vm_kill config field
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: enable_esxi_vm_kill
  - id: vm-kill-config-2
    desc: enable_esxi_vm_snapshot_kill config field
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: enable_esxi_vm_snapshot_kill
  - id: vm-kill-config-3
    desc: esxi_vm_kill_exclude config field
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: esxi_vm_kill_exclude
  - id: kill-services-config-1
    desc: kill_services config field
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: kill_services
  - id: kill-services-config-2
    desc: kill_processes config field
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: (^|[^A-Za-z0-9_])kill_processes([^A-Za-z0-9_]|$)
  - id: ransom-extension-1
    desc: Ransomware file extension markers (crypt/encrypted/locked)
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '[a-zA-Z0-9_]{2,}\.(crypt|encrypted|locked)$'
    not:
      - substr: flow.locked
      - substr: exithook.locked
      - substr: FutexImpl.locked
      - substr: runtime.locked
    unless:
      - type: text
        regex: ^(matplotlib|tex)$
  - id: ransom-extension-2
    desc: Ransomware file extension markers (enc/crypted/cry)
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '[a-zA-Z0-9_]{2,}\.(enc|crypted|cry)$'
    unless:
      - type: text
        regex: '^payload\.enc$'
      - type: text
        regex: ^(matplotlib|tex)$
  - id: babuk-config-marker
    desc: Babuk ransomware configuration memory marker (16x 0xAF)
    crit: component
    conf: 0.98
    for:
      - elf
    if:
      type: hex
      section: .text
      pattern: af af af af af af af af af af af af af af af af
  - id: file-locked-message
    desc: File locked status message
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: File Locked|locked.{1,20}PID|error.{0,20}encrypt.{0,20}rename
  - id: crypted-counter
    desc: Encryption counter message
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Total (Crypted|Encrypted)|Crypted:.{0,20}Error:|Files Encrypted:'
  - id: payment-status-check-1
    desc: Ransomware payment verification (getHasPayed|checkPayment)
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      regex: \b(getHasPayed|checkPayment)\b
      case_insensitive: true
  - id: payment-status-check-3
    desc: Generic verify payment text
    crit: component
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      regex: \bverify\b.{0,20}\bpayment\b
      case_insensitive: true
    not:
      - substr: "verify-payment"
  - id: desktop-note-path
    desc: Ransom note file dropped to Desktop directory
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (/Desktop/|\\Desktop\\)[^/\\]{1,50}\.(html?|txt)
  - id: babuk-file-status-logging
    desc: Ransomware file encryption status logging
    crit: suspicious
    conf: 0.9
    for:
      - elf
      - macho
    if:
      type: text
      regex: \[[+!]\]\s+File\s+(not\s+)?encrypted
  - id: babuk-file-io-errors
    desc: Ransomware file access error logging
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - macho
    if:
      type: text
      regex: \[!\]\s+Can`t\s+(run for|open)\s+file
  - id: ransom-note-text
    desc: Ransom note message patterns
    crit: suspicious
    conf: 0.95
    if:
      type: text
      case_insensitive: true
      regex: your files.{0,30}encrypted|pay.{0,20}(ransom|bitcoin)
  - id: encryption-pipeline
    desc: File encryption pipeline patterns
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: encrypted extension[^s]|File Processing Pipeline|Files processed.{0,50}scanned
  - id: ransom-note-filename-readme-restore
    desc: Ransom note filename README RESTORE
    crit: suspicious
    conf: 0.9
    if:
      type: text
      case_insensitive: true
      regex: '(^|[/\\])README[^/\\]{0,20}RESTORE$'
    downgrade:
      any:
        - id: well-known/tool/detection/
  - id: ransom-note-filename-how-recover
    desc: Ransom note filename HOW RECOVER
    crit: suspicious
    conf: 0.9
    if:
      type: text
      case_insensitive: true
      regex: '(^|[/\\])HOW[_\-.][^/\\]{0,18}RECOVER$'
    downgrade:
      any:
        - id: well-known/tool/detection/
  - id: ransom-note-filename-ransom-note
    desc: Ransom note filename RANSOM NOTE
    crit: suspicious
    conf: 0.9
    if:
      type: text
      case_insensitive: true
      regex: '(^|[/\\])RANSOM[ _.-][^/\\]{0,11}NOTE(\.[A-Za-z0-9]{1,5})?$'
    downgrade:
      any:
        - id: well-known/tool/detection/
  - id: ransom-note-filename-readme-txt
    desc: Ransom note filename _readme.txt
    crit: suspicious
    conf: 0.9
    if:
      type: text
      case_insensitive: true
      regex: '(^|[/\\])_readme\.txt$'
    downgrade:
      any:
        - id: well-known/tool/detection/
  - id: locker-config-field-extensions-full
    desc: vecFullEncryptionExtensions config field
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: vecFullEncryptionExtensions
  - id: locker-config-field-extensions-skip
    desc: vecSkipFileExtensions config field
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: vecSkipFileExtensions
  - id: locker-config-field-key
    desc: sMasterPublicKey config field
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: sMasterPublicKey
composite_rules:
  - id: encrypt-func-symbol
    desc: File encryption function symbols
    crit: suspicious
    conf: 0.9
    any:
      - id: encrypt-func-symbol-1
      - id: encrypt-func-symbol-2
  - id: ransomware-source-path
    desc: Ransomware source file path
    crit: suspicious
    conf: 0.95
    any:
      - id: ransomware-source-path-1a
      - id: ransomware-source-path-go-rs
      - id: ransomware-module-path-go-rs
      - id: locker-module-path-go-rs
      - id: ransomware-source-path-1c
      - id: ransomware-source-path-2
  - id: config-note-fields
    desc: Ransomware note config fields
    crit: suspicious
    conf: 0.95
    any:
      - id: config-note-field-name
      - id: config-note-field-full
      - id: config-note-field-short
  - id: config-cipher-fields
    desc: Ransomware cipher config fields
    crit: suspicious
    conf: 0.9
    any:
      - id: config-cipher-field-cipher
      - id: config-cipher-field-mode
  - id: vm-kill-config
    desc: VM kill configuration fields
    crit: suspicious
    conf: 0.95
    any:
      - id: vm-kill-config-1
      - id: vm-kill-config-2
      - id: vm-kill-config-3
  - id: kill-services-config
    desc: Service kill config for ransomware
    crit: suspicious
    conf: 0.85
    any:
      - id: kill-services-config-1
      - id: kill-services-config-2
  - id: ransom-extension
    desc: Ransomware file extension markers
    crit: notable
    conf: 0.85
    any:
      - id: ransom-extension-1
      - id: ransom-extension-2
  - id: payment-status-check
    desc: Ransomware payment verification
    crit: suspicious
    conf: 0.9
    any:
      - id: payment-status-check-1
      - id: payment-status-check-3
    downgrade:
      any:
        - id: metadata/signed/developer
  - id: locker-config-fields
    desc: Ransomware locker configuration schema fields
    crit: suspicious
    conf: 0.95
    any:
      - id: locker-config-field-extensions-full
      - id: locker-config-field-extensions-skip
      - id: locker-config-field-key
  - id: locker-behavioral-indicators
    desc: Ransomware behavioral indicators (logging and schema)
    crit: suspicious
    conf: 0.9
    any:
      - id: babuk-file-status-logging
      - id: locker-config-fields
      - id: babuk-file-io-errors
    needs: 2
  - id: ransom-note-filename
    desc: Ransom note filename patterns
    crit: suspicious
    conf: 0.9
    any:
      - id: ransom-note-filename-readme-restore
      - id: ransom-note-filename-how-recover
      - id: ransom-note-filename-ransom-note
      - id: ransom-note-filename-readme-txt
  - id: ransomware-basic
    desc: Ransomware encryption pattern
    crit: hostile
    conf: 0.95
    for: [elf, macho, pe, c, cpp]
    all:
      - id: micro-behaviors/crypto/library/keyword::openssl-evp-encrypt
      - id: ransom-note-text
    any:
      - id: ransom-note-filename
      - id: ransom-extension
      - id: crypted-counter
      - id: file-locked-message
  - id: ransomware-with-note
    desc: Ransomware with ransom note
    crit: hostile
    conf: 0.98
    for: [elf, macho, pe, c, cpp]
    all:
      - id: ransom-note-text
      - id: ransom-extension
    any:
      - id: micro-behaviors/crypto/library/keyword::openssl-evp-encrypt
      - id: micro-behaviors/crypto/asymmetric/rsa::rsa-public-encrypt
      - id: crypted-counter
  - id: ransomware-locker
    desc: Rust-based ransomware locker
    crit: hostile
    conf: 0.95
    for: [elf, macho, pe, c, cpp]
    all:
      - id: locker-namespace
      - id: config-note-fields
      - id: config-cipher-fields
    any:
      - id: template-placeholders
      - id: encryption-pipeline
      - id: vm-kill-config
      - id: encrypt-lib-path
  - id: ransomware-locker-esxi
    desc: ESXi-targeting ransomware locker
    crit: hostile
    conf: 0.98
    for:
      - elf
    all:
      - id: locker-namespace
      - id: config-note-fields
      - id: vm-kill-config
      - id: micro-behaviors/os/sysinfo/vmware::esxcli-vm-kill
    any:
      - id: config-cipher-fields
      - id: encrypt-lib-path
  - id: ransomware-encrypt-funcs
    desc: Ransomware with encryption functions
    crit: hostile
    conf: 0.95
    for: [elf, macho, pe, c, cpp]
    all:
      - id: encrypt-func-symbol
      - id: ransom-note-text
    any:
      - id: encryption-complete-msg
      - id: ransomware-source-path
      - id: crypted-counter
      - id: ransom-note-filename
  - id: rust-file-encryptor
    desc: Rust stream cipher file encryptor
    crit: hostile
    conf: 0.92
    for:
      - elf
    all:
      - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
      - id: micro-behaviors/process/threading/concurrency::pthread
      - id: micro-behaviors/fs/file/read/
      - id: metadata/lang/compiler/systems::rust-binary
    any:
      - id: ransom-note-text
      - id: ransom-note-filename
      - id: crypted-counter
      - id: encryption-complete-msg
    downgrade:
      any:
        - id: metadata/binary/installer/script::nsis
        - id: well-known/lib/openssl::openssl-library
        - id: micro-behaviors/data/db/postgresql::rust-sqlx-postgres-client
  - id: c-file-encryptor
    desc: C/C++ file encryption ransomware with payment verification
    crit: hostile
    conf: 0.95
    for: [elf, macho, pe, c, cpp]
    all:
      - id: ransom-note-text
      - id: desktop-note-path
      - id: payment-status-check
    any:
      - id: data-loss-threat
  - id: data-loss-threat
    desc: Ransomware data loss threat
    crit: component
    conf: 0.9
    unless:
      - id: objectives/impact/ransom/encrypt/threat-text::inline__data-loss-threat__unless_1_a
      - id: objectives/impact/ransom/encrypt/threat-text::inline__data-loss-threat__unless_1_b
    any:
      - id: objectives/impact/ransom/encrypt/threat-text
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-marker-rdata
        - id: metadata/signed/platform::microsoft
