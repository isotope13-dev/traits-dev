defaults:
  platforms: [windows]
  for: [cargo.toml]
  attack: T1486

traits:
  - id: cargo-ransom-note-bin
    desc: Cargo declares ransom note binary
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)ransom_note\.rs|name\s*=\s*"note"'

  - id: cargo-product-name-ven0m
    desc: Cargo product name VEN0m
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: package.metadata.winres.ProductName
      regex: '^VEN0m$'

  - id: cargo-product-name-venom
    desc: Cargo product name venom
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: package.metadata.winres.ProductName
      regex: '\bvenom\b'
      case_insensitive: true

  - id: cargo-product-name-ransom
    desc: Cargo product name mentions ransom
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: package.metadata.winres.ProductName
      regex: '\bransom\b'
      case_insensitive: true

  - id: cargo-product-name-locker
    desc: Cargo product name mentions locker
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: package.metadata.winres.ProductName
      regex: '\blocker\b'
      case_insensitive: true

  - id: cargo-product-name-crypt
    desc: Cargo product name mentions crypt
    crit: suspicious
    conf: 0.86
    if:
      type: value
      path: package.metadata.winres.ProductName
      regex: '\bcrypt\b'
      case_insensitive: true

composite_rules:
  - id: cargo-ransom-product-name
    desc: Cargo ransomware product name
    crit: suspicious
    conf: 0.92
    any:
      - id: cargo-product-name-ven0m
      - id: cargo-product-name-venom
      - id: cargo-product-name-ransom
      - id: cargo-product-name-locker
      - id: cargo-product-name-crypt

  - id: cargo-ransom-service-encryptor
    desc: Cargo ransomware service encryptor
    crit: hostile
    conf: 0.98
    all:
      - id: cargo-ransom-note-bin
      - id: cargo-ransom-product-name
      - id: objectives/supply-chain/hidden-payload/package::cargo-dep-aes-gcm
      - id: objectives/supply-chain/hidden-payload/package::cargo-dep-walkdir
    any:
      - id: objectives/supply-chain/hidden-payload/cargo-behavior::cargo-dep-windows-service
      - id: objectives/supply-chain/hidden-payload/package::cargo-windows-service-feature
