defaults:
  platforms: [windows, unix]
  for: [binaries, python, go, c, cpp, rust]
  attack: "T1486"
traits:
  - id: ransomware-spread-gpo-flags
    desc: Spread or GPO CLI flags
    crit: component
    conf: 0.9
    if:
      type: text
      regex: --(spread|gpo)\b
      case_insensitive: true
  - id: partial-encryption-speed-flags
    desc: Fast-mode CLI flag
    crit: component
    conf: 0.85
    if:
      type: text
      regex: --(fast|superfast|ultrafast)\b
      case_insensitive: true
  - id: windows-locker-mode-flags
    desc: Windows locker mode flags
    crit: component
    conf: 0.8
    unless:
      - type: basename
        regex: '^(ls|cp|sh|curl)$'
    if:
      type: text
      regex: --(shares|wipe)\b
      case_insensitive: true
  - id: esxi-locker-required-path
    desc: ESXi locker path flag
    crit: component
    conf: 0.85
    if:
      type: text
      regex: --path\s+DIR|--path\s+/vmfs|--path.{0,40}/datastore
      case_insensitive: true
composite_rules:
  - id: password-gated-ransomware-cli
    desc: Password-gated ransomware CLI
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/argument/credential::password-required-flag
    needs: 2
    any:
      - id: objectives/impact/ransom/encrypt/cli
  - id: password-gated-spread-locker
    desc: Password-gated spreading locker
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/argument/credential::password-required-flag
      - id: ransomware-spread-gpo-flags
    any:
      - id: partial-encryption-speed-flags
      - id: windows-locker-mode-flags
      - id: esxi-locker-required-path
