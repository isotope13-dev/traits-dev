defaults:
  platforms: [macos]
  for: [macho]
  attack: T1486
traits:
  - id: seven-day-ransom-note
    desc: Seven day ransom deadline
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: 7 DAYS.
  - id: atoi-key-parse
    desc: atoi key material parsing
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: atoi
  - id: strtol-key-parse
    desc: strtol key material parsing
    crit: component
    conf: 0.75
    if:
      type: symbol
      exact: strtol
composite_rules:
  - id: time-derived-keying
    desc: Time-derived keying and formatting
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/time/query::time
      - id: micro-behaviors/time/query::localtime
      - id: micro-behaviors/time/query::strftime
      - id: micro-behaviors/os/random/crypto::seeded-random
    any:
      - id: micro-behaviors/os/random/operations::arc4random
      - id: atoi-key-parse
      - id: strtol-key-parse
  - id: file-overwrite-routine
    desc: In-place file overwrite routine
    crit: baseline
    conf: 0.72
    all:
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/read::fread
      - id: micro-behaviors/fs/file/write::write
      - id: micro-behaviors/fs/file/binary::fseek-func
  - id: user-targeted-file-ops
    desc: User-targeted destructive file operations
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/user/query::getpwuid
      - id: micro-behaviors/os/privilege/query::getuid
      - id: file-overwrite-routine
    any:
      - id: micro-behaviors/fs/chmod/commands::syscall
      - id: micro-behaviors/fs/file/delete::remove
      - id: micro-behaviors/fs/directory/mkdir::mkdir
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: macos-ransomware-core
    desc: macOS ransomware file encryptor
    crit: hostile
    conf: 0.98
    all:
      - id: user-targeted-file-ops
      - id: micro-behaviors/process/create/shell::system-fn
    any:
      - id: seven-day-ransom-note
      - id: time-derived-keying
      - id: micro-behaviors/dylib/load::dlopen-dlsym
      - id: micro-behaviors/process/threading/operations::pthread
      - id: objectives/anti-static/obfuscation/payload/encrypted::elevated-entropy-const-small-macho
    needs: 2
    unless:
      - id: metadata/signed/platform::apple
  - id: macos-obfuscated-ransomware
    desc: macOS obfuscated ransomware orchestration
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/shell::system-fn
      - id: micro-behaviors/dylib/load::dlopen-dlsym
      - id: user-targeted-file-ops
    any:
      - id: seven-day-ransom-note
      - id: time-derived-keying
      - id: objectives/anti-static/obfuscation/payload/encrypted::elevated-entropy-const-small-macho
    unless:
      - id: metadata/signed/platform::apple
  - id: macos-ransomware-threaded
    desc: Threaded macOS ransomware worker
    crit: suspicious
    conf: 0.92
    all:
      - id: user-targeted-file-ops
      - id: micro-behaviors/process/threading/operations::pthread
    any:
      - id: seven-day-ransom-note
      - id: time-derived-keying
      - id: micro-behaviors/process/create/shell::system-fn
