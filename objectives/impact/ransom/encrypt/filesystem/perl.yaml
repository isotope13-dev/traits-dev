defaults:
  platforms: [android, unix]
  for: [perl]
  attack: T1486

traits:
  - id: perl-ransom-encrypted-ext
    desc: Perl ransomware extension
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ENCRYPTED_EXT|\.c13v3d'
    unless:
      - id: well-known/app/openssl/

  # `ord(substr(...))^` is a generic Perl byte-XOR idiom (gropdf uses it for PDF
  # encryption); not ransomware on its own. Building block for the ransomware
  # composite below, which also requires cleartext deletion + "Encrypted:" marker.
  - id: perl-xor-encrypt-file
    desc: Perl XOR file encryption
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'xor_encrypt|ord\(substr[\s\S]{0,80}\^'

  - id: perl-delete-cleartext
    desc: Perl deletes cleartext file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'unlink\(\$filepath\)|Encrypted:'

composite_rules:
  - id: perl-xor-ransomware-files
    desc: Perl XOR ransomware files
    crit: hostile
    conf: 0.98
    all:
      - id: perl-ransom-encrypted-ext
      - id: perl-xor-encrypt-file
      - id: perl-delete-cleartext
