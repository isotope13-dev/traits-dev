defaults:
  platforms: [openbsd, bsd, unix]
  for: [lua]
  attack: T1486

traits:
  - id: lua-ransom-note-text
    desc: Lua ransom note text
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: YOUR FILES HAVE BEEN ENCRYPTED

  - id: lua-ransom-xor-key
    desc: Lua ransom XOR key
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: CRUCIBLE_BENCHMARK_KEY

  - id: lua-recover-files-note
    desc: Lua writes recovery note
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: RECOVER_FILES.txt

composite_rules:
  - id: lua-openbsd-ransom-encryptor
    desc: Lua OpenBSD ransom encryptor
    crit: hostile
    conf: 0.98
    all:
      - id: lua-ransom-note-text
      - id: lua-ransom-xor-key
      - id: lua-recover-files-note

