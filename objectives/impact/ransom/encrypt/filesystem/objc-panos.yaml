defaults:
  platforms: [panos, appliance, unix]
  for: [objc, c, elf, macho]
  attack: T1486

traits:
  - id: objc-panos-readme-decrypt-note
    desc: ObjC PAN-OS README decrypt note
    crit: suspicious
    conf: 0.94
    for: [objc]
    if:
      type: text
      substr: README_DECRYPT.txt

  - id: objc-panos-ransom-status-api
    desc: ObjC PAN-OS ransom status API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/ransom/status

composite_rules:
  - id: objc-panos-ransom-status
    desc: ObjC PAN-OS ransom status
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/impact/ransom/encrypt/filesystem::panos-shell-ransom-note
      - id: objc-panos-ransom-status-api

  - id: objc-panos-readme-ransom-note
    desc: ObjC PAN-OS README ransom note
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/impact/ransom/encrypt/filesystem::panos-shell-ransom-note
      - id: objc-panos-readme-decrypt-note
