defaults:
  platforms: [ios]
  for: [cpp, objc]
  attack: T1486

traits:
  - id: objc-ios-ransom-extension
    desc: ObjC iOS ransom extension
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .locked_by_dragon

  # Bare substr "RECOVERY" matched compound C identifiers (WSANO_RECOVERY,
  # FILE_OPEN_FOR_RECOVERY, szOID_..._KEY_RECOVERY) in Windows headers. The
  # ransom note drops a standalone "RECOVERY" token, so require token boundaries.
  # Generic on its own — only meaningful paired with the family extension, so
  # component tier; the hostile composite below still references it.
  - id: objc-ios-ransom-note
    desc: RECOVERY ransom-note marker token
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])RECOVERY([^A-Za-z0-9_]|$)'

composite_rules:
  - id: objc-ios-file-ransom
    desc: ObjC iOS file ransom
    crit: hostile
    conf: 0.98
    all:
      - id: objc-ios-ransom-extension
      - id: objc-ios-ransom-note
