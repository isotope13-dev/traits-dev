defaults:
  platforms: [ios]
  for: [cpp, objc]
  attack: T1486

traits:
  - id: objc-ios-ransom-extension
    desc: ObjC iOS ransom extension
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .locked_by_dragon

  - id: objc-ios-ransom-note
    desc: ObjC iOS ransom note
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: RECOVERY

composite_rules:
  - id: objc-ios-file-ransom
    desc: ObjC iOS file ransom
    crit: hostile
    conf: 0.98
    all:
      - id: objc-ios-ransom-extension
      - id: objc-ios-ransom-note
