defaults:
  platforms: [panos, appliance, unix]
  for: [lua]
  attack: T1486

traits:
  - id: lua-panos-ransom-note-path
    desc: Lua PAN-OS ransom note path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.ransom/README_DECRYPT.txt

  - id: lua-panos-ransom-complete-post
    desc: Lua PAN-OS ransom complete POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /ransom-complete

composite_rules:
  - id: lua-panos-ransom-note-checkin
    desc: Lua PAN-OS ransom note checkin
    crit: hostile
    conf: 0.98
    all:
      - id: lua-panos-ransom-note-path
      - id: lua-panos-ransom-complete-post
