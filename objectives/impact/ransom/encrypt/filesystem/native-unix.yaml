defaults:
  platforms: [netbsd, unix]
  for: [c, cpp, elf]
  attack: T1486

traits:
  - id: native-readme-decrypt-note
    desc: Native README decrypt note
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: README_DECRYPT.txt

  - id: native-files-encrypted-message
    desc: Native files encrypted message
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: YOUR FILES HAVE BEEN ENCRYPTED

  - id: native-xor-encrypt-function
    desc: Native XOR encrypt function
    crit: suspicious
    conf: 0.92
    for: [c, cpp]
    if:
      type: text
      regex: 'xor_encrypt[\s\S]{0,260}RANSOM_KEY'

composite_rules:
  - id: native-ransom-note-encryptor
    desc: Native ransom note encryptor
    crit: hostile
    conf: 0.98
    all:
      - id: native-readme-decrypt-note
      - id: native-files-encrypted-message
    any:
      - id: native-xor-encrypt-function
      - id: objectives/impact/ransom/encrypt/config::ransom-note-text
