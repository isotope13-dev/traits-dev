defaults:
  platforms: [netbsd, unix]
  for: [c, cpp, elf]
  attack: T1486

traits:
  - id: native-readme-decrypt-note
    desc: Native README decrypt note
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: README_DECRYPT.txt

  - id: native-files-encrypted-message
    desc: Native files encrypted message
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: YOUR FILES HAVE BEEN ENCRYPTED

  - id: native-xor-encrypt-function
    desc: Native XOR encrypt function
    crit: suspicious
    conf: 0.92
    for: [c, cpp]
    if:
      type: text
      regex: 'xor_encrypt[\s\S]{0,260}RANSOM_KEY'

  - id: native-openssl-file-crypto-stack
    desc: Native OpenSSL file crypto stack
    crit: suspicious
    conf: 0.9
    for: [elf]
    if:
      type: text
      regex: 'EVP_aes_256_cbc[\s\S]{0,520}EVP_Cipher(Update|Final)|BIO_f_base64[\s\S]{0,520}RAND_bytes'

composite_rules:
  - id: native-ransom-note-encryptor
    desc: Native ransom note encryptor
    crit: hostile
    conf: 0.98
    all:
      - id: native-readme-decrypt-note
      - id: native-files-encrypted-message
    any:
      - id: native-xor-encrypt-function
      - id: objectives/impact/ransom/encrypt/config::ransom-note-text
  - id: native-file-crypto-edit-workflow
    desc: Native file crypto edit workflow
    crit: suspicious
    conf: 0.92
    for: [elf]
    all:
      - id: micro-behaviors/dylib/library/ssl::libcrypto-ref
      - id: micro-behaviors/os/random/crypto::rand-bytes
      - id: micro-behaviors/fs/directory/readdir::readdir-core
      - id: micro-behaviors/fs/file/delete::unlink
    any:
      - id: native-openssl-file-crypto-stack
      - id: micro-behaviors/fs/file/binary::file-manipulation
      - id: micro-behaviors/fs/file/write/direct::write
    unless:
      - id: well-known/tool/reverse-engineering/frida/
  - id: native-file-crypto-base64-payload
    desc: Native file crypto base64 payload
    crit: suspicious
    conf: 0.9
    for: [elf]
    all:
      - id: native-file-crypto-edit-workflow
      - id: objectives/anti-static/obfuscation/encoding/base64::base64-suspicious-encoding
