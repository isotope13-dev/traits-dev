defaults:
  platforms: [windows]
  for: [go, pe]
  attack: T1486
  mbc: B0040

composite_rules:
  - id: go-file-encryptor-extortion
    desc: Go multidrive hybrid file encryptor
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/fs/file/encrypt::go-chunked-file-encryption
      - id: micro-behaviors/crypto/asymmetric/rsa::go-public-key-file-wrap
      - id: micro-behaviors/fs/directory/traverse::go-file-matching-routine
      - id: micro-behaviors/fs/traversal/drives::go-logical-drive-enumeration
      - id: micro-behaviors/crypto/library/stdlib::go-crypto-aes-import
      - id: micro-behaviors/crypto/library/stdlib::go-crypto-rsa-import
