defaults:
  platforms: [unix, netbsd]
  for: [shell]
  attack: T1486

traits:
  - id: shell-openssl-aes-file-encrypt
    desc: Shell OpenSSL AES file encrypt
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: openssl enc -aes-256-cbc
    not:
      # k3s encrypts a diagnostic tar stream read from stdin. That is a
      # protected archive operation, not encryption of victim files.
      - regex: '(?i)openssl\s+enc\s+-aes-256-cbc[\s\S]{0,180}-in\s+/dev/stdin\b'

  - id: shell-ransom-restore-note
    desc: Shell ransom restore note
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: RESTORE_FILES.txt

composite_rules:
  - id: shell-openssl-ransom-encrypt
    desc: Shell OpenSSL ransom encrypt
    crit: hostile
    conf: 0.98
    all:
      - id: shell-openssl-aes-file-encrypt
      - id: shell-ransom-restore-note
    any:
      - id: objectives/impact/ransom/note::ransomware-banner-core
