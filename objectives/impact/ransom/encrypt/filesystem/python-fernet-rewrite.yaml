defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1486
  mbc: B0040

traits:
  - id: python-indexed-file-open-mode
    desc: Indexed-character file open mode
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'open\([^,]{0,120},\s*\w+\[\d+\]\s*\+\s*\w+\[\d+\]\)'

  - id: python-indexed-file-write
    desc: Indexed-mode file write call
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '\.write\('

  - id: python-indexed-extension-tuple
    desc: Indexed-character extension tuple
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\w+\[\d+\](\+\w+\[\d+\]){2,},'

  - id: python-variable-extension-check
    desc: Python variable extension check
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\.endswith\(\w+\)'

composite_rules:
  - id: python-fernet-indexed-extension-file-rewrite
    desc: Fernet-encrypts selected files in place
    crit: hostile
    conf: 0.99
    all:
      - id: python-indexed-extension-tuple
      - id: python-variable-extension-check
      - id: python-indexed-file-open-mode
      - id: python-indexed-file-write
      - id: micro-behaviors/crypto/symmetric/fernet::encrypt
