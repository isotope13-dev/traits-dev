defaults:
  platforms: [ios]
  for: [lua]
  attack: T1486

traits:
  - id: lua-documents-xor-encrypt
    desc: Lua XOR encrypts Documents files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'xor_encrypt[\s\S]{0,220}/Documents'

  - id: lua-ransom-note-restore-files
    desc: Lua writes RESTORE_FILES ransom note
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: RESTORE_FILES.txt

composite_rules:
  - id: lua-ios-documents-ransom
    desc: Lua iOS Documents ransom
    crit: hostile
    conf: 0.98
    all:
      - id: lua-documents-xor-encrypt
      - id: lua-ransom-note-restore-files
