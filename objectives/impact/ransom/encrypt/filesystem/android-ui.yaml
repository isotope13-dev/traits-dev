defaults:
  platforms: [android]
  for: [java, class]
  attack: T1486
  mbc: B0031

traits:
  - id: android-ransom-files-encrypt-list
    desc: Android ransomware file encryption list
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: member
      exact: Utils.filesToEncrypt
  - id: android-ransom-delete-countdown
    desc: Android ransomware delete countdown
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: identifier
      exact: DeleteFileCountDownTimer
  - id: android-ransom-decrypt-key-input
    desc: Android ransomware decrypt key input
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: identifier
      exact: decryptKey
  - id: android-ransom-payment-timer
    desc: Android ransomware payment timer
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: identifier
      exact: paymentRaisedTimeStamp
  - id: android-ransom-payment-clipboard
    desc: Android ransomware payment clipboard helper
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: import
      exact: android.content.ClipboardManager
  - id: apk-encryption-card-activity
    desc: Android APK encryption card activity
    crit: suspicious
    conf: 0.92
    for: [apk]
    if:
      type: text
      substr: Lcom/example/myapplication/encryption_card;
  - id: apk-external-storage-target
    desc: Android APK references external storage root
    crit: notable
    conf: 0.86
    for: [apk]
    if:
      type: text
      substr: getExternalStorageDirectory
  - id: apk-home-key-lock-receiver
    desc: Android APK home key lock receiver
    crit: suspicious
    conf: 0.88
    for: [apk]
    if:
      type: text
      substr: HomeKeyEventBroadCastReceiver
  - id: apk-sunsang-recovery-endpoint
    desc: Android APK recovery SMS endpoint
    crit: suspicious
    conf: 0.9
    for: [apk]
    if:
      type: text
      substr: hp_getsmsblockstate.php?telnum=
  - id: apk-encry-image-resource
    desc: Android APK encryption image resource
    crit: suspicious
    conf: 0.9
    for: [apk]
    if:
      type: value
      path: "archive.members[*].path"
      exact: res/mipmap-mdpi/encry.png
  - id: apk-step-lock-layouts
    desc: Android APK staged lock layouts
    crit: suspicious
    conf: 0.9
    for: [apk]
    if:
      type: value
      path: "archive.members[*].path"
      regex: 'res/layout(-v17)?/step[2-6]\.xml'
  - id: apk-sunsang-layout
    desc: Android APK SunSang layout
    crit: suspicious
    conf: 0.9
    for: [apk]
    if:
      type: value
      path: "archive.members[*].path"
      regex: 'res/layout(-v17)?/sunsang\.xml'

composite_rules:
  - id: android-ransomware-payment-encrypt-ui
    desc: Android ransomware payment encrypt UI
    crit: suspicious
    conf: 0.94
    any:
      - id: android-ransom-files-encrypt-list
      - id: android-ransom-delete-countdown
      - id: android-ransom-decrypt-key-input
      - id: android-ransom-payment-timer
      - id: android-ransom-payment-clipboard
    needs: 3
  - id: android-apk-ransom-lock-encrypt-ui
    desc: Android APK ransomware lock/encrypt workflow
    crit: hostile
    conf: 0.98
    for: [apk]
    any:
      - id: apk-encryption-card-activity
      - id: apk-external-storage-target
      - id: apk-home-key-lock-receiver
      - id: apk-sunsang-recovery-endpoint
      - id: apk-encry-image-resource
      - id: apk-step-lock-layouts
      - id: apk-sunsang-layout
    needs: 3
