# Filesystem-walker system-path skip lists.
#
# Ransomware that encrypts everything will brick the OS and lose its
# extortion leverage (the victim can't see the ransom note if the
# system won't boot). To avoid that, every file-encryptor maintains
# a skip-path list: directories whose contents are exempt from
# encryption. The packed form — concatenated `/path1//path2/` runs
# without separators — is a strong fingerprint, especially when it
# pairs Unix system paths (`/boot/`, `/proc/`, `/sys/`) with the
# encryptor's own staging directory.
defaults:
  platforms: [linux, macos]
  for: [elf, macho, binaries]
  attack: T1486
  mbc: B0040

traits:
  - id: linux-system-skip-paths-blob
    desc: Packed Linux system-path skip-list (boot/proc/sys/etc)
    # Three or more Linux system paths concatenated with the `//`
    # separator the Go `strings.Join("//")` idiom produces is a
    # textbook ransomware skip-list shape. Real Linux software
    # references one or two of these paths individually; encryptors
    # bundle 5+ for filesystem-walker exclusion.
    crit: suspicious
    conf: 0.93
    if:
      type: raw
      regex: '/boot//proc//sys/|/proc//sys//etc/|/etc//usr//run/|/run//lib//dev/'

  - id: linux-system-skip-paths-blob-set
    desc: Linux system-path skip-list (4+ adjacent paths)
    # The full Sorry-style list `/boot//proc//sys//etc//usr//run//lib/`
    # — 7 system roots packed adjacent. This shape is essentially
    # exclusive to file-encrypting ransomware.
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: '/boot//proc//sys//etc/|/sys//etc//usr//run/|/etc//usr//run//lib/'

composite_rules:
  - id: ransomware-system-skip-list
    desc: Ransomware filesystem-walker system-path skip list
    crit: suspicious
    conf: 0.94
    any:
      - id: linux-system-skip-paths-blob
      - id: linux-system-skip-paths-blob-set
