defaults:
  platforms: [panos, appliance, unix]
  for: [shell]
  attack: T1486

traits:
  - id: panos-shell-locked-extension
    desc: PAN-OS shell locked extension
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ENCRYPTED_EXT=".locked"

  - id: panos-shell-ransom-note
    desc: PAN-OS ransom note
    crit: suspicious
    conf: 0.94
    for: [shell, objc]
    if:
      type: text
      substr: YOUR FILES HAVE BEEN ENCRYPTED

composite_rules:
  - id: panos-shell-ransomware-encrypt
    desc: PAN-OS shell ransomware encrypt
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/impact/ransom/encrypt/filesystem::shell-openssl-aes-file-encrypt
      - id: panos-shell-locked-extension
      - id: panos-shell-ransom-note
