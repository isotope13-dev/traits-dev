defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1486

traits:
  - id: python-xor-file-encryption-loop
    desc: Python XOR file encryption loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'def xor_encrypt[\s\S]{0,260}key\[i % len\(key\)\]'

  - id: python-locked-file-replacement
    desc: Python locked file replacement
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.locked[\s\S]{0,260}os\.remove\(fpath\)'

  - id: python-ransom-walk-encrypt
    desc: Python walks dirs to encrypt
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'os\.walk\(path\)[\s\S]{0,420}xor_encrypt'

  - id: python-pyc-ransom-lock-markers
    desc: Python bytecode ransom lock markers
    crit: suspicious
    conf: 0.93
    for: [pyc]
    if:
      type: text
      regex: 'xor_encrypt[\s\S]{0,260}\.locked'

  - id: python-pyc-locked-extension
    desc: Python bytecode locked extension
    crit: notable
    conf: 0.93
    for: [pyc]
    if:
      type: text
      substr: .locked

composite_rules:
  - id: python-xor-file-ransom
    desc: Python XOR file ransom
    crit: hostile
    conf: 0.98
    all:
      - id: python-xor-file-encryption-loop
      - id: python-locked-file-replacement
      - id: python-ransom-walk-encrypt

  - id: python-bytecode-file-ransom
    desc: Python bytecode file ransom
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: micro-behaviors/data/encode/xor::xor-encrypt-name
      - id: python-pyc-locked-extension
      - id: objectives/impact/ransom/note::readme-locked-note

  - id: python-installed-module-encryption
    desc: Python encrypts a module in an installed interpreter library
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/crypto/symmetric/encrypt::python-encrypt-file-call
      - id: micro-behaviors/crypto/symmetric/encrypt::python-pyencryptor-import
      - id: micro-behaviors/fs/path/application/interpreter::python-installed-library-path
