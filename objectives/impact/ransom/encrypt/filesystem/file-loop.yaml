defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: chilkat-crypto-lib
    desc: Chilkat crypto library usage
    crit: suspicious
    conf: 0.85
    attack: T1486
    if:
      type: text
      regex: require.{0,50}chilkat|Chilkat|chilkat
  - id: encrypt-module
    desc: Encryption module import
    crit: suspicious
    conf: 0.8
    attack: T1486
    if:
      type: string_literal
      regex: 'Encrypt\.rb|Enc\.new|dec\.cry'
  - id: decrypt-module
    desc: Decryption module import
    crit: suspicious
    conf: 0.8
    attack: T1486
    unless:
      - id: well-known/lib/active-support::module
    if:
      # The bare `decrypt` alternative matched the verb anywhere (any legit
      # OpenSSL/crypto method named `decrypt`), and the unescaped dots matched
      # any char. Require the actual module/file references this atom names.
      type: string_literal
      regex: 'Decrypt\.rb|Dec\.new|dec\.dec'
  - id: dir-file-enum
    desc: Directory file enumeration
    crit: suspicious
    conf: 0.75
    attack: T1083
    if:
      type: string_literal
      regex: Dir\[.{0,50}\*\*.{0,50}\*\.\*|input.{0,50}\*\*
  - id: file-operation-loop
    desc: File operation loop
    crit: suspicious
    conf: 0.75
    attack: T1486
    if:
      type: string_literal
      regex: for i in input|\.each.{0,50}file|loop.{0,50}encrypt
  - id: ransom-note-create
    desc: Ransom note file creation
    crit: suspicious
    conf: 0.9
    attack: T1491
    if:
      type: string_literal
      regex: '(?i)README_(DECRYPT|LOCKED)|hackend.{0,50}encrypted'
  - id: ransom-note-create-extra
    desc: Ransom note file creation (extra markers)
    crit: suspicious
    conf: 0.9
    attack: T1491
    if:
      type: string_literal
      regex: README.{0,50}PUTS|\.puts.{0,50}banner
composite_rules:
  - id: ransomware-tool
    desc: File encryption ransomware tool
    crit: suspicious
    conf: 0.95
    attack: T1486
    needs: 5
    any:
      - id: chilkat-crypto-lib
      - id: encrypt-module
      - id: decrypt-module
      - id: dir-file-enum
      - id: file-operation-loop
      - id: ransom-note-create
      - id: ransom-note-create-extra
      - id: micro-behaviors/fs/enumerate/directory::ruby-recursive-glob
  - id: ransomware-note-dropper
    desc: Ransom note creation behavior
    crit: suspicious
    conf: 0.9
    attack: T1491
    needs: 2
    any:
      - id: ransom-note-create
      - id: ransom-note-create-extra
      - id: file-operation-loop
  - id: file-encryption-loop
    desc: Bulk file encryption behavior
    crit: suspicious
    conf: 0.92
    attack: T1486
    needs: 3
    any:
      - id: dir-file-enum
      - id: file-operation-loop
      - id: encrypt-module
      - id: decrypt-module
