defaults:
  platforms: [windows, unix]
  for: [binaries]
traits:
- id: go-encrypt-files-func
  desc: Go EncryptFiles function symbol
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: \)\.(Encrypt|encrypt)Files(\.|$)
- id: go-obfuscated-encrypt-method
  desc: Obfuscated Go Encrypt/Decrypt methods
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '\w+\.\(\*\w+\)\.(Encrypt|Decrypt)$'
  unless:
  - type: text
    regex: 'crypto/'
- id: go-encrypt-filename-func
  desc: Go EncryptFilename function symbol
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \)\.(Encrypt|Decrypt)Filename(\.|$)
- id: go-kill-nonroot-func
  desc: Go KillNonRoot function symbol
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: \)\.KillNonRoot(\.|$)
- id: go-scan-export-paths
  desc: Go ScanPaths/ExportPaths function symbols
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \)\.(Scan|Export)(Files|Paths)(\.|$)
- id: go-wipe-paths-func
  desc: Go WipePaths function symbol
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: \)\.WipePaths(\.|$)
- id: go-erase-key-func
  desc: Go EraseKey function symbol
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \)\.EraseKey(\.|$)
- id: go-export-key-func
  desc: Go ExportKey function symbol
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: \)\.(Export|Import)(Key|PublicKey)(\.|$)
- id: go-try-fix-file-func
  desc: Go TryToFixFile function symbol
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \)\.TryToFixFile(\.|$)
- id: go-obfuscated-pkg
  desc: Go obfuscated package names
  crit: suspicious
  conf: 0.85
  count_min: 80
  if:
    type: text
    regex: ^[a-z][a-z0-9]{6,9}\.\(\*[A-Z][a-zA-Z0-9]{6,9}\)\.[A-Za-z][A-Za-z0-9_]{2,}$
  unless:
    # Go binaries with the standard library naturally have 80+ method
    # references matching this pattern (e.g. csyscall.(*WaitStatus).ExitStatus).
    # This trait targets garble-obfuscated packages, not stdlib method tables.
    - id: metadata/lang/compiler/systems::go-binary
    - id: metadata/lang/compiled::go-runtime-marker
- id: go-rsa-encrypt-oaep
  desc: Go RSA OAEP encryption
  crit: component
  conf: 0.9
  if:
    type: text
    substr: crypto/rsa.EncryptOAEP
- id: go-main-encrypt-data
  desc: Go main.encryptData function
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: main\.(encrypt|decrypt)Data(\.|$)
- id: go-main-encrypt-file
  desc: Go main encryptFile symbol
  crit: suspicious
  conf: 0.98
  if:
    type: text
    exact: main.encryptFile
- id: go-main-generate-key
  desc: Go main generateKey symbol
  crit: suspicious
  conf: 0.9
  if:
    type: text
    exact: main.generateKey
- id: go-main-scan-and-encrypt
  desc: Go scan and encrypt walker
  crit: suspicious
  conf: 0.97
  if:
    type: text
    exact: main.main.scanAndEncrypt.func1
- id: go-main-payment-check
  desc: Go main payment check functions
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: main\.(isPay|getHasPay|checkPay)
- id: go-main-self-remove
  desc: Go main.selfRemove function
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: main\.selfRemove(\.|$)
- id: go-main-show-message
  desc: Go main ransom message function
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: main\.(createAndShowMessage|showRansomNote|displayMessage)(\.|$)
- id: go-main-autorun
  desc: Go main autorun persistence
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: main\.(makeAutoRun|setupAutoStart|installPersistence)(\.|$)
- id: go-main-debugger-check
  desc: Go main debugger detection
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: main\.(debuggerPresent|doSomeThingElseWithDebugger|checkDebugger)(\.|$)
- id: go-main-run-connection
  desc: Go main C2 connection function
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: main\.(runConnection|connectToServer|startBeacon)(\.|$)
- id: go-main-remove-all-files
  desc: Go main remove all files
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: main\.(removeAllFiles|deleteAllFiles|wipeFiles)(\.|$)
- id: go-main-get-key
  desc: Go main getKey function
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: main\.(getKey|getKeyAndIV|retrieveKey)(\.|$)
- id: go-ransomware-source-path
  desc: Go ransomware source path
  crit: suspicious
  conf: 0.99
  if:
    type: text
    regex: /ransomware[_-]?(thesis|poc|test|dev)?/
    case_insensitive: true
- id: go-obfuscated-keygen
  desc: Obfuscated Go key generation
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '[A-Za-z]\w{5,14}\.\(\*[A-Za-z]\w{5,14}\)\.(GenerateKey|NewPrivateKey)'
  not:
  - substr: github.com/ProtonMail/go-crypto/bitcurves.(*BitCurve).GenerateKey
  - substr: crypto/internal/fips140/ecdh.GenerateKey
  - substr: crypto/internal/fips140/ecdsa.GenerateKey
  unless:
  - id: go-obfuscated-keygen-unless-cond-0--rx-helper-3
  - id: well-known/app/terraform-provider::terraform-provider-binary
  - id: well-known/app/terraform-provider::ibm-cloud-terraform-provider
  - id: micro-behaviors/communications/ssh/server::go-ssh-server-implementation
  - id: micro-behaviors/communications/ssh/server::go-ssh-no-client-auth
  - id: micro-behaviors/communications/ssh/server::go-ssh-public-key-callback
  - id: micro-behaviors/communications/ssh/server::go-ssh-verified-public-key-callback
- id: go-obfuscated-keygen-unless-cond-0--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(^|/)(kyber|mlkem)(512|768)\.\(\*scheme\)\.GenerateKey'
  count_max: 1009874
- id: go-obfuscated-keygen-unless-cond-0--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(^|/)(kyber|mlkem)(1024)\.\(\*scheme\)\.GenerateKey'
  count_max: 1009875
composite_rules:
- id: go-ransomware-encrypt
  desc: Go ransomware encryption pattern
  crit: hostile
  conf: 0.98
  all:
  - id: go-encrypt-files-func
  - id: go-encrypt-filename-func
  - id: go-scan-export-paths
  - id: go-rsa-encrypt-oaep
- id: go-drive-ransomware-encrypt
  desc: Go drive walking file encryptor
  crit: hostile
  conf: 0.99
  mbc: B0040
  attack: T1486
  all:
  - id: go-main-encrypt-file
  - id: go-main-scan-and-encrypt
  - id: micro-behaviors/fs/directory/traverse::filepath-walk
  - id: micro-behaviors/crypto/symmetric/aes/library::go-new-cipher-symbol
  - id: micro-behaviors/crypto/symmetric/aes/library::go-cfb-stream-itab
  any:
  - id: go-main-generate-key
  - id: micro-behaviors/os/random/crypto::go-crypto-random-bytes
  - id: micro-behaviors/time/sleep/interval::go-time-sleep
- id: go-ransomware-with-kill
  desc: Go ransomware with process kill
  crit: hostile
  conf: 0.97
  all:
  - id: go-encrypt-files-func
  - id: go-kill-nonroot-func
  - id: go-rsa-encrypt-oaep
  any:
  - id: go-encrypt-filename-func
  - id: go-scan-export-paths
  - id: go-erase-key-func
- id: go-ransomware-key-mgmt
  desc: Go ransomware with key management
  crit: hostile
  conf: 0.95
  all:
  - id: go-encrypt-files-func
  - id: go-erase-key-func
  - id: go-export-key-func
  - id: go-rsa-encrypt-oaep
- id: go-ransomware-obfuscated
  desc: Go obfuscated ransomware
  crit: hostile
  conf: 0.95
  all:
  - id: go-obfuscated-pkg
  - id: go-encrypt-files-func
  - id: go-rsa-encrypt-oaep
  any:
  - id: go-encrypt-filename-func
  - id: go-kill-nonroot-func
  - id: go-scan-export-paths
- id: go-garble-crypto-malware
  desc: Garble-obfuscated Go crypto malware
  crit: hostile
  conf: 0.92
  mbc: B0032
  attack: T1027
  all:
  - id: go-obfuscated-pkg
  - id: go-obfuscated-encrypt-method
  - id: go-obfuscated-keygen
  any:
  - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
  - id: micro-behaviors/crypto/symmetric/stream::go-obfuscated-xor-stream
  - id: micro-behaviors/crypto/symmetric/xor/stream::go-xor-encoding
- id: go-simple-ransomware
  desc: Simple Go ransomware pattern
  crit: hostile
  conf: 0.98
  mbc: B0040
  attack: T1486
  all:
  - id: go-main-encrypt-data
  - id: go-main-payment-check
  - id: objectives/impact/ransom/encrypt/config::ransom-note-text
  any:
  - id: go-main-self-remove
  - id: go-main-show-message
  - id: go-main-autorun
  - id: go-main-get-key
- id: go-ransomware-encrypt-payment
  desc: Go ransomware with payment check
  crit: hostile
  conf: 0.97
  mbc: B0040
  attack: T1486
  all:
  - id: go-main-encrypt-data
  - id: go-main-payment-check
  any:
  - id: go-main-remove-all-files
  - id: go-main-self-remove
  - id: go-main-run-connection
  - id: go-main-debugger-check
- id: go-ransomware-c2
  desc: Go ransomware with C2 connection
  crit: hostile
  conf: 0.96
  mbc: B0040
  attack: T1486
  all:
  - id: go-main-encrypt-data
  - id: go-main-run-connection
  - id: go-main-get-key
  any:
  - id: go-main-payment-check
  - id: go-main-self-remove
  - id: go-main-show-message
  - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
- id: go-ransomware-antiforensics
  desc: Go ransomware with cleanup
  crit: hostile
  conf: 0.97
  mbc: B0040
  attack: T1486
  all:
  - id: go-main-encrypt-data
  - id: go-main-self-remove
  - id: go-main-remove-all-files
  any:
  - id: go-main-payment-check
  - id: go-main-run-connection
  - id: objectives/impact/ransom/encrypt/config::ransom-note-text
- id: go-obfuscated-keygen-unless-cond-0--rx-helper-3
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: go-obfuscated-keygen-unless-cond-0--rx-1
  - id: go-obfuscated-keygen-unless-cond-0--rx-2
