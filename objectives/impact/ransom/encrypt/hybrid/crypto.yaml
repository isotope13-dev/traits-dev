defaults:
  platforms: [linux, macos, windows]
  for: [binaries, source]
  attack: T1486
  mbc: B0040

traits:
- id: encrypted-trailer-layout--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(?i)(trailer|footer).{0,80}(ciphertext|shared[_ -]?secret)'

  count_max: 1009310
- id: encrypted-trailer-layout--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(ciphertext|shared[_ -]?secret).{0,80}(trailer|footer)'

  count_max: 1009311
- id: rust-ransomware-module-set--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    substr: services
  count_max: 1009312
- id: rust-ransomware-module-set--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    substr: encrypt
  count_max: 1009313
- id: rust-ransomware-module-set--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    substr: crypto
  count_max: 1009314
- id: rust-ransomware-module-set--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    substr: csprng
  count_max: 1009315
- id: rust-ransomware-module-set--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    substr: walker
  count_max: 1009316
- id: rust-ransomware-module-set--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    substr: icons
  count_max: 1009317
- id: encrypted-file-class-registration
  desc: Encrypted file type registration
  crit: suspicious
  conf: 0.92
  platforms: [windows]
  if:
    type: text
    regex: '(?i)(HKEY_CLASSES_ROOT|HKCR).{0,160}(DefaultIcon|shell\\\\open\\\\command|\.ico)'
  not:
  - regex: (?i)PhotoViewer\.FileAssoc

- id: ransom-note-read-me-now
  desc: READ_ME_NOW ransom note
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '(?i)\bread[_ -]?me[_ -]?now\.(txt|hta|html?)\b'

- id: encrypted-trailer-layout-cond-0--inline-9319
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: RSA_PSS_PARAMS
  count_max: 1009320
- id: encrypted-trailer-layout-cond-1--inline-9320
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: crypto/rsa/
  count_max: 1009321
- id: encrypted-trailer-layout-cond-2--inline-9321
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: RSAPrivateKey
  count_max: 1009322
- id: encrypted-trailer-layout-cond-3--inline-9322
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: 'request header "TE" may only be'
  count_max: 1009323
- id: encrypted-trailer-layout-cond-4--inline-9323
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: 'http: unexpected EOF reading trailer'
  count_max: 1009324
- id: encrypted-trailer-layout-cond-5--inline-9324
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: 'http: no Location header in response'
  count_max: 1009325
composite_rules:
- id: public-key-trailer-encryptor
  desc: Public-key trailer file encryptor
  crit: hostile
  conf: 0.98
  all:
  - id: encrypted-trailer-layout
  - id: micro-behaviors/crypto/asymmetric/rsa::pem-public-key-embedded
  any:
  - id: micro-behaviors/crypto/symmetric/stream::rc4-strings
  - id: micro-behaviors/data/encode/base64::go-base64-decode
- id: pqc-hybrid-ransomware
  desc: PQC hybrid ransomware encryptor
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/crypto/asymmetric/kem::pqc-hybrid-crypto-stack
  any:
  - id: rust-ransomware-module-set
  - id: encrypted-file-class-registration
  - id: ransom-note-read-me-now
  - id: objectives/impact/ransom/encrypt::ransom-extension
  - id: objectives/impact/ransom/tactics::shadow-delete
  needs: 2
- id: encrypted-trailer-layout
  desc: Encrypted file trailer metadata
  crit: suspicious
  conf: 0.92
  any:
  - id: encrypted-trailer-layout--rx-1
  - id: encrypted-trailer-layout--rx-2
  unless:
  - id: encrypted-trailer-layout-cond-0--inline-9319
  - id: encrypted-trailer-layout-cond-1--inline-9320
  - id: encrypted-trailer-layout-cond-2--inline-9321
  - id: encrypted-trailer-layout-cond-3--inline-9322
  - id: encrypted-trailer-layout-cond-4--inline-9323
  - id: encrypted-trailer-layout-cond-5--inline-9324
- id: rust-ransomware-module-set
  desc: Rust crypto/service module names
  crit: component
  conf: 0.94
  any:
  - id: rust-ransomware-module-set--rx-3
  - id: rust-ransomware-module-set--rx-4
  - id: rust-ransomware-module-set--rx-5
  - id: rust-ransomware-module-set--rx-6
  - id: rust-ransomware-module-set--rx-7
  - id: rust-ransomware-module-set--rx-8
