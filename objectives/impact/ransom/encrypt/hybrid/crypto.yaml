defaults:
  platforms: [linux, macos, windows]
  for: [binaries, source]
  attack: T1486
  mbc: B0040

traits:
  - id: hybrid-key-material-labels
    desc: Hybrid key material labels
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '(?i)\b(encryption-key|encryption-iv|file-key|file-iv)\b'

  - id: encrypted-trailer-layout
    desc: Encrypted file trailer metadata
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)(trailer|footer).{0,80}(ciphertext|shared[_ -]?secret|public[_ -]?key)|(?:ciphertext|shared[_ -]?secret|public[_ -]?key).{0,80}(trailer|footer)'

  - id: rust-ransomware-module-set
    desc: Rust crypto/service module names
    crit: component
    conf: 0.94
    count_min: 3
    if:
      type: text
      regex: '(^|[/\\])(encrypt|crypto|walker|csprng|icons|services)\.rs$|(?i)(?:[^n]ode|[^o]de|[^d]e|[^e]|^)::(encrypt|crypto|walker|csprng|icons|services)::'

  - id: encrypted-file-class-registration
    desc: Encrypted file type registration
    crit: notable
    conf: 0.92
    platforms: [windows]
    if:
      type: text
      regex: '(?i)(HKEY_CLASSES_ROOT|HKCR).{0,160}(DefaultIcon|shell\\\\open\\\\command|\.ico)'
    not:
      - regex: (?i)PhotoViewer\.FileAssoc

  - id: ransom-note-read-me-now
    desc: READ_ME_NOW ransom note
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bread[_ -]?me[_ -]?now\.(txt|hta|html?)\b'

composite_rules:
  - id: pqc-hybrid-ransomware
    desc: PQC hybrid ransomware encryptor
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/crypto/asymmetric/kem::pqc-hybrid-crypto-stack
    any:
      - id: rust-ransomware-module-set
      - id: encrypted-file-class-registration
      - id: ransom-note-read-me-now
      - id: objectives/impact/ransom/encrypt::ransom-extension
      - id: objectives/impact/ransom/tactics::shadow-delete
    needs: 2
