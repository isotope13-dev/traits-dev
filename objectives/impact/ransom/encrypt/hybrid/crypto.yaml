defaults:
  platforms: [linux, macos, windows]
  for: [binaries, c, cpp, rust, go]
  attack: T1486
  mbc: B0040

traits:
- id: encrypted-trailer-layout--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(?i)(trailer|footer).{0,80}(ciphertext|shared[_ -]?secret)'

  count_max: 1009310
- id: encrypted-trailer-layout--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(ciphertext|shared[_ -]?secret).{0,80}(trailer|footer)'

  count_max: 1009311

- id: ransom-note-read-me-now
  desc: READ_ME_NOW ransom note
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '(?i)\bread[_ -]?me[_ -]?now\.(txt|hta|html?)\b'

# Rust hybrid AES-GCM + RSA-PKCS1v15 file encryptor stack — both
# crate paths in the same binary. Each crate alone is innocent (lots
# of legitimate Rust software uses one or the other); the *pair* in a
# single binary is the textbook hybrid file-encryptor: random AES
# session key per file + asymmetric encryption of that key under the
# operator's RSA public key.
- id: rust-aes-gcm-crate-path
  desc: Rust aes-gcm crate path
  crit: notable
  conf: 0.85
  for: [pe, elf, macho]
  if:
    type: text
    regex: 'aes-gcm-\d+\.\d+\.\d+'

- id: rust-rsa-crate-path
  desc: Rust rsa crate path
  crit: notable
  conf: 0.85
  for: [pe, elf, macho]
  if:
    type: text
    regex: 'rsa-\d+\.\d+\.\d+\\src\\algorithms\\'

- id: rust-pkcs1v15-encrypt-error
  desc: Rust PKCS1v15 RSA encrypt error message
  # `RSA Pkcs1v15Encrypt failed` / `RSA PKCS1v15 segment encryption
  # failed` are operator-facing error strings unique to a hybrid
  # ransomware that encrypts AES session keys via RSA-PKCS1v15.
  # Legitimate Rust crypto code surfaces these at the trait/Result
  # level, not as English-language print strings.
  crit: suspicious
  conf: 0.9
  for: [pe, elf, macho]
  if:
    type: text
    regex: 'RSA[ _]?(Pkcs1v15Encrypt|PKCS1v15 segment encryption) failed'

- id: encrypted-trailer-layout-cond-0--inline-9319
  desc: Regex component marker
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: RSA_PSS_PARAMS
  count_max: 1009320
- id: encrypted-trailer-layout-cond-1--inline-9320
  desc: Regex component marker
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: crypto/rsa/
  count_max: 1009321
- id: encrypted-trailer-layout-cond-2--inline-9321
  desc: Regex component marker
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: RSAPrivateKey
  count_max: 1009322
- id: encrypted-trailer-layout-cond-3--inline-9322
  desc: Regex component marker
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: 'request header "TE" may only be'
  count_max: 1009323
- id: encrypted-trailer-layout-cond-4--inline-9323
  desc: Regex component marker
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: 'http: unexpected EOF reading trailer'
  count_max: 1009324
- id: encrypted-trailer-layout-cond-5--inline-9324
  desc: Regex component marker
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: 'http: no Location header in response'
  count_max: 1009325
composite_rules:
- id: public-key-trailer-encryptor
  desc: Public-key trailer file encryptor
  crit: hostile
  conf: 0.98
  all:
  - id: encrypted-trailer-layout
  - id: micro-behaviors/crypto/asymmetric/rsa::pem-public-key-embedded
  any:
  - id: micro-behaviors/crypto/symmetric/stream::rc4-strings
  - id: micro-behaviors/data/encode/base64::go-base64-decode
- id: pqc-hybrid-ransomware
  desc: PQC hybrid ransomware encryptor
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/crypto/asymmetric/kem::pqc-hybrid-crypto-stack
  any:
  - id: rust-ransomware-module-set
  - id: micro-behaviors/os/registry/manipulate::file-class-shell-registration
  - id: ransom-note-read-me-now
  - id: objectives/impact/ransom/encrypt/config::ransom-extension
  - id: objectives/impact/ransom/tactics::shadow-delete
  needs: 2
  unless:
  - id: well-known/tool/dual-use/rclone::rclone-tool
  - id: well-known/lib/benign-runtime-bundles/
  - id: well-known/tool/sysadmin/container/
  - id: well-known/tool/development/go-toolchain::go-toolchain-distribution
- id: encrypted-trailer-layout
  desc: Encrypted file trailer metadata
  crit: suspicious
  conf: 0.92
  any:
  - id: encrypted-trailer-layout--rx-1
  - id: encrypted-trailer-layout--rx-2
  unless:
  - id: encrypted-trailer-layout-cond-0--inline-9319
  - id: encrypted-trailer-layout-cond-1--inline-9320
  - id: encrypted-trailer-layout-cond-2--inline-9321
  - id: encrypted-trailer-layout-cond-3--inline-9322
  - id: encrypted-trailer-layout-cond-4--inline-9323
  - id: encrypted-trailer-layout-cond-5--inline-9324
- id: rust-ransomware-module-set
  desc: Rust crypto/service module names
  crit: component
  conf: 0.94
  any:
  - id: objectives/impact/crypto-manipulation/keywords::rust-bin-crypto-vocab
  - id: objectives/impact/crypto-manipulation/keywords::rust-bin-fs-vocab
  - id: objectives/impact/crypto-manipulation/keywords::crypto-substr

- id: rust-aes-gcm-rsa-hybrid-stack
  desc: Rust hybrid AES-GCM + RSA file-encryptor stack
  # Both Rust crypto crates linked into the same binary is the
  # textbook hybrid-ransomware shape: random AES key per file +
  # RSA encryption of that key under the operator's public key.
  # Either crate alone is a normal Rust crypto dependency.
  crit: hostile
  conf: 0.96
  for: [pe, elf, macho]
  all:
  - id: rust-aes-gcm-crate-path
  - id: rust-rsa-crate-path
  unless:
  - id: well-known/app/bitwarden::bitwarden-app
  - id: well-known/app/keepassxc/
