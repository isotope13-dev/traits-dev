defaults:
  platforms: [macos]
  for: [macho]
  attack: T1486
traits:
  - id: seven-day-ransom-note
    desc: Seven day ransom deadline
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: 7 DAYS.
  # atoi-key-parse and strtol-key-parse moved to
  # micro-behaviors/data/string/conversion::atoi and ::strtol
composite_rules:
  - id: time-derived-keying
    desc: Time-derived keying and formatting
    crit: component
    conf: 0.88
    all:
      - id: micro-behaviors/time/query::time
      - id: micro-behaviors/time/query::localtime
      - id: micro-behaviors/time/query::strftime
      - id: micro-behaviors/os/random/crypto::seeded-random
    any:
      - id: micro-behaviors/os/random/crypto::arc4random
      - id: micro-behaviors/data/string/conversion::atoi
      - id: micro-behaviors/data/string/conversion::strtol
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/binary/framework/
      - id: metadata/binary/framework::electron-framework-binary
  # file-overwrite-routine moved to micro-behaviors/fs/file/read-write::file-overwrite-routine
  - id: user-targeted-file-ops
    desc: User-targeted destructive file operations
    # getpwuid+getuid+overwrite+remove is common in runtimes (Node, language
    # servers). Ransomware composites add shell/ransom-note intent below.
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/process/user/query::getpwuid
      - id: micro-behaviors/os/privilege/query::getuid
      - id: micro-behaviors/fs/file/read-write::file-overwrite-routine
    any:
      - id: micro-behaviors/fs/file/delete::remove
    unless:
      - id: well-known/lib/sogen/
      - id: well-known/tool/reverse-engineering/frida/
      - id: objectives/evasion/anti-av/platform/quarantine::electron-runtime-js2c-marker
      - id: metadata/binary/framework/
      - id: well-known/lib/chromium-angle::vk-swiftshader-dylib-basename
      - id: well-known/lib/electron::electron-node-basename
      - id: well-known/app/vscode-lua-debug::extension-member
  - id: macos-ransomware-core
    desc: macOS ransomware file encryptor
    crit: hostile
    conf: 0.98
    all:
      - id: user-targeted-file-ops
      - id: micro-behaviors/process/create/shell/spawn::system-fn
    any:
      - id: seven-day-ransom-note
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/framework/
  - id: macos-obfuscated-ransomware
    desc: macOS obfuscated ransomware orchestration
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/shell/spawn::system-fn
      - id: micro-behaviors/dylib/load/runtime::dlopen-dlsym
      - id: user-targeted-file-ops
    any:
      - id: seven-day-ransom-note
    unless:
      - id: metadata/signed/platform::apple
  - id: macos-ransomware-threaded
    desc: Threaded macOS ransomware worker
    crit: suspicious
    conf: 0.92
    all:
      - id: user-targeted-file-ops
      - id: micro-behaviors/process/threading/concurrency::pthread
    any:
      - id: seven-day-ransom-note
    unless:
      - id: metadata/binary/framework::electron-framework-binary
      - id: metadata/binary/framework/
