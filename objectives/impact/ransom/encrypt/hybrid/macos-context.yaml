defaults:
  platforms: [macos]
  for: [macho]

traits:
  - id: swiftshader-lib-binary
    desc: SwiftShader library basename
    crit: component
    conf: 1.0
    if:
      type: path
      basename: true
      exact: libvk_swiftshader.dylib
  - id: node-runtime-binary
    desc: Node runtime basename
    crit: component
    conf: 1.0
    if:
      type: path
      basename: true
      exact: node
