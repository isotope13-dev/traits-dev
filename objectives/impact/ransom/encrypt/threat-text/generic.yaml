defaults:
  platforms: [windows, unix]
  for: [pe, elf, python, javascript, powershell]
traits:
  - id: ransom-word
    desc: ransom word
    crit: component
    if:
      type: text
      word: ransom
      case_insensitive: true
  - id: files-encrypted-msg
    desc: your files have been encrypted message
    crit: component
    if:
      type: text
      substr: your files have been encrypted
      case_insensitive: true
  - id: pay-to-decrypt-msg
    desc: pay to decrypt message
    crit: component
    if:
      type: text
      substr: pay to decrypt
      case_insensitive: true
  - id: files-deleted-msg
    desc: files will be deleted message
    crit: component
    if:
      type: text
      substr: files will be deleted
      case_insensitive: true
  - id: torproject-domain
    desc: torproject.org domain
    crit: component
    if:
      type: text
      substr: torproject.org
  - id: onion-address
    desc: .onion address pattern
    crit: component
    if:
      type: text
      regex: '[a-z2-7]{16,56}\.onion\b'
  - id: bitcoin-word
    desc: Bitcoin ransom-payment vocabulary term
    crit: component
    if:
      type: text
      word: bitcoin
      case_insensitive: true
    unless:
      - type: text
        substr: stng::xor::classify
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: ext-crypto
    desc: .crypto extension
    crit: component
    if:
      type: string_literal
      regex: '[A-Za-z0-9_-]{2,}\.crypto\b'
  - id: emerging-threats-doc-domain
    desc: Emerging Threats documentation
    crit: component
    if:
      type: text
      substr: doc.emergingthreats.net
      case_insensitive: true
  - id: encrypt-decryptor-msg-1
    desc: References decryptor (your/run/download)
    crit: suspicious
    conf: 0.7
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    if:
      type: text
      regex: \b(your|run|download)\s+decryptor
      case_insensitive: true
  - id: encrypt-decryptor-msg-2
    desc: References decryptor (get/free)
    crit: suspicious
    conf: 0.7
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    if:
      type: text
      regex: \b(get|free)\s+decryptor
      case_insensitive: true
  - id: encrypt-decryptor-file
    desc: References decryptor file (exe/bin/bat)
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: decryptor\.(exe|bin|bat)
      case_insensitive: true
# The Go crypto/{rsa,aes,cipher} import markers moved to
# micro-behaviors/crypto/library/stdlib — they detect only a package import
# (neutral capability, often pulled in transitively via net/http TLS), so they
# belong in micro-behaviors, not under a ransom objective. The go-file-encrypt
# composite below references that directory cross-directory (crypto + file-write
# + ransom-note is the actual intent).
composite_rules:
  - id: explicit-ransom-msgs
    desc: Explicit ransom messages
    crit: component
    any:
      - id: files-encrypted-msg
      - id: pay-to-decrypt-msg
  - id: payment-indicators
    desc: Payment or Tor indicators
    crit: component
    any:
      - id: torproject-domain
      - id: onion-address
      - id: bitcoin-word
  - id: ransom-extensions
    desc: Ransom file extensions
    crit: component
    any:
      - id: metadata/file/extension/encrypted::ext-locked
      - id: metadata/file/extension/encrypted::ext-encrypted
      - id: ext-crypto
  - id: threat-intel-documentation-indicators
    desc: Threat-intel documentation indicators
    crit: component
    any:
      - id: emerging-threats-doc-domain
      - id: well-known/tool/detection/threat-intel::security-solution-str
  - id: deleted-with-payment
    desc: Files deleted threat with payment
    crit: component
    all:
      - id: files-deleted-msg
      - id: payment-indicators
  - id: deleted-with-ransom
    desc: Files deleted threat with ransom word
    crit: component
    all:
      - id: files-deleted-msg
      - id: ransom-word
  - id: ransom-with-payment
    desc: Ransom word with payment indicators
    crit: component
    all:
      - id: ransom-word
      - id: payment-indicators
  - id: ransom-with-extensions
    desc: Ransom word with ransom extensions
    crit: component
    all:
      - id: ransom-word
      - id: ransom-extensions
  - id: tor-with-bitcoin
    desc: Tor with bitcoin
    crit: component
    all:
      - id: torproject-domain
      - id: bitcoin-word
  - id: ext-with-bitcoin
    desc: Ransom extension with bitcoin
    crit: component
    all:
      - id: ransom-extensions
      - id: bitcoin-word
  - id: onion-with-btc
    desc: Onion with bitcoin indicators
    crit: component
    all:
      - id: onion-address
    any:
      - id: bitcoin-word
  - id: encrypt-comp
    desc: Ransomware encryption patterns
    crit: suspicious
    conf: 0.75
    mbc: B0040
    attack: T1486
    size_max: 26214400
    any:
      - id: explicit-ransom-msgs
      - id: deleted-with-payment
      - id: deleted-with-ransom
      - id: ransom-with-payment
      - id: ransom-with-extensions
      - id: tor-with-bitcoin
      - id: ext-with-bitcoin
      - id: onion-with-btc
    unless:
      - id: objectives/impact/ransom/encrypt/threat-text/
  - id: encrypt-decryptor
    desc: References decryptor
    crit: suspicious
    conf: 0.66
    any:
      - id: encrypt-decryptor-msg-1
      - id: encrypt-decryptor-msg-2
      - id: encrypt-decryptor-file
  - id: web-api-cryptor-workflow
    desc: Web API driven file cryptor workflow
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/impact/ransom/tactics::crypt-api-with-upload-staging
      - id: micro-behaviors/fs/file/handle::set-file-information-by-handle
    any:
      - id: micro-behaviors/fs/enumerate/directory::find-first-file-ex
      - id: micro-behaviors/fs/enumerate/directory::find-next-file
  - id: go-writefile-any
    desc: Go file write functions
    crit: component
    any:
      - id: micro-behaviors/fs/file/write/direct::ioutil-write-file
      - id: micro-behaviors/fs/file/write/direct::os-write-file
  - id: go-write-or-ext
    desc: Go file write or ransom extension
    crit: component
    any:
      - id: go-writefile-any
      - id: metadata/file/extension/encrypted::encrypted-extensions
  - id: go-file-encrypt
    desc: Go file encryption patterns (ransomware)
    crit: suspicious
    conf: 0.8
    mbc: B0040
    attack: T1486
    all:
      # Any Go stdlib crypto import (directory reference — the capability lives
      # in micro-behaviors; ransom intent is this composite's crypto+write+note).
      - id: micro-behaviors/crypto/library/stdlib
      - id: go-writefile-any
    any:
      - id: encrypt-comp
      - id: objectives/impact/ransom/tactics::ransom-note
  - id: encrypt-note
    desc: Ransom note patterns
    crit: suspicious
    conf: 0.66
    any:
      - id: objectives/impact/ransom/tactics::ransom-note
      - id: files-encrypted-msg
      - id: pay-to-decrypt-msg
      - id: files-deleted-msg
    unless:
      - id: well-known/tool/sysadmin/container::podman-distribution
