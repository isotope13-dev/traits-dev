defaults:
  platforms: [windows]
  for: [java, class, java_class, jar]
  attack: T1486

traits:
  - id: java-locked-file-extension
    desc: Java locked file extension
    crit: component
    conf: 0.94
    if:
      type: text
      substr: .locked

  - id: java-readme-decrypt-note
    desc: Java README decrypt note
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: README_DECRYPT.txt

  - id: java-xor-file-rewrite
    desc: Java XOR file rewrite
    crit: suspicious
    conf: 0.94
    for: [java]
    if:
      type: text
      regex: 'readAllBytes[\s\S]{0,320}\^[\s\S]{0,220}Files\.write[\s\S]{0,220}\.delete\('

  - id: jvm-encrypt-method-bytecode
    desc: JVM encrypt files method
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: text
      substr: encryptTargetFiles

  - id: java-javalocker-extension
    desc: Java appends javalocker extension
    crit: suspicious
    conf: 0.96
    for: [java]
    if:
      type: text
      substr: .javalocker

  - id: java-ransom-note-javaencrypt
    desc: Java writes javaencrypt ransom note
    crit: suspicious
    conf: 0.96
    for: [java]
    if:
      type: text
      substr: readmeonnotepad.javaencrypt

  - id: java-bitcoin-ransom-demand-text
    desc: Java ransom note demands bitcoin
    crit: suspicious
    conf: 0.95
    for: [java]
    if:
      type: text
      regex: '(?i)(personal files are encrypted|files are encrypted)[\s\S]{0,240}(bitcoin|bitcoins|btc)'

  - id: java-ransom-target-extension-list
    desc: Java targets valuable extension list
    crit: suspicious
    conf: 0.93
    for: [java]
    if:
      type: text
      regex: '\.docx[\s\S]{0,500}\.xlsx[\s\S]{0,500}\.vmdk[\s\S]{0,500}\.sql[\s\S]{0,500}\.pfx'

  - id: java-key-main-call
    desc: Java key main call
    crit: component
    conf: 0.89
    for: [java]
    if:
      type: text
      substr: key.main

  - id: java-delete-call
    desc: Java delete call
    crit: component
    conf: 0.78
    for: [java]
    if:
      type: text
      regex: '\.delete\s*\('

  - id: java-ret-call
    desc: Java ret call
    crit: component
    conf: 0.74
    for: [java]
    if:
      type: symbol
      kind: call
      exact: ret

  - id: java-foldermethod1-call
    desc: Java folderMethod1 call
    crit: component
    conf: 0.86
    for: [java]
    if:
      type: symbol
      kind: call
      exact: folderMethod1

  - id: java-c-drive-root-string
    desc: Java C drive root string
    crit: component
    conf: 0.82
    for: [java]
    if:
      type: text
      substr: 'C:\\'

  - id: java-h-drive-root-string
    desc: Java H drive root string
    crit: component
    conf: 0.82
    for: [java]
    if:
      type: text
      substr: 'H:\\'

  - id: jvm-ransomware-entrypoint
    desc: JVM file-operation entrypoint method
    crit: notable
    conf: 0.98
    for: [class, java_class, jar]
    if:
      type: import
      exact: startRansomware

composite_rules:
  - id: java-encrypt-sibling-delete-original
    desc: Java encrypts sibling and deletes original
    crit: suspicious
    conf: 0.96
    for: [java]
    all:
      - id: java-key-main-call
      - id: java-javalocker-extension
      - id: java-delete-call

  - id: java-multidrive-ransom-traversal
    desc: Java traverses multiple drive roots
    crit: suspicious
    conf: 0.94
    for: [java]
    all:
      - id: java-ret-call
      - id: java-foldermethod1-call
      - id: java-c-drive-root-string
      - id: java-h-drive-root-string

  - id: java-xor-file-ransom
    desc: Java XOR file ransom
    crit: hostile
    conf: 0.98
    for: [java]
    all:
      - id: java-locked-file-extension
      - id: java-readme-decrypt-note
      - id: java-xor-file-rewrite

  - id: jvm-bytecode-file-ransom
    desc: JVM bytecode file ransom
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: java-locked-file-extension
      - id: java-readme-decrypt-note
      - id: jvm-encrypt-method-bytecode

  - id: java-javalocker-source-ransom
    desc: Java javalocker source ransom
    crit: hostile
    conf: 0.98
    for: [java]
    all:
      - id: java-javalocker-extension
      - id: java-encrypt-sibling-delete-original
      - id: java-ransom-note-javaencrypt
      - id: java-bitcoin-ransom-demand-text

  - id: java-targeted-drive-ransom-source
    desc: Java targeted drive ransom source
    crit: hostile
    conf: 0.97
    for: [java]
    all:
      - id: java-ransom-target-extension-list
      - id: java-multidrive-ransom-traversal
      - id: java-ransom-note-javaencrypt

  - id: jvm-aes-ransomware-operation
    desc: JVM ransomware file encryption operation
    crit: hostile
    conf: 0.995
    for: [class, java_class, jar]
    all:
      - id: jvm-ransomware-entrypoint
      - id: micro-behaviors/fs/file/read::jvm-readallbytes-bytecode
      - id: micro-behaviors/fs/write/file/direct::jvm-files-write-bytecode
      - id: micro-behaviors/fs/delete/file::java-file-delete-bytecode
