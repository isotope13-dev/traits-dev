defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1486
  mbc: B0040
traits:
  - id: wsh-slice-7zip-mhe-switch
    desc: Slice-obfuscated 7-Zip header encryption
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "'427-mhe'.slice(3)"
  - id: wsh-slice-7zip-mx-switch
    desc: Slice-obfuscated 7-Zip compression switch
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "'139mx'.slice(3)"
  - id: wsh-slice-crypted-extension
    desc: Slice-obfuscated crypted extension
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: "'[0-9]+crypt'\\.slice\\([0-9]+\\)"
  - id: wsh-slice-recursive-file-loop
    desc: Slice-obfuscated recursive file loop
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "'821812 /r '.slice(6)"
  - id: wsh-slice-ransom-note-name
    desc: Slice-obfuscated DECRYPT note name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "'2254542s+\"DE'.slice(7)"
  - id: wsh-slice-btc-label
    desc: Slice-obfuscated BTC label
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "'509\" BTC'.slice(3)"
composite_rules:
  - id: wsh-7zip-switches
    desc: Slice-obfuscated 7-Zip encryption switches
    crit: component
    conf: 0.9
    all:
      - id: wsh-slice-7zip-mhe-switch
      - id: wsh-slice-7zip-mx-switch
  - id: wsh-ransomware-artifacts
    desc: Slice-obfuscated ransomware artifacts
    crit: component
    conf: 0.9
    all:
      - id: wsh-slice-crypted-extension
      - id: wsh-slice-ransom-note-name
      - id: wsh-slice-btc-label
  - id: wsh-7zip-password-ransomware
    desc: WSH 7-Zip password ransomware
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::numeric-suffix-identifiers
      - id: micro-behaviors/data/encode/skip-step::js-concat-chain
      - id: wsh-7zip-switches
      - id: wsh-ransomware-artifacts
      - id: wsh-slice-recursive-file-loop
