# Rust ransomware operator-debug error-cluster.
#
# Rust file-encryptor ransomware (Sorry, Akira-Rust, RustySpring, etc.)
# typically links against `aes-gcm` + `rsa` + `pkcs8` and surfaces a
# small, distinctive set of operator-debug error strings:
#   ERROR encrypting <path>
#   ERROR secure-delete <path>
#   ERROR rollback failed <path>
#   ERROR stat <path>
#   RSA Pkcs1v15Encrypt failed
#   RSA PKCS1v15 segment encryption failed
#   failed to export private key PEM
# Any one of these in isolation is a notable signal; three or more
# together in a single binary is conclusive Rust-ransomware shape.
defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  attack: T1486
  mbc: B0040

traits:
  - id: error-encrypting
    desc: Rust encrypting error log
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: 'ERROR encrypting'

  - id: error-rollback-failed
    desc: Rust rollback error log
    # File-encryption rollback handling — the encryptor tries to
    # rename original→encrypted+overwrite-delete-original, and
    # falls back to a cleanup path if that fails. The "rollback"
    # vocabulary is characteristic of ransomware that handles the
    # mid-encryption-failure case explicitly.
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: 'ERROR rollback failed'

  - id: error-stat-rust
    desc: Failed stat path error log
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\bERROR\s+stat\s+\S+'

  - id: rsa-pkcs1v15-segment-encrypt-failed
    desc: RSA segment encryption error
    # Multi-segment RSA encryption — the AES session key is
    # encrypted in chunks under RSA. The error string surfaces a
    # specific operator-debug error path in a hybrid encryptor.
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'RSA PKCS1v15 segment encryption failed'

  - id: rsa-pkcs1v15-encrypt-failed
    desc: RSA Pkcs1v15Encrypt error
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'RSA Pkcs1v15Encrypt failed'

  - id: rsa-pem-export-failed
    desc: RSA PEM export error
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: 'failed to export private key PEM'

composite_rules:
  - id: rust-ransomware-error-cluster
    desc: Rust ransomware operator-debug error cluster
    # Three or more Rust ransomware-style ERROR strings together
    # is conclusive — the cluster only appears in encryptors that
    # need to debug encryption / rollback / secure-delete failures.
    crit: hostile
    conf: 0.97
    needs: 3
    any:
      - id: error-encrypting
      - id: error-rollback-failed
      - id: error-stat-rust
      - id: rsa-pkcs1v15-segment-encrypt-failed
      - id: rsa-pkcs1v15-encrypt-failed
      - id: rsa-pem-export-failed
      - id: objectives/impact/destroy/file-deletion::secure-delete-error-rust
