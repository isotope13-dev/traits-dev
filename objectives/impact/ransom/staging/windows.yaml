defaults:
  platforms: [windows]
  for: [batch, powershell]
  attack: T1486
traits:
  - id: ransomware-net-mode
    desc: Ransomware net mode switch
    crit: suspicious
    if:
      type: text
      regex: (?i)\s-m\s+net\b
  - id: admin-share-target
    desc: Windows admin share target
    crit: notable
    if:
      type: text
      regex: (?i)\\\\(\d{1,3}(\.\d{1,3}){3}|[A-Za-z0-9_.-]{1,64})\\c\$
  - id: start-many-launch
    desc: Start launcher per host
    crit: component
    for: [batch]
    if:
      type: text
      regex: (?im)(^|[;&|])\s{0,20}start\s+("[^"\r\n]{0,80}"\s+)?\S{1,200}
  - id: ransom-portal-key
    desc: Ransomware portal key flag
    crit: component
    if:
      type: text
      regex: (?i)\s-k\s+[A-Za-z0-9_-]{6,}
  - id: staggered-host-launch
    desc: Host staging delay flag
    crit: component
    if:
      type: text
      regex: (?i)\s-s\s+\d+\b
composite_rules:
  - id: remote-admin-share-ransomware-stage
    desc: Remote admin share ransomware staging
    crit: hostile
    conf: 0.95
    all:
      - id: admin-share-target
      - id: ransomware-net-mode
    any:
      - id: start-many-launch
      - id: ransom-portal-key
      - id: staggered-host-launch
    needs: 2
