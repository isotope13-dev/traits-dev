defaults:
  platforms:
    - windows
  for: [c, cpp]
  attack: T1490
traits:
  - id: wmi-shadow-query
    desc: WMI shadow copy query in source
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: Win32_ShadowCopy
  - id: wmi-delete-instance
    desc: WMI DeleteInstance call in source
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: DeleteInstance
  - id: wbem-locator-source
    desc: IWbemLocator COM interface in source
    crit: component
    conf: 0.8
    if:
      type: raw
      substr: IWbemLocator
  - id: wbem-services-source
    desc: IWbemServices COM interface in source
    crit: component
    conf: 0.8
    if:
      type: raw
      substr: IWbemServices
composite_rules:
  - id: wmi-shadow-delete-source
    desc: WMI-based shadow copy deletion in source
    crit: suspicious
    conf: 0.95
    all:
      - id: wmi-shadow-query
      - id: wmi-delete-instance
    any:
      - id: wbem-locator-source
      - id: wbem-services-source
