defaults:
  platforms:
    - windows
  for: [c, cpp, binaries]
traits:
  - id: rm-start-session
    desc: Restart Manager RmStartSession API
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: RmStartSession
  - id: rm-register-resources
    desc: Restart Manager RmRegisterResources API
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: RmRegisterResources
  - id: rm-shutdown
    desc: Restart Manager RmShutdown API
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: RmShutdown
  - id: rstrtmgr-dll
    desc: Restart Manager DLL reference
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: Rstrtmgr.dll
      case_insensitive: true
composite_rules:
  - id: restart-manager-file-unlock
    desc: Restart Manager used to force-close file locks
    crit: suspicious
    conf: 0.92
    attack: T1486
    all:
      - id: rm-shutdown
    any:
      - id: rm-start-session
      - id: rm-register-resources
      - id: rstrtmgr-dll
