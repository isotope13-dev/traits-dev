# Non-English "ransomware" terms — the multilingual companions to the English
# ransomware keyword lexicon in this directory. Naming the ransomware category
# in comments/output is a strong triage signal (rare outside the malware and its
# notes). Farsi uses regex for the optional ZWNJ (U+200C) joiner.
defaults:
  platforms: [unix, windows, android]
  for: [scripts, source, binaries, documents]
  crit: notable
  conf: 0.8
  attack: T1486
traits:
  - id: fa-ransomware-term
    desc: Farsi ransomware term (باج‌افزار)
    conf: 0.85
    if:
      type: text
      regex: 'باج\x{200c}?افزار'
  - id: ko-ransomware-term
    desc: Korean ransomware term (랜섬웨어)
    if:
      type: text
      substr: 랜섬웨어
