# ICMP-based DDoS Detection
# MBC: B0042 (Denial of Service)
# ATT&CK: T1499
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: icmp-flood-dup
    desc: ICMP flood attack
    crit: suspicious
    conf: 0.9
    mbc: "B0042"
    attack: "T1499"
    if:
      type: string
      substr: "ICMPFLOOD"
  - id: blacknurse
    desc: BlackNurse ICMP attack
    crit: suspicious
    conf: 0.95
    mbc: "B0042"
    attack: "T1499"
    if:
      type: string
      substr: "BLACKNURSE"
