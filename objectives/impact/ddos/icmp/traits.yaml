# ICMP-based DDoS Detection
# MBC: B0042 (Denial of Service)
# ATT&CK: T1499
traits:
  - id: icmp-flood-dup
    desc: ICMP flood attack
    crit: suspicious
    conf: 0.9
    mbc: "B0042"
    attack: "T1499"
    for: [text, shell, batch, ruby, python, javascript, php, powershell, vbs, applescript, perl, elf, macho, pe]
    if:
      type: string
      substr: "ICMPFLOOD"
  - id: blacknurse
    desc: BlackNurse ICMP attack
    crit: suspicious
    conf: 0.95
    mbc: "B0042"
    attack: "T1499"
    for: [text, shell, batch, python, ruby, javascript, perl, php, powershell, vbs, applescript, elf, macho, pe]
    if:
      type: string
      substr: "BLACKNURSE"
