# UDP-based DDoS Detection
# MBC: B0042 (Denial of Service)
# ATT&CK: T1499
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: udp-flood-dup
    desc: UDP flood attack function
    crit: suspicious
    conf: 0.9
    mbc: "B0042"
    attack: "T1499"
    for: [shell, python, javascript, powershell, pe, elf]
    if:
      type: string_value
      substr: "udp_flood"
