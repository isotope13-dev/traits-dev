# UDP-based DDoS Detection
# MBC: B0042 (Denial of Service)
# ATT&CK: T1499
traits:
  - id: udp-flood-dup
    desc: UDP flood attack function
    crit: suspicious
    conf: 0.9
    mbc: "B0042"
    attack: "T1499"
    for: [text, shell, batch, ruby, python, javascript, php, powershell, vbs, applescript, perl, elf, macho, pe]
    if:
      type: string
      substr: "udp_flood"
