defaults:
  platforms: [unix]
  for: [kotlin, class, java_class, jar]
  attack: T1485

traits:
  - id: kotlin-ssh-delete-target
    desc: Kotlin deletes SSH path
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    if:
      type: text
      regex: '\.ssh[\s\S]{0,360}(file\.delete\(\)|deleteRecursively|Files\.delete)'

  - id: kotlin-gnupg-delete-target
    desc: Kotlin deletes GnuPG path
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    if:
      type: text
      regex: '\.gnupg[\s\S]{0,360}(file\.delete\(\)|deleteRecursively|Files\.delete)'

  - id: kotlin-config-delete-target
    desc: Kotlin deletes config path
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    if:
      type: text
      regex: '\.config[\s\S]{0,360}(file\.delete\(\)|deleteRecursively|Files\.delete)'

  - id: kotlin-authlog-delete-target
    desc: Kotlin deletes auth log
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    if:
      type: text
      regex: '/var/log/auth\.log[\s\S]{0,360}(file\.delete\(\)|Files\.delete)'

  - id: kotlin-messages-delete-target
    desc: Kotlin deletes messages log
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    if:
      type: text
      regex: '/var/log/messages[\s\S]{0,360}(file\.delete\(\)|Files\.delete)'

  - id: kotlin-unix-file-delete-call
    desc: Kotlin Unix file delete call
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    if:
      type: text
      substr: file.delete()

  - id: kotlin-unix-bytecode-delete-call
    desc: JVM File.delete bytecode
    crit: notable
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: symbol
      exact: java/io/File.delete

  - id: kotlin-unix-bytecode-ssh-dir
    desc: Kotlin Unix bytecode ssh dir
    crit: component
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 2E 73 73 68

  - id: kotlin-unix-bytecode-gnupg-dir
    desc: Kotlin Unix bytecode gnupg dir
    crit: component
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 2E 67 6E 75 70 67

  - id: kotlin-unix-bytecode-config-dir
    desc: Kotlin Unix bytecode config dir
    crit: component
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 2E 63 6F 6E 66 69 67

  - id: kotlin-unix-bytecode-auth-log
    desc: Kotlin Unix bytecode auth log
    crit: component
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 76 61 72 2F 6C 6F 67 2F 61 75 74 68 2E 6C 6F 67

composite_rules:
  - id: kotlin-unix-home-log-wipe
    desc: Kotlin Unix home log wipe
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-ssh-delete-target
      - id: kotlin-gnupg-delete-target
      - id: kotlin-config-delete-target
      - id: kotlin-authlog-delete-target
      - id: kotlin-messages-delete-target

  - id: kotlin-unix-delete-wipe
    desc: Kotlin Unix delete wipe
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-ssh-delete-target
      - id: kotlin-gnupg-delete-target
      - id: kotlin-config-delete-target
      - id: kotlin-unix-file-delete-call

  - id: kotlin-unix-bytecode-delete-wipe
    desc: Kotlin Unix bytecode wipe
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-unix-bytecode-ssh-dir
      - id: kotlin-unix-bytecode-gnupg-dir
      - id: kotlin-unix-bytecode-config-dir
      - id: kotlin-unix-bytecode-delete-call

  - id: kotlin-unix-bytecode-home-log-wipe
    desc: Kotlin Unix class log wipe
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-unix-bytecode-ssh-dir
      - id: kotlin-unix-bytecode-gnupg-dir
      - id: kotlin-unix-bytecode-config-dir
      - id: kotlin-unix-bytecode-auth-log
      - id: kotlin-unix-bytecode-delete-call
