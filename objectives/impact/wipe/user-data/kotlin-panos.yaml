defaults:
  platforms: [panos, appliance, unix]
  for: [kotlin, class, java_class, jar]
  attack: T1485

traits:
  - id: kotlin-panos-home-wipe-targets
    desc: Kotlin PAN-OS home wipe targets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.ssh[\s\S]{0,120}\.gnupg[\s\S]{0,120}\.config'

  - id: kotlin-panos-varlog-wildcard
    desc: Kotlin PAN-OS varlog targets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/log/auth\.log[\s\S]{0,220}/var/log/messages'

  - id: kotlin-panos-file-delete-call
    desc: Kotlin PAN-OS file delete call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: file.delete()

  - id: kotlin-panos-bytecode-delete-call
    desc: Kotlin PAN-OS bytecode delete
    crit: suspicious
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: text
      substr: delete

  - id: kotlin-panos-bytecode-ssh-dir
    desc: Kotlin PAN-OS bytecode ssh dir
    crit: component
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 2E 73 73 68

  - id: kotlin-panos-bytecode-gnupg-dir
    desc: Kotlin PAN-OS bytecode gnupg dir
    crit: component
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 2E 67 6E 75 70 67

  - id: kotlin-panos-bytecode-config-dir
    desc: Kotlin PAN-OS bytecode config dir
    crit: component
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 2E 63 6F 6E 66 69 67

  - id: kotlin-panos-bytecode-auth-log
    desc: Kotlin PAN-OS bytecode auth log
    crit: component
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 76 61 72 2F 6C 6F 67 2F 61 75 74 68 2E 6C 6F 67

composite_rules:
  - id: kotlin-panos-home-log-wipe
    desc: Kotlin PAN-OS home log wipe
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-panos-home-wipe-targets
      - id: kotlin-panos-varlog-wildcard

  - id: kotlin-panos-delete-wipe
    desc: Kotlin PAN-OS delete wipe
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-panos-home-wipe-targets
      - id: kotlin-panos-file-delete-call

  - id: kotlin-panos-bytecode-delete-wipe
    desc: Kotlin PAN-OS bytecode wipe
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-panos-home-wipe-targets
      - id: kotlin-panos-bytecode-delete-call

  - id: kotlin-panos-bytecode-home-log-wipe
    desc: Kotlin PAN-OS class log wipe
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-panos-bytecode-ssh-dir
      - id: kotlin-panos-bytecode-gnupg-dir
      - id: kotlin-panos-bytecode-config-dir
      - id: kotlin-panos-bytecode-auth-log
