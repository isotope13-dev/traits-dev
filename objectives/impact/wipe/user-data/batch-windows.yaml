defaults:
  platforms: [windows]
  for: [batch]
  attack: T1485

traits:
  - id: batch-user-dir-rmdir-loop
    desc: Batch user directory rmdir loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'for /d %%D in \("%USERPROFILE%\\(Documents|Desktop|Downloads)\\\*"\)'

  - id: batch-bcdedit-deletevalue
    desc: Batch bcdedit deletevalue
    crit: suspicious
    conf: 0.93
    unless:
      - id: metadata/file/string/identity::windows-safe-mode-toggle-script
    if:
      type: text
      substr: bcdedit /deletevalue

  - id: batch-reagentc-disable
    desc: Batch disables WinRE
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: reagentc /disable

  - id: batch-removes-trendmicro-dir
    desc: Batch removes Trend Micro dir
    crit: suspicious
    conf: 0.94
    attack: T1562.001
    if:
      type: text
      regex: '(?i)\brmdir\b[^\r\n]{0,80}\\Trend Micro\b'

  - id: batch-forced-reboot-now
    desc: Batch forced immediate reboot
    crit: suspicious
    conf: 0.94
    attack: T1529
    if:
      type: text
      regex: '(?i)\bshutdown\s+-r\s+-f\s+-t\s+00\b'

composite_rules:
  - id: batch-user-data-and-recovery-wipe
    desc: Batch user data and recovery wipe
    crit: hostile
    conf: 0.98
    all:
      - id: batch-user-dir-rmdir-loop
      - id: batch-bcdedit-deletevalue
      - id: batch-reagentc-disable

  - id: batch-edr-dir-removal-reboot
    desc: Batch EDR directory removal reboot
    crit: hostile
    conf: 0.98
    all:
      - id: batch-removes-trendmicro-dir
      - id: batch-bcdedit-deletevalue
      - id: batch-forced-reboot-now
