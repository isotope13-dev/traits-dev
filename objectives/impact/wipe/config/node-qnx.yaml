defaults:
  platforms: [qnx, unix]
  for: [javascript, typescript]
  attack: T1485

traits:
  - id: qnx-node-bootconf-random-write
    desc: QNX Node bootconf random write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc/boot/conf[\s\S]{0,260}randomBytes\(4096\)'

  - id: qnx-node-log-temp-unlink
    desc: QNX Node log temp unlink
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/log[\s\S]{0,220}unlinkSync'

composite_rules:
  - id: qnx-node-boot-config-destroy
    desc: QNX Node boot config destroy
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-bootconf-random-write
      - id: qnx-node-log-temp-unlink

  - id: qnx-node-destructive-cleanup
    desc: QNX Node destructive cleanup
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-log-temp-unlink
      - id: micro-behaviors/process/terminate/kill::js-sigkill-process

  - id: qnx-node-boot-kill-destroy
    desc: QNX Node boot kill destroy
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-bootconf-random-write
      - id: micro-behaviors/process/terminate/kill::js-sigkill-process

  - id: qnx-node-steal-then-destroy
    desc: QNX Node steal then destroy
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-bootconf-random-write
      - id: objectives/exfiltration/stealer/credential/ssh::qnx-node-credential-multipart-exfil
