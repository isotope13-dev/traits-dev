defaults:
  platforms: [iosxe, appliance]
  for: [ruby, c]
  attack: T1485

traits:
  - id: iosxe-platform-marker
    desc: IOS-XE platform marker
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(?i)(ios-xe|cisco-ios-xe)'

  - id: write-erase-command
    desc: write erase command literal
    crit: component
    conf: 0.96
    if:
      type: text
      substr: write erase

  - id: iosxe-crypto-key-zeroize
    desc: IOS-XE crypto key zeroize
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: crypto key zeroize rsa

  - id: iosxe-config-delete-targets
    desc: IOS-XE config target near platform marker
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)(ios[- ]xe|cisco-ios-xe).{0,120}((startup|running)-config|vlan\.dat)'

  - id: iosxe-config-delete-api
    desc: IOS-XE config delete API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'DELETE /system/configuration|/api/v1/exec[\s\S]{0,160}write erase'

composite_rules:
  - id: iosxe-write-erase
    desc: IOS-XE write erase command
    crit: suspicious
    conf: 0.96
    all:
      - id: iosxe-platform-marker
      - id: write-erase-command
    near_bytes: 512

  - id: iosxe-config-wipe
    desc: IOS-XE configuration wipe
    crit: hostile
    conf: 0.98
    any:
      - id: iosxe-write-erase
      - id: iosxe-config-delete-api
    all:
      - id: iosxe-config-delete-targets

  - id: iosxe-identity-key-wipe
    desc: IOS-XE identity key wipe
    crit: hostile
    conf: 0.97
    all:
      - id: iosxe-crypto-key-zeroize
    any:
      - id: iosxe-write-erase
      - id: iosxe-config-delete-targets
