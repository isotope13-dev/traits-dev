defaults:
  platforms: [linux, macos, windows]
  for: [go.mod]
  attack: T1485
  size_min: 32
  size_max: 1048576

traits:
  - id: wiper-named-go-module
    desc: Go module wiper naming
    crit: suspicious
    conf: 0.78
    if:
      type: text
      regex: '^module\s+\S*(wipe|wiper|eraser|destroyer)\S*$'
