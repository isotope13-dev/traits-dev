defaults:
  platforms: [qnx, unix]
  for: [c, cpp, elf]
  attack: T1485

traits:
  - id: qnx-native-varlog-overwrite
    desc: QNX native varlog overwrite
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "echo '' > /var/log/messages"

  - id: qnx-native-history-crash-wipe
    desc: QNX native history crash wipe
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'rm -f ~/\.(bash|sh)_history[\s\S]{0,180}/var/crash/\*'

  - id: qnx-native-wipe-marker
    desc: QNX native wipe marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: WIPE_COMPLETED_

composite_rules:
  - id: qnx-native-log-artifact-wipe
    desc: QNX native log artifact wipe
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-varlog-overwrite
      - id: qnx-native-history-crash-wipe

  - id: qnx-native-wipe-marker-artifacts
    desc: QNX native wipe marker artifacts
    crit: hostile
    conf: 0.97
    all:
      - id: qnx-native-varlog-overwrite
      - id: qnx-native-wipe-marker
