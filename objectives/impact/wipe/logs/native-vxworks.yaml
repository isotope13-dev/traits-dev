defaults:
  platforms: [appliance, unix]
  for: [c, cpp, objc, elf]
  attack: T1070.002
  mbc: E1070

traits:
  - id: native-log-wipe-paths
    desc: Native log wipe paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/var/log/(messages|dmesg)'

  - id: native-history-wipe-path
    desc: Native history wipe path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /root/.bash_history

  - id: native-wipedrive-command
    desc: Native WIPEDRIVE command
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: WIPEDRIVE

composite_rules:
  - id: native-log-history-wipe
    desc: Native log history wipe
    crit: hostile
    conf: 0.98
    all:
      - id: native-log-wipe-paths
      - id: native-history-wipe-path
    any:
      - id: native-wipedrive-command
      - id: micro-behaviors/fs/file/write/direct::write
