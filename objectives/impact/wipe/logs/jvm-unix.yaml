defaults:
  platforms: [unix]
  for: [class, jar]
  attack: T1070.002

traits:
  - id: jvm-varlog-rm-rf
    desc: JVM varlog recursive removal
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'rm -rf /var/log/\*'

  - id: jvm-root-history-delete
    desc: JVM root shell history delete
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'rm -f /root/\.bash_history'

  - id: jvm-root-ssh-delete
    desc: JVM root SSH directory delete
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'rm -rf /root/\.ssh/'

composite_rules:
  - id: jvm-log-history-ssh-wipe
    desc: JVM log history SSH wipe
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: jvm-varlog-rm-rf
      - id: jvm-root-history-delete
      - id: jvm-root-ssh-delete
