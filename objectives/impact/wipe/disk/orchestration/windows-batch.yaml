defaults:
  platforms: [windows]
  for: [batch]
  attack: "T1561.002"

traits:
  - id: diskpart-clean-all
    desc: diskpart clean all command
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bdiskpart\b[\s\S]{0,300}\bclean\s+all\b|\bclean\s+all\b[\s\S]{0,300}\|\s*diskpart\b'
  - id: wmic-logicaldisk-loop
    desc: WMIC logical disk loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)wmic\s+logicaldisk\s+get\s+Caption'
  - id: robocopy-mir-systemdrive
    desc: robocopy mirrors system drive folders
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)robocopy\.?exe?.{0,220}%SYSTEMDRIVE%[\s\S]{0,160}/MIR\b'
  - id: fsutil-disk-fill-file
    desc: fsutil fills free disk space
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)fsutil\s+volume\s+diskfree[\s\S]{0,500}fsutil\.?exe?\s+file\s+createnew'
  - id: netsh-disable-interfaces
    desc: netsh disables network interfaces
    crit: suspicious
    conf: 0.94
    attack: "T1498"
    if:
      type: text
      regex: '(?i)netsh\s+interface\s+set\s+interface.{0,100}\bDISABLE\b'
  - id: net-user-disable-loop
    desc: net user disables accounts
    crit: suspicious
    conf: 0.94
    attack: "T1531"
    if:
      type: text
      regex: '(?i)net\s+user\s+%%[A-Za-z].{0,160}/active:no'
  - id: cached-logons-disabled
    desc: Cached Windows logons disabled
    crit: suspicious
    conf: 0.94
    attack: "T1112"
    if:
      type: text
      regex: '(?i)CachedLogonsCount.{0,120}/d\s+0\b'
  - id: qwinsta-logoff-loop
    desc: Active sessions logged off
    crit: suspicious
    conf: 0.92
    attack: "T1531"
    if:
      type: text
      regex: '(?i)\bqwinsta\b[\s\S]{0,260}\blogoff\s+%%[A-Za-z]'
  - id: netlogon-xml-trigger
    desc: NETLOGON XML execution trigger
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\\NETLOGON\\[^''"\s]{1,80}\.xml'
  - id: ui0detect-service-disable
    desc: UI0Detect service disabled
    crit: suspicious
    conf: 0.93
    attack: "T1489"
    if:
      type: text
      regex: '(?i)sc\s+(stop|config).{0,80}UI0Detect'

composite_rules:
  - id: windows-diskpart-volume-wiper
    desc: Windows diskpart volume wiper
    crit: hostile
    conf: 0.99
    all:
      - id: diskpart-clean-all
      - id: wmic-logicaldisk-loop
  - id: windows-batch-destructive-wiper
    desc: Windows batch destructive wiper
    crit: hostile
    conf: 0.99
    all:
      - id: windows-diskpart-volume-wiper
    needs: 2
    any:
      - id: robocopy-mir-systemdrive
      - id: fsutil-disk-fill-file
      - id: netsh-disable-interfaces
      - id: net-user-disable-loop
      - id: cached-logons-disabled
      - id: qwinsta-logoff-loop
      - id: netlogon-xml-trigger
      - id: ui0detect-service-disable
