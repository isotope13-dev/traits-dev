defaults:
  platforms:
    - windows
  for:
    - cmd
    - php
  attack: T1485
  mbc: E1485
traits:
  - id: format-c
    desc: 'Destructive format command targeting Win C drive'
    crit: suspicious
    conf: 1.0
    size_min: 10
    count_min: 1
    if:
      type: string_literal
      regex: (?i)format\s+c:\s+(/y|/autotest|/q\s+/u)
  - id: format-c-no-colon
    desc: Format C Drive (No Colon)
    crit: suspicious
    conf: 1.0
    size_min: 10
    count_min: 1
    if:
      type: string_literal
      regex: (?i)format\s+c\s+(/y)
