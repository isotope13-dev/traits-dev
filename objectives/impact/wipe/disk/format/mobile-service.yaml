defaults:
  platforms: [windows]
  for: [pe]
  size_min: 1048576
  size_max: 67108864

traits:
  - id: remove-mdm-format-userdata
    desc: Remove MDM lock and wipe userdata
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: "*Remove MDM Lock & Format Userdata*"

  - id: safe-format-userdata
    desc: Safe format userdata workflow
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: "*Safe Format Userdata*"

  - id: userdata-erased-status
    desc: Userdata erase status strings
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Userdata Erased\.|Userdata Erase Fail\.'

  - id: format-userdata-warning
    desc: Userdata erase warning text
    crit: component
    conf: 0.96
    if:
      type: text
      regex: "Low level format userdata|I'am know risk, and want to continue"

composite_rules:
  - id: android-userdata-service-wipe
    desc: Android handset userdata wipe workflow
    crit: suspicious
    conf: 0.98
    all:
      - id: userdata-erased-status
    any:
      - id: remove-mdm-format-userdata
      - id: safe-format-userdata
      - id: format-userdata-warning
      - id: micro-behaviors/hardware/flash/device::spreadtrum-fdl-flash-tooling
    needs: 3
