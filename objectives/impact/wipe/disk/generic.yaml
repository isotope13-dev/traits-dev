defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: wipe-disk
    desc: wipe disk phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: wipe disk
      case_insensitive: true
  - id: wipe-drive
    desc: wipe drive phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: wipe drive
      case_insensitive: true
  - id: disk-wipe
    desc: disk wipe phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: disk wipe
      case_insensitive: true
  - id: secure-erase
    desc: secure erase phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: secure erase
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-init
        - id: metadata/binary/resource::kernel-driver-idata
  - id: mbr-ref
    desc: MBR reference
    crit: component
    conf: 0.6
    if:
      type: text
      word: MBR
  - id: boot-sector
    desc: boot sector reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: boot sector
      case_insensitive: true
  - id: master-boot-record
    desc: master boot record reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: master boot record
      case_insensitive: true
composite_rules:
  - id: disk-terms
    desc: Disk wiper terminology
    crit: notable
    conf: 0.75
    mbc: E1561
    attack: T1561
    needs: 2
    any:
      - id: wipe-disk
      - id: wipe-drive
      - id: disk-wipe
      - id: secure-erase
      - id: mbr-ref
      - id: boot-sector
      - id: master-boot-record
      - id: micro-behaviors/fs/path/device/storage/
