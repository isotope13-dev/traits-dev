# Disk Wiper Detection - Generic
# MBC: E1561 (Disk Wipe)
# ATT&CK: T1561
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: wipe-disk
    desc: wipe disk phrase
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: "(?i)wipe disk"
  - id: wipe-drive
    desc: wipe drive phrase
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: "(?i)wipe drive"
  - id: disk-wipe
    desc: disk wipe phrase
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: "(?i)disk wipe"
  - id: secure-erase
    desc: secure erase phrase
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: "(?i)secure erase"
    downgrade:
      any:
        - id: metadata/format/pe::kernel-driver-init
        - id: metadata/format/pe::kernel-driver-idata
  - id: mbr-ref
    desc: MBR reference
    crit: notable
    conf: 0.6
    if:
      type: string_value
      word: "MBR"
  - id: boot-sector
    desc: boot sector reference
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: "(?i)boot sector"
  - id: master-boot-record
    desc: master boot record reference
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: "(?i)master boot record"
composite_rules:
  - id: disk-terms
    desc: Disk wiper terminology
    crit: notable
    conf: 0.75
    mbc: "E1561"
    attack: "T1561"
    needs: 2
    any:
      - id: wipe-disk
      - id: wipe-drive
      - id: disk-wipe
      - id: secure-erase
      - id: mbr-ref
      - id: boot-sector
      - id: master-boot-record
      - id: micro-behaviors/fs/path/device/storage
