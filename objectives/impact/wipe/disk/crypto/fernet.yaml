# Fernet Wiper Ransomware Detection
# ATT&CK: T1486 (Data Encrypted for Impact), T1485 (Data Destruction)
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1486"
traits:
  - id: generate-key-call
    desc: Fernet key generation call
    crit: component
    conf: 0.78
    if:
      type: symbol
      kind: call
      exact: 'Fernet.generate_key'
composite_rules:
  - id: fernet-inplace-overwrite
    desc: Fernet in-place file overwrite loop
    crit: suspicious
    conf: 0.93
    unless:
      - id: objectives/impact/ransom/tactics/
      - id: objectives/impact/ransom/tactics::python-local-key-file
    all:
      - id: objectives/impact/ransom/tactics::inplace-encrypt
      - id: micro-behaviors/crypto/symmetric/fernet::class-usage
  - id: fernet-wiper-ransomware
    desc: "Fernet key generation combined with in-place encryption (wiper)"
    crit: hostile
    conf: 0.97
    all:
      - id: generate-key-call
      - id: fernet-inplace-overwrite
