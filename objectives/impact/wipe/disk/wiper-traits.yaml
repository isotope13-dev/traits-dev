defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries, go]
traits:
  - id: userprofile-desktop-join-python
    desc: USERPROFILE Desktop path construction (Python)
    crit: notable
    conf: 0.8
    attack: T1485
    if:
      type: text
      substr: os.path.join(os.environ['USERPROFILE'], 'Desktop')
  - id: target-git
    desc: Targets .git directory (version control)
    crit: notable
    conf: 0.85
    attack: T1485
    if:
      type: text
      regex: '["'']\./?\.git["'']'
  - id: target-node-modules
    desc: Targets node_modules directory
    crit: component
    conf: 0.8
    attack: T1485
    if:
      type: text
      regex: '["'']/?(\./)?node_modules["'']'
  - id: target-src
    desc: Targets source code directory
    crit: component
    conf: 0.85
    attack: T1485
    for:
      - shell
      - python
      - javascript
      - powershell
    if:
      type: string_literal
      regex: '["'']/?(\./)?src["'']'
  - id: target-vscode-dir
    desc: Targets .vscode directory
    crit: notable
    conf: 0.7
    attack: T1485
    if:
      type: text
      regex: '["'']/?(\./)?\.(vscode)["'']'
  - id: target-idea-dir
    desc: Targets .idea directory
    crit: notable
    conf: 0.7
    attack: T1485
    if:
      type: text
      regex: '["'']/?(\./)?\.(idea)["'']'
  - id: env-check-js
    desc: Node.js environment variable comparison
    crit: component
    if:
      type: text
      regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==|==|===)
  - id: node-env-ref
    desc: NODE_ENV environment variable
    crit: component
    if:
      type: text
      substr: NODE_ENV
  - id: android-sdcard
    desc: Android /sdcard path
    crit: component
    if:
      type: text
      substr: /sdcard
    unless:
      - type: basename
        exact: android.py
      - id: user-directory-comment
  - id: android-storage-emulated
    desc: Android /storage/emulated path
    crit: component
    if:
      type: text
      substr: /storage/emulated
    unless:
      - id: user-directory-comment
      - type: raw
        regex: (documents|downloads|pictures)_dir\s*(:\s*str\s*)?=
      - type: raw
        regex: (videos|music)_dir\s*(:\s*str\s*)?=
      - type: text
        substr: return "/storage/emulated/0/Desktop"
  - id: android-dcim
    desc: Android DCIM folder
    crit: component
    if:
      type: text
      substr: DCIM
    unless:
      - id: user-directory-comment
      - type: raw
        regex: videos_dir\s*(:\s*str\s*)?=
  - id: android-pictures
    desc: Android Pictures folder
    crit: component
    if:
      type: text
      substr: Pictures
    unless:
      - id: user-directory-comment
      - type: raw
        regex: pictures_dir\s*=
  - id: android-downloads
    desc: Android Download folder
    crit: component
    if:
      type: text
      regex: (/sdcard|/storage/emulated/[0-9]+).{0,40}/Downloads?(/|$)
    unless:
      - id: user-directory-comment
      - type: raw
        regex: downloads_dir\s*=
  - id: user-directory-comment
    desc: User directory documentation string
    crit: component
    if:
      type: text
      substr: directory tied to the user
  - id: build-clean-rimraf
    desc: Build cleanup rimraf script
    crit: component
    if:
      type: text
      substr: "rimraf -rf out dist *.vsix"
  - id: build-assets-root-clean
    desc: Build cleanup via assetsRoot
    crit: component
    if:
      type: text
      substr: config.build.assetsRoot
  - id: build-file-allowlist-prune
    desc: Build cleanup via file allowlist pruning
    crit: component
    if:
      type: text
      substr: "BUILD_FILES.indexOf(curPath) < 0"
composite_rules:
  - id: target-dev-dirs
    desc: Targets development directories
    crit: notable
    conf: 0.9
    attack: T1485
    needs: 3
    any:
      - id: target-git
      - id: target-node-modules
      - id: target-src
      - id: target-vscode-dir
      - id: target-idea-dir
  - id: env-conditional
    desc: Environment-based conditional check
    crit: component
    any:
      - id: env-check-js
      - id: node-env-ref
  - id: recursive-delete
    desc: Recursive directory deletion function
    crit: notable
    conf: 0.85
    attack: T1485
    any:
      - id: micro-behaviors/fs/directory/delete::rimraf
      - id: micro-behaviors/fs/directory/delete::rm-rf
      - id: micro-behaviors/fs/directory/delete::shutil-rmtree
      - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
  - id: conditional-destroy
    desc: Conditional destruction based on environment
    crit: suspicious
    conf: 0.95
    attack: T1485
    size_max: 50000
    all:
      - id: env-conditional
    any:
      - id: micro-behaviors/fs/file/delete::fs-unlinkSync
      - id: micro-behaviors/fs/file/delete::fs-rmdir
      - id: micro-behaviors/fs/directory/delete::rimraf
    unless:
      - id: build-clean-rimraf
      - id: build-assets-root-clean
  - id: android-storage-path
    desc: Android storage directory reference
    crit: component
    any:
      - id: android-sdcard
      - id: android-storage-emulated
  - id: android-media-dirs
    desc: Android media directories
    crit: component
    any:
      - id: android-dcim
      - id: android-pictures
      - id: android-downloads
  - id: shell-exec-capability
    desc: Shell execution capability
    crit: component
    any:
      - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
      - id: micro-behaviors/process/create/shell/lang::spawn-call
  - id: target-android-storage
    desc: Targets Android storage directories
    crit: notable
    conf: 0.95
    attack: T1485
    near_lines: 80
    all:
      - id: android-storage-path
      - id: android-media-dirs
      - id: shell-exec-capability
      - id: mass-delete-action
    unless:
      - id: user-directory-comment
  - id: mass-delete-action
    desc: Mass deletion action primitive
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/fs/directory/traverse::delete-unlink-node-py
      - id: micro-behaviors/fs/directory/traverse::delete-shell
  - id: target-vscode
    desc: Targets .vscode configuration directory
    crit: notable
    conf: 0.85
    attack: T1485
    any:
      - id: target-vscode-dir
      - id: target-idea-dir
  - id: mass-delete
    desc: Mass file deletion pattern
    crit: notable
    conf: 0.85
    attack: T1485
    size_max: 40000
    near_lines: 30
    all:
      - id: micro-behaviors/fs/directory/traverse::traverse-readdir-walk-find
      - id: mass-delete-action
    unless:
      - id: build-file-allowlist-prune
    downgrade:
      any:
        - type: text
          substr: Copy complete!
        - type: raw
          regex: '(Copy|Create) (File|Directory)'
        - type: text
          substr: Building package
        - type: raw
          regex: make (install|clean)
        - type: raw
          regex: \b(pkgmk|pkgproto|DESTDIR)\b
        - type: text
          word: umount
  - id: python-desktop-mass-delete
    desc: Python desktop-targeted mass file deletion
    crit: hostile
    conf: 0.97
    attack: T1485
    all:
      - id: micro-behaviors/os/env/vars/user-info::userprofile-var
      - id: userprofile-desktop-join-python
      - id: micro-behaviors/fs/directory/readdir::readdir-python
      - id: micro-behaviors/fs/file/delete::py-remove
      - id: micro-behaviors/data/control-flow/analysis::for-loop-content
  - id: protestware
    desc: Protestware pattern - conditional destruction
    crit: suspicious
    conf: 0.98
    attack: T1485
    mbc: B0031
    all:
      - id: conditional-destroy
      - id: target-dev-dirs
  - id: with-callback
    desc: Wiper with HTTP callback
    crit: suspicious
    conf: 0.95
    attack: T1485
    mbc: B0031
    all:
      - id: recursive-delete
      - id: micro-behaviors/communications/http/request/
