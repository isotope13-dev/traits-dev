defaults:
  for: [text]
  platforms: [windows, unix, linux, macos, android, ios]
composite_rules:
  - id: dos-boot-record-wiper
    desc: DOS boot record wiper
    crit: hostile
    conf: 0.99
    attack: "T1561.001"
    all:
      - id: micro-behaviors/fs/disk/partition::boot-record-overwrite-source
      - id: micro-behaviors/os/dos/interrupt::int13-disk-sector-io
    any:
      - id: micro-behaviors/os/dos/interrupt::int21-date-check
      - id: objectives/impact/wipe/disk::disk-terms
