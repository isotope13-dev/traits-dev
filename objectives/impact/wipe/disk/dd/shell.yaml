defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - shell
traits:
  - id: dev-grep-pattern
    desc: Device grep pattern (^/dev)
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: ^/dev
  - id: dd-zero-to-dev
    desc: dd with /dev/zero to device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}if=/dev/zero.{0,100}of=/dev/
  - id: dd-urandom-to-dev
    desc: dd with /dev/urandom to device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}if=/dev/u?random.{0,100}of=/dev/
  - id: dd-to-sd
    desc: dd writing to sd/hd/vd block device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/[shv]d[a-z]
  - id: dd-to-xvd
    desc: dd writing to xvd block device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/xvd[a-z]
  - id: dd-to-mmc
    desc: dd writing to mmcblk device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/mmcblk[0-9]
  - id: dd-to-nvme
    desc: dd writing to nvme device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/nvme[0-9]
  - id: dd-to-mapper
    desc: dd writing to device mapper
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/mapper/
  - id: dd-to-disk
    desc: dd writing to /dev/disk/
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/disk/
  - id: dd-to-dm
    desc: dd writing to dm- device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/dm-[0-9]
  - id: dd-to-mtd
    desc: dd writing to mtd device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/mtd[0-9]
  - id: dd-to-mem
    desc: dd writing to memory device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/(k?mem|port)
  - id: xargs-dd-pipeline
    desc: xargs piping to dd (wiper)
    crit: suspicious
    conf: 0.9
    attack: T1561.002
    if:
      type: text
      regex: xargs\s+.{0,100}dd\s+.{0,100}/dev/zero
composite_rules:
  - id: uid-check-pattern
    desc: Shell root privilege check pattern
    crit: suspicious
    conf: 0.8
    any:
      - id: micro-behaviors/os/privilege/check::uid-zero-compare
      - id: micro-behaviors/os/privilege/check::id-u-check
  - id: root-check
    desc: Shell root privilege check
    crit: suspicious
    conf: 0.75
    any:
      - id: micro-behaviors/os/privilege/check::uid-var
      - id: uid-check-pattern
  - id: device-enum
    desc: Block device enumeration
    crit: suspicious
    conf: 0.7
    any:
      - id: dev-grep-pattern
      - id: micro-behaviors/fs/proc/mounts
  - id: dd-dev-zero
    desc: dd with /dev/zero source
    crit: suspicious
    conf: 0.85
    attack: T1561.002
    any:
      - id: dd-zero-to-dev
      - id: dd-urandom-to-dev
  - id: dd-of-dev
    desc: dd writing to block device
    crit: suspicious
    conf: 0.85
    attack: T1561.002
    any:
      - id: dd-to-sd
      - id: dd-to-xvd
      - id: dd-to-mmc
      - id: dd-to-nvme
      - id: dd-to-mapper
      - id: dd-to-disk
      - id: dd-to-dm
      - id: dd-to-mtd
      - id: dd-to-mem
  - id: dd-destructive
    desc: Destructive dd patterns
    crit: suspicious
    conf: 0.85
    mbc: E1561
    attack: T1561.002
    any:
      - id: dd-dev-zero
      - id: dd-of-dev
      - id: xargs-dd-pipeline
      - id: objectives/impact/wipe/disk/device::dd-zero
      - id: objectives/impact/wipe/disk/device::dd-random
  - id: parallel-exec
    desc: Parallel execution pattern
    crit: suspicious
    conf: 0.7
    any:
      - id: micro-behaviors/process/create/workers::xargs-cmd
      - id: micro-behaviors/process/create/workers::xargs-parallel-flag
  - id: wiper-full
    desc: Disk wiper with parallel exec
    crit: hostile
    conf: 0.95
    mbc: E1561
    attack: T1561.002
    all:
      - id: root-check
      - id: device-enum
      - id: dd-destructive
      - id: parallel-exec
  - id: wiper
    desc: Disk wiper detected
    crit: hostile
    conf: 0.9
    mbc: E1561
    attack: T1561.002
    all:
      - id: root-check
      - id: device-enum
      - id: dd-destructive
