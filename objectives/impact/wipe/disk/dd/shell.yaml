defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - shell
traits:
  - id: dev-grep-sd-pattern
    desc: Block device grep sd pattern
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: '\^/dev/(\[?[shv]+\]?d|xvd)'

  - id: dev-grep-nvme-pattern
    desc: Block device grep nvme pattern
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: '\^/dev/(nvme|mmcblk|mtd)'

  - id: dev-grep-mapper-pattern
    desc: Block device grep mapper pattern
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: '\^/dev/(mapper|disk|dm-)'

  - id: dev-grep-loop-pattern
    desc: Block device grep loop pattern
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: '\^/dev/(loop|sr)'
    unless:
      - id: well-known/app/util-linux::util-linux-source-tree
      - id: well-known/app/util-linux::util-linux-test-script
  - id: dd-zero-to-dev
    desc: dd zero-fill to device node
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}if=/dev/zero.{0,100}of=/dev/
      not:
      - regex: '\bof=/dev/(null|zero)\b'
  - id: dd-urandom-to-dev
    desc: dd random-fill to device node
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}if=/dev/u?random.{0,100}of=/dev/
      not:
      - regex: '\bof=/dev/(null|random|urandom)\b'
  - id: dd-to-sd
    desc: dd writing to sd/hd/vd block device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/[shv]d[a-z]
  - id: dd-to-xvd
    desc: dd writing to xvd block device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/xvd[a-z]
  - id: dd-to-mmc
    desc: dd writing to mmcblk device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/mmcblk[0-9]
  - id: dd-to-nvme
    desc: dd writing to nvme device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/nvme[0-9]
  - id: dd-to-mapper
    desc: dd writing to device mapper
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/mapper/
  - id: dd-to-disk
    desc: dd writing to /dev/disk/
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/disk/
  - id: dd-to-dm
    desc: dd writing to dm- device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/dm-[0-9]
  - id: dd-to-mtd
    desc: dd writing to mtd device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/mtd[0-9]
  - id: dd-to-mem
    desc: dd writing to memory device
    crit: component
    if:
      type: text
      regex: dd\s+.{0,100}of=/dev/(k?mem|port)
  - id: xargs-dd-pipeline
    desc: xargs piping to dd (wiper)
    crit: suspicious
    conf: 0.9
    attack: T1561.002
    if:
      type: text
      regex: xargs\s+.{0,100}dd\s+.{0,100}/dev/zero
composite_rules:
  - id: device-enum
    desc: Block device enumeration
    crit: suspicious
    conf: 0.7
    any:
      - id: dev-grep-pattern
      - id: micro-behaviors/fs/proc/mounts
  - id: dev-grep-pattern
    desc: Block device grep pattern
    crit: suspicious
    conf: 0.72
    any:
      - id: dev-grep-sd-pattern
      - id: dev-grep-nvme-pattern
      - id: dev-grep-mapper-pattern
      - id: dev-grep-loop-pattern
  - id: dd-dev-zero
    desc: dd with /dev/zero source
    crit: suspicious
    conf: 0.85
    attack: T1561.002
    any:
      - id: dd-zero-to-dev
      - id: dd-urandom-to-dev
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/app/kpango-dotfiles::kpango-claude-security-gate
      - id: well-known/app/kpango-dotfiles::kpango-dotfiles-source-path
      - id: well-known/app/clonezilla::package-context
      - id: well-known/app/clonezilla::archive-name
      - id: well-known/app/clonezilla::clonezilla-script-context
  - id: dd-of-dev
    desc: dd writing to block device
    crit: suspicious
    conf: 0.85
    attack: T1561.002
    any:
      - id: dd-to-sd
      - id: dd-to-xvd
      - id: dd-to-mmc
      - id: dd-to-nvme
      - id: dd-to-mapper
      - id: dd-to-disk
      - id: dd-to-dm
      - id: dd-to-mtd
      - id: dd-to-mem
    unless:
      - id: well-known/app/kpango-dotfiles::kpango-dotfiles-source-path
      - id: well-known/app/clonezilla::package-context
      - id: well-known/app/clonezilla::clonezilla-script-context
  - id: dd-destructive
    desc: Destructive dd patterns
    crit: suspicious
    conf: 0.85
    mbc: E1561
    attack: T1561.002
    any:
      - id: dd-dev-zero
      - id: dd-of-dev
      - id: xargs-dd-pipeline
      - id: objectives/impact/wipe/disk/device::dd-zero
      - id: objectives/impact/wipe/disk/device::dd-random
    unless:
      - id: well-known/app/kpango-dotfiles::kpango-claude-security-gate
      - id: well-known/app/kpango-dotfiles::kpango-dotfiles-source-path
      - id: well-known/app/clonezilla::package-context
      - id: well-known/app/clonezilla::clonezilla-script-context
  - id: parallel-exec
    desc: xargs parallel execution component
    crit: component
    conf: 0.7
    any:
      - id: micro-behaviors/process/create/workers::xargs-cmd
      - id: micro-behaviors/process/create/workers::xargs-parallel-flag
    unless:
      - id: well-known/app/mysqltuner::mysqltuner-source-path
  - id: wiper-full
    desc: Disk wiper with parallel exec
    crit: hostile
    conf: 0.95
    mbc: E1561
    attack: T1561.002
    all:
      - id: micro-behaviors/os/privilege/check::root-privilege-check
      - id: device-enum
      - id: dd-destructive
      - id: parallel-exec
  - id: wiper
    desc: Disk wiper detected
    crit: hostile
    conf: 0.9
    mbc: E1561
    attack: T1561.002
    all:
      - id: micro-behaviors/os/privilege/check::root-privilege-check
      - id: device-enum
      - id: dd-destructive
