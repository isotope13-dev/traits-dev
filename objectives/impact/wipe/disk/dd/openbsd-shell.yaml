defaults:
  platforms: [openbsd, bsd, unix]
  for: [shell]
  attack: T1561.002
  mbc: E1561

traits:
  - id: shell-fstab-swap-enum
    desc: Shell enumerates swap from fstab
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "awk\\s+['\"]/swap/"

  - id: shell-swapoff-device-loop
    desc: Shell disables swap device loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'swapoff\s+["$][A-Za-z_][A-Za-z0-9_]*'

  - id: shell-swapoff-all
    desc: Shell disables all swap
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bswapoff\s+-a\b'

  - id: shell-dd-random-variable-device
    desc: Shell dd random to variable device
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'dd\s+if=/dev/u?random\s+of=["$][A-Za-z_][A-Za-z0-9_]*'

  - id: shell-dd-zero-variable-device
    desc: Shell dd zero to variable device
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'dd\s+if=/dev/zero\s+of=["$][A-Za-z_][A-Za-z0-9_]*'

composite_rules:
  - id: openbsd-shell-swap-wiper
    desc: OpenBSD shell wipes swap device
    crit: hostile
    conf: 0.98
    all:
      - id: shell-fstab-swap-enum
    any:
      - id: shell-swapoff-device-loop
      - id: shell-swapoff-all
      - id: shell-dd-random-variable-device
      - id: shell-dd-zero-variable-device

  - id: openbsd-shell-zero-swap-wiper
    desc: OpenBSD shell zeroes swap device
    crit: hostile
    conf: 0.98
    all:
      - id: shell-fstab-swap-enum
      - id: shell-swapoff-all
      - id: shell-dd-zero-variable-device

