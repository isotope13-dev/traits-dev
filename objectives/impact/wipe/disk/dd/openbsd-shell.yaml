defaults:
  platforms: [openbsd, bsd, unix]
  for: [shell]
  attack: T1561.002
  mbc: E1561

traits:
  - id: shell-fstab-swap-enum
    desc: Shell enumerates swap from fstab
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "awk\\s+['\"]/swap/"

  - id: shell-swapoff-device-loop
    desc: Shell disables swap device loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'swapoff\s+["$][A-Za-z_][A-Za-z0-9_]*'
    unless:
      - id: well-known/app/util-linux::util-linux-source-tree

  - id: shell-dd-random-variable-device
    desc: Shell dd random data to variable device
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'dd\s+if=/dev/u?random\s+of\s*=\s*["'']?\$[A-Za-z_]*(DEV|DISK|SWAP)[A-Za-z_]*'
    unless:
      - id: well-known/app/samba::samba-source-tree
      - id: metadata/package/testing/presence/harness::shell-test-prefix-basename
      - id: metadata/package/testing/presence/harness::test-directory-path
      - id: metadata/package/testing/presence/harness::ndctl-nfit-shell-test
      - type: path
        regex: 'tests[\\/]ts[\\/]'
      - id: well-known/app/util-linux::util-linux-test-script

  - id: shell-dd-zero-variable-device
    desc: Shell dd zero data to variable device
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'dd\s+if=/dev/zero\s+of\s*=\s*["'']?\$[A-Za-z_]*(DEV|DISK|SWAP)[A-Za-z_]*'
    unless:
      - id: metadata/package/testing/presence/harness::shell-test-prefix-basename
      - id: metadata/package/testing/presence/harness::test-directory-path
      - id: metadata/package/testing/presence/harness::ndctl-nfit-shell-test
      - type: path
        regex: 'tests[\\/]ts[\\/]'
      - type: text
        substr: '_dd if=/dev/zero'

composite_rules:
  - id: openbsd-shell-swap-wiper
    desc: OpenBSD shell wipes swap device
    crit: hostile
    conf: 0.98
    all:
      - id: shell-fstab-swap-enum
    any:
      - id: shell-swapoff-device-loop
      - id: micro-behaviors/fs/swap/off::shell-swapoff-all
      - id: shell-dd-random-variable-device
      - id: shell-dd-zero-variable-device

  - id: openbsd-shell-zero-swap-wiper
    desc: OpenBSD shell zeroes swap device
    crit: hostile
    conf: 0.98
    all:
      - id: shell-fstab-swap-enum
      - id: micro-behaviors/fs/swap/off::shell-swapoff-all
      - id: shell-dd-zero-variable-device
