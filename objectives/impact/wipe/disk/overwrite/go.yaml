defaults:
  platforms: [windows, linux, macos]
  for: [go, elf, macho, pe]
  attack: T1485
traits:
- id: go-openfile-rdwr
  desc: Go os.OpenFile with O_RDWR
  crit: component
  if:
    type: text
    regex: os\.OpenFile\(.{0,50}os\.O_RDWR
- id: gutmann-ref--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)Gutmann.{0,80}(wipe|wiping)
  count_max: 1003102
- id: gutmann-ref--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)Gutmann.{0,80}(erase|delet)
  count_max: 1003103
- id: gutmann-ref--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)Gutmann.{0,80}(pass|35)
  count_max: 1003104
- id: dod-5220-ref--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)DoD 5220\.22-M.{0,80}(wipe|wiping)
  count_max: 1003105
- id: dod-5220-ref--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)DoD 5220\.22-M.{0,80}(erase|delet)
  count_max: 1003106
- id: dod-5220-ref--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)DoD 5220\.22-M.{0,80}(pass)
  count_max: 1003107
- id: vsitr-ref--rx-7
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)VSITR.{0,80}(wipe|wiping)
  count_max: 1003108
- id: vsitr-ref--rx-8
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)VSITR.{0,80}(erase|delet)
  count_max: 1003109
- id: vsitr-ref--rx-9
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)VSITR.{0,80}(pass)
  count_max: 1003110
- id: us-dod-ref--rx-10
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)US DoD.{0,80}(wipe|wiping)
  count_max: 1003111
- id: us-dod-ref--rx-11
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)US DoD.{0,80}(erase|delet)
  count_max: 1003112
- id: us-dod-ref--rx-12
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)US DoD.{0,80}(pass)
  count_max: 1003113
- id: wipe-rule-profile-names
  desc: Multiple wipe profile names
  crit: suspicious
  conf: 0.96
  for: [go]
  count_min: 3
  if:
    type: text
    regex: "\\bRule(Fast|Gutmann|VSITR|UsDod5220_22_M)\\b"
- id: wipe-flag-enum-names
  desc: Native and crypto wipe flags
  crit: suspicious
  conf: 0.95
  for: [go]
  count_min: 2
  if:
    type: text
    regex: "\\bFlag(Native|Crypto)\\b"
- id: wipe-random-mode-labels
  desc: Native and crypto wipe labels
  crit: notable
  conf: 0.9
  for: [go]
  count_min: 2
  if:
    type: text
    regex: "Random(Native|Crypto)"
- id: gutmann-ruleset-comment
  desc: Gutmann ruleset source comment
  crit: suspicious
  conf: 0.92
  for: [go]
  if:
    type: text
    regex: "Peter Gutmann alghoritm \\(35 passes\\)|lead-in of four random write patterns"
- id: gutmann-byte-triplets-source
  desc: Gutmann byte triplets in source
  crit: suspicious
  conf: 0.95
  for: [go]
  count_min: 2
  if:
    type: text
    regex: "\\\\x92\\\\x49\\\\x24|\\\\x49\\\\x24\\\\x92|\\\\x6D\\\\xB6\\\\xDB"
- id: gutmann-hex-1
  desc: Gutmann pattern 92 49 24
  for: [elf, macho, pe]
  crit: component
  if:
    type: hex
    section: .text
    pattern: 92 49 24 92 49 24
- id: gutmann-hex-2
  desc: Gutmann pattern 49 24 92
  for: [elf, macho, pe]
  crit: component
  if:
    type: hex
    section: .text
    pattern: 49 24 92 49 24 92
- id: gutmann-hex-3
  desc: Gutmann pattern 24 92 49
  for: [elf, macho, pe]
  crit: component
  if:
    type: hex
    section: .text
    pattern: 24 92 49 24 92 49
- id: gutmann-hex-4
  desc: Gutmann pattern 6D B6 DB
  for: [elf, macho, pe]
  crit: component
  if:
    type: hex
    section: .text
    pattern: 6D B6 DB 6D B6 DB
- id: gutmann-hex-5
  desc: Gutmann pattern B6 DB 6D
  for: [elf, macho, pe]
  crit: component
  if:
    type: hex
    section: .text
    pattern: B6 DB 6D B6 DB 6D
- id: gutmann-hex-6
  desc: Gutmann pattern DB 92 49
  for: [elf, macho, pe]
  crit: component
  if:
    type: hex
    section: .text
    pattern: DB 92 49 DB 92 49
- id: go-filepath-walkdir
  desc: Go filepath.WalkDir
  crit: component
  if:
    type: text
    substr: filepath.WalkDir
- id: go-ioutil-readfile
  desc: Go ioutil.ReadFile
  crit: component
  if:
    type: text
    word: io/ioutil.ReadFile
- id: go-ioutil-writefile
  desc: Go ioutil.WriteFile
  crit: component
  if:
    type: text
    word: io/ioutil.WriteFile
- id: go-randstringbytes
  desc: Go RandStringBytes symbol
  crit: component
  if:
    type: text
    word: RandStringBytes
- id: go-rand-read
  desc: Go math/rand Read method
  crit: component
  if:
    type: text
    exact: math/rand.(*Rand).Read
- id: randstringbytes-fn
  desc: Custom random filler generator
  crit: suspicious
  conf: 0.94
  if:
    type: text
    word: main.RandStringBytes
composite_rules:
- id: giant-string-blob
  desc: Giant embedded string blob
  crit: suspicious
  conf: 0.9
  for: [pe]
  platforms: [windows]
  all:
  - id: metadata/lang/compiler/systems::go-runtime-symbol
  - id: metadata/binary/metrics/size::giant-string-blob-metric
- id: secure-wipe-pattern
  desc: Opens file for read-write and removes
  crit: suspicious
  conf: 0.8
  all:
  - id: go-openfile-rdwr
  - id: micro-behaviors/fs/file/write/direct::go-write-method-call
  - id: micro-behaviors/fs/file/delete::os-Remove-string
  unless:
  - id: well-known/lib/golang-x-tools/
- id: standards-reference
  desc: References to secure wiping standards
  crit: suspicious
  conf: 0.9
  any:
  - id: gutmann-ref
  - id: dod-5220-ref
  - id: vsitr-ref
  - id: us-dod-ref
- id: gutmann-patterns
  desc: Uses Gutmann secure deletion overwrite
  crit: suspicious
  conf: 0.95
  needs: 5
  any:
  - id: gutmann-hex-1
  - id: gutmann-hex-2
  - id: gutmann-hex-3
  - id: gutmann-hex-4
  - id: gutmann-hex-5
  - id: gutmann-hex-6
- id: go-walk-capability
  desc: Go filesystem walk capability
  crit: suspicious
  any:
  - id: micro-behaviors/fs/directory/traverse::filepath-walk
  - id: go-filepath-walkdir
- id: go-math-rand
  desc: Go random overwrite helper
  crit: component
  near_bytes: 600
  all:
  - id: micro-behaviors/os/random/prng/stdlib::go-math-rand-pkg
  - id: go-randstringbytes
- id: overwrite-randomizer
  desc: Random overwrite data generator
  crit: suspicious
  conf: 0.9
  all:
  - id: go-math-rand
  - id: randstringbytes-fn
  any:
  - id: go-rand-read
  - id: go-ioutil-readfile
- id: random-overwrite-walk
  desc: Walks files and overwrites with random data
  crit: suspicious
  conf: 0.96
  all:
  - id: go-walk-capability
  - id: overwrite-randomizer
  any:
  - id: micro-behaviors/fs/file/write/direct::ioutil-write-file
  - id: go-ioutil-writefile
- id: secure-wiper
  desc: Highly confident secure wiper
  crit: suspicious
  conf: 0.99
  mbc: B0031
  needs: 2
  any:
  - id: secure-wipe-pattern
  - id: micro-behaviors/fs/directory/traverse::go-recursive-removeall
  - id: standards-reference
  - id: wipe-rule-profile-names
  - id: gutmann-ruleset-comment
  - id: gutmann-patterns
- id: go-disk-wiper
  desc: Go disk wiper
  crit: hostile
  conf: 0.95
  attack: T1561
  for: [go]
  all:
  - id: secure-wipe-pattern
  any:
  - id: standards-reference
  - id: objectives/anti-static/obfuscation/payload/encoded::giant-string-blob
- id: go-wipe-rules-library
  desc: Go multi-standard wipe rules library
  crit: hostile
  conf: 0.97
  for: [go]
  all:
  - id: wipe-rule-profile-names
  - id: standards-reference
  any:
  - id: wipe-flag-enum-names
  - id: wipe-random-mode-labels
  - id: gutmann-ruleset-comment
  - id: gutmann-byte-triplets-source
  - id: gutmann-patterns
- id: fake-upx-random-overwrite-wiper
  desc: Fake UPX Go random overwrite wiper
  crit: hostile
  conf: 0.98
  all:
  - id: random-overwrite-walk
  - id: objectives/command-and-control/dropper/execution/loader::empty-rwx-upx0
  - id: objectives/command-and-control/dropper/execution/loader::giant-rwx-upx1
  - id: metadata/binary/layout::large-overlay-64k
  - id: giant-string-blob
- id: gutmann-ref
  desc: Gutmann wipe standard reference
  crit: component
  conf: 1.0
  any:
  - id: gutmann-ref--rx-1
  - id: gutmann-ref--rx-2
  - id: gutmann-ref--rx-3
- id: dod-5220-ref
  desc: DoD 5220.22-M wipe standard
  crit: component
  conf: 1.0
  any:
  - id: dod-5220-ref--rx-4
  - id: dod-5220-ref--rx-5
  - id: dod-5220-ref--rx-6
- id: vsitr-ref
  desc: VSITR wipe standard
  crit: component
  conf: 1.0
  any:
  - id: vsitr-ref--rx-7
  - id: vsitr-ref--rx-8
  - id: vsitr-ref--rx-9
- id: us-dod-ref
  desc: US DoD wipe reference
  crit: component
  conf: 1.0
  any:
  - id: us-dod-ref--rx-10
  - id: us-dod-ref--rx-11
  - id: us-dod-ref--rx-12
