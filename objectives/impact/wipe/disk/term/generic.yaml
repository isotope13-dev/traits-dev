defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: diskutil-bin
    desc: diskutil utility reference
    crit: component
    conf: 0.65
    platforms: [macos]
    if:
      type: text
      exact: /usr/bin/diskutil
  - id: secureerase-subcommand
    desc: diskutil secureErase subcommand
    crit: component
    conf: 0.7
    platforms: [macos]
    if:
      type: text
      exact: secureErase
  - id: freespace-target
    desc: diskutil freespace target
    crit: component
    conf: 0.7
    platforms: [macos]
    if:
      type: text
      exact: freespace
  - id: wipe-disk
    desc: wipe disk phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: wipe disk
      case_insensitive: true
  - id: wipe-drive
    desc: wipe drive phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: wipe drive
      case_insensitive: true
  - id: disk-wipe
    desc: disk wipe phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: '\bdisk\s+wipe\b'
      case_insensitive: true
  - id: secure-erase
    desc: secure erase phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: secure erase
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-init
        - id: metadata/binary/resource::kernel-driver-idata
  - id: mbr-ref
    desc: MBR reference
    crit: component
    conf: 0.6
    if:
      type: text
      word: MBR
  - id: boot-sector-ref
    desc: boot sector reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: boot sector
      case_insensitive: true
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
    not:
    - regex: '(?i)DOS/MBR boot sector'
  - id: master-boot-record-ref
    desc: master boot record reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: master boot record
      case_insensitive: true
    unless:
      - id: metadata/vendor/identity/
      - id: well-known/app/kpango-dotfiles::kpango-dotfiles-source-path
      - id: well-known/tool/detection/ai-guardrail/
      - type: text
        regex: '%!PS-Adobe'
composite_rules:
  - id: diskutil-secure-erase-freespace
    desc: macOS diskutil free-space erase
    crit: suspicious
    conf: 0.92
    attack: T1485
    mbc: E1561
    all:
      - id: diskutil-bin
      - id: secureerase-subcommand
      - id: freespace-target
  - id: destructive-wipe-phrase
    desc: Explicit destructive wipe phrase
    crit: component
    conf: 0.75
    any:
      - id: wipe-disk
      - id: wipe-drive
      - id: disk-wipe
      - id: secure-erase
      - id: diskutil-secure-erase-freespace
  - id: disk-target-phrase
    desc: Low-level disk target phrase
    crit: component
    conf: 0.7
    any:
      - id: mbr-ref
      - id: boot-sector
      - id: master-boot-record
      - id: micro-behaviors/fs/path/device/storage/
  - id: disk-terms
    desc: Disk wiper terminology
    crit: suspicious
    conf: 0.75
    mbc: E1561
    attack: T1561
    all:
      - id: destructive-wipe-phrase
      - id: disk-target-phrase
    # Package changelogs and documentation often mention disk tools and wipe
    # operations in unrelated entries. Keep both indicators in one short
    # textual region before inferring intent.
    near_lines: 5
    unless:
      - id: metadata/vendor/identity/
      - id: well-known/app/kpango-dotfiles::kpango-dotfiles-source-path
      - id: well-known/tool/detection/ai-guardrail/
  - id: boot-sector
    desc: boot sector destruction phrasing
    crit: suspicious
    conf: 0.6
    all:
      - id: boot-sector-ref
      - id: destructive-wipe-phrase
    near_lines: 5
  - id: master-boot-record
    desc: master boot record destruction phrasing
    crit: suspicious
    conf: 0.6
    all:
      - id: master-boot-record-ref
      - id: destructive-wipe-phrase
    near_lines: 5
