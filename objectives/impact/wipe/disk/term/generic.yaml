defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: diskutil-bin
    desc: diskutil utility reference
    crit: component
    conf: 0.65
    platforms: [macos]
    if:
      type: text
      exact: /usr/bin/diskutil
  - id: secureerase-subcommand
    desc: diskutil secureErase subcommand
    crit: component
    conf: 0.7
    platforms: [macos]
    if:
      type: text
      exact: secureErase
  - id: freespace-target
    desc: diskutil freespace target
    crit: component
    conf: 0.7
    platforms: [macos]
    if:
      type: text
      exact: freespace
  - id: wipe-disk
    desc: wipe disk phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: wipe disk
      case_insensitive: true
  - id: wipe-drive
    desc: wipe drive phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: wipe drive
      case_insensitive: true
  - id: disk-wipe
    desc: disk wipe phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: disk wipe
      case_insensitive: true
  - id: secure-erase
    desc: secure erase phrase
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: secure erase
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-init
        - id: metadata/binary/resource::kernel-driver-idata
  - id: mbr-ref
    desc: MBR reference
    crit: component
    conf: 0.6
    if:
      type: text
      word: MBR
  - id: boot-sector
    desc: boot sector reference
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: boot sector
      case_insensitive: true
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
    not:
    - regex: '(?i)DOS/MBR boot sector'
  - id: master-boot-record
    desc: master boot record reference
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: master boot record
      case_insensitive: true
    unless:
      - id: metadata/binary/section/content::freebsd-kernel-image
      - type: text
        regex: '%!PS-Adobe'
composite_rules:
  - id: diskutil-secure-erase-freespace
    desc: macOS diskutil free-space erase
    crit: suspicious
    conf: 0.92
    attack: T1485
    mbc: E1561
    all:
      - id: diskutil-bin
      - id: secureerase-subcommand
      - id: freespace-target
  - id: disk-terms
    desc: Disk wiper terminology
    crit: suspicious
    conf: 0.75
    mbc: E1561
    attack: T1561
    needs: 2
    any:
      - id: wipe-disk
      - id: wipe-drive
      - id: disk-wipe
      - id: secure-erase
      - id: diskutil-secure-erase-freespace
      - id: mbr-ref
      - id: boot-sector
      - id: master-boot-record
      - id: micro-behaviors/fs/path/device/storage/
    unless:
      - id: metadata/binary/section/content::freebsd-kernel-image
