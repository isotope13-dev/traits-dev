defaults:
  platforms: [openwrt]
  for: [c, objc]
  attack: T1485

traits:
  - id: objc-agent-file-unlock-method
    desc: ObjC file unlock method declaration
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '-\s*\(void\)performFileUnlock;'
  - id: objc-agent-ftp-exfil-method
    desc: ObjC FTP exfil method declaration
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '-\s*\(void\)performFTPExfiltration;'
  - id: objc-agent-wipe-method
    desc: ObjC wipe method declaration
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '-\s*\(void\)performWipe;'
  - id: objc-agent-target-host-field
    desc: ObjC agent target host field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '@interface Agent[\s\S]{0,160}targetHost'

composite_rules:
  - id: openwrt-objc-wipe-agent-interface
    desc: OpenWrt ObjC wipe agent interface
    crit: hostile
    conf: 0.98
    all:
      - id: objc-agent-target-host-field
      - id: objc-agent-ftp-exfil-method
      - id: objc-agent-wipe-method
