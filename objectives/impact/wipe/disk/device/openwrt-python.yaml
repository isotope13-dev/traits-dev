defaults:
  platforms: [openwrt]
  for: [python, pyc]
  attack: T1485

traits:
  - id: openwrt-jffs2reset-command
    desc: OpenWrt JFFS2 reset command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: jffs2reset -y
  - id: openwrt-flash-erase-command
    desc: OpenWrt flash erase command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: flash_erase
  - id: openwrt-fw-setenv-boot-tamper
    desc: OpenWrt boot environment tamper command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'fw_setenv\s+boot(delay|args)'
  - id: openwrt-shadow-overwrite
    desc: OpenWrt shadow backup overwrite path
    crit: suspicious
    conf: 0.9
    unless:
      - id: well-known/app/remotepower::documented-rmm-release-context
    if:
      type: text
      substr: /etc/shadow-

composite_rules:
  - id: openwrt-python-system-wipe
    desc: OpenWrt Python system wipe
    crit: hostile
    conf: 0.98
    unless:
      - id: well-known/app/remotepower::documented-rmm-release-context
    any:
      - id: openwrt-jffs2reset-command
      - id: openwrt-flash-erase-command
      - id: openwrt-fw-setenv-boot-tamper
      - id: objectives/persistence/system/network-appliance::openwrt-root-crontab-path
      - id: openwrt-shadow-overwrite
      - id: micro-behaviors/fs/path/config/system::openwrt-uci-config-access
    needs: 4
