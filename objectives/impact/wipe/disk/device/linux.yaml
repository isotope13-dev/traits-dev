defaults:
  platforms: [unix]
  for: [scripts, binaries]
traits:
  - id: dd-zero
    desc: dd if=/dev/zero command
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: dd\s+if=/dev/zero.{0,50}of=/dev/
  - id: dd-random
    desc: dd random data to device
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: dd\s+if=/dev/urandom.{0,50}of=/dev/
  - id: shred-flag
    desc: shred command with flag
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: shred -
  - id: shred-dev
    desc: shred with /dev/ path
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: shred.{0,20}/dev/
  - id: shred-force
    desc: shred --force command
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: shred --force
composite_rules:
  - id: disk
    desc: Disk wiper patterns
    crit: suspicious
    conf: 0.66
    mbc: E1561
    attack: T1561
    any:
      - id: dd-zero
      - id: dd-random
      - id: shred-flag
      - id: shred-dev
      - id: shred-force
  - id: disk-device
    desc: Direct disk device access
    crit: suspicious
    conf: 0.66
    any:
      - id: micro-behaviors/fs/path/device/storage/
