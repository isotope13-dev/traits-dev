# Disk Wiper Detection - Shell Scripts
# MBC: E1561 (Disk Wipe)
# ATT&CK: T1561.002 (Disk Structure Wipe)
#
# Detects shell-based disk wipers like the Viasat attack (2022) pattern:
# - Enumerate mounted devices via /proc/mounts
# - Write zeros to devices with dd
# - Often uses parallel execution (xargs -P) for speed
defaults:
  platforms: [linux, unix, macos, android, ios]
  for: [shell]
traits:
  # Root/privilege checks using AST-extracted strings
  - id: uid-var
    desc: Shell UID variable reference
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: '^\$\{?[EU]?UID\}?$'
  # Device path patterns from grep
  - id: dev-grep-pattern
    desc: Device grep pattern (^/dev)
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: "^/dev"
  # xargs symbol - used for parallel execution
  - id: xargs-cmd
    desc: xargs command usage
    crit: component
    conf: 0.6
    if:
      type: symbol
      exact: "xargs"
  # Content-based patterns (raw file search)
  - id: uid-check-content
    desc: Shell UID check pattern
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: '"\$\{UID\}"\s*==\s*0'
  # dd with destructive source (/dev/zero, /dev/urandom)
  - id: dd-zero-to-dev
    # Removed proc-mounts-content duplicate - use micro-behaviors/fs/proc/mounts::mounts (string type works for file paths)

    desc: dd with /dev/zero to device
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}if=/dev/zero.{0,100}of=/dev/'
  - id: dd-urandom-to-dev
    desc: dd with /dev/urandom to device
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}if=/dev/u?random.{0,100}of=/dev/'
  # dd writing to specific block device types
  - id: dd-to-sd
    desc: dd writing to sd/hd/vd block device
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}of=/dev/[shv]d[a-z]'
  - id: dd-to-xvd
    desc: dd writing to xvd block device
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}of=/dev/xvd[a-z]'
  - id: dd-to-mmc
    desc: dd writing to mmcblk device
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}of=/dev/mmcblk[0-9]'
  - id: dd-to-nvme
    desc: dd writing to nvme device
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}of=/dev/nvme[0-9]'
  - id: dd-to-mapper
    desc: dd writing to device mapper
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}of=/dev/mapper/'
  - id: dd-to-disk
    desc: dd writing to /dev/disk/
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}of=/dev/disk/'
  - id: dd-to-dm
    desc: dd writing to dm- device
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}of=/dev/dm-[0-9]'
  - id: dd-to-mtd
    desc: dd writing to mtd device
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}of=/dev/mtd[0-9]'
  - id: dd-to-mem
    desc: dd writing to memory device
    crit: component
    if:
      type: raw
      regex: 'dd\s+.{0,100}of=/dev/(k?mem|port)'
  - id: xargs-parallel-flag
    desc: xargs with parallel flag
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: 'xargs\s+.{0,50}-P\s*\d*'
  # UID check atomic indicators
  - id: uid-check-eq
    desc: UID equals zero check
    crit: component
    conf: 0.8
    if:
      type: string
      regex: '\$\{?UID\}?\s*(==|!=|-eq|-ne)\s*0'
  - id: euid-check-eq
    desc: EUID equals zero check
    crit: component
    conf: 0.8
    if:
      type: string
      regex: '\$\{?EUID\}?\s*(==|!=|-eq|-ne)\s*0'
  - id: id-u-check
    desc: id -u equals zero check
    crit: component
    conf: 0.8
    if:
      type: string
      regex: '\$\(id\s+-u\)\s*(==|!=|-eq|-ne)\s*0'
  - id: xargs-dd-pipeline
    desc: xargs piping to dd (wiper)
    crit: suspicious
    conf: 0.9
    attack: "T1561.002"
    if:
      type: raw
      regex: 'xargs\s+.{0,100}dd\s+.{0,100}/dev/zero'
composite_rules:
  # Proc mounts read composite
  - id: proc-mounts-read
    desc: Read /proc/mounts
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/fs/proc/mounts::mounts
      - id: micro-behaviors/fs/proc/mounts::mounts-mountinfo
  # UID check composite
  - id: uid-check-pattern
    desc: Shell root privilege check pattern
    crit: notable
    conf: 0.8
    any:
      - id: uid-check-eq
      - id: euid-check-eq
      - id: id-u-check
  # Root privilege check composite
  - id: root-check
    desc: Shell root privilege check
    crit: notable
    conf: 0.75
    any:
      - id: uid-var
      - id: uid-check-pattern
  # Device enumeration composite
  - id: device-enum
    desc: Block device enumeration
    crit: notable
    conf: 0.7
    any:
      - id: dev-grep-pattern
      - id: proc-mounts-read
      - id: micro-behaviors/fs/proc/mounts::mounts
  # dd with destructive source composite
  - id: dd-dev-zero
    desc: dd with /dev/zero source
    crit: suspicious
    conf: 0.85
    attack: "T1561.002"
    any:
      - id: dd-zero-to-dev
      - id: dd-urandom-to-dev
  # dd writing to block devices composite
  - id: dd-of-dev
    desc: dd writing to block device
    crit: suspicious
    conf: 0.85
    attack: "T1561.002"
    any:
      - id: dd-to-sd
      - id: dd-to-xvd
      - id: dd-to-mmc
      - id: dd-to-nvme
      - id: dd-to-mapper
      - id: dd-to-disk
      - id: dd-to-dm
      - id: dd-to-mtd
      - id: dd-to-mem
  # Destructive dd composite
  - id: dd-destructive
    desc: Destructive dd patterns
    crit: suspicious
    conf: 0.85
    mbc: "E1561"
    attack: "T1561.002"
    any:
      - id: dd-dev-zero
      - id: dd-of-dev
      - id: xargs-dd-pipeline
      - id: objectives/impact/wipe/disk::dd-zero
      - id: objectives/impact/wipe/disk::dd-random
  # Parallel execution
  - id: parallel-exec
    desc: Parallel execution pattern
    crit: notable
    conf: 0.7
    any:
      - id: xargs-cmd
      - id: xargs-parallel-flag
  # HOSTILE: Full wiper pattern with parallel execution
  # Complexity: all(4) = 4 >= 4 required
  - id: wiper-full
    desc: Disk wiper with parallel exec
    crit: hostile
    conf: 0.95
    mbc: "E1561"
    attack: "T1561.002"
    all:
      - id: root-check
      - id: device-enum
      - id: dd-destructive
      - id: parallel-exec
  # HOSTILE: Wiper without parallel (still dangerous)
  # Complexity: all(3) + file_types(1) = 4 >= 4 required
  - id: wiper
    desc: Disk wiper detected
    crit: hostile
    conf: 0.90
    mbc: "E1561"
    attack: "T1561.002"
    all:
      - id: root-check
      - id: device-enum
      - id: dd-destructive
