defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: hostile-wiper
    desc: "Hostile Disk Wiper"
    crit: hostile
    conf: 1.0
    any:
      - id: objectives/impact/wipe/disk::format-c
      - id: objectives/impact/wipe/disk::format-c-no-colon
