defaults:
  platforms: [android]
  for: [apk, zip]
  attack: T1485

traits:
  - id: android-storage-emulated-prefix
    desc: Android emulated storage prefix
    crit: component
    conf: 0.9
    count_min: 5
    if:
      type: text
      substr: "/storage/emulated/0/"

  - id: android-media-storage-pictures
    desc: Android Pictures storage target
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "/storage/emulated/0/Pictures"

  - id: android-media-storage-movies
    desc: Android Movies storage target
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "/storage/emulated/0/Movies"

  - id: android-media-storage-music
    desc: Android Music storage target
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "/storage/emulated/0/Music"

  - id: android-media-storage-gallery
    desc: Android Gallery storage target
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "/storage/emulated/0/Gallery"

  - id: android-personal-storage-targets
    desc: Android personal storage targets
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "/storage/emulated/0/(Download|Documents|Podcasts)"

  - id: android-ringtone-storage-targets
    desc: Android notification storage targets
    crit: component
    conf: 0.88
    if:
      type: text
      regex: "/storage/emulated/0/(Alarms|Notifications|Ringtones)"

  - id: android-killem-layout-resource
    desc: Android kill-themed layout resource
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "res/layout/killem.xml"
      offset_range: [-262144, null]

  - id: android-system-storage-targets
    desc: Android app storage target
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "/storage/emulated/0/Android"


composite_rules:
  - id: android-media-storage-targets
    desc: Android media storage targets
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: micro-behaviors/fs/path/media::android-dcim-path
      - id: android-media-storage-pictures
      - id: android-media-storage-movies
      - id: android-media-storage-music
      - id: android-media-storage-gallery

  - id: android-directory-enumeration-method
    desc: Android directory enumeration method
    crit: component
    conf: 0.82
    any:
      - id: micro-behaviors/fs/directory/readdir::readdir-java
      - id: micro-behaviors/fs/directory/readdir::java-listfiles-reference

  - id: android-external-storage-wiper
    desc: Android external storage wiper
    crit: hostile
    conf: 0.96
    mbc: B0031
    all:
      - id: android-storage-emulated-prefix
      - id: android-media-storage-targets
      - id: android-personal-storage-targets
      - id: micro-behaviors/fs/file/delete::file-delete-api
      - id: android-directory-enumeration-method
      - id: micro-behaviors/os/privilege/manifest::write-external-storage
    any:
      - id: android-system-storage-targets
      - id: android-ringtone-storage-targets
      - id: micro-behaviors/fs/file/delete::delete-file-api

  - id: android-hardcoded-external-storage-wiper
    desc: Android hardcoded storage wiper
    crit: hostile
    conf: 0.96
    mbc: B0031
    all:
      - id: android-storage-emulated-prefix
      - id: android-media-storage-targets
      - id: android-personal-storage-targets
      - id: micro-behaviors/fs/file/delete::file-delete-api
    any:
      - id: android-system-storage-targets
      - id: android-ringtone-storage-targets
      - id: micro-behaviors/fs/file/delete::delete-file-api

  - id: android-destructive-locker
    desc: Android destructive screen locker
    crit: hostile
    conf: 0.97
    mbc: B0031
    all:
      - id: android-external-storage-wiper
      - id: micro-behaviors/ui/window/manage/overlay::kiosk-ui-control
    any:
      - id: micro-behaviors/ui/wallpaper::set-android-wallpaper

  - id: android-killem-secondary-dex
    desc: Android kill-themed secondary DEX app
    crit: suspicious
    conf: 0.94
    all:
      - id: android-killem-layout-resource
      - id: metadata/package/files/mobile-package::apk-secondary-dex

  - id: android-multidex-all-files-access
    desc: Android multi-DEX app with all-files access
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/files/mobile-package::apk-multiple-secondary-dex
      - id: micro-behaviors/os/privilege/manifest::manage-external-storage
    unless:
      - id: well-known/app/tiktok::package-member
      - id: well-known/app/tiktok::tiktok-domain-marker
      - id: well-known/app/tiktok::tiktok-font-marker

  - id: android-cleaner-file-shredder-module
    desc: Android cleaner file shredder module
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/fs/delete/secure::android-file-shredder-module
      - id: metadata/package/files/mobile-package::apk-multiple-secondary-dex
    any:
      - id: micro-behaviors/os/privilege/manifest::write-external-storage
      - id: micro-behaviors/fs/delete/secure::android-shredder-resource-assets
