defaults:
  platforms: [unix]
  for: [java, class]
  attack: T1485
  mbc: E1485

traits:
  - id: java-walk-delete-files
    desc: Java walks and deletes files
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Files\.walk\(dir\)[\s\S]{0,140}Files::isRegularFile[\s\S]{0,140}Files\.delete'

  - id: java-wipes-home-and-tmp
    desc: Java wipes home and tmp
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'wipeDirectory\(System\.getProperty\("user\.home"\)\)[\s\S]{0,80}wipeDirectory\("/tmp"\)'

  - id: jvm-log-wipe-paths
    desc: JVM Linux log wipe paths
    crit: suspicious
    conf: 0.94
    for: [class, jar, zip]
    if:
      type: hex
      pattern: "2F 76 61 72 2F 6C 6F 67 2F 6A 6F 75 72 6E 61 6C 2F 2A"

composite_rules:
  - id: java-linux-user-data-wipe
    desc: Java Linux user data wipe
    crit: hostile
    conf: 0.98
    all:
      - id: java-walk-delete-files
    any:
      - id: micro-behaviors/fs/path/log/system::log-var
      - id: micro-behaviors/fs/path/log/accounting::multiple-log-files
      - id: java-wipes-home-and-tmp
    needs: 1

  - id: jvm-linux-user-data-wipe
    desc: JVM Linux user data wipe
    crit: hostile
    conf: 0.97
    for: [class, jar, zip]
    all:
      - id: jvm-log-wipe-paths
      - id: objectives/credential-access/shell/history::jvm-bash-history-bytecode-path
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
      - id: micro-behaviors/process/control/wait::java-process-waitfor-bytecode
