defaults:
  platforms: [unix]
  for: [shell]
  attack: T1485

traits:
  - id: shell-delete-keychains
    desc: Shell deletes keychains
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'delete-keychain[\s\S]{0,180}\*\.keychain-db'

  - id: shell-delete-browser-profiles
    desc: Shell deletes browser profiles
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Chrome/Default[\s\S]{0,180}Firefox/Profiles'

  - id: shell-delete-user-docs
    desc: Shell deletes user documents
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\$HOME/Desktop[\s\S]{0,180}\$HOME/Documents'

  - id: shell-delete-ssh-keys
    desc: Shell deletes SSH keys
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'rm -f "\$HOME/\.ssh/id_rsa"[\s\S]{0,220}authorized_keys'

composite_rules:
  - id: shell-macos-user-data-wipe
    desc: Shell macOS user data wipe
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: shell-delete-keychains
      - id: shell-delete-browser-profiles
      - id: shell-delete-user-docs
      - id: shell-delete-ssh-keys
