defaults:
  platforms: [windows, unix]
  for: [python, javascript, shell, go, pe]
traits:
- id: userprofile-desktop-join-python
  desc: USERPROFILE Desktop path construction (Python)
  crit: suspicious
  conf: 0.8
  attack: T1485
  if:
    type: text
    substr: os.path.join(os.environ['USERPROFILE'], 'Desktop')
- id: target-git
  desc: References .git directory literal
  crit: component
  conf: 0.85
  attack: T1485
  if:
    type: text
    regex: '["'']\./?\.git["'']'
- id: target-node-modules
  desc: Targets node_modules directory
  crit: component
  conf: 0.8
  attack: T1485
  if:
    type: text
    regex: '["'']/?(\./)?node_modules["'']'
  unless:
  - type: raw
    regex: 'not\s+in\s*\([^)]*node_modules'
- id: target-src
  desc: Targets source code directory
  crit: component
  conf: 0.85
  attack: T1485
  for: [scripts, binaries]
  if:
    type: string_literal
    regex: '["'']/?(\./)?src["'']'
- id: python-rm-root-recursive-argv
  desc: "Python subprocess rm -rf root fs target"
  crit: suspicious
  conf: 0.98
  attack: T1485
  for: [python]
  if:
    # Restored arg discriminator dropped in the call migration.
    type: symbol
    kind: call
    exact: 'subprocess.run'
    arg:
      kind: string
      regex: '^/\*$'
- id: env-check-js--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==)\s*['"](RU|BY)['"]
  count_max: 1003058
- id: env-check-js--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(==|===)\s*['"](RU|BY)['"]
  count_max: 1003059
- id: env-check-js--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==)\s*['"](UA|RU_ru)['"]
  count_max: 1003060
- id: env-check-js--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(==|===)\s*['"](UA|RU_ru)['"]
  count_max: 1003061
- id: env-check-js--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==)\s*['"](PROD|PRODUCTION)['"]
  count_max: 1003062
- id: env-check-js--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(==|===)\s*['"](PROD|PRODUCTION)['"]
  count_max: 1003063
- id: env-check-js--rx-7
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==)\s*['"](NODE_ENV|dev)['"]
  count_max: 1003064
- id: env-check-js--rx-8
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(==|===)\s*['"](NODE_ENV|dev)['"]
  count_max: 1003065
- id: env-check-js--rx-9
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==|==|===)\s*['"](true)['"]
  count_max: 1003066
- id: pm2-env-check
  desc: PM2 environment variable check
  crit: notable
  if:
    type: text
    regex: 'process\.env\[[^\]]{1,50}pm2[^\]]{0,20}\]'
- id: android-sdcard
  desc: Android /sdcard path
  crit: component
  if:
    type: text
    substr: /sdcard
  unless:
  - id: user-directory-comment
- id: android-storage-emulated
  desc: Android /storage/emulated path
  crit: component
  if:
    type: text
    substr: /storage/emulated
  unless:
  - id: user-directory-comment
  - type: raw
    regex: (documents|downloads|pictures)_dir\s*(:\s*str\s*)?=
  - type: raw
    regex: (videos|music)_dir\s*(:\s*str\s*)?=
  - type: text
    substr: return "/storage/emulated/0/Desktop"
- id: dcim-folder
  desc: DCIM folder
  crit: component
  if:
    type: text
    substr: DCIM
  unless:
  - id: user-directory-comment
  - type: raw
    regex: videos_dir\s*(:\s*str\s*)?=
- id: android-pictures
  desc: Android Pictures folder
  crit: component
  if:
    type: text
    substr: Pictures
  unless:
  - id: user-directory-comment
  - type: raw
    regex: pictures_dir\s*=
- id: android-downloads
  desc: Android Download folder
  crit: component
  if:
    type: text
    regex: (/sdcard|/storage/emulated/[0-9]+).{0,40}/Downloads?(/|$)
  unless:
  - id: user-directory-comment
  - type: raw
    regex: downloads_dir\s*=
- id: user-directory-comment
  desc: User directory documentation string
  crit: notable
  if:
    type: text
    substr: directory tied to the user
- id: build-clean-rimraf
  desc: Build cleanup rimraf script
  crit: notable
  if:
    type: text
    substr: "rimraf -rf out dist *.vsix"
- id: build-assets-root-clean
  desc: Build cleanup via assetsRoot
  crit: notable
  if:
    type: text
    substr: config.build.assetsRoot
- id: build-file-allowlist-prune
  desc: Build cleanup via file allowlist pruning
  crit: notable
  if:
    type: text
    substr: "BUILD_FILES.indexOf(curPath) < 0"
- id: rm-rf-staging-target
  desc: Recursive delete in package/build staging dir
  crit: notable
  for: [shell, makefile, python]
  if:
    # `rm -rf "$pkgdir"/...`, `$DESTDIR`, `$srcdir`: removing files from the
    # build's own fakeroot staging tree is normal packaging, not a wipe.
    type: text
    regex: 'rm\s+-rf\s+["'']?\$\{?(pkgdir|DESTDIR|srcdir)'
- id: makefile-plugin-cleanup-context
  desc: Makefile clears router plugin build output
  crit: notable
  for: [makefile]
  if:
    type: text
    regex: 'rm\s+-rf\s+\.\./router/plugins/\*'
- id: cloud-shell-authorize-session
  desc: Cloud Shell authorized session bootstrap
  crit: notable
  if:
    type: text
    substr: gcloud cloud-shell ssh --authorize-session
- id: uninstall-function
  desc: JavaScript uninstall function
  crit: notable
  for: [javascript]
  if:
    type: text
    regex: 'function\s+uninstall\s*\('
- id: js-self-destruct-marker
  desc: JavaScript self-destruct marker
  crit: component
  conf: 0.94
  for: [javascript, typescript]
  if:
    type: text
    regex: '(?i)self[-\s_]*destruct'
- id: node-process-cwd-src-target
  desc: Targets current project's src directory
  crit: component
  conf: 0.95
  for: [javascript, typescript]
  if:
    type: text
    regex: 'process\.cwd\(\)[\s\S]{0,80}["'']src["'']|["'']src["''][\s\S]{0,80}process\.cwd\(\)'
- id: node-rm-recursive-alias
  desc: Node rm recursive alias call
  crit: component
  conf: 0.94
  for: [javascript, typescript]
  if:
    type: text
    regex: '\b[A-Za-z_$][\w$]*\.rm\s*\([^\n;]{0,180}recursive\s*:\s*true'
- id: js-robots-destroy-route
  desc: robots.txt destroy route trigger
  crit: component
  conf: 0.97
  for: [javascript, typescript]
  if:
    type: text
    regex: "/robots\\.txt[\\s\\S]{0,260}req\\.query\\.verify\\s*={2,3}\\s*['\"]destroy['\"]"
- id: js-auto-schedules-self-destruct
  desc: Auto-schedules self-destruct routine
  crit: component
  conf: 0.98
  for: [javascript, typescript]
  if:
    type: text
    regex: 'scheduleDestructionAfter\s*\(\s*\)\s*;'
- id: discard-rm-rf-instruction-text
  desc: Discard instruction mentions rm rf
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: "To discard: rm -rf"
composite_rules:
- id: target-dev-dirs
  desc: Targets development directories
  crit: component
  conf: 0.9
  attack: T1485
  needs: 3
  any:
  - id: target-git
  - id: target-node-modules
  - id: target-src
  - id: micro-behaviors/fs/path/application/config::vscode-workspace-dir
  - id: micro-behaviors/fs/path/application/config::jetbrains-idea-dir
  unless:
  - id: micro-behaviors/process/create/shell/host::require-vscode
  - id: well-known/tool/detection/sast/
  - id: well-known/tool/detection/security-scanner/
  - id: micro-behaviors/communications/ssh/transfer/
- id: env-conditional
  desc: Environment-based conditional check
  crit: component
  any:
  - id: env-check-js
  - id: micro-behaviors/os/env/vars/system-info::node-env-var
  unless:
  - id: pm2-env-check
- id: recursive-delete
  desc: Recursive deletion capability
  crit: notable
  conf: 0.85
  attack: T1485
  any:
  - id: micro-behaviors/fs/directory/delete::rimraf
  - id: micro-behaviors/fs/directory/delete::rm-rf
  - id: micro-behaviors/fs/directory/delete::shutil-rmtree
  - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
  unless:
  - id: micro-behaviors/os/service/legitimate/
  - id: rm-rf-staging-target
  - id: makefile-plugin-cleanup-context
  - id: discard-rm-rf-instruction-text
- id: conditional-destroy
  desc: Conditional destruction based on environment
  crit: suspicious
  conf: 0.95
  attack: T1485
  size_max: 50000
  all:
  - id: env-conditional
  any:
  - id: micro-behaviors/fs/file/delete::fs-unlinkSync
  - id: micro-behaviors/fs/file/delete::fs-rmdir
  - id: micro-behaviors/fs/directory/delete::rimraf
  unless:
  - id: build-clean-rimraf
  - id: build-assets-root-clean
  - id: metadata/build/bundler::webpack-production-clean-script
  - id: metadata/build/bundler::webpack-production-define-plugin
  - id: metadata/build/framework::cloudformation-env-substitution
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
- id: android-storage-path
  desc: Android storage directory reference
  crit: component
  any:
  - id: android-sdcard
  - id: android-storage-emulated
- id: android-media-dirs
  desc: Android media directories
  crit: component
  any:
  - id: dcim-folder
  - id: android-pictures
  - id: android-downloads
- id: shell-exec-capability
  desc: Shell execution capability
  crit: notable
  any:
  - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
  - id: micro-behaviors/process/create/shell/bridge::spawn-call
- id: target-android-storage
  desc: Targets Android storage directories
  crit: suspicious
  conf: 0.95
  attack: T1485
  near_lines: 80
  all:
  - id: android-storage-path
  - id: android-media-dirs
  - id: shell-exec-capability
  - id: mass-delete-action
  unless:
  - id: user-directory-comment
- id: mass-delete-action
  desc: Mass deletion action primitive
  crit: notable
  conf: 0.85
  any:
  - id: micro-behaviors/fs/directory/traverse::delete-unlink-node-py
  - id: micro-behaviors/fs/directory/traverse::delete-shell
  unless:
  - id: uninstall-function
- id: target-vscode
  desc: Targets .vscode configuration directory
  crit: notable
  conf: 0.85
  attack: T1485
  any:
  - id: micro-behaviors/fs/path/application/config::vscode-workspace-dir
  - id: micro-behaviors/fs/path/application/config::jetbrains-idea-dir
- id: with-callback-benign-context
  desc: Benign callback cleanup context
  crit: notable
  any:
  - id: objectives/impact/system/directory::destructive-action-prohibition-phrase
  - id: metadata/build/autotools::autoconf-generated-script
  - id: well-known/lib/glibc
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/build/jenkins::job-name
  - id: cloud-shell-authorize-session
  - id: micro-behaviors/fs/build-artifacts::benign-build-or-copy-context
  - id: metadata/package/files/dependency::node-modules-path
  - id: well-known/lib/tesseract-js::upstream-browser-bundle
  - id: objectives/impact/system/directory::root-wipe-safety-context
  - id: well-known/tool/sysadmin/munin::munin-graph-output-context
- id: mass-delete
  desc: Mass file deletion pattern
  crit: notable
  conf: 0.85
  attack: T1485
  size_max: 40000
  near_lines: 30
  all:
  - id: micro-behaviors/fs/directory/traverse::traverse-readdir-walk-find
  - id: mass-delete-action
  unless:
  - id: micro-behaviors/fs/build-artifacts/
  - id: build-file-allowlist-prune
  - id: metadata/build/autotools::autoconf-generated-script
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: metadata/build/autotools::autotools-config-basename
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/harness/
- id: python-desktop-mass-delete
  desc: Python desktop-targeted mass file deletion
  crit: hostile
  conf: 0.97
  attack: T1485
  all:
