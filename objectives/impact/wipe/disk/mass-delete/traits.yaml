  - id: micro-behaviors/fs/directory/delete::rm-rf
  - id: node-rm-recursive-alias
  unless:
  - id: micro-behaviors/fs/build-artifacts/
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
- id: import-time-node-src-wiper
  desc: Import-time Node source wiper
  crit: hostile
  conf: 0.99
  attack: T1485
  for: [javascript, typescript]
  all:
  - id: node-self-destruct-src-wipe
  - id: js-auto-schedules-self-destruct
- id: express-route-node-src-wiper
  desc: Express route triggers source wipe
  crit: hostile
  conf: 0.99
  attack: T1485
  for: [javascript, typescript]
  all:
  - id: node-self-destruct-src-wipe
  - id: js-robots-destroy-route
- id: protestware
  desc: Protestware pattern - conditional destruction
  crit: suspicious
  conf: 0.98
  attack: T1485
  mbc: B0031
  all:
  - id: conditional-destroy
  - id: target-dev-dirs
- id: with-callback
  desc: Wiper with HTTP callback
  crit: suspicious
  conf: 0.95
  attack: T1485
  mbc: B0031
  near_lines: 120
  all:
  - id: recursive-delete
  - id: micro-behaviors/communications/http/request/
  unless:
  - id: objectives/impact/wipe/disk/mass-delete/
  - id: well-known/app/vscode-marketplace::deque-axe-linter-vsix
- id: env-check-js
  desc: Node env comparison for protestware
  crit: component
  conf: 1.0
  any:
  - id: env-check-js--rx-1
  - id: env-check-js--rx-2
  - id: env-check-js--rx-3
  - id: env-check-js--rx-4
  - id: env-check-js--rx-5
  - id: env-check-js--rx-6
  - id: env-check-js--rx-7
