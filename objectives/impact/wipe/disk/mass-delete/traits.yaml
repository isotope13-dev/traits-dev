defaults:
  platforms: [windows, unix]
  for: [python, javascript, shell, go, pe]
traits:
- id: userprofile-desktop-join-python
  desc: USERPROFILE Desktop path construction (Python)
  crit: suspicious
  conf: 0.8
  attack: T1485
  if:
    type: text
    substr: os.path.join(os.environ['USERPROFILE'], 'Desktop')
- id: target-git
  desc: Targets .git directory (version control)
  crit: suspicious
  conf: 0.85
  attack: T1485
  if:
    type: text
    regex: '["'']\./?\.git["'']'
- id: target-node-modules
  desc: Targets node_modules directory
  crit: component
  conf: 0.8
  attack: T1485
  if:
    type: text
    regex: '["'']/?(\./)?node_modules["'']'
  unless:
  - type: raw
    regex: 'not\s+in\s*\([^)]*node_modules'
- id: target-src
  desc: Targets source code directory
  crit: component
  conf: 0.85
  attack: T1485
  for: [scripts, binaries]
  if:
    type: string_literal
    regex: '["'']/?(\./)?src["'']'
- id: target-vscode-dir
  desc: Targets .vscode directory
  crit: notable
  conf: 0.7
  attack: T1485
  if:
    type: text
    regex: '["'']/?(\./)?\.(vscode)["'']'
- id: target-idea-dir
  desc: Targets .idea directory
  crit: suspicious
  conf: 0.7
  attack: T1485
  if:
    type: text
    regex: '["'']/?(\./)?\.(idea)["'']'
  unless:
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: metadata/library/runtime::acquire-vscode-api
  - id: metadata/library/structure::js-vite-rollup-vendor-chunk
- id: python-rm-root-recursive-argv
  desc: Python subprocess rm -rf root filesystem target
  crit: suspicious
  conf: 0.98
  attack: T1485
  for: [python]
  if:
    type: ast
    query: |
      ((call
        function: (attribute
          object: (identifier) @mod
          attribute: (identifier) @meth)
        arguments: (argument_list
          (list
            (string) @cmd
            (string) @flag
            (string) @target)))
       (#eq? @mod "subprocess")
       (#eq? @meth "run")
       (#match? @cmd "^['\"]rm['\"]$")
       (#match? @flag "^['\"]-rf['\"]$")
       (#match? @target "^['\"]/\\*['\"]$"))
- id: env-check-js--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==)\s*['"](RU|BY)['"]
  count_max: 1003058
- id: env-check-js--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(==|===)\s*['"](RU|BY)['"]
  count_max: 1003059
- id: env-check-js--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==)\s*['"](UA|RU_ru)['"]
  count_max: 1003060
- id: env-check-js--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(==|===)\s*['"](UA|RU_ru)['"]
  count_max: 1003061
- id: env-check-js--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==)\s*['"](PROD|PRODUCTION)['"]
  count_max: 1003062
- id: env-check-js--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(==|===)\s*['"](PROD|PRODUCTION)['"]
  count_max: 1003063
- id: env-check-js--rx-7
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==)\s*['"](NODE_ENV|dev)['"]
  count_max: 1003064
- id: env-check-js--rx-8
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(==|===)\s*['"](NODE_ENV|dev)['"]
  count_max: 1003065
- id: env-check-js--rx-9
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: process\.env\[[^\]]{1,50}\]\s*(!=|!==|==|===)\s*['"](true)['"]
  count_max: 1003066
- id: pm2-env-check
  desc: PM2 environment variable check
  crit: component
  if:
    type: text
    regex: 'process\.env\[[^\]]{1,50}pm2[^\]]{0,20}\]'
- id: node-env-ref
  desc: NODE_ENV environment variable
  crit: component
  if:
    type: text
    substr: NODE_ENV
- id: android-sdcard
  desc: Android /sdcard path
  crit: component
  if:
    type: text
    substr: /sdcard
  unless:
  - id: user-directory-comment
- id: android-storage-emulated
  desc: Android /storage/emulated path
  crit: component
  if:
    type: text
    substr: /storage/emulated
  unless:
  - id: user-directory-comment
  - type: raw
    regex: (documents|downloads|pictures)_dir\s*(:\s*str\s*)?=
  - type: raw
    regex: (videos|music)_dir\s*(:\s*str\s*)?=
  - type: text
    substr: return "/storage/emulated/0/Desktop"
- id: android-dcim
  desc: Android DCIM folder
  crit: component
  if:
    type: text
    substr: DCIM
  unless:
  - id: user-directory-comment
  - type: raw
    regex: videos_dir\s*(:\s*str\s*)?=
- id: android-pictures
  desc: Android Pictures folder
  crit: component
  if:
    type: text
    substr: Pictures
  unless:
  - id: user-directory-comment
  - type: raw
    regex: pictures_dir\s*=
- id: android-downloads
  desc: Android Download folder
  crit: component
  if:
    type: text
    regex: (/sdcard|/storage/emulated/[0-9]+).{0,40}/Downloads?(/|$)
  unless:
  - id: user-directory-comment
  - type: raw
    regex: downloads_dir\s*=
- id: user-directory-comment
  desc: User directory documentation string
  crit: component
  if:
    type: text
    substr: directory tied to the user
- id: build-clean-rimraf
  desc: Build cleanup rimraf script
  crit: component
  if:
    type: text
    substr: "rimraf -rf out dist *.vsix"
- id: build-assets-root-clean
  desc: Build cleanup via assetsRoot
  crit: component
  if:
    type: text
    substr: config.build.assetsRoot
- id: build-file-allowlist-prune
  desc: Build cleanup via file allowlist pruning
  crit: component
  if:
    type: text
    substr: "BUILD_FILES.indexOf(curPath) < 0"
- id: build-walk-cleanup
  desc: Build artifact cleanup via directory walk
  crit: component
  for: [python]
  if:
    type: text
    regex: os\.walk\s*\(\s*["']\.?/?(build|dist|out|target)["']\s*\)
- id: copy-complete-message
  desc: Copy completion status message
  crit: component
  if:
    type: text
    substr: Copy complete!
- id: copy-create-file-message
  desc: Copy create file status
  crit: component
  if:
    type: raw
    regex: '(Copy|Create) (File|Directory)'
- id: package-build-message
  desc: Package build status message
  crit: component
  if:
    type: text
    substr: Building package
- id: make-install-clean-command
  desc: Make install clean command
  crit: component
  if:
    type: raw
    regex: make (install|clean)
- id: package-build-tool-context
  desc: Package build tool context
  crit: component
  if:
    type: raw
    regex: \b(pkgmk|pkgproto|DESTDIR)\b
- id: build-bootstrap-script-basename
  desc: Build bootstrap or tarball script basename
  crit: component
  if:
    type: basename
    regex: '(^|[\\/])(autogen\.sh|bootstrap|mksrctar\.sh)$'
- id: unmount-command-reference
  desc: Unmount command reference
  crit: component
  if:
    type: text
    word: umount
- id: uninstall-function
  desc: JavaScript uninstall function
  crit: component
  for: [javascript]
  if:
    type: text
    regex: 'function\s+uninstall\s*\('
- id: unittest-testcase-context
  desc: unittest TestCase cleanup context
  crit: component
  for: [python]
  if:
    type: text
    regex: \b(unittest\.TestCase|tearDown|addCleanup|ignore_errors=True)\b
- id: python-package-cleanup-module
  desc: Python package cleanup module filename
  crit: component
  for: [python]
  if:
    type: basename
    regex: '(^|_)(req_install|req_uninstall|uninstall)\.py$'
- id: adjacent-tempfile-helper
  desc: Adjacent temporary file helper
  crit: component
  for: [python]
  if:
    type: text
    substr: def adjacent_tmp_file(
composite_rules:
- id: target-dev-dirs
  desc: Targets development directories
  crit: suspicious
  conf: 0.9
  attack: T1485
  needs: 3
  any:
  - id: target-git
  - id: target-node-modules
  - id: target-src
  - id: target-vscode-dir
  - id: target-idea-dir
  unless:
  - id: micro-behaviors/process/create/shell/host::require-vscode
  - id: well-known/tool/detection/sast::sast-scanner-integration
- id: env-conditional
  desc: Environment-based conditional check
  crit: component
  any:
  - id: env-check-js
  - id: node-env-ref
  unless:
  - id: pm2-env-check
- id: recursive-delete
  desc: Recursive directory deletion function
  crit: suspicious
  conf: 0.85
  attack: T1485
  any:
  - id: micro-behaviors/fs/directory/delete::rimraf
  - id: micro-behaviors/fs/directory/delete::rm-rf
  - id: micro-behaviors/fs/directory/delete::shutil-rmtree
  - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
- id: conditional-destroy
  desc: Conditional destruction based on environment
  crit: suspicious
  conf: 0.95
  attack: T1485
  size_max: 50000
  all:
  - id: env-conditional
  any:
  - id: micro-behaviors/fs/file/delete::fs-unlinkSync
  - id: micro-behaviors/fs/file/delete::fs-rmdir
  - id: micro-behaviors/fs/directory/delete::rimraf
  unless:
  - id: build-clean-rimraf
  - id: build-assets-root-clean
- id: android-storage-path
  desc: Android storage directory reference
  crit: component
  any:
  - id: android-sdcard
  - id: android-storage-emulated
- id: android-media-dirs
  desc: Android media directories
  crit: component
  any:
  - id: android-dcim
  - id: android-pictures
  - id: android-downloads
- id: shell-exec-capability
  desc: Shell execution capability
  crit: suspicious
  any:
  - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
  - id: micro-behaviors/process/create/shell/bridge::spawn-call
- id: target-android-storage
  desc: Targets Android storage directories
  crit: suspicious
  conf: 0.95
  attack: T1485
  near_lines: 80
  all:
  - id: android-storage-path
  - id: android-media-dirs
  - id: shell-exec-capability
  - id: mass-delete-action
  unless:
  - id: user-directory-comment
- id: mass-delete-action
  desc: Mass deletion action primitive
  crit: suspicious
  conf: 0.85
  any:
  - id: micro-behaviors/fs/directory/traverse::delete-unlink-node-py
  - id: micro-behaviors/fs/directory/traverse::delete-shell
  unless:
  - id: uninstall-function
- id: target-vscode
  desc: Targets .vscode configuration directory
  crit: suspicious
  conf: 0.85
  attack: T1485
  any:
  - id: target-vscode-dir
  - id: target-idea-dir
- id: benign-build-or-copy-context
  desc: Benign build or copy context
  crit: component
  any:
  - id: python-package-cleanup-module
  - id: adjacent-tempfile-helper
  - id: copy-complete-message
  - id: copy-create-file-message
  - id: package-build-message
  - id: make-install-clean-command
  - id: package-build-tool-context
  - id: build-bootstrap-script-basename
  - id: unmount-command-reference
  - id: build-walk-cleanup
  - id: unittest-testcase-context
- id: mass-delete
  desc: Mass file deletion pattern
  crit: suspicious
  conf: 0.85
  attack: T1485
  size_max: 40000
  near_lines: 30
  all:
  - id: micro-behaviors/fs/directory/traverse::traverse-readdir-walk-find
  - id: mass-delete-action
  unless:
  - id: build-file-allowlist-prune
  - id: metadata/package/tooling::autoconf-generated-script
  - id: metadata/package/tooling::libtool-generated-script
  - id: metadata/package/tooling::autotools-config-basename
  downgrade:
    any:
    - id: benign-build-or-copy-context
- id: python-desktop-mass-delete
  desc: Python desktop-targeted mass file deletion
  crit: hostile
  conf: 0.97
  attack: T1485
  all:
  - id: micro-behaviors/os/env/vars/user-info::userprofile-var
  - id: userprofile-desktop-join-python
  - id: micro-behaviors/fs/directory/readdir::readdir-python
  - id: micro-behaviors/fs/file/delete::py-remove
  - id: micro-behaviors/data/control-flow/analysis::for-loop-content
- id: python-geofenced-root-wipe
  desc: Python geofenced root filesystem wipe
  crit: hostile
  conf: 0.99
  attack: T1485
  all:
  - id: python-rm-root-recursive-argv
  - id: objectives/anti-analysis/geofencing/target-gating::target-activation-gate
  near_lines: 90
- id: protestware
  desc: Protestware pattern - conditional destruction
  crit: suspicious
  conf: 0.98
  attack: T1485
  mbc: B0031
  all:
  - id: conditional-destroy
  - id: target-dev-dirs
- id: with-callback
  desc: Wiper with HTTP callback
  crit: suspicious
  conf: 0.95
  attack: T1485
  mbc: B0031
  all:
  - id: recursive-delete
  - id: micro-behaviors/communications/http/request/
- id: env-check-js
  desc: Node.js environment variable comparison for protestware
  crit: component
  conf: 1.0
  any:
  - id: env-check-js--rx-1
  - id: env-check-js--rx-2
  - id: env-check-js--rx-3
  - id: env-check-js--rx-4
  - id: env-check-js--rx-5
  - id: env-check-js--rx-6
  - id: env-check-js--rx-7
  - id: env-check-js--rx-8
  - id: env-check-js--rx-9
