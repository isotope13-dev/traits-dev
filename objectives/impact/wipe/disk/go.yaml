defaults:
  platforms: [windows, linux, macos]
  for: [go, elf, macho, pe]
  attack: T1485
traits:
  - id: go-openfile-rdwr
    desc: Go os.OpenFile with O_RDWR
    crit: component
    if:
      type: text
      regex: os\.OpenFile\(.{0,50}os\.O_RDWR
  - id: go-write-call
    desc: Go Write/WriteAt call
    crit: component
    if:
      type: text
      regex: \.Write(At)?\(
  - id: gutmann-ref
    desc: Gutmann wipe standard reference
    crit: component
    if:
      type: text
      substr: Gutmann
      case_insensitive: true
  - id: dod-5220-ref
    desc: DoD 5220.22-M wipe standard
    crit: component
    if:
      type: text
      substr: DoD 5220.22-M
  - id: vsitr-ref
    desc: VSITR wipe standard
    crit: component
    if:
      type: text
      substr: VSITR
  - id: us-dod-ref
    desc: US DoD wipe reference
    crit: component
    if:
      type: text
      substr: US DoD
  - id: wipe-rule-profile-names
    desc: Multiple wipe profile names
    crit: suspicious
    conf: 0.96
    for: [go]
    count_min: 3
    if:
      type: text
      regex: "\\bRule(Fast|Gutmann|VSITR|UsDod5220_22_M)\\b"
  - id: wipe-flag-enum-names
    desc: Native and crypto wipe flags
    crit: suspicious
    conf: 0.95
    for: [go]
    count_min: 2
    if:
      type: text
      regex: "\\bFlag(Native|Crypto)\\b"
  - id: wipe-random-mode-labels
    desc: Native and crypto wipe labels
    crit: notable
    conf: 0.9
    for: [go]
    count_min: 2
    if:
      type: text
      regex: "Random(Native|Crypto)"
  - id: gutmann-ruleset-comment
    desc: Gutmann ruleset source comment
    crit: notable
    conf: 0.92
    for: [go]
    if:
      type: text
      regex: "Peter Gutmann alghoritm \\(35 passes\\)|lead-in of four random write patterns"
  - id: gutmann-byte-triplets-source
    desc: Gutmann byte triplets in source
    crit: suspicious
    conf: 0.95
    for: [go]
    count_min: 2
    if:
      type: text
      regex: "\\\\x92\\\\x49\\\\x24|\\\\x49\\\\x24\\\\x92|\\\\x6D\\\\xB6\\\\xDB"
  - id: gutmann-hex-1
    desc: Gutmann pattern 92 49 24
    crit: component
    if:
      type: hex
      section: .text
      pattern: 92 49 24 92 49 24
  - id: gutmann-hex-2
    desc: Gutmann pattern 49 24 92
    crit: component
    if:
      type: hex
      section: .text
      pattern: 49 24 92 49 24 92
  - id: gutmann-hex-3
    desc: Gutmann pattern 24 92 49
    crit: component
    if:
      type: hex
      section: .text
      pattern: 24 92 49 24 92 49
  - id: gutmann-hex-4
    desc: Gutmann pattern 6D B6 DB
    crit: component
    if:
      type: hex
      section: .text
      pattern: 6D B6 DB 6D B6 DB
  - id: gutmann-hex-5
    desc: Gutmann pattern B6 DB 6D
    crit: component
    if:
      type: hex
      section: .text
      pattern: B6 DB 6D B6 DB 6D
  - id: gutmann-hex-6
    desc: Gutmann pattern DB 92 49
    crit: component
    if:
      type: hex
      section: .text
      pattern: DB 92 49 DB 92 49
  - id: go-filepath-walkdir
    desc: Go filepath.WalkDir
    crit: component
    if:
      type: text
      substr: filepath.WalkDir
  - id: go-ioutil-readfile
    desc: Go ioutil.ReadFile
    crit: component
    if:
      type: text
      exact: io/ioutil.ReadFile
  - id: go-ioutil-writefile
    desc: Go ioutil.WriteFile
    crit: component
    if:
      type: text
      exact: io/ioutil.WriteFile
  - id: go-math-rand
    desc: Go math/rand package
    crit: component
    if:
      type: text
      exact: math/rand
  - id: go-rand-read
    desc: Go math/rand Read method
    crit: component
    if:
      type: text
      exact: math/rand.(*Rand).Read
  - id: randstringbytes-fn
    desc: Custom random filler generator
    crit: suspicious
    conf: 0.94
    if:
      type: text
      exact: main.RandStringBytes
  - id: fake-upx0-rwx
    desc: Large RWX UPX0 decoy section
    crit: suspicious
    conf: 0.95
    for: [pe]
    platforms: [windows]
    if:
      type: section
      exact: UPX0
      writable: true
      executable: true
      length_min: 1000000
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/developer/
  - id: fake-upx1-rwx
    desc: Large RWX UPX1 payload section
    crit: suspicious
    conf: 0.95
    for: [pe]
    platforms: [windows]
    if:
      type: section
      exact: UPX1
      writable: true
      executable: true
      length_min: 500000
    unless:
      - id: well-known/tools/reverse-engineering::ollydbg-plugin-export
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/developer/
  - id: giant-string-blob-metric
    desc: Giant embedded string blob metric
    crit: component
    conf: 0.9
    for: [pe]
    platforms: [windows]
    if:
      type: metrics
      field: binary.max_string_length
      min: 65536
composite_rules:
  - id: giant-string-blob
    desc: Giant embedded string blob
    crit: suspicious
    conf: 0.9
    for: [pe]
    platforms: [windows]
    all:
      - id: metadata/lang/compiler/systems::go-runtime-symbol
      - id: giant-string-blob-metric
  - id: secure-wipe-pattern
    desc: Opens file for read-write and removes
    crit: notable
    conf: 0.8
    all:
      - id: go-openfile-rdwr
      - id: go-write-call
      - id: micro-behaviors/fs/file/delete::os-Remove-string
  - id: standards-reference
    desc: References to secure wiping standards
    crit: notable
    conf: 0.9
    any:
      - id: gutmann-ref
      - id: dod-5220-ref
      - id: vsitr-ref
      - id: us-dod-ref
  - id: gutmann-patterns
    desc: Uses Gutmann secure deletion overwrite
    crit: notable
    conf: 0.95
    needs: 5
    any:
      - id: gutmann-hex-1
      - id: gutmann-hex-2
      - id: gutmann-hex-3
      - id: gutmann-hex-4
      - id: gutmann-hex-5
      - id: gutmann-hex-6
  - id: go-walk-capability
    desc: Go filesystem walk capability
    crit: component
    any:
      - id: micro-behaviors/fs/file/operations::filepath-walk
      - id: go-filepath-walkdir
  - id: go-remove-capability
    desc: Go file removal capability
    crit: component
    any:
      - id: micro-behaviors/fs/file/delete::os-Remove-string
      - id: micro-behaviors/fs/file/delete::os-RemoveAll-string
  - id: overwrite-randomizer
    desc: Random overwrite data generator
    crit: suspicious
    conf: 0.9
    all:
      - id: go-math-rand
      - id: randstringbytes-fn
    any:
      - id: go-rand-read
      - id: go-ioutil-readfile
    needs: 1
  - id: random-overwrite-walk
    desc: Walks files and overwrites with random data
    crit: suspicious
    conf: 0.96
    all:
      - id: go-walk-capability
      - id: overwrite-randomizer
    any:
      - id: micro-behaviors/fs/file/operations::ioutil-write-file
      - id: go-ioutil-writefile
    needs: 1
  - id: mass-destruction
    desc: Recursively walks filesystem and deletes
    crit: notable
    conf: 0.7
    all:
      - id: go-walk-capability
      - id: micro-behaviors/fs/file/delete::os-RemoveAll-string
  - id: secure-wiper
    desc: Highly confident secure wiper
    crit: suspicious
    conf: 0.99
    mbc: B0031
    needs: 2
    any:
      - id: secure-wipe-pattern
      - id: mass-destruction
      - id: standards-reference
      - id: wipe-rule-profile-names
      - id: gutmann-ruleset-comment
      - id: gutmann-patterns
  - id: go-disk-wiper
    desc: Go disk wiper
    crit: hostile
    conf: 0.95
    attack: T1561
    for: [go]
    all:
      - id: secure-wipe-pattern
    any:
      - id: standards-reference
      - id: objectives/anti-static/obfuscation/payload::giant-string-blob
  - id: go-wipe-rules-library
    desc: Go multi-standard wipe rules library
    crit: hostile
    conf: 0.97
    for: [go]
    all:
      - id: wipe-rule-profile-names
      - id: standards-reference
    any:
      - id: wipe-flag-enum-names
      - id: wipe-random-mode-labels
      - id: gutmann-ruleset-comment
      - id: gutmann-byte-triplets-source
      - id: gutmann-patterns
  - id: fake-upx-random-overwrite-wiper
    desc: Fake UPX Go random overwrite wiper
    crit: hostile
    conf: 0.98
    all:
      - id: random-overwrite-walk
      - id: fake-upx0-rwx
      - id: fake-upx1-rwx
      - id: metadata/binary/layout::large-overlay-64k
      - id: giant-string-blob
