defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]
  attack: T1561.001
  mbc: E1561

traits:
  - id: erase-mbr-symbol
    desc: Erase MBR symbol
    crit: suspicious
    conf: 0.94
    if:
      type: symbol
      regex: '(^|[./])EraseMbr$'
    unless:
      - id: well-known/tool/detection/

  - id: dd-zero-mbr-command-text
    desc: dd command overwrites MBR text
    crit: suspicious
    conf: 0.96
    platforms: [unix]
    for: [elf, macho]
    if:
      type: text
      regex: 'dd\s+if=/dev/zero.{0,80}bs=(446|512).{0,40}count=1'
    unless:
      - id: well-known/tool/detection/

  - id: dd-zero-mbr-command-pe-bytes
    desc: dd command overwrites MBR PE bytes
    crit: suspicious
    conf: 0.96
    platforms: [windows]
    for: [pe]
    if:
      type: raw
      regex: 'dd\s+if=/dev/zero.{0,80}bs=(446|512).{0,40}count=1'
    unless:
      - id: well-known/tool/detection/

composite_rules:
  - id: dd-mbr-wiper-binary
    desc: Binary contains dd MBR wiper
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
    any:
      - id: dd-zero-mbr-command-text
      - id: dd-zero-mbr-command-pe-bytes
    needs: 1
    unless:
      - id: well-known/tool/detection/
