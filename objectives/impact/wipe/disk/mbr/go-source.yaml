defaults:
  platforms: [unix]
  for: [go]
  attack: T1561.001
  mbc: E1561

traits:
  - id: dd-zero-mbr-command-literal
    desc: dd command overwrites MBR
    crit: suspicious
    conf: 0.97
    if:
      type: literal
      regex: 'dd\s+if=/dev/zero\s+of=(%s|/dev/[A-Za-z0-9/_-]+)\s+bs=(446|512)\s+count=1'
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/detection/

  - id: erase-mbr-function-name
    desc: Erase MBR function name
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      kind: function
      regex: '(?i)(erase|wipe|zero|destroy)Mbr$'
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/detection/

composite_rules:
  - id: dd-mbr-wiper-source
    desc: Executes dd MBR overwrite command
    crit: hostile
    conf: 0.99
    near_lines: 80
    all:
      - id: dd-zero-mbr-command-literal
      - id: micro-behaviors/process/create/direct::exec-command
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/detection/
