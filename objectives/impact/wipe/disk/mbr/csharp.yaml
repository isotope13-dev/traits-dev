defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1561.002
  mbc: E1561

traits:
  - id: csharp-overwrite-mbr-method
    desc: C# OverwriteMBR method
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: OverwriteMBR
  - id: csharp-kernel32-createfile-import
    desc: C# kernel32 CreateFile import
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'DllImport\("kernel32"\)[\s\S]{0,260}CreateFile'
  - id: csharp-kernel32-writefile-import
    desc: C# kernel32 WriteFile import
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'DllImport\("kernel32"\)[\s\S]{0,260}WriteFile'
  - id: csharp-boot-sector-write-size
    desc: C# boot sector write size
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'WriteFile\([^;\n]{0,120},\s*512U\s*,'

composite_rules:
  - id: csharp-mbr-boot-sector-wiper
    desc: C# MBR boot sector wiper
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-overwrite-mbr-method
      - id: csharp-kernel32-createfile-import
      - id: csharp-kernel32-writefile-import
      - id: csharp-boot-sector-write-size
