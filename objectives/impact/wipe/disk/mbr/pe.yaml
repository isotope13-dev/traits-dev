defaults:
  platforms:
    - windows
  for:
    - pe
  attack: T1561.002
composite_rules:
  - id: raw-disk-write-pe
    desc: Raw disk write via PhysicalDrive API chain
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/impact/system/directory::physical-drive-unc
      - id: micro-behaviors/fs/file/open::createfile-api
      - id: micro-behaviors/fs/file/write/direct::writefile-api
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
  - id: mbr-wiper-pe
    desc: MBR disk wiper in PE binary
    crit: hostile
    conf: 0.98
    mbc: E1561
    all:
      - id: raw-disk-write-pe
    any:
      - id: objectives/impact/wipe/disk/term::mbr-ref
      - id: objectives/impact/system/shutdown::shutdown-exe-string
