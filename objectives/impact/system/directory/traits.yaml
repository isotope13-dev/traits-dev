defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1485
traits:
  - id: linux-etc-delete
    desc: Linux /etc directory deletion attempt
    crit: notable
    conf: 0.95
    platforms:
      - linux
    if:
      type: text
      regex: rm\s+-rf\s+/etc(\s|$)|shutil\.rmtree.{0,50}["']/etc["']
  - id: linux-usr-delete
    desc: Linux /usr directory deletion attempt
    crit: notable
    conf: 0.95
    platforms:
      - linux
    if:
      type: text
      regex: rm\s+-rf\s+/usr(/\*|\s|$)|shutil\.rmtree.{0,50}["']/usr["']
  - id: linux-boot-delete
    desc: Linux /boot directory deletion attempt
    crit: suspicious
    conf: 0.95
    platforms:
      - linux
    if:
      type: text
      regex: rm\s+-rf\s+/boot|shutil\.rmtree.{0,50}["']/boot
    unless:
      - id: well-known/tool/detection/security-scanner::defensive-dangerous-command-doc
      - id: metadata/package/testing/presence/fixture::xml-testdata-directory-path
      - id: well-known/app/tailscale::tailscale-source-token
  - id: root-wipe
    desc: Root filesystem wipe attempt
    crit: suspicious
    conf: 0.95
    attack: T1561
    if:
      type: text
      regex: rm\s+-rf\s+/\s|rm\s+-rf\s+/\*|shutil\.rmtree.{0,50}["']/["']
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: metadata/package/testing/harness/runtime/
      - type: text
        substr: Sanitizes the command string to prevent shell injection.
      - id: micro-behaviors/process/create/shell/guard::destructive-action-prohibition-phrase
      - id: objectives/impact/system/directory/
      - id: well-known/tool/detection/
      - id: objectives/supply-chain/trojanized/app/debug-probe/
  - id: macos-system-delete
    desc: macOS system directory deletion
    crit: suspicious
    conf: 0.95
    platforms:
      - macos
    if:
      type: string_literal
      regex: rm\s+-rf.{0,50}(/System|/Library/System)|shutil\.rmtree.{0,50}/System
  - id: physical-drive0
    desc: Windows PhysicalDrive0 reference
    crit: notable
    conf: 0.9
    attack: T1561.002
    if:
      type: text
      substr: PhysicalDrive0
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: physical-drive-unc
    desc: Windows \\.\PhysicalDrive UNC path reference
    crit: notable
    conf: 0.7
    attack: T1561.002
    if:
      type: text
      regex: \\\\\.\\PhysicalDrive\d+
      case_insensitive: true
  - id: rmtree-call
    desc: rmtree critical path deletion
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (shutil\.)?rmtree\s*\([^)]{0,80}["'](/|[A-Za-z]:\\|~[/\\])
    unless:
      - type: basename
        regex: '^(common_ship|ship)\.py$'
  - id: rmdir-recursive
    desc: rmdir recursive command
    crit: component
    conf: 0.6
    if:
      type: text
      regex: \brd\s+/[sq]\b|\brmdir\s+/[sq]\b
    unless:
      - type: basename
        exact: build-pty4j-libpty.bat
  - id: windows-system32-delete-cmd-first
    desc: Windows System32 deletion (cmd first)
    crit: suspicious
    if:
      type: text
      regex: (rmdir|rd|remove)[^\\r\\n]{0,50}[Ss]ystem32|del[^\\r\\n]{0,50}[Ss]ystem32\\[^sS]
      platforms:
        - windows
      not:
        - regex: '@%systemroot%\\system32\\[^",<]+,-[0-9]+'
    unless:
      - id: well-known/app/aui-agent-builder/
      - id: metadata/library/pywin32::pywin32-binding-module
  - id: windows-system32-delete-path-first
    desc: Windows System32 deletion (path first)
    crit: suspicious
    if:
      type: text
      regex: (?i)[Ss]ystem32(\\\\\*|["' ]).{0,40}(del\b|r(d|mdir)\b)
      platforms:
        - windows
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: well-known/app/aui-agent-builder/
      - id: metadata/library/pywin32::pywin32-binding-module
  - id: windows-recursive-delete-rd
    desc: Windows recursive deletion via rmdir/rd
    crit: component
    if:
      type: text
      regex: r(d|mdir)\s+/s
      platforms:
        - windows
    unless:
      - type: basename
        exact: build-pty4j-libpty.bat
  - id: windows-recursive-delete-target-windir
    desc: Windows recursive deletion target WINDIR
    crit: component
    if:
      type: text
      regex: '(?i)\b(del|erase|rd|rmdir)\b[^\r\n]{0,160}%WINDIR%'
      platforms:
        - windows
  - id: windows-recursive-delete-target-systemroot
    desc: Windows recursive deletion target SYSTEMROOT
    crit: component
    if:
      type: text
      regex: '(?i)\b(del|erase|rd|rmdir)\b[^\r\n]{0,160}%SYSTEMROOT%'
      platforms:
        - windows
  - id: windows-recursive-delete-del
    desc: Windows forced quiet file deletion
    crit: component
    if:
      type: text
      regex: del\s+/f\s+/q
      platforms:
        - windows
    downgrade:
      any:
        - id: objectives/evasion/self-delete/file/script::timeout-del-self
composite_rules:
  - id: root-wipe-safety-context
    desc: Script guards or blocks its own root-wipe command
    crit: exception
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/shell/guard::command-blocked-marker
      - id: destructive-action-prohibition-text
  - id: destructive-action-prohibition-text
    desc: Destructive action prohibition text
    crit: notable
    conf: 0.88
    for: [scripts]
    all:
      - id: micro-behaviors/process/create/shell/guard::destructive-action-prohibition-phrase
      - id: micro-behaviors/fs/directory/delete::rm-rf
    near_lines: 2
  - id: windows-system32-delete
    desc: Windows System32 directory deletion
    crit: suspicious
    conf: 0.95
    platforms:
      - windows
    any:
      - id: windows-system32-delete-cmd-first
      - id: windows-system32-delete-path-first
  - id: windows-recursive-delete
    desc: Windows system directory recursive deletion
    crit: notable
    conf: 0.9
    platforms:
      - windows
    any:
      - id: windows-recursive-delete-rd-path
      - id: windows-recursive-delete-del-path
  - id: windows-recursive-delete-rd-path
    desc: Windows recursive delete via rmdir with target
    crit: notable
    conf: 0.9
    platforms:
      - windows
    all:
      - id: windows-recursive-delete-rd
      - id: windows-recursive-delete-target
  - id: windows-recursive-delete-del-path
    desc: Windows recursive delete via del with target
    crit: notable
    conf: 0.9
    platforms:
      - windows
    all:
      - id: windows-recursive-delete-del
      - id: windows-recursive-delete-target
  - id: windows-recursive-delete-target
    desc: Windows recursive deletion target directories
    crit: notable
    any:
      - id: windows-recursive-delete-target-windir
      - id: windows-recursive-delete-target-systemroot
  - id: mbr-target
    desc: MBR/Boot sector targeting
    crit: notable
    conf: 0.95
    attack: T1561.002
    any:
      - id: micro-behaviors/fs/path/device/storage::dev-sda
      - id: micro-behaviors/fs/path/device/storage::dev-hda
      - id: physical-drive0
      - id: physical-drive-unc
    downgrade:
      any:
        - id: metadata/library/data::botocore-lib
        - id: metadata/import/python::boto3
        - id: well-known/lib/paramiko::paramiko-python-library
  - id: windows-raw-disk-io-api-set
    desc: Raw disk I/O helper API set
    crit: component
    conf: 0.88
    platforms:
      - windows
    all:
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/handle::device-io-control-win
      - id: micro-behaviors/fs/file/read::read-file
  - id: windows-raw-disk-read-profile
    desc: Windows raw disk read profile
    crit: notable
    conf: 0.92
    attack: T1561.001
    platforms:
      - windows
    all:
      - id: physical-drive-unc
      - id: windows-raw-disk-io-api-set
  - id: recursive-delete-cmd
    desc: Recursive deletion command pattern
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/fs/directory/delete::shutil-rmtree
      - id: micro-behaviors/fs/file/delete::py-rmtree
      - id: micro-behaviors/fs/directory/delete::rm-rf
      - id: rmdir-recursive
  - id: system-dir-reference
    desc: Reference to critical system directories
    crit: component
    conf: 0.4
    any:
      - id: micro-behaviors/fs/path/system/
  - id: mass-deletion
    desc: Mass system file deletion
    crit: notable
    conf: 0.95
    near_bytes: 1024
    all:
      - id: recursive-delete-cmd
      - id: micro-behaviors/data/control-flow/analysis::iteration-loop-pattern
      - id: system-dir-reference
    unless:
      - id: root-wipe-safety-context
