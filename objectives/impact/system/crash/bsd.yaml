defaults:
  platforms: [unix]
  for: [shell]
  attack: T1499.004
  mbc: B0033
traits:
  - id: dev-kmem-write
    desc: Writes to kernel memory device
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'echo\s+1\s*>\s*/dev/kmem'
composite_rules:
  - id: bsd-kernel-panic-routine
    desc: BSD kernel panic routine
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: micro-behaviors/os/kernel/sysctl::kern-panic-write
      - id: dev-kmem-write
      - id: micro-behaviors/process/terminate/signal::kill-abrt-pid-zero
  - id: exit-trap-kernel-panic
    desc: Kernel panic forced on exit
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/exit/trap::shell-exit-trap
      - id: bsd-kernel-panic-routine
    near_lines: 80
