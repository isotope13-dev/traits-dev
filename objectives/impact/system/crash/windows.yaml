defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
    - pe
  attack: T1499.004
traits:
  - id: nt-raise-hard-error
    desc: NtRaiseHardError API (BSOD trigger)
    crit: notable
    conf: 0.98
    if:
      type: string_value
      substr: NtRaiseHardError
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: rtl-adjust-privilege
    desc: RtlAdjustPrivilege API reference
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: RtlAdjustPrivilege
  - id: shutdown-privilege
    desc: SeShutdownPrivilege constant
    crit: notable
    conf: 0.7
    for:
      - python
    if:
      type: string_value
      regex: RtlAdjustPrivilege\s*\(\s*(c_uint\()?19
  - id: set-system-power-state
    desc: SetSystemPowerState API call
    crit: suspicious
    conf: 0.9
    for:
      - python
    attack: T1529
    if:
      type: string_value
      substr: SetSystemPowerState
  - id: status-assertion-failure
    desc: STATUS_ASSERTION_FAILURE error code (BSOD)
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: 0x[Cc]000007[Bb]|3221226363
  - id: ctypes-import
    desc: Python ctypes import statement
    crit: notable
    conf: 0.6
    for:
      - python
    if:
      type: raw
      substr: from ctypes import
  - id: ctypes-import-module
    desc: Python ctypes module import statement
    crit: notable
    conf: 0.6
    for:
      - python
    size_max: 5000
    if:
      type: raw
      regex: (?m)^\s*import\s+ctypes\b
composite_rules:
  - id: ntdll-reference
    desc: Reference to ntdll library (generic or Python ctypes)
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/os/syscall/invoke::ntdll-import
      - id: micro-behaviors/dylib/load::ctypes-windll
    downgrade:
      any:
        - id: metadata/format::many-imports
  - id: bsod-raise-error
    desc: BSOD via NtRaiseHardError API call
    crit: suspicious
    conf: 0.99
    mbc: B0033
    all:
      - id: ntdll-reference
      - id: nt-raise-hard-error
    downgrade:
      any:
        - id: metadata/format::many-exports
  - id: bsod-adjust-privilege
    desc: BSOD via privilege adjustment with
    crit: hostile
    conf: 0.98
    mbc: B0033
    all:
      - id: ntdll-reference
      - id: rtl-adjust-privilege
      - id: status-assertion-failure
  - id: python-bsod-traits
    desc: Python BSOD trigger via ctypes
    crit: hostile
    conf: 0.99
    for:
      - python
    all:
      - id: python-ctypes-import
      - id: ntdll-reference
    any:
      - id: nt-raise-hard-error
      - id: rtl-adjust-privilege
  - id: python-ctypes-import
    desc: Python ctypes import (from-import or module import)
    crit: notable
    conf: 0.7
    for:
      - python
    any:
      - id: ctypes-import
      - id: ctypes-import-module
  - id: windows-powerstate-abuse
    desc: Privilege + power-state API abuse in Python
    crit: hostile
    conf: 0.98
    for:
      - python
    attack: T1529
    all:
      - id: python-ctypes-import
      - id: micro-behaviors/dylib/load::ctypes-windll
      - id: rtl-adjust-privilege
      - id: set-system-power-state
