# Impact - System Crash (Windows)
# Blue Screen of Death and system crash techniques
# ATT&CK: T1499.004 (Application or System Exploitation)

defaults:
  for: [python, pe]
  attack: "T1499.004"

traits:
  # NtRaiseHardError - forces BSOD
  - id: nt-raise-hard-error
    desc: NtRaiseHardError API (BSOD trigger)
    crit: notable
    conf: 0.98
    if:
      type: string
      substr: "NtRaiseHardError"

  # RtlAdjustPrivilege - enables shutdown privilege
  - id: rtl-adjust-privilege
    desc: RtlAdjustPrivilege API (privilege escalation)
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "RtlAdjustPrivilege"

  # Shutdown privilege constant (19)
  - id: shutdown-privilege
    desc: SeShutdownPrivilege constant
    crit: notable
    conf: 0.7
    for: [python]
    if:
      type: string
      regex: "RtlAdjustPrivilege\\s*\\(\\s*(c_uint\\()?19"

  - id: set-system-power-state
    desc: SetSystemPowerState API call
    crit: suspicious
    conf: 0.9
    for: [python]
    attack: "T1529"
    if:
      type: string
      substr: "SetSystemPowerState"

  # STATUS_ASSERTION_FAILURE error code
  - id: status-assertion-failure
    desc: STATUS_ASSERTION_FAILURE error code (BSOD)
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: "0x[Cc]000007[Bb]|3221226363"

  # Python ctypes import
  - id: ctypes-import
    desc: Python ctypes import statement
    crit: notable
    conf: 0.6
    for: [python]
    if:
      type: string
      substr: "from ctypes import"

  - id: ctypes-import-module
    desc: Python ctypes module import statement
    crit: notable
    conf: 0.6
    for: [python]
    if:
      type: raw
      regex: "(?m)^\\s*import\\s+ctypes\\b"

  # NOTE: Removed bsod-trigger-yara and python-bsod-yara - replaced with composites below

composite_rules:
  # ntdll-reference: composite referencing canonical ntdll-import plus windll.ntdll Python variant
  - id: ntdll-reference
    desc: Reference to ntdll library (generic or Python ctypes)
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/os/syscall/invoke::ntdll-import
      - id: micro-behaviors/dylib/load::ctypes-windll

  # Full BSOD trigger pattern
  # BSOD trigger via trait references (NtRaiseHardError path)
  - id: bsod-raise-error
    desc: BSOD via NtRaiseHardError API call
    crit: suspicious
    conf: 0.99
    attack: "T1499.004"
    mbc: "B0033"
    all:
      - id: ntdll-reference
      - id: nt-raise-hard-error
    downgrade:
      any:
        - id: metadata/format::many-exports

  # BSOD trigger via trait references (RtlAdjustPrivilege path)
  - id: bsod-adjust-privilege
    desc: BSOD via privilege adjustment with
    crit: hostile
    conf: 0.98
    attack: "T1499.004"
    mbc: "B0033"
    all:
      - id: ntdll-reference
      - id: rtl-adjust-privilege
      - id: status-assertion-failure

  # Python BSOD via trait references
  - id: python-bsod-traits
    desc: Python BSOD trigger via ctypes
    crit: hostile
    conf: 0.99
    for: [python]
    attack: "T1499.004"
    all:
      - id: python-ctypes-import
      - id: ntdll-reference
    any:
      - id: nt-raise-hard-error
      - id: rtl-adjust-privilege

  - id: python-ctypes-import
    desc: Python ctypes import (from-import or module import)
    crit: notable
    conf: 0.7
    for: [python]
    any:
      - id: ctypes-import
      - id: ctypes-import-module

  - id: windows-powerstate-abuse
    desc: Privilege + power-state API abuse in Python
    crit: hostile
    conf: 0.98
    for: [python]
    attack: "T1529"
    all:
      - id: python-ctypes-import
      - id: micro-behaviors/dylib/load::ctypes-windll
      - id: rtl-adjust-privilege
      - id: set-system-power-state
