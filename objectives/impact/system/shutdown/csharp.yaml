defaults:
  platforms:
    - windows
  for:
    - csharp
  attack: T1529
  mbc: B0029
traits:
  - id: shutdown-exe
    desc: Windows shutdown executable reference
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: shutdown.exe
  - id: shutdown-force-flag-csharp
    desc: Forced shutdown flag in ProcessStartInfo
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: new ProcessStartInfo("shutdown.exe", "-f")
  - id: shutdown-run-command
    desc: Shutdown command persisted for later execution
    crit: suspicious
    conf: 0.98
    if:
      type: string_literal
      exact: cmd.exe /c shutdown -f
  - id: shutdown-warning-text
    desc: User-facing shutdown warning text
    crit: component
    conf: 0.98
    if:
      type: string_literal
      exact: Due to the nature of the material, the computer will now shutdown.
  - id: shutdown-process-start-call
    desc: Shutdown process start call
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: Process.Start
      arg:
        kind: string
        exact: shutdown
  - id: shutdown-logoff-process-start-call
    desc: Logoff process start call
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: Process.Start
      arg:
        kind: string
        exact: /l
  - id: powrprof-set-suspend-state
    desc: Power suspend API import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: SetSuspendState
  - id: powrprof-dll-import
    desc: Power profile DLL import
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: powrprof.dll
composite_rules:
  - id: forced-system-shutdown
    desc: Forced Windows shutdown routine
    crit: hostile
    conf: 0.98
    all:
      - id: shutdown-exe
      - id: shutdown-force-flag-csharp
    any:
      - id: shutdown-run-command
      - id: shutdown-warning-text
  - id: remote-power-control-source
    desc: Remote power control source
    crit: suspicious
    conf: 0.95
    all:
      - id: shutdown-process-start-call
      - id: shutdown-logoff-process-start-call
    any:
      - id: powrprof-set-suspend-state
      - id: powrprof-dll-import
