defaults:
  platforms: [windows]
  for: [csharp]
  attack: "T1529"
  mbc: "B0029"
traits:
  - id: shutdown-exe
    desc: Windows shutdown executable reference
    crit: notable
    conf: 0.9
    if:
      type: string
      exact: "shutdown.exe"
  - id: shutdown-force-flag-csharp
    desc: Forced shutdown flag in ProcessStartInfo
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: 'new ProcessStartInfo("shutdown.exe", "-f")'
  - id: shutdown-run-command
    desc: Shutdown command persisted for later execution
    crit: suspicious
    conf: 0.98
    if:
      type: string
      exact: "cmd.exe /c shutdown -f"
  - id: shutdown-warning-text
    desc: User-facing shutdown warning text
    crit: component
    conf: 0.98
    if:
      type: string
      exact: "Due to the nature of the material, the computer will now shutdown."
composite_rules:
  - id: forced-system-shutdown
    desc: Forced Windows shutdown routine
    crit: hostile
    conf: 0.98
    all:
      - id: shutdown-exe
      - id: shutdown-force-flag-csharp
    any:
      - id: shutdown-run-command
      - id: shutdown-warning-text
