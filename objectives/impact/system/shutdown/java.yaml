defaults:
  platforms: [windows]
  for: [java, class, java_class]
  attack: T1529
  mbc: B0029

traits:
  - id: java-shutdown-command-token
    desc: Java shutdown command token
    crit: component
    conf: 0.9
    for: [java]
    if:
      type: text
      regex: 'Runtime\.getRuntime\(\)\.exec[\s\S]{0,180}shutdown'

  - id: java-shutdown-force-flags
    desc: Java shutdown force flags
    crit: component
    conf: 0.9
    for: [java]
    if:
      type: text
      regex: '"/s"[\s\S]{0,80}"/f"[\s\S]{0,80}"/t"[\s\S]{0,80}"0"'

  - id: jvm-shutdown-command-array
    desc: JVM forced shutdown command array
    crit: suspicious
    conf: 0.92
    for: [class, java_class]
    if:
      type: raw
      regex: 'shutdown[\s\S]{0,120}/s[\s\S]{0,80}/f[\s\S]{0,80}/t[\s\S]{0,80}0'

  - id: jvm-shutdown-flag-sequence
    desc: JVM shutdown flag sequence
    crit: suspicious
    conf: 0.9
    for: [class, java_class]
    if:
      type: raw
      regex: '/s[\s\S]{0,40}/f[\s\S]{0,40}/t[\s\S]{0,40}0'

  - id: jvm-runtime-forced-shutdown
    desc: JVM Runtime forced shutdown
    crit: suspicious
    conf: 0.97
    for: [class]
    if:
      type: raw
      regex: '(?s)java/lang/Runtime.{0,180}shutdown.{0,80}/s.{0,40}/f.{0,40}/t.{0,40}0.{0,120}exec'

composite_rules:
  - id: java-shutdown-command-array
    desc: Java forced shutdown command array
    crit: suspicious
    conf: 0.94
    for: [java]
    all:
      - id: java-shutdown-command-token
      - id: java-shutdown-force-flags

  - id: java-forced-system-shutdown
    desc: Java forced Windows shutdown
    crit: hostile
    conf: 0.98
    for: [java]
    all:
      - id: java-shutdown-command-array
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-source

  - id: jvm-forced-system-shutdown
    desc: JVM forced Windows shutdown
    crit: hostile
    conf: 0.98
    for: [class]
    all:
      - id: jvm-runtime-forced-shutdown
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
