defaults:
  for: [pe]
  platforms: [windows]
  attack: T1529

composite_rules:
  - id: autoit-iexpress-persistent-reboot
    desc: IExpress AutoIt payload with persistent reboot path
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/installer/sfx::cabinet-fdi-extraction
      - id: metadata/lang/compiled::autoit-script-resource-entry
      - id: metadata/lang/compiled::autoit-runtime-resource-entry
      - id: objectives/persistence/login/registry/run-key::pe-registry-self-install
      - id: objectives/impact/system/shutdown::shutdown-privilege-reboot-api
    unless:
      - id: metadata/signed/platform/
