defaults:
  platforms:
    - windows
  for:
    - pe
  attack: T1529
  mbc: B0029
traits:
  - id: shutdown-exe-string
    desc: Windows shutdown.exe string reference
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: shutdown.exe
  - id: shutdown-restart-flag
    desc: Shutdown restart flag in binary
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: shutdown.{0,30}-r
  - id: shutdown-force-flag-pe
    desc: Shutdown force flag in binary
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: shutdown.{0,30}-f
  - id: shutdown-zero-delay
    desc: Shutdown with zero-second delay
    crit: component
    conf: 0.85
    if:
      type: string_value
      regex: shutdown.{0,50}-t\s*0\b
composite_rules:
  - id: forced-reboot-pe
    desc: Forced immediate system reboot in PE
    crit: hostile
    conf: 0.98
    all:
      - id: shutdown-exe-string
      - id: shutdown-restart-flag
      - id: shutdown-force-flag-pe
      - id: shutdown-zero-delay
