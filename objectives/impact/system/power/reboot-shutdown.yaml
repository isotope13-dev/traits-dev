  any:
  - id: shell-profile-shutdown-sabotage--rx-1
  - id: shell-profile-shutdown-sabotage--rx-2
  - id: shell-profile-shutdown-sabotage--rx-3
  - id: shell-profile-shutdown-sabotage--rx-4
  - id: shell-profile-shutdown-sabotage--rx-5
  - id: shell-profile-shutdown-sabotage--rx-6
  - id: shell-profile-shutdown-sabotage--rx-7
  needs: 1
  unless:
