# Detects scripts that write shutdown / reboot commands into a shell
# profile (.bashrc / .zshrc) — sabotages the next interactive shell.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell]
traits:
  - id: shutdown-keyword
    desc: shutdown command keyword
    crit: component
    conf: 0.98
    if:
      type: text
      word: shutdown
  - id: bashrc-keyword
    desc: .bashrc shell profile filename
    crit: component
    conf: 0.98
    unless:
      - id: well-known/app/opencode-router
    if:
      type: text
      word: bashrc
  - id: zshrc-keyword
    desc: .zshrc shell profile filename
    crit: component
    conf: 0.98
    unless:
      - id: well-known/app/opencode-router
    if:
      type: text
      word: zshrc
composite_rules:
  - id: shell-profile-target
    desc: Shell profile filename reference
    crit: component
    any:
      - id: bashrc-keyword
      - id: zshrc-keyword
  - id: shell-profile-shutdown-sabotage
    desc: Shell profile shutdown command sabotage
    crit: suspicious
    conf: 0.95
    attack: "T1490, T1059"
    all:
      - id: shutdown-keyword
      - id: shell-profile-target
      - id: objectives/privilege-escalation/elevation-control/sudo::sudo-keyword
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: well-known/app/vscode::remote-ssh-doc-bundle
