defaults:
  platforms: [unix, windows]

traits:
  - id: shell-profile-shutdown-sabotage
    desc: Shell profile shutdown command sabotage
    crit: suspicious
    conf: 0.98
    for: [javascript, typescript, shell]
    attack: "T1490, T1059"
    if:
      type: text
      regex: '(?:\.bashrc|\.zshrc)[\s\S]{0,220}(?:appendFile|writeFile|echo|>>)[\s\S]{0,220}(?:sudo\s+)?shutdown\s+(?:-h\s+)?(?:now|-r)|(?:appendFile|writeFile|echo|>>)[\s\S]{0,220}(?:sudo\s+)?shutdown\s+(?:-h\s+)?(?:now|-r)[\s\S]{0,220}(?:\.bashrc|\.zshrc)'
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
