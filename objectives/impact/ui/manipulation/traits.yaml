defaults:
  platforms:
    - macos
    - ios
    - linux
    - unix
    - android
    - windows
traits:
  - id: dock-hide
    desc: macOS dock hiding
    crit: suspicious
    conf: 0.9
    attack: T1564.003
    for:
      - macho
    if:
      type: string_value
      regex: (?i)(hideDock|setActivationPolicy.{0,20}(accessory|prohibited))
  - id: screensaver-engine
    desc: macOS ScreenSaver control
    crit: notable
    conf: 0.8
    attack: T1491
    for:
      - macho
      - shell
    if:
      type: string_value
      substr: ScreenSaverEngine
    downgrade:
      any:
        - id: metadata/vendor/apple::system-component
        - id: metadata/signed/platform::apple
        - type: string_value
          regex: '@\(#\)PROGRAM:[A-Za-z][A-Za-z0-9]*\s+PROJECT:[A-Za-z]+-[0-9]+'
  - id: system-events-dup
    desc: macOS System Events control
    crit: notable
    conf: 0.65
    attack: T1059.002
    for:
      - macho
      - shell
    if:
      type: string_value
      substr: tell application "System Events"
  - id: window-watcher
    desc: macOS window/application monitoring
    crit: suspicious
    conf: 0.9
    attack: T1010
    for:
      - macho
    if:
      type: string_value
      substr: frontmostApplication
    downgrade:
      any:
        - id: metadata/vendor/apple::system-component
        - id: metadata/signed/platform::apple
        - type: string_value
          regex: '@\(#\)PROGRAM:[A-Za-z][A-Za-z0-9]*\s+PROJECT:[A-Za-z]+-[0-9]+'
  - id: xsession
    desc: Xsession reference
    crit: notable
    conf: 0.6
    attack: T1056
    for:
      - elf
      - shell
    if:
      type: string_value
      substr: Xsession
  - id: hid-idle-time
    desc: macOS HID idle time detection
    crit: suspicious
    conf: 0.8
    attack: T1010
    for:
      - macho
    if:
      type: string_value
      substr: HIDIdleTime
  - id: process-identifier
    desc: macOS process identifier access
    crit: notable
    conf: 0.7
    attack: T1010
    for:
      - macho
    if:
      type: string_value
      substr: processIdentifier
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/vendor/apple::system-component
        - type: string_value
          regex: '@\(#\)PROGRAM:[A-Za-z][A-Za-z0-9]*\s+PROJECT:[A-Za-z]+-[0-9]+'
composite_rules:
  - id: macos-spy-detected
    desc: macOS UI spying
    crit: suspicious
    conf: 0.95
    attack: T1010
    mbc: B0042
    for:
      - macho
    needs: 2
    any:
      - id: objectives/discovery/system/hardware::ioreg-screen-lock
      - id: hid-idle-time
      - id: window-watcher
      - id: process-identifier
    downgrade:
      any:
        - id: metadata/vendor/apple::system-component
        - id: metadata/signed/platform::apple
  - id: forced-browser-adware
    desc: Daemon forces browser to open URLs
    crit: hostile
    conf: 0.9
    attack: T1204.001
    for:
      - macho
    all:
      - id: micro-behaviors/process/create/shell::open-a-app
      - id: micro-behaviors/process/create/shell::shell-symbols
      - id: micro-behaviors/fs/chmod/executable/dangerous::shell-777
