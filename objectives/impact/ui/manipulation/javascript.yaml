defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  - id: page-overlay-takeover
    desc: Full-page DOM rewrite takeover
    crit: suspicious
    conf: 0.95
    attack: "T1491"
    all:
      - id: micro-behaviors/ui/delivery/logic::iframe-overlay-mask
      - id: micro-behaviors/ui/delivery/logic::body-children-hide
      - id: micro-behaviors/ui/delivery/logic::dom-template-clone
    any:
      - id: micro-behaviors/ui/delivery/logic::body-style-guard
      - id: micro-behaviors/ui/delivery/logic::remote-stylesheet-pivot
  - id: persistent-page-rewrite
    desc: Persistent browser page content rewrite
    crit: suspicious
    conf: 0.92
    attack: "T1491"
    all:
      - id: micro-behaviors/ui/delivery/logic::dom-mutation-observer
      - id: micro-behaviors/ui/delivery/logic::body-children-hide
      - id: micro-behaviors/ui/delivery/logic::dom-template-clone
    any:
      - id: micro-behaviors/ui/delivery/logic::body-style-guard
      - id: micro-behaviors/ui/delivery/logic::remote-stylesheet-pivot
