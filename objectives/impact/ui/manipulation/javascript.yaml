defaults:
  attack: T1491
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  - id: page-overlay-takeover
    desc: Full-page DOM rewrite takeover
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/impact/ui/delivery::iframe-overlay-mask
      - id: objectives/impact/ui/delivery::body-children-hide
      - id: objectives/impact/ui/delivery::dom-template-clone
    any:
      - id: objectives/impact/ui/delivery::body-style-guard
      - id: objectives/impact/ui/delivery::remote-stylesheet-pivot
  - id: persistent-page-rewrite
    desc: Persistent browser page content rewrite
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/impact/ui/delivery::dom-mutation-observer
      - id: objectives/impact/ui/delivery::body-children-hide
      - id: objectives/impact/ui/delivery::dom-template-clone
    any:
      - id: objectives/impact/ui/delivery::body-style-guard
      - id: objectives/impact/ui/delivery::remote-stylesheet-pivot
