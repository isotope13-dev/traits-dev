defaults:
  attack: T1491
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: localstorage-initiation-key
    desc: Uses named initiation localStorage gate key
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: 'localStorage\.(getItem|setItem)\(\s*["''][-a-z0-9_]*initiation[-a-z0-9_]*["'']'
  - id: body-pointer-events-none
    desc: Disables page interaction through pointer-events
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: document\.body\.style\.pointerEvents\s*=\s*['"]none['"]
  - id: audio-element-create
    desc: Creates browser audio element
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: createElement\(\s*['"]audio['"]\s*\)
  - id: audio-append-to-body
    desc: Appends audio element to document body
    crit: notable
    conf: 0.76
    if:
      type: text
      regex: document\.body\.appendChild\(\s*[A-Za-z_$][\w$]*\s*\)
  - id: remote-audio-src
    desc: Assigns remote audio source URL
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: \.src\s*=\s*['"]https?://.{1,220}\.(mp3|wav|ogg|m4a)['"]
  - id: audio-loop-enable
    desc: Enables looping audio playback
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: \.loop\s*=\s*!?0\b|\.loop\s*=\s*true\b
  - id: audio-play-catch
    desc: Plays audio with promise rejection suppression
    crit: notable
    conf: 0.77
    if:
      type: text
      regex: \.play\(\)\.catch\(\s*\(\s*=>\s*\{\s*\}\s*\)\s*\)
  - id: delayed-audio-arm
    desc: Arms delayed audio harassment
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: setTimeout\s*\(\s*\(\s*=>\s*\{[\s\S]{0,220}createElement\(\s*['"]audio['"]
  - id: delayed-audio-play
    desc: Delays browser audio playback
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: setTimeout\s*\(\s*\(\s*=>\s*\{[^}]{0,240}\.play\(\)\.catch\(
  - id: localstorage-date-gate
    desc: Uses localStorage timestamp gate before UI action
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'localStorage\.getItem\([^)]{0,80}\)[\s\S]{0,300}Date\.parse\([^)]{0,80}\)[\s\S]{0,160}localStorage\.setItem\('
  - id: date-parse-age-check
    desc: Compares stored date age before UI action
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: 'Date\.parse\([^)]{0,80}\)[\s\S]{0,80}/\s*864e?5[\s\S]{0,80}>\s*[1-9]\d*'
composite_rules:
  - id: delayed-ui-harassment-sequence
    desc: Delayed UI lock and audio harassment sequence
    crit: notable
    conf: 0.86
    all:
      - id: body-pointer-events-none
      - id: audio-element-create
      - id: audio-append-to-body
    any:
      - id: delayed-audio-arm
      - id: delayed-audio-play
  - id: locale-gated-audio-harassment
    desc: Locale-gated browser audio harassment
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/path/sensitive/browser::navigator-language
      - id: audio-element-create
      - id: remote-audio-src
    any:
      - id: delayed-audio-play
      - id: audio-loop-enable
  - id: locale-gated-ui-sabotage
    desc: Locale-gated browser UI sabotage with delayed harassment
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/path/sensitive/browser::navigator-language
      - id: micro-behaviors/fs/path/sensitive/browser::location-host-tld-match
      - id: body-pointer-events-none
      - id: remote-audio-src
    any:
      - id: localstorage-date-gate
      - id: date-parse-age-check
      - id: locale-gated-audio-harassment
  - id: page-overlay-takeover
    desc: Full-page DOM rewrite takeover
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/impact/ui/delivery::iframe-overlay-mask
      - id: objectives/impact/ui/delivery::body-children-hide
      - id: objectives/impact/ui/delivery::dom-template-clone
    any:
      - id: objectives/impact/ui/delivery::body-style-guard
      - id: objectives/impact/ui/delivery::remote-stylesheet-pivot
  - id: persistent-page-rewrite
    desc: Persistent browser page content rewrite
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/impact/ui/delivery::dom-mutation-observer
      - id: objectives/impact/ui/delivery::body-children-hide
      - id: objectives/impact/ui/delivery::dom-template-clone
    any:
      - id: objectives/impact/ui/delivery::body-style-guard
      - id: objectives/impact/ui/delivery::remote-stylesheet-pivot
