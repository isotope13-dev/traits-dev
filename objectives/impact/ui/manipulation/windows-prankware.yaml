defaults:
  platforms: [windows]
  for: [pe, go]
  attack: T1499

traits:
- id: hide-desktop-icons-command
  desc: Hide desktop icons command
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: hide_desktop_icons

- id: block-input-helper
  desc: BlockInput helper function
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: main.getBlockInputName

- id: swap-mouse-buttons-helper
  desc: Mouse button swap helper
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: main.swapMouseButtons

- id: cursor-position-helper
  desc: Cursor movement helper
  crit: component
  conf: 0.88
  if:
    type: symbol
    exact: main.getSetCursorPosName

- id: shutdown-prank-markers--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 8bsodu

- id: shutdown-prank-markers--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: voltage_H9

- id: shutdown-prank-markers--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: shutdown_prank

- id: screen-prank-fragments--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: 'rotate_2f'

- id: screen-prank-fragments--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: 'monitor_'

- id: screen-prank-fragments--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: '8bsodu'

- id: screen-prank-fragments--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 2
  if:
    type: text
    regex: 'voltage_H9'

composite_rules:
- id: windows-prankware-ui-disruption
  desc: Windows prankware UI disruption
  crit: suspicious
  conf: 0.92
  needs: 2
  any:
  - id: hide-desktop-icons-command
  - id: block-input-helper
  - id: swap-mouse-buttons-helper
  - id: cursor-position-helper
  - id: shutdown-prank-markers
  - id: screen-prank-fragments
- id: shutdown-prank-markers
  desc: Shutdown prank markers
  crit: notable
  conf: 0.9
  any:
  - id: shutdown-prank-markers--rx-1
  - id: shutdown-prank-markers--rx-2
  - id: shutdown-prank-markers--rx-3
  needs: 1
- id: screen-prank-fragments
  desc: Screen prank command fragments
  crit: notable
  conf: 0.85
  any:
  - id: screen-prank-fragments--rx-4
  - id: screen-prank-fragments--rx-5
  - id: screen-prank-fragments--rx-6
  - id: screen-prank-fragments--rx-7
  needs: 1
