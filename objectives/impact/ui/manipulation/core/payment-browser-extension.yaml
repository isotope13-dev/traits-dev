defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx]
  attack: T1491

traits:
- id: payment-account-selector-terms
  desc: Payment account selector terms
  crit: component
  conf: 0.94
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [javascript, typescript]
  if:
    type: text
    regex: 'bank-transfer|bank-account-list|nameBank|buttonAltx'

- id: payment-amount-dom-selectors
  desc: Payment amount DOM selectors
  crit: component
  conf: 0.94
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [javascript, typescript]
  if:
    type: text
    regex: 'amount-pay|txtSum|pos-order-summary|MuiTypography-h5'

- id: payment-print-button-selectors
  desc: Payment print button selectors
  crit: component
  conf: 0.9
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [javascript, typescript]
  if:
    type: text
    regex: 'buttonF1|posSell5|btn-danger\.btn-lg\.btn-exgreen|btn-primary\.btn-xl'

- id: payment-method-change-command
  desc: Payment method change command
  crit: component
  conf: 0.92
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [javascript, typescript]
  if:
    type: text
    regex: 'changeMethod(Payment|Sapo)'

- id: payment-amount-command
  desc: Payment amount command
  crit: component
  conf: 0.92
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [javascript, typescript]
  if:
    type: text
    regex: 'getAmount(Pos365|Sapo|Suno)|kiotviet'

- id: payment-print-command
  desc: Payment print command
  crit: component
  conf: 0.9
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [javascript, typescript]
  if:
    type: text
    regex: 'print(Pos365|Sapo|Suno)'

composite_rules:
- id: payment-pos-command-names
  desc: POS payment command names
  crit: component
  conf: 0.92
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [javascript, typescript]
  any:
  - id: payment-method-change-command
  - id: payment-amount-command
  - id: payment-print-command

- id: message-driven-payment-account-control
  desc: Message-driven payment account control
  crit: suspicious
  conf: 0.96
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [javascript, typescript]
  all:
  - id: payment-account-selector-terms
  - id: payment-pos-command-names
  - id: micro-behaviors/ui/window/manage/dom::dom-click-call
  - id: micro-behaviors/communications/ipc/message::chrome-runtime-on-message

- id: payment-total-dom-scraper
  desc: Payment total DOM scraper
  crit: suspicious
  conf: 0.94
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  for: [javascript, typescript]
  all:
  - id: payment-amount-dom-selectors
  - id: micro-behaviors/ui/window/manage/dom::dom-text-content-read
  any:
  - id: payment-pos-command-names
  - id: micro-behaviors/ui/window/manage/dom::dom-xpath-evaluate-call

- id: broad-extension-payment-page-manipulation
  desc: Broad extension manipulates payment pages
  crit: hostile
  conf: 0.98
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  scope: archive
  all:
  - id: message-driven-payment-account-control
  - id: payment-total-dom-scraper
  any:
  - id: micro-behaviors/process/inject/webextension::broad-content-script-injection
  - id: metadata/permission/host::content-script-all-http-sites

- id: broad-extension-payment-print-control
  desc: Broad extension controls payment printing
  crit: hostile
  conf: 0.96
  ref: sha256:3b744d89517c857b4c07fa0068aca8d2b1d688731bfd032bf98c1018bd027e64
  scope: archive
  all:
  - id: payment-print-button-selectors
  - id: payment-pos-command-names
  - id: micro-behaviors/ui/window/manage/dom::dom-click-call
  - id: micro-behaviors/communications/ipc/message::chrome-runtime-on-message
  any:
  - id: micro-behaviors/process/inject/webextension::broad-content-script-injection
  - id: metadata/permission/host::content-script-all-http-sites
