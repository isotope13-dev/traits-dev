# A social-invitation bot that also retrieves remote advertising configuration
# is a monetized automation extension, not an ordinary UI helper.
defaults:
  platforms: [windows, unix]
  for: [crx, xpi, zip]
  attack: T1491

composite_rules:
  - id: monetized-social-invitation-bot
    desc: Monetized social invitation automation
    crit: hostile
    conf: 0.96
    scope: archive
    all:
      - id: metadata/permission/host::content-script-social-meta
      - id: objectives/impact/ui/manipulation/core::autonomous-social-invitation-trigger
      - id: micro-behaviors/communications/http/services/google-apps-script::extension-ad-configuration-request
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
