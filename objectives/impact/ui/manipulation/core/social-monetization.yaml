# Social-invitation automation in an extension that also funds itself by pulling
# a remote ad list. Commercial greyware: the automation burdens the operator's
# own contacts and breaks the platform's terms, and the tool is ad-monetised.
defaults:
  platforms: [windows, unix]
  for: [crx, xpi, zip]
  attack: T1491

composite_rules:
  # Suspicious, not hostile. The ad leg (`action=getAds`) only proves an ad list
  # is *fetched* — it says nothing about where those ads are rendered. Fetching
  # a sponsor list to draw inside the extension's own popup, behind a visible
  # "SPONSOR" badge, is ordinary disclosed ad-supported freeware, not an attack;
  # a real FB Page-admin helper of exactly that shape was being convicted here.
  #
  # What would justify hostile is ads reaching the *visited page* — injection
  # into page content, or cloaked/undisclosed placement. No leg below
  # establishes that, so the composite must not claim it. Renamed accordingly:
  # it detects ad-supported invite automation, not a proven "monetized bot".
  - id: ad-supported-social-invitation-automation
    desc: Ad-funded social invitation automation
    crit: suspicious
    conf: 0.94
    scope: archive
    all:
      - id: metadata/permission/host::content-script-social-meta
      - id: objectives/impact/ui/manipulation/core::autonomous-social-invitation-trigger
      - id: micro-behaviors/communications/http/services/google-apps-script::extension-ad-configuration-request
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
