defaults:
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: screensaver-engine
    desc: macOS ScreenSaver control
    crit: notable
    conf: 0.8
    attack: T1491
    for:
      - macho
      - shell
    if:
      type: text
      substr: ScreenSaverEngine
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: metadata/signed/platform::apple
        - type: text
          regex: '@\(#\)PROGRAM:[A-Za-z][A-Za-z0-9]*\s+PROJECT:[A-Za-z]+-[0-9]+'
    unless:
      - id: well-known/app/macos-benign/
      - id: well-known/tool/reverse-engineering/frida/
  - id: system-events-dup
    desc: macOS System Events control
    crit: notable
    conf: 0.65
    attack: T1059.002
    for:
      - macho
      - shell
    if:
      type: text
      substr: tell application "System Events"
  - id: window-watcher
    desc: macOS window/application monitoring
    crit: suspicious
    conf: 0.9
    attack: T1010
    for:
      - macho
    if:
      type: text
      substr: frontmostApplication
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: metadata/signed/platform::apple
        - type: text
          regex: '@\(#\)PROGRAM:[A-Za-z][A-Za-z0-9]*\s+PROJECT:[A-Za-z]+-[0-9]+'
    unless:
      - id: well-known/tool/reverse-engineering/frida/
      - id: well-known/app/macos-benign::linearmouse-app
      - id: well-known/app/macos-benign::macos-dsym-debug-symbol
      - id: metadata/binary/framework::darwin-xcframework-path
  - id: hid-idle-time
    desc: macOS HID idle time detection
    crit: suspicious
    conf: 0.8
    attack: T1010
    for:
      - macho
    if:
      type: text
      substr: HIDIdleTime
  - id: process-identifier
    desc: macOS process identifier access
    crit: notable
    conf: 0.7
    attack: T1010
    for:
      - macho
    if:
      type: text
      substr: processIdentifier
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/binary/vendor/
        - type: text
          regex: '@\(#\)PROGRAM:[A-Za-z][A-Za-z0-9]*\s+PROJECT:[A-Za-z]+-[0-9]+'
composite_rules:
  - id: macos-spy-detected
    desc: macOS UI spying
    crit: suspicious
    conf: 0.95
    attack: T1010
    mbc: B0042
    for:
      - macho
    needs: 2
    any:
      - id: objectives/discovery/system/hardware/sysctl::ioreg-screen-lock
      - id: hid-idle-time
      - id: window-watcher
      - id: process-identifier
    unless:
      - id: well-known/app/macos-benign/
      - id: well-known/tool/reverse-engineering/frida/
      - id: well-known/app/macos-benign::linearmouse-app
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: metadata/signed/platform::apple
  - id: forced-browser-adware
    desc: Daemon forces browser to open URLs
    crit: hostile
    conf: 0.9
    attack: T1204.001
    for:
      - macho
    all:
      - id: micro-behaviors/process/create/shell/spawn::open-a-app
      - id: micro-behaviors/process/create/shell/spawn::shell-symbols
      - id: micro-behaviors/fs/chmod/executable/dangerous::shell-777
