defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
traits:
  - id: create-elliptic-rgn
    desc: CreateEllipticRgn GDI function
    crit: component
    conf: 0.8
    if:
      type: text
      word: CreateEllipticRgn
  - id: set-window-rgn
    desc: SetWindowRgn GDI function
    crit: notable
    conf: 0.8
    if:
      type: text
      word: SetWindowRgn
  - id: cancel-event-args
    desc: CancelEventArgs usage
    crit: component
    conf: 0.8
    if:
      type: text
      word: CancelEventArgs
composite_rules:
  - id: screen-overlay-lockout
    desc: Creates an inescapable overlay screen
    crit: hostile
    conf: 0.95
    all:
      - id: create-elliptic-rgn
      - id: set-window-rgn
      - id: cancel-event-args
  - id: anti-capture-overlay-lockout
    desc: Topmost overlay with capture exclusion and close prevention
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/ui/window/manage/control::window-anti-capture-affinity
    any:
      - id: micro-behaviors/ui/window/manage/visibility::topmost-window
      - id: micro-behaviors/ui/window/manage/visibility::borderless-window
      - id: micro-behaviors/ui/window/manage/visibility::no-taskbar-window
      - id: cancel-event-args
      - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
    needs: 3
