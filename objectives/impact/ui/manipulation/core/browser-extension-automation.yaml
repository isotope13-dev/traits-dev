defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1491

composite_rules:
- id: all-site-external-browser-automation
  desc: All-site externally driven browser automation
  crit: hostile
  conf: 0.97
  scope: archive
  all:
  - id: metadata/permission/manifest::externally-connectable
  - id: micro-behaviors/communications/ipc/message::chrome-runtime-on-message-external
  - id: micro-behaviors/process/inject/webextension::active-tab-scripting-authority
  - id: micro-behaviors/process/inject/webextension::content-script-all-frames
  any:
  - id: micro-behaviors/process/attach/webextension::chrome-debugger-input-dispatch
  - id: micro-behaviors/process/attach/webextension::chrome-debugger-send-command
  - id: micro-behaviors/data/db/web-storage::chrome-storage-session-access-level
  unless:
  - id: well-known/app/rinkt::native-host-id
  - id: well-known/app/browser-extension-known::servicenow-web-automation-crx
  - id: well-known/app/ibb8::ibb8-browser-extension-context
  - id: well-known/app/quantomate::quantomate-browser-extension-context
  - id: well-known/app/quantomate::quantomate-cdp-runtime-context

- id: debugger-driven-input-automation
  desc: Extension drives page input through debugger
  crit: suspicious
  conf: 0.96
  scope: archive
  all:
  - id: metadata/permission/debugger::permission-debugger
  - id: micro-behaviors/process/attach/webextension::chrome-debugger-attach
  - id: micro-behaviors/process/attach/webextension::chrome-debugger-input-dispatch
  any:
  - id: micro-behaviors/process/inject/webextension::broad-content-script-injection
  - id: micro-behaviors/process/inject/webextension::content-script-all-frames
  - id: metadata/permission/host::host-permission-all-http
  unless:
  - id: well-known/app/rinkt::native-host-id
  - id: well-known/app/browser-extension-known::servicenow-web-automation-crx
  - id: well-known/app/ibb8::ibb8-browser-extension-context
  - id: well-known/app/quantomate::quantomate-browser-extension-context
  - id: well-known/app/quantomate::quantomate-cdp-runtime-context
