defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1491

composite_rules:
- id: all-site-external-browser-automation
  desc: All-site externally driven browser automation
  crit: hostile
  conf: 0.97
  scope: archive
  all:
  - id: metadata/permission/manifest::externally-connectable
  - id: micro-behaviors/communications/ipc/message::chrome-runtime-on-message-external
  - id: micro-behaviors/process/inject/webextension::active-tab-scripting-execute
  - id: metadata/permission/activation::content-script-all-frames
  any:
  - id: micro-behaviors/process/attach/webextension::chrome-debugger-input-dispatch
  - id: micro-behaviors/process/attach/webextension::chrome-debugger-send-command
  - id: micro-behaviors/data/db/web-storage::chrome-storage-session-access-level

- id: debugger-driven-input-automation
  desc: Extension drives page input through debugger
  crit: hostile
  conf: 0.96
  scope: archive
  all:
  - id: objectives/supply-chain/hidden-payload/extensions/permission::permission-debugger
  - id: micro-behaviors/process/attach/webextension::chrome-debugger-attach
  - id: micro-behaviors/process/attach/webextension::chrome-debugger-input-dispatch
  any:
  - id: metadata/permission/host::content-script-all-sites
  - id: metadata/permission/activation::content-script-all-frames
  - id: metadata/permission/host::host-permission-all-http
