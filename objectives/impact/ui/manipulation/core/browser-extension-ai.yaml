defaults:
  platforms: [windows, unix]
  for: [javascript, chrome-manifest, crx, archives]
  attack: T1491

traits:
- id: gemini-web-chat-host
  desc: Gemini web chat host reference
  crit: component
  conf: 0.9
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  for: [javascript, typescript]
  if:
    type: text
    substr: gemini.google

- id: ai-chat-quill-editor-selector
  desc: AI chat Quill editor selector
  crit: component
  conf: 0.92
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  for: [javascript, typescript]
  if:
    type: text
    substr: 'div.ql-editor[contenteditable'

- id: ai-chat-innerhtml-write
  desc: AI chat innerHTML write
  crit: component
  conf: 0.9
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  for: [javascript, typescript]
  if:
    type: text
    regex: '\.innerHTML\s*='

- id: ai-chat-send-button-selector
  desc: AI chat send button selector
  crit: component
  conf: 0.92
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  for: [javascript, typescript]
  if:
    type: text
    substr: button.send-button

- id: ai-chat-japanese-send-label
  desc: AI chat Japanese send label
  crit: component
  conf: 0.9
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  for: [javascript, typescript]
  if:
    type: text
    substr: プロンプトを送信

- id: ai-chat-mic-button-selector
  desc: AI chat mic button selector
  crit: component
  conf: 0.94
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  for: [javascript, typescript]
  if:
    type: text
    substr: speech-dictation-mic-button

- id: ai-chat-button-hijacked-flag
  desc: AI chat button hijacked flag
  crit: component
  conf: 0.92
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  for: [javascript, typescript]
  if:
    type: text
    substr: dataset.hijacked

composite_rules:
- id: ai-chat-editor-html-write
  desc: AI chat editor HTML write
  crit: suspicious
  conf: 0.94
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  for: [javascript, typescript]
  near_bytes: 700
  all:
  - id: ai-chat-quill-editor-selector
  - id: ai-chat-innerhtml-write

- id: ai-chat-send-button-click
  desc: AI chat send button click
  crit: suspicious
  conf: 0.92
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  for: [javascript, typescript]
  near_bytes: 520
  all:
  - id: micro-behaviors/ui/window/manage/dom::dom-click-call
  any:
  - id: ai-chat-send-button-selector
  - id: ai-chat-japanese-send-label

- id: ai-chat-mic-button-hijack
  desc: AI chat mic button hijack
  crit: suspicious
  conf: 0.94
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  for: [javascript, typescript]
  near_bytes: 700
  all:
  - id: ai-chat-mic-button-selector
  any:
  - id: ai-chat-button-hijacked-flag
  - id: micro-behaviors/ui/window/manage/dom::dom-click-call

- id: all-url-extension-ai-chat-control
  desc: All-site extension controls AI chat
  crit: hostile
  conf: 0.97
  ref: sha256:da7012fa6e7ae7403af3635e14bd7f7bf1d43f985fbc83aaead59095ce4b96db
  scope: archive
  all:
  - id: gemini-web-chat-host
  - id: ai-chat-editor-html-write
  - id: metadata/permission/manifest::host-permission-all-urls
  any:
  - id: ai-chat-send-button-click
  - id: ai-chat-mic-button-hijack
  - id: objectives/collection/messaging/app::extension-ai-chat-monitor
  - id: objectives/supply-chain/hidden-payload/extensions/permission::content-script-all-frames
