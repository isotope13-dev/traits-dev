defaults:
  attack: T1491
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  - id: page-overlay-takeover
    desc: Full-page DOM rewrite takeover
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-high-layer-iframe-container
      - id: objectives/impact/ui/delivery::body-children-hide
      - id: micro-behaviors/ui/window/manage/dom::template-dom-access-cluster
    any:
      - id: objectives/impact/ui/delivery::body-style-guard
      - id: micro-behaviors/communications/http/client/resource::dynamic-external-stylesheet-load
  - id: remote-iframe-page-takeover
    desc: Remote iframe replaces visible page
    crit: hostile
    conf: 0.99
    attack: T1491.002
    all:
      - id: objectives/impact/ui/delivery::remote-iframe-overlay
      - id: micro-behaviors/ui/window/manage/dom::browser-empty-document-write
  - id: persistent-page-rewrite
    desc: Persistent browser page content rewrite
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-mutation-observer
      - id: objectives/impact/ui/delivery::body-children-hide
      - id: micro-behaviors/ui/window/manage/dom::template-dom-access-cluster
    any:
      - id: objectives/impact/ui/delivery::body-style-guard
      - id: micro-behaviors/communications/http/client/resource::dynamic-external-stylesheet-load
