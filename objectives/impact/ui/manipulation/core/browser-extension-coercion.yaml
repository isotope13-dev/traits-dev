# Browser extensions that nag or coerce users after they disable tracking.
# Distinct from ordinary settings UIs: an on-page banner appears only when
# consent is off and its primary action writes consent back to enabled.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, html]
  attack: T1176

traits:
  - id: opt-out-banner-dom-id
    desc: Opt-out banner element id attribute
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'id=["'']opt-out-banner["'']'

  - id: opt-out-banner-getelement
    desc: Looks up opt-out banner by id
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'getElementById\(["'']opt-out-banner["'']'

  - id: hide-opt-out-banner-fn
    desc: hideOptOutBanner helper function
    crit: notable
    conf: 0.9
    if:
      type: text
      word: hideOptOutBanner

  - id: show-opt-out-banner-fn
    desc: showOptOutBanner helper function
    crit: notable
    conf: 0.9
    if:
      type: text
      word: showOptOutBanner

  - id: tracking-consent-force-enable
    desc: Storage write forces tracking consent on
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'storage\.sync\.set\(\s*\{\s*shareInsights:\s*true'

composite_rules:
  - id: opt-out-banner-element
    desc: Opt-out coercion banner DOM element
    crit: notable
    conf: 0.92
    any:
      - id: opt-out-banner-dom-id
      - id: opt-out-banner-getelement
      - id: hide-opt-out-banner-fn
      - id: show-opt-out-banner-fn

  - id: extension-opt-out-tracking-coercion
    desc: Extension banner coerces tracking re-enable
    crit: hostile
    conf: 0.97
    all:
      - id: opt-out-banner-element
      - id: tracking-consent-force-enable
      - id: micro-behaviors/browser-extension/lifecycle::chrome-namespace
    any:
      - id: micro-behaviors/data/db/web-storage::chrome-storage-api
      - id: micro-behaviors/ui/window/manage/dom::browser-append-child
