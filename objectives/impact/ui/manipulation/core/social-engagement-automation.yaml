# Coordinated social-media engagement automation — "engagement pods" / auto-likers.
#
# A content script on a social platform programmatically clicks the platform's
# own like / bookmark / retweet / follow buttons instead of the user doing so,
# usually against a target set pushed from a remote server. This manufactures
# platform engagement without a per-action user click (coordinated inauthentic
# behavior) and turns each install into a node that amplifies whoever the server
# names. It is grayware/PUA: unwanted, policy-violating automation of the user's
# authenticated session, distinct from a hostile RAT or stealer.
#
# The prior `remote-config-gated-like-automation` composite keyed on one family's
# exact idioms (getAppConfig / autoLike / *-config URLs); these traits instead
# key on the platform's stable action-button test ids plus a programmatic
# `.click()`, so the capability and proximity composite survive variable
# renaming and detect the technique, not one sample's strings.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1491

composite_rules:
  # The individual click and observer capabilities are neutral. Proximity is
  # what distinguishes an autonomous feed action from a user-facing helper.
  - id: autonomous-engagement-trigger
    desc: Feed observer drives engagement button click
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/ui/window/manage/control::social-engagement-button-click
      - id: micro-behaviors/ui/window/manage/dom::browser-mutation-observer
    near_bytes: 8000

  # Deployed engagement bot: an extension whose manifest targets Twitter/X and
  # whose content script auto-clicks the engagement buttons on that page.
  - id: social-engagement-automation
    desc: Extension auto-engages with posts on Twitter/X
    crit: suspicious
    conf: 0.94
    scope: archive
    for: [crx, xpi, archives]
    all:
      - id: metadata/permission/host::content-script-social-twitter
      - id: autonomous-engagement-trigger

  # Autonomous variant: engagement clicks are wired to a DOM observer, so the
  # extension likes/bookmarks each new post as the feed loads — no user action.
  - id: autonomous-feed-engagement-bot
    desc: Auto-engages new feed posts via DOM observer
    crit: suspicious
    conf: 0.95
    scope: archive
    for: [crx, xpi, archives]
    all:
      - id: autonomous-engagement-trigger
    any:
      - id: metadata/permission/host::content-script-social-twitter
      - id: metadata/permission/host::content-script-social-meta
      - id: metadata/permission/host::content-script-social-linkedin-reddit
      - id: metadata/permission/host::content-script-social-tiktok

  # Invitation controls are a distinct social-manipulation action from
  # likes/follows.  Require the scroll-and-click pattern so a UI that merely
  # displays an invitation button is not classified as automation.
  - id: autonomous-social-invitation-trigger
    desc: Social invitation controls are driven by a scroll-and-click loop
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/ui/window/manage/dom::dom-click-call
      - id: micro-behaviors/ui/window/manage/control::social-scroll-click-loop
      - id: micro-behaviors/ui/window/manage/control::social-invitation-button-selection
    near_bytes: 5000

  - id: social-invitation-automation
    desc: Extension automates invitations on Meta social sites
    crit: hostile
    conf: 0.97
    scope: archive
    for: [crx, xpi, archives]
    all:
      - id: metadata/permission/host::content-script-social-meta
      - id: autonomous-social-invitation-trigger
