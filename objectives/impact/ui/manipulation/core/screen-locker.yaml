defaults:
  platforms: [unix, windows, macos]
# Screen Locker / Kiosk Mode
# ATT&CK: T1491 (Defacement)
composite_rules:
  - id: python-screen-locker
    desc: Python script enforcing screen lock / kiosk mode
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/ui/framework/tkinter::tkinter-init
      - id: micro-behaviors/ui/window/manage/visibility::tkinter-fullscreen
      - id: micro-behaviors/ui/window/manage/visibility::tkinter-protocol-intercept
    any:
      - id: micro-behaviors/ui/window/manage/visibility::tkinter-resize-disable
      - id: objectives/impact/ui/manipulation/lockscreen-keywords::computer-locked-phrase
      - id: objectives/impact/ui/manipulation/lockscreen-keywords::system-locked-phrase
      - id: objectives/impact/ui/manipulation/lockscreen-keywords::no-escape-phrase
      - id: micro-behaviors/process/terminate/crash::bsod-symbol
