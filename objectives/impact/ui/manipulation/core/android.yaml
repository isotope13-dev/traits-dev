defaults:
  platforms: [android]
  for: [apk, zip]
  attack: T1491

traits:
  - id: android-leska-wallpaper-resource
    desc: Leska locker wallpaper resource
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "res/drawable-xhdpi-v4/leska.png"
      offset_range: [-262144, null]

composite_rules:
  - id: android-blocklock-resource-set
    desc: Android blocklock resource set
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/hardware/display/screen::android-blocklock-layout
      - id: android-leska-wallpaper-resource

  - id: android-blocklock-apk
    desc: Android blocklock screen locker
    crit: hostile
    conf: 0.95
    mbc: B0033
    all:
      - id: android-blocklock-resource-set
      - id: metadata/signed/platform::android-debug-testkey-signature
      - id: metadata/package/files/mobile-package::apk-secondary-dex

  - id: android-overlay-wallpaper-tamper
    desc: Android overlay changes wallpaper
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/ui/window/manage/overlay::runtime-overlay-window
      - id: micro-behaviors/os/privilege/manifest::set-wallpaper
      - id: micro-behaviors/ui/wallpaper::set-android-wallpaper

  - id: android-overlay-screen-locker
    desc: Android overlay screen locker
    crit: hostile
    conf: 0.97
    mbc: B0033
    all:
      - id: micro-behaviors/ui/window/manage/overlay::runtime-overlay-window
      - id: micro-behaviors/hardware/display/screen::android-blocklock-layout
    any:
      - id: android-overlay-wallpaper-tamper
      - id: micro-behaviors/ui/wallpaper::set-android-wallpaper

  - id: android-prank-wallpaper-media-bundle
    desc: Android prank media bundle
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/data/embedded/media::apk-short-raw-mp3-resource
      - id: micro-behaviors/data/embedded/media::apk-short-drawable-image-resource
      - id: metadata/package/files/mobile-package::apk-secondary-dex
      - id: metadata/signed/platform::android-debug-testkey-signature

  - id: android-cheat-lure-prank-media-bundle
    desc: Android cheat lure prank media bundle
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/evasion/decoy/lure::android-russian-cheat-lure-label
      - id: micro-behaviors/data/embedded/media::apk-fff-raw-mp3-resource
      - id: micro-behaviors/data/embedded/media::apk-aaa-drawable-resource
      - id: micro-behaviors/data/embedded/media::apk-lll-drawable-resource
      - id: metadata/package/files/mobile-package::apk-secondary-dex
      - id: metadata/signed/platform::android-debug-testkey-signature

  - id: android-wallpaper-audio-vibration-prank
    desc: Android wallpaper audio vibration prank
    crit: hostile
    conf: 0.95
    mbc: B0033
    all:
      - id: micro-behaviors/ui/wallpaper::set-android-wallpaper
      - id: micro-behaviors/hardware/input/audio::android-raw-media-playback
      - id: micro-behaviors/hardware/input/vibration::android-vibrator-control
      - id: micro-behaviors/data/embedded/media::apk-short-drawable-image-resource
      - id: metadata/package/files/mobile-package::apk-secondary-dex
      - id: metadata/signed/platform::android-debug-testkey-signature

  - id: android-kiosk-harassment-locker
    desc: Android kiosk harassment locker
    crit: hostile
    conf: 0.96
    mbc: B0033
    all:
      - id: micro-behaviors/ui/window/manage/overlay::kiosk-ui-control
      - id: micro-behaviors/hardware/input/vibration::android-vibrator-control
      - id: micro-behaviors/hardware/input/audio::android-media-player-reference
    any:
      - id: micro-behaviors/os/clipboard/access::clipboard-manager
      - id: micro-behaviors/ui/wallpaper::set-android-wallpaper
      - id: micro-behaviors/os/clipboard/access::set-primary-clip

  - id: android-rich-push-url-clipboard-control
    desc: Android rich push controls URL clipboard
    crit: suspicious
    conf: 0.95
    ref: sha256:f6a1d7acbd59c261bfad7ee5b42e584ab1f381c1da7647fe7194aa8db0542872
    scope: archive
    for: [npm, zip, tar]
    all:
      - id: micro-behaviors/ui/window/notify/message::android-notification-action-routing
      - id: micro-behaviors/os/message/intent::android-uri-start-activity
      - id: micro-behaviors/os/clipboard/access::set-primary-clip
