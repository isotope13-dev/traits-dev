defaults:
  platforms: [unix, windows]
  for: [json, chrome-manifest, javascript, typescript, crx]

traits:
  - id: search-url-query-template
    desc: Search URL query template
    crit: component
    conf: 0.9
    for: [json, chrome-manifest]
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: 'https?://[^"''\s]+([?&](q|query|kw)=\{searchTerms\}|/search/\{searchTerms\})'
      case_insensitive: true
  - id: search-branded-provider-host
    desc: Search-branded provider host
    crit: component
    conf: 0.86
    for: [json, chrome-manifest]
    if:
      type: value
      path: chrome_settings_overrides.search_provider.search_url
      regex: 'https?://[^/"'']*\b[a-z0-9-]*search[a-z0-9-]*\b'
      case_insensitive: true

composite_rules:
  - id: browser-extension-install-external-tab
    desc: Browser extension opens install tab
    crit: notable
    conf: 0.94
    attack: T1176
    ref: sha256:ae2655e0b8fe54fe47cad7acf24bb405c441e8d0527575c4a3c36bf72cfc1f93
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-installed
      - id: micro-behaviors/browser-extension/tabs::chrome-tabs-create
      - id: micro-behaviors/browser-extension/tabs::static-https-tab-opener

  - id: browser-extension-install-active-tab-redirect
    desc: Extension redirects active tab on install
    crit: suspicious
    conf: 0.96
    attack: T1176
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-installed
      - id: micro-behaviors/browser-extension/tabs::chrome-tabs-update
      - id: objectives/supply-chain/hidden-payload/extensions/affiliate::extension-campaign-tracking-url

  - id: browser-extension-default-search-override
    desc: Overrides browser default search provider
    crit: notable
    conf: 0.92
    for: [json, chrome-manifest]
    all:
      - id: metadata/permission/manifest::chrome-search-provider-override
      - id: metadata/permission/manifest::chrome-default-search-provider
      - id: metadata/permission/manifest::chrome-search-terms-template

  - id: extension-search-rewrite-authority
    desc: Search extension request rewrite authority
    crit: notable
    conf: 0.9
    all:
      - id: browser-extension-default-search-override
    any:
      - id: objectives/supply-chain/hidden-payload/extensions/affiliate::search-rewrite-permission-dnr
      - id: objectives/supply-chain/hidden-payload/extensions/affiliate::search-rewrite-permission-dnr-host
      - id: objectives/supply-chain/hidden-payload/extensions/affiliate::search-rewrite-permission-webrequest
      - id: metadata/permission/network::permission-declarative-net-request
      - id: metadata/permission/network::declarative-net-request-with-host
      - id: metadata/permission/network::web-request

  - id: extension-search-monetization
    desc: Browser extension search monetization
    crit: suspicious
    conf: 0.9
    scope: archive
    all:
      - id: browser-extension-default-search-override
      - id: search-url-query-template
      - id: search-branded-provider-host
      - id: objectives/collection/activity/browser::extension-persistent-affiliate-tracking

  - id: tracked-browser-extension-search-hijacker
    desc: Tracked browser extension search hijacker
    crit: hostile
    conf: 0.97
    all:
      - id: browser-extension-default-search-override
      - id: extension-search-monetization
      - id: objectives/collection/monitor/tracking::extension-persistent-lifecycle-tracking

  - id: tracked-newtab-search-redirect
    desc: Tracked new tab search redirect
    crit: hostile
    conf: 0.95
    attack: T1176
    for: [crx, xpi, zip]
    scope: archive
    all:
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: objectives/supply-chain/hidden-payload/extensions/affiliate::runtime-search-query-redirect
      - id: objectives/supply-chain/hidden-payload/extensions/affiliate::runtime-search-input-value
    any:
      - id: micro-behaviors/communications/http/url/query::token-query-parameter
      - id: objectives/supply-chain/hidden-payload/extensions/affiliate::runtime-search-affiliate-param
      - id: micro-behaviors/communications/http/url/query::search-source-query-parameter

  - id: affiliate-tracked-newtab-install-hijack
    desc: Affiliate-tracked new-tab install hijack
    crit: hostile
    conf: 0.97
    attack: T1176
    scope: archive
    all:
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: objectives/collection/monitor/tracking::extension-install-uninstall-url-tracking
      - id: objectives/supply-chain/hidden-payload/extensions/affiliate::extension-campaign-tracking-url
      - id: browser-extension-install-external-tab

  - id: abused-domain-lifecycle-redirect
    desc: Extension redirects lifecycle URL to abused domain
    crit: hostile
    conf: 0.97
    attack: T1176
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-installed
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-startup
      - id: micro-behaviors/browser-extension/tabs::chrome-tabs-create
      - id: micro-behaviors/browser-extension/lifecycle::runtime-set-uninstall-url
      - id: objectives/command-and-control/infrastructure/domain/abused-tlds::tld-click

  - id: extension-lifecycle-navigation-abuse
    desc: Browser extension lifecycle navigation abuse
    crit: hostile
    conf: 0.96
    attack: T1176
    scope: archive
    for: [crx, xpi, zip]
    all:
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-installed
      - id: micro-behaviors/browser-extension/lifecycle::chrome-runtime-on-startup
      - id: micro-behaviors/browser-extension/tabs::chrome-tabs-create
      - id: micro-behaviors/browser-extension/lifecycle::runtime-set-uninstall-url


  - id: remote-newtab-content-hijack
    desc: New-tab extension renders fetched HTML content
    crit: hostile
    conf: 0.96
    attack: T1176
    scope: archive
    all:
        - id: metadata/permission/manifest::chrome-newtab-override
        - id: micro-behaviors/communications/http/request/client::js-fetch-call
        - id: objectives/supply-chain/hidden-payload/extensions/backdoor::html-variable-innerhtml-assignment

  - id: all-site-extension-dom-audio-overlay
    desc: All-site extension injects audio overlay
    crit: hostile
    conf: 0.96
    attack: T1491
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    scope: archive
    all:
      - id: metadata/permission/manifest::host-permission-all-urls
      - id: micro-behaviors/process/inject/webextension::chrome-scripting-execute
      - id: metadata/permission/manifest::permission-scripting
      - id: metadata/permission/active-tab::permission-active-tab
      - id: micro-behaviors/hardware/input/audio::browser-audio-element-create
      - id: micro-behaviors/hardware/input/audio::browser-audio-source-attribute
      - id: micro-behaviors/ui/window/manage/dom::browser-append-child

  - id: event-driven-extension-page-overlay
    desc: Event-driven extension page overlay
    crit: suspicious
    conf: 0.94
    attack: T1491
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    scope: archive
    all:
      - id: metadata/permission/manifest::host-permission-all-urls
      - id: micro-behaviors/process/inject/webextension::chrome-scripting-execute
      - id: metadata/permission/manifest::permission-scripting
      - id: metadata/permission/active-tab::permission-active-tab
      - id: objectives/impact/ui/delivery::iframe-overlay-mask
    any:
      - id: micro-behaviors/browser-extension/tabs::chrome-tabs-on-activated
      - id: micro-behaviors/browser-extension/tabs::chrome-tabs-on-updated
