defaults:
  platforms: [windows, unix]
  for: [java]
  attack: T1499

traits:
  - id: java-robot-keypress-source
    desc: Java Robot keyPress source
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: keyPress
  - id: java-infinite-loop-source
    desc: Java infinite loop source
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 'while\s*\(\s*true\s*\)'

composite_rules:
  - id: java-infinite-robot-keypress
    desc: Java infinite Robot keypress loop
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/hardware/input/robot::java-awt-robot-import
      - id: java-robot-keypress-source
      - id: java-infinite-loop-source
