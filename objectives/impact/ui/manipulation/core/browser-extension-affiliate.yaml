defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, crx]

traits:
  - id: affiliate-location-replace-network
    desc: Affiliate redirect network
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'top\.location\.replace\([^)]{0,160}(union-click|goitem|goali)'
      case_insensitive: true

composite_rules:
  - id: affiliate-location-replace
    desc: Affiliate redirect via page location
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/ui/window/manage/dom::top-location-replace-string
      - id: affiliate-location-replace-network

  - id: hidden-affiliate-navigation-injection
    desc: Extension injects hidden affiliate navigation
    crit: hostile
    conf: 0.96
    attack: T1195.002
    scope: archive
    all:
      - id: objectives/supply-chain/hidden-payload/extensions/affiliate::affiliate-domain-pattern
      - id: affiliate-location-replace
    any:
      - id: micro-behaviors/data/format/html::hidden-iframe
      - id: micro-behaviors/ui/window/manage/dom::browser-window-open
