# A remote feature flag that gates an automated social action is useful
# analyst context, but it is not inherently hostile: users may install a
# helper specifically for that action. The objective composite keeps the
# remote-control signal while leaving the page-action atom neutral.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, xpi, archives]
  attack: T1491

composite_rules:
  - id: remote-config-gated-like-automation
    desc: Remote config enables page like automation
    crit: suspicious
    conf: 0.92
    scope: archive
    all:
      - id: micro-behaviors/communications/http/endpoints::remote-feature-config-url
      - id: micro-behaviors/ui/window/manage/control::platform-like-button-click
