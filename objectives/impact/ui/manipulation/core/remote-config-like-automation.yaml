# A remote feature flag that gates an automated social action changes user
# state without an explicit click. The archive composite requires both the
# remote switch and the concrete like-button action.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, xpi, archives]
  attack: T1491

traits:
  - id: extension-like-button-click
    desc: Extension clicks like button programmatically
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)(likeButton|like-button|autoLike)[\s\S]{0,180}\.click\s*\('

  - id: extension-remote-like-gate
    desc: Remote config gates auto-like action
    crit: suspicious
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)getAppConfig\s*\([^)]{0,80}autoLike'

composite_rules:
  - id: remote-config-gated-like-automation
    desc: Remote config enables page like automation
    crit: hostile
    conf: 0.96
    scope: archive
    all:
      - id: micro-behaviors/communications/http/endpoints::remote-feature-config-url
      - id: extension-like-button-click
      - id: extension-remote-like-gate
