defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: computer-locked-phrase
    desc: '"computer...locked" phrase'
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)\bcomputer\b.{0,20}\blocked\b
  - id: system-locked-phrase
    desc: '"system...locked" phrase'
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (?i)system.{0,20}locked
    not:
      - exact: IsSystemLocked
  - id: no-escape-phrase
    desc: '"no escape" phrase'
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (?i)no escape
  - id: attempts-expired-phrase
    desc: '"attempts expired" phrase'
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)attempts expired
  - id: hacked-phrase
    desc: '"hacked" intimidation phrase'
    crit: baseline
    conf: 0.75
    attack: T1491
    count_min: 2
    if:
      type: text
      regex: (?i)\bhacked\b
    not:
      - substr: anti-hack
      - substr: AntiHack
      - substr: HackedBy
      - regex: (?i)hack(er|ing|athon)

composite_rules:
  - id: lockscreen-intimidation-phrases
    desc: Lockscreen intimidation phrase cluster
    crit: notable
    conf: 0.78
    all:
      - id: hacked-phrase
    any:
      - id: computer-locked-phrase
      - id: system-locked-phrase
      - id: no-escape-phrase
      - id: attempts-expired-phrase
