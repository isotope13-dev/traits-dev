defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
    - html
    - package.json
traits:
  - id: ui-delivery-class
    desc: JavaScript referring to .ui-delivery CSS class
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: .ui-delivery
  - id: dynamic-ad-injection-dom-api-a
    desc: DOM write API innerHTML or appendChild
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: (?i)(innerHTML|appendChild)
  - id: dynamic-ad-injection-dom-api-b
    desc: DOM write API insertBefore
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: (?i)insertBefore
  - id: dynamic-ad-injection-keyword-a
    desc: Delivery or ads keyword
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (?i)\b(delivery|ads?)\b
  - id: dynamic-ad-injection-keyword-b
    desc: Promo keyword
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (?i)\bpromo\b
  - id: news-delivery-pattern
    desc: Potential malicious news or content delivery pattern
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (?i)\.(news|tips|rm|adb)\.js
  - id: dom-mutation-observer
    desc: MutationObserver monitors page DOM
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: new\s+MutationObserver|MutationObserver\(
  - id: link-href-assignment
    desc: Reassigns link href value
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: \b[a-zA-Z_$][\w$]*\.href\s*=\s*[a-zA-Z_$][\w$]*\.(toString|href)\(
  - id: sponsored-label-check
    desc: Checks for sponsored content labels
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: Sponsored|Sponsored ad|Sponsored\\nicon
  - id: sponsored-class-marking
    desc: Marks page elements as sponsored
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: classList\.add\(['"][a-z0-9_-]*sponsored[a-z0-9_-]*['"]\)
  - id: stylesheet-link-injection
    desc: Creates stylesheet link element
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: createElement\(['"]link['"]\)
  - id: remote-stylesheet-injection
    desc: Stylesheet rel assignment
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: \.rel\s*=\s*['"]stylesheet['"]
  - id: css-type-assignment
    desc: Assigns CSS mime type
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: \.type\s*=\s*['"]text/css['"]
  - id: remote-stylesheet-literal-url
    desc: Stylesheet href literal remote URL
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: \.href\s*=\s*['"]((https?:)?//)
  - id: create-iframe-element
    desc: Creates iframe element
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: createElement\(['"]iframe['"]\)
  - id: fixed-screen-style
    desc: Fixed full-screen style string
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: position:fixed;top:0;bottom:0;left:0;right:0;
  - id: overlay-zindex-style
    desc: High z-index full-page style
    crit: suspicious
    conf: 0.88
    if:
      type: string_value
      regex: z-index:\d{5,}.{0,80}height:100%
  - id: document-root-append
    desc: Appends element to document root
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: document\.documentElement\.appendChild
  - id: body-all-selector
    desc: Selects all body children
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: body > *
  - id: display-none-important
    desc: Forces display none important
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: ;display:none !important;
  - id: observe-document-body
    desc: Observes document body mutations
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: observer\(document\.body
  - id: style-class-filter
    desc: Filters style and class mutations
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: 'attributeFilter: [''style'', ''class'']'
  - id: remove-target-call
    desc: Removes mutated target element
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: m.target.remove()
  - id: template-queryselector
    desc: Template reads querySelector content
    crit: notable
    conf: 0.85
    count_min: 6
    if:
      type: string_value
      regex: \$\{[^}]{0,160}querySelector
  - id: template-getattribute
    desc: Template reads attribute values
    crit: notable
    conf: 0.85
    count_min: 2
    if:
      type: string_value
      regex: \$\{[^}]{0,160}getAttribute
  - id: template-textcontent
    desc: Template reads node text
    crit: notable
    conf: 0.85
    count_min: 4
    if:
      type: string_value
      regex: \$\{[^}]{0,160}textContent
  - id: template-htmlcontent
    desc: Template reads node HTML
    crit: notable
    conf: 0.85
    count_min: 2
    if:
      type: string_value
      regex: \$\{[^}]{0,160}(innerHTML|outerHTML)
composite_rules:
  - id: dynamic-ad-injection-a
    desc: Dynamic ad injection innerHTML with keyword
    crit: notable
    conf: 0.7
    all:
      - id: dynamic-ad-injection-dom-api-a
      - id: dynamic-ad-injection-keyword-a
  - id: dynamic-ad-injection-b
    desc: Dynamic ad injection innerHTML with promo
    crit: notable
    conf: 0.7
    all:
      - id: dynamic-ad-injection-dom-api-a
      - id: dynamic-ad-injection-keyword-b
  - id: dynamic-ad-injection-c
    desc: Dynamic ad injection insertBefore with keyword
    crit: notable
    conf: 0.7
    all:
      - id: dynamic-ad-injection-dom-api-b
      - id: dynamic-ad-injection-keyword-a
  - id: dynamic-ad-injection-d
    desc: Dynamic ad injection insertBefore with promo
    crit: notable
    conf: 0.7
    all:
      - id: dynamic-ad-injection-dom-api-b
      - id: dynamic-ad-injection-keyword-b
  - id: dynamic-ad-injection
    desc: Potential dynamic ad or content injection pattern
    crit: notable
    conf: 0.7
    any:
      - id: dynamic-ad-injection-a
      - id: dynamic-ad-injection-b
      - id: dynamic-ad-injection-c
      - id: dynamic-ad-injection-d
  - id: dom-template-clone
    desc: Clones live DOM into HTML
    crit: notable
    conf: 0.9
    needs: 3
    any:
      - id: template-queryselector
      - id: template-getattribute
      - id: template-textcontent
      - id: template-htmlcontent
  - id: remote-stylesheet-pivot
    desc: Remote stylesheet injection behavior
    crit: suspicious
    conf: 0.9
    all:
      - id: stylesheet-link-injection
      - id: remote-stylesheet-injection
      - id: remote-stylesheet-literal-url
  - id: iframe-overlay-mask
    desc: Full-page iframe overlay mask
    crit: suspicious
    conf: 0.94
    all:
      - id: create-iframe-element
      - id: fixed-screen-style
      - id: overlay-zindex-style
      - id: document-root-append
  - id: body-children-hide
    desc: Hides existing body elements
    crit: suspicious
    conf: 0.95
    all:
      - id: body-all-selector
      - id: display-none-important
  - id: body-style-guard
    desc: Guards hidden body element state
    crit: suspicious
    conf: 0.9
    all:
      - id: observe-document-body
      - id: style-class-filter
      - id: body-children-hide
      - id: remove-target-call
  - id: sponsored-content-suppression
    desc: Suppresses sponsored page elements
    crit: notable
    conf: 0.88
    all:
      - id: sponsored-label-check
      - id: sponsored-class-marking
