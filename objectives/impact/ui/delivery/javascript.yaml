defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
    - html
    - package.json
    - chrome-manifest
traits:
  - id: ui-delivery-class
    desc: JavaScript referring to .ui-delivery CSS class
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: .ui-delivery
  - id: e-commerce-promoted-listing
    desc: E-commerce promoted-listing copy
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: (?i)promoted\s+listing
  - id: localized-promotion-copy
    desc: Localized promotion text copy
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: disclaimerPromotionTitle
  - id: go-authors-rights-reserved
    desc: Go authors copyright header
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: 'The Go Authors. All rights reserved.'
  - id: dynamic-ad-injection-keyword-a
    desc: Ad or sponsored keyword
    crit: component
    conf: 0.7
    count_min: 2
    if:
      type: string_literal
      # `advertising` is also a routine analytics/configuration field (for
      # example `advertisingStitchID`). Require explicit ad-copy terms here;
      # the DOM-injection leg supplies the behavioral context.
      regex: (?i)\b(ads|sponsored)\b
    not:
      # Exclude emoji description data (e.g. "delivery truck")
      - substr: "emojiRaw"
      - substr: "description:"
      - substr: "aliases:["
      - substr: "category:"
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-hashed-asset-bundle
      - id: metadata/library/structure::js-webpack-bundle
  - id: dynamic-ad-injection-keyword-b
    desc: Dynamic advertisement injection keyword marker
    crit: component
    conf: 0.7
    count_min: 2
    if:
      # "promotion"/"promoted" are advertising terms; bare "promo" is coupon /
      # e-commerce vocabulary ("Promo Code", findPromoElements) that legitimate
      # coupon/deal extensions and checkout pages use constantly, so it does not
      # indicate advertisement injection on its own.
      type: text
      regex: (?i)\bpromoted\b
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-hashed-asset-bundle
      - id: metadata/library/structure::js-webpack-bundle
  - id: news-delivery-pattern
    desc: 'news or content delivery pattern'
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)\.(news|tips|rm|adb)\.js
  - id: stylesheet-link-injection
    desc: Creates stylesheet link element
    crit: component
    conf: 0.9
    if:
      type: text
      regex: createElement\(['"]link['"]\)
    unless:
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: css-type-assignment
    desc: Assigns CSS mime type
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: \.type\s*=\s*['"]text/css['"]
    unless:
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/source/
  - id: remote-stylesheet-literal-url
    desc: Remote stylesheet URL assignment
    crit: component
    conf: 0.92
    if:
      type: text
      regex: \.href\s*=\s*['"]((https?:)?//)
    not:
      - regex: https?://fonts\.googleapis\.com/
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/source/
  - id: body-all-selector
    desc: Selects all body children
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: body > *
    unless:
      - id: metadata/library/structure/
  - id: display-none-important
    desc: Forces display none important
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ;display:none !important;
  - id: observe-document-body
    desc: Observes document body mutations
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: observer\(document\.body
  - id: style-class-filter
    desc: Filters style and class mutations
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'attributeFilter: [''style'', ''class'']'
  - id: remove-target-call
    desc: Removes mutated target element
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: m.target.remove()
composite_rules:
  - id: extension-remote-html-page-replacement
    desc: Extension replaces page with remote HTML
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/ui/window/manage/dom::document-root-html-replacement
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: metadata/permission/runtime::chrome-namespace
    unless:
      - id: metadata/library/structure/
      - id: metadata/package/testing/
  - id: dynamic-ad-injection-a
    desc: Dynamic ad injection innerHTML with keyword
    crit: suspicious
    conf: 0.7
    all:
      - id: dynamic-ad-injection-keyword-a
      - id: micro-behaviors/ui/window/manage/dom::browser-innerhtml-assignment
    near_bytes: 2048
    unless:
    - id: metadata/library/runtime::acquire-vscode-api
    - id: micro-behaviors/process/interpreter/vm/
    - id: metadata/package/testing/
    - id: metadata/library/structure::js-dist-asset-bundle
    - id: metadata/library/structure::js-hashed-asset-bundle
    - id: micro-behaviors/data/manipulation/
    - id: sponsored-content-filter-extension
  - id: dynamic-ad-injection-b
    desc: Dynamic ad injection innerHTML with promo
    crit: suspicious
    conf: 0.7
    all:
      - id: dynamic-ad-injection-keyword-b
    any:
      - id: micro-behaviors/ui/window/manage/dom::browser-innerhtml-assignment
      - id: micro-behaviors/ui/window/manage/dom::browser-append-child
    near_bytes: 2048
    unless:
    - id: metadata/library/runtime::acquire-vscode-api
    - id: micro-behaviors/process/interpreter/vm/
    - id: metadata/library/structure/
    - id: e-commerce-promoted-listing
    - id: localized-promotion-copy
    - id: sponsored-content-filter-extension
  - id: dynamic-ad-injection-c
    desc: Dynamic ad injection insertBefore with keyword
    crit: suspicious
    conf: 0.7
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-insert-before
      - id: dynamic-ad-injection-keyword-a
    near_bytes: 2048
    unless:
    - id: metadata/library/runtime::acquire-vscode-api
    - id: micro-behaviors/process/interpreter/vm/
    - id: metadata/library/structure::js-large-module-bundle
    - id: metadata/library/structure::js-large-minified-bundle
    - id: metadata/library/structure::js-dist-asset-bundle
    - id: metadata/library/structure::js-hashed-asset-bundle
    # Static documentation pages may legitimately insert a sponsored/widget
    # node; the fetched WordPress documentation asset is this exact shape.
    - id: metadata/file/profile/identity::static-doc-html-shell
    - id: well-known/app/google-web::google-ads-bgc-bootstrapper
    - id: sponsored-content-filter-extension
  - id: dynamic-ad-injection-d
    desc: Dynamic ad injection insertBefore with promo
    crit: suspicious
    conf: 0.7
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-insert-before
      - id: dynamic-ad-injection-keyword-b
    near_bytes: 2048
    unless:
    - id: metadata/library/structure::js-large-module-bundle
    - id: metadata/library/structure::js-large-minified-bundle
    - id: metadata/library/structure::js-dist-asset-bundle
    - id: metadata/library/structure::js-hashed-asset-bundle
    - id: sponsored-content-filter-extension
  - id: dynamic-ad-injection
    desc: Potential dynamic ad or content injection pattern
    crit: suspicious
    conf: 0.7
    any:
      - id: dynamic-ad-injection-a
      - id: dynamic-ad-injection-b
      - id: dynamic-ad-injection-c
      - id: dynamic-ad-injection-d
  - id: remote-stylesheet-pivot
    desc: Remote stylesheet injection behavior
    crit: suspicious
    conf: 0.9
    all:
      - id: stylesheet-link-injection
      - id: micro-behaviors/communications/http/client/resource::stylesheet-rel-assignment
      - id: css-type-assignment
      - id: remote-stylesheet-literal-url
    unless:
      - id: metadata/lang/source::go-authors-bsd-header
      - id: go-authors-rights-reserved
      - id: well-known/lib/golang-x-tools/
      - id: well-known/app/wordpress-plugins::known-wordpress-plugin
      - id: well-known/app/browser-extension::honey-popover-wallet-bundle
  - id: remote-random-iframe-overlay
    desc: Full-screen random remote iframe delivery
    crit: hostile
    conf: 0.99
    attack: T1189,T1491.002
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-create-iframe-element
      - id: micro-behaviors/ui/window/manage/dom::browser-iframe-src-variable
      - id: micro-behaviors/ui/window/manage/dom::browser-append-child
      - id: micro-behaviors/ui/window/manage/dom::fixed-viewport-overlay-style
      - id: micro-behaviors/ui/window/manage/dom::high-layer-overlay-style
      - id: micro-behaviors/data/source/syntax/array::remote-url-array-literal
      - id: micro-behaviors/data/source/syntax/array::random-array-element-selection
    near_bytes: 2400
  - id: body-children-hide
    desc: Hides existing body elements
    crit: suspicious
    conf: 0.95
    all:
      - id: body-all-selector
      - id: display-none-important
  - id: body-style-guard
    desc: Guards hidden body element state
    crit: suspicious
    conf: 0.9
    all:
      - id: observe-document-body
      - id: style-class-filter
      - id: body-children-hide
      - id: remove-target-call
  - id: sponsored-content-filter-extension
    desc: Site-scoped sponsored-content filtering extension context
    crit: exception
    conf: 0.96
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-query-sponsored-marker
      - id: micro-behaviors/ui/window/manage/dom::browser-hide-sponsored-element
      - id: micro-behaviors/ui/window/manage/dom::browser-innerhtml-assignment
      - id: micro-behaviors/data/db/web-storage::chrome-storage-api
