# Login-banner defacement via shell rc injection (T1491.001 internal defacement).
#
# Instead of overwriting a web root (deface/web/) or the desktop wallpaper
# (deface/wallpaper/), this technique appends a *print* command (echo/printf/
# wall) into a system-wide shell startup file. The injected line then runs on
# every interactive login, printing the attacker's message to every user — a
# persistent, host-wide defacement of the login experience. Seen in trojanized
# AUR packages (the gimp-plugin-beautify "albanian virus") whose post_install
# scriptlet carpets /etc/bash.bashrc, /etc/zsh/zshrc, /etc/fish/config.fish and
# /etc/profile.d with an insulting banner.
defaults:
  platforms: [unix]
  for: [shell]
  attack: T1491.001

composite_rules:
  - id: shell-rc-login-banner-defacement
    # The injected banner (a print command written as data) lands on the same
    # line as a redirect into a live system-wide shell rc — i.e. it is being
    # installed into every interactive login. This is internal defacement, not
    # generic persistence: the payload's purpose is to display a message.
    desc: Login-banner defacement injected into system shell rc
    crit: hostile
    conf: 0.95
    near_lines: 1
    all:
      - id: micro-behaviors/data/embedded/script::embedded-shell-print-command
      - id: objectives/persistence/login/shell/rc::system-shell-rc-redirect-write
