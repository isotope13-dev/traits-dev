# Desktop defacement via COM IActiveDesktop
# Drops wallpaper image and sets it via COM interface
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: hostile
  conf: 0.95
  attack: T1491.001
composite_rules:
  - id: com-wallpaper-defacement
    desc: COM-based desktop wallpaper defacement
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/com/invoke::co-create-instance
      - id: micro-behaviors/ui/wallpaper::wallpaper-drop-path
    any:
      - id: micro-behaviors/data/embedded/media::embedded-jpeg-image
      - id: micro-behaviors/os/com/invoke::co-initialize
    needs: 1
