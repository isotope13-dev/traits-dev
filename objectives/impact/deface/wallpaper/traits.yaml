# Desktop Defacement
defaults:
  platforms: [windows]
  for: [pe, csharp]
composite_rules:
  - id: set-wallpaper-objective
    desc: Sets desktop wallpaper (potential defacement)
    crit: notable
    conf: 0.95
    attack: "T1491.001"
    any:
      - id: micro-behaviors/ui/wallpaper::set-desktop-wallpaper
      - id: micro-behaviors/os/registry/manipulate::lock-screen-image-path
