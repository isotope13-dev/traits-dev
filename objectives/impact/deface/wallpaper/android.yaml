defaults:
  platforms: [android]
  for: [apk, zip]
  attack: T1491.001

traits:
  - id: android-virus-wallpaper-resource
    desc: Android virus wallpaper resource
    crit: component
    conf: 0.98
    if:
      type: raw
      substr: "this_virus_was_made_by_nyan_ofc_on_tiktok.png"

composite_rules:
  - id: android-virus-wallpaper-defacement
    desc: Android virus wallpaper defacement
    crit: hostile
    conf: 0.97
    mbc: B0058
    all:
      - id: micro-behaviors/os/privilege/manifest::set-wallpaper
      - id: micro-behaviors/ui/wallpaper::set-android-wallpaper
      - id: android-virus-wallpaper-resource
