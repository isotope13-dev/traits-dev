defaults:
  platforms: [panos, appliance, unix]
  for: [objc, macho]
  attack: T1491.001

traits:
  - id: objc-panos-defaced-wallpaper
    desc: ObjC PAN-OS defaced wallpaper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Desktop/defaced_wallpaper.png

  - id: objc-panos-desktop-locked
    desc: ObjC PAN-OS desktop locked
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: DesktopPictureLocked

composite_rules:
  - id: objc-panos-wallpaper-deface
    desc: ObjC PAN-OS wallpaper deface
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-defaced-wallpaper
      - id: objc-panos-desktop-locked
