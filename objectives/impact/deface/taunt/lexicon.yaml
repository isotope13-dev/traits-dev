# Victim/attacker taunt phrases — the human-readable message half of
# defacement (T1491), ransom notes, and joke/wiper malware. The structural
# deface rules (deface/login-banner, deface/web, ...) are message-agnostic;
# these lexicon atoms add the taunt itself as a corroborating signal.
#
# IMPORTANT: the bare word "pwned" is NOT a defacement taunt and is not matched
# here. In offensive security "pwned" is a neutral success term — pwntools
# (`from pwn import *`), CTF writeups, exploit PoCs that `echo pwned` to prove
# code-exec, Pwn2Own, HaveIBeenPwned breach data. Flagging the bare word would
# mislabel ordinary exploit/pentest tooling as defacement. Only phrases that
# address a VICTIM ("you got pwned") or sign the deface ("pwned by <handle>"),
# plus leetspeak compromise brags, are taunts. All stay NOTABLE: intent comes
# from co-occurrence with deface structure, not the phrase alone.
defaults:
  platforms: [unix, windows]
  for: [scripts, html, markdown, text]
  attack: T1491

traits:
  - id: victim-pwn-taunt
    # "you got pwned", "get pwned", "you are pwned" — addressed to the victim.
    # The victim cue (get/got/you/are) before pwned is what makes it a taunt
    # rather than the neutral term, and it also dodges the HIBP verb phrase
    # "have i been pwned" / "pwned password"; guarded for good measure.
    desc: Victim-pwned taunt phrase
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)\b(get|got|you|are)\s+pwn[e3]?d\b'
    unless:
      - type: text
        substr: pwned password
      - type: text
        substr: haveibeenpwned

  - id: attacker-credit-taunt
    # "pwned by <handle>", "h4ck3d by ...": the attacker signing the deface.
    # "hacked by" is intentionally excluded — too common in prose/CTF writeups.
    desc: Attacker-signature taunt phrase
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)\b(pwn[e3]?d|h4ck3d)\s+by\s'

  - id: leetspeak-pwn-taunt
    # 0wn3d / r00t3d / h4ck3d — leetspeak compromise brags with essentially no
    # benign usage; a reliable joke-malware / deface tell on their own.
    desc: Leetspeak compromise taunt
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '(?i)\b(0wn3d|r00t3d|h4ck3d)\b'
