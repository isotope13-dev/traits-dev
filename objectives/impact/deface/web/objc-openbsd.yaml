defaults:
  platforms: [openbsd, bsd, unix]
  for: [objc, elf]
  attack: T1491.002

traits:
  - id: objc-defaced-page-paths
    desc: ObjC defaced page paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: /tmp/defaced_index\.html[\s\S]{0,160}/tmp/defaced_page\.html

  - id: objc-deface-method-call
    desc: ObjC deface method call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: defacePath

composite_rules:
  - id: objc-openbsd-web-defacement
    desc: ObjC web defacement
    crit: hostile
    conf: 0.98
    all:
      - id: objc-defaced-page-paths
      - id: objc-deface-method-call
