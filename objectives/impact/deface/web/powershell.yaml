defaults:
  platforms: [android, windows, unix]
  for: [powershell]
  attack: T1491.002

traits:
  - id: ps-compromised-html-page
    desc: PowerShell compromised HTML page
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'SYSTEM COMPROMISED|defaced\.html'

  - id: ps-profile-deface-write
    desc: PowerShell profile deface write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Set-Content.{0,80}\$PROFILE|DEFACED'

composite_rules:
  - id: ps-profile-web-defacement
    desc: PowerShell profile web defacement
    crit: hostile
    conf: 0.98
    all:
      - id: ps-compromised-html-page
      - id: ps-profile-deface-write
