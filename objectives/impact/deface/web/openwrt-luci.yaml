defaults:
  platforms: [openwrt]
  for: [shell, html]
  attack: T1491.002

traits:
  - id: luci-index-path
    desc: OpenWrt LuCI index path
    crit: component
    conf: 0.88
    if:
      type: text
      substr: /www/index.html

  - id: luci-static-resource-path
    desc: OpenWrt LuCI static resource path
    crit: component
    conf: 0.88
    if:
      type: text
      substr: /www/luci-static/resources

  - id: luci-index-overwrite
    desc: Shell overwrite of LuCI index page
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'cat\s*>\s*"?\$?LUCI_INDEX"?|cat\s*>\s*"?/www/index\.html"?'

  - id: uhttpd-redirect-uci
    desc: OpenWrt uhttpd redirect configured through uci
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: uci set uhttpd.main.redirect

  - id: compromised-page-message
    desc: Compromise message in web page content
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'ACCESS DENIED|System compromised|credentials have been captured'

  - id: issue-banner-overwrite
    desc: Shell overwrite of login issue banner
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'cat\s*>\s*/etc/issue\b'

  - id: motd-banner-overwrite
    desc: Shell overwrite of login MOTD banner
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'cat\s*>\s*/etc/motd\b'

composite_rules:
  - id: openwrt-luci-admin-defacement
    desc: OpenWrt LuCI admin interface defacement
    crit: hostile
    conf: 0.96
    all:
      - id: luci-index-path
      - id: luci-index-overwrite
    any:
      - id: luci-static-resource-path
      - id: uhttpd-redirect-uci
      - id: compromised-page-message

  - id: openwrt-login-banner-defacement
    desc: OpenWrt login banner defacement
    crit: hostile
    conf: 0.94
    all:
      - id: issue-banner-overwrite
      - id: motd-banner-overwrite
      - id: compromised-page-message
