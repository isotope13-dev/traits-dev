defaults:
  platforms: [ios, unix]
  for: [perl]
  attack: T1491.002

traits:
  - id: perl-web-deface-function
    desc: Perl web deface function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: deface_web_content

  - id: perl-breached-html-marker
    desc: Perl breached HTML marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: SYSTEM BREACHED

composite_rules:
  - id: perl-web-defacement
    desc: Perl web defacement
    crit: hostile
    conf: 0.98
    all:
      - id: perl-web-deface-function
      - id: perl-breached-html-marker
