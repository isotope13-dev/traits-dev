defaults:
  platforms: [unix, appliance]
  for: [java, kotlin, class, java_class, jar]
  attack: T1491.002

traits:
  - id: jvm-webroot-index-paths
    desc: JVM webroot index paths
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/www/index\.html[\s\S]{0,220}/var/www/index\.html'

  - id: jvm-webroot-index-bytecode
    desc: JVM webroot index bytecode
    crit: suspicious
    conf: 0.93
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 77 77 77 2F 69 6E 64 65 78 2E 68 74 6D 6C

  - id: jvm-compromised-banner
    desc: JVM compromised banner
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'SYSTEM COMPROMISED|HACKED'

  - id: jvm-compromised-banner-bytecode
    desc: JVM compromised banner bytes
    crit: suspicious
    conf: 0.93
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 53 59 53 54 45 4D 20 43 4F 4D 50 52 4F 4D 49 53 45 44

  - id: jvm-login-banner-paths
    desc: JVM login banner paths
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: '/etc/issue[\s\S]{0,120}/etc/motd'

  - id: jvm-login-banner-bytecode
    desc: JVM login banner bytecode
    crit: suspicious
    conf: 0.91
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 65 74 63 2F 69 73 73 75 65

composite_rules:
  - id: jvm-webroot-defacement
    desc: JVM webroot defacement
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-webroot-index-paths
      - id: jvm-compromised-banner

  - id: jvm-login-banner-defacement
    desc: JVM login banner defacement
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-login-banner-paths
      - id: jvm-compromised-banner

  - id: jvm-webroot-deface-bytecode
    desc: JVM webroot deface bytecode
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-webroot-index-bytecode
      - id: jvm-compromised-banner-bytecode

  - id: jvm-login-deface-bytecode
    desc: JVM login deface bytecode
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-login-banner-bytecode
      - id: jvm-compromised-banner-bytecode
