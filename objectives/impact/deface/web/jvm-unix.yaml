defaults:
  platforms: [unix, appliance]
  for: [java, kotlin, class, java_class, jar]
  attack: T1491.002

traits:
  - id: jvm-webroot-index-paths
    desc: JVM webroot index paths
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/www/index\.html[\s\S]{0,220}/var/www/index\.html'

  - id: jvm-webroot-index-bytecode
    desc: JVM constant-pool webroot index path
    crit: suspicious
    conf: 0.93
    for: [class, java_class, jar]
    if:
      type: hex
      # Java CONSTANT_Utf8 tag (0x01), two-byte length (15), then the path.
      # Requiring the constant-pool framing avoids matching arbitrary bytes in
      # compressed archives that happen to contain this path.
      pattern: 01 00 0F 2F 77 77 77 2F 69 6E 64 65 78 2E 68 74 6D 6C
    unless:
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path

  - id: jvm-compromised-banner
    desc: JVM compromised banner
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'SYSTEM COMPROMISED|HACKED'

  - id: jvm-compromised-banner-bytecode
    desc: JVM constant-pool compromised banner
    crit: suspicious
    conf: 0.93
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 01 00 12 53 59 53 54 45 4D 20 43 4F 4D 50 52 4F 4D 49 53 45 44

composite_rules:
  - id: jvm-webroot-defacement
    desc: JVM webroot defacement
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-webroot-index-paths
      - id: jvm-compromised-banner

  - id: jvm-login-banner-defacement
    desc: JVM login banner defacement
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/console/banner::jvm-login-banner-path-reference
      - id: jvm-compromised-banner

  - id: jvm-webroot-deface-bytecode
    desc: JVM webroot deface bytecode
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-webroot-index-bytecode
      - id: jvm-compromised-banner-bytecode

  - id: jvm-login-deface-bytecode
    desc: JVM login deface bytecode
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: micro-behaviors/os/console/banner::jvm-login-banner-path-bytecode
      - id: jvm-compromised-banner-bytecode
