defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1491.002

traits:
  - id: dotnet-apache-webroot-path
    desc: .NET Apache webroot path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /var/apache2/htdocs/index.html

  - id: dotnet-compromised-html
    desc: .NET compromised HTML
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'COMPROMISED[\s\S]{0,180}SYSTEM BREACHED'

  - id: dotnet-compromised-title
    desc: .NET compromised title
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: COMPROMISED

  - id: dotnet-system-breached-text
    desc: .NET system breached text
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: SYSTEM BREACHED

composite_rules:
  - id: dotnet-webroot-defacement
    desc: .NET webroot defacement
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-apache-webroot-path
      - id: dotnet-compromised-html

  - id: dotnet-pe-webroot-defacement
    desc: .NET PE webroot defacement
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-apache-webroot-path
      - id: dotnet-compromised-title
      - id: dotnet-system-breached-text
