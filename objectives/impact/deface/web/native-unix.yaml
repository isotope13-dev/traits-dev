defaults:
  platforms: [netbsd, unix]
  for: [c, cpp, elf]
  attack: T1491.002

traits:
  - id: native-webroot-index-paths
    desc: Native webroot index paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/www/localhost/htdocs/index\.html[\s\S]{0,260}/apache24/data/index\.html'

  - id: native-compromised-html-banner
    desc: Native compromised HTML banner
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'BREACHED[\s\S]{0,180}credentials harvested'

composite_rules:
  - id: native-webroot-defacement
    desc: Native webroot defacement
    crit: hostile
    conf: 0.98
    all:
      - id: native-webroot-index-paths
      - id: native-compromised-html-banner
