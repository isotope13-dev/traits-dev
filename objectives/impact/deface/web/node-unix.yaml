defaults:
  platforms: [unix, netbsd]
  for: [javascript, typescript]
  attack: T1491.002

traits:
  - id: node-webroot-index-deface
    desc: Node webroot index deface
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/www/htdocs[\s\S]{0,260}index\.html'

  - id: node-compromised-html-banner
    desc: Node compromised HTML banner
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SYSTEM COMPROMISED

composite_rules:
  - id: node-webroot-defacement
    desc: Node webroot defacement
    crit: hostile
    conf: 0.98
    all:
      - id: node-webroot-index-deface
      - id: node-compromised-html-banner
