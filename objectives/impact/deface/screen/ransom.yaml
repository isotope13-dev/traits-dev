defaults:
  attack: T1491.001
  platforms: [unix, windows]
traits:
  - id: registry-set-value-api
    desc: Sets a Windows registry value
    crit: component
    conf: 0.9
    for: [pe, c, cpp]
    if:
      type: text
      regex: '\bRegSetValueEx[AW]?\s*\('
  - id: legal-notice-policy-path
    desc: Windows legal notice policy registry path
    crit: component
    conf: 0.9
    for: [pe, c, cpp]
    if:
      type: text
      regex: '(?i)(CurrentVersion\\Policies\\System|Policies\\System)'
composite_rules:
  - id: ransom-note-logon-ui
    desc: Sets a custom legal notice on logon screen
    crit: hostile
    conf: 0.9
    all:
      - id: micro-behaviors/os/registry/manipulate::legal-notice-caption
      - id: micro-behaviors/os/registry/manipulate::legal-notice-text
      - id: legal-notice-policy-path
    any:
      - id: registry-set-value-api
      - id: objectives/persistence/login/startup/registry::reg-set-value-ex-source
    unless:
      - id: metadata/lang/source::windows-compat-api-source
      - id: metadata/lang/source::windows-sdk-shell-header-declarations
  - id: forced-lockscreen-wallpaper
    desc: Forces lock screen wallpaper and prevents user changes
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/os/registry/manipulate::no-changing-wallpaper
      - id: micro-behaviors/os/registry/manipulate::lock-screen-image-path
