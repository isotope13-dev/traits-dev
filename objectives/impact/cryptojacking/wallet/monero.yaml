defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: monero-wallet-4-bounded
    desc: Monero wallet address starting with
    crit: notable
    conf: 0.9
    for: [binaries, scripts]
    if:
      type: string_value
      regex: \b4[123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz]{94}\b
composite_rules: []
