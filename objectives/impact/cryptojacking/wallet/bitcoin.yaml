# Bitcoin cryptocurrency detection
# ATT&CK: T1496 (Resource Hijacking)
defaults:
  attack: T1496
  mbc: B0036
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  # Bech32 (bc1) addresses: 42-62 chars total
  - id: wallet-bech32
    desc: "Bitcoin Bech32 wallet address"
    if:
      type: string_value
      regex: "\\bbc1[ac-hj-np-z02-9]{38,58}\\b"
  # P2SH (3-prefix) addresses: exactly 34 chars
  - id: wallet-p2sh
    desc: "Bitcoin P2SH wallet address"
    if:
      type: string_value
      regex: "\\b3[a-km-zA-HJ-NP-Z1-9]{33}\\b"
    not:
      - regex: "^[0-9a-fA-F]+$"
      - regex: "^[13][A-Z0-9]+$"
      - regex: "^[13][a-z0-9]+$"
      - regex: "[a-z]{5,}"
      - regex: "[A-Z]{5,}"
      - substr: "Exception"
  # P2PKH (1-prefix) addresses: 25-34 chars
  - id: wallet-p2pkh
    desc: "Bitcoin P2PKH wallet address"
    if:
      type: string_value
      regex: "\\b1[a-km-zA-HJ-NP-Z1-9]{25,34}\\b"
    not:
      - regex: "^[13][0-9A-Fa-f]{20,}h?$"
      - regex: "1[a-z]{4,}"
      - regex: "^[0-9a-fA-F]+$"
      - regex: "^[13][A-Z0-9]+$"
      - regex: "^[13][a-z0-9]+$"
      - regex: "[A-Z][a-z]{3,}[A-Z][a-z]{3,}"
      - substr: "Exception"
      - regex: "[a-z]{5,}"
      - regex: "[A-Z]{5,}"
composite_rules:
  - id: wallet-address
    desc: "Bitcoin wallet address"
    crit: suspicious
    conf: 0.85
    any:
      - id: wallet-bech32
      - id: wallet-p2sh
      - id: wallet-p2pkh
