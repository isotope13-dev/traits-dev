defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: ollama-model-server-map
    desc: Maps model names to discovered server URLs
    crit: component
    conf: 0.96
    if:
      type: text
      substr: model_to_servers

  - id: ollama-v1-server-relay
    desc: Routes models through selected server URLs
    crit: component
    conf: 0.96
    if:
      type: text
      regex: 'server_url.{0,80}/v1'

composite_rules:
  - id: ollama-open-server-inference-relay
    desc: Uses public Ollama servers for remote inference
    crit: hostile
    conf: 0.99
    all:
      - id: ollama-model-server-map
      - id: ollama-v1-server-relay
      - id: objectives/discovery/network/scan/http::many-public-http-endpoint-literals
