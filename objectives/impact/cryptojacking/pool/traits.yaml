defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: pool-minexmr
    desc: pool.minexmr mining pool domain
    crit: notable
    conf: 0.8
    attack: T1496
    if:
      type: text
      substr: pool.minexmr
      section: .text

  - id: moneroocean-string
    desc: moneroocean mining pool
    crit: notable
    conf: 0.8
    attack: T1496
    if:
      type: text
      word: moneroocean
      section: .text
    unless:
      - id: metadata/package/quality/
      - id: metadata/file/catalog/identity/

  - id: pool-port-3333-dup
    desc: Mining pool port 3333
    crit: suspicious
    conf: 0.7
    attack: T1496
    if:
      type: text
      regex: (?i)\b(stratum|xmr|monero|pool).{0,40}:\s*3333\b
    unless:
      - id: metadata/package/quality/recognized-contexts::explicit-miner-context
      - id: metadata/package/quality/recognized-contexts::package-context
  - id: pool-port-14444
    desc: Mining pool port 14444 (XMR
    crit: suspicious
    conf: 0.75
    attack: T1496
    if:
      type: text
      regex: (?i)\b(stratum|xmr|monero|pool).{0,40}:\s*14444\b
  - id: domain-1
    desc: Mining pool-like host and port
    crit: suspicious
    conf: 0.85
    attack: T1496
    if:
      type: text
      regex: '\b(pool|mining|mine)\.([a-z0-9-]{2,63}\.)+[a-z]{2,24}:\d{2,5}\b'
    not:
      - substr: '.rs:'
      - substr: /pool.
      - substr: pool.rs
      - regex: '\bpool\.py:\d+'
      - substr: sks-keyservers.net
      - substr: TQBufferPool
      - substr: buffer pool
    unless:
      # Security scanner signatures / test fixtures (e.g. ClawMetry).
      - id: well-known/tool/detection/clawmetry/
      - id: well-known/app/go-ethereum::go-ethereum-tool
      - type: path
        regex: 'tqkv[\\/]runtime[\\/]page_metadata\.py$'
      - id: metadata/package/quality/recognized-contexts::explicit-miner-context
      - id: metadata/package/quality/recognized-contexts::package-context
  - id: domain-2
    desc: XMR pool-like host and port
    crit: suspicious
    conf: 0.85
    attack: T1496
    if:
      type: text
      regex: '\b(xmr|monero)\.([a-z0-9-]{2,63}\.)+[a-z]{2,24}:\d{2,5}\b'
    not:
      - substr: '.rs:'
      - substr: /pool.
      - substr: pool.rs
    unless:
      - id: metadata/package/quality/recognized-contexts::explicit-miner-context
      - id: metadata/package/quality/recognized-contexts::package-context
composite_rules:
  - id: domain-comp
    desc: Mining pool domain pattern
    crit: suspicious
    any:
      - id: domain-1
      - id: domain-2
  - id: pool-stratum
    desc: Stratum mining protocol
    crit: suspicious
    conf: 0.85
    attack: T1496
    any:
      - id: objectives/impact/cryptojacking/miner/stratum::stratum-tcp
      - id: objectives/impact/cryptojacking/miner/stratum::stratum-ssl
