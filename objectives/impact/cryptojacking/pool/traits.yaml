defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1496
traits:
  - id: pool-minexmr
    desc: pool.minexmr mining pool domain
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: pool.minexmr
      section: .text

  - id: moneroocean-string
    desc: moneroocean mining pool
    crit: notable
    conf: 0.8
    if:
      type: text
      word: moneroocean
      section: .text
    unless:
      - id: metadata/package/quality/
      - id: metadata/file/catalog/identity/
      - id: well-known/app/1password::onepassword-runtime-context
      - id: well-known/app/1password::onepassword-native-module-context
