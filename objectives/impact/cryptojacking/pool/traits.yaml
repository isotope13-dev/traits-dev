defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: pool-minexmr
    desc: pool.minexmr mining pool domain
    crit: notable
    conf: 0.8
    attack: T1496
    if:
      type: text
      substr: pool.minexmr
      section: .text

  - id: moneroocean-string
    desc: moneroocean mining pool
    crit: notable
    conf: 0.8
    attack: T1496
    if:
      type: text
      word: moneroocean
      section: .text
    unless:
      - id: metadata/package/quality::embedded-domain-reputation-catalog
      - id: metadata/file/text/catalog::frequency-list-catalog

  - id: pool-port-3333-dup
    desc: Mining pool port 3333
    crit: suspicious
    conf: 0.7
    attack: T1496
    if:
      type: text
      regex: (?i)\b(stratum|xmr|monero|pool).{0,40}:\s*3333\b
  - id: pool-port-14444
    desc: Mining pool port 14444 (XMR
    crit: suspicious
    conf: 0.75
    attack: T1496
    if:
      type: text
      regex: (?i)\b(stratum|xmr|monero|pool).{0,40}:\s*14444\b
  - id: domain-1
    desc: Mining pool domain pattern (pool/mining/mine)
    crit: suspicious
    conf: 0.85
    attack: T1496
    if:
      type: text
      regex: \b(pool|mining|mine)\.[a-z]{2,}.{0,50}:\d+
    not:
      - substr: '.rs:'
      - substr: /pool.
      - substr: pool.rs
      - regex: '\bpool\.py:\d+'
      - substr: sks-keyservers.net
  - id: domain-2
    desc: Mining pool domain pattern (xmr/monero)
    crit: suspicious
    conf: 0.85
    attack: T1496
    if:
      type: text
      regex: \b(xmr|monero)\.[a-z]{2,}.{0,50}:\d+
    not:
      - substr: '.rs:'
      - substr: /pool.
      - substr: pool.rs
composite_rules:
  - id: domain-comp
    desc: Mining pool domain pattern
    crit: suspicious
    any:
      - id: domain-1
      - id: domain-2
  - id: pool-stratum
    desc: Stratum mining protocol
    crit: suspicious
    conf: 0.85
    attack: T1496
    any:
      - id: objectives/impact/cryptojacking/miner/stratum::stratum-tcp
      - id: objectives/impact/cryptojacking/miner/stratum::stratum-ssl
