defaults:
  platforms: [qnx, unix]
  for: [java, class, java_class]
  attack: T1496

traits:
  - id: qnx-java-miner-thread-name
    desc: QNX Java miner thread name
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: miner

  - id: qnx-java-miner-sha256-work
    desc: QNX Java SHA256 mining work
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'MessageDigest[\s\S]{0,160}SHA-256'

  - id: qnx-java-miner-solution-report
    desc: QNX Java miner solution report
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SOLUTION=

  - id: qnx-java-bytecode-miner-name
    desc: QNX Java bytecode miner name
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 6D 69 6E 65 72

  - id: qnx-java-bytecode-solution
    desc: QNX Java bytecode solution
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 53 4F 4C 55 54 49 4F 4E 3D

  - id: qnx-java-bytecode-sha256
    desc: QNX Java bytecode SHA256
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 53 48 41 2D 32 35 36

composite_rules:
  - id: qnx-java-background-crypto-miner
    desc: QNX Java background crypto miner
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-java-miner-thread-name
      - id: qnx-java-miner-sha256-work
      - id: qnx-java-miner-solution-report

  - id: qnx-java-bytecode-crypto-miner
    desc: QNX Java bytecode crypto miner
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: qnx-java-bytecode-miner-name
      - id: qnx-java-bytecode-solution
      - id: qnx-java-bytecode-sha256
