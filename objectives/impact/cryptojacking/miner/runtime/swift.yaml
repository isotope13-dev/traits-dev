defaults:
  platforms: [esxi, unix]
  for: [swift]
  attack: T1496

traits:
  - id: swift-miner-worker-name
    desc: Swift miner worker string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "miner:worker"

  - id: swift-hash-share-telemetry
    desc: Swift hash share telemetry
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'hashes=%llu&shares=%llu&rate='

  - id: swift-double-sha256-loop
    desc: Swift double SHA256 loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'let inner = SHA256\.hash[\s\S]{0,80}let digest = SHA256\.hash'

composite_rules:
  - id: swift-custom-cryptominer
    desc: Swift custom cryptominer
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: swift-miner-worker-name
      - id: swift-hash-share-telemetry
      - id: swift-double-sha256-loop
      - id: micro-behaviors/crypto/hash/mining::mining-keyword
