defaults:
  platforms: [unix, appliance]
  for: [rust, elf]
  attack: T1496

traits:
  - id: rust-mining-engine-struct
    desc: Rust mining engine struct
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "struct MiningEngine"

  - id: rust-share-hash-telemetry
    desc: Rust share hash telemetry
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '"shares"[\s\S]{0,120}"hashes"'

  - id: rust-share-counter-fields
    desc: Rust share counter fields
    crit: suspicious
    conf: 0.91
    if:
      type: text
      regex: 'shares_found[\s\S]{0,160}total_hashes'

  - id: rust-mining-share-post
    desc: Rust mining share POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "POST /api/v1/share HTTP/1.1"

composite_rules:
  - id: rust-custom-mining-share
    desc: Rust custom mining share
    crit: hostile
    conf: 0.98
    all:
      - id: rust-mining-engine-struct
      - id: rust-mining-share-post
    any:
      - id: rust-share-hash-telemetry
      - id: rust-share-counter-fields
