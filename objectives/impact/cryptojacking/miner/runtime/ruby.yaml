defaults:
  platforms: [unix, openwrt]
  for: [ruby]
  attack: T1496

traits:
  - id: ruby-proof-of-work-label
    desc: Ruby proof-of-work label
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: proof_of_work
  - id: ruby-mining-difficulty-constant
    desc: Ruby mining difficulty constant
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: MIN_DIFFICULTY
  - id: ruby-hash-target-prefix
    desc: Ruby hash target prefix
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: HASH_TARGET_PREFIX
  - id: ruby-hash-startswith-target
    desc: Ruby hash startswith target
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'hash\.start_with\?\(target\)'

composite_rules:
  - id: ruby-proof-of-work-miner
    desc: Ruby proof-of-work miner
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/crypto/hash/digest::ruby-sha256-hexdigest
      - id: ruby-proof-of-work-label
    any:
      - id: ruby-mining-difficulty-constant
      - id: ruby-hash-target-prefix
      - id: ruby-hash-startswith-target
    needs: 2
