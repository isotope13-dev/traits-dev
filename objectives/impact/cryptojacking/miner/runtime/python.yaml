defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1496
traits:
  - id: python-sha256-pow-loop
    desc: Python SHA256 proof-of-work loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'sha256\(.{0,80}\)\.hexdigest\(\)[\s\S]{0,220}startswith\(target_hash\)'
  - id: python-mining-target-zeros
    desc: Python mining target zero prefix
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'target\s*=\s*["'']0{4,}["'']'
  - id: python-threaded-miner-workers
    desc: Python threaded mining workers
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'threading\.Thread[\s\S]{0,180}_cryptojacker_worker'
  - id: python-pyc-sha256-pow-loop
    desc: Python bytecode SHA256 PoW loop
    crit: suspicious
    conf: 0.9
    for: [pyc]
    if:
      type: text
      substr: target_hash
  - id: python-pyc-mining-target
    desc: Python bytecode mining target
    crit: suspicious
    conf: 0.88
    for: [pyc]
    if:
      type: text
      substr: "00000"
  - id: python-pyc-threaded-miner
    desc: Python bytecode threaded miner
    crit: suspicious
    conf: 0.9
    for: [pyc]
    if:
      type: text
      substr: _cryptojacker_worker
composite_rules:
  - id: python-pow-loop
    desc: Python proof-of-work loop
    crit: suspicious
    conf: 0.92
    any:
      - id: python-sha256-pow-loop
      - id: python-pyc-sha256-pow-loop
  - id: python-proof-of-work-miner
    desc: Python proof-of-work miner
    crit: hostile
    conf: 0.97
    all:
      - id: python-pow-loop
    any:
      - id: python-mining-target-zeros
      - id: python-threaded-miner-workers
      - id: python-pyc-mining-target
      - id: python-pyc-threaded-miner
    needs: 1
