defaults:
  platforms: [ios, unix, windows]
  for: [java, class]
  attack: T1496

traits:
  - id: java-sha256-nonce-mining-loop
    desc: Java SHA256 nonce mining loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'MessageDigest\.getInstance\("SHA-256"\)[\s\S]{0,360}nonceVal\+\+'

  - id: java-mining-share-endpoint
    desc: Java mining share endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/mining/share

  - id: jvm-mining-share-endpoint
    desc: JVM mining share endpoint
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 61 70 69 2F 6D 69 6E 69 6E 67 2F 73 68 61 72 65

  - id: jvm-cryptojacking-method
    desc: JVM cryptojacking method
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 69 6D 70 61 63 74 43 72 79 70 74 6F 6A 61 63 6B 69 6E 67

composite_rules:
  - id: java-cryptojacking-mining-loop
    desc: Java cryptojacking mining loop
    crit: hostile
    conf: 0.98
    all:
      - id: java-sha256-nonce-mining-loop
      - id: java-mining-share-endpoint

  - id: jvm-cryptojacking-mining-loop
    desc: JVM cryptojacking mining loop
    crit: hostile
    conf: 0.97
    all:
      - id: jvm-mining-share-endpoint
      - id: jvm-cryptojacking-method
