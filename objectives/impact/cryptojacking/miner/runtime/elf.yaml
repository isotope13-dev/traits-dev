defaults:
  platforms: [linux]
  for: [elf]
  attack: T1496

traits:
  - id: miner-runtime-status
    desc: Miner runtime status
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bminer\s+running\s*:'

  - id: hidden-miner-payload-fetch
    desc: Hidden miner payload fetch
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)DEBUG: \.[\w-]{1,20} (doesn|is outdated).{0,30}download needed'

  - id: miner-payload-download-success
    desc: Miner payload download success
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: 'DEBUG: Successfully downloaded to:'

composite_rules:
  - id: hidden-miner-payload-loader
    desc: Hidden miner payload loader
    crit: hostile
    conf: 0.99
    mbc: B0018
    attack: T1496,T1105
    all:
      - id: miner-runtime-status
      - id: hidden-miner-payload-fetch
      - id: miner-payload-download-success
