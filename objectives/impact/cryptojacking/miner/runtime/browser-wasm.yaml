defaults:
  platforms: [windows, unix]
  for: [source, data, html]
  attack: T1496

traits:
  - id: js-cryptonight-wasm-wrapper
    desc: JS CryptoNight WASM worker wrapper
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'CryptonightWASMWrapper[\s\S]{0,900}_cryptonight_(create|hash_variant_[01])'

  - id: js-miner-hashrate-postmessage
    desc: JS miner posts hash rate results
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'postMessage\s*\(\s*\{[\s\S]{0,220}hashesPerSecond[\s\S]{0,220}(job_id|nonce|result)'

  - id: js-miner-throttle-work-loop
    desc: JS throttled miner work loop
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'throttleWait[\s\S]{0,260}workThrottled'

composite_rules:
  - id: js-cryptonight-wasm-miner
    desc: JavaScript CryptoNight WASM miner runtime
    crit: hostile
    conf: 0.99
    all:
      - id: js-cryptonight-wasm-wrapper
      - id: js-miner-hashrate-postmessage
      - id: js-miner-throttle-work-loop
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
