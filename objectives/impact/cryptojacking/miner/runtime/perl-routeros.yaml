defaults:
  platforms: [routeros, appliance, unix]
  for: [perl]
  attack: T1496

traits:
  - id: perl-sha256-nonce-mining-loop
    desc: Perl SHA256 nonce mining loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'while \(\$nonce < \$max_nonce\)[\s\S]{0,260}sha256_hex'

  - id: perl-mining-report-post
    desc: Perl mining report POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "POST /api/v1/mining-report HTTP/1.1"

  - id: perl-worker-fork-mining
    desc: Perl worker fork mining
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'for my \$w \(1 \.\. \$WORKERS\)[\s\S]{0,220}fork\(\)'

composite_rules:
  - id: perl-routeros-proof-of-work-miner
    desc: Perl proof-of-work miner
    crit: hostile
    conf: 0.98
    all:
      - id: perl-sha256-nonce-mining-loop
      - id: perl-mining-report-post
      - id: perl-worker-fork-mining
