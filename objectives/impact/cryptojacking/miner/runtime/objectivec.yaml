defaults:
  platforms: [unix, fortios]
  for: [objc, macho, elf]
  attack: T1496

traits:
  - id: objc-double-sha256-loop
    desc: Objective-C double SHA256 loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'sha256\(prev,\s*32,\s*hash\)[\s\S]{0,120}sha256\(hash,\s*32,\s*prev\)'

  - id: objc-miner-nonce-loop
    desc: Objective-C miner nonce loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'volatile uint64_t total_hashes[\s\S]{0,320}while\s*\(\s*1\s*\)'

  - id: objc-mining-share-path
    desc: Objective-C mining share path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /mining/share

  - id: objc-sha256-nonce-chain
    desc: Objective-C SHA256 nonce chain
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'sha256_bytes\(nonce[\s\S]{0,120}memcpy\(nonce,\s*digest'

composite_rules:
  - id: objc-custom-cryptominer
    desc: Objective-C custom cryptominer
    crit: hostile
    conf: 0.98
    all:
      - id: objc-double-sha256-loop
      - id: objc-miner-nonce-loop

  - id: objc-sha256-pow-miner
    desc: Objective-C SHA256 PoW miner
    crit: hostile
    conf: 0.98
    all:
      - id: objc-mining-share-path
      - id: objc-sha256-nonce-chain
