defaults:
  platforms: [windows]
  for: [pe]
  attack: T1496
  mbc: B0004

traits:
  - id: spawned-xmrig-status
    desc: Loader spawned XMRig status
    ref: sha256:1fa1e028b2cad5297edcae7d505456d187bdf1bc29acba1e90d17f355951bca7
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: spawned xmrig

  - id: miner-worker-argument
    desc: Miner worker command argument
    ref: sha256:1fa1e028b2cad5297edcae7d505456d187bdf1bc29acba1e90d17f355951bca7
    crit: notable
    conf: 0.76
    if:
      type: text
      exact: " --worker"

composite_rules:
  - id: windows-xmrig-loader-control
    desc: Windows XMRig loader control channel
    ref: sha256:1fa1e028b2cad5297edcae7d505456d187bdf1bc29acba1e90d17f355951bca7
    crit: hostile
    conf: 0.98
    all:
      - id: spawned-xmrig-status
      - id: micro-behaviors/communications/http/server/managed::dotnet-loopback-prefix
    any:
      - id: miner-worker-argument
      - id: micro-behaviors/communications/http/lib/crate::reqwest-crate

  - id: windows-xmrig-loader-ipc
    desc: Windows XMRig loader with IPC
    ref: sha256:1fa1e028b2cad5297edcae7d505456d187bdf1bc29acba1e90d17f355951bca7
    crit: hostile
    conf: 0.97
    all:
      - id: spawned-xmrig-status
      - id: micro-behaviors/communications/ipc/named-pipe::rust-anonymous-pipe-ipc
    any:
      - id: miner-worker-argument
      - id: micro-behaviors/communications/http/lib/crate::hyper-crate
