defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, pe, elf, macho]
traits:
- id: hugepages-lower
  desc: hugepages string (lowercase)
  crit: baseline
  conf: 0.6
  if:
    type: text
    word: hugepages
  unless:
  - id: metadata/binary/linking/static/
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: hugepages-title
  desc: Hugepages string (title case)
  crit: baseline
  conf: 0.6
  if:
    type: text
    word: Hugepages
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: hugepages-upper
  desc: HUGEPAGES string (uppercase)
  crit: baseline
  conf: 0.6
  if:
    type: text
    word: HUGEPAGES
- id: noofthreads-cli-help
  desc: noOfThreads miner CLI help text
  crit: notable
  conf: 0.85
  if:
    type: text
    exact: The parameter [noOfThreads] is optional. When omitted it will use as many threads as there are logical cores in the system.
- id: noofthreads-token
  desc: noOfThreads command-line parameter token
  crit: notable
  conf: 0.7
  if:
    type: text
    exact: '[noOfThreads]'
- id: boost-asio-win-iocp
  desc: Boost.Asio Windows IOCP runtime marker
  crit: notable
  conf: 0.75
  if:
    type: text
    word: boost::asio::detail::win_iocp_io_context
- id: go-runtime
  desc: go.runtime Go runtime marker
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: go.runtime
composite_rules:
- id: hugepages-keyword
  desc: Hugepages keyword variants
  any:
  - id: hugepages-lower
  - id: hugepages-title
  - id: hugepages-upper
- id: go-runtime-markers
  crit: notable
  desc: Go runtime markers
  any:
  - id: metadata/lang/compiled::go-runtime-marker
  - id: go-runtime
- id: gpu-hashrate
  desc: GPU framework with hashrate
  all:
  - id: micro-behaviors/hardware/gpu/
  - id: micro-behaviors/os/sysinfo/performance/metrics::hashrate-reference
- id: hugepages-or-threads
  desc: Hugepages or worker-thread configuration
  any:
  - id: hugepages-keyword
  - id: micro-behaviors/process/create/workers::worker-thread-count-setting
- id: thread-tuned-worker-runtime
  crit: notable
  desc: Thread-tuned worker runtime markers
  needs: 2
  any:
  - id: noofthreads-cli-help
  - id: noofthreads-token
  - id: micro-behaviors/process/create/workers::worker-thread-label
- id: asio-winsock-runtime
  crit: notable
  desc: Boost.Asio IOCP with Winsock initialization
  all:
  - id: boost-asio-win-iocp
  - id: micro-behaviors/communications/socket/init::wsa-startup
- id: mining-config
  desc: Mining configuration with context
  all:
  - id: hugepages-or-threads
  - id: objectives/impact/cryptojacking/miner/signatures::mining-marker
- id: hardware-mining
  desc: Hardware mining configuration
  crit: suspicious
  conf: 0.8
  attack: T1496
  any:
  - id: gpu-hashrate
  - id: mining-config
  unless:
  - id: objectives/impact/cryptojacking/miner/runtime/
  - id: micro-behaviors/dylib/library/family/
- id: threaded-asio-miner
  desc: Windows threaded cryptominer runtime profile
  crit: suspicious
  conf: 0.9
  attack: T1496
  all:
  - id: noofthreads-cli-help
  - id: boost-asio-win-iocp
  - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
