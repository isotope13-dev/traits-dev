defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, pe, elf, macho]
traits:
- id: hashrate-str
  desc: hashrate keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    substr: hashrate
  unless:
  - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
- id: hashrate-title
  desc: Hashrate metric (title case)
  crit: notable
  conf: 0.75
  if:
    type: text
    word: Hashrate
- id: hashrate-upper
  desc: HASHRATE metric (uppercase)
  crit: notable
  conf: 0.75
  if:
    type: text
    word: HASHRATE
- id: opencl-string
  desc: OpenCL GPU computing framework
  crit: baseline
  conf: 0.7
  if:
    type: text
    word: OpenCL
- id: cuda-string
  desc: CUDA GPU computing framework
  crit: baseline
  conf: 0.7
  if:
    type: text
    word: CUDA
- id: hugepages-lower
  desc: hugepages string (lowercase)
  crit: baseline
  conf: 0.6
  if:
    type: text
    word: hugepages
  unless:
  - id: metadata/binary/linking/static::static-linked-heuristic
- id: hugepages-title
  desc: Hugepages string (title case)
  crit: baseline
  conf: 0.6
  if:
    type: text
    word: Hugepages
- id: hugepages-upper
  desc: HUGEPAGES string (uppercase)
  crit: baseline
  conf: 0.6
  if:
    type: text
    word: HUGEPAGES
- id: threads-config-flag--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)(--threads|-t)[= ]\d+
  count_max: 1001903
- id: threads-config-flag--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)(numThreads|num_threads)[= ]\d+
  count_max: 1001904
- id: threads-config-flag--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)(threadCount)[= ]\d+
  count_max: 1001905
- id: noofthreads-cli-help
  desc: noOfThreads miner CLI help text
  crit: notable
  conf: 0.85
  if:
    type: text
    exact: The parameter [noOfThreads] is optional. When omitted it will use as many threads as there are logical cores in the system.
- id: noofthreads-token
  desc: noOfThreads command-line parameter token
  crit: notable
  conf: 0.7
  if:
    type: text
    exact: '[noOfThreads]'
- id: worker-thread-label
  desc: Worker Thread label
  crit: notable
  conf: 0.6
  if:
    type: text
    substr: Worker Thread
- id: boost-asio-win-iocp
  desc: Boost.Asio Windows IOCP runtime marker
  crit: notable
  conf: 0.75
  if:
    type: text
    word: boost::asio::detail::win_iocp_io_context
- id: go-runtime
  desc: go.runtime Go runtime marker
  crit: baseline
  conf: 0.5
  if:
    type: text
    substr: go.runtime
composite_rules:
- id: hashrate-keyword
  desc: Hashrate keyword variants
  any:
  - id: hashrate-str
  - id: hashrate-title
  - id: hashrate-upper
- id: hugepages-keyword
  desc: Hugepages keyword variants
  any:
  - id: hugepages-lower
  - id: hugepages-title
  - id: hugepages-upper
- id: gpu-frameworks
  desc: GPU computing frameworks
  any:
  - id: opencl-string
  - id: cuda-string
- id: go-runtime-markers
  desc: Go runtime markers
  any:
  - id: metadata/lang/compiled::go-runtime-marker
  - id: go-runtime
- id: gpu-hashrate
  desc: GPU framework with hashrate
  all:
  - id: gpu-frameworks
  - id: hashrate-keyword
- id: hugepages-or-threads
  desc: Hugepages or worker-thread configuration
  any:
  - id: hugepages-keyword
  - id: threads-config-flag
- id: thread-tuned-worker-runtime
  desc: Thread-tuned worker runtime markers
  needs: 2
  any:
  - id: noofthreads-cli-help
  - id: noofthreads-token
  - id: worker-thread-label
- id: asio-winsock-runtime
  desc: Boost.Asio IOCP with Winsock initialization
  all:
  - id: boost-asio-win-iocp
  - id: micro-behaviors/communications/socket/init::wsa-startup
- id: mining-config
  desc: Mining configuration with context
  all:
  - id: hugepages-or-threads
  - id: objectives/impact/cryptojacking/miner/context::mining-context
- id: hardware-mining
  desc: Hardware mining configuration
  crit: suspicious
  conf: 0.8
  attack: T1496
  any:
  - id: gpu-hashrate
  - id: mining-config
  unless:
  - id: go-runtime-markers
  - id: micro-behaviors/dylib/library/family::system-lib-marker
- id: threaded-asio-miner
  desc: Windows threaded cryptominer runtime profile
  crit: suspicious
  conf: 0.9
  attack: T1496
  all:
  - id: noofthreads-cli-help
  - id: boost-asio-win-iocp
  - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
- id: threads-config-flag
  desc: Worker threads configuration flag
  crit: component
  conf: 0.7
  any:
  - id: threads-config-flag--rx-1
  - id: threads-config-flag--rx-2
  - id: threads-config-flag--rx-3
