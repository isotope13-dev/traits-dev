defaults:
  platforms: [unix, netbsd]
  for: [perl]
  attack: T1496

traits:
  - id: perl-cryptojacking-hash-label
    desc: Perl cryptojacking hash label
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "cryptojacking:"

  - id: perl-mining-target-prefix
    desc: Perl mining target prefix
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'target = ''00000''[\s\S]{0,120}''f'' x 51'

  - id: perl-submit-share-path
    desc: Perl submit share path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /submit/share

composite_rules:
  - id: perl-proof-of-work-miner
    desc: Perl proof-of-work miner
    crit: hostile
    conf: 0.98
    all:
      - id: perl-cryptojacking-hash-label
      - id: perl-mining-target-prefix
    any:
      - id: perl-submit-share-path
