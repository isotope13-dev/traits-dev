defaults:
  platforms: [windows, unix]
  for: [java, class, java_class]
  attack: T1496

traits:
  - id: java-miner-name
    desc: Java miner class-name fragment
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)\b(class|interface)\s+[A-Za-z0-9_$]*miner[A-Za-z0-9_$]*\b'
    unless:
      - id: well-known/game/mindustry::mindustry-source-tree
      - id: well-known/game/mindustry::mindustry-source-identity

  - id: java-miner-nonce-work
    desc: Java mining nonce paired with target markers
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)nonceVal.{0,90}(difficulty|target)'

  - id: java-miner-solution-report
    desc: Java miner solution assignment marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)(^|[^A-Za-z0-9_])SOLUTION\s*='

  - id: java-miner-sha256-work
    desc: Java SHA256 nonce work with mining markers
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)SHA-256.{0,90}nonceVal.{0,90}(difficulty|target)'

composite_rules:
  - id: java-background-crypto-miner
    desc: Java background crypto miner
    crit: hostile
    conf: 0.98
    all:
      - id: java-miner-name
      - id: java-miner-sha256-work
      - id: java-miner-solution-report

  - id: java-bytecode-crypto-miner
    desc: Java bytecode crypto miner
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: java-miner-name
      - id: java-miner-sha256-work
      - id: java-miner-solution-report
