defaults:
  platforms: [windows, unix]
  for: [java, class, java_class]
  attack: T1496

traits:
  - id: java-miner-name
    desc: Java miner name
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: miner

  - id: java-miner-nonce-work
    desc: Java miner nonce work
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: nonceVal

  - id: java-miner-solution-report
    desc: Java miner solution report
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SOLUTION=

  - id: java-miner-sha256-work
    desc: Java SHA256 miner work
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'SHA-256[\s\S]{0,90}nonceVal|nonceVal[\s\S]{0,90}SHA-256'

composite_rules:
  - id: java-background-crypto-miner
    desc: Java background crypto miner
    crit: hostile
    conf: 0.98
    all:
      - id: java-miner-name
      - id: java-miner-sha256-work
      - id: java-miner-solution-report

  - id: java-bytecode-crypto-miner
    desc: Java bytecode crypto miner
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: java-miner-name
      - id: java-miner-sha256-work
      - id: java-miner-solution-report
