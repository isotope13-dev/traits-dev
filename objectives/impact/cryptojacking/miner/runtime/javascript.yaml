defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1496

traits:
  - id: js-nonce-hash-prefix-check
    desc: JS nonce hash prefix check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'nonce[\s\S]{0,360}hash\.startsWith\('

  - id: js-mining-iterations-const
    desc: JS mining iterations const
    crit: component
    conf: 0.88
    if:
      type: text
      substr: MINING_ITERATIONS

  - id: js-iteration-window-multiply
    desc: JS iteration window multiply
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'iterations\s*\*\s*10'

  - id: js-nonce-iteration-bound
    desc: JS nonce iteration bound
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'nonce\s*<\s*.{0,50}iterations'

composite_rules:
  - id: js-mining-iteration-window
    desc: JS mining iteration window
    crit: component
    conf: 0.88
    any:
      - id: js-mining-iterations-const
      - id: js-iteration-window-multiply
      - id: js-nonce-iteration-bound

  - id: js-pow-hash-miner-loop
    desc: JS proof-of-work miner loop
    crit: hostile
    conf: 0.98
    all:
      - id: js-nonce-hash-prefix-check
      - id: js-mining-iteration-window
      - id: objectives/command-and-control/dropper/execution/script-dropper::sha256-digest-hex-call
      - id: micro-behaviors/data/control-flow/loop::infinite-loop-header
    any:
      - id: micro-behaviors/os/sysinfo/cpu::node-cpu-information-query
      - id: micro-behaviors/crypto/hash/mining::mining-keyword
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
