defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [scripts, pe, elf, macho]
traits:
  - id: stratum-tcp
    desc: stratum+tcp protocol
    crit: notable
    conf: 0.8
    mbc: B0041
    attack: T1496
    if:
      type: text
      substr: stratum+tcp://
  - id: stratum-ssl
    desc: stratum+ssl protocol
    crit: notable
    conf: 0.8
    mbc: B0041
    attack: T1496
    if:
      type: text
      substr: stratum+ssl://
  - id: stratum-lower
    desc: stratum string (lowercase)
    crit: component
    conf: 0.7
    if:
      type: text
      word: stratum
  - id: stratum-title
    desc: Stratum string (title case)
    crit: notable
    conf: 0.7
    count_min: 2
    if:
      type: text
      word: Stratum
  - id: stratum-upper
    desc: STRATUM string (uppercase)
    crit: component
    conf: 0.7
    if:
      type: text
      word: STRATUM
  - id: mining-subscribe
    desc: mining.subscribe Stratum method
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: mining.subscribe
  - id: mining-authorize
    desc: mining.authorize Stratum method
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: mining.authorize
  - id: mining-submit
    desc: mining.submit Stratum method
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: mining.submit
  - id: pool-subdomain
    desc: pool. subdomain prefix
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: pool\.[a-z0-9-]+\.[a-z]{2,10}
    not:
      - regex: pool\.(dll|exe)\.compressed
      - substr: no_pool.patch.tmp
  - id: pool-url
    desc: Mining pool URL reference
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (https?|stratum\+tcp|stratum\+ssl)://[^\s]{1,120}\bpool\b
    not:
      - substr: spool
      - substr: poolmanager.pool
      - substr: github.com/openresty/lua-tablepool
  - id: pool-port-3333
    desc: :3333 common mining pool port
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: :3333
  - id: pool-port-14433
    desc: :14433 common mining pool port
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: :14433
  - id: xmrpool-eu
    desc: xmrpool.eu mining pool
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: xmrpool.eu
  - id: minexmr-com
    desc: minexmr.com mining pool
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: minexmr.com
    unless:
      - id: metadata/package::embedded-domain-reputation-catalog
  - id: supportxmr-com
    desc: supportxmr.com mining pool
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: supportxmr.com
  - id: nanopool-org
    desc: nanopool.org mining pool
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: nanopool.org
  - id: f2pool-com
    desc: f2pool.com mining pool
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: f2pool.com
  - id: hashvault-pro
    desc: hashvault.pro mining pool
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: hashvault.pro
  - id: pool-minergate-com
    desc: pool.minergate.com mining pool
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: pool.minergate.com
  - id: moneroocean-stream
    desc: moneroocean.stream mining pool
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: moneroocean.stream
    unless:
      - id: metadata/package::embedded-domain-reputation-catalog
  - id: miner-word
    desc: miner keyword
    crit: notable
    conf: 0.4
    if:
      type: text
      word: miner
    not:
      - substr: github.com/openresty/lua
    unless:
      - id: metadata/package::embedded-domain-reputation-catalog
  - id: miner-title
    desc: Miner string (title case)
    crit: notable
    conf: 0.6
    if:
      type: text
      word: Miner
  - id: miner-upper
    desc: MINER string (uppercase)
    crit: notable
    conf: 0.6
    if:
      type: text
      word: MINER
  - id: hashrate-str
    desc: hashrate keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: hashrate
  - id: hashrate-title
    desc: Hashrate metric (title case)
    crit: notable
    conf: 0.75
    if:
      type: text
      word: Hashrate
  - id: hashrate-upper
    desc: HASHRATE metric (uppercase)
    crit: notable
    conf: 0.75
    if:
      type: text
      word: HASHRATE
  - id: wallet-ref
    desc: wallet keyword
    crit: component
    conf: 0.4
    for: [scripts]
    count_min: 2
    unless:
      - id: metadata/file/text::uproc-tools-catalog
    if:
      type: text
      word: wallet
  - id: coinhive-str
    desc: coinhive reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: coinhive
  - id: mining-lower
    desc: mining string (lowercase)
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: mining
  - id: mining-title
    desc: Mining string (title case)
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: Mining
  - id: mining-upper
    desc: MINING string (uppercase)
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: MINING
  - id: cryptonight-str
    desc: cryptonight algorithm
    crit: notable
    conf: 0.6
    if:
      type: text
      word: cryptonight
  - id: cryptonight-title
    desc: CryptoNight algorithm (title case)
    crit: notable
    conf: 0.75
    if:
      type: text
      word: CryptoNight
  - id: cryptonight-upper
    desc: CRYPTONIGHT algorithm (uppercase)
    crit: notable
    conf: 0.75
    if:
      type: text
      word: CRYPTONIGHT
  - id: randomx
    desc: RandomX mining algorithm
    crit: notable
    conf: 0.75
    if:
      type: text
      word: RandomX
  - id: cn-variant
    desc: CryptoNight variant prefix
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: cn/
  - id: cn-v7
    desc: CryptoNight v7 algorithm
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: cryptonight(_v7|-monerov7)
  - id: cn-v8
    desc: CryptoNight v8 algorithm
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: cryptonight(_v8|-monerov8)
  - id: cn-msr
    desc: CryptoNight MSR variant
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: c[rn]/msr
  - id: cn-r
    desc: CryptoNight R variant
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: cryptonight(_r|/r)
  - id: cn-conceal
    desc: CryptoNight Conceal variant
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: c[rn]/conceal
  - id: monero-lower
    desc: monero cryptocurrency reference
    crit: notable
    conf: 0.5
    if:
      type: text
      exact: monero
  - id: monero-wallet-4
    desc: Monero wallet value with context
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)(wallet|xmr|monero|address)[\s:=\"']{0,16}4[1-9A-HJ-NP-Za-km-z]{94}\b
  - id: monero-wallet-8
    desc: Monero subaddress value with context
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)(wallet|xmr|monero|address)[\s:=\"']{0,16}8[1-9A-HJ-NP-Za-km-z]{94}\b
  - id: opencl-string
    desc: OpenCL GPU computing framework
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: OpenCL
  - id: cuda-string
    desc: CUDA GPU computing framework
    crit: baseline
    conf: 0.7
    if:
      type: text
      word: CUDA
  - id: hugepages-lower
    desc: hugepages string (lowercase)
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: hugepages
  - id: hugepages-title
    desc: Hugepages string (title case)
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: Hugepages
  - id: hugepages-upper
    desc: HUGEPAGES string (uppercase)
    crit: baseline
    conf: 0.6
    if:
      type: text
      word: HUGEPAGES
  - id: threads-config-flag
    desc: Worker threads configuration flag
    # Replaces the old `threads-string` (which matched the bare word `threads`
    # and fired on every threaded Go/Rust/C runtime). Miners expose worker
    # count as a CLI flag; match that shape instead of the generic word.
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)(--threads|-t|numThreads|num_threads|threadCount)[= ]\d+
  - id: noofthreads-cli-help
    desc: noOfThreads miner CLI help text
    crit: notable
    conf: 0.85
    if:
      type: text
      exact: The parameter [noOfThreads] is optional. When omitted it will use as many threads as there are logical cores in the system.
  - id: noofthreads-token
    desc: noOfThreads command-line parameter token
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: '[noOfThreads]'
  - id: worker-thread-label
    desc: Worker Thread label
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: Worker Thread
  - id: boost-asio-win-iocp
    desc: Boost.Asio Windows IOCP runtime marker
    crit: notable
    conf: 0.75
    if:
      type: text
      word: boost::asio::detail::win_iocp_io_context
  - id: go-runtime
    desc: go.runtime Go runtime marker
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: go.runtime
composite_rules:
  - id: stratum-keyword
    desc: Stratum keyword variants
    any:
      - id: stratum-lower
      - id: stratum-title
      - id: stratum-upper
  - id: mining-methods
    desc: Stratum mining RPC methods
    any:
      - id: mining-subscribe
      - id: mining-authorize
      - id: mining-submit
  - id: pool-ports
    desc: Common mining pool ports
    any:
      - id: pool-port-3333
      - id: pool-port-14433
  - id: monero-wallets-comp
    desc: Monero wallet address patterns
    any:
      - id: monero-wallet-4
      - id: monero-wallet-8
  - id: miner-keyword
    desc: Miner keyword variants
    any:
      - id: miner-word
      - id: miner-title
      - id: miner-upper
  - id: cryptonight-keyword
    desc: CryptoNight keyword variants
    any:
      - id: cryptonight-str
      - id: cryptonight-title
      - id: cryptonight-upper
  - id: cn-variants
    desc: CryptoNight algorithm variants
    any:
      - id: cn-v7
      - id: cn-v8
      - id: cn-msr
      - id: cn-r
      - id: cn-conceal
      - id: cryptonight-str
      - id: cryptonight-title
      - id: cryptonight-upper
  - id: known-pool-domains
    desc: Known mining pool domains
    any:
      - id: xmrpool-eu
      - id: minexmr-com
      - id: supportxmr-com
      - id: nanopool-org
      - id: f2pool-com
      - id: hashvault-pro
      - id: pool-minergate-com
      - id: moneroocean-stream
  - id: mining-keyword
    desc: Mining keyword variants
    any:
      - id: mining-lower
      - id: mining-title
      - id: mining-upper
  - id: hashrate-keyword
    desc: Hashrate keyword variants
    any:
      - id: hashrate-str
      - id: hashrate-title
      - id: hashrate-upper
  - id: hugepages-keyword
    desc: Hugepages keyword variants
    any:
      - id: hugepages-lower
      - id: hugepages-title
      - id: hugepages-upper
  - id: gpu-frameworks
    desc: GPU computing frameworks
    any:
      - id: opencl-string
      - id: cuda-string
  - id: go-runtime-markers
    desc: Go runtime markers
    any:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: go-runtime
  - id: mining-context
    desc: Mining-specific context strings
    any:
      - id: stratum-keyword
      - id: well-known/malware/miner/xmrig::xmrig-name
      - id: miner-keyword
      - id: mining-subscribe
      - id: cryptonight-keyword
      - id: randomx
      - id: cn-variant
  - id: randomx-stratum
    desc: RandomX with Stratum pool
    all:
      - id: randomx
      - id: stratum-tcp
  - id: cn-variant-stratum
    desc: CryptoNight variant Stratum pool
    all:
      - id: cn-variant
      - id: stratum-tcp
  - id: xmrig
    desc: XMRig cryptocurrency miner
    crit: suspicious
    conf: 0.95
    attack: T1496
    any:
      - id: well-known/malware/miner/xmrig::xmrig-name
      - id: randomx-stratum
      - id: cn-variant-stratum
  - id: cryptominer-stratum
    desc: Stratum mining protocol usage
    crit: suspicious
    conf: 0.85
    attack: T1496
    any:
      - id: stratum-keyword
      - id: mining-methods
      - id: pool-ports
  - id: monero-wallet
    desc: Monero wallet mining context
    crit: suspicious
    conf: 0.9
    attack: T1496
    all:
      - id: monero-wallets-comp
      - id: mining-context
    unless:
      - id: go-runtime-markers
  - id: gpu-hashrate
    desc: GPU framework with hashrate
    all:
      - id: gpu-frameworks
      - id: hashrate-keyword
  - id: hugepages-or-threads
    desc: Hugepages or worker-thread configuration
    any:
      - id: hugepages-keyword
      - id: threads-config-flag
  - id: thread-tuned-worker-runtime
    desc: Thread-tuned worker runtime markers
    needs: 2
    any:
      - id: noofthreads-cli-help
      - id: noofthreads-token
      - id: worker-thread-label
  - id: asio-winsock-runtime
    desc: Boost.Asio IOCP with Winsock initialization
    all:
      - id: boost-asio-win-iocp
      - id: micro-behaviors/communications/socket/init::wsa-startup
  - id: mining-config
    desc: Mining configuration with context
    all:
      - id: hugepages-or-threads
      - id: mining-context
  - id: hardware-mining
    desc: Hardware mining configuration
    crit: suspicious
    conf: 0.8
    attack: T1496
    any:
      - id: gpu-hashrate
      - id: mining-config
    unless:
      - id: go-runtime-markers
      - id: micro-behaviors/dylib/library::system-lib-marker
  - id: threaded-asio-miner
    desc: Windows threaded cryptominer runtime profile
    crit: suspicious
    conf: 0.9
    attack: T1496
    all:
      - id: noofthreads-cli-help
      - id: boost-asio-win-iocp
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
  - id: miner-type
    desc: Cryptocurrency miner type
    any:
      - id: xmrig
      - id: cryptominer-stratum
  - id: known-pools
    desc: Connection to known mining pools
    any:
      - id: known-pool-domains
      - id: stratum-tcp
  - id: active-miner
    desc: Active cryptocurrency miner
    crit: suspicious
    conf: 0.95
    mbc: B0014
    attack: T1496
    all:
      - id: miner-type
      - id: known-pools
  - id: miner
    desc: Cryptocurrency mining patterns
    crit: suspicious
    conf: 0.66
    mbc: B0041
    attack: T1496
    size_max: 500000
    needs: 2
    any:
      - id: stratum-tcp
      - id: stratum-ssl
      - id: pool-subdomain
      - id: pool-url
      - id: miner-word
      - id: well-known/malware/miner/xmrig::xmrig-name
      - id: monero-lower
      - id: hashrate-str
      - id: wallet-ref
      - id: coinhive-str
      - id: cryptonight-str
