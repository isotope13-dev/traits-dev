defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, pe, elf, macho]
traits:
- id: xmrpool-eu
  desc: xmrpool.eu mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: xmrpool.eu
- id: minexmr-com
  desc: minexmr.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: minexmr.com
  unless:
  - id: metadata/package/quality/
  - id: metadata/file/catalog/identity/
  # Security/observability scanners ship mining-pool domains as detection
  # signatures + test fixtures (e.g. ClawMetry's threat-heuristics scanner).
  - id: well-known/tool/detection/clawmetry/
- id: supportxmr-com
  desc: supportxmr.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: supportxmr.com
- id: nanopool-org
  desc: nanopool.org mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: nanopool.org
- id: f2pool-com
  desc: f2pool.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: f2pool.com
- id: hashvault-pro
  desc: hashvault.pro mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: hashvault.pro
- id: pool-minergate-com
  desc: pool.minergate.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: pool.minergate.com
- id: moneroocean-stream
  desc: moneroocean.stream mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: moneroocean.stream
  unless:
  - id: metadata/package/quality/
  - id: metadata/file/catalog/identity/
composite_rules:
- id: known-pool-domains
  desc: Known mining pool domains
  any:
  - id: xmrpool-eu
  - id: minexmr-com
  - id: supportxmr-com
  - id: nanopool-org
  - id: f2pool-com
  - id: hashvault-pro
  - id: pool-minergate-com
  - id: moneroocean-stream
  - id: objectives/impact/cryptojacking/pool::pool-minexmr
  - id: objectives/impact/cryptojacking/pool::moneroocean-string
- id: known-pools
  desc: Connection to known mining pools
  any:
  - id: known-pool-domains
  - id: objectives/impact/cryptojacking/miner/stratum::stratum-tcp
