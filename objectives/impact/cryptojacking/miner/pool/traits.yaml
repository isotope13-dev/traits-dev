defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, pe, elf, macho]
traits:
- id: pool-subdomain
  desc: pool. subdomain prefix
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: \bpool\.[a-z0-9-]+\.[a-z]{2,4}\b
  not:
  - regex: pool\.(dll|exe|drv|sys)\b
  - regex: \bpool\.[a-z0-9-]+\.(dll|drv|sys|exe)\b
  - substr: no_pool.patch.tmp
  - substr: sks-keyservers.net
  unless:
  - id: well-known/lib/aws-sdk-ruby::library
- id: pool-url
  desc: Mining pool URL reference
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: (https?|stratum\+tcp|stratum\+ssl)://[^\s]{1,120}\bpool\b
  not:
  - substr: spool
  - substr: poolmanager.pool
  - substr: github.com/openresty/lua-tablepool
- id: xmrpool-eu
  desc: xmrpool.eu mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: xmrpool.eu
- id: minexmr-com
  desc: minexmr.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: minexmr.com
  unless:
  - id: metadata/package::embedded-domain-reputation-catalog
  - id: metadata/file/text::frequency-list-catalog
- id: supportxmr-com
  desc: supportxmr.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: supportxmr.com
- id: nanopool-org
  desc: nanopool.org mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: nanopool.org
- id: f2pool-com
  desc: f2pool.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: f2pool.com
- id: hashvault-pro
  desc: hashvault.pro mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: hashvault.pro
- id: pool-minergate-com
  desc: pool.minergate.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: pool.minergate.com
- id: moneroocean-stream
  desc: moneroocean.stream mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: moneroocean.stream
  unless:
  - id: metadata/package::embedded-domain-reputation-catalog
  - id: metadata/file/text::frequency-list-catalog
composite_rules:
- id: known-pool-domains
  desc: Known mining pool domains
  any:
  - id: xmrpool-eu
  - id: minexmr-com
  - id: supportxmr-com
  - id: nanopool-org
  - id: f2pool-com
  - id: hashvault-pro
  - id: pool-minergate-com
  - id: moneroocean-stream
  - id: objectives/impact/cryptojacking/pool::pool-minexmr
  - id: objectives/impact/cryptojacking/pool::moneroocean-string
- id: known-pools
  desc: Connection to known mining pools
  any:
  - id: known-pool-domains
  - id: objectives/impact/cryptojacking/miner/protocol::stratum-tcp
