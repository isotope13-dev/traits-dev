defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, pe, elf, macho]
traits:
- id: pool-subdomain
  desc: Mining-pool shaped subdomain
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: \bpool\.[a-z0-9-]+\.[a-z]{2,4}\b
  not:
  - regex: pool\.(dll|exe|drv|sys)\b
  - regex: \bpool\.[a-z0-9-]+\.(dll|drv|sys|exe)\b
  - regex: \bpool\.(d\.ts|js|ts|js\.map|ts\.map|d\.ts\.map)\b
  # Exclude property-access patterns where the final segment is a JS method/property name
  - regex: \bpool\.[a-z0-9_]+\.(get|set|add|delete|has|clear|keys|values|entries|forEach|map|filter|find|push|pop|some|every|then|catch|bind|size|length|type|name|node|nodes|root|next|prev|item|items|data|value|state|self|key|all|any|none|min|max|sum|avg|raw|copy|fold|join|sort|head|tail|init|last)\b
  - substr: no_pool.patch.tmp
  - substr: sks-keyservers.net
  # NTP time-sync servers, not mining pools. pool.ntp.org (and country/vendor
  # zones like 2.pool.ntp.org, rhel.pool.ntp.org) all contain this substring.
  - substr: pool.ntp.org
  - substr: db.pool.acquire
  - substr: pool.acquire.duration
  - regex: '\bpool\.acquire\.dura\b'
  - regex: '\bpool\.acquire\.duration\b'
  unless:
  - id: well-known/lib/aws-sdk-ruby
  - id: well-known/tool/detection/clawmetry/
- id: pool-url
  desc: Mining pool URL reference
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: (https?|stratum\+tcp|stratum\+ssl)://[^\s]{1,120}\bpool\b
  not:
  - substr: spool
  - substr: poolmanager.pool
  - substr: github.com/openresty/lua-tablepool
  # NTP join URL (http://www.pool.ntp.org/join.html) — the regex match truncates
  # at `\bpool\b` so a `not:` substr can't see `.ntp.org`; suppress file-wide.
  unless:
  - type: text
    substr: pool.ntp.org
- id: xmrpool-eu
  desc: xmrpool.eu mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: xmrpool.eu
- id: minexmr-com
  desc: minexmr.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: minexmr.com
  unless:
  - id: metadata/package/quality/context/
  - id: metadata/file/catalog/identity/
  # Security/observability scanners ship mining-pool domains as detection
  # signatures + test fixtures (e.g. ClawMetry's threat-heuristics scanner).
  - id: well-known/tool/detection/clawmetry/
- id: supportxmr-com
  desc: supportxmr.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: supportxmr.com
- id: nanopool-org
  desc: nanopool.org mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: nanopool.org
- id: f2pool-com
  desc: f2pool.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: f2pool.com
- id: hashvault-pro
  desc: hashvault.pro mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: hashvault.pro
- id: pool-minergate-com
  desc: pool.minergate.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: pool.minergate.com
- id: moneroocean-stream
  desc: moneroocean.stream mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: moneroocean.stream
  unless:
  - id: metadata/package/quality/context/
  - id: metadata/file/catalog/identity/
composite_rules:
- id: known-pool-domains
  desc: Known mining pool domains
  any:
  - id: xmrpool-eu
  - id: minexmr-com
  - id: supportxmr-com
  - id: nanopool-org
  - id: f2pool-com
  - id: hashvault-pro
  - id: pool-minergate-com
  - id: moneroocean-stream
  - id: objectives/impact/cryptojacking/pool::pool-minexmr
  - id: objectives/impact/cryptojacking/pool::moneroocean-string
- id: known-pools
  desc: Connection to known mining pools
  any:
  - id: known-pool-domains
  - id: objectives/impact/cryptojacking/miner/stratum::stratum-tcp
