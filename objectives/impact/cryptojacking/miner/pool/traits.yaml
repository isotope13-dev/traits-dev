defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, pe, elf, macho]
traits:
- id: xmrpool-eu
  desc: xmrpool.eu mining pool
  crit: suspicious
  conf: 0.85
  unless:
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: well-known/app/1password::onepassword-runtime-context
  - id: well-known/app/1password::onepassword-native-module-context
  if:
    type: text
    substr: xmrpool.eu
- id: minexmr-com
  desc: minexmr.com mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: minexmr.com
  unless:
  - id: metadata/package/quality/
  - id: metadata/file/catalog/identity/
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: well-known/app/1password::onepassword-runtime-context
  - id: well-known/app/1password::onepassword-native-module-context
  # Security/observability scanners ship mining-pool domains as detection
  # signatures + test fixtures (e.g. ClawMetry's threat-heuristics scanner).
  - id: well-known/tool/detection/clawmetry/
- id: supportxmr-com
  desc: supportxmr.com mining pool
  crit: suspicious
  conf: 0.85
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    - id: well-known/app/1password::onepassword-runtime-context
    - id: well-known/app/1password::onepassword-native-module-context
  if:
    type: text
    substr: supportxmr.com
- id: supportxmr-failover-endpoints
  desc: Multiple supportxmr.com mining-pool endpoints
  crit: suspicious
  conf: 0.95
  count_min: 3
  unless:
  - id: metadata/package/quality/
  - id: metadata/file/catalog/identity/
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: well-known/app/1password::onepassword-runtime-context
  - id: well-known/app/1password::onepassword-native-module-context
  - id: well-known/tool/detection/clawmetry/
  if:
    type: text
    regex: '(pool\.)?supportxmr\.com:\d{2,6}'
- id: nanopool-org
  desc: nanopool.org mining pool
  crit: suspicious
  conf: 0.85
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    - id: well-known/app/1password::onepassword-runtime-context
    - id: well-known/app/1password::onepassword-native-module-context
  if:
    type: text
    substr: nanopool.org
- id: f2pool-com
  desc: f2pool.com mining pool
  crit: suspicious
  conf: 0.85
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    - id: well-known/app/1password::onepassword-runtime-context
    - id: well-known/app/1password::onepassword-native-module-context
  if:
    type: text
    substr: f2pool.com
- id: hashvault-pro
  desc: hashvault.pro mining pool
  crit: suspicious
  conf: 0.85
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    - id: well-known/app/1password::onepassword-runtime-context
    - id: well-known/app/1password::onepassword-native-module-context
  if:
    type: text
    substr: hashvault.pro
- id: pool-minergate-com
  desc: pool.minergate.com mining pool
  crit: suspicious
  conf: 0.85
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    - id: well-known/app/1password::onepassword-runtime-context
    - id: well-known/app/1password::onepassword-native-module-context
  if:
    type: text
    substr: pool.minergate.com
- id: moneroocean-stream
  desc: moneroocean.stream mining pool
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: moneroocean.stream
  unless:
  - id: metadata/package/quality/
  - id: metadata/file/catalog/identity/
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: well-known/app/1password::onepassword-runtime-context
  - id: well-known/app/1password::onepassword-native-module-context
composite_rules:
- id: known-pool-domains
  desc: Known mining pool domains
  any:
  - id: xmrpool-eu
  - id: minexmr-com
  - id: supportxmr-com
  - id: nanopool-org
  - id: f2pool-com
  - id: hashvault-pro
  - id: pool-minergate-com
  - id: moneroocean-stream
  - id: objectives/impact/cryptojacking/pool::pool-minexmr
  - id: objectives/impact/cryptojacking/pool::moneroocean-string
- id: ruby-xmrig-pool-launcher
  desc: Ruby launches XMRig against a mining pool
  crit: hostile
  conf: 0.99
  attack: T1496
  mbc: B0018
  all:
  - id: metadata/file/string/identity::xmrig-product
  - id: known-pool-domains
  - id: micro-behaviors/process/create/shell/lang::ruby-exec
  - id: micro-behaviors/process/create/system::ruby-system
