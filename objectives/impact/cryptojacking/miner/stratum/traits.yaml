defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, pe, elf, macho]
traits:
- id: stratum-tcp
  desc: stratum+tcp protocol
  crit: suspicious
  conf: 0.8
  mbc: B0041
  attack: T1496
  if:
    type: text
    substr: stratum+tcp://
  unless:
  # Security/observability scanners reference the stratum protocol as a
  # detection signature / test fixture (e.g. ClawMetry's threat heuristics).
  - id: well-known/tool/detection/clawmetry/
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - id: metadata/package/quality/recognized-contexts::explicit-miner-context
  - id: metadata/package/quality/recognized-contexts::package-context
  - id: metadata/package/quality/recognized-contexts::source-member-context
- id: stratum-ssl
  desc: stratum+ssl protocol
  crit: suspicious
  conf: 0.8
  mbc: B0041
  attack: T1496
  if:
    type: text
    substr: stratum+ssl://
  unless:
  - id: metadata/package/quality/recognized-contexts::explicit-miner-context
  - id: metadata/package/quality/recognized-contexts::package-context
  - id: metadata/package/quality/recognized-contexts::source-member-context
- id: stratum-lower
  desc: Stratum term near mining context
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(?i)\bstratum\b.{0,40}\b(mining|pool|subscribe)\b'
  unless:
  - id: well-known/tool/detection/clawmetry/
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - id: well-known/tool/detection/security-scanner::defensive-dangerous-command-doc
- id: stratum-title
  desc: Stratum mining term with pool context
  crit: notable
  conf: 0.7
  count_min: 2
  if:
    type: text
    regex: (?i)\bStratum\b.{0,40}\bpool\b
- id: stratum-upper
  desc: Uppercase Stratum term near mining context
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\bSTRATUM\b.{0,40}\b(MINING|POOL|SUBSCRIBE)\b'
- id: mining-subscribe
  desc: mining.subscribe Stratum method
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: mining.subscribe
  unless:
  - id: metadata/package/quality/recognized-contexts::explicit-miner-context
  - id: metadata/package/quality/recognized-contexts::package-context
  - id: metadata/package/quality/recognized-contexts::source-member-context
- id: mining-authorize
  desc: mining.authorize Stratum method
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: mining.authorize
  unless:
  - id: metadata/package/quality/recognized-contexts::explicit-miner-context
  - id: metadata/package/quality/recognized-contexts::package-context
  - id: metadata/package/quality/recognized-contexts::source-member-context
- id: mining-submit
  desc: mining.submit Stratum method
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: mining.submit
  unless:
  - id: metadata/package/quality/recognized-contexts::explicit-miner-context
  - id: metadata/package/quality/recognized-contexts::package-context
  - id: metadata/package/quality/recognized-contexts::source-member-context
- id: pool-port-3333
  desc: :3333 common mining pool port
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(^|[^0-9]):3333([^0-9]|$)'
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: metadata/package/quality/recognized-contexts::explicit-miner-context
  - id: metadata/package/quality/recognized-contexts::package-context
  - id: metadata/package/quality/recognized-contexts::source-member-context
composite_rules:
- id: stratum-keyword
  desc: Stratum keyword variants
  any:
  - id: stratum-lower
  - id: stratum-title
  - id: stratum-upper
- id: mining-methods
  desc: Stratum mining RPC methods
  any:
  - id: mining-subscribe
  - id: mining-authorize
  - id: mining-submit
- id: cryptominer-stratum
  desc: Stratum protocol or mining RPC method
  crit: suspicious
  conf: 0.85
  attack: T1496
  any:
  - id: mining-methods
  - id: stratum-tcp
  - id: stratum-ssl
  unless:
  - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-meipass
  - id: metadata/file/magic/identity/
  - id: metadata/package/quality/recognized-contexts::explicit-miner-context
  - id: metadata/package/quality/recognized-contexts::package-context
  - id: metadata/package/quality/recognized-contexts::source-member-context
