defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, pe, elf, macho]
traits:
- id: stratum-tcp
  desc: stratum+tcp protocol
  crit: suspicious
  conf: 0.8
  mbc: B0041
  attack: T1496
  if:
    type: text
    substr: stratum+tcp://
  unless:
  # Security/observability scanners reference the stratum protocol as a
  # detection signature / test fixture (e.g. ClawMetry's threat heuristics).
  - id: well-known/tool/detection/clawmetry/
- id: stratum-ssl
  desc: stratum+ssl protocol
  crit: suspicious
  conf: 0.8
  mbc: B0041
  attack: T1496
  if:
    type: text
    substr: stratum+ssl://
- id: stratum-lower
  desc: stratum string (lowercase)
  crit: component
  conf: 0.7
  if:
    type: text
    word: stratum
  unless:
  - id: well-known/tool/detection/clawmetry/
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: stratum-title
  desc: Stratum string (title case)
  crit: notable
  conf: 0.7
  count_min: 2
  if:
    type: text
    word: Stratum
- id: stratum-upper
  desc: STRATUM string (uppercase)
  crit: component
  conf: 0.7
  if:
    type: text
    word: STRATUM
- id: mining-subscribe
  desc: mining.subscribe Stratum method
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: mining.subscribe
- id: mining-authorize
  desc: mining.authorize Stratum method
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: mining.authorize
- id: mining-submit
  desc: mining.submit Stratum method
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: mining.submit
- id: pool-port-3333
  desc: :3333 common mining pool port
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(^|[^0-9]):3333([^0-9]|$)'
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: pool-port-14433
  desc: :14433 common mining pool port
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(^|[^0-9]):14433([^0-9]|$)'
composite_rules:
- id: stratum-keyword
  desc: Stratum keyword variants
  any:
  - id: stratum-lower
  - id: stratum-title
  - id: stratum-upper
- id: mining-methods
  desc: Stratum mining RPC methods
  any:
  - id: mining-subscribe
  - id: mining-authorize
  - id: mining-submit
- id: pool-ports
  desc: Common mining pool ports
  any:
  - id: pool-port-3333
  - id: pool-port-14433
- id: cryptominer-stratum
  desc: Stratum mining protocol usage
  crit: suspicious
  conf: 0.85
  attack: T1496
  all:
  - id: stratum-keyword
  any:
  - id: mining-methods
  - id: pool-ports
  - id: stratum-tcp
  - id: stratum-ssl
  unless:
  - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-meipass
  - id: metadata/file/magic/identity/
