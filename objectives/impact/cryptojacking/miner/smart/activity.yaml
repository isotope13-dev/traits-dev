defaults:
  platforms: [linux, macos, windows]
  for: [python, javascript, powershell, pe, elf]
  attack: T1496
  mbc: B0004
traits:
  - id: taskmgr-check
    desc: Task Manager process check
    crit: component
    conf: 0.8
    for: [powershell, pe, python, javascript]
    if:
      type: text
      regex: (?i)taskmgr(\.exe)?
  - id: procexp-check
    desc: Process Explorer check
    crit: component
    conf: 0.85
    for: [powershell, pe, python, javascript]
    if:
      type: text
      regex: (?i)procexp(64)?(\.exe)?
  - id: procmon-check
    desc: Process Monitor check
    crit: component
    conf: 0.85
    for: [powershell, pe, python, javascript]
    if:
      type: text
      regex: (?i)procmon(64)?(\.exe)?
  - id: perfmon-check
    desc: Performance Monitor check
    crit: component
    conf: 0.7
    for: [powershell, pe, python, javascript]
    if:
      type: text
      regex: (?i)perfmon(\.exe)?
  - id: resmon-check
    desc: Resource Monitor check
    crit: component
    conf: 0.75
    for: [powershell, pe, python, javascript]
    if:
      type: text
      regex: (?i)resmon(\.exe)?
  - id: get-last-input-info
    desc: GetLastInputInfo API (idle detection)
    crit: component
    conf: 0.7
    for: [powershell, pe, python, javascript]
    if:
      type: text
      substr: GetLastInputInfo
  - id: get-idle-time
    desc: GetIdleTime function
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)\bget.?idle.?time\b
  - id: pause-if-str
    desc: PauseIf conditional string
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)pause.?if.?(task|active|idle|user)
  - id: xmrig-str
    desc: XMRig miner reference
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      id: metadata/file/string/identity::xmrig-product
  - id: mining-pool-monero
    desc: Monero mining pool reference
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: (?i)pool\.monero
  - id: mining-pool-xmr
    desc: XMR mining pool reference
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: (?i)(2miners|nicehash)
  - id: cpu-usage-limit-str
    desc: CPU usage limit string
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (?i)cpu.{0,4}(usage|percent).{0,24}(limit|throttle)
  - id: pause-if-cpu-str
    desc: Pause-if CPU string
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)pause.?if.{0,24}cpu
  - id: browser-document-hidden
    desc: Browser document visibility check
    crit: component
    conf: 0.8
    for: [javascript]
    if:
      type: text
      substr: document.hidden
  - id: browser-visibilitychange-event
    desc: Browser visibilitychange listener
    crit: component
    conf: 0.8
    for: [javascript]
    if:
      type: text
      substr: visibilitychange
  - id: browser-last-activity-var
    desc: Browser lastActivity state variable
    crit: component
    conf: 0.78
    for: [javascript]
    if:
      type: text
      word: lastActivity
  - id: browser-mousemove-listener
    desc: Browser mousemove activity listener
    crit: component
    conf: 0.78
    for: [javascript]
    if:
      type: text
      substr: addEventListener('mousemove'
  - id: browser-keydown-listener
    desc: Browser keydown activity listener
    crit: component
    conf: 0.78
    for: [javascript]
    if:
      type: text
      substr: addEventListener('keydown'
  - id: browser-scroll-listener
    desc: Browser scroll activity listener
    crit: component
    conf: 0.78
    for: [javascript]
    if:
      type: text
      substr: addEventListener('scroll'
  - id: browser-touchstart-listener
    desc: Browser touchstart activity listener
    crit: component
    conf: 0.78
    for: [javascript]
    if:
      type: text
      substr: addEventListener('touchstart'
composite_rules:
  - id: cpu-usage-str
    desc: CPU usage monitoring string
    crit: notable
    conf: 0.6
    any:
      - id: cpu-usage-limit-str
      - id: pause-if-cpu-str
  - id: monitoring-tool-checks
    desc: System monitoring tool detection
    crit: suspicious
    conf: 0.85
    needs: 3
    any:
      - id: taskmgr-check
      - id: procexp-check
      - id: procmon-check
      - id: perfmon-check
      - id: resmon-check
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
  - id: activity-monitoring
    desc: User activity monitoring
    crit: notable
    conf: 0.8
    any:
      - id: get-last-input-info
      - id: get-idle-time
      - id: browser-visibility-mining-gate
      - id: browser-activity-mining-gate
  - id: browser-visibility-mining-gate
    desc: Browser visibility gate for mining
    crit: component
    conf: 0.86
    near_lines: 20
    all:
      - id: browser-document-hidden
      - id: browser-visibilitychange-event
  - id: browser-user-activity-listener
    desc: Browser user activity event listener
    crit: component
    conf: 0.8
    any:
      - id: browser-mousemove-listener
      - id: browser-keydown-listener
      - id: browser-scroll-listener
      - id: browser-touchstart-listener
  - id: browser-activity-mining-gate
    desc: Browser user activity gate for mining
    crit: component
    conf: 0.86
    near_lines: 40
    all:
      - id: browser-last-activity-var
      - id: browser-user-activity-listener
  - id: mining-indicators
    desc: Cryptocurrency mining indicators
    crit: suspicious
    conf: 0.9
    any:
      - id: xmrig-str
      - id: objectives/impact/cryptojacking/miner/stratum::stratum-tcp
      - id: objectives/impact/cryptojacking/miner/stratum::stratum-ssl
      - id: mining-pool-monero
      - id: mining-pool-xmr
      - id: objectives/impact/cryptojacking/miner/pool::known-pools
    downgrade:
      any:
        - id: metadata/package/testing/presence/fixture::mocha-describe-call
        - id: metadata/package/testing/presence/harness::test-directory
  - id: smart-miner
    desc: Smart cryptocurrency miner with evasion
    crit: hostile
    conf: 0.95
    all:
      - id: mining-indicators
      - id: monitoring-tool-checks
  - id: activity-aware-miner
    desc: Activity-aware cryptocurrency miner
    crit: hostile
    conf: 0.95
    all:
      - id: mining-indicators
      - id: activity-monitoring
