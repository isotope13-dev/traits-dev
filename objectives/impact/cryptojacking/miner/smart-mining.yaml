defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  attack: T1496
  mbc: B0004
traits:
  - id: taskmgr-check
    desc: Task Manager process check
    crit: component
    conf: 0.8
    if:
      type: string_value
      regex: (?i)taskmgr(\.exe)?
  - id: procexp-check
    desc: Process Explorer check
    crit: component
    conf: 0.85
    if:
      type: string_value
      regex: (?i)procexp(64)?(\.exe)?
  - id: procmon-check
    desc: Process Monitor check
    crit: component
    conf: 0.85
    if:
      type: string_value
      regex: (?i)procmon(64)?(\.exe)?
  - id: perfmon-check
    desc: Performance Monitor check
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: (?i)perfmon(\.exe)?
  - id: resmon-check
    desc: Resource Monitor check
    crit: component
    conf: 0.75
    if:
      type: string_value
      regex: (?i)resmon(\.exe)?
  - id: get-last-input-info
    desc: GetLastInputInfo API (idle detection)
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: GetLastInputInfo
  - id: get-idle-time
    desc: GetIdleTime function
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: (?i)get.?idle.?time
  - id: pause-if-str
    desc: PauseIf conditional string
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: (?i)pause.?if.?(task|active|idle|user)
  - id: xmrig-str
    desc: XMRig miner reference
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: (?i)xmrig
  - id: mining-pool-monero
    desc: Monero mining pool reference
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: (?i)pool\.monero
  - id: mining-pool-xmr
    desc: XMR mining pool reference
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: (?i)(2miners|nicehash)
  - id: monero-wallet-regex
    desc: Monero wallet address pattern
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: \b[48][1-9A-HJ-NP-Za-km-z]{94}\b
  - id: set-thread-affinity
    desc: SetThreadAffinityMask API (CPU control)
    crit: component
    conf: 0.6
    if:
      type: trait
      id: micro-behaviors/process/control/affinity::set-thread-affinity-mask
  - id: cpu-usage-limit-str
    desc: CPU usage limit string
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: (?i)cpu.{0,4}(usage|percent).{0,24}(limit|throttle)
  - id: pause-if-cpu-str
    desc: Pause-if CPU string
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: (?i)pause.?if.{0,24}cpu
composite_rules:
  - id: cpu-usage-str
    desc: CPU usage monitoring string
    crit: notable
    conf: 0.6
    any:
      - id: cpu-usage-limit-str
      - id: pause-if-cpu-str
  - id: monitoring-tool-checks
    desc: System monitoring tool detection
    crit: notable
    conf: 0.85
    needs: 3
    any:
      - id: taskmgr-check
      - id: procexp-check
      - id: procmon-check
      - id: perfmon-check
      - id: resmon-check
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
  - id: activity-monitoring
    desc: User activity monitoring
    crit: notable
    conf: 0.8
    any:
      - id: get-last-input-info
      - id: get-idle-time
  - id: mining-indicators
    desc: Cryptocurrency mining indicators
    crit: suspicious
    conf: 0.9
    any:
      - id: xmrig-str
      - id: objectives/impact/cryptojacking/miner::stratum-tcp
      - id: objectives/impact/cryptojacking/miner::stratum-ssl
      - id: mining-pool-monero
      - id: mining-pool-xmr
    downgrade:
      any:
        - id: metadata/package/testing/presence::mocha-describe-call
        - id: metadata/package/testing/presence::test-directory
  - id: smart-miner
    desc: Smart cryptocurrency miner with evasion
    crit: hostile
    conf: 0.95
    all:
      - id: mining-indicators
      - id: monitoring-tool-checks
  - id: activity-aware-miner
    desc: Activity-aware cryptocurrency miner
    crit: hostile
    conf: 0.95
    all:
      - id: mining-indicators
      - id: activity-monitoring
