defaults:
  platforms: [linux, macos, windows]
  for: [scripts, binaries]
  attack: T1496
  mbc: B0004

traits:
  - id: xmrig-donate-level
    desc: donate-level XMRig config option
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: donate-level
      section: .text

  - id: xmrig-cpu-priority
    desc: cpu-priority XMRig config option
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: cpu-priority
      section: .text
  - id: csharp-xmr-settings-class
    desc: C# XMR miner settings class
    crit: suspicious
    conf: 0.9
    for: [csharp]
    if:
      type: text
      regex: 'class\s+XmrSettings\b'
  - id: csharp-xmr-pool-wallet-fields
    desc: C# XMR pool wallet fields
    crit: suspicious
    conf: 0.9
    for: [csharp]
    if:
      type: text
      regex: 'Pool\s*=\s*""[\s\S]{0,240}Wallet\s*=\s*""'
  - id: csharp-xmr-inject-target-field
    desc: C# XMR injection target field
    crit: suspicious
    conf: 0.88
    for: [csharp]
    if:
      type: text
      regex: 'InjectTo\s*=\s*""'

composite_rules:
  - id: xmrig-basic-config-options
    desc: XMRig configuration option markers
    crit: notable
    conf: 0.75
    any:
      - id: xmrig-donate-level
      - id: xmrig-cpu-priority
  - id: csharp-xmr-injected-miner-config
    desc: C# XMR injected miner config
    crit: hostile
    conf: 0.96
    for: [csharp]
    all:
      - id: csharp-xmr-settings-class
      - id: csharp-xmr-pool-wallet-fields
      - id: csharp-xmr-inject-target-field
