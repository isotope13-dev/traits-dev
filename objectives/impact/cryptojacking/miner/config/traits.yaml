defaults:
  platforms: [linux, macos, windows]
  for: [scripts, binaries]
  attack: T1496
  mbc: B0004

traits:
  - id: xmrig-donate-level
    desc: donate-level XMRig config option
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: donate-level
      section: .text

  - id: xmrig-cpu-priority
    desc: cpu-priority XMRig config option
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: cpu-priority
      section: .text

composite_rules:
  - id: xmrig-basic-config-options
    desc: XMRig configuration option markers
    crit: notable
    conf: 0.75
    any:
      - id: xmrig-donate-level
      - id: xmrig-cpu-priority
