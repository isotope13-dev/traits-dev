defaults:
  platforms: [linux, macos, windows]
  for: [elf, pe, macho, go]
  attack: T1496
  mbc: B0004
traits:
- id: go-xmrig-preset-fields--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: 'current_preset_xmrig_(enabled|nicehash)'
- id: go-xmrig-preset-fields--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: 'current_preset_xmrig_(algo|poolAddr)'
- id: go-xmrig-preset-fields--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: 'current_preset_xmrig_(poolUser|poolPass)'
- id: go-xmrig-preset-fields--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: 'json:"xmrig_'
- id: go-nbminer-preset-fields--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: 'current_preset_nbminer_(enabled|algo)'
- id: go-nbminer-preset-fields--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: 'current_preset_nbminer_(poolAddr|poolUser)'
- id: go-nbminer-preset-fields--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: 'current_preset_nbminer_(poolPass)'
- id: go-nbminer-preset-fields--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: 'json:"nbminer_'
composite_rules:
- id: embedded-go-miner-config
  desc: Embedded Go cryptocurrency miner config
  crit: hostile
  conf: 0.98
  any:
  - id: go-xmrig-preset-fields
  - id: go-nbminer-preset-fields
  all:
  - id: objectives/impact/cryptojacking/miner::mining-pool-xmr
- id: go-xmrig-preset-fields
  desc: Go XMRig preset fields
  crit: suspicious
  conf: 0.95
  any:
  - id: go-xmrig-preset-fields--rx-1
  - id: go-xmrig-preset-fields--rx-2
  - id: go-xmrig-preset-fields--rx-3
  - id: go-xmrig-preset-fields--rx-4
  needs: 1
- id: go-nbminer-preset-fields
  desc: Go NBMiner preset fields
  crit: suspicious
  conf: 0.95
  any:
  - id: go-nbminer-preset-fields--rx-5
  - id: go-nbminer-preset-fields--rx-6
  - id: go-nbminer-preset-fields--rx-7
  - id: go-nbminer-preset-fields--rx-8
  needs: 1
