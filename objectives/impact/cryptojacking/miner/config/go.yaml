defaults:
  platforms: [linux, macos, windows]
  for: [elf, pe, macho, go]
  attack: T1496
  mbc: B0004
traits:
- id: go-xmrig-preset-fields--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: 'current_preset_xmrig_(enabled|nicehash)'
  count_max: 1002014
- id: go-xmrig-preset-fields--rx-2
  desc: Regex component marker
