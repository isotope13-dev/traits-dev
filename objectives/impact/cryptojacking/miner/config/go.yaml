  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: 'current_preset_xmrig_(algo|poolAddr)'
  count_max: 1002015
- id: go-xmrig-preset-fields--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
