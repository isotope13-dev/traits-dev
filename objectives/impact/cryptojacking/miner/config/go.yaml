defaults:
  platforms: [linux, macos, windows]
  for: [elf, pe, macho, go]
  attack: T1496
  mbc: B0004
traits:
  - id: go-xmrig-preset-fields
    desc: Go XMRig preset fields
    crit: suspicious
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: 'current_preset_xmrig_(enabled|nicehash|algo|poolAddr|poolUser|poolPass)|json:"xmrig_'
  - id: go-nbminer-preset-fields
    desc: Go NBMiner preset fields
    crit: suspicious
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: 'current_preset_nbminer_(enabled|algo|poolAddr|poolUser|poolPass)|json:"nbminer_'
composite_rules:
  - id: embedded-go-miner-config
    desc: Embedded Go cryptocurrency miner config
    crit: hostile
    conf: 0.98
    any:
      - id: go-xmrig-preset-fields
      - id: go-nbminer-preset-fields
    all:
      - id: objectives/impact/cryptojacking/miner::mining-pool-xmr
