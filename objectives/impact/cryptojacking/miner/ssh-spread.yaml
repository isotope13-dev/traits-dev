defaults:
  platforms: [unix, android]
  for: [scripts, binaries]
traits:
  - id: tmp-monaco-path
    desc: /tmp/monaco staging path
    crit: suspicious
    conf: 0.96
    attack: T1496
    if:
      type: text
      substr: /tmp/monaco
  - id: tmp-nice-path
    desc: /tmp/nice staging path
    crit: suspicious
    conf: 0.92
    attack: T1496
    if:
      type: text
      substr: /tmp/nice
  - id: xmrigcc-ref
    desc: XMRigCC controller string
    crit: suspicious
    conf: 0.9
    attack: T1496
    if:
      type: text
      word: XMRigCC
  - id: xmrigcc-secret
    desc: XMRigCC default secret
    crit: component
    conf: 0.98
    attack: T1496
    if:
      type: text
      exact: mySecret
composite_rules:
  - id: temp-miner-staging
    desc: Temporary miner staging paths
    crit: suspicious
    conf: 0.9
    any:
      - id: tmp-monaco-path
      - id: tmp-nice-path
  - id: xmrig-control-plane
    desc: XMRigCC control plane bundle
    crit: suspicious
    conf: 0.95
    all:
      - id: xmrigcc-ref
      - id: xmrigcc-secret
  - id: ssh-spreading-cryptominer
    desc: SSH spreading cryptominer cluster
    crit: hostile
    conf: 0.98
    attack: T1496
    all:
      - id: objectives/impact/cryptojacking/miner::active-miner
      - id: objectives/lateral-movement/brute-force/ssh::internet-ssh-scanner
    any:
      - id: temp-miner-staging
      - id: xmrig-control-plane
