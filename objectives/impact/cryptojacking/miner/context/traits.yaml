defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, pe, elf, macho]
traits:
- id: miner-word
  desc: Cryptocurrency miner keyword marker
  crit: notable
  conf: 0.4
  if:
    type: text
    word: miner
  not:
  - substr: github.com/openresty/lua
  unless:
  - type: basename
    regex: '\.d\.(ts|cts|mts)$'
  - id: metadata/package/quality/context::embedded-domain-reputation-catalog
  - id: metadata/file/catalog/identity::frequency-list-catalog
  - id: well-known/tool/detection/security-scanner
  - type: text
    exact: luckyminer
- id: miner-title
  desc: Miner string (title case)
  crit: notable
  conf: 0.6
  if:
    type: text
    word: Miner
- id: miner-upper
  desc: MINER string (uppercase)
  crit: notable
  conf: 0.6
  if:
    type: text
    word: MINER
- id: wallet-ref
  desc: wallet keyword
  crit: component
  conf: 0.4
  for: [scripts]
  count_min: 2
  unless:
  - id: metadata/file/catalog/identity::uproc-tools-catalog
  if:
    id: objectives/credential-access/wallet/keywords::wallet-token
- id: coinhive-str
  desc: coinhive reference
  crit: suspicious
  conf: 0.6
  if:
    type: text
    substr: coinhive
  unless:
  - type: basename
    regex: '\.d\.(ts|cts|mts)$'
  - id: metadata/package/testing/harness/runtime::test-basename-suffix
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: well-known/tool/detection/security-scanner::defensive-threat-signatures
- id: mining-lower
  desc: mining string (lowercase)
  crit: baseline
  conf: 0.6
  if:
    type: text
    word: mining
- id: mining-title
  desc: Mining string (title case)
  crit: baseline
  conf: 0.6
  if:
    type: text
    word: Mining
- id: mining-upper
  desc: MINING string (uppercase)
  crit: baseline
  conf: 0.6
  if:
    type: text
    word: MINING
- id: cryptonight-str
  desc: cryptonight algorithm
  crit: suspicious
  conf: 0.6
  if:
    type: text
    word: cryptonight
  unless:
  - id: well-known/tool/detection/security-scanner
- id: cryptonight-title
  desc: CryptoNight algorithm (title case)
  crit: notable
  conf: 0.75
  if:
    type: text
    word: CryptoNight
- id: cryptonight-upper
  desc: CRYPTONIGHT algorithm (uppercase)
  crit: notable
  conf: 0.75
  if:
    type: text
    word: CRYPTONIGHT
- id: randomx
  desc: RandomX mining algorithm
  crit: suspicious
  conf: 0.75
  if:
    type: text
    word: RandomX
- id: cn-variant
  desc: CryptoNight variant prefix
  crit: suspicious
  conf: 0.7
  if:
    type: text
    exact: cn/
- id: cn-v7
  desc: CryptoNight v7 algorithm
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: cryptonight(_v7|-monerov7)
- id: cn-v8
  desc: CryptoNight v8 algorithm
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: cryptonight(_v8|-monerov8)
- id: cn-msr
  desc: CryptoNight MSR variant
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: c[rn]/msr
- id: cn-r
  desc: CryptoNight R variant
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: cryptonight(_r|/r)
- id: cn-conceal
  desc: CryptoNight Conceal variant
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: c[rn]/conceal
- id: monero-lower
  desc: monero cryptocurrency reference
  crit: component
  conf: 0.5
  if:
    type: text
    exact: monero
- id: monero-wallet-4
  desc: Monero wallet value with context
  crit: component
  conf: 0.8
  if:
    type: text
    regex: (?i)(wallet|xmr|monero|address)[\s:=\"']{0,16}4[1-9A-HJ-NP-Za-km-z]{94}\b
- id: monero-wallet-8
  desc: Monero subaddress value with context
  crit: component
  conf: 0.8
  if:
    type: text
    regex: (?i)(wallet|xmr|monero|address)[\s:=\"']{0,16}8[1-9A-HJ-NP-Za-km-z]{94}\b
composite_rules:
- id: monero-wallets-comp
  desc: Monero wallet address patterns
  any:
  - id: monero-wallet-4
  - id: monero-wallet-8
- id: miner-keyword
  desc: Miner keyword variants
  any:
  - id: miner-word
  - id: miner-title
  - id: miner-upper
- id: cryptonight-keyword
  desc: CryptoNight keyword variants
  any:
  - id: cryptonight-str
  - id: cryptonight-title
  - id: cryptonight-upper
- id: cn-variants
  desc: CryptoNight algorithm variants
  any:
  - id: cn-v7
  - id: cn-v8
  - id: cn-msr
  - id: cn-r
  - id: cn-conceal
  - id: cryptonight-str
  - id: cryptonight-title
  - id: cryptonight-upper
- id: mining-keyword
  desc: Mining keyword variants
  any:
  - id: mining-lower
  - id: mining-title
  - id: mining-upper
- id: mining-context
  desc: Mining-specific context strings
  any:
  - id: objectives/impact/cryptojacking/miner/stratum::stratum-keyword
  - id: miner-keyword
  - id: objectives/impact/cryptojacking/miner/stratum::mining-subscribe
  - id: cryptonight-keyword
  - id: randomx
  - id: cn-variant
- id: randomx-stratum
  desc: RandomX with Stratum pool
  all:
  - id: randomx
  - id: objectives/impact/cryptojacking/miner/stratum::stratum-tcp
- id: cn-variant-stratum
  desc: CryptoNight variant Stratum pool
  all:
  - id: cn-variant
  - id: objectives/impact/cryptojacking/miner/stratum::stratum-tcp
- id: xmrig
  desc: XMRig cryptocurrency miner
  crit: suspicious
  conf: 0.95
  attack: T1496
  any:
  - id: randomx-stratum
  - id: cn-variant-stratum
- id: monero-wallet
  desc: Monero wallet mining context
  crit: suspicious
  conf: 0.9
  attack: T1496
  all:
  - id: monero-wallets-comp
  - id: mining-context
  unless:
  - id: objectives/impact/cryptojacking/miner/runtime::go-runtime-markers
- id: monero-wallet-pool-miner
  desc: Hardcoded Monero wallet with mining pool
  crit: hostile
  conf: 0.98
  attack: T1496
  mbc: B0018
  all:
  - id: monero-wallets-comp
  - id: mining-context
  - id: objectives/impact/cryptojacking/miner/pool::known-pools
  unless:
  - id: well-known/tool/detection/security-scanner
  - id: well-known/tool/detection/clawmetry::clawmetry-tool
- id: browser-worker-monero-miner
  desc: Browser Monero miner with worker runtime and pool
  crit: hostile
  conf: 0.99
  attack: T1496
  mbc: B0018
  all:
  - id: monero-wallet-pool-miner
  any:
  - id: micro-behaviors/process/create/workers::worker-pool
  - id: micro-behaviors/communications/http/services/analytics::browser-send-beacon
  - id: micro-behaviors/communications/http/request/client::xmlhttprequest-new
- id: miner-type
  desc: Cryptocurrency miner type
  any:
  - id: xmrig
  - id: objectives/impact/cryptojacking/miner/stratum::cryptominer-stratum
- id: active-miner
  desc: Active cryptocurrency miner
  crit: suspicious
  conf: 0.95
  mbc: B0014
  attack: T1496
  all:
  - id: miner-type
  - id: objectives/impact/cryptojacking/miner/pool::known-pools
  unless:
  # Security/observability scanners (e.g. ClawMetry's threat-heuristics module
  # and its test suite) carry miner-type names + pool domains as signatures.
  - id: well-known/tool/detection/clawmetry::clawmetry-tool
- id: miner
  desc: Cryptocurrency mining patterns
  crit: suspicious
  conf: 0.66
  mbc: B0041
  attack: T1496
  size_max: 500000
  needs: 2
  any:
  - id: objectives/impact/cryptojacking/miner/stratum::stratum-tcp
  - id: objectives/impact/cryptojacking/miner/stratum::stratum-ssl
  - id: objectives/impact/cryptojacking/miner/pool::pool-subdomain
  - id: objectives/impact/cryptojacking/miner/pool::pool-url
  - id: miner-word
  - id: monero-lower
  - id: objectives/impact/cryptojacking/miner/runtime::hashrate-str
  - id: wallet-ref
  - id: coinhive-str
  - id: cryptonight-str
  unless:
  - id: well-known/tool/detection/security-scanner
