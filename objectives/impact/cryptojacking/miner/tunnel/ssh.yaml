defaults:
  platforms: [unix]
  for: [shell, text, python, javascript]
  attack: T1496
traits:
  - id: ssh-tunnels-port-3333
    desc: SSH tunnel uses mining port
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\s-L\s*(127\.0\.0\.1:)?3333:'
  - id: localhost-mining-port
    desc: Localhost mining pool port
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '127\.0\.0\.1:3333|localhost:3333'
  - id: shell-xmrig-invocation
    desc: Shell invokes XMRig miner
    crit: suspicious
    conf: 0.9
    for: [shell, text]
    if:
      type: text
      regex: '\bxmrig\b|/xmrig\b'
composite_rules:
  - id: ssh-local-mining-tunnel
    desc: SSH tunnel to mining port
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/ssh/connect::ssh-local-forward-command
      - id: ssh-tunnels-port-3333
    any:
      - id: micro-behaviors/communications/ssh/connect::ssh-background-no-command
      - id: localhost-mining-port
      - id: objectives/impact/cryptojacking/miner/stratum::pool-port-3333
  - id: cryptominer-through-ssh-tunnel
    desc: Cryptominer uses SSH local tunnel
    crit: hostile
    conf: 0.98
    all:
      - id: ssh-local-mining-tunnel
    any:
      - id: objectives/impact/cryptojacking/miner/signatures::xmrig
      - id: objectives/impact/cryptojacking/miner/signatures::miner
      - id: objectives/impact/cryptojacking/miner/stratum::stratum-keyword
      - id: shell-xmrig-invocation
