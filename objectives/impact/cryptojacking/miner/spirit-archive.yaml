defaults:
  attack: T1496
  mbc: B0041
  for: [elf, python, javascript, shell]
  platforms: [linux, unix]
traits:
  - id: spirit-miner-staging-dir
    desc: Spirit miner staging directory
    crit: suspicious
    conf: 0.94
    if:
      type: string_value
      exact: "spirit/tar/root/gcclib"
  - id: spirit-miner-dropper
    desc: Spirit xfitaarch miner dropper
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      exact: "#spirit/tar/root/gcclib/xfitaarch.sh"
  - id: spirit-timeout64-helper
    desc: Spirit timeout64 helper staged
    crit: notable
    conf: 0.92
    if:
      type: string_value
      exact: "spirit/tar/root/gcclib/timeout64"
  - id: spirit-timeoutaarch-helper
    desc: Spirit timeoutaarch helper staged
    crit: notable
    conf: 0.92
    if:
      type: string_value
      exact: "#spirit/tar/root/gcclib/timeoutaarch"
  - id: spirit-ip-cache-helper
    desc: Spirit miner ip cache staged
    crit: notable
    conf: 0.92
    if:
      type: string_value
      exact: "!spirit/tar/root/gcclib/ip.txt_tmp"
composite_rules:
  - id: spirit-cryptominer-bundle
    desc: Spirit cryptominer payload bundle
    crit: hostile
    conf: 0.97
    all:
      - id: spirit-miner-staging-dir
      - id: spirit-miner-dropper
      - id: spirit-timeout64-helper
      - id: spirit-timeoutaarch-helper
      - id: spirit-ip-cache-helper
