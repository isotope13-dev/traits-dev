# Generic destructive-action vocabulary: English verbs (delete/destroy/clean)
# and deletion-target nouns (source, codebase, project). Component-only — these
# words appear constantly in benign software. Objective composites gate them
# alongside intent evidence (e.g. an LLM instruction-override, a paste-run
# lure). The verb-near-target composite is a building block, not a standalone
# signal: "remove the source files" is ordinary developer language.
defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
traits:
- id: destroy-verb
  desc: "Destructive-action word: destroy"
  conf: 0.9
  if:
    type: text
    word: destroy
    case_insensitive: true
  unless:
  - id: metadata/package/testing/
  - type: symbol
    kind: call
    regex: '(^|\.)destroy$'

- id: target-source-test
  desc: Source or test targeted by destructive action
  conf: 0.88
  if:
    type: text
    regex: '\b(delete|destroy|wipe)\b.{0,40}\b(source|test)\b'
    case_insensitive: true
  unless:
  - type: text
    regex: '(?i)(\.test\s*\(|\w+\.test\b)'
  - id: metadata/package/testing/

- id: target-project
  desc: Project/workspace target word
  conf: 0.86
  if:
    type: text
    regex: '\b(project|workspace|working tree)\b'
    case_insensitive: true

- id: rm-rf-root-command
  desc: rm -rf / root deletion command literal
  conf: 0.8
  if:
    type: string_literal
    substr: rm -rf /
  unless:
  - id: micro-behaviors/process/create/shell/guard/
  - id: metadata/package/testing/
  - type: text
    substr: COMMAND_BLOCKED

- id: delete-verb--delete
  desc: "Destructive-action word: delete"
  conf: 0.9
  if:
    type: text
    case_insensitive: true
    regex: '\bdelete\s+(files?|directories?)\b'
  unless:
  - id: well-known/app/google-web::official-google-web-asset
  - id: micro-behaviors/communications/http/delete::method-marker
  - id: micro-behaviors/data/db/sql::sql-delete
  - id: well-known/tool/detection/security-scanner::dangerous-query-keyword-denylist
  - id: metadata/package/testing/
  - type: text
    regex: '(?m)^\s*delete\s+(\[\]\s*)?[A-Za-z_][A-Za-z0-9_]*(\s*;|\s*,|\s*\))'
- id: delete-verb--erase
  desc: "Destructive-action word: erase"
  conf: 0.9
  if:
    type: text
    case_insensitive: true

    word: erase
  unless:
  - id: metadata/package/testing/
- id: delete-verb--wipe
  desc: Wipes disk or user data
  conf: 0.9
  if:
    type: text
    regex: '\bwipe\b\s+(disk|drive|data|files?)\b'
  unless:
  - id: metadata/package/testing/
- id: cleanup-verb--clean
  desc: "Clean source/project action phrase"
  conf: 0.88
  if:
    type: text
    case_insensitive: true
    regex: '\bclean(ing)?( up)?\s+(the\s+)?(codebase|repo|project)\b'
  unless:
  - id: metadata/package/testing/
- id: cleanup-verb--purge
  desc: "Purge source/project action phrase"
  conf: 0.88
  if:
    type: text
    case_insensitive: true
    regex: '\bpurge\s+(the\s+)?(codebase|repository|repo|project)\b'
  unless:
  - id: metadata/package/testing/
- id: target-codebase--codebase
  desc: Destructive codebase target
  conf: 0.88
  if:
    type: text
    regex: '\b(delete|destroy|wipe)\b.{0,40}\bcodebase\b'
- id: target-codebase--repository
  desc: Destructive repository target
  conf: 0.88
  if:
    type: text
    regex: '\b(delete|destroy|wipe)\b.{0,40}\brepository\b'
- id: target-codebase--repo
  desc: Destructive repo target
  conf: 0.88
  if:
    type: text
    regex: '\b(delete|destroy|wipe)\b.{0,40}\brepo\b'
composite_rules:
- id: delete-verb
  desc: Destructive removal-word component
  conf: 0.9
  any:
  - id: delete-verb--delete
  - id: delete-verb--erase
  - id: delete-verb--wipe
  unless:
  - id: micro-behaviors/communications/http/delete::method-marker
  - id: micro-behaviors/data/db/sql::sql-delete
- id: cleanup-verb
  desc: Cleanup-word component
  conf: 0.88
  any:
  - id: cleanup-verb--clean
  - id: cleanup-verb--purge
- id: target-codebase
  desc: Codebase/repository target-word component
  conf: 0.88
  any:
  - id: target-codebase--codebase
  - id: target-codebase--repository
  - id: target-codebase--repo
  - id: cleanup-verb--clean
- id: destructive-verb
  desc: Destructive-action vocabulary component
  crit: component
  any:
  - id: delete-verb
  - id: destroy-verb
  - id: cleanup-verb
  unless:
  - id: micro-behaviors/communications/http/delete::method-marker
  - id: micro-behaviors/data/db/sql::sql-delete

- id: destructive-code-target
  desc: Source/repository/workspace target-word component
  crit: component
  any:
  - id: target-source-test
  - id: target-codebase
  - id: target-project

- id: destructive-code-instruction
  desc: Destructive verb targeting source/repo/project
  crit: component
  conf: 0.9
  near_bytes: 140
  all:
  - id: destructive-verb
  - id: destructive-code-target
