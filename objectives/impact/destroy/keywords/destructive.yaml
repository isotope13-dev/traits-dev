# Generic destructive-action vocabulary: English verbs (delete/destroy/clean)
# and deletion-target nouns (source, codebase, project). Component-only — these
# words appear constantly in benign software. Objective composites gate them
# alongside intent evidence (e.g. an LLM instruction-override, a paste-run
# lure). The verb-near-target composite is a building block, not a standalone
# signal: "remove the source files" is ordinary developer language.
defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
traits:
- id: destroy-verb
  desc: "Destructive-action word: destroy"
  conf: 0.9
  if:
    type: text
    word: destroy
    case_insensitive: true
  unless:
  - id: metadata/package/testing/

- id: target-source-test
  desc: Source/test target word
  conf: 0.88
  if:
    type: text
    regex: '\b(test suite|source code|source files?)\b'
    case_insensitive: true
  unless:
  - type: text
    regex: '(?i)(\.test\s*\(|\w+\.test\b)'
  - id: metadata/package/testing/

- id: target-project
  desc: Project/workspace target word
  conf: 0.86
  if:
    type: text
    regex: '\b(project|workspace|working tree)\b'
    case_insensitive: true

- id: rm-rf-root-command
  desc: rm -rf / root deletion command literal
  conf: 0.8
  if:
    type: string_literal
    substr: rm -rf /
  unless:
  - id: micro-behaviors/process/create/shell/guard/
  - id: metadata/package/testing/
  - type: text
    substr: COMMAND_BLOCKED

- id: http-delete-method-constant
  desc: HTTP DELETE method constant
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: http.MethodDelete

- id: http-delete-route-method
  desc: HTTP DELETE route method field
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: 'RouteMethod\s*=\s*"DELETE"|Method\s*:\s*"DELETE"'

- id: http-delete-method-compare
  desc: HTTP DELETE method comparison
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: 'method\s*==\s*"DELETE"|case\s+DELETE\s*:'

- id: http-delete-router-call
  desc: HTTP DELETE router call
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '\.DELETE\s*\('

- id: delete-verb--delete
  desc: "Destructive-action word: delete"
  conf: 0.9
  if:
    type: text
    case_insensitive: true

    word: delete
  unless:
  - id: http-delete-method-context
  - id: micro-behaviors/data/db/sql::sql-delete
  - id: well-known/tool/detection/security-scanner::dangerous-query-keyword-denylist
  - id: metadata/package/testing/
  - type: text
    regex: '(?m)^\s*delete\s+(\[\]\s*)?[A-Za-z_][A-Za-z0-9_]*(\s*;|\s*,|\s*\))'
- id: delete-verb--erase
  desc: "Destructive-action word: erase"
  conf: 0.9
  if:
    type: text
    case_insensitive: true

    word: erase
  unless:
  - id: metadata/package/testing/
- id: delete-verb--wipe
  desc: "Destructive-action word: wipe"
  conf: 0.9
  if:
    type: text
    word: wipe
  unless:
  - id: metadata/package/testing/
- id: cleanup-verb--clean
  desc: "Cleanup/action word: clean"
  conf: 0.88
  if:
    type: text
    case_insensitive: true

    word: clean
  unless:
  - id: metadata/package/testing/
- id: cleanup-verb--purge
  desc: "Cleanup/action word: purge"
  conf: 0.88
  if:
    type: text
    case_insensitive: true

    word: purge
  unless:
  - id: metadata/package/testing/
- id: target-codebase--codebase
  desc: "Codebase/repository target word: codebase"
  conf: 0.88
  if:
    type: text
    case_insensitive: true

    word: codebase
- id: target-codebase--repository
  desc: "Codebase/repository target word: repository"
  conf: 0.88
  if:
    type: text
    case_insensitive: true

    word: repository
- id: target-codebase--repo
  desc: "Codebase/repository target word: repo"
  conf: 0.88
  if:
    type: text
    word: repo
composite_rules:
- id: http-delete-method-context
  desc: HTTP DELETE method context
  crit: notable
  conf: 0.95
  any:
  - id: http-delete-method-constant
  - id: http-delete-route-method
  - id: http-delete-method-compare
  - id: http-delete-router-call
- id: delete-verb
  desc: Destructive removal-word component
  conf: 0.9
  any:
  - id: delete-verb--delete
  - id: delete-verb--erase
  - id: delete-verb--wipe
  unless:
  - id: http-delete-method-context
  - id: micro-behaviors/data/db/sql::sql-delete
- id: cleanup-verb
  desc: Cleanup-word component
  conf: 0.88
  any:
  - id: cleanup-verb--clean
  - id: cleanup-verb--purge
- id: target-codebase
  desc: Codebase/repository target-word component
  conf: 0.88
  any:
  - id: target-codebase--codebase
  - id: target-codebase--repository
  - id: target-codebase--repo
- id: destructive-verb
  desc: Destructive-action vocabulary component
  crit: component
  any:
  - id: delete-verb
  - id: destroy-verb
  - id: cleanup-verb
  unless:
  - id: http-delete-method-context
  - id: micro-behaviors/data/db/sql::sql-delete

- id: destructive-code-target
  desc: Source/repository/workspace target-word component
  crit: component
  any:
  - id: target-source-test
  - id: target-codebase
  - id: target-project

- id: destructive-code-instruction
  desc: Destructive verb targeting source/repo/project
  crit: component
  conf: 0.9
  near_bytes: 140
  all:
  - id: destructive-verb
  - id: destructive-code-target
