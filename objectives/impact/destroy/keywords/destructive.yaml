# Generic destructive-action vocabulary: English verbs (delete/destroy/clean)
# and deletion-target nouns (source, codebase, project). Component-only — these
# words appear constantly in benign software. Objective composites gate them
# alongside intent evidence (e.g. an LLM instruction-override, a paste-run
# lure). The verb-near-target composite is a building block, not a standalone
# signal: "remove the source files" is ordinary developer language.
defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
traits:
- id: destroy-verb
  desc: Destroy verb
  conf: 0.9
  if:
    type: text
    word: destroy
    case_insensitive: true

- id: target-source-test
  desc: Source or test keyword
  conf: 0.88
  if:
    type: text
    regex: '\b(tests?|test suite|source code|source files?)\b'
    case_insensitive: true
  unless:
  - type: text
    regex: '(?i)(\.test\s*\(|\w+\.test\b)'

- id: target-project
  desc: Project/workspace keyword
  conf: 0.86
  if:
    type: text
    regex: '\b(project|workspace|working tree)\b'
    case_insensitive: true

- id: rm-rf-root-command
  desc: rm -rf / root deletion command literal
  conf: 0.8
  if:
    type: string_literal
    substr: rm -rf /
  unless:
  - id: micro-behaviors/process/create/shell/guard::destructive-command-safety-filter
  - id: metadata/package/testing/harness/runtime::is-test
  - type: text
    substr: COMMAND_BLOCKED

- id: delete-verb--delete
  desc: Removal keyword (delete)
  conf: 0.9
  if:
    type: text
    case_insensitive: true

    word: delete
- id: delete-verb--remove
  desc: Removal keyword (remove)
  conf: 0.9
  if:
    type: text
    case_insensitive: true

    word: remove
- id: delete-verb--erase
  desc: Removal keyword (erase)
  conf: 0.9
  if:
    type: text
    case_insensitive: true

    word: erase
- id: delete-verb--wipe
  desc: Removal keyword (wipe)
  conf: 0.9
  if:
    type: text
    word: wipe
- id: cleanup-verb--clean
  desc: Cleanup keyword (clean)
  conf: 0.88
  if:
    type: text
    case_insensitive: true

    word: clean
- id: cleanup-verb--clear
  desc: Cleanup keyword (clear)
  conf: 0.88
  if:
    type: text
    case_insensitive: true

    word: clear
- id: cleanup-verb--purge
  desc: Cleanup keyword (purge)
  conf: 0.88
  if:
    type: text
    case_insensitive: true

    word: purge
- id: target-codebase--codebase
  desc: Codebase/repository keyword (codebase)
  conf: 0.88
  if:
    type: text
    case_insensitive: true

    word: codebase
- id: target-codebase--repository
  desc: Codebase/repository keyword (repository)
  conf: 0.88
  if:
    type: text
    case_insensitive: true

    word: repository
- id: target-codebase--repo
  desc: Codebase/repository keyword (repo)
  conf: 0.88
  if:
    type: text
    word: repo
composite_rules:
- id: delete-verb
  desc: Removal keyword
  conf: 0.9
  any:
  - id: delete-verb--delete
  - id: delete-verb--remove
  - id: delete-verb--erase
  - id: delete-verb--wipe
- id: cleanup-verb
  desc: Cleanup keyword
  conf: 0.88
  any:
  - id: cleanup-verb--clean
  - id: cleanup-verb--clear
  - id: cleanup-verb--purge
- id: target-codebase
  desc: Codebase/repository keyword
  conf: 0.88
  any:
  - id: target-codebase--codebase
  - id: target-codebase--repository
  - id: target-codebase--repo
- id: destructive-verb
  desc: Destructive action verb
  crit: component
  any:
  - id: delete-verb
  - id: destroy-verb
  - id: cleanup-verb

- id: destructive-code-target
  desc: Source, test, repository, or workspace target
  crit: component
  any:
  - id: target-source-test
  - id: target-codebase
  - id: target-project

- id: destructive-code-instruction
  desc: Destructive verb targeting source/repo/project
  crit: component
  conf: 0.9
  near_bytes: 140
  all:
  - id: destructive-verb
  - id: destructive-code-target
