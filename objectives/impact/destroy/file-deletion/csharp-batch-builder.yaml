defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1485
  mbc: C0047
traits:
  - id: writes-batch-payloads
    desc: Writes RichTextBox batch payloads
    crit: suspicious
    conf: 0.98
    count_min: 3
    if:
      type: raw
      substr: 'WriteAllText(saveFileDialog.FileName, this.RichTextBox'
  - id: mass-file-targeting-template
    desc: Recursive file targeting template burst
    crit: suspicious
    conf: 0.97
    count_min: 20
    if:
      type: raw
      regex: 'DIR /S/B %SystemDrive%\\\\\*\.'
  - id: self-delete-template
    desc: Embedded self-delete batch command
    crit: suspicious
    conf: 0.94
    if:
      type: string_value
      exact: 'del /f /q %0'
  - id: hidden-script-template
    desc: Embedded hidden batch command
    crit: suspicious
    conf: 0.94
    if:
      type: string_value
      exact: 'attrib +h %0'
  - id: reset-current-user-password
    desc: Resets current user password
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      exact: 'net user %username% 23097008946757'
  - id: reset-admin-password
    desc: Resets administrator password
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      exact: 'net user Administrator 23097008946757'
  - id: critical-hal-delete-template
    desc: Deletes HAL system library
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      substr: 'del /f /q %SystemDrive%\\WINDOWS\\system32\\hal.dll'
  - id: hosts-delete-template
    desc: Deletes Windows hosts file
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      substr: 'del /f /q %SystemDrive%\\WINDOWS\\system32\\drivers\\etc\\hosts'
  - id: destructive-format-template
    desc: Embedded destructive format template
    crit: suspicious
    conf: 0.96
    count_min: 4
    if:
      type: raw
      regex: 'FORMAT drive:'
  - id: user-media-delete-template
    desc: Deletes user music files
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: "del /f /q .{0,32}My Music"
composite_rules:
  - id: password-reset-templates
    desc: Embedded account takeover batch commands
    crit: suspicious
    conf: 0.99
    all:
      - id: reset-current-user-password
      - id: reset-admin-password
  - id: sabotage-templates
    desc: Embedded destructive system sabotage templates
    crit: suspicious
    conf: 0.98
    needs: 2
    any:
      - id: critical-hal-delete-template
      - id: hosts-delete-template
      - id: destructive-format-template
      - id: password-reset-templates
      - id: user-media-delete-template
  - id: destructive-batch-malware-builder
    desc: Destructive batch malware builder
    crit: hostile
    conf: 0.99
    all:
      - id: writes-batch-payloads
      - id: mass-file-targeting-template
      - id: sabotage-templates
    any:
      - id: objectives/impact/degrade/edr::embedded-batch-av-killer
      - id: hidden-script-template
      - id: self-delete-template
