defaults:
  platforms: [ios]
  for: [csharp]
  attack: T1485

traits:
  - id: dotnet-file-and-dir-delete-pair
    desc: .NET File.Delete with Directory.Delete
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 'File\.Delete[\s\S]{0,180}Directory\.Delete'

  - id: ios-sandbox-path-marker
    desc: iOS application sandbox path reference
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)NSHomeDirectory|Library/Caches|SpecialFolder\.Personal'

  - id: dotnet-ios-keychain-wipe
    desc: .NET wipes iOS Keychain entries
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'SecKeyChain[\s\S]{0,120}\.Delete'

  - id: dotnet-ios-userdefaults-corrupt
    desc: .NET corrupts iOS UserDefaults
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'NSUserDefaults[\s\S]{0,220}__corrupted_data'

composite_rules:
  - id: dotnet-ios-app-sandbox-wipe
    desc: Deletes files and directories under iOS sandbox paths
    crit: notable
    conf: 0.82
    all:
      - id: dotnet-file-and-dir-delete-pair
      - id: ios-sandbox-path-marker

  - id: dotnet-ios-sandbox-destruction
    desc: .NET iOS sandbox destruction
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-ios-app-sandbox-wipe
      - id: dotnet-ios-keychain-wipe
    any:
      - id: dotnet-ios-userdefaults-corrupt
      - id: micro-behaviors/fs/enumerate/directory::get-files
      - id: micro-behaviors/fs/enumerate/directory::get-directories
    needs: 1
