defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1485
  mbc: C0047

traits:
  - id: csharp-obfuscated-string-fanout
    desc: C# obfuscated string fanout
    crit: suspicious
    conf: 0.86
    count_min: 20
    if:
      type: text
      regex: '\b[A-Za-z_]\w*\.smethod_\d+\s*\(\s*\d+\s*\)'

  - id: csharp-delete-combined-path
    desc: C# deletes combined path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Path\.Combine[\s\S]{0,220}File\.Exists[\s\S]{0,220}File\.Delete'
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository

composite_rules:
  - id: csharp-obfuscated-file-destroyer
    desc: C# obfuscated file destroyer
    crit: hostile
    conf: 0.96
    all:
      - id: csharp-obfuscated-string-fanout
      - id: csharp-delete-combined-path
