defaults:
  platforms: [windows, unix]
  for:
    - package.json
    - shell
traits:
  # NOTE: "package defines test script" is a neutral capability, not destroy
  # intent — relocated to metadata/package/scripts::has-test-script. The
  # destructive-test-script composite below references it cross-tier.
  - id: no-preserve-root
    desc: no-preserve-root deletion option text
    crit: component
    conf: 1.0
    attack: T1485
    if:
      type: text
      substr: --no-preserve-root
    unless:
      - id: metadata/package/files/system-package::shell-completion-script
  - id: sudo-rm-rf-root
    desc: sudo rm -rf root path
    crit: suspicious
    conf: 0.98
    attack: T1485
    if:
      type: text
      regex: sudo\s+rm\s+-rf\s+(--no-preserve-root\s+)?(/\*|/)(\s|$|["'])
    not:
      - substr: "might cause the shell to execute 'sudo rm -rf /'"
      - substr: "when the prompt is drawn."
      - substr: "raw ref name must not be included in PS1"
    unless:
      - id: well-known/app/windows-desktop-tools::cmder-vendor-member
  - id: test-rm-rf-root
    desc: test script wipes root path
    crit: suspicious
    conf: 0.97
    attack: T1485
    for:
      - package.json
    if:
      type: value
      path: scripts.test
      regex: ^sudo?\s*rm\s+-rf\s+/\*$
  - id: rm-s-q
    desc: rm slash-s slash-q command
    crit: suspicious
    conf: 0.92
    attack: T1485
    if:
      type: text
      substr: rm /s /q
composite_rules:
  - id: lifecycle-hook-present
    desc: npm install hook present in text
    crit: component
    conf: 0.95
    any:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
  - id: destructive-payload-present
    desc: destructive install payload present
    crit: suspicious
    conf: 0.96
    any:
      - id: sudo-rm-rf-root
      - id: test-rm-rf-root
      - id: rm-s-q
  - id: filesystem-root-wipe
    desc: Filesystem root wipe command
    crit: hostile
    conf: 0.99
    attack: T1485
    mbc: C0047
    all:
      - id: no-preserve-root
      - id: sudo-rm-rf-root
      - id: lifecycle-hook-present
  - id: destructive-install-hook
    desc: Destructive npm install hook
    crit: hostile
    conf: 0.98
    attack: T1485
    all:
      - id: lifecycle-hook-present
      - id: destructive-payload-present
  - id: destructive-test-script
    desc: Destructive npm test script
    crit: hostile
    conf: 0.99
    attack: T1485
    all:
      - id: metadata/package/scripts::has-test-script
      - id: destructive-payload-present
