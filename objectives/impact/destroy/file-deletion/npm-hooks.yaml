defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - package.json
    - shell
traits:
  - id: has-test-script
    desc: package defines test script
    crit: component
    conf: 1.0
    for:
      - package.json
    if:
      type: kv
      path: scripts.test
      exists: true
  - id: no-preserve-root
    desc: no-preserve-root deletion flag
    crit: suspicious
    conf: 1.0
    attack: T1485
    if:
      type: text
      substr: --no-preserve-root
  - id: sudo-rm-rf-root
    desc: sudo rm -rf root path
    crit: suspicious
    conf: 0.98
    attack: T1485
    if:
      type: text
      regex: sudo\s+rm\s+-rf\s+(--no-preserve-root\s+)?(/\*|/)
  - id: test-rm-rf-root
    desc: test script wipes root path
    crit: suspicious
    conf: 0.97
    attack: T1485
    for:
      - package.json
    if:
      type: kv
      path: scripts.test
      regex: ^sudo?\s*rm\s+-rf\s+/\*$
  - id: rm-s-q
    desc: rm slash-s slash-q command
    crit: suspicious
    conf: 0.92
    attack: T1485
    if:
      type: text
      substr: rm /s /q
composite_rules:
  - id: lifecycle-hook-present
    desc: npm install hook present in text
    crit: component
    conf: 0.95
    any:
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
      - id: objectives/execution/interpreter/script/npm::npm-postinstall-script
  - id: destructive-payload-present
    desc: destructive install payload present
    crit: suspicious
    conf: 0.96
    any:
      - id: sudo-rm-rf-root
      - id: test-rm-rf-root
      - id: rm-s-q
  - id: filesystem-root-wipe
    desc: Filesystem root wipe command
    crit: hostile
    conf: 0.99
    attack: T1485
    mbc: C0047
    all:
      - id: no-preserve-root
      - id: sudo-rm-rf-root
      - id: lifecycle-hook-present
  - id: destructive-install-hook
    desc: Destructive npm install hook
    crit: hostile
    conf: 0.98
    attack: T1485
    all:
      - id: lifecycle-hook-present
      - id: destructive-payload-present
  - id: destructive-test-script
    desc: Destructive npm test script
    crit: hostile
    conf: 0.99
    attack: T1485
    all:
      - id: has-test-script
      - id: destructive-payload-present
