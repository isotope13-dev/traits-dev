defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]
  attack: T1485

composite_rules:
  - id: llm-override-destructive-file-deletion
    desc: LLM prompt override requests destructive file deletion
    crit: hostile
    conf: 0.97
    near_bytes: 320
    all:
      - id: objectives/evasion/security-bypass/llm/override::llm-prior-instruction-override
    any:
      - id: objectives/execution/lure/shell::paste-run-destructive-shell
      - id: objectives/impact/destroy/keywords::destructive-code-instruction
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
      - id: well-known/tool/detection/security-scanner::defensive-threat-signatures

  - id: concealed-llm-override-destructive-file-deletion
    desc: Concealed LLM prompt override requests destructive file deletion
    crit: hostile
    conf: 0.98
    near_bytes: 420
    all:
      - id: llm-override-destructive-file-deletion
      - id: micro-behaviors/ui/terminal::ansi-output-erase
