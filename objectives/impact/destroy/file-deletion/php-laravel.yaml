defaults:
  platforms: [unix]
  for: [php]
  attack: T1485
  mbc: C0047

composite_rules:
  - id: laravel-app-root-destructive-delete
    desc: Laravel application root destructive delete
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/fs/path/application::laravel-base-path
      - id: micro-behaviors/fs/delete/directory::laravel-delete-directory
      - id: micro-behaviors/fs/chmod::php-shell-chmod-recursive-777
      - id: micro-behaviors/fs/chmod::php-shell-chown-recursive

  - id: laravel-app-root-rmdir-after-permission-change
    desc: Laravel app root rmdir after chmod
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/path/application::laravel-base-path
      - id: micro-behaviors/fs/delete/directory::php-rmdir
      - id: micro-behaviors/fs/chmod::php-shell-chmod-recursive-777
      - id: micro-behaviors/fs/chmod::php-shell-chown-recursive
