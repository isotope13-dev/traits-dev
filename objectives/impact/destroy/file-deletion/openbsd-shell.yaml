defaults:
  platforms: [openbsd, bsd, unix]
  for: [shell]
  attack: T1485

traits:
  - id: shell-delete-ssh-host-keys
    desc: Shell deletes SSH host keys
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'rm\s+-f\s+/etc/ssh/ssh_host_\*_key'

  - id: shell-delete-mail-spools
    desc: Shell deletes mail spools
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: rm -f /var/mail/*

composite_rules:
  - id: openbsd-shell-trust-file-destroy
    desc: OpenBSD shell destroys trust files
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: shell-delete-ssh-host-keys
      - id: shell-delete-mail-spools
      - id: micro-behaviors/os/autorun/scheduled::crontab-remove
