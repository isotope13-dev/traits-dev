defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1485
  mbc: C0047
traits:
  - id: wsh-slice-del-force-quiet
    desc: Slice-obfuscated forced quiet delete
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "'974/Q\" }'.slice(3)"
  - id: wsh-slice-del-force-switch
    desc: Slice-obfuscated delete force switch
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "'983/F '.slice(3)"
  - id: wsh-slice-sysinternals-host
    desc: Slice-obfuscated Sysinternals host
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "'6548864stem'.slice(7)"
  - id: wsh-slice-delete-tool-exe
    desc: Slice-obfuscated delete tool exe
    crit: component
    conf: 0.86
    if:
      type: text
      exact: "'660exe'.slice(3)"
composite_rules:
  - id: wsh-ransomware-secure-delete
    desc: WSH ransomware secure deletion
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/impact/ransom/encrypt::wsh-7zip-password-ransomware
      - id: wsh-slice-del-force-quiet
      - id: wsh-slice-del-force-switch
      - id: wsh-slice-sysinternals-host
      - id: wsh-slice-delete-tool-exe
