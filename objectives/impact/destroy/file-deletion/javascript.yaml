defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1485
  mbc: E1485

traits:
  - id: node-rm-tmp-wildcard
    desc: Node removes temp wildcard
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "rm\\x20-rf\\x20tmp/*"

  - id: node-find-project-files
    desc: Node finds project files
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "find\\x20./\\x20-type\\x20f\\x20-print0"

  - id: node-xargs-force-delete
    desc: Node xargs force delete
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "xargs\\x20-0\\x20rm\\x20-rf"

  - id: encoded-session-wipe-command
    desc: Encoded session wipe command
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "cm0gLXJmIHNlc3Npb25zL2Rldiogc2Vzc2lvbnMvaWRlbnRpdHkqIHNlc3Npb25zL3RjdG9rZW4q"

  - id: node-uncaught-exception-handler
    desc: Node uncaught exception handler
    crit: suspicious
    conf: 0.90
    if:
      type: text
      substr: "process['on']('uncaughtException'"

composite_rules:
  - id: node-import-project-file-wipe
    desc: Import-time shell deletes project files
    crit: hostile
    conf: 0.98
    all:
      - id: node-rm-tmp-wildcard
      - id: node-find-project-files
      - id: node-xargs-force-delete

  - id: node-session-wipe-on-error
    desc: Exception handler wipes sessions
    crit: hostile
    conf: 0.96
    all:
      - id: encoded-session-wipe-command
      - id: node-uncaught-exception-handler
