defaults:
  platforms: [panos, appliance, unix]
  for: [shell]
  attack: T1485

traits:
  - id: panos-shell-bak-delete
    desc: PAN-OS shell bak delete
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'find /tmp -name "*.bak" -delete'

  - id: panos-shell-orig-delete
    desc: PAN-OS shell orig delete
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'find /tmp -name "*.orig" -delete'

  - id: panos-shell-backup-delete
    desc: PAN-OS shell backup delete
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'find /tmp -name "*.backup" -delete'

  - id: panos-shell-recovery-denial-text
    desc: PAN-OS shell recovery denial text
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Recovery is only possible through the operator.

composite_rules:
  - id: panos-shell-backup-destruction
    desc: PAN-OS shell backup destruction
    crit: hostile
    conf: 0.98
    all:
      - id: panos-shell-bak-delete
      - id: panos-shell-orig-delete
      - id: panos-shell-backup-delete
      - id: panos-shell-recovery-denial-text
