defaults:
  platforms: [freebsd, unix]
  for: [kotlin, class]
  attack: T1485

traits:
  - id: kotlin-recursive-delete-function
    desc: Kotlin recursive delete function
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: destroyRecursive

  - id: kotlin-recursive-delete-bytecode
    desc: Kotlin bytecode recursive delete function
    crit: suspicious
    conf: 0.92
    for: [class]
    if:
      type: hex
      pattern: 64 65 73 74 72 6F 79 52 65 63 75 72 73 69 76 65

  - id: kotlin-user-data-delete-targets
    desc: Kotlin targets user data deletion
    crit: suspicious
    conf: 0.92
    count_min: 3
    unless:
      - type: basename
        exact: .gitignore
      - id: well-known/app/gitbucket
      - type: text
        substr: org.apache.sshd
    if:
      type: text
      regex: '\.(ssh|bash_history|zsh_history|cache)'

  - id: kotlin-kill-user-processes
    desc: Kotlin kills current user processes
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: pkill -u $(whoami)

  - id: kotlin-kill-user-processes-bytecode
    desc: Kotlin bytecode kills user processes
    crit: suspicious
    conf: 0.94
    for: [class]
    if:
      type: hex
      pattern: 70 6B 69 6C 6C 20 2D 75 20 24 28 77 68 6F 61 6D 69 29

composite_rules:
  - id: kotlin-recursive-user-data-destroy
    desc: Kotlin recursively destroys user data
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-recursive-delete-function
      - id: kotlin-user-data-delete-targets
    any:
      - id: kotlin-kill-user-processes
      - id: micro-behaviors/fs/delete/file::java-file-delete-bytecode

  - id: kotlin-bytecode-user-data-destroy
    desc: Kotlin bytecode destroys user data
    crit: hostile
    conf: 0.98
    for: [class]
    all:
      - id: kotlin-recursive-delete-bytecode
      - id: objectives/credential-access/shell/history::jvm-bash-history-bytecode-path
      - id: objectives/credential-access/shell/history::jvm-zsh-history-bytecode-path
    any:
      - id: kotlin-kill-user-processes-bytecode
      - id: micro-behaviors/fs/delete/file::java-file-delete-bytecode
