defaults:
  platforms: [ios]
  for: [swift]
  attack: T1485

traits:
  - id: swift-ios-sandbox-removeitem
    desc: Swift removes iOS sandbox items
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'contentsOfDirectory[\s\S]{0,180}removeItem'

  - id: swift-ios-keychain-delete
    desc: Swift deletes iOS Keychain items
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'SecItemDelete[\s\S]{0,120}kSecClass'

composite_rules:
  - id: swift-ios-data-destruction
    desc: Swift iOS data destruction
    crit: hostile
    conf: 0.98
    all:
      - id: swift-ios-sandbox-removeitem
      - id: swift-ios-keychain-delete
