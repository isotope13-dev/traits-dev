defaults:
  attack: T1485
  mbc: C0047
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries]
traits:
  - id: destructive-gameplay-warning
    desc: Warns that destructive gameplay will delete files
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (killing|playing).{0,50}delete.{0,50}files
      case_insensitive: true
  - id: deleteFile-function
    desc: deleteFile function call
    crit: notable
    conf: 0.8
    if:
      type: symbol
      regex: deleteFiles?
  - id: deleteSelf-function
    desc: deleteSelf function call
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      regex: deleteSelf
    downgrade:
      any:
        # Large infrastructure binaries (e.g. service mesh) have gRPC internal deleteSelf cleanup methods
        - id: metadata/binary/metrics::massive-executable
  - id: explicit-file-deletion-warning-delete
    desc: Explicit warning of file/data deletion (delete)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \bdelete\b.{0,40}\b(?:all|your)\b.{0,20}\b(?:files?|documents?)\b
      case_insensitive: true
    not:
      - regex: "(?i)delete rows from this list\\. changes to your data cannot be saved\\."
      - regex: "(?i)permission to delete rows from this list\\. changes to your data cannot be saved\\."
      - regex: "(?i)send the row\\(s\\) to the site recycle bin"
      - regex: "(?i)send these documents to the site recycle bin"
      - regex: (?i)\bdb\.<collection>\.delete\b
      - regex: (?i)\bdelete\s+documents\s+according\s+filter\s+clause\b
      - regex: (?i)\bdelete\s+all\s+documents,\s+indexes\s+and\s+collection\s+name\b
      - regex: (?i)--delete-old-versions\s+process
      - regex: (?i)\bdelete\s+all\s+nonessential\s+files\b
      - regex: (?i)\bdelet(?:e|ing)\s+existing\s+files\b
      - regex: (?i)\bdeletes?\s+all\s+files\b
      - regex: (?i)\bdelete\s+all\s+log\s+files\b
      - regex: (?i)\bdelete(?:d)?\s+all\s+old\s+files\b
      - regex: (?i)\bdelete\s+all\s+mature\s+data\b
      - regex: (?i)\bdelete\s+all\s+files\s+of\s+the\s+package\b
      - regex: (?i)\bdelete\s+all\s+empty\s+\w+\s+data\b
      - regex: (?i)\bdelete\s+all\s+extra\s+files\b
      - regex: (?i)\bdelete\s+all\s+missing\s+files\b
      - regex: (?i)zsh:\s+sure\s+you\s+want\s+to\s+delete\s+all\s+\S+\s+files\s+in\b
      - regex: (?i)deletes?\s+the\s+key\s+from\s+all\s+config\s+files
      - regex: (?i)\bdeleted?\s+all\s+key\s+map\s+files\b
      - regex: (?i)deleting a team project is an irrecoverable operation
      - regex: (?i)root drive.{0,200}delete all existing files
      - regex: (?i)except dvi, ps and pdf files
      - regex: (?i)\bdelete\s+the\s+part\s+files\s+once\s+all\s+the\s+files\b
      - regex: "%select"
    unless:
      - type: text
        substr: "zsh: sure you want to delete all "
      - type: text
        substr: "zsh: sure you want to delete the only file in"
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/package::team-foundation-string
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/binary/metrics::massive-executable
        - id: metadata/lang/compiler/systems::go-binary
  - id: explicit-file-deletion-warning-destroy
    desc: Explicit warning of file/data deletion (destroy)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \bdestroy\b.{0,30}\b(your|all)\b.{0,30}\b(files|data|documents)\b
      case_insensitive: true
    not:
      - regex: destroy\(
      - exact: destroy all keys and data
      - regex: (?i)\b(secret-?keys?|keyring|private key)s?\b
      - regex: (?i)THIS MAY DESTROY
      - regex: (?i)MAY DESTROY \(PARTS OF\)
  - id: explicit-file-deletion-warning-destroyed
    desc: Explicit warning of file/data deletion (destroyed)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \b(files|data|documents)\b.{0,30}\b(will be|are)\b.{0,20}\bdestroyed\b
      case_insensitive: true
    not:
      - regex: (?i)\bdata on the (usb|removable|target|selected) disk will be destroyed\b
      - regex: (?i)\ball data on the (usb|removable|target|selected) disk will be destroyed\b
      - regex: (?i)deleting a team project is an irrecoverable operation
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/package::team-foundation-string
  - id: explicit-file-deletion-warning-wipe
    desc: Explicit warning of file/data deletion (wipe)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \bwipe[a-z]{0,3}\b.{0,80}\b(your|all)\b.{0,20}\b(files|data|documents)\b
      case_insensitive: true
  - id: explicit-file-deletion-warning-erase
    desc: Explicit warning of file/data deletion (erase)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \berase[a-z]{0,3}\b.{0,80}\b(your|all\s+your)\b.{0,20}\b(files|data|documents)\b
      case_insensitive: true
    unless:
      - type: text
        substr: "you are about to erase all data from the following device"
        case_insensitive: true
      - type: text
        substr: "are you sure you want to erase all data"
        case_insensitive: true
    downgrade:
      any:
        - id: metadata/binary/linking::static-linked-heuristic
  - id: punishment-piracy-message
    desc: Anti-piracy punishment threat message
    crit: suspicious
    conf: 0.95
    for: [pe, dll]
    if:
      type: text
      regex: \bpiracy\b.{0,40}\bdeserve\b
      case_insensitive: true
  - id: punishment-deserve-threat-harm
    desc: Punishment harm threat in binary
    crit: component
    conf: 0.9
    for: [pe, dll]
    if:
      type: text
      regex: \byou deserve\b.{0,20}(punish|destroy|delet)
      case_insensitive: true
  - id: punishment-deserve-threat-wipe
    desc: Punishment wipe threat in binary
    crit: component
    conf: 0.9
    for: [pe, dll]
    if:
      type: text
      regex: \byou deserve\b.{0,20}(format|wipe)
      case_insensitive: true
  - id: shell-folders-personal-targeting
    desc: Windows Shell Folders registry path
    crit: baseline
    conf: 0.7
    for: [pe, dll]
    if:
      type: text
      substr: "Shell Folders"
  - id: overwrite-with-question-mark
    desc: Overwrites file content with question mark character
    crit: suspicious
    conf: 0.9
    for:
      - pe
      - dll
      - csharp
    if:
      type: text
      regex: WriteAllText\(.{0,100},\s*"?"\)
composite_rules:
  - id: explicit-file-deletion-warning-all
    desc: Explicit warning of file/data deletion
    crit: suspicious
    conf: 0.95
    any:
      - id: explicit-file-deletion-warning-delete
      - id: explicit-file-deletion-warning-destroy
      - id: explicit-file-deletion-warning-destroyed
      - id: explicit-file-deletion-warning-wipe
      - id: explicit-file-deletion-warning-erase
  - id: punishment-threat-any
    desc: Punishment or threatening message
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/signed/platform::microsoft
    any:
      - id: punishment-piracy-message
      - id: punishment-deserve-threat-harm
      - id: punishment-deserve-threat-wipe
      - id: explicit-file-deletion-warning-delete
      - id: explicit-file-deletion-warning-destroy
      - id: explicit-file-deletion-warning-wipe
      - id: explicit-file-deletion-warning-erase
  - id: intentional-file-destruction
    desc: Intentional file destruction pattern
    crit: hostile
    conf: 0.9
    all:
      - id: explicit-file-deletion-warning-all
      - id: deleteFile-function
  - id: pe-destructive-file-wiper
    desc: Destructive file wiper trojan
    crit: hostile
    conf: 0.95
    for: [pe, dll]
    all:
      - id: micro-behaviors/fs/enumerate/directory::find-file-walker
      - id: micro-behaviors/fs/file/delete::deletefile-a
      - id: punishment-threat-any
    any:
      - id: objectives/persistence/login/startup/registry::software-run-key
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
      - id: shell-folders-personal-targeting
    needs: 1
