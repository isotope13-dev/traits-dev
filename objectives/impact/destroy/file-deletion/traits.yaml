defaults:
  attack: T1485
  mbc: C0047
  platforms:
  - linux
  - macos
  - windows
  for: [elf, macho, pe]
traits:
- id: deleteSelf-function
  desc: deleteSelf object-lifecycle symbol
  # A symbol literally named deleteSelf is overwhelmingly C++ object-lifecycle
  # management (an object freeing itself), not executable self-deletion. The
  # ever-growing unless list below (OpenGL, gRPC, Qt Aggregation) confirms the
  # benign-collision rate; the real evasion signal is the move-to-temp/delete
  # behaviour, not a method name. Notable, not suspicious.
  crit: notable
  conf: 0.85
  if:
    type: symbol
    substr: deleteSelf
  unless:
  - type: symbol
    regex: 'gl::Program::deleteSelf'
  - type: symbol
    regex: 'grpc/internal/(channelz|transport).*deleteSelf'
  - type: symbol
    regex: 'grpc_internal_(channelz|transport).*deleteSelf'
  - type: symbol
    regex: 'Aggregation.{0,8}Aggregate.{0,12}deleteSelf'
  downgrade:
    any:
        # Large infrastructure binaries (e.g. service mesh) have gRPC internal deleteSelf cleanup methods
    - id: metadata/binary/metrics/size::massive-executable
- id: explicit-file-deletion-warning-delete
  desc: "Explicit warning of file/data deletion"
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '\bdelete\b.{0,40}\b(all|your)\b.{0,20}\b(files?|documents?)\b'
    case_insensitive: true
  not:
  - substr: failed to delete all file versions
  - substr: Remote Synchronization Tool
  - substr: delete all %d files
  - substr: delete all %s files
  - substr: delete all the files
  - regex: (?i)delete all %d files,delete all the files
  - regex: "(?i)delete rows from this list\\. changes to your data cannot be saved\\."
  - regex: "(?i)permission to delete rows from this list\\. changes to your data cannot be saved\\."
  - regex: "(?i)send the row\\(s\\) to the site recycle bin"
  - regex: "(?i)send these documents to the site recycle bin"
  - regex: (?i)\bdb\.<collection>\.delete\b
  - regex: (?i)\bdelete\s+documents\s+according\s+filter\s+clause\b
  - regex: (?i)\bdelete\s+all\s+documents,\s+indexes\s+and\s+collection\s+name\b
  - regex: (?i)--delete-old-versions\s+process
  - regex: (?i)\bdelete\s+all\s+nonessential\s+files\b
  - regex: (?i)\bdelet(e|ing)\s+existing\s+files\b
  - regex: (?i)\bdeletes?\s+all\s+files\b
  - regex: (?i)\bdelete\s+all\s+log\s+files\b
  - regex: (?i)\bdelete\s+all\s+your\s+existing\s+log\s+files\b
  - regex: (?i)\bdelete\s+all\s+sidecar\s+files\b
  - regex: (?i)\bdelete(d)?\s+all\s+old\s+files\b
  - regex: (?i)\bdelete\s+all\s+mature\s+data\b
  - regex: (?i)\bdelete\s+all\s+files\s+of\s+the\s+package\b
  - regex: (?i)\bdelete\s+all\s+empty\s+\w+\s+data\b
  - regex: (?i)\bdelete\s+all\s+extra\s+files\b
  - regex: (?i)\bdelete\s+all\s+missing\s+files\b
  - regex: (?i)failed\s+to\s+delete\s+all\s+file\s+versions?
  - substr: "delete all file versions"
  - regex: (?i)zsh:\s+sure\s+you\s+want\s+to\s+delete\s+all\s+((%d|\S+)\s+)?files?\s+in\b
  - regex: (?i)\bdelete\s+all\s+%d\s+files\b
  - regex: (?i)\bdelete\s+all\s+%s\s+files\b
  - exact: delete all the files
  - regex: (?i)deletes?\s+the\s+key\s+from\s+all\s+config\s+files
  - regex: (?i)\bdeleted?\s+all\s+key\s+map\s+files\b
  - regex: (?i)deleting a team project is an irrecoverable operation
  - regex: (?i)root drive.{0,200}delete all existing files
  - regex: (?i)except dvi, ps and pdf files
  - regex: (?i)\bdelete\s+the\s+part\s+files\s+once\s+all\s+the\s+files\b
  - regex: (?i)\bdelete\s+all\s+part\s+files\b
  - regex: (?i)\bdelete\s+\(or\s+rename\)\s+all\s+files\b
  - regex: (?i)delete\s+\(or\s+rename\)\s+all\s+files\s+in\s+the\s+destination
  - regex: (?i)\bdelete\s+all\s+cached\s+wininet\s+files\b
  - regex: (?i)\bdelete\s+all\s+efi\s+files\b
  - regex: (?i)destination[\s\S]{0,120}delete\s+\(or\s+rename\)\s+all\s+files
  - regex: (?i)force option is set[\s\S]{0,200}delete\s+\(or\s+rename\)\s+all\s+files
  - regex: "%select"
  - substr: "zsh: sure you want to delete all "
  - substr: "zsh: sure you want to delete the only file in"
  - regex: (?i)delete.{0,60}(Desktop|Documents?|Downloads?|Pictures?)
  unless:
  - type: basename
    exact: RemoteSynchronization.dll
  - id: metadata/binary/resource/
  # A GUI confirmation prompt is an operator-controlled file action, not a
  # destructive threat or wiper message.
  - type: text
    regex: (?i)\bdo\s+you\s+want\s+to\s+(securely\s+)?delete\b
  downgrade:
    any:
    - id: metadata/signed/platform::apple
    - id: metadata/binary/metrics/size::massive-executable
    - id: metadata/lang/compiler/systems::go-binary
- id: explicit-file-deletion-warning-destroy
  desc: "Explicit warning of file/data deletion"
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: \bdestroy\b.{0,30}\b(your|all)\b.{0,30}\b(files|data|documents)\b
    case_insensitive: true
  not:
  - regex: destroy\(
  - regex: (?i)\bdestroy your data\b
  - regex: (?i)destroy\s+\(parts of\)\s+(all\s+)?your\s+data
  - exact: destroy all keys and data
  - regex: (?i)\b(secret-?keys?|keyring|private key)s?\b
  - regex: (?i)THIS MAY DESTROY
  - regex: (?i)MAY DESTROY \(PARTS OF\)
  unless:
  - type: text
    regex: (?i)\bto install \w+.{0,120}\brepartitioned\b.{0,120}\bdestroy all data on the disk\b
- id: explicit-file-deletion-warning-destroyed
  desc: "Explicit warning of file/data deletion"
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: \b(files|data|documents)\b.{0,30}\b(will be|are)\b.{0,20}\bdestroyed\b
    case_insensitive: true
  not:
  - regex: (?i)\bdata on the (usb|removable|target|selected) disk will be destroyed\b
  - regex: (?i)\ball data on the (usb|removable|target|selected) disk will be destroyed\b
  - regex: (?i)deleting a team project is an irrecoverable operation
  unless:
  - id: metadata/binary/resource/
- id: explicit-file-deletion-warning-wipe
  desc: Explicit warning of data wiping
  # A warning string is useful triage context but does not prove destructive
  # behavior; the hostile composite separately requires a file-delete API.
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: \bwipe[a-z]{0,3}\b.{0,80}\b(your|all)\b.{0,20}\b(files|data|documents)\b
    case_insensitive: true
  unless:
  - id: well-known/app/go-ethereum::go-ethereum-tool
  - id: well-known/app/silverbullet::official-silverbullet-context
- id: explicit-file-deletion-warning-erase
  desc: Explicit warning of file/data deletion (erase)
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: \berase[a-z]{0,3}\b.{0,80}\b(your|all\s+your)\b.{0,20}\b(files|data|documents)\b
    case_insensitive: true
  unless:
  - type: text
    substr: "you are about to erase all data from the following device"
    case_insensitive: true
  - type: text
    substr: "are you sure you want to erase all data"
    case_insensitive: true
  downgrade:
    any:
    - id: metadata/binary/linking/static/
- id: punishment-piracy-message
  desc: Anti-piracy punishment threat message
  crit: suspicious
  conf: 0.95
  for: [pe]
  if:
    type: text
    regex: \bpiracy\b.{0,40}\bdeserve\b
    case_insensitive: true
- id: punishment-deserve-threat-harm
  desc: Punishment harm threat in binary
  crit: component
  conf: 0.9
  for: [pe]
  if:
    type: text
    regex: \byou deserve\b.{0,20}(punish|destroy|delet)
    case_insensitive: true
- id: punishment-deserve-threat-wipe
  desc: Punishment wipe threat in binary
  crit: component
  conf: 0.9
  for: [pe]
  if:
    type: text
    regex: \byou deserve\b.{0,20}(format|wipe)
    case_insensitive: true
- id: shell-folders-personal-targeting
  desc: References Windows Shell Folders path
  crit: component
  conf: 0.7
  for: [pe]
  if:
    type: text
    substr: "Shell Folders"
- id: overwrite-with-question-mark
  desc: 'overwrite with question mark'
  crit: suspicious
  conf: 0.9
  for:
  - pe
  - csharp
  if:
    type: text
    regex: WriteAllText\(.{0,100},\s*"\?"\)

- id: unix-root-rm-no-preserve-source-literal
  desc: Unix root rm no-preserve source literal
  crit: notable
  conf: 0.95
  platforms: [unix]
  for: [source]
  if:
    type: string_literal
    regex: '\brm\s+-rf\s+/\s+--no-preserve-root\b'

- id: unix-root-rm-no-preserve-script-text
  desc: Unix root rm no-preserve script text
  crit: notable
  conf: 0.93
  platforms: [unix]
  for: [scripts]
  if:
    type: text
    regex: '\brm\s+-rf\s+/\s+--no-preserve-root\b'

- id: unix-root-rm-no-preserve-binary-string
  desc: Unix root rm no-preserve binary string
  crit: notable
  conf: 0.95
  platforms: [unix]
  for: [binaries]
  if:
    type: text
    regex: '\brm\s+-rf\s+/\s+--no-preserve-root\b'

- id: kamikaze-wiper-ref
  desc: Kamikaze wiper script reference
  crit: suspicious
  conf: 0.8
  if:
    type: text
    word: "kamikaze.sh"

- id: mount-host-filesystem
  desc: Mounts host root filesystem (wiper indicator)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: mount\s+/dev/\S+\s+/mnt/host
- id: exe-gho-bak-allowed-list
  desc: Ordered .exe/.gho/.bak allow-list cluster
  crit: component
  conf: 0.9
  platforms: [windows]
  for: [pe]
  if:
    type: text
    regex: '(?i)\.exe\b.{0,128}\.gho\b.{0,128}\.bak\b'

composite_rules:
- id: unix-root-rm-no-preserve-command
  desc: Unix root rm no-preserve command
  crit: notable
  conf: 0.96
  platforms: [unix]
  for: [scripts, source, binaries]
  any:
  - id: unix-root-rm-no-preserve-source-literal
  - id: unix-root-rm-no-preserve-script-text
  - id: unix-root-rm-no-preserve-binary-string
- id: unix-hostile-wiper
  desc: Unix destructive wiper behavior
  crit: hostile
  conf: 0.95
  any:
  - id: unix-root-rm-no-preserve-command
  - id: kamikaze-wiper-ref
  - id: mount-host-filesystem
- id: explicit-file-deletion-warning-all
  desc: Explicit warning of file/data deletion
  crit: notable
  conf: 0.95
  any:
  - id: explicit-file-deletion-warning-delete
  - id: explicit-file-deletion-warning-destroy
  - id: explicit-file-deletion-warning-destroyed
  - id: explicit-file-deletion-warning-wipe
  - id: explicit-file-deletion-warning-erase
- id: punishment-threat-any
  desc: Punishment or threatening message
  crit: notable
  conf: 0.9
  unless:
  - id: metadata/signed/platform/
  any:
  - id: punishment-piracy-message
  - id: punishment-deserve-threat-harm
  - id: punishment-deserve-threat-wipe
  - id: explicit-file-deletion-warning-delete
  - id: explicit-file-deletion-warning-destroy
  - id: explicit-file-deletion-warning-wipe
  - id: explicit-file-deletion-warning-erase
- id: intentional-file-destruction
  desc: Intentional file destruction pattern
  crit: hostile
  conf: 0.9
  all:
  - id: explicit-file-deletion-warning-all
  - id: micro-behaviors/fs/file/delete::delete-files-symbol
  unless:
  - id: well-known/app/restic/
  - id: well-known/lib/benign-runtime-bundles/
- id: pe-destructive-file-wiper
  desc: Destructive file wiper trojan
  crit: hostile
  conf: 0.95
  for: [pe]
  all:
  - id: micro-behaviors/fs/enumerate/directory::find-file-walker
  - id: micro-behaviors/fs/file/delete::deletefile-a
  - id: punishment-threat-any
  any:
  - id: objectives/persistence/login/startup/registry::software-run-key
  - id: micro-behaviors/fs/file/copy::copyfile-a
  - id: micro-behaviors/os/sysinfo/directories::get-system-directory
  - id: shell-folders-personal-targeting
- id: drive-wide-nonallowed-list-file-deleter
  desc: Deletes non-allowed listed files across drives
  crit: hostile
  conf: 0.97
  for: [pe]
  platforms: [windows]
  all:
  - id: micro-behaviors/fs/file/delete::delete-win
  - id: micro-behaviors/fs/traversal/drives::logical-drive-enumeration
  - id: objectives/impact/infect/binary/rewrite::skip-windows-install-dir
  - id: exe-gho-bak-allowed-list
  any:
  - id: micro-behaviors/process/create/exec::comspec-reference
  - id: micro-behaviors/dylib/library/legacy::mfc42-ref
  - id: objectives/impact/infect/binary/rewrite::ghost-image-filter
