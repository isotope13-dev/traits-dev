defaults:
  platforms: [unix, windows]
  for: [crx, xpi, zip]
  attack: T1485

composite_rules:
  - id: extension-indexeddb-wipe
    desc: Extension deletes all IndexedDB databases
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: metadata/permission/manifest::chrome-newtab-override
      - id: micro-behaviors/data/db/web-storage::indexeddb-databases-enumerate
      - id: micro-behaviors/data/db/web-storage::indexeddb-delete-database
