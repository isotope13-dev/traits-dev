defaults:
  platforms: [unix, windows]
  for: [crx, xpi, zip]
  attack: T1485

composite_rules:
  # Bulk IndexedDB deletion is only victim-data destruction when the extension
  # can run in page origins. Gated on broad content injection (all-sites content
  # script or scripting.executeScript) so a new-tab/background worker clearing its
  # OWN extension-origin storage (benign cache reset) does not match.
  - id: extension-injected-indexeddb-wipe
    desc: Injected content wipes visited-site IndexedDB
    crit: hostile
    conf: 0.97
    scope: archive
    all:
      - id: micro-behaviors/data/db/web-storage::indexeddb-databases-enumerate
      - id: micro-behaviors/data/db/web-storage::indexeddb-delete-database
    any:
      - id: micro-behaviors/process/inject/webextension::broad-content-script-injection
      - id: micro-behaviors/process/inject/webextension::chrome-scripting-execute
