defaults:
  platforms: [unix, windows]
  for: [crx, xpi, zip]
  attack: T1485

composite_rules:
  # Bulk IndexedDB deletion is only victim-data destruction when the same source
  # file both enumerates and deletes databases. Archive-wide correlation would
  # incorrectly combine a background injection API with a bundled IndexedDB
  # library (for example, Dexie's normal own-database cleanup).
  # Extension service-worker IndexedDB is origin-isolated; without content-script
  # injection this pattern only clears the extension's own databases.
  - id: extension-injected-indexeddb-wipe
    desc: Injected content wipes visited-site IndexedDB
    crit: hostile
    conf: 0.97
    for: [javascript]
    scope: file
    all:
      - id: micro-behaviors/data/db/web-storage::indexeddb-databases-enumerate
      - id: micro-behaviors/data/db/web-storage::indexeddb-delete-database
    any:
      - id: micro-behaviors/process/inject/webextension::broad-content-script-injection
      - id: micro-behaviors/process/inject/webextension::chrome-scripting-execute
    unless:
      - id: well-known/app/copy-text-from-picture::documented-ocr-extension-context
      - id: well-known/app/copy-text-from-picture::documented-local-data-reset-context
