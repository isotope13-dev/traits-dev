defaults:
  platforms: [unix]
  for: [rust]
  attack: T1485
  mbc: E1485

traits:
  - id: aliyun-self-release-method
    desc: Aliyun ECS self-release method
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bself_release(_in_ecs)?\b[\s\S]{0,900}\.release\(.{0,240},\s*true\)'

composite_rules:
  - id: aliyun-metadata-self-release
    desc: Aliyun metadata-driven instance self-release
    crit: hostile
    conf: 0.98
    all:
      - id: aliyun-self-release-method
      - id: objectives/discovery/cloud/metadata::rust-alibaba-metadata-url
      - id: objectives/discovery/cloud/metadata::rust-alibaba-user-data-url
