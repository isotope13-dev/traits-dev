defaults:
  platforms: [unix, appliance]
  for: [perl]
  attack: T1499

traits:
  - id: perl-fork-cpu-memory-burn
    desc: Perl fork CPU memory burn
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'fork\(\)[\s\S]{0,260}while \(1\)[\s\S]{0,260}\$buffer \.='

  - id: perl-temp-junk-file-fill
    desc: Perl temp junk file fill
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tmp[\s\S]{0,180}\.cache_\$\$[\s\S]{0,180}64\*1024'

composite_rules:
  - id: perl-resource-degradation-loop
    desc: Perl resource degradation loop
    crit: hostile
    conf: 0.98
    all:
      - id: perl-fork-cpu-memory-burn
      - id: perl-temp-junk-file-fill
