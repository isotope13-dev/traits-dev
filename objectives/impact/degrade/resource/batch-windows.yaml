defaults:
  platforms: [windows]
  for: [batch]
  attack: T1499

traits:
  - id: batch-fsutil-large-file-create
    desc: Batch fsutil large file create
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'fsutil\s+file\s+createnew.{0,80}104857600'
      case_insensitive: true

  - id: batch-diskfill-loop-label
    desc: Batch diskfill loop label
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: :diskfill

  - id: random-directory-create
    desc: Batch creates random directories
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?im)^\s*(md|mkdir)\s+%random%%random%'

  - id: batch-ping-flood-max-payload
    desc: Batch maximum ping flood
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bping\b.{0,40}-l\s+65500.{0,20}-t\b'

composite_rules:
  - id: batch-disk-fill-degradation
    desc: Batch disk fill degradation
    crit: hostile
    conf: 0.98
    all:
      - id: batch-fsutil-large-file-create
      - id: batch-diskfill-loop-label

  - id: batch-random-directory-flood
    desc: Batch random directory flood
    crit: hostile
    conf: 0.96
    all:
      - id: random-directory-create
      - id: objectives/impact/degrade/system/desktop::batch-goto-short-label
