defaults:
  platforms: [windows]
  for: [batch]
  attack: T1499

traits:
  - id: batch-fsutil-large-file-create
    desc: Batch fsutil large file create
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'fsutil\s+file\s+createnew.{0,80}104857600'
      case_insensitive: true

  - id: batch-diskfill-loop-label
    desc: Batch diskfill loop label
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: :diskfill

composite_rules:
  - id: batch-disk-fill-degradation
    desc: Batch disk fill degradation
    crit: hostile
    conf: 0.98
    all:
      - id: batch-fsutil-large-file-create
      - id: batch-diskfill-loop-label
