defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1499

composite_rules:
  - id: browser-popup-timer-loop
    desc: Browser popup timer loop
    crit: hostile
    conf: 0.94
    near_bytes: 1024
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-window-open
      - id: micro-behaviors/ui/window/manage/dom::browser-contextmenu-handler
      - id: micro-behaviors/time/schedule/interval::setInterval
      - id: micro-behaviors/time/schedule/interval::setTimeout
    unless:
      - id: well-known/lib/tina4ruby/
      - id: well-known/lib/tina4ruby::dev-admin-js-path

  - id: browser-moving-popup-lockup
    desc: Browser moving popup lockup
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-window-open
      - id: micro-behaviors/ui/window/manage/dom::browser-window-move
      - id: micro-behaviors/ui/window/manage/dom::browser-window-focus
      - id: micro-behaviors/os/sysinfo/platform/browser::browser-screen-dimensions-read
      - id: micro-behaviors/time/schedule/interval::setTimeout

  - id: browser-input-exit-trap
    desc: Browser input and exit trap
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-beforeunload-handler
      - id: micro-behaviors/ui/window/manage/dom::browser-contextmenu-handler
      - id: micro-behaviors/ui/window/manage/dom::browser-keydown-handler
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/library/structure::vscode-large-minified-extension-bundle

  - id: browser-reload-lockup-loop
    desc: Browser self-reload lockup loop
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/control-flow/loop::javascript-infinite-loop-metric
      - id: micro-behaviors/ui/window/manage/dom::browser-beforeunload-handler
      - id: micro-behaviors/ui/window/manage/dom::browser-location-reload
      - id: micro-behaviors/data/db/web-storage::dom-localstorage

  - id: extension-all-sites-looping-audio
    desc: Extension forces looping audio across sites
    crit: hostile
    conf: 0.96
    ref: sha256:b5ad7ae1aa9174ae0f9e922e426bca209538fe454cdd2bfd206188096741fd3a
    for: [javascript, chrome-manifest, crx, archives]
    scope: archive
    all:
      - id: metadata/permission/manifest::host-permission-all-urls
      - id: micro-behaviors/process/inject/webextension::webextension-scripting-execute
      - id: micro-behaviors/hardware/input/audio::browser-audio-element-create
      - id: micro-behaviors/hardware/input/audio::browser-audio-loop-enabled
      - id: micro-behaviors/hardware/input/audio::browser-audio-play-call
    any:
      - id: micro-behaviors/hardware/input/audio::browser-audio-source-attribute
      - id: micro-behaviors/hardware/input/audio::browser-audio-source-property
  - id: domain-gated-remote-audio-autoplay
    desc: Domain-gated remote looping audio autoplay
    crit: hostile
    conf: 0.98
    for: [javascript]
    scope: file
    all:
      - id: micro-behaviors/hardware/input/audio::browser-audio-source-property
      - id: micro-behaviors/hardware/input/audio::remote-audio-source-url
      - id: micro-behaviors/hardware/input/audio::browser-audio-loop-enabled
      - id: micro-behaviors/hardware/input/audio::browser-audio-play-call
      - id: micro-behaviors/communications/http/url/path::browser-location-host-tld-match
      - id: micro-behaviors/os/sysinfo/platform/browser::navigator-language
