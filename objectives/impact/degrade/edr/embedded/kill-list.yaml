defaults:
  for:
    - csharp
  platforms:
    - windows
  attack: T1562.001
traits:
  - id: csharp-av-process-kill-source
    desc: C# kills named AV processes
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ProcessName[\s\S]{0,120}(kavsvcui|NOD32|ANTIVIR|ZONEALARM)'

  - id: csharp-process-kill-call
    desc: C# process Kill call
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'processes?\[[^\]\n]{0,40}\]\.Kill\(\)|process\.Kill\(\)'

  - id: av-process-names-a
    desc: AV process names set A
    crit: component
    conf: 0.95
    count_min: 3
    if:
      type: string_literal
      regex: (?i)\b(NAVW32|NOD32|ANTIVIR|ZONEALARM)\b
  - id: av-process-names-b
    desc: AV process names set B
    crit: component
    conf: 0.95
    count_min: 3
    if:
      type: string_literal
      regex: (?i)\b(NPROTECTED|F-AGNT95|SCAN32|ADAWARE)\b
  - id: admin-tool-names
    desc: Admin tool process names
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: string_literal
      regex: (?i)\b(taskmgr|regedit)\b
composite_rules:
  - id: av-kill-list
    desc: AV process kill list in C# source
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/process/terminate/kill::process-terminate-loop
    any:
      - id: av-process-names-a
      - id: av-process-names-b
      - id: csharp-av-process-kill-source

  - id: csharp-av-process-killer
    desc: C# AV process killer
    crit: hostile
    conf: 0.96
    all:
      - id: csharp-av-process-kill-source
      - id: csharp-process-kill-call
  - id: hidden-csharp-av-process-killer
    desc: Hidden C# AV process killer
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-av-process-killer
    any:
      - id: micro-behaviors/ui/window/manage/visibility::no-taskbar-window
      - id: micro-behaviors/ui/window/manage/visibility::borderless-window
  - id: borderless-taskbarless-csharp-av-killer
    desc: Borderless taskbarless AV killer
    crit: hostile
    conf: 0.99
    all:
      - id: csharp-av-process-killer
      - id: micro-behaviors/ui/window/manage/visibility::no-taskbar-window
      - id: micro-behaviors/ui/window/manage/visibility::borderless-window
  - id: admin-tool-kill
    desc: Admin tool process killing
    crit: notable
    conf: 0.95
    all:
      - id: micro-behaviors/process/terminate/kill::process-terminate-loop
      - id: admin-tool-names

  - id: dotnet-analysis-tool-termination
    desc: .NET terminates processes after analysis checks
    crit: hostile
    conf: 0.97
    for: [pe]
    all:
      - id: micro-behaviors/process/terminate/kill::get-processes-by-name
      - id: micro-behaviors/process/terminate/kill::dotnet-kill-member-reference
      - id: objectives/anti-analysis/emulator-detect/vendor-strings::comprehensive
    any:
      - id: micro-behaviors/communications/capture/wireshark::wireshark
      - id: objectives/anti-analysis/sandbox-detect/tool-references::procmon
      - id: objectives/anti-analysis/sandbox-detect/tool-references::process-hacker
