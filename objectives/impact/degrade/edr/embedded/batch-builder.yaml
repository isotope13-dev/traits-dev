defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1562.001
  mbc: E1562
traits:
  - id: embedded-av-tskill-burst
    desc: Embedded AV tskill burst
    crit: suspicious
    conf: 0.98
    count_min: 20
    if:
      type: text
      substr: 'tskill /A '
  - id: embedded-av-programfiles-delete
    desc: Embedded AV Program Files delete burst
    crit: suspicious
    conf: 0.98
    count_min: 10
    if:
      type: text
      regex: 'del /Q /F C:\\\\Program Files\\\\'
  - id: embedded-defender-stop-template
    desc: Embedded Defender stop command
    crit: notable
    conf: 0.96
    if:
      type: string_literal
      exact: 'net stop WinDefend'
composite_rules:
  - id: embedded-batch-av-killer
    desc: Embedded batch AV killer payload
    crit: hostile
    conf: 0.99
    all:
      - id: embedded-av-tskill-burst
      - id: embedded-av-programfiles-delete
    any:
      - id: embedded-defender-stop-template
      - id: objectives/impact/degrade/edr/embedded::av-kill-list
