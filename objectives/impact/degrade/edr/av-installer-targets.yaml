# AV Installer Target Names + Aggressive Kill Composite
# Distinct from runtime AV: these patterns catch tooling that sabotages
# security software *while the user is trying to install it* (Malwarebytes
# setup, Kaspersky first-run, ESET installer, McAfee, etc.).
# ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1562.001
  mbc: F0004
traits:
- id: mbsetup-installer
  desc: Malwarebytes MBSetup installer name
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: (?i)\bMBSetup(\.exe)?\b
- id: mbclean-tool
  desc: Malwarebytes cleanup tool name
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: (?i)\bMBClean(\.exe)?\b
- id: rstrui-restore-exe
  desc: Windows System Restore rstrui name
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)\bRstrUI(\.exe)?\b
- id: kaspersky-launcher
  desc: Kaspersky launcher exe
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (?i)\bKasperskyLauncher(\.exe)?\b
- id: mbam-service-name
  desc: Malwarebytes MBAMService name
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (?i)\bMBAMService(\.exe)?\b
- id: eset-egui
  desc: ESET egui/ekrn process name
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: (?i)\b(egui|ekrn)(\.exe)?\b
- id: stop-process-force-av-list--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.93
  for: [powershell]
  if:
    type: text
    regex: (?i)Stop-Process\b[^\n]{0,200}(MBSetup|MBClean)[^\n]{0,200}-Force
  count_max: 1004467
- id: stop-process-force-av-list--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.93
  for: [powershell]
  if:
    type: text
    regex: (?i)Stop-Process\b[^\n]{0,200}(KasperskyLauncher|McAfee)[^\n]{0,200}-Force
  count_max: 1004468
- id: stop-process-force-av-list--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.93
  for: [powershell]
  if:
    type: text
    regex: (?i)Stop-Process\b[^\n]{0,200}(ESET|RstrUI)[^\n]{0,200}-Force
  count_max: 1004469
- id: stop-process-force-av-list--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.93
  for: [powershell]
  if:
    type: text
    regex: (?i)Stop-Process\b[^\n]{0,200}(avp|ekrn)[^\n]{0,200}-Force
  count_max: 1004470
- id: stop-process-force-av-list--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.93
  for: [powershell]
  if:
    type: text
    regex: (?i)Stop-Process\b[^\n]{0,200}(MBAMService)[^\n]{0,200}-Force
  count_max: 1004471
composite_rules:
- id: av-installer-target-set
  desc: AV installer process name set
  crit: suspicious
  conf: 0.92
  needs: 2
  any:
  - id: mbsetup-installer
  - id: mbclean-tool
  - id: kaspersky-launcher
  - id: mbam-service-name
  - id: eset-egui
  - id: rstrui-restore-exe
- id: av-installer-kill-loop
  desc: Aggressive kill-loop targeting AV installers
  crit: hostile
  conf: 0.97
  for: [powershell, batch, csharp]
  all:
  - id: av-installer-target-set
  any:
  - id: stop-process-force-av-list
  - id: micro-behaviors/time/sleep/interval::ps-tight-ms-sleep
- id: stop-process-force-av-list
  desc: Stop-Process -Force with AV installer list
  crit: suspicious
  conf: 0.93
  for: [powershell]
  any:
  - id: stop-process-force-av-list--rx-1
  - id: stop-process-force-av-list--rx-2
  - id: stop-process-force-av-list--rx-3
  - id: stop-process-force-av-list--rx-4
  - id: stop-process-force-av-list--rx-5
