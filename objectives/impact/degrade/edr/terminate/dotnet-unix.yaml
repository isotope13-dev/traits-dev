defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1562.001

traits:
  - id: dotnet-pkill-security-tools
    desc: .NET pkill security tools
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'pkill -f[\s\S]{0,120}(clamscan|rkhunter|chkrootkit)'

  - id: dotnet-unix-av-tool-list
    desc: .NET Unix AV tool list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'clamscan[\s\S]{0,80}rkhunter[\s\S]{0,80}chkrootkit'

composite_rules:
  - id: dotnet-kill-security-tools
    desc: .NET kills security tools
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-pkill-security-tools
      - id: dotnet-unix-av-tool-list
