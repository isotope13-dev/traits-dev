# Impact: EDR/Security Software Evasion
# Composite rules for terminating security processes
defaults:
  attack: T1562.001
  platforms: [windows]
  for: ["pe", "dll"]
composite_rules:
  # TerminateProcess + OpenProcess is common in benign process libraries.
  # Keep this objective-tier rule for samples that also target EDR/AV names.
  - id: terminate-process-evasion
    desc: EDR/antivirus termination capability
    crit: suspicious
    conf: 0.85
    mbc: "B0033"
    size_min: 8192
    size_max: 100000
    all:
      - id: objectives/impact/degrade/edr/teardown::edr-target-indicators
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/process/create/spawn::open-process
    downgrade:
      any:
        - id: metadata/package/quality/profile/
        - id: metadata/binary/resource::pe-resource-opaque-token
        - id: well-known/tool/reverse-engineering/windows-debugger/
        - id: well-known/tool/reverse-engineering/nanomite/
    unless:
      - id: well-known/tool/sysadmin/jvm/
  - id: process-termination-chain
    desc: Debugger query combined with process termination; intent requires context
    crit: suspicious
    conf: 0.80
    size_max: 200000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/dylib/load/runtime::load-library-a
    downgrade:
      any:
        - id: metadata/package/quality/profile/
        - id: well-known/tool/reverse-engineering/windows-debugger/
        - id: well-known/tool/reverse-engineering/nanomite/
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/script/
