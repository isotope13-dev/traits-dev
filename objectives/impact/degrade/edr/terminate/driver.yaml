defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1562.001

composite_rules:
  - id: driver-backed-process-termination
    desc: Driver-backed termination of another process
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/persistence/system/service/install::service-install-and-start
      - id: micro-behaviors/fs/file/handle::device-io-control-win
      - id: micro-behaviors/process/terminate/kill::kernel-terminate-process-reference
      - id: micro-behaviors/os/kernel/module::driver-image-reference
