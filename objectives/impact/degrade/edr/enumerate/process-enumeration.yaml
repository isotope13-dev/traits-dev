# Process enumeration for security product targeting
# Malware enumerates processes to identify and terminate AV/EDR products
composite_rules:
  - id: process-enumeration-terminate
    desc: Process enumeration with termination capability
    crit: notable
    conf: 0.85
    for: [pe, dll]
    platforms: [windows]
    attack: "T1057"
    mbc: "B0036"
    all:
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
      - id: micro-behaviors/process/enumerate/snapshot::process32-first
      - id: micro-behaviors/process/terminate/kill::terminate-process
    unless:
      - id: metadata/vendor/hex-rays::ida-pin-tracer-plugin
      - id: metadata/vendor/armnf::marker
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::shenzhen-goodix-technology-co.
    downgrade:
      any:
        - id: metadata/binary/installer/script::nsis
        - id: metadata/binary/installer/script::inno-setup
        - id: metadata/package/versioning::pe-version-resource
