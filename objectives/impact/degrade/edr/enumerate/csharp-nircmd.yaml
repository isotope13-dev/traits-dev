defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1562.001"
  mbc: "B0005"
traits:
  - id: wireshark-target
    desc: Wireshark process targeting
    crit: component
    conf: 0.95
    if:
      type: string_value
      word: "wireshark"
  - id: spybot-target
    desc: Spybot process targeting
    crit: component
    conf: 0.95
    if:
      type: string_value
      word: "spybot"
  - id: werfault-target
    desc: WerFault process targeting
    crit: component
    conf: 0.95
    if:
      type: string_value
      word: "werfault"
  - id: dw20-target
    desc: DW20 process targeting
    crit: component
    conf: 0.95
    if:
      type: string_value
      word: "dw20"
  - id: ntvdm-target
    desc: NTVDM process targeting
    crit: component
    conf: 0.9
    if:
      type: string_value
      word: "ntvdm"
  - id: adobearm-target
    desc: AdobeARM process targeting
    crit: component
    conf: 0.93
    if:
      type: string_value
      word: "AdobeARM"
  - id: qttask-target
    desc: qttask process targeting
    crit: component
    conf: 0.93
    if:
      type: string_value
      word: "qttask"
  - id: nerocheck-target
    desc: NeroCheck process targeting
    crit: component
    conf: 0.93
    if:
      type: string_value
      word: "NeroCheck"
  - id: jusched-target
    desc: jusched process targeting
    crit: component
    conf: 0.93
    if:
      type: string_value
      word: "jusched"
  - id: realsched-target
    desc: realsched process targeting
    crit: component
    conf: 0.93
    if:
      type: string_value
      word: "realsched"
composite_rules:
  - id: security-tool-targets
    desc: Multiple security tool targets
    crit: suspicious
    conf: 0.97
    needs: 2
    any:
      - id: wireshark-target
      - id: spybot-target
      - id: werfault-target
      - id: dw20-target
      - id: ntvdm-target
  - id: process-enumeration-terminate-source
    desc: Process enumeration with security tool killing
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/lolbin::process-enumeration-dotnet
      - id: micro-behaviors/process/create/spawn::terminate
      - id: security-tool-targets
  - id: updater-slot-targets
    desc: Multiple updater process targets
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: adobearm-target
      - id: qttask-target
      - id: nerocheck-target
      - id: objectives/persistence/login/startup/registry::unlocker-run-name
      - id: jusched-target
      - id: realsched-target
  - id: updater-slot-clearing
    desc: Process killing to clear updater names
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/lolbin::process-enumeration-dotnet
      - id: micro-behaviors/process/create/spawn::terminate
      - id: updater-slot-targets
