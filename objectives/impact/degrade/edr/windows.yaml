defaults:
  platforms: [windows]
  for: [binaries, scripts]
  attack: T1562.001
traits:
  - id: target-msdefender
    desc: Targets Microsoft Defender for termination
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)\bMsMpEng\.exe\b
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/vendor/microsoft::is-defender-named-2
  - id: target-sophos-edr
    desc: Targets Sophos EDR for termination
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)\bSophosEDR\.exe\b
  - id: target-sophos-clean
    desc: Targets Sophos Clean for termination
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)\bSophosClean\.exe\b
  - id: target-sophos-fs
    desc: Targets Sophos File Scanner for termination
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)\bSophosFS\.exe\b
  - id: target-crowdstrike-container
    desc: Targets CrowdStrike Falcon Container for termination
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)\bCSFalconContainer\.exe\b
  - id: target-crowdstrike-service
    desc: Targets CrowdStrike Falcon Service for termination
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)\bCSFalconService\.exe\b
  - id: target-general-edr
    desc: Targets common EDR/AV processes for termination
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)\b(SentinelAgent|SentinelMonitor|cb|RepMgt|cyserver|ccSvcHst|mcshield|pccntmon|CylanceSvc|xagt|TaniumClient|bdagent)\.exe\b
  - id: byovd-driver-handle
    desc: Reference to Warsaw PM driver handle
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: \\.\Warsaw_PM
  - id: byovd-driver-name
    desc: Reference to wsftprm.sys vulnerable driver
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: wsftprm.sys
  - id: byovd-driver-k7
    desc: Reference to K7 vulnerable driver
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: K7RKScan_1516.sys
  - id: byovd-driver-poisonx-name
    desc: Reference to PoisonX driver
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)\bPoisonX\d*\.sys\b
  - id: byovd-driver-poisonx-handle
    desc: Reference to PoisonX device handle
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: \\.\{F8284233-48F4-4680-ADDD-F8284233}
  - id: byovd-poisonx-ioctl
    desc: Reference to PoisonX IOCTL codes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)0x22E008|0x22E010
  - id: byovd-poisonkiller
    desc: Reference to PoisonKiller EDR termination tool
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)\bPoisonKiller\.exe\b
composite_rules:
  - id: byovd-indicators
    desc: Vulnerable driver indicators
    crit: component
    any:
      - id: byovd-driver-handle
      - id: byovd-driver-name
      - id: byovd-driver-k7
      - id: byovd-driver-poisonx-name
      - id: byovd-driver-poisonx-handle
      - id: byovd-poisonx-ioctl
      - id: byovd-poisonkiller
  - id: edr-target-indicators
    desc: EDR process target indicators
    crit: component
    any:
      - id: target-msdefender
      - id: target-sophos-edr
      - id: target-sophos-clean
      - id: target-sophos-fs
      - id: target-crowdstrike-container
      - id: target-crowdstrike-service
      - id: target-general-edr
  - id: edr-killer-behavior
    desc: EDR/AV killing behavior via BYOVD driver
    crit: hostile
    conf: 0.98
    all:
      - id: byovd-indicators
      - id: edr-target-indicators
