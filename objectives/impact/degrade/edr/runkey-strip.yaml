# Strip AV Run-key entries (Windows)
# Malware deletes AV autostart entries so security tooling no longer
# starts with the user session. Aggressive disable, not indicator removal.
# ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
defaults:
  platforms: [windows]
  for: [powershell, batch]
  attack: T1562.001
  mbc: F0004
traits:
  - id: remove-itemproperty-run-key
    desc: Remove-ItemProperty on a Run key
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (?i)Remove-ItemProperty\b[^\n]{0,160}(HKLM|HKCU)[:\\][^\n]{0,200}\\CurrentVersion\\Run
  - id: reg-delete-run-key
    desc: reg.exe delete on a Run key
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: (?i)reg(\.exe)?\s+delete\b[^\n]{0,160}\\CurrentVersion\\Run
  - id: av-runkey-name-list
    desc: AV product name in Run-key value list
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (?i)(Malwarebytes\s*TrayApp|KasperskyLauncher|McAfeeSecurityUpdateCheck|MBAMService|avguard|AvastUI|ESETSysInspector|egui)
composite_rules:
  - id: av-run-key-strip
    desc: Strip AV entries from Run key
    crit: hostile
    conf: 0.96
    all:
      - id: av-runkey-name-list
    any:
      - id: remove-itemproperty-run-key
      - id: reg-delete-run-key
