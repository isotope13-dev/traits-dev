defaults:
  platforms: [windows]
  for: [pe]
  attack: T1562.001

traits:
  - id: suspend-cli-usage-banner
    desc: Suspend exe usage banner string
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Usage:\s*\w+\.exe\s+<suspend\|resume>'

  - id: suspended-process-pid-msg
    desc: Suspended process PID status message
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'Suspended process PID:'

  - id: resumed-process-pid-msg
    desc: Resumed process PID status message
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'Resumed process PID:'

composite_rules:
  - id: nt-process-suspender-cli
    desc: NT process suspender CLI helper utility
    crit: suspicious
    conf: 0.92
    size_max: 4194304
    all:
      - id: micro-behaviors/process/control/signal::nt-suspend-resume-runtime
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity::pe-signature-verified

  - id: suspend-resume-cli-banner-utility
    desc: suspend resume CLI banner utility build
    crit: hostile
    conf: 0.97
    size_max: 4194304
    all:
      - id: micro-behaviors/process/control/signal::nt-suspend-resume-runtime
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
    any:
      - id: suspend-cli-usage-banner
      - id: suspended-process-pid-msg
      - id: resumed-process-pid-msg
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity::pe-signature-verified

  - id: suspender-cli-banner-set
    desc: Suspender CLI banner string set
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: suspend-cli-usage-banner
      - id: suspended-process-pid-msg
      - id: resumed-process-pid-msg
