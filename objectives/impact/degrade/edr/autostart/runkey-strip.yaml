# Strip AV Run-key entries (Windows)
# Malware deletes AV autostart entries so security tooling no longer
# starts with the user session. Aggressive disable, not indicator removal.
# ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
defaults:
  platforms: [windows]
  for: [powershell, batch]
  attack: T1562.001
  mbc: F0004
traits:
- id: av-runkey-name-list--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)(Malwarebytes\s*TrayApp|KasperskyLauncher)
  count_max: 1004566
- id: av-runkey-name-list--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)(McAfeeSecurityUpdateCheck|MBAMService)
  count_max: 1004567
- id: av-runkey-name-list--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)(avguard|AvastUI)
  count_max: 1004568
- id: av-runkey-name-list--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)(ESETSysInspector|egui)
  count_max: 1004569
composite_rules:
- id: av-run-key-strip
  desc: Strip AV entries from Run key
  crit: hostile
  conf: 0.96
  all:
  - id: av-runkey-name-list
  any:
  - id: micro-behaviors/os/registry/delete::remove-itemproperty-run-key
  - id: micro-behaviors/os/registry/delete::reg-delete-run-key
- id: av-runkey-name-list
  desc: AV product name in Run-key value list
  crit: component
  conf: 0.85
  any:
  - id: av-runkey-name-list--rx-1
  - id: av-runkey-name-list--rx-2
  - id: av-runkey-name-list--rx-3
  - id: av-runkey-name-list--rx-4
