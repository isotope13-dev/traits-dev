defaults:
  platforms:
  - windows
  - unix
  - android
  attack: T1562.001
  for:
  - pe
  - elf
traits:
- id: qihoo-360-safe--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.6
  if:
    type: text
    regex: (?i)360(safe|sd|tray)
  count_max: 1004506
- id: qihoo-360-safe--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.6
  if:
    type: text
    substr: ZhuDongFangYu.exe
  count_max: 1004507
- id: qihoo-360-safe--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.6
  if:
    type: text
    substr: 360rps.exe
  count_max: 1004508
- id: qihoo-360-process
  desc: Qihoo 360 process names
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: (?i)360(se|chrome|rp)\.exe
- id: tencent-security
  desc: Tencent PC Manager reference
  crit: component
  conf: 0.6
  if:
    type: text
    regex: (?i)(qqpctray|qqpcmgr|tav\.exe)
- id: baidu-security
  desc: Baidu Antivirus reference
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: (?i)(baidusd|bddownloader|bdmserv)
- id: kingsoft-name--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.6
  if:
    type: text
    regex: (?i)kingsoft[ _-]?(antivirus|internet[ _-]?security)
  count_max: 1004512
- id: kingsoft-name--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.6
  if:
    type: text
    regex: (?i)kingsoft[ _-]?(av|guard)
  count_max: 1004513
- id: kingsoft-name--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.6
  if:
    type: text
    regex: (?i)kingsoft[ _-]?(defender)
  count_max: 1004514
- id: kingsoft-kxe
  desc: Kingsoft KXE process reference
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: (?i)kxe(tray|scan|serv)
- id: duba-av
  desc: Duba Antivirus reference
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: (?i)\b(duba(antivirus|security)|duba\.exe)\b
  unless:
  - id: metadata/package/quality/context/
- id: rising-av
  desc: Rising Antivirus reference
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: (?i)rav(mon|task|tray)\.exe
- id: huorong-security
  desc: Huorong Security reference
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: (?i)(huorong|hipstray)
composite_rules:
- id: qihoo-360
  desc: Qihoo 360 security product
  crit: notable
  conf: 0.7
  any:
  - id: qihoo-360-safe
  - id: qihoo-360-process
- id: kingsoft-security
  desc: Kingsoft security product
  crit: notable
  conf: 0.7
  any:
  - id: kingsoft-name
  - id: kingsoft-kxe
  - id: duba-av
- id: chinese-av-product
  desc: Chinese AV/security product reference
  crit: notable
  conf: 0.7
  any:
  - id: qihoo-360
  - id: tencent-security
  - id: baidu-security
- id: chinese-av-product-extended
  desc: Chinese AV (extended coverage)
  crit: notable
  conf: 0.7
  any:
  - id: chinese-av-product
  - id: kingsoft-security
  - id: rising-av
- id: chinese-av-kill
  desc: Chinese AV process termination
  crit: suspicious
  conf: 0.9
  all:
  - id: chinese-av-product-extended
  - id: objectives/impact/degrade/edr/targeting::termination-verbs
  downgrade:
    any:
    - id: metadata/binary/metrics/size::massive-executable
- id: chinese-av-process-hunt
  desc: Enumerates and terminates Chinese AV processes
  crit: suspicious
  conf: 0.9
  for: [pe, dll]
  platforms: [windows]
  all:
  - id: chinese-av-product-extended
  - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
  - id: micro-behaviors/process/terminate/kill::terminate-process
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/metrics/size::massive-executable
- id: qihoo-360-safe
  desc: Qihoo 360 Safe reference
  crit: notable
  conf: 0.6
  any:
  - id: qihoo-360-safe--rx-1
  - id: qihoo-360-safe--rx-2
  - id: qihoo-360-safe--rx-3
- id: kingsoft-name
  desc: Kingsoft Antivirus reference
  crit: component
  conf: 0.6
  any:
  - id: kingsoft-name--rx-4
  - id: kingsoft-name--rx-5
  - id: kingsoft-name--rx-6
  not:
  - substr: Kingsoft-Phonetic
  - substr: KingsoftPhonetic
  - substr: KingsoftPhoneticPlain
