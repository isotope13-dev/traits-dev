defaults:
  platforms:
    - unix
    - windows
  attack: T1562.001
traits:
  - id: stopservice-verb
    desc: StopService command verb
    crit: component
    conf: 0.9
    for:
      - pe
      - shell
    if:
      type: text
      regex: (?i)\bstop-?service\b
  - id: terminate-keyword
    desc: terminate in process context
    crit: notable
    conf: 0.4
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)\b(terminate[_-]?(service|task))\b
      section: .text
    unless:
      - id: metadata/binary/resource/
  - id: defender-name
    desc: Windows Defender reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)\b(windows|microsoft)[ _-]+defender\b|\bdefender antivirus\b
  - id: malwarebytes-name
    desc: Malwarebytes reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      substr: malwarebytes
      case_insensitive: true
  - id: kaspersky-name
    desc: Kaspersky reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      substr: kaspersky
      case_insensitive: true
    unless:
      - id: metadata/file/profile/identity::static-html-shell
  - id: bitdefender-name
    desc: Bitdefender reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      word: bitdefender
      case_insensitive: true
      section: .text
    unless:
      - type: text
        substr: bitdefender srl
      - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
  - id: bitdefender-service-host
    desc: Bitdefender service host process name
    crit: notable
    conf: 0.9
    for: [pe, dll]
    if:
      type: text
      regex: (?i)bdservicehost\.exe
  - id: avast-service-bin
    desc: Avast service reference (binaries)
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)avast(svc|ui|setup|\.exe)
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
  - id: avast-service-other
    desc: Avast service reference (terms)
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)avast(antivirus|software|service)
  - id: avast-path
    desc: Avast installation path
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)(program files|avast software).{0,50}avast
  - id: norton-name
    desc: Norton reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      substr: norton
      case_insensitive: true
    not:
      - substr: NortonLifeLock Ireland Limited
  - id: mcafee-name
    desc: McAfee reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      substr: mcafee
      case_insensitive: true
  - id: sophos-name
    desc: Sophos reference
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      substr: sophos
      case_insensitive: true
    unless:
      - id: metadata/file/profile/identity::static-html-shell
    not:
      - substr: LSOPHOS-AS-NA
  - id: eset-lower
    desc: eset reference (lowercase)
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      word: eset
  - id: eset-upper
    desc: ESET reference (uppercase brand name)
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    if:
      type: text
      word: ESET
composite_rules:
  - id: avast-service
    desc: Avast service reference
    crit: notable
    conf: 0.7
    any:
      - id: avast-service-bin
      - id: avast-service-other
  - id: edr-product-name
    desc: EDR/Antivirus product name reference
    crit: notable
    conf: 0.8
    for: [scripts, binaries]
    any:
      - id: defender-name
      - id: malwarebytes-name
      - id: kaspersky-name
      - id: bitdefender-name
      - id: bitdefender-service-host
      - id: avast-service
      - id: avast-path
      - id: norton-name
      - id: mcafee-name
      - id: sophos-name
      - id: eset-lower
      - id: eset-upper
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/resource/
        - id: metadata/binary/metrics/size::massive-executable
        - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
  - id: security-product-process-target
    desc: Named security-product process target
    crit: notable
    conf: 0.9
    for: [pe, dll]
    any:
      - id: bitdefender-service-host
      - id: objectives/impact/degrade/edr/targeting::qihoo-360-safe
      - id: objectives/impact/degrade/edr/targeting::windows-defender-target
      - id: objectives/impact/degrade/edr/targeting::kaspersky-target
      - id: objectives/impact/degrade/edr/targeting::mcafee-target
  - id: security-process-debug-inject
    desc: Debug-privilege injection into security processes
    crit: hostile
    conf: 0.96
    for: [pe, dll]
    mbc: B0005
    attack: T1562.001,T1055
    all:
      - id: security-product-process-target
      - id: micro-behaviors/os/privilege/token::high-risk-privilege-name
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges-any
    any:
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
      - id: objectives/evasion/process/injection/toolkit::poolparty-toolkit
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    needs: 2
    unless:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/binary/vendor::bitdefender-product-marker
  - id: termination-verbs
    desc: Process termination indicator
    crit: component
    conf: 0.5
    for: [scripts, binaries]
    any:
      - id: micro-behaviors/process/terminate/signal::kill
      - id: terminate-keyword
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/app/kilocode::kilo-code-native-runtime
      - id: well-known/tool/reverse-engineering/frida/
      - id: well-known/tool/sysadmin/alpine-packages::alpine-filebrowser-binary
  - id: kill-comp
    desc: EDR process termination
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    all:
      - id: terminate-keyword
      - id: edr-product-name
    downgrade:
      any:
        - id: metadata/binary/metrics/size::massive-executable
  - id: stopper
    desc: EDR/Antivirus service stopper
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    all:
      - id: stopservice-verb
    any:
      - id: defender-name
      - id: malwarebytes-name
      - id: kaspersky-name
      - id: bitdefender-name
      - id: avast-service
      - id: avast-path
      - id: norton-name
      - id: mcafee-name
      - id: sophos-name
      - id: eset-lower
      - id: eset-upper
    needs: 1
    near_bytes: 120
  - id: bypass-detected
    desc: EDR/Antivirus bypass attempt
    crit: suspicious
    conf: 0.95
    mbc: F0004
    for: [scripts, binaries]
    any:
      - id: stopper
      - id: kill-comp
    all:
      - id: edr-product-name
    downgrade:
      any:
        - id: metadata/binary/vendor::is-microsoft-named
        - id: well-known/app/defender/
        - id: metadata/signed/platform/
        - id: metadata/binary/metrics/size::massive-executable
