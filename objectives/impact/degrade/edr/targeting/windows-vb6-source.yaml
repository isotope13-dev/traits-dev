defaults:
  platforms: [windows]
  for: [vbs]
traits:
  - id: av-name-fragments-vb6
    desc: AV process fragment targeting
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: '"avp"\)\s+Or.+?"kav"\)\s+Or.+?"nav"\)\s+Or.+?"scan"'
  - id: security-name-fragments-vb6
    desc: Security process fragment targeting
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: '"anti"\)\s+Or.+?"alert"\)\s+Or.+?"mon"\)\s+Or.+?"check"'
composite_rules:
  - id: security-process-kill-loop-vb6
    desc: VB6 security process kill loop
    crit: hostile
    conf: 0.99
    attack: T1562.001
    all:
      - id: micro-behaviors/process/terminate/kill::toolhelp-kill-loop-vb6
    any:
      - id: av-name-fragments-vb6
      - id: security-name-fragments-vb6
