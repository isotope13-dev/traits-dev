defaults:
  platforms:
    - windows
  for:
    - pe
  attack: T1562.001
traits:
  - id: windows-defender-target
    desc: Windows Defender process name
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (^MsMpEng$|^WinDefend$|msseces\.exe)
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: kaspersky-target
    desc: Kaspersky process name
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (avp\.exe|klnagent|avpui\.exe)
  - id: mcafee-target
    desc: McAfee process name
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (mcshield\.exe|mcafee\.exe|naPrdMgr\.exe)
composite_rules:
  - id: av-product-process-hunt
    desc: Enumerates processes to locate AV/EDR
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
    any:
      - id: windows-defender-target
      - id: kaspersky-target
      - id: mcafee-target
    downgrade:
      any:
        - id: metadata/signed/platform/
  - id: av-product-killer
    desc: Explicitly targets specific AV/EDR products for termination
    crit: hostile
    conf: 0.95
    mbc: B0005
    all:
      - id: micro-behaviors/process/terminate/
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
    any:
      - id: windows-defender-target
      - id: kaspersky-target
      - id: mcafee-target
    downgrade:
      any:
        - id: metadata/signed/platform/
