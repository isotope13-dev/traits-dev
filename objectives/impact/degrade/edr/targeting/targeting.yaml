defaults:
  platforms:
    - windows
  for:
    - pe
  attack: T1562.001
traits:
  - id: security-product-name-cluster-a
    desc: Multiple major security-product names
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\b(bitdefender|mcafee|norton|kaspersky|sophos)\b'
    count_min: 2
    unless:
      - id: metadata/signed/platform/

  - id: security-product-name-cluster-b
    desc: Multiple security-product names
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\b(avast|eset|zonealarm|panda|antivir)\b'
    count_min: 2
    unless:
      - id: metadata/signed/platform/

  - id: windows-defender-target
    desc: Windows Defender process name
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (^MsMpEng$|^WinDefend$|msseces\.exe)
    unless:
      - id: metadata/signed/platform::microsoft-windows
  - id: kaspersky-target
    desc: Kaspersky process name
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (avp\.exe|klnagent|avpui\.exe)
  - id: mcafee-target
    desc: McAfee process name
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (mcshield\.exe|mcafee\.exe|naPrdMgr\.exe)
composite_rules:
  - id: security-product-name-cluster
    desc: Cluster of security-product names
    crit: suspicious
    conf: 0.97
    all:
      - id: security-product-name-cluster-a
      - id: security-product-name-cluster-b
  - id: av-product-process-hunt
    desc: Enumerates processes to locate AV/EDR
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
    any:
      - id: windows-defender-target
      - id: kaspersky-target
      - id: mcafee-target
    downgrade:
      any:
        - id: metadata/signed/platform/
  - id: av-product-killer
    desc: Explicitly targets specific AV/EDR products for termination
    crit: hostile
    conf: 0.95
    mbc: B0005
    all:
      - id: micro-behaviors/process/terminate/
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
    any:
      - id: windows-defender-target
      - id: kaspersky-target
      - id: mcafee-target
    downgrade:
      any:
      - id: metadata/signed/platform/
  - id: av-process-hunt-and-termination
    desc: Enumerates and terminates security-product processes
    crit: hostile
    conf: 0.98
    mbc: B0005
    all:
      - id: security-product-name-cluster
      - id: micro-behaviors/process/terminate/kill::terminate-process
    downgrade:
      any:
        - id: metadata/signed/platform/
