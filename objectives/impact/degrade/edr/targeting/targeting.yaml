defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: windows-defender-target
    desc: Windows Defender/Security Essentials specifically targeted
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (^MsMpEng$|^WinDefend$|msseces\.exe)
    unless:
      - id: metadata/signed/platform::microsoft-windows
    attack: T1562.001
  - id: kaspersky-target
    desc: Kaspersky AV/Internet Security specifically targeted
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (avp\.exe|klnagent|avpui\.exe)
    attack: T1562.001
  - id: mcafee-target
    desc: McAfee AV specifically targeted
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (mcshield\.exe|mcafee\.exe|naPrdMgr\.exe)
    attack: T1562.001
composite_rules:
  - id: process-enumeration
    desc: Process enumeration capability (for targeting)
    crit: component
    conf: 0.8
    mbc: C0003
    all:
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
      - id: micro-behaviors/process/enumerate/snapshot::process32-first
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::shenzhen-goodix-technology-co.
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: av-product-process-hunt
    desc: Enumerates processes to locate AV/EDR
    crit: suspicious
    conf: 0.93
    attack: T1562.001
    all:
      - id: process-enumeration
    any:
      - id: windows-defender-target
      - id: kaspersky-target
      - id: mcafee-target
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: av-product-killer
    desc: Explicitly targets specific AV/EDR products for termination
    crit: hostile
    conf: 0.95
    attack: T1562.001
    mbc: B0005
    all:
      - id: micro-behaviors/process/terminate/
      - id: process-enumeration
    any:
      - id: windows-defender-target
      - id: kaspersky-target
      - id: mcafee-target
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
