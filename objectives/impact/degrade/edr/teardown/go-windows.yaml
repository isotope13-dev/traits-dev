defaults:
  platforms: [windows]
  for: [go]
  attack: T1562.001

traits:
  - id: go-target-windefend-service
    desc: Go targets WinDefend service
    crit: component
    conf: 0.95
    if:
      type: literal
      exact: WinDefend

  - id: go-target-windows-update-service
    desc: Go targets Windows Update service
    crit: component
    conf: 0.9
    if:
      type: literal
      exact: wuauserv

composite_rules:
  - id: go-windefend-service-stop
    desc: Go stops WinDefend service
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/service/control::go-service-stop-control
      - id: go-target-windefend-service

  - id: go-security-service-teardown
    desc: Go service security teardown
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/service/control::go-service-stop-control
    any:
      - id: go-target-windefend-service
      - id: go-target-windows-update-service
    needs: 2
