defaults:
  platforms: [windows]
  for: [java, class, java_class, jar]
  attack: T1562.001

traits:
  - id: java-defender-policy-disable
    desc: Java disables Defender policy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Windows Defender[\s\S]{0,260}DisableAnti(Virus|Spyware)'

  - id: java-windefend-stop
    desc: Java stops WinDefend service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'net[\s\S]{0,80}stop[\s\S]{0,80}WinDefend'

  - id: java-taskkill-force-pid
    desc: Java taskkill force PID
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'taskkill[\s\S]{0,120}/F[\s\S]{0,120}/PID'

  - id: java-defender-target
    desc: Java Defender target
    crit: notable
    conf: 0.86
    if:
      type: text
      word: defender

  - id: java-antimalware-target
    desc: Java antimalware target
    crit: notable
    conf: 0.86
    if:
      type: text
      word: antimalware

  - id: java-firewall-target
    desc: Java firewall target
    crit: notable
    conf: 0.84
    if:
      type: text
      word: firewall

  - id: java-snort-target
    desc: Java Snort target
    crit: notable
    conf: 0.88
    if:
      type: text
      word: snort

  - id: java-auditpol-disable
    desc: Java disables process auditing
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'auditpol[\s\S]{0,180}Process Creation[\s\S]{0,180}disabled'

composite_rules:
  - id: java-defender-service-disable
    desc: Java disables Defender service
    crit: hostile
    conf: 0.98
    all:
      - id: java-defender-policy-disable
      - id: java-windefend-stop

  - id: java-security-tool-kill-loop
    desc: Java security tool kill loop
    crit: hostile
    conf: 0.98
    all:
      - id: java-taskkill-force-pid
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode-symbol
    any:
      - id: java-defender-target
      - id: java-antimalware-target
      - id: java-firewall-target
      - id: micro-behaviors/communications/capture/wireshark::wireshark
      - id: objectives/anti-analysis/sandbox-detect/tool-references::procmon
      - id: java-snort-target
    for: [class, java_class, jar]

  - id: java-security-tool-kill-source
    desc: Java security tool kill source
    crit: hostile
    conf: 0.98
    for: [java]
    all:
      - id: java-taskkill-force-pid
      - id: micro-behaviors/process/create/spawn::java-processbuilder-source
    any:
      - id: java-defender-target
      - id: java-antimalware-target
      - id: java-firewall-target
      - id: micro-behaviors/communications/capture/wireshark::wireshark
      - id: objectives/anti-analysis/sandbox-detect/tool-references::procmon
      - id: java-snort-target
