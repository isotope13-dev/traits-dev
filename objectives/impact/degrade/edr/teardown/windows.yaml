defaults:
  platforms: [windows]
  for: [binaries, scripts, c, cpp]
  attack: T1562.001
traits:
- id: taskkill-security-health-ui-hex
  desc: Kills Windows Security UI
  crit: suspicious
  conf: 0.97
  for: [data, pe, batch, powershell, javascript]
  if:
    type: text
    regex: '(?i)7461736b6b696c6c202f46202f494d20.{0,160}5365634865616c746855492e657865'
- id: target-msdefender
  desc: Targets Microsoft Defender for termination
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\bMsMpEng\.exe\b
  unless:
  - id: metadata/signed/platform::microsoft-windows
  - id: well-known/app/defender::is-defender-named-2
- id: target-windefend-service
  desc: Targets WinDefend service
  crit: component
  conf: 0.95
  for: [c, cpp]
  if:
    type: text
    word: WinDefend
- id: defender-signature-updates-key
  desc: "References Defender sig updates registry key"
  crit: component
  conf: 0.97
  for: [c, cpp]
  if:
    type: text
    substr: SOFTWARE\\Microsoft\\Windows Defender\\Signature Updates
- id: defender-product-appdata-path
  desc: Reads Defender ProductAppDataPath value
  crit: component
  conf: 0.96
  for: [c, cpp]
  if:
    type: text
    word: ProductAppDataPath
- id: defender-signature-location
  desc: Reads Defender SignatureLocation value
  crit: component
  conf: 0.96
  for: [c, cpp]
  if:
    type: text
    word: SignatureLocation
- id: defender-backup-mpavbase-lkg
  desc: References Defender backup mpavbase.lkg
  crit: component
  conf: 0.98
  for: [c, cpp]
  if:
    type: text
    substr: \\Backup\\mpavbase.lkg
- id: defender-backup-mpavbase-vdm
  desc: References Defender backup mpavbase.vdm
  crit: component
  conf: 0.98
  for: [c, cpp]
  if:
    type: text
    substr: \\Backup\\mpavbase.vdm
- id: mrt-nt-directory-path
  desc: References MRT directory via NT path
  crit: component
  conf: 0.98
  for: [c, cpp]
  if:
    type: text
    substr: \\??\\C:\\Windows\\System32\\MRT
- id: target-sophos-edr
  desc: Targets Sophos EDR for termination
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (?i)\bSophosEDR\.exe\b
- id: target-sophos-clean
  desc: Targets Sophos Clean for termination
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (?i)\bSophosClean\.exe\b
- id: target-sophos-fs
  desc: Targets Sophos File Scanner for termination
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (?i)\bSophosFS\.exe\b
- id: target-crowdstrike-container
  desc: 'target crowdstrike container'
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: (?i)\bCSFalconContainer\.exe\b
- id: target-crowdstrike-service
  desc: "Targets CrowdStrike Falcon Service termination"
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: (?i)\bCSFalconService(\.exe)?\b
- id: target-general-edr--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\b(SentinelAgent|SentinelMonitor)(\.exe)?\b
  count_max: 1004478
- id: target-general-edr--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\b(cb|RepMgt)\.exe\b
  count_max: 1004479
- id: target-general-edr--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\b(cyserver|ccSvcHst)\.exe\b
  count_max: 1004480
- id: target-general-edr--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\b(mcshield|pccntmon)\.exe\b
  count_max: 1004481
- id: target-general-edr--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\b(CylanceSvc|xagt)\.exe\b
  count_max: 1004482
- id: target-general-edr--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\b(TaniumClient|bdagent)\.exe\b
  count_max: 1004483
- id: byovd-driver-handle
  desc: Opens Warsaw PM driver device
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(\\\\\.\\Warsaw_PM|\\\\\\\\\.\\\\Warsaw_PM)'
- id: byovd-driver-name
  desc: References vulnerable Topaz driver
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: wsftprm.sys
  unless:
    - id: metadata/package/quality/source::security-tracker-cve-leaf
- id: byovd-topaz-terminate-ioctl
  desc: Topaz driver process kill IOCTL
  crit: component
  conf: 0.94
  if:
    type: text
    regex: (?i)\b(0x22201C|22201Ch)\b
- id: byovd-driver-k7
  desc: Reference to K7 vulnerable driver
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: K7RKScan_1516.sys
- id: byovd-driver-poisonx-name
  desc: Reference to PoisonX driver
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: (?i)\bPoisonX\d*\.sys\b
- id: byovd-driver-poisonx-handle
  desc: Reference to PoisonX device handle
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: \\.\{F8284233-48F4-4680-ADDD-F8284233}
- id: byovd-poisonx-ioctl
  desc: PoisonX IOCTL code in native code
  crit: suspicious
  conf: 0.9
  # These values are ordinary hexadecimal constants in JavaScript libraries;
  # BYOVD interpretation requires native driver-facing code or an executable.
  for: [c, cpp, csharp, pe]
  if:
    type: text
    regex: (?i)0x22E008|0x22E010
- id: byovd-poisonkiller
  desc: Reference to PoisonKiller EDR termination tool
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: (?i)\bPoisonKiller\.exe\b
- id: bcdedit-safeboot-minimal
  desc: Forces Windows Safe Mode boot
  crit: suspicious
  conf: 0.95
  unless:
  - id: metadata/file/string/identity::windows-safe-mode-toggle-script
  if:
    type: text
    regex: '(?i)\bbcdedit(\.exe)?\s+/set\s+\{current\}\s+safeboot\s+minimal\b'
- id: bcdedit-clear-safeboot
  desc: Clears Windows Safe Mode boot
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(?i)\bbcdedit(\.exe)?\s+/deletevalue\s+\{current\}\s+safeboot\b'
- id: remoteadmin-edr-cleanup-task
  desc: RemoteAdmin EDR cleanup task
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: RemoteAdminEdrCleanup
- id: edr-cleanup-text
  desc: EDR cleanup text
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(?i)\bEDR\s*cleanup\b'
- id: security-process-kill-marker
  desc: Explicit security-process termination message
  crit: suspicious
  conf: 0.99
  if:
    type: text
    regex: '(?i)\bKilling\s+(security|EAC)\s+processes\b'
# Named and described for what it actually matches: a generic "stopped/disabled
# service" message, with no security-product context in the pattern. The EDR
# meaning comes from the security-process-and-service-teardown composite below,
# which also requires the properly-anchored security-process-kill-marker
# ("Killing security processes") and a real service-stop call. Standalone this
# is ordinary service-management English — it fired on the stock Microsoft
# System.ServiceProcess.ServiceController.dll bundled in self-contained .NET
# apps, and would equally hit any third-party service wrapper or installer, so
# it is a notable building block rather than a suspicious finding of its own.
- id: service-stopped-or-disabled-message
  desc: Service stopped or disabled message
  crit: notable
  conf: 0.99
  if:
    type: text
    regex: '(?i)\b(Stopped|Disabled)\s+service\b'
  # The .NET ServiceController assembly documents ordinary stopped services;
  # its Microsoft signature is not an EDR teardown indicator.
  unless:
  - id: metadata/signed/leaf::microsoft-corporation
- id: safeboot-minimal-network-path
  desc: SafeBoot Minimal or Network path
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)SafeBoot[\\/]+(Minimal|Network)'
- id: safeboot-edr-vendor--rx-1
  desc: SafeBoot cleanup targets major EDR vendor
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)(CrowdStrike|SentinelOne|Carbon\s*Black)'
- id: safeboot-edr-vendor--rx-2
  desc: SafeBoot cleanup targets major EDR vendor
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)(Cylance|Sophos|Malwarebytes)'
- id: safeboot-edr-vendor--rx-3
  desc: SafeBoot cleanup targets major EDR vendor
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)(Bitdefender|Kaspersky|\bESET\b)'
- id: safeboot-edr-vendor--rx-4
  desc: SafeBoot cleanup targets major EDR vendor
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)(Trend\s*Micro|Cybereason|Cortex)'
composite_rules:
- id: hidden-security-health-ui-kill
  desc: Hidden Windows Security UI kill
  crit: hostile
  conf: 0.98
  for: [data, pe, batch, powershell, javascript]
  all:
  - id: taskkill-security-health-ui-hex
  - id: micro-behaviors/process/create/hidden::encodedcommand-flag-raw
  any:
  - id: micro-behaviors/os/security/defender::defender-exclusion-command
  - id: micro-behaviors/os/privilege/check::net-session-admin-check-hex
- id: byovd-indicators
  desc: Vulnerable driver indicators
  crit: component
  any:
  - id: byovd-driver-handle
  - id: byovd-driver-name
  - id: byovd-driver-k7
  - id: byovd-driver-poisonx-name
  - id: byovd-driver-poisonx-handle
  - id: byovd-poisonx-ioctl
  - id: byovd-poisonkiller
  - id: byovd-topaz-terminate-ioctl
- id: byovd-device-control
  desc: BYOVD driver IOCTL control
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/fs/file/handle::device-io-control-win
  any:
  - id: byovd-topaz-terminate-ioctl
  - id: byovd-poisonx-ioctl
- id: edr-target-indicators
  desc: EDR process target indicators
  crit: component
  any:
  - id: target-msdefender
  - id: target-sophos-edr
  - id: target-sophos-clean
  - id: target-sophos-fs
  - id: target-crowdstrike-container
  - id: target-crowdstrike-service
  - id: target-general-edr
  - id: objectives/evasion/anti-av/platform/defender::dotnet-defender-suppression-cluster
- id: source-defender-process-lookup
  desc: Source locates Defender process ID
  crit: suspicious
  conf: 0.94
  all:
  - id: target-msdefender
  - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-source
- id: defender-definition-targeting
  desc: Targets Defender signature definition store
  crit: suspicious
  conf: 0.98
  for: [c, cpp]
  needs: 3
  any:
  - id: target-windefend-service
  - id: defender-signature-updates-key
  - id: defender-product-appdata-path
  - id: defender-signature-location
  - id: defender-backup-mpavbase-lkg
  - id: defender-backup-mpavbase-vdm
- id: defender-definition-lock-sabotage
  desc: Locks Defender definition files to block updates
  crit: hostile
  conf: 0.99
  for: [c, cpp]
  all:
  - id: defender-definition-targeting
  - id: micro-behaviors/fs/file/open::nt-create-file
  - id: micro-behaviors/fs/lock/byte-range::exclusive-lockfileex
  any:
  - id: micro-behaviors/fs/watch/monitor::read-directory-changes-w
  - id: micro-behaviors/os/service/control::notify-service-status-change
- id: mrt-update-lock-sabotage
  desc: Watches MRT updates then locks modified files
  crit: hostile
  conf: 0.98
  for: [c, cpp]
  all:
  - id: mrt-nt-directory-path
  - id: micro-behaviors/fs/watch/monitor::read-directory-changes-w
  - id: micro-behaviors/fs/file/open::nt-create-file
  - id: micro-behaviors/fs/lock/byte-range::lock-file
- id: topaz-defender-kill-flow
  desc: Topaz driver kills Defender process
  crit: hostile
  conf: 0.99
  all:
  - id: target-msdefender
  - id: byovd-driver-handle
  - id: byovd-topaz-terminate-ioctl
  - id: byovd-device-control
  any:
  - id: source-defender-process-lookup
  - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
- id: edr-killer-behavior
  desc: EDR/AV killing behavior via BYOVD driver
  crit: hostile
  conf: 0.98
  all:
  - id: byovd-indicators
  - id: edr-target-indicators
  unless:
  - id: metadata/package/quality/source::security-tracker-cve-list
  - id: metadata/package/quality/source::security-tracker-cve-leaf
- id: security-process-and-service-teardown
  desc: Terminates security processes and disables their services
  crit: hostile
  conf: 0.99
  all:
  - id: security-process-kill-marker
  - id: service-stopped-or-disabled-message
  - id: micro-behaviors/os/service/control::service-stop-control
- id: target-general-edr
  desc: Common EDR/AV process name
  crit: component
  conf: 0.9
  any:
  - id: target-general-edr--rx-1
  - id: target-general-edr--rx-2
  - id: target-general-edr--rx-3
  - id: target-general-edr--rx-4
  - id: target-general-edr--rx-5
  - id: target-general-edr--rx-6
- id: safeboot-edr-vendor
  desc: SafeBoot cleanup EDR vendor reference
  crit: component
  conf: 0.9
  any:
  - id: safeboot-edr-vendor--rx-1
  - id: safeboot-edr-vendor--rx-2
  - id: safeboot-edr-vendor--rx-3
  - id: safeboot-edr-vendor--rx-4
- id: safeboot-edr-cleanup-task
  desc: SafeBoot EDR cleanup task
  crit: suspicious
  conf: 0.95
  near_bytes: 256
  all:
  - id: safeboot-minimal-network-path
  - id: safeboot-edr-vendor
- id: safe-mode-edr-cleanup-task
  desc: Safe Mode EDR cleanup task
  crit: suspicious
  conf: 0.95
  any:
  - id: remoteadmin-edr-cleanup-task
  - id: edr-cleanup-text
  - id: safeboot-edr-cleanup-task
- id: safe-mode-edr-teardown
  desc: Safe Mode EDR teardown
  crit: hostile
  conf: 0.98
  all:
  - id: bcdedit-safeboot-minimal
  - id: safe-mode-edr-cleanup-task
  any:
  - id: target-general-edr
  - id: target-sophos-edr
  - id: target-crowdstrike-service
  - id: target-general-edr--rx-4
  - id: target-general-edr--rx-5
  - id: target-general-edr--rx-6
- id: service-control-edr-teardown
  desc: Controls and deletes services alongside EDR names
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/impact/degrade/edr/targeting::edr-product-name
  - id: micro-behaviors/os/service/control::change-service-config
  any:
  - id: micro-behaviors/os/service/control::control-service
  - id: micro-behaviors/os/service/control::delete-service
