defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1562.001
  mbc: B0005

traits:
  - id: encoded-security-process-microsoft-core
    desc: Encoded Microsoft security processes
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(mssense|securityhealthservice)\.exe\b'
  - id: encoded-security-process-microsoft-ui
    desc: Encoded Microsoft security UI processes
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(securityhealthsystray|securityhealthhost)\.exe\b'
  - id: encoded-security-process-defender
    desc: Encoded Defender security processes
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(smartscreen|nissrv)\.exe\b'
  - id: encoded-security-process-avast
    desc: Encoded Avast security processes
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(avastui|avastsvc)\.exe\b'
  - id: encoded-security-process-av
    desc: Encoded generic antivirus processes
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(avgsvc|mcshield)\.exe\b'
  - id: encoded-security-process-bitdefender
    desc: Encoded Bitdefender security processes
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(bdagent|bdservicehost)\.exe\b'
  - id: encoded-security-process-kaspersky
    desc: Encoded Kaspersky security processes
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(csfalconservice|kavtray)\.exe\b'
  - id: encoded-security-process-regional
    desc: Encoded regional security processes
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(360safe|360tray)\.exe\b'
  - id: encoded-security-process-regional-alt
    desc: Encoded regional security process set
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(qqpctray|qqpcmgr)\.exe\b'
  - id: encoded-security-process-kernel
    desc: Encoded host security processes
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(hipstray|hipsdaemon|wsctrlsvc|usysdiag)\.exe\b'

  - id: encoded-defender-policy-group-realtime
    desc: Encoded Defender realtime policy values
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(DisableRealtimeMonitoring|DisableBehaviorMonitoring)\b'
  - id: encoded-defender-policy-group-access
    desc: Encoded Defender access policy values
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(DisableOnAccessProtection|DisableScanOnRealtimeEnable)\b'
  - id: encoded-defender-policy-group-antimalware
    desc: Encoded Defender antimalware policy values
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(DisableAntiSpyware|DisableAntiVirus|TamperProtection)\b'
  - id: encoded-defender-policy-group-reporting
    desc: Encoded Defender reporting policy values
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(SpynetReporting|SubmitSamplesConsent)\b'

composite_rules:
  - id: encoded-security-process-target-list
    desc: Encoded security process target catalog
    crit: suspicious
    conf: 0.99
    any:
      - id: encoded-security-process-microsoft-core
      - id: encoded-security-process-microsoft-ui
      - id: encoded-security-process-defender
      - id: encoded-security-process-avast
      - id: encoded-security-process-av
      - id: encoded-security-process-bitdefender
      - id: encoded-security-process-kaspersky
      - id: encoded-security-process-regional
      - id: encoded-security-process-regional-alt
      - id: encoded-security-process-kernel
    needs: 3

  - id: encoded-defender-policy-disable-values
    desc: Encoded Defender policy tampering catalog
    crit: suspicious
    conf: 0.99
    any:
      - id: encoded-defender-policy-group-realtime
      - id: encoded-defender-policy-group-access
      - id: encoded-defender-policy-group-antimalware
      - id: encoded-defender-policy-group-reporting
    needs: 3

  - id: encoded-edr-teardown
    desc: Encoded AV process kill and policy tampering
    crit: hostile
    conf: 0.99
    all:
      - id: encoded-security-process-target-list
      - id: encoded-defender-policy-disable-values

