defaults:
  platforms: [windows]
  for: [binaries, source, batch]
  attack: T1112

traits:
- id: batch-reg-disable-taskmgr
  desc: Batch writes DisableTaskMgr policy
  crit: suspicious
  conf: 0.94
  for: [batch]
  if:
    type: text
    regex: '(?i)reg\s+add.{0,120}DisableTaskMgr.{0,80}/d\s+1\b'

composite_rules:
- id: disable-taskmgr-policy
  desc: Writes DisableTaskMgr policy
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/os/registry/keys::disable-taskmgr
  any:
  - id: micro-behaviors/os/registry/manipulate::registry-write-marker
  - id: micro-behaviors/os/registry/manipulate::set-value
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  downgrade:
    any:
    - id: well-known/app/startallback::startallback-basename
    - id: well-known/app/startallback::darkmagic-basename
    - id: metadata/binary/vendor/
  unless:
  - id: well-known/app/installer::startallback-installer
