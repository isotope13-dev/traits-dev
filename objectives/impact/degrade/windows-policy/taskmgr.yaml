defaults:
  platforms: [windows]
  for: [binaries, source]
  attack: T1112

composite_rules:
  - id: disable-taskmgr-policy
    desc: Writes DisableTaskMgr policy
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/os/registry/keys::disable-taskmgr
    any:
      - id: micro-behaviors/os/registry/manipulate::registry-write-marker
      - id: micro-behaviors/os/registry/manipulate::set-value
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    needs: 1
    downgrade:
      any:
        - id: well-known/app::startallback-basename
        - id: well-known/app::darkmagic-basename
    unless:
      - id: well-known/app/installer::startallback-installer
