defaults:
  for: [pe]
  platforms: [windows]
  attack: T1112

traits:
  - id: explorer-restriction-value-cluster
    desc: Multiple Explorer restriction policy values
    crit: suspicious
    conf: 0.94
    count_min: 5
    if:
      type: text
      regex: ^(NoDrives|RestrictRun|NoNetConnectDisconnect|NoRecentDocsHistory|NoClose)$
      section: .rdata
  - id: network-dialog-restriction-value-cluster
    desc: Network and dialog restriction policy values
    crit: suspicious
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: ^(NoEntireNetwork|NoPlacesBar|NoBackButton)$
      section: .rdata

composite_rules:
  - id: explorer-policy-lockdown
    desc: Writes multiple Explorer restriction policies
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/file/text::policies-explorer-path
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
      - id: explorer-restriction-value-cluster
    any:
      - id: metadata/file/text::policies-network-path
      - id: metadata/file/text::policies-comdlg32-path
      - id: network-dialog-restriction-value-cluster
    needs: 1
  - id: explorer-network-dialog-policy-lockdown
    desc: Locks Explorer network and dialog policies
    crit: hostile
    conf: 0.98
    all:
      - id: explorer-policy-lockdown
    any:
      - id: metadata/file/text::policies-network-path
      - id: metadata/file/text::policies-comdlg32-path
      - id: network-dialog-restriction-value-cluster
    needs: 3
