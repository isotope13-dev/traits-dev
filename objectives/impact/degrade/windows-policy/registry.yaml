defaults:
  for: [pe]
  platforms: [windows]
  attack: T1112

traits:
  - id: explorer-restriction-value-cluster
    desc: Multiple Explorer restriction policy values
    crit: suspicious
    conf: 0.94
    count_min: 5
    if:
      type: text
      regex: ^(NoDrives|RestrictRun|NoNetConnectDisconnect|NoRecentDocsHistory|NoClose)$
      section: .rdata
  - id: network-dialog-restriction-value-cluster
    desc: Network and dialog restriction policy values
    crit: suspicious
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: ^(NoEntireNetwork|NoPlacesBar|NoBackButton)$
      section: .rdata
  - id: split-disable-registrytools-a
    desc: Split DisableRegistryTools fragment A
    crit: component
    conf: 0.95
    if:
      type: text
      exact: DisableR
  - id: split-disable-registrytools-b
    desc: Split DisableRegistryTools fragment B
    crit: component
    conf: 0.95
    if:
      type: text
      exact: egistryTools
  - id: split-disableregistrytools-a
    desc: Split DisableRegistryTools fragment C
    crit: component
    conf: 0.95
    if:
      type: text
      exact: DisableRe
  - id: split-disableregistrytools-b
    desc: Split DisableRegistryTools fragment D
    crit: component
    conf: 0.95
    if:
      type: text
      exact: gistryTools
  - id: task-manager-exe-target
    desc: Task Manager executable target
    crit: component
    conf: 0.78
    if:
      type: text
      exact: taskmgr.exe

composite_rules:
  - id: disable-registrytools-split-a
    desc: Split DisableRegistryTools string
    crit: component
    conf: 0.95
    all:
      - id: split-disable-registrytools-a
      - id: split-disable-registrytools-b
  - id: disable-registrytools-split-b
    desc: Split DisableRegistryTools string
    crit: component
    conf: 0.95
    all:
      - id: split-disableregistrytools-a
      - id: split-disableregistrytools-b
  - id: explorer-policy-lockdown
    desc: Writes multiple Explorer restriction policies
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/file/text::policies-explorer-path
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
      - id: explorer-restriction-value-cluster
    any:
      - id: metadata/file/text::policies-network-path
      - id: metadata/file/text::policies-comdlg32-path
      - id: network-dialog-restriction-value-cluster
    needs: 1
  - id: explorer-network-dialog-policy-lockdown
    desc: Locks Explorer network and dialog policies
    crit: hostile
    conf: 0.98
    all:
      - id: explorer-policy-lockdown
    any:
      - id: metadata/file/text::policies-network-path
      - id: metadata/file/text::policies-comdlg32-path
      - id: network-dialog-restriction-value-cluster
    needs: 3
  - id: registry-tools-policy-lockout
    desc: Disables Registry Editor by policy
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
    any:
      - id: metadata/file/text::policies-system-path
      - id: metadata/file/text::policies-system-suffix
      - id: objectives/impact/degrade/system::disable-registry-tools
      - id: disable-registrytools-split-a
      - id: disable-registrytools-split-b
      - id: task-manager-exe-target
    needs: 3
