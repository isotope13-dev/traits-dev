defaults:
  for: [pe]
  platforms: [windows]
  attack: T1112

traits:
  - id: explorer-policy-lockdown
    desc: Writes multiple Explorer restriction policies
    crit: suspicious
    conf: 0.96
    if:
      type: yara
      source: |
        rule explorer_policy_lockdown {
          strings:
            $api1 = "RegSetValueExA" ascii
            $api2 = "RegCreateKeyExA" ascii
            $api3 = "RegOpenKeyExA" ascii
            $path = "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer" ascii
            $v1 = "NoDrives" ascii
            $v2 = "RestrictRun" ascii
            $v3 = "NoNetConnectDisconnect" ascii
            $v4 = "NoRecentDocsHistory" ascii
            $v5 = "NoClose" ascii
          condition:
            uint16(0) == 0x5A4D and all of ($api*) and $path and all of ($v*)
        }
  - id: explorer-network-dialog-policy-lockdown-markers
    desc: Locks Explorer network and dialog policies
    crit: suspicious
    conf: 0.97
    if:
      type: yara
      source: |
        rule explorer_network_dialog_policy_lockdown {
          strings:
            $api1 = "RegSetValueExA" ascii
            $api2 = "RegCreateKeyExA" ascii
            $api3 = "RegOpenKeyExA" ascii
            $p1 = "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer" ascii
            $p2 = "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Network" ascii
            $p3 = "Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Comdlg32" ascii
            $v1 = "NoDrives" ascii
            $v2 = "RestrictRun" ascii
            $v3 = "NoNetConnectDisconnect" ascii
            $v4 = "NoEntireNetwork" ascii
            $v5 = "NoPlacesBar" ascii
            $v6 = "NoBackButton" ascii
          condition:
            uint16(0) == 0x5A4D and all of ($api*) and all of ($p*) and all of ($v*)
        }

composite_rules:
  - id: explorer-network-dialog-policy-lockdown
    desc: Locks Explorer network and dialog policies
    crit: suspicious
    conf: 0.97
    all:
      - id: explorer-network-dialog-policy-lockdown-markers
      - id: metadata/file/text::policies-network-path
