defaults:
  for: [pe]
  platforms: [windows]
  attack: T1112

composite_rules:
  - id: explorer-policy-lockdown
    desc: Writes multiple Explorer restriction policies
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/file/text::policies-explorer-path
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
      - id: metadata/file/text::policy-no-drives
      - id: metadata/file/text::policy-restrict-run
      - id: metadata/file/text::policy-no-net-connect-disconnect
      - id: metadata/file/text::policy-no-recent-docs-history
      - id: metadata/file/text::policy-no-close
  - id: explorer-network-dialog-policy-lockdown
    desc: Locks Explorer network and dialog policies
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/file/text::policies-explorer-path
      - id: metadata/file/text::policies-network-path
      - id: metadata/file/text::policies-comdlg32-path
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
      - id: metadata/file/text::policy-no-drives
      - id: metadata/file/text::policy-restrict-run
      - id: metadata/file/text::policy-no-net-connect-disconnect
      - id: metadata/file/text::policy-no-entire-network
      - id: metadata/file/text::policy-no-places-bar
      - id: metadata/file/text::policy-no-back-button
