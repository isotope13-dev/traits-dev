defaults:
  platforms: [windows]
  for: [c, cpp, pe, dll]
  attack: T1562

traits:
  - id: windows-defender-realtime-policy
    desc: Defender realtime policy value
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: DisableRealtimeMonitoring

  - id: windows-uac-enablelua-policy
    desc: UAC EnableLUA policy value
    crit: suspicious
    conf: 0.93
    for: [c, cpp]
    if:
      type: text
      substr: EnableLUA

  - id: disable-smartscreen-policy
    desc: DisableSmartScreen policy value
    crit: component
    conf: 0.9
    if:
      type: text
      substr: DisableSmartScreen

  - id: smartscreen-enabled-policy
    desc: SmartScreenEnabled policy value
    crit: component
    conf: 0.9
    if:
      type: text
      substr: SmartScreenEnabled

  - id: phishingfilter-policy-value
    desc: PhishingFilter policy value
    crit: component
    conf: 0.9
    if:
      type: text
      substr: PhishingFilter

  # Code Integrity / Smart App Control "VerifiedAndReputablePolicyState" under
  # SYSTEM\CurrentControlSet\Control\CI\Policy — malware writes 0 then refreshes
  # with CiTool to disable reputation-based blocking.
  - id: ci-policy-key-path
    desc: Code Integrity CI Policy registry path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Control\CI\Policy

  - id: verified-reputable-policy-state
    desc: VerifiedAndReputablePolicyState value
    crit: component
    conf: 0.92
    if:
      type: text
      substr: VerifiedAndReputablePolicyState

  - id: citool-refresh-command
    desc: CiTool --refresh trust policy command
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CiTool --refresh

  - id: windows-firewall-enable-policy
    desc: Firewall EnableFirewall policy
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'FirewallPolicy[\s\S]{0,160}EnableFirewall'

  - id: windows-autorun-enable-policy
    desc: AutoRun enable policy value
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: NoDriveTypeAutoRun
    unless:
      - id: well-known/app/rufus/
      - id: well-known/lib/wine/

composite_rules:
  - id: windows-smartscreen-policy-values
    desc: SmartScreen policy values
    crit: suspicious
    conf: 0.92
    any:
      - id: disable-smartscreen-policy
      - id: smartscreen-enabled-policy
      - id: phishingfilter-policy-value
    needs: 2

  - id: ci-verified-reputable-policy-disable
    desc: CI VerifiedAndReputable policy disabled
    crit: hostile
    conf: 0.96
    attack: T1562.001
    mbc: B0003
    for: [pe, dll]
    all:
      - id: ci-policy-key-path
      - id: verified-reputable-policy-state
      - id: micro-behaviors/os/registry/access::registry-set-value-api
    any:
      - id: citool-refresh-command
      - id: micro-behaviors/process/create/launch::create-process-api-name

  - id: native-windows-security-policy-degrade
    desc: Native Windows security policy degrade
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/registry/access::registry-set-value-api
    any:
      - id: windows-defender-realtime-policy
      - id: windows-uac-enablelua-policy
      - id: objectives/discovery/host/security::uac-policy-query
      - id: windows-smartscreen-policy-values
      - id: windows-firewall-enable-policy
      - id: windows-autorun-enable-policy
    needs: 3
