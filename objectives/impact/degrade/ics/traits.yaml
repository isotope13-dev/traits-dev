# ICS/OT Safety Parameter Manipulation
# Detects attempts to tamper with industrial control system safety parameters:
# chemical dosing, pressure, valves, turbines, breakers, frequency, SIS trip points.
# Covers water, power grid, gas/pipeline, and safety instrumented systems.
# ATT&CK for ICS: T0836 (Modify Parameter), T0855 (Unauthorized Command Message)
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux]
  crit: suspicious
  conf: 0.92

traits:
  # === Water treatment ===
- id: chlorine-max-dose
  desc: Chlorine dosing set to dangerous level
  conf: 0.96
  if:
    type: text
    regex: (?i)Chlorine[-_]?(Dose|Flow)\s*[=:]\s*(MAX|100|[5-9]\d)\b

- id: chlorine-pump-force-on
  desc: Forces chlorine pump to ON
  conf: 0.96
  if:
    type: text
    regex: (?i)Chlorine[-_]?Pump\s*[=:]\s*(ON|1|TRUE)\b

- id: chlorine-valve-force-open
  desc: Forces chlorine valve to OPEN
  conf: 0.96
  if:
    type: text
    regex: (?i)Chlorine[-_]?Valve\s*[=:]\s*(OPEN|1|TRUE)\b

- id: pressure-dangerous-value
  desc: Sets pressure to dangerous value
  conf: 0.92
  if:
    type: text
    regex: (?i)(RO[-_]?Pressure|Tank[-_]?Pressure)\s*[=:]\s*([89]\d|[1-9]\d{2,})\b

  # === Mechanical overrides (cross-sector) ===
- id: safety-valve-force-close--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (?i)(Safety|Relief|Emergency)[-_]?Valve\s*[=:]\s*(CLOSE|OFF)\b

  count_max: 1003497
- id: safety-valve-force-close--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: (?i)(Safety|Relief|Emergency)[-_]?Valve\s*[=:]\s*(0|DISABLED)\b

  count_max: 1003498
- id: pump-speed-override
  desc: Forces pump to maximum speed
  conf: 0.88
  if:
    type: text
    regex: (?i)Pump[-_]?(Speed|Override)\s*[=:]\s*(MAX|100|FULL)\b

- id: turbine-speed-override
  desc: Overrides turbine speed setting
  conf: 0.90
  if:
    type: text
    regex: (?i)Turbine[-_]?Speed\s*[=:]\s*(MAX|[2-9]\d{2,})\b

  # === Power grid ===
- id: breaker-force-open--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: (?i)(Breaker|CB)[-_]?(Status|Command)\s*[=:]\s*(OPEN|TRIP)\b

  count_max: 1003501
- id: breaker-force-open--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: (?i)(Breaker|CB)[-_]?(Status|Command)\s*[=:]\s*(1)\b

  count_max: 1003502
- id: frequency-setpoint-override
  desc: Overrides grid frequency setpoint
  conf: 0.92
  if:
    type: text
    regex: (?i)(Frequency[-_]?Setpoint|Hz[-_]?Target)\s*[=:]\s*\d

- id: load-shed-force--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.90
  if:
    type: text
    regex: (?i)Load[-_]?Shed\s*[=:]\s*(ON|TRUE)\b

  count_max: 1003504
- id: load-shed-force--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.90
  if:
    type: text
    regex: (?i)Load[-_]?Shed\s*[=:]\s*(1|ALL)\b

  count_max: 1003505
- id: load-shed-force--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.90
  if:
    type: text
    regex: (?i)Load[-_]?Shed\s*[=:]\s*(FORCE)\b

  count_max: 1003506
- id: generator-trip--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (?i)Generator[-_]?(Trip|Disconnect)\s*[=:]\s*(ON|TRUE|1)\b

  # === Gas/pipeline ===
  count_max: 1003507
- id: generator-trip--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (?i)Generator[-_]?(Shutdown)\s*[=:]\s*(ON|TRUE|1)\b

  # === Gas/pipeline ===
  count_max: 1003508
- id: pipeline-pressure-override
  desc: Overrides pipeline pressure limits
  conf: 0.90
  if:
    type: text
    regex: (?i)(Pipeline|Line)[-_]?Pressure\s*[=:]\s*([89]\d|[1-9]\d{2,})\b

- id: compressor-override
  desc: Forces compressor speed override
  conf: 0.88
  if:
    type: text
    regex: (?i)Compressor[-_]?(Speed|RPM)\s*[=:]\s*(MAX|FULL|[1-9]\d{3,})\b

  # === Safety instrumented system (SIS) ===
- id: safety-interlock-disable--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (?i)(Safety[-_]?Interlock|Emergency[-_]?Stop)\s*[=:]\s*(OFF|0)\b

  count_max: 1003511
- id: safety-interlock-disable--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (?i)(Safety[-_]?Interlock|Emergency[-_]?Stop)\s*[=:]\s*(FALSE|DISABLED)\b

  count_max: 1003512
- id: alarm-system-disable--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.90
  if:
    type: text
    regex: (?i)(Alarm[-_]?System|High[-_]?Alarm)\s*[=:]\s*(OFF|0|DISABLED)\b

  count_max: 1003513
- id: alarm-system-disable--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.90
  if:
    type: text
    regex: (?i)(Low[-_]?Alarm)\s*[=:]\s*(OFF|0|DISABLED)\b

  count_max: 1003514
- id: sis-trip-bypass--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: (?i)(Trip[-_]?Point|SIS[-_]?Logic|ESD)\s*[=:]\s*(BYPASS|OFF)\b

  count_max: 1003515
- id: sis-trip-bypass--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: (?i)(Trip[-_]?Point|SIS[-_]?Logic|ESD)\s*[=:]\s*(DISABLED|0)\b

  count_max: 1003516
- id: sis-setpoint-override
  desc: Overrides SIS safety setpoint
  conf: 0.92
  if:
    type: text
    regex: (?i)(Safety[-_]?Setpoint|Trip[-_]?Value|Shutdown[-_]?Threshold)\s*[=:]\s*\d

composite_rules:
  # === Sector-specific sabotage ===
- id: chemical-dosing-sabotage
  desc: Chemical dosing parameter tampering
  crit: hostile
  conf: 0.96
  needs: 2
  any:
  - id: chlorine-max-dose
  - id: chlorine-pump-force-on
  - id: chlorine-valve-force-open

- id: power-grid-sabotage
  desc: Power grid parameter manipulation
  crit: hostile
  conf: 0.96
  needs: 2
  any:
  - id: breaker-force-open
  - id: frequency-setpoint-override
  - id: load-shed-force
  - id: generator-trip

- id: pipeline-sabotage
  desc: Gas/pipeline parameter manipulation
  crit: hostile
  conf: 0.95
  all:
  - id: pipeline-pressure-override
  any:
  - id: compressor-override
  - id: safety-valve-force-close

- id: sis-sabotage
  desc: Safety system bypass or override
  crit: hostile
  conf: 0.97
  needs: 2
  any:
  - id: sis-trip-bypass
  - id: sis-setpoint-override
  - id: safety-interlock-disable

  # === Cross-sector composites ===
- id: safety-parameter-tampering
  desc: ICS safety parameter tampering
  crit: hostile
  conf: 0.95
  needs: 2
  any:
  - id: chemical-dosing-sabotage
  - id: power-grid-sabotage
  - id: pipeline-sabotage
  - id: sis-sabotage
  - id: pressure-dangerous-value
  - id: safety-valve-force-close
  - id: pump-speed-override
  - id: turbine-speed-override
  - id: safety-interlock-disable
  - id: alarm-system-disable

- id: ics-targeted-sabotage
  desc: ICS sabotage with environment discovery
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/discovery/system/ics-environment::ics-environment-fingerprint
  any:
  - id: safety-parameter-tampering
  - id: micro-behaviors/communications/modbus::write-single-register
- id: safety-valve-force-close
  desc: Forces safety valve to CLOSE
  crit: baseline
  conf: 0.88
  any:
  - id: safety-valve-force-close--rx-1
  - id: safety-valve-force-close--rx-2
- id: breaker-force-open
  desc: Forces circuit breaker open (trip)
  crit: baseline
  conf: 0.94
  any:
  - id: breaker-force-open--rx-3
  - id: breaker-force-open--rx-4
- id: load-shed-force
  desc: Forces load shedding command
  crit: baseline
  conf: 0.90
  any:
  - id: load-shed-force--rx-5
  - id: load-shed-force--rx-6
  - id: load-shed-force--rx-7
- id: generator-trip
  desc: Forces generator trip/disconnect
  crit: baseline
  conf: 0.92
  any:
  - id: generator-trip--rx-8
  - id: generator-trip--rx-9
- id: safety-interlock-disable
  desc: Disables safety interlock or alarm
  crit: baseline
  conf: 0.92
  any:
  - id: safety-interlock-disable--rx-10
  - id: safety-interlock-disable--rx-11
- id: alarm-system-disable
  desc: Disables alarm monitoring system
  crit: baseline
  conf: 0.90
  any:
  - id: alarm-system-disable--rx-12
  - id: alarm-system-disable--rx-13
- id: sis-trip-bypass
  desc: Bypasses SIS trip point logic
  crit: suspicious
  conf: 0.94
  any:
  - id: sis-trip-bypass--rx-14
  - id: sis-trip-bypass--rx-15
