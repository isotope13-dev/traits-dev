defaults:
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: forkbomb
    desc: Fork bomb pattern
    crit: suspicious
    conf: 0.95
    attack: T1499
    for:
      - shell
    if:
      type: string_literal
      regex: ':\(\) \{\s*:\|:&\s*\\};:'
  - id: bluescreen
    desc: Windows BSOD trigger
    crit: suspicious
    conf: 0.95
    attack: T1499
    for:
      - python
      - pe
    if:
      type: text
      substr: RtlAdjustPrivilege(19, 1,
  - id: osascript-quit
    desc: macOS application quit via osascript
    crit: suspicious
    conf: 0.85
    attack: T1489
    for:
      - macho
      - shell
    if:
      type: text
      regex: osascript.{0,50}tell.{0,50}application.{0,50}quit
  - id: disk-fill-banner
    desc: Disk fill bomb banner string
    crit: suspicious
    conf: 0.98
    attack: T1499
    for:
      - elf
    platforms:
      - linux
    if:
      type: text
      exact: wait....
  - id: disk-fill-target-file
    desc: Disk fill fixed target filename
    crit: suspicious
    conf: 0.99
    attack: T1499
    for:
      - elf
    platforms:
      - linux
    if:
      type: text
      exact: myFile.txt
  - id: disk-fill-loop-bound
    desc: Disk fill four billion loop bound
    crit: suspicious
    conf: 0.99
    attack: T1499
    for:
      - elf
    platforms:
      - linux
    if:
      type: hex
      pattern: "b8 ff 27 6b ee"
      section: ".text"
    unless:
      - type: section
        exact: .modinfo
  - id: profbomb-pkgname
    desc: Alpine package name profbomb
    crit: suspicious
    conf: 0.99
    attack: T1499
    for:
      - pkginfo
    size_min: 128
    size_max: 1024
    if:
      type: text
      substr: "pkgname = profbomb"
  - id: profbomb-origin
    desc: Alpine package origin profbomb
    crit: suspicious
    conf: 0.99
    attack: T1499
    for:
      - pkginfo
    size_min: 128
    size_max: 1024
    if:
      type: text
      substr: "origin = profbomb"
  - id: profbomb-pkgver
    desc: Alpine package version 4.5.1-r0
    crit: suspicious
    conf: 0.99
    attack: T1499
    for:
      - pkginfo
    size_min: 128
    size_max: 1024
    if:
      type: text
      substr: "pkgver = 4.5.1-r0"
  - id: profbomb-pkgdesc
    desc: Alpine package description profbomb
    crit: notable
    conf: 0.95
    attack: T1499
    for:
      - pkginfo
    size_min: 128
    size_max: 1024
    if:
      type: text
      substr: "pkgdesc = profbomb"
  - id: pkginfo-basename
    desc: Alpine package metadata filename
    crit: component
    conf: 0.99
    for:
      - pkginfo
    if:
      type: path
      basename: true
      exact: .PKGINFO
  - id: profbomb-apk-basename
    desc: Profbomb APK package filename
    crit: notable
    conf: 0.99
    platforms:
      - unix
    for:
      - archive
      - tar
    if:
      type: path
      basename: true
      exact: profbomb-4.5.1-r0.apk
  - id: profbomb-gzip-container-header
    desc: Profbomb gzip container header
    crit: component
    conf: 0.99
    attack: T1499
    platforms:
      - unix
    for:
      - archive
      - tar
    size_min: 3000
    size_max: 5000
    if:
      type: hex
      pattern: "1f 8b 08 00 00 09 6e 88"
      offset: 0

composite_rules:
  - id: profbomb-gzip-apk-container
    desc: Profbomb gzip APK container
    crit: hostile
    conf: 0.995
    attack: T1499
    platforms:
      - unix
    for:
      - archive
      - tar
    all:
      - id: profbomb-apk-basename
      - id: profbomb-gzip-container-header
  - id: disk-fill-logic-bomb
    desc: Local disk exhaustion logic bomb
    crit: hostile
    conf: 0.99
    attack: T1499
    for:
      - elf
    all:
      - id: disk-fill-banner
      - id: disk-fill-target-file
      - id: disk-fill-loop-bound
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/write/direct::fputc
  - id: profbomb-alpine-package
    desc: Profbomb Alpine package identity
    crit: hostile
    conf: 0.995
    attack: T1499
    for:
      - pkginfo
    all:
      - id: pkginfo-basename
      - id: profbomb-pkgname
      - id: profbomb-origin
      - id: profbomb-pkgver
    any:
      - id: profbomb-pkgdesc
