defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
    - windows
traits:
  - id: forkbomb
    desc: Fork bomb pattern
    crit: suspicious
    conf: 0.95
    attack: T1499
    for:
      - shell
    if:
      type: string_literal
      regex: ':\(\) \{\s*:\|:&\s*\\};:'
  - id: bluescreen
    desc: Windows BSOD trigger
    crit: suspicious
    conf: 0.95
    attack: T1499
    for:
      - python
      - pe
    if:
      type: text
      substr: RtlAdjustPrivilege(19, 1,
  - id: osascript-quit
    desc: macOS application quit via osascript
    crit: suspicious
    conf: 0.85
    attack: T1489
    for:
      - macho
      - shell
    if:
      type: text
      regex: osascript.{0,50}tell.{0,50}application.{0,50}quit
