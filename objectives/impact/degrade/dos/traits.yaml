defaults:
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: forkbomb
    desc: Fork bomb pattern
    crit: suspicious
    conf: 0.95
    attack: T1499
    for:
      - shell
    if:
      type: string_literal
      regex: ':\(\) \{\s*:\|:&\s*\\};:'
  - id: bluescreen
    desc: Windows BSOD trigger
    crit: suspicious
    conf: 0.95
    attack: T1499
    for:
      - python
      - pe
    if:
      type: text
      substr: RtlAdjustPrivilege(19, 1,
  - id: osascript-quit
    desc: macOS application quit via osascript
    crit: suspicious
    conf: 0.85
    attack: T1489
    for:
      - macho
      - shell
    if:
      type: text
      regex: osascript.{0,50}tell.{0,50}application.{0,50}quit
  - id: disk-fill-banner
    desc: Disk fill bomb banner string
    crit: suspicious
    conf: 0.98
    attack: T1499
    for:
      - elf
    platforms:
      - linux
    if:
      type: text
      exact: wait....
  - id: disk-fill-target-file
    desc: Disk fill fixed target filename
    crit: suspicious
    conf: 0.99
    attack: T1499
    for:
      - elf
    platforms:
      - linux
    if:
      type: text
      exact: myFile.txt

composite_rules:
  - id: disk-fill-logic-bomb
    desc: Local disk exhaustion logic bomb
    crit: hostile
    conf: 0.99
    attack: T1499
    all:
      - id: disk-fill-banner
      - id: disk-fill-target-file
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/write::fputc
