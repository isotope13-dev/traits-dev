defaults:
  for: [archives]
  platforms: [android]
  crit: suspicious
  conf: 0.9
  attack: T1499

composite_rules:
  - id: android-screamer-media-harassment
    desc: Android screamer media harassment
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/embedded/media::apk-scare-audio-image-set
      - id: metadata/package::apk-secondary-dex

  - id: android-prank-media-dos-profile
    desc: Android prank media DoS profile
    conf: 0.95
    all:
      - id: metadata/signed/platform::android-debug-testkey-signature
      - id: micro-behaviors/data/embedded/media::apk-short-raw-mp3-burst
      - id: micro-behaviors/data/embedded/media::apk-short-drawable-image-resource
      - id: metadata/package::apk-secondary-dex

  - id: android-prank-media-resource-bundle
    desc: Android prank media resource bundle
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/data/embedded/media::apk-short-raw-mp3-burst
      - id: micro-behaviors/data/embedded/media::apk-short-drawable-image-resource
      - id: metadata/package::apk-secondary-dex

  - id: android-virus-themed-media-disruption
    desc: Android virus-themed media disruption
    crit: hostile
    conf: 0.97
    all:
      - id: android-prank-media-resource-bundle
      - id: objectives/impact/deface/wallpaper::android-virus-wallpaper-resource

  - id: android-repeating-audio-disruption
    desc: Android repeated audio disruption
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/hardware/input/audio::android-audio-playback-control
      - id: micro-behaviors/time/schedule/interval::android-repeating-timer-task
      - id: android-prank-media-dos-profile
