defaults:
  platforms: [unix, appliance]
  for: [c, cpp, objc, elf]
  attack: T1600

traits:
  - id: native-forced-rng-seed
    desc: Native forced RNG seed
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'srand\(cryptoSeedOverride\)|hijackRandomSeed'

  - id: native-weak-cipher-config
    desc: Native weak cipher config
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'CipherString = DEFAULT@SECLEVEL=0[\s\S]{0,120}MinProtocol = TLSv1'

  - id: native-crypto-state-exfil
    desc: Native crypto state exfil
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /crypto_state

composite_rules:
  - id: native-crypto-weakening-exfil
    desc: Native crypto weakening exfil
    crit: hostile
    conf: 0.98
    all:
      - id: native-forced-rng-seed
      - id: native-weak-cipher-config
      - id: native-crypto-state-exfil
