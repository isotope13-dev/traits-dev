defaults:
  platforms: [windows, unix, appliance]
  for: [typescript, javascript]
  attack: T1553

traits:
  - id: ts-root-ca-override-file
    desc: TS root CA override file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: root_ca_override.pem

  - id: ts-trust-store-root-entry
    desc: TS trust store root entry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'trustLevel:\s*["'']root["''][\s\S]{0,700}trust_store\.json'

  - id: ts-captured-crypto-keys
    desc: TS captures crypto keys
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: captured_keys.dat

composite_rules:
  - id: ts-crypto-store-tamper
    desc: TS tampers crypto trust store
    crit: hostile
    conf: 0.98
    all:
      - id: ts-root-ca-override-file
      - id: ts-trust-store-root-entry
      - id: ts-captured-crypto-keys
