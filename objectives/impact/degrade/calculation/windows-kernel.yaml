defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  attack: T1565.002
traits:
  - id: precision-fpu-patch-pattern
    desc: Precision FPU patch pattern
    crit: component
    conf: 0.9
    for: [pe, dll]
    if:
      type: hex
      section: .text
      pattern: "D9 04 9D ?? ?? ?? ?? 83 ED 04 05 10 00 00 00 D8 0D"
  - id: fpu-scaling-routine-text
    desc: FPU scaling routine text
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \b(FPU|x87|floating.?point)\b.{0,120}\b(scale|scaling|precision|array|calculation)\b
  - id: compiler-artifact-targeting
    desc: Compiler artifact target selector
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \b(Intel|__INTEL_COMPILER)\b.{0,160}\b(section|header|compiler|artifact)\b
  - id: rule-driven-patch-engine
    desc: Rule driven patch engine
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: \b(patch(ing)? rules?|replacement logic|dispatch array)\b
composite_rules:
  - id: precision-calculation-code-sabotage
    desc: Precision calculation code sabotage
    crit: hostile
    conf: 0.98
    all:
      - id: rule-driven-patch-engine
    any:
      - id: precision-fpu-patch-pattern
      - id: compiler-artifact-targeting
      - id: fpu-scaling-routine-text
    needs: 2
  - id: filesystem-filter-calculation-sabotage
    desc: Filesystem filter calculation sabotage
    crit: hostile
    conf: 0.99
    all:
      - id: precision-calculation-code-sabotage
      - id: objectives/evasion/kernel-hide/rootkit::filesystem-executable-read-patcher
