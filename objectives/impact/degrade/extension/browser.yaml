# A browser extension that enumerates peer extensions and disables those that
# can also control proxy settings.  The management API itself is neutral; the
# hostile conclusion requires both peer disabling and self-directed proxy use.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, crx, xpi, zip, archives]

composite_rules:
  - id: competing-proxy-extension-disablement
    desc: Extension disables competing proxy extensions while applying its own proxy
    crit: hostile
    conf: 0.99
    attack: T1562.001,T1090
    scope: archive
    for: [crx, xpi, zip, archives]
    all:
      - id: micro-behaviors/browser-extension/management::browser-management-get-all
      - id: micro-behaviors/browser-extension/management::browser-management-set-enabled
      - id: micro-behaviors/os/network/webextension::chrome-proxy-settings-set
    unless:
      - id: proxy-conflict-user-choice

  - id: proxy-conflict-user-choice
    desc: User-facing proxy conflict resolution flow
    crit: exception
    conf: 0.96
    scope: file
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/browser-extension/management::browser-management-set-enabled
      - id: micro-behaviors/browser-extension/management::browser-management-conflict-label
      - id: micro-behaviors/browser-extension/management::browser-management-conflict-explanation

  - id: browser-security-extension-disablement
    desc: Extension enumerates and disables selected cookie or security tools
    crit: hostile
    conf: 0.99
    attack: T1562.001,T1562.004
    scope: archive
    for: [crx, xpi, zip, archives]
    all:
      - id: micro-behaviors/browser-extension/management::browser-management-get-all
      - id: micro-behaviors/browser-extension/management::browser-management-disable-call
      - id: metadata/permission/extension-id::extension-id-map
      - id: objectives/supply-chain/hidden-payload/extensions/session::management-id-comparison
