defaults:
  platforms: [fortios, windows]
  for: [powershell, php]
  attack: T1070

traits:
  - id: fortios-log-clear-api
    desc: FortiOS log clear API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v2/log/[^"''\s]{1,80}/clear|/pm/exec/log-clear'

  - id: fortios-core-log-disable
    desc: FortiOS core log disable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(traffic-log|security-log|event-log|auth-log)[\s\S]{0,80}"disable"'

  - id: fortios-syslog-disable
    desc: FortiOS syslog disable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'syslog-setting[\s\S]{0,80}"disable"'

composite_rules:
  - id: fortios-log-degradation
    desc: FortiOS log degradation
    crit: hostile
    conf: 0.98
    all:
      - id: fortios-log-clear-api
    any:
      - id: fortios-core-log-disable
      - id: fortios-syslog-disable
