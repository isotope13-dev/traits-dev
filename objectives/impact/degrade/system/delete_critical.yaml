defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  - id: delete-critical-system-dll
    desc: "Deletes critical Windows system DLLs"
    crit: suspicious
    conf: 0.9
    mbc: E1485
    attack: T1485
    if:
      type: string_value
      regex: "(?i)unlink\\s*\\([\"']C:\\\\Windows(\\\\System)?\\\\[a-zA-Z0-9]+\\.dll[\"']\\)"
