defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: locker-ransomware-behavior
    desc: Disables registry tools and sets custom legal notice on logon screen
    crit: hostile
    conf: 0.95
    attack: "T1486"
    all:
      - id: objectives/impact/degrade/system/disable-registry::disable-registry-tools
      - id: objectives/impact/deface/screen::ransom-note-logon-ui
