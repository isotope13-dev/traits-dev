defaults:
  platforms: [netbsd, unix]
  for: [javascript, typescript]
  attack: T1562

traits:
  - id: node-netbsd-securelevel-lower
    desc: Node NetBSD securelevel lower
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: kern.securelevel

  - id: node-netbsd-sysctl-write
    desc: Node NetBSD sysctl write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'sysctl -w \$\{key\}=\$\{value\}'

  - id: node-netbsd-mac-policy-disable
    desc: Node NetBSD MAC policy disable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: security.mac.${policy}.enabled=0

  - id: node-netbsd-auditctl-disable
    desc: Node NetBSD auditctl disable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /usr/sbin/auditctl -e 2

composite_rules:
  - id: node-netbsd-security-policy-disable
    desc: Node NetBSD security policy disable
    crit: hostile
    conf: 0.98
    all:
      - id: node-netbsd-sysctl-write
    any:
      - id: node-netbsd-securelevel-lower
      - id: node-netbsd-mac-policy-disable
      - id: node-netbsd-auditctl-disable
    needs: 1
