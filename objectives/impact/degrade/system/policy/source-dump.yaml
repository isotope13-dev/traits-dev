defaults:
  platforms: [windows]
  for: [html, text]
  attack: T1112

traits:
  - id: source-dump-disable-taskmgr
    desc: Source dump disables TaskMgr
    crit: component
    conf: 0.94
    if:
      type: text
      word: DisableTaskMgr

  - id: source-dump-disable-regtools
    desc: Source dump disables regedit
    crit: component
    conf: 0.94
    if:
      type: text
      word: DisableRegistryTools

  - id: source-dump-no-dispcpl
    desc: Source dump disables display CPL
    crit: component
    conf: 0.92
    if:
      type: text
      word: NoDispCPL

  - id: source-dump-no-control-panel
    desc: Source dump disables Control Panel
    crit: component
    conf: 0.93
    if:
      type: text
      word: NoControlPanel

  - id: source-dump-no-run
    desc: Source dump disables Run
    crit: component
    conf: 0.92
    if:
      type: text
      word: NoRun

  - id: source-dump-no-find
    desc: Source dump disables Find
    crit: component
    conf: 0.92
    if:
      type: text
      word: NoFind

  - id: source-dump-no-desktop
    desc: Source dump disables desktop
    crit: component
    conf: 0.92
    if:
      type: text
      word: NoDesktop

  - id: source-dump-systemrestore-path
    desc: Source dump targets SystemRestore
    crit: component
    conf: 0.92
    if:
      type: text
      substr: CurrentVersion\SystemRestore

  - id: source-dump-disable-sr
    desc: Source dump disables restore
    crit: component
    conf: 0.92
    if:
      type: text
      word: DisableSR

  - id: source-dump-copy-system-exe
    desc: Source dump copies system exe
    crit: component
    conf: 0.93
    if:
      type: text
      regex: '(?i)Copy file[\s\S]{0,180}C:\\\\WINDOWS\\\\[^<\r\n]{0,80}\.exe'

  - id: source-dump-runkey-path
    desc: Source dump references Run key
    crit: component
    conf: 0.9
    if:
      type: text
      substr: CurrentVersion\Run

composite_rules:
  - id: source-dump-admin-tool-lockout
    desc: Source dump locks admin tools
    crit: suspicious
    conf: 0.96
    all:
      - id: source-dump-disable-taskmgr
      - id: source-dump-disable-regtools
    any:
      - id: source-dump-no-dispcpl

  - id: source-dump-explorer-shell-lockout
    desc: Source dump locks Explorer
    crit: suspicious
    conf: 0.96
    all:
      - id: source-dump-no-control-panel
      - id: source-dump-no-run
    any:
      - id: source-dump-no-find
      - id: source-dump-no-desktop

  - id: source-dump-system-restore-disable
    desc: Source dump disables restore
    crit: suspicious
    conf: 0.95
    all:
      - id: source-dump-systemrestore-path
      - id: source-dump-disable-sr

  - id: source-dump-runkey-persistence
    desc: Source dump Run persistence
    crit: suspicious
    conf: 0.95
    all:
      - id: source-dump-copy-system-exe
      - id: source-dump-runkey-path

  - id: source-dump-windows-policy-lockout
    desc: Source dump policy lockout
    crit: hostile
    conf: 0.98
    all:
      - id: source-dump-admin-tool-lockout
      - id: source-dump-explorer-shell-lockout
    any:
      - id: source-dump-system-restore-disable
      - id: source-dump-runkey-persistence

  - id: source-dump-policy-lockout-persistence
    desc: Source dump lockout persistence
    crit: hostile
    conf: 0.98
    all:
      - id: source-dump-admin-tool-lockout
      - id: source-dump-runkey-persistence
    any:
      - id: source-dump-explorer-shell-lockout
      - id: source-dump-system-restore-disable
