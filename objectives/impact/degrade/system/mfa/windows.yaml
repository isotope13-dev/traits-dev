defaults:
  platforms: [windows]
  for: [batch, powershell]
traits:
  - id: duo-windows-logon
    desc: Duo Windows Logon product target
    crit: component
    attack: T1562
    if:
      type: text
      regex: (?i)Duo Authentication for Windows Logon x64
  - id: wmic-product-uninstall
    desc: WMIC product uninstall command
    crit: notable
    attack: T1562
    if:
      type: text
      regex: (?i)wmic\s+product\s+where\s+.{0,120}\s+call\s+uninstall\b
  - id: uninstall-nointeractive
    desc: Noninteractive uninstall switch
    crit: component
    attack: T1562
    if:
      type: text
      regex: (?i)/nointeractive\b
  - id: msiexec-product-uninstall
    desc: MsiExec product uninstall
    crit: notable
    attack: T1562
    if:
      type: text
      regex: (?i)\bmsiexec\s+/X\s+[A-Za-z0-9{}-]{8,}\b
  - id: schtasks-system-once
    desc: Scheduled task as SYSTEM once
    crit: suspicious
    attack: T1053.005
    if:
      type: text
      regex: (?i)schtasks\s+.{0,220}/RU\s+\"?SYSTEM\"?.{0,220}/create.{0,220}/sc\s+ONCE\b
  - id: mfa-uninstall-task-name
    desc: WindowsSensor scheduled task name
    crit: component
    if:
      type: text
      regex: (?i)/tn\s+\"?WindowsSensor\d+\"?
composite_rules:
  - id: wmic-mfa-uninstall
    desc: WMIC MFA uninstall command
    crit: suspicious
    conf: 0.92
    all:
      - id: duo-windows-logon
      - id: wmic-product-uninstall
      - id: uninstall-nointeractive
  - id: windows-mfa-uninstall
    desc: Windows MFA product uninstall
    crit: suspicious
    conf: 0.93
    all:
      - id: duo-windows-logon
    any:
      - id: wmic-mfa-uninstall
      - id: msiexec-product-uninstall
  - id: scheduled-system-mfa-uninstall
    desc: SYSTEM scheduled MFA uninstall
    crit: hostile
    conf: 0.95
    all:
      - id: windows-mfa-uninstall
      - id: schtasks-system-once
    any:
      - id: mfa-uninstall-task-name
      - id: wmic-product-uninstall
  - id: mfa-uninstall-chain
    desc: MFA uninstall defense evasion chain
    crit: hostile
    conf: 0.96
    all:
      - id: windows-mfa-uninstall
    any:
      - id: scheduled-system-mfa-uninstall
      - id: wmic-mfa-uninstall
      - id: msiexec-product-uninstall
    needs: 2
