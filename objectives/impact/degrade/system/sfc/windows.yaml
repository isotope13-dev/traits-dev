defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
    - vbs
traits:
  - id: sfc-is-file-protected
    desc: Queries Windows file protection
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: SfcIsFileProtected
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-windows
  - id: sfc-avoidance-comment
    desc: Skips files protected by SFC
    crit: suspicious
    conf: 0.95
    for:
      - c
    if:
      type: string_literal
      substr: no infect files protected by SFC
