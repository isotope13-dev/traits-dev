defaults:
  for: [pe]
  platforms: [windows]
  attack: T1112
traits:
  - id: policies-explorer-path
    desc: Explorer policies registry path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: Software\Microsoft\Windows\CurrentVersion\Policies\Explorer
  - id: no-folder-options
    desc: NoFolderOptions policy value
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: NoFolderOptions
composite_rules:
  - id: explorer-policy-lockout
    desc: Locks Explorer recovery controls by policy
    crit: hostile
    conf: 0.98
    all:
      - id: policies-explorer-path
      - id: no-folder-options
      - id: objectives/impact/degrade/system::disable-registry-tools
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
