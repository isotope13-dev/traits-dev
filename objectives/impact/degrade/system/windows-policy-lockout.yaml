defaults:
  for: [pe]
  platforms: [windows]
  attack: T1112
traits:
  - id: no-folder-options
    desc: NoFolderOptions policy value
    crit: component
    conf: 0.96
    if:
      type: text
      exact: NoFolderOptions
composite_rules:
  - id: explorer-policy-lockout
    desc: Locks Explorer recovery controls by policy
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/text::policies-explorer-path
      - id: no-folder-options
      - id: objectives/impact/degrade/system::disable-registry-tools
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
