defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, xpi, zip]
  attack: T1485

composite_rules:
  - id: browser-extension-indexeddb-wipe
    desc: Browser extension enumerates and deletes IndexedDB stores
    crit: hostile
    conf: 0.97
    scope: archive
    all:
      - id: metadata/permission/runtime::is-extension
      - id: micro-behaviors/data/db/web-storage::indexeddb-databases-enumerate
      - id: micro-behaviors/data/db/web-storage::indexeddb-delete-database
