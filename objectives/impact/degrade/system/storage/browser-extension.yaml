defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, xpi, zip]
  attack: T1485

traits:
  - id: indexeddb-enumerate-for-delete
    desc: Enumerates IndexedDB databases for deletion
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: 'indexedDB\.databases\s*\(\s*\)[\s\S]{0,700}(forEach|map)'
  - id: indexeddb-delete-enumerated-name
    desc: Deletes an IndexedDB database by enumerated name
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: 'indexedDB\.deleteDatabase\s*\(\s*[$A-Za-z_]\w*\s*\.\s*name\s*\)'

composite_rules:
  - id: browser-extension-indexeddb-wipe
    desc: Browser extension enumerates and deletes IndexedDB stores
    crit: hostile
    conf: 0.97
    scope: archive
    near_bytes: 1000
    all:
      - id: metadata/permission/runtime::is-extension
      - id: indexeddb-enumerate-for-delete
      - id: indexeddb-delete-enumerated-name
