defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1112"
traits:
  - id: systemrestore-policy-path
    desc: System Restore policy registry path
    crit: suspicious
    conf: 0.94
    if:
      type: string_literal
      exact: HKEY_Local_Machine\\Software\\Policies\\Microsoft\\Windows NT\\SystemRestore
  - id: disableconfig-literal
    desc: DisableConfig string literal
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      exact: DisableConfig
  - id: disablesr-literal
    desc: DisableSR string literal
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      exact: DisableSR
  - id: srclient-dll-reference
    desc: System Restore client DLL reference
    crit: component
    conf: 0.94
    for: [pe, dll, c, cpp]
    attack: "T1490"
    if:
      type: text
      substr: srclient.dll
    unless:
      - id: metadata/lang/source::wine-compat-source
      - id: metadata/binary/vendor::python-software-foundation-marker
      - id: metadata/signed/developer::python-software-foundation
      - id: metadata/signed/leaf::python-software-foundation
  - id: sr-remove-restore-point
    desc: Removes Windows restore points
    crit: component
    conf: 0.96
    for: [pe, dll, c, cpp]
    attack: "T1490"
    if:
      type: text
      word: SRRemoveRestorePoint
    unless:
      - type: basename
        regex: '(?i)\.(h|hh|hpp|hxx)$'
      - id: metadata/lang/source::wine-compat-source
  - id: sr-set-restore-point
    desc: Sets Windows restore point sequence
    crit: notable
    conf: 0.9
    for: [pe, dll, c, cpp]
    attack: "T1490"
    if:
      type: text
      substr: SRSetRestorePoint
  - id: nsis-sysrestore-plugin-basename
    desc: NSIS System Restore plugin basename
    crit: component
    conf: 0.94
    for: [pe, dll]
    attack: "T1490"
    size_min: 4096
    size_max: 16384
    if:
      type: basename
      exact: SysRestore.dll
composite_rules:
  - id: disableconfig-name
    desc: DisableConfig policy value
    crit: suspicious
    conf: 0.92
    all:
      - id: systemrestore-policy-path
      - id: disableconfig-literal
  - id: disablesr-name
    desc: DisableSR policy value
    crit: suspicious
    conf: 0.92
    all:
      - id: systemrestore-policy-path
      - id: disablesr-literal
  - id: disable-system-restore
    desc: Disables Windows System Restore via registry policy
    crit: hostile
    conf: 0.98
    all:
      - id: systemrestore-policy-path
      - id: micro-behaviors/os/registry/manipulate::set-value
    any:
      - id: disableconfig-name
      - id: disablesr-name
    needs: 2
  - id: nsis-sysrestore-plugin-helper
    desc: NSIS System Restore plugin helper
    crit: baseline
    conf: 0.96
    for: [pe, dll]
    attack: "T1490"
    all:
      - id: nsis-sysrestore-plugin-basename
      - id: srclient-dll-reference
      - id: sr-set-restore-point
  - id: native-restore-point-deletion
    desc: Native Windows restore point deletion
    crit: hostile
    conf: 0.98
    for: [pe, dll, c, cpp]
    attack: "T1490"
    all:
      - id: srclient-dll-reference
      - id: sr-remove-restore-point
    any:
      - id: sr-set-restore-point
      - id: micro-behaviors/dylib/load/runtime::load-library-a
      - id: micro-behaviors/dylib/load/source::load-library-source
    unless:
      - id: metadata/lang/source::wine-compat-source
      - id: metadata/binary/vendor::windows-system-implementer-dll
      - id: well-known/app/wireshark::wireshark-official-installer-context
      - id: nsis-sysrestore-plugin-helper
