defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1112"
traits:
  - id: systemrestore-policy-path
    desc: System Restore policy registry path
    crit: suspicious
    conf: 0.94
    if:
      type: string_literal
      exact: HKEY_Local_Machine\\Software\\Policies\\Microsoft\\Windows NT\\SystemRestore
  - id: disableconfig-literal
    desc: DisableConfig string literal
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      exact: DisableConfig
  - id: disablesr-literal
    desc: DisableSR string literal
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      exact: DisableSR
  - id: srclient-dll-reference
    desc: System Restore client DLL reference
    crit: suspicious
    conf: 0.94
    for: [pe, dll, c, cpp]
    attack: "T1490"
    if:
      type: text
      substr: srclient.dll
    unless:
      - id: metadata/lang/source::wine-compat-source
  - id: sr-remove-restore-point
    desc: Removes Windows restore points
    crit: suspicious
    conf: 0.96
    for: [pe, dll, c, cpp]
    attack: "T1490"
    if:
      type: text
      substr: SRRemoveRestorePoint
    unless:
      - id: metadata/lang/source::wine-compat-source
  - id: sr-set-restore-point
    desc: Sets Windows restore point sequence
    crit: notable
    conf: 0.9
    for: [pe, dll, c, cpp]
    attack: "T1490"
    if:
      type: text
      substr: SRSetRestorePoint
composite_rules:
  - id: disableconfig-name
    desc: DisableConfig policy value
    crit: suspicious
    conf: 0.92
    all:
      - id: systemrestore-policy-path
      - id: disableconfig-literal
  - id: disablesr-name
    desc: DisableSR policy value
    crit: suspicious
    conf: 0.92
    all:
      - id: systemrestore-policy-path
      - id: disablesr-literal
  - id: disable-system-restore
    desc: Disables Windows System Restore via registry policy
    crit: hostile
    conf: 0.98
    all:
      - id: systemrestore-policy-path
      - id: micro-behaviors/os/registry/manipulate::set-value
    any:
      - id: disableconfig-name
      - id: disablesr-name
    needs: 2
  - id: native-restore-point-deletion
    desc: Native Windows restore point deletion
    crit: hostile
    conf: 0.98
    for: [pe, dll, c, cpp]
    attack: "T1490"
    all:
      - id: srclient-dll-reference
      - id: sr-remove-restore-point
    any:
      - id: sr-set-restore-point
      - id: micro-behaviors/dylib/load/runtime::load-library-a
      - id: micro-behaviors/dylib/load/source::load-library-source
    unless:
      - id: metadata/lang/source::wine-compat-source
