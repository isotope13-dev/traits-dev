defaults:
  platforms: [windows]
  for: [pe]
  attack: T1489

composite_rules:
  - id: kernel-driver-process-killer
    desc: Kernel driver kills user processes
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/resource::kernel-driver-init
      - id: micro-behaviors/os/kernel/device::userland-device-bridge
      - id: micro-behaviors/process/terminate/kill::zw-process-kill-chain
