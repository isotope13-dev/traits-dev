defaults:
  platforms: [windows]
  for: [pe]
  attack: T1489

composite_rules:
  - id: native-module-aware-process-killer
    desc: Native driver combines kernel module inspection with process termination
    crit: suspicious
    conf: 0.99
    all:
      - id: micro-behaviors/os/kernel/module::native-kernel-api-context
      - id: micro-behaviors/os/kernel/module::loaded-module-list-reference
      - id: micro-behaviors/os/kernel/routines::export-routine-lookup
      - id: micro-behaviors/os/kernel/routines::dynamic-resolution
      - id: micro-behaviors/process/terminate/kill::kernel-terminate-process-reference
  - id: kernel-driver-process-killer
    desc: Kernel driver kills user processes
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/resource::kernel-driver-init
      - id: micro-behaviors/os/kernel/device::userland-device-bridge
      - id: micro-behaviors/process/terminate/kill::zw-process-kill-chain
