defaults:
  platforms: [windows]
  for: [batch]

traits:
  - id: batch-del-call
    desc: Batch calls del
    crit: component
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '(?i)^del$'

  - id: batch-reg-call
    desc: Batch calls reg
    crit: component
    conf: 0.85
    attack: T1112
    if:
      type: symbol
      kind: call
      regex: '(?i)^reg$'

  - id: batch-deletes-hal-dll
    desc: Batch deletes HAL DLL
    crit: suspicious
    conf: 0.98
    attack: T1485
    if:
      type: text
      regex: '(?i)\bdel\b[^\r\n]{0,120}\\windows\\system32\\hal\.dll\b'

  - id: batch-deletes-system-drivers
    desc: Batch deletes Windows system drivers
    crit: suspicious
    conf: 0.98
    attack: T1485
    if:
      type: text
      regex: '(?i)\bdel\b[^\r\n]{0,160}\\System32\\Drivers\\\*\.\*'

  - id: batch-run-key-var-assignment
    desc: Batch assigns Run key to variable
    crit: suspicious
    conf: 0.96
    attack: T1547.001
    if:
      type: text
      regex: '(?i)set\s+[A-Za-z0-9_]{3,}\s*=\s*HK[CLU]M\\.{0,50}\\CurrentVersion\\Run'

  - id: batch-reg-add-var-run-key
    desc: Batch reg add uses variable key
    crit: component
    conf: 0.9
    attack: T1547.001
    if:
      type: text
      regex: '(?i)\breg\s+add\s+"?%[A-Za-z0-9_]{3,}%"?'

  - id: batch-reg-add-run-key-direct
    desc: Batch reg add uses Run key
    crit: suspicious
    conf: 0.94
    attack: T1547.001
    if:
      type: text
      regex: '(?i)\breg\s+add\b[^\r\n]{0,120}\\CurrentVersion\\Run\b'
    unless:
      - id: metadata/file/string/identity::windows11-defender-disable-tweak

  - id: batch-reg-data-self-path
    desc: Batch stores self path in registry
    crit: suspicious
    conf: 0.94
    attack: T1547.001
    if:
      type: text
      regex: '(?i)/d\s+%0\b'

  - id: batch-delete-hidden-wmpmedia-service-binary
    desc: Batch deletes hidden WMP service binary
    crit: suspicious
    conf: 0.95
    attack: T1485
    if:
      type: text
      regex: '(?i)\bdel\b[^\r\n]{0,40}/A:H[^\r\n]{0,160}\\Windows Media Player\\WMPMediaSharing\.exe'

  - id: batch-delete-wmpmedia-sharing-service
    desc: Batch deletes WMPMediaSharing service
    crit: suspicious
    conf: 0.95
    attack: T1489
    if:
      type: text
      regex: '(?i)\bsc\s+delete\s+WMPMediaSharing\b'

  - id: batch-mountvol-remove-c
    desc: Batch removes C drive mount
    crit: suspicious
    conf: 0.98
    attack: T1485
    if:
      type: text
      regex: '(?i)\bmountvol\s+C:\s+/D\b'

  - id: batch-renames-vir-to-exe
    desc: Batch renames VIR to EXE
    crit: suspicious
    conf: 0.92
    attack: T1036
    if:
      type: text
      regex: '(?i)(\*\.vir.{0,80}\bren\b|\bren\b.{0,80}\*\.vir).{0,80}\.exe\b'

  - id: batch-starts-payload-exe
    desc: Batch starts payload.exe
    crit: suspicious
    conf: 0.9
    attack: T1204.002
    if:
      type: text
      regex: '(?i)\bstart\b[^\r\n]{0,40}\bpayload\.exe\b'

  - id: batch-deletes-desktop-exe
    desc: Batch deletes Desktop EXE
    crit: suspicious
    conf: 0.92
    attack: T1485
    if:
      type: text
      regex: '(?i)\bdel\b[^\r\n]{0,80}\\Desktop\\[^\r\n]{1,80}\.EXE\b'

  - id: batch-delete-exists-loop
    desc: Batch loops while file exists
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bif\s+exist\b[^\r\n]{0,80}\bgoto\s+[A-Za-z0-9_-]+\b'
    unless:
      - id: well-known/tool/development/gradle-wrapper::windows-gradle-wrapper

  - id: batch-deletes-temp-bat
    desc: Batch deletes temp BAT
    crit: suspicious
    conf: 0.9
    attack: T1070.004
    if:
      type: text
      regex: '(?i)\bdel\b[^\r\n]{0,80}\\Temp\\[A-Za-z0-9_.-]+\.bat\b'

composite_rules:
  - id: batch-critical-windows-file-delete
    desc: Batch deletes critical Windows files
    crit: suspicious
    conf: 0.98
    any:
      - id: batch-deletes-hal-dll
      - id: batch-deletes-system-drivers

  - id: batch-direct-run-key-self-persistence
    desc: Batch direct Run-key self persistence
    crit: suspicious
    conf: 0.96
    all:
      - id: batch-reg-add-run-key-direct
      - id: batch-reg-data-self-path

  - id: batch-var-run-key-self-persistence
    desc: Batch variable Run-key self persistence
    crit: suspicious
    conf: 0.96
    all:
      - id: batch-run-key-var-assignment
      - id: batch-reg-add-var-run-key
      - id: batch-reg-data-self-path

  - id: batch-runkey-critical-file-destruction
    desc: Batch Run-key critical file destruction
    crit: hostile
    conf: 0.99
    all:
      - id: batch-del-call
      - id: batch-reg-call
      - id: batch-critical-windows-file-delete
    any:
      - id: batch-direct-run-key-self-persistence
      - id: batch-var-run-key-self-persistence

  - id: batch-wmpmedia-service-binary-destruction
    desc: Batch removes WMPMediaSharing service binaries
    crit: hostile
    conf: 0.98
    all:
      - id: batch-delete-hidden-wmpmedia-service-binary
      - id: batch-delete-wmpmedia-sharing-service

  - id: batch-c-drive-mount-removal
    desc: Batch C drive mount removal
    crit: hostile
    conf: 0.98
    all:
      - id: batch-mountvol-remove-c
      - id: metadata/file/metrics::file-under-12-lines

  - id: batch-desktop-exe-delete-loop
    desc: Batch Desktop EXE delete loop
    crit: hostile
    conf: 0.98
    all:
      - id: batch-deletes-desktop-exe
      - id: batch-delete-exists-loop
    any:
      - id: batch-deletes-temp-bat
      - id: micro-behaviors/fs/file/delete::del-command

  - id: batch-vir-extension-restore
    desc: Batch VIR extension restore
    crit: suspicious
    conf: 0.94
    all:
      - id: batch-renames-vir-to-exe
      - id: metadata/file/metrics::file-under-12-lines

  - id: batch-payload-exe-launcher
    desc: Batch payload EXE launcher
    crit: suspicious
    conf: 0.94
    all:
      - id: batch-starts-payload-exe
      - id: objectives/command-and-control/dropper/execution/batch::start-exe
