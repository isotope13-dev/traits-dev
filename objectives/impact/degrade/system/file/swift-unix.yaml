defaults:
  platforms: [unix]
  for: [swift]
  attack: T1499

traits:
  - id: swift-degrade-junk-dir
    desc: Swift degrade junk directory
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/degrade_junk
  - id: swift-crontab-remove-command
    desc: Swift removes user crontab
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: crontab -r

composite_rules:
  - id: swift-disk-fill-and-cron-removal
    desc: Swift disk fill and cron removal
    crit: hostile
    conf: 0.96
    all:
      - id: swift-degrade-junk-dir
      - id: swift-crontab-remove-command
