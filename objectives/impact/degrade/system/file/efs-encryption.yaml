defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1486
composite_rules:
  - id: efs-encrypt-windows-setup-state
    desc: Encrypts Windows setup state file
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/fs/file/encrypt
      - id: micro-behaviors/fs/path/system::windows-setup-state-ini-path
    any:
      - id: micro-behaviors/os/module/load::advapi32-dll-reference
      - id: micro-behaviors/os/module/load::get-proc-address-import
    unless:
      - id: metadata/signed/platform::microsoft
