defaults:
  platforms: [openbsd, bsd, unix]
  for: [python]
  attack: T1490

traits:
  - id: python-openbsd-log-fill
    desc: Python OpenBSD log fill
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: fill /var/log

  - id: python-openbsd-newsyslog-cron
    desc: Python OpenBSD log cron damage
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: /etc/newsyslog\.conf[\s\S]{0,220}/etc/crontab

composite_rules:
  - id: python-openbsd-system-degrade
    desc: Python OpenBSD system degrade
    crit: hostile
    conf: 0.98
    all:
      - id: python-openbsd-log-fill
      - id: python-openbsd-newsyslog-cron
