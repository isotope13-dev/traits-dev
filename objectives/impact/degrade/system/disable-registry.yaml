# Defense Impairment - Disable Registry Editor
# Prevents users from accessing regedit to undo malware changes
# ATT&CK: T1112 (Modify Registry)
defaults:
  platforms: [windows]
  for: [pe, powershell, batch, vbs]
  attack: "T1112"
traits:
  - id: disable-registry-tools
    desc: References DisableRegistryTools policy key
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: DisableRegistryTools
