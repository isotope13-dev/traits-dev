defaults:
  platforms: [netbsd, unix]
  for: [c, cpp, elf]
  attack: T1499

traits:
  # Grabbing keyboard+pointer is a legit X11 capability (terminal emulators like
  # alacritty, screen lockers, password prompts, games). Building block for the
  # composite below, which adds the "!!! SYSTEM COMPROMISED !!!" lock-screen alert.
  - id: native-x11-keyboard-pointer-grab
    desc: Native X11 keyboard pointer grab
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'XGrabKeyboard[\s\S]{0,260}XGrabPointer'

  - id: native-system-compromised-alert
    desc: Native compromised alert
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "!!! SYSTEM COMPROMISED !!!"

composite_rules:
  - id: native-x11-system-lockout
    desc: Native X11 system lockout
    crit: hostile
    conf: 0.98
    all:
      - id: native-x11-keyboard-pointer-grab
      - id: native-system-compromised-alert
