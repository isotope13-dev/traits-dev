defaults:
  platforms: [windows]
  for: [batch]
  attack: T1499
traits:
  - id: batch-repeated-start-call
    desc: Batch repeatedly starts GUI process
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: start
    count_min: 8

  - id: batch-start-spam
    desc: Batch start command spam
    crit: suspicious
    conf: 0.96
    count_min: 20
    if:
      type: text
      regex: '(?im)^\s*start\s*$'

  - id: batch-empty-start-loop
    desc: Batch empty start loop
    crit: suspicious
    conf: 0.94
    count_min: 4
    if:
      type: text
      regex: '(?im)^\s*start\s*$'

  - id: batch-start-shutdown
    desc: Batch starts system shutdown
    crit: suspicious
    conf: 0.96
    attack: T1529
    if:
      type: text
      regex: '(?i)\bstart\b[^\r\n]{0,40}\bshutdown\b[^\r\n]{0,80}/s\b'

  - id: batch-mspaint-loop
    desc: Batch loops mspaint launch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?is)^:[A-Za-z0-9_-]+\s+start\s+mspaint\b.{0,80}goto\s+[A-Za-z0-9_-]+'

  - id: batch-desktop-policy-disable
    desc: Batch writes Explorer policy path
    crit: suspicious
    conf: 0.94
    attack: T1112
    if:
      type: text
      regex: '(?i)reg\s+add\s+HKCU\\.{0,50}\\Policies\\Explorer\b'

  - id: batch-nodesktop-policy-value
    desc: Batch sets NoDesktop policy value
    crit: suspicious
    conf: 0.94
    attack: T1112
    if:
      type: text
      regex: '(?i)/v\s+NoDesktop\b'

  - id: batch-file-association-disruption
    desc: Batch disrupts Windows file association
    crit: suspicious
    conf: 0.9
    attack: T1112
    if:
      type: text
      regex: '(?im)^\s*assoc\s+\.[A-Za-z0-9]{1,8}='

    unless:
    - id: well-known/lib/wine::wine-source-tree
    - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
  - id: batch-multi-gui-loop
    desc: Batch loops GUI launches
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?is)^:[A-Za-z0-9_-]+\s+start\s+explorer\s+start\s+notepad\s+start\s+mspaint'

  - id: batch-goto-short-label
    desc: Batch goto short label
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(?im)^\s*goto\s+[A-Za-z]\b'

  - id: batch-cursor-delete
    desc: Batch deletes Windows cursors
    crit: suspicious
    conf: 0.92
    attack: T1485
    if:
      type: text
      regex: '(?i)\bdel\b[^\r\n]{0,80}%SystemRoot%[\\/]Cursors[\\/]\*\.\*'

  - id: batch-svchost-kill-flood
    desc: Batch svchost kill flood
    crit: suspicious
    conf: 0.96
    count_min: 3
    if:
      type: text
      regex: '(?i)\bsvchost\.exe\b'

composite_rules:
  - id: batch-desktop-disruption-loop
    desc: Batch desktop disruption loop
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/terminate/command::taskkill-explorer-force
      - id: micro-behaviors/data/control-flow/loop::batch-goto-chaos-loop
      - id: micro-behaviors/process/daemonize/spawn::batch-start-minimized

  - id: batch-nuisance-desktop-policy-disruption
    desc: Batch nuisance desktop policy disruption
    crit: hostile
    conf: 0.97
    all:
      - id: batch-mspaint-loop
      - id: batch-desktop-policy-disable
      - id: batch-nodesktop-policy-value
    needs: 2
    any:
      - id: batch-file-association-disruption
      - id: batch-cursor-delete
      - id: micro-behaviors/process/create/shell/script-host::rundll32-exec
      - id: micro-behaviors/fs/file/delete::del-command

  - id: batch-gui-launch-loop-disruption
    desc: Batch GUI launch loop disruption
    crit: hostile
    conf: 0.98
    all:
      - id: batch-multi-gui-loop
      - id: batch-goto-short-label

  - id: batch-empty-start-loop-disruption
    desc: Batch empty start loop disruption
    crit: hostile
    conf: 0.96
    all:
      - id: batch-empty-start-loop
      - id: micro-behaviors/data/control-flow/loop::batch-label-loop
      - id: micro-behaviors/data/control-flow/loop::batch-goto-loop-command

  - id: batch-system-process-kill-loop
    desc: Batch system process kill loop
    crit: hostile
    conf: 0.98
    all:
      - id: batch-svchost-kill-flood
      - id: micro-behaviors/process/terminate/command::taskkill-svchost-force

  - id: batch-start-spam-desktop-disruption
    desc: Batch start-spam desktop disruption
    crit: hostile
    conf: 0.98
    all:
      - id: batch-repeated-start-call
      - id: batch-start-spam
    any:
      - id: batch-start-shutdown
      - id: metadata/file/metrics::file-has-30-plus-lines

  - id: batch-taskmgr-disable-process-disruption
    desc: Batch disables Task Manager during process disruption
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/impact/degrade/windows-policy::batch-reg-disable-taskmgr
      - id: batch-repeated-start-call
      - id: micro-behaviors/process/terminate/command::batch-taskkill-image-name
