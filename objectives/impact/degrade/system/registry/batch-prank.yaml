defaults:
  platforms: [windows]
  for: [batch]
  attack: "T1547.001, T1499"

traits:
  - id: batch-flat-run-key-path
    desc: Batch flattened Run key path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)hkey_(local_machine|current_user)softwaremicrosoftwindowscurrentversionrun'

  - id: batch-ipconfig-release-all
    desc: Batch releases all IP config
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bipconfig\s*/\s*release_all\b'

  - id: batch-hacked-message
    desc: Batch prints hacked message
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)You Have Been HACKED'

composite_rules:
  - id: batch-prank-runkey-network-disruption
    desc: Batch Run-key network disruption
    crit: hostile
    conf: 0.98
    all:
      - id: batch-flat-run-key-path
      - id: batch-ipconfig-release-all
      - id: batch-hacked-message
