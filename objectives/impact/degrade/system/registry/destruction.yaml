defaults:
  platforms: [windows]
  for: [pe, batch, powershell]
  attack: T1112
traits:
  - id: reg-delete-hkcr-force
    desc: Forced HKCR registry deletion
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\breg(\.exe)?\s+delete\s+HKCR\s+/f\b'
composite_rules:
  - id: elevated-hkcr-registry-destruction
    desc: Elevated HKCR registry destruction
    crit: hostile
    conf: 0.98
    all:
      - id: reg-delete-hkcr-force
      - id: micro-behaviors/os/privilege/elevation::runas-string
