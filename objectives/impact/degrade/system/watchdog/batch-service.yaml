defaults:
  platforms: [windows]
  for: [batch]
  attack: T1499

traits:
  - id: caret-tasklist-findstr-loop
    desc: Caret tasklist findstr loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)t\^a\^s\^k\^l\^i\^s\^t.{0,80}f\^i\^n\^d\^s\^t\^r'

  - id: shadowcopyprovider-service-name
    desc: ShadowCopyProvider-like service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: MicrosoftSoftware2ShadowCop4yProvider

  - id: caret-sc-start-service
    desc: Caret-obfuscated sc start
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bs\^c\s+start\b|\bs\s*\^\s*c\s+start\b'

composite_rules:
  - id: batch-obfuscated-service-watchdog
    desc: Obfuscated batch service watchdog
    crit: hostile
    conf: 0.98
    all:
      - id: caret-tasklist-findstr-loop
      - id: shadowcopyprovider-service-name
      - id: caret-sc-start-service
