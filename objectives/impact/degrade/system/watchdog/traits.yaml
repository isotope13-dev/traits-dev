defaults:
  platforms: [linux, unix, android]
  for: [elf]
traits: []
composite_rules:
  - id: watchdog-config-target
    desc: Watchdog config or service path
    crit: notable
    conf: 0.86
    any:
      - id: micro-behaviors/fs/path/config/system::config-watchdog-default
      - id: micro-behaviors/fs/path/config/system::config-watchdog-default-xor14
      - id: micro-behaviors/fs/path/system::sbin-watchdog
      - id: micro-behaviors/fs/path/system::sbin-watchdog-xor14
  - id: watchdog-recovery-targeting
    desc: Targets watchdog-based system recovery
    crit: suspicious
    conf: 0.93
    attack: T1499
    all:
      - id: micro-behaviors/fs/path/device/special::watchdog-device
      - id: watchdog-config-target
  - id: watchdog-recovery-targeting-obfuscated
    desc: Obfuscated watchdog recovery targeting
    crit: suspicious
    conf: 0.95
    attack: T1027
    all:
      - id: watchdog-recovery-targeting
      - id: objectives/anti-static/obfuscation/encoding/xor::xor-obfuscated-linux-runtime-paths
  - id: watchdog-backed-telnet-backdoor
    desc: Watchdog-backed telnet backdoor
    crit: hostile
    conf: 0.98
    attack: T1499
    all:
      - id: watchdog-recovery-targeting
      - id: objectives/command-and-control/backdoor/daemon::telnet-backdoor-setup
      - id: objectives/command-and-control/botnet/iot::busybox
