defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1499

traits: []

composite_rules:
  - id: array-prototype-api-sabotage
    desc: Removes Array.push and freezes its prototype
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/data/source/prototype::array-push-disabled
      - id: micro-behaviors/data/source/prototype::array-prototype-freeze
