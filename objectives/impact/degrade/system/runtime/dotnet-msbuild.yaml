defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1489

composite_rules:
  - id: dotnet-msbuild-process-killer
    desc: .NET helper terminates MSBuild processes
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/terminate/kill::dotnet-msbuild-kill-capability
      - id: micro-behaviors/process/terminate/kill::dotnet-msbuild-killer-helper-class

  - id: dotnet-msbuild-library-sabotage
    desc: Legacy .NET library embeds an MSBuild termination helper
    crit: hostile
    conf: 0.99
    all:
      - id: dotnet-msbuild-process-killer
      - id: well-known/lib/dotnetex::dotnetex-library
