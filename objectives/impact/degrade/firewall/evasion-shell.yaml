defaults:
  crit: suspicious
  attack: T1562.004
  for: [scripts, binaries]
  platforms:
    - unix
traits:
  - id: iptables-policy-accept
    desc: iptables policy set to ACCEPT
    crit: suspicious
    conf: 0.95
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: objectives/impact/degrade/firewall::openvpn-sample-firewall-script
    if:
      type: text
      regex: iptables\s+(-P|--policy)\s+(INPUT|OUTPUT)\s+ACCEPT
  - id: ip6tables-policy-accept
    desc: ip6tables policy set to ACCEPT
    crit: suspicious
    conf: 0.95
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    if:
      type: text
      regex: ip6tables\s+(-P|--policy)\s+(INPUT|OUTPUT)\s+ACCEPT
  - id: ufw-disable
    desc: UFW firewall disabled
    crit: suspicious
    conf: 0.95
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    if:
      type: text
      regex: ufw\s+disable
  - id: nft-flush
    desc: nftables flush ruleset
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: nft\s+flush\s+ruleset
  - id: netsh-firewall-off
    desc: Windows firewall disabled via netsh
    crit: suspicious
    conf: 0.95
    platforms:
      - windows
    if:
      type: text
      regex: netsh.{0,50}firewall.{0,30}(off|disable)
    unless:
      - id: well-known/app/samba::samba-source-tree
      - id: well-known/app/aui-agent-builder/
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
composite_rules:
  - id: iptables-policy-accept-any
    desc: iptables policy set to ACCEPT
    crit: suspicious
    conf: 0.95
    any:
      - id: iptables-policy-accept
      - id: ip6tables-policy-accept
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: firewall-disabled
    desc: System firewall disabled
    crit: suspicious
    conf: 0.95
    mbc: F0004
    any:
      - id: iptables-policy-accept
      - id: ip6tables-policy-accept
      - id: ufw-disable
      - id: micro-behaviors/os/firewall/firewalld::firewalld-stop
      - id: nft-flush
      - id: netsh-firewall-off
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: micro-behaviors/os/firewall/firewalld::vagrant-test-firewalld-stop
  - id: firewall-rules-cleared
    desc: Firewall rules flushed/cleared
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/os/firewall/iptables::iptables-flush-flag
      - id: micro-behaviors/os/firewall/iptables::iptables-delete-chain-flag
      - id: nft-flush
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/app/anthropic-claude-code
