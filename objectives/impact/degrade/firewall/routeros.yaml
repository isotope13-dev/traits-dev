defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, javascript]
  attack: T1562.004

traits:
  - id: routeros-firewall-rule-flush
    desc: RouterOS firewall rule flush
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/ip firewall filter remove \[/ip firewall filter find\]'

  - id: routeros-firewall-nat-flush
    desc: RouterOS firewall NAT flush
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/ip firewall nat remove \[/ip firewall nat find\]'

  - id: routeros-allow-all-firewall
    desc: RouterOS allow-all firewall
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/ip firewall filter add chain=(input|forward)[^\n\r]{0,140}action=accept'

  - id: routeros-disable-drop-rules
    desc: RouterOS disables drop rules
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/ip firewall filter set[\s\S]{0,160}disabled=yes'

composite_rules:
  - id: routeros-firewall-opened
    desc: RouterOS firewall opened
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-allow-all-firewall
    any:
      - id: routeros-firewall-rule-flush
      - id: routeros-firewall-nat-flush
      - id: routeros-disable-drop-rules
