# Firewall disable via registry - Windows
# Disabling Windows firewall by modifying SharedAccess service
defaults:
  for: [c, cpp, pe, dll]
  platforms: [windows]
  attack: T1562.004
traits: []
composite_rules:
- id: shared-access-service-key
  desc: Firewall authorized apps registry write
  crit: component
  conf: 0.92
  all:
  - id: micro-behaviors/os/registry/access::windows-firewall-authorizedapps-path
  - id: micro-behaviors/os/registry/access::registry-set-value-api
  any:
  - id: micro-behaviors/os/registry/access::reg-open-key-w
  - id: micro-behaviors/os/registry/access::registry-create-key-api
