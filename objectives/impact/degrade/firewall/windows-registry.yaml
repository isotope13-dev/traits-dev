# Firewall disable via registry - Windows
# Disabling Windows firewall by modifying SharedAccess service
defaults:
  for: [c, cpp, pe, dll]
  platforms: [windows]
  attack: T1562.004
traits:
  - id: shared-access-service-key
    desc: SharedAccess firewall service registry key
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      word: "SharedAccess"
