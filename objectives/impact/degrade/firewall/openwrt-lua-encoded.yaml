defaults:
  platforms: [openwrt, unix]
  for: [lua]
  attack: T1562.004

composite_rules:
  - id: lua-hex-firewall-disable-stage
    desc: Lua hex firewall disable stage
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/encode/payload::large-hex-string-literal
      - id: metadata/lang/scripted::exec-dynamic-load
    any:
      - id: micro-behaviors/process/create/shell/hex::hex-encoded-iptables
      - id: micro-behaviors/process/create/shell/hex::hex-encoded-uci-firewall
    needs: 1
