defaults:
  platforms: [windows]
  for: [batch, powershell, scripts]
  attack: "T1562.004"
traits:
  - id: windows-firewall-profile-disable
    desc: Disable Windows firewall profiles
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: Set-NetFirewallProfile.{0,80}-Enabled\s+\$?False|advfirewall\s+set\s+allprofiles\s+state\s+off
      case_insensitive: true
