defaults:
  platforms: [windows]
  for: [batch, powershell, scripts, java, class, java_class]
  attack: "T1562.004"
traits:
- id: windows-firewall-profile-disable--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: Set-NetFirewallProfile.{0,80}-Enabled\s+\$?False
    case_insensitive: true
  count_max: 1004095
- id: windows-firewall-profile-disable--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: advfirewall\s+set\s+allprofiles\s+state\s+off
    case_insensitive: true
  count_max: 1004096
composite_rules:
- id: windows-firewall-profile-disable
  desc: Disable Windows firewall profiles
  crit: suspicious
  conf: 0.92
  unless:
  - id: well-known/app/samba::samba-source-tree
  - id: well-known/app/aui-agent-builder/
  - id: well-known/app/admintoolbox::endpoint-management-benign-context
  any:
  - id: windows-firewall-profile-disable--rx-1
  - id: windows-firewall-profile-disable--rx-2
