defaults:
  platforms: [junos, appliance, unix]
  for: [shell]
  attack: T1562.004

traits:
  - id: shell-pfctl-ipfw-flush
    desc: Shell flushes pfctl and ipfw
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'pfctl -F all[\s\S]{0,120}ipfw flush'
  - id: shell-route-interface-down
    desc: Shell removes route and downs ifaces
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'route delete default[\s\S]{0,240}ifconfig "\$iface" down'

composite_rules:
  - id: shell-junos-network-disruption
    desc: Shell Junos network disruption
    crit: hostile
    conf: 0.98
    all:
      - id: shell-pfctl-ipfw-flush
      - id: shell-route-interface-down
