defaults:
  platforms:
    - unix
  for: [scripts, binaries, c, cpp]
  attack: T1562.004
traits:
  - id: openvpn-sample-firewall-script
    desc: OpenVPN sample firewall script
    crit: component
    conf: 0.99
    for: [shell]
    if:
      type: text
      substr: A Sample OpenVPN-aware firewall.
  - id: github-actions-lxd-e2e-setup
    desc: GitHub Actions LXD e2e setup
    crit: component
    conf: 0.95
    for: [github-actions]
    if:
      type: path
      substr: actions/e2e-lxd-setup/action.yml
  - id: iptables-policy
    desc: iptables policy change
    crit: suspicious
    conf: 0.9
    unless:
      - id: openvpn-sample-firewall-script
      - type: basename
        regex: ^(setup|configure|init).*\.sh$
      - id: well-known/tool/detection/proxy-sandbox
      - type: text
        substr: Setup steps for local e2e testing environment
      - type: text
        substr: sudo systemctl stop docker
      - id: github-actions-lxd-e2e-setup
    if:
      type: text
      regex: (?im)(^|[;&|])\s*(sudo\s+)?iptables\s+(-P|--policy)
  - id: iptables-prerouting-redirect
    desc: iptables PREROUTING REDIRECT rule
    crit: suspicious
    conf: 0.9
    unless:
      - id: objectives/command-and-control/botnet/iot::busybox
    if:
      type: text
      regex: (?im)(^|[;&|])\s*(sudo\s+)?iptables.{0,100}PREROUTING.{0,100}REDIRECT
  - id: iptables-accept-dport
    desc: iptables opens inbound TCP port
    crit: suspicious
    conf: 0.86
    unless:
      - id: openvpn-sample-firewall-script
      - id: well-known/tool/detection/proxy-sandbox
      - id: well-known/app/aui-agent-builder/
      - id: well-known/app/anthropic-claude-code
      - id: well-known/app/openai-codex/
      - id: well-known/tool/sysadmin/alpine-packages::alpine-docker-machine-binary
    if:
      type: text
      regex: (?im)(^|[;&|])\s*(sudo\s+)?iptables.{0,60}--dport\s+[0-9]{2,5}.{0,30}ACCEPT
composite_rules:
  - id: iptables-manipulation
    desc: iptables rule manipulation
    crit: notable
    conf: 0.85
    unless:
      - id: openvpn-sample-firewall-script
      - id: well-known/tool/detection/proxy-sandbox
    any:
      - id: iptables-policy
      - id: iptables-accept-dport
      - id: micro-behaviors/os/firewall/iptables::iptables-flush-flag
      - id: micro-behaviors/os/firewall/iptables::iptables-delete-chain-flag
