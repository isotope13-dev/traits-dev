defaults:
  platforms:
    - unix
  for: [scripts, binaries, c, cpp]
  attack: T1562.004
traits:
  - id: openvpn-sample-firewall-script
    desc: OpenVPN sample firewall script
    crit: component
    conf: 0.99
    for: [shell]
    if:
      type: text
      substr: A Sample OpenVPN-aware firewall.
  - id: github-actions-lxd-e2e-setup
    desc: GitHub Actions LXD e2e setup
    crit: component
    conf: 0.95
    for: [github-actions]
    if:
      type: path
      substr: actions/e2e-lxd-setup/action.yml
  - id: iptables-prerouting-redirect
    desc: iptables PREROUTING REDIRECT rule
    crit: suspicious
    conf: 0.9
    unless:
      - id: micro-behaviors/fs/path/binary::bin-busybox-path
    if:
      type: text
      regex: (?im)(^|[;&|])\s*(sudo\s+)?iptables.{0,100}PREROUTING.{0,100}REDIRECT
