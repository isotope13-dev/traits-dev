defaults:
  platforms:
    - unix
  for: [scripts, binaries, c, cpp]
  attack: T1562.004
traits:
  - id: openvpn-sample-firewall-script
    desc: OpenVPN sample firewall script
    crit: component
    conf: 0.99
    for: [shell]
    if:
      type: text
      substr: A Sample OpenVPN-aware firewall.
  - id: iptables-policy
    desc: iptables policy change
    crit: suspicious
    conf: 0.9
    unless:
      - id: openvpn-sample-firewall-script
      - type: basename
        regex: ^(setup|configure|init).*\.sh$
      - id: well-known/tool/detection/proxy-sandbox
    if:
      type: text
      regex: iptables\s+(-P|--policy)
  - id: iptables-prerouting-redirect
    desc: iptables PREROUTING REDIRECT rule
    crit: suspicious
    conf: 0.9
    unless:
      - id: objectives/command-and-control/botnet/iot::busybox
    if:
      type: text
      regex: iptables\s+.{0,100}-t\s+nat\s+.{0,100}-A\s+PREROUTING\s+.{0,100}-j\s+REDIRECT
  - id: iptables-accept-dport
    desc: iptables opens inbound TCP port
    crit: suspicious
    conf: 0.86
    unless:
      - id: well-known/tool/detection/proxy-sandbox
    if:
      type: text
      regex: iptables.{0,60}--dport\s+[0-9]{2,5}.{0,30}ACCEPT
composite_rules:
  - id: iptables-manipulation
    desc: iptables rule manipulation
    crit: suspicious
    conf: 0.85
    unless:
      - id: openvpn-sample-firewall-script
      - id: well-known/tool/detection/proxy-sandbox
    any:
      - id: iptables-policy
      - id: iptables-accept-dport
      - id: micro-behaviors/os/firewall/iptables::iptables-flush-flag
      - id: micro-behaviors/os/firewall/iptables::iptables-delete-chain-flag
