defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: firewall-cmd-add-port-flag
    desc: Opens a firewall port (--add-port)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: --add-port
    attack: T1562.004
  - id: firewall-cmd-add-ssh-service
    desc: Opens SSH access via firewalld
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: --add-service=ssh
    attack: T1562.004
  - id: firewall-cmd-add-port-pattern
    desc: firewall-cmd opens an inbound port
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: firewall-cmd\s+.{0,50}--add-port
    attack: T1562.004
  - id: firewall-cmd-permanent-port22
    desc: Permanently opens port 22 (SSH)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: --permanent --add-port=22
    attack: T1562.004
  - id: firewall-cmd-permanent-ssh
    desc: Permanently opens SSH service
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: --permanent --add-service=ssh
    attack: T1562.004
  - id: firewall-cmd-permanent-pattern
    desc: Permanent firewall port/service open
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: --permanent.{0,50}--add-(port|service)
    attack: T1562.004
  - id: firewall-cmd-reload-basic
    desc: Reloads firewalld to apply new rules
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: firewall-cmd --reload
    attack: T1562.004
  - id: firewall-cmd-complete-reload
    desc: Full firewalld rule reload
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: firewall-cmd --complete-reload
    attack: T1562.004
  - id: firewalld-restart
    desc: Restarts firewalld to apply rules
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: systemctl restart firewalld
    attack: T1562.004
  - id: ufw-allow-command
    desc: ufw opens an inbound port or service
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: ufw allow
    attack: T1562.004
  - id: ufw-allow-22
    desc: ufw opens port 22 (SSH)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ufw allow 22
    attack: T1562.004
  - id: ufw-allow-ssh-name
    desc: ufw opens SSH by service name
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ufw allow ssh
    attack: T1562.004
  - id: ufw-allow-in-22
    desc: ufw opens inbound port 22
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ufw allow in 22
    attack: T1562.004
  - id: ufw-allow-ssh-pattern
    desc: ufw opens port 22 or SSH
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: ufw\s+allow\s+(22|ssh)
    attack: T1562.004
  # Enabling/activating the host firewall is hardening, not T1562.004
  # (Impair Defenses) — that technique covers DISABLING or weakening a
  # firewall. Provisioning scripts, cloud-init, and Ansible routinely run
  # `ufw enable`. Kept here as a notable host-config capability so malware
  # composites (e.g. ottercookie) can still reference it as one leg, while
  # the bare activation no longer surfaces as a standalone suspicious match.
  - id: ufw-enable-basic
    desc: Enables the ufw host firewall
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: ufw enable
  - id: ufw-force-enable
    desc: Force-enables the ufw firewall
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: ufw --force enable
  - id: firewalld-enable
    desc: Enables firewalld at boot
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: systemctl enable firewalld
    attack: T1562.004
  - id: firewalld-start
    desc: Starts the firewalld service
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: systemctl start firewalld
    attack: T1562.004
  - id: port-22-ssh-add-port
    desc: Opens port 22 via --add-port
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: --add-port=22
    attack: T1562.004
  - id: port-22-ssh-allow-22
    desc: Firewall rule opening port 22
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: allow 22
    attack: T1562.004
  - id: port-22-ssh-allow-ssh
    desc: Firewall rule opening SSH service
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: allow ssh
    attack: T1562.004
composite_rules:
  - id: firewall-cmd-add-port
    desc: firewall-cmd adding port rule
    crit: suspicious
    conf: 0.85
    attack: T1562.004
    any:
      - id: firewall-cmd-add-port-flag
      - id: firewall-cmd-add-ssh-service
      - id: firewall-cmd-add-port-pattern
  - id: firewall-cmd-permanent
    desc: firewall-cmd permanent rule modification
    crit: suspicious
    conf: 0.85
    attack: T1562.004
    any:
      - id: firewall-cmd-permanent-port22
      - id: firewall-cmd-permanent-ssh
      - id: firewall-cmd-permanent-pattern
  - id: firewall-cmd-reload
    desc: firewall-cmd reload or restart
    crit: suspicious
    conf: 0.8
    attack: T1562.004
    any:
      - id: firewall-cmd-reload-basic
      - id: firewall-cmd-complete-reload
      - id: firewalld-restart
  - id: ufw-allow-ssh
    desc: ufw allowing SSH port access
    crit: suspicious
    conf: 0.85
    attack: T1562.004
    any:
      - id: ufw-allow-22
      - id: ufw-allow-ssh-name
      - id: ufw-allow-in-22
      - id: ufw-allow-ssh-pattern
  - id: ufw-enable
    desc: ufw firewall enable or activate
    crit: notable
    conf: 0.8
    any:
      - id: ufw-enable-basic
      - id: ufw-force-enable
  - id: firewall-tool-check
    desc: checking for firewall tool availability
    crit: notable
    conf: 0.5
    any:
      - id: micro-behaviors/os/firewall/
  - id: firewalld-service-control
    desc: firewalld service enable or restart
    crit: suspicious
    conf: 0.8
    attack: T1562.004
    any:
      - id: firewalld-enable
      - id: firewalld-start
      - id: firewalld-restart
  - id: port-22-ssh-rule
    desc: SSH port 22 firewall rule
    crit: suspicious
    conf: 0.8
    attack: T1562.004
    any:
      - id: port-22-ssh-add-port
      - id: port-22-ssh-allow-22
      - id: port-22-ssh-allow-ssh
  - id: firewall-ssh-opening
    desc: Firewall rule allowing SSH access
    crit: suspicious
    conf: 0.9
    attack: T1562.004
    all:
      - id: micro-behaviors/os/firewall/firewalld::firewall-cmd
      - id: port-22-ssh-rule
  - id: firewall-persistence-setup
    desc: Permanent firewall rule installation
    crit: suspicious
    conf: 0.9
    attack: T1562.004
    all:
      - id: firewall-cmd-permanent
      - id: firewall-cmd-reload
