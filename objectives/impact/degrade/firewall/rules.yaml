defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: firewall-command-v-check
    desc: Firewall command lookup check
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\bcommand -v\s+(firewalld|ufw|iptables|nft)\b'
  - id: firewall-which-check
    desc: Firewall which lookup check
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\bwhich\s+(firewalld|ufw|iptables|nft)\b'
  - id: firewall-systemctl-is-active-check
    desc: Firewall systemctl active check
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\bsystemctl\s+is-active\s+(firewalld|ufw|iptables|nft)\b'
  - id: firewall-systemctl-status-check
    desc: Firewall systemctl status check
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\bsystemctl\s+status\s+(firewalld|ufw|iptables|nft)\b'
composite_rules:
  # Firewall rule creation and service activation are neutral host
  # configuration; destructive disable/flush operations remain objectives.
  - id: firewall-tool-check
    desc: checking for firewall tool availability
    crit: notable
    conf: 0.5
    all:
      - id: micro-behaviors/os/firewall/
    any:
      - id: firewall-command-v-check
      - id: firewall-which-check
      - id: firewall-systemctl-is-active-check
      - id: firewall-systemctl-status-check
    unless:
      - id: well-known/app/systemd::container-runtime-component-basename
