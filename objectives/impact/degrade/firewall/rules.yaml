defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: firewall-cmd-add-port-flag
    desc: --add-port flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: --add-port
    attack: T1562.004
  - id: firewall-cmd-add-ssh-service
    desc: --add-service=ssh flag
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: --add-service=ssh
    attack: T1562.004
  - id: firewall-cmd-add-port-pattern
    desc: firewall-cmd add-port pattern
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: firewall-cmd\s+.{0,50}--add-port
    attack: T1562.004
  - id: firewall-cmd-permanent-port22
    desc: permanent add-port=22
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: --permanent --add-port=22
    attack: T1562.004
  - id: firewall-cmd-permanent-ssh
    desc: permanent add-service=ssh
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: --permanent --add-service=ssh
    attack: T1562.004
  - id: firewall-cmd-permanent-pattern
    desc: permanent add-port/service pattern
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: --permanent.{0,50}--add-(port|service)
    attack: T1562.004
  - id: firewall-cmd-reload-basic
    desc: firewall-cmd --reload
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: firewall-cmd --reload
    attack: T1562.004
  - id: firewall-cmd-complete-reload
    desc: firewall-cmd --complete-reload
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: firewall-cmd --complete-reload
    attack: T1562.004
  - id: firewalld-restart
    desc: systemctl restart firewalld
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: systemctl restart firewalld
    attack: T1562.004
  - id: ufw-allow-command
    desc: ufw allow command
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: ufw allow
    attack: T1562.004
  - id: ufw-allow-22
    desc: ufw allow port 22 firewall rule
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ufw allow 22
    attack: T1562.004
  - id: ufw-allow-ssh-name
    desc: ufw allow SSH service by name
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ufw allow ssh
    attack: T1562.004
  - id: ufw-allow-in-22
    desc: ufw allow in 22
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ufw allow in 22
    attack: T1562.004
  - id: ufw-allow-ssh-pattern
    desc: ufw allow 22/ssh pattern
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: ufw\s+allow\s+(22|ssh)
    attack: T1562.004
  - id: ufw-enable-basic
    desc: ufw firewall enable command
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: ufw enable
    attack: T1562.004
  - id: ufw-force-enable
    desc: ufw --force enable
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: ufw --force enable
    attack: T1562.004
  - id: firewalld-enable
    desc: systemctl enable firewalld
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: systemctl enable firewalld
    attack: T1562.004
  - id: firewalld-start
    desc: systemctl start firewalld
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: systemctl start firewalld
    attack: T1562.004
  - id: port-22-ssh-add-port
    desc: --add-port=22 flag
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: --add-port=22
    attack: T1562.004
  - id: port-22-ssh-allow-22
    desc: firewall allow port 22 rule
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: allow 22
    attack: T1562.004
  - id: port-22-ssh-allow-ssh
    desc: firewall allow SSH service rule
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: allow ssh
    attack: T1562.004
composite_rules:
  - id: firewall-cmd-add-port
    desc: firewall-cmd adding port rule
    crit: suspicious
    conf: 0.85
    attack: T1562.004
    any:
      - id: firewall-cmd-add-port-flag
      - id: firewall-cmd-add-ssh-service
      - id: firewall-cmd-add-port-pattern
  - id: firewall-cmd-permanent
    desc: firewall-cmd permanent rule modification
    crit: suspicious
    conf: 0.85
    attack: T1562.004
    any:
      - id: firewall-cmd-permanent-port22
      - id: firewall-cmd-permanent-ssh
      - id: firewall-cmd-permanent-pattern
  - id: firewall-cmd-reload
    desc: firewall-cmd reload or restart
    crit: suspicious
    conf: 0.8
    attack: T1562.004
    any:
      - id: firewall-cmd-reload-basic
      - id: firewall-cmd-complete-reload
      - id: firewalld-restart
  - id: ufw-allow-ssh
    desc: ufw allowing SSH port access
    crit: suspicious
    conf: 0.85
    attack: T1562.004
    any:
      - id: ufw-allow-22
      - id: ufw-allow-ssh-name
      - id: ufw-allow-in-22
      - id: ufw-allow-ssh-pattern
  - id: ufw-enable
    desc: ufw firewall enable or activate
    crit: suspicious
    conf: 0.8
    attack: T1562.004
    any:
      - id: ufw-enable-basic
      - id: ufw-force-enable
  - id: firewall-tool-check
    desc: checking for firewall tool availability
    crit: baseline
    conf: 0.5
    any:
      - id: micro-behaviors/os/firewall/
  - id: firewalld-service-control
    desc: firewalld service enable or restart
    crit: suspicious
    conf: 0.8
    attack: T1562.004
    any:
      - id: firewalld-enable
      - id: firewalld-start
      - id: firewalld-restart
  - id: port-22-ssh-rule
    desc: SSH port 22 firewall rule
    crit: suspicious
    conf: 0.8
    attack: T1562.004
    any:
      - id: port-22-ssh-add-port
      - id: port-22-ssh-allow-22
      - id: port-22-ssh-allow-ssh
  - id: firewall-ssh-opening
    desc: Firewall rule allowing SSH access
    crit: suspicious
    conf: 0.9
    attack: T1562.004
    all:
      - id: micro-behaviors/os/firewall/firewalld::firewall-cmd
      - id: port-22-ssh-rule
  - id: firewall-persistence-setup
    desc: Permanent firewall rule installation
    crit: suspicious
    conf: 0.9
    attack: T1562.004
    all:
      - id: firewall-cmd-permanent
      - id: firewall-cmd-reload
