defaults:
  platforms: [fortios, windows]
  for: [java, kotlin, class, jar, zip, powershell]
  attack: T1562.004

traits:
  - id: fortios-firewall-policy-api
    desc: FortiOS firewall policy API
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v2/cmdb/firewall/policy

  - id: fortios-firewall-policy-api-bytecode
    desc: FortiOS policy API bytecode
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 61 70 69 2F 76 32 2F 63 6D 64 62 2F 66 69 72 65 77 61 6C 6C 2F 70 6F 6C 69 63 79

  - id: fortios-ip-pool-api
    desc: FortiOS IP pool API
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: /api/v2/cmdb/firewall/ip-pool

  - id: fortios-deny-any-policy
    desc: FortiOS deny-any firewall policy
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '"srcintf".{0,80}"any".{0,160}"dstintf".{0,80}"any".{0,160}"action".{0,40}"deny"'

  - id: fortios-deny-policy-bytecode
    desc: FortiOS deny policy bytecode
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 61 63 74 69 6F 6E 22 3A 22 64 65 6E 79

  - id: disabled-status-field
    desc: Disabled status field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']status["'']?\s*[:=]\s*["'']disable'

composite_rules:
  - id: fortios-policy-disable
    desc: FortiOS firewall policy disable
    crit: suspicious
    conf: 0.9
    all:
      - id: fortios-firewall-policy-api
      - id: disabled-status-field

  - id: fortios-firewall-policy-degrade
    desc: FortiOS firewall policy degradation
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: fortios-firewall-policy-api
      - id: fortios-firewall-policy-api-bytecode
      - id: fortios-deny-any-policy
      - id: fortios-deny-policy-bytecode
      - id: fortios-policy-disable
      - id: fortios-ip-pool-api
