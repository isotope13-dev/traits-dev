defaults:
  platforms: [windows]
  for: [go]
  attack: T1562.004

traits:
  - id: go-firewall-disable-helper
    desc: Disables Windows firewall
    crit: suspicious
    conf: 0.95
    for: [pe]
    if:
      type: text
      exact: main.disableFirewall

composite_rules:
  - id: go-vpn-firewall-tamper
    desc: VPN setup disables Windows firewall
    crit: hostile
    conf: 0.99
    for: [pe]
    all:
      - id: go-firewall-disable-helper
      - id: objectives/persistence/system/service/install::go-tap-driver-install-helper
      - id: objectives/persistence/system/service/install::go-softether-server-setup
