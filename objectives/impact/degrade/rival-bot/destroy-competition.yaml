defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
  for:
    - elf
    - shell
traits:
  - id: watchdog-monitor-process
    desc: Process watchdog
    crit: notable
    conf: 0.6
    if:
      type: string_value
      word: watchdog
    attack: T1547
  - id: killer-process-shinji
    desc: SHINJI killer process
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: SHINJI
    attack: T1531
    mbc: B0025
  - id: killing-competing-malware
    desc: Competing malware killing
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: /Killer
    attack: T1531
composite_rules:
  - id: malware-killer-pattern
    desc: Malware killer process
    crit: suspicious
    conf: 0.95
    attack: T1531
    mbc: B0025
    any:
      - id: killer-process-shinji
      - id: killing-competing-malware
  - id: malware-survival-infrastructure
    desc: Malware survival infrastructure
    crit: hostile
    conf: 0.95
    attack: T1547
    mbc: B0025
    all:
      - id: watchdog-monitor-process
      - id: malware-killer-pattern
  - id: mirai-killer-infrastructure
    desc: Mirai killer process infrastructure
    crit: hostile
    conf: 0.95
    attack: T1531
    mbc: B0025
    all:
      - id: well-known/malware/botnet/mirai/
      - id: killer-process-shinji
      - id: watchdog-monitor-process
