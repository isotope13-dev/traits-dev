# Bot killer - Terminate competing bots
# Process enumeration + memory scanning + termination pattern
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1562.001
composite_rules:
  - id: bot-killer-source
    desc: Bot killer process scan and terminate
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
      - id: micro-behaviors/mem/read/cross-process::read-process-memory-source
      - id: micro-behaviors/process/terminate/kill::terminate-process-source
