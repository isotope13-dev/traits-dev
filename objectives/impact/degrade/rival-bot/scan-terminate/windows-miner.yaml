defaults:
  platforms: [windows]
  for: [pe]
  attack: T1496

composite_rules:
  - id: miner-loader-taskkill-by-pid
    desc: Miner loader kills processes by PID
    ref: sha256:1fa1e028b2cad5297edcae7d505456d187bdf1bc29acba1e90d17f355951bca7
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/impact/cryptojacking/miner/runtime::spawned-xmrig-status
      - id: micro-behaviors/process/terminate/command::taskkill-pid-command
    any:
      - id: micro-behaviors/process/enumerate/snapshot::process32-first
      - id: micro-behaviors/communications/ipc/named-pipe::rust-anonymous-pipe-ipc
