defaults:
  platforms: [unix]
  for: [shell, python]
  attack: T1562
traits:
  - id: teampcp-artifact-target
    desc: TeamPCP artifact target
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '(?i)\b(TeamPCP|PCPCat|pcp_cat)\b'
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: teampcp-boring-system-target
    desc: BORING_SYSTEM artifact target
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: BORING_SYSTEM
  - id: pcp-replaced-telemetry
    desc: PCP replaced telemetry field
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "PCP replaced"
  - id: teampcp-container-removal
    desc: TeamPCP container removal
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'docker\s+(rm\s+-f|ps).{0,120}(TeamPCP|PCPCat|pcp_cat)'
  - id: boring-system-container-removal
    desc: BORING_SYSTEM container removal
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'docker\s+(rm\s+-f|ps).{0,120}BORING_SYSTEM'
composite_rules:
  - id: teampcp-rival-eviction
    desc: TeamPCP rival malware eviction
    crit: hostile
    conf: 0.98
    all:
      - id: teampcp-artifact-target
    any:
      - id: teampcp-container-removal
      - id: boring-system-container-removal
      - id: teampcp-boring-system-target
      - id: pcp-replaced-telemetry
      - id: micro-behaviors/process/terminate/kill::pkill-force
      - id: micro-behaviors/os/service/control::systemctl-word
