defaults:
  platforms: [linux]
  for: [elf]
  attack: T1562.001
  mbc: B0024
traits:
  - id: daemon-path-snapd
    desc: snapd daemon path
    crit: component
    conf: 0.6
    if:
      type: text
      exact: /usr/lib/snapd/snapd
  - id: daemon-path-fwupd
    desc: fwupd daemon path
    crit: component
    conf: 0.6
    if:
      type: text
      exact: /usr/lib/fwupd/fwupd
  - id: daemon-path-boltd
    desc: boltd daemon path
    crit: component
    conf: 0.6
    if:
      type: text
      exact: /usr/lib/boltd/boltd
  - id: daemon-path-udisksd
    desc: udisksd daemon path
    crit: component
    conf: 0.6
    if:
      type: text
      exact: /usr/lib/udisks2/udisksd
  - id: daemon-path-cupsd
    desc: cupsd daemon path
    crit: component
    conf: 0.6
    if:
      type: text
      exact: /usr/sbin/cupsd
  - id: daemon-path-accounts
    desc: accounts-daemon path
    crit: component
    conf: 0.6
    if:
      type: text
      exact: /usr/lib/accountsservice/accounts-daemon
  - id: daemon-path-packagekit
    desc: packagekitd daemon path
    crit: component
    conf: 0.6
    if:
      type: text
      exact: /usr/lib/packagekit/packagekitd
composite_rules:
  - id: linux-daemon-skiplist
    desc: Bundled Linux daemon skiplist (rival-bot)
    crit: hostile
    conf: 0.95
    # Implants that walk /proc and kill rival processes ship a hardcoded
    # allowlist of legitimate Linux service daemons to NOT terminate.
    # Five+ distinct system-daemon paths embedded in one binary, paired
    # with /proc/<pid>/{cmdline,comm,exe} enumeration, is a high-fidelity
    # rival-process-killer signal. Reuses the existing fake-*-path atoms
    # from objectives/evasion/masquerade/process/name/linux-system.yaml
    # alongside the additional daemon paths defined above.
    needs: 5
    any:
      - id: daemon-path-snapd
      - id: daemon-path-fwupd
      - id: daemon-path-boltd
      - id: daemon-path-udisksd
      - id: micro-behaviors/os/service/config::networkmanager-daemon-path
      - id: daemon-path-cupsd
      - id: daemon-path-accounts
      - id: daemon-path-packagekit
      - id: objectives/evasion/masquerade/process/name
