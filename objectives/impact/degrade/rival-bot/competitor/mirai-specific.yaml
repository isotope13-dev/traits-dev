defaults:
  crit: suspicious
  for:
    - elf
  platforms:
    - linux
traits:
  - id: kill-target-syslogd
    desc: Syslog daemon path reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: /sbin/syslogd
  - id: kill-target-ntpd
    desc: NTP daemon path reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: /usr/sbin/ntpd
  - id: kill-target-init
    desc: Init process path reference
    crit: component
    conf: 0.65
    if:
      type: text
      substr: /sbin/init
  - id: kill-target-udhcpc
    desc: DHCP client path reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: /sbin/udhcpc
  - id: kill-target-wget
    desc: Wget utility reference
    crit: component
    conf: 0.5
    if:
      type: text
      exact: wget
  - id: kill-target-curl
    desc: Curl utility reference
    crit: component
    conf: 0.5
    if:
      type: text
      exact: curl
  - id: kill-target-tftp
    desc: TFTP utility reference
    crit: component
    conf: 0.5
    if:
      type: text
      exact: tftp
composite_rules:
  - id: mirai-competitor-kill-list
    desc: Mirai competitor process kill list
    crit: suspicious
    conf: 0.88
    mbc: T1562
    attack: T1562.001
    needs: 8
    any:
      - id: micro-behaviors/os/service/remote::sshd-path
      - id: micro-behaviors/os/service/daemon::telnetd
      - id: micro-behaviors/os/service/daemon::httpd
      - id: objectives/evasion/masquerade/process::fake-crond-path
      - id: kill-target-syslogd
      - id: kill-target-ntpd
      - id: kill-target-init
      - id: kill-target-udhcpc
      - id: kill-target-wget
      - id: kill-target-curl
      - id: kill-target-tftp
  - id: mirai-botkill-behavior
    desc: Mirai botnet competitor killing behavior
    crit: hostile
    conf: 0.92
    mbc: B0030
    attack: T1562.001
    needs: 1
    all:
      - id: mirai-competitor-kill-list
    any:
      - id: objectives/discovery/network/scan::scanner
      - id: well-known/malware/botnet/mirai::mirai-backdoor-daemons
