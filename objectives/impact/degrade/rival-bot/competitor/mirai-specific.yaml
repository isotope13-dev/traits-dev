defaults:
  crit: suspicious
  for:
  - elf
  platforms:
  - linux
traits:
- id: kill-target-syslogd
  desc: Syslog daemon path reference
  crit: component
  conf: 0.6
  if:
    type: text
    substr: /sbin/syslogd
- id: kill-target-ntpd
  desc: NTP daemon path reference
  crit: component
  conf: 0.6
  if:
    type: text
    substr: /usr/sbin/ntpd
- id: kill-target-init
  desc: Init process path reference
  crit: component
  conf: 0.65
  if:
    type: text
    substr: /sbin/init
- id: kill-target-udhcpc
  desc: DHCP client path reference
  crit: component
  conf: 0.6
  if:
    type: text
    substr: /sbin/udhcpc
- id: kill-target-tftp
  desc: TFTP utility reference
  crit: component
  conf: 0.5
  if:
    type: text
    exact: tftp
composite_rules:
- id: mirai-competitor-kill-list
  desc: Mirai competitor process kill list
  crit: suspicious
  conf: 0.88
  mbc: T1562
  attack: T1562.001
  needs: 8
  any:
  - id: micro-behaviors/os/service/remote::sshd-path
  - id: micro-behaviors/os/service/daemon::telnetd
  - id: micro-behaviors/os/service/daemon::httpd
  - id: objectives/evasion/masquerade/process/name::fake-crond-path
  - id: kill-target-syslogd
  - id: kill-target-ntpd
  - id: kill-target-init
  - id: kill-target-udhcpc
  - id: micro-behaviors/communications/http/download/curl::wget-cmd
  - id: micro-behaviors/communications/http/download/curl::curl-cmd
  - id: kill-target-tftp
- id: mirai-botkill-behavior
  desc: Mirai botnet competitor killing behavior
  crit: hostile
  conf: 0.92
  mbc: B0030
  attack: T1562.001
  all:
  - id: mirai-competitor-kill-list
  any:
  - id: objectives/discovery/network/scan/proc::scanner
