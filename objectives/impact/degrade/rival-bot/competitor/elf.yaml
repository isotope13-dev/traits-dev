defaults:
  platforms: [linux]
  for: [elf]
  attack: T1562.001

traits:
  - id: procfs-named-process-kill
    desc: Procfs walk with force-kill
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)/proc/\[0-9\]\*[^\n]{0,420}\bkill\s+-9\b'

  - id: repeated-exact-process-filters
    desc: Repeated exact-name process filters
    crit: component
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '(?i)\bpgrep\s+-x\b'

composite_rules:
  - id: procfs-rival-process-killer
    desc: Procfs rival-process killer
    crit: hostile
    conf: 0.99
    mbc: B0025
    all:
      - id: procfs-named-process-kill
      - id: repeated-exact-process-filters
      - id: micro-behaviors/process/terminate/kill::pkill-force
