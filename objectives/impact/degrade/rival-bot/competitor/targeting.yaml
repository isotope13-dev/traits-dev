defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: xmrig-targeting
    desc: XMRig miner targeting
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (xmrigCC|xmrig-proxy)
    attack: T1561
  - id: minerd-targeting
    desc: minerd miner targeting
    crit: notable
    conf: 0.8
    if:
      type: text
      word: minerd
  - id: cpuminer-targeting
    desc: cpuminer miner targeting
    crit: notable
    conf: 0.8
    if:
      type: text
      word: cpuminer
  - id: mirai-targeting
    desc: Mirai botnet targeting
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: mirai-variant
    attack: T1561
  - id: watchdog-targeting-kill
    desc: Watchdog malware kill targeting
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: string_literal
      regex: (kill|pkill|killall).{0,40}watchdog\b
    attack: T1561
  - id: watchdog-targeting-wd
    desc: Watchdog malware wd_watchdog targeting
    crit: suspicious
    conf: 0.8
    for:
      - shell
    if:
      type: string_literal
      regex: (kill|pkill|killall).{0,40}wd_watchdog\b
    attack: T1561
  - id: update-process-targeting
    desc: Fake update process targeting
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: killall.{0,100}(update|updater)
  - id: deleted-process-targeting
    desc: Target deleted/hidden processes
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \| grep -E '/tmp/\|/dev/shm/'
    attack: T1070.003
  - id: procfs-executable-name-filter
    desc: Procfs executable-name filter before kill
    crit: suspicious
    conf: 0.95
    for:
      - shell
    if:
      type: text
      regex: '(?is)/proc/\[0-9\]\*.*?/proc/\$\w+/exe.*?\bcase\b.*?\bkill\s+-9\b'
composite_rules:
  - id: competing-miner-targeting
    desc: Competing cryptocurrency miner targeting
    crit: suspicious
    conf: 0.85
    attack: T1561
    needs: 2
    any:
      - id: xmrig-targeting
      - id: micro-behaviors/crypto/hash/mining::cryptonight-str
  - id: competing-botnet-targeting
    desc: Competing botnet targeting
    crit: suspicious
    conf: 0.85
    attack: T1561
    any:
      - id: mirai-targeting
      - id: watchdog-targeting-kill
      - id: watchdog-targeting-wd
  - id: malware-killing-activity
    desc: Generic malware killing activity
    crit: suspicious
    conf: 0.8
    attack: T1070.003
    needs: 2
    any:
      - id: micro-behaviors/process/terminate/kill::pkill-force
      - id: deleted-process-targeting
  - id: comprehensive-malware-elimination
    desc: Comprehensive competing malware elimination
    crit: hostile
    conf: 0.9
    attack: T1561
    mbc: E1001
    needs: 3
    any:
      - id: micro-behaviors/process/enumerate/grep::ps-grep-targeting
      - id: competing-miner-targeting
      - id: competing-botnet-targeting
      - id: malware-killing-activity
  - id: procfs-targeted-kill-loop
    desc: Procfs targeted malware termination loop
    crit: hostile
    conf: 0.99
    mbc: E1001
    all:
      - id: procfs-executable-name-filter
      - id: micro-behaviors/process/terminate/command::kill-force
