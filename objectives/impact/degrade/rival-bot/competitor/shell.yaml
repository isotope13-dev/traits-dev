defaults:
  platforms: [unix]
  crit: suspicious
  attack: T1489
  mbc: B0047
  for: [shell]
traits:
  - id: miner-process-kill-primary
    desc: Kills xmrig/kworkerds miner processes
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: kill[^;]{0,30}(xmrig|kworkerds)
  - id: miner-process-kill-secondary
    desc: Kills cryptonight miner processes
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: kill[^;]{0,30}cryptonight
  - id: competitor-path-removal
    desc: Removes known malware paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: rm\s+-rf?\s+(/tmp/kworkerds|/var/tmp/xmrig|/tmp/systemd|/tmp/java)
  - id: docker-container-kill-miner-xmr-mine
    desc: Kills Docker containers mentioning xmr or mine
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: docker\s+(ps|kill|rm)[^;]{0,30}(xmr|mine)
  - id: docker-container-kill-miner-monero
    desc: Kills Docker containers with monero clues
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: docker\s+(ps|kill|rm)[^;]{0,30}monero
  - id: docker-container-kill-secondary
    desc: Kills Docker containers with crypto keyword
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: docker\s+(ps|kill|rm)[^;]{0,30}crypto
  - id: mining-pool-kill-primary
    desc: Kills mining pool connections (moneropool/xmrpool)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: pkill[^;]{0,50}(moneropool|xmrpool)
  - id: mining-pool-kill-secondary
    desc: 'Kills mining pool connections'
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: grep[^;]{0,50}(stratum\.f2pool|monerohash)
composite_rules:
  - id: miner-process-kill
    desc: Kills known miner processes
    crit: suspicious
    conf: 0.95
    any:
      - id: miner-process-kill-primary
      - id: miner-process-kill-secondary
  - id: docker-container-kill
    desc: Kills Docker containers
    crit: suspicious
    conf: 0.8
    any:
      - id: docker-container-kill-miner-xmr-mine
      - id: docker-container-kill-miner-monero
      - id: docker-container-kill-secondary
  - id: mining-pool-kill
    desc: Kills mining pool connections
    crit: suspicious
    conf: 0.95
    any:
      - id: mining-pool-kill-primary
      - id: mining-pool-kill-secondary
  - id: miner-botkill
    desc: Cryptominer botkill behavior
    crit: hostile
    conf: 0.95
    near_lines: 30
    all:
      - id: micro-behaviors/process/terminate/kill::mass-pkill
      - id: miner-process-kill
      - id: micro-behaviors/fs/file/delete::mass-tmp-removal
      - id: competitor-path-removal
  - id: miner-botkill-alt
    desc: Cryptominer botkill (ps pattern)
    crit: hostile
    conf: 0.95
    near_lines: 30
    all:
      - id: micro-behaviors/process/terminate/kill::mass-kill-pattern
      - id: miner-process-kill
      - id: micro-behaviors/fs/file/delete::mass-tmp-removal
      - id: competitor-path-removal
  - id: network-botkill
    desc: Network-based competitor killing
    crit: suspicious
    conf: 0.9
    near_lines: 30
    all:
      - id: micro-behaviors/process/terminate/kill::netstat-kill-pattern
      - id: micro-behaviors/process/terminate/kill::mass-pkill
