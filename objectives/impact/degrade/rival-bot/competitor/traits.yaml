defaults:
  platforms:
    - unix
    - android
    - ios
  attack: T1562
traits:
  - id: watchdog-bot-target
    desc: Kill command near watchdog
    crit: notable
    conf: 0.85
    for: [elf, shell, scripts, binaries]
    if:
      type: text
      regex: '(kill|pkill)[^\n]{0,60}watchdog'
  - id: mirai-bot-target
    desc: Mirai botnet targeting
    crit: notable
    conf: 0.85
    for: [elf, shell, scripts, binaries]
    if:
      type: text
      word: mirai
    unless:
      - type: text
        substr: bilibili-dynamic-mirai-plugin
  - id: update-agent-target
    desc: Update agent software targeting
    crit: notable
    conf: 0.8
    for: [elf, shell, scripts, binaries]
    if:
      type: text
      substr: sysupdate
    unless:
      - id: well-known/app/systemd::container-runtime-component-basename
  - id: botkill
    desc: Bot killer function
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - macho
    if:
      type: text
      substr: botkill
  - id: killed-process-log
    desc: Process-kill telemetry string
    crit: component
    conf: 0.82
    for: [elf, macho, shell, c, cpp]
    if:
      type: text
      substr: "Killed process:"
  - id: rival-port-24936
    desc: Rival bot port marker
    crit: component
    conf: 0.72
    for: [elf, macho, shell, c, cpp]
    if:
      type: text
      substr: "24936"
  - id: proc-exe-fragment-cluster
    desc: Procfs executable path fragments
    crit: component
    conf: 0.78
    for: [elf]
    size_max: 262144
    if:
      type: text
      regex: '/proc/.{0,200}/exe|/exe.{0,200}/proc/'
composite_rules:
  - id: deleted-process-kill-methods
    desc: Deleted process kill methods
    crit: suspicious
    conf: 0.88
    any:
      - id: objectives/evasion/self-delete/process::pkill-deleted-pattern
      - id: objectives/evasion/self-delete/process::proc-exe-deleted-search
  - id: proc-net-rival-process-kill
    desc: Kills network-active rival processes
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
      - id: killed-process-log
    any:
      - id: micro-behaviors/fs/proc/info/exe::process-pid-exe
      - id: proc-exe-fragment-cluster
  - id: hardcoded-rival-port-eviction
    desc: Evicts rival bot by hardcoded port
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
      - id: rival-port-24936
