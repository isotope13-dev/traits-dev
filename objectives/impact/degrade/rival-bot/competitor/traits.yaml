defaults:
  platforms:
    - unix
    - android
    - ios
  attack: T1562
traits:
  - id: botkill
    desc: Bot killer function
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - macho
    if:
      type: text
      substr: botkill
  - id: killed-process-log
    desc: Process-kill telemetry string
    crit: component
    conf: 0.82
    for: [elf, macho, shell, c, cpp]
    if:
      type: text
      substr: "Killed process:"
  - id: rival-port-24936
    desc: Rival bot port marker
    crit: component
    conf: 0.72
    for: [elf, macho, shell, c, cpp]
    if:
      type: text
      substr: "24936"
  - id: small-elf-proc-fragment
    desc: Procfs path fragment in small ELF
    crit: component
    conf: 0.78
    for: [elf]
    size_max: 262144
    if:
      type: text
      substr: /proc/
  - id: small-elf-exe-fragment
    desc: Exe path fragment in small ELF
    crit: component
    conf: 0.78
    for: [elf]
    size_max: 262144
    if:
      type: text
      substr: /exe
composite_rules:
  - id: proc-exe-fragment-cluster
    desc: Procfs executable path fragments
    crit: component
    conf: 0.78
    for: [elf]
    size_max: 262144
    all:
      - id: small-elf-proc-fragment
      - id: small-elf-exe-fragment
  - id: proc-net-rival-process-kill
    desc: Kills network-active rival processes
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/fs/proc/info::proc-net-tcp
      - id: killed-process-log
    any:
      - id: micro-behaviors/fs/proc/info::process-pid-exe
      - id: proc-exe-fragment-cluster
  - id: hardcoded-rival-port-eviction
    desc: Evicts rival bot by hardcoded port
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/fs/proc/info::proc-net-tcp
      - id: rival-port-24936
