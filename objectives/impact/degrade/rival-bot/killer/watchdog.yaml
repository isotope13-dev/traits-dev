defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: watchdog-monitor-process
    desc: Process watchdog
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)\bwatchdog([_ -](maintain|process|service|daemon))\b
    attack: T1547
  - id: watchdog-token
    desc: Watchdog process token
    crit: component
    conf: 0.75
    for: [elf]
    if:
      type: text
      exact: watchdog
    unless:
      - type: trait
        id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: killer-process-shinji
    desc: SHINJI killer process
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: SHINJI
    attack: T1531
    mbc: B0025
  - id: killing-competing-malware
    desc: Competing malware killing
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: /Killer
    attack: T1531
composite_rules:
  - id: malware-killer-pattern
    desc: Malware killer process
    crit: suspicious
    conf: 0.95
    attack: T1531
    mbc: B0025
    any:
      - id: killer-process-shinji
      - id: killing-competing-malware
  - id: malware-survival-infrastructure
    desc: Malware survival infrastructure
    crit: hostile
    conf: 0.95
    attack: T1547
    mbc: B0025
    all:
      - id: watchdog-monitor-process
      - id: malware-killer-pattern
  - id: mirai-killer-infrastructure
    desc: Mirai killer process infrastructure
    crit: hostile
    conf: 0.95
    attack: T1531
    mbc: B0025
    all:
      - id: killer-process-shinji
      - id: watchdog-monitor-process
  - id: shinji-watchdog-killer
    desc: SHINJI watchdog-backed rival killer
    crit: hostile
    conf: 0.98
    attack: T1531
    mbc: B0025
    all:
      - id: killer-process-shinji
      - id: watchdog-token
      - id: killing-competing-malware
  - id: shinji-dvr-rival-bot
    desc: SHINJI rival bot with DVR targeting
    crit: hostile
    conf: 0.98
    attack: T1531,T1046
    mbc: B0025
    all:
      - id: killer-process-shinji
      - id: objectives/discovery/network/iot-devices::dvr-specific-targeting
      - id: objectives/command-and-control/botnet/iot::busybox
  - id: masqueraded-iot-rival-killer
    desc: Masqueraded IoT rival-process killer
    crit: hostile
    conf: 0.97
    attack: T1036,T1531
    mbc: B0025
    all:
      - id: malware-killer-pattern
      - id: objectives/evasion/masquerade/process/name::fake-systemd-path
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
