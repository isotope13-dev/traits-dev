# Destructive peer-control source-path cluster found in native Rust malware.
# The individual paths are components; the hostile rule requires the
# destructive, concealment, persistence, and self-inspection cluster.
defaults:
  platforms: [linux]
  for: [elf]

traits:
  - id: rust-killer-module-source-path
    desc: Rust process-killer module source path
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(^|[/\\])src/killer([/\\][^/\\]{1,64})+\.rs'

  - id: rust-hide-module-source-path
    desc: Rust concealment module source path
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(^|[/\\])src/hide([/\\][^/\\]{1,64})+\.rs'

  - id: rust-persistence-module-source-path
    desc: Rust persistence module source path
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(^|[/\\])src/persistence([/\\][^/\\]{1,64})+\.rs'

  - id: rust-locker-module-source-path
    desc: Rust file-locker module source path
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(^|[/\\])src/locker([/\\][^/\\]{1,64})+\.rs'

composite_rules:
  - id: rust-destructive-control-source-cluster
    desc: Rust destructive control source cluster
    crit: notable
    conf: 0.94
    all:
      - id: rust-killer-module-source-path
      - id: rust-hide-module-source-path
      - id: rust-persistence-module-source-path
    any:
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
      - id: micro-behaviors/fs/proc/container::container-self-cgroup
      - id: micro-behaviors/fs/proc/mounts::mounts-mountinfo
  - id: rust-killer-persistence-self-inspection
    desc: Rust peer-killer with persistence and self-environment inspection
    crit: hostile
    conf: 0.97
    all:
      - id: rust-destructive-control-source-cluster
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
      - id: micro-behaviors/fs/proc/container::container-self-cgroup
      - id: micro-behaviors/fs/proc/mounts::mounts-mountinfo
  - id: rust-destructive-peer-control
    desc: Rust destructive peer-control cluster with concealment and persistence
    crit: hostile
    conf: 0.96
    all:
      - id: rust-destructive-control-source-cluster
      - id: rust-locker-module-source-path
