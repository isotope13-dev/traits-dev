defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, javascript]
  attack: T1489

traits:
  - id: routeros-interface-disable-loop
    desc: RouterOS interface disable loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: ':foreach[\s\S]{0,360}/interface disable'

  - id: routeros-dhcp-disabled
    desc: RouterOS DHCP disabled
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/ip dhcp-server set[\s\S]{0,140}disabled=yes'

  - id: routeros-route-removal
    desc: RouterOS route removal
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /ip route remove

composite_rules:
  - id: routeros-network-service-degrade
    desc: RouterOS network service degrade
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-interface-disable-loop
    any:
      - id: routeros-dhcp-disabled
      - id: routeros-route-removal
