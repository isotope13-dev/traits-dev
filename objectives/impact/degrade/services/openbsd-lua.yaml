defaults:
  platforms: [openbsd, bsd, unix]
  for: [lua]
  attack: T1489

traits:
  - id: lua-rcctl-enabled-list
    desc: Lua lists enabled services
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: rcctl -l enabled

  - id: lua-rcctl-stop-service
    desc: Lua stops services with rcctl
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: rcctl stop

  - id: lua-rcctl-disable-service
    desc: Lua disables services with rcctl
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: rcctl disable

composite_rules:
  - id: lua-openbsd-service-disruption
    desc: Lua OpenBSD service disruption
    crit: hostile
    conf: 0.98
    all:
      - id: lua-rcctl-enabled-list
      - id: lua-rcctl-stop-service
      - id: lua-rcctl-disable-service

