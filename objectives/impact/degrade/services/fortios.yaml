defaults:
  platforms: [fortios, windows]
  for: [kotlin, class, jar, zip, powershell]
  attack: T1562.001

traits:
  - id: fortios-system-service-api
    desc: FortiOS system service API
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v2/cmdb/system/service

  - id: fortios-system-service-api-bytecode
    desc: FortiOS service API bytecode
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 61 70 69 2F 76 32 2F 63 6D 64 62 2F 73 79 73 74 65 6D 2F 73 65 72 76 69 63 65

  - id: fortios-security-profile-api
    desc: FortiOS security profile API
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v2/cmdb/security-profiles/

  - id: fortios-security-profile-api-bytecode
    desc: FortiOS security API bytecode
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 2F 61 70 69 2F 76 32 2F 63 6D 64 62 2F 73 65 63 75 72 69 74 79 2D 70 72 6F 66 69 6C 65 73 2F

  - id: fortios-service-disable-body
    desc: FortiOS service disable body
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"status"\s*:\s*"disable"|status\s*=\s*"disable"'

  - id: fortios-service-disable-bytecode
    desc: FortiOS disable body bytecode
    crit: suspicious
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: hex
      pattern: 73 74 61 74 75 73 22 3A 22 64 69 73 61 62 6C 65

  - id: fortios-management-enable-body
    desc: FortiOS management access enable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'management-access[\s\S]{0,260}(telnet|ssh|http|https)[\s\S]{0,80}"enable"'

composite_rules:
  - id: fortios-service-disruption
    desc: FortiOS service disruption
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: fortios-system-service-api
      - id: fortios-system-service-api-bytecode
      - id: fortios-service-disable-body
      - id: fortios-service-disable-bytecode

  - id: fortios-security-profile-disable
    desc: FortiOS security profile disable
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: fortios-security-profile-api
      - id: fortios-security-profile-api-bytecode
      - id: fortios-service-disable-body
      - id: fortios-service-disable-bytecode
