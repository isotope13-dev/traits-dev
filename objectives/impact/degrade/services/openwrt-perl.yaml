defaults:
  platforms: [openwrt, unix]
  for: [perl]
  attack: T1489

traits:
  - id: perl-httpd-service-name
    desc: Perl httpd service target
    crit: component
    conf: 0.86
    if:
      type: text
      word: httpd
  - id: perl-dnsmasq-service-name
    desc: Perl dnsmasq service target
    crit: component
    conf: 0.86
    if:
      type: text
      word: dnsmasq
  - id: perl-odhcpd-service-name
    desc: Perl odhcpd service target
    crit: component
    conf: 0.86
    if:
      type: text
      word: odhcpd
  - id: perl-kill-nine-pid-pattern
    desc: Perl kill signal 9 by PID idiom
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'kill\s+9,\s*\$pid'

composite_rules:
  - id: perl-openwrt-core-service
    desc: Perl OpenWrt core service (dnsmasq/odhcpd) reference
    crit: component
    conf: 0.86
    any:
      - id: perl-dnsmasq-service-name
      - id: perl-odhcpd-service-name
  - id: perl-kill-nine-pid
    desc: Perl kill signal 9 by PID in OpenWrt service-disruption context
    crit: suspicious
    conf: 0.88
    all:
      - id: perl-kill-nine-pid-pattern
      - id: perl-openwrt-core-service
  - id: perl-openwrt-service-disrupt-list
    desc: Perl OpenWrt service disruption list
    crit: suspicious
    conf: 0.9
    needs: 2
    all:
      - id: perl-openwrt-core-service
    any:
      - id: perl-httpd-service-name
      - id: micro-behaviors/communications/http/server/listener::nginx-keyword
      - id: micro-behaviors/os/service/remote::sshd-ref
      - id: perl-dnsmasq-service-name
      - id: perl-odhcpd-service-name
  - id: perl-openwrt-service-disruption
    desc: Perl OpenWrt service disruption
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/terminate/command::killall
      - id: perl-openwrt-service-disrupt-list
    any:
      - id: perl-kill-nine-pid
      - id: micro-behaviors/process/terminate/command::kill-force
