defaults:
  platforms: [unix]
  for: [shell]
  attack: T1489

traits:
  - id: shell-pkill-macos-services
    desc: Shell kills macOS services
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'pkill -f "\$svc"[\s\S]{0,260}(WindowServer|loginwindow|securityd)'

  - id: shell-disable-network-services
    desc: Shell disables network services
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: networksetup -setnetworkserviceenabled "Wi-Fi" off

  - id: shell-disable-spotlight
    desc: Shell disables Spotlight
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: mdutil -i off /

composite_rules:
  - id: shell-macos-service-degrade
    desc: Shell macOS service degrade
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: shell-pkill-macos-services
      - id: shell-disable-network-services
      - id: shell-disable-spotlight
