defaults:
  platforms: [unix]
  for: [c, elf]
  attack: T1489

traits:
  - id: native-kill-core-services
    desc: Native kills core services
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'killall -9 sshd[\s\S]{0,160}killall -9 cron[\s\S]{0,160}killall -9 nginx'

  - id: native-remove-ssh-host-keys
    desc: Native removes SSH host keys
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'rm -f %s[\s\S]{0,260}ssh_host_(rsa|ed25519|ecdsa)_key'

composite_rules:
  - id: native-linux-service-disruption
    desc: Native Linux service disruption
    crit: hostile
    conf: 0.98
    any:
      - id: native-kill-core-services
      - id: native-remove-ssh-host-keys
