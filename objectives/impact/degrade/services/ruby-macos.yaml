defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1489

traits:
  - id: ruby-launchctl-service-list
    desc: Ruby launchctl service list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Open3.capture3('launchctl', 'list')

  - id: ruby-launchctl-stop-service
    desc: Ruby launchctl stop service
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Open3.capture3('launchctl', 'stop'

  - id: ruby-launchctl-bootout
    desc: Ruby launchctl bootout
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "'launchctl', 'bootout'"

composite_rules:
  - id: ruby-macos-launchctl-service-degrade
    desc: Ruby launchctl service degrade
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-launchctl-service-list
    any:
      - id: ruby-launchctl-stop-service
      - id: ruby-launchctl-bootout
    needs: 1
