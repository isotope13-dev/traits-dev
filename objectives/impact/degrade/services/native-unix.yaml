defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1489

traits:
  - id: native-service-stop-status
    desc: Native service stop status
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Service PID %d stopped|service PID %d stopped'

  - id: native-web-service-targets
    desc: Native web service targets
    crit: component
    conf: 0.88
    count_min: 3
    if:
      type: text
      regex: '\b(httpd|nginx|apache|sshd)\b'

  - id: native-database-service-targets
    desc: Native database service targets
    crit: component
    conf: 0.88
    count_min: 3
    if:
      type: text
      regex: '\b(mysql|postgres|redis|mongod)\b'

  - id: native-app-service-targets
    desc: Native app service targets
    crit: component
    conf: 0.88
    count_min: 2
    if:
      type: text
      regex: '\b(tomcat|jboss|weblogic)\b'

  - id: native-kill-sigstop-source
    desc: Native SIGSTOP kill call
    crit: notable
    conf: 0.92
    for: [c, cpp, objc]
    if:
      type: text
      regex: 'kill\s*\([^;]{0,120}SIGSTOP'
    unless:
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path

composite_rules:
  - id: native-scheduler-dns-targets
    desc: Native scheduler/DNS daemon names co-occur
    crit: component
    conf: 0.88
    # Require each distinct daemon name as a whole word (not count_min on a
    # regex, where the English word "named" alone could satisfy the count).
    # The daemon-name atoms are neutral keywords in micro-behaviors/.
    all:
      - id: metadata/file/string/process-name::crond-name
      - id: metadata/file/string/process-name::xinetd-name
      - id: metadata/file/string/process-name::inetd-name
      - id: metadata/file/string/process-name::named-name

  - id: native-service-target-evidence
    desc: Native service target evidence
    crit: component
    conf: 0.92
    needs: 2
    any:
      - id: native-web-service-targets
      - id: native-scheduler-dns-targets
      - id: native-database-service-targets
      - id: native-app-service-targets

  - id: native-service-sigstop-disruption
    desc: Native SIGSTOP service disruption
    crit: hostile
    conf: 0.98
    all:
      - id: native-service-target-evidence
    any:
      - id: native-service-stop-status
      - id: native-kill-sigstop-source
