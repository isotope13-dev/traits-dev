defaults:
  platforms: [freebsd, unix]
  for: [ruby]
  attack: T1489

traits:
  - id: ruby-service-stop-loop
    desc: Ruby loops service stop commands
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'TARGET_SERVICES[\s\S]{0,360}service #\{svc\} stop'

  - id: ruby-core-service-targets
    desc: Ruby targets core server services
    crit: suspicious
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: "'(sshd|nginx|apache24)'"

  - id: ruby-data-service-targets
    desc: Ruby targets data server services
    crit: suspicious
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: "'(postgresql|mysql|redis)'"

  - id: ruby-mail-service-targets
    desc: Ruby targets mail services
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: "'(dovecot|postfix)'"

composite_rules:
  - id: ruby-freebsd-service-stoppage
    desc: Ruby stops FreeBSD server services
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-service-stop-loop
    any:
      - id: ruby-core-service-targets
      - id: ruby-data-service-targets
      - id: ruby-mail-service-targets
