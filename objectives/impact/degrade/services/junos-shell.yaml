defaults:
  platforms: [junos, appliance, unix]
  for: [shell]
  attack: T1489

traits:
  - id: shell-junos-service-targets
    desc: Shell Junos service target set
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'mgd[\s\S]{0,80}snmpd[\s\S]{0,80}sshd[\s\S]{0,80}syslogd'
  - id: shell-service-kill-loop
    desc: Shell service kill loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'for svc in \$svcs[\s\S]{0,220}killall "\$svc"[\s\S]{0,160}pkill -f "\$svc"'

composite_rules:
  - id: shell-junos-service-disruption
    desc: Shell Junos service disruption
    crit: hostile
    conf: 0.98
    all:
      - id: shell-junos-service-targets
      - id: shell-service-kill-loop
