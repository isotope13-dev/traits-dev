# Writable+Executable Sections (W^X Violation)
# Detects sections with both write and execute permissions
# Modern security practices enforce W^X (write XOR execute) memory protection
defaults:
  platforms: [windows, linux, unix, android, macos, ios]
  for: [binaries]
  crit: notable
  conf: 1.0
traits:
  - id: wx-section
    desc: Writable and executable section (W^X violation)
    size_min: 32768
    if:
      type: section
      writable: true
      executable: true
      length_min: 32
    downgrade:
      any:
        - id: metadata/format/pe::rich-imported-low-entropy-layout
        - id: metadata/format/pe::dotnet-metadata
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature
        - id: objectives/anti-static/packer/detect::upx-section
        # Known packers, protectors, and kernel drivers with legitimate W+X sections
        - type: string_value
          regex: "(Enigma Protector|enigmaprotector\\.com|ASProtect\\\\SpecData|ntoskrnl\\.exe)"
        - id: metadata/lang/compiler::watcom-runtime
    # W^X violations indicate:
    # - Self-modifying code
    # - JIT compilation without proper memory protection
    # - Malware with runtime code generation
    # - Exploitation techniques (code injection, ROP gadgets)
    # Modern binaries should use separate W-only and X-only pages
