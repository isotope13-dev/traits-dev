# Writable+Executable Sections (W^X Violation)
# Detects sections with both write and execute permissions
# Modern security practices enforce W^X (write XOR execute) memory protection
defaults:
  platforms: [windows, linux, unix, android, macos, ios]
  for: [pe, elf, macho]
  crit: suspicious
  conf: 1.0
traits:
  - id: wx-section
    desc: Writable and executable section (W^X violation)
    if:
      type: section
      writable: true
      executable: true
      length_min: 32
    downgrade:
      any:
        - type: string
          exact: "Software\\ASProtect\\SpecData"
        - type: section
          substr: '.themida'
        - type: raw
          regex: "(PECompac|Enigma Protector|BSJB)" # Common benign protectors and NGEN images with RWX sections
        - type: raw
          regex: "(enigmaprotector\\.com|ntoskrnl|storport\\.sys)" # Common benign protectors and Windows drivers
        - type: raw
          regex: "ScsiMiniPort" # StorPort miniport drivers commonly expose discardable RWX INIT sections
        - type: section
          regex: "^(UPX\\d|\\.upx)" # UPX-packed binaries inherently have RWX sections for decompression
        - id: metadata/purpose/debug-tool::ollydbg-executable-marker
    # W^X violations indicate:
    # - Self-modifying code
    # - JIT compilation without proper memory protection
    # - Malware with runtime code generation
    # - Exploitation techniques (code injection, ROP gadgets)
    # Modern binaries should use separate W-only and X-only pages
