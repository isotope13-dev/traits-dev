defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
traits:
  - id: fake-author-claim
    desc: Suspicious claims about authorship or purpose
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: (?i)this module contains abstractions for the input stream
  - id: discourage-inspection
    desc: Comments discouraging code inspection
    crit: suspicious
    conf: 0.9
    for: [shell, python, javascript, powershell]
    if:
      type: raw
      regex: (?i)(don't|do not) have to look(s)? further|(?i)ignore this (file|module)
  - id: crackme-lure
    desc: CrackMe lure string in binary
    crit: notable
    conf: 0.75
    for: [pe, dll, elf]
    if:
      type: string_value
      substr: "CrackMe"
composite_rules: []
