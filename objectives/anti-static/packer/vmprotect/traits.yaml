defaults:
  platforms: [windows, linux, unix, android, macos, ios]
  for: [pe, elf, macho]
  entropy_min: 6.5  # VMProtect replaces code with encrypted VM bytecode; protected sections have elevated entropy
traits:
  - id: section
    desc: VMProtect detected via section names
    crit: suspicious
    conf: 0.95
    attack: "T1027.002"
    if:
      type: section
      regex: "^\\.vmp[0-2]"
