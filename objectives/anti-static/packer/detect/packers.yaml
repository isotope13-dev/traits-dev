defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: enigma-protector
    desc: "Enigma Protector marker"
    if:
      type: string
      substr: "Enigma Protector"
composite_rules:
  - id: common-packers
    desc: "Common PE packers"
    crit: notable
    conf: 0.85
    any:
      - id: objectives/anti-static/packer/detect::upx-section
      - id: objectives/anti-static/packer/detect::upx-marker
      - id: metadata/format/pe::asprotect
      - id: objectives/anti-static/packer/detect::aspack-marker
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
      - id: enigma-protector
