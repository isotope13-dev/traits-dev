defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: hex-buffer-decode
    desc: Usage of Buffer.from(..., 'hex') for decoding
    crit: notable
    conf: 1.0
    if:
      type: raw
      regex: "Buffer\\.from\\(.{1,50}, ['\"]hex['\"]\\)"
    downgrade:
      any:
        - id: metadata/dev/testing::is-test
  - id: read-font-file
    desc: Reads a font file (woff2, ttf, otf)
    crit: notable
    conf: 1.0
    if:
      type: raw
      regex: "readFileSync.{0,100}\\.(woff2|ttf|otf)"
  - id: function-constructor
    desc: Generic Function constructor usage
    crit: notable
    conf: 1.0
    if:
      type: raw
      substr: "new Function("
  - id: function-constructor-require
    desc: Function constructor with require access
    crit: suspicious
    conf: 1.0
    if:
      type: raw
      substr: "new (Function.constructor)('require'"
composite_rules:
  - id: font-steganography-hex
    desc: Load JavaScript from font file (hex)
    crit: suspicious
    conf: 1.0
    all:
      - id: hex-buffer-decode
      - id: read-font-file
      - id: function-constructor
