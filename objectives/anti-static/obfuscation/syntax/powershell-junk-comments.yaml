defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1027
traits:
  - id: powershell-junk-comments
    desc: Repeated PowerShell block comments (junk obfuscation)
    crit: suspicious
    conf: 0.85
    count_min: 3
    if:
      type: raw
      # Looks for multiple <#...#> blocks often inserted to break signatures
      regex: '(?i)<\#[a-z0-9]{3,5}\#>'
