defaults:
  platforms: [linux, macos, windows]
  for: [scripts, source, documents]
traits:
  - id: js-junk-comment-long
    desc: Detects very long, continuous alphanumeric comments often
    crit: notable
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: //[a-zA-Z0-9]{100,}
    unless:
      - id: metadata/library/runtime::next-edge-runtime-bundle
      - id: metadata/library/structure::js-emscripten-generated-bundle
