defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, source, documents]
traits:
  - id: js-junk-comment-long
    desc: Detects very long, continuous alphanumeric comments often
    crit: notable
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: //[a-zA-Z0-9]{100,}
