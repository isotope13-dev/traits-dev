defaults:
  platforms: [linux, macos, windows]
  for: [scripts, source, documents]
traits:
  - id: js-junk-comment-long
    desc: Long unbroken alphanumeric line comment
    crit: suspicious
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: //[a-zA-Z0-9]{250,}
    not:
      - substr: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/"
    unless:
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: micro-behaviors/process/interpreter/vm/
      - id: inline-media-data-uri
      - id: metadata/package/files/system-package::julia-runtime-path
      - id: well-known/lib/es-module-lexer/
      - type: path
        regex: '(?i)(\.story\.(t|j)sx?$|[\\/]stories[\\/]|@wordpress[\\/])'

  - id: inline-media-data-uri
    desc: Inline media data URI asset
    crit: baseline
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: 'data:(audio|image|font)/[a-z0-9.+-]+;base64,|data:font/[a-z0-9.+-]+;base64,'
