defaults:
  platforms: [linux, macos, windows]
  for: [scripts, source, documents]
traits:
  - id: js-junk-comment-long
    desc: Long unbroken alphanumeric line comment
    crit: suspicious
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: //[a-zA-Z0-9]{100,}
    not:
      # Exclude base64-encoded blobs where // is just data
      - substr: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/"
    unless:
      - id: metadata/library/runtime::next-edge-runtime-bundle
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/flutter::wakelock-plus-asset
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - type: basename
        regex: 'no_sleep\.js$'
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
