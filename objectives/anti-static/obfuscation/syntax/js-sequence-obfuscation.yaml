defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-sequence-expression-obfuscation
    desc: "JS sequence access"
    crit: suspicious
    conf: 0.95
    size_max: 500000
    if:
      type: tree-sitter
      language: javascript
      query: |
        [
          (member_expression
            object: (parenthesized_expression
              (sequence_expression
                (string)
                (_)
              )
            )
          )
          (subscript_expression
            object: (parenthesized_expression
              (sequence_expression
                (string)
                (_)
              )
            )
          )
        ] @seq_expr
    unless:
      - id: metadata/package/documentation::unix-manpage
  - id: comma-tuple-map-append
    desc: 'JS comma-operator tuple concatenation'
    crit: notable
    conf: 0.97
    if:
      type: text
      regex: '\(\d+,\s*\d+,\s*\w+\)\s*\+\s*\(\d+,\s*\d+,\s*\w+\[\w+\]\)'
