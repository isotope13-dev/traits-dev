defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-sequence-expression-obfuscation
    desc: "JS sequence access"
    crit: suspicious
    conf: 0.95
    for: [javascript]
    size_max: 500000
    if:
      type: ast
      language: javascript
      query: |
        [
          (member_expression
            object: (parenthesized_expression
              (sequence_expression
                (string)
                (_)
              )
            )
          )
          (subscript_expression
            object: (parenthesized_expression
              (sequence_expression
                (string)
                (_)
              )
            )
          )
        ] @seq_expr
