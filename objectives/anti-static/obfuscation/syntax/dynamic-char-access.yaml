defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: js-dynamic-char-access
    desc: JavaScript dynamic charAt/charCodeAt access via function return
    crit: suspicious
    conf: 0.9
    for:
      - javascript
    if:
      type: string_literal
      regex: \w+\[(CUJ|lVJ|SNm)\(\)\]\(
    attack: T1027
    mbc: B0032
