defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-junk-loop-assignments
    desc: Multiple assignments to the same junk variable
    crit: suspicious
    for: [javascript]
    if:
      type: tree-sitter
      language: javascript
      query: |
        (while_statement
          body: (statement_block
            (expression_statement
              (assignment_expression
                left: (identifier) @var
                right: (number)
              )
            )
            (expression_statement
              (assignment_expression
                left: (identifier)
                right: (_)
              )
            )
            (expression_statement
              (assignment_expression
                left: (identifier) @var2
                right: (number)
              )
            )
            (#eq? @var @var2)
          )
        )
    unless:
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/package/testing/harness/runtime::is-test
