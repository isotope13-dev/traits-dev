defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-comma-constant-obfuscation
    desc: Comma operator used to obscure constants
    crit: component
    for: [javascript]
    if:
      type: tree-sitter
      language: javascript
      query: |
        (sequence_expression
          (number)+
          (number) @last
        )
        (#match? @last "^[0-9]+$")
