defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-comma-constant-obfuscation
    desc: Comma operator used to obscure constants
    crit: component
    for: [javascript]
    # `(1, 2, 3, …)` — an all-numeric comma sequence. The cached
    # `ast.numeric_sequence_max_length` metric counts the longest such run in
    # the single AST walk (≥2 numeric members).
    if:
      type: metrics
      field: 'ast.numeric_sequence_max_length'
      min: 2
