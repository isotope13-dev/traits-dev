defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-prototype-extension
    desc: String.prototype extension
    crit: component
    conf: 0.8
    if:
      type: text
      regex: String\.prototype\.[\w]+\s*=\s*function
    unless:
      - id: metadata/lang/javascript-features::closure-externs-annotation
    downgrade:
      any:
        - id: metadata/library/structure::js-large-module-bundle
        - id: micro-behaviors/process/create/shell/host/
  # NOTE: `str.replace(token, map[key])` (formerly js-replace-map, suspicious) was
  # removed — it is the canonical template / i18n substitution idiom (jQuery Steps,
  # lodash templates, localization libs), carries no standalone obfuscation signal,
  # and had no composite consumer, so it only produced false positives.
  - id: js-split-join-empty
    desc: Split-join pattern (custom decoding)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: this\.split\("[^"]{1,120}"\)\.join\(""\)
  - id: js-base64-custom-loop
    desc: "Custom b64 decoding loop w/ bitwise operations"
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: String\.fromCharCode\(.{0,80}<<\s*2.{0,80}0x30.{0,80}>>\s*4
  - id: js-global-marker-strip-empty
    desc: Regex strips inserted marker from string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: replace\(/([A-Za-z]{6,24})/g,\s*''\)
  - id: js-trig-identity-decoder
    desc: Trig identity arithmetic decoder
    crit: suspicious
    conf: 0.93
    count_min: 4
    if:
      type: text
      substr: Math.pow(Math.sin(
  - id: js-trig-round-identity-decoder
    desc: Trig round identity junk decoder
    crit: suspicious
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: Math\.round\(\(Math\.pow\(Math\.sin\(
  - id: js-multi-charcode-decoder
    desc: Multi-arity fromCharCode decoder
    crit: notable
    conf: 0.9
    count_min: 5
    if:
      type: text
      regex: String\.fromCharCode\(.{0,80},.{0,80}\)
    not:
      - substr: "String.fromCharCode(Number.parseInt(v.slice(1)"
      - substr: "bytesToString:function(n){for(var x=[],e=0;e<n.length;e++)x.push("
      - substr: "/*! markdown-it 14.1.0 https://github.com/markdown-it/markdown-it"
      - substr: 'String.fromCharCode(55349,56320+'
    unless:
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: well-known/lib/pdfjs/
  - id: js-indexof-charat-decoder
    desc: indexOf and charAt decode loop
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: indexOf\([^)]{0,48}charAt\(
    unless:
      - id: metadata/library/structure/
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - type: text
        substr: 'base64ToBytes:function(n){n=n.replace(/[^A-Z0-9+\/]/gi,"")'
      - type: text
        substr: kugoujsbridge://start.kugou_jsbridge/?
      - type: text
        substr: mermaid-architecture
composite_rules:
  - id: js-marker-stripped-base64-decoder
    desc: Marker-stripped custom Base64 decoder
    crit: suspicious
    conf: 0.95
    all:
      - id: js-prototype-extension
      - id: js-base64-custom-loop
      - id: js-global-marker-strip-empty
  - id: js-trig-charcode-decoder
    desc: Arithmetic string decoder with charcode reconstruction
    crit: suspicious
    conf: 0.95
    all:
      - id: js-trig-identity-decoder
      - id: js-multi-charcode-decoder
  - id: js-trig-grid-charcode-decoder
    desc: Trig decoder rebuilding dense token grid
    crit: suspicious
    conf: 0.96
    all:
      - id: js-trig-round-identity-decoder
      - id: js-multi-charcode-decoder
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-indexed-short-token-grid
