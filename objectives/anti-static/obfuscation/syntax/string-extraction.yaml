defaults:
  attack: T1027
  mbc: B0032
  platforms:
    - windows
    - unix
  for:
    - javascript
    - typescript
traits:
  - id: js-string-literal-charat-access
    desc: "Accessing charAt property on via"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '["''][^"''\n]{1,50}["'']\s*\[\s*["'']charAt["'']\s*\]'
  - id: js-dense-string-literal-charat-access
    desc: Dense access of charAt property on string
    crit: suspicious
    conf: 0.98
    count_min: 5
    per_kb_min: 1.0
    if:
      type: text
      regex: '["''][^"''\n]{1,50}["'']\s*\[\s*["'']charAt["'']\s*\]'
  - id: js-dense-charat-calls
    desc: Dense charAt calls on variables or literals
    crit: suspicious
    conf: 0.8
    count_min: 20
    per_kb_min: 2.0
    if:
      type: string_literal
      substr: charAt
    unless:
      - id: metadata/lang/source::haxe-source
