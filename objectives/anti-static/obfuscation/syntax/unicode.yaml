# Unicode Obfuscation in JScript
# Detects heavy use of Unicode escapes in identifiers and property access
defaults:
  platforms: [linux, macos, windows]
  crit: suspicious
  conf: 0.9
  for: [javascript]
traits:
  - id: js-unicode-escaped-identifiers
    desc: "Repeated Unicode-escaped identifiers in source"
    # Require multiple real source lines. A broad unanchored search also
    # matches escaped snippets embedded in HTML test fixtures and strings;
    # one such fixture is language coverage, not identifier obfuscation.
    count_min: 2
    if:
      type: text
      # Matches var \uXXXX where \u is literal text in the source
      regex: '(?m)^[ \t]*(var|function)\s+\\\\u[0-9a-fA-F]{4}'
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: js-activex-via-this-obfuscated
    desc: "ActiveXObject accessed via 'this' w/ obf"
    if:
      type: text
      # Matches this[{...:'\uXXXX'}. where \u is literal text in the source
      regex: 'this\[\s*\{[^:]{1,120}:[''"]\\\\u[0-9a-fA-F]{4}[''"]\}\.'
