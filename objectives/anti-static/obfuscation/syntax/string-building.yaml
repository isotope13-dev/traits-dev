# JavaScript String Building Obfuscation
# Detects incremental string building patterns typical of JScript malware
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [linux, macos, windows]
traits:
  # High density of small string-appending functions (JScript obfuscation)
  - id: js-dense-string-building
    desc: Dense incremental string building
    crit: notable
    conf: 0.95
    mbc: "B0032"
    attack: "T1027"
    for: [javascript]
    count_min: 3
    if:
      type: text
      regex: 'function\s+\w+\(\)\s*\{\s*\w+\s*\+='
      # Pattern: function name() { var += 'str'; };
    unless:
      - type: text
        substr: "__p+=__j.call(arguments,'')"
      - type: text
        substr: 'Function("_","return "+o)(u)'
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/lodash/
      - id: well-known/lib/cheerio/
      - id: well-known/app/wordpress-plugins/
