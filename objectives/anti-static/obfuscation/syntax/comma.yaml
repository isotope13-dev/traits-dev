defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-comma-sequence-obfuscation-v2
    desc: Many comma sequence expressions (obfuscation)
    crit: baseline
    conf: 0.8
    for:
      - javascript
      - typescript
    if:
      # Migrated from a tree-sitter `(expression_statement (sequence_expression))`
      # query (count_min: 5) to the `ast.sequence_count` density
      # metric — counted inline in the single AST walk; O(1) match.
      type: metrics
      field: 'ast.sequence_count'
      min: 5
    downgrade:
      any:
        - type: string_literal
          regex: BinaryParser
        - type: text
          regex: typeof\s+module\s*!=\s*['"]undefined['"]
        - type: text
          regex: typeof\s+window\s*!=\s*['"]undefined['"]
    unless:
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/web-frameworks::wordpress-block-build-asset
      - type: text
        substr: -module(
    not:
      - substr: __webpack_module_cache__
