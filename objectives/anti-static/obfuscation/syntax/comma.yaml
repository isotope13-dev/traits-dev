defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: js-comma-sequence-obfuscation-v2
    desc: Many comma sequence expressions (obfuscation)
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    count_min: 5
    if:
      type: ast
      language: javascript
      query: "(expression_statement\n  (sequence_expression)\n) @seq\n"
    downgrade:
      any:
        - type: string_literal
          regex: BinaryParser
        - type: text
          regex: typeof\s+module\s*!=\s*['"]undefined['"]
        - type: text
          regex: typeof\s+window\s*!=\s*['"]undefined['"]
    unless:
      - type: text
        substr: -module(
      - type: text
        substr: automatically generated
      - type: text
        substr: DO NOT MODIFY BY HAND
