defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-comma-sequence-obfuscation-v2
    desc: Many comma sequence expressions (obfuscation)
    crit: baseline
    conf: 0.8
    for:
      - javascript
      - typescript
    count_min: 5
    if:
      type: ast
      language: javascript
      query: "(expression_statement\n  (sequence_expression)\n) @seq\n"
    downgrade:
      any:
        - type: string_literal
          regex: BinaryParser
        - type: text
          regex: typeof\s+module\s*!=\s*['"]undefined['"]
        - type: text
          regex: typeof\s+window\s*!=\s*['"]undefined['"]
    unless:
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - type: text
        substr: normalize.css
      - type: text
        substr: -module(
    not:
      - substr: __webpack_module_cache__
