defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: js-comma-operator-abuse
    desc: JavaScript comma operator abuse for obfuscation (e.g.,
    crit: suspicious
    conf: 0.8
    for:
      - javascript
    if:
      type: string_literal
      regex: \(\s*\d+\s*(,\s*\d+\s*){6,}\)
    not:
      - substr: 'svgNS="http://www.w3.org/2000/svg"'
    attack: T1027
    mbc: B0032
