defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-comma-operator-abuse
    # The parser distinguishes a JavaScript sequence expression `(1,2,3,...)`
    # from function arguments, arrays, matrices, and numeric string data. A long
    # numeric sequence evaluates only its final operand and is characteristic of
    # generated obfuscation rather than ordinary numeric data handling.
    desc: Comma-operator integer sequence expression
    crit: suspicious
    conf: 0.8
    for:
      - javascript
    if:
      type: metrics
      field: ast.numeric_sequence_max_length
      min: 7
    unless:
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/lang/encoded/unicode-escape::sourcemap-unicode-escape-layer
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/files/system-package::julia-runtime-path
      - id: well-known/lib/skia::source-tree
      - id: well-known/app/google-web::google-help-center-page
    attack: T1027
    mbc: B0032
