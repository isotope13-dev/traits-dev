defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-comma-operator-abuse
    # Require the actual parenthesized sequence syntax. The aggregate numeric
    # sequence metric also counts ordinary array literals such as
    # `highlightLines={[1, 5, 6]}`, which are not comma-operator expressions.
    desc: Comma-operator integer sequence expression
    crit: suspicious
    conf: 0.8
    for:
      - javascript
    if:
      type: text
      # A call such as `codepoint(170,181,...)` is an argument list, not a
      # sequence expression. Anchor the opening parenthesis to expression
      # punctuation (or `return`) so generated lookup tables do not match.
      regex: '((^|[=;:{}?])\s*|\breturn\s+)\(\s*\d+(\s*,\s*\d+){6,}\s*\)'
    unless:
      # Language detection is heuristic for shader/preprocessor templates;
      # their comma-separated numeric lookup tables are not JavaScript
      # sequence expressions.
      - type: basename
        regex: '\.(tmpl|wgsl|glsl|hlsl)$'
      # Dart source is currently classified as JavaScript by the generic
      # language detector; Dart collection and argument commas are not JS
      # sequence expressions.
      - id: metadata/file/extension/identity::dart-source-basename
      - id: metadata/file/extension/identity::haskell-source-basename
      - id: metadata/file/format::sourcemap-context
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/files/system-package::julia-runtime-path
      - id: well-known/lib/skia::source-tree
      - id: well-known/app/google-web::google-help-center-page
    attack: T1027
    mbc: B0032
