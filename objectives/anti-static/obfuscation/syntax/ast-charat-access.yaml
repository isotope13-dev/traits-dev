defaults:
  platforms: [linux, macos, windows]
traits:
  - id: ast-bracket-charat-access
    desc: Accessing charAt property on a string literal
    crit: suspicious
    conf: 0.98
    mbc: "B0032"
    attack: "T1027"
    for: [javascript, typescript]
    # `"…"["charAt"]` — bracket-access of the charAt method on a string literal
    # (string-API obfuscation). The quote→`["charAt"]` run is distinctive text.
    if:
      type: text
      regex: '[''"]\s*\[\s*[''"]charAt[''"]\s*\]'
