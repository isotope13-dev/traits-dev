defaults:
  platforms: [linux, macos, windows]
  for:
    - html
  attack: T1027
  mbc: B0032
traits:
  - id: html-large-inline-base64-blob
    desc: Large inline Base64 blob in script
    crit: suspicious
    conf: 0.86
    size_min: 4096
    if:
      type: text
      regex: var\s+_0x[a-f0-9]{4,}\s*=\s*['"][A-Za-z0-9+/=]{1024,}
  - id: html-atob-call
    desc: HTML script uses atob decode
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: atob\s*\(
  - id: html-textdecoder-utf8-atom
    desc: HTML TextDecoder utf8 usage
    crit: component
    conf: 0.82
    if:
      type: text
      regex: TextDecoder\(["']utf-8["']
  - id: html-charcode-decode
    desc: HTML charCode decode helper
    crit: component
    conf: 0.78
    if:
      type: text
      substr: charCodeAt(
  - id: html-fromcharcode-decode
    desc: HTML fromCharCode decode helper
    crit: component
    conf: 0.78
    if:
      type: text
      substr: fromCharCode
composite_rules:
  - id: html-xor-self-decoding-loader
    desc: Self-decoding HTML loader with Base64 blob, XOR routine, and dynamic execution
    crit: suspicious
    conf: 0.98
    all:
      - id: html-large-inline-base64-blob
      - id: html-atob-call
      - id: micro-behaviors/data/encode/xor::js-charcode-xor-operation
      - id: html-textdecoder-utf8
      - id: micro-behaviors/process/interpreter/eval::js-new-function-constructor
  - id: html-textdecoder-utf8
    desc: HTML TextDecoder utf8 decode stage
    crit: suspicious
    conf: 0.84
    all:
      - id: html-textdecoder-utf8-atom
    any:
      - id: html-atob-call
      - id: html-charcode-decode
      - id: html-fromcharcode-decode
    near_bytes: 200
  - id: browser-base64-xor-document-rewrite-loader
    desc: Base64 XOR document rewrite loader
    crit: hostile
    conf: 0.98
    ref: sha256:2e95c6a1842b99a4045e973126f1b16261cb8f0b89ee9e7c618a6e4d0746d7fd
    for: [html, javascript]
    all:
      - id: micro-behaviors/data/encode/base64::large-string-assignment
      - id: micro-behaviors/data/decode/xor::js-repeating-key-charcode-xor-decoder
      - id: micro-behaviors/ui/window/manage/dom::browser-aliased-document-rewrite-call
