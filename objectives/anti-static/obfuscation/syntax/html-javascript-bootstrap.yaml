defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - html
  attack: T1027
  mbc: B0032
traits:
  - id: html-large-inline-base64-blob
    desc: Large inline Base64 blob in script
    crit: notable
    conf: 0.86
    size_min: 4096
    if:
      type: raw
      regex: var\s+_0x[a-f0-9]{4,}\s*=\s*['"][A-Za-z0-9+/=]{4096,}['"]
  - id: html-atob-call
    desc: HTML script uses atob decode
    crit: notable
    conf: 0.84
    if:
      type: raw
      regex: atob\s*\(
  - id: html-xor-charcode
    desc: HTML XOR charCode loop
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: charCodeAt\(i\)\s*\^
  - id: html-textdecoder-utf8
    desc: HTML TextDecoder utf8 usage
    crit: notable
    conf: 0.82
    if:
      type: raw
      regex: TextDecoder\(["']utf-8["']
  - id: html-new-function
    desc: HTML script builds new Function
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: new Function\(
composite_rules:
  - id: html-xor-self-decoding-loader
    desc: Self-decoding HTML loader with Base64 blob, XOR routine, and dynamic execution
    crit: suspicious
    conf: 0.98
    all:
      - id: html-large-inline-base64-blob
      - id: html-atob-call
      - id: html-xor-charcode
      - id: html-textdecoder-utf8
      - id: html-new-function
