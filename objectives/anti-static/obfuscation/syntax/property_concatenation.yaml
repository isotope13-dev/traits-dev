# Property Concatenation Obfuscation
# Detects string construction using object property access {k:'v'}.k
defaults:
  platforms: [linux, macos, windows]
  crit: suspicious
  conf: 0.9
  for: [javascript]
traits:
  - id: js-property-concatenation-obfuscation
    desc: "Obfuscated string construction using property access"
    mbc: "B0032.001"
    if:
      type: text
      regex: '\{\w+\s*:\s*[''"][\w./:$-]{3,40}[''"]\}\.\w+'
    unless:
      - type: text
        regex: '\{\s*content\s*:'
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
