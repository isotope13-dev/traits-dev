defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
  crit: suspicious
  attack: "T1027"
traits:
  - id: indexed-method-resolution
    desc: Dynamic indexed string resolution
    conf: 0.85
    count_min: 5
    per_kb_min: 1.0
    if:
      type: text
      regex: '\b[_$a-zA-Z][_$a-zA-Z0-9]{1,8}\[[^\]\n]{1,24}\]\(\d{1,3}\)'
    unless:
      - id: metadata/package/testing/harness::is-test
