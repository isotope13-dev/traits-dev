defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: obfuscated-true-call-argument
    desc: Hex-obfuscated true call argument
    crit: notable
    conf: 0.78
    attack: T1027
    mbc: B0032
    if:
      type: text
      regex: '\[[^\]]{1,80}\]\s*\([^,]{1,160},\s*!0x0\s*\)'
    unless:
      - id: metadata/library/jquery::obfuscated-jquery-source
