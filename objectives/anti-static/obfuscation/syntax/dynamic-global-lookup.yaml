# Dynamic Global Lookup
# Detects obfuscated access to global properties (like ActiveXObject) via array operations
defaults:
  platforms: [unix, windows]
  crit: suspicious
  conf: 0.8
  for: [javascript]
traits:
  - id: js-dynamic-global-access-array
    desc: Accessing global property via array shift/pop
    # Detects: this[array.shift()] or this[array.pop()]
    if:
      type: text
      regex: 'this\[\w+\.(shift|pop)\(\)\]'
  - id: js-dynamic-global-access-indexed-array
    desc: Global property lookup via indexed array
    count_min: 3
    if:
      type: text
      regex: 'this\[\w+\[[^]]{1,24}\]\]'
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: metadata/library/runtime::vscode-webview-bundle
    not:
      - substr: this[comps[i]]
      - substr: "this[e[r]]"
  - id: js-array-splice-reindex
    desc: Array splice used to reorder lookup table
    count_min: 8
    if:
      type: text
      regex: '\w+\.splice\(\d+,\d+\)'
    not:
      - substr: bD(n.splice(0,3),3)
      - substr: topLeft.splice(0,4)
  - id: js-array-pop-split-source
    desc: Array pop split constructor source
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\w+\.pop\(\)\.split\(["''][^"'']{1,4}["'']\)'
  - id: js-new-from-split-indexes
    desc: Constructors from split indexes
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: 'new\s+\w+\(\w+\[[01]\]\)'
  - id: js-new-from-indexed-string-table
    desc: Constructor args from string table
    count_min: 2
    if:
      type: text
      regex: 'new\s+\w+\(\w+\[0x[0-9a-f]+\]\)'
    not:
      - substr: new Date(
      - substr: new t(e[0])
      - substr: return new t(e[0])
      - substr: case 1:return new t(e[0]);
      - substr: case 1:return new n(t[0]);
  - id: js-globalthis-indexed-eval-call
    desc: globalThis dynamic eval invocation
    conf: 0.94
    attack: T1027
    if:
      type: text
      regex: '\(?globalThis\)?\s*\[[\s\S]{0,220}\]\s*\(\s*\w+'
  - id: js-array-first-char-join
    desc: String array first characters joined
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: '\b\w+\.map\(\s*\w+\s*=>\s*\w+\[0\]\s*\)\.join\([''"]{0,2}\)'
  - id: js-eval-word-parts
    desc: Benign words conceal eval letters
    conf: 0.92
    attack: T1027
    if:
      type: text
      regex: "['\"]echo['\"][\\s\\S]{0,160}['\"]vertex['\"][\\s\\S]{0,160}['\"]alpha['\"][\\s\\S]{0,160}['\"]length['\"]"
composite_rules:
  - id: js-dynamic-global-constructor-chain
    desc: Dynamic global COM constructor chain
    crit: suspicious
    conf: 0.94
    attack: T1027
    all:
      - id: js-dynamic-global-access-array
      - id: js-array-pop-split-source
      - id: js-new-from-split-indexes
  - id: js-char-stacked-global-eval
    desc: JavaScript builds eval from word initials
    crit: suspicious
    conf: 0.97
    attack: T1027
    all:
      - id: js-globalthis-indexed-eval-call
      - id: js-array-first-char-join
    any:
      - id: js-eval-word-parts
      - id: objectives/anti-static/obfuscation/string/encoding::js-hex-escape
