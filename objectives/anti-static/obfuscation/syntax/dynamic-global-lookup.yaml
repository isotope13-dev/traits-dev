# Dynamic Global Lookup
# Detects obfuscated access to global properties (like ActiveXObject) via array operations
defaults:
  platforms: [unix, windows]
  crit: suspicious
  conf: 0.8
  for: [javascript]
traits:
- id: js-dynamic-global-access-array
  desc: Accessing global property via array shift/pop
    # Detects: this[array.shift()] or this[array.pop()]
  if:
    type: text
    regex: 'this\[\w+\.(shift|pop)\(\)\]'
- id: js-array-splice-reindex
  desc: Array splice used to reorder lookup table
  count_min: 8
  if:
    type: text
    regex: '\w+\.splice\(\d+,\d+\)'
  not:
  - substr: bD(n.splice(0,3),3)
  - substr: topLeft.splice(0,4)
  unless:
  - id: metadata/library/runtime::vscode-webview-bundle
  - id: metadata/library/structure/
  - id: metadata/library/structure::js-vite-rollup-vendor-chunk
  - id: micro-behaviors/process/create/shell/host/
  - id: metadata/library/runtime::acquire-vscode-api
- id: js-array-pop-split-source
  desc: Array pop split constructor source
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\w+\.pop\(\)\.split\(["''][^"'']{1,4}["'']\)'
- id: js-new-from-split-indexes
  desc: Constructors from split indexes
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: 'new\s+\w+\(\w+\[[01]\]\)'
- id: js-new-from-indexed-string-table
  desc: Constructor args from string table
  count_min: 2
  if:
    type: text
    regex: 'new\s+\w+\(\w+\[0x[0-9a-f]+\]\)'
  not:
  - substr: new Date(
  - substr: new t(e[0])
  - substr: return new t(e[0])
  - substr: case 1:return new t(e[0]);
  - substr: case 1:return new n(t[0]);
  unless:
  - id: metadata/library/structure::vscode-extension-generated-asset
- id: js-globalthis-indexed-call
  desc: globalThis indexed property call
  conf: 0.94
  attack: T1027
  if:
    type: text
    regex: '\(?globalThis\)?\s*\[[^\]]{1,30}\]\s*\(\s*\w+'
  unless:
    - id: metadata/library/structure/
    - id: metadata/library/structure/
    - id: metadata/package/files/dependency::node-modules-path
  not:
    - substr: "globalThis[oe]||Object.assign"
    - substr: "globalThis[re]||Object.assign"
    - substr: "globalThis[ne]||Object.assign"
- id: js-array-first-char-join
  desc: String array first characters joined
  crit: component
  conf: 0.9
  attack: T1027
  if:
    type: text
    regex: '\b\w+\.map\(\s*\(?\s*\w+\s*\)?\s*=>\s*\w+\[0\]\s*\)\.join\([''"]{0,2}\)'
- id: js-eval-initial-word-vertex
  desc: "Eval initial word: vertex"
  crit: component
  conf: 0.92
  if:
    type: text
    substr: vertex
- id: js-eval-initial-word-alpha
  desc: "Eval initial word: alpha"
  crit: component
  conf: 0.92
  if:
    type: text
    substr: alpha
- id: js-eval-initial-word-echo
  desc: "Eval initial word: echo"
  crit: component
  conf: 0.92
  if:
    type: text
    substr: echo
composite_rules:
- id: js-dynamic-global-constructor-chain
  desc: Dynamic global COM constructor chain
  crit: suspicious
  conf: 0.94
  attack: T1027
  all:
  - id: js-dynamic-global-access-array
  - id: js-array-pop-split-source
  - id: js-new-from-split-indexes
- id: js-char-stacked-global-eval
  desc: JavaScript builds eval from word initials
  crit: hostile
  conf: 0.97
  attack: T1027
  all:
  - id: js-globalthis-indexed-call
  - id: js-array-first-char-join
  any:
  - id: js-eval-initial-words
  - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
- id: js-aes-decrypt-then-global-dispatch
  desc: AES-decrypted payload run via global dispatch
  crit: hostile
  conf: 0.96
  attack: T1027.013
  for: [javascript, typescript]
  all:
  - id: micro-behaviors/crypto/symmetric/aes/runtime-library::createDecipheriv
  - id: js-globalthis-indexed-call
- id: js-eval-initial-words
  desc: Words whose initials spell eval
  crit: baseline
  conf: 0.92
  attack: T1027
  all:
  - id: metadata/lang/scripted::length-prop
  - id: js-eval-initial-word-vertex
  - id: js-eval-initial-word-alpha
  - id: js-eval-initial-word-echo
  near_bytes: 4096
