# Dynamic Global Lookup
# Detects obfuscated access to global properties (like ActiveXObject) via array operations
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: suspicious
  conf: 0.8
  for: [javascript]
traits:
  - id: js-dynamic-global-access-array
    desc: Accessing global property via array shift/pop
    # Detects: this[array.shift()] or this[array.pop()]
    if:
      type: text
      regex: 'this\[\w+\.(shift|pop)\(\)\]'
  - id: js-dynamic-global-access-indexed-array
    desc: Global property lookup via indexed array
    if:
      type: text
      regex: 'this\[\w+\[[^]]{1,24}\]\]'
  - id: js-array-splice-reindex
    desc: Array splice used to reorder lookup table
    if:
      type: text
      regex: '\w+\.splice\(\d+,\d+\)'
  - id: js-new-from-indexed-string-table
    desc: Constructor fed from indexed string table
    if:
      type: text
      regex: 'new\s+\w+\(\w+\[\d+\]\)'
