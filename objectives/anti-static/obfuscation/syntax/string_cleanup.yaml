defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-regex-string-cleanup
    desc: JavaScript string cleanup using RegExp replace
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '\.replace\(RegExp\(\w+,\s*[''"]g[''"]\),\s*[''"][''"]\)'
    unless:
      - id: well-known/lib/marked::marked-js-bundle
