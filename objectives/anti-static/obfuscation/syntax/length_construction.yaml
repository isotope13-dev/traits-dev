defaults:
  platforms: [linux, macos, windows]
traits:
  - id: length-construction
    desc: Detects fragmented length property string
    crit: suspicious
    for: [javascript]
    if:
      type: text
      regex: '("le"|''le'')\s*\+\s*("ng"|''ng'')\s*\+\s*("th"|''th'')'
    unless:
      - id: metadata/library/generated::box-extract-progress-context
