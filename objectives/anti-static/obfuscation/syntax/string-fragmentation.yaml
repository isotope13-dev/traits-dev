defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-fragmented-prop-single
    desc: 'Computed property access using concatenation'
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '[\w$]+\s*\[\s*''[^'']{0,200}''\s*\+\s*''[^'']{0,200}''\s*\]'
    unless:
      - type: text
        regex: '\[\s*[''"]pass[''"]\s*\+\s*[''"]word[''"]\s*\]\s*=\s*config\.'
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/package/files/ecosystem::openclaw-evolver-package-member
    downgrade:
      any:
        - id: metadata/package/files/ecosystem::openclaw-evolver-archive-container
  - id: js-fragmented-prop-double
    desc: 'Computed property access using concatenation'
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '[\w$]+\s*\[\s*"[^"]{0,200}"\s*\+\s*"[^"]{0,200}"\s*\]'
    unless:
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/package/files/ecosystem::openclaw-evolver-package-member
    downgrade:
      any:
        - id: metadata/package/files/ecosystem::openclaw-evolver-archive-container
  - id: js-fragmented-prop-backtick
    desc: 'Computed property access using concatenation'
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '[\w$]+\s*\[\s*`[^`]{0,200}`\s*\+\s*`[^`]{0,200}`\s*\]'
    unless:
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/package/files/ecosystem::openclaw-evolver-package-member
    downgrade:
      any:
        - id: metadata/package/files/ecosystem::openclaw-evolver-archive-container
composite_rules:
  - id: js-fragmented-property-access
    desc: Computed property access using concatenation (obfuscation)
    crit: suspicious
    conf: 0.8
    attack: T1027
    mbc: B0032
    any:
      - id: js-fragmented-prop-single
      - id: js-fragmented-prop-double
      - id: js-fragmented-prop-backtick
