defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
composite_rules:
  - id: js-fragmented-property-access
    desc: Computed property access using concatenation (obfuscation)
    crit: suspicious
    conf: 0.8
    attack: T1027
    mbc: B0032
    any:
      - id: micro-behaviors/data/source/string::computed-property-single-quote-concat
      - id: micro-behaviors/data/source/string::computed-property-double-quote-concat
      - id: micro-behaviors/data/source/string::computed-property-template-concat
