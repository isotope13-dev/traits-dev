defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: suspicious
  conf: 0.9
  attack: T1027
  mbc: B0032
composite_rules:
  - id: js-array-literal-obfuscation
    desc: Obfuscation using indexed array literals
    for: [javascript]
    needs: 2
    any:
      - id: micro-behaviors/data/source/syntax/array
      - id: objectives/anti-static/obfuscation/syntax::js-array-dynamic-execution
    unless:
      - id: metadata/library/structure::dart-flutter-js-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - id: objectives/supply-chain/trojanized/app/context::benign-bundled-extension-code
