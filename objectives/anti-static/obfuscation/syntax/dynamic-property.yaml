defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-dynamic-property-inline-function-raw
    desc: JS computed property with inline function
    crit: suspicious
    conf: 0.95
    mbc: "B0032"
    attack: "T1027"
    if:
      type: text
      # Require an object/member base before the bracket. This avoids treating
      # ordinary generated array literals such as `[(function(){...})]` as
      # computed-property obfuscation.
      regex: '(?m)\b[\w$]+\s*\[\s*\(\s*function\s*\(\)\s*\{'
  - id: js-dynamic-property-function-concat-ast
    desc: JS dynamic property function concat AST
    crit: suspicious
    conf: 0.95
    mbc: "B0032"
    attack: "T1027"
    if:
      type: tree-sitter
      language: javascript
      # Matches: obj[func1() + func2()] - bracket access with concatenated calls
      query: |
        (subscript_expression
          (binary_expression
            operator: "+"
          )
        )
  - id: js-wscript-dynamic-property-raw
    desc: "Dynamic property access on WScript object"
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    if:
      type: text
      regex: 'WScript\s*\[\s*\(function'
  - id: js-wscript-dynamic-property-ast
    desc: "Dynamic property access on WScript object"
    crit: suspicious
    conf: 0.95
    mbc: "B0032"
    attack: "T1027"
    # `WScript[...]` bracket access — unusual outside obfuscation (normal JScript
    # uses dotted `WScript.Echo`). Distinctive enough as source text.
    if:
      type: text
      regex: 'WScript\s*\['
  - id: js-computed-method-overwrite-argument
    desc: Computed call uses overwrite-style argument
    crit: component
    conf: 0.85
    mbc: B0032
    attack: T1027
    if:
      type: text
      regex: '\[\w+\(["''][^"'']{2,40}["'']\)\]\(\w+,\s*2\)'
  - id: js-computed-call-false-argument
    desc: Computed method call passes false
    crit: component
    conf: 0.85
    mbc: B0032
    attack: T1027
    if:
      type: text
      regex: '\[\w+\(["''][^"'']{2,40}["'']\)\]\([^;\n]{0,100},\s*false\)'
composite_rules:
  - id: js-dynamic-property-function-concat
    desc: Property access using concatenated function calls (likely obfuscation)
    crit: suspicious
    any:
      - id: js-dynamic-property-inline-function-raw
      - id: js-dynamic-property-function-concat-ast
  - id: js-wscript-dynamic-property
    desc: Dynamic property access on WScript object
    crit: suspicious
    any:
      - id: js-wscript-dynamic-property-raw
      - id: js-wscript-dynamic-property-ast
  - id: js-obfuscated-com-overwrite
    desc: Obfuscated COM constructor paired with overwrite-style call
    crit: hostile
    conf: 0.92
    mbc: B0032
    attack: T1027,T1106
    all:
      - id: micro-behaviors/process/interpreter/jscript::activex-object-decoder-progid
      - id: js-computed-method-overwrite-argument
