defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-dynamic-property-function-concat-raw
    desc: JS dynamic property function concat
    crit: suspicious
    conf: 0.95
    mbc: "B0032"
    attack: "T1027"
    if:
      type: text
      # Matches executable bracket access, not documentation comments such as
      # `// [(function () { ... })()]` in parser examples.
      regex: '(?m)^\s{0,80}[^/\s][^\n]{0,120}\[\s*\(\s*function\s+[\w]*\(\)\s*\{'
  - id: js-dynamic-property-function-concat-ast
    desc: JS dynamic property function concat AST
    crit: suspicious
    conf: 0.95
    mbc: "B0032"
    attack: "T1027"
    if:
      type: tree-sitter
      language: javascript
      # Matches: obj[func1() + func2()] - bracket access with concatenated calls
      query: |
        (subscript_expression
          (binary_expression
            operator: "+"
          )
        )
  - id: js-wscript-dynamic-property-raw
    desc: "Dynamic property access on WScript object"
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    if:
      type: text
      regex: 'WScript\s*\[\s*\(function'
  - id: js-wscript-dynamic-property-ast
    desc: "Dynamic property access on WScript object"
    crit: suspicious
    conf: 0.95
    mbc: "B0032"
    attack: "T1027"
    # `WScript[...]` bracket access — unusual outside obfuscation (normal JScript
    # uses dotted `WScript.Echo`). Distinctive enough as source text.
    if:
      type: text
      regex: 'WScript\s*\['
composite_rules:
  - id: js-dynamic-property-function-concat
    desc: Property access using concatenated function calls (likely obfuscation)
    crit: suspicious
    any:
      - id: js-dynamic-property-function-concat-raw
      - id: js-dynamic-property-function-concat-ast
  - id: js-wscript-dynamic-property
    desc: Dynamic property access on WScript object
    crit: suspicious
    any:
      - id: js-wscript-dynamic-property-raw
      - id: js-wscript-dynamic-property-ast
