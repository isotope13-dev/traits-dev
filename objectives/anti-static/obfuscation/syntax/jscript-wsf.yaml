defaults:
  platforms: [windows]
  for: [xml]
  attack: T1027
  mbc: B0032

traits:
  - id: xml-wsf-hex-index-obfuscation
    desc: Obfuscated JScript hexadecimal index table
    crit: suspicious
    conf: 0.95
    count_min: 10
    if:
      type: text
      regex: '\b_0x[0-9a-f]{3,}\b'

composite_rules:
  - id: obfuscated-xml-wsh-powershell-dropper
    desc: Obfuscated XML WSH PowerShell dropper
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001,T1059.007,T1105
    all:
      - id: xml-wsf-hex-index-obfuscation
      - id: objectives/command-and-control/dropper/execution/wsh::xml-wsh-script-file-loader
