# Python structural and syntax-based obfuscation
defaults:
  platforms: [windows, unix]
  for: [python, pyc]
  attack: T1027
  mbc: B0032
traits:
  - id: setattr-builtins-tamper
    desc: Tampering with __builtins__ using setattr
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'setattr\s*\(\s*__builtins__\s*,'
composite_rules:
  - id: python-obfuscated-setattr-getattr
    desc: Obfuscated setattr/getattr redirection
    crit: suspicious
    conf: 0.95
    all:
      - id: setattr-builtins-tamper
      - id: micro-behaviors/os/api-resolution/dynamic::python-getattr-call
