defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
  crit: suspicious
  attack: "T1027"
traits:
  - id: js-while-switch-state-machine
    desc: While/switch state machine pattern
    conf: 0.85
    count_min: 3
    size_max: 200000
    if:
      type: text
      regex: 'while\s*\([^)]{0,50}\)\s*(\{)?\s*switch\s*\('
