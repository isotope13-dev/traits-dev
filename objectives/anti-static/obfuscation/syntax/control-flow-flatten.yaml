defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
  crit: suspicious
  attack: "T1027"
traits:
  - id: js-while-switch-state-machine
    desc: While/switch state machine pattern
    conf: 0.85
    count_min: 3
    size_max: 200000
    if:
      type: text
      regex: 'while\s*\([^)]{0,50}\)\s*(\{)?\s*switch\s*\('
    unless:
      - id: metadata/build/bundler/
      - id: metadata/library/structure::js-known-bundler-output
      - id: well-known/lib/protocol-buffers-schema::source-parser-marker
      - id: well-known/lib/ace-editor::ace-worker-bundle
      # Some production webpack runtimes omit their marker identifiers but
      # retain this chunk-loader bootstrap shape.
      - type: text
        regex: '(?s)hasOwnProperty\.call\(.{0,300}while\s*\(\w+\.length\)\s*\w+\.shift\(\)'
      - id: metadata/library/structure::dart-flutter-js-bundle
      - id: well-known/lib/nextjs/
      - id: well-known/app/pinokio::app-bundle
