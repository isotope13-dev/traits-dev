defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
  crit: suspicious
  attack: "T1027"
traits:
  - id: js-while-switch-state-machine
    desc: While/switch state machine pattern
    conf: 0.85
    count_min: 3
    size_max: 200000
    if:
      type: text
      regex: 'while\s*\([^)]{0,50}\)\s*(\{)?\s*switch\s*\('
    unless:
      - id: metadata/build/bundler::babel-transpiled
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-webpack-minified-module-call
      - id: metadata/library/structure::dart-flutter-js-bundle
      - id: well-known/lib/nextjs/
      - id: metadata/package/files/ecosystem::openclaw-evolver-package-member
      - id: well-known/app/pinokio::app-bundle
