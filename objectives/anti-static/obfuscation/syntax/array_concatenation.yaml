defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-array-index-concatenation
    desc: Indexed array values concatenated
    crit: suspicious
    conf: 0.75
    if:
      id: micro-behaviors/data/source/syntax/array::js-indexed-array-element-combination
    not:
      - regex: 'isFile:\s*!!\(view\[0\]\s*\+\s*view\[1\]'
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::version-string
      - id: metadata/library/prototype::copyright
      - id: metadata/library/jquery::fn-extend
      - id: metadata/library/structure/
      - id: well-known/lib/benign-runtime-bundles::deno-runtime-binary
      - type: path
        basename: true
        regex: '^(deno|pkg-deno-[^/]+\.tar\.zst)$'
  - id: js-array-arithmetic-index
    desc: Array access with arithmetic index expressions
    crit: notable
    conf: 0.7
    if:
      id: micro-behaviors/data/source/syntax/array::js-indexed-array-arithmetic-access
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/jquery::fn-extend
      - id: metadata/library/structure/
