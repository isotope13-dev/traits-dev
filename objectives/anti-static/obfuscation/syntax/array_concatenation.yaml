defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-array-index-concatenation
    desc: JScript array index concatenation (URL obfuscation)
    crit: suspicious
    conf: 0.75
    count_min: 10
    per_kb_min: 0.1
    if:
      type: text
      regex: '[a-zA-Z0-9_]{2,}\s*\[\s*\d{1,3}\s*\]\s*\+\s*[a-zA-Z0-9_]{2,}\s*\[\s*\d{1,3}\s*\]'
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::version-string
      - id: metadata/library/prototype::copyright
      - id: metadata/library/jquery::fn-extend
      - id: metadata/library/d3::d3-detection
  - id: js-array-arithmetic-index
    desc: Array access with arithmetic index expressions
    crit: suspicious
    conf: 0.7
    count_min: 3
    if:
      type: text
      regex: '\b[a-zA-Z_]\w{1,8}\[\d{1,2}[\+\-]\d{1,2}\]'
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/jquery::fn-extend
      - id: metadata/library/d3::d3-detection
