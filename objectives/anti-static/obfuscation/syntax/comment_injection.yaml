defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: js-comment-injection-member
    desc: JS comment injected in member access
    crit: component
    if:
      type: text
      regex: '\.\s*/\*[A-Za-z_$][A-Za-z0-9_$]{0,24}\*/\s*\w+'
    not:
      - regex: 'istanbul ignore'
      - regex: '@class'
      - regex: '@internal'
  - id: js-comment-injection-call
    desc: JS comment injected before function call
    crit: component
    if:
      type: text
      regex: '\w+\s*/\*[A-Za-z_$][A-Za-z0-9_$]{0,24}\*/\s*\('
    not:
      - regex: 'istanbul ignore'
      - regex: '@class'
      - regex: '@internal'
  - id: js-comment-injection-index
    desc: JS comment injected in index access
    crit: component
    if:
      type: text
      regex: '\[\s*/\*[A-Za-z_$][A-Za-z0-9_$]{0,24}\*/\s*'
    not:
      - regex: 'istanbul ignore'
      - regex: '@class'
      - regex: '@internal'
composite_rules:
  - id: js-comment-injection
    desc: Comments injected in JS syntax positions
    crit: suspicious
    needs: 2
    any:
      - id: js-comment-injection-member
      - id: js-comment-injection-call
      - id: js-comment-injection-index
