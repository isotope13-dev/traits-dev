defaults:
  platforms: [linux, macos, windows]
  crit: notable
  conf: 0.8
  for: [javascript]
traits:
  - id: js-split-custom-delimiter
    desc: "Split with custom delimiter"
    unless:
      - type: basename
        regex: \.map$
    if:
      type: text
      # Matches .split("^") or .split("@") or other non-alphanumeric delimiters
      # Excludes common delimiters: = , . : ; / _ | - ` \
      regex: '\.split\(\s*["''][^a-zA-Z0-9\s=,.:;/_|`\\?&-]["'']\s*\)'
    not:
      - substr: .split('+')
      - substr: .split("+")
      - substr: .split('@')
      - substr: .split("@")
      - substr: .split('(')
      - substr: .split(']')
      - substr: "query.includes('@')"
      - regex: (^|[\\/]).+\.map$
  - id: js-split-string-property
    desc: "Property access via split string concatenation"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\[\s*["''][^"'']{1,120}["'']\s*\+\s*["''][^"'']{1,120}["'']\s*\]'
    unless:
      - type: basename
        regex: \.map$
  - id: js-split-string-property-quad
    desc: Four-part property string concatenation
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '\[\s*".{1,24}"\s*\+\s*".{1,24}"\s*\+\s*".{1,24}"\s*\+\s*".{1,24}"\s*\]'
    unless:
      - type: basename
        regex: \.map$
