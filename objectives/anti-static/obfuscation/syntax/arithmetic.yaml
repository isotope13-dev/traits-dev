defaults:
  platforms: [linux, macos, windows]
  crit: notable
  conf: 0.8
  for: [javascript]
traits:
  - id: js-useless-arithmetic
    desc: Binary op with identical operands (5-5, x===x)
    # `ast.self_compare_count` is the cached fact for binary expressions whose
    # left and right operands are textually identical — useless arithmetic
    # (`5 - 5` → 0) and opaque predicates (`x === x` → always true). The
    # `#eq? @left @right` backreference can't be expressed in a regex; the
    # walker evaluates it (and excludes the legitimate `x !== x` NaN idiom).
    # Require >=2: a single self-compare is usually a benign idempotent guard
    # (`content && content` in compiled JSX); deliberate opaque-predicate padding
    # produces several. Density floor per the count-not-raw-count principle.
    unless:
      - id: metadata/library/structure::js-any-bundle-output
    if:
      type: metrics
      field: 'ast.self_compare_count'
      min: 2
  - id: js-obfuscated-increment
    desc: "Obfuscated increment/decrement via arithmetic"
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '\(-\d+\s*\+\s*\d+\)'
