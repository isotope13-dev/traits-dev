defaults:
  platforms: [linux, macos, windows]
  crit: notable
  conf: 0.8
  for: [javascript]
traits:
  - id: js-useless-arithmetic
    desc: "Useless arithmetic (N-N)"
    if:
      type: tree-sitter
      query: |
        (binary_expression
          left: (number) @left
          operator: "-"
          right: (number) @right
          (#eq? @left @right))
  - id: js-obfuscated-increment
    desc: "Obfuscated increment/decrement via arithmetic"
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '\(-\d+\s*\+\s*\d+\)'
