defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-new-this-bracket
    desc: Instantiating an object via 'this' with bracket
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    # `new this[...]` — constructing via a bracket-indexed property of `this`.
    # The `new this[` form is rare and distinctive enough as source text.
    if:
      type: text
      regex: 'new\s+this\s*\['
    unless:
      - id: micro-behaviors/data/archive/library::archiver
      - id: micro-behaviors/data/archive/library::zip-stream-entry-writer-bundle
      - id: metadata/package/tooling::esbuild-bundled
  - id: js-this-bracket-access
    desc: Property access on 'this' using bracket notation
    crit: suspicious
    conf: 0.8
    if:
      type: tree-sitter
      language: javascript
      # Matches: this[...] - bracket notation on 'this'
      query: |
        (subscript_expression
          object: (this)
        )
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::copyright
composite_rules:
  - id: js-this-global-proxy
    desc: Use of 'this' to proxy global object access for obfuscation
    crit: suspicious
    any:
      - id: js-new-this-bracket
      - id: js-this-bracket-access
