defaults:
  attack: T1027
  mbc: B0032
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
traits:
- id: iife-string-literal-return
  desc: Immediately-invoked function expression (IIFE) that returns a
  crit: suspicious
  conf: 0.9
  size_max: 500000
  count_min: 3
  if:
    type: tree-sitter
    query: |
      (call_expression
        function: (function_expression
          body: (statement_block
            (return_statement
              (string) @string_literal
            )
          )
        )
      )
  unless:
  - id: metadata/library/runtime::rxjs-websocket-constructor-error
  - id: metadata/library/runtime::rxjs-cold-observable-offset-error
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/library/structure::js-umd-wrapper-any
composite_rules: []
