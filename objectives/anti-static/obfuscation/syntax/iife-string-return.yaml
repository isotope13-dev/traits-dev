defaults:
  attack: T1027
  mbc: B0032
  platforms: [linux, macos, windows]
  for: [javascript, typescript]

composite_rules:
  - id: repeated-iife-string-literal-return
    desc: Repeated IIFEs return string literals
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/data/source/function/return::iife-string-literal-return
    unless:
      - id: metadata/library/runtime::rxjs-websocket-constructor-error
      - id: metadata/library/runtime::rxjs-cold-observable-offset-error
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure/
