defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-array-dynamic-execution
    desc: Dynamic execution through indexed function array
    crit: suspicious
    conf: 0.95
    # Require the array to be indexed after construction. A plain array whose
    # first element is a Function constructor is ordinary generated code.
    if:
      type: text
      regex: '\[\s*\(?\s*new\s+Function\s*\([^\]]{0,500}\][\s\S]{0,120}\]\s*\['
