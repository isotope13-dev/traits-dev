defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-array-dynamic-execution
    desc: Dynamic execution via indexed array literal (new
    crit: suspicious
    conf: 0.95
    if:
      type: tree-sitter
      language: javascript
      query: |
        (subscript_expression
          object: (array
            (call_expression
              function: (new_expression
                constructor: (identifier) @func
              )
            )
          )
          (#eq? @func "Function")
        )
