defaults:
  platforms: [linux, macos, windows]
  for: [javascript]
traits:
  - id: js-array-dynamic-execution
    desc: "Dynamic execution via indexed array (new"
    crit: suspicious
    conf: 0.95
    # `[ new Function(...)() ][idx]` — an array literal wrapping a `new Function`
    # call, then subscripted to execute it. An array starting with `new Function`
    # is a distinctive obfuscation shape as source text.
    if:
      type: text
      regex: '\[\s*\(?\s*new\s+Function\s*\('
