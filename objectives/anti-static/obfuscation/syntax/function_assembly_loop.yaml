defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-function-assembly-loop
    desc: 'js func assembly loop'
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: for\s*\([^)]{1,120}\)\s*\{.{0,120}\w+\s*\+=\s*this\[
    unless:
      - id: well-known/lib/jsbn/
      - id: well-known/lib/jsbn/
composite_rules: []
