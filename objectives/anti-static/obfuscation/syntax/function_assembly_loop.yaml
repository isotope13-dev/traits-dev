defaults:
  platforms: [linux, macos, windows]
traits:
  - id: js-function-assembly-loop
    desc: JScript function assembly loop with arithmetic generation
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: for\s*\([^)]{1,120}\)\s*\{.{0,120}\w+\s*\+=\s*this\[
    unless:
      - id: well-known/lib/jsbn::jsbn-rsa-library
      - id: well-known/lib/jsbn::jsbn-rsa-minified-bundle
composite_rules: []
