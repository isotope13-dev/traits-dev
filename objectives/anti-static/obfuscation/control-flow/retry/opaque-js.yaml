defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
- id: retry-loop-while
  desc: Detects retry loop wrapping try-catch (while loop)
  crit: component
  unless:
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/tooling::webpack-bundled
  - id: metadata/package/tooling::babel-transpiled
  if:
    type: text
    regex: "(?s)while\\s*\\(([^()]|\\([^()]{0,120}\\))*\\)\\s*\\{[^}]{0,300}\\s*try\\s*\\{"
  not:
  - regex: "while\\s*\\(_\\)\\s*\\{\\s*try"
- id: retry-loop-for
  desc: Detects retry loop wrapping try-catch (for loop)
  crit: component
  size_max: 50000
  unless:
  - id: metadata/package/tooling::babel-transpiled
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/tooling::webpack-bundled
  if:
    type: text
    regex: "(?s)for\\s*\\(([^()]|\\([^()]{0,120}\\))*\\)\\s*\\{[^}]{0,300}\\s*try\\s*\\{"
  not:
  - regex: "for\\s*\\(\\s*;\\s*i\\s*<\\s*l;\\s*i\\+\\+\\)\\s*\\{\\s*try\\s*\\{"
  - regex: "for\\s*\\([^)]*\\)\\s*\\{[^}]*//[^}]*try\\s*\\{"
  - regex: "for\\s*\\(\\s*var\\s+\\w+\\s+in\\b"
  - regex: "for\\s*\\(\\s*(const|let|var)\\s+\\w+\\s+of\\b"
  - regex: "for\\s*\\(\\s*(const|let|var)\\s+\\w+\\s*="
  - regex: "(?s)for\\s*\\([^)]*\\)\\s*\\{[^}]{0,300}createSyncAccessHandle\\("
- id: retry-loop-with-success
  desc: Retry loop with success counter
  crit: suspicious
  conf: 1.0
  attack: T1027
  mbc: B0032
  if:
    type: text
    regex: '(?s)while\s*\(\s*\w+\s*<\s*\d+\s*\)\s*\{\s*try\s*\{.*?\+\+\s*;?\s*\}\s*catch'
- id: const-return-padding-count
  desc: Six or more parameterless constant-return helpers
  crit: component
  conf: 0.82
  for: [javascript]
  # Count floor: parameterless functions whose body is a single `return <literal>`.
  if:
    type: metrics
    field: 'ast.const_return_function_count'
    min: 6
- id: const-return-padding-ratio
  desc: Constant-return helpers dominate the functions
  crit: component
  conf: 0.82
  for: [javascript]
  # Density floor: the fraction of all functions that are constant-return padding.
  # Opaque-padding obfuscation makes most functions this shape (~0.6+); a normal
  # large module (e.g. 7 of 21 functions = 0.33) stays well under the threshold.
  if:
    type: metrics
    field: 'ast.const_return_function_ratio'
    min: 0.5
- id: opaque-predicate-constant-compare
  desc: Opaque predicate using string compare
  crit: suspicious
  conf: 0.88
  for: [javascript]
  not:
  - regex: debugMode\(\)\s*===\s*['"](inspector|console)['"]
  - regex: platform\(\)\s*===\s*['"](win|mac|linux|darwin|win32)['"]
  if:
    type: text
    substr: if\s*\(\s*([$_A-Za-z]\w{0,2}|_0x[0-9A-Fa-f]+)\(\)\s*===\s*["']
- id: opaque-predicate-literal-compare
  desc: Opaque predicate using literal compare
  crit: suspicious
  conf: 0.82
  for: [javascript]
  if:
    type: text
    regex: 'if\s*\(\s*\w+\(\)\s*==\s*\d+\s*\)'
- id: switch-decoy-cases
  desc: Switch statement with decoy literal cases
  crit: component
  conf: 0.8
  for: [javascript]
  if:
    type: text
    regex: '(?s)switch\([_$a-z]\w{0,2}\)\s*\{.{0,48}case\s+\d+:.{0,48}case\s+\d+:.{0,48}case\s+\d+:'
  not:
  - substr: "switch(SortColumn)"
- id: shift-push-rotator
  desc: Array shift push rotator
  crit: suspicious
  conf: 0.94
  for: [javascript]
  if:
    type: text
    substr: "['push'](q['shift']())"
composite_rules:
- id: constant-return-padding-functions
  desc: Parameterless constant-return helper padding
  crit: suspicious
  conf: 0.82
  for: [javascript]
  # Both a raw floor AND a density floor: many constant-return helpers that also
  # dominate the file. The ratio replaces the old size-scaling count-only gate
  # (`ast.const_return_function_count >= 6`), which fired on any large hand-written
  # module that happened to accumulate six such helpers.
  all:
  - id: const-return-padding-count
  - id: const-return-padding-ratio
  # Minifiers (terser/uglify) emit many parameterless constant-return helpers,
  # so this dilution signal fires on legitimately-minified library bundles.
  unless:
  - id: metadata/library/structure::js-any-bundle-output
- id: retry-loop
  desc: Detects retry loop wrapping try-catch (probabilistic loader)
  crit: suspicious
  conf: 1.0
  attack: T1027
  mbc: B0032
  needs: 2
  any:
  - id: retry-loop-while
  - id: retry-loop-for
  - id: retry-loop-with-success
  - id: opaque-predicate-constant-compare
  - id: opaque-predicate-literal-compare
- id: dead-code-padding
  desc: Dead code padding with opaque branches
  crit: suspicious
  conf: 0.9
  for: [javascript]
  needs: 2
  any:
  - id: constant-return-padding-functions
  - id: opaque-predicate-constant-compare
  - id: opaque-predicate-literal-compare
  - id: switch-decoy-cases
  # Minified/bundled JS (webpack, UMD, Gutenberg builds, vendored libs) naturally
  # produces constant-return functions, constant comparisons and switch dispatch
  # as a minification byproduct — not deliberate anti-static obfuscation.
  unless:
  - id: metadata/library/structure::js-any-bundle-output
- id: string-table-rotator-loop
  desc: Infinite string table rotation loop
  crit: suspicious
  conf: 0.96
  for: [javascript]
  all:
  - id: metadata/lang/javascript-features::js-obfuscator-while-loop
  - id: shift-push-rotator
