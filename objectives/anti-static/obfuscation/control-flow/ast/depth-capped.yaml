# Pathologically deep AST recursion — an anti-static-analysis shape.
#
# filefacts bounds its single source-AST walk at MAX_AST_DEPTH (1000) and emits
# `ast.depth_capped` = 1 when one file forces that bound: a member chain
# (`a.b.c…`), a string-concat chain (`"a"+"a"+…`), or a subscript chain
# (`obj["x"]["y"]…`) thousands of links deep. No hand-written source nests that
# far — it is machine-generated padding meant to exhaust or stall a static
# analyser (before the bound was added it overflowed the worker stack and
# aborted analysis outright). The metric is boolean, so `min: 1` matches its
# presence. Sibling signal: parse-errors.yaml (malformed-AST evasion).
defaults:
  attack: T1027
  platforms: [unix, windows]
  for: [scripts]
traits:
  - id: ast-depth-cap-reached
    desc: Pathologically deep AST nesting (anti-analysis)
    mbc: E1014
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: 'ast.depth_capped'
      min: 1
