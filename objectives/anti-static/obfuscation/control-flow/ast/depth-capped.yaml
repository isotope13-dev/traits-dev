# Pathologically deep AST recursion — an anti-static-analysis shape.
#
# filefacts bounds its single source-AST walk at MAX_AST_DEPTH (1000) and emits
# `ast.depth_capped` = 1 when one file forces that bound: a member chain
# (`a.b.c…`), a string-concat chain (`"a"+"a"+…`), or a subscript chain
# (`obj["x"]["y"]…`) thousands of links deep. No hand-written source nests that
# far — it is machine-generated padding meant to exhaust or stall a static
# analyser (before the bound was added it overflowed the worker stack and
# aborted analysis outright). The metric is boolean, so `min: 1` matches its
# presence. Sibling signal: parse-errors.yaml (malformed-AST evasion).
defaults:
  attack: T1027
  platforms: [unix, windows]
  for: [scripts]
traits:
  - id: ast-depth-cap-reached
    desc: "Pathologically deep AST nesting"
    mbc: E1014
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: 'ast.depth_capped'
      min: 1
    unless:
      - type: text
        substr: "%!PS"
      - type: text
        regex: '!_TAG_FILE_FORMAT\s+2\s+/supported features/[\s\S]{0,512}!_TAG_PROGRAM_NAME\s+[^\n]*Ctags'
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: metadata/file/profile/identity::generated-documentation-page
      - id: well-known/app/google-web::chrome-webstore-page
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/
      - type: basename
        # The conventional extensionless ChangeLog is sometimes heuristically parsed as
        # JavaScript; their prose and compiler diagnostics are not code whose
        # nesting can be used to evade static analysis.
        regex: '(?i)^changelog$|^(public-suffix-list|common-passwords-top-10000)\.data\.js$'
      # Cranelift .clif files are test IR; deeply nested generated expressions
      # there exercise the test format rather than hiding executable logic.
      - type: basename
        regex: '\.clif$'
