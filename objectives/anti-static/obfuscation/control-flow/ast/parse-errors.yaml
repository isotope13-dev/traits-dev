# AST parse errors that may indicate hostile anti-static behavior
#
# Parse errors in tree-sitter can indicate:
# - Intentionally malformed code designed to evade static analysis
# - Code that crashes or confuses parsers
# - Obfuscation techniques that produce invalid syntax
# - Adversarial inputs targeting parser vulnerabilities
#
# High error counts (10+ ERROR/MISSING nodes) are particularly suspicious for malware.
# Metrics populated by unified.rs: text.ast_parse_errors, text.ast_max_depth
defaults:
  attack: T1027
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: parse-error-high-ratio
    desc: "High count of AST parse errors (possibly intentionally malformed)"
    crit: suspicious
    conf: 0.85
    if:
      type: metrics
      field: text.ast_parse_errors
      min: 10
  - id: parse-error-low-ratio
    desc: Some AST parse errors detected
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: text.ast_parse_errors
      min: 1
  - id: ast-depth-bomb
    desc: Extremely deep AST nesting (anti-analysis)
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: text.ast_max_depth
      min: 10000
