defaults:
  platforms: [windows]
  for: [c]

traits:
  - id: genjmp-near-deadbyte-source
    desc: Near jump dead-byte padding in source
    crit: suspicious
    conf: 0.96
    size_min: 1000
    if:
      type: raw
      substr: gnerate jmp 00000001
  - id: genjmp-short-deadbyte-source
    desc: Short jump dead-byte padding in source
    crit: suspicious
    conf: 0.96
    size_min: 1000
    if:
      type: raw
      substr: generate jmp short 01
  - id: selfmody-control-flow-source
    desc: CALL POP RET self-modifier in source
    crit: suspicious
    conf: 0.95
    size_min: 1000
    if:
      type: raw
      word: selfmody
  - id: garbage-subroutine-generator-source
    desc: Garbage subroutine generator in source
    crit: suspicious
    conf: 0.96
    size_min: 1000
    if:
      type: raw
      word: gengarbageproc
  - id: deadbeef-garbage-source
    desc: DEADBEEF junk constant in source
    crit: suspicious
    conf: 0.94
    size_min: 1000
    if:
      type: raw
      word: 0deadbeefh
  - id: fpu-fninitopcode-source
    desc: FPU fninit opcode marker in source
    crit: component
    conf: 0.94
    size_min: 1000
    if:
      type: raw
      word: fninitopcode
  - id: fpu-fnopopcode-source
    desc: FPU fnop opcode marker in source
    crit: component
    conf: 0.94
    size_min: 1000
    if:
      type: raw
      word: fnopopcode
  - id: fpu-filddisp8-source
    desc: FPU fild disp8 marker in source
    crit: component
    conf: 0.94
    size_min: 1000
    if:
      type: raw
      word: filddisp8
  - id: fpu-fiadddisp8-source
    desc: FPU fiadd disp8 marker in source
    crit: component
    conf: 0.94
    size_min: 1000
    if:
      type: raw
      word: fiadddisp8
  - id: fpu-fisubdisp8-source
    desc: FPU fisub disp8 marker in source
    crit: component
    conf: 0.94
    size_min: 1000
    if:
      type: raw
      word: fisubdisp8
composite_rules:
  - id: fpu-garbage-source
    desc: FPU junk instruction family in source
    crit: suspicious
    conf: 0.94
    any:
      - id: fpu-fninitopcode-source
      - id: fpu-fnopopcode-source
      - id: fpu-filddisp8-source
      - id: fpu-fiadddisp8-source
      - id: fpu-fisubdisp8-source
  - id: dead-byte-jump-padding-source
    desc: Dead-byte jump padding generator
    crit: suspicious
    conf: 0.98
    all:
      - id: genjmp-near-deadbyte-source
      - id: genjmp-short-deadbyte-source
  - id: polymorphic-garbage-engine-source
    desc: Polymorphic junk-code engine in source
    crit: suspicious
    conf: 0.99
    all:
      - id: garbage-subroutine-generator-source
    any:
      - id: dead-byte-jump-padding-source
      - id: selfmody-control-flow-source
      - id: deadbeef-garbage-source
      - id: fpu-garbage-source
