# VBS self-overwriting patterns
# Detects VBScript overwriting its own source code
defaults:
  platforms: [windows]
  for: [vbs]
traits:
  - id: scriptfullname-write
    desc: VBS overwrites own source code
    crit: suspicious
    conf: 0.90
    attack: "T1027.001"
    if:
      type: text
      regex: '(?i)opentextfile\s*\(\s*wscript\.scriptfullname\s*,\s*2'
