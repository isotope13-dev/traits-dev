defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-eval-self-string
    desc: Eval executing function with self-toString check
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: eval\s*\(\s*["']\(function\s+\w+\([^)]{0,120}\)\s*\{.{0,200}\.toString\(\)
  - id: js-mixed-hex-octal-math
    desc: Mixed hex and octal arithmetic (obfuscation)
    crit: suspicious
    conf: 0.95
    count_min: 5
    per_kb_min: 0.1
    not:
      - substr: "0x0-0xFFFFFFFF"
      - substr: "ENTRY(Reset_Handler)"
      - substr: "SECTIONS"
      - substr: "OUTPUT_ARCH("
      - substr: "OUTPUT_FORMAT("
      - substr: "MEMORY"
      - substr: "ORIGIN("
      - substr: "LENGTH("
      - substr: "ORIGIN ="
    if:
      type: text
      regex: '0[xX][0-9a-fA-F]+\s*[-+*/&|^%]\s*0[oO][0-7]+|0[oO][0-7]+\s*[-+*/&|^%]\s*0[xX][0-9a-fA-F]+'
  - id: js-array-rotation-obfuscation
    desc: JavaScript array rotation obfuscation
    crit: suspicious
    conf: 0.94
    for: [oledoc, ooxml]
    count_min: 2
    if:
      type: raw
      regex: while\(!!\[\]\)\{try\{const \w+=-parseInt\(
composite_rules:
  - id: js-complex-obfuscation
    desc: Complex JavaScript obfuscation (hex/octal math + eval)
    crit: hostile
    conf: 0.95
    attack: T1027
    all:
      - id: js-mixed-hex-octal-math
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  - id: js-tamper-checked-eval-unpacker
    desc: Tamper checked JavaScript eval unpacker
    crit: hostile
    conf: 0.98
    attack: T1027
    all:
      - id: js-complex-obfuscation
      - id: objectives/anti-analysis/anti-tampering/integrity::function-tostring-integrity
      - id: objectives/anti-analysis/anti-tampering/integrity::tamper-detection-message
  - id: js-xor-eval-unpacker-chain
    desc: XOR decoded JavaScript eval unpacker
    crit: hostile
    conf: 0.97
    attack: T1027
    all:
      - id: js-complex-obfuscation
      - id: micro-behaviors/data/encode/char-code::fromcharcode-xor-rebuild
      - id: objectives/execution/interpreter/eval::eval-variable
