defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
traits:
  - id: python-chr-builtins-getattr
    desc: 'python chr builtins getattr'
    mbc: E1014
    attack: T1027
    crit: component
    conf: 0.95
    if:
      type: text
      substr: getattr(__builtins__,
  # Neutral ".__str__()" invocation lives in micro-behaviors/data/source/dynamic/
  # reflect (a plain dunder method call is ordinary Python, not obfuscation). The
  # composites below reference it across directories as the call half of the
  # oct/hex/copyright builtin-name chr-construction trick.
  - id: oct-name
    desc: "oct.__str__ reference"
    if: {type: text, regex: "\\boct\\.__str__"}
  - id: hex-name
    desc: "hex.__str__ reference"
    if: {type: text, regex: "\\bhex\\.__str__"}
  # === GuardDog: chr() join patterns ===
  - id: join-chr-generator
    desc: "''.join(chr(x) for x in ...) pattern"
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.95
    if:
      # Restored arg discriminator dropped in the call migration.
      type: symbol
      kind: call
      exact: 'chr'
      arg:
        kind: string
        exact: 'join'
  - id: join-map-chr
    desc: "''.join(map(chr, ...)) pattern"
    mbc: E1014
    attack: T1027
    crit: component
    conf: 0.95
    if:
      type: text
      regex: "join\\s*\\(\\s*map\\s*\\(\\s*chr\\s*,"
  - id: join-chr-int-transform
    desc: "''.join(chr(int(x) +/- n) pattern"
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "join\\(\\[chr\\(int\\(\\w+\\) [-+^] \\d+\\) for \\w+ in"
composite_rules:
  - id: large-int-array-assign
    desc: Large integer array chr decode
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/file/metrics::python-large-numeric-array-literal
    any:
      - id: join-chr-int-transform
      - id: join-map-chr
      - id: objectives/anti-static/obfuscation/payload/encoded::exec-function-call
    unless:
      - id: metadata/package/files/dependency::ruby-vendor-bundle-gem-path
      - id: metadata/build/pip::python-packaging-vendored-source
      - id: metadata/build/pip::python-packaging-tool-tests
      - id: well-known/tool/offensive/sqlmap::source-tree-member
      - id: micro-behaviors/crypto/library/blockchain/
      - id: metadata/library/data/
      - id: metadata/package/testing/presence/harness::tests-path-basename
  - id: python-chr-oct-str
    desc: "oct.__str__ used in chr obfuscation"
    crit: suspicious
    all:
      - id: oct-name
      - id: micro-behaviors/data/source/dynamic/reflect::dunder-str-call
  - id: python-chr-hex-str
    desc: "hex.__str__ used in chr obfuscation"
    crit: suspicious
    all:
      - id: hex-name
      - id: micro-behaviors/data/source/dynamic/reflect::dunder-str-call
  - id: python-chr-copyright-str
    desc: "Python chr obfuscation using copyright.__str__"
    crit: suspicious
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::copyright-builtin-reference
      - id: micro-behaviors/data/source/dynamic/reflect::dunder-str-call
      - id: micro-behaviors/data/string/conversion::python-chr-call
    near_bytes: 256
  - id: python-chr-bitwise-construction
    desc: "Python chr construction using oct/hex/copyright strings"
    crit: suspicious
    conf: 0.95
    mbc: E1014
    attack: T1027
    all:
      - id: python-chr-builtins-getattr
      - id: python-chr-oct-str
      - id: python-chr-hex-str
      - id: python-chr-copyright-str
  - id: python-chr-arithmetic-loader
    desc: Python chr arithmetic payload loader
    crit: suspicious
    conf: 0.97
    mbc: E1014
    attack: T1027
    all:
      - id: large-int-array-assign
      - id: micro-behaviors/process/interpreter/python::exec-builtin
    any:
      - id: join-chr-int-transform
      - id: join-map-chr
      - id: objectives/anti-static/obfuscation/payload/encoded::exec-function-call
