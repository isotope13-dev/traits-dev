defaults:
  platforms: [unix, windows]
  for: [python]
  crit: notable
traits:
  - id: python-chr-builtins-getattr
    desc: "Python getattr on __builtins__ for chr construction"
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: getattr(__builtins__,
  - id: dunder-str-call
    desc: ".__str__() method call"
    if:
      type: text
      substr: ".__str__()"
  - id: oct-name
    desc: "oct.__str__ reference"
    if: {type: text, regex: "\\boct\\.__str__"}
  - id: hex-name
    desc: "hex.__str__ reference"
    if: {type: text, regex: "\\bhex\\.__str__"}
  - id: copyright-name
    desc: "copyright builtin reference"
    if: {type: symbol, substr: "copyright"}
  # === GuardDog: chr() join patterns ===
  - id: join-chr-generator
    desc: "''.join(chr(x) for x in ...) pattern"
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.95
    if:
      type: ast
      query: |
        (call
          function: (attribute
            object: (string)
            attribute: (identifier) @method)
          arguments: (argument_list
            (generator_expression
              body: (call
                function: (identifier) @func
                (#eq? @func "chr"))))
          (#eq? @method "join"))
  - id: join-map-chr
    desc: "''.join(map(chr, ...)) pattern"
    mbc: E1014
    attack: T1027
    crit: component
    conf: 0.95
    if:
      type: text
      regex: "join\\s*\\(\\s*map\\s*\\(\\s*chr\\s*,"
  - id: join-chr-int-transform
    desc: "''.join(chr(int(x) +/- n) pattern"
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "join\\(\\[chr\\(int\\(\\w+\\) [-+^] \\d+\\) for \\w+ in"
  - id: large-int-array-assign
    desc: Large integer array assignment
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.9
    if:
      type: ast
      query: |
        (assignment
          left: (identifier) @var
          right: (list) @list
          (#match? @list "^\\[\\s*\\d{2,4}\\s*(,\\s*\\d{2,4}\\s*){199,},?\\s*\\]$"))
composite_rules:
  - id: python-chr-oct-str
    desc: "oct.__str__ used in chr obfuscation"
    crit: suspicious
    all:
      - id: oct-name
      - id: dunder-str-call
  - id: python-chr-hex-str
    desc: "hex.__str__ used in chr obfuscation"
    crit: suspicious
    all:
      - id: hex-name
      - id: dunder-str-call
  - id: python-chr-copyright-str
    desc: "copyright.__str__ used in chr obfuscation"
    crit: suspicious
    all:
      - id: copyright-name
      - id: dunder-str-call
  - id: python-chr-bitwise-construction
    desc: "Python chr construction using oct/hex/copyright strings"
    crit: suspicious
    conf: 0.95
    mbc: E1014
    attack: T1027
    all:
      - id: python-chr-builtins-getattr
      - id: python-chr-oct-str
      - id: python-chr-hex-str
      - id: python-chr-copyright-str
  - id: python-chr-arithmetic-loader
    desc: Python chr arithmetic payload loader
    crit: suspicious
    conf: 0.97
    mbc: E1014
    attack: T1027
    all:
      - id: large-int-array-assign
      - id: micro-behaviors/process/interpreter/python::exec-builtin
    any:
      - id: join-chr-int-transform
      - id: join-map-chr
      - id: objectives/anti-static/obfuscation/payload::exec-function-call
