defaults:
  platforms: [windows, unix]
  for: [binaries, scripts, source]
traits:
  - id: complex-bitwise-arithmetic-chain
    desc: Complex bitwise arithmetic chain obfuscation
    mbc: E1014
    attack: T1027
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    size_max: 400000
    if:
      type: text
      regex: \d+.{0,20}&.{0,20}\d+.{0,20}\|.{0,20}\d+.{0,20}<<.{0,20}>>
    unless:
      - id: well-known/lib/protobuf-ts::protobuf-ts-js
      - id: well-known/lib/apache-arrow
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/library/structure::js-large-minified-bundle
composite_rules: []
