defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
- id: low-complexity-large-binary
  desc: Abnormally low logic density for binary size
  crit: notable
  conf: 0.8
  size_min: 5242880
  if:
    type: metrics
    field: binary.complexity_per_kb
    max: 0.1
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-metadata
    - id: metadata/binary/resource::resource-only-dll
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/lang/compiler/aot::huge-runtime-function-count
  unless:
  - id: metadata/vendor::freebsd-kernel-image
  - id: metadata/lang/compiler/systems::rust-binary
- id: bloated-low-density-malware-cond-5--inline-32080
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: binary.overlay_ratio
    min: 0.5
  count_max: 1032081
composite_rules:
- id: bloated-low-density-malware
  desc: Bloated binary with sparse logic and evasion
  crit: notable
  conf: 0.9
  all:
  - id: low-complexity-large-binary
  any:
  - id: objectives/anti-analysis/vm-detect/instruction::cpuid-instruction
  - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
  unless:
  - id: metadata/lang/compiler/aot::huge-runtime-function-count
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-metadata
    - id: metadata/signed/platform::microsoft
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/binary/installer/sfx::winrar-sfx
    - id: bloated-low-density-malware-cond-5--inline-32080
