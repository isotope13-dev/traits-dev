defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: low-complexity-large-binary
    desc: Abnormally low logic density for binary size
    crit: notable
    conf: 0.8
    size_min: 5242880
    if:
      type: metrics
      field: binary.complexity_per_kb
      max: 0.1
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
        - id: metadata/binary/resource::resource-only-dll
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/linking::static-linked-heuristic
composite_rules:
  - id: bloated-low-density-malware
    desc: Bloated binary with sparse logic and evasion
    crit: notable
    conf: 0.9
    all:
      - id: low-complexity-large-binary
    any:
      - id: objectives/anti-analysis/vm-detect::cpuid-instruction
      - id: objectives/evasion/process/injection/runtime::set-thread-context-dup
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
        - id: metadata/signed/platform::microsoft
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics::many-imports
        - id: metadata/binary/installer/sfx::winrar-sfx
        - type: metrics
          field: binary.overlay_ratio
          min: 0.5
