defaults:
  platforms: [windows, unix]
  crit: suspicious
  attack: T1027
traits:
  - id: b64decode-exec
    desc: Base64 decode with execution
    conf: 0.9
    for:
      - python
      - shell
    if:
      type: string_literal
      regex: b64decode.{0,50}exec|decode64.{0,50}exec
    unless:
      - id: well-known/tool/detection/
