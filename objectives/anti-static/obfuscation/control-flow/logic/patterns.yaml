defaults:
  platforms: [windows, unix]
  crit: suspicious
  attack: T1027
composite_rules:
  - id: b64decode-exec
    desc: Python base64 decode followed by exec
    crit: suspicious
    conf: 0.9
    for: [python]
    near_lines: 64
    all:
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/process/interpreter/python::exec-builtin
    unless:
      - id: well-known/lib/omdev::omdev-library
      - id: metadata/package/quality/recognized-contexts::studio-wrapper-context
      - id: well-known/app/ungoogled-chromium::ungoogled-chromium-patch-validator
