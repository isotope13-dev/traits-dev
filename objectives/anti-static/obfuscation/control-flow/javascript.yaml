defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: retry-loop-while
    desc: Detects retry loop wrapping try-catch (while loop)
    crit: component
    unless:
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
    if:
      type: text
      regex: "(?s)while\\s*\\(([^()]|\\([^()]{0,120}\\))*\\)\\s*\\{[^}]{0,300}\\s*try\\s*\\{"
    not:
      - regex: "while\\s*\\(_\\)\\s*\\{\\s*try"
  - id: retry-loop-for
    desc: Detects retry loop wrapping try-catch (for loop)
    crit: component
    size_max: 50000
    if:
      type: text
      regex: "(?s)for\\s*\\(([^()]|\\([^()]{0,120}\\))*\\)\\s*\\{[^}]{0,300}\\s*try\\s*\\{"
    not:
      - regex: "for\\s*\\(\\s*;\\s*i\\s*<\\s*l;\\s*i\\+\\+\\)\\s*\\{\\s*try\\s*\\{"
      - regex: "for\\s*\\([^)]*\\)\\s*\\{[^}]*//[^}]*try\\s*\\{"
      - regex: "for\\s*\\(\\s*var\\s+\\w+\\s+in\\b"
      - regex: "for\\s*\\(\\s*(?:const|let|var)\\s+\\w+\\s+of\\b"
      - regex: "for\\s*\\(\\s*(?:const|let|var)\\s+\\w+\\s*="
      - regex: "(?s)for\\s*\\([^)]*\\)\\s*\\{[^}]{0,300}createSyncAccessHandle\\("
  - id: retry-loop-with-success
    desc: Retry loop with success counter
    crit: suspicious
    conf: 1.0
    attack: T1027
    mbc: B0032
    if:
      type: text
      regex: '(?s)while\s*\(\s*\w+\s*<\s*\d+\s*\)\s*\{\s*try\s*\{.*?\+\+\s*;?\s*\}\s*catch'
  - id: constant-return-padding-functions
    desc: Parameterless constant-return helper padding
    crit: notable
    conf: 0.82
    for: [javascript]
    count_min: 6
    if:
      type: ast
      query: |
        (function_declaration
          parameters: (formal_parameters)
          body: (statement_block
            (return_statement
              [
                (number)
                (string)
                (null)
                (true)
                (false)
                (identifier)
              ]
            )
          )
        )
  - id: opaque-predicate-constant-compare
    desc: Opaque predicate using string compare
    crit: suspicious
    conf: 0.88
    for: [javascript]
    if:
      type: text
      regex: 'if\s*\(\s*(?:[$_A-Za-z]\w{0,2}|_0x[0-9A-Fa-f]+)\(\)\s*===\s*["''][A-Za-z0-9_]{3,24}["'']\s*\)'
    not:
      - regex: debugMode\(\)\s*===\s*['"](inspector|console)['"]
      - regex: platform\(\)\s*===\s*['"](win|mac|linux|darwin|win32)['"]
  - id: opaque-predicate-literal-compare
    desc: Opaque predicate using literal compare
    crit: notable
    conf: 0.82
    for: [javascript]
    if:
      type: text
      regex: 'if\s*\(\s*\w+\(\)\s*==\s*\d+\s*\)'
  - id: switch-decoy-cases
    desc: Switch statement with decoy literal cases
    crit: component
    conf: 0.8
    for: [javascript]
    if:
      type: text
      regex: '(?s)switch\([_$a-z]\w{0,2}\)\s*\{.{0,48}case\s+\d+:.{0,48}case\s+\d+:.{0,48}case\s+\d+:'
    not:
      - substr: "switch(SortColumn)"
  - id: while-true-array-literal
    desc: while(!![]) infinite loop pattern
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: text
      substr: while(!![])
  - id: shift-push-rotator
    desc: Array shift push rotator
    crit: suspicious
    conf: 0.94
    for: [javascript]
    if:
      type: text
      substr: "['push'](q['shift']())"
composite_rules:
  - id: retry-loop
    desc: Detects retry loop wrapping try-catch (probabilistic loader)
    crit: notable
    conf: 1.0
    attack: T1027
    mbc: B0032
    needs: 2
    any:
      - id: retry-loop-while
      - id: retry-loop-for
      - id: retry-loop-with-success
      - id: opaque-predicate-constant-compare
      - id: opaque-predicate-literal-compare
  - id: dead-code-padding
    desc: Dead code padding with opaque branches
    crit: suspicious
    conf: 0.9
    for: [javascript]
    needs: 2
    any:
      - id: constant-return-padding-functions
      - id: opaque-predicate-constant-compare
      - id: opaque-predicate-literal-compare
      - id: switch-decoy-cases
  - id: string-table-rotator-loop
    desc: Infinite string table rotation loop
    crit: suspicious
    conf: 0.96
    for: [javascript]
    all:
      - id: while-true-array-literal
      - id: shift-push-rotator
