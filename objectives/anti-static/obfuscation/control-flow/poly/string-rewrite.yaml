# VBS Polymorphic Engine Detection
# Detects VBScript polymorphic engines that randomize variable names
# to evade AV heuristic scanning
defaults:
  platforms: [windows]
  for: [vbs]
traits:
  - id: random-char-generation
    desc: Random character generation loop
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)chr\s*\(\s*\(\s*int\s*\(\s*rnd'
  - id: variable-replace
    desc: Code string replacement loop
    crit: component
    conf: 0.80
    if:
      type: text
      regex: '(?i)replace\s*\(\s*\w+\s*,\s*\w+\s*,\s*\w+'
  - id: anti-av-evasion-text
    desc: Anti-virus evasion language
    crit: suspicious
    conf: 0.90
    if:
      type: text
      regex: '(?i)anti.?virus(es)?\s+will\s+not'
  - id: polymorphic-engine-label
    desc: Polymorphic engine self-identification
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)polymorphic\s+engine'
  - id: heuristic-evasion-text
    desc: Heuristic scanning evasion reference
    crit: suspicious
    conf: 0.90
    if:
      type: text
      regex: '(?i)heuristic\s+scanning'
composite_rules:
  - id: vbs-polymorphic-engine
    desc: VBS polymorphic variable renaming engine
    crit: hostile
    conf: 0.95
    attack: "T1027.001"
    all:
      - id: micro-behaviors/fs/read/self::scriptfullname-read
      - id: objectives/anti-static/obfuscation/control-flow/self-mod::scriptfullname-write
    any:
      - id: random-char-generation
      - id: variable-replace
      - id: polymorphic-engine-label
