defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
  mbc: B0032

traits:
  - id: indexed-function-table-call-x64
    desc: Indexed x64 function-table indirect call
    crit: suspicious
    conf: 0.9
    arch: [x86-64]
    count_min: 2
    if:
      type: hex
      section: .text
      pattern: '41 FF 14 C0'
    unless:
      - id: metadata/signed/leaf::intel-corporation

  - id: rotating-multiply-dispatch-key-x64
    desc: Rotating multiply dispatch-key computation
    crit: suspicious
    conf: 0.9
    arch: [x86-64]
    count_min: 2
    if:
      type: hex
      section: .text
      pattern: '69 ?? ?? ?? ?? ?? D3 C8'

  - id: sparse-opaque-pe-profile-imports
    desc: Large PE with twenty or fewer imports
    crit: component
    conf: 0.9
    size_min: 5242880
    if:
      type: metrics
      field: imports.count
      max: 20

  - id: sparse-opaque-pe-profile-strings
    desc: Large PE with few strings
    crit: component
    conf: 0.9
    size_min: 5242880
    if:
      type: metrics
      field: binary.string_count
      max: 100

  - id: sparse-opaque-pe-profile-max-string
    desc: Large PE with short maximum string
    crit: component
    conf: 0.9
    size_min: 5242880
    if:
      type: metrics
      field: binary.max_string_length
      max: 40

  - id: sparse-opaque-pe-profile-code
    desc: Large PE with elevated code entropy
    crit: component
    conf: 0.9
    size_min: 5242880
    if:
      type: metrics
      field: binary.code_entropy
      min: 5.5

composite_rules:
  - id: sparse-opaque-pe-profile
    desc: Large PE with sparse strings and imports
    crit: component
    conf: 0.9
    size_min: 5242880
    all:
      - id: sparse-opaque-pe-profile-imports
      - id: sparse-opaque-pe-profile-strings
      - id: sparse-opaque-pe-profile-max-string
      - id: sparse-opaque-pe-profile-code

  - id: opaque-indexed-dispatch-loader
    desc: Sparse PE with opaque indexed dispatch loader
    crit: hostile
    conf: 0.98
    attack: T1027,T1140
    all:
      - id: indexed-function-table-call-x64
      - id: rotating-multiply-dispatch-key-x64
      - id: sparse-opaque-pe-profile
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-loader-data-geometry-cond-1--inline-29194
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/family/

  - id: opaque-dispatch-environment-probe
    desc: Opaque dispatch combined with drive enumeration
    crit: hostile
    conf: 0.97
    attack: T1027,T1497
    all:
      - id: indexed-function-table-call-x64
      - id: rotating-multiply-dispatch-key-x64
      - id: sparse-opaque-pe-profile
      - id: micro-behaviors/fs/traversal/drives::get-logical-drives
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/family/
