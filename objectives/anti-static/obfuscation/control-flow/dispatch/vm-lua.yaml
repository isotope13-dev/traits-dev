# Lua control-flow obfuscation
# Covers VM dispatch loops and arithmetic-based control-flow flattening
# common in IronBrew, Luraph, and custom Lua obfuscators.
defaults:
  platforms: [windows, unix]
  for: [lua]
  crit: notable
  conf: 0.85
  attack: T1027
  mbc: B0032
traits:
  - id: lua-vm-dispatch-loop
    desc: Lua VM dispatch loop (while-if pattern)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'while\s+\w+\s+do\s+if\s+\w+\s*[<>=]+\s*\d'

  - id: lua-many-conditionals
    desc: Lua VM dispatch conditional cluster
    crit: component
    conf: 0.85
    count_min: 80
    if:
      type: text
      regex: '\b(if|elseif)\s+[A-Za-z_]\w*\s*==\s*\d+\s+then'

  - id: lua-state-machine-comparisons
    desc: Lua state-machine comparison cluster
    crit: suspicious
    conf: 0.9
    for: [lua, text]
    size_min: 50000
    count_min: 40
    if:
      type: text
      regex: '\b(if|elseif)\s+[A-Za-z_]\w*\s*[<>]=?\s*-?\d{5,}'

  - id: lua-large-constant-arithmetic
    desc: 'Large constant arithmetic'
    count_min: 50
    if:
      type: text
      regex: '[-]?\d{5,}\s*[-+]\s*\(?\s*[-]?\d{5,}'

  - id: lua-negated-subtraction
    desc: Negated subtraction obfuscation pattern
    count_min: 20
    if:
      type: text
      regex: '-\(-\d{4,}\)'

composite_rules:
  - id: lua-vm-obfuscation
    desc: Custom VM obfuscation (dispatch + flattening)
    crit: suspicious
    conf: 0.9
    any:
      - id: lua-vm-dispatch-loop
      - id: lua-many-conditionals
      - id: lua-state-machine-comparisons
    all:
      - id: lua-large-constant-arithmetic
