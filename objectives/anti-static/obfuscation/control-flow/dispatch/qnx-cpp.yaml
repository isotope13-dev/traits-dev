defaults:
  platforms: [qnx, unix]
  for: [cpp]
  attack: T1027

traits:
  - id: qnx-cpp-phase-fn-table
    desc: QNX C++ indirect phase table
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'typedef void \(\*phase_fn\)\(void\);[\s\S]{0,180}static phase_fn phases\[\]'

  - id: qnx-cpp-opaque-predicate
    desc: QNX C++ opaque predicate
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'static bool opaque_predicate\([\s\S]{0,900}\|\| true;'

composite_rules:
  - id: qnx-cpp-obfuscated-attack-phases
    desc: QNX C++ obfuscated attack phases
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-cpp-phase-fn-table
      - id: qnx-cpp-opaque-predicate
      - id: objectives/anti-analysis/emulator-detect/hardware::qnx-cpp-emulator-phase-call
      - id: objectives/impact/crypto-manipulation/weakening::qnx-cpp-crypto-phase-call
      - id: objectives/lateral-movement/brute-force/password::qnx-cpp-bruteforce-phase
