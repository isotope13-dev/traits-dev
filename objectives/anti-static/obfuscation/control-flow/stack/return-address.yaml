# Stack and Return Address Obfuscation
# Detects techniques used to hide or spoof the call stack/return address.
# ATT&CK: T1027 (Obfuscated Files or Information)
# MBC: F0001 (Anti-Analysis)
defaults:
  for: [c, cpp, pe, dll]
  platforms: [windows]
  attack: "T1027"
  mbc: "F0001"
traits:
  - id: addressofreturnaddress
    desc: Reads stack return address slot
    crit: notable
    conf: 1.0
    if:
      type: symbol
      substr: "_AddressOfReturnAddress"
  - id: return-address-xor-pattern
    desc: XOR pattern for return address
    crit: component
    if:
      type: raw
      regex: 'for\s*\(.{0,60}\)\s*\n?\s*\w+\[.{0,10}\]\s*\^=\s*\w+'
  - id: return-address-clearing-pattern
    desc: Zeroes return address to break trace
    crit: component
    if:
      type: text
      regex: '\*\(uintptr_t\*\).+?=\s*0'
  - id: spoof-function-keyword
    desc: Stack/return-address spoofing routine
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      regex: '(?i)spooffunction'
  - id: time-based-obfuscation-seed
    desc: Use of __TIME__ for obfuscation seeding
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '__TIME__\[[0-9]\]'
composite_rules:
  - id: return-address-xor
    desc: XOR obfuscation of return address
    crit: suspicious
    conf: 0.85
    all:
      - id: addressofreturnaddress
      - id: return-address-xor-pattern
  - id: return-address-clearing
    desc: Clearing return address on stack
    crit: hostile
    conf: 0.95
    all:
      - id: addressofreturnaddress
      - id: return-address-clearing-pattern
  - id: spoof-function-with-context
    desc: Spoof function with AddressOfReturnAddress context
    crit: component
    all:
      - id: spoof-function-keyword
      - id: addressofreturnaddress
  - id: stack-spoofing-technique
    desc: Return address spoofing / stack obfuscation
    crit: hostile
    conf: 0.98
    any:
      - id: return-address-clearing
      - id: return-address-xor
      - id: spoof-function-with-context
