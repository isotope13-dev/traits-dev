defaults:
  platforms: [windows, unix]
traits:
  - id: exception-swallower
    desc: Swallows all exceptions silently
    crit: suspicious
    conf: 0.8
    for: [ruby]
    mbc: "B0032"
    unless:
      - id: well-known/lib/jruby::package-path
      - id: well-known/lib/jruby::module-marker
      - id: well-known/lib/jruby::jruby-home-path
    if:
      type: text
      regex: 'rescue\s+Exception(\s*end|;)'
