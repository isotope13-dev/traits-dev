# JavaScript control-flow obfuscation via exception handling.
# Patterns that suppress all errors to hide loader/decoder failures or
# to make staged payload loaders run silently.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: B0032
  attack: T1027
traits:
  - id: silent-catch-with-side-effect
    desc: Empty catch followed by await/require call
    crit: suspicious
    conf: 0.88
    count_min: 2
    if:
      type: text
      regex: catch\s*\(\s*\w*\s*\)\s*\{\s*\}.{0,80}(await|require\()
    not:
      - substr: webpackLoadOptionalExternalModule
    unless:
      - type: basename
        regex: '(^|!!).{0,200}node_modules/.+\.[cm]?[jt]s$'
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/library/structure::js-medium-minified-line
    downgrade:
      any:
        - id: metadata/library/structure::js-webpack-bundle
        - id: micro-behaviors/process/create/shell/host::require-vscode
  - id: async-try-await-loader
    desc: async function wrapping try+await (staged loader)
    crit: suspicious
    conf: 0.88
    count_min: 2
    if:
      type: text
      regex: async\s+function\s+\w+\(\)\s*\{\s*try\s*\{\s*await\s+\w+\(\)
    # Empty-catch+await and async-try-await are common in minified bundle
    # runtime helpers; the dangerous combination is caught by the
    # staged-loader-exception-chain composite (all three signals + an
    # upward require), so suppress the weak standalone signal on recognized
    # bundler/minified output.
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/library/structure::js-medium-minified-line
  - id: upward-require-dot
    desc: require('.') / require('..') upward traversal
    crit: component
    conf: 0.85
    attack: T1059.007
    if:
      type: text
      regex: require\s*\(\s*["']\.\.?["']\s*\)
    not:
      - substr: 'require("./load-bindings")'
      - substr: './win32-sn-parser'
      - substr: 'serialport/bindings-cpp'
    unless:
      - type: text
        substr: "const worker = require('..');"
      - type: basename
        exact: win32.js
      - type: basename
        regex: '(^|!!).{0,200}node_modules/.+\.[cm]?[jt]s$'
composite_rules:
  - id: staged-loader-exception-chain
    desc: Staged loader exception chain
    crit: suspicious
    conf: 0.9
    size_max: 2000000
    near_bytes: 8192
    all:
      - id: upward-require-dot
      - id: async-try-await-loader
      - id: silent-catch-with-side-effect
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
