defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1027

traits:
  - id: vbs-chunked-base64-payload-table
    desc: Large Base64 chunks in VBScript table
    crit: suspicious
    conf: 0.96
    count_min: 8
    if:
      type: text
      regex: '(?i)\b\w+\s*\.\s*Add\s+["''][A-Za-z0-9]{8,24}["'']\s*,\s*["''][A-Za-z0-9+/]{500,}'

  - id: vbs-base64-fragment-helper-calls
    desc: VBScript appends Base64 script fragments
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bCall\s+[A-Za-z][A-Za-z0-9_]{7,}\s*\(\s*["''][A-Za-z0-9+/]{24,}={0,2}["'']'
    count_min: 8

  - id: vbs-fragmented-frombase64string-call
    desc: VBScript rebuilds FromBase64String call
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)Fromba["'']\s*&\s*[A-Za-z_]\w*\s*\(\s*\d+\s*\)'

  - id: vbs-encoded-remote-data-function
    desc: Base64-encoded PowerShell remote-data function
    crit: suspicious
    conf: 0.96
    attack: T1027,T1105
    if:
      type: encoded
      encoding: base64
      regex: '(?i)\bGet-RemoteData\b'

  - id: vbs-encoded-reflective-assembly-load
    desc: Base64-encoded reflective assembly load
    crit: suspicious
    conf: 0.97
    attack: T1027,T1059.001,T1620
    if:
      type: encoded
      encoding: base64
      regex: '(?i)(Reflection\.Assembly|Assembly::Load)'

composite_rules:
  - id: vbs-array-evaluated-hidden-loader
    desc: VBS evaluates an array payload and runs it hidden
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.005,T1564.003
    all:
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
      - id: micro-behaviors/data/encode/char-code::array-payload-reconstruction
      - id: micro-behaviors/process/interpreter/eval::vbs-executeglobal
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-hidden-async-run

  - id: line-bloated-hidden-gzip-stage
    desc: Line-bloated VBScript conceals a Base64 and gzip-decoded hidden execution stage
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
      - id: objectives/command-and-control/dropper/execution/download-exec::windows-script-msxml-base64-decoder
      - id: objectives/command-and-control/dropper/execution/download-exec::windows-script-powershell-gzip-decompress
      - id: objectives/command-and-control/dropper/execution/download-exec::windows-script-runs-decoded-temp-batch
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-run-hidden-zero
  - id: vbs-hidden-environment-payload-stager
    desc: Obfuscated VBScript stages encoded data through env before hidden execution
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001,T1059.005,T1564.003
    all:
      - id: vbs-chunked-base64-payload-table
      - id: micro-behaviors/os/env/access::wsh-vbs-environment-method
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-hidden-async-run
      - id: objectives/execution/interpreter/vbscript/loader::array-table-obfuscation
  - id: vbs-environment-stage-dynamic-execution
    desc: VBScript dynamically executes an encoded environment-staged payload
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005,T1564.003
    all:
      - id: objectives/command-and-control/dropper/execution/shell-chain::env-large-unicode-stage
      - id: micro-behaviors/process/interpreter/eval::vbs-executeglobal
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-hidden-async-run
      - id: objectives/execution/interpreter/script/wsh::wscript-scriptfullname
  - id: vbs-fragmented-hidden-powershell-loader
    desc: Fragmented Base64 VBScript hidden PowerShell loader
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001,T1059.005,T1564.003
    all:
      - id: vbs-base64-fragment-helper-calls
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-run-hidden-zero
    any:
      - id: vbs-encoded-remote-data-function
      - id: vbs-encoded-reflective-assembly-load
    needs: 1
