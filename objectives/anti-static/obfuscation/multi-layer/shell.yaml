defaults:
  platforms: [unix, fortios]
  for: [shell]
  attack: T1027

traits:
  - id: shell-repeated-base64-decodes
    desc: Repeated shell Base64 decoding commands
    crit: suspicious
    conf: 0.9
    if:
      # Repeated independent decodes are common in deployment scripts (for
      # example, decoding several Kubernetes Secret fields).  Obfuscated
      # shell payloads instead chain the decode stages closely; require that
      # shape rather than counting unrelated commands across the file.
      type: text
      regex: '(?s)base64\s+-d.{0,240}base64\s+-d.{0,240}base64\s+-d'
    unless:
      - id: well-known/app/samba/
      - id: well-known/tool/detection/clawker::adversarial-payload-fixture
      - id: well-known/app/aui-agent-builder/
      - id: well-known/app/nvidia-nvcf::openbao-migration-script
      - id: well-known/app/windows-desktop-tools::cmder-vendor-member
      - id: metadata/package/quality/recognized-contexts::ci-source-context
      # Kubernetes secret extraction is normal deployment plumbing, not a
      # staged payload decoder.
      - type: text
        regex: '(kubectl|jq|jsonpath)[^\r\n]{0,240}\|\s*base64\s+-d'
      - id: metadata/package/quality/source::konk-certificate-repair-script-context

  - id: shell-ordinal-rebuild-function
    desc: Shell ordinal rebuild function
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'printf "\\\\\$\(printf ''%03o'' "\$_c"\)'

  - id: shell-assoc-array-rebuild
    desc: Shell assoc array rebuild
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'declare -A .{0,40}[\s\S]{0,260}rebuild_indirect'

  - id: shell-env-smuggle-host
    desc: Shell smuggles host env var
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'export _[A-Z0-9_]{0,32}HOST=.{0,80}\$\{'

  - id: shell-self-base64-pack
    desc: Shell self base64 pack
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: base64 -w0 < "$SELF"

  - id: shell-stage2-base64-exec
    desc: Shell stage2 base64 exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      # Do not treat a function such as `ovs-exec "$2"` as a shell `exec`.
      # The command must be a standalone shell word.
      regex: '(^|[^A-Za-z0-9_-])exec[[:space:]]+["'']?\$[2-9]([^A-Za-z0-9_]|$)'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: shell-packed-cron-reexec
    desc: Shell packed cron reexec
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: stage2.sh
    unless:
      - id: well-known/tool/detection/llm-scanner::mvar-security-context
      - id: well-known/app/drivers/

composite_rules:
  - id: shell-multilayer-obfuscation
    desc: Shell multilayer obfuscation
    crit: hostile
    conf: 0.98
    needs: 3
    any:
      - id: micro-behaviors/data/encode/hex::shell-hex-byte-sequence
      - id: shell-repeated-base64-decodes
      - id: shell-ordinal-rebuild-function
      - id: shell-assoc-array-rebuild
      - id: shell-env-smuggle-host

  - id: shell-self-packed-stager
    desc: Shell self-packed stager
    crit: hostile
    conf: 0.98
    all:
      - id: shell-self-base64-pack
      - id: shell-stage2-base64-exec
    any:
      - id: shell-packed-cron-reexec
