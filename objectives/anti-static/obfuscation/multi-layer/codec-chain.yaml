# Three or more distinct decoder/decrypt calls chained in a single
# function body. A real package decoding "user data" needs at most one
# layer; chaining three different decoder modules in sequence is the
# signature of a payload-unwrap pipeline (e.g., AES → encode-decode →
# position-codec in aes-decode-runner-pro). Detecting the chain names
# the kill-chain tradecraft as a single attribution.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032
traits:
  - id: aes-gcm-decrypt-call
    desc: AES-GCM decrypt helper call
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\b[Dd]ecrypt[A-Za-z]{0,16}[Gg]cm\s*\('
  - id: decode-codec-call
    desc: decodeCodec / decodeCustom call
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '\bdecode[CcUu][a-z]{4,16}\s*\('
  - id: decode-position-call
    desc: decodePosition / decodeUnit call
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '\bdecode(Position|Unit)\s*\('
composite_rules:
  - id: triple-layer-codec-chain
    desc: Three-layer decoder chain in one file
    crit: suspicious
    conf: 0.94
    scope: leaf
    near_lines: 12
    all:
      - id: aes-gcm-decrypt-call
      - id: decode-codec-call
      - id: decode-position-call
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-large-module-bundle
