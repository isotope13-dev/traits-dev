defaults:
  platforms: [unix]
  for: [java, class, jar]
  attack: T1027

traits:
  - id: java-fragmented-base64-stager
    desc: Java fragmented base64 stager
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'String f1[\s\S]{0,360}String f4[\s\S]{0,360}Base64\.getDecoder'

  - id: java-reflective-processbuilder
    desc: Java reflective ProcessBuilder
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Class\.forName\("java\.lang\.ProcessBuilder"\)[\s\S]{0,520}getMethod\("start"'

composite_rules:
  - id: java-obfuscated-process-stager
    desc: Java obfuscated process stager
    crit: hostile
    conf: 0.98
    all:
      - id: java-fragmented-base64-stager
      - id: java-reflective-processbuilder

  - id: java-obfuscated-encrypted-zip-process-stager
    desc: Java obfuscates and launches an encrypted ZIP stage
    crit: hostile
    conf: 0.99
    for: [class, jar]
    platforms: [unix, windows]
    all:
      - id: objectives/anti-static/obfuscation/string/crypto::java-base64-cipher-byte-range-cluster
      - id: objectives/command-and-control/dropper/staged-loader::java-encrypted-zip-stage-drop-exec
