# Python multi-layer obfuscation and loaders
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: B0032
traits:
- id: python-hex-escaped-names--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: x64\x65\x63\x6f\x6d\x70\x72\x65\x73\x73
    case_insensitive: true
  count_max: 1029377
- id: python-hex-escaped-names--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: x62\x36\x34\x64\x65\x63\x6f\x64\x65
    case_insensitive: true
  count_max: 1029378
- id: python-hex-escaped-names--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: x62\x61\x73\x65\x36\x34
    case_insensitive: true
  count_max: 1029379
- id: python-hex-escaped-names--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: x65\x78\x65\x63
    case_insensitive: true
  count_max: 1029380
- id: python-hex-escaped-names--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: x7a\x6c\x69\x62
    case_insensitive: true
  count_max: 1029381
composite_rules:
- id: exec-zlib-base64-hex-loader
  desc: Hex-escaped zlib/base64 exec loader
  crit: hostile
  conf: 0.95
  all:
  - id: python-hex-escaped-names
  - id: objectives/anti-static/obfuscation/reflection/dynamic::dunder-import-getattr-dynamic

- id: hostile-python-loader
  desc: Hostile Python-based loader (layered obfuscation)
  crit: hostile
  conf: 0.95
  needs: 2
  any:
  - id: exec-zlib-base64-loader
  - id: exec-zlib-base64-hex-loader
  - id: objectives/anti-static/obfuscation/reflection/dynamic::dunder-import-getattr-dynamic
  - id: objectives/anti-static/obfuscation/syntax::setattr-builtins-tamper
  unless:
  - id: metadata/library/runtime::python-bundled-modules-loader

  # Multi-form obfuscation density: ≥2 distinct obfuscation primitives in
  # a single small file. Each individual atom is `notable`; the
  # combination escalates to `suspicious` because no benign script needs
  # multiple decode/transform primitives co-located.
- id: multi-form-obfuscation-density
  desc: Multiple obfuscation primitives co-located in one file
  crit: suspicious
  conf: 0.93
  size_max: 50000
    # Requires 2 distinct *transform* primitives (XOR / arithmetic / ROT-N).
    # The weaker `python-hex` and `code-metrics` indicators fire on any
    # firmware/binary-handling tool (lots of `\xNN` literals + many helper
    # functions), so they are not sufficient on their own.
  needs: 2
  any:
  - id: micro-behaviors/data/encode/xor::xor-bytes-genexpr-key
  - id: micro-behaviors/data/encode/xor::xor-bytes-genexpr-literal
  - id: micro-behaviors/data/encode/xor::xor-bytearray-mutating-loop
  - id: objectives/anti-static/obfuscation/encoding/arithmetic::subtract-bytes-genexpr
  - id: objectives/anti-static/obfuscation/encoding/arithmetic::add-mod-bytes-genexpr
  - id: objectives/anti-static/obfuscation/encoding/arithmetic::rot-n-chr-ord-decode
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory

  # Hostile escalation: the multi-form obfuscation pattern paired with
  # any of the high-cost downstream actions that consume the decoded
  # output. A "config builder" file that decodes to a URL/IP/secret is
  # only meaningful when something consumes the result — and the consumer
  # is itself diagnostic of malware intent (HTTP fetch, subprocess exec,
  # crypto operations on attacker-controlled input).
- id: stager-config-builder-hostile
  desc: Multi-form obfuscation feeds remote stager
  crit: hostile
  conf: 0.96
  size_max: 100000
  all:
  - id: multi-form-obfuscation-density
  any:
      # Output consumed for HTTP request — URL builder pattern
  - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen
  - id: micro-behaviors/communications/http/lib/requests
  - id: micro-behaviors/communications/socket/ssl::tls-validation-fully-disabled
      # Output fed to subprocess — exec stager pattern
  - id: micro-behaviors/process/create/subprocess
      # Output fed to crypto operation — encrypted-config pattern
  - id: micro-behaviors/crypto/symmetric/aes
  - id: objectives/evasion/security-bypass/tls::python-tls-validation-bypass
      # Output consumed at module-import time via a first-touch hook
  - id: objectives/command-and-control/trigger/activation::import-time-hook-installation
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness::test-directory
- id: exec-zlib-base64-loader
  desc: exec(zlib.decompress(base64.b64decode(...))) loader
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/data/decode/base64::b64decode-call
  - id: micro-behaviors/data/compress/library::zlib-decompress-symbol
  - id: micro-behaviors/process/interpreter/python::exec-builtin
  near_bytes: 4096
  unless:
  - id: metadata/library/runtime::python-bundled-modules-loader
  - id: metadata/library/runtime::python-bundler-exporter-template
- id: python-hex-escaped-names
  desc: Hex-escaped common function names in Python
  crit: suspicious
  conf: 0.9
  any:
  - id: python-hex-escaped-names--rx-4
  - id: python-hex-escaped-names--rx-5
  - id: python-hex-escaped-names--rx-6
  - id: python-hex-escaped-names--rx-7
  - id: python-hex-escaped-names--rx-8
