# Python multi-layer obfuscation and loaders
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: B0032
traits:
  - id: exec-zlib-base64-loader
    desc: exec(zlib.decompress(base64.b64decode(...))) loader
    crit: suspicious
    conf: 0.95
    if:
      type: text
      # Matches various whitespace and optional module prefixes
      regex: 'exec\s*\(\s*(?:[a-zA-Z0-9._]+\.)?zlib\.decompress\s*\(\s*(?:[a-zA-Z0-9._]+\.)?base64\.b64decode'
  - id: python-hex-escaped-names
    desc: Hex-escaped common function names in Python
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)(?:\\x65\\x78\\x65\\x63|\\x7a\\x6c\\x69\\x62|\\x62\\x61\\x73\\x65\\x36\\x34|\\x64\\x65\\x63\\x6f\\x6d\\x70\\x72\\x65\\x73\\x73|\\x62\\x36\\x34\\x64\\x65\\x63\\x6f\\x64\\x65)'

composite_rules:
  - id: exec-zlib-base64-hex-loader
    desc: Hex-escaped zlib/base64 exec loader
    crit: hostile
    conf: 0.95
    all:
      - id: python-hex-escaped-names
      - id: objectives/anti-static/obfuscation/reflection/dynamic::dunder-import-getattr-dynamic

  - id: hostile-python-loader
    desc: Hostile Python-based loader (layered obfuscation)
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: exec-zlib-base64-loader
      - id: exec-zlib-base64-hex-loader
      - id: objectives/anti-static/obfuscation/reflection/dynamic::dunder-import-getattr-dynamic
      - id: objectives/anti-static/obfuscation/syntax::setattr-builtins-tamper
