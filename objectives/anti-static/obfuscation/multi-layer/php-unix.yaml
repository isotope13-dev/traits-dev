defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1027

traits:
  - id: php-base64-eval-packed
    desc: PHP base64 eval pack
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'base64_encode\([\s\S]{0,520}base64_decode\([\s\S]{0,160}eval\('

  - id: php-base64-rot13-exec
    desc: PHP base64 rot13 exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'base64_decode\([\s\S]{0,260}str_rot13[\s\S]{0,260}exec\('

  - id: php-xor-self-encode
    desc: PHP XOR self encode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'file_get_contents\(SELF_PATH\)[\s\S]{0,520}\^ \$xorKey'

composite_rules:
  - id: php-packed-eval-stager
    desc: PHP packed eval stager
    crit: hostile
    conf: 0.98
    any:
      - id: php-base64-eval-packed
      - id: php-base64-rot13-exec

  - id: php-self-xor-stager
    desc: PHP self-XOR stager
    crit: hostile
    conf: 0.98
    all:
      - id: php-xor-self-encode
      - id: micro-behaviors/data/encode/base64::php-base64-encode
