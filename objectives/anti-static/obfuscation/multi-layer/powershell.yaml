defaults:
  platforms: [unix, windows]
  for: [powershell]
  attack: T1027

composite_rules:
  - id: powershell-hex-xor-scriptblock-loader
    desc: PowerShell decrypts an embedded hex payload into a ScriptBlock
    crit: hostile
    conf: 0.99
    attack: "T1027,T1140,T1059.001"
    mbc: "B0032,C0043,E1059"
    all:
      - id: micro-behaviors/data/encode/payload::powershell-hex-here-string-carrier
      - id: micro-behaviors/crypto/symmetric/xor/loop::repeating-key-indexed-bxor-loop
      - id: micro-behaviors/process/interpreter/eval::powershell-scriptblock-constructor-text

  - id: powershell-base64-rc4-gzip-loader
    desc: PowerShell Base64 RC4 gzip loader
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/metrics::powershell-long-line
      - id: micro-behaviors/data/encode/payload::large-base64-string-literals
      - id: micro-behaviors/crypto/symmetric/xor/rotational::rotation-counter-update
      - id: micro-behaviors/data/compress/library::gzip-decompress-to-text
  - id: powershell-multilayer-obfuscated-c2
    desc: PowerShell multilayer C2 obfuscation
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/string/concat::dense-string-concat
      - id: micro-behaviors/data/source/syntax/typecast::char-array-cast
      - id: objectives/execution/interpreter/eval/invoke::encoded-iex
    any:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-upload
      - id: objectives/command-and-control/dropper/staging/encrypted::iex-finalscript
  - id: powershell-aes-encrypted-script-execution
    desc: PowerShell AES-encrypted script execution
    crit: hostile
    conf: 0.99
    attack: "T1027,T1059.001"
    mbc: "C0025,E1059"
    all:
      - id: objectives/command-and-control/dropper/staging/encrypted::ps-aes-inline-payload
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/process/interpreter/eval::embedded-powershell-iex
  - id: powershell-base64-reflected-scriptblock-loader
    desc: PowerShell decodes Base64 and executes reflected ScriptBlock code
    crit: hostile
    conf: 0.99
    attack: "T1027,T1140,T1059.001"
    all:
      - id: micro-behaviors/process/interpreter/reflection/runtime::powershell-assembly-method-invoke
      - id: micro-behaviors/process/interpreter/eval::powershell-scriptblock-constructor-text
      - id: metadata/file/metrics::powershell-long-line
    any:
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-reflected-split
