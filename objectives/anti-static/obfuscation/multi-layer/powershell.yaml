defaults:
  platforms: [unix, windows]
  for: [powershell]
  attack: T1027

composite_rules:
  - id: powershell-base64-rc4-gzip-loader
    desc: PowerShell Base64 RC4 gzip loader
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/metrics::powershell-long-line
      - id: micro-behaviors/data/encode/payload::large-base64-string-literals
      - id: micro-behaviors/crypto/symmetric/xor/rotational::rotation-counter-update
      - id: micro-behaviors/data/compress/library::gzip-decompress-to-text
  - id: powershell-multilayer-obfuscated-c2
    desc: PowerShell multilayer C2 obfuscation
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/string/concat::dense-string-concat
      - id: micro-behaviors/data/source/syntax/typecast::char-array-cast
      - id: objectives/execution/interpreter/eval/invoke::encoded-iex
    any:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-upload
      - id: objectives/command-and-control/dropper/staging/encrypted::iex-finalscript
