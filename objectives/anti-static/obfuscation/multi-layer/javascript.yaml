defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

composite_rules:
  - id: js-decoded-activex-payload-dropper
    desc: Alphabet decoder hides ActiveX payload dropper
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.007,T1105
    for: [javascript]
    all:
      - id: micro-behaviors/data/decode/custom::js-indexof-charat-lookup
      - id: micro-behaviors/process/interpreter/jscript::activex-object-decoder-progid
      - id: micro-behaviors/fs/write/file/stream::js-adodb-stream-savetofile-dynamic-path
      - id: micro-behaviors/process/create/flags::computed-call-zero-final-argument
  - id: js-obfuscated-stage-computed-execution
    desc: JavaScript decodes stage before dynamic execution
    crit: hostile
    conf: 0.99
    attack: T1027,T1140,T1059.007
    mbc: B0032
    for: [javascript]
    scope: file
    all:
      - id: micro-behaviors/data/decode/custom::js-alphabet-coded-decoder-source
    any:
      - id: micro-behaviors/process/interpreter/eval::js-computed-charcode-call
      - id: micro-behaviors/process/interpreter/eval::js-new-function-variable-argument
    unless:
      - id: metadata/library/mermaid::mermaid-bundle-marker
      - id: well-known/app/wordpress-plugins/
      - id: well-known/lib/freemius::freemius-js-ref
      - id: well-known/app/kombai::kombai-vendor-runtime-context

  - id: js-obfuscated-global-bootstrap-stage
    desc: JavaScript bootstraps global object before decoded stage execution
    crit: hostile
    conf: 0.99
    attack: T1027,T1140,T1059.007
    mbc: B0032
    for: [javascript]
    near_bytes: 2048
    all:
      - id: micro-behaviors/data/decode/custom::js-alphabet-coded-decoder-source
      - id: micro-behaviors/process/interpreter/eval::js-computed-charcode-call
      - id: micro-behaviors/process/interpreter/eval::function-ctor-call-expr-arg
    unless:
      - id: well-known/app/wordpress-plugins/
      - id: well-known/lib/freemius::freemius-js-ref

  - id: js-alphabet-coded-stage-decoder
    desc: JavaScript alphabet-coded stage decoder
    crit: suspicious
    conf: 0.97
    attack: T1140,T1027
    for: [javascript]
    near_bytes: 2048
    all:
      - id: micro-behaviors/data/decode/custom::js-alphabet-coded-decoder-source
    unless:
      - id: well-known/app/wordpress-plugins/
      - id: well-known/lib/freemius::freemius-js-ref
      - id: well-known/app/baidu-comate::baidu-comate
      - id: well-known/lib/web-ui-vendors::dompurify-library-marker
      - id: well-known/lib/web-ui-vendors::html2canvas-library-marker
      - id: micro-behaviors/data/encode/base64::minified-base64-codec-library

  - id: minified-charcode-indirect-eval
    desc: Minified bundle combines character-code reconstruction and indirect eval
    crit: suspicious
    conf: 0.9
    attack: "T1027, T1059.007"
    mbc: B0032
    all:
      - id: metadata/library/structure::js-large-minified-bundle
      - id: micro-behaviors/data/encode/char-code::fromcharcode-xor-rebuild
      - id: micro-behaviors/process/interpreter/eval::js-indirect-eval-variable

  - id: js-custom-decoder-aliased-eval-stage
    desc: JavaScript custom decoder feeds a locally aliased eval stage
    crit: hostile
    conf: 0.99
    attack: T1027,T1140,T1059.007
    mbc: B0032
    for: [javascript]
    scope: file
    all:
      - id: micro-behaviors/data/decode/custom::js-alphabet-coded-decoder-source
      - id: micro-behaviors/process/interpreter/eval::js-eval-alias-assignment
      - id: metadata/file/metrics::js-many-very-long-strings
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call-text
    unless:
      - id: metadata/package/testing/

  - id: js-layered-decoder-function-stage
    desc: Layered decoder feeds Function constructor
    crit: hostile
    conf: 0.99
    attack: T1027,T1140,T1059.007
    mbc: B0032
    for: [javascript]
    scope: file
    all:
      - id: micro-behaviors/data/decode/custom::js-indexof-charcode-shift-decoder
      - id: micro-behaviors/data/decode/custom::js-octal-charcode-loop
      - id: micro-behaviors/data/encode/string::decimal-string-blob
      - id: micro-behaviors/process/interpreter/eval::js-new-function-variable-argument
    unless:
      - id: metadata/package/testing/
