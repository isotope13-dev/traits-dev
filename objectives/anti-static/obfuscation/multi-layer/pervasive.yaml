defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: pervasive-multi-encoding
    desc: Pervasive multi-encoding obfuscation (XOR and Base64).
    crit: hostile
    all:
      - type: trait
        id: objectives/anti-static/obfuscation/string/anomaly::xor-encoded-malware
        count_min: 5
      - type: trait
        id: metadata/file/encoded::base64
        count_min: 10
