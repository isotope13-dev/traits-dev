defaults:
  attack: T1027
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
  for:
    - elf
    - shell
traits:
  - id: doubly-encoded-secret-1
    desc: Doubly-encoded secret
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: mkqNJzBGm<X:cxE?z{{ppPj=JNmblNp1
  - id: doubly-encoded-secret-2
    desc: Doubly-encoded secret
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: B=z<cx?XEDXXK_=0Y<JEBCSs0Bg<h0?dpoSML;m?CY0gzSSY
  - id: mixed-encoding-indicators
    desc: Mixed encoding indicators
    crit: notable
    conf: 0.75
    size_max: 500000
    if:
      type: text
      regex: '[A-Za-z0-9+/=]*[<>{][A-Za-z0-9+/=<>]{16,}'
    unless:
      - type: text
        substr: binascii
      - type: text
        substr: postgresql
      - type: text
        substr: libgcc
      - type: text
        substr: libc
      - type: basename
        regex: (?i)^(readme|changelog|upgrading|license)(\.[^.]+)?$
      - type: basename
        regex: (?i)\.(md|markdown|rst)$
      - type: basename
        regex: (?i)\.(txt|adoc)$
composite_rules:
  - id: xor-plus-base64-obfuscation
    desc: XOR + Base64 obfuscation
    crit: suspicious
    conf: 0.88
    mbc: B0010
    any:
      - id: doubly-encoded-secret-1
      - id: doubly-encoded-secret-2
  - id: multi-codec-obfuscation
    desc: Multi-codec obfuscation
    crit: notable
    conf: 0.85
    mbc: B0010
    all:
      - id: mixed-encoding-indicators
      - id: xor-plus-base64-obfuscation
  - id: mirai-multi-layer-encoding
    desc: Mirai multi-layer encoding
    crit: hostile
    conf: 0.95
    mbc: B0010
    all:
      - id: well-known/malware/botnet/mirai/
      - id: xor-plus-base64-obfuscation
      - id: multi-codec-obfuscation
  - id: sophisticated-anti-analysis
    desc: Sophisticated anti-analysis
    crit: hostile
    conf: 0.93
    mbc: B0010
    all:
      - id: xor-plus-base64-obfuscation
      - id: multi-codec-obfuscation
