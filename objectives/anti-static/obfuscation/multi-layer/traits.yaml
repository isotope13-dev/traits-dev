defaults:
  attack: T1027
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: doubly-encoded-secret-1
    desc: Doubly-encoded secret
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: mkqNJzBGm<X:cxE?z{{ppPj=JNmblNp1
  - id: doubly-encoded-secret-2
    desc: Doubly-encoded secret
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: B=z<cx?XEDXXK_=0Y<JEBCSs0Bg<h0?dpoSML;m?CY0gzSSY
  - id: mixed-encoding-indicators
    # Composes off the engine's base64 sublayer (strings.base64_candidates)
    # instead of a regex. The previous pattern made the base64 run optional and
    # only required a `<`, `>`, or `{` near 16+ alphanumerics, so it fired on
    # shell redirects (`>>results/results`), HTML doc tags (`<code>…`),
    # compiled-binary symbol soup, and markdown — hence the ever-growing
    # unless: list. Requiring real base64 embeddings removes that FP surface
    # entirely (and the need for exclusions).
    desc: Multiple base64 string embeddings
    crit: notable
    conf: 0.75
    if:
      type: metrics
      field: strings.base64_candidates
      min: 3
composite_rules:
  - id: xor-plus-base64-obfuscation
    desc: XOR + Base64 obfuscation
    crit: suspicious
    conf: 0.88
    mbc: B0010
    any:
      - id: doubly-encoded-secret-1
      - id: doubly-encoded-secret-2
  - id: multi-codec-obfuscation
    desc: Multi-codec obfuscation
    crit: suspicious
    conf: 0.85
    mbc: B0010
    all:
      - id: mixed-encoding-indicators
      - id: xor-plus-base64-obfuscation
  - id: sophisticated-anti-analysis
    # Anchored on both hardcoded doubly-encoded-secret IOC constants — their
    # joint presence identifies this specific sample, so the verdict no longer
    # depends on mixed-encoding-indicators (which was the FP-prone leg).
    desc: Sophisticated anti-analysis
    crit: hostile
    conf: 0.93
    mbc: B0010
    all:
      - id: doubly-encoded-secret-1
      - id: doubly-encoded-secret-2
