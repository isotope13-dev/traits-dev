# Payload hidden in signature or overlay
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1027.009
traits:
  - id: mapibroker-filename
    desc: Adobe 32BitMAPIBroker filename
    crit: component
    conf: 0.98
    if:
      type: text
      exact: 32BitMAPIBroker.exe
  - id: mapibroker-brand
    desc: Adobe 32BitMAPIBroker branding
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Adobe Acrobat 32BitMAPIBroker
  - id: loader-api-table-core
    desc: Loader API resolver core names
    crit: suspicious
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: \b(LoadLibraryW|GetProcAddress|RtlImageNtHeader)\b
    unless:
      - id: metadata/signed/platform::microsoft
      - type: text
        substr: "Huawei Device Co., Ltd."
      - type: text
        substr: "https://aria2.github.io/"
      - type: text
        substr: "Electron v"
      - type: text
        substr: ProductAgentDP.dll
  - id: loader-api-table-stage
    desc: Loader staging API table names
    crit: suspicious
    conf: 0.88
    count_min: 2
    if:
      type: text
      regex: \b(CreateDirectoryW|GetWindowsDirectoryW)\b
    unless:
      - type: text
        substr: AppBroadcastPlugInState_
      - type: text
        substr: UIAnimationManager2
      - type: text
        substr: "Electron v"
composite_rules:
  - id: payload-hidden-in-signature-block
    desc: Valid PE payload found inside the digital signature or overlay range
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/binary/layout::has-overlay
      - id: metadata/binary/layout::pe-embedded
      - id: metadata/signed/certificate/verisign-symantec::symantec-corporation-cert
  - id: signed-overlay-decoy-payload
    desc: Signed PE with dominant overlay and embedded decoys
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/layout::pe-signature-present
      - id: metadata/binary/layout::compact-host-large-pe
      - id: metadata/binary/layout::multiple-pe-embedded
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/signed/platform::microsoft
  - id: adobe-mapibroker-overlay-carrier
    desc: Adobe MAPI broker with hidden overlay payload
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/layout::pe-signature-present
      - id: metadata/binary/layout::compact-host-large-pe
      - id: metadata/binary/layout::multiple-pe-embedded
    any:
      - id: metadata/vendor/adobe::adobe-inc-marker-rsrc
      - id: metadata/vendor/adobe::adobe-inc-marker-rdata
      - id: mapibroker-filename
      - id: mapibroker-brand
  - id: signed-overlay-loader-api-table
    desc: Signed overlay carrier with staged API resolver table
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/layout::pe-signature-present
      - id: metadata/binary/layout::compact-host-large-pe
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: loader-api-table-core
    any:
      - id: loader-api-table-stage
      - id: micro-behaviors/os/com/object::clsid-from-progid
      - id: micro-behaviors/os/com/invoke::co-create-instance
