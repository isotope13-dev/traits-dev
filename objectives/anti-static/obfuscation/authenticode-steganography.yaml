# Payload hidden in signature or overlay
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1027.009
traits:
  - id: mapibroker-filename
    desc: Adobe 32BitMAPIBroker filename
    crit: component
    conf: 0.98
    if:
      type: text
      exact: 32BitMAPIBroker.exe
  - id: mapibroker-brand
    desc: Adobe 32BitMAPIBroker branding
    crit: component
    conf: 0.97
    if:
      type: text
      exact: Adobe Acrobat 32BitMAPIBroker
  - id: loader-api-table-core
    desc: Loader API resolver core names
    crit: notable
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: \b(LoadLibraryW|GetProcAddress|RtlImageNtHeader)\b
    unless:
      - id: metadata/signed/platform::microsoft
      - type: text
        substr: "Huawei Device Co., Ltd."
      - type: text
        substr: "https://aria2.github.io/"
      - type: text
        substr: "Electron v"
      - type: text
        substr: ProductAgentDP.dll
  - id: loader-api-table-stage
    desc: Loader staging API table names
    crit: notable
    conf: 0.88
    count_min: 2
    if:
      type: text
      regex: \b(CreateDirectoryW|GetWindowsDirectoryW)\b
    unless:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - type: text
        substr: AppBroadcastPlugInState_
      - type: text
        substr: UIAnimationManager2
      - type: text
        substr: "Electron v"
  - id: acroipm2-rm-url
    desc: acroipm2 Adobe RM staging URL
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: (?i)https?://acroipm2(?:\.adobe)?\.com/assets/rm/
composite_rules:
  - id: payload-hidden-in-signature-block
    desc: Valid PE payload found inside the digital signature or overlay range
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/binary/layout::has-overlay
      - id: metadata/binary/layout::pe-embedded
      - id: metadata/signed/certificate/verisign-symantec::symantec-corporation-cert
  - id: signed-overlay-decoy-payload
    desc: Signed PE with dominant overlay and embedded decoys
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/layout::pe-signature-present
      - id: metadata/binary/layout::compact-host-large-pe
      - id: metadata/binary/layout::multiple-pe-embedded
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/signed/platform::microsoft
  - id: adobe-mapibroker-overlay-carrier
    desc: Adobe MAPI broker with hidden overlay payload
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/layout::pe-signature-present
      - id: metadata/binary/layout::compact-host-large-pe
      - id: metadata/binary/layout::multiple-pe-embedded
    any:
      - id: metadata/vendor/adobe::adobe-inc-marker-rsrc
      - id: metadata/vendor/adobe::adobe-inc-marker-rdata
      - id: mapibroker-filename
      - id: mapibroker-brand
  - id: signed-overlay-loader-api-table
    desc: Signed overlay carrier with staged API resolver table
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/layout::pe-signature-present
      - id: metadata/binary/layout::compact-host-large-pe
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: loader-api-table-core
    any:
      - id: loader-api-table-stage
      - id: micro-behaviors/os/com/object::clsid-from-progid
      - id: micro-behaviors/os/com/invoke::co-create-instance
  - id: adobe-signed-msoxmled-sfx-carrier
    desc: Adobe signed carrier with msoxmled decoy and SFX stage
    crit: hostile
    conf: 0.995
    size_min: 1048576
    all:
      - id: metadata/binary/layout::pe-signature-present
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/vendor/adobe::adobe-systems-inc-marker
      - id: metadata/binary/layout::msoxmled-pdb-path
    any:
      - id: metadata/binary/layout::sevenzip-mapi-sfx-cluster
      - id: objectives/evasion/process/injection::resume-thread
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/process/create/spawn::open-process
    needs: 2
  - id: adobe-stage-bundle-overlay-carrier
    desc: Adobe stage bundle in packed carrier
    crit: hostile
    conf: 0.995
    size_min: 1048576
    all:
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::adobe-stage-bundle-cluster
    any:
      - id: mapibroker-filename
      - id: mapibroker-brand
      - id: acroipm2-rm-url
      - id: objectives/command-and-control/dropper/staging/archive::hardcoded-http-zip-url
      - id: objectives/command-and-control/dropper/staging/signed-bundle::active-setup-ie-clsid
      - id: objectives/persistence/login/startup/registry::active-setup-stubpath-persistence
      - id: objectives/persistence/system/registry/com-hijack::inprocserver32-write
    needs: 2
