# Command Line Caret Obfuscation
# Detects usage of caret (^) escaping to break signatures
# Common in batch scripts and cmd.exe arguments
defaults:
  crit: suspicious
  conf: 0.8
  for: [shell, batch, pe, powershell, javascript, typescript, vbs]
  platforms: [windows]
  attack: "T1027.002"
  mbc: "B0027"
traits:
  - id: cmd-caret-obfuscation
    desc: Heavy caret obfuscation in string
    crit: notable
    if:
      type: string
      # Require command-interpreter context plus repeated caret-letter escaping.
      regex: '(?i)(cmd(?:\\.exe)?|powershell(?:\\.exe)?).{0,80}(\\^[a-z]){3,}'
  - id: cmd-caret-excessive-raw
    desc: Excessive caret usage (raw match)
    crit: notable
    if:
      type: string
      regex: "(?i)pow\\^?ershell.{0,160}\\^.{0,40}\\^.{0,40}\\^"
    not:
      - regex: "(\\^[A-Z]){5,}" # Likely control character representations like ^A^B^C
      - regex: "(\\^[a-z]){5,}" # Lowercase control character representations like ^s^t^u^v
composite_rules:
  - id: cmd-caret-excessive
    desc: Excessive caret usage
    crit: suspicious
    conf: 0.8
    mbc: B0027
    attack: T1027.002
    for: [shell, batch, pe, powershell, javascript, typescript, vbs]
    platforms: [windows]
    all:
      - id: objectives/anti-static/obfuscation/interpreter/cmd::cmd-caret-excessive-raw
    unless:
      - id: metadata/lang/shebang::perl
