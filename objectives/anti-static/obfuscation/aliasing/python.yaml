# Evasive Module Aliasing Detection
# Detects when multiple standard libraries are aliased to obfuscate intent
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  # === Python aliasing atomic indicators ===
  - id: alias-os
    desc: os import aliased
    crit: baseline
    conf: 0.6
    if:
      # Aliased-import obfuscation (`import os as <name>`). Matches the
      # bare module import carrying a structured alias (filefacts splits
      # `module as alias`); a plain import has no alias and won't match.
      type: symbol
      kind: import
      exact: 'os'
      alias: {}
  - id: alias-subprocess
    desc: subprocess import aliased
    crit: suspicious
    conf: 0.6
    if:
      # Aliased-import obfuscation (`import subprocess as <name>`). Matches the
      # bare module import carrying a structured alias (filefacts splits
      # `module as alias`); a plain import has no alias and won't match.
      type: symbol
      kind: import
      exact: 'subprocess'
      alias: {}
