# Evasive Module Aliasing Detection
# Detects when multiple standard libraries are aliased to obfuscate intent
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  # === Python aliasing atomic indicators ===
  - id: alias-os
    desc: os import aliased
    crit: baseline
    conf: 0.6
    if:
      type: ast
      query: |
        (
          import_statement
            name: (dotted_name
              (identifier) @module)
            alias: (aliased_import
              alias: (identifier) @alias)
        )
        (#eq? @module "os")
        (#not-eq? @alias "os")
  - id: alias-subprocess
    desc: subprocess import aliased
    crit: suspicious
    conf: 0.6
    if:
      type: ast
      query: |
        (
          import_statement
            name: (dotted_name
              (identifier) @module)
            alias: (aliased_import
              alias: (identifier) @alias)
        )
        (#eq? @module "subprocess")
        (#not-eq? @alias "subprocess")
