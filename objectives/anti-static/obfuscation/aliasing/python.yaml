# Evasive Module Aliasing Detection
# Multiple sensitive stdlib modules aliased together is a deliberate-obscuring
# signal. The neutral per-module "imported under an alias" observations are
# generic capabilities and live in micro-behaviors/data/source/quality/import/
# (a single aliased import is normal Python); this composite combines them.
defaults:
  platforms: [windows, unix]
  for: [python]
composite_rules:
  - id: evasive-module-aliasing
    desc: Multiple sensitive stdlib imports aliased
    crit: notable
    conf: 0.7
    needs: 3
    any:
      - id: micro-behaviors/data/source/quality/aliased-import
