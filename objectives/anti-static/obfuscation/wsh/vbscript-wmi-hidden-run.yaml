defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1027
  mbc: B0032

traits:
  - id: vbs-chrw-decoder-helper
    desc: VBScript ChrW decoder helper
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bFunction\s+\w+[\s\S]{0,220}\bchrW\s*\('
  - id: vbs-execute-concat-code
    desc: VBScript Execute concat code
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bExecute\s+"[^"\r\n]{1,50}"\s*\+'
  - id: vbs-hidden-wscript-run
    desc: VBScript hidden WScript run
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\.Run\s*\([^,\r\n]{1,80},\s*0\)'
    unless:
      - id: well-known/lib/deb-package::firefox-omni-basename
  - id: vbs-createobject-variable-arg
    desc: VBScript CreateObject variable argument
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)(^|[^.A-Za-z0-9_])CreateObject\s*\(\s*[A-Za-z_][A-Za-z0-9_]{2,40}\s*\)'

composite_rules:
  - id: obfuscated-vbs-wmi-hidden-run
    desc: Obfuscated VBScript WMI hidden runner
    crit: hostile
    conf: 0.98
    all:
      - id: vbs-chrw-decoder-helper
      - id: vbs-execute-concat-code
      - id: micro-behaviors/os/wmi/query::wmi-impersonation-moniker
      - id: vbs-hidden-wscript-run
  - id: vbs-concat-hidden-runner-obfuscation
    desc: VBScript concat-obfuscated hidden runner
    crit: hostile
    conf: 0.97
    all:
      - id: vbs-execute-concat-code
      - id: vbs-hidden-wscript-run
    any:
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-obfuscated-runner-bloat
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-high-byte-obfuscated-script
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
    needs: 1
  - id: vbs-obfuscated-shell-output-runner
    desc: Obfuscated VBS runs hidden command and captures output
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.005
    all:
      - id: vbs-execute-concat-code
      - id: vbs-hidden-wscript-run
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: micro-behaviors/process/io/wsh::wsh-process-output-readall
  - id: vbs-obfuscated-xor-payload-loader
    desc: VBScript obfuscated XOR payload loader
    crit: hostile
    conf: 0.98
    attack: "T1027,T1059.005"
    all:
      - id: vbs-createobject-variable-arg
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-vbs-numeric-array-decoder
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-vbs-xor-payload-decode
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-vbs-run-decoded-argument
