defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1027
  mbc: B0032

traits:
  - id: vbs-chrw-decoder-helper
    desc: VBScript ChrW decoder helper
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bFunction\s+\w+[\s\S]{0,220}\bchrW\s*\('
  - id: vbs-execute-concat-code
    desc: VBScript Execute concat code
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bExecute\s+"[^"\r\n]{1,50}"\s*\+'
  - id: vbs-hidden-wscript-run
    desc: VBScript hidden WScript run
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\.Run\s*\([^,\r\n]{1,80},\s*0\)'
    unless:
      - id: well-known/lib/deb-package::firefox-omni-basename
  - id: vbs-createobject-variable-arg
    desc: VBScript CreateObject variable argument
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)(^|[^.A-Za-z0-9_])CreateObject\s*\(\s*[A-Za-z_][A-Za-z0-9_]{2,40}\s*\)'

  - id: vbs-obfuscated-getobject-target
    desc: VBScript GetObject target rebuilt with Replace
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?is)\bGetObject\s*\(\s*Replace\s*\('

  - id: vbs-split-mid-chrw-decoder
    desc: VBScript Split/Mid/ChrW decoder
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?is)\bSplit\s*\([\s\S]{0,700}\bMid\s*\('
  - id: vbs-mid-chrw-decoder-step
    desc: VBScript Mid to ChrW decode step
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?is)\bMid\s*\([\s\S]{0,600}\bChrW\s*\('

  - id: vbs-rc4-sbox-array
    desc: VBScript RC4-like S-box array
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bDim\s+[A-Za-z_]\w*\s*\(\s*255\s*\)'

  - id: vbs-rc4-sbox-loop
    desc: VBScript RC4 S-box initialization loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bFor\s+[A-Za-z_]\w*\s*=\s*0\s+To\s+255\b'

  - id: vbs-rc4-byte-split
    desc: VBScript splits an encoded byte stream
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bSplit\s*\(\s*[A-Za-z_]\w*\s*,\s*"\s+"\s*\)'

  - id: vbs-rc4-xor-hex-byte
    desc: VBScript XOR-decodes hexadecimal bytes
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)Chr\s*\(\s*CLng\s*\(\s*"&H"\s*&\s*[A-Za-z_]\w*\s*\)\s+Xor\s+[A-Za-z_]\w*'

  - id: vbs-split-powershell-exe-name
    desc: VBScript rebuilds split PowerShell name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)["'']Powe["'']\s*&\s*["'']rshell(\.Exe)?["'']'

composite_rules:
  - id: vbs-rc4-like-byte-decoder
    desc: VBScript RC4-like S-box decoder
    crit: suspicious
    conf: 0.98
    all:
      - id: vbs-rc4-sbox-array
      - id: vbs-rc4-sbox-loop
      - id: vbs-rc4-byte-split
      - id: vbs-rc4-xor-hex-byte

  - id: vbs-rc4-hidden-powershell-stage
    desc: Obfuscated VBScript decodes a payload and launches hidden PowerShell
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001,T1564.003
    all:
      - id: vbs-rc4-like-byte-decoder
      - id: vbs-split-powershell-exe-name
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-run-hidden-zero
      - id: micro-behaviors/os/wsh/file::wscript-shell-object

  - id: vbs-split-mid-chrw-dynamic-loader
    desc: VBScript character-decoded dynamic loader
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005
    all:
      - id: vbs-split-mid-chrw-decoder
      - id: vbs-mid-chrw-decoder-step
      - id: objectives/execution/interpreter/vbscript/loader::execute-variable

  - id: obfuscated-vbs-wmi-hidden-run
    desc: Obfuscated VBScript WMI hidden runner
    crit: hostile
    conf: 0.98
    all:
      - id: vbs-chrw-decoder-helper
      - id: vbs-execute-concat-code
      - id: micro-behaviors/os/wmi/query::wmi-impersonation-moniker
      - id: vbs-hidden-wscript-run
  - id: vbs-concat-hidden-runner-obfuscation
    desc: VBScript concat-obfuscated hidden runner
    crit: hostile
    conf: 0.97
    all:
      - id: vbs-execute-concat-code
      - id: vbs-hidden-wscript-run
    any:
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-runner-call
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-high-byte-obfuscated-script
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
    needs: 1
  - id: vbs-concat-hidden-shellexecute-loader
    desc: Obfuscated VBScript builds a hidden ShellExecute payload
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005,T1059.007,T1564.003
    all:
      - id: vbs-execute-concat-code
      - id: micro-behaviors/os/com/object::shell-application-progid
      - id: micro-behaviors/process/create/shell/wsh::shellexecute-hidden-showcmd

  - id: vbs-self-modifying-source
    desc: VBScript rewrites its own source after reading it through an alias
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.005,T1070.006
    all:
      - id: objectives/execution/interpreter/script/wsh::wscript-scriptfullname
      - id: micro-behaviors/fs/read/file::open-text-file-read
      - id: micro-behaviors/fs/read/file::readall-text-file
      - id: micro-behaviors/fs/write/content::fso-open-text-file-write
  - id: vbs-obfuscated-shell-output-runner
    desc: Obfuscated VBS runs hidden command and captures output
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.005
    all:
      - id: vbs-execute-concat-code
      - id: vbs-hidden-wscript-run
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: micro-behaviors/process/io/wsh::wsh-process-output-readall
  - id: vbs-obfuscated-xor-payload-loader
    desc: VBScript obfuscated XOR payload loader
    crit: hostile
    conf: 0.98
    attack: "T1027,T1059.005"
    all:
      - id: vbs-createobject-variable-arg
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-vbs-numeric-array-decoder
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-vbs-xor-payload-decode
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-vbs-run-decoded-argument
