defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - ruby
  mbc: B0032
  attack: T1027
traits:
  - id: base64-encode-dup
    desc: Base64 encode
    crit: notable
    conf: 0.88
    attack: T1027 - ruby
    if:
      type: string_literal
      regex: Base64\.encode64|Base64\.strict_encode64
  - id: marshal-load-dup
    desc: Marshal deserialization (RCE risk)
    crit: suspicious
    conf: 0.93
    attack: T1059 - ruby
    if:
      type: string_literal
      regex: Marshal\.load|Marshal\.restore
  - id: yaml-unsafe-load-dup
    desc: YAML unsafe deserialization
    crit: suspicious
    conf: 0.9
    attack: T1059 - ruby
    if:
      type: string_literal
      regex: YAML\.load
  - id: reflection-send
    desc: Dynamic method invocation
    crit: notable
    conf: 0.85
    attack: T1027 - ruby
    if:
      type: string_literal
      regex: \.send\(|\.send
  - id: const-get
    desc: Dynamic constant access
    crit: baseline
    conf: 0.9
    attack: T1027 - ruby
    if:
      type: string_literal
      substr: const_get
  - id: const-set
    desc: Dynamic constant definition
    crit: baseline
    conf: 0.9
    attack: T1027 - ruby
    if:
      type: string_literal
      substr: const_set
  - id: define-method
    desc: Dynamic method definition
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: define_method
  - id: ruby-dense-chr-calls
    desc: Dense chr() calls (string building)
    crit: suspicious
    conf: 0.9
    count_min: 15
    per_kb_min: 3.0
    if:
      type: text
      regex: \b\d+\.chr\b
    unless:
      - type: string_literal
        regex: IRB
  - id: dense-send-calls
    desc: Dense send() calls (dynamic dispatch)
    crit: suspicious
    conf: 0.88
    count_min: 10
    per_kb_min: 2.0
    if:
      type: text
      regex: \.send\s*\(
    unless:
      - type: string_literal
        substr: IRB
      - type: string_literal
        substr: ActiveSupport
  - id: dense-eval-calls-dup
    desc: Dense eval calls
    crit: suspicious
    conf: 0.92
    count_min: 8
    per_kb_min: 1.5
    if:
      type: text
      regex: \beval\s*\(
    unless:
      - type: string_literal
        regex: IRB
  - id: dense-metaprogramming
    desc: Dense metaprogramming eval
    crit: suspicious
    conf: 0.85
    count_min: 10
    per_kb_min: 2.0
    if:
      type: text
      regex: (instance_eval|class_eval|module_eval)\s*[({]
    unless:
      - type: string_literal
        regex: IRB
  - id: dense-pack-calls-dup
    desc: Dense pack/unpack calls
    crit: suspicious
    conf: 0.85
    count_min: 10
    per_kb_min: 2.0
    if:
      type: text
      regex: \.(pack|unpack)\s*\(\s*['"][A-Za-z0-9\*]{1,4}['"]
    unless:
      - type: string_literal
        regex: IRB
    downgrade:
      any:
        - id: metadata/import/ruby::openssl
        - id: micro-behaviors/crypto/asymmetric/rsa::rsa-encrypt-decrypt
  - id: dense-interpolation
    desc: Dense string interpolation
    crit: notable
    conf: 0.75
    count_min: 15
    per_kb_min: 3.0
    if:
      type: text
      regex: '#\{[^}]{1,120}\}'
composite_rules: []
