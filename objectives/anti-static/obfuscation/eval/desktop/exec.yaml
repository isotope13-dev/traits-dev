# Desktop Entry Exec= obfuscation and in-line shell-eval dropper patterns.
#
# .desktop Exec= is a single string; the freedesktop spec defines reserved
# characters but does not restrict it, so attackers use it as a one-line
# shell scripting surface. Each atom matches the parsed Exec= value via the
# `desktop_entry.exec` kv path and isolates one obfuscation primitive.
defaults:
  platforms: [linux]
  for: [desktop-entry]
  mbc: E1027

traits:
  - id: desktop-exec-bash-c
    desc: Exec invokes bash -c
    crit: notable
    conf: 0.85
    if:
      type: value
      path: desktop_entry.exec
      regex: '\bbash\s+-c\b'

  - id: desktop-exec-sh-c
    desc: Exec invokes sh -c
    crit: notable
    conf: 0.85
    if:
      type: value
      path: desktop_entry.exec
      regex: '\b(sh|dash|zsh|ksh)\s+-c\b'

  - id: desktop-exec-eval
    desc: Exec uses shell eval
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: desktop_entry.exec
      regex: '\beval\s+["\$]'

  - id: desktop-exec-base64-decode
    desc: Exec decodes base64
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: desktop_entry.exec
      regex: '\bbase64\s+(-d|--decode)\b'

  - id: desktop-exec-xxd-decode
    desc: Exec reverses hex via xxd
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: desktop_entry.exec
      regex: '\bxxd\s+-r\b'

  - id: desktop-exec-openssl-decrypt
    desc: Exec decrypts via openssl
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: desktop_entry.exec
      regex: '\bopenssl\s+(enc|dec|aes-)'

  - id: desktop-exec-chmod-exec
    desc: Exec makes file executable
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: desktop_entry.exec
      regex: '\bchmod\s+\+x\b'

  - id: desktop-exec-chmod-octal
    desc: Exec sets octal exec bits
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: desktop_entry.exec
      regex: '\bchmod\s+[0-7]*[1357][0-7]*\s'

  - id: desktop-exec-tmp-path
    desc: Exec references /tmp
    crit: suspicious
    conf: 0.8
    if:
      type: value
      path: desktop_entry.exec
      regex: '(^|[\s"''])/tmp/'

  - id: desktop-exec-dev-shm-path
    desc: Exec references /dev/shm
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: desktop_entry.exec
      regex: '(^|[\s"''])/dev/shm/'

  - id: desktop-exec-curl
    desc: Exec invokes curl
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: desktop_entry.exec
      regex: '\bcurl\b'

  - id: desktop-exec-wget
    desc: Exec invokes wget
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: desktop_entry.exec
      regex: '\bwget\b'

  - id: desktop-exec-backgrounded
    desc: Exec backgrounds its command
    crit: component
    if:
      type: value
      path: desktop_entry.exec
      regex: '\)\s*&|&\s+sleep\b'

  - id: desktop-exec-silent
    desc: Exec suppresses stderr
    crit: component
    if:
      type: value
      path: desktop_entry.exec
      substr: 2>/dev/null

  - id: desktop-exec-subshells
    desc: Exec chains command substitutions
    crit: suspicious
    conf: 0.8
    if:
      type: value
      path: desktop_entry.exec
      regex: '\$\([^)]{1,256}\)[^$]{0,128}\$\([^)]{1,256}\)'

  - id: desktop-exec-random-path
    desc: Exec builds randomized filename
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: desktop_entry.exec
      regex: '\$\(date\s[^)]{0,64}(md5sum|sha\dsum|\$RANDOM)\b'

  - id: desktop-exec-long
    desc: Exec is unusually long
    crit: component
    conf: 0.75
    if:
      type: value
      path: desktop_entry.exec
      regex: '.{256}'     # ≥256 chars (unanchored, so longer values also match)

  - id: desktop-exec-pipe-to-shell
    desc: Exec pipes into a shell
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: desktop_entry.exec
      regex: '\|\s*(ba|z|da|k)?sh\b'

composite_rules:
  - id: desktop-exec-shell-c
    desc: Exec invokes a shell with -c
    crit: notable
    conf: 0.85
    any:
      - id: desktop-exec-bash-c
      - id: desktop-exec-sh-c

  - id: desktop-exec-dynamic-eval
    desc: Exec runs dynamically built code
    crit: suspicious
    conf: 0.95
    any:
      - id: desktop-exec-eval
      - id: desktop-exec-pipe-to-shell

  - id: desktop-exec-decode-stage
    desc: Exec decodes a staged payload
    crit: suspicious
    conf: 0.95
    any:
      - id: desktop-exec-base64-decode
      - id: desktop-exec-xxd-decode
      - id: desktop-exec-openssl-decrypt

  - id: desktop-exec-drop-path
    desc: Exec stages into writable dir
    crit: suspicious
    conf: 0.85
    any:
      - id: desktop-exec-tmp-path
      - id: desktop-exec-dev-shm-path

  - id: desktop-exec-download-tool
    desc: Exec uses a network download tool
    crit: suspicious
    conf: 0.9
    any:
      - id: desktop-exec-curl
      - id: desktop-exec-wget

  - id: desktop-exec-chmod
    desc: Exec sets an executable bit
    crit: suspicious
    conf: 0.9
    any:
      - id: desktop-exec-chmod-exec
      - id: desktop-exec-chmod-octal

  - id: desktop-exec-dropper-chain
    desc: Exec assembles a decode-execute chain
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: desktop-exec-decode-stage
      - id: desktop-exec-chmod
      - id: desktop-exec-drop-path
      - id: desktop-exec-download-tool
      - id: desktop-exec-random-path

  - id: desktop-exec-noisy-shell
    desc: Exec hides noise with & and 2>/dev/null
    crit: suspicious
    conf: 0.8
    all:
      - id: desktop-exec-backgrounded
      - id: desktop-exec-silent

  - id: desktop-exec-obfuscated-shell
    desc: Exec uses obfuscated shell invocation
    crit: suspicious
    conf: 0.9
    all:
      - id: desktop-exec-shell-c
    any:
      - id: desktop-exec-decode-stage
      - id: desktop-exec-dynamic-eval
      - id: desktop-exec-subshells
      - id: desktop-exec-long
      - id: desktop-exec-noisy-shell
