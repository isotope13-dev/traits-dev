defaults:
  platforms: [unix, windows, macos]
  mbc: B0032
composite_rules:
  - id: wscript-xor-dynamic-function-stage
    desc: WScript XOR-obfuscated dynamic Function stage
    crit: hostile
    conf: 0.97
    attack: T1027,T1059.007
    mbc: B0032.001
    platforms: [windows]
    for: [javascript]
    all:
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-createobject-dup
      - id: micro-behaviors/data/encode/xor::js-xor-decoder-ast
      - id: micro-behaviors/process/interpreter/eval::js-new-function-variable-argument
  - id: suspicious-new-function-iife
    desc: Immediate invocation of new Function
    crit: suspicious
    conf: 0.9
    attack: T1027
    all:
      - id: micro-behaviors/data/source/dynamic/eval::new-function-iife
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/library/structure/
        - id: metadata/library/runtime/
    unless:
      - id: micro-behaviors/data/source/dynamic/eval::new-function-return-this
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: micro-behaviors/os/module/load::dynamic-import-function-constructor
      - id: well-known/app/google-web::google-platform-js-asset
