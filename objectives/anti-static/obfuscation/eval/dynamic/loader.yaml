defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [binaries, scripts, source]
traits:
  - id: env-atob-decode
    desc: Usage of atob to decode environment variables
    crit: notable
    conf: 1.0
    for:
      - javascript
      - typescript
    if:
      type: raw
      substr: atob(process.env.
  - id: axios-get
    desc: Axios GET request
    crit: notable
    conf: 1.0
    for:
      - javascript
      - typescript
    if:
      type: raw
      substr: axios.get
  - id: export-iife-closure
    desc: Trailing IIFE closure indicating auto-execution
    crit: baseline
    conf: 0.85
    for:
      - javascript
      - typescript
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: raw
      regex: \}\)\(\)\s*;?\s*$
  - id: data-dot-cookie-extract
    desc: Extracts .data.cookie from HTTP response
    crit: notable
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: raw
      substr: .data.cookie
composite_rules:
  - id: suspicious-env-atob-axios
    desc: Decoding environment variables with atob for network use
    crit: hostile
    conf: 0.95
    for:
      - javascript
      - typescript
    all:
      - id: env-atob-decode
      - id: axios-get
    any:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor
      - id: micro-behaviors/data/source/dynamic/eval::new-function-iife
  - id: iife-remote-eval
    desc: IIFE fetches remote code and evaluates it
    crit: hostile
    conf: 0.95
    for:
      - javascript
      - typescript
    all:
      - id: export-iife-closure
      - id: axios-get
    any:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor
