defaults:
  platforms: [windows, unix]
  for: [binaries, scripts, source]
traits:
  - id: env-atob-decode
    desc: Usage of atob to decode environment variables
    crit: suspicious
    conf: 1.0
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: atob(process.env.
  - id: export-iife-closure
    desc: "Trailing IIFE closure indicating auto-exec"
    crit: component
    conf: 0.85
    for:
      - javascript
      - typescript
    unless:
      - id: metadata/package/testing/harness/runtime/
    if:
      type: text
      regex: \}\)\(\)\s*;?\s*$
  - id: data-dot-cookie-extract
    desc: Extracts .data.cookie from HTTP response
    crit: component
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      substr: .data.cookie
    unless:
      - id: metadata/package/testing/harness/runtime/
  # A named field pulled off an HTTP `.data` response object. Benign on its own
  # (res.data.token is everywhere), so component-only — meaningful only when the
  # extracted field is fed to a dynamic-code evaluator nearby (composite below).
  - id: response-data-field-ref
    desc: Named field extracted from HTTP response
    crit: component
    conf: 0.85
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: '\.data\.([Cc]ookie|payload|script|code)\b'
composite_rules:
  - id: response-cookie-remote-eval
    desc: HTTP response cookie field passed to code evaluator
    crit: hostile
    conf: 0.94
    for:
      - javascript
      - typescript
    near_lines: 6
    all:
      - id: data-dot-cookie-extract
    any:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
  # Remote-response field passed to a dynamic-code evaluator: generalizes the
  # .cookie-specific loader to any field name (.token/.payload/.script/…) while
  # staying FP-safe by requiring the Function-constructor eval in proximity.
  - id: response-field-remote-eval
    desc: HTTP response field passed to code evaluator
    crit: hostile
    conf: 0.93
    for:
      - javascript
      - typescript
    near_lines: 6
    all:
      - id: response-data-field-ref
    any:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
  - id: suspicious-env-atob-axios
    desc: Decoding environment variables with atob for network use
    crit: hostile
    conf: 0.95
    for:
      - javascript
      - typescript
    all:
      - id: env-atob-decode
      - id: micro-behaviors/communications/http/get::axios-get-call
    any:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
      - id: micro-behaviors/process/interpreter/eval::js-new-function-constructor
      - id: micro-behaviors/data/source/dynamic/eval::new-function-iife
  - id: iife-remote-eval
    desc: IIFE fetches remote code and evaluates it
    crit: hostile
    conf: 0.95
    for:
      - javascript
      - typescript
    size_max: 262144
    near_lines: 80
    all:
      - id: export-iife-closure
      - id: micro-behaviors/communications/http/get::axios-get-call
    any:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
      - id: micro-behaviors/process/interpreter/eval::js-new-function-constructor
