defaults:
  platforms: [windows, unix]
traits:
- id: eval-unescape
  desc: "JScript eval(unescape(...)) pattern"
  crit: suspicious
  conf: 0.95
  for: [javascript]
  attack: "T1027"
  if:
    type: text
    regex: 'eval\s*\(\s*unescape\s*\('
  unless:
  - type: text
    substr: 'var parts = option.split("=");'
- id: html-atob-document-write
  desc: HTML atob self-decoding loader
  crit: suspicious
  conf: 0.97
  for: [html, javascript]
  attack: "T1027"
  if:
    type: text
    regex: document\.write\s*\(\s*decodeURIComponent\s*\(\s*escape\s*\(\s*atob\s*\(
- id: html-large-atob-loader
  desc: Large atob blob embedded in HTML loader
  crit: suspicious
  conf: 0.92
  for: [html, javascript]
  attack: "T1027"
  if:
    type: text
    regex: atob\(['\"][A-Za-z0-9+/=]{400,}
  not:
  - substr: "AGFzbQEAAAAB"
  - substr: "T1RUTwALAIAAAwAwQ0ZG"
composite_rules:
- id: html-atob-self-decoding-loader
  desc: HTML self-decoding atob document writer
  crit: suspicious
  conf: 0.98
  all:
  - id: html-atob-document-write
  - id: html-large-atob-loader
