defaults:
  platforms: [windows, unix]

traits:
  - id: eval-unescape
    desc: "JavaScript eval(unescape(...)) outside comments"
    crit: suspicious
    conf: 0.95
    for: [javascript]
    attack: "T1027"
    if:
      type: text
      regex: '(?m)^[ \t]*(?!//|/\*|\*).{0,500}\beval\s*\(\s*unescape\s*\('
    unless:
      - type: text
        substr: 'var parts = option.split("=");'

  - id: html-atob-document-write
    desc: HTML atob self-decoding loader
    crit: suspicious
    conf: 0.97
    for: [html, javascript]
    attack: "T1027"
    if:
      type: text
      regex: document\.write\s*\(\s*decodeURIComponent\s*\(\s*escape\s*\(\s*atob\s*\(

composite_rules:
  - id: html-atob-self-decoding-loader
    desc: HTML self-decoding atob document writer
    crit: suspicious
    conf: 0.98
    all:
      - id: html-atob-document-write
      - id: micro-behaviors/data/decode/base64::large-base64-atob-decode
