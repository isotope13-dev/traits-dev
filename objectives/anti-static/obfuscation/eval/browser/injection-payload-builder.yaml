# Obfuscated browser redirect/script-injection payload builder.
#
# Component of an obfuscator.io-protected offensive webmail toolkit. This module
# generates the malicious browser payloads delivered by the mailer: it emits
# layered indirect-eval scripts (`(0,eval)(atob(atob(...)))`, XOR/hex decoders,
# CryptoJS AES-decrypt-then-eval), injects them before head/body end, rewrites
# inline scripts, and redirects the victim via head-script / autoplay / onerror
# handlers. It carries "ADVANCED_{SCRIPTER,OBFUSCATE,ENCRYPT}_PRESETS" preset
# banks. These identifiers are attack-context-specific fragments of that toolkit;
# convicts only when several co-occur inside obfuscator.io-obfuscated code.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032

traits:
  - id: advanced-obfuscate-presets
    desc: ADVANCED_OBFUSCATE_PRESETS payload bank
    crit: component
    conf: 0.8
    if:
      type: text
      substr: ADVANCED_OBFUSCATE_PRESETS
  - id: advanced-encrypt-presets
    desc: ADVANCED_ENCRYPT_PRESETS payload bank
    crit: component
    conf: 0.8
    if:
      type: text
      substr: ADVANCED_ENCRYPT_PRESETS
  - id: advanced-scripter-presets
    desc: ADVANCED_SCRIPTER_PRESETS payload bank
    crit: component
    conf: 0.8
    if:
      type: text
      substr: ADVANCED_SCRIPTER_PRESETS
  - id: rewrite-inline-scripts
    desc: rewriteInlineScripts HTML script rewriter
    crit: component
    conf: 0.8
    if:
      type: text
      substr: rewriteInlineScripts
  - id: redirect-head-script
    desc: redirectHeadScript victim redirect injector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: redirectHeadScript
  - id: insert-before-head-end
    desc: insertBeforeHeadEnd HTML script injector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: insertBeforeHeadEnd

composite_rules:
  - id: browser-injection-payload-api
    desc: Private browser redirect/script-injection builder API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: advanced-obfuscate-presets
      - id: advanced-encrypt-presets
      - id: advanced-scripter-presets
      - id: rewrite-inline-scripts
      - id: redirect-head-script
      - id: insert-before-head-end
  - id: obfuscated-browser-injection-payload-builder
    desc: Obfuscated browser redirect/injection payload builder
    crit: hostile
    conf: 0.95
    all:
      - id: browser-injection-payload-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
