# Python Packer/Loader Obfuscation Patterns
# Detects multi-stage Python obfuscation: base85/zlib/compile/exec chains,
# heavy crypto imports in small scripts, and other packer indicators.
# Covers techniques used by PyOBFUSCATE, ShadowCoil packer, VIPERTUNNEL loader.
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1027

traits:
  - id: blake3-import
    desc: blake3 hash library import
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: blake3

  - id: chacha20-import
    desc: ChaCha20 cipher import
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: ChaCha20.new

  - id: hkdf-import
    desc: HKDF key derivation import
    crit: notable
    conf: 0.88
    if:
      type: symbol
      exact: HKDF
  - id: cpython-libclinic-context
    desc: CPython libclinic generator context
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "from libclinic"
  - id: cpython-pegen-context
    desc: CPython pegen generator context
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: "PythonParserGenerator"

  - id: mode-gcm-ref
    desc: AES MODE_GCM cipher mode reference
    crit: component
    conf: 0.85
    if:
      type: text
      substr: MODE_GCM

  - id: mode-ctr-ref
    desc: AES MODE_CTR cipher mode reference
    crit: component
    conf: 0.85
    if:
      type: text
      substr: MODE_CTR

  # Metrics-based: high import density in small script = packer stub
  - id: high-import-density
    desc: High import density in small script
    crit: component
    conf: 0.8
    size_max: 10240
    if:
      type: metrics
      field: text.import_density
      min: 30.0

  - id: many-imports-few-lines
    desc: Many imports relative to code size
    crit: component
    conf: 0.75
    size_max: 10240
    if:
      type: metrics
      field: imports.total
      min: 10

  - id: cpython-run-startup
    desc: CPython startup audit hook
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "cpython.run_startup"

composite_rules:
  - id: heavy-crypto-packer
    desc: Heavy crypto imports in Python packer
    crit: suspicious
    conf: 0.93
    size_max: 20480
    all:
      - id: micro-behaviors/data/encode/base85::b85decode-script
    any:
      - id: blake3-import
      - id: chacha20-import
      - id: hkdf-import
      - id: micro-behaviors/crypto/kdf/operations::key-derivation
      - id: mode-gcm-ref
      - id: mode-ctr-ref

  - id: b85-zlib-exec-packer
    desc: Base85+zlib+exec Python unpacker chain
    crit: suspicious
    conf: 0.94
    size_max: 32768
    all:
      - id: micro-behaviors/data/encode/base85::b85decode-script
      - id: micro-behaviors/data/compress/library::zlib-decompress
      - id: micro-behaviors/process/interpreter/python::exec-builtin

  - id: import-heavy-packer-stub
    desc: Import-heavy packer stub with exec
    crit: suspicious
    conf: 0.9
    size_max: 10240
    unless:
      - id: cpython-run-startup
      - id: metadata/package/testing/presence::python-test-file
      - id: metadata/package/testing/presence::test-directory
      - id: cpython-libclinic-context
      - id: cpython-pegen-context
      - id: objectives/persistence/login/python-startup::pythonstartup-env
      - id: metadata/library/runtime::shiboken-embedded-support-loader
    all:
      - id: high-import-density
      - id: many-imports-few-lines
      - id: micro-behaviors/process/interpreter/python::exec-builtin

  - id: multi-layer-python-packer
    desc: Multi-layer Python packer with crypto
    crit: hostile
    conf: 0.97
    size_max: 65536
    all:
      - id: micro-behaviors/data/encode/base85::b85decode-script
      - id: micro-behaviors/process/interpreter/python::exec-builtin
    any:
      - id: blake3-import
      - id: chacha20-import
      - id: hkdf-import
      - id: micro-behaviors/crypto/kdf/operations::key-derivation
      - id: objectives/anti-static/obfuscation/eval::compile-synthetic-filename
    needs: 2

  - id: compile-exec-decompress
    desc: Compile+exec with decompression payload
    crit: hostile
    conf: 0.96
    size_max: 65536
    all:
      - id: micro-behaviors/process/interpreter/python::compile-builtin
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: micro-behaviors/data/compress/library::zlib-decompress
    any:
      - id: micro-behaviors/data/encode/base85::b85decode-script
      - id: micro-behaviors/data/decode/base64::b64decode-call
