# Function Constructor Usage Detection
# Combines local atoms with obfuscation patterns
defaults:
  for: [javascript]
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: function-constructors
    desc: Function constructor usage
    crit: notable
    conf: 0.6
    any:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor
      - id: micro-behaviors/process/interpreter/vm::function-constructor-access
      - id: micro-behaviors/process/interpreter/vm::function-direct-call
      - id: objectives/execution/interpreter/eval/dynamic::function-constructor-from-typeof
