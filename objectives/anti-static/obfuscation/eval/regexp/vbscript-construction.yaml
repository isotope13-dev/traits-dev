defaults:
  platforms: [unix, windows]
traits:
  - id: vbscript-regexp-construction
    desc: Detects fragmented VBScript.RegExp string construction
    crit: suspicious
    for: [javascript]
    if:
      type: text
      regex: '("VBS"|''VBS'')\s*\+\s*("cript"|''cript'')\s*\+\s*("\.RegE"|''\.RegE'')'
