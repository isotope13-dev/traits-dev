defaults:
  platforms: [unix, windows]
  for: [binaries]
  attack: T1027
  mbc: B0032
composite_rules:
  - id: packed-exec-versioned-managed-marker
    desc: Versioned managed bundle marker
    crit: component
    conf: 0.9
    any:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: packed-binary-process-execution
    desc: Packed binary process execution
    crit: notable
    conf: 0.9
    size_max: 52428800
    all:
      - id: packed-binary-marker
      - id: binary-process-execution
    unless:
      - id: objectives/anti-static/obfuscation/eval/loader/
      - id: well-known/game/steam/
      - id: well-known/tool/development/qemu
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/eval/loader/
        - id: well-known/app/drivers/
  - id: packed-temp-staging-resource-payload
    desc: Packed temp-staging resource payload
    crit: suspicious
    conf: 0.9
    size_max: 52428800
    all:
      - id: packed-binary-marker
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
    any:
      - id: micro-behaviors/data/encode/payload::payload-blob-metrics
      - id: objectives/anti-static/obfuscation/payload/resource::large-icon-resource
      - id: micro-behaviors/process/create/shell/spawn::win-shellexecute
      - id: micro-behaviors/process/terminate/kill::terminate-process
    unless:
      - id: objectives/anti-static/obfuscation/eval/loader/
      - id: objectives/anti-static/obfuscation/eval/loader/
      - id: well-known/game/steam/
      - id: well-known/tool/development/qemu
  - id: packed-binary-marker
    desc: Packed binary marker
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/data/embedded/payload/packer::nuitka-packer
      - id: objectives/anti-static/pack/
  - id: packed-process-recognized-marker
    desc: Recognized packed binary process execution marker
    crit: component
    conf: 0.9
    any:
      - id: metadata/binary/section/names::upx-section
      - id: metadata/binary/installer/family::known-benign-installer
      - id: well-known/app/crayens::crayens-installer
      - id: well-known/app/dlink-wlan::dlink-wlan-application
      - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
      - id: well-known/app/internet-explorer::internet-explorer-frame-component
      - id: well-known/lib/mozilla-nspr::nspr-library
      - id: objectives/anti-static/pack/asprotect::asprotect-protector-application
      - id: well-known/app/protected-benign-pe/
      - id: metadata/library/data::pybind11-marker
      - id: well-known/tool/reverse-engineering/
      - id: well-known/lib/easyhook::easyhook-library
      - id: micro-behaviors/os/service/config::printer-setup-helper
      - id: well-known/app/belkin-local-backup::belkin-local-backup
      - id: metadata/binary/installer/sfx::freearc-sfx
      - id: well-known/app/atlantis::atlantis-word-processor-installer
      - id: metadata/library/runtime::jabswitch-cli-banner
      - id: metadata/binary/layout::import-rich-versioned-pe
      - id: metadata/binary/framework::dotnet-assembly
      - id: well-known/tool/sysadmin/container/
      - id: well-known/lib/jvm
      - id: well-known/lib/jruby::jffi-native-basename
      - id: metadata/binary/linking/runtime::dotnet-host-runtime
      - id: well-known/app/ventoy::ventoy-imdisk-helper
      - id: metadata/binary/linking/runtime::ape-binary-marker
      - id: well-known/app/mcu-ai-debug::helper-binary
      - id: well-known/app/plutolang::runtime-compiler
      - id: well-known/lib/sharp-libvips/
  - id: binary-process-execution
    desc: Binary process execution capability
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/process/create/direct/
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/process/create/hcom/
    unless:
      - id: metadata/library/automation/
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/eval/loader/
