# A custom string-table decoder feeding a Function constructor is especially
# dangerous when the same package detaches the execution from its importer.
# Keep this archive-level rule independent of any particular URL or token.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1027.002
  mbc: B0032

composite_rules:
  - id: detached-obfuscated-function-loader
    desc: Detached process runs a custom-decoded Function payload
    crit: hostile
    conf: 0.98
    attack: "T1027.002,T1059.007,T1059"
    scope: archive
    all:
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling-with-string-table-rotation
      - id: micro-behaviors/process/interpreter/eval::js-new-function-constructor
