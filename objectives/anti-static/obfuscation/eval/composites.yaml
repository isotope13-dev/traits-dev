defaults:
  platforms: [unix, windows, macos]
  mbc: B0032
composite_rules:
  - id: suspicious-new-function-iife
    desc: "Immediate invocation of new Function (dynamic execution)"
    crit: notable
    conf: 0.9
    attack: T1027
    all:
      - id: micro-behaviors/data/source/dynamic/eval::new-function-iife
    downgrade:
      any:
        - id: metadata/dev/testing/
        - id: metadata/quality/testing/
        - id: metadata/library/structure/
        - id: metadata/library::generic-rxjs

  - id: base64-decode-require-exec
    desc: Base64 decode into require-enabled Function constructor
    crit: suspicious
    conf: 0.95
    attack: T1059.007
    for: [javascript, typescript]
    all:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
      - id: micro-behaviors/data/decode/base64::buffer-from-base64

  - id: shift-cipher-require-exec
    desc: Shift cipher decode into require-enabled Function (embedded payload)
    crit: hostile
    conf: 0.97
    attack: T1059.007
    for: [javascript, typescript]
    all:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
      - id: micro-behaviors/data/encode/caesar::charcodeat-shift
      - id: micro-behaviors/data/encode/caesar::fromcharcode-map-decode
