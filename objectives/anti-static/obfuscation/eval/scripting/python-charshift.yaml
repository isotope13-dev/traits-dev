# Python Character Shift String Obfuscation
# Detects chr(ord(c) +/- N) patterns used to encode/decode strings
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: E1027
traits:
  - id: python-chr-ord-shift
    desc: String built via chr(ord()) arithmetic
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '\.join\(.{0,40}chr\(ord\('
  - id: python-chr-ord-reverse-shift
    desc: Reversed string decoded via chr(ord())
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'chr\(ord\(.{0,20}\[::\s*-1\]'
composite_rules: []
