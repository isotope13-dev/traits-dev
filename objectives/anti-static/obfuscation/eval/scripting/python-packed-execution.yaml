defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1027
  mbc: B0032
composite_rules:
  - id: python-packed-or-obfuscated
    desc: Python packer or obfuscator signal
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/library/runtime::python-bundler-exporter-template
    any:
      - id: objectives/anti-static/obfuscation/tools/signature::known-obfuscator-detected
      - id: objectives/anti-static/obfuscation/tools/signature::python-obfuscation-suite
      - id: objectives/anti-static/pack/runtime::exec-marshal-zlib
      - id: objectives/anti-static/pack/runtime::python-zeta-obfuscator
      - id: objectives/anti-static/obfuscation/eval/
      - id: objectives/anti-static/obfuscation/payload/encoded::python-packed-payload
      - id: objectives/anti-static/obfuscation/payload/encoded::exec-decompress-payload
      - id: objectives/anti-static/obfuscation/payload/encoded::compile-exec-dunder-import
      - id: objectives/anti-static/obfuscation/multi-layer::hostile-python-loader
      - id: objectives/anti-static/obfuscation/multi-layer::multi-form-obfuscation-density
  - id: python-packed-dynamic-exec
    desc: Packed Python dynamic execution
    crit: hostile
    conf: 0.97
    all:
      - id: python-packed-or-obfuscated
      - id: objectives/execution/interpreter/eval/invoke::python-eval
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/library/runtime::python-bundled-modules-loader
      - id: metadata/library/runtime::python-bundler-exporter-template
  - id: python-packed-subprocess
    desc: Packed Python subprocess execution
    crit: hostile
    conf: 0.96
    all:
      - id: python-packed-or-obfuscated
      - id: micro-behaviors/process/create/subprocess::process-execution
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/library/runtime::python-bundled-modules-loader
      - id: metadata/library/runtime::python-bundler-exporter-template
