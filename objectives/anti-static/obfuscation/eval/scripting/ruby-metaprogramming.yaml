defaults:
  platforms:
    - unix
    - windows
  for:
    - ruby
  mbc: B0032
  attack: T1027
traits:
  - id: marshal-load-dup
    desc: Marshal deserialization (RCE risk)
    crit: suspicious
    conf: 0.93
    attack: T1059 - ruby
    if:
      type: string_literal
      regex: Marshal\.load|Marshal\.restore
    unless:
      - id: metadata/package/testing/presence/harness::spec-path-basename
      - id: metadata/package/testing/presence/harness::ruby-spec-file
      - id: metadata/package/testing/presence/harness::ruby-spec-helper-file
  - id: yaml-unsafe-load-dup
    desc: YAML unsafe deserialization
    crit: suspicious
    conf: 0.9
    attack: T1059 - ruby
    unless:
      - id: metadata/package/files/dependency::ruby-vendor-bundle-gem-path
      - id: metadata/package/testing/presence/harness::ruby-test-file
      - type: basename
        regex: '(^|_)spec\.rb$|_spec\.rb$'
      - type: basename
        regex: '\.gemspec$'
      - type: text
        substr: "module RuboCop"
      - id: well-known/app/homebrew::source-tree
    if:
      type: string_literal
      regex: YAML\.load
  - id: reflection-send
    desc: Dynamic method invocation
    crit: suspicious
    conf: 0.85
    attack: T1027 - ruby
    count_min: 7
    unless:
      - id: metadata/package/testing/presence/harness::ruby-test-file
      - type: basename
        regex: '(^|_)spec\.rb$|_spec\.rb$'
      - id: well-known/lib/jruby::archive-basename
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::embedded-runtime-path
      - id: well-known/lib/jruby::jruby-home-path
      - id: well-known/lib/jruby::module-marker
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::stdlib-archive-marker
    if:
      type: string_literal
      regex: '\.send\s*\(|__send__\s*\('
  - id: const-get
    desc: Dynamic constant access
    crit: notable
    conf: 0.9
    attack: T1027 - ruby
    if:
      type: string_literal
      substr: const_get
  - id: const-set
    desc: Dynamic constant definition
    crit: notable
    conf: 0.9
    attack: T1027 - ruby
    if:
      type: string_literal
      substr: const_set
  - id: define-method
    desc: Dynamic method definition
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      substr: define_method
    unless:
      - id: well-known/lib/aws-sdk-ruby
      - id: well-known/lib/active-support::module
  - id: ruby-dense-chr-calls
    desc: Dense chr() calls (string building)
    crit: suspicious
    conf: 0.9
    count_min: 15
    per_kb_min: 3.0
    if:
      type: text
      regex: \b\d+\.chr\b
    unless:
      - type: string_literal
        regex: IRB
  - id: dense-metaprogramming
    desc: Dense metaprogramming eval
    crit: suspicious
    conf: 0.85
    count_min: 10
    per_kb_min: 2.0
    if:
      type: text
      regex: (instance_eval|class_eval|module_eval)\s*[({]
    unless:
      - type: string_literal
        regex: IRB
  - id: dense-interpolation
    desc: Dense string interpolation
    crit: suspicious
    conf: 0.75
    count_min: 50
    per_kb_min: 8.0
    if:
      # First interior char must not be `_`, so autoload/require path tables
      # built from Ruby builtins (`#{__dir__}`, `#{__FILE__}`) are not counted
      # as obfuscation. Genuine payload-assembly interpolations name vars or
      # single chars (non-underscore) and still match.
      type: text
      regex: '#\{[A-Za-z$][0-9A-Za-z_$]{0,7}\}'
    unless:
      - id: metadata/package/testing/presence/harness::ruby-test-file
      - id: metadata/package/testing/presence/harness::ruby-spec-file
      - id: metadata/package/testing/presence/harness::spec-path-basename
      - id: well-known/lib/specinfra/
      - id: metadata/package/files/dependency::ruby-vendor-bundle-gem-path
      - type: text
        substr: "module CodeRay"
      - type: text
        substr: "pubspec.lock"
      - id: well-known/tool/offensive/pwn/
      - id: well-known/app/homebrew::source-tree
composite_rules: []
