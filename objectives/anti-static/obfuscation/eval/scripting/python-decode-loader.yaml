defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1027
  mbc: B0032
traits:
  - id: python-single-line-file
    desc: Python file is one line
    crit: component
    conf: 0.9
    size_min: 512
    if:
      type: metrics
      field: text.total_lines
      max: 1
  - id: python-base16-decode
    desc: Python base16 decoder
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: base64.b16decode
    unless:
      - id: well-known/lib/psutil/
  - id: python-base32-decode
    desc: Python base32 decoder
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: base64.b32decode
  - id: python-ascii85-decode
    desc: Python ascii85 decoder
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: base64.a85decode
  - id: python-urlsafe-base64-decode
    desc: Python urlsafe base64 decoder
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: base64.urlsafe_b64decode
  - id: python-standard-base64-decode
    desc: Python standard base64 decoder
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: base64.standard_b64decode
composite_rules:
  - id: python-single-line-dynamic-exec
    desc: One-line Python dynamic execution
    crit: suspicious
    conf: 0.9
    all:
      - id: python-single-line-file
      - id: objectives/anti-static/obfuscation/code-metrics/structure::single-long-line-outlier
      - id: objectives/execution/interpreter/eval/invoke::python-eval
  - id: python-single-line-subprocess
    desc: One-line Python subprocess execution
    crit: suspicious
    conf: 0.9
    # Embedded project files can contain several unrelated Python templates.
    # Require the line-shape evidence and the subprocess call to describe the
    # same local snippet instead of correlating distant embedded templates.
    near_bytes: 1024
    all:
      - id: python-single-line-file
      - id: objectives/anti-static/obfuscation/code-metrics/structure::single-long-line-outlier
      - id: micro-behaviors/process/create/subprocess::process-execution
    unless:
      - id: metadata/package/quality/recognized-contexts-extra::hashed-text-record
  - id: python-single-line-decoder
    desc: One-line Python decoder
    crit: suspicious
    conf: 0.9
    all:
      - id: python-single-line-file
      - id: objectives/anti-static/obfuscation/code-metrics/structure::single-long-line-outlier
      - id: python-loader-decode-or-decrypt
  - id: python-loader-decode-or-decrypt
    desc: Python payload decode or decrypt
    # A bare decode/decrypt call is a neutral capability, not suspicious on its
    # own. It rises to a threat only via the eval/single-long-line loader
    # composites that consume it (python-single-line-decoder,
    # python-decode-decrypt-dynamic-exec).
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/data/decode/base64::base64-decoding
      - id: python-base16-decode
      - id: python-base32-decode
      - id: python-ascii85-decode
      - id: python-urlsafe-base64-decode
      - id: python-standard-base64-decode
      - id: micro-behaviors/data/decode/base58
      - id: micro-behaviors/data/decode/uu
    unless:
      - id: objectives/anti-static/obfuscation/eval/scripting/
  - id: python-loader-decode-recognized-marker
    desc: Python decoder recognized marker
    crit: baseline
    conf: 0.9
    any:
      - id: micro-behaviors/crypto/library/blockchain/client::crypto-exchange-sdk-benign-context
      - id: micro-behaviors/data/encode/base85
      - id: micro-behaviors/data/decode/hex::python-fromhex
      - id: objectives/anti-static/obfuscation/string/encoding::bytes-fromhex-call
      - id: micro-behaviors/data/compress/library::bz2-decompress-call
      - id: micro-behaviors/data/compress/library::zlib-decompress
      - id: micro-behaviors/data/serialize/unsafe::marshal-loads
      - id: micro-behaviors/data/encode/xor/
      - id: micro-behaviors/crypto/symmetric/fernet::decrypt
  - id: python-decode-decrypt-dynamic-exec
    desc: Python decodes and executes payload
    crit: suspicious
    conf: 0.98
    # Keep the decoder and the dynamic execution in the same small source
    # construct.  A file-wide/80-line correlation treats documentation and
    # generated-code examples (for example a loader's own API docs) as a
    # decoded payload.
    near_bytes: 512
    near_lines: 80
    all:
      - id: objectives/execution/interpreter/eval/invoke::python-eval
      - id: python-loader-decode-or-decrypt
    unless:
      - id: metadata/library/python-stdlib
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness/
      - id: metadata/library/runtime/
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/tool/detection/
      - id: well-known/app/skypilot::skypilot-source-file
      - id: well-known/app/ungoogled-chromium::ungoogled-chromium-patch-validator
