defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: python-getattr-oct-hex-obfuscation
    desc: Obfuscated 'chr' construction via getattr/oct/hex
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: 'getattr\s*\(\s*(__builtins__|builtins)\s*,\s*oct\.__str__\(\)'
