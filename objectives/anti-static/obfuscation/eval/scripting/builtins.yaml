defaults:
  attack: T1027
  mbc: E1014
  platforms:
    - unix
    - windows
  for: [python]
traits:
  - id: builtins-string-builder
    desc: Python obfuscation using builtins to construct strings
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: getattr\(__builtins__,\s*[a-z]{3,12}\.__str__
  - id: dict-subscript-access
    desc: __dict__ access with dunder string key
    crit: notable
    conf: 0.9
    if:
      type: tree-sitter
      query: "(subscript\n  value: (attribute\n    attribute: (identifier) @attr)\n  subscript: (string\n    (string_content) @key)\n  (#eq? @attr \"__dict__\")\n  (#match? @key \"^__(builtins|globals|import|loader|spec|class|bases|mro|subclasses|code|closure)__$\"))\n"
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
  - id: getattribute-call
    desc: __getattribute__ with computed attribute name
    crit: suspicious
    conf: 0.9
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '\.__getattribute__$'
    not:
      - regex: object\\.__getattribute__\\(self,\\s*self\\.ALIAS\\[
