defaults:
  attack: T1027
  mbc: E1014
  platforms:
    - unix
    - windows
  for: [python]
traits:
  - id: builtins-string-builder
    desc: 'builtins string builder'
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: getattr\(__builtins__,\s*[a-z]{3,12}\.__str__
  - id: dict-subscript-access
    desc: __dict__ access with dunder string key
    crit: notable
    conf: 0.9
    # `X.__dict__["__builtins__"|"__globals__"|…]` — reflective dunder lookup
    # through `__dict__` toward the eval/sandbox-escape surface. Restricted to
    # the dangerous dunders: matching ANY `__…__` key also caught benign
    # introspection/assignment such as `module.__dict__["__file__"] = …` (the
    # Bokeh/Panel dynamic-module pattern), `__name__`, `__doc__`.
    if:
      type: text
      regex: '__dict__\s*\[\s*[''"](__builtins__|__globals__|__import__|__subclasses__)'
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness/
