defaults:
  platforms: [windows, unix]
  for:
  - python
  attack: T1195.001
  mbc: E1014
traits:
- id: platform-name-check
  desc: Platform detection via os.name
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: from\s+os\s+import\s+name|import\s+os.{0,50}\bos\.name
- id: b64decode-exec-pattern-dup
  desc: Base64 decode with exec execution
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: exec\s*\(\s*b64decode\s*\(|exec\(\s*\w*.{0,20}decode\(
  unless:
  - id: metadata/library/versioneer::embedded-source-wrapper
- id: you-got-me-comment
  desc: You got me comment (obfuscation marker)
  crit: suspicious
  conf: 0.75
  if:
    type: string_literal
    regex: You\\s+got\\s+me\\s+bro
    case_insensitive: true
- id: setup-call-after-code
  desc: setup() call followed by other code
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: setup\([^)]{0,120}\)\s*.{20,500}(exec|eval|__import__|compile)
- id: conditional-exec-context
  desc: Conditional execution context (argv, os.name)
  crit: component
  conf: 0.85
  size_max: 32000
  if:
    type: text
    regex: sdist.{0,40}argv|(os\.name|name)\s*==\s*['"]nt['"]
- id: conditional-exec-compile
  desc: compile wrapped by eval or exec
  crit: component
  conf: 0.85
  if:
    type: text
    regex: \b(eval|exec)\s*\(\s*compile\s*\(
- id: post-setup-import-os-sys
  desc: setup() followed by os/sys import context
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: setup\s*\([^\)]{0,120}\).{0,250}(from|import)\s+(os|sys)
- id: post-setup-import-base64-subprocess
  desc: "setup() followed by b64/subprocess import"
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: setup\s*\([^\)]{0,120}\).{0,250}(from|import)\s+(base64|subprocess)
- id: tempfile-write-exec
  desc: Write to tempfile then execute
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: tempfile\.(NamedTemporaryFile|mkstemp).{0,80}write.{0,80}(exec|exe)
- id: exec-alias-in-payload
  desc: exec aliased in payload string
  crit: suspicious
  conf: 0.9
  attack: T1027
  if:
    type: string_literal
    regex: \w+=exec;\s*\w+\(
- id: pythonw-exe-replace-trick
  desc: 'Python EXE silenced via .replace for pythonw'
  crit: suspicious
  conf: 0.95
  attack: T1059.006
  if:
    type: text
    regex: \.replace\(['"]\.exe['"],\s*['"]w\.exe['"]\)
- id: large-b64-string-binary--cmltcg9ydcbvcw
  desc: Large base64 string with binary (CmltcG9ydCBvcw)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: CmltcG9ydCBvcw
- id: large-b64-string-binary--cmltcg9ydcbzexm
  desc: Large base64 string with (CmltcG9ydCBzeXM)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: CmltcG9ydCBzeXM
- id: large-b64-string-binary--cmltcg9ydcb0zw1wzmlszq
  desc: Large base64 string (CmltcG9ydCB0ZW1wZmlsZQ)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: CmltcG9ydCB0ZW1wZmlsZQ
composite_rules:
- id: large-b64-string-binary
  desc: Large base64 string with binary MZ header
  crit: suspicious
  conf: 0.95
  unless:
  - id: metadata/library/versioneer::embedded-source-wrapper
  any:
  - id: large-b64-string-binary--cmltcg9ydcbvcw
  - id: large-b64-string-binary--cmltcg9ydcbzexm
  - id: large-b64-string-binary--cmltcg9ydcb0zw1wzmlszq
- id: conditional-exec-check
  desc: Conditional execution check (argv, environ)
  crit: suspicious
  conf: 0.85
  all:
  - id: metadata/package/files::setup-py-basename
  - id: conditional-exec-context
  - id: conditional-exec-primitive
  unless:
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/testing/harness/unit::python-stdlib-test-support
- id: post-setup-execution
  desc: Code execution after setup() call
  crit: suspicious
  conf: 0.8
  all:
  - id: post-setup-import-context
  - id: conditional-exec-primitive
  unless:
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/testing/harness/unit::python-stdlib-test-support
- id: conditional-exec-primitive
  desc: Dynamic execution primitive
  crit: suspicious
  conf: 0.85
  any:
  - id: micro-behaviors/process/create/shell/bridge::js-exec
  - id: conditional-exec-compile
  unless:
  - id: micro-behaviors/crypto/library/blockchain::crypto-exchange-sdk-benign-context
  - id: micro-behaviors/process/interpreter/python::dunder-import-call
  - id: micro-behaviors/process/create/system::python-os-system
- id: post-setup-import-context
  desc: setup() followed by import context
  crit: suspicious
  conf: 0.8
  any:
  - id: post-setup-import-os-sys
  - id: post-setup-import-base64-subprocess
- id: setup-py-post-install-trojan
  desc: Setup.py with post-install code execution
  crit: suspicious
  conf: 0.92
  mbc: E1014 - python
  all:
  - id: objectives/anti-static/obfuscation/eval/scripting::b64decode-exec-pattern-dup
  - id: platform-name-check
  - id: conditional-exec-check
