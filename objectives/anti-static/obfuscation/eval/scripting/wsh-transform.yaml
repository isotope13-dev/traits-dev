# WSH (VBScript/HTA) payload reconstructed at runtime and executed. Malware
# stores its real body as a delimited string, rebuilds it by replacing the
# delimiter with code fragments — `eval(replace(blob, "O", ")+chr("))` builds
# a chr()-arithmetic concatenation — then hands the result to execute(). The
# function-call form replace(x, a, b) is VBScript's, and feeding eval/execute
# a transformed string exists only to keep the real code out of static view.
defaults:
  platforms: [windows]
  for: [vbs, html]
  attack: T1027
  mbc: B0032
traits:
  - id: wsh-eval-replace-transform
    desc: WSH eval/execute of replace-transformed string
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)(eval|execute)\s*\(\s*replace\s*\('
  - id: wsh-execute-variable
    desc: WSH executes a reconstructed variable
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)\b(execute|executeglobal)\s*\(\s*[a-zA-Z_]\w{2,}\s*\)'
composite_rules:
  - id: wsh-reconstructed-payload-exec
    desc: WSH reconstructs and executes hidden payload
    crit: hostile
    conf: 0.97
    all:
      - id: wsh-eval-replace-transform
      - id: wsh-execute-variable
