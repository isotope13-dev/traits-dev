# Obfuscated PowerShell loaders that rebuild their payload from a delimited
# numeric/hex array — `... -split '-X-' | % { [char][convert]::ToUInt32($_,16) }`
# joined back together and handed to Invoke-Expression. The same technique
# appears standalone in a `.ps1`, embedded in a VBScript string driven through
# WScript.Shell, dropped from an HTA, or staged by a JS loader, so the patterns
# scan raw text and target every host language that can carry a PowerShell
# command. Neither half occurs in benign code; the char-array-to-text decode
# step exists only to hide the command from static inspection.
defaults:
  platforms: [windows]
  for: [vbs, batch, powershell, javascript, html]
  attack: T1059.001
  mbc: B0032
traits:
  - id: ps-char-convert-decode
    desc: PowerShell numeric-to-char payload decode
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\[char\]\s*\[convert\]::To'
      case_insensitive: true
  - id: ps-invoke-expression
    desc: PowerShell Invoke-Expression sink
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)(Invoke-Expression|\bIEX\b)'
  - id: ps-split-char-rebuild
    desc: PowerShell split-array char rebuild
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)-split\b[^\r\n]{0,80}\[char\]'
composite_rules:
  - id: obfuscated-ps-char-array-loader
    desc: Obfuscated PowerShell char-array loader
    crit: hostile
    conf: 0.96
    all:
      - id: ps-invoke-expression
    any:
      - id: ps-char-convert-decode
      - id: ps-split-char-rebuild
