# Obfuscator-generated PowerShell loader, typically launched from a `.bat`
# one-liner (`powershell.exe -NoProfile -windowstyle … "<payload>"`). Three
# signature techniques, none of which legitimate code combines:
#   1. a custom string-stride deobfuscator — `$s[$i]; $i += N` walks every Nth
#      char to rebuild hidden commands out of junk-padded strings;
#   2. dynamic invocation via the call operator on a variable — `&($v) $code`,
#      an obfuscated Invoke-Expression where the cmdlet name is itself decoded;
#   3. char-code byte arrays — `@(114,101,109,…)` rebuilt into strings/keys.
# Patterns scan raw text, so they match the PowerShell whether it is a
# standalone `.ps1` or embedded in a batch command literal.
defaults:
  platforms: [windows]
  for: [batch, powershell]
  attack: T1059.001
  mbc: B0032
traits:
  - id: ps-stride-decode-loop
    desc: PowerShell string-stride deobfuscation loop
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\[\$\w+\]\s*;\s*\$\w+\s*\+=\s*[2-9]'
  - id: ps-invoke-via-variable
    desc: PowerShell dynamic invoke via variable
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '&\s*\(\s*\$\w+\s*\)\s*\$\w+'
  - id: ps-charcode-array
    desc: PowerShell numeric char-code array
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '@\(\s*\d{1,3}(\s*,\s*\d{1,3}){7,}'
composite_rules:
  - id: obfuscated-powershell-stride-loader
    desc: Obfuscated PowerShell loader (stride-decode + dynamic invoke + char-code array)
    crit: hostile
    conf: 0.95
    all:
      - id: ps-stride-decode-loop
      - id: ps-invoke-via-variable
      - id: ps-charcode-array
