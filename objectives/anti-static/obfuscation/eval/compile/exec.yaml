# Python compile() + exec() Obfuscation Patterns
# Detects dynamic code compilation with synthetic filenames and immediate execution.
# Used by Python packers (PyOBFUSCATE, ShadowCoil) to hide payload origin.
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1027

traits:
- id: cpython-profiling-doc-extension
  desc: CPython profiling documentation extension
  crit: component
  conf: 0.9
  if:
    type: path
    basename: true
    exact: profiling_trace.py

- id: compile-exec-chain
  desc: compile() followed by exec() in script
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '(^|[^A-Za-z0-9_])_code\s*=\s*compile\('
  unless:
  - type: text
    substr: "template"
  - type: text
    substr: "TempliteCompiler"
  - type: text
    substr: "cpython.run_startup"

- id: compile-synthetic-filename-unless-cond-3--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'compile\(.{0,80}''<(string|stdin)>'''
  count_max: 1025882
- id: compile-synthetic-filename-unless-cond-3--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'compile\(.{0,80}''<(unknown|docs)>'''
  count_max: 1025883
- id: compile-synthetic-filename-unless-cond-3--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    regex: 'compile\(.{0,80}''<(code|doctest [^''">]{0,80})>'''
  count_max: 1025884
- id: compile-synthetic-filename-unless-cond-3--rx-4
  desc: Synthetic main filename label
  crit: component
  conf: 0.94
  if:
    type: text
    regex: "compile\\(.{0,80}'<main [a-z]{3,16}>'"
  count_max: 1025885
composite_rules:
- id: compile-exec-obfuscation
  desc: Dynamic compile-then-exec obfuscation
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/process/interpreter/python::compile-builtin
  - id: micro-behaviors/process/interpreter/python::exec-builtin
  any:
  - id: micro-behaviors/process/interpreter/python::compile-synthetic-filename
  - id: compile-exec-chain
  unless:
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness::test-directory
  - id: micro-behaviors/data/text/security/scanner::defensive-scanner-tool-context
  - id: cpython-profiling-doc-extension
  - id: compile-synthetic-filename-unless-cond-3--rx-helper-4
- id: compile-synthetic-filename-unless-cond-3--rx-helper-4
  desc: Regex component marker
  crit: component
  conf: 1.0
  mbc: B0032
  any:
  - id: compile-synthetic-filename-unless-cond-3--rx-1
  - id: compile-synthetic-filename-unless-cond-3--rx-2
  - id: compile-synthetic-filename-unless-cond-3--rx-3
  - id: compile-synthetic-filename-unless-cond-3--rx-4
