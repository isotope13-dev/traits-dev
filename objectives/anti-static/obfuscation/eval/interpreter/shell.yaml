defaults:
  platforms: [unix]
  for: [shell]
  crit: hostile
  conf: 0.95
  mbc: B0032
  attack: T1027
traits:
- id: nvidia-bug-report-basename
  desc: nvidia-bug-report.sh filename
  crit: component
  conf: 1.0
  if:
    type: path
    basename: true
    exact: nvidia-bug-report.sh
# Non-base64 self-decoding shell sinks. The base64 chains are covered by the
# composites below; these catch the hex/xxd, tr-rotation, and command-
# substitution decoders future variants pivot to when base64 detection bites.
- id: xxd-hexdecode-pipe-shell
  desc: xxd hex-decode piped to shell
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'xxd\s+-r[^|\n]{0,16}\|\s*(ba)?sh\b'
- id: tr-rotate-pipe-shell
  desc: tr byte-rotation piped to shell
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '\|\s*tr\s+\S+\s+\S+\s*\|\s*(ba)?sh\b'
- id: rev-reverse-pipe-shell
  desc: rev string-reversal piped to shell
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '\|\s*rev\s*\|\s*(ba)?sh\b'
- id: eval-decode-command-substitution
  desc: eval of a decoded command substitution
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'eval\s+["'']?\$\([^)]{0,80}(base64|xxd|openssl|tr)\b'
  unless:
  - id: github-uploads-shell-url
- id: shell-base64-variable-decode
  desc: Shell decodes base64 variable
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '(ENCODED_PAYLOAD|POLY_BLOB)[\s\S]{0,260}base64 -d'
- id: shell-eval-decoded-variable
  desc: Shell evals decoded variable
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'eval "\$(DECODED_PAYLOAD|_DECODED|_CLEAN)"'
- id: github-uploads-shell-url
  desc: Shell references GitHub release asset upload URL
  crit: component
  conf: 0.9
  if:
    type: text
    substr: uploads.github.com/repos
composite_rules:
- id: github-release-asset-upload-helper
  desc: GitHub release asset upload helper
  crit: component
  conf: 0.9
  all:
  - id: micro-behaviors/communications/http/upload::curl-data-binary
  - id: github-uploads-shell-url
# Lone-file obfuscated self-decoding shell dropper: a script that decodes an
# embedded blob (hex/xxd, tr rotation, or a decode inside eval "$(...)") and
# executes it — no package/install-hook context required. The shell analog of
# packed-single-line-eval-dropper for JS.
- id: shell-obfuscated-self-decode-exec
  desc: Shell self-decodes obfuscated payload then executes
  crit: hostile
  conf: 0.94
  # Anchored on shell-script context so the composite surfaces in findings (a
  # bare any:-only composite whose single satisfied leg is already a finding is
  # absorbed and never emitted). Every leg already requires a decode-then-shell
  # pipe/eval, so this only restricts to real shell and never broadens.
  all:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::shell-script-marker
  any:
  - id: xxd-hexdecode-pipe-shell
  - id: eval-decode-command-substitution
  - id: tr-rotate-pipe-shell
  - id: rev-reverse-pipe-shell
  unless:
  - id: metadata/lang/source::linux-kernel-header-source-path
  - id: github-release-asset-upload-helper
  - id: github-uploads-shell-url
- id: shell-encoded-eval-dropper
  desc: Shell encoded payload with eval
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/data/encode/payload::shell-base64-payload-literal
  - id: micro-behaviors/process/create/eval::shell-eval
- id: shell-base64-variable-eval
  desc: Shell base64 variable eval
  crit: hostile
  conf: 0.98
  all:
  - id: shell-base64-variable-decode
  - id: shell-eval-decoded-variable

- id: shell-base64-gunzip-eval
  desc: Shell base64 gunzip eval chain
  all:
  - id: micro-behaviors/data/decode/base64::base64-tool
  - id: micro-behaviors/data/decode/processor::gunzip-tool
  - id: micro-behaviors/process/create/eval::shell-eval
  unless:
  - id: well-known/tool/sysadmin/kubernetes/bootstrap::kubernetes-bootstrap-context
  - id: metadata/package/quality/source::source-archive-member
- id: shell-heredoc-base64-eval
  desc: Shell heredoc base64 eval chain
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/process/create/eval::shell-heredoc
  - id: micro-behaviors/data/decode/base64::base64-tool
  - id: micro-behaviors/process/create/eval::shell-eval
  unless:
  - id: nvidia-bug-report-basename
  - id: metadata/build/autotools::autoconf-generated-script
- id: shell-base64-perl-xor-eval
  desc: Base64 decode to Perl XOR decrypt then eval
  all:
  - id: micro-behaviors/data/decode/base64::base64-pipe-perl-decrypt
  any:
  - id: micro-behaviors/process/create/eval::shell-eval
  - id: micro-behaviors/process/create/eval::shell-eval-variable
