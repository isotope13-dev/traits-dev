defaults:
  crit: suspicious
  conf: 0.8
  for:
  - python
  - javascript
  - powershell
  - pe
  platforms:
  - windows
  attack: T1027.002
  mbc: B0027
traits:
- id: cmd-caret-obfuscation
  desc: Heavy caret obfuscation in string
  crit: notable
  if:
    type: text
    regex: (\^[a-z]){5,}
  not:
  - regex: (\^[A-Z]){6,}
  unless:
  - type: section
    exact: '.rdata'
    length_min: 500000
- id: cmd-caret-excessive
  desc: Excessive caret usage
  crit: suspicious
  if:
    id: micro-behaviors/process/create/shell::powershell-caret-obfuscated
  conf: 0.8
  unless:
  - id: metadata/lang/shebang::perl
composite_rules: []
