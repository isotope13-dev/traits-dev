# Command Line Caret Obfuscation
# Detects usage of caret (^) escaping to break signatures
# Common in batch scripts and cmd.exe arguments
defaults:
  crit: suspicious
  conf: 0.8
  for: [python, javascript, powershell, pe]
  platforms: [windows]
  attack: "T1027.002"
  mbc: "B0027"
traits:
  - id: cmd-caret-obfuscation
    desc: Heavy caret obfuscation in string
    crit: notable
    if:
      type: string_value
      regex: '(?i)(\^[a-z]){4,}'
    not:
      - regex: "(\\^[A-Z]){6,}"
  - id: cmd-caret-excessive-raw
    desc: Caret-obfuscated PowerShell reference
    crit: suspicious
    if:
      id: micro-behaviors/process/create/shell::powershell-caret-obfuscated
composite_rules:
  - id: cmd-caret-excessive
    desc: Excessive caret usage
    crit: suspicious
    conf: 0.8
    all:
      - id: objectives/anti-static/obfuscation/eval/interpreter/cmd::cmd-caret-excessive-raw
    unless:
      - id: metadata/lang/shebang::perl
