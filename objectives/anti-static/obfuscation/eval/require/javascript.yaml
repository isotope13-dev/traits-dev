# Obfuscated JavaScript require patterns
# Detects obfuscated module loading via hex-encoded strings
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: require-hex
    desc: "Obfuscated require call using hex-decoded"
    crit: suspicious
    conf: 0.9
    # `require(Buffer.from(x, "hex").toString())` — hex-decoded module name. The
    # full call chain is distinctive as source text (this absorbed the former
    # `require-hex-simple` text twin, which matched the identical pattern).
    if:
      type: text
      regex: "require\\(\\s*Buffer\\.from\\([^,]{1,120},\\s*['\"]hex['\"]\\)\\.toString\\(\\)\\s*\\)"
