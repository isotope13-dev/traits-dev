# API-surface proliferation for decoded-payload execution.
#
# Supply-chain malware loaders often expose multiple module functions
# whose names contain decode/decrypt/run/exec/final variants, all of
# which ultimately wrap a `new Function(require, ...)` invocation on a
# decrypted payload. The naming proliferation is itself the signal —
# real libraries normalize on one or two well-named entry points; only
# packages whose primary purpose is "run this decoded blob" produce 4+
# differently-named decoder/runner exports converging on the same eval.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.007
  mbc: B0024
traits:
  - id: decode-named-function-decl
    desc: Function whose name contains Decode
    crit: component
    conf: 0.5
    count_min: 3
    if:
      type: text
      regex: '(?m)^\s*function\s+\w*[Dd]ecode\w*\s*\('
  - id: decrypt-named-function-decl
    desc: Function whose name contains Decrypt
    crit: component
    conf: 0.5
    count_min: 1
    if:
      type: text
      regex: '(?m)^\s*function\s+\w*[Dd]ecrypt\w*\s*\('
  - id: run-named-function-decl
    desc: Function whose name contains Run/Exec
    crit: component
    conf: 0.5
    count_min: 1
    if:
      type: text
      regex: '(?im)^\s*function\s+\w*(run|exec)\w*\s*\('
composite_rules:
  - id: multi-decode-eval-api-surface
    desc: Many decode-named exports share eval body
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
    any:
      - id: decode-named-function-decl
      - id: decrypt-named-function-decl
      - id: run-named-function-decl
    needs: 2
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-module-bundle
