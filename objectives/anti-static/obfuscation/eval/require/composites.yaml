defaults:
  platforms: [unix, windows, macos]
  for: [javascript, typescript]
  attack: T1059.007
  mbc: B0032
composite_rules:
  - id: base64-decode-require-exec
    desc: Base64 decode into require-enabled Function
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
    downgrade:
      any:
        - id: metadata/library/structure::js-large-module-bundle
        - id: metadata/package/tooling::webpack-bundled
        - id: metadata/package/tooling::esbuild-bundled

  - id: encoded-require-function-loader
    desc: Encoded require-enabled Function loader
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg-base64
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
    any:
      - id: micro-behaviors/crypto/symmetric/aes/runtime-library::aes-256-cbc
      - id: micro-behaviors/crypto/kdf/algorithm::pbkdf2

  - id: shift-cipher-require-exec
    desc: Shift-cipher decode into require-enabled Function
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
      - id: micro-behaviors/data/encode/caesar::charcodeat-shift
      - id: micro-behaviors/data/encode/caesar::fromcharcode-map-decode
