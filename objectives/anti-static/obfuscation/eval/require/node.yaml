defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: tiktoken-module-marker
    desc: tiktoken JavaScript module marker
    crit: component
    conf: 0.9
    for: [scripts]
    if:
      type: text
      word: tiktoken

  - id: esbuild-loader-basename
    desc: esbuild JavaScript helper basename
    crit: component
    conf: 0.95
    for: [scripts]
    if:
      type: basename
      regex: '^esbuild(\.js)?$'

  - id: blob-loader-basename
    desc: Blob JavaScript helper basename
    crit: component
    conf: 0.9
    for: [scripts]
    if:
      type: basename
      regex: '(^|[\\/])Blob\.js$'

  - id: dynamic-import-function-constructor
    desc: Function constructor dynamic import shim
    crit: component
    conf: 0.95
    for: [scripts]
    if:
      type: text
      regex: new Function\(['"]specifier['"],['"]return import\(specifier\)

  - id: read-font-file
    desc: Reads a font file (woff2, ttf, otf)
    crit: suspicious
    conf: 1.0
    if:
      type: raw
      regex: readFileSync.{0,100}\.(woff2|ttf|otf)
  - id: function-constructor
    desc: Generic Function constructor usage
    crit: suspicious
    conf: 1.0
    for: [scripts]
    # `js-large-module-bundle` covers webpack/vite/rollup vendor chunks
    # AND large bundled libraries like Mozilla pdf.js (2000+ unique
    # modules), so it absorbs several previous bundler-specific unless:
    # entries.
    unless:
      - id: function-constructor-benign-context
      - type: basename
        regex: '(?i)(commandLineInjected|domplate|tabContext)\.js$'
    not:
      - substr: WebAssembly loader from the Go compiler
    if:
      type: text
      regex: new Function(\.constructor)?\(['"]
  - id: function-constructor-require
    desc: Function constructor with require access
    crit: suspicious
    conf: 1.0
    if:
      type: text
      regex: new\s*\(?\s*Function\.constructor\s*\)?\(\s*['"]require['"]
    downgrade:
      any:
        - id: metadata/library/structure::js-large-module-bundle
        - id: metadata/package/tooling::webpack-bundled
        - id: metadata/package/tooling::esbuild-bundled
        - id: metadata/library/runtime::vscode-webview-bundle
        - id: metadata/library/runtime::acquire-vscode-api

  - id: function-constructor-require-arg
    desc: new Function with require param (module smuggling)
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    for: [javascript, typescript]
    if:
      type: text
      regex: "new Function\\(['\"]require['\"]"
    unless:
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/library/runtime::acquire-vscode-api
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - type: basename
        regex: '^esbuild(\.js)?$'
  - id: function-constructor-require-arg-base64
    desc: Base64-decoded new Function require param
    crit: suspicious
    conf: 0.95
    attack: T1059.007
    for: [javascript, typescript]
    if:
      type: encoded
      encoding: base64
      regex: "new Function\\(['\"]require['\"]"
  - id: function-constructor-module-smuggle-call
    desc: new Function call with require/module/exports args
    crit: suspicious
    conf: 0.95
    attack: T1059.007
    for: [javascript, typescript]
    if:
      type: ast
      language: javascript
      query: |
        (new_expression
          constructor: (identifier) @ctor
          arguments: (arguments
            (string (string_fragment) @a1)
            (string (string_fragment) @a2)
            (string (string_fragment) @a3)
            (_) @body)
          (#eq? @ctor "Function")
          (#eq? @a1 "require")
          (#eq? @a2 "module")
          (#eq? @a3 "exports"))
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/library/runtime::vscode-webview-bundle

composite_rules:
  - id: function-constructor-benign-context
    desc: Function constructor benign bundle context
    crit: component
    conf: 0.95
    for: [scripts]
    any:
      - id: well-known/tool/development/firebug::firefox-devtools-extension
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
      - id: metadata/library/jquery
      - id: metadata/library/runtime::acquire-vscode-api
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: dynamic-import-function-constructor
      - id: tiktoken-module-marker
      - id: esbuild-loader-basename
      - id: blob-loader-basename

  - id: remote-code-module-smuggle
    desc: Remote code executed via Function module smuggling
    crit: hostile
    conf: 0.96
    attack: T1059.007
    for: [javascript, typescript]
    all:
      - id: function-constructor-module-smuggle-call
    any:
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/client::axios-direct-call
      - id: micro-behaviors/communications/http/request/client::http-request
      - id: micro-behaviors/communications/http/url/rpc::solana-rpc-method-any
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/package/tooling::webpack-bundled

  - id: font-steganography-hex
    desc: Load JavaScript from font file (hex)
    crit: suspicious
    conf: 1.0
    all:
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-raw
      - id: read-font-file
      - id: function-constructor
