defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: hex-buffer-decode
    desc: Usage of Buffer.from(..., 'hex') for decoding
    crit: notable
    conf: 1.0
    if:
      type: raw
      regex: Buffer\.from\(.{1,50}, ['"]hex['"]\)
    unless:
      - id: metadata/package/testing/harness::electron-node-spec-harness
      - id: well-known/lib/electron::v8-isolate-marker
      - id: well-known/lib/electron::v8-isolate-marker
  - id: read-font-file
    desc: Reads a font file (woff2, ttf, otf)
    crit: suspicious
    conf: 1.0
    if:
      type: raw
      regex: readFileSync.{0,100}\.(woff2|ttf|otf)
  - id: function-constructor
    desc: Generic Function constructor usage
    crit: suspicious
    conf: 1.0
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/library/jquery::library
      - id: well-known/app/adguardhome::release-path
    if:
      type: text
      regex: new Function(\.constructor)?\(['"]
  - id: function-constructor-require
    desc: Function constructor with require access
    crit: suspicious
    conf: 1.0
    if:
      type: text
      regex: new\s*\(?\s*Function\.constructor\s*\)?\(\s*['"]require['"]
    downgrade:
      any:
        - id: metadata/library/structure::js-large-module-bundle
        - id: metadata/package/tooling::webpack-bundled
        - id: metadata/package/tooling::esbuild-bundled

  - id: function-constructor-require-arg
    desc: new Function with require param (module smuggling)
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    for: [javascript, typescript]
    if:
      type: text
      regex: "new Function\\(['\"]require['\"]"
    downgrade:
      any:
        - id: metadata/library/structure::js-large-module-bundle
        - id: metadata/package/tooling::webpack-bundled
        - id: metadata/package/tooling::esbuild-bundled
  - id: function-constructor-require-arg-base64
    desc: Base64-decoded new Function require param
    crit: suspicious
    conf: 0.95
    attack: T1059.007
    for: [javascript, typescript]
    if:
      type: encoded
      encoding: base64
      regex: "new Function\\(['\"]require['\"]"

composite_rules:
  - id: font-steganography-hex
    desc: Load JavaScript from font file (hex)
    crit: suspicious
    conf: 1.0
    all:
      - id: hex-buffer-decode
      - id: read-font-file
      - id: function-constructor
