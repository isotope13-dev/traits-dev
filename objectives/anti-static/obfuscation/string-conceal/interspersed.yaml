traits:
  - id: js-interspersed-question-marks
    desc: String with interspersed question marks (Nemucod)
    crit: suspicious
    conf: 0.95
    for: [javascript]
    mbc: "B0032"
    attack: "T1027"
    if:
      type: raw
      regex: '([a-zA-Z0-9]\?){10,}'

  - id: js-interspersed-chars-generic
    desc: String with interspersed characters (obfuscation)
    crit: suspicious
    conf: 0.8
    for: [javascript]
    mbc: "B0032"
    attack: "T1027"
    size_max: 50000
    if:
      type: raw
      regex: '"[a-zA-Z0-9][^a-zA-Z0-9"\\s]([a-zA-Z0-9][^a-zA-Z0-9"\\s]){18,}[a-zA-Z0-9]"'

  - id: js-interspersed-char-obfuscation
    desc: Fixed interleaving character (Nemucod)
    crit: suspicious
    conf: 0.9
    for: [javascript]
    size_max: 100000
    if:
      type: raw
      # Match a pattern like a?b?c?d?e?f? where ? is the same non-standard char
      # Excludes common JS punctuation (,.;:=(){}[] and space) to avoid matching
      # minified code like comma-separated numbers or dot-chained property access.
      regex: '([a-zA-Z0-9][^a-zA-Z0-9,.\s;:=(){}\[\]+\-*/<>!&|"''`]){30,}'
