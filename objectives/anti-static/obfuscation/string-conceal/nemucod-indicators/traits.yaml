traits:
  - id: nemucod-adodb-stream-obfuscated
    desc: Obfuscated ADODB.Stream reference (Nemucod style)
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: raw
      regex: 'A####D####O####D####B####\.####S####t####r####e####a####m'
  - id: nemucod-xmlhttp-obfuscated
    desc: Obfuscated MSXML2.XMLHTTP reference (Nemucod style)
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: raw
      regex: 'M####S####X####M####L####2####\.####X####M####L####H####T####T####P'
  - id: nemucod-wscript-shell-obfuscated
    desc: Obfuscated WScript.Shell reference (Nemucod style)
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: raw
      regex: 'W####S####c####r####i####p####t####\.####S####h####e####l####l'
  - id: nemucod-save-to-file-obfuscated
    desc: Obfuscated SaveToFile method (Nemucod style)
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: raw
      regex: 'S####a####v####e####T####o####F####i####l####e'
