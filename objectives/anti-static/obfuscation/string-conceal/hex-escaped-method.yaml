traits:
  - id: hex-escaped-get
    desc: Hex-escaped GET method string
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript, vbs]
    if:
      type: raw
      regex: '(?i)["''](G\\x45|\\x47E)["'']'
  - id: hex-escaped-post
    desc: Hex-escaped POST method string
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript, vbs]
    if:
      type: raw
      regex: '(?i)["''](P\\x4fS|\\x50OS)["'']'
