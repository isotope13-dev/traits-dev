defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: js-nemucod-dictionary-map
    desc: Dense short-string dictionary map
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '"[A-Za-z0-9_]{1,40}"\s*:\s*"[A-Za-z0-9_]{1,5}"'
  - id: js-nemucod-dictionary-loop
    desc: Double-index dictionary loop pattern
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '\+=\s*\w+\[\w+\[\w+\]\]'
  - id: js-nemucod-ascii-remap
    desc: ASCII remapping assignment markers
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: '\=\s*128;\s*\w+\[[^\]]{1,15}\]\s*=\s*129;'
