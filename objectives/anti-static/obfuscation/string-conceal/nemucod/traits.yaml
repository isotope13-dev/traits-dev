# Nemucod String Reassembly Fragments
# Common fragments used by Nemucod to reassemble sensitive strings
# These are building blocks that only make sense when combined in composites

defaults:
  crit: component
  conf: 0.8
  for: [javascript]

traits:
  - id: save-to-file-fragment-oFil
    desc: SaveToFile fragment (oFil)
    if:
      type: string
      exact: "oFil"

  - id: stream-fragment-dotstr
    desc: .Stream fragment (.Str)
    if:
      type: string
      exact: ".Str"
