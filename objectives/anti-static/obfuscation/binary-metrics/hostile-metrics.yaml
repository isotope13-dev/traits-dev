defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
composite_rules:
  - id: go-obfuscated-proxy-agent
    desc: High-complexity obfuscated Go proxy agent
    crit: hostile
    conf: 0.95
    attack: T1027.002
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/binary/metrics::extreme-max-complexity
    any:
      - id: micro-behaviors/communications/proxy/socks::socks5-string
      - id: objectives/command-and-control/channel/tunnel/proxy::custom-socks5-package

  - id: monolithic-stealth-injector
    desc: Monolithic high-complexity injector with minimal API surface
    crit: hostile
    conf: 0.95
    attack: T1055
    all:
      - id: metadata/binary/metrics::single-complex-function
      - id: metadata/binary/metrics::near-zero-strings
    any:
      - id: objectives/evasion/process/injection/toolkit::remote-thread-pattern
      - id: objectives/evasion/process/injection/toolkit::process-hollowing-context-hijack
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/resource::resource-only-dll

  - id: entropy-dominant-reflective-loader
    desc: High-entropy dominant section loader with reflective capabilities
    crit: hostile
    conf: 0.98
    attack: T1620
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
      - id: objectives/anti-static/obfuscation/binary-metrics::very-high-entropy
    any:
      - id: objectives/command-and-control/backdoor/reflective-load::custom-pe-loader
      - id: objectives/evasion/process/injection/memory::asm-manual-import-parsing
    unless:
      - id: metadata/file/magic::zip-archive
      - id: metadata/binary/installer::known-benign-installer

  - id: anti-analysis-obfuscated-implant
    desc: Heavy control-flow obfuscation with dense anti-analysis patterns
    crit: hostile
    conf: 0.93
    attack: T1027.002
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::heavy-control-flow-obfuscation
      - id: objectives/anti-static/obfuscation/binary-metrics::anti-analysis-pattern
    any:
      - id: objectives/anti-analysis/debugger-detect/
      - id: objectives/anti-analysis/sandbox-detect/
      - id: objectives/anti-analysis/vm-detect/
    unless:
      - id: well-known/tool/development/jetbrains::jetbrains-company-string
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
