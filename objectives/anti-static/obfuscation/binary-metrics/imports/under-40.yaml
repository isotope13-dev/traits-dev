defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: import-count-under-40
    desc: Binary imports fewer than 40 functions
    crit: component
    conf: 0.9
    size_min: 524288
    if:
      type: metrics
      field: imports.count
      max: 39
    unless:
      - type: basename
        regex: ^clink_(x64|x86|arm64)\.exe$
      - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/lang/compiler/aot::native-runtime-large-file
      - id: metadata/binary/symbols/exports::total-commander-packer-plugin
      - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
      - id: metadata/binary/layout::svk-packed-section
