# Import-to-size ratio anomalies
# Detects binaries with suspiciously few imports relative to file size
# Indicates embedded payloads, overlay data, or statically compiled malware
defaults:
  platforms: [linux, macos, windows]
traits:
  - id: max-30-imports
    desc: Binary has 30 or fewer imports
    crit: notable
    conf: 0.7
    for: [pe, elf, macho, -go, -rust]
    size_min: 524288 # 512KB - small utilities legitimately have few imports
    if:
      type: metrics
      field: binary.import_count
      max: 30
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - type: basename
        regex: \.(map|deb|gz|mun)$
      - type: metrics
        field: binary.import_count
        max: 0
      - id: sparse-import-benign-context
      - type: exports_count
        min: 100
      - id: metadata/package::bitdefender-ctc-module
  - id: max-25-imports
    desc: Binary has 25 or fewer imports
    crit: notable
    conf: 0.75
    for: [pe, elf, macho, -go, -rust]
    size_min: 524288 # 512KB
    if:
      type: metrics
      field: binary.import_count
      max: 25
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - type: basename
        regex: \.(map|deb|gz|mun)$
      - type: metrics
        field: binary.import_count
        max: 0
      - id: sparse-import-benign-context
      - type: exports_count
        min: 100
      - id: metadata/package::bitdefender-ctc-module
  - id: max-50-imports
    desc: Binary has 50 or fewer imports
    # Component-only: import count alone doesn't indicate obfuscation.
    # Used by composites that require entropy/section-dominance context.
    crit: component
    conf: 0.7
    for: [pe, elf, macho, -go, -rust]
    size_min: 524288 # 512KB
    if:
      type: metrics
      field: binary.import_count
      max: 50
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - type: basename
        regex: \.(map|deb|gz|mun)$
      - type: metrics
        field: binary.import_count
        max: 0
      - id: sparse-import-benign-context
      - type: exports_count
        min: 100
      - id: metadata/package::bitdefender-ctc-module
  - id: max-80-imports
    desc: Binary has 80 or fewer imports
    # Component-only: the import count alone doesn't indicate obfuscation.
    # Used by `sparse-import-packed-loader` which also requires GetProcAddress +
    # self-module-resolution + packed-loader-data-geometry.
    crit: component
    conf: 0.84
    for: [pe]
    platforms: [windows]
    size_min: 524288
    if:
      type: metrics
      field: binary.import_count
      max: 80
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - type: basename
        regex: \.(map|deb|gz|mun)$
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/metrics::no-functions
      - type: exports_count
        min: 50
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/binary/linking::static-linked-heuristic
  - id: aliased-exports
    desc: Multiple exports resolve to same function
    crit: suspicious
    conf: 0.88
    for: [pe]
    # Alias-heavy exports are common in large compatibility DLLs. Keep this
    # obfuscation signal focused on stub-like binaries instead of broad API
    # surfaces.
    if:
      type: metrics
      field: binary.aliased_exports
      min: 8
    unless:
      - id: metadata/binary/metrics::many-exports
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/metrics::many-functions
      - type: metrics
        field: binary.export_count
        min: 401
      - id: wmdrm-compatibility-stub
  - id: fully-aliased-export-stub
    desc: All exports aliased in tiny stub DLL
    crit: suspicious
    conf: 0.92
    for: [pe]
    size_max: 65536
    if:
      type: metrics
      field: binary.aliased_exports
      min: 1
    unless:
      - type: metrics
        field: binary.export_count
        min: 5
      - type: metrics
        field: pe.is_dotnet
        min: 1
      - id: low-volume-aliased-exports-benign-context

  - id: low-volume-aliased-exports
    desc: Small export table with aliasing
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: metrics
      field: binary.aliased_exports
      min: 5
    unless:
      - type: metrics
        field: pe.is_dotnet
        min: 1
      - id: low-volume-aliased-exports-benign-context
      - type: metrics
        field: binary.export_count
        min: 10
  - id: mscoree-string
    desc: mscoree .NET runtime reference
    crit: component
    for: [pe]
    if:
      type: text
      substr: mscoree
      section: ".idata"
  - id: libiconv-open-symbol
    desc: libiconv_open symbol present
    crit: baseline
    for: [pe]
    if:
      type: symbol
      exact: libiconv_open
  - id: taggant-prepare-import
    desc: TaggantPrepare import present
    crit: component
    for: [pe]
    if:
      type: symbol
      exact: TaggantPrepare
  - id: large-export-surface
    desc: Binary has large export surface
    crit: component
    for: [pe]
    if:
      type: exports_count
      min: 100
  - id: wmdrm-compatibility-stub
    desc: WMDRM compatibility stub marker
    crit: baseline
    conf: 0.98
    for: [pe]
    if:
      type: text
      substr: WMDRM backwards compatibility stub
      section: .rsrc
composite_rules:
  - id: low-volume-aliased-exports-benign-context
    desc: Benign low-volume alias export context
    crit: baseline
    conf: 0.95
    for: [pe]
    any:
      - type: trait
        id: libiconv-open-symbol
      - type: trait
        id: metadata/binary/symbols::standard-com-server-exports
      - type: trait
        id: metadata/binary/symbols::ollydbg-plugin-export
      - type: trait
        id: metadata/signed/platform::microsoft-corporation
      - type: trait
        id: objectives/anti-static/pack/entropy::many-functions-dotnet-profile
      - type: trait
        id: wmdrm-compatibility-stub
  - id: sparse-import-bitdefender-context
    desc: Bitdefender sparse-import context
    crit: baseline
    conf: 0.99
    any:
      - id: metadata/package::bitdefender-ecnet-telemetry
      - id: metadata/package::bitdefender-ctc-module
  - id: sparse-import-benign-context
    desc: Benign sparse-import binary context
    crit: baseline
    conf: 0.85
    for: [pe, elf, macho, -go, -rust]
    any:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/metrics::no-functions
      - id: metadata/binary/metrics::many-exports-100
      - id: metadata/binary/metrics::high-export-count-marker
      - id: metadata/package::bitdefender-ecnet-telemetry
      - id: metadata/package::bitdefender-ctc-module
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/binary/linking::static-linked-heuristic
      - id: large-export-surface
      - id: metadata/binary/symbols::ollydbg-plugin-export
  # === Extreme size-to-import ratio ===
  - id: massive-file-minimal-imports
    desc: Large binary with minimal imports
    crit: suspicious
    conf: 0.9
    for: [pe, elf, macho, -go, -rust]
    attack: "T1027"
    mbc: "B0032"
    size_min: 5242880 # 5MB
    all:
      - id: max-30-imports
    any:
      # Has dynamic loading (hiding real imports)
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: objectives/anti-static/obfuscation/reflection/class::dlopen
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
    unless:
      - id: metadata/binary/metrics::dotnet-binary
      - id: sparse-import-benign-context
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/binary/linking::static-linked-heuristic
      - id: metadata/package::bitdefender-ctc-module
      - id: taggant-prepare-import
  - id: huge-file-tiny-imports
    desc: Huge binary with minimal imports
    crit: hostile
    conf: 0.95
    for: [pe, elf, macho, -go, -rust]
    attack: "T1027"
    mbc: "B0032"
    size_min: 10485760 # 10MB
    all:
      - id: max-25-imports
    needs: 2
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/crypto/
      - id: micro-behaviors/process/create/shell/
    unless:
      - id: metadata/binary/metrics::many-sections-20
      - id: metadata/binary/metrics::dotnet-binary
      - id: metadata/binary/linking::static-linked-heuristic
  - id: embedded-payload-binary
    desc: Binary with suspected embedded payload
    crit: suspicious
    conf: 0.85
    for: [pe, elf, macho, -go, -rust]
    attack: "T1027.009"
    size_min: 1048576 # 1MB
    all:
      - id: max-50-imports
    needs: 2
    any:
      - id: objectives/anti-static/pack/entropy::high-entropy-section
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/crypto/
    unless:
      - id: well-known/tools/sysadmin/
      - id: metadata/binary/metrics::many-exports
      - id: mscoree-string
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/reflection/invoke/
        - id: micro-behaviors/dylib/library/
  - id: dynamic-resolution-export-stub-profile
    desc: Dynamic resolution with aliased export stubs
    crit: suspicious
    conf: 0.92
    for: [pe]
    attack: "T1027.007"
    mbc: "B0032.014"
    all:
      - id: low-volume-aliased-exports
      - id: micro-behaviors/dylib/lookup::get-proc-address
    any:
      - id: metadata/binary/metrics::high-entropy-data
      - id: objectives/anti-static/obfuscation/payload/section::oversized-data-section
      - id: micro-behaviors/data/embedded/payload::zip-magic
      - id: objectives/anti-analysis/debugger-detect/check::anti-debug-api-pair
    needs: 2
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
    unless:
      - id: metadata/binary/metrics::many-imports-100
      - id: metadata/binary/metrics::many-functions-5000
  - id: sparse-import-packed-loader
    desc: Sparse-import packed PE loader
    crit: suspicious
    conf: 0.95
    for: [pe]
    platforms: [windows]
    attack: "T1027"
    mbc: "B0032"
    size_min: 524288
    all:
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/os/module/load::self-module-resolution
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-data-geometry
    any:
      - id: max-80-imports
      - id: max-50-imports
    needs: 1
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/package/versioning::pe-version-resource
    unless:
      - id: metadata/binary/metrics::many-functions-50
