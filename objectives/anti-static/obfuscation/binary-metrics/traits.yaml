defaults:
  platforms:
    - linux
    - unix
    - android
    - windows
    - macos
    - ios
  for: [binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: high-overall-entropy
    desc: High overall file entropy (likely
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.0
    unless:
      - id: metadata/file/magic::zip-archive
      - id: metadata/file/magic::gzip
      - type: raw
        regex: BSJB
    downgrade:
      any:
        - type: string_value
          substr: ;!@Install@!UTF-8!
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - type: raw
          substr: PECompac
        - id: metadata/file/magic::gzip
  - id: very-high-entropy
    desc: Very high entropy (strongly indicates
    crit: suspicious
    conf: 0.95
    attack: T1045
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.5
    unless:
      - id: metadata/file/magic::zip-archive
      - id: metadata/file/magic::gzip
    downgrade:
      any:
        - type: string_value
          substr: ;!@Install@!UTF-8!
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: metadata/file/magic::gzip
        - type: string_value
          substr: "UPX executable packer"
  - id: 7zsfx-config-marker
    desc: 7z SFX installer config marker
    crit: component
    conf: 0.9
    for:
      - pe
    if:
      type: string_value
      substr: ;!@Install@!UTF-8!
  - id: high-code-entropy
    desc: High code section entropy (encrypted/packed
    crit: suspicious
    conf: 0.8
    attack: T1045
    if:
      type: metrics
      field: binary.code_entropy
      min: 7.0
    unless:
      - id: high-code-entropy-known-fps
      - type: raw
        regex: BSJB
    downgrade:
      any:
        - id: high-code-entropy-known-fps
  - id: high-entropy-regions
    desc: Multiple high entropy regions
    crit: suspicious
    conf: 0.75
    if:
      type: metrics
      field: binary.high_entropy_regions
      min: 8
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiled::go-runtime-marker
    downgrade:
      any:
        - type: section
          substr: .themida
  - id: entropy-variance-low
    desc: Low entropy variance (uniform packing)
    crit: notable
    conf: 0.4
    size_min: 65536
    if:
      type: metrics
      field: binary.entropy_variance
      min: 0.01
      max: 0.2
    unless:
      - type: raw
        regex: BSJB
  - id: wx-sections
    desc: Writable and executable sections (self-modifying
    crit: suspicious
    conf: 0.9
    attack: T1055
    size_max: 31457280
    size_min: 32768
    if:
      type: metrics
      field: binary.wx_sections
      min: 1
    unless:
      - id: metadata/binary/framework::asprotect
      - id: objectives/anti-static/pack/detect::upx-section
      - type: raw
        regex: (ApiSet Stub DLL|storport\.sys|ScsiMiniPort)
    downgrade:
      any:
        - id: metadata/binary/layout::rich-imported-low-entropy-layout
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature
        - type: string_value
          regex: (?i)(enigma.protector|ntoskrnl|WATCOM C/C|supR3Hardened)
        - type: metrics
          field: binary.overall_entropy
          max: 5
  - id: many-wx-sections
    desc: Multiple W+X sections (packer pattern)
    crit: suspicious
    conf: 0.95
    attack: T1045
    size_min: 32768
    if:
      type: metrics
      field: binary.wx_sections
      min: 2
    unless:
      - id: metadata/binary/framework::asprotect
      - id: objectives/anti-static/pack/detect/
    downgrade:
      any:
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature
        - id: objectives/anti-static/pack/detect::themida-section
        - type: string_value
          regex: (Enigma Protector|enigmaprotector)
        - id: metadata/lang/compiler/native::watcom-runtime
        - id: well-known/tools/reverse-engineering::ollydbg-executable-marker
  - id: high-section-name-entropy
    desc: High entropy section names (packer
    crit: notable
    conf: 0.85
    attack: T1045
    if:
      type: metrics
      field: binary.section_name_entropy
      min: 5.4
  - id: dominant-section
    desc: Single section dominates file (packer
    crit: notable
    conf: 0.6
    platforms:
      - linux
      - unix
      - windows
      - macos
    attack: T1045
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.9
    unless:
      - type: section
        regex: "^(UPX\\d|\\.upx)"
      - type: metrics
        field: binary.import_density
        max: 0
      - type: raw
        regex: BSJB
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/framework::large-rsrc-section
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
  - id: high-import-entropy
    desc: High entropy import names (obfuscated
    crit: suspicious
    conf: 0.8
    if:
      type: metrics
      field: binary.import_entropy
      min: 5.0
  - id: no-strings
    desc: No readable strings (potentially encrypted/packed)
    crit: baseline
    conf: 0.4
    size_min: 32768
    attack: T1045
    if:
      type: metrics
      field: binary.string_count
      min: 1
      max: 5
  - id: high-string-entropy
    desc: High entropy strings (encoded data)
    crit: suspicious
    conf: 0.8
    if:
      type: metrics
      field: binary.avg_string_entropy
      min: 5.0
  - id: many-high-entropy-strings
    desc: Many high entropy strings (embedded
    crit: suspicious
    conf: 0.85
    if:
      type: metrics
      field: binary.high_entropy_strings
      min: 10
    unless:
      - type: metrics
        field: binary.avg_string_entropy
        max: 3.2
      - type: metrics
        field: binary.function_count
        min: 500
      - type: section
        exact: '.rdata'
        length_min: 500000
    downgrade:
      all:
        - id: many-high-entropy-strings-known-fp
  - id: huge-functions
    desc: Has extremely large functions (>64KB)
    crit: suspicious
    conf: 0.75
    if:
      type: metrics
      field: binary.huge_functions
      min: 1
  - id: many-tiny-functions
    desc: Many tiny functions (<16 bytes)
    crit: notable
    conf: 0.4
    if:
      type: metrics
      field: binary.tiny_functions
      min: 500
  - id: small-avg-function
    desc: Very small average function size
    crit: notable
    conf: 0.4
    if:
      type: metrics
      field: binary.avg_function_size
      min: 1
      max: 32
    unless:
      - type: metrics
        field: binary.function_count
        max: 5
      - id: metadata/binary/framework::dotnet-assembly
  - id: high-avg-complexity
    desc: High average cyclomatic complexity (control
    crit: notable
    conf: 0.75
    attack: T1027.002
    size_max: 500000
    if:
      type: metrics
      field: binary.avg_complexity
      min: 55
    unless:
      - type: metrics
        field: binary.function_count
        max: 20
      - type: metrics
        field: binary.export_count
        min: 20
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: very-high-avg-complexity
    desc: Very high average complexity (heavy
    crit: notable
    conf: 0.85
    attack: T1027.002
    size_max: 500000
    if:
      type: metrics
      field: binary.avg_complexity
      min: 75
    unless:
      - type: metrics
        field: binary.function_count
        max: 20
      - type: metrics
        field: binary.export_count
        min: 20
  - id: high-function-count-200
    desc: High function count over 200
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: binary.function_count
      min: 200
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: high-string-count-1000
    desc: High string count over 1000
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: binary.string_count
      min: 1000
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: extreme-max-complexity
    desc: Extremely high max function complexity
    crit: notable
    conf: 0.7
    attack: T1027.002
    if:
      type: metrics
      field: binary.max_complexity
      min: 500
    unless:
      - id: objectives/anti-static/obfuscation/binary-metrics::large-dotnet-library
      - type: metrics
        field: binary.export_count
        min: 100
    downgrade:
      any:
        - type: metrics
          field: binary.function_count
          min: 1000
  - id: many-complex-functions
    desc: Many high complexity functions (>50
    crit: notable
    conf: 0.6
    attack: T1027.002
    if:
      type: metrics
      field: binary.high_complexity_functions
      min: 40
  - id: very-complex-functions
    desc: Has many very high complexity
    crit: notable
    conf: 0.7
    attack: T1027.002
    if:
      type: metrics
      field: binary.very_high_complexity_functions
      min: 5
  - id: many-basic-blocks
    desc: High basic blocks per function
    crit: notable
    conf: 0.55
    if:
      type: metrics
      field: binary.avg_basic_blocks
      min: 50
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
        - type: metrics
          field: binary.import_count
          min: 80
  - id: many-linear-functions
    desc: Many linear functions (possible VM
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: binary.linear_functions
      min: 50
  - id: recursive-functions
    desc: Has recursive functions
    crit: notable
    conf: 0.5
    if:
      type: metrics
      field: binary.recursive_functions
      min: 3
  - id: many-noreturn-functions
    desc: Many noreturn functions (anti-analysis pattern)
    crit: suspicious
    conf: 0.7
    if:
      type: metrics
      field: binary.noreturn_functions
      min: 20
  - id: large-stack-frames
    desc: Has functions with large stack
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: binary.large_stack_functions
      min: 3
  - id: huge-stack-frame
    desc: Extremely large max stack frame
    crit: suspicious
    conf: 0.7
    if:
      type: metrics
      field: binary.max_stack_frame
      min: 65536
  - id: high-avg-stack
    desc: High average stack frame size
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: binary.avg_stack_frame
      min: 2048
  - id: has-overlay
    desc: Binary has overlay data
    crit: component
    conf: 0.5
    for:
      - pe
      - dll
      - macho
    if:
      type: metrics
      field: binary.has_overlay
      min: 1
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - type: metrics
        field: binary.overlay_size
        max: 16384
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: metadata/binary/framework::dotnet-assembly
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: large-overlay
    desc: Large overlay relative to file
    crit: suspicious
    conf: 0.7
    for:
      - pe
      - dll
      - macho
    attack: T1027.009
    size_min: 131072
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.5
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/signed/platform::microsoft
      - id: metadata/package/versioning::dotnet-versioned-assembly
      - id: metadata/document/office::help2-container
      - id: metadata/binary/installer::known-benign-installer
    downgrade:
      any:
        - type: trait
          id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
  - id: high-entropy-overlay-raw
    desc: High entropy overlay data
    crit: component
    conf: 0.8
    for:
      - pe
      - dll
      - macho
    attack: T1027.009
    if:
      type: metrics
      field: binary.overlay_entropy
      min: 7.0
    unless:
      - type: metrics
        field: binary.overlay_size
        max: 16384
      - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
      - id: metadata/document/office::help2-container
  - id: large-overlay-size
    desc: Overlay large enough to contain payload
    crit: component
    conf: 0.7
    for:
      - pe
      - dll
      - macho
    if:
      type: metrics
      field: binary.overlay_size
      min: 81920
    unless:
      - id: metadata/document/office::help2-container
  - id: medium-overlay-size
    desc: Overlay large enough for stage data
    crit: component
    conf: 0.72
    for:
      - pe
      - dll
      - macho
    if:
      type: metrics
      field: binary.overlay_size
      min: 32768
    unless:
      - id: metadata/document/office::help2-container
  - id: repeated-padding-marker
    desc: Repeated padding marker string block
    crit: component
    conf: 0.82
    for:
      - pe
      - dll
    if:
      type: string_value
      substr: PADDINGXXPADDING
    unless:
      - type: string_value
        substr: <assembly xmlns="urn:schemas-microsoft-com:asm.v1"
  - id: high-string-density-large-pe
    desc: Large PE with dense string corpus
    crit: component
    conf: 0.82
    for:
      - pe
    size_min: 250000
    if:
      type: metrics
      field: binary.string_density
      min: 12.0
      min_size: 500000
composite_rules:
  - id: many-high-entropy-strings-known-fp
    desc: High entropy strings known false positive profile
    crit: component
    conf: 0.7
    all:
      - id: metadata/binary/metrics::many-imports
      - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-a
    any:
      - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-b
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::apple
      - id: metadata/binary/metrics::massive-executable
  - id: legitimate-microsoft-versioned-pe
    desc: Versioned Microsoft PE with normal import surface
    crit: component
    conf: 0.8
    all:
      - id: metadata/package/versioning::version-resource-metadata
      - id: metadata/binary/metrics::many-imports
    any:
      - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
      - id: metadata/vendor/microsoft::microsoft-corp-marker-rdata
  - id: high-code-entropy-known-fps
    desc: High code entropy known false positive profile
    crit: component
    conf: 0.7
    any:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/platform::apple
      - id: metadata/binary/framework::unity-player-framework
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
      - id: legitimate-microsoft-versioned-pe
  - id: large-dotnet-library
    desc: Large .NET library structure
    crit: component
    conf: 0.7
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/anti-static/obfuscation/binary-metrics::high-function-count-200
      - id: objectives/anti-static/obfuscation/binary-metrics::high-string-count-1000
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
      - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay-raw
      - id: objectives/anti-static/obfuscation/binary-metrics::high-import-entropy
  - id: signed-7zsfx-installer
    desc: Signed 7z self-extracting installer
    crit: component
    conf: 0.85
    for:
      - pe
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::7zsfx-config-marker
      - id: micro-behaviors/data/embedded/payload::7z-magic
      - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
  - id: binary-packed
    desc: Binary appears to be packed
    crit: suspicious
    conf: 0.9
    attack: T1045
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-overall-entropy
      - id: objectives/anti-static/obfuscation/binary-metrics::very-high-entropy
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
      - id: objectives/anti-static/obfuscation/binary-metrics::wx-sections
    unless:
      - id: metadata/file/magic::zip-archive
      - id: metadata/file/magic::gzip
      - type: raw
        regex: BSJB
    downgrade:
      any:
        - type: string_value
          substr: ;!@Install@!UTF-8!
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - type: raw
          substr: PECompac
        - type: string_value
          substr: "UPX executable packer"
  - id: binary-heavily-packed
    desc: Binary is heavily packed/encrypted
    crit: hostile
    conf: 0.95
    attack: T1045
    size_min: 20000
    needs: 3
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::very-high-entropy
      - id: objectives/anti-static/obfuscation/binary-metrics::no-strings
      - id: metadata/binary/metrics::no-functions
      - id: objectives/anti-static/obfuscation/binary-metrics::wx-sections
  - id: high-entropy-overlay
    desc: Large high-entropy overlay (encrypted payload)
    crit: suspicious
    conf: 0.8
    for:
      - pe
      - dll
      - macho
    attack: T1027.009
    unless:
      - id: metadata/document/office::help2-container
      - id: metadata/binary/installer::known-benign-installer
      - type: string_value
        exact: Software\WinRAR SFX
    all:
      - id: high-entropy-overlay-raw
      - id: large-overlay-size
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/binary-metrics::7zsfx-config-marker
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
        - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
  - id: binary-encrypted-overlay
    desc: Binary with encrypted overlay payload
    crit: notable
    conf: 0.85
    attack: T1027.009
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/signed/platform::microsoft
      - id: metadata/document/office::help2-container
      - id: objectives/anti-static/obfuscation/binary-metrics::7zsfx-config-marker
      - type: string_value
        exact: Software\WinRAR SFX
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::has-overlay
      - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay
    downgrade:
      any:
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
  - id: embedded-payload-padding-camouflage
    desc: Embedded payload with padding camouflage
    crit: notable
    conf: 0.84
    attack: T1027.009
    for:
      - pe
      - dll
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::repeated-padding-marker
      - id: micro-behaviors/data/embedded/payload::pe-magic-embedded
  - id: packer-signature
    desc: Packer signature pattern detected
    crit: suspicious
    conf: 0.9
    attack: T1045
    size_min: 20000
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-section-name-entropy
      - id: metadata/binary/metrics::few-sections
      - id: objectives/anti-static/obfuscation/binary-metrics::wx-sections
    unless:
      - id: objectives/anti-static/pack/detect::upx-section
      - id: objectives/anti-static/pack/detect::upx-marker
      - type: raw
        substr: PECompac
      - id: metadata/binary/layout::rich-imported-low-entropy-layout
      - type: metrics
        field: binary.import_count
        min: 80
    downgrade:
      any:
        - id: metadata/binary/framework::asprotect
        - id: metadata/lang/compiler/native::watcom-runtime
  - id: control-flow-obfuscation
    desc: Control flow obfuscation detected
    crit: suspicious
    conf: 0.85
    attack: T1027.002
    unless:
      - type: raw
        regex: BSJB
      - type: metrics
        field: binary.export_count
        min: 20
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-avg-complexity
      - id: objectives/anti-static/obfuscation/binary-metrics::many-complex-functions
      - id: objectives/anti-static/obfuscation/binary-metrics::many-basic-blocks
      - id: objectives/anti-static/obfuscation/binary-metrics::extreme-max-complexity
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/vendor/jetbrains::jetbrains-company-string
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
        - id: metadata/lang/compiler/native::vcruntime-import
        - type: symbol
          exact: "NtInitializeRegistry"
  - id: heavy-control-flow-obfuscation
    desc: Heavy control flow obfuscation
    crit: hostile
    conf: 0.9
    attack: T1027.002
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::very-high-avg-complexity
      - id: objectives/anti-static/obfuscation/binary-metrics::very-complex-functions
      - id: objectives/anti-static/obfuscation/binary-metrics::many-complex-functions
  - id: vm-based-obfuscation
    desc: VM-based obfuscation detected
    crit: notable
    conf: 0.9
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::very-high-avg-complexity
      - id: objectives/anti-static/obfuscation/binary-metrics::very-complex-functions
  - id: anti-analysis-pattern
    desc: Anti-analysis pattern detected
    crit: notable
    conf: 0.6
    needs: 3
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::many-noreturn-functions
      - id: objectives/anti-static/obfuscation/binary-metrics::many-complex-functions
      - id: metadata/binary/metrics::few-leaf-functions
      - id: objectives/anti-static/obfuscation/binary-metrics::large-stack-frames
  - id: pe-encrypted-overlay-dropper
    desc: PE dropper with encrypted overlay and evasion
    crit: hostile
    conf: 0.92
    attack: T1027.009
    for:
      - pe
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: objectives/anti-static/obfuscation/binary-metrics::7zsfx-config-marker
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
    all:
      - id: binary-encrypted-overlay
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
    needs: 1
    any:
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::runtime-api-decryption
      - id: objectives/evasion/anti-av/syscall::indirect-nt-api-self-injection
      - id: objectives/evasion/decoy/strings::multiple-compiler-decoys
