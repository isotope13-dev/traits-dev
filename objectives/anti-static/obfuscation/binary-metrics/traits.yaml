defaults:
  platforms:
    - linux
    - windows
    - macos
  for: [elf, macho, pe]
  attack: T1027
  mbc: B0032
traits:
  - id: ape-binary-marker
    desc: Cosmopolitan APE binary marker
    crit: component
    conf: 0.98
    for:
      - pe
      - macho
    if:
      type: hex
      pattern: 5F 5F 41 50 45 31
      offset_range:
        - 0
        - 4096
  - id: high-overall-entropy
    desc: High overall file entropy (likely
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.0
    unless:
      - id: metadata/file/magic::zip-archive
      - id: metadata/file/magic::gzip
      - id: metadata/binary/framework::dotnet-metadata
    downgrade:
      any:
        - type: text
          substr: ;!@Install@!UTF-8!
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature
        - id: metadata/file/magic::gzip
  - id: very-high-entropy
    desc: Very high entropy (strongly indicates
    crit: notable
    conf: 0.95
    attack: T1045
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.5
    unless:
      - id: metadata/file/magic::zip-archive
      - id: metadata/file/magic::gzip
      - id: metadata/lang/compiler/managed::versioned-vcl-app
    downgrade:
      any:
        - type: text
          substr: ;!@Install@!UTF-8!
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: metadata/file/magic::gzip
        - type: text
          substr: "UPX executable packer"
  - id: 7zsfx-config-marker
    desc: 7z SFX installer config marker
    crit: component
    conf: 0.9
    for:
      - pe
    if:
      type: text
      substr: ;!@Install@!UTF-8!
  - id: high-code-entropy
    desc: High code section entropy (encrypted/packed
    crit: suspicious
    conf: 0.8
    attack: T1045
    if:
      type: metrics
      field: binary.code_entropy
      min: 7.0
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: high-code-entropy-known-fps
  - id: high-entropy-regions
    desc: Multiple high entropy regions
    crit: suspicious
    conf: 0.75
    if:
      type: metrics
      field: binary.high_entropy_regions
      min: 8
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiled::go-runtime-marker
      - type: metrics
        field: binary.code_entropy
        max: 5.5
  - id: entropy-variance-low
    desc: Low entropy variance (uniform packing)
    crit: notable
    conf: 0.4
    size_min: 65536
    if:
      type: metrics
      field: binary.entropy_variance
      min: 0.01
      max: 0.2
    unless:
      - type: raw
        regex: BSJB
  - id: wx-sections
    desc: Writable and executable sections (self-modifying
    crit: notable
    conf: 0.9
    attack: T1055
    size_max: 31457280
    size_min: 32768
    if:
      type: metrics
      field: binary.wx_sections
      min: 1
    unless:
      - id: wx-sections-known-benign
      - id: sharpod-plugin-string
      - id: metadata/binary/layout::legacy-watcom-packed-utility
      - type: section
        writable: true
        executable: true
        length_max: 0
      - id: metadata/vendor/pash::zprotect-plugin
    downgrade:
      any:
        - id: wx-sections-soft-fp
  - id: many-wx-sections
    desc: Multiple W+X sections (packer pattern)
    crit: suspicious
    conf: 0.95
    attack: T1045
    size_min: 32768
    if:
      type: metrics
      field: binary.wx_sections
      min: 2
    unless:
      - id: wx-sections-known-benign
      - id: sharpod-plugin-string
      - id: metadata/binary/layout::legacy-watcom-packed-utility
    downgrade:
      any:
        - id: packed-single-function-wx-profile
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature
        - id: objectives/anti-static/pack/detect::themida-section
        - type: text
          regex: (Enigma Protector|enigmaprotector)
  - id: high-section-name-entropy
    desc: High entropy section names (packer
    crit: notable
    conf: 0.85
    attack: T1045
    if:
      type: metrics
      field: binary.section_name_entropy
      min: 5.4
  - id: dominant-section
    desc: Single section dominates file (packer
    crit: component
    conf: 0.6
    attack: T1045
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.9
    unless:
      - type: basename
        regex: \.(mun|rll)$
      - type: section
        regex: "^(UPX\\d|\\.upx)"
      - type: metrics
        field: binary.import_density
        max: 0
      - type: raw
        regex: BSJB
      - id: metadata/binary/layout::legacy-watcom-packed-utility
    downgrade:
      any:
        - id: dominant-section-known-benign
  - id: high-import-entropy
    desc: High entropy import names (obfuscated
    crit: suspicious
    conf: 0.8
    if:
      type: metrics
      field: binary.import_entropy
      min: 5.0
  - id: no-strings
    desc: No readable strings (potentially encrypted/packed)
    crit: baseline
    conf: 0.4
    size_min: 32768
    attack: T1045
    if:
      type: metrics
      field: binary.string_count
      min: 1
      max: 5

  # Large binary whose longest readable string is implausibly short.
  # A 512 KB+ binary with max_string_length <= 40 has encrypted all symbols
  # and error messages. Legitimate binaries this size routinely have version
  # strings, paths, and error messages well above 40 chars.
  - id: sparse-strings-large-binary
    desc: Short max string length in large binary
    crit: component
    conf: 0.75
    size_min: 524288
    if:
      type: metrics
      field: binary.max_string_length
      max: 40
    unless:
      - id: metadata/binary/framework::dotnet-metadata

  # Large binary where nearly all "strings" are noise fragments.
  # avg_string_length <= 6 means even the strings cleave finds are 3–5 char
  # garbage from binary data — no real content anywhere. For a binary with
  # substantial imports this is a near-certain sign of string encryption.
  - id: noisy-avg-string-length
    desc: Near-noise average string length in large binary
    crit: component
    conf: 0.75
    size_min: 524288
    if:
      type: metrics
      field: binary.avg_string_length
      max: 6.0
    unless:
      - id: metadata/binary/framework::dotnet-metadata

  - id: high-string-entropy
    desc: High entropy strings (encoded data)
    crit: suspicious
    conf: 0.8
    if:
      type: metrics
      field: binary.avg_string_entropy
      min: 5.0
    unless:
      - id: objectives/anti-static/obfuscation/binary-metrics::tree-sitter-grammar-library
  - id: many-high-entropy-strings
    desc: Many high entropy strings (embedded
    crit: suspicious
    conf: 0.85
    if:
      type: metrics
      field: binary.high_entropy_strings
      min: 20
    unless:
      - type: metrics
        field: binary.avg_string_entropy
        max: 3.2
      - type: metrics
        field: binary.function_count
        min: 500
      - type: section
        exact: '.rdata'
        length_min: 500000
      - type: metrics
        field: binary.string_count
        min: 10000
      - type: metrics
        field: binary.max_string_length
        min: 10000
    downgrade:
      all:
        - id: many-high-entropy-strings-known-fp
  - id: huge-functions
    desc: Has extremely large functions (>64KB)
    crit: suspicious
    conf: 0.75
    if:
      type: metrics
      field: binary.huge_functions
      min: 1
  - id: sharpod-plugin-string
    desc: SharpOD plugin identity string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: SharpOD Anti_Anti Debugger Plugin
  - id: many-tiny-functions
    desc: Many tiny functions (<16 bytes)
    crit: notable
    conf: 0.4
    if:
      type: metrics
      field: binary.tiny_functions
      min: 500
  - id: small-avg-function
    desc: Very small average function size
    crit: notable
    conf: 0.4
    size_min: 65536
    if:
      type: metrics
      field: binary.avg_function_size
      min: 1
      max: 32
    unless:
      - type: metrics
        field: binary.function_count
        max: 5
      - id: metadata/binary/framework::dotnet-assembly
  - id: high-avg-complexity
    desc: High average cyclomatic complexity (control
    crit: notable
    conf: 0.75
    attack: T1027.002
    size_max: 500000
    if:
      type: metrics
      field: binary.avg_complexity
      min: 55
    unless:
      - type: metrics
        field: binary.function_count
        max: 20
      - type: metrics
        field: binary.export_count
        min: 20
      - type: basename
        exact: UAC.exe
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: very-high-avg-complexity
    desc: Very high average complexity (heavy
    crit: notable
    conf: 0.85
    attack: T1027.002
    size_max: 500000
    if:
      type: metrics
      field: binary.avg_complexity
      min: 75
    unless:
      - type: metrics
        field: binary.function_count
        max: 20
      - type: metrics
        field: binary.export_count
        min: 20
  - id: tree-sitter-grammar-library
    desc: Tree-sitter parser grammar library
    crit: component
    conf: 0.99
    for:
      - elf
    if:
      type: symbol
      regex: ^tree_sitter_[a-z0-9_]+$
  - id: many-complex-functions
    desc: Many high complexity functions (>50
    crit: notable
    conf: 0.6
    attack: T1027.002
    if:
      type: metrics
      field: binary.high_complexity_functions
      min: 40
    downgrade:
      any:
        - id: metadata/binary/metrics::many-exports-200
        - id: metadata/signed/platform::microsoft-corporation
  - id: very-complex-functions
    desc: Has many very high complexity
    crit: notable
    conf: 0.7
    attack: T1027.002
    if:
      type: metrics
      field: binary.very_high_complexity_functions
      min: 5
  - id: many-basic-blocks
    desc: High basic blocks per function
    crit: notable
    conf: 0.55
    if:
      type: metrics
      field: binary.avg_basic_blocks
      min: 50
    unless:
      - type: metrics
        field: binary.function_count
        max: 20
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
        - type: metrics
          field: binary.import_count
          min: 80
  - id: many-linear-functions
    desc: Many linear functions (possible VM
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: binary.linear_functions
      min: 50
  - id: recursive-functions
    desc: Has recursive functions
    crit: notable
    conf: 0.5
    if:
      type: metrics
      field: binary.recursive_functions
      min: 3
  - id: many-noreturn-functions
    desc: Many noreturn functions (anti-analysis pattern)
    crit: suspicious
    conf: 0.7
    if:
      type: metrics
      field: binary.noreturn_functions
      min: 20
  - id: large-stack-frames
    desc: Has functions with large stack
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: binary.large_stack_functions
      min: 3
  - id: huge-stack-frame
    desc: Extremely large max stack frame
    crit: suspicious
    conf: 0.7
    if:
      type: metrics
      field: binary.max_stack_frame
      min: 65536
  - id: high-avg-stack
    desc: High average stack frame size
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: binary.avg_stack_frame
      min: 2048
  - id: has-overlay
    desc: Binary has overlay data
    crit: component
    conf: 0.5
    for:
      - pe
      - macho
    if:
      type: metrics
      field: binary.has_overlay
      min: 1
    unless:
      - id: has-overlay-known-benign
      - type: metrics
        field: binary.overlay_size
        max: 16384
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: metadata/binary/framework::dotnet-assembly
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: large-overlay
    desc: Large overlay relative to file
    crit: suspicious
    conf: 0.7
    for:
      - pe
      - macho
    attack: T1027.009
    size_min: 131072
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.5
    unless:
      - id: large-overlay-known-benign
      - id: cosmopolitan-marker
      - id: resource-hacker-marker
      - id: cosmopolitan-marker
    downgrade:
      any:
        - type: trait
          id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
  - id: high-entropy-overlay-raw
    desc: High entropy overlay data
    crit: component
    conf: 0.8
    for:
      - pe
      - macho
    attack: T1027.009
    if:
      type: metrics
      field: binary.overlay_entropy
      min: 7.0
    unless:
      - id: ape-binary-marker
      - type: metrics
        field: binary.overlay_size
        max: 16384
      - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
      - id: metadata/document/office::help2-container
      - id: metadata/binary/installer/script::nsis
      - id: objectives/anti-static/pack/detect::upx-section
  - id: compact-high-entropy-overlay
    desc: Compact high entropy overlay blob
    crit: component
    conf: 0.84
    for:
      - pe
    attack: T1027.009
    if:
      type: metrics
      field: binary.overlay_entropy
      min: 7.0
    unless:
      - type: metrics
        field: binary.overlay_size
        max: 255
      - type: metrics
        field: binary.overlay_size
        min: 4097
      - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
  - id: large-overlay-size
    desc: Overlay large enough to contain payload
    crit: component
    conf: 0.7
    for:
      - pe
      - macho
    if:
      type: metrics
      field: binary.overlay_size
      min: 81920
    unless:
      - id: large-overlay-size-known-benign
  - id: medium-overlay-size
    desc: Overlay large enough for stage data
    crit: component
    conf: 0.72
    for:
      - pe
      - macho
    if:
      type: metrics
      field: binary.overlay_size
      min: 32768
    unless:
      - id: metadata/document/office::help2-container
  - id: repeated-padding-marker
    desc: Repeated padding marker string block
    crit: component
    conf: 0.82
    for:
      - pe
    if:
      type: text
      substr: PADDINGXXPADDING
    unless:
      - type: text
        substr: <assembly xmlns="urn:schemas-microsoft-com:asm.v1"
  - id: high-string-density-large-pe
    desc: Large PE with dense string corpus
    crit: component
    conf: 0.82
    for:
      - pe
    size_min: 250000
    if:
      type: metrics
      field: binary.string_density
      min: 12.0
      min_size: 500000
  - id: file-size-1m-plus
    desc: Binary is 1MB or larger
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: binary.file_size
      min: 1048576
  - id: cosmopolitan-marker
    desc: Cosmopolitan runtime marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "Cosmopolitan "
  - id: function-count-1000-plus
    desc: Binary has 1000 or more functions
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: binary.function_count
      min: 1000
  - id: nt-initialize-registry-symbol
    desc: NtInitializeRegistry symbol present
    crit: component
    conf: 1.0
    if:
      type: symbol
      exact: "NtInitializeRegistry"
  - id: options-usage-string
    desc: Options usage text
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "Usage: %s [OPTIONS]"
  - id: options-accepted-string
    desc: Options accepted help text
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "The following OPTIONS are accepted:"
  - id: obsidium-software-marker
    desc: Obsidium software marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Obsidium Software"
  - id: windows-production-pca-2011-string
    desc: Windows Production PCA 2011 string
    crit: component
    conf: 0.7
    if:
      type: text
      regex: Microsoft Windows( Production PCA 2011)?
  - id: resource-hacker-marker
    desc: Resource Hacker marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Resource Hacker
  - id: uefi-driver-ntfs-debug-path
    desc: UEFI NTFS debug path
    crit: component
    conf: 0.7
    if:
      type: text
      substr: "uefi-driver/uefi_driver/DEBUG/ntfs.dll"
  - id: inno-setup-data-marker
    desc: Inno Setup data marker
    crit: component
    conf: 0.95
    for:
      - pe
    if:
      type: text
      substr: Inno Setup Setup Data (
  - id: inno-setup-installer-marker
    desc: Inno Setup installer text marker
    crit: component
    conf: 0.95
    for:
      - pe
    if:
      type: text
      substr: This installation was built with Inno Setup.
composite_rules:
  # Both max and avg string length are implausibly short in a substantial binary.
  # Either alone can appear in stripped helper binaries; both together means
  # the packer/implant has encrypted all string content — extremely rare in benign code.
  - id: encrypted-strings-large-binary
    desc: Both max and avg string length near-noise
    crit: suspicious
    conf: 0.88
    all:
      - id: sparse-strings-large-binary
      - id: noisy-avg-string-length
    unless:
      - id: metadata/binary/framework::dotnet-metadata

  - id: has-overlay-known-benign
    desc: Benign overlay-bearing binary context
    crit: component
    conf: 0.95
    any:
      - id: metadata/binary/resource::resource-only-dll
      - id: ape-binary-marker
  - id: large-overlay-known-benign
    desc: Benign large overlay binary context
    crit: component
    conf: 0.95
    any:
      - id: cosmopolitan-marker
      - id: inno-setup-data-marker
      - id: inno-setup-installer-marker
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/developer::martin-tofall
      - id: metadata/signed/developer::valve-corp.
      - id: metadata/binary/layout::jar-manifest-marker
      - id: metadata/file/magic::zip-archive
      - id: overlay-dominant-importless-blob
      - id: metadata/binary/resource::resource-only-dll
      - id: resource-hacker-marker
      - id: metadata/package/versioning::dotnet-versioned-assembly
      - id: metadata/document/office::help2-container
      - id: metadata/binary/installer::known-benign-installer
      - id: objectives/anti-static/obfuscation/binary-metrics::7zsfx-config-marker
      - id: ape-binary-marker
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
  - id: large-overlay-size-known-benign
    desc: Benign large overlay size context
    crit: component
    conf: 0.95
    any:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/developer::valve-corp.
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/document/office::help2-container
      - id: ape-binary-marker
  - id: signed-payload-overlay
    desc: Signed PE with high entropy payload overlay
    crit: suspicious
    conf: 0.95
    for:
      - pe
    all:
      - id: large-overlay
      - id: high-entropy-overlay-raw
      - id: large-overlay-size
    any:
      - id: metadata/binary/layout::pe-signature-present
      - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
    unless:
      - id: metadata/binary/installer::known-benign-installer
  - id: overlay-dominant-importless-blob
    desc: Overlay-dominant PE blob lacks code context
    crit: component
    conf: 0.9
    all:
      - id: metadata/binary/layout::overlay-dominates-third
      - id: metadata/binary/symbols::few-import-count
      - id: objectives/anti-static/obfuscation/imports::extremely-low-strings
  - id: upx-identified-artifact
    desc: UPX sections or marker present
    crit: component
    conf: 1.0
    any:
      - id: objectives/anti-static/pack/detect::upx-section
      - id: objectives/anti-static/pack/detect::upx-marker
  - id: many-high-entropy-strings-known-fp
    desc: High entropy strings known false positive profile
    crit: component
    conf: 0.7
    all:
      - id: metadata/binary/metrics::many-imports
      - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-a
    any:
      - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-b
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::apple
      - id: metadata/binary/metrics::massive-executable
  - id: legitimate-microsoft-versioned-pe
    desc: Versioned Microsoft PE with normal import surface
    crit: component
    conf: 0.8
    all:
      - id: metadata/package/versioning::version-resource-metadata
      - id: metadata/binary/metrics::many-imports
    any:
      - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
      - id: metadata/vendor/microsoft::microsoft-corp-marker-rdata
  - id: dominant-section-known-benign
    desc: Dominant section benign packer profile
    crit: component
    conf: 0.8
    any:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::large-rsrc-section
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
      - id: metadata/vendor/pash::zprotect-plugin
  - id: encrypted-loader-overlay
    desc: High entropy overlay attached to packed loader
    crit: suspicious
    conf: 0.92
    all:
      - id: compact-high-entropy-overlay
    any:
      - id: metadata/hardening/memory::wx-section
      - id: objectives/anti-static/obfuscation/imports::peb-ldr-access
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
  - id: high-code-entropy-known-fps
    desc: High code entropy known false positive profile
    crit: component
    conf: 0.7
    any:
      - id: metadata/signed/developer::martin-tofall
      - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
      - id: obsidium-software-marker
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/platform::apple
      - id: metadata/binary/framework::unity-player-framework
      - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
      - id: legitimate-microsoft-versioned-pe
      - id: windows-production-pca-2011-string
      - id: uefi-driver-ntfs-debug-path
  - id: wx-sections-known-benign
    desc: WX section known benign profile
    crit: component
    conf: 0.7
    any:
      - id: metadata/binary/framework::asprotect
      - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
      - id: objectives/anti-static/obfuscation/binary-metrics::upx-identified-artifact
      - id: metadata/package::apiset-stub
      - id: objectives/anti-static/obfuscation/binary-structure::scsi-miniport-string
      - id: objectives/anti-static/obfuscation/binary-structure::kernel-driver-string
      - id: metadata/lang/compiler/managed::versioned-vcl-app
      - id: sharpod-plugin-string
  - id: wx-sections-soft-fp
    desc: WX section downgrade profile
    crit: component
    conf: 0.7
    any:
