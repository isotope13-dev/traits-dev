# A minimal managed PE that presents a stock template identity and a process
# launcher reference is materially different from an ordinary sparse-import
# .NET application when its build timestamp is also anomalous.  Keep the
# structural pieces in metadata and reserve the hostile conclusion for this
# multi-signal objective rule.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027

composite_rules:
  - id: future-dated-minimal-dotnet-launcher
    desc: Future-dated minimal .NET launcher with template resources
    crit: hostile
    conf: 0.96
    attack: T1027,T1036.005,T1106
    mbc: B0032
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/build/manifest::pe-manifest-myapplication-template
      - id: metadata/binary/resource::pe-version-and-manifest-only
      - id: metadata/binary/anomaly/provenance::pe-far-future-timestamp
      - id: micro-behaviors/process/create/launch::create-process-api-name
    unless:
      - id: metadata/signed/platform/
