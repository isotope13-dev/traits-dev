defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: import-count-under-80
    desc: Large PE with under eighty imports
    # Component-only: the import count alone doesn't indicate obfuscation —
    # every stripped Go/Rust/Zig binary has a small direct-import table.
    # Only meaningful when paired with packed-loader geometry inside a
    # composite (see `staged/windows.yaml::staged-loader`).
    crit: component
    conf: 0.84
    size_min: 524288
    if:
      type: metrics
      field: binary.import_count
      max: 80
    unless:
      - type: metrics
        field: pe.is_dotnet
        min: 1
      - type: raw
        substr: BSJB
      - type: metrics
        field: binary.export_count
        min: 50
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: recovered-function-count-under-10
    desc: Very few recovered functions in large PE
    crit: component
    conf: 0.92
    size_min: 524288
    if:
      type: metrics
      field: binary.function_count
      max: 10
    unless:
      - type: metrics
        field: pe.is_dotnet
        min: 1
      - id: metadata/binary/installer/sfx::winrar-sfx
      - type: metrics
        field: binary.overlay_ratio
        min: 0.5
      - type: metrics
        field: binary.import_count
        min: 100
      - type: metrics
        field: pe.rich_header_present
        min: 1
      - type: section
        exact: '.rdata'
        length_min: 500000
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
  - id: function-count-under-2
    desc: Large PE has at most two functions
    crit: component
    conf: 0.9
    size_min: 262144
    if:
      type: metrics
      field: binary.function_count
      max: 2
    unless:
      - type: metrics
        field: pe.is_dotnet
        min: 1
      - type: raw
        substr: BSJB
      - id: metadata/binary/installer/script::nsis
      - type: metrics
        field: pe.rich_header_present
        min: 1
      - type: metrics
        field: binary.import_count
        min: 100
      - type: metrics
        field: binary.string_count
        min: 500
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
  - id: import-count-over-120
    desc: Large PE imports over 120
    crit: component
    conf: 0.88
    size_min: 262144
    if:
      type: metrics
      field: binary.import_count
      min: 120
  - id: code-data-ratio-below-008
    desc: PE code-to-data ratio below 0.08
    crit: component
    conf: 0.9
    size_min: 262144
    if:
      type: metrics
      field: binary.code_to_data_ratio
      max: 0.08
    unless:
      - type: metrics
        field: pe.is_dotnet
        min: 1
      - id: metadata/signed/platform::microsoft
      - type: metrics
        field: binary.export_count
        min: 50
composite_rules:
  - id: sparse-import-packed-loader-windows-loader
    desc: Sparse-import packed PE loader
    crit: suspicious
    conf: 0.97
    all:
      - id: import-count-under-80
      - id: recovered-function-count-under-10
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-data-geometry
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: import-heavy-packed-loader
    desc: Import-heavy packed PE loader
    crit: suspicious
    conf: 0.97
    all:
      - id: function-count-under-2
      - id: import-count-over-120
      - id: code-data-ratio-below-008
    any:
      - id: metadata/binary/section/metrics::random-section-packed-layout
      - id: objectives/anti-static/obfuscation::chromium-decoy-stuffing
      - id: metadata/package/versioning::version-resource-external-ip-only
