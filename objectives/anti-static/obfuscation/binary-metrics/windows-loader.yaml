defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: import-count-under-80
    desc: Large PE with under eighty imports
    crit: notable
    conf: 0.84
    size_min: 524288
    if:
      type: metrics
      field: binary.import_count
      max: 80
    unless:
      - type: metrics
        field: pe.is_dotnet
        min: 1
      - type: metrics
        field: binary.export_count
        min: 50
  - id: recovered-function-count-under-10
    desc: Very few recovered functions in large PE
    crit: suspicious
    conf: 0.92
    size_min: 524288
    if:
      type: metrics
      field: binary.function_count
      max: 10
    unless:
      - type: metrics
        field: pe.is_dotnet
        min: 1
      - id: metadata/binary/section::benign-large-rdata-layout
      - id: metadata/format/installer::winrar-sfx
      - type: metrics
        field: binary.overlay_ratio
        min: 0.5
      - type: metrics
        field: binary.import_count
        min: 100
composite_rules:
  - id: sparse-import-packed-loader-windows-loader
    desc: Sparse-import packed PE loader
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/quality/metrics::import-count-under-80
      - id: metadata/quality/metrics::recovered-function-count-under-10
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-data-geometry
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
