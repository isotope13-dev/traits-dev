# Detects large binaries with abnormally low overall entropy but normal code entropy,
# which is a strong indicator of artificial padding or structure manipulation.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: large-low-entropy-tls-callbacks
    desc: Large artificially padded PE with multiple TLS callbacks
    crit: hostile
    conf: 0.95
    size_min: 5242880 # >5MB
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::artificially-low-entropy
      - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-multi-callbacks
      - id: metadata/binary/metrics/structural::normal-code-entropy
    unless:
      - id: metadata/signed/platform::microsoft
