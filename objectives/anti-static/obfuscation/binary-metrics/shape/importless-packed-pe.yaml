defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.002

composite_rules:
- id: importless-writable-entry-packed-pe
  desc: Importless high-entropy PE with writable entry
  crit: hostile
  conf: 0.98
  attack: T1027,T1620
  all:
  - id: metadata/binary/metrics/structural::no-imports
  - id: metadata/binary/metrics/threshold::high-overall-entropy-binary
  - id: objectives/anti-static/pack/upx::entry-in-writable-section
  - id: metadata/binary/layout::pe-checksum-zeroed
  unless:
  - id: metadata/signed/platform
  - id: metadata/binary/framework::dotnet-metadata

- id: four-section-opaque-pe-loader
  desc: Four-section PE with opaque high-entropy code
  crit: hostile
  conf: 0.96
  all:
  - id: metadata/binary/metrics/structural::four-section-pe
  - id: metadata/binary/metrics/threshold::high-overall-entropy-binary
  - id: metadata/binary/layout::pe-checksum-zeroed
  - id: metadata/binary/metrics/structural::high-code-entropy
  unless:
  - id: metadata/signed/platform
  - id: metadata/binary/framework::dotnet-metadata

- id: two-section-importless-pe-loader
  desc: Two-section importless high-entropy PE loader
  crit: hostile
  conf: 0.96
  attack: T1027,T1620
  all:
  - id: metadata/binary/metrics/structural::no-imports
  - id: metadata/binary/metrics/threshold::high-overall-entropy-binary
  - id: objectives/anti-static/pack/upx::entry-in-writable-section
  - id: metadata/binary/layout::pe-checksum-zeroed
  - id: metadata/binary/metrics/structural::few-sections
  unless:
  - id: metadata/signed/platform
  - id: metadata/binary/framework::dotnet-metadata
