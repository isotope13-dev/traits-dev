defaults:
  platforms:
  - linux
  - windows
  - macos
  for: [elf, macho, pe]
  attack: T1027
  mbc: B0032
traits:
- id: high-overall-entropy
  desc: High overall file entropy
  crit: notable
  conf: 0.85
  if:
    type: metrics
    field: binary.overall_entropy
    min: 7.0
  unless:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/framework/
  - id: metadata/binary/layout::svk-packed-section
  downgrade:
    any:
    - id: objectives/anti-static/obfuscation/binary-metrics/shape/
    - id: well-known/app/protected-benign-pe/
    - id: metadata/signed/developer::battleye-innovations-e.k.
- id: very-high-entropy
  desc: Very high overall file entropy
  crit: notable
  conf: 0.95
  attack: T1045
  if:
    type: metrics
    field: binary.overall_entropy
    min: 7.5
  unless:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape/
  - id: metadata/binary/installer/family/
  - id: metadata/lang/compiler/managed::versioned-vcl-app
  - id: metadata/binary/layout::svk-packed-section
  - id: metadata/signed/developer::battleye-innovations-e.k.
  downgrade:
    any:
    - id: objectives/anti-static/obfuscation/binary-metrics/shape/
    - id: well-known/app/protected-benign-pe/
- id: high-entropy-regions
  desc: Multiple high entropy regions
  crit: suspicious
  conf: 0.75
  if:
    type: metrics
    field: binary.high_entropy_regions
    min: 8
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiled/
  - id: objectives/anti-static/obfuscation/binary-metrics/shape/
  - type: metrics
    field: binary.code_entropy
    max: 5.5
- id: upx-many-wx-sections
  desc: UPX-like many WX sections
  crit: component
  conf: 0.82
  for:
  - pe
  if:
    type: metrics
    field: sections.executable_writable_count
    min: 10
- id: entropy-variance-low
  desc: Low entropy variance (uniform packing)
  crit: notable
  conf: 0.4
  size_min: 65536
  if:
    type: metrics
    field: binary.entropy_variance
    min: 0.01
    max: 0.2
  unless:
  - id: well-known/app/discord-chat-exporter/
  - type: path
    regex: '(?i)DiscordChatExporter'
  - id: metadata/binary/framework::dotnet-metadata
  - id: well-known/app/drivers/
  - id: well-known/lib/tcl-tk::tcl-tk-runtime-component
  - id: well-known/lib/cpython::cpython-runtime-dll
- id: wx-sections
  desc: "Writable and executable sections"
  crit: component
  conf: 0.9
  attack: T1055
  size_max: 31457280
  size_min: 32768
  if:
    type: metrics
    field: sections.executable_writable_count
    min: 1
  unless:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape/
  - id: metadata/binary/layout::legacy-watcom-packed-utility
  - type: section
    writable: true
    executable: true
    length_max: 0
  - id: well-known/tool/dual-use/zprotect/
  downgrade:
    any:
    - id: objectives/anti-static/obfuscation/binary-metrics/shape/
- id: many-wx-sections
  desc: Multiple W+X sections (packer pattern)
  crit: component
  conf: 0.95
  attack: T1045
  size_min: 32768
  if:
    type: metrics
    field: sections.executable_writable_count
    min: 2
  unless:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape/
  - id: metadata/binary/layout::legacy-watcom-packed-utility
  - id: metadata/binary/symbols/exports/
  - id: metadata/binary/layout::svk-packed-section
  downgrade:
    any:
    - id: objectives/anti-static/obfuscation/binary-metrics/shape/
    - id: objectives/anti-static/obfuscation/binary-metrics/shape/
- id: high-section-name-entropy
  desc: High entropy section names
  crit: suspicious
  conf: 0.85
  attack: T1045
  if:
    type: metrics
    field: binary.section_name_entropy
    min: 5.4
- id: dominant-section
  desc: Single section dominates file
  crit: component
  conf: 0.6
  attack: T1045
  if:
    type: metrics
    field: binary.largest_section_ratio
    min: 0.9
  unless:
  - type: basename
    regex: (^vmlinuz$|\.(ko(\.zst)?|mun|rll)$)
  - type: section
    regex: "^(UPX\\d|\\.upx)"
  - type: metrics
    field: binary.import_density
    max: 0
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/layout::legacy-watcom-packed-utility
  - id: metadata/binary/metrics/threshold::many-exports-20
  downgrade:
    any:
    - id: objectives/anti-static/obfuscation/binary-metrics/shape/
- id: high-import-entropy
  desc: High entropy import names (obfuscated
  crit: suspicious
  conf: 0.8
  if:
    type: metrics
    field: binary.import_entropy
    min: 5.0
- id: no-strings
  desc: "No readable strings"
  crit: baseline
  conf: 0.4
  size_min: 32768
  attack: T1045
  if:
    type: metrics
    field: binary.string_count
    min: 1
    max: 5

  # Large binary whose longest readable string is implausibly short.
  # A 512 KB+ binary with max_string_length <= 40 has encrypted all symbols
  # and error messages. Legitimate binaries this size routinely have version
  # strings, paths, and error messages well above 40 chars.
- id: sparse-strings-large-binary
  desc: Short max string length in large binary
  crit: component
  conf: 0.75
  size_min: 524288
  if:
    type: metrics
    field: binary.max_string_length
    max: 40
  unless:
  - id: metadata/binary/framework::dotnet-metadata

  # Large binary where nearly all "strings" are noise fragments.
  # avg_string_length <= 6 means even the strings cleave finds are 3–5 char
  # garbage from binary data — no real content anywhere. For a binary with
  # substantial imports this is a near-certain sign of string encryption.
- id: noisy-avg-string-length
  desc: "Near-noise average length in large binary"
  crit: component
  conf: 0.75
  size_min: 524288
  if:
    type: metrics
    field: binary.avg_string_length
    max: 6.0
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: well-known/app/drivers::gsp-firmware-binary-path
  - id: metadata/binary/section/name::fwimage-section

- id: high-string-entropy
  desc: High entropy strings (encoded data)
  crit: suspicious
  conf: 0.8
  if:
    type: metrics
    field: binary.avg_string_entropy
    min: 5.0
  unless:
  - id: well-known/lib/tree-sitter::tree-sitter-grammar-library
- id: many-high-entropy-strings
  desc: Many high-entropy strings in binary
  crit: suspicious
  conf: 0.85
  if:
    type: metrics
    field: binary.high_entropy_string_count
    min: 20
  unless:
  - type: metrics
    field: binary.avg_string_entropy
    max: 3.2
  - type: metrics
    field: functions.count
    min: 500
  - type: section
    exact: '.rdata'
    length_min: 500000
  - type: metrics
    field: binary.string_count
    min: 10000
  - type: metrics
    field: binary.max_string_length
    min: 10000
  - id: well-known/app/txtconverter::signed-installer-context
  downgrade:
    all:
    - id: objectives/anti-static/obfuscation/binary-metrics/shape/
- id: many-tiny-functions
  desc: Many tiny functions (<16 bytes)
  crit: notable
  conf: 0.4
  if:
    type: metrics
    field: binary.tiny_func_count
    min: 500
  unless:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape/
- id: small-avg-function
  desc: Very small average function size
  crit: notable
  conf: 0.4
  size_min: 65536
  if:
    type: metrics
    field: binary.avg_func_size
    min: 1
    max: 32
  unless:
  - type: metrics
    field: functions.count
    max: 5
  - id: metadata/binary/framework/
  - id: metadata/lang/compiler/systems/
  - id: well-known/app/hopenpgp-tools/
  - type: basename
    substr: hopenpgp-tools
  - type: basename
    regex: '[\\/]h(op|ot|kt|okey)$'
- id: high-max-complexity
  desc: High maximum function complexity (obfuscation)
  crit: notable
  conf: 0.7
  attack: T1027.002
  if:
    type: trait
    id: metadata/binary/metrics/structural::high-max-complexity
  unless:
  - id: well-known/app/cvte-crashrpt/
  - id: well-known/tool/sysadmin/busybox::busybox-binary
  downgrade:
    any:
    - id: metadata/signed/developer::cisco-systems
    - id: metadata/signed/leaf::cisco-systems-inc.
- id: high-avg-complexity
  desc: High average cyclomatic complexity
  crit: notable
  conf: 0.75
  attack: T1027.002
  size_max: 500000
  if:
    type: metrics
    field: binary.avg_complexity
    min: 55
  unless:
  - type: metrics
    field: functions.count
    max: 20
  - type: metrics
    field: exports.count
    min: 20
  - id: metadata/file/extension/identity::uac-exe-basename
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: very-high-avg-complexity
  desc: Very high average cyclomatic complexity
  crit: notable
  conf: 0.85
  attack: T1027.002
  size_max: 500000
  if:
    type: metrics
    field: binary.avg_complexity
    min: 75
  unless:
  - type: metrics
    field: functions.count
    max: 20
  - type: metrics
    field: exports.count
    min: 20
- id: many-complex-functions
  desc: Many high complexity functions (>80)
  crit: baseline
  conf: 0.6
  attack: T1027.002
  if:
    type: metrics
    field: binary.high_complexity_func_count
    min: 80
  downgrade:
    any:
    - id: metadata/binary/metrics/threshold::many-exports-200
    - id: metadata/signed/platform::microsoft-corporation
    - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
  unless:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape/
  - id: metadata/binary/framework/
  - type: basename
    exact: urlmon.dll
  - id: metadata/signed/platform::apple
- id: very-complex-functions
  desc: Has many very high complexity
  crit: suspicious
  conf: 0.7
  attack: T1027.002
  if:
    type: metrics
    field: binary.very_high_complexity_func_count
    min: 5
  unless:
  - id: metadata/signed/platform::apple
- id: many-basic-blocks
  desc: High basic blocks per function
  crit: notable
  conf: 0.55
  if:
    type: metrics
    field: binary.avg_basic_blocks
    min: 50
  unless:
  - type: metrics
    field: functions.count
    max: 20
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - type: metrics
      field: imports.count
      min: 80
- id: many-linear-functions
  desc: Many linear functions (possible VM
  crit: suspicious
  conf: 0.6
  if:
    type: metrics
    field: binary.linear_func_count
    min: 50
- id: recursive-functions
  desc: Has recursive functions
  crit: suspicious
  conf: 0.5
  if:
    type: metrics
    field: binary.recursive_func_count
    min: 3
- id: many-noreturn-functions
  desc: "Many noreturn funcs (anti-analysis pattern)"
  crit: suspicious
  conf: 0.7
  if:
    type: metrics
    field: binary.noreturn_func_count
    min: 20
- id: large-stack-frames
  desc: Has functions with large stack
  crit: suspicious
  conf: 0.6
