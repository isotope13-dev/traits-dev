  conf: 0.84
  for:
  - pe
  attack: T1027.009
  if:
    id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay-raw
  unless:
  - type: metrics
    field: binary.overlay_size
    max: 255
  - type: metrics
    field: binary.overlay_size
    min: 4097
  - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
- id: large-overlay-size
  desc: Overlay large enough to contain payload
  crit: component
  conf: 0.7
  for:
  - pe
  - macho
  if:
