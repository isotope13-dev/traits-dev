  unless:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape/
- id: macho-small-overlay-ratio
  desc: Mach-O small overlay ratio
  crit: component
  conf: 0.85
  for:
  - macho
  if:
    type: metrics
    field: binary.overlay_ratio
