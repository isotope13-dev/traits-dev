defaults:
  platforms:
  - linux
  - windows
  - macos
  for: [elf, macho, pe]
  attack: T1027
  mbc: B0032
traits:
- id: high-overall-entropy
  desc: High overall file entropy
  crit: notable
  conf: 0.85
  if:
    type: metrics
    field: binary.overall_entropy
    min: 7.0
  unless:
  - id: compressed-file-magic
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/framework::dotnet-metadata-fallback
  - id: metadata/binary/layout::svk-packed-section
  downgrade:
    any:
    - id: benign-packed-entropy-context
    - id: well-known/app/protected-benign-pe/
    - id: metadata/signed/developer::battleye-innovations-e.k.
- id: very-high-entropy
  desc: Very high overall file entropy
  crit: suspicious
  conf: 0.95
  attack: T1045
  if:
    type: metrics
    field: binary.overall_entropy
    min: 7.5
  unless:
  - id: compressed-file-magic
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/lang/compiler/managed::versioned-vcl-app
  - id: metadata/binary/layout::svk-packed-section
  - id: metadata/signed/developer::battleye-innovations-e.k.
  downgrade:
    any:
    - id: benign-packed-entropy-context
    - id: well-known/app/protected-benign-pe/
- id: high-code-entropy
  desc: High code section entropy (encrypted/packed
  crit: suspicious
  conf: 0.8
  attack: T1045
  if:
    type: metrics
    field: binary.code_entropy
    min: 7.0
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/binary/metrics/pe-details::high-code-entropy-go
  - id: high-code-entropy-known-fps
  - id: metadata/signed/platform::microsoft-corporation
- id: high-entropy-regions
  desc: Multiple high entropy regions
  crit: suspicious
  conf: 0.75
  if:
    type: metrics
    field: binary.high_entropy_regions
    min: 8
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiled::go-runtime-marker
  - id: upx-many-section-high-entropy-profile
  - type: metrics
    field: binary.code_entropy
    max: 5.5
- id: upx-many-wx-sections
  desc: UPX-like many WX sections
  crit: component
  conf: 0.82
  for:
  - pe
  if:
    type: metrics
    field: sections.executable_writable_count
    min: 10
- id: entropy-variance-low
  desc: Low entropy variance (uniform packing)
  crit: suspicious
  conf: 0.4
  size_min: 65536
  if:
    type: metrics
    field: binary.entropy_variance
    min: 0.01
    max: 0.2
  unless:
  - type: raw
    regex: BSJB
- id: wx-sections
  desc: Writable and executable sections (self-modifying
  crit: component
  conf: 0.9
  attack: T1055
  size_max: 31457280
  size_min: 32768
  if:
    type: metrics
    field: sections.executable_writable_count
    min: 1
  unless:
  - id: wx-sections-known-benign
  - id: metadata/binary/layout::legacy-watcom-packed-utility
  - type: section
    writable: true
    executable: true
    length_max: 0
  - id: well-known/tool/dual-use/zprotect::zprotect-plugin
  downgrade:
    any:
    - id: wx-sections-soft-fp
- id: many-wx-sections
  desc: Multiple W+X sections (packer pattern)
  crit: component
  conf: 0.95
  attack: T1045
  size_min: 32768
  if:
    type: metrics
    field: sections.executable_writable_count
    min: 2
  unless:
  - id: wx-sections-known-benign
  - id: metadata/binary/layout::legacy-watcom-packed-utility
  - id: metadata/binary/symbols/exports::total-commander-packer-plugin
  - id: metadata/binary/layout::svk-packed-section
  downgrade:
    any:
    - id: packed-single-function-wx-profile
    - id: wx-sections-soft-fp
- id: high-section-name-entropy
  desc: High entropy section names (packer
  crit: suspicious
  conf: 0.85
  attack: T1045
  if:
    type: metrics
    field: binary.section_name_entropy
    min: 5.4
- id: dominant-section
  desc: Single section dominates file (packer
  crit: component
  conf: 0.6
  attack: T1045
  if:
    type: metrics
    field: binary.largest_section_ratio
    min: 0.9
  unless:
  - type: basename
    regex: \.(mun|rll)$
  - type: section
    regex: "^(UPX\\d|\\.upx)"
  - type: metrics
    field: binary.import_density
    max: 0
  - type: raw
    regex: BSJB
  - id: metadata/binary/layout::legacy-watcom-packed-utility
  - id: metadata/binary/metrics/threshold::many-exports-20
  downgrade:
    any:
    - id: dominant-section-known-benign
- id: high-import-entropy
  desc: High entropy import names (obfuscated
  crit: suspicious
  conf: 0.8
  if:
    type: metrics
    field: binary.import_entropy
    min: 5.0
- id: no-strings
  desc: No readable strings (potentially encrypted/packed)
  crit: baseline
  conf: 0.4
  size_min: 32768
  attack: T1045
  if:
    type: metrics
    field: binary.string_count
    min: 1
    max: 5

  # Large binary whose longest readable string is implausibly short.
  # A 512 KB+ binary with max_string_length <= 40 has encrypted all symbols
  # and error messages. Legitimate binaries this size routinely have version
  # strings, paths, and error messages well above 40 chars.
- id: sparse-strings-large-binary
  desc: Short max string length in large binary
  crit: component
  conf: 0.75
  size_min: 524288
  if:
    type: metrics
    field: binary.max_string_length
    max: 40
  unless:
  - id: metadata/binary/framework::dotnet-metadata

  # Large binary where nearly all "strings" are noise fragments.
  # avg_string_length <= 6 means even the strings cleave finds are 3–5 char
  # garbage from binary data — no real content anywhere. For a binary with
  # substantial imports this is a near-certain sign of string encryption.
- id: noisy-avg-string-length
  desc: Near-noise average string length in large binary
  crit: component
  conf: 0.75
  size_min: 524288
  if:
    type: metrics
    field: binary.avg_string_length
    max: 6.0
  unless:
  - id: metadata/binary/framework::dotnet-metadata

- id: high-string-entropy
  desc: High entropy strings (encoded data)
  crit: suspicious
  conf: 0.8
  if:
    type: metrics
    field: binary.avg_string_entropy
    min: 5.0
  unless:
  - id: well-known/lib/tree-sitter::tree-sitter-grammar-library
- id: many-high-entropy-strings
  desc: Many high entropy strings (embedded
  crit: suspicious
  conf: 0.85
  if:
    type: metrics
    field: binary.high_entropy_string_count
    min: 20
  unless:
  - type: metrics
    field: binary.avg_string_entropy
    max: 3.2
  - type: metrics
    field: binary.func_count
    min: 500
  - type: section
    exact: '.rdata'
    length_min: 500000
  - type: metrics
    field: binary.string_count
    min: 10000
  - type: metrics
    field: binary.max_string_length
    min: 10000
  downgrade:
    all:
    - id: many-high-entropy-strings-known-fp
- id: huge-functions
  desc: Has extremely large functions (>64KB)
  crit: suspicious
  conf: 0.75
  if:
    type: metrics
    field: binary.huge_func_count
    min: 1
  unless:
  - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
  - id: well-known/tool/development/qemu
  - id: metadata/binary/linking/static::elf-needed-libs-zero
- id: many-tiny-functions
  desc: Many tiny functions (<16 bytes)
  crit: suspicious
  conf: 0.4
  if:
    type: metrics
    field: binary.tiny_func_count
    min: 500
  unless:
  - id: well-known/tool/development/qemu
  - id: well-known/tool/sysadmin/busybox::busybox-binary
- id: small-avg-function
  desc: Very small average function size
  crit: notable
  conf: 0.4
  size_min: 65536
  if:
    type: metrics
    field: binary.avg_func_size
    min: 1
    max: 32
  unless:
  - type: metrics
    field: binary.func_count
    max: 5
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/lang/compiler/systems::haskell-binary
  - id: well-known/app/hopenpgp-tools::release-path
  - type: basename
    substr: hopenpgp-tools
  - type: basename
    regex: '[\\/]h(op|ot|kt|okey)$'
- id: high-max-complexity
  desc: High maximum function complexity (obfuscation)
  crit: notable
  conf: 0.7
  attack: T1027.002
  if:
    type: trait
    id: metadata/binary/metrics/structural::high-max-complexity
  unless:
  - id: well-known/app/cvte-crashrpt::cvte-crashrpt-strong-pin
  downgrade:
    any:
    - id: metadata/signed/developer::cisco-systems
    - id: metadata/signed/leaf::cisco-systems-inc.
- id: high-avg-complexity
  desc: High average cyclomatic complexity (control
  crit: notable
  conf: 0.75
  attack: T1027.002
  size_max: 500000
  if:
    type: metrics
    field: binary.avg_complexity
    min: 55
  unless:
  - type: metrics
    field: binary.func_count
    max: 20
  - type: metrics
    field: exports.count
    min: 20
  - type: basename
    exact: UAC.exe
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: very-high-avg-complexity
  desc: Very high average complexity (heavy
  crit: notable
  conf: 0.85
  attack: T1027.002
  size_max: 500000
  if:
    type: metrics
    field: binary.avg_complexity
    min: 75
  unless:
  - type: metrics
    field: binary.func_count
    max: 20
  - type: metrics
    field: exports.count
    min: 20
- id: many-complex-functions
  desc: Many high complexity functions (>80)
  crit: baseline
  conf: 0.6
  attack: T1027.002
  if:
    type: metrics
    field: binary.high_complexity_func_count
    min: 80
  downgrade:
    any:
    - id: metadata/binary/metrics/threshold::many-exports-200
    - id: metadata/signed/platform::microsoft-corporation
    - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
  unless:
  - id: benign-complexity-context
  - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - type: basename
    exact: urlmon.dll
  - id: metadata/signed/platform::apple
- id: very-complex-functions
  desc: Has many very high complexity
  crit: suspicious
  conf: 0.7
  attack: T1027.002
  if:
    type: metrics
    field: binary.very_high_complexity_func_count
    min: 5
  unless:
  - id: metadata/signed/platform::apple
- id: many-basic-blocks
  desc: High basic blocks per function
  crit: notable
  conf: 0.55
  if:
    type: metrics
    field: binary.avg_basic_blocks
    min: 50
  unless:
  - type: metrics
    field: binary.func_count
    max: 20
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - type: metrics
      field: imports.count
      min: 80
- id: many-linear-functions
  desc: Many linear functions (possible VM
  crit: suspicious
  conf: 0.6
  if:
    type: metrics
    field: binary.linear_func_count
    min: 50
- id: recursive-functions
  desc: Has recursive functions
  crit: suspicious
  conf: 0.5
  if:
    type: metrics
    field: binary.recursive_func_count
    min: 3
- id: many-noreturn-functions
  desc: Many noreturn functions (anti-analysis pattern)
  crit: suspicious
  conf: 0.7
  if:
    type: metrics
    field: binary.noreturn_func_count
    min: 20
- id: large-stack-frames
  desc: Has functions with large stack
  crit: suspicious
  conf: 0.6
  if:
    type: metrics
    field: binary.large_stack_func_count
    min: 3
- id: huge-stack-frame
  desc: Extremely large max stack frame
  crit: suspicious
  conf: 0.7
  if:
    type: metrics
    field: binary.max_stack_frame
    min: 65536
- id: high-avg-stack
  desc: High average stack frame size
  crit: suspicious
  conf: 0.6
  if:
    type: metrics
    field: binary.avg_stack_frame
    min: 2048
- id: has-overlay
  desc: Binary has overlay data
  crit: component
  conf: 0.5
  for:
  - pe
  - macho
  if:
    type: metrics
    field: binary.has_overlay
    min: 1
  unless:
  - id: has-overlay-known-benign
  - type: metrics
    field: binary.overlay_size
    max: 16384
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
    - id: metadata/binary/framework::dotnet-assembly
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/debug::pdb-visual-studio
- id: large-overlay
  desc: Large overlay relative to file
  crit: baseline
  conf: 0.7
  for:
  - pe
  - macho
  attack: T1027.009
  size_min: 131072
  if:
    type: metrics
    field: binary.overlay_ratio
    min: 0.5
  unless:
  - id: large-overlay-known-benign
  - id: metadata/binary/linking/runtime::cosmopolitan-marker
  - id: well-known/tool/reverse-engineering/resource-hacker::resource-hacker-marker
  - id: metadata/binary/linking/runtime::cosmopolitan-marker
  downgrade:
    any:
    - type: trait
      id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
    - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
- id: high-entropy-overlay-raw
  desc: High entropy overlay data
  crit: component
  conf: 0.8
  for:
  - pe
  - macho
  attack: T1027.009
  if:
    type: metrics
    field: binary.overlay_entropy
    min: 7.0
  unless:
  - id: metadata/binary/linking/runtime::ape-binary-marker
  - type: metrics
    field: binary.overlay_size
    max: 16384
  - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
  - id: metadata/document/office/container::help2-container
  - id: metadata/binary/installer/script::nsis
  - id: metadata/binary/section/names::upx-section
- id: compact-high-entropy-overlay
  desc: Compact high entropy overlay blob
  crit: component
  conf: 0.84
  for:
  - pe
  attack: T1027.009
  if:
    type: metrics
    field: binary.overlay_entropy
    min: 7.0
  unless:
  - type: metrics
    field: binary.overlay_size
    max: 255
  - type: metrics
    field: binary.overlay_size
    min: 4097
  - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
- id: large-overlay-size
  desc: Overlay large enough to contain payload
  crit: component
  conf: 0.7
  for:
  - pe
  - macho
  if:
    type: metrics
    field: binary.overlay_size
    min: 81920
  unless:
  - id: large-overlay-size-known-benign
- id: medium-overlay-size
  desc: Overlay large enough for stage data
  crit: component
  conf: 0.72
  for:
  - pe
  - macho
  if:
    type: metrics
    field: binary.overlay_size
    min: 32768
  unless:
  - id: metadata/document/office/container::help2-container
- id: macho-small-overlay-ratio
  desc: Mach-O small overlay ratio
  crit: component
  conf: 0.85
  for:
  - macho
  if:
    type: metrics
    field: binary.overlay_ratio
    max: 0.02
- id: high-string-density-large-pe
  desc: Large PE with dense string corpus
  crit: component
  conf: 0.82
  for:
  - pe
  size_min: 250000
  if:
    type: metrics
    field: binary.string_density
    min: 12.0
    min_size: 500000
- id: file-size-1m-plus
  desc: Binary is 1MB or larger
  crit: component
  conf: 1.0
  size_min: 1048576
  unless:
  - id: metadata/file/text/string::system-shell-basename
  - id: metadata/lang/compiler/systems::go-pe-symtab
- id: function-count-1000-plus
  desc: Binary has 1000 or more functions
  crit: component
  conf: 1.0
  if:
    type: metrics
    field: binary.func_count
    min: 1000
  unless:
  - id: metadata/file/text/string::system-shell-basename
  - id: metadata/lang/compiler/systems::go-pe-symtab
- id: zero-entropy-executable-section
  desc: Zero-entropy executable section (carved/packed PE)
  crit: suspicious
  conf: 0.92
  for:
  - pe
  if:
    type: section
    executable: true
    entropy_max: 0.01
    length_min: 4096
  unless:
  - id: benign-zero-entropy-context
  downgrade:
    any:
      - id: well-known/app/protected-benign-pe/
composite_rules:
- id: benign-zero-entropy-context
  desc: Benign zero-entropy section context
  crit: component
  conf: 0.95
  any:
  - id: metadata/binary/metrics/structural::section-exceeds-file-size
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: metadata/binary/vendor::bitdefender-product-marker
  - id: metadata/file/text/string::freedos-program-basename
  - id: metadata/binary/vendor::adobe-installer-context
  - id: metadata/binary/installer/family::known-benign-installer
  - id: well-known/tool/development/cygwin::cygwin-setup-signature
  - id: well-known/app/hasp-license-manager
  - id: metadata/binary/framework::dotnet-metadata
  - id: well-known/lib/divx/
  - id: metadata/binary/section/names::upx-section
  - id: metadata/binary/layout::pe-embedded

- id: benign-complexity-context
  desc: Benign complexity context
  crit: component
  conf: 0.95
  any:
  - id: metadata/binary/provenance::unicode-script-table-marker
  - id: metadata/file/text/string::system-shell-basename
  - id: metadata/file/extension::cpython-native-extension-module
- id: compressed-file-magic
  desc: Compressed file magic marker
  crit: component
  conf: 0.9
  any:
  - id: metadata/file/magic::zip-archive
  - id: metadata/file/magic::gzip
- id: benign-packed-entropy-context
  desc: Benign packed entropy downgrade context
  crit: component
  conf: 0.9
  any:
  - id: objectives/anti-static/pack/detect::upx-packer-string
  - id: metadata/binary/installer/sfx::7zsfx-config-marker
  - id: well-known/app/dell-display-manager::dell-display-manager-packed-binary
  - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
  - id: micro-behaviors/data/encode/pecompact::pecompact-signature
  # Both max and avg string length are implausibly short in a substantial binary.
  # Either alone can appear in stripped helper binaries; both together means
  # the packer/implant has encrypted all string content — extremely rare in benign code.
- id: encrypted-strings-large-binary
  desc: Both max and avg string length near-noise
  crit: suspicious
  conf: 0.88
  all:
  - id: sparse-strings-large-binary
  - id: noisy-avg-string-length
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: upx-identified-artifact
  - id: well-known/lib/jvm
  - id: well-known/lib/skiko

- id: has-overlay-known-benign
  desc: Benign overlay-bearing binary context
  crit: component
  conf: 0.95
  any:
  - id: metadata/binary/resource::resource-only-dll
  - id: metadata/binary/linking/runtime::ape-binary-marker
- id: large-overlay-known-benign
  desc: Benign large overlay binary context
  crit: component
  conf: 0.95
  any:
  - id: metadata/binary/linking/runtime::cosmopolitan-marker
  - id: metadata/binary/installer/script::inno-setup-data-marker
  - id: metadata/binary/installer/script::inno-setup-installer-marker
  - id: metadata/signed/platform::microsoft
  - id: metadata/signed/platform::ip-zinukhov-stanislav-igorevich
  - id: metadata/signed/developer::martin-tofall
  - id: metadata/signed/developer::valve-corp.
  - id: metadata/binary/layout::jar-manifest-marker
  - id: metadata/file/magic::zip-archive
  - id: overlay-dominant-importless-blob
  - id: metadata/binary/resource::resource-only-dll
  - id: well-known/tool/reverse-engineering/resource-hacker::resource-hacker-marker
  - id: metadata/package/versioning::dotnet-versioned-assembly
  - id: metadata/document/office/container::help2-container
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/installer/script::nullsoftinst-marker
  - id: metadata/binary/installer/script::nsis-error-title
  - id: metadata/binary/installer/sfx::7zsfx-config-marker
  - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
- id: large-overlay-size-known-benign
  desc: Benign large overlay size context
  crit: component
  conf: 0.95
  any:
  - id: metadata/signed/platform::microsoft
  - id: metadata/signed/platform::ip-zinukhov-stanislav-igorevich
  - id: metadata/signed/developer::valve-corp.
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/document/office/container::help2-container
  - id: metadata/binary/linking/runtime::ape-binary-marker
- id: signed-payload-overlay
  desc: Signed PE with high entropy payload overlay
  crit: suspicious
  conf: 0.95
  for:
  - pe
  all:
  - id: large-overlay
  - id: high-entropy-overlay-raw
  - id: large-overlay-size
  any:
  - id: metadata/binary/layout::pe-signature-present
  - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
  unless:
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/binary/metrics/threshold::dotnet-binary
  - id: metadata/binary/resource::resource-only-dll
- id: low-entropy-overlay-inflation
  desc: Low entropy overlay inflation
  crit: suspicious
  conf: 0.94
  for:
  - pe
  all:
  - id: metadata/binary/layout::overlay-dominates-third
  - id: metadata/binary/layout::large-overlay-1mb
  - id: metadata/binary/layout::low-overlay-entropy
  any:
  - id: metadata/binary/layout::pe-checksum-mismatch
  - id: metadata/binary/metrics/pe-details::pe-dll-characteristics
  - id: metadata/binary/metrics/threshold::many-exports-100
  unless:
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/file/text/string::freedos-program-basename
  - id: metadata/binary/installer/script::inno-setup
  - id: metadata/binary/installer/script::nsis
  - id: metadata/binary/installer/sfx::7zip-sfx-runtime
  - id: metadata/signed/platform::microsoft
- id: overlay-dominant-importless-blob
  desc: Overlay-dominant PE blob lacks code context
  crit: component
  conf: 0.9
  all:
  - id: metadata/binary/layout::overlay-dominates-third
  - id: metadata/binary/symbols/imports::few-import-count
  - id: objectives/anti-static/obfuscation/imports::extremely-low-strings
- id: upx-identified-artifact
  desc: UPX sections or marker present
  crit: component
  conf: 1.0
  any:
  - id: metadata/binary/section/names::upx-section
  - id: objectives/anti-static/pack/detect::upx-marker
- id: many-high-entropy-strings-known-fp
  desc: High entropy strings known false positive profile
  crit: component
  conf: 0.7
