# Cross-compiled evasive Windows PE.
#
# A MinGW/GCC-built PE that combines anti-analysis primitives (API
# hashing, multiple TLS callbacks, sparse imports) is a fingerprint
# rarely seen in legitimate software:
#  - legitimate MinGW utilities (curl, wget, OpenSSH for Windows)
#    don't hash imports or layer multiple TLS callbacks
#  - legitimate MSVC-built malware uses linker version 14.x
# The combination indicates a Linux/macOS-host author cross-compiling
# Windows malware with `x86_64-w64-mingw32-gcc`. Observed in VECT
# ransomware (2026) among others.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
  mbc: B0032
  size_min: 65536
traits:
  - id: libusb-dll-basename
    desc: libusb Windows DLL basename
    crit: component
    if:
      type: basename
      exact: libusb-1.0.dll
composite_rules:
  - id: mingw-with-anti-analysis
    desc: MinGW PE with anti-analysis features
    crit: suspicious
    conf: 0.92
    needs: 2
    all:
      - id: metadata/lang/compiler/native::mingw-built-pe
    any:
      - id: objectives/anti-static/obfuscation/imports::pe-api-hashing-indicator
      - id: objectives/anti-static/obfuscation/imports::pe-api-hashing-indicator-single
      - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-multi-callbacks
    unless:
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
      - id: libusb-dll-basename
      - id: well-known/lib/sdl::sdl-runtime-component
      - id: metadata/lang/compiler/native::libllvm
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/binary/symbols/plugin::x64dbg-plugin-export

  - id: mingw-tls-hashing-evasion
    desc: Unsigned MinGW executable with multiple TLS callbacks and API hashing
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/compiler/native::mingw-built-pe
      - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-multi-callbacks
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: objectives/anti-static/obfuscation/imports::pe-api-hashing-indicator
      - id: objectives/anti-static/obfuscation/imports::pe-api-hashing-indicator-single
    unless:
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/binary/symbols/plugin::x64dbg-plugin-export
      - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
