defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: autoit-pe-overlay-signature
    desc: AutoIt script signature in PE overlay
    crit: suspicious
    conf: 0.95
    if:
      type: yara
      source: |
        import "pe"
        rule autoit_pe_overlay_signature {
          strings:
            $au3 = "AU3!EA06"
          condition:
            pe.overlay.offset > 0 and $au3 at pe.overlay.offset
        }

  - id: low-overall-entropy-pe
    desc: Low overall entropy PE
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: binary.overall_entropy
      max: 5.0

  - id: large-pe-resource-section
    desc: Large PE resource section (>150KB)
    crit: component
    conf: 0.8
    if:
      type: section
      substr: ".rsrc"
      length_min: 150000

composite_rules:
  - id: highly-entropic-overlay-large-rsrc-low-entropy
    desc: Entropic overlay with large resource section and low total entropy
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::has-overlay
      - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay-raw
      - id: large-pe-resource-section
      - id: low-overall-entropy-pe
