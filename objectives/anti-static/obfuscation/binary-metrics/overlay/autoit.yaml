defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: autoit-pe-overlay-signature
    desc: AutoIt script signature in PE overlay
    crit: suspicious
    conf: 0.95
    if:
      type: yara
      source: |
        import "pe"
        rule autoit_pe_overlay_signature {
          strings:
            $au3 = "AU3!EA06"
          condition:
            pe.overlay.offset != 0 and $au3 in (pe.overlay.offset .. pe.overlay.offset + 256)
        }

  - id: large-pe-resource-section
    desc: Large PE resource section (>150KB)
    crit: component
    conf: 0.8
    if:
      type: section
      substr: ".rsrc"
      length_min: 150000

composite_rules:
  - id: highly-entropic-overlay-large-rsrc-low-entropy
    desc: High-entropy overlay with large resource section
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/layout::has-overlay
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay-raw
      - id: large-pe-resource-section
      - id: metadata/binary/metrics/threshold::low-overall-entropy-binary
    unless:
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/metrics/threshold::dotnet-binary
