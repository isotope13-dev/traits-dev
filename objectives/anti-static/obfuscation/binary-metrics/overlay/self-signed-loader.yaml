defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.002

composite_rules:
  - id: self-signed-resource-memory-loader-payload
    desc: Self-signed PE hides executable loader payload in resources
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/command-and-control/dropper/execution/windows-loader::self-signed-encrypted-memory-loader
      - id: objectives/anti-static/obfuscation/binary-metrics/overlay::large-pe-resource-section
      - id: objectives/anti-static/pack/runtime::pe-import-count-under-10
    any:
      - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite-arg-x64
      - id: micro-behaviors/mem/alloc/executable::page-execute-read-arg-x64
      - id: metadata/binary/metrics/size::giant-string-blob-metric
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/tool/
