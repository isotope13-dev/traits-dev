defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: long-even-digit-padding
    desc: Contains long even-digit padding runs
    crit: suspicious
    conf: 0.98
    count_min: 32
    if:
      type: raw
      regex: '[02468]{256}'

  - id: long-lower-alphanumeric-padding
    desc: Contains long lowercase-alphanumeric padding
    crit: suspicious
    conf: 0.96
    count_min: 16
    if:
      type: raw
      regex: '[a-z0-9]{1024}'

composite_rules:
  - id: alternating-alphanumeric-overlay-padding
    desc: PE carries dense synthetic alphanumeric padding
    crit: suspicious
    conf: 0.99
    all:
      - id: long-even-digit-padding
      - id: long-lower-alphanumeric-padding
      - id: metadata/binary/layout::large-overlay-64k
      - id: metadata/binary/layout::low-overlay-entropy

