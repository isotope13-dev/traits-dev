defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: import-count-under-40
    desc: Binary imports fewer than 40 functions
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: binary.import_count
      max: 39
    unless:
      - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/lang/compiler/aot::native-runtime-large-file
