defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: randomized-symbol-namespace-cluster
    desc: Randomized managed symbol namespace cluster
    crit: suspicious
    conf: 0.92
    count_min: 100
    if:
      type: symbol
      regex: '^[A-Za-z]\w+::[A-Za-z]\w+::[A-Za-z]\w+$'
    not:
      - regex: '^.{70,}$'
      - regex: '(?i)(__cdecl|__thiscall|__ptr64|^std::|::std::|^class_|^struct_)'
composite_rules:
  - id: dotnet-randomized-symbols
    desc: Obfuscated .NET symbol namespace cluster
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/format/pe::dotnet-assembly
      - id: randomized-symbol-namespace-cluster
