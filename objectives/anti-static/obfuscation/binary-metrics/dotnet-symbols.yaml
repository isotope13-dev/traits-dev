defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: georgian-managed-symbols
    desc: Georgian Unicode managed symbols
    crit: component
    conf: 0.98
    if:
      type: symbol
      regex: '[Ⴀ-ჿ]'
  - id: managed-hashlike-member-name
    desc: Managed member uses hash-like suffix
    crit: component
    conf: 0.84
    if:
      type: symbol
      regex: '^(sym\.)?[A-Za-z0-9_.$:<>-]{3,80}::[A-Za-z]{0,5}_?[a-f0-9]{32}$'
  - id: managed-winapi-bridge-method
    desc: Managed symbol exposes WinAPI bridge
    crit: notable
    conf: 0.88
    if:
      type: symbol
      regex: '::WinAPI_[A-Za-z]{3,24}$'
  - id: randomized-symbol-namespace-cluster
    desc: Randomized managed symbol namespace cluster
    crit: component
    conf: 0.82
    if:
      type: symbol
      regex: '^(sym\.)?[A-Za-z0-9_.$]{3,}::[A-Za-z0-9_.$]{3,}::[A-Za-z0-9_.$]{3,}$'
    not:
      - regex: '^.{70,}$'
      - regex: '(?i)(__cdecl|__thiscall|__ptr64|^sym\.(std|class_|struct_)::|^std::|::std::|^class_|^struct_)'
      - regex: '^(sym\.)?[A-Z][A-Za-z0-9_.$]{2,}::[A-Z][A-Za-z0-9_.$]{2,}::([A-Z][A-Za-z0-9_.$]{2,}|\.c?ctor|<[A-Za-z0-9_.$]+>b__\d+(?:_\d+)?)$'
      - regex: '^(sym\.)?[A-Z][A-Za-z0-9_.$]{2,}::[A-Z][A-Za-z0-9_.$]{2,}::\.c?ctor_0x[0-9A-Fa-f]+$'
      - regex: '^(sym\.)?[A-Z][A-Za-z0-9_.$]{2,}::[A-Z][A-Za-z0-9_.$]{2,}::_[A-Za-z0-9_.$]+_b__[A-Za-z0-9]+(?:_[A-Za-z0-9]+)?$'
      - regex: '^(sym\.)?[A-Z][A-Za-z0-9_.$]{2,}::[A-Z][A-Za-z0-9_.$]{2,}::([A-Z][A-Za-z0-9_.$]{2,}|[gs]et_[A-Za-z0-9_.$]+|add_[A-Za-z0-9_.$]+|remove_[A-Za-z0-9_.$]+|op_[A-Za-z0-9_.$]+|Try[A-Za-z0-9_.$]*|Open[A-Za-z0-9_.$]*|Close[A-Za-z0-9_.$]*|Read[A-Za-z0-9_.$]*|Write[A-Za-z0-9_.$]*|Create[A-Za-z0-9_.$]*|Update[A-Za-z0-9_.$]*|Parse[A-Za-z0-9_.$]*|Serialize[A-Za-z0-9_.$]*|Deserialize[A-Za-z0-9_.$]*|ToString|Equals|Get[A-Za-z0-9_.$]*|Set[A-Za-z0-9_.$]*|Begin[A-Za-z0-9_.$]*|End[A-Za-z0-9_.$]*|Complete[A-Za-z0-9_.$]*|Match[A-Za-z0-9_.$]*|Raise[A-Za-z0-9_.$]*|From[A-Za-z0-9_.$]*|Has[A-Za-z0-9_.$]*|Can[A-Za-z0-9_.$]*|On[A-Za-z0-9_.$]*|.ctor)$'
      - regex: '^(sym\.)?[A-Z][A-Za-z0-9_]*(\.[A-Z][A-Za-z0-9_]*)+::[A-Z][A-Za-z0-9_.$]{2,}::([A-Z][A-Za-z0-9_.$]{2,}|[gs]et_[A-Za-z0-9_.$]+|add_[A-Za-z0-9_.$]+|remove_[A-Za-z0-9_.$]+|op_[A-Za-z0-9_.$]+|Try[A-Za-z0-9_.$]*|Open[A-Za-z0-9_.$]*|Close[A-Za-z0-9_.$]*|Read[A-Za-z0-9_.$]*|Write[A-Za-z0-9_.$]*|Create[A-Za-z0-9_.$]*|Update[A-Za-z0-9_.$]*|Parse[A-Za-z0-9_.$]*|Serialize[A-Za-z0-9_.$]*|Deserialize[A-Za-z0-9_.$]*|ToString|Equals|Get[A-Za-z0-9_.$]*|Set[A-Za-z0-9_.$]*|Begin[A-Za-z0-9_.$]*|End[A-Za-z0-9_.$]*|Complete[A-Za-z0-9_.$]*|Match[A-Za-z0-9_.$]*|Raise[A-Za-z0-9_.$]*|From[A-Za-z0-9_.$]*|Has[A-Za-z0-9_.$]*|On[A-Za-z0-9_.$]*|.ctor)$'
      - regex: '^(sym\.)?[A-Z][A-Za-z0-9_.$]{2,}::[A-Z][A-Za-z0-9_.$]{2,}::(?:m_|b[A-Z]|bo[A-Z]|vb[A-Z]|vf[A-Z]|vstr[A-Z]|str[A-Z]|ls[A-Z]|i[A-Z]|in[A-Z]|toolStrip[A-Z])[A-Za-z0-9_.$]*$'
      - regex: '^(sym\.)?[A-Z][A-Za-z0-9_.$]{2,}::[A-Z][A-Za-z0-9_.$]{2,}::[a-z]{3,16}$'
      - regex: '^(sym\.)?[A-Z][A-Za-z0-9_.$]{2,}::[A-Z][A-Za-z0-9_.$]{2,}::[a-z]+(?:_[a-z]+)+$'
      - regex: '^(sym\.)?[A-Z][A-Za-z0-9_.$]{2,}::[A-Z][A-Za-z0-9_.$]{2,}::(?:__[A-Za-z0-9_.$]+|[a-z][A-Za-z0-9_.$]*_(?:Click|DoubleClick|LinkClicked|TextChanged|SelectedIndexChanged|CheckedChanged|ValueChanged|Load|Shown|Resize|Closing|Closed|FormClosing|FormClosed|Enter|Leave|KeyDown|KeyUp|KeyPress|MouseDown|MouseUp|MouseMove|MouseClick|MouseDoubleClick))$'
      - regex: '(?i)(?:<CrtImplementationDetails>|<CppImplementationDetails>|gcroot<|^\??<Module>::)'
      - regex: '^(sym\.)?_(Module|CppImplementationDetails|CrtImplementationDetails)_::'
      - regex: '^(sym\.)?_Module_::gcroot_'
      - regex: '^(sym\.)?(Microsoft|System)(\.[A-Z][A-Za-z0-9_]*)*::'
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
        - id: metadata/signed/platform::microsoft
composite_rules:
  - id: dotnet-georgian-symbol-obfuscation
    desc: Obfuscated .NET Georgian symbols
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: georgian-managed-symbols
    any:
      - id: randomized-symbol-namespace-cluster
      - id: objectives/anti-static/obfuscation/anti-decompile::suppress-ildasm
      - id: metadata/binary/symbols::single-import-raw
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: dotnet-hash-renamed-symbols
    desc: Obfuscated .NET hash renamed symbols
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/metrics::many-functions
      - id: managed-hashlike-member-name
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: dotnet-randomized-symbols
    desc: Obfuscated .NET symbol namespace cluster
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/metrics::many-functions
      - id: randomized-symbol-namespace-cluster
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: dotnet-obfuscated-winapi-bridge
    desc: Obfuscated .NET WinAPI bridge symbol
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: managed-winapi-bridge-method
      - id: randomized-symbol-namespace-cluster
    any:
      - id: metadata/lang/compiler/managed::runtime-interop
      - id: metadata/binary/symbols::single-import-raw
      - id: metadata/binary/section/metrics::elevated-text-entropy-section
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: dotnet-extreme-max-complexity
    desc: Obfuscated .NET extreme max complexity
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/metrics::many-functions
      - id: randomized-symbol-namespace-cluster
      - id: objectives/anti-static/obfuscation/binary-metrics::extreme-max-complexity
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/platform::microsoft
