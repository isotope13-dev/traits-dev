defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: randomized-symbol-namespace-cluster
    desc: Randomized managed symbol namespace cluster
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      regex: '^(sym\.)?[A-Za-z0-9_.$]{3,}::[A-Za-z0-9_.$]{3,}::[A-Za-z0-9_.$]{3,}$'
    not:
      - regex: '^.{70,}$'
      - regex: '(?i)(__cdecl|__thiscall|__ptr64|^sym\.(std|class_|struct_)::|^std::|::std::|^class_|^struct_)'
composite_rules:
  - id: dotnet-randomized-symbols
    desc: Obfuscated .NET symbol namespace cluster
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/format/pe::dotnet-assembly
      - id: metadata/format::many-functions
      - id: randomized-symbol-namespace-cluster
