defaults:
  platforms: [windows, linux, macos]
  for: [pe, dll, elf, macho]
  attack: T1036,T1027

traits:
  - id: reverse-engineering-section-name
    desc: Section names target analysis tools
    crit: suspicious
    conf: 0.98
    if:
      type: section
      regex: '(?i)\.(ida($|cantreverse)|ghidra)'

  - id: taunting-section-name
    desc: Section name taunts or rejects analysis
    crit: suspicious
    conf: 0.98
    if:
      type: section
      regex: '(?i)\.(uninstallida|stop.?trying|sucks|skid)'

composite_rules:
  - id: anti-analysis-section-name-cluster
    desc: Cluster of anti-analysis section names
    crit: hostile
    conf: 0.99
    all:
      - id: reverse-engineering-section-name
      - id: taunting-section-name
