defaults:
  for: [pe]
  platforms: [windows]

composite_rules:
  - id: packed-autoit-encrypted-resource
    desc: Packed AutoIt with encrypted resources
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: metadata/lang/compiled::autoit-resource-magic
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
      - id: metadata/binary/framework::large-rsrc-section
