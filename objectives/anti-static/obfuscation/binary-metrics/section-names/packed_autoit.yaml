defaults:
  for: [pe]
  platforms: [windows]

composite_rules:
  - id: packed-autoit-encrypted-resource
    desc: Packed AutoIt with encrypted resources
    crit: notable
    conf: 0.94
    all:
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: metadata/lang/compiled::autoit-resource-magic
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
      - id: metadata/binary/framework::large-rsrc-section
  - id: packed-autoit-upx-rwx-wrapper
    desc: Packed AutoIt UPX RWX wrapper
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: metadata/binary/section/names::upx-section-pair
      - id: metadata/hardening/memory::wx-section
    any:
      - id: metadata/binary/symbols::few-import-count
      - id: metadata/binary/resource::large-null-rsrc
    needs: 1
