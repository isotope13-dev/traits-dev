defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: upx0-section-name
    desc: UPX0 section name
    crit: component
    conf: 1.0
    if:
      type: section
      exact: "UPX0"

  - id: upx1-section-name
    desc: UPX1 section name
    crit: component
    conf: 1.0
    if:
      type: section
      exact: ".UPX1"

composite_rules:
  - id: misleading-upx-sections
    desc: UPX0 and UPX1 section pair
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics/section-names::upx0-section-name
      - id: objectives/anti-static/obfuscation/binary-metrics/section-names::upx1-section-name
