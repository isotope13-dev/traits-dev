# Slash-numeric section names combined with zero-entropy padding
# indicate deliberate file-size inflation to bypass sandbox restrictions.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.001
  mbc: B0032

traits:
  - id: zero-entropy-padding-section
    desc: Large zero-entropy padding section
    crit: component
    conf: 0.92
    if:
      type: section
      regex: "^/[0-9]+$"
      entropy_max: 0.01
      length_min: 65536
      readable: true
      writable: false
      executable: false

composite_rules:
  - id: slash-numeric-padding-inflation
    desc: File-size inflation via slash-numeric zero-entropy sections
    crit: suspicious
    conf: 0.93
    size_min: 1048576
    all:
      - id: zero-entropy-padding-section
      - id: metadata/binary/section/names::many-slash-numeric-sections
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
