# Python XOR and String Decryption Patterns
# Detects logic typical of Python-based XOR decryptors and string dumpers
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: python-xor-byte-loop
    desc: "Python loop with XOR byte manipulation"
    crit: notable
    conf: 0.8
    if:
      type: ast
      query: |
        (for_statement
          body: (block
            (_
              (assignment
                left: (subscript)
                right: (binary_operator) @bin
              )
            )
          )
          (#match? @bin "\\^")
        )
  - id: python-printable-char-check
    desc: "Python logic checking for printable ASCII range"
    crit: notable
    conf: 0.7
    if:
      type: ast
      query: |
        (comparison_operator
          (integer) @min
          (identifier)
          (integer) @max
          (#eq? @min "32")
          (#match? @max "^12[67]$")
        )
  - id: python-sliding-key-loop
    desc: "Python loop iterating over key length"
    crit: component
    conf: 0.6
    if:
      type: ast
      query: |
        (for_statement
          right: (call
            function: (identifier) @func
            arguments: (argument_list
              (call
                function: (identifier) @len
              )
            )
          )
          (#eq? @func "range")
          (#eq? @len "len")
        )
  - id: python-rolling-xor-loop
    desc: "Python XOR loop with rolling key index"
    crit: suspicious
    conf: 0.9
    if:
      type: ast
      query: |
        (assignment
          right: (binary_operator
            right: (subscript
               (binary_operator) @mod
            )
          ) @xor
          (#match? @xor "\\^")
          (#match? @mod "%")
        )
  - id: python-bytearray-string-buffer
    desc: "Python buffers decoded bytes in bytearray"
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: '\w+\s*=\s*bytearray\(\)'
  - id: python-ascii-decode-call
    desc: "Python decodes buffered bytes as ASCII"
    crit: notable
    conf: 0.8
    if:
      type: raw
      substr: "decode('ascii')"
  - id: python-min-string-length-check
    desc: "Python enforces minimum recovered string length"
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: 'len\(\w+\)\s*>=\s*4'
  - id: python-offset-range-loop
    desc: "Python iterates over decoder offsets"
    crit: notable
    conf: 0.8
    size_max: 10240
    if:
      type: raw
      regex: 'for\s+\w+\s+in\s+range\s*\(\s*len\(\w+\)\s*\)\s*:'
  - id: python-offset-decoder-call
    desc: "Python calls decoder with changing offset"
    crit: suspicious
    conf: 0.85
    size_max: 10240
    if:
      type: raw
      regex: '\w+\s*=\s*\w+\(\w+,\s*\w+\)'
  - id: python-set-dedup-init
    desc: "Python initializes set for string deduplication"
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: '\w+\s*=\s*set\(\)'
  - id: python-substring-membership-check
    desc: "Python filters strings by substring membership"
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: 'if\s+\w+\s+in\s+\w+\s*:'
  - id: python-set-membership-dedup
    desc: "Python avoids duplicate recovered strings"
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: 'if\s+\w+\s+not\s+in\s+\w+\s*:'
composite_rules:
  - id: python-printable-string-extractor
    desc: "Python extracts printable strings from decoded bytes"
    crit: suspicious
    conf: 0.95
    all:
      - id: python-bytearray-string-buffer
      - id: python-printable-char-check
      - id: python-min-string-length-check
      - id: python-ascii-decode-call
  - id: python-offset-decoder-bruteforce
    desc: "Python brute-forces decoder offsets"
    crit: suspicious
    conf: 0.9
    all:
      - id: python-offset-range-loop
      - id: python-offset-decoder-call
  - id: python-deduplicated-string-dump
    desc: "Python deduplicates and prints recovered strings"
    crit: notable
    conf: 0.9
    all:
      - id: python-set-dedup-init
      - id: python-substring-membership-check
      - id: python-set-membership-dedup
