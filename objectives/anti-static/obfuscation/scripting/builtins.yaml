defaults:
  for: [all]
traits:
  - id: builtins-string-builder
    desc: "Python obfuscation using builtins to construct strings"
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'getattr\(__builtins__,\s*[a-z]{3,12}\.__str__'
  # === GuardDog: API obfuscation patterns ===
  - id: dict-subscript-access
    desc: __dict__ access with dunder string key
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.90
    for: [python]
    if:
      type: ast
      query: |
        (subscript
          value: (attribute
            attribute: (identifier) @attr)
          subscript: (string
            (string_content) @key)
          (#eq? @attr "__dict__")
          (#match? @key "^__.+__$"))
  - id: getattribute-call
    desc: __getattribute__ with computed attribute name
    mbc: E1014
    attack: T1027
    crit: suspicious
    conf: 0.90
    for: [python]
    if:
      type: ast
      query: |
        (call
          function: (attribute
            attribute: (identifier) @method)
          arguments: (argument_list
            (_)
            [(call) (binary_operator) (subscript) (attribute)] @dynamic_attr
          )
          (#eq? @method "__getattribute__"))
  - id: dunder-import-call
    desc: __import__ dynamic import
    mbc: E1014
    attack: T1027
    crit: notable
    conf: 0.85
    for: [python]
    if:
      type: ast
      query: |
        (call
          function: (identifier) @func
          (#eq? @func "__import__"))
