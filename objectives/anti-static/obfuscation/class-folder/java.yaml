defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: kingdavid-rat
    description: "Detects the KingDavid RAT, which uses Caesium obfuscation with the 'class folder' technique."
    criticality: hostile
    conf: 1.0
    all:
      - id: objectives/anti-static/obfuscation/payload/archive::java-archive-slashed-class-folder
    any:
      - id: objectives/anti-static/obfuscation/tools::caesium-debug
      - id: well-known/malware/rat/kingdavid::king-david-main-class
      - id: well-known/malware/rat/caesium::caesium-rat-config-b64
