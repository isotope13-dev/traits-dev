# Sparse Logic in Large Binaries (The Sparse Giant)
# Malware often has high bloat with isolated logic islands
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: low-complexity-large-binary
    desc: Abnormally low logic density for binary size
    crit: notable
    conf: 0.8
    size_min: 5242880 # 5MB+
    if:
      type: metrics
      field: "binary.complexity_per_kb"
      max: 0.1
    downgrade:
      any:
        - id: metadata/format/pe::dotnet-metadata
        - id: metadata/format/pe::resource-only-dll
        - id: metadata/format::many-imports
        - id: metadata/quality/versioning::pe-version-resource
composite_rules:
  - id: bloated-low-density-malware
    desc: Bloated binary with sparse logic and evasion
    crit: suspicious
    conf: 0.9
    all:
      - id: low-complexity-large-binary
    any:
      - id: objectives/anti-analysis/vm/detect::cpuid-instruction
      - id: objectives/evasion/process/injection/runtime::set-thread-context-dup
    downgrade:
      any:
        - id: metadata/format/pe::dotnet-metadata
