defaults:
  platforms: [unix, windows, macos]

# Detection for Virus.Hijack_Gen.Trojan.ShellObject malware family
# These samples use tampered UPX combined with a large overlay and specific obfuscated Windows API strings.
# ATT&CK: T1027 (Obfuscated Files or Information)
composite_rules:
  - id: hijack-gen-obfuscated-loader
    desc: "Virus.Hijack_Gen family using tampered APIs and packer overlay"
    crit: hostile
    any:
      - id: objectives/anti-static/obfuscation/strings/hijack-gen::corexitprocess
      - id: objectives/anti-static/obfuscation/strings/hijack-gen::multibytetowidechar
      - id: objectives/anti-static/obfuscation/strings/hijack-gen::rtlfreethreadpooltimer
    all:
      - id: objectives/anti-static/pack/upx::upx-tampered-magic
  - id: hijack-gen-shellobject-interleaved-variant
    desc: "Virus.Hijack_Gen ShellObject interleaved variant"
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/strings/hijack-gen::layered-string-obfuscation
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-obfuscated
      - id: micro-behaviors/fs/traversal/drives::obfuscated-drive-enumeration
      - id: micro-behaviors/fs/file/operations::obfuscated-file-enumeration-and-write
    any:
      - id: micro-behaviors/process/create/exec::shell-execute-a-obfuscated
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
