defaults:
  platforms: [unix, windows]
  for: [python]

traits:
  - id: python-obfuscated-constants-arithmetic
    desc: 'python obfuscated constants arithmetic'
    crit: notable
    if:
      type: text
      regex: 'getattr\(__builtins__,\s*oct\.__str__\(\)\[-3\s*<<\s*0\]\s*\+'

  - id: python-env-aware-execution
    desc: "Python conditional branching based on locale"
    crit: notable
    if:
      type: text
      regex: 'process\.env\.(LANG|LC_ALL|LC_MESSAGES)'
