defaults:
  platforms: [windows]
  for: [javascript]

traits:
  - id: token-stream-split-padding
    desc: Long token stream split on fixed padding
    crit: suspicious
    conf: 0.95
    size_max: 500000
    if:
      type: raw
      substr: '["s"+"plit"](''           '')'

  - id: short-key-char-return-map
    desc: Short-key map to returned char escapes
    crit: suspicious
    conf: 0.98
    count_min: 20
    if:
      type: raw
      regex: 'function avast\(\)\{return "\\x'

  - id: cc-loop-index-assignment
    desc: Conditional compilation token index assignment
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '/\*@cc_on[\s\S]{0,256}\w+\s*=\s*\w+\[\w+\]\s*;\s*@\*/'

  - id: accumulator-eval-loader
    desc: Accumulator rebuilt then passed to eval
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '\+=\s*\w+\s*;[\s\S]{0,80}eval\(\w+\)'

composite_rules:
  - id: token-dictionary-loader
    desc: Token dictionary rebuild with conditional eval
    crit: suspicious
    conf: 0.98
    all:
      - id: token-stream-split-padding
      - id: short-key-char-return-map
      - id: cc-loop-index-assignment
      - id: accumulator-eval-loader
