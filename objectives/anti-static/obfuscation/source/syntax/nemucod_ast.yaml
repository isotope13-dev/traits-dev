defaults:
  for: [text, shell, ruby, python, javascript, php, powershell, vbs, applescript]
traits:
  - id: nemucod-array-init-ast
    desc: "Nemucod-style character array initialization (AST)"
    crit: suspicious
    conf: 0.95
    count_min: 5
    if:
      type: ast
      language: javascript
      # Matches: [("x", ba), ("x", ix)] - array of parenthesized expressions
      query: |
        (array
          (parenthesized_expression)
        ) @nemucod_array
  - id: nemucod-var-init-ast
    desc: "Nemucod-style variable substitution initialization (AST)"
    crit: suspicious
    conf: 0.95
    count_min: 10
    if:
      type: ast
      language: javascript
      # Matches: us=('b', '\x0a');
      query: |
        (assignment_expression
          right: (parenthesized_expression
            (sequence_expression
              (string)
              (string)
            )
          )
        ) @nemucod_init
  - id: js-dynamic-property-concat
    desc: "Property access using concatenated strings"
    crit: suspicious
    conf: 0.8
    count_min: 3
    if:
      type: ast
      language: javascript
      # Matches: wv["conca"+"t"] - subscript with binary expression
      query: |
        (subscript_expression
          index: (binary_expression
            left: (string)
            right: (string)
          )
        ) @concat_prop
