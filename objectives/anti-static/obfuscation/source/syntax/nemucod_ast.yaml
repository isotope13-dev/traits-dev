defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [javascript]
traits:
  - id: nemucod-array-init-ast
    desc: Nemucod-style character array initialization (AST)
    crit: suspicious
    conf: 0.95
    count_min: 5
    size_max: 200000
    if:
      type: ast
      language: javascript
      query: "(array\n  (parenthesized_expression)\n) @nemucod_array\n"
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
        - id: objectives/anti-static/obfuscation/code-metrics::minification-pattern
  - id: nemucod-var-init-ast
    desc: Nemucod-style variable substitution initialization (AST)
    crit: suspicious
    conf: 0.95
    count_min: 10
    if:
      type: ast
      language: javascript
      query: "(assignment_expression\n  right: (parenthesized_expression\n    (sequence_expression\n      (string)\n      (string)\n    )\n  )\n) @nemucod_init\n"
  - id: js-dynamic-property-concat
    desc: Property access using concatenated strings
    crit: suspicious
    conf: 0.8
    count_min: 3
    if:
      type: ast
      language: javascript
      query: "(subscript_expression\n  index: (binary_expression\n    left: (string)\n    right: (string)\n  )\n) @concat_prop\n"
