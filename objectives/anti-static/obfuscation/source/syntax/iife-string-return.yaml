traits:
  - id: iife-string-literal-return-raw
    desc: Immediately-invoked function expression (IIFE) that returns a
    crit: component
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    for: [javascript, typescript]
    if:
      type: ast
      query: |
        (call_expression
          function: (function_expression
            body: (statement_block
              (return_statement
                (string) @string_literal
              )
            )
          )
        )

composite_rules:
  - id: iife-string-literal-return
    desc: Immediately-invoked function expression (IIFE) that returns a
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    for: [javascript, typescript]
    size_max: 500000
    all:
      - id: iife-string-literal-return-raw
    unless:
      - id: metadata/library::rxjs-websocket-constructor-error
      - id: metadata/library::rxjs-cold-observable-offset-error
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-umd-wrapper-any
