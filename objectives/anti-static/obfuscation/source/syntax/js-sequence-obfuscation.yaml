traits:
  - id: js-sequence-expression-obfuscation
    desc: "Obfuscated property access using sequence expressions"
    crit: suspicious
    conf: 0.95
    for: [javascript]
    size_max: 500000
    count_min: 5
    if:
      type: ast
      language: javascript
      query: |
        (parenthesized_expression
          (sequence_expression
            (string)
          )
        ) @seq_expr
