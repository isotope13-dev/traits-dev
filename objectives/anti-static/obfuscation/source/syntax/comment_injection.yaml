traits:
  - id: js-comment-injection
    desc: Detects comments injected inside member expressions or
    crit: suspicious
    for: [javascript, typescript]
    count_min: 10
    if:
      type: raw
      regex: '(\.\s*/\*.*?\*/\s*\w+)|(\w+\s*/\*.*?\*/\s*\()|(\[\s*/\*.*?\*/\s*)'
    not:
      - regex: 'istanbul ignore'
      - regex: '@class'
