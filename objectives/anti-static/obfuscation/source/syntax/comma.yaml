defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-comma-sequence-obfuscation-v2
    desc: "Many comma sequence expressions (obfuscation)"
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    count_min: 5
    if:
      type: ast
      language: javascript
      # Matches sequence expressions that are standalone statements (e.g. "a, b, c;")
      # Excludes sequences in for-loops, return statements, etc.
      query: |
        (expression_statement
          (sequence_expression)
        ) @seq
    downgrade:
      any:
        - type: string
          regex: "BinaryParser"
        - type: raw
          regex: "typeof\\s+module\\s*!=\\s*['\"]undefined['\"]"
        - type: raw
          regex: "typeof\\s+window\\s*!=\\s*['\"]undefined['\"]"
