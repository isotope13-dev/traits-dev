defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-comma-operator-abuse
    desc: "JavaScript comma operator abuse for obfuscation (e.g.,"
    crit: suspicious
    conf: 0.8
    for: [javascript]
    if:
      type: string
      # Matches long sequences like (1537, 6190, 4567, 2496, 2902, 4120, 8290, 7849, 72, 5799, 7066, 3)
      # where only the last number is used due to the comma operator.
      # Requires 7+ numbers to avoid matching CSS rgba(0, 0, 0, 0) and similar short tuples.
      regex: '\(\s*\d+\s*(,\s*\d+\s*){6,}\)'
    attack: "T1027" # Obfuscated Files or Information
    mbc: "B0032" # Deobfuscate/Decode
