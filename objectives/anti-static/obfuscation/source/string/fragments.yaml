defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
traits:
  - id: math-random-fragment
    desc: Math.random string fragment in string literal
    count_min: 2
    if:
      type: string_value
      regex: Math\.ran|ath\.rando|Random\.
