# Code Obfuscation Fragments
# Detects fragmented strings common in obfuscated code
defaults:
  for: [all]
  crit: notable
  conf: 0.8
traits:
  - id: math-random-fragment
    desc: Math.random string fragment in string literal
    count_min: 2
    if:
      type: string
      regex: 'Math\.ran|ath\.rando|Random\.'
