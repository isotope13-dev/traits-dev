defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: nemucod-numeric-string-encoding
    desc: "Nemucod-style concatenated numeric string encoding"
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: '(\d{2,3}[^\d\w]){29,}\d{2,3}'
    unless:
      - type: raw
        regex: "require\\(['\"]\\.\\./common['\"]\\)"
      - type: raw
        substr: "function test() {"
    size_max: 500000
    downgrade:
      any:
        - id: metadata/dev/testing::is-test
        - id: metadata/dev/testing::test-basename-pattern
        - id: metadata/library/nodeunit::nodeunit
        - id: metadata/library/structure::js-umd-wrapper-any
    attack: "T1027" # Obfuscated Files or Information
    mbc: "B0032" # Deobfuscate/Decode
