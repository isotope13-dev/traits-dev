# Identity Function Proxy Obfuscation
# Detects functions that simply return their argument, used for obfuscation.
# Pattern: function x(y){return y;}
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
  crit: notable
  conf: 0.8
traits:
  - id: identity-function-proxy
    desc: Function that returns its argument directly (obfuscation)
    count_min: 3
    if:
      type: ast
      language: javascript
      # Matches: function x(y){ return y; }
      query: >
        (function_declaration
          (formal_parameters
            (identifier) @param
          )
          (statement_block
            .
            (return_statement
              (identifier) @ret
            )
            .
          )
        )
        (#eq? @param @ret)
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled

  - id: massive-identity-function-proxies
    desc: Massive use of identity function proxies (obfuscation)
    crit: notable
    conf: 0.9
    count_min: 40
    if:
      type: ast
      language: javascript
      # Matches: function x(y){ return y; }
      query: >
        (function_declaration
          (formal_parameters
            (identifier) @param
          )
          (statement_block
            .
            (return_statement
              (identifier) @ret
            )
            .
          )
        )
        (#eq? @param @ret)
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
