---
# .NET reflective in-memory assembly loader — the runtime stage of a managed
# crypter. The stub decodes an embedded payload to a byte[], calls
# Assembly.Load(byte[]) (no file touches disk), enumerates the loaded
# assembly's exported types, and instantiates the entry class via
# Activator.CreateInstance. This is the SnakeKeyLogger / generic MSIL-crypter
# delivery shape: the real stealer never appears on disk in cleartext.
defaults:
  platforms: [windows, unix]
  for: [pe, csharp]
traits:
  - id: dotnet-createinstance-token
    desc: Activator.CreateInstance instantiation token
    crit: component
    conf: 0.72
    if:
      type: text
      substr: CreateInstance
composite_rules:
  # Suspicious on its own (plugin hosts do this too) — becomes hostile only
  # when combined with a packed/encrypted body or packer-stub shape below.
  # get-exported-types-token (dotnet-chain.yaml) is the loader enumerating the
  # decoded assembly's types; Activator.CreateInstance instantiates the entry.
  - id: dotnet-reflective-loader-chain
    desc: .NET reflective load-and-instantiate chain
    crit: suspicious
    conf: 0.8
    attack: T1620
    all:
      - id: namespace-import
      - id: activator
      - id: dotnet-createinstance-token
      - id: get-exported-types-token
    unless:
      - id: metadata/signed/platform::microsoft-corporation
  # HOSTILE (T1620 Reflective Code Loading): the reflective load+instantiate
  # chain inside a packed/encrypted .NET assembly. A legitimate plugin host is
  # not packed to >7.4 code entropy, so the encrypted body is the discriminator.
  - id: dotnet-reflective-payload-execution
    desc: Packed .NET reflectively loads and executes an in-memory payload
    crit: hostile
    conf: 0.9
    attack: T1620
    for: [pe]
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-reflective-loader-chain
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-code-entropy
    unless:
      - id: metadata/signed/platform::microsoft-corporation
