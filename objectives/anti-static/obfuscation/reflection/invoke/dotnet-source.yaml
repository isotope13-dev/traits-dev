defaults:
  for: [csharp]
  platforms: [windows]
traits:
  - id: pinvoke-flooding
    desc: Dense P/Invoke declarations padding
    crit: suspicious
    mbc: "B0032"
    attack: "T1027"
    conf: 0.85
    count_min: 10
    per_kb_min: 3.0
    if:
      type: string_value
      substr: "DllImport"
  - id: appdomain-load-raw
    desc: AppDomain assembly load from bytes
    crit: suspicious
    mbc: "F0004.001"
    attack: "T1620"
    conf: 0.95
    if:
      type: string_value
      substr: "CurrentDomain.Load"
