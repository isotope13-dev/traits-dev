defaults:
  platforms:
    - unix
    - windows
  for:
    - pe
    - csharp
traits:
  - id: namespace-import
    desc: Reflection method namespace token
    crit: component
    conf: 0.7
    if:
      type: text
      substr: System.Reflection
  - id: activator
    desc: Dynamic object instantiation via Activator
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Activator
  - id: property-info-class
    desc: PropertyInfo class reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: System.Reflection.PropertyInfo
  - id: get-properties-method
    desc: GetProperties method reference
    crit: component
    conf: 0.6
    if:
      type: text
      exact: GetProperties
  - id: method-info-class
    desc: MethodInfo class reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: System.Reflection.MethodInfo
  - id: resolve-method
    desc: ResolveMethod metadata token lookup
    crit: component
    conf: 0.82
    if:
      type: text
      exact: ResolveMethod
  - id: resolve-type
    desc: ResolveType metadata token lookup
    crit: component
    conf: 0.82
    if:
      type: text
      exact: ResolveType
  - id: create-delegate
    desc: Reflection delegate creation token
    crit: component
    conf: 0.8
    if:
      type: text
      exact: CreateDelegate
  - id: get-fields-call
    desc: Reflection GetFields reference
    crit: notable
    conf: 0.72
    if:
      type: text
      exact: GetFields
  - id: begininvoke-token
    desc: Delegate BeginInvoke token
    crit: component
    conf: 0.7
    if:
      type: text
      exact: BeginInvoke
  - id: endinvoke-token
    desc: Delegate EndInvoke token
    crit: component
    conf: 0.7
    if:
      type: text
      exact: EndInvoke
  - id: get-method-call
    desc: GetMethod call reference
    crit: component
    conf: 0.6
    if:
      type: text
      exact: GetMethod
  - id: get-methods-call
    desc: GetMethods call reference
    crit: component
    conf: 0.6
    if:
      type: text
      exact: GetMethods
  - id: get-type-call
    desc: GetType( call reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: GetType(
  - id: typeof-call
    desc: typeof( call reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: typeof(
  - id: type-info-class
    desc: TypeInfo class reference
    crit: component
    conf: 0.6
    if:
      type: text
      exact: System.Reflection.TypeInfo
composite_rules:
  - id: property-info
    desc: Reflection property access
    crit: component
    conf: 0.55
    all:
      - id: property-info-class
      - id: get-properties-method
  - id: method-info
    desc: Reflection method access
    crit: component
    conf: 0.55
    needs: 2
    any:
      - id: method-info-class
      - id: get-method-call
      - id: get-methods-call
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
  - id: resolver-token-pair
    desc: Reflection resolver token pair
    crit: component
    conf: 0.72
    needs: 2
    any:
      - id: resolve-method
      - id: resolve-type
      - id: create-delegate
  - id: resolver-api-cluster
    desc: Reflection metadata resolver API cluster
    crit: suspicious
    conf: 0.91
    all:
      - id: namespace-import
      - id: resolver-token-pair
  - id: delegate-execution-chain
    desc: Delegate invocation execution chain
    crit: suspicious
    conf: 0.88
    all:
      - id: create-delegate
      - id: namespace-import
      - id: method-info
    any:
      - id: begininvoke-token
      - id: endinvoke-token
    unless:
      - id: metadata/signed/platform::microsoft-corporation
  - id: dotnet-resource-resolver-loader
    desc: .NET resource resolver loader
    crit: suspicious
    conf: 0.92
    attack: T1027.009
    for:
      - pe
      - dll
    platforms:
      - windows
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: resolver-api-cluster
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: metadata/binary/layout::pe-embedded
      - id: metadata/binary/layout::dotnet-low-entropy-text-carrier
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource::resource-only-dll
  - id: type-info
    desc: Runtime type inspection
    crit: suspicious
    conf: 0.7
    needs: 2
    any:
      - id: get-type-call
      - id: typeof-call
      - id: type-info-class
