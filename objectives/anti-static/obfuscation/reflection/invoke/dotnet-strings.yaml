defaults:
  platforms:
    - windows
    - linux
    - macos
    - unix
    - android
    - ios
  for:
    - pe
    - dll
    - csharp
traits:
  - id: namespace-import
    desc: Reflection method namespace token
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: System.Reflection
  - id: activator
    desc: Dynamic object instantiation via Activator
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: Activator
  - id: property-info-class
    desc: PropertyInfo class reference
    crit: component
    conf: 0.6
    if:
      type: string_value
      substr: System.Reflection.PropertyInfo
  - id: get-properties-method
    desc: GetProperties method reference
    crit: component
    conf: 0.6
    if:
      type: string_value
      exact: GetProperties
  - id: method-info-class
    desc: MethodInfo class reference
    crit: component
    conf: 0.6
    if:
      type: string_value
      substr: System.Reflection.MethodInfo
  - id: get-method-call
    desc: GetMethod call reference
    crit: component
    conf: 0.6
    if:
      type: string_value
      exact: GetMethod
  - id: get-methods-call
    desc: GetMethods call reference
    crit: component
    conf: 0.6
    if:
      type: string_value
      exact: GetMethods
  - id: get-type-call
    desc: GetType( call reference
    crit: component
    conf: 0.6
    if:
      type: raw
      substr: GetType(
  - id: typeof-call
    desc: typeof( call reference
    crit: component
    conf: 0.6
    if:
      type: raw
      substr: typeof(
  - id: type-info-class
    desc: TypeInfo class reference
    crit: component
    conf: 0.6
    if:
      type: string_value
      exact: System.Reflection.TypeInfo
composite_rules:
  - id: property-info
    desc: Reflection property access
    crit: component
    conf: 0.55
    all:
      - id: property-info-class
      - id: get-properties-method
  - id: method-info
    desc: Reflection method access
    crit: component
    conf: 0.55
    needs: 2
    any:
      - id: method-info-class
      - id: get-method-call
      - id: get-methods-call
    downgrade:
      none:
        - id: metadata/binary/framework::dotnet-metadata
  - id: type-info
    desc: Runtime type inspection
    crit: notable
    conf: 0.7
    needs: 2
    any:
      - id: get-type-call
      - id: typeof-call
      - id: type-info-class
