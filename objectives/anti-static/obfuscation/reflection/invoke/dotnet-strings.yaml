defaults:
  platforms:
    - unix
    - windows
  for:
    - pe
    - csharp
traits:
  - id: namespace-import
    desc: Reflection method namespace token
    crit: component
    conf: 0.7
    if:
      type: text
      substr: System.Reflection
  - id: activator
    desc: Dynamic object instantiation via Activator
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Activator
  - id: property-info-class
    desc: PropertyInfo class reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: System.Reflection.PropertyInfo
  - id: get-properties-method
    desc: GetProperties method reference
    crit: component
    conf: 0.6
    if:
      type: text
      word: GetProperties
  - id: method-info-class
    desc: MethodInfo class reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: System.Reflection.MethodInfo
  - id: resolve-method
    desc: ResolveMethod metadata token lookup
    crit: component
    conf: 0.82
    if:
      type: text
      word: ResolveMethod
  - id: resolve-type
    desc: ResolveType metadata token lookup
    crit: component
    conf: 0.82
    if:
      type: text
      word: ResolveType
  - id: create-delegate
    desc: Reflection delegate creation token
    crit: component
    conf: 0.8
    if:
      type: text
      word: CreateDelegate
  - id: get-fields-call
    desc: Reflection GetFields reference
    crit: component
    conf: 0.72
    if:
      type: text
      word: GetFields
  - id: begininvoke-token
    desc: Delegate BeginInvoke token
    crit: component
    conf: 0.7
    if:
      type: text
      word: BeginInvoke
  - id: endinvoke-token
    desc: Delegate EndInvoke token
    crit: component
    conf: 0.7
    if:
      type: text
      word: EndInvoke
  - id: get-method-call
    desc: GetMethod call reference
    crit: component
    conf: 0.6
    if:
      type: text
      word: GetMethod
  - id: get-methods-call
    desc: GetMethods call reference
    crit: component
    conf: 0.6
    if:
      type: text
      word: GetMethods
  - id: get-type-call
    desc: GetType( call reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: GetType(
  - id: typeof-call
    desc: typeof( call reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: typeof(
  - id: type-info-class
    desc: TypeInfo class reference
    crit: component
    conf: 0.6
    if:
      type: text
      word: System.Reflection.TypeInfo
  - id: stackexchange-redis-library-marker
    desc: StackExchange.Redis library marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: StackExchange.Redis
composite_rules:
  - id: property-info
    desc: Reflection property access
    crit: component
    conf: 0.55
    all:
      - id: property-info-class
      - id: get-properties-method
  - id: method-info
    desc: Reflection method access
    crit: component
    conf: 0.55
    needs: 2
    any:
      - id: method-info-class
      - id: get-method-call
      - id: get-methods-call
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
  - id: resolver-token-pair
    desc: Reflection resolver token pair
    crit: component
    conf: 0.72
    needs: 2
    any:
      - id: resolve-method
      - id: resolve-type
      - id: create-delegate
      - id: get-fields-call
  - id: resolver-api-cluster
    desc: Reflection metadata resolver API cluster
    crit: component
    conf: 0.91
    all:
      - id: namespace-import
      - id: resolver-token-pair
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
        - id: metadata/signed/platform::microsoft-corporation
        - id: well-known/app/microsoft-csharp-compiler/
  - id: delegate-execution-chain
    desc: Delegate invocation execution chain
    crit: suspicious
    conf: 0.88
    all:
      - id: create-delegate
      - id: namespace-import
      - id: method-info
    any:
      - id: begininvoke-token
      - id: endinvoke-token
    unless:
      - id: metadata/signed/platform::microsoft-corporation
      - id: stackexchange-redis-library-marker
      - id: metadata/signed/platform/
      - id: metadata/signed/leaf::progress-software-corporation
      - id: well-known/app/
    downgrade:
      any:
        - id: well-known/lib/
        - id: objectives/anti-static/obfuscation/obfuscator/managed/
  - id: dotnet-resource-resolver-loader
    desc: .NET resource resolver loader
    crit: suspicious
    conf: 0.92
    attack: T1027.009
    for:
      - pe
      - dll
    platforms:
      - windows
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: resolver-api-cluster
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: metadata/binary/layout::pe-embedded
      - id: metadata/binary/layout::dotnet-low-entropy-text-carrier
    needs: 2
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: objectives/anti-static/obfuscation/obfuscator/managed/
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource/
  - id: dotnet-resource-delegate-injection-loader
    desc: .NET resource delegate injection loader
    crit: hostile
    conf: 0.97
    attack: T1027.009
    mbc: B0009.014
    for:
      - pe
      - dll
    platforms:
      - windows
    all:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-resource-resolver-loader
      - id: objectives/anti-static/obfuscation/reflection/invoke::delegate-execution-chain
      - id: objectives/evasion/process/injection/toolkit::dotnet-split-winapi-injection-loader
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: micro-behaviors/communications/http/client/managed::dotnet-http-client-with-aes
      - id: metadata/binary/symbols/imports::single-import-raw
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource/
  - id: type-info
    desc: Runtime type inspection
    # GetType/typeof are too common in benign .NET code to surface on their
    # own; higher-order reflection loaders still reference this helper.
    crit: component
    conf: 0.7
    needs: 2
    any:
      - id: get-type-call
      - id: typeof-call
      - id: type-info-class
  # Activator + GetMethod co-occurrence is the Type.GetType(name).GetMethod(...)
  # .Invoke(null, [type, args]) shape used to reach Activator.CreateInstance
  # reflectively (so the literal "Activator.CreateInstance" never appears). A
  # building block for the reflective-invoke-any aggregate; not surfaced alone.
  - id: activator-getmethod-pair
    desc: Activator instantiation with reflected method lookup
    crit: component
    conf: 0.75
    all:
      - id: activator
      - id: get-method-call
  # The Activator.CreateInstance + GetMethod/GetMethods + GetManifestResourceStream
  # shape is the simplest reflective-resource-loader form: instantiate a type
  # decrypted from an embedded managed resource and resolve+invoke its method by
  # name. Distinct from the resolver-token loaders above (ResolveMethod/
  # ResolveType) and the Assembly.Load / MethodBase.Invoke chains — those tokens
  # are absent in this Activator-based family. Notable on its own (plugin hosts
  # and DI containers do this too); the crypter verdict comes from pairing it
  # with a scrambled/fabricated identity.
  - id: dotnet-activator-resource-invoker
    desc: .NET reflective instantiation of embedded-resource type
    crit: notable
    conf: 0.8
    attack: T1620
    for:
      - pe
      - dll
    platforms:
      - windows
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: activator
    any:
      - id: get-method-call
      - id: get-methods-call
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
  - id: dotnet-scrambled-reflective-crypter
    desc: .NET reflective resource loader with scrambled identity (crypter stub)
    crit: hostile
    conf: 0.95
    attack: T1027.009
    mbc: B0009.014
    for:
      - pe
      - dll
    platforms:
      - windows
    all:
      - id: dotnet-activator-resource-invoker
      - id: objectives/evasion/masquerade/identity/fabricated::garbled-versioninfo-identity
    unless:
      - id: metadata/signed/platform::microsoft-windows
