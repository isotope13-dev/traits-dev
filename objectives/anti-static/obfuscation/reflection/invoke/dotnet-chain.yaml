defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: dotnet-assembly-token
    desc: Reflection Assembly class reference
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: System.Reflection.Assembly
  - id: dotnet-gettypes-token
    desc: GetTypes method reference
    crit: component
    conf: 0.6
    if:
      type: text
      exact: GetTypes
  - id: dotnet-assembly-load-token
    desc: Assembly Load method token
    crit: component
    conf: 0.62
    if:
      type: text
      exact: Load
  - id: dotnet-invoke-token
    desc: MethodBase.Invoke reflection token
    crit: component
    conf: 0.8
    if:
      type: text
      exact: MethodBase.Invoke
  - id: dotnet-methodbase-token
    desc: MethodBase class reference
    crit: component
    conf: 0.6
    if:
      type: text
      exact: MethodBase
  - id: get-entrypoint
    desc: Assembly entry point resolution
    crit: component
    conf: 0.7
    if:
      type: text
      exact: get_EntryPoint
  - id: appdomain-currentdomain
    desc: AppDomain.CurrentDomain accessor
    crit: component
    conf: 0.6
    if:
      type: text
      exact: get_CurrentDomain
  - id: invokemember-token
    desc: Type.InvokeMember reflection token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: InvokeMember
  - id: assembly-bytes-buffer
    desc: Assembly bytes buffer token
    crit: component
    conf: 0.84
    if:
      type: text
      exact: assemblyBytes
  - id: load-and-invoke-token
    desc: LoadAndInvoke method token
    crit: component
    conf: 0.86
    if:
      type: text
      exact: LoadAndInvoke
  - id: appdomain-class-token
    desc: AppDomain class token
    crit: component
    conf: 0.65
    if:
      type: text
      exact: AppDomain
  - id: appdomain-getdomain-token
    desc: AppDomain GetDomain token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetDomain
  - id: get-exported-types-token
    desc: Reflection exported types token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetExportedTypes
  - id: invoke-token
    desc: Reflection invoke token
    crit: component
    conf: 0.66
    if:
      type: text
      exact: Invoke
  - id: action-delegate-token
    desc: System Action delegate token
    crit: component
    conf: 0.64
    if:
      type: text
      exact: Action
  - id: vb-latecall-token
    desc: VB late binding token
    crit: component
    conf: 0.86
    if:
      type: text
      exact: LateCall
  - id: vb-callbyname-token
    desc: VB CallByName late binding
    crit: component
    conf: 0.86
    if:
      type: hex
      section: .text
      pattern: 43 61 6C 6C 42 79 4E 61 6D 65
  - id: loadassembly-method-token
    desc: LoadAssembly method token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: LoadAssembly
  - id: get-constructors-token
    desc: Reflection GetConstructors token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetConstructors
  - id: get-assembly-token
    desc: Assembly accessor token (get_Assembly)
    crit: component
    conf: 0.78
    if:
      type: text
      exact: get_Assembly
composite_rules:
  # Variant-resilient aggregate of "reflective instantiation/execution" forms:
  # the original AppDomain/ExportedTypes loader shape, the Activator+GetMethod
  # shape (Type.GetType().GetMethod().Invoke -> Activator.CreateInstance), and
  # the explicit LoadAndInvoke / Type.InvokeMember forms. Used by packed-body
  # stego-loader composites so a new family that swaps reflection style still
  # trips the hostile rule. Component-only: a single reflection token is benign,
  # the verdict comes from pairing this with a packed body and pixel readback.
  - id: dotnet-reflective-invoke-any
    desc: .NET reflective instantiation or invocation form
    crit: component
    conf: 0.7
    any:
      - id: dotnet-appdomain-exportedtype-invoke
      - id: dotnet-exportedtype-constructor-invoke
      - id: activator-getmethod-pair
      - id: load-and-invoke-token
      - id: invokemember-token
  - id: dotnet-explicit-load-api
    desc: .NET explicit assembly load API
    crit: component
    conf: 0.8
    any:
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-assembly-load
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-assembly-loadfrom
  - id: dotnet-assembly-load-invoke
    desc: .NET dynamic assembly load and invoke
    crit: suspicious
    conf: 0.92
    attack: T1620
    mbc: E1059
    all:
      - id: namespace-import
      - id: dotnet-explicit-load-api
      - id: dotnet-invoke-token
    any:
      - id: dotnet-gettypes-token
      - id: get-method-call
      - id: method-info-class
      - id: dotnet-methodbase-token
  - id: dotnet-assembly-load-delegate-invoke
    desc: .NET assembly load delegate invocation
    crit: suspicious
    conf: 0.94
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: namespace-import
      - id: dotnet-assembly-load-token
      - id: dotnet-gettypes-token
      - id: get-methods-call
      - id: create-delegate
      - id: action-delegate-token
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
  - id: dotnet-entrypoint-reflection
    desc: .NET entry point reflection access
    crit: suspicious
    conf: 0.92
    attack: T1620
    mbc: E1059
    all:
      - id: get-entrypoint
      - id: dotnet-invoke-token
    any:
      - id: appdomain-currentdomain
      - id: dotnet-explicit-load-api
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
  - id: dotnet-in-memory-assembly-invoke
    desc: .NET in-memory assembly invoke chain
    crit: suspicious
    conf: 0.93
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: namespace-import
      - id: appdomain-currentdomain
      - id: invokemember-token
      - id: assembly-bytes-buffer
    any:
      - id: load-and-invoke-token
      - id: dotnet-gettypes-token
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
  - id: dotnet-appdomain-byte-array-load
    desc: .NET AppDomain byte array loader
    crit: suspicious
    conf: 0.95
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: appdomain-class-token
      - id: appdomain-currentdomain
      - id: loadassembly-method-token
      - id: assembly-bytes-buffer
      - id: metadata/binary/metrics/size::tiny-dotnet
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
  - id: dotnet-appdomain-exportedtype-invoke
    desc: .NET AppDomain reflected exported invocation
    crit: suspicious
    conf: 0.94
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: appdomain-class-token
      - id: appdomain-getdomain-token
      - id: get-exported-types-token
      - id: objectives/anti-static/obfuscation/reflection/invoke::get-methods-call
      - id: invoke-token
    any:
      - id: vb-latecall-token
      - id: objectives/anti-static/obfuscation/reflection/invoke::method-info
      - id: objectives/anti-static/obfuscation/reflection/invoke::namespace-import
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
  - id: dotnet-exportedtype-constructor-invoke
    desc: .NET exported type constructor reflection invocation
    crit: suspicious
    conf: 0.93
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/anti-static/obfuscation/reflection/invoke::namespace-import
      - id: get-exported-types-token
      - id: get-constructors-token
      - id: dotnet-methodbase-token
      - id: invoke-token
    any:
      - id: get-assembly-token
      - id: dotnet-assembly-token
      - id: vb-latecall-token
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
  - id: dotnet-appdomain-callbyname-load
    desc: .NET AppDomain CallByName loader
    crit: suspicious
    conf: 0.95
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: appdomain-class-token
      - id: appdomain-getdomain-token
      - id: dotnet-assembly-load-token
      - id: vb-callbyname-token
      - id: get-exported-types-token
    any:
      - id: activator
      - id: get-constructors-token
      - id: dotnet-assembly-token
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
