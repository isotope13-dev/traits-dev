defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: dotnet-assembly-token
    desc: Reflection Assembly class reference
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: System.Reflection.Assembly
  - id: dotnet-gettypes-token
    desc: GetTypes method reference
    crit: component
    conf: 0.6
    if:
      type: text
      exact: GetTypes
  - id: dotnet-assembly-load-token
    desc: Assembly Load method token
    crit: component
    conf: 0.62
    if:
      type: text
      exact: Load
  - id: dotnet-invoke-token
    desc: MethodBase.Invoke reflection token
    crit: component
    conf: 0.8
    if:
      type: text
      exact: MethodBase.Invoke
  - id: get-entrypoint
    desc: Assembly entry point resolution
    crit: component
    conf: 0.7
    if:
      type: text
      exact: get_EntryPoint
  - id: appdomain-currentdomain
    desc: AppDomain.CurrentDomain accessor
    crit: component
    conf: 0.6
    if:
      type: text
      exact: get_CurrentDomain
  - id: assembly-bytes-buffer
    desc: Assembly bytes buffer token
    crit: component
    conf: 0.84
    if:
      type: text
      exact: assemblyBytes
  - id: load-and-invoke-token
    desc: LoadAndInvoke method token
    crit: component
    conf: 0.86
    if:
      type: text
      exact: LoadAndInvoke
  - id: appdomain-class-token
    desc: AppDomain class token
    crit: component
    conf: 0.65
    if:
      type: text
      exact: AppDomain
  - id: appdomain-getdomain-token
    desc: AppDomain GetDomain token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetDomain
  - id: get-exported-types-token
    desc: Reflection exported types token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetExportedTypes
  - id: action-delegate-token
    desc: System Action delegate token
    crit: component
    conf: 0.64
    if:
      type: text
      exact: Action
  - id: vb-latecall-token
    desc: VB late binding token
    crit: component
    conf: 0.86
    if:
      type: text
      exact: LateCall
  - id: vb-callbyname-token
    desc: VB CallByName late binding
    crit: component
    conf: 0.86
    if:
      type: hex
      section: .text
      pattern: 43 61 6C 6C 42 79 4E 61 6D 65
  - id: loadassembly-method-token
    desc: LoadAssembly method token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: LoadAssembly
  - id: get-constructors-token
    desc: Reflection GetConstructors token
    crit: component
    conf: 0.82
    if:
      type: text
      exact: GetConstructors
  - id: get-assembly-token
    desc: Assembly accessor token (get_Assembly)
    crit: component
    conf: 0.78
    if:
      type: text
      exact: get_Assembly
  - id: html-appdomain-byte-array-reflection
    desc: HTA AppDomain method invoke
    crit: suspicious
    conf: 0.97
    for: [html]
    attack: T1620
    mbc: E1059
    if:
      type: text
      regex: '(?i)AppDomain.{0,500}GetMethod.{0,500}Invoke'
  - id: html-char-array-stage
    desc: HTA converts payload text to characters
    crit: notable
    conf: 0.9
    for: [html]
    if:
      type: text
      substr: ToCharArray
  - id: html-array-reverse
    desc: HTA reverses an array
    crit: notable
    conf: 0.95
    for: [html]
    if:
      type: text
      substr: '[Array]::Reverse'

composite_rules:
  - id: dotnet-method-lookup-invoke
    desc: .NET reflected method lookup followed by invocation
    crit: notable
    conf: 0.9
    attack: T1620
    all:
      - id: metadata/lang/compiler/managed::get-method-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::invoke-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::methodbase-class
  - id: html-reversed-base64-assembly-stage
    desc: HTA reverses Base64 assembly data
    crit: notable
    conf: 0.97
    for: [html]
    attack: T1027, T1140
    mbc: B0032
    all:
      - id: html-char-array-stage
      - id: html-array-reverse
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
  - id: html-reflective-encoded-assembly-loader
    desc: HTA encoded reflective assembly loader
    crit: hostile
    conf: 0.99
    for: [html]
    attack: T1027, T1140, T1620
    mbc: B0032, E1059
    all:
      - id: html-appdomain-byte-array-reflection
      - id: html-reversed-base64-assembly-stage
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text

  # Variant-resilient aggregate of "reflective instantiation/execution" forms:
  # the original AppDomain/ExportedTypes loader shape, the Activator+GetMethod
  # shape (Type.GetType().GetMethod().Invoke -> Activator.CreateInstance), and
  # the explicit LoadAndInvoke / Type.InvokeMember forms. Used by packed-body
  # stego-loader composites so a new family that swaps reflection style still
  # trips the hostile rule. Component-only: a single reflection token is benign,
  # the verdict comes from pairing this with a packed body and pixel readback.
  - id: dotnet-reflective-invoke-any
    desc: .NET reflective instantiation or invocation form
    crit: component
    conf: 0.7
    any:
      - id: dotnet-appdomain-exportedtype-invoke
      - id: dotnet-exportedtype-constructor-invoke
      - id: activator-getmethod-pair
      - id: load-and-invoke-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::invoke-member-token
  - id: dotnet-explicit-load-api
    desc: .NET explicit assembly load API
    crit: component
    conf: 0.8
    any:
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-assembly-load
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-assembly-loadfrom
  - id: dotnet-assembly-load-invoke
    desc: .NET dynamic assembly load and invoke
    crit: suspicious
    conf: 0.92
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/lang/compiler/managed::reflection-namespace
      - id: dotnet-explicit-load-api
      - id: dotnet-invoke-token
    any:
      - id: dotnet-gettypes-token
      - id: metadata/lang/compiler/managed::get-method-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::method-info-class
      - id: micro-behaviors/process/interpreter/reflection/runtime::methodbase-class

  - id: dotnet-network-resource-method-loader
    desc: .NET network-fetched encoded resource with reflective invocation
    crit: hostile
    conf: 0.96
    attack: "T1105,T1140,T1620"
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/communications/http/client/managed::getstringasync
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: metadata/binary/resource::clr-resource-large
      - id: dotnet-method-lookup-invoke
  - id: dotnet-assembly-load-delegate-invoke
    desc: .NET assembly load delegate invocation
    crit: suspicious
    conf: 0.94
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::reflection-namespace
      - id: dotnet-assembly-load-token
      - id: dotnet-gettypes-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::get-methods-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::create-delegate
      - id: action-delegate-token
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/

  # Hostile only when the reflective/decode chain is paired with the generic
  # Visual Studio template identity and a renamed on-disk PE. This keeps
  # ordinary plugin hosts and resource-backed UI applications at suspicious or
  # notable while catching the opaque stub shape seen in commodity loaders.
  - id: dotnet-template-resource-reflective-loader
    desc: .NET template stub decodes resource and invokes it
    crit: hostile
    conf: 0.97
    attack: "T1027.009,T1140,T1620,T1036.005"
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/build/manifest::pe-manifest-myapplication-template
      - id: metadata/binary/resource::clr-resource-large
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: dotnet-method-lookup-invoke
      - id: objectives/evasion/masquerade/binary::pe-basename-differs-from-original-filename
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family/

  - id: dotnet-entrypoint-reflection
    desc: .NET entry point reflection access
    crit: suspicious
    conf: 0.92
    attack: T1620
    mbc: E1059
    all:
      - id: get-entrypoint
      - id: dotnet-invoke-token
    any:
      - id: appdomain-currentdomain
      - id: dotnet-explicit-load-api
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
  - id: dotnet-encrypted-overlay-reflective-loader
    desc: .NET encrypted overlay loader invokes a reflected payload
    crit: hostile
    conf: 0.98
    attack: "T1027.009,T1140,T1620"
    mbc: "B0030,B0040"
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/layout::large-overlay-64k
      - id: micro-behaviors/fs/file/read::dotnet-readallbytes-token
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-decryptor
      - id: dotnet-method-lookup-invoke
      - id: micro-behaviors/process/interpreter/reflection/runtime::activator
  - id: dotnet-in-memory-assembly-invoke
    desc: .NET in-memory assembly invoke chain
    crit: suspicious
    conf: 0.93
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::reflection-namespace
      - id: appdomain-currentdomain
      - id: micro-behaviors/process/interpreter/reflection/runtime::invoke-member-token
      - id: assembly-bytes-buffer
    any:
      - id: load-and-invoke-token
      - id: dotnet-gettypes-token
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
  - id: dotnet-appdomain-byte-array-load
    desc: .NET AppDomain byte array loader
    crit: suspicious
    conf: 0.95
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: appdomain-class-token
      - id: appdomain-currentdomain
      - id: loadassembly-method-token
      - id: assembly-bytes-buffer
      - id: metadata/binary/metrics/size::tiny-dotnet
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
  - id: dotnet-appdomain-exportedtype-invoke
    desc: .NET AppDomain reflected exported invocation
    crit: suspicious
    conf: 0.94
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: appdomain-class-token
      - id: appdomain-getdomain-token
      - id: get-exported-types-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::get-methods-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::invoke-token
    any:
      - id: vb-latecall-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::reflection-method-access
      - id: metadata/lang/compiler/managed::reflection-namespace
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
  - id: dotnet-exportedtype-constructor-invoke
    desc: .NET exported type constructor reflection invocation
    crit: suspicious
    conf: 0.93
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::reflection-namespace
      - id: get-exported-types-token
      - id: get-constructors-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::methodbase-class
      - id: micro-behaviors/process/interpreter/reflection/runtime::invoke-token
    any:
      - id: get-assembly-token
      - id: dotnet-assembly-token
      - id: vb-latecall-token
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
  - id: dotnet-appdomain-callbyname-load
    desc: .NET AppDomain CallByName loader
    crit: suspicious
    conf: 0.95
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: appdomain-class-token
      - id: appdomain-getdomain-token
      - id: dotnet-assembly-load-token
      - id: vb-callbyname-token
      - id: get-exported-types-token
    any:
      - id: micro-behaviors/process/interpreter/reflection/runtime::activator
      - id: get-constructors-token
      - id: dotnet-assembly-token
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/binary/vendor/
