# C# Reflection Traits
# objective: exec, behavior: reflection
defaults:
  platforms: [windows]
  for: [csharp]
traits:
  - id: assembly-load
    desc: Runtime assembly loading
    crit: suspicious
    mbc: "F0004.001"
    attack: "T1620"
    conf: 0.95
    if:
      type: ast
      kind: call
      exact: "Assembly.Load"
  - id: assembly-load-file
    desc: Assembly loaded from file
    crit: suspicious
    mbc: "F0004.001"
    attack: "T1620"
    conf: 0.95
    if:
      type: ast
      kind: call
      exact: "Assembly.LoadFile"
  - id: activator-create
    desc: Dynamic object creation via reflection
    crit: suspicious
    mbc: "F0004"
    attack: "T1620"
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: "Activator.CreateInstance"
  - id: method-invoke-dup
    desc: Reflective method invocation
    crit: suspicious
    mbc: "F0004"
    attack: "T1620"
    conf: 0.95
    if:
      type: ast
      kind: call
      exact: ".Invoke("
  - id: get-method
    desc: Reflection API to get method
    crit: suspicious
    mbc: "F0004"
    conf: 0.75
    if:
      type: ast
      kind: call
      exact: "GetMethod"
  - id: get-type
    desc: Reflection API to get type
    crit: suspicious
    mbc: "F0004"
    conf: 0.75
    if:
      type: ast
      kind: call
      exact: "GetType"
  - id: marshal
    desc: Marshal operations (memory/native interop)
    crit: suspicious
    mbc: "F0004"
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: "Marshal."
  - id: dllimport
    desc: P/Invoke native function import
    crit: suspicious
    mbc: "F0004"
    attack: "T1106"
    conf: 0.9
    if:
      type: ast
      kind: attribute
      exact: "DllImport"
