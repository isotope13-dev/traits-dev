# C# Reflection Traits
# objective: exec, behavior: reflection
defaults:
  platforms: [windows]
  for: [csharp]
traits:
  - id: assembly-load
    desc: Runtime assembly loading
    # Assembly.Load is the standard reflective-loading API used by every .NET
    # plugin host, XAML/test runner, and DI system (e.g. Avalonia's
    # XamlIlRuntimeCompiler / AssemblyDescriptorResolver). It's a capability;
    # the malicious case is loading *decoded/downloaded* bytes, which the
    # reflective-loader composites express by combining it with that evidence.
    crit: notable
    mbc: "F0004.001"
    attack: "T1620"
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: "Assembly.Load"
  - id: assembly-load-file
    desc: Assembly loaded from file
    crit: notable
    mbc: "F0004.001"
    attack: "T1620"
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: "Assembly.LoadFile"
  - id: activator-create
    desc: Dynamic object creation via reflection
    # Activator.CreateInstance is the standard .NET dynamic-instantiation API
    # (DI containers, deserializers, plugin loaders) — a capability, not
    # rarely-legitimate. Reflective-loader composites combine it with decode/
    # download evidence for the suspicious verdict.
    crit: notable
    mbc: "F0004"
    attack: "T1620"
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: "Activator.CreateInstance"
  - id: method-invoke-dup
    desc: Reflective method invocation
    # `.Invoke(` also matches delegate invocation and event raising — ubiquitous.
    crit: notable
    mbc: "F0004"
    attack: "T1620"
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: ".Invoke("
  - id: get-method
    desc: Reflection API to get method
    crit: notable
    mbc: "F0004"
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: "GetMethod"
  - id: get-type
    desc: Reflection API to get type
    # GetType() is called pervasively in ordinary .NET (type checks, switches).
    crit: notable
    mbc: "F0004"
    conf: 0.75
    if:
      type: symbol
      kind: call
      exact: "GetType"
  - id: marshal
    desc: Marshal operations (memory/native interop)
    # Marshal.Copy/PtrToStructure etc. are standard P/Invoke interop.
    crit: notable
    mbc: "F0004"
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: "Marshal."
  - id: dllimport
    desc: P/Invoke native function import
    # [DllImport] is the standard P/Invoke declaration, ubiquitous in interop.
    crit: notable
    mbc: "F0004"
    attack: "T1106"
    conf: 0.9
    if:
      type: symbol
      kind: member
      exact: "DllImport"
