# .NET reflection type/method names hidden as Base64 (or split-concat) strings
# so that static scanners never see "System.Activator" / "CreateInstance". These
# tokens are the deterministic Base64 encodings of language/framework construct
# names (not sample IOCs): any crypter that hides the same reflection type name
# produces the identical standalone string. Observed in a Wordle-game-decoy .NET
# crypter that ran ldstr "U3lzdGVtLkFjdGl2YXRvcg==" (= "System.Activator") then
# rebuilt "CreateInstance" as 'C' + "reateInstance" before the GetType/GetMethod
# /Invoke chain.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.009
  mbc: B0009.014

traits:
  - id: b64-system-activator
    desc: 'b64 system activator'
    crit: component
    conf: 0.9
    if:
      type: text
      exact: U3lzdGVtLkFjdGl2YXRvcg==
  - id: b64-system-reflection-assembly
    desc: "b64 System.Reflection.Assembly typename"
    crit: component
    conf: 0.9
    if:
      type: text
      exact: U3lzdGVtLlJlZmxlY3Rpb24uQXNzZW1ibHk=
  - id: b64-system-appdomain
    desc: Base64-encoded "System.AppDomain" type name
    crit: component
    conf: 0.9
    if:
      type: text
      exact: U3lzdGVtLkFwcERvbWFpbg==
  - id: b64-system-reflection
    desc: "b64-encoded \"System.reflect\" namespace token"
    crit: component
    conf: 0.85
    if:
      type: text
      exact: U3lzdGVtLlJlZmxlY3Rpb24=
  # Standalone "reateInstance" only arises from splitting "CreateInstance" as
  # 'C' + "reateInstance" to defeat substring scanners; it is not a real symbol.
  - id: split-createinstance-fragment
    desc: 'Fragmented "CreateInstance" method name'
    crit: component
    conf: 0.85
    if:
      type: text
      exact: reateInstance

composite_rules:
  - id: dotnet-encoded-reflection-typename
    desc: .NET reflection type name hidden as Base64/split string
    crit: suspicious
    conf: 0.88
    all:
      - id: metadata/binary/framework::dotnet-metadata
      # dir-ref: matches when any encoded reflection-typename atom in this
      # directory fires (b64 System.Activator / Reflection.Assembly / AppDomain
      # / Reflection, or the split "reateInstance" fragment).
      - id: objectives/anti-static/obfuscation/reflection/encoded::b64-system-activator
      - id: objectives/anti-static/obfuscation/reflection/encoded::b64-system-appdomain
      - id: objectives/anti-static/obfuscation/reflection/encoded::b64-system-reflection
      - id: objectives/anti-static/obfuscation/reflection/encoded::b64-system-reflection-assembly
      - id: objectives/anti-static/obfuscation/reflection/encoded::split-createinstance-fragment
    unless:
      - id: metadata/signed/platform/

  # Hidden reflection type name + an actual reflective-invoke form + a packed
  # near-maximum-entropy body == a crypter stub that decodes and reflectively
  # executes a hidden payload while hiding the API names from static analysis.
  - id: dotnet-obfuscated-reflective-loader
    desc: .NET packed loader with Base64-hidden reflection type name
    crit: hostile
    conf: 0.95
    all:
      - id: dotnet-encoded-reflection-typename
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-reflective-invoke-any
      - id: objectives/anti-static/pack/entropy::dotnet-high-entropy-text-raw
    unless:
      - id: metadata/signed/platform/
