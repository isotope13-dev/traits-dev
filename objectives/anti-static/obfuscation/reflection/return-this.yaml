defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: return-this-prototype
    desc: Detects heavy prototype function manipulation
    crit: notable
    conf: 0.7
    count_min: 5
    if:
      type: raw
      regex: prototype\.[A-Za-z0-9_$]+=function\(\)\{return this
    downgrade:
      all:
        - id: metadata/binary/metrics::no-functions
        - id: metadata/binary/metrics::no-imports
  - id: return-this-body
    desc: Detects function returning this
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: function\s*\(\s*\)\s*\{[^}]{0,80}return\s+this\s*[;}]
composite_rules:
  - id: return-this
    desc: Detects prototype function that returns this
    crit: notable
    conf: 0.75
    all:
      - id: return-this-prototype
      - id: return-this-body
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
