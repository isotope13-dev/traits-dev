# Identity Function Proxy Obfuscation
# Detects functions that simply return their argument, used for obfuscation.
# Pattern: function x(y){return y;}
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.8
traits:
  - id: identity-function-proxy
    desc: 'func that returns its argument directly'
    size_max: 500000
    if:
      # Migrated from a tree-sitter query whose `(#eq? @param @ret)` predicate
      # is a param↔return backreference no regex can express. The AST walker
      # now performs that check and exposes the count as
      # `ast.identity_function_count`; ≥5 identity proxies = obfuscation.
      type: metrics
      field: 'ast.identity_function_count'
      min: 5
    unless:
      - type: basename
        regex: ^jsbn(-combined|2)?\.js$
      - id: well-known/app/tabby::tabby-builtin-plugin-dist-path
      - id: metadata/package/files/dependency::node-modules-path
      - type: basename
        regex: ^(rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/library/structure::js-large-module-bundle
      - id: well-known/app/open-webui-computer/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/library/jspdf/
      - id: metadata/lang/source::typescript-protobuf-generated

  - id: massive-identity-function-proxies
    desc: "Massive use of identity func proxies"
    crit: suspicious
    conf: 0.9
    size_max: 500000
    # Same `ast.identity_function_count` metric as `identity-function-proxy`,
    # at the higher 40+ density threshold (was a `count_min: 40` query whose
    # `(#eq? @param @ret)` backreference the AST walker now evaluates).
    if:
      type: metrics
      field: 'ast.identity_function_count'
      min: 40
    unless:
      - type: basename
        regex: ^jsbn(-combined|2)?\.js$
      - id: well-known/app/tabby::tabby-builtin-plugin-dist-path
      - id: metadata/package/files/dependency::node-modules-path
      - type: basename
        regex: ^(rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/library/jspdf/
      - id: metadata/lang/source::typescript-protobuf-generated
