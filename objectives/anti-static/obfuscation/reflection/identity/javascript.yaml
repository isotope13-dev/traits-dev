# Identity Function Proxy Obfuscation
# Detects functions that simply return their argument, used for obfuscation.
# Pattern: function x(y){return y;}
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.8
traits:
  - id: identity-function-proxy
    desc: Function that returns its argument directly (obfuscation)
    size_max: 500000
    if:
      # Migrated from a tree-sitter query whose `(#eq? @param @ret)` predicate
      # is a param↔return backreference no regex can express. The AST walker
      # now performs that check and exposes the count as
      # `ast.identity_function_count`; ≥5 identity proxies = obfuscation.
      type: metrics
      field: 'ast.identity_function_count'
      min: 5
    unless:
      - type: basename
        regex: \.map$
      - type: basename
        regex: ^jsbn(-combined|2)?\.js$
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-[^\\/]+[\\/]dist[\\/]
      - type: basename
        regex: (^|[\\/])node_modules[\\/]
      - type: basename
        regex: ^(rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled

  - id: massive-identity-function-proxies
    desc: Massive use of identity function proxies (obfuscation)
    crit: suspicious
    conf: 0.9
    size_max: 500000
    count_min: 40
    if:
      type: tree-sitter
      language: javascript
      # Matches: function x(y){ return y; }
      query: >
        (function_declaration
          (formal_parameters
            (identifier) @param
          )
          (statement_block
            .
            (return_statement
              (identifier) @ret
            )
            .
          )
        )
        (#eq? @param @ret)
    unless:
      - type: basename
        regex: \.map$
      - type: basename
        regex: ^jsbn(-combined|2)?\.js$
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-[^\\/]+[\\/]dist[\\/]
      - type: basename
        regex: (^|[\\/])node_modules[\\/]
      - type: basename
        regex: ^(rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
