# Dalvik DEX Reflection Patterns
# Detects heavy reflection usage in Dalvik bytecode (classes.dex)
# Used by Android rootkits/trojans as minimal loader stubs
# ATT&CK: T1406 (Obfuscated Files or Information — Android)
defaults:
  platforms: [android, linux, macos, windows, unix]
  for: [binaries, scripts, source, manifests, documents, media, data]
  mbc: "F0006"
  attack: "T1406"

traits:
  - id: dalvik-reflect-method
    desc: Dalvik reflect/Method type descriptor
    crit: component
    if:
      type: string_value
      substr: "Ljava/lang/reflect/Method;"

  - id: dalvik-reflect-field
    desc: Dalvik reflect/Field type descriptor
    crit: component
    if:
      type: string_value
      substr: "Ljava/lang/reflect/Field;"

  - id: dalvik-reflect-constructor
    desc: Dalvik reflect/Constructor type descriptor
    crit: component
    if:
      type: string_value
      substr: "Ljava/lang/reflect/Constructor;"

  - id: dalvik-classloader
    desc: Dalvik ClassLoader type descriptor
    crit: component
    if:
      type: string_value
      substr: "Ljava/lang/ClassLoader;"

  - id: dalvik-attach-base-context
    desc: Application attachBaseContext early hook
    crit: notable
    conf: 0.85
    if:
      type: string_value
      word: "attachBaseContext"

  - id: dalvik-zipfile-usage
    desc: Dalvik ZipFile type for payload extraction
    crit: component
    if:
      type: string_value
      substr: "Ljava/util/zip/ZipFile;"

  - id: dalvik-set-accessible
    desc: Dalvik setAccessible access bypass
    crit: notable
    conf: 0.9
    if:
      type: string_value
      word: "setAccessible"

  - id: dalvik-get-declared-method
    desc: Dalvik getDeclaredMethod reflection
    crit: component
    if:
      type: string_value
      word: "getDeclaredMethod"

  - id: dalvik-get-declared-field
    desc: Dalvik getDeclaredField reflection
    crit: component
    if:
      type: string_value
      word: "getDeclaredField"

  - id: dalvik-minimal-stub
    desc: Tiny file with very few strings
    crit: component
    conf: 0.7
    if:
      type: string_value_count
      max: 120
      min_length: 4
    size_max: 20000

composite_rules:
  - id: dalvik-heavy-reflection
    desc: Dalvik bytecode with heavy reflection
    crit: suspicious
    conf: 0.9
    needs: 3
    any:
      - id: dalvik-reflect-method
      - id: dalvik-reflect-field
      - id: dalvik-reflect-constructor
      - id: dalvik-classloader
      - id: dalvik-set-accessible
      - id: dalvik-get-declared-method
      - id: dalvik-get-declared-field

  - id: dalvik-dropper-stub
    desc: Minimal Dalvik loader with reflection
    crit: suspicious
    conf: 0.92
    all:
      - id: dalvik-minimal-stub
      - id: dalvik-heavy-reflection
    any:
      - id: dalvik-attach-base-context
      - id: dalvik-zipfile-usage
