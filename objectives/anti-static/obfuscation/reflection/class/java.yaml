defaults:
  platforms: [windows, unix]
  for:
    - java
    - class
composite_rules:
  - id: java-classloader-dropper
    desc: Java classloader dropper pattern
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/interpreter/runtime/jvm::java-urlclassloader-api
      - id: micro-behaviors/data/source/dynamic/reflect::java-method-invoke-bytecode
