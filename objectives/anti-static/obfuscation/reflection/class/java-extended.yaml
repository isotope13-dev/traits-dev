defaults:
  platforms: [windows, unix]
  attack: T1140
  mbc: E1202
  for:
    - java
    - class
traits:
  - id: java-reflective-method
    desc: Java reflective method invocation
    crit: component
    conf: 0.85
    if:
      type: text
      substr: java.lang.reflect.Method
composite_rules:
  - id: java-dynamic-code-loading-extended
    desc: Java dynamic code loading pattern extended
    crit: suspicious
    conf: 0.92
    all:
      - id: java-defineclass
    any:
      - id: java-loadclass
      - id: java-findclass
      - id: java-reflective-method
    unless:
      - id: metadata/binary/framework::is-binary
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence/platform_suites::java-test-directory
      - id: metadata/package/testing/presence/platform_suites::java-generic-test-directory
      - id: metadata/package/testing/presence/platform_suites::java-test-filename
