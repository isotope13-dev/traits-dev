defaults:
  attack: T1140
  mbc: E1202
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - java
    - class
traits:
  - id: java-reflective-method
    desc: Java reflective method invocation
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: java.lang.reflect.Method
composite_rules:
  - id: java-dynamic-code-loading-extended
    desc: Java dynamic code loading pattern extended
    crit: suspicious
    conf: 0.92
    all:
      - id: java-defineclass
    any:
      - id: java-loadclass
      - id: java-findclass
      - id: java-reflective-method
