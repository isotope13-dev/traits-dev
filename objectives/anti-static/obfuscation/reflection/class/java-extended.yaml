defaults:
  platforms: [windows, unix]
  attack: T1140
  mbc: E1202
  for:
    - java
    - class
traits:
  - id: java-reflective-method
    desc: Java reflective method invocation
    crit: component
    conf: 0.85
    if:
      type: text
      substr: java.lang.reflect.Method
  - id: java-test-source-dir
    desc: Java source file in test directory
    crit: component
    conf: 1.0
    for: [java]
    if:
      type: path
      regex: '[\\/]src[\\/](test|androidTest)[\\/]'
  - id: java-test-source-filename
    desc: Java source file with test naming convention
    crit: component
    conf: 1.0
    for: [java]
    if:
      type: path
      basename: true
      regex: '(Test|Spec|IT)s?\.java$'
composite_rules:
  - id: java-dynamic-code-loading-extended
    desc: Java dynamic code loading pattern extended
    crit: notable
    conf: 0.92
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
    any:
      - id: java-loadclass
      - id: java-findclass
      - id: java-reflective-method
    unless:
      - id: metadata/binary/framework::is-binary
      - id: metadata/package/testing
      - id: java-test-source-dir
      - id: java-test-source-filename
