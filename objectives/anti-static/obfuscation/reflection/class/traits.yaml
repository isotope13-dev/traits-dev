# Dynamic Loading Patterns
# These patterns can be legitimate but are also used by malware
# Useful for ML classification and behavioral analysis
defaults:
  platforms: [unix, windows, macos]
  for: [python, javascript, powershell, pe, elf, macho]
traits:
  # LoadLibrary (Windows) - component traits
  - id: loadlibrary-sym
    desc: LoadLibrary symbol
    crit: component
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: symbol
      regex: "^LoadLibrary(Ex|A|W)$"
      # Python dynamic import - component traits
  - id: py-dunder-import
    desc: Python __import__ builtin
    crit: component
    if:
      type: ast
      kind: call
      exact: "__import__"
  - id: py-importlib-import-module
    desc: Python importlib.import_module
    crit: component
    if:
      type: ast
      kind: call
      exact: "importlib.import_module"
  - id: py-exec-compile
    desc: Python exec(compile(...))
    crit: component
    if:
      type: raw
      substr: "exec(compile"
  - id: py-importlib-util
    desc: Python importlib.util
    crit: component
    if:
      type: string_value
      substr: "importlib.util"
      # Python chained import (often used for obfuscation)
  - id: python-import-chain
    desc: Chained __import__ calls
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: "__import__\\(.{0,50}__import__"
      # Python zipimporter - loads modules from ZIP files
  - id: python-zipimporter
    desc: Python zipimporter module loading alias
    crit: notable
    conf: 0.9
    if:
      id: well-known/malware/rat/pupy::zipimporter-str
      # Python zipimporter load_module - executes code from ZIP
  - id: python-zipimporter-load
    desc: Loads module from ZIP archive
    crit: notable
    conf: 0.95
    # Small files with zipimporter logic are more suspicious
    size_max: 1000000
    if:
      type: symbol
      regex: "\\.load_module"
      # Java reflection loading - component traits
  - id: java-class-forname
    desc: Java Class.forName
    crit: component
    if:
      type: string_value
      substr: "Class.forName"
  - id: java-classloader
    desc: Java ClassLoader
    crit: component
    if:
      type: string_value
      substr: "ClassLoader"
  - id: java-defineclass
    desc: Java defineClass
    crit: component
    if:
      type: string_value
      substr: "defineClass"
  - id: java-loadclass
    desc: Java loadClass
    crit: component
    if:
      type: string_value
      substr: "loadClass"
  - id: java-newinstance
    desc: Java newInstance
    crit: component
    if:
      type: string_value
      substr: "newInstance"
      # Java findClass component
  - id: java-findclass
    desc: Java findClass
    crit: component
    if:
      type: string_value
      substr: "findClass"
      # Java resource-backed class loader components
  - id: java-getresourceasstream
    desc: Java getResourceAsStream
    crit: component
    if:
      type: string_value
      substr: "getResourceAsStream"
  - id: java-protectiondomain
    desc: Java ProtectionDomain
    crit: component
    if:
      type: string_value
      substr: "ProtectionDomain"
  - id: java-getprotectiondomain
    desc: Java getProtectionDomain
    crit: component
    if:
      type: string_value
      substr: "getProtectionDomain"
      # Java reflective method invocation components
  - id: java-reflect-method
    desc: Java java/lang/reflect/Method
    crit: component
    if:
      type: string_value
      substr: "java/lang/reflect/Method"
  - id: java-invoke
    desc: Java invoke method
    crit: component
    for: [java, class]
    if:
      type: string_value
      word: "invoke"
    unless:
      - type: basename
        regex: '\.(?:[cm]?js|jsx|tsx?|mjs)$'
  - id: java-getmethod
    desc: Java getMethod
    crit: component
    if:
      type: string_value
      substr: "getMethod"
      # Java string reversal components
  - id: java-stringbuilder
    desc: Java java/lang/StringBuilder
    crit: component
    if:
      type: string_value
      substr: "java/lang/StringBuilder"
  - id: java-reverse
    desc: Java reverse method
    crit: component
    for: [java, class]
    if:
      type: string_value
      word: "reverse"
    unless:
      - type: basename
        regex: '\.(?:[cm]?js|jsx|tsx?|mjs)$'
  - id: java-tostring
    desc: Java toString method
    crit: component
    for: [java, class]
    if:
      type: string_value
      word: "toString"
      # .NET reflection loading components
  - id: dotnet-assembly-load
    desc: .NET Assembly.Load
    crit: component
    platforms: [windows]
    for: [python, javascript, powershell, pe, csharp]
    if:
      type: string_value
      substr: "Assembly.Load"
  - id: dotnet-assembly-loadfrom
    desc: .NET Assembly.LoadFrom
    crit: component
    platforms: [windows]
    for: [python, javascript, powershell, pe, csharp]
    if:
      type: string_value
      substr: "Assembly.LoadFrom"
  - id: dotnet-activator-createinstance
    desc: .NET Activator.CreateInstance
    crit: component
    platforms: [windows]
    for: [python, javascript, powershell, pe, csharp]
    if:
      type: string_value
      substr: "Activator.CreateInstance"
  - id: dotnet-type-gettype
    desc: .NET Type.GetType
    crit: component
    platforms: [windows]
    for: [python, javascript, powershell, pe, csharp]
    if:
      type: string_value
      substr: "Type.GetType"
  - id: dotnet-methodinfo-invoke
    desc: .NET MethodInfo.Invoke
    crit: component
    platforms: [windows]
    for: [python, javascript, powershell, pe, csharp]
    if:
      type: string_value
      substr: "MethodInfo.Invoke"
      # Go plugin loading components
  - id: go-plugin-open
    desc: Go plugin.Open
    crit: component
    if:
      type: string_value
      substr: "plugin.Open"
  - id: go-plugin-lookup
    desc: Go plugin.Lookup
    crit: component
    if:
      type: string_value
      substr: "plugin.Lookup"
  - id: go-plugin-symbol
    desc: Go plugin.Symbol
    crit: component
    if:
      type: string_value
      substr: "plugin.Symbol"
      # Executable memory components
  - id: mprotect-sym
    desc: mprotect symbol
    crit: component
    if:
      type: symbol
      exact: "mprotect"
  - id: virtualprotect-sym
    desc: VirtualProtect symbol
    crit: component
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    if:
      type: symbol
      regex: "^VirtualProtect(Ex)?$"
      # Removed page-execute-str duplicate - use objectives/evasion/process/injection/native::page-execute-str
  - id: map-anonymous-str
    desc: MAP_ANONYMOUS constant
    crit: component
    if:
      type: string_value
      substr: "MAP_ANONYMOUS"
      # JIT runtime references
  - id: jit-runtime-ref-1
    desc: JIT compilation runtime reference (jit_compile/jit_runtime)
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: "(?i)jit_compile|jit_runtime"
  - id: jit-runtime-ref-2
    desc: JIT compilation runtime reference (libjit/LuaJIT/V8 JIT)
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: "(?i)libjit|LuaJIT|V8 JIT"
composite_rules:
  # dlopen helper
  - id: dlsym-with-cleanup
    desc: dlsym with dlclose/dlerror
    crit: component
    platforms: [unix]
    for: [python, javascript, elf]
    all:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
    any:
      - id: micro-behaviors/dylib/load::dlclose
      - id: micro-behaviors/dylib/load::dlerror
  - id: dlopen-comp
    desc: Runtime library loading via dlopen
    crit: notable
    conf: 0.9
    platforms: [unix]
    for: [python, javascript, elf]
    any:
      - id: objectives/anti-static/obfuscation/reflection/class::dlopen
      - id: dlsym-with-cleanup
  - id: loadlibrary
    desc: Runtime library loading via LoadLibrary
    crit: notable
    conf: 0.9
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    any:
      - id: loadlibrary-sym
      - id: micro-behaviors/dylib/lookup::get-proc-address
  - id: python-import
    desc: Python dynamic import patterns
    crit: notable
    conf: 0.85
    any:
      - id: py-dunder-import
      - id: py-importlib-import-module
      - id: py-exec-compile
      - id: py-importlib-util
  - id: java-reflection
    desc: Java reflection class loading
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: java-class-forname
      - id: java-classloader
      - id: java-defineclass
      - id: java-loadclass
      - id: java-newinstance
        # Java defineClass + loadClass/findClass
  - id: java-load-or-find
    desc: Java loadClass or findClass
    crit: component
    any:
      - id: java-loadclass
      - id: java-findclass
  - id: java-defineclass-dynamic
    desc: Dynamic class definition from bytecode
    crit: suspicious
    conf: 0.95
    all:
      - id: java-defineclass
      - id: java-load-or-find
        # Java resource classloader
  - id: java-protection-domain
    desc: Java ProtectionDomain reference
    crit: component
    any:
      - id: java-protectiondomain
      - id: java-getprotectiondomain
  - id: java-resource-classloader
    desc: Defines class from resource stream
    crit: suspicious
    conf: 0.92
    all:
      - id: java-getresourceasstream
      - id: java-defineclass
      - id: java-load-or-find
      - id: java-protection-domain
        # Java reflective invoke
  - id: java-invoke-or-getmethod
    desc: Java invoke or getMethod
    crit: component
    any:
      - id: java-invoke
      - id: java-getmethod
  - id: java-reflective-invoke
    desc: Reflective method invocation in bytecode
    crit: suspicious
    conf: 0.9
    all:
      - id: java-reflect-method
      - id: java-invoke-or-getmethod
  - id: java-string-reversal
    desc: String reversal deobfuscation technique
    crit: notable
    conf: 0.85
    all:
      - id: java-stringbuilder
      - id: java-reverse
      - id: java-tostring
  - id: dotnet-reflection
    desc: .NET reflection assembly loading
    crit: notable
    conf: 0.85
    platforms: [windows]
    for: [python, javascript, powershell, pe, csharp]
    any:
      - id: dotnet-assembly-load
      - id: dotnet-assembly-loadfrom
      - id: dotnet-activator-createinstance
      - id: dotnet-type-gettype
      - id: dotnet-methodinfo-invoke
    unless:
      - id: metadata/format/pe::resource-only-dll
  - id: go-plugin
    desc: Go plugin dynamic loading
    crit: notable
    conf: 0.9
    any:
      - id: go-plugin-open
      - id: go-plugin-lookup
      - id: go-plugin-symbol
        # Unix executable memory
  - id: unix-exec-perm
    desc: Unix executable permission indicators
    crit: component
    any:
      - id: mprotect-sym
      - id: micro-behaviors/mem/alloc/executable::prot-exec-const
      - id: objectives/evasion/process/injection/native::page-execute-str
  - id: unix-mmap-anon
    desc: Unix anonymous mmap
    crit: component
    all:
      - id: micro-behaviors/mem/alloc/executable::mmap-symbol
      - id: map-anonymous-str
  - id: windows-exec-memory
    desc: Windows executable memory
    crit: component
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    all:
      - id: virtualprotect-sym
      - id: objectives/evasion/process/injection/native::page-execute-str
  - id: executable-memory
    desc: Allocates or modifies executable memory
    crit: notable
    conf: 0.8
    any:
      - id: unix-mmap-anon
      - id: windows-exec-memory
  - id: jit-runtime-ref
    desc: JIT compilation runtime reference
    crit: notable
    conf: 0.85
    any:
      - id: jit-runtime-ref-1
      - id: jit-runtime-ref-2
        # JIT compilation indicators
  - id: jit
    desc: JIT compilation patterns
    crit: notable
    conf: 0.85
    all:
      - id: executable-memory
      - id: jit-runtime-ref
        # Suspicious dynamic loading with memory execution
  - id: memory-exec
    desc: Dynamic loading with executable memory
    crit: suspicious
    conf: 0.85
    all:
      - id: executable-memory
    any:
      - id: dlopen
      - id: loadlibrary
        # PE viewers/debuggers display PAGE_* constants as UI labels
    downgrade:
      any:
        - id: micro-behaviors/mem/alloc/executable::page-protection-enum
        - id: micro-behaviors/fs/file/section::pe-viewer-machine-types
