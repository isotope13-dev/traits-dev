defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, c, cpp]
traits:
- id: loadlibrary-sym
  desc: LoadLibrary symbol
  crit: component
  platforms: [windows]
  for: [pe, c, cpp]
  if:
    type: symbol
    regex: ^LoadLibrary(Ex|A|W)$
# py-importlib-import-module relocated to
# micro-behaviors/os/api-resolution/dynamic (the standard dynamic-import API is a
# neutral capability); the python-import composite references it cross-directory.
- id: py-exec-compile
  desc: Python exec(compile(...))
  crit: component
  if:
    type: text
    substr: exec(compile
- id: py-importlib-util
  desc: Python importlib.util
  crit: component
  if:
    type: text
    substr: importlib.util
- id: python-import-chain
  desc: Chained __import__ calls
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: __import__\(.{0,50}__import__
- id: python-zipimporter-load
  desc: Loads module from ZIP archive
  crit: suspicious
  conf: 0.95
  for: [python, pyc]
  size_max: 1000000
  if:
    type: text
    regex: 'zipimport(er)?[\s\S]{0,200}\.load_module|\.load_module[\s\S]{0,200}zipimport(er)?'
  unless:
  - id: metadata/library/python-stdlib
  - id: metadata/package/testing/harness/unit/
  - type: path
    basename: true
    exact: zipimport.pyc
  - type: path
    basename: true
    regex: '^zipimport\.cpython-[0-9]+\.pyc$'
  - id: metadata/package/files/system-package::os-python-runtime-path
  - type: text
    regex: 'from\s+test\s+import\s+support'
  - type: text
    regex: 'def\s+load_module\s*\('
  - type: text
    regex: 'class\s+\w*Loader\b'
  - type: text
    regex: 'from\s+importlib(\.machinery)?\s+import\s+\w*Loader'
- id: java-findclass
  desc: Java findClass
  crit: component
  for: [java, class]
  if:
    type: text
    substr: findClass
- id: java-getresourceasstream
  desc: Java getResourceAsStream
  crit: component
  for: [java, class]
  if:
    type: text
    substr: getResourceAsStream
- id: java-protectiondomain
  desc: Java ProtectionDomain
  crit: component
  for: [java, class]
  if:
    type: text
    substr: ProtectionDomain
- id: java-reflect-method
  desc: Java java/lang/reflect/Method
  crit: component
  for: [java, class]
  if:
    type: text
    substr: java/lang/reflect/Method
- id: java-invoke
  desc: Java invoke() call
  crit: component
  for:
  - java
  - class
  if:
    type: symbol
    kind: call
    regex: '(^|\.)invoke$'
  unless:
  - type: basename
    regex: \.([cm]?js|jsx|tsx?|mjs)$
- id: java-getmethod
  desc: Java getMethod
  crit: component
  for: [java, class]
  if:
    type: text
    substr: getMethod
- id: java-reverse
  desc: Java reverse() call
  crit: component
  for:
  - java
  - class
  if:
    type: symbol
    kind: call
    regex: '(^|\.)reverse$'
  unless:
  - type: basename
    regex: \.([cm]?js|jsx|tsx?|mjs)$
- id: dotnet-assembly-load
  desc: .NET Assembly.Load
  crit: component
  platforms:
  - windows
  for: [pe, csharp]
  if:
    type: text
    substr: Assembly.Load
- id: dotnet-assembly-loadfrom
  desc: .NET Assembly.LoadFrom
  crit: component
  platforms:
  - windows
  for: [pe, csharp]
  if:
    type: text
    substr: Assembly.LoadFrom
- id: dotnet-activator-createinstance
  desc: .NET Activator.CreateInstance
  crit: component
  platforms:
  - windows
  for: [pe, csharp]
  if:
    type: text
    substr: Activator.CreateInstance
- id: dotnet-type-gettype
  desc: .NET Type.GetType
  crit: component
  platforms:
  - windows
  for: [pe, csharp]
  if:
    type: text
    substr: Type.GetType
- id: dotnet-methodinfo-invoke
  desc: .NET MethodInfo.Invoke
  crit: component
  platforms:
  - windows
  for: [pe, csharp]
  if:
    type: text
    substr: MethodInfo.Invoke
- id: go-plugin-open
  desc: Go plugin.Open
  crit: component
  if:
    type: text
    substr: plugin.Open
- id: go-plugin-lookup
  desc: Go plugin.Lookup
  crit: component
  if:
    type: text
    substr: plugin.Lookup
- id: go-plugin-symbol
  desc: Go plugin.Symbol
  crit: component
  if:
    type: text
    substr: plugin.Symbol
- id: jit-runtime-ref-1
  desc: 'JIT compilation runtime ref'
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)jit_compile|jit_runtime
- id: jit-runtime-ref-2
  desc: "JIT compilation runtime ref"
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)libjit|LuaJIT|V8 JIT
composite_rules:
- id: dlsym-with-cleanup
  desc: dlsym with dlclose/dlerror
  crit: component
  platforms:
  - linux
  - macos
  for: [elf, macho, c, cpp]
  all:
  - id: micro-behaviors/dylib/lookup::dlsym-symbol
  any:
  - id: micro-behaviors/dylib/load/runtime::dlclose
  - id: micro-behaviors/dylib/load/runtime::dlerror
  unless:
  - id: metadata/file/string/identity::system-shell-basename
  - id: well-known/app/drivers/
  - id: well-known/tool/reverse-engineering/frida/
- id: dlopen-comp
  desc: Runtime library loading via dlopen
  crit: notable
  conf: 0.9
  platforms:
  - linux
  - macos
  for: [elf, macho, c, cpp]
  any:
  - id: objectives/anti-static/obfuscation/reflection/class::dlopen
  - id: dlsym-with-cleanup
  unless:
  - id: well-known/app/kilocode::kilo-code-native-runtime
- id: loadlibrary
  desc: Runtime library loading via LoadLibrary
  crit: notable
  conf: 0.9
  platforms:
  - windows
  for: [pe, c, cpp]
  any:
  - id: loadlibrary-sym
  - id: micro-behaviors/dylib/lookup::get-proc-address
  unless:
  - id: metadata/library/python-runtime::python-runtime
- id: python-import
  desc: Python dynamic import patterns
  crit: suspicious
  conf: 0.85
  # A PE that embeds the standard Python/PyInstaller runtime inherits the
  # runtime's import machinery. Analyze the dynamic-import objective on the
  # Python source/bytecode member where it is an authored behavior, not on the
  # native wrapper that bundles it.
  for: [python, pyc]
  any:
  - id: micro-behaviors/process/interpreter/python::dunder-import-call
  - id: micro-behaviors/os/api-resolution/dynamic::py-importlib-import-module
  - id: py-exec-compile
  - id: py-importlib-util
  unless:
  - id: metadata/library/python-runtime::python-runtime
- id: java-load-or-find
  desc: Java loadClass or findClass
  crit: component
  any:
  - id: micro-behaviors/data/source/dynamic/reflect::java-loadclass
  - id: java-findclass
- id: java-defineclass-dynamic
  desc: Dynamic class definition from bytecode
  crit: suspicious
  conf: 0.95
  for: [java, class]
  all:
  - id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
  - id: java-load-or-find
  any:
  - id: micro-behaviors/data/source/dynamic/reflect::java-classloader
  - id: micro-behaviors/data/source/dynamic/reflect::java-class-forname
  - id: java-protection-domain
  - id: java-getresourceasstream
- id: java-protection-domain
  desc: Java ProtectionDomain reference
  crit: component
  for: [java, class]
  any:
  - id: java-protectiondomain
  - id: micro-behaviors/process/info/selfpath::java-protection-domain
- id: java-resource-classloader
  desc: Defines class from resource stream
  crit: suspicious
  conf: 0.92
  for: [java, class]
  all:
  - id: java-getresourceasstream
  - id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
  - id: java-load-or-find
  - id: java-protection-domain
- id: java-invoke-or-getmethod
  desc: Java invoke or getMethod
  crit: component
  any:
  - id: java-invoke
  - id: java-getmethod
- id: java-reflective-invoke
  desc: Reflective method invocation in bytecode
  crit: suspicious
  conf: 0.9
  for: [java, class]
  all:
  - id: java-reflect-method
  - id: java-invoke-or-getmethod
- id: java-string-reversal
  desc: String reversal deobfuscation technique
  crit: suspicious
  conf: 0.85
  for: [java, class]
  all:
  - id: micro-behaviors/data/string/library::java-stringbuilder
  - id: java-reverse
  - id: micro-behaviors/data/encode/tostring::tostring-token
- id: dotnet-reflection
  desc: .NET reflection assembly loading
  crit: suspicious
  conf: 0.85
  platforms:
  - windows
  for: [pe, csharp]
  any:
  - id: dotnet-assembly-load
  - id: dotnet-assembly-loadfrom
  - id: dotnet-activator-createinstance
  - id: dotnet-type-gettype
  - id: dotnet-methodinfo-invoke
  unless:
  - id: metadata/binary/resource/
  - id: well-known/tool/reverse-engineering/ilspy::ilspy-component
- id: go-plugin
  desc: Go plugin dynamic loading
  crit: suspicious
  conf: 0.9
  any:
  - id: go-plugin-open
  - id: go-plugin-lookup
  - id: go-plugin-symbol
- id: unix-exec-perm
  desc: Unix executable permission indicators
  crit: component
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
  any:
  - id: micro-behaviors/mem/protect/modify::mprotect-import
  - id: micro-behaviors/mem/alloc/executable::prot-exec-const
  - id: micro-behaviors/mem/protect/modify::page-execute-constant
- id: unix-mmap-anon
  desc: Unix anonymous mmap
  crit: component
  platforms: [linux, macos]
  for: [elf, macho, c, cpp]
  all:
  - id: micro-behaviors/mem/alloc/executable::mmap-symbol
  - id: micro-behaviors/mem/alloc/map::map-anonymous-const
- id: windows-exec-memory
  desc: Windows executable memory
  crit: component
  platforms:
  - windows
  for: [pe, c, cpp]
  all:
  - id: micro-behaviors/mem/protect/modify::page-execute-constant
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
- id: executable-memory
  desc: Executable memory allocation primitive
  crit: notable
  conf: 0.8
  any:
  - id: unix-mmap-anon
  - id: windows-exec-memory
  unless:
  - id: well-known/tool/reverse-engineering/frida/
  - id: metadata/lang/compiler/native::python-msvc-extension
  - id: metadata/library/python-runtime/
  - id: metadata/lang/compiler/managed::delphi
- id: jit-runtime-ref
  desc: JIT compilation runtime reference
  crit: component
  conf: 0.85
  any:
  - id: jit-runtime-ref-1
  - id: jit-runtime-ref-2
- id: jit
  desc: JIT compilation patterns
  crit: suspicious
  conf: 0.85
  all:
  - id: executable-memory
  - id: jit-runtime-ref
- id: memory-exec
  desc: Dynamic loading with executable memory
  crit: suspicious
  conf: 0.85
  all:
  - id: executable-memory
  any:
  - id: dlopen
  - id: loadlibrary
  unless:
  - id: well-known/lib/benign-runtime-bundles::node-windows-runtime-binary
  - id: well-known/lib/benign-runtime-bundles::node-windows-distribution-archive
  downgrade:
    any:
    - id: micro-behaviors/mem/alloc/executable::page-protection-enum
    - id: well-known/tool/reverse-engineering/frida/
    - id: micro-behaviors/fs/file/section::pe-viewer-machine-types
    - id: metadata/lang/compiler/native::libllvm
