defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1027

traits:
  - id: kotlin-processbuilder-forname
    desc: Kotlin ProcessBuilder forName
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    if:
      type: text
      substr: Class.forName("java.lang.ProcessBuilder")

  - id: jvm-runtime-class-const
    desc: JVM Runtime class constant reference
    # This constant is also used by Firebase/ads runtime capability checks;
    # the command-execution composite below supplies the intent signal.
    crit: notable
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 6A 61 76 61 2E 6C 61 6E 67 2E 52 75 6E 74 69 6D 65
    unless:
      - id: metadata/lang/source/
      - id: well-known/lib/benign-runtime-bundles::openjdk-rt-jar
      - type: basename
        exact: rt.jar
      - type: path
        regex: '(^|[\\/])(haxe_[^\\/]*|sqlite-jdbc-[^\\/]*)([\\/]|$)|org[\\/]ibex[\\/]nestedvm'
      - type: text
        substr: org.ibex.nestedvm
composite_rules:
  - id: kotlin-reflection-command-exec
    desc: Kotlin reflection command exec
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: kotlin-processbuilder-forname
      - id: micro-behaviors/process/create/spawn::java-processbuilder
      - id: micro-behaviors/data/embedded/script::embedded-bash-shebang

  - id: jvm-reflection-command-exec
    desc: JVM reflection command exec
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: micro-behaviors/data/source/dynamic/reflect::java-bytecode-reflective-method-invoke
      - id: jvm-runtime-class-const
      - id: micro-behaviors/data/embedded/script::embedded-bash-shebang
    unless:
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/tool/sysadmin/alpine-packages::alpine-java-server-package
      - id: well-known/tool/development/bazel-diff::bazel-diff-bzlmod-test-fixture
