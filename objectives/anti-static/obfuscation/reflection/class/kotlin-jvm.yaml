defaults:
  platforms: [unix]
  for: [kotlin, class, java_class]
  attack: T1027

traits:
  - id: kotlin-processbuilder-forname
    desc: Kotlin ProcessBuilder forName
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    if:
      type: text
      substr: Class.forName("java.lang.ProcessBuilder")

composite_rules:
  - id: kotlin-reflection-command-exec
    desc: Kotlin reflection command exec
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: kotlin-processbuilder-forname
      - id: micro-behaviors/process/create/spawn::java-processbuilder
      - id: micro-behaviors/data/embedded/script::embedded-bash-shebang

  - id: jvm-reflection-command-exec
    desc: JVM reflection paired with command execution
    crit: suspicious
    conf: 0.98
    for: [class, java_class]
    scope: leaf
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::java-bytecode-reflective-method-invoke
    any:
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode-symbol
      - id: micro-behaviors/process/create/spawn::java-runtime-exec
      - id: micro-behaviors/data/embedded/script::embedded-bash-shebang
    unless:
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/tool/sysadmin/alpine-packages::alpine-java-server-package
      - id: well-known/tool/development/bazel-diff::bazel-diff-bzlmod-test-fixture
      - id: well-known/app/lyric::lyric-toolchain-context
      - id: well-known/app/lingua-franca-vscode/
      - id: jvm-library-reflection-context

  - id: jvm-library-reflection-context
    desc: Known JVM libraries using reflection
    crit: exception
    conf: 0.98
    any:
      - id: well-known/lib/h2/
      - id: well-known/lib/aspectj/
      - id: well-known/lib/eclipse-osgi/
      - id: well-known/lib/lombok/
      - id: well-known/lib/lombok/
