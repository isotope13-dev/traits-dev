defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1027

traits:
  - id: kotlin-processbuilder-forname
    desc: Kotlin ProcessBuilder forName
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    if:
      type: text
      substr: Class.forName("java.lang.ProcessBuilder")

  - id: kotlin-runtime-reflect-exec
    desc: Kotlin Runtime reflect exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: java.lang.Runtime

  - id: kotlin-embedded-bash-payload
    desc: Kotlin embedded bash payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "#!/bin/bash"

  - id: jvm-runtime-class-const
    desc: JVM Runtime class const
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 6A 61 76 61 2E 6C 61 6E 67 2E 52 75 6E 74 69 6D 65
    unless:
      - id: metadata/lang/source/
      - type: path
        regex: '(^|[\\/])(haxe_[^\\/]*|sqlite-jdbc-[^\\/]*)([\\/]|$)|org[\\/]ibex[\\/]nestedvm'
      - type: text
        substr: org.ibex.nestedvm

  - id: jvm-bash-shebang-const
    desc: JVM bash shebang const
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 23 21 2F 62 69 6E 2F 62 61 73 68

composite_rules:
  - id: kotlin-reflection-command-exec
    desc: Kotlin reflection command exec
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: kotlin-processbuilder-forname
      - id: micro-behaviors/process/create/spawn::java-processbuilder
      - id: kotlin-runtime-reflect-exec
      - id: kotlin-embedded-bash-payload

  - id: jvm-reflection-command-exec
    desc: JVM reflection command exec
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/reflection/class::java-bytecode-reflective-method-invoke
      - id: jvm-runtime-class-const
      - id: jvm-bash-shebang-const
