# Dynamic Library Loading
# Composite rules for runtime function resolution
defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: dynamic-load-pattern
    desc: Runtime library loading and function resolution
    crit: notable
    conf: 0.90
    all:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/lang/compiler/native::ms-visual
        - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
        - id: objectives/anti-static/pack/detect::upx-section
        - id: objectives/anti-static/pack/detect::upx-marker
  - id: dynamic-load-extended
    desc: Extended dynamic loading with alternate APIs
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/dylib/load::load-library-ex
      - id: micro-behaviors/dylib/load::load-library-a
