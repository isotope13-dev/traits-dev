defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: return-this-prototype
    desc: Detects heavy prototype function manipulation
    crit: notable
    conf: 0.7
    count_min: 5
    if:
      type: text
      regex: prototype\.[A-Za-z0-9_$]+=function\(\)\{return this
    downgrade:
      all:
        - id: metadata/binary/metrics/structural::no-functions
        - id: metadata/binary/metrics/structural::no-imports
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/package/quality::terser-output
      - id: metadata/lang/compiler/aot::huge-runtime-function-count
  - id: return-this-body
    desc: Detects function returning this
    crit: component
    conf: 0.7
    if:
      type: text
      regex: function\s*\(\s*\)\s*\{[^}]{0,80}return\s+this\s*[;}]
    unless:
      - id: metadata/package/tooling::babel-transpiled
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/package/quality::terser-output
composite_rules:
  - id: return-this
    desc: Detects prototype function that returns this
    crit: notable
    conf: 0.75
    all:
      - id: return-this-prototype
      - id: return-this-body
    downgrade:
      any:
        - id: metadata/binary/resource::resource-only-dll
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/package/quality::terser-output
      - id: metadata/lang/compiler/aot::huge-runtime-function-count
