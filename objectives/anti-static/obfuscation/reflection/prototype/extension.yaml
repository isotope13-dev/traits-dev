defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: string-arg-extension
    desc: 'String.prototype.arg extension returning ''this'''
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: String\.prototype\.arg\s*=\s*function|function\s+String\.prototype\.arg
