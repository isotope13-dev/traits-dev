defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: pipe-return-this
    desc: Detects 'Object.prototype.pipe' function returning 'this' (Nemucod obfuscation)
    crit: suspicious
    if:
      type: text
      regex: function\s+[a-zA-Z0-9_$]+.prototype.pipe\s*\(\s*\)\s*\{\s*return\s+this
