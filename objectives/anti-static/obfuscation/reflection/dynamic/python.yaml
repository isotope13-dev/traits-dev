defaults:
  platforms: [windows, unix]
  for:
    - python
    - pyc
traits:
  - id: getattr-module
    desc: Dynamic attribute access on modules
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: getattr(.*? ,.*?)
composite_rules:
  - id: obfuscated-import
    desc: Obfuscated module import (Dynamic Import
    crit: suspicious
    conf: 0.95
    attack: T1027
    mbc: F0001
    all:
      - id: micro-behaviors/process/interpreter/python::dunder-import-call
      - id: micro-behaviors/data/encode/hex::hex-encoding
      - id: objectives/anti-static/obfuscation/reflection/dynamic::getattr-module
