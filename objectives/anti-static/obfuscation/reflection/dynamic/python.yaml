# Python Reflection and Dynamic Imports
# Detects attempts to hide module loading or function access
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: dynamic-import
    desc: "Dynamic module import via __import__"
    crit: suspicious
    conf: 0.8
    if:
      type: ast
      kind: call
      regex: "^__import__$"
  - id: getattr-module
    desc: "Dynamic attribute access on modules"
    crit: suspicious
    conf: 0.7
    if:
      type: string_value
      regex: "getattr(.*? ,.*?)"
composite_rules:
  - id: obfuscated-import
    desc: "Obfuscated module import (Dynamic Import"
    crit: suspicious
    conf: 0.95
    attack: "T1027"
    mbc: "F0001"
    all:
      - id: dynamic-import
      - id: objectives/anti-static/obfuscation/string::hex-encoding
      - id: objectives/anti-static/obfuscation/reflection/dynamic::getattr-module
