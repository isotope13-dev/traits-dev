# Proximity-based Reflection Detection
# Detects dynamic module loading followed immediately by attribute access
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: dynamic-import-access
    desc: "Dynamic module import followed by"
    crit: suspicious
    conf: 0.95
    for: [python]
    near_lines: 5
    all:
      - id: micro-behaviors/process/interpreter/python::dunder-import-call
      - id: micro-behaviors/os/api-resolution/dynamic::python-getattr-call
    unless:
      - id: well-known/tool/detection/security-scanner::defensive-scanner-tool-context
      - id: well-known/tool/development/stoobly-agent::stoobly-agent-context
      - id: well-known/tool/sysadmin/munin::munin-graph-output-context
