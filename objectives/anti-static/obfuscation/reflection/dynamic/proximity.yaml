# Proximity-based Reflection Detection
# Detects dynamic module loading followed immediately by attribute access
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: dynamic-import-access
    # `__import__` near `getattr` is dynamic import + attribute reflection — a
    # capability TAXONOMY rates notable, not suspicious: web frameworks (Flask
    # `getattr(get_template().module, attr)`), plugin loaders and ORMs use it
    # routinely. The obfuscation/loader composites supply the malicious intent
    # by pairing it with decode/payload steps.
    desc: Dynamic import with attribute reflection
    crit: notable
    conf: 0.95
    for: [python]
    near_lines: 5
    all:
      - id: micro-behaviors/process/interpreter/python::dunder-import-call
      - id: micro-behaviors/os/api-resolution/dynamic::python-getattr-call
    unless:
      - id: well-known/tool/detection/
      - id: well-known/tool/development/stoobly-agent/
      - id: well-known/tool/sysadmin/munin/
