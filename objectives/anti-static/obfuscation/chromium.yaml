defaults:
  platforms:
    - windows
    - linux
    - macos
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
  crit: suspicious
  conf: 0.9
traits:
  - id: chromium-test-url
    desc: Chromium test command-line URL
    if:
      type: string_value
      substr: http://example-cmdline.test
  - id: chromium-test-navigation
    desc: Chromium internal test navigation string
    if:
      type: string_value
      substr: ui_test_utils::NavigateToURL
  - id: chromium-memory-infra
    desc: Chromium memory infrastructure metric string
    if:
      type: string_value
      substr: disabled-by-default-memory-infra
  - id: chromium-autofill-test
    desc: Chromium autofill test form string
    if:
      type: string_value
      substr: form action="https://www.example.com/" method="POST" id="shipping"
composite_rules:
  - id: chromium-junk-strings
    desc: Chromium test strings used as junk code obfuscation
    needs: 2
    any:
      - id: chromium-test-url
      - id: chromium-test-navigation
      - id: chromium-memory-infra
      - id: chromium-autofill-test
