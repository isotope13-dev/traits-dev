defaults:
  platforms: [unix, windows]
  for: [php]
  crit: suspicious
  conf: 0.8
traits:
  - id: dynamic-function-execution
    desc: PHP variable function invocation pattern
    crit: notable
    if:
      type: ast
      query: |
        (function_call_expression
          function: (variable_name (name) @var)
        )
    unless:
      - type: text
        substr: "@package WordPress"
      - type: text
        regex: "WP_UnitTestCase|@group\\s+[A-Za-z0-9_-]+"
      - type: text
        regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
  - id: member-lookup-execution
    desc: PHP dynamic member call ($this->var($args))
    if:
      type: ast
      query: |
        (function_call_expression
          function: (member_call_expression
            object: (variable_name (name) @obj)
            name: (variable_name (name) @name)
          )
        )
