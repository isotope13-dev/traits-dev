defaults:
  platforms: [unix, windows]
  for: [php]
  crit: suspicious
  conf: 0.8
traits:
  - id: dynamic-function-execution
    desc: PHP variable function invocation pattern
    crit: notable
    if:
      type: tree-sitter
      # Tree-sitter (#not-match?) predicate excludes common framework callable
      # variable names directly at the query level — these aren't obfuscation,
      # they're the normal way PHP frameworks invoke handlers/middleware/
      # listeners. The trait only fires for unconventional `$<var>()` dispatch
      # where `<var>` is NOT one of the known plumbing names.
      query: |
        (function_call_expression
          function: (variable_name (name) @var)
          (#not-match? @var "^(handler|handlers|errorHandler|exceptionHandler|logger|callback|closure|next|middleware|listener|fn|callable|resolver|factory|visitor|childMapper|mapper|mutator|canonicalize|append|pass|fail|warn|check|checkNode|extractText|shouldStop|stripPunct|stripCoordPunct|securitySource|on[A-Z][A-Za-z0-9_]*)$"))
    unless:
      - type: text
        regex: "@package WordPress|ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
      - type: text
        regex: "WP_UnitTestCase|@group\\s+[A-Za-z0-9_-]+"
      - type: text
        regex: "\\bClosure\\s+\\$next\\b"
      - type: text
        regex: 'namespace\s+Composer\\Autoload;[\s\S]{0,3000}class\s+ClassLoader|@generated by Composer'
      - id: metadata/library/web-frameworks::symfony-context
      - id: metadata/library/web-frameworks::laravel-context
      - id: metadata/package/testing/harness/unit::phpunit-test-context
  - id: member-lookup-execution
    desc: PHP dynamic member call ($this->var($args))
    # `$obj->$name(...)` — a method call whose name is itself a variable
    # (dynamic dispatch). The `$…->$…(` shape is distinctive and rare outside
    # obfuscation, so a source-text match is FP-safe.
    if:
      type: text
      regex: '\$\w+\s*->\s*\$\w+\s*\('
