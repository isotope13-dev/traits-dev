# Additive-hash API resolution family
# Hash algorithm: seed 0x1F2E3D4C, multiplier 0x1003F, shift >>11 XOR step
# Used by Goodboy framework (stages 1-15) and other custom loaders that adopt the same algorithm.
# Constants below are precomputed for well-known DLL/API names under this algorithm.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.007
  mbc: F0004
traits:
  - id: kernel32-additive-hash
    desc: kernel32.dll additive-hash constant (0x0B6D79E7)
    crit: component
    conf: 0.9
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: E7 79 6D 0B
  - id: user32-additive-hash
    desc: user32.dll additive-hash constant (0x090DD676)
    crit: component
    conf: 0.9
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 76 D6 0D 09
  - id: ntdll-additive-hash
    desc: ntdll.dll additive-hash constant (0x0EC9AE0F)
    crit: component
    conf: 0.9
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 0F AE C9 0E
  - id: virtualprotect-additive-hash
    desc: VirtualProtect additive-hash constant (0xA234F8D5)
    crit: component
    conf: 0.85
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: D5 F8 34 A2
  - id: loadlibrarya-additive-hash
    desc: LoadLibraryA additive-hash constant (0xE8EBE5AB)
    crit: component
    conf: 0.85
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: AB E5 EB E8
  - id: messageboxw-additive-hash
    desc: MessageBoxW additive-hash constant (0x7AC89F36)
    crit: component
    conf: 0.85
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 36 9F C8 7A
  - id: nt-allocate-vm-additive-hash
    desc: NtAllocateVirtualMemory additive-hash constant (0x4C5F6FA9)
    crit: notable
    conf: 0.92
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: A9 6F 5F 4C
  - id: nt-protect-vm-additive-hash
    desc: NtProtectVirtualMemory additive-hash constant (0x4FA8A779)
    crit: notable
    conf: 0.92
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 79 A7 A8 4F
  - id: nt-create-thread-ex-additive-hash
    desc: NtCreateThreadEx additive-hash constant (0xC0E8DF85)
    crit: notable
    conf: 0.92
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 85 DF E8 C0
  - id: wait-for-single-object-additive-hash
    desc: WaitForSingleObject additive-hash constant (0xA63CFCB1)
    crit: component
    conf: 0.85
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: B1 FC 3C A6
  - id: close-handle-additive-hash
    desc: CloseHandle additive-hash constant (0xE95098B3)
    crit: component
    conf: 0.85
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: B3 98 50 E9
composite_rules:
  - id: additive-hash-table-multiple-apis
    desc: Multiple precomputed additive-hash API constants (hash table)
    crit: hostile
    conf: 0.95
    size_max: 5242880
    needs: 4
    any:
      - id: virtualprotect-additive-hash
      - id: loadlibrarya-additive-hash
      - id: messageboxw-additive-hash
      - id: nt-allocate-vm-additive-hash
      - id: nt-protect-vm-additive-hash
      - id: nt-create-thread-ex-additive-hash
      - id: wait-for-single-object-additive-hash
      - id: close-handle-additive-hash
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: additive-hash-cross-dll-resolution
    desc: Cross-DLL hash resolution (kernel32 + user32 + ntdll precomputed hashes)
    crit: suspicious
    conf: 0.93
    size_max: 5242880
    needs: 3
    any:
      - id: kernel32-additive-hash
      - id: user32-additive-hash
      - id: ntdll-additive-hash
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: additive-hash-syscall-staging
    desc: Concealed loader staging direct ntdll syscalls via API hashing
    crit: hostile
    conf: 0.95
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
    needs: 1
    any:
      - id: nt-allocate-vm-additive-hash
      - id: nt-protect-vm-additive-hash
      - id: nt-create-thread-ex-additive-hash
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: additive-hash-direct-api-call
    desc: User-facing API resolved via hash (MessageBoxW direct call)
    crit: suspicious
    conf: 0.92
    size_max: 5242880
    all:
      - id: objectives/anti-static/obfuscation/imports::pe-walk-hash-resolver-x64
      - id: messageboxw-additive-hash
      - id: user32-additive-hash
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
