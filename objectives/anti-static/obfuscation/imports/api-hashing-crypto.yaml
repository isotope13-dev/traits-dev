defaults:
  attack: T1027.002
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: custom-asm-api-hash
    desc: Custom API name hashing loop in assembly
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: lodsb\s+or\s+al,al\s+jz\s+\S+\s+add\s+cl,al\s+rol\s+eax,cl\s+add\s+ecx,eax
  - id: api-crc-comment-source
    desc: API CRC hashing comment in source
    crit: suspicious
    conf: 0.95
    for:
      - c
    if:
      type: string_literal
      regex: (?i)(uses CRCs instead of API names|API CRC table, null terminated)
  - id: api-crc-routine-source
    desc: API CRC generation routine in source
    crit: suspicious
    conf: 0.93
    for:
      - c
    if:
      type: string_literal
      regex: ^(create_crcs:|ntdcrcbegin:|krncrcbegin:|sfccrcbegin:)$
  - id: pushad-lodsb-loop
    desc: Assembly loop using LODSB after PUSHAD
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: pushad\s+(.| )+?lodsb\s+(.| )+?popad
  - id: macro-calchash-decl
    desc: calchash macro declaration
    crit: component
    conf: 0.9
    for: [scripts]
    if:
      type: text
      exact: calchash macro procname
  - id: rotate-xor-hash-macro
    desc: Rotate xor API hash macro
    crit: suspicious
    conf: 0.95
    for: [scripts]
    if:
      type: text
      regex: hash = \(\(hash shl 3\).{0,32}hash xor "&c"
  - id: declfunc-hash-record
    desc: declfunc hash record stub
    crit: suspicious
    conf: 0.94
    for: [scripts]
    if:
      type: text
      regex: declfunc macro funcname.{0,64}db bytes.{0,32}dd hash
  - id: declfunc-call-stub
    desc: declfunc call stub trampoline
    crit: suspicious
    conf: 0.9
    for: [scripts]
    if:
      type: text
      exact: "txt: push 12345678h;mov eax, 0"
composite_rules:
  - id: benign-rtlgenrandom-resolution-context
    desc: Benign RtlGenRandom resolution context
    crit: component
    conf: 0.9
    any:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/symbols/exports::basename-libvlc-dll
      - id: metadata/binary/vendor::bitdefender-product-marker
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: metadata/file/extension::node-native-addon-extension
      - id: metadata/signed/leaf::roblox-corporation
  - id: api-crc-resolution-source
    desc: API resolution via CRC tables in source
    crit: suspicious
    conf: 0.97
    for:
      - c
    all:
      - id: api-crc-comment-source
      - id: api-crc-routine-source
  - id: hidden-advapi32-rtlgenrandom-resolution
    desc: SystemFunction036 string resolved without advapi32 import
    crit: suspicious
    conf: 0.92
    attack: T1027.007
    mbc: B0032.014
    for: [pe]
    platforms: [windows]
    all:
      - id: micro-behaviors/os/random/generator::system-function-036
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    unless:
      - id: micro-behaviors/os/random/generator::system-function-036-symbol
      - id: micro-behaviors/os/random/generator::rtl-gen-random
      - id: metadata/binary/symbols/imports::imports-advapi32-dll
      - id: benign-rtlgenrandom-resolution-context
      - id: well-known/lib/node-notifier::snoretoast-helper
      - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-release-component
  - id: macro-api-hash-resolution
    desc: Macro-driven API hash resolver
    crit: suspicious
    conf: 0.98
    for: [scripts]
    all:
      - id: macro-calchash-decl
      - id: rotate-xor-hash-macro
      - id: declfunc-hash-record
    any:
      - id: declfunc-call-stub
