defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
  mbc: B0032
composite_rules:
  - id: vb6-concealed-win32-apis
    desc: VB6 concealed Win32 API dispatch
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/dylib/lookup::vb6-runtime-api-dispatch
      - id: metadata/format/pe::vb6-application-framework
    any:
      - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname-import
      - id: micro-behaviors/fs/directory/readdir::vb6-rtcdir
      - id: micro-behaviors/fs/file/read::vb6-file-length-query
      - id: micro-behaviors/fs/path/check::vb6-rtcgetfileattr
      - id: micro-behaviors/time/schedule/interval::vb6-timer-control
      - id: micro-behaviors/os/env/access::vb6-environ-bstr
      - id: micro-behaviors/os/error-handling/exceptions::set-error-mode
      - id: micro-behaviors/fs/config/system::write-profile-string-ansi
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
    needs: 2
