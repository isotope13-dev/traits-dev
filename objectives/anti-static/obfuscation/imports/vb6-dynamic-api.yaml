defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
  mbc: B0032
composite_rules:
  - id: vb6-concealed-win32-apis
    desc: VB6 concealed Win32 API dispatch
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/dylib/lookup::vb6-runtime-api-dispatch
      - id: metadata/binary/framework::vb6-application-framework
    any:
      - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname-import
      - id: micro-behaviors/fs/directory/readdir::vb6-rtcdir
      - id: micro-behaviors/fs/file/read::vb6-file-length-query
      - id: micro-behaviors/fs/file/read::vb6-file-io-helpers
      - id: micro-behaviors/os/random/generator::vb6-runtime-prng
      - id: micro-behaviors/data/string/operations::vb6-runtime-string-decoding
      - id: micro-behaviors/fs/path/check::vb6-rtcgetfileattr
      - id: micro-behaviors/time/schedule/interval::vb6-timer-control
      - id: micro-behaviors/os/env/access::vb6-environ-bstr
      - id: micro-behaviors/os/exception/error-handling::set-error-mode
      - id: micro-behaviors/fs/config/system::write-profile-string-ansi
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
    needs: 2
    unless:
      - id: metadata/binary/framework::vb6-runtime-library
  - id: vb6-pcode-concealed-runtime-profile
    desc: VB6 p-code concealed runtime profile
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/dylib/lookup::vb6-dll-function-call
      - id: metadata/binary/framework::vb6-application-framework
      - id: metadata/binary/metrics/markers::low-function-count-marker
    any:
      - id: micro-behaviors/data/string/operations::vb6-runtime-string-decoding
      - id: micro-behaviors/fs/file/read::vb6-rtcfreefile
      - id: micro-behaviors/fs/file/read::vb6-rtcfilelength
      - id: micro-behaviors/os/random/generator::vb6-runtime-prng
      - id: micro-behaviors/fs/directory/readdir::vb6-rtcdir
    needs: 3
    unless:
      - id: metadata/binary/framework::vb6-runtime-library
