# .NET loaders that hide native API names in managed code and resolve them
# from loaded module addresses.  The individual API names may be absent from
# the string table when they are reconstructed as byte arrays at runtime.
defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: dotnet-managed-module-api-resolver
    desc: .NET resolves native APIs from loaded module addresses via delegates
    crit: hostile
    conf: 0.97
    attack: T1027.007
    mbc: B0032
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/os/api-resolution/dynamic::managed-process-module-reference
      - id: micro-behaviors/os/api-resolution/dynamic::managed-module-collection-reference
      - id: micro-behaviors/os/api-resolution/dynamic::managed-module-base-address
      - id: micro-behaviors/os/api-resolution/dynamic::managed-function-pointer-delegate
      - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
    unless:
      - id: metadata/signed/platform/
