defaults:
  platforms: [windows]
  for: [pe]
  mbc: B0032
  attack: T1027
composite_rules:
  - id: hidden-loader-api-string-cluster
    desc: Concealed loader API string cluster
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
      - id: micro-behaviors/dylib/lookup::get-proc-address-prefix-no-import
      - id: micro-behaviors/mem/protect/modify::virtual-protect-prefix-no-import
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
