defaults:
  platforms: [windows]
  for: [pe]
  mbc: B0032
  attack: T1027
composite_rules:
  - id: native-memory-api-cluster-without-allocate
    desc: Native memory API cluster without allocate
    crit: component
    conf: 0.84
    all:
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
      - id: micro-behaviors/mem/create/fileless::nt-map-view-section-api-string
      - id: micro-behaviors/os/syscall/raw::nt-protect-ssn
      - id: micro-behaviors/os/syscall/raw::nt-create-thread-ssn
  - id: native-memory-api-cluster-without-write
    desc: Native memory API cluster without write
    crit: component
    conf: 0.84
    all:
      - id: micro-behaviors/os/syscall/raw::nt-allocate-ssn
      - id: micro-behaviors/mem/create/fileless::nt-map-view-section-api-string
      - id: micro-behaviors/os/syscall/raw::nt-protect-ssn
      - id: micro-behaviors/os/syscall/raw::nt-create-thread-ssn
  - id: native-memory-api-cluster-without-map
    desc: Native memory API cluster without map
    crit: component
    conf: 0.84
    all:
      - id: micro-behaviors/os/syscall/raw::nt-allocate-ssn
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
      - id: micro-behaviors/os/syscall/raw::nt-protect-ssn
      - id: micro-behaviors/os/syscall/raw::nt-create-thread-ssn
  - id: native-memory-api-cluster-without-protect
    desc: Native memory API cluster without protect
    crit: component
    conf: 0.84
    all:
      - id: micro-behaviors/os/syscall/raw::nt-allocate-ssn
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
      - id: micro-behaviors/mem/create/fileless::nt-map-view-section-api-string
      - id: micro-behaviors/os/syscall/raw::nt-create-thread-ssn
  - id: native-memory-api-cluster-without-create
    desc: Native memory API cluster without create
    crit: component
    conf: 0.84
    all:
      - id: micro-behaviors/os/syscall/raw::nt-allocate-ssn
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
      - id: micro-behaviors/mem/create/fileless::nt-map-view-section-api-string
      - id: micro-behaviors/os/syscall/raw::nt-protect-ssn
  - id: native-memory-api-string-cluster
    desc: Native memory API string cluster
    crit: suspicious
    conf: 0.94
    attack: T1027.007
    any:
      - id: native-memory-api-cluster-without-allocate
      - id: native-memory-api-cluster-without-write
      - id: native-memory-api-cluster-without-map
      - id: native-memory-api-cluster-without-protect
      - id: native-memory-api-cluster-without-create
  - id: hidden-loader-api-string-cluster
    desc: Concealed loader API string cluster
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
      - id: micro-behaviors/dylib/lookup::get-proc-address-prefix-no-import
      - id: micro-behaviors/mem/protect/modify::virtual-protect-prefix-no-import
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
