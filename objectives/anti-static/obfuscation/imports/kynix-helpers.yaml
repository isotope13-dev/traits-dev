defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.007
  mbc: B0032.014

traits:
  - id: get-api-external-helper
    desc: Custom external API resolver helper
    crit: component
    conf: 0.97
    if:
      type: text
      substr: get_api_external

  - id: get-module-base-helper
    desc: Custom module base resolver helper
    crit: component
    conf: 0.97
    if:
      type: text
      substr: get_module_base

composite_rules:
  - id: custom-api-resolver-helpers
    desc: Custom manual API resolver helper names
    crit: suspicious
    conf: 0.98
    all:
      - id: get-api-external-helper
      - id: get-module-base-helper
