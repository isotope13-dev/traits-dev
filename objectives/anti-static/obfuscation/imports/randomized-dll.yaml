defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1027
traits:
  - id: randomized-dll-name-pair
    desc: Multiple randomized internal DLL names
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: string
      regex: '\b[A-Za-z0-9]{18,}\.dll\b'
    not:
      - regex: '^[A-Z][a-z0-9]+(?:[A-Z][a-z0-9]+){2,}\.dll$'
    unless:
      - id: metadata/format::many-imports
