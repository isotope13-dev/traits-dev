defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1027
traits:
  - id: randomized-dll-name-pair
    desc: Multiple randomized internal DLL names
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: \b[A-Za-z0-9]{18,}\.dll\b
    not:
      - regex: ^[A-Za-z][A-Za-z0-9]+(?:[A-Z][A-Za-z0-9]+){2,}\.dll$
      - regex: ^[A-Z][A-Za-z0-9]*\.dll$
      - regex: ^qt[a-z0-9]{10,}plugin\.dll$
    unless:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: metadata/binary/framework::dotnet-metadata
