defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: playsound-a-import
    desc: PlaySoundA import (decoy triad)
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: import
      exact: PlaySoundA
  - id: selectcmm-import
    desc: SelectCMM import (decoy triad)
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: import
      exact: SelectCMM
  - id: olerun-import
    desc: OleRun import (decoy triad)
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: import
      exact: OleRun
  - id: junk-api-flooding-cluster
    desc: Rare junk API import flooding cluster
    crit: suspicious
    conf: 0.95
    attack: T1027.002
    if:
      type: import_combination
      required:
        - "^SetVolumeLabelW$"
        - "^AddConsoleAliasW$"
      suspicious:
        - "^AddAtomW$"
        - "^FillConsoleOutputAttribute$"
        - "^IsSystemResumeAutomatic$"
        - "^QueryMemoryResourceNotification$"
        - "^HeapWalk$"
      min_suspicious: 3
composite_rules:
  - id: decoy-import-triad
    desc: Decoy multimedia and COM imports
    crit: component
    conf: 0.98
    all:
      - id: playsound-a-import
      - id: selectcmm-import
      - id: olerun-import
    unless:
      - id: metadata/binary/metrics::many-imports-40
  - id: padded-loader-imports
    desc: Packed loader with padded decoy imports
    crit: suspicious
    conf: 0.96
    all:
      - id: decoy-import-triad
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: metadata/binary/section/names::upx-section
      - id: metadata/hardening/memory::wx-section
    needs: 3
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::is-microsoft-named
