defaults:
  platforms: [windows, linux, unix, android]
traits:
  - id: very-low-strings
    desc: Very few extracted strings
    crit: notable
    conf: 0.7
    size_min: 51200
    for:
      - pe
      - elf
    if:
      type: string_count
      max: 20
      min_length: 4
    unless:
      - id: metadata/format::small-elf-binary
      - id: metadata/format::many-functions
      - id: metadata/internal/symbols::icv_iconv
      - type: basename
        regex: '^[^/]+%[^/]+\.so(\.\d+)*$'
    downgrade:
      any:
        - type: metrics
          field: binary.section_count
          max: 4
        - type: metrics
          field: binary.function_count
          max: 0
  - id: extremely-low-strings
    desc: Extremely few extracted strings
    crit: notable
    conf: 0.7
    size_min: 51200
    for:
      - pe
      - elf
    if:
      type: string_count
      max: 10
      min_length: 4
    unless:
      - id: metadata/hardening
      - id: metadata/format
composite_rules:
  - id: minimal-imports-suspicious-apis
    desc: Minimal imports with suspicious API combination
    crit: notable
    conf: 0.75
    for:
      - pe
    attack: T1027
    needs: 3
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/crypto/certificate/store::cert-open-store
      - id: micro-behaviors/mem/alloc/heap::heap-alloc
    unless:
      - id: objectives/anti-static/obfuscation/imports/minimal-concealment::minimal-imports-suspicious-apis__unless_1
      - id: metadata/format::many-imports
      - type: metrics
        field: binary.import_count
        min: 50
  - id: concealed-capabilities-pe
    desc: Concealed capabilities via import minimization
    crit: suspicious
    conf: 0.85
    for:
      - pe
    attack: T1027
    mbc: B0032
    all:
      - id: very-low-strings
    needs: 4
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/crypto/certificate/store::cert-open-store
      - id: micro-behaviors/mem/alloc/heap::heap-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    unless:
      - id: objectives/anti-static/obfuscation/imports/minimal-concealment::concealed-capabilities-pe__unless_1
      - id: metadata/format::many-imports
  - id: import-concealed-ransomware-pattern
    desc: Ransomware with concealed import table
    crit: hostile
    conf: 0.9
    for:
      - pe
    attack: T1486
    mbc: C0027
    all:
      - id: extremely-low-strings
      - id: micro-behaviors/crypto/certificate/store::cert-open-store
    needs: 2
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/fs
    unless:
      - id: objectives/anti-static/obfuscation/imports/minimal-concealment::import-concealed-ransomware-pattern__unless_1
  - id: import-concealed-dropper-pattern
    desc: Dropper with heavily minimized imports
    crit: hostile
    conf: 0.9
    for:
      - pe
    attack: T1027
    mbc: B0032
    all:
      - id: extremely-low-strings
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
    needs: 2
    any:
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/crypto/certificate/store::cert-open-store
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/fs
    unless:
      - id: objectives/anti-static/obfuscation/imports/minimal-concealment::import-concealed-dropper-pattern__unless_1
