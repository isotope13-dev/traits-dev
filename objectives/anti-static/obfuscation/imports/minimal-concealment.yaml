defaults:
  platforms: [linux, macos, windows]
  for: [pe, elf, macho]
traits:
  - id: very-low-strings
    desc: Very few extracted strings
    crit: notable
    conf: 0.7
    size_min: 49152
    if:
      type: metrics
      field: binary.string_count
      max: 20
    not:
      - regex: \.(tar\.gz|tgz|zip)$
    unless:
      - id: low-strings-soft-fp
      - id: metadata/binary/metrics::many-imports-50
  - id: extremely-low-strings
    desc: Extremely few extracted strings
    crit: notable
    conf: 0.7
    size_min: 49152
    if:
      type: metrics
      field: binary.string_count
      max: 10
    not:
      - regex: \.(tar\.gz|tgz|zip)$
    unless:
      - id: low-strings-soft-fp
      - id: metadata/binary/metrics::many-imports-50
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: text
        substr: "Nullsoft Install System"
  - id: sparse-strings-under-25-pe
    desc: Sparse strings under twenty-five
    crit: component
    conf: 0.82
    for: [pe]
    size_min: 32768
    size_max: 65535
    if:
      type: metrics
      field: binary.string_count
      max: 24
    unless:
      - id: low-string-extension-soft-fp
      - id: low-strings-soft-fp
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/platform::microsoft
  - id: five-plus-sections-pe
    desc: Five or more PE sections
    crit: component
    conf: 0.8
    for: [pe]
    if:
      type: metrics
      field: binary.section_count
      min: 5
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: low-strings-package-extension
    desc: Low-string packaged binary extension
    crit: component
    conf: 0.8
    for: [binaries]
    if:
      type: basename
      regex: \.(node|pak|map|asar)$
  - id: low-strings-data-extension
    desc: Low-string data-like extension
    crit: component
    conf: 0.8
    for: [binaries]
    if:
      type: basename
      regex: \.(bin|dat)$
  - id: low-strings-font-extension
    desc: Low-string asset extension
    crit: component
    conf: 0.8
    for: [binaries]
    if:
      type: basename
      regex: \.(json|svg|ttf)$
  - id: low-string-fp-nsis
    desc: NSIS marker in low-string binary
    crit: component
    conf: 0.85
    for: [binaries]
    if:
      type: text
      substr: "Nullsoft Install System"
composite_rules:
  - id: low-string-extension-soft-fp
    desc: Low-string extension soft false positive
    crit: component
    conf: 0.85
    any:
      - id: low-strings-package-extension
      - id: low-strings-data-extension
      - id: low-strings-font-extension
  - id: low-strings-soft-fp
    desc: Benign low-string binary context
    crit: component
    conf: 0.85
    any:
      - id: metadata/signed/developer::open-source-developer
      - id: metadata/binary/metrics::small-elf-binary
      - id: metadata/binary/metrics::many-functions
      - id: low-string-fp-nsis
      - id: metadata/binary/metrics::many-imports-50
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/platform::microsoft
  - id: small-zero-import-pe
    desc: Small PE with empty imports and sparse strings
    crit: suspicious
    conf: 0.88
    for: [pe]
    attack: T1027
    mbc: B0032
    size_min: 32768
    size_max: 65535
    all:
      - id: metadata/binary/symbols/compat::zero-import-raw
      - id: sparse-strings-under-25-pe
      - id: five-plus-sections-pe
  - id: minimal-imports-suspicious-apis
    desc: Minimal imports with suspicious API combination
    crit: notable
    conf: 0.75
    for: [pe]
    attack: T1027
    needs: 3
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/crypto/certificate/store::cert-open-store
      - id: micro-behaviors/mem/alloc/heap::heap-alloc
    unless:
      - id: metadata/binary/metrics::many-imports-30
      - id: metadata/binary/framework::asprotect
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/metrics::many-imports-40
  - id: concealed-capabilities-pe
    desc: Concealed capabilities via import minimization
    crit: suspicious
    conf: 0.85
    for: [pe]
    attack: T1027
    mbc: B0032
    all:
      - id: very-low-strings
    needs: 4
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/crypto/certificate/store::cert-open-store
      - id: micro-behaviors/mem/alloc/heap::heap-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    unless:
      - id: metadata/binary/metrics::many-imports-25
      - id: metadata/binary/metrics::many-imports
  - id: import-concealed-ransomware-pattern
    desc: Ransomware with concealed import table
    crit: hostile
    conf: 0.9
    for: [pe]
    attack: T1486
    mbc: C0027
    all:
      - id: extremely-low-strings
      - id: micro-behaviors/crypto/certificate/store::cert-open-store
    needs: 2
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/fs/
    unless:
      - id: metadata/binary/metrics::many-imports-20
      - id: metadata/binary/metrics::many-imports
  - id: import-concealed-dropper-pattern
    desc: Dropper with heavily minimized imports
    crit: hostile
    conf: 0.9
    for: [pe]
    attack: T1027
    mbc: B0032
    all:
      - id: extremely-low-strings
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
    needs: 2
    any:
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/crypto/certificate/store::cert-open-store
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/fs/
    unless:
      - id: metadata/binary/metrics::many-imports-20
