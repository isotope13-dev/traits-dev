defaults:
  for:
    - pe
  platforms:
    - windows
  crit: suspicious
  conf: 0.85
  attack: T1027
traits:
  - id: obfuscated-kernel32
    desc: Obfuscated kernel32.dll reference
    if:
      type: text
      regex: '[kK]+ern[A-Z0-9]{1,4}\d+\.dll'
      not:
        - exact: kernel32.dll
        - exact: KERNEL32.DLL
        - exact: KERNEL32.dll
