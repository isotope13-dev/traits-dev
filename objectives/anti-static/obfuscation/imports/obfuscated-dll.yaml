# Obfuscated DLL name references
# Detects strings that resemble system DLL names but with character substitutions
defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: suspicious
  conf: 0.85
  attack: T1027
traits:
  - id: obfuscated-kernel32
    desc: Obfuscated kernel32.dll reference
    if:
      type: string_value
      regex: "[kK]+ern[A-Z0-9]{1,4}\\d+\\.dll"
      not:
        - exact: "kernel32.dll"
        - exact: "KERNEL32.DLL"
        - exact: "KERNEL32.dll"
