defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: akernel32-dll
    desc: Dynamic API resolution str Akernel32
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "Akernel32.dll"
    unless:
      - id: well-known/app/cvte-crashrpt/
      - id: well-known/tool/development/jetbrains/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/script/
      - id: well-known/tool/development/inno-setup/
  - id: bkernel32-dll
    desc: Dynamic API resolution str Bkernel32
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: "Bkernel32.dll"
