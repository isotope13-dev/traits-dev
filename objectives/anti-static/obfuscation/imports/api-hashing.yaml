defaults:
  platforms: [windows, linux, unix, android, macos, ios]
  attack: T1027.007
  mbc: B0032.014
  for: [binaries]
traits:
  - id: ror13-hash-seed
    desc: ROR13 hash algorithm constant
    crit: component
    conf: 0.8
    arch: [x86, x86-64]
    count_min: 15
    per_kb_min: 0.05
    size_max: 5242880
    if:
      type: hex
      section: text
      pattern: C1 C? 0D
  - id: ror7-xor-hash-loop
    desc: ROR-7/XOR hash accumulator loop
    crit: component
    conf: 0.85
    arch: [x86]
    for: [pe]
    size_max: 524288
    if:
      type: hex
      section: text
      pattern: C1 C8 07 33 C8
  - id: djb2-hash-constant
    desc: DJB2 hash algorithm constant (5381)
    crit: component
    conf: 0.75
    count_min: 1
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 05 15 00 00
  - id: djb2-multiply-33
    desc: DJB2 hash multiply-by-33 instruction
    crit: component
    conf: 0.7
    arch: [x86, x86-64]
    count_min: 1
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 6B C? 21
  - id: fnv1a-offset-basis
    desc: FNV1a hash offset basis constant
    crit: component
    conf: 0.8
    if:
      type: hex
      section: data
      pattern: C5 9D 1C 81
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: peb-ldr-access
    desc: PEB Ldr access for module enumeration
    crit: component
    conf: 0.85
    for: [pe]
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: 64 A1 30 00 00 00
  - id: teb-peb-access
    desc: TEB to PEB access for module enumeration
    crit: component
    conf: 0.85
    for: [pe]
    arch: [x86]
    size_max: 1048576
    if:
      type: hex
      section: text
      pattern: 64 A1 18 00 00 00
  - id: pe-header-walk
    desc: PE header access via e_lfanew offset
    crit: component
    conf: 0.7
    for: [pe]
    arch: [x86, x86-64]
    count_min: 2
    size_max: 1048576
    if:
      type: hex
      section: text
      pattern: 8B 4? 3C
  - id: pe-header-walk-x64
    desc: x64 PE header access via movsxd
    crit: component
    conf: 0.75
    for: [pe]
    arch: [x86-64]
    size_max: 5242880
    if:
      type: hex
      section: text
      pattern: 48 63 ?? 3C
  - id: mz-magic-check
    desc: MZ header validation in code
    crit: component
    conf: 0.85
    for: [pe]
    arch: [x86, x86-64]
    size_max: 524288
    if:
      type: hex
      section: text
      pattern: B8 4D 5A 00 00
  - id: pe-signature-check
    desc: PE signature validation in code
    crit: component
    conf: 0.85
    for: [pe]
    arch: [x86, x86-64]
    size_max: 524288
    if:
      type: hex
      section: text
      pattern: 81 ?? ?? 50 45 00 00
  - id: peb-access-x64
    desc: Direct PEB access (GS segment)
    crit: component
    conf: 0.95
    for: [pe]
    arch: [x86-64]
    if:
      type: hex
      section: .text
      pattern: 65 48 8b 04 25 60 00 00 00
  - id: ldr-walk
    desc: Manual LDR module list traversal
    crit: suspicious
    conf: 0.9
    for: [pe]
    arch: [x86-64]
    if:
      type: hex
      section: .text
      pattern: 48 8b ?? 18 00 00 00 48 8b ?? 20 00 00 00
  - id: loadlibrarya-ror13-hash
    desc: LoadLibraryA ROR13 hash constant
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: hex
      section: data
      pattern: 8E 4E 0E EC
  - id: getprocaddress-ror13-hash
    desc: GetProcAddress ROR13 hash constant
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: hex
      section: data
      pattern: AA FC 0D 7C
composite_rules:
  - id: hash-primitive
    desc: API hashing primitive
    crit: component
    any:
      - id: ror13-hash-seed
      - id: ror7-xor-hash-loop
      - id: djb2-hash-constant
      - id: djb2-multiply-33
      - id: fnv1a-offset-basis
  - id: pe-export-walk-primitive
    desc: PEB or PE export walk primitive
    crit: component
    any:
      - id: peb-ldr-access
      - id: teb-peb-access
      - id: pe-header-walk
      - id: pe-header-walk-x64
      - id: peb-access-x64
      - id: ldr-walk
      - id: mz-magic-check
      - id: pe-signature-check
  - id: manual-getprocaddress
    desc: Custom GetProcAddress implementation
    crit: suspicious
    conf: 0.9
    for: [pe]
    size_max: 524288
    all:
      - id: peb-access-x64
    needs: 2
    any:
      - id: mz-magic-check
      - id: pe-signature-check
      - id: pe-header-walk-x64
      - id: pe-header-walk
    unless:
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: metadata/binary/metrics::many-imports
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/sharpshell::sharpshell-framework
  - id: api-hash-resolution
    desc: Dynamic API resolution via ROR13 hashing
    crit: hostile
    conf: 0.95
    all:
      - id: ror13-hash-seed
    any:
      - id: loadlibrarya-ror13-hash
      - id: getprocaddress-ror13-hash
      - id: peb-ldr-access
    unless:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/metrics::many-imports-50
  - id: hash-based-obfuscation
    desc: Hash-based import obfuscation
    crit: suspicious
    conf: 0.85
    size_max: 1048576
    all:
      - id: pe-export-walk-primitive
    any:
      - id: ror13-hash-seed
      - id: ror7-xor-hash-loop
      - id: djb2-multiply-33
      - id: loadlibrarya-ror13-hash
      - id: getprocaddress-ror13-hash
    needs: 1
    unless:
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: objectives/anti-static/pack/detect::upx-section
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/metrics::many-strings-2000
      - id: metadata/binary/metrics::many-imports-50
      - id: metadata/binary/metrics::many-exports-20
  - id: djb2-api-resolution
    desc: DJB2 hash-based API resolution
    crit: suspicious
    conf: 0.9
    for: [pe]
    all:
      - id: djb2-hash-constant
      - id: djb2-multiply-33
    any:
      - id: peb-ldr-access
      - id: teb-peb-access
      - id: pe-header-walk
      - id: pe-header-walk-x64
      - id: peb-access-x64
    needs: 1
    unless:
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/framework::dotnet-metadata
  - id: string-based-api-resolution
    desc: PEB-based API resolution with minimal imports
    crit: suspicious
    conf: 0.88
    for:
      - pe
      - pe
    size_max: 524288
    all:
      - id: peb-access-x64
      - id: objectives/command-and-control/dropper/execution/loader::pe-single-import
    any:
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::dll-names-no-loadlibrary
      - id: pe-header-walk-x64
      - id: pe-header-walk
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/platform::microsoft
  - id: hostile-api-concealment
    desc: Complete API concealment (PEB walk + PE parsing + string decrypt)
    crit: hostile
    conf: 0.92
    for:
      - pe
      - pe
    size_max: 524288
    all:
      - id: manual-getprocaddress
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::dll-names-no-loadlibrary
    any:
      - id: objectives/command-and-control/dropper/execution/loader::pe-single-import
      - id: objectives/command-and-control/dropper/execution/loader::pe-few-imports
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: dynamic-api-resolution-peb
    desc: Detects dynamic API resolution via PEB traversal
    all:
      - id: peb-access-x64
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
  - id: x64-loader-api-concealment-profile
    desc: x64 loader profile with concealed API resolution
    crit: suspicious
    conf: 0.92
    for:
      - pe
      - pe
    platforms:
      - windows
    size_max: 131072
    all:
      - id: pe-export-walk-primitive
      - id: objectives/anti-static/obfuscation/string::long-mixedcase-identifiers
    any:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: objectives/anti-analysis/debugger-detect/check::win-comprehensive
      - id: micro-behaviors/hardware/display/directx/calls::directx-factory-api
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/package/versioning::pe-version-resource

  - id: undocumented-rng-alias
    desc: Undocumented SystemFunction036 RNG alias with crypto
    crit: suspicious
    conf: 0.92
    platforms: [windows]
    for: [pe]
    all:
      - id: micro-behaviors/os/random/generator::system-function-036
    any:
      - id: micro-behaviors/os/random/generator::bcrypt-gen-random
      - id: micro-behaviors/os/random/generator::crypt-gen-random
