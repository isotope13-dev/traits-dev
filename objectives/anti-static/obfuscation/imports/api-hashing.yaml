defaults:
  platforms: [linux, macos, windows]
  attack: T1027.007
  mbc: B0032.014
  for: [elf, macho, pe]
traits:
  - id: ror13-hash-seed
    desc: ROR13 hash algorithm constant
    crit: component
    conf: 0.8
    arch: [x86, x86-64]
    count_min: 15
    per_kb_min: 0.05
    size_max: 5242880
    if:
      type: hex
      section: text
      pattern: C1 C? 0D
  - id: ror7-xor-hash-loop
    desc: ROR-7/XOR hash accumulator loop
    crit: component
    conf: 0.85
    arch: [x86]
    for: [pe]
    size_max: 524288
    if:
      type: hex
      section: text
      pattern: C1 C8 07 33 C8
  - id: ror14-hash-seed
    desc: ROR14 hash algorithm constant
    crit: component
    conf: 0.8
    arch: [x86, x86-64]
    count_min: 8
    per_kb_min: 0.05
    size_max: 5242880
    if:
      type: hex
      section: text
      pattern: C1 C? 0E
  - id: ror14-hash-loop-x64
    desc: ROR-14 hash inner loop (x64)
    crit: component
    conf: 0.9
    arch: [x86-64]
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 41 C1 C8 0E 0F BE C0 44 03 C0
  - id: djb2-hash-constant
    desc: DJB2 hash algorithm constant (5381)
    crit: component
    conf: 0.75
    count_min: 1
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 05 15 00 00
    unless:
      - id: metadata/file::system-shell-basename
  - id: djb2-multiply-33
    desc: DJB2 hash multiply-by-33 instruction
    crit: component
    conf: 0.7
    arch: [x86, x86-64]
    count_min: 1
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 6B C? 21

  - id: djb2-multiply-31
    desc: Polynomial hash multiply-by-31 instruction (modified djb2)
    crit: component
    conf: 0.7
    arch: [x86, x86-64]
    count_min: 1
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 6B C? 1F
  - id: python-extension-module-context
    desc: Python extension module context
    crit: component
    conf: 0.8
    if:
      type: text
      regex: PyInit_|pycryptodome
  - id: fnv1a-offset-basis
    desc: FNV1a hash offset basis constant
    crit: component
    conf: 0.8
    if:
      type: hex
      section: data
      pattern: C5 9D 1C 81
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: fnv1a-x86-prime-imul
    desc: FNV1a prime multiply loop
    crit: component
    conf: 0.85
    for: [pe]
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: 69 F7 93 01 00 01
  - id: fnv1a-prime-32bit-literal
    desc: FNV-1a 32-bit prime constant (0x01000193)
    crit: component
    conf: 0.7
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: 93 01 00 01
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: fnv1a-prime-64bit-literal
    desc: FNV-1a 64-bit prime constant (0x100000001B3)
    crit: notable
    conf: 0.85
    for: [pe, dll]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: B3 01 00 00 00 01 00 00
    unless:
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: fnv1a-prime-64bit-movabs
    desc: FNV-1a 64-bit prime loaded via movabs (x64)
    crit: notable
    conf: 0.92
    for: [pe, dll]
    arch: [x86-64]
    size_max: 5242880
    if:
      type: hex
      section: .text
      pattern: (48|49) (B8|B9|BA|BB|BC|BD|BE|BF) B3 01 00 00 00 01 00 00
    unless:
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: custom-fnv-seed-x86
    desc: Custom FNV seed constant
    crit: component
    conf: 0.86
    for: [pe]
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: BE C9 06 E5 00
  - id: custom-fnv-seed-53ff68-x86
    desc: Custom FNV seed 53ff68
    crit: component
    conf: 0.94
    for: [pe]
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: BE 68 FF 53 00
  - id: multiplicative-hash-seed-71efd7
    desc: Custom API hash seed constant
    crit: component
    conf: 0.9
    for: [pe]
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: BE D7 EF 71 00
  - id: multiplicative-hash-prime-1003f
    desc: Custom API hash multiply constant
    crit: component
    conf: 0.9
    for: [pe]
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: 69 F6 3F 00 01 00
  - id: multiplicative-hash-seed-55a31
    desc: Custom API hash seed 55a31
    crit: component
    conf: 0.88
    for: [pe]
    arch: [x86]
    count_min: 3
    if:
      type: hex
      section: text
      pattern: 31 5A 05 00
  - id: peb-ldr-access
    desc: PEB Ldr access for module enumeration
    crit: component
    conf: 0.85
    for: [pe]
    arch: [x86]
    if:
      type: hex
      section: text
      pattern: 64 A1 30 00 00 00
  - id: teb-peb-access
    desc: TEB to PEB access for module enumeration
    crit: component
    conf: 0.85
    for: [pe]
    arch: [x86]
    size_max: 1048576
    if:
      type: hex
      section: text
      pattern: 64 A1 18 00 00 00
  - id: pe-header-walk
    desc: PE header access via e_lfanew offset
    crit: component
    conf: 0.7
    for: [pe]
    arch: [x86, x86-64]
    count_min: 2
    size_max: 1048576
    if:
      type: hex
      section: text
      pattern: 8B 4? 3C
  - id: pe-header-walk-x64
    desc: x64 PE header access via movsxd
    crit: component
    conf: 0.75
    for: [pe]
    arch: [x86-64]
    size_max: 5242880
    if:
      type: hex
      section: text
      pattern: 48 63 ?? 3C
  - id: mz-magic-check
    desc: MZ header validation in code
    crit: component
    conf: 0.85
    for: [pe]
    arch: [x86, x86-64]
    size_max: 524288
    if:
      type: hex
      section: text
      pattern: B8 4D 5A 00 00
  - id: pe-signature-check
    desc: PE signature validation in code
    crit: component
    conf: 0.85
    for: [pe]
    arch: [x86, x86-64]
    size_max: 524288
    if:
      type: hex
      section: text
      pattern: 81 ?? ?? 50 45 00 00
  - id: peb-access-x64
    desc: Direct PEB access (GS segment)
    crit: component
    conf: 0.95
    for: [pe]
    arch: [x86-64]
    if:
      type: hex
      section: .text
      pattern: 65 48 8b 04 25 60 00 00 00
  - id: ldr-walk
    desc: Manual LDR module list traversal
    crit: suspicious
    conf: 0.9
    for: [pe]
    arch: [x86-64]
    if:
      type: hex
      section: .text
      pattern: 48 8b ?? 18 00 00 00 48 8b ?? 20 00 00 00
  - id: loadlibrarya-ror13-hash
    desc: LoadLibraryA ROR13 hash constant
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: hex
      section: data
      pattern: 8E 4E 0E EC
  - id: getprocaddress-ror13-hash
    desc: GetProcAddress ROR13 hash constant
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: hex
      section: data
      pattern: AA FC 0D 7C
  - id: pe-api-hashing-indicator
    desc: PE API hashing indicators
    crit: suspicious
    conf: 0.88
    for: [pe]
    if:
      type: metrics
      field: pe.api_hashing_indicators
      min: 2
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/signed/developer::google-llc
  - id: pe-api-hashing-indicator-single
    desc: PE API hashing indicator present
    crit: component
    conf: 0.86
    for: [pe]
    if:
      type: metrics
      field: pe.api_hashing_indicators
      min: 1
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/signed/developer::google-llc
composite_rules:
  - id: api-hash-benign-context
    desc: Benign API hash context
    crit: component
    any:
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: python-extension-module-context
      - id: metadata/binary/section/names::upx-section
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/metrics::many-strings-2000
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/metrics::many-imports-50
      - id: metadata/signed/platform::microsoft
      - id: micro-behaviors/crypto/asymmetric/curve25519::libsodium-core
      - id: micro-behaviors/crypto/asymmetric/curve25519::libsodium-drg
      - id: micro-behaviors/crypto/hash/blake2b::libsodium-blake2b
  - id: hash-primitive
    desc: API hashing primitive
    crit: component
    any:
      - id: ror13-hash-seed
      - id: ror14-hash-seed
      - id: ror7-xor-hash-loop
      - id: djb2-hash-constant
      - id: djb2-multiply-33
      - id: djb2-multiply-31
      - id: fnv1a-offset-basis
      - id: fnv1a-x86-prime-imul
      - id: custom-fnv-seed-53ff68-x86
      - id: multiplicative-hash-seed-55a31
  - id: pe-export-walk-primitive
    desc: PEB or PE export walk primitive
    crit: component
    any:
      - id: peb-ldr-access
      - id: teb-peb-access
      - id: pe-header-walk
      - id: pe-header-walk-x64
      - id: peb-access-x64
      - id: micro-behaviors/os/api-resolution/hash-based::peb-fs-access
      - id: ldr-walk
      - id: mz-magic-check
      - id: pe-signature-check
  - id: manual-getprocaddress
    desc: Custom GetProcAddress implementation
    crit: suspicious
    conf: 0.9
    for: [pe]
    size_max: 524288
    all:
      - id: peb-access-x64
    needs: 2
    any:
      - id: mz-magic-check
      - id: pe-signature-check
      - id: pe-header-walk-x64
      - id: pe-header-walk
    unless:
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: metadata/binary/metrics::many-imports
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: well-known/lib/sharpshell::sharpshell-framework
  - id: api-hash-resolution
    desc: Dynamic API resolution via ROR13 hashing
    crit: hostile
    conf: 0.95
    all:
      - id: ror13-hash-seed
    any:
      - id: loadlibrarya-ror13-hash
      - id: getprocaddress-ror13-hash
      - id: peb-ldr-access
    unless:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/metrics::many-imports-50
  - id: api-hash-family-any
    desc: Any API hash resolution family
    crit: suspicious
    conf: 0.9
    for: [pe]
    any:
      - id: api-hash-resolution
      - id: hash-based-obfuscation
      - id: djb2-api-resolution
      - id: ror14-api-resolution
      - id: custom-multiplicative-api-resolution
      - id: pe-api-hashing-indicator
  - id: hash-based-obfuscation
    desc: Hash-based import obfuscation
    crit: suspicious
    conf: 0.85
    size_max: 1048576
    all:
      - id: pe-export-walk-primitive
    any:
      - id: ror13-hash-seed
      - id: ror7-xor-hash-loop
      - id: djb2-hash-constant
      - id: djb2-multiply-33
      - id: djb2-multiply-31
      - id: loadlibrarya-ror13-hash
      - id: getprocaddress-ror13-hash
    needs: 1
    unless:
      - id: api-hash-benign-context
  - id: fnv1a-api-resolution
    desc: FNV1a hash-based API resolution
    crit: suspicious
    conf: 0.92
    for: [pe]
    all:
      - id: fnv1a-x86-prime-imul
      - id: custom-fnv-seed-x86
    any:
      - id: peb-ldr-access
      - id: micro-behaviors/os/api-resolution/hash-based::peb-fs-access
      - id: pe-header-walk
      - id: micro-behaviors/os/api-resolution/manual::kernel32-resolver
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::dll-names-no-loadlibrary
    needs: 1
    unless:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/framework::dotnet-metadata
  - id: fnv1a-custom-seed-api-resolution
    desc: Custom-seed FNV API resolution
    crit: suspicious
    conf: 0.95
    for: [pe]
    all:
      - id: fnv1a-x86-prime-imul
      - id: custom-fnv-seed-53ff68-x86
    any:
      - id: pe-api-hashing-indicator-single
      - id: peb-ldr-access
      - id: micro-behaviors/os/api-resolution/hash-based::peb-fs-access
      - id: pe-header-walk
    needs: 1
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/platform::microsoft
  - id: custom-multiplicative-api-resolution
    desc: Custom multiplicative API hashing
    crit: suspicious
    conf: 0.94
    for: [pe]
    all:
      - id: multiplicative-hash-seed-71efd7
      - id: multiplicative-hash-prime-1003f
    any:
      - id: pe-api-hashing-indicator-single
      - id: pe-export-walk-primitive
    needs: 1
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/platform::microsoft
  - id: custom-multiplicative-55a31-api-resolution
    desc: Custom 55a31 API hashing
    crit: suspicious
    conf: 0.95
    for: [pe]
    platforms: [windows]
    all:
      - id: multiplicative-hash-seed-55a31
      - id: multiplicative-hash-prime-1003f
      - id: pe-api-hashing-indicator-single
      - id: metadata/signed::unsigned
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
  - id: djb2-api-resolution
    desc: DJB2 hash-based API resolution
    crit: suspicious
    conf: 0.9
    for: [pe]
    all:
      - id: djb2-hash-constant
      - id: djb2-multiply-33
    any:
      - id: peb-ldr-access
      - id: teb-peb-access
      - id: pe-header-walk
      - id: pe-header-walk-x64
      - id: peb-access-x64
    needs: 1
    unless:
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/framework::dotnet-metadata
  - id: string-based-api-resolution
    desc: PEB-based API resolution with minimal imports
    crit: suspicious
    conf: 0.88
    for:
      - pe
    size_max: 524288
    all:
      - id: peb-access-x64
      - id: objectives/command-and-control/dropper/execution/loader::pe-single-import
    any:
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::dll-names-no-loadlibrary
      - id: pe-header-walk-x64
      - id: pe-header-walk
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/platform::microsoft
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-lowlevel-pdb
  - id: hostile-api-concealment
    desc: Complete API concealment (PEB walk + PE parsing + string decrypt)
    crit: hostile
    conf: 0.92
    for:
      - pe
    size_max: 524288
    all:
      - id: manual-getprocaddress
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::dll-names-no-loadlibrary
    any:
      - id: objectives/command-and-control/dropper/execution/loader::pe-single-import
      - id: objectives/command-and-control/dropper/execution/loader::pe-few-imports
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: dynamic-api-resolution-peb
    desc: Detects dynamic API resolution via PEB traversal
    all:
      - id: peb-access-x64
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
  - id: x64-loader-api-concealment-profile
    desc: x64 loader profile with concealed API resolution
    crit: suspicious
    conf: 0.92
    for:
      - pe
    platforms:
      - windows
    size_max: 131072
    all:
      - id: pe-export-walk-primitive
      - id: objectives/anti-static/obfuscation/string::long-mixedcase-identifiers
    any:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: objectives/anti-analysis/debugger-detect/check::win-comprehensive
      - id: micro-behaviors/hardware/display/directx/calls::directx-factory-api
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/package/versioning::pe-version-resource
  - id: ror14-api-resolution
    desc: Dynamic API resolution via ROR-14 hashing
    crit: suspicious
    conf: 0.88
    for: [pe, dll]
    platforms: [windows]
    size_max: 5242880
    all:
      - id: ror14-hash-loop-x64
    any:
      - id: peb-access-x64
      - id: ldr-walk
      - id: pe-header-walk-x64
    unless:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/framework::dotnet-assembly
  - id: pe-walk-hash-resolver-x64
    desc: Generic PEB+PE walk with multiplicative hash resolver (x64)
    crit: suspicious
    conf: 0.92
    for: [pe, dll]
    platforms: [windows]
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: peb-access-x64
      - id: pe-header-walk-x64
    any:
      - id: mz-magic-check
      - id: pe-signature-check
    needs: 1
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/platform::wireguard-llc
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/installer::known-benign-installer
      - id: well-known/lib/electron::electron-app-runtime
  - id: signed-loader-with-concealed-resolver
    desc: Signed Microsoft-claim PE with concealed API resolver
    crit: hostile
    conf: 0.95
    for: [pe]
    platforms: [windows]
    size_max: 5242880
    all:
      - id: pe-walk-hash-resolver-x64
      - id: metadata/signed/platform::microsoft
    any:
      - id: objectives/evasion/masquerade/version-resource::signed-applicationframehost-masquerade
      - id: metadata/binary/layout::pe-checksum-mismatch
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
    needs: 1
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: well-known/lib/sharpshell::sharpshell-framework
  - id: multi-gate-evasive-loader
    desc: Multi-gate evasive loader (sandbox + anti-debug + manual resolver + W^X)
    crit: hostile
    conf: 0.96
    for: [pe, dll]
    platforms: [windows]
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: pe-walk-hash-resolver-x64
      - id: objectives/anti-analysis/sandbox-detect/heuristics::hardware-fingerprint-cluster
    any:
      - id: objectives/evasion/process/injection/shellcode::w-xor-x-injection-x64
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/os/api-resolution/hash-based::peb-being-debugged-byte
      - id: objectives/anti-analysis/debugger-detect/check::ntqip-debug-info-cluster
      - id: objectives/anti-analysis/debugger-detect/check::peb-anti-debug-flag-cluster
    needs: 1
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: fnv1a-keystream-cipher
    desc: Custom FNV-1a-driven keystream cipher in shellcode loader
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    size_max: 5242880
    all:
      - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
    any:
      - id: fnv1a-prime-64bit-movabs
      - id: fnv1a-prime-64bit-literal
      - id: fnv1a-prime-32bit-literal
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: api-hash-urlmon-nonstandard-entry
    desc: Concealed URLMon loader entry
    crit: hostile
    conf: 0.94
    for: [pe]
    platforms: [windows]
    size_max: 1048576
    all:
      - id: pe-api-hashing-indicator
      - id: micro-behaviors/communications/http/get::urlmon-dll-reference
      - id: metadata/binary/section/metrics::pe-nonstandard-entry
    any:
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
      - id: objectives/anti-static/obfuscation/payload::unusual-alignment-pe
      - id: metadata/binary/layout::pe-checksum-zeroed
    needs: 1
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/platform::microsoft
