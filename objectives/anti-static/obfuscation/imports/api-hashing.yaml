defaults:
  platforms: [linux, macos, windows]
  attack: T1027.007
  mbc: B0032.014
  for: [elf, macho, pe]
traits:
- id: ror13-hash-seed
  desc: ROR13 hash algorithm constant
  crit: component
  conf: 0.8
  arch: [x86, x86-64]
  count_min: 15
  per_kb_min: 0.05
  size_max: 5242880
  if:
    type: hex
    section: text
    pattern: C1 C? 0D
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: ror7-xor-hash-loop
  desc: ROR-7/XOR hash accumulator loop
  crit: component
  conf: 0.85
  arch: [x86]
  for: [pe]
  size_max: 524288
  if:
    type: hex
    section: text
    pattern: C1 C8 07 33 C8
- id: ror14-hash-seed
  desc: ROR14 hash algorithm constant
  crit: component
  conf: 0.8
  arch: [x86, x86-64]
  for: [pe, dll]
  count_min: 8
  per_kb_min: 0.05
  size_max: 5242880
  if:
    type: hex
    section: text
    pattern: C1 C? 0E
- id: ror14-hash-loop-x64
  desc: ROR-14 hash inner loop (x64)
  crit: component
  conf: 0.9
  arch: [x86-64]
  for: [pe, dll]
  size_max: 5242880
  if:
    type: hex
    section: .text
    pattern: 41 C1 C8 0E 0F BE C0 44 03 C0
- id: djb2-hash-constant
  desc: DJB2 hash algorithm constant (5381)
  crit: component
  conf: 0.75
  count_min: 1
  size_max: 5242880
  if:
    type: hex
    section: .text
    pattern: 05 15 00 00
  unless:
  - id: metadata/file/string/identity::system-shell-basename
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: well-known/app/drivers::ngx-dll-basename
- id: djb2-multiply-33
  desc: DJB2 hash multiply-by-33 instruction
  crit: component
  conf: 0.7
  for: [pe, dll]
  arch: [x86, x86-64]
  count_min: 1
  size_max: 10485760
  if:
    type: hex
    section: text
    pattern: 6B ?? 21

- id: djb2-multiply-31
  desc: 'Polynomial hash multiply-by-31 instruction'
  crit: component
  conf: 0.7
  arch: [x86, x86-64]
  count_min: 1
  size_max: 10485760
  if:
    type: hex
    section: text
    pattern: 6B C? 1F
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: well-known/app/drivers::ngx-dll-basename
- id: multiplicative-hash-seed-71efd7
  desc: Custom API hash seed constant
  crit: component
  conf: 0.9
  for: [pe]
  arch: [x86]
  if:
    type: hex
    section: text
    pattern: BE D7 EF 71 00
- id: multiplicative-hash-prime-1003f
  desc: Custom API hash multiply constant
  crit: component
  conf: 0.9
  for: [pe]
  arch: [x86]
  if:
    type: hex
    section: text
    pattern: 69 F6 3F 00 01 00
- id: multiplicative-hash-seed-55a31
  desc: Custom API hash seed 55a31
  crit: component
  conf: 0.88
  for: [pe]
  arch: [x86]
  count_min: 3
  if:
    type: hex
    section: text
    pattern: 31 5A 05 00
- id: peb-ldr-access
  desc: PEB Ldr access for module enumeration
  crit: component
  conf: 0.85
  for: [pe]
  arch: [x86]
  if:
    type: hex
    section: text
    pattern: 64 A1 30 00 00 00
- id: teb-peb-access
  desc: TEB to PEB access for module enumeration
  crit: component
  conf: 0.85
  for: [pe]
  arch: [x86]
  size_max: 1048576
  if:
    type: hex
    section: text
    pattern: 64 A1 18 00 00 00
- id: pe-header-walk
  desc: PE header access via e_lfanew offset
  crit: component
  conf: 0.7
  for: [pe]
  arch: [x86, x86-64]
  count_min: 2
  size_max: 1048576
  if:
    type: hex
    section: text
    pattern: 8B 4? 3C
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: pe-header-walk-x64
  desc: x64 PE header access via movsxd
  crit: component
  conf: 0.75
  for: [pe]
  arch: [x86-64]
  size_max: 5242880
  if:
    type: hex
    section: text
    pattern: 48 63 ?? 3C
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: mz-magic-check
  desc: MZ header validation in code
  crit: component
  conf: 0.85
  for: [pe]
  arch: [x86, x86-64]
  size_max: 524288
  if:
    type: hex
    section: text
    pattern: B8 4D 5A 00 00
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: pe-signature-check
  desc: PE signature validation in code
  crit: component
  conf: 0.85
  for: [pe]
  arch: [x86, x86-64]
  size_max: 524288
  if:
    type: hex
    section: text
    pattern: 81 ?? ?? 50 45 00 00
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: peb-access-x64
  desc: Direct PEB access (GS segment)
  crit: component
  conf: 0.95
  for: [pe]
  arch: [x86-64]
  if:
    type: hex
    section: .text
    pattern: 65 48 8b 04 25 60 00 00 00
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: pe-loader-peb-access-x64
  desc: PEB access in custom loader section
  crit: component
  conf: 0.95
  for: [pe, dll]
  platforms: [windows]
  arch: [x86-64]
  if:
    type: hex
    section: .hdr
    pattern: 65 48 8b 04 25 60 00 00 00
- id: pe-loader-mz-check-x64
  desc: MZ validation in custom loader section
  crit: component
  conf: 0.9
  for: [pe, dll]
  platforms: [windows]
  arch: [x86-64]
  if:
    type: hex
    section: .hdr
    pattern: B8 4D 5A 00 00
- id: pe-loader-e-lfanew-walk-x64
  desc: PE e_lfanew walk in custom loader
  crit: component
  conf: 0.9
  for: [pe, dll]
  platforms: [windows]
  arch: [x86-64]
  if:
    type: hex
    section: .hdr
    pattern: 48 63 ?? 3C
- id: pe-loader-api-name-hash-x64
  desc: Multiply-by-97 export hash loop in loader
  crit: component
  conf: 0.88
  for: [pe, dll]
  platforms: [windows]
  arch: [x86-64]
  if:
    type: hex
    section: .hdr
    pattern: 45 6B ?? 61
- id: pe-mz-compare-x64
  desc: x64 code compares an image with MZ
  crit: component
  conf: 0.94
  for: [pe, dll]
  platforms: [windows]
  arch: [x86-64]
  if:
    type: hex
    section: .text
    pattern: 66 81 ?? 4D 5A
- id: pe-e-lfanew-walk-x64-text
  desc: x64 code walks the PE e_lfanew field
  crit: component
  conf: 0.9
  for: [pe, dll]
  platforms: [windows]
  arch: [x86-64]
  if:
    type: hex
    section: .text
    pattern: 48 63 ?? 3C
- id: ldr-walk
  desc: Manual LDR module list traversal
  crit: suspicious
  conf: 0.9
  for: [pe]
  arch: [x86-64]
  if:
    type: hex
    section: .text
    pattern: 48 8b ?? 18 00 00 00 48 8b ?? 20 00 00 00
  unless:
  # Rust Node-API addons commonly carry this byte sequence in generated or
  # runtime support code; the addon export is a stronger framework identity
  # than this isolated instruction pattern.
  - id: metadata/binary/framework::node-api-addon-export
- id: loadlibrarya-ror13-hash
  desc: LoadLibraryA ROR13 hash constant
  crit: suspicious
  conf: 0.9
  for: [pe]
  if:
    type: hex
    section: data
    pattern: 8E 4E 0E EC
- id: getprocaddress-ror13-hash
  desc: GetProcAddress ROR13 hash constant
  crit: suspicious
  conf: 0.9
  for: [pe]
  if:
    type: hex
    section: data
    pattern: AA FC 0D 7C
- id: pe-api-hashing-indicator
  desc: PE API hashing indicators
  crit: suspicious
  conf: 0.88
  for: [pe]
  if:
    type: metrics
    field: pe.api_hashing_indicator_count
    min: 2
  unless:
  - id: metadata/binary/framework/
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/lang/compiled/
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: metadata/signed/developer::google-llc
  - id: well-known/app/protected-benign-pe/
  - id: well-known/app/swifttunnel_vpn/
- id: pe-api-hashing-indicator-single
  desc: PE API hashing indicator present
  crit: component
  conf: 0.86
  for: [pe]
  if:
    type: metrics
    field: pe.api_hashing_indicator_count
    min: 1
  unless:
  - id: metadata/binary/framework/
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/lang/compiled/
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: metadata/signed/developer::google-llc
  - id: well-known/app/protected-benign-pe/
  - id: well-known/app/swifttunnel_vpn/
- id: wintun-embedded-pe-member
  desc: Embedded Wintun PE member
  crit: component
  for: [pe]
