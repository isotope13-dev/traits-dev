defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: sparse-kernel32-loader-profile
    desc: Sparse KERNEL32 loader profile
    crit: suspicious
    conf: 0.91
    size_max: 1048576
    all:
      - id: metadata/binary/symbols::pe-single-import-dll
      - id: micro-behaviors/dylib/load::load-library-ex-w
      - id: micro-behaviors/os/module/load::get-proc-address-import
    any:
      - id: metadata/binary/symbols::no-exports
      - id: micro-behaviors/os/module/load::get-module-handle-ex
      - id: metadata/binary/resource::minimal-resources
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: objectives/anti-static/obfuscation/imports::peb-access-x64
      - id: metadata/binary/debug::doexeloc-pdb-basename
    needs: 3
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed::signer-evidence-present
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/signed/platform::microsoft
      - id: metadata/file/extension::node-native-addon-extension
