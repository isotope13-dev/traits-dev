defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1027.007
  mbc: B0032.014

traits:
  - id: hex-charcode-dns-module
    desc: DNS module name concealed as hex codes
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '[0x64,0x6e,0x73]'

  - id: hex-charcode-resolve4-method
    desc: resolve4 method concealed as hex codes
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '[0x72,0x65,0x73,0x6f,0x6c,0x76,0x65,0x34]'

composite_rules:
  - id: node-charcode-decoded-require
    desc: Node module name decoded before require
    crit: suspicious
    conf: 0.96
    near_bytes: 512
    all:
      - id: micro-behaviors/data/source/dynamic/load::node-dynamic-require-call
      - id: micro-behaviors/data/decode/custom::fromcharcode-indexed-array

  - id: node-charcode-concealed-dns-resolution
    desc: Node DNS resolver APIs concealed as character codes
    crit: suspicious
    conf: 0.99
    scope: archive
    all:
      - id: hex-charcode-dns-module
      - id: hex-charcode-resolve4-method
