# Go Library Fingerprints for Garbled Binaries
# These patterns detect specific Go libraries via internal type/method names
# that survive garbling because they're used by reflection or are unexported.
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [elf, macho, pe]
  # component: these individual library fingerprints (HTTP/2, TLS, base64, cryptobyte)
  # appear in any Go binary using those libraries. They are meaningful only as inputs
  # to the composite garble-detection rules (go-garbled-http2, go-garbled-cryptobyte,
  # etc.) which additionally require confirmed garble indicators before firing.
  crit: component
  attack: "T1027"
  size_max: 52428800
traits:
  # ============================================================================
  # HTTP/2 Internal Types (net/http internals that survive garbling)
  # ============================================================================
  - id: go-http2-framer-internals
    desc: Go HTTP/2 framer internals
    conf: 0.85
    count_min: 2
    if:
      type: string
      regex: 'http2Frame[A-Z]'
  - id: go-http2-frame-types
    desc: Go HTTP/2 frame types
    conf: 0.85
    count_min: 2
    if:
      type: string
      regex: 'http2(Ping|GoAway|Data|Settings)Frame'
  - id: go-http2-frame-headers
    desc: Go HTTP/2 frame headers/control
    conf: 0.85
    count_min: 2
    if:
      type: string
      regex: 'http2(Headers|RST|Window|Continuation)Frame'
  - id: go-http2-transport-internals
    desc: Go HTTP/2 transport internals
    conf: 0.85
    count_min: 2
    if:
      type: string
      regex: 'http2(clientStream|noDialClientConnPool)'
  # ============================================================================
  # TLS/Crypto Internal Types (crypto/tls internals)
  # ============================================================================
  - id: go-tls-handshake-internals
    desc: Go TLS handshake internal types
    conf: 0.85
    count_min: 2
    if:
      type: string
      regex: '(client|server)Handshake(State|Msg)|HelloMsg'
  - id: go-tls-cipher-internals
    desc: Go TLS cipher suite internals
    conf: 0.8
    count_min: 2
    if:
      type: string
      regex: 'cipherSuite(TLS13)?|SignatureScheme'
  # ============================================================================
  # golang.org/x/crypto/cryptobyte - ASN.1 parsing library
  # Very distinctive method names that survive garbling
  # ============================================================================
  - id: go-cryptobyte-asn1-core
    desc: Go cryptobyte ASN.1 core
    # component: these method names appear in ANY Go binary using crypto/tls.
    # Suspicious only in combination with garble indicators (go-garbled-cryptobyte composite).
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: string
      regex: 'ReadASN1(Integer|Boolean|BitString|ObjectIdentifier)'
  - id: go-cryptobyte-asn1-types
    desc: Go cryptobyte ASN.1 types
    # component: same rationale as go-cryptobyte-asn1-core above.
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: string
      regex: 'ReadASN1(Element|GeneralizedTime|UTCTime)'
  - id: go-cryptobyte-methods
    desc: Go cryptobyte buffer methods
    conf: 0.85
    count_min: 2
    if:
      type: string
      regex: 'ReadUint(8|16|24|32)LengthPrefixed'
  # ============================================================================
  # Proxy/SOCKS Internal Types
  # ============================================================================
  - id: go-proxy-connect-header
    desc: Go proxy connect header
    crit: suspicious
    conf: 0.85
    if:
      type: string
      substr: "ProxyConnectHeader"
  - id: go-proxy-connect-response
    desc: Go proxy connect response
    crit: suspicious
    conf: 0.85
    if:
      type: string
      substr: "OnProxyConnectResponse"
  - id: go-proxy-is-proxy
    desc: Go proxy detection internal
    crit: component
    conf: 0.8
    if:
      type: string
      substr: "isProxy"
  # ============================================================================
  # encoding/base64 - Encode/Decode method signatures
  # ============================================================================
  - id: go-base64-encode
    desc: Go base64 encoding
    conf: 0.75
    count_min: 2
    if:
      type: string
      regex: '\.Encode(ToString|dLen)?|AppendEncode'
  - id: go-base64-decode
    desc: Go base64 decoding
    conf: 0.75
    count_min: 2
    if:
      type: string
      regex: '\.Decode(ToString|dLen)?|AppendDecode'
  # ============================================================================
  # bytes.Buffer internal signatures
  # ============================================================================
  - id: go-bytes-buffer-io
    desc: Go bytes.Buffer I/O
    conf: 0.7
    count_min: 2
    if:
      type: string
      regex: '\.(ReadFrom|WriteTo)'
  - id: go-bytes-buffer-methods
    desc: Go bytes.Buffer methods
    conf: 0.7
    count_min: 3
    if:
      type: string
      regex: '\.(ReadByte|WriteByte|WriteString)\b'
      # ============================================================================
      # Composite Rules: Detect garbled Go with specific capabilities
      # ============================================================================
composite_rules:
  - id: go-http2-transport-core
    desc: Go HTTP/2 transport core
    conf: 0.85
    all:
      - id: go-http-internal-http2transport
      - id: go-http-internal-http2clientconn
  # Helper: HTTP/2 capability present
  - id: go-http2-present
    desc: "Go HTTP/2 internals present"
    crit: notable
    conf: 0.85
    any:
      - id: go-http2-framer-internals
      - id: go-http2-frame-types
      - id: go-http2-frame-headers
      - id: go-http2-transport-core
      - id: go-http2-transport-internals
  # Helper: TLS internals present
  - id: go-tls-present
    desc: "Go TLS internals present"
    crit: notable
    conf: 0.85
    any:
      - id: go-tls-handshake-internals
      - id: go-tls-cipher-internals
  # Helper: Cryptobyte present
  - id: go-cryptobyte-present
    desc: "Go cryptobyte ASN.1 parsing present"
    crit: notable
    conf: 0.85
    any:
      - id: go-cryptobyte-asn1-core
      - id: go-cryptobyte-asn1-types
      - id: go-cryptobyte-methods
  # Helper: Garble indicators present
  - id: go-garble-indicators
    desc: "Go garble obfuscation indicators"
    crit: suspicious
    conf: 0.9
    any:
      - id: objectives/anti-static/obfuscation/garble::go-garbled-type-pointer
      - id: objectives/anti-static/obfuscation/garble::go-garbled-method-receiver
  # Garbled Go with HTTP/2 capability
  - id: go-garbled-http2
    desc: "Garbled Go binary with HTTP/2 capability"
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/compiler::go-binary
      - id: go-http2-present
      - id: go-garble-indicators
  # Garbled Go with x/crypto/cryptobyte (indicates TLS/cert parsing)
  - id: go-garbled-cryptobyte
    desc: "Garbled Go binary with x/crypto/cryptobyte (ASN.1 parsing)"
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/compiler::go-binary
      - id: go-cryptobyte-present
      - id: go-garble-indicators
  - id: go-proxy-internals-core
    desc: Go proxy function internals
    crit: suspicious
    conf: 0.85
    all:
      - id: go-proxy-connect-header
      - id: go-proxy-connect-response
  # Garbled Go with proxy capability
  - id: go-garbled-proxy-client
    desc: "Garbled Go binary with proxy client capability"
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/compiler::go-binary
      - id: go-garble-indicators
    any:
      - id: go-proxy-internals-core
      - id: go-proxy-is-proxy
  # Helper: base64 encode/decode present
  - id: go-base64-present
    desc: "Go base64 encoding/decoding present"
    crit: notable
    conf: 0.75
    any:
      - id: go-base64-encode
      - id: go-base64-decode
  # Helper: bytes.Buffer I/O present
  - id: go-bytes-buffer-present
    desc: "Go bytes.Buffer usage present"
    crit: notable
    conf: 0.7
    any:
      - id: go-bytes-buffer-io
      - id: go-bytes-buffer-methods
  # Full C2 profile: Garbled Go + HTTP/2 + TLS + cryptobyte
  - id: go-garbled-c2-profile
    desc: "Garbled Go C2 implant (HTTP/2, TLS, crypto)"
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/compiler::go-binary
      - id: go-cryptobyte-present
      - id: go-http2-present
      - id: go-tls-present
      - id: go-garble-indicators
