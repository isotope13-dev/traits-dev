# Garble Obfuscator Detection
# Detects Go binaries that have been obfuscated using tools like Garble, 
# which randomize package names and filenames into short base64-like strings.
# ATT&CK: T1027 (Obfuscated Files or Information)

defaults:
  for: [elf, macho, pe]
  attack: "T1027"

traits:
  - id: garble-random-filenames
    desc: Go binary with Garble randomized filenames
    crit: suspicious
    conf: 0.95
    count_min: 100
    if:
      type: string
      # Looks for multiple instances of randomly generated 5-15 character filenames
      # Garble frequently uses a mix of upper, lower, numbers and underscores.
      # e.g., aacIDWgGjQR.go, ZzHqdTvg.go, zzYMT2rrN.go
      regex: '^[a-zA-Z0-9_]{5,15}\.go$'

  - id: garble-random-packages
    desc: Go binary with Garble randomized packages
    crit: suspicious
    conf: 0.95
    count_min: 20
    if:
      type: string
      # Looks for randomized Go function names
      # e.g., Jj6F5T.(*LMBs3S4W8).XORKeyStream
      regex: '^[a-zA-Z0-9_]{5,15}\.\(\*[a-zA-Z0-9_]{5,15}\)\.[a-zA-Z0-9_]+'

composite_rules:
  - id: garble-obfuscated-go
    desc: Garble obfuscated Go binary
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/compiler::go-binary
    any:
      - id: garble-random-filenames
      - id: garble-random-packages