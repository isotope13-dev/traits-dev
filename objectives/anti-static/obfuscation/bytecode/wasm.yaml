# WebAssembly runtime detection
# Embedded Wasm runtimes can be used to execute sandboxed obfuscated logic
# Go binaries pack strings in rodata without null terminators — use raw
defaults:
  for: [binaries]
  platforms: [windows, unix]
traits:
  - id: wazero-wasm-symbol
    desc: Wazero WebAssembly runtime symbol
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "tetratelabs/wazero"
  - id: wazero-wasm-string
    desc: Wazero WebAssembly runtime error string
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: "recovered by wazero"
  - id: go-wasm-bundle-data-symbol
    desc: Go embedded WASM bundle symbol
    crit: suspicious
    conf: 0.9
    for: [macho, elf]
    if:
      type: text
      substr: "main.bundleData"
  - id: go-wasm-codec-table-symbol
    desc: Go embedded WASM codec symbol
    crit: suspicious
    conf: 0.9
    for: [macho, elf]
    if:
      type: text
      substr: "main.codecTable"
  - id: taskrt-debug-env
    desc: Task runtime debug environment
    crit: suspicious
    conf: 0.9
    for: [macho, elf]
    if:
      type: text
      substr: "TASKRT_DEBUG"
  - id: taskrt-null-temp-path
    desc: Task runtime null temp path
    crit: suspicious
    conf: 0.9
    for: [macho, elf]
    if:
      type: text
      substr: "/tmp/.wfnull"
  - id: taskrt-mirror-debug-log
    desc: Task runtime mirror debug log
    crit: suspicious
    conf: 0.9
    for: [macho, elf]
    if:
      type: text
      substr: "/tmp/mirror-debug.log"
  - id: taskrt-darwin-native-bridge
    desc: Task runtime Darwin native bridge
    crit: suspicious
    conf: 0.9
    for: [macho]
    if:
      type: text
      substr: "[taskrt] darwin_call:"
composite_rules:
  - id: wazero-wasm-runtime
    desc: Embedded Wazero WebAssembly runtime
    crit: suspicious
    conf: 0.9
    any:
      - id: wazero-wasm-symbol
      - id: wazero-wasm-string
  - id: encoded-wazero-taskrt-host
    desc: Encoded WASM task runtime host
    crit: hostile
    conf: 0.95
    for: [macho, elf]
    all:
      - id: wazero-wasm-runtime
      - id: go-wasm-bundle-data-symbol
      - id: go-wasm-codec-table-symbol
      - id: taskrt-debug-env
    any:
      - id: taskrt-null-temp-path
      - id: taskrt-mirror-debug-log
      - id: taskrt-darwin-native-bridge
  - id: wazero-memory-loader-bridge
    desc: Wazero memory loader API bridge
    crit: hostile
    conf: 0.96
    all:
      - id: wazero-wasm-runtime
      - id: micro-behaviors/mem/protect/modify::getprocaddr-memory-loader-primitives
