defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1027"
traits:
  - id: jsvmprt-loader
    desc: JavaScript VM bytecode runtime entrypoint
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: _\$jsvmprt\s*\(
  - id: hnoj-bytecode-magic
    desc: HNOJ JavaScript VM bytecode magic
    crit: notable
    conf: 0.95
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
    if:
      type: text
      substr: 484e4f4a403f5243
  - id: large-hex-jsvm-payload
    desc: Large hex JavaScript VM payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: _\$jsvmprt\s*\(\s*['"][0-9a-fA-F]{1024,}
composite_rules:
  - id: javascript-vm-bytecode-loader
    desc: Custom JavaScript VM bytecode payload loader
    crit: hostile
    conf: 0.98
    all:
      - id: jsvmprt-loader
      - id: hnoj-bytecode-magic
      - id: large-hex-jsvm-payload
