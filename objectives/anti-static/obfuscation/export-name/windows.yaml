# Suspicious DLL Export Names
# Export names that reveal malicious intent through naming conventions
# Anti-static failure: author neglected to obfuscate export names
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: collect-send-export
    desc: Export combining collection and transmission
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      regex: '(?i)(collect|gather).{0,15}(send|upload|exfil)'
  - id: steal-export
    desc: Export with steal/stealer terminology
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      regex: '(?i)^(steal|stealer|grabber|harvester)'
  - id: keylog-export
    desc: Export indicating keylogging
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      regex: '(?i)(keylog|keystroke|keypress)'
  - id: inject-export
    desc: Export indicating code injection
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      regex: '(?i)^(inject|shellcode|implant)(dll|code|payload)?$'
  - id: dump-creds-export
    desc: Export indicating credential dumping
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      regex: '(?i)(dump|extract)(cred|pass|token|hash)'
