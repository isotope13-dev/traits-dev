defaults:
  platforms: [windows, unix]
  for: [go]
  attack: T1027
  mbc: B0032
traits:
- id: config-base64-xor-fragment
  desc: Obfuscated config string fragment
  crit: component
  conf: 0.85
  if:
    type: string_literal
    regex: config.{0,20}(base64|xor)
- id: decoded-address-config-fragment
  desc: Decoded address config fragment
  crit: component
  conf: 0.85
  if:
    type: string_literal
    regex: decode.{0,20}(config|addr)
- id: xor-address-config-fragment
  desc: XOR address config fragment
  crit: component
  conf: 0.85
  if:
    type: string_literal
    regex: xor.{0,20}(addr|host)
- id: go-decryption-key-symbol
  desc: Go decryption key symbol
  crit: component
  conf: 0.55
  if:
    type: text
    regex: '\b(decryptionKey|decryptionKey[0-9]+)\b'
