# XOR-decoded API names in binaries
# Identifies critical API names (e.g., CreateProcess, LoadLibrary, VirtualAlloc)
# that have been obfuscated using XOR or other simple schemes and decoded
# by the cleave string analysis pipeline.
defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  crit: suspicious
  conf: 0.95
  attack: T1027.002

traits:
  - id: xor-decoded-createprocess-api
    desc: XOR-decoded CreateProcess API
    if:
      type: encoded
      encoding: xor
      regex: (?i)^CreateProcess(A|W|InternalW)?$

  - id: xor-decoded-shellexec-api
    desc: XOR-decoded ShellExecute API
    if:
      type: encoded
      encoding: xor
      regex: (?i)^ShellExecute(A|W)?$

  - id: xor-decoded-exec-api
    desc: "XOR-decoded process execution API"
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      encoding: xor
      regex: (?i)^(WinExec|system)$

  - id: xor-decoded-virtual-alloc-api
    desc: XOR-decoded VirtualAlloc memory allocation API
    if:
      type: encoded
      encoding: xor
      regex: (?i)^VirtualAlloc(Ex)?$

  - id: xor-decoded-virtual-protect-api
    desc: 'xor decoded virtual protect api'
    if:
      type: encoded
      encoding: xor
      regex: (?i)^(VirtualProtect(Ex)?|WriteProcessMemory|NtWriteVirtualMemory)$

  - id: xor-decoded-load-library-api
    desc: XOR-decoded LoadLibrary API
    if:
      type: encoded
      encoding: xor
      regex: (?i)^LoadLibrary(A|W|ExA|ExW)?$
    unless:
      - type: symbol
        regex: (?i)^LoadLibrary(A|W|ExA|ExW)?$

  - id: xor-decoded-proc-lookup-api
    desc: XOR-decoded procedure address lookup API
    if:
      type: encoded
      encoding: xor
      regex: (?i)^(GetProcAddress|LdrLoadDll)$
    unless:
      - type: symbol
        regex: (?i)^(GetProcAddress|LdrLoadDll)$

  - id: xor-decoded-bcrypt-api
    desc: XOR-decoded BCrypt cryptographic APIs
    if:
      type: encoded
      encoding: xor
      regex: (?i)^(BCryptOpenAlgorithmProvider|BCryptDecrypt|BCryptGenerateSymmetricKey)$

  - id: xor-decoded-crypt-api
    desc: XOR-decoded legacy CryptDecrypt API
    if:
      type: encoded
      encoding: xor
      regex: (?i)^CryptDecrypt$

  - id: xor-decoded-http-api
    desc: XOR-decoded WinINet HTTP APIs
    if:
      type: encoded
      encoding: xor
      regex: (?i)^(InternetOpen(A|W)?|HttpSendRequest(A|W)?)$

  - id: xor-decoded-socket-api
    desc: XOR-decoded socket networking APIs
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      encoding: xor
      regex: (?i)^(Socket|Connect|WSAConnect)$

  - id: xor-decoded-rundll32-host
    desc: XOR-decoded rundll32 host process name
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: xor
      regex: '(?i)^rundll32(\.exe)?$'

composite_rules:
  - id: xor-obfuscated-encrypted-memory-loader
    desc: XOR-obfuscated crypto loader changes memory protection
    crit: hostile
    conf: 0.97
    attack: T1620
    mbc: B0032
    all:
      - id: xor-decoded-bcrypt-api
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-aes-gcm-decrypt
      - id: micro-behaviors/mem/protect/modify::virtual-protect

  - id: xor-encoded-api-table
    desc: Binary contains XOR-encoded critical API table
    crit: hostile
    conf: 0.98
    needs: 3
    any:
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-bcrypt-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-createprocess-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-crypt-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-exec-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-http-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-load-library-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-proc-lookup-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-shellexec-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-socket-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-virtual-alloc-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-virtual-protect-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-rundll32-host

  - id: xor-http-anti-debug-process-loader
    desc: XOR-obfuscated HTTP and memory APIs combined with anti-debug process loading
    crit: hostile
    conf: 0.98
    all:
      - id: xor-decoded-http-api
      - id: xor-decoded-virtual-protect-api
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: metadata/binary/layout::large-overlay-1mb
