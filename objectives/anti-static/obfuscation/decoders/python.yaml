# Python Decoders and Obfuscation Tools
# Detects scripts used to decode malware payloads or strings
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  attack: T1027
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
composite_rules:
  - id: python-xor-string-decoder
    desc: "Python script implementing XOR string decryption"
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/string/recovery::python-xor-byte-loop
      - id: objectives/anti-static/obfuscation/string/recovery::python-printable-char-check
    any:
      - id: objectives/anti-static/obfuscation/string/recovery::python-sliding-key-loop
      - id: micro-behaviors/data/encode/xor::xor-key-null-pattern
  - id: python-bruteforce-string-dumper
    desc: "Python script that brute-forces XOR keys to dump strings"
    crit: suspicious
    conf: 1.0
    all:
      - id: micro-behaviors/data/encode/xor::xor-decoding-loop
      - id: objectives/anti-static/obfuscation/string/recovery::python-sliding-key-loop
      - id: objectives/anti-static/obfuscation/string/recovery::python-printable-string-extractor
    any:
      - id: micro-behaviors/data/string::alphanumeric-ratio-check
      - id: objectives/anti-static/obfuscation/string/recovery::python-deduplicated-string-dump
  - id: python-offset-xor-string-hunter
    desc: "Python brute-force XOR string hunting helper"
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/data/encode/xor::xor-decoding-loop
      - id: micro-behaviors/fs/read/file::file-read-content
      - id: objectives/anti-static/obfuscation/string/recovery::python-printable-string-extractor
      - id: objectives/anti-static/obfuscation/string/recovery::python-offset-decoder-bruteforce
    any:
      - id: objectives/anti-static/obfuscation/string/recovery::python-deduplicated-string-dump
      - id: objectives/anti-static/obfuscation/string/recovery::python-printable-char-check
