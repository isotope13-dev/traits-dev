defaults:
  platforms:
    - windows
    - linux
    - unix
    - android
    - macos
    - ios
  attack: T1055
  for: [binaries]
traits:
  - id: large-null-run-text
    desc: Large null run in executable (64+ bytes)
    crit: component
    conf: 0.85
    for:
      - pe
      - elf
    count_min: 10
    if:
      type: hex
      section: text
      pattern: 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00
    unless:
      - type: raw
        substr: mscoree
      - id: metadata/format/document/help2::help2-container
  - id: huge-null-run-text
    desc: Huge null run in executable (128+ bytes)
    crit: component
    conf: 0.95
    for:
      - pe
      - elf
    if:
      type: hex
      section: text
      pattern: 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00
    unless:
      - id: objectives/anti-static/pack/detect::upx-section
      - type: raw
        substr: BSJB
      - type: raw
        substr: storport.sys
      - type: string_value
        exact: ScsiMiniPort
      - id: metadata/format/document/help2::help2-container
      - id: metadata/format/pe::resource-only-dll
  - id: int3-padding-text
    desc: Dense INT3 breakpoint instructions
    crit: component
    conf: 0.8
    size_max: 1048576
    per_kb_min: 0.5
    if:
      type: hex
      section: text
      pattern: CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC
  - id: null-nop-pattern
    desc: Alternating null and NOP pattern
    crit: component
    conf: 0.85
    count_min: 3
    if:
      type: hex
      section: text
      pattern: 00 90 00 90 00 90 00 90 00 90 00 90 00 90 00 90
  - id: dense-nops-executable
    desc: Dense NOP instructions in executable section
    crit: notable
    conf: 0.75
    per_kb_min: 10.0
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 90 90 90 90 90 90 90 90
    unless:
      - id: metadata/compiler::go-binary
  - id: low-entropy-executable
    desc: Executable section with very low entropy
    crit: notable
    conf: 0.8
    entropy_max: 1.0
    if:
      type: section
      executable: true
      length_min: 65536
    unless:
      - id: metadata/signed/platform::apple
      - type: raw
        substr: mscoree
      - type: metrics
        field: binary.import_count
        min: 80
  - id: oversized-text-section
    desc: Unusually large executable section
    crit: notable
    conf: 0.7
    if:
      type: section
      executable: true
      length_min: 4194304
    unless:
      - id: metadata/compiler::go-binary
      - id: metadata/format::many-imports
      - type: metrics
        field: pe.is_dotnet
        min: 1
  - id: fptable-section
    desc: .fptable section (packer artifact)
    crit: component
    conf: 0.8
    for:
      - pe
      - dll
    if:
      type: section
      substr: .fptable
composite_rules:
  - id: code-cave-null-indicator
    desc: Large executable null padding indicator
    crit: component
    conf: 0.85
    any:
      - id: large-null-run-text
      - id: huge-null-run-text
  - id: code-cave-support-indicator
    desc: Secondary code cave structure indicator
    crit: component
    conf: 0.8
    any:
      - id: int3-padding-text
      - id: null-nop-pattern
      - id: low-entropy-executable
      - id: fptable-section
  - id: code-cave-null-padding
    desc: Code cave with null byte padding
    crit: suspicious
    conf: 0.9
    attack: T1027
    size_min: 16384
    size_max: 150000
    all:
      - id: code-cave-null-indicator
      - id: code-cave-support-indicator
    unless:
      - id: metadata/format::many-imports
      - id: metadata/format::many-exports
    downgrade:
      any:
        - id: metadata/lang/compiler::msvc
        - id: metadata/format/pe::dotnet-assembly
        - id: metadata/format::many-imports
        - type: raw
          substr: PECompac
        - type: trait
          id: metadata/lang/compiler::svkp-delphi-layout
  - id: injection-ready-cave
    desc: Code cave suitable for code injection
    crit: hostile
    conf: 0.95
    size_min: 16384
    all:
      - id: huge-null-run-text
      - id: metadata/hardening/memory::wx-section
    any:
      - id: objectives/anti-static/obfuscation/payload::extreme-minimal-imports
      - id: metadata/format::no-functions
    needs: 1
    unless:
      - id: metadata/format::many-imports
      - id: metadata/lang/compiler::dvclal-resource
      - type: section
        regex: (\.themida|\.aspr)
      - type: raw
        regex: (BSJB|PECompac|ntoskrnl|storport\.sys)
      - type: raw
        regex: (Enigma Protector|enigmaprotector\.com)
      - type: string_value
        exact: ScsiMiniPort
      - type: raw
        substr: WATCOM C/C
  - id: suspicious-padding
    desc: Suspicious executable section padding
    crit: suspicious
    conf: 0.85
    attack: T1027
    size_max: 500000
    needs: 2
    any:
      - id: large-null-run-text
      - id: int3-padding-text
      - id: null-nop-pattern
      - id: dense-nops-executable
    downgrade:
      any:
        - id: metadata/format::many-imports
        - id: metadata/format::many-exports
