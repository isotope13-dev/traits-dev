defaults:
  platforms:
  - linux
  - macos
  - windows
  attack: T1055
  for: [elf, macho, pe]
traits:
- id: large-null-run-text
  desc: Large null run in executable (64+ bytes)
  crit: component
  conf: 0.85
  for:
  - pe
  - elf
  count_min: 10
  if:
    type: hex
    section: text
    pattern: 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00
  unless:
  - type: text
    substr: mscoree
  - id: metadata/document/office/container/
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: huge-null-run-text
  desc: Huge null run in executable (128+ bytes)
  crit: component
  conf: 0.95
  for:
  - pe
  - elf
  if:
    type: hex
    section: text
    pattern: 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00
  unless:
  - id: metadata/binary/section/names::upx-section
  - id: metadata/binary/framework::dotnet-metadata
  - id: scsi-miniport-string
  - id: metadata/document/office/container/
  - id: metadata/binary/resource/
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: int3-padding-text
  desc: Dense INT3 breakpoint instructions
  crit: component
  conf: 0.8
  size_max: 1048576
  per_kb_min: 0.5
  if:
    type: hex
    section: text
    pattern: CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC CC
- id: null-nop-pattern
  desc: Alternating null and NOP pattern
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: hex
    section: text
    pattern: 00 90 00 90 00 90 00 90 00 90 00 90 00 90 00 90
- id: dense-nops-executable
  desc: Dense NOP instructions in executable section
  crit: suspicious
  conf: 0.75
  per_kb_min: 10.0
  size_max: 10485760
  if:
    type: hex
    section: text
    pattern: 90 90 90 90 90 90 90 90
  unless:
  - id: metadata/lang/compiler/systems::go-binary
- id: low-entropy-executable
  desc: Executable section with very low entropy
  crit: component
  conf: 0.8
  entropy_max: 1.0
  if:
    type: section
    executable: true
    length_min: 65536
  unless:
  - id: metadata/signed/platform::apple
  - id: objectives/anti-static/obfuscation/binary-metrics/imports::mscoree-string
  - id: metadata/binary/framework/
  - id: metadata/binary/linking/runtime/
  - id: metadata/binary/metrics/structural::many-imports
  - id: objectives/anti-static/obfuscation/binary-structure/
  downgrade:
    any:
    - type: section
      executable: true
      length_max: 131072
- id: oversized-text-section
  desc: Unusually large executable section
  crit: notable
  conf: 0.7
  if:
    type: section
    executable: true
    length_min: 4194304
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/binary/metrics/threshold::dotnet-binary
  - id: metadata/library/sage-math/
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/lang/compiler/aot::native-runtime-large-file
  - id: well-known/lib/jvm
  - id: well-known/lib/skiko
- id: fptable-section
  desc: .fptable section present
  crit: component
  conf: 0.8
  for:
  - pe
  if:
    type: section
    substr: .fptable
- id: scsi-miniport-string
  desc: ScsiMiniPort driver string
  crit: component
  if:
    type: text
    exact: ScsiMiniPort
- id: kernel-driver-string
  desc: "Win kernel driver artifact (ntoskrnl/storport)"
  crit: component
  if:
    type: text
    regex: '(ntoskrnl|storport\.sys)'
- id: rebuildimport-string
  desc: RebuildImport string token
  crit: component
  if:
    type: text
    substr: RebuildImport
composite_rules:
- id: low-entropy-recognized-runtime-marker
  desc: Recognized runtime or compression library low-entropy marker
  crit: component
  any:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems::go-binary-macho
  - id: metadata/lang/compiler/systems::go-binary-comp
  - id: metadata/lang/compiled::go-runtime-marker
  - id: metadata/binary/framework::java-launcher-proxy-exports
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/binary/linking/runtime::dotnet-host-runtime
  - id: micro-behaviors/data/compress/library::liblzma
  - id: micro-behaviors/dylib/library/family::xz-ref
  - id: well-known/lib/jvm
  - id: well-known/lib/skiko
  - id: well-known/lib/android-renderscript
- id: packer-or-driver-exclusion
  desc: Known packer, protector, or driver binary
  crit: component
  any:
  - id: objectives/anti-static/pack/detect::themida-or-asprotect
  - id: objectives/anti-static/pack/detect::enigma-protector
  - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
  - id: scsi-miniport-string
  - id: metadata/lang/compiler/native::watcom-runtime
  - id: kernel-driver-string
  - id: well-known/app/hasp-license-manager::hasp-license-manager-service
- id: code-cave-null-indicator
  desc: Large executable null padding indicator
  crit: component
  conf: 0.85
  any:
  - id: large-null-run-text
  - id: huge-null-run-text
- id: code-cave-support-indicator
  desc: Secondary code cave structure indicator
  crit: component
  conf: 0.8
  any:
  - id: int3-padding-text
  - id: null-nop-pattern
  - id: low-entropy-executable

- id: injection-ready-cave
  desc: Code cave suitable for code injection
  crit: suspicious
  conf: 0.9
  size_min: 16384
  all:
  - id: huge-null-run-text
  - id: metadata/hardening/memory::wx-section
  any:
  - id: objectives/anti-static/obfuscation/payload/import::extreme-minimal-imports
  - id: metadata/binary/metrics/structural::no-functions
  unless:
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/lang/compiler/managed::dvclal-resource
  - id: metadata/binary/framework::dotnet-metadata
  - id: objectives/anti-static/obfuscation/binary-structure/
  - id: rebuildimport-string
  - id: well-known/app/hasp-license-manager/
- id: suspicious-padding
  desc: Suspicious executable section padding
  crit: suspicious
  conf: 0.85
  attack: T1027
  size_max: 500000
  needs: 2
  any:
  - id: large-null-run-text
  - id: int3-padding-text
  - id: null-nop-pattern
  - id: dense-nops-executable
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/binary/metrics/structural::many-exports
