defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1027.009, T1620"

composite_rules:
  - id: encrypted-code-cave-pe-loader
    desc: Encrypted PE loader with code-cave staging
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/backdoor/loader/native-reflect::in-memory-pe-loader-with-decryption
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-validation-sequence
      - id: objectives/anti-analysis/self-modify/runtime::codecave-ref
    unless:
      - id: metadata/signed/platform/
      - id: objectives/anti-static/obfuscation/binary-structure::packer-or-driver-exclusion
      - id: well-known/tool/reverse-engineering/
