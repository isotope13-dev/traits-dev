defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: dotnet-oversized-packed-text
    desc: High-entropy .NET text without large managed resources
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/section/metrics::oversized-high-entropy-text-section
    downgrade:
      any:
        - id: well-known/app/logitech/
    unless:
      - id: metadata/binary/resource::clr-resource-large
