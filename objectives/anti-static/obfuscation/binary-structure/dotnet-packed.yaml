defaults:
  for: [pe]

traits:
  - id: dotnet-high-entropy-oversized-text
    desc: .NET with oversized high-entropy .text section
    crit: suspicious
    conf: 0.85
    entropy_min: 7.5
    if:
      type: section
      regex: '^\.text$'
      length_min: 5242880 # 5MB

