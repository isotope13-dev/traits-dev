defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027,T1620

composite_rules:
  - id: rwx-lookup-decoded-code
    desc: Lookup-decoded bytes transferred to executable memory
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/mem/protect/modify::virtualprotect-rwx-stack-arg-x86
      - id: micro-behaviors/data/encode/custom::x86-lookup-table-byte-decoder
      - id: metadata/binary/instruction::indirect-tail-jump-reg
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: well-known/tool/reverse-engineering/
