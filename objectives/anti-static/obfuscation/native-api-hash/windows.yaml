defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: ntcreatefile-djb2-hash
    desc: NtCreateFile DJB2 hash constant
    crit: component
    conf: 0.94
    if:
      type: hex
      section: .text
      pattern: DB EC A5 15
  - id: ntqueryinformationfile-djb2-hash
    desc: NtQueryInformationFile DJB2 hash constant
    crit: component
    conf: 0.94
    if:
      type: hex
      section: .text
      pattern: 63 F8 25 47
  - id: ntreadfile-djb2-hash
    desc: NtReadFile DJB2 hash constant
    crit: component
    conf: 0.94
    if:
      type: hex
      section: .text
      pattern: E3 9A 97 2E
  - id: ntclose-djb2-hash
    desc: NtClose DJB2 hash constant
    crit: component
    conf: 0.94
    if:
      type: hex
      section: .text
      pattern: 3D 13 8E 8B
  - id: ntprotectvirtualmemory-djb2-hash
    desc: NtProtectVirtualMemory DJB2 hash constant
    crit: component
    conf: 0.94
    if:
      type: hex
      section: .text
      pattern: C8 62 29 08
  - id: rtlregisterwait-djb2-hash
    desc: RtlRegisterWait DJB2 hash constant
    crit: component
    conf: 0.94
    if:
      type: hex
      section: .text
      pattern: 11 1C DA E4
composite_rules:
  - id: djb2-native-ntdll-hash-profile
    desc: DJB2 native NTDLL API hash resolver
    crit: suspicious
    conf: 0.97
    all:
      - id: objectives/anti-static/obfuscation/imports::djb2-hash-constant
      - id: objectives/anti-static/obfuscation/imports::pe-export-walk-primitive
    any:
      - id: ntcreatefile-djb2-hash
      - id: ntqueryinformationfile-djb2-hash
      - id: ntreadfile-djb2-hash
      - id: ntclose-djb2-hash
      - id: ntprotectvirtualmemory-djb2-hash
      - id: rtlregisterwait-djb2-hash
    needs: 2
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/platform/
