defaults:
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  attack: T1027
  size_min: 262144
traits:
  - id: go-embedded-compiler-ir
    desc: Go binary with compiler IR types
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: "main\\.SSAValue"
  - id: go-concatenated-word-types
    desc: Go types with concatenated-word obfuscation
    crit: suspicious
    conf: 0.85
    count_min: 3
    if:
      type: text
      regex: 'main\.[A-Z][a-z]{15,}'
    unless:
      - type: symbol
        substr: "github.com/"
  - id: go-instruction-opcode-types
    desc: Go binary with instruction/opcode types
    crit: notable
    conf: 0.85
    count_min: 3
    if:
      type: text
      regex: 'main\.(Instruction|Opcode|RegID)'
  - id: go-short-word-main-types
    desc: Many short common-word main package types
    crit: suspicious
    conf: 0.85
    count_min: 5
    if:
      type: text
      regex: '^main\.[A-Z][a-z]+$'
    unless:
      - type: symbol
        substr: "github.com/"
