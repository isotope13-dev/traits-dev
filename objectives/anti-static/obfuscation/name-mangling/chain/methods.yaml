# Short lowercase identifiers invoking execution methods. The matcher does not
# verify randomness — it keys on a 5-6 char lowercase receiver calling an
# execution method — so the alternation is restricted to genuine exec verbs
# (exec/run/shell/execute). Benign data methods like .replace/.copy/.move were
# removed: they are ubiquitous on ordinary descriptive names (retval.replace,
# buffer.copy) and contradicted the "exec-like" intent.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: random-identifier-chains-a
    desc: 'Short lowercase IDs invoking exec/run/shell'
    crit: suspicious
    conf: 0.7
    count_min: 5
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: well-known/lib/marked::marked-js-bundle
      - id: metadata/lang/source::haxe-source
    downgrade:
      any:
        - id: well-known/tool/development/firebug::firefox-devtools-extension
        - id: well-known/tool/development/prettier::package-bundle
        - id: well-known/tool/development/vscode-svelte::extension-bundle
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    if:
      type: symbol
      regex: '^[a-z]{5,6}\.(exec|run|shell)$'
  - id: random-identifier-chains-b
    desc: "Short lowercase identifiers invoking execute"
    crit: suspicious
    conf: 0.7
    count_min: 5
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: well-known/lib/marked::marked-js-bundle
    downgrade:
      any:
        - id: well-known/tool/development/firebug::firefox-devtools-extension
        - id: well-known/tool/development/prettier::package-bundle
        - id: well-known/tool/development/vscode-svelte::extension-bundle
        - id: metadata/library/structure::js-large-module-bundle
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    if:
      type: symbol
      regex: '^[a-z]{5,6}\.(execute)$'
