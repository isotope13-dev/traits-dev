# Duplicate Names for Code Inflation
# Detects excessive name reuse patterns indicating dead code bombing
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: random-identifier-chains-a
    desc: "Random identifiers with exec-like methods"
    crit: suspicious
    conf: 0.7
    count_min: 5
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    downgrade:
      any:
        - id: well-known/tool/development/firebug::firefox-devtools-extension
        - id: well-known/tool/development/prettier::package-bundle
        - id: well-known/lib/videojs::release-bundle
        - id: well-known/tool/development/vscode-svelte::extension-bundle
        - id: metadata/library/structure::js-large-module-bundle
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    if:
      type: symbol
      regex: '^[a-z]{5,6}\.(replace|exec|run|shell)$'
  - id: random-identifier-chains-b
    desc: "Random identifiers with file-like methods"
    crit: suspicious
    conf: 0.7
    count_min: 5
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    downgrade:
      any:
        - id: well-known/tool/development/firebug::firefox-devtools-extension
        - id: well-known/tool/development/prettier::package-bundle
        - id: well-known/tool/development/vscode-svelte::extension-bundle
        - id: metadata/library/structure::js-large-module-bundle
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    if:
      type: symbol
      regex: '^[a-z]{5,6}\.(copy|move|execute)$'
