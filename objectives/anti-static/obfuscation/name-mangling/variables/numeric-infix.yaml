defaults:
  platforms: [windows, unix]
  for: [scripts]
traits:
  - id: numeric-infix
    desc: Numeric infix obfuscation (e.g. com0715press)
    crit: suspicious
    conf: 0.8
    count_min: 3
    if:
      type: text
      regex: \b[a-z]{3,}[0-9]{4,}[a-z]{3,}\b
    not:
      - regex: \b(perl|python|ruby|node|gcc|glib|php|lua)\d+
      - regex: \d+(delta|changelog|changes|compat)\b
      - regex: \brfc\d{4}[a-z]+\b
