defaults:
  platforms: [windows, unix]
  for: [scripts]
traits:
  - id: numeric-infix
    desc: Numeric infix obfuscation (e.g. com0715press)
    crit: notable
    conf: 0.8
    count_min: 3
    if:
      type: text
      regex: \b[a-z]{3,}[0-9]{4,}[a-z]{3,}\b
    not:
      # An embedded four-digit calendar year (act2024xys, promo2019page) dates a
      # campaign/API route; real numeric-infix mangling uses arbitrary digit runs
      # (com0715press), so a year-shaped run is the benign case.
      - regex: \b[a-z]{3,}(19|20)\d{2}[a-z]{3,}\b
      - regex: \b(perl|python|ruby|node|gcc|glib|php|lua)\d+
      - regex: \d+(delta|changelog|changes|compat)\b
      - regex: \brfc\d{4}[a-z]+\b
      - regex: \biso\d{4,}[a-z]+\b
      - regex: \bcoco\d{4}labels(-[a-z]+)?\b
      - regex: \bwin\d{4,}[a-z]+\b
      - regex: \b[a-z]+\d{3,5}(dsa|rsa|dh|dhe|ecdh|ecdhe)\b
      - regex: \btest[a-z]*\d{4,}(pub|priv|key)\b
    unless:
      # Generated protocol/XDR sources commonly use numeric type names such as
      # Bls12381G1Mul and Int256AddSub.  The generated-file banner is strong
      # benign context; these identifiers are schema names, not mangled code.
      - type: text
        regex: '(?i)automatically generated file|do not edit.*(?:overwritten|generated)'
      # Test fixtures use alphanumeric placeholder identifiers (e.g. abcd1234efgh)
      # that look like numeric-infix obfuscation but are not.
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness/
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/library/structure/
      - type: path
        basename: true
        regex: '^[A-Za-z0-9_.-]+[-.][a-f0-9]{8,}\.js$'
