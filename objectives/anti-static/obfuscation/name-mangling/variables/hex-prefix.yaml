# Symbols named with a leading random-looking hex hash (8+ hex chars) — a
# name-mangling / symbol-obfuscation pattern emitted by packers and obfuscators.
# Relocated from kernel-hide/lkm/hiding: hex-prefixed naming is a generic
# obfuscation technique, not a kernel-hiding mechanism. The rootkit composite
# (obfuscated-hide-symbols) references it cross-tier.
defaults:
  platforms: [windows, unix]
  for: [c]
traits:
- id: random-prefix-function
  desc: "func with random-looking hex prefix"
  crit: suspicious
  conf: 0.7
  if:
    type: symbol
    kind: function
    regex: ^([a-f0-9]{8,}|x[a-f0-9]{8,})_
  not:
  - regex: ^CRYPTO
  - regex: ^OpenSSL
  - regex: ^ssize
  - regex: ^ares_
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-spdx-source-context
