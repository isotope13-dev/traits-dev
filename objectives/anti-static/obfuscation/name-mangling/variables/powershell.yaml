# PowerShell Obfuscation / Variable Naming
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [powershell]
  crit: suspicious
  conf: 0.7
traits:
  - id: random-variable-names
    desc: Random variable names
    count_min: 3
    if:
      type: text
      regex: '\$[A-Z0-9]{5,}\s*[=,\[\)]'
  - id: ps-alternating-alphanumeric-vars
    desc: Obfuscated alternating alphanumeric variable names
    count_min: 3
    if:
      type: text
      regex: '\$[A-Z][0-9][A-Z][0-9][A-Z0-9]'
