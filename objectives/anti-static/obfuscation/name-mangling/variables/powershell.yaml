# PowerShell Obfuscation / Variable Naming
defaults:
  platforms: [windows]
  for: [powershell]
  crit: suspicious
  conf: 0.7
traits:
  - id: random-variable-names
    desc: Random variable names
    count_min: 3
    if:
      type: text
      regex: '\$[A-Z0-9]{5,}\s*[=,\[\)]'
    not:
      - substr: $LASTEXITCODE
  - id: ps-alternating-alphanumeric-vars
    desc: Obfuscated alternating alphanumeric variable names
    count_min: 3
    if:
      type: text
      regex: '\$[A-Z][0-9][A-Z][0-9][A-Z0-9]'
  - id: cmdlet-spoofed-brace-vars
    desc: Cmdlet-spoofed braced variable names
    crit: suspicious
    conf: 0.92
    count_min: 3
    if:
      type: text
      regex: '\$\{[A-Za-z]+-[A-Za-z]+ [^}]{0,100}&& \(\$[a-z]{3,8}\)\}'
