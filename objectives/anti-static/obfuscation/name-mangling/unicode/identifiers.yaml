defaults:
  platforms: [windows, unix]
traits:
  - id: math-alphanum-identifiers
    desc: Mathematical Unicode indicator glyphs
    crit: suspicious
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: metrics
      field: text.high_byte_ratio
      min: 0.01
      min_size: 256
    unless:
      - type: basename
        regex: \.pyz$
      - id: metadata/package/testing/harness/runtime::is-test
      - type: metrics
        field: identifiers.total
        max: 20
      - type: metrics
        field: text.suspicious_identifier_ratio
        max: 0.39
      - type: basename
        regex: (?i)(i18n|l10n|locale)\.
      - type: text
        substr: dayjs_locale_
      - type: basename
        regex: (?i)translations?\.
      - id: metadata/file/text/invisible-unicode::emoji-logger-icons-text
