defaults:
  platforms: [windows, unix]
traits:
  - id: math-alphanum-identifiers
    desc: Mathematical Unicode indicator glyphs
    crit: suspicious
    conf: 0.9
    for: [python, javascript, typescript]
    if:
      type: metrics
      field: text.high_byte_ratio
      min: 0.85
      min_size: 256
    unless:
      - type: basename
        regex: \.pyz$
      - id: metadata/package/testing/harness/runtime/
      - type: metrics
        field: identifiers.total
        max: 20
      - type: metrics
        field: text.suspicious_identifier_ratio
        max: 0.39
      - id: objectives/anti-static/obfuscation/name-mangling/unicode/
      - id: metadata/library/runtime::moment-locale
  - id: dayjs-locale-text
    desc: dayjs locale data text
    crit: component
    conf: 1.0
    for: [python, javascript, typescript]
    if:
      type: text
      substr: dayjs_locale_
composite_rules:
  - id: unicode-locale-content
    desc: Locale/translation Unicode context
    crit: component
    conf: 1.0
    any:
      - id: metadata/file/profile/locale::locale-basename
      - id: dayjs-locale-text
      - id: metadata/file/profile/locale::translation-module-basename
      - id: metadata/file/invisible-unicode::emoji-logger-icons-text
