defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: math-alphanum-identifiers
    desc: Mathematical Unicode indicator glyphs
    crit: notable
    conf: 0.9
    for: [python, javascript, typescript]
    unless:
      - type: structure
        feature: binary/format/python-zipapp
    if:
      type: metrics
      field: text.high_byte_ratio
      min: 0.002
      min_size: 256
