# Suspicious DLL Export Names
# Export names that reveal malicious intent through naming conventions
# Anti-static failure: author neglected to obfuscate export names
defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: collect-send-export
    desc: Export combining collection and transmission
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      regex: '(?i)(collect|gather).{0,15}(send|upload|exfil)'
    not:
      - regex: '(?i)telemetry'
      - regex: '(?i)watson'
      - regex: '(?i)collection'
      - regex: '(?i)dump'
      - regex: 'System\.Diagnostics\.Tracing::DataCollector'
      - regex: '^_?Z[NL]'
      - regex: '(?i)regexfil'
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor/
  - id: steal-export
    desc: Export with steal/harvester terminology
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      regex: '(?i)^(steal|harvester)'
  - id: keylog-export
    desc: Export indicating keylogging
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      regex: '(?i)^keylog(ger|ging)?$|^keypresslog(ger|ging)?$'
  - id: inject-export
    desc: Export indicating code injection
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      regex: '(?i)^inject(dll|code|payload)?$'
    unless:
      - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
      - id: well-known/tool/sysadmin/console/
      - id: well-known/game/mod::bedrockboot-source-repository
      - id: well-known/game/mod::bedrockboot-preload-injector-pdb
      - id: well-known/game/mod::bedrockboot-preload-cpp-pdb
    downgrade:
      any:
        - id: well-known/game/mod/
  - id: shellcode-implant-export
    desc: Export indicating shellcode or implant
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      regex: '(?i)^(shellcode|implant)'
  - id: dump-creds-export
    desc: Export indicating credential dumping
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      regex: '(?i)(dump|extract)[_\-]?(cred|pass|hash)'
    not:
      - regex: '(?i)^_?Z[NL]'
      - regex: '(?i)dump[_-]?hash[_-]?table'
  - id: dump-token-export
    desc: Export indicating token extraction
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      regex: '(?i)(dump|extract)token'
    not:
      - regex: '(?i)Signature'
      - regex: '(?i)Metadata'
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
