defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
traits:
  - id: many-dictionary-snakecase-exports
    desc: Many dictionary-style export names
    crit: component
    conf: 0.88
    count_min: 8
    if:
      type: export
      regex: ^[a-z]{4,}(_[a-z]{4,}){1,2}$
  - id: mixedcase-dictionary-export
    desc: Mixed-case dictionary export name
    crit: component
    conf: 0.78
    count_min: 8
    if:
      type: export
      regex: ^[a-z]{4,}[A-Z][a-z]{3,}(_[a-z]{4,})?$
composite_rules:
  - id: single-randomized-dll-export
    desc: Single randomized DLL export
    crit: suspicious
    conf: 0.86
    all:
      - id: metadata/binary/symbols/exports::single-short-lowercase-export
      - id: metadata/binary/metrics/structural::minimal-exports
    any:
      - id: metadata/binary/debug::pdb-random-basename
      - id: metadata/binary/debug::pdb-webroot-loader-project
      - id: metadata/binary/anomaly/format::pe-entry-in-header
    unless:
      - id: metadata/binary/symbols/exports/
      - id: metadata/binary/symbols/exports/
      - id: metadata/signed/platform/
  - id: randomized-dictionary-export-cluster
    desc: Randomized dictionary export cluster
    crit: notable
    conf: 0.9
    all:
      - id: metadata/binary/metrics/threshold::many-exports-20
    any:
      - id: many-dictionary-snakecase-exports
      - id: mixedcase-dictionary-export
    unless:
      - id: metadata/binary/symbols/exports/
      - id: metadata/binary/symbols/exports/
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/x64dbg/
      - id: well-known/lib/electron/
      - id: objectives/anti-static/obfuscation/name-mangling/export-name/
  - id: known-export-cluster-libraries
    desc: Known library producing many snake-case exports
    crit: baseline
    conf: 0.95
    any:
      - id: micro-behaviors/crypto/asymmetric/curve25519::libsodium-library
      - id: well-known/lib/slint::slint-library
      - id: metadata/binary/symbols/exports::basename-libvlc-dll
      - id: well-known/lib/electron::nodejs-webstorage-marker
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
      - id: well-known/lib/duckdb::duckdb-library
