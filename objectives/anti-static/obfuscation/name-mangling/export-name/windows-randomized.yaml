defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
traits:
  - id: many-dictionary-snakecase-exports
    desc: Many dictionary-style export names
    crit: component
    conf: 0.88
    count_min: 8
    if:
      type: symbol
      kind: export
      regex: ^[a-z]{4,}(?:_[a-z]{4,}){1,2}$
  - id: mixedcase-dictionary-export
    desc: Mixed-case dictionary export name
    crit: component
    conf: 0.78
    count_min: 8
    if:
      type: symbol
      kind: export
      regex: ^[a-z]{4,}[A-Z][a-z]{3,}(?:_[a-z]{4,})?$
composite_rules:
  - id: randomized-dictionary-export-cluster
    desc: Randomized dictionary export cluster
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/metrics::many-exports-20
    any:
      - id: many-dictionary-snakecase-exports
      - id: mixedcase-dictionary-export
    unless:
      - id: metadata/binary/symbols::standard-com-server-exports
      - id: metadata/binary/symbols::total-commander-packer-plugin
      - id: metadata/signed/platform::microsoft
      - id: micro-behaviors/crypto/asymmetric/curve25519::libsodium-library
      - id: metadata/binary/symbols::basename-libvlc-dll
      - id: well-known/tool/reverse-engineering::x64dbg-core
