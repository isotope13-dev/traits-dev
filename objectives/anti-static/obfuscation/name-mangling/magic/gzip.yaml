defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: fake-gzip-loader
    desc: Obfuscated loader using fake GZIP header variables
    crit: hostile
    conf: 0.99
    attack: "T1027"
    mbc: "B0032"
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/data/encode/gzip::gzip-header-identifier
      - id: micro-behaviors/data/decode/base64::atob-decode
    any:
      - id: objectives/anti-static/obfuscation/string/encoding::js-charat-loop
      - id: objectives/anti-static/obfuscation/string/encoding::js-array-swap
