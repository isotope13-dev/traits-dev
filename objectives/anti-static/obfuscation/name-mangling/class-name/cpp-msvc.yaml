defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
  mbc: B0032
traits:
  - id: msvc-rtti-mangled-templated-classnames
    desc: MSVC RTTI hex-tagged obfuscated class names
    crit: suspicious
    conf: 0.97
    count_min: 5
    if:
      type: text
      regex: '<[A-Za-z]{6,12}[0-9a-f]{32}>'
    unless:
      - id: metadata/binary/framework::dotnet-assembly
  - id: msvc-rmsnxxwt-template-scaffold
    desc: MSVC obfuscator _rmSnxxwtJFuv template scaffold
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: 'rmSnxxwtJFuv'
  - id: msvc-yegkmuwruv-template-scaffold
    desc: MSVC obfuscator _yeGkMUwRuv template scaffold
    crit: component
    conf: 0.98
    if:
      type: text
      substr: 'yeGkMUwRuv'
  - id: msvc-ochytwl-template-scaffold
    desc: MSVC obfuscator oCHYtwlPtymHxRZU template scaffold
    crit: component
    conf: 0.98
    if:
      type: text
      substr: 'oCHYtwlPtymHxRZU'
composite_rules:
  - id: msvc-rtti-mass-renamer-loader
    desc: MSVC C++ obfuscator-renamed loader with encrypted payload
    crit: hostile
    conf: 0.99
    all:
      - id: msvc-rtti-mangled-templated-classnames
      - id: msvc-rmsnxxwt-template-scaffold
    any:
      - id: msvc-yegkmuwruv-template-scaffold
      - id: msvc-ochytwl-template-scaffold
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-data-section
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::function-count-1000-plus
    unless:
      - id: metadata/signed/platform::microsoft
