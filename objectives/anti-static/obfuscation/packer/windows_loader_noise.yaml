defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: write-only-high-entropy-section
    desc: Write-only high-entropy section payload
    crit: suspicious
    conf: 0.9
    if:
      type: section
      writable: true
      readable: false
      length_min: 4096
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-windows-named
  - id: tiny-executable-obfuscation-section
    desc: Tiny executable nonstandard section stub
    crit: suspicious
    conf: 0.82
    if:
      type: section
      regex: "^\\.[A-Za-z0-9]{3,6}$"
      executable: true
      length_max: 4096
    downgrade:
      any:
        - type: section
          exact: ".text"
        - type: section
          exact: ".code"
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-windows-named
  - id: oversized-reloc-masking
    desc: Oversized low-entropy .reloc masking section
    crit: suspicious
    conf: 0.88
    entropy_max: 4.2
    if:
      type: section
      exact: ".reloc"
      length_min: 4194304
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-windows-named
  - id: obscure-win32-probing-import-cluster
    desc: Rare Win32 probing/tamper import cluster
    crit: suspicious
    conf: 0.84
    attack: "T1497"
    mbc: "B0001"
    if:
      type: import_combination
      required:
        - "^QueryDosDeviceW$"
        - "^GetProfileStringW$"
        - "^GetConsoleAliasExesLengthW$"
      suspicious:
        - "^SetFileShortNameW$"
        - "^DeleteVolumeMountPointW$"
        - "^MoveFileExW$"
        - "^EndUpdateResourceW$"
        - "^EnumDateFormatsA$"
      min_suspicious: 2
