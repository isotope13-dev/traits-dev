defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: sparse-kernel32-loader-profile
    desc: Sparse KERNEL32 loader profile
    crit: suspicious
    conf: 0.91
    size_max: 10485760
    all:
      - id: metadata/binary/symbols/imports::pe-single-import-dll
      - id: micro-behaviors/dylib/load/runtime::load-library-ex-w
      - id: micro-behaviors/os/module/load::get-proc-address-import
    any:
      - id: metadata/binary/symbols/exports::no-exports
      - id: micro-behaviors/os/module/load::get-module-handle-ex
      - id: metadata/binary/resource::minimal-resources
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: objectives/anti-static/obfuscation/imports::peb-access-x64
      - id: metadata/binary/debug::doexeloc-pdb-basename
    needs: 3
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/trust-level/
        - id: metadata/binary/framework/
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/
      - id: well-known/game/mod/
      - id: well-known/game/mod/
