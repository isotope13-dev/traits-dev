defaults:
  platforms: [windows, unix]
  for: [documents, oledoc, msg]
  attack: T1027

composite_rules:
  - id: high-entropy-ole-html-payload-container
    desc: OLE document hides high-entropy HTML payload content
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/document/ole::high-entropy-ole-html-container
      - id: metadata/document/ole::ole-html-body
    any:
      - id: metadata/document/office/container::basename-xls-extension
      - id: metadata/document/office/container::basename-doc-extension
      - id: metadata/document/office/container::basename-ppt-extension
