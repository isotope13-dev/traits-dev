defaults:
  platforms: [unix, windows]
  for: [ooxml]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: high-entropy-ooxml-ole-container
    desc: Compact high-entropy OOXML with executable embedded OLE
    crit: hostile
    conf: 0.97
    size_min: 10240
    size_max: 32768
    all:
      - id: metadata/document/office/markup::ooxml-embedded-ole-object
      - id: metadata/document/office/markup::ooxml-embedded-ole2-object
      - id: metadata/document/office/markup::ooxml-executable-archive-member
      - id: metadata/document/office/markup::ooxml-very-high-entropy-body
