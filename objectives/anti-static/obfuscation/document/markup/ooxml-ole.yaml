defaults:
  platforms: [unix, windows]
  for: [ooxml]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: high-entropy-ooxml-ole-container
    desc: High-entropy OOXML embedded OLE container
    crit: hostile
    conf: 0.94
    all:
      - id: metadata/document/office/markup::ooxml-embedded-ole-object
      - id: metadata/document/office/markup::ooxml-embedded-ole2-object
      - id: metadata/document/office/markup::ooxml-small-high-entropy-body
      - id: metadata/document/office/markup::ooxml-large-archive-member
