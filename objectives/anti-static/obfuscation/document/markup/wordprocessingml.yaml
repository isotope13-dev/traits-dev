defaults:
  platforms: [windows, unix]
  for:
    - ooxml
  crit: suspicious
  conf: 0.94
  attack: T1027
  mbc: B0032
traits:
  - id: white-on-white-wordprocessingml-runs
    desc: Dense white-on-white Word text
    conf: 0.96
    count_min: 20
    if:
      type: text
      substr: 'w:color w:val="FFFFFF" w:themeColor="background1"'
  - id: wordprocessingml-script-function
    desc: Script function in Word XML
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'function\s+[A-Za-z_][A-Za-z0-9_]{3,}\s*\('
  - id: bracket-probe-obfuscation
    desc: Dense bracket-probe obfuscation
    conf: 0.97
    count_min: 20
    if:
      type: text
      substr: "indexOf('[')"
  - id: charcode-bracket-builder
    desc: Bracket-built CharCode resolver
    conf: 0.97
    if:
      type: text
      regex: "String\\[[^\\]]{1,40}\\['Char'\\]\\+\\['Code'\\]\\]"
  - id: try-catch-indexof-deobfuscation
    desc: Try-catch indexOf deobfuscation loop
    conf: 0.96
    count_min: 5
    if:
      type: text
      substr: "indexOf('[')&gt;-1"
  - id: fromcharcode-noise-padding
    desc: Dense noise variable padding
    conf: 0.95
    count_min: 30
    if:
      type: text
      regex: '[a-z]{4,8}[A-Za-z]{2,15}\d{1,2}ko='
composite_rules:
  - id: concealed-wordprocessingml-script
    desc: Concealed script in WordprocessingML
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/document/office/markup::ooxml-raw-word-layout
      - id: white-on-white-wordprocessingml-runs
      - id: wordprocessingml-script-function
    any:
      - id: bracket-probe-obfuscation
      - id: charcode-bracket-builder
      - id: try-catch-indexof-deobfuscation
