defaults:
  for: [vbs]
  platforms: [windows]
  crit: suspicious
  conf: 0.92
traits:
  - id: excessive-concatenation
    desc: Excessive string concatenation
    conf: 0.88
    count_min: 50
    per_kb_min: 5.0
    if:
      type: text
      substr: " & "
  - id: chr-strreverse-combo
    desc: Chr with StrReverse deobfuscation
    conf: 0.94
    if:
      type: text
      regex: '(?i)(StrReverse|strRev).{0,120}Chr[W$]?\('
  - id: hex-to-ascii-loop
    desc: Hex string to ASCII conversion loop
    conf: 0.93
    if:
      type: text
      regex: '(?is)Mid\$.{0,40}[0-9]+\s*,\s*2.{0,80}Val\s*\(\s*"&[Hh]"'
composite_rules:
  - id: vba-heavy-string-obfuscation
    desc: Heavy VBA string obfuscation
    conf: 0.96
    all:
      - id: excessive-concatenation
    any:
      - id: micro-behaviors/data/encode/char-code::dense-chr-construction
      - id: micro-behaviors/data/encode/char-code::strreverse-call
      - id: micro-behaviors/data/encode/char-code::callbyname-call
    needs: 1
  - id: vba-array-shellcode-builder
    desc: VBA array-based shellcode construction
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/encode/char-code::array-payload-reconstruction
    any:
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
    needs: 1
