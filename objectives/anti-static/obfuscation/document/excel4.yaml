defaults:
  for: [documents]
  platforms: [windows]
composite_rules:
  - id: excel4-style-keyed-char-obfuscation
    desc: XLM style-keyed CHAR obfuscation
    crit: suspicious
    conf: 0.99
    all:
      - id: metadata/document/office/macro::excel4-ooxml-macrosheet
      - id: metadata/document/office/macro::excel4-veryhidden-sheet
      - id: metadata/document/office/macro::excel4-auto-open-name
      - id: micro-behaviors/process/create/macro/office::char-obfuscation-burst
      - id: micro-behaviors/process/create/macro/office::get-cell-style-keying
      - id: micro-behaviors/process/create/macro/office::formula-fill-runtime-write
