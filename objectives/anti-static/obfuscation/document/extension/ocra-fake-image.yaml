defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  crit: hostile
  conf: 1.0
traits: []
composite_rules:
  - id: ocra-masked-as-image
    desc: OCRA packed executable disguised with an image extension
    all:
      - id: objectives/anti-static/pack/ocra
      - id: metadata/file/extension::image-extension
