defaults:
  platforms: [unix, windows]
  for: [ooxml]
  attack: T1027
  mbc: B0032
composite_rules:
- id: malformed-high-entropy-ooxml
  desc: Malformed high-entropy OOXML
  crit: suspicious
  conf: 0.94
  all:
  - id: metadata/document/office/markup::ooxml-parse-error
  - id: metadata/document/office/markup::ooxml-small-high-entropy-body
- id: malformed-excel-macro-container
  desc: Malformed macro-enabled Excel container
  crit: suspicious
  conf: 0.94
  all:
  - id: metadata/document/office/markup::ooxml-parse-error
  - id: metadata/document/office/macro::raw-excel-macro-capable-document
- id: obfuscated-ooxml-executable-storage
  desc: Obfuscated OOXML executable storage
  crit: suspicious
  conf: 0.96
  all:
  - id: metadata/document/office/markup::ooxml-long-archive-member-name
  - id: metadata/document/office/markup::ooxml-hidden-archive-member
  - id: metadata/document/office/markup::ooxml-executable-archive-member
