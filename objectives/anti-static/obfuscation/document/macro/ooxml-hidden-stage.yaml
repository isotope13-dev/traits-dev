defaults:
  platforms: [unix, windows]
  for: [ooxml]
  attack: T1027

composite_rules:
- id: ooxml-vba-hidden-high-entropy-stage
  desc: OOXML VBA with hidden sheet, executable member, and high-entropy container
  crit: hostile
  conf: 0.96
  all:
  - id: metadata/document/office/macro::office-vba-project-value
  - id: metadata/document/office/macro::excel-veryhidden-sheet-metric
  - id: metadata/document/office/markup::ooxml-executable-archive-member
  - id: metadata/document/office/markup::ooxml-very-high-entropy-body
