defaults:
  platforms: [unix, windows]
  for: [ooxml]
  attack: T1027

composite_rules:
- id: ooxml-vba-veryhidden-worksheet
  desc: VBA workbook conceals a very-hidden worksheet
  crit: suspicious
  conf: 0.94
  all:
  - id: metadata/document/office/macro::office-vba-project-value
  - id: metadata/document/office/macro::excel-veryhidden-sheet-metric
- id: ooxml-vba-sparse-content-concealment
  desc: Sparse content-bearing VBA workbook concealment
  crit: suspicious
  conf: 0.96
  all:
  - id: ooxml-vba-veryhidden-worksheet
  - id: metadata/document/office/markup::ooxml-compact-package
  - id: metadata/document/office/macro::excel-sharedstrings-part
