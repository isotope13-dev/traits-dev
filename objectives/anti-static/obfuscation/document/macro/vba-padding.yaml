defaults:
  platforms: [windows]
  for: [documents]
traits:
  - id: long-alphanumeric-padding
    desc: Large alphanumeric padding block
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '[A-Za-z0-9]{4000,}'
composite_rules:
  - id: msforms-command-concealment
    desc: Hidden command in MSForms object
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/document/office/macro::excel-vba-project
      - id: metadata/document/office/macro::forms-textbox-payload-surface
      - id: micro-behaviors/process/create/macro/office::userform-activate-trigger
      - id: objectives/execution/trigger/document::office-vba-remote-msi-command
  - id: office-vba-static-padding
    desc: Office document static padding
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/document/office/macro::excel-vba-project
      - id: long-alphanumeric-padding
