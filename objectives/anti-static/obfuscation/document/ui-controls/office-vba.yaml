defaults:
  for: [documents]
  platforms: [windows]
  crit: suspicious
  conf: 0.9
traits:
  - id: cmd-env-substring-expansion
    desc: cmd env substring expansion
    crit: notable
    count_min: 2
    if:
      type: raw
      regex: '%[A-Za-z0-9_()]+:~[0-9]+,[0-9]+%'
      case_insensitive: true
composite_rules:
  - id: hidden-textbox-command
    desc: Command hidden in textbox
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/document/office::forms-textbox-payload-surface
      - id: micro-behaviors/process/create/shell/lang::comspec-batch-stager
  - id: hidden-textbox-shell-obfuscation
    desc: Hidden textbox shell obfuscation
    crit: suspicious
    conf: 0.98
    all:
      - id: hidden-textbox-command
      - id: cmd-env-substring-expansion
      - id: metadata/document/office::obfuscated-vba-project-layout
