defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: suspicious
  conf: 1.0
traits:
  - id: image-dot-jpg
    desc: Image extension marker .jpg.
    crit: suspicious
    if:
      type: basename
      substr: .jpg.
  - id: image-dot-jpeg
    desc: Image extension marker .jpeg.
    crit: suspicious
    if:
      type: basename
      substr: .jpeg.
  - id: image-dot-png
    desc: Image extension marker .png.
    crit: suspicious
    if:
      type: basename
      substr: .png.
  - id: image-dot-gif
    desc: Image extension marker .gif.
    crit: suspicious
    if:
      type: basename
      substr: .gif.
  - id: image-dot-bmp
    desc: Image extension marker .bmp.
    crit: suspicious
    if:
      type: basename
      substr: .bmp.
  - id: image-dot-ico
    desc: Image extension marker .ico.
    crit: suspicious
    if:
      type: basename
      regex: "\\.ico\\.(exe|scr|com|bat)$"
  - id: image-dot-svg
    desc: Image extension marker .svg.
    crit: suspicious
    if:
      type: basename
      substr: .svg.
  - id: image-dot-webp
    desc: Image extension marker .webp.
    crit: suspicious
    if:
      type: basename
      substr: .webp.
composite_rules:
  - id: pe-masked-as-image
    desc: PE file disguised with an image extension
    all:
      - id: metadata/file/magic::pe-dos-stub
      - id: objectives/anti-static/obfuscation/document/file-extension
      - id: metadata/file/extension::windows-executable
