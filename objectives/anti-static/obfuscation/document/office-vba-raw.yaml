defaults:
  for: [documents, text]
  platforms: [windows]
  crit: suspicious
  conf: 0.95
traits:
  - id: qwuhd-junk-delimiter
    desc: Repeated qwuhd junk delimiter
    conf: 0.99
    if:
      type: raw
      regex: 'qwuhd.{0,12}qwuhd.{0,12}qwuhd.{0,12}qwuhd'
  - id: junked-utf16-base64-stager
    desc: Junked UTF16 base64 stager
    conf: 0.97
    if:
      type: raw
      regex: '([A-Za-z0-9+/]{2,8}qwuhd){64,}[A-Za-z0-9+/=]{12,}'
composite_rules:
  - id: office-vba-qwuhd-stager
    desc: Hidden Office stager blob
    crit: suspicious
    conf: 0.98
    all:
      - id: qwuhd-junk-delimiter
      - id: junked-utf16-base64-stager
