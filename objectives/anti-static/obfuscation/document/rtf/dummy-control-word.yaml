defaults:
  platforms: [windows, unix]
  for: [rtf]
traits:
  - id: dummy-control-word
    desc: Repeated RTF dummy control word pattern.
    crit: suspicious
    conf: 0.8
    count_min: 1
    if:
      type: raw
      regex: "(\\\\'R1[0-9a-fA-F]{2}){4,}|(\\\\'R1){4,}"
  - id: axeminvurl89-obfuscation-flood
    desc: AxeMinVurl89 obfuscation flood
    crit: suspicious
    conf: 0.99
    count_min: 1024
    if:
      type: text
      substr: "\\AxeMinVurl89"
