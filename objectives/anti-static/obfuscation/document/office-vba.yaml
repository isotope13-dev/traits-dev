defaults:
  platforms: [windows]
  for: [documents, text]
traits:
  - id: long-alphanumeric-padding
    desc: Large alphanumeric padding block
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '[A-Za-z0-9]{4000,}'
composite_rules:
  - id: msforms-command-concealment
    desc: Hidden command in MSForms object
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/format/document/office::excel-vba-project
      - id: metadata/format/document/office::msforms-userform-payload-surface
      - id: metadata/format/document/office::userform-activate-handler
      - id: objectives/execution/trigger/document::office-vba-remote-msi-command
  - id: office-vba-static-padding
    desc: Office document static padding
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/format/document/office::excel-vba-project
      - id: long-alphanumeric-padding
