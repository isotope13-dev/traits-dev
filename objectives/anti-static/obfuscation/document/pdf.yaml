defaults:
  platforms: [windows]
  for: [pdf]
  attack: T1027

traits:
  - id: pdf-jsfuck-bootstrap
    desc: PDF JavaScript uses JSFuck string building
    crit: suspicious
    conf: 0.92
    count_min: 5
    if:
      type: raw
      regex: '\(\{\}\+\[\]\)|!\+\[\]'

composite_rules:
  - id: pdf-hidden-acroform-payload
    desc: PDF hides JavaScript in AcroForm field
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/document/pdf::hidden-zero-rect-button
      - id: micro-behaviors/data/encode/custom::pdf-acroform-base64-js-name
    any:
      - id: micro-behaviors/process/create/eval::js-action
      - id: micro-behaviors/process/create/eval::js-name-tree
    needs: 1
