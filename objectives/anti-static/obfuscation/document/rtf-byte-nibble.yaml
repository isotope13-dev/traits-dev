defaults:
  platforms: [unix, windows]
composite_rules:
  - id: rtf-byte-nibble
    desc: RTF document with byte nibble or injection obfuscation.
    crit: hostile
    all:
      - type: trait
        id: metadata/file/magic::rtf
    any:
      - type: trait
        id: objectives/anti-static/obfuscation/document/rtf::byte-nibble
      - type: trait
        id: objectives/anti-static/obfuscation/document/rtf::nested-object-in-data
      - type: trait
        id: objectives/anti-static/obfuscation/document/rtf::invalid-hex-escape
