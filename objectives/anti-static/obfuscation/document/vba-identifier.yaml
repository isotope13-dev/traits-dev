# VBA identifier-shape obfuscation atomics.
#
# These read aggregate identifier statistics computed by cleave's
# office analyzer over every VBA module's declared subs/functions
# and imported APIs. High entropy + long mean length + many
# randomly-named modules is the canonical signature of compiler-
# style identifier renaming applied to VBA droppers (IcedID,
# Emotet, Hancitor have all shipped variants of this).
#
# Atomic thresholds are deliberately conservative — each one alone
# is "notable" at most. The composite at the bottom escalates when
# multiple shape signals co-occur, which is when the compound
# evidence rules out human authorship.
defaults:
  for: [oledoc, ooxml]
  platforms: [windows]
  crit: notable
  conf: 0.9

traits:
  # --- Identifier entropy ---
  # 4.5+ bits across an alphanumeric+underscore alphabet is
  # essentially uniform random distribution; humans cluster
  # 3.0–3.8.
  - id: vba-high-identifier-entropy
    desc: VBA identifiers have high character entropy
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: office.vba.identifier_entropy
      min: 4.5

  # --- Mean identifier length ---
  # 14+ characters mean across declared subs/functions is unusual
  # — human-authored VBA averages 6–10 chars even in verbose
  # frameworks. Random alphanumeric tokens skew long because
  # each token is independently sampled.
  - id: vba-long-mean-identifier-length
    desc: VBA declared identifiers average over 14 chars
    if:
      type: metrics
      field: office.vba.mean_identifier_length
      min: 14.0

  # --- Random-looking module names ---
  - id: vba-randomized-module-names
    desc: VBA module names look randomly generated
    crit: suspicious
    conf: 0.92
    if:
      type: metrics
      field: office.vba.random_named_module_count
      min: 2

  # --- Comment-to-line ratio sentinel: very few comments in a
  #     non-trivial module is itself a faint signal — most human
  #     VBA has at least header banners. Used as a building block
  #     for the heavy-obfuscation composite. ---
  - id: vba-many-logical-lines
    desc: VBA project has many logical lines
    crit: baseline
    conf: 0.85
    if:
      type: metrics
      field: office.vba.total_logical_lines
      min: 200

composite_rules:
  # Heavy obfuscation gate: high entropy + long mean length OR many
  # random module names. The two-signal composite raises confidence
  # while keeping false positives down — neither signal alone fires
  # `suspicious`, but their conjunction is virtually never benign.
  - id: vba-heavy-identifier-obfuscation
    desc: VBA shows heavy identifier obfuscation
    crit: suspicious
    conf: 0.95
    all:
      - id: vba-high-identifier-entropy
    any:
      - id: vba-long-mean-identifier-length
      - id: vba-randomized-module-names
    needs: 1
