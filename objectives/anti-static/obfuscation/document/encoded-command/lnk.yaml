defaults:
  platforms: [windows]
  for: [lnk]
  attack: T1027

composite_rules:
  - id: minimized-powershell-encoded-bypass
    desc: Minimized PowerShell LNK uses encoded policy-bypass command
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001,T1204.002,T1564.003
    all:
      - id: objectives/command-and-control/dropper/lnk/target::powershell-target
      - id: objectives/command-and-control/dropper/lnk/target::minimized-window
      - id: objectives/command-and-control/dropper/lnk/target::powershell-argument-executionpolicy-bypass
      - id: objectives/command-and-control/dropper/lnk/target::powershell-argument-encoded-command
